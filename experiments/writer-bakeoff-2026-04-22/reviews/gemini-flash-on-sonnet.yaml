    evidence:
    - quote: сі́м'я | іменник; апостроф після М перед Я | Моя сім'я живе у Харкові.
      issue: Incorrect stress for 'family'. сім'я́ (family) is the correct form; сі́м'я
        means 'semen' or 'seed' in scientific contexts. This is a significant lexical
        error for an A1 module.
      authority: Горох
    - quote: 'Їх дев''ять: Д, Т, З, С, Ц, Л, Н, Р, ДЗ, а також Й, який завжди м''який.
        Саме після цих приголосних Ь може стояти і виконувати свою роботу.'
      issue: Ь never stands after Й in Ukrainian orthography. The statement incorrectly
        implies Ь can follow Й.
      authority: Правопис 2019
    - quote: кут і куть, лис і лись
      issue: Use of non-existent words ('куть', 'лись') for phonetic contrast. While
        common in some pedagogical contexts, using real words like 'линь' or 'стань'
        is preferred.
      authority: VESUM
