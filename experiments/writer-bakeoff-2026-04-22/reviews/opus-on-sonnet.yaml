      issue: «дрижачий сонорний» — технічно, але пояснено через видиму артикуляцію
        («кінчик язика вібрує»). Прийнятно для А1.
      issue_type: within A1 scope
    - quote: 'Тренуйтеся читати вголос: **п''ять, дев''ять, м''який, м''яч, м''ясо,
