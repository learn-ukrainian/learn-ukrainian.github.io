      issue: «Палаталізований», «піднесення середини язика до піднебіння» — це термінологія
        5-го класу НУШ, не А1. План сам вимагає пояснити, що Г не «м'який», але текст
        відповідає надмірно технічно. Для А1-носія української мови це на межі допустимого;
        для учня, що освоює грамоту, важкувато.
