reviewer_model: opus
fixture: a1/special-signs
axes:
  linguistic_correctness:
    score: 6
    evidence:
    - quote: 'Порівняйте: **кут** і **куть**, **лис** і **лись** — сам знак Ь нечутний,
        але він цілком змінює звучання попереднього приголосного.'
      issue: '«куть» і «лись» відсутні у VESUM — це неіснуючі слова, подані як природні
        мінімальні пари. На А1 це формує хибне уявлення, що Ь можна приліпити до будь-якого
        слова і дістати нове. Треба справжні пари: «кут — куть» замінити на «вісім
        — вісімь» (не годиться, теж нема), радше «суть — сут» (теж нема), або дати
        реальну опозицію типу «сім — сімь»… Краще: прибрати пару і пояснити на «день»,
        «кінь», «сіль», де Ь робить реальну роботу у реальному слові.'
      authority: 'VESUM (batch verify: «куть» NOT FOUND, «лись» NOT FOUND; «кут»,
        «лис», «мазь», «мить» FOUND)'
    - quote: 'Загальний список: Кожна велика літера підказує один приголосний: ДЗ,
        Д, Т, З, С, Ц, Л, Н — і додайте Р. Маєте повний список.'
      issue: Мнемоніка «ДЗіДЗьо, Де Ти З'їСи Ці ЛиНи?» кодує 8 приголосних (ДЗ, Д,
        Т, З, С, Ц, Л, Н). Текст чесно додає Р окремо — це коректно і відповідає плану.
      authority: plan content_outline / Літвінова 5 клас
    - quote: '**легко** вимовляється [лехко] — тут Г перед глухим К уподібнюється
        до Х.'
      issue: Правильна транскрипція та асиміляція. Відповідає шкільній традиції (дзвінкий
        Г + глухий К → [х] + [к]).
      authority: Правопис 2019 / Захарійчук
    - quote: Окремо від Г існує **Ґ** [g] — дзвінкий проривний приголосний... Глуха
        пара Ґ — К.
      issue: Правильно. Ґ [g] і його пара К [k] подані коректно, без калькування з
        російської традиції.
      authority: Правопис 2019 §15
    - quote: '**маленький** (Ь перед К) — Ь пом''якшує попередній приголосний навіть
        у середині слова.'
      issue: 'Формулювання «Ь перед К» може ввести в оману: у «маленький» Ь стоїть
        між Н і К, пом''якшуючи Н, а не К (К пом''якшити неможливо — це задньоязиковий).
        Загальне пояснення нижче це виправляє, але першокласнику на А1 очі зашумить.'
      authority: Большакова 1 клас, стор. 45-47 (триподіл приголосних)
  pedagogical_accuracy:
    score: 8
    evidence:
    - quote: 'Порівняйте слова **без** апострофа і **з** апострофом: - **пісня** —
        тут Н м''який: Н + Я = [н''а]. Приголосний пом''якшується. - **сім''я** —
        тут М тверде: М + '' + Я = [м] + [йа]. Два окремі звуки.'
      issue: Це найсильніший пасаж модуля. Контраст «пісня / сім'я» — точно та опозиція,
        яка потрібна учневі А1 для розуміння функції апострофа. Повністю відповідає
        плану.
      authority: plan section «Апостроф» / Захарійчук 1 клас, стор. 97
    - quote: 'Важлива деталь: якщо перед губним приголосним стоїть ще один приголосний
        кореня (не Р), апостроф не ставиться. Наприклад: **свято** (С стоїть перед
        В — апострофа немає), **цвях** (Ц стоїть перед В — апострофа немає).'
      issue: Правило А1-рівня подано спрощено, але коректно. Це виняток з правила
        губних, який учні мають знати з 1 класу (Захарійчук).
      authority: Захарійчук 1 клас / Правопис 2019
    - quote: 'Зверніть увагу: сонорні приголосні (В, Л, М, Н, Й, Р) не входять у жодну
        з цих пар. Вони завжди дзвінкі й глухої пари не мають.'
      issue: 'Суперечить власному ж тексту: у мнемоніці Р подано як «справді м''який»
        — але класифікація «справді м''який» стосується пом''якшення, а не дзвінкості.
        Тут Р — сонорний дзвінкий без пари. Обидва твердження правильні, але потребують
        явного зв''язку, щоб учень не вирішив, що Р — особливий «двічі дзвінкий».'
      authority: Большакова / шкільна фонетика 5 клас
    - quote: Захарійчук позначає тверді приголосні рискою [–], а м'які — двома рисками
        [=]. (Захарійчук, 1 клас, стор. 15).
      issue: Правильна і точна атрибуція — саме цю позначку плану було вимагано. Джерело
        цитоване.
      authority: plan references — Захарійчук стор. 15
  decodability_a1:
