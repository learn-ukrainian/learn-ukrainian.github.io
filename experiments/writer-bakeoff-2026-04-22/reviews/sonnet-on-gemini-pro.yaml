reviewer_model: sonnet
fixture: a1/special-signs
axes:
  linguistic_correctness:
    score: 9
    evidence:
    - quote: апостроф ставиться після губних приголосних (Б, П, В, М, Ф) та після
        сонорного Р перед літерами Я, Ю, Є, Ї
      issue: Correct. Matches Правопис 2019 §7 verbatim. All apostrophe examples (сім'я,
        м'ясо, п'ять, комп'ютер, дев'ять, м'який) verified in VESUM — all 9 key vocabulary
        forms found.
      authority: Правопис 2019
    - quote: Якщо ми не вимовляємо м'який знак, слово може повністю втратити свій
        сенс або звучати вкрай неприродно. Наприклад, порівняйте тверде звучання у
        слові «син» (родинний зв'язок) і м'яке у слові «синь» (синій колір).
      issue: Correct. «синь» (blueness) vs «син» (son) is a valid minimal pair demonstrating
        the phonemic value of Ь. ✓
      authority: none
    - quote: 'вісім основних пар приголосних: Б–П, Д–Т, Г–Х, Ґ–К, З–С, Ж–Ш, ДЗ–Ц,
        ДЖ–Ч'
      issue: Correct. All 8 pairs match the plan's grammar section and standard Ukrainian
        phonology.
      authority: none
    - quote: Важливо пам'ятати, що Г не є «м'яким» звуком (в українській фонетиці
        «м'який» означає палаталізований, яким Г не є); його справжньою глухою парою
        є Х.
      issue: Correct. Г [ɦ] is a voiced glottal/laryngeal fricative, not palatalized.
        Its voiceless counterpart is Х. This is the exact clarification the plan mandates.
      authority: none
    - quote: 'Доповни слово (Апостроф): ... с_огодні, сім_я, ден_, п_ять, маз_'
      issue: 'Minor label mismatch: activity header says ''Апостроф'' but items include
        purely Ь words (ден_, маз_, с_огодні). The plan''s fill-in hint says ''Ь або
        апостроф,'' so the content is correct — the section label is slightly misleading.
        Not a linguistic error, a labeling issue.'
      authority: 'plan section: activity_hints[1]'
  pedagogical_accuracy:
    score: 8
    evidence:
    - quote: «тварина», тоді як форма «тварь» (з м'яким знаком після Р наприкінці)
        є російською і не вживається в нашій мові.
      issue: CORRECT — and proactively included. The plan explicitly flagged this
        ('«тварь» — це РОСІЙСЬКА форма, НЕ використовуйте її'). Writer followed the
        decolonized pedagogy directive. ✓
      authority: 'plan section: content_outline[1].points[1]'
    - quote: Знайдіть слова, в яких пропущено апострофи, і запишіть їх правильно.
        Зверніть увагу на роздільну вимову твердого приголосного і йотованого голосного.
        *мясо, компютер, свято, цвях, девять*
      issue: 'PEDAGOGICAL FLAW. Activity 3 includes «свято» and «цвях» as distractors
        (correctly written without apostrophe per Правопис 2019 §7 Примітка: no apostrophe
        when another root consonant precedes the губний). But this exception — ''якщо
        перед губним є інша буква кореня, апостроф не пишемо'' — is NEVER taught in
        the module text. A student who reads only this module and correctly applies
        the taught rule (губні + Я/Ю/Є/Ї → apostrophe) will write «св''ято» and «цв''ях»
        — both wrong. The activity silently tests a rule that wasn''t taught.'
      authority: Правопис 2019 §7 Примітка
    - quote: Потренуйтеся з відео Анни Огойко про звук И. Потренуйтеся з відео Анни
        Огойко [для Р].
      issue: MISSING. The plan specifies video references to Анна Огойко for both
        И and Р sections. Neither appears in the module. These are supplementary but
        explicitly in the plan's content points.
      authority: 'plan section: content_outline[3].points[0], content_outline[3].points[2]'
    - quote: «ДЗіДЗьо, Де Ти З'їСи Ці ЛиНи»
      issue: Correct. Mnemonic reproduced faithfully. Linked correctly to the 9 softening
        consonants. ✓
      authority: 'plan section: content_outline[0].points[1]'
  decodability_a1:
    score: 8
    evidence:
    - quote: Він показує роздільну вимову твердого приголосного і наступного йотованого
        голосного.
      issue: Term «йотованого голосного» (yodated vowel) is a metalinguistic technical
        term. For teen/adult native Ukrainian speakers (the stated audience), it is
        appropriate — they understand Ukrainian and can learn new phonetic vocabulary.
        For Grade 1 children (6-7 years), this would be above scope. Evaluation assumes
        teen/adult target per project mission.
      authority: none
    - quote: апостроф діє як фонетичний бар'єр
      issue: Metaphor is effective and accessible. No VESUM or Антоненко-Давидович
        flags. Мildly above 'розмовний' register, but pedagogically clear. ✓
      authority: none
    - quote: Важливо пам'ятати, що Г не є «м'яким» звуком (в українській фонетиці
        «м'який» означає палаталізований, яким Г не є)
      issue: «палаталізований» is a sophisticated term used once without a plain-Ukrainian
        gloss. For teen/adult native speakers, still decodable from context. No issue
        at this audience level.
      authority: none
