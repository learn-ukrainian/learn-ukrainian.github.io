  register_naturalness:
    score: 8
    evidence:
    - quote: Ця м'якість робить українську фонетику такою плавною та милозвучною.
      issue: Natural Ukrainian. Lyrical register appropriate for cultural pride framing
        in Ukrainian L1 curriculum. Not a calque. ✓
      authority: none
    - quote: Збереження цієї дзвінкості робить українське мовлення повнозвучним, багатим
        і мелодійним.
      issue: Natural Ukrainian. Same pattern — appealing to the beauty of the language
        as pedagogical motivation. ✓
      authority: none
    - quote: кардинально змінюється
      issue: «Кардинально» is attested and natural in Ukrainian. Not a Russianism.
        Антоненко-Давидович returns no flag. ✓
      authority: Антоненко-Давидович
    - quote: апостроф діє як фонетичний бар'єр
      issue: The phrase 'фонетичний бар'єр' is a pedagogical coinage, not a calque.
        No style guide entry against it. Register is more formal/academic than the
        plan's 'розмовний' spec, but appropriate for a written phonetics module. The
        register gap is real — the entire module reads as academic prose, not conversational
        Ukrainian — but no individual phrase is a Russianism or calque.
      authority: Антоненко-Давидович
  honesty:
    score: 8
    verify_markers_present: false
    notes: 'No VERIFY markers present — none were needed. All factually settled phonetics
      claims. The writer correctly addressed every plan-mandated warning: (1) explicit
      statement that Г is not ''м''який'' in the phonetic sense of palatalized; (2)
      explicit ''тварь'' = Russian warning; (3) no prefix apostrophe examples (під''їзд,
      з''їзд) used; (4) словник entry for «м''який» explicitly notes no Ь (only apostrophe,
      Й always soft). One honesty gap: the module silently includes «свято» and «цвях»
      as activity-3 distractors without acknowledging that they follow an exception
      rule not covered in the explanatory text. A genuinely honest module would either
      teach the exception or note that these words are beyond A1 scope.'
plan_issues:
- plan_field: grammar[3]
  issue: Internal contradiction. States 'Сонорні (В, Л, М, Н, Й, Р) НЕ є ані дзвінкими,
    ані глухими (вони лише дзвінкі).' The parenthetical 'вони лише дзвінкі' directly
    contradicts 'не є дзвінкими.' Standard Ukrainian phonology classifies sonants
    as a third category — always voiced but not contrasted — and the plan cannot simultaneously
    hold both claims. The module handles this gracefully by saying sonants 'є виключно
    дзвінкими і не мають своїх глухих відповідників,' which is the cleaner formulation.
  evidence: 'grammar[3]: ''Сонорні (В, Л, М, Н, Й, Р) НЕ є ані дзвінкими, ані глухими
    (вони лише дзвінкі).'''
summary:
  overall_score: 8.0
  single_worst_error: Activity 3 tests knowledge of the consonant-cluster apostrophe
    exception (Правопис 2019 §7 Примітка — why «свято» and «цвях» have no apostrophe)
    without ever teaching that exception, meaning students who apply the taught rule
    correctly will produce wrong answers on those two items.
  single_best_moment: The explicit pre-emptive correction 'Важливо пам'ятати, що Г
    не є «м'яким» звуком (в українській фонетиці «м'який» означає палаталізований,
    яким Г не є)' directly kills a common misconception before it can form.
  verdict: REVISE
  word_count_estimate: 1430
