# Agent fallback substitution map — canonical source of truth.
# Consumed by /api/state/routing-budget (when extended in follow-up PR) and
# referenced by orchestrator routing decisions (MEMORY.md, this file).
#
# Trigger condition: when a budget bucket is at status `near_cap` or higher
# (burn_pct > 90), the orchestrator MUST use the substitution path below
# instead of the surface that would drain the depleted bucket.
#
# Provenance: user direction 2026-05-13 — "you need to store this and add to
# router" (paste of the substitution table built during the budget-economics
# discussion that day).

substitutions:
  - currently_uses: "delegate.py --agent claude (adversarial review)"
    fallback: 'Agent(subagent_type="general-purpose", model="opus")'
    fallback_note: "Agent tool subagents run as children of this session"
    budget_bucket: "interactive (orchestrator session, not programmatic)"

  - currently_uses: "delegate.py --agent claude (code dispatch >50 LOC)"
    fallback: |
      (a) Codex via `delegate.py --agent codex` (separate weekly quota), OR
      (b) inline by orchestrator if context-continuity gives it an edge
    budget_bucket: "Codex weekly quota OR interactive"

  - currently_uses: "ab ask-claude (one-shot consult)"
    fallback: |
      Orchestrator inline reasoning (orchestrator IS Claude), OR
      Agent(subagent_type="general-purpose", model="opus")
    budget_bucket: "interactive"

  - currently_uses: "ab discuss (Codex + Claude adversarial)"
    fallback: |
      Codex via `delegate.py --agent codex` + Agent subagent for Claude role,
      OR escalate to user for cold-start interactive Claude (highest-stakes
      adversarial dynamic only)
    budget_bucket: "Codex + interactive"

  - currently_uses: "delegate.py --agent codex"
    fallback: "(unaffected — separate weekly quota)"
    budget_bucket: "Codex weekly"

  - currently_uses: "delegate.py --agent gemini"
    fallback: "(unaffected — separate quota)"
    budget_bucket: "Gemini"

  - currently_uses: "linear_pipeline.invoke_writer(writer='claude-tools')"
    fallback: |
      deepseek-tools effort=xhigh — uniformly across A1, A2, B1+.

      User direction 2026-05-19: "we don't do budget options" — quality is
      non-negotiable (CLAUDE.md), so the routing does NOT degrade effort
      by level. Same writer + same effort = consistent quality contract
      across the curriculum. The "medium for A1, xhigh for B1+" tier was
      a cost-optimization proposal explicitly rejected.

      Evidence basis:
        - 2026-05-19 B1 bakeoff: deepseek-v4-pro xhigh produces full
          artifact emission (38 KB output, 7 plan_reasoning + 4 fences +
          end_gate, beats claude-tools by char count). Medium effort
          fails at B1's 4000-word target (scaffolding-only).
        - v1 A1 bakeoff: deepseek-v4-pro at MEDIUM was best A1 writer.
          xhigh at A1 has not been bakeoff-validated head-to-head, but
          per the project's quality-over-cost stance the safer move is
          xhigh everywhere (same-or-better content; no risk of running
          out of budget on edge cases or future plan growth).

      NOT VIABLE alternatives (current state):
        - codex-tools — blocked by #2159 (runner-layer crash regardless
          of effort)
        - gemini-tools — built-in run_shell_command + update_topic calls
          trip wrong_tool_family even after 0fc0f0d427's namespace fix
        - qwen-tools — produces full emission cheap+fast at B1, but was
          rejected from routing as a "budget option" per same user
          direction. Untested for quality parity with deepseek-xhigh.

      Outstanding quality caveat:
        Reviewer phase must compensate for the writer-time MCP-invocation
        gap — deepseek-pro writes verification_trace scaffolding listing
        intended MCP calls but does NOT actually invoke them at
        writer-time. claude-tools is the only writer with real writer-time
        MCP linguistic verification (24 calls on B1 this session vs 0 for
        deepseek-xhigh). This is the #1 known risk; investigation is
        task #8 in the orchestrator queue. Until resolved, post-cutover
        pipeline relies on reviewer + audit gates (russianisms_clean,
        check_russian_shadow, vesum_verified) to catch what the writer
        would have verified pre-emission.
    fallback_note: |
      Evidence trail: audit/2026-05-19-b1-writer-bakeoff/REPORT.html
      (B1 verdict), audit/2026-05-19-multi-agent-routing-assessment/
      REPORT.html (A1 verdict + multi-agent routing). Quality-over-cost
      stance: user direction 2026-05-19 + CLAUDE.md mission statement.
    budget_bucket: "interactive (orchestrator-active builds) OR
      Claude weekly (during user cold-start review sessions)"

post_2026_06_15_hard_rule: |
  Per user direction 2026-05-13 ("you should delegate only to codex and gemini
  after june 15th"): after the agentic credit pool launches, NO `delegate.py
  --agent claude` invocations. Code dispatches route to codex/gemini; Claude
  programmatic surfaces use the substitution chain above from day one, not
  only at near_cap. The $200/mo pool is reserved for user's own cold-start
  review sessions, not orchestrator dispatches.
