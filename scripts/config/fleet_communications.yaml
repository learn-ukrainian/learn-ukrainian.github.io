---
version: 1
# Message plane production default (Gate A / #5512). Env FLEET_COMMS_MESSAGE_PLANE
# always wins when set. Modes: off | shadow | dual_write.
# Operator finish-mode 2026-07-23 + parity window 8/8 ok → default shadow.
# dual_write remains opt-in (still not stream-authority cutover; files authoritative).
message_plane:
  default_mode: shadow

# formal_review_eligible is fail-closed until sealed CF isolation is proven and
# the matching isolation issue closes (#5555 AGY, #5556 Kimi, #5557 Grok). Only
# claude|codex are proven formal CF seats today; unproven live lanes stay
# eligible for advisory/implement work with formal_review_eligible: false.
#
# Formal CF model+effort pins (review-pr / model_catalog formal_cf_defaults):
#   codex → gpt-5.6-terra @ high · claude → claude-sonnet-5 @ high · glm → glm-5.2
#   pool volume → Laguna S 2.1 (laguna-s-2.1); also XS 2.1 / M.1 in catalog
#   grok dark → Cursor explicit grok-4.5
#   agy → gemini-3.6-flash-high @ high (orchestrator seat; formal seal still #5555)
# Authority Sol/Fable only on critical resolve-reviewer ladder.
#
# Orchestrator seats for this stream (model_catalog.orchestrator_seats):
#   claude · grok · agy(gemini-3.6-flash-high @ high)
#   (codex dropped as a DRIVER 2026-07-22 — 272K window not worth rollover overhead;
#    codex remains a formal-CF review seat + coding lane, see the codex endpoint below)
# Each may own cold-start / drive-board loops. Sealed formal CF requests still
# go through review-pr codex|claude|glm until #5555–#5557 flip eligibility.
endpoints:
  - name: claude
    aliases: [claude]
    state: live
    transports: [native_cli]
    completion_evidence: [terminal_event]
    default_ttl_seconds: 3600
    retry_class: standard
    concurrency_limit: 1
    formal_review_eligible: true
    model_family_resolver: canonical-reviewer-resolver
  - name: codex
    aliases: [codex]
    state: live
    transports: [native_cli]
    completion_evidence: [terminal_event]
    default_ttl_seconds: 3600
    retry_class: standard
    concurrency_limit: 1
    formal_review_eligible: true
    model_family_resolver: canonical-reviewer-resolver
  - name: agy
    aliases: [agy]
    state: live
    transports: [project_bridge]
    completion_evidence: [terminal_event]
    default_ttl_seconds: 3600
    retry_class: standard
    concurrency_limit: 2
    # Orchestrator seat (user 2026-07-21): gemini-3.6-flash-high @ high — peer
    # cold-start / drive-board driver alongside claude|grok (codex dropped 2026-07-22).
    # Sealed formal CF isolation not proven (project instructions / MCP / hooks /
    # nested reviewers). When AGY *orchestrates*, request CF via review-pr
    # claude|glm|codex; AGY itself stays advisory for --review until #5555.
    formal_review_eligible: false
    model_family_resolver: canonical-reviewer-resolver
  - name: grok
    aliases: [grok]
    state: live
    transports: [native_cli]
    completion_evidence: [terminal_event]
    default_ttl_seconds: 3600
    retry_class: standard
    concurrency_limit: 1
    # Sealed formal CF isolation not proven (OAuth / tool credential surface).
    # Live for implement/advisory work; formal CF via review-pr claude|glm|codex.
    # See #5557.
    formal_review_eligible: false
    model_family_resolver: canonical-reviewer-resolver
  - name: kimi
    aliases: [kimi]
    state: live
    transports: [project_bridge]
    completion_evidence: [terminal_event]
    default_ttl_seconds: 3600
    retry_class: standard
    concurrency_limit: 1
    # Sealed formal CF isolation not proven. Live for implement/advisory bridge
    # asks; formal CF via review-pr claude|glm|codex. See #5556.
    formal_review_eligible: false
    model_family_resolver: canonical-reviewer-resolver
  - name: cursor
    aliases: [cursor]
    state: live
    transports: [native_cli]
    completion_evidence: [terminal_event]
    default_ttl_seconds: 3600
    retry_class: standard
    concurrency_limit: 1
    # Harness multi-model seat; not a sealed formal CF identity. Cursor auto is
    # never a model identity for formal review (model_catalog policy).
    formal_review_eligible: false
    model_family_resolver: canonical-reviewer-resolver
  - name: gemini
    aliases: [gemini]
    state: retired
    successor: agy
    transports: []
    completion_evidence: []
    default_ttl_seconds: 3600
    retry_class: none
    concurrency_limit: 0
    formal_review_eligible: false
    model_family_resolver: canonical-reviewer-resolver
  - name: glm-local
    aliases: [glm-local]
    state: local_only
    transports: [local_cli]
    completion_evidence: [terminal_event]
    default_ttl_seconds: 1800
    retry_class: local
    concurrency_limit: 1
    formal_review_eligible: false
    model_family_resolver: canonical-reviewer-resolver
