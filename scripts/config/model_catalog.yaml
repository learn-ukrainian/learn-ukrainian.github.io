# Formal CF transport defaults for review-pr (model + effort). Authority seats
# (Sol/Fable/Opus) are critical-ladder only — not routine review-pr pins.
formal_cf_defaults:
  codex:
    model_id: gpt-5.6-terra
    effort: high
  claude:
    model_id: claude-sonnet-5
    effort: high
  glm:
    model_id: glm-5.2
    effort: high
  pool:
    model_id: poolside/laguna-s-2.1
    effort: high
  grok:
    model_id: grok-4.5
    effort: high
    fallback_transport: cursor
    fallback_model_id: grok-4.5

review_ladders:
  # #5293 quality-first: never let a later rung improve quality tier.
  # critical keeps frontier_authority first (false APPROVED is expensive).
  # high/medium/low use frontier_practical defaults (Terra / Sonnet 5 / 3.6 Flash /
  # Grok / K3 / GLM / DS-Pro / pool S 2.1) — not Sol/Fable on routine PRs.
  critical:
    - [openai_frontier]
    - [claude-fable-5]
    - [claude-fable-5-cursor-fallback]
    - [claude-opus-4-8]
    - [gpt-5.6-terra]
    - [claude-sonnet-5]
    - [gemini-3.6-flash]
    - [grok-4.5]
    - [grok-4.5-cursor-fallback]
    - [kimi-k3]
    - [glm-5.2]
    - [deepseek-v4-pro]
    - [composer-2.5]
    - [gemini-3.1-pro]
    - [pool]
    - [gemini-3.5-flash]
    - [deepseek-v4-flash]
  high: &practical_first_code_review
    - [gpt-5.6-terra]
    - [claude-sonnet-5]
    - [gemini-3.6-flash]
    - [grok-4.5]
    - [grok-4.5-cursor-fallback]
    - [kimi-k3]
    - [glm-5.2]
    - [deepseek-v4-pro]
    - [composer-2.5]
    - [gemini-3.1-pro]
    - [pool]
    - [gemini-3.5-flash]
    - [deepseek-v4-flash]
  medium: *practical_first_code_review
  low: *practical_first_code_review
