# Fleet-comms stream orchestrator seats (#5512 / #4707 / #5703). These lanes may own a
# cold-start loop (prioritize → delegate → CF → merge-in-lane). Formal *sealed*
# CF remains fail-closed on agy|kimi|grok until #5555–#5557; orchestrators still
# *request* CF via review-pr codex|claude|glm.
# Parallel escalate ladder (user 2026-07-22): practical default + authority deep.
# Same shape for every orchestrator seat — like AGY Flash → Pro.
orchestrator_seats:
  claude:
    model_id: claude-sonnet-5
    effort: high
    escalate_model_id: claude-fable-5
    escalate_effort: xhigh
    escalate_when: deep_single_shot_or_architecture
    note: default Sonnet 5 @ high; escalate Fable 5 @ xhigh (Opus only if Fable unavailable)
  codex:
    model_id: gpt-5.6-terra
    effort: high
    escalate_model_id: gpt-5.6-sol
    escalate_effort: xhigh
    escalate_when: deep_single_shot_or_architecture
    note: >
      Re-added as orchestrator seat 2026-07-23 (reverses the 2026-07-22 removal) specifically for
      HydrationCapsuleV1 long-horizon support — score-from-memory + a ~100ms capsule hydrate is
      designed to minimize the rollover-token overhead the prior removal objected to. Named
      alternate/overflow on harness/infra (epic:4707) and the independent DevOps stream
      (epic:5703) alongside Gemini — never a concurrent same-stream co-owner; each
      session-stream lease already fails closed on a live foreign holder, so no new
      exclusivity logic is needed.
  # 2026-07-22 removal note retained for history: "the 272K window is not worth the session-
  # start/end rollover-token overhead relative to its small context" — see the 2026-07-23 note
  # above for why that calculus changed.
  grok:
    model_id: grok-4.5
    effort: high
    # No higher Grok SKU in catalog yet — keep native pin; Cursor pin is availability fallback only.
    escalate_model_id: grok-4.5
    escalate_effort: high
    escalate_when: n/a_same_sku
    fallback_transport: cursor
    fallback_model_id: grok-4.5
    note: native grok-4.5; Cursor explicit grok-4.5 if native dark (not a quality escalate)
  agy:
    model_id: gemini-3.6-flash-high
    effort: high
    escalate_model_id: gemini-3.1-pro-high
    escalate_effort: high
    escalate_when: deep_single_shot_or_architecture
    note: Google-family orchestrator; Flash default loop; Pro escalate only

# Formal CF transport defaults for review-pr (model + effort). Authority seats
# (Sol/Fable/Opus) are critical-ladder only — not routine review-pr pins.
formal_cf_defaults:
  codex:
    model_id: gpt-5.6-terra
    effort: high
    # Authority escalate for critical / hard CF (review-pr --model gpt-5.6-sol --effort xhigh)
    escalate_model_id: gpt-5.6-sol
    escalate_effort: xhigh
  claude:
    model_id: claude-sonnet-5
    effort: high
    escalate_model_id: claude-fable-5
    escalate_effort: xhigh
  glm:
    model_id: glm-5.2
    effort: high
  pool:
    # Laguna S 2.1 — gen-2 strongest (not m.1; not xs)
    model_id: poolside/laguna-s-2.1
    effort: high
    family_models:
      - poolside/laguna-s-2.1   # gen-2 default (S)
      - poolside/laguna-xs-2.1  # gen-2 light (XS)
      - poolside/laguna-m.1     # gen-1 fallback only
  pool_xs:
    model_id: poolside/laguna-xs-2.1
    effort: high
  grok:
    model_id: grok-4.5
    effort: high
    fallback_transport: cursor
    fallback_model_id: grok-4.5
  agy:
    # Orchestrator pin + ladder seat; not a review-pr --reviewer transport until
    # sealed isolation (#5555). When AGY is the formal candidate, resolve-reviewer
    # selects gemini-3.6-flash-high via the practical ladder.
