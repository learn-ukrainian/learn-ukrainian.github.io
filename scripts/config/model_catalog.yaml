schema_version: model-catalog.v1
reviewed_on: 2026-07-21
refresh_after_days: 30

# This is the preferred/current fleet, not every legacy model exposed by a
# multi-model picker. Provider catalogs remain discovery inputs; this catalog
# records the models that routing policy may actively select.
quality_tiers:
  frontier_authority: 1
  frontier_practical: 2
  strong_efficient: 3
  economical: 4
  specialist: 5
  compatibility: 6

policy:
  quality_first: true
  selection_order:
    - independence_and_hard_gates
    - review_quality_tier
    - health_and_quota_within_tier
    - cost_within_equivalent_fit
  risk_quality_floor:
    critical: economical
    high: economical
    medium: economical
    low: economical
  inventory_sources:
    - runtime_registry
    - native_cli_catalogs
    - bridge_routes
    - cursor_model_catalog
    - codexbar_health_and_quota
  notes:
    - CodexBar is a health and quota signal, not a complete model inventory.
    - Cursor auto is a harness choice, never a model identity for formal review.
    - GPT and Grok routes are native-only.
    - Composer 2.5 conservatively shares Moonshot independence lineage with Kimi.

models:
  gpt-5.6-sol:
    family: openai
    tier: frontier_authority
    lifecycle: active
    roles: [architecture, critical_review, difficult_debugging, final_synthesis]
    transports: [native_codex, cursor]
    strengths: [frontier_technical_judgment, long_horizon_reasoning, programmatic_tools]
    weaknesses: [scarce_frontier_quota, wasteful_for_routine_work]
