# Benchmark queries for embedding model comparison (BGE-M3 vs EmbeddingGemma-300M)
# Each query has: text, period, collection, and expected relevant chunk_ids (ground truth).
# Ground truth was manually curated from known-good RAG search results.
#
# Collections: literary_texts, textbook_chunks
# Periods: old_east_slavic, middle_ukrainian, modern

queries:
  # ── Old East Slavic (X–XIII c.) ──────────────────────────────────
  - query: "хрещення Русі"
    period: old_east_slavic
    collection: literary_texts
    relevant_chunks:
      - "ce21e53f_c0169"  # PVL Лаврентіївський — passage about baptism
      - "34aba42b_c0678"  # PVL Іпатський — variant readings on baptism

  - query: "похід Ігоря на половців"
    period: old_east_slavic
    collection: literary_texts
    relevant_chunks:
