paths:
  - ~/.codex/config.toml
  - ~/.gemini/settings.json
  - ~/.envrc
  - ~/.bashrc
  - ~/.zshrc
  - ~/.profile
  - ~/.zprofile
  - ~/.pyenv/shims/.pyenv-shim
  - ~/.codex/sessions/YYYY/MM/DD/rollout
  - ~/.codex/sessions/2026/04/24/rollout
  # Glob patterns (require fnmatch support — see lint_session_state.py).
  # Codex rollout JSONLs include UUIDs and timestamps that change per session;
  # ephemeral worktree paths under ~/.codex/worktrees/ likewise rotate per
  # dispatch. Allowlisting the glob keeps handoff docs honest about where
  # forensics live without forcing per-session allowlist updates.
  - ~/.codex/sessions/*
  - ~/.codex/sessions/**
  - ~/.codex/worktrees/*
  - ~/.codex/worktrees/**
  # Antigravity CLI (`agy`) session storage — path not yet empirically
  # confirmed but added preemptively per #2285 4-target bridge scope.
  - ~/.agy
  - ~/.agy/*
  - ~/.agy/**
  # Deprecated pre-`~/.agy` antigravity-cli config path, referenced illustratively
  # in the 2026-05-21 handoff prose. Allowlisted so historical handoffs stay
  # lintable (the path legitimately no longer exists after the ~/.agy migration).
  - ~/.gemini/antigravity-cli/mcp_config.json
  - ~/.gemini/antigravity-cli/*
  - ~/.gemini/antigravity-cli/**
  # Cursor agent transcripts — `~/.cursor/projects/<encoded-cwd>/agent-transcripts/<session_id>/<session_id>.jsonl`.
  # Per-session UUIDs change every invocation; allowlisting the glob keeps
  # handoff docs honest about the recovery path used by the bridge fallback
  # (`_recover_cursor_discuss_response_from_session_log`, PR #2381).
  - ~/.cursor
  - ~/.cursor/*
  - ~/.cursor/**
  - ~/.claude/projects/.../memory/MEMORY.md
  - ~/.claude/projects/.../memory
  - ~/.claude/.../memory/fact-corrections.md
  - ~/.claude/.../memory
  - ~/.claude/projects/-Users-krisztiankoos-projects-learn-ukrainian--worktrees-dispatch-claude-adr007-prf-invariant-test
  - ~/.agents/skills/graphify
