  fix: Replace with `Різниця полягає в закінченні та формі слова.`
- dimension: linguistic_accuracy
  location: '`32 при́голосних звуки з 22 приголосних літер.`'
  issue: Порушене узгодження числівника з іменником.
  fix: '`32 приголосні звуки позначаються 22 приголосними літерами.`'
- dimension: linguistic_accuracy
  location: '`## Діалоги` — `Ось короткий Діалог.`'
