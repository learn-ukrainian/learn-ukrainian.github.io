    English: This is a precise count of linguistic units.'
  fix: Add a source-bearing VERIFY marker or soften/remove the count.
- dimension: dialogue
  location: '`Class opening — teacher greets formally, students respond informally.`
    / `**Учні:** Привіт!`'
  issue: "Українською: Учні хором відповідають учителеві `Привіт!` після `Добрий день!`;\
    \ це звучить як навчальна підстановка, а не як природна класна ситуація.  \nEnglish:\
    \ Students would more naturally answer the teacher with `Добрий день!`; `Привіт!`\
    \ can be practiced in the peer dialogue."
  fix: Change the class response to `Добрий день!`.
- dimension: factual
  location: Звуки і літери / “sound-inventory runs larger...” and Підсумок / “Чому
    звуків більше...”
  issue: 'Українською: The module gives **дж/дз as a cause** of 38 sounds > 33 letters.
    That is backwards for the stated explanation: digraphs use two letters for one
    sound. The contract’s reason set is йотовані letters, hard/soft consonant pairs,
    and ь marking softness without sound.'
  fix: Replace the digraph-as-cause explanation with hard/soft consonant pairs; keep
    дж/дз only as a separate digraph note.
- dimension: factual
  location: Привіт! / “мама і тато ... uses і after a consonant”
  issue: 'Українською: **мама** ends in a vowel, not a consonant, and the contract
    states after vowel → **в/й**, after consonant → **у/і**.'
  fix: Use **мама й тато** for after-vowel **й**, and add **брат і сестра** for after-consonant
    **і**.
- dimension: factual
  location: Приголосні звуки / “Г is a soft, voiced fricative...”
  issue: 'Українською: Calling **Г** “soft” is misleading in a section that teaches
    hard/soft consonants; **г** is not being taught here as a palatalized soft-pair
    consonant.'
  fix: Describe **Г** as [ɦ] without “soft,” and **Ґ** as [g] without “hard” unless
    explicitly contrasting plosive/fricative.
- dimension: factual
  location: Голосні звуки / “Україна carries four vowels in a row”
  issue: 'Українською: **Україна** has four vowel sounds/letters across the word,
    but not “in a row.”'
  fix: Say it contains four vowel sounds across the word.
- dimension: language
  location: Привіт! / “The pairs **у / в** and **і / й** alternate...”
  issue: 'Українською: **«мама і тато»** is a poor example for the rule being taught,
    because **мама** ends in a vowel. The project’s own euphony materials use **«мама
    й тато»** after a vowel.

    English: This teaches the wrong і/й alternation pattern.'
  fix: Replace **«мама і тато»** with **«мама й тато»**, and update the explanation
    to “uses **й** after a vowel.”
- dimension: decolonization
  location: Привіт! / “sound Ukrainian rather than filtered through a Russian speaker's
