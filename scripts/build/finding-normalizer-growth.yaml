- dimension: language
  location: Section "Приголосні звуки" / `Hear він (it) in ґанок (porch).`
  issue: 'Українською: `він`

    English: Hallucinated Ukrainian word inserted into English instruction. The word
    **він** means "he/it", but has no linguistic reason to appear here as a label
    for the sound [g].'
  fix: '`Hear it in ґанок (porch).`'
- dimension: naturalness
  location: Звуки і літери / Приголосні звуки
  issue: 'Українською: Over-aggressive inline code-switching fractures the English
    grammatical structure.

    English: Since English carries the explanation in this level band (A1.1), the
    English sentence structure must remain intact. Introducing Ukrainian terms as
    parentheticals or appositives is natural; substituting structural components of
    an English sentence with Ukrainian phrases creates a stuttering, Yoda-like reading
    experience (e.g., "a Slavic feature that в **англійській** (in English) is absent").'
  fix: Adjust the code-switched phrases to maintain English grammatical integrity.
- dimension: naturalness
  location: Приголосні звуки
  issue: 'Українською: "drawn from 22 **літер** (letters)"

    English: Clunky use of the Ukrainian genitive plural ("літер") reacting to the
    English preposition "from". When introducing a base Ukrainian term alongside an
    English number, use the nominative form in parentheses.'
  fix: '"drawn from 22 letters (**літери**)"'
- dimension: honesty
  location: Голосні звуки
  issue: 'Українською: 42–46% of spoken speech is vowel sound

