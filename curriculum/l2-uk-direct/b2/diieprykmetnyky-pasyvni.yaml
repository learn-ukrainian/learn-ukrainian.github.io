module: diieprykmetnyky-pasyvni
track: l2-uk-direct
level: b2
type: grammar
title: "Пасивні дієприкметники"
subtitle: "Утворення, узгодження, предикативні форми на -но/-то"
standard_ref: "§4.2.1.2 — пасивні дієприкметники"
textbook_ref: "7 клас §47–48 — пасивні дієприкметники"
teaching_notes: |
  Пасивний дієприкметник: підмет ЗАЗНАЄ дії — «написаний лист» (лист не писав, а його написали).
  Утворюється лише від перехідних дієслів (КОГО? ЩО?).
  Суфікси: -ний/-тий: написаний, відкритий, зроблений.
  Узгоджується з іменником у роді, числі, відмінку: написаний лист (ч.р.), написана книга (ж.р.).
  Окремо введіть предикативні форми на -но/-то: «Книгу написано» — безособова конструкція.
  Різниця: «написаний лист» (ознака) vs «лист написано» (предикат, незмінна форма).

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Пасивний дієприкметник — ЯКИЙ? Підмет зазнає дії. Суфікси: -ний/-тий. Узгоджується з іменником. Предикативні форми -но/-то — незмінні."
  examples:
    - "написати → написаний (лист), написана (книга), написане (слово)"
    - "відкрити → відкритий (магазин), відкрита (двері), відкрите (вікно)"
    - "Книгу написано. (предикативна форма — без узгодження)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Утворення пасивних дієприкметників"
    columns: ["Дієслово", "Суфікс", "Дієприкметник"]
    rows:
      - ["написати", "-ний", "написаний"]
      - ["зробити", "-лений", "зроблений"]
      - ["відкрити", "-тий", "відкритий"]
      - ["прочитати", "-ний", "прочитаний"]
      - ["приготувати", "-лений", "приготовлений"]
      - ["побудувати", "-ний", "побудований"]

  - title: "Узгодження пасивних дієприкметників"
    columns: ["Рід / число", "Приклад"]
    rows:
      - ["Чоловічий", "написаний лист"]
      - ["Жіночий", "написана книга"]
      - ["Середній", "написане слово"]
      - ["Множина", "написані листи"]

  - title: "Дієприкметник vs предикативна форма"
    columns: ["Дієприкметник (узгоджується)", "Предикативна форма (незмінна)"]
    rows:
      - ["Написаний лист лежить на столі.", "Лист написано."]
      - ["Відкрита двері скрипіла.", "Двері відчинено."]
      - ["Зроблена робота радує.", "Роботу зроблено."]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Пасивні дієприкметники"
    items:
      - word: "написаний"
        emoji: "\U0001F4DD"
        sentence: "Написаний від руки лист виглядає особливо."
      - word: "зроблений"
        emoji: "\U0001F6E0"
        sentence: "Зроблений із дерева стіл стоїть у кутку."
      - word: "відкритий"
        emoji: "\U0001F513"
        sentence: "Відкрите вікно впускало свіже повітря."
      - word: "прочитаний"
        emoji: "\U0001F4D6"
        sentence: "Прочитана книга лежала на полиці."
      - word: "побудований"
        emoji: "\U0001F3D7"
        sentence: "Нещодавно побудований дім виблискував на сонці."

  - category: "Кулінарна лексика (пасивні дієприкметники)"
    items:
      - word: "нарізаний"
        emoji: "\U0001F52A"
        sentence: "Нарізана цибуля лежить на дошці."
      - word: "очищений"
        emoji: "\U0001F954"
        sentence: "Очищена картопля готова до варіння."
      - word: "змішаний"
        emoji: "\U0001F963"
        sentence: "Змішані інгредієнти утворюють тісто."
      - word: "смажений"
        emoji: "\U0001F373"
        sentence: "Смажена риба — моя улюблена страва."
      - word: "варений"
        emoji: "\U0001F372"
        sentence: "Варене яйце — це швидкий сніданок."

  - category: "Предикативні форми"
    items:
      - word: "написано"
        emoji: "\U0000270D"
        sentence: "Лист написано вчора ввечері."
      - word: "зроблено"
        emoji: "\U00002705"
        sentence: "Роботу зроблено вчасно."
      - word: "відчинено"
        emoji: "\U0001F6AA"
        sentence: "Двері відчинено о дев'ятій."
      - word: "ухвалено"
        emoji: "\U0001F4DC"
        sentence: "Закон ухвалено парламентом."
      - word: "проведено"
        emoji: "\U0001F4CA"
        sentence: "Дослідження проведено минулого року."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Утвори пасивний дієприкметник"
    prompt: "Утвори дієприкметник від дієслова"
    items:
      - given: "написати → ?"
        answer: "написаний"
      - given: "зробити → ?"
        answer: "зроблений"
      - given: "відкрити → ?"
        answer: "відкритий"
      - given: "прочитати → ?"
        answer: "прочитаний"
      - given: "побудувати → ?"
        answer: "побудований"
      - given: "нарізати → ?"
        answer: "нарізаний"
      - given: "очистити → ?"
        answer: "очищений"
      - given: "змішати → ?"
        answer: "змішаний"
      - given: "спекти → ?"
        answer: "спечений"
      - given: "пофарбувати → ?"
        answer: "пофарбований"
      - given: "загубити → ?"
        answer: "загублений"
      - given: "запросити → ?"
        answer: "запрошений"

  - type: classify
    title: "Активний чи пасивний?"
    instruction: "Визнач тип дієприкметника"
    categories:
      - label: "Активний"
        items:
          - "працюючий (механізм працює сам)"
          - "сяючий (сонце сяє саме)"
          - "лежачий (камінь лежить сам)"
          - "пожовклий (листя пожовкло саме)"
      - label: "Пасивний"
        items:
          - "написаний (лист хтось написав)"
          - "зроблений (стіл хтось зробив)"
          - "побудований (дім хтось побудував)"
          - "нарізаний (цибулю хтось нарізав)"

  - type: pattern_drill
    title: "Узгодження"
    prompt: "Узгодь дієприкметник із іменником"
    items:
      - given: "написаний + книга → ?"
        answer: "написана книга"
      - given: "відкритий + вікно → ?"
        answer: "відкрите вікно"
      - given: "зроблений + робота → ?"
        answer: "зроблена робота"
      - given: "побудований + школа → ?"
        answer: "побудована школа"
      - given: "прочитаний + листи → ?"
        answer: "прочитані листи"
      - given: "нарізаний + овочі → ?"
        answer: "нарізані овочі"
      - given: "змішаний + тісто → ?"
        answer: "змішане тісто"
      - given: "спечений + пиріг → ?"
        answer: "спечений пиріг"
      - given: "запрошений + гості → ?"
        answer: "запрошені гості"
      - given: "загублений + сумка → ?"
        answer: "загублена сумка"

  - type: classify
    title: "Дієприкметник чи предикативна форма?"
    instruction: "Визнач: це дієприкметник (узгоджується) чи предикативна форма на -но/-то (незмінна)?"
    categories:
      - label: "Дієприкметник"
        items:
          - "Написаний лист лежить на столі."
          - "Відкрита книга на парті."
          - "Зроблена робота радує вчителя."
          - "Побудований міст з'єднує береги."
      - label: "Предикативна форма -но/-то"
        items:
          - "Лист написано вчора."
          - "Двері відчинено."
          - "Роботу зроблено вчасно."
          - "Закон ухвалено парламентом."

  - type: pattern_drill
    title: "Перетвори на предикативну форму"
    prompt: "Зміни речення: дієприкметник → предикативна форма -но/-то"
    items:
      - given: "Лист написаний. → ?"
        answer: "Лист написано."
      - given: "Двері відкриті. → ?"
        answer: "Двері відкрито."
      - given: "Робота зроблена. → ?"
        answer: "Роботу зроблено."
      - given: "Вікно закрите. → ?"
        answer: "Вікно закрито."
      - given: "Книга прочитана. → ?"
        answer: "Книгу прочитано."
      - given: "Закон ухвалений. → ?"
        answer: "Закон ухвалено."
      - given: "Дослідження проведене. → ?"
        answer: "Дослідження проведено."
      - given: "Помилка виправлена. → ?"
        answer: "Помилку виправлено."

  - type: reading
    title: "Читання: Рецепт борщу"
    text: |
      Нарізана цибуля й натерта морква обсмажені на олії. Очищений буряк порізаний соломкою. Зварена картопля нарізана кубиками. Усі інгредієнти змішано в каструлі. Борщ варено на повільному вогні. Страву подано з хлібом і сметаною. Приготовлений борщ має яскравий колір і багатий смак.
    questions:
      - question: "Знайди всі пасивні дієприкметники."
        answer: "Нарізана, натерта, обсмажені, очищений, порізаний, зварена, нарізана, приготовлений."
      - question: "Знайди предикативні форми на -но/-то."
        answer: "Змішано, варено, подано."
      - question: "Чим відрізняється «нарізана цибуля» від «цибулю нарізано»?"
        answer: "«Нарізана цибуля» — дієприкметник, узгоджується з іменником. «Цибулю нарізано» — предикативна форма, незмінна."

  - type: build_sentence
    title: "Опиши предмет"
    instruction: "Склади речення з пасивним дієприкметником"
    sentences:
      - words: ["лист", "написати"]
        correct: "Написаний лист лежить на столі."
      - words: ["дім", "побудувати"]
        correct: "Побудований дім стоїть на пагорбі."
      - words: ["книга", "прочитати"]
        correct: "Прочитана книга повернута до бібліотеки."
      - words: ["вікно", "відкрити"]
        correct: "Відкрите вікно впускає свіже повітря."
      - words: ["картопля", "очистити"]
        correct: "Очищена картопля лежить у мисці."

  - type: tongue_twister
    title: "Скоромовка"
    text: "Пироги припечені, перцем переперчені."
