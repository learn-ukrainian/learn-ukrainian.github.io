module: intehratsiia-morfolohiia-syntaksys
track: l2-uk-direct
level: b2
type: practice
title: "Інтеграція: морфологія + синтаксис"
subtitle: "Дієприкметники, дієприслівники, типи речень у контексті"
standard_ref: "Повна морфологія + синтаксис"
textbook_ref: "Grade 7–8 — комплексний аналіз: морфологія й синтаксис"
teaching_notes: |
  Інтеграція всіх граматичних знань B2 у зв'язному тексті.
  Дієприкметникові звороти як відокремлені означення.
  Дієприслівникові звороти як відокремлені обставини.
  Усі типи односкладних речень у контексті.
  Пряма/непряма мова зі складними реченнями.
  Вибір сполучника (сурядний vs підрядний) у контексті.
  Пунктуаційний марафон: коми, тире, двокрапка.

key_pattern:
  text: "[Складне речення з дієприкметниковим зворотом], [дієприслівниковий зворот]."
  examples:
    - "Річка, оточена старими вербами, тихо несла свої води, відбиваючи хмари."
    - "Студент, підготовлений до іспиту, впевнено відповідав, посміхаючись."

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Граматичні терміни"
    items:
      - word: "дієприкметник"
        emoji: "\U0001F4D6"
        sentence: "Дієприкметник поєднує ознаки дієслова й прикметника."
      - word: "дієприслівник"
        emoji: "\U0001F4D6"
        sentence: "Дієприслівник означає додаткову дію."
      - word: "відокремлене означення"
        emoji: "\U00002702"
        sentence: "Відокремлене означення виділяється комами."
      - word: "відокремлена обставина"
        emoji: "\U00002702"
        sentence: "Дієприслівниковий зворот — відокремлена обставина."
      - word: "вставне слово"
        emoji: "\U0001F4AC"
        sentence: "Вставне слово виражає ставлення мовця."

  - category: "Синтаксичні одиниці"
    items:
      - word: "підмет"
        emoji: "\U0001F4CC"
        sentence: "Підмет — головний член речення."
      - word: "присудок"
        emoji: "\U0001F4CC"
        sentence: "Присудок вказує на дію підмета."
      - word: "означення"
        emoji: "\U0001F3F7"
        sentence: "Означення характеризує предмет."
      - word: "обставина"
        emoji: "\U0001F4CD"
        sentence: "Обставина вказує на час, місце чи спосіб."
      - word: "додаток"
        emoji: "\U0001F4CB"
        sentence: "Додаток доповнює зміст присудка."

  - category: "Типи речень"
    items:
      - word: "двоскладне"
        emoji: "\U00002705"
        sentence: "«Сонце сяє» — двоскладне речення."
      - word: "односкладне"
        emoji: "\U00002705"
        sentence: "«Світає» — односкладне безособове."
      - word: "складносурядне"
        emoji: "\U0001F517"
        sentence: "«Сонце сяє, і птахи співають» — складносурядне."
      - word: "складнопідрядне"
        emoji: "\U0001F517"
        sentence: "«Я знаю, що він прийде» — складнопідрядне."
      - word: "безсполучникове"
        emoji: "\U0001F517"
        sentence: "«Ніч — тиша» — безсполучникове."

  - category: "Пунктуація"
    items:
      - word: "кома"
        emoji: "\U00002702"
        sentence: "Кома відділяє частини складного речення."
      - word: "тире"
        emoji: "\U00002014"
        sentence: "Тире ставлять між підметом і присудком."
      - word: "двокрапка"
        emoji: "\U00002705"
        sentence: "Двокрапка стоїть перед поясненням."
      - word: "крапка з комою"
        emoji: "\U00002702"
        sentence: "Крапка з комою розділяє складні частини."
      - word: "лапки"
        emoji: "\U0000201C"
        sentence: "Пряму мову беруть у лапки."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: reading
    title: "Комплексний аналіз"
    text: |
      Тихий осінній вечір опустився на місто, огорнувши його прозорим серпанком. Дерева, позолочені осінню, стояли в мовчазній величі. Десь далеко почувся гудок потяга, що поспішав на захід. Вітер, посиливши, підхопив пожовкле листя і закрутив його у вирі. «Осінь — найкрасивіша пора», — подумав я, повертаючись додому. Вулиці спорожніли; лише ліхтарі, запалені о шостій, освітлювали мокрий асфальт.
    questions:
      - question: "Знайди дієприкметникові звороти."
        answer: "«позолочені осінню» (відокремлене означення), «запалені о шостій» (відокремлене означення)."
      - question: "Знайди дієприслівникові звороти."
        answer: "«огорнувши його прозорим серпанком», «посиливши», «повертаючись додому»."
      - question: "Який тип прямої мови використано?"
        answer: "Пряма мова з думкою: «Осінь — найкрасивіша пора», — подумав я."

  - type: build_sentence
    title: "Складний абзац"
    instruction: "Склади речення з граматичними конструкціями"
    sentences:
      - words: ["Річка", ",", "оточена", "старими", "вербами", ",", "тихо", "несла", "свої", "води", "."]
        correct: "Річка, оточена старими вербами, тихо несла свої води."
      - words: ["Студент", ",", "готуючись", "до", "іспиту", ",", "перечитував", "конспект", "."]
        correct: "Студент, готуючись до іспиту, перечитував конспект."
      - words: ["Безперечно", ",", "це", "найважливіше", "відкриття", "року", "."]
        correct: "Безперечно, це найважливіше відкриття року."

  - type: classify
    title: "Тип речення + елемент"
    instruction: "Визнач тип речення або синтаксичний елемент"
    categories:
      - label: "Двоскладне"
        items:
          - "Сонце сяє."
          - "Діти грають у парку."
          - "Книга лежить на столі."
      - label: "Односкладне"
        items:
          - "Світає."
          - "Мені холодно."
          - "Написано олівцем."
      - label: "Складносурядне"
        items:
          - "Сонце сяє, і птахи співають."
          - "Я хотів піти, але залишився."
      - label: "Складнопідрядне"
        items:
          - "Я знаю, що він прийде."
          - "Книга, яку я читав, була цікавою."
      - label: "Відокремлене означення"
        items:
          - "Дерева, вкриті снігом, виглядали казково."
          - "Хлопець, стомлений дорогою, заснув."
      - label: "Відокремлена обставина"
        items:
          - "Посміхаючись, вона відповіла."
          - "Дочитавши книгу, він заснув."

  - type: pattern_drill
    title: "Пунктуаційний марафон"
    prompt: "Який розділовий знак потрібен? (кома / тире / двокрапка / без знака)"
    items:
      - given: "Київ _ столиця України."
        answer: "тире"
      - given: "Він прийшов _ і ми почали працювати."
        answer: "кома"
      - given: "Я знаю одне _ треба вчитися."
        answer: "двокрапка"
      - given: "Дерева _ вкриті снігом _ виглядали казково."
        answer: "кома, кома"
      - given: "Посміхаючись _ вона відповіла."
        answer: "кома"
      - given: "Мабуть _ це правда."
        answer: "кома"
      - given: "Він сказав _ «Я повернуся»."
        answer: "двокрапка"

  - type: build_sentence
    title: "Трансформація речень"
    instruction: "Перетвори двоскладне речення, додавши односкладне"
    sentences:
      - words: ["Надворі", "похолоднішало", ".", "Ми", "повернулися", "додому", "."]
        correct: "Надворі похолоднішало. Ми повернулися додому."
      - words: ["Вже", "смеркало", ",", "коли", "ми", "дісталися", "міста", "."]
        correct: "Вже смеркало, коли ми дісталися міста."
      - words: ["Треба", "вивчити", "цей", "матеріал", "до", "завтра", "."]
        correct: "Треба вивчити цей матеріал до завтра."

  - type: reading
    title: "Газетна стаття: повний аналіз"
    text: |
      Освіта, що базується на критичному мисленні, формує свідомих громадян. Натомість заучування фактів, яке досі домінує в багатьох школах, розвиває лише пам'ять. Як зазначають експерти, сучасний світ потребує людей, здатних аналізувати інформацію. «Школа має вчити думати, а не запам'ятовувати», — наголосив міністр. Безперечно, реформа необхідна. Однак вона потребує часу, ресурсів і, найголовніше, підготовлених учителів.
    questions:
      - question: "Який стиль тексту?"
        answer: "Публіцистичний — аргументація, оцінка, цитата, риторичний прийом."
      - question: "Знайди відокремлені означення."
        answer: "«що базується на критичному мисленні», «яке досі домінує», «здатних аналізувати інформацію»."
      - question: "Яка структура аргументу?"
        answer: "Теза: критичне мислення важливіше. Аргумент: сучасний світ потребує аналітиків. Цитата-підтримка. Висновок: реформа необхідна."
