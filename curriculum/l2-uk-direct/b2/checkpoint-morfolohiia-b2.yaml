module: checkpoint-morfolohiia-b2
track: l2-uk-direct
level: b2
type: checkpoint
title: "Контрольна: морфологія"
subtitle: "Дієприкметники, дієприслівники, прислівники"
standard_ref: "§4.2.1.2, §4.2.1.5 — морфологія"
textbook_ref: "7 клас §44–68 — дієприкметники, дієприслівники, прислівники"
teaching_notes: |
  Контрольний модуль охоплює: утворення дієприкметників (активних/пасивних, включно з -лий),
  узгодження, коми в дієприкметникових зворотах; утворення дієприслівників (недоконані/доконані),
  правило спільного підмета; типи прислівників, утворення, ступені порівняння,
  правопис (разом/окремо/дефіс). Поріг складання: 70%.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Підсумок: дієприкметник (ЯКИЙ?), дієприслівник (ЯК? ЩО РОБЛЯЧИ?), прислівник (ЯК? ДЕ? КОЛИ?)."
  examples:
    - "написаний (пасивний дієприкметник) — ЯКИЙ?"
    - "читаючи (недоконаний дієприслівник) — ЩО РОБЛЯЧИ?"
    - "швидко (означальний прислівник) — ЯК?"

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Дієприкметники"
    items:
      - word: "побудований"
        emoji: "\U0001F3D7"
        sentence: "Побудований міст з'єднує береги."
      - word: "працюючий"
        emoji: "\U00002699"
        sentence: "Працюючий механізм видає звук."
      - word: "пожовклий"
        emoji: "\U0001F342"
        sentence: "Пожовкле листя падає з дерев."
      - word: "відкритий"
        emoji: "\U0001F513"
        sentence: "Відкрите вікно впускає повітря."

  - category: "Дієприслівники"
    items:
      - word: "прочитавши"
        emoji: "\U0001F4DA"
        sentence: "Прочитавши книгу, він задумався."
      - word: "усміхаючись"
        emoji: "\U0001F60A"
        sentence: "Усміхаючись, вона привітала нас."
      - word: "закінчивши"
        emoji: "\U0001F3C1"
        sentence: "Закінчивши роботу, вони пішли додому."
      - word: "слухаючи"
        emoji: "\U0001F3B5"
        sentence: "Слухаючи пісню, він згадував молодість."

  - category: "Прислівники"
    items:
      - word: "по-українськи"
        emoji: "\U0001F1FA"
        sentence: "Він розмовляє по-українськи."
      - word: "швидше"
        emoji: "\U000026A1"
        sentence: "Він біжить швидше за мене."
      - word: "на жаль"
        emoji: "\U0001F614"
        sentence: "На жаль, ми запізнилися."
      - word: "щодня"
        emoji: "\U0001F501"
        sentence: "Вона читає щодня."
      - word: "навколо"
        emoji: "\U0001F504"
        sentence: "Навколо було тихо й спокійно."
      - word: "де-не-де"
        emoji: "\U0001F4CD"
        sentence: "Де-не-де ще лежав сніг."
      - word: "ненароком"
        emoji: "\U0001F61E"
        sentence: "Він ненароком зачепив вазу."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: true_false
    title: "Правда чи ні?"
    items:
      - statement: "«Читаючий» — пасивний дієприкметник."
        answer: false
        correction: "Активний — підмет сам виконує дію."
      - statement: "Дієприслівник завжди відокремлюється комами."
        answer: true
      - statement: "«Написаний лист» — активний дієприкметник."
        answer: false
        correction: "Пасивний — лист хтось написав."
      - statement: "«По-українськи» пишеться через дефіс."
        answer: true
      - statement: "«Прочитавши книгу, настав вечір» — правильне речення."
        answer: false
        correction: "Підмети не збігаються: вечір не читав книгу."
      - statement: "«Краще» — вищий ступінь від «гарно»."
        answer: true
      - statement: "Предикативна форма «написано» змінюється за родом."
        answer: false
        correction: "Форма на -но/-то — незмінна."
      - statement: "«Нажаль» пишеться разом."
        answer: false
        correction: "Окремо: «на жаль»."

  - type: pattern_drill
    title: "Утвори правильну форму"
    prompt: "Утвори дієприкметник або дієприслівник"
    items:
      - given: "написати → пасивний дієприкметник?"
        answer: "написаний"
      - given: "працювати → активний дієприкметник?"
        answer: "працюючий"
      - given: "читати → дієприслівник (недоконаний)?"
        answer: "читаючи"
      - given: "зробити → дієприслівник (доконаний)?"
        answer: "зробивши"
      - given: "пожовкнути → минулий активний дієприкметник?"
        answer: "пожовклий"
      - given: "відкрити → пасивний дієприкметник?"
        answer: "відкритий"
      - given: "повернутися → дієприслівник?"
        answer: "повернувшись"
      - given: "побудувати → пасивний дієприкметник?"
        answer: "побудований"

  - type: classify
    title: "Дієприкметник, дієприслівник чи прислівник?"
    instruction: "Визнач частину мови"
    categories:
      - label: "Дієприкметник"
        items:
          - "написаний"
          - "працюючий"
          - "побудований"
          - "пожовклий"
      - label: "Дієприслівник"
        items:
          - "читаючи"
          - "зробивши"
          - "усміхаючись"
          - "прочитавши"
      - label: "Прислівник"
        items:
          - "швидко"
          - "по-українськи"
          - "на жаль"
          - "навколо"

  - type: build_sentence
    title: "Побудуй речення"
    instruction: "Склади речення за зразком"
    sentences:
      - words: ["дієприкметниковий зворот після іменника", "книга, прочитана влітку"]
        correct: "Книга, прочитана влітку, лежить на полиці."
      - words: ["дієприслівник + головне речення", "закінчивши роботу"]
        correct: "Закінчивши роботу, він пішов додому."
      - words: ["прислівник вищого ступеня", "швидше"]
        correct: "Він біжить швидше за мене."
      - words: ["предикативна форма -но", "роботу зроблено"]
        correct: "Роботу зроблено вчасно."

  - type: classify
    title: "Правопис прислівників"
    instruction: "Визнач: разом, окремо чи через дефіс?"
    categories:
      - label: "Разом"
        items:
          - "щодня"
          - "навколо"
          - "безперервно"
          - "повсюди"
      - label: "Через дефіс"
        items:
          - "по-українськи"
          - "де-не-де"
          - "будь-коли"
          - "мало-помалу"
      - label: "Окремо"
        items:
          - "на жаль"
          - "до речі"
          - "на щастя"
          - "без кінця"

  - type: reading
    title: "Читання: Осінній ранок"
    text: |
      Прокинувшись рано, Оля підійшла до вікна. Відкрите настіж вікно впускало прохолодне повітря. Пожовкле листя, зірване вітром, кружляло над землею. Усміхаючись, вона подивилась на парк. Посаджені навесні дерева вже були високі. Дорога, прокладена через парк, була вкрита листям. Мало-помалу просинався ранок. На щастя, дощу не було. «Сьогодні гуляю щодня!» — вирішила вона, швидко одягнувшись.
    questions:
      - question: "Знайди всі дієприкметники."
        answer: "Відкрите, пожовкле, зірване, посаджені, прокладена, вкрита."
      - question: "Знайди всі дієприслівники."
        answer: "Прокинувшись, усміхаючись, одягнувшись."
      - question: "Знайди прислівники та визнач їхній правопис."
        answer: "Рано (разом), мало-помалу (через дефіс), на щастя (окремо), сьогодні (разом), щодня (разом), швидко (разом)."

  - type: reading
    title: "Читання: Лист від друга"
    text: |
      Привіт! Давно не писав, бо працював безперервно. Прочитавши твій лист, я зрадів. По-перше, ти нарешті знайшов роботу. По-друге, переїхав до нового міста. Час-від-часу я згадую наші зустрічі. Написана тобою листівка досі стоїть на полиці. Побачивши її, я завжди усміхаюся. На жаль, приїхати зараз не можу. Але мало-помалу справи налагоджуються. До побачення! Пиши частіше!
    questions:
      - question: "Знайди дієприслівники й визнач їхній вид."
        answer: "Прочитавши (доконаний), побачивши (доконаний)."
      - question: "Знайди дієприкметниковий зворот."
        answer: "Написана тобою (листівка)."
      - question: "Які прислівники написано через дефіс?"
        answer: "По-перше, по-друге, час-від-часу, мало-помалу."
