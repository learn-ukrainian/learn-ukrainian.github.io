module: styli-movlennia
track: l2-uk-direct
level: b2
type: grammar
title: "Стилі мовлення"
subtitle: "Розмовний, науковий, офіційно-діловий, публіцистичний, художній"
standard_ref: "§4.3.2 (стилі мовлення)"
textbook_ref: "Grade 8 — стилі мовлення, РМ"
teaching_notes: |
  П'ять функціональних стилів — основа мовленнєвої компетенції на рівні B2.
  Кожен стиль має свою сферу використання, мету й характерні ознаки.
  Розмовний — побут, неповні речення, вигуки. Науковий — терміни, складні речення, безособові конструкції.
  Офіційно-діловий — штампи, стандартні формули. Публіцистичний — риторичні запитання, оцінка.
  Художній — тропи, епітети, діалоги, авторський голос.
  Учні мають навчитися розпізнавати стиль за маркерами та переключати регістр.

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "П'ять функціональних стилів"
    columns: ["Стиль", "Сфера", "Мета", "Мовні засоби"]
    rows:
      - ["Розмовний", "побут, щоденне спілкування", "обмін думками", "емоційна лексика, неповні речення, вигуки"]
      - ["Науковий", "наука, освіта", "повідомлення знань", "терміни, складні речення, безособові конструкції"]
      - ["Офіційно-діловий", "діловодство, законодавство", "регулювання відносин", "канцеляризми, штампи, стандартні формули"]
      - ["Публіцистичний", "ЗМІ, політика", "вплив на громадську думку", "риторичні запитання, метафори, оцінна лексика"]
      - ["Художній", "література, мистецтво", "естетичний вплив", "тропи, образність, індивідуальний стиль"]

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Цей текст належить до [стилю] стилю, бо [ознака]."
  examples:
    - "Цей текст належить до наукового стилю, бо містить терміни й складні речення."
    - "Цей текст належить до розмовного стилю, бо має неповні речення й вигуки."
    - "Цей текст належить до офіційно-ділового стилю, бо використовує стандартні формули."

