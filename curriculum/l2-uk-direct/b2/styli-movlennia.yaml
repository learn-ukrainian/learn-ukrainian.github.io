# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Визнач стиль тексту"
    instruction: "Визнач, до якого стилю належить уривок"
    categories:
      - label: "Розмовний"
        items:
          - "Привіт! Ну як справи? Давно не бачилися!"
          - "Ой, забула! Треба ж купити хліба."
      - label: "Науковий"
        items:
          - "Фотосинтез — процес перетворення світлової енергії на хімічну."
          - "Досліджено вплив температури на швидкість реакції."
      - label: "Офіційно-діловий"
        items:
          - "Прошу надати мені відпустку з 1 по 14 липня 2026 р."
          - "Відповідно до наказу № 42 від 15.03.2026..."
      - label: "Публіцистичний"
        items:
          - "Чи готове наше суспільство до змін? Безперечно, так!"
          - "Отже, вельмишановні, час діяти, а не чекати."
      - label: "Художній"
        items:
          - "Тихий вечір опустився на село, мов синє покривало."
          - "Дерева шепотіли щось одне одному, хитаючи гіллям."

  - type: classify
    title: "Стильовий маркер"
    instruction: "До якого стилю належить цей мовний засіб?"
    categories:
      - label: "Розмовний"
        items:
          - "вигук «ой!»"
          - "фразеологізм «ні пуху ні пера»"
          - "неповне речення"
      - label: "Науковий"
        items:
          - "термін «електроліз»"
          - "безособове речення «встановлено, що...»"
      - label: "Офіційно-діловий"
        items:
          - "формула «прошу надати»"
          - "штамп «у зв'язку з»"
      - label: "Публіцистичний"
        items:
          - "риторичне запитання"
          - "оцінне слово «вражаючий»"
      - label: "Художній"
        items:
          - "епітет «золота осінь»"
          - "метафора «серце співає»"

  - type: build_sentence
    title: "Перепиши іншим стилем"
    instruction: "Перепиши повідомлення про погоду в зазначеному стилі"
    sentences:
      - words: ["Середня", "температура", "повітря", "становить", "15°C", ",", "вітер", "—", "помірний", "."]
        correct: "Середня температура повітря становить 15°C, вітер — помірний."
      - words: ["Ой", ",", "сьогодні", "так", "тепло", "!", "Градусів", "п'ятнадцять", ",", "мабуть", "."]
        correct: "Ой, сьогодні так тепло! Градусів п'ятнадцять, мабуть."
      - words: ["Теплий", "весняний", "день", "ніжно", "огортав", "місто", "своїм", "подихом", "."]
        correct: "Теплий весняний день ніжно огортав місто своїм подихом."

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "Художній стиль — це стиль газет і журналів."
        answer: false
        correction: "Стиль газет і журналів — публіцистичний. Художній — це стиль літератури."
      - statement: "Науковий стиль використовує терміни й складні речення."
        answer: true
      - statement: "Офіційно-діловий стиль допускає вигуки й жартівливий тон."
        answer: false
        correction: "Офіційно-діловий стиль вимагає стандартних формул і нейтрального тону."
      - statement: "Розмовний стиль може мати неповні речення."
        answer: true
      - statement: "Метафори й епітети — ознаки наукового стилю."
        answer: false
        correction: "Метафори й епітети — ознаки художнього стилю."

  - type: reading
    title: "Визнач стиль і доведи"
    text: |
      Текст 1: «Надвечір'я. Тихо. Село засинає під колисковою вітру. Десь далеко заспівав півень, і його голос розтанув у прохолодному повітрі.»

      Текст 2: «Повідомляємо, що збори відбудуться 5 березня 2026 року о 14:00 в актовій залі. Явка обов'язкова.»

      Текст 3: «За результатами дослідження, 78% респондентів підтримують реформу. Це свідчить про значну підтримку серед населення.»
    questions:
      - question: "До якого стилю належить текст 1? Назви ознаки."
        answer: "Художній стиль. Ознаки: образність (колискова вітру — метафора), епітети (прохолодний), настрій."
      - question: "Який стиль тексту 2?"
        answer: "Офіційно-діловий. Ознаки: стандартна формула (повідомляємо, що), дата, формальний тон."
      - question: "Який стиль тексту 3?"
        answer: "Публіцистичний. Ознаки: статистичні дані, оцінка (значна підтримка), аналітичний тон."

  - type: pattern_drill
    title: "Слово → стиль"
    prompt: "До якого стилю належить це слово?"
    items:
      - given: "шановний"
        answer: "офіційно-діловий"
      - given: "кумедний"
        answer: "розмовний"
      - given: "гіпотеза"
        answer: "науковий"
      - given: "промовистий"
        answer: "публіцистичний"
      - given: "мов перлина"
        answer: "художній"
      - given: "прошу надати"
        answer: "офіційно-діловий"

  - type: proverb_drill
    title: "Прислів'я та фразеологізми"
    items:
      - proverb: "Від красних слів язик не ___."
        answer: "відсохне"
      - proverb: "Більше діла — менше ___."
        answer: "слів"
      - proverb: "Менше говори — більше ___."
        answer: "вчуєш"
