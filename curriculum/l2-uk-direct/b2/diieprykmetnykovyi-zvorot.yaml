        sentence: "Стіл, зроблений із дерева, дуже міцний."
      - word: "глина"
        emoji: "\U0001FAB5"
        sentence: "Ваза, виліплена з глини, стоїть на полиці."
      - word: "скло"
        emoji: "\U0001FAE7"
        sentence: "Прикраса, зроблена зі скла, виблискує."
      - word: "метал"
        emoji: "\U00002699"
        sentence: "Ворота, зварені з металу, важкі."

  - category: "Дії та результати"
    items:
      - word: "посаджений"
        emoji: "\U0001F331"
        sentence: "Дерево, посаджене навесні, вже зацвіло."
      - word: "намальований"
        emoji: "\U0001F3A8"
        sentence: "Картина, намальована маслом, висить у галереї."
      - word: "перекладений"
        emoji: "\U0001F4D1"
        sentence: "Книга, перекладена з англійської, стала бестселером."
