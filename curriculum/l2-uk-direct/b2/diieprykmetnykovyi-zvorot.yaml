        emoji: "\U0001F3E0"
        sentence: "Будинок, пофарбований у жовтий колір, видно здалеку."
      - word: "міст"
        emoji: "\U0001F309"
        sentence: "Міст, побудований у минулому столітті, ще служить."
      - word: "парк"
        emoji: "\U0001F3DE"
        sentence: "Парк, закладений за козацьких часів, зберігся."
      - word: "церква"
        emoji: "\U000026EA"
        sentence: "Церква, відреставрована нещодавно, вражає красою."
