module: diieprykmetnykovyi-zvorot
track: l2-uk-direct
level: b2
type: grammar
title: "Дієприкметниковий зворот"
subtitle: "Відокремлення, коми, перефразування"
standard_ref: "§4.2.3.7 — відокремлені означення"
textbook_ref: "7 клас §49–50 — дієприкметниковий зворот"
teaching_notes: |
  Дієприкметниковий зворот = дієприкметник + залежні слова.
  Головне правило: ПЕРЕД іменником — без ком. ПІСЛЯ іменника — з комами.
  «Написаний олівцем лист лежить на столі.» — без ком.
  «Лист, написаний олівцем, лежить на столі.» — з комами.
  Обов'язково тренуйте переміщення звороту: з початку речення в середину й навпаки.
  Також — перефразування через «який»: «Лист, написаний олівцем» → «Лист, який написаний олівцем».

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Дієприкметниковий зворот ПЕРЕД іменником → без ком. ПІСЛЯ іменника → з комами."
  examples:
    - "Написаний олівцем лист лежить на столі. (перед — без ком)"
    - "Лист, написаний олівцем, лежить на столі. (після — з комами)"
    - "Зроблений із дерева стіл коштує дорого. (перед — без ком)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Правило ком у дієприкметниковому звороті"
    columns: ["Позиція", "Коми", "Приклад"]
    rows:
      - ["Перед іменником", "Без ком", "Написаний олівцем лист лежить на столі."]
      - ["Після іменника", "З комами", "Лист, написаний олівцем, лежить на столі."]

  - title: "Дієприкметниковий зворот → підрядне речення"
    columns: ["Зворот", "Підрядне речення"]
    rows:
      - ["лист, написаний олівцем", "лист, який написаний олівцем"]
      - ["стіл, зроблений із дерева", "стіл, який зроблений із дерева"]
      - ["книга, прочитана влітку", "книга, яка прочитана влітку"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
