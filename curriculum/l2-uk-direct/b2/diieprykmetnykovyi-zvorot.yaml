# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: true_false
    title: "Коми розставлено правильно?"
    items:
      - statement: "Лист написаний олівцем лежить на столі."
        answer: false
        correction: "Лист, написаний олівцем, лежить на столі. (зворот ПІСЛЯ іменника — потрібні коми)"
      - statement: "Написаний олівцем лист лежить на столі."
        answer: true
      - statement: "Дерево, посаджене навесні вже зацвіло."
        answer: false
        correction: "Дерево, посаджене навесні, вже зацвіло. (потрібна друга кома)"
      - statement: "Зроблений із дерева стіл коштує дорого."
        answer: true
      - statement: "Книга прочитана влітку лежить на полиці."
        answer: false
        correction: "Книга, прочитана влітку, лежить на полиці."
      - statement: "Гості, запрошені на свято, вже зібралися."
        answer: true
      - statement: "Побудований у центрі міста, будинок привертає увагу."
        answer: false
        correction: "Побудований у центрі міста будинок привертає увагу. (перед іменником — без ком)"
      - statement: "Картина, намальована олією, висить у галереї."
        answer: true

  - type: pattern_drill
    title: "Перемісти зворот і розстав коми"
    prompt: "Перемісти дієприкметниковий зворот ПІСЛЯ іменника, додай коми"
    items:
      - given: "Написаний олівцем лист лежить на столі."
        answer: "Лист, написаний олівцем, лежить на столі."
      - given: "Зроблений із дерева стіл стоїть у кутку."
        answer: "Стіл, зроблений із дерева, стоїть у кутку."
      - given: "Посаджене навесні дерево вже зацвіло."
        answer: "Дерево, посаджене навесні, вже зацвіло."
      - given: "Перекладена з англійської книга стала популярною."
        answer: "Книга, перекладена з англійської, стала популярною."
      - given: "Знайдений під лавкою ключ був іржавий."
        answer: "Ключ, знайдений під лавкою, був іржавий."
      - given: "Побудований у минулому столітті міст ще служить."
        answer: "Міст, побудований у минулому столітті, ще служить."
      - given: "Пофарбований у жовтий колір будинок видно здалеку."
        answer: "Будинок, пофарбований у жовтий колір, видно здалеку."
      - given: "Запрошені на свято гості вже прийшли."
        answer: "Гості, запрошені на свято, вже прийшли."

  - type: build_sentence
    title: "З'єднай частини"
    instruction: "Склади речення з дієприкметниковим зворотом"
    sentences:
      - words: ["книга", "прочитана влітку", "лежить на полиці"]
        correct: "Книга, прочитана влітку, лежить на полиці."
      - words: ["намальована олією картина", "висить у галереї"]
        correct: "Намальована олією картина висить у галереї."
      - words: ["дорога", "прокладена через ліс", "веде до села"]
        correct: "Дорога, прокладена через ліс, веде до села."
      - words: ["відреставрована нещодавно церква", "вражає красою"]
        correct: "Відреставрована нещодавно церква вражає красою."
      - words: ["пиріг", "спечений бабусею", "пахне чудово"]
        correct: "Пиріг, спечений бабусею, пахне чудово."
      - words: ["зварені з металу ворота", "дуже важкі"]
        correct: "Зварені з металу ворота дуже важкі."

  - type: classify
    title: "Потрібні коми чи ні?"
    instruction: "Визнач: зворот перед іменником (без ком) чи після (з комами)?"
    categories:
      - label: "Без ком (зворот перед іменником)"
        items:
          - "Написаний олівцем лист лежить на столі."
          - "Зроблений із дерева стіл стоїть у кутку."
          - "Посаджене навесні дерево вже зацвіло."
          - "Перекладена з англійської книга популярна."
          - "Пофарбований білою фарбою паркан блищить."
          - "Знайдений на горищі скарб здивував усіх."
      - label: "З комами (зворот після іменника)"
        items:
          - "Лист, написаний олівцем, лежить на столі."
          - "Стіл, зроблений із дерева, стоїть у кутку."
          - "Дерево, посаджене навесні, вже зацвіло."
          - "Книга, перекладена з англійської, популярна."
          - "Паркан, пофарбований білою фарбою, блищить."
          - "Скарб, знайдений на горищі, здивував усіх."

  - type: build_sentence
    title: "Перефразуй через «який»"
    instruction: "Заміни дієприкметниковий зворот підрядним реченням"
    sentences:
      - words: ["Лист,", "написаний олівцем,", "лежить на столі."]
        correct: "Лист, який написаний олівцем, лежить на столі."
      - words: ["Стіл,", "зроблений із дерева,", "стоїть у кутку."]
        correct: "Стіл, який зроблений із дерева, стоїть у кутку."
      - words: ["Книга,", "прочитана влітку,", "лежить на полиці."]
        correct: "Книга, яка прочитана влітку, лежить на полиці."
      - words: ["Вікно,", "відкрите зранку,", "впускає повітря."]
        correct: "Вікно, яке відкрите зранку, впускає повітря."

  - type: reading
    title: "Читання: Екскурсія містом"
    text: |
      Ми йшли вулицею старого міста. Будинок, побудований у XVIII столітті, привертав увагу фасадом. Відреставрована нещодавно церква сяяла золотими куполами. Міст, прокладений через річку, з'єднував два береги. Посаджені сто років тому каштани створювали тінь. Фонтан, встановлений на площі, був окрасою міста.
    questions:
      - question: "Знайди всі дієприкметникові звороти."
        answer: "Побудований у XVIII столітті; відреставрована нещодавно; прокладений через річку; посаджені сто років тому; встановлений на площі."
      - question: "Які звороти стоять перед іменником, а які — після?"
        answer: "Перед: відреставрована нещодавно (церква), посаджені сто років тому (каштани). Після: побудований у XVIII столітті (будинок), прокладений через річку (міст), встановлений на площі (фонтан)."

  - type: riddle
    title: "Загадка"
    clues:
      - "Без рук, без олівця,"
      - "а малює без кінця."
    answer: "мороз"
