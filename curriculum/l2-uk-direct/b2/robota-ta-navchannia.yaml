module: robota-ta-navchannia
track: l2-uk-direct
level: b2
type: vocabulary
title: "Робота та навчання"
subtitle: "Кар'єра, університет, професійна комунікація"
standard_ref: "§4.4.4 (робота і навчання)"
textbook_ref: "Grade 8 — тематичні вправи: робота, навчання, професії"
teaching_notes: |
  Університетська система: вступ, факультет, спеціальність, диплом, стипендія.
  Кар'єра: професія, кваліфікація, досвід, зарплата, співбесіда.
  Професійна комунікація: етикет електронного листа, участь у нараді.
  Умовний спосіб для мрій: «Якби я міг вибирати...»
  Формальна vs неформальна лексика про роботу.

key_pattern:
  text: "Я [вивчаю/працюю] в [місці]. Моя спеціальність — [що]. Якби я міг вибирати, я б [мрія]."
  examples:
    - "Я навчаюся в університеті. Моя спеціальність — інформатика. Якби я міг вибирати, я б працював у Google."
    - "Я працюю програмістом. Моя кваліфікація дозволяє працювати дистанційно."

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Університет"
    items:
      - word: "вступ"
        emoji: "\U0001F393"
        sentence: "Вступ до університету — важливий крок."
      - word: "факультет"
        emoji: "\U0001F3DB"
        sentence: "Вона навчається на юридичному факультеті."
      - word: "спеціальність"
        emoji: "\U0001F4CB"
        sentence: "Його спеціальність — медицина."
      - word: "диплом"
        emoji: "\U0001F4DC"
        sentence: "Диплом підтверджує кваліфікацію."
      - word: "стипендія"
        emoji: "\U0001F4B0"
        sentence: "Вона отримує стипендію за відмінне навчання."

  - category: "Кар'єра"
    items:
      - word: "професія"
        emoji: "\U0001F4BC"
        sentence: "Лікар — відповідальна професія."
      - word: "кваліфікація"
        emoji: "\U0001F4CB"
        sentence: "Кваліфікація визначає рівень фахівця."
      - word: "досвід"
        emoji: "\U0001F4C8"
        sentence: "Роботодавці цінують досвід роботи."
      - word: "зарплата"
        emoji: "\U0001F4B5"
        sentence: "Зарплата залежить від кваліфікації."
      - word: "співбесіда"
        emoji: "\U0001F91D"
        sentence: "На співбесіді задають багато запитань."

  - category: "Професійна комунікація"
    items:
      - word: "нарада"
        emoji: "\U0001F4CB"
        sentence: "Нарада відбудеться о десятій."
      - word: "звіт"
        emoji: "\U0001F4CA"
        sentence: "Підготуйте звіт до п'ятниці."
      - word: "проєкт"
        emoji: "\U0001F4C1"
        sentence: "Ми працюємо над новим проєктом."
      - word: "дедлайн"
        emoji: "\U000023F0"
        sentence: "Дедлайн — кінець місяця."
      - word: "колега"
        emoji: "\U0001F465"
        sentence: "Мій колега допоміг із завданням."

  - category: "Пошук роботи"
    items:
      - word: "резюме"
        emoji: "\U0001F4DD"
        sentence: "Надішліть резюме на цю адресу."
      - word: "вакансія"
        emoji: "\U0001F4E2"
        sentence: "На сайті є нові вакансії."
      - word: "роботодавець"
        emoji: "\U0001F464"
        sentence: "Роботодавець шукає досвідченого фахівця."
      - word: "обов'язки"
        emoji: "\U0001F4CB"
        sentence: "Обов'язки включають роботу з клієнтами."
      - word: "умови"
        emoji: "\U0001F4DC"
        sentence: "Умови праці — гнучкий графік і соціальний пакет."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: reading
    title: "Університетська брошура"
    text: |
      Київський національний університет імені Тараса Шевченка запрошує абітурієнтів! Ми пропонуємо навчання на 13 факультетах: від юридичного до фізичного. Вступ за результатами НМТ. Кращі студенти отримують стипендію. Після закінчення — диплом міжнародного зразка. Університет має гуртожиток, спортивний комплекс, бібліотеку з мільйоном книг. Працевлаштування випускників — 85%.
    questions:
      - question: "Скільки факультетів в університеті?"
        answer: "13 факультетів."
      - question: "Як відбувається вступ?"
        answer: "За результатами НМТ."
      - question: "Який відсоток випускників працевлаштовується?"
        answer: "85%."

  - type: build_sentence
    title: "Професійний лист"
    instruction: "Склади речення для ділового листа"
    sentences:
      - words: ["Шановний", "Іване", "Петровичу", "!", "Прошу", "надати", "інформацію", "про", "вакансію", "."]
        correct: "Шановний Іване Петровичу! Прошу надати інформацію про вакансію."
      - words: ["Маю", "п'ять", "років", "досвіду", "в", "галузі", "маркетингу", "."]
        correct: "Маю п'ять років досвіду в галузі маркетингу."
      - words: ["З", "повагою", ",", "Коваленко", "Олена", "Миколаївна", "."]
        correct: "З повагою, Коваленко Олена Миколаївна."

  - type: pattern_drill
    title: "Професія → опис"
    prompt: "Добери опис до професії"
    items:
      - given: "програміст"
        answer: "розробляє комп'ютерні програми"
      - given: "лікар"
        answer: "лікує хворих та діагностує хвороби"
      - given: "учитель"
        answer: "навчає учнів у школі"
      - given: "журналіст"
        answer: "збирає й поширює новини"
      - given: "архітектор"
        answer: "проєктує будівлі та споруди"
      - given: "перекладач"
        answer: "перекладає тексти з однієї мови на іншу"

  - type: build_sentence
    title: "Ідеальна кар'єра"
    instruction: "Склади речення з умовним способом"
    sentences:
      - words: ["Якби", "я", "міг", "вибирати", ",", "я", "б", "став", "лікарем", "."]
        correct: "Якби я міг вибирати, я б став лікарем."
      - words: ["Якби", "я", "мала", "більше", "часу", ",", "я", "б", "вивчала", "програмування", "."]
        correct: "Якби я мала більше часу, я б вивчала програмування."
      - words: ["Якби", "я", "знав", "три", "мови", ",", "я", "б", "працював", "перекладачем", "."]
        correct: "Якби я знав три мови, я б працював перекладачем."

  - type: classify
    title: "Формальне чи неформальне?"
    instruction: "Визнач: це формальна (професійна) чи неформальна (між друзями) мова?"
    categories:
      - label: "Формальна"
        items:
          - "Шановний колего, прошу надати звіт."
          - "Повідомляю, що нарада перенесена."
          - "З повагою, Мельник О.С."
          - "Маю п'ять років досвіду."
      - label: "Неформальна"
        items:
          - "Привіт! Як справи на роботі?"
          - "Та ну, знову нарада!"
          - "Мій бос — нормальний чувак."
          - "Я тут шукаю роботу, може, підкажеш?"

  - type: reading
    title: "Опис вакансії"
    text: |
      Вакансія: маркетолог. Компанія «Промінь» шукає досвідченого маркетолога. Вимоги: вища освіта, досвід роботи від 3 років, знання української та англійської мов, навички роботи з соціальними мережами. Обов'язки: розробка маркетингової стратегії, аналіз ринку, ведення соціальних мереж. Умови: зарплата від 30 000 грн, гнучкий графік, можливість дистанційної роботи. Надсилайте резюме на пошту: hr@promin.ua
    questions:
      - question: "Які вимоги до кандидата?"
        answer: "Вища освіта, досвід від 3 років, знання двох мов, навички роботи з соцмережами."
      - question: "Які обов'язки маркетолога?"
        answer: "Розробка стратегії, аналіз ринку, ведення соціальних мереж."
      - question: "Які умови праці пропонують?"
        answer: "Зарплата від 30 000 грн, гнучкий графік, можливість дистанційної роботи."
