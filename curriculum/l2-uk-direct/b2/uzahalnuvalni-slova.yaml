module: uzahalnuvalni-slova
track: l2-uk-direct
level: b2
type: grammar
title: "Узагальнювальні слова при однорідних членах"
subtitle: "Двокрапка, тире — коли загальне слово об'єднує перелік"
standard_ref: "§4.2.3.4 — узагальнювальні слова"
textbook_ref: "Клас 8 §59–60 — узагальнювальні слова, пунктуація"
teaching_notes: |
  Узагальнювальне слово охоплює всі однорідні: усе, всі, скрізь, ніде, ніхто, кожний.
  Три схеми: 1) узагальнювальне ПЕРЕД переліком → двокрапка;
  2) узагальнювальне ПІСЛЯ переліку → тире;
  3) узагальнювальне і перед, і після → двокрапка + тире.
  Помилки: учні плутають двокрапку і тире, забувають тире після переліку.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Узагальнювальне ПЕРЕД переліком → двокрапка. ПІСЛЯ переліку → тире. Обрамлення → двокрапка + тире."
  examples:
    - "На столі лежало все: книги, зошити і ручки."
    - "Книги, зошити, ручки — все лежало на столі."
    - "Усе: книги, зошити, ручки — лежало на столі."

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Пунктуація з узагальнювальним словом"
    columns: ["Позиція", "Схема", "Приклад"]
    rows:
      - ["ПЕРЕД переліком", "Уз.сл.: о, о, о.", "Усе: книги, зошити, ручки."]
      - ["ПІСЛЯ переліку", "О, о, о — уз.сл.", "Книги, зошити, ручки — усе."]
      - ["Обрамлення", "Уз.сл.: о, о, о — ...", "Усе: книги, зошити — лежало тут."]

  - title: "Типові узагальнювальні слова"
    columns: ["Слово", "Значення", "Приклад"]
    rows:
      - ["усе / все", "усі речі", "Усе: книги, ручки — на столі."]
      - ["усі / всі", "усі люди", "Усі: батьки, діти — прийшли."]
      - ["скрізь", "у всіх місцях", "Скрізь: у парку, на вулиці — лежав сніг."]
      - ["ніде", "ні в одному місці", "Ніде: ні вдома, ні на роботі — його не було."]
      - ["ніхто", "жодна людина", "Ніхто: ні друзі, ні родичі — не зателефонував."]
      - ["кожний", "будь-хто", "Кожний: і хлопці, і дівчата — взяв участь."]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Узагальнювальні слова"
    items:
      - word: "усе"
        emoji: "\U0001F4E6"
        sentence: "Усе: книги, зошити, олівці — лежало в сумці."
      - word: "усі"
        emoji: "\U0001F46A"
        sentence: "Усі: і батьки, і діти — прийшли на свято."
      - word: "скрізь"
        emoji: "\U0001F30D"
        sentence: "Скрізь: у полі, в лісі, на горі — цвіли квіти."
      - word: "ніде"
        emoji: "\U0000274C"
        sentence: "Ніде: ні вдома, ні в школі — його не знайшли."
      - word: "ніхто"
        emoji: "\U0001F645"
        sentence: "Ніхто: ні друзі, ні сусіди — не бачив його."
      - word: "кожний"
        emoji: "\U0001F64B"
        sentence: "Кожний: і великий, і малий — допомагав."

  - category: "Пунктуаційні терміни"
    items:
      - word: "двокрапка"
        emoji: "\U00002755"
        sentence: "Після узагальнювального слова ставимо двокрапку."
      - word: "тире"
        emoji: "\U00002014"
        sentence: "Перед узагальнювальним словом ставимо тире."
      - word: "перелік"
        emoji: "\U0001F4CB"
        sentence: "Перелік однорідних членів іде після двокрапки."

  - category: "Іменники для переліків"
    items:
      - word: "зошит"
        emoji: "\U0001F4D3"
        sentence: "Книги, зошити, ручки — усе лежало на столі."
      - word: "олівець"
        emoji: "\U0000270F"
        sentence: "Ручки, олівці, фломастери — все для малювання."
      - word: "предмет"
        emoji: "\U0001F4DA"
        sentence: "Усі предмети: математика, мова, історія — важливі."
      - word: "інструмент"
        emoji: "\U0001F6E0"
        sentence: "Усі інструменти: молоток, пилка, викрутка — в коробці."
      - word: "сусід"
        emoji: "\U0001F3E0"
        sentence: "Усі сусіди: пан Іван, пані Оксана — привіталися."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Розстав двокрапку і тире"
    prompt: "Додай двокрапку та/або тире"
    items:
      - given: "На столі лежало все книги зошити ручки."
        answer: "На столі лежало все: книги, зошити, ручки."
      - given: "Книги зошити ручки все лежало на столі."
        answer: "Книги, зошити, ручки — все лежало на столі."
      - given: "Усе книги зошити ручки лежало на столі."
        answer: "Усе: книги, зошити, ручки — лежало на столі."
      - given: "Скрізь у парку на вулиці в садку лежав сніг."
        answer: "Скрізь: у парку, на вулиці, в садку — лежав сніг."
      - given: "Яблука груші сливи усі фрукти лежали в кошику."
        answer: "Яблука, груші, сливи — усі фрукти лежали в кошику."
      - given: "Ніхто ні друзі ні родичі не зателефонував."
        answer: "Ніхто: ні друзі, ні родичі — не зателефонував."
      - given: "Усі і батьки і діти прийшли на свято."
        answer: "Усі: і батьки, і діти — прийшли на свято."
      - given: "Він побував скрізь і в Києві і у Львові і в Одесі."
        answer: "Він побував скрізь: і в Києві, і у Львові, і в Одесі."
      - given: "Молоток пилка викрутка все інструменти були в коробці."
        answer: "Молоток, пилка, викрутка — все інструменти були в коробці."
      - given: "Ніде ні в бібліотеці ні в магазині не було цієї книги."
        answer: "Ніде: ні в бібліотеці, ні в магазині — не було цієї книги."

  - type: classify
    title: "Де стоїть узагальнювальне слово?"
    instruction: "Визнач позицію: перед переліком, після переліку чи обрамлення"
    categories:
      - label: "Перед переліком (двокрапка)"
        items:
          - "Усе: книги, зошити і ручки — зібрав у сумку."
          - "Він любить фрукти: яблука, груші, сливи."
          - "Скрізь: у полі, в лісі — цвіли квіти."
          - "Усі: і хлопці, і дівчата — взяли участь."
      - label: "Після переліку (тире)"
        items:
          - "Книги, зошити, ручки — усе лежало на столі."
          - "Яблука, груші, вишні — ці фрукти він любив."
          - "У парку, на вулиці, в садку — скрізь було красиво."
          - "Ні друзі, ні родичі — ніхто не прийшов."

  - type: build_sentence
    title: "Додай узагальнювальне слово"
    instruction: "Додай узагальнювальне слово до переліку"
    sentences:
      - words: ["Яблука", ",", "груші", ",", "сливи", "лежали", "на", "столі", "."]
        correct: "Фрукти: яблука, груші, сливи — лежали на столі."
      - words: ["Математика", ",", "мова", ",", "історія", "—", "важливі", "."]
        correct: "Усі предмети: математика, мова, історія — важливі."
      - words: ["У", "парку", ",", "на", "вулиці", ",", "в", "садку", "було", "красиво", "."]
        correct: "Скрізь: у парку, на вулиці, в садку — було красиво."

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "«Усе: книги, зошити — лежало на столі» — пунктуація правильна."
        answer: true
      - statement: "«Книги, зошити, ручки: усе лежало на столі» — потрібна двокрапка після переліку."
        answer: false
        correction: "Після переліку — тире: «Книги, зошити, ручки — усе лежало на столі»."
      - statement: "«Ніхто ні друзі ні родичі не прийшов» — пунктуація правильна."
        answer: false
        correction: "Потрібно: «Ніхто: ні друзі, ні родичі — не прийшов»."
      - statement: "Узагальнювальне слово стоїть тільки перед переліком."
        answer: false
        correction: "Може стояти перед, після або обрамляти перелік."
      - statement: "«Скрізь» — це узагальнювальне слово."
        answer: true
      - statement: "«Усе: книги, зошити, ручки.» — двокрапка правильна."
        answer: true
      - statement: "«Книги зошити ручки все лежало» — коми не потрібні."
        answer: false
        correction: "Потрібні коми між однорідними і тире перед узагальнювальним."
      - statement: "«Кожний» може бути узагальнювальним словом."
        answer: true

  - type: reading
    title: "Читання: Виправ пунктуацію"
    text: |
      У кімнаті було все книги журнали газети. На полицях стояли різні речі чашки тарілки вази усе було чисте і охайне. Скрізь у вітальні на кухні в спальні панував порядок. Ніхто ні діти ні дорослі не порушував цього порядку.
    questions:
      - question: "Виправте перше речення."
        answer: "У кімнаті було все: книги, журнали, газети."
      - question: "Виправте друге речення."
        answer: "На полицях стояли різні речі: чашки, тарілки, вази — усе було чисте і охайне."
      - question: "Виправте третє речення."
        answer: "Скрізь: у вітальні, на кухні, в спальні — панував порядок."

  - type: pattern_drill
    title: "Додай узагальнювальне слово до переліку"
    prompt: "Перепиши речення, додавши узагальнювальне слово"
    items:
      - given: "Яблука, груші, сливи лежали на столі."
        answer: "Фрукти: яблука, груші, сливи — лежали на столі."
      - given: "Іван, Марія, Петро прийшли на урок."
        answer: "Усі: Іван, Марія, Петро — прийшли на урок."
      - given: "У парку, на вулиці, в садку було красиво."
        answer: "Скрізь: у парку, на вулиці, в садку — було красиво."
      - given: "Ні в бібліотеці, ні в магазині не було цієї книги."
        answer: "Ніде: ні в бібліотеці, ні в магазині — не було цієї книги."
      - given: "Молоток, пилка, викрутка лежали в коробці."
        answer: "Усі інструменти: молоток, пилка, викрутка — лежали в коробці."
      - given: "Він любить яблука, банани, апельсини."
        answer: "Він любить усі фрукти: яблука, банани, апельсини."
