module: pryimennyky-pohlybleno
track: l2-uk-direct
level: b2
type: grammar
title: "Прийменники: поглиблення"
subtitle: "Складені прийменники, синонімія, анти-суржик"
standard_ref: "§4.2.1.7 — прийменник"
textbook_ref: "7 клас §74–75 — прийменники"
teaching_notes: |
  На рівнях A1–B1 учень засвоїв прості прийменники (в, на, з, до, від, за, під, над, між).
  Тепер — складені прийменники: завдяки (+ Д.в.), незважаючи на (+ Зн.в.), відповідно до (+ Р.в.),
  щодо (+ Р.в.), у зв'язку з (+ О.в.).
  Синонімія причинних прийменників: через + Зн.в. = з причини + Р.в. = у зв'язку з + О.в.
  Анти-суржик: «по вулиці» (М.в.) — правильно; «по вулицю» (Зн.в.) — суржик.
  Формальні/складені прийменники — ознака офіційного стилю.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Складені прийменники керують конкретним відмінком. Причинні синоніми: через = з причини = у зв'язку з."
  examples:
    - "завдяки допомозі (Д.в.) — причина (позитивна)"
    - "незважаючи на дощ (Зн.в.) — допустовість"
    - "через хворобу = з причини хвороби = у зв'язку з хворобою"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Складені прийменники та відмінки"
    columns: ["Прийменник", "Відмінок", "Приклад"]
    rows:
      - ["завдяки", "Давальний", "завдяки допомозі друзів"]
      - ["незважаючи на", "Знахідний", "незважаючи на дощ"]
      - ["відповідно до", "Родовий", "відповідно до правил"]
      - ["щодо", "Родовий", "щодо цього питання"]
      - ["у зв'язку з", "Орудний", "у зв'язку з ремонтом"]
      - ["з причини", "Родовий", "з причини хвороби"]
      - ["на відміну від", "Родовий", "на відміну від інших"]

  - title: "Синоніми причинних прийменників"
    columns: ["Прийменник", "Відмінок", "Приклад"]
    rows:
      - ["через", "Знахідний", "через хворобу"]
      - ["з причини", "Родовий", "з причини хвороби"]
      - ["у зв'язку з", "Орудний", "у зв'язку з хворобою"]

  - title: "Анти-суржик: «по» + правильний відмінок"
    columns: ["Неправильно (суржик)", "Правильно", "Відмінок"]
    rows:
      - ["іти по вулицю", "іти по вулиці", "Місцевий"]
      - ["по магазинам", "по магазинах", "Місцевий"]
      - ["по правилам", "за правилами", "Орудний"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Складені прийменники"
    items:
      - word: "завдяки"
        emoji: "\U0001F64F"
        sentence: "Завдяки наполегливій праці він досяг успіху."
      - word: "незважаючи на"
        emoji: "\U0001F4AA"
        sentence: "Незважаючи на дощ, ми пішли на прогулянку."
      - word: "відповідно до"
        emoji: "\U0001F4DC"
        sentence: "Відповідно до закону, це заборонено."
      - word: "щодо"
        emoji: "\U0001F4AC"
        sentence: "Щодо вашого запитання — відповімо завтра."
      - word: "у зв'язку з"
        emoji: "\U0001F517"
        sentence: "У зв'язку з ремонтом магазин зачинений."

  - category: "Причинні прийменники"
    items:
      - word: "через"
        emoji: "\U000027A1"
        sentence: "Він запізнився через затори."
      - word: "з причини"
        emoji: "\U0001F4CB"
        sentence: "Заняття скасовано з причини хвороби викладача."
      - word: "внаслідок"
        emoji: "\U0001F4CA"
        sentence: "Внаслідок негоди дороги заблоковані."

  - category: "Офіційна лексика"
    items:
      - word: "наполегливий"
        emoji: "\U0001F4AA"
        sentence: "Наполеглива праця приносить результати."
      - word: "затори"
        emoji: "\U0001F697"
        sentence: "На дорогах великі затори."
      - word: "ремонт"
        emoji: "\U0001F6E0"
        sentence: "Ремонт будинку триватиме місяць."
      - word: "скасувати"
        emoji: "\U0000274C"
        sentence: "Рейс скасовано через негоду."
      - word: "заборонити"
        emoji: "\U0001F6AB"
        sentence: "Паління заборонено в громадських місцях."

  - category: "Анти-суржик"
    items:
      - word: "вулиця"
        emoji: "\U0001F6E3"
        sentence: "Діти бігали по вулиці (не «по вулицю»)."
      - word: "правило"
        emoji: "\U0001F4D6"
        sentence: "Діяти за правилами (не «по правилам»)."
      - word: "магазин"
        emoji: "\U0001F6D2"
        sentence: "Ходити по магазинах (не «по магазинам»)."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Який відмінок вимагає прийменник?"
    instruction: "Визнач відмінок після прийменника"
    categories:
      - label: "Давальний"
        items:
          - "завдяки допомозі"
          - "завдяки друзям"
          - "завдяки праці"
      - label: "Знахідний"
        items:
          - "незважаючи на дощ"
          - "незважаючи на труднощі"
          - "через хворобу"
      - label: "Родовий"
        items:
          - "відповідно до правил"
          - "щодо питання"
          - "з причини хвороби"
      - label: "Орудний"
        items:
          - "у зв'язку з ремонтом"
          - "у зв'язку з подією"
          - "у зв'язку з роботою"

  - type: pattern_drill
    title: "Вжий складений прийменник"
    prompt: "Доповни речення складеним прийменником і правильною формою"
    items:
      - given: "завдяки + допомога → ?"
        answer: "завдяки допомозі"
      - given: "незважаючи на + дощ → ?"
        answer: "незважаючи на дощ"
      - given: "відповідно до + правила → ?"
        answer: "відповідно до правил"
      - given: "щодо + це питання → ?"
        answer: "щодо цього питання"
      - given: "у зв'язку з + ремонт → ?"
        answer: "у зв'язку з ремонтом"
      - given: "з причини + хвороба → ?"
        answer: "з причини хвороби"
      - given: "на відміну від + інші → ?"
        answer: "на відміну від інших"
      - given: "завдяки + ваша підтримка → ?"
        answer: "завдяки вашій підтримці"

  - type: build_sentence
    title: "Вирази причини трьома способами"
    instruction: "Перефразуй речення з іншим причинним прийменником"
    sentences:
      - words: ["Він не прийшов через хворобу."]
        correct: "Він не прийшов з причини хвороби. / Він не прийшов у зв'язку з хворобою."
      - words: ["Заняття скасовано через негоду."]
        correct: "Заняття скасовано з причини негоди. / Заняття скасовано у зв'язку з негодою."
      - words: ["Магазин зачинено через ремонт."]
        correct: "Магазин зачинено з причини ремонту. / Магазин зачинено у зв'язку з ремонтом."

  - type: true_false
    title: "Правильно чи суржик?"
    items:
      - statement: "«Я іду по вулицю» — правильне речення."
        answer: false
        correction: "«Я іду по вулиці» — місцевий відмінок."
      - statement: "«Завдяки друзям ми впоралися» — правильно."
        answer: true
      - statement: "«По правилам» — правильна форма."
        answer: false
        correction: "«За правилами» — орудний відмінок."
      - statement: "«Незважаючи на дощ, ми пішли» — правильно."
        answer: true
      - statement: "«Щодо цього питання» — правильна конструкція."
        answer: true
      - statement: "«По магазинам» — правильна форма."
        answer: false
        correction: "«По магазинах» — місцевий відмінок."
      - statement: "«У зв'язку з ремонтом» — офіційний стиль."
        answer: true
      - statement: "«Завдяки хвороби» — правильний відмінок."
        answer: false
        correction: "«Завдяки хворобі» — давальний відмінок."

  - type: classify
    title: "Офіційний чи розмовний?"
    instruction: "Визнач стиль: офіційний (складений прийменник) чи розмовний (простий)"
    categories:
      - label: "Офіційний"
        items:
          - "у зв'язку з ремонтом"
          - "відповідно до правил"
          - "з причини хвороби"
          - "на відміну від інших"
          - "щодо цього питання"
      - label: "Розмовний"
        items:
          - "через ремонт"
          - "за правилами"
          - "через хворобу"
          - "не як інші"
          - "про це питання"

  - type: reading
    title: "Читання: Оголошення"
    text: |
      Шановні мешканці! У зв'язку з плановим ремонтом водопроводу подача води буде припинена 15 березня з 8:00 до 18:00. Відповідно до рішення міської ради, роботи проводяться щодо покращення якості водопостачання. Незважаючи на тимчасові незручності, просимо поставитися з розумінням. Завдяки цьому ремонту якість води значно покращиться. Щодо додаткових запитань звертайтеся за телефоном: 044-123-45-67.
    questions:
      - question: "Знайди всі складені прийменники."
        answer: "У зв'язку з, відповідно до, незважаючи на, завдяки, щодо."
      - question: "Перефразуй «у зв'язку з ремонтом» простішим прийменником."
        answer: "Через ремонт."
      - question: "Який стиль цього тексту?"
        answer: "Офіційний / офіційно-діловий."

  - type: proverb_drill
    title: "Фразеологізми з прийменниками"
    items:
      - proverb: "Між молотом і ___."
        answer: "ковадлом"
      - proverb: "Як дві краплі ___."
        answer: "води"
