module: mystetstvo-ta-kultura
track: l2-uk-direct
level: b2
type: vocabulary
title: "Мистецтво та культура"
subtitle: "Кіно, музика, театр, живопис, літературна критика"
standard_ref: "§4.4.3 (мистецтво і культура)"
textbook_ref: "Grade 8 — тематичні вправи: мистецтво, культура"
teaching_notes: |
  Описування та оцінювання мистецьких творів: книга, фільм, вистава, картина.
  Формули оцінки: «Мені сподобалося, бо...», «Вражає те, що...».
  Сучасна українська культура: кіно (Сенцов, «Атлантида»), музика (Go_A, Kalush Orchestra),
  театр (Франко, Заньковецька), образотворче мистецтво.
  Учні мають вміти написати міні-рецензію на 60 слів.

key_pattern:
  text: "[Твір] — це [жанр]. Мені [сподобалося/не сподобалося], бо [причина]. Вражає [що саме]."
  examples:
    - "«Атлантида» — це драма. Мені сподобалося, бо фільм змушує думати. Вражає візуальний стиль."
    - "Концерт Go_A — це енергія. Мені сподобалося, бо музика поєднує традиції й сучасність."

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Мистецькі терміни"
    items:
      - word: "жанр"
        emoji: "\U0001F3AD"
        sentence: "Це фільм у жанрі драми."
      - word: "режисер"
        emoji: "\U0001F3AC"
        sentence: "Режисер фільму — Олег Сенцов."
      - word: "сценарій"
        emoji: "\U0001F4DD"
        sentence: "Сценарій написав молодий автор."
      - word: "виконавець"
        emoji: "\U0001F3A4"
        sentence: "Виконавець головної ролі — відомий актор."
      - word: "твір"
        emoji: "\U0001F4D6"
        sentence: "Цей літературний твір став класикою."

  - category: "Мистецькі форми"
    items:
      - word: "вистава"
        emoji: "\U0001F3AD"
        sentence: "Вистава у театрі тривала дві години."
      - word: "прем'єра"
        emoji: "\U00002B50"
        sentence: "Прем'єра фільму відбулася вчора."
      - word: "рецензія"
        emoji: "\U0001F4F0"
        sentence: "Рецензія на фільм була позитивною."
      - word: "критика"
        emoji: "\U0001F4AC"
        sentence: "Критика оцінює якість мистецтва."
      - word: "шедевр"
        emoji: "\U0001F3C6"
        sentence: "Цю картину вважають шедевром."

  - category: "Оцінна лексика"
    items:
      - word: "вражаючий"
        emoji: "\U00002728"
        sentence: "Вражаючий фільм, який не забудеш."
      - word: "зворушливий"
        emoji: "\U0001F622"
        sentence: "Зворушлива історія про кохання."
      - word: "натхненний"
        emoji: "\U0001F4A1"
        sentence: "Натхненний виступ музикантів."
      - word: "монументальний"
        emoji: "\U0001F3DB"
        sentence: "Монументальна скульптура вражає розмірами."
      - word: "банальний"
        emoji: "\U0001F44E"
        sentence: "Сюжет виявився банальним."

  - category: "Стилі та напрямки"
    items:
      - word: "напрямок"
        emoji: "\U000027A1"
        sentence: "Імпресіонізм — напрямок у живописі."
      - word: "стиль"
        emoji: "\U0001F3A8"
        sentence: "Кожен митець має свій стиль."
      - word: "авангард"
        emoji: "\U0001F680"
        sentence: "Авангард руйнує традиційні форми."
      - word: "класичний"
        emoji: "\U0001F3BB"
        sentence: "Класична музика не втрачає актуальності."
      - word: "сучасний"
        emoji: "\U0001F4F1"
        sentence: "Сучасне мистецтво провокує дискусії."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: reading
    title: "Рецензія на фільм"
    text: |
      «Атлантида» (2019) — фільм режисера Валентина Васяновича. Дія відбувається в 2025 році, після закінчення війни на Донбасі. Головний герой — ветеран, який не може повернутися до мирного життя. Фільм вражає мінімалізмом діалогів і потужною візуальною мовою. Кожен кадр — як картина. Критики назвали стрічку «поезією без слів». «Атлантида» отримала нагороду Венеційського кінофестивалю.
    questions:
      - question: "Хто режисер фільму?"
        answer: "Валентин Васянович."
      - question: "Які художні засоби відзначають критики?"
        answer: "Мінімалізм діалогів, потужна візуальна мова, кожен кадр — як картина."
      - question: "Яку нагороду отримав фільм?"
        answer: "Нагороду Венеційського кінофестивалю."

  - type: build_sentence
    title: "Напиши міні-рецензію"
    instruction: "Склади речення для рецензії"
    sentences:
      - words: ["Мені", "сподобався", "фільм", ",", "бо", "він", "змушує", "думати", "."]
        correct: "Мені сподобався фільм, бо він змушує думати."
      - words: ["Вражає", "те", ",", "що", "режисер", "обходиться", "без", "зайвих", "слів", "."]
        correct: "Вражає те, що режисер обходиться без зайвих слів."
      - words: ["Рекомендую", "цю", "стрічку", "всім", ",", "хто", "цінує", "мистецтво", "."]
        correct: "Рекомендую цю стрічку всім, хто цінує мистецтво."

  - type: pattern_drill
    title: "Позитивне чи негативне?"
    prompt: "Визнач: це позитивна (+) чи негативна (−) оцінка?"
    items:
      - given: "вражаючий"
        answer: "+"
      - given: "банальний"
        answer: "−"
      - given: "зворушливий"
        answer: "+"
      - given: "нудний"
        answer: "−"
      - given: "натхненний"
        answer: "+"
      - given: "поверхневий"
        answer: "−"
      - given: "монументальний"
        answer: "+"
      - given: "передбачуваний"
        answer: "−"

  - type: build_sentence
    title: "Опис картини"
    instruction: "Склади речення для опису картини"
    sentences:
      - words: ["На", "картині", "зображено", "осінній", "пейзаж", "з", "річкою", "."]
        correct: "На картині зображено осінній пейзаж з річкою."
      - words: ["Художник", "використав", "теплі", "кольори", ":", "жовтий", ",", "оранжевий", ",", "золотий", "."]
        correct: "Художник використав теплі кольори: жовтий, оранжевий, золотий."
      - words: ["Картина", "створює", "настрій", "спокою", "та", "гармонії", "."]
        correct: "Картина створює настрій спокою та гармонії."

  - type: classify
    title: "Вид мистецтва"
    instruction: "До якого виду мистецтва це належить?"
    categories:
      - label: "Музика"
        items:
          - "концерт"
          - "виконавець"
          - "мелодія"
      - label: "Кіно"
        items:
          - "режисер"
          - "сценарій"
          - "кадр"
      - label: "Театр"
        items:
          - "вистава"
          - "прем'єра"
          - "акторська гра"
      - label: "Живопис"
        items:
          - "полотно"
          - "пейзаж"
          - "палітра"
      - label: "Література"
        items:
          - "роман"
          - "поезія"
          - "критика"

  - type: reading
    title: "Українська культура"
    text: |
      Українське мистецтво переживає ренесанс. У кіно — режисери Олег Сенцов і Мирослав Слабошпицький здобувають міжнародне визнання. У музиці — гурти Go_A та Kalush Orchestra представляють Україну на Євробаченні, поєднуючи фольклор із електронікою. У театрі продовжують традиції Івана Франка й Марії Заньковецької. В образотворчому мистецтві — від класичних полотен Марії Примаченко до сучасного стріт-арту в Києві. Українська культура — жива, різноманітна й відкрита світу.
    questions:
      - question: "Яких українських режисерів згадано?"
        answer: "Олега Сенцова і Мирослава Слабошпицького."
      - question: "Як Go_A та Kalush Orchestra поєднують традиції?"
        answer: "Поєднують фольклор із електронікою."
      - question: "Який висновок робить автор?"
        answer: "Українська культура — жива, різноманітна й відкрита світу."

  - type: tongue_twister
    title: "Скоромовка"
    text: "Галасливі ґави й галки в гусенят взяли скакалки."
