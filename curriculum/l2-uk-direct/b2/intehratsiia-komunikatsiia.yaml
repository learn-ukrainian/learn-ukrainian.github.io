module: intehratsiia-komunikatsiia
track: l2-uk-direct
level: b2
type: practice
title: "Інтеграція: комунікація"
subtitle: "Усі комунікативні навички: есе, лист, опис, медіааналіз"
standard_ref: "Повна комунікативна компетентність"
textbook_ref: "Grade 7–8 — комплексна інтеграція: текстові навички"
teaching_notes: |
  Комплексна інтеграція всіх комунікативних навичок B2.
  Есе з аргументацією та різними типами речень.
  Офіційний лист із правильним регістром.
  Опис із художніми засобами.
  Медіааналіз із критичною оцінкою.
  Переключення регістрів: формальний ↔ неформальний.
  Фінальна практика перед контрольною B2.

key_pattern:
  text: "[Завдання вимагає поєднання кількох навичок]: стиль + аргументація + граматика."
  examples:
    - "Напишіть офіційний лист із використанням складних речень і вставних слів."
    - "Проаналізуйте медіатекст: визначте стиль, знайдіть маніпуляції, оцініть аргументацію."

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Комунікативні навички"
    items:
      - word: "есе"
        emoji: "\U0001F4DD"
        sentence: "Есе — це короткий твір із власною думкою."
      - word: "діловий лист"
        emoji: "\U00002709"
        sentence: "Діловий лист має офіційний регістр."
      - word: "опис місцевості"
        emoji: "\U0001F5BC"
        sentence: "Опис місцевості потребує просторової лексики."
      - word: "медіааналіз"
        emoji: "\U0001F4F0"
        sentence: "Медіааналіз виявляє упередженість."
      - word: "регістр"
        emoji: "\U0001F4CB"
        sentence: "Регістр — це рівень формальності мовлення."

  - category: "Текстотворення"
    items:
      - word: "зв'язність"
        emoji: "\U0001F517"
        sentence: "Зв'язність — логічна послідовність думок."
      - word: "послідовність"
        emoji: "\U000027A1"
        sentence: "Дотримуйтеся послідовності викладу."
      - word: "абзац"
        emoji: "\U00002702"
        sentence: "Кожна думка — окремий абзац."
      - word: "перехід"
        emoji: "\U0001F500"
        sentence: "Перехідні слова з'єднують абзаци."
      - word: "редагування"
        emoji: "\U0000270D"
        sentence: "Редагування покращує якість тексту."

  - category: "Стилістика"
    items:
      - word: "формальний"
        emoji: "\U0001F4C4"
        sentence: "Формальний стиль — для документів і листів."
      - word: "неформальний"
        emoji: "\U0001F5E3"
        sentence: "Неформальний стиль — для друзів."
      - word: "нейтральний"
        emoji: "\U00002696"
        sentence: "Нейтральний тон — для новин."
      - word: "емоційний"
        emoji: "\U00002764"
        sentence: "Емоційний тон — для художнього тексту."
      - word: "переконливий"
        emoji: "\U0001F4AA"
        sentence: "Переконливий стиль — для аргументації."

  - category: "Мовна якість"
    items:
      - word: "точність"
        emoji: "\U0001F3AF"
        sentence: "Точність — вибір найкращого слова."
      - word: "виразність"
        emoji: "\U00002728"
        sentence: "Виразність робить текст цікавим."
      - word: "лаконічність"
        emoji: "\U00002702"
        sentence: "Лаконічність — уміння сказати стисло."
      - word: "різноманітність"
        emoji: "\U0001F308"
        sentence: "Різноманітність конструкцій збагачує текст."
      - word: "грамотність"
        emoji: "\U00002705"
        sentence: "Грамотність — основа культури мовлення."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: build_sentence
    title: "Офіційний лист"
    instruction: "Склади речення для ділового листа"
    sentences:
      - words: ["Шановна", "Оксано", "Іванівно", "!"]
        correct: "Шановна Оксано Іванівно!"
      - words: ["Звертаюся", "до", "Вас", "із", "проханням", "надати", "інформацію", "про", "стипендію", "."]
        correct: "Звертаюся до Вас із проханням надати інформацію про стипендію."
      - words: ["Буду", "вдячна", "за", "відповідь", "найближчим", "часом", "."]
        correct: "Буду вдячна за відповідь найближчим часом."
      - words: ["З", "повагою", ",", "Коваленко", "Марія", "Олексіївна", "."]
        correct: "З повагою, Коваленко Марія Олексіївна."

  - type: build_sentence
    title: "Есе-роздум"
    instruction: "Склади елементи есе на тему «Чи потрібна мовна стійкість?»"
    sentences:
      - words: ["Вважаю", ",", "що", "мовна", "стійкість", "—", "ознака", "поваги", "до", "себе", "."]
        correct: "Вважаю, що мовна стійкість — ознака поваги до себе."
      - words: ["По-перше", ",", "мова", "формує", "ідентичність", "народу", "."]
        correct: "По-перше, мова формує ідентичність народу."
      - words: ["Отже", ",", "мовна", "стійкість", "—", "це", "відповідальність", "кожного", "."]
        correct: "Отже, мовна стійкість — це відповідальність кожного."

  - type: reading
    title: "Медіатекст: повний аналіз"
    text: |
      ЗАГОЛОВОК: «Нова школа: революція чи катастрофа?»

      Реформа освіти розділила суспільство. Прихильники стверджують, що нова програма розвиває критичне мислення. «Діти вчаться думати, а не зубрити», — каже міністр. Проте батьки скаржаться: діти не знають таблицю множення. Експерти закликають до компромісу. Однак журналісти часто загострюють конфлікт заради рейтингів. Хто правий? Відповідь, мабуть, десь посередині.
    questions:
      - question: "Який стиль тексту?"
        answer: "Публіцистичний — заголовок-запитання, цитати, протиставлення думок."
      - question: "Яку упередженість можна помітити?"
        answer: "Автор натякає, що журналісти загострюють конфлікт заради рейтингів — це оцінка, не факт."
      - question: "Визнач: «діти не знають таблицю множення» — факт чи оцінка?"
        answer: "Оцінка (узагальнення). Для факту потрібні дані: яке дослідження, скільки дітей."

  - type: build_sentence
    title: "Зміни регістр"
    instruction: "Перепиши неформальне повідомлення у формальному стилі"
    sentences:
      - words: ["Повідомляю", ",", "що", "збори", "перенесено", "на", "вівторок", "."]
        correct: "Повідомляю, що збори перенесено на вівторок."
      - words: ["Прошу", "розглянути", "моє", "звернення", "якнайшвидше", "."]
        correct: "Прошу розглянути моє звернення якнайшвидше."
      - words: ["Відповідно", "до", "плану", ",", "роботу", "завершено", "вчасно", "."]
        correct: "Відповідно до плану, роботу завершено вчасно."

  - type: pattern_drill
    title: "Змішана граматика та пунктуація"
    prompt: "Виправ помилку"
    items:
      - given: "Він являється студентом → ___"
        answer: "Він є студентом"
      - given: "Дерева вкриті снігом виглядали казково. (пунктуація) → ___"
        answer: "Дерева, вкриті снігом, виглядали казково."
      - given: "приймати участь → ___"
        answer: "брати участь"
      - given: "Посміхаючись вона відповіла. (пунктуація) → ___"
        answer: "Посміхаючись, вона відповіла."
      - given: "задавати питання → ___"
        answer: "ставити запитання"
      - given: "Київ столиця України. (пунктуація) → ___"
        answer: "Київ — столиця України."

  - type: build_sentence
    title: "Опис українського міста"
    instruction: "Склади речення для опису з відокремленими означеннями та порівняннями"
    sentences:
      - words: ["Львів", ",", "оточений", "зеленими", "пагорбами", ",", "вражає", "архітектурою", "."]
        correct: "Львів, оточений зеленими пагорбами, вражає архітектурою."
      - words: ["Вуличка", ",", "мов", "сторінка", "старої", "книги", ",", "вела", "до", "площі", "."]
        correct: "Вуличка, мов сторінка старої книги, вела до площі."
      - words: ["Місто", ",", "просякнуте", "ароматом", "кави", ",", "зачаровувало", "мандрівників", "."]
        correct: "Місто, просякнуте ароматом кави, зачаровувало мандрівників."
