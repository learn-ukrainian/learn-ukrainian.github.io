        emoji: "\U0001F30D"
        sentence: "Він живе далеко від центру."
      - word: "близько"
        emoji: "\U0001F4CD"
        sentence: "Школа знаходиться близько."
      - word: "додому"
        emoji: "\U0001F3E0"
