module: pryslivnyky-typy
track: l2-uk-direct
level: b2
type: grammar
title: "Прислівник: типи й ступені порівняння"
subtitle: "Означальні, обставинні, утворення від прикметників"
standard_ref: "§4.2.1.5 — прислівник: класифікація і порівняння"
textbook_ref: "7 клас §59–63 — прислівники"
teaching_notes: |
  Прислівники: означальні (ЯК? — швидко, добре) й обставинні (ДЕ? КОЛИ? ЧОМУ? НАВІЩО?).
  Обставинні поділяються на підтипи: місця, часу, причини, мети.
  Утворення від прикметників: гарний → гарно, тихий → тихо (-о/-е).
  Ступені порівняння: вищий (швидше, краще) і найвищий (найшвидше, найкраще).
  Зверніть увагу на неправильні форми: гарно → краще (не «гарніше»), далеко → далі (не «далекше»).

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Означальний прислівник — ЯК? Обставинний — ДЕ? КОЛИ? ЧОМУ? НАВІЩО? Порівняння: -іше/-ше, най- + вищий ступінь."
  examples:
    - "гарний → гарно (означальний)"
    - "тут, далеко, додому (обставинний місця — ДЕ? КУДИ?)"
    - "швидко → швидше → найшвидше (ступені порівняння)"
    - "гарно → краще → найкраще (неправильна форма)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Типи прислівників"
    columns: ["Тип", "Питання", "Приклади"]
    rows:
      - ["Означальні", "ЯК?", "швидко, добре, гарно, тихо, голосно"]
      - ["Обставинні місця", "ДЕ? КУДИ? ЗВІДКИ?", "тут, там, далеко, додому, звідти"]
      - ["Обставинні часу", "КОЛИ?", "сьогодні, вчора, завтра, тепер, потім"]
      - ["Обставинні причини", "ЧОМУ?", "ненароком, згарячу, зопалу"]
      - ["Обставинні мети", "НАВІЩО? ДЛЯ ЧОГО?", "навмисне, знарошки"]

  - title: "Утворення від прикметників"
    columns: ["Прикметник", "Прислівник", "Зміна"]
    rows:
      - ["гарний", "гарно", "-ий → -о"]
      - ["тихий", "тихо", "-ий → -о"]
      - ["щирий", "щиро", "-ий → -о"]
      - ["швидкий", "швидко", "-ий → -о"]
      - ["повільний", "повільно", "-ий → -о"]

  - title: "Ступені порівняння"
    columns: ["Звичайний", "Вищий", "Найвищий"]
    rows:
      - ["швидко", "швидше", "найшвидше"]
      - ["тихо", "тихіше", "найтихіше"]
      - ["високо", "вище", "найвище"]
      - ["гарно", "краще", "найкраще"]
      - ["погано", "гірше", "найгірше"]
      - ["далеко", "далі", "найдалі"]
      - ["близько", "ближче", "найближче"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
