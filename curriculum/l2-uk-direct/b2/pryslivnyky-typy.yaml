        sentence: "Ти знарошки мене розсмішив!"

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Означальний чи обставинний?"
    instruction: "Визнач тип прислівника"
    categories:
      - label: "Означальний (ЯК?)"
        items:
          - "швидко"
          - "тихо"
          - "гарно"
          - "голосно"
          - "повільно"
          - "щиро"
          - "ввічливо"
          - "уважно"
      - label: "Обставинний (ДЕ? КОЛИ? ЧОМУ? НАВІЩО?)"
        items:
          - "тут"
          - "далеко"
          - "сьогодні"
          - "завтра"
          - "ненароком"
          - "навмисне"
          - "додому"
          - "потім"

  - type: pattern_drill
    title: "Утвори прислівник від прикметника"
    prompt: "Прикметник → прислівник"
    items:
      - given: "тихий → ?"
        answer: "тихо"
      - given: "швидкий → ?"
        answer: "швидко"
      - given: "гарний → ?"
        answer: "гарно"
      - given: "повільний → ?"
        answer: "повільно"
      - given: "щирий → ?"
        answer: "щиро"
      - given: "ввічливий → ?"
        answer: "ввічливо"
      - given: "уважний → ?"
        answer: "уважно"
      - given: "голосний → ?"
        answer: "голосно"
      - given: "сумний → ?"
        answer: "сумно"
      - given: "радісний → ?"
        answer: "радісно"
      - given: "спокійний → ?"
        answer: "спокійно"
      - given: "веселий → ?"
        answer: "весело"

  - type: pattern_drill
    title: "Ступені порівняння"
    prompt: "Утвори вищий ступінь прислівника"
    items:
      - given: "швидко → ?"
        answer: "швидше"
      - given: "тихо → ?"
        answer: "тихіше"
      - given: "високо → ?"
        answer: "вище"
      - given: "гарно → ?"
        answer: "краще"
      - given: "погано → ?"
        answer: "гірше"
      - given: "далеко → ?"
        answer: "далі"
      - given: "близько → ?"
        answer: "ближче"
      - given: "довго → ?"
        answer: "довше"
      - given: "часто → ?"
        answer: "частіше"
      - given: "рано → ?"
        answer: "раніше"

  - type: classify
    title: "Підтипи обставинних"
    instruction: "Визнач: місця / часу / причини / мети"
    categories:
      - label: "Місця (ДЕ? КУДИ? ЗВІДКИ?)"
        items:
          - "тут"
          - "далеко"
          - "додому"
          - "повсюди"
      - label: "Часу (КОЛИ?)"
        items:
          - "сьогодні"
          - "завтра"
          - "потім"
          - "щодня"
      - label: "Причини (ЧОМУ?)"
        items:
          - "ненароком"
          - "згарячу"
      - label: "Мети (НАВІЩО?)"
        items:
          - "навмисне"
          - "знарошки"

  - type: true_false
    title: "Правда чи ні?"
    items:
      - statement: "«Краще» — це вищий ступінь від «гарно»."
        answer: true
      - statement: "«Далекше» — правильна форма вищого ступеня від «далеко»."
        answer: false
        correction: "Правильно: «далі»."
      - statement: "«Ненароком» — це обставинний прислівник причини."
        answer: true
      - statement: "«Сьогодні» — означальний прислівник."
        answer: false
        correction: "Обставинний прислівник часу (КОЛИ?)."
      - statement: "«Найшвидше» — найвищий ступінь."
        answer: true
      - statement: "Прислівник від «веселий» — «веселий-о»."
        answer: false
        correction: "Правильно: «весело» (без дефісу)."

  - type: reading
    title: "Читання: Спортивні змагання"
    text: |
      Сьогодні відбулися шкільні змагання з бігу. Петро біг швидко, але Марія бігла ще швидше. Вона прийшла першою. Андрій стартував повільно, але потім прискорився. Далеко позаду біг Сашко — він тренується рідко. Голосно вболівали вчителі. Тихо, але щиро вітали батьки. Завтра будуть змагання з плавання. Тренер сказав: «Тренуйтеся частіше, і результати будуть кращими!»
    questions:
      - question: "Знайди всі означальні прислівники."
        answer: "Швидко, швидше, повільно, голосно, тихо, щиро, частіше."
      - question: "Знайди обставинні прислівники часу."
        answer: "Сьогодні, потім, завтра, рідко."
      - question: "Які прислівники вжито у вищому ступені порівняння?"
        answer: "Швидше, частіше, кращими."
