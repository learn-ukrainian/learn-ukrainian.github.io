module: dyskusiia
track: l2-uk-direct
level: b2
type: practice
title: "Дискусія"
subtitle: "Теза, аргумент, приклад, висновок — мистецтво переконувати"
standard_ref: "§4.3.3 (дискусійне висловлення)"
textbook_ref: "Grade 8 §2 — аргументація, дискусія"
teaching_notes: |
  Структура аргументу: теза → аргумент → приклад → висновок.
  Ключові формули: «Вважаю, що...», «...тому, що...», «Яскравим прикладом є...», «Отже, ...».
  Контраргументація: «Хтось може заперечити, що... Проте...».
  Часткова згода: «Справді, ... Однак...».
  Ввічлива незгода: «Не зовсім погоджуюся, бо...».
  Учень має вміти побудувати повний аргумент та відповісти на контраргумент.

key_pattern:
  text: "Вважаю, що [теза], бо [аргумент]. Наприклад, [приклад]. Отже, [висновок]."
  examples:
    - "Вважаю, що читання важливе, бо розвиває мислення. Наприклад, учні, які багато читають, краще пишуть есе. Отже, варто читати щодня."
    - "На мою думку, спорт корисний, бо зміцнює здоров'я. Наприклад, регулярні вправи знижують ризик хвороб. Отже, фізична активність — необхідність."

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Структура аргументу"
    items:
      - word: "теза"
        emoji: "\U0001F4CC"
        sentence: "Теза — це основна думка, яку ви доводите."
      - word: "аргумент"
        emoji: "\U0001F4A1"
        sentence: "Аргумент підтверджує тезу."
      - word: "приклад"
        emoji: "\U0001F4CB"
        sentence: "Приклад ілюструє аргумент."
      - word: "висновок"
        emoji: "\U00002705"
        sentence: "Висновок підсумовує думку."
      - word: "доказ"
        emoji: "\U0001F50D"
        sentence: "Факти — найсильніший доказ."

  - category: "Дискурсивні маркери"
    items:
      - word: "вважаю"
        emoji: "\U0001F9D0"
        sentence: "Вважаю, що освіта — основа розвитку."
      - word: "безперечно"
        emoji: "\U00002757"
        sentence: "Безперечно, це важливе питання."
      - word: "проте"
        emoji: "\U0001F500"
        sentence: "Проте є й інша думка."
      - word: "однак"
        emoji: "\U0001F500"
        sentence: "Однак не всі з цим погоджуються."
      - word: "отже"
        emoji: "\U000027A1"
        sentence: "Отже, маємо підстави стверджувати..."

  - category: "Контраргументація"
    items:
      - word: "заперечити"
        emoji: "\U0000274C"
        sentence: "Хтось може заперечити цю думку."
      - word: "спростувати"
        emoji: "\U0001F4A5"
        sentence: "Ці факти спростовують гіпотезу."
      - word: "погоджуватися"
        emoji: "\U0001F91D"
        sentence: "Я погоджуюся лише частково."
      - word: "наполягати"
        emoji: "\U0001F4AA"
        sentence: "Наполягаю на своїй позиції."
      - word: "переконувати"
        emoji: "\U0001F5E3"
        sentence: "Він переконує нас фактами."

  - category: "Зв'язки та переходи"
    items:
      - word: "по-перше"
        emoji: "\U00000031\U0000FE0F\U000020E3"
        sentence: "По-перше, освіта дає знання."
      - word: "по-друге"
        emoji: "\U00000032\U0000FE0F\U000020E3"
        sentence: "По-друге, освіта розвиває критичне мислення."
      - word: "до того ж"
        emoji: "\U00002795"
        sentence: "До того ж, є й практичні переваги."
      - word: "зокрема"
        emoji: "\U0001F4CD"
        sentence: "Зокрема, це стосується молоді."
      - word: "на завершення"
        emoji: "\U0001F3C1"
        sentence: "На завершення хочу підсумувати."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Знайди частини аргументу"
    instruction: "Визнач, що це: теза, аргумент, приклад чи висновок"
    categories:
      - label: "Теза"
        items:
          - "Вважаю, що вивчення мов розширює світогляд."
          - "На мою думку, спорт необхідний кожній людині."
      - label: "Аргумент"
        items:
          - "...тому що мова — це ключ до іншої культури."
          - "...бо фізична активність зміцнює здоров'я."
      - label: "Приклад"
        items:
          - "Наприклад, знання української допомагає зрозуміти українську літературу."
          - "Яскравим прикладом є олімпійські чемпіони, які тренуються щодня."
      - label: "Висновок"
        items:
          - "Отже, вивчення мов — це інвестиція в майбутнє."
          - "Таким чином, спорт має бути частиною щоденного життя."

  - type: build_sentence
    title: "Побудуй аргумент"
    instruction: "Склади речення у правильному порядку"
    sentences:
      - words: ["Вважаю", ",", "що", "читання", "важливе", ",", "бо", "розвиває", "уяву", "."]
        correct: "Вважаю, що читання важливе, бо розвиває уяву."
      - words: ["Наприклад", ",", "діти", ",", "які", "читають", ",", "мають", "кращу", "грамотність", "."]
        correct: "Наприклад, діти, які читають, мають кращу грамотність."
      - words: ["Отже", ",", "варто", "заохочувати", "дітей", "до", "читання", "."]
        correct: "Отже, варто заохочувати дітей до читання."
      - words: ["Хтось", "може", "заперечити", ",", "що", "це", "нудно", ".", "Проте", "є", "книги", "на", "будь-який", "смак", "."]
        correct: "Хтось може заперечити, що це нудно. Проте є книги на будь-який смак."

  - type: pattern_drill
    title: "Дискурсивні маркери"
    prompt: "Добери правильний маркер"
    items:
      - given: "___, українська мова є важливою для кожного громадянина."
        answer: "Безперечно"
      - given: "___, що технології змінюють освіту."
        answer: "Вважаю"
      - given: "___, не всі мають доступ до інтернету."
        answer: "Однак"
      - given: "___, це стосується сільських районів."
        answer: "Зокрема"
      - given: "___, рівний доступ до освіти — пріоритет."
        answer: "Отже"
      - given: "___, є й практичний аспект."
        answer: "До того ж"

  - type: build_sentence
    title: "Відповідь на контраргумент"
    instruction: "Склади відповідь на заперечення"
    sentences:
      - words: ["Справді", ",", "це", "дорого", ".", "Однак", "інвестиція", "окупиться", "."]
        correct: "Справді, це дорого. Однак інвестиція окупиться."
      - words: ["Не", "зовсім", "погоджуюся", ",", "бо", "є", "інші", "дані", "."]
        correct: "Не зовсім погоджуюся, бо є інші дані."
      - words: ["Ви", "маєте", "рацію", "частково", ",", "проте", "загальна", "тенденція", "інша", "."]
        correct: "Ви маєте рацію частково, проте загальна тенденція інша."

  - type: reading
    title: "Аналіз аргументації"
    text: |
      Сучасна молодь має вивчати щонайменше дві іноземні мови. По-перше, знання мов відкриває доступ до міжнародного ринку праці. Наприклад, компанії віддають перевагу кандидатам, які володіють кількома мовами. По-друге, вивчення мов розвиває когнітивні здібності. Дослідження показують, що білінгви краще вирішують складні завдання. Хтось може заперечити, що це забирає час від інших предметів. Проте мовні навички підсилюють навчання загалом. Отже, вивчення мов — це інвестиція, яка завжди окупається.
    questions:
      - question: "Яка теза цього тексту?"
        answer: "Сучасна молодь має вивчати щонайменше дві іноземні мови."
      - question: "Назви два аргументи."
        answer: "1) Знання мов відкриває доступ до ринку праці. 2) Вивчення мов розвиває когнітивні здібності."
      - question: "Як автор відповідає на контраргумент?"
        answer: "Автор визнає, що це забирає час, але заперечує: мовні навички підсилюють навчання загалом."

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "Теза — це висновок дискусії."
        answer: false
        correction: "Теза — це основна думка, яку доводять. Висновок підсумовує дискусію."
      - statement: "Контраргумент — це відповідь на чуже заперечення."
        answer: false
        correction: "Контраргумент — це заперечення проти чужої тези. Відповідь на контраргумент — це спростування."
      - statement: "«Отже» — маркер висновку."
        answer: true
      - statement: "В аргументації приклад іде перед аргументом."
        answer: false
        correction: "Спочатку аргумент (причина), потім приклад (ілюстрація)."
      - statement: "Ввічлива незгода починається з часткового визнання."
        answer: true
