module: diiepryslivnyky
track: l2-uk-direct
level: b2
type: grammar
title: "Дієприслівники"
subtitle: "Утворення, вживання, коми, дієприслівниковий зворот"
standard_ref: "§4.2.1.2 — дієприслівник"
textbook_ref: "7 клас §53–55 — дієприслівники"
teaching_notes: |
  Дієприслівник поєднує ознаки дієслова й прислівника: відповідає на ЯК? ЩО РОБЛЯЧИ? ЗРОБИВШИ ЩО?
  Описує спосіб виконання головної дії: «Читаючи книгу, він пив чай.»
  НЕ змінюється за родом, числом, відмінком (на відміну від дієприкметника).
  Недоконаний: -учи/-ючи (І) або -ачи/-ячи (ІІ). Доконаний: -вши/-ши.
  ЗАВЖДИ відокремлюється комами — на відміну від дієприкметникового звороту.
  Підмет дієприслівника МУСИТЬ збігатися з підметом головного речення.
  Помилка: «Прочитавши книгу, настав вечір.» (вечір не читав книгу!)

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Дієприслівник — ЯК? ЩО РОБЛЯЧИ? ЗРОБИВШИ ЩО? Завжди з комами. Підмет — спільний з головним реченням."
  examples:
    - "Читаючи книгу, він пив чай. (недоконаний — одночасна дія)"
    - "Прочитавши книгу, він пішов гуляти. (доконаний — послідовна дія)"
    - "Він, усміхаючись, привітав нас. (дієприслівник у середині речення)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Утворення дієприслівників"
    columns: ["Вид", "Суфікс", "Приклад"]
    rows:
      - ["Недоконаний (І дієвідміна)", "-учи / -ючи", "читати → читаючи, нести → несучи"]
      - ["Недоконаний (ІІ дієвідміна)", "-ачи / -ячи", "лежати → лежачи, бачити → бачачи"]
      - ["Доконаний", "-вши / -ши", "прочитати → прочитавши, прийти → прийшовши"]

  - title: "Дієприслівник vs дієприкметник"
    columns: ["Дієприслівник", "Дієприкметник"]
    rows:
      - ["Не змінюється", "Змінюється за родом, числом, відмінком"]
      - ["Відповідає на ЯК?", "Відповідає на ЯКИЙ?"]
      - ["Читаючи книгу, він...", "Читаючий студент..."]
      - ["Завжди з комами", "Коми залежать від позиції"]

  - title: "Помилки з підметом"
    columns: ["Неправильно", "Правильно"]
    rows:
      - ["Прочитавши книгу, настав вечір.", "Прочитавши книгу, він пішов гуляти."]
      - ["Йдучи вулицею, пішов дощ.", "Йдучи вулицею, я потрапив під дощ."]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Недоконані дієприслівники"
    items:
      - word: "читаючи"
        emoji: "\U0001F4D6"
        sentence: "Читаючи книгу, вона не помічала часу."
      - word: "слухаючи"
        emoji: "\U0001F3B5"
        sentence: "Слухаючи музику, він розслаблявся."
      - word: "усміхаючись"
        emoji: "\U0001F60A"
        sentence: "Усміхаючись, вона привітала гостей."
      - word: "працюючи"
        emoji: "\U0001F4BB"
        sentence: "Працюючи вдома, він економить час."
      - word: "гуляючи"
        emoji: "\U0001F6B6"
        sentence: "Гуляючи парком, ми милувалися природою."

  - category: "Доконані дієприслівники"
    items:
      - word: "прочитавши"
        emoji: "\U0001F4DA"
        sentence: "Прочитавши лист, вона заплакала."
      - word: "зробивши"
        emoji: "\U00002705"
        sentence: "Зробивши домашнє завдання, діти пішли гуляти."
      - word: "прийшовши"
        emoji: "\U0001F3E0"
        sentence: "Прийшовши додому, він одразу ліг спати."
      - word: "пообідавши"
        emoji: "\U0001F37D"
        sentence: "Пообідавши, ми продовжили роботу."
      - word: "дізнавшись"
        emoji: "\U0001F4E2"
        sentence: "Дізнавшись новину, він зателефонував другу."

  - category: "Дієслова для утворення"
    items:
      - word: "малювати"
        emoji: "\U0001F3A8"
        sentence: "Малюючи, вона забуває про все."
      - word: "думати"
        emoji: "\U0001F4AD"
        sentence: "Думаючи про майбутнє, він планував."
      - word: "повернутися"
        emoji: "\U0001F503"
        sentence: "Повернувшись із подорожі, ми відпочивали."
      - word: "закінчити"
        emoji: "\U0001F3C1"
        sentence: "Закінчивши справу, він вийшов."
      - word: "побачити"
        emoji: "\U0001F440"
        sentence: "Побачивши друга, вона зраділа."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Утвори недоконаний дієприслівник"
    prompt: "Утвори дієприслівник від дієслова"
    items:
      - given: "читати → ?"
        answer: "читаючи"
      - given: "писати → ?"
        answer: "пишучи"
      - given: "слухати → ?"
        answer: "слухаючи"
      - given: "працювати → ?"
        answer: "працюючи"
      - given: "гуляти → ?"
        answer: "гуляючи"
      - given: "лежати → ?"
        answer: "лежачи"
      - given: "бачити → ?"
        answer: "бачачи"
      - given: "сидіти → ?"
        answer: "сидячи"
      - given: "малювати → ?"
        answer: "малюючи"
      - given: "думати → ?"
        answer: "думаючи"

  - type: pattern_drill
    title: "Утвори доконаний дієприслівник"
    prompt: "Утвори дієприслівник від дієслова"
    items:
      - given: "прочитати → ?"
        answer: "прочитавши"
      - given: "зробити → ?"
        answer: "зробивши"
      - given: "прийти → ?"
        answer: "прийшовши"
      - given: "написати → ?"
        answer: "написавши"
      - given: "пообідати → ?"
        answer: "пообідавши"
      - given: "дізнатися → ?"
        answer: "дізнавшись"
      - given: "повернутися → ?"
        answer: "повернувшись"
      - given: "закінчити → ?"
        answer: "закінчивши"
      - given: "побачити → ?"
        answer: "побачивши"
      - given: "сказати → ?"
        answer: "сказавши"

  - type: classify
    title: "Недоконаний чи доконаний?"
    instruction: "Визнач вид дієприслівника"
    categories:
      - label: "Недоконаний (одночасна дія)"
        items:
          - "читаючи"
          - "слухаючи"
          - "працюючи"
          - "лежачи"
          - "усміхаючись"
          - "думаючи"
      - label: "Доконаний (завершена дія)"
        items:
          - "прочитавши"
          - "зробивши"
          - "прийшовши"
          - "дізнавшись"
          - "повернувшись"
          - "закінчивши"

  - type: true_false
    title: "Правильно чи ні?"
    items:
      - statement: "«Прийшовши додому він ліг спати.» — коми розставлено правильно."
        answer: false
        correction: "Прийшовши додому, він ліг спати. (потрібна кома після «додому»)"
      - statement: "Дієприслівник завжди відокремлюється комами."
        answer: true
      - statement: "«Прочитавши книгу, настав вечір.» — речення побудовано правильно."
        answer: false
        correction: "Підмети не збігаються: книгу прочитав хтось, а настав — вечір."
      - statement: "«Читаючи» — це доконаний дієприслівник."
        answer: false
        correction: "Недоконаний — суфікс -ючи, одночасна дія."
      - statement: "Дієприслівник відповідає на питання ЯК? ЩО РОБЛЯЧИ?"
        answer: true
      - statement: "Дієприслівник змінюється за родом і числом."
        answer: false
        correction: "Дієприслівник — незмінне слово."
      - statement: "«Йдучи вулицею, пішов дощ.» — правильне речення."
        answer: false
        correction: "Дощ не йшов вулицею. Правильно: «Йдучи вулицею, я потрапив під дощ.»"

  - type: build_sentence
    title: "Поєднай дві дії"
    instruction: "Перетвори два речення на одне з дієприслівником"
    sentences:
      - words: ["Він читав книгу.", "Він пив чай."]
        correct: "Читаючи книгу, він пив чай."
      - words: ["Вона прочитала лист.", "Вона заплакала."]
        correct: "Прочитавши лист, вона заплакала."
      - words: ["Діти зробили уроки.", "Діти пішли гуляти."]
        correct: "Зробивши уроки, діти пішли гуляти."
      - words: ["Він повернувся додому.", "Він одразу ліг спати."]
        correct: "Повернувшись додому, він одразу ліг спати."
      - words: ["Вона слухала музику.", "Вона малювала."]
        correct: "Слухаючи музику, вона малювала."
      - words: ["Він дізнався про свято.", "Він купив подарунок."]
        correct: "Дізнавшись про свято, він купив подарунок."

  - type: reading
    title: "Читання: Ранок письменника"
    text: |
      Прокинувшись о шостій, Олесь одразу сів за стіл. Думаючи про новий роман, він пив каву. Записавши кілька ідей, він почав писати. Працюючи над текстом, він не помічав часу. Закінчивши перший розділ, Олесь вийшов на балкон. Стоячи на балконі, він дивився на місто й усміхався. Повернувшись до кімнати, він продовжив роботу.
    questions:
      - question: "Знайди всі дієприслівники."
        answer: "Прокинувшись, думаючи, записавши, працюючи, закінчивши, стоячи, повернувшись."
      - question: "Які з них доконані, а які — недоконані?"
        answer: "Доконані: прокинувшись, записавши, закінчивши, повернувшись. Недоконані: думаючи, працюючи, стоячи."
      - question: "Хто є підметом усіх дієприслівників?"
        answer: "Олесь — підмет збігається в усіх реченнях."

  - type: classify
    title: "Зворот чи одиничний дієприслівник?"
    instruction: "Визнач: це дієприслівниковий зворот (з залежними словами) чи одиничний дієприслівник?"
    categories:
      - label: "Дієприслівниковий зворот"
        items:
          - "читаючи книгу"
          - "прочитавши книгу до кінця"
          - "працюючи над проєктом"
          - "повернувшись із подорожі"
          - "стоячи на балконі"
      - label: "Одиничний дієприслівник"
        items:
          - "усміхаючись"
          - "стоячи"
          - "сидячи"
          - "лежачи"
          - "мовчачи"

  - type: proverb_drill
    title: "Прислів'я з дієприслівниками"
    items:
      - proverb: "Не ___ броду, не лізь у воду."
        answer: "знавши"
      - proverb: "Визначай смак не по шкаралупі, а по ___."
        answer: "ядру"
