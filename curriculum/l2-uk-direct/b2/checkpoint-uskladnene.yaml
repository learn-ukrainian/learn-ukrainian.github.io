module: checkpoint-uskladnene
track: l2-uk-direct
level: b2
type: checkpoint
title: "Контрольна робота: ускладнене речення"
subtitle: "Однорідні, вставні, звертання, відокремлені, пряма мова"
standard_ref: "§4.2.3.4–8 — ускладнене речення"
textbook_ref: "Клас 8 §52–76 — однорідні, звертання, вставні, відокремлені, пряма/непряма мова"
teaching_notes: |
  Контрольна перевіряє: однорідні члени + узагальнювальні слова;
  звертання (кличний + пунктуація); вставні слова (типи + коми);
  відокремлені означення/обставини; порівняльний зворот;
  пряма/непряма мова (пунктуація + перетворення). Поріг — 70%.
  Структура: pattern_drill × 10, true_false × 8, classify × 4, build_sentence × 4, reading × 2.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Перевірка: однорідні, узагальнювальні, звертання, вставні, відокремлені, пряма/непряма мова."
  examples:
    - "Однорідні: коми з і/та/але."
    - "Звертання: кличний відмінок + коми."
    - "Вставні: тип + коми."
    - "Відокремлені: дієприкметник, дієприслівник, порівняння."
    - "Пряма мова: лапки, двокрапка, тире."

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Однорідні і узагальнювальні"
    items:
      - word: "однорідні"
        emoji: "\U0001F4CB"
        sentence: "Однорідні члени відповідають на одне питання."
      - word: "узагальнювальне"
        emoji: "\U0001F4E6"
        sentence: "Узагальнювальне слово охоплює весь перелік."
      - word: "двокрапка"
        emoji: "\U00002755"
        sentence: "Після узагальнювального слова — двокрапка."

  - category: "Звертання і вставні"
    items:
      - word: "звертання"
        emoji: "\U0001F4AC"
        sentence: "Звертання виділяється комами."
      - word: "кличний"
        emoji: "\U0001F5E3"
        sentence: "Кличний відмінок: друг → друже."
      - word: "вставне"
        emoji: "\U0001F4AD"
        sentence: "Вставне слово виражає ставлення мовця."

  - category: "Відокремлення"
    items:
      - word: "дієприкметниковий"
        emoji: "\U0001F4CC"
        sentence: "Дієприкметниковий зворот після іменника — з комами."
      - word: "дієприслівниковий"
        emoji: "\U0001F4CC"
        sentence: "Дієприслівниковий зворот — завжди з комами."
      - word: "порівняльний"
        emoji: "\U00002728"
        sentence: "Порівняльний зворот: як, мов, наче."

  - category: "Пряма мова"
    items:
      - word: "пряма"
        emoji: "\U0001F4AC"
        sentence: "Пряма мова — точні слова мовця."
      - word: "непряма"
        emoji: "\U000027A1"
        sentence: "Непряма мова — переказ чужих слів."
      - word: "цитата"
        emoji: "\U0001F4DC"
        sentence: "Цитата — точне відтворення."
      - word: "лапки"
        emoji: "\U0000201C"
        sentence: "Пряму мову беруть у лапки."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Розстав коми (змішані правила)"
    prompt: "Додай усі потрібні розділові знаки"
    items:
      - given: "І діти і дорослі прийшли на свято."
        answer: "І діти, і дорослі прийшли на свято."
      - given: "Мамо я прийшов."
        answer: "Мамо, я прийшов."
      - given: "Мабуть завтра буде дощ."
        answer: "Мабуть, завтра буде дощ."
      - given: "Він утомлений ліг спати."
        answer: "Він, утомлений, ліг спати."
      - given: "Прочитавши книгу він заснув."
        answer: "Прочитавши книгу, він заснув."
      - given: "На столі лежало все книги зошити ручки."
        answer: "На столі лежало все: книги, зошити, ручки."
      - given: "Хмари пливли як кораблі."
        answer: "Хмари пливли, як кораблі."
      - given: "Він сказав Я прийду завтра."
        answer: "Він сказав: «Я прийду завтра»."
      - given: "Маленький але сильний хлопець переміг."
        answer: "Маленький, але сильний хлопець переміг."
      - given: "Усі крім Олега прийшли."
        answer: "Усі, крім Олега, прийшли."

  - type: true_false
    title: "Перевірка знань"
    items:
      - statement: "Однорідні члени відповідають на різні питання."
        answer: false
        correction: "На ОДНЕ питання."
      - statement: "Звертання є членом речення."
        answer: false
        correction: "НЕ є — можна прибрати."
      - statement: "Вставне слово «мабуть» виражає невпевненість."
        answer: true
      - statement: "Дієприслівниковий зворот іноді не відокремлюється."
        answer: false
        correction: "ЗАВЖДИ відокремлюється."
      - statement: "«Працювати як віл» — потрібна кома."
        answer: false
        correction: "Фразеологізм — без коми."
      - statement: "Крапка в прямій мові ставиться за лапками."
        answer: true
      - statement: "«На жаль» — це обставина."
        answer: false
        correction: "Вставне слово."
      - statement: "Після особового займенника означення відокремлюється."
        answer: true

  - type: classify
    title: "Тип конструкції"
    instruction: "Визнач, що ускладнює речення"
    categories:
      - label: "Однорідні члени"
        items:
          - "Він читає, пише і малює."
          - "І діти, і дорослі прийшли."
      - label: "Звертання"
        items:
          - "Друже, послухай!"
          - "Шановний пане директоре!"
      - label: "Вставне слово"
        items:
          - "Мабуть, буде дощ."
          - "На жаль, він не прийшов."
      - label: "Відокремлене означення"
        items:
          - "Він, утомлений, ліг спати."
          - "Книга, написана у 2020, стала популярною."
      - label: "Відокремлена обставина"
        items:
          - "Прочитавши книгу, він заснув."
          - "Хмари пливли, як кораблі."

  - type: classify
    title: "Пряма / непряма / цитата"
    instruction: "Визнач тип"
    categories:
      - label: "Пряма мова"
        items:
          - "Він сказав: «Я прийду»."
          - "«Допоможи!» — попросив він."
      - label: "Непряма мова"
        items:
          - "Він сказав, що прийде."
          - "Вона запитала, чи він піде."
      - label: "Цитата"
        items:
          - "Як казав Шевченко, «борітеся — поборете»."
          - "За словами Франка, «праця — це скарб»."

  - type: classify
    title: "Тип вставного слова"
    instruction: "Визнач тип за значенням"
    categories:
      - label: "Впевненість"
        items:
          - "Безумовно, він правий."
          - "Звичайно, я допоможу."
      - label: "Невпевненість"
        items:
          - "Мабуть, буде дощ."
          - "Можливо, він запізнюється."
      - label: "Порядок думок"
        items:
          - "По-перше, треба підготуватися."
          - "Отже, починаємо."
      - label: "Емоції"
        items:
          - "На жаль, не вдалося."
          - "На щастя, все добре."

  - type: classify
    title: "Визнач тип однорідних"
    instruction: "Визнач, які члени речення є однорідними"
    categories:
      - label: "Однорідні підмети"
        items:
          - "Іван, Марія і Петро прийшли."
          - "Кіт і пес грались надворі."
      - label: "Однорідні присудки"
        items:
          - "Він читає, пише і малює."
          - "Діти бігали, стрибали і сміялися."
      - label: "Однорідні додатки"
        items:
          - "Я купив хліб, масло і сир."
          - "Вона вивчає мову, історію і географію."
      - label: "Однорідні обставини"
        items:
          - "Він працює вранці, вдень і ввечері."
          - "Вона виступала спокійно, впевнено і чітко."

  - type: build_sentence
    title: "Перетвори на непряму мову"
    instruction: "Заміни пряму мову на непряму"
    sentences:
      - words: ["Він", "сказав", ":", "«Я", "прийду", "завтра»", "."]
        correct: "Він сказав, що він прийде завтра."
      - words: ["Вона", "запитала", ":", "«Ти", "підеш", "?»"]
        correct: "Вона запитала, чи він піде."
      - words: ["Мама", "попросила", ":", "«Допоможи", "мені»", "."]
        correct: "Мама попросила, щоб я допоміг їй."
      - words: ["Учитель", "сказав", ":", "«Ми", "напишемо", "диктант»", "."]
        correct: "Учитель сказав, що вони напишуть диктант."

  - type: reading
    title: "Читання: Комплексний аналіз"
    text: |
      Друзі, послухайте! Мабуть, ви вже чули новину. Учора в нашому місті, на центральній площі, відкрили новий фонтан. Мер міста заявив: «Це подарунок мешканцям». І дорослі, і діти — усі прийшли на відкриття. Фонтан, побудований за сучасним проєктом, сяяв, як діамант. На жаль, вечір зіпсував дощ. Прочитавши новину, я одразу пішов туди.
    questions:
      - question: "Знайдіть звертання."
        answer: "«Друзі»."
      - question: "Знайдіть вставні слова."
        answer: "«Мабуть», «На жаль»."
      - question: "Знайдіть однорідні члени з узагальнювальним словом."
        answer: "«І дорослі, і діти — усі» (узагальнювальне «усі» після переліку)."
      - question: "Знайдіть відокремлене означення."
        answer: "«Побудований за сучасним проєктом»."
      - question: "Знайдіть порівняння."
        answer: "«Як діамант»."
      - question: "Знайдіть пряму мову і перетворіть на непряму."
        answer: "Пряма: «Це подарунок мешканцям». Непряма: Мер заявив, що це подарунок мешканцям."

  - type: reading
    title: "Читання: Диктант із помилками"
    text: |
      Вчора ввечері о сьомій годині ми зустрілися з друзями. Маріє ходи сюди! — гукнув Олег. На щастя всі прийшли вчасно. Він втомлений і голодний замовив піцу. По-перше треба було вибрати столик. Усе: напої закуски десерти було смачним. Хмари пливли як кораблі а ми сиділи і сміялися.
    questions:
      - question: "Знайдіть і виправте помилки в пунктуації."
        answer: "1) «Маріє, ходи сюди!» — кома після звертання. 2) «На щастя, всі прийшли» — кома після вставного. 3) «Він, втомлений і голодний, замовив» — коми при відокремленому означенні. 4) «По-перше, треба було» — кома після вставного. 5) «Усе: напої, закуски, десерти — було смачним» — коми + тире. 6) «Хмари пливли, як кораблі, а ми сиділи і сміялися» — кома перед порівнянням і перед «а»."
