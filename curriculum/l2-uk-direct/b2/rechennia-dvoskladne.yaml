module: rechennia-dvoskladne
track: l2-uk-direct
level: b2
type: grammar
title: "Двоскладне речення"
subtitle: "Підмет, типи присудків, тире"
standard_ref: "§4.2.3.2 — двоскладне речення"
textbook_ref: "8 клас §18–23 — підмет і присудок"
teaching_notes: |
  Двоскладне речення має обидва головні члени: підмет і присудок.
  Підмет може виражатися іменником, займенником, числівником, інфінітивом, словосполученням.
  Три типи присудків: простий дієслівний (читає), складений дієслівний (почав читати),
  складений іменний (є студент, був хворий).
  Тире між підметом і присудком: обидва — іменники в Н.в. (Київ — столиця України);
  підмет — інфінітив (Жити — Вітчизну любити). Тире НЕ ставиться з «не» (Серце не камінь).

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Підмет — ХТО? ЩО? Присудок — ЩО РОБИТЬ? ЩО ТАКЕ? Тире: іменник — іменник або інфінітив — іменник."
  examples:
    - "Хлопець читає. (простий дієслівний присудок)"
    - "Хлопець почав читати. (складений дієслівний)"
    - "Київ — столиця України. (тире між підметом і присудком)"
    - "Читати — це корисно. (підмет-інфінітив)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Способи вираження підмета"
    columns: ["Частина мови", "Приклад"]
    rows:
      - ["Іменник", "Хлопець читає."]
      - ["Займенник", "Він читає."]
      - ["Числівник", "Двоє прийшли."]
      - ["Інфінітив", "Читати — це корисно."]
      - ["Словосполучення", "Ми з братом прийшли."]

  - title: "Типи присудків"
    columns: ["Тип", "Структура", "Приклад"]
    rows:
      - ["Простий дієслівний", "одне дієслово", "Хлопець читає."]
      - ["Складений дієслівний", "модальне/фазове + інфінітив", "Хлопець почав читати. Хлопець хоче читати."]
      - ["Складений іменний", "бути + іменник/прикметник", "Він є студент. Погода була гарна."]

  - title: "Тире між підметом і присудком"
    columns: ["Правило", "Приклад"]
    rows:
      - ["Обидва — іменники в Н.в.", "Київ — столиця України."]
      - ["Підмет — інфінітив", "Жити — Вітчизну любити."]
      - ["НЕ ставиться з «не»", "Серце не камінь. (без тире)"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Фазові дієслова (для складеного присудка)"
    items:
      - word: "почати"
        emoji: "\U000025B6"
        sentence: "Він почав вивчати українську."
      - word: "продовжити"
        emoji: "\U000023E9"
        sentence: "Вона продовжила працювати."
      - word: "закінчити"
        emoji: "\U0001F3C1"
        sentence: "Ми закінчили їсти."
      - word: "припинити"
        emoji: "\U0001F6D1"
        sentence: "Дощ припинив іти."

  - category: "Модальні дієслова (для складеного присудка)"
    items:
      - word: "хотіти"
        emoji: "\U0001F4AD"
        sentence: "Він хоче подорожувати."
      - word: "могти"
        emoji: "\U0001F4AA"
        sentence: "Вона може допомогти."
      - word: "мусити"
        emoji: "\U0000203C"
        sentence: "Ми мусимо встигнути."
      - word: "намагатися"
        emoji: "\U0001F3CB"
        sentence: "Він намагається зрозуміти."

  - category: "Іменники для тире-конструкцій"
    items:
      - word: "столиця"
        emoji: "\U0001F3D9"
        sentence: "Київ — столиця України."
      - word: "студент"
        emoji: "\U0001F393"
        sentence: "Брат — студент університету."
      - word: "лікар"
        emoji: "\U0001F469"
        sentence: "Мати — лікар за фахом."
      - word: "герой"
        emoji: "\U0001F9B8"
        sentence: "Сашко — справжній герой."
      - word: "основа"
        emoji: "\U0001F3E0"
        sentence: "Мова — основа культури."

  - category: "Граматичні терміни"
    items:
      - word: "підмет"
        emoji: "\U0001F464"
        sentence: "Підмет відповідає на питання ХТО? ЩО?"
      - word: "присудок"
        emoji: "\U0001F3AC"
        sentence: "Присудок — головний член речення."
      - word: "граматична основа"
        emoji: "\U0001F3E0"
        sentence: "Підмет і присудок разом — граматична основа."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Знайди підмет"
    prompt: "Визнач підмет у реченні"
    items:
      - given: "Хлопець читає книгу."
        answer: "Хлопець"
      - given: "Вона працює в лікарні."
        answer: "Вона"
      - given: "Двоє прийшли на зустріч."
        answer: "Двоє"
      - given: "Читати — це корисно."
        answer: "Читати"
      - given: "Ми з братом поїхали на море."
        answer: "Ми з братом"
      - given: "Сонце зайшло за хмари."
        answer: "Сонце"
      - given: "Старий дуб ріс біля школи."
        answer: "Дуб"
      - given: "Жити — Вітчизну любити."
        answer: "Жити"
      - given: "Троє дітей грали у дворі."
        answer: "Троє дітей"
      - given: "Україна — незалежна держава."
        answer: "Україна"
      - given: "Мати й дочка готували вечерю."
        answer: "Мати й дочка"
      - given: "Вчитися — це важлива справа."
        answer: "Вчитися"

  - type: classify
    title: "Визнач тип присудка"
    instruction: "Простий дієслівний / складений дієслівний / складений іменний"
    categories:
      - label: "Простий дієслівний"
        items:
          - "Хлопець читає."
          - "Дощ іде."
          - "Вона працює."
          - "Діти грають."
          - "Птахи летять."
      - label: "Складений дієслівний"
        items:
          - "Він почав читати."
          - "Вона хоче вчитися."
          - "Ми продовжили працювати."
          - "Він намагається зрозуміти."
          - "Дощ припинив іти."
      - label: "Складений іменний"
        items:
          - "Він є студент."
          - "Погода була гарна."
          - "Київ — столиця."
          - "Брат — лікар."
          - "День був сонячний."

  - type: true_false
    title: "Правда чи ні?"
    items:
      - statement: "У реченні «Читати — це корисно» підмет — «це»."
        answer: false
        correction: "Підмет — «читати» (інфінітив)."
      - statement: "«Київ — столиця України» — тут потрібне тире."
        answer: true
      - statement: "«Серце не камінь» — тут потрібне тире."
        answer: false
        correction: "Тире не ставиться, коли присудок має «не»."
      - statement: "«Він хоче читати» — простий дієслівний присудок."
        answer: false
        correction: "Складений дієслівний (модальне + інфінітив)."
      - statement: "«Брат — студент» — двоскладне речення."
        answer: true
      - statement: "«Погода була гарна» — складений іменний присудок."
        answer: true

  - type: build_sentence
    title: "Побудуй речення з тире"
    instruction: "Склади речення, де потрібне тире між підметом і присудком"
    sentences:
      - words: ["Київ", "столиця", "Україна"]
        correct: "Київ — столиця України."
      - words: ["мова", "основа", "культура"]
        correct: "Мова — основа культури."
      - words: ["брат", "студент"]
        correct: "Брат — студент."
      - words: ["праця", "джерело", "добробут"]
        correct: "Праця — джерело добробуту."

  - type: pattern_drill
    title: "Визнач граматичну основу"
    prompt: "Знайди підмет + присудок"
    items:
      - given: "Високий хлопець швидко читав цікаву книгу."
        answer: "Хлопець читав"
      - given: "Маленька дівчинка почала вчити вірш."
        answer: "Дівчинка почала вчити"
      - given: "Цей будинок — пам'ятка архітектури."
        answer: "Будинок — пам'ятка"
      - given: "Ми з братом хочемо поїхати на море."
        answer: "Ми з братом хочемо поїхати"
      - given: "Погода вчора була чудова."
        answer: "Погода була чудова"
      - given: "Вчитися — наш обов'язок."
        answer: "Вчитися — обов'язок"
      - given: "Старий годинник пробив дванадцяту."
        answer: "Годинник пробив"
      - given: "Діти продовжили гратися."
        answer: "Діти продовжили гратися"
      - given: "Літо було спекотне."
        answer: "Літо було спекотне"
      - given: "Двоє друзів зустрілися в парку."
        answer: "Двоє друзів зустрілися"

  - type: reading
    title: "Читання: Різні присудки"
    text: |
      Київ — одне з найстаріших міст Європи. Місто розташоване на берегах Дніпра. Учені почали досліджувати його історію ще в XIX столітті. Дніпро — головна річка України. Він тече на південь. Жителі міста пишаються його красою. Відвідати Київ — справжнє задоволення. Місто було й залишається серцем країни.
    questions:
      - question: "Знайди речення з тире між підметом і присудком."
        answer: "«Київ — одне з найстаріших міст Європи.» «Дніпро — головна річка України.» «Відвідати Київ — справжнє задоволення.»"
      - question: "Знайди складений дієслівний присудок."
        answer: "«Почали досліджувати» (фазове + інфінітив)."
      - question: "Знайди складений іменний присудок."
        answer: "«Було й залишається серцем» (бути + іменник в О.в.)."

  - type: proverb_drill
    title: "Прислів'я: знайди підмет і присудок"
    items:
      - proverb: "Краще голий та правдивий, ніж багатий та ___."
        answer: "беззаконний"
      - proverb: "Одне говорити — зовсім інше ___."
        answer: "робити"
