module: chastky
track: l2-uk-direct
level: b2
type: grammar
title: "Частки"
subtitle: "Типи, функції, правопис"
standard_ref: "§4.2.1.9 — частка"
textbook_ref: "7 клас §82–84 — частки"
teaching_notes: |
  Частки не називають предметів чи дій — вони додають відтінки значення: заперечення, підсилення,
  обмеження, питання, наказ, умовність.
  Три групи: формотворчі (хай/нехай, б/би), заперечні (не, ні, ані),
  модальні (питальні: хіба, невже, чи; підсилювальні: навіть, аж, же, таки;
  обмежувальні: лише, тільки; вказівні: ось, от, це).
  Правопис: не + дієслово = окремо (не можу); не + прикметник/прислівник = разом (нецікавий, неможливо).
  Частки-афікси через дефіс: -бо (скажи-бо), -но (ходи-но), -то (якось-то), -таки (все-таки).

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Частки додають відтінки значення: заперечення (не), підсилення (навіть), питання (хіба), наказ (хай)."
  examples:
    - "Хай живе Україна! (формотворча — наказовий спосіб)"
    - "Він не знає. (заперечна)"
    - "Невже він прийшов? (модальна — питальна)"
    - "Він навіть не подзвонив. (модальна — підсилювальна)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Типи часток"
    columns: ["Тип", "Частки", "Функція"]
    rows:
      - ["Формотворчі", "хай, нехай, б, би", "наказовий і умовний спосіб"]
      - ["Заперечні", "не, ні, ані", "заперечення"]
      - ["Модальні: питальні", "хіба, невже, чи", "питання з відтінком"]
      - ["Модальні: підсилювальні", "навіть, і, ж, же, таки, аж", "підсилення"]
      - ["Модальні: обмежувальні", "лише, тільки, лиш", "обмеження"]
      - ["Модальні: вказівні", "ось, от, це, то", "вказівка"]

  - title: "Правопис «не»"
    columns: ["Правило", "Приклад"]
    rows:
      - ["Не + дієслово → окремо", "не можу, не знаю, не бачу"]
      - ["Не + прикметник (ознака) → разом", "нецікавий, невеликий, неможливий"]
      - ["Не + прислівник → разом", "неможливо, недалеко, нешвидко"]
      - ["Не + дієслово-виняток → разом", "нездужати, ненавидіти, непокоїтися"]

  - title: "Частки-афікси (через дефіс)"
    columns: ["Частка", "Приклад"]
    rows:
      - ["-бо", "скажи-бо, дай-бо"]
      - ["-но", "ходи-но, давай-но, скажи-но"]
      - ["-то", "якось-то, отам-то"]
      - ["-таки", "все-таки, прийшов-таки, таки прийшов"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Формотворчі"
    items:
      - word: "хай"
        emoji: "\U0001F44B"
        sentence: "Хай він прийде завтра."
      - word: "нехай"
        emoji: "\U0001F44B"
        sentence: "Нехай буде так."
      - word: "б / би"
        emoji: "\U0001F4AD"
        sentence: "Я б допоміг, якби міг."

  - category: "Заперечні"
    items:
      - word: "не"
        emoji: "\U0000274C"
        sentence: "Він не знає відповіді."
      - word: "ні"
        emoji: "\U0000274C"
        sentence: "Ні, я не згоден."
      - word: "ані"
        emoji: "\U0000274C"
        sentence: "Ані слова більше!"

  - category: "Модальні: питальні"
    items:
      - word: "хіба"
        emoji: "\U00002753"
        sentence: "Хіба ти цього не знав?"
      - word: "невже"
        emoji: "\U0001F632"
        sentence: "Невже він уже прийшов?"
      - word: "чи"
        emoji: "\U00002754"
        sentence: "Чи правда це?"

  - category: "Модальні: підсилювальні й обмежувальні"
    items:
      - word: "навіть"
        emoji: "\U0000203C"
        sentence: "Він навіть не подзвонив."
      - word: "аж"
        emoji: "\U0001F4A5"
        sentence: "Він чекав аж три години."
      - word: "таки"
        emoji: "\U00002705"
        sentence: "Він таки прийшов!"
      - word: "же / ж"
        emoji: "\U0000203C"
        sentence: "Ти ж обіцяв!"
      - word: "лише"
        emoji: "\U00000031"
        sentence: "Він лише подивився і пішов."
      - word: "тільки"
        emoji: "\U00000031"
        sentence: "Тільки ти можеш допомогти."

  - category: "Модальні: вказівні"
    items:
      - word: "ось"
        emoji: "\U0001F449"
        sentence: "Ось він, наш герой!"
      - word: "от"
        emoji: "\U0001F449"
        sentence: "От яка справа!"

  - category: "Частки-афікси"
    items:
      - word: "все-таки"
        emoji: "\U00002705"
        sentence: "Він все-таки вирішив піти."
      - word: "ходи-но"
        emoji: "\U0001F6B6"
        sentence: "Ходи-но сюди!"
      - word: "скажи-бо"
        emoji: "\U0001F4AC"
        sentence: "Скажи-бо мені правду."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Визнач тип частки"
    instruction: "Розподіли на формотворчі, заперечні, модальні"
    categories:
      - label: "Формотворчі"
        items:
          - "хай"
          - "нехай"
          - "б"
          - "би"
      - label: "Заперечні"
        items:
          - "не"
          - "ні"
          - "ані"
      - label: "Модальні"
        items:
          - "хіба"
          - "невже"
          - "навіть"
          - "лише"
          - "тільки"
          - "аж"
          - "ось"
          - "же"

  - type: classify
    title: "Питальні частки: очікувана відповідь"
    instruction: "Визнач: хіба (очікується «ні»), невже (очікується «так»), чи (нейтральне)"
    categories:
      - label: "Хіба (очікується «ні»)"
        items:
          - "Хіба ти цього не знав?"
          - "Хіба це правда?"
          - "Хіба він не прийшов?"
      - label: "Невже (очікується «так» / подив)"
        items:
          - "Невже він уже прийшов?"
          - "Невже ти не знав?"
          - "Невже це можливо?"
      - label: "Чи (нейтральне)"
        items:
          - "Чи правда це?"
          - "Чи будеш ти вдома?"
          - "Чи знаєш ти цю людину?"

  - type: pattern_drill
    title: "Додай частку для підсилення"
    prompt: "Зміни відтінок речення за допомогою частки"
    items:
      - given: "Він прийшов. → підсилення (навіть)"
        answer: "Він навіть прийшов."
      - given: "Він прийшов. → підсилення (таки)"
        answer: "Він таки прийшов."
      - given: "Він прийшов. → підсилення (ж/же)"
        answer: "Він же прийшов!"
      - given: "Він прийшов. → обмеження (лише)"
        answer: "Лише він прийшов."
      - given: "Він прийшов. → подив (невже)"
        answer: "Невже він прийшов?"
      - given: "Він прийшов. → сумнів (хіба)"
        answer: "Хіба він прийшов?"
      - given: "Він прийшов. → вказівка (ось)"
        answer: "Ось він прийшов!"
      - given: "Він прийшов. → наказ (хай)"
        answer: "Хай він прийде."

  - type: true_false
    title: "Правопис часток"
    items:
      - statement: "«Все-таки» пишеться разом."
        answer: false
        correction: "Через дефіс: «все-таки» (-таки — частка-афікс)."
      - statement: "«Не можу» пишеться окремо."
        answer: true
      - statement: "«Нецікавий» пишеться окремо."
        answer: false
        correction: "Разом: «нецікавий» (не + прикметник-ознака)."
      - statement: "«Ходи-но» пишеться через дефіс."
        answer: true
      - statement: "«Не знаю» пишеться разом."
        answer: false
        correction: "Окремо: «не знаю» (не + дієслово)."
      - statement: "«Ненавидіти» пишеться разом."
        answer: true

  - type: build_sentence
    title: "Зміни тон речення"
    instruction: "Використай частки для зміни відтінку"
    sentences:
      - words: ["підсилювальна", "Він працював цілий день."]
        correct: "Він аж цілий день працював!"
      - words: ["обмежувальна", "Ми чекали його."]
        correct: "Ми лише його й чекали."
      - words: ["питальна (подив)", "Він це зробив?"]
        correct: "Невже він це зробив?"
      - words: ["формотворча", "Вона буде щаслива."]
        correct: "Хай вона буде щаслива!"

  - type: reading
    title: "Читання: Діалог друзів"
    text: |
      — Невже ти вже повернувся? Хіба відпустка не до кінця місяця?
      — Ні, я повернувся раніше. Навіть не встиг відпочити.
      — От тобі й відпустка! А чи все гаразд?
      — Все-таки я вирішив повернутися. Лише тут я відчуваю себе вдома.
      — Ти ж обіцяв поїхати на море!
      — Хай наступного разу. Ось побачиш — поїдемо разом!
      — Ну, нехай. Тільки не забудь!
    questions:
      - question: "Знайди всі частки."
        answer: "Невже, хіба, не (×3), навіть, от, чи, все-таки, лише, ж, хай, ось, нехай, тільки."
      - question: "Визнач тип кожної частки."
        answer: "Невже — модальна (питальна). Хіба — модальна (питальна). Не — заперечна. Навіть — модальна (підсилювальна). От — модальна (вказівна). Чи — модальна (питальна). Все-таки — модальна (підсилювальна). Лише — модальна (обмежувальна). Ж — модальна (підсилювальна). Хай — формотворча. Ось — модальна (вказівна). Нехай — формотворча. Тільки — модальна (обмежувальна)."

  - type: riddle
    title: "Загадка"
    clues:
      - "Літом спить, зимою їсть,"
      - "тіло тепле, а крові не має."
    answer: "піч"
