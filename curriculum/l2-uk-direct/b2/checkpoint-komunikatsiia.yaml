module: checkpoint-komunikatsiia
track: l2-uk-direct
level: b2
type: checkpoint
title: "Контрольна точка: комунікація"
subtitle: "Стилі, аргументація, медіа, документи, культура слова"
standard_ref: "§4.3–4 (комунікативна компетентність)"
textbook_ref: "Grade 8 — комплексна перевірка: текст, стиль, аргументація"
teaching_notes: |
  Контрольна точка перевіряє: аналіз тексту, визначення стилю, побудову аргументу,
  розрізнення факту й оцінки, формати документів, виправлення суржику, структуру есе.
  Поріг проходження: 70%.
  Охоплення: модулі 31–42 (стилі, дискусія, есе, переказ, медіаграмотність, ділові папери,
  опис місцевості, суспільство, наука, мистецтво, робота, культура слова).

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Ключові поняття"
    items:
      - word: "стиль мовлення"
        emoji: "\U0001F4DD"
        sentence: "Визначте стиль мовлення цього тексту."
      - word: "аргументація"
        emoji: "\U0001F4A1"
        sentence: "Аргументація — основа переконливого тексту."
      - word: "медіаграмотність"
        emoji: "\U0001F4F0"
        sentence: "Медіаграмотність допомагає розпізнати маніпуляцію."
      - word: "суржик"
        emoji: "\U0001F6AB"
        sentence: "Суржик — це змішування мов без системи."
      - word: "калька"
        emoji: "\U0000274C"
        sentence: "Калька — це дослівне копіювання іншомовної конструкції."

  - category: "Текстові операції"
    items:
      - word: "переказ"
        emoji: "\U0001F4DD"
        sentence: "Стислий переказ передає головне."
      - word: "есе"
        emoji: "\U0001F4D6"
        sentence: "Есе — це невеликий твір із власною думкою."
      - word: "заява"
        emoji: "\U0001F4C4"
        sentence: "Заяву пишуть офіційно-діловим стилем."
      - word: "рецензія"
        emoji: "\U0001F4F0"
        sentence: "Рецензія оцінює мистецький твір."
      - word: "опис"
        emoji: "\U0001F5BC"
        sentence: "Опис малює картину словами."

  - category: "Оцінка та аналіз"
    items:
      - word: "факт"
        emoji: "\U00002705"
        sentence: "Факт — це об'єктивна інформація."
      - word: "думка"
        emoji: "\U0001F4AC"
        sentence: "Думка — це суб'єктивне судження."
      - word: "теза"
        emoji: "\U0001F4CC"
        sentence: "Теза — основна думка виступу."
      - word: "контраргумент"
        emoji: "\U0001F500"
        sentence: "Контраргумент заперечує тезу."
      - word: "висновок"
        emoji: "\U00002705"
        sentence: "Висновок підсумовує дискусію."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: reading
    title: "Комплексний аналіз тексту"
    text: |
      Чи потрібна Україні реформа освіти? Безперечно, так. По-перше, сучасний ринок праці вимагає нових навичок: критичного мислення, цифрової грамотності, командної роботи. Традиційна школа не завжди їх розвиває. По-друге, міжнародні дослідження PISA показують, що українські учні відстають у природничих науках. Хтось може заперечити, що реформи коштують дорого. Проте ціна бездіяльності — ще вища: втрата конкурентоспроможності та відтік молоді. Отже, реформа — не розкіш, а необхідність.
    questions:
      - question: "Визнач стиль цього тексту."
        answer: "Публіцистичний — риторичне запитання, оцінні слова, аргументація."
      - question: "Яка теза тексту?"
        answer: "Україні потрібна реформа освіти."
      - question: "Як автор відповідає на контраргумент?"
        answer: "Визнає, що реформи дорогі, але стверджує: ціна бездіяльності ще вища."

  - type: classify
    title: "Визнач стиль"
    instruction: "До якого стилю належить уривок?"
    categories:
      - label: "Науковий"
        items:
          - "Дослідження виявило кореляцію між рівнем освіти та доходом."
          - "За результатами експерименту, гіпотезу підтверджено."
      - label: "Офіційно-діловий"
        items:
          - "Прошу надати мені довідку про навчання."
          - "Відповідно до наказу № 15 від 01.03.2026..."
      - label: "Публіцистичний"
        items:
          - "Хто відповість за ці помилки? Суспільство чекає на відповідь."
          - "Настав час діяти, а не говорити!"
      - label: "Художній"
        items:
          - "Місячне сяйво розлилося по воді, мов срібна ріка."
          - "Тиша огортала все навколо м'якою ковдрою."

  - type: classify
    title: "Факт чи думка?"
    instruction: "Визнач: це факт чи думка?"
    categories:
      - label: "Факт"
        items:
          - "Київ — столиця України."
          - "Конституцію України прийнято 1996 року."
          - "Населення Львова — близько 720 тисяч."
      - label: "Думка"
        items:
          - "Київ — найкрасивіше місто Європи."
          - "Конституція потребує змін."
          - "Львів — найкраще місце для життя."

  - type: true_false
    title: "Перевір свої знання"
    items:
      - statement: "«Підводити підсумки» — правильна українська форма."
        answer: false
        correction: "Правильно: «підбивати підсумки»."
      - statement: "Вступ есе має зацікавити читача."
        answer: true
      - statement: "Стислий переказ зберігає всі деталі оригіналу."
        answer: false
        correction: "Стислий переказ передає лише головні думки."
      - statement: "Заяву пишуть художнім стилем."
        answer: false
        correction: "Заяву пишуть офіційно-діловим стилем."
      - statement: "Факт — це те, що можна перевірити."
        answer: true
      - statement: "«Навчатися мови» — правильне керування (Р.в.)."
        answer: true

  - type: pattern_drill
    title: "Виправ суржик"
    prompt: "Заміни суржикову форму на стандартну"
    items:
      - given: "приймати участь →"
        answer: "брати участь"
      - given: "являється студентом →"
        answer: "є студентом"
      - given: "задавати питання →"
        answer: "ставити запитання"
      - given: "бути правим →"
        answer: "мати рацію"

  - type: build_sentence
    title: "Побудуй аргумент"
    instruction: "Склади повний аргумент: теза + причина + висновок"
    sentences:
      - words: ["Вважаю", ",", "що", "спорт", "необхідний", ",", "бо", "зміцнює", "здоров'я", "."]
        correct: "Вважаю, що спорт необхідний, бо зміцнює здоров'я."
      - words: ["Наприклад", ",", "регулярні", "тренування", "знижують", "ризик", "хвороб", "."]
        correct: "Наприклад, регулярні тренування знижують ризик хвороб."
      - words: ["Отже", ",", "фізична", "активність", "—", "частина", "здорового", "способу", "життя", "."]
        correct: "Отже, фізична активність — частина здорового способу життя."

  - type: build_sentence
    title: "Офіційний документ"
    instruction: "Склади частину офіційного документа"
    sentences:
      - words: ["Директору", "школи", "№ 10", "Бойку", "І.П."]
        correct: "Директору школи № 10 Бойку І.П."
      - words: ["Прошу", "звільнити", "мене", "від", "занять", "5", "березня", "2026", "р.", "."]
        correct: "Прошу звільнити мене від занять 5 березня 2026 р."
