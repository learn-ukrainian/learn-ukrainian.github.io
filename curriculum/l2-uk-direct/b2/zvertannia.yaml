module: zvertannia
track: l2-uk-direct
level: b2
type: grammar
title: "Звертання"
subtitle: "Кличний відмінок, пунктуація, офіційний і неофіційний регістр"
standard_ref: "§4.2.3.5 — звертання"
textbook_ref: "Клас 8 §62–63 — звертання, кличний відмінок, пунктуація"
teaching_notes: |
  Звертання — називаємо адресата. Вживається кличний відмінок.
  Мама → мамо, Марія → Маріє, друг → друже, пан → пане.
  Пунктуація: на початку — кома після; у середині — дві коми; у кінці — кома перед.
  Сильна емоція — знак оклику. «О» перед звертанням: «О мамо!»
  Регістр: офіційний (Шановний пане директоре!) vs неофіційний (Друже! Братику!).
  Звертання НЕ є членом речення — його можна прибрати без зміни змісту.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Звертання = кличний відмінок + коми. На початку — кома після. У середині — дві коми. У кінці — кома перед."
  examples:
    - "Мамо, я прийшов! (початок → кома після)"
    - "Я, мамо, прийшов. (середина → дві коми)"
    - "Я прийшов, мамо. (кінець → кома перед)"
    - "Шановний пане директоре! (офіційне звертання)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Кличний відмінок — основні закінчення"
    columns: ["Називний", "Кличний", "Зміна"]
    rows:
      - ["мама", "мамо", "-а → -о"]
      - ["тато", "тату", "-о → -у"]
      - ["Марія", "Маріє", "-ія → -іє"]
      - ["Оксана", "Оксано", "-а → -о"]
      - ["друг", "друже", "+е (чергування г/ж)"]
      - ["брат", "брате", "+е"]
      - ["пан", "пане", "+е"]
      - ["бабуся", "бабусю", "-я → -ю"]
      - ["Тарас", "Тарасе", "+е"]
      - ["Олег", "Олеже", "+е (г/ж)"]
      - ["батько", "батьку", "-о → -у"]
      - ["дочка", "дочко", "-а → -о"]

  - title: "Регістри звертання"
    columns: ["Регістр", "Приклад"]
    rows:
      - ["Офіційний", "Шановний пане директоре!"]
      - ["Офіційний", "Пані Олено, будь ласка!"]
      - ["Офіційний", "Вельмишановна пані Марієвно!"]
      - ["Неофіційний", "Друже!"]
      - ["Неофіційний", "Сестричко!"]
      - ["Неофіційний", "Братику!"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Кличні форми імен"
    items:
      - word: "Маріє"
        emoji: "\U0001F469"
        sentence: "Маріє, ходи сюди!"
      - word: "Олеже"
        emoji: "\U0001F468"
        sentence: "Олеже, ти готовий?"
      - word: "Тарасе"
        emoji: "\U0001F468"
        sentence: "Тарасе, підійди, будь ласка."
      - word: "Оксано"
        emoji: "\U0001F469"
        sentence: "Оксано, дякую за допомогу!"
      - word: "Іване"
        emoji: "\U0001F468"
        sentence: "Іване, передай книгу."

  - category: "Офіційні звертання"
    items:
      - word: "шановний"
        emoji: "\U0001F3A9"
        sentence: "Шановний пане директоре!"
      - word: "вельмишановний"
        emoji: "\U0001F451"
        sentence: "Вельмишановна пані Марієвно!"
      - word: "пане"
        emoji: "\U0001F935"
        sentence: "Пане Іване, маю до вас запитання."
      - word: "пані"
        emoji: "\U0001F478"
        sentence: "Пані Олено, ласкаво просимо!"

  - category: "Неофіційні звертання"
    items:
      - word: "друже"
        emoji: "\U0001F91D"
        sentence: "Друже, послухай мене!"
      - word: "братику"
        emoji: "\U0001F466"
        sentence: "Братику, допоможи мені."
      - word: "сестричко"
        emoji: "\U0001F467"
        sentence: "Сестричко, як справи?"
      - word: "мамо"
        emoji: "\U0001F469"
        sentence: "Мамо, я вже вдома!"
      - word: "тату"
        emoji: "\U0001F468"
        sentence: "Тату, купи морозиво!"

  - category: "Дієслова спілкування"
    items:
      - word: "звертатися"
        emoji: "\U0001F4AC"
        sentence: "До старших звертайтеся на «Ви»."
      - word: "послухати"
        emoji: "\U0001F442"
        sentence: "Друзі, послухайте мене!"
      - word: "вибачити"
        emoji: "\U0001F64F"
        sentence: "Вибачте, пані Олено!"

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Утвори кличний відмінок"
    prompt: "Постав іменник у кличний відмінок"
    items:
      - given: "Марія → ?"
        answer: "Маріє"
      - given: "друг → ?"
        answer: "друже"
      - given: "мама → ?"
        answer: "мамо"
      - given: "Тарас → ?"
        answer: "Тарасе"
      - given: "Олег → ?"
        answer: "Олеже"
      - given: "бабуся → ?"
        answer: "бабусю"
      - given: "пан → ?"
        answer: "пане"
      - given: "Оксана → ?"
        answer: "Оксано"
      - given: "батько → ?"
        answer: "батьку"
      - given: "брат → ?"
        answer: "брате"
      - given: "дочка → ?"
        answer: "дочко"
      - given: "Іван → ?"
        answer: "Іване"

  - type: pattern_drill
    title: "Розстав коми при звертанні"
    prompt: "Додай коми (і знаки оклику, де потрібно)"
    items:
      - given: "Мамо я прийшов."
        answer: "Мамо, я прийшов."
      - given: "Я мамо прийшов."
        answer: "Я, мамо, прийшов."
      - given: "Я прийшов мамо."
        answer: "Я прийшов, мамо."
      - given: "Друзі послухайте мене."
        answer: "Друзі, послухайте мене!"
      - given: "Шановний пане директоре маю запитання."
        answer: "Шановний пане директоре, маю запитання."
      - given: "Дякую Оксано за допомогу."
        answer: "Дякую, Оксано, за допомогу."
      - given: "Тарасе підійди будь ласка."
        answer: "Тарасе, підійди, будь ласка."
      - given: "Пані Олено ласкаво просимо."
        answer: "Пані Олено, ласкаво просимо!"
      - given: "О мамо як я за тобою скучив."
        answer: "О мамо, як я за тобою скучив!"
      - given: "Діти тихіше будь ласка."
        answer: "Діти, тихіше, будь ласка!"

  - type: build_sentence
    title: "Напиши привітання"
    instruction: "Напиши формальне або неформальне привітання зі звертанням"
    sentences:
      - words: ["[Шановний]", "пане", "директоре", "!"]
        correct: "Шановний пане директоре!"
      - words: ["[Друже]", ",", "як", "справи", "?"]
        correct: "Друже, як справи?"
      - words: ["[Пані]", "Олено", ",", "дякую", "!"]
        correct: "Пані Олено, дякую!"
      - words: ["[Братику]", ",", "допоможи", "мені", "."]
        correct: "Братику, допоможи мені."

  - type: classify
    title: "Офіційний чи неофіційний регістр?"
    instruction: "Визнач регістр звертання"
    categories:
      - label: "Офіційний"
        items:
          - "Шановний пане Міністре!"
          - "Пані Олено, будь ласка!"
          - "Вельмишановна пані Марієвно!"
          - "Шановні колеги!"
          - "Пане професоре, маю запитання."
      - label: "Неофіційний"
        items:
          - "Друже, послухай!"
          - "Мамо, я прийшов!"
          - "Братику, допоможи!"
          - "Сестричко, як справи?"
          - "Бабусю, розкажи казку!"

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "«Тарас, підійди» — звертання стоїть на початку."
        answer: true
      - statement: "Звертання є членом речення."
        answer: false
        correction: "Звертання НЕ є членом речення — його можна прибрати."
      - statement: "«Мамо, я прийшов!» — кома правильна."
        answer: true
      - statement: "«Друг, підійди!» — кличний відмінок правильний."
        answer: false
        correction: "Потрібен кличний: «Друже, підійди!»"
      - statement: "У середині речення звертання виділяється двома комами."
        answer: true
      - statement: "«О мамо!» — звертання з підсиленою емоцією."
        answer: true

  - type: reading
    title: "Читання: Два листи"
    text: |
      Лист 1 (офіційний):
      Шановний пане директоре! Звертаюся до Вас з проханням. Пані Олено Іванівно, будь ласка, передайте документи до канцелярії. Дякую, пане Петре, за Вашу допомогу.

      Лист 2 (неофіційний):
      Привіт, Маріє! Як справи? Знаєш, подруго, я нарешті поїхала до Одеси. Мамо, передай привіт бабусі. Братику, чекаю на тебе! Цілую, друзі!
    questions:
      - question: "Знайдіть усі звертання в офіційному листі."
        answer: "«Шановний пане директоре», «Пані Олено Іванівно», «пане Петре»."
      - question: "Знайдіть усі звертання в неофіційному листі."
        answer: "«Маріє», «подруго», «Мамо», «Братику», «друзі»."
      - question: "Яка різниця в регістрі між двома листами?"
        answer: "Перший — офіційний (пане, пані, Ви з великої). Другий — неофіційний (ім'я, зменшувальні, ти)."
