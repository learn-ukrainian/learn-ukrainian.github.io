module: slovospoluchennia
track: l2-uk-direct
level: b2
type: grammar
title: "Словосполучення"
subtitle: "Узгодження, керування, прилягання"
standard_ref: "§4.2.3.1 — словосполучення"
textbook_ref: "8 клас §13–14 — словосполучення"
teaching_notes: |
  Словосполучення — два або більше слів, пов'язаних підрядним зв'язком (головне + залежне).
  Три типи зв'язку: узгодження (гарна квітка — залежне змінюється разом із головним),
  керування (читати книгу — головне вимагає певного відмінка),
  прилягання (ходити швидко — зв'язок лише за змістом, незмінне слово).
  НЕ є словосполученням: граматична основа (підмет + присудок), однорідні члени.
  Важливо: «хлопець читає» — це речення, а не словосполучення.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Узгодження: залежне змінюється разом із головним. Керування: головне вимагає відмінка. Прилягання: зв'язок за змістом."
  examples:
    - "гарна квітка → гарної квітки → гарній квітці (узгодження)"
    - "читати книгу (керування — Зн.в.)"
    - "ходити швидко (прилягання — прислівник не змінюється)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Типи зв'язку в словосполученні"
    columns: ["Тип", "Як розпізнати", "Приклад"]
    rows:
      - ["Узгодження", "залежне слово змінюється разом із головним (рід, число, відмінок)", "гарна квітка, нового будинку"]
      - ["Керування", "головне слово вимагає конкретного відмінка", "читати книгу (Зн.в.), залежати від результату (Р.в.)"]
      - ["Прилягання", "залежне слово незмінне (прислівник, інфінітив)", "ходити швидко, хотіти спати"]

  - title: "Що НЕ є словосполученням"
    columns: ["Конструкція", "Чому ні", "Приклад"]
    rows:
      - ["Граматична основа", "підмет + присудок = ядро речення", "хлопець читає"]
      - ["Однорідні члени", "зв'язок сурядний, а не підрядний", "книги і зошити"]
      - ["Прийменник + іменник", "не самостійна одиниця", "на столі"]

