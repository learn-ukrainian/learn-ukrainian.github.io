# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Визнач тип зв'язку"
    instruction: "Узгодження, керування чи прилягання?"
    categories:
      - label: "Узгодження"
        items:
          - "гарна квітка"
          - "нового будинку"
          - "синє небо"
          - "старий замок"
          - "цікава книга"
      - label: "Керування"
        items:
          - "читати книгу"
          - "залежати від результату"
          - "допомагати другові"
          - "керувати автомобілем"
          - "пишатися дочкою"
      - label: "Прилягання"
        items:
          - "ходити швидко"
          - "хотіти спати"
          - "говорити тихо"
          - "співати добре"
          - "любити працювати"

  - type: true_false
    title: "Це словосполучення?"
    items:
      - statement: "«Хлопець читає» — це словосполучення."
        answer: false
        correction: "Граматична основа (підмет + присудок)."
      - statement: "«Цікава книга» — це словосполучення (узгодження)."
        answer: true
      - statement: "«Книги і зошити» — це словосполучення."
        answer: false
        correction: "Однорідні члени (сурядний зв'язок)."
      - statement: "«Читати книгу» — словосполучення з керуванням."
        answer: true
      - statement: "«Швидко бігти» — словосполучення з прилягання."
        answer: true
      - statement: "«Дощ іде» — словосполучення."
        answer: false
        correction: "Граматична основа."

  - type: pattern_drill
    title: "Виділи словосполучення з речення"
    prompt: "Знайди словосполучення"
    items:
      - given: "Високий хлопець швидко читав нову книгу. → словосполучення?"
        answer: "Високий хлопець (узгодження), швидко читав (прилягання), читав книгу (керування), нову книгу (узгодження)."
      - given: "Маленька дівчинка тихо співала гарну пісню. → словосполучення?"
        answer: "Маленька дівчинка (узгодження), тихо співала (прилягання), співала пісню (керування), гарну пісню (узгодження)."
      - given: "Старий дідусь повільно йшов додому. → словосполучення?"
        answer: "Старий дідусь (узгодження), повільно йшов (прилягання), йшов додому (прилягання)."

  - type: classify
    title: "Словосполучення чи ні?"
    instruction: "Визнач: це словосполучення чи ні?"
    categories:
      - label: "Словосполучення"
        items:
          - "гарна погода"
          - "читати книгу"
          - "ходити швидко"
          - "нова школа"
          - "допомагати другу"
          - "хотіти вчитися"
      - label: "Не словосполучення"
        items:
          - "сонце світить (граматична основа)"
          - "хлопці й дівчата (однорідні)"
          - "він сидить (граматична основа)"
          - "книги та зошити (однорідні)"
          - "вона працює (граматична основа)"
          - "дерева й кущі (однорідні)"

  - type: build_sentence
    title: "Побудуй речення зі словосполучень"
    instruction: "Поєднай словосполучення в речення"
    sentences:
      - words: ["високий хлопець", "читати книгу", "у бібліотеці"]
        correct: "Високий хлопець читає книгу в бібліотеці."
      - words: ["маленька дитина", "спати міцно", "у ліжку"]
        correct: "Маленька дитина міцно спить у ліжку."
      - words: ["старий дуб", "рости повільно", "у парку"]
        correct: "Старий дуб повільно росте у парку."
      - words: ["молода вчителька", "пояснювати правило", "учням"]
        correct: "Молода вчителька пояснює правило учням."

  - type: reading
    title: "Читання: Аналіз тексту"
    text: |
      Тихий вечір опустився на місто. Старі ліхтарі освітлювали вузькі вулички. Молода пара повільно гуляла парком. Вони тихо розмовляли й сміялися. Великий собака біг поруч, весело гавкаючи. Холодний вітер приносив запах осіннього листя.
    questions:
      - question: "Знайди всі словосполучення з узгодженням."
        answer: "Тихий вечір, старі ліхтарі, вузькі вулички, молода пара, великий собака, холодний вітер, осіннього листя."
      - question: "Знайди словосполучення з керуванням."
        answer: "Освітлювали вулички, приносив запах."
      - question: "Знайди словосполучення з приляганням."
        answer: "Повільно гуляла, тихо розмовляли, весело гавкаючи."

  - type: proverb_drill
    title: "Прислів'я: визнач тип зв'язку"
    items:
      - proverb: "Тихіше їдеш — далі ___."
        answer: "будеш"
      - proverb: "Бережи честь ___."
        answer: "змолоду"
