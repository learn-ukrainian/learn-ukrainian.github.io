module: odnoskladni-oznacheno
track: l2-uk-direct
level: b2
type: grammar
title: "Односкладні речення: означено- та неозначено-особові"
subtitle: "Речення без підмета — хто діє, зрозуміло з дієслова"
standard_ref: "§4.2.3.3 — односкладні речення"
textbook_ref: "Клас 8 §41–43 — означено-особові, неозначено-особові"
teaching_notes: |
  Односкладне речення має тільки присудок, підмета НЕМАЄ.
  Означено-особове: дієслово в 1-й або 2-й особі → зрозуміло, хто діє (я/ти/ми/ви).
  «Люблю українську мову.» = Я люблю. Явне «я» часто зайве.
  Неозначено-особове: дієслово в 3-й особі множини → хтось невідомий.
  «У місті будують новий міст.» = хтось будує.
  Ключове — не плутати з двоскладним, де підмет просто стоїть далі в реченні.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Немає підмета? → односкладне. Дієслово 1/2 особи → означено-особове. Дієслово 3 ос. мн. → неозначено-особове."
  examples:
    - "Люблю каву. (= Я люблю → означено-особове)"
    - "Приходь завтра! (= Ти приходь → означено-особове)"
    - "У місті будують новий міст. (= хтось → неозначено-особове)"
    - "В газеті написали про це. (= хтось → неозначено-особове)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Означено-особові речення"
    columns: ["Особа", "Приклад", "Мається на увазі"]
    rows:
      - ["1 ос. одн.", "Люблю музику.", "= Я люблю"]
      - ["2 ос. одн.", "Прийди о п'ятій!", "= Ти прийди"]
      - ["1 ос. мн.", "Підемо до парку!", "= Ми підемо"]
      - ["2 ос. мн.", "Послухайте уважно!", "= Ви послухайте"]

  - title: "Неозначено-особові речення"
    columns: ["Час", "Приклад", "Мається на увазі"]
    rows:
      - ["Теперішній", "У місті будують міст.", "= хтось будує"]
      - ["Минулий", "В газеті написали про це.", "= хтось написав"]
      - ["Майбутній", "Тут побудують стадіон.", "= хтось побудує"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Синтаксичні терміни"
    items:
      - word: "односкладне"
        emoji: "\U00000031"
        sentence: "Це односкладне речення — має тільки присудок."
      - word: "двоскладне"
        emoji: "\U00000032"
        sentence: "Двоскладне речення має і підмет, і присудок."
      - word: "означено-особове"
        emoji: "\U0001F464"
        sentence: "«Люблю каву» — означено-особове речення."
      - word: "неозначено-особове"
        emoji: "\U00002753"
        sentence: "«Кажуть, що буде дощ» — неозначено-особове."
      - word: "підмет"
        emoji: "\U0001F4CC"
        sentence: "В односкладному реченні підмета немає."
      - word: "присудок"
        emoji: "\U0001F3AF"
        sentence: "Присудок — головний член односкладного речення."

  - category: "Дієслова для вправ"
    items:
      - word: "кажуть"
        emoji: "\U0001F5E3"
        sentence: "Кажуть, що зима буде холодна."
      - word: "повідомляють"
        emoji: "\U0001F4E2"
        sentence: "По радіо повідомляють новини."
      - word: "будують"
        emoji: "\U0001F3D7"
        sentence: "У нашому місті будують школу."
      - word: "вважають"
        emoji: "\U0001F914"
        sentence: "Вважають, що це найкращий варіант."
      - word: "запрошують"
        emoji: "\U0001F4E8"
        sentence: "На свято запрошують усіх жителів."

  - category: "Повсякденні дії"
    items:
      - word: "мріяти"
        emoji: "\U0001F4AD"
        sentence: "Мрію про подорож до моря."
      - word: "сподіватися"
        emoji: "\U0001F91E"
        sentence: "Сподіваюся на краще."
      - word: "пишатися"
        emoji: "\U0001F3C6"
        sentence: "Пишаємося нашою командою."
      - word: "хвилюватися"
        emoji: "\U0001F630"
        sentence: "Хвилююся перед іспитом."
      - word: "радити"
        emoji: "\U0001F4AC"
        sentence: "Раджу тобі прочитати цю книгу."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Двоскладне чи односкладне?"
    instruction: "Визнач тип речення"
    categories:
      - label: "Двоскладне"
        items:
          - "Брат читає книгу."
          - "Діти граються надворі."
          - "Мама готує вечерю."
          - "Вітер дує з півночі."
          - "Сонце зійшло рано."
          - "Учитель пояснив тему."
      - label: "Односкладне"
        items:
          - "Люблю весну."
          - "Приходьте завтра!"
          - "У місті будують парк."
          - "Кажуть, буде дощ."
          - "Напиши мені листа!"
          - "По телевізору показали фільм."

  - type: classify
    title: "Означено-особове чи неозначено-особове?"
    instruction: "Визнач тип односкладного речення"
    categories:
      - label: "Означено-особове"
        items:
          - "Люблю українську мову."
          - "Приходь завтра о п'ятій!"
          - "Мрію про канікули."
          - "Підемо до кіно!"
          - "Послухайте цю пісню!"
      - label: "Неозначено-особове"
        items:
          - "У місті будують новий міст."
          - "В газеті написали про це."
          - "Тут продають свіжий хліб."
          - "На заводі виготовляють деталі."
          - "У школі оголосили канікули."

  - type: build_sentence
    title: "Перетвори на означено-особове"
    instruction: "Прибери зайвий підмет — зроби речення односкладним"
    sentences:
      - words: ["Я", "люблю", "каву", "."]
        correct: "Люблю каву."
      - words: ["Ми", "підемо", "до", "парку", "."]
        correct: "Підемо до парку."
      - words: ["Ти", "приходь", "завтра", "!"]
        correct: "Приходь завтра!"
      - words: ["Я", "мрію", "про", "море", "."]
        correct: "Мрію про море."
      - words: ["Ви", "послухайте", "уважно", "!"]
        correct: "Послухайте уважно!"

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "«Будують новий міст» — це двоскладне речення."
        answer: false
        correction: "Це односкладне неозначено-особове (немає підмета, дієслово 3 ос. мн.)."
      - statement: "«Люблю каву» — означено-особове речення."
        answer: true
      - statement: "В означено-особовому реченні діє невідома особа."
        answer: false
        correction: "Невідома особа — це неозначено-особове. В означено-особовому зрозуміло, хто діє."
      - statement: "«Прийди о п'ятій!» — це односкладне речення."
        answer: true
      - statement: "В односкладному реченні є і підмет, і присудок."
        answer: false
        correction: "В односкладному реченні є тільки один головний член — присудок."
      - statement: "«Кажуть, що буде дощ» — неозначено-особове."
        answer: true
      - statement: "«Студенти вивчають мову» — односкладне."
        answer: false
        correction: "Це двоскладне речення: підмет — «студенти», присудок — «вивчають»."
      - statement: "Неозначено-особове речення має дієслово в 3-й особі множини."
        answer: true

  - type: pattern_drill
    title: "Хто мається на увазі?"
    prompt: "Визнач, хто діє в реченні (або «невідомо»)"
    items:
      - given: "Люблю читати."
        answer: "я"
      - given: "Кажуть, зима буде холодна."
        answer: "невідомо (хтось)"
      - given: "Приходь о шостій!"
        answer: "ти"
      - given: "Тут продають квитки."
        answer: "невідомо (хтось)"
      - given: "Пишаємося перемогою."
        answer: "ми"
      - given: "В газеті написали статтю."
        answer: "невідомо (хтось)"
      - given: "Мрію про подорож."
        answer: "я"
      - given: "Послухайте уважно!"
        answer: "ви"
      - given: "На фабриці шиють одяг."
        answer: "невідомо (хтось)"
      - given: "Запрошуємо на свято!"
        answer: "ми"

  - type: reading
    title: "Читання: Неформальний лист"
    text: |
      Привіт! Пишу тобі з Одеси. Приїхала позавчора, і вже закохалася в це місто. Зранку гуляю по Дерибасівській, п'ю каву в маленьких кав'ярнях. Тут розповідають стільки цікавих історій про старе місто! На Привозі продають найсмачніші фрукти. Кажуть, що Одеса — це місто гумору. Приїжджай обов'язково! Чекаю на тебе!
    questions:
      - question: "Знайдіть усі означено-особові речення."
        answer: "«Пишу тобі з Одеси», «Зранку гуляю по Дерибасівській», «п'ю каву», «Приїжджай обов'язково», «Чекаю на тебе»."
      - question: "Знайдіть усі неозначено-особові речення."
        answer: "«Тут розповідають стільки цікавих історій», «На Привозі продають найсмачніші фрукти», «Кажуть, що Одеса — це місто гумору»."
      - question: "Чому в цьому листі так багато означено-особових речень?"
        answer: "Це неформальний лист — природно опускати «я», бо зрозуміло, хто пише."

  - type: proverb_drill
    title: "Прислів'я: односкладні речення"
    items:
      - proverb: "Тримай слово за зубами, щоб і янголи не ___."
        answer: "знали"
      - proverb: "Не ___ гоп, поки не перескочиш."
        answer: "кажи"
