module: kultura-slova-b2
track: l2-uk-direct
level: b2
type: grammar
title: "Культура слова"
subtitle: "Антисуржик: фразеологічні кальки, керування дієслів, евфонія"
standard_ref: "§4.3.6 (культура мовлення)"
textbook_ref: "Grade 8 §11, «Культура слова» — B2-рівень кальок"
teaching_notes: |
  B2-рівень антисуржику — не лексичний (це B1), а СТРУКТУРНИЙ.
  Фразеологічні кальки: «підводити підсумки» → «підбивати підсумки»; «бути правим» → «мати рацію».
  Керування дієслів: «навчатися мови» (Р.в.), НЕ «навчатися мові» (Д.в.);
  «дякувати кому» (Д.в.), НЕ «дякувати кого» (Зн.в.); «вибачте мені» (Д.в.), НЕ «вибачте мене» (Зн.в.).
  Кальковані структури: «є засобом» НЕ «являється засобом»; «ідеться про» НЕ «мова йдеться про».
  Евфонія: у/в, і/й, з/із/зі у зв'язному тексті.

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Типові суржикізми"
    columns: ["Неправильно (суржик)", "Правильно (українська)", "Тип помилки"]
    rows:
      - ["вибачаюсь", "вибачте / перепрошую", "калька з рос. «извиняюсь»"]
      - ["по-будь-якому", "будь-як / як завгодно", "калька з рос. «по-любому»"]
      - ["приймати участь", "брати участь", "калька з рос. «принимать участие»"]
      - ["заключати договір", "укладати договір", "калька з рос. «заключать договор»"]
      - ["рахувати (думати)", "вважати / гадати", "калька з рос. «считать»"]
      - ["являється", "є", "калька з рос. «является»"]
  - title: "Керування дієслів"
    columns: ["Суржик", "Правильно", "Відмінок"]
    rows:
      - ["дякувати кого", "дякувати кому", "Д.в."]
      - ["вибачити кого", "вибачити кому", "Д.в."]
      - ["навчати когось щось", "навчати когось чогось", "Р.в."]
      - ["оплачувати за щось", "оплачувати щось", "Зн.в."]

key_pattern:
  text: "Неправильно: [калька]. Правильно: [стандарт]. Тому що [пояснення]."
  examples:
    - "Неправильно: «підводити підсумки». Правильно: «підбивати підсумки». Тому що «підводити» — калька з російського."
    - "Неправильно: «дякувати кого». Правильно: «дякувати кому». Тому що «дякувати» керує давальним відмінком."

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Правильні форми (стандарт)"
    items:
      - word: "підбивати підсумки"
        emoji: "\U00002705"
        sentence: "Підіб'ємо підсумки нашої роботи."
      - word: "мати рацію"
        emoji: "\U00002705"
        sentence: "Ви маєте рацію, це правильно."
      - word: "брати участь"
        emoji: "\U00002705"
        sentence: "Я беру участь у конференції."
      - word: "ставити запитання"
        emoji: "\U00002705"
        sentence: "Дозвольте поставити запитання."
      - word: "ідеться про"
        emoji: "\U00002705"
        sentence: "Ідеться про важливу тему."

  - category: "Кальки (неправильно)"
    items:
      - word: "підводити підсумки"
        emoji: "\U0000274C"
        sentence: "«Підводити підсумки» — калька. Правильно: «підбивати підсумки»."
      - word: "бути правим"
        emoji: "\U0000274C"
        sentence: "«Бути правим» — калька. Правильно: «мати рацію»."
      - word: "приймати участь"
        emoji: "\U0000274C"
        sentence: "«Приймати участь» — калька. Правильно: «брати участь»."
      - word: "задавати питання"
        emoji: "\U0000274C"
        sentence: "«Задавати питання» — калька. Правильно: «ставити запитання»."
      - word: "являтися"
        emoji: "\U0000274C"
        sentence: "«Являється засобом» — калька. Правильно: «є засобом»."

  - category: "Керування дієслів"
    items:
      - word: "дякувати кому"
        emoji: "\U00002705"
        sentence: "Дякую вам за допомогу."
      - word: "вибачте мені"
        emoji: "\U00002705"
        sentence: "Вибачте мені за запізнення."
      - word: "навчатися чого"
        emoji: "\U00002705"
        sentence: "Вона навчається медицини."
      - word: "оволодіти чим"
        emoji: "\U00002705"
        sentence: "Він оволодів мовою за рік."
      - word: "опікуватися ким"
        emoji: "\U00002705"
        sentence: "Мати опікується дітьми."

  - category: "Евфонія"
    items:
      - word: "у/в"
        emoji: "\U0001F3B5"
        sentence: "У школі (після приголосного), в університеті (після голосного)."
      - word: "і/й"
        emoji: "\U0001F3B5"
        sentence: "Книга і зошит; він і вона; вона й він."
      - word: "з/із/зі"
        emoji: "\U0001F3B5"
        sentence: "З дому, із сестрою, зі школи."
      - word: "щоб/аби"
        emoji: "\U0001F3B5"
        sentence: "Щоб навчитися / аби зрозуміти."
      - word: "милозвучність"
        emoji: "\U0001F3B6"
        sentence: "Милозвучність — гармонія звуків у мовленні."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Правильно чи неправильно?"
    instruction: "Визнач: це стандартна українська чи суржик?"
    categories:
      - label: "Правильно"
        items:
          - "підбивати підсумки"
          - "мати рацію"
          - "брати участь"
          - "ставити запитання"
          - "ідеться про"
          - "є студентом"
          - "дякувати вам"
          - "у будь-якому разі"
          - "що стосується"
          - "вибачте мені"
      - label: "Неправильно (суржик)"
        items:
          - "підводити підсумки"
          - "бути правим"
          - "приймати участь"
          - "задавати питання"
          - "мова йдеться про"
          - "являється студентом"
          - "дякувати вас"
          - "в любому випадку"
          - "що торкається"
          - "вибачте мене"

  - type: pattern_drill
    title: "Заміни суржик"
    prompt: "Заміни кальку на стандартну форму"
    items:
      - given: "приймати участь →"
        answer: "брати участь"
      - given: "задавати питання →"
        answer: "ставити запитання"
      - given: "підводити підсумки →"
        answer: "підбивати підсумки"
      - given: "бути правим →"
        answer: "мати рацію"
      - given: "являється студентом →"
        answer: "є студентом"
      - given: "мова йдеться про →"
        answer: "ідеться про"
      - given: "по адресу →"
        answer: "на адресу"
      - given: "в любому випадку →"
        answer: "у будь-якому разі"
      - given: "що торкається цього →"
        answer: "що стосується цього"
      - given: "мають місце порушення →"
        answer: "є порушення / відбуваються порушення"
      - given: "дякувати вас →"
        answer: "дякувати вам"
      - given: "вибачте мене →"
        answer: "вибачте мені"
      - given: "навчатися мові →"
        answer: "навчатися мови"
      - given: "рахувати (вважати) →"
        answer: "вважати"
      - given: "слідуючий →"
        answer: "наступний"

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "«Він являється студентом» — правильно."
        answer: false
        correction: "Правильно: «Він є студентом.» «Являтися» в цьому значенні — калька."
      - statement: "«Дякувати кому» — правильне керування."
        answer: true
      - statement: "«Приймати участь» — стандартна українська."
        answer: false
        correction: "Правильно: «Брати участь.»"
      - statement: "«Ідеться про» — правильна форма."
        answer: true
      - statement: "«Навчатися мові» — правильне керування."
        answer: false
        correction: "Правильно: «Навчатися мови» (родовий відмінок)."

  - type: build_sentence
    title: "Виправ суржик у тексті"
    instruction: "Склади правильне речення замість суржикового"
    sentences:
      - words: ["Я", "беру", "участь", "у", "конференції", "."]
        correct: "Я беру участь у конференції."
      - words: ["Він", "має", "рацію", "в", "цьому", "питанні", "."]
        correct: "Він має рацію в цьому питанні."
      - words: ["Дозвольте", "поставити", "запитання", "."]
        correct: "Дозвольте поставити запитання."
      - words: ["Ідеться", "про", "важливу", "справу", "."]
        correct: "Ідеться про важливу справу."
      - words: ["Вона", "є", "студенткою", "університету", "."]
        correct: "Вона є студенткою університету."

  - type: reading
    title: "Знайди помилки"
    text: |
      У цьому тексті є 5 суржикових помилок. Знайдіть їх:

      «На сьогоднішній нараді ми підводили підсумки роботи за квартал. Директор являється прихильником реформ. Він рахує, що в любому випадку потрібно приймати участь у конкурсі. Я задав питання про терміни. Ідеться про важливий проєкт.»
    questions:
      - question: "Які 5 помилок є в тексті?"
        answer: "1) «підводили підсумки» → «підбивали підсумки». 2) «являється прихильником» → «є прихильником». 3) «рахує» → «вважає». 4) «в любому випадку» → «у будь-якому разі». 5) «приймати участь» → «брати участь». 6) «задав питання» → «поставив запитання» (6-та, бонусна)."
      - question: "Яке речення вже правильне?"
        answer: "Останнє: «Ідеться про важливий проєкт» — це стандартна українська."

  - type: pattern_drill
    title: "Евфонія: у/в, і/й, з/із/зі"
    prompt: "Обери правильний варіант"
    items:
      - given: "Він працює ___ школі. (у/в)"
        answer: "у"
      - given: "Вона живе ___ Одесі. (у/в)"
        answer: "в"
      - given: "Книга ___ зошит. (і/й)"
        answer: "і"
      - given: "Мама ___ тато. (і/й)"
        answer: "й"
      - given: "Я прийшов ___ роботи. (з/із/зі)"
        answer: "з"
      - given: "Ми повернулися ___ школи. (з/із/зі)"
        answer: "зі"

  - type: proverb_drill
    title: "Фразеологізми: правильна форма"
    items:
      - proverb: "Пекти ___ = ніяковіти."
        answer: "раків"
      - proverb: "Яблуку ніде ___ = тісно."
        answer: "впасти"
      - proverb: "Накивати ___ = утекти."
        answer: "п'ятами"
      - proverb: "Вставляти палки в ___ = заважати."
        answer: "колеса"
      - proverb: "Закарбувати на ___ = запам'ятати."
        answer: "носі"
      - proverb: "Рукою ___ = близько."
        answer: "подати"
