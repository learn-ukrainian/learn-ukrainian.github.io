module: vyhuki-ta-zvukonasl
track: l2-uk-direct
level: b2
type: grammar
title: "Вигуки та звуконаслідування"
subtitle: "Типи, пунктуація, вживання"
standard_ref: "§4.2.1.10 — вигук"
textbook_ref: "7 клас §86–88 — вигуки та звуконаслідування"
teaching_notes: |
  Вигуки — особлива частина мови: не називають предметів чи дій, а виражають емоції, волевиявлення,
  етикет або імітують звуки.
  Чотири типи: емоційні (Ой! Ура! Ох!), спонукальні (Гей! Тс! Стій! Годі!),
  етикетні (Привіт! Добридень! Спасибі!), звуконаслідування (Ку-ку! Гав-гав! Бах!).
  Пунктуація: після вигука ставимо ! або , залежно від сили емоції.
  Розрізняйте справжні вигуки (Ой! Ура! Тс!) від привітальних фраз, що вживаються як етикетні формули.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Вигук — емоція, наказ, етикет або імітація звуку. Після вигука — ! (сильна емоція) або , (слабка)."
  examples:
    - "Ой, яка гарна квітка! (емоційний, слабка емоція → кома)"
    - "Ой! Яка гарна квітка! (емоційний, сильна емоція → знак оклику)"
    - "Тс! Тихо! (спонукальний)"
    - "Гав-гав! (звуконаслідування)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Типи вигуків"
    columns: ["Тип", "Функція", "Приклади"]
    rows:
      - ["Емоційні", "виражають почуття", "Ой! Ура! Ох! Ах! Гей! Ого!"]
      - ["Спонукальні", "наказ, заклик", "Гей! Тс! Тихо! Стій! Годі! Цить!"]
      - ["Етикетні", "ввічливість", "Привіт! Добридень! Спасибі! Пробачте!"]
      - ["Звуконаслідування", "імітація звуків", "Ку-ку! Гав-гав! Дзень! Бах! Тік-так!"]

  - title: "Пунктуація після вигука"
    columns: ["Сила емоції", "Знак", "Приклад"]
    rows:
      - ["Сильна", "!", "Ой! Яка гарна квітка!"]
      - ["Слабка / нейтральна", ",", "Ой, яка гарна квітка!"]
      - ["Звуконаслідування", "!", "Бах! Двері зачинилися."]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Емоційні"
    items:
      - word: "ой"
        emoji: "\U0001F632"
        sentence: "Ой, як гарно тут!"
      - word: "ура"
        emoji: "\U0001F389"
        sentence: "Ура! Ми перемогли!"
      - word: "ох"
        emoji: "\U0001F625"
        sentence: "Ох, як важко..."
      - word: "ого"
        emoji: "\U0001F62E"
        sentence: "Ого! Яка велика будівля!"

  - category: "Спонукальні"
    items:
      - word: "тс"
        emoji: "\U0001F910"
        sentence: "Тс! Не шуміть!"
      - word: "стій"
        emoji: "\U0000270B"
        sentence: "Стій! Не ходи туди!"
      - word: "годі"
        emoji: "\U0001F6D1"
        sentence: "Годі сперечатися!"
      - word: "цить"
        emoji: "\U0001F910"
        sentence: "Цить! Хтось іде."
      - word: "гей"
        emoji: "\U0001F44B"
        sentence: "Гей! Підожди мене!"

  - category: "Етикетні"
    items:
      - word: "привіт"
        emoji: "\U0001F44B"
        sentence: "Привіт! Як справи?"
      - word: "добридень"
        emoji: "\U00002600"
        sentence: "Добридень! Чим можу допомогти?"
      - word: "спасибі"
        emoji: "\U0001F64F"
        sentence: "Спасибі за допомогу!"
      - word: "пробачте"
        emoji: "\U0001F64F"
        sentence: "Пробачте, я запізнився."
      - word: "до побачення"
        emoji: "\U0001F44B"
        sentence: "До побачення! Гарного дня!"

  - category: "Звуконаслідування"
    items:
      - word: "ку-ку"
        emoji: "\U0001F426"
        sentence: "Ку-ку! — почулося з лісу."
      - word: "гав-гав"
        emoji: "\U0001F436"
        sentence: "Гав-гав! — загавкав собака."
      - word: "бах"
        emoji: "\U0001F4A5"
        sentence: "Бах! Двері зачинилися."
      - word: "тік-так"
        emoji: "\U000023F0"
        sentence: "Тік-так, тік-так — цокав годинник."
      - word: "дзень"
        emoji: "\U0001F514"
        sentence: "Дзень! — пролунав дзвіночок."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Визнач тип вигука"
    instruction: "Розподіли вигуки за типами"
    categories:
      - label: "Емоційні"
        items:
          - "Ой!"
          - "Ура!"
          - "Ох!"
          - "Ого!"
      - label: "Спонукальні"
        items:
          - "Тс!"
          - "Стій!"
          - "Годі!"
          - "Цить!"
      - label: "Етикетні"
        items:
          - "Привіт!"
          - "Добридень!"
          - "Спасибі!"
          - "Пробачте!"
      - label: "Звуконаслідування"
        items:
          - "Ку-ку!"
          - "Гав-гав!"
          - "Бах!"
          - "Тік-так!"

  - type: true_false
    title: "Правда чи ні?"
    items:
      - statement: "«Привіт» — це прислівник."
        answer: false
        correction: "Вигук (етикетний)."
      - statement: "Після вигука завжди ставиться знак оклику."
        answer: false
        correction: "За слабкої емоції ставиться кома: «Ой, яка гарна квітка!»"
      - statement: "Звуконаслідування — це тип вигука."
        answer: true
      - statement: "«Годі» — емоційний вигук."
        answer: false
        correction: "Спонукальний — означає наказ припинити дію."
      - statement: "Вигуки не є членами речення."
        answer: true
      - statement: "«Ку-ку» — емоційний вигук."
        answer: false
        correction: "Звуконаслідування."

  - type: pattern_drill
    title: "Постав правильний знак після вигука"
    prompt: "Додай ! або , після вигука"
    items:
      - given: "Ой_ яка гарна квітка! (слабка емоція)"
        answer: "Ой, яка гарна квітка!"
      - given: "Ой_ Яка гарна квітка! (сильна емоція)"
        answer: "Ой! Яка гарна квітка!"
      - given: "Ура_ Ми перемогли!"
        answer: "Ура! Ми перемогли!"
      - given: "Ох_ як важко..."
        answer: "Ох, як важко..."
      - given: "Тс_ Не шуміть!"
        answer: "Тс! Не шуміть!"
      - given: "Привіт_ Як справи?"
        answer: "Привіт! Як справи?"
      - given: "Ого_ Яка велика будівля!"
        answer: "Ого! Яка велика будівля!"
      - given: "Ой_ я забув ключі."
        answer: "Ой, я забув ключі."
      - given: "Бах_ Двері зачинилися."
        answer: "Бах! Двері зачинилися."
      - given: "Гей_ Підожди мене!"
        answer: "Гей! Підожди мене!"

  - type: build_sentence
    title: "Напиши діалог з вигуками"
    instruction: "Склади репліку з відповідним вигуком"
    sentences:
      - words: ["подив", "велика новина"]
        correct: "Ого! Яка новина!"
      - words: ["перемога", "радість"]
        correct: "Ура! Ми це зробили!"
      - words: ["прохання тиші"]
        correct: "Тс! Тихо, дитина спить."
      - words: ["привітання", "ранок"]
        correct: "Добридень! Як ваші справи?"

  - type: reading
    title: "Читання: Коміксовий діалог"
    text: |
      — Привіт! Ти чув новину?
      — Ні, що сталося?
      — Ого! Наша команда виграла чемпіонат!
      — Ура! Невже правда?
      — Тс! Не кричи так голосно. Ось, дивись — фото.
      — Ой, яка радість! Спасибі, що сказав!
      — До побачення! Біжу розказати іншим!
      — Гей! Почекай, я з тобою!
    questions:
      - question: "Знайди всі вигуки."
        answer: "Привіт, ого, ура, тс, ось, ой, спасибі, до побачення, гей."
      - question: "Визнач тип кожного."
        answer: "Привіт — етикетний. Ого — емоційний. Ура — емоційний. Тс — спонукальний. Ось — вказівний (частка, не вигук). Ой — емоційний. Спасибі — етикетний. До побачення — етикетний. Гей — спонукальний."

  - type: classify
    title: "Справжній вигук чи привітальна фраза?"
    instruction: "Визнач: це вигук (одне слово) чи привітальна фраза (фразеологізм)"
    categories:
      - label: "Вигук (одне слово)"
        items:
          - "Ой!"
          - "Ура!"
          - "Тс!"
          - "Годі!"
          - "Привіт!"
          - "Спасибі!"
      - label: "Привітальна фраза (фразеологізм)"
        items:
          - "Доброго ранку!"
          - "Добрий день!"
          - "На все добре!"
          - "До побачення!"
          - "Будь ласка!"
          - "Добрий вечір!"
