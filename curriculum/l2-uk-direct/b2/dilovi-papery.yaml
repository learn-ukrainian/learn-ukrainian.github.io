module: dilovi-papery
track: l2-uk-direct
level: b2
type: writing
title: "Ділові папери"
subtitle: "Заява, автобіографія, діловий лист, оголошення"
standard_ref: "§4.3.5 (ділові папери)"
textbook_ref: "Grade 8 §51, §58; Grade 9 §19, §23, §40"
teaching_notes: |
  Заява: фіксований формат — Директору..., Прошу..., дата, підпис.
  Автобіографія: хронологічні факти, офіційний стиль.
  Діловий лист: Шановний... + текст + З повагою...
  Оголошення: коротко, зрозуміло — хто, що, коли, де.
  Ключові офіційні формули: «Прошу надати...», «Повідомляю, що...», «Відповідно до...».
  Формат дати: «28 лютого 2026 р.»

key_pattern:
  text: "Директору [заклад] [ПІБ]. [Від кого]. Заява. Прошу [дія]. [Дата]. [Підпис]."
  examples:
    - "Директору ліцею № 5 Петренку О.І. учня 11 класу Коваленка М.Д. Заява. Прошу надати мені відпустку. 1 березня 2026 р. Коваленко М.Д."
    - "Шановна Оксано Іванівно! Повідомляю, що збори відбудуться 5 березня. З повагою, Мельник Т.С."

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Типи документів"
    items:
      - word: "заява"
        emoji: "\U0001F4C4"
        sentence: "Заяву пишуть на ім'я керівника."
      - word: "автобіографія"
        emoji: "\U0001F4DD"
        sentence: "Автобіографія — це опис свого життя."
      - word: "діловий лист"
        emoji: "\U00002709"
        sentence: "Діловий лист має офіційний тон."
      - word: "оголошення"
        emoji: "\U0001F4E2"
        sentence: "В оголошенні вказують час і місце."

  - category: "Офіційні формули"
    items:
      - word: "прошу"
        emoji: "\U0001F64F"
        sentence: "Прошу надати мені довідку."
      - word: "повідомляю"
        emoji: "\U0001F4E2"
        sentence: "Повідомляю, що збори перенесено."
      - word: "відповідно до"
        emoji: "\U0001F4CB"
        sentence: "Відповідно до наказу № 42..."
      - word: "у зв'язку з"
        emoji: "\U0001F517"
        sentence: "У зв'язку з хворобою прошу..."
      - word: "з повагою"
        emoji: "\U0001F91D"
        sentence: "З повагою, Іваненко Т.М."

  - category: "Реквізити документів"
    items:
      - word: "підпис"
        emoji: "\U0000270D"
        sentence: "Поставте підпис унизу заяви."
      - word: "дата"
        emoji: "\U0001F4C5"
        sentence: "Вкажіть дату написання."
      - word: "адресат"
        emoji: "\U0001F464"
        sentence: "Адресат — той, кому адресований документ."
      - word: "адресант"
        emoji: "\U0001F464"
        sentence: "Адресант — той, хто пише документ."
      - word: "реквізит"
        emoji: "\U0001F4CB"
        sentence: "Реквізити — обов'язкові елементи документа."

  - category: "Службова лексика"
    items:
      - word: "шановний"
        emoji: "\U0001F91D"
        sentence: "Шановний Іване Петровичу!"
      - word: "надати"
        emoji: "\U0001F4E4"
        sentence: "Прошу надати мені відпустку."
      - word: "дозволити"
        emoji: "\U00002705"
        sentence: "Прошу дозволити відвідування."
      - word: "зарахувати"
        emoji: "\U0001F4CB"
        sentence: "Прошу зарахувати мене до 10 класу."
      - word: "звільнити"
        emoji: "\U0001F4E4"
        sentence: "Прошу звільнити мене від занять."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Визнач тип документа"
    instruction: "Який це документ: заява, автобіографія, діловий лист чи оголошення?"
    categories:
      - label: "Заява"
        items:
          - "Прошу надати мені відпустку з 1 по 14 липня."
          - "Прошу зарахувати мене до 10 класу."
      - label: "Автобіографія"
        items:
          - "Я, Іваненко Тарас Михайлович, народився 5 травня 2008 року в м. Києві."
          - "У 2015 році вступив до школи № 25 м. Києва."
      - label: "Діловий лист"
        items:
          - "Шановний Іване Петровичу! Звертаюся до Вас із проханням..."
          - "З повагою, директор ТОВ «Промінь» Мельник О.С."
      - label: "Оголошення"
        items:
          - "Збори батьків відбудуться 10 березня о 18:00 в актовій залі."
          - "Запрошуємо всіх бажаючих на концерт 15 березня!"

  - type: build_sentence
    title: "Склади заяву"
    instruction: "Розташуй частини заяви у правильному порядку"
    sentences:
      - words: ["Директору", "ліцею", "№ 5", "Петренку", "О.І."]
        correct: "Директору ліцею № 5 Петренку О.І."
      - words: ["Прошу", "надати", "мені", "відпустку", "з", "1", "по", "14", "липня", "2026", "р.", "."]
        correct: "Прошу надати мені відпустку з 1 по 14 липня 2026 р."
      - words: ["1", "березня", "2026", "р.", "Коваленко", "М.Д."]
        correct: "1 березня 2026 р. Коваленко М.Д."

  - type: pattern_drill
    title: "Офіційна формула"
    prompt: "Добери правильну формулу"
    items:
      - given: "Хочу попросити відпустку → ___"
        answer: "Прошу надати мені відпустку"
      - given: "Хочу сказати, що збори перенесено → ___"
        answer: "Повідомляю, що збори перенесено"
      - given: "Згідно з наказом → ___"
        answer: "Відповідно до наказу"
      - given: "Через хворобу → ___"
        answer: "У зв'язку з хворобою"
      - given: "Закінчення листа → ___"
        answer: "З повагою"
      - given: "Звертання в листі → ___"
        answer: "Шановний/шановна"

  - type: build_sentence
    title: "Коротка автобіографія"
    instruction: "Склади речення для автобіографії"
    sentences:
      - words: ["Я", ",", "Коваленко", "Марія", "Олексіївна", ",", "народилася", "12", "квітня", "2008", "року", "в", "м.", "Львові", "."]
        correct: "Я, Коваленко Марія Олексіївна, народилася 12 квітня 2008 року в м. Львові."
      - words: ["У", "2015", "році", "вступила", "до", "школи", "№ 17", "м.", "Львова", "."]
        correct: "У 2015 році вступила до школи № 17 м. Львова."
      - words: ["У", "2024", "році", "закінчила", "9", "клас", "із", "відзнакою", "."]
        correct: "У 2024 році закінчила 9 клас із відзнакою."

  - type: reading
    title: "Знайди помилки"
    text: |
      Діловий лист із помилками:

      «Привіт, Іване! Пишу тобі, бо хочу попросити довідку. Мені треба її побиструю. Заздалегідь дякую, Марія.»
    questions:
      - question: "Які помилки є у зверненні?"
        answer: "«Привіт, Іване» — розмовний стиль. Правильно: «Шановний Іване Петровичу!»"
      - question: "Яка помилка в основній частині?"
        answer: "«Хочу попросити» — розмовне. Правильно: «Прошу надати мені довідку». «Побиструю» — не існує, розмовне."
      - question: "Як правильно закінчити лист?"
        answer: "«З повагою, Коваленко М.О.» замість «Заздалегідь дякую, Марія»."

  - type: build_sentence
    title: "Склади оголошення"
    instruction: "Склади оголошення з потрібними деталями"
    sentences:
      - words: ["Запрошуємо", "на", "концерт", "хору", "15", "березня", "о", "17:00", "в", "актовій", "залі", "."]
        correct: "Запрошуємо на концерт хору 15 березня о 17:00 в актовій залі."
      - words: ["Збори", "батьків", "відбудуться", "20", "березня", "о", "18:00", ".", "Явка", "обов'язкова", "."]
        correct: "Збори батьків відбудуться 20 березня о 18:00. Явка обов'язкова."
