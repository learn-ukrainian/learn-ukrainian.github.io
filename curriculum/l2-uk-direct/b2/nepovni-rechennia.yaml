# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Повне чи неповне?"
    instruction: "Визнач, чи речення повне, чи неповне"
    categories:
      - label: "Повне"
        items:
          - "Брат — студент."
          - "Київ — столиця України."
          - "Мама готує вечерю."
          - "Дерева ростуть біля дому."
          - "Він читає книгу."
          - "Жити — Вітчизну любити."
      - label: "Неповне"
        items:
          - "— Куди ти йдеш? — До школи."
          - "Він любить каву, а я — чай."
          - "— Що ти читаєш? — Роман."
          - "Ми пішли до парку, а вони — до кіно."
          - "— Коли повернешся? — Увечері."
          - "Батько — на роботу, мати — додому."

  - type: pattern_drill
    title: "Відновити повну форму"
    prompt: "Напиши повне речення замість неповного"
    items:
      - given: "— Куди? — До школи."
        answer: "Я йду до школи."
      - given: "— Що читаєш? — Роман."
        answer: "Я читаю роман."
      - given: "Він — каву, а я — чай."
        answer: "Він п'є каву, а я п'ю чай."
      - given: "— Коли прийдеш? — О п'ятій."
        answer: "Я прийду о п'ятій."
      - given: "Ми — до парку, а вони — до кіно."
        answer: "Ми пішли до парку, а вони пішли до кіно."
      - given: "— Хто це зробив? — Петро."
        answer: "Це зробив Петро."
      - given: "— Звідки ти? — З Києва."
        answer: "Я з Києва."
      - given: "Батько — вчитель, а мати — лікар."
        answer: "Батько працює вчителем, а мати працює лікарем."

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "«Брат — студент» — це неповне речення."
        answer: false
        correction: "Це повне двоскладне речення. Тире стоїть між підметом і присудком."
      - statement: "У реченні «Він — каву, а я — чай» тире замінює пропущене дієслово."
        answer: true
      - statement: "Неповні речення — це завжди помилка."
        answer: false
        correction: "Неповні речення — нормальне мовне явище, типове для діалогів."
      - statement: "«— До школи.» — це неповне речення."
        answer: true
      - statement: "«Жити — Вітчизну любити» — це неповне речення."
        answer: false
        correction: "Це повне двоскладне: підмет «жити», присудок «любити»."
      - statement: "У неповному реченні пропущений член зрозумілий з контексту."
        answer: true
      - statement: "«Київ — столиця» — тире стоїть замість пропущеного слова."
        answer: false
        correction: "Тире стоїть між підметом і присудком (обидва — іменники в Н.в.)."
      - statement: "Неповні речення часто зустрічаються в діалогах."
        answer: true

  - type: build_sentence
    title: "Склади діалог із неповними реченнями"
    instruction: "Напиши коротку відповідь (неповне речення)"
    sentences:
      - words: ["—", "Куди", "ти", "йдеш", "?"]
        correct: "— До школи."
      - words: ["—", "Що", "ти", "купив", "?"]
        correct: "— Хліб і молоко."
      - words: ["—", "Коли", "ти", "повернешся", "?"]
        correct: "— Увечері."
      - words: ["—", "З", "ким", "ти", "був", "?"]
        correct: "— З другом."

  - type: reading
    title: "Читання: Діалог у кав'ярні"
    text: |
      — Привіт! Давно не бачилися! Як справи?
      — Чудово! А в тебе?
      — Теж непогано. Що будеш замовляти?
      — Каву. А ти?
      — Я — чай. З лимоном.
      — А до кави? Може, тістечко?
      — Ні, дякую. Тільки каву.
      — Добре. А після кав'ярні куди?
      — Додому. А ти?
      — До бібліотеки. Треба повернути книги.
    questions:
      - question: "Знайдіть усі неповні речення в діалозі."
        answer: "«А в тебе?», «Каву», «А ти?», «Я — чай», «З лимоном», «Може, тістечко?», «Тільки каву», «Додому», «А ти?», «До бібліотеки»."
      - question: "Чому в цьому діалозі так багато неповних речень?"
        answer: "Це розмовне мовлення — співрозмовники розуміють контекст і не повторюють зайві слова."
      - question: "Відновіть повну форму речення «Я — чай»."
        answer: "Я буду пити чай."

  - type: pattern_drill
    title: "Постав тире в неповному реченні"
    prompt: "Додай тире на місці пропущеного дієслова"
    items:
      - given: "Він любить каву, а я чай."
        answer: "Він любить каву, а я — чай."
      - given: "Ми пішли до парку, а вони до кіно."
        answer: "Ми пішли до парку, а вони — до кіно."
      - given: "Батько на роботу, мати додому."
        answer: "Батько — на роботу, мати — додому."
      - given: "Він обирає математику, а вона літературу."
        answer: "Він обирає математику, а вона — літературу."
      - given: "Старший брат у Києві, а молодший у Львові."
        answer: "Старший брат — у Києві, а молодший — у Львові."
      - given: "Улітку ми на дачу, а взимку в місто."
        answer: "Улітку ми — на дачу, а взимку — в місто."
      - given: "Одні люблять море, інші гори."
        answer: "Одні люблять море, інші — гори."
      - given: "Він читає романи, а вона поезію."
        answer: "Він читає романи, а вона — поезію."
