module: nepovni-rechennia
track: l2-uk-direct
level: b2
type: grammar
title: "Неповні речення"
subtitle: "Коли слово пропущене — і всі розуміють"
standard_ref: "§4.2.3.3 — повні й неповні речення"
textbook_ref: "Клас 8 §50 — неповні речення, тире при пропущеному члені"
teaching_notes: |
  Неповне речення — пропущений член, зрозумілий із контексту.
  Типове в діалогах: «Куди йдеш? — До школи.» (= Я йду до школи).
  У протиставленнях: «Він любить каву, а я — чай.» (тире замість пропущеного дієслова).
  УВАГА: «Брат — студент» — це ПОВНЕ речення (тире між підметом і присудком).
  Головна помилка учнів — плутати тире в неповному реченні і тире між підметом/присудком.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Пропущений член + зрозуміло з контексту → неповне речення. Тире замість пропущеного дієслова."
  examples:
    - "— Куди ти йдеш? — До школи. (= Я йду до школи)"
    - "Він любить каву, а я — чай. (тире = люблю)"
    - "Брат — студент. (це ПОВНЕ речення, НЕ неповне!)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Неповне речення vs повне з тире"
    columns: ["Речення", "Тип", "Пояснення"]
    rows:
      - ["— До школи.", "Неповне", "Пропущено «Я йду»"]
      - ["Він — каву, а я — чай.", "Неповне", "Тире замість «люблю»"]
      - ["Брат — студент.", "Повне", "Тире між підметом і присудком"]
      - ["Київ — столиця.", "Повне", "Тире між підметом і присудком"]

  - title: "Де зустрічаються неповні речення"
    columns: ["Контекст", "Приклад"]
    rows:
      - ["Діалог", "— Куди? — Додому."]
      - ["Протиставлення", "Він — каву, а я — чай."]
      - ["Друга частина складного", "Ми пішли до парку, а вони — до кіно."]
      - ["Відповідь на запитання", "— Що ти читаєш? — Роман."]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
