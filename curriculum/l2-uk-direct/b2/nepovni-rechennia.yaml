      - word: "контекст"
        emoji: "\U0001F4D6"
        sentence: "Пропущене слово зрозуміле з контексту."
      - word: "діалог"
        emoji: "\U0001F4AC"
        sentence: "У діалозі часто вживають неповні речення."
      - word: "протиставлення"
