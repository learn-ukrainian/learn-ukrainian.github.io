module: checkpoint-syntaksys-1
track: l2-uk-direct
level: b2
type: checkpoint
title: "Контрольна робота: архітектура речення"
subtitle: "Словосполучення, члени речення, типи речень"
standard_ref: "§4.2.3.1–3 — синтаксис речення"
textbook_ref: "Клас 8 §1–50 — словосполучення, речення, члени речення"
teaching_notes: |
  Контрольна перевіряє: типи словосполучень (3); визначення членів речення
  за питальними словами; двоскладне vs односкладне; усі 5 типів односкладних;
  повні vs неповні; вживання тире. Поріг проходження — 70%.
  Структура: classify × 6, true_false × 8, pattern_drill × 6, build_sentence × 4, reading × 2.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Перевірка знань: словосполучення, головні/другорядні члени, двоскладні/односкладні, повні/неповні речення."
  examples:
    - "Визнач тип словосполучення: іменникове, дієслівне, прислівникове."
    - "Визнач члени речення за питаннями: ЩО? ЯКИЙ? ДЕ?"
    - "Розрізни 5 типів односкладних речень."

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Узагальнення: типи речень"
    items:
      - word: "двоскладне"
        emoji: "\U00000032"
        sentence: "Двоскладне речення має підмет і присудок."
      - word: "односкладне"
        emoji: "\U00000031"
        sentence: "Односкладне має тільки один головний член."
      - word: "означено-особове"
        emoji: "\U0001F464"
        sentence: "«Люблю весну» — означено-особове."
      - word: "неозначено-особове"
        emoji: "\U00002753"
        sentence: "«Кажуть, буде дощ» — неозначено-особове."
      - word: "узагальнено-особове"
        emoji: "\U0001F30D"
        sentence: "«Що посієш, те й пожнеш» — узагальнено-особове."
      - word: "безособове"
        emoji: "\U0001F327"
        sentence: "«Світає» — безособове."
      - word: "називне"
        emoji: "\U0001F3F7"
        sentence: "«Зима. Мороз.» — називні речення."

  - category: "Узагальнення: члени речення"
    items:
      - word: "підмет"
        emoji: "\U0001F4CC"
        sentence: "Підмет — хто? що?"
      - word: "присудок"
        emoji: "\U0001F3AF"
        sentence: "Присудок — що робить? який є?"
      - word: "додаток"
        emoji: "\U0001F4E9"
        sentence: "Додаток — кого? що? кому?"
      - word: "означення"
        emoji: "\U0001F3F7"
        sentence: "Означення — який? чий?"
      - word: "обставина"
        emoji: "\U0001F4CD"
        sentence: "Обставина — де? коли? як?"

  - category: "Повторення: базові терміни"
    items:
      - word: "словосполучення"
        emoji: "\U0001F517"
        sentence: "Словосполучення — два пов'язані слова."
      - word: "граматична основа"
        emoji: "\U0001F3D7"
        sentence: "Граматична основа — підмет + присудок."
      - word: "неповне"
        emoji: "\U00002702"
        sentence: "Неповне речення — пропущений член."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Тип речення (двоскладне / односкладне)"
    instruction: "Визнач тип речення"
    categories:
      - label: "Двоскладне"
        items:
          - "Діти граються надворі."
          - "Сонце зійшло рано."
          - "Брат — студент."
      - label: "Односкладне"
        items:
          - "Люблю каву."
          - "Світає."
          - "Кажуть, буде дощ."

  - type: classify
    title: "5 типів односкладних речень"
    instruction: "Визнач тип односкладного речення"
    categories:
      - label: "Означено-особове"
        items:
          - "Мрію про літо."
          - "Послухайте уважно!"
      - label: "Неозначено-особове"
        items:
          - "Тут продають квитки."
          - "В газеті написали новину."
      - label: "Узагальнено-особове"
        items:
          - "Поспішиш — людей насмішиш."
          - "Не кажи гоп, поки не перескочиш."
      - label: "Безособове"
        items:
          - "Надворі холодно."
          - "Треба вчитися."
      - label: "Називне"
        items:
          - "Весна."
          - "Тиша. Спокій."

  - type: classify
    title: "Визнач член речення"
    instruction: "Яким членом речення є виділене слово?"
    categories:
      - label: "Підмет"
        items:
          - "ДІТИ граються надворі."
          - "СОНЦЕ зійшло рано."
      - label: "Присудок"
        items:
          - "Він ЧИТАЄ книгу."
          - "Вона ПРИЙШЛА вчора."
      - label: "Додаток"
        items:
          - "Я бачу БРАТА."
          - "Мама купила ХЛІБ."
      - label: "Означення"
        items:
          - "НОВА книга лежить тут."
          - "Книга БРАТА на столі."
      - label: "Обставина"
        items:
          - "Він прийшов УЧОРА."
          - "Діти бігли ШВИДКО."

  - type: classify
    title: "Повне чи неповне?"
    instruction: "Визнач тип речення"
    categories:
      - label: "Повне"
        items:
          - "Київ — столиця України."
          - "Мама готує обід."
          - "Жити — Вітчизну любити."
      - label: "Неповне"
        items:
          - "— Куди? — Додому."
          - "Він — каву, а я — чай."
          - "— Що читаєш? — Роман."

  - type: classify
    title: "Тип словосполучення"
    instruction: "Визнач тип словосполучення"
    categories:
      - label: "Іменникове"
        items:
          - "нова книга"
          - "дім батька"
      - label: "Дієслівне"
        items:
          - "читати книгу"
          - "іти швидко"
      - label: "Прислівникове"
        items:
          - "дуже швидко"
          - "далеко від дому"

  - type: classify
    title: "Тип присудка"
    instruction: "Визнач тип присудка"
    categories:
      - label: "Простий дієслівний"
        items:
          - "Він ЧИТАЄ книгу."
          - "Вона ПРИЙШЛА вчора."
      - label: "Складений дієслівний"
        items:
          - "Він ХОЧЕ ВЧИТИСЯ."
          - "Вона ПОЧАЛА СПІВАТИ."
      - label: "Складений іменний"
        items:
          - "Він СТАВ ЛІКАРЕМ."
          - "Вона БУЛА СТУДЕНТКОЮ."

  - type: true_false
    title: "Перевірка знань"
    items:
      - statement: "В односкладному реченні є два головні члени."
        answer: false
        correction: "В односкладному — один головний член."
      - statement: "«Брат — студент» — неповне речення."
        answer: false
        correction: "Повне: тире між підметом і присудком."
      - statement: "«Світає» — безособове речення."
        answer: true
      - statement: "Означення відповідає на питання ЯКИЙ? ЧИЙ?"
        answer: true
      - statement: "«Кажуть, буде дощ» — означено-особове."
        answer: false
        correction: "Неозначено-особове (3 ос. мн., невідомий діяч)."
      - statement: "Прикладка — це різновид обставини."
        answer: false
        correction: "Прикладка — це різновид означення."
      - statement: "У діалогах часто вживають неповні речення."
        answer: true
      - statement: "«Без труда не виловиш рибку» — безособове."
        answer: false
        correction: "Узагальнено-особове (2 ос. одн. = кожен)."

  - type: pattern_drill
    title: "Граматична основа"
    prompt: "Визнач підмет і присудок (або тільки присудок)"
    items:
      - given: "Діти граються в парку."
        answer: "діти граються"
      - given: "Світає рано."
        answer: "світає (безособове, тільки присудок)"
      - given: "Люблю каву."
        answer: "люблю (означено-особове, тільки присудок)"
      - given: "Київ — столиця."
        answer: "Київ — столиця (підмет + присудок)"
      - given: "Кажуть, буде дощ."
        answer: "кажуть (неозначено-особове, тільки присудок)"
      - given: "Зима."
        answer: "зима (називне, тільки підмет)"

  - type: build_sentence
    title: "Перетвори речення"
    instruction: "Перетвори двоскладне на односкладне (вкажи тип)"
    sentences:
      - words: ["Я", "мрію", "про", "літо", "."]
        correct: "Мрію про літо. (означено-особове)"
      - words: ["Хтось", "побудував", "стадіон", "."]
        correct: "Побудували стадіон. (неозначено-особове)"
      - words: ["Усі", "повинні", "вчитися", "."]
        correct: "Треба вчитися. (безособове)"
      - words: ["Настала", "зима", "."]
        correct: "Зима. (називне)"

  - type: reading
    title: "Читання: Ранок у місті"
    text: |
      Світанок. Тиша. Повільно світає. На вулицях ще порожньо. Перші трамваї виїжджають із депо. Кажуть, сьогодні буде тепло. Мрію про каву. Іду до кав'ярні. На розі відкрили нову пекарню — там продають свіжий хліб. Смачно пахне. Люблю такі ранки.
    questions:
      - question: "Знайдіть називні речення."
        answer: "«Світанок», «Тиша»."
      - question: "Знайдіть безособові речення."
        answer: "«Повільно світає», «Смачно пахне»."
      - question: "Знайдіть означено-особові речення."
        answer: "«Мрію про каву», «Іду до кав'ярні», «Люблю такі ранки»."
      - question: "Знайдіть неозначено-особове речення."
        answer: "«Кажуть, сьогодні буде тепло», «На розі відкрили нову пекарню», «Там продають свіжий хліб»."

  - type: reading
    title: "Читання: Аналіз тексту"
    text: |
      Петро любить математику, а Марія — літературу. Кожен вибирає своє. Вчора в школі оголосили результати олімпіади. Радість! Перемога! Наш клас посів перше місце. Пишаємося результатом. Треба готуватися до наступного етапу.
    questions:
      - question: "Знайдіть неповне речення і відновіть його."
        answer: "«А Марія — літературу» = «А Марія любить літературу»."
      - question: "Яке речення є узагальнено-особовим?"
        answer: "«Кожен вибирає своє» — двоскладне (має підмет «кожен»), але за значенням близьке до узагальнено-особового."
      - question: "Знайдіть називні речення."
        answer: "«Радість!», «Перемога!»"
