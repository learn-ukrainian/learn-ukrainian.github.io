    columns: ["Правило", "Приклад", "Коми?"]
    rows:
      - ["Після особового займенника", "Він, утомлений, ліг спати.", "Так"]
      - ["Після іменника (постпозиція)", "Дівчина, красива і весела, увійшла.", "Так"]
      - ["Дієприкметниковий зворот після іменника", "Книга, написана автором, стала популярною.", "Так"]
      - ["Перед іменником (з причиною)", "Захоплений грою, хлопець не помітив.", "Так"]
      - ["Одиничне означення перед іменником", "Утомлений хлопець ліг спати.", "Ні"]

