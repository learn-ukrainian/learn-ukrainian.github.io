module: vidokremlennia-oznachennia
track: l2-uk-direct
level: b2
type: grammar
title: "Відокремлені означення"
subtitle: "Коли прикметники і дієприкметники виділяються комами"
standard_ref: "§4.2.3.7 — відокремлені означення"
textbook_ref: "Клас 8 §64–68 — відокремлені означення, дієприкметниковий зворот"
teaching_notes: |
  Відокремлене означення — розширене означення, виділене комами.
  Чотири правила: 1) Після особового займенника: «Він, утомлений, ліг спати.»
  2) Після іменника (постпозиція): «Дівчина, красива і весела, увійшла.»
  3) Дієприкметниковий зворот після іменника: «Книга, написана у 2020, стала бестселером.»
  4) Перед іменником із значенням причини: «Захоплений грою, хлопець не помітив часу.»
  Ключове: позиція означення відносно іменника визначає, чи потрібні коми.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Означення відокремлюється після іменника або займенника. Перед іменником — тільки з причиновим значенням."
  examples:
    - "Він, утомлений і голодний, ліг спати."
    - "Дівчина, красива і весела, увійшла до кімнати."
    - "Книга, написана у 2020 році, стала бестселером."
    - "Захоплений грою, хлопець не помітив часу."

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
