# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Розстав коми"
    prompt: "Додай коми при відокремлених означеннях"
    items:
      - given: "Він утомлений і голодний ліг спати."
        answer: "Він, утомлений і голодний, ліг спати."
      - given: "Дівчина красива і весела увійшла до кімнати."
        answer: "Дівчина, красива і весела, увійшла до кімнати."
      - given: "Книга написана автором у 2020 році стала бестселером."
        answer: "Книга, написана автором у 2020 році, стала бестселером."
      - given: "Захоплений грою хлопець не помітив часу."
        answer: "Захоплений грою, хлопець не помітив часу."
      - given: "Місто оточене горами було дуже красиве."
        answer: "Місто, оточене горами, було дуже красиве."
      - given: "Вона задоволена результатом посміхнулася."
        answer: "Вона, задоволена результатом, посміхнулася."
      - given: "Будинок побудований у XIX столітті потребує ремонту."
        answer: "Будинок, побудований у XIX столітті, потребує ремонту."
      - given: "Наляканий грозою кіт сховався під ліжко."
        answer: "Наляканий грозою, кіт сховався під ліжко."
      - given: "Вони здивовані новиною мовчали."
        answer: "Вони, здивовані новиною, мовчали."
      - given: "Хлопець змучений дорогою нарешті прийшов додому."
        answer: "Хлопець, змучений дорогою, нарешті прийшов додому."
      - given: "Рішення прийняте вчора здивувало всіх."
        answer: "Рішення, прийняте вчора, здивувало всіх."
      - given: "Вона сповнена радості обійняла подругу."
        answer: "Вона, сповнена радості, обійняла подругу."

  - type: classify
    title: "Відокремити чи ні?"
    instruction: "Визнач, чи потрібні коми"
    categories:
      - label: "Відокремлюється (коми)"
        items:
          - "Він, утомлений, ліг спати."
          - "Книга, написана минулого року, стала популярною."
          - "Дівчина, весела і привітна, привіталася."
          - "Захоплений ідеєю, він почав працювати."
      - label: "Не відокремлюється"
        items:
          - "Утомлений хлопець ліг спати."
          - "Нова книга лежить на столі."
          - "Весела дівчина привіталася."
          - "Цікавий фільм показали вчора."

  - type: build_sentence
    title: "Розгорни з відокремленим означенням"
    instruction: "Додай відокремлене означення"
    sentences:
      - words: ["Хлопець", "пішов", "додому", "."]
        correct: "Хлопець, утомлений після тренування, пішов додому."
      - words: ["Місто", "приваблює", "туристів", "."]
        correct: "Місто, оточене горами, приваблює туристів."
      - words: ["Він", "не", "помітив", "часу", "."]
        correct: "Він, захоплений роботою, не помітив часу."
      - words: ["Дерево", "впало", "від", "вітру", "."]
        correct: "Дерево, підточене жуками, впало від вітру."

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "«Він утомлений ліг спати» — коми не потрібні."
        answer: false
        correction: "Після особового займенника означення відокремлюється: «Він, утомлений, ліг спати»."
      - statement: "«Утомлений хлопець ліг спати» — коми не потрібні."
        answer: true
      - statement: "Дієприкметниковий зворот після іменника завжди відокремлюється."
        answer: true
      - statement: "«Захоплений грою, хлопець не помітив часу» — кома правильна."
        answer: true
      - statement: "«Нова, книга лежить на столі» — кома правильна."
        answer: false
        correction: "Одиничне означення перед іменником не відокремлюється."
      - statement: "Після особового займенника означення завжди відокремлюється."
        answer: true
      - statement: "«Книга написана автором стала популярною» — коми не потрібні."
        answer: false
        correction: "Потрібні: «Книга, написана автором, стала популярною»."
      - statement: "Відокремлене означення перед іменником має причинове значення."
        answer: true

  - type: reading
    title: "Читання: Літературний уривок"
    text: |
      Дівчина, молода і гарна, стояла біля вікна. Вона, задумана і тиха, дивилася на вулицю. Дерева, вкриті інеєм, сяяли на сонці. Наляканий несподіваним шумом, птах злетів з гілки. Хлопець, змучений довгою дорогою, нарешті побачив село, оточене старими вербами.
    questions:
      - question: "Знайдіть усі відокремлені означення."
        answer: "«Молода і гарна», «задумана і тиха», «вкриті інеєм», «наляканий несподіваним шумом», «змучений довгою дорогою», «оточене старими вербами»."
      - question: "Яке означення стоїть перед іменником і чому відокремлене?"
        answer: "«Наляканий несподіваним шумом» — перед «птах», має причинове значення (птах злетів, БО був наляканий)."
      - question: "Перебудуйте речення «Книга, написана автором у 2020 році, стала бестселером» на підрядне."
        answer: "Книга, яку написав автор у 2020 році, стала бестселером."

  - type: pattern_drill
    title: "Перебудуй на підрядне речення"
    prompt: "Заміни відокремлене означення на підрядне з «який/яка/яке»"
    items:
      - given: "Книга, написана у 2020 році, стала популярною."
        answer: "Книга, яку написали у 2020 році, стала популярною."
      - given: "Будинок, побудований у XIX столітті, потребує ремонту."
        answer: "Будинок, який побудували у XIX столітті, потребує ремонту."
      - given: "Місто, оточене горами, приваблює туристів."
        answer: "Місто, яке оточене горами, приваблює туристів."
      - given: "Рішення, прийняте вчора, здивувало всіх."
        answer: "Рішення, яке прийняли вчора, здивувало всіх."
      - given: "Дерево, підточене жуками, впало."
        answer: "Дерево, яке підточили жуки, впало."
      - given: "Лист, написаний олівцем, важко прочитати."
        answer: "Лист, який написали олівцем, важко прочитати."
