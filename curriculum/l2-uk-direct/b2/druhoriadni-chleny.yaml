module: druhoriadni-chleny
track: l2-uk-direct
level: b2
type: grammar
title: "Другорядні члени речення"
subtitle: "Додаток, означення, обставина — будуємо розгорнуте речення"
standard_ref: "§4.2.3.2 — другорядні члени речення"
textbook_ref: "Клас 8 §34–39 — додаток, означення, обставина"
teaching_notes: |
  Головний інструмент — питання. Додаток відповідає на КОГО? ЩО? КОМУ? ЧИМ?
  Означення — ЯКИЙ? ЧИЙ? КОТРИЙ? Обставина — ДЕ? КОЛИ? ЯК? ЧОМУ? НАВІЩО?
  Найскладніше — розрізнити неузгоджене означення і додаток: «книга брата» (ЧОГО? — означення)
  vs «бачу брата» (КОГО? — додаток). Прикладка — особливий вид означення-іменник.
  Типи обставин: місця, часу, способу дії, причини, мети, умови, міри і ступеня.
  Починайте з простих речень, поступово ускладнюйте.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Хто? Що? → підмет/присудок. КОГО? ЩО? → додаток. ЯКИЙ? → означення. ДЕ? КОЛИ? ЯК? → обставина."
  examples:
    - "Я бачу книгу. (ЩО? книгу → додаток)"
    - "Нова книга лежить на столі. (ЯКА? нова → означення)"
    - "Він прийшов учора. (КОЛИ? учора → обставина)"
    - "Книга брата лежить тут. (ЧИЯ? брата → означення неузгоджене)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Другорядні члени речення"
    columns: ["Член речення", "Питання", "Приклад", "Підкреслення"]
    rows:
      - ["Додаток", "КОГО? ЩО? КОМУ? ЧИМ?", "Я бачу книгу.", "- - -"]
      - ["Означення (узгоджене)", "ЯКИЙ? ЧИЙ? КОТРИЙ?", "Цікава книга.", "~~~~~"]
      - ["Означення (неузгоджене)", "ЯКИЙ? ЧИЙ?", "Книга брата.", "~~~~~"]
      - ["Прикладка", "ЯКИЙ? (іменник)", "місто-герой Київ", "~~~~~"]
      - ["Обставина", "ДЕ? КОЛИ? ЯК? ЧОМУ?", "Він читає швидко.", "-.-.-."]

  - title: "Типи обставин"
    columns: ["Тип", "Питання", "Приклад"]
    rows:
      - ["Місця", "ДЕ? КУДИ? ЗВІДКИ?", "Він живе в Києві."]
      - ["Часу", "КОЛИ? ВІДКОЛИ? ДОКИ?", "Вона прийшла вчора."]
      - ["Способу дії", "ЯК? ЯКИМ ЧИНОМ?", "Він читає уважно."]
      - ["Причини", "ЧОМУ? ЧЕРЕЗ ЩО?", "Від радості він засміявся."]
      - ["Мети", "НАВІЩО? ДЛЯ ЧОГО?", "Він прийшов навчатися."]
      - ["Умови", "ЗА ЯКОЇ УМОВИ?", "За бажанням можна залишитися."]
      - ["Міри і ступеня", "НАСКІЛЬКИ?", "Він дуже втомився."]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Синтаксичні терміни"
    items:
      - word: "додаток"
        emoji: "\U0001F4E9"
        sentence: "Слово «книгу» — це додаток."
      - word: "означення"
        emoji: "\U0001F3F7"
        sentence: "«Нова» — це означення до слова «книга»."
      - word: "обставина"
        emoji: "\U0001F4CD"
        sentence: "«Швидко» — це обставина способу дії."
      - word: "прикладка"
        emoji: "\U0001F4CE"
        sentence: "«Герой» у «місто-герой» — це прикладка."
      - word: "узгоджений"
        emoji: "\U0001F91D"
        sentence: "Узгоджене означення змінюється разом з іменником."
      - word: "неузгоджений"
        emoji: "\U0001F504"
        sentence: "Неузгоджене означення не змінює форми."

  - category: "Дієслова дії"
    items:
      - word: "досліджувати"
        emoji: "\U0001F50D"
        sentence: "Учені досліджують давні рукописи."
      - word: "аналізувати"
        emoji: "\U0001F4CA"
        sentence: "Ми аналізуємо текст уважно."
      - word: "визначати"
        emoji: "\U0001F3AF"
        sentence: "Визначте головні члени речення."
      - word: "підкреслювати"
        emoji: "\U0000270D"
        sentence: "Підкресліть додаток хвилястою лінією."

  - category: "Обставинні слова"
    items:
      - word: "уважно"
        emoji: "\U0001F440"
        sentence: "Він уважно слухає вчителя."
      - word: "зранку"
        emoji: "\U0001F305"
        sentence: "Зранку ми йдемо до школи."
      - word: "повільно"
        emoji: "\U0001F422"
        sentence: "Потяг рухається повільно."
      - word: "навмисно"
        emoji: "\U0001F3AF"
        sentence: "Він зробив це навмисно."
      - word: "назустріч"
        emoji: "\U0001F91D"
        sentence: "Вона вийшла мені назустріч."

  - category: "Іменники для вправ"
    items:
      - word: "рукопис"
        emoji: "\U0001F4DC"
        sentence: "Рукопис автора зберігається в музеї."
      - word: "лікар-хірург"
        emoji: "\U0001F468\U0000200D\U00002695"
        sentence: "Лікар-хірург оперує пацієнта."
      - word: "місто-герой"
        emoji: "\U0001F3F0"
        sentence: "Київ — місто-герой."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Визнач член речення за питанням"
    instruction: "Визнач, яким членом речення є виділене слово"
    categories:
      - label: "Додаток"
        items:
          - "Я бачу СЕСТРУ. (КОГО?)"
          - "Мама дала БРАТОВІ подарунок. (КОМУ?)"
          - "Він написав ЛИСТА. (ЩО?)"
          - "Ми допомагаємо ДРУГОВІ. (КОМУ?)"
      - label: "Означення"
        items:
          - "НОВА книга лежить на столі. (ЯКА?)"
          - "Це книга БРАТА. (ЧИЯ?)"
          - "МАМИН шарф дуже теплий. (ЧИЙ?)"
          - "Бажання ПРАЦЮВАТИ не зникло. (ЯКЕ?)"
      - label: "Обставина"
        items:
          - "Він читає ШВИДКО. (ЯК?)"
          - "Вона прийшла ВЧОРА. (КОЛИ?)"
          - "Діти грають НАДВОРІ. (ДЕ?)"
          - "Він вчиться ДЛЯ МАЙБУТНЬОГО. (НАВІЩО?)"

  - type: pattern_drill
    title: "Знайди додаток"
    prompt: "Визнач додаток у реченні"
    items:
      - given: "Я читаю газету."
        answer: "газету"
      - given: "Мама купила хліб."
        answer: "хліб"
      - given: "Він допомагає бабусі."
        answer: "бабусі"
      - given: "Ми написали лист."
        answer: "лист"
      - given: "Вона подарувала квіти подрузі."
        answer: "квіти, подрузі"
      - given: "Діти люблять морозиво."
        answer: "морозиво"
      - given: "Учитель пояснив правило учням."
        answer: "правило, учням"
      - given: "Вони побудували дім."
        answer: "дім"
      - given: "Батько ремонтує машину."
        answer: "машину"
      - given: "Студенти вивчають історію."
        answer: "історію"
      - given: "Він керує автобусом."
        answer: "автобусом"
      - given: "Ми захоплюємося музикою."
        answer: "музикою"

  - type: classify
    title: "Тип обставини"
    instruction: "Визнач тип обставини у реченні"
    categories:
      - label: "Обставина місця"
        items:
          - "Він живе В КИЄВІ."
          - "Книга лежить НА СТОЛІ."
      - label: "Обставина часу"
        items:
          - "Вона прийшла ВЧОРА."
          - "ЗРАНКУ ми вийшли з дому."
      - label: "Обставина способу дії"
        items:
          - "Він говорить ТИХО."
          - "Діти бігли ШВИДКО."
      - label: "Обставина причини"
        items:
          - "ВІД РАДОСТІ він заплакав."
          - "ЧЕРЕЗ ХВОРОБУ він не прийшов."
      - label: "Обставина мети"
        items:
          - "Він прийшов НАВЧАТИСЯ."
          - "Батько поїхав ЗА ПОКУПКАМИ."

  - type: build_sentence
    title: "Розгорни речення"
    instruction: "Додай означення та обставину до простого речення"
    sentences:
      - words: ["Хлопець", "читає", "книгу", "."]
        correct: "Високий хлопець уважно читає цікаву книгу."
      - words: ["Дівчина", "співає", "пісню", "."]
        correct: "Талановита дівчина гарно співає народну пісню."
      - words: ["Учень", "пише", "диктант", "."]
        correct: "Старанний учень акуратно пише складний диктант."
      - words: ["Бабуся", "готує", "вечерю", "."]
        correct: "Люба бабуся щовечора готує смачну вечерю."

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "У реченні «Книга брата лежить на столі» слово «брата» — це додаток."
        answer: false
        correction: "«Брата» — це неузгоджене означення (ЧИЯ книга?)."
      - statement: "У реченні «Читати — це корисно» підмет — «це»."
        answer: false
        correction: "Підмет — «читати» (інфінітив)."
      - statement: "Прикладка — це різновид означення."
        answer: true
      - statement: "«Місто-герой Київ» — прикладка пишеться через дефіс."
        answer: true
      - statement: "Обставина відповідає на питання ЯКИЙ?"
        answer: false
        correction: "На ЯКИЙ? відповідає означення. Обставина — ДЕ? КОЛИ? ЯК?"
      - statement: "У реченні «Він дуже втомився» слово «дуже» — обставина міри і ступеня."
        answer: true
      - statement: "У реченні «Журнал «Вогник» лежить тут» назва в лапках — це прикладка."
        answer: true
      - statement: "Неузгоджене означення змінюється разом з іменником."
        answer: false
        correction: "Неузгоджене означення НЕ змінює форми при зміні головного слова."

  - type: reading
    title: "Читання: Один день зі школи"
    text: |
      Зранку старанний учень Петро швидко зібрався до школи. У просторому класі вже сиділи однокласники. Учитель математики пояснив нову тему чітко і зрозуміло. Після уроку Петро пішов до бібліотеки за книгою. Бібліотекар-консультант допомогла йому знайти потрібний підручник. Увечері хлопець уважно виконав домашнє завдання.
    questions:
      - question: "Знайдіть обставину часу в першому реченні."
        answer: "Зранку."
      - question: "Яким членом речення є «старанний» у першому реченні?"
        answer: "Означення (ЯКИЙ учень?)."
      - question: "Знайдіть прикладку в тексті."
        answer: "Бібліотекар-консультант."

  - type: classify
    title: "Прикладка: дефіс, лапки чи без?"
    instruction: "Визнач правопис прикладки"
    categories:
      - label: "Через дефіс"
        items:
          - "місто-герой"
          - "лікар-хірург"
          - "хлопець-студент"
          - "дівчина-красуня"
      - label: "У лапках"
        items:
          - "журнал «Вогник»"
          - "опера «Наталка Полтавка»"
          - "газета «День»"
      - label: "Без дефісу і лапок"
        items:
          - "Президент Зеленський"
          - "річка Дніпро"
          - "учитель Іваненко"
