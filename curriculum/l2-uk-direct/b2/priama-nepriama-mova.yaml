module: priama-nepriama-mova
track: l2-uk-direct
level: b2
type: grammar
title: "Пряма і непряма мова"
subtitle: "Пунктуація прямої мови, перетворення на непряму, цитата"
standard_ref: "§4.2.3.8 — пряма і непряма мова"
textbook_ref: "Правопис 2019 §146; Клас 9 §9 — пряма мова, непряма мова, цитата"
teaching_notes: |
  Пряма мова — точні слова мовця. Непряма — переказ із зміною займенників.
  Українське правило: крапка — ЗА лапками (на відміну від англійської).
  Питальний і окличний знаки — ВСЕРЕДИНІ лапок.
  Автор → мова: двокрапка + лапки. Мова → автор: кома + тире.
  Перетворення: «Я прийду» → сказав, що він прийде; «Ти підеш?» → запитала, чи він піде.
  Цитата може бути частковою: Як казав Шевченко, «борітеся — поборете».

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Автор: «Мова». «Мова», — автор. Крапка — за лапками. ?! — всередині."
  examples:
    - "Він сказав: «Я прийду завтра»."
    - "«Я прийду завтра», — сказав він."
    - "Він запитав: «Ти прийдеш?»"
    - "Він сказав, що він прийде завтра. (непряма мова)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Пунктуація прямої мови"
    columns: ["Схема", "Приклад"]
    rows:
      - ["А: «П».", "Він сказав: «Я прийду завтра»."]
      - ["«П», — а.", "«Я прийду завтра», — сказав він."]
      - ["А: «П?»", "Він запитав: «Ти прийдеш?»"]
      - ["«П!» — а.", "«Іди сюди!» — крикнув він."]
      - ["А: «П!»", "Вона вигукнула: «Як гарно!»"]

  - title: "Пряма → непряма мова"
    columns: ["Пряма", "Непряма", "Зміна"]
    rows:
      - ["«Я прийду».", "...що він прийде.", "я → він, прийду → прийде"]
      - ["«Ти підеш?»", "...чи він піде.", "ти → він, ? → чи"]
      - ["«Ми зробимо це».", "...що вони зроблять це.", "ми → вони"]
      - ["«Приходь завтра!»", "...щоб він прийшов.", "наказовий → щоб + мин."]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Дієслова мовлення"
    items:
      - word: "сказати"
        emoji: "\U0001F5E3"
        sentence: "Він сказав: «Я прийду завтра»."
      - word: "запитати"
        emoji: "\U00002753"
        sentence: "Вона запитала: «Ти прийдеш?»"
      - word: "відповісти"
        emoji: "\U0001F4AC"
        sentence: "«Так», — відповів він."
      - word: "вигукнути"
        emoji: "\U00002757"
        sentence: "«Як гарно!» — вигукнула вона."
      - word: "прошепотіти"
        emoji: "\U0001F92B"
        sentence: "«Тихіше», — прошепотів він."
      - word: "пояснити"
        emoji: "\U0001F4A1"
        sentence: "Учитель пояснив: «Це правило дуже важливе»."

  - category: "Сполучники непрямої мови"
    items:
      - word: "що"
        emoji: "\U000027A1"
        sentence: "Він сказав, що прийде завтра."
      - word: "чи"
        emoji: "\U00002753"
        sentence: "Вона запитала, чи він прийде."
      - word: "щоб"
        emoji: "\U00002757"
        sentence: "Він попросив, щоб я прийшов."

  - category: "Пунктуаційні терміни"
    items:
      - word: "лапки"
        emoji: "\U0000201C"
        sentence: "Пряму мову беруть у лапки."
      - word: "двокрапка"
        emoji: "\U00002755"
        sentence: "Перед прямою мовою ставимо двокрапку."
      - word: "цитата"
        emoji: "\U0001F4DC"
        sentence: "Цитата — точне відтворення чужих слів."

  - category: "Слова для цитування"
    items:
      - word: "за словами"
        emoji: "\U0001F4AC"
        sentence: "За словами вчителя, це важлива тема."
      - word: "як казав"
        emoji: "\U0001F4DC"
        sentence: "Як казав Шевченко, «борітеся — поборете»."
      - word: "на думку"
        emoji: "\U0001F4AD"
        sentence: "На думку експертів, ситуація покращується."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Розстав пунктуацію прямої мови"
    prompt: "Додай лапки, двокрапку, коми, тире"
    items:
      - given: "Він сказав Я прийду завтра."
        answer: "Він сказав: «Я прийду завтра»."
      - given: "Я прийду завтра сказав він."
        answer: "«Я прийду завтра», — сказав він."
      - given: "Вона запитала Ти прийдеш?"
        answer: "Вона запитала: «Ти прийдеш?»"
      - given: "Іди сюди крикнув батько."
        answer: "«Іди сюди!» — крикнув батько."
      - given: "Учитель пояснив Це дуже важливо."
        answer: "Учитель пояснив: «Це дуже важливо»."
      - given: "Як гарно вигукнула дівчинка."
        answer: "«Як гарно!» — вигукнула дівчинка."
      - given: "Мама сказала Обідай і роби уроки."
        answer: "Мама сказала: «Обідай і роби уроки»."
      - given: "Не хвилюйся відповіла подруга."
        answer: "«Не хвилюйся», — відповіла подруга."
      - given: "Де ти був запитав батько."
        answer: "«Де ти був?» — запитав батько."
      - given: "Лікар порадив Пийте більше води."
        answer: "Лікар порадив: «Пийте більше води»."

  - type: pattern_drill
    title: "Перетвори на непряму мову"
    prompt: "Заміни пряму мову на непряму"
    items:
      - given: "Він сказав: «Я прийду завтра»."
        answer: "Він сказав, що він прийде завтра."
      - given: "Вона запитала: «Ти підеш на вечірку?»"
        answer: "Вона запитала, чи він піде на вечірку."
      - given: "Мама сказала: «Я купила хліб»."
        answer: "Мама сказала, що вона купила хліб."
      - given: "Він попросив: «Допоможи мені»."
        answer: "Він попросив, щоб я допоміг йому."
      - given: "Учитель сказав: «Ми напишемо контрольну»."
        answer: "Учитель сказав, що вони напишуть контрольну."
      - given: "Друг запитав: «Коли ти повернешся?»"
        answer: "Друг запитав, коли я повернуся."
      - given: "Бабуся сказала: «Я приготувала вареники»."
        answer: "Бабуся сказала, що вона приготувала вареники."
      - given: "Він крикнув: «Не чіпай це!»"
        answer: "Він крикнув, щоб я не чіпав це."

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "В українській мові крапка ставиться всередині лапок."
        answer: false
        correction: "Крапка ставиться ЗА лапками: «Я прийду»."
      - statement: "«Він запитав: «Ти прийдеш?»» — знак питання всередині лапок."
        answer: true
      - statement: "Перед прямою мовою ставиться двокрапка."
        answer: true
      - statement: "«Я прийду завтра, — сказав він.» — пунктуація правильна."
        answer: false
        correction: "Потрібні лапки: «Я прийду завтра», — сказав він."
      - statement: "При перетворенні на непряму мову питання → «чи»."
        answer: true
      - statement: "Цитата може бути частковою."
        answer: true
      - statement: "Після прямої мови з «!» ставиться кома."
        answer: false
        correction: "Після «!» ставиться тире: «Іди!» — крикнув він."
      - statement: "Непряма мова вводиться сполучниками що, чи, щоб."
        answer: true

  - type: build_sentence
    title: "Напиши діалог"
    instruction: "Оформи пряму мову правильно"
    sentences:
      - words: ["Мама", "сказала", ":", "Обідай", "."]
        correct: "Мама сказала: «Обідай»."
      - words: ["Де", "ти", "був", "?", "—", "запитав", "батько", "."]
        correct: "«Де ти був?» — запитав батько."
      - words: ["Я", "не", "знаю", ",", "—", "відповів", "хлопець", "."]
        correct: "«Я не знаю», — відповів хлопець."
      - words: ["Учитель", "пояснив", ":", "Це", "важлива", "тема", "."]
        correct: "Учитель пояснив: «Це важлива тема»."

  - type: reading
    title: "Читання: Газетна стаття"
    text: |
      Мер міста заявив: «Ми побудуємо новий парк цього літа». «Це давно очікуваний проєкт», — додав він. Мешканці запитують: «Коли почнеться будівництво?» Як зазначив мер, «перший етап розпочнеться у квітні». Журналісти також запитали, чи буде парк безкоштовним. Мер відповів, що вхід буде вільним для всіх.
    questions:
      - question: "Знайдіть усі речення з прямою мовою."
        answer: "1) Мер заявив: «Ми побудуємо...» 2) «Це давно очікуваний проєкт», — додав він. 3) Мешканці запитують: «Коли...?» 4) Як зазначив мер, «перший етап...»"
      - question: "Знайдіть речення з непрямою мовою."
        answer: "«Журналісти також запитали, чи буде парк безкоштовним» і «Мер відповів, що вхід буде вільним»."
      - question: "Перетворіть першу пряму мову на непряму."
        answer: "Мер міста заявив, що вони побудують новий парк цього літа."

  - type: classify
    title: "Пряма, непряма чи цитата?"
    instruction: "Визнач тип"
    categories:
      - label: "Пряма мова"
        items:
          - "Він сказав: «Я прийду»."
          - "«Допоможи!» — попросив він."
          - "Мама запитала: «Де ти був?»"
          - "«Це цікаво», — зауважив учитель."
      - label: "Непряма мова"
        items:
          - "Він сказав, що прийде."
          - "Вона запитала, чи він піде."
          - "Мама попросила, щоб я прийшов."
          - "Він повідомив, що роботу закінчено."
      - label: "Цитата"
        items:
          - "Як казав Шевченко, «борітеся — поборете»."
          - "За словами Франка, «праця — це єдиний скарб»."
          - "Як зазначив мер, «перший етап розпочнеться у квітні»."
          - "Відоме прислів'я говорить: «Без труда немає плода»."
