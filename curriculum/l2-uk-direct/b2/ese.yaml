module: ese
track: l2-uk-direct
level: b2
type: writing
title: "Есе"
subtitle: "Структура, типи та написання есе від 100 слів"
standard_ref: "§4.3.3 (есе)"
textbook_ref: "Grade 8 §12, §44, §56 — есе-роздум, есе-опис, есе-розповідь"
teaching_notes: |
  Три типи есе: роздум (висловити думку з аргументами), опис (описати місце, людину, враження),
  розповідь (розповісти історію з особистим значенням).
  Структура: вступ (2–3 речення, гачок + теза) → основна частина (2–3 абзаци) → висновок (2–3 речення).
  Перехідні слова: по-перше, по-друге, зокрема, до того ж, на завершення.
  Мінімальний обсяг на B2: 100 слів.

key_pattern:
  text: "Вступ: [гачок + теза]. Основна частина: [аргумент 1 + приклад], [аргумент 2 + приклад]. Висновок: [підсумок]."
  examples:
    - "Чи потрібно вивчати мови? Безперечно, так. По-перше, мова — ключ до культури. По-друге, мови розвивають мислення. Отже, вивчення мов збагачує життя."
    - "Мій день почався незвично. Зранку я побачив... На завершення, цей день я запам'ятаю надовго."

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Структура есе"
    items:
      - word: "вступ"
        emoji: "\U0001F4D6"
        sentence: "Вступ має зацікавити читача."
      - word: "основна частина"
        emoji: "\U0001F4DD"
        sentence: "В основній частині розкриваємо тему."
      - word: "абзац"
        emoji: "\U00002702"
        sentence: "Кожна думка — окремий абзац."
      - word: "мікротема"
        emoji: "\U0001F4CC"
        sentence: "Кожен абзац має свою мікротему."

  - category: "Типи есе"
    items:
      - word: "роздум"
        emoji: "\U0001F914"
        sentence: "Есе-роздум висловлює думку з аргументами."
      - word: "опис"
        emoji: "\U0001F5BC"
        sentence: "Есе-опис малює картину словами."
      - word: "розповідь"
        emoji: "\U0001F4D6"
        sentence: "Есе-розповідь — це особиста історія."

  - category: "Перехідні слова"
    items:
      - word: "по-перше"
        emoji: "\U00000031\U0000FE0F\U000020E3"
        sentence: "По-перше, це цікаво."
      - word: "по-друге"
        emoji: "\U00000032\U0000FE0F\U000020E3"
        sentence: "По-друге, це корисно."
      - word: "на завершення"
        emoji: "\U0001F3C1"
        sentence: "На завершення підсумую свої думки."
      - word: "до того ж"
        emoji: "\U00002795"
        sentence: "До того ж, є ще один важливий аспект."
      - word: "зокрема"
        emoji: "\U0001F4CD"
        sentence: "Зокрема, це стосується молоді."

  - category: "Оцінні слова"
    items:
      - word: "вражаючий"
        emoji: "\U00002728"
        sentence: "Вражаючий результат перевершив очікування."
      - word: "переконливий"
        emoji: "\U0001F4AA"
        sentence: "Його аргументи були переконливими."
      - word: "суперечливий"
        emoji: "\U0001F914"
        sentence: "Це суперечливе питання."
      - word: "значущий"
        emoji: "\U00002B50"
        sentence: "Це значущий внесок у науку."
      - word: "беззаперечний"
        emoji: "\U00002705"
        sentence: "Факт є беззаперечним."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Визнач тип есе"
    instruction: "Яке це есе: роздум, опис чи розповідь?"
    categories:
      - label: "Есе-роздум"
        items:
          - "Чи потрібно вивчати мови?"
          - "Чи замінить штучний інтелект учителів?"
      - label: "Есе-опис"
        items:
          - "Моє рідне місто"
          - "Ранок у горах"
      - label: "Есе-розповідь"
        items:
          - "День, який я запам'ятаю"
          - "Моя перша подорож"

  - type: build_sentence
    title: "Напиши вступ"
    instruction: "Склади вступ до есе на задану тему"
    sentences:
      - words: ["Чи", "потрібно", "вивчати", "іноземні", "мови", "?", "Безперечно", ",", "так", "."]
        correct: "Чи потрібно вивчати іноземні мови? Безперечно, так."
      - words: ["Моє", "рідне", "місто", "—", "невелике", ",", "але", "дуже", "затишне", "."]
        correct: "Моє рідне місто — невелике, але дуже затишне."
      - words: ["Той", "день", "почався", "як", "звичайний", ",", "але", "змінив", "моє", "життя", "."]
        correct: "Той день почався як звичайний, але змінив моє життя."

  - type: reading
    title: "Аналіз структури есе"
    text: |
      Чи потрібно обмежувати час за екраном? Вважаю, що так. По-перше, тривале сидіння за комп'ютером шкодить зору. Лікарі рекомендують робити перерви кожні 30 хвилин. По-друге, надмірне використання гаджетів зменшує живе спілкування. Наприклад, підлітки все менше зустрічаються з друзями наживо. До того ж, інтернет-залежність стає серйозною проблемою. Отже, розумне обмеження часу за екраном — це турбота про своє здоров'я та стосунки.
    questions:
      - question: "Де вступ цього есе?"
        answer: "Перше речення — запитання-гачок. Друге — теза: «Вважаю, що так.»"
      - question: "Скільки аргументів в основній частині?"
        answer: "Три: шкодить зору, зменшує спілкування, інтернет-залежність."
      - question: "Яке речення є висновком?"
        answer: "Останнє: «Отже, розумне обмеження часу за екраном — це турбота про своє здоров'я та стосунки.»"

  - type: build_sentence
    title: "Напиши висновок"
    instruction: "Склади висновок, що відповідає вступу"
    sentences:
      - words: ["Отже", ",", "вивчення", "мов", "—", "це", "інвестиція", "в", "майбутнє", "."]
        correct: "Отже, вивчення мов — це інвестиція в майбутнє."
      - words: ["На", "завершення", ",", "хочу", "сказати", ":", "це", "був", "найкращий", "день", "."]
        correct: "На завершення, хочу сказати: це був найкращий день."
      - words: ["Таким", "чином", ",", "спорт", "має", "бути", "частиною", "нашого", "життя", "."]
        correct: "Таким чином, спорт має бути частиною нашого життя."

  - type: pattern_drill
    title: "Перехідні слова"
    prompt: "Добери перехідне слово"
    items:
      - given: "___, читання розвиває словниковий запас."
        answer: "По-перше"
      - given: "___, воно тренує увагу."
        answer: "По-друге"
      - given: "___, це стосується дітей."
        answer: "Зокрема"
      - given: "___, є й інші переваги."
        answer: "До того ж"
      - given: "___, читання — корисна звичка."
        answer: "Отже"
      - given: "___, підсумую свої думки."
        answer: "На завершення"

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "Есе-роздум — це опис місця."
        answer: false
        correction: "Есе-роздум — це висловлення думки з аргументами. Опис місця — це есе-опис."
      - statement: "Вступ має зацікавити читача."
        answer: true
      - statement: "Висновок може вводити нові аргументи."
        answer: false
        correction: "Висновок підсумовує, а не вводить нове."
      - statement: "Есе на рівні B2 має бути від 100 слів."
        answer: true
      - statement: "Кожен абзац есе має свою мікротему."
        answer: true

  - type: proverb_drill
    title: "Прислів'я про слово і мову"
    items:
      - proverb: "Від красних слів язик не ___."
        answer: "відсохне"
      - proverb: "Кожна грубість починається зі ___."
        answer: "слабкості"
