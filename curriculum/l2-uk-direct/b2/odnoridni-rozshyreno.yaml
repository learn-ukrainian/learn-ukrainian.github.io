module: odnoridni-rozshyreno
track: l2-uk-direct
level: b2
type: grammar
title: "Однорідні члени речення"
subtitle: "Перелік, протиставлення, пунктуація з і/та/а/але"
standard_ref: "§4.2.3.4 — однорідні члени речення"
textbook_ref: "Клас 8 §52–57 — однорідні члени, пунктуація, однорідні/неоднорідні означення"
teaching_notes: |
  Однорідні члени — відповідають на одне питання, пов'язані з одним словом.
  Можуть бути будь-яким членом речення: підмети, присудки, додатки, означення, обставини.
  Кома: без сполучника — кома; з одиничним і/та/й — без коми;
  з повторюваним і...і, ні...ні, то...то — кома; з а/але/проте — завжди кома.
  Однорідні означення — описують однотипну ознаку (колір): червоні, жовті листки.
  Неоднорідні — різнотипні (розмір + матеріал): великий дерев'яний стіл — без коми.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Однорідні = одне питання + один член речення. Кома залежить від сполучника."
  examples:
    - "Я купив яблука, груші і сливи. (одне ЩО? — без коми перед і)"
    - "І Іван, і Марія прийшли. (повторюваний і...і — кома)"
    - "Маленький, але сильний. (але — завжди кома)"
    - "Великий дерев'яний стіл. (неоднорідні означення — без коми)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Коми з однорідними членами"
    columns: ["Правило", "Приклад", "Кома?"]
    rows:
      - ["Без сполучника", "Іван, Марія, Петро прийшли.", "Так"]
      - ["Одиничне і/та/й", "Іван і Марія прийшли.", "Ні"]
      - ["Повторюване і...і", "І Іван, і Марія прийшли.", "Так"]
      - ["Повторюване ні...ні", "Ні вітру, ні дощу.", "Так"]
      - ["Повторюване то...то", "То дощ, то сонце.", "Так"]
      - ["а / але / проте", "Маленький, але сильний.", "Так"]
      - ["або / чи (одиничне)", "Кава або чай?", "Ні"]

  - title: "Однорідні vs неоднорідні означення"
    columns: ["Тип", "Ознака", "Приклад", "Кома?"]
    rows:
      - ["Однорідні", "Однотипна ознака", "червоні, жовті, зелені листки", "Так"]
      - ["Неоднорідні", "Різнотипні ознаки", "великий дерев'яний стіл", "Ні"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
