# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Розстав коми"
    prompt: "Додай коми, де потрібно (або напиши «без ком»)"
    items:
      - given: "Він купив хліб масло і сир."
        answer: "Він купив хліб, масло і сир."
      - given: "І діти і дорослі прийшли на свято."
        answer: "І діти, і дорослі прийшли на свято."
      - given: "Маленький але сильний хлопець переміг."
        answer: "Маленький, але сильний хлопець переміг."
      - given: "Він читає і пише."
        answer: "без ком"
      - given: "Ні вітру ні дощу ні хмар."
        answer: "Ні вітру, ні дощу, ні хмар."
      - given: "То сонце то дощ то знову сонце."
        answer: "То сонце, то дощ, то знову сонце."
      - given: "Вона розумна працьовита і чесна."
        answer: "Вона розумна, працьовита і чесна."
      - given: "Каву або чай?"
        answer: "без ком"
      - given: "Він не прийшов а зателефонував."
        answer: "Він не прийшов, а зателефонував."
      - given: "Ми гуляли співали танцювали і сміялися."
        answer: "Ми гуляли, співали, танцювали і сміялися."
      - given: "Мама і тато поїхали."
        answer: "без ком"
      - given: "Було важко проте цікаво."
        answer: "Було важко, проте цікаво."

  - type: classify
    title: "Однорідні чи неоднорідні означення?"
    instruction: "Визнач, чи означення однорідні (кома) чи ні"
    categories:
      - label: "Однорідні (кома)"
        items:
          - "червоні, жовті, зелені листки"
          - "старий, зморшкуватий, втомлений чоловік"
          - "холодний, мокрий, сірий день"
          - "веселий, привітний, щирий хлопець"
      - label: "Неоднорідні (без коми)"
        items:
          - "великий дерев'яний стіл"
          - "старий добрий друг"
          - "маленька шкіряна сумка"
          - "нова міська бібліотека"

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "«Він купив хліб і масло» — потрібна кома перед «і»."
        answer: false
        correction: "Одиничне «і» — без коми."
      - statement: "«І діти, і дорослі прийшли» — коми правильні."
        answer: true
      - statement: "«Великий дерев'яний стіл» — потрібна кома."
        answer: false
        correction: "Неоднорідні означення (різні типи ознак) — без коми."
      - statement: "Перед «але» завжди ставимо кому."
        answer: true
      - statement: "«Ні вітру ні дощу» — без ком."
        answer: false
        correction: "Повторюване «ні...ні» — з комами: «Ні вітру, ні дощу»."
      - statement: "Однорідні члени відповідають на різні питання."
        answer: false
        correction: "Однорідні члени відповідають на ОДНЕ питання."
      - statement: "«Він читає, пише і малює» — правильна пунктуація."
        answer: true
      - statement: "«Червоні жовті зелені листки» — без ком."
        answer: false
        correction: "Однорідні означення (всі — колір) — з комами."

  - type: build_sentence
    title: "Розгорни з однорідними"
    instruction: "Розгорни речення, додавши однорідні члени"
    sentences:
      - words: ["Я", "люблю", "фрукти", "."]
        correct: "Я люблю яблука, груші, сливи і вишні."
      - words: ["Він", "добре", "вчиться", "."]
        correct: "Він читає, пише, рахує і розв'язує задачі."
      - words: ["На", "столі", "лежать", "речі", "."]
        correct: "На столі лежать книги, зошити, ручки і олівці."
      - words: ["Вона", "гарна", "людина", "."]
        correct: "Вона розумна, привітна, чесна і працьовита людина."

  - type: reading
    title: "Читання: Осінній парк"
    text: |
      В осінньому парку все змінилося. Червоні, жовті, оранжеві листки вкрили доріжки. Старі могутні дуби стояли непорушно. Діти бігали, стрибали і збирали каштани. Ні птахів, ні метеликів — тільки вітер і тиша. Парк був красивий, але сумний.
    questions:
      - question: "Знайдіть однорідні означення."
        answer: "«Червоні, жовті, оранжеві» (однорідні — всі описують колір)."
      - question: "Знайдіть неоднорідні означення."
        answer: "«Старі могутні дуби» (різні типи ознак — вік і сила)."
      - question: "Знайдіть однорідні присудки."
        answer: "«Бігали, стрибали і збирали»."

  - type: pattern_drill
    title: "Об'єднай в одне речення"
    prompt: "Склади одне речення з однорідними членами"
    items:
      - given: "Він читає. Він пише. Він малює."
        answer: "Він читає, пише і малює."
      - given: "Мама готує суп. Мама готує кашу. Мама готує салат."
        answer: "Мама готує суп, кашу і салат."
      - given: "Було холодно. Було мокро. Було вітряно."
        answer: "Було холодно, мокро і вітряно."
      - given: "Він говорить англійською. Він говорить французькою. Він говорить німецькою."
        answer: "Він говорить англійською, французькою і німецькою."
      - given: "На вулиці гуляють діти. На вулиці гуляють дорослі. На вулиці гуляють собаки."
        answer: "На вулиці гуляють діти, дорослі і собаки."
      - given: "Вона працює вранці. Вона працює вдень. Вона працює ввечері."
        answer: "Вона працює вранці, вдень і ввечері."
