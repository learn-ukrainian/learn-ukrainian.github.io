    items:
      - word: "і"
        emoji: "\U00002795"
        sentence: "Іван і Марія — друзі."
      - word: "та"
        emoji: "\U00002795"
        sentence: "Мама та тато пішли на роботу."
      - word: "або"
        emoji: "\U00002194"
        sentence: "Кава або чай?"
      - word: "чи"
        emoji: "\U00002753"
        sentence: "Ти підеш чи залишишся?"
      - word: "але"
        emoji: "\U0001F6AB"
        sentence: "Маленький, але хоробрий."
      - word: "проте"
        emoji: "\U0001F914"
        sentence: "Було важко, проте цікаво."

  - category: "Прикметники для вправ"
    items:
      - word: "червоний"
        emoji: "\U0001F534"
        sentence: "Червоні, жовті, зелені листки впали."
      - word: "старий"
        emoji: "\U0001F9D3"
        sentence: "Старий добрий друг завітав у гості."
      - word: "зморшкуватий"
        emoji: "\U0001F9D3"
        sentence: "Старий, зморшкуватий, втомлений чоловік сів на лаву."
      - word: "дерев'яний"
        emoji: "\U0001FAB5"
        sentence: "Великий дерев'яний стіл стоїть посередині кімнати."

  - category: "Іменники для переліків"
    items:
      - word: "яблуко"
        emoji: "\U0001F34E"
        sentence: "Я купив яблука, груші і сливи."
      - word: "груша"
        emoji: "\U0001F350"
        sentence: "Груші дозрівають у серпні."
      - word: "слива"
        emoji: "\U0001FAD0"
        sentence: "Сливи цього року дуже солодкі."
      - word: "вишня"
        emoji: "\U0001F352"
        sentence: "Я люблю яблука, груші, сливи і вишні."

