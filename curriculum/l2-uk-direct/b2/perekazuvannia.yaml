# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: reading
    title: "Визнач тип переказу"
    text: |
      Прочитайте уривок і визначте, який тип переказу потрібен.

      Текст: «Карпати — найвища гірська система України. Найвища точка — гора Говерла (2061 м). У Карпатах живуть ведмеді, вовки, рисі. Клімат вологий, з великою кількістю опадів. Ліси вкривають більшу частину гір. Тут є багато мінеральних джерел. Карпати — популярне місце для туризму. Щорічно тисячі людей піднімаються на Говерлу.»

      Завдання 1: Перекажіть усе для путівника (збережіть стиль).
      Завдання 2: Перекажіть у двох реченнях для друга.
      Завдання 3: Перекажіть тільки про тваринний світ.
    questions:
      - question: "Який тип переказу потрібен для завдання 1?"
        answer: "Докладний — треба відтворити весь текст, зберігаючи стиль."
      - question: "Який тип переказу для завдання 2?"
        answer: "Стислий — лише головна інформація у двох реченнях."
      - question: "Який тип переказу для завдання 3?"
        answer: "Вибірковий — тільки інформація про тварин."

  - type: build_sentence
    title: "Стислий переказ"
    instruction: "Склади стисле речення, що передає головну думку"
    sentences:
      - words: ["Карпати", "—", "найвища", "гірська", "система", "України", ",", "популярна", "серед", "туристів", "."]
        correct: "Карпати — найвища гірська система України, популярна серед туристів."
      - words: ["Головна", "думка", "тексту", "—", "важливість", "збереження", "природи", "."]
        correct: "Головна думка тексту — важливість збереження природи."
      - words: ["Автор", "стверджує", ",", "що", "освіта", "змінює", "життя", "."]
        correct: "Автор стверджує, що освіта змінює життя."

  - type: pattern_drill
    title: "Головне чи деталь?"
    prompt: "Визнач: це головна думка чи деталь? (для стислого переказу)"
    items:
      - given: "Карпати — найвища гірська система України."
        answer: "головна думка"
      - given: "Найвища точка — гора Говерла (2061 м)."
        answer: "деталь"
      - given: "Клімат вологий."
        answer: "деталь"
      - given: "Карпати — популярне місце для туризму."
        answer: "головна думка"
      - given: "Щорічно тисячі людей піднімаються на Говерлу."
        answer: "деталь"
      - given: "У Карпатах живуть ведмеді, вовки, рисі."
        answer: "деталь"

  - type: build_sentence
    title: "Вибірковий переказ"
    instruction: "Склади речення для вибіркового переказу (тема: клімат)"
    sentences:
      - words: ["У", "Карпатах", "вологий", "клімат", "з", "великою", "кількістю", "опадів", "."]
        correct: "У Карпатах вологий клімат з великою кількістю опадів."
      - words: ["Ліси", "вкривають", "більшу", "частину", "гір", "."]
        correct: "Ліси вкривають більшу частину гір."

  - type: reading
    title: "Порівняй два переказі"
    text: |
      Оригінал: «Київ — столиця України, одне з найстаріших міст Європи. Місто розташоване на берегах Дніпра. У Києві живе близько трьох мільйонів людей. Тут багато парків, музеїв і храмів. Найвідоміша пам'ятка — Києво-Печерська лавра.»

      Переказ А: «Київ — столиця України. Це старе місто на Дніпрі з трьома мільйонами мешканців.»

      Переказ Б: «Київ — столиця і одне з найстаріших міст Європи. Він стоїть на Дніпрі. Три мільйони людей живуть тут. Є парки, музеї, храми. Найвідоміша — Лавра.»
    questions:
      - question: "Який переказ стисліший — А чи Б?"
        answer: "Переказ А — він містить лише два речення з головною інформацією."
      - question: "Який переказ точніший?"
        answer: "Переказ Б — він зберігає більше деталей оригіналу."
      - question: "Чого бракує в переказі А?"
        answer: "Інформації про парки, музеї та Лавру."

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "Стислий переказ зберігає всі деталі оригіналу."
        answer: false
        correction: "Стислий переказ передає лише головні думки, опускаючи деталі."
      - statement: "Вибірковий переказ висвітлює тільки одну тему з тексту."
        answer: true
      - statement: "Перед переказом варто скласти план."
        answer: true
      - statement: "Докладний переказ стискає текст наполовину."
        answer: false
        correction: "Докладний переказ відтворює текст повністю, зберігаючи стиль. Стискає стислий."
      - statement: "У переказ можна додавати нову інформацію."
        answer: false
        correction: "Переказ відтворює тільки те, що є в оригіналі."
