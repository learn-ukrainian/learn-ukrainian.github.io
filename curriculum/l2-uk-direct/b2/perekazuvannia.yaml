module: perekazuvannia
track: l2-uk-direct
level: b2
type: writing
title: "Переказування"
subtitle: "Докладний, стислий та вибірковий переказ"
standard_ref: "§4.3.3 (переказ)"
textbook_ref: "Grade 8 — докладний, стислий, вибірковий переказ"
teaching_notes: |
  Три типи переказу: докладний (усе, зберігаючи стиль), стислий (тільки головне, стиснення),
  вибірковий (лише частини на задану тему).
  Техніка: прочитати двічі → скласти план (мікротеми) → переказати за планом → перевірити.
  Стислий переказ стискає текст на ~50%. Вибірковий — вибирає лише релевантне.
  Це ключова навичка для роботи з текстами на B2.

key_pattern:
  text: "Головна думка тексту — [ідея]. Автор стверджує, що [факт]. У тексті йдеться про [тема]."
  examples:
    - "Головна думка тексту — важливість освіти. Автор стверджує, що знання змінюють життя."
    - "У тексті йдеться про екологічні проблеми сучасного міста."

