module: tekst-budova
track: l2-uk-direct
level: b2
type: grammar
title: "Текст: будова, зв'язність, ключові слова"
subtitle: "Тема, основна думка, мікротема, абзац — як тримається текст"
standard_ref: "§4.3.1 — будова тексту"
textbook_ref: "Клас 9 §33–35 — тема, основна думка, мікротема, абзац, ключові слова"
teaching_notes: |
  Текст — це не набір речень, а зв'язне ціле. П'ять компонентів:
  Тема — про що текст (Про що цей текст?).
  Основна думка — що хоче сказати автор (Що автор хоче сказати?).
  Мікротема — тема одного абзацу (підтема).
  Абзац — візуальна одиниця, зазвичай = одна мікротема.
  Ключові слова — слова, що несуть основний зміст.
  Учень повинен уміти: визначити тему і думку, виділити мікротеми, знайти ключові слова.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Текст = тема + основна думка + мікротеми (абзаци) + ключові слова + зв'язки."
  examples:
    - "Тема: Забруднення повітря."
    - "Основна думка: Людство повинно зменшити викиди."
    - "Мікротема 1: Причини забруднення."
    - "Мікротема 2: Наслідки для здоров'я."
    - "Мікротема 3: Шляхи вирішення."

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Компоненти тексту"
    columns: ["Компонент", "Питання", "Приклад"]
    rows:
      - ["Тема", "Про що цей текст?", "Про забруднення повітря."]
      - ["Основна думка", "Що хоче сказати автор?", "Треба зменшити викиди."]
      - ["Мікротема", "Про що цей абзац?", "Причини забруднення."]
      - ["Абзац", "Яка візуальна одиниця?", "Один абзац = одна мікротема."]
      - ["Ключові слова", "Які слова головні?", "Забруднення, викиди, здоров'я."]

  - title: "Засоби зв'язку між реченнями"
    columns: ["Засіб", "Приклад"]
    rows:
      - ["Займенники", "Київ — столиця. Він розташований на Дніпрі."]
      - ["Синоніми", "Місто росте. Мегаполіс змінюється."]
      - ["Сполучники", "По-перше... По-друге... Отже..."]
      - ["Повтор ключового слова", "Вода — це життя. Без води неможливе існування."]
      - ["Вставні слова", "Крім того... Таким чином..."]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Компоненти тексту"
    items:
      - word: "тема"
        emoji: "\U0001F4CB"
        sentence: "Тема тексту — екологія міста."
      - word: "основна думка"
        emoji: "\U0001F4A1"
        sentence: "Основна думка — місту потрібно більше парків."
      - word: "мікротема"
        emoji: "\U0001F4D1"
        sentence: "Кожен абзац має свою мікротему."
      - word: "абзац"
        emoji: "\U000000B6"
        sentence: "Новий абзац починається з нового рядка."
      - word: "ключове слово"
        emoji: "\U0001F511"
        sentence: "Ключові слова допомагають зрозуміти зміст."

  - category: "Засоби зв'язку"
    items:
      - word: "крім того"
        emoji: "\U00002795"
        sentence: "Крім того, існують й інші причини."
      - word: "таким чином"
        emoji: "\U000027A1"
        sentence: "Таким чином, проблему можна вирішити."
      - word: "отже"
        emoji: "\U000027A1"
        sentence: "Отже, підсумовуємо сказане."
      - word: "з одного боку"
        emoji: "\U0001F448"
        sentence: "З одного боку, це корисно."
      - word: "з іншого боку"
        emoji: "\U0001F449"
        sentence: "З іншого боку, є ризики."
      - word: "насамперед"
        emoji: "\U00000031"
        sentence: "Насамперед, треба визначити проблему."

  - category: "Аналітичні дієслова"
    items:
      - word: "визначити"
        emoji: "\U0001F3AF"
        sentence: "Визначте тему тексту."
      - word: "виділити"
        emoji: "\U0001F4CC"
        sentence: "Виділіть ключові слова."
      - word: "порівняти"
        emoji: "\U00002194"
        sentence: "Порівняйте основні думки двох текстів."
      - word: "узагальнити"
        emoji: "\U0001F4E6"
        sentence: "Узагальніть зміст у одному реченні."
      - word: "сформулювати"
        emoji: "\U0000270D"
        sentence: "Сформулюйте основну думку тексту."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: reading
    title: "Аналіз тексту: тема, думка, мікротеми"
    text: |
      Забруднення повітря стало однією з найсерйозніших проблем сучасних міст. Щодня мільйони автомобілів викидають у атмосферу шкідливі речовини. Заводи і фабрики додають до цього промислові відходи.

      Наслідки забруднення відчуває кожна людина. Лікарі фіксують зростання захворювань дихальних шляхів. Алергії, астма, хронічний бронхіт — ці хвороби стають нормою для мешканців великих міст.

      Вирішити проблему можна. Насамперед, треба розвивати громадський транспорт. Крім того, сучасні фільтри зменшують промислові викиди. Нарешті, кожен може обирати велосипед замість автомобіля.
    questions:
      - question: "Визначте тему тексту."
        answer: "Забруднення повітря в містах."
      - question: "Сформулюйте основну думку."
        answer: "Забруднення повітря — серйозна проблема, яку можна вирішити спільними зусиллями."
      - question: "Визначте мікротему кожного абзацу."
        answer: "1) Причини забруднення. 2) Наслідки для здоров'я. 3) Шляхи вирішення."

  - type: pattern_drill
    title: "Мікротема → абзац"
    prompt: "Визнач, до якого абзацу належить мікротема"
    items:
      - given: "Причини забруднення"
        answer: "Абзац 1 (автомобілі, заводи)"
      - given: "Наслідки для здоров'я"
        answer: "Абзац 2 (хвороби, алергії)"
      - given: "Шляхи вирішення"
        answer: "Абзац 3 (транспорт, фільтри, велосипед)"

  - type: build_sentence
    title: "Напиши тематичне речення"
    instruction: "Напиши перше речення абзацу для заданої мікротеми"
    sentences:
      - words: ["Мікротема:", "переваги", "читання"]
        correct: "Читання книг має багато переваг для розвитку людини."
      - words: ["Мікротема:", "проблеми", "молоді"]
        correct: "Сучасна молодь стикається з багатьма викликами."
      - words: ["Мікротема:", "захист", "природи"]
        correct: "Захист навколишнього середовища — обов'язок кожного."

  - type: classify
    title: "Ключові чи неключові слова?"
    instruction: "Визнач ключові слова тексту про забруднення повітря"
    categories:
      - label: "Ключові"
        items:
          - "забруднення"
          - "повітря"
          - "викиди"
          - "здоров'я"
          - "транспорт"
          - "вирішення"
      - label: "Неключові"
        items:
          - "кожен"
          - "сучасний"
          - "великий"
          - "цей"
          - "також"
          - "дуже"

  - type: reading
    title: "Порівняй два тексти"
    text: |
      Текст А: Інтернет змінив наше життя на краще. Ми маємо доступ до інформації, можемо спілкуватися з людьми з усього світу, вчитися онлайн. Інтернет — це інструмент прогресу.

      Текст Б: Інтернет створює серйозні ризики. Залежність від соціальних мереж, фейкові новини, кібербулінг — це реальні загрози. Суспільство повинно навчитися контролювати цифровий простір.
    questions:
      - question: "Визначте тему обох текстів."
        answer: "Обидва тексти про Інтернет."
      - question: "Порівняйте основні думки."
        answer: "Текст А: Інтернет — це благо і прогрес. Текст Б: Інтернет — це загроза, потрібен контроль."
      - question: "Знайдіть ключові слова тексту Б."
        answer: "Ризики, залежність, фейкові новини, кібербулінг, загрози, контролювати."

  - type: build_sentence
    title: "Напиши текст із трьох абзаців"
    instruction: "Напиши текст на тему «Моє місто» з трьома мікротемами"
    sentences:
      - words: ["Абзац", "1:", "розташування", "і", "загальна", "характеристика"]
        correct: "Моє місто розташоване на березі річки. Це невелике, але затишне місто з давньою історією."
      - words: ["Абзац", "2:", "визначні", "місця"]
        correct: "У місті є кілька визначних місць. Найстаріша церква була побудована у XVII столітті."
      - words: ["Абзац", "3:", "чому", "я", "люблю", "це", "місто"]
        correct: "Я люблю своє місто за його атмосферу. Тут завжди спокійно і привітно."

  - type: tongue_twister
    title: "Скоромовка"
    text: "Черепаха чаплю вечором пригощала чаєм з печивом."
