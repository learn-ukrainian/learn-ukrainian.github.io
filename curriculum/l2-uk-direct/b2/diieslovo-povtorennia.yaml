module: diieslovo-povtorennia
track: l2-uk-direct
level: b2
type: review
title: "Дієслово: повторення"
subtitle: "Час, вид, дієвідміна — усе разом"
standard_ref: "§4.2.1.2 — консолідація дієслівної парадигми"
textbook_ref: "7 клас §36–43 — дієслово: час, вид, дієвідміна"
teaching_notes: |
  Модуль-повторення: учень уже знає всі три часи, обидва види, обидві дієвідміни з рівнів A1–B1.
  Мета — звести все до єдиної таблиці й закрити прогалини.
  Уперше вводимо поняття перехідності: ЩО? КОГО? → перехідне / без додатка → неперехідне.
  Не перевантажуйте винятками — головне, щоб учень упевнено оперував базовою системою.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Дієслово змінюється за часом, видом і дієвідміною. Перехідне дієслово вимагає додатка (КОГО? ЩО?)."
  examples:
    - "читати (недоконаний) → прочитати (доконаний)"
    - "читає (теперішній), читав (минулий), читатиме (майбутній)"
    - "читати книгу (перехідне) — спати (неперехідне)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Три часи дієслова"
    columns: ["Час", "Приклад", "Питання"]
    rows:
      - ["Теперішній", "я читаю", "ЩО РОБЛЮ?"]
      - ["Минулий", "я читав / читала", "ЩО РОБИВ / РОБИЛА?"]
      - ["Майбутній (складений)", "я буду читати", "ЩО БУДУ РОБИТИ?"]
      - ["Майбутній (простий)", "я прочитаю", "ЩО ЗРОБЛЮ?"]

  - title: "Два види дієслова"
    columns: ["Вид", "Значення", "Приклад"]
    rows:
      - ["Недоконаний", "дія тривала / повторювана", "писати, читати, робити"]
      - ["Доконаний", "дія завершена / одноразова", "написати, прочитати, зробити"]

  - title: "Дві дієвідміни"
    columns: ["Дієвідміна", "Закінчення 3 ос. одн.", "Приклади"]
    rows:
      - ["І (-е / -є)", "читає, пише, малює", "читати, писати, малювати"]
      - ["ІІ (-и / -і)", "робить, бачить, стоїть", "робити, бачити, стояти"]

  - title: "Перехідність дієслова"
    columns: ["Тип", "Питання", "Приклад"]
    rows:
      - ["Перехідне", "ЩО? / КОГО?", "читати (що?) книгу, бачити (кого?) друга"]
      - ["Неперехідне", "без прямого додатка", "спати, іти, сидіти"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Неправильні дієслова"
    items:
      - word: "їсти"
        emoji: "\U0001F35E"
        sentence: "Він їсть яблуко на сніданок."
      - word: "дати"
        emoji: "\U0001F91D"
        sentence: "Дай мені, будь ласка, воду."
      - word: "бути"
        emoji: "\U00002728"
        sentence: "Вона буде лікаркою."
      - word: "хотіти"
        emoji: "\U0001F4AD"
        sentence: "Я хочу вивчити українську."

  - category: "Видові пари"
    items:
      - word: "писати"
        emoji: "\U0000270D"
        sentence: "Він писав лист увесь вечір."
      - word: "написати"
        emoji: "\U00002709"
        sentence: "Вона написала лист за п'ять хвилин."
      - word: "робити"
        emoji: "\U0001F528"
        sentence: "Що ти робиш?"
      - word: "зробити"
        emoji: "\U00002705"
        sentence: "Я вже зробив домашнє завдання."
      - word: "читати"
        emoji: "\U0001F4D6"
        sentence: "Він читає газету щоранку."
      - word: "прочитати"
        emoji: "\U0001F4DA"
        sentence: "Я прочитав цю книгу за два дні."

  - category: "Перехідні й неперехідні"
    items:
      - word: "бачити"
        emoji: "\U0001F440"
        sentence: "Я бачу гори вдалині."
      - word: "спати"
        emoji: "\U0001F634"
        sentence: "Дитина спить міцно."
      - word: "будувати"
        emoji: "\U0001F3D7"
        sentence: "Робітники будують новий міст."
      - word: "іти"
        emoji: "\U0001F6B6"
        sentence: "Ми йдемо до парку."
      - word: "вчити"
        emoji: "\U0001F393"
        sentence: "Вона вчить нові слова щодня."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Розподіли за часом"
    instruction: "Визнач час дієслівної форми: теперішній, минулий чи майбутній"
    categories:
      - label: "Теперішній"
        items:
          - "пишу"
          - "бачить"
          - "малюємо"
          - "стоять"
          - "говориш"
          - "їдуть"
      - label: "Минулий"
        items:
          - "написав"
          - "бачила"
          - "прийшли"
          - "зробив"
          - "читала"
          - "стояв"
      - label: "Майбутній"
        items:
          - "буду писати"
          - "побачить"
          - "зроблю"
          - "прийдемо"
          - "читатиме"
          - "будуть малювати"

  - type: classify
    title: "Доконаний чи недоконаний?"
    instruction: "Визнач вид дієслова"
    categories:
      - label: "Доконаний"
        items:
          - "зробив"
          - "прочитав"
          - "написала"
          - "побачив"
          - "приготувала"
          - "вивчив"
          - "збудував"
      - label: "Недоконаний"
        items:
          - "робив"
          - "читав"
          - "писала"
          - "бачив"
          - "готувала"
          - "вчив"
          - "будував"

  - type: pattern_drill
    title: "Проспрягай дієслово"
    prompt: "Утвори форму 3-ї особи однини теперішнього часу"
    items:
      - given: "читати → ?"
        answer: "читає"
      - given: "робити → ?"
        answer: "робить"
      - given: "писати → ?"
        answer: "пише"
      - given: "бачити → ?"
        answer: "бачить"
      - given: "малювати → ?"
        answer: "малює"
      - given: "стояти → ?"
        answer: "стоїть"
      - given: "говорити → ?"
        answer: "говорить"
      - given: "їхати → ?"
        answer: "їде"
      - given: "нести → ?"
        answer: "несе"
      - given: "сидіти → ?"
        answer: "сидить"
      - given: "ходити → ?"
        answer: "ходить"
      - given: "вчити → ?"
        answer: "вчить"

  - type: true_false
    title: "Правда чи ні?"
    items:
      - statement: "«Я написав листа» — це теперішній час."
        answer: false
        correction: "Минулий час, доконаний вид."
      - statement: "«Буду читати» — це складений майбутній час."
        answer: true
      - statement: "«Робити» — це дієслово доконаного виду."
        answer: false
        correction: "Недоконаний вид. Доконаний — «зробити»."
      - statement: "«Бачити» — І дієвідміна."
        answer: false
        correction: "«Бачить» — закінчення -ить, ІІ дієвідміна."
      - statement: "«Спати» — перехідне дієслово."
        answer: false
        correction: "Неперехідне — не має прямого додатка."
      - statement: "«Малювати картину» — перехідне дієслово."
        answer: true
      - statement: "«Читає» — ІІ дієвідміна."
        answer: false
        correction: "Закінчення -є, це І дієвідміна."
      - statement: "«Прийшли» — минулий час, доконаний вид."
        answer: true

  - type: classify
    title: "Перехідне чи неперехідне?"
    instruction: "Визнач: дієслово перехідне (КОГО? ЩО?) чи неперехідне"
    categories:
      - label: "Перехідне"
        items:
          - "читати (що?) книгу"
          - "бачити (кого?) друга"
          - "будувати (що?) дім"
          - "вчити (що?) мову"
          - "писати (що?) листа"
      - label: "Неперехідне"
        items:
          - "спати"
          - "іти"
          - "сидіти"
          - "стояти"
          - "летіти"

  - type: reading
    title: "Читання: Мій звичайний день"
    text: |
      Я прокидаюся о сьомій ранку. Встаю, вмиваюся і снідаю. Зазвичай їм кашу або бутерброд. Потім іду на роботу. Працюю до п'ятої. Увечері повертаюся додому, готую вечерю. Вчора приготував борщ — вийшов смачний. Завтра буду готувати вареники. Після вечері читаю книгу або дивлюся фільм. Лягаю спати о одинадцятій.
    questions:
      - question: "Знайди дієслова теперішнього часу."
        answer: "Прокидаюся, встаю, вмиваюся, снідаю, їм, іду, працюю, повертаюся, готую, читаю, дивлюся, лягаю."
      - question: "Які дієслова минулого часу є в тексті?"
        answer: "Приготував, вийшов."
      - question: "Знайди дієслово майбутнього часу."
        answer: "Буду готувати."
