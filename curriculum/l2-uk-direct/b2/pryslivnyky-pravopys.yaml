module: pryslivnyky-pravopys
track: l2-uk-direct
level: b2
type: grammar
title: "Правопис прислівників"
subtitle: "Разом, окремо, через дефіс"
standard_ref: "§4.2.1.5 — прислівник: правопис"
textbook_ref: "7 клас §64–68 — правопис прислівників"
teaching_notes: |
  Три способи написання прислівників: разом, окремо, через дефіс.
  Разом: префікси в-/у-, на-, за-, без- (вгорі, навколо, безперервно); щоденно, повсюди.
  Через дефіс: по- + -ськи/-зьки/-цьки (по-українськи); повторення (де-не-де, час-від-часу);
  -небудь, будь-, казна-, хтозна- (де-небудь, будь-коли).
  Окремо: прийменник + іменник (не злились): на жаль, на щастя, до речі, без кінця.
  Найчастіша помилка: «по-українськи» пишуть разом або «на жаль» — разом.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Разом: префікси (вгорі, навколо). Через дефіс: по- + -ськи, повторення, -небудь. Окремо: прийменник + іменник (на жаль)."
  examples:
    - "вгорі, навколо, безперервно (разом)"
    - "по-українськи, по-дружньому, де-не-де (через дефіс)"
    - "на жаль, до речі, на щастя (окремо)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Прислівники разом"
    columns: ["Правило", "Приклади"]
    rows:
      - ["Префікси в-/у-, на-, за-, без-", "вгорі, удвічі, навколо, завтра, безперервно"]
      - ["Префікси пов-, що-", "повсюди, повсякчас, щодня, щоранку"]

  - title: "Прислівники через дефіс"
    columns: ["Правило", "Приклади"]
    rows:
      - ["по- + -ськи/-зьки/-цьки/-ому/-ему", "по-українськи, по-дружньому, по-перше"]
      - ["Повторення / парні слова", "де-не-де, час-від-часу, тишком-нишком, мало-помалу"]
      - ["-небудь, будь-, казна-, хтозна-", "де-небудь, будь-коли, казна-де, хтозна-як"]

  - title: "Прислівники окремо"
    columns: ["Правило", "Приклади"]
    rows:
      - ["Прийменник + іменник (не злились)", "на жаль, на щастя, до речі, без кінця"]
      - ["Прийменник + іменник (сталий вираз)", "до побачення, в цілому, на відміну"]

