# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Разом, окремо чи через дефіс?"
    instruction: "Визнач правильне написання"
    categories:
      - label: "Разом"
        items:
          - "вгорі"
          - "навколо"
          - "безперервно"
          - "щодня"
          - "повсюди"
          - "щоранку"
          - "удвічі"
      - label: "Через дефіс"
        items:
          - "по-українськи"
          - "по-дружньому"
          - "де-не-де"
          - "час-від-часу"
          - "мало-помалу"
          - "по-перше"
          - "будь-коли"
      - label: "Окремо"
        items:
          - "на жаль"
          - "на щастя"
          - "до речі"
          - "без кінця"
          - "до побачення"
          - "в цілому"

  - type: true_false
    title: "Правильно написано?"
    items:
      - statement: "«Поукраїнськи» пишеться разом."
        answer: false
        correction: "Через дефіс: «по-українськи» (по- + -ськи)."
      - statement: "«Щодня» пишеться разом."
        answer: true
      - statement: "«Нажаль» пишеться разом."
        answer: false
        correction: "Окремо: «на жаль» (прийменник + іменник)."
      - statement: "«Час-від-часу» пишеться через дефіс."
        answer: true
      - statement: "«Будь коли» пишеться окремо."
        answer: false
        correction: "Через дефіс: «будь-коли»."
      - statement: "«Навколо» пишеться разом."
        answer: true
      - statement: "«Денебудь» пишеться разом."
        answer: false
        correction: "Через дефіс: «де-небудь»."
      - statement: "«До побачення» пишеться окремо."
        answer: true

  - type: pattern_drill
    title: "Напиши правильно"
    prompt: "Запиши прислівник правильно"
    items:
      - given: "по + дружній → ?"
        answer: "по-дружньому"
      - given: "по + перший → ?"
        answer: "по-перше"
      - given: "по + українська → ?"
        answer: "по-українськи"
      - given: "по + новий → ?"
        answer: "по-новому"
      - given: "де + небудь → ?"
        answer: "де-небудь"
      - given: "будь + коли → ?"
        answer: "будь-коли"
      - given: "казна + де → ?"
        answer: "казна-де"
      - given: "по + батьківськи → ?"
        answer: "по-батьківськи"
      - given: "мало + помалу → ?"
        answer: "мало-помалу"
      - given: "по + друге → ?"
        answer: "по-друге"
      - given: "тишком + нишком → ?"
        answer: "тишком-нишком"
      - given: "хтозна + як → ?"
        answer: "хтозна-як"

  - type: classify
    title: "Яке правило?"
    instruction: "Визнач правило написання через дефіс"
    categories:
      - label: "по- + -ськи/-ому/-ему"
        items:
          - "по-українськи"
          - "по-дружньому"
          - "по-батьківськи"
          - "по-новому"
      - label: "Повторення / парні слова"
        items:
          - "де-не-де"
          - "час-від-часу"
          - "тишком-нишком"
          - "мало-помалу"
      - label: "-небудь / будь- / казна-"
        items:
          - "де-небудь"
          - "будь-коли"
          - "казна-де"
          - "хтозна-як"

  - type: reading
    title: "Знайди помилки"
    text: |
      Сьогодні ми поїхали за місто. Навколо було дуже гарно. По українськи це називається «природа». Нажаль, погода зіпсувалася. Денеде ще світило сонце, але малопомалу хмари закрили небо. По перше, ми сховалися під деревом. Подруге, зателефонували мамі. Час від часу блискала блискавка. На щастя, дощ швидко закінчився.
    questions:
      - question: "Знайди помилки в написанні прислівників (5 помилок)."
        answer: "1) «По українськи» → «по-українськи». 2) «Нажаль» → «На жаль». 3) «Денеде» → «Де-не-де». 4) «Малопомалу» → «мало-помалу». 5) «По перше» → «По-перше». 6) «Подруге» → «По-друге». 7) «Час від часу» → «час-від-часу»."

  - type: build_sentence
    title: "Склади речення"
    instruction: "Використай прислівник у реченні"
    sentences:
      - words: ["по-українськи"]
        correct: "Вона вільно розмовляє по-українськи."
      - words: ["на жаль"]
        correct: "На жаль, магазин уже зачинений."
      - words: ["де-не-де"]
        correct: "Де-не-де ще лежав сніг."
      - words: ["щодня"]
        correct: "Він читає книги щодня."
      - words: ["по-дружньому"]
        correct: "Вони завжди спілкуються по-дружньому."
      - words: ["мало-помалу"]
        correct: "Мало-помалу вона звикла до нового міста."
      - words: ["до речі"]
        correct: "До речі, завтра вихідний."
      - words: ["час-від-часу"]
        correct: "Час-від-часу він згадував дитинство."
