module: vstavni-slova
track: l2-uk-direct
level: b2
type: grammar
title: "Вставні слова та конструкції"
subtitle: "Мабуть, на жаль, по-перше — ставлення мовця до сказаного"
standard_ref: "§4.2.3.6 — вставні конструкції"
textbook_ref: "Клас 8 §64+ — вставні слова, типи, пунктуація"
teaching_notes: |
  Вставні слова виражають ставлення мовця — їх можна прибрати без зміни змісту.
  П'ять груп: впевненість (безумовно, звичайно), невпевненість (мабуть, може),
  порядок думок (по-перше, отже), джерело (на мою думку, кажуть),
  емоції (на щастя, на жаль). Завжди виділяються комами.
  Головна складність — розрізнити вставне слово і звичайний член речення:
  «Справді, він прийшов.» (вставне) vs «Він справді прийшов.» (обставина).

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Вставне слово = ставлення мовця. Можна прибрати. Виділяється комами."
  examples:
    - "Мабуть, буде дощ. (невпевненість)"
    - "На жаль, він не прийшов. (емоція)"
    - "По-перше, треба вчитися. (порядок думок)"
    - "На мою думку, це правильно. (джерело)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Типи вставних слів"
    columns: ["Тип", "Приклади"]
    rows:
      - ["Впевненість", "безумовно, безперечно, звичайно, напевно, очевидно, справді"]
      - ["Невпевненість", "мабуть, може, можливо, здається, певно"]
      - ["Порядок думок", "по-перше, по-друге, отже, нарешті, насамперед, до речі"]
      - ["Джерело", "на мою думку, за словами..., як відомо, кажуть"]
      - ["Емоції", "на щастя, на жаль, на біду, шкода"]

  - title: "Вставне слово vs член речення"
    columns: ["Вставне (можна прибрати)", "Член речення (не можна прибрати)"]
    rows:
      - ["Справді, це було цікаво.", "Він справді прийшов."]
      - ["Здається, буде дощ.", "Це здається нереальним."]
      - ["Очевидно, він правий.", "Він очевидно хвилювався."]
      - ["Може, підемо?", "Він може прийти."]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Впевненість"
    items:
      - word: "безумовно"
        emoji: "\U00002705"
        sentence: "Безумовно, це правильне рішення."
      - word: "звичайно"
        emoji: "\U0001F44D"
        sentence: "Звичайно, я допоможу."
      - word: "безперечно"
        emoji: "\U0001F4AF"
        sentence: "Безперечно, він найкращий студент."
      - word: "очевидно"
        emoji: "\U0001F440"
        sentence: "Очевидно, вони запізнюються."

  - category: "Невпевненість"
    items:
      - word: "мабуть"
        emoji: "\U0001F914"
        sentence: "Мабуть, буде дощ."
      - word: "можливо"
        emoji: "\U0001F937"
        sentence: "Можливо, він уже пішов."
      - word: "здається"
        emoji: "\U0001F4AD"
        sentence: "Здається, я бачив цю людину."
      - word: "певно"
        emoji: "\U0001F914"
        sentence: "Певно, нам треба зачекати."

  - category: "Порядок думок"
    items:
      - word: "по-перше"
        emoji: "\U00000031"
        sentence: "По-перше, треба скласти план."
      - word: "по-друге"
        emoji: "\U00000032"
        sentence: "По-друге, визначити завдання."
      - word: "отже"
        emoji: "\U000027A1"
        sentence: "Отже, починаємо роботу."
      - word: "нарешті"
        emoji: "\U0001F389"
        sentence: "Нарешті, ми дійшли висновку."
      - word: "до речі"
        emoji: "\U0001F4AC"
        sentence: "До речі, ти бачив новий фільм?"

  - category: "Джерело та емоції"
    items:
      - word: "на мою думку"
        emoji: "\U0001F4AD"
        sentence: "На мою думку, це хороша ідея."
      - word: "на щастя"
        emoji: "\U0001F600"
        sentence: "На щастя, усе закінчилося добре."
      - word: "на жаль"
        emoji: "\U0001F614"
        sentence: "На жаль, він не зміг прийти."
      - word: "шкода"
        emoji: "\U0001F622"
        sentence: "Шкода, що ми не встигли."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Тип вставного слова"
    instruction: "Визнач тип вставного слова за значенням"
    categories:
      - label: "Впевненість"
        items:
          - "безумовно"
          - "звичайно"
          - "безперечно"
      - label: "Невпевненість"
        items:
          - "мабуть"
          - "можливо"
          - "здається"
      - label: "Порядок думок"
        items:
          - "по-перше"
          - "отже"
          - "нарешті"
      - label: "Джерело"
        items:
          - "на мою думку"
          - "як відомо"
          - "за словами вчених"
      - label: "Емоції"
        items:
          - "на щастя"
          - "на жаль"
          - "шкода"

  - type: pattern_drill
    title: "Розстав коми"
    prompt: "Додай коми при вставних словах"
    items:
      - given: "Мабуть завтра буде дощ."
        answer: "Мабуть, завтра буде дощ."
      - given: "Він на жаль не прийшов."
        answer: "Він, на жаль, не прийшов."
      - given: "По-перше треба вчитися."
        answer: "По-перше, треба вчитися."
      - given: "Це звичайно правильне рішення."
        answer: "Це, звичайно, правильне рішення."
      - given: "На мою думку проєкт вдалий."
        answer: "На мою думку, проєкт вдалий."
      - given: "Отже починаємо."
        answer: "Отже, починаємо."
      - given: "Безумовно він має рацію."
        answer: "Безумовно, він має рацію."
      - given: "Може нам краще піти?"
        answer: "Може, нам краще піти?"
      - given: "На щастя усе добре закінчилося."
        answer: "На щастя, усе добре закінчилося."
      - given: "Здається я тебе знаю."
        answer: "Здається, я тебе знаю."
      - given: "До речі ти бачив новий фільм?"
        answer: "До речі, ти бачив новий фільм?"
      - given: "Шкода що ми не встигли."
        answer: "Шкода, що ми не встигли."

  - type: classify
    title: "Вставне слово чи член речення?"
    instruction: "Визнач: вставне (можна прибрати) чи член речення (не можна)"
    categories:
      - label: "Вставне слово"
        items:
          - "Справді, це було цікаво."
          - "Здається, буде дощ."
          - "Може, підемо до кіно?"
          - "Очевидно, він запізнюється."
      - label: "Член речення"
        items:
          - "Він справді прийшов."
          - "Це здається нереальним."
          - "Він може прийти завтра."
          - "Він очевидно хвилювався перед виступом."

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "«На жаль» — це додаток."
        answer: false
        correction: "«На жаль» — вставне слово (виражає емоцію мовця)."
      - statement: "Вставні слова виділяються комами."
        answer: true
      - statement: "Вставне слово — це член речення."
        answer: false
        correction: "Вставне слово НЕ є членом речення — його можна прибрати."
      - statement: "«Мабуть, буде дощ» — «мабуть» виражає невпевненість."
        answer: true
      - statement: "«Він може прийти» — «може» тут вставне слово."
        answer: false
        correction: "«Може» тут — частина складеного дієслівного присудка."
      - statement: "«По-перше» допомагає структурувати думки."
        answer: true
      - statement: "«Безумовно» завжди є вставним словом."
        answer: false
        correction: "Залежить від контексту: «Безумовно, він правий» (вставне) vs «Він безумовно підтримав» (обставина)."
      - statement: "«На мою думку» виражає джерело інформації."
        answer: true

  - type: build_sentence
    title: "Зміни тон речення"
    instruction: "Додай вставне слово, щоб змінити тон"
    sentences:
      - words: ["Буде", "дощ", "."]
        correct: "Мабуть, буде дощ. (невпевненість)"
      - words: ["Він", "не", "прийшов", "."]
        correct: "На жаль, він не прийшов. (емоція)"
      - words: ["Треба", "вчитися", "."]
        correct: "По-перше, треба вчитися. (порядок)"
      - words: ["Це", "правильне", "рішення", "."]
        correct: "На мою думку, це правильне рішення. (джерело)"

  - type: reading
    title: "Читання: Стаття з газети"
    text: |
      На жаль, ситуація з екологією в нашому місті погіршується. По-перше, збільшилася кількість автомобілів. По-друге, закрили парк для реконструкції. Мабуть, це тимчасові труднощі. На мою думку, місто повинно більше інвестувати в зелені зони. Безумовно, кожен мешканець може зробити свій внесок. Отже, починаймо з малого — садімо дерева!
    questions:
      - question: "Знайдіть усі вставні слова та визначте їхній тип."
        answer: "«На жаль» (емоція), «По-перше» (порядок), «По-друге» (порядок), «Мабуть» (невпевненість), «На мою думку» (джерело), «Безумовно» (впевненість), «Отже» (порядок)."
      - question: "Яке вставне слово виражає невпевненість?"
        answer: "«Мабуть» — автор не впевнений, що труднощі тимчасові."
      - question: "Прибери всі вставні слова — чи зміниться зміст?"
        answer: "Зміст залишиться, але зникне ставлення автора і логічна структура тексту."
