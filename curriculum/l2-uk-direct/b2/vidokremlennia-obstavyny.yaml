module: vidokremlennia-obstavyny
track: l2-uk-direct
level: b2
type: grammar
title: "Відокремлені обставини"
subtitle: "Дієприслівниковий зворот, порівняльний зворот, уточнення"
standard_ref: "§4.2.3.7 — відокремлені обставини"
textbook_ref: "Клас 8 §37–39 — дієприслівниковий зворот, порівняльний зворот, уточнення, відокремлені додатки"
teaching_notes: |
  Дієприслівниковий зворот — ЗАВЖДИ відокремлюється комами.
  Порівняльний зворот (як, мов, наче, немов, ніби): кома ПЕРЕД порівнянням.
  Виняток — фразеологізми: працювати як віл, блідий як стіна — без коми.
  Відокремлені додатки: крім, окрім, замість, за винятком — завжди з комами.
  Уточнювальні члени: звужують загальне поняття — «Там, унизу, було темно.»

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Дієприслівник = завжди коми. Порівняння = кома (крім фразеологізмів). Уточнення = коми."
  examples:
    - "Прочитавши книгу, він пішов гуляти."
    - "Хмари пливуть, як кораблі."
    - "Працювати як віл. (фразеологізм — без коми)"
    - "Там, унизу, було темно. (уточнення)"
    - "Усі, крім Олега, прийшли. (відокремлений додаток)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Типи відокремлених обставин"
    columns: ["Тип", "Приклад", "Коми?"]
    rows:
      - ["Дієприслівниковий зворот", "Прочитавши книгу, він пішов.", "Завжди"]
      - ["Порівняльний зворот", "Хмари пливуть, як кораблі.", "Так"]
      - ["Фразеологізм-порівняння", "Працювати як віл.", "Ні"]
      - ["Відокремлений додаток", "Усі, крім Олега, прийшли.", "Так"]
      - ["Уточнення", "Там, унизу, було темно.", "Так"]

  - title: "Порівняльні слова"
    columns: ["Слово", "Приклад"]
    rows:
      - ["як", "Хмари, як кораблі."]
      - ["мов", "Очі, мов зірки."]
      - ["наче", "Дерева, наче вартові."]
      - ["немов", "Тиша, немов перед бурею."]
      - ["ніби", "Він, ніби тінь, зник."]

