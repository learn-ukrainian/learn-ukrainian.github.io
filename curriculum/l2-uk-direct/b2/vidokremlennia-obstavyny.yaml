# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Коми при дієприслівниковому звороті"
    prompt: "Додай коми"
    items:
      - given: "Прочитавши книгу він пішов гуляти."
        answer: "Прочитавши книгу, він пішов гуляти."
      - given: "Він не помічаючи нікого йшов далі."
        answer: "Він, не помічаючи нікого, йшов далі."
      - given: "Повернувшись додому вона ввімкнула світло."
        answer: "Повернувшись додому, вона ввімкнула світло."
      - given: "Закінчивши роботу він пішов відпочивати."
        answer: "Закінчивши роботу, він пішов відпочивати."
      - given: "Посміхаючись він привітався з друзями."
        answer: "Посміхаючись, він привітався з друзями."
      - given: "Діти граючись надворі не помітили дощу."
        answer: "Діти, граючись надворі, не помітили дощу."
      - given: "Побачивши друга вона радісно махнула рукою."
        answer: "Побачивши друга, вона радісно махнула рукою."
      - given: "Він сів за стіл відкривши зошит."
        answer: "Він сів за стіл, відкривши зошит."
      - given: "Вийшовши з дому хлопець пішов до школи."
        answer: "Вийшовши з дому, хлопець пішов до школи."
      - given: "Студенти готуючись до іспиту читали підручники."
        answer: "Студенти, готуючись до іспиту, читали підручники."

  - type: pattern_drill
    title: "Коми при порівняльному звороті"
    prompt: "Додай коми (або напиши «без коми» для фразеологізмів)"
    items:
      - given: "Хмари пливуть як кораблі."
        answer: "Хмари пливуть, як кораблі."
      - given: "Очі сяяли мов зірки."
        answer: "Очі сяяли, мов зірки."
      - given: "Він працює як віл."
        answer: "без коми (фразеологізм)"
      - given: "Дерева стояли наче вартові."
        answer: "Дерева стояли, наче вартові."
      - given: "Він блідий як стіна."
        answer: "без коми (фразеологізм)"
      - given: "Вона танцювала ніби метелик."
        answer: "Вона танцювала, ніби метелик."
      - given: "Річка сяяла як дзеркало."
        answer: "Річка сяяла, як дзеркало."
      - given: "Він здоровий як бик."
        answer: "без коми (фразеологізм)"

  - type: classify
    title: "Відокремити чи ні?"
    instruction: "Визнач, чи потрібні коми"
    categories:
      - label: "Відокремити (коми)"
        items:
          - "Прочитавши книгу, він пішов."
          - "Хмари пливуть, як кораблі."
          - "Усі, крім Олега, прийшли."
          - "Там, унизу, було темно."
          - "Замість відповіді, він мовчав."
      - label: "Не відокремлювати"
        items:
          - "Він працює як віл."
          - "Він блідий як стіна."
          - "Він здоровий як бик."

  - type: build_sentence
    title: "Додай порівняння"
    instruction: "Додай порівняльний зворот"
    sentences:
      - words: ["Хмари", "пливли", "."]
        correct: "Хмари пливли, як білі кораблі."
      - words: ["Зірки", "сяяли", "."]
        correct: "Зірки сяяли, мов діаманти."
      - words: ["Сніг", "вкрив", "землю", "."]
        correct: "Сніг вкрив землю, наче біле покривало."
      - words: ["Вітер", "вив", "."]
        correct: "Вітер вив, немов голодний вовк."

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "«Він працює як віл» — потрібна кома перед «як»."
        answer: false
        correction: "Фразеологізм — без коми."
      - statement: "Дієприслівниковий зворот завжди відокремлюється комами."
        answer: true
      - statement: "«Усі крім Олега прийшли» — коми не потрібні."
        answer: false
        correction: "Потрібні: «Усі, крім Олега, прийшли»."
      - statement: "«Там, унизу, було темно» — уточнення виділяється комами."
        answer: true
      - statement: "«Хмари пливуть, як кораблі» — кома правильна."
        answer: true
      - statement: "«Замість відповіді він мовчав» — коми не потрібні."
        answer: false
        correction: "Потрібна кома: «Замість відповіді, він мовчав»."
      - statement: "Уточнення повторює той самий член речення детальніше."
        answer: true
      - statement: "Порівняння з «як» завжди потребує коми."
        answer: false
        correction: "Фразеологізми (блідий як стіна) — без коми."

  - type: reading
    title: "Читання: Літературний пейзаж"
    text: |
      Повернувшись після довгої подорожі, мандрівник зупинився на пагорбі. Перед ним, унизу, розкинулося село. Дахи хат блищали, як золото, на вечірньому сонці. Річка текла, мов срібна стрічка, між зеленими луками. Усі, крім старого діда, вийшли зустрічати гостя. Дід, сидячи на призьбі, лише махнув рукою.
    questions:
      - question: "Знайдіть усі дієприслівникові звороти."
        answer: "«Повернувшись після довгої подорожі», «сидячи на призьбі»."
      - question: "Знайдіть усі порівняльні звороти."
        answer: "«Як золото», «мов срібна стрічка»."
      - question: "Знайдіть уточнення."
        answer: "«Унизу» — уточнює «перед ним»."
      - question: "Знайдіть відокремлений додаток."
        answer: "«Крім старого діда»."

  - type: pattern_drill
    title: "Коми при відокремлених додатках"
    prompt: "Додай коми при крім/окрім/замість/за винятком"
    items:
      - given: "Усі крім Олега прийшли."
        answer: "Усі, крім Олега, прийшли."
      - given: "Замість відповіді він мовчав."
        answer: "Замість відповіді, він мовчав."
      - given: "Ніхто окрім мами не знав правди."
        answer: "Ніхто, окрім мами, не знав правди."
      - given: "Усі за винятком хворих прийшли на урок."
        answer: "Усі, за винятком хворих, прийшли на урок."
      - given: "Окрім математики він любить фізику."
        answer: "Окрім математики, він любить фізику."
      - given: "Замість кави він замовив чай."
        answer: "Замість кави, він замовив чай."

  - type: classify
    title: "Тип відокремлення"
    instruction: "Визнач тип: дієприслівниковий зворот / порівняння / уточнення / відокремлений додаток"
    categories:
      - label: "Дієприслівниковий зворот"
        items:
          - "Читаючи книгу, він заснув."
          - "Закінчивши роботу, вона пішла."
      - label: "Порівняльний зворот"
        items:
          - "Очі сяяли, мов зірки."
          - "Хмари пливли, як кораблі."
      - label: "Уточнення"
        items:
          - "Там, унизу, було темно."
          - "Увечері, о сьомій годині, ми зустрілися."
      - label: "Відокремлений додаток"
        items:
          - "Усі, крім Олега, прийшли."
          - "Замість відповіді, він мовчав."
