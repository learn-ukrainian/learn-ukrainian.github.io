module: opys-mistsevosti
track: l2-uk-direct
level: b2
type: writing
title: "Опис місцевості"
subtitle: "Просторова лексика, художні засоби, структура опису"
standard_ref: "§4.3.3 (опис місцевості)"
textbook_ref: "Grade 8 §40, §49, §61 — опис місцевості"
teaching_notes: |
  Опис місцевості — це «малювання словами» з певної точки спостереження.
  Структура: загальний план → деталі → настрій/враження.
  Просторова лексика: ліворуч, праворуч, попереду, позаду, навколо, вдалині.
  Художні засоби: однорідні означення, порівняння, метафори.
  Розрізняйте художній опис (образність) і діловий опис (точність).

key_pattern:
  text: "[Загальний план]. [Ліворуч/праворуч/попереду — деталі]. [Настрій/враження]."
  examples:
    - "Перед нами розкинулося старовинне місто. Ліворуч височіла церква, праворуч — парк. Усе дихало спокоєм."
    - "Навколо — безкраї поля. Вдалині синіли гори. Тиша огортала все, мов м'яка ковдра."

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Просторова лексика"
    items:
      - word: "ліворуч"
        emoji: "\U00002B05"
        sentence: "Ліворуч стояла стара каплиця."
      - word: "праворуч"
        emoji: "\U000027A1"
        sentence: "Праворуч тягнувся сад."
      - word: "попереду"
        emoji: "\U00002B06"
        sentence: "Попереду відкривався краєвид."
      - word: "позаду"
        emoji: "\U00002B07"
        sentence: "Позаду залишилося місто."
      - word: "навколо"
        emoji: "\U0001F504"
        sentence: "Навколо — зелені поля."
      - word: "вдалині"
        emoji: "\U0001F301"
        sentence: "Вдалині синіли гори."

  - category: "Пейзажна лексика"
    items:
      - word: "краєвид"
        emoji: "\U0001F304"
        sentence: "Краєвид вражав своєю красою."
      - word: "обрій"
        emoji: "\U0001F305"
        sentence: "Сонце сідало за обрій."
      - word: "узбіччя"
        emoji: "\U0001F6E4"
        sentence: "На узбіччі росли квіти."
      - word: "схил"
        emoji: "\U000026F0"
        sentence: "На схилі горі стояло село."
      - word: "берег"
        emoji: "\U0001F3D6"
        sentence: "На березі річки сиділи рибалки."

  - category: "Художні засоби"
    items:
      - word: "порівняння"
        emoji: "\U0001F4AB"
        sentence: "Ріка, мов срібна стрічка, звивалася долиною."
      - word: "епітет"
        emoji: "\U00002728"
        sentence: "Золоте поле сяяло під сонцем."
      - word: "метафора"
        emoji: "\U0001F30A"
        sentence: "Місто прокидалося — метафора оживлення."
      - word: "уособлення"
        emoji: "\U0001F333"
        sentence: "Дерева шептали — це уособлення."

  - category: "Враження та настрій"
    items:
      - word: "затишний"
        emoji: "\U0001F3E0"
        sentence: "Затишне містечко серед гір."
      - word: "величний"
        emoji: "\U0001F3D4"
        sentence: "Величні гори вражали мандрівників."
      - word: "мальовничий"
        emoji: "\U0001F3A8"
        sentence: "Мальовничий краєвид приваблював туристів."
      - word: "спокійний"
        emoji: "\U0001F54A"
        sentence: "Спокійне село дихало тишею."
      - word: "неповторний"
        emoji: "\U00002B50"
        sentence: "Неповторна краса Карпат."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: reading
    title: "Аналіз опису"
    text: |
      Перед нами розкинулося старовинне місто. Ліворуч височіла стародавня церква з позолоченими куполами, що сяяли на сонці, мов зірки. Праворуч тягнувся тінистий парк, де старі каштани, мов мудрі сторожі, охороняли тишу. Попереду, за мостом, вирувало життя: люди поспішали, авто гуділи. А позаду, на пагорбі, стояв замок — мовчазний свідок минулих століть. Усе це створювало неповторну атмосферу, де минуле й сучасне переплітаються.
    questions:
      - question: "Які просторові маркери використано?"
        answer: "Ліворуч, праворуч, попереду, позаду."
      - question: "Знайди порівняння в тексті."
        answer: "«Мов зірки» (куполи), «мов мудрі сторожі» (каштани)."
      - question: "Яке речення передає загальне враження?"
        answer: "Останнє: «Усе це створювало неповторну атмосферу, де минуле й сучасне переплітаються.»"

  - type: build_sentence
    title: "Опиши кімнату"
    instruction: "Склади речення з просторовими маркерами"
    sentences:
      - words: ["Ліворуч", "від", "входу", "стоїть", "стіл", "."]
        correct: "Ліворуч від входу стоїть стіл."
      - words: ["Праворуч", "—", "велика", "шафа", "з", "книгами", "."]
        correct: "Праворуч — велика шафа з книгами."
      - words: ["Попереду", ",", "біля", "вікна", ",", "стоїть", "крісло", "."]
        correct: "Попереду, біля вікна, стоїть крісло."
      - words: ["Навколо", "панує", "затишок", "і", "тепло", "."]
        correct: "Навколо панує затишок і тепло."

  - type: pattern_drill
    title: "Просторові слова"
    prompt: "Добери правильне просторове слово"
    items:
      - given: "___ від мене стояла церква (зліва)."
        answer: "Ліворуч"
      - given: "___ синіли гори (далеко)."
        answer: "Вдалині"
      - given: "___ тягнувся ліс (з усіх боків)."
        answer: "Навколо"
      - given: "___ розкинулося озеро (спереду)."
        answer: "Попереду"
      - given: "___ залишилося село (ззаду)."
        answer: "Позаду"
      - given: "___ від шляху росли квіти (з правого боку)."
        answer: "Праворуч"

  - type: build_sentence
    title: "Опис рідного міста"
    instruction: "Склади речення для опису міста"
    sentences:
      - words: ["Моє", "місто", "розташоване", "на", "березі", "річки", "."]
        correct: "Моє місто розташоване на березі річки."
      - words: ["У", "центрі", "стоїть", "стародавній", "собор", "із", "золотими", "куполами", "."]
        correct: "У центрі стоїть стародавній собор із золотими куполами."
      - words: ["Це", "мальовниче", "місце", ",", "що", "приваблює", "туристів", "."]
        correct: "Це мальовниче місце, що приваблює туристів."

  - type: classify
    title: "Художній чи діловий опис?"
    instruction: "Визнач тип опису"
    categories:
      - label: "Художній опис"
        items:
          - "Золоте сонце ласкаво торкалося старих дахів."
          - "Місто прокидалося, мов казкове королівство."
          - "Тихі вулички дихали історією."
      - label: "Діловий опис"
        items:
          - "Площа парку становить 15 гектарів."
          - "Будівля має три поверхи, фасад — білого кольору."
          - "Місто розташоване на 50° пн. ш., 30° сх. д."

  - type: reading
    title: "Порівняй два описи"
    text: |
      Опис А: «Львів — місто з населенням 720 тисяч мешканців. Розташоване на заході України. Площа — 182 км². Історичний центр внесено до списку ЮНЕСКО.»

      Опис Б: «Львів — місто, що зачаровує з першого погляду. Вузенькі вуличці, мов сторінки старої книги, ведуть до площі Ринок. Аромат кави витає в повітрі. Тут кожен камінь — це історія.»
    questions:
      - question: "Який опис художній, а який діловий?"
        answer: "Опис А — діловий (факти, числа). Опис Б — художній (метафори, епітети, образність)."
      - question: "Які художні засоби є в описі Б?"
        answer: "Порівняння (мов сторінки), метафора (кожен камінь — це історія), епітети (вузенькі)."
      - question: "Для якої мети підходить кожен опис?"
        answer: "А — для довідника чи енциклопедії. Б — для туристичного есе чи оповідання."
