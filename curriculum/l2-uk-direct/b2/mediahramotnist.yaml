module: mediahramotnist
track: l2-uk-direct
level: b2
type: vocabulary
title: "Медіаграмотність"
subtitle: "Аналіз джерел, упередженість, достовірність інформації"
standard_ref: "§4.3.4 (медіаграмотність)"
textbook_ref: "Grade 8 §17 — медіаграмотність, факт і оцінка"
teaching_notes: |
  Розрізняйте факт (об'єктивна інформація) і оцінку (суб'єктивне судження).
  Чотири мети автора: інформувати, переконати, розважити, маніпулювати.
  Перевірка джерел: хто написав, для кого, коли, які джерела.
  Маніпулятивні прийоми: емоційні заголовки, однобічна інформація, пропуск фактів.
  Критичне мислення — основа медіаграмотності.

key_pattern:
  text: "Це [факт/оцінка], бо [пояснення]. Мета автора — [інформувати/переконати/розважити/маніпулювати]."
  examples:
    - "Це факт, бо можна перевірити. Температура — 15°C."
    - "Це оцінка, бо це суб'єктивне судження. «Погода чудова» — це думка."

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Медіа-терміни"
    items:
      - word: "факт"
        emoji: "\U00002705"
        sentence: "Факт можна перевірити."
      - word: "оцінка"
        emoji: "\U0001F4AC"
        sentence: "Оцінка — це суб'єктивна думка."
      - word: "джерело"
        emoji: "\U0001F4F0"
        sentence: "Перевірте джерело інформації."
      - word: "достовірність"
        emoji: "\U0001F50D"
        sentence: "Достовірність новини треба перевіряти."
      - word: "упередженість"
        emoji: "\U0001F6A9"
        sentence: "Упередженість спотворює інформацію."

  - category: "Мета автора"
    items:
      - word: "інформувати"
        emoji: "\U0001F4E2"
        sentence: "Мета новин — інформувати."
      - word: "переконувати"
        emoji: "\U0001F5E3"
        sentence: "Реклама має на меті переконувати."
      - word: "розважати"
        emoji: "\U0001F3AD"
        sentence: "Комедія створена, щоб розважати."
      - word: "маніпулювати"
        emoji: "\U0001F6A8"
        sentence: "Фейкові новини маніпулюють читачами."

  - category: "Маніпулятивні прийоми"
    items:
      - word: "маніпуляція"
        emoji: "\U0001F6A8"
        sentence: "Розпізнавайте маніпуляцію в текстах."
      - word: "пропаганда"
        emoji: "\U0001F4E3"
        sentence: "Пропаганда нав'язує одну точку зору."
      - word: "фейк"
        emoji: "\U0000274C"
        sentence: "Фейкові новини поширюються в мережі."
      - word: "клікбейт"
        emoji: "\U0001F4F1"
        sentence: "Клікбейт — це заголовок, що провокує натиснути."
      - word: "однобічний"
        emoji: "\U000027A1"
        sentence: "Однобічна інформація не показує всієї картини."

  - category: "Критичне мислення"
    items:
      - word: "аналізувати"
        emoji: "\U0001F9D0"
        sentence: "Аналізуйте інформацію перед поширенням."
      - word: "перевіряти"
        emoji: "\U0001F50E"
        sentence: "Перевіряйте факти в кількох джерелах."
      - word: "порівнювати"
        emoji: "\U00002696"
        sentence: "Порівнюйте різні точки зору."
      - word: "оцінювати"
        emoji: "\U0001F4CA"
        sentence: "Оцінюйте надійність джерела."
      - word: "критичний"
        emoji: "\U0001F9E0"
        sentence: "Критичне мислення захищає від маніпуляцій."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Факт чи оцінка?"
    instruction: "Визнач: це факт чи оцінка?"
    categories:
      - label: "Факт"
        items:
          - "Температура повітря — 15°C."
          - "Населення Києва — близько 3 мільйонів."
          - "Вибори відбулися 25 жовтня."
          - "Стаття опублікована 1 березня 2026 року."
          - "Україна межує з Польщею."
          - "Дніпро — третя за довжиною річка Європи."
      - label: "Оцінка"
        items:
          - "Погода сьогодні чудова."
          - "Цей фільм — найкращий за останні роки."
          - "Ситуація в економіці жахлива."
          - "Молодь нічим не цікавиться."
          - "Це найважливіша подія року."
          - "Влада діє неефективно."

  - type: classify
    title: "Мета автора"
    instruction: "Яка мета автора: інформувати, переконати, розважити чи маніпулювати?"
    categories:
      - label: "Інформувати"
        items:
          - "Засідання парламенту відбудеться 5 березня."
          - "Прогноз погоди: завтра дощ, +10°C."
      - label: "Переконати"
        items:
          - "Кожен має підтримати цю реформу!"
          - "Лише наш продукт вирішить вашу проблему."
      - label: "Розважити"
        items:
          - "10 найкумедніших історій про котів."
          - "Тест: яка ви пора року?"
      - label: "Маніпулювати"
        items:
          - "ШОК! Вчені приховують правду!"
          - "Лише дурні не розуміють, що..."

  - type: reading
    title: "Порівняй два тексти"
    text: |
      Текст А: «У Києві відкрили нову станцію метро. Будівництво тривало три роки. Станція обслуговуватиме 50 тисяч пасажирів на день. Загальна вартість проєкту — 2 мільярди гривень.»

      Текст Б: «Нарешті! Після років очікування кияни отримали станцію метро, яку заслуговують! Це тріумф сучасного будівництва. Проте скептики запитують: чи варта вона тих мільярдів?»
    questions:
      - question: "Який текст більш нейтральний?"
        answer: "Текст А — містить лише факти без оцінок."
      - question: "Які оцінні слова є в тексті Б?"
        answer: "«Нарешті», «заслуговують», «тріумф», «скептики» — емоційно забарвлені слова."
      - question: "Яка мета автора тексту Б?"
        answer: "Переконати — автор використовує оцінки та емоційний тон."

  - type: build_sentence
    title: "Нейтральний заголовок"
    instruction: "Перепиши заголовок нейтрально"
    sentences:
      - words: ["У", "Києві", "відкрили", "нову", "станцію", "метро", "."]
        correct: "У Києві відкрили нову станцію метро."
      - words: ["Уряд", "ухвалив", "новий", "закон", "про", "освіту", "."]
        correct: "Уряд ухвалив новий закон про освіту."
      - words: ["Учені", "виявили", "новий", "вид", "рослини", "в", "Карпатах", "."]
        correct: "Учені виявили новий вид рослини в Карпатах."

  - type: true_false
    title: "Медіаграмотність"
    items:
      - statement: "Якщо новину поширили тисячі людей, вона обов'язково правдива."
        answer: false
        correction: "Популярність не означає правдивість. Фейки також поширюються швидко."
      - statement: "Факт — це те, що можна перевірити."
        answer: true
      - statement: "Емоційний заголовок — ознака надійного джерела."
        answer: false
        correction: "Емоційні заголовки часто використовують для маніпуляції (клікбейт)."
      - statement: "Варто порівнювати інформацію з кількох джерел."
        answer: true
      - statement: "Реклама завжди маніпулює."
        answer: false
        correction: "Реклама переконує, але не завжди маніпулює. Маніпуляція — це свідоме спотворення."

  - type: reading
    title: "Оціни джерело"
    text: |
      Допис у соціальній мережі:
      «!!!! ТЕРМІНОВО!!!! Учені з Гарварду довели, що вживання шоколаду щодня подовжує життя на 10 років!!!! Поширюйте!!! Посилання немає, але мені розповів знайомий лікар.»
    questions:
      - question: "Чи є це джерело достовірним? Чому?"
        answer: "Ні. Немає посилання на дослідження, емоційні знаки оклику, джерело — «знайомий лікар» без імені."
      - question: "Які ознаки маніпуляції тут є?"
        answer: "Емоційний тиск («ТЕРМІНОВО»), заклик поширювати, відсутність джерела, неперевірені факти."
      - question: "Що треба зробити перед поширенням?"
        answer: "Знайти оригінальне дослідження, перевірити на сайті Гарварду, порівняти з іншими джерелами."
