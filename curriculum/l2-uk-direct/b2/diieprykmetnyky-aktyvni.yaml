module: diieprykmetnyky-aktyvni
track: l2-uk-direct
level: b2
type: grammar
title: "Активні дієприкметники"
subtitle: "Теперішні й минулі: утворення, вживання, стилістика"
standard_ref: "§4.2.1.2 — дієприкметник"
textbook_ref: "7 клас §44–46 — активні дієприкметники"
teaching_notes: |
  Дієприкметник поєднує ознаки дієслова й прикметника: відповідає на ЯКИЙ?, але походить від дієслова.
  Активний дієприкметник: підмет САМ виконує дію — «працюючий механізм».
  ВАЖЛИВО: в живій українській мові теперішні активні дієприкметники звучать книжно.
  Природніше: «студент, який читає» замість «читаючий студент».
  Минулі активні (-лий) — більш природні, багато з них стали прикметниками: зрілий, досвідчений.
  Спочатку навчіть розпізнавати дієприкметники, потім — утворювати, наприкінці — розрізняти стилі.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Активний дієприкметник — ЯКИЙ? Підмет сам виконує дію. Теперішній: -учий/-ючий (І дієвідміна), -ачий/-ячий (ІІ). Минулий: -лий."
  examples:
    - "працювати → працюючий (теперішній активний, І дієвідміна)"
    - "лежати → лежачий (теперішній активний, ІІ дієвідміна)"
    - "пожовкнути → пожовклий (минулий активний)"
    - "зів'яти → зів'ялий (минулий активний)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Теперішній активний дієприкметник"
    columns: ["Дієвідміна", "Суфікс", "Приклад"]
    rows:
      - ["І (-е/-є)", "-учий / -ючий", "працювати → працюючий, нести → несучий"]
      - ["ІІ (-и/-і)", "-ачий / -ячий", "лежати → лежачий, бачити → бачачий"]

  - title: "Минулий активний дієприкметник"
    columns: ["Суфікс", "Дієслово", "Дієприкметник"]
    rows:
      - ["-лий", "пожовкнути", "пожовклий"]
      - ["-лий", "зів'яти", "зів'ялий"]
      - ["-лий", "змарніти", "змарнілий"]
      - ["-лий", "завмерти", "завмерлий"]
      - ["-лий", "зріти", "зрілий"]

  - title: "Книжний vs природний стиль"
    columns: ["Книжний (дієприкметник)", "Природний (підрядне речення)"]
    rows:
      - ["працюючий механізм", "механізм, який працює"]
      - ["читаючий студент", "студент, який читає"]
      - ["лежачий камінь", "камінь, що лежить (усталений вираз)"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Теперішні активні дієприкметники"
    items:
      - word: "працюючий"
        emoji: "\U00002699"
        sentence: "Працюючий механізм видає гул."
      - word: "лежачий"
        emoji: "\U0001F9F1"
        sentence: "Під лежачий камінь вода не тече."
      - word: "несучий"
        emoji: "\U0001F4AA"
        sentence: "Несуча стіна тримає дах."
      - word: "сяючий"
        emoji: "\U00002728"
        sentence: "Сяюче сонце освітлювало поле."
      - word: "палаючий"
        emoji: "\U0001F525"
        sentence: "Палаюче вогнище зігрівало нас."

  - category: "Минулі активні дієприкметники"
    items:
      - word: "пожовклий"
        emoji: "\U0001F342"
        sentence: "Пожовкле листя вкрило дорогу."
      - word: "зів'ялий"
        emoji: "\U0001F940"
        sentence: "Зів'яла квітка лежала на столі."
      - word: "змарнілий"
        emoji: "\U0001F614"
        sentence: "Змарніле обличчя свідчило про хворобу."
      - word: "завмерлий"
        emoji: "\U0001F9CA"
        sentence: "Завмерлий ліс чекав на весну."
      - word: "зрілий"
        emoji: "\U0001F34E"
        sentence: "Зрілі яблука падали з дерева."

  - category: "Дієслова для утворення"
    items:
      - word: "квітнути"
        emoji: "\U0001F338"
        sentence: "Сад квітне щовесни."
      - word: "горіти"
        emoji: "\U0001F525"
        sentence: "Свічка горить яскраво."
      - word: "рости"
        emoji: "\U0001F331"
        sentence: "Дерево росте повільно."
      - word: "біліти"
        emoji: "\U00002B1C"
        sentence: "Сніг білів на вершинах."
      - word: "червоніти"
        emoji: "\U0001F534"
        sentence: "Ягоди червоніли на кущах."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Дієприкметник чи прикметник?"
    instruction: "Визнач: це дієприкметник (утворений від дієслова) чи прикметник?"
    categories:
      - label: "Дієприкметник"
        items:
          - "працюючий"
          - "лежачий"
          - "пожовклий"
          - "зів'ялий"
          - "палаючий"
          - "несучий"
      - label: "Прикметник"
        items:
          - "великий"
          - "зелений"
          - "гарний"
          - "довгий"
          - "тихий"
          - "сильний"

  - type: pattern_drill
    title: "Утвори теперішній активний дієприкметник"
    prompt: "Утвори дієприкметник від дієслова"
    items:
      - given: "працювати → ?"
        answer: "працюючий"
      - given: "лежати → ?"
        answer: "лежачий"
      - given: "нести → ?"
        answer: "несучий"
      - given: "сяяти → ?"
        answer: "сяючий"
      - given: "палати → ?"
        answer: "палаючий"
      - given: "бачити → ?"
        answer: "бачачий"
      - given: "існувати → ?"
        answer: "існуючий"
      - given: "діяти → ?"
        answer: "діючий"
      - given: "квітнути → ?"
        answer: "квітнучий"
      - given: "рости → ?"
        answer: "ростучий"

  - type: classify
    title: "Теперішній чи минулий?"
    instruction: "Визнач: це теперішній активний (-учий/-ючий/-ачий/-ячий) чи минулий активний (-лий)?"
    categories:
      - label: "Теперішній активний"
        items:
          - "працюючий"
          - "палаючий"
          - "сяючий"
          - "лежачий"
          - "несучий"
      - label: "Минулий активний"
        items:
          - "пожовклий"
          - "зів'ялий"
          - "змарнілий"
          - "завмерлий"
          - "зрілий"

  - type: build_sentence
    title: "Перефразуй природно"
    instruction: "Заміни дієприкметник підрядним реченням із «який»"
    sentences:
      - words: ["працюючий", "механізм"]
        correct: "Механізм, який працює."
      - words: ["читаючий", "студент"]
        correct: "Студент, який читає."
      - words: ["палаючий", "вогонь"]
        correct: "Вогонь, який палає."
      - words: ["сяюче", "сонце"]
        correct: "Сонце, яке сяє."
      - words: ["лежачий", "камінь"]
        correct: "Камінь, що лежить."
      - words: ["існуючий", "закон"]
        correct: "Закон, який існує."

  - type: true_false
    title: "Правда чи ні?"
    items:
      - statement: "«Читаючий» — це прикметник."
        answer: false
        correction: "Це дієприкметник — утворений від дієслова «читати»."
      - statement: "В розмовній мові природніше сказати «студент, який читає» замість «читаючий студент»."
        answer: true
      - statement: "«Пожовклий» — це теперішній активний дієприкметник."
        answer: false
        correction: "Минулий активний — суфікс -лий."
      - statement: "«Лежачий камінь» — цей вираз є усталеним."
        answer: true
      - statement: "Теперішні активні дієприкметники утворюються суфіксом -ний."
        answer: false
        correction: "Суфікси -учий/-ючий (І дієвідміна) та -ачий/-ячий (ІІ дієвідміна)."
      - statement: "«Зрілий» — минулий активний дієприкметник, що став прикметником."
        answer: true

  - type: pattern_drill
    title: "Утвори минулий активний дієприкметник"
    prompt: "Утвори дієприкметник із суфіксом -лий"
    items:
      - given: "пожовкнути → ?"
        answer: "пожовклий"
      - given: "зів'яти → ?"
        answer: "зів'ялий"
      - given: "змарніти → ?"
        answer: "змарнілий"
      - given: "завмерти → ?"
        answer: "завмерлий"
      - given: "побіліти → ?"
        answer: "побілілий"
      - given: "почервоніти → ?"
        answer: "почервонілий"

  - type: reading
    title: "Читання: Осінній парк"
    text: |
      Парк змінився. Пожовкле листя вкрило стежки. Зів'ялі квіти стояли в клумбах. Дерева з облетілими кронами нагадували скелети. Але серед цієї тиші блищав ставок, і сяюче сонце грало на воді. Під лежачим каменем журчав маленький струмок. Завмерлий ліс чекав на зиму.
    questions:
      - question: "Знайди всі дієприкметники в тексті."
        answer: "Пожовкле, зів'ялі, облетілими, сяюче, лежачим, завмерлий."
      - question: "Які з них теперішні активні, а які — минулі?"
        answer: "Теперішні: сяюче, лежачим. Минулі: пожовкле, зів'ялі, облетілими, завмерлий."
      - question: "Перефразуй «сяюче сонце» з підрядним реченням."
        answer: "Сонце, яке сяяло / яке сяє."

  - type: proverb_drill
    title: "Прислів'я з дієприкметниками"
    items:
      - proverb: "Під ___ камінь вода не тече."
        answer: "лежачий"
      - proverb: "Не тим хороша, що чорноброва, а тим, що діло ___."
        answer: "робить"
