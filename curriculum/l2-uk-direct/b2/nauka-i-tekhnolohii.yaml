module: nauka-i-tekhnolohii
track: l2-uk-direct
level: b2
type: vocabulary
title: "Наука і технології"
subtitle: "Відкриття, цифрове життя, екологія, штучний інтелект"
standard_ref: "§4.4.2 (наука і технології)"
textbook_ref: "Grade 8 — тематичні вправи: наука, технології, екологія"
teaching_notes: |
  Наукові відкриття та їх вплив на життя. Цифрова грамотність та безпека в інтернеті.
  Екологічні проблеми: забруднення, зміна клімату, переробка.
  Лексика: відкриття, дослідження, штучний інтелект, екосистема, сталий розвиток.
  Учні мають вміти описати наукове явище та аргументувати свою позицію щодо технологій.

key_pattern:
  text: "[Явище] — це [визначення]. Воно впливає на [сфера], бо [причина]."
  examples:
    - "Штучний інтелект — це технологія, що імітує мислення. Вона впливає на освіту, бо змінює способи навчання."
    - "Зміна клімату — глобальна проблема. Вона впливає на екосистеми, бо підвищує температуру."

