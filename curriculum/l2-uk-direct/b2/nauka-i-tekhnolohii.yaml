# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: reading
    title: "Наукова стаття"
    text: |
      Штучний інтелект (ШІ) — одна з найважливіших технологій XXI століття. ШІ вже використовують у медицині для діагностики хвороб, в освіті — для персоналізованого навчання, у транспорті — для безпілотних автомобілів. Однак є й ризики. Деякі експерти попереджають, що ШІ може замінити мільйони робочих місць. Інші вважають, що технологія створить нові професії. Безперечно одне: суспільство має навчитися використовувати ШІ відповідально.
    questions:
      - question: "У яких сферах використовують ШІ?"
        answer: "У медицині, освіті та транспорті."
      - question: "Які ризики ШІ називає текст?"
        answer: "Може замінити мільйони робочих місць."
      - question: "Який висновок робить автор?"
        answer: "Суспільство має навчитися використовувати ШІ відповідально."

  - type: build_sentence
    title: "Опиши відкриття"
    instruction: "Склади речення про наукове відкриття"
    sentences:
      - words: ["Учені", "відкрили", "новий", "спосіб", "лікування", "хвороби", "."]
        correct: "Учені відкрили новий спосіб лікування хвороби."
      - words: ["Це", "відкриття", "може", "врятувати", "мільйони", "життів", "."]
        correct: "Це відкриття може врятувати мільйони життів."
      - words: ["Дослідження", "тривало", "п'ять", "років", "і", "коштувало", "мільйони", "."]
        correct: "Дослідження тривало п'ять років і коштувало мільйони."

  - type: classify
    title: "Наукова галузь"
    instruction: "До якої науки належить цей термін?"
    categories:
      - label: "Фізика"
        items:
          - "гравітація"
          - "атом"
          - "електрон"
      - label: "Біологія"
        items:
          - "екосистема"
          - "фотосинтез"
          - "клітина"
      - label: "Інформатика"
        items:
          - "алгоритм"
          - "програмування"
          - "штучний інтелект"
      - label: "Екологія"
        items:
          - "забруднення"
          - "переробка"
          - "сталий розвиток"

  - type: build_sentence
    title: "Аргументуй позицію"
    instruction: "Склади аргумент за або проти технологій в освіті"
    sentences:
      - words: ["Вважаю", ",", "що", "технології", "покращують", "освіту", ",", "бо", "дають", "доступ", "до", "знань", "."]
        correct: "Вважаю, що технології покращують освіту, бо дають доступ до знань."
      - words: ["Однак", "надмірне", "використання", "гаджетів", "відволікає", "від", "навчання", "."]
        correct: "Однак надмірне використання гаджетів відволікає від навчання."
      - words: ["Отже", ",", "потрібен", "баланс", "між", "технологіями", "та", "традиційним", "навчанням", "."]
        correct: "Отже, потрібен баланс між технологіями та традиційним навчанням."

  - type: pattern_drill
    title: "Термін → визначення"
    prompt: "Добери визначення до терміна"
    items:
      - given: "штучний інтелект"
        answer: "технологія, що імітує людське мислення"
      - given: "кібербезпека"
        answer: "захист комп'ютерних систем від загроз"
      - given: "сталий розвиток"
        answer: "розвиток, що задовольняє потреби, не шкодячи майбутнім поколінням"
      - given: "екосистема"
        answer: "сукупність живих організмів та їхнє середовище"
      - given: "відновлювальна енергія"
        answer: "енергія з невичерпних джерел: сонце, вітер, вода"
      - given: "забруднення"
        answer: "потрапляння шкідливих речовин у довкілля"

  - type: reading
    title: "Екологія"
    text: |
      Зміна клімату — одна з найбільших загроз людству. Середня температура на планеті зросла на 1,1°C за останні сто років. Причина — викиди парникових газів від промисловості, транспорту та сільського господарства. Наслідки вже відчутні: танення льодовиків, підвищення рівня моря, екстремальні погодні явища. Що можна зробити? Переходити на відновлювальну енергію, зменшувати споживання, переробляти відходи. Кожна дія має значення.
    questions:
      - question: "На скільки градусів зросла температура?"
        answer: "На 1,1°C за останні сто років."
      - question: "Які наслідки зміни клімату названо?"
        answer: "Танення льодовиків, підвищення рівня моря, екстремальні погодні явища."
      - question: "Що пропонує автор?"
        answer: "Переходити на відновлювальну енергію, зменшувати споживання, переробляти відходи."

  - type: riddle
    title: "Загадка"
    clues:
      - "Де є річка без води?"
    answer: "на карті"
