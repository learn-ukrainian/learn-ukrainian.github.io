module: suspilstvo-ta-identychnist
track: l2-uk-direct
level: b2
type: vocabulary
title: "Суспільство та ідентичність"
subtitle: "Мовна стійкість, національна ідентичність, питомі та іншомовні слова"
standard_ref: "§4.4.1 (суспільні відносини)"
textbook_ref: "Grade 8 §1; Grade 11 §1 — мова як засіб ідентичності"
teaching_notes: |
  Мова — засіб пізнання, впливу та ознака ідентичності.
  Мовна стійкість — свідомий вибір мови в різних ситуаціях.
  Питомі vs іншомовні слова: обрій/горизонт, чинник/фактор, стяг/прапор.
  Суржик на B2 — не лексичний (це B1), а структурний: кальки, керування дієслів.
  Учні мають аргументувати свою позицію щодо мовної політики.

key_pattern:
  text: "Мова — це [визначення]. Мовна стійкість означає [пояснення]."
  examples:
    - "Мова — це не лише засіб спілкування, а й ознака ідентичності."
    - "Мовна стійкість означає свідомий вибір рідної мови в будь-якій ситуації."

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Суспільство"
    items:
      - word: "суспільство"
        emoji: "\U0001F465"
        sentence: "Суспільство формується спільними цінностями."
      - word: "ідентичність"
        emoji: "\U0001F9E9"
        sentence: "Мовна ідентичність — частина національної."
      - word: "громадянин"
        emoji: "\U0001F3DB"
        sentence: "Кожен громадянин має права й обов'язки."
      - word: "цінність"
        emoji: "\U00002B50"
        sentence: "Свобода слова — важлива цінність."
      - word: "свідомість"
        emoji: "\U0001F9E0"
        sentence: "Національна свідомість формується через мову."

  - category: "Мовна стійкість"
    items:
      - word: "мовна стійкість"
        emoji: "\U0001F4AA"
        sentence: "Мовна стійкість — це свідомий вибір мови."
      - word: "рідна мова"
        emoji: "\U0001F3E0"
        sentence: "Рідна мова — основа ідентичності."
      - word: "державна мова"
        emoji: "\U0001F1FA\U0001F1E6"
        sentence: "Українська — державна мова України."
      - word: "двомовність"
        emoji: "\U0001F5E3"
        sentence: "Двомовність — знання двох мов."
      - word: "мовна політика"
        emoji: "\U0001F4DC"
        sentence: "Мовна політика захищає державну мову."

  - category: "Питомі vs іншомовні"
    items:
      - word: "питомий"
        emoji: "\U0001F1FA\U0001F1E6"
        sentence: "«Обрій» — питоме українське слово."
      - word: "іншомовний"
        emoji: "\U0001F310"
        sentence: "«Горизонт» — іншомовне слово."
      - word: "чинник"
        emoji: "\U0001F4A1"
        sentence: "«Чинник» — питоме, «фактор» — іншомовне."
      - word: "стяг"
        emoji: "\U0001F3F3"
        sentence: "«Стяг» — давнє українське слово для прапора."
      - word: "обрій"
        emoji: "\U0001F305"
        sentence: "За обрієм сідало сонце."

  - category: "Суржик та кальки"
    items:
      - word: "суржик"
        emoji: "\U0001F6AB"
        sentence: "Суржик — це змішування мов без системи."
      - word: "калька"
        emoji: "\U0001F4CB"
        sentence: "«Підводити підсумки» — калька з російської."
      - word: "запозичення"
        emoji: "\U000027A1"
        sentence: "Не всі запозичення шкідливі."
      - word: "норма"
        emoji: "\U00002705"
        sentence: "Мовна норма — це стандарт правильності."
      - word: "стандарт"
        emoji: "\U0001F4CF"
        sentence: "Літературний стандарт фіксує правильні форми."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: reading
    title: "Мовна стійкість"
    text: |
      Мовна стійкість — це свідомий вибір рідної мови в повсякденному житті. Людина з мовною стійкістю не переходить на іншу мову лише тому, що співрозмовник розмовляє нею. Вона ввічливо продовжує українською. Це не агресія, а повага до себе й своєї мови. Мовна стійкість починається з малого: замовити каву українською, написати повідомлення рідною мовою, читати українською. Щодня ми робимо вибір — і кожен вибір мови формує мовний ландшафт нашого суспільства.
    questions:
      - question: "Що таке мовна стійкість?"
        answer: "Свідомий вибір рідної мови в повсякденному житті, без переходу на іншу мову."
      - question: "Які приклади мовної стійкості наведено?"
        answer: "Замовити каву українською, написати повідомлення, читати рідною мовою."
      - question: "Чому автор каже, що це «не агресія»?"
        answer: "Бо мовна стійкість — це повага до себе й мови, а не ворожість до інших."

  - type: classify
    title: "Питоме чи іншомовне?"
    instruction: "Визнач: питоме українське чи іншомовне слово?"
    categories:
      - label: "Питоме"
        items:
          - "обрій"
          - "чинник"
          - "стяг"
          - "відлуння"
          - "мрія"
      - label: "Іншомовне"
        items:
          - "горизонт"
          - "фактор"
          - "прапор"
          - "ехо"
          - "ідея"

  - type: build_sentence
    title: "Висловлення про мову"
    instruction: "Склади речення про роль мови"
    sentences:
      - words: ["Мова", "—", "це", "не", "лише", "засіб", "спілкування", ",", "а", "й", "частина", "ідентичності", "."]
        correct: "Мова — це не лише засіб спілкування, а й частина ідентичності."
      - words: ["Кожен", "свідомий", "вибір", "мови", "формує", "суспільство", "."]
        correct: "Кожен свідомий вибір мови формує суспільство."
      - words: ["Мовна", "стійкість", "починається", "з", "повсякденних", "рішень", "."]
        correct: "Мовна стійкість починається з повсякденних рішень."

  - type: true_false
    title: "Суржик чи стандарт?"
    items:
      - statement: "«Він задає питання» — правильно."
        answer: false
        correction: "Правильно: «Він ставить запитання.» «Задавати питання» — калька."
      - statement: "«Ідеться про важливу тему» — правильно."
        answer: true
      - statement: "«Він являється студентом» — правильно."
        answer: false
        correction: "Правильно: «Він є студентом.» «Являтися» в цьому значенні — калька."
      - statement: "«Мають місце порушення» — правильно."
        answer: false
        correction: "Правильно: «Є порушення» або «Відбуваються порушення.»"
      - statement: "«Підбивати підсумки» — правильно."
        answer: true

  - type: pattern_drill
    title: "Заміни кальку"
    prompt: "Заміни суржикову форму на стандартну"
    items:
      - given: "підводити підсумки →"
        answer: "підбивати підсумки"
      - given: "по адресу →"
        answer: "на адресу"
      - given: "мають місце →"
        answer: "є / відбуваються"
      - given: "в любому випадку →"
        answer: "у будь-якому разі"
      - given: "що торкається цього питання →"
        answer: "що стосується цього питання"
      - given: "бути правим →"
        answer: "мати рацію"
      - given: "приймати участь →"
        answer: "брати участь"
      - given: "слідуючий →"
        answer: "наступний"
      - given: "являється студентом →"
        answer: "є студентом"
      - given: "рахувати (вважати) →"
        answer: "вважати"

  - type: reading
    title: "Мовна політика"
    text: |
      Українська мова потребує захисту. Після століть русифікації значна частина населення звикла використовувати російську в побуті. Закон про державну мову 2019 року встановив: українська — мова освіти, медіа, обслуговування. Критики кажуть, що це обмежує свободу. Прихильники відповідають: без захисту мова зникне. Досвід інших країн (Ірландія, Каталонія) показує: мовна політика необхідна для відновлення мови. Проте закон — лише початок. Справжня зміна — це щоденний вибір кожного.
    questions:
      - question: "Яка теза прихильників закону?"
        answer: "Без захисту мова зникне, тому мовна політика необхідна."
      - question: "Який контраргумент наводять критики?"
        answer: "Закон обмежує свободу вибору мови."
      - question: "Як автор підсумовує?"
        answer: "Закон — лише початок, справжня зміна — щоденний вибір кожного."

  - type: riddle
    title: "Загадка"
    clues:
      - "Ревнув віл на сто сіл,"
      - "на тисячу городів."
    answer: "грім"
