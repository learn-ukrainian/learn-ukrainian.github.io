module: spoluchnyky-pidriiadni
track: l2-uk-direct
level: b2
type: grammar
title: "Підрядні сполучники"
subtitle: "Типи, правопис разом і окремо"
standard_ref: "§4.2.1.8 — підрядні сполучники"
textbook_ref: "7 клас §79–81 — підрядні сполучники"
teaching_notes: |
  Підрядні сполучники з'єднують головне й підрядне речення (нерівноправні частини).
  Групи: з'ясувальні (що, щоб), причинні (бо, тому що, оскільки), умовні (якщо, якби),
  допустові (хоча, хоч), часові (коли, щойно, поки), порівняльні (як, ніби, наче),
  наслідкові (так що, тому), мети (щоб, аби, для того щоб).
  Правопис: проте (сполучник, =але) vs про те (прийменник + займенник);
  щоб (сполучник) vs що б (займенник + частка); якби (сполучник) vs як би (прислівник + частка).
  Тест: замінити на «але» — якщо значення зберігається, це сполучник (разом).

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Підрядний сполучник з'єднує головне і залежне речення. Правопис: сполучник = разом, займенник + частка = окремо."
  examples:
    - "Я знаю, що він прийде. (з'ясувальний)"
    - "Я не прийшов, бо захворів. (причинний)"
    - "Він хворий, проте прийшов. (сполучник, разом)"
    - "Я думаю про те, що сталося. (прийменник + займенник, окремо)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Групи підрядних сполучників"
    columns: ["Група", "Сполучники", "Приклад"]
    rows:
      - ["З'ясувальні", "що, щоб, як, чи", "Я знаю, що він прийде."]
      - ["Причинні", "бо, тому що, оскільки, через те що", "Він не прийшов, бо захворів."]
      - ["Умовні", "якщо, якби, коли б", "Якщо будеш вільний, зателефонуй."]
      - ["Допустові", "хоча, хоч, дарма що", "Хоча було пізно, ми працювали."]
      - ["Часові", "коли, щойно, поки, доки", "Коли він прийшов, ми вечеряли."]
      - ["Порівняльні", "як, ніби, наче, мов, немов", "Він говорить, наче знає все."]
      - ["Наслідкові", "так що, тому", "Було пізно, тому ми пішли."]
      - ["Мети", "щоб, аби, для того щоб", "Я прийшов, щоб допомогти."]

  - title: "Правопис: разом (сполучник) vs окремо (займенник + частка)"
    columns: ["Разом (сполучник)", "Окремо (займенник + частка)", "Тест"]
    rows:
      - ["проте (= але)", "про те (прийменник + займенник)", "заміни на «але»"]
      - ["зате (= але)", "за те (прийменник + займенник)", "заміни на «але»"]
      - ["щоб (мета)", "що б (займенник + частка)", "заміни на «але» — не працює? → сполучник мети"]
      - ["якби (умова)", "як би (прислівник + частка)", "заміни на «але» — не працює? → умовний"]

  - title: "Реєстр причинних сполучників"
    columns: ["Розмовний", "Нейтральний", "Офіційний"]
    rows:
      - ["бо", "тому що", "оскільки, через те що"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "З'ясувальні й причинні"
    items:
      - word: "що"
        emoji: "\U0001F4AC"
        sentence: "Я знаю, що він прийде."
      - word: "бо"
        emoji: "\U0001F4A1"
        sentence: "Він не прийшов, бо захворів."
      - word: "тому що"
        emoji: "\U0001F4DD"
        sentence: "Я залишився вдома, тому що йшов дощ."
      - word: "оскільки"
        emoji: "\U0001F4DC"
        sentence: "Оскільки час обмежений, почнімо."

  - category: "Умовні й допустові"
    items:
      - word: "якщо"
        emoji: "\U00002753"
        sentence: "Якщо будеш вільний, зателефонуй."
      - word: "якби"
        emoji: "\U0001F4AD"
        sentence: "Якби я знав, я б прийшов."
      - word: "хоча"
        emoji: "\U0001F4AA"
        sentence: "Хоча було важко, ми не здалися."
      - word: "дарма що"
        emoji: "\U0001F937"
        sentence: "Він прийшов, дарма що хворів."

  - category: "Часові й порівняльні"
    items:
      - word: "коли"
        emoji: "\U000023F0"
        sentence: "Коли настала зима, стало холодно."
      - word: "щойно"
        emoji: "\U000023F1"
        sentence: "Щойно він зайшов, зазвонив телефон."
      - word: "поки"
        emoji: "\U000023F3"
        sentence: "Поки мама готувала, діти грали."
      - word: "наче"
        emoji: "\U0001F914"
        sentence: "Він дивився, наче бачив привида."
      - word: "ніби"
        emoji: "\U0001F47B"
        sentence: "Тиша, ніби все завмерло."

  - category: "Мети й наслідку"
    items:
      - word: "щоб"
        emoji: "\U0001F3AF"
        sentence: "Я вчуся, щоб знати мову."
      - word: "аби"
        emoji: "\U0001F3AF"
        sentence: "Зроби все, аби встигнути."
      - word: "тому"
        emoji: "\U000027A1"
        sentence: "Було пізно, тому ми пішли."

  - category: "Правопис: пари"
    items:
      - word: "проте"
        emoji: "\U0001F4AC"
        sentence: "Він хворий, проте прийшов."
      - word: "зате"
        emoji: "\U00002728"
        sentence: "Дорого, зате якісно."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Визнач тип підрядного сполучника"
    instruction: "Розподіли за групами"
    categories:
      - label: "Причинні"
        items:
          - "бо"
          - "тому що"
          - "оскільки"
          - "через те що"
      - label: "Умовні"
        items:
          - "якщо"
          - "якби"
          - "коли б"
      - label: "Допустові"
        items:
          - "хоча"
          - "хоч"
          - "дарма що"
      - label: "Часові"
        items:
          - "коли"
          - "щойно"
          - "поки"
          - "доки"

  - type: pattern_drill
    title: "Доповни сполучником"
    prompt: "Встав правильний підрядний сполучник"
    items:
      - given: "Він не прийшов, ... захворів. → ?"
        answer: "бо / тому що"
      - given: "... будеш вільний, зателефонуй. → ?"
        answer: "Якщо"
      - given: "Я прийшов, ... допомогти. → ?"
        answer: "щоб"
      - given: "... було пізно, ми працювали. → ?"
        answer: "Хоча"
      - given: "... він прийшов, ми вечеряли. → ?"
        answer: "Коли"
      - given: "Він говорить, ... знає все. → ?"
        answer: "наче / ніби"
      - given: "Було холодно, ... ми пішли додому. → ?"
        answer: "тому"
      - given: "... я знав, я б прийшов. → ?"
        answer: "Якби"

  - type: classify
    title: "Разом чи окремо?"
    instruction: "Визнач правопис: сполучник (разом) чи займенник + частка (окремо)"
    categories:
      - label: "Разом (сполучник)"
        items:
          - "Він хворий, проте прийшов."
          - "Дорого, зате якісно."
          - "Я прийшов, щоб допомогти."
          - "Якби я знав, я б допоміг."
          - "Він втомився, проте не здався."
          - "Маленький, зате розумний."
      - label: "Окремо (займенник + частка/прийменник)"
        items:
          - "Я думаю про те, що сталося."
          - "Дякую за те, що допоміг."
          - "Що б ти зробив на моєму місці?"
          - "Як би не було, ми впораємось."
          - "Розкажи про те, що бачив."
          - "Я відповідаю за те, що обіцяв."

  - type: build_sentence
    title: "Побудуй складнопідрядне речення"
    instruction: "Використай заданий сполучник"
    sentences:
      - words: ["бо"]
        correct: "Він не прийшов, бо захворів."
      - words: ["якщо"]
        correct: "Якщо будеш вільний, зателефонуй мені."
      - words: ["хоча"]
        correct: "Хоча було пізно, ми продовжили роботу."
      - words: ["щоб"]
        correct: "Я вчуся, щоб знати українську мову."
      - words: ["коли"]
        correct: "Коли настала весна, зацвіли дерева."
      - words: ["тому що"]
        correct: "Я залишився вдома, тому що йшов дощ."
      - words: ["наче"]
        correct: "Він дивився на мене, наче бачив уперше."
      - words: ["щойно"]
        correct: "Щойно прозвенів дзвінок, діти вибігли з класу."

  - type: true_false
    title: "Правда чи ні?"
    items:
      - statement: "«Щоб» — це сурядний сполучник."
        answer: false
        correction: "Підрядний сполучник мети."
      - statement: "«Бо» — розмовний варіант «оскільки»."
        answer: true
      - statement: "«Він хворий, про те прийшов» — правильно."
        answer: false
        correction: "«Проте» (разом) — сполучник, = «але»."
      - statement: "«Що б ти зробив?» — «що б» пишеться окремо."
        answer: true
      - statement: "«Якби» завжди пишеться разом."
        answer: false
        correction: "Як сполучник — разом (Якби я знав...). Як прислівник + частка — окремо (Як би не було...)."
      - statement: "«Хоча» — допустовий сполучник."
        answer: true

  - type: classify
    title: "Реєстр причинних сполучників"
    instruction: "Розподіли за стилем"
    categories:
      - label: "Розмовний"
        items:
          - "бо"
          - "хоч"
      - label: "Нейтральний"
        items:
          - "тому що"
          - "хоча"
      - label: "Офіційний / книжний"
        items:
          - "оскільки"
          - "через те що"
          - "незважаючи на те що"

  - type: reading
    title: "Читання: Аргументативний текст"
    text: |
      Вивчати іноземні мови корисно, бо це розвиває мозок. Оскільки світ стає глобальним, знання мов відкриває нові можливості. Хоча вивчення потребує часу, результат вартий зусиль. Якщо людина знає кілька мов, вона краще розуміє інші культури. Щоб досягти успіху, потрібно займатися щодня. Дехто каже, що це важко, проте тисячі людей доводять протилежне. Якби всі вивчали мови з дитинства, світ був би толерантнішим.
    questions:
      - question: "Знайди всі підрядні сполучники."
        answer: "Бо, оскільки, хоча, якщо, щоб, що, проте, якби."
      - question: "Визнач тип кожного."
        answer: "Бо — причинний. Оскільки — причинний. Хоча — допустовий. Якщо — умовний. Щоб — мети. Що — з'ясувальний. Проте — протиставний (сурядний!). Якби — умовний."
      - question: "Який сполучник у тексті насправді сурядний?"
        answer: "«Проте» — протиставний сурядний сполучник (= але)."

  - type: proverb_drill
    title: "Прислів'я з підрядними сполучниками"
    items:
      - proverb: "Тримай слово за зубами, ___ і янголи не знали."
        answer: "щоб"
      - proverb: "___ знаєш — мовчи, не знаєш — питай."
        answer: "Якщо"
