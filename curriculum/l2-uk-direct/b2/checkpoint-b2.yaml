module: checkpoint-b2
track: l2-uk-direct
level: b2
type: checkpoint
title: "Контрольна точка B2"
subtitle: "Фінальна комплексна перевірка рівня B2"
standard_ref: "B2 — повний обсяг"
textbook_ref: "Grade 7–8 — комплексна перевірка всіх тем"
teaching_notes: |
  Фінальна контрольна точка охоплює ВСЕ B2:
  морфологія (дієприкметники, дієприслівники, прислівники, службові слова),
  синтаксис (типи речень, члени речення, ускладнення),
  комунікація (текст, стилі, есе, дискусія, медіа, документи),
  культура (суржик, мовна стійкість).
  Поріг проходження: 70%.
  Структура: reading × 4, true_false × 10, pattern_drill × 10, classify × 6, build_sentence × 6.

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Морфологія"
    items:
      - word: "дієприкметник"
        emoji: "\U0001F4D6"
        sentence: "Дієприкметник — форма з ознаками дієслова й прикметника."
      - word: "дієприслівник"
        emoji: "\U0001F4D6"
        sentence: "Дієприслівник виражає додаткову дію."
      - word: "прислівник"
        emoji: "\U0001F4D6"
        sentence: "Прислівник характеризує дію."
      - word: "сполучник"
        emoji: "\U0001F517"
        sentence: "Сполучник з'єднує частини речення."
      - word: "частка"
        emoji: "\U0001F4AC"
        sentence: "Частка надає відтінку значення."

  - category: "Синтаксис"
    items:
      - word: "підмет"
        emoji: "\U0001F4CC"
        sentence: "Підмет — хто або що виконує дію."
      - word: "присудок"
        emoji: "\U0001F4CC"
        sentence: "Присудок — що робить підмет."
      - word: "однорідні члени"
        emoji: "\U0001F4CB"
        sentence: "Однорідні члени відповідають на одне запитання."
      - word: "відокремлення"
        emoji: "\U00002702"
        sentence: "Відокремлення виділяється комами."
      - word: "пряма мова"
        emoji: "\U0001F4AC"
        sentence: "Пряма мова передає чиїсь слова дослівно."

  - category: "Комунікація"
    items:
      - word: "стиль"
        emoji: "\U0001F4DD"
        sentence: "Визначте стиль мовлення."
      - word: "аргумент"
        emoji: "\U0001F4A1"
        sentence: "Аргумент підтверджує тезу."
      - word: "есе"
        emoji: "\U0001F4D6"
        sentence: "Есе — короткий твір з аргументацією."
      - word: "переказ"
        emoji: "\U0001F4DD"
        sentence: "Переказ відтворює зміст тексту."
      - word: "рецензія"
        emoji: "\U0001F4F0"
        sentence: "Рецензія оцінює мистецький твір."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: reading
    title: "Аналіз публіцистичного тексту"
    text: |
      Чи загрожує штучний інтелект людству? Це запитання хвилює мільйони. По-перше, ШІ вже замінює людей на виробництві: роботи працюють швидше й дешевше. По-друге, алгоритми впливають на те, що ми читаємо, купуємо, думаємо. Хтось може сказати: технології завжди лякали людей, але завжди створювали більше, ніж руйнували. Справді, це так. Однак масштаб змін безпрецедентний. Отже, суспільство має не боятися ШІ, а навчитися контролювати його.
    questions:
      - question: "Визнач стиль і доведи."
        answer: "Публіцистичний: риторичне запитання, аргументація, оцінні слова («безпрецедентний»), заклик."
      - question: "Знайди тезу, два аргументи, контраргумент і висновок."
        answer: "Теза: ШІ може загрожувати. Аргументи: 1) замінює людей, 2) впливає на думки. Контраргумент: технології завжди створювали більше. Висновок: треба контролювати ШІ."
      - question: "«Алгоритми впливають на те, що ми думаємо» — це факт чи оцінка?"
        answer: "Оцінка — це узагальнення, яке потребує доказів."

  - type: reading
    title: "Художній текст"
    text: |
      Карпати прокидалися повільно, огорнуті ранковим туманом. Сонце, ще невидиме за горами, уже фарбувало небо у ніжно-рожевий колір. Десь далеко заспівав птах — перший вісник ранку. Річка, стиснута скелями, несла крижану воду вниз, до долини. Стояла та особлива тиша, коли навіть вітер не наважується ворушити листя. «Ось воно, щастя», — подумав мандрівник, вдихаючи гірське повітря.
    questions:
      - question: "Знайди всі дієприкметникові звороти."
        answer: "«огорнуті ранковим туманом», «ще невидиме за горами», «стиснута скелями»."
      - question: "Знайди дієприслівниковий зворот."
        answer: "«вдихаючи гірське повітря»."
      - question: "Які художні засоби використано?"
        answer: "Метафора (Карпати прокидалися), уособлення (вітер не наважується), епітети (ніжно-рожевий, крижана)."

  - type: reading
    title: "Офіційний документ"
    text: |
      Директору Київського ліцею № 15
      Бойку Олександру Петровичу
      учениці 11-Б класу
      Коваленко Марії Олексіївни

      Заява

      Прошу звільнити мене від занять із 3 по 7 березня 2026 р. у зв'язку з участю в олімпіаді з української мови.

      1 березня 2026 р.                    Коваленко М.О.
    questions:
      - question: "Який стиль цього документа?"
        answer: "Офіційно-діловий."
      - question: "Які реквізити присутні?"
        answer: "Адресат, адресант, назва документа, зміст, дата, підпис."
      - question: "Яка офіційна формула використана?"
        answer: "«Прошу звільнити», «у зв'язку з»."

  - type: reading
    title: "Медіатекст"
    text: |
      ЗАГОЛОВОК: «ТЕРМІНОВО: вчені зробили НЕЙМОВІРНЕ відкриття!!!»

      Група вчених із невідомого інституту нібито знайшла ліки від усіх хвороб. «Це перевернуло все!» — каже анонімний експерт. Жодних деталей поки не повідомляють. Поширюйте цю новину всім знайомим!
    questions:
      - question: "Чи достовірна ця новина? Обґрунтуй."
        answer: "Ні. Ознаки недостовірності: емоційний заголовок (ТЕРМІНОВО, НЕЙМОВІРНЕ, !!!), «невідомий інститут», «анонімний експерт», жодних деталей, заклик поширювати."
      - question: "Які маніпулятивні прийоми використано?"
        answer: "Клікбейт, емоційний тиск, відсутність джерел, заклик до поширення, узагальнення (ліки від «усіх» хвороб)."

  - type: true_false
    title: "Граматика та культура мовлення"
    items:
      - statement: "Дієприкметниковий зворот після означуваного слова виділяється комами."
        answer: true
      - statement: "«Він являється студентом» — правильна українська."
        answer: false
        correction: "Правильно: «Він є студентом.»"
      - statement: "Офіційно-діловий стиль допускає вигуки та просторіччя."
        answer: false
        correction: "Офіційно-діловий стиль потребує нейтрального тону й стандартних формул."
      - statement: "«Мати рацію» — стандартна українська форма."
        answer: true
      - statement: "Односкладне речення не має підмета або присудка."
        answer: true
      - statement: "Стислий переказ зберігає всі деталі оригіналу."
        answer: false
        correction: "Стислий переказ передає лише головні думки."
      - statement: "«Навчатися мови» — правильне керування (Р.в.)."
        answer: true
      - statement: "Есе-роздум — це опис місця."
        answer: false
        correction: "Есе-роздум — висловлення думки з аргументами."
      - statement: "Факт — це те, що можна об'єктивно перевірити."
        answer: true
      - statement: "«Дякувати кого» — правильне керування."
        answer: false
        correction: "Правильно: «дякувати кому» (давальний відмінок)."

  - type: pattern_drill
    title: "Комплексні виправлення"
    prompt: "Виправ помилку (суржик / пунктуація / граматика)"
    items:
      - given: "приймати участь →"
        answer: "брати участь"
      - given: "задавати питання →"
        answer: "ставити запитання"
      - given: "підводити підсумки →"
        answer: "підбивати підсумки"
      - given: "Дерева вкриті снігом стояли. (пунктуація) →"
        answer: "Дерева, вкриті снігом, стояли."
      - given: "в любому випадку →"
        answer: "у будь-якому разі"
      - given: "Посміхаючись він пішов. (пунктуація) →"
        answer: "Посміхаючись, він пішов."
      - given: "являється студентом →"
        answer: "є студентом"
      - given: "Київ столиця України. (пунктуація) →"
        answer: "Київ — столиця України."
      - given: "навчатися мові →"
        answer: "навчатися мови"
      - given: "вибачте мене →"
        answer: "вибачте мені"

  - type: classify
    title: "Комплексна класифікація"
    instruction: "Визнач стиль мовлення"
    categories:
      - label: "Розмовний"
        items:
          - "Привіт! Ну як справи?"
          - "Ой, забула зошит удома!"
      - label: "Науковий"
        items:
          - "Фотосинтез відбувається під дією світла."
          - "Гіпотезу підтверджено експериментально."
      - label: "Офіційно-діловий"
        items:
          - "Прошу надати мені довідку."
          - "Відповідно до наказу № 15..."
      - label: "Публіцистичний"
        items:
          - "Настав час змін! Суспільство вимагає реформ."
          - "Хто відповість за ці помилки?"
      - label: "Художній"
        items:
          - "Тихий вечір лагідно огортав місто."
          - "Ріка, мов срібна стрічка, вилася долиною."

  - type: build_sentence
    title: "Побудуй аргумент"
    instruction: "Склади повний аргумент на задану тему"
    sentences:
      - words: ["Вважаю", ",", "що", "мовна", "стійкість", "необхідна", ",", "бо", "мова", "—", "основа", "ідентичності", "."]
        correct: "Вважаю, що мовна стійкість необхідна, бо мова — основа ідентичності."
      - words: ["Наприклад", ",", "країни", ",", "що", "захищають", "свою", "мову", ",", "зберігають", "культуру", "."]
        correct: "Наприклад, країни, що захищають свою мову, зберігають культуру."
      - words: ["Отже", ",", "кожен", "свідомий", "вибір", "мови", "має", "значення", "."]
        correct: "Отже, кожен свідомий вибір мови має значення."

  - type: build_sentence
    title: "Есе: фінальне завдання"
    instruction: "Склади ключові речення для есе про роль технологій"
    sentences:
      - words: ["Технології", "змінюють", "наше", "життя", "швидше", ",", "ніж", "будь-коли", "."]
        correct: "Технології змінюють наше життя швидше, ніж будь-коли."
      - words: ["По-перше", ",", "вони", "дають", "доступ", "до", "інформації", "."]
        correct: "По-перше, вони дають доступ до інформації."
      - words: ["Однак", "залежність", "від", "гаджетів", "може", "бути", "небезпечною", "."]
        correct: "Однак залежність від гаджетів може бути небезпечною."
      - words: ["На", "завершення", ",", "технології", "—", "інструмент", ",", "а", "не", "замінник", "мислення", "."]
        correct: "На завершення, технології — інструмент, а не замінник мислення."
