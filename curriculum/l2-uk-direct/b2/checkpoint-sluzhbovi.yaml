module: checkpoint-sluzhbovi
track: l2-uk-direct
level: b2
type: checkpoint
title: "Контрольна: службові частини мови"
subtitle: "Прийменники, сполучники, частки, вигуки"
standard_ref: "§4.2.1.7–10 — службові частини мови"
textbook_ref: "7 клас §74–88 — прийменники, сполучники, частки, вигуки"
teaching_notes: |
  Контрольний модуль перевіряє: складені прийменники + керування відмінком;
  сурядні vs підрядні сполучники; типи часток і правопис; типи вигуків і пунктуація.
  Поріг складання: 70%.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Службові частини мови: прийменник (зв'язок), сполучник (з'єднання), частка (відтінок), вигук (емоція)."
  examples:
    - "завдяки допомозі (прийменник + Д.в.)"
    - "Він прийшов, але не залишився. (сполучник)"
    - "Навіть він не знав. (частка)"
    - "Ой! Яка радість! (вигук)"

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Прийменники"
    items:
      - word: "завдяки"
        emoji: "\U0001F64F"
        sentence: "Завдяки праці він досяг успіху."
      - word: "незважаючи на"
        emoji: "\U0001F4AA"
        sentence: "Незважаючи на дощ, ми пішли."
      - word: "відповідно до"
        emoji: "\U0001F4DC"
        sentence: "Відповідно до закону, це заборонено."

  - category: "Сполучники"
    items:
      - word: "проте"
        emoji: "\U0001F4AC"
        sentence: "Він хворий, проте працює."
      - word: "оскільки"
        emoji: "\U0001F4DD"
        sentence: "Оскільки час обмежений, почнімо."
      - word: "хоча"
        emoji: "\U0001F4AA"
        sentence: "Хоча було важко, вони впоралися."
      - word: "або"
        emoji: "\U00002753"
        sentence: "Візьми чай або каву."

  - category: "Частки"
    items:
      - word: "невже"
        emoji: "\U0001F632"
        sentence: "Невже він це зробив?"
      - word: "навіть"
        emoji: "\U0000203C"
        sentence: "Він навіть не подзвонив."
      - word: "лише"
        emoji: "\U00000031"
        sentence: "Лише він залишився."
      - word: "хай"
        emoji: "\U0001F44B"
        sentence: "Хай живе мир!"

  - category: "Вигуки"
    items:
      - word: "ура"
        emoji: "\U0001F389"
        sentence: "Ура! Перемога!"
      - word: "тс"
        emoji: "\U0001F910"
        sentence: "Тс! Тихо!"
      - word: "ой"
        emoji: "\U0001F632"
        sentence: "Ой, як красиво!"
      - word: "годі"
        emoji: "\U0001F6D1"
        sentence: "Годі сперечатися!"

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: true_false
    title: "Правда чи ні?"
    items:
      - statement: "«Завдяки» вимагає родового відмінка."
        answer: false
        correction: "Давального: завдяки допомозі (не допомоги)."
      - statement: "«Проте» — підрядний сполучник."
        answer: false
        correction: "Сурядний протиставний (= але)."
      - statement: "«Не можу» пишеться окремо."
        answer: true
      - statement: "«Все-таки» пишеться через дефіс."
        answer: true
      - statement: "«Привіт» — прислівник."
        answer: false
        correction: "Вигук (етикетний)."
      - statement: "«Бо» — розмовний варіант «тому що»."
        answer: true
      - statement: "Після вигука завжди ставиться знак оклику."
        answer: false
        correction: "За слабкої емоції — кома."
      - statement: "«Щоб» — підрядний сполучник мети."
        answer: true

  - type: classify
    title: "Визнач частину мови"
    instruction: "Розподіли: прийменник, сполучник, частка, вигук"
    categories:
      - label: "Прийменник"
        items:
          - "завдяки"
          - "незважаючи на"
          - "відповідно до"
          - "щодо"
          - "у зв'язку з"
      - label: "Сполучник"
        items:
          - "але"
          - "бо"
          - "хоча"
          - "якщо"
          - "або"
          - "проте"
      - label: "Частка"
        items:
          - "не"
          - "хіба"
          - "навіть"
          - "хай"
          - "лише"
      - label: "Вигук"
        items:
          - "ой"
          - "ура"
          - "тс"
          - "привіт"

  - type: classify
    title: "Сурядний чи підрядний?"
    instruction: "Визнач тип сполучника"
    categories:
      - label: "Сурядний"
        items:
          - "і"
          - "але"
          - "проте"
          - "або"
          - "зате"
          - "однак"
      - label: "Підрядний"
        items:
          - "що"
          - "бо"
          - "хоча"
          - "якщо"
          - "щоб"
          - "коли"

  - type: pattern_drill
    title: "Встав правильну форму"
    prompt: "Доповни речення"
    items:
      - given: "завдяки + праця → ?"
        answer: "завдяки праці"
      - given: "незважаючи на + труднощі → ?"
        answer: "незважаючи на труднощі"
      - given: "Він хотів, ... не зміг. → сполучник?"
        answer: "але / проте"
      - given: "... він прийшов, ми вечеряли. → сполучник?"
        answer: "Коли"
      - given: "Він ... подзвонив. → підсилення?"
        answer: "навіть не подзвонив / таки подзвонив"
      - given: "Ой_ яка радість! → знак?"
        answer: "Ой, яка радість!"

  - type: build_sentence
    title: "Побудуй речення"
    instruction: "Використай задану службову частину мови"
    sentences:
      - words: ["завдяки"]
        correct: "Завдяки друзям я впорався."
      - words: ["хоча"]
        correct: "Хоча було пізно, ми продовжили."
      - words: ["навіть"]
        correct: "Він навіть не помітив."
      - words: ["ура"]
        correct: "Ура! Ми перемогли!"

  - type: classify
    title: "Правопис: разом чи окремо?"
    instruction: "Визнач правопис"
    categories:
      - label: "Разом"
        items:
          - "проте (= але)"
          - "зате (= але)"
          - "щоб (мета)"
          - "якби (умова)"
          - "нецікавий"
          - "неможливо"
      - label: "Окремо"
        items:
          - "про те (прийменник + займенник)"
          - "за те (прийменник + займенник)"
          - "що б (займенник + частка)"
          - "як би (прислівник + частка)"
          - "не можу"
          - "не знаю"

  - type: reading
    title: "Читання: Шкільне оголошення"
    text: |
      Шановні учні! У зв'язку з ремонтом спортзалу заняття з фізкультури тимчасово скасовано. Проте уроки інших предметів відбуватимуться за розкладом. Якщо погода дозволить, фізкультура проходитиме на вулиці. Хоча це не ідеальний варіант, ми працюємо над вирішенням проблеми. Завдяки підтримці батьків ремонт завершиться швидше. Будь ласка, стежте за оголошеннями! Спасибі за розуміння!
    questions:
      - question: "Знайди всі прийменники (прості й складені)."
        answer: "У зв'язку з, з (фізкультури), за (розкладом), на (вулиці), над (вирішенням), завдяки, за (оголошеннями)."
      - question: "Знайди сполучники та визнач їхній тип."
        answer: "Проте — сурядний протиставний. Якщо — підрядний умовний. Хоча — підрядний допустовий."
      - question: "Знайди вигуки."
        answer: "Будь ласка, спасибі — етикетні."

  - type: reading
    title: "Читання: Розмова сусідів"
    text: |
      — Добридень! Невже ви вже повернулися з відпустки?
      — Ой, так! Ми повернулися вчора. Хоча хотіли залишитися довше, але квитки були лише на цю дату.
      — Ого! А як відпочили?
      — Чудово! Завдяки гарній погоді ми щодня ходили на пляж. Проте останні два дні було хмарно.
      — На жаль, так буває. Зате тепер удома!
      — Тс! Не кажіть нікому, але ми вже плануємо наступну подорож!
    questions:
      - question: "Знайди частки й визнач їхній тип."
        answer: "Невже — модальна (питальна). Лише — модальна (обмежувальна). Не — заперечна."
      - question: "Знайди вигуки."
        answer: "Добридень — етикетний. Ой — емоційний. Ого — емоційний. Тс — спонукальний."
