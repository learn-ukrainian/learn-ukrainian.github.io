module: spoluchnyky-suriadni
track: l2-uk-direct
level: b2
type: grammar
title: "Сурядні сполучники"
subtitle: "Єднальні, протиставні, розділові"
standard_ref: "§4.2.1.8 — сполучник"
textbook_ref: "7 клас §76–78 — сурядні сполучники"
teaching_notes: |
  Сурядні сполучники з'єднують рівноправні частини: однорідні члени або частини складносурядного речення.
  Три групи: єднальні (і, й, та, також, ні...ні, як...так і),
  протиставні (а, але, проте, однак, зате),
  розділові (або, чи, то...то, не то...не то, хоч...хоч).
  Нюанси: «та» може означати і «і», і «але» (контекст!).
  «Але» — розмовний, «проте/однак» — офіційний.
  «Або» — у твердженнях, «чи» — переважно в питаннях.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Сурядні сполучники: єднальні (+), протиставні (але), розділові (або). З'єднують рівноправні частини."
  examples:
    - "Він читає і пише. (єднальний)"
    - "Він хотів прийти, але не зміг. (протиставний)"
    - "Хочеш чай чи каву? (розділовий)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Три групи сурядних сполучників"
    columns: ["Група", "Значення", "Сполучники"]
    rows:
      - ["Єднальні", "додавання, перелік", "і, й, та (=і), також, ні...ні, як...так і"]
      - ["Протиставні", "протиставлення", "а, але, проте, однак, зате"]
      - ["Розділові", "вибір, чергування", "або, чи, то...то, не то...не то, хоч...хоч"]

  - title: "Нюанси вживання"
    columns: ["Пара", "Різниця"]
    rows:
      - ["і / та", "«та» може = «і» або «але» (залежно від контексту)"]
      - ["але / проте / однак", "але — розмовний; проте, однак — офіційний"]
      - ["або / чи", "або — у твердженнях; чи — переважно в питаннях"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Єднальні"
    items:
      - word: "також"
        emoji: "\U00002795"
        sentence: "Він говорить українською, а також англійською."
      - word: "як...так і"
        emoji: "\U00002194"
        sentence: "Як діти, так і дорослі раділи святу."
      - word: "ні...ні"
        emoji: "\U0000274C"
        sentence: "Ні дощ, ні вітер не зупинили нас."

  - category: "Протиставні"
    items:
      - word: "але"
        emoji: "\U000026A0"
        sentence: "Він хотів прийти, але захворів."
      - word: "проте"
        emoji: "\U0001F4AC"
        sentence: "Завдання складне, проте цікаве."
      - word: "однак"
        emoji: "\U0001F4DD"
        sentence: "Погода була погана, однак ми вирушили."
      - word: "зате"
        emoji: "\U00002728"
        sentence: "Квартира маленька, зате затишна."

  - category: "Розділові"
    items:
      - word: "або"
        emoji: "\U00002753"
        sentence: "Візьми парасольку або плащ."
      - word: "чи"
        emoji: "\U00002754"
        sentence: "Ти йдеш чи залишаєшся?"
      - word: "то...то"
        emoji: "\U0001F500"
        sentence: "То сонце, то дощ — така весна."

  - category: "Контекстне «та»"
    items:
      - word: "та (=і)"
        emoji: "\U00002795"
        sentence: "Мама та тато прийшли на свято."
      - word: "та (=але)"
        emoji: "\U000026A0"
        sentence: "Хотів сказати, та промовчав."

  - category: "Дієслова з'єднання"
    items:
      - word: "з'єднувати"
        emoji: "\U0001F517"
        sentence: "Сполучник з'єднує частини речення."
      - word: "протиставляти"
        emoji: "\U00002194"
        sentence: "«Але» протиставляє дві думки."
      - word: "чергувати"
        emoji: "\U0001F500"
        sentence: "«То...то» показує чергування."
      - word: "перелічувати"
        emoji: "\U0001F4CB"
        sentence: "Єднальні сполучники допомагають перелічувати."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Визнач групу сполучника"
    instruction: "Розподіли на єднальні, протиставні, розділові"
    categories:
      - label: "Єднальні"
        items:
          - "і"
          - "й"
          - "та (=і)"
          - "також"
          - "ні...ні"
          - "як...так і"
      - label: "Протиставні"
        items:
          - "але"
          - "проте"
          - "однак"
          - "зате"
          - "а"
      - label: "Розділові"
        items:
          - "або"
          - "чи"
          - "то...то"
          - "не то...не то"

  - type: pattern_drill
    title: "Добери сполучник"
    prompt: "Встав правильний сполучник"
    items:
      - given: "Він прийшов, ... не залишився. → ?"
        answer: "але / проте"
      - given: "Хочеш чай ... каву? → ?"
        answer: "чи"
      - given: "Він читає ... пише. → ?"
        answer: "і / та"
      - given: "Квартира маленька, ... затишна. → ?"
        answer: "зате"
      - given: "... дощ, ... сніг — погода мінлива. → ?"
        answer: "То...то"
      - given: "... діти, ... дорослі раділи. → ?"
        answer: "Як...так і"
      - given: "Візьми парасольку ... плащ. → ?"
        answer: "або"
      - given: "Він не прийшов, ... зателефонував. → ?"
        answer: "однак / проте"

  - type: true_false
    title: "Правда чи ні?"
    items:
      - statement: "«Та» завжди означає «і»."
        answer: false
        correction: "«Та» може означати «і» або «але» залежно від контексту."
      - statement: "«Проте» — це протиставний сполучник."
        answer: true
      - statement: "«Або» і «чи» — повні синоніми."
        answer: false
        correction: "«Або» частіше в твердженнях, «чи» — в питаннях."
      - statement: "«Ні...ні» — розділовий сполучник."
        answer: false
        correction: "Єднальний (заперечний перелік)."
      - statement: "«Однак» — офіційніший варіант «але»."
        answer: true
      - statement: "«А» завжди протиставний."
        answer: false
        correction: "«А» може бути зіставним (без протиставлення): «Мама працює, а тато відпочиває»."

  - type: build_sentence
    title: "З'єднай два речення"
    instruction: "Поєднай речення відповідним сполучником"
    sentences:
      - words: ["Він прийшов.", "Він не залишився."]
        correct: "Він прийшов, але не залишився."
      - words: ["Сонце світило.", "Вітер дув."]
        correct: "Сонце світило, і вітер дув."
      - words: ["Ти підеш сам.", "Я піду з тобою."]
        correct: "Ти підеш сам, чи я піду з тобою?"
      - words: ["Квартира дорога.", "Вона простора."]
        correct: "Квартира дорога, зате простора."
      - words: ["Дитина сміялася.", "Дитина плакала."]
        correct: "Дитина то сміялася, то плакала."
      - words: ["Він не читає.", "Він не пише."]
        correct: "Він ні читає, ні пише."

  - type: classify
    title: "Розмовний чи офіційний?"
    instruction: "Визнач реєстр протиставного сполучника"
    categories:
      - label: "Розмовний / нейтральний"
        items:
          - "але"
          - "а"
          - "та (=але)"
      - label: "Офіційний / книжний"
        items:
          - "проте"
          - "однак"

  - type: reading
    title: "Читання: Стаття з газети"
    text: |
      Уряд ухвалив нові правила енергозбереження. Як підприємства, так і домогосподарства мають економити електроенергію. Проте не всі погоджуються з цим рішенням. Одні вважають його необхідним, а інші — занадто суворим. Деякі експерти підтримують ініціативу, однак пропонують пом'якшити вимоги. Зате всі визнають: або ми змінимо звички, або ціни на енергію зростатимуть. Ні бізнес, ні населення не хочуть платити більше.
    questions:
      - question: "Знайди всі сурядні сполучники."
        answer: "Як...так і, проте, а, однак, зате, або...або, ні...ні."
      - question: "Визнач групу кожного."
        answer: "Єднальні: як...так і, ні...ні. Протиставні: проте, а, однак, зате. Розділові: або...або."

  - type: proverb_drill
    title: "Прислів'я зі сполучниками"
    items:
      - proverb: "Краще голий та правдивий, ___ багатий та беззаконний."
        answer: "ніж"
      - proverb: "Ні вдень, ні ___ спокою не має."
        answer: "вночі"
