module: odnoskladni-bezos-nazyvni
track: l2-uk-direct
level: b2
type: grammar
title: "Односкладні речення: безособові, називні, узагальнено-особові"
subtitle: "Коли дії немає, діє природа або мудрість народу"
standard_ref: "§4.2.3.3 — односкладні речення"
textbook_ref: "Клас 8 §45–48 — узагальнено-особові, безособові, називні"
teaching_notes: |
  Три нові типи односкладних. Узагальнено-особове: дієслово 2 ос. одн.,
  але значення — «будь-хто, кожен». Поширене у прислів'ях.
  Безособове: дія без діяча — природа (світає), стан (холодно), необхідність (треба).
  Називне: тільки підмет (іменник у Н.в.), без присудка. Створює атмосферу.
  Тепер учень знає всі 5 типів — важливо навчити їх розрізняти.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Безособове: немає діяча (Світає. Холодно. Треба йти.). Називне: тільки підмет (Зима. Тиша.). Узагальнено-особове: 2 ос. одн. = кожен."
  examples:
    - "Світає. (безособове — природне явище)"
    - "Мені холодно. (безособове — стан)"
    - "Зима. Мороз. Тиша. (називні — атмосфера)"
    - "Без труда не виловиш і рибку із ставка. (узагальнено-особове — мудрість)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Усі 5 типів односкладних речень"
    columns: ["Тип", "Ознака", "Приклад"]
    rows:
      - ["Означено-особове", "1/2 особа", "Люблю каву."]
      - ["Неозначено-особове", "3 ос. мн.", "Кажуть, буде дощ."]
      - ["Узагальнено-особове", "2 ос. одн. = кожен", "Без труда не виловиш рибку."]
      - ["Безособове", "Немає діяча", "Світає. Холодно."]
      - ["Називне", "Тільки іменник у Н.в.", "Зима. Мороз."]

  - title: "Безособове речення — типи присудків"
    columns: ["Тип присудка", "Приклад"]
    rows:
      - ["Природне явище", "Світає. Смеркає. Дощить."]
      - ["Стан людини", "Мені холодно. Йому погано."]
      - ["Необхідність", "Треба вчитися. Потрібно йти."]
      - ["Можливість", "Можна увійти. Не можна чіпати."]
      - ["Слід / варто", "Слід подумати. Варто спробувати."]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Безособові дієслова / слова стану"
    items:
      - word: "світати"
        emoji: "\U0001F305"
        sentence: "Світає рано влітку."
      - word: "смеркати"
        emoji: "\U0001F306"
        sentence: "Смеркає о п'ятій годині."
      - word: "дощити"
        emoji: "\U0001F327"
        sentence: "Надворі дощить."
      - word: "морозити"
        emoji: "\U00002744"
        sentence: "Уночі морозить."
      - word: "холодно"
        emoji: "\U0001F976"
        sentence: "Мені холодно без куртки."
      - word: "тепло"
        emoji: "\U0001F321"
        sentence: "У кімнаті тепло."

  - category: "Слова необхідності"
    items:
      - word: "треба"
        emoji: "\U00002757"
        sentence: "Треба вчитися щодня."
      - word: "потрібно"
        emoji: "\U0001F4CC"
        sentence: "Потрібно купити хліб."
      - word: "варто"
        emoji: "\U00002705"
        sentence: "Варто спробувати."
      - word: "слід"
        emoji: "\U0001F4A1"
        sentence: "Слід подумати перед відповіддю."
      - word: "можна"
        emoji: "\U0001F7E2"
        sentence: "Можна увійти?"

  - category: "Називні слова-образи"
    items:
      - word: "тиша"
        emoji: "\U0001F910"
        sentence: "Тиша. Ні звуку."
      - word: "світанок"
        emoji: "\U0001F305"
        sentence: "Світанок. Перші промені сонця."
      - word: "мороз"
        emoji: "\U00002744"
        sentence: "Мороз. Сніг скрипить під ногами."
      - word: "весна"
        emoji: "\U0001F33A"
        sentence: "Весна. Квітнуть сади."

  - category: "Прислів'я (узагальнено-особові)"
    items:
      - word: "виловити"
        emoji: "\U0001F41F"
        sentence: "Без труда не виловиш і рибку із ставка."
      - word: "посіяти"
        emoji: "\U0001F331"
        sentence: "Що посієш, те й пожнеш."
      - word: "поспішати"
        emoji: "\U0001F3C3"
        sentence: "Поспішиш — людей насмішиш."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Визнач тип односкладного речення"
    instruction: "Розподіли речення за типами"
    categories:
      - label: "Означено-особове"
        items:
          - "Люблю весну."
          - "Приходь до мене!"
      - label: "Неозначено-особове"
        items:
          - "У місті будують школу."
          - "В газеті написали новину."
      - label: "Узагальнено-особове"
        items:
          - "Без труда не виловиш і рибку із ставка."
          - "Що посієш, те й пожнеш."
      - label: "Безособове"
        items:
          - "Надворі холодно."
          - "Світає."
          - "Треба вчитися."
          - "Мені сумно."
      - label: "Називне"
        items:
          - "Зима. Мороз."
          - "Тиша."

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "«Надворі холодно» — це означено-особове речення."
        answer: false
        correction: "Це безособове: немає діяча, описано стан."
      - statement: "«Зима. Мороз.» — це називні речення."
        answer: true
      - statement: "У безособовому реченні можна додати підмет."
        answer: false
        correction: "У безособовому реченні підмет неможливий — дія відбувається без діяча."
      - statement: "«Без труда не виловиш рибку» — неозначено-особове."
        answer: false
        correction: "Це узагальнено-особове: 2 ос. одн. зі значенням «кожен»."
      - statement: "«Треба вчитися» — безособове речення."
        answer: true
      - statement: "Називне речення має тільки присудок."
        answer: false
        correction: "Називне речення має тільки підмет (іменник у Н.в.)."
      - statement: "«Поспішиш — людей насмішиш» — узагальнено-особове."
        answer: true
      - statement: "«Світає» — дієслово без особи, тому це безособове."
        answer: true

  - type: build_sentence
    title: "Опиши погоду безособовими реченнями"
    instruction: "Склади безособові речення про погоду"
    sentences:
      - words: ["Надворі", "[холодно/тепло/спекотно]", "."]
        correct: "Надворі холодно."
      - words: ["Уже", "[світає/смеркає]", "."]
        correct: "Уже світає."
      - words: ["За", "вікном", "[дощить/морозить]", "."]
        correct: "За вікном дощить."
      - words: ["Мені", "[тепло/холодно/добре]", "тут", "."]
        correct: "Мені тепло тут."

  - type: pattern_drill
    title: "Визнач тип (15 речень)"
    prompt: "Напиши тип односкладного речення"
    items:
      - given: "Люблю каву."
        answer: "означено-особове"
      - given: "Тут будують стадіон."
        answer: "неозначено-особове"
      - given: "Світає."
        answer: "безособове"
      - given: "Зима."
        answer: "називне"
      - given: "Поспішиш — людей насмішиш."
        answer: "узагальнено-особове"
      - given: "Мені потрібно йти."
        answer: "безособове"
      - given: "Приходь завтра!"
        answer: "означено-особове"
      - given: "Тиша. Спокій."
        answer: "називне"
      - given: "Кажуть, що буде сніг."
        answer: "неозначено-особове"
      - given: "Що посієш, те й пожнеш."
        answer: "узагальнено-особове"
      - given: "Надворі морозить."
        answer: "безособове"
      - given: "Весна. Квіти."
        answer: "називне"
      - given: "Пишаємося перемогою."
        answer: "означено-особове"
      - given: "На заводі виготовляють деталі."
        answer: "неозначено-особове"
      - given: "Варто спробувати."
        answer: "безособове"

  - type: reading
    title: "Читання: Початок оповідання"
    text: |
      Зима. Мороз. Тиша. Смеркає рано. Надворі холодно і вітряно. Треба одягатися тепліше. Кажуть, що цієї зими будуть сильні морози. Що ж, як кажуть, готуй сани влітку. Мрію про весну. Чекаю на перші теплі дні.
    questions:
      - question: "Знайдіть усі називні речення."
        answer: "«Зима», «Мороз», «Тиша»."
      - question: "Знайдіть усі безособові речення."
        answer: "«Смеркає рано», «Надворі холодно і вітряно», «Треба одягатися тепліше»."
      - question: "Яке речення є узагальнено-особовим?"
        answer: "«Готуй сани влітку» — 2 ос. одн. зі значенням «кожен повинен»."

  - type: build_sentence
    title: "Доповни прислів'я"
    instruction: "Доповни узагальнено-особове прислів'я"
    sentences:
      - words: ["Без", "труда", "не", "виловиш", "і", "рибку", "із", "ставка", "."]
        correct: "Без труда не виловиш і рибку із ставка."
      - words: ["Що", "посієш", ",", "те", "й", "пожнеш", "."]
        correct: "Що посієш, те й пожнеш."
      - words: ["Поспішиш", "—", "людей", "насмішиш", "."]
        correct: "Поспішиш — людей насмішиш."
      - words: ["Не", "кажи", "гоп", ",", "поки", "не", "перескочиш", "."]
        correct: "Не кажи гоп, поки не перескочиш."
