module: mnozh
track: l2-uk-direct
level: a1
type: grammar
title: "Множина"
subtitle: "Один — багато. Утворюємо множину іменників і прикметників."
standard_ref: "§4.2.1.1 — множина іменників: -и/-і/-ї, чергування голосних, §4.2.1.2 — множина прикметників"
textbook_ref: "Grade 3 p.105 (чергування голосних), p.112 (загадка ВІТЕР), p.117 (тільки множина / тільки однина)"

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Однина → Множина: -и/-і/-ї/-а/-я. Прикметники → завжди -і."
  examples:
    - "стіл → столи"
    - "книга → книги"
    - "вікно → вікна"
    - "великий/велика/велике → великі"

# ─────────────────────────────────────────────
# VOCABULARY: noun plural patterns + special nouns
# ─────────────────────────────────────────────
vocabulary:
  - category: "Чоловічий рід (він)"
    items:
      - word: "стіл → столи"
        emoji: "\U0001FA91"
        sentence: "Тут один стіл, а там три столи."
      - word: "лікар → лікарі"
        emoji: "\U0001F468\u200D\u2695\uFE0F"
        sentence: "Один лікар працює, а два лікарі відпочивають."
      - word: "музей → музеї"
        emoji: "\U0001F3DB\uFE0F"
        sentence: "У місті є два музеї."
      - word: "рік → роки"
        emoji: "\U0001F4C5"
        sentence: "Один рік — це мало, а десять років — багато."
      - word: "ніж → ножі"
        emoji: "\U0001F52A"
        sentence: "На столі лежать два ножі."
      - word: "палець → пальці"
        emoji: "\u270B"
        sentence: "На руці п'ять пальців."
      - word: "будинок → будинки"
        emoji: "\U0001F3E0"
        sentence: "На вулиці стоять будинки."

  - category: "Жіночий рід (вона)"
    items:
      - word: "книга → книги"
        emoji: "\U0001F4D5"
        sentence: "На полиці стоять книги."
      - word: "земля → землі"
        emoji: "\U0001F30D"
        sentence: "Різні землі, різні люди."
      - word: "річ → речі"
        emoji: "\U0001F4E6"
        sentence: "Мої речі тут."

  - category: "Середній рід (воно)"
    items:
      - word: "вікно → вікна"
        emoji: "\U0001FA9F"
        sentence: "У будинку великі вікна."
      - word: "море → моря"
        emoji: "\U0001F30A"
        sentence: "У світі багато морів."
      - word: "слово → слова"
        emoji: "\U0001F4AC"
        sentence: "Нові слова — нові знання."

  - category: "Прикметники (множина — завжди -і)"
    items:
      - word: "великий → великі"
        emoji: "\U0001F4CF"
        sentence: "Великі столи стоять у залі."
      - word: "синій → сині"
        emoji: "\U0001F535"
        sentence: "Сині олівці лежать тут."
      - word: "новий → нові"
        emoji: "\u2728"
        sentence: "Нові книги дуже цікаві."

  - category: "Тільки множина"
    items:
      - word: "двері"
        emoji: "\U0001F6AA"
        sentence: "Двері відчинені."
      - word: "ножиці"
        emoji: "\u2702\uFE0F"
        sentence: "Де мої ножиці?"
      - word: "окуляри"
        emoji: "\U0001F453"
        sentence: "Окуляри на столі."
      - word: "гроші"
        emoji: "\U0001F4B0"
        sentence: "Гроші в сумці."

  - category: "Тільки однина"
    items:
      - word: "молоко"
        emoji: "\U0001F95B"
        sentence: "Молоко біле і смачне."
      - word: "здоров'я"
        emoji: "\U0001F49A"
        sentence: "Здоров'я — це найголовніше."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Однина → множина"
    prompt: "Напиши множину"
    items:
      - given: "стіл →"
        answer: "столи"
      - given: "книга →"
        answer: "книги"
      - given: "вікно →"
        answer: "вікна"
      - given: "лікар →"
        answer: "лікарі"
      - given: "музей →"
        answer: "музеї"
      - given: "земля →"
        answer: "землі"
      - given: "море →"
        answer: "моря"
      - given: "ніж →"
        answer: "ножі"
      - given: "рік →"
        answer: "роки"
      - given: "палець →"
        answer: "пальці"
      - given: "будинок →"
        answer: "будинки"
      - given: "річ →"
        answer: "речі"
      - given: "кіт →"
        answer: "коти"
      - given: "пес →"
        answer: "пси"
      - given: "слово →"
        answer: "слова"
      - given: "олівець →"
        answer: "олівці"
      - given: "сумка →"
        answer: "сумки"
      - given: "місто →"
        answer: "міста"
      - given: "дерево →"
        answer: "дерева"
      - given: "квітка →"
        answer: "квітки"

  - type: classify
    title: "Яке закінчення множини?"
    instruction: "Розподіли іменники за закінченням множини"
    categories:
      - label: "-и"
        items:
          - "столи"
          - "книги"
          - "будинки"
          - "коти"
      - label: "-і"
        items:
          - "лікарі"
          - "землі"
          - "пальці"
          - "ножі"
      - label: "-а"
        items:
          - "вікна"
          - "міста"
          - "слова"
      - label: "-я"
        items:
          - "моря"
          - "дерева"
          - "імена"

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "Множина слова «ніж» — «ніжі»"
        answer: false
        correction: "Ножі — і → о (чергування голосних)"
      - statement: "Множина слова «книга» — «книги»"
        answer: true
      - statement: "Множина слова «рік» — «ріки»"
        answer: false
        correction: "Роки — і → о (чергування голосних)"
      - statement: "«Двері» — це тільки множина"
        answer: true
      - statement: "«Молоко» має множину"
        answer: false
        correction: "Молоко — тільки однина"
      - statement: "Множина прикметника «великий» — «великі»"
        answer: true

  - type: pattern_drill
    title: "Прикметник + іменник у множині"
    prompt: "Утвори множину"
    items:
      - given: "великий стіл →"
        answer: "великі столи"
      - given: "нова книга →"
        answer: "нові книги"
      - given: "велике вікно →"
        answer: "великі вікна"
      - given: "синій олівець →"
        answer: "сині олівці"
      - given: "маленький кіт →"
        answer: "маленькі коти"
      - given: "гарне місто →"
        answer: "гарні міста"
      - given: "стара школа →"
        answer: "старі школи"
      - given: "червона квітка →"
        answer: "червоні квітки"
      - given: "новий телефон →"
        answer: "нові телефони"
      - given: "зелене дерево →"
        answer: "зелені дерева"

  - type: classify
    title: "Тільки множина чи тільки однина?"
    instruction: "Розподіли слова"
    categories:
      - label: "Тільки множина"
        items:
          - "двері"
          - "ножиці"
          - "окуляри"
          - "гроші"
          - "канікули"
          - "штани"
      - label: "Тільки однина"
        items:
          - "молоко"
          - "здоров'я"
          - "дружба"
          - "дітвора"

  - type: riddle
    title: "Загадка"
    clues:
      - "Без крил і двигуна летить,"
      - "без ніг, а біжить."
    answer: "ВІТЕР"
    answer_emoji: "\U0001F4A8"
    source: "Grade 3 p.112"

  - type: build_sentence
    title: "Доповни речення"
    sentences:
      - words: ["Тут", "є", "один", "стіл.", "А", "там", "є", "три..."]
        correct: "Тут є один стіл. А там є три столи."
      - words: ["Одна", "книга", "нова,", "а", "дві", "книги..."]
        correct: "Одна книга нова, а дві книги старі."
      - words: ["Один", "лікар", "тут,", "а", "два", "лікарі..."]
        correct: "Один лікар тут, а два лікарі там."
