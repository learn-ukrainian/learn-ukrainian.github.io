module: prykmetnyk-vidminky
track: l2-uk-direct
level: a1
type: grammar
title: "Прикметник у відмінках"
subtitle: "Форми прикметників у знахідному і місцевому відмінках"
standard_ref: "§4.2.1.2 — adjective acc/loc forms for -ий/-а/-е and -ій/-я/-є groups"
textbook_ref: "Grade 4 — adjective declension; Grade 6 — full paradigm"

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Прикметник узгоджується з іменником і за родом, і за відмінком."
  examples:
    - "Називний: велика книга → Знахідний: велику книгу → Місцевий: у великій книзі"
    - "Називний: новий телефон → Знахідний: новий телефон (неживе) → Місцевий: у новому телефоні"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Тверда група (-ий/-а/-е)"
    columns: ["Рід", "Називний", "Знахідний", "Місцевий"]
    rows:
      - ["Чоловічий (неживе)", "великий", "великий", "великому"]
      - ["Чоловічий (живе)", "великий", "великого", "великому"]
      - ["Жіночий", "велика", "велику", "великій"]
      - ["Середній", "велике", "велике", "великому"]

  - title: "М'яка група (-ій/-я/-є)"
    columns: ["Рід", "Називний", "Знахідний", "Місцевий"]
    rows:
      - ["Чоловічий (неживе)", "домашній", "домашній", "домашньому"]
      - ["Чоловічий (живе)", "домашній", "домашнього", "домашньому"]
      - ["Жіночий", "домашня", "домашню", "домашній"]
      - ["Середній", "домашнє", "домашнє", "домашньому"]

# ─────────────────────────────────────────────
# EXAMPLE SENTENCES
# ─────────────────────────────────────────────
example_sentences:
  - "Я читаю цікаву книжку. (знахідний, жіночий)"
  - "Він бачить нового друга. (знахідний, чоловічий живе)"
  - "Ми живемо у великому місті. (місцевий, середній)"
  - "Студент працює в новій лабораторії. (місцевий, жіночий)"

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Знахідний відмінок прикметників"
    prompt: "Постав прикметник + іменник у знахідний відмінок"
    items:
      - given: "нова книга → (я читаю...)"
        answer: "нову книгу"
      - given: "цікава стаття → (він читає...)"
        answer: "цікаву статтю"
      - given: "велика сумка → (вона має...)"
        answer: "велику сумку"
      - given: "гарна квітка → (я бачу...)"
        answer: "гарну квітку"
      - given: "смачна піца → (ми їмо...)"
        answer: "смачну піцу"
      - given: "холодна вода → (він п'є...)"
        answer: "холодну воду"
      - given: "новий телефон → (вона має...)"
        answer: "новий телефон"
      - given: "старий друг → (я бачу...)"
        answer: "старого друга"
      - given: "маленький кіт → (вона бачить...)"
        answer: "маленького кота"
      - given: "велике місто → (я бачу...)"
        answer: "велике місто"

  - type: pattern_drill
    title: "Місцевий відмінок прикметників"
    prompt: "Постав прикметник + іменник у місцевий відмінок"
    items:
      - given: "великий будинок → (ми живемо в...)"
        answer: "у великому будинку"
      - given: "нова школа → (він працює в...)"
        answer: "у новій школі"
      - given: "старе місто → (ми гуляємо в...)"
        answer: "у старому місті"
      - given: "маленька кімната → (книга в...)"
        answer: "у маленькій кімнаті"
      - given: "великий парк → (діти в...)"
        answer: "у великому парку"
      - given: "нова лабораторія → (студент у...)"
        answer: "у новій лабораторії"

  - type: build_sentence
    title: "Обери правильну форму"
    instruction: "Обери правильне закінчення прикметника і іменника"
    sentences:
      - words: ["Я", "бачу", "[старий/старого]", "[друг/друга]", "."]
        correct: "Я бачу старого друга."
      - words: ["Вона", "читає", "[цікавий/цікаву]", "[книга/книгу]", "."]
        correct: "Вона читає цікаву книгу."
      - words: ["Ми", "живемо", "у", "[великий/великому]", "[місто/місті]", "."]
        correct: "Ми живемо у великому місті."
      - words: ["Він", "працює", "в", "[новий/новій]", "[школа/школі]", "."]
        correct: "Він працює в новій школі."

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "Я живу в великий місто."
        answer: false
        correction: "Я живу у великому місті."
      - statement: "Вона читає цікаву книгу."
        answer: true
      - statement: "Він бачить старого друга."
        answer: true
      - statement: "Ми працюємо в нова школа."
        answer: false
        correction: "Ми працюємо в новій школі."
      - statement: "Я п'ю холодну воду."
        answer: true
      - statement: "Книга лежить на великий стіл."
        answer: false
        correction: "Книга лежить на великому столі."

  - type: classify
    title: "Який відмінок?"
    instruction: "Розподіли словосполучення за відмінками"
    categories:
      - label: "ХТО?/ЩО? (називний)"
        items:
          - "велика книга"
          - "новий телефон"
          - "старе місто"
      - label: "КОГО?/ЩО? (знахідний)"
        items:
          - "велику книгу"
          - "нового друга"
          - "старий телефон"
      - label: "ДЕ?/В ЧОМУ? (місцевий)"
        items:
          - "у великій книзі"
          - "у новому місті"
          - "на старому столі"

  - type: riddle
    title: "Загадка"
    clues:
      - "Товстий стовбур, пишні віти,"
      - "Восени знайдеш під ними"
      - "Колючу кулю."
    answer: "КАШТАН"
    answer_emoji: "🌰"
    source: "Grade 3 p.136"

  - type: reading
    title: "Читання: Робочий день Олени"
    text: |
      Олена живе у великому місті. Вона працює в новій лабораторії. Олена любить свою цікаву роботу. У маленькій кімнаті стоїть старий комп'ютер. Олена п'є гарячу каву і читає нову статтю.
    questions:
      - question: "Де живе Олена?"
        answer: "У великому місті."
      - question: "Де вона працює?"
        answer: "В новій лабораторії."
      - question: "Що стоїть у маленькій кімнаті?"
        answer: "Старий комп'ютер."
