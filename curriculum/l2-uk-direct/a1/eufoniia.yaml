module: eufoniia
track: l2-uk-direct
level: a1
type: grammar
title: "Евфонія"
subtitle: "Чергування у/в, і/й, з/із/зі."
standard_ref: "§4.1.7 — засоби милозвучності"
textbook_ref: "Grade 3 pp.77–80 — basic rules; Grade 5 §51–52 — full euphony tables"

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Українська мова уникає важких збігів приголосних або голосних. Чергуються: у/в, і/й, з/із/зі."
  examples:
    - "Я у школі. / Вона в школі."
    - "Брат і сестра. / Вона й він."
    - "З Одеси. / Із школи. / Зі мною."

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar:
  - name: "у / в"
    pattern: "Прийменник і префікс"
    rules:
      - rule: "у — після приголосного або на початку речення, перед приголосним"
        examples:
          - "Я у школі."
          - "У кімнаті тихо."
      - rule: "в — після голосного, перед приголосним"
        examples:
          - "Вона в школі."
          - "Іди в парк."
      - rule: "Перед голосним — завжди в"
        examples:
          - "В Одесі."
          - "В Україні."

  - name: "і / й"
    pattern: "Сполучник"
    rules:
      - rule: "і — між приголосними"
        examples:
          - "Брат і сестра."
          - "Стіл і стілець."
      - rule: "й — після голосного"
        examples:
          - "Вона й він."
          - "Школа й парк."

  - name: "з / із / зі"
    pattern: "Прийменник"
    rules:
      - rule: "з — перед голосним або одним приголосним"
        examples:
          - "З Одеси."
          - "З другом."
      - rule: "із — перед збігом приголосних"
        examples:
          - "Із школи."
          - "Із сміхом."
      - rule: "зі — для легкості вимови"
        examples:
          - "Зі мною."
          - "Зі столу."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "у чи в?"
    prompt: "Обери правильний варіант"
    items:
      - given: "Я ___ школі. (після приголосного)"
        answer: "у"
      - given: "Вона ___ школі. (після голосного)"
        answer: "в"
      - given: "___ кімнаті тихо. (початок речення)"
        answer: "У"
      - given: "Ми живемо ___ Одесі. (перед голосним)"
        answer: "в"
      - given: "Книга ___ сумці. (після приголосного)"
        answer: "у"
      - given: "Мама ___ кухні. (після голосного)"
        answer: "в"
      - given: "Він ___ Україні. (перед голосним)"
        answer: "в"
      - given: "Кіт ___ кімнаті. (після приголосного)"
        answer: "у"
      - given: "Я працюю ___ банку. (після голосного)"
        answer: "в"
      - given: "___ парку гарно. (початок речення)"
        answer: "У"

  - type: pattern_drill
    title: "і чи й?"
    prompt: "Обери правильний варіант"
    items:
      - given: "Брат ___ сестра. (між приголосними)"
        answer: "і"
      - given: "Вона ___ він. (після голосного)"
        answer: "й"
      - given: "Школа ___ парк. (після голосного)"
        answer: "й"
      - given: "Стіл ___ стілець. (між приголосними)"
        answer: "і"
      - given: "Книга ___ олівець. (після голосного)"
        answer: "й"
      - given: "Хліб ___ масло. (між приголосними)"
        answer: "і"
      - given: "Мама ___ тато. (після голосного)"
        answer: "й"
      - given: "Друг ___ подруга. (між приголосними)"
        answer: "і"
      - given: "Кава ___ чай. (після голосного)"
        answer: "й"
      - given: "Сніг ___ мороз. (між приголосними)"
        answer: "і"

  - type: build_sentence
    title: "Евфонія в реченнях"
    sentences:
      - words: ["Оля", "й", "Назар", "ідуть", "у", "школу", "."]
        correct: "Оля й Назар ідуть у школу."
      - words: ["Вони", "вчаться", "в", "університеті", "."]
        correct: "Вони вчаться в університеті."
      - words: ["Оля", "із", "Харкова", ",", "а", "Назар", "із", "Львова", "."]
        correct: "Оля із Харкова, а Назар із Львова."
      - words: ["Брат", "і", "сестра", "грають", "у", "парку", "."]
        correct: "Брат і сестра грають у парку."
      - words: ["Вона", "прийшла", "зі", "мною", "."]
        correct: "Вона прийшла зі мною."

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "«Вона у Одесі» — правильно."
        answer: false
        correction: "Перед голосним: в Одесі."
      - statement: "«Брат і сестра» — правильно."
        answer: true
      - statement: "«Вона і він» — правильно."
        answer: false
        correction: "Після голосного: Вона й він."
      - statement: "«Зі мною» — правильно."
        answer: true
      - statement: "«З школи» — правильно."
        answer: false
        correction: "Перед збігом приголосних: із школи."

  - type: tongue_twister
    title: "Скоромовка"
    text: "Гусак гусаці дав гарбуза, ґава ґавенятам — ґудзика."
    focus: "Звуки Г і Ґ"
    source: "Grade 3 p.81"

  - type: reading
    title: "Читання: Евфонія в тексті"
    text: |
      Оля і Назар ідуть у школу. Вони вчаться в університеті й у школі. Оля із Харкова, а Назар із Львова. Вона й він — найкращі друзі. Після школи вони гуляють у парку. Оля прийшла зі мною в кафе.
    questions:
      - question: "Звідки Оля?"
        answer: "Із Харкова."
      - question: "Звідки Назар?"
        answer: "Із Львова."
      - question: "Що вони роблять після школи?"
        answer: "Гуляють у парку."
