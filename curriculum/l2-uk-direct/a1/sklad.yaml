module: sklad
track: l2-uk-direct
level: a1
type: script_foundation
title: Склад
standard_ref: "§4.1.4 — vowel–consonant combinations, §4.1.5 — stress mark, §4.1.6 — syllable"

# ─────────────────────────────────────────────
# SYLLABLE RULE
# ─────────────────────────────────────────────
syllable_rule:
  text: "Кожний склад має рівно одну голосну. Скільки голосних у слові — стільки складів."
  vowels: [А, Е, И, І, О, У, Є, Ї, Ю, Я]
  examples:
    - word: мама
      split: "ма-ма"
      syllables: 2
      emoji: 👩
    - word: молоко
      split: "мо-ло-ко"
      syllables: 3
      emoji: 🥛
    - word: кіт
      split: "кіт"
      syllables: 1
      emoji: 🐱
    - word: черепаха
      split: "че-ре-па-ха"
      syllables: 4
      emoji: 🐢

# ─────────────────────────────────────────────
# SYLLABLE TABLES
# CV = consonant + vowel (most common in Ukrainian)
# VC = vowel + consonant
# ─────────────────────────────────────────────
syllable_tables:
  - title: "Приголосний + голосний"
    subtitle: "Найчастіший тип складу в українській мові"
    type: cv
    consonants: [М, Н, Л, Р, С, К, Б, В, Д, Т, П]
    vowels: [А, О, У, И, Е, І]

  - title: "Голосний + приголосний"
    subtitle: "Часто на початку слова"
    type: vc
    vowels: [А, О, У, И]
    consonants: [М, Н, Л, С, К, Р]

# ─────────────────────────────────────────────
# SOFT CONSONANTS
# Ь softens the preceding consonant
# ─────────────────────────────────────────────
soft_consonants:
  rule: "Ь пом'якшує приголосний перед собою. Це не окрема буква-звук, а знак м'якості."
  examples:
    - hard: "НА"
      soft: "НЯ"
      note: "Н + Ь → м'який Н. НЬ + А = НЯ."
    - hard: "ЛА"
      soft: "ЛЯ"
      note: "Л + Ь → м'який Л. ЛЬ + А = ЛЯ."
    - hard: "ТА"
      soft: "ТЯ"
      note: "Т + Ь → м'який Т. ТЬ + А = ТЯ."
  words:
    - word: "сіль"
      emoji: 🧂
      note: "м'яке ЛЬ на кінці"
    - word: "день"
      emoji: ☀️
      note: "м'яке НЬ на кінці"
    - word: "мить"
      emoji: ⏳
      note: "м'яке ТЬ на кінці"

# ─────────────────────────────────────────────
# APOSTROPHE (review from abetka)
# ─────────────────────────────────────────────
apostrophe:
  rule: "Апостроф розділяє твердий приголосний від м'якої голосної (Я, Ю, Є, Ї). Обидва звуки вимовляються повністю."
  examples:
    - word: "м'яч"
      emoji: ⚽
      split: "м + яч"
    - word: "п'ять"
      emoji: 5️⃣
      split: "п + ять"
    - word: "б'є"
      emoji: 🥊
      split: "б + є"
    - word: "з'їв"
      emoji: 🍽️
      split: "з + їв"

# ─────────────────────────────────────────────
# STRESS
# ─────────────────────────────────────────────
stress:
  rule: "Наголос в українській мові вільний — він може падати на будь-який склад."
  marker: "Наголос позначається знаком ´ над голосною: а́, о́, у́, и́, е́, і́"
  meaning_change:
    note: "Наголос може змінити значення слова!"
    pairs:
      - word1: "за́мок"
        emoji1: 🏰
        meaning1: "будівля"
        word2: "замо́к"
        emoji2: 🔒
        meaning2: "на дверях"
      - word1: "о́брази"
        emoji1: 🖼️
        meaning1: "зображення"
        word2: "обра́зи"
        emoji2: 😠
        meaning2: "образи, кривди"

