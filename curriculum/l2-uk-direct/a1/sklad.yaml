# ─────────────────────────────────────────────
# ACTIVITIES
# Pre-literacy only: watch_and_repeat, classify, image_to_letter.
# Meaning conveyed through: emoji, video, symbols.
# ─────────────────────────────────────────────
activities:

  # Activity 1: Watch and repeat syllable chains.
  # Grouped by consonant — learner watches the consonant video,
  # then sees the CV syllable pattern to read aloud.
  - type: watch_and_repeat
    title: "Читаємо склади"
    items:
      - word: "МА МО МУ МИ МЕ МІ"
        video: "https://www.youtube.com/watch?v=Ez95H4ibuJo"
        note: "Послухай звук М. Тепер додай голосні!"
      - word: "НА НО НУ НИ НЕ НІ"
        video: "https://www.youtube.com/watch?v=vNUfiKHPYaU"
        note: "Послухай звук Н. Тепер додай голосні!"
      - word: "ЛА ЛО ЛУ ЛИ ЛЕ ЛІ"
        video: "https://www.youtube.com/watch?v=v6-3Xg52Buk"
        note: "Послухай звук Л. Тепер додай голосні!"
      - word: "РА РО РУ РИ РЕ РІ"
        video: "https://www.youtube.com/watch?v=fMGsQ5KPQgg"
        note: "Послухай звук Р. Тепер додай голосні!"
      - word: "СА СО СУ СИ СЕ СІ"
        video: "https://www.youtube.com/watch?v=7UsFBgSL91E"
        note: "Послухай звук С. Тепер додай голосні!"
      - word: "КА КО КУ КИ КЕ КІ"
        video: "https://www.youtube.com/watch?v=J7sGEI4-xJo"
        note: "Послухай звук К. Тепер додай голосні!"
      - word: "БА БО БУ БИ БЕ БІ"
        video: "https://www.youtube.com/watch?v=V1hxBE_JbGg"
        note: "Послухай звук Б. Тепер додай голосні!"
      - word: "ВА ВО ВУ ВИ ВЕ ВІ"
        video: "https://www.youtube.com/watch?v=aFcvYfvQ2X4"
        note: "Послухай звук В. Тепер додай голосні!"
      - word: "ДА ДО ДУ ДИ ДЕ ДІ"
        video: "https://www.youtube.com/watch?v=g4Bh-lqzd48"
        note: "Послухай звук Д. Тепер додай голосні!"
      - word: "ТА ТО ТУ ТИ ТЕ ТІ"
        video: "https://www.youtube.com/watch?v=m-jcLR_gK0k"
        note: "Послухай звук Т. Тепер додай голосні!"
      - word: "ПА ПО ПУ ПИ ПЕ ПІ"
        video: "https://www.youtube.com/watch?v=JksSjjxyW5Y"
        note: "Послухай звук П. Тепер додай голосні!"

  # Activity 2: Classify words by syllable count.
  # Bins use dot symbols (•, ••, •••) — pre-literacy safe.
  - type: classify
    title: "Скільки складів?"
    instruction: "Скільки голосних — стільки складів."
    categories:
      - label: "•"
        symbol_hint: "1"
        items:
          - "🐺 вовк"
          - "🏠 дім"
          - "🪲 жук"
          - "🐱 кіт"
          - "👃 ніс"
          - "🐯 тигр"
          - "🍞 хліб"
          - "🧂 сіль"
      - label: "••"
        symbol_hint: "2"
        items:
          - "🍉 арбуз"
          - "🍌 банан"
          - "⛰️ гора"
          - "🦓 зебра"
          - "🐟 риба"
          - "🍋 лимон"
          - "🌙 місяць"
          - "🦌 олень"
          - "🕷️ павук"
          - "☀️ сонце"
          - "🧢 шапка"
          - "🧑 юнак"
      - label: "•••"
        symbol_hint: "3"
        items:
          - "🚀 ракета"
          - "🦩 фламінго"
          - "🧅 цибуля"
          - "🍎 яблуко"

  # Activity 3: Stress pairs — watch and repeat.
  # Demonstrates that stress changes meaning.
  - type: watch_and_repeat
    title: "Наголос змінює значення"
    items:
      - word: "за́мок 🏰"
        video: "https://www.youtube.com/watch?v=BhASNxitC1A"
        note: "Наголос на ПЕРШОМУ складі — за́мок (будівля)."
      - word: "замо́к 🔒"
        video: "https://www.youtube.com/watch?v=BhASNxitC1A"
        note: "Наголос на ДРУГОМУ складі — замо́к (на дверях)."
      - word: "о́брази 🖼️"
        video: "https://www.youtube.com/watch?v=gJFxRIPRZbI"
        note: "Наголос на ПЕРШОМУ складі — о́брази (зображення)."
      - word: "обра́зи 😠"
        video: "https://www.youtube.com/watch?v=gJFxRIPRZbI"
        note: "Наголос на ДРУГОМУ складі — обра́зи (кривди)."

  # Activity 4: Syllable count quiz.
  # Reuses image_to_letter component — emoji stimulus, number answer.
  # Distractors are wrong syllable counts.
  - type: image_to_letter
    title: "Порахуй склади"
    items:
      - emoji: 🐱
        answer: "1"
        distractors: ["2", "3"]
        note: "кіт — один голосний І = 1 склад"
      - emoji: 🍉
        answer: "2"
        distractors: ["1", "3"]
        note: "арбуз — А, У = 2 склади"
      - emoji: 🍎
        answer: "3"
        distractors: ["1", "2"]
        note: "яблуко — Я, У, О = 3 склади"
      - emoji: 🏠
        answer: "1"
        distractors: ["2", "3"]
        note: "дім — один голосний І = 1 склад"
      - emoji: 🐟
        answer: "2"
        distractors: ["1", "3"]
        note: "риба — И, А = 2 склади"
      - emoji: 🚀
        answer: "3"
        distractors: ["1", "2"]
        note: "ракета — А, Е, А = 3 склади"
      - emoji: 🐺
        answer: "1"
        distractors: ["2", "3"]
        note: "вовк — один голосний О = 1 склад"
      - emoji: ☀️
        answer: "2"
        distractors: ["1", "3"]
        note: "сонце — О, Е = 2 склади"
      - emoji: 🧅
        answer: "3"
        distractors: ["1", "2"]
        note: "цибуля — И, У, Я = 3 склади"
      - emoji: 🍞
        answer: "1"
        distractors: ["2", "3"]
        note: "хліб — один голосний І = 1 склад"
      - emoji: 🍌
        answer: "2"
        distractors: ["1", "3"]
        note: "банан — А, А = 2 склади"
      - emoji: 🐢
        answer: "4"
        distractors: ["2", "3"]
        note: "черепаха — Е, Е, А, А = 4 склади"
      - emoji: ⛰️
        answer: "2"
        distractors: ["1", "3"]
        note: "гора — О, А = 2 склади"
      - emoji: 🦩
        answer: "3"
        distractors: ["1", "2"]
        note: "фламінго — А, І, О = 3 склади"
      - emoji: 🧂
        answer: "1"
        distractors: ["2", "3"]
        note: "сіль — один голосний І = 1 склад"
      - emoji: 🌙
        answer: "2"
        distractors: ["1", "3"]
        note: "місяць — І, Я = 2 склади"
      - emoji: 🦌
        answer: "2"
        distractors: ["1", "3"]
        note: "олень — О, Е = 2 склади"
      - emoji: 🐯
        answer: "1"
        distractors: ["2", "3"]
        note: "тигр — один голосний И = 1 склад"
      - emoji: 🕷️
        answer: "2"
        distractors: ["1", "3"]
        note: "павук — А, У = 2 склади"
      - emoji: 🍋
        answer: "2"
        distractors: ["1", "3"]
        note: "лимон — И, О = 2 склади"
