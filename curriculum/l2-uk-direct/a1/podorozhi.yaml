module: podorozhi
track: l2-uk-direct
level: a1
type: vocabulary
title: "Подорожі"
subtitle: "Вокзал, аеропорт, напрямки, світ, визначні місця."
standard_ref: "Каталог Б #7 — подорожі: вокзал, аеропорт, кордон, рух, регіони світу, визначні місця"
textbook_ref: "Grade 3–4 — travel vocabulary"

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Куди ви їдете? Один квиток до + родовий. Ідіть + напрямок."
  examples:
    - "Один квиток до Львова, будь ласка."
    - "Ідіть прямо, потім ліворуч."
    - "О котрій відходить поїзд?"

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Транспортні вузли"
    items:
      - word: "вокзал"
        emoji: "🚂"
        sentence: "Поїзд відходить з вокзалу."
      - word: "автовокзал"
        emoji: "🚌"
        sentence: "Автобус на автовокзалі."
      - word: "аеропорт"
        emoji: "✈️"
        sentence: "Літак вилітає з аеропорту."
      - word: "станція"
        emoji: "🚇"
        sentence: "Станція метро."
      - word: "платформа"
        emoji: "🚂"
        sentence: "Поїзд на другій платформі."

  - category: "Кордон і митниця"
    items:
      - word: "кордон"
        emoji: "🛃"
        sentence: "Ми на кордоні."
      - word: "митний контроль"
        emoji: "🔍"
        sentence: "Митний контроль перевіряє документи."
      - word: "паспорт"
        emoji: "🛂"
        sentence: "Покажіть паспорт."
      - word: "віза"
        emoji: "📋"
        sentence: "Вам потрібна віза."
      - word: "митниця"
        emoji: "🏛️"
        sentence: "Митниця на кордоні."

  - category: "Рух"
    items:
      - word: "іти"
        emoji: "🚶"
        sentence: "Я іду пішки."
      - word: "їхати"
        emoji: "🚗"
        sentence: "Ми їдемо машиною."
      - word: "летіти"
        emoji: "✈️"
        sentence: "Літак летить до Парижа."
      - word: "приїхати"
        emoji: "🏁"
        sentence: "Ми приїхали!"
      - word: "виїхати"
        emoji: "🚗"
        sentence: "Ми виїхали рано."
      - word: "пересідати"
        emoji: "🔄"
        sentence: "Мені потрібно пересісти."

  - category: "Напрямки"
    items:
      - word: "прямо"
        emoji: "⬆️"
        sentence: "Ідіть прямо."
      - word: "ліворуч"
        emoji: "⬅️"
        sentence: "Поверніть ліворуч."
      - word: "праворуч"
        emoji: "➡️"
        sentence: "Поверніть праворуч."
      - word: "назад"
        emoji: "⬇️"
        sentence: "Ідіть назад."
      - word: "через"
        emoji: "↗️"
        sentence: "Через парк."
      - word: "навпроти"
        emoji: "🔄"
        sentence: "Банк навпроти."

  - category: "Регіони світу"
    items:
      - word: "Європа"
        emoji: "🌍"
        sentence: "Україна — в Європі."
      - word: "Азія"
        emoji: "🌏"
        sentence: "Китай — в Азії."
      - word: "Африка"
        emoji: "🌍"
        sentence: "Єгипет — в Африці."
      - word: "Америка"
        emoji: "🌎"
        sentence: "США — в Америці."
      - word: "Австралія"
        emoji: "🌏"
        sentence: "Кенгуру живуть в Австралії."
      - word: "північ"
        emoji: "⬆️"
        sentence: "На півночі холодно."
      - word: "південь"
        emoji: "⬇️"
        sentence: "На півдні тепло."
      - word: "захід"
        emoji: "⬅️"
        sentence: "Львів — на заході."
      - word: "схід"
        emoji: "➡️"
        sentence: "Харків — на сході."

  - category: "Визначні місця"
    items:
      - word: "визначне місце"
        emoji: "🏛️"
        sentence: "У Києві багато визначних місць."
      - word: "пам'ятник"
        emoji: "🗽"
        sentence: "Пам'ятник на площі."
      - word: "екскурсія"
        emoji: "🎫"
        sentence: "Ми поїдемо на екскурсію."
      - word: "фотографувати"
        emoji: "📸"
        sentence: "Я фотографую пам'ятник."
      - word: "карта"
        emoji: "🗺️"
        sentence: "Де карта?"

  - category: "Практичне"
    items:
      - word: "валіза"
        emoji: "🧳"
        sentence: "Моя валіза важка."
      - word: "рюкзак"
        emoji: "🎒"
        sentence: "Рюкзак за спиною."
      - word: "квиток"
        emoji: "🎫"
        sentence: "Один квиток до Львова."
      - word: "розклад"
        emoji: "📋"
        sentence: "Де розклад поїздів?"
      - word: "інформація"
        emoji: "ℹ️"
        sentence: "Де інформація?"
      - word: "путівник"
        emoji: "📖"
        sentence: "Путівник по Києву."
      - word: "затримка"
        emoji: "⏱️"
        sentence: "Затримка рейсу — дві години."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Категорії"
    instruction: "Розподіли слова"
    categories:
      - label: "Транспортні вузли"
        items:
          - "вокзал"
          - "аеропорт"
          - "станція"
          - "автовокзал"
      - label: "Рух"
        items:
          - "їхати"
          - "летіти"
          - "пересідати"
          - "приїхати"
      - label: "Напрямки"
        items:
          - "прямо"
          - "ліворуч"
          - "праворуч"
          - "назад"
      - label: "Визначні місця"
        items:
          - "пам'ятник"
          - "екскурсія"
          - "карта"
          - "визначне місце"

  - type: build_sentence
    title: "Запитуємо дорогу"
    sentences:
      - words: ["Вибачте", ",", "де", "вокзал", "?"]
        correct: "Вибачте, де вокзал?"
      - words: ["Ідіть", "прямо", ",", "потім", "ліворуч", "."]
        correct: "Ідіть прямо, потім ліворуч."
      - words: ["Один", "квиток", "до", "Львова", ",", "будь ласка", "."]
        correct: "Один квиток до Львова, будь ласка."
      - words: ["О", "котрій", "відходить", "поїзд", "?"]
        correct: "О котрій відходить поїзд?"

  - type: pattern_drill
    title: "Купуємо квитки"
    prompt: "Склади фразу"
    items:
      - given: "Львів, один квиток"
        answer: "Один квиток до Львова, будь ласка."
      - given: "Одеса, два квитки"
        answer: "Два квитки до Одеси, будь ласка."
      - given: "Харків, один квиток"
        answer: "Один квиток до Харкова, будь ласка."

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "Аеропорт — це місце для поїздів."
        answer: false
        correction: "Аеропорт — для літаків. Вокзал — для поїздів."
      - statement: "Паспорт потрібен на кордоні."
        answer: true
      - statement: "Україна — в Європі."
        answer: true
      - statement: "Львів — на сході України."
        answer: false
        correction: "Львів — на заході України."

  - type: reading
    title: "Читання: На вокзалі"
    text: |
      — Добрий день! Один квиток до Одеси, будь ласка.
      — Добрий день! На коли?
      — На завтра.
      — Є поїзд о шостій ранку і о дев'ятій вечора.
      — О дев'ятій вечора, будь ласка. З якої платформи?
      — З третьої платформи.
      — Скільки коштує квиток?
      — П'ятсот гривень.
      — Дякую!
    questions:
      - question: "Куди їде турист?"
        answer: "До Одеси."
      - question: "О котрій відходить поїзд?"
        answer: "О дев'ятій вечора."
      - question: "З якої платформи?"
        answer: "З третьої."
      - question: "Скільки коштує квиток?"
        answer: "П'ятсот гривень."

  - type: classify
    title: "Регіони світу"
    instruction: "Розподіли країни"
    categories:
      - label: "Європа"
        items:
          - "Україна"
          - "Франція"
          - "Німеччина"
          - "Польща"
      - label: "Азія"
        items:
          - "Китай"
          - "Японія"
          - "Індія"
      - label: "Африка"
        items:
          - "Єгипет"
          - "Нігерія"
      - label: "Америка"
        items:
          - "США"
          - "Канада"
          - "Бразилія"
