module: dim
track: l2-uk-direct
level: a1
type: vocabulary
title: "Дім"
subtitle: "Кімнати, меблі, домашнє середовище — місцевий відмінок і присвійні займенники"
standard_ref: "Catalogue B #2 — дім; §4.2.2 — possessive pronouns"
textbook_ref: "Grade 3–4 — locative consolidation, possessives"
teaching_notes: |
  Присвійні займенники узгоджуються з родом іменника: мій стіл, моя книга, моє ліжко, мої друзі.
  Кімнати — природний контекст для місцевого відмінка: у вітальні, на кухні, у спальні.
  Прийменники для розташування: в/у (у шафі, в холодильнику), на (на столі, на полиці).
  Практикуйте через опис власного дому: «У моїй кімнаті є...», «На кухні стоїть...».
  Лексика меблів і кімнат — висока частотність у побутовому мовленні.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "ДЕ? + присвійні займенники: мій/моя/моє/мої"
  examples:
    - "У вітальні є мій диван."
    - "На кухні стоїть наш холодильник."
    - "У спальні є моє ліжко."

# ─────────────────────────────────────────────
# VOCABULARY: 22 home words
# ─────────────────────────────────────────────
vocabulary:
  - category: "Кімнати"
    items:
      - word: "кімната"
        emoji: "🚪"
        sentence: "У нас є три кімнати."
      - word: "вітальня"
        emoji: "🛋️"
        sentence: "У вітальні є великий диван."
      - word: "кухня"
        emoji: "🍳"
        sentence: "Мама готує на кухні."
      - word: "спальня"
        emoji: "🛏️"
        sentence: "Моє ліжко у спальні."
      - word: "ванна кімната"
        emoji: "🛁"
        sentence: "Дзеркало у ванній кімнаті."
      - word: "туалет"
        emoji: "🚽"
        sentence: "Туалет поряд із ванною."
      - word: "балкон"
        emoji: "🌇"
        sentence: "Квіти ростуть на балконі."
      - word: "коридор"
        emoji: "🚶"
        sentence: "Взуття стоїть у коридорі."

  - category: "Меблі і речі"
    items:
      - word: "стіл"
        emoji: "🪑"
        sentence: "Стіл стоїть на кухні."
      - word: "стілець"
        emoji: "💺"
        sentence: "Стілець біля столу."
      - word: "ліжко"
        emoji: "🛏️"
        sentence: "Ліжко у спальні."
      - word: "шафа"
        emoji: "🚪"
        sentence: "Одяг у шафі."
      - word: "диван"
        emoji: "🛋️"
        sentence: "Кіт спить на дивані."
      - word: "полиця"
        emoji: "📚"
        sentence: "Книги на полиці."
      - word: "вікно"
        emoji: "🪟"
        sentence: "Вікно у кімнаті велике."
      - word: "двері"
        emoji: "🚪"
        sentence: "Двері відчинені."
      - word: "лампа"
        emoji: "💡"
        sentence: "Лампа стоїть на столі."
      - word: "килим"
        emoji: "🟫"
        sentence: "Килим лежить на підлозі."
      - word: "дзеркало"
        emoji: "🪞"
        sentence: "Дзеркало висить на стіні."
      - word: "холодильник"
        emoji: "🧊"
        sentence: "Молоко в холодильнику."

  - category: "Типи житла"
    items:
      - word: "квартира"
        emoji: "🏢"
        sentence: "Ми живемо у квартирі."
      - word: "будинок"
        emoji: "🏠"
        sentence: "Це наш будинок."

# ─────────────────────────────────────────────
# POSSESSIVES TABLE
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Присвійні займенники (називний відмінок)"
    columns: ["", "Чоловічий", "Жіночий", "Середній", "Множина"]
    rows:
      - ["мій", "мій", "моя", "моє", "мої"]
      - ["твій", "твій", "твоя", "твоє", "твої"]
      - ["наш", "наш", "наша", "наше", "наші"]
      - ["ваш", "ваш", "ваша", "ваше", "ваші"]
      - ["його/її/їхній", "його / її / їхній", "його / її / їхня", "його / її / їхнє", "його / її / їхні"]

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Яка кімната?"
    instruction: "Розподіли предмети за кімнатами"
    categories:
      - label: "Вітальня"
        items:
          - "диван"
          - "телевізор"
          - "килим"
          - "полиця"
      - label: "Кухня"
        items:
          - "холодильник"
          - "стіл"
          - "стілець"
          - "плита"
      - label: "Спальня"
        items:
          - "ліжко"
          - "шафа"
          - "лампа"
          - "подушка"
      - label: "Ванна кімната"
        items:
          - "дзеркало"
          - "рушник"
          - "мило"
          - "зубна щітка"

  - type: build_sentence
    title: "Де є що?"
    instruction: "Склади речення з місцевим відмінком"
    sentences:
      - words: ["Диван", "стоїть", "у", "вітальні", "."]
        correct: "Диван стоїть у вітальні."
      - words: ["Ліжко", "є", "у", "спальні", "."]
        correct: "Ліжко є у спальні."
      - words: ["Молоко", "в", "холодильнику", "."]
        correct: "Молоко в холодильнику."
      - words: ["Книги", "на", "полиці", "."]
        correct: "Книги на полиці."
      - words: ["Кіт", "спить", "на", "дивані", "."]
        correct: "Кіт спить на дивані."

  - type: pattern_drill
    title: "Присвійні займенники"
    prompt: "Обери правильний присвійний займенник"
    items:
      - given: "стіл — МОЄ?"
        answer: "Ні. Мій стіл. (чоловічий рід)"
      - given: "книга — МІЙ?"
        answer: "Ні. Моя книга. (жіночий рід)"
      - given: "ліжко — МОЯ?"
        answer: "Ні. Моє ліжко. (середній рід)"
      - given: "друзі — МОЄ?"
        answer: "Ні. Мої друзі. (множина)"
      - given: "кімната — НАША?"
        answer: "Так. Наша кімната. (жіночий рід)"
      - given: "дім — ВАШЕ?"
        answer: "Ні. Ваш дім. (чоловічий рід)"

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "Ліжко є у вітальні."
        answer: false
        correction: "Ліжко є у спальні."
      - statement: "Холодильник стоїть на кухні."
        answer: true
      - statement: "Дзеркало висить у ванній кімнаті."
        answer: true
      - statement: "Диван стоїть на балконі."
        answer: false
        correction: "Диван стоїть у вітальні."
      - statement: "Книги лежать на полиці."
        answer: true
      - statement: "Плита стоїть у спальні."
        answer: false
        correction: "Плита стоїть на кухні."

  - type: reading
    title: "Читання: Наш дім"
    text: |
      Це наш дім. У нас є три кімнати. У вітальні є великий диван і телевізор. У спальні є моє ліжко і шафа. На кухні мама готує їжу. Холодильник стоїть у кутку. У ванній кімнаті є дзеркало. На балконі ростуть квіти.
    questions:
      - question: "Скільки кімнат у домі?"
        answer: "Три."
      - question: "Де є диван?"
        answer: "У вітальні."
      - question: "Що робить мама на кухні?"
        answer: "Готує їжу."

  - type: riddle
    title: "Загадка"
    clues:
      - "Я стою у вітальні або спальні."
      - "У мені є сорочки і штани."
      - "Я не холодильник, але я зберігаю речі."
    answer: "ШАФА"
    answer_emoji: "🚪"
    source: "Curriculum plan"
