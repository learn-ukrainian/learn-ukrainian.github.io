module: znavidminnyk-ii
track: l2-uk-direct
level: a1
type: grammar
title: "Знахідний відмінок (КОГО?)"
subtitle: "Живі іменники у знахідному відмінку — люди і тварини"
standard_ref: "§4.2.3.2 — accusative animate"
textbook_ref: "Grade 4 — accusative: КОГО? ЩО?"
teaching_notes: |
  Головне питання — КОГО бачиш? КОГО чекаєш? КОГО любиш?
  Живий чоловічий рід змінюється: брат → брата, кіт → кота, лікар → лікаря.
  Контраст «КОГО?» vs «ЩО?» — це ключове розуміння: стіл → стіл (неживе), але кіт → кота (живе).
  Жіночий рід змінюється однаково для живих і неживих: мама → маму, книга → книгу.
  Практикуйте контрастними парами: бачу стіл (без змін) / бачу кота (змінюється).

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Якщо додаток — жива істота, чоловічий рід теж змінюється: -∅ → -а/-я"
  examples:
    - "Я бачу брата. (брат → брата)"
    - "Я люблю маму. (мама → маму)"
    - "Ти знаєш лікаря? (лікар → лікаря)"

# ─────────────────────────────────────────────
# GRAMMAR TABLE
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Знахідний відмінок (живе)"
    columns: ["Рід", "Називний (ХТО?)", "Знахідний (КОГО?)", "Зміна"]
    rows:
      - ["Чоловічий (живе)", "брат", "брата", "-∅ → -а"]
      - ["Чоловічий (живе)", "друг", "друга", "-∅ → -а"]
      - ["Чоловічий (живе)", "кіт", "кота", "-∅ → -а"]
      - ["Чоловічий (живе)", "лікар", "лікаря", "-∅ → -я"]
      - ["Жіночий (живе)", "мама", "маму", "-а → -у (як неживе)"]

  - title: "Контраст: живе і неживе (чоловічий рід)"
    columns: ["Тип", "Називний", "Знахідний"]
    rows:
      - ["Неживе", "стіл", "стіл (без змін)"]
      - ["Живе", "кіт", "кота (змінюється)"]
      - ["Неживе", "хліб", "хліб (без змін)"]
      - ["Живе", "друг", "друга (змінюється)"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Родина"
    items:
      - word: "мама"
        emoji: "👩"
        sentence: "Я люблю маму."
      - word: "тато"
        emoji: "👨"
        sentence: "Я бачу тата."
      - word: "брат"
        emoji: "👦"
        sentence: "Вона чекає брата."
      - word: "сестра"
        emoji: "👧"
        sentence: "Він знає сестру."
      - word: "дитина"
        emoji: "👶"
        sentence: "Мама бачить дитину."

  - category: "Друзі і знайомі"
    items:
      - word: "друг"
        emoji: "🤝"
        sentence: "Я чекаю друга."
      - word: "подруга"
        emoji: "👭"
        sentence: "Вона знає подругу."
      - word: "хлопець"
        emoji: "🧑"
        sentence: "Мама бачить хлопця."

  - category: "Тварини"
    items:
      - word: "кіт"
        emoji: "🐱"
        sentence: "Я бачу кота."
      - word: "пес"
        emoji: "🐕"
        sentence: "Вона любить пса."

  - category: "Професії"
    items:
      - word: "вчитель"
        emoji: "👨‍🏫"
        sentence: "Ми знаємо вчителя."
      - word: "лікар"
        emoji: "👨‍⚕️"
        sentence: "Він бачить лікаря."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Живий знахідний (чоловічий рід)"
    prompt: "Постав іменник у знахідний відмінок"
    items:
      - given: "брат → (я бачу...)"
        answer: "брата"
      - given: "друг → (я чекаю...)"
        answer: "друга"
      - given: "кіт → (вона бачить...)"
        answer: "кота"
      - given: "пес → (він знає...)"
        answer: "пса"
      - given: "тато → (я люблю...)"
        answer: "тата"
      - given: "лікар → (ти знаєш...)"
        answer: "лікаря"
      - given: "вчитель → (ми бачимо...)"
        answer: "вчителя"
      - given: "кінь → (вона бачить...)"
        answer: "коня"
      - given: "дідусь → (я знаю...)"
        answer: "дідуся"
      - given: "хлопець → (вона чекає...)"
        answer: "хлопця"
      - given: "птах → (він бачить...)"
        answer: "птаха"
      - given: "студент → (ми знаємо...)"
        answer: "студента"

  - type: classify
    title: "Змінюється чи ні? (чоловічий рід)"
    instruction: "Розподіли: знахідний змінюється (живе) чи ні (неживе)"
    categories:
      - label: "Змінюється (живе)"
        items:
          - "брат → брата"
          - "кіт → кота"
          - "друг → друга"
          - "лікар → лікаря"
          - "тато → тата"
      - label: "Без змін (неживе)"
        items:
          - "стіл → стіл"
          - "хліб → хліб"
          - "телефон → телефон"
          - "олівець → олівець"
          - "будинок → будинок"

  - type: build_sentence
    title: "Обери правильну форму"
    instruction: "Обери правильне закінчення"
    sentences:
      - words: ["Я", "люблю", "[мама/маму]", "."]
        correct: "Я люблю маму."
      - words: ["Він", "бачить", "[кіт/кота]", "."]
        correct: "Він бачить кота."
      - words: ["Ми", "знаємо", "[стіл/стіл]", "."]
        correct: "Ми знаємо стіл."
      - words: ["Ти", "чекаєш", "[друг/друга]", "."]
        correct: "Ти чекаєш друга."
      - words: ["Вона", "має", "[телефон/телефона]", "."]
        correct: "Вона має телефон."
      - words: ["Я", "бачу", "[лікар/лікаря]", "."]
        correct: "Я бачу лікаря."

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "Я чекаю друг."
        answer: false
        correction: "Я чекаю друга. (живе → змінюється)"
      - statement: "Він бачить кота."
        answer: true
      - statement: "Вона любить брата."
        answer: true
      - statement: "Я маю стіла."
        answer: false
        correction: "Я маю стіл. (неживе → без змін)"
      - statement: "Ти знаєш лікаря?"
        answer: true
      - statement: "Ми бачимо хліба."
        answer: false
        correction: "Ми бачимо хліб. (неживе → без змін)"

  - type: pattern_drill
    title: "Контраст: живе і неживе"
    prompt: "Порівняй: живе змінюється, неживе — ні"
    items:
      - given: "стіл → (я бачу...)"
        answer: "стіл (неживе — без змін)"
      - given: "кіт → (я бачу...)"
        answer: "кота (живе — змінюється)"
      - given: "хліб → (він їсть...)"
        answer: "хліб (неживе — без змін)"
      - given: "друг → (він бачить...)"
        answer: "друга (живе — змінюється)"
      - given: "телефон → (вона має...)"
        answer: "телефон (неживе — без змін)"
      - given: "тато → (я люблю...)"
        answer: "тата (живе — змінюється)"

  - type: proverb_drill
    title: "Прислів'я"
    proverb: "Без сім'ї нема щастя на землі."
    activity:
      type: fill_gap
      gap_word: "сім'ї"
      options: ["сім'ї", "землі", "щастя", "нема"]
      answer: "сім'ї"
      meaning: "Сім'я — найважливіше."
