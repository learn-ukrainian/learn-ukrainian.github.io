module: den
track: l2-uk-direct
level: a1
type: vocabulary
title: "День"
subtitle: "Розпорядок дня. Зворотні дієслова (-ся/-сь)."
standard_ref: "§4.2.4.1 — зворотні дієслова"
textbook_ref: "Grade 3 — reflexive verbs, Grade 4 — daily routine"

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Вранці я + дієслово. Зворотні дієслова: -ся (після приголосного), -сь (після голосного)"
  examples:
    - "Вранці я встаю о сьомій."
    - "Я вмиваюся і одягаюся."
    - "Потім я снідаю."

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Розпорядок дня"
    items:
      - word: "вставати / встаю"
        emoji: "⏰"
        sentence: "Я встаю о сьомій годині."
      - word: "вмиватися / вмиваюся"
        emoji: "🚿"
        sentence: "Я вмиваюся вранці."
      - word: "одягатися / одягаюся"
        emoji: "👔"
        sentence: "Я одягаюся після душу."
      - word: "снідати / снідаю"
        emoji: "🥣"
        sentence: "Я снідаю о восьмій."
      - word: "іти / іду"
        emoji: "🚶"
        sentence: "Я іду на роботу."
      - word: "працювати / працюю"
        emoji: "💼"
        sentence: "Я працюю з дев'ятої до п'ятої."
      - word: "обідати / обідаю"
        emoji: "🍽️"
        sentence: "Я обідаю о першій."
      - word: "відпочивати / відпочиваю"
        emoji: "🛋️"
        sentence: "Після обіду я відпочиваю."
      - word: "вечеряти / вечеряю"
        emoji: "🍲"
        sentence: "Я вечеряю о сьомій."
      - word: "лягати спати"
        emoji: "🛏️"
        sentence: "Я лягаю спати о одинадцятій."

  - category: "Зворотні дієслова"
    items:
      - word: "вмиватися"
        emoji: "🧼"
        sentence: "Діти вмиваються вранці."
      - word: "одягатися"
        emoji: "👗"
        sentence: "Вона одягається швидко."
      - word: "сміятися"
        emoji: "😂"
        sentence: "Ми сміємося разом."
      - word: "зустрічатися"
        emoji: "🤝"
        sentence: "Вони зустрічаються ввечері."
      - word: "дивитися"
        emoji: "👀"
        sentence: "Я дивлюся телевізор."

  - category: "Частини дня"
    items:
      - word: "вранці"
        emoji: "🌅"
        sentence: "Вранці сонце сходить."
      - word: "вдень"
        emoji: "☀️"
        sentence: "Вдень я працюю."
      - word: "після обіду"
        emoji: "🕑"
        sentence: "Після обіду я відпочиваю."
      - word: "ввечері"
        emoji: "🌇"
        sentence: "Ввечері я читаю книгу."
      - word: "вночі"
        emoji: "🌙"
        sentence: "Вночі всі сплять."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: build_sentence
    title: "Мій день"
    instruction: "Склади речення про розпорядок дня"
    sentences:
      - words: ["Вранці", "я", "встаю", "о", "сьомій", "."]
        correct: "Вранці я встаю о сьомій."
      - words: ["Потім", "я", "вмиваюся", "і", "одягаюся", "."]
        correct: "Потім я вмиваюся і одягаюся."
      - words: ["О", "восьмій", "я", "снідаю", "."]
        correct: "О восьмій я снідаю."
      - words: ["О", "дев'ятій", "я", "іду", "на", "роботу", "."]
        correct: "О дев'ятій я іду на роботу."
      - words: ["Після", "обіду", "я", "відпочиваю", "."]
        correct: "Після обіду я відпочиваю."
      - words: ["Ввечері", "я", "вечеряю", "і", "читаю", "."]
        correct: "Ввечері я вечеряю і читаю."
      - words: ["О", "одинадцятій", "я", "лягаю", "спати", "."]
        correct: "О одинадцятій я лягаю спати."
      - words: ["Вночі", "я", "сплю", "."]
        correct: "Вночі я сплю."

  - type: pattern_drill
    title: "Зворотні дієслова"
    prompt: "Постав зворотне дієслово у правильну форму"
    items:
      - given: "вмиватися → я"
        answer: "я вмиваюся"
      - given: "вмиватися → ти"
        answer: "ти вмиваєшся"
      - given: "вмиватися → він"
        answer: "він вмивається"
      - given: "одягатися → я"
        answer: "я одягаюся"
      - given: "одягатися → вона"
        answer: "вона одягається"
      - given: "сміятися → ми"
        answer: "ми сміємося"
      - given: "зустрічатися → вони"
        answer: "вони зустрічаються"

  - type: classify
    title: "Зворотні чи незворотні?"
    instruction: "Розподіли дієслова"
    categories:
      - label: "Зворотні (-ся)"
        items:
          - "вмиватися"
          - "одягатися"
          - "сміятися"
          - "зустрічатися"
          - "дивитися"
          - "купатися"
      - label: "Незворотні"
        items:
          - "снідати"
          - "працювати"
          - "обідати"
          - "вечеряти"
          - "читати"
          - "спати"

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "Ми вмиваємося вранці."
        answer: true
      - statement: "Ми снідаємося о восьмій."
        answer: false
        correction: "Снідати — незворотне дієслово. Правильно: Ми снідаємо."
      - statement: "Вона одягається швидко."
        answer: true
      - statement: "Він вечеряється ввечері."
        answer: false
        correction: "Вечеряти — незворотне. Правильно: Він вечеряє."

  - type: proverb_drill
    title: "Прислів'я"
    proverb: "Без роботи день роком стає."
    activity:
      type: true_false
      items:
        - statement: "Без роботи час іде швидко."
          answer: false
        - statement: "Без роботи день здається дуже довгим."
          answer: true

  - type: reading
    title: "Читання: Мій понеділок"
    text: |
      Сьогодні понеділок. Я встаю о сьомій годині. Я вмиваюся і одягаюся. Потім я снідаю. О дев'ятій я іду на роботу. Я працюю до п'ятої. Після роботи я обідаю. Ввечері я дивлюся телевізор і лягаю спати о одинадцятій.
    questions:
      - question: "О котрій він/вона встає?"
        answer: "О сьомій годині."
      - question: "Що він/вона робить вранці?"
        answer: "Вмивається, одягається і снідає."
      - question: "О котрій він/вона іде на роботу?"
        answer: "О дев'ятій."
      - question: "Що він/вона робить ввечері?"
        answer: "Дивиться телевізор."
