module: podobayetsya
track: l2-uk-direct
level: a1
type: communicative
title: "Подобається!"
subtitle: "Мені подобається. Я люблю. Я хочу. Вподобання і бажання."
standard_ref: "Каталог А #13 — вираження вподобань"
textbook_ref: "Grade 3 p.98 (загадка ЗНАННЯ)"
teaching_notes: >
  Ключова конструкція: МЕНІ подобається (давальний відмінок + 3-тя особа дієслова).
  Учні часто помиляються і кажуть *«Я подобаю» — це неправильно. Правильно: МЕНІ подобається.
  Порівняйте: «Я люблю каву» (знахідний) vs «Мені подобається кава» (давальний + називний).
  Не вводьте термін «давальний відмінок» — просто тренуйте форми: мені/тобі/йому/їй/нам/вам/їм.
  Дієслово «хотіти» потребує інфінітива: «Я хочу читати», «Я хочу каву».

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Мені/Тобі/Йому... подобається + іменник або інфінітив. Я люблю + іменник. Я хочу + інфінітив."
  examples:
    - "Мені подобається музика."
    - "Мені подобається читати."
    - "Я люблю книги."
    - "Я хочу каву."

# ─────────────────────────────────────────────
# VOCABULARY: preferences, hobbies, patterns
# ─────────────────────────────────────────────
vocabulary:
  - category: "Конструкція «подобається» (кому?)"
    items:
      - word: "мені подобається"
        emoji: "\U0001F9D1"
        sentence: "Мені подобається музика."
      - word: "тобі подобається"
        emoji: "\U0001F44B"
        sentence: "Тобі подобається спорт?"
      - word: "йому подобається"
        emoji: "\U0001F468"
        sentence: "Йому подобається футбол."
      - word: "їй подобається"
        emoji: "\U0001F469"
        sentence: "Їй подобається малювання."
      - word: "нам подобається"
        emoji: "\U0001F46B"
        sentence: "Нам подобається музика."
      - word: "вам подобається"
        emoji: "\U0001F465"
        sentence: "Вам подобається кіно?"
      - word: "їм подобається"
        emoji: "\U0001F46A"
        sentence: "Їм подобається спорт."

  - category: "Дієслова вподобань"
    items:
      - word: "подобається"
        emoji: "\U0001F44D"
        sentence: "Мені подобається читати."
      - word: "не подобається"
        emoji: "\U0001F44E"
        sentence: "Мені не подобається дощ."
      - word: "люблю"
        emoji: "\u2764\uFE0F"
        sentence: "Я люблю книги."
      - word: "не люблю"
        emoji: "\U0001F494"
        sentence: "Я не люблю каву."
      - word: "хочу"
        emoji: "\U0001F4AD"
        sentence: "Я хочу читати."

  - category: "Інтереси і хобі"
    items:
      - word: "музика"
        emoji: "\U0001F3B5"
        sentence: "Мені подобається музика."
      - word: "спорт"
        emoji: "\u26BD"
        sentence: "Йому подобається спорт."
      - word: "кіно"
        emoji: "\U0001F3AC"
        sentence: "Я люблю кіно."
      - word: "книги"
        emoji: "\U0001F4DA"
        sentence: "Я люблю книги."
      - word: "футбол"
        emoji: "\u26BD"
        sentence: "Тобі подобається футбол?"
      - word: "плавання"
        emoji: "\U0001F3CA"
        sentence: "Мені подобається плавання."
      - word: "малювання"
        emoji: "\U0001F3A8"
        sentence: "Їй подобається малювання."
      - word: "танці"
        emoji: "\U0001F483"
        sentence: "Нам подобаються танці."
      - word: "подорожі"
        emoji: "\u2708\uFE0F"
        sentence: "Я люблю подорожі."
      - word: "готування"
        emoji: "\U0001F373"
        sentence: "Мені подобається готування."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Кому подобається?"
    prompt: "Утвори речення"
    items:
      - given: "ти + подобається + музика"
        answer: "Тобі подобається музика."
      - given: "він + подобається + футбол"
        answer: "Йому подобається футбол."
      - given: "вона + подобається + малювання"
        answer: "Їй подобається малювання."
      - given: "ми + подобається + кіно"
        answer: "Нам подобається кіно."
      - given: "я + подобається + читати"
        answer: "Мені подобається читати."
      - given: "вони + подобається + спорт"
        answer: "Їм подобається спорт."
      - given: "ви + подобається + подорожі"
        answer: "Вам подобаються подорожі."

  - type: classify
    title: "Подобається чи не подобається?"
    instruction: "Розподіли фрази"
    categories:
      - label: "Подобається \u2714"
        items:
          - "Мені подобається музика."
          - "Я люблю книги."
          - "Їй подобається малювання."
          - "Нам подобається кіно."
          - "Тобі подобається спорт."
          - "Я хочу читати."
      - label: "Не подобається \u2718"
        items:
          - "Мені не подобається дощ."
          - "Я не люблю каву."
          - "Йому не подобається футбол."
          - "Їм не подобається готування."
          - "Я не хочу спати."
          - "Вам не подобається музика."

  - type: build_sentence
    title: "Склади речення про вподобання"
    instruction: "Обери слова і склади речення"
    sentences:
      - words: ["Мені", "подобається", "музика", "."]
        correct: "Мені подобається музика."
      - words: ["Тобі", "подобається", "спорт", "?"]
        correct: "Тобі подобається спорт?"
      - words: ["Їй", "не", "подобається", "дощ", "."]
        correct: "Їй не подобається дощ."
      - words: ["Я", "люблю", "книги", "."]
        correct: "Я люблю книги."
      - words: ["Він", "хоче", "каву", "."]
        correct: "Він хоче каву."

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "«Мені подобається» = «Я не люблю»."
        answer: false
        correction: "«Мені подобається» = «Я люблю» (позитивне значення)."
      - statement: "«Мені подобається читати» — це правильне речення."
        answer: true
      - statement: "«Тобі» — це форма для «він»."
        answer: false
        correction: "«Тобі» — це форма для «ти». Для «він» — «йому»."
      - statement: "«Я хочу каву» — це бажання."
        answer: true
      - statement: "«Мені» і «Я люблю» мають однакове значення."
        answer: false
        correction: "«Мені подобається» (загальне вподобання) і «Я люблю» (особисте, сильніше) — різні відтінки."

  - type: pattern_drill
    title: "Подобається, люблю чи хочу?"
    prompt: "Обери правильне слово"
    items:
      - given: "___ подобається читати. (я)"
        answer: "Мені подобається читати."
      - given: "Я ___ книги. (любити)"
        answer: "Я люблю книги."
      - given: "Я ___ нову книгу. (хотіти)"
        answer: "Я хочу нову книгу."
      - given: "___ не подобається дощ. (ми)"
        answer: "Нам не подобається дощ."
      - given: "Вона ___ кіно. (любити)"
        answer: "Вона любить кіно."

  - type: riddle
    title: "Загадка"
    clues:
      - "На базарі їх не купиш,"
      - "у крамниці не знайдеш."
    answer: "ЗНАННЯ"
    answer_emoji: "\U0001F4DA"
    source: "Grade 3 p.98"

  - type: reading
    title: "Читання — діалог про хобі"
    text: |
      — Що тобі подобається?
      — Мені подобається музика і спорт. А тобі?
      — Я люблю кіно. Мені не подобається спорт.
      — А що ти хочеш робити сьогодні?
      — Я хочу дивитися кіно. А ти?
      — Я хочу грати у футбол.
    questions:
      - question: "Що подобається першому другові?"
        answer: "Музика і спорт."
      - question: "Що любить другий друг?"
        answer: "Кіно."
      - question: "Що не подобається другому другові?"
        answer: "Спорт."
      - question: "Що хоче робити перший друг?"
        answer: "Грати у футбол."
