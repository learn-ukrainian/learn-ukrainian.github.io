module: znavidminnyk-i
track: l2-uk-direct
level: a1
type: grammar
title: "Знахідний відмінок (ЩО?)"
subtitle: "Називаємо те, на що діє дієслово — неживі іменники"
standard_ref: "§4.2.3.2 — accusative case"
textbook_ref: "Grade 4 — accusative: КОГО? ЩО?"

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Дієслово + ЩО? → знахідний відмінок. Жіночий рід змінює закінчення, чоловічий і середній — ні."
  examples:
    - "Я читаю книгу. (книга → книгу)"
    - "Він має стіл. (стіл → стіл)"
    - "Вона бачить вікно. (вікно → вікно)"

# ─────────────────────────────────────────────
# GRAMMAR TABLE
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Знахідний відмінок (неживе)"
    columns: ["Рід", "Називний", "Знахідний", "Зміна"]
    rows:
      - ["Жіночий -а", "книга", "книгу", "-а → -у"]
      - ["Жіночий -я", "земля", "землю", "-я → -ю"]
      - ["Чоловічий (неживе)", "стіл", "стіл", "без змін"]
      - ["Середній", "вікно", "вікно", "без змін"]

# ─────────────────────────────────────────────
# KEY VERBS
# ─────────────────────────────────────────────
key_verbs:
  - "читати"
  - "писати"
  - "мати"
  - "любити"
  - "бачити"
  - "купувати"
  - "їсти"
  - "пити"
  - "хотіти"
  - "знати"
  - "розуміти"

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Зміни форму (жіночий рід)"
    prompt: "Постав іменник у знахідний відмінок"
    items:
      - given: "книга → (я читаю...)"
        answer: "книгу"
      - given: "сумка → (вона має...)"
        answer: "сумку"
      - given: "піца → (ми їмо...)"
        answer: "піцу"
      - given: "вода → (він п'є...)"
        answer: "воду"
      - given: "кава → (ти п'єш...)"
        answer: "каву"
      - given: "школа → (я бачу...)"
        answer: "школу"
      - given: "квітка → (вона купує...)"
        answer: "квітку"
      - given: "куртка → (я маю...)"
        answer: "куртку"
      - given: "лампа → (він бачить...)"
        answer: "лампу"
      - given: "газета → (вона читає...)"
        answer: "газету"
      - given: "земля → (я бачу...)"
        answer: "землю"
      - given: "пісня → (ми слухаємо...)"
        answer: "пісню"
      - given: "кухня → (він знає...)"
        answer: "кухню"
      - given: "сорочка → (ти купуєш...)"
        answer: "сорочку"
      - given: "ручка → (вона має...)"
        answer: "ручку"

  - type: build_sentence
    title: "Обери правильну форму"
    instruction: "Обери правильне закінчення іменника"
    sentences:
      - words: ["Я", "читаю", "[книга/книгу]", "."]
        correct: "Я читаю книгу."
      - words: ["Він", "має", "[стіл/столу]", "."]
        correct: "Він має стіл."
      - words: ["Ми", "їмо", "[піца/піцу]", "."]
        correct: "Ми їмо піцу."
      - words: ["Вона", "п'є", "[вода/воду]", "."]
        correct: "Вона п'є воду."
      - words: ["Я", "бачу", "[вікно/вікну]", "."]
        correct: "Я бачу вікно."
      - words: ["Ти", "купуєш", "[сумка/сумку]", "."]
        correct: "Ти купуєш сумку."

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "Я люблю мамо."
        answer: false
        correction: "Я люблю маму."
      - statement: "Він читає книгу."
        answer: true
      - statement: "Ми бачимо вікно."
        answer: true
      - statement: "Вона має сумка."
        answer: false
        correction: "Вона має сумку."
      - statement: "Я п'ю каву."
        answer: true
      - statement: "Він їсть піца."
        answer: false
        correction: "Він їсть піцу."

  - type: classify
    title: "Змінюється чи ні?"
    instruction: "Розподіли: форма змінюється (жіночий рід) чи залишається (чоловічий/середній)"
    categories:
      - label: "Змінюється (-а → -у / -я → -ю)"
        items:
          - "книга → книгу"
          - "вода → воду"
          - "сумка → сумку"
          - "земля → землю"
          - "кава → каву"
      - label: "Без змін"
        items:
          - "стіл → стіл"
          - "вікно → вікно"
          - "хліб → хліб"
          - "молоко → молоко"
          - "телефон → телефон"

  - type: riddle
    title: "Загадка"
    clues:
      - "Влітку медом ласував,"
      - "По малину в ліс ходив."
      - "А як впав глибокий сніг,"
      - "Позіхнув і спати ліг."
    answer: "ВЕДМІДЬ"
    answer_emoji: "🐻"
    source: "Grade 3 p.76"

  - type: reading
    title: "Читання: У магазині"
    text: |
      Тарас іде в магазин. Він хоче купити хліб і молоко. Він бачить гарну книгу. Тарас купує книгу і хліб. Він також бере воду. Тарас має сумку. Він кладе все в сумку.
    questions:
      - question: "Що купує Тарас?"
        answer: "Книгу і хліб."
      - question: "Що він також бере?"
        answer: "Воду."
      - question: "Куди він кладе все?"
        answer: "В сумку."
