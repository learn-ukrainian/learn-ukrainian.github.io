  - type: classify
    # Drag letter shapes into two bins.
    # Labels are symbols from the Буквар — no reading required.
    # • = vowel (formed by voice alone)
    # — = consonant (formed by noise + voice)
    categories:
      - label: "•"
        symbol_hint: "голосний"
        items: [А, Е, И, І, О, У, Є, Ї, Ю, Я]
      - label: "—"
        symbol_hint: "приголосний"
        items: [М, С, Н, Л, К, Р, Б, В, Д, Г, Ґ, Ж, З, П, Т, Х, Ф, Ц, Ч, Ш, Щ, Й]

  - type: image_to_letter
    # See an emoji/image — tap which letter the word starts with.
    # No reading. Pure visual + letter shape recognition.
    items:
      - emoji: 🍉
        answer: А
        distractors: [О, У, Е]
      - emoji: 🍌
        answer: Б
        distractors: [В, П, М]
      - emoji: 🐺
