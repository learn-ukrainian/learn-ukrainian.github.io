module: abetka
track: l2-uk-direct
level: a1
type: script_foundation
title: Абетка
standard_ref: "§4.1.1 — alphabet, §4.1.2 — apostrophe, §4.1.4 — vowels/consonants, §4.1.5 — stress"
playlist: "https://www.youtube.com/playlist?list=PLpkSIXDyaJi3mlJlKXWKhdiJZj67fPXQV"
playlist_credit: "Anna Ohоiko — Ukrainian Lessons"

# ─────────────────────────────────────────────
# LETTERS
# Each entry: uppercase, lowercase, sound_type,
# key_word (Ukrainian), emoji, image_url, pronunciation_video
# ─────────────────────────────────────────────
letters:
  - upper: А
    lower: а
    sound_type: vowel
    key_word: арбуз
    emoji: 🍉
    image_url: null
    pronunciation_video: "https://www.youtube.com/watch?v=hvB3VpcR3ZE"

  - upper: Б
    lower: б
    sound_type: consonant
    key_word: банан
    emoji: 🍌
    image_url: null
    pronunciation_video: "https://www.youtube.com/watch?v=V1hxBE_JbGg"

  - upper: В
    lower: в
    sound_type: consonant
    key_word: вовк
    emoji: 🐺
    image_url: null
    pronunciation_video: "https://www.youtube.com/watch?v=aFcvYfvQ2X4"

  - upper: Г
    lower: г
    sound_type: consonant
    note: "Г — м'який горловий звук. Повітря проходить вільно. Слухай відео уважно!"
    key_word: гора
    emoji: ⛰️
    image_url: null
    pronunciation_video: "https://www.youtube.com/watch?v=gVnclpSI0DU"

  - upper: Ґ
    lower: ґ
    sound_type: consonant
    note: "Ґ — твердий звук. Вимовляється в горлі, голосні зв'язки вібрують. Рідко вживається."
    key_word: ґанок
    emoji: 🚪
    image_url: null
    pronunciation_video: "https://www.youtube.com/watch?v=gNjHqjTW9WQ"

  - upper: Д
    lower: д
    sound_type: consonant
    key_word: дім
    emoji: 🏠
    image_url: null
    pronunciation_video: "https://www.youtube.com/watch?v=g4Bh-lqzd48"

  - upper: Е
    lower: е
    sound_type: vowel
    key_word: екран
    emoji: 📺
    image_url: null
    pronunciation_video: "https://www.youtube.com/watch?v=KFlsroBW0dk"

  - upper: Є
    lower: є
    sound_type: vowel
    note: "Є — завжди починається зі звуку Й. На початку слова і після голосної чути обидва звуки."
    key_word: єнот
    emoji: 🦝
    image_url: null
    pronunciation_video: "https://www.youtube.com/watch?v=O0bwRyyBQSc"

  - upper: Ж
    lower: ж
    sound_type: consonant
    note: "Ж — шиплячий дзвінкий звук. Язик піднятий, губи округлені."
    key_word: жук
    emoji: 🪲
    image_url: null
    pronunciation_video: "https://www.youtube.com/watch?v=dIrGVcqPwqM"

  - upper: З
    lower: з
    sound_type: consonant
    key_word: зебра
    emoji: 🦓
    image_url: null
    pronunciation_video: "https://www.youtube.com/watch?v=BhASNxitC1A"

  - upper: И
    lower: и
    sound_type: vowel
    note: "И — особливий звук. Немає точного аналогу в інших мовах. Слухай уважно! И ніколи не починає слово."
    key_word: риба
    emoji: 🐟
    image_url: null
    pronunciation_video: "https://www.youtube.com/watch?v=W-1rCu0indE"

  - upper: І
    lower: і
    sound_type: vowel
    key_word: індик
    emoji: 🦃
    image_url: null
    pronunciation_video: "https://www.youtube.com/watch?v=Z9TH0H4ShGo"

  - upper: Ї
    lower: ї
    sound_type: vowel
    note: "Ї — завжди починається зі звуку Й. Завжди."
    key_word: їжак
    emoji: 🦔
    image_url: null
    pronunciation_video: "https://www.youtube.com/watch?v=UcjdjQXhAY8"

  - upper: Й
    lower: й
    sound_type: consonant
    note: "Й — дуже короткий звук. Ніколи не утворює склад сам по собі."
    key_word: йогурт
    emoji: 🥛
    image_url: null
    pronunciation_video: "https://www.youtube.com/watch?v=aq0cjB90s3w"

  - upper: К
    lower: к
    sound_type: consonant
    key_word: кіт
    emoji: 🐱
    image_url: null
    pronunciation_video: "https://www.youtube.com/watch?v=J7sGEI4-xJo"

  - upper: Л
    lower: л
    sound_type: consonant
    key_word: лимон
    emoji: 🍋
    image_url: null
    pronunciation_video: "https://www.youtube.com/watch?v=v6-3Xg52Buk"

  - upper: М
    lower: м
    sound_type: consonant
    key_word: місяць
    emoji: 🌙
    image_url: null
    pronunciation_video: "https://www.youtube.com/watch?v=Ez95H4ibuJo"

  - upper: Н
    lower: н
    sound_type: consonant
    key_word: ніс
    emoji: 👃
    image_url: null
    pronunciation_video: "https://www.youtube.com/watch?v=vNUfiKHPYaU"

  - upper: О
    lower: о
    sound_type: vowel
    key_word: олень
    emoji: 🦌
    image_url: null
    pronunciation_video: "https://www.youtube.com/watch?v=gJFxRIPRZbI"

  - upper: П
    lower: п
    sound_type: consonant
    key_word: павук
    emoji: 🕷️
    image_url: null
    pronunciation_video: "https://www.youtube.com/watch?v=JksSjjxyW5Y"

  - upper: Р
    lower: р
    sound_type: consonant
    note: "Р — вібруючий звук. Кінчик язика вібрує біля верхніх зубів."
    key_word: ракета
    emoji: 🚀
    image_url: null
    pronunciation_video: "https://www.youtube.com/watch?v=fMGsQ5KPQgg"

  - upper: С
    lower: с
    sound_type: consonant
    key_word: сонце
    emoji: ☀️
    image_url: null
    pronunciation_video: "https://www.youtube.com/watch?v=7UsFBgSL91E"

  - upper: Т
    lower: т
    sound_type: consonant
    key_word: тигр
    emoji: 🐯
    image_url: null
    pronunciation_video: "https://www.youtube.com/watch?v=m-jcLR_gK0k"

  - upper: У
    lower: у
    sound_type: vowel
    key_word: учень
    emoji: 🎒
    image_url: null
    pronunciation_video: "https://www.youtube.com/watch?v=VB1O6PmtYRU"

  - upper: Ф
    lower: ф
    sound_type: consonant
    note: "Ф — рідко зустрічається в українських словах. Переважно в запозиченнях."
    key_word: фламінго
    emoji: 🦩
    image_url: null
    pronunciation_video: "https://www.youtube.com/watch?v=haHRsFFZRQI"

  - upper: Х
    lower: х
    sound_type: consonant
    note: "Х — глухий звук із горла. Повітря проходить із тертям. Порівняй: Г (дзвінкий) — Х (глухий)."
    key_word: хліб
    emoji: 🍞
    image_url: null
    pronunciation_video: "https://www.youtube.com/watch?v=vpr58zJSJKc"

  - upper: Ц
    lower: ц
    sound_type: consonant
    note: "Ц — злитий звук: Т + С вимовляються як одне ціле."
    key_word: цибуля
    emoji: 🧅
    image_url: null
    pronunciation_video: "https://www.youtube.com/watch?v=u44eCjR2Oz8"

  - upper: Ч
    lower: ч
    sound_type: consonant
    note: "Ч — злитий звук: Т + Ш вимовляються як одне ціле. Язик торкається піднебіння."
    key_word: черепаха
    emoji: 🐢
    image_url: null
    pronunciation_video: "https://www.youtube.com/watch?v=UsJkbdsY2RA"

  - upper: Ш
    lower: ш
    sound_type: consonant
    note: "Ш — шиплячий глухий звук. Губи округлені, язик піднятий. Порівняй: Ж (дзвінкий) — Ш (глухий)."
    key_word: шапка
    emoji: 🧢
    image_url: null
    pronunciation_video: "https://www.youtube.com/watch?v=1D-6MIw3OXY"

  - upper: Щ
    lower: щ
    sound_type: consonant
    note: "Щ — це два звуки разом: [шч]. Одна буква — два звуки."
    key_word: щітка
    emoji: 🪥
    image_url: null
    pronunciation_video: "https://www.youtube.com/watch?v=QmBLieIuf6Q"

  - upper: Ь
    lower: ь
    sound_type: special
    note: "М'який знак — не має власного звуку. Пом'якшує приголосний перед собою."
    key_word: сіль
    emoji: 🧂
    image_url: null
    pronunciation_video: "https://www.youtube.com/watch?v=cJlal8XKBxo"

  - upper: Ю
    lower: ю
    sound_type: vowel
    note: "Ю — починається зі звуку Й. На початку слова і після голосної чути обидва звуки."
    key_word: юнак
    emoji: 🧑
    image_url: null
    pronunciation_video: "https://www.youtube.com/watch?v=9JdIBYCTWGw"

  - upper: Я
    lower: я
    sound_type: vowel
    note: "Я — починається зі звуку Й. Також це слово: Я = я (я іду, я читаю)."
    key_word: яблуко
    emoji: 🍎
    image_url: null
    pronunciation_video: "https://www.youtube.com/watch?v=yhSAf41LX8I"

# ─────────────────────────────────────────────
# OVERVIEW VIDEO
# ─────────────────────────────────────────────
overview_video: "https://www.youtube.com/watch?v=ksXIXj7CXwc"
overview_credit: "Anna Ohоiko — Ukrainian Letters and Sounds"

# ─────────────────────────────────────────────
# SPECIAL CHARACTER
# ─────────────────────────────────────────────
apostrophe:
  symbol: "'"
  note: "Апостроф — розділяє приголосний від Я, Ю, Є, Ї. Обидва звуки вимовляються повністю."
  example_word: м'яч
  emoji: ⚽

# ─────────────────────────────────────────────
# VOWEL / CONSONANT GROUPS
# ─────────────────────────────────────────────
vowels: [А, Е, И, І, О, У, Є, Ї, Ю, Я]
consonants: [Б, В, Г, Ґ, Д, Ж, З, Й, К, Л, М, Н, П, Р, С, Т, Ф, Х, Ц, Ч, Ш, Щ]
special: [Ь]

# ─────────────────────────────────────────────
# DIGRAPHS — two letters, one sound
# ─────────────────────────────────────────────
digraphs:
  - letters: ДЖ
    sound_type: consonant
    note: "ДЖ — дві букви, один звук. Вимовляється злито, як одне ціле."
    key_word: джерело
    emoji: ⛲
    image_url: null
    pronunciation_video: null

  - letters: ДЗ
    sound_type: consonant
    note: "ДЗ — дві букви, один звук. Вимовляється злито, як одне ціле."
    key_word: дзвін
    emoji: 🔔
    image_url: null
    pronunciation_video: null

# ─────────────────────────────────────────────
# STRESS RULE
# ─────────────────────────────────────────────
stress:
  rule: "Наголос в українській мові вільний — він може падати на будь-який склад."
  marker: "У словнику наголошений склад позначається знаком ´ над голосною: а́, о́, у́..."
  examples:
    - word: арбу́з
      stressed_syllable: буз
    - word: я́блуко
      stressed_syllable: яб
    - word: черепа́ха
      stressed_syllable: па

# ─────────────────────────────────────────────
# ACTIVITIES
# No reading required. Learner does not know Ukrainian yet.
# All meaning conveyed through: letter shapes, emoji, video, symbols.
# ─────────────────────────────────────────────
activities:

  - type: watch_and_repeat
    # Watch each letter video, repeat the sound out loud.
    # No text needed — video shows the letter, teacher says the sound.
    items:
      - letter: А
        video: "https://www.youtube.com/watch?v=hvB3VpcR3ZE"
