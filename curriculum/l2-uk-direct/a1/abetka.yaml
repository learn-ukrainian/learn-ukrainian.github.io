      - emoji: 🚀
        answer: Р
        distractors: [Л, Н, М]
      - emoji: ☀️
        answer: С
        distractors: [З, Ц, Ш]
      - emoji: 🐯
        answer: Т
        distractors: [Д, П, К]
      - emoji: 🎒
        answer: У
        distractors: [О, А, И]
      - emoji: 🍞
        answer: Х
        distractors: [К, Г, Ц]
      - emoji: 🧅
