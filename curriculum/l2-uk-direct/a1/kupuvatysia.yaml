module: kupuvatysia
track: l2-uk-direct
level: a1
type: vocabulary
title: "Купувати"
subtitle: "Магазини, ціни, гігієна, канцелярія. Скільки коштує?"
standard_ref: "Каталог Б #8 — купівля: магазини, продукти, гігієна, канцелярія, вага/об'єм, гроші"
textbook_ref: "Grade 3–4 — shopping vocabulary"

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Скільки коштує...? — Це коштує ... гривень."
  examples:
    - "Скільки коштує хліб? — Хліб коштує п'ятнадцять гривень."
    - "Два кілограми яблук, будь ласка."
    - "Дайте, будь ласка, одну пляшку води."

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Магазини"
    items:
      - word: "магазин"
        emoji: "🏪"
        sentence: "Я іду в магазин."
      - word: "крамниця"
        emoji: "🛍️"
        sentence: "У крамниці є одяг."
      - word: "ринок"
        emoji: "🏬"
        sentence: "На ринку свіжі овочі."
      - word: "супермаркет"
        emoji: "🛒"
        sentence: "У супермаркеті все є."
      - word: "аптека"
        emoji: "💊"
        sentence: "Ліки купують в аптеці."
      - word: "кіоск"
        emoji: "🏪"
        sentence: "У кіоску є газети."

  - category: "Дії"
    items:
      - word: "купувати"
        emoji: "🛒"
        sentence: "Я купую хліб."
      - word: "продавати"
        emoji: "🏷️"
        sentence: "Він продає овочі."
      - word: "платити"
        emoji: "💳"
        sentence: "Я плачу карткою."
      - word: "коштувати"
        emoji: "💰"
        sentence: "Скільки це коштує?"
      - word: "давати"
        emoji: "🤲"
        sentence: "Дайте, будь ласка, хліб."
      - word: "брати"
        emoji: "🫴"
        sentence: "Я беру два яблука."
      - word: "вибирати"
        emoji: "👆"
        sentence: "Вона вибирає сукню."

  - category: "Гроші"
    items:
      - word: "гривня"
        emoji: "💵"
        sentence: "Хліб коштує п'ятнадцять гривень."
      - word: "копійка"
        emoji: "🪙"
        sentence: "Двадцять п'ять копійок."
      - word: "ціна"
        emoji: "🏷️"
        sentence: "Яка ціна?"
      - word: "знижка"
        emoji: "🔖"
        sentence: "Сьогодні знижка 20%."
      - word: "решта"
        emoji: "💰"
        sentence: "Ось ваша решта."
      - word: "чек"
        emoji: "🧾"
        sentence: "Дайте, будь ласка, чек."

  - category: "Гігієна"
    items:
      - word: "мило"
        emoji: "🧼"
        sentence: "Мило для рук."
      - word: "шампунь"
        emoji: "🧴"
        sentence: "Шампунь для волосся."
      - word: "зубна паста"
        emoji: "🪥"
        sentence: "Зубна паста в тюбику."
      - word: "зубна щітка"
        emoji: "🪥"
        sentence: "Нова зубна щітка."
      - word: "рушник"
        emoji: "🛁"
        sentence: "Білий рушник."
      - word: "туалетний папір"
        emoji: "🧻"
        sentence: "Туалетний папір у магазині."

  - category: "Канцелярія"
    items:
      - word: "ручка"
        emoji: "🖊️"
        sentence: "Ручка синя."
      - word: "олівець"
        emoji: "✏️"
        sentence: "Олівець простий."
      - word: "зошит"
        emoji: "📓"
        sentence: "Зошит для нотаток."
      - word: "папір"
        emoji: "📄"
        sentence: "Білий папір."
      - word: "ножиці"
        emoji: "✂️"
        sentence: "Ножиці гострі."
      - word: "клей"
        emoji: "🫙"
        sentence: "Клей для паперу."

  - category: "Вага і об'єм"
    items:
      - word: "кілограм"
        emoji: "⚖️"
        sentence: "Один кілограм яблук."
      - word: "грам"
        emoji: "⚖️"
        sentence: "Двісті грамів сиру."
      - word: "літр"
        emoji: "🫗"
        sentence: "Один літр молока."
      - word: "пляшка"
        emoji: "🍶"
        sentence: "Одна пляшка води."
      - word: "пакет"
        emoji: "🛍️"
        sentence: "Один пакет молока."

  - category: "Ціна"
    items:
      - word: "дорогий"
        emoji: "💎"
        sentence: "Цей телефон дорогий."
      - word: "дешевий"
        emoji: "🏷️"
        sentence: "Ці овочі дешеві."
      - word: "безкоштовний"
        emoji: "🆓"
        sentence: "Вода безкоштовна."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: build_sentence
    title: "Діалог у магазині"
    sentences:
      - words: ["Скільки", "коштує", "хліб", "?"]
        correct: "Скільки коштує хліб?"
      - words: ["Хліб", "коштує", "п'ятнадцять", "гривень", "."]
        correct: "Хліб коштує п'ятнадцять гривень."
      - words: ["Дайте", ",", "будь ласка", ",", "два", "кілограми", "яблук", "."]
        correct: "Дайте, будь ласка, два кілограми яблук."
      - words: ["Одну", "пляшку", "води", ",", "будь ласка", "."]
        correct: "Одну пляшку води, будь ласка."

  - type: pattern_drill
    title: "Наказовий спосіб"
    prompt: "Утвори ввічливу форму"
    items:
      - given: "дати → ви (наказ)"
        answer: "дайте"
      - given: "сказати → ви (наказ)"
        answer: "скажіть"
      - given: "показати → ви (наказ)"
        answer: "покажіть"
      - given: "дати → ти (наказ)"
        answer: "дай"
      - given: "взяти → ви (наказ)"
        answer: "візьміть"

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "Дорогий магазин — там дешеві ціни."
        answer: false
        correction: "Дорогий = високі ціни."
      - statement: "Ліки купують в аптеці."
        answer: true
      - statement: "Кілограм — це одиниця часу."
        answer: false
        correction: "Кілограм — одиниця ваги."
      - statement: "Решта — це гроші, які повертає продавець."
        answer: true

  - type: classify
    title: "Категорії товарів"
    instruction: "Розподіли товари"
    categories:
      - label: "Їжа"
        items:
          - "хліб"
          - "молоко"
          - "яблука"
          - "сир"
      - label: "Гігієна"
        items:
          - "мило"
          - "шампунь"
          - "зубна паста"
          - "рушник"
      - label: "Канцелярія"
        items:
          - "ручка"
          - "олівець"
          - "зошит"
          - "папір"

  - type: reading
    title: "Читання: На ринку"
    text: |
      — Добрий день! Скільки коштують яблука?
      — Добрий день! Тридцять гривень за кілограм.
      — Дайте, будь ласка, два кілограми.
      — Ще щось?
      — Так, одну пляшку води.
      — Вода коштує десять гривень. Усього сімдесят гривень.
      — Ось сто гривень.
      — Дякую. Ось ваша решта — тридцять гривень.
    questions:
      - question: "Скільки коштують яблука за кілограм?"
        answer: "Тридцять гривень."
      - question: "Що ще купила людина?"
        answer: "Одну пляшку води."
      - question: "Скільки коштувало все разом?"
        answer: "Сімдесят гривень."
      - question: "Скільки решти отримала людина?"
        answer: "Тридцять гривень."

  - type: proverb_drill
    title: "Прислів'я"
    proverb: "Не все те золото, що блищить."
    activity:
      type: match_meaning
      options:
        - "Золото дуже цінне"
        - "Зовнішній вигляд не завжди відповідає цінності"
        - "Треба купувати дороге"
      answer: "Зовнішній вигляд не завжди відповідає цінності"
