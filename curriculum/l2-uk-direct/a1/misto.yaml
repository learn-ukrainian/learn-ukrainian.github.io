module: misto
track: l2-uk-direct
level: a1
type: vocabulary
title: "Місто"
subtitle: "Міські місця, транспорт, орієнтація в місті"
standard_ref: "Catalogue B #3 — місто: установи, транспорт, організація міста"
textbook_ref: "Grade 4 — locative consolidation; Grade 6 §46"
teaching_notes: |
  Практика місцевого відмінка з реальними міськими місцями: у банку, в магазині, на зупинці.
  Транспортна лексика: автобус, тролейбус, маршрутка, метро — типово українські реалії.
  Контраст ДЕ?/КУДИ? на прикладі міста: я в банку (ДЕ?) / я іду в банк (КУДИ?).
  Корисні фрази: «Де зупинка автобуса?», «Один квиток, будь ласка», «Скільки коштує квиток?».
  Маршрутка — культурно важливе слово, яке не має прямого еквіваленту в інших мовах.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "ДЕ? (місцевий) ≠ КУДИ? (знахідний) — контраст із міськими місцями"
  examples:
    - "Я в банку. (ДЕ?) / Я іду в банк. (КУДИ?)"
    - "Він на ринку. (ДЕ?) / Він іде на ринок. (КУДИ?)"
    - "Ми в магазині. (ДЕ?) / Ми йдемо в магазин. (КУДИ?)"

# ─────────────────────────────────────────────
# VOCABULARY: 30 city words
# ─────────────────────────────────────────────
vocabulary:
  - category: "Освіта"
    items:
      - word: "школа"
        emoji: "🏫"
        sentence: "Діти вчаться у школі."
      - word: "інститут"
        emoji: "🏛️"
        sentence: "Студенти навчаються в інституті."
      - word: "університет"
        emoji: "🎓"
        sentence: "Він працює в університеті."

  - category: "Культура"
    items:
      - word: "театр"
        emoji: "🎭"
        sentence: "Ми йдемо в театр."
      - word: "кінотеатр"
        emoji: "🎬"
        sentence: "Фільм показують у кінотеатрі."
      - word: "музей"
        emoji: "🏛️"
        sentence: "У музеї є старі картини."
      - word: "бібліотека"
        emoji: "📚"
        sentence: "Книги є у бібліотеці."

  - category: "Релігійні споруди"
    items:
      - word: "церква"
        emoji: "⛪"
        sentence: "Стара церква стоїть на площі."
      - word: "мечеть"
        emoji: "🕌"
        sentence: "Мечеть знаходиться на вулиці Миру."
      - word: "синагога"
        emoji: "🕍"
        sentence: "Синагога — у центрі міста."

  - category: "Громадські місця"
    items:
      - word: "ресторан"
        emoji: "🍽️"
        sentence: "Ми обідаємо в ресторані."
      - word: "кафе"
        emoji: "☕"
        sentence: "Вона п'є каву в кафе."
      - word: "ринок"
        emoji: "🛒"
        sentence: "Овочі продають на ринку."
      - word: "перукарня"
        emoji: "💇"
        sentence: "Вона йде в перукарню."
      - word: "готель"
        emoji: "🏨"
        sentence: "Туристи живуть у готелі."
      - word: "лікарня"
        emoji: "🏥"
        sentence: "Лікар працює у лікарні."
      - word: "банк"
        emoji: "🏦"
        sentence: "Гроші лежать у банку."
      - word: "пошта"
        emoji: "📮"
        sentence: "Лист відправляють на пошті."
      - word: "пункт обміну валют"
        emoji: "💱"
        sentence: "Він міняє гроші в пункті обміну валют."

  - category: "Транспорт"
    items:
      - word: "автобус"
        emoji: "🚌"
        sentence: "Автобус їде на зупинку."
      - word: "трамвай"
        emoji: "🚋"
        sentence: "Трамвай їде по вулиці."
      - word: "тролейбус"
        emoji: "🚎"
        sentence: "Тролейбус зупиняється на зупинці."
      - word: "метро"
        emoji: "🚇"
        sentence: "Мені потрібно метро."
      - word: "маршрутка"
        emoji: "🚐"
        sentence: "Маршрутка їде швидко."
      - word: "таксі"
        emoji: "🚕"
        sentence: "Я викликаю таксі."
      - word: "зупинка"
        emoji: "🚏"
        sentence: "Де зупинка автобуса?"
      - word: "квиток"
        emoji: "🎫"
        sentence: "Один квиток, будь ласка."
      - word: "станція"
        emoji: "🚉"
        sentence: "Станція метро поруч."

  - category: "Міський простір"
    items:
      - word: "вулиця"
        emoji: "🛣️"
        sentence: "Магазин на цій вулиці."
      - word: "парк"
        emoji: "🌳"
        sentence: "Діти грають у парку."
      - word: "площа"
        emoji: "🏙️"
        sentence: "Ми зустрінемося на площі."
      - word: "проспект"
        emoji: "🛤️"
        sentence: "Проспект — широка вулиця."

# ─────────────────────────────────────────────
# TRANSPORT PHRASES
# ─────────────────────────────────────────────
transport_phrases:
  - phrase: "Де зупинка автобуса?"
    context: "Питаємо про місце"
  - phrase: "Один квиток, будь ласка."
    context: "Купуємо квиток"
  - phrase: "Скільки коштує квиток?"
    context: "Питаємо про ціну"
  - phrase: "Мені потрібно метро."
    context: "Шукаємо транспорт"

# ─────────────────────────────────────────────
# GRAMMAR TABLE: location vs direction
# ─────────────────────────────────────────────
grammar_tables:
  - title: "ДЕ? (місцевий) і КУДИ? (знахідний)"
    columns: ["Місце", "ДЕ? (місцевий)", "КУДИ? (знахідний)"]
    rows:
      - ["банк", "у банку", "в банк"]
      - ["ринок", "на ринку", "на ринок"]
      - ["магазин", "у магазині", "в магазин"]
      - ["аптека", "в аптеці", "в аптеку"]
      - ["лікарня", "у лікарні", "в лікарню"]
      - ["зупинка", "на зупинці", "на зупинку"]
      - ["університет", "в університеті", "в університет"]

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "В/У чи НА? (міські місця)"
    instruction: "Розподіли: в/у (всередині) чи на (відкритий простір / поверхня)"
    categories:
      - label: "в/у (всередині)"
        items:
          - "у банку"
          - "в магазині"
          - "у бібліотеці"
          - "в музеї"
          - "у лікарні"
          - "в готелі"
      - label: "на (відкрито / поверхня)"
        items:
          - "на ринку"
          - "на зупинці"
          - "на площі"
          - "на вулиці"
          - "на пошті"
          - "на стадіоні"

  - type: build_sentence
    title: "Де ти зараз?"
    instruction: "Обери місце і правильну форму місцевого відмінка"
    sentences:
      - words: ["Я", "зараз", "у", "[банк/банку]", "."]
        correct: "Я зараз у банку."
      - words: ["Вона", "працює", "в", "[університет/університеті]", "."]
        correct: "Вона працює в університеті."
      - words: ["Діти", "грають", "у", "[парк/парку]", "."]
        correct: "Діти грають у парку."
      - words: ["Книги", "є", "у", "[бібліотека/бібліотеці]", "."]
        correct: "Книги є у бібліотеці."

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "Книги є в бібліотека."
        answer: false
        correction: "Книги є в бібліотеці."
      - statement: "Ми обідаємо в ресторані."
        answer: true
      - statement: "Автобус чекає на зупинці."
        answer: true
      - statement: "Він працює на лікарні."
        answer: false
        correction: "Він працює у лікарні."
      - statement: "Овочі продають на ринку."
        answer: true
      - statement: "Лист відправляють у пошта."
        answer: false
        correction: "Лист відправляють на пошті."

  - type: pattern_drill
    title: "ДЕ? і КУДИ? (контраст)"
    prompt: "Утвори дві форми: ДЕ? (місцевий) і КУДИ? (знахідний)"
    items:
      - given: "магазин → я в [?]"
        answer: "у магазині"
      - given: "магазин → я іду в [?]"
        answer: "в магазин"
      - given: "аптека → вона в [?]"
        answer: "в аптеці"
      - given: "аптека → вона іде в [?]"
        answer: "в аптеку"
      - given: "зупинка → він на [?]"
        answer: "на зупинці"
      - given: "зупинка → він іде на [?]"
        answer: "на зупинку"

  - type: reading
    title: "Читання: Екскурсія по Києву"
    text: |
      Це Київ. У Києві є великий парк. На площі стоїть пам'ятник. У музеї є старі картини. На зупинці чекає автобус. Туристи їдуть у метро. На станції багато людей. Потім вони йдуть у ресторан.
    questions:
      - question: "Що є у Києві?"
        answer: "Великий парк."
      - question: "Що стоїть на площі?"
        answer: "Пам'ятник."
      - question: "Куди їдуть туристи?"
        answer: "У метро."

  - type: classify
    title: "Вид транспорту"
    instruction: "Розподіли транспорт за типом"
    categories:
      - label: "Наземний"
        items:
          - "автобус"
          - "трамвай"
          - "тролейбус"
          - "маршрутка"
      - label: "Підземний"
        items:
          - "метро"
      - label: "Індивідуальний"
        items:
          - "таксі"
