module: rechennia
track: l2-uk-direct
level: a1
type: grammar
title: "Речення"
subtitle: "Будуємо речення. Розповідні, питальні, заперечні."
standard_ref: "§4.3.1 — прості речення: розповідні, питальні, заперечні"
textbook_ref: "Grade 3 — будова речення, Grade 4 — члени речення"
teaching_notes: >
  Цей модуль вводить три типи речень: розповідні (.), питальні (?), заперечні (не + дієслово).
  Головна схема: ХТО? + ЩО РОБИТЬ? + ЩО/КОГО/ДЕ? Питальне речення — зміна інтонації
  або додавання питального слова. Заперечення — частка НЕ перед дієсловом. Завжди пишемо
  НЕ окремо від дієслова. Для Чи-запитань використовуємо модуль «Сполучники» (наступний).

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "ХТО? + ЩО РОБИТЬ? + ЩО/КОГО/ДЕ? Запитання: інтонація або питальне слово. Заперечення: НЕ + дієслово."
  examples:
    - "Мама читає книгу."
    - "Мама читає книгу?"
    - "Що мама читає?"
    - "Мама не читає книгу."

# ─────────────────────────────────────────────
# QUESTION WORDS (review)
# ─────────────────────────────────────────────
question_words:
  - question: "ХТО? / ЩО?"
    description: "Підмет — хто або що діє"
    examples:
      - "Хто читає? — Мама читає."
      - "Що лежить на столі? — Книга."
  - question: "ЩО РОБИТЬ?"
    description: "Присудок — дія"
    examples:
      - "Що робить мама? — Мама читає."
  - question: "ЩО? / КОГО? / ДЕ?"
    description: "Деталі — додаток, обставина"
    examples:
      - "Що мама читає? — Книгу."
      - "Де мама читає? — Вдома."

# ─────────────────────────────────────────────
# VOCABULARY: sentence types and negation
# ─────────────────────────────────────────────
vocabulary:
  - category: "Ключові слова"
    items:
      - word: "речення"
        emoji: "\U0001F4DD"
        sentence: "Це речення. Воно має крапку."
      - word: "слово"
        emoji: "\U0001F524"
        sentence: "Речення — це слова разом."
      - word: "запитання"
        emoji: "\u2753"
        sentence: "«Що це?» — це запитання."
      - word: "відповідь"
        emoji: "\U0001F4AC"
        sentence: "«Це книга» — це відповідь."
      - word: "крапка"
        emoji: "\u2B24"
        sentence: "Розповідне речення має крапку."
      - word: "знак запитання"
        emoji: "\u2753"
        sentence: "Питальне речення має знак запитання."

  - category: "Розповідні речення"
    items:
      - word: "Мама читає книгу."
        emoji: "\U0001F4D6"
        sentence: "Підмет + присудок + додаток."
      - word: "Тато працює вдома."
        emoji: "\U0001F468\u200D\U0001F4BB"
        sentence: "Підмет + присудок + обставина."
      - word: "Діти граються в парку."
        emoji: "\U0001F3DE\uFE0F"
        sentence: "Підмет + присудок + обставина."
      - word: "Кіт спить на стільці."
        emoji: "\U0001F408"
        sentence: "Підмет + присудок + обставина."

  - category: "Питальні речення"
    items:
      - word: "Мама читає книгу?"
        emoji: "\u2753"
        sentence: "Так/ні — тільки інтонація змінюється."
      - word: "Що мама читає?"
        emoji: "\u2753"
        sentence: "Питальне слово + дієслово + підмет."
      - word: "Хто читає книгу?"
        emoji: "\u2753"
        sentence: "Питальне слово замінює підмет."
      - word: "Де тато працює?"
        emoji: "\u2753"
        sentence: "Питальне слово ДЕ — запитує про місце."

  - category: "Заперечні речення"
    items:
      - word: "не"
        emoji: "\u274C"
        sentence: "Мама не читає книгу. НЕ стоїть перед дієсловом."
      - word: "ні"
        emoji: "\U0001F645"
        sentence: "Ні, мама не читає. НІ — на початку відповіді."
      - word: "нічого"
        emoji: "\U0001F6AB"
        sentence: "Я нічого не бачу."
      - word: "ніхто"
        emoji: "\U0001F6AB"
        sentence: "Ніхто не читає."
      - word: "ніде"
        emoji: "\U0001F6AB"
        sentence: "Книга ніде не лежить."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: build_sentence
    title: "Склади речення з плиток"
    instruction: "Постав слова у правильному порядку"
    sentences:
      - words: ["Мама", "читає", "книгу", "."]
        correct: "Мама читає книгу."
      - words: ["Тато", "працює", "вдома", "."]
        correct: "Тато працює вдома."
      - words: ["Хто", "читає", "книгу", "?"]
        correct: "Хто читає книгу?"
      - words: ["Що", "мама", "читає", "?"]
        correct: "Що мама читає?"
      - words: ["Мама", "не", "читає", "книгу", "."]
        correct: "Мама не читає книгу."
      - words: ["Де", "тато", "працює", "?"]
        correct: "Де тато працює?"
      - words: ["Діти", "граються", "в", "парку", "."]
        correct: "Діти граються в парку."
      - words: ["Що", "роблять", "діти", "?"]
        correct: "Що роблять діти?"

  - type: pattern_drill
    title: "Зроби запитання"
    prompt: "Перетвори розповідне речення на питальне"
    items:
      - given: "Мама читає книгу."
        answer: "Що мама читає?"
      - given: "Тато працює вдома."
        answer: "Де тато працює?"
      - given: "Олена пише лист."
        answer: "Що Олена пише?"
      - given: "Кіт спить на стільці."
        answer: "Де кіт спить?"
      - given: "Діти граються в парку."
        answer: "Хто грається в парку?"

  - type: pattern_drill
    title: "Зроби заперечення"
    prompt: "Перетвори на заперечне речення"
    items:
      - given: "Я знаю."
        answer: "Я не знаю."
      - given: "Він читає."
        answer: "Він не читає."
      - given: "Мама працює."
        answer: "Мама не працює."
      - given: "Вони говорять."
        answer: "Вони не говорять."
      - given: "Ти пишеш."
        answer: "Ти не пишеш."

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "«Мама читає книгу» — це запитання."
        answer: false
        correction: "Це розповідне речення."
      - statement: "«Що мама читає?» — це запитання."
        answer: true
      - statement: "«Мама не читає» — це заперечення."
        answer: true
      - statement: "«Хто?» запитує про дію."
        answer: false
        correction: "«Хто?» запитує про підмет (людину або тварину)."
      - statement: "НЕ стоїть перед дієсловом."
        answer: true

  - type: proverb_drill
    title: "Прислів'я"
    proverb: "Менше говори — більше почуєш."
    activity:
      type: fill_gap
      gap_word: "говори"
      options: ["говори", "читай", "пиши"]
      answer: "говори"
      meaning: "Слухай уважно, а потім говори."

  - type: reading
    title: "Читання"
    text: |
      Це Олена. Вона читає книгу. Хто читає? Олена читає.
      Що вона читає? Книгу. Де вона читає? Вдома.
      Олена не дивиться телевізор. Вона читає.
    questions:
      - question: "Хто читає книгу?"
        answer: "Олена."
      - question: "Що Олена не робить?"
        answer: "Не дивиться телевізор."
      - question: "Де Олена читає?"
        answer: "Вдома."
