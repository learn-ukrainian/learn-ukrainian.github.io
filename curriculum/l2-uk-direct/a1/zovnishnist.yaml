module: zovnishnist
track: l2-uk-direct
level: a1
type: vocabulary
title: "Зовнішність"
subtitle: "Описуємо людей. Зріст, волосся, очі."
standard_ref: "Каталог Б #1 — людина: зовнішність"
textbook_ref: "Grade 3 — опис людини, Grade 4 — прикметники"

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Він/Вона + прикметник (узгоджений за родом). Волосся + середній рід. Очі + множина."
  examples:
    - "Він високий. Вона висока."
    - "У нього довге темне волосся."
    - "У неї карі очі."

# ─────────────────────────────────────────────
# VOCABULARY: 20+ appearance words
# ─────────────────────────────────────────────
vocabulary:
  - category: "Зріст"
    items:
      - word: "високий / висока"
        emoji: "\U0001F9CD"
        sentence: "Він високий. Вона висока."
      - word: "низький / низька"
        emoji: "\U0001F9D2"
        sentence: "Він низький. Вона низька."
      - word: "середнього зросту"
        emoji: "\U0001F9D1"
        sentence: "Він середнього зросту."

  - category: "Будова тіла"
    items:
      - word: "худий / худа"
        emoji: "\U0001F9D1"
        sentence: "Він худий. Вона худа."
      - word: "повний / повна"
        emoji: "\U0001F9D1"
        sentence: "Він повний. Вона повна."
      - word: "спортивний / спортивна"
        emoji: "\U0001F3CB\uFE0F"
        sentence: "Він спортивний. Вона спортивна."

  - category: "Волосся"
    items:
      - word: "довге волосся"
        emoji: "\U0001F469\u200D\U0001F9B0"
        sentence: "У неї довге волосся."
      - word: "коротке волосся"
        emoji: "\U0001F468"
        sentence: "У нього коротке волосся."
      - word: "темноволосий / темноволоса"
        emoji: "\U0001F469"
        sentence: "Вона темноволоса."
      - word: "світловолосий / світловолоса"
        emoji: "\U0001F471"
        sentence: "Він світловолосий."
      - word: "рудий / руда"
        emoji: "\U0001F9B0"
        sentence: "Вона руда."
      - word: "кучерявий / кучерява"
        emoji: "\U0001F9D1\u200D\U0001F9B1"
        sentence: "Він кучерявий."

  - category: "Очі"
    items:
      - word: "карі очі"
        emoji: "\U0001F7E4"
        sentence: "У нього карі очі."
      - word: "блакитні очі"
        emoji: "\U0001F535"
        sentence: "У неї блакитні очі."
      - word: "зелені очі"
        emoji: "\U0001F7E2"
        sentence: "У нього зелені очі."
      - word: "сірі очі"
        emoji: "\u26AA"
        sentence: "У неї сірі очі."

  - category: "Вік"
    items:
      - word: "молодий / молода"
        emoji: "\U0001F9D1"
        sentence: "Він молодий. Вона молода."
      - word: "старий / стара"
        emoji: "\U0001F474"
        sentence: "Він старий. Вона стара."
      - word: "дорослий / доросла"
        emoji: "\U0001F468"
        sentence: "Він дорослий. Вона доросла."

  - category: "Загальне враження"
    items:
      - word: "гарний / гарна"
        emoji: "\u2728"
        sentence: "Він гарний. Вона гарна."
      - word: "красивий / красива"
        emoji: "\U0001F31F"
        sentence: "Він красивий. Вона красива."
      - word: "симпатичний / симпатична"
        emoji: "\U0001F60A"
        sentence: "Він симпатичний. Вона симпатична."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Розподіли прикметники"
    instruction: "За категорією зовнішності"
    categories:
      - label: "Зріст"
        items:
          - "високий"
          - "низька"
          - "середнього зросту"
      - label: "Будова тіла"
        items:
          - "худий"
          - "повна"
          - "спортивний"
      - label: "Волосся"
        items:
          - "темноволоса"
          - "світловолосий"
          - "кучерява"
          - "руда"
      - label: "Очі"
        items:
          - "карі"
          - "блакитні"
          - "зелені"
          - "сірі"

  - type: pattern_drill
    title: "Узгодь прикметник"
    prompt: "Зміни рід прикметника"
    items:
      - given: "Олена (високий)"
        answer: "Олена висока."
      - given: "Назар (худий)"
        answer: "Назар худий."
      - given: "Марія (спортивний)"
        answer: "Марія спортивна."
      - given: "Андрій (кучерявий)"
        answer: "Андрій кучерявий."
      - given: "Олена (темноволосий)"
        answer: "Олена темноволоса."
      - given: "Дитина (молодий)"
        answer: "Дитина молода."
      - given: "Назар (рудий)"
        answer: "Назар рудий."
      - given: "Марія (гарний)"
        answer: "Марія гарна."

  - type: build_sentence
    title: "Опиши людину"
    instruction: "Склади опис"
    sentences:
      - words: ["Він", "високий", "і", "темноволосий", "."]
        correct: "Він високий і темноволосий."
      - words: ["Вона", "має", "довге", "волосся", "і", "карі", "очі", "."]
        correct: "Вона має довге волосся і карі очі."
      - words: ["Він", "середнього", "зросту", "і", "спортивний", "."]
        correct: "Він середнього зросту і спортивний."
      - words: ["У", "неї", "блакитні", "очі", "."]
        correct: "У неї блакитні очі."

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "Людина з довгим волоссям завжди жіночої статі."
        answer: false
        correction: "Довге волосся може бути у будь-кого."
      - statement: "«Карі очі» — це коричневі очі."
        answer: true
      - statement: "«Блакитні» — це зелений колір."
        answer: false
        correction: "Блакитні — це світло-сині."
      - statement: "«Високий» і «висока» — це один прикметник."
        answer: true
        correction: "Чоловічий і жіночий рід одного прикметника."

  - type: reading
    title: "Читання — опис людей"
    text: |
      Це Олена. Вона висока. Олена має довге темне волосся і карі очі.
      Вона молода і гарна.

      Це Назар. Він середнього зросту. У нього коротке світле волосся
      і блакитні очі. Він спортивний.

      Це бабуся Галина. Вона невисока. У неї сиве коротке волосся
      і сірі очі. Вона стара, але дуже весела.
    questions:
      - question: "Яке волосся у Олени?"
        answer: "Довге темне волосся."
      - question: "Які очі у Назара?"
        answer: "Блакитні очі."
      - question: "Хто спортивний?"
        answer: "Назар."
      - question: "Яка бабуся Галина?"
        answer: "Невисока, стара, але весела."

  - type: pattern_drill
    title: "Запитай про зовнішність"
    prompt: "Склади запитання і відповідь"
    items:
      - given: "Який він? (високий, темноволосий)"
        answer: "Він високий і темноволосий."
      - given: "Яка вона? (низька, руда)"
        answer: "Вона низька і руда."
      - given: "Які у нього очі? (зелені)"
        answer: "У нього зелені очі."
      - given: "Яке у неї волосся? (довге, темне)"
        answer: "У неї довге темне волосся."
      - given: "Який він? (молодий, спортивний)"
        answer: "Він молодий і спортивний."
