module: yizha
track: l2-uk-direct
level: a1
type: vocabulary
title: "Їжа"
subtitle: "Продукти, напої, посуд. Замовлення в кафе."
standard_ref: "Каталог Б #8 — купівля: продукти, #9 — ресторан: страви, напої, посуд"
textbook_ref: "Grade 3–4 — food vocabulary"
teaching_notes: |
  Почніть з наказових форм «дай», «візьми», «принеси» — вони природно вводяться через замовлення їжі.
  Відпрацюйте шаблон замовлення: «Мені, будь ласка, ...» + знахідний відмінок (каву, борщ, хліб).
  Лексику подавайте за категоріями: спочатку основні продукти, потім напої, потім посуд.
  Використовуйте реальне меню кафе як опору для діалогу — учні замовляють і «платять».
  Зверніть увагу на знахідний відмінок жіночого роду: кава → каву, вода → воду, піца → піцу.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Я хочу + знахідний. Дайте, будь ласка, + знахідний."
  examples:
    - "Я хочу каву."
    - "Дайте, будь ласка, хліб."
    - "Принесіть, будь ласка, борщ."

# ─────────────────────────────────────────────
