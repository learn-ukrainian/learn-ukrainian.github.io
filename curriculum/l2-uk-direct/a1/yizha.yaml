# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Їжа чи напій?"
    instruction: "Розподіли слова"
    categories:
      - label: "Їжа"
        items:
          - "хліб"
          - "борщ"
          - "яблуко"
          - "курка"
          - "сир"
          - "рис"
          - "піца"
          - "каша"
          - "салат"
          - "яйце"
      - label: "Напої"
        items:
          - "вода"
          - "чай"
          - "кава"
          - "сік"
          - "компот"
          - "молоко"

  - type: classify
    title: "Сніданок, обід чи вечеря?"
    instruction: "Розподіли страви за прийомом їжі"
    categories:
      - label: "Сніданок"
        items:
          - "каша"
          - "яйце"
          - "йогурт"
          - "чай"
      - label: "Обід"
        items:
          - "борщ"
          - "суп"
          - "салат"
          - "компот"
      - label: "Вечеря"
        items:
          - "піца"
          - "рис з куркою"
          - "салат"
          - "чай"

  - type: build_sentence
    title: "Я хочу..."
    instruction: "Склади речення зі знахідним відмінком"
    sentences:
      - words: ["Я", "хочу", "каву", "."]
        correct: "Я хочу каву."
      - words: ["Дайте", ",", "будь ласка", ",", "борщ", "."]
        correct: "Дайте, будь ласка, борщ."
      - words: ["Я", "їм", "піцу", "."]
        correct: "Я їм піцу."
      - words: ["Вона", "п'є", "воду", "."]
        correct: "Вона п'є воду."
      - words: ["Ми", "хочемо", "салат", "."]
        correct: "Ми хочемо салат."
      - words: ["Принесіть", ",", "будь ласка", ",", "чай", "."]
        correct: "Принесіть, будь ласка, чай."
      - words: ["Він", "їсть", "яблуко", "."]
        correct: "Він їсть яблуко."
      - words: ["Я", "люблю", "борщ", "."]
        correct: "Я люблю борщ."

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "Борщ — це напій."
        answer: false
        correction: "Борщ — це суп, не напій."
      - statement: "Каву п'ють із чашки."
        answer: true
      - statement: "Суп їдять ложкою."
        answer: true
      - statement: "Яблуко — це овоч."
        answer: false
        correction: "Яблуко — це фрукт."
      - statement: "Лимон солодкий."
        answer: false
        correction: "Лимон кислий."
      - statement: "Борщ — українська страва."
        answer: true

  - type: reading
    title: "Читання: У кафе"
    text: |
      — Добрий день! Що ви хочете?
      — Добрий день! Дайте, будь ласка, борщ і хліб.
      — Що будете пити?
      — Каву, будь ласка. Без цукру.
      — Ще щось?
      — Так, принесіть, будь ласка, салат.
    questions:
      - question: "Що замовив клієнт?"
        answer: "Борщ, хліб, каву і салат."
      - question: "Каву з цукром?"
        answer: "Ні, без цукру."

  - type: riddle
    title: "Загадка"
    clues:
      - "Я жовтий зовні і білий всередині."
      - "Мене привозять з далеких країн."
      - "Мавпи дуже мене люблять."
    answer: "БАНАН"
    answer_emoji: "🍌"
    source: "народна загадка"
