module: sviatky
track: l2-uk-direct
level: a1
type: vocabulary
title: "Свята"
subtitle: "Свята, традиції, день народження, весілля, подарунки."
standard_ref: "Каталог Б #12 — традиції: державні/релігійні свята, день народження, весілля, подарунки"
textbook_ref: "Grade 3–4 — holidays and traditions"

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "З + орудний! З днем народження! З Новим роком!"
  examples:
    - "З днем народження!"
    - "З Новим роком!"
    - "Із святом!"

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Головні свята"
    items:
      - word: "Різдво"
        emoji: "🎄"
        sentence: "Різдво — 7 січня."
      - word: "Новий рік"
        emoji: "🎆"
        sentence: "З Новим роком!"
      - word: "Великдень"
        emoji: "🥚"
        sentence: "На Великдень фарбують яйця."
      - word: "День незалежності"
        emoji: "🇺🇦"
        sentence: "День незалежності — 24 серпня."
      - word: "Покров"
        emoji: "🕊️"
        sentence: "Покров — 14 жовтня."
      - word: "Івана Купала"
        emoji: "🔥"
        sentence: "На Івана Купала стрибають через вогнище."

  - category: "Традиції"
    items:
      - word: "свято"
        emoji: "🎉"
        sentence: "Сьогодні свято!"
      - word: "традиція"
        emoji: "📜"
        sentence: "Це стара традиція."
      - word: "звичай"
        emoji: "🏛️"
        sentence: "Український звичай."
      - word: "обряд"
        emoji: "🕯️"
        sentence: "Великодній обряд."
      - word: "вишиванка"
        emoji: "🇺🇦"
        sentence: "Вишиванка — національний одяг."
      - word: "вінок"
        emoji: "💐"
        sentence: "Дівчата плетуть вінки."
      - word: "паска"
        emoji: "🍞"
        sentence: "На Великдень печуть паску."

  - category: "День народження"
    items:
      - word: "день народження"
        emoji: "🎂"
        sentence: "З днем народження!"
      - word: "подарунок"
        emoji: "🎁"
        sentence: "Я отримав подарунок."
      - word: "торт"
        emoji: "🎂"
        sentence: "На торті свічки."
      - word: "свічки"
        emoji: "🕯️"
        sentence: "Задуй свічки!"
      - word: "гості"
        emoji: "👥"
        sentence: "Прийшли гості."
      - word: "вечірка"
        emoji: "🥳"
        sentence: "Весела вечірка!"

  - category: "Весілля"
    items:
      - word: "весілля"
        emoji: "💒"
        sentence: "Весілля було у суботу."
      - word: "наречений"
        emoji: "🤵"
        sentence: "Наречений чекає."
      - word: "наречена"
        emoji: "👰"
        sentence: "Наречена красива."
      - word: "кільце"
        emoji: "💍"
        sentence: "Обручальне кільце."
      - word: "букет"
        emoji: "💐"
        sentence: "Наречена тримає букет."

  - category: "Подарунки"
    items:
      - word: "дарувати"
        emoji: "🎁"
        sentence: "Я дарую квіти."
      - word: "отримувати"
        emoji: "📦"
        sentence: "Вона отримала подарунок."
      - word: "листівка"
        emoji: "💌"
        sentence: "Гарна листівка."
      - word: "квіти"
        emoji: "💐"
        sentence: "Квіти для мами."

# ─────────────────────────────────────────────
# GREETING EXPRESSIONS
# ─────────────────────────────────────────────
greeting_expressions:
  - "Із святом!"
  - "З Новим роком!"
  - "Щасливого Нового року!"
  - "З днем народження!"
  - "Христос Воскрес! — Воістину Воскрес!"
  - "Слава Україні!"

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Свята за порами року"
    instruction: "Розподіли свята"
    categories:
      - label: "Зима"
        items:
          - "Різдво"
          - "Новий рік"
      - label: "Весна"
        items:
          - "Великдень"
      - label: "Літо"
        items:
          - "Івана Купала"
          - "День незалежності"
      - label: "Осінь"
        items:
          - "Покров"

  - type: build_sentence
    title: "Привітання"
    instruction: "Обери правильне привітання для ситуації"
    sentences:
      - words: ["З", "днем", "народження", "!"]
        correct: "З днем народження!"
      - words: ["З", "Новим", "роком", "!"]
        correct: "З Новим роком!"
      - words: ["Христос", "Воскрес", "!"]
        correct: "Христос Воскрес!"
      - words: ["Із", "святом", "!"]
        correct: "Із святом!"

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "День незалежності — це 24 серпня."
        answer: true
      - statement: "На Великдень їдять паску."
        answer: true
      - statement: "Різдво — влітку."
        answer: false
        correction: "Різдво — взимку (7 січня)."
      - statement: "Вишиванка — це національний одяг."
        answer: true
      - statement: "«Христос Воскрес» кажуть на Новий рік."
        answer: false
        correction: "«Христос Воскрес» кажуть на Великдень."

  - type: classify
    title: "Типи свят"
    instruction: "Розподіли свята"
    categories:
      - label: "Державні"
        items:
          - "День незалежності"
      - label: "Релігійні"
        items:
          - "Різдво"
          - "Великдень"
          - "Покров"
      - label: "Народні"
        items:
          - "Івана Купала"
          - "Новий рік"

  - type: reading
    title: "Читання: День народження Олі"
    text: |
      Сьогодні день народження Олі. Їй двадцять п'ять років. Прийшли друзі і принесли подарунки. Мама спекла великий торт. На торті двадцять п'ять свічок. Оля задула свічки і загадала бажання. Всі кричать: «З днем народження!» Оля дуже рада!
    questions:
      - question: "Скільки років Олі?"
        answer: "Двадцять п'ять."
      - question: "Хто спік торт?"
        answer: "Мама."
      - question: "Що зробила Оля?"
        answer: "Задула свічки і загадала бажання."

  - type: pattern_drill
    title: "Дарувати і отримувати"
    prompt: "Склади речення"
    items:
      - given: "Що ти даруєш? (квіти)"
        answer: "Я дарую квіти."
      - given: "Що ти отримав? (книга)"
        answer: "Я отримав книгу."
      - given: "Що вона дарує? (подарунок)"
        answer: "Вона дарує подарунок."
      - given: "Що він отримав? (листівка)"
        answer: "Він отримав листівку."
