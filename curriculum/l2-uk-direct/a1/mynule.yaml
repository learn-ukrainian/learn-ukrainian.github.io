module: mynule
track: l2-uk-direct
level: a1
type: grammar
title: "Минуле"
subtitle: "Минулий час: -в/-ла/-ло/-ли. Рід у минулому часі."
standard_ref: "§4.2.4.1 — минулий час"
textbook_ref: "Grade 4 — past tense, Grade 5 §38–39 — tense signal words"
teaching_notes: |
  Закінчення минулого часу залежать від РОДУ, не від особи: він читав, вона читала, воно читало, вони читали.
  Це ключова відмінність від теперішнього часу, де закінчення залежать від особи (я читаю, ти читаєш).
  Контраст теперішній ↔ минулий: «Зараз я читаю» → «Вчора я читав/читала».
  Сигнальні слова: вчора, позавчора, минулого тижня, торік — допомагають розпізнати час.
  «Я читав» (чоловік) / «Я читала» (жінка) — студент одразу практикує свою форму.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Основа + -в (він), -ла (вона), -ло (воно), -ли (вони/ми/ви)"
  examples:
    - "Він читав. Вона читала. Воно світило. Вони читали."
    - "Зараз я читаю. → Вчора я читав/читала."

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar:
  - name: "Минулий час — утворення"
    pattern: "Основа дієслова + -в (чол.), -ла (жін.), -ло (сер.), -ли (множина)"
    table:
      - infinitive: "вставати"
        він: "вставав"
        вона: "вставала"
        воно: "—"
        вони: "вставали"
      - infinitive: "вмиватися"
        він: "вмивався"
        вона: "вмивалася"
        воно: "—"
        вони: "вмивалися"
      - infinitive: "снідати"
        він: "снідав"
        вона: "снідала"
        воно: "—"
        вони: "снідали"
      - infinitive: "працювати"
        він: "працював"
        вона: "працювала"
        воно: "—"
        вони: "працювали"
      - infinitive: "іти"
        він: "йшов"
        вона: "йшла"
        воно: "—"
        вони: "йшли"

  - name: "Теперішній ↔ Минулий"
    pattern: "Зараз... → Вчора..."
    examples:
      - "Зараз я читаю. → Вчора я читав/читала."
      - "Зараз він працює. → Учора він працював."
      - "Зараз вони грають. → Вчора вони грали."

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Щоденні дії"
    items:
      - word: "читати"
        emoji: "📖"
        sentence: "Вчора він читав книгу. Вона читала газету."
      - word: "писати"
        emoji: "✍️"
        sentence: "Він писав листа. Вона писала вправу."
      - word: "їсти"
        emoji: "🍽️"
        sentence: "Він їв суп. Вона їла кашу."
      - word: "готувати"
        emoji: "🍳"
        sentence: "Мама готувала обід. Тато готував сніданок."
      - word: "спати"
        emoji: "😴"
        sentence: "Він спав довго. Вона спала до ранку."

  - category: "Спілкування і сприйняття"
    items:
      - word: "бачити"
        emoji: "👁️"
        sentence: "Він бачив друга. Вона бачила лікаря."
      - word: "говорити"
        emoji: "🗣️"
        sentence: "Він говорив повільно. Вона говорила швидко."
      - word: "слухати"
        emoji: "👂"
        sentence: "Він слухав музику. Вона слухала пісню."

  - category: "Активність"
    items:
      - word: "працювати"
        emoji: "💼"
        sentence: "Тато працював увесь день. Мама працювала вдома."
      - word: "купувати"
        emoji: "🛒"
        sentence: "Він купував хліб. Вона купувала молоко."
      - word: "гуляти"
        emoji: "🚶"
        sentence: "Вони гуляли у парку. Він гуляв увечері."
      - word: "грати"
        emoji: "⚽"
        sentence: "Діти грали надворі. Він грав у футбол."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Утвори минулий час"
    prompt: "Постав дієслово в минулий час"
    items:
      - given: "читати → він"
        answer: "він читав"
      - given: "читати → вона"
        answer: "вона читала"
      - given: "читати → воно"
        answer: "воно читало"
      - given: "читати → вони"
        answer: "вони читали"
      - given: "працювати → він"
        answer: "він працював"
      - given: "працювати → вона"
        answer: "вона працювала"
      - given: "вставати → він"
        answer: "він вставав"
      - given: "вставати → вона"
        answer: "вона вставала"
      - given: "снідати → вони"
        answer: "вони снідали"
      - given: "спати → він"
        answer: "він спав"

  - type: pattern_drill
    title: "Теперішній → Минулий"
    prompt: "Зміни теперішній час на минулий"
    items:
      - given: "Зараз я читаю. → Вчора я..."
        answer: "Вчора я читав/читала."
      - given: "Зараз він працює. → Учора він..."
        answer: "Учора він працював."
      - given: "Зараз вона снідає. → Вчора вона..."
        answer: "Вчора вона снідала."
      - given: "Зараз ми відпочиваємо. → Вчора ми..."
        answer: "Вчора ми відпочивали."
      - given: "Зараз вони грають. → Вчора вони..."
        answer: "Вчора вони грали."

  - type: build_sentence
    title: "Склади речення в минулому часі"
    sentences:
      - words: ["Вчора", "Оля", "снідала", "о", "дев'ятій", "."]
        correct: "Вчора Оля снідала о дев'ятій."
      - words: ["Позавчора", "ми", "працювали", "весь", "день", "."]
        correct: "Позавчора ми працювали весь день."
      - words: ["Минулого", "тижня", "він", "читав", "книгу", "."]
        correct: "Минулого тижня він читав книгу."
      - words: ["Вчора", "вона", "вмивалася", "і", "одягалася", "."]
        correct: "Вчора вона вмивалася і одягалася."
      - words: ["Вони", "йшли", "додому", "ввечері", "."]
        correct: "Вони йшли додому ввечері."
      - words: ["Сонце", "світило", "весь", "день", "."]
        correct: "Сонце світило весь день."

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "«Він читав» — це минулий час."
        answer: true
      - statement: "«Вона читали» — правильне речення."
        answer: false
        correction: "Вона — жіночий рід → читала."
      - statement: "«Вчора» — сигнальне слово минулого часу."
        answer: true
      - statement: "«Завтра він працював» — правильне речення."
        answer: false
        correction: "Завтра — майбутнє, працював — минуле. Правильно: Завтра він буде працювати."
      - statement: "«Сонце світило» — середній рід, минулий час."
        answer: true

  - type: riddle
    title: "Загадка"
    clues:
      - "Чорна корова всіх людей поборола,"
      - "а білий віл усіх підвів."
    answer: "ДЕНЬ І НІЧ"
    answer_emoji: "🌓"
    source: "Grade 3 p.57"

  - type: reading
    title: "Читання: Щоденник"
    text: |
      Сьогодні я встала о сьомій годині. Я вмилася і снідала. Потім я йшла до школи. Зараз я вдома і читаю книгу. Завтра я буду відпочивати.
    questions:
      - question: "О котрій вона встала?"
        answer: "О сьомій годині."
      - question: "Що вона робила вранці?"
        answer: "Вмилася і снідала."
      - question: "Де вона зараз?"
        answer: "Вдома."
      - question: "Що вона буде робити завтра?"
        answer: "Відпочивати."
