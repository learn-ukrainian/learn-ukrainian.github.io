module: abetka-1
track: l2-uk-direct
level: a1
type: script_foundation
title: Абетка — перші букви
subtitle: А О М Л У Н С — перші голосні і перші приголосні
standard_ref: §4.1.1 — alphabet, §4.1.4 — vowels/consonants
textbook_ref: Bolshakova 2018 Part 1, pp.12-22
teaching_notes: На цьому етапі важливо зосередитися на розпізнаванні перших семи літер. Усі наведені речення
  використовують виключно букви А, О, Л, М, Н, С, У, тому учні можуть і повинні читати їх самостійно.
  Зверніть увагу на артикуляцію звуків. Не використовуйте для самостійного читання слова з іншими літерами, навіть якщо вони
  є у ключових словах. Обов'язково тренуйте читання складів у парах, щоб учні зрозуміли принцип злиття приголосного та голосного
  звуків. Буква О вводиться другою за підручником Большакової (с. 13) — це найчастіший голосний в українській мові.
