module: znaky-ta-napysy
track: l2-uk-direct
level: a1
type: reading
title: "Знаки та написи"
subtitle: "Розклади, квитки, чеки, меню, анкети — читання реальних текстів."
standard_ref: "§1.2 — читання: знаки, розклади, анкети, квитки, меню, SMS, листівки, email"
textbook_ref: "Grade 3–5 — real-world reading"

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Читаємо справжні тексти: знаки, розклади, квитки, чеки, меню, анкети."
  examples:
    - "Відчинено / Зачинено"
    - "Увага! Небезпечно!"
    - "Вхід / Вихід"

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Знаки і написи"
    items:
      - word: "відчинено"
        emoji: "🟢"
        sentence: "Магазин відчинено."
      - word: "зачинено"
        emoji: "🔴"
        sentence: "Зачинено на обід."
      - word: "вхід"
        emoji: "🚪"
        sentence: "Вхід ліворуч."
      - word: "вихід"
        emoji: "🚪"
        sentence: "Вихід праворуч."
      - word: "увага"
        emoji: "⚠️"
        sentence: "Увага! Мокра підлога."
      - word: "небезпечно"
        emoji: "☠️"
        sentence: "Небезпечно! Не входити!"
      - word: "заборонено"
        emoji: "🚫"
        sentence: "Курити заборонено."
      - word: "безкоштовно"
        emoji: "🆓"
        sentence: "Вхід безкоштовний."
      - word: "розклад"
        emoji: "📋"
        sentence: "Розклад руху поїздів."

  - category: "Анкета (форма)"
    items:
      - word: "прізвище"
        emoji: "📝"
        sentence: "Прізвище: Іваненко."
      - word: "ім'я"
        emoji: "📝"
        sentence: "Ім'я: Олена."
      - word: "адреса"
        emoji: "🏠"
        sentence: "Адреса: м. Київ, вул. Хрещатик, 15."
      - word: "підпис"
        emoji: "✍️"
        sentence: "Поставте підпис тут."
      - word: "номер телефону"
        emoji: "📱"
        sentence: "Номер телефону: +380..."
      - word: "електронна пошта"
        emoji: "📧"
        sentence: "Електронна пошта: olena@mail.com."
      - word: "громадянство"
        emoji: "🇺🇦"
        sentence: "Громадянство: Україна."

# ─────────────────────────────────────────────
# TEXT TYPES
# ─────────────────────────────────────────────
text_types:
  - type: "Знаки і об'яви"
    examples: ["Не курити!", "Увага!", "Відчинено!", "Зачинено!", "Вхід", "Вихід", "Обережно!", "Небезпечно!"]
  - type: "Розклад"
    description: "Розклад руху поїздів/автобусів: час, напрямок, платформа"
  - type: "Квиток"
    description: "Звідки/куди, дата, час, місце, ціна"
  - type: "Чек"
    description: "Товари, ціни, загальна сума"
  - type: "Меню"
    description: "Категорії (перші страви, другі страви, напої, десерти), страви, ціни"
  - type: "Анкета"
    description: "Ім'я, прізвище, дата народження, країна, адреса, телефон, email, підпис"

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: reading
    title: "Читання: Українські знаки"
    text: |
      1. 🚫 НЕ КУРИТИ!
      2. 🟢 ВІДЧИНЕНО (9:00–21:00)
      3. 🔴 ЗАЧИНЕНО НА РЕМОНТ
      4. ⚠️ УВАГА! МОКРА ПІДЛОГА
      5. 🚪 ВИХІД →
    questions:
      - question: "Де можна курити?"
        answer: "Ніде — курити заборонено."
      - question: "Коли працює магазин?"
        answer: "З 9:00 до 21:00."
      - question: "Чому зачинено?"
        answer: "На ремонт."

  - type: reading
    title: "Читання: Розклад поїздів"
    text: |
      РОЗКЛАД РУХУ ПОЇЗДІВ
      | Поїзд | Напрямок | Відправлення | Платформа |
      | 101 | Київ–Одеса | 06:30 | 3 |
      | 205 | Київ–Львів | 08:15 | 1 |
      | 312 | Київ–Харків | 10:00 | 5 |
      | 418 | Київ–Дніпро | 14:45 | 2 |
    questions:
      - question: "О котрій відходить поїзд до Одеси?"
        answer: "О 06:30."
      - question: "З якої платформи поїзд до Львова?"
        answer: "З першої."
      - question: "Куди їде поїзд о 10:00?"
        answer: "До Харкова."

  - type: reading
    title: "Читання: Чек"
    text: |
      ЧЕК
      Хліб ........ 15 грн
      Молоко ...... 28 грн
      Яблука (1 кг) 32 грн
      Сир ......... 45 грн
      ---
      РАЗОМ: 120 грн
    questions:
      - question: "Скільки коштує хліб?"
        answer: "15 гривень."
      - question: "Скільки коштує все разом?"
        answer: "120 гривень."
      - question: "Що найдорожче?"
        answer: "Сир — 45 гривень."

  - type: reading
    title: "Читання: Меню ресторану"
    text: |
      МЕНЮ
      ПЕРШІ СТРАВИ:
        Борщ ............. 55 грн
        Суп курячий ...... 45 грн
      ДРУГІ СТРАВИ:
        Котлета з картоплею  85 грн
        Риба з рисом ..... 95 грн
      НАПОЇ:
        Чай .............. 20 грн
        Кава ............. 35 грн
        Сік .............. 30 грн
      ДЕСЕРТИ:
        Торт ............. 50 грн
    questions:
      - question: "Скільки коштує борщ?"
        answer: "55 гривень."
      - question: "Які напої є?"
        answer: "Чай, кава, сік."
      - question: "Що дешевше — котлета чи риба?"
        answer: "Котлета (85 грн проти 95 грн)."

  - type: pattern_drill
    title: "Заповни анкету"
    prompt: "Куди написати цю інформацію?"
    items:
      - given: "Олена Іваненко → поле?"
        answer: "Прізвище: Іваненко, Ім'я: Олена"
      - given: "25 років → поле?"
        answer: "Дата народження / Вік"
      - given: "Київ, вул. Шевченка, 10 → поле?"
        answer: "Адреса"
      - given: "+380501234567 → поле?"
        answer: "Номер телефону"
      - given: "olena@mail.com → поле?"
        answer: "Електронна пошта"

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "«Зачинено» означає, що магазин працює."
        answer: false
        correction: "Зачинено = магазин не працює."
      - statement: "«Вихід» — це де виходять."
        answer: true
      - statement: "«Увага!» означає «не хвилюйтеся»."
        answer: false
        correction: "«Увага!» означає «будьте обережні»."
      - statement: "«Безкоштовно» означає «не треба платити»."
        answer: true

  - type: riddle
    title: "Загадка"
    clues:
      - "У двох матерів по п'ять синків,"
      - "одне ім'я всім."
    answer: "ПАЛЬЦІ"
    answer_emoji: "🖐️"
    source: "Grade 3 p.141"
