module: ya-ty-vin
track: l2-uk-direct
level: a1
type: grammar
title: "Я, ти, він..."
subtitle: "Особові займенники і дієвідмінювання дієслів."
standard_ref: "§4.2.1.4 — особові займенники (називний відмінок), §4.2.4.1 — дієвідміна I/II"
textbook_ref: "Grade 3 — дієвідмінювання дієслів, Grade 4 — особові займенники"
teaching_notes: >
  Особові займенники: я, ти, він/вона/воно, ми, ви, вони. «Ви» — також ввічлива форма (одній
  людині). Дієвідмінювання: I дієвідміна (-е-/-є-: читаю, читаєш, читає) і II (-и-/-і-:
  говорю, говориш, говорить). Ключовий паттерн: займенник визначає закінчення дієслова.
  Найчастіша помилка: «він читає» (НЕ «він читаєт»). Воно — для середнього роду: «Воно лежить».

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Займенник + дієслово: я читаю, ти читаєш, він читає..."
  examples:
    - "Я читаю книгу."
    - "Ти пишеш лист."
    - "Вона говорить українською."
    - "Ми вчимо нові слова."

# ─────────────────────────────────────────────
# VOCABULARY: pronouns + 10 core verbs
# ─────────────────────────────────────────────
vocabulary:
  - category: "Особові займенники"
    items:
      - word: "я"
        emoji: "\U0001F9D1"
        sentence: "Я читаю книгу."
      - word: "ти"
        emoji: "\U0001F44B"
        sentence: "Ти пишеш лист."
      - word: "він"
        emoji: "\U0001F468"
        sentence: "Він працює."
      - word: "вона"
        emoji: "\U0001F469"
        sentence: "Вона говорить."
      - word: "воно"
        emoji: "\u2B50"
        sentence: "Воно світить."
      - word: "ми"
        emoji: "\U0001F46B"
        sentence: "Ми вчимо українську."
      - word: "ви"
        emoji: "\U0001F465"
        sentence: "Ви читаєте газету."
      - word: "вони"
        emoji: "\U0001F46A"
        sentence: "Вони говорять."

  - category: "Дієвідміна I (читати-тип: -аю, -аєш, -ає...)"
    items:
      - word: "читати"
        emoji: "\U0001F4D6"
        sentence: "Я читаю, ти читаєш, він читає."
      - word: "писати"
        emoji: "\u270D\uFE0F"
        sentence: "Я пишу, ти пишеш, він пише."
      - word: "слухати"
        emoji: "\U0001F442"
        sentence: "Я слухаю, ти слухаєш, він слухає."
      - word: "знати"
        emoji: "\U0001F9E0"
        sentence: "Я знаю, ти знаєш, він знає."
      - word: "мати"
        emoji: "\U0001F4E6"
        sentence: "Я маю, ти маєш, він має."

  - category: "Дієвідміна II (говорити-тип: -ю, -иш, -ить...)"
    items:
      - word: "говорити"
        emoji: "\U0001F4AC"
        sentence: "Я говорю, ти говориш, він говорить."
      - word: "любити"
        emoji: "\u2764\uFE0F"
        sentence: "Я люблю, ти любиш, він любить."
      - word: "робити"
        emoji: "\U0001F528"
        sentence: "Я роблю, ти робиш, він робить."
  - category: "Нерегулярні дієслова"
    items:
      - word: "жити"
        emoji: "\U0001F3E0"
        sentence: "Я живу, ти живеш, він живе."
      - word: "іти"
        emoji: "\U0001F6B6"
        sentence: "Я іду, ти ідеш, він іде."

# ─────────────────────────────────────────────
# TEACHING NOTE: Ви vs ви
# ─────────────────────────────────────────────
teaching_note:
  text: "Ви (з великої літери) — ввічливе звертання до однієї людини. ви (з малої) — до кількох людей."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Дієвідміна I — дієслово + займенник"
    prompt: "Утвори правильну форму"
    items:
      - given: "читати: ТИ?"
        answer: "ти читаєш"
      - given: "читати: ВОНИ?"
        answer: "вони читають"
      - given: "писати: Я?"
        answer: "я пишу"
      - given: "писати: ВІН?"
        answer: "він пише"
      - given: "слухати: МИ?"
        answer: "ми слухаємо"
      - given: "знати: ВИ?"
        answer: "ви знаєте"
      - given: "мати: ВОНА?"
        answer: "вона має"
      - given: "знати: ВОНИ?"
        answer: "вони знають"
      - given: "слухати: Я?"
        answer: "я слухаю"
      - given: "читати: МИ?"
        answer: "ми читаємо"

  - type: pattern_drill
    title: "Дієвідміна II — дієслово + займенник"
    prompt: "Утвори правильну форму"
    items:
      - given: "говорити: МИ?"
        answer: "ми говоримо"
      - given: "говорити: ТИ?"
        answer: "ти говориш"
      - given: "любити: Я?"
        answer: "я люблю"
      - given: "любити: ВОНИ?"
        answer: "вони люблять"
      - given: "робити: ВІН?"
        answer: "він робить"
      - given: "робити: ВИ?"
        answer: "ви робите"
      - given: "жити: ВОНА?"
        answer: "вона живе"
      - given: "жити: МИ?"
        answer: "ми живемо"
      - given: "іти: ТИ?"
        answer: "ти ідеш"
      - given: "іти: ВОНИ?"
        answer: "вони ідуть"

  - type: build_sentence
    title: "Склади речення"
    instruction: "Обери займенник, дієслово і доповнення"
    sentences:
      - words: ["Я", "читаю", "книгу", "."]
        correct: "Я читаю книгу."
      - words: ["Ти", "пишеш", "лист", "."]
        correct: "Ти пишеш лист."
      - words: ["Він", "говорить", "українською", "."]
        correct: "Він говорить українською."
      - words: ["Ми", "знаємо", "відповідь", "."]
        correct: "Ми знаємо відповідь."
      - words: ["Вони", "слухають", "музику", "."]
        correct: "Вони слухають музику."

  - type: classify
    title: "Дієвідміна I чи II?"
    instruction: "Розподіли дієслівні форми"
    categories:
      - label: "Дієвідміна I (читаю-тип)"
        items:
          - "читаю"
          - "пишеш"
          - "слухає"
          - "знаємо"
          - "мають"
      - label: "Дієвідміна II (говорю-тип)"
        items:
          - "говорю"
          - "любиш"
          - "робить"
      - label: "Нерегулярні"
        items:
          - "живемо"
          - "ідуть"

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "Вони читає."
        answer: false
        correction: "Вони читають (3-тя особа множини)"
      - statement: "Ми говоримо."
        answer: true
      - statement: "Я знаєш."
        answer: false
        correction: "Я знаю (1-ша особа однини)"
      - statement: "Вона пише."
        answer: true
      - statement: "Ти робить."
        answer: false
        correction: "Ти робиш (2-га особа однини)"
      - statement: "Він іде."
        answer: true

  - type: proverb_drill
    title: "Прислів'я"
    proverb: "Вчення — світ, а невчення — тьма."
    activity:
      type: fill_gap
      gap_word: "світ"
      options: ["світ", "ніч", "день"]
      answer: "світ"
      meaning: "Навчання освітлює шлях."

  - type: reading
    title: "Читання"
    text: |
      Я читаю. Ти пишеш. Він говорить. Вона слухає музику.
      Ми всі вчимо українську мову. Ви теж вчите? Вони також вчать.
    questions:
      - question: "Що я роблю?"
        answer: "Я читаю."
      - question: "Хто слухає музику?"
        answer: "Вона слухає музику."
      - question: "Що ми всі вчимо?"
        answer: "Українську мову."
