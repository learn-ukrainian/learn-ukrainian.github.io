module: pryroda
track: l2-uk-direct
level: a1
type: vocabulary
title: "Природа"
subtitle: "Погода, пори року, тварини, рослини."
standard_ref: "Каталог Б #11 — природа: погода, рослини, тварини, природні об'єкти"
textbook_ref: "Grade 3–4 — nature vocabulary"
teaching_notes: |
  Центральне питання: «Яка сьогодні погода?» — відповіді через безособові конструкції: тепло, холодно, сонячно.
  Пори року подавайте з прислівниками: взимку, навесні, влітку, восени — зверніть увагу на форми.
  Температурні прикметники вибудовуйте за шкалою: морозний → холодний → прохолодний → теплий → гарячий.
  Погодні дієслова: дощ іде, сніг падає, вітер дує, сонце світить — фіксовані пари «іменник + дієслово».
  Використовуйте реальну погоду за вікном як щоденну розминку на початку заняття.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Надворі + прикметник. Іде дощ. Сонце світить."
  examples:
    - "Надворі тепло."
    - "Іде дощ."
    - "Сонце світить."

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
