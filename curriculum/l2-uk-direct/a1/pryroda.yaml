# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Пори року"
    instruction: "Розподіли явища за порами року"
    categories:
      - label: "Зима"
        items:
          - "сніг"
          - "мороз"
          - "холодно"
          - "лід"
          - "короткий день"
      - label: "Весна"
        items:
          - "квіти"
          - "тепло"
          - "птахи повертаються"
          - "зелена трава"
          - "дощ"
      - label: "Літо"
        items:
          - "сонце"
          - "спекотно"
          - "купання"
          - "канікули"
          - "довгий день"
      - label: "Осінь"
        items:
          - "жовте листя"
          - "прохолодно"
          - "дощ"
          - "вітер"
          - "туман"

  - type: build_sentence
    title: "Опис погоди"
    sentences:
      - words: ["Зараз", "літо", ".", "Надворі", "тепло", "і", "сонячно", "."]
        correct: "Зараз літо. Надворі тепло і сонячно."
      - words: ["Іде", "дощ", ".", "Небо", "в", "хмарах", "."]
        correct: "Іде дощ. Небо в хмарах."
      - words: ["Взимку", "падає", "сніг", "і", "дує", "вітер", "."]
        correct: "Взимку падає сніг і дує вітер."

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "Влітку іде сніг."
        answer: false
        correction: "Сніг іде взимку."
      - statement: "Навесні квіти цвітуть."
        answer: true
      - statement: "Восени листя зелене."
        answer: false
        correction: "Восени листя жовте і червоне."
      - statement: "Взимку холодно."
        answer: true
      - statement: "Річка — це природний об'єкт."
        answer: true
      - statement: "Метелик — це рослина."
        answer: false
        correction: "Метелик — це комаха (тварина)."

  - type: pattern_drill
    title: "Погодні дієслова"
    prompt: "Що робить?"
    items:
      - given: "дощ → ЩО РОБИТЬ?"
        answer: "іде"
      - given: "сонце → ЩО РОБИТЬ?"
        answer: "світить"
      - given: "вітер → ЩО РОБИТЬ?"
        answer: "дує"
      - given: "сніг → ЩО РОБИТЬ?"
        answer: "падає"
      - given: "грім → ЩО РОБИТЬ?"
        answer: "гримить"
      - given: "птах → ЩО РОБИТЬ?"
        answer: "співає"

  - type: reading
    title: "Читання: Пори року"
    text: |
      Зараз літо. Надворі тепло і сонячно. Діти грають у парку. Але ввечері іде дощ. Небо стає сірим, і дує сильний вітер. Після дощу з'являється веселка. Діти радіють і бігають по калюжах.
    questions:
      - question: "Яка пора року?"
        answer: "Літо."
      - question: "Що трапляється ввечері?"
        answer: "Іде дощ."
      - question: "Що з'являється після дощу?"
        answer: "Веселка."

  - type: riddle
    title: "Загадка"
    clues:
      - "Я приходжу після зими."
      - "Я приношу тепло і квіти."
      - "Птахи повертаються і співають."
    answer: "ВЕСНА"
    answer_emoji: "🌸"
    source: "народна загадка"
