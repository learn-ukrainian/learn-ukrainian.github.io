# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "В/У чи НА?"
    instruction: "Розподіли місця: в/у (закритий простір) чи на (поверхня, відкритий простір)"
    categories:
      - label: "в/у (закритий простір)"
        items:
          - "у кімнаті"
          - "в місті"
          - "у школі"
          - "у лісі"
          - "в магазині"
          - "у бібліотеці"
          - "в аптеці"
          - "у лікарні"
          - "в університеті"
          - "у музеї"
      - label: "на (поверхня / відкрито)"
        items:
          - "на столі"
          - "на вулиці"
          - "на зупинці"
          - "на площі"
          - "на ринку"
          - "на стадіоні"
          - "на балконі"
          - "на пошті"
          - "на підлозі"
          - "на полиці"

  - type: pattern_drill
    title: "Утвори місцевий відмінок"
    prompt: "ДЕ? Постав іменник у місцевий відмінок"
    items:
      - given: "стіл → (книга на...)"
        answer: "на столі"
      - given: "школа → (я у...)"
        answer: "у школі"
      - given: "місто → (ми в...)"
        answer: "в місті"
      - given: "кімната → (він у...)"
        answer: "у кімнаті"
      - given: "парк → (діти у...)"
        answer: "у парку"
      - given: "вулиця → (кіт на...)"
        answer: "на вулиці"
      - given: "земля → (квітка на...)"
        answer: "на землі"
      - given: "ліс → (ведмідь у...)"
        answer: "у лісі"
      - given: "магазин → (хліб у...)"
        answer: "у магазині"
      - given: "бібліотека → (книги у...)"
        answer: "у бібліотеці"

  - type: build_sentence
    title: "Де це?"
    instruction: "Склади речення з місцевим відмінком"
    sentences:
      - words: ["Кіт", "спить", "на", "дивані", "."]
        correct: "Кіт спить на дивані."
      - words: ["Книга", "лежить", "на", "столі", "."]
        correct: "Книга лежить на столі."
      - words: ["Ми", "живемо", "в", "місті", "."]
        correct: "Ми живемо в місті."
      - words: ["Діти", "грають", "у", "парку", "."]
        correct: "Діти грають у парку."

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "Кіт є на лісі."
        answer: false
        correction: "Кіт є у лісі."
      - statement: "Книга лежить на столі."
        answer: true
      - statement: "Я живу в місті."
        answer: true
      - statement: "Він працює на школі."
        answer: false
        correction: "Він працює у школі."
      - statement: "Квіти ростуть на землі."
        answer: true
      - statement: "Ми у парку."
        answer: true

  - type: pattern_drill
    title: "Контраст: КУДИ? і ДЕ?"
    prompt: "Порівняй знахідний (КУДИ?) і місцевий (ДЕ?)"
    items:
      - given: "школа — КУДИ?"
        answer: "Я іду в школу."
      - given: "школа — ДЕ?"
        answer: "Я в школі."
      - given: "парк — КУДИ?"
        answer: "Я іду в парк."
      - given: "парк — ДЕ?"
        answer: "Я в парку."
      - given: "магазин — КУДИ?"
        answer: "Я іду в магазин."
      - given: "магазин — ДЕ?"
        answer: "Я в магазині."

  - type: pattern_drill
    title: "Місяці: КОЛИ?"
    prompt: "Утвори місцевий відмінок місяця"
    items:
      - given: "Коли? (травень)"
        answer: "У травні."
      - given: "Коли? (січень)"
        answer: "У січні."
      - given: "Коли? (вересень)"
        answer: "У вересні."
      - given: "Коли? (грудень)"
        answer: "У грудні."
      - given: "Коли? (лютий)"
        answer: "У лютому."
      - given: "Коли? (серпень)"
        answer: "У серпні."
