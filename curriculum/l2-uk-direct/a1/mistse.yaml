module: mistse
track: l2-uk-direct
level: a1
type: grammar
title: "Місцевий відмінок (ДЕ?)"
subtitle: "Де знаходяться речі і люди — в/у, на + місцевий"
standard_ref: "§4.2.3.3 — locative case"
textbook_ref: "Grade 4 — locative: на кому? на/у чому?; Grade 6 §46"

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "ДЕ? → в/у (всередині), на (на поверхні) + місцевий відмінок"
  examples:
    - "Книга на столі. (стіл → столі)"
    - "Я у школі. (школа → школі)"
    - "Ми в місті. (місто → місті)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Місцевий відмінок (однина)"
    columns: ["Рід", "Називний", "Місцевий", "Зміна"]
    rows:
      - ["Чоловічий (приголосний)", "стіл", "на столі", "+ -і"]
      - ["Чоловічий (-к)", "парк", "у парку", "-к → -ку"]
      - ["Жіночий -а", "кімната", "у кімнаті", "-а → -і"]
      - ["Жіночий -я", "земля", "на землі", "-я → -і"]
      - ["Середній -о", "місто", "у місті", "-о → -і"]
      - ["Середній -е", "місце", "на місці", "-е → -і"]

  - title: "Прийменники: в/у чи на?"
    columns: ["Прийменник", "Значення", "Приклади"]
    rows:
      - ["в/у", "закритий простір", "у кімнаті, в місті, у школі, у лісі"]
      - ["на", "поверхня, відкритий простір, подія", "на столі, на вулиці, на зупинці, на святі"]

  - title: "Місяці у місцевому відмінку (КОЛИ?)"
    columns: ["Місяць", "У місцевому"]
    rows:
      - ["січень", "у січні"]
      - ["лютий", "у лютому"]
      - ["березень", "у березні"]
      - ["квітень", "у квітні"]
      - ["травень", "у травні"]
      - ["червень", "у червні"]
      - ["липень", "у липні"]
      - ["серпень", "у серпні"]
      - ["вересень", "у вересні"]
      - ["жовтень", "у жовтні"]
      - ["листопад", "у листопаді"]
      - ["грудень", "у грудні"]

# ─────────────────────────────────────────────
# KEY CONTRAST
# ─────────────────────────────────────────────
key_contrast:
  text: "КУДИ? (знахідний) ≠ ДЕ? (місцевий)"
  examples:
    - "КУДИ? Я іду в школу. (знахідний)"
    - "ДЕ? Я в школі. (місцевий)"

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "В/У чи НА?"
    instruction: "Розподіли місця: в/у (закритий простір) чи на (поверхня, відкритий простір)"
    categories:
      - label: "в/у (закритий простір)"
        items:
          - "у кімнаті"
          - "в місті"
          - "у школі"
          - "у лісі"
          - "в магазині"
          - "у бібліотеці"
          - "в аптеці"
          - "у лікарні"
          - "в університеті"
          - "у музеї"
      - label: "на (поверхня / відкрито)"
        items:
          - "на столі"
          - "на вулиці"
          - "на зупинці"
          - "на площі"
          - "на ринку"
          - "на стадіоні"
          - "на балконі"
          - "на пошті"
          - "на підлозі"
          - "на полиці"

  - type: pattern_drill
    title: "Утвори місцевий відмінок"
    prompt: "ДЕ? Постав іменник у місцевий відмінок"
    items:
      - given: "стіл → (книга на...)"
        answer: "на столі"
      - given: "школа → (я у...)"
        answer: "у школі"
      - given: "місто → (ми в...)"
        answer: "в місті"
      - given: "кімната → (він у...)"
        answer: "у кімнаті"
      - given: "парк → (діти у...)"
        answer: "у парку"
      - given: "вулиця → (кіт на...)"
        answer: "на вулиці"
      - given: "земля → (квітка на...)"
        answer: "на землі"
      - given: "ліс → (ведмідь у...)"
        answer: "у лісі"
      - given: "магазин → (хліб у...)"
        answer: "у магазині"
      - given: "бібліотека → (книги у...)"
        answer: "у бібліотеці"

  - type: build_sentence
    title: "Де це?"
    instruction: "Склади речення з місцевим відмінком"
    sentences:
      - words: ["Кіт", "спить", "на", "дивані", "."]
        correct: "Кіт спить на дивані."
      - words: ["Книга", "лежить", "на", "столі", "."]
        correct: "Книга лежить на столі."
      - words: ["Ми", "живемо", "в", "місті", "."]
        correct: "Ми живемо в місті."
      - words: ["Діти", "грають", "у", "парку", "."]
        correct: "Діти грають у парку."

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "Кіт є на лісі."
        answer: false
        correction: "Кіт є у лісі."
      - statement: "Книга лежить на столі."
        answer: true
      - statement: "Я живу в місті."
        answer: true
      - statement: "Він працює на школі."
        answer: false
        correction: "Він працює у школі."
      - statement: "Квіти ростуть на землі."
        answer: true
      - statement: "Ми у парку."
        answer: true

  - type: pattern_drill
    title: "Контраст: КУДИ? і ДЕ?"
    prompt: "Порівняй знахідний (КУДИ?) і місцевий (ДЕ?)"
    items:
      - given: "школа — КУДИ?"
        answer: "Я іду в школу."
      - given: "школа — ДЕ?"
        answer: "Я в школі."
      - given: "парк — КУДИ?"
        answer: "Я іду в парк."
      - given: "парк — ДЕ?"
        answer: "Я в парку."
      - given: "магазин — КУДИ?"
        answer: "Я іду в магазин."
      - given: "магазин — ДЕ?"
        answer: "Я в магазині."

  - type: pattern_drill
    title: "Місяці: КОЛИ?"
    prompt: "Утвори місцевий відмінок місяця"
    items:
      - given: "Коли? (травень)"
        answer: "У травні."
      - given: "Коли? (січень)"
        answer: "У січні."
      - given: "Коли? (вересень)"
        answer: "У вересні."
      - given: "Коли? (грудень)"
        answer: "У грудні."
      - given: "Коли? (лютий)"
        answer: "У лютому."
      - given: "Коли? (серпень)"
        answer: "У серпні."
