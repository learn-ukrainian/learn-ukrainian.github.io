module: sim-ya
track: l2-uk-direct
level: a1
type: vocabulary
title: "Сім'я"
subtitle: "Родина, стосунки, кличний відмінок."
standard_ref: "Каталог Б #1 — людина: сім'я, родичі, статус; §4.2.3.4 — кличний відмінок"
textbook_ref: "Grade 3–4 — family, vocative case"
teaching_notes: |
  Кличний відмінок вводьте через родинні звертання: мамо! тату! бабусю! дідусю! — це найприродніший контекст.
  Присвійні конструкції: «мій тато», «моя мама», «моє ім'я» — закріплюють узгодження за родом.
  Лексику родинного дерева подавайте візуально: намалюйте схему сім'ї і підпишіть українською.
  Пестливі форми (матуся, татусь, бабця) — покажіть їх як окремий реєстр, не плутайте з офіційними.
  Для практики: учні описують свою родину за шаблоном «Це мій/моя... Його/Її звати...»

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Це мій/моя + родич. Кличний: Мамо! Тату! Іване!"
  examples:
    - "Це моя мама. Мамо, іди сюди!"
    - "Це мій тато. Тату, допоможи!"
    - "Це мій друг Іван. Іване, привіт!"

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Найближча родина"
    items:
      - word: "мама"
        emoji: "👩"
        sentence: "Мамо, я тебе люблю!"
      - word: "тато"
        emoji: "👨"
        sentence: "Тату, де ти?"
      - word: "дитина"
        emoji: "👶"
        sentence: "Дитина спить."
      - word: "дочка"
        emoji: "👧"
        sentence: "Це моя дочка."
      - word: "син"
        emoji: "👦"
        sentence: "Це мій син."
      - word: "бабуся"
        emoji: "👵"
        sentence: "Бабусю, розкажи казку!"
      - word: "дідусь"
        emoji: "👴"
        sentence: "Дідусю, як справи?"

  - category: "Брати і сестри"
    items:
      - word: "брат"
        emoji: "👦"
        sentence: "Мій брат старший."
      - word: "сестра"
        emoji: "👧"
        sentence: "Моя сестра вчиться."

  - category: "Інші родичі"
    items:
      - word: "тітка"
        emoji: "👩"
        sentence: "Тітка живе у Львові."
      - word: "дядько"
        emoji: "👨"
        sentence: "Дядько працює в банку."
      - word: "племінник"
        emoji: "👦"
        sentence: "Племінник ходить у школу."
      - word: "племінниця"
        emoji: "👧"
        sentence: "Племінниця любить читати."

  - category: "Подружжя і друзі"
    items:
      - word: "дружина"
        emoji: "👰"
        sentence: "Це моя дружина."
      - word: "чоловік"
        emoji: "🤵"
        sentence: "Це мій чоловік."
      - word: "друг"
        emoji: "🧑‍🤝‍🧑"
        sentence: "Це мій найкращий друг."
      - word: "подруга"
        emoji: "👭"
        sentence: "Моя подруга з Одеси."
      - word: "колега"
        emoji: "🧑‍💼"
        sentence: "Колега допомагає мені."
      - word: "сусід"
        emoji: "🏠"
        sentence: "Сусід живе поряд."
      - word: "сусідка"
        emoji: "🏠"
        sentence: "Сусідка дуже привітна."

  - category: "Пестливі форми"
    items:
      - word: "матуся"
        emoji: "💕"
        sentence: "Матуся завжди поряд."
      - word: "татусь"
        emoji: "💕"
        sentence: "Татусь допомагає."
      - word: "бабусенька"
        emoji: "💕"
        sentence: "Бабусенька готує смачну їжу."
      - word: "дідусенько"
        emoji: "💕"
        sentence: "Дідусенько розповідає казки."
      - word: "мамочка"
        emoji: "💕"
        sentence: "Мамочка, я тебе люблю!"
      - word: "татко"
        emoji: "💕"
        sentence: "Татко прийшов з роботи."
      - word: "бабця"
        emoji: "💕"
        sentence: "Бабця спекла пиріжки."

# ─────────────────────────────────────────────
# GRAMMAR: VOCATIVE
# ─────────────────────────────────────────────
grammar:
  - name: "Кличний відмінок"
    pattern: "Звертання до людей"
    table:
      - base: "мама"
        vocative: "мамо"
      - base: "тато"
        vocative: "тату"
      - base: "бабуся"
        vocative: "бабусю"
      - base: "дідусь"
        vocative: "дідусю"
      - base: "Оля"
        vocative: "Олю"
      - base: "Іван"
        vocative: "Іване"
      - base: "пан"
        vocative: "пане"
      - base: "пані"
        vocative: "пані"
    examples:
      - "Мамо, де ти?"
      - "Тату, допоможи!"
      - "Олю, привіт!"
      - "Іване, як справи?"
      - "Пане, вибачте!"

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Родинне дерево"
    instruction: "Розподіли за категоріями"
    categories:
      - label: "Батьки"
        items:
          - "мама"
          - "тато"
      - label: "Дідусі-бабусі"
        items:
          - "бабуся"
          - "дідусь"
      - label: "Брати-сестри"
        items:
          - "брат"
          - "сестра"
      - label: "Інші"
        items:
          - "тітка"
          - "дядько"
          - "племінник"
          - "племінниця"
          - "дружина"
          - "чоловік"

  - type: build_sentence
    title: "Опис родини"
    sentences:
      - words: ["Це", "моя", "мама", ".", "Її", "звати", "Олена", "."]
        correct: "Це моя мама. Її звати Олена."
      - words: ["Це", "мій", "тато", ".", "Його", "звати", "Назар", "."]
        correct: "Це мій тато. Його звати Назар."
      - words: ["Мій", "брат", "—", "студент", "."]
        correct: "Мій брат — студент."
      - words: ["Моя", "сестра", "—", "вчителька", "."]
        correct: "Моя сестра — вчителька."

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "Мама моєї мами — це моя тітка."
        answer: false
        correction: "Мама моєї мами — це бабуся."
      - statement: "Брат тата — це дядько."
        answer: true
      - statement: "Син моєї сестри — це мій племінник."
        answer: true
      - statement: "Дружина — це чоловік."
        answer: false
        correction: "Дружина — жінка, чоловік — чоловік."

  - type: pattern_drill
    title: "Кличний відмінок"
    prompt: "Утвори форму звертання"
    items:
      - given: "мама → звертання"
        answer: "мамо"
      - given: "тато → звертання"
        answer: "тату"
      - given: "бабуся → звертання"
        answer: "бабусю"
      - given: "дідусь → звертання"
        answer: "дідусю"
      - given: "Оля → звертання"
        answer: "Олю"
      - given: "Іван → звертання"
        answer: "Іване"
      - given: "пан → звертання"
        answer: "пане"
      - given: "пані → звертання"
        answer: "пані"

  - type: proverb_drill
    title: "Прислів'я"
    proverb: "Без сім'ї нема щастя на землі."
    activity:
      type: fill_gap
      gap_word: "сім'ї"
      options: ["сім'ї", "землі", "щастя", "нема"]
      answer: "сім'ї"
      meaning: "Сім'я — найважливіше."

  - type: reading
    title: "Читання: Моя родина"
    text: |
      Мене звати Назар. У мене є велика сім'я. Моя мама — вчителька. Мій тато — лікар. У мене є сестра Оля і брат Тарас. Ми живемо в Харкові. Бабуся і дідусь живуть у селі. Влітку ми їздимо до них.
    questions:
      - question: "Хто мама Назара?"
        answer: "Вчителька."
      - question: "Скільки братів і сестер має Назар?"
        answer: "Одну сестру (Оля) і одного брата (Тарас)."
      - question: "Де живуть бабуся і дідусь?"
        answer: "У селі."
