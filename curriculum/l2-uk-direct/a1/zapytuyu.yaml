module: zapytuyu
track: l2-uk-direct
level: a1
type: grammar
title: "Запитую!"
subtitle: "Усі питальні слова. Хто? Що? Де? Звідки? Куди? Коли? Як? Скільки? Чому?"
standard_ref: "§4.3.1 — питальні речення, заперечення"
textbook_ref: "Grade 3 — питальні слова, Grade 4 — заперечення"

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Питальне слово + дієслово + підмет? Заперечення: НЕ + дієслово, НІ, НІХТО."
  examples:
    - "Хто це? — Це мама."
    - "Де кішка? — Тут."
    - "Звідки ти? — Я з України."
    - "Куди ти йдеш? — В школу."

# ─────────────────────────────────────────────
# QUESTION WORDS — повна система
# ─────────────────────────────────────────────
question_words:
  - question: "ХТО?"
    description: "Питаємо про людину або тварину"
    examples:
      - "Хто це? — Це мама."
      - "Хто читає? — Олена читає."
  - question: "ЩО?"
    description: "Питаємо про річ або поняття"
    examples:
      - "Що це? — Це книга."
      - "Що ти читаєш? — Книгу."
  - question: "ДЕ?"
    description: "Питаємо про місце"
    examples:
      - "Де кішка? — Тут."
      - "Де ти живеш? — У Києві."
  - question: "ЗВІДКИ?"
    description: "Питаємо про походження"
    examples:
      - "Звідки ти? — Я з України."
      - "Звідки він їде? — З міста."
  - question: "КУДИ?"
    description: "Питаємо про напрямок"
    examples:
      - "Куди ти йдеш? — В школу."
      - "Куди вони їдуть? — Додому."
  - question: "КОЛИ?"
    description: "Питаємо про час"
    examples:
      - "Коли ти читаєш? — Вранці."
      - "Коли він приходить? — О п'ятій."
  - question: "ЯК?"
    description: "Питаємо про спосіб"
    examples:
      - "Як справи? — Добре."
      - "Як ти це робиш? — Повільно."
  - question: "СКІЛЬКИ?"
    description: "Питаємо про кількість"
    examples:
      - "Скільки книг? — Три."
      - "Скільки тобі років? — Двадцять."
  - question: "ЧОМУ?"
    description: "Питаємо про причину"
    examples:
      - "Чому ти не спиш? — Бо я читаю."
      - "Чому він не їсть? — Він не голодний."
  - question: "ЯКИЙ?/ЯКА?/ЯКЕ?"
    description: "Питаємо про опис"
    examples:
      - "Який кіт? — Чорний."
      - "Яка книга? — Нова."

# ─────────────────────────────────────────────
# VOCABULARY: question words + spatial adverbs + negation
# ─────────────────────────────────────────────
vocabulary:
  - category: "Питальні слова"
    items:
      - word: "хто"
        emoji: "\U0001F464"
        sentence: "Хто це? — Це Олена."
      - word: "що"
        emoji: "\U0001F4E6"
        sentence: "Що це? — Це книга."
      - word: "де"
        emoji: "\U0001F4CD"
        sentence: "Де ти? — Я тут."
      - word: "звідки"
        emoji: "\U0001F6EB"
        sentence: "Звідки ти? — Я з України."
      - word: "куди"
        emoji: "\u27A1\uFE0F"
        sentence: "Куди ти йдеш? — В школу."
      - word: "коли"
        emoji: "\U0001F552"
        sentence: "Коли ти читаєш? — Вранці."
      - word: "як"
        emoji: "\U0001F914"
        sentence: "Як справи? — Добре."
      - word: "скільки"
        emoji: "\U0001F522"
        sentence: "Скільки книг? — Три."
      - word: "чому"
        emoji: "\u2753"
        sentence: "Чому ти не спиш? — Бо я читаю."

  - category: "Прислівники місця (ДЕ?)"
    items:
      - word: "тут"
        emoji: "\U0001F4CC"
        sentence: "Книга тут."
      - word: "там"
        emoji: "\U0001F449"
        sentence: "Кішка там."
      - word: "далеко"
        emoji: "\U0001F30D"
        sentence: "Школа далеко."
      - word: "близько"
        emoji: "\U0001F3E0"
        sentence: "Магазин близько."
      - word: "праворуч"
        emoji: "\u27A1\uFE0F"
        sentence: "Школа праворуч."
      - word: "ліворуч"
        emoji: "\u2B05\uFE0F"
        sentence: "Парк ліворуч."
      - word: "прямо"
        emoji: "\u2B06\uFE0F"
        sentence: "Ідіть прямо."

  - category: "Прислівники місця (ЗВІДКИ?)"
    items:
      - word: "звідти"
        emoji: "\U0001F6EB"
        sentence: "Я звідти."
      - word: "з міста"
        emoji: "\U0001F3D9\uFE0F"
        sentence: "Він з міста."
      - word: "з дому"
        emoji: "\U0001F3E0"
        sentence: "Вона з дому."

  - category: "Прислівники місця (КУДИ?)"
    items:
      - word: "туди"
        emoji: "\u27A1\uFE0F"
        sentence: "Ми йдемо туди."
      - word: "в місто"
        emoji: "\U0001F3D9\uFE0F"
        sentence: "Я їду в місто."
      - word: "додому"
        emoji: "\U0001F3E0"
        sentence: "Він іде додому."

  - category: "Заперечення"
    items:
      - word: "не"
        emoji: "\u274C"
        sentence: "Я не знаю."
      - word: "ні"
        emoji: "\U0001F645"
        sentence: "Ні, не читаю."
      - word: "ніхто"
        emoji: "\U0001F6AB"
        sentence: "Тут ніхто не сидить."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: build_sentence
    title: "Склади запитання"
    instruction: "Обери питальне слово і склади запитання"
    sentences:
      - words: ["Де", "ти", "живеш", "?"]
        correct: "Де ти живеш?"
      - words: ["Коли", "ти", "читаєш", "?"]
        correct: "Коли ти читаєш?"
      - words: ["Звідки", "ви", "?"]
        correct: "Звідки ви?"
      - words: ["Куди", "він", "іде", "?"]
        correct: "Куди він іде?"
      - words: ["Як", "справи", "?"]
        correct: "Як справи?"
      - words: ["Скільки", "тобі", "років", "?"]
        correct: "Скільки тобі років?"

  - type: pattern_drill
    title: "Яке питальне слово?"
    prompt: "Запитай про виділене слово"
    items:
      - given: "Мама читає ВРАНЦІ."
        answer: "Коли читає мама?"
      - given: "Кіт спить НА СТІЛЬЦІ."
        answer: "Де спить кіт?"
      - given: "ОЛЕНА говорить."
        answer: "Хто говорить?"
      - given: "Він їде З КИЄВА."
        answer: "Звідки він їде?"
      - given: "Вона йде В ШКОЛУ."
        answer: "Куди вона йде?"
      - given: "Він не спить, БО ЧИТАЄ."
        answer: "Чому він не спить?"
      - given: "На столі ТРИ книги."
        answer: "Скільки книг на столі?"

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "«Де?» запитує про час."
        answer: false
        correction: "«Де?» запитує про місце."
      - statement: "«Коли?» запитує про час."
        answer: true
      - statement: "«Звідки?» запитує про напрямок."
        answer: false
        correction: "«Звідки?» запитує про походження. «Куди?» — про напрямок."
      - statement: "«Скільки?» запитує про кількість."
        answer: true
      - statement: "«Чому?» запитує про причину."
        answer: true
      - statement: "«Куди?» запитує про місце."
        answer: false
        correction: "«Куди?» запитує про напрямок (рух). «Де?» — про місце."

  - type: classify
    title: "Розподіли питальні слова"
    instruction: "За категорією"
    categories:
      - label: "Предмет (ХТО?/ЩО?)"
        items:
          - "хто"
          - "що"
      - label: "Місце (ДЕ?)"
        items:
          - "де"
      - label: "Походження (ЗВІДКИ?)"
        items:
          - "звідки"
      - label: "Напрямок (КУДИ?)"
        items:
          - "куди"
      - label: "Час (КОЛИ?)"
        items:
          - "коли"
      - label: "Спосіб (ЯК?)"
        items:
          - "як"
      - label: "Кількість (СКІЛЬКИ?)"
        items:
          - "скільки"
      - label: "Причина (ЧОМУ?)"
        items:
          - "чому"

  - type: proverb_drill
    title: "Прислів'я"
    proverb: "Вчення — світ, а невчення — тьма."
    activity:
      type: true_false
      items:
        - statement: "Навчання освітлює шлях."
          answer: true
        - statement: "Краще не вчитися."
          answer: false

  - type: reading
    title: "Читання — інтерв'ю"
    text: |
      — Хто ти?
      — Я Олена.
      — Звідки ти?
      — Я з Києва.
      — Де ти живеш зараз?
      — У Львові.
      — Куди ти їдеш завтра?
      — Додому, в Київ.
      — Коли ти їдеш?
      — Вранці.
      — Як справи?
      — Добре, дякую!
    questions:
      - question: "Звідки Олена?"
        answer: "З Києва."
      - question: "Де вона живе зараз?"
        answer: "У Львові."
      - question: "Куди вона їде завтра?"
        answer: "Додому, в Київ."
      - question: "Коли вона їде?"
        answer: "Вранці."
