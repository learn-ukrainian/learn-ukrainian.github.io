module: dozvillia
track: l2-uk-direct
level: a1
type: vocabulary
title: "Дозвілля"
subtitle: "Хобі, спорт, вільний час. Робочий день і вихідні."
standard_ref: "Каталог Б #6 — дозвілля: хобі, спорт, спортивні споруди; Каталог Б #5 — діяльність: робочий день, вихідний"
textbook_ref: "Grade 3 — hobbies and leisure"
teaching_notes: |
  Розрізняйте керування: «Я граю в + знахідний» (ігри: в футбол, в шахи) vs «Я граю на + місцевий» (інструменти: на гітарі, на піаніно).
  Конструкція «Мені подобається + інфінітив» — головний шаблон для вираження вподобань.
  Лексику хобі подавайте через опитування групи: «Хто любить малювання? Хто грає в футбол?»
  Спортивні споруди (стадіон, басейн, спортзал) поєднуйте з місцевим відмінком: у басейні, на стадіоні.
  Протиставте робочий день і вихідний — це природний контекст для часових конструкцій.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Мені подобається + інфінітив. Я граю в + знахідний. Я займаюся + орудний."
  examples:
    - "Мені подобається плавати."
    - "Я граю в футбол."
    - "Я займаюся спортом."

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Хобі"
    items:
      - word: "малювання"
        emoji: "🎨"
        sentence: "Мені подобається малювання."
      - word: "читання"
        emoji: "📚"
        sentence: "Читання — моє хобі."
      - word: "музика"
        emoji: "🎵"
        sentence: "Я люблю музику."
      - word: "танці"
        emoji: "💃"
        sentence: "Вона ходить на танці."
      - word: "фотографія"
        emoji: "📷"
        sentence: "Фотографія — цікаве хобі."
      - word: "готування"
        emoji: "🍳"
        sentence: "Мені подобається готування."
      - word: "шахи"
        emoji: "♟️"
        sentence: "Він грає в шахи."
      - word: "садівництво"
        emoji: "🌱"
        sentence: "Бабуся любить садівництво."

  - category: "Спорт"
    items:
      - word: "футбол"
        emoji: "⚽"
        sentence: "Я граю в футбол."
      - word: "баскетбол"
        emoji: "🏀"
        sentence: "Він грає в баскетбол."
      - word: "плавання"
        emoji: "🏊"
        sentence: "Плавання — корисний спорт."
      - word: "біг"
        emoji: "🏃"
        sentence: "Біг — це здоров'я."
      - word: "теніс"
        emoji: "🎾"
        sentence: "Вона грає в теніс."
      - word: "гімнастика"
        emoji: "🤸"
        sentence: "Гімнастика — красивий спорт."
      - word: "велоспорт"
        emoji: "🚴"
        sentence: "Він займається велоспортом."
      - word: "йога"
        emoji: "🧘"
        sentence: "Йога — для тіла і душі."

  - category: "Спортивні споруди"
    items:
      - word: "стадіон"
        emoji: "🏟️"
        sentence: "Матч на стадіоні."
      - word: "спортзал"
        emoji: "🏋️"
        sentence: "Я ходжу в спортзал."
      - word: "басейн"
        emoji: "🏊"
        sentence: "Плавання в басейні."
      - word: "парк"
        emoji: "🌳"
        sentence: "Біг у парку."
      - word: "спортивний майданчик"
        emoji: "🏐"
        sentence: "Діти грають на спортивному майданчику."

  - category: "Робота і вільний час"
    items:
      - word: "робочий день"
        emoji: "💼"
        sentence: "Робочий день починається о дев'ятій."
      - word: "вихідний"
        emoji: "🎉"
        sentence: "У вихідні я відпочиваю."
      - word: "обідня перерва"
        emoji: "🍽️"
        sentence: "Обідня перерва — з першої до другої."
      - word: "канікули"
        emoji: "🏖️"
        sentence: "Влітку канікули."
      - word: "відпустка"
        emoji: "✈️"
        sentence: "У відпустці я подорожую."

  - category: "Дії"
    items:
      - word: "займатися"
        emoji: "🎯"
        sentence: "Я займаюся спортом."
      - word: "тренуватися"
        emoji: "💪"
        sentence: "Він тренується щодня."
      - word: "грати в..."
        emoji: "🎮"
        sentence: "Я граю в футбол."
      - word: "кататися на..."
        emoji: "🚲"
        sentence: "Вона катається на велосипеді."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Спорт, хобі чи робота?"
    instruction: "Розподіли слова"
    categories:
      - label: "Спорт"
        items:
          - "футбол"
          - "плавання"
          - "теніс"
          - "біг"
          - "баскетбол"
          - "гімнастика"
          - "велоспорт"
      - label: "Хобі"
        items:
          - "малювання"
          - "читання"
          - "фотографія"
          - "готування"
          - "шахи"
          - "садівництво"
          - "танці"
      - label: "Робота/час"
        items:
          - "робочий день"
          - "вихідний"
          - "обідня перерва"
          - "канікули"
          - "відпустка"
          - "тренування"

  - type: build_sentence
    title: "У вільний час"
    sentences:
      - words: ["У", "вільний", "час", "я", "люблю", "читати", "."]
        correct: "У вільний час я люблю читати."
      - words: ["Мені", "подобається", "плавати", "."]
        correct: "Мені подобається плавати."
      - words: ["Він", "грає", "в", "футбол", "на", "стадіоні", "."]
        correct: "Він грає в футбол на стадіоні."
      - words: ["Вона", "катається", "на", "велосипеді", "в", "парку", "."]
        correct: "Вона катається на велосипеді в парку."
      - words: ["Ми", "тренуємося", "в", "спортзалі", "."]
        correct: "Ми тренуємося в спортзалі."
      - words: ["У", "вихідні", "я", "відпочиваю", "."]
        correct: "У вихідні я відпочиваю."
      - words: ["Я", "займаюся", "йогою", "щоранку", "."]
        correct: "Я займаюся йогою щоранку."
      - words: ["Діти", "грають", "на", "спортивному", "майданчику", "."]
        correct: "Діти грають на спортивному майданчику."

  - type: pattern_drill
    title: "Я граю в..."
    prompt: "Склади речення"
    items:
      - given: "футбол → я граю в..."
        answer: "Я граю в футбол."
      - given: "шахи → він грає в..."
        answer: "Він грає в шахи."
      - given: "теніс → вона грає в..."
        answer: "Вона грає в теніс."
      - given: "баскетбол → ми граємо в..."
        answer: "Ми граємо в баскетбол."

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "Басейн — це місце для футболу."
        answer: false
        correction: "Басейн — для плавання."
      - statement: "Стадіон — це спортивна споруда."
        answer: true
      - statement: "Канікули — це робочий час."
        answer: false
        correction: "Канікули — це час відпочинку."
      - statement: "Йога — це спорт для тіла і душі."
        answer: true

  - type: proverb_drill
    title: "Прислів'я"
    proverb: "Хто працює — не бідує."
    activity:
      type: true_false
      items:
        - statement: "Працювати не потрібно."
          answer: false
        - statement: "Той, хто працює, живе добре."
          answer: true

  - type: reading
    title: "Читання: Два вихідні"
    text: |
      Олена і Назар проводять вихідні по-різному. Олена любить спорт. Вона ходить у басейн і бігає в парку. Ввечері вона грає в теніс. Назар любить спокійний відпочинок. Він читає книги, слухає музику і готує вечерю. Іноді він грає в шахи з другом.
    questions:
      - question: "Хто займається спортом?"
        answer: "Олена."
      - question: "Що робить Олена?"
        answer: "Ходить у басейн, бігає в парку, грає в теніс."
      - question: "Що робить Назар?"
        answer: "Читає книги, слухає музику, готує вечерю, грає в шахи."

  - type: pattern_drill
    title: "Робочий розклад"
    prompt: "Відповідай на запитання"
    items:
      - given: "Коли починається робочий день?"
        answer: "О дев'ятій годині."
      - given: "Коли обідня перерва?"
        answer: "З першої до другої."
      - given: "Коли закінчується робочий день?"
        answer: "О п'ятій годині."
      - given: "Коли вихідні?"
        answer: "У суботу і неділю."
