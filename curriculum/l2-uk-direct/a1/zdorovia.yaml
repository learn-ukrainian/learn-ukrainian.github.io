      - word: "рецепт"
        emoji: "📋"
        sentence: "Лікар написав рецепт."

# ─────────────────────────────────────────────
# FIXED PHRASES
# ─────────────────────────────────────────────
fixed_phrases:
  - "У мене болить голова."
  - "У мене болять зуби."
  - "Я хворію."
  - "Вам треба взяти ліки."
  - "Викличте лікаря!"
  - "Мені потрібна швидка допомога!"

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Частини тіла"
    instruction: "Розподіли за частинами тіла"
    categories:
      - label: "Голова"
        items:
          - "очі"
          - "вуха"
          - "ніс"
          - "рот"
          - "зуби"
      - label: "Тулуб"
        items:
          - "спина"
          - "живіт"
          - "серце"
          - "горло"
      - label: "Руки"
        items:
          - "рука"
          - "плечі"
      - label: "Ноги"
        items:
          - "нога"

  - type: build_sentence
    title: "У мене болить..."
    sentences:
      - words: ["У", "мене", "болить", "голова", "."]
        correct: "У мене болить голова."
      - words: ["У", "мене", "болять", "зуби", "."]
        correct: "У мене болять зуби."
      - words: ["У", "нього", "болить", "горло", "."]
        correct: "У нього болить горло."
      - words: ["У", "неї", "болить", "живіт", "."]
        correct: "У неї болить живіт."
      - words: ["У", "мене", "болять", "очі", "."]
        correct: "У мене болять очі."
      - words: ["У", "нього", "болить", "спина", "."]
        correct: "У нього болить спина."
      - words: ["У", "неї", "болять", "вуха", "."]
        correct: "У неї болять вуха."
      - words: ["У", "мене", "болить", "нога", "."]
        correct: "У мене болить нога."
      - words: ["У", "мене", "болить", "рука", "."]
        correct: "У мене болить рука."
      - words: ["У", "мене", "болить", "шия", "."]
        correct: "У мене болить шия."

  - type: pattern_drill
    title: "Болить чи болять?"
    prompt: "Обери правильну форму"
    items:
      - given: "голова → бол..."
        answer: "болить"
      - given: "очі → бол..."
        answer: "болять"
      - given: "зуби → бол..."
        answer: "болять"
      - given: "живіт → бол..."
        answer: "болить"
      - given: "вуха → бол..."
        answer: "болять"
      - given: "горло → бол..."
        answer: "болить"
      - given: "ноги → бол..."
        answer: "болять"
      - given: "спина → бол..."
        answer: "болить"

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "У мене болить очі."
        answer: false
        correction: "Очі — множина. Правильно: болять очі."
      - statement: "Ліки купують в аптеці."
        answer: true
      - statement: "Лікар пише рецепт."
        answer: true
      - statement: "У мене болять голова."
        answer: false
        correction: "Голова — однина. Правильно: болить голова."

  - type: reading
    title: "Читання: У лікаря"
    text: |
      — Добрий день! Що у вас болить?
      — Добрий день, лікарю. У мене болить горло і голова.
      — Яка у вас температура?
      — Тридцять вісім.
      — Ви кашляєте?
      — Так, я кашляю.
      — Вам треба взяти ці ліки. Пийте чай з лимоном і відпочивайте.
    questions:
      - question: "Що болить у пацієнта?"
        answer: "Горло і голова."
      - question: "Яка температура?"
        answer: "Тридцять вісім."
      - question: "Що порадив лікар?"
        answer: "Взяти ліки, пити чай з лимоном і відпочивати."

  - type: riddle
    title: "Загадка"
    clues:
      - "Я є у кожної людини."
      - "Без мене ти не можеш бачити."
      - "У тебе є два — один зліва, один справа."
    answer: "ОКО"
    answer_emoji: "👁️"
    source: "народна загадка"
