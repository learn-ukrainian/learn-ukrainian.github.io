module: zdorovia
track: l2-uk-direct
level: a1
type: vocabulary
title: "Здоров'я"
subtitle: "Тіло і здоров'я. У мене болить..."
standard_ref: "Каталог Б #10 — здоров'я: частини тіла, самопочуття, хвороби, аптека"
textbook_ref: "Grade 3–4 — body parts and health"
teaching_notes: |
  Ключова конструкція: «У мене болить + однина» vs «У мене болять + множина».
  Обов'язково відпрацюйте пари: болить голова / болять зуби, болить горло / болять очі.
  Фрази самопочуття: «Мені погано», «Мені добре», «Мені холодно» — давальний + прислівник.
  Лексика візиту до лікаря: лікар, рецепт, ліки, аптека — через діалог «У лікаря».
  Частини тіла вчіть через TPR (покажи руку, торкни ніс) — рухова пам'ять допомагає.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "У мене болить + однина. У мене болять + множина."
  examples:
    - "У мене болить голова."
    - "У мене болять зуби."
    - "Я хворію."

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Частини тіла"
    items:
      - word: "голова"
        emoji: "🧠"
        sentence: "У мене болить голова."
      - word: "очі"
        emoji: "👀"
        sentence: "Очі — це парний орган."
      - word: "вуха"
        emoji: "👂"
        sentence: "Я чую вухами."
      - word: "ніс"
        emoji: "👃"
        sentence: "Ніс — для дихання."
      - word: "рот"
        emoji: "👄"
        sentence: "Рот відкритий."
      - word: "зуби"
        emoji: "🦷"
        sentence: "У мене болять зуби."
      - word: "шия"
        emoji: "🦒"
        sentence: "Шия болить."
      - word: "плечі"
        emoji: "💪"
        sentence: "Плечі широкі."
      - word: "рука"
        emoji: "✋"
        sentence: "Ліва рука."
      - word: "нога"
        emoji: "🦵"
        sentence: "Права нога."
      - word: "спина"
        emoji: "🔙"
        sentence: "Спина болить."
      - word: "живіт"
        emoji: "🫃"
        sentence: "У мене болить живіт."
      - word: "серце"
        emoji: "❤️"
        sentence: "Серце б'ється."
      - word: "горло"
        emoji: "🗣️"
        sentence: "Горло червоне."

  - category: "Здоров'я і хвороби"
    items:
      - word: "боліти"
        emoji: "🤕"
        sentence: "Голова болить."
      - word: "хворіти"
        emoji: "🤒"
        sentence: "Я хворію."
      - word: "кашляти"
        emoji: "😷"
        sentence: "Він кашляє."
      - word: "чхати"
        emoji: "🤧"
        sentence: "Вона чхає."
      - word: "температура"
        emoji: "🌡️"
        sentence: "У мене висока температура."
      - word: "ліки"
        emoji: "💊"
        sentence: "Візьміть ліки."
      - word: "таблетки"
        emoji: "💊"
        sentence: "Ці таблетки від головного болю."
      - word: "лікар"
        emoji: "👨‍⚕️"
        sentence: "Лікар оглядає пацієнта."
      - word: "аптека"
