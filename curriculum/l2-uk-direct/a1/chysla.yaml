module: chysla
track: l2-uk-direct
level: a1
type: vocabulary
title: "Числа"
subtitle: "Рахуємо від 1 до 100. Скільки?"
standard_ref: "§4.2.1.3 — кількісні числівники"
textbook_ref: "Grade 3 — числівники, Grade 4 — числівники у реченнях"

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Один/одна + однина. Два/дві, три, чотири + множина. П'ять–двадцять + родовий множини."
  examples:
    - "Один кіт. Одна книга."
    - "Два коти. Три книги."
    - "П'ять котів. Десять книг."
    - "Мені двадцять років."

# ─────────────────────────────────────────────
# VOCABULARY: numbers 1–100
# ─────────────────────────────────────────────
vocabulary:
  - category: "Одиниці (1–9)"
    items:
      - word: "один / одна / одне"
        emoji: "1\uFE0F\u20E3"
        sentence: "Один стіл. Одна книга. Одне вікно."
      - word: "два / дві"
        emoji: "2\uFE0F\u20E3"
        sentence: "Два коти. Дві книги."
      - word: "три"
        emoji: "3\uFE0F\u20E3"
        sentence: "Три столи."
      - word: "чотири"
        emoji: "4\uFE0F\u20E3"
        sentence: "Чотири вікна."
      - word: "п'ять"
        emoji: "5\uFE0F\u20E3"
        sentence: "П'ять книг."
      - word: "шість"
        emoji: "6\uFE0F\u20E3"
        sentence: "Шість олівців."
      - word: "сім"
        emoji: "7\uFE0F\u20E3"
        sentence: "Сім днів у тижні."
      - word: "вісім"
        emoji: "8\uFE0F\u20E3"
        sentence: "Вісім годин."
      - word: "дев'ять"
        emoji: "9\uFE0F\u20E3"
        sentence: "Дев'ять котів."

  - category: "Десятки (10–20)"
    items:
      - word: "десять"
        emoji: "\U0001F51F"
        sentence: "Десять пальців на руках."
      - word: "одинадцять"
        emoji: "\U0001F522"
        sentence: "Одинадцять гравців у команді."
      - word: "дванадцять"
        emoji: "\U0001F522"
        sentence: "Дванадцять місяців у році."
      - word: "тринадцять"
        emoji: "\U0001F522"
        sentence: "Тринадцять учнів у класі."
      - word: "чотирнадцять"
        emoji: "\U0001F522"
        sentence: "Чотирнадцять днів — два тижні."
      - word: "п'ятнадцять"
        emoji: "\U0001F522"
        sentence: "П'ятнадцять хвилин."
      - word: "шістнадцять"
        emoji: "\U0001F522"
        sentence: "Шістнадцять учнів у класі."
      - word: "сімнадцять"
        emoji: "\U0001F522"
        sentence: "Сімнадцять кілометрів."
      - word: "вісімнадцять"
        emoji: "\U0001F522"
        sentence: "Мені вісімнадцять років."
      - word: "дев'ятнадцять"
        emoji: "\U0001F522"
        sentence: "Дев'ятнадцять градусів."
      - word: "двадцять"
        emoji: "\U0001F522"
        sentence: "Мені двадцять років."

  - category: "Круглі десятки (30–100)"
    items:
      - word: "тридцять"
        emoji: "\U0001F522"
        sentence: "Тридцять днів у місяці."
      - word: "сорок"
        emoji: "\U0001F522"
        sentence: "Сорок хвилин — один урок."
      - word: "п'ятдесят"
        emoji: "\U0001F522"
        sentence: "П'ятдесят сторінок."
      - word: "шістдесят"
        emoji: "\U0001F522"
        sentence: "Шістдесят секунд — одна хвилина."
      - word: "сімдесят"
        emoji: "\U0001F522"
        sentence: "Сімдесят кілометрів."
      - word: "вісімдесят"
        emoji: "\U0001F522"
        sentence: "Вісімдесят учнів у школі."
      - word: "дев'яносто"
        emoji: "\U0001F522"
        sentence: "Дев'яносто відсотків."
      - word: "сто"
        emoji: "\U0001F4AF"
        sentence: "Сто років — це століття."

  - category: "Фіксовані фрази"
    items:
      - word: "Скільки?"
        emoji: "\u2753"
        sentence: "Скільки книг? — Три книги."
      - word: "Мені ... років."
        emoji: "\U0001F382"
        sentence: "Мені двадцять років."
      - word: "Зараз ... година."
        emoji: "\U0001F552"
        sentence: "Зараз дев'ята година."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Розподіли числа"
    instruction: "Одиниці, десятки, круглі десятки"
    categories:
      - label: "Одиниці (1–9)"
        items:
          - "один"
          - "три"
          - "п'ять"
          - "сім"
          - "дев'ять"
      - label: "Десятки (10–19)"
        items:
          - "десять"
          - "одинадцять"
          - "тринадцять"
          - "п'ятнадцять"
      - label: "Круглі десятки (20–100)"
        items:
          - "двадцять"
          - "сорок"
          - "п'ятдесят"
          - "сто"

  - type: pattern_drill
    title: "Рахуємо"
    prompt: "Продовж послідовність"
    items:
      - given: "один, два, три, ..."
        answer: "чотири"
      - given: "п'ять, шість, сім, ..."
        answer: "вісім"
      - given: "десять, дев'ять, вісім, ..."
        answer: "сім"
      - given: "двадцять, тридцять, сорок, ..."
        answer: "п'ятдесят"
      - given: "сімдесят, вісімдесят, дев'яносто, ..."
        answer: "сто"

  - type: pattern_drill
    title: "Скільки?"
    prompt: "Назви кількість"
    items:
      - given: "\U0001F431\U0001F431\U0001F431 — Скільки котів?"
        answer: "Три коти."
      - given: "\U0001F4D5\U0001F4D5\U0001F4D5\U0001F4D5\U0001F4D5 — Скільки книг?"
        answer: "П'ять книг."
      - given: "\U0001F34E\U0001F34E — Скільки яблук?"
        answer: "Два яблука."
      - given: "\U0001F4F1 — Скільки телефонів?"
        answer: "Один телефон."
      - given: "\u270F\uFE0F\u270F\uFE0F\u270F\uFE0F\u270F\uFE0F — Скільки олівців?"
        answer: "Чотири олівці."

  - type: build_sentence
    title: "Склади речення з числами"
    sentences:
      - words: ["У", "класі", "двадцять", "учнів", "."]
        correct: "У класі двадцять учнів."
      - words: ["Мені", "двадцять", "п'ять", "років", "."]
        correct: "Мені двадцять п'ять років."
      - words: ["Тут", "є", "три", "кішки", "."]
        correct: "Тут є три кішки."
      - words: ["Зараз", "дев'ята", "година", "."]
        correct: "Зараз дев'ята година."

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "Два + один = чотири."
        answer: false
        correction: "Два + один = три."
      - statement: "Десять + десять = двадцять."
        answer: true
      - statement: "Сім днів у тижні."
        answer: true
      - statement: "Дванадцять місяців у році."
        answer: true
      - statement: "Сорок + двадцять = п'ятдесят."
        answer: false
        correction: "Сорок + двадцять = шістдесят."

  - type: riddle
    title: "Загадка"
    clues:
      - "Я не великий і не малий."
      - "Я між сімома і дев'ятьма."
    answer: "ВІСІМ"
    answer_emoji: "8\uFE0F\u20E3"
