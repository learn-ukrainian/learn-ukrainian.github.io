module: mene-tobi
track: l2-uk-direct
level: a1
type: grammar
title: "Мене, тебе, нас, вам..."
subtitle: "Відмінювання особових займенників — знахідний і давальний"
standard_ref: "§4.2.1.4 — personal pronoun declension: я→мене/мені, ти→тебе/тобі, ми→нас/нам, ви→вас/вам"
textbook_ref: "Grade 4 — pronoun declension"
teaching_notes: |
  Основні форми для активного вживання: мене/тебе (КОГО?), мені/тобі (КОМУ?), нас/вас, нам/вам.
  Форми його/її/їх — спочатку лише на розпізнавання, активне вживання пізніше.
  Прийменникові форми: у мене є..., для тебе, до нас — дуже частотні в мовленні.
  Зв'язок із попереднім: тепер зрозуміло, чому «мені подобається», а не «я подобається».
  Після прийменників він/вона/вони отримують н-: у нього, у неї, у них.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Особові займенники змінюються за відмінками: КОГО? (знахідний) і КОМУ? (давальний)"
  examples:
    - "Він бачить мене. (я → мене)"
    - "Я чекаю тебе. (ти → тебе)"
    - "Дайте мені воду. (я → мені)"
    - "Я скажу тобі. (ти → тобі)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Особові займенники: називний, знахідний, давальний"
    columns: ["Називний (ХТО?)", "Знахідний (КОГО?)", "Давальний (КОМУ?)"]
    rows:
      - ["я", "мене", "мені"]
      - ["ти", "тебе", "тобі"]
      - ["він", "його (нього)", "йому"]
      - ["вона", "її (неї)", "їй"]
      - ["ми", "нас", "нам"]
      - ["ви", "вас", "вам"]
      - ["вони", "їх (них)", "їм"]

# ─────────────────────────────────────────────
# USAGE NOTE
# ─────────────────────────────────────────────
teaching_note:
  text: "Форми мене/мені, тебе/тобі, нас/нам, вас/вам — активне вживання. Його/її/їх — розпізнавання."
  connection: "Тепер зрозуміло, чому «мені подобається» (модуль 14), а не «я подобається»."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Знахідний: КОГО?"
    prompt: "Постав займенник у знахідний відмінок"
    items:
      - given: "я → (він бачить...)"
        answer: "мене"
      - given: "ти → (я чекаю...)"
        answer: "тебе"
      - given: "він → (вона знає...)"
        answer: "його"
      - given: "вона → (я бачу...)"
        answer: "її"
      - given: "ми → (вони знають...)"
        answer: "нас"
      - given: "ви → (я чекаю...)"
        answer: "вас"
      - given: "вони → (він бачить...)"
        answer: "їх"

  - type: pattern_drill
    title: "Давальний: КОМУ?"
    prompt: "Постав займенник у давальний відмінок"
    items:
      - given: "я → (дайте...)"
        answer: "мені"
      - given: "ти → (я скажу...)"
        answer: "тобі"
      - given: "він → (вона дає...)"
        answer: "йому"
      - given: "вона → (я кажу...)"
        answer: "їй"
      - given: "ми → (це подобається...)"
        answer: "нам"
      - given: "ви → (я допоможу...)"
        answer: "вам"
      - given: "вони → (ми скажемо...)"
        answer: "їм"

  - type: build_sentence
    title: "Заміни іменник на займенник"
    instruction: "Заміни підкреслене слово займенником"
    sentences:
      - words: ["Він", "бачить", "[маму/її]", "."]
        correct: "Він бачить її."
      - words: ["Я", "люблю", "[тата/його]", "."]
        correct: "Я люблю його."
      - words: ["Вона", "чекає", "[друзів/їх]", "."]
        correct: "Вона чекає їх."
      - words: ["Дайте", "[Олі/їй]", "воду", "."]
        correct: "Дайте їй воду."

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "Він бачить я."
        answer: false
        correction: "Він бачить мене."
      - statement: "Дайте мені воду."
        answer: true
      - statement: "Я чекаю тебе."
        answer: true
      - statement: "Це подобається ми."
        answer: false
        correction: "Це подобається нам."
      - statement: "Вона знає нас."
        answer: true
      - statement: "Я скажу ти."
        answer: false
        correction: "Я скажу тобі."

  - type: classify
    title: "ХТО? / КОГО? / КОМУ?"
    instruction: "Розподіли форми займенників за відмінками"
    categories:
      - label: "ХТО? (називний)"
        items:
          - "я"
          - "ти"
          - "він"
          - "ми"
          - "вони"
      - label: "КОГО? (знахідний)"
        items:
          - "мене"
          - "тебе"
          - "його"
          - "нас"
          - "їх"
      - label: "КОМУ? (давальний)"
        items:
          - "мені"
          - "тобі"
          - "йому"
          - "нам"
          - "їм"

  - type: riddle
    title: "Загадка"
    clues:
      - "Густий ліс, чисте поле,"
      - "Два дзеркальця, кривий жолоб,"
      - "Два самограйки."
    answer: "ОБЛИЧЧЯ"
    answer_emoji: "😊"
    source: "Grade 3 p.141"

  - type: reading
    title: "Читання: Моя родина"
    text: |
      Мама любить мене. Я люблю її. Тато дає нам подарунки. Ми дякуємо йому. Бабуся завжди чекає нас. Я кажу їй: «Дякую!» Вона посміхається мені.
    questions:
      - question: "Кого любить мама?"
        answer: "Мене."
      - question: "Кому вони дякують?"
        answer: "Татові (йому)."
      - question: "Хто завжди чекає їх?"
        answer: "Бабуся."
