module: lystuvannia
track: l2-uk-direct
level: a1
type: writing
title: "Листування"
subtitle: "Самоопис, листівки, SMS, анкети, конверт."
standard_ref: "§1.3 — письмо: ім'я, адреса, національність, листівки, SMS, анкети, самоопис, опис інших, адреса на конверті"
textbook_ref: "Grade 3–4 — writing practice"

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Пишемо: про себе, про інших, листівки, SMS, анкети, адресу на конверті."
  examples:
    - "Мене звати Олена. Я з України. Мені 25 років."
    - "Привіт з Києва! Бажаю щастя!"
    - "Кому: Іваненко О. П., Куди: м. Київ, вул. Хрещатик, 15, кв. 3"

# ─────────────────────────────────────────────
# WRITING TASKS
# ─────────────────────────────────────────────
writing_tasks:
  - task: "Самоопис"
    description: "5 речень про себе: ім'я, національність, країна, вік, професія, хобі"
    example: |
      Мене звати Олена. Я українка. Я з Києва. Мені двадцять п'ять років. Я студентка. Мені подобається читати.

  - task: "Опис друга/родича"
    description: "Короткі фрази: це мій друг, його звати, він..., він високий..."
    example: |
      Це мій друг. Його звати Назар. Він студент. Він високий і темноволосий. Він любить футбол.

  - task: "Опис кімнати/погоди"
    description: "Кімната велика. Стіл новий. Сьогодні холодна погода."
    example: |
      Моя кімната велика. Стіл новий. На столі лежать книги. За вікном холодна погода.

  - task: "Листівка/SMS"
    description: "Привітання + 2 речення + прощання"
    example: |
      Привіт з Києва! Тут дуже гарно. Бажаю тобі щастя! Твоя Олена.

  - task: "Анкета"
    description: "Ім'я, прізвище, країна, дата народження, адреса, телефон"
    fields:
      - "Ім'я"
      - "Прізвище"
      - "Країна"
      - "Дата народження"
      - "Адреса"
      - "Телефон"

  - task: "Конверт"
    description: "Адресат: Кому, Куди"
    example: |
      Кому: Іваненко О. П.
      Куди: м. Київ, вул. Хрещатик, 15, кв. 3

# ─────────────────────────────────────────────
# ADDRESS VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Адреса"
    items:
      - word: "місто (м.)"
        emoji: "🏙️"
        sentence: "м. Київ"
      - word: "вулиця (вул.)"
        emoji: "🛣️"
        sentence: "вул. Хрещатик"
      - word: "будинок (буд.)"
        emoji: "🏠"
        sentence: "буд. 15"
      - word: "корпус (корп.)"
        emoji: "🏢"
        sentence: "корп. 2"
      - word: "квартира (кв.)"
        emoji: "🚪"
        sentence: "кв. 3"
      - word: "індекс"
        emoji: "📮"
        sentence: "Індекс: 01001"

  - category: "Листування"
    items:
      - word: "привіт"
        emoji: "👋"
        sentence: "Привіт, Олю!"
      - word: "бажаю"
        emoji: "🌟"
        sentence: "Бажаю щастя!"
      - word: "вітаю"
        emoji: "🎉"
        sentence: "Вітаю зі святом!"
      - word: "з повагою"
        emoji: "🤝"
        sentence: "З повагою, Олена."
      - word: "до побачення"
        emoji: "👋"
        sentence: "До побачення!"

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: build_sentence
    title: "Напиши про себе"
    instruction: "Склади 5 речень із запропонованих слів"
    sentences:
      - words: ["Мене", "звати", "Олена", "."]
        correct: "Мене звати Олена."
      - words: ["Я", "з", "України", "."]
        correct: "Я з України."
      - words: ["Мені", "двадцять", "п'ять", "років", "."]
        correct: "Мені двадцять п'ять років."
      - words: ["Я", "студентка", "."]
        correct: "Я студентка."
      - words: ["Мені", "подобається", "читати", "."]
        correct: "Мені подобається читати."

  - type: build_sentence
    title: "Напиши листівку"
    instruction: "Обери правильне привітання + 2 речення + прощання"
    sentences:
      - words: ["Привіт", "з", "Києва", "!"]
        correct: "Привіт з Києва!"
      - words: ["Тут", "дуже", "гарно", "."]
        correct: "Тут дуже гарно."
      - words: ["Бажаю", "тобі", "щастя", "!"]
        correct: "Бажаю тобі щастя!"
      - words: ["Вітаю", "зі", "святом", "!"]
        correct: "Вітаю зі святом!"

  - type: pattern_drill
    title: "Заповни анкету"
    prompt: "Постав інформацію в правильне поле"
    items:
      - given: "Олена Іваненко, 25 років, Київ, вул. Шевченка 10 → Ім'я?"
        answer: "Олена"
      - given: "→ Прізвище?"
        answer: "Іваненко"
      - given: "→ Вік / Дата народження?"
        answer: "25 років"
      - given: "→ Адреса?"
        answer: "м. Київ, вул. Шевченка, 10"

  - type: build_sentence
    title: "Опис за фотографією"
    instruction: "Склади 3 речення про людину"
    sentences:
      - words: ["Це", "мій", "друг", "Назар", "."]
        correct: "Це мій друг Назар."
      - words: ["Він", "високий", "і", "темноволосий", "."]
        correct: "Він високий і темноволосий."
      - words: ["Він", "студент", ".", "Він", "любить", "футбол", "."]
        correct: "Він студент. Він любить футбол."

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "На конверті пишуть ім'я, місто, вулицю, номер."
        answer: true
      - statement: "В анкеті не потрібно писати прізвище."
        answer: false
        correction: "Прізвище — обов'язкове поле в анкеті."
      - statement: "«м.» — це скорочення від «місто»."
        answer: true
      - statement: "«кв.» — це скорочення від «квартира»."
        answer: true

  - type: reading
    title: "Читання: SMS-розмова"
    text: |
      Олена: Привіт! Як справи? 😊
      Назар: Привіт! Добре, дякую. А у тебе?
      Олена: Теж добре. Хочеш зустрітися?
      Назар: Так! Коли?
      Олена: Завтра о третій. У кафе біля парку.
      Назар: Добре! До зустрічі! 👋
    questions:
      - question: "Де вони зустрінуться?"
        answer: "У кафе біля парку."
      - question: "О котрій?"
        answer: "О третій."
