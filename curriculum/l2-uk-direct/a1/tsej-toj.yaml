module: tsej-toj
track: l2-uk-direct
level: a1
type: grammar
title: "Цей, ця, це / Той, та, те"
subtitle: "Вказівні займенники — близько і далеко"
standard_ref: "§4.2.2 — demonstrative pronouns: цей/ця/це, той/та/те, ці/ті"
textbook_ref: "Grade 3–4 — demonstrative pronouns"

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "ЦЕЙ/ЦЯ/ЦЕ/ЦІ — близько. ТОЙ/ТА/ТЕ/ТІ — далеко. Узгодження з родом і числом."
  examples:
    - "Цей стіл великий. (чоловічий рід)"
    - "Ця книга нова. (жіночий рід)"
    - "Це вікно відчинене. (середній рід)"
    - "Ті люди працюють. (множина)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Вказівні займенники"
    columns: ["", "Чоловічий", "Жіночий", "Середній", "Множина"]
    rows:
      - ["Близько", "цей", "ця", "це", "ці"]
      - ["Далеко", "той", "та", "те", "ті"]

# ─────────────────────────────────────────────
# USAGE EXAMPLES
# ─────────────────────────────────────────────
usage_examples:
  - "Цей стіл великий. (чоловічий, близько)"
  - "Ця книга нова. (жіночий, близько)"
  - "Це вікно відчинене. (середній, близько)"
  - "Ці люди працюють. (множина, близько)"
  - "Той будинок старий. (чоловічий, далеко)"
  - "Та жінка — лікар. (жіночий, далеко)"
  - "Те дерево високе. (середній, далеко)"
  - "Ті книги на полиці. (множина, далеко)"

# ─────────────────────────────────────────────
# CONNECTION
# ─────────────────────────────────────────────
teaching_note:
  text: "Повторення присвійних (модуль 26): мій/моя/моє/мої, твій/твоя/твоє/твої, наш/наша/наше/наші — множина тепер активно практикується."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Узгодження роду: ЦЕЙ/ЦЯ/ЦЕ?"
    prompt: "Обери правильний вказівний займенник"
    items:
      - given: "стіл (цей/ця/це?)"
        answer: "цей стіл"
      - given: "книга (цей/ця/це?)"
        answer: "ця книга"
      - given: "вікно (цей/ця/це?)"
        answer: "це вікно"
      - given: "кіт (цей/ця/це?)"
        answer: "цей кіт"
      - given: "школа (цей/ця/це?)"
        answer: "ця школа"
      - given: "місто (цей/ця/це?)"
        answer: "це місто"
      - given: "друг (цей/ця/це?)"
        answer: "цей друг"
      - given: "квітка (цей/ця/це?)"
        answer: "ця квітка"
      - given: "яблуко (цей/ця/це?)"
        answer: "це яблуко"
      - given: "телефон (цей/ця/це?)"
        answer: "цей телефон"
      - given: "лампа (цей/ця/це?)"
        answer: "ця лампа"
      - given: "дерево (цей/ця/це?)"
        answer: "це дерево"
      - given: "олівець (цей/ця/це?)"
        answer: "цей олівець"
      - given: "сумка (цей/ця/це?)"
        answer: "ця сумка"
      - given: "ліжко (цей/ця/це?)"
        answer: "це ліжко"

  - type: classify
    title: "Однина чи множина?"
    instruction: "Розподіли словосполучення: однина (цей/ця/це) чи множина (ці)"
    categories:
      - label: "Однина (цей/ця/це)"
        items:
          - "цей стіл"
          - "ця книга"
          - "це вікно"
          - "цей кіт"
          - "ця квітка"
          - "це яблуко"
          - "цей олівець"
          - "ця школа"
          - "це місто"
          - "цей друг"
      - label: "Множина (ці)"
        items:
          - "ці столи"
          - "ці книги"
          - "ці вікна"
          - "ці коти"
          - "ці квітки"
          - "ці яблука"
          - "ці олівці"
          - "ці школи"
          - "ці міста"
          - "ці друзі"

  - type: build_sentence
    title: "Потрійне узгодження"
    instruction: "Склади правильне словосполучення: займенник + іменник + прикметник"
    sentences:
      - words: ["[цей/ця/це]", "книга", "нова"]
        correct: "Ця книга нова."
      - words: ["[цей/ця/це]", "стіл", "великий"]
        correct: "Цей стіл великий."
      - words: ["[цей/ця/це]", "вікно", "відчинене"]
        correct: "Це вікно відчинене."
      - words: ["[ці/ті]", "книги", "старі"]
        correct: "Ці книги старі."
      - words: ["[той/та/те]", "будинок", "новий"]
        correct: "Той будинок новий."
      - words: ["[той/та/те]", "дівчина", "висока"]
        correct: "Та дівчина висока."

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "Це книга нова."
        answer: false
        correction: "Ця книга нова. (жіночий рід — ця, не це)"
      - statement: "Цей стіл великий."
        answer: true
      - statement: "Ці діти граються."
        answer: true
      - statement: "Цей вікно відчинене."
        answer: false
        correction: "Це вікно відчинене. (середній рід — це, не цей)"
      - statement: "Той будинок старий."
        answer: true
      - statement: "Ті книга на полиці."
        answer: false
        correction: "Та книга на полиці. (однина — та, не ті)"

  - type: pattern_drill
    title: "Близько і далеко"
    prompt: "Утвори форму: близько (цей/ця/це) і далеко (той/та/те)"
    items:
      - given: "стіл (близько)"
        answer: "цей стіл"
      - given: "стіл (далеко)"
        answer: "той стіл"
      - given: "книга (близько)"
        answer: "ця книга"
      - given: "книга (далеко)"
        answer: "та книга"
      - given: "вікно (близько)"
        answer: "це вікно"
      - given: "вікно (далеко)"
        answer: "те вікно"
      - given: "діти (близько)"
        answer: "ці діти"
      - given: "діти (далеко)"
        answer: "ті діти"

  - type: proverb_drill
    title: "Прислів'я"
    proverb: "Кожному мила своя сторона."
    activity:
      type: fill_gap
      gap_word: "своя"
      options: ["своя", "моя", "ця", "та"]
      answer: "своя"
      meaning: "Кожна людина любить свою батьківщину."

  - type: reading
    title: "Читання: У кімнаті"
    text: |
      У цій кімнаті стоїть великий стіл. Цей стіл новий. На тому столі лежать книги. Ці книги старі, а ті — нові. Ця лампа яскрава. Те вікно відчинене. Ці квіти на підвіконні гарні.
    questions:
      - question: "Який цей стіл?"
        answer: "Новий."
      - question: "Які ці книги?"
        answer: "Старі."
      - question: "Що відчинене?"
        answer: "Те вікно."
