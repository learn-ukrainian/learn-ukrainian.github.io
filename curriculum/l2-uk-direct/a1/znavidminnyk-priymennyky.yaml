module: znavidminnyk-priymennyky
track: l2-uk-direct
level: a1
type: grammar
title: "Знахідний з прийменниками"
subtitle: "Напрямок, час, тема — в/у, на, за, через, про"
standard_ref: "§4.2.3.2.2 — accusative with prepositions: в/у, на (direction); у(в) (days); про (thinking/dreaming)"
textbook_ref: "Grade 4 — accusative with prepositions; Grade 6 §46"

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "КУДИ? → в/у, на + знахідний відмінок (напрямок). КОЛИ? → у + день тижня. ПРО ЩО? → про + знахідний."
  examples:
    - "Я іду в школу. (КУДИ?)"
    - "У понеділок я працюю. (КОЛИ?)"
    - "Я думаю про відпочинок. (ПРО ЩО?)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Прийменники зі знахідним відмінком"
    columns: ["Прийменник", "Значення", "Приклад"]
    rows:
      - ["в / у + знах.", "напрямок (КУДИ?)", "Я іду в школу. Степан заходить у кімнату."]
      - ["на + знах.", "напрямок (на поверхню / подію)", "Я кладу книжку на стіл. Іду на зупинку."]
      - ["у (в) + знах.", "день тижня (КОЛИ?)", "У понеділок я працюю. В середу буде сонце."]
      - ["про + знах.", "тема (ПРО ЩО?)", "Думати про відпочинок. Мріяти про вечірку."]
      - ["за + знах.", "подяка / час", "Дякую за допомогу. За годину я прийду."]
      - ["через + знах.", "причина / через щось", "Через дощ ми не гуляємо. Іти через парк."]

  - title: "Дні тижня"
    columns: ["День", "КОЛИ?"]
    rows:
      - ["понеділок", "у понеділок"]
      - ["вівторок", "у вівторок"]
      - ["середа", "у середу"]
      - ["четвер", "у четвер"]
      - ["п'ятниця", "у п'ятницю"]
      - ["субота", "у суботу"]
      - ["неділя", "у неділю"]

# ─────────────────────────────────────────────
# KEY CONTRAST
# ─────────────────────────────────────────────
key_contrast:
  text: "КУДИ? (знахідний) ≠ ДЕ? (місцевий — наступний модуль)"
  examples:
    - "КУДИ? Я іду в школу. (знахідний)"
    - "ДЕ? Я в школі. (місцевий — модуль 24)"

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Напрямок: КУДИ?"
    prompt: "Утвори знахідний відмінок із прийменником"
    items:
      - given: "школа → (я іду в...)"
        answer: "в школу"
      - given: "магазин → (він іде в...)"
        answer: "в магазин"
      - given: "кімната → (вона заходить у...)"
        answer: "у кімнату"
      - given: "бібліотека → (ми йдемо в...)"
        answer: "в бібліотеку"
      - given: "парк → (ти йдеш у...)"
        answer: "у парк"
      - given: "аптека → (вона йде в...)"
        answer: "в аптеку"
      - given: "лікарня → (він іде в...)"
        answer: "в лікарню"
      - given: "зупинка → (я іду на...)"
        answer: "на зупинку"
      - given: "стіл → (він кладе книгу на...)"
        answer: "на стіл"
      - given: "вулиця → (діти йдуть на...)"
        answer: "на вулицю"
      - given: "ринок → (ми йдемо на...)"
        answer: "на ринок"
      - given: "пошта → (він іде на...)"
        answer: "на пошту"

  - type: classify
    title: "Який прийменник?"
    instruction: "Розподіли за значенням прийменника"
    categories:
      - label: "в/у (напрямок)"
        items:
          - "іду в школу"
          - "заходжу у кімнату"
          - "їду в місто"
      - label: "на (поверхня/подія)"
        items:
          - "кладу на стіл"
          - "іду на зупинку"
          - "йду на тренування"
      - label: "про (тема)"
        items:
          - "думаю про книгу"
          - "мрію про канікули"
      - label: "за (подяка/час)"
        items:
          - "дякую за допомогу"
          - "за годину прийду"
      - label: "через (причина)"
        items:
          - "через дощ не гуляємо"
          - "іду через парк"

  - type: build_sentence
    title: "Розклад тижня"
    instruction: "Склади речення з днями тижня"
    sentences:
      - words: ["У", "понеділок", "я", "працюю", "."]
        correct: "У понеділок я працюю."
      - words: ["У", "вівторок", "він", "читає", "."]
        correct: "У вівторок він читає."
      - words: ["У", "середу", "вона", "йде", "в", "школу", "."]
        correct: "У середу вона йде в школу."
      - words: ["У", "суботу", "ми", "відпочиваємо", "."]
        correct: "У суботу ми відпочиваємо."

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "Я думаю за книгу."
        answer: false
        correction: "Я думаю про книгу."
      - statement: "У понеділок я працюю."
        answer: true
      - statement: "Дякую за допомогу."
        answer: true
      - statement: "Через дощ ми не гуляємо."
        answer: true
      - statement: "Він іде на школу."
        answer: false
        correction: "Він іде в школу."
      - statement: "Я мрію про канікули."
        answer: true

  - type: pattern_drill
    title: "Причина: ЧОМУ?"
    prompt: "Відповідай із «через»"
    items:
      - given: "Чому ти не гуляєш? (дощ)"
        answer: "Через дощ я не гуляю."
      - given: "Чому він не працює? (хвороба)"
        answer: "Через хворобу він не працює."
      - given: "Чому вони не їдуть? (сніг)"
        answer: "Через сніг вони не їдуть."
      - given: "Чому ми запізнюємося? (пробки)"
        answer: "Через пробки ми запізнюємося."

  - type: reading
    title: "Читання: Тиждень Олі"
    text: |
      У понеділок Оля іде в школу. У середу вона йде на тренування. У четвер Оля думає про іспит. У п'ятницю вона мріє про вихідні. У суботу Оля піде в парк. Дякує мамі за допомогу.
    questions:
      - question: "Коли Оля іде в школу?"
        answer: "У понеділок."
      - question: "Про що мріє Оля?"
        answer: "Про вихідні."
      - question: "Куди Оля піде в суботу?"
        answer: "У парк."
