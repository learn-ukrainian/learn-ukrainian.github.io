teaching_note:
  text: "красний = гарний/вродливий (beautiful), НЕ червоний (red)"
  source: "Grade 3 pp.96-97"

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Чоловічий, жіночий чи середній?"
    instruction: "Розподіли іменники: ЯКИЙ? / ЯКА? / ЯКЕ?"
    categories:
      - label: "ЯКИЙ?"
        symbol_hint: "чоловічий рід"
        items:
          - "стіл"
          - "кіт"
          - "птах"
          - "телефон"
          - "олівець"
      - label: "ЯКА?"
        symbol_hint: "жіночий рід"
        items:
          - "книга"
          - "сумка"
          - "мама"
          - "школа"
          - "квітка"
      - label: "ЯКЕ?"
        symbol_hint: "середній рід"
        items:
          - "вікно"
          - "яблуко"
          - "місто"
          - "дерево"
          - "молоко"

  - type: pattern_drill
    title: "Зміни рід прикметника"
    prompt: "ЯКИЙ? великий — ЯКА?"
    items:
      - given: "ЯКИЙ? великий — ЯКА?"
        answer: "велика"
      - given: "ЯКИЙ? великий — ЯКЕ?"
        answer: "велике"
      - given: "ЯКИЙ? маленький — ЯКА?"
        answer: "маленька"
      - given: "ЯКИЙ? маленький — ЯКЕ?"
        answer: "маленьке"
      - given: "ЯКИЙ? новий — ЯКА?"
        answer: "нова"
      - given: "ЯКИЙ? новий — ЯКЕ?"
        answer: "нове"
      - given: "ЯКИЙ? старий — ЯКА?"
        answer: "стара"
      - given: "ЯКИЙ? старий — ЯКЕ?"
        answer: "старе"
      - given: "ЯКИЙ? гарний — ЯКА?"
        answer: "гарна"
      - given: "ЯКИЙ? гарний — ЯКЕ?"
        answer: "гарне"
      - given: "ЯКИЙ? червоний — ЯКА?"
        answer: "червона"
      - given: "ЯКИЙ? червоний — ЯКЕ?"
        answer: "червоне"

  - type: build_sentence
    title: "Склади словосполучення"
    instruction: "Обери правильну форму прикметника"
    sentences:
      - words: ["великий", "книга"]
        correct: "велика книга"
      - words: ["новий", "вікно"]
        correct: "нове вікно"
      - words: ["червоний", "квітка"]
        correct: "червона квітка"
      - words: ["чорний", "кіт"]
        correct: "чорний кіт"
      - words: ["синій", "небо"]
        correct: "синє небо"
      - words: ["білий", "молоко"]
        correct: "біле молоко"

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "Великий книга"
        answer: false
        correction: "Велика книга (жіночий рід)"
      - statement: "Нове телефон"
        answer: false
        correction: "Новий телефон (чоловічий рід)"
      - statement: "Гарна мама"
        answer: true
      - statement: "Червоне яблуко"
        answer: true
      - statement: "Старий школа"
        answer: false
        correction: "Стара школа (жіночий рід)"
      - statement: "Маленьке вікно"
        answer: true

  - type: riddle
    title: "Загадка"
    clues:
      - "Довга шия, як драбина,"
      - "В чорних плямах жовта спина."
    answer: "ЖИРАФ"
    answer_emoji: "\U0001F992"
    source: "Grade 3 p.76"

  - type: tongue_twister
    title: "Скоромовка"
    text: "Синій кит, синя хвиля, синє небо."
    focus: "Один прикметник — три роди"
