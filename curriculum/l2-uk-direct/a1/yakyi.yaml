module: yakyi
track: l2-uk-direct
level: a1
type: grammar
title: "Який? Яка? Яке?"
subtitle: "Описуємо речі і людей. Рід прикметників."
standard_ref: "§4.2.1.2 — adjective nominative, §4.2.2 — gender"
textbook_ref: "Grade 3 pp.96-97, Grade 4 — gender system"
teaching_notes: >
  Прикметники узгоджуються з іменником за родом: великий дім (ч.р.), велика кімната (ж.р.),
  велике місто (с.р.). Питальне слово підказує рід: ЯКИЙ? → -ий/-ій, ЯКА? → -а/-я,
  ЯКЕ? → -е/-є. Множина для всіх родів: ЯКІ? → -і. Після шиплячих (ж, ч, ш, щ) — інші
  закінчення: хороший (НЕ хорошій). Порядок: прикметник перед іменником (гарний день).

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "ЯКИЙ? → -ий/-ій (чоловічий рід), ЯКА? → -а/-я (жіночий рід), ЯКЕ? → -е/-є (середній рід)"
  examples:
    - "Великий стіл."
    - "Велика книга."
    - "Велике вікно."

# ─────────────────────────────────────────────
# QUESTION WORDS
# ─────────────────────────────────────────────
question_words:
  - question: "ЯКИЙ?"
    description: "Питаємо про чоловічий рід"
    examples:
      - "Який стіл? — Великий стіл."
      - "Який кіт? — Чорний кіт."
  - question: "ЯКА?"
    description: "Питаємо про жіночий рід"
    examples:
      - "Яка книга? — Нова книга."
      - "Яка мама? — Гарна мама."
  - question: "ЯКЕ?"
    description: "Питаємо про середній рід"
    examples:
      - "Яке вікно? — Велике вікно."
      - "Яке місто? — Гарне місто."

# ─────────────────────────────────────────────
# VOCABULARY: 15 adjective-noun pairs across 3 genders
# ─────────────────────────────────────────────
