module: checkpoint-1
track: l2-uk-direct
level: a1
type: checkpoint
title: "Контрольна точка 1"
subtitle: "Перевірка модулів 4–16: лексика, граматика, речення"
standard_ref: "Усі §§, розглянуті в модулях 4–16"
textbook_ref: "Повторення: Grade 3–4"

# ─────────────────────────────────────────────
# ASSESSMENT SCOPE
# ─────────────────────────────────────────────
assessment_scope:
  - skill: "Привітання і ввічливість"
    tested: "Правильна фраза для ситуації"
    source_modules: [4]
  - skill: "Самопредставлення"
    tested: "Ім'я, національність, професія"
    source_modules: [6]
  - skill: "Лексика"
    tested: "Розпізнавання ~120 вивчених слів"
    source_modules: [5, 6, 7, 8, 9, 13, 14, 15]
  - skill: "Рід"
    tested: "Узгодження ЯКИЙ?/ЯКА?/ЯКЕ?"
    source_modules: [8]
  - skill: "Множина"
    tested: "Однина → множина, чергування голосних"
    source_modules: [9]
  - skill: "Дієвідмінювання"
    tested: "Обидва типи, усі особи"
    source_modules: [10]
  - skill: "Побудова речень"
    tested: "SVO, питання, заперечення, сполучники"
    source_modules: [11, 12]
  - skill: "Числівники"
    tested: "1–100, лічба, Скільки?"
    source_modules: [13]
  - skill: "Уподобання"
    tested: "Подобається / люблю / хочу"
    source_modules: [14]
  - skill: "Зовнішність"
    tested: "Опис людей"
    source_modules: [15]

pass_threshold: 70

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: true_false
    title: "Правда чи неправда? (1)"
    items:
      - statement: "«Добрий ранок» — це привітання вранці."
        answer: true
      - statement: "«На добраніч» — це привітання вдень."
        answer: false
        correction: "«На добраніч» — перед сном."
      - statement: "Лікар працює в лікарні."
        answer: true
      - statement: "Книга — це ХТО?"
        answer: false
        correction: "Книга — це ЩО?"
      - statement: "Стіл — чоловічий рід."
        answer: true

  - type: true_false
    title: "Правда чи неправда? (2)"
    items:
      - statement: "Множина від «книга» — «книги»."
        answer: true
      - statement: "Множина від «стіл» — «стіла»."
        answer: false
        correction: "Множина — столи."
      - statement: "«Я читаю» — це теперішній час."
        answer: true
      - statement: "«Він не працюють» — правильне речення."
        answer: false
        correction: "Він не працює."
      - statement: "П'ятнадцять — це 15."
        answer: true

  - type: pattern_drill
    title: "Дієвідмінювання"
    prompt: "Постав дієслово у правильну форму"
    items:
      - given: "я (читати)"
        answer: "я читаю"
      - given: "ти (писати)"
        answer: "ти пишеш"
      - given: "він (робити)"
        answer: "він робить"
      - given: "ми (знати)"
        answer: "ми знаємо"
      - given: "вони (любити)"
        answer: "вони люблять"
      - given: "вона (хотіти)"
        answer: "вона хоче"

  - type: pattern_drill
    title: "Рід прикметників"
    prompt: "ЯКИЙ? ЯКА? ЯКЕ?"
    items:
      - given: "новий — книга (ЯКА?)"
        answer: "нова книга"
      - given: "великий — місто (ЯКЕ?)"
        answer: "велике місто"
      - given: "гарний — квітка (ЯКА?)"
        answer: "гарна квітка"
      - given: "старий — дерево (ЯКЕ?)"
        answer: "старе дерево"
      - given: "маленький — кіт (ЯКИЙ?)"
        answer: "маленький кіт"
      - given: "червоний — яблуко (ЯКЕ?)"
        answer: "червоне яблуко"

  - type: pattern_drill
    title: "Множина"
    prompt: "Утвори множину"
    items:
      - given: "книга →"
        answer: "книги"
      - given: "стіл →"
        answer: "столи"
      - given: "вікно →"
        answer: "вікна"
      - given: "друг →"
        answer: "друзі"
      - given: "кішка →"
        answer: "кішки"
      - given: "слово →"
        answer: "слова"

  - type: build_sentence
    title: "Побудуй речення"
    sentences:
      - words: ["Я", "люблю", "читати", "книги", "."]
        correct: "Я люблю читати книги."
      - words: ["Вона", "не", "п'є", "каву", "."]
        correct: "Вона не п'є каву."
      - words: ["Скільки", "коштує", "хліб", "?"]
        correct: "Скільки коштує хліб?"
      - words: ["Мені", "подобається", "музика", "."]
        correct: "Мені подобається музика."

  - type: classify
    title: "ХТО? чи ЩО?"
    instruction: "Розподіли слова"
    categories:
      - label: "ХТО?"
        items:
          - "лікар"
          - "вчитель"
          - "кіт"
          - "друг"
          - "мама"
      - label: "ЩО?"
        items:
          - "телефон"
          - "книга"
          - "вода"
          - "хліб"
          - "місто"

  - type: classify
    title: "Чоловічий, жіночий чи середній рід?"
    instruction: "Розподіли іменники за родом"
    categories:
      - label: "ЯКИЙ? (чол.)"
        items:
          - "телефон"
          - "олівець"
          - "друг"
      - label: "ЯКА? (жін.)"
        items:
          - "книга"
          - "школа"
          - "квітка"
      - label: "ЯКЕ? (сер.)"
        items:
          - "вікно"
          - "молоко"
          - "місто"

  - type: reading
    title: "Читання: Моя подруга"
    text: |
      Це моя подруга Оля. Вона студентка. Оля любить читати книги і слухати музику. Вона не п'є каву, вона п'є чай. У неї є два коти. Коти маленькі і білі.
    questions:
      - question: "Хто така Оля?"
        answer: "Студентка."
      - question: "Що любить Оля?"
        answer: "Читати книги і слухати музику."
      - question: "Скільки котів у Олі?"
        answer: "Два."

  - type: reading
    title: "Читання: У магазині"
    text: |
      Андрій іде в магазин. Він хоче купити хліб, молоко і яблука. Хліб коштує п'ятнадцять гривень. Молоко коштує двадцять гривень. Яблука коштують тридцять гривень.
    questions:
      - question: "Куди йде Андрій?"
        answer: "В магазин."
      - question: "Скільки коштує молоко?"
        answer: "Двадцять гривень."
