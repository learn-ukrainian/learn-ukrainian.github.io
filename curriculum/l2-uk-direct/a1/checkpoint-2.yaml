module: checkpoint-2
track: l2-uk-direct
level: a1
type: checkpoint
title: "Контрольна точка 2"
subtitle: "Перевірка модулів 21–36: відмінки, часи, лексика"
standard_ref: "Усі §§, розглянуті в модулях 18–33"
textbook_ref: "Повторення: Grade 3–4"
teaching_notes: |
  Повторення модулів 18–33: знахідний і місцевий відмінки, займенники, минулий і майбутній час.
  Нової граматики немає — фокус на інтеграції відмінків, часів і лексичних тем (їжа, здоров'я, спорт).
  Зверніть увагу на типові помилки: «болять голова» замість «болить голова», «я в школа» замість «в школі».

# ─────────────────────────────────────────────
# ASSESSMENT SCOPE
# ─────────────────────────────────────────────
assessment_scope:
  - skill: "Знахідний (неістоти + істоти + прийменники)"
    tested: "Правильні закінчення знахідного відмінка"
    source_modules: [21, 22, 23]
  - skill: "Місцевий (місце + час/місяці)"
    tested: "в/у + на + закінчення місцевого"
    source_modules: [24, 25, 26]
  - skill: "Особові займенники"
    tested: "Відмінювання: мене/мені, тебе/тобі..."
    source_modules: [27]
  - skill: "Вказівні займенники"
    tested: "Цей/ця/це, той/та/те"
    source_modules: [28]
  - skill: "Прикметники у знахідному і місцевому"
    tested: "Відмінювання прикметників"
    source_modules: [29]
  - skill: "Майбутній час"
    tested: "Буду + інфінітив"
    source_modules: [30]
  - skill: "Минулий час"
    tested: "-в/-ла/-ло/-ли"
    source_modules: [32]
  - skill: "Зворотні дієслова"
    tested: "-ся/-сь"
    source_modules: [31]
  - skill: "Лексика: їжа/купівля/здоров'я/дозвілля"
    tested: "Розпізнавання слів"
    source_modules: [33, 34, 35, 36]

pass_threshold: 70

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: true_false
    title: "Правда чи неправда? (1) — Відмінки"
    items:
      - statement: "«Я читаю книгу» — знахідний відмінок."
        answer: true
      - statement: "«Я в школа» — правильне речення."
        answer: false
        correction: "Правильно: Я в школі (місцевий відмінок)."
      - statement: "«Він бачить брата» — знахідний відмінок (істота)."
        answer: true
      - statement: "«Книга на столі» — місцевий відмінок."
        answer: true
      - statement: "«Я іду в школу» — місцевий відмінок."
        answer: false
        correction: "В школу — знахідний (напрямок, КУДИ?)."
      - statement: "«У січні холодно» — місцевий для часу."
        answer: true
      - statement: "«Він бачить стіл» — стіл не змінюється (неістота)."
        answer: true
      - statement: "«Я думаю за книгу» — правильне речення."
        answer: false
        correction: "Правильно: Я думаю про книгу."
      - statement: "«У понеділок я працюю» — знахідний для днів тижня."
        answer: true
      - statement: "«Це велику книгу» — правильне речення."
        answer: false
        correction: "Це велика книга (називний відмінок)."

  - type: true_false
    title: "Правда чи неправда? (2) — Часи і лексика"
    items:
      - statement: "«Він читав» — минулий час, чоловічий рід."
        answer: true
      - statement: "«Вона читали» — правильна форма."
        answer: false
        correction: "Вона читала (жіночий рід)."
      - statement: "«Завтра я буду працювати» — майбутній час."
        answer: true
      - statement: "«Я вмиваємося» — правильна форма."
        answer: false
        correction: "Я вмиваюся (1 особа однини)."
      - statement: "Борщ — українська страва."
        answer: true
      - statement: "Ліки купують в аптеці."
        answer: true
      - statement: "Басейн — це місце для футболу."
        answer: false
        correction: "Басейн — для плавання."
      - statement: "«У мене болять голова» — правильне речення."
        answer: false
        correction: "Голова — однина. Правильно: болить голова."
      - statement: "«Цей книга нова» — правильне речення."
        answer: false
        correction: "Книга — жіночий рід. Правильно: Ця книга нова."
      - statement: "Гривня — українська валюта."
        answer: true

  - type: pattern_drill
    title: "Знахідний відмінок"
    prompt: "Постав слово у знахідний"
    items:
      - given: "книга → я читаю..."
        answer: "книгу"
      - given: "мама → я бачу..."
        answer: "маму"
      - given: "брат → я чекаю..."
        answer: "брата"
      - given: "стіл → я бачу..."
        answer: "стіл"
      - given: "лікар → я чекаю..."
        answer: "лікаря"
      - given: "вікно → я бачу..."
        answer: "вікно"

  - type: pattern_drill
    title: "Місцевий відмінок"
    prompt: "Постав слово у місцевий"
    items:
      - given: "школа → я в..."
        answer: "у школі"
      - given: "місто → ми живемо в..."
        answer: "у місті"
      - given: "парк → діти в..."
        answer: "у парку"
      - given: "кімната → кіт у..."
        answer: "у кімнаті"

  - type: pattern_drill
    title: "Минулий час"
    prompt: "Постав у минулий час"
    items:
      - given: "читати → він"
        answer: "він читав"
      - given: "працювати → вона"
        answer: "вона працювала"
      - given: "їсти → вони"
        answer: "вони їли"
      - given: "спати → воно (сонце)"
        answer: "сонце спало"

  - type: pattern_drill
    title: "Майбутній час"
    prompt: "Постав у майбутній час"
    items:
      - given: "читати → я"
        answer: "я буду читати"
      - given: "працювати → ми"
        answer: "ми будемо працювати"
      - given: "відпочивати → вони"
        answer: "вони будуть відпочивати"
      - given: "грати → ти"
        answer: "ти будеш грати"

  - type: pattern_drill
    title: "Займенники"
    prompt: "Постав займенник у правильну форму"
    items:
      - given: "я → він бачить..."
        answer: "мене"
      - given: "ти → я скажу..."
        answer: "тобі"
      - given: "стіл (близько) → ..."
        answer: "цей стіл"
      - given: "книга (далеко) → ..."
        answer: "та книга"

  - type: build_sentence
    title: "Побудуй складне речення"
    sentences:
      - words: ["Вчора", "я", "читала", "книгу", ",", "а", "завтра", "буду", "працювати", "."]
        correct: "Вчора я читала книгу, а завтра буду працювати."
      - words: ["Він", "живе", "у", "великому", "місті", "і", "працює", "в", "лікарні", "."]
        correct: "Він живе у великому місті і працює в лікарні."
      - words: ["Я", "хочу", "купити", "свіжий", "хліб", "у", "магазині", "."]
        correct: "Я хочу купити свіжий хліб у магазині."
      - words: ["У", "мене", "болить", "горло", ",", "тому", "я", "іду", "до", "лікаря", "."]
        correct: "У мене болить горло, тому я іду до лікаря."

  - type: classify
    title: "Категорії слів"
    instruction: "Розподіли слова"
    categories:
      - label: "Їжа"
        items:
          - "борщ"
          - "хліб"
          - "молоко"
          - "яблуко"
      - label: "Здоров'я"
        items:
          - "лікар"
          - "ліки"
          - "температура"
          - "аптека"
      - label: "Спорт"
        items:
          - "футбол"
          - "басейн"
          - "стадіон"
          - "біг"

  - type: classify
    title: "Часи дієслів"
    instruction: "Розподіли за часом"
    categories:
      - label: "Теперішній"
        items:
          - "читаю"
          - "працює"
          - "вмиваюся"
          - "грають"
      - label: "Минулий"
        items:
          - "читав"
          - "працювала"
          - "йшли"
          - "снідали"
      - label: "Майбутній"
        items:
          - "буду читати"
          - "будемо працювати"
          - "будуть грати"
          - "будеш відпочивати"

  - type: reading
    title: "Читання: Лист подрузі"
    text: |
      Привіт, Олю! Як справи? Учора я була в магазині і купила нову книгу. Зараз я читаю її вдома. Книга дуже цікава! Завтра я буду в парку. Хочеш зустрітися? Приходь о третій годині.
    questions:
      - question: "Що купила авторка вчора?"
        answer: "Нову книгу."
      - question: "Де вона зараз?"
        answer: "Вдома."
      - question: "Де вона буде завтра?"
        answer: "У парку."

  - type: reading
    title: "Читання: У кафе"
    text: |
      Тарас і Оля сидять у кафе. Тарас хоче борщ і каву. Оля хоче салат і чай. Борщ коштує сорок гривень, а салат — тридцять п'ять. Кава коштує двадцять гривень, а чай — п'ятнадцять.
    questions:
      - question: "Де вони сидять?"
        answer: "У кафе."
      - question: "Що хоче Тарас?"
        answer: "Борщ і каву."
      - question: "Скільки коштує борщ?"
        answer: "Сорок гривень."

  - type: reading
    title: "Читання: Вихідні Назара"
    text: |
      Минулого вихідного Назар відпочивав. У суботу він встав пізно і снідав о десятій. Потім він ходив у спортзал і тренувався дві години. Ввечері він зустрічався з друзями. У неділю він читав книгу і дивився фільм. Наступного вихідного Назар буде в парку.
    questions:
      - question: "Коли Назар снідав у суботу?"
        answer: "О десятій."
      - question: "Де він тренувався?"
        answer: "У спортзалі."
      - question: "Де він буде наступного вихідного?"
        answer: "У парку."
