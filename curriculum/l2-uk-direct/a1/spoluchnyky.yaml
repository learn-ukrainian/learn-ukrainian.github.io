module: spoluchnyky
track: l2-uk-direct
level: a1
type: grammar
title: "Сполучники"
subtitle: "І, а, але, бо, тому що. Чи-запитання. Складні речення."
standard_ref: "§4.3.1 — Чи-запитання, §4.3.2 — складні речення: і/й, але, тому що, бо"
textbook_ref: "Grade 3 — сполучники, складні речення"

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Речення + сполучник + речення. Чи + речення?"
  examples:
    - "Кіт спить, а пес грає."
    - "Вона хоче спати, але не може."
    - "Ми не гуляємо, бо йде дощ."
    - "Чи студент читає?"

# ─────────────────────────────────────────────
# VOCABULARY: connectors and examples
# ─────────────────────────────────────────────
vocabulary:
  - category: "Додавання (і/й)"
    items:
      - word: "і"
        emoji: "\u2795"
        sentence: "Мама і тато вдома."
      - word: "й"
        emoji: "\u2795"
        sentence: "Кіт й пес граються."

  - category: "Протиставлення (а, але)"
    items:
      - word: "а"
        emoji: "\U0001F504"
        sentence: "Кіт спить, а пес грає."
      - word: "але"
        emoji: "\u26A0\uFE0F"
        sentence: "Вона хоче спати, але не може."

  - category: "Причина (бо, тому що)"
    items:
      - word: "бо"
        emoji: "\U0001F4A1"
        sentence: "Ми не гуляємо, бо йде дощ."
      - word: "тому що"
        emoji: "\U0001F4A1"
        sentence: "Він не гуляє, тому що холодно."

  - category: "Чи-запитання"
    items:
      - word: "чи"
        emoji: "\u2753"
        sentence: "Чи студент читає?"
      - word: "так"
        emoji: "\u2705"
        sentence: "Так, студент читає."
      - word: "ні"
        emoji: "\u274C"
        sentence: "Ні, студент не читає."

# ─────────────────────────────────────────────
# TEACHING NOTE: і vs й
# ─────────────────────────────────────────────
teaching_note:
  text: "і — перед приголосним (мама і тато), й — після голосного (кіт й пес). Це милозвучність."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Зроби Чи-запитання"
    prompt: "Перетвори на Чи-запитання"
    items:
      - given: "Студент читає."
        answer: "Чи студент читає?"
      - given: "Це наш автобус."
        answer: "Чи це наш автобус?"
      - given: "Вона знає відповідь."
        answer: "Чи вона знає відповідь?"
      - given: "Ти говориш українською."
        answer: "Чи ти говориш українською?"
      - given: "Він працює вдома."
        answer: "Чи він працює вдома?"

  - type: build_sentence
    title: "З'єднай два речення"
    instruction: "Обери правильний сполучник"
    sentences:
      - words: ["Я", "хочу", "гуляти", ",", "але", "йде", "дощ", "."]
        correct: "Я хочу гуляти, але йде дощ."
      - words: ["Мама", "працює", ",", "а", "тато", "відпочиває", "."]
        correct: "Мама працює, а тато відпочиває."
      - words: ["Ми", "не", "гуляємо", ",", "бо", "йде", "дощ", "."]
        correct: "Ми не гуляємо, бо йде дощ."
      - words: ["Він", "читає", "і", "пише", "."]
        correct: "Він читає і пише."
      - words: ["Вона", "не", "спить", ",", "тому", "що", "не", "хоче", "."]
        correct: "Вона не спить, тому що не хоче."

  - type: classify
    title: "Яка функція сполучника?"
    instruction: "Розподіли сполучники за функцією"
    categories:
      - label: "Додавання"
        items:
          - "і"
          - "й"
      - label: "Протиставлення"
        items:
          - "а"
          - "але"
      - label: "Причина"
        items:
          - "бо"
          - "тому що"

  - type: pattern_drill
    title: "Обери правильний сполучник"
    prompt: "Допиши сполучник"
    items:
      - given: "Мама працює, ___ тато відпочиває."
        answer: "а"
      - given: "Ми не гуляємо, ___ йде дощ."
        answer: "бо"
      - given: "Він хоче грати, ___ не може."
        answer: "але"
      - given: "Я читаю ___ пишу."
        answer: "і"
      - given: "Вона не їсть, ___ не голодна."
        answer: "тому що"
      - given: "Кіт спить, ___ пес грає."
        answer: "а"

  - type: proverb_drill
    title: "Прислів'я"
    proverb: "Чим темніша ніч, тим ясніші зорі."
    activity:
      type: fill_gap
      gap_word: "ясніші"
      options: ["ясніші", "темніші", "більші"]
      answer: "ясніші"
      meaning: "Контраст: темне підкреслює світле."

  - type: reading
    title: "Читання"
    text: |
      Це Максим. Він читає книгу, бо він любить читати.
      Поряд є кішка, але вона не читає — вона спить.
      Максим читає, а кішка спить, тому що вона втомилася.
      Чи Максим любить читати? Так, любить.
      Чи кішка читає? Ні, кішка не читає.
    questions:
      - question: "Чому Максим читає?"
        answer: "Бо він любить читати."
      - question: "Що робить кішка?"
        answer: "Кішка спить."
      - question: "Чому кішка спить?"
        answer: "Тому що вона втомилася."
