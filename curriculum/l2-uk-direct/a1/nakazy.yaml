module: nakazy
track: l2-uk-direct
level: a1
type: grammar
title: "Накази"
subtitle: "Наказовий спосіб: ти/ви. Ввічливі прохання."
standard_ref: "§4.2.4.2 — наказовий спосіб 2ос. одн./мн. (8 дієслів); Каталог А #14 — прохання"
textbook_ref: "Grade 3–4 — imperative mood"
teaching_notes: |
  Дві форми: 2ос. одн. (ти) з суфіксами -й/-и та 2ос. мн. (ви) з -йте/-іть.
  Ввічлива форма: «будь ласка» + наказовий — «Дайте, будь ласка, хліб», «Скажіть, будь ласка, де...»
  Від'ємний наказовий: «не + недоконаний вид» — «Не бігай!», «Не кричіть!»
  Протиставте ти/ви-форми: дай/дайте, скажи/скажіть — закріплює розрізнення формального і неформального.
  Використовуйте ситуацію «У класі» як природний контекст: «Сідайте! Прочитайте! Напишіть!»

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Інфінітив → 2ос. одн. (ти) / 2ос. мн. (ви). Ввічливо: + будь ласка."
  examples:
    - "Читай! / Читайте!"
    - "Дайте, будь ласка, хліб."
    - "Скажіть, будь ласка, де вокзал?"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar:
  - name: "Наказовий спосіб (8 дієслів з Держстандарту)"
    pattern: "Інфінітив → ти (2ос. одн.) / ви (2ос. мн.)"
    table:
      - infinitive: "читати"
        ти: "читай"
        ви: "читайте"
      - infinitive: "прочитати"
        ти: "прочитай"
        ви: "прочитайте"
      - infinitive: "сказати"
        ти: "скажи"
        ви: "скажіть"
      - infinitive: "дати"
        ти: "дай"
        ви: "дайте"
      - infinitive: "писати"
        ти: "пиши"
        ви: "пишіть"
      - infinitive: "написати"
        ти: "напиши"
        ви: "напишіть"
      - infinitive: "сідати"
        ти: "сідай"
        ви: "сідайте"
      - infinitive: "сидіти"
        ти: "сиди"
        ви: "сидіть"
    examples:
      - "Дайте, будь ласка, хліб."
      - "Скажіть, будь ласка, де вокзал?"
      - "Прочитайте, будь ласка, цей текст."

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Наказовий спосіб (ти)"
    items:
      - word: "дай"
        emoji: "🤲"
        sentence: "Дай мені книгу."
      - word: "візьми"
        emoji: "✋"
        sentence: "Візьми парасольку."
      - word: "читай"
        emoji: "📖"
        sentence: "Читай голосно!"
      - word: "пиши"
        emoji: "✏️"
        sentence: "Пиши уважно."
      - word: "слухай"
        emoji: "👂"
        sentence: "Слухай уважно!"
      - word: "дивись"
        emoji: "👀"
        sentence: "Дивись на дошку!"
      - word: "іди"
        emoji: "🚶"
        sentence: "Іди сюди!"
      - word: "їж"
        emoji: "🍽️"
        sentence: "Їж кашу!"
      - word: "пий"
        emoji: "🥛"
        sentence: "Пий воду!"
      - word: "скажи"
        emoji: "🗣️"
        sentence: "Скажи правду!"
      - word: "сідай"
        emoji: "🪑"
        sentence: "Сідай, будь ласка."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Утвори наказовий спосіб"
    prompt: "Постав дієслово у наказовий спосіб"
    items:
      - given: "читати → ти"
        answer: "читай"
      - given: "читати → ви"
        answer: "читайте"
      - given: "сказати → ти"
        answer: "скажи"
      - given: "сказати → ви"
        answer: "скажіть"
      - given: "дати → ти"
        answer: "дай"
      - given: "дати → ви"
        answer: "дайте"
      - given: "писати → ти"
        answer: "пиши"
      - given: "писати → ви"
        answer: "пишіть"
      - given: "написати → ти"
        answer: "напиши"
      - given: "написати → ви"
        answer: "напишіть"
      - given: "сідати → ти"
        answer: "сідай"
      - given: "сідати → ви"
        answer: "сідайте"
      - given: "сидіти → ти"
        answer: "сиди"
      - given: "сидіти → ви"
        answer: "сидіть"
      - given: "прочитати → ти"
        answer: "прочитай"
      - given: "прочитати → ви"
        answer: "прочитайте"

  - type: build_sentence
    title: "Ввічливі прохання"
    sentences:
      - words: ["Дайте", ",", "будь ласка", ",", "хліб", "."]
        correct: "Дайте, будь ласка, хліб."
      - words: ["Скажіть", ",", "будь ласка", ",", "де", "вокзал", "?"]
        correct: "Скажіть, будь ласка, де вокзал?"
      - words: ["Прочитайте", ",", "будь ласка", ",", "цей", "текст", "."]
        correct: "Прочитайте, будь ласка, цей текст."
      - words: ["Напишіть", "своє", "ім'я", ",", "будь ласка", "."]
        correct: "Напишіть своє ім'я, будь ласка."
      - words: ["Сідайте", ",", "будь ласка", "."]
        correct: "Сідайте, будь ласка."
      - words: ["Дай", "мені", "ручку", "."]
        correct: "Дай мені ручку."

  - type: classify
    title: "Прохання чи наказ?"
    instruction: "Розподіли фрази"
    categories:
      - label: "Ввічливе прохання"
        items:
          - "Дайте, будь ласка, воду."
          - "Скажіть, будь ласка, де банк?"
          - "Прочитайте, будь ласка, цей текст."
          - "Напишіть, будь ласка, адресу."
          - "Сідайте, будь ласка."
      - label: "Наказ"
        items:
          - "Читай!"
          - "Пиши!"
          - "Сиди тихо!"
          - "Дай мені книгу!"
          - "Скажи правду!"

  - type: pattern_drill
    title: "Ти чи Ви?"
    prompt: "Обери форму: неформальна (ти) чи формальна (ви)"
    items:
      - given: "Скажіть, будь ласка... (формальне)"
        answer: "ви — формальна форма"
      - given: "Скажи... (неформальне)"
        answer: "ти — неформальна форма"
      - given: "Дайте, будь ласка... (формальне)"
        answer: "ви — формальна форма"
      - given: "Дай мені... (неформальне)"
        answer: "ти — неформальна форма"

  - type: proverb_drill
    title: "Прислів'я"
    proverb: "Добрій пораді ціни немає."
    activity:
      type: true_false
      items:
        - statement: "Добра порада не має значення."
          answer: false
        - statement: "Добра порада дуже цінна."
          answer: true

  - type: reading
    title: "Читання: У класі"
    text: |
      Учитель каже: «Добрий ранок, діти! Сідайте, будь ласка. Прочитайте текст на сторінці п'ять. Тихо! Не розмовляйте. Напишіть відповіді у зошиті. Скажіть мені, коли закінчите.»
    questions:
      - question: "Що треба прочитати?"
        answer: "Текст на сторінці п'ять."
      - question: "Де треба писати відповіді?"
        answer: "У зошиті."
      - question: "Що заборонено?"
        answer: "Розмовляти."
