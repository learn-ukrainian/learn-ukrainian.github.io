module: checkpoint-a1
track: l2-uk-direct
level: a1
type: checkpoint
title: "Підсумкова контрольна А1"
subtitle: "Комплексна перевірка всіх навичок рівня А1."
standard_ref: "Повний обсяг А1 — усі 4 каталоги Держстандарту"
textbook_ref: "Повторення: Grade 1–5"
teaching_notes: |
  Комплексний тест усього рівня А1: всі відмінки, часи, лексичні теми, читання, письмо.
  Охоплює всі 47 модулів — перевіряє інтеграцію навичок, а не ізольовані знання.
  Поріг складання — 70%; результати показують готовність учня до переходу на рівень А2.

# ─────────────────────────────────────────────
# ASSESSMENT SCOPE
# ─────────────────────────────────────────────
assessment_scope:
  - skill: "Комунікативне"
    tested: "Привітання, знайомство, ввічливість, уподобання"
    target: 80
  - skill: "Лексика"
    tested: "Розпізнавання 400+ вивчених слів"
    target: 70
  - skill: "Називний відмінок"
    tested: "ХТО?/ЩО? — визначення і вживання"
    target: 80
  - skill: "Знахідний відмінок"
    tested: "Неістоти + істоти + прийменники (в/у, на, за, через, про)"
    target: 70
  - skill: "Місцевий відмінок"
    tested: "в/у + на + закінчення + час (місяці)"
    target: 70
  - skill: "Кличний відмінок"
    tested: "Звертання: мамо, тату, Олю, Іване, пане"
    target: 70
  - skill: "Теперішній час"
    tested: "Усі особи, обидва дієвідмінювання"
    target: 75
  - skill: "Минулий час"
    tested: "-в/-ла/-ло/-ли"
    target: 70
  - skill: "Майбутній час"
    tested: "Буду + інфінітив + доконаний превью"
    target: 70
  - skill: "Наказовий спосіб"
    tested: "2ос. одн./мн. (8 дієслів з Держстандарту)"
    target: 70
  - skill: "Займенники"
    tested: "Особові (мене/мені...), присвійні (мій/моя...), вказівні (цей/ця...)"
    target: 70
  - skill: "Прикметники"
    tested: "Називний + знахідний + місцевий"
    target: 70
  - skill: "Множина"
    tested: "Іменники + прикметники"
    target: 70
  - skill: "Питання"
    tested: "хто/що/де/коли/як/скільки/звідки/куди/чому/чи"
    target: 80
  - skill: "Сполучники"
    tested: "і/й, а, але, тому що, бо"
    target: 70
  - skill: "Евфонія"
    tested: "у/в, і/й, з/із/зі"
    target: 70
  - skill: "Читання"
    tested: "Знаки, меню, анкети, розклади, тексти"
    target: 70
  - skill: "Письмо"
    tested: "Самоопис, листівка, анкета"
    target: 70

pass_threshold: 70

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  # Section 1: true_false — broad vocabulary + grammar
  - type: true_false
    title: "Правда чи неправда? (1) — Лексика"
    items:
      - statement: "Борщ — це українська страва."
        answer: true
      - statement: "Аптека — це місце, де купують їжу."
        answer: false
        correction: "В аптеці купують ліки."
      - statement: "Вишиванка — національний одяг."
        answer: true
      - statement: "Стадіон — місце для плавання."
        answer: false
        correction: "На стадіоні грають у футбол. Басейн — для плавання."
      - statement: "Львів — на заході України."
        answer: true
      - statement: "«Відчинено» означає, що магазин працює."
        answer: true
      - statement: "Різдво — влітку."
        answer: false
        correction: "Різдво — взимку."
      - statement: "Бабуся — мама мами."
        answer: true
      - statement: "Метелик — це рослина."
        answer: false
        correction: "Метелик — комаха."
      - statement: "Гривня — валюта України."
        answer: true

  - type: true_false
    title: "Правда чи неправда? (2) — Граматика"
    items:
      - statement: "«Він читав» — минулий час."
        answer: true
      - statement: "«Вона читали» — правильна форма."
        answer: false
        correction: "Вона читала."
      - statement: "«Я буду працювати» — майбутній час."
        answer: true
      - statement: "«Мені подобається музика» — правильне речення."
        answer: true
      - statement: "«Я в Одесі» — правильно (в перед голосним)."
        answer: true
      - statement: "«Вона у Одесі» — правильно."
        answer: false
        correction: "Перед голосним: в Одесі."
      - statement: "«Мамо!» — кличний відмінок."
        answer: true
      - statement: "«Я читаю книга» — правильне речення."
        answer: false
        correction: "Я читаю книгу (знахідний відмінок)."
      - statement: "«Прочитай» означає «заверши читання»."
        answer: true
      - statement: "«НЕ» з дієсловами пишеться разом."
        answer: false
        correction: "НЕ з дієсловами пишеться окремо."

  - type: true_false
    title: "Правда чи неправда? (3) — Комунікативне"
    items:
      - statement: "«Добрий ранок» — привітання вранці."
        answer: true
      - statement: "«Надобраніч» — привітання вдень."
        answer: false
        correction: "«Надобраніч» — перед сном."
      - statement: "«Дайте, будь ласка» — ввічливе прохання."
        answer: true
      - statement: "«З днем народження!» — привітання з Новим роком."
        answer: false
        correction: "Це привітання з днем народження. З Новим роком! — окремо."
      - statement: "«Вибачте» — слово вибачення."
        answer: true
      - statement: "«Дякую» — подяка."
        answer: true
      - statement: "«Скажіть, будь ласка» — грубе звернення."
        answer: false
        correction: "Це ввічливе прохання."
      - statement: "«Мене звати...» — спосіб представитися."
        answer: true
      - statement: "«Як справи?» — запитання про здоров'я/стан."
        answer: true
      - statement: "«Прощавайте» — привітання."
        answer: false
        correction: "«Прощавайте» — прощання."

  # Section 2: pattern drills
  - type: pattern_drill
    title: "Відмінки"
    prompt: "Постав у правильний відмінок"
    items:
      - given: "книга → я читаю..."
        answer: "книгу"
      - given: "школа → я в..."
        answer: "у школі"
      - given: "брат → я бачу..."
        answer: "брата"
      - given: "місто → ми живемо в..."
        answer: "у місті"
      - given: "мама → звертання"
        answer: "мамо"

  - type: pattern_drill
    title: "Часи дієслів"
    prompt: "Постав у вказаний час"
    items:
      - given: "читати → він (минулий)"
        answer: "він читав"
      - given: "працювати → вона (минулий)"
        answer: "вона працювала"
      - given: "грати → я (майбутній)"
        answer: "я буду грати"
      - given: "відпочивати → ми (майбутній)"
        answer: "ми будемо відпочивати"
      - given: "їсти → вони (теперішній)"
        answer: "вони їдять"

  - type: pattern_drill
    title: "Наказовий спосіб"
    prompt: "Утвори наказовий"
    items:
      - given: "читати → ви"
        answer: "читайте"
      - given: "дати → ви"
        answer: "дайте"
      - given: "сказати → ви"
        answer: "скажіть"
      - given: "писати → ти"
        answer: "пиши"
      - given: "сідати → ви"
        answer: "сідайте"

  - type: pattern_drill
    title: "Займенники"
    prompt: "Постав займенник у правильну форму"
    items:
      - given: "я → він бачить..."
        answer: "мене"
      - given: "ти → я скажу..."
        answer: "тобі"
      - given: "ми → вони знають..."
        answer: "нас"
      - given: "книга (ця)"
        answer: "ця книга"
      - given: "стіл (той)"
        answer: "той стіл"

  - type: pattern_drill
    title: "Евфонія"
    prompt: "Обери правильний варіант"
    items:
      - given: "Вона ___ школі (у/в)"
        answer: "в"
      - given: "Я ___ школі (у/в)"
        answer: "у"
      - given: "Брат ___ сестра (і/й)"
        answer: "і"
      - given: "Мама ___ тато (і/й)"
        answer: "й"
      - given: "___ мною (з/із/зі)"
        answer: "зі"

  # Section 3: build_sentence — complex multi-clause
  - type: build_sentence
    title: "Складні речення"
    sentences:
      - words: ["Вчора", "я", "була", "в", "магазині", ",", "а", "завтра", "буду", "в", "парку", "."]
        correct: "Вчора я була в магазині, а завтра буду в парку."
      - words: ["Мені", "подобається", "читати", ",", "тому що", "книги", "цікаві", "."]
        correct: "Мені подобається читати, тому що книги цікаві."
      - words: ["Він", "живе", "у", "великому", "місті", ",", "але", "працює", "в", "маленькому", "селі", "."]
        correct: "Він живе у великому місті, але працює в маленькому селі."

  # Section 4: classify
  - type: classify
    title: "Тематичні категорії"
    instruction: "Розподіли слова"
    categories:
      - label: "Їжа"
        items:
          - "борщ"
          - "хліб"
          - "каша"
          - "яблуко"
      - label: "Природа"
        items:
          - "дощ"
          - "ліс"
          - "гора"
          - "квітка"
      - label: "Подорожі"
        items:
          - "вокзал"
          - "квиток"
          - "паспорт"
          - "валіза"

  - type: classify
    title: "Частини мови"
    instruction: "Розподіли слова"
    categories:
      - label: "Іменники"
        items:
          - "книга"
          - "стіл"
          - "мама"
          - "місто"
      - label: "Прикметники"
        items:
          - "великий"
          - "нова"
          - "смачне"
          - "холодний"
      - label: "Дієслова"
        items:
          - "читати"
          - "працює"
          - "написав"
          - "буду"

  # Section 5: reading — 4 passages of increasing length
  - type: reading
    title: "Читання: Знак (2 речення)"
    text: |
      🚫 НЕ ВХОДИТИ! НЕБЕЗПЕЧНО!
    questions:
      - question: "Що означає цей знак?"
        answer: "Входити заборонено, бо небезпечно."

  - type: reading
    title: "Читання: Листівка (4 речення)"
    text: |
      Привіт з Одеси! Тут дуже гарно і тепло. Море синє і чисте. Бажаю тобі гарного настрою!
    questions:
      - question: "Звідки листівка?"
        answer: "З Одеси."
      - question: "Яке там море?"
        answer: "Синє і чисте."

  - type: reading
    title: "Читання: Розповідь (6 речень)"
    text: |
      Учора Оля вставала о сьомій. Вона снідала і йшла в школу. У школі вона читала і писала. Після школи вона зустрічалася з подругою. Вони гуляли в парку. Ввечері Оля вечеряла і лягала спати.
    questions:
      - question: "О котрій Оля вставала?"
        answer: "О сьомій."
      - question: "Що вона робила в школі?"
        answer: "Читала і писала."
      - question: "З ким вона зустрічалася?"
        answer: "З подругою."

  - type: reading
    title: "Читання: Меню (реальний текст)"
    text: |
      МЕНЮ КАФЕ «СОНЕЧКО»
      Борщ з пампушками ... 65 грн
      Вареники з картоплею . 55 грн
      Котлета по-київськи .. 95 грн
      Салат «Весна» ........ 45 грн
      Чай .................. 20 грн
      Компот ............... 25 грн
      Торт «Київський» ..... 60 грн
    questions:
      - question: "Скільки коштує борщ?"
        answer: "65 гривень."
      - question: "Яка найдорожча страва?"
        answer: "Котлета по-київськи — 95 гривень."
      - question: "Які напої є?"
        answer: "Чай і компот."
      - question: "Як називається кафе?"
        answer: "«Сонечко»."

  # Section 6: riddles
  - type: riddle
    title: "Загадка 1"
    clues:
      - "Без вікон, без дверей, повна хата людей."
    answer: "ОГІРОК"
    answer_emoji: "🥒"
    source: "народна загадка"

  - type: riddle
    title: "Загадка 2"
    clues:
      - "Хоч не солодкий, та дуже смачний."
      - "Щодня він на столі у нас."
    answer: "ХЛІБ"
    answer_emoji: "🍞"
    source: "народна загадка"

  # Section 7: proverb
  - type: proverb_drill
    title: "Прислів'я"
    proverb: "Де згода — там і вода."
    activity:
      type: true_false
      items:
        - statement: "Коли люди погоджуються, справи йдуть добре."
          answer: true
        - statement: "Це прислів'я про воду."
          answer: false
