module: zaborony-dokonane
track: l2-uk-direct
level: a1
type: grammar
title: "Заборони і доконаний вид"
subtitle: "Заборони, доконаний vs недоконаний вид, доконаний майбутній."
standard_ref: "Каталог А #15 — заборони; §4.2.4.1 — доконаний майбутній: зможу, скажете, прочитають"
textbook_ref: "Grade 3 pp.154–157 — НЕ з дієсловами; Grade 5 §38–39"

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Не + інфінітив! (заборона). Читай (процес) vs Прочитай (результат)."
  examples:
    - "Не курити! Не входити!"
    - "Читай цю книгу. (процес)"
    - "Прочитай цю книгу. (до кінця)"
    - "Я зможу прийти завтра."

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar:
  - name: "Заборони"
    pattern: "Не + інфінітив! / Заборонено!"
    examples:
      - "Не курити!"
      - "Не палити!"
      - "Не входити!"
      - "Не бігати!"
      - "Тихо!"
      - "Заборонено!"

  - name: "Доконаний vs недоконаний вид"
    pattern: "Недоконаний (процес/звичка) vs доконаний (результат/завершення)"
    table:
      - imperfective: "читай"
        perfective: "прочитай"
        contrast: "читай (процес) vs прочитай (заверши)"
      - imperfective: "пиши"
        perfective: "напиши"
        contrast: "пиши (процес) vs напиши (результат)"
      - imperfective: "сідай"
        perfective: "сиди"
        contrast: "сідай (почни) vs сиди (залишайся)"

  - name: "Доконаний майбутній (превью)"
    pattern: "Доконаний вид → утворює простий майбутній час"
    table:
      - infinitive: "могти → змогти"
        form: "зможу"
        example: "Я зможу прийти завтра."
      - infinitive: "сказати"
        form: "скажете"
        example: "Ви скажете йому?"
      - infinitive: "прочитати"
        form: "прочитають"
        example: "Вони прочитають книгу."

  - name: "НЕ з дієсловами"
    pattern: "НЕ завжди пишеться ОКРЕМО від дієслова"
    examples:
      - "Я не знаю."
      - "Він не працює."
      - "Не курити!"
      - "Не входити!"

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Наказ, заборона чи прохання?"
    instruction: "Розподіли фрази"
    categories:
      - label: "Наказ"
        items:
          - "Читай!"
          - "Сідайте!"
          - "Прочитай цей текст!"
          - "Напиши відповідь!"
      - label: "Заборона"
        items:
          - "Не курити!"
          - "Не входити!"
          - "Не бігати!"
          - "Заборонено!"
      - label: "Прохання"
        items:
          - "Скажіть, будь ласка..."
          - "Дайте, будь ласка..."
          - "Прочитайте, будь ласка..."
          - "Сідайте, будь ласка."

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "«Прочитай» і «читай» — це одне й те саме."
        answer: false
        correction: "Читай = процес (читай книгу). Прочитай = заверши (прочитай до кінця)."
      - statement: "«Не» з дієсловами пишеться окремо."
        answer: true
      - statement: "«Заборонено» означає «можна»."
        answer: false
        correction: "Заборонено = не можна."
      - statement: "«Зможу» — доконаний майбутній від «могти»."
        answer: true

  - type: pattern_drill
    title: "Доконаний майбутній"
    prompt: "Утвори доконаний майбутній"
    items:
      - given: "могти → я (майбутнє)"
        answer: "зможу"
      - given: "сказати → ви (майбутнє)"
        answer: "скажете"
      - given: "прочитати → вони (майбутнє)"
        answer: "прочитають"
      - given: "написати → я (майбутнє)"
        answer: "напишу"
      - given: "зробити → ми (майбутнє)"
        answer: "зробимо"

  - type: pattern_drill
    title: "Обери правильний вид"
    prompt: "Доконаний чи недоконаний?"
    items:
      - given: "___ цю книгу до завтра (завершити)"
        answer: "Прочитай цю книгу до завтра."
      - given: "___ книгу щодня (звичка)"
        answer: "Читай книгу щодня."
      - given: "___ лист другу (результат)"
        answer: "Напиши лист другу."
      - given: "___ красиво (процес)"
        answer: "Пиши красиво."

  - type: proverb_drill
    title: "Прислів'я"
    proverb: "Не все те золото, що блищить."
    activity:
      type: true_false
      items:
        - statement: "Все блискуче — це золото."
          answer: false
        - statement: "Зовнішність може обманювати."
          answer: true

  - type: reading
    title: "Читання: Правила школи"
    text: |
      У школі є правила. Не бігати! Не кричати! Сидіть тихо. Прочитайте розклад. Скажіть «Добрий день» учителю. Напишіть домашнє завдання. Не забудьте принести зошити!
    questions:
      - question: "Що заборонено в школі?"
        answer: "Бігати і кричати."
      - question: "Що треба сказати вчителю?"
        answer: "«Добрий день»."
      - question: "Що треба не забути?"
        answer: "Принести зошити."
