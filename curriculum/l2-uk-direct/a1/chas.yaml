module: chas
track: l2-uk-direct
level: a1
type: vocabulary
title: "Час"
subtitle: "Котра година? Дні, місяці, пори року. Майбутній час."
standard_ref: "§4.2.1.3 — порядкові числівники в часі, §4.2.4.1 — майбутній час, §4.2.3.3 — місцевий для місяців"
textbook_ref: "Grade 3 p.81, Grade 4 — ordinal numerals, Grade 5 §38–39"
teaching_notes: |
  «Котра година?» — основне питання. Відповідь порядковими числівниками: перша, друга, третя година.
  Дні тижня у знахідному: у понеділок, у вівторок, у середу (повторення знахідного).
  Місяці у місцевому: у січні, у лютому, у березні (повторення місцевого).
  Майбутній час: буду/будеш/буде + інфінітив — «завтра я буду читати».
  «Пів на третю» = 2:30 (не 3:30!) — типова помилка, яку треба попередити одразу.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Котра година? — Перша/Друга/Третя година. Завтра я буду + інфінітив."
  examples:
    - "Котра година? — Третя година."
    - "О котрій? — О третій годині."
    - "Завтра я буду читати."

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Час на годиннику"
    items:
      - word: "година"
        emoji: "🕐"
        sentence: "Зараз перша година."
      - word: "хвилина"
        emoji: "⏱️"
        sentence: "За десять хвилин шоста."
      - word: "пів"
        emoji: "🕧"
        sentence: "Пів на третю — це 2:30."
      - word: "чверть"
        emoji: "🕐"
        sentence: "Чверть на п'яту — це 4:15."

  - category: "Дні тижня"
    items:
      - word: "понеділок"
        emoji: "1️⃣"
        sentence: "У понеділок я працюю."
      - word: "вівторок"
        emoji: "2️⃣"
        sentence: "У вівторок я ходжу на тренування."
      - word: "середа"
        emoji: "3️⃣"
        sentence: "У середу я відпочиваю."
      - word: "четвер"
        emoji: "4️⃣"
        sentence: "У четвер я читаю книги."
      - word: "п'ятниця"
        emoji: "5️⃣"
        sentence: "У п'ятницю ми зустрічаємося."
      - word: "субота"
        emoji: "6️⃣"
        sentence: "У суботу я не працюю."
      - word: "неділя"
        emoji: "7️⃣"
        sentence: "У неділю ми відпочиваємо."

  - category: "Місяці"
    items:
      - word: "січень"
        emoji: "❄️"
        sentence: "У січні дуже холодно."
      - word: "лютий"
        emoji: "🌨️"
        sentence: "У лютому ще зима."
      - word: "березень"
        emoji: "🌱"
        sentence: "У березні починається весна."
      - word: "квітень"
        emoji: "🌷"
        sentence: "У квітні цвітуть квіти."
      - word: "травень"
        emoji: "🌸"
        sentence: "У травні тепло."
      - word: "червень"
        emoji: "☀️"
        sentence: "У червні починається літо."
      - word: "липень"
        emoji: "🏖️"
        sentence: "У липні найтепліше."
      - word: "серпень"
        emoji: "🌻"
        sentence: "У серпні збирають урожай."
      - word: "вересень"
        emoji: "🍂"
        sentence: "У вересні починається школа."
      - word: "жовтень"
        emoji: "🍁"
        sentence: "У жовтні листя жовте."
      - word: "листопад"
        emoji: "🍃"
        sentence: "У листопаді падає листя."
      - word: "грудень"
        emoji: "🎄"
        sentence: "У грудні Новий рік."

  - category: "Пори року"
    items:
      - word: "зима"
        emoji: "❄️"
        sentence: "Взимку холодно."
      - word: "весна"
        emoji: "🌸"
        sentence: "Навесні тепло."
      - word: "літо"
        emoji: "☀️"
        sentence: "Влітку спекотно."
      - word: "осінь"
        emoji: "🍂"
        sentence: "Восени прохолодно."

  - category: "Часові прислівники"
    items:
      - word: "сьогодні"
        emoji: "📅"
        sentence: "Сьогодні понеділок."
      - word: "завтра"
        emoji: "➡️"
        sentence: "Завтра буде вівторок."
      - word: "вчора"
        emoji: "⬅️"
        sentence: "Вчора була неділя."
      - word: "зараз"
        emoji: "⏰"
        sentence: "Зараз третя година."
      - word: "потім"
        emoji: "⏩"
        sentence: "Потім я буду обідати."
      - word: "вранці"
        emoji: "🌅"
        sentence: "Вранці я снідаю."
      - word: "ввечері"
        emoji: "🌇"
        sentence: "Ввечері я читаю."
      - word: "вдень"
        emoji: "🌤️"
        sentence: "Вдень я працюю."
      - word: "вночі"
        emoji: "🌙"
        sentence: "Вночі я сплю."
      - word: "скоро"
        emoji: "⏳"
        sentence: "Скоро буде обід."
      - word: "завжди"
        emoji: "♾️"
        sentence: "Я завжди снідаю."
      - word: "ніколи"
        emoji: "🚫"
        sentence: "Я ніколи не запізнююся."
      - word: "іноді"
        emoji: "🔀"
        sentence: "Іноді я читаю ввечері."

# ─────────────────────────────────────────────
# GRAMMAR: FUTURE TENSE
# ─────────────────────────────────────────────
grammar:
  - name: "Аналітичний майбутній час"
    pattern: "буду / будеш / буде / будемо / будете / будуть + інфінітив"
    table:
      - person: "я"
        form: "буду читати"
      - person: "ти"
        form: "будеш читати"
      - person: "він/вона/воно"
        form: "буде читати"
      - person: "ми"
        form: "будемо читати"
      - person: "ви"
        form: "будете читати"
      - person: "вони"
        form: "будуть читати"
    examples:
      - "Завтра я буду читати."
      - "Ми будемо відпочивати."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Котра година?"
    prompt: "Скажи час українською"
    items:
      - given: "Котра година? (3:00)"
        answer: "Третя година."
      - given: "Котра година? (1:00)"
        answer: "Перша година."
      - given: "Котра година? (5:00)"
        answer: "П'ята година."
      - given: "Котра година? (8:00)"
        answer: "Восьма година."
      - given: "Котра година? (12:00)"
        answer: "Дванадцята година."

  - type: pattern_drill
    title: "Майбутній час"
    prompt: "Постав дієслово в майбутній час"
    items:
      - given: "я буду читати → ти?"
        answer: "ти будеш читати"
      - given: "я буду працювати → він?"
        answer: "він буде працювати"
      - given: "я буду відпочивати → ми?"
        answer: "ми будемо відпочивати"
      - given: "я буду їсти → вони?"
        answer: "вони будуть їсти"
      - given: "я буду писати → ви?"
        answer: "ви будете писати"

  - type: build_sentence
    title: "Плануємо день"
    sentences:
      - words: ["Завтра", "о", "третій", "я", "буду", "в", "школі", "."]
        correct: "Завтра о третій я буду в школі."
      - words: ["У", "понеділок", "ми", "будемо", "працювати", "."]
        correct: "У понеділок ми будемо працювати."
      - words: ["Ввечері", "вона", "буде", "читати", "."]
        correct: "Ввечері вона буде читати."

  - type: classify
    title: "Минуле, теперішнє чи майбутнє?"
    instruction: "Розподіли вирази за часом"
    categories:
      - label: "вчора (минуле)"
        items:
          - "вчора"
          - "минулого тижня"
          - "позавчора"
          - "торік"
          - "раніше"
      - label: "зараз (теперішнє)"
        items:
          - "сьогодні"
          - "зараз"
          - "цієї хвилини"
          - "цього тижня"
          - "тепер"
      - label: "завтра (майбутнє)"
        items:
          - "завтра"
          - "наступного тижня"
          - "скоро"
          - "потім"
          - "незабаром"

  - type: riddle
    title: "Загадка"
    clues:
      - "Срібні дзвоники лунають,"
      - "Білим пилом замітають."
    answer: "ЗИМА"
    answer_emoji: "❄️"
    source: "Grade 3 p.81"

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "Вчора я буду грати."
        answer: false
        correction: "Вчора — минулий час, буду — майбутній. Правильно: Вчора я грав/грала."
      - statement: "У січні холодно."
        answer: true
      - statement: "Третя година — це 3:00."
        answer: true
      - statement: "Пів на третю — це 3:30."
        answer: false
        correction: "Пів на третю — це 2:30."
      - statement: "Влітку падає сніг."
        answer: false
        correction: "Сніг падає взимку."
      - statement: "Навесні тепло."
        answer: true

  - type: classify
    title: "Розпізнай час на годиннику"
    instruction: "З'єднай цифровий час з українською фразою (рецептивно)"
    categories:
      - label: "пів на третю"
        items:
          - "2:30"
      - label: "чверть на п'яту"
        items:
          - "4:15"
      - label: "за чверть шоста"
        items:
          - "5:45"
      - label: "двадцять хвилин на сьому"
        items:
          - "6:20"
      - label: "за десять хвилин восьма"
        items:
          - "7:50"
      - label: "п'ята година"
        items:
          - "5:00"
