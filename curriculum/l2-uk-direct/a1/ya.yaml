module: ya
track: l2-uk-direct
level: a1
type: communicative
title: "Я"
subtitle: "Знайомство — ім'я, країна, мова, професія"
standard_ref: "Catalogue A #2 — introduce self/others, Catalogue B #1 — людина"
textbook_ref: "Grade 2 Tsepova; Grade 3 Vashulenko p.96"

# ─────────────────────────────────────────────
# CORE PHRASES (fixed patterns — memorize as chunks)
# ─────────────────────────────────────────────
phrases:
  - category: "Ім'я (name)"
    patterns:
      - pattern: "Мене звати [ім'я]."
        example: "Мене звати Олена."
      - pattern: "Як тебе звати?"
        register: "ти"
      - pattern: "Як Вас звати?"
        register: "Ви"
      - pattern: "Дуже приємно!"
        note: "відповідь на знайомство"

  - category: "Національність (nationality)"
    patterns:
      - pattern: "Я [національність]."
        examples:
          - "Я українець."
          - "Я українка."
    note: "Чоловіча форма / жіноча форма"

  - category: "Країна (country)"
    patterns:
      - pattern: "Я з [країни]."
        examples:
          - "Я з України."
          - "Він з Японії."
        note: "«Я з...» — фіксована фраза. Просто запам'ятай."

  - category: "Мова (language)"
    patterns:
      - pattern: "Я говорю [мовою]."
        examples:
          - "Я говорю українською."
          - "Вона говорить англійською."

  - category: "Вік (age)"
    patterns:
      - pattern: "Мені [число] років."
        examples:
          - "Мені двадцять п'ять років."
      - pattern: "Скільки тобі / Вам років?"

  - category: "Професія (profession)"
    patterns:
      - pattern: "Я [професія]."
        examples:
          - "Я студент."
          - "Я студентка."
          - "Він лікар."
          - "Вона вчителька."

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:

  - category: "Національності (m/f)"
    items:
      - word: "українець / українка"
        emoji: "🇺🇦"
        country: "Україна"
      - word: "американець / американка"
        emoji: "🇺🇸"
        country: "США"
      - word: "німець / німкеня"
        emoji: "🇩🇪"
        country: "Німеччина"
      - word: "японець / японка"
        emoji: "🇯🇵"
        country: "Японія"
      - word: "іспанець / іспанка"
        emoji: "🇪🇸"
        country: "Іспанія"
      - word: "поляк / полька"
        emoji: "🇵🇱"
        country: "Польща"
      - word: "француз / француженка"
        emoji: "🇫🇷"
        country: "Франція"

  - category: "Мови"
    items:
      - word: "українською"
        emoji: "🇺🇦"
      - word: "англійською"
        emoji: "🇬🇧"
      - word: "німецькою"
        emoji: "🇩🇪"
      - word: "японською"
        emoji: "🇯🇵"
      - word: "іспанською"
        emoji: "🇪🇸"

  - category: "Професії"
    items:
      - word: "студент / студентка"
        emoji: "🎓"
      - word: "лікар"
        emoji: "👨‍⚕️"
      - word: "вчитель / вчителька"
        emoji: "👩‍🏫"
      - word: "інженер"
        emoji: "👷"
      - word: "програміст"
        emoji: "💻"
      - word: "водій"
        emoji: "🚗"
      - word: "продавець"
        emoji: "🏪"
      - word: "кухар"
        emoji: "👨‍🍳"
      - word: "музикант"
        emoji: "🎵"

# ─────────────────────────────────────────────
# TEXTBOOK ENRICHMENT
# ─────────────────────────────────────────────
enrichment:
  synonyms:
    source: "Grade 3 Vashulenko"
    words: ["Батьківщина", "Рідний край", "Вітчизна", "Україна"]
    note: "Чотири способи сказати «homeland»"

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Як ти скажеш?"
    prompt: "Ти з цієї країни. Як ти скажеш?"
    items:
      - given: "🇯🇵 Японія (чоловік)"
        answer: "Я японець. Я з Японії. Я говорю японською."
      - given: "🇺🇦 Україна (жінка)"
        answer: "Я українка. Я з України. Я говорю українською."
      - given: "🇩🇪 Німеччина (чоловік)"
        answer: "Я німець. Я з Німеччини. Я говорю німецькою."
      - given: "🇪🇸 Іспанія (жінка)"
        answer: "Я іспанка. Я з Іспанії. Я говорю іспанською."
      - given: "🇵🇱 Польща (чоловік)"
        answer: "Я поляк. Я з Польщі."
      - given: "🇫🇷 Франція (жінка)"
        answer: "Я француженка. Я з Франції."

  - type: build_sentence
    title: "Склади знайомство"
    sentences:
      - words: ["Мене", "звати", "Олена", "."]
        correct: "Мене звати Олена."
      - words: ["Я", "з", "України", "."]
        correct: "Я з України."
      - words: ["Я", "студентка", "."]
        correct: "Я студентка."
      - words: ["Як", "тебе", "звати", "?"]
        correct: "Як тебе звати?"
      - words: ["Я", "говорю", "українською", "."]
        correct: "Я говорю українською."
      - words: ["Мені", "двадцять", "років", "."]
        correct: "Мені двадцять років."

  - type: classify
    title: "Що це: країна, національність, мова чи професія?"
    instruction: "Розподіли слова"
    categories:
      - label: "Країна"
        items: ["Україна", "Японія", "Німеччина", "Польща", "Франція"]
      - label: "Національність"
        items: ["українець", "японка", "німець", "полька", "француз"]
      - label: "Мова"
        items: ["українською", "японською", "німецькою", "англійською"]
      - label: "Професія"
        items: ["лікар", "студент", "вчителька", "інженер", "кухар"]

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "Українець — це людина з Польщі."
        answer: false
      - statement: "«Мене звати Олена» — це знайомство."
        answer: true
      - statement: "Француженка — це жінка з Франції."
        answer: true
      - statement: "Лікар — це мова."
        answer: false
      - statement: "«Я з Японії» — Японія — це країна."
        answer: true

  - type: reading
    title: "Два знайомства"
    text: |
      Мене звати Олена. Я з України. Я вчителька. Мені тридцять років. Я говорю українською і англійською.

      А це Такеші. Він з Японії. Він інженер. Йому двадцять вісім років. Він говорить японською.
    questions:
      - question: "Звідки Олена?"
        answer: "Олена з України."
      - question: "Яка професія Олени?"
        answer: "Вчителька."
      - question: "Звідки Такеші?"
        answer: "Такеші з Японії."
      - question: "Якими мовами говорить Олена?"
        answer: "Українською і англійською."

  - type: pattern_drill
    title: "Представ іншу людину"
    prompt: "Представ цю людину"
    items:
      - given: "Марко, 🇮🇹 Італія, кухар"
        answer: "Це Марко. Він з Італії. Він кухар."
      - given: "Анна, 🇩🇪 Німеччина, студентка"
        answer: "Це Анна. Вона з Німеччини. Вона студентка."
      - given: "Петро, 🇺🇦 Україна, лікар"
        answer: "Це Петро. Він з України. Він лікар."
      - given: "Юкі, 🇯🇵 Японія, програміст"
        answer: "Це Юкі. Він з Японії. Він програміст."
