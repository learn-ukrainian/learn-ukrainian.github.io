module: mistsia-kultury
track: l2-uk-direct
level: b1
type: vocabulary
title: "Місця культури"
subtitle: "Визначні пам'ятки, музеї, собори, фортеці"
standard_ref: "Каталог Б — Місця (розширено на B1)"
textbook_ref: "Grade 5–6 — опис місцевості, культурні пам'ятки"
teaching_notes: |
  Тематична зона: місця й культурні визначні пам'ятки.
  Типи: пам'ятник, музей, галерея, собор, фортеця, замок, палац, театр, філармонія.
  Населені пункти: місто, село, містечко, передмістя, район, околиця.
  Туризм: екскурсовод, путівник, визначна пам'ятка, туристичний маршрут.
  Конструкція: «Я рекомендую відвідати...», «Варто побачити...».

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Я рекомендую відвідати... / Варто побачити... / Це — визначна пам'ятка..."
  examples:
    - "Рекомендую відвідати Львівську оперу."
    - "Варто побачити Хотинську фортецю."
    - "Це — визначна пам'ятка архітектури."

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Населені пункти"
    items:
      - word: "місто"
        emoji: "\U0001F3D9"
        sentence: "Львів — старовинне місто."
      - word: "село"
        emoji: "\U0001F33E"
        sentence: "Бабусине село — в Карпатах."
      - word: "містечко"
        emoji: "\U0001F3D8"
        sentence: "Жовква — гарне містечко."
      - word: "передмістя"
        emoji: "\U0001F3E0"
        sentence: "Вони живуть у передмісті Києва."
      - word: "район"
        emoji: "\U0001F4CD"
        sentence: "Шевченківський район — у центрі."
      - word: "околиця"
        emoji: "\U0001F33F"
        sentence: "На околиці міста — ліс."

  - category: "Культурні об'єкти"
    items:
      - word: "пам'ятник"
        emoji: "\U0001F5FF"
        sentence: "Пам'ятник Шевченку стоїть у центрі."
      - word: "музей"
        emoji: "\U0001F3DB"
        sentence: "У музеї є стародавні артефакти."
      - word: "галерея"
        emoji: "\U0001F5BC"
        sentence: "В галереї виставлені картини."
      - word: "собор"
        emoji: "\U000026EA"
        sentence: "Софійський собор — перлина Києва."
      - word: "фортеця"
        emoji: "\U0001F3F0"
        sentence: "Хотинська фортеця — на березі Дністра."
      - word: "замок"
        emoji: "\U0001F3F0"
        sentence: "Мукачівський замок — на горі."
      - word: "палац"
        emoji: "\U0001F3DB"
        sentence: "Палац Потоцьких — у Львові."
      - word: "театр"
        emoji: "\U0001F3AD"
        sentence: "Львівський театр опери — чудовий."
      - word: "філармонія"
        emoji: "\U0001F3B5"
        sentence: "У філармонії грають класичну музику."

  - category: "Туризм"
    items:
      - word: "екскурсовод"
        emoji: "\U0001F9D1"
        sentence: "Екскурсовод розповів про історію замку."
      - word: "путівник"
        emoji: "\U0001F4D7"
        sentence: "У путівнику є карта міста."
      - word: "визначна пам'ятка"
        emoji: "\U00002B50"
        sentence: "Це — визначна пам'ятка ЮНЕСКО."
      - word: "туристичний маршрут"
        emoji: "\U0001F5FA"
        sentence: "Туристичний маршрут проходить через центр."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: build_sentence
    title: "Опиши місто"
    instruction: "Склади речення про українське місто"
    sentences:
      - words: ["Львів", "—", "культурна", "столиця", "України", "."]
        correct: "Львів — культурна столиця України."
      - words: ["Рекомендую", "відвідати", "Софійський", "собор", "у", "Києві", "."]
        correct: "Рекомендую відвідати Софійський собор у Києві."
      - words: ["Хотинська", "фортеця", "стоїть", "на", "березі", "Дністра", "."]
        correct: "Хотинська фортеця стоїть на березі Дністра."
      - words: ["У", "Львові", "є", "багато", "музеїв", "і", "галерей", "."]
        correct: "У Львові є багато музеїв і галерей."
      - words: ["Варто", "побачити", "Мукачівський", "замок", "."]
        correct: "Варто побачити Мукачівський замок."

  - type: reading
    title: "Путівник: Одеса"
    text: |
      Одеса — портове місто на березі Чорного моря. Його називають «перлиною моря». У центрі міста — знаменита Потьомкінська драбина з 192 сходинками. Одеський оперний театр — один із найкрасивіших в Європі. На Дерибасівській вулиці завжди багато туристів: тут є кафе, крамниці та вуличні музиканти. Варто також відвідати Привоз — найвідоміший ринок Одеси. Рекомендую цей маршрут усім, хто любить море, архітектуру й смачну їжу.
    questions:
      - question: "Де розташована Одеса?"
        answer: "На березі Чорного моря."
      - question: "Що цікавого є на Дерибасівській?"
        answer: "Кафе, крамниці, вуличні музиканти."
      - question: "Які визначні пам'ятки згадано?"
        answer: "Потьомкінська драбина, Одеський оперний театр, Привоз."

  - type: classify
    title: "Тип визначної пам'ятки"
    instruction: "Розподіли: архітектура, мистецтво, природа чи історія?"
    categories:
      - label: "Архітектура"
        items:
          - "Софійський собор"
          - "Львівська опера"
          - "Мукачівський замок"
          - "Хотинська фортеця"
      - label: "Мистецтво"
        items:
          - "Національний музей"
          - "Картинна галерея"
          - "Філармонія"
          - "Вуличні скульптури"
      - label: "Природа"
        items:
          - "Карпатські полонини"
          - "Чорне море"
          - "Дністровський каньйон"
          - "Шацькі озера"
      - label: "Історія"
        items:
          - "Пам'ятник Шевченку"
          - "Меморіал Голодомору"
          - "Запорізька Січ"
          - "Батурин — столиця гетьманів"

  - type: pattern_drill
    title: "Рекомендації"
    prompt: "Дай рекомендацію"
    items:
      - given: "Львівська опера (відвідати) → ?"
        answer: "Рекомендую відвідати Львівську оперу."
      - given: "Хотинська фортеця (побачити) → ?"
        answer: "Варто побачити Хотинську фортецю."
      - given: "Карпати (поїхати) → ?"
        answer: "Раджу поїхати в Карпати."
      - given: "Привоз в Одесі (зайти) → ?"
        answer: "Обов'язково зайдіть на Привоз в Одесі."

  - type: true_false
    title: "Правда чи ні?"
    items:
      - statement: "Софійський собор знаходиться у Львові."
        answer: false
        correction: "Софійський собор — у Києві."
      - statement: "Фортеця — це оборонна споруда."
        answer: true
      - statement: "Путівник — це людина, яка проводить екскурсії."
        answer: false
        correction: "Путівник — книга. Людина — екскурсовод."
      - statement: "Філармонія — місце для класичної музики."
        answer: true
      - statement: "Одесу називають «перлиною моря»."
        answer: true

  - type: riddle
    title: "Загадка: місце"
    clues:
      - "Без рук, без ніг, а на дерево пнеться."
    answer: "хміль"
    source: "Grade 5 Avramenko p.27"
