# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Провідміняй іменники II відміни"
    prompt: "Постав іменник у потрібний відмінок"
    items:
      - given: "дуб → Р.в."
        answer: "дуба"
      - given: "дуб → Д.в."
        answer: "дубові / дубу"
      - given: "дуб → О.в."
        answer: "дубом"
      - given: "дуб → Кл.в."
        answer: "дубе"
      - given: "учитель → Р.в."
        answer: "учителя"
      - given: "учитель → Д.в."
        answer: "учителеві / учителю"
      - given: "учитель → О.в."
        answer: "учителем"
      - given: "учитель → Кл.в."
        answer: "учителю"
      - given: "товариш → Р.в."
        answer: "товариша"
      - given: "товариш → О.в."
        answer: "товаришем"
      - given: "товариш → Кл.в."
        answer: "товаришу"

  - type: classify
    title: "Визнач групу"
    instruction: "Розподіли іменники II відміни чоловічого роду за групами"
    categories:
      - label: "Тверда група"
        items:
          - "брат"
          - "сад"
          - "вовк"
          - "хліб"
          - "завод"
      - label: "М'яка група"
        items:
          - "зять"
          - "учитель"
          - "день"
          - "камінь"
          - "олень"
      - label: "Мішана група"
        items:
          - "кущ"
          - "товариш"
          - "ніж"
          - "борщ"
          - "м'яч"

  - type: pattern_drill
    title: "Давальний відмінок: подвійні форми"
    prompt: "Утвори давальний відмінок (обидві форми)"
    items:
      - given: "брат"
        answer: "братові / брату"
      - given: "друг"
        answer: "другові / другу"
      - given: "батько"
        answer: "батькові / батьку"
      - given: "лікар"
        answer: "лікареві / лікарю"
      - given: "учитель"
        answer: "учителеві / учителю"
      - given: "сусід"
        answer: "сусідові / сусіду"

  - type: build_sentence
    title: "Речення з іменниками II відміни"
    instruction: "Обери правильну форму"
    sentences:
      - words: ["Я", "бачу", "[кіт/кота]", "на", "вулиці", "."]
        correct: "Я бачу кота на вулиці."
      - words: ["Подарунок", "для", "[друг/друга]", "."]
        correct: "Подарунок для друга."
      - words: ["Ми", "говорили", "з", "[учитель/учителем]", "."]
        correct: "Ми говорили з учителем."
      - words: ["[Хлопець/Хлопче]", ",", "допоможи", "мені", "!"]
        correct: "Хлопче, допоможи мені!"
      - words: ["Я", "дав", "книгу", "[брат/братові]", "."]
        correct: "Я дав книгу братові."

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "Орудний від «кіт» — «котою»."
        answer: false
        correction: "Чоловічий рід: кіт → котом."
      - statement: "Кличний від «друг» — «друже»."
        answer: true
      - statement: "Давальний від «зять» — «зятові» або «зятю»."
        answer: true
      - statement: "Родовий від «кущ» — «куща»."
        answer: true
      - statement: "Кличний від «учитель» — «учителе»."
        answer: false
        correction: "М'яка група: учитель → учителю."

  - type: riddle
    title: "Загадка: II відміна"
    clues:
      - "Ревнув віл на сто сіл, на тисячу городів."
    answer: "грім"
    source: "Grade 5 Avramenko p.27"
