module: druha-vidmina-cholovichyi
track: l2-uk-direct
level: b1
type: grammar
title: "II відміна: чоловічий рід"
subtitle: "Тверда, м'яка і мішана групи — повна парадигма"
standard_ref: "§4.2.1.1 — парадигми II відміни (чоловічий рід)"
textbook_ref: "6 клас (Авраменко §50) — II відміна чоловічий рід"
teaching_notes: |
  Чоловічий рід II відміни — найбільша група іменників. Три підгрупи: тверда (кіт), м'яка (зять), мішана (кущ).
  Давальний має подвійні форми: -ові/-у (тверда), -еві/-ю (м'яка/мішана). Форма -ові/-еві переважає в сучасній мові.
  Кличний: тверда → -е (коте, друже), м'яка → -ю (зятю, учителю), мішана → -е (куще, товаришу — виняток).
  Орудний: тверда → -ом, м'яка → -ем, мішана → -ем. Мішана і м'яка збігаються.
  Зверніть увагу на чергування: кіт → кот-а, віз → воз-а (і → о у відкритому складі).

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "II відміна чол.: тверда -ом (О.в.), -е (Кл.); м'яка -ем, -ю (Кл.); мішана -ем, -е (Кл.). Давальний: -ові/-у або -еві/-ю."
  examples:
    - "кіт → кота → котові/коту → кота → котом → на котові/коті → коте!"
    - "зять → зятя → зятеві/зятю → зятя → зятем → на зятеві/зяті → зятю!"
    - "кущ → куща → кущеві/кущу → куща → кущем → на кущі → куще!"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "II відміна — чоловічий рід (однина)"
    columns: ["Відмінок", "Тверда (кіт)", "М'яка (зять)", "Мішана (кущ)"]
    rows:
      - ["Н.в.", "кіт", "зять", "кущ"]
      - ["Р.в.", "кот-а", "зят-я", "кущ-а"]
      - ["Д.в.", "кот-ові / кот-у", "зят-еві / зят-ю", "кущ-еві / кущ-у"]
      - ["Зн.в.", "кот-а", "зят-я", "кущ-а"]
      - ["О.в.", "кот-ом", "зят-ем", "кущ-ем"]
      - ["М.в.", "на кот-ові / кот-і", "на зят-еві / зят-і", "на кущ-і"]
      - ["Кл.в.", "кот-е", "зят-ю", "кущ-е"]

