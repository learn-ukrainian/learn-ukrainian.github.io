module: pidradni-umovni-dopustovi
track: l2-uk-direct
level: b1
type: grammar
title: "Підрядні умовні та допустові"
subtitle: "Якщо, якби; хоч, дарма що, незважаючи на те що"
standard_ref: "§4.4 — підрядні умовні + допустові: хоч, дарма що, незважаючи на те що"
textbook_ref: "5 клас (Авраменко) — складнопідрядні речення"
teaching_notes: |
  Умовні речення (якщо/якби) — повторення з модулів 16–17.
  Нове: допустові речення — перешкода НЕ заважає результату.
  Хоч (хоча) — найчастіший, розмовний і нейтральний.
  Дарма що — експресивний, підкреслює марність перешкоди.
  Незважаючи на те що — офіційний, книжний.
  Логіка: «Хоч + перешкода, результат все одно відбувся».

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Допустові: хоч + перешкода, результат відбувся. Умовні: якщо/якби + умова, наслідок."
  examples:
    - "Хоч було холодно, ми пішли гуляти."
    - "Дарма що він працює, він не заробляє багато."
    - "Незважаючи на те що йшов дощ, свято відбулося."

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Допустові сполучники"
    columns: ["Сполучник", "Стиль", "Приклад"]
    rows:
      - ["хоч (хоча)", "нейтральний", "Хоч було холодно, ми пішли."]
      - ["дарма що", "експресивний", "Дарма що він старається, нічого не виходить."]
      - ["незважаючи на те що", "офіційний", "Незважаючи на те що йшов дощ, свято відбулося."]

  - title: "Умовні vs допустові"
    columns: ["Тип", "Логіка", "Приклад"]
    rows:
      - ["Умовний", "умова → наслідок", "Якщо буде дощ, не підемо."]
      - ["Допустовий", "перешкода → результат усе одно", "Хоч був дощ, ми пішли."]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Допустові сполучники"
    items:
      - word: "хоч"
        emoji: "\U0001F4AA"
        sentence: "Хоч було важко, він не здався."
      - word: "хоча"
        emoji: "\U0001F4AA"
        sentence: "Хоча дощило, ми пішли на прогулянку."
      - word: "дарма що"
        emoji: "\U0001F937"
        sentence: "Дарма що він багато працює, часу не вистачає."
      - word: "незважаючи на те що"
        emoji: "\U0001F4BC"
        sentence: "Незважаючи на те що було пізно, вони продовжили."

  - category: "Перешкоди та результати"
    items:
      - word: "перешкода"
        emoji: "\U0001F6A7"
        sentence: "Перешкоди не зупинили її."
      - word: "здатися"
        emoji: "\U0001F3F3"
        sentence: "Він не здався, хоч було складно."
      - word: "продовжити"
        emoji: "\U000027A1"
        sentence: "Хоч було пізно, вони продовжили роботу."
      - word: "подолати"
        emoji: "\U0001F3C6"
        sentence: "Хоч труднощів було багато, вона подолала їх."
      - word: "витримати"
        emoji: "\U0001F4AA"
        sentence: "Хоч було спекотно, він витримав марафон."
      - word: "відбутися"
        emoji: "\U00002705"
        sentence: "Незважаючи на дощ, свято відбулося."
      - word: "наполегливий"
        emoji: "\U0001F4AA"
        sentence: "Хоч складно, вона наполеглива."
      - word: "старатися"
        emoji: "\U0001F4AA"
        sentence: "Дарма що він старається, результату немає."

  - category: "Умовні (повторення)"
    items:
      - word: "якщо"
        emoji: "\U00002753"
        sentence: "Якщо буде час, приїду."
      - word: "якби"
        emoji: "\U0001F914"
        sentence: "Якби мав гроші, поїхав би."
      - word: "за умови що"
        emoji: "\U0001F4DC"
        sentence: "Поїдемо, за умови що буде тепло."
      - word: "у разі якщо"
        emoji: "\U000026A0"
        sentence: "У разі якщо запізнишся, зателефонуй."
      - word: "інакше"
        emoji: "\U0001F500"
        sentence: "Приходь вчасно, інакше почнемо без тебе."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Умовне чи допустове?"
    instruction: "Розподіли речення: умовне (якщо/якби) чи допустове (хоч/дарма що)"
    categories:
      - label: "Умовне (умова → наслідок)"
        items:
          - "Якщо буде дощ, не підемо."
          - "Якби мав час, поїхав би."
          - "Якщо встигну, зателефоную."
          - "У разі якщо запізнишся, напиши."
      - label: "Допустове (перешкода → результат усе одно)"
        items:
          - "Хоч було холодно, ми пішли."
          - "Дарма що він працює, не заробляє багато."
          - "Незважаючи на те що йшов дощ, свято відбулося."
          - "Хоча було важко, вона не здалася."

  - type: build_sentence
    title: "Побудуй допустове речення"
    instruction: "З'єднай перешкоду та результат із «хоч»"
    sentences:
      - words: ["Хоч", "було", "холодно", ",", "ми", "пішли", "гуляти", "."]
        correct: "Хоч було холодно, ми пішли гуляти."
      - words: ["Хоча", "він", "втомився", ",", "продовжив", "працювати", "."]
        correct: "Хоча він втомився, продовжив працювати."
      - words: ["Дарма", "що", "дощило", ",", "концерт", "відбувся", "."]
        correct: "Дарма що дощило, концерт відбувся."
      - words: ["Незважаючи", "на", "те", "що", "було", "пізно", ",", "вони", "закінчили", "."]
        correct: "Незважаючи на те що було пізно, вони закінчили."
      - words: ["Хоч", "було", "важко", ",", "він", "не", "здався", "."]
        correct: "Хоч було важко, він не здався."
      - words: ["Хоча", "ціна", "висока", ",", "якість", "чудова", "."]
        correct: "Хоча ціна висока, якість чудова."

  - type: pattern_drill
    title: "Перетвори два речення на допустове"
    prompt: "З'єднай із «хоч»"
    items:
      - given: "Було холодно. Ми пішли. →"
        answer: "Хоч було холодно, ми пішли."
      - given: "Він працює. Не заробляє багато. →"
        answer: "Хоч він працює, не заробляє багато."
      - given: "Йшов дощ. Свято відбулося. →"
        answer: "Хоч йшов дощ, свято відбулося."
      - given: "Було важко. Вона не здалася. →"
        answer: "Хоч було важко, вона не здалася."
      - given: "Він старається. Нічого не виходить. →"
        answer: "Дарма що він старається, нічого не виходить."
      - given: "Було пізно. Вони продовжили. →"
        answer: "Хоч було пізно, вони продовжили."

  - type: reading
    title: "Читання: Марафонець"
    text: |
      Олексій вирішив пробігти марафон. Хоч він ніколи раніше не бігав на довгі дистанції, почав тренуватися. Дарма що погода була погана — дощ, вітер, холод — він бігав щодня. Незважаючи на те що колеги сміялися, він не здався. Якщо залишалися сили після роботи, бігав увечері. Якби мав більше часу, тренувався б і вранці. Хоч марафон був надзвичайно важким, Олексій добіг до фінішу. Хоча час був не найкращий, головне — він зробив це.
    questions:
      - question: "Які допустові речення є в тексті?"
        answer: "Хоч він ніколи не бігав... Дарма що погода була погана... Незважаючи на те що колеги сміялися... Хоч марафон був важким... Хоча час був не найкращий..."
      - question: "Яке речення з реальною умовою?"
        answer: "Якщо залишалися сили після роботи, бігав увечері."
      - question: "Яке речення з нереальною умовою?"
        answer: "Якби мав більше часу, тренувався б і вранці."
