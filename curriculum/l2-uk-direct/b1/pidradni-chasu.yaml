module: pidradni-chasu
track: l2-uk-direct
level: b1
type: grammar
title: "Підрядні речення часу"
subtitle: "Коли, поки, після того як, перед тим як, щойно"
standard_ref: "§4.4 — підрядні часу: коли (одночасність і послідовність)"
textbook_ref: "5 клас (Авраменко §63–81) — складнопідрядні речення"
teaching_notes: |
  Два типи часових відношень: одночасність і послідовність.
  Одночасність: «Коли я читав, мама готувала вечерю» — обидві дії одночасно.
  Послідовність: «Коли я прочитав книгу, я пішов гуляти» — спочатку одне, потім інше.
  Додаткові сполучники: поки (доки), після того як, перед тим як, щойно.
  Вид дієслова допомагає відрізнити: недоконаний = одночасність, доконаний = послідовність.
  Кома завжди ставиться між підрядною і головною частинами.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Коли + недоконаний вид = одночасність. Коли + доконаний вид = послідовність."
  examples:
    - "Коли я читав, мама готувала вечерю. (одночасно)"
    - "Коли я прочитав книгу, я пішов гуляти. (послідовно)"
    - "Щойно він увійшов, усі замовкли."

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Сполучники часу"
    columns: ["Сполучник", "Значення", "Приклад"]
    rows:
      - ["коли", "одночасність / послідовність", "Коли я прийшов, вона вже пішла."]
      - ["поки (доки)", "протягом (одночасність)", "Читай, поки я готую."]
      - ["після того як", "після завершення", "Після того як поїв, він пішов."]
      - ["перед тим як", "до початку", "Перед тим як вийти, перевір ключі."]
      - ["щойно", "одразу після", "Щойно він прийшов, почався дощ."]

  - title: "Одночасність vs послідовність"
    columns: ["Тип", "Вид дієслова", "Приклад"]
    rows:
      - ["Одночасність", "недоконаний + недоконаний", "Коли я читав, вона писала."]
      - ["Послідовність", "доконаний → доконаний", "Коли я прочитав, я пішов."]
      - ["Одночасність", "поки + недоконаний", "Поки я чекав, читав книгу."]
      - ["Послідовність", "після того як + доконаний", "Після того як закінчив, пішов."]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Сполучники часу"
    items:
      - word: "коли"
        emoji: "\U0001F550"
        sentence: "Коли він прийшов, ми вже вечеряли."
      - word: "поки"
        emoji: "\U000023F3"
        sentence: "Почекай, поки я закінчу."
      - word: "доки"
        emoji: "\U000023F3"
        sentence: "Сиди тут, доки я повернуся."
      - word: "щойно"
        emoji: "\U000026A1"
        sentence: "Щойно вона зайшла, всі зраділи."
      - word: "перед тим як"
        emoji: "\U000023EA"
        sentence: "Перед тим як вийти, вимкни світло."
      - word: "після того як"
        emoji: "\U000023E9"
        sentence: "Після того як поїв, випив чай."

  - category: "Дії та послідовність"
    items:
      - word: "одночасно"
        emoji: "\U0001F503"
        sentence: "Вони працювали одночасно."
      - word: "послідовно"
        emoji: "\U000027A1"
        sentence: "Зробіть це послідовно: спочатку одне, потім інше."
      - word: "спочатку"
        emoji: "\U0001F522"
        sentence: "Спочатку прочитай, потім відповідай."
      - word: "потім"
        emoji: "\U0001F522"
        sentence: "Потім ми пішли додому."
      - word: "тим часом"
        emoji: "\U000023F1"
        sentence: "Тим часом діти гралися надворі."
      - word: "зрештою"
        emoji: "\U00002705"
        sentence: "Зрештою він погодився."
      - word: "завершити"
        emoji: "\U0001F3C1"
        sentence: "Після того як завершив проєкт, пішов відпочивати."
      - word: "замовкнути"
        emoji: "\U0001F910"
        sentence: "Щойно вчитель увійшов, усі замовкли."
      - word: "розпочати"
        emoji: "\U0001F680"
        sentence: "Коли всі зібралися, розпочали нараду."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: build_sentence
    title: "З'єднай із «коли»"
    instruction: "Побудуй складнопідрядне речення часу"
    sentences:
      - words: ["Коли", "я", "читав", ",", "мама", "готувала", "вечерю", "."]
        correct: "Коли я читав, мама готувала вечерю."
      - words: ["Коли", "я", "прочитав", "книгу", ",", "я", "пішов", "гуляти", "."]
        correct: "Коли я прочитав книгу, я пішов гуляти."
      - words: ["Щойно", "він", "увійшов", ",", "усі", "замовкли", "."]
        correct: "Щойно він увійшов, усі замовкли."
      - words: ["Поки", "я", "чекав", ",", "читав", "газету", "."]
        correct: "Поки я чекав, читав газету."
      - words: ["Перед", "тим", "як", "вийти", ",", "перевір", "ключі", "."]
        correct: "Перед тим як вийти, перевір ключі."
      - words: ["Після", "того", "як", "поїв", ",", "він", "випив", "чай", "."]
        correct: "Після того як поїв, він випив чай."
      - words: ["Коли", "всі", "зібралися", ",", "розпочали", "нараду", "."]
        correct: "Коли всі зібралися, розпочали нараду."
      - words: ["Доки", "я", "повернуся", ",", "нікуди", "не", "йди", "."]
        correct: "Доки я повернуся, нікуди не йди."

  - type: classify
    title: "Одночасність чи послідовність?"
    instruction: "Визнач тип часового відношення"
    categories:
      - label: "Одночасність (обидві дії разом)"
        items:
          - "Коли я читав, вона писала."
          - "Поки діти спали, мама прибирала."
          - "Коли він працював, я готував обід."
          - "Тим часом діти гралися."
          - "Поки ми чекали, розмовляли."
      - label: "Послідовність (спочатку одне, потім інше)"
        items:
          - "Коли я прочитав, я пішов."
          - "Щойно він увійшов, усі замовкли."
          - "Після того як поїв, випив чай."
          - "Перед тим як вийти, вимкнув світло."
          - "Коли закінчив роботу, подзвонив другу."

  - type: pattern_drill
    title: "Обери сполучник"
    prompt: "Встав правильний сполучник часу"
    items:
      - given: "___ я закінчу, я подзвоню."
        answer: "Коли"
      - given: "Почекай, ___ я повернуся."
        answer: "поки"
      - given: "___ він прийшов, почався дощ."
        answer: "Щойно"
      - given: "___ вийти, перевір документи."
        answer: "Перед тим як"
      - given: "___ поїв, він пішов гуляти."
        answer: "Після того як"
      - given: "Читай, ___ я готуватиму вечерю."
        answer: "поки"
      - given: "___ всі зібралися, почали зустріч."
        answer: "Коли"
      - given: "___ зателефонувала, я вже спав."
        answer: "Коли"

  - type: reading
    title: "Читання: Один день Маріки"
    text: |
      Коли Маріка прокинулася, сонце вже світило. Перед тим як вийти з дому, вона перевірила розклад. Поки йшла до зупинки, слухала подкаст. Щойно автобус приїхав, вона сіла біля вікна. Коли приїхала на роботу, колеги вже пили каву. Після того як закінчила всі справи, вона зателефонувала подрузі. Поки вони розмовляли, Маріка йшла додому. Коли прийшла, було вже темно.
    questions:
      - question: "Що Маріка зробила перед тим, як вийти?"
        answer: "Перевірила розклад."
      - question: "Що вона робила, поки йшла до зупинки?"
        answer: "Слухала подкаст."
      - question: "Що сталося щойно автобус приїхав?"
        answer: "Вона сіла біля вікна."

  - type: proverb_drill
    title: "Прислів'я: підрядне часу"
    proverb: "Посієш учинок — виросте звичка."
    source: "Grade 4 p.157"
    activity:
      type: fill_gap
      gap_word: "звичка"
      meaning: "Вчинки формують характер. Часова послідовність: коли посієш учинок — тоді виросте звичка."
