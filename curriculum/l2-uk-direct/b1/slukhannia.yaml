module: slukhannia
track: l2-uk-direct
level: b1
type: practice
title: "Аудіювання"
subtitle: "Розуміння основного змісту усного мовлення"
standard_ref: "§1.1 — розуміння головного змісту чіткого стандартного мовлення на знайомі теми"
textbook_ref: "Grade 5 — аудіювання, виділення головної думки"
teaching_notes: |
  Навички: виділити головну думку, визначити допоміжні деталі,
  розрізнити факт і думку, зробити нотатки під час прослуховування.
  Оскільки це текстовий формат — моделюємо аудіювання через читання текстів,
  написаних у розмовному/лекційному стилі.
  Завдання: після «прослуховування» — відповіді на запитання, конспект, класифікація.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Слухаю → визначаю тему → виділяю факти → відрізняю факт від думки → конспектую."
  examples:
    - "Головна думка лекції — українська мова має давню історію."
    - "Факт: Конституцію прийняли 1996 року."
    - "Думка: Я вважаю, що це найважливіший документ."

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Аудіювання: навички"
    items:
      - word: "аудіювання"
        emoji: "\U0001F442"
        sentence: "Аудіювання — сприйняття мовлення на слух."
      - word: "головна думка"
        emoji: "\U0001F4A1"
        sentence: "Визначте головну думку тексту."
      - word: "допоміжна деталь"
        emoji: "\U0001F50D"
        sentence: "Ця інформація — допоміжна деталь."
      - word: "факт"
        emoji: "\U0001F4CB"
        sentence: "Факт можна перевірити."
      - word: "думка"
        emoji: "\U0001F4AC"
        sentence: "Думка — це суб'єктивна оцінка."
      - word: "конспект"
        emoji: "\U0001F4DD"
        sentence: "Ведіть конспект під час лекції."

  - category: "Маркери факту й думки"
    items:
      - word: "відомо, що"
        emoji: "\U0001F4D6"
        sentence: "Відомо, що Київ — столиця України."
      - word: "доведено, що"
        emoji: "\U00002705"
        sentence: "Доведено, що мова впливає на мислення."
      - word: "я вважаю"
        emoji: "\U0001F9D0"
        sentence: "Я вважаю, що це правильно."
      - word: "на мою думку"
        emoji: "\U0001F4AC"
        sentence: "На мою думку, варто спробувати."
      - word: "можливо"
        emoji: "\U00002753"
        sentence: "Можливо, це станеться завтра."
      - word: "безперечно"
        emoji: "\U00002757"
        sentence: "Безперечно, освіта — це важливо."

  - category: "Тематична лексика"
    items:
      - word: "лекція"
        emoji: "\U0001F3EB"
        sentence: "Лекція тривала годину."
      - word: "доповідь"
        emoji: "\U0001F4CA"
        sentence: "Доповідь була про історію мови."
      - word: "виступ"
        emoji: "\U0001F3A4"
        sentence: "Виступ науковця був цікавим."
      - word: "слухач"
        emoji: "\U0001F442"
        sentence: "Слухачі ставили запитання."
      - word: "записувати"
        emoji: "\U0000270D"
        sentence: "Записуйте головні тези."
      - word: "теза"
        emoji: "\U0001F4CC"
        sentence: "Головна теза — мова формує ідентичність."
      - word: "тлумачити"
        emoji: "\U0001F50E"
        sentence: "Лектор тлумачить складні терміни."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: reading
    title: "Лекція: Українська мова в історії"
    text: |
      Українська мова — одна з найдавніших слов'янських мов. Перші писемні пам'ятки давньоукраїнською мовою датуються XI століттям. Відомо, що «Повість минулих літ» — один із найважливіших літописів Київської Русі. Протягом століть українську мову забороняли: Емський указ 1876 року обмежив її використання. Проте мова вижила завдяки літературі та народній творчості. На мою думку, це свідчить про неймовірну стійкість українського народу. Сьогодні українська — державна мова з понад 40 мільйонами носіїв.
    questions:
      - question: "Яка головна теза лекції?"
        answer: "Українська мова — давня, пережила заборони і є державною мовою."
      - question: "Назвіть три факти з тексту."
        answer: "Перші пам'ятки — XI ст.; Емський указ — 1876 р.; понад 40 мільйонів носіїв."
      - question: "Яке речення — думка, а не факт?"
        answer: "«На мою думку, це свідчить про неймовірну стійкість українського народу.»"

  - type: true_false
    title: "Факт чи думка?"
    items:
      - statement: "Київ — столиця України."
        answer: true
      - statement: "Українська мова — найкрасивіша мова світу."
        answer: false
        correction: "Це думка (суб'єктивна оцінка), а не факт."
      - statement: "Конституцію України прийняли 1996 року."
        answer: true
      - statement: "На мою думку, освіта — найважливіша сфера."
        answer: false
        correction: "Маркер «на мою думку» вказує, що це думка."
      - statement: "Тарас Шевченко народився 1814 року."
        answer: true
      - statement: "Безперечно, кожен має вивчати мову."
        answer: false
        correction: "«Безперечно» — маркер суб'єктивної оцінки."

  - type: classify
    title: "Факти і думки"
    instruction: "Розподіли висловлювання"
    categories:
      - label: "Факти"
        items:
          - "Україна здобула незалежність 1991 року."
          - "Емський указ заборонив друк українською."
          - "«Повість минулих літ» — літопис XI століття."
          - "Населення України — понад 40 мільйонів."
          - "Тарас Шевченко — автор «Кобзаря»."
      - label: "Думки"
        items:
          - "Я вважаю, що це правильне рішення."
          - "На мою думку, освіта — найважливіша сфера."
          - "Можливо, ситуація зміниться наступного року."
          - "Безперечно, мова — це основа нації."
          - "Мені здається, варто змінити підхід."

  - type: build_sentence
    title: "Складіть конспект"
    instruction: "Запишіть головну тезу одним реченням"
    sentences:
      - words: ["Українська", "мова", "—", "одна", "з", "найдавніших", "слов'янських", "мов", "."]
        correct: "Українська мова — одна з найдавніших слов'янських мов."
      - words: ["Мова", "вижила", "завдяки", "літературі", "й", "народній", "творчості", "."]
        correct: "Мова вижила завдяки літературі й народній творчості."
      - words: ["Сьогодні", "українська", "—", "державна", "мова", "України", "."]
        correct: "Сьогодні українська — державна мова України."

  - type: reading
    title: "Радіопрограма: Екологія"
    text: |
      Добрий день, шановні слухачі! Сьогодні ми поговоримо про екологічні проблеми в Україні. За останні роки якість повітря в великих містах погіршилася. Це факт, підтверджений дослідженнями. Головні причини — транспорт і промисловість. Водночас я вважаю, що кожен може зробити свій внесок: сортувати сміття, їздити велосипедом, економити воду. Можливо, через десять років ситуація зміниться на краще. Дякую за увагу!
    questions:
      - question: "Яка тема радіопрограми?"
        answer: "Екологічні проблеми в Україні."
      - question: "Які причини погіршення якості повітря названо?"
        answer: "Транспорт і промисловість."
      - question: "Які рекомендації дає ведучий?"
        answer: "Сортувати сміття, їздити велосипедом, економити воду."
