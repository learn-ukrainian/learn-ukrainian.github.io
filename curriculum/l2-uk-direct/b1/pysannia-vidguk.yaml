module: pysannia-vidguk
track: l2-uk-direct
level: b1
type: writing
title: "Відгук"
subtitle: "Пишемо відгук на книгу, фільм, подію"
standard_ref: "§1.3 — відгуки, особисті листи на культурні теми"
textbook_ref: "Grade 5–6 — відгук як жанр письма"
teaching_notes: |
  Структура відгуку: вступ (назва, автор) → короткий зміст → враження → рекомендація.
  Ключові конструкції: мені сподобалося / не сподобалося, я рекомендую / не раджу,
  найбільше вразило, на мою думку, варто прочитати / подивитися.
  Відгук — це не переказ! Головне — особиста думка й аргументи.
  Практикуйте на реальних прикладах: фільм, книга, концерт, виставка.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Вступ (що?) → Зміст (про що?) → Враження (як?) → Рекомендація (кому?)."
  examples:
    - "Я прочитав книгу «Тіні забутих предків»."
    - "Найбільше мене вразила сцена в горах."
    - "Рекомендую всім, хто цікавиться українською культурою."

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Структура відгуку"
    items:
      - word: "відгук"
        emoji: "\U0001F4DD"
        sentence: "Напишіть відгук на прочитану книгу."
      - word: "враження"
        emoji: "\U00002728"
        sentence: "Мої враження від фільму — позитивні."
      - word: "рекомендація"
        emoji: "\U0001F44D"
        sentence: "Моя рекомендація: обов'язково подивіться."
      - word: "короткий зміст"
        emoji: "\U0001F4D6"
        sentence: "Спочатку напишіть короткий зміст."
      - word: "аргумент"
        emoji: "\U0001F4AC"
        sentence: "Підтримайте свою думку аргументами."

  - category: "Вирази для оцінки"
    items:
      - word: "мені сподобалось"
        emoji: "\U0001F60A"
        sentence: "Мені сподобалась гра акторів."
      - word: "не сподобалось"
        emoji: "\U0001F615"
        sentence: "Мені не сподобався фінал фільму."
      - word: "вразило"
        emoji: "\U0001F929"
        sentence: "Найбільше вразила музика."
      - word: "розчарувало"
        emoji: "\U0001F61E"
        sentence: "Мене розчарував сюжет."
      - word: "рекомендую"
        emoji: "\U0001F44D"
        sentence: "Рекомендую цю книгу всім."
      - word: "не раджу"
        emoji: "\U0001F44E"
        sentence: "Не раджу дивитися цей фільм."
      - word: "варто"
        emoji: "\U00002705"
        sentence: "Варто прочитати цю книгу."
      - word: "на мою думку"
        emoji: "\U0001F9D0"
        sentence: "На мою думку, це найкращий фільм року."

  - category: "Жанри та культура"
    items:
      - word: "роман"
        emoji: "\U0001F4D5"
        sentence: "Цей роман написаний у 2020 році."
      - word: "повість"
        emoji: "\U0001F4D6"
        sentence: "Повість Коцюбинського — про Карпати."
      - word: "вистава"
        emoji: "\U0001F3AD"
        sentence: "Вистава тривала дві години."
      - word: "виставка"
        emoji: "\U0001F5BC"
        sentence: "На виставці було 50 картин."
      - word: "концерт"
        emoji: "\U0001F3B5"
        sentence: "Концерт відбувся у філармонії."
      - word: "режисер"
        emoji: "\U0001F3AC"
        sentence: "Режисер фільму — відомий майстер."
      - word: "сюжет"
        emoji: "\U0001F4DC"
        sentence: "Сюжет фільму — захопливий."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: build_sentence
    title: "Напиши відгук"
    instruction: "Склади речення для відгуку на книгу"
    sentences:
      - words: ["Я", "прочитав", "роман", "«Тигролови»", "Івана", "Багряного", "."]
        correct: "Я прочитав роман «Тигролови» Івана Багряного."
      - words: ["Книга", "розповідає", "про", "втечу", "героя", "з", "табору", "."]
        correct: "Книга розповідає про втечу героя з табору."
      - words: ["Найбільше", "мене", "вразила", "сміливість", "головного", "героя", "."]
        correct: "Найбільше мене вразила сміливість головного героя."
      - words: ["Рекомендую", "цю", "книгу", "всім", ",", "хто", "любить", "пригоди", "."]
        correct: "Рекомендую цю книгу всім, хто любить пригоди."
      - words: ["На", "мою", "думку", ",", "це", "один", "із", "найкращих", "українських", "романів", "."]
        correct: "На мою думку, це один із найкращих українських романів."

  - type: classify
    title: "Частини відгуку"
    instruction: "Розподіли речення: вступ, зміст, враження чи рекомендація?"
    categories:
      - label: "Вступ"
        items:
          - "Я подивився фільм «Довбуш»."
          - "Нещодавно прочитав повість Коцюбинського."
          - "Учора я відвідав виставку сучасного мистецтва."
      - label: "Короткий зміст"
        items:
          - "Фільм розповідає про легендарного опришка."
          - "Головний герой подорожує Карпатами."
          - "У книзі описано життя гуцулів."
      - label: "Враження"
        items:
          - "Найбільше мене вразили пейзажі."
          - "Мені сподобалась гра акторів."
          - "Розчарував надто довгий фінал."
      - label: "Рекомендація"
        items:
          - "Рекомендую всім, хто цікавиться історією."
          - "Варто подивитися з родиною."
          - "Не раджу тим, хто не любить повільний темп."

  - type: pattern_drill
    title: "Вирази для оцінки"
    prompt: "Обери відповідний вираз"
    items:
      - given: "Фільм дуже сподобався → ___ фільм."
        answer: "Мені сподобався"
      - given: "Музика була чудова → Найбільше ___ музика."
        answer: "вразила"
      - given: "Кінець поганий → Мене ___ фінал."
        answer: "розчарував"
      - given: "Раджу подивитися → ___ цей фільм."
        answer: "Рекомендую"
      - given: "Не варто читати → ___ цю книгу."
        answer: "Не раджу"
      - given: "Думаю, це добре → ___, це гарний фільм."
        answer: "На мою думку"

  - type: reading
    title: "Зразок відгуку"
    text: |
      Нещодавно я подивився фільм «Довбуш». Це українська історична драма про легендарного карпатського опришка Олексу Довбуша. Фільм розповідає про його боротьбу за справедливість.

      Найбільше мене вразили пейзажі Карпат і музика. Гра акторів була переконливою, особливо головного героя. Мені сподобалось, що фільм показує українську історію без прикрас.

      Проте мене трохи розчарував фінал — він був надто поспішним. На мою думку, режисер міг приділити більше часу розв'язці.

      Загалом рекомендую цей фільм усім, хто цікавиться українською історією та культурою. Варто подивитися на великому екрані.
    questions:
      - question: "Про що фільм «Довбуш»?"
        answer: "Про легендарного карпатського опришка Олексу Довбуша."
      - question: "Що сподобалось автору відгуку?"
        answer: "Пейзажі Карпат, музика, гра акторів."
      - question: "Що розчарувало?"
        answer: "Надто поспішний фінал."
      - question: "Кому рекомендовано фільм?"
        answer: "Усім, хто цікавиться українською історією та культурою."

  - type: true_false
    title: "Правила написання відгуку"
    items:
      - statement: "Відгук — це детальний переказ книги чи фільму."
        answer: false
        correction: "Відгук — це особиста оцінка. Переказ — лише коротка частина."
      - statement: "У відгуку обов'язково має бути особиста думка автора."
        answer: true
      - statement: "Рекомендація — необов'язкова частина відгуку."
        answer: false
        correction: "Рекомендація — завершальна й важлива частина відгуку."
      - statement: "«На мою думку» — вираз для висловлення особистої оцінки."
        answer: true
      - statement: "У відгуку не потрібно аргументувати свою думку."
        answer: false
        correction: "Аргументи роблять відгук переконливим."
