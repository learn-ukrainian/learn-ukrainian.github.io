module: rodovyi-a-ya-u-yu
track: l2-uk-direct
level: b1
type: grammar
title: "Родовий: -а/-я чи -у/-ю?"
subtitle: "Семантичне правило для чоловічого роду II відміни"
standard_ref: "§4.2.1.1 — семантичне правило родового відмінка"
textbook_ref: "6 клас (Авраменко с.100) — розподіл -а/-я та -у/-ю"
teaching_notes: |
  Це найскладніше правило іменникової морфології. Ключ — семантика, а не фонетика.
  -а/-я: конкретне, злічуване, означене — люди, тварини, населені пункти, предмети, одиниці, місяці.
  -у/-ю: абстрактне, незлічуване, збірне — поняття, процеси, речовини, хвороби, установи.
  Мнемоніка: «Чи можеш порахувати? Чи можеш вказати на один конкретний?» Так → -а/-я. Ні → -у/-ю.
  Є пограничні випадки — не вимагайте стовідсоткової точності, головне — засвоїти принцип.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Конкретне, злічуване → -а/-я. Абстрактне, незлічуване → -у/-ю."
  examples:
    - "стіл → стола (конкретний предмет)"
    - "страх → страху (абстрактне поняття)"
    - "Київ → Києва (населений пункт)"
    - "університет → університету (установа)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "-а/-я (конкретне, злічуване, означене)"
    columns: ["Категорія", "Приклади"]
    rows:
      - ["Люди, тварини", "учня, кота, лева"]
      - ["Населені пункти", "Києва, Львова, Лондона"]
      - ["Конкретні предмети", "стола, олівця, ножа"]
      - ["Одиниці виміру", "метра, кілограма, долара"]
      - ["Місяці", "січня, лютого, березня"]
      - ["Дні тижня", "понеділка, вівторка"]

  - title: "-у/-ю (абстрактне, незлічуване, збірне)"
    columns: ["Категорія", "Приклади"]
    rows:
      - ["Абстрактні поняття", "розуму, страху, сміху"]
      - ["Процеси", "розвитку, руху, прогресу"]
      - ["Речовини", "цукру, піску, снігу"]
      - ["Хвороби", "грипу, нежитю"]
      - ["Установи, будівлі", "університету, вокзалу"]
      - ["Збірні поняття", "народу, люду, натовпу"]

