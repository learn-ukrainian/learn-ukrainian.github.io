# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "-а/-я чи -у/-ю?"
    instruction: "Розподіли іменники за закінченням у родовому відмінку"
    categories:
      - label: "-а/-я (конкретне)"
        items:
          - "стіл → стола"
          - "кіт → кота"
          - "олівець → олівця"
          - "Київ → Києва"
          - "метр → метра"
          - "учень → учня"
          - "ніж → ножа"
          - "понеділок → понеділка"
          - "дуб → дуба"
          - "лев → лева"
      - label: "-у/-ю (абстрактне)"
        items:
          - "страх → страху"
          - "розум → розуму"
          - "рух → руху"
          - "університет → університету"
          - "сніг → снігу"
          - "цукор → цукру"
          - "прогрес → прогресу"
          - "грип → грипу"
          - "народ → народу"
          - "вокзал → вокзалу"

  - type: pattern_drill
    title: "Утвори родовий відмінок"
    prompt: "Постав іменник у родовий відмінок"
    items:
      - given: "стіл"
        answer: "стола"
      - given: "страх"
        answer: "страху"
      - given: "Львів"
        answer: "Львова"
      - given: "університет"
        answer: "університету"
      - given: "олівець"
        answer: "олівця"
      - given: "сніг"
        answer: "снігу"
      - given: "учитель"
        answer: "учителя"
      - given: "рух"
        answer: "руху"
      - given: "долар"
        answer: "долара"
      - given: "театр"
        answer: "театру"
      - given: "кіт"
        answer: "кота"
      - given: "цукор"
        answer: "цукру"
      - given: "понеділок"
        answer: "понеділка"
      - given: "вокзал"
        answer: "вокзалу"
      - given: "камінь"
        answer: "каменя"
      - given: "прогрес"
        answer: "прогресу"
      - given: "лікар"
        answer: "лікаря"
      - given: "сміх"
        answer: "сміху"
      - given: "січень"
        answer: "січня"
      - given: "грип"
        answer: "грипу"

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "Родовий від «університет» — «університета»."
        answer: false
        correction: "Установа → -у: університету."
      - statement: "Родовий від «олівець» — «олівця»."
        answer: true
      - statement: "Родовий від «народ» — «народа»."
        answer: false
        correction: "Збірне поняття → -у: народу."
      - statement: "Родовий від «Київ» — «Києва»."
        answer: true
      - statement: "Родовий від «сніг» — «снігу»."
        answer: true
      - statement: "Родовий від «метр» — «метру»."
        answer: false
        correction: "Одиниця виміру → -а: метра."

  - type: build_sentence
    title: "Речення з родовим відмінком"
    instruction: "Обери правильну форму"
    sentences:
      - words: ["Немає", "[цукор/цукра/цукру]", "в", "чаї", "."]
        correct: "Немає цукру в чаї."
      - words: ["Це", "книга", "[учитель/учителя]", "."]
        correct: "Це книга учителя."
      - words: ["Він", "приїхав", "із", "[Львів/Львова]", "."]
        correct: "Він приїхав із Львова."
      - words: ["Правила", "дорожнього", "[рух/руху]", "."]
        correct: "Правила дорожнього руху."
      - words: ["Вона", "студентка", "[університет/університету]", "."]
        correct: "Вона студентка університету."
      - words: ["Ціна", "одного", "[долар/долара]", "."]
        correct: "Ціна одного долара."

  - type: pattern_drill
    title: "Пограничні випадки"
    prompt: "Визнач закінчення і поясни чому"
    items:
      - given: "лист (документ)"
        answer: "листа (конкретний предмет → -а)"
      - given: "вітер (стихія)"
        answer: "вітру (стихійне явище → -у)"
      - given: "магазин (будівля)"
        answer: "магазину (установа → -у)"
      - given: "автобус (транспорт)"
        answer: "автобуса (конкретний предмет → -а)"
      - given: "хліб (продукт)"
        answer: "хліба (конкретний предмет → -а)"

  - type: reading
    title: "Читання: Чому -а чи -у?"
    text: |
      Петро повернувся з університету о п'ятій. Від вокзалу він ішов пішки. На вулиці було багато снігу. Петро зайшов до магазину і купив хліба, цукру і пакет молока. Біля дому він побачив кота сусіда. Від страху кіт утік на дерево. Петро зняв кота з дуба і поніс додому.
    questions:
      - question: "Звідки повернувся Петро?"
        answer: "З університету (установа → -у)."
      - question: "Що купив Петро?"
        answer: "Хліба (конкретне → -а), цукру (речовина → -у), молока (середній рід)."
      - question: "Чий кіт утік?"
        answer: "Кіт сусіда (людина → -а)."

  - type: proverb_drill
    title: "Прислів'я: родовий відмінок"
    proverb: "З бика не надоїш молока."
    source: "Grade 6 Avramenko"
    activity:
      type: fill_gap
      gap_word: "молока"
      meaning: "Не чекай від когось того, чого він не може дати. «Молока» — Р.в. (середній рід, -а)."
