module: naholos-pohlyblennia
track: l2-uk-direct
level: b1
type: grammar
title: "Наголос: поглиблення"
subtitle: "Подвійний, смислорозрізнювальний, форморозрізнювальний наголос; спрощення приголосних"
standard_ref: "§4.1 — наголос (розширений), §4.1 — спрощення приголосних"
textbook_ref: "5 клас (Авраменко) — правила наголосу, перевірені списки слів"
teaching_notes: |
  Чотири типи наголосу: вільний, подвійний, смислорозрізнювальний, форморозрізнювальний.
  Смислорозрізнювальний: замок (будівля) / замок (пристрій) — наголос змінює значення слова.
  Форморозрізнювальний: руки (Н.в. мн.) / руки (Р.в. одн.) — наголос змінює граматичну форму.
  Спрощення приголосних: честь → чесний (т випадає), щастя → щасливий (т випадає).
  Типові помилки: кіломéтр (правильно: кілóметр), дровá (правильно: дрóва).

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Наголос в українській мові — вільний і рухомий. Він може змінювати значення (зáмок/замóк) або форму (рýки/рукú)."
  examples:
    - "зáмок (будівля) — замóк (пристрій)"
    - "óбрази (зображення) — обрáзи (ікони)"
    - "рýки (називний множини) — рукú (родовий однини)"
    - "честь → чесний (т випадає)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Типи наголосу"
    columns: ["Тип", "Що робить", "Приклади"]
    rows:
      - ["Вільний", "може падати на будь-який склад", "мóлоко, молокó (обидва прийнятні)"]
      - ["Подвійний", "дві допустимі позиції", "зáвжди/завждú, пóмилка/помúлка"]
      - ["Смислорозрізнювальний", "змінює значення", "зáмок (castle) / замóк (lock)"]
      - ["Форморозрізнювальний", "змінює граматичну форму", "рýки (Н.в.мн.) / рукú (Р.в.одн.)"]

  - title: "Спрощення приголосних"
    columns: ["Основа", "Похідне", "Що випадає"]
    rows:
      - ["честь", "чесний", "т"]
      - ["щастя", "щасливий", "т"]
      - ["серце", "сердечний", "д (у серце)"]
      - ["сонце", "сонячний", "ц → ч"]
      - ["тиждень", "тижневий", "д"]

  - title: "Типові помилки наголосу"
    columns: ["Неправильно", "Правильно"]
    rows:
      - ["дровá", "дрóва"]
      - ["кіломéтр", "кілóметр"]
      - ["хóджу", "ходжý"]
      - ["жúвемо", "живемó"]
      - ["сантімéтр", "сантимéтр"]
      - ["óлень", "олéнь"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Смислорозрізнювальний наголос"
    items:
      - word: "зáмок"
        emoji: "\U0001F3F0"
        sentence: "Стародавній зáмок стоїть на горі."
      - word: "замóк"
        emoji: "\U0001F512"
        sentence: "Замóк на дверях зламався."
      - word: "óбрази"
        emoji: "\U0001F5BC"
        sentence: "Óбрази природи на картинах."
      - word: "обрáзи"
        emoji: "\U0001F622"
        sentence: "Обрáзи кривдять людину."
      - word: "áтлас"
        emoji: "\U0001F5FA"
        sentence: "Áтлас із картами світу."
      - word: "атлáс"
        emoji: "\U0001F9F5"
        sentence: "Плаття з атлáсу — дуже гарне."

  - category: "Форморозрізнювальний наголос"
    items:
      - word: "рýки"
        emoji: "\U0000270B"
        sentence: "Рýки (Н.в. мн.) чисті."
      - word: "рукú"
        emoji: "\U0000270B"
        sentence: "Немає рукú (Р.в. одн.)."
      - word: "нóги"
        emoji: "\U0001F9B6"
        sentence: "Нóги (Н.в. мн.) втомилися."
      - word: "ногú"
        emoji: "\U0001F9B6"
        sentence: "Від ногú (Р.в. одн.) до голови."
      - word: "слóва"
        emoji: "\U0001F4AC"
        sentence: "Гарні слóва (Н.в. мн.)."
      - word: "словá"
        emoji: "\U0001F4AC"
        sentence: "Немає словá (Р.в. одн.) у словнику."

  - category: "Спрощення приголосних"
    items:
      - word: "чесний"
        emoji: "\U0001F91D"
        sentence: "Чесний (від честь — т випадає) хлопець."
      - word: "щасливий"
        emoji: "\U0001F60A"
        sentence: "Щасливий (від щастя — т випадає) день."
      - word: "корисний"
        emoji: "\U00002705"
        sentence: "Корисний (від користь — т випадає) досвід."
      - word: "виїзний"
        emoji: "\U0001F697"
        sentence: "Виїзний (від виїзд — д випадає) семінар."

  - category: "Правильний наголос"
    items:
      - word: "дрóва"
        emoji: "\U0001FAB5"
        sentence: "Дрóва (не дровá!) лежать біля печі."
      - word: "кілóметр"
        emoji: "\U0001F4CF"
        sentence: "До міста один кілóметр (не кіломéтр!)."
      - word: "подрýга"
        emoji: "\U0001F469"
        sentence: "Моя подрýга (не пóдруга!) живе поруч."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Смислорозрізнювальний чи форморозрізнювальний?"
    instruction: "Розподіли пари слів за типом наголосу"
    categories:
      - label: "Смислорозрізнювальний (змінює значення)"
        items:
          - "зáмок / замóк"
          - "óбрази / обрáзи"
          - "áтлас / атлáс"
          - "мýка / мукá"
          - "прíклад / приклáд"
      - label: "Форморозрізнювальний (змінює форму)"
        items:
          - "рýки / рукú"
          - "нóги / ногú"
          - "слóва / словá"
          - "дорóги / доріг"
          - "гóри / горú"

  - type: pattern_drill
    title: "Спрощення приголосних"
    prompt: "Утвори похідне слово (з випаданням приголосного)"
    items:
      - given: "честь → прикметник"
        answer: "чесний"
      - given: "щастя → прикметник"
        answer: "щасливий"
      - given: "користь → прикметник"
        answer: "корисний"
      - given: "виїзд → прикметник"
        answer: "виїзний"
      - given: "тиждень → прикметник"
        answer: "тижневий"
      - given: "проїзд → прикметник"
        answer: "проїзний"
      - given: "якість → прикметник"
        answer: "якісний"
      - given: "совість → прикметник"
        answer: "совісний"
      - given: "шістнадцять → вимова"
        answer: "шіснадцять"
      - given: "серце → прикметник"
        answer: "сердечний"

  - type: true_false
    title: "Правильний наголос?"
    items:
      - statement: "«Кіломéтр» — правильний наголос."
        answer: false
        correction: "Правильно: кілóметр."
      - statement: "«Дрóва» — правильний наголос."
        answer: true
      - statement: "«Ходжý» — правильний наголос."
        answer: true
      - statement: "«Жúвемо» — правильний наголос."
        answer: false
        correction: "Правильно: живемó."
      - statement: "«Зáмок» (будівля) — правильний наголос."
        answer: true
      - statement: "«Пóмилка» і «помúлка» — обидва прийнятні."
        answer: true
      - statement: "«Рýки» — це родовий відмінок однини."
        answer: false
        correction: "«Рýки» — називний множини. Родовий однини: рукú."
      - statement: "«Олéнь» — правильний наголос."
        answer: false
        correction: "Правильно: óлень."

  - type: pattern_drill
    title: "Постав наголос"
    prompt: "Визнач правильну позицію наголосу"
    items:
      - given: "кілометр"
        answer: "кілóметр"
      - given: "дрова"
        answer: "дрóва"
      - given: "ходжу"
        answer: "ходжý"
      - given: "живемо"
        answer: "живемó"
      - given: "сантиметр"
        answer: "сантимéтр"
      - given: "подруга"
        answer: "подрýга"
      - given: "новий"
        answer: "новúй"
      - given: "олень"
        answer: "óлень"
      - given: "одинадцять"
        answer: "одинáдцять"
      - given: "середина"
        answer: "середúна"
      - given: "завжди"
        answer: "зáвжди / завждú"
      - given: "вірші"
        answer: "вíрші"
      - given: "спина"
        answer: "спинá"
      - given: "фартух"
        answer: "фáртух"
      - given: "листопад"
        answer: "листопáд"
      - given: "перепис"
        answer: "пéрепис"
      - given: "рукопис"
        answer: "рýкопис"
      - given: "випадок"
        answer: "вúпадок"
      - given: "добридень"
        answer: "добрúдень"
      - given: "черговий"
        answer: "черговúй"

  - type: reading
    title: "Читання: Визнач значення за контекстом"
    text: |
      Ми їхали до старого зáмку на горі. Дорога була довгою — ще п'ять кілóметрів. Коли приїхали, побачили, що замóк на воротах зламаний. Усередині на стінах висіли óбрази рицарів. Один із них тримав áтлас зоряного неба. Нóги втомилися від довгої дороги. Але яке щастя — побачити цей чéсний і кóрисний музей!
    questions:
      - question: "«Зáмок» у першому реченні — це будівля чи пристрій?"
        answer: "Будівля (на горі — контекст)."
      - question: "«Замóк» у третьому реченні — це будівля чи пристрій?"
        answer: "Пристрій (на воротах — контекст)."
      - question: "«Óбрази» — це зображення чи кривди?"
        answer: "Зображення (на стінах висіли)."
      - question: "Знайди слово зі спрощенням приголосних."
        answer: "Чéсний (від честь — т випадає), кóрисний (від користь — т випадає)."

  - type: pattern_drill
    title: "Який наголос правильний?"
    prompt: "Обери правильний варіант наголосу"
    items:
      - given: "кіломéтр чи кілóметр?"
        answer: "кілóметр"
      - given: "дрóва чи дровá?"
        answer: "дрóва"
      - given: "хóджу чи ходжý?"
        answer: "ходжý"
      - given: "жúвемо чи живемó?"
        answer: "живемó"
      - given: "óлень чи олéнь?"
        answer: "óлень"
      - given: "подрýга чи пóдруга?"
        answer: "подрýга"

  - type: tongue_twister
    title: "Скоромовка: наголос і ритм"
    text: "Пироги припечені, перцем переперчені."
    focus: "П/Р/Ч"
    source: "Grade 5 Litvinova"

  - type: tongue_twister
    title: "Скоромовка: Г/Ґ"
    text: "Галасливі ґави й галки в гусенят взяли скакалки."
    focus: "Г/Ґ"
    source: "Grade 5 Litvinova"
