module: imennyky-vidminy
track: l2-uk-direct
level: b1
type: grammar
title: "Іменники: чотири відміни"
subtitle: "Система відмінювання іменників — огляд"
standard_ref: "§4.2.1.1 — парадигми іменників (розширені)"
textbook_ref: "6 клас (Авраменко §47) — чотири відміни і три групи"
teaching_notes: |
  Головне — навчити визначати відміну: рід → закінчення → основа (тверда/м'яка/мішана).
  Чотири відміни: I (жін./чол. -а/-я), II (чол. ∅/-о, сер. -о/-е/-я), III (жін. м'який ∅), IV (сер. -а, -ят/-ен).
  Три групи в I та II відмінах: тверда, м'яка, мішана — за характером кінцевого приголосного основи.
  Не давайте всі парадигми одразу — спочатку алгоритм визначення, потім практика на прикладах.
  Почніть із знайомих слів (школа, кіт, радість, ім'я) — по одному з кожної відміни.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Визнач рід → подивись на закінчення → визнач відміну. I — -а/-я (ж./ч.), II — ∅/-о/-е/-я (ч./с.), III — м'який ∅ (ж.), IV — -а/-ят/-ен (с.)."
  examples:
    - "школа → жіночий рід, -а → I відміна"
    - "кіт → чоловічий рід, ∅ → II відміна"
    - "радість → жіночий рід, м'який ∅ → III відміна"
    - "лоша → середній рід, -а (лошати) → IV відміна"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Чотири відміни іменників"
    columns: ["Відміна", "Рід", "Закінчення", "Групи", "Приклади"]
    rows:
      - ["I", "жін., чол.", "-а, -я", "тверда/м'яка/мішана", "школа, земля, круча"]
      - ["II", "чол. (∅, -о), сер. (-о, -е, -я)", "∅, -о, -е, -я", "тверда/м'яка/мішана", "кіт/зять/кущ; тіло/море/плече"]
      - ["III", "жін. (м'який ∅)", "∅", "—", "радість, ніч, сіль"]
      - ["IV", "сер. (-а, -ят/-ен)", "-а", "—", "лоша→лошати, ім'я→імені"]

  - title: "Три групи (I і II відміни)"
    columns: ["Група", "Характеристика", "I відміна", "II відміна"]
    rows:
      - ["Тверда", "твердий приголосний", "школ-а, мам-а", "кіт-∅, тіл-о"]
      - ["М'яка", "м'який приголосний", "земл-я, Марі-я", "зять-∅, мор-е"]
      - ["Мішана", "ж/ч/ш/щ", "круч-а, меж-а", "кущ-∅, плеч-е"]

