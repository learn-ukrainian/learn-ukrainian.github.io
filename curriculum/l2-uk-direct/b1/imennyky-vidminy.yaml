# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Розподіли іменники за відмінами"
    instruction: "Визнач, до якої відміни належить іменник"
    categories:
      - label: "I відміна"
        items:
          - "книга"
          - "вулиця"
          - "площа"
          - "земля"
          - "мрія"
          - "каша"
          - "бабуся"
      - label: "II відміна"
        items:
          - "стіл"
          - "учитель"
          - "вікно"
          - "поле"
          - "товариш"
          - "хлопець"
          - "місто"
      - label: "III відміна"
        items:
          - "любов"
          - "ніч"
          - "подорож"
          - "сіль"
          - "кров"
          - "розкіш"
          - "міць"
      - label: "IV відміна"
        items:
          - "теля"
          - "ім'я"
          - "лоша"
          - "курча"
          - "немовля"
          - "полум'я"

  - type: classify
    title: "Тверда, м'яка чи мішана група?"
    instruction: "Розподіли іменники I та II відміни за групами"
    categories:
      - label: "Тверда група"
        items:
          - "школа"
          - "мама"
          - "кіт"
          - "стіл"
          - "вікно"
      - label: "М'яка група"
        items:
          - "земля"
          - "пісня"
          - "зять"
          - "учитель"
          - "море"
      - label: "Мішана група"
        items:
          - "круча"
          - "межа"
          - "кущ"
          - "товариш"
          - "плече"

  - type: pattern_drill
    title: "Визнач відміну"
    prompt: "Назви відміну іменника"
    items:
      - given: "радість"
        answer: "III відміна"
      - given: "батько"
        answer: "II відміна"
      - given: "дорога"
        answer: "I відміна"
      - given: "полум'я"
        answer: "IV відміна"
      - given: "ніч"
        answer: "III відміна"
      - given: "село"
        answer: "II відміна"
      - given: "суддя"
        answer: "I відміна"
      - given: "лоша"
        answer: "IV відміна"
      - given: "площа"
        answer: "I відміна"
      - given: "олівець"
        answer: "II відміна"
      - given: "любов"
        answer: "III відміна"
      - given: "яйце"
        answer: "II відміна"
      - given: "теля"
        answer: "IV відміна"
      - given: "калюжа"
        answer: "I відміна"
      - given: "лікар"
        answer: "II відміна"
      - given: "тінь"
        answer: "III відміна"
      - given: "знання"
        answer: "II відміна"
      - given: "вулиця"
        answer: "I відміна"
      - given: "ім'я"
        answer: "IV відміна"
      - given: "друг"
        answer: "II відміна"

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "«Земля» належить до першої відміни мішаної групи."
        answer: false
        correction: "«Земля» — I відміна, м'яка група (земл-я, -я — м'який приголосний)."
      - statement: "«Радість» — іменник III відміни."
        answer: true
      - statement: "«Море» належить до I відміни."
        answer: false
        correction: "«Море» — II відміна, м'яка група (середній рід, -е)."
      - statement: "«Кущ» — II відміна, мішана група."
        answer: true
      - statement: "«Ім'я» — III відміна."
        answer: false
        correction: "«Ім'я» — IV відміна (середній рід, основа на -ен: імені)."
      - statement: "«Суддя» — II відміна."
        answer: false
        correction: "«Суддя» — I відміна (чоловічий рід, -я, м'яка група)."
      - statement: "«Тіло» — II відміна, тверда група."
        answer: true
      - statement: "III відміна має три групи: тверду, м'яку і мішану."
        answer: false
        correction: "III відміна не поділяється на групи."

  - type: reading
    title: "Читання: Як визначити відміну?"
    text: |
      Щоб визначити відміну іменника, треба зробити три кроки. Перший — визначити рід слова. Другий — подивитися на закінчення в називному відмінку. Третій — якщо це I або II відміна, визначити групу за кінцевим приголосним основи.

      Наприклад: «радість». Це жіночий рід, закінчення нульове, приголосний м'який — отже, III відміна. А «школа»? Жіночий рід, закінчення -а, приголосний твердий — I відміна, тверда група. «Лоша» — середній рід, в родовому «лошати» — IV відміна.
    questions:
      - question: "Скільки кроків треба зробити, щоб визначити відміну?"
        answer: "Три кроки."
      - question: "До якої відміни належить «радість»?"
        answer: "До III відміни."
      - question: "Чому «школа» — тверда група?"
        answer: "Тому що кінцевий приголосний основи твердий."

  - type: proverb_drill
    title: "Прислів'я: відмінки в дії"
    proverb: "На сонці тепло, а біля матері добре."
    source: "Grade 4 p.43"
    activity:
      type: fill_gap
      gap_word: "матері"
      meaning: "Найкраще — з мамою. Іменник «мати» у родовому відмінку (III відміна)."
