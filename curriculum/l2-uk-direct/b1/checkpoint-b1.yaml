module: checkpoint-b1
track: l2-uk-direct
level: b1
type: checkpoint
title: "Підсумкова контрольна B1"
subtitle: "Комплексне оцінювання всього рівня B1"
standard_ref: "Усі §§ B1 — повний обсяг рівня, усі каталоги"
textbook_ref: "Grade 5–6 — підсумкове оцінювання"
teaching_notes: |
  Фінальна контрольна B1 охоплює все: відмінювання (4 відміни × 3 групи),
  прикметники (відмінювання, ступені порівняння), займенники (8 типів),
  числівники, наголос, умовний спосіб, синтетичний майбутній, нерегулярні дієслова,
  префіксальний рух, складне речення, пряма/непряма мова, фразеологія, стилі,
  антисуржик, словотвір, письмо (заява, переказ, відгук), аудіювання, діалог, лексика.
  Поріг: 70% загальний. Кожна велика секція — не менше порогу.

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Граматика (ключові терміни)"
    items:
      - word: "відміна"
        emoji: "\U0001F4CB"
        sentence: "В українській мові чотири відміни іменників."
      - word: "ступінь порівняння"
        emoji: "\U0001F4CA"
        sentence: "Вищий ступінь: красивіший."
      - word: "умовний спосіб"
        emoji: "\U0001F914"
        sentence: "Якби мав час, поїхав би."
      - word: "підрядне речення"
        emoji: "\U0001F517"
        sentence: "Підрядне речення пояснює головне."
      - word: "пряма мова"
        emoji: "\U0001F4AC"
        sentence: "Він сказав: «Я прийду»."

  - category: "Лексика (ключові слова B1)"
    items:
      - word: "суспільство"
        emoji: "\U0001F465"
        sentence: "Суспільство має бути справедливим."
      - word: "волонтер"
        emoji: "\U0001F91D"
        sentence: "Волонтери рятують життя."
      - word: "фортеця"
        emoji: "\U0001F3F0"
        sentence: "Хотинська фортеця — на Дністрі."
      - word: "традиція"
        emoji: "\U0001F3AD"
        sentence: "Колядки — різдвяна традиція."
      - word: "заява"
        emoji: "\U0001F4C4"
        sentence: "Прошу розглянути мою заяву."

  - category: "Комунікація"
    items:
      - word: "рекомендую"
        emoji: "\U0001F44D"
        sentence: "Рекомендую цю книгу."
      - word: "дозвольте не погодитися"
        emoji: "\U0001F91A"
        sentence: "Дозвольте не погодитися з вами."
      - word: "на мою думку"
        emoji: "\U0001F9D0"
        sentence: "На мою думку, це правильно."
      - word: "протягом"
        emoji: "\U0001F4C5"
        sentence: "Протягом тижня дамо відповідь."
      - word: "стосовно"
        emoji: "\U0001F4E8"
        sentence: "Стосовно вашого запитання."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: true_false
    title: "Граматика: правда чи ні?"
    items:
      - statement: "В українській мові чотири відміни іменників."
        answer: true
      - statement: "«Якщо» вживається з нереальною умовою."
        answer: false
        correction: "«Якщо» — реальна умова. Нереальна — «якби»."
      - statement: "Вищий ступінь прикметника «гарний» — «гарніший»."
        answer: true
      - statement: "Займенник «себе» має форму називного відмінка."
        answer: false
        correction: "Займенник «себе» не має називного відмінка."
      - statement: "Синтетичний майбутній час: писатиму, писатимеш."
        answer: true
      - statement: "«Приймати участь» — правильна українська фраза."
        answer: false
        correction: "Правильно: «брати участь»."
      - statement: "Складнопідрядне речення має головну й підрядну частини."
        answer: true
      - statement: "Пряма мова виділяється лапками або тире."
        answer: true
      - statement: "«Він каже, що прийде» — пряма мова."
        answer: false
        correction: "Це непряма мова. Пряма: «Він каже: «Я прийду»»."
      - statement: "Дієслово «дати» — нерегулярне."
        answer: true

  - type: pattern_drill
    title: "Відмінювання та дієслова"
    prompt: "Утвори правильну форму"
    items:
      - given: "Я бачу (мати) → ?"
        answer: "матір"
      - given: "Немає (час) → ?"
        answer: "часу"
      - given: "Іду до (бібліотека) → ?"
        answer: "бібліотеки"
      - given: "Задоволений (подорож) → ?"
        answer: "подорожжю"
      - given: "Якби я знав, (прийти) раніше → ?"
        answer: "прийшов би"
      - given: "Завтра ми (читати) цю книгу → ?"
        answer: "читатимемо"
      - given: "Він (дати) мені відповідь → ?"
        answer: "дасть"
      - given: "Діти (вибігти) з класу → ?"
        answer: "вибігли"

  - type: build_sentence
    title: "Складне речення та письмо"
    instruction: "Склади речення"
    sentences:
      - words: ["Хоча", "він", "утомився", ",", "він", "продовжив", "працювати", "."]
        correct: "Хоча він утомився, він продовжив працювати."
      - words: ["Якщо", "матимеш", "час", ",", "зайди", "до", "бібліотеки", "."]
        correct: "Якщо матимеш час, зайди до бібліотеки."
      - words: ["Прошу", "надати", "мені", "відпустку", "з", "01.04", "по", "10.04", "."]
        correct: "Прошу надати мені відпустку з 01.04 по 10.04."
      - words: ["Рекомендую", "відвідати", "Софійський", "собор", "у", "Києві", "."]
        correct: "Рекомендую відвідати Софійський собор у Києві."
      - words: ["На", "мою", "думку", ",", "освіта", "—", "основа", "розвитку", "."]
        correct: "На мою думку, освіта — основа розвитку."
      - words: ["Він", "сказав", ",", "що", "прийде", "завтра", "."]
        correct: "Він сказав, що прийде завтра."

  - type: classify
    title: "Змішана класифікація"
    instruction: "Розподіли за категоріями"
    categories:
      - label: "Суржик (неправильно)"
        items:
          - "приймати участь"
          - "слідуючий"
          - "являється"
          - "на протязі"
          - "міроприємство"
      - label: "Офіційний стиль"
        items:
          - "Шановний пане"
          - "Прошу надати"
          - "Стосовно вашого запитання"
          - "Повідомляю, що"
          - "У зв'язку з"
      - label: "Фразеологізми"
        items:
          - "байдики бити"
          - "як з гуся вода"
          - "ні пуху ні пера"
          - "брати бика за роги"
          - "язик без кісток"
      - label: "Тип підрядного речення"
        items:
          - "часове: коли"
          - "причинове: тому що"
          - "умовне: якщо"
          - "допустове: хоча"
          - "означальне: який"

  - type: reading
    title: "Стаття: Освіта в Україні"
    text: |
      Система освіти в Україні включає кілька рівнів: дошкільна, початкова, базова середня, профільна середня та вища. Навчання в школі є обов'язковим і безкоштовним. Після дев'ятого класу учні можуть вступити до коледжу або продовжити навчання в ліцеї. ЗНО — зовнішнє незалежне оцінювання — є обов'язковим для вступу до університету. Реформа Нової української школи (НУШ) змінює підхід до навчання: менше зубріння, більше критичного мислення. На мою думку, ця реформа — крок у правильному напрямку, хоча вона потребує часу й ресурсів.
    questions:
      - question: "Які рівні освіти є в Україні?"
        answer: "Дошкільна, початкова, базова середня, профільна середня, вища."
      - question: "Що таке ЗНО?"
        answer: "Зовнішнє незалежне оцінювання для вступу до університету."
      - question: "Що змінює реформа НУШ?"
        answer: "Менше зубріння, більше критичного мислення."
      - question: "Яке речення — думка автора?"
        answer: "«На мою думку, ця реформа — крок у правильному напрямку.»"
      - question: "Що учні роблять після 9 класу?"
        answer: "Вступають до коледжу або продовжують навчання в ліцеї."

  - type: reading
    title: "Офіційний документ"
    text: |
      Директору КЗ «Ліцей № 7»
      Шевченку П. О.
      учениці 11-Б класу
      Коваленко Олени Іванівни

      ЗАЯВА

      Прошу допустити мене до складання ЗНО з української мови та літератури. Зобов'язуюсь підготувати всі необхідні документи до 15.03.2026.

      01.03.2026                                                     Коваленко О. І.
    questions:
      - question: "Хто написав заяву?"
        answer: "Учениця 11-Б класу Коваленко Олена Іванівна."
      - question: "Що просить учениця?"
        answer: "Допустити до складання ЗНО з української мови та літератури."
      - question: "До якого терміну вона зобов'язується підготувати документи?"
        answer: "До 15.03.2026."

  - type: proverb_drill
    title: "Приказка"
    proverb: "Без труда немає плода."
    source: "Народна мудрість"
    explanation: "Без зусиль нічого не досягнеш. Конструкція: без + родовий відмінок."
