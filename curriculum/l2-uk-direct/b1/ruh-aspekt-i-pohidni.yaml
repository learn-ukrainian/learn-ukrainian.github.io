module: ruh-aspekt-i-pohidni
track: l2-uk-direct
level: b1
type: grammar
title: "Дієслова руху: вид і похідні"
subtitle: "Видові пари префіксальних дієслів руху + віддієслівні іменники"
standard_ref: "§4.3 — префіксальні дієслова руху, видові пари; §4.4.1 — словотвір, віддієслівні іменники"
textbook_ref: "5 клас — дієслово, вид; 4 клас — дієслова руху з префіксами"
teaching_notes: |
  Передумова: А2 вже дав усі 8 префіксів руху (при-, ви-, за-, пере-, до-, від-, по-, об-).
  Тут — видові пари (доконаний vs недоконаний) і новий префікс у-/в- (увійти).
  Модель: доконаний (основа -іти) → недоконаний (основа -ходити). Аналогічно для їхати → їздити.
  Апостроф: від'їхати, з'їхати, в'їхати, об'їхати — після приголосного префікса перед «ї».
  Віддієслівні іменники: увійти → вхід, вийти → вихід тощо.
  Це ключовий модуль — зв'язок між граматикою руху та словотвором.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Доконаний (іти-основа) → недоконаний (ходити-основа). Від дієслів руху утворюються іменники: вийти → вихід."
  examples:
    - "прийти (одноразово) → приходити (багаторазово)"
    - "увійти → вхід; вийти → вихід"
    - "в'їхати (апостроф після префікса перед ї)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Видові пари префіксальних дієслів руху"
    columns: ["Доконаний (одноразова дія)", "Недоконаний (багаторазова дія)", "Значення"]
    rows:
      - ["прийти", "приходити", "прибути"]
      - ["вийти", "виходити", "вийти назовні"]
      - ["зайти", "заходити", "зайти ненадовго"]
      - ["перейти", "переходити", "перетнути"]
      - ["дійти", "доходити", "дістатися"]
      - ["відійти", "відходити", "відійти"]
      - ["увійти", "уходити", "увійти"]
      - ["обійти", "обходити", "обійти навколо"]

  - title: "Віддієслівні іменники від дієслів руху"
    columns: ["Дієслово", "Іменник", "Значення"]
    rows:
      - ["увійти", "вхід", "вхід (місце)"]
      - ["вийти", "вихід", "вихід (місце)"]
      - ["перейти", "перехід", "перехід, пішохідний перехід"]
      - ["обійти", "обхід", "обхід, об'їзд"]
      - ["в'їхати", "в'їзд", "в'їзд (для транспорту)"]
      - ["виїхати", "виїзд", "виїзд"]
      - ["зайти", "захід (сонця)", "захід сонця"]
      - ["підійти", "підхід", "підхід, наближення"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Видові пари (доконаний → недоконаний)"
    items:
      - word: "прийти"
        emoji: "\U000027A1"
        sentence: "Він прийшов додому о п'ятій."
      - word: "приходити"
        emoji: "\U0001F503"
        sentence: "Він приходить додому щодня о п'ятій."
      - word: "вийти"
        emoji: "\U0001F6AA"
        sentence: "Вона вийшла з кімнати."
      - word: "виходити"
        emoji: "\U0001F6AA"
        sentence: "Вона виходить на прогулянку щоранку."
      - word: "увійти"
        emoji: "\U0001F6AA"
        sentence: "Він увійшов до кабінету."
      - word: "уходити"
        emoji: "\U0001F6AA"
        sentence: "Студенти уходять до аудиторії щоранку."
      - word: "перейти"
        emoji: "\U0001F6B6"
        sentence: "Перейди дорогу на зеленому."
      - word: "переходити"
        emoji: "\U0001F6B6"
