# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Одноразова чи багаторазова дія?"
    instruction: "Розподіли дієслова: доконаний (одноразова) чи недоконаний (багаторазова)"
    categories:
      - label: "Доконаний (одноразова дія)"
        items:
          - "прийти"
          - "вийти"
          - "увійти"
          - "перейти"
          - "дійти"
          - "зайти"
      - label: "Недоконаний (багаторазова дія)"
        items:
          - "приходити"
          - "виходити"
          - "уходити"
          - "переходити"
          - "доходити"
          - "заходити"

  - type: pattern_drill
    title: "Утвори видову пару"
    prompt: "Від доконаного дієслова утвори недоконане"
    items:
      - given: "прийти → ?"
        answer: "приходити"
      - given: "вийти → ?"
        answer: "виходити"
      - given: "зайти → ?"
        answer: "заходити"
      - given: "перейти → ?"
        answer: "переходити"
      - given: "дійти → ?"
        answer: "доходити"
      - given: "відійти → ?"
        answer: "відходити"
      - given: "увійти → ?"
        answer: "уходити"
      - given: "обійти → ?"
        answer: "обходити"

  - type: build_sentence
    title: "Обери правильний вид"
    instruction: "Вибери доконаний або недоконаний вид залежно від контексту"
    sentences:
      - words: ["Він", "щодня", "[прийти/приходить]", "на", "роботу", "."]
        correct: "Він щодня приходить на роботу."
      - words: ["Вона", "вже", "[вийти/вийшла]", "з", "дому", "."]
        correct: "Вона вже вийшла з дому."
      - words: ["Діти", "завжди", "[переходити/переходять]", "дорогу", "тут", "."]
        correct: "Діти завжди переходять дорогу тут."
      - words: ["Він", "тільки", "що", "[увійти/увійшов]", "до", "кімнати", "."]
        correct: "Він тільки що увійшов до кімнати."
      - words: ["Лист", "[дійти/дійшов]", "за", "три", "дні", "."]
        correct: "Лист дійшов за три дні."
      - words: ["Вона", "часто", "[заходити/заходить]", "до", "кав'ярні", "."]
        correct: "Вона часто заходить до кав'ярні."
      - words: ["Автобус", "уже", "[відійти/відійшов]", "."]
        correct: "Автобус уже відійшов."
      - words: ["Туристи", "щоранку", "[обходити/обходять]", "музей", "."]
        correct: "Туристи щоранку обходять музей."
      - words: ["[Перейти/Перейди]", "дорогу", "на", "зеленому", "!"]
        correct: "Перейди дорогу на зеленому!"
      - words: ["Сонце", "вже", "[зайти/зайшло]", "."]
        correct: "Сонце вже зайшло."

  - type: pattern_drill
    title: "Утвори іменник від дієслова руху"
    prompt: "Від дієслова утвори іменник"
    items:
      - given: "увійти → ?"
        answer: "вхід"
      - given: "вийти → ?"
        answer: "вихід"
      - given: "перейти → ?"
        answer: "перехід"
      - given: "обійти → ?"
        answer: "обхід"
      - given: "в'їхати → ?"
        answer: "в'їзд"
      - given: "виїхати → ?"
        answer: "виїзд"
      - given: "підійти → ?"
        answer: "підхід"
      - given: "зайти (сонце) → ?"
        answer: "захід"

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "«Від'їхати» пишеться без апострофа."
        answer: false
        correction: "Правильно: від'їхати (апостроф після приголосного перед «ї»)."
      - statement: "«Приходити» — недоконаний вид від «прийти»."
        answer: true
      - statement: "«Вхід» утворено від «увійти»."
        answer: true
      - statement: "«Перехід» — це дієслово."
        answer: false
        correction: "«Перехід» — іменник, утворений від «перейти»."
      - statement: "Префікс у-/в- означає «увійти всередину»."
        answer: true

  - type: reading
    title: "Читання: Прогулянка містом"
    text: |
      Ми вийшли з готелю о дев'ятій ранку. Спочатку перейшли дорогу на пішохідному переході й дійшли до центральної площі. Зайшли до кав'ярні випити кави. Потім обійшли старе місто — вузькі вулички, давні будівлі. Увійшли до собору — всередині було тихо й прохолодно. На виході побачили гарний захід сонця. Увечері повернулися до готелю. Щодня ми приходили на цю площу — вона стала нашим улюбленим місцем.
    questions:
      - question: "Які доконані дієслова руху є в тексті?"
        answer: "Вийшли, перейшли, дійшли, зайшли, обійшли, увійшли, повернулися."
      - question: "Яке недоконане дієслово руху в тексті? Чому воно недоконане?"
        answer: "Приходили — багаторазова дія (щодня)."
      - question: "Які віддієслівні іменники від дієслів руху є в тексті?"
        answer: "Перехід (пішохідний перехід), вихід (на виході), захід (захід сонця)."
