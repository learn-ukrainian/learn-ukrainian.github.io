  - category: "Віддієслівні іменники"
    items:
      - word: "вхід"
        emoji: "\U0001F6AA"
        sentence: "Вхід до музею з правого боку."
      - word: "вихід"
        emoji: "\U0001F6AA"
        sentence: "Де аварійний вихід?"
      - word: "перехід"
        emoji: "\U0001F6B6"
        sentence: "Пішохідний перехід біля школи."
      - word: "обхід"
        emoji: "\U0001F504"
        sentence: "Лікар робить обхід щоранку."
      - word: "в'їзд"
        emoji: "\U0001F697"
        sentence: "В'їзд до паркінгу зліва."
      - word: "виїзд"
        emoji: "\U0001F697"
        sentence: "Виїзд з міста заблоковано."
      - word: "захід"
        emoji: "\U0001F305"
        sentence: "Захід сонця був дуже гарний."
      - word: "підхід"
        emoji: "\U0001F463"
        sentence: "Потрібен новий підхід до проблеми."
      - word: "зупинка"
