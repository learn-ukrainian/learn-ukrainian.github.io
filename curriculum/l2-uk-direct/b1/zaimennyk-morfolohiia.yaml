module: zaimennyk-morfolohiia
track: l2-uk-direct
level: b1
type: grammar
title: "Займенники: повна морфологія"
subtitle: "Вісім типів займенників та їхнє відмінювання"
standard_ref: "§4.2.1.4 — займенники (розширені)"
textbook_ref: "6 клас (Авраменко §89–103) — типи і відмінювання займенників"
teaching_notes: |
  Вісім типів: особові, присвійні, вказівні, питальні, відносні, зворотний, неозначені, заперечні.
  Зворотний «себе» — без називного відмінка! Це типова помилка: «себе» ≠ «я» у називному.
  Неозначені: хтось, щось, будь-хто, дехто, якийсь — пишуться через дефіс або разом.
  Заперечні: ніхто, ніщо, ніякий, нічий — «ні-» завжди разом. Але: ні в кого, ні з чим (прийменник розділяє).
  Подавайте типи поступово: спочатку знайомі (особові, присвійні), потім нові (неозначені, заперечні).

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "8 типів займенників. «Себе» — без називного. Неозначені: хтось, будь-хто. Заперечні: ніхто, ніщо."
  examples:
    - "Особовий: я, ти, він, вона, ми, ви, вони"
    - "Зворотний: себе → собі → себе → собою → на собі (без Н.в.!)"
    - "Неозначений: хтось прийшов, щось сталося"
    - "Заперечний: ніхто не прийшов, нічого не сталося"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Типи займенників"
    columns: ["Тип", "Приклади", "Питання"]
    rows:
      - ["Особові", "я, ти, він, вона, воно, ми, ви, вони", "—"]
      - ["Присвійні", "мій, твій, його, її, наш, ваш, їхній", "ЧИЙ?"]
      - ["Вказівні", "цей, той, такий, стільки", "ЯКИЙ?"]
      - ["Питальні", "хто, що, який, чий, скільки, котрий", "—"]
      - ["Відносні", "хто, що, який, чий (у підрядних)", "—"]
      - ["Зворотний", "себе (без називного!)", "—"]
      - ["Неозначені", "хтось, щось, будь-хто, дехто, якийсь", "—"]
      - ["Заперечні", "ніхто, ніщо, ніякий, нічий", "—"]

  - title: "Зворотний займенник «себе»"
    columns: ["Відмінок", "Форма", "Приклад"]
    rows:
      - ["Н.в.", "— (немає!)", "—"]
      - ["Р.в.", "себе", "Він не бачить себе"]
      - ["Д.в.", "собі", "Купи собі книгу"]
      - ["Зн.в.", "себе", "Вона бачить себе"]
      - ["О.в.", "собою", "Візьми з собою"]
      - ["М.в.", "(на) собі", "Він тримає на собі"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
