# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Визнач тип займенника"
    instruction: "Розподіли займенники за типами"
    categories:
      - label: "Особові"
        items:
          - "я"
          - "ти"
          - "він"
          - "ми"
          - "вони"
      - label: "Присвійні"
        items:
          - "мій"
          - "твій"
          - "наш"
          - "їхній"
          - "ваш"
      - label: "Вказівні"
        items:
          - "цей"
          - "той"
          - "такий"
          - "стільки"
      - label: "Неозначені"
        items:
          - "хтось"
          - "щось"
          - "будь-хто"
          - "якийсь"
          - "дехто"
      - label: "Заперечні"
        items:
          - "ніхто"
          - "ніщо"
          - "ніякий"
          - "нічий"
          - "ніколи"
      - label: "Зворотний"
        items:
          - "себе"
          - "собі"
          - "собою"

  - type: pattern_drill
    title: "Зворотний «себе» за відмінками"
    prompt: "Утвори правильну форму"
    items:
      - given: "себе → Р.в."
        answer: "себе"
      - given: "себе → Д.в."
        answer: "собі"
      - given: "себе → Зн.в."
        answer: "себе"
      - given: "себе → О.в."
        answer: "собою"
      - given: "себе → М.в."
        answer: "на собі"

  - type: build_sentence
    title: "Речення з неозначеними займенниками"
    instruction: "Доповни речення"
    sentences:
      - words: ["[Хтось/Ніхто]", "постукав", "у", "двері", "."]
        correct: "Хтось постукав у двері."
      - words: ["[Щось/Ніщо]", "сталося", "на", "вулиці", "."]
        correct: "Щось сталося на вулиці."
      - words: ["[Будь-хто/Ніхто]", "може", "взяти", "участь", "."]
        correct: "Будь-хто може взяти участь."
      - words: ["Купи", "[собі/себе]", "каву", "."]
        correct: "Купи собі каву."
      - words: ["Він", "дивиться", "на", "[себе/собі]", "в", "дзеркало", "."]
        correct: "Він дивиться на себе в дзеркало."
      - words: ["Візьми", "парасольку", "з", "[себе/собою]", "."]
        correct: "Візьми парасольку з собою."
      - words: ["[Деякі/Ніякі]", "студенти", "запізнилися", "."]
        correct: "Деякі студенти запізнилися."
      - words: ["Обирай", "[будь-який/ніякий]", "колір", "."]
        correct: "Обирай будь-який колір."
      - words: ["[Якийсь/Ніякий]", "чоловік", "шукає", "тебе", "."]
        correct: "Якийсь чоловік шукає тебе."
      - words: ["[Дехто/Ніхто]", "вважає", "по-іншому", "."]
        correct: "Дехто вважає по-іншому."

  - type: pattern_drill
    title: "Заперечні пари"
    prompt: "Утвори заперечний займенник"
    items:
      - given: "хтось → заперечення"
        answer: "ніхто"
      - given: "щось → заперечення"
        answer: "ніщо"
      - given: "якийсь → заперечення"
        answer: "ніякий"
      - given: "чийсь → заперечення"
        answer: "нічий"
      - given: "десь → заперечення"
        answer: "ніде"
      - given: "колись → заперечення"
        answer: "ніколи"
      - given: "скільки → заперечення"
        answer: "ніскільки"
      - given: "як → заперечення"
        answer: "ніяк"

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "«Себе» має називний відмінок."
        answer: false
        correction: "Зворотний займенник «себе» не має називного відмінка."
      - statement: "«Хтось» — це неозначений займенник."
        answer: true
      - statement: "«Ніхто» пишеться через дефіс: «ні-хто»."
        answer: false
        correction: "«Ніхто» пишеться разом."
      - statement: "Давальний від «себе» — «собі»."
        answer: true
      - statement: "«Ні в кого» пишеться разом: «нівкого»."
        answer: false
        correction: "Прийменник розділяє: ні в кого."
      - statement: "«Цей» — вказівний займенник."
        answer: true

  - type: reading
    title: "Читання: Дивний вечір"
    text: |
      Хтось постукав у двері. Марія відчинила — нікого. Щось дивне. Вона подивилася на себе в дзеркало — усе гаразд. Потім побачила якийсь пакунок на порозі. «Чий це?» — подумала вона. Нічий — ні імені, ні адреси. Вона сказала собі: «Треба подзвонити сусідові». Але ніхто не відповів. Ніколи ще Марія не почувала себе такою розгубленою. Тоді дехто із сусідів вийшов із квартири навпроти: «Це моє! Будь ласка, дайте мені!»
    questions:
      - question: "Хто постукав у двері?"
        answer: "Хтось (невідомо хто — неозначений займенник)."
      - question: "Що було на пакунку?"
        answer: "Нічого — ні імені, ні адреси (заперечні)."
      - question: "Що сказала Марія собі?"
        answer: "Треба подзвонити сусідові (зворотний: собі)."
