        sentence: "Хтось постукав у двері."
      - word: "щось"
        emoji: "\U00002753"
        sentence: "Щось сталося на вулиці."
      - word: "будь-хто"
        emoji: "\U0001F46B"
        sentence: "Будь-хто може прийти на свято."
      - word: "дехто"
        emoji: "\U0001F9D1"
        sentence: "Дехто вважає інакше."
      - word: "деякий"
        emoji: "\U0001F4CB"
        sentence: "Деякі студенти не прийшли."
      - word: "якийсь"
