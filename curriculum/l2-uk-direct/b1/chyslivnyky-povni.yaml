module: chyslivnyky-povni
track: l2-uk-direct
level: b1
type: grammar
title: "Числівники: повне відмінювання"
subtitle: "Кількісні 5–1000, складені, неозначені"
standard_ref: "§4.2.1.3 — розширене відмінювання числівників"
textbook_ref: "6 клас (Авраменко §76–88) — числівники повна парадигма"
teaching_notes: |
  Числівники 5–20, 30 відмінюються як іменники III відміни: п'ять → п'яти → п'ятьма.
  40, 90, 100 — особливі: сорок (Р./Д./О./М. → сорока), дев'яносто → дев'яноста, сто → ста.
  Складені: двадцять один, тридцять п'ять — перша частина відмінюється, «один» узгоджується.
  Неозначені: багато, мало, кілька, декілька, скільки + родовий множини.
  Порядкові (котрий?): перший, другий — відмінюються як прикметники.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "5–20, 30 → як III відміна: п'ять → п'яти → п'ятьма. 40/90/100 → особливі форми."
  examples:
    - "п'ять → п'яти → п'яти → п'ять → п'ятьма → на п'яти"
    - "сорок → сорока → сорока → сорок → сорока → на сорока"
    - "сто → ста → ста → сто → ста → на ста"
    - "двадцять один студент → двадцяти одного студента"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Відмінювання 5–20, 30"
    columns: ["Відмінок", "п'ять", "десять", "двадцять"]
    rows:
      - ["Н.в.", "п'ять", "десять", "двадцять"]
      - ["Р.в.", "п'яти", "десяти", "двадцяти"]
      - ["Д.в.", "п'яти", "десяти", "двадцяти"]
      - ["Зн.в.", "п'ять", "десять", "двадцять"]
      - ["О.в.", "п'ятьма", "десятьма", "двадцятьма"]
      - ["М.в.", "на п'яти", "на десяти", "на двадцяти"]

  - title: "Особливі: 40, 90, 100"
    columns: ["Відмінок", "сорок", "дев'яносто", "сто"]
    rows:
      - ["Н.в.", "сорок", "дев'яносто", "сто"]
      - ["Р.в.", "сорока", "дев'яноста", "ста"]
      - ["Д.в.", "сорока", "дев'яноста", "ста"]
      - ["Зн.в.", "сорок", "дев'яносто", "сто"]
      - ["О.в.", "сорока", "дев'яноста", "ста"]
      - ["М.в.", "на сорока", "на дев'яноста", "на ста"]

  - title: "Кількісні vs порядкові vs неозначені"
    columns: ["Тип", "Питання", "Приклади"]
    rows:
      - ["Кількісні", "СКІЛЬКИ?", "п'ять, десять, сто"]
      - ["Порядкові", "КОТРИЙ?", "перший, другий, десятий"]
      - ["Неозначені", "СКІЛЬКИ? (приблизно)", "багато, мало, кілька"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Числівники 5–20"
    items:
      - word: "п'ять"
        emoji: "\U0000270B"
        sentence: "П'ять студентів складали іспит."
      - word: "сім"
        emoji: "\U00000037\U000020E3"
        sentence: "У тижні сім днів."
      - word: "десять"
        emoji: "\U0001F51F"
        sentence: "Десять хвилин до уроку."
      - word: "двадцять"
        emoji: "\U0001F522"
        sentence: "Двадцять гривень за квиток."

  - category: "Особливі числівники"
    items:
      - word: "сорок"
        emoji: "\U0001F4AF"
        sentence: "Сорок учнів у класі."
      - word: "дев'яносто"
        emoji: "\U0001F522"
        sentence: "Дев'яносто відсотків роботи зроблено."
      - word: "сто"
        emoji: "\U0001F4AF"
        sentence: "Сто років тому тут було поле."
      - word: "тисяча"
        emoji: "\U0001F4B0"
        sentence: "Тисяча гривень за місяць."

  - category: "Неозначені числівники"
    items:
      - word: "багато"
        emoji: "\U0001F4E6"
        sentence: "Багато книг на полиці."
      - word: "мало"
        emoji: "\U0001F90F"
        sentence: "Мало часу залишилося."
      - word: "кілька"
        emoji: "\U0001F522"
        sentence: "Кілька студентів запізнилися."
      - word: "декілька"
        emoji: "\U0001F522"
        sentence: "Декілька хвилин зачекай."
      - word: "скільки"
        emoji: "\U00002753"
        sentence: "Скільки це коштує?"
      - word: "стільки"
        emoji: "\U00002757"
        sentence: "Стільки роботи!"

  - category: "Порядкові числівники"
    items:
      - word: "перший"
        emoji: "\U0001F947"
        sentence: "Перший урок починається о восьмій."
      - word: "другий"
        emoji: "\U0001F948"
        sentence: "Другий поверх — бібліотека."
      - word: "третій"
        emoji: "\U0001F949"
        sentence: "Третій тиждень канікул."
      - word: "десятий"
        emoji: "\U0001F522"
