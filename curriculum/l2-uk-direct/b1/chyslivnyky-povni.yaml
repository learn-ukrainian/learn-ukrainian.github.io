# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Провідміняй числівники"
    prompt: "Постав числівник у потрібний відмінок"
    items:
      - given: "п'ять → Р.в."
        answer: "п'яти"
      - given: "п'ять → О.в."
        answer: "п'ятьма"
      - given: "десять → Р.в."
        answer: "десяти"
      - given: "десять → О.в."
        answer: "десятьма"
      - given: "двадцять → Р.в."
        answer: "двадцяти"
      - given: "двадцять → О.в."
        answer: "двадцятьма"
      - given: "сорок → Р.в."
        answer: "сорока"
      - given: "сорок → О.в."
        answer: "сорока"
      - given: "сто → Р.в."
        answer: "ста"
      - given: "сто → О.в."
        answer: "ста"

  - type: build_sentence
    title: "Речення з числівниками"
    instruction: "Постав числівник у правильну форму"
    sentences:
      - words: ["У", "мене", "є", "[п'ять/п'яти]", "книг", "."]
        correct: "У мене є п'ять книг."
      - words: ["Ми", "чекали", "близько", "[двадцять/двадцяти]", "хвилин", "."]
        correct: "Ми чекали близько двадцяти хвилин."
      - words: ["У", "класі", "[сорок/сорока]", "учнів", "."]
        correct: "У класі сорок учнів."
      - words: ["Він", "заплатив", "більше", "[сто/ста]", "гривень", "."]
        correct: "Він заплатив більше ста гривень."
      - words: ["Завдання", "з", "[п'ять/п'яти/п'ятьма]", "задачами", "."]
        correct: "Завдання з п'ятьма задачами."
      - words: ["[Багато/Кілька]", "студентів", "складали", "іспит", "."]
        correct: "Багато студентів складали іспит."

  - type: pattern_drill
    title: "Складені числівники в контексті"
    prompt: "Провідміняй складений числівник"
    items:
      - given: "двадцять один (Н.в.)"
        answer: "двадцять один"
      - given: "двадцять один → Р.в."
        answer: "двадцяти одного"
      - given: "тридцять п'ять → Р.в."
        answer: "тридцяти п'яти"
      - given: "сто двадцять три → Р.в."
        answer: "ста двадцяти трьох"

  - type: classify
    title: "Порядковий, кількісний чи неозначений?"
    instruction: "Визнач тип числівника"
    categories:
      - label: "Кількісні (СКІЛЬКИ?)"
        items:
          - "п'ять"
          - "десять"
          - "сорок"
          - "сто"
          - "двадцять один"
      - label: "Порядкові (КОТРИЙ?)"
        items:
          - "перший"
          - "другий"
          - "десятий"
          - "сотий"
          - "третій"
      - label: "Неозначені"
        items:
          - "багато"
          - "мало"
          - "кілька"
          - "декілька"
          - "скільки"

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "«П'яти» — це родовий відмінок від «п'ять»."
        answer: true
      - statement: "Родовий від «сорок» — «сорок»."
        answer: false
        correction: "Родовий від «сорок» — «сорока»."
      - statement: "Неозначені числівники вживаються з родовим множини."
        answer: true
      - statement: "Орудний від «десять» — «десятьма»."
        answer: true
      - statement: "«Перший» відмінюється як іменник."
        answer: false
        correction: "Порядкові числівники відмінюються як прикметники."
      - statement: "Родовий від «сто» — «ста»."
        answer: true
