module: dialog-b1
track: l2-uk-direct
level: b1
type: practice
title: "Розширений діалог"
subtitle: "Діалоги на 10–12 реплік: скарги, лікар, подорож"
standard_ref: "§1.4 — діалог 10–12 реплік; нетипові ситуації: повернення, скарги, подорожі"
textbook_ref: "Grade 5–6 — діалогічне мовлення, етикет спілкування"
teaching_notes: |
  Діалоги на 10–12 реплік у нетипових ситуаціях: повернення товару, у лікаря,
  бронювання подорожі, звернення до органів влади, обговорення проекту на роботі.
  Ввічлива незгода: «Дозвольте не погодитися», «Я розумію, але...», «На жаль, не можу погодитися».
  Прагматичні функції: скарга, прохання, порада, відмова, вибачення, подяка.
  Не обмежуйтесь одним сценарієм — дайте різні ситуації.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Ввічлива незгода: Я розумію, але... / Дозвольте не погодитися... / На жаль..."
  examples:
    - "Я розумію вашу позицію, але маю іншу думку."
    - "Дозвольте не погодитися з цим рішенням."
    - "На жаль, не можу прийняти цю пропозицію."

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Ввічлива незгода"
    items:
      - word: "дозвольте не погодитися"
        emoji: "\U0001F91A"
        sentence: "Дозвольте не погодитися з вашою пропозицією."
      - word: "я розумію, але"
        emoji: "\U0001F914"
        sentence: "Я розумію, але мушу відмовитися."
      - word: "на жаль"
        emoji: "\U0001F614"
        sentence: "На жаль, це неможливо."
      - word: "з усією повагою"
        emoji: "\U0001F64F"
        sentence: "З усією повагою, я маю заперечення."

  - category: "Скарги та повернення"
    items:
      - word: "скарга"
        emoji: "\U0001F4E2"
        sentence: "Хочу подати скаргу на обслуговування."
      - word: "повернення"
        emoji: "\U0001F504"
        sentence: "Прошу оформити повернення товару."
      - word: "дефект"
        emoji: "\U0001F6A8"
        sentence: "Товар має дефект."
      - word: "гарантія"
        emoji: "\U0001F4C3"
        sentence: "Гарантія ще діє."
      - word: "обмін"
        emoji: "\U0001F501"
        sentence: "Можна обміняти на інший товар?"
      - word: "чек"
        emoji: "\U0001F9FE"
        sentence: "Ось чек на покупку."

  - category: "У лікаря"
    items:
      - word: "симптом"
        emoji: "\U0001FA7A"
        sentence: "Розкажіть про ваші симптоми."
      - word: "діагноз"
        emoji: "\U0001F4CB"
        sentence: "Лікар поставив діагноз."
      - word: "рецепт"
        emoji: "\U0001F48A"
        sentence: "Лікар виписав рецепт."
      - word: "обстеження"
        emoji: "\U0001F50D"
        sentence: "Потрібно пройти обстеження."
      - word: "аналізи"
        emoji: "\U0001F9EA"
        sentence: "Здайте аналізи крові."

  - category: "Подорожі та бронювання"
    items:
      - word: "бронювання"
        emoji: "\U0001F3E8"
        sentence: "Підтвердіть бронювання готелю."
      - word: "квиток"
        emoji: "\U0001F3AB"
        sentence: "Купіть квиток заздалегідь."
      - word: "рейс"
        emoji: "\U00002708"
        sentence: "Рейс затримали на годину."
      - word: "пересадка"
        emoji: "\U0001F504"
        sentence: "У Варшаві — пересадка."
      - word: "страхування"
        emoji: "\U0001F6E1"
        sentence: "Оформіть страхування подорожі."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: reading
    title: "Діалог: Повернення товару"
    text: |
      — Добрий день! Я хочу повернути цей телефон.
      — Добрий день. Що сталося?
      — Екран не працює. Я купив його три дні тому.
      — У вас є чек?
      — Так, ось він. І гарантія ще діє.
      — Зрозуміло. Можемо обміняти на новий або повернути гроші.
      — Я хотів би обміняти, якщо можна.
      — Звісно. Зачекайте хвилинку, я перевірю наявність.
      — Дякую. А скільки це займе часу?
      — Приблизно десять хвилин. Присідайте.
      — Добре, дякую за допомогу.
      — Будь ласка. Ось ваш новий телефон. Перевірте, будь ласка.
    questions:
      - question: "Чому покупець хоче повернути телефон?"
        answer: "Екран не працює."
      - question: "Які варіанти запропонував продавець?"
        answer: "Обміняти на новий або повернути гроші."
      - question: "Що обрав покупець?"
        answer: "Обміняти на новий телефон."

  - type: reading
    title: "Діалог: У лікаря"
    text: |
      — Добрий день, лікарю.
      — Добрий день. На що скаржитесь?
      — У мене болить голова вже три дні. І температура тримається 37,5.
      — Горло болить? Нежить є?
      — Горло трохи болить. Нежиті немає, але є кашель.
      — Давайте я вас послухаю. Дихайте глибоко.
      — Добре.
      — Легені чисті. Схоже на вірусну інфекцію. Потрібно здати аналізи крові.
      — Де їх здавати?
      — У лабораторії на першому поверсі. Результати будуть завтра.
      — А що мені робити зараз?
      — Я випишу рецепт. Пийте багато рідини й відпочивайте.
    questions:
      - question: "Які симптоми описав пацієнт?"
        answer: "Головний біль три дні, температура 37,5, біль у горлі, кашель."
      - question: "Який попередній діагноз?"
        answer: "Вірусна інфекція."
      - question: "Що порадив лікар?"
        answer: "Здати аналізи, пити рідину, відпочивати."

  - type: build_sentence
    title: "Заверши репліку"
    instruction: "Обери правильне продовження"
    sentences:
      - words: ["Дозвольте", "не", "погодитися", "з", "вашою", "пропозицією", "."]
        correct: "Дозвольте не погодитися з вашою пропозицією."
      - words: ["Я", "розумію", ",", "але", "мушу", "відмовитися", "."]
        correct: "Я розумію, але мушу відмовитися."
      - words: ["На", "жаль", ",", "це", "не", "підходить", "."]
        correct: "На жаль, це не підходить."
      - words: ["Чи", "можна", "обміняти", "цей", "товар", "?"]
        correct: "Чи можна обміняти цей товар?"
      - words: ["Мені", "потрібно", "здати", "аналізи", "крові", "."]
        correct: "Мені потрібно здати аналізи крові."

  - type: pattern_drill
    title: "Ввічлива незгода"
    prompt: "Скажи те саме ввічливо"
    items:
      - given: "Ні, це неправильно → ?"
        answer: "Дозвольте не погодитися."
      - given: "Не хочу → ?"
        answer: "На жаль, не можу."
      - given: "Це дурниця → ?"
        answer: "Я маю іншу точку зору."
      - given: "Не буду цього робити → ?"
        answer: "Я розумію, але мушу відмовитися."
      - given: "Ви помиляєтесь → ?"
        answer: "З усією повагою, я бачу це інакше."
      - given: "Мені все одно → ?"
        answer: "Дякую за пропозицію, але це не для мене."

  - type: classify
    title: "Прагматична функція"
    instruction: "Розподіли фрази: скарга, прохання, порада чи відмова?"
    categories:
      - label: "Скарга"
        items:
          - "Цей товар має дефект."
          - "Обслуговування було жахливим."
          - "Я незадоволений якістю."
          - "Хочу подати скаргу."
      - label: "Прохання"
        items:
          - "Чи можна обміняти?"
          - "Будь ласка, поясніть."
          - "Прошу допомогти."
          - "Не могли б ви перевірити?"
      - label: "Порада"
        items:
          - "Раджу пити більше рідини."
          - "Вам варто відпочити."
          - "Рекомендую здати аналізи."
          - "Краще поїхати вранці."
      - label: "Відмова"
        items:
          - "На жаль, не можу."
          - "Мушу відмовитися."
          - "Це мені не підходить."
          - "Дякую, але ні."

  - type: reading
    title: "Діалог: Бронювання подорожі"
    text: |
      — Добрий день! Хочу забронювати поїздку до Львова.
      — Добрий день! Коли плануєте їхати?
      — На наступних вихідних, у п'ятницю ввечері.
      — Поїздом чи автобусом?
      — А що дешевше?
      — Автобус — 350 гривень, поїзд — 500, але зручніший.
      — Візьму поїзд. А готель можете порадити?
      — Так, є готель у центрі — 1200 гривень за ніч. Або хостел — 400.
      — Готель, будь ласка. На дві ночі.
      — Добре. Страхування подорожі оформити?
      — Так, оформіть.
      — Усе готово. Загальна вартість — 3900 гривень. Оплата карткою?
    questions:
      - question: "Куди їде клієнт?"
        answer: "До Львова."
      - question: "Який транспорт обрав клієнт і чому?"
        answer: "Поїзд, бо він зручніший."
      - question: "Скільки коштує подорож загалом?"
        answer: "3900 гривень."
