# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Утвори множину"
    prompt: "Постав іменник у називний відмінок множини"
    items:
      - given: "книга"
        answer: "книги"
      - given: "стіл"
        answer: "столи"
      - given: "вікно"
        answer: "вікна"
      - given: "ніч"
        answer: "ночі"
      - given: "теля"
        answer: "телята"
      - given: "друг"
        answer: "друзі"
      - given: "село"
        answer: "села"
      - given: "дитина"
        answer: "діти"
      - given: "людина"
        answer: "люди"
      - given: "ім'я"
        answer: "імена"
      - given: "курча"
        answer: "курчата"
      - given: "камінь"
        answer: "камені"
      - given: "сон"
        answer: "сни"
      - given: "день"
        answer: "дні"
      - given: "вухо"
        answer: "вуха"
      - given: "око"
        answer: "очі"
      - given: "рік"
        answer: "роки"
      - given: "хлопець"
        answer: "хлопці"
      - given: "школа"
        answer: "школи"
      - given: "поле"
        answer: "поля"

  - type: pattern_drill
    title: "Родовий множини"
    prompt: "Постав іменник у родовий множини"
    items:
      - given: "книга → Р.в. мн."
        answer: "книг"
      - given: "стіл → Р.в. мн."
        answer: "столів"
      - given: "вікно → Р.в. мн."
        answer: "вікон"
      - given: "яблуко → Р.в. мн."
        answer: "яблук"
      - given: "ніч → Р.в. мн."
        answer: "ночей"
      - given: "студент → Р.в. мн."
        answer: "студентів"
      - given: "помідор → Р.в. мн."
        answer: "помідорів"
      - given: "теля → Р.в. мн."
        answer: "телят"
      - given: "ім'я → Р.в. мн."
        answer: "імен"
      - given: "річ → Р.в. мн."
        answer: "речей"

  - type: classify
    title: "Pluralia tantum чи singularia tantum?"
    instruction: "Розподіли іменники"
    categories:
      - label: "Pluralia tantum (лише множина)"
        items:
          - "двері"
          - "штани"
          - "канікули"
          - "ножиці"
          - "окуляри"
          - "Карпати"
      - label: "Singularia tantum (лише однина)"
        items:
          - "молоко"
          - "сміх"
          - "здоров'я"
          - "Київ"
          - "сміття"
          - "хоробрість"

  - type: build_sentence
    title: "Речення з множиною"
    instruction: "Постав слово у правильну форму множини"
    sentences:
      - words: ["Купи", "три", "кілограми", "[яблуко/яблук]", "."]
        correct: "Купи три кілограми яблук."
      - words: ["Багато", "[студент/студентів]", "складали", "іспит", "."]
        correct: "Багато студентів складали іспит."
      - words: ["У", "парку", "гралися", "п'ятеро", "[дитина/дітей]", "."]
        correct: "У парку гралися п'ятеро дітей."
      - words: ["[Канікула/Канікули]", "закінчаться", "у", "вересні", "."]
        correct: "Канікули закінчаться у вересні."

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "«Канікули» має форму однини."
        answer: false
        correction: "Pluralia tantum — лише множина."
      - statement: "Родовий множини від «книга» — «книг»."
        answer: true
      - statement: "Множина від «дитина» — «дитини»."
        answer: false
        correction: "Множина від «дитина» — «діти»."
      - statement: "Родовий множини від «ніч» — «ночей»."
        answer: true
      - statement: "Множина від «око» — «ока»."
        answer: false
        correction: "Множина від «око» — «очі»."
      - statement: "Давальний множини закінчується на -ам/-ям для всіх відмін."
        answer: true

  - type: riddle
    title: "Загадка про множину"
    clues:
      - "Мають вуха, а не чують."
      - "Мають рот, а не говорять."
    answer: "ляльки"

  - type: riddle
    title: "Загадка про множину (2)"
    clues:
      - "Без них не побачиш далеко, хоч очі є."
    answer: "окуляри"

  - type: reading
    title: "Читання: На базарі"
    text: |
      На базарі було багато людей. Продавці кричали: «Яблука! Помідори! Груші!» Марія купила два кілограми яблук, кілограм помідорів і пів кілограма полуниць. Потім вона зайшла до крамниці. На полицях стояли книги. Марія вибрала три книги для дітей. Біля дверей магазину сиділо двоє кошенят. Марія погладила їх і пішла додому.
    questions:
      - question: "Скільки яблук купила Марія?"
        answer: "Два кілограми яблук."
      - question: "Для кого Марія купила книги?"
        answer: "Для дітей."
      - question: "Хто сидів біля дверей?"
        answer: "Двоє кошенят."
