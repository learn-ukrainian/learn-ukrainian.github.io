module: mnozhyna-vidminky
track: l2-uk-direct
level: b1
type: grammar
title: "Множина: відмінювання"
subtitle: "Множинні парадигми всіх відмін"
standard_ref: "§4.2.1.1 — множинні парадигми"
textbook_ref: "6 клас (Авраменко §53) — множина іменників"
teaching_notes: |
  Множина має уніфіковані закінчення для Д.в. (-ам/-ям), О.в. (-ами/-ями), М.в. (-ах/-ях).
  Найскладніше — родовий множини: ∅ (із чергуванням), -ів, -ей, -їв. Залежить від відміни та роду.
  Pluralia tantum (лише множина): двері, штани, канікули, Карпати. Singularia tantum: молоко, сміх, Київ.
  Називний множини: -и/-і (більшість), -а (середній рід: вікна, села), -ї (після голосних).
  Зверніть увагу на біглі голосні: сон → сни (о випадає), день → дні (е випадає).

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Множина: Д.в. -ам/-ям, О.в. -ами/-ями, М.в. -ах/-ях — однакові для всіх відмін."
  examples:
    - "книги → книг → книгам → книги → книгами → у книгах"
    - "столи → столів → столам → столи → столами → на столах"
    - "ночі → ночей → ночам → ночі → ночами → у ночах"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Множина — типові закінчення"
    columns: ["Відмінок", "Закінчення", "Приклади"]
    rows:
      - ["Н.в.", "-и, -і, -ї, -а", "книги, ночі, надії, вікна"]
      - ["Р.в.", "∅, -ів, -ей, -їв", "книг, столів, ночей, надій"]
      - ["Д.в.", "-ам, -ям", "книгам, столам, ночам"]
      - ["Зн.в.", "= Н.в. або Р.в.", "книги, столи / котів"]
      - ["О.в.", "-ами, -ями", "книгами, столами, ночами"]
      - ["М.в.", "-ах, -ях", "у книгах, на столах, у ночах"]
      - ["Кл.в.", "= Н.в.", "друзі!, брати!"]

  - title: "Родовий множини — основні моделі"
    columns: ["Відміна / рід", "Закінчення", "Приклади"]
    rows:
      - ["I відміна", "∅ (нульове)", "книг, хат, земель, доріг"]
      - ["II відм., чол.", "-ів / -ей", "столів, учителів, ночей"]
      - ["II відм., сер.", "∅ / -ів", "вікон, полів, знань"]
      - ["III відміна", "-ей", "ночей, подорожей, речей"]
      - ["IV відміна", "-ят / -ен", "телят, курчат, імен"]

