module: checkpoint-vidminky
track: l2-uk-direct
level: b1
type: checkpoint
title: "Контрольна точка: система відмінювання"
subtitle: "Перевірка знань усіх чотирьох відмін"
standard_ref: "§4.2.1.1 — повна перевірка відмінювання іменників"
textbook_ref: "6 клас (Авраменко §47–53) — узагальнення відмін"
teaching_notes: |
  Контрольна точка охоплює: 4 відміни × 3 групи, родовий -а/-я vs -у/-ю, III/IV відміну, множину.
  Поріг проходження: 70%. Якщо менше — повторіть слабкі модулі.
  Завдання різних типів: pattern_drill, classify, build_sentence, reading, true_false.
  Оцінюйте не лише правильність форми, а й розуміння принципу (чому саме таке закінчення).
  Зверніть увагу на найчастіші помилки: родовий -а/-у, подвоєння в О.в. III відміни, pluralia tantum.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Повна система: I відміна (-а/-я), II відміна (чол.+сер.), III відміна (жін. ∅), IV відміна (-ят/-ен). Однина + множина."
  examples:
    - "школа (I) → школи, школі, школу, школою, у школі"
    - "кіт (II чол.) → кота, котові, кота, котом, на коті"
    - "ніч (III) → ночі, ночі, ніч, ніччю, у ночі"
    - "теля (IV) → теляти, теляті, теля, телятям, на теляті"

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Відмінювання: змішані завдання (1)"
    prompt: "Постав іменник у потрібний відмінок"
    items:
      - given: "школа → О.в."
        answer: "школою"
      - given: "кіт → Р.в."
        answer: "кота"
      - given: "ніч → О.в."
        answer: "ніччю"
      - given: "ім'я → Р.в."
        answer: "імені"
      - given: "земля → М.в."
        answer: "на землі"
      - given: "друг → Д.в."
        answer: "другові / другу"
      - given: "сіль → О.в."
        answer: "сіллю"
      - given: "теля → Р.в."
        answer: "теляти"

  - type: pattern_drill
    title: "Відмінювання: змішані завдання (2)"
    prompt: "Постав іменник у потрібний відмінок"
    items:
      - given: "село → Р.в."
        answer: "села"
      - given: "подорож → О.в."
        answer: "подорожжю"
      - given: "учитель → Кл.в."
        answer: "учителю"
      - given: "мама → Кл.в."
        answer: "мамо"
      - given: "знання → О.в."
        answer: "знанням"
      - given: "площа → Р.в."
        answer: "площі"
      - given: "борщ → О.в."
        answer: "борщем"
      - given: "любов → Р.в."
        answer: "любові"

  - type: pattern_drill
    title: "Родовий: -а/-я чи -у/-ю?"
    prompt: "Утвори родовий відмінок"
    items:
      - given: "стіл (предмет)"
        answer: "стола"
      - given: "страх (абстрактне)"
        answer: "страху"
      - given: "Київ (місто)"
        answer: "Києва"
      - given: "університет (установа)"
        answer: "університету"
      - given: "долар (одиниця)"
        answer: "долара"
      - given: "сніг (речовина)"
        answer: "снігу"
      - given: "лікар (людина)"
        answer: "лікаря"
      - given: "рух (процес)"
        answer: "руху"

  - type: pattern_drill
    title: "Множина: називний і родовий"
    prompt: "Утвори форму множини"
    items:
      - given: "книга → Н.в. мн."
        answer: "книги"
      - given: "стіл → Н.в. мн."
        answer: "столи"
      - given: "ніч → Н.в. мн."
        answer: "ночі"
      - given: "яблуко → Р.в. мн."
        answer: "яблук"
      - given: "студент → Р.в. мн."
        answer: "студентів"
      - given: "теля → Н.в. мн."
        answer: "телята"
      - given: "дитина → Н.в. мн."
        answer: "діти"
      - given: "око → Н.в. мн."
        answer: "очі"

  - type: classify
    title: "Визнач відміну (змішане)"
    instruction: "Розподіли іменники за відмінами"
    categories:
      - label: "I відміна"
        items:
          - "вулиця"
          - "пісня"
          - "хата"
          - "груша"
      - label: "II відміна"
        items:
          - "хлопець"
          - "море"
          - "село"
          - "камінь"
      - label: "III відміна"
        items:
          - "радість"
          - "подорож"
          - "кров"
          - "тінь"
      - label: "IV відміна"
        items:
          - "курча"
          - "полум'я"
          - "козеня"
          - "ім'я"

  - type: classify
    title: "Тверда, м'яка чи мішана?"
    instruction: "Визнач групу"
    categories:
      - label: "Тверда"
        items:
          - "школа"
          - "кіт"
          - "вікно"
          - "мама"
      - label: "М'яка"
        items:
          - "земля"
          - "зять"
          - "поле"
          - "пісня"
      - label: "Мішана"
        items:
          - "круча"
          - "кущ"
          - "плече"
          - "площа"

  - type: classify
    title: "Pluralia tantum чи singularia tantum?"
    instruction: "Розподіли іменники"
    categories:
      - label: "Pluralia tantum"
        items:
          - "двері"
          - "окуляри"
          - "канікули"
          - "Карпати"
      - label: "Singularia tantum"
        items:
          - "молоко"
          - "здоров'я"
          - "сміх"
          - "Київ"

  - type: classify
    title: "Конкретне (-а/-я) чи абстрактне (-у/-ю)?"
    instruction: "Визнач закінчення родового за категорією"
    categories:
      - label: "-а/-я (конкретне)"
        items:
          - "олівець → олівця"
          - "Львів → Львова"
          - "кілограм → кілограма"
          - "учень → учня"
      - label: "-у/-ю (абстрактне)"
        items:
          - "розум → розуму"
          - "вокзал → вокзалу"
          - "цукор → цукру"
          - "прогрес → прогресу"

  - type: build_sentence
    title: "Побудуй речення (1)"
    instruction: "Обери правильну форму"
    sentences:
      - words: ["Я", "написав", "листа", "[учитель/учителю/учителеві]", "."]
        correct: "Я написав листа учителеві."
      - words: ["Без", "[сіль/солі/сіллю]", "страва", "несмачна", "."]
        correct: "Без солі страва несмачна."

  - type: build_sentence
    title: "Побудуй речення (2)"
    instruction: "Обери правильну форму"
    sentences:
      - words: ["На", "[площа/площі]", "стояв", "пам'ятник", "."]
        correct: "На площі стояв пам'ятник."
      - words: ["Він", "приїхав", "з", "[Одеса/Одеси]", "."]
        correct: "Він приїхав з Одеси."

  - type: build_sentence
    title: "Побудуй речення (3)"
    instruction: "Обери правильну форму"
    sentences:
      - words: ["Від", "[страх/страху]", "він", "закричав", "."]
        correct: "Від страху він закричав."
      - words: ["Кличний:", "[Оксана/Оксано]", ",", "допоможи", "!"]
        correct: "Оксано, допоможи!"

  - type: build_sentence
    title: "Побудуй речення (4)"
    instruction: "Обери правильну форму"
    sentences:
      - words: ["Багато", "[студент/студентів]", "прийшло", "на", "лекцію", "."]
        correct: "Багато студентів прийшло на лекцію."
      - words: ["[Ім'я/Імені]", "цього", "хлопця", "—", "Тарас", "."]
        correct: "Ім'я цього хлопця — Тарас."

  - type: reading
    title: "Читання: Лист із Карпат"
    text: |
      Привіт! Пишу тобі з Карпат. Тут неймовірна краса! Ми піднялися на гору і побачили широке поле внизу. Біля річки стояло маленьке село. В одній хаті ми купили домашнього сиру, хліба і меду. Ціна кілограма сиру — лише п'ятдесят гривень. Увечері ми сиділи біля вогню. Полум'я освітлювало обличчя друзів. Ніч у горах — це справжня розкіш. Тиша, зорі і свіже повітря.
    questions:
      - question: "Звідки пише автор?"
        answer: "З Карпат."
      - question: "Що купили в хаті?"
        answer: "Сиру, хліба і меду (усе в родовому відмінку)."
      - question: "Що освітлювало обличчя друзів?"
        answer: "Полум'я (IV відміна)."

  - type: reading
    title: "Читання: Базарний день"
    text: |
      На базарі зібралося багато людей. Продавець кричав: «Три кілограми яблук за тридцять гривень!» Молода жінка купувала помідори. «Скільки коштує кілограм помідорів?» — запитала вона. Біля дверей крамниці сиділа бабуся з кошиком полуниць. Діти просили канікул — ще три тижні до літа! Сміх дітей лунав над площею.
    questions:
      - question: "Скільки коштували яблука?"
        answer: "Три кілограми за тридцять гривень."
      - question: "Що продавала бабуся?"
        answer: "Полуниці (Р.в. мн.: полуниць)."
      - question: "Чого просили діти?"
        answer: "Канікул (pluralia tantum, Р.в.)."

  - type: true_false
    title: "Правильно чи неправильно? (1)"
    items:
      - statement: "Орудний від «ніч» — «ніччю»."
        answer: true
      - statement: "Родовий від «університет» — «університета»."
        answer: false
        correction: "Установа → -у: університету."
      - statement: "«Двері» має форму однини."
        answer: false
        correction: "Pluralia tantum — лише множина."

  - type: true_false
    title: "Правильно чи неправильно? (2)"
    items:
      - statement: "Кличний від «Марія» — «Маріє»."
        answer: true
      - statement: "«Знання» — I відміна."
        answer: false
        correction: "«Знання» — II відміна, середній рід."
      - statement: "Множина від «око» — «очі»."
        answer: true

  - type: true_false
    title: "Правильно чи неправильно? (3)"
    items:
      - statement: "Родовий від «сніг» — «снігу»."
        answer: true
      - statement: "«Подорож» — I відміна."
        answer: false
        correction: "«Подорож» — III відміна (жін. рід, нульове закінчення)."
      - statement: "Родовий множини від «книга» — «книг»."
        answer: true

  - type: true_false
    title: "Правильно чи неправильно? (4)"
    items:
      - statement: "Кличний від «друг» — «друже»."
        answer: true
      - statement: "Орудний від «сіль» — «сілю»."
        answer: false
        correction: "Подвоєння: сіль → сіллю."
      - statement: "Родовий від «теля» — «теляти»."
        answer: true

  - type: true_false
    title: "Правильно чи неправильно? (5)"
    items:
      - statement: "«Лоша» — III відміна."
        answer: false
        correction: "«Лоша» — IV відміна (середній рід, -ят-)."
      - statement: "Давальний від «брат» — «братові» або «брату»."
        answer: true
      - statement: "Множина від «дитина» — «діти»."
        answer: true

  - type: true_false
    title: "Правильно чи неправильно? (6)"
    items:
      - statement: "Родовий від «метр» — «метру»."
        answer: false
        correction: "Одиниця виміру → -а: метра."
      - statement: "«Камінь» — II відміна, м'яка група."
        answer: true
      - statement: "Орудний від «любов» — «любов'ю»."
        answer: true
