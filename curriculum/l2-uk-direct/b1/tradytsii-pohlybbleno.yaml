module: tradytsii-pohlybbleno
track: l2-uk-direct
level: b1
type: vocabulary
title: "Українські традиції: поглиблено"
subtitle: "Обряди, звичаї, свята, традиційна їжа"
standard_ref: "Каталог Б — Традиції (розширено на B1)"
textbook_ref: "Grade 5–6 — народні звичаї, обряди, свята"
teaching_notes: |
  Розширення теми A2 «Свята й традиції». Тут — обряди, деталі звичаїв.
  Різдво: колядки, щедрівки, вертеп, кутя, узвар.
  Великдень: писанки, паска, гаївки, кошик.
  Весілля: рушник, вишиванка, каравай, бгатьки.
  Загальне: калина, бандура, ярмарок, вечорниці.
  Конструкція: «На Різдво прийнято...», «Традиційно на весіллі...».

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "На [свято] прийнято [дія]. Традиційно [хто] [що робить]."
  examples:
    - "На Різдво прийнято співати колядки."
    - "Традиційно на весіллі молодих зустрічають з караваєм."
    - "На Великдень освячують кошик із паскою."

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Різдвяні традиції"
    items:
      - word: "колядки"
        emoji: "\U0001F3B6"
        sentence: "На Різдво діти ходять і співають колядки."
      - word: "щедрівки"
        emoji: "\U0001F3B5"
        sentence: "Щедрівки співають на Старий Новий рік."
      - word: "вертеп"
        emoji: "\U00002B50"
        sentence: "Вертеп — різдвяна вистава."
      - word: "кутя"
        emoji: "\U0001F35A"
        sentence: "Кутя — головна страва Святвечора."
      - word: "узвар"
        emoji: "\U0001F375"
        sentence: "Узвар — напій із сухофруктів."

  - category: "Великодні традиції"
    items:
      - word: "писанка"
        emoji: "\U0001F95A"
        sentence: "Писанка — розмальоване великоднє яйце."
      - word: "паска"
        emoji: "\U0001F35E"
        sentence: "На Великдень печуть паску."
      - word: "кошик"
        emoji: "\U0001F9FA"
        sentence: "Кошик з їжею несуть до церкви на освячення."
      - word: "гаївки"
        emoji: "\U0001F483"
        sentence: "Гаївки — весняні хороводні пісні."

  - category: "Весільні традиції"
    items:
      - word: "рушник"
        emoji: "\U0001F9E3"
        sentence: "Молодих ставлять на рушник."
      - word: "вишиванка"
        emoji: "\U0001F455"
        sentence: "На весіллі наречена у вишиванці."
      - word: "каравай"
        emoji: "\U0001F35E"
        sentence: "Каравай — весільний хліб."
      - word: "весілля"
        emoji: "\U0001F492"
        sentence: "Українське весілля — це свято для всього села."
      - word: "хрестини"
        emoji: "\U0001F476"
        sentence: "Хрестини — обряд хрещення дитини."

  - category: "Загальні символи та традиції"
    items:
      - word: "обряд"
        emoji: "\U0001F3AD"
        sentence: "Обряд — давній ритуал."
      - word: "звичай"
        emoji: "\U0001F4DC"
        sentence: "Цей звичай передається з покоління в покоління."
      - word: "калина"
        emoji: "\U0001F343"
        sentence: "Калина — символ України."
      - word: "бандура"
        emoji: "\U0001F3B6"
        sentence: "Бандура — український народний інструмент."
      - word: "ярмарок"
        emoji: "\U0001F3AA"
        sentence: "На ярмарку продають вироби ручної роботи."
      - word: "вечорниці"
        emoji: "\U0001F319"
        sentence: "Вечорниці — зимові зібрання молоді."
      - word: "паляниця"
        emoji: "\U0001F35E"
        sentence: "Паляниця — круглий пшеничний хліб."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Яке свято?"
    instruction: "Розподіли: Різдво, Великдень, весілля чи загальне?"
    categories:
      - label: "Різдво"
        items:
          - "колядки"
          - "щедрівки"
          - "вертеп"
          - "кутя"
          - "узвар"
      - label: "Великдень"
        items:
          - "писанка"
          - "паска"
          - "кошик"
          - "гаївки"
      - label: "Весілля"
        items:
          - "каравай"
          - "рушник"
          - "вишиванка"
      - label: "Загальне"
        items:
          - "калина"
          - "бандура"
          - "ярмарок"
          - "вечорниці"

  - type: build_sentence
    title: "Опиши традицію"
    instruction: "Склади речення про українську традицію"
    sentences:
      - words: ["На", "Різдво", "прийнято", "співати", "колядки", "."]
        correct: "На Різдво прийнято співати колядки."
      - words: ["На", "Великдень", "освячують", "кошик", "із", "паскою", "."]
        correct: "На Великдень освячують кошик із паскою."
      - words: ["Молодих", "зустрічають", "із", "караваєм", "на", "рушнику", "."]
        correct: "Молодих зустрічають із караваєм на рушнику."
      - words: ["Писанка", "—", "це", "розмальоване", "великоднє", "яйце", "."]
        correct: "Писанка — це розмальоване великоднє яйце."
      - words: ["Калина", "—", "символ", "України", "."]
        correct: "Калина — символ України."

  - type: reading
    title: "Українське весілля"
    text: |
      Українське весілля — це не просто свято, а цілий обряд із давніми традиціями. Спочатку молодий приходить із дружбами до хати молодої — це «викуп». Потім молодих ведуть до церкви на вінчання. Після церкви їх зустрічають батьки з караваєм і сіллю на рушнику. Молоді кланяються батькам і цілують каравай. На святковому столі — традиційні страви: вареники, голубці, холодець. Увечері гості танцюють і співають. Традиційно наречена кидає букет — хто зловить, той наступний одружиться.
    questions:
      - question: "Що таке «викуп» на весіллі?"
        answer: "Молодий приходить із дружбами до хати молодої."
      - question: "Як батьки зустрічають молодих?"
        answer: "З караваєм і сіллю на рушнику."
      - question: "Які традиційні страви згадано?"
        answer: "Вареники, голубці, холодець."

  - type: proverb_drill
    title: "Приказка"
    proverb: "Яка хата, такий тин; який батько, такий син."
    source: "Народна мудрість"
    explanation: "Діти схожі на батьків — у характері й поведінці. Порівняльна конструкція: який..., такий..."

  - type: true_false
    title: "Традиції"
    items:
      - statement: "Кутю готують на Великдень."
        answer: false
        correction: "Кутя — головна страва Святвечора (перед Різдвом)."
      - statement: "Писанка — розмальоване великоднє яйце."
        answer: true
      - statement: "Щедрівки співають на Великдень."
        answer: false
        correction: "Щедрівки співають на Старий Новий рік (13 січня)."
      - statement: "На весіллі молодих зустрічають із караваєм."
        answer: true
      - statement: "Бандура — це духовий інструмент."
        answer: false
        correction: "Бандура — струнний інструмент."
      - statement: "Калина — символ України."
        answer: true
