module: checkpoint-pysannia
track: l2-uk-direct
level: b1
type: checkpoint
title: "Контрольна: письмо та комунікація"
subtitle: "Перевірка модулів 35–39: документи, переказ, відгук, діалог"
standard_ref: "§1.1–1.4 — офіційні документи, переказ, відгук, аудіювання, діалог"
textbook_ref: "Grade 5–6 — письмо, аудіювання, діалогічне мовлення"
teaching_notes: |
  Контрольна охоплює: офіційне письмо (заява, автобіографія), переказ (стислий, вибірковий),
  відгук (на книгу/фільм), аудіювання (факт/думка), розширений діалог.
  Поріг: 70%. Завдання різних типів і рівнів складності.
  Не підказуйте — це оцінювання.

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Офіційне письмо (повторення)"
    items:
      - word: "заява"
        emoji: "\U0001F4C4"
        sentence: "Напишіть заяву на ім'я директора."
      - word: "довідка"
        emoji: "\U0001F4CB"
        sentence: "Довідка підтверджує факт."
      - word: "автобіографія"
        emoji: "\U0001F4DD"
        sentence: "Автобіографія — хронологічний опис життя."
      - word: "прошу"
        emoji: "\U0001F64F"
        sentence: "Прошу надати мені відпустку."
      - word: "підпис"
        emoji: "\U0000270D"
        sentence: "Поставте підпис."

  - category: "Переказ і відгук (повторення)"
    items:
      - word: "стислий переказ"
        emoji: "\U0001F4DD"
        sentence: "Перекажіть стисло у трьох реченнях."
      - word: "відгук"
        emoji: "\U0001F4AC"
        sentence: "Напишіть відгук на фільм."
      - word: "враження"
        emoji: "\U00002728"
        sentence: "Мої враження — позитивні."
      - word: "рекомендація"
        emoji: "\U0001F44D"
        sentence: "Рекомендую подивитися."
      - word: "аргумент"
        emoji: "\U0001F4AC"
        sentence: "Підтримайте думку аргументами."

  - category: "Діалог і аудіювання (повторення)"
    items:
      - word: "дозвольте не погодитися"
        emoji: "\U0001F91A"
        sentence: "Дозвольте не погодитися."
      - word: "факт"
        emoji: "\U0001F4CB"
        sentence: "Це — перевірений факт."
      - word: "думка"
        emoji: "\U0001F4AC"
        sentence: "Це — особиста думка."
      - word: "скарга"
        emoji: "\U0001F4E2"
        sentence: "Подати скаргу на обслуговування."
      - word: "бронювання"
        emoji: "\U0001F3E8"
        sentence: "Підтвердити бронювання."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: build_sentence
    title: "Офіційне письмо"
    instruction: "Склади речення для заяви або автобіографії"
    sentences:
      - words: ["Прошу", "зарахувати", "мене", "на", "курс", "української", "мови", "."]
        correct: "Прошу зарахувати мене на курс української мови."
      - words: ["Я", ",", "Коваленко", "Олена", ",", "народилася", "у", "1995", "році", "."]
        correct: "Я, Коваленко Олена, народилася у 1995 році."
      - words: ["У", "зв'язку", "з", "хворобою", "прошу", "перенести", "іспит", "."]
        correct: "У зв'язку з хворобою прошу перенести іспит."
      - words: ["Зобов'язуюсь", "виконати", "всі", "умови", "договору", "."]
        correct: "Зобов'язуюсь виконати всі умови договору."
      - words: ["У", "2018", "році", "закінчила", "університет", "і", "почала", "працювати", "."]
        correct: "У 2018 році закінчила університет і почала працювати."
      - words: ["Прошу", "надати", "мені", "довідку", "з", "місця", "роботи", "."]
        correct: "Прошу надати мені довідку з місця роботи."

  - type: reading
    title: "Переказ тексту"
    text: |
      Минулого тижня в нашому місті відкрили нову бібліотеку. Це сучасна будівля зі скляними стінами. У бібліотеці є зали для читання, комп'ютерний клас і кав'ярня. На відкритті був мер міста. Він сказав, що бібліотека — це інвестиція в освіту. Перші відвідувачі були вражені: тут є книги п'ятьма мовами, безкоштовний інтернет і зручні крісла. Бібліотека працює щодня з дев'ятої до двадцять першої.
    questions:
      - question: "Перекажіть стисло у трьох реченнях."
        answer: "У місті відкрили сучасну бібліотеку. Мер назвав її інвестицією в освіту. Бібліотека має книги п'ятьма мовами та працює щодня."
      - question: "Хто був на відкритті?"
        answer: "Мер міста."
      - question: "Які послуги пропонує бібліотека?"
        answer: "Зали для читання, комп'ютерний клас, кав'ярня, книги п'ятьма мовами, безкоштовний інтернет."

  - type: pattern_drill
    title: "Темпоральні маркери"
    prompt: "Встав правильний маркер"
    items:
      - given: "___ прочитайте текст."
        answer: "Спочатку"
      - given: "___ випишіть ключові слова."
        answer: "Потім"
      - given: "___ напишіть переказ."
        answer: "Після цього"
      - given: "___ перевірте помилки."
        answer: "Нарешті"

  - type: classify
    title: "Тип документа"
    instruction: "Заява, відгук чи автобіографія?"
    categories:
      - label: "Заява"
        items:
          - "Прошу надати мені відпустку."
          - "На ім'я директора школи."
          - "Зобов'язуюсь виконати умови."
      - label: "Відгук"
        items:
          - "Мені сподобався цей фільм."
          - "Рекомендую всім прочитати."
          - "Найбільше вразила гра акторів."
      - label: "Автобіографія"
        items:
          - "Народився у 2000 році в Києві."
          - "У 2018 році закінчив школу."
          - "На цей час працюю інженером."

  - type: reading
    title: "Діалог: Скарга"
    text: |
      — Добрий день. Я хочу подати скаргу.
      — Слухаю вас. Що сталося?
      — Я замовив доставку три дні тому, але посилка не прийшла.
      — Номер замовлення, будь ласка?
      — 45-678. Я вже телефонував учора — мені сказали «завтра». Але сьогодні знову нічого.
      — Перепрошую за незручності. Зараз перевірю. Ваша посилка — у дорозі, буде сьогодні до вечора.
      — Якщо не прийде, я хочу повернення грошей.
      — Зрозуміло. Якщо не отримаєте до 20:00, зателефонуйте — оформимо повернення.
    questions:
      - question: "Яка скарга клієнта?"
        answer: "Посилка не прийшла через три дні після замовлення."
      - question: "Що запропонував оператор?"
        answer: "Посилка буде сьогодні до вечора; якщо ні — повернення грошей."

  - type: true_false
    title: "Перевірка знань"
    items:
      - statement: "У заяві спочатку пишемо «кому», потім «від кого»."
        answer: true
      - statement: "Відгук — це детальний переказ тексту."
        answer: false
        correction: "Відгук — особиста оцінка з аргументами."
      - statement: "«На мою думку» — маркер факту."
        answer: false
        correction: "Це маркер думки (суб'єктивної оцінки)."
      - statement: "«Дозвольте не погодитися» — ввічлива форма незгоди."
        answer: true
      - statement: "Стислий переказ зберігає всі деталі тексту."
        answer: false
        correction: "Стислий переказ передає тільки головну думку."
