      - word: "відбуватися"
        emoji: "\U0001F3AD"
        sentence: "Концерт відбувається щосуботи."
      - word: "чинний"
        emoji: "\U0001F4DC"
        sentence: "Цей закон є чинним."
      - word: "подорож"
        emoji: "\U0001F30D"
        sentence: "Подорож була чудовою."
      - word: "нагода"
        emoji: "\U00002728"
        sentence: "Це гарна нагода попрактикувати мову."
      - word: "мешканець"
