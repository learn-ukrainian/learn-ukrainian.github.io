module: kultura-slova
track: l2-uk-direct
level: b1
type: grammar
title: "Культура слова: антисуржик"
subtitle: "Виправляємо типові помилки під впливом російської мови"
standard_ref: "§4.5 — лексична правильність мовлення"
textbook_ref: "Grade 5 «Культура слова» — типові порушення лексичних норм"
teaching_notes: |
  Суржик — змішування української та російської мов на лексичному, граматичному й фонетичному рівнях.
  Головний принцип: не «правильно/неправильно», а «українська норма / калька з російської».
  Найчастіші помилки: прийменникові конструкції (по рішенню → за рішенням),
  дієслівні кальки (приймати участь → брати участь), лексичні заміни (учбовий → навчальний).
  Подавайте пари: суржик — норма. Не пояснюйте російську граматику, зосередьтесь на українській нормі.
  Використовуйте живі приклади з оголошень, вивісок, побутового мовлення.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Суржик → українська норма. Перевіряємо: прийменники, дієслова, лексику."
  examples:
    - "приймати участь → брати участь"
    - "по рішенню суду → за рішенням суду"
    - "слідуючий → наступний"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Типові суржикізми та українська норма"
    columns: ["Суржик (неправильно)", "Українська норма", "Пояснення"]
    rows:
      - ["приймати участь", "брати участь", "брати, не приймати"]
      - ["учбовий", "навчальний", "від «навчання»"]
      - ["слідуючий", "наступний", "немає такого дієприкметника"]
      - ["по рішенню суду", "за рішенням суду", "за + орудний відмінок"]
      - ["дані співпадають", "дані збігаються", "збігатися, не співпадати"]
      - ["на протязі року", "протягом року", "прислівник, не прийменник"]
      - ["рахувати (вважати)", "вважати", "рахувати = лічити числа"]
      - ["являється", "є", "є, а не являється"]
      - ["у якості директора", "як директор", "як, а не у якості"]
      - ["співпадіння", "збіг", "збіг обставин"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Правильні дієслова (замість кальок)"
    items:
      - word: "брати участь"
        emoji: "\U0001F91D"
        sentence: "Студенти беруть участь у конференції."
      - word: "збігатися"
        emoji: "\U0001F504"
        sentence: "Наші погляди збігаються."
      - word: "вважати"
        emoji: "\U0001F9D0"
        sentence: "Я вважаю, що це правильно."
      - word: "турбуватися"
        emoji: "\U0001F61F"
        sentence: "Не турбуйтеся, все буде добре."
      - word: "зазнавати"
        emoji: "\U0001F4C9"
