# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Виправ суржик"
    prompt: "Обери правильний варіант"
    items:
      - given: "приймати / брати участь"
        answer: "брати участь"
      - given: "учбовий / навчальний рік"
        answer: "навчальний рік"
      - given: "слідуючий / наступний крок"
        answer: "наступний крок"
      - given: "по рішенню / за рішенням суду"
        answer: "за рішенням суду"
      - given: "дані співпадають / дані збігаються"
        answer: "дані збігаються"
      - given: "на протязі / протягом року"
        answer: "протягом року"
      - given: "являється / є директором"
        answer: "є директором"
      - given: "у якості / як директор"
        answer: "як директор"
      - given: "рахую (думаю) / вважаю, що так"
        answer: "вважаю, що так"
      - given: "співпадіння / збіг обставин"
        answer: "збіг обставин"
      - given: "визивати / викликати лікаря"
        answer: "викликати лікаря"
      - given: "відноситися / ставитися до людей"
        answer: "ставитися до людей"
      - given: "міроприємство / захід"
        answer: "захід"
      - given: "любий / будь-який колір"
        answer: "будь-який колір"
      - given: "рахунок (у банку) / рахунок"
        answer: "рахунок"

  - type: classify
    title: "Суржик чи норма?"
    instruction: "Розподіли фрази: правильно чи неправильно"
    categories:
      - label: "Українська норма"
        items:
          - "брати участь у змаганні"
          - "наступного разу"
          - "протягом місяця"
          - "завдяки допомозі"
          - "збіг обставин"
          - "це є важливим"
          - "захід відбувся"
          - "ставитися з повагою"
          - "вважаю правильним"
          - "він як директор"
      - label: "Суржик (неправильно)"
        items:
          - "приймати участь"
          - "слідуючий раз"
          - "на протязі місяця"
          - "завдяки допомоги"
          - "співпадіння обставин"
          - "являється важливим"
          - "міроприємство відбулось"
          - "відноситися з повагою"
          - "рахую правильним"
          - "у якості директора"

  - type: build_sentence
    title: "Перепиши правильно"
    instruction: "Заміни суржик на українську норму"
    sentences:
      - words: ["Студенти", "[приймають/беруть]", "участь", "у", "конкурсі", "."]
        correct: "Студенти беруть участь у конкурсі."
      - words: ["[Слідуючий/Наступний]", "поїзд", "—", "о", "третій", "."]
        correct: "Наступний поїзд — о третій."
      - words: ["Він", "[являється/є]", "головним", "лікарем", "."]
        correct: "Він є головним лікарем."
      - words: ["[На протязі/Протягом]", "тижня", "ми", "підготуємо", "звіт", "."]
        correct: "Протягом тижня ми підготуємо звіт."
      - words: ["Вона", "працює", "[у якості/як]", "перекладач", "."]
        correct: "Вона працює як перекладач."
      - words: ["Ми", "[рахуємо/вважаємо]", ",", "що", "це", "правильно", "."]
        correct: "Ми вважаємо, що це правильно."

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "«По рішенню суду» — правильна українська фраза."
        answer: false
        correction: "Правильно: «за рішенням суду» (за + орудний відмінок)."
      - statement: "«Брати участь» — це норма української мови."
        answer: true
      - statement: "«Являється директором» — правильно українською."
        answer: false
        correction: "Правильно: «є директором»."
      - statement: "«Навчальний рік» — це правильна форма."
        answer: true
      - statement: "«Протягом року» — правильний прислівник."
        answer: true
      - statement: "«Слідуючий» — нормативне українське слово."
        answer: false
        correction: "Правильно: «наступний». Слово «слідуючий» — калька з російської."
      - statement: "«Відноситися до людей» — правильна українська фраза."
        answer: false
        correction: "Правильно: «ставитися до людей»."
      - statement: "«Збіг обставин» — правильна українська фраза."
        answer: true

  - type: reading
    title: "Знайди помилки"
    text: |
      Вчора на протязі всього дня в нашому ліцеї проходило міроприємство. Студенти приймали участь у конкурсі. Слідуючий етап являється найважливішим. По рішенню журі, переможцем являється команда «Зірки». Ми рахуємо, що це справедливо. Дані двох команд співпали.
    questions:
      - question: "Скільки суржикізмів у тексті?"
        answer: "Вісім: на протязі, міроприємство, приймали участь, слідуючий, являється (двічі), по рішенню, рахуємо, співпали."
      - question: "Як правильно: «міроприємство» чи «захід»?"
        answer: "Захід."
      - question: "Перепишіть перше речення правильно."
        answer: "Вчора протягом усього дня в нашому ліцеї проходив захід."

  - type: proverb_drill
    title: "Прислів'я: про мову"
    proverb: "Від красних слів язик не відсохне."
    source: "Grade 6 Avramenko"
    activity:
      type: match_meaning
      options:
        - "Красиві слова шкодять здоров'ю"
        - "Гарне слово нічого не коштує, а приносить користь"
        - "Краще мовчати, ніж говорити"
      answer: "Гарне слово нічого не коштує, а приносить користь"
      meaning: "Ввічливі, добрі слова — безкоштовні, але цінні."
