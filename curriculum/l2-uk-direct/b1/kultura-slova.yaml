      - word: "щодо"
        emoji: "\U0001F4CB"
        sentence: "Щодо вашого запитання — відповідаю."
      - word: "завдяки"
        emoji: "\U0001F31F"
        sentence: "Завдяки вам ми перемогли."

  - category: "Правильна лексика (замість суржику)"
    items:
      - word: "наступний"
        emoji: "\U000027A1"
        sentence: "Наступний урок — о третій."
      - word: "навчальний"
