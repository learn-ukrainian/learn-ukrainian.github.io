module: odnoridni-chleny
track: l2-uk-direct
level: b1
type: grammar
title: "Однорідні члени речення"
subtitle: "Перелік, розділові знаки, сполучники"
standard_ref: "§4.4 — однорідні члени речення, розділові знаки"
textbook_ref: "5 клас (Авраменко) — однорідні члени; розділові знаки"
teaching_notes: |
  Однорідні члени відповідають на ОДНЕ питання від ОДНОГО слова.
  Головне правило ком: НЕ ставимо кому перед одиничним і/та/й/або.
  ЗАВЖДИ ставимо кому перед а/але/проте/зате/однак.
  Між однорідними членами без сполучника — кома.
  При перерахуванні з трьох і більше: хліб, молоко і масло (кома між першим і другим, «і» без коми).
  Парні сполучники: і...і, ні...ні, або...або — кома перед кожним другим.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Однорідні члени = одне питання від одного слова. Кома: а/але — завжди; і/та/й/або (одиничні) — ніколи."
  examples:
    - "Я купив хліб, молоко і масло."
    - "Вона висока, струнка й привітна."
    - "Він працює не швидко, а ретельно."

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Розділові знаки при однорідних членах"
    columns: ["Сполучник", "Кома?", "Приклад"]
    rows:
      - ["і / та / й / або (одиничний)", "НІ", "хліб і молоко"]
      - ["а / але / проте / зате / однак", "ТАК (завжди)", "не великий, а маленький"]
      - ["без сполучника", "ТАК", "хліб, молоко, масло"]
      - ["і...і / ні...ні / або...або (повторні)", "ТАК (перед другим)", "і хліб, і молоко"]

  - title: "Узагальнювальне слово"
    columns: ["Позиція", "Знак", "Приклад"]
    rows:
      - ["Узагальнювальне ПЕРЕД переліком", "двокрапка", "Усе: хліб, молоко, масло."]
      - ["Узагальнювальне ПІСЛЯ переліку", "тире", "Хліб, молоко, масло — усе було."]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Сполучники"
    items:
      - word: "і"
        emoji: "\U00002795"
        sentence: "Він читає і пише."
      - word: "та"
        emoji: "\U00002795"
        sentence: "Мама та тато прийшли."
      - word: "й"
        emoji: "\U00002795"
        sentence: "Вона висока й струнка."
      - word: "або"
        emoji: "\U00002194"
        sentence: "Чай або кава?"
      - word: "а"
        emoji: "\U0000274C"
        sentence: "Не великий, а маленький."
      - word: "але"
        emoji: "\U0000274C"
        sentence: "Дорого, але якісно."
      - word: "проте"
        emoji: "\U000026A0"
        sentence: "Було складно, проте цікаво."
      - word: "зате"
        emoji: "\U00002705"
        sentence: "Маленький, зате зручний."
      - word: "однак"
        emoji: "\U000026A0"
        sentence: "Сумно, однак справедливо."

  - category: "Перерахування"
    items:
      - word: "усе"
        emoji: "\U0001F4CB"
        sentence: "Усе було готове: борщ, салат, хліб."
      - word: "різний"
        emoji: "\U0001F308"
        sentence: "Різні фрукти: яблука, груші, сливи."
      - word: "перерахувати"
        emoji: "\U0001F522"
        sentence: "Перерахуй усі предмети."
      - word: "зокрема"
        emoji: "\U0001F4CC"
        sentence: "Фрукти, зокрема яблука та груші."
      - word: "наприклад"
        emoji: "\U0001F4DD"
        sentence: "Тварини, наприклад коти й собаки."
      - word: "ні...ні"
        emoji: "\U0000274C"
        sentence: "Ні хліба, ні молока."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Розстав коми"
    prompt: "Додай коми, де потрібно (або напиши: «кома не потрібна»)"
    items:
      - given: "Я купив хліб молоко і масло."
        answer: "Я купив хліб, молоко і масло."
      - given: "Вона висока струнка й привітна."
        answer: "Вона висока, струнка й привітна."
      - given: "Він працює не швидко а ретельно."
        answer: "Він працює не швидко, а ретельно."
      - given: "Мама і тато прийшли."
        answer: "Мама і тато прийшли. (кома не потрібна)"
      - given: "І хліб і молоко і масло — усе було."
        answer: "І хліб, і молоко, і масло — усе було."
      - given: "Ні дня ні ночі — все одно."
        answer: "Ні дня, ні ночі — все одно."
      - given: "Дорого але якісно."
        answer: "Дорого, але якісно."
      - given: "Маленький зате зручний."
        answer: "Маленький, зате зручний."
      - given: "Чай або кава?"
        answer: "Чай або кава? (кома не потрібна)"
      - given: "Було складно проте цікаво."
        answer: "Було складно, проте цікаво."

  - type: build_sentence
    title: "Склади речення з однорідними членами"
    instruction: "Побудуй речення з 3+ однорідними членами"
    sentences:
      - words: ["У", "кошику", ":", "яблука", ",", "груші", "і", "сливи", "."]
        correct: "У кошику: яблука, груші і сливи."
      - words: ["Вона", "любить", "читати", ",", "малювати", "й", "співати", "."]
        correct: "Вона любить читати, малювати й співати."
      - words: ["Кіт", "не", "великий", ",", "а", "маленький", "."]
        correct: "Кіт не великий, а маленький."
      - words: ["Усе", ":", "хліб", ",", "молоко", ",", "масло", "—", "було", "свіже", "."]
        correct: "Усе: хліб, молоко, масло — було свіже."
      - words: ["Він", "розумний", ",", "працьовитий", "і", "чесний", "."]
        correct: "Він розумний, працьовитий і чесний."

  - type: classify
    title: "Потрібна кома перед сполучником?"
    instruction: "Розподіли: кома потрібна чи ні"
    categories:
      - label: "Кома ПОТРІБНА"
        items:
          - "а (не великий, а маленький)"
          - "але (дорого, але якісно)"
          - "проте (складно, проте цікаво)"
          - "зате (маленький, зате зручний)"
          - "і...і (і хліб, і молоко)"
      - label: "Кома НЕ потрібна"
        items:
          - "і (хліб і молоко)"
          - "та (мама та тато)"
          - "й (висока й струнка)"
          - "або (чай або кава)"

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "Я купив хліб, і молоко."
        answer: false
        correction: "Кома перед одиничним «і» не потрібна: «Я купив хліб і молоко.»"
      - statement: "Він працює не швидко, а ретельно."
        answer: true
      - statement: "Мама та тато прийшли."
        answer: true
      - statement: "І хліб, і молоко, і масло — усе було."
        answer: true
      - statement: "Дорого але якісно."
        answer: false
        correction: "Потрібна кома: «Дорого, але якісно.»"
      - statement: "Вона висока, струнка й привітна."
        answer: true
      - statement: "Чай, або кава?"
        answer: false
        correction: "Кома перед одиничним «або» не потрібна: «Чай або кава?»"
      - statement: "Ні дня, ні ночі."
        answer: true
      - statement: "Маленький, зате зручний."
        answer: true
      - statement: "Усе: хліб, молоко, масло — було свіже."
        answer: true
