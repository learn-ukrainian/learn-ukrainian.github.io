module: prykmetnyk-tvorennia
track: l2-uk-direct
level: b1
type: grammar
title: "Прикметник: словотвір"
subtitle: "Утворення прикметників від іменників — суфікси та правила"
standard_ref: "§4.3 — словотвір прикметників (осінній, київський)"
textbook_ref: "6 клас (Авраменко §71–75) — словотвір прикметників"
teaching_notes: |
  Основні суфікси: -ський (географічні), -ний (загальні), -ній (час/природа), -ивий/-ливий (від дієслів).
  -ський: Київ → київський, Львів → львівський. Чергування: -зький, -цький (Запоріжжя → запорізький).
  Анти-суржик: учбовий → навчальний, слідуючий → наступний. Це поширені помилки під впливом російської.
  Подавайте суфікси групами — спочатку -ський (географія), потім -ний (загальні), потім складніші.
  Зверніть увагу на чергування приголосних: к → ч (рука → ручний), г → ж (сніг → сніжний).

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "-ський (місця), -ний (загальне), -ній (час/природа), -ливий (характер). Чергування: к→ч, г→ж, х→ш."
  examples:
    - "Київ → київський"
    - "зима → зимний / зимовий"
    - "осінь → осінній"
    - "щастя → щасливий"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Продуктивні суфікси"
    columns: ["Суфікс", "Від чого", "Приклади"]
    rows:
      - ["-ський", "географічні назви", "Київ → київський, Львів → львівський"]
      - ["-ний", "іменники (загальне)", "сонце → сонячний, зима → зимний"]
      - ["-ній", "час / природа", "осінь → осінній, весна → весняний"]
      - ["-ивий / -ливий", "дієслова / абстрактні", "щастя → щасливий, терпіти → терплячий"]

  - title: "Чергування приголосних"
    columns: ["Чергування", "Приклад"]
    rows:
      - ["к → ч", "рука → ручний"]
      - ["к → ц", "козак → козацький"]
      - ["г → ж", "сніг → сніжний"]
      - ["г → з", "Прага → празький"]
      - ["х → ш", "тихий → тишком"]
      - ["с → ш", "ліс → лісний (без чергування тут)"]

  - title: "Анти-суржик: неправильно → правильно"
    columns: ["Неправильно (суржик)", "Правильно (українська)"]
    rows:
      - ["учбовий", "навчальний"]
      - ["слідуючий", "наступний"]
      - ["любий", "дорогий / коханий"]
      - ["вільний (у значенні «свободний»)", "вільний ✅ (це правильно)"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Географічні (-ський)"
    items:
      - word: "київський"
        emoji: "\U0001F3D9"
        sentence: "Київський метрополітен працює щодня."
      - word: "львівський"
        emoji: "\U0001F3F0"
        sentence: "Львівська кава відома на всю Україну."
      - word: "одеський"
        emoji: "\U0001F3D6"
        sentence: "Одеський гумор — особливий."
      - word: "запорізький"
        emoji: "\U00002694"
        sentence: "Запорізькі козаки захищали свободу."
      - word: "український"
        emoji: "\U0001F1FA"
        sentence: "Українська мова — державна мова."

  - category: "Від іменників (-ний/-ній)"
    items:
      - word: "сонячний"
        emoji: "\U00002600"
        sentence: "Сонячний день підняв настрій."
      - word: "зимовий"
        emoji: "\U00002744"
        sentence: "Зимовий ранок був морозний."
      - word: "осінній"
        emoji: "\U0001F342"
        sentence: "Осіннє листя жовте і червоне."
      - word: "весняний"
        emoji: "\U0001F33C"
        sentence: "Весняний вітер приносить тепло."
      - word: "навчальний"
        emoji: "\U0001F4DA"
        sentence: "Навчальний рік починається у вересні."

  - category: "Від дієслів / абстрактних (-ливий/-ивий)"
    items:
      - word: "щасливий"
        emoji: "\U0001F60A"
        sentence: "Щаслива людина робить щасливими інших."
      - word: "терплячий"
        emoji: "\U0001F9D8"
        sentence: "Терплячий учитель пояснив ще раз."
      - word: "дбайливий"
        emoji: "\U0001F49A"
        sentence: "Дбайлива мати доглядає за дітьми."
      - word: "корисний"
        emoji: "\U00002705"
        sentence: "Корисна порада допомогла мені."
      - word: "чесний"
        emoji: "\U0001F91D"
        sentence: "Чесна відповідь — найкраща."

  - category: "Анти-суржик"
    items:
      - word: "навчальний"
        emoji: "\U0001F4D6"
        sentence: "Навчальний (не «учбовий»!) посібник."
      - word: "наступний"
        emoji: "\U000027A1"
        sentence: "Наступний (не «слідуючий»!) урок о десятій."
      - word: "сердечний"
        emoji: "\U00002764"
        sentence: "Сердечна (не «сердешна» в цьому значенні) подяка."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Утвори прикметник від іменника"
    prompt: "Утвори прикметник"
    items:
      - given: "Київ"
        answer: "київський"
      - given: "Львів"
        answer: "львівський"
      - given: "Одеса"
        answer: "одеський"
      - given: "Харків"
        answer: "харківський"
      - given: "Запоріжжя"
        answer: "запорізький"
      - given: "осінь"
        answer: "осінній"
      - given: "весна"
        answer: "весняний"
      - given: "сонце"
        answer: "сонячний"
      - given: "зима"
        answer: "зимовий"
      - given: "щастя"
        answer: "щасливий"
      - given: "рука"
        answer: "ручний"
      - given: "сніг"
        answer: "сніжний"
      - given: "ліс"
        answer: "лісовий"
      - given: "Україна"
        answer: "український"
      - given: "навчання"
        answer: "навчальний"

  - type: classify
    title: "Розподіли за суфіксами"
    instruction: "Визнач суфікс прикметника"
    categories:
      - label: "-ський"
        items:
          - "київський"
          - "львівський"
          - "козацький"
          - "український"
          - "одеський"
      - label: "-ний / -ній"
        items:
          - "сонячний"
          - "осінній"
          - "весняний"
          - "навчальний"
          - "корисний"
      - label: "-ливий / -ивий"
        items:
          - "щасливий"
          - "дбайливий"
          - "терплячий"
          - "мрійливий"
          - "працьовитий"

  - type: build_sentence
    title: "Речення з утвореними прикметниками"
    instruction: "Використай правильний прикметник"
    sentences:
      - words: ["[Київський/Київський]", "метро", "дуже", "зручне", "."]
        correct: "Київське метро дуже зручне."
      - words: ["[Осінній/Осінній]", "дощ", "стукав", "у", "вікно", "."]
        correct: "Осінній дощ стукав у вікно."
      - words: ["[Навчальний/Учбовий]", "рік", "починається", "у", "вересні", "."]
        correct: "Навчальний рік починається у вересні."

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "«Учбовий» — правильне українське слово."
        answer: false
        correction: "Правильно: навчальний."
      - statement: "«Київський» утворено суфіксом -ський."
        answer: true
      - statement: "«Слідуючий» — правильне українське слово."
        answer: false
        correction: "Правильно: наступний."
      - statement: "«Сніг → сніжний» — чергування г → ж."
        answer: true
      - statement: "«Щасливий» утворено від «щастя» суфіксом -ливий."
        answer: true
      - statement: "«Рука → рукний» — правильна форма."
        answer: false
        correction: "Чергування к → ч: рука → ручний."

  - type: pattern_drill
    title: "Анти-суржик"
    prompt: "Заміни суржик на правильне українське слово"
    items:
      - given: "учбовий"
        answer: "навчальний"
      - given: "слідуючий"
        answer: "наступний"
      - given: "самий кращий"
        answer: "найкращий"
      - given: "получше"
        answer: "краще"
      - given: "воєнний (про дії)"
        answer: "воєнний ✅ (правильно)"
      - given: "бувший"
        answer: "колишній"
      - given: "крайній (в черзі)"
        answer: "останній"
      - given: "відмінний (оцінка)"
        answer: "відмінний ✅ (правильно)"
