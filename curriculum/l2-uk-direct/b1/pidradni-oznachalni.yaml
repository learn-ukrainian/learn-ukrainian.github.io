module: pidradni-oznachalni
track: l2-uk-direct
level: b1
type: grammar
title: "Означальні підрядні речення"
subtitle: "Який/яка/яке/які у всіх відмінках"
standard_ref: "§4.4 — означальні підрядні: який у всіх відмінках"
textbook_ref: "5 клас (Авраменко) — складнопідрядні означальні речення"
teaching_notes: |
  «Який» — відносний займенник, що з'єднує означальне підрядне з головним реченням.
  Він відмінюється за родом, числом і відмінком.
  Рід і число — від означуваного іменника. Відмінок — від ролі в підрядному реченні.
  Приклад: «Місто, яке (Н.в.) я люблю» — яке = Зн.в. (неістота = Н.в.), бо «люблю що? — місто/яке».
  Кома завжди ставиться перед «який/яка/яке/які».

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Який відмінюється за роллю в підрядному реченні: який (Н.в.), якого (Р.в.), якому (Д.в.), який/якого (Зн.в.), яким (О.в.), у якому (М.в.)."
  examples:
    - "Людина, яку (Зн.в.) я зустрів."
    - "Книга, якої (Р.в.) я не читав."
    - "Місто, у якому (М.в.) я живу."

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Відмінювання «який» (чоловічий рід)"
    columns: ["Відмінок", "Форма", "Приклад"]
    rows:
      - ["Називний", "який", "Друг, який допоміг."]
      - ["Родовий", "якого", "Друг, якого я давно не бачив."]
      - ["Давальний", "якому", "Друг, якому я допоміг."]
      - ["Знахідний (істота)", "якого", "Друг, якого я зустрів."]
      - ["Знахідний (неістота)", "який", "Фільм, який я подивився."]
      - ["Орудний", "яким", "Друг, яким я пишаюся."]
      - ["Місцевий", "у якому / про якого", "Місто, у якому я живу."]

  - title: "Відмінювання «який» — усі роди"
    columns: ["Відмінок", "Чоловічий", "Жіночий", "Середній", "Множина"]
    rows:
      - ["Н.", "який", "яка", "яке", "які"]
      - ["Р.", "якого", "якої", "якого", "яких"]
      - ["Д.", "якому", "якій", "якому", "яким"]
      - ["Зн.", "який/якого", "яку", "яке", "які/яких"]
      - ["О.", "яким", "якою", "яким", "якими"]
      - ["М.", "у якому", "у якій", "у якому", "у яких"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Означальні займенники"
    items:
      - word: "який"
        emoji: "\U0001F50D"
        sentence: "Це фільм, який мені сподобався."
      - word: "яка"
        emoji: "\U0001F50D"
        sentence: "Книга, яка лежить на столі, — моя."
      - word: "яке"
        emoji: "\U0001F50D"
        sentence: "Місто, яке ми відвідали, дуже гарне."
      - word: "які"
        emoji: "\U0001F50D"
        sentence: "Люди, які прийшли, були задоволені."

  - category: "Іменники для означень"
    items:
      - word: "людина"
        emoji: "\U0001F464"
        sentence: "Людина, яку я зустрів, виявилася відомим письменником."
      - word: "книга"
        emoji: "\U0001F4D6"
        sentence: "Книга, якої я не читав, лежить на полиці."
      - word: "місто"
        emoji: "\U0001F3D9"
        sentence: "Місто, у якому я живу, дуже зелене."
      - word: "друг"
        emoji: "\U0001F465"
        sentence: "Друг, якому я допоміг, подякував."
      - word: "вулиця"
        emoji: "\U0001F6E3"
        sentence: "Вулиця, якою ми йшли, була тиха."
      - word: "ліс"
        emoji: "\U0001F332"
        sentence: "Ліс, яким ми їхали, був густий."
      - word: "стаття"
        emoji: "\U0001F4F0"
        sentence: "Стаття, яку я прочитав, цікава."
      - word: "фільм"
        emoji: "\U0001F3AC"
        sentence: "Фільм, який мені порадили, був чудовий."
      - word: "подарунок"
        emoji: "\U0001F381"
        sentence: "Подарунок, який я отримав, дуже приємний."
      - word: "парк"
        emoji: "\U0001F333"
        sentence: "Парк, у якому ми гуляли, дуже великий."
      - word: "ресторан"
        emoji: "\U0001F37D"
        sentence: "Ресторан, у якому ми обідали, мав гарне меню."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Встав правильну форму «який»"
    prompt: "Обери відмінок «який» за роллю в підрядному реченні"
    items:
      - given: "Місто, ___ я живу. (М.в.)"
        answer: "у якому"
      - given: "Людина, ___ я зустрів. (Зн.в.)"
        answer: "яку"
      - given: "Книга, ___ я не читав. (Р.в.)"
        answer: "якої"
      - given: "Друг, ___ я допоміг. (Д.в.)"
        answer: "якому"
      - given: "Ліс, ___ ми їхали. (О.в.)"
        answer: "яким"
      - given: "Фільм, ___ мені сподобався. (Н.в.)"
        answer: "який"
      - given: "Жінка, ___ сидить біля вікна. (Н.в.)"
        answer: "яка"
      - given: "Діти, ___ я навчаю. (Зн.в.)"
        answer: "яких"
      - given: "Парк, ___ ми гуляли. (М.в.)"
        answer: "у якому"
      - given: "Подруга, ___ я зателефонував. (Д.в.)"
        answer: "якій"
      - given: "Ручка, ___ він писав. (О.в.)"
        answer: "якою"
      - given: "Студент, ___ добре вчиться. (Н.в.)"
        answer: "який"

  - type: build_sentence
    title: "З'єднай два речення"
    instruction: "Об'єднай за допомогою «який/яка/яке/які»"
    sentences:
      - words: ["Це", "студент", ".", "Він", "добре", "вчиться", "."]
        correct: "Це студент, який добре вчиться."
      - words: ["Я", "прочитав", "книгу", ".", "Книга", "дуже", "цікава", "."]
        correct: "Я прочитав книгу, яка дуже цікава."
      - words: ["Ми", "живемо", "в", "місті", ".", "Місто", "дуже", "зелене", "."]
        correct: "Ми живемо в місті, яке дуже зелене."
      - words: ["Я", "зустрів", "людину", ".", "Людина", "мені", "допомогла", "."]
        correct: "Я зустрів людину, яка мені допомогла."
      - words: ["Він", "подякував", "другу", ".", "Друг", "допоміг", "йому", "."]
        correct: "Він подякував другу, який допоміг йому."

  - type: classify
    title: "Визнач відмінок «який»"
    instruction: "У якому відмінку стоїть «який» у кожному реченні?"
    categories:
      - label: "Називний (хто? що?)"
        items:
          - "Студент, який добре вчиться."
          - "Книга, яка лежить на столі."
      - label: "Родовий (кого? чого?)"
        items:
          - "Книга, якої я не читав."
          - "Людина, якої тут немає."
      - label: "Знахідний (кого? що?)"
        items:
          - "Людина, яку я зустрів."
          - "Стаття, яку я прочитав."
      - label: "Давальний (кому? чому?)"
        items:
          - "Друг, якому я допоміг."
          - "Подруга, якій я подзвонив."
      - label: "Орудний (ким? чим?)"
        items:
          - "Ліс, яким ми їхали."
          - "Ручка, якою він писав."
      - label: "Місцевий (у кому? у чому?)"
        items:
          - "Місто, у якому я живу."
          - "Парк, у якому ми гуляли."

  - type: reading
    title: "Читання: Мій Київ"
    text: |
      Я живу в місті, яке дуже люблю, — у Києві. Вулиця, на якій стоїть мій дім, називається Хрещатик. Щоранку я проходжу повз парк, у якому ростуть старі каштани. Мій сусід, якому вже вісімдесят років, розповідає історії про Київ, яких я ніде не чув. Ресторан, у якому ми обідаємо з друзями, знаходиться на Подолі. Це район, який славиться старовинними будівлями. Люди, яких я зустрічаю щодня, привітні й відкриті.
    questions:
      - question: "У якому місті живе автор?"
        answer: "У Києві."
      - question: "Скільки означальних підрядних речень (з «який») у тексті?"
        answer: "Сім: яке люблю; на якій стоїть; у якому ростуть; якому вісімдесят; яких не чув; у якому обідаємо; який славиться; яких зустрічаю."
      - question: "У якому відмінку «який» у реченні «парк, у якому ростуть каштани»?"
        answer: "У місцевому відмінку."
