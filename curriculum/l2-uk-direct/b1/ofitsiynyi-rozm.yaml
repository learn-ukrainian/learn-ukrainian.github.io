module: ofitsiynyi-rozm
track: l2-uk-direct
level: b1
type: grammar
title: "Офіційний і розмовний стилі"
subtitle: "Ділова мова проти повсякденного мовлення"
standard_ref: "§4.5 — офіційне та неофіційне спілкування, мовні стилі"
textbook_ref: "Grade 5 — стилі мовлення: діловий, розмовний, художній"
teaching_notes: |
  Два полюси: ділова мова (офіційна) і розмовна мова (побутова).
  Офіційний стиль: Шановний пане/пані, стосовно, щодо, у зв'язку з, було прийнято рішення.
  Розмовний стиль: Привіт! Слухай! Знаєш що? Скорочені форми, емоційна лексика.
  Ключове завдання — не тільки розрізняти, а й уміти перемикатися між стилями.
  Порівнюйте однакові ситуації в різних стилях: прохання офіційне vs неофіційне.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Офіційно: Шановний пане, прошу надати... Розмовно: Привіт, можеш скинути..."
  examples:
    - "Офіційно: Прошу надати мені довідку."
    - "Розмовно: Можеш дати мені довідку?"
    - "Офіційно: Стосовно вашого запитання повідомляю..."

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Порівняння стилів"
    columns: ["Ознака", "Офіційний стиль", "Розмовний стиль"]
    rows:
      - ["Звертання", "Шановний пане / пані", "Привіт! Слухай!"]
      - ["Прохання", "Прошу надати / повідомити", "Можеш зробити?"]
      - ["Конструкції", "Було прийнято рішення", "Вирішили так"]
      - ["Лексика", "стосовно, щодо, у зв'язку з", "до речі, а от, знаєш"]
      - ["Форми", "Вас, Вам (з великої літери)", "тобі, тебе"]
      - ["Дієслова", "повідомляю, інформую", "кажу, розповідаю"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Офіційна лексика"
    items:
      - word: "заява"
        emoji: "\U0001F4C4"
        sentence: "Подайте заяву на ім'я директора."
      - word: "довідка"
        emoji: "\U0001F4CB"
        sentence: "Мені потрібна довідка з місця роботи."
      - word: "наказ"
        emoji: "\U0001F4DC"
        sentence: "Директор підписав наказ."
      - word: "протокол"
        emoji: "\U0001F4DD"
        sentence: "Секретар веде протокол засідання."
      - word: "стосовно"
        emoji: "\U0001F4E8"
        sentence: "Стосовно вашого звернення повідомляємо."
      - word: "щодо"
        emoji: "\U0001F4AC"
        sentence: "Щодо термінів — уточнюємо."
      - word: "повідомляю"
        emoji: "\U0001F4E2"
        sentence: "Повідомляю про зміну розкладу."
      - word: "у зв'язку з"
        emoji: "\U0001F517"
        sentence: "У зв'язку з ремонтом офіс зачинено."

  - category: "Розмовна лексика"
    items:
      - word: "до речі"
        emoji: "\U0001F4AC"
        sentence: "До речі, ти знаєш про збори?"
      - word: "слухай"
        emoji: "\U0001F442"
        sentence: "Слухай, я хотів тебе попросити."
      - word: "знаєш що"
        emoji: "\U0001F4A1"
        sentence: "Знаєш що, ходімо в кіно!"
      - word: "між іншим"
        emoji: "\U0001F5E3"
        sentence: "Між іншим, він уже повернувся."
      - word: "отже"
        emoji: "\U000027A1"
        sentence: "Отже, що будемо робити?"

  - category: "Ділові дієслова"
    items:
      - word: "звертатися"
        emoji: "\U0001F4E9"
        sentence: "Звертаюсь до вас із проханням."
      - word: "клопотати"
        emoji: "\U0001F64F"
        sentence: "Клопочу про надання відпустки."
      - word: "затверджувати"
        emoji: "\U00002705"
        sentence: "Комісія затвердила план роботи."
      - word: "інформувати"
        emoji: "\U0001F4E2"
        sentence: "Інформуємо вас про зміни."
      - word: "погоджувати"
        emoji: "\U0001F91D"
        sentence: "Потрібно погодити графік із керівництвом."
      - word: "підписувати"
        emoji: "\U0000270D"
        sentence: "Директор підписує документи щодня."
      - word: "розглядати"
        emoji: "\U0001F50D"
        sentence: "Вашу скаргу буде розглянуто."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Офіційний чи розмовний?"
    instruction: "Розподіли фрази за стилями"
    categories:
      - label: "Офіційний стиль"
        items:
          - "Шановний пане директоре!"
          - "Прошу надати мені відпустку."
          - "Стосовно вашого запитання повідомляю."
          - "У зв'язку з ремонтом офіс зачинено."
          - "Було прийнято рішення про звільнення."
          - "Інформуємо вас про зміни у розкладі."
          - "Клопочу про надання матеріальної допомоги."
          - "Прошу розглянути мою заяву."
          - "Повідомляю про неможливість виконання."
          - "Затверджено наказом директора."
      - label: "Розмовний стиль"
        items:
          - "Привіт! Як справи?"
          - "Слухай, допоможи мені."
          - "Знаєш що, я передумав."
          - "До речі, ти бачив Олега?"
          - "Ну, не знаю, може, завтра?"
          - "Ой, я забув сказати!"
          - "А давай підемо в кафе?"
          - "Та ні, це не так!"
          - "Ну от, знову те саме."
          - "Між іншим, вона вже пішла."

  - type: pattern_drill
    title: "Переклади в офіційний стиль"
    prompt: "Як сказати офіційно?"
    items:
      - given: "Привіт, напиши мені → ?"
        answer: "Шановний пане, прошу надати відповідь."
      - given: "Слухай, мені потрібна довідка → ?"
        answer: "Прошу видати мені довідку."
      - given: "Я хочу у відпустку → ?"
        answer: "Прошу надати мені відпустку."
      - given: "Офіс зачинений, бо ремонт → ?"
        answer: "У зв'язку з ремонтом офіс зачинено."
      - given: "Ми вирішили звільнити його → ?"
        answer: "Було прийнято рішення про звільнення."
      - given: "Ми не можемо це зробити → ?"
        answer: "Повідомляємо про неможливість виконання."

  - type: build_sentence
    title: "Напиши офіційне звернення"
    instruction: "Склади речення в офіційному стилі"
    sentences:
      - words: ["Шановний", "пане", "директоре", ",", "прошу", "надати", "мені", "відпустку", "."]
        correct: "Шановний пане директоре, прошу надати мені відпустку."
      - words: ["У", "зв'язку", "з", "хворобою", "прошу", "перенести", "іспит", "."]
        correct: "У зв'язку з хворобою прошу перенести іспит."
      - words: ["Стосовно", "вашого", "запитання", "повідомляю", "наступне", "."]
        correct: "Стосовно вашого запитання повідомляю наступне."
      - words: ["Інформуємо", "вас", "про", "зміни", "у", "розкладі", "занять", "."]
        correct: "Інформуємо вас про зміни у розкладі занять."
      - words: ["Прошу", "розглянути", "мою", "заяву", "та", "надати", "відповідь", "."]
        correct: "Прошу розглянути мою заяву та надати відповідь."

  - type: reading
    title: "Порівняй стилі"
    text: |
      Офіційний лист:
      Шановний пане Петренко! У зв'язку зі зміною графіка роботи повідомляємо, що нарада відбудеться не в середу, а в четвер о 14:00. Прошу підтвердити вашу присутність. З повагою, секретар Коваленко О. М.

      Неофіційне повідомлення:
      Привіт, Олегу! Слухай, нараду перенесли на четвер, о другій. Будеш? Напиши. Оля.
    questions:
      - question: "Яка головна інформація в обох текстах?"
        answer: "Нараду перенесли з середи на четвер о 14:00."
      - question: "Які ознаки офіційного стилю є в першому тексті?"
        answer: "Звертання «Шановний пане», конструкція «у зв'язку з», «повідомляємо», «з повагою», прізвище з ініціалами."
      - question: "Чим відрізняється звертання в двох текстах?"
        answer: "Офіційно: «Шановний пане Петренко». Неофіційно: «Привіт, Олегу»."

  - type: true_false
    title: "Стилі мовлення"
    items:
      - statement: "«Привіт» підходить для ділового листа."
        answer: false
        correction: "У діловому листі пишуть: «Шановний пане / пані»."
      - statement: "«Стосовно» — слово офіційного стилю."
        answer: true
      - statement: "«Слухай, допоможи» — офіційне прохання."
        answer: false
        correction: "Це розмовний стиль. Офіційно: «Прошу надати допомогу»."
      - statement: "У діловому листі звертаються на «Ви» з великої літери."
        answer: true
      - statement: "«Ну, не знаю» — допустимо в офіційному документі."
        answer: false
        correction: "Це розмовна конструкція. В офіційному стилі — конкретні формулювання."
      - statement: "«Було прийнято рішення» — пасивна конструкція офіційного стилю."
        answer: true

  - type: proverb_drill
    title: "Прислів'я: про слово і діло"
    proverb: "Більше діла — менше слів."
    source: "Grade 6 Avramenko"
    activity:
      type: fill_gap
      gap_word: "діла"
      meaning: "Цінуй дії, а не порожні обіцянки. «Діла» — Р.в. від «діло»."
