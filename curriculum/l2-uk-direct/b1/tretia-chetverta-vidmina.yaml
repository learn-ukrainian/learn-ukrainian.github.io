# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Провідміняй III відміну"
    prompt: "Постав іменник у потрібний відмінок"
    items:
      - given: "любов → Р.в."
        answer: "любові"
      - given: "любов → О.в."
        answer: "любов'ю"
      - given: "подорож → Р.в."
        answer: "подорожі"
      - given: "подорож → О.в."
        answer: "подорожжю"
      - given: "ніч → Р.в."
        answer: "ночі"
      - given: "ніч → О.в."
        answer: "ніччю"
      - given: "сіль → Р.в."
        answer: "солі"
      - given: "сіль → О.в."
        answer: "сіллю"
      - given: "кров → Р.в."
        answer: "крові"
      - given: "кров → О.в."
        answer: "кров'ю"

  - type: pattern_drill
    title: "Провідміняй IV відміну"
    prompt: "Постав іменник у потрібний відмінок"
    items:
      - given: "ім'я → Р.в."
        answer: "імені"
      - given: "ім'я → Д.в."
        answer: "імені"
      - given: "ім'я → О.в."
        answer: "іменем"
      - given: "ім'я → М.в."
        answer: "в імені"
      - given: "теля → Р.в."
        answer: "теляти"
      - given: "теля → Д.в."
        answer: "теляті"
      - given: "теля → О.в."
        answer: "телятям"
      - given: "полум'я → Р.в."
        answer: "полум'я"
      - given: "полум'я → О.в."
        answer: "полум'ям"

  - type: classify
    title: "Визнач відміну"
    instruction: "III чи IV відміна?"
    categories:
      - label: "III відміна (жін., м'який ∅)"
        items:
          - "радість"
          - "ніч"
          - "любов"
          - "подорож"
          - "сіль"
          - "піч"
          - "тінь"
          - "міць"
          - "кров"
          - "розкіш"
      - label: "IV відміна (сер., -а/-ят/-ен)"
        items:
          - "теля"
          - "ім'я"
          - "лоша"
          - "курча"
          - "полум'я"
          - "козеня"
          - "немовля"
          - "плем'я"

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "Орудний від «ніч» — «ніччю»."
        answer: true
      - statement: "«Ім'я» — III відміна."
        answer: false
        correction: "«Ім'я» — IV відміна (середній рід, суфікс -ен-)."
      - statement: "Родовий від «теля» — «теляти»."
        answer: true
      - statement: "Орудний від «сіль» — «сілю»."
        answer: false
        correction: "Подвоєння: сіль → сіллю."
      - statement: "«Подорож» — I відміна."
        answer: false
        correction: "«Подорож» — III відміна (жін. рід, нульове закінчення, шиплячий)."
      - statement: "Орудний від «ім'я» — «іменем»."
        answer: true

  - type: build_sentence
    title: "Речення з III і IV відміною"
    instruction: "Обери правильну форму"
    sentences:
      - words: ["Він", "подорожував", "[ніч/ніччю]", "."]
        correct: "Він подорожував ніччю."
      - words: ["Назви", "своє", "[ім'я/імені]", "."]
        correct: "Назви своє ім'я."
      - words: ["Без", "[любов/любові]", "життя", "порожнє", "."]
        correct: "Без любові життя порожнє."
      - words: ["Маленьке", "[теля/теляти]", "п'є", "молоко", "."]
        correct: "Маленьке теля п'є молоко."
      - words: ["Посип", "[сіль/сіллю]", "салат", "."]
        correct: "Посип сіллю салат."

  - type: reading
    title: "Читання: Вечір у селі"
    text: |
      Ніч повільно спускалася на село. Від печі йшло тепло. Бабуся посипала сіллю м'ясо і поставила в піч. У полум'ї свічки танцювали тіні. Маленьке теля спало в хліві, а курча ховалося під крилом квочки. Яка розкіш — тиша сільської ночі! Любов до рідної землі наповнювала серце радістю.
    questions:
      - question: "Від чого йшло тепло?"
        answer: "Від печі (III відміна, Р.в.)."
      - question: "Де спало теля?"
        answer: "У хліві."
      - question: "Чим бабуся посипала м'ясо?"
        answer: "Сіллю (III відміна, О.в., подвоєння)."

  - type: riddle
    title: "Загадка: III відміна"
    clues:
      - "Літом спить, зимою їсть, тіло тепле, а крові не має."
    answer: "піч"
    source: "Grade 5 Avramenko p.28"
