module: tretia-chetverta-vidmina
track: l2-uk-direct
level: b1
type: grammar
title: "III і IV відміни"
subtitle: "Жіночий рід на м'який ∅ та середній рід на -а/-ят/-ен"
standard_ref: "§4.2.1.1 — парадигми III і IV відмін"
textbook_ref: "6 клас (Авраменко §51–52) — III і IV відміни"
teaching_notes: |
  III відміна — жіночий рід із нульовим закінченням і м'яким або шиплячим кінцевим: радість, ніч, сіль.
  Орудний III відміни — подвоєння приголосного: радістю, ніччю, сіллю. Це типова помилка.
  IV відміна — малопродуктивна, але важлива: лоша → лошати, ім'я → імені. Суфікси -ят-/-ен-.
  Не плутайте III і I: «ніч» (III, жін., ∅) vs «круча» (I, жін., -а). Головна ознака — закінчення.
  IV відміна — переважно назви малят тварин (теля, лоша, курча) та кілька абстрактних (ім'я, полум'я).

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "III відміна: ніч → ночі, ніччю (подвоєння в О.в.). IV відміна: лоша → лошати (суфікс -ят-), ім'я → імені (суфікс -ен-)."
  examples:
    - "радість → радості → радістю (подвоєння: -стю)"
    - "ніч → ночі → ніччю (подвоєння: -ччю)"
    - "лоша → лошати → лошаті → лошатям"
    - "ім'я → імені → іменем"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "III відміна (жіночий рід)"
    columns: ["Відмінок", "радість", "ніч", "сіль"]
    rows:
      - ["Н.в.", "радість", "ніч", "сіль"]
      - ["Р.в.", "радост-і", "ноч-і", "сол-і"]
      - ["Д.в.", "радост-і", "ноч-і", "сол-і"]
      - ["Зн.в.", "радість", "ніч", "сіль"]
      - ["О.в.", "радіст-ю", "нічч-ю", "сілл-ю"]
      - ["М.в.", "у радост-і", "у ноч-і", "у сол-і"]
      - ["Кл.в.", "радост-е", "ноч-е", "сол-е"]

  - title: "IV відміна (середній рід)"
    columns: ["Відмінок", "лоша", "ім'я"]
    rows:
      - ["Н.в.", "лош-а", "ім'-я"]
      - ["Р.в.", "лош-ат-и", "ім-ен-і"]
      - ["Д.в.", "лош-ат-і", "ім-ен-і"]
      - ["Зн.в.", "лош-а", "ім'-я"]
      - ["О.в.", "лош-ат-ям", "ім-ен-ем"]
      - ["М.в.", "на лош-ат-і", "в ім-ен-і"]

