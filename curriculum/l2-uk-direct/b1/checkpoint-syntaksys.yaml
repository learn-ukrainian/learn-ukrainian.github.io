module: checkpoint-syntaksys
track: l2-uk-direct
level: b1
type: checkpoint
title: "Контрольна точка: складний синтаксис"
subtitle: "Підрядні часу, причини, мети, умови, допустові, означальні; пряма/непряма мова; однорідні члени"
standard_ref: "§4.4 — складнопідрядні речення (узагальнення)"
textbook_ref: "5 клас (Авраменко §63–81) — складнопідрядні речення"
teaching_notes: |
  Контрольна точка охоплює модулі 23–28 (синтаксис).
  Перевіряє: сполучники часу, причини, мети; умовні та допустові; означальні підрядні;
  пряму та непряму мову; однорідні члени та розділові знаки.
  Поріг проходження: 70%.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Складний синтаксис B1: підрядні часу/причини/мети/умови/допустові/означальні + пряма/непряма мова + однорідні члени."
  examples:
    - "Коли я прийшов, вона вже пішла. (час)"
    - "Не прийшов, тому що захворів. (причина)"
    - "Хоч було холодно, ми пішли. (допустове)"

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Сполучники (узагальнення)"
    items:
      - word: "коли"
        emoji: "\U0001F550"
        sentence: "Коли він прийшов, ми почали."
      - word: "поки"
        emoji: "\U000023F3"
        sentence: "Почекай, поки я закінчу."
      - word: "щойно"
        emoji: "\U000026A1"
        sentence: "Щойно він увійшов, усі замовкли."
      - word: "тому що"
        emoji: "\U00002753"
        sentence: "Не прийшов, тому що захворів."
      - word: "бо"
        emoji: "\U0001F5E3"
        sentence: "Не пішов, бо втомився."
      - word: "щоб"
        emoji: "\U0001F3AF"
        sentence: "Вчуся, щоб знати мову."
      - word: "хоч"
        emoji: "\U0001F4AA"
        sentence: "Хоч було важко, не здався."
      - word: "який"
        emoji: "\U0001F50D"
        sentence: "Людина, яку я зустрів."
      - word: "що (непряма)"
        emoji: "\U0001F4AC"
        sentence: "Він сказав, що прийде."
      - word: "чи (непряма)"
        emoji: "\U00002753"
        sentence: "Вона запитала, чи я буду."
      - word: "але"
        emoji: "\U0000274C"
        sentence: "Дорого, але якісно."
      - word: "а"
        emoji: "\U0000274C"
        sentence: "Не великий, а маленький."
      - word: "через те що"
        emoji: "\U0001F4BC"
        sentence: "Через те що було пізно, не пішли."
      - word: "дарма що"
        emoji: "\U0001F937"
        sentence: "Дарма що старався, не вийшло."
      - word: "незважаючи на те що"
        emoji: "\U0001F4BC"
        sentence: "Незважаючи на дощ, свято відбулося."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Встав сполучник"
    prompt: "Обери правильний сполучник"
    items:
      - given: "___ я прийшов, вона вже пішла."
        answer: "Коли"
      - given: "Не прийшов, ___ захворів."
        answer: "тому що"
      - given: "Вчуся, ___ здати іспит."
        answer: "щоб"
      - given: "___ було холодно, ми пішли."
        answer: "Хоч"
      - given: "Він сказав, ___ прийде."
        answer: "що"
      - given: "Вона запитала, ___ я буду."
        answer: "чи"
      - given: "___ він увійшов, усі замовкли."
        answer: "Щойно"

  - type: classify
    title: "Тип підрядного речення"
    instruction: "Визнач тип: часове, причинове, мети, умовне, допустове, означальне"
    categories:
      - label: "Часове"
        items:
          - "Коли я прийшов, вона пішла."
          - "Поки чекав, читав книгу."
          - "Щойно він увійшов, замовкли."
      - label: "Причинове"
        items:
          - "Не прийшов, тому що захворів."
          - "Залишився, бо втомився."
      - label: "Мети"
        items:
          - "Вчуся, щоб знати мову."
          - "Прийшов, щоб допомогти."
      - label: "Умовне"
        items:
          - "Якщо встигну, зателефоную."
          - "Якби мав час, поїхав би."
      - label: "Допустове"
        items:
          - "Хоч було важко, не здався."
          - "Дарма що дощило, пішли."
      - label: "Означальне"
        items:
          - "Книга, яку я прочитав."
          - "Місто, у якому живу."

  - type: classify
    title: "Пряма чи непряма мова?"
    instruction: "Розподіли речення"
    categories:
      - label: "Пряма мова"
        items:
          - "Він сказав: «Я прийду.»"
          - "«Котра година?» — запитала вона."
          - "«Допоможи!» — попросив він."
      - label: "Непряма мова"
        items:
          - "Він сказав, що прийде."
          - "Вона запитала, котра година."
          - "Він попросив, щоб я допоміг."

  - type: pattern_drill
    title: "Пряма → непряма мова"
    prompt: "Перетвори пряму мову на непряму"
    items:
      - given: "Він сказав: «Я прийду завтра.» →"
        answer: "Він сказав, що прийде завтра."
      - given: "Вона запитала: «Ти підеш?» →"
        answer: "Вона запитала, чи я піду."
      - given: "Мама сказала: «Їж кашу.» →"
        answer: "Мама сказала, щоб я їв кашу."

  - type: build_sentence
    title: "Склади складне речення"
    instruction: "Побудуй речення з правильним сполучником і розділовими знаками"
    sentences:
      - words: ["Хоч", "було", "пізно", ",", "вони", "продовжили", "роботу", "."]
        correct: "Хоч було пізно, вони продовжили роботу."
      - words: ["Книга", ",", "яку", "я", "прочитав", ",", "дуже", "цікава", "."]
        correct: "Книга, яку я прочитав, дуже цікава."
      - words: ["Він", "купив", "хліб", ",", "молоко", "і", "масло", "."]
        correct: "Він купив хліб, молоко і масло."
      - words: ["Не", "великий", ",", "а", "маленький", "."]
        correct: "Не великий, а маленький."
      - words: ["Коли", "все", "закінчилося", ",", "вони", "пішли", "додому", "."]
        correct: "Коли все закінчилося, вони пішли додому."

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "Я купив хліб, і молоко."
        answer: false
        correction: "Кома перед одиничним «і» не потрібна."
      - statement: "Хоч було холодно, ми пішли."
        answer: true
      - statement: "Він сказав що прийде."
        answer: false
        correction: "Потрібна кома: «Він сказав, що прийде.»"
      - statement: "Книга, яку я прочитав, цікава."
        answer: true
      - statement: "«Допоможи мені» — попросив він."
        answer: false
        correction: "Потрібен знак оклику або кома: «Допоможи мені!» або «Допоможи мені,»"
      - statement: "Дорого, але якісно."
        answer: true

  - type: reading
    title: "Читання: Лист з подорожі"
    text: |
      Привіт! Пишу тобі з Одеси, яку давно мріяв відвідати. Коли ми приїхали, було вже пізно, тому що поїзд запізнився. Хоч було темно, ми пішли гуляти Дерибасівською. Я купив каву, морозиво і сувенір. Друг запитав: «Чи подобається тобі тут?» Я відповів, що дуже. Щоб побачити море, встали рано. Якщо буде час, поїдемо до Акерманської фортеці. Хоча погода не ідеальна, настрій чудовий!
    questions:
      - question: "Яке означальне підрядне є в тексті?"
        answer: "«Одеси, яку давно мріяв відвідати.»"
      - question: "Знайди причинове підрядне."
        answer: "«Тому що поїзд запізнився.»"
      - question: "Знайди допустове підрядне."
        answer: "«Хоч було темно, ми пішли гуляти» та «Хоча погода не ідеальна, настрій чудовий.»"

  - type: reading
    title: "Читання: Записка від колеги"
    text: |
      Олена залишила записку: «Я пішла на зустріч. Повернуся після обіду.» Директор запитав, чи Олена на місці. Марія відповіла, що Олена пішла на зустріч, але повернеться після обіду. Хоч Олена і не попередила заздалегідь, директор не розсердився, бо зустріч була важлива. Коли Олена повернулася, вона пояснила: «Зустріч затягнулася, проте результати хороші.»
    questions:
      - question: "Які речення з прямою мовою?"
        answer: "«Я пішла на зустріч. Повернуся після обіду.» / «Зустріч затягнулася, проте результати хороші.»"
      - question: "Яке причинове підрядне?"
        answer: "«Бо зустріч була важлива.»"
      - question: "Де в тексті однорідні члени з протиставним сполучником?"
        answer: "«Затягнулася, проте результати хороші» — протиставний сполучник «проте»."
