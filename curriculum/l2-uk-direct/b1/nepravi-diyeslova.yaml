module: nepravi-diyeslova
track: l2-uk-direct
level: b1
type: grammar
title: "Неправильні дієслова"
subtitle: "Дати, їсти, бігти та зворотні дієслова"
standard_ref: "§4.2.3 — неправильні дієслова: дати, їсти, бігти"
textbook_ref: "5 клас — відмінювання дієслів, неправильні дієслова"
teaching_notes: |
  Неправильні дієслова не підпорядковуються стандартним дієвідмінам.
  Три основні: дати (дам, даси, дасть), їсти (їм, їси, їсть), бігти (біжу, біжиш, біжить).
  Зворотні дієслова: -ся завжди залишається, але основа може змінюватися.
  Типова помилка: «їду» від «їсти» — ні, «їду» від «їхати»; «їсти» → «їм».
  Не давайте всі неправильні дієслова одразу — по одному, з практикою.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Неправильні дієслова мають особливу основу. Їх треба запам'ятати: дати → дам, їсти → їм, бігти → біжу."
  examples:
    - "Дай мені книгу. Я дам тобі ручку."
    - "Що ти їси? Я їм борщ."
    - "Куди ти біжиш? Я біжу на автобус."

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Відмінювання неправильних дієслів"
    columns: ["Особа", "дати", "їсти", "бігти"]
    rows:
      - ["я", "дам", "їм", "біжу"]
      - ["ти", "даси", "їси", "біжиш"]
      - ["він/вона", "дасть", "їсть", "біжить"]
      - ["ми", "дамо", "їмо", "біжимо"]
      - ["ви", "дасте", "їсте", "біжите"]
      - ["вони", "дадуть", "їдять", "біжать"]

  - title: "Зворотні дієслова — приклади відмінювання"
    columns: ["Особа", "митися", "боротися"]
    rows:
      - ["я", "миюся", "борюся"]
      - ["ти", "миєшся", "борешся"]
      - ["він/вона", "миється", "бореться"]
      - ["ми", "миємося", "боремося"]
      - ["ви", "миєтеся", "боретеся"]
      - ["вони", "миються", "борються"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Неправильні дієслова"
    items:
      - word: "дати"
        emoji: "\U0001F91D"
        sentence: "Дай мені склянку води."
      - word: "їсти"
        emoji: "\U0001F35D"
        sentence: "Що ти їси на обід?"
      - word: "бігти"
        emoji: "\U0001F3C3"
        sentence: "Він біжить на зупинку."

  - category: "Зворотні дієслова"
    items:
      - word: "митися"
        emoji: "\U0001F6BF"
        sentence: "Діти миються перед сном."
      - word: "боротися"
        emoji: "\U0001F4AA"
        sentence: "Вони борються за перемогу."
      - word: "знайомитися"
        emoji: "\U0001F44B"
        sentence: "Я знайомлюся з новими людьми."
      - word: "вчитися"
        emoji: "\U0001F4DA"
        sentence: "Вона вчиться в університеті."
      - word: "сміятися"
        emoji: "\U0001F602"
        sentence: "Діти сміються гучно."
      - word: "одягатися"
        emoji: "\U0001F455"
        sentence: "Він одягається швидко."

  - category: "Похідні від «дати» та «їсти»"
    items:
      - word: "віддати"
        emoji: "\U0001F4E4"
        sentence: "Віддай мені книгу."
      - word: "передати"
        emoji: "\U0001F4E8"
        sentence: "Передай привіт батькам."
      - word: "продати"
        emoji: "\U0001F4B0"
        sentence: "Він продасть машину."
      - word: "з'їсти"
        emoji: "\U0001F37D"
        sentence: "Хто з'їв моє яблуко?"
      - word: "переїсти"
        emoji: "\U0001F922"
        sentence: "Не переїж — буде погано."
      - word: "побігти"
        emoji: "\U0001F3C3"
        sentence: "Діти побігли до парку."
      - word: "забігти"
        emoji: "\U0001F6AA"
        sentence: "Забіжи до магазину по хліб."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Провідміняй «дати», «їсти», «бігти»"
    prompt: "Постав дієслово в правильну форму"
    items:
      - given: "дати → я"
        answer: "дам"
      - given: "дати → ти"
        answer: "даси"
      - given: "дати → він"
        answer: "дасть"
      - given: "дати → вони"
        answer: "дадуть"
      - given: "їсти → я"
        answer: "їм"
      - given: "їсти → ти"
        answer: "їси"
      - given: "їсти → вони"
        answer: "їдять"
      - given: "бігти → я"
        answer: "біжу"
      - given: "бігти → ти"
        answer: "біжиш"
      - given: "бігти → вони"
        answer: "біжать"

  - type: pattern_drill
    title: "Зворотні дієслова"
    prompt: "Постав зворотне дієслово в правильну форму"
    items:
      - given: "митися → я"
        answer: "миюся"
      - given: "митися → ти"
        answer: "миєшся"
      - given: "митися → вони"
        answer: "миються"
      - given: "боротися → я"
        answer: "борюся"
      - given: "боротися → він"
        answer: "бореться"
      - given: "знайомитися → я"
        answer: "знайомлюся"

  - type: classify
    title: "Правильне чи неправильне дієслово?"
    instruction: "Розподіли дієслова на правильні та неправильні"
    categories:
      - label: "Неправильні"
        items:
          - "дати (дам, даси)"
          - "їсти (їм, їси)"
          - "бігти (біжу, біжиш)"
      - label: "Правильні (I або II дієвідміна)"
        items:
          - "читати (читаю, читаєш)"
          - "писати (пишу, пишеш)"
          - "говорити (говорю, говориш)"
          - "робити (роблю, робиш)"
          - "ходити (ходжу, ходиш)"

  - type: build_sentence
    title: "Вжий неправильне дієслово"
    instruction: "Склади речення з правильною формою дієслова"
    sentences:
      - words: ["Мама", "[дати/дасть]", "мені", "гроші", "."]
        correct: "Мама дасть мені гроші."
      - words: ["Що", "ти", "[їсти/їси]", "на", "сніданок", "?"]
        correct: "Що ти їси на сніданок?"
      - words: ["Діти", "[бігти/біжать]", "до", "школи", "."]
        correct: "Діти біжать до школи."
      - words: ["Я", "[митися/миюся]", "холодною", "водою", "."]
        correct: "Я миюся холодною водою."
      - words: ["Вони", "[боротися/борються]", "за", "справедливість", "."]
        correct: "Вони борються за справедливість."

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "«Їду» — це форма від «їсти»."
        answer: false
        correction: "«Їду» — від «їхати». Від «їсти» — «їм»."
      - statement: "«Дадуть» — форма 3-ї особи множини від «дати»."
        answer: true
      - statement: "«Бігуть» — правильна форма."
        answer: false
        correction: "Правильно: «біжать»."
      - statement: "Зворотна частка «-ся» завжди стоїть у кінці."
        answer: true
      - statement: "«Їдять» — форма від «їхати»."
        answer: false
        correction: "«Їдять» — від «їсти». Від «їхати» — «їдуть»."
      - statement: "«Миються» — 3-тя особа множини від «митися»."
        answer: true

  - type: tongue_twister
    title: "Скоромовка: дієслова руху"
    text: "Черепашці з черепашенятами важко змагатися із жабенятами."
    focus: "Ч/Ш/Ж"
    source: "Grade 5 Litvinova"
