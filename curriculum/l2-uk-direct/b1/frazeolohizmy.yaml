module: frazeolohizmy
track: l2-uk-direct
level: b1
type: vocabulary
title: "Фразеологізми"
subtitle: "Сталі вирази та їхні значення"
standard_ref: "§4.5 — стилістика: фразеологізми"
textbook_ref: "6 клас (§24–27) — фразеологія"
teaching_notes: |
  Фразеологізм — сталий (нерозкладний) вираз із переносним значенням.
  Не можна замінити окремі слова: «бити байдики» ≠ «бити м'ячі».
  Фразеологізми прикрашають мову і роблять її виразнішою.
  Багато фразеологізмів мають народне походження.
  Учні повинні розуміти значення і вміти вживати в контексті.
  Не давайте забагато одразу — 10–15 найуживаніших.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Фразеологізм = сталий вираз із переносним значенням. Не розкладається на окремі слова."
  examples:
    - "бити байдики = лінуватися"
    - "ламати голову = довго думати"
    - "мати рацію = бути правим"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Найуживаніші українські фразеологізми"
    columns: ["Фразеологізм", "Значення", "Приклад у реченні"]
    rows:
      - ["бити байдики", "лінуватися", "Замість працювати, він б'є байдики."]
      - ["ламати голову", "довго думати", "Я ламаю голову над цим завданням."]
      - ["брати участь", "бути учасником", "Вона бере участь у конкурсі."]
      - ["мати рацію", "бути правим", "Ти маєш рацію!"]
      - ["впасти в око", "сподобатися", "Ця сукня впала їй в око."]
      - ["вийти з ладу", "зламатися", "Комп'ютер вийшов з ладу."]
      - ["тримати слово", "виконувати обіцянку", "Він завжди тримає слово."]
      - ["взяти себе в руки", "заспокоїтися", "Візьми себе в руки!"]
      - ["як риба у воді", "почуватися вільно", "Вона почувається як риба у воді."]
      - ["витрішки продавати", "нічого не робити", "Не стій — не продавай витрішки!"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Фразеологізми: лінощі та праця"
    items:
      - word: "бити байдики"
        emoji: "\U0001F634"
        sentence: "Не бий байдики — допоможи мені!"
      - word: "витрішки продавати"
        emoji: "\U0001F440"
        sentence: "Він стоїть і продає витрішки."
      - word: "засукати рукави"
        emoji: "\U0001F4AA"
        sentence: "Пора засукати рукави і працювати."
      - word: "працювати не покладаючи рук"
        emoji: "\U0001F477"
        sentence: "Вона працює не покладаючи рук."

  - category: "Фразеологізми: думання та мова"
    items:
      - word: "ламати голову"
        emoji: "\U0001F9E0"
        sentence: "Ламаю голову над задачею."
      - word: "мати рацію"
        emoji: "\U00002705"
        sentence: "Ти маєш рацію — це правда."
      - word: "тримати слово"
        emoji: "\U0001F91D"
        sentence: "Він завжди тримає слово."
      - word: "тримати язик за зубами"
        emoji: "\U0001F910"
        sentence: "Тримай язик за зубами — це секрет."

  - category: "Фразеологізми: емоції та стан"
    items:
      - word: "впасти в око"
        emoji: "\U0001F60D"
        sentence: "Ця картина одразу впала мені в око."
      - word: "взяти себе в руки"
        emoji: "\U0001F4AA"
        sentence: "Візьми себе в руки і заспокойся."
      - word: "як риба у воді"
        emoji: "\U0001F41F"
        sentence: "Він почувається як риба у воді."
      - word: "вийти з ладу"
        emoji: "\U0001F527"
        sentence: "Телефон вийшов з ладу."
      - word: "брати участь"
        emoji: "\U0001F3C6"
        sentence: "Усі беруть участь у святі."
      - word: "не за горами"
        emoji: "\U0001F3D4"
        sentence: "Літо вже не за горами."
      - word: "на всі руки майстер"
        emoji: "\U0001F6E0"
        sentence: "Він на всі руки майстер — усе вміє."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "З'єднай фразеологізм зі значенням"
    instruction: "Розподіли фразеологізми за значенням"
    categories:
      - label: "Лінуватися / нічого не робити"
        items:
          - "бити байдики"
          - "витрішки продавати"
      - label: "Думати / говорити"
        items:
          - "ламати голову"
          - "тримати язик за зубами"
      - label: "Працювати / діяти"
        items:
          - "засукати рукави"
          - "брати участь"
          - "працювати не покладаючи рук"
      - label: "Емоції / стан"
        items:
          - "впасти в око"
          - "взяти себе в руки"
          - "як риба у воді"
      - label: "Обіцянка / правда"
        items:
          - "тримати слово"
          - "мати рацію"

  - type: pattern_drill
    title: "Доповни фразеологізм"
    prompt: "Встав пропущене слово"
    items:
      - given: "бити ___"
        answer: "байдики"
      - given: "ламати ___"
        answer: "голову"
      - given: "брати ___"
        answer: "участь"
      - given: "мати ___"
        answer: "рацію"
      - given: "тримати ___"
        answer: "слово"
      - given: "впасти в ___"
        answer: "око"
      - given: "вийти з ___"
        answer: "ладу"
      - given: "взяти себе в ___"
        answer: "руки"
      - given: "як риба у ___"
        answer: "воді"
      - given: "засукати ___"
        answer: "рукави"
      - given: "тримати язик за ___"
        answer: "зубами"
      - given: "не за ___"
        answer: "горами"

  - type: build_sentence
    title: "Вжий фразеологізм у реченні"
    instruction: "Склади речення з фразеологізмом"
    sentences:
      - words: ["Він", "завжди", "[тримає слово/тримає руку]", "."]
        correct: "Він завжди тримає слово."
      - words: ["Замість", "працювати", ",", "він", "[б'є байдики/б'є м'ячі]", "."]
        correct: "Замість працювати, він б'є байдики."
      - words: ["Ти", "[маєш рацію/маєш гроші]", "—", "це", "правда", "."]
        correct: "Ти маєш рацію — це правда."
      - words: ["Телефон", "[вийшов з ладу/вийшов з дому]", "."]
        correct: "Телефон вийшов з ладу."
      - words: ["[Візьми себе в руки/Візьми себе на руки]", "і", "заспокойся", "."]
        correct: "Візьми себе в руки і заспокойся."

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "«Ламати голову» — це про травму голови."
        answer: false
        correction: "«Ламати голову» = довго і наполегливо думати."
      - statement: "«Бити байдики» означає лінуватися."
        answer: true
      - statement: "«Тримати слово» — це виконувати обіцянку."
        answer: true
      - statement: "«Впасти в око» означає отримати травму ока."
        answer: false
        correction: "«Впасти в око» = сподобатися, привернути увагу."
      - statement: "«Брати участь» — це фразеологізм."
        answer: true
      - statement: "«Як риба у воді» означає почуватися вільно та комфортно."
        answer: true

  - type: reading
    title: "Читання: Історія Тараса"
    text: |
      Тарас довго бив байдики — не працював і не вчився. Батьки казали: «Візьми себе в руки!» Одного дня він побачив оголошення про курси програмування, і воно впало йому в око. Тарас засукав рукави й почав вчитися. Ламав голову над задачами, але не здавався. Працював не покладаючи рук. Через три місяці він вже почувався як риба у воді серед коду. Батько сказав: «Я мав рацію — ти здібний!» Тарас тримає слово: обіцяв знайти роботу — і знайшов.
    questions:
      - question: "Скільки фразеологізмів у тексті? Перерахуй."
        answer: "Вісім: бив байдики, візьми себе в руки, впало в око, засукав рукави, ламав голову, не покладаючи рук, як риба у воді, мав рацію, тримає слово."
      - question: "Що означає «засукав рукави» в тексті?"
        answer: "Почав серйозно працювати / взявся до справи."
      - question: "Як Тарас «тримає слово»?"
        answer: "Він обіцяв знайти роботу — і знайшов. Виконав обіцянку."

  - type: proverb_drill
    title: "Фразеологізм: антонімічна пара"
    proverb: "Як кішка із собакою."
    source: "Grade 6 Avramenko §24"
    activity:
      type: match_meaning
      options:
        - "Дружити"
        - "Сваритися, ворогувати"
        - "Бути байдужим"
      answer: "Сваритися, ворогувати"
      meaning: "Антонім: «водою не розлити» (дуже дружні)."
