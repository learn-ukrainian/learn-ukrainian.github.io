module: pysannia-zaiava
track: l2-uk-direct
level: b1
type: writing
title: "Офіційне письмо: заява, довідка, автобіографія"
subtitle: "Структура та мова офіційних документів"
standard_ref: "§1.3 — офіційні документи: заява, автобіографія, довідка"
textbook_ref: "Grade 5–6 — ділові папери, заява, автобіографія"
teaching_notes: |
  Заява: шапка (кому, від кого) → текст (Прошу...) → дата, підпис.
  Автобіографія: хронологічний виклад у офіційному стилі (народився, навчався, працюю).
  Довідка: підтвердження факту — видається установою.
  Ключові дієслова: прошу, повідомляю, підтверджую, зобов'язуюсь.
  Зверніть увагу на кличний відмінок у звертаннях: пане директоре, пані ректорко.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Заява: Кому → Від кого → Прошу... → Дата, підпис."
  examples:
    - "Директору ліцею № 5 Коваленку О. М."
    - "від учня 10-А класу Петренка Івана"
    - "Прошу надати мені відпустку з 01.04 по 10.04.2026."

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Структура документа"
    items:
      - word: "заява"
        emoji: "\U0001F4C4"
        sentence: "Напишіть заяву на ім'я директора."
      - word: "довідка"
        emoji: "\U0001F4CB"
        sentence: "Довідка підтверджує місце роботи."
      - word: "автобіографія"
        emoji: "\U0001F4DD"
        sentence: "Автобіографія — хронологічний опис життя."
      - word: "підпис"
        emoji: "\U0000270D"
        sentence: "Поставте підпис унизу заяви."
      - word: "дата"
        emoji: "\U0001F4C5"
        sentence: "Вкажіть дату подання заяви."

  - category: "Офіційні дієслова"
    items:
      - word: "прошу"
        emoji: "\U0001F64F"
        sentence: "Прошу зарахувати мене на курс."
      - word: "повідомляю"
        emoji: "\U0001F4E2"
        sentence: "Повідомляю про зміну адреси."
      - word: "підтверджую"
        emoji: "\U00002705"
        sentence: "Підтверджую свою згоду."
      - word: "зобов'язуюсь"
        emoji: "\U0001F4AA"
        sentence: "Зобов'язуюсь виконати всі умови."
      - word: "надати"
        emoji: "\U0001F4E4"
        sentence: "Прошу надати мені довідку."
      - word: "зарахувати"
        emoji: "\U0001F4CB"
        sentence: "Прошу зарахувати мене до групи."

  - category: "Реквізити документа"
    items:
      - word: "шапка"
        emoji: "\U0001F4C3"
        sentence: "Шапка заяви: кому і від кого."
      - word: "адресат"
        emoji: "\U0001F464"
        sentence: "Адресат заяви — директор школи."
      - word: "адресант"
        emoji: "\U0001F464"
        sentence: "Адресант — той, хто пише заяву."
      - word: "реквізити"
        emoji: "\U0001F4CB"
        sentence: "Реквізити — обов'язкові елементи документа."
      - word: "посада"
        emoji: "\U0001F4BC"
        sentence: "Вкажіть посаду адресата."
      - word: "прізвище"
        emoji: "\U0001F464"
        sentence: "Напишіть прізвище, ім'я, по батькові."
      - word: "ініціали"
        emoji: "\U0001F524"
        sentence: "Коваленко О. М. — прізвище з ініціалами."
      - word: "штамп"
        emoji: "\U0001F4E6"
        sentence: "На довідці має бути штамп установи."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Заповни шаблон заяви"
    prompt: "Що пишемо в цьому полі?"
    items:
      - given: "Кому: Директору ліцею № 5 ___ (прізвище)"
        answer: "Коваленку О. М."
      - given: "Від кого: від учня 10-А класу ___ (прізвище)"
        answer: "Петренка Івана Олеговича"
      - given: "Текст: Прошу ___ мені відпустку"
        answer: "надати"
      - given: "Текст: Прошу ___ мене на курс"
        answer: "зарахувати"
      - given: "Закінчення: ___ (число, місяць, рік)"
        answer: "01.04.2026"
      - given: "Закінчення: ___ (особистий знак)"
        answer: "підпис"

  - type: build_sentence
    title: "Склади автобіографію"
    instruction: "Напиши речення для автобіографії"
    sentences:
      - words: ["Я", ",", "Петренко", "Іван", "Олегович", ",", "народився", "15", "березня", "2000", "року", "."]
        correct: "Я, Петренко Іван Олегович, народився 15 березня 2000 року."
      - words: ["У", "2007", "році", "вступив", "до", "школи", "№", "12", "м.", "Києва", "."]
        correct: "У 2007 році вступив до школи № 12 м. Києва."
      - words: ["У", "2018", "році", "закінчив", "школу", "і", "вступив", "до", "університету", "."]
        correct: "У 2018 році закінчив школу і вступив до університету."
      - words: ["На", "цей", "час", "навчаюся", "на", "третьому", "курсі", "."]
        correct: "На цей час навчаюся на третьому курсі."

  - type: classify
    title: "До якого документа належить?"
    instruction: "Розподіли фрази: заява, довідка чи автобіографія?"
    categories:
      - label: "Заява"
        items:
          - "Прошу надати мені відпустку."
          - "Прошу зарахувати мене на курс."
          - "Зобов'язуюсь виконати всі умови."
          - "На ім'я директора школи"
      - label: "Довідка"
        items:
          - "Видана для подання за місцем вимоги."
          - "Підтверджуємо, що Петренко І. О. працює..."
          - "Штамп установи"
          - "Реєстраційний номер"
      - label: "Автобіографія"
        items:
          - "Я, Петренко Іван Олегович, народився..."
          - "У 2018 році закінчив школу."
          - "На цей час працюю інженером."
          - "Одружений, маю двох дітей."

  - type: reading
    title: "Зразок заяви"
    text: |
      Директору КЗ «Ліцей № 5»
      Коваленку Олегу Миколайовичу
      учня 10-А класу
      Петренка Івана Олеговича

      ЗАЯВА

      Прошу звільнити мене від занять з 05.04.2026 по 10.04.2026 у зв'язку з сімейними обставинами. Зобов'язуюсь опрацювати пропущений матеріал самостійно.

      01.04.2026                                                     Петренко І. О.
    questions:
      - question: "Хто адресат заяви?"
        answer: "Директор ліцею № 5 Коваленко Олег Миколайович."
      - question: "Що просить учень?"
        answer: "Звільнити від занять з 05.04 по 10.04.2026."
      - question: "Яка причина?"
        answer: "Сімейні обставини."

  - type: true_false
    title: "Правила оформлення"
    items:
      - statement: "У заяві спочатку пишемо «від кого», потім «кому»."
        answer: false
        correction: "Спочатку «кому» (адресат), потім «від кого» (адресант)."
      - statement: "Автобіографію пишуть у хронологічному порядку."
        answer: true
      - statement: "На довідці має бути штамп або печатка установи."
        answer: true
      - statement: "У заяві можна писати «Привіт, пане директоре!»."
        answer: false
        correction: "Заява — офіційний документ. Звертання: на ім'я + посада."
      - statement: "Після тексту заяви ставлять дату й підпис."
        answer: true
      - statement: "«Прошу» — типове дієслово для заяви."
        answer: true
