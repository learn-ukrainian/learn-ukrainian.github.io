module: pysannia-perekaz
track: l2-uk-direct
level: b1
type: writing
title: "Переказ"
subtitle: "Стислий, вибірковий і детальний переказ тексту"
standard_ref: "§1.3 — переказ подій, стислий і розгорнутий виклад"
textbook_ref: "Grade 5 — переказ (§53), типи переказу"
teaching_notes: |
  Три типи переказу: стислий (головне), вибірковий (окремі факти), детальний (усе послідовно).
  Стислий переказ: відкиньте деталі, залиште головну думку кожного абзацу.
  Вибірковий: оберіть лише ту інформацію, яка стосується конкретного питання.
  Детальний: збережіть послідовність, основні деталі, ключові слова автора.
  Темпоральні маркери: спочатку, потім, після цього, нарешті, зрештою, водночас.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Спочатку... → Потім... → Після цього... → Нарешті..."
  examples:
    - "Спочатку хлопець пішов до школи."
    - "Потім він зустрів друга."
    - "Нарешті вони дійшли до парку."

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Темпоральні маркери"
    items:
      - word: "спочатку"
        emoji: "\U0001F6A6"
        sentence: "Спочатку прочитайте текст повністю."
      - word: "потім"
        emoji: "\U000027A1"
        sentence: "Потім випишіть ключові слова."
      - word: "після цього"
        emoji: "\U000023E9"
        sentence: "Після цього складіть план переказу."
      - word: "нарешті"
        emoji: "\U0001F3C1"
        sentence: "Нарешті перепишіть переказ начисто."
      - word: "зрештою"
        emoji: "\U00002705"
        sentence: "Зрештою він зрозумів задачу."
      - word: "водночас"
        emoji: "\U000023F0"
        sentence: "Водночас інші діти грали у дворі."
      - word: "тим часом"
        emoji: "\U000023F3"
        sentence: "Тим часом батьки готували обід."

  - category: "Типи переказу"
    items:
      - word: "стислий переказ"
        emoji: "\U0001F4DD"
        sentence: "Стислий переказ — тільки головне."
      - word: "вибірковий переказ"
        emoji: "\U0001F50D"
        sentence: "Вибірковий переказ — окремі факти."
      - word: "детальний переказ"
        emoji: "\U0001F4D6"
        sentence: "Детальний переказ — усе послідовно."
      - word: "головна думка"
        emoji: "\U0001F4A1"
        sentence: "Визначте головну думку тексту."
      - word: "ключове слово"
        emoji: "\U0001F511"
        sentence: "Підкресліть ключові слова."

  - category: "Дієслова для переказу"
    items:
      - word: "розповідати"
        emoji: "\U0001F5E3"
        sentence: "Автор розповідає про подорож."
      - word: "описувати"
        emoji: "\U0001F4DD"
        sentence: "Він описує природу Карпат."
      - word: "пояснювати"
        emoji: "\U0001F4AC"
        sentence: "Текст пояснює причини події."
      - word: "згадувати"
        emoji: "\U0001F4AD"
        sentence: "Автор згадує дитинство."
      - word: "підсумовувати"
        emoji: "\U0001F4CA"
        sentence: "Наприкінці автор підсумовує."
      - word: "зазначати"
        emoji: "\U0001F4CB"
        sentence: "Автор зазначає, що це важливо."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: reading
    title: "Стислий переказ"
    text: |
      Минулого літа Олена поїхала до бабусі в Карпати. Спочатку вона їхала поїздом до Івано-Франківська. Потім пересіла на автобус до маленького села. Дорогою вона бачила гори, ліси й річки. У селі бабуся зустріла її з варениками й узваром. Увесь тиждень Олена ходила в гори, збирала ягоди й купалася в річці. Нарешті настав день від'їзду. Олена сумувала, але обіцяла повернутися наступного року.
    questions:
      - question: "Перекажіть стисло (3 речення): куди, що робила, чим закінчилось."
        answer: "Олена поїхала до бабусі в Карпати. Тиждень вона ходила в гори й купалася в річці. Наприкінці сумувала, але обіцяла повернутися."
      - question: "Яка головна думка тексту?"
        answer: "Літній відпочинок у Карпатах приніс багато радості."
      - question: "Які темпоральні маркери є в тексті?"
        answer: "Спочатку, потім, увесь тиждень, нарешті."

  - type: build_sentence
    title: "Вибери ключові факти"
    instruction: "Для вибіркового переказу (тема: транспорт) обери правильні речення"
    sentences:
      - words: ["Олена", "їхала", "поїздом", "до", "Івано-Франківська", "."]
        correct: "Олена їхала поїздом до Івано-Франківська."
      - words: ["Потім", "пересіла", "на", "автобус", "до", "села", "."]
        correct: "Потім пересіла на автобус до села."
      - words: ["Дорогою", "вона", "бачила", "гори", "й", "ліси", "."]
        correct: "Дорогою вона бачила гори й ліси."

  - type: pattern_drill
    title: "З'єднай маркерами"
    prompt: "Встав правильний темпоральний маркер"
    items:
      - given: "___ прочитайте текст уважно."
        answer: "Спочатку"
      - given: "___ випишіть ключові слова."
        answer: "Потім"
      - given: "___ складіть план переказу."
        answer: "Після цього"
      - given: "___ напишіть переказ начисто."
        answer: "Нарешті"
      - given: "Мама готувала обід. ___ тато читав газету."
        answer: "Тим часом"
      - given: "___ він зрозумів, що помилився."
        answer: "Зрештою"

  - type: reading
    title: "Детальний переказ"
    text: |
      Тарас Шевченко народився 9 березня 1814 року в селі Моринці на Черкащині. Його батьки були кріпаками. Рано залишившись сиротою, маленький Тарас пережив багато труднощів. Спочатку він працював у пана як козачок. Потім його помітив художник Карл Брюллов. Завдяки допомозі друзів Шевченка викупили з кріпацтва у 1838 році. Після цього він вступив до Академії мистецтв у Петербурзі. Водночас писав вірші українською мовою.
    questions:
      - question: "Де і коли народився Шевченко?"
        answer: "9 березня 1814 року в селі Моринці на Черкащині."
      - question: "Хто допоміг Шевченку звільнитися?"
        answer: "Художник Карл Брюллов і друзі."
      - question: "Що Шевченко робив після звільнення?"
        answer: "Вступив до Академії мистецтв і писав вірші."

  - type: true_false
    title: "Типи переказу"
    items:
      - statement: "У стислому переказі передаємо всі деталі тексту."
        answer: false
        correction: "Стислий переказ — тільки головна думка кожного абзацу."
      - statement: "Вибірковий переказ стосується однієї теми або аспекту тексту."
        answer: true
      - statement: "«Спочатку... потім... нарешті» — темпоральні маркери."
        answer: true
      - statement: "Детальний переказ можна писати в будь-якому порядку."
        answer: false
        correction: "Детальний переказ зберігає послідовність подій."
      - statement: "Ключові слова допомагають скласти план переказу."
        answer: true

  - type: classify
    title: "Який тип переказу?"
    instruction: "Визнач тип переказу за описом"
    categories:
      - label: "Стислий переказ"
        items:
          - "Передати головну думку кожного абзацу."
          - "Скоротити 8 речень до 3."
          - "Відкинути деталі, залишити суть."
      - label: "Вибірковий переказ"
        items:
          - "Вибрати з тексту лише факти про транспорт."
          - "Переказати тільки опис природи."
          - "Розповісти лише про одного героя."
      - label: "Детальний переказ"
        items:
          - "Зберегти послідовність усіх подій."
          - "Передати основні деталі й ключові слова."
          - "Переказати текст якомога повніше."

  - type: proverb_drill
    title: "Прислів'я: про слово"
    proverb: "Менше говори — більше вчуєш."
    source: "Grade 6 Avramenko"
    activity:
      type: fill_gap
      gap_word: "вчуєш"
      meaning: "Слухай більше, ніж говориш. Для переказу важливо уважно слухати."
