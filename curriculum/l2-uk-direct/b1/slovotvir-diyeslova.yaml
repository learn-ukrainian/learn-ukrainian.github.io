module: slovotvir-diyeslova
track: l2-uk-direct
level: b1
type: grammar
title: "Словотвір від дієслів"
subtitle: "Назви дійової особи, дії, місця, результату"
standard_ref: "§4.3 — словотвір: назви діяча (-ач, -ець, -ник), дії (-ння, -ття), місця (-ня, -ище)"
textbook_ref: "5 клас — словотвір, суфіксальний спосіб"
teaching_notes: |
  Від дієслів утворюються іменники чотирьох типів.
  Назви діяча: суфікси -ач (читач), -ець (співець), -ник (працівник).
  Назви дії: суфікси -ння (читання), -ття (життя).
  Назви місця: суфікси -ня (спальня), -ище (летовище).
  Назви результату: суфікси -ок (малюнок), -ка (знахідка).
  Це продуктивні моделі — учень зможе розпізнавати нові слова за суфіксами.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Дієслово → іменник через суфікс: -ач (хто робить), -ння (сама дія), -ня (де роблять), -ок (що виходить)."
  examples:
    - "читати → читач (хто?), читання (що?), читальня (де?)"
    - "працювати → працівник (хто?)"
    - "малювати → малюнок (що вийшло?)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Словотвір від дієслів — продуктивні моделі"
    columns: ["Тип", "Значення", "Суфікси", "Приклади"]
    rows:
      - ["Назва діяча", "хто робить", "-ач, -ець, -ник", "читач, співець, працівник"]
      - ["Назва дії", "сама дія", "-ння, -ття", "читання, говоріння, життя"]
      - ["Назва місця", "де роблять", "-ня, -ище", "спальня, читальня, летовище"]
      - ["Назва результату", "що вийшло", "-ок, -ка", "малюнок, знахідка"]

  - title: "Від дієслова до іменника — приклади"
    columns: ["Дієслово", "Діяч", "Дія", "Місце"]
    rows:
      - ["читати", "читач", "читання", "читальня"]
      - ["вчити", "учитель", "навчання", "—"]
      - ["спати", "—", "—", "спальня"]
      - ["літати", "—", "—", "летовище"]
      - ["малювати", "маляр", "малювання", "—"]
      - ["співати", "співець / співак", "спів", "—"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
