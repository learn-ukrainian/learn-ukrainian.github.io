# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Утвори назву діяча"
    prompt: "Від дієслова утвори іменник — хто робить?"
    items:
      - given: "читати → ?"
        answer: "читач"
      - given: "співати → ?"
        answer: "співак"
      - given: "працювати → ?"
        answer: "працівник"
      - given: "водити → ?"
        answer: "водій"
      - given: "дивитися → ?"
        answer: "глядач"
      - given: "слухати → ?"
        answer: "слухач"
      - given: "вчити → ?"
        answer: "учитель"
      - given: "грати → ?"
        answer: "гравець"
      - given: "бігати → ?"
        answer: "бігун"
      - given: "перекладати → ?"
        answer: "перекладач"

  - type: pattern_drill
    title: "Утвори назву дії"
    prompt: "Від дієслова утвори іменник — сама дія"
    items:
      - given: "читати → ?"
        answer: "читання"
      - given: "говорити → ?"
        answer: "говоріння"
      - given: "вчити → ?"
        answer: "навчання"
      - given: "малювати → ?"
        answer: "малювання"
      - given: "писати → ?"
        answer: "писання"
      - given: "плавати → ?"
        answer: "плавання"
      - given: "бігати → ?"
        answer: "бігання"
      - given: "жити → ?"
        answer: "життя"
      - given: "плести → ?"
        answer: "плетіння"
      - given: "вишивати → ?"
        answer: "вишивання"

  - type: classify
    title: "Який тип іменника?"
    instruction: "Розподіли: діяч, дія, місце чи результат?"
    categories:
      - label: "Назва діяча (хто?)"
        items:
          - "читач"
          - "співак"
          - "працівник"
          - "водій"
      - label: "Назва дії (що?)"
        items:
          - "читання"
          - "навчання"
          - "говоріння"
          - "малювання"
      - label: "Назва місця (де?)"
        items:
          - "спальня"
          - "читальня"
          - "летовище"
      - label: "Назва результату (що вийшло?)"
        items:
          - "малюнок"
          - "знахідка"
          - "виріб"

  - type: build_sentence
    title: "Вжий похідний іменник"
    instruction: "Склади речення з похідним іменником від дієслова"
    sentences:
      - words: ["[Читати/Читання]", "розвиває", "уяву", "."]
        correct: "Читання розвиває уяву."
      - words: ["[Співати/Співак]", "виступив", "на", "концерті", "."]
        correct: "Співак виступив на концерті."
      - words: ["У", "[читати/читальні]", "завжди", "тихо", "."]
        correct: "У читальні завжди тихо."
      - words: ["Дитина", "зробила", "гарний", "[малювати/малюнок]", "."]
        correct: "Дитина зробила гарний малюнок."
      - words: ["[Працювати/Працівник]", "допоміг", "клієнтові", "."]
        correct: "Працівник допоміг клієнтові."

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "«Читальня» — це людина, яка читає."
        answer: false
        correction: "«Читальня» — це місце для читання. Людина — «читач»."
      - statement: "«Читання» — це назва дії."
        answer: true
      - statement: "Суфікс «-ач» утворює назви місць."
        answer: false
        correction: "Суфікс «-ач» утворює назви діяча: читач, глядач."
      - statement: "«Малюнок» — це результат малювання."
        answer: true
      - statement: "«Життя» — це назва дії від «жити»."
        answer: true
      - statement: "«Спальня» — це назва місця від «спати»."
        answer: true
