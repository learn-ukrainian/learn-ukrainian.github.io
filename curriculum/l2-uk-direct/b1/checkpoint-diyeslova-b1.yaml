module: checkpoint-diyeslova-b1
track: l2-uk-direct
level: b1
type: checkpoint
title: "Контрольна точка: дієслівна система"
subtitle: "Умовний спосіб, майбутній час, неправильні дієслова, рух, словотвір"
standard_ref: "§4.2–4.4 — дієслівна система B1"
textbook_ref: "5 клас — дієслово (узагальнення)"
teaching_notes: |
  Контрольна точка охоплює модулі 16–21: реальна та нереальна умова, майбутній час у контексті,
  неправильні дієслова, словотвір від дієслів, дієслова руху з видовими парами.
  Поріг проходження: 70%.
  Зосередьтеся на найчастіших помилках: плутанина якщо/якби, *буду зробити, неправильні форми.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Перевірка дієслівної системи B1: умовний спосіб, вибір майбутнього часу, неправильні дієслова, видові пари руху, словотвір."
  examples:
    - "Якщо матиму час, прочитаю. (реальна) / Якби мав час, я б прочитав. (нереальна)"
    - "дати → дам, їсти → їм, бігти → біжу"
    - "прийти → приходити; увійти → вхід"

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Ключові слова з модулів 16–21"
    items:
      - word: "якщо"
        emoji: "\U00002753"
        sentence: "Якщо встигну, приїду."
      - word: "якби"
        emoji: "\U0001F914"
        sentence: "Якби мав час, допоміг би."
      - word: "дати"
        emoji: "\U0001F91D"
        sentence: "Дай мені книгу."
      - word: "їсти"
        emoji: "\U0001F35D"
        sentence: "Що ти їси?"
      - word: "бігти"
        emoji: "\U0001F3C3"
        sentence: "Куди ти біжиш?"
      - word: "читач"
        emoji: "\U0001F4D6"
        sentence: "Читач повернув книгу."
      - word: "читання"
        emoji: "\U0001F4DA"
        sentence: "Читання корисне."
      - word: "прийти"
        emoji: "\U000027A1"
        sentence: "Він прийшов учора."
      - word: "приходити"
        emoji: "\U0001F503"
        sentence: "Він приходить щодня."
      - word: "вхід"
        emoji: "\U0001F6AA"
        sentence: "Де вхід до музею?"
      - word: "вихід"
        emoji: "\U0001F6AA"
        sentence: "Аварійний вихід праворуч."
      - word: "перехід"
        emoji: "\U0001F6B6"
        sentence: "Пішохідний перехід біля школи."
      - word: "розмовний"
        emoji: "\U0001F5E3"
        sentence: "«Буду робити» — розмовний стиль."
      - word: "офіційний"
        emoji: "\U0001F4BC"
        sentence: "«Здійснюватиме» — офіційний стиль."
      - word: "умова"
        emoji: "\U0001F4DC"
        sentence: "Яка умова в цьому реченні?"

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Реальна чи нереальна умова?"
    prompt: "Доповни речення правильною формою"
    items:
      - given: "_____ матиму час, прочитаю книгу."
        answer: "Якщо"
      - given: "_____ мав час, я б прочитав книгу."
        answer: "Якби"
      - given: "Якщо він прийде, ми _____."
        answer: "почнемо"
      - given: "Якби він прийшов, ми б _____."
        answer: "почали"
      - given: "_____ буде дощ, візьми парасольку."
        answer: "Якщо"
      - given: "_____ було тепло, ми б пішли."
        answer: "Якби"
      - given: "Якщо дізнаюся, я _____."
        answer: "скажу"
      - given: "Якби дізнався, я б _____."
        answer: "сказав"

  - type: pattern_drill
    title: "Неправильні дієслова"
    prompt: "Постав дієслово в правильну форму"
    items:
      - given: "дати → вони"
        answer: "дадуть"
      - given: "їсти → я"
        answer: "їм"
      - given: "бігти → він"
        answer: "біжить"
      - given: "їсти → вони"
        answer: "їдять"
      - given: "дати → ти"
        answer: "даси"
      - given: "бігти → ми"
        answer: "біжимо"
      - given: "митися → я"
        answer: "миюся"
      - given: "боротися → вони"
        answer: "борються"

  - type: classify
    title: "Форма майбутнього часу"
    instruction: "Розподіли: складена (розмовна), синтетична (офіційна), доконана (результативна)"
    categories:
      - label: "Складена (розмовна)"
        items:
          - "Я буду працювати."
          - "Вони будуть чекати."
          - "Ти будеш готувати?"
      - label: "Синтетична (офіційна)"
        items:
          - "Міністр зустрічатиме гостей."
          - "Комісія розглядатиме справу."
          - "Учні складатимуть іспит."
      - label: "Доконана (результативна)"
        items:
          - "Я зроблю це завтра."
          - "Вона напише звіт."
          - "Ми закінчимо проєкт."

  - type: classify
    title: "Одноразова чи багаторазова дія?"
    instruction: "Розподіли дієслова руху"
    categories:
      - label: "Доконаний (одноразова)"
        items:
          - "прийти"
          - "вийти"
          - "перейти"
          - "увійти"
      - label: "Недоконаний (багаторазова)"
        items:
          - "приходити"
          - "виходити"
          - "переходити"
          - "уходити"

  - type: classify
    title: "Словотвір: тип іменника"
    instruction: "Визнач тип похідного іменника"
    categories:
      - label: "Діяч"
        items:
          - "читач"
          - "співак"
          - "працівник"
      - label: "Дія"
        items:
          - "читання"
          - "навчання"
          - "говоріння"
      - label: "Місце"
        items:
          - "спальня"
          - "читальня"
      - label: "Результат"
        items:
          - "малюнок"
          - "знахідка"

  - type: build_sentence
    title: "Склади речення"
    instruction: "Вибери правильну форму"
    sentences:
      - words: ["Якщо", "вона", "[прийде/прийшла б]", ",", "ми", "почнемо", "."]
        correct: "Якщо вона прийде, ми почнемо."
      - words: ["Якби", "він", "[знав/знає]", ",", "він", "б", "допоміг", "."]
        correct: "Якби він знав, він б допоміг."
      - words: ["Мама", "[дасть/дає]", "мені", "гроші", "завтра", "."]
        correct: "Мама дасть мені гроші завтра."
      - words: ["Він", "щодня", "[приходить/прийшов]", "о", "восьмій", "."]
        correct: "Він щодня приходить о восьмій."
      - words: ["Де", "аварійний", "[вихід/виходити]", "?"]
        correct: "Де аварійний вихід?"

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "«Я буду зробити» — правильна форма."
        answer: false
        correction: "Правильно: «Я зроблю». Доконаний вид не вживається зі складеним майбутнім."
      - statement: "«Якби» вживають для реальних умов."
        answer: false
        correction: "«Якби» — нереальна умова. «Якщо» — реальна."
      - statement: "«Їдять» — це від «їсти»."
        answer: true
      - statement: "«Від'їхати» пишеться з апострофом."
        answer: true
      - statement: "«Вхід» утворено від «увійти»."
        answer: true
      - statement: "«Бігуть» — правильна форма."
        answer: false
        correction: "Правильно: «біжать»."

  - type: reading
    title: "Читання: Листування друзів"
    text: |
      Андрій: Привіт! Якщо матиму час у суботу, приїду до тебе. Якби мій начальник дав відпустку раніше, я б уже був у Львові!
      Марина: Чекатиму на тебе! Якщо приїдеш, зайдемо до нової кав'ярні. Там співак виступатиме ввечері. А якби ти знав, який там борщ — їв би щодня!
      Андрій: Звучить чудово. Дам знати завтра. Де вхід до кав'ярні?
      Марина: Перейдеш дорогу на пішохідному переході — і побачиш вивіску.
    questions:
      - question: "Яка реальна умова є в тексті?"
        answer: "Якщо матиму час, приїду. Якщо приїдеш, зайдемо."
      - question: "Яка нереальна умова?"
        answer: "Якби начальник дав відпустку раніше, я б уже був у Львові."
      - question: "Які іменники від дієслів руху є в тексті?"
        answer: "Вхід, перехід (пішохідний перехід)."

  - type: reading
    title: "Читання: Розклад дня"
    text: |
      Щодня я встаю о сьомій. Якщо встигну, снідаю вдома — їм кашу або бутерброди. Біжу на зупинку, сідаю в автобус. Приходжу на роботу о дев'ятій. Працюватиму до шостої. Якби мав більше часу, читав би книги, а не новини. Увечері виходжу з офісу, переходжу дорогу й заходжу до магазину. Малюнок мого дня завжди однаковий.
    questions:
      - question: "Які неправильні дієслова є в тексті?"
        answer: "Їм (від їсти), біжу (від бігти)."
      - question: "Яка нереальна умова?"
        answer: "Якби мав більше часу, читав би книги."
      - question: "Які недоконані дієслова руху описують щоденну рутину?"
        answer: "Приходжу, виходжу, переходжу, заходжу."
