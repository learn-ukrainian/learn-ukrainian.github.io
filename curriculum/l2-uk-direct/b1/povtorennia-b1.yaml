module: povtorennia-b1
track: l2-uk-direct
level: b1
type: practice
title: "Повторення B1"
subtitle: "Комплексне повторення граматики, лексики й навичок B1"
standard_ref: "Усі §§ B1 — повний обсяг рівня"
textbook_ref: "Grade 5–6 — повторення, узагальнення"
teaching_notes: |
  Комплексне повторення всього B1: відмінювання, займенники, числівники,
  дієслівні форми (умовний, синтетичний майбутній, нерегулярні, префіксальний рух),
  складне речення, фразеологія, стилі, антисуржик, словотвір, письмо, діалог.
  Змішані завдання різних типів. Не нове — тільки повторення й закріплення.

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Граматичні терміни (повторення)"
    items:
      - word: "відмінок"
        emoji: "\U0001F4CB"
        sentence: "В українській мові сім відмінків."
      - word: "умовний спосіб"
        emoji: "\U0001F914"
        sentence: "Якби я мав час, поїхав би."
      - word: "синтетичний майбутній"
        emoji: "\U000023E9"
        sentence: "Я писатиму лист завтра."
      - word: "фразеологізм"
        emoji: "\U0001F4AC"
        sentence: "«Байдики бити» — це фразеологізм."
      - word: "суржик"
        emoji: "\U0001F6AB"
        sentence: "Суржик — це змішування мов."

  - category: "Ключова лексика B1"
    items:
      - word: "держава"
        emoji: "\U0001F3DB"
        sentence: "Україна — незалежна держава."
      - word: "конституція"
        emoji: "\U0001F4DC"
        sentence: "Конституція — основний закон."
      - word: "визначна пам'ятка"
        emoji: "\U00002B50"
        sentence: "Софійський собор — визначна пам'ятка."
      - word: "традиція"
        emoji: "\U0001F3AD"
        sentence: "Колядки — різдвяна традиція."
      - word: "волонтер"
        emoji: "\U0001F91D"
        sentence: "Волонтери допомагають армії."

  - category: "Комунікативна лексика"
    items:
      - word: "заява"
        emoji: "\U0001F4C4"
        sentence: "Напишіть заяву на ім'я директора."
      - word: "відгук"
        emoji: "\U0001F4DD"
        sentence: "Напишіть відгук на фільм."
      - word: "переказ"
        emoji: "\U0001F4D6"
        sentence: "Зробіть стислий переказ тексту."
      - word: "діалог"
        emoji: "\U0001F5E3"
        sentence: "Складіть діалог на 10 реплік."
      - word: "скарга"
        emoji: "\U0001F4E2"
        sentence: "Подати скаргу на обслуговування."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Відмінювання: змішане"
    prompt: "Постав слово в правильну форму"
    items:
      - given: "Я бачу (сестра) → ?"
        answer: "сестру"
      - given: "Книга (учитель) → ?"
        answer: "учителя"
      - given: "Іду до (школа) → ?"
        answer: "школи"
      - given: "Живу в (місто) → ?"
        answer: "місті"
      - given: "Задоволений (результат) → ?"
        answer: "результатом"
      - given: "Лист (подруга) → ?"
        answer: "подруги"
      - given: "Дякую (лікар) → ?"
        answer: "лікарю / лікареві"
      - given: "Зустрівся з (друг) → ?"
        answer: "другом"

  - type: pattern_drill
    title: "Дієслівні форми"
    prompt: "Утвори правильну форму"
    items:
      - given: "Якби я мав час, я (поїхати) → ?"
        answer: "поїхав би"
      - given: "Завтра я (писати) лист → ?"
        answer: "писатиму"
      - given: "Вона (дати) мені книгу вчора → ?"
        answer: "дала"
      - given: "Ми (їсти) обід о другій → ?"
        answer: "їстимемо"
      - given: "Він (прийти) завтра → ?"
        answer: "прийде"
      - given: "Якщо матиму час, (зателефонувати) → ?"
        answer: "зателефоную"
      - given: "Діти (вийти) з школи → ?"
        answer: "вийшли"
      - given: "Ми (перейти) через дорогу → ?"
        answer: "перейшли"

  - type: classify
    title: "Тип речення"
    instruction: "Просте, складносурядне чи складнопідрядне?"
    categories:
      - label: "Просте"
        items:
          - "Діти граються у дворі."
          - "Львів — красиве місто."
          - "Він працює інженером."
      - label: "Складносурядне"
        items:
          - "Сонце зайшло, і стало темно."
          - "Він хотів допомогти, але не встиг."
          - "Або ти, або я."
      - label: "Складнопідрядне"
        items:
          - "Я знаю, що він прийде."
          - "Коли я прийшов, вона вже пішла."
          - "Якщо матимеш час, зателефонуй."
          - "Хоча він утомився, продовжив роботу."

  - type: build_sentence
    title: "Складне речення"
    instruction: "Склади складнопідрядне речення"
    sentences:
      - words: ["Якби", "я", "мав", "гроші", ",", "поїхав", "би", "до", "Львова", "."]
        correct: "Якби я мав гроші, поїхав би до Львова."
      - words: ["Коли", "закінчу", "університет", ",", "буду", "працювати", "лікарем", "."]
        correct: "Коли закінчу університет, буду працювати лікарем."
      - words: ["Хоча", "він", "утомився", ",", "продовжив", "роботу", "."]
        correct: "Хоча він утомився, продовжив роботу."
      - words: ["Я", "вважаю", ",", "що", "освіта", "—", "дуже", "важлива", "."]
        correct: "Я вважаю, що освіта — дуже важлива."
      - words: ["Якщо", "матимеш", "час", ",", "зайди", "до", "мене", "."]
        correct: "Якщо матимеш час, зайди до мене."

  - type: pattern_drill
    title: "Антисуржик"
    prompt: "Виправ суржик"
    items:
      - given: "приймати участь → ?"
        answer: "брати участь"
      - given: "слідуючий → ?"
        answer: "наступний"
      - given: "являється → ?"
        answer: "є"
      - given: "на протязі → ?"
        answer: "протягом"
      - given: "міроприємство → ?"
        answer: "захід"
      - given: "рахувати (думати) → ?"
        answer: "вважати"
      - given: "відноситися → ?"
        answer: "ставитися"
      - given: "у якості → ?"
        answer: "як"

  - type: reading
    title: "Комплексний текст"
    text: |
      Минулого тижня в нашому місті відбулася ярмарка народних ремесел. Спочатку мер відкрив захід офіційною промовою. Потім гості оглянули виставку вишиванок, писанок і виробів з кераміки. Екскурсовод розповів, що традиція писанкарства налічує понад тисячу років. На мою думку, такі заходи допомагають зберігати культурну спадщину. Якби кожне місто проводило такі ярмарки, молодь більше цікавилася б традиціями. Рекомендую всім відвідати подібний захід.
    questions:
      - question: "Яка головна тема тексту?"
        answer: "Ярмарок народних ремесел у місті."
      - question: "Яке речення є умовним?"
        answer: "«Якби кожне місто проводило такі ярмарки, молодь більше цікавилася б традиціями.»"
      - question: "Знайдіть думку автора."
        answer: "«На мою думку, такі заходи допомагають зберігати культурну спадщину.»"
      - question: "Які ремесла згадано?"
        answer: "Вишиванки, писанки, кераміка."

  - type: true_false
    title: "Змішана перевірка"
    items:
      - statement: "В українській мові сім відмінків."
        answer: true
      - statement: "«Якби» вживається з реальною умовою."
        answer: false
        correction: "«Якби» — нереальна умова. Реальна — «якщо»."
      - statement: "Синтетичний майбутній час: писатиму, писатимеш."
        answer: true
      - statement: "«Брати участь» — суржик."
        answer: false
        correction: "«Брати участь» — норма. Суржик — «приймати участь»."
      - statement: "У складнопідрядному реченні є головна й підрядна частини."
        answer: true
      - statement: "Конституція — основний закон держави."
        answer: true
