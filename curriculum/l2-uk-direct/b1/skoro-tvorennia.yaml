# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Розшифруй абревіатуру"
    prompt: "Що означає ця абревіатура?"
    items:
      - given: "ВР → ?"
        answer: "Верховна Рада"
      - given: "ООН → ?"
        answer: "Організація Об'єднаних Націй"
      - given: "НАТО → ?"
        answer: "Північноатлантичний альянс"
      - given: "ЗНО → ?"
        answer: "Зовнішнє незалежне оцінювання"
      - given: "ЗСУ → ?"
        answer: "Збройні сили України"
      - given: "МОН → ?"
        answer: "Міністерство освіти і науки"
      - given: "вул. → ?"
        answer: "вулиця"
      - given: "м. → ?"
        answer: "місто"
      - given: "кг → ?"
        answer: "кілограм"
      - given: "грн → ?"
        answer: "гривня"

  - type: classify
    title: "Розподіли слова"
    instruction: "Складне слово, абревіатура чи звичайне слово?"
    categories:
      - label: "Складні слова"
        items:
          - "пароплав"
          - "землетрус"
          - "водоспад"
          - "хлібороб"
          - "літопис"
          - "водопровід"
      - label: "Абревіатури"
        items:
          - "ООН"
          - "НАТО"
          - "ЗНО"
          - "ЗСУ"
          - "ВР"
          - "МОН"
      - label: "Звичайні слова"
        items:
          - "корабель"
          - "місто"
          - "вулиця"
          - "річка"
          - "будинок"
          - "учитель"

  - type: build_sentence
    title: "Використай абревіатуру"
    instruction: "Склади речення з абревіатурою або складним словом"
    sentences:
      - words: ["Засідання", "ВР", "відбудеться", "завтра", "."]
        correct: "Засідання ВР відбудеться завтра."
      - words: ["Україна", "—", "член", "ООН", "."]
        correct: "Україна — член ООН."
      - words: ["Землетрус", "стався", "вночі", "."]
        correct: "Землетрус стався вночі."
      - words: ["Адреса", ":", "вул.", "Франка", ",", "5", "."]
        correct: "Адреса: вул. Франка, 5."
      - words: ["ЗНО", "складають", "у", "травні", "."]
        correct: "ЗНО складають у травні."

  - type: true_false
    title: "Правда чи ні?"
    items:
      - statement: "«ООН» — це одне слово."
        answer: false
        correction: "ООН — абревіатура трьох слів: Організація Об'єднаних Націй."
      - statement: "У складних словах сполучний голосний — о або е."
        answer: true
      - statement: "«Пароплав» — складне слово з двома коренями."
        answer: true
      - statement: "«Вул.» — це абревіатура."
        answer: false
        correction: "«Вул.» — графічне скорочення. Абревіатура — з перших літер кількох слів."
      - statement: "«Листопад» — складне слово: лист + пад."
        answer: true
      - statement: "Після м'якого приголосного в складних словах пишемо о."
        answer: false
        correction: "Після м'якого приголосного — е (землетрус)."

  - type: pattern_drill
    title: "Знайди корені"
    prompt: "Із яких коренів складається слово?"
    items:
      - given: "водолаз → ?"
        answer: "вод + лаз"
      - given: "пароплав → ?"
        answer: "пар + плав"
      - given: "землетрус → ?"
        answer: "земл + трус"
      - given: "хлібороб → ?"
        answer: "хліб + роб"
      - given: "водоспад → ?"
        answer: "вод + спад"
      - given: "літопис → ?"
        answer: "літ + пис"
      - given: "водопровід → ?"
        answer: "вод + провід"
      - given: "листопад → ?"
        answer: "лист + пад"
