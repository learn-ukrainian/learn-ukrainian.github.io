module: skoro-tvorennia
track: l2-uk-direct
level: b1
type: grammar
title: "Словотвір: складні слова й абревіатури"
subtitle: "Складання основ, скорочення, графічне стиснення"
standard_ref: "§4.3 — складні слова; §4.1 — графічне скорочення, абревіатури"
textbook_ref: "Grade 5–6 — словотвір, складні слова, абревіатури"
teaching_notes: |
  Складні слова: два корені з'єднані голосними о/е (сполучними): пароплав, землетрус, водолаз.
  Правило: після твердого приголосного — о (пароплав), після м'якого — е (землетрус).
  Абревіатури: буквені (ООН, ВР, НАТО), звукові (ЗНО, НУШ), складові (завуч, колгосп).
  Графічні скорочення: вул. (вулиця), м. (місто), кг (кілограм), грн (гривня).
  Не змішуйте абревіатуру й скорочення: ООН читаємо по літерах, а вул. — повне слово.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Складні слова: корінь + о/е + корінь. Абревіатури: перші літери слів."
  examples:
    - "пар + о + плав = пароплав (корабель)"
    - "земл + е + трус = землетрус"
    - "ВР = Верховна Рада"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Типи складних слів"
    columns: ["Складне слово", "Корені", "Значення"]
    rows:
      - ["пароплав", "пар + плав", "корабель"]
      - ["землетрус", "земл + трус", "коливання землі"]
      - ["водолаз", "вод + лаз", "підводний плавець"]
      - ["самолít", "сам + літ", "літак"]
      - ["водоспад", "вод + спад", "водяний потік вниз"]
      - ["листопад", "лист + пад", "падіння листя; місяць"]
  - title: "Поширені абревіатури"
    columns: ["Абревіатура", "Повна форма", "Тип"]
    rows:
      - ["ВР", "Верховна Рада", "буквена"]
      - ["ООН", "Організація Об'єднаних Націй", "буквена"]
      - ["НАТО", "Північноатлантичний альянс", "звукова"]
      - ["ЗНО", "зовнішнє незалежне оцінювання", "звукова"]
      - ["ЗСУ", "Збройні сили України", "буквена"]
      - ["МОН", "Міністерство освіти і науки", "звукова"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Складні слова"
    items:
      - word: "пароплав"
