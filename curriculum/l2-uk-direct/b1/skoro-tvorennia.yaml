        sentence: "Пароплав пливе по Дніпру."
      - word: "землетрус"
        emoji: "\U0001F30B"
        sentence: "Землетрус зруйнував кілька будинків."
      - word: "водоспад"
        emoji: "\U0001F4A7"
        sentence: "Це найвищий водоспад в Україні."
      - word: "листопад"
        emoji: "\U0001F342"
        sentence: "Листопад — одинадцятий місяць."
      - word: "водолаз"
        emoji: "\U0001F93F"
        sentence: "Водолаз спустився на дно озера."
      - word: "літопис"
        emoji: "\U0001F4DC"
        sentence: "Літопис — давній рукопис."
      - word: "хлібороб"
        emoji: "\U0001F33E"
        sentence: "Хлібороб вирощує пшеницю."
      - word: "водопровід"
        emoji: "\U0001F6B0"
        sentence: "У селі ремонтують водопровід."

  - category: "Абревіатури та скорочення"
