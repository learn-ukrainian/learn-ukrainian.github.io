module: pryama-nepryama-mova
track: l2-uk-direct
level: b1
type: grammar
title: "Пряма та непряма мова"
subtitle: "Цитування та переказ чужих слів"
standard_ref: "§4.4 — пряма та непряма мова"
textbook_ref: "5 клас (Авраменко §79–81) — пряма та непряма мова"
teaching_notes: |
  Пряма мова — дослівне цитування. Непряма — переказ своїми словами.
  Чотири схеми прямої мови: А: «П.» / «П,» — а. / «П?» — а. / «П!» — а.
  Непряма мова: сказав, що... / запитав, чи...
  При переході до непрямої: займенники та час можуть змінюватися.
  «Я» → «він/вона»; «мій» → «його/її»; «тут» → «там»; «зараз» → «тоді».
  Розділові знаки — ключова складність: лапки, двокрапка, кома, тире.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Пряма: А: «П.» — дослівно. Непряма: А, що/чи П. — переказ."
  examples:
    - "Мама сказала: «Обід готовий.» (пряма)"
    - "Мама сказала, що обід готовий. (непряма)"
    - "Тато запитав, чи готовий обід. (непряма)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Схеми прямої мови"
    columns: ["Схема", "Приклад", "Розділові знаки"]
    rows:
      - ["А: «П.»", "Мама сказала: «Обід готовий.»", "двокрапка, лапки, крапка"]
      - ["«П,» — а.", "«Обід готовий,» — сказала мама.", "кома, тире"]
      - ["«П?» — а.", "«Чи готовий обід?» — запитав тато.", "питальний знак, тире"]
      - ["«П!» — а.", "«Сідайте за стіл!» — покликала мама.", "знак оклику, тире"]

  - title: "Пряма → непряма мова"
    columns: ["Пряма", "Непряма", "Сполучник"]
    rows:
      - ["Він сказав: «Я прийду.»", "Він сказав, що прийде.", "що"]
      - ["Вона запитала: «Ти підеш?»", "Вона запитала, чи він піде.", "чи"]
      - ["Він попросив: «Допоможи мені.»", "Він попросив, щоб я допоміг.", "щоб"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Дієслова мовлення"
    items:
      - word: "сказати"
        emoji: "\U0001F5E3"
        sentence: "Він сказав: «Я повернуся.»"
      - word: "запитати"
        emoji: "\U00002753"
        sentence: "Вона запитала: «Котра година?»"
      - word: "відповісти"
        emoji: "\U0001F4AC"
        sentence: "Він відповів: «Десята.»"
      - word: "попросити"
        emoji: "\U0001F64F"
        sentence: "Вона попросила: «Допоможи мені.»"
      - word: "пояснити"
        emoji: "\U0001F4A1"
        sentence: "Учитель пояснив: «Це правило.»"
      - word: "додати"
        emoji: "\U00002795"
        sentence: "Він додав: «І не запізнюйся.»"
      - word: "покликати"
        emoji: "\U0001F4E3"
        sentence: "«Ходіть сюди!» — покликала мама."
      - word: "повідомити"
        emoji: "\U0001F4E8"
        sentence: "Директор повідомив, що збори перенесено."

  - category: "Сполучники непрямої мови"
    items:
      - word: "що"
        emoji: "\U0001F4AC"
        sentence: "Він сказав, що прийде завтра."
      - word: "чи"
        emoji: "\U00002753"
        sentence: "Вона запитала, чи я прийду."
      - word: "щоб"
        emoji: "\U0001F3AF"
        sentence: "Він попросив, щоб я допоміг."

  - category: "Зміни при переказі"
    items:
      - word: "тоді"
        emoji: "\U0001F550"
        sentence: "Він сказав, що тоді було холодно."
      - word: "там"
        emoji: "\U0001F4CD"
        sentence: "Вона сказала, що була там."
      - word: "його"
        emoji: "\U0001F464"
        sentence: "Він сказав, що це його книга."
      - word: "її"
        emoji: "\U0001F464"
        sentence: "Вона сказала, що це її сумка."
      - word: "цитата"
        emoji: "\U0001F4DD"
        sentence: "Наведу цитату з тексту."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Розстав розділові знаки"
    prompt: "Додай правильні розділові знаки до прямої мови"
    items:
      - given: "Мама сказала _ Обід готовий _"
        answer: "Мама сказала: «Обід готовий.»"
      - given: "_ Обід готовий _ сказала мама"
        answer: "«Обід готовий,» — сказала мама."
      - given: "_ Чи готовий обід _ запитав тато"
        answer: "«Чи готовий обід?» — запитав тато."
      - given: "_ Сідайте за стіл _ покликала мама"
        answer: "«Сідайте за стіл!» — покликала мама."
      - given: "Учитель сказав _ Відкрийте підручники _"
        answer: "Учитель сказав: «Відкрийте підручники.»"
      - given: "_ Я повернуся _ пообіцяв батько"
        answer: "«Я повернуся,» — пообіцяв батько."
      - given: "_ Коли ти прийдеш _ запитала сестра"
        answer: "«Коли ти прийдеш?» — запитала сестра."
      - given: "Він додав _ І не запізнюйся _"
        answer: "Він додав: «І не запізнюйся.»"

  - type: pattern_drill
    title: "Перетвори пряму мову на непряму"
    prompt: "Переклади в непряму мову"
    items:
      - given: "Він сказав: «Я прийду.» →"
        answer: "Він сказав, що прийде."
      - given: "Вона запитала: «Ти підеш?» →"
        answer: "Вона запитала, чи я піду."
      - given: "Він попросив: «Допоможи мені.» →"
        answer: "Він попросив, щоб я допоміг."
      - given: "Мама сказала: «Обід готовий.» →"
        answer: "Мама сказала, що обід готовий."
      - given: "Тато запитав: «Котра година?» →"
        answer: "Тато запитав, котра година."
      - given: "Учитель сказав: «Читайте текст.» →"
        answer: "Учитель сказав, щоб ми читали текст."

  - type: classify
    title: "Пряма чи непряма мова?"
    instruction: "Визнач тип мовлення"
    categories:
      - label: "Пряма мова"
        items:
          - "Мама сказала: «Обід готовий.»"
          - "«Котра година?» — запитав тато."
          - "«Сідайте!» — покликала вона."
          - "Він відповів: «Десята.»"
      - label: "Непряма мова"
        items:
          - "Мама сказала, що обід готовий."
          - "Тато запитав, котра година."
          - "Вона попросила, щоб ми сіли."
          - "Він відповів, що десята."

  - type: build_sentence
    title: "Напиши діалог"
    instruction: "Оформи пряму мову з правильними розділовими знаками"
    sentences:
      - words: ["Оля", "сказала", ":", "«", "Я", "йду", "в", "магазин", ".", "»"]
        correct: "Оля сказала: «Я йду в магазин.»"
      - words: ["«", "Купи", "хліб", ",", "»", "—", "попросив", "тато", "."]
        correct: "«Купи хліб,» — попросив тато."
      - words: ["«", "А", "молоко", "?", "»", "—", "запитала", "мама", "."]
        correct: "«А молоко?» — запитала мама."
      - words: ["Оля", "відповіла", ":", "«", "Добре", ",", "куплю", ".", "»"]
        correct: "Оля відповіла: «Добре, куплю.»"

  - type: reading
    title: "Читання: Газетна стаття"
    text: |
      Мер міста заявив: «Ми побудуємо новий парк до кінця року.» Журналісти запитали, чи вистачить коштів. «Бюджет уже затверджено,» — відповів мер. Він додав, що будівництво розпочнеться навесні. «Коли відкриється парк?» — запитала журналістка. Мер пояснив, що відкриття заплановане на вересень. Мешканці міста сказали, що дуже чекають на новий парк.
    questions:
      - question: "Які речення з прямою мовою?"
        answer: "«Ми побудуємо новий парк до кінця року.» / «Бюджет уже затверджено.» / «Коли відкриється парк?»"
      - question: "Які речення з непрямою мовою?"
        answer: "Журналісти запитали, чи вистачить коштів. / Він додав, що будівництво розпочнеться. / Мер пояснив, що відкриття заплановане. / Мешканці сказали, що чекають."
      - question: "Перетвори в непряму: «Ми побудуємо новий парк.»"
        answer: "Мер заявив, що вони побудують новий парк."
