module: umovnyi-nerealnyi
track: l2-uk-direct
level: b1
type: grammar
title: "Умовний спосіб: нереальна умова (якби)"
subtitle: "Якби + минулий час + б/би"
standard_ref: "§4.4 — умовний спосіб: нереальна умова (якби, коли б)"
textbook_ref: "5 клас — умовний спосіб дієслова"
teaching_notes: |
  Нереальна умова — ситуація, яка суперечить дійсності (зараз або в минулому).
  Структура: якби + минулий час + б/би в головній частині.
  «Якби» = «якщо» + «б» (злите написання). «Коли б» — синонімічний варіант.
  Частка «б» стоїть після першого слова в головній частині або після дієслова.
  Ключова відмінність: «якщо» — реальна умова, «якби» — нереальна.
  Типові помилки: пропуск частки «б» у головній частині.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Якби + минулий час, ... б/би + минулий час → нереальна умова (всупереч фактам)."
  examples:
    - "Якби я мав час, я б прочитав цю книгу."
    - "Якби вона знала, вона б допомогла."
    - "Коли б було тепло, ми б пішли на прогулянку."

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Реальна vs нереальна умова"
    columns: ["Тип", "Сполучник", "Час дієслова", "Приклад"]
    rows:
      - ["Реальна", "якщо", "теперішній / майбутній", "Якщо матиму час, прочитаю."]
      - ["Нереальна", "якби / коли б", "минулий + б/би", "Якби мав час, я б прочитав."]

  - title: "Позиція частки б/би"
    columns: ["Варіант", "Приклад", "Пояснення"]
    rows:
      - ["Після займенника", "я б прочитав", "б після першого слова"]
      - ["Після дієслова", "прочитав би", "би після дієслова"]
      - ["Б після голосної", "вона б допомогла", "б (скорочена)"]
      - ["Би після приголосної", "він би допоміг", "би (повна)"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Частки та сполучники"
    items:
      - word: "якби"
        emoji: "\U0001F914"
        sentence: "Якби я знав, я б приїхав раніше."
      - word: "коли б"
        emoji: "\U0001F550"
        sentence: "Коли б було тепло, ми б пішли в парк."
      - word: "б"
        emoji: "\U00002728"
        sentence: "Я б допоміг тобі."
      - word: "би"
        emoji: "\U00002728"
        sentence: "Він би зателефонував."

  - category: "Бажання та мрії"
    items:
      - word: "мріяти"
        emoji: "\U0001F4AD"
        sentence: "Якби я мріяв менше, працював би більше."
      - word: "подорожувати"
        emoji: "\U00002708"
        sentence: "Якби мав гроші, подорожував би світом."
      - word: "вивчити"
        emoji: "\U0001F4DA"
        sentence: "Якби мав більше часу, вивчив би японську."
      - word: "переїхати"
        emoji: "\U0001F3E0"
        sentence: "Якби знайшов роботу, переїхав би до Києва."
      - word: "зустрітися"
        emoji: "\U0001F465"
        sentence: "Якби ти був тут, ми б зустрілися."

  - category: "Всупереч фактам"
    items:
      - word: "на жаль"
        emoji: "\U0001F614"
        sentence: "На жаль, я не знаю відповіді."
      - word: "проте"
        emoji: "\U000026A0"
        sentence: "Хотів би, проте не можу."
      - word: "можливість"
        emoji: "\U0001F513"
        sentence: "Якби була можливість, я б погодився."
      - word: "шкода"
        emoji: "\U0001F625"
        sentence: "Шкода, що ти не прийшов."
      - word: "інакше"
        emoji: "\U0001F500"
        sentence: "Якби було інакше, ми б радилися."
      - word: "уявити"
        emoji: "\U0001F3A8"
        sentence: "Уяви: якби ти жив у Карпатах..."
      - word: "здійснити"
        emoji: "\U0001F31F"
        sentence: "Якби мав шанс, здійснив би мрію."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: build_sentence
    title: "Склади нереальну умову"
    instruction: "Побудуй речення з «якби»"
    sentences:
      - words: ["Якби", "я", "мав", "час", ",", "я", "б", "прочитав", "книгу", "."]
        correct: "Якби я мав час, я б прочитав книгу."
      - words: ["Якби", "вона", "знала", ",", "вона", "б", "допомогла", "."]
        correct: "Якби вона знала, вона б допомогла."
      - words: ["Якби", "було", "тепло", ",", "ми", "б", "пішли", "гуляти", "."]
        correct: "Якби було тепло, ми б пішли гуляти."
      - words: ["Якби", "він", "приїхав", ",", "ми", "б", "зустрілися", "."]
        correct: "Якби він приїхав, ми б зустрілися."
      - words: ["Якби", "я", "знав", "раніше", ",", "я", "б", "підготувався", "."]
        correct: "Якби я знав раніше, я б підготувався."
      - words: ["Якби", "ми", "мали", "гроші", ",", "ми", "б", "поїхали", "."]
        correct: "Якби ми мали гроші, ми б поїхали."
      - words: ["Якби", "ти", "попросив", ",", "я", "б", "допоміг", "."]
        correct: "Якби ти попросив, я б допоміг."
      - words: ["Якби", "була", "можливість", ",", "я", "б", "погодився", "."]
        correct: "Якби була можливість, я б погодився."

  - type: classify
    title: "Реальна чи нереальна умова?"
    instruction: "Розподіли речення: реальна (якщо) чи нереальна (якби)"
    categories:
      - label: "Реальна умова (якщо)"
        items:
          - "Якщо матиму час, прочитаю книгу."
          - "Якщо буде дощ, візьму парасольку."
          - "Якщо ти хочеш, підемо разом."
          - "Якщо він прийде, почнемо."
          - "Якщо дізнаюся, скажу тобі."
      - label: "Нереальна умова (якби)"
        items:
          - "Якби я мав час, я б прочитав."
          - "Якби вона знала, допомогла б."
          - "Якби було тепло, пішли б гуляти."
          - "Якби він приїхав, зустрілися б."
          - "Якби мав гроші, поїхав би."

  - type: pattern_drill
    title: "Перетвори реальну умову на нереальну"
    prompt: "Зміни «якщо» на «якби» і переклади в нереальну умову"
    items:
      - given: "Якщо матиму час, прочитаю. →"
        answer: "Якби мав час, я б прочитав."
      - given: "Якщо дізнаюся, скажу. →"
        answer: "Якби дізнався, я б сказав."
      - given: "Якщо вона прийде, почнемо. →"
        answer: "Якби вона прийшла, ми б почали."
      - given: "Якщо будуть гроші, поїдемо. →"
        answer: "Якби були гроші, ми б поїхали."
      - given: "Якщо допоможеш, закінчу. →"
        answer: "Якби допоміг, я б закінчив."
      - given: "Якщо буде тепло, підемо. →"
        answer: "Якби було тепло, ми б пішли."

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "«Якби» вживають для реальних умов."
        answer: false
        correction: "«Якби» — для нереальних умов. Для реальних — «якщо»."
      - statement: "Якби я мав час, я б прочитав книгу."
        answer: true
      - statement: "Якби вона знала, вона допомогла."
        answer: false
        correction: "Якби вона знала, вона б допомогла. (потрібна частка «б»)"
      - statement: "Коли б було тепло, ми б пішли."
        answer: true
      - statement: "Якби він приїхав, ми зустрілися."
        answer: false
        correction: "Якби він приїхав, ми б зустрілися. (потрібна частка «б»)"
      - statement: "«Коли б» — синонім «якби»."
        answer: true

  - type: reading
    title: "Читання: Інтерв'ю «Що б ви зробили?»"
    text: |
      Журналіст запитує перехожих: «Що б ви зробили, якби мали мільйон?»
      Олена: «Якби я мала мільйон, я б подорожувала світом. Поїхала б до Японії і Австралії.»
      Тарас: «Якби в мене був мільйон, я б відкрив власний бізнес. Якби все вдалося, допомагав би іншим.»
      Марія: «Якби мала стільки грошей, купила б великий дім для всієї родини. А якби залишилися гроші, допомогла б притулку для тварин.»
    questions:
      - question: "Що б зробила Олена?"
        answer: "Подорожувала б світом — поїхала б до Японії і Австралії."
      - question: "Що б зробив Тарас?"
        answer: "Відкрив би власний бізнес і допомагав би іншим."
      - question: "Кому б допомогла Марія?"
        answer: "Родині (купила б дім) і притулку для тварин."
