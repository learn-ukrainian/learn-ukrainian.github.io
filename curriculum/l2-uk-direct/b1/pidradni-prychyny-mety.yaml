module: pidradni-prychyny-mety
track: l2-uk-direct
level: b1
type: grammar
title: "Підрядні причини та мети"
subtitle: "Тому що, бо, через те що; щоб"
standard_ref: "§4.4 — підрядні причини (тому що, бо, через те що) та мети (щоб)"
textbook_ref: "5 клас (Авраменко) — складнопідрядні речення причини та мети"
teaching_notes: |
  Причина відповідає на питання ЧОМУ? Мета — ДЛЯ ЧОГО? / НАВІЩО?
  Три сполучники причини відрізняються стилем:
  — бо — розмовний, найкоротший
  — тому що — нейтральний, найчастіший
  — через те що — офіційний, формальний
  Мета: щоб + інфінітив (один суб'єкт) або щоб + минулий час (різні суб'єкти).
  Кома перед сполучником причини/мети, якщо підрядна частина після головної.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Причина (ЧОМУ?): тому що / бо / через те що. Мета (ДЛЯ ЧОГО?): щоб."
  examples:
    - "Я не пішов, тому що йшов дощ."
    - "Він залишився, бо хотів допомогти."
    - "Я вчуся, щоб знати мову."

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Сполучники причини — стильові відмінності"
    columns: ["Сполучник", "Стиль", "Приклад"]
    rows:
      - ["бо", "розмовний", "Не прийшов, бо захворів."]
      - ["тому що", "нейтральний", "Не прийшов, тому що захворів."]
      - ["через те що", "офіційний", "Не з'явився через те що був хворий."]

  - title: "Мета: щоб + інфінітив / минулий час"
    columns: ["Структура", "Коли", "Приклад"]
    rows:
      - ["щоб + інфінітив", "один суб'єкт", "Я вчуся, щоб знати мову."]
      - ["щоб + минулий", "різні суб'єкти", "Я прийшов, щоб він допоміг."]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Сполучники причини та мети"
    items:
      - word: "тому що"
        emoji: "\U00002753"
        sentence: "Він спізнився, тому що був затор."
      - word: "бо"
        emoji: "\U0001F5E3"
        sentence: "Не пішов, бо втомився."
      - word: "через те що"
        emoji: "\U0001F4BC"
        sentence: "Заняття скасували через те що вчитель захворів."
      - word: "щоб"
        emoji: "\U0001F3AF"
        sentence: "Вчуся, щоб здати іспит."
      - word: "причина"
        emoji: "\U0001F50D"
        sentence: "Яка причина запізнення?"
      - word: "мета"
        emoji: "\U0001F3AF"
        sentence: "Моя мета — вивчити мову."

  - category: "Причини (типові ситуації)"
    items:
      - word: "захворіти"
        emoji: "\U0001F912"
        sentence: "Він не прийшов, тому що захворів."
      - word: "запізнитися"
        emoji: "\U000023F0"
        sentence: "Вона запізнилася, бо автобус не приїхав."
      - word: "затор"
        emoji: "\U0001F697"
        sentence: "Через те що був затор, ми спізнилися."
      - word: "втомитися"
        emoji: "\U0001F634"
        sentence: "Пішов спати, бо втомився."
      - word: "скасувати"
        emoji: "\U0000274C"
        sentence: "Концерт скасували, тому що йшов дощ."

  - category: "Мета (типові ситуації)"
    items:
      - word: "здати"
        emoji: "\U0001F4DD"
        sentence: "Вчуся, щоб здати іспит."
      - word: "покращити"
        emoji: "\U0001F4C8"
        sentence: "Тренуюся, щоб покращити результат."
      - word: "заощадити"
        emoji: "\U0001F4B0"
        sentence: "Працюю, щоб заощадити на подорож."
      - word: "встигнути"
        emoji: "\U0001F3C3"
        sentence: "Біжу, щоб встигнути на поїзд."
      - word: "допомогти"
        emoji: "\U0001F91D"
        sentence: "Він прийшов, щоб допомогти."
      - word: "дізнатися"
        emoji: "\U0001F4A1"
        sentence: "Зателефонував, щоб дізнатися новини."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Причина чи мета?"
    instruction: "Визнач: підрядна відповідає на ЧОМУ? (причина) чи ДЛЯ ЧОГО? (мета)"
    categories:
      - label: "Причина (ЧОМУ?)"
        items:
          - "Не пішов, тому що захворів."
          - "Спізнився, бо був затор."
          - "Не купив, через те що не було грошей."
          - "Залишився вдома, бо йшов дощ."
          - "Концерт скасували, тому що артист захворів."
      - label: "Мета (ДЛЯ ЧОГО?)"
        items:
          - "Вчуся, щоб здати іспит."
          - "Працюю, щоб заощадити."
          - "Прийшов, щоб допомогти."
          - "Біжу, щоб встигнути на поїзд."
          - "Зателефонував, щоб дізнатися новини."

  - type: build_sentence
    title: "Відповідай на ЧОМУ? та ДЛЯ ЧОГО?"
    instruction: "Склади повне речення з відповідним сполучником"
    sentences:
      - words: ["Він", "не", "прийшов", ",", "тому що", "захворів", "."]
        correct: "Він не прийшов, тому що захворів."
      - words: ["Я", "вчуся", ",", "щоб", "знати", "мову", "."]
        correct: "Я вчуся, щоб знати мову."
      - words: ["Вона", "спізнилася", ",", "бо", "автобус", "не", "приїхав", "."]
        correct: "Вона спізнилася, бо автобус не приїхав."
      - words: ["Він", "прийшов", ",", "щоб", "допомогти", "."]
        correct: "Він прийшов, щоб допомогти."
      - words: ["Заняття", "скасували", ",", "через те що", "вчитель", "захворів", "."]
        correct: "Заняття скасували, через те що вчитель захворів."
      - words: ["Працюю", ",", "щоб", "заощадити", "на", "подорож", "."]
        correct: "Працюю, щоб заощадити на подорож."

  - type: pattern_drill
    title: "Стиль: бо, тому що чи через те що?"
    prompt: "Обери сполучник за стилем"
    items:
      - given: "Не пішов, ___ дощ. (розмовний)"
        answer: "бо"
      - given: "Зустріч перенесли, ___ директор відсутній. (офіційний)"
        answer: "через те що"
      - given: "Не купив квитки, ___ не було в касі. (нейтральний)"
        answer: "тому що"
      - given: "Не зателефонував, ___ забув. (розмовний)"
        answer: "бо"
      - given: "Проєкт затримали, ___ бракувало фінансування. (офіційний)"
        answer: "через те що"
      - given: "Залишилася вдома, ___ погано почувалася. (нейтральний)"
        answer: "тому що"

  - type: reading
    title: "Читання: Чому і навіщо?"
    text: |
      Оксана вирішила вивчити програмування. Вона записалася на курси, щоб отримати нову професію. Щодня після роботи вона займалася по дві години, тому що хотіла встигнути до кінця курсу. Іноді було важко, бо завдання були складні. Через те що Оксана працювала і вчилася одночасно, часу на відпочинок бракувало. Проте вона не здавалася, щоб досягти мети. Зрештою вона здала іспит і знайшла нову роботу.
    questions:
      - question: "Навіщо Оксана записалася на курси?"
        answer: "Щоб отримати нову професію."
      - question: "Чому вона займалася по дві години щодня?"
        answer: "Тому що хотіла встигнути до кінця курсу."
      - question: "Чому часу на відпочинок бракувало?"
        answer: "Через те що вона працювала і вчилася одночасно."

  - type: proverb_drill
    title: "Прислів'я: причина"
    proverb: "Здобудеш освіту — побачиш більше світу."
    source: "Grade 6 Avramenko"
    activity:
      type: match_meaning
      options:
        - "Освіта допомагає подорожувати"
        - "Освіта дає ширший погляд на світ"
        - "Без освіти не можна їздити за кордон"
      answer: "Освіта дає ширший погляд на світ"
      meaning: "Причина й наслідок: тому що здобудеш освіту — побачиш більше."
