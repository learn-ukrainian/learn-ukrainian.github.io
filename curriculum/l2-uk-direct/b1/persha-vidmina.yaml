module: persha-vidmina
track: l2-uk-direct
level: b1
type: grammar
title: "I відміна: повна парадигма"
subtitle: "Однина і множина для трьох груп"
standard_ref: "§4.2.1.1 — парадигми I відміни"
textbook_ref: "6 клас (Авраменко §48) — I відміна однина і множина"
teaching_notes: |
  Три групи: тверда (школа), м'яка (земля), мішана (круча) — різні закінчення в одних відмінках.
  Кличний відмінок: тверда → -о (мамо), м'яка → -е/-є (земле, Маріє), зменшувальні → -ю (Олю).
  Орудний: тверда -ою, м'яка -ею, мішана -ею — мішана збігається з м'якою.
  Найчастіша помилка — плутанина кличного: школо (тверда) vs земле (м'яка).
  Подавайте парадигми паралельно — три стовпці поруч, щоб бачити відмінності.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "I відміна: жін./чол. рід на -а/-я. Тверда → -ою, -о (Кл.). М'яка → -ею, -е (Кл.). Мішана → -ею, -е (Кл.)."
  examples:
    - "школа → школи → школі → школу → школою → у школі → школо!"
    - "земля → землі → землі → землю → землею → на землі → земле!"
    - "круча → кручі → кручі → кручу → кручею → на кручі → круче!"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "I відміна — однина"
    columns: ["Відмінок", "Тверда (школа)", "М'яка (земля)", "Мішана (круча)"]
    rows:
      - ["Н.в.", "школ-а", "земл-я", "круч-а"]
      - ["Р.в.", "школ-и", "земл-і", "круч-і"]
      - ["Д.в.", "школ-і", "земл-і", "круч-і"]
      - ["Зн.в.", "школ-у", "земл-ю", "круч-у"]
      - ["О.в.", "школ-ою", "земл-ею", "круч-ею"]
      - ["М.в.", "у школ-і", "на земл-і", "на круч-і"]
      - ["Кл.в.", "школ-о", "земл-е", "круч-е"]

  - title: "Кличний відмінок — деталі"
    columns: ["Група", "Правило", "Приклади"]
    rows:
      - ["Тверда", "-о", "мамо, школо, Оксано"]
      - ["М'яка", "-е / -є", "земле, Маріє, Надіє"]
      - ["Зменшувальні", "-ю", "Олю, Надю, бабусю"]

