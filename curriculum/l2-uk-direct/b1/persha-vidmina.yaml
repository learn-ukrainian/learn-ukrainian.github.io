# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Провідміняй «школа» (тверда)"
    prompt: "Постав у потрібний відмінок"
    items:
      - given: "школа → Р.в."
        answer: "школи"
      - given: "школа → Д.в."
        answer: "школі"
      - given: "школа → Зн.в."
        answer: "школу"
      - given: "школа → О.в."
        answer: "школою"
      - given: "школа → М.в."
        answer: "у школі"
      - given: "школа → Кл.в."
        answer: "школо"

  - type: pattern_drill
    title: "Провідміняй «земля» (м'яка)"
    prompt: "Постав у потрібний відмінок"
    items:
      - given: "земля → Р.в."
        answer: "землі"
      - given: "земля → Д.в."
        answer: "землі"
      - given: "земля → Зн.в."
        answer: "землю"
      - given: "земля → О.в."
        answer: "землею"
      - given: "земля → М.в."
        answer: "на землі"
      - given: "земля → Кл.в."
        answer: "земле"

  - type: build_sentence
    title: "Склади речення з іменниками I відміни"
    instruction: "Обери правильну форму іменника"
    sentences:
      - words: ["Я", "йду", "до", "[школа/школи]", "."]
        correct: "Я йду до школи."
      - words: ["Дякую", "[бабуся/бабусі]", "за", "пиріжки", "."]
        correct: "Дякую бабусі за пиріжки."
      - words: ["Діти", "бігають", "по", "[площа/площі]", "."]
        correct: "Діти бігають по площі."
      - words: ["Він", "написав", "[пісня/пісню]", "."]
        correct: "Він написав пісню."
      - words: ["Ми", "їдемо", "[дорога/дорогою]", "."]
        correct: "Ми їдемо дорогою."
      - words: ["[Оксана/Оксано]", ",", "ходімо", "гуляти", "!"]
        correct: "Оксано, ходімо гуляти!"

  - type: classify
    title: "Яке закінчення — який відмінок?"
    instruction: "Визнач відмінок за закінченням"
    categories:
      - label: "Р.в. / Д.в. / М.в. (-і/-и)"
        items:
          - "школи"
          - "землі"
          - "кручі"
      - label: "О.в. (-ою/-ею)"
        items:
          - "школою"
          - "землею"
          - "кручею"
      - label: "Кл.в. (-о/-е/-ю)"
        items:
          - "школо"
          - "земле"
          - "Олю"

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "Кличний від «школа» — «школе»."
        answer: false
        correction: "Тверда група: школа → школо."
      - statement: "Орудний від «земля» — «землею»."
        answer: true
      - statement: "Кличний від «Марія» — «Маріє»."
        answer: true
      - statement: "Родовий від «круча» — «кручи»."
        answer: false
        correction: "Мішана група: круча → кручі."
      - statement: "Кличний від «Оля» — «Олю»."
        answer: true
      - statement: "Орудний від «каша» — «кашою»."
        answer: true

  - type: pattern_drill
    title: "Утвори кличний відмінок"
    prompt: "Як звернутися?"
    items:
      - given: "мама"
        answer: "мамо"
      - given: "Оксана"
        answer: "Оксано"
      - given: "Марія"
        answer: "Маріє"
      - given: "Надія"
        answer: "Надіє"
      - given: "Оля"
        answer: "Олю"
      - given: "Надя"
        answer: "Надю"
      - given: "бабуся"
        answer: "бабусю"
      - given: "сестра"
        answer: "сестро"
      - given: "подруга"
        answer: "подруго"
      - given: "тітка"
        answer: "тітко"
      - given: "Галя"
        answer: "Галю"
      - given: "Наталія"
        answer: "Наталіє"

  - type: proverb_drill
    title: "Прислів'я: I відміна"
    proverb: "Усяка пташка своє гніздо має."
    source: "Grade 4 p.43"
    activity:
      type: fill_gap
      gap_word: "пташка"
      meaning: "Кожен любить свій дім. «Пташка» — I відміна, тверда група."
