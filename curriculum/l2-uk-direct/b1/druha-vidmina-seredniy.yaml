# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Провідміняй іменники середнього роду"
    prompt: "Постав іменник у потрібний відмінок"
    items:
      - given: "вікно → Р.в."
        answer: "вікна"
      - given: "вікно → Д.в."
        answer: "вікну"
      - given: "вікно → О.в."
        answer: "вікном"
      - given: "вікно → М.в."
        answer: "на вікні"
      - given: "поле → Р.в."
        answer: "поля"
      - given: "поле → О.в."
        answer: "полем"
      - given: "знання → Р.в."
        answer: "знання"
      - given: "знання → Д.в."
        answer: "знанню"
      - given: "знання → О.в."
        answer: "знанням"
      - given: "знання → М.в."
        answer: "у знанні"
      - given: "життя → О.в."
        answer: "життям"
      - given: "життя → М.в."
        answer: "у житті"

  - type: classify
    title: "Розподіли за групами"
    instruction: "Визнач групу іменника середнього роду"
    categories:
      - label: "Тверда (-о)"
        items:
          - "вікно"
          - "село"
          - "небо"
          - "місто"
          - "озеро"
      - label: "М'яка (-е)"
        items:
          - "поле"
          - "море"
          - "сонце"
          - "серце"
      - label: "На -я"
        items:
          - "знання"
          - "життя"
          - "обличчя"
          - "завдання"
          - "повітря"

  - type: build_sentence
    title: "Речення з іменниками середнього роду"
    instruction: "Обери правильну форму"
    sentences:
      - words: ["Сонце", "світить", "на", "[поле/полі/поля]", "."]
        correct: "Сонце світить на полі."
      - words: ["Море", "блищить", "під", "[сонце/сонцем]", "."]
        correct: "Море блищить під сонцем."
      - words: ["Без", "[знання/знанням]", "немає", "успіху", "."]
        correct: "Без знання немає успіху."
      - words: ["На", "[обличчя/обличчі]", "була", "усмішка", "."]
        correct: "На обличчі була усмішка."
      - words: ["Діти", "грають", "на", "[подвір'я/подвір'ї]", "."]
        correct: "Діти грають на подвір'ї."

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "«Знання» — це іменник чоловічого роду."
        answer: false
        correction: "«Знання» — середній рід, II відміна."
      - statement: "Орудний від «море» — «морем»."
        answer: true
      - statement: "Родовий від «знання» — «знання»."
        answer: true
      - statement: "«Обличчя» — мішана група."
        answer: false
        correction: "«Обличчя» — м'яка група (подвоєння -чч-, закінчення -я)."
      - statement: "Місцевий від «життя» — «у житті»."
        answer: true
      - statement: "Кличний від «село» — «селе»."
        answer: false
        correction: "Середній рід: кличний = називний: село."

  - type: riddle
    title: "Відгадай слово"
    clues:
      - "Воно світить удень і зігріває землю."
    answer: "сонце"

  - type: riddle
    title: "Відгадай слово (2)"
    clues:
      - "Воно синє, глибоке і солоне."
    answer: "море"

  - type: reading
    title: "Читання: Ранок у селі"
    text: |
      Сонце піднялося над полем. На небі не було жодної хмари. Село прокинулося рано. Крізь вікно видно було озеро і старе дерево біля нього. Повітря було свіже. Тиша стояла над полями і лісами. Тільки пташиний спів порушував ранкову тишу. Нове життя починалося з кожним ранком.
    questions:
      - question: "Над чим піднялося сонце?"
        answer: "Над полем (О.в. від «поле»)."
      - question: "Що було видно крізь вікно?"
        answer: "Озеро і старе дерево."
      - question: "Яке було повітря?"
        answer: "Свіже."
