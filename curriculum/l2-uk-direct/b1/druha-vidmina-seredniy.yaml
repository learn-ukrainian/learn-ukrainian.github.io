module: druha-vidmina-seredniy
track: l2-uk-direct
level: b1
type: grammar
title: "II відміна: середній рід"
subtitle: "Тверда, м'яка, мішана групи та іменники на -я"
standard_ref: "§4.2.1.1 — парадигми II відміни (середній рід)"
textbook_ref: "6 клас (Авраменко §50) — II відміна середній рід"
teaching_notes: |
  Середній рід II відміни: -о (тверда: тіло), -е (м'яка: море; мішана: плече), -я (знання, життя).
  Іменники на -я (знання, читання, життя) — м'яка група, відмінюються як «море», але з -я.
  Кличний відмінок у середнього роду = називний (тіло → тіло, море → море).
  Зверніть увагу: «обличчя» — не мішана, а м'яка група (подвоєння -чч-).
  Почніть із простих слів (вікно, село, поле), потім перейдіть до -я (знання, завдання).

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Середній рід II відміни: -о → -а (Р.в.), -е → -я (Р.в.), -я → -я (Р.в.). Орудний: -ом / -ем."
  examples:
    - "тіло → тіла → тілу → тіло → тілом → на тілі"
    - "море → моря → морю → море → морем → на морі"
    - "знання → знання → знанню → знання → знанням → у знанні"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "II відміна — середній рід (однина)"
    columns: ["Відмінок", "Тверда (тіло)", "М'яка (море)", "Мішана (плече)"]
    rows:
      - ["Н.в.", "тіл-о", "мор-е", "плеч-е"]
      - ["Р.в.", "тіл-а", "мор-я", "плеч-а"]
      - ["Д.в.", "тіл-у", "мор-ю", "плеч-у"]
      - ["Зн.в.", "тіл-о", "мор-е", "плеч-е"]
      - ["О.в.", "тіл-ом", "мор-ем", "плеч-ем"]
      - ["М.в.", "на тіл-і", "на мор-і", "на плеч-і"]
      - ["Кл.в.", "тіл-о", "мор-е", "плеч-е"]

  - title: "Іменники на -я (знання, життя)"
    columns: ["Відмінок", "знання", "життя"]
    rows:
      - ["Н.в.", "знанн-я", "житт-я"]
