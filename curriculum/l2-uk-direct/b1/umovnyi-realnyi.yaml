module: umovnyi-realnyi
track: l2-uk-direct
level: b1
type: grammar
title: "Умовний спосіб: реальна умова (якщо)"
subtitle: "Якщо + теперішній або майбутній час"
standard_ref: "§4.4 — умовний спосіб: реальна умова (якщо)"
textbook_ref: "5 клас — складнопідрядні речення з умовою"
teaching_notes: |
  Реальна умова виражається сполучником «якщо» + дійсний спосіб (теперішній або майбутній час).
  Умова реальна — мовець вважає її можливою або ймовірною.
  Кома ставиться між підрядною і головною частиною.
  Порядок частин вільний: підрядна може стояти перед головною або після неї.
  Почніть із простих побутових ситуацій: погода, плани, навчання.
  Важливо: «якщо» ≠ «якби» — реальна vs нереальна умова.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Якщо + теперішній/майбутній час → реальна умова. Мовець вважає ситуацію можливою."
  examples:
    - "Якщо я закінчу роботу, я піду гуляти."
    - "Якщо буде гарна погода, ми поїдемо на озеро."
    - "Якщо ти знаєш відповідь, скажи."

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Реальна умова — структура"
    columns: ["Частина", "Приклад", "Час дієслова"]
    rows:
      - ["Умова (якщо...)", "Якщо я закінчу роботу", "майбутній (доконаний)"]
      - ["Наслідок", "я піду гуляти", "майбутній (доконаний)"]
      - ["Умова (якщо...)", "Якщо буде дощ", "майбутній (складений)"]
      - ["Наслідок", "ми залишимося вдома", "майбутній (доконаний)"]
      - ["Умова (якщо...)", "Якщо ти знаєш", "теперішній"]
      - ["Наслідок", "скажи", "наказовий"]

  - title: "Кома в реальній умові"
    columns: ["Структура", "Приклад", "Кома"]
    rows:
      - ["Якщо..., наслідок.", "Якщо буде дощ, ми не підемо.", "після підрядної"]
      - ["Наслідок, якщо...", "Ми не підемо, якщо буде дощ.", "перед якщо"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Сполучники умови"
    items:
      - word: "якщо"
        emoji: "\U00002753"
        sentence: "Якщо матимеш час, зателефонуй мені."
      - word: "умова"
        emoji: "\U0001F4DC"
        sentence: "Головна умова — прийти вчасно."
      - word: "наслідок"
        emoji: "\U000027A1"
        sentence: "Наслідок буде позитивним."

  - category: "Плани та погода"
    items:
      - word: "закінчити"
        emoji: "\U00002705"
        sentence: "Якщо закінчу вчасно, підемо в кіно."
      - word: "встигнути"
        emoji: "\U000023F1"
        sentence: "Якщо встигну, купи квитки."
      - word: "дощ"
        emoji: "\U0001F327"
        sentence: "Якщо буде дощ, візьми парасольку."
      - word: "сонячно"
        emoji: "\U00002600"
        sentence: "Якщо буде сонячно, поїдемо на пляж."
      - word: "подорож"
        emoji: "\U0001F30D"
        sentence: "Якщо зберемо гроші, поїдемо в подорож."
      - word: "запізнитися"
        emoji: "\U000023F0"
        sentence: "Якщо запізнишся, почнемо без тебе."
      - word: "погодитися"
        emoji: "\U0001F91D"
        sentence: "Якщо він погодиться, підпишемо договір."

  - category: "Дії та результати"
    items:
      - word: "допомогти"
        emoji: "\U0001F91D"
        sentence: "Якщо попросиш, я допоможу."
      - word: "вдатися"
        emoji: "\U0001F3AF"
        sentence: "Якщо вдасться, ми будемо раді."
      - word: "зателефонувати"
        emoji: "\U0001F4DE"
        sentence: "Якщо дізнаєшся, зателефонуй."
      - word: "вирішити"
        emoji: "\U0001F4A1"
        sentence: "Якщо вирішиш, скажи мені."
      - word: "замовити"
        emoji: "\U0001F4E6"
        sentence: "Якщо тобі потрібно, замов онлайн."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: build_sentence
    title: "Склади речення з умовою"
    instruction: "З'єднай умову та наслідок у речення з «якщо»"
    sentences:
      - words: ["Якщо", "буде", "дощ", ",", "ми", "не", "підемо", "."]
        correct: "Якщо буде дощ, ми не підемо."
      - words: ["Якщо", "я", "закінчу", "роботу", ",", "я", "піду", "гуляти", "."]
        correct: "Якщо я закінчу роботу, я піду гуляти."
      - words: ["Якщо", "ти", "хочеш", ",", "ми", "підемо", "разом", "."]
        correct: "Якщо ти хочеш, ми підемо разом."
      - words: ["Якщо", "вона", "прийде", ",", "ми", "почнемо", "."]
        correct: "Якщо вона прийде, ми почнемо."
      - words: ["Якщо", "матимеш", "час", ",", "зателефонуй", "."]
        correct: "Якщо матимеш час, зателефонуй."
      - words: ["Якщо", "буде", "сонячно", ",", "поїдемо", "на", "озеро", "."]
        correct: "Якщо буде сонячно, поїдемо на озеро."
      - words: ["Якщо", "він", "погодиться", ",", "підпишемо", "договір", "."]
        correct: "Якщо він погодиться, підпишемо договір."
      - words: ["Якщо", "встигну", ",", "купи", "квитки", "."]
        correct: "Якщо встигну, купи квитки."

  - type: pattern_drill
    title: "Доповни наслідок"
    prompt: "Доповни речення з реальною умовою"
    items:
      - given: "Якщо буде дощ, ми ___"
        answer: "не підемо"
      - given: "Якщо ти знаєш відповідь, ___"
        answer: "скажи"
      - given: "Якщо я закінчу роботу, я ___"
        answer: "піду гуляти"
      - given: "Якщо вона зателефонує, я ___"
        answer: "відповім"
      - given: "Якщо матимеш час, ___"
        answer: "приходь у гості"
      - given: "Якщо буде холодно, ___"
        answer: "одягни куртку"
      - given: "Якщо він запізниться, ми ___"
        answer: "почнемо без нього"
      - given: "Якщо все буде добре, ми ___"
        answer: "поїдемо у відпустку"

  - type: classify
    title: "Знайди умову та наслідок"
    instruction: "Визнач, де умова (якщо...), а де наслідок"
    categories:
      - label: "Умова (підрядна частина)"
        items:
          - "якщо я закінчу роботу"
          - "якщо буде гарна погода"
          - "якщо ти знаєш відповідь"
          - "якщо він прийде вчасно"
          - "якщо матимеш час"
      - label: "Наслідок (головна частина)"
        items:
          - "я піду гуляти"
          - "ми поїдемо на озеро"
          - "скажи мені"
          - "ми почнемо зустріч"
          - "зателефонуй"

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "Якщо я прийду я подзвоню."
        answer: false
        correction: "Якщо я прийду, я подзвоню. (потрібна кома)"
      - statement: "Якщо буде дощ, ми залишимося вдома."
        answer: true
      - statement: "Якщо ти знаєш відповідь, скажи."
        answer: true
      - statement: "Якщо вона прийде ми почнемо."
        answer: false
        correction: "Якщо вона прийде, ми почнемо. (потрібна кома)"
      - statement: "Ми поїдемо на озеро, якщо буде гарна погода."
        answer: true
      - statement: "«Якщо» вживають для нереальних умов."
        answer: false
        correction: "«Якщо» — для реальних умов. Для нереальних — «якби»."

  - type: reading
    title: "Читання: Плануємо вихідні"
    text: |
      Оля телефонує Максимові.
      — Привіт, Максиме! Якщо в суботу буде гарна погода, поїдемо на озеро?
      — Добре! Якщо я закінчу роботу до обіду, точно поїду. А якщо дощитиме?
      — Якщо буде дощ, підемо в кіно. Я давно хочу подивитися новий фільм.
      — Домовились. Якщо щось зміниться, напиши мені.
      — Гаразд. Якщо дізнаюся прогноз погоди, зателефоную ввечері.
    questions:
      - question: "Що вони зроблять, якщо буде гарна погода?"
        answer: "Поїдуть на озеро."
      - question: "Що вони зроблять, якщо буде дощ?"
        answer: "Підуть у кіно."
      - question: "Скільки речень із «якщо» в діалозі?"
        answer: "Шість речень із «якщо»."

  - type: proverb_drill
    title: "Прислів'я: умова"
    proverb: "Тихіше їдеш — далі будеш."
    source: "Grade 6 Avramenko"
    activity:
      type: fill_gap
      gap_word: "будеш"
      meaning: "Не поспішай — досягнеш більшого. Приховане «якщо»: якщо їдеш тихіше, то далі будеш."
