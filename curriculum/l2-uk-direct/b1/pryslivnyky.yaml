module: pryslivnyky
track: l2-uk-direct
level: b1
type: grammar
title: "Прислівники: повний огляд"
subtitle: "Утворення, типи за значенням, ступені порівняння"
standard_ref: "§4.3 — словотвір прислівників (по-українськи, швидко; порівняння)"
textbook_ref: "6 клас (Авраменко §104–115) — прислівники"
teaching_notes: |
  Утворення від прикметників: швидкий → швидко, гарний → гарно (замінюємо -ий/-ій на -о/-е).
  Префікс по-: по-українськи, по-новому. Через дефіс! Типова помилка — разом.
  Ступені порівняння: швидко → швидше → найшвидше. Супплетивні: добре → краще → найкраще.
  Типи за значенням: місце, час, спосіб, причина — допомагають будувати складніші речення.
  Не плутайте прислівник (як?) і прикметник (який?): він швидко біжить (прислівник) vs він швидкий (прикметник).

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Прикметник → прислівник: -ий → -о (швидкий → швидко). Порівняння: -ше / най- (швидше, найшвидше)."
  examples:
    - "швидкий → швидко → швидше → найшвидше"
    - "гарний → гарно → краще → найкраще (супплетивне)"
    - "український → по-українськи (через дефіс!)"
    - "новий → по-новому (через дефіс!)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Утворення прислівників від прикметників"
    columns: ["Прикметник", "Прислівник", "Правило"]
    rows:
      - ["швидкий", "швидко", "-ий → -о"]
      - ["гарний", "гарно", "-ний → -но"]
      - ["повільний", "повільно", "-ний → -но"]
      - ["тихий", "тихо", "-ий → -о"]
      - ["веселий", "весело", "-ий → -о"]
      - ["український", "по-українськи", "по- + -ськи (дефіс!)"]
      - ["новий", "по-новому", "по- + -ому (дефіс!)"]

  - title: "Ступені порівняння"
    columns: ["Звичайний", "Вищий", "Найвищий"]
    rows:
      - ["швидко", "швидше", "найшвидше"]
      - ["повільно", "повільніше", "найповільніше"]
      - ["тихо", "тихіше", "найтихіше"]
      - ["добре", "краще", "найкраще"]
      - ["погано", "гірше", "найгірше"]
      - ["багато", "більше", "найбільше"]
      - ["мало", "менше", "найменше"]

  - title: "Типи прислівників за значенням"
    columns: ["Тип", "Питання", "Приклади"]
    rows:
      - ["Місце", "ДЕ? КУДИ? ЗВІДКИ?", "тут, там, далеко, близько, вгорі, внизу"]
      - ["Час", "КОЛИ? ЯК ДОВГО?", "зараз, тоді, завтра, потім, давно, щодня"]
      - ["Спосіб", "ЯК?", "швидко, повільно, добре, погано, разом"]
      - ["Причина", "ЧОМУ?", "тому, навмисно, згарячу"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Прислівники місця"
    items:
      - word: "тут"
        emoji: "\U0001F4CD"
        sentence: "Тут дуже гарно навесні."
      - word: "там"
        emoji: "\U0001F449"
        sentence: "Там, за горою, є озеро."
      - word: "далеко"
        emoji: "\U0001F30D"
        sentence: "До міста ще далеко."
      - word: "близько"
        emoji: "\U0001F4CF"
        sentence: "Школа зовсім близько."
      - word: "вгорі"
        emoji: "\U00002B06"
        sentence: "Вгорі літав птах."
      - word: "внизу"
        emoji: "\U00002B07"
        sentence: "Внизу текла річка."

  - category: "Прислівники часу"
    items:
      - word: "зараз"
        emoji: "\U0000231A"
        sentence: "Зараз я зайнятий."
      - word: "потім"
        emoji: "\U000027A1"
        sentence: "Потім ми поїдемо додому."
      - word: "давно"
        emoji: "\U0000231B"
        sentence: "Я давно не бачив тебе."
      - word: "щодня"
        emoji: "\U0001F4C5"
        sentence: "Він біга щодня."
      - word: "завтра"
        emoji: "\U0001F305"
        sentence: "Завтра буде сонячний день."

  - category: "Прислівники способу"
    items:
      - word: "швидко"
        emoji: "\U000026A1"
        sentence: "Він біжить дуже швидко."
      - word: "повільно"
        emoji: "\U0001F422"
        sentence: "Черепаха рухається повільно."
      - word: "добре"
        emoji: "\U0001F44D"
        sentence: "Вона добре грає на фортепіано."
      - word: "погано"
        emoji: "\U0001F44E"
        sentence: "Він погано себе почуває."
      - word: "разом"
        emoji: "\U0001F46B"
        sentence: "Ми підемо разом."

  - category: "По- + дефіс"
    items:
      - word: "по-українськи"
        emoji: "\U0001F1FA"
        sentence: "Говори по-українськи!"
      - word: "по-новому"
        emoji: "\U00002728"
        sentence: "Треба подивитися по-новому."
      - word: "по-іншому"
        emoji: "\U0001F504"
        sentence: "Зроби це по-іншому."
      - word: "по-доброму"
        emoji: "\U0001F91D"
        sentence: "Попроси по-доброму."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Утвори прислівник від прикметника"
    prompt: "Утвори прислівник"
    items:
      - given: "швидкий"
        answer: "швидко"
      - given: "повільний"
        answer: "повільно"
      - given: "тихий"
        answer: "тихо"
      - given: "гарний"
        answer: "гарно"
      - given: "веселий"
        answer: "весело"
      - given: "сумний"
        answer: "сумно"
      - given: "легкий"
        answer: "легко"
      - given: "важкий"
        answer: "важко"
      - given: "холодний"
        answer: "холодно"
      - given: "теплий"
        answer: "тепло"
      - given: "спокійний"
        answer: "спокійно"
      - given: "чистий"
        answer: "чисто"

  - type: pattern_drill
    title: "Ступені порівняння"
    prompt: "Утвори вищий і найвищий ступінь"
    items:
      - given: "швидко → вищий"
        answer: "швидше"
      - given: "швидко → найвищий"
        answer: "найшвидше"
      - given: "повільно → вищий"
        answer: "повільніше"
      - given: "повільно → найвищий"
        answer: "найповільніше"
      - given: "добре → вищий"
        answer: "краще"
      - given: "добре → найвищий"
        answer: "найкраще"
      - given: "погано → вищий"
        answer: "гірше"
      - given: "погано → найвищий"
        answer: "найгірше"
      - given: "багато → вищий"
        answer: "більше"
      - given: "мало → вищий"
        answer: "менше"

  - type: classify
    title: "Тип прислівника за значенням"
    instruction: "Розподіли: місце / час / спосіб / причина"
    categories:
      - label: "Місце (ДЕ?)"
        items:
          - "тут"
          - "там"
          - "далеко"
          - "близько"
          - "вгорі"
      - label: "Час (КОЛИ?)"
        items:
          - "зараз"
          - "потім"
          - "давно"
          - "щодня"
          - "завтра"
      - label: "Спосіб (ЯК?)"
        items:
          - "швидко"
          - "повільно"
          - "добре"
          - "тихо"
          - "разом"
      - label: "Причина (ЧОМУ?)"
        items:
          - "тому"
          - "навмисно"
          - "згарячу"

  - type: build_sentence
    title: "Речення з прислівниками"
    instruction: "Обери правильний прислівник"
    sentences:
      - words: ["Він", "біжить", "[швидкий/швидко]", "."]
        correct: "Він біжить швидко."
      - words: ["Вона", "говорить", "[по-українськи/по українськи]", "."]
        correct: "Вона говорить по-українськи."
      - words: ["Сьогодні", "[краще/кращий]", ",", "ніж", "учора", "."]
        correct: "Сьогодні краще, ніж учора."
      - words: ["Він", "читає", "[швидше/швидший]", "за", "мене", "."]
        correct: "Він читає швидше за мене."

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "«По-українськи» — це прислівник."
        answer: true
      - statement: "«По-українськи» пишеться разом: «поукраїнськи»."
        answer: false
        correction: "Через дефіс: по-українськи."
      - statement: "Вищий ступінь від «добре» — «добріше»."
        answer: false
        correction: "Супплетивна форма: добре → краще."
      - statement: "«Швидко» — прислівник способу дії."
        answer: true
      - statement: "«Завтра» — прислівник місця."
        answer: false
        correction: "«Завтра» — прислівник часу."
      - statement: "Найвищий ступінь від «погано» — «найгірше»."
        answer: true
