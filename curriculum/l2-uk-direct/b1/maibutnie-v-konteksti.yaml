module: maibutnie-v-konteksti
track: l2-uk-direct
level: b1
type: grammar
title: "Майбутній час у складних контекстах"
subtitle: "Вибір форми майбутнього: складений, синтетичний, доконаний"
standard_ref: "§4.2.3 — майбутній час у контексті; §4.3.4 — складні речення з майбутнім"
textbook_ref: "5 клас — дієслово, майбутній час; стилістика"
teaching_notes: |
  Три форми майбутнього часу вже відомі з А2. Тут — вибір форми залежно від контексту.
  Складений (буду + інфінітив) — розмовний стиль.
  Синтетичний (-тиму/-тимеш) — офіційний, писемний стиль.
  Доконаний простий (зроблю) — результативна дія.
  Типова помилка: *«Я буду зробити» — доконаний вид НЕ вживається зі складеним майбутнім.
  Вид впливає на значення: недоконаний = процес, доконаний = результат.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Три форми майбутнього → три контексти: розмовний (буду + інф.), офіційний (-тиму), результативний (доконаний)."
  examples:
    - "Я буду працювати весь день. (розмовний, процес)"
    - "Президент зустрічатиме делегацію. (офіційний)"
    - "Я зроблю це до вечора. (результат)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Три форми майбутнього часу"
    columns: ["Форма", "Структура", "Стиль", "Приклад"]
    rows:
      - ["Складена", "буду + інфінітив", "розмовний", "Я буду читати"]
      - ["Синтетична", "основа + -тиму/-тимеш", "офіційний", "Я читатиму"]
      - ["Проста доконана", "доконаний вид", "будь-який", "Я прочитаю"]

  - title: "Вид дієслова та майбутній час"
    columns: ["Вид", "Значення", "Форма", "Приклад"]
    rows:
      - ["Недоконаний", "процес, тривалість", "складена / синтетична", "Буду працювати / Працюватиму"]
      - ["Доконаний", "результат, завершення", "проста", "Зроблю, напишу"]
      - ["Недоконаний + доконаний", "НЕМОЖЛИВО", "—", "*Буду зробити ✗"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Стилі мовлення"
    items:
      - word: "розмовний"
        emoji: "\U0001F5E3"
        sentence: "У розмовному стилі кажуть: «буду робити»."
      - word: "офіційний"
        emoji: "\U0001F4BC"
        sentence: "В офіційному стилі пишуть: «здійснюватиме»."
      - word: "результат"
        emoji: "\U0001F3AF"
        sentence: "Доконаний вид показує результат."
      - word: "процес"
        emoji: "\U0001F504"
        sentence: "Недоконаний вид описує процес."

  - category: "Дієслова (недоконаний / доконаний)"
    items:
      - word: "працювати"
        emoji: "\U0001F4BB"
        sentence: "Буду працювати до вечора."
      - word: "зробити"
        emoji: "\U00002705"
        sentence: "Зроблю цю роботу завтра."
      - word: "читати"
        emoji: "\U0001F4D6"
        sentence: "Читатиму щовечора."
      - word: "прочитати"
        emoji: "\U0001F4DA"
        sentence: "Прочитаю цю книгу за тиждень."
      - word: "писати"
        emoji: "\U0000270D"
        sentence: "Писатиму звіт увесь день."
      - word: "написати"
        emoji: "\U0001F4DD"
        sentence: "Напишу листа до п'ятниці."
      - word: "готувати"
        emoji: "\U0001F373"
        sentence: "Готуватиму вечерю, поки ти відпочиватимеш."
      - word: "приготувати"
        emoji: "\U0001F35D"
        sentence: "Приготую вечерю за годину."

  - category: "Часові маркери"
    items:
      - word: "протягом"
        emoji: "\U000023F3"
        sentence: "Протягом тижня буду готуватися."
      - word: "до вечора"
        emoji: "\U0001F307"
        sentence: "Зроблю все до вечора."
      - word: "щодня"
        emoji: "\U0001F4C5"
        sentence: "Щодня працюватиму над проєктом."
      - word: "поки"
        emoji: "\U000023F1"
        sentence: "Читатиму, поки ти готуватимеш."
      - word: "упродовж"
        emoji: "\U0001F4C6"
        sentence: "Упродовж місяця вивчатиму нову тему."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Який стиль?"
    instruction: "Розподіли речення за стилем майбутнього часу"
    categories:
      - label: "Розмовний (буду + інфінітив)"
        items:
          - "Я буду робити домашнє завдання."
          - "Ми будемо чекати на тебе."
          - "Вони будуть їхати потягом."
          - "Ти будеш готувати вечерю?"
      - label: "Офіційний (синтетичний -тиму)"
        items:
          - "Президент зустрічатиме делегацію."
          - "Комісія розглядатиме справу."
          - "Парламент голосуватиме завтра."
          - "Уряд забезпечуватиме підтримку."
      - label: "Результативний (доконаний)"
        items:
          - "Я зроблю це до вечора."
          - "Він напише звіт завтра."
          - "Ми закінчимо проєкт у п'ятницю."
          - "Вона прочитає книгу за тиждень."

  - type: build_sentence
    title: "Доповни умовне речення"
    instruction: "Обери правильну форму майбутнього"
    sentences:
      - words: ["Якщо", "буде", "дощ", ",", "ми", "[залишимося/будемо залишатися]", "вдома", "."]
        correct: "Якщо буде дощ, ми залишимося вдома."
      - words: ["Коли", "він", "[прийде/буде приходити]", ",", "ми", "почнемо", "."]
        correct: "Коли він прийде, ми почнемо."
      - words: ["Я", "[читатиму/буду читати]", ",", "поки", "ти", "готуватимеш", "вечерю", "."]
        correct: "Я читатиму, поки ти готуватимеш вечерю."
      - words: ["Вона", "[напише/буде написати]", "листа", "завтра", "."]
        correct: "Вона напише листа завтра."
      - words: ["Ми", "[працюватимемо/будемо працювати]", "весь", "день", "."]
        correct: "Ми працюватимемо весь день."
      - words: ["Він", "[зробить/буде зробити]", "це", "до", "вечора", "."]
        correct: "Він зробить це до вечора."
      - words: ["Якщо", "встигну", ",", "я", "[подзвоню/буду подзвонити]", "."]
        correct: "Якщо встигну, я подзвоню."
      - words: ["Протягом", "тижня", "я", "[готуватимуся/підготуюся]", "."]
        correct: "Протягом тижня я готуватимуся."

  - type: pattern_drill
    title: "Вид і форма майбутнього"
    prompt: "Утвори правильну форму майбутнього часу"
    items:
      - given: "працювати (весь день) → я..."
        answer: "буду працювати"
      - given: "зробити (до вечора) → я..."
        answer: "зроблю"
      - given: "читати (офіційно) → він..."
        answer: "читатиме"
      - given: "написати (завтра) → вона..."
        answer: "напише"
      - given: "готувати (поки ти чекатимеш) → я..."
        answer: "готуватиму"
      - given: "закінчити (проєкт) → ми..."
        answer: "закінчимо"
      - given: "працювати (офіційно) → уряд..."
        answer: "працюватиме"
      - given: "вивчати (протягом місяця) → я..."
        answer: "вивчатиму"
      - given: "вивчити (до кінця року) → я..."
        answer: "вивчу"
      - given: "робити (розмовно) → ти..."
        answer: "будеш робити"

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "«Я буду зробити» — правильна форма."
        answer: false
        correction: "Доконаний вид не вживається зі складеним майбутнім. Правильно: «Я зроблю»."
      - statement: "«Читатиму» — синтетична форма майбутнього часу."
        answer: true
      - statement: "Складена форма (буду + інфінітив) типова для офіційного стилю."
        answer: false
        correction: "Складена форма типова для розмовного стилю. Офіційний стиль — синтетична (-тиму)."
      - statement: "«Зроблю» — доконаний вид, майбутній час."
        answer: true
      - statement: "«Буду працювати» і «працюватиму» — різні значення."
        answer: false
        correction: "Однакове значення, але різний стиль: розмовний vs офіційний."
      - statement: "Після «поки» можна вживати недоконаний майбутній."
        answer: true

  - type: reading
    title: "Читання: Новини"
    text: |
      Уряд розглядатиме новий закон про освіту наступного тижня. Міністр освіти зустрічатиметься з директорами шкіл у понеділок. Якщо парламент схвалить закон, зміни набудуть чинності з вересня. Протягом літа школи готуватимуться до нових стандартів. «Ми зробимо все можливе, щоб реформа була успішною,» — сказав міністр.
    questions:
      - question: "Знайди всі форми майбутнього часу в тексті."
        answer: "Розглядатиме, зустрічатиметься, схвалить, набудуть, готуватимуться, зробимо."
      - question: "Які форми офіційного стилю (синтетичні)?"
        answer: "Розглядатиме, зустрічатиметься, готуватимуться."
      - question: "Які форми доконаного виду?"
        answer: "Схвалить, набудуть, зробимо."
