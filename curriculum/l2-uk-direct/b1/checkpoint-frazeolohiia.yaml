module: checkpoint-frazeolohiia
track: l2-uk-direct
level: b1
type: checkpoint
title: "Контрольна: фразеологія, стилі, антисуржик"
subtitle: "Перевірка знань модулів 30–33"
standard_ref: "§4.5 — лексична правильність; §4.3 — словотвір"
textbook_ref: "Grade 5 — культура мовлення, стилі, словотвір"
teaching_notes: |
  Контрольна охоплює: фразеологізми (модуль 30), антисуржик (31), офіційний/розмовний стилі (32),
  словотвір — складні слова й абревіатури (33). Поріг: 70%.
  Завдання змішані: від простого впізнавання до застосування в контексті.
  Не підказуйте — це перевірка, а не навчання.

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Фразеологізми (повторення)"
    items:
      - word: "байдики бити"
        emoji: "\U0001F634"
        sentence: "Не бий байдики — працюй!"
      - word: "як з гуся вода"
        emoji: "\U0001F986"
        sentence: "Йому все як з гуся вода."
      - word: "брати бика за роги"
        emoji: "\U0001F402"
        sentence: "Час брати бика за роги й починати."
      - word: "язик без кісток"
        emoji: "\U0001F5E3"
        sentence: "У нього язик без кісток — говорить без зупинки."
      - word: "ні пуху ні пера"
        emoji: "\U0001F340"
        sentence: "Перед іспитом кажуть: ні пуху ні пера!"

  - category: "Антисуржик (повторення)"
    items:
      - word: "наступний"
        emoji: "\U000027A1"
        sentence: "Наступний крок — подати документи."
      - word: "збігатися"
        emoji: "\U0001F504"
        sentence: "Результати збігаються."
      - word: "вважати"
        emoji: "\U0001F9D0"
        sentence: "Вважаю це правильним рішенням."
      - word: "брати участь"
        emoji: "\U0001F91D"
        sentence: "Беру участь у конкурсі."
      - word: "захід"
        emoji: "\U0001F3AD"
        sentence: "Захід відбувся успішно."

  - category: "Стилі та словотвір (повторення)"
    items:
      - word: "стосовно"
        emoji: "\U0001F4E8"
        sentence: "Стосовно вашого питання відповідаю."
      - word: "землетрус"
        emoji: "\U0001F30B"
        sentence: "Землетрус — складне слово."
      - word: "абревіатура"
        emoji: "\U0001F524"
        sentence: "ООН — це абревіатура."
      - word: "протягом"
        emoji: "\U0001F4C5"
        sentence: "Протягом тижня дамо відповідь."
      - word: "водопровід"
        emoji: "\U0001F6B0"
        sentence: "У місті ремонтують водопровід."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Виправ помилку"
    prompt: "Обери правильний варіант"
    items:
      - given: "приймати / брати участь"
        answer: "брати участь"
      - given: "слідуючий / наступний"
        answer: "наступний"
      - given: "являється / є"
        answer: "є"
      - given: "на протязі / протягом"
        answer: "протягом"
      - given: "міроприємство / захід"
        answer: "захід"
      - given: "співпадіння / збіг"
        answer: "збіг"

  - type: classify
    title: "Розподіли за категоріями"
    instruction: "Фразеологізм, суржик, офіційний стиль чи складне слово?"
    categories:
      - label: "Фразеологізм"
        items:
          - "байдики бити"
          - "як з гуся вода"
          - "ні пуху ні пера"
          - "брати бика за роги"
      - label: "Суржик (неправильно)"
        items:
          - "приймати участь"
          - "слідуючий"
          - "являється"
          - "міроприємство"
      - label: "Офіційний стиль"
        items:
          - "стосовно"
          - "у зв'язку з"
          - "повідомляю"
          - "прошу надати"
      - label: "Складне слово"
        items:
          - "пароплав"
          - "землетрус"
          - "водоспад"
          - "хлібороб"

  - type: build_sentence
    title: "Заверши речення"
    instruction: "Обери правильне слово або вираз"
    sentences:
      - words: ["Він", "увесь", "день", "[бив байдики/працював байдики]", "."]
        correct: "Він увесь день бив байдики."
      - words: ["[Стосовно/По поводу]", "вашого", "запитання", "відповідаю", "."]
        correct: "Стосовно вашого запитання відповідаю."
      - words: ["[На протязі/Протягом]", "року", "він", "вивчав", "мову", "."]
        correct: "Протягом року він вивчав мову."

  - type: reading
    title: "Змішаний текст"
    text: |
      Учора відбувся захід у нашому ліцеї. Учні брали участь у вікторині з мови. Шановна пані директорко відкрила захід. Наступним номером був конкурс фразеологізмів. Переможці знали, що «байдики бити» — це нічого не робити, а «ні пуху ні пера» кажуть перед іспитом. Протягом дня всі добре попрацювали. ЗСУ також привітали учнів із Днем мови.
    questions:
      - question: "Які фразеологізми згадані в тексті?"
        answer: "«Байдики бити» і «ні пуху ні пера»."
      - question: "Яка абревіатура є в тексті?"
        answer: "ЗСУ — Збройні сили України."
      - question: "Які ознаки офіційного стилю є у зверненні до директорки?"
        answer: "«Шановна пані директорко» — офіційна форма звертання у кличному відмінку."

  - type: true_false
    title: "Перевірка знань"
    items:
      - statement: "«Байдики бити» означає «багато працювати»."
        answer: false
        correction: "Означає «нічого не робити, ледарювати»."
      - statement: "ООН — це абревіатура."
        answer: true
      - statement: "«Приймати участь» — правильна українська фраза."
        answer: false
        correction: "Правильно: «брати участь»."
      - statement: "Після м'якого приголосного в складних словах пишемо е."
        answer: true
      - statement: "«Шановний пане» — звернення розмовного стилю."
        answer: false
        correction: "Це офіційне звернення. Розмовне: «Привіт!», «Слухай!»"
