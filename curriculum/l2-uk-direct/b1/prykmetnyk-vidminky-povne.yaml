module: prykmetnyk-vidminky-povne
track: l2-uk-direct
level: b1
type: grammar
title: "Прикметник: повне відмінювання"
subtitle: "Тверда і м'яка групи — чоловічий, жіночий, середній рід і множина"
standard_ref: "§4.2.1.2 — повна парадигма прикметників"
textbook_ref: "6 клас (Авраменко §61–70) — відмінювання прикметників"
teaching_notes: |
  Дві групи: тверда (-ий/-а/-е: новий) і м'яка (-ій/-я/-є: синій). Парадигми майже паралельні.
  Прикметник узгоджується з іменником у роді, числі та відмінку — це ключовий принцип.
  Знахідний чоловічого роду = називний (неістота) або родовий (істота): новий стіл, нового друга.
  Короткі форми (предикативні): зелен, молод, потрібен — без закінчення, з «бути».
  Найчастіша помилка — плутанина родового чоловічого/середнього (-ого) і жіночого (-ої).

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Прикметник узгоджується з іменником: нов-ий стіл, нов-а книга, нов-е місто, нов-і друзі."
  examples:
    - "новий → нового → новому → новий/нового → новим → на новому"
    - "нова → нової → новій → нову → новою → на новій"
    - "нове → нового → новому → нове → новим → на новому"
    - "нові → нових → новим → нові/нових → новими → на нових"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Тверда група (-ий/-а/-е)"
    columns: ["Відмінок", "Чол.", "Жін.", "Сер.", "Множ."]
    rows:
      - ["Н.в.", "нов-ий", "нов-а", "нов-е", "нов-і"]
      - ["Р.в.", "нов-ого", "нов-ої", "нов-ого", "нов-их"]
      - ["Д.в.", "нов-ому", "нов-ій", "нов-ому", "нов-им"]
      - ["Зн.в.", "= Н/Р", "нов-у", "нов-е", "= Н/Р"]
      - ["О.в.", "нов-им", "нов-ою", "нов-им", "нов-ими"]
      - ["М.в.", "на нов-ому", "на нов-ій", "на нов-ому", "на нов-их"]

  - title: "М'яка група (-ій/-я/-є)"
    columns: ["Відмінок", "Чол.", "Жін.", "Сер.", "Множ."]
    rows:
      - ["Н.в.", "син-ій", "син-я", "син-є", "син-і"]
      - ["Р.в.", "синь-ого", "синь-ої", "синь-ого", "син-іх"]
      - ["Д.в.", "синь-ому", "син-ій", "синь-ому", "син-ім"]
      - ["Зн.в.", "= Н/Р", "син-ю", "син-є", "= Н/Р"]
      - ["О.в.", "син-ім", "синь-ою", "син-ім", "син-іми"]
      - ["М.в.", "на синь-ому", "на син-ій", "на синь-ому", "на син-іх"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
