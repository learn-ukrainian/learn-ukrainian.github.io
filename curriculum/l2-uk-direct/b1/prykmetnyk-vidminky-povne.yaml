# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Провідміняй «великий» (чол./жін./сер.)"
    prompt: "Утвори правильну форму"
    items:
      - given: "великий (чол.) → Р.в."
        answer: "великого"
      - given: "великий (чол.) → Д.в."
        answer: "великому"
      - given: "великий (чол.) → О.в."
        answer: "великим"
      - given: "велика (жін.) → Р.в."
        answer: "великої"
      - given: "велика (жін.) → Д.в."
        answer: "великій"
      - given: "велика (жін.) → Зн.в."
        answer: "велику"
      - given: "велика (жін.) → О.в."
        answer: "великою"
      - given: "велике (сер.) → Р.в."
        answer: "великого"
      - given: "велике (сер.) → О.в."
        answer: "великим"
      - given: "великі (множ.) → Р.в."
        answer: "великих"
      - given: "великі (множ.) → О.в."
        answer: "великими"

  - type: pattern_drill
    title: "Узгодження прикметника з іменником"
    prompt: "Постав прикметник у правильну форму"
    items:
      - given: "новий + книга (Д.в.)"
        answer: "новій книзі"
      - given: "великий + місто (М.в.)"
        answer: "у великому місті"
      - given: "синій + небо (Р.в.)"
        answer: "синього неба"
      - given: "гарний + пісня (О.в.)"
        answer: "гарною піснею"
      - given: "старий + друг (Р.в.)"
        answer: "старого друга"
      - given: "молодий + учителі (Д.в.)"
        answer: "молодим учителям"

  - type: build_sentence
    title: "Речення з прикметниками"
    instruction: "Обери правильну форму прикметника"
    sentences:
      - words: ["Я", "живу", "в", "[старий/старому]", "будинку", "."]
        correct: "Я живу в старому будинку."
      - words: ["Він", "купив", "[нова/нову]", "книгу", "."]
        correct: "Він купив нову книгу."
      - words: ["На", "[синє/синьому]", "небі", "світило", "сонце", "."]
        correct: "На синьому небі світило сонце."
      - words: ["Ми", "гуляли", "[осінній/осіннім]", "парком", "."]
        correct: "Ми гуляли осіннім парком."
      - words: ["Вона", "зустріла", "[старий/старого]", "друга", "."]
        correct: "Вона зустріла старого друга."

  - type: classify
    title: "Тверда чи м'яка група?"
    instruction: "Розподіли прикметники"
    categories:
      - label: "Тверда група (-ий)"
        items:
          - "великий"
          - "новий"
          - "старий"
          - "гарний"
          - "молодий"
          - "білий"
          - "зелений"
      - label: "М'яка група (-ій)"
        items:
          - "синій"
          - "осінній"
          - "ранній"
          - "пізній"
          - "давній"
          - "літній"
          - "домашній"

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "«Нового» — це жіночий рід."
        answer: false
        correction: "«Нового» — чоловічий або середній рід (Р.в.)."
      - statement: "Давальний від «синя» — «синій»."
        answer: true
      - statement: "Орудний від «великий» (чол.) — «великою»."
        answer: false
        correction: "Чоловічий рід: великий → великим (О.в.)."
      - statement: "«Потрібен» — це коротка форма прикметника."
        answer: true
      - statement: "Знахідний від «новий стіл» (неістота) — «нового стола»."
        answer: false
        correction: "Неістота: Зн.в. = Н.в. → новий стіл."
      - statement: "Знахідний від «новий друг» (істота) — «нового друга»."
        answer: true
