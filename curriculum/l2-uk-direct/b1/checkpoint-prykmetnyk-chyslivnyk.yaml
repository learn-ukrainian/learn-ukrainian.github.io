module: checkpoint-prykmetnyk-chyslivnyk
track: l2-uk-direct
level: b1
type: checkpoint
title: "Контрольна точка: прикметник, займенник, числівник"
subtitle: "Перевірка знань прикметникової, займенникової та числівникової морфології"
standard_ref: "§4.2.1.2–4, §4.3 — повна перевірка"
textbook_ref: "6 клас (Авраменко §61–115) — узагальнення"
teaching_notes: |
  Контрольна точка охоплює: відмінювання прикметників, типи займенників, числівники, словотвір, прислівники.
  Поріг проходження: 70%. Якщо менше — повторіть слабкі модулі.
  Завдання різних типів: pattern_drill, classify, build_sentence, reading, true_false.
  Найчастіші помилки: тверда/м'яка група прикметників, «себе» без називного, суржикові форми.
  Зверніть увагу на узгодження: прикметник + іменник у правильному роді/числі/відмінку.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Прикметник узгоджується з іменником. Займенники: 8 типів. Числівники: 5–20 як III відм. Прислівники: -о від прикметника."
  examples:
    - "нов-ий стіл → нов-ого стол-а (Р.в.)"
    - "себе: Р.в. себе, Д.в. собі, О.в. собою"
    - "п'ять → п'яти (Р.в.), п'ятьма (О.в.)"
    - "швидкий → швидко → швидше → найшвидше"

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Прикметник: відмінювання (1)"
    prompt: "Утвори правильну форму"
    items:
      - given: "великий (чол.) → Р.в."
        answer: "великого"
      - given: "велика (жін.) → Д.в."
        answer: "великій"
      - given: "велике (сер.) → О.в."
        answer: "великим"
      - given: "великі (множ.) → Р.в."
        answer: "великих"
      - given: "синій (чол.) → Р.в."
        answer: "синього"
      - given: "синя (жін.) → Зн.в."
        answer: "синю"
      - given: "осінній (чол.) → О.в."
        answer: "осіннім"
      - given: "старий + друг (Зн.в., істота)"
        answer: "старого друга"

  - type: pattern_drill
    title: "Прикметник: узгодження (2)"
    prompt: "Узгодь прикметник з іменником"
    items:
      - given: "новий + книга (М.в.)"
        answer: "у новій книзі"
      - given: "великий + місто (Р.в.)"
        answer: "великого міста"
      - given: "гарний + пісні (О.в. множ.)"
        answer: "гарними піснями"
      - given: "давній + храм (М.в.)"
        answer: "у давньому храмі"

  - type: pattern_drill
    title: "Займенники: зворотний (3)"
    prompt: "Утвори правильну форму"
    items:
      - given: "себе → Д.в."
        answer: "собі"
      - given: "себе → О.в."
        answer: "собою"
      - given: "себе → М.в."
        answer: "на собі"

  - type: pattern_drill
    title: "Займенники: заперечні (4)"
    prompt: "Утвори заперечну форму"
    items:
      - given: "хтось → заперечення"
        answer: "ніхто"
      - given: "щось → заперечення"
        answer: "ніщо"
      - given: "десь → заперечення"
        answer: "ніде"
      - given: "колись → заперечення"
        answer: "ніколи"
      - given: "якийсь → заперечення"
        answer: "ніякий"

  - type: pattern_drill
    title: "Числівники: відмінювання (5)"
    prompt: "Постав числівник у потрібний відмінок"
    items:
      - given: "п'ять → Р.в."
        answer: "п'яти"
      - given: "десять → О.в."
        answer: "десятьма"
      - given: "сорок → Р.в."
        answer: "сорока"
      - given: "сто → Р.в."
        answer: "ста"

  - type: pattern_drill
    title: "Словотвір: прикметники і прислівники (6)"
    prompt: "Утвори правильну форму"
    items:
      - given: "Київ → прикметник"
        answer: "київський"
      - given: "осінь → прикметник"
        answer: "осінній"
      - given: "щастя → прикметник"
        answer: "щасливий"
      - given: "швидкий → прислівник"
        answer: "швидко"
      - given: "добре → вищий ступінь"
        answer: "краще"

  - type: pattern_drill
    title: "Прислівники: ступені порівняння (7)"
    prompt: "Утвори вищий або найвищий ступінь"
    items:
      - given: "швидко → вищий"
        answer: "швидше"
      - given: "повільно → найвищий"
        answer: "найповільніше"
      - given: "погано → вищий"
        answer: "гірше"
      - given: "мало → вищий"
        answer: "менше"

  - type: pattern_drill
    title: "Анти-суржик (8)"
    prompt: "Заміни на правильне"
    items:
      - given: "учбовий"
        answer: "навчальний"
      - given: "слідуючий"
        answer: "наступний"
      - given: "самий кращий"
        answer: "найкращий"

  - type: classify
    title: "Тип займенника"
    instruction: "Визнач тип"
    categories:
      - label: "Особовий"
        items: ["я", "він", "вони"]
      - label: "Вказівний"
        items: ["цей", "той", "такий"]
      - label: "Неозначений"
        items: ["хтось", "будь-хто", "якийсь"]
      - label: "Заперечний"
        items: ["ніхто", "ніщо", "ніякий"]
      - label: "Зворотний"
        items: ["себе", "собі", "собою"]

  - type: classify
    title: "Тверда чи м'яка група прикметника?"
    instruction: "Розподіли"
    categories:
      - label: "Тверда (-ий)"
        items: ["великий", "старий", "новий", "білий"]
      - label: "М'яка (-ій)"
        items: ["синій", "осінній", "давній", "літній"]

  - type: classify
    title: "Тип прислівника"
    instruction: "Визнач тип за значенням"
    categories:
      - label: "Місце"
        items: ["тут", "далеко", "вгорі"]
      - label: "Час"
        items: ["зараз", "давно", "щодня"]
      - label: "Спосіб"
        items: ["швидко", "добре", "тихо"]

  - type: build_sentence
    title: "Побудуй речення (1)"
    instruction: "Обери правильну форму"
    sentences:
      - words: ["Я", "живу", "в", "[старий/старому]", "будинку", "."]
        correct: "Я живу в старому будинку."
      - words: ["[Ніхто/Хтось]", "не", "прийшов", "на", "зустріч", "."]
        correct: "Ніхто не прийшов на зустріч."

  - type: build_sentence
    title: "Побудуй речення (2)"
    instruction: "Обери правильну форму"
    sentences:
      - words: ["Купи", "[собі/себе]", "каву", "."]
        correct: "Купи собі каву."
      - words: ["Він", "біжить", "[швидше/швидший]", "за", "мене", "."]
        correct: "Він біжить швидше за мене."

  - type: build_sentence
    title: "Побудуй речення (3)"
    instruction: "Обери правильну форму"
    sentences:
      - words: ["Вона", "говорить", "[по-українськи/по українськи]", "."]
        correct: "Вона говорить по-українськи."
      - words: ["Більше", "[ста/сто]", "людей", "прийшло", "."]
        correct: "Більше ста людей прийшло."

  - type: build_sentence
    title: "Побудуй речення (4)"
    instruction: "Обери правильну форму"
    sentences:
      - words: ["На", "[синє/синьому]", "небі", "хмари", "."]
        correct: "На синьому небі хмари."
      - words: ["[Навчальний/Учбовий]", "рік", "закінчився", "."]
        correct: "Навчальний рік закінчився."

  - type: reading
    title: "Читання: Один день"
    text: |
      Сьогодні був чудовий осінній день. Вранці Тарас подивився на себе в дзеркало — усе добре. Він швидко зібрався і поїхав до нового навчального центру. Там його чекали декілька старих друзів і хтось незнайомий. «Ніхто не запізнився!» — зраділа викладачка. Потім усі разом пішли до великого парку. По-новому виглядали дерева — жовті, червоні, золоті. «Найкраще — гуляти осінніми алеями», — сказав Тарас собі.
    questions:
      - question: "Який був день?"
        answer: "Чудовий осінній (прикметники, м'яка група)."
      - question: "Хто чекав на Тараса?"
        answer: "Декілька старих друзів і хтось незнайомий (неозначений займенник)."
      - question: "Що сказав Тарас собі?"
        answer: "«Найкраще — гуляти осінніми алеями» (зворотний займенник, найвищий ступінь)."

  - type: reading
    title: "Читання: У книгарні"
    text: |
      У новій київській книгарні було багато людей. На першому поверсі — навчальні посібники. На другому — українська та іноземна література. Хтось запитав: «Скільки коштує ця книга?» Продавець відповів: «Більше ста гривень, але менше двохсот». «Нічого собі!» — здивувалася покупниця. «Візьміть краще цю — вона дешевша». Жінка купила собі дві книги і пішла щаслива.
    questions:
      - question: "Де була книгарня?"
        answer: "У Києві (київська — прикметник від Київ, суфікс -ський)."
      - question: "Скільки коштувала книга?"
        answer: "Більше ста гривень (числівник «сто» в Р.в. → «ста»)."
      - question: "Що порадив продавець?"
        answer: "Взяти іншу — дешевшу (вищий ступінь порівняння)."

  - type: true_false
    title: "Правильно чи неправильно? (1)"
    items:
      - statement: "«Нового» — це жіночий рід."
        answer: false
        correction: "Чоловічий або середній рід (Р.в.)."
      - statement: "«Себе» має називний відмінок."
        answer: false
        correction: "Зворотний займенник не має називного."
      - statement: "Родовий від «сорок» — «сорока»."
        answer: true

  - type: true_false
    title: "Правильно чи неправильно? (2)"
    items:
      - statement: "«По-українськи» пишеться через дефіс."
        answer: true
      - statement: "«Учбовий» — правильне українське слово."
        answer: false
        correction: "Правильно: навчальний."
      - statement: "Вищий ступінь від «добре» — «краще»."
        answer: true

  - type: true_false
    title: "Правильно чи неправильно? (3)"
    items:
      - statement: "«Ніхто» пишеться через дефіс."
        answer: false
        correction: "Разом: ніхто."
      - statement: "Орудний від «п'ять» — «п'ятьма»."
        answer: true
      - statement: "Порядкові числівники відмінюються як іменники."
        answer: false
        correction: "Як прикметники."

  - type: true_false
    title: "Правильно чи неправильно? (4)"
    items:
      - statement: "«Осінній» — тверда група прикметників."
        answer: false
        correction: "М'яка група: -ій."
      - statement: "Найвищий ступінь від «погано» — «найгірше»."
        answer: true
      - statement: "«Двісті» — це форма називного відмінка."
        answer: true

  - type: true_false
    title: "Правильно чи неправильно? (5)"
    items:
      - statement: "Знахідний від «новий стіл» (неістота) — «нового стола»."
        answer: false
        correction: "Неістота: Зн.в. = Н.в. → новий стіл."
      - statement: "«Хтось» — неозначений займенник."
        answer: true
      - statement: "«Завтра» — прислівник часу."
        answer: true
