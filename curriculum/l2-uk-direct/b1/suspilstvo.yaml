module: suspilstvo
track: l2-uk-direct
level: b1
type: vocabulary
title: "Суспільство"
subtitle: "Держава, інституції, соціальні проблеми, права людини"
standard_ref: "Каталог Б — Суспільні відносини (нова тема на B1)"
textbook_ref: "Grade 5–6 — суспільство, держава, права громадянина"
teaching_notes: |
  Нова тематична зона на B1: суспільні відносини.
  Лексика: держава, уряд, парламент, конституція, закон, суд, поліція.
  Соціальні проблеми: бідність, безробіття, освіта, екологія.
  Війна й мир: армія, оборона, волонтер, допомога.
  Конструкції для висловлення думки: «Я вважаю, що...», «Я не погоджуюсь, бо...».

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Я вважаю, що... / Я не погоджуюсь, бо... / На мою думку..."
  examples:
    - "Я вважаю, що освіта — це основа розвитку."
    - "Я не погоджуюсь, бо це порушує права людини."
    - "На мою думку, кожен громадянин має бути відповідальним."

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Держава та органи влади"
    items:
      - word: "держава"
        emoji: "\U0001F3DB"
        sentence: "Україна — незалежна держава."
      - word: "уряд"
        emoji: "\U0001F3DB"
        sentence: "Уряд ухвалив нові закони."
      - word: "парламент"
        emoji: "\U0001F3DB"
        sentence: "Парламент — Верховна Рада України."
      - word: "президент"
        emoji: "\U0001F464"
        sentence: "Президент підписав указ."
      - word: "конституція"
        emoji: "\U0001F4DC"
        sentence: "Конституція — основний закон держави."
      - word: "закон"
        emoji: "\U00002696"
        sentence: "Закон захищає права громадян."
      - word: "суд"
        emoji: "\U00002696"
        sentence: "Суд розглядає справу."
      - word: "поліція"
        emoji: "\U0001F46E"
        sentence: "Поліція забезпечує порядок."

  - category: "Суспільство та права"
    items:
      - word: "суспільство"
        emoji: "\U0001F465"
        sentence: "Суспільство має бути справедливим."
      - word: "громадянин"
        emoji: "\U0001F464"
        sentence: "Кожен громадянин має права й обов'язки."
      - word: "права людини"
        emoji: "\U0001F91D"
        sentence: "Права людини захищає Конституція."
      - word: "свобода"
        emoji: "\U0001F54A"
        sentence: "Свобода слова — основне право."
      - word: "рівність"
        emoji: "\U00002696"
        sentence: "Рівність перед законом — принцип демократії."

  - category: "Соціальні проблеми"
    items:
      - word: "бідність"
        emoji: "\U0001F4B8"
        sentence: "Бідність — серйозна соціальна проблема."
      - word: "безробіття"
        emoji: "\U0001F4C9"
        sentence: "Безробіття зростає під час кризи."
      - word: "освіта"
        emoji: "\U0001F393"
        sentence: "Освіта — основа розвитку суспільства."
      - word: "охорона здоров'я"
        emoji: "\U0001FA7A"
        sentence: "Охорона здоров'я потребує реформ."
      - word: "екологія"
        emoji: "\U0001F33F"
        sentence: "Екологія — важлива тема сьогодення."

  - category: "Війна та мир"
    items:
      - word: "мир"
        emoji: "\U0001F54A"
        sentence: "Усі хочуть миру."
      - word: "війна"
        emoji: "\U00002694"
        sentence: "Війна принесла страждання."
      - word: "армія"
        emoji: "\U0001FA96"
        sentence: "Армія захищає країну."
      - word: "оборона"
        emoji: "\U0001F6E1"
        sentence: "Оборона країни — обов'язок кожного."
      - word: "волонтер"
        emoji: "\U0001F91D"
        sentence: "Волонтери допомагають армії."
      - word: "допомога"
        emoji: "\U0001F49B"
        sentence: "Гуманітарна допомога врятувала багато людей."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Розподіли за категоріями"
    instruction: "Органи влади, соціальні проблеми, права чи війна/мир?"
    categories:
      - label: "Органи влади"
        items:
          - "уряд"
          - "парламент"
          - "суд"
          - "поліція"
          - "президент"
      - label: "Соціальні проблеми"
        items:
          - "бідність"
          - "безробіття"
          - "екологія"
          - "охорона здоров'я"
      - label: "Права"
        items:
          - "свобода слова"
          - "рівність"
          - "права людини"
          - "конституція"
      - label: "Війна та мир"
        items:
          - "армія"
          - "оборона"
          - "волонтер"
          - "допомога"

  - type: build_sentence
    title: "Висловлення думки"
    instruction: "Склади речення зі своєю думкою про суспільство"
    sentences:
      - words: ["Я", "вважаю", ",", "що", "освіта", "—", "основа", "розвитку", "."]
        correct: "Я вважаю, що освіта — основа розвитку."
      - words: ["На", "мою", "думку", ",", "кожен", "має", "знати", "свої", "права", "."]
        correct: "На мою думку, кожен має знати свої права."
      - words: ["Волонтери", "роблять", "величезний", "внесок", "у", "суспільство", "."]
        correct: "Волонтери роблять величезний внесок у суспільство."
      - words: ["Конституція", "—", "основний", "закон", "держави", "."]
        correct: "Конституція — основний закон держави."
      - words: ["Безробіття", "—", "серйозна", "проблема", "для", "молоді", "."]
        correct: "Безробіття — серйозна проблема для молоді."

  - type: reading
    title: "Стаття: Волонтерський рух"
    text: |
      З початком повномасштабної війни волонтерський рух в Україні набув небаченого розмаху. Тисячі людей почали допомагати армії: збирали кошти, купували обладнання, готували їжу для військових. Волонтери також допомагають переселенцям: знаходять житло, одяг, ліки. На мою думку, волонтерство — це прояв справжнього патріотизму. Громадянське суспільство показало, що кожен може зробити свій внесок у захист країни.
    questions:
      - question: "Як волонтери допомагають армії?"
        answer: "Збирають кошти, купують обладнання, готують їжу."
      - question: "Як допомагають переселенцям?"
        answer: "Знаходять житло, одяг, ліки."
      - question: "Яке речення — думка, а не факт?"
        answer: "«На мою думку, волонтерство — це прояв справжнього патріотизму.»"

  - type: pattern_drill
    title: "Згода чи незгода"
    prompt: "Висловіть згоду або незгоду"
    items:
      - given: "Освіта важлива (погоджуюсь) → ?"
        answer: "Я вважаю, що освіта дуже важлива."
      - given: "Екологія не важлива (не погоджуюсь) → ?"
        answer: "Я не погоджуюсь, бо екологія стосується кожного."
      - given: "Закони мають бути суворими (погоджуюсь) → ?"
        answer: "На мою думку, закони мають бути суворими й справедливими."
      - given: "Волонтерство нікому не потрібне (не погоджуюсь) → ?"
        answer: "Дозвольте не погодитися — волонтери рятують життя."

  - type: true_false
    title: "Суспільство"
    items:
      - statement: "Конституція — це основний закон держави."
        answer: true
      - statement: "Парламент в Україні називається «Державна Дума»."
        answer: false
        correction: "Парламент в Україні — Верховна Рада."
      - statement: "Волонтери працюють безкоштовно."
        answer: true
      - statement: "Суд — це орган законодавчої влади."
        answer: false
        correction: "Суд — орган судової влади. Законодавча — парламент."
      - statement: "Права людини захищає Конституція."
        answer: true
      - statement: "Безробіття — це коли людина не може знайти роботу."
        answer: true
