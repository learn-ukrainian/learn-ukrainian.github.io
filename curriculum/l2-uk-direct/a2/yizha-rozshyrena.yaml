module: yizha-rozshyrena
track: l2-uk-direct
level: a2
type: vocabulary
title: "Їжа: розширена"
subtitle: "Способи приготування, замовлення в ресторані, рецепти"
standard_ref: "Каталог Б — Їжа і напої (розширення з А1)"
textbook_ref: "Grade 3–4 — їжа, приготування, ресторан"
teaching_notes: |
  Розширюємо лексику їжі з А1: тепер додаємо способи приготування (варити, смажити, пекти).
  Шаблон ресторану: «Я хотів/хотіла б замовити...» — умовний спосіб для ввічливості.
  Рецепт — чудова нагода для наказового способу: «Візьміть, додайте, мішайте».
  Смакові прикметники: солодкий, кислий, гіркий, солоний, гострий — повторення і закріплення.
  Зверніть увагу на керування дієслів: варити (що? — зн.в.), різати (що? — зн.в.).

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Я хотів/хотіла б замовити... Принесіть, будь ласка, рахунок."
  examples:
    - "Я хотіла б замовити борщ."
    - "Принесіть, будь ласка, рахунок."
    - "Що ви рекомендуєте?"

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Способи приготування"
    items:
      - word: "варити"
        emoji: "\U0001F372"
        sentence: "Мама варить борщ."
      - word: "смажити"
        emoji: "\U0001F373"
        sentence: "Він смажить картоплю."
      - word: "пекти"
        emoji: "\U0001F35E"
        sentence: "Бабуся пече пиріжки."
      - word: "тушкувати"
        emoji: "\U0001F957"
        sentence: "Вона тушкує овочі."
      - word: "різати"
        emoji: "\U0001F52A"
        sentence: "Різай помідори дрібно."
      - word: "мішати"
        emoji: "\U0001F944"
        sentence: "Мішай тісто ложкою."
      - word: "додавати"
        emoji: "\U00002795"
        sentence: "Додай сіль і перець."

  - category: "Смак"
    items:
      - word: "солодкий"
        emoji: "\U0001F36C"
        sentence: "Торт дуже солодкий."
      - word: "кислий"
        emoji: "\U0001F34B"
        sentence: "Лимон кислий."
      - word: "гіркий"
        emoji: "\U0001F624"
        sentence: "Кава без цукру гірка."
      - word: "солоний"
        emoji: "\U0001F9C2"
        sentence: "Суп занадто солоний."
      - word: "гострий"
        emoji: "\U0001F336"
        sentence: "Цей соус дуже гострий."
      - word: "смачний"
        emoji: "\U0001F60B"
        sentence: "Борщ дуже смачний!"
      - word: "несмачний"
        emoji: "\U0001F61E"
        sentence: "Ця каша несмачна."

  - category: "Прийоми їжі"
    items:
      - word: "сніданок"
        emoji: "\U0001F373"
        sentence: "На сніданок я їм кашу."
      - word: "обід"
        emoji: "\U0001F35D"
        sentence: "На обід — суп і салат."
      - word: "вечеря"
        emoji: "\U0001F37D"
        sentence: "Вечеря о сьомій годині."
      - word: "перекус"
        emoji: "\U0001F34E"
        sentence: "На перекус — яблуко."

  - category: "Ресторан"
    items:
      - word: "меню"
        emoji: "\U0001F4C4"
        sentence: "Дайте, будь ласка, меню."
      - word: "замовлення"
        emoji: "\U0001F4DD"
        sentence: "Ваше замовлення готове."
      - word: "офіціант"
        emoji: "\U0001F9D1\U0000200D\U0001F373"
        sentence: "Офіціант приніс страву."
      - word: "рахунок"
        emoji: "\U0001F4B3"
        sentence: "Принесіть, будь ласка, рахунок."
      - word: "чайові"
        emoji: "\U0001F4B5"
        sentence: "Ми залишили чайові."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Смакові прикметники"
    instruction: "Розподіли продукти за смаком"
    categories:
      - label: "Солодкий"
        items:
          - "торт"
          - "шоколад"
          - "банан"
          - "мед"
      - label: "Кислий"
        items:
          - "лимон"
          - "вишня"
          - "квашена капуста"
      - label: "Солоний"
        items:
          - "оселедець"
          - "чипси"
          - "сіль"
      - label: "Гострий"
        items:
          - "перець"
          - "гірчиця"
          - "васабі"

  - type: build_sentence
    title: "Замовлення в ресторані"
    instruction: "Склади діалог"
    sentences:
      - words: ["Я", "хотіла", "б", "замовити", "борщ", "."]
        correct: "Я хотіла б замовити борщ."
      - words: ["Що", "ви", "рекомендуєте", "?"]
        correct: "Що ви рекомендуєте?"
      - words: ["Принесіть", ",", "будь ласка", ",", "рахунок", "."]
        correct: "Принесіть, будь ласка, рахунок."
      - words: ["Чи", "є", "вегетаріанське", "меню", "?"]
        correct: "Чи є вегетаріанське меню?"
      - words: ["Ми", "залишимо", "чайові", "."]
        correct: "Ми залишимо чайові."

  - type: pattern_drill
    title: "Як готувати?"
    prompt: "Обери правильний спосіб приготування"
    items:
      - given: "борщ → як готувати?"
        answer: "варити"
      - given: "картопля на сковорідці → як готувати?"
        answer: "смажити"
      - given: "хліб у духовці → як готувати?"
        answer: "пекти"
      - given: "овочі з водою на повільному вогні → як готувати?"
        answer: "тушкувати"
      - given: "помідори перед салатом → що робити?"
        answer: "різати"
      - given: "тісто ложкою → що робити?"
        answer: "мішати"

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "Десерт зазвичай солоний."
        answer: false
        correction: "Десерт зазвичай солодкий."
      - statement: "Борщ — це варена страва."
        answer: true
      - statement: "Чайові — це обов'язковий платіж."
        answer: false
        correction: "Чайові — це добровільна подяка офіціанту."
      - statement: "Офіціант — це людина, яка обслуговує в ресторані."
        answer: true
      - statement: "Перекус — це основний прийом їжі."
        answer: false
        correction: "Перекус — це легка їжа між основними прийомами."

  - type: reading
    title: "Читання: Рецепт вареників"
    text: |
      Візьміть два склянки борошна і одне яйце. Додайте воду і сіль. Мішайте тісто п'ять хвилин. Для начинки візьміть картоплю. Зваріть картоплю і зробіть пюре. Розкачайте тісто. Ріжте кружечки. Покладіть начинку і зліпіть вареники. Варіть у підсоленій воді десять хвилин. Подавайте зі сметаною. Смачного!
    questions:
      - question: "Що потрібно для тіста?"
        answer: "Борошно, яйце, вода і сіль."
      - question: "Яка начинка?"
        answer: "Картопляне пюре."
      - question: "Скільки хвилин варити вареники?"
        answer: "Десять хвилин."

  - type: riddle
    title: "Приказка"
    clues:
      - "Голод —"
      - "найкращий кухар."
    answer: "ГОЛОД"
    answer_emoji: "\U0001F37D"
    source: "Grade 3"

  - type: proverb_drill
    title: "Прислів'я"
    items:
      - proverb: "Щоб рибу їсти, треба у воду ___."
        answer: "лізти"
