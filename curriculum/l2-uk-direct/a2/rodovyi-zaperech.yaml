module: rodovyi-zaperech
track: l2-uk-direct
level: a2
type: grammar
title: "Родовий: заперечення"
subtitle: "Немає, не було, не буде — заперечення з родовим відмінком"
standard_ref: "§4.2.3.2 — negated object in genitive"
textbook_ref: "Grade 4 — genitive of negation"
teaching_notes: |
  Ключовий контраст: є + називний → немає + родовий. Є книга → Немає книги.
  Три часові форми: немає (теперішній), не було (минулий), не буде (майбутній).
  Окремо розгляньте заперечений прямий додаток: маю книгу → не маю книги.
  Лексика зосереджена на побутових ситуаціях: немає інтернету, немає світла, немає води.
  Контраст є/немає — головний дидактичний прийом цього модуля.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Є + називний → Немає + родовий. Був → Не було + родовий. Буде → Не буде + родовий."
  examples:
    - "Є книга → Немає книги."
    - "Був учитель → Не було вчителя."
    - "Буде урок → Не буде уроку."

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Заперечення: є → немає"
    columns: ["Стверджувальне", "Заперечне", "Відмінок"]
    rows:
      - ["Є хліб.", "Немає хліба.", "Н.в. → Р.в."]
      - ["Є вода.", "Немає води.", "Н.в. → Р.в."]
      - ["Є молоко.", "Немає молока.", "Н.в. → Р.в."]
      - ["Був дощ.", "Не було дощу.", "Н.в. → Р.в."]
      - ["Буде урок.", "Не буде уроку.", "Н.в. → Р.в."]

  - title: "Заперечений прямий додаток"
    columns: ["Стверджувальне (Зн.в.)", "Заперечне (Р.в.)"]
    rows:
      - ["Я маю книгу.", "Я не маю книги."]
      - ["Він бачить друга.", "Він не бачить друга."]
      - ["Вона має час.", "Вона не має часу."]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
