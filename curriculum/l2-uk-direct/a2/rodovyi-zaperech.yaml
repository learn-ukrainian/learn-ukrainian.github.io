# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Є → Немає"
    prompt: "Зміни на заперечення: «Є...» → «Немає...»"
    items:
      - given: "Є хліб."
        answer: "Немає хліба."
      - given: "Є вода."
        answer: "Немає води."
      - given: "Є молоко."
        answer: "Немає молока."
      - given: "Є час."
        answer: "Немає часу."
      - given: "Є місце."
        answer: "Немає місця."
      - given: "Є інтернет."
        answer: "Немає інтернету."
      - given: "Є світло."
        answer: "Немає світла."
      - given: "Є гроші."
        answer: "Немає грошей."
      - given: "Є квитки."
        answer: "Немає квитків."
      - given: "Є зв'язок."
        answer: "Немає зв'язку."
      - given: "Є цукор."
        answer: "Немає цукру."
      - given: "Є сіль."
        answer: "Немає солі."

  - type: pattern_drill
    title: "Минулий і майбутній час"
    prompt: "Зміни на заперечення"
    items:
      - given: "Був дощ."
        answer: "Не було дощу."
      - given: "Буде урок."
        answer: "Не буде уроку."
      - given: "Був учитель."
        answer: "Не було вчителя."
      - given: "Буде екскурсія."
        answer: "Не буде екскурсії."
      - given: "Був сніг."
        answer: "Не було снігу."
      - given: "Буде концерт."
        answer: "Не буде концерту."
      - given: "Був інтернет."
        answer: "Не було інтернету."
      - given: "Буде дощ."
        answer: "Не буде дощу."

  - type: build_sentence
    title: "Чого немає?"
    instruction: "Опиши, чого немає"
    sentences:
      - words: ["Немає", "[хліб/хліба]", "в", "магазині", "."]
        correct: "Немає хліба в магазині."
      - words: ["Не", "було", "[світло/світла]", "вчора", "."]
        correct: "Не було світла вчора."
      - words: ["Не", "буде", "[урок/уроку]", "завтра", "."]
        correct: "Не буде уроку завтра."
      - words: ["Немає", "[гаряча вода/гарячої води]", "."]
        correct: "Немає гарячої води."
      - words: ["Я", "не", "маю", "[книга/книги]", "."]
        correct: "Я не маю книги."
      - words: ["Вона", "не", "має", "[час/часу]", "."]
        correct: "Вона не має часу."

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "Немає книга."
        answer: false
        correction: "Немає книги."
      - statement: "Не було дощу."
        answer: true
      - statement: "Немає інтернету."
        answer: true
      - statement: "Не буде урок."
        answer: false
        correction: "Не буде уроку."
      - statement: "Немає грошей."
        answer: true
      - statement: "Не було вчитель."
        answer: false
        correction: "Не було вчителя."
      - statement: "Я не маю часу."
        answer: true
      - statement: "Немає цукру."
        answer: true

  - type: classify
    title: "Називний чи родовий?"
    instruction: "Розподіли: називний (є/був/буде) чи родовий (немає/не було/не буде)"
    categories:
      - label: "Називний відмінок"
        items:
          - "Є хліб."
          - "Був дощ."
          - "Буде урок."
          - "Є інтернет."
          - "Є світло."
      - label: "Родовий відмінок"
        items:
          - "Немає хліба."
          - "Не було дощу."
          - "Не буде уроку."
          - "Немає інтернету."
          - "Немає світла."

  - type: reading
    title: "Читання: Поганий день"
    text: |
      Сьогодні поганий день. Вранці не було гарячої води — я мився холодною. Потім я побачив, що немає хліба і немає молока. Магазин ще зачинений. На роботі немає інтернету вже три години. Не було жодного листа від клієнтів. Але ввечері стало краще — є вечеря, є чай, є улюблений фільм!
    questions:
      - question: "Чого не було вранці?"
        answer: "Не було гарячої води."
      - question: "Чого немає на роботі?"
        answer: "Немає інтернету."
      - question: "Що є ввечері?"
        answer: "Є вечеря, чай і фільм."

  - type: proverb_drill
    title: "Прислів'я"
    items:
      - proverb: "Нащо й клад, якщо в сім'ї ___."
        answer: "лад"
      - proverb: "Згода будує, а незгода ___."
        answer: "руйнує"
