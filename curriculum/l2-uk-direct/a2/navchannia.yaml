module: navchannia
track: l2-uk-direct
level: a2
type: vocabulary
title: "Навчання"
subtitle: "Школа, університет, предмети, навчальне приладдя"
standard_ref: "Каталог Б — Навчання"
textbook_ref: "Grade 3–4 — навчання, школа, предмети"
teaching_notes: |
  Розрізняйте три ключові дієслова: вчити (вивчати напам'ять), вивчати (опановувати предмет), вчитися (бути учнем).
  Шаблон «Мій улюблений предмет — ...» дає змогу практикувати називний відмінок.
  Навчальні заклади — з прийменником «у/в»: у школі, в університеті, в ліцеї.
  Розклад уроків — чудова нагода повторити порядкові числівники й час.
  Використовуйте реальні предмети зі шкільного розкладу як опору.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Я вчуся в [закладі]. Мій улюблений предмет — [предмет]. На уроці ми [дія]."
  examples:
    - "Я вчуся в університеті."
    - "Мій улюблений предмет — історія."
    - "На уроці ми пишемо диктант."

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Навчальні заклади"
    items:
      - word: "школа"
        emoji: "\U0001F3EB"
        sentence: "Діти ходять до школи."
      - word: "ліцей"
        emoji: "\U0001F3DB"
        sentence: "Він навчається в ліцеї."
      - word: "гімназія"
        emoji: "\U0001F3EB"
        sentence: "Гімназія — це престижна школа."
      - word: "університет"
        emoji: "\U0001F393"
        sentence: "Вона вступила до університету."
      - word: "коледж"
        emoji: "\U0001F4DA"
        sentence: "Після коледжу він пішов працювати."
      - word: "академія"
        emoji: "\U0001F3DB"
        sentence: "Академія готує науковців."

  - category: "Предмети"
    items:
      - word: "математика"
        emoji: "\U00002795"
        sentence: "Математика — точна наука."
      - word: "історія"
        emoji: "\U0001F4DC"
        sentence: "На історії ми вивчаємо минуле."
      - word: "географія"
        emoji: "\U0001F30D"
        sentence: "Географія — наука про Землю."
      - word: "фізика"
        emoji: "\U0000269B"
        sentence: "Фізика пояснює закони природи."
      - word: "хімія"
        emoji: "\U00002697"
        sentence: "На хімії ми робимо досліди."
      - word: "біологія"
        emoji: "\U0001F9EC"
        sentence: "Біологія — наука про живе."
      - word: "література"
        emoji: "\U0001F4D6"
        sentence: "На літературі ми читаємо вірші."
      - word: "мистецтво"
        emoji: "\U0001F3A8"
        sentence: "Мистецтво розвиває творчість."
      - word: "фізкультура"
        emoji: "\U0001F3C3"
        sentence: "На фізкультурі ми бігаємо."

  - category: "Навчальний процес"
    items:
      - word: "урок"
        emoji: "\U0001F4CB"
        sentence: "Перший урок починається о дев'ятій."
      - word: "лекція"
        emoji: "\U0001F9D1\U0000200D\U0001F3EB"
        sentence: "Лекція з історії була цікавою."
      - word: "іспит"
        emoji: "\U0001F4DD"
        sentence: "Завтра в мене іспит з математики."
      - word: "оцінка"
        emoji: "\U0001F4AF"
        sentence: "Я отримав гарну оцінку."
      - word: "домашнє завдання"
        emoji: "\U0001F4D3"
        sentence: "Я зробив домашнє завдання."

  - category: "Навчальне приладдя"
    items:
      - word: "зошит"
        emoji: "\U0001F4D3"
        sentence: "Запишіть це в зошит."
      - word: "підручник"
        emoji: "\U0001F4D5"
        sentence: "Відкрийте підручник на сторінці 42."
      - word: "щоденник"
        emoji: "\U0001F4D4"
        sentence: "Оцінки записують у щоденник."
      - word: "портфель"
        emoji: "\U0001F392"
        sentence: "Книги лежать у портфелі."

  - category: "Дієслова навчання"
    items:
      - word: "вчити"
        emoji: "\U0001F4D6"
        sentence: "Я вчу нові слова щодня."
      - word: "вивчати"
        emoji: "\U0001F9D0"
        sentence: "Вона вивчає фізику."
      - word: "вчитися"
        emoji: "\U0001F393"
        sentence: "Він вчиться в університеті."
      - word: "пам'ятати"
        emoji: "\U0001F9E0"
        sentence: "Ти пам'ятаєш цю формулу?"
      - word: "забувати"
        emoji: "\U0001F636\U0000200D\U0001F32B"
        sentence: "Я часто забуваю дати."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Розподіли за категоріями"
    instruction: "Розподіли слова"
    categories:
      - label: "Навчальні заклади"
        items:
          - "школа"
          - "ліцей"
          - "гімназія"
          - "університет"
          - "коледж"
      - label: "Предмети"
        items:
          - "математика"
          - "історія"
          - "фізика"
          - "хімія"
          - "біологія"
      - label: "Навчальне приладдя"
        items:
          - "зошит"
          - "підручник"
          - "щоденник"
          - "портфель"
      - label: "Дії"
        items:
          - "вчити"
          - "вивчати"
          - "вчитися"
          - "пам'ятати"
          - "забувати"

  - type: build_sentence
    title: "Розкажи про навчання"
    instruction: "Склади речення"
    sentences:
      - words: ["Я", "вчуся", "в", "школі", "."]
        correct: "Я вчуся в школі."
      - words: ["Мій", "улюблений", "предмет", "—", "історія", "."]
        correct: "Мій улюблений предмет — історія."
      - words: ["Перший", "урок", "починається", "о", "дев'ятій", "."]
        correct: "Перший урок починається о дев'ятій."
      - words: ["Завтра", "в", "мене", "іспит", "з", "математики", "."]
        correct: "Завтра в мене іспит з математики."
      - words: ["Я", "зробив", "домашнє", "завдання", "за", "годину", "."]
        correct: "Я зробив домашнє завдання за годину."

  - type: pattern_drill
    title: "Вчити / вивчати / вчитися"
    prompt: "Обери правильне дієслово"
    items:
      - given: "___ нові слова напам'ять (запам'ятовувати)"
        answer: "вчити"
      - given: "___ українську мову (опановувати предмет)"
        answer: "вивчати"
      - given: "___ в університеті (бути студентом)"
        answer: "вчитися"
      - given: "Вона ___ вірш напам'ять"
        answer: "вчить"
      - given: "Він ___ на третьому курсі"
        answer: "вчиться"
      - given: "Ми ___ хімію цього семестру"
        answer: "вивчаємо"

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "Біологія — це навчальний заклад."
        answer: false
        correction: "Біологія — це предмет (наука про живе)."
      - statement: "Іспит — це перевірка знань."
        answer: true
      - statement: "Щоденник — це те саме, що підручник."
        answer: false
        correction: "Щоденник — для оцінок і розкладу. Підручник — для навчального матеріалу."
      - statement: "В університеті є лекції й семінари."
        answer: true
      - statement: "«Вчитися» означає запам'ятовувати напам'ять."
        answer: false
        correction: "«Вчитися» — бути учнем/студентом. «Вчити» — запам'ятовувати напам'ять."

  - type: reading
    title: "Читання: Розклад Марини"
    text: |
      Марина вчиться в ліцеї. Її улюблений предмет — біологія. Щодня вона має шість уроків. Перший урок починається о восьмій тридцять. Після третього уроку — велика перерва. На перерві Марина обідає в їдальні. Потім ще три уроки. Після школи вона робить домашнє завдання і вивчає англійську мову. Увечері Марина читає підручник з біології — це її найулюбленіша книга.
    questions:
      - question: "Де вчиться Марина?"
        answer: "В ліцеї."
      - question: "Скільки уроків у Марини щодня?"
        answer: "Шість."
      - question: "Що вона робить після школи?"
        answer: "Робить домашнє завдання і вивчає англійську."

  - type: riddle
    title: "Приказка"
    clues:
      - "Вік живи —"
      - "вік учись."
    answer: "НАВЧАННЯ"
    answer_emoji: "\U0001F4DA"
    source: "Grade 3"
