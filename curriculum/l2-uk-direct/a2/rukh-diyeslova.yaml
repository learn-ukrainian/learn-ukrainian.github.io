module: rukh-diyeslova
track: l2-uk-direct
level: a2
type: grammar
title: "Дієслова руху: пари"
subtitle: "Іти/ходити, їхати/їздити, летіти/літати — зараз і завжди"
standard_ref: "\xA74.3.1 — motion verb pairs: іти\u2013ходити, їхати\u2013їздити, летіти\u2013літати"
textbook_ref: "Grade 4 — determinate vs indeterminate motion verbs"
teaching_notes: |
  Означені (один напрямок, зараз): іти, їхати, летіти, нести, везти, бігти.
  Неозначені (звичка, багато напрямків): ходити, їздити, літати, носити, возити, бігати.
  Ключовий контраст: «зараз» vs «завжди/часто» — визначає вибір дієслова.
  Не використовуйте терміни «означений/неозначений» — кажіть «зараз, один раз» і «завжди, часто».
  Навчайте через конкретні сцени: «Зараз я іду в школу» vs «Я ходжу в школу щодня».

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Зараз, один напрямок \u2192 означене дієслово (іти). Завжди, багато разів \u2192 неозначене (ходити)."
  examples:
    - "Я іду в школу зараз. (один напрямок, зараз)"
    - "Я ходжу в школу щодня. (звичка)"
    - "Він їде до Києва. (зараз, один раз)"
    - "Він їздить до Києва часто. (звичка)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Пари дієслів руху"
    columns: ["Зараз (означене)", "Завжди (неозначене)", "Значення"]
    rows:
      - ["іти", "ходити", "іти пішки"]
      - ["їхати", "їздити", "їхати транспортом"]
      - ["летіти", "літати", "летіти"]
      - ["нести", "носити", "нести (пішки)"]
      - ["везти", "возити", "везти (транспортом)"]
      - ["бігти", "бігати", "бігти"]

  - title: "Відмінювання: іти / ходити"
    columns: ["Особа", "іти (зараз)", "ходити (завжди)"]
    rows:
      - ["я", "іду", "ходжу"]
      - ["ти", "ідеш", "ходиш"]
      - ["він/вона", "іде", "ходить"]
      - ["ми", "ідемо", "ходимо"]
      - ["ви", "ідете", "ходите"]
      - ["вони", "ідуть", "ходять"]

  - title: "Відмінювання: їхати / їздити"
    columns: ["Особа", "їхати (зараз)", "їздити (завжди)"]
    rows:
      - ["я", "їду", "їжджу"]
      - ["ти", "їдеш", "їздиш"]
      - ["він/вона", "їде", "їздить"]
      - ["ми", "їдемо", "їздимо"]
      - ["ви", "їдете", "їздите"]
      - ["вони", "їдуть", "їздять"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Дієслова руху (пари)"
    items:
      - word: "іти / ходити"
        emoji: "\U0001F6B6"
        sentence: "Зараз я іду в магазин. Я ходжу туди щотижня."
      - word: "їхати / їздити"
        emoji: "\U0001F697"
        sentence: "Він їде до Львова. Він їздить туди часто."
      - word: "летіти / літати"
        emoji: "\U00002708"
        sentence: "Літак летить до Парижа. Ця авіакомпанія літає туди щодня."
      - word: "нести / носити"
        emoji: "\U0001F4E6"
        sentence: "Він несе сумку. Він завжди носить рюкзак."
      - word: "везти / возити"
        emoji: "\U0001F69A"
        sentence: "Машина везе товар. Ця компанія возить товари щодня."
      - word: "бігти / бігати"
        emoji: "\U0001F3C3"
        sentence: "Дитина біжить до мами. Він бігає щоранку."

  - category: "Опорні слова (час)"
    items:
      - word: "зараз"
        emoji: "\U000023F0"
        sentence: "Зараз я іду на роботу."
      - word: "щодня"
        emoji: "\U0001F4C5"
        sentence: "Я ходжу на роботу щодня."
      - word: "часто"
        emoji: "\U0001F503"
        sentence: "Ми часто їздимо до бабусі."
      - word: "зазвичай"
        emoji: "\U0001F504"
        sentence: "Зазвичай вона ходить пішки."
      - word: "іноді"
        emoji: "\U0001F914"
        sentence: "Іноді він їздить велосипедом."
      - word: "щотижня"
        emoji: "\U0001F4C6"
        sentence: "Вони їздять на дачу щотижня."

  - category: "Напрямки"
    items:
      - word: "до"
        emoji: "\U000027A1"
        sentence: "Він іде до школи."
      - word: "в / у"
        emoji: "\U0001F3E2"
        sentence: "Вона йде в магазин."
      - word: "на"
        emoji: "\U0001F4CD"
        sentence: "Ми їдемо на вокзал."
      - word: "додому"
        emoji: "\U0001F3E0"
        sentence: "Діти йдуть додому."
      - word: "звідти"
        emoji: "\U00002B05"
        sentence: "Вони їдуть звідти."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Зараз чи завжди?"
    instruction: "Розподіли речення: зараз (один раз) чи завжди (звичка)"
    categories:
      - label: "Зараз (один напрямок)"
        items:
          - "Я іду в школу."
          - "Він їде до Києва."
          - "Літак летить до Лондона."
          - "Вона несе сумку."
          - "Дитина біжить до мами."
          - "Автобус везе людей."
      - label: "Завжди (звичка)"
        items:
          - "Я ходжу в школу щодня."
          - "Він їздить до Києва часто."
          - "Ця компанія літає до Лондона."
          - "Вона завжди носить рюкзак."
          - "Він бігає щоранку."
          - "Ця фірма возить товари."

  - type: pattern_drill
    title: "Обери дієслово"
    prompt: "Обери правильне дієслово для контексту"
    items:
      - given: "Я ___ в школу зараз. (іти/ходити)"
        answer: "іду"
      - given: "Я ___ в школу щодня. (іти/ходити)"
        answer: "ходжу"
      - given: "Він ___ до Києва зараз. (їхати/їздити)"
        answer: "їде"
      - given: "Він ___ до Києва часто. (їхати/їздити)"
        answer: "їздить"
      - given: "Літак ___ до Парижа зараз. (летіти/літати)"
        answer: "летить"
      - given: "Ця авіакомпанія ___ до Парижа. (летіти/літати)"
        answer: "літає"
      - given: "Він ___ важку сумку зараз. (нести/носити)"
        answer: "несе"
      - given: "Він завжди ___ рюкзак. (нести/носити)"
        answer: "носить"

  - type: build_sentence
    title: "Зараз vs зазвичай"
    instruction: "Склади два речення: одне — зараз, друге — зазвичай"
    sentences:
      - words: ["Зараз", "я", "[іду/ходжу]", "в", "парк", "."]
        correct: "Зараз я іду в парк."
      - words: ["Зазвичай", "я", "[іду/ходжу]", "в", "парк", "."]
        correct: "Зазвичай я ходжу в парк."
      - words: ["Він", "зараз", "[їде/їздить]", "до", "Львова", "."]
        correct: "Він зараз їде до Львова."
      - words: ["Він", "часто", "[їде/їздить]", "до", "Львова", "."]
        correct: "Він часто їздить до Львова."

  - type: true_false
    title: "Правильно чи ні?"
    items:
      - statement: "«Я ходжу в магазин» — це зараз, один раз."
        answer: false
        correction: "«Ходжу» — це звичка. Зараз буде: «Я іду в магазин»."
      - statement: "«Він їде до Києва» — це один напрямок, зараз."
        answer: true
      - statement: "«Літати» і «летіти» — це пара дієслів руху."
        answer: true
      - statement: "«Носити» означає нести щось зараз."
        answer: false
        correction: "«Носити» — це звичка. Зараз — «нести»."
      - statement: "«Бігати» і «бігти» — це синоніми."
        answer: false
        correction: "«Бігти» — зараз, «бігати» — регулярно."

  - type: pattern_drill
    title: "Пари: означене \u2194 неозначене"
    prompt: "Назви пару дієслова"
    items:
      - given: "іти \u2192 (завжди)"
        answer: "ходити"
      - given: "ходити \u2192 (зараз)"
        answer: "іти"
      - given: "їхати \u2192 (завжди)"
        answer: "їздити"
      - given: "їздити \u2192 (зараз)"
        answer: "їхати"
      - given: "летіти \u2192 (завжди)"
        answer: "літати"
      - given: "носити \u2192 (зараз)"
        answer: "нести"
      - given: "бігти \u2192 (завжди)"
        answer: "бігати"
      - given: "возити \u2192 (зараз)"
        answer: "везти"

  - type: reading
    title: "Читання: Подорож до бабусі"
    text: |
      Ми часто їздимо до бабусі у село. Зазвичай їдемо автобусом, але іноді тато везе нас машиною. Сьогодні ми їдемо потягом — це перший раз! На вокзалі я несу свою сумку, а тато несе великий рюкзак. Мама зазвичай носить маленьку валізу. Поїзд їде швидко. Ми дивимося у вікно: птахи літають над полем. Один великий птах летить поруч із поїздом. Нарешті ми приїхали. Бабуся вже ходить по двору і чекає на нас.
    questions:
      - question: "Як зазвичай вони їздять до бабусі?"
        answer: "Автобусом."
      - question: "Чим вони їдуть сьогодні?"
        answer: "Потягом."
      - question: "Що несе тато?"
        answer: "Великий рюкзак."
      - question: "Що роблять птахи?"
        answer: "Літають над полем."

  - type: proverb_drill
    title: "Прислів'я"
    items:
      - proverb: "Любиш кататися — люби й на гору ___."
        answer: "підійматися"
