module: davalnyi-praktyka
track: l2-uk-direct
level: a2
type: practice
title: "Давальний: практика"
subtitle: "Змішані вправи — давальний і родовий у контрасті"
standard_ref: "§4.2.3.3 — all dative uses"
textbook_ref: "Grade 4 — dative consolidation, genitive-dative contrast"
teaching_notes: |
  Головна мета — контраст родового і давального: КОГО/ЧОГО (Р.в.) vs КОМУ/ЧОМУ (Д.в.).
  Книга брата (Р.в. — чия?) vs Дати книгу братові (Д.в. — кому?).
  Учень повинен розрізняти два відмінки за запитанням і значенням.
  Дієслівне керування: які дієслова вимагають давального (дати, допомогти, сказати, подзвонити)?
  Прислів'я та практичні ситуації для закріплення.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Родовий (КОГО? ЧОГО?) — належність, відсутність. Давальний (КОМУ? ЧОМУ?) — давання, адресат."
  examples:
    - "Книга брата. (Р.в. — чия?)"
    - "Дати книгу братові. (Д.в. — кому?)"
    - "Немає вчителя. (Р.в.) vs Пояснити вчителеві. (Д.в.)"

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Дієслова з давальним"
    items:
      - word: "дати"
        emoji: "\U0001F91D"
        sentence: "Дай мені склянку води."
      - word: "допомогти"
        emoji: "\U0001F4AA"
        sentence: "Допоможи сестрі з уроками."
      - word: "сказати"
        emoji: "\U0001F5E3"
        sentence: "Скажи вчителеві правду."
      - word: "подзвонити"
        emoji: "\U0001F4DE"
        sentence: "Подзвони бабусі ввечері."
      - word: "написати"
        emoji: "\U0000270D"
        sentence: "Напиши другові листа."
      - word: "показати"
        emoji: "\U0001F449"
        sentence: "Покажи мамі фото."
      - word: "пояснити"
        emoji: "\U0001F4AC"
        sentence: "Поясни студентові завдання."

  - category: "Контрастна лексика"
    items:
      - word: "брат"
        emoji: "\U0001F466"
        sentence: "Книга брата (Р.в.). Дай братові (Д.в.)."
      - word: "мама"
        emoji: "\U0001F469"
        sentence: "Подарунок для мами (Р.в.). Подарувати мамі (Д.в.)."
      - word: "учитель"
        emoji: "\U0001F468"
        sentence: "Немає вчителя (Р.в.). Відповісти вчителеві (Д.в.)."
      - word: "подруга"
        emoji: "\U0001F469"
        sentence: "Лист від подруги (Р.в.). Написати подрузі (Д.в.)."
      - word: "батько"
        emoji: "\U0001F468"
        sentence: "Машина батька (Р.в.). Допомогти батькові (Д.в.)."

  - category: "Ринок і магазин"
    items:
      - word: "продавець"
        emoji: "\U0001F6D2"
        sentence: "Скажіть продавцеві, що мені потрібно."
      - word: "покупець"
        emoji: "\U0001F6CD"
        sentence: "Дайте покупцеві чек."
      - word: "касир"
        emoji: "\U0001F4B3"
        sentence: "Заплатіть касирові."
      - word: "сусід"
        emoji: "\U0001F3E0"
        sentence: "Передайте сусідові пакунок."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Родовий чи давальний?"
    instruction: "Розподіли: КОГО? ЧОГО? (родовий) чи КОМУ? ЧОМУ? (давальний)"
    categories:
      - label: "Родовий (КОГО? ЧОГО?)"
        items:
          - "книга брата"
          - "немає вчителя"
          - "від подруги"
          - "для мами"
          - "після обіду"
          - "без цукру"
          - "п'ять учнів"
          - "немає часу"
      - label: "Давальний (КОМУ? ЧОМУ?)"
        items:
          - "дати братові"
          - "сказати вчителеві"
          - "написати подрузі"
          - "подарувати мамі"
          - "мені холодно"
          - "допомогти другові"
          - "їй подобається"
          - "йому двадцять"

  - type: pattern_drill
    title: "Контрастні пари"
    prompt: "Утвори і родовий, і давальний"
    items:
      - given: "брат → книга... (Р.в.)"
        answer: "брата"
      - given: "брат → дати... (Д.в.)"
        answer: "братові"
      - given: "мама → для... (Р.в.)"
        answer: "мами"
      - given: "мама → подарувати... (Д.в.)"
        answer: "мамі"
      - given: "учитель → немає... (Р.в.)"
        answer: "вчителя"
      - given: "учитель → пояснити... (Д.в.)"
        answer: "вчителеві"
      - given: "сестра → кімната... (Р.в.)"
        answer: "сестри"
      - given: "сестра → допомогти... (Д.в.)"
        answer: "сестрі"
      - given: "батько → машина... (Р.в.)"
        answer: "батька"
      - given: "батько → показати... (Д.в.)"
        answer: "батькові"
      - given: "подруга → від... (Р.в.)"
        answer: "подруги"
      - given: "подруга → написати... (Д.в.)"
        answer: "подрузі"

  - type: build_sentence
    title: "Складні речення"
    instruction: "Склади речення з родовим І давальним"
    sentences:
      - words: ["Я", "купив", "подарунок", "для", "[мама-Р.в./мами]", "і", "подарував", "[мама-Д.в./мамі]", "."]
        correct: "Я купив подарунок для мами і подарував мамі."
      - words: ["Це", "книга", "[брат-Р.в./брата]", ".", "Я", "дам", "її", "[сестра-Д.в./сестрі]", "."]
        correct: "Це книга брата. Я дам її сестрі."
      - words: ["Немає", "[учитель-Р.в./вчителя]", ".", "Скажи", "[директор-Д.в./директорові]", "."]
        correct: "Немає вчителя. Скажи директорові."
      - words: ["Після", "[обід-Р.в./обіду]", "подзвони", "[бабуся-Д.в./бабусі]", "."]
        correct: "Після обіду подзвони бабусі."

  - type: reading
    title: "Читання: На ринку"
    text: |
      Олена прийшла на ринок. Їй потрібно купити продукти для сім'ї. Вона купила два кілограми яблук для дітей. Потім вона дала гроші продавцеві і взяла сир. «Дайте мені, будь ласка, ще хліба», — сказала вона касирові. Після ринку Олена подзвонила мамі: «Мамо, я купила все! Їду до тебе». Мамі було приємно.
    questions:
      - question: "Для кого Олена купила яблука?"
        answer: "Для дітей."
      - question: "Кому вона дала гроші?"
        answer: "Продавцеві."
      - question: "Кому Олена подзвонила?"
        answer: "Мамі."
      - question: "Як почувалася мама?"
        answer: "Мамі було приємно."

  - type: proverb_drill
    title: "Прислів'я"
    proverb: "Друзі пізнаються в біді."
    source: "Grade 3"
    explanation: "Кому пізнаються? Друзям (давальний множини від «друзі»)."

  - type: pattern_drill
    title: "Яке дієслово вимагає давального?"
    prompt: "Утвори речення з давальним відмінком"
    items:
      - given: "дати + сестра"
        answer: "дати сестрі"
      - given: "допомогти + друг"
        answer: "допомогти другові"
      - given: "сказати + мама"
        answer: "сказати мамі"
      - given: "подзвонити + бабуся"
        answer: "подзвонити бабусі"
      - given: "показати + батько"
        answer: "показати батькові"
      - given: "пояснити + учень"
        answer: "пояснити учневі"
      - given: "написати + подруга"
        answer: "написати подрузі"
      - given: "відповісти + учитель"
        answer: "відповісти вчителеві"

  - type: riddle
    title: "Загадка"
    clues:
      - "Не їсть, не п'є,"
      - "а ходить і молоточком б'є."
    answer: "годинник"
    source: "Grade 5 Avramenko p.27"
