module: checkpoint-padezhi-1
track: l2-uk-direct
level: a2
type: checkpoint
title: "Контрольна точка: усі 7 відмінків"
subtitle: "Перевірка Н+Р+Д+Зн+О+М+Кл — модулі A1\u2013A2"
standard_ref: "Усі \xA7\xA7 відмінків (A1 + A2)"
textbook_ref: "Grade 3\u20134 — повторення всіх відмінків"
teaching_notes: |
  Консолідація всіх 7 відмінків: Н+Зн+М+Кл з A1, Р+Д+О з A2.
  Мнемоніка: «Нашого Ромчика Дивує Зебра — Оця Маленька Красуня» (Н-Р-Д-З-О-М-К).
  Нової граматики немає — фокус на впізнаванні відмінка за питанням і прийменником.
  Поріг проходження: 70%. Використовуйте результати як діагностику слабких місць.

# ─────────────────────────────────────────────
# ASSESSMENT SCOPE
# ─────────────────────────────────────────────
assessment_scope:
  - skill: "Називний відмінок"
    question: "ХТО? ЩО?"
    key_prepositions: "—"
  - skill: "Родовий відмінок"
    question: "КОГО? ЧОГО?"
    key_prepositions: "від, до, з, без, для, після, біля"
  - skill: "Давальний відмінок"
    question: "КОМУ? ЧОМУ?"
    key_prepositions: "—"
  - skill: "Знахідний відмінок"
    question: "КОГО? ЩО?"
    key_prepositions: "в/у, на, за, через, про"
  - skill: "Орудний відмінок"
    question: "КИМ? ЧИМ?"
    key_prepositions: "з, за, між, над, під, перед"
  - skill: "Місцевий відмінок"
    question: "НА КОМУ? НА ЧОМУ?"
    key_prepositions: "в/у, на, при, по"
  - skill: "Кличний відмінок"
    question: "—"
    key_prepositions: "—"

case_mnemonic: "Нашого Ромчика Дивує Зебра — Оця Маленька Красуня (Н-Р-Д-З-О-М-К)"

pass_threshold: 70

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Називний відмінок (ХТО? ЩО?)"
    prompt: "Визнач форму називного відмінка"
    items:
      - given: "Хто це? (учитель)"
        answer: "учитель"
      - given: "Що це? (книга)"
        answer: "книга"
      - given: "Хто прийшов? (мама)"
        answer: "мама"

  - type: pattern_drill
    title: "Родовий відмінок (КОГО? ЧОГО?)"
    prompt: "Постав у родовий відмінок"
    items:
      - given: "без (молоко)"
        answer: "без молока"
      - given: "для (мама)"
        answer: "для мами"
      - given: "від (будинок)"
        answer: "від будинку"
      - given: "після (урок)"
        answer: "після уроку"
      - given: "біля (школа)"
        answer: "біля школи"

  - type: pattern_drill
    title: "Давальний відмінок (КОМУ? ЧОМУ?)"
    prompt: "Постав у давальний відмінок"
    items:
      - given: "дати (мама)"
        answer: "мамі"
      - given: "сказати (друг)"
        answer: "другові / другу"
      - given: "допомогти (сестра)"
        answer: "сестрі"

  - type: pattern_drill
    title: "Знахідний відмінок (КОГО? ЩО?)"
    prompt: "Постав у знахідний відмінок"
    items:
      - given: "бачити (книга)"
        answer: "книгу"
      - given: "любити (мама)"
        answer: "маму"
      - given: "читати (газета)"
        answer: "газету"

  - type: pattern_drill
    title: "Орудний відмінок (КИМ? ЧИМ?)"
    prompt: "Постав в орудний відмінок"
    items:
      - given: "з (друг)"
        answer: "з другом"
      - given: "під (стіл)"
        answer: "під столом"
      - given: "з (подруга)"
        answer: "з подругою"

  - type: pattern_drill
    title: "Місцевий відмінок (НА ЧОМУ? В ЧОМУ?)"
    prompt: "Постав у місцевий відмінок"
    items:
      - given: "в (школа)"
        answer: "у школі"
      - given: "на (стіл)"
        answer: "на столі"
      - given: "у (місто)"
        answer: "у місті"

  - type: pattern_drill
    title: "Кличний відмінок (звертання)"
    prompt: "Утвори кличний відмінок"
    items:
      - given: "Тарас"
        answer: "Тарасе!"
      - given: "мама"
        answer: "мамо!"
      - given: "Оля"
        answer: "Олю!"

  - type: classify
    title: "Який це відмінок? (1)"
    instruction: "Визнач відмінок виділеного слова"
    categories:
      - label: "Називний"
        items:
          - "Мама готує обід."
          - "Книга лежить на столі."
      - label: "Знахідний"
        items:
          - "Я читаю книгу."
          - "Він бачить маму."
      - label: "Родовий"
        items:
          - "Я іду без парасольки."
          - "Це книга мами."

  - type: classify
    title: "Який це відмінок? (2)"
    instruction: "Визнач відмінок виділеного слова"
    categories:
      - label: "Давальний"
        items:
          - "Дай книгу мамі."
          - "Скажи це другові."
      - label: "Орудний"
        items:
          - "Кіт під столом."
          - "Я гуляю з другом."
      - label: "Місцевий"
        items:
          - "Книга на столі."
          - "Він живе у Львові."

  - type: classify
    title: "Який це відмінок? (3)"
    instruction: "Визнач відмінок за питанням і прийменником"
    categories:
      - label: "Родовий (від, до, без, для)"
        items:
          - "від будинку"
          - "для мами"
          - "без молока"
      - label: "Знахідний (в, на, за, через, про)"
        items:
          - "про маму"
          - "через дорогу"
          - "на урок"
      - label: "Орудний (з, за, між, над, під)"
        items:
          - "з другом"
          - "під столом"
          - "між деревами"

  - type: build_sentence
    title: "Склади речення (1)"
    instruction: "Обери правильну форму іменника"
    sentences:
      - words: ["Я", "даю", "квітку", "[мама/мамі]", "."]
        correct: "Я даю квітку мамі."
      - words: ["Він", "іде", "без", "[парасолька/парасольки]", "."]
        correct: "Він іде без парасольки."
      - words: ["Кіт", "спить", "під", "[стілець/стільцем]", "."]
        correct: "Кіт спить під стільцем."
      - words: ["Ми", "живемо", "у", "[Київ/Києві]", "."]
        correct: "Ми живемо у Києві."

  - type: build_sentence
    title: "Склади речення (2)"
    instruction: "Обери правильну форму"
    sentences:
      - words: ["Я", "бачу", "[дерево/деревом]", "."]
        correct: "Я бачу дерево."
      - words: ["Книга", "лежить", "на", "[стіл/столі]", "."]
        correct: "Книга лежить на столі."
      - words: ["Він", "гуляє", "з", "[вона/нею]", "."]
        correct: "Він гуляє з нею."
      - words: ["[Тарас/Тарасе]", ",", "іди", "сюди", "!"]
        correct: "Тарасе, іди сюди!"

  - type: build_sentence
    title: "Склади речення (3)"
    instruction: "Обери правильну форму"
    sentences:
      - words: ["Це", "подарунок", "для", "[сестра/сестри]", "."]
        correct: "Це подарунок для сестри."
      - words: ["Лампа", "висить", "над", "[стіл/столом]", "."]
        correct: "Лампа висить над столом."
      - words: ["Він", "іде", "на", "[урок/уроці]", "."]
        correct: "Він іде на урок."
      - words: ["Вона", "допомагає", "[брат/братові]", "."]
        correct: "Вона допомагає братові."

  - type: reading
    title: "Читання: Один день"
    text: |
      Вранці Оля прокидається і йде до школи. У школі вона сідає за парту. Учителька дає їй зошит. Після уроку Оля гуляє з подругою в парку. Вони сідають на лавці під деревом. Оля купує каву без цукру. Потім вона повертається додому і говорить мамі: «Мамо, я вдома!»
    questions:
      - question: "Куди йде Оля вранці?"
        answer: "До школи."
      - question: "Що дає їй учителька?"
        answer: "Зошит."
      - question: "З ким Оля гуляє після уроку?"
        answer: "З подругою."
      - question: "Яку каву вона купує?"
        answer: "Каву без цукру."

  - type: reading
    title: "Читання: У місті"
    text: |
      Тарас живе у Києві. Він працює в офісі біля парку. Щодня він іде від будинку до роботи пішки. По дорозі він проходить між магазином і аптекою. На роботі Тарас розмовляє з колегами. Після роботи він зустрічається з другом. Вони сідають у кав'ярні на вулиці. Тарас замовляє каву з молоком.
    questions:
      - question: "Де живе Тарас?"
        answer: "У Києві."
      - question: "Де знаходиться його офіс?"
        answer: "Біля парку."
      - question: "З ким він зустрічається після роботи?"
        answer: "З другом."
      - question: "Що замовляє Тарас?"
        answer: "Каву з молоком."

  - type: true_false
    title: "Правда чи неправда? (відмінки)"
    items:
      - statement: "Називний відмінок відповідає на питання КОМУ?"
        answer: false
        correction: "Називний — ХТО? ЩО? Давальний — КОМУ?"
      - statement: "Після прийменника «без» вживається родовий відмінок."
        answer: true
      - statement: "Орудний відмінок відповідає на питання КИМ? ЧИМ?"
        answer: true
      - statement: "Прийменник «під» вживається зі знахідним відмінком."
        answer: false
        correction: "Прийменник «під» (де?) вживається з орудним відмінком."
      - statement: "Кличний відмінок використовується для звертання."
        answer: true
      - statement: "Прийменник «для» вживається з давальним відмінком."
        answer: false
        correction: "Прийменник «для» вживається з родовим відмінком."
