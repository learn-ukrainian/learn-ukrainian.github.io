module: stylistics-osnovy
track: l2-uk-direct
level: a2
type: vocabulary
title: "Основи стилістики"
subtitle: "Синоніми, антоніми, епітети, метафори, регістр мовлення"
standard_ref: "§4.5 — стилістика: антоніми, синоніми, епітети, метафори, регістр"
textbook_ref: "Grade 3-4 (синоніми, антоніми, художні засоби)"
teaching_notes: |
  Три напрямки: синоніми (друг/приятель/товариш), антоніми (великий/малий), художні засоби.
  Синоніми мають різні відтінки значення — не просто «те саме слово».
  Антоніми — пари протилежних значень. Дуже зручні для вправ.
  Метафори й епітети — на рівні розпізнавання, не створення.
  Регістр: формальне (Шановний пане) vs розмовне (Привіт). Коли що використовувати.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Синоніми — схожі за значенням. Антоніми — протилежні за значенням. Метафора — переносне значення."
  examples:
    - "Синоніми: сміливий = хоробрий = відважний"
    - "Антоніми: великий ≠ малий"
    - "Метафора: золоте серце (= добра людина)"

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Синоніми (дружба)"
    items:
      - word: "друг"
        emoji: "\U0001F91D"
        sentence: "Мій друг завжди допомагає мені."
      - word: "приятель"
        emoji: "\U0001F464"
        sentence: "Він мій приятель — ми разом працюємо."
      - word: "товариш"
        emoji: "\U0001F465"
        sentence: "Це мій шкільний товариш."

  - category: "Синоніми (розмір і сила)"
    items:
      - word: "великий"
        emoji: "\U0001F4CF"
        sentence: "Це великий будинок."
      - word: "величезний"
        emoji: "\U0001F3D4\uFE0F"
        sentence: "Це величезний стадіон."
      - word: "сміливий"
        emoji: "\U0001F9B8"
        sentence: "Сміливий хлопчик не боїться темряви."
      - word: "хоробрий"
        emoji: "\u2694\uFE0F"
        sentence: "Хоробрий воїн захищає місто."
      - word: "відважний"
        emoji: "\U0001F9D1\u200D\U0001F692"
        sentence: "Відважний рятівник витягнув дитину."

  - category: "Антоніми"
    items:
      - word: "далекий"
        emoji: "\U0001F30D"
        sentence: "Далекий край — моя мрія."
      - word: "близький"
        emoji: "\U0001F4CD"
        sentence: "Близький друг — це скарб."
      - word: "гарячий"
        emoji: "\U0001F525"
        sentence: "Обережно — чай гарячий!"
      - word: "холодний"
        emoji: "\u2744\uFE0F"
        sentence: "Вода дуже холодна."
      - word: "молодий"
        emoji: "\U0001F9D1"
        sentence: "Молодий дуб росте біля школи."
      - word: "старий"
        emoji: "\U0001F333"
        sentence: "Старий дуб стоїть уже сто років."

  - category: "Епітети й метафори"
    items:
      - word: "золотий"
        emoji: "\U0001F31F"
        sentence: "У неї золоте серце — вона дуже добра."
      - word: "лазуровий"
        emoji: "\U0001F30A"
        sentence: "Над нами лазурове небо."
      - word: "море"
        emoji: "\U0001F490"
        sentence: "У саду — море квітів."
      - word: "кришталевий"
        emoji: "\U0001F4A7"
        sentence: "Кришталева вода тече з гір."

  - category: "Регістр мовлення"
    items:
      - word: "шановний"
        emoji: "\U0001F3A9"
        sentence: "Шановний колего, запрошую Вас."
      - word: "пан"
        emoji: "\U0001F935"
        sentence: "Пане директоре, дозвольте запитати."
      - word: "вітаю"
        emoji: "\U0001F44B"
        sentence: "Вітаю! Як Ваші справи?"
      - word: "бувай"
        emoji: "\u270B"
        sentence: "Ну, бувай! До зустрічі!"

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Синоніми чи антоніми?"
    instruction: "Розподіли пари слів: синоніми чи антоніми?"
    categories:
      - label: "Синоніми"
        items:
          - "друг — приятель"
          - "великий — величезний"
          - "сміливий — хоробрий"
          - "гарний — красивий"
          - "швидко — хутко"
      - label: "Антоніми"
        items:
          - "великий — малий"
          - "далекий — близький"
          - "гарячий — холодний"
          - "молодий — старий"
          - "швидко — повільно"

  - type: pattern_drill
    title: "Знайди синонім"
    prompt: "Добери синонім до слова"
    items:
      - given: "сміливий = ?"
        answer: "хоробрий"
      - given: "друг = ?"
        answer: "приятель"
      - given: "великий = ?"
        answer: "величезний"
      - given: "гарний = ?"
        answer: "красивий"
      - given: "говорити = ?"
        answer: "казати"
      - given: "дім = ?"
        answer: "хата"
      - given: "швидко = ?"
        answer: "хутко"

  - type: pattern_drill
    title: "Знайди антонім"
    prompt: "Добери антонім (протилежне значення)"
    items:
      - given: "великий ≠ ?"
        answer: "малий"
      - given: "далекий ≠ ?"
        answer: "близький"
      - given: "гарячий ≠ ?"
        answer: "холодний"
      - given: "молодий ≠ ?"
        answer: "старий"
      - given: "швидко ≠ ?"
        answer: "повільно"
      - given: "добре ≠ ?"
        answer: "погано"
      - given: "багато ≠ ?"
        answer: "мало"
      - given: "день ≠ ?"
        answer: "ніч"

  - type: classify
    title: "Формальне чи розмовне?"
    instruction: "Розподіли вирази за регістром"
    categories:
      - label: "Формальне"
        items:
          - "Шановний пане Іване!"
          - "Дозвольте запитати."
          - "З повагою, Оксана."
          - "Прошу Вас повідомити."
          - "Щиро вдячний."
      - label: "Розмовне"
        items:
          - "Привіт!"
          - "Як справи?"
          - "Пока!"
          - "Круто!"
          - "Бувай!"

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "«Золоте серце» — це про золото."
        answer: false
        correction: "Це метафора — означає «добра, щедра людина»."
      - statement: "«Друг» і «приятель» — синоніми."
        answer: true
      - statement: "«Великий» і «малий» — синоніми."
        answer: false
        correction: "Це антоніми (протилежні значення)."
      - statement: "«Лазурове небо» — це епітет."
        answer: true
      - statement: "«Море квітів» — це пряме значення."
        answer: false
        correction: "Це метафора — квіток дуже багато."
      - statement: "«Пане директоре» — розмовне звертання."
        answer: false
        correction: "Це формальне звертання."

  - type: reading
    title: "Читання: Знайди художні засоби"
    text: |
      Золота осінь прийшла в наше місто. Море жовтого листя вкрило парки. Старий дуб стоїть, як мудрий дідусь, і дивиться на молоді деревця. Кришталеве повітря пахне яблуками. Сонце лагідно усміхається з лазурового неба. Маленькі діти збирають величезні букети з різнокольорового листя.
    questions:
      - question: "Знайди метафору з першого речення."
        answer: "«Золота осінь» — метафора (осінь не з золота, а гарна і жовта)."
      - question: "Що означає «море листя»?"
        answer: "Метафора — дуже багато листя."
      - question: "Знайди пару антонімів у тексті."
        answer: "Старий дуб — молоді деревця."
      - question: "Знайди епітет до слова «повітря»."
        answer: "Кришталеве повітря."
