module: zvorotni-zaimennyky
track: l2-uk-direct
level: a2
type: grammar
title: "Зворотні та відносні займенники"
subtitle: "Займенник себе, питально-відносні хто/що/який/чий/котрий"
standard_ref: "§4.2.1.4 — зворотні, питально-відносні займенники"
textbook_ref: "Grade 4 — зворотний займенник себе, відносні займенники"
teaching_notes: |
  Зворотний займенник «себе» не має називного відмінка — це ключова особливість.
  «Себе» вказує на підмет: «Він бачить себе» = він бачить самого себе (не когось іншого).
  Питально-відносні: «хто, що» — для запитань; «який, яка, яке, які» — для опису і підрядних речень.
  Підрядні речення з «який/яка/яке» — дуже поширена конструкція, яку варто відпрацювати.
  «Котрий» — книжна форма «який», зустрічається рідше, але треба знати.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Себе — зворотний займенник без називного. Який/яка/яке — для підрядних речень."
  examples:
    - "Я бачу себе в дзеркалі."
    - "Людина, яка тут живе, дуже привітна."
    - "Це книга, яку я читаю."

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Зворотний займенник себе"
    columns: ["Відмінок", "Форма", "Приклад"]
    rows:
      - ["Н.в.", "—", "(не існує)"]
      - ["Р.в.", "себе", "Він купив для себе."]
      - ["Д.в.", "собі", "Вона сказала собі."]
      - ["Зн.в.", "себе", "Я бачу себе в дзеркалі."]
      - ["О.в.", "собою", "Він задоволений собою."]
      - ["М.в.", "на собі", "Вона має на собі пальто."]

  - title: "Відносний займенник який"
    columns: ["Відмінок", "Чоловічий", "Жіночий", "Середній", "Множина"]
    rows:
      - ["Н.в.", "який", "яка", "яке", "які"]
      - ["Р.в.", "якого", "якої", "якого", "яких"]
      - ["Д.в.", "якому", "якій", "якому", "яким"]
      - ["Зн.в.", "який/якого", "яку", "яке", "які/яких"]
      - ["О.в.", "яким", "якою", "яким", "якими"]
      - ["М.в.", "на якому", "на якій", "на якому", "на яких"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Зворотні конструкції"
    items:
      - word: "себе"
        emoji: "\U0001FA9E"
        sentence: "Я бачу себе в дзеркалі."
      - word: "собі"
        emoji: "\U0001F4AD"
        sentence: "Вона купила собі каву."
      - word: "собою"
        emoji: "\U0001F60C"
        sentence: "Він задоволений собою."
      - word: "на собі"
        emoji: "\U0001F45A"
        sentence: "У неї на собі нова сукня."
      - word: "для себе"
        emoji: "\U0001F381"
        sentence: "Я зробив це для себе."

  - category: "Питально-відносні займенники"
    items:
      - word: "хто"
        emoji: "\U00002753"
        sentence: "Хто це зробив?"
      - word: "що"
        emoji: "\U00002753"
        sentence: "Що ти хочеш?"
      - word: "який"
        emoji: "\U0001F50D"
        sentence: "Який фільм ти дивився?"
      - word: "яка"
        emoji: "\U0001F50D"
        sentence: "Яка книга тобі сподобалась?"
      - word: "яке"
        emoji: "\U0001F50D"
        sentence: "Яке це місто?"
      - word: "чий"
        emoji: "\U0001F3E0"
        sentence: "Чий це дім?"
      - word: "котрий"
        emoji: "\U0001F522"
        sentence: "Котрий це поверх?"

  - category: "Дієслова з «себе»"
    items:
      - word: "поважати"
        emoji: "\U0001F64C"
        sentence: "Треба поважати себе."
      - word: "контролювати"
        emoji: "\U0001F9D8"
        sentence: "Він не може контролювати себе."
      - word: "почувати"
        emoji: "\U0001F60A"
        sentence: "Як ви себе почуваєте?"
      - word: "уявляти"
        emoji: "\U0001F4AD"
        sentence: "Уяви собі велике море."
      - word: "брати (з собою)"
        emoji: "\U0001F392"
        sentence: "Візьми із собою парасолю."

  - category: "Сполучники підрядних речень"
    items:
      - word: "який/яка/яке"
        emoji: "\U0001F517"
        sentence: "Це місто, яке я люблю."
      - word: "де"
        emoji: "\U0001F4CD"
        sentence: "Це парк, де ми гуляємо."
      - word: "коли"
        emoji: "\U0001F552"
        sentence: "Я пам'ятаю день, коли ми зустрілися."
      - word: "що (сполучник)"
        emoji: "\U0001F4AC"
        sentence: "Я знаю, що ти правий."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Себе в контексті"
    prompt: "Встав правильну форму займенника «себе»"
    items:
      - given: "Він купив подарунок для ___."
        answer: "себе"
      - given: "Вона сказала ___: «Я зможу!»"
        answer: "собі"
      - given: "Я бачу ___ у дзеркалі."
        answer: "себе"
      - given: "Він задоволений ___."
        answer: "собою"
      - given: "У неї на ___ гарне пальто."
        answer: "собі"
      - given: "Візьми із ___ парасолю."
        answer: "собою"

  - type: build_sentence
    title: "Побудуй речення зі зворотним займенником"
    instruction: "Обери правильну форму"
    sentences:
      - words: ["Я", "дивлюся", "на", "[себе/собі]", "у", "дзеркалі", "."]
        correct: "Я дивлюся на себе у дзеркалі."
      - words: ["Вона", "купила", "[себе/собі]", "нову", "сукню", "."]
        correct: "Вона купила собі нову сукню."
      - words: ["Він", "пишається", "[себе/собою]", "."]
        correct: "Він пишається собою."
      - words: ["Зроби", "це", "для", "[себе/собі]", "."]
        correct: "Зроби це для себе."

  - type: classify
    title: "Узгодь який/яка/яке/які з іменником"
    instruction: "Розподіли за родом"
    categories:
      - label: "Чоловічий (ЯКИЙ)"
        items:
          - "який фільм"
          - "який будинок"
          - "який хлопець"
      - label: "Жіночий (ЯКА)"
        items:
          - "яка книга"
          - "яка вулиця"
          - "яка подруга"
      - label: "Середній (ЯКЕ)"
        items:
          - "яке місто"
          - "яке питання"
          - "яке завдання"
      - label: "Множина (ЯКІ)"
        items:
          - "які люди"
          - "які книги"
          - "які вікна"

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "Займенник «себе» має називний відмінок."
        answer: false
        correction: "«Себе» не має називного відмінка — він починається з родового."
      - statement: "«Людина, яка тут живе» — правильне речення."
        answer: true
      - statement: "«Він задоволений себе» — правильна форма."
        answer: false
        correction: "Правильно: задоволений собою (орудний відмінок)."
      - statement: "«Чий» відповідає на питання про належність."
        answer: true
      - statement: "«Котрий» — це синонім «який» (більш книжний)."
        answer: true

  - type: pattern_drill
    title: "Відносні речення"
    prompt: "Встав правильну форму відносного займенника"
    items:
      - given: "Людина, ___ тут живе, привітна. (яка/який)"
        answer: "яка"
      - given: "Це місто, ___ я люблю. (яке/якого)"
        answer: "яке"
      - given: "Книга, ___ я читаю, цікава. (яка/яку)"
        answer: "яку"
      - given: "Друзі, ___ я зустрів, веселі. (яких/які)"
        answer: "яких"
      - given: "Парк, у ___ ми гуляємо, великий. (якому/якого)"
        answer: "якому"

  - type: reading
    title: "Читання: Моє улюблене місто"
    text: |
      Це місто, яке я люблю. Тут є парк, який дуже гарний. Люди, які тут живуть, привітні. Я часто кажу собі: «Як добре жити тут!» Мій друг, який переїхав сюди два роки тому, теж задоволений собою і своїм вибором. Вулиця, на якій я живу, тиха і зелена. Я не хочу міняти це місто ні на яке інше.
    questions:
      - question: "Який парк у цьому місті?"
        answer: "Дуже гарний."
      - question: "Які люди тут живуть?"
        answer: "Привітні."
      - question: "Яка вулиця, на якій живе автор?"
        answer: "Тиха і зелена."
