module: prykmetnyk-porivniannia
track: l2-uk-direct
level: a2
type: grammar
title: "Ступені порівняння прикметників"
subtitle: "Гарніший, найгарніший — вищий і найвищий ступінь"
standard_ref: "\xA74.3.1 — comparison: солодший, найсолодший, більш/менш"
textbook_ref: "Grade 4 p.113 — adjective comparison forms"
teaching_notes: |
  Три форми: звичайний (гарний), вищий (гарніший), найвищий (найгарніший).
  Регулярне утворення: -іший/-ший (вищий), най- + вищий (найвищий).
  Нерегулярні форми обов'язкові: великий \u2192 більший, гарний \u2192 кращий, поганий \u2192 гірший.
  Конструкції порівняння: А + вищий ступінь + ніж/за/від + Б.
  Навчайте через порівняння реальних об'єктів: міста, їжа, погода.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Звичайний \u2192 вищий (-іший/-ший) \u2192 найвищий (най- + вищий). Нерегулярні: великий\u2192більший, гарний\u2192кращий."
  examples:
    - "Київ більший ніж Львів. (великий \u2192 більший)"
    - "Це найкращий фільм. (гарний \u2192 кращий \u2192 найкращий)"
    - "Зима холодніша за осінь. (холодний \u2192 холодніший)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
