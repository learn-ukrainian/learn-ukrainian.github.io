# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Утвори вищий ступінь"
    prompt: "Утвори вищий ступінь прикметника"
    items:
      - given: "холодний \u2192 ?"
        answer: "холодніший"
      - given: "теплий \u2192 ?"
        answer: "тепліший"
      - given: "цікавий \u2192 ?"
        answer: "цікавіший"
      - given: "довгий \u2192 ?"
        answer: "довший"
      - given: "швидкий \u2192 ?"
        answer: "швидший"
      - given: "великий \u2192 ?"
        answer: "більший"
      - given: "малий \u2192 ?"
        answer: "менший"
      - given: "гарний \u2192 ?"
        answer: "кращий"
      - given: "поганий \u2192 ?"
        answer: "гірший"
      - given: "високий \u2192 ?"
        answer: "вищий"
      - given: "низький \u2192 ?"
        answer: "нижчий"
      - given: "дорогий \u2192 ?"
        answer: "дорожчий"

  - type: pattern_drill
    title: "Утвори найвищий ступінь"
    prompt: "Утвори найвищий ступінь прикметника"
    items:
      - given: "холодніший \u2192 ?"
        answer: "найхолодніший"
      - given: "тепліший \u2192 ?"
        answer: "найтепліший"
      - given: "цікавіший \u2192 ?"
        answer: "найцікавіший"
      - given: "більший \u2192 ?"
        answer: "найбільший"
      - given: "менший \u2192 ?"
        answer: "найменший"
      - given: "кращий \u2192 ?"
        answer: "найкращий"
      - given: "гірший \u2192 ?"
        answer: "найгірший"
      - given: "вищий \u2192 ?"
        answer: "найвищий"
      - given: "нижчий \u2192 ?"
        answer: "найнижчий"
      - given: "швидший \u2192 ?"
        answer: "найшвидший"
      - given: "довший \u2192 ?"
        answer: "найдовший"
      - given: "дорожчий \u2192 ?"
        answer: "найдорожчий"

  - type: build_sentence
    title: "Порівняй"
    instruction: "Склади речення-порівняння"
    sentences:
      - words: ["Київ", "[більший/великий]", "ніж", "Львів", "."]
        correct: "Київ більший ніж Львів."
      - words: ["Зима", "[холодніша/холодна]", "за", "осінь", "."]
        correct: "Зима холодніша за осінь."
      - words: ["Це", "[найкращий/кращий]", "фільм", "."]
        correct: "Це найкращий фільм."
      - words: ["Потяг", "[швидший/швидкий]", "від", "автобуса", "."]
        correct: "Потяг швидший від автобуса."
      - words: ["Говерла", "—", "[найвища/вища]", "гора", "України", "."]
        correct: "Говерла — найвища гора України."
      - words: ["Ця", "книга", "[цікавіша/цікава]", "ніж", "та", "."]
        correct: "Ця книга цікавіша ніж та."

  - type: true_false
    title: "Правильно чи ні?"
    items:
      - statement: "«Найкращий» — це найвищий ступінь від «поганий»."
        answer: false
        correction: "«Найкращий» — від «гарний». Від «поганий» — «найгірший»."
      - statement: "«Більший» — це вищий ступінь від «великий»."
        answer: true
      - statement: "«Менший» — це вищий ступінь від «низький»."
        answer: false
        correction: "«Менший» — від «малий». Від «низький» — «нижчий»."
      - statement: "Після «від» вживається родовий відмінок."
        answer: true
      - statement: "«Найхолодніший» — це найвищий ступінь."
        answer: true

  - type: classify
    title: "Регулярний чи нерегулярний?"
    instruction: "Розподіли: регулярне утворення (-іший) чи нерегулярне"
    categories:
      - label: "Регулярний (-іший/-ший)"
        items:
          - "холодний \u2192 холодніший"
          - "теплий \u2192 тепліший"
          - "цікавий \u2192 цікавіший"
          - "довгий \u2192 довший"
          - "швидкий \u2192 швидший"
      - label: "Нерегулярний"
        items:
          - "великий \u2192 більший"
          - "малий \u2192 менший"
          - "гарний \u2192 кращий"
          - "поганий \u2192 гірший"
          - "високий \u2192 вищий"
          - "низький \u2192 нижчий"

  - type: reading
    title: "Читання: Два міста"
    text: |
      Київ і Львів — два найбільші міста України. Київ більший ніж Львів: у Києві живе більше трьох мільйонів людей, а у Львові — менше мільйона. Київ також старіший: йому більше тисячі років. Але Львів красивіший за Київ — кажуть багато туристів. У Львові вужчі вулиці і нижчі будинки. Кава у Львові дешевша, а погода — холодніша. Найкраща пора для подорожі до Львова — літо: тепліше і більше сонця. А Київ найкращий навесні, коли квітнуть каштани.
    questions:
      - question: "Яке місто більше?"
        answer: "Київ більший ніж Львів."
      - question: "Яке місто старіше?"
        answer: "Київ старіший."
      - question: "Де кава дешевша?"
        answer: "У Львові."
      - question: "Коли найкращий час для Львова?"
        answer: "Літо."
      - question: "Знайди три форми найвищого ступеня."
        answer: "Найбільші, найкраща (двічі), найкращий."
