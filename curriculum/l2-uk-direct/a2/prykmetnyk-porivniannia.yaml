      - ["теплий", "тепліший", "найтепліший"]
      - ["цікавий", "цікавіший", "найцікавіший"]
      - ["довгий", "довший", "найдовший"]
      - ["короткий", "коротший", "найкоротший"]
      - ["старий", "старший", "найстарший"]
      - ["молодий", "молодший", "наймолодший"]
      - ["дорогий", "дорожчий", "найдорожчий"]
      - ["дешевий", "дешевший", "найдешевший"]
      - ["швидкий", "швидший", "найшвидший"]
      - ["повільний", "повільніший", "найповільніший"]
      - ["сильний", "сильніший", "найсильніший"]

  - title: "Нерегулярні ступені порівняння"
    columns: ["Звичайний", "Вищий", "Найвищий"]
    rows:
      - ["великий", "більший", "найбільший"]
      - ["малий", "менший", "найменший"]
      - ["гарний", "кращий", "найкращий"]
      - ["поганий", "гірший", "найгірший"]
      - ["високий", "вищий", "найвищий"]
      - ["низький", "нижчий", "найнижчий"]

  - title: "Конструкції порівняння"
    columns: ["Конструкція", "Приклад"]
    rows:
      - ["А + вищий + ніж + Б", "Київ більший ніж Львів."]
      - ["А + вищий + за + Б (зн.в.)", "Київ більший за Львів."]
      - ["А + вищий + від + Б (род.в.)", "Київ більший від Львова."]

