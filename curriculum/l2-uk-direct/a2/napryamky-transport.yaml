module: napryamky-transport
track: l2-uk-direct
level: a2
type: vocabulary
title: "Напрямки і транспорт"
subtitle: "Орієнтація в місті, громадський транспорт"
standard_ref: "Каталог Б — Середовище перебування (розширення: прямо, ліворуч, праворуч)"
textbook_ref: "Grade 3–4 — місто, транспорт, напрямки"
teaching_notes: |
  Ключові напрямки: прямо, ліворуч, праворуч, назад, навпроти, за рогом.
  Дієслова руху: іти/їхати, повернути, пересісти, дістатися.
  Шаблон: «Як дістатися до [місця]?» — відповідь із наказовим способом: «Ідіть прямо, поверніть...»
  Транспорт: зупинка, маршрутка, тролейбус, трамвай, метро — з орудним відмінком (їхати автобусом).
  Навігація: карта, маршрут, світлофор, перехід — безпека на дорозі.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Як дістатися до [місця]? — Ідіть прямо, потім поверніть ліворуч/праворуч."
  examples:
    - "Як дістатися до вокзалу? — Їдьте автобусом номер п'ять."
    - "Де зупинка? — Ідіть прямо, потім поверніть ліворуч."
    - "Скільки зупинок до центру? — Три зупинки."

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Напрямки"
    items:
      - word: "прямо"
        emoji: "\U00002B06"
        sentence: "Ідіть прямо сто метрів."
      - word: "ліворуч"
        emoji: "\U00002B05"
        sentence: "Поверніть ліворуч на розі."
      - word: "праворуч"
        emoji: "\U000027A1"
        sentence: "Аптека — праворуч."
      - word: "назад"
        emoji: "\U00002B07"
        sentence: "Поверніть назад — ви пройшли."
      - word: "навпроти"
        emoji: "\U00002194"
        sentence: "Магазин навпроти школи."
      - word: "за рогом"
        emoji: "\U0001F4CD"
        sentence: "Кафе — за рогом."
      - word: "через дорогу"
        emoji: "\U0001F6B6"
        sentence: "Банк — через дорогу."
      - word: "повернути"
        emoji: "\U0001F500"
        sentence: "Поверніть праворуч на світлофорі."

  - category: "Транспорт"
    items:
      - word: "зупинка"
        emoji: "\U0001F68F"
        sentence: "Зупинка — через п'ятдесят метрів."
      - word: "маршрутка"
        emoji: "\U0001F690"
        sentence: "Маршрутка їде до центру."
      - word: "трамвай"
        emoji: "\U0001F68B"
        sentence: "Трамвай номер три — мій."
      - word: "тролейбус"
        emoji: "\U0001F68E"
        sentence: "Тролейбус їде по проводах."
      - word: "метро"
        emoji: "\U0001F687"
        sentence: "Метро — найшвидший транспорт."
      - word: "квиток"
        emoji: "\U0001F3AB"
        sentence: "Купіть квиток у касі."
      - word: "проїзний"
        emoji: "\U0001F4B3"
        sentence: "Проїзний діє цілий місяць."

  - category: "Навігація"
    items:
      - word: "карта"
        emoji: "\U0001F5FA"
        sentence: "Подивися на карту."
      - word: "маршрут"
        emoji: "\U0001F4CD"
        sentence: "Який маршрут найкоротший?"
      - word: "перехід"
        emoji: "\U0001F6B6"
        sentence: "Переходьте дорогу на переході."
      - word: "світлофор"
        emoji: "\U0001F6A6"
        sentence: "Чекайте зелене світло на світлофорі."
      - word: "перехрестя"
        emoji: "\U0000274E"
        sentence: "Поверніть на перехресті."
      - word: "тротуар"
        emoji: "\U0001F6B6"
        sentence: "Ідіть по тротуару."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Розподіли за категоріями"
    instruction: "Розподіли слова"
    categories:
      - label: "Наземний транспорт"
        items:
          - "маршрутка"
          - "трамвай"
          - "тролейбус"
          - "таксі"
      - label: "Підземний транспорт"
        items:
          - "метро"
      - label: "Напрямки"
        items:
          - "прямо"
          - "ліворуч"
          - "праворуч"
          - "назад"
          - "навпроти"
      - label: "Місця на дорозі"
        items:
          - "зупинка"
          - "перехід"
          - "світлофор"
          - "перехрестя"

  - type: build_sentence
    title: "Покажи дорогу"
    instruction: "Склади вказівку"
    sentences:
      - words: ["Ідіть", "прямо", ",", "потім", "поверніть", "ліворуч", "."]
        correct: "Ідіть прямо, потім поверніть ліворуч."
      - words: ["Їдьте", "автобусом", "номер", "п'ять", "до", "зупинки", "«Площа»", "."]
        correct: "Їдьте автобусом номер п'ять до зупинки «Площа»."
      - words: ["Де", "зупинка", "трамвая", "?"]
        correct: "Де зупинка трамвая?"
      - words: ["Магазин", "—", "навпроти", "школи", "."]
        correct: "Магазин — навпроти школи."
      - words: ["Переходьте", "дорогу", "на", "зелене", "світло", "."]
        correct: "Переходьте дорогу на зелене світло."

  - type: pattern_drill
    title: "Як дістатися?"
    prompt: "Дай відповідь на питання"
    items:
      - given: "Як дістатися до вокзалу? (трамвай, 3)"
        answer: "Їдьте трамваєм номер три."
      - given: "Як дістатися до центру? (метро)"
        answer: "Їдьте метро до центру."
      - given: "Як дістатися до парку? (прямо, ліворуч)"
        answer: "Ідіть прямо, потім поверніть ліворуч."
      - given: "Як дістатися до школи? (автобус, 12)"
        answer: "Їдьте автобусом номер дванадцять."

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "Тролейбус їде під землею."
        answer: false
        correction: "Під землею їде метро. Тролейбус — наземний транспорт."
      - statement: "«Ліворуч» означає в лівий бік."
        answer: true
      - statement: "Проїзний — це одноразовий квиток."
        answer: false
        correction: "Проїзний діє на певний період (місяць, тиждень)."
      - statement: "На переході треба чекати зелене світло."
        answer: true
      - statement: "Маршрутка — це великий поїзд."
        answer: false
        correction: "Маршрутка — це мікроавтобус."

  - type: reading
    title: "Читання: Як дістатися до музею?"
    text: |
      — Перепрошую! Як дістатися до історичного музею?
      — Ідіть прямо по цій вулиці. На другому перехресті поверніть праворуч. Потім ідіть ще сто метрів. Музей буде ліворуч, навпроти парку.
      — А можна їхати транспортом?
      — Так, звичайно. На зупинці за рогом сідайте на тролейбус номер сім. Їдьте три зупинки. Вийдіть на зупинці «Музейна площа».
      — Дякую!
      — Будь ласка!
    questions:
      - question: "Куди треба повернути на другому перехресті?"
        answer: "Праворуч."
      - question: "Яким транспортом можна доїхати?"
        answer: "Тролейбусом номер сім."
      - question: "Скільки зупинок їхати?"
        answer: "Три зупинки."

  - type: pattern_drill
    title: "Скільки зупинок?"
    prompt: "Дай відповідь"
    items:
      - given: "Скільки зупинок до центру? (3)"
        answer: "Три зупинки."
      - given: "Скільки зупинок до вокзалу? (5)"
        answer: "П'ять зупинок."
      - given: "Мені треба пересісти? (так, на зупинці «Вокзал»)"
        answer: "Так, на зупинці «Вокзал»."
      - given: "Скільки зупинок до парку? (1)"
        answer: "Одна зупинка."
