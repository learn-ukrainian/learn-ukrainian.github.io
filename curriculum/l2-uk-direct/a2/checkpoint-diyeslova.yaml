module: checkpoint-diyeslova
track: l2-uk-direct
level: a2
type: checkpoint
title: "Контрольна точка: дієслівна система"
subtitle: "Вид, наказовий спосіб, дієслова руху, синтетичне майбутнє"
standard_ref: "\xA7\xA74.2.3\u20134.3.1 — verb system"
textbook_ref: "Grade 4\u20135 — повторення дієслів"
teaching_notes: |
  Консолідація модулів 14\u201318: видові пари (10), повний наказовий спосіб, пари дієслів руху (6), префікси руху (8), синтетичне майбутнє.
  Нової граматики немає — фокус на правильному виборі форми в контексті.
  Поріг проходження: 70%.
  Особлива увага: «буду + доконаний» (помилка), вибір означеного/неозначеного руху, вид і опорні слова.

# ─────────────────────────────────────────────
# ASSESSMENT SCOPE
# ─────────────────────────────────────────────
assessment_scope:
  - skill: "Видові пари"
    tested: "Процес vs результат, 10 основних пар"
    source_modules: [14]
  - skill: "Наказовий спосіб"
    tested: "Усі особи: 2 одн./мн., 1 мн., 3 ос. (хай/нехай)"
    source_modules: [15]
  - skill: "Дієслова руху (пари)"
    tested: "Означені vs неозначені (6 пар)"
    source_modules: [16]
  - skill: "Префіксовані дієслова руху"
    tested: "8 префіксів: при-, ви-, за-, пере-, до-, від-, по-, об-"
    source_modules: [17]
  - skill: "Синтетичне майбутнє"
    tested: "Складений vs синтетичний vs доконаний простий"
    source_modules: [18]

pass_threshold: 70

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Процес чи результат? (вид)"
    instruction: "Розподіли дієслова за видом"
    categories:
      - label: "Процес (недоконаний)"
        items:
          - "читати"
          - "писати"
          - "говорити"
          - "їсти"
          - "вчити"
      - label: "Результат (доконаний)"
        items:
          - "прочитати"
          - "написати"
          - "сказати"
          - "з'їсти"
          - "вивчити"

  - type: classify
    title: "Зараз чи завжди? (дієслова руху)"
    instruction: "Розподіли: означений (зараз) чи неозначений (завжди)"
    categories:
      - label: "Зараз (означений)"
        items:
          - "іти"
          - "їхати"
          - "летіти"
          - "нести"
          - "бігти"
      - label: "Завжди (неозначений)"
        items:
          - "ходити"
          - "їздити"
          - "літати"
          - "носити"
          - "бігати"

  - type: classify
    title: "Тип майбутнього"
    instruction: "Розподіли форми за типом"
    categories:
      - label: "Складений"
        items:
          - "буду читати"
          - "будемо працювати"
      - label: "Синтетичний"
        items:
          - "читатиму"
          - "працюватимемо"
      - label: "Доконаний простий"
        items:
          - "прочитаю"
          - "напишу"

  - type: pattern_drill
    title: "Видові пари"
    prompt: "Назви доконаний вид"
    items:
      - given: "читати \u2192 ?"
        answer: "прочитати"
      - given: "писати \u2192 ?"
        answer: "написати"
      - given: "робити \u2192 ?"
        answer: "зробити"
      - given: "говорити \u2192 ?"
        answer: "сказати"
      - given: "бачити \u2192 ?"
        answer: "побачити"
      - given: "їсти \u2192 ?"
        answer: "з'їсти"
      - given: "пити \u2192 ?"
        answer: "випити"
      - given: "вчити \u2192 ?"
        answer: "вивчити"

  - type: pattern_drill
    title: "Наказовий спосіб (усі особи)"
    prompt: "Утвори наказову форму"
    items:
      - given: "читати \u2192 ти"
        answer: "Читай!"
      - given: "читати \u2192 ви"
        answer: "Читайте!"
      - given: "читати \u2192 ми"
        answer: "Читаймо!"
      - given: "читати \u2192 він (хай)"
        answer: "Хай він читає."
      - given: "іти \u2192 ми"
        answer: "Ідімо!"
      - given: "писати \u2192 ми"
        answer: "Пишімо!"
      - given: "працювати \u2192 ми"
        answer: "Працюймо!"
      - given: "прийти \u2192 вона (хай)"
        answer: "Хай вона прийде."

  - type: pattern_drill
    title: "Префіксовані дієслова руху"
    prompt: "Утвори дієслово з префіксом"
    items:
      - given: "при- + іти"
        answer: "прийти"
      - given: "ви- + іти"
        answer: "вийти"
      - given: "за- + іти"
        answer: "зайти"
      - given: "пере- + іти"
        answer: "перейти"
      - given: "при- + їхати"
        answer: "приїхати"
      - given: "ви- + їхати"
        answer: "виїхати"
      - given: "до- + їхати"
        answer: "доїхати"
      - given: "від- + їхати"
        answer: "від'їхати"

  - type: pattern_drill
    title: "Синтетичне майбутнє"
    prompt: "Утвори синтетичну форму"
    items:
      - given: "читати \u2192 я"
        answer: "читатиму"
      - given: "писати \u2192 ти"
        answer: "писатимеш"
      - given: "говорити \u2192 він"
        answer: "говоритиме"
      - given: "працювати \u2192 ми"
        answer: "працюватимемо"
      - given: "вчити \u2192 вони"
        answer: "вчитимуть"

  - type: pattern_drill
    title: "Доконаний простий майбутній"
    prompt: "Утвори доконану форму"
    items:
      - given: "написати \u2192 я"
        answer: "напишу"
      - given: "прочитати \u2192 вона"
        answer: "прочитає"
      - given: "сказати \u2192 ми"
        answer: "скажемо"

  - type: build_sentence
    title: "Обери правильну форму (1)"
    instruction: "Обери дієслово, яке підходить до контексту"
    sentences:
      - words: ["Я", "[читаю/прочитаю]", "книгу", "щодня", "."]
        correct: "Я читаю книгу щодня."
      - words: ["[Ідімо/Ідіть]", "разом", "!"]
        correct: "Ідімо разом!"
      - words: ["Зараз", "він", "[їде/їздить]", "до", "Києва", "."]
        correct: "Зараз він їде до Києва."
      - words: ["Завтра", "я", "[читатиму/буду прочитаю]", "."]
        correct: "Завтра я читатиму."

  - type: build_sentence
    title: "Обери правильну форму (2)"
    instruction: "Обери дієслово, яке підходить до контексту"
    sentences:
      - words: ["Він", "[вийшов/зайшов]", "із", "будинку", "."]
        correct: "Він вийшов із будинку."
      - words: ["Хай", "вона", "[прийде/прийшла]", "о", "третій", "."]
        correct: "Хай вона прийде о третій."
      - words: ["Ми", "нарешті", "[робимо/зробили]", "це", "."]
        correct: "Ми нарешті зробили це."
      - words: ["Він", "завжди", "[ходить/іде]", "пішки", "."]
        correct: "Він завжди ходить пішки."

  - type: build_sentence
    title: "Обери правильну форму (3)"
    instruction: "Обери дієслово, яке підходить до контексту"
    sentences:
      - words: ["Вона", "[перейшла/зайшла]", "через", "дорогу", "."]
        correct: "Вона перейшла через дорогу."
      - words: ["Я", "[напишу/буду написати]", "лист", "завтра", "."]
        correct: "Я напишу лист завтра."
      - words: ["[Граймо/Грай]", "у", "футбол", "!"]
        correct: "Граймо у футбол!"
      - words: ["Вони", "часто", "[їздять/їдуть]", "до", "бабусі", "."]
        correct: "Вони часто їздять до бабусі."

  - type: reading
    title: "Читання: Лист від друга"
    text: |
      Привіт! Пишу тобі про свої плани. Завтра я працюватиму до обіду, а потім поїду до Олега. Ми домовилися: спочатку поїдімо, а потім підемо гуляти. Зазвичай я ходжу пішки, але завтра поїду автобусом. Олег сказав: «Хай Марія теж прийде!» Я вже написав їй. Сподіваюся, вона приїде. Увечері ми повернемося додому. Я прочитаю книгу, яку давно хотів прочитати. Нарешті зроблю це!
    questions:
      - question: "Коли оповідач працюватиме?"
        answer: "Завтра до обіду."
      - question: "Як зазвичай він ходить?"
        answer: "Пішки."
      - question: "Що сказав Олег?"
        answer: "Хай Марія теж прийде!"
      - question: "Що оповідач зробить увечері?"
        answer: "Прочитає книгу."

  - type: reading
    title: "Читання: У подорожі"
    text: |
      Минулого літа ми поїхали до Карпат. Спочатку доїхали поїздом до Львова. Там вийшли на вокзалі і пішли шукати готель. Ми ходили по вулицях і шукали. Нарешті знайшли! Наступного дня поїхали в гори. Там ми ходили по горах цілий день. Один раз Олег побіг за зайцем, але не наздогнав. Увечері ми повернулися в готель. Я сказав: «Наступного разу поїдьмо на довше!»
    questions:
      - question: "Як вони доїхали до Львова?"
        answer: "Поїздом."
      - question: "Чому «ходили», а не «ішли»?"
        answer: "Тому що ходили в різних напрямках, шукали."
      - question: "Що зробив Олег?"
        answer: "Побіг за зайцем."
      - question: "Що сказав оповідач наприкінці?"
        answer: "Наступного разу поїдьмо на довше!"

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "«Прочитати» — це недоконаний вид."
        answer: false
        correction: "«Прочитати» — доконаний вид (результат)."
      - statement: "«Ідімо» — це наказовий спосіб 1-ї множини."
        answer: true
      - statement: "«Ходити» — це означене дієслово руху (один напрямок)."
        answer: false
        correction: "«Ходити» — неозначене (звичка). Означене — «іти»."
      - statement: "«Читатиму» і «буду читати» — це те саме."
        answer: true
      - statement: "«Буду написати» — це правильна форма."
        answer: false
        correction: "Правильно: «напишу» (доконаний) або «буду писати» (недоконаний)."
