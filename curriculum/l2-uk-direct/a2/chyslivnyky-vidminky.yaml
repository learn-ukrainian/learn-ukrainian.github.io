module: chyslivnyky-vidminky
track: l2-uk-direct
level: a2
type: grammar
title: "Числівники: відмінювання"
subtitle: "Відміна числівників 1–4, порядкові числівники, дроби часу"
standard_ref: "§4.2.1.3 — відмінювання числівників: два–двох–двом"
textbook_ref: "Grade 4 — числівники, їх відмінювання"
teaching_notes: |
  Починайте з кількісних числівників 1–4, бо вони мають повну відміну.
  Числівник «один» відмінюється як прикметник і узгоджується в роді.
  «Два/дві» — зверніть увагу на родову форму (два хлопці, дві дівчини).
  Порядкові числівники (перший, другий) узгоджуються як прикметники в роді/числі/відмінку.
  Дроби часу (пів на третю, чверть на п'яту) — активне відпрацювання.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Кількісні числівники 1–4 відмінюються. Порядкові числівники узгоджуються як прикметники."
  examples:
    - "У мене два брати — я знаю двох братів."
    - "Перший урок починається о дев'ятій."
    - "Пів на третю — це 2:30."

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Кількісні числівники 1–4"
    columns: ["Відмінок", "один/одна", "два/дві", "три", "чотири"]
    rows:
      - ["Н.в.", "один/одна/одне", "два/дві", "три", "чотири"]
      - ["Р.в.", "одного/однієї", "двох", "трьох", "чотирьох"]
      - ["Д.в.", "одному/одній", "двом", "трьом", "чотирьом"]
      - ["Зн.в.", "= Н або Р", "= Н або Р", "= Н або Р", "= Н або Р"]
      - ["О.в.", "одним/однією", "двома", "трьома", "чотирма"]
      - ["М.в.", "на одному/одній", "на двох", "на трьох", "на чотирьох"]

  - title: "Порядкові числівники (узгодження)"
    columns: ["Числівник", "Чоловічий", "Жіночий", "Середній"]
    rows:
      - ["1-й", "перший", "перша", "перше"]
      - ["2-й", "другий", "друга", "друге"]
      - ["3-й", "третій", "третя", "третє"]
      - ["4-й", "четвертий", "четверта", "четверте"]
      - ["5-й", "п'ятий", "п'ята", "п'яте"]

  - title: "Неозначена кількість + родовий множини"
    columns: ["Слово", "Приклад"]
    rows:
      - ["багато", "багато книг"]
      - ["мало", "мало часу"]
      - ["кілька", "кілька днів"]
      - ["декілька", "декілька студентів"]
      - ["скільки", "скільки людей?"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Кількісні числівники"
    items:
      - word: "один"
        emoji: "\U00000031\U0000FE0F\U000020E3"
        sentence: "У мене один брат."
      - word: "два"
        emoji: "\U00000032\U0000FE0F\U000020E3"
        sentence: "На столі два яблука."
      - word: "три"
        emoji: "\U00000033\U0000FE0F\U000020E3"
        sentence: "Вона має три книги."
      - word: "чотири"
        emoji: "\U00000034\U0000FE0F\U000020E3"
        sentence: "У кімнаті чотири вікна."

  - category: "Порядкові числівники"
    items:
      - word: "перший"
        emoji: "\U0001F947"
        sentence: "Перший урок — математика."
      - word: "другий"
        emoji: "\U0001F948"
        sentence: "Друга зупинка — моя."
      - word: "третій"
        emoji: "\U0001F949"
        sentence: "Третій поверх — бібліотека."
      - word: "четвертий"
        emoji: "\U00000034\U0000FE0F\U000020E3"
        sentence: "Четверта година — обід."
      - word: "п'ятий"
        emoji: "\U00000035\U0000FE0F\U000020E3"
        sentence: "П'ятий клас — це середня школа."

  - category: "Неозначена кількість"
    items:
      - word: "багато"
        emoji: "\U0001F4DA"
        sentence: "У бібліотеці багато книг."
      - word: "мало"
        emoji: "\U0001F4AD"
        sentence: "У мене мало часу."
      - word: "кілька"
        emoji: "\U0001F522"
        sentence: "Зачекай кілька хвилин."
      - word: "декілька"
        emoji: "\U0001F522"
        sentence: "Декілька студентів запізнилися."
      - word: "скільки"
        emoji: "\U00002753"
        sentence: "Скільки це коштує?"

  - category: "Час і дроби"
    items:
      - word: "пів"
        emoji: "\U0001F553"
        sentence: "Зараз пів на третю."
      - word: "чверть"
        emoji: "\U0001F554"
        sentence: "Чверть на п'яту — час на каву."
      - word: "година"
        emoji: "\U0001F550"
        sentence: "Одна година — це шістдесят хвилин."
      - word: "хвилина"
        emoji: "\U000023F1"
        sentence: "Зачекайте п'ять хвилин."

  - category: "Лічильні слова"
    items:
      - word: "раз"
        emoji: "\U0001F501"
        sentence: "Він був тут один раз."
      - word: "пара"
        emoji: "\U0001F45F"
        sentence: "Мені потрібна пара черевиків."
      - word: "десяток"
        emoji: "\U0001F51F"
        sentence: "Купи десяток яєць."
      - word: "сотня"
        emoji: "\U0001F4AF"
        sentence: "У залі була сотня людей."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Відмінюй «два»"
    prompt: "Постав числівник «два» у потрібний відмінок"
    items:
      - given: "Н.в. — скільки?"
        answer: "два"
      - given: "Р.в. — кого?"
        answer: "двох"
      - given: "Д.в. — кому?"
        answer: "двом"
      - given: "Зн.в. — кого? (істоти)"
        answer: "двох"
      - given: "О.в. — ким?"
        answer: "двома"
      - given: "М.в. — на скількох?"
        answer: "на двох"

  - type: build_sentence
    title: "Числівник + іменник"
    instruction: "Побудуй речення з правильною формою"
    sentences:
      - words: ["У", "кімнаті", "[три/трьох]", "вікна", "."]
        correct: "У кімнаті три вікна."
      - words: ["Я", "знаю", "[два/двох]", "лікарів", "."]
        correct: "Я знаю двох лікарів."
      - words: ["Ми", "дали", "квитки", "[чотири/чотирьом]", "друзям", "."]
        correct: "Ми дали квитки чотирьом друзям."
      - words: ["Вона", "прийшла", "з", "[три/трьома]", "подругами", "."]
        correct: "Вона прийшла з трьома подругами."
      - words: ["[Перший/Перша]", "книга", "була", "цікава", "."]
        correct: "Перша книга була цікава."

  - type: pattern_drill
    title: "Порядкові числівники: узгодження"
    prompt: "Узгодь порядковий числівник з іменником"
    items:
      - given: "перший + книга"
        answer: "перша книга"
      - given: "другий + вікно"
        answer: "друге вікно"
      - given: "третій + поверх"
        answer: "третій поверх"
      - given: "четвертий + зупинка"
        answer: "четверта зупинка"
      - given: "п'ятий + завдання"
        answer: "п'яте завдання"

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "«Три книг» — правильне словосполучення."
        answer: false
        correction: "Правильно: три книги (називний множини, не родовий)."
      - statement: "«Багато людей» — після «багато» стоїть родовий відмінок."
        answer: true
      - statement: "«Двома» — це орудний відмінок числівника «два»."
        answer: true
      - statement: "«Перший» змінюється за родами: перший, перша, перше."
        answer: true
      - statement: "Після «кілька» іменник стоїть у називному відмінку."
        answer: false
        correction: "Після «кілька» — родовий множини: кілька днів, кілька книг."

  - type: classify
    title: "Кількісний чи порядковий?"
    instruction: "Розподіли числівники"
    categories:
      - label: "Кількісні (СКІЛЬКИ?)"
        items:
          - "один"
          - "два"
          - "три"
          - "багато"
          - "кілька"
      - label: "Порядкові (КОТРИЙ?)"
        items:
          - "перший"
          - "другий"
          - "третій"
          - "четвертий"
          - "п'ятий"

  - type: reading
    title: "Читання: У магазині"
    text: |
      Марія пішла в магазин. Їй треба купити продукти на тиждень. Вона взяла один кілограм яблук, два літри молока і три пачки макаронів. На касі вона побачила двох знайомих. Перший — це Тарас із роботи. Друга — Оленка з університету. Марія поговорила з ними кілька хвилин. Усе коштувало чотириста п'ятнадцять гривень.
    questions:
      - question: "Скільки молока купила Марія?"
        answer: "Два літри."
      - question: "Скількох знайомих вона побачила?"
        answer: "Двох."
      - question: "Скільки коштували продукти?"
        answer: "Чотириста п'ятнадцять гривень."

  - type: pattern_drill
    title: "Дроби часу"
    prompt: "Скажи час українською"
    items:
      - given: "2:30"
        answer: "пів на третю"
      - given: "4:15"
        answer: "чверть на п'яту"
      - given: "7:45"
        answer: "за чверть восьма"
      - given: "1:30"
        answer: "пів на другу"
      - given: "5:15"
        answer: "чверть на шосту"
      - given: "9:30"
        answer: "пів на десяту"
      - given: "3:45"
        answer: "за чверть четверта"
      - given: "6:30"
        answer: "пів на сьому"
