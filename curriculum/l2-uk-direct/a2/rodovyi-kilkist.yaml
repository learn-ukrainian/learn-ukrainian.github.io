module: rodovyi-kilkist
track: l2-uk-direct
level: a2
type: grammar
title: "Родовий: кількість і дати"
subtitle: "Числівники з родовим, багато/мало, місяці та дати"
standard_ref: "§4.2.3.2 (quantity), §4.2.1.3 (numeral declension)"
textbook_ref: "Grade 4 — numerals with genitive, dates"
teaching_notes: |
  Ключове правило: 2-4 + родовий однини, 5-20 + родовий множини.
  Спочатку відпрацюйте з конкретними іменниками (книги, учні, яблука).
  Потім додайте багато/мало/кілька/скільки + родовий множини.
  Дати — окрема тема: «Якого числа?» → «Першого січня» (обидва слова в родовому).
  Місяці в родовому — вчіть як готові форми: січня, лютого, березня тощо.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "2-4 + родовий однини. 5+ + родовий множини. Дата: «першого січня»."
  examples:
    - "Два брати. Три книги. Чотири вікна."
    - "П'ять братів. Десять книг. Двадцять вікон."
    - "Сьогодні десяте лютого. Коли? — Десятого лютого."

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Числівники + родовий відмінок"
    columns: ["Число", "Відмінок", "Приклад"]
    rows:
      - ["2, 3, 4", "Р.в. однина", "два брати, три книги"]
      - ["5–20", "Р.в. множина", "п'ять братів, десять книг"]
      - ["багато, мало", "Р.в. множина", "багато людей, мало часу"]
      - ["кілька, скільки", "Р.в. множина", "кілька днів, скільки грошей?"]

  - title: "Місяці в родовому відмінку"
    columns: ["Називний", "Родовий"]
    rows:
      - ["січень", "січня"]
      - ["лютий", "лютого"]
      - ["березень", "березня"]
      - ["квітень", "квітня"]
      - ["травень", "травня"]
      - ["червень", "червня"]
      - ["липень", "липня"]
      - ["серпень", "серпня"]
      - ["вересень", "вересня"]
      - ["жовтень", "жовтня"]
      - ["листопад", "листопада"]
      - ["грудень", "грудня"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Числівники"
    items:
      - word: "два / дві"
        emoji: "\U00000032"
        sentence: "У мене два брати і дві сестри."
      - word: "три"
        emoji: "\U00000033"
        sentence: "На столі три яблука."
      - word: "чотири"
        emoji: "\U00000034"
        sentence: "У кімнаті чотири вікна."
      - word: "п'ять"
        emoji: "\U00000035"
        sentence: "У класі п'ять учнів."
      - word: "десять"
        emoji: "\U0001F51F"
        sentence: "Десять хвилин до початку."

  - category: "Кількісні слова"
    items:
      - word: "багато"
        emoji: "\U00002B06"
        sentence: "Багато людей у парку."
      - word: "мало"
        emoji: "\U00002B07"
        sentence: "Мало часу до екзамену."
      - word: "кілька"
        emoji: "\U0001F522"
        sentence: "Кілька днів тому."
      - word: "скільки"
        emoji: "\U00002753"
        sentence: "Скільки коштує квиток?"
      - word: "декілька"
        emoji: "\U0001F522"
        sentence: "Декілька студентів запізнилися."

  - category: "Місяці (зимові та весняні)"
    items:
      - word: "січень"
        emoji: "\U00002744"
        sentence: "Першого січня — Новий рік."
      - word: "лютий"
        emoji: "\U0001F328"
        sentence: "Чотирнадцятого лютого — свято."
      - word: "березень"
        emoji: "\U0001F331"
        sentence: "Восьмого березня — жіночий день."
      - word: "квітень"
        emoji: "\U0001F337"
        sentence: "У квітні тепло."
      - word: "травень"
        emoji: "\U0001F33A"
        sentence: "Дев'ятого травня — День пам'яті."

  - category: "Одиниці виміру"
    items:
      - word: "кілограм"
        emoji: "\U00002696"
        sentence: "Два кілограми яблук."
      - word: "літр"
        emoji: "\U0001F4A7"
        sentence: "Три літри молока."
      - word: "година"
        emoji: "\U0001F552"
        sentence: "Дві години до поїзда."
      - word: "хвилина"
        emoji: "\U000023F1"
        sentence: "П'ять хвилин тому."
      - word: "день"
        emoji: "\U0001F4C5"
        sentence: "Кілька днів відпочинку."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Число + іменник"
    prompt: "Утвори правильну форму"
    items:
      - given: "3 + книга"
        answer: "три книги"
      - given: "7 + книга"
        answer: "сім книг"
      - given: "2 + брат"
        answer: "два брати"
      - given: "5 + брат"
        answer: "п'ять братів"
      - given: "4 + вікно"
        answer: "чотири вікна"
      - given: "10 + вікно"
        answer: "десять вікон"
      - given: "3 + учень"
        answer: "три учні"
      - given: "20 + учень"
        answer: "двадцять учнів"
      - given: "2 + година"
        answer: "дві години"
      - given: "6 + година"
        answer: "шість годин"
      - given: "4 + яблуко"
        answer: "чотири яблука"
      - given: "12 + яблуко"
        answer: "дванадцять яблук"
      - given: "2 + кілограм"
        answer: "два кілограми"
      - given: "5 + кілограм"
        answer: "п'ять кілограмів"
      - given: "3 + день"
        answer: "три дні"

  - type: classify
    title: "Однина чи множина?"
    instruction: "Розподіли: родовий однини (2-4) чи родовий множини (5+)"
    categories:
      - label: "Родовий однини (2-4)"
        items:
          - "два брати"
          - "три книги"
          - "чотири вікна"
          - "дві години"
          - "три яблука"
      - label: "Родовий множини (5+, багато, мало)"
        items:
          - "п'ять братів"
          - "десять книг"
          - "багато людей"
          - "мало часу"
          - "кілька днів"

  - type: pattern_drill
    title: "Дати"
    prompt: "Утвори дату в родовому відмінку: «Коли?»"
    items:
      - given: "1 січень"
        answer: "першого січня"
      - given: "14 лютий"
        answer: "чотирнадцятого лютого"
      - given: "8 березень"
        answer: "восьмого березня"
      - given: "1 квітень"
        answer: "першого квітня"
      - given: "9 травень"
        answer: "дев'ятого травня"
      - given: "24 серпень"
        answer: "двадцять четвертого серпня"
      - given: "1 вересень"
        answer: "першого вересня"
      - given: "25 грудень"
        answer: "двадцять п'ятого грудня"
      - given: "10 лютий"
        answer: "десятого лютого"
      - given: "3 липень"
        answer: "третього липня"
      - given: "7 листопад"
        answer: "сьомого листопада"
      - given: "31 жовтень"
        answer: "тридцять першого жовтня"

  - type: build_sentence
    title: "Скільки?"
    instruction: "Дай відповідь на запитання"
    sentences:
      - words: ["Скільки", "учнів", "у", "класі", "?", "—", "25"]
        correct: "У класі двадцять п'ять учнів."
      - words: ["Скільки", "книг", "на", "столі", "?", "—", "3"]
        correct: "На столі три книги."
      - words: ["Скільки", "яблук", "у", "кошику", "?", "—", "7"]
        correct: "У кошику сім яблук."
      - words: ["Скільки", "днів", "до", "свята", "?", "—", "4"]
        correct: "До свята чотири дні."

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "Три книг."
        answer: false
        correction: "Три книги — родовий однини після 2-4."
      - statement: "П'ять братів."
        answer: true
      - statement: "Два вікна."
        answer: true
      - statement: "Десять книги."
        answer: false
        correction: "Десять книг — родовий множини після 5+."
      - statement: "Багато часу."
        answer: true
      - statement: "Першого січня — Новий рік."
        answer: true

  - type: reading
    title: "Читання: Запрошення на день народження"
    text: |
      Запрошую на день народження! Дата: десятого лютого. Час: о шостій годині вечора. Адреса: вулиця Шевченка, 15. Буде багато гостей — двадцять п'ять людей! Мамі потрібно купити три кілограми яблук, два літри соку і п'ять пакетів чіпсів. Чекаю на тебе!
    questions:
      - question: "Коли день народження?"
        answer: "Десятого лютого."
      - question: "Скільки буде гостей?"
        answer: "Двадцять п'ять людей."
      - question: "Скільки кілограмів яблук потрібно?"
        answer: "Три кілограми."

  - type: riddle
    title: "Загадка"
    clues:
      - "Живе п'ять братів,"
      - "один від одного більший."
    answer: "пальці"
    source: "Grade 5 Avramenko p.27"
