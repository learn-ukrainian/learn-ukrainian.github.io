module: rodovyi-koho-choho
track: l2-uk-direct
level: a2
type: grammar
title: "Родовий відмінок (КОГО? ЧОГО?)"
subtitle: "Називаємо власника, відсутність, походження"
standard_ref: "§4.2.3.2 — genitive case, Catalogue A #17 (belong)"
textbook_ref: "Grade 4 p.31 — genitive: КОГО? ЧОГО?"
teaching_notes: |
  Головне питання — КОГО? ЧОГО? Чия це книга? Книга брата. Чого немає? Немає хліба.
  Три значення: належність (книга брата), відсутність (немає води), походження (із Львова).
  Жіночий рід -а → -и, -я → -і. Чоловічий і середній — додають -а/-я.
  Не вводьте всі винятки одразу — спочатку базові закінчення, потім практика.
  Почніть із належності (чий? чия? чиє?) — це найзрозуміліше значення родового.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "КОГО? ЧОГО? → родовий відмінок. Належність, відсутність, походження."
  examples:
    - "Це книга брата. (брат → брата)"
    - "Немає хліба. (хліб → хліба)"
    - "Він із Львова. (Львів → Львова)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Родовий відмінок — основні закінчення"
    columns: ["Рід", "Називний", "Родовий", "Зміна"]
    rows:
      - ["Чоловічий (твердий)", "брат", "брата", "+а"]
      - ["Чоловічий (м'який)", "учитель", "учителя", "+я"]
      - ["Жіночий -а", "мама", "мами", "-а → -и"]
      - ["Жіночий -я", "земля", "землі", "-я → -і"]
      - ["Середній -о", "місто", "міста", "-о → -а"]
      - ["Середній -е", "море", "моря", "-е → -я"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
