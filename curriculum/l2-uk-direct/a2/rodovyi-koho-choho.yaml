        sentence: "Немає часу на відпочинок."
      - word: "гроші"
        emoji: "\U0001F4B0"
        sentence: "Немає грошей на квитки."
      - word: "місце"
        emoji: "\U0001F4CD"
        sentence: "Немає місця в автобусі."
      - word: "відповідь"
        emoji: "\U00002753"
        sentence: "Немає відповіді на запитання."
      - word: "власник"
        emoji: "\U0001F464"
