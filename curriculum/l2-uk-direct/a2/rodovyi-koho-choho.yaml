# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Утвори родовий відмінок"
    prompt: "Постав іменник у родовий відмінок"
    items:
      - given: "брат → книга..."
        answer: "брата"
      - given: "мама → сумка..."
        answer: "мами"
      - given: "сестра → кімната..."
        answer: "сестри"
      - given: "батько → машина..."
        answer: "батька"
      - given: "учитель → кабінет..."
        answer: "учителя"
      - given: "місто → центр..."
        answer: "міста"
      - given: "земля → край..."
        answer: "землі"
      - given: "море → берег..."
        answer: "моря"
      - given: "бабуся → дім..."
        answer: "бабусі"
      - given: "дідусь → город..."
        answer: "дідуся"
      - given: "друг → номер телефону..."
        answer: "друга"
      - given: "подруга → адреса..."
        answer: "подруги"
      - given: "хліб → немає..."
        answer: "хліба"
      - given: "вода → немає..."
        answer: "води"
      - given: "молоко → немає..."
        answer: "молока"

  - type: build_sentence
    title: "Чиє це?"
    instruction: "Склади речення про належність"
    sentences:
      - words: ["Це", "машина", "[батько/батька]", "."]
        correct: "Це машина батька."
      - words: ["Це", "сумка", "[сестра/сестри]", "."]
        correct: "Це сумка сестри."
      - words: ["Це", "книга", "[учитель/учителя]", "."]
        correct: "Це книга учителя."
      - words: ["Це", "іграшка", "[дитина/дитини]", "."]
        correct: "Це іграшка дитини."
      - words: ["Це", "кабінет", "[директор/директора]", "."]
        correct: "Це кабінет директора."
      - words: ["Це", "ключ", "[квартира/квартири]", "."]
        correct: "Це ключ квартири."
      - words: ["Це", "вікно", "[кімната/кімнати]", "."]
        correct: "Це вікно кімнати."
      - words: ["Це", "подарунок", "[мама/мами]", "."]
        correct: "Це подарунок мами."

  - type: pattern_drill
    title: "Немає чого?"
    prompt: "Утвори речення з «немає»"
    items:
      - given: "хліб → немає..."
        answer: "немає хліба"
      - given: "вода → немає..."
        answer: "немає води"
      - given: "молоко → немає..."
        answer: "немає молока"
      - given: "час → немає..."
        answer: "немає часу"
      - given: "гроші → немає..."
        answer: "немає грошей"
      - given: "місце → немає..."
        answer: "немає місця"
      - given: "цукор → немає..."
        answer: "немає цукру"
      - given: "сіль → немає..."
        answer: "немає солі"
      - given: "відповідь → немає..."
        answer: "немає відповіді"
      - given: "світло → немає..."
        answer: "немає світла"

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "Немає водо."
        answer: false
        correction: "Немає води."
      - statement: "Це книга брата."
        answer: true
      - statement: "Він із Львова."
        answer: true
      - statement: "Немає часу."
        answer: true
      - statement: "Це сумка мамо."
        answer: false
        correction: "Це сумка мами."
      - statement: "Немає хліб."
        answer: false
        correction: "Немає хліба."
      - statement: "Вона з України."
        answer: true
      - statement: "Це дім бабуся."
        answer: false
        correction: "Це дім бабусі."

  - type: classify
    title: "Яке закінчення?"
    instruction: "Розподіли: -а/-я (чоловічий/середній) чи -и/-і (жіночий)"
    categories:
      - label: "-а / -я (чоловічий і середній)"
        items:
          - "брат → брата"
          - "учитель → учителя"
          - "місто → міста"
          - "море → моря"
          - "батько → батька"
      - label: "-и / -і (жіночий)"
        items:
          - "мама → мами"
          - "сестра → сестри"
          - "земля → землі"
          - "бабуся → бабусі"
          - "подруга → подруги"

  - type: reading
    title: "Читання: Бюро знахідок"
    text: |
      У бюро знахідок багато речей. Ось сумка студентки. А це паспорт туриста. На столі лежить ключ від квартири. Тут є гаманець хлопця — у ньому немає грошей. А ось телефон дівчини. Чиї це речі? Власники, приходьте!
    questions:
      - question: "Чия сумка в бюро?"
        answer: "Сумка студентки."
      - question: "Чий паспорт на столі?"
        answer: "Паспорт туриста."
      - question: "Що є в гаманці хлопця?"
        answer: "Немає грошей."

  - type: proverb_drill
    title: "Прислів'я"
    proverb: "Без труда немає плода."
    source: "Grade 3"
    explanation: "Без + родовий відмінок. Труд → труда, плід → плода."
