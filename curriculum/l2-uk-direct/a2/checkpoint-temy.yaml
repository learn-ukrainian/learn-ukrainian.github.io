module: checkpoint-temy
track: l2-uk-direct
level: a2
type: checkpoint
title: "Контрольна точка: тематичний словник"
subtitle: "Перевірка тем: навчання, робота, їжа, послуги, транспорт"
standard_ref: "Каталог Б — повторення модулів 25–29"
textbook_ref: "Повторення: Grade 3–4 — тематичний словник"
teaching_notes: |
  Комплексна перевірка лексики з п'яти тематичних модулів: навчання, робота, їжа, послуги, транспорт.
  Перевіряємо не тільки знання слів, а й уміння вживати їх у контексті з правильними відмінками.
  Нової лексики немає — фокус на інтеграції та застосуванні у реальних ситуаціях.
  Включаємо діалоги й тексти, що поєднують кілька тем одночасно.

# ─────────────────────────────────────────────
# ASSESSMENT SCOPE
# ─────────────────────────────────────────────
assessment_scope:
  - skill: "Навчання"
    tested: "Навчальні заклади, предмети, вчити/вивчати/вчитися"
    source_modules: [25]
  - skill: "Робота"
    tested: "Професії, робочі місця, ким працюєте?"
    source_modules: [26]
  - skill: "Їжа розширена"
    tested: "Способи приготування, смакові прикметники, ресторан"
    source_modules: [27]
  - skill: "Послуги"
    tested: "Банк, пошта, бібліотека, спорт, таксі"
    source_modules: [28]
  - skill: "Напрямки і транспорт"
    tested: "Орієнтація в місті, громадський транспорт"
    source_modules: [29]

pass_threshold: 70

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Розподіли за темою (1)"
    instruction: "Розподіли слова за категоріями"
    categories:
      - label: "Навчання"
        items:
          - "урок"
          - "підручник"
          - "іспит"
          - "оцінка"
      - label: "Робота"
        items:
          - "зарплата"
          - "відпустка"
          - "колега"
          - "начальник"
      - label: "Їжа"
        items:
          - "варити"
          - "смажити"
          - "рахунок"
          - "офіціант"

  - type: classify
    title: "Розподіли за темою (2)"
    instruction: "Розподіли слова за категоріями"
    categories:
      - label: "Послуги"
        items:
          - "банкомат"
          - "посилка"
          - "абонемент"
          - "бібліотека"
      - label: "Транспорт"
        items:
          - "зупинка"
          - "маршрутка"
          - "квиток"
          - "проїзний"
      - label: "Напрямки"
        items:
          - "прямо"
          - "ліворуч"
          - "праворуч"
          - "навпроти"

  - type: classify
    title: "Професія і місце роботи"
    instruction: "Де працює ця людина?"
    categories:
      - label: "В офісі"
        items:
          - "програміст"
          - "менеджер"
          - "бухгалтер"
      - label: "У лікарні / аптеці"
        items:
          - "стоматолог"
          - "фармацевт"
      - label: "У школі / університеті"
        items:
          - "вчитель"
          - "професор"
      - label: "На заводі / фабриці"
        items:
          - "інженер"
          - "робітник"

  - type: classify
    title: "Смак продуктів"
    instruction: "Який смак?"
    categories:
      - label: "Солодкий"
        items:
          - "торт"
          - "мед"
          - "шоколад"
      - label: "Кислий"
        items:
          - "лимон"
          - "вишня"
      - label: "Солоний"
        items:
          - "чипси"
          - "оселедець"
      - label: "Гострий"
        items:
          - "перець"
          - "гірчиця"

  - type: pattern_drill
    title: "Вчити / вивчати / вчитися"
    prompt: "Обери правильне дієслово"
    items:
      - given: "Він ___ в університеті."
        answer: "вчиться"
      - given: "Вона ___ нові слова щодня."
        answer: "вчить"
      - given: "Ми ___ хімію цього семестру."
        answer: "вивчаємо"

  - type: pattern_drill
    title: "Ким працюєте?"
    prompt: "Дай відповідь в орудному відмінку"
    items:
      - given: "програміст → Я працюю ___."
        answer: "програмістом"
      - given: "юрист → Вона працює ___."
        answer: "юристкою"
      - given: "вчитель → Він працює ___."
        answer: "вчителем"
      - given: "дизайнер → Я працюю ___."
        answer: "дизайнером"

  - type: pattern_drill
    title: "Як готувати?"
    prompt: "Обери спосіб приготування"
    items:
      - given: "суп → як готувати?"
        answer: "варити"
      - given: "м'ясо на сковорідці → як готувати?"
        answer: "смажити"
      - given: "пиріг у духовці → як готувати?"
        answer: "пекти"
      - given: "овочі на повільному вогні → як готувати?"
        answer: "тушкувати"

  - type: pattern_drill
    title: "Де найближчий...?"
    prompt: "Сформулюй запитання"
    items:
      - given: "банкомат"
        answer: "Де найближчий банкомат?"
      - given: "аптека"
        answer: "Де найближча аптека?"
      - given: "зупинка"
        answer: "Де найближча зупинка?"

  - type: pattern_drill
    title: "Як дістатися?"
    prompt: "Дай вказівку"
    items:
      - given: "музей (прямо, потім ліворуч)"
        answer: "Ідіть прямо, потім поверніть ліворуч."
      - given: "вокзал (трамвай номер 3)"
        answer: "Їдьте трамваєм номер три."
      - given: "парк (через дорогу)"
        answer: "Парк — через дорогу."

  - type: true_false
    title: "Правда чи неправда? (1)"
    items:
      - statement: "Біологія — це навчальний заклад."
        answer: false
        correction: "Біологія — це предмет."
      - statement: "Відпустка — це робочий день."
        answer: false
        correction: "Відпустка — це відпочинок від роботи."
      - statement: "Десерт зазвичай солодкий."
        answer: true
      - statement: "Бандероль — це те саме, що лист."
        answer: false
        correction: "Бандероль — це пакунок."
      - statement: "Тролейбус їде під землею."
        answer: false
        correction: "Під землею їде метро."

  - type: true_false
    title: "Правда чи неправда? (2)"
    items:
      - statement: "Іспит — це перевірка знань."
        answer: true
      - statement: "Фармацевт працює в лікарні."
        answer: false
        correction: "Фармацевт працює в аптеці."
      - statement: "Офіціант обслуговує в ресторані."
        answer: true
      - statement: "Готівка — це гроші на картці."
        answer: false
        correction: "Готівка — це паперові й монетні гроші."
      - statement: "Проїзний діє цілий місяць."
        answer: true

  - type: build_sentence
    title: "Побудуй речення (1)"
    instruction: "Склади правильне речення"
    sentences:
      - words: ["Я", "вчуся", "в", "університеті", "і", "вивчаю", "історію", "."]
        correct: "Я вчуся в університеті і вивчаю історію."
      - words: ["Він", "працює", "програмістом", "в", "офісі", "."]
        correct: "Він працює програмістом в офісі."
      - words: ["Я", "хотіла", "б", "замовити", "борщ", "і", "каву", "."]
        correct: "Я хотіла б замовити борщ і каву."

  - type: build_sentence
    title: "Побудуй речення (2)"
    instruction: "Склади правильне речення"
    sentences:
      - words: ["Де", "найближчий", "банкомат", "?"]
        correct: "Де найближчий банкомат?"
      - words: ["Ідіть", "прямо", ",", "потім", "поверніть", "ліворуч", "."]
        correct: "Ідіть прямо, потім поверніть ліворуч."
      - words: ["Їдьте", "автобусом", "номер", "п'ять", "до", "центру", "."]
        correct: "Їдьте автобусом номер п'ять до центру."

  - type: reading
    title: "Читання: День Олени"
    text: |
      Олена — вчителька. Вона працює в школі. Робочий день починається о восьмій. Перший урок — математика. На обідній перерві Олена йде в кафе навпроти школи. Вона замовляє салат і чай. Після роботи Олена їде тролейбусом до спортзалу. Вона тренується годину. Потім їде додому на маршрутці. По дорозі заходить в аптеку і на пошту — треба відправити бандероль мамі.
    questions:
      - question: "Ким працює Олена?"
        answer: "Вчителькою."
      - question: "Що вона замовляє в кафе?"
        answer: "Салат і чай."
      - question: "Яким транспортом вона їде до спортзалу?"
        answer: "Тролейбусом."

  - type: reading
    title: "Читання: Новий студент"
    text: |
      Максим — студент. Він вчиться в університеті й вивчає програмування. Після лекцій він їде на роботу. Максим працює програмістом у невеликій компанії. Його робочий день — з третьої до сьомої. Зарплата невелика, але він набирається досвіду. Увечері Максим готує вечерю: смажить картоплю і робить салат. Потім вчить нові слова для іспиту з англійської.
    questions:
      - question: "Що вивчає Максим?"
        answer: "Програмування."
      - question: "Ким він працює?"
        answer: "Програмістом."
      - question: "Що він готує на вечерю?"
        answer: "Смажить картоплю і робить салат."

  - type: reading
    title: "Читання: Пригода в місті"
    text: |
      Марина приїхала в нове місто. Їй треба дістатися до готелю. Вона запитала: «Як дістатися до готелю «Україна»?» Перехожий відповів: «Їдьте автобусом номер дванадцять до зупинки «Центральна площа». Потім ідіть прямо двісті метрів і поверніть праворуч. Готель — за рогом, навпроти бібліотеки.» Марина знайшла зупинку і сіла в автобус. Через п'ять зупинок вона вийшла. Готель був саме там, де сказав перехожий.
    questions:
      - question: "Яким транспортом їхала Марина?"
        answer: "Автобусом номер дванадцять."
      - question: "Де знаходиться готель?"
        answer: "За рогом, навпроти бібліотеки."
      - question: "Скільки зупинок їхала Марина?"
        answer: "П'ять зупинок."
