module: orudnyi-kym-chym
track: l2-uk-direct
level: a2
type: grammar
title: "Орудний відмінок (КИМ? ЧИМ?)"
subtitle: "Інструмент, транспорт, професія — чим пишеш? ким працюєш?"
standard_ref: "§4.2.3.5 — instrumental case"
textbook_ref: "Grade 4 p.37 — instrumental: КИМ? ЧИМ?"
teaching_notes: |
  Головне питання — ЧИМ? КИМ? Чим пишеш? Чим їдеш? Ким працюєш?
  Чоловічий рід: +ом (твердий), +ем (м'який). Жіночий: -а → -ою, -я → -ею.
  Три значення: інструмент (пишу ручкою), транспорт (їду автобусом), професія (він є лікарем).
  Почніть з інструментів — найконкретніше і найзрозуміліше значення.
  Транспорт — практичний контекст: «Чим ти їдеш на роботу?»

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "КИМ? ЧИМ? → орудний відмінок. Інструмент, транспорт, професія."
  examples:
    - "Я пишу ручкою. (ручка → ручкою)"
    - "Він їде автобусом. (автобус → автобусом)"
    - "Вона стала вчителькою. (вчителька → вчителькою)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Орудний відмінок — основні закінчення"
    columns: ["Рід", "Називний", "Орудний", "Зміна"]
    rows:
      - ["Чоловічий (твердий)", "брат", "братом", "+ом"]
      - ["Чоловічий (м'який)", "учитель", "учителем", "+ем"]
      - ["Жіночий -а", "мама", "мамою", "-а → -ою"]
      - ["Жіночий -я", "земля", "землею", "-я → -ею"]
      - ["Середній -о", "місто", "містом", "-о → -ом"]
      - ["Середній -е", "море", "морем", "-е → -ем"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Інструменти та знаряддя"
    items:
      - word: "ручка"
        emoji: "\U0001F58A"
        sentence: "Я пишу ручкою."
      - word: "олівець"
        emoji: "\U0000270F"
        sentence: "Дитина малює олівцем."
      - word: "ніж"
        emoji: "\U0001F52A"
        sentence: "Ріжемо хліб ножем."
      - word: "виделка"
        emoji: "\U0001F374"
        sentence: "Їмо м'ясо виделкою."
      - word: "ложка"
        emoji: "\U0001F944"
        sentence: "Суп їмо ложкою."
      - word: "пензлик"
        emoji: "\U0001F58C"
        sentence: "Художник малює пензликом."
      - word: "молоток"
        emoji: "\U0001F528"
        sentence: "Забиваємо цвях молотком."

  - category: "Транспорт"
    items:
      - word: "автобус"
        emoji: "\U0001F68C"
        sentence: "Я їду на роботу автобусом."
      - word: "поїзд"
        emoji: "\U0001F686"
        sentence: "Ми їдемо до Львова поїздом."
      - word: "літак"
        emoji: "\U00002708"
        sentence: "Вони летять літаком."
      - word: "таксі"
        emoji: "\U0001F695"
        sentence: "Вона їде таксі."
      - word: "велосипед"
        emoji: "\U0001F6B2"
        sentence: "Він їздить на роботу велосипедом."
      - word: "метро"
        emoji: "\U0001F687"
        sentence: "У Києві зручно їздити метро."

  - category: "Професії"
    items:
      - word: "лікар"
        emoji: "\U0001F468\U0000200D\U00002695"
        sentence: "Він працює лікарем."
      - word: "вчителька"
        emoji: "\U0001F469\U0000200D\U0001F3EB"
        sentence: "Вона стала вчителькою."
      - word: "журналіст"
        emoji: "\U0001F4F0"
        sentence: "Він працює журналістом."
      - word: "перекладач"
        emoji: "\U0001F310"
        sentence: "Вона працює перекладачем."
      - word: "архітектор"
        emoji: "\U0001F3D7"
        sentence: "Він мріяв стати архітектором."
      - word: "адвокат"
        emoji: "\U00002696"
        sentence: "Вона працює адвокатом."

  - category: "Захоплення"
    items:
      - word: "музика"
        emoji: "\U0001F3B5"
        sentence: "Він захоплюється музикою."
      - word: "історія"
        emoji: "\U0001F4DC"
        sentence: "Вона цікавиться історією."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Утвори орудний відмінок"
    prompt: "Постав іменник в орудний відмінок"
    items:
      - given: "ручка → пишу..."
        answer: "ручкою"
      - given: "олівець → малюю..."
        answer: "олівцем"
      - given: "ніж → ріжу..."
        answer: "ножем"
      - given: "ложка → їм суп..."
        answer: "ложкою"
      - given: "виделка → їм м'ясо..."
        answer: "виделкою"
      - given: "автобус → їду..."
        answer: "автобусом"
      - given: "поїзд → їдемо..."
        answer: "поїздом"
      - given: "літак → летимо..."
        answer: "літаком"
      - given: "велосипед → їздить..."
        answer: "велосипедом"
      - given: "пензлик → малює..."
        answer: "пензликом"
      - given: "молоток → забиваю..."
        answer: "молотком"
      - given: "телефон → дзвоню..."
        answer: "телефоном"
      - given: "мило → мию руки..."
        answer: "милом"
      - given: "рушник → витираю..."
        answer: "рушником"
      - given: "ключ → відкриваю..."
        answer: "ключем"

  - type: build_sentence
    title: "Чим ти їдеш?"
    instruction: "Склади речення про транспорт"
    sentences:
      - words: ["Я", "їду", "на", "роботу", "[автобус/автобусом]", "."]
        correct: "Я їду на роботу автобусом."
      - words: ["Ми", "їдемо", "до", "Львова", "[поїзд/поїздом]", "."]
        correct: "Ми їдемо до Львова поїздом."
      - words: ["Вони", "летять", "[літак/літаком]", "."]
        correct: "Вони летять літаком."
      - words: ["Він", "їздить", "на", "роботу", "[велосипед/велосипедом]", "."]
        correct: "Він їздить на роботу велосипедом."
      - words: ["Вона", "їде", "додому", "[таксі]", "."]
        correct: "Вона їде додому таксі."
      - words: ["Діти", "їдуть", "до", "школи", "[трамвай/трамваєм]", "."]
        correct: "Діти їдуть до школи трамваєм."

  - type: pattern_drill
    title: "Ким він працює?"
    prompt: "Утвори речення про професію"
    items:
      - given: "лікар → він став..."
        answer: "лікарем"
      - given: "вчителька → вона стала..."
        answer: "вчителькою"
      - given: "журналіст → він працює..."
        answer: "журналістом"
      - given: "перекладач → вона працює..."
        answer: "перекладачем"
      - given: "архітектор → він мріяв стати..."
        answer: "архітектором"
      - given: "адвокат → вона працює..."
        answer: "адвокатом"
      - given: "програміст → він став..."
        answer: "програмістом"
      - given: "медсестра → вона працює..."
        answer: "медсестрою"

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "Я пишу ручка."
        answer: false
        correction: "Я пишу ручкою."
      - statement: "Він їде автобусом."
        answer: true
      - statement: "Вона стала вчителькою."
        answer: true
      - statement: "Я ріжу ніж."
        answer: false
        correction: "Я ріжу ножем."
      - statement: "Він працює лікарем."
        answer: true
      - statement: "Ми їмо ложка."
        answer: false
        correction: "Ми їмо ложкою."
      - statement: "Він захоплюється музикою."
        answer: true
      - statement: "Дитина малює олівцем."
        answer: true

  - type: classify
    title: "Яке значення орудного?"
    instruction: "Розподіли: інструмент / транспорт / професія"
    categories:
      - label: "Інструмент (чим?)"
        items:
          - "пишу ручкою"
          - "малюю олівцем"
          - "ріжу ножем"
          - "їм ложкою"
          - "забиваю молотком"
      - label: "Транспорт (чим їду?)"
        items:
          - "їду автобусом"
          - "летимо літаком"
          - "їдемо поїздом"
          - "їздить велосипедом"
      - label: "Професія (ким?)"
        items:
          - "працює лікарем"
          - "стала вчителькою"
          - "працює журналістом"
          - "став архітектором"

  - type: reading
    title: "Читання: Робочий день"
    text: |
      Олег працює архітектором. Вранці він їде на роботу метро. На роботі він малює плани олівцем і ручкою. Іноді працює комп'ютером. На обід їсть суп ложкою і салат виделкою. Після роботи він їде додому автобусом. Увечері Олег захоплюється музикою — грає на гітарі. Його дружина працює перекладачем. Вона цікавиться історією і літературою.
    questions:
      - question: "Ким працює Олег?"
        answer: "Архітектором."
      - question: "Чим він їде на роботу?"
        answer: "Метро."
      - question: "Чим він малює плани?"
        answer: "Олівцем і ручкою."
      - question: "Ким працює його дружина?"
        answer: "Перекладачем."
      - question: "Чим захоплюється Олег?"
        answer: "Музикою."

  - type: proverb_drill
    title: "Прислів'я"
    items:
      - proverb: "За праве діло стій ___."
        answer: "сміло"
