module: cherhuvannia-pryholosni
track: l2-uk-direct
level: a2
type: grammar
title: "Чергування приголосних"
subtitle: "[г]→[ж], [к]→[ч], [х]→[ш] — і коли це відбувається"
standard_ref: "§4.1 — чергування приголосних: [г]/[к]/[х] → [ж]/[ч]/[ш] і [з']/[ц']/[с']"
textbook_ref: "Grade 3 (Вашуленко — чергування приголосних), Grade 4 (відмінювання)"
teaching_notes: |
  Три контексти чергування: місцевий/давальний відмінок, кличний, дієвідмінювання.
  Основні пари: [г→з'→ж], [к→ц'→ч], [х→с'→ш].
  Чергування НЕ за вибором — вони автоматичні, обов'язкові.
  Дайте багато пар для тренування — рука→руці, нога→нозі, друг→друже.
  Починайте з місцевого відмінка (найчастіший контекст).

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Перед певними закінченнями приголосні [г], [к], [х] автоматично змінюються."
  examples:
    - "рука → у руці ([к] → [ц'])"
    - "нога → на нозі ([г] → [з'])"
    - "друг → друже! ([г] → [ж])"
    - "ходити → я ходжу ([д] → [дж])"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Місцевий / давальний відмінок"
    columns: ["Називний", "Місцевий", "Чергування"]
    rows:
      - ["рука", "у руці", "[к] → [ц']"]
      - ["нога", "на нозі", "[г] → [з']"]
      - ["муха", "у мусі", "[х] → [с']"]
      - ["дорога", "на дорозі", "[г] → [з']"]
      - ["книжка", "у книжці", "[к] → [ц']"]
      - ["подруга", "подрузі", "[г] → [з']"]

  - title: "Кличний відмінок"
    columns: ["Називний", "Кличний", "Чергування"]
    rows:
      - ["друг", "друже!", "[г] → [ж]"]
      - ["козак", "козаче!", "[к] → [ч]"]
      - ["пастух", "пастуше!", "[х] → [ш]"]
      - ["юнак", "юначе!", "[к] → [ч]"]

  - title: "Дієвідмінювання (я-форма)"
    columns: ["Інфінітив", "Я-форма", "Чергування"]
    rows:
      - ["ходити", "ходжу", "[д] → [дж]"]
      - ["носити", "ношу", "[с] → [ш]"]
      - ["сидіти", "сиджу", "[д] → [дж]"]
      - ["просити", "прошу", "[с] → [ш]"]
      - ["возити", "вожу", "[з] → [ж]"]
      - ["платити", "плачу", "[т] → [ч]"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Тіло і рух"
    items:
      - word: "рука"
        emoji: "\u270B"
        sentence: "Тримай книгу в руці."
      - word: "нога"
        emoji: "\U0001F9B6"
        sentence: "У мене болить на нозі."
      - word: "ходити"
        emoji: "\U0001F6B6"
        sentence: "Я ходжу до школи щодня."
      - word: "носити"
        emoji: "\U0001F45C"
        sentence: "Я ношу важку сумку."
      - word: "сидіти"
        emoji: "\U0001FA91"
        sentence: "Я сиджу на стільці."

  - category: "Люди і звертання"
    items:
      - word: "друг"
        emoji: "\U0001F91D"
        sentence: "Друже, іди сюди!"
      - word: "подруга"
        emoji: "\U0001F469"
        sentence: "Подрузі подарували квіти."
      - word: "козак"
        emoji: "\u2694\uFE0F"
        sentence: "Козаче, будь хоробрим!"
      - word: "юнак"
        emoji: "\U0001F9D1"
        sentence: "Юначе, допоможи бабусі!"

  - category: "Місця і предмети"
    items:
      - word: "дорога"
        emoji: "\U0001F6E4\uFE0F"
        sentence: "На дорозі лежить камінь."
      - word: "книжка"
        emoji: "\U0001F4D5"
        sentence: "У книжці є гарні малюнки."
      - word: "муха"
        emoji: "\U0001FAB0"
        sentence: "У мусі немає нічого страшного."

  - category: "Дієслова з чергуванням"
    items:
      - word: "просити"
        emoji: "\U0001F64F"
        sentence: "Я прошу допомоги."
      - word: "возити"
        emoji: "\U0001F69A"
        sentence: "Я вожу товар кожного дня."
      - word: "платити"
        emoji: "\U0001F4B0"
        sentence: "Я плачу за каву."
      - word: "водити"
        emoji: "\U0001F697"
        sentence: "Я воджу машину давно."
      - word: "вчити"
        emoji: "\U0001F4DA"
        sentence: "Я вчу нові слова."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Місцевий відмінок"
    prompt: "Постав у місцевий відмінок: на/у ..."
    items:
      - given: "рука → у..."
        answer: "руці"
      - given: "нога → на..."
        answer: "нозі"
      - given: "муха → у..."
        answer: "мусі"
      - given: "дорога → на..."
        answer: "дорозі"
      - given: "книжка → у..."
        answer: "книжці"
      - given: "подруга → на... (подарунок)"
        answer: "подрузі"
      - given: "сорочка → у..."
        answer: "сорочці"
      - given: "берег → на..."
        answer: "березі"
      - given: "поріг → на..."
        answer: "порозі"
      - given: "горох → у..."
        answer: "горосі"
      - given: "ріка → на..."
        answer: "ріці"
      - given: "рука → на..."
        answer: "руці"

  - type: pattern_drill
    title: "Кличний відмінок"
    prompt: "Зверніся до людини: Н.в. → кличний"
    items:
      - given: "друг →"
        answer: "друже!"
      - given: "козак →"
        answer: "козаче!"
      - given: "пастух →"
        answer: "пастуше!"
      - given: "юнак →"
        answer: "юначе!"
      - given: "чоловік →"
        answer: "чоловіче!"
      - given: "брат →"
        answer: "брате!"
      - given: "Бог →"
        answer: "Боже!"
      - given: "вовк →"
        answer: "вовче!"

  - type: pattern_drill
    title: "Дієвідмінювання: я-форма"
    prompt: "Утвори форму першої особи (я)"
    items:
      - given: "ходити → я..."
        answer: "ходжу"
      - given: "носити → я..."
        answer: "ношу"
      - given: "сидіти → я..."
        answer: "сиджу"
      - given: "просити → я..."
        answer: "прошу"
      - given: "возити → я..."
        answer: "вожу"
      - given: "платити → я..."
        answer: "плачу"
      - given: "водити → я..."
        answer: "воджу"
      - given: "їздити → я..."
        answer: "їжджу"
      - given: "любити → я..."
        answer: "люблю"
      - given: "робити → я..."
        answer: "роблю"

  - type: classify
    title: "Який тип чергування?"
    instruction: "Розподіли за типом зміни приголосної"
    categories:
      - label: "[г] → [з'] / [ж]"
        items:
          - "нога → нозі"
          - "друг → друже"
          - "дорога → дорозі"
          - "Бог → Боже"
      - label: "[к] → [ц'] / [ч]"
        items:
          - "рука → руці"
          - "козак → козаче"
          - "юнак → юначе"
          - "книжка → книжці"
      - label: "[х] → [с'] / [ш]"
        items:
          - "муха → мусі"
          - "пастух → пастуше"
          - "горох → горосі"

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "«У руку» — це місцевий відмінок."
        answer: false
        correction: "Місцевий: «у руці». «У руку» — знахідний."
      - statement: "Друг → друже: [г] чергується з [ж]."
        answer: true
      - statement: "Нога → нозі: [г] чергується з [з']."
        answer: true
      - statement: "Ходити → я ходю."
        answer: false
        correction: "Ходити → я ходжу ([д] → [дж])."
      - statement: "Козак → козаче: [к] чергується з [ч]."
        answer: true
      - statement: "Носити → я носю."
        answer: false
        correction: "Носити → я ношу ([с] → [ш])."

  - type: reading
    title: "Читання: Лист від друга"
    text: |
      Друже! Сиджу на березі річки й пишу тобі листа. На дорозі багато людей — усі йдуть на ринок. Я ношу великий кошик із фруктами. Подрузі я купив квіти. Вона просила троянди, і я прошу продавця дати найгарніші. На нозі в мене нові черевики — вони дуже зручні. Ходжу в них цілий день.
    questions:
      - question: "Де сидить автор?"
        answer: "На березі річки."
      - question: "Що він носить?"
        answer: "Великий кошик із фруктами."
      - question: "Що він купив подрузі?"
        answer: "Квіти (троянди)."
      - question: "Що нового на нозі в автора?"
        answer: "Нові черевики."

  - type: tongue_twister
    title: "Скоромовка"
    text: "Черепаха чаплю вечором пригощала чаєм з печивом."
    source: "Grade 5 Litvinova p.141"
