module: naholos-praktyka
track: l2-uk-direct
level: a2
type: practice
title: "Наголос: практика"
subtitle: "Де наголос? Типові помилки наголошування"
standard_ref: "§4.1.5 — stress patterns, common stress errors"
textbook_ref: "Grade 4 (Kravtsova p.4-24 — stress+spelling), Grade 5 (Avramenko §38-39 — stress rules, Litvinova p.166-169 — word lists)"
teaching_notes: |
  Мета: закріпити наголос у найчастіших словах рівня А2.
  Ключова проблема: багато слів наголошуються неправильно навіть носіями (кіломе́тр, не кілометр).
  Підхід Grade 4-5: дати списки типових помилок + вправи на розпізнавання.
  Зв'язок наголос → правопис: ненаголошені [е] і [и] звучать однаково → потрібно знати наголос.
  Мінімальні пари: за́мок/замо́к, о́бласть/обла́сть, а́тлас/атла́с — наголос змінює значення.
  Метод: плескання, відстукування ритму, читання вголос зі знаками наголосу.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Наголос в українській — вільний і рухомий. Неправильний наголос — це орфоепічна помилка."
  examples:
    - "ви́падок (не випа́док)"
    - "кіломе́тр (не кілометр)"
    - "о́лень (не оле́нь)"
    - "подру́га (не по́друга)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Типові помилки наголошування"
    columns: ["Правильно", "Неправильно", "Підказка"]
    rows:
      - ["ви́падок", "випа́док", "на́голос на ВИ"]
      - ["кіломе́тр", "кіло́метр", "на́голос на Е"]
      - ["о́лень", "оле́нь", "на́голос на О"]
      - ["подру́га", "по́друга", "на́голос на У"]
      - ["чита́ння", "чи́тання", "на́голос на А"]
      - ["зав́дання́", "за́вдання", "на́голос на А"]
      - ["одина́дцять", "оди́надцять", "на́голос на -НА-"]
      - ["по́милка", "поми́лка", "на́голос на О"]

  - title: "Мінімальні пари: наголос змінює значення"
    columns: ["Слово 1", "Значення", "Слово 2", "Значення"]
    rows:
      - ["за́мок", "будівля", "замо́к", "на дверях"]
      - ["о́бласть", "регіон", "обла́сть", "сфера"]
      - ["а́тлас", "тканина", "атла́с", "книга мап"]
      - ["за́раз", "одразу", "зара́з", "тепер"]

  - title: "Рухомий наголос у відмінках"
    columns: ["Н.в.", "Р.в.", "Зміна наголосу"]
    rows:
      - ["рука́", "ру́ки", "з кінця на початок"]
      - ["нога́", "но́ги", "з кінця на початок"]
      - ["голова́", "го́лови", "з кінця на початок"]
      - ["стіл", "стола́", "з початку на кінець"]
      - ["ніс", "носа́", "з початку на кінець"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Слова з типовими помилками"
    items:
      - word: "випадок"
        emoji: "\U0001F3B2"
        sentence: "Це був цікавий ви́падок."
      - word: "кілометр"
        emoji: "\U0001F4CF"
        sentence: "До міста п'ять кіломе́трів."
      - word: "олень"
        emoji: "\U0001F98C"
        sentence: "О́лень живе в лісі."
      - word: "подруга"
        emoji: "\U0001F469"
        sentence: "Моя подру́га вивчає мову."
      - word: "читання"
        emoji: "\U0001F4D6"
        sentence: "Чита́ння — моє хобі."
      - word: "завдання"
        emoji: "\U0001F4DD"
        sentence: "Це важке завда́ння."
      - word: "помилка"
        emoji: "\u274C"
        sentence: "Не бійся по́милок."
      - word: "одинадцять"
        emoji: "\U0001F522"
        sentence: "Мені одина́дцять років."

  - category: "Мінімальні пари"
    items:
      - word: "замок"
        emoji: "\U0001F3F0"
        sentence: "За́мок стоїть на горі. Замо́к на дверях."
      - word: "атлас"
        emoji: "\U0001F5FA\uFE0F"
        sentence: "Відкрий атла́с на сторінці десять."
      - word: "область"
        emoji: "\U0001F4CD"
        sentence: "Київська о́бласть — найбільша."

  - category: "Рухомий наголос"
    items:
      - word: "рука"
        emoji: "\u270B"
        sentence: "Рука́ болить. Помий ру́ки!"
      - word: "нога"
        emoji: "\U0001F9B6"
        sentence: "Нога́ болить. Витри но́ги!"
      - word: "голова"
        emoji: "\U0001F9D1"
        sentence: "Голова́ болить. Не ламай го́лови!"
      - word: "стіл"
        emoji: "\U0001F4CF"
        sentence: "Стіл великий. Сядь за стола́."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "На який склад наголос?"
    instruction: "Розподіли слова за місцем наголосу"
    categories:
      - label: "1-й склад"
        items:
          - "ви́падок"
          - "о́лень"
          - "по́милка"
      - label: "2-й склад"
        items:
          - "подру́га"
          - "завда́ння"
          - "чита́ння"
      - label: "3-й склад"
        items:
          - "кіломе́тр"
          - "одина́дцять"
          - "Украї́на"

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "Правильно: випа́док."
        answer: false
        correction: "Правильно: ви́падок."
      - statement: "Правильно: кіломе́тр."
        answer: true
      - statement: "Правильно: оле́нь."
        answer: false
        correction: "Правильно: о́лень."
      - statement: "Правильно: подру́га."
        answer: true
      - statement: "Правильно: за́вдання."
        answer: false
        correction: "Правильно: завда́ння."
      - statement: "Правильно: по́милка."
        answer: true
      - statement: "Правильно: кіло́метр."
        answer: false
        correction: "Правильно: кіломе́тр."
      - statement: "Правильно: одина́дцять."
        answer: true

  - type: pattern_drill
    title: "Мінімальні пари: яке значення?"
    prompt: "Вибери правильне значення для наголошеного слова"
    items:
      - given: "за́мок"
        answer: "будівля"
      - given: "замо́к"
        answer: "на дверях"
      - given: "а́тлас"
        answer: "тканина"
      - given: "атла́с"
        answer: "книга мап"
      - given: "за́раз"
        answer: "одразу, негайно"
      - given: "зара́з"
        answer: "тепер, у цей момент"

  - type: pattern_drill
    title: "Рухомий наголос: зміни форму"
    prompt: "Постав слово в множину і зміни наголос"
    items:
      - given: "рука́ → множина"
        answer: "ру́ки"
      - given: "нога́ → множина"
        answer: "но́ги"
      - given: "голова́ → множина"
        answer: "го́лови"
      - given: "стіл → Р.в."
        answer: "стола́"
      - given: "ніс → Р.в."
        answer: "носа́"
      - given: "рука́ → Д.в."
        answer: "руці́"

  - type: build_sentence
    title: "Вибери слово з правильним наголосом"
    instruction: "Обери слово з правильним наголосом"
    sentences:
      - words: ["Це", "був", "цікавий", "[ви́падок/випа́док]", "."]
        correct: "Це був цікавий ви́падок."
      - words: ["До", "школи", "два", "[кіломе́три/кіло́метри]", "."]
        correct: "До школи два кіломе́три."
      - words: ["Моя", "[подру́га/по́друга]", "живе", "далеко", "."]
        correct: "Моя подру́га живе далеко."
      - words: ["У", "лісі", "живе", "[о́лень/оле́нь]", "."]
        correct: "У лісі живе о́лень."
      - words: ["Не", "бійся", "[по́милок/поми́лок]", "."]
        correct: "Не бійся по́милок."

  - type: reading
    title: "Читання: Наголос має значення"
    text: |
      Микола і його подру́га Оксана поїхали на екскурсію. До за́мку — старої будівлі на горі — п'ять кіломе́трів. Дорогою вони побачили о́леня. Який ви́падок! На дверях за́мку був великий замо́к. Микола зробив по́милку: він забув ключ. Оксана засміялась: «Не хвилюйся, це не біда!» Вони сіли під деревом і дивились на замо́к, який висів на дверях за́мку.
    questions:
      - question: "Скільки кілометрів до замку?"
        answer: "П'ять кілометрів."
      - question: "Кого вони побачили дорогою?"
        answer: "Оленя."
      - question: "Яку помилку зробив Микола?"
        answer: "Він забув ключ."
      - question: "У тексті є два значення слова «замок». Які?"
        answer: "За́мок — будівля. Замо́к — на дверях."

  - type: proverb_drill
    items:
      - proverb: "Не по́милки страшні, а небажа́ння їх виправля́ти."
        answer: "Помилки можна виправити."
    source: "Grade 5 Avramenko"
