module: dialog-praktyka
track: l2-uk-direct
level: a2
type: practice
title: "Діалогова практика"
subtitle: "Розмови на 8–10 реплік: лікарня, банк, магазин, університет"
standard_ref: "§1.4 — діалог 8–10 реплік"
textbook_ref: "Grade 4-5 (діалогічне мовлення, ситуативні діалоги)"
teaching_notes: |
  П'ять ситуацій: у лікаря, в банку, в університеті, в магазині, знайомство.
  Кожен діалог — 8–10 реплік, наближений до реального спілкування.
  Фокус на функціональних фразах: як описати симптоми, як запитати про послуги.
  Давайте готові фрази-кліше для кожної ситуації.
  Вправи: прочитати діалог, доповнити пропущені репліки, класифікувати фрази за ситуацією.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Діалог = репліки двох людей по черзі. Кожна ситуація має свої типові фрази."
  examples:
    - "У лікаря: У мене болить голова."
    - "У магазині: Скільки це коштує?"
    - "Знайомство: Звідки ви? Чим ви займаєтесь?"

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "У лікаря"
    items:
      - word: "боліти"
        emoji: "\U0001FA79"
        sentence: "У мене болить горло."
      - word: "температура"
        emoji: "\U0001F321\uFE0F"
        sentence: "У мене висока температура."
      - word: "рецепт"
        emoji: "\U0001F4DD"
        sentence: "Лікар виписав рецепт."
      - word: "ліки"
        emoji: "\U0001F48A"
        sentence: "Треба купити ліки в аптеці."
      - word: "скарга"
        emoji: "\U0001F61F"
        sentence: "Які у вас скарги?"

  - category: "У банку"
    items:
      - word: "рахунок"
        emoji: "\U0001F4B3"
        sentence: "Я хочу відкрити рахунок."
      - word: "картка"
        emoji: "\U0001F4B3"
        sentence: "Мені потрібна банківська картка."
      - word: "переказ"
        emoji: "\U0001F4B8"
        sentence: "Я хочу зробити переказ."
      - word: "курс"
        emoji: "\U0001F4B1"
        sentence: "Який курс долара сьогодні?"
      - word: "готівка"
        emoji: "\U0001F4B5"
        sentence: "Мені потрібна готівка."

  - category: "В університеті"
    items:
      - word: "курс"
        emoji: "\U0001F4DA"
        sentence: "Які курси є на цьому факультеті?"
      - word: "розклад"
        emoji: "\U0001F4C5"
        sentence: "Де можна побачити розклад занять?"
      - word: "залік"
        emoji: "\u2705"
        sentence: "Коли буде залік?"
      - word: "гуртожиток"
        emoji: "\U0001F3E2"
        sentence: "Де знаходиться гуртожиток?"
      - word: "бібліотека"
        emoji: "\U0001F4DA"
        sentence: "Бібліотека працює до 20:00."

  - category: "У магазині"
    items:
      - word: "коштувати"
        emoji: "\U0001F4B0"
        sentence: "Скільки коштує ця сорочка?"
      - word: "знижка"
        emoji: "\U0001F3F7\uFE0F"
        sentence: "Чи є знижка на цей товар?"
      - word: "розмір"
        emoji: "\U0001F4CF"
        sentence: "Який у вас розмір?"
      - word: "приміряти"
        emoji: "\U0001F6CD\uFE0F"
        sentence: "Чи можна приміряти?"
      - word: "повернути"
        emoji: "\U0001F504"
        sentence: "Я хочу повернути цю річ."

  - category: "Знайомство"
    items:
      - word: "звідки"
        emoji: "\U0001F30D"
        sentence: "Звідки ви?"
      - word: "займатися"
        emoji: "\U0001F4BC"
        sentence: "Чим ви займаєтесь?"
      - word: "познайомитися"
        emoji: "\U0001F91D"
        sentence: "Приємно познайомитися!"
      - word: "фах"
        emoji: "\U0001F3AF"
        sentence: "Який ваш фах?"
      - word: "цікавитися"
        emoji: "\U0001F9D0"
        sentence: "Чим ви цікавитесь?"

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: reading
    title: "Діалог 1: У лікаря"
    text: |
      — Добрий день! Сідайте. Які у вас скарги?
      — Добрий день. У мене болить голова вже три дні.
      — У вас є температура?
      — Так, вчора була 37,5.
      — А горло болить?
      — Трохи. І кашель є.
      — Зрозуміло. Я вас огляну. Відкрийте рот, будь ласка.
      — Добре.
      — У вас застуда. Я виписую рецепт. Пийте багато теплої води.
      — Дякую, лікарю! До побачення.
    questions:
      - question: "Що болить у пацієнта?"
        answer: "Голова."
      - question: "Яка була температура?"
        answer: "37,5."
      - question: "Який діагноз?"
        answer: "Застуда."

  - type: reading
    title: "Діалог 2: У банку"
    text: |
      — Добрий день! Чим можу допомогти?
      — Добрий день. Я хочу відкрити банківський рахунок.
      — Який рахунок — в гривнях чи в доларах?
      — В гривнях, будь ласка.
      — Мені потрібен ваш паспорт.
      — Ось, будь ласка.
      — Дякую. Чи хочете також банківську картку?
      — Так, будь ласка. Скільки це коштує?
      — Картка безкоштовна. Ви отримаєте її за три дні.
      — Чудово, дякую!
    questions:
      - question: "Що хоче клієнт?"
        answer: "Відкрити банківський рахунок."
      - question: "В якій валюті?"
        answer: "В гривнях."
      - question: "Коли клієнт отримає картку?"
        answer: "За три дні."

  - type: reading
    title: "Діалог 3: У магазині одягу"
    text: |
      — Добрий день! Вам допомогти?
      — Так. Мені потрібна зимова куртка.
      — Який у вас розмір?
      — М або L — я не впевнений.
      — Ось ця куртка є в обох розмірах. Хочете приміряти?
      — Так, будь ласка. А скільки вона коштує?
      — 2500 гривень. Але зараз знижка 20 відсотків.
      — О, це добре! Я візьму розмір М.
      — Чудово! Платите карткою чи готівкою?
      — Карткою, будь ласка.
    questions:
      - question: "Що шукає покупець?"
        answer: "Зимову куртку."
      - question: "Яка знижка?"
        answer: "20 відсотків."
      - question: "Як він платить?"
        answer: "Карткою."

  - type: build_sentence
    title: "Доповни діалог"
    instruction: "Обери правильну репліку"
    sentences:
      - words: ["—", "Які", "у", "вас", "скарги", "?", "—", "У", "мене", "болить", "[голова/лікар]", "."]
        correct: "— Які у вас скарги? — У мене болить голова."
      - words: ["—", "Який", "у", "вас", "розмір", "?", "—", "[М/куртка]", "."]
        correct: "— Який у вас розмір? — М."
      - words: ["—", "Скільки", "це", "коштує", "?", "—", "[500/будь ласка]", "гривень", "."]
        correct: "— Скільки це коштує? — 500 гривень."
      - words: ["—", "Звідки", "ви", "?", "—", "Я", "з", "[Києва/добре]", "."]
        correct: "— Звідки ви? — Я з Києва."

  - type: pattern_drill
    title: "Ситуативні відповіді"
    prompt: "Що ви скажете в цій ситуації?"
    items:
      - given: "Ви прийшли до лікаря. Що ви кажете?"
        answer: "Добрий день. У мене болить..."
      - given: "Ви хочете купити сорочку. Як запитати ціну?"
        answer: "Скільки коштує ця сорочка?"
      - given: "Ви в банку. Як попросити відкрити рахунок?"
        answer: "Я хочу відкрити рахунок."
      - given: "Ви знайомитесь. Як запитати про роботу?"
        answer: "Чим ви займаєтесь?"
      - given: "Ви в магазині. Як попросити приміряти?"
        answer: "Чи можна приміряти?"

  - type: classify
    title: "Яка ситуація?"
    instruction: "Розподіли фрази за ситуацією"
    categories:
      - label: "У лікаря"
        items:
          - "У мене болить голова."
          - "Яка у вас температура?"
          - "Я виписую рецепт."
      - label: "У банку"
        items:
          - "Я хочу відкрити рахунок."
          - "Який курс долара?"
          - "Мені потрібна картка."
      - label: "У магазині"
        items:
          - "Скільки це коштує?"
          - "Чи можна приміряти?"
          - "Який у вас розмір?"
      - label: "Знайомство"
        items:
          - "Звідки ви?"
          - "Чим ви займаєтесь?"
          - "Приємно познайомитися!"
