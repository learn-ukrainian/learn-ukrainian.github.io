module: davalnyi-osobovi
track: l2-uk-direct
level: a2
type: grammar
title: "Давальний: особові займенники"
subtitle: "Мені, тобі, йому, їй, нам, вам, їм — займенники в давальному відмінку"
standard_ref: "§4.2.1.4 — pronoun declension, dative"
textbook_ref: "Grade 4 — personal pronoun dative forms"
teaching_notes: |
  Сім форм: мені, тобі, йому, їй, нам, вам, їм — вчіть як готові блоки.
  Три контексти: подобається (мені подобається), потрібно/треба (мені треба), стан (мені холодно).
  Повторіть «подобається» з A1 — тепер з усіма займенниками, не тільки «мені».
  Комунікативний контекст: скажи мені, напишу тобі, подзвонив їй.
  Не плутайте давальний і родовий: мені (Д.в.) vs мене (Р.в./Зн.в.).

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Я → мені, ти → тобі, він → йому, вона → їй, ми → нам, ви → вам, вони → їм."
  examples:
    - "Мені подобається Київ."
    - "Тобі потрібно відпочити."
    - "Їй холодно."

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Особові займенники в давальному відмінку"
    columns: ["Називний", "Давальний", "Приклад"]
    rows:
      - ["я", "мені", "Мені подобається."]
      - ["ти", "тобі", "Тобі потрібно відпочити."]
      - ["він", "йому", "Йому двадцять років."]
      - ["вона", "їй", "Їй холодно."]
      - ["ми", "нам", "Нам треба йти."]
      - ["ви", "вам", "Вам допомогти?"]
      - ["вони", "їм", "Їм весело."]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Займенники (давальний)"
    items:
      - word: "мені"
        emoji: "\U0001F9D1"
        sentence: "Мені подобається ця музика."
      - word: "тобі"
        emoji: "\U0001F449"
        sentence: "Тобі подобається Київ?"
      - word: "йому"
        emoji: "\U0001F468"
        sentence: "Йому двадцять п'ять років."
      - word: "їй"
        emoji: "\U0001F469"
        sentence: "Їй тепло в куртці."
      - word: "нам"
        emoji: "\U0001F46B"
        sentence: "Нам треба поспішати."
      - word: "вам"
        emoji: "\U0001F64B"
        sentence: "Вам допомогти?"
      - word: "їм"
        emoji: "\U0001F46C"
        sentence: "Їм весело разом."

  - category: "Стани"
    items:
      - word: "холодно"
        emoji: "\U00002744"
        sentence: "Мені холодно — де моя куртка?"
      - word: "тепло"
        emoji: "\U00002600"
        sentence: "Тобі тепло біля каміна?"
      - word: "весело"
        emoji: "\U0001F604"
        sentence: "Нам весело на святі."
      - word: "сумно"
        emoji: "\U0001F622"
        sentence: "Йому сумно без друзів."
      - word: "цікаво"
        emoji: "\U0001F914"
        sentence: "Їй цікаво вчити мови."
      - word: "важко"
        emoji: "\U0001F4AA"
        sentence: "Нам важко без допомоги."
      - word: "легко"
        emoji: "\U0001F44C"
        sentence: "Мені легко розмовляти українською."

  - category: "Потреби"
    items:
      - word: "потрібно"
        emoji: "\U00002757"
        sentence: "Мені потрібно купити продукти."
      - word: "треба"
        emoji: "\U00002757"
        sentence: "Тобі треба відпочити."
      - word: "подобатися"
        emoji: "\U00002764"
        sentence: "Їм подобається український борщ."

  - category: "Комунікація"
    items:
      - word: "сказати"
        emoji: "\U0001F5E3"
        sentence: "Скажи мені правду."
      - word: "написати"
        emoji: "\U0000270D"
        sentence: "Я напишу тобі листа."
      - word: "подзвонити"
        emoji: "\U0001F4DE"
        sentence: "Він подзвонив їй увечері."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Називний → давальний"
    prompt: "Зміни займенник на давальний відмінок"
    items:
      - given: "я → подобається..."
        answer: "мені подобається"
      - given: "ти → потрібно..."
        answer: "тобі потрібно"
      - given: "він → холодно..."
        answer: "йому холодно"
      - given: "вона → весело..."
        answer: "їй весело"
      - given: "ми → треба..."
        answer: "нам треба"
      - given: "ви → допомогти..."
        answer: "вам допомогти"
      - given: "вони → цікаво..."
        answer: "їм цікаво"

  - type: build_sentence
    title: "Як ти себе почуваєш?"
    instruction: "Склади речення про стан"
    sentences:
      - words: ["[Я/Мені]", "холодно", "."]
        correct: "Мені холодно."
      - words: ["[Він/Йому]", "сумно", "без", "друзів", "."]
        correct: "Йому сумно без друзів."
      - words: ["[Вона/Їй]", "весело", "на", "святі", "."]
        correct: "Їй весело на святі."
      - words: ["[Ми/Нам]", "треба", "йти", "."]
        correct: "Нам треба йти."
      - words: ["[Ти/Тобі]", "подобається", "ця", "книга", "?"]
        correct: "Тобі подобається ця книга?"
      - words: ["[Вони/Їм]", "потрібно", "відпочити", "."]
        correct: "Їм потрібно відпочити."
      - words: ["[Ви/Вам]", "тепло", "?"]
        correct: "Вам тепло?"
      - words: ["[Я/Мені]", "потрібно", "працювати", "."]
        correct: "Мені потрібно працювати."

  - type: pattern_drill
    title: "Мені потрібно..."
    prompt: "Утвори речення з «потрібно» або «треба»"
    items:
      - given: "я + купити хліб"
        answer: "Мені потрібно купити хліб."
      - given: "ти + відпочити"
        answer: "Тобі потрібно відпочити."
      - given: "він + працювати"
        answer: "Йому потрібно працювати."
      - given: "вона + вивчити урок"
        answer: "Їй потрібно вивчити урок."
      - given: "ми + поспішати"
        answer: "Нам треба поспішати."
      - given: "ви + зателефонувати"
        answer: "Вам потрібно зателефонувати."
      - given: "вони + повернутися"
        answer: "Їм потрібно повернутися."

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "Він подзвонив вона."
        answer: false
        correction: "Він подзвонив їй."
      - statement: "Мені подобається ця пісня."
        answer: true
      - statement: "Тобі треба відпочити."
        answer: true
      - statement: "Я холодно."
        answer: false
        correction: "Мені холодно."
      - statement: "Нам весело."
        answer: true
      - statement: "Скажи я правду."
        answer: false
        correction: "Скажи мені правду."
      - statement: "Їм подобається борщ."
        answer: true
      - statement: "Вам допомогти?"
        answer: true

  - type: classify
    title: "Хто це в давальному?"
    instruction: "З'єднай називний і давальний"
    categories:
      - label: "я → мені"
        items:
          - "Мені подобається."
          - "Мені потрібно."
      - label: "ти → тобі"
        items:
          - "Тобі холодно?"
          - "Тобі треба."
      - label: "він → йому"
        items:
          - "Йому двадцять."
          - "Йому сумно."
      - label: "вона → їй"
        items:
          - "Їй весело."
          - "Їй подобається."
      - label: "ми → нам"
        items:
          - "Нам треба йти."
      - label: "ви → вам"
        items:
          - "Вам тепло?"
      - label: "вони → їм"
        items:
          - "Їм цікаво."

  - type: reading
    title: "Читання: Телефонна розмова"
    text: |
      — Привіт! Як справи?
      — Привіт! Мені добре, дякую. А тобі?
      — Мені теж непогано. Слухай, нам треба зустрітися. Мені потрібно розповісти тобі щось важливе.
      — Добре. Коли тобі зручно?
      — Може, завтра? Їй — я про Олю — теж цікаво. Вона хоче приєднатися.
      — Чудово! Скажи їй, що нам зустрітися о п'ятій. Їм — Тарасові і Марку — теж напишу.
      — Домовилися! До завтра!
    questions:
      - question: "Як почувається перший друг?"
        answer: "Йому добре."
      - question: "Що потрібно зробити?"
        answer: "Їм потрібно зустрітися."
      - question: "Хто ще хоче приєднатися?"
        answer: "Оля — їй теж цікаво."
      - question: "О котрій годині зустріч?"
        answer: "О п'ятій."

  - type: proverb_drill
    title: "Прислів'я"
    items:
      - proverb: "Берися дружно — не буде ___."
        answer: "сутужно"
