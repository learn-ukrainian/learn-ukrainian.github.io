      - word: "від'їхати"
        emoji: "\U0001F68C"
        sentence: "Поїзд від'їхав від платформи."

  - category: "Місця (куди/звідки)"
    items:
      - word: "зупинка"
        emoji: "\U0001F68F"
        sentence: "Він дійшов до зупинки."
      - word: "вокзал"
        emoji: "\U0001F689"
        sentence: "Поїзд приїхав на вокзал."
      - word: "площа"
        emoji: "\U0001F3D9"
        sentence: "Ми перейшли через площу."
      - word: "вулиця"
        emoji: "\U0001F6E4"
        sentence: "Вони перейшли вулицю."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Значення префікса"
    instruction: "Розподіли дієслова за значенням префікса"
    categories:
      - label: "Прибуття (при-)"
        items:
          - "прийти"
          - "приїхати"
      - label: "Вихід (ви-)"
        items:
          - "вийти"
          - "виїхати"
      - label: "Захід (за-)"
        items:
          - "зайти"
          - "заїхати"
      - label: "Перехід (пере-)"
        items:
          - "перейти"
          - "переїхати"
      - label: "Дістатися (до-)"
        items:
          - "дійти"
          - "доїхати"
      - label: "Віддалення (від-)"
        items:
          - "відійти"
          - "від'їхати"

  - type: pattern_drill
    title: "Префікс + основа"
    prompt: "Утвори дієслово: префікс + основа"
    items:
      - given: "при- + іти"
        answer: "прийти"
      - given: "ви- + іти"
        answer: "вийти"
      - given: "за- + іти"
        answer: "зайти"
      - given: "пере- + іти"
        answer: "перейти"
      - given: "до- + іти"
        answer: "дійти"
      - given: "від- + іти"
        answer: "відійти"
      - given: "при- + їхати"
        answer: "приїхати"
      - given: "ви- + їхати"
        answer: "виїхати"
      - given: "за- + їхати"
        answer: "заїхати"
      - given: "пере- + їхати"
        answer: "переїхати"
      - given: "до- + їхати"
        answer: "доїхати"
      - given: "від- + їхати"
        answer: "від'їхати"
      - given: "по- + іти"
        answer: "піти"
      - given: "по- + їхати"
        answer: "поїхати"
      - given: "об- + іти"
        answer: "обійти"
      - given: "об- + їхати"
        answer: "об'їхати"

  - type: build_sentence
    title: "Розкажи маршрут"
    instruction: "Обери правильне дієслово для кожного кроку"
    sentences:
      - words: ["Він", "[вийшов/зайшов]", "із", "готелю", "."]
        correct: "Він вийшов із готелю."
      - words: ["Ми", "[перейшли/прийшли]", "через", "площу", "."]
        correct: "Ми перейшли через площу."
      - words: ["Вона", "[зайшла/вийшла]", "в", "музей", "."]
        correct: "Вона зайшла в музей."
      - words: ["Він", "[дійшов/відійшов]", "до", "зупинки", "."]
        correct: "Він дійшов до зупинки."
      - words: ["Автобус", "[від'їхав/приїхав]", "від", "зупинки", "."]
        correct: "Автобус від'їхав від зупинки."

  - type: true_false
    title: "Правильно чи ні?"
    items:
      - statement: "«Вийти» означає увійти."
        answer: false
        correction: "«Вийти» означає піти з приміщення. Увійти = зайти."
      - statement: "«Перейти дорогу» означає перетнути дорогу."
        answer: true
      - statement: "«Прийти» — це доконаний вид."
        answer: true
      - statement: "«Дійти» означає вирушити."
        answer: false
        correction: "«Дійти» означає дістатися до місця. Вирушити = піти/поїхати."
      - statement: "«Зайти в магазин» означає зайти ненадовго."
        answer: true

  - type: pattern_drill
    title: "Обери правильний префікс"
    prompt: "Який префікс підходить до контексту?"
    items:
      - given: "Він ___ до магазину, купив хліб і ___ додому. (зайшов / повернувся)"
        answer: "зайшов... повернувся"
      - given: "Ми ___ із будинку і ___ через парк. (вийшли / пройшли)"
        answer: "вийшли... пройшли"
      - given: "Вона ___ на роботу о дев'ятій. (прийшла)"
        answer: "прийшла"
      - given: "Поїзд ___ від платформи. (від'їхав)"
        answer: "від'їхав"
      - given: "Такі ___ на стоянку. (заїхало)"
        answer: "заїхало"

  - type: reading
    title: "Читання: Прогулянка містом"
    text: |
      Ми вийшли з готелю о десятій ранку. Спочатку перейшли через площу. Потім зайшли в маленьку кав'ярню і випили каву. Після кав'ярні пішли далі. Ми дійшли до старого замку і обійшли його навколо. Біля замку Марія побачила музей. Вона зайшла туди, а я пішов далі. Через годину вона прийшла до парку, де я чекав. Увечері ми доїхали до вокзалу на таксі. Поїзд від'їхав рівно о восьмій.
    questions:
      - question: "Коли вони вийшли з готелю?"
        answer: "О десятій ранку."
      - question: "Куди вони зайшли після площі?"
        answer: "У маленьку кав'ярню."
      - question: "Що вони зробили біля замку?"
        answer: "Обійшли його навколо."
      - question: "Як вони доїхали до вокзалу?"
        answer: "На таксі."
