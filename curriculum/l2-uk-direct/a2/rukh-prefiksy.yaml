module: rukh-prefiksy
track: l2-uk-direct
level: a2
type: grammar
title: "Дієслова руху з префіксами"
subtitle: "При-, ви-, за-, пере-, до-, від- — прийти, вийти, зайти, перейти"
standard_ref: "\xA74.3.1 — prefixed motion: прийти, перейти, дійти, відійти, зайти, вийти"
textbook_ref: "Grade 4 — prefixed motion verbs"
teaching_notes: |
  Префікси змінюють значення базового дієслова руху: при- (прибуття), ви- (вихід), за- (захід), пере- (перехід).
  Усі префіксовані дієслова руху — доконаного виду (результат).
  Навчайте через маршрут: «Вийшов із дому, перейшов дорогу, зайшов у магазин, прийшов додому».
  Працюйте з двома базами: іти \u2192 прийти/вийти і їхати \u2192 приїхати/виїхати.
  Візуалізація: малюйте маршрут із позначками напрямків.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Префікс + дієслово руху = нове значення (доконаний вид). при- = прибуття, ви- = вихід, за- = захід, пере- = перехід."
  examples:
    - "Я прийшов додому. (при- + іти = прибути)"
    - "Він вийшов із кімнати. (ви- + іти = піти з)"
    - "Ми перейшли через дорогу. (пере- + іти = перетнути)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Префікси дієслів руху"
    columns: ["Префікс", "Значення", "іти \u2192", "їхати \u2192"]
    rows:
      - ["при-", "прибути", "прийти", "приїхати"]
      - ["ви-", "вийти, виїхати", "вийти", "виїхати"]
      - ["за-", "зайти, заїхати", "зайти", "заїхати"]
      - ["пере-", "перейти, перетнути", "перейти", "переїхати"]
      - ["до-", "дістатися", "дійти", "доїхати"]
      - ["від-", "відійти, віддалитися", "відійти", "від'їхати"]
      - ["по-", "вирушити", "піти", "поїхати"]
      - ["об-", "обійти", "обійти", "об'їхати"]

  - title: "Відмінювання: прийти (минулий час)"
    columns: ["Особа", "Чоловічий", "Жіночий", "Множина"]
    rows:
      - ["він/вона/вони", "прийшов", "прийшла", "прийшли"]
      - ["я (чол.)", "прийшов", "—", "—"]
      - ["я (жін.)", "—", "прийшла", "—"]

  - title: "Відмінювання: вийти (минулий час)"
    columns: ["Особа", "Чоловічий", "Жіночий", "Множина"]
    rows:
      - ["він/вона/вони", "вийшов", "вийшла", "вийшли"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Префіксовані дієслова (іти)"
    items:
      - word: "прийти"
        emoji: "\U000027A1"
        sentence: "Він прийшов додому о шостій."
      - word: "вийти"
        emoji: "\U0001F6AA"
        sentence: "Вона вийшла з кімнати."
      - word: "зайти"
        emoji: "\U0001F6D2"
        sentence: "Я зайшов у магазин."
      - word: "перейти"
        emoji: "\U0001F6B6"
        sentence: "Ми перейшли через дорогу."
      - word: "дійти"
        emoji: "\U0001F3C1"
        sentence: "Він дійшов до зупинки."
      - word: "відійти"
        emoji: "\U00002B05"
        sentence: "Автобус відійшов від зупинки."
      - word: "піти"
        emoji: "\U0001F44B"
        sentence: "Вона пішла на роботу."
      - word: "обійти"
        emoji: "\U0001F504"
        sentence: "Ми обійшли будинок."

  - category: "Префіксовані дієслова (їхати)"
    items:
      - word: "приїхати"
        emoji: "\U0001F697"
        sentence: "Гості приїхали ввечері."
      - word: "виїхати"
        emoji: "\U0001F698"
        sentence: "Вони виїхали з міста вранці."
      - word: "заїхати"
        emoji: "\U0001F699"
        sentence: "Таксі заїхало на стоянку."
      - word: "переїхати"
        emoji: "\U0001F69A"
        sentence: "Родина переїхала до нового міста."
      - word: "доїхати"
        emoji: "\U0001F3C1"
