module: zaimennyky-povni
track: l2-uk-direct
level: a2
type: grammar
title: "Займенники: повна відміна"
subtitle: "Особові займенники в усіх відмінках"
standard_ref: "§4.2.1.4 — повна парадигма займенників"
textbook_ref: "Grade 4 p.126–133 — відмінювання особових займенників"
teaching_notes: |
  Подаємо повну таблицю всіх 7 відмінків для кожного особового займенника.
  Головне правило: після прийменника третя особа додає н- (його → нього, їй → ній).
  Починайте з найчастіших форм (мене, тебе, його) і лише потім переходьте до орудного й місцевого.
  Давайте багато речень-моделей із контекстом: «Я бачу його», «Дай це мені», «Він іде з нами».
  Порівняйте родовий і знахідний (для він/вона/вони — однакові форми).

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Займенник змінює форму залежно від відмінка. Після прийменника третя особа додає н-."
  examples:
    - "Я бачу його. → Я дивлюся на нього."
    - "Дай це мені."
    - "Ми говоримо про неї."

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Однина: я, ти, він, вона"
    columns: ["Відмінок", "я", "ти", "він", "вона"]
    rows:
      - ["Н.в.", "я", "ти", "він", "вона"]
      - ["Р.в.", "мене", "тебе", "його/нього", "її/неї"]
      - ["Д.в.", "мені", "тобі", "йому/ньому", "їй/ній"]
      - ["Зн.в.", "мене", "тебе", "його/нього", "її/неї"]
      - ["О.в.", "мною", "тобою", "ним", "нею"]
      - ["М.в.", "на мені", "на тобі", "на ньому", "на ній"]

  - title: "Множина: ми, ви, вони"
    columns: ["Відмінок", "ми", "ви", "вони"]
    rows:
      - ["Н.в.", "ми", "ви", "вони"]
      - ["Р.в.", "нас", "вас", "їх/них"]
      - ["Д.в.", "нам", "вам", "їм/нім"]
      - ["Зн.в.", "нас", "вас", "їх/них"]
      - ["О.в.", "нами", "вами", "ними"]
      - ["М.в.", "на нас", "на вас", "на них"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Дієслова з додатком"
    items:
      - word: "бачити"
        emoji: "\U0001F441"
        sentence: "Я бачу його щодня."
      - word: "чекати"
        emoji: "\U0000231B"
        sentence: "Ми чекаємо на тебе."
      - word: "допомагати"
        emoji: "\U0001F91D"
        sentence: "Вона допомагає мені."
      - word: "запрошувати"
        emoji: "\U0001F4E8"
        sentence: "Я запрошую їх на вечерю."
      - word: "пам'ятати"
        emoji: "\U0001F9E0"
        sentence: "Ти пам'ятаєш нас?"
      - word: "розповідати"
        emoji: "\U0001F5E3"
        sentence: "Він розповідає їй про поїздку."
      - word: "дякувати"
        emoji: "\U0001F64F"
        sentence: "Ми дякуємо вам за допомогу."

  - category: "Прийменники"
    items:
      - word: "для"
        emoji: "\U0001F381"
        sentence: "Це подарунок для нього."
      - word: "без"
        emoji: "\U0000274C"
        sentence: "Вона прийшла без них."
      - word: "з (разом)"
        emoji: "\U0001F46B"
        sentence: "Я іду з тобою."
      - word: "про"
        emoji: "\U0001F4AC"
        sentence: "Ми говоримо про неї."
      - word: "до"
        emoji: "\U000027A1"
        sentence: "Він прийшов до нас."
      - word: "після"
        emoji: "\U0001F55B"
        sentence: "Після нього прийшла Оля."

  - category: "Питальні слова"
    items:
      - word: "кого"
        emoji: "\U00002753"
        sentence: "Кого ти бачиш?"
      - word: "кому"
        emoji: "\U00002753"
        sentence: "Кому ти телефонуєш?"
      - word: "ким"
        emoji: "\U00002753"
        sentence: "Ким ви працюєте?"
      - word: "на кому"
        emoji: "\U00002753"
        sentence: "На кому ця відповідальність?"

  - category: "Корисні вирази"
    items:
      - word: "разом"
        emoji: "\U0001F46D"
        sentence: "Ми робимо це разом з ними."
      - word: "замість"
        emoji: "\U0001F504"
        sentence: "Замість нього прийшов Тарас."
      - word: "навколо"
        emoji: "\U0001F504"
        sentence: "Навколо нас було тихо."
      - word: "між"
        emoji: "\U00002194"
        sentence: "Між нами все добре."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Відмінюй «він» через усі відмінки"
    prompt: "Постав займенник «він» у потрібний відмінок"
    items:
      - given: "Н.в. — хто?"
        answer: "він"
      - given: "Р.в. — кого? (без прийменника)"
        answer: "його"
      - given: "Д.в. — кому?"
        answer: "йому"
      - given: "Зн.в. — кого? (без прийменника)"
        answer: "його"
      - given: "О.в. — ким?"
        answer: "ним"
      - given: "М.в. — на кому?"
        answer: "на ньому"
      - given: "Р.в. — від кого? (з прийменником)"
        answer: "від нього"

  - type: pattern_drill
    title: "Відмінюй «вона» через усі відмінки"
    prompt: "Постав займенник «вона» у потрібний відмінок"
    items:
      - given: "Н.в. — хто?"
        answer: "вона"
      - given: "Р.в. — кого? (без прийменника)"
        answer: "її"
      - given: "Д.в. — кому?"
        answer: "їй"
      - given: "Зн.в. — кого? (без прийменника)"
        answer: "її"
      - given: "О.в. — ким?"
        answer: "нею"
      - given: "М.в. — на кому?"
        answer: "на ній"
      - given: "Д.в. — до кого? (з прийменником)"
        answer: "до неї"

  - type: classify
    title: "Визнач відмінок за формою"
    instruction: "Розподіли форми займенників за відмінками"
    categories:
      - label: "Родовий / Знахідний (КОГО?)"
        items:
          - "мене"
          - "тебе"
          - "його"
          - "нас"
      - label: "Давальний (КОМУ?)"
        items:
          - "мені"
          - "тобі"
          - "йому"
          - "нам"
      - label: "Орудний (КИМ?)"
        items:
          - "мною"
          - "тобою"
          - "ним"
          - "нами"

  - type: build_sentence
    title: "Встав правильну форму займенника"
    instruction: "Обери правильну форму"
    sentences:
      - words: ["Я", "бачу", "[він/його/йому]", "."]
        correct: "Я бачу його."
      - words: ["Ми", "говоримо", "про", "[вона/неї/її]", "."]
        correct: "Ми говоримо про неї."
      - words: ["Він", "іде", "з", "[ми/нами/нас]", "."]
        correct: "Він іде з нами."
      - words: ["Це", "подарунок", "для", "[ти/тобою/тебе]", "."]
        correct: "Це подарунок для тебе."
      - words: ["Вона", "допомагає", "[я/мені/мною]", "."]
        correct: "Вона допомагає мені."
      - words: ["Дякую", "[ви/вам/вами]", "за", "все", "."]
        correct: "Дякую вам за все."

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "Після прийменника «з» правильно: з його."
        answer: false
        correction: "Правильно: з нього. Після прийменника третя особа додає н-."
      - statement: "«Мені» — це давальний відмінок займенника «я»."
        answer: true
      - statement: "«На ній» — це місцевий відмінок займенника «вона»."
        answer: true
      - statement: "Форми родового і знахідного для «він» однакові: його."
        answer: true
      - statement: "«Їм» — це давальний відмінок «вони» (з прийменником)."
        answer: false
        correction: "Після прийменника: нім. Без прийменника: їм."
      - statement: "«Тобою» — це орудний відмінок займенника «ти»."
        answer: true

  - type: reading
    title: "Читання: Друзі"
    text: |
      Оля і Тарас — друзі. Вони знають одне одного давно. Оля часто телефонує йому. Тарас завжди допомагає їй. Учора Оля запросила його на вечерю. Він прийшов до неї з квітами. Вона дуже зраділа. Вони провели вечір разом і говорили про все: про роботу, про подорожі, про друзів. Було дуже весело з ними.
    questions:
      - question: "Кому Оля часто телефонує?"
        answer: "Тарасу (йому)."
      - question: "З чим Тарас прийшов до неї?"
        answer: "З квітами."
      - question: "Про що вони говорили?"
        answer: "Про роботу, подорожі і друзів."
