module: robota
track: l2-uk-direct
level: a2
type: vocabulary
title: "Робота"
subtitle: "Професії, робоче місце, графік, зарплата"
standard_ref: "Каталог Б — Робота"
textbook_ref: "Grade 3–4 — професії, робоче середовище"
teaching_notes: |
  Ключове питання: «Ким ви працюєте?» — відповідь в орудному відмінку (програмістом, вчителькою).
  Друге питання: «Де ви працюєте?» — в/у + місцевий (в офісі, у лікарні, на заводі).
  Зверніть увагу на прийменник: «в» — для закритих приміщень, «на» — для відкритих або великих підприємств.
  Робочий графік — повторення часу: «починається о дев'ятій», «закінчується о шостій».
  Формальна лексика: колега, начальник, відпустка, зарплата.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Ким ви працюєте? — Я працюю [орудний]. Де? — В/у/на [місцевий]."
  examples:
    - "Я працюю програмістом в офісі."
    - "Вона працює лікаркою у лікарні."
    - "Він працює на заводі."

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Професії"
    items:
      - word: "програміст"
        emoji: "\U0001F4BB"
        sentence: "Програміст пише код."
      - word: "дизайнер"
        emoji: "\U0001F3A8"
        sentence: "Дизайнер створює макети."
      - word: "юрист"
        emoji: "\U00002696"
        sentence: "Юрист знає закони."
      - word: "бухгалтер"
        emoji: "\U0001F4C8"
        sentence: "Бухгалтер рахує гроші."
      - word: "менеджер"
        emoji: "\U0001F4BC"
        sentence: "Менеджер керує проєктом."
      - word: "фармацевт"
        emoji: "\U0001F48A"
        sentence: "Фармацевт працює в аптеці."
      - word: "стоматолог"
        emoji: "\U0001F9B7"
        sentence: "Стоматолог лікує зуби."
      - word: "ветеринар"
        emoji: "\U0001F43E"
        sentence: "Ветеринар лікує тварин."
      - word: "пілот"
        emoji: "\U00002708"
        sentence: "Пілот літає на літаку."
      - word: "маркетолог"
