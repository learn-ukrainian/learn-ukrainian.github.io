        sentence: "Я працюю в офісі."
      - word: "завод"
        emoji: "\U0001F3ED"
        sentence: "На заводі виробляють деталі."
      - word: "фабрика"
        emoji: "\U0001F3ED"
        sentence: "На фабриці шиють одяг."
      - word: "лікарня"
        emoji: "\U0001F3E5"
        sentence: "Лікар працює в лікарні."
      - word: "аптека"
        emoji: "\U0001F48A"
        sentence: "Ліки купують в аптеці."
      - word: "суд"
        emoji: "\U00002696"
        sentence: "Юрист працює в суді."
      - word: "банк"
        emoji: "\U0001F3E6"
        sentence: "Бухгалтер працює в банку."

  - category: "Робоче життя"
    items:
      - word: "робочий день"
        emoji: "\U0001F4C5"
        sentence: "Робочий день починається о дев'ятій."
      - word: "перерва"
        emoji: "\U00002615"
        sentence: "На перерві я п'ю каву."
      - word: "відпустка"
        emoji: "\U0001F3D6"
        sentence: "У серпні я буду у відпустці."
      - word: "зарплата"
        emoji: "\U0001F4B0"
        sentence: "Зарплату платять щомісяця."
      - word: "графік"
