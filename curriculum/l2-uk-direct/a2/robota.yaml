      - word: "колега"
        emoji: "\U0001F465"
        sentence: "Мої колеги дуже привітні."
      - word: "начальник"
        emoji: "\U0001F464"
        sentence: "Начальник дав нове завдання."

  - category: "Дієслова"
    items:
      - word: "працювати"
        emoji: "\U0001F4BC"
        sentence: "Я працюю з понеділка по п'ятницю."
      - word: "заробляти"
        emoji: "\U0001F4B5"
        sentence: "Він заробляє добре."
      - word: "наймати"
        emoji: "\U0001F91D"
        sentence: "Компанія наймає нових працівників."
      - word: "звільняти"
        emoji: "\U0001F6AA"
        sentence: "Його звільнили минулого тижня."
      - word: "відпочивати"
        emoji: "\U0001F6CB"
        sentence: "У вихідні я відпочиваю."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Професія і робоче місце"
    instruction: "Розподіли професії за місцем роботи"
    categories:
      - label: "Офіс"
        items:
          - "програміст"
          - "бухгалтер"
          - "менеджер"
          - "маркетолог"
      - label: "Лікарня / аптека"
        items:
          - "стоматолог"
          - "фармацевт"
          - "ветеринар"
      - label: "Суд / банк"
        items:
          - "юрист"
      - label: "Інше"
        items:
          - "пілот"
          - "дизайнер"

  - type: build_sentence
    title: "Розкажи про роботу"
    instruction: "Склади речення"
    sentences:
      - words: ["Я", "працюю", "програмістом", "в", "офісі", "."]
        correct: "Я працюю програмістом в офісі."
      - words: ["Мій", "робочий", "день", "починається", "о", "дев'ятій", "."]
        correct: "Мій робочий день починається о дев'ятій."
      - words: ["Вона", "працює", "лікаркою", "у", "лікарні", "."]
        correct: "Вона працює лікаркою у лікарні."
      - words: ["На", "перерві", "я", "п'ю", "каву", "з", "колегами", "."]
        correct: "На перерві я п'ю каву з колегами."
      - words: ["У", "серпні", "в", "мене", "відпустка", "."]
        correct: "У серпні в мене відпустка."

  - type: pattern_drill
    title: "Ким працює? Чим працює?"
    prompt: "Дай відповідь"
    items:
      - given: "Програміст працює ___ (чим?)"
        answer: "комп'ютером"
      - given: "Стоматолог працює ___ (ким?)"
        answer: "стоматологом"
      - given: "Юрист працює ___ (де?)"
        answer: "у суді"
      - given: "Фармацевт працює ___ (де?)"
        answer: "в аптеці"
      - given: "Пілот працює ___ (ким?)"
        answer: "пілотом"
      - given: "Бухгалтер працює ___ (де?)"
        answer: "у банку"

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "Відпустка — це робочий день."
        answer: false
        correction: "Відпустка — це відпочинок від роботи."
      - statement: "Зарплату зазвичай платять щомісяця."
        answer: true
      - statement: "Фармацевт працює у лікарні."
        answer: false
        correction: "Фармацевт працює в аптеці."
      - statement: "«Ким ви працюєте?» — відповідь в орудному відмінку."
        answer: true
      - statement: "Колега — це людина, з якою ви працюєте."
        answer: true

  - type: reading
    title: "Читання: Співбесіда"
    text: |
      — Добрий день! Мене звати Олег. Я прийшов на співбесіду.
      — Добрий день, Олегу! Сідайте. Розкажіть про себе.
      — Я програміст. Працюю п'ять років. Останні два роки працював у великій компанії.
      — Чому хочете змінити роботу?
      — Хочу розвиватися. У вашій компанії цікаві проєкти.
      — Добре. Наш робочий день — з десятої до сьомої. Зарплата — сорок тисяч. Є питання?
      — Скільки днів відпустки?
      — Двадцять чотири дні на рік.
    questions:
      - question: "Хто прийшов на співбесіду?"
        answer: "Олег, програміст."
      - question: "Скільки років він працює?"
        answer: "П'ять років."
      - question: "Який графік роботи?"
        answer: "З десятої до сьомої."

  - type: pattern_drill
    title: "Графік: о котрій?"
    prompt: "Скажи час"
    items:
      - given: "Робочий день починається о ___. (9:00)"
        answer: "дев'ятій"
      - given: "Обідня перерва о ___. (13:00)"
        answer: "першій"
      - given: "Робочий день закінчується о ___. (18:00)"
        answer: "шостій"
      - given: "Нарада о ___. (10:30)"
        answer: "пів на одинадцяту"

  - type: proverb_drill
    title: "Прислів'я"
    items:
      - proverb: "Кожна робота легка, коли охоче її ___."
        answer: "робиш"
      - proverb: "Щоб рибу їсти, треба у воду ___."
        answer: "лізти"
