module: pryslivnyky-osnovy
track: l2-uk-direct
level: a2
type: grammar
title: "Прислівники"
subtitle: "ЯК? ДЕ? КОЛИ? СКІЛЬКИ? — утворення та вживання прислівників"
standard_ref: "§4.5 — стилістична виразність; тематичні сфери (прислівники)"
textbook_ref: "Grade 5 (Авраменко — утворення прислівників від прикметників), Grade 3 (прислівники в контексті)"
teaching_notes: |
  Ключове питання — ЯК? Це розширює систему питальних слів.
  Головна модель утворення: прикметник -ий → прислівник -о (швидкий → швидко).
  Прислівники не змінюються — це велике полегшення після відмінків.
  Розділіть за питаннями: ЯК? (спосіб), ДЕ? (місце), КОЛИ? (час), СКІЛЬКИ? (ступінь).
  Додайте порівняльний ступінь: швидко → швидше, добре → краще.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Прикметник (-ий/-ій) → прислівник (-о/-е). Прислівник відповідає на ЯК? ДЕ? КОЛИ?"
  examples:
    - "швидкий → швидко (ЯК?)"
    - "тут, там, далеко (ДЕ?)"
    - "зараз, потім, завжди (КОЛИ?)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Утворення прислівників від прикметників"
    columns: ["Прикметник", "Прислівник", "Модель"]
    rows:
      - ["швидкий", "швидко", "-ий → -о"]
      - ["повільний", "повільно", "-ий → -о"]
      - ["гарний", "гарно", "-ий → -о"]
      - ["поганий", "погано", "-ий → -о"]
      - ["тихий", "тихо", "-ий → -о"]
      - ["голосний", "голосно", "-ий → -о"]
      - ["правильний", "правильно", "-ий → -о"]
      - ["уважний", "уважно", "-ий → -о"]
      - ["обережний", "обережно", "-ий → -о"]
      - ["спокійний", "спокійно", "-ий → -о"]

  - title: "Порівняльний ступінь"
    columns: ["Прислівник", "Порівняльний", "Примітка"]
    rows:
      - ["швидко", "швидше", "регулярний"]
      - ["повільно", "повільніше", "регулярний"]
      - ["добре", "краще", "нерегулярний"]
      - ["погано", "гірше", "нерегулярний"]
      - ["багато", "більше", "нерегулярний"]
      - ["мало", "менше", "нерегулярний"]
      - ["тихо", "тихіше", "регулярний"]
      - ["голосно", "голосніше", "регулярний"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "ЯК? (спосіб дії)"
    items:
      - word: "швидко"
        emoji: "\u26A1"
        sentence: "Він біжить швидко."
      - word: "повільно"
        emoji: "\U0001F422"
        sentence: "Бабуся ходить повільно."
      - word: "добре"
        emoji: "\U0001F44D"
        sentence: "Вона співає добре."
      - word: "погано"
        emoji: "\U0001F44E"
        sentence: "Він спить погано."
      - word: "тихо"
        emoji: "\U0001F910"
        sentence: "Говори тихо — дитина спить."
      - word: "голосно"
        emoji: "\U0001F4E3"
        sentence: "Він сміється голосно."
      - word: "правильно"
        emoji: "\u2705"
        sentence: "Ти відповів правильно."
      - word: "уважно"
        emoji: "\U0001F440"
        sentence: "Читай уважно."
      - word: "спокійно"
        emoji: "\U0001F9D8"
        sentence: "Сиди спокійно."

  - category: "ДЕ? (місце)"
    items:
      - word: "тут"
        emoji: "\U0001F4CD"
        sentence: "Я живу тут."
      - word: "там"
        emoji: "\U0001F449"
        sentence: "Школа знаходиться там."
      - word: "далеко"
        emoji: "\U0001F30D"
        sentence: "Море далеко від нас."
      - word: "близько"
        emoji: "\U0001F4CF"
        sentence: "Магазин близько."
      - word: "ліворуч"
        emoji: "\u2B05\uFE0F"
        sentence: "Поверни ліворуч."
      - word: "праворуч"
        emoji: "\u27A1\uFE0F"
        sentence: "Аптека праворуч."

  - category: "КОЛИ? (час)"
    items:
      - word: "зараз"
        emoji: "\u23F0"
        sentence: "Я зараз працюю."
      - word: "потім"
        emoji: "\u23ED\uFE0F"
        sentence: "Потім ми підемо гуляти."
      - word: "завжди"
        emoji: "\u267E\uFE0F"
        sentence: "Він завжди приходить вчасно."
      - word: "ніколи"
        emoji: "\u274C"
        sentence: "Я ніколи не запізнююся."
      - word: "іноді"
        emoji: "\U0001F3B2"
        sentence: "Іноді йде дощ."

  - category: "СКІЛЬКИ? (ступінь)"
    items:
      - word: "дуже"
        emoji: "\U0001F4AF"
        sentence: "Мені дуже подобається ця книга."
      - word: "трохи"
        emoji: "\U0001F90F"
        sentence: "Я трохи втомився."
      - word: "багато"
        emoji: "\U0001F4E6"
        sentence: "Він багато працює."
      - word: "мало"
        emoji: "\U0001F4AD"
        sentence: "Вона мало спить."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Прикметник → прислівник"
    prompt: "Утвори прислівник від прикметника"
    items:
      - given: "швидкий → ?"
        answer: "швидко"
      - given: "повільний → ?"
        answer: "повільно"
      - given: "гарний → ?"
        answer: "гарно"
      - given: "поганий → ?"
        answer: "погано"
      - given: "тихий → ?"
        answer: "тихо"
      - given: "голосний → ?"
        answer: "голосно"
      - given: "правильний → ?"
        answer: "правильно"
      - given: "уважний → ?"
        answer: "уважно"
      - given: "обережний → ?"
        answer: "обережно"
      - given: "спокійний → ?"
        answer: "спокійно"
      - given: "сумний → ?"
        answer: "сумно"
      - given: "веселий → ?"
        answer: "весело"
      - given: "холодний → ?"
        answer: "холодно"
      - given: "теплий → ?"
        answer: "тепло"
      - given: "цікавий → ?"
        answer: "цікаво"

  - type: classify
    title: "На яке питання відповідає?"
    instruction: "Розподіли прислівники за питаннями"
    categories:
      - label: "ЯК? (спосіб)"
        items:
          - "швидко"
          - "тихо"
          - "добре"
          - "уважно"
          - "правильно"
      - label: "ДЕ? (місце)"
        items:
          - "тут"
          - "там"
          - "далеко"
          - "близько"
          - "ліворуч"
      - label: "КОЛИ? (час)"
        items:
          - "зараз"
          - "потім"
          - "завжди"
          - "ніколи"
          - "іноді"
      - label: "СКІЛЬКИ? (ступінь)"
        items:
          - "дуже"
          - "трохи"
          - "багато"
          - "мало"

  - type: build_sentence
    title: "Додай прислівник"
    instruction: "Обери правильний прислівник до речення"
    sentences:
      - words: ["Він", "говорить", "[голосно/голосний]", "."]
        correct: "Він говорить голосно."
      - words: ["Вона", "читає", "[швидко/швидкий]", "."]
        correct: "Вона читає швидко."
      - words: ["Діти", "сидять", "[тихо/тихий]", "."]
        correct: "Діти сидять тихо."
      - words: ["Я", "[завжди/завжди]", "снідаю", "вранці", "."]
        correct: "Я завжди снідаю вранці."
      - words: ["Магазин", "[близько/близький]", "від", "дому", "."]
        correct: "Магазин близько від дому."
      - words: ["Він", "[добре/добрий]", "грає", "на", "гітарі", "."]
        correct: "Він добре грає на гітарі."

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "«Швидкий» — це прислівник."
        answer: false
        correction: "«Швидкий» — прикметник. Прислівник — «швидко»."
      - statement: "Прислівники не змінюються за відмінками."
        answer: true
      - statement: "«Тут» — це прислівник місця."
        answer: true
      - statement: "«Добре» відповідає на питання ДЕ?"
        answer: false
        correction: "«Добре» відповідає на питання ЯК?"
      - statement: "Порівняльний ступінь від «добре» — «добріше»."
        answer: false
        correction: "Порівняльний ступінь від «добре» — «краще»."
      - statement: "«Ніколи» — прислівник часу."
        answer: true

  - type: pattern_drill
    title: "Порівняльний ступінь"
    prompt: "Утвори порівняльний ступінь прислівника"
    items:
      - given: "швидко → ще..."
        answer: "швидше"
      - given: "повільно → ще..."
        answer: "повільніше"
      - given: "добре → ще..."
        answer: "краще"
      - given: "погано → ще..."
        answer: "гірше"
      - given: "багато → ще..."
        answer: "більше"
      - given: "мало → ще..."
        answer: "менше"
      - given: "тихо → ще..."
        answer: "тихіше"
      - given: "голосно → ще..."
        answer: "голосніше"

  - type: reading
    title: "Читання: Ранок Оксани"
    text: |
      Оксана завжди встає рано. Вона швидко вмивається і тихо снідає — мама ще спить. Потім Оксана йде до школи. Школа близько від дому, тому вона ходить повільно і спокійно. У школі вона уважно слухає вчительку. Оксана добре вчиться — вона завжди робить домашнє завдання правильно. Іноді вона допомагає друзям. Увечері вона трохи читає і швидко засинає.
    questions:
      - question: "Коли Оксана встає?"
        answer: "Завжди рано."
      - question: "Чому вона снідає тихо?"
        answer: "Бо мама ще спить."
      - question: "Як Оксана слухає вчительку?"
        answer: "Уважно."
      - question: "Як вона робить домашнє завдання?"
        answer: "Правильно."
