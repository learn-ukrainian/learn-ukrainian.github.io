module: spoluchnyky-rozshyreni
track: l2-uk-direct
level: a2
type: grammar
title: "Сполучники: розширення"
subtitle: "Або, зате, проте, однак — складносурядні речення"
standard_ref: "§4.3.2 — compound sentences, coordinating conjunctions (expanded)"
textbook_ref: "Grade 5 (Golub p.132 — compound sentences), Grade 7 (Litvinova p.196-200 — conjunction taxonomy)"
teaching_notes: |
  Розширення А1-сполучників. В А1 були: і/й, а, але, бо, тому що, чи.
  Тепер додаємо: або (вибір), зате/проте/однак (протиставлення), кореляти (ні...ні, то...то).
  Ключова відмінність: складносурядне (рівні частини) vs складнопідрядне (головне + залежне).
  Пунктуація: кома ПЕРЕД а, але, зате, проте, однак — ЗАВЖДИ.
  Перед і/й кома тільки в складному реченні, не між однорідними.
  Цей модуль готує до наступного (skladni-rechennia) — підрядних сполучників.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Речення + , + сполучник + речення. Частини рівноправні — складносурядне речення."
  examples:
    - "Кава або чай?"
    - "Він маленький, зате розумний."
    - "Вона хотіла прийти, проте не змогла."
    - "Ні дощу, ні снігу."

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Сурядні сполучники"
    columns: ["Тип", "Сполучники", "Приклад"]
    rows:
      - ["Єднальні", "і, й, та (=і)", "Мама і тато вдома."]
      - ["Протиставні", "а, але, зате, проте, однак", "Він хворий, проте працює."]
      - ["Розділові", "або, чи, то...то", "Кава або чай?"]

  - title: "Кореляти (парні сполучники)"
    columns: ["Корелят", "Значення", "Приклад"]
    rows:
      - ["ні...ні", "жодне з двох", "Ні дощу, ні снігу."]
      - ["то...то", "змінюється", "То дощ, то сонце."]
      - ["або...або", "одне з двох", "Або так, або ні."]
      - ["не тільки...а й", "додавання", "Він не тільки розумний, а й сильний."]

  - title: "Пунктуація з сурядними сполучниками"
    columns: ["Правило", "Правильно", "Неправильно"]
    rows:
      - ["Кома перед але", "Гарний, але дорогий.", "Гарний але дорогий."]
      - ["Кома перед зате", "Маленький, зате швидкий.", "Маленький зате швидкий."]
      - ["Кома перед проте", "Втомився, проте працює.", "Втомився проте працює."]
      - ["Кома перед однак", "Було важко, однак цікаво.", "Було важко однак цікаво."]
      - ["Без коми перед або (одноразове)", "Кава або чай.", "—"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Вибір (або, чи)"
    items:
      - word: "або"
        emoji: "\U0001F500"
        sentence: "Хочеш каву або чай?"
      - word: "чи"
        emoji: "\u2753"
        sentence: "Чи ти прийдеш завтра?"

  - category: "Протиставлення (зате, проте, однак)"
    items:
      - word: "зате"
        emoji: "\u2696\uFE0F"
        sentence: "Він маленький, зате розумний."
      - word: "проте"
        emoji: "\u26A0\uFE0F"
        sentence: "Вона хотіла прийти, проте не змогла."
      - word: "однак"
        emoji: "\U0001F914"
        sentence: "Було холодно, однак ми пішли гуляти."

  - category: "Парні сполучники"
    items:
      - word: "ні...ні"
        emoji: "\u274C"
        sentence: "Ні дощу, ні снігу — сухо і тепло."
      - word: "то...то"
        emoji: "\U0001F504"
        sentence: "Погода мінлива: то дощ, то сонце."
      - word: "або...або"
        emoji: "\U0001F500"
        sentence: "Або йдемо зараз, або залишаємось."
      - word: "не тільки...а й"
        emoji: "\u2795"
        sentence: "Він не тільки розумний, а й чемний."

  - category: "Додаткові слова"
    items:
      - word: "складне речення"
        emoji: "\U0001F4DD"
        sentence: "Складне речення має два підмети і два присудки."
      - word: "просте речення"
        emoji: "\U0001F4C4"
        sentence: "Просте речення має один підмет і один присудок."
      - word: "частина"
        emoji: "\U0001F9E9"
        sentence: "У складному реченні дві частини."
      - word: "рівноправний"
        emoji: "\u2696\uFE0F"
        sentence: "Частини складносурядного речення рівноправні."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Який тип сполучника?"
    instruction: "Розподіли сполучники за типом"
    categories:
      - label: "Єднальні"
        items:
          - "і"
          - "й"
          - "та (= і)"
      - label: "Протиставні"
        items:
          - "а"
          - "але"
          - "зате"
          - "проте"
          - "однак"
      - label: "Розділові"
        items:
          - "або"
          - "чи"
          - "то...то"

  - type: pattern_drill
    title: "Допиши сполучник"
    prompt: "Вибери правильний сполучник"
    items:
      - given: "Хочеш каву ___ чай?"
        answer: "або"
      - given: "Квартира маленька, ___ затишна."
        answer: "зате"
      - given: "Він обіцяв прийти, ___ не прийшов."
        answer: "проте"
      - given: "Вона добре вчиться, ___ часу на хобі немає."
        answer: "однак"
      - given: "___ дощ, ___ сонце — погода мінлива."
        answer: "То...то"
      - given: "___ каші, ___ хліба — нічого немає."
        answer: "Ні...ні"
      - given: "Він ___ розумний, ___ працьовитий."
        answer: "не тільки...а й"
      - given: "___ ти йдеш, ___ я йду."
        answer: "Або...або"

  - type: true_false
    title: "Пунктуація: правильно чи ні?"
    items:
      - statement: "Він маленький зате розумний."
        answer: false
        correction: "Він маленький, зате розумний. (Кома перед «зате».)"
      - statement: "Вона хотіла прийти, проте не змогла."
        answer: true
      - statement: "Кава, або чай?"
        answer: false
        correction: "Кава або чай? (Без коми перед одноразовим «або».)"
      - statement: "Було важко, однак цікаво."
        answer: true
      - statement: "Він не тільки розумний а й сильний."
        answer: false
        correction: "Він не тільки розумний, а й сильний. (Кома перед «а й».)"
      - statement: "То дощ, то сонце."
        answer: true

  - type: build_sentence
    title: "З'єднай два речення"
    instruction: "Об'єднай два прості речення в одне складне"
    sentences:
      - words: ["Він", "маленький", ",", "зате", "швидкий", "."]
        correct: "Він маленький, зате швидкий."
      - words: ["Ні", "дощу", ",", "ні", "снігу", "."]
        correct: "Ні дощу, ні снігу."
      - words: ["Вона", "втомилась", ",", "проте", "працює", "далі", "."]
        correct: "Вона втомилась, проте працює далі."
      - words: ["Або", "йдемо", "зараз", ",", "або", "залишаємось", "."]
        correct: "Або йдемо зараз, або залишаємось."
      - words: ["Він", "не", "тільки", "розумний", ",", "а", "й", "чемний", "."]
        correct: "Він не тільки розумний, а й чемний."

  - type: classify
    title: "Просте чи складне речення?"
    instruction: "Визнач, яке речення просте, а яке складне"
    categories:
      - label: "Просте"
        items:
          - "Мама і тато вдома."
          - "Він купив каву або чай."
          - "Ми разом вчимося і працюємо."
      - label: "Складне"
        items:
          - "Він хотів прийти, проте не зміг."
          - "Мама готує, а тато прибирає."
          - "Або ми йдемо, або залишаємось."
          - "То дощ іде, то сонце світить."

  - type: reading
    title: "Читання: Вибір"
    text: |
      Олег думає: або він іде в кіно, або залишається вдома. Фільм цікавий, проте квитки дорогі. Зате вдома тепло і є чай. Однак сидіти вдома нудно. Олег телефонує подрузі: «Ні каші, ні хліба — треба йти в магазин. Може, підемо разом?» Подруга каже: «Я не тільки піду з тобою в магазин, а й запрошу тебе на каву!» Олег радий: він не тільки купить їжу, а й проведе час з подругою.
    questions:
      - question: "Який вибір має Олег?"
        answer: "Або іде в кіно, або залишається вдома."
      - question: "Чому він не хоче йти в кіно?"
        answer: "Квитки дорогі."
      - question: "Що запропонувала подруга?"
        answer: "Піти разом в магазин і запросити на каву."

  - type: proverb_drill
    items:
      - proverb: "Або пан, або пропав."
        answer: "Ризикуй — або виграєш, або програєш."
      - proverb: "Ні пуху, ні пера!"
        answer: "Побажання удачі."
    source: "Grade 5 Golub"
