module: posluhy
track: l2-uk-direct
level: a2
type: vocabulary
title: "Послуги"
subtitle: "Банк, пошта, бібліотека, спортзал, таксі"
standard_ref: "Каталог Б — Послуги"
textbook_ref: "Grade 3–4 — послуги, установи"
teaching_notes: |
  Послуги — практична лексика для повсякденного життя в Україні.
  Ключовий шаблон: «Я хочу + інфінітив» (Я хочу відкрити рахунок, відправити посилку).
  Другий шаблон: «Де найближчий/найближча + заклад?» — повторення найвищого ступеня.
  Групуйте за сферами: банк, пошта, бібліотека, спорт, таксі.
  Ввічливі форми: «Будь ласка», «Чи можна...?», «Скільки коштує...?»

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Я хочу + інфінітив. Де найближчий [заклад]? Скільки коштує [послуга]?"
  examples:
    - "Я хочу відкрити рахунок."
    - "Де найближчий банкомат?"
    - "Скільки коштує абонемент у спортзал?"

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Банк"
    items:
      - word: "рахунок"
        emoji: "\U0001F4B3"
        sentence: "Я хочу відкрити рахунок."
      - word: "переказ"
        emoji: "\U0001F4B8"
        sentence: "Зробіть, будь ласка, переказ."
      - word: "валюта"
        emoji: "\U0001F4B1"
        sentence: "Де можна обміняти валюту?"
      - word: "банкомат"
        emoji: "\U0001F3E7"
        sentence: "Де найближчий банкомат?"
      - word: "картка"
        emoji: "\U0001F4B3"
        sentence: "Я плачу карткою."
      - word: "готівка"
        emoji: "\U0001F4B5"
        sentence: "У мене є тільки готівка."

  - category: "Пошта"
    items:
      - word: "лист"
        emoji: "\U00002709"
        sentence: "Я написав лист другу."
      - word: "бандероль"
        emoji: "\U0001F4E6"
        sentence: "Бандероль прийде через тиждень."
      - word: "посилка"
        emoji: "\U0001F4E6"
        sentence: "Я хочу відправити посилку."
      - word: "марка"
        emoji: "\U0001F4EE"
        sentence: "Наклейте марку на конверт."
      - word: "конверт"
        emoji: "\U00002709"
        sentence: "Покладіть лист у конверт."
      - word: "відділення"
        emoji: "\U0001F3E4"
        sentence: "Поштове відділення відкрите до шостої."

  - category: "Бібліотека"
    items:
      - word: "бібліотека"
        emoji: "\U0001F4DA"
        sentence: "Я часто ходжу до бібліотеки."
      - word: "читальний зал"
        emoji: "\U0001F4D6"
        sentence: "У читальному залі тихо."
      - word: "абонемент"
        emoji: "\U0001F4C7"
        sentence: "Оформіть абонемент, будь ласка."
      - word: "каталог"
        emoji: "\U0001F4CB"
        sentence: "Знайдіть книгу в каталозі."

  - category: "Спортзал і басейн"
    items:
      - word: "спортзал"
        emoji: "\U0001F4AA"
        sentence: "Я ходжу в спортзал тричі на тиждень."
      - word: "басейн"
        emoji: "\U0001F3CA"
        sentence: "Басейн працює з ранку до вечора."
      - word: "тренер"
        emoji: "\U0001F9D1\U0000200D\U0001F3EB"
        sentence: "Тренер показує вправи."
      - word: "роздягальня"
        emoji: "\U0001F6AA"
        sentence: "Роздягальня — на першому поверсі."

  - category: "Таксі"
    items:
      - word: "таксі"
        emoji: "\U0001F695"
        sentence: "Викличте, будь ласка, таксі."
      - word: "водій"
        emoji: "\U0001F9D1\U0000200D\U00002708"
        sentence: "Водій знає маршрут."
      - word: "адреса"
        emoji: "\U0001F4CD"
        sentence: "Яка ваша адреса?"
      - word: "маршрут"
        emoji: "\U0001F5FA"
        sentence: "Який маршрут найкоротший?"
      - word: "вартість"
        emoji: "\U0001F4B0"
        sentence: "Яка вартість поїздки?"

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Розподіли за сферою"
    instruction: "Розподіли слова"
    categories:
      - label: "Банк"
        items:
          - "рахунок"
          - "переказ"
          - "банкомат"
          - "картка"
      - label: "Пошта"
        items:
          - "лист"
          - "посилка"
          - "марка"
          - "конверт"
      - label: "Бібліотека"
        items:
          - "читальний зал"
          - "каталог"
          - "абонемент"
      - label: "Спорт"
        items:
          - "спортзал"
          - "басейн"
          - "тренер"
      - label: "Таксі"
        items:
          - "водій"
          - "маршрут"
          - "вартість"

  - type: build_sentence
    title: "Запити на послуги"
    instruction: "Склади речення"
    sentences:
      - words: ["Я", "хочу", "відкрити", "рахунок", "."]
        correct: "Я хочу відкрити рахунок."
      - words: ["Де", "найближчий", "банкомат", "?"]
        correct: "Де найближчий банкомат?"
      - words: ["Я", "хочу", "відправити", "посилку", "."]
        correct: "Я хочу відправити посилку."
      - words: ["Скільки", "коштує", "абонемент", "у", "спортзал", "?"]
        correct: "Скільки коштує абонемент у спортзал?"
      - words: ["Викличте", ",", "будь ласка", ",", "таксі", "."]
        correct: "Викличте, будь ласка, таксі."

  - type: pattern_drill
    title: "Ввічливі запити"
    prompt: "Сформулюй ввічливе прохання"
    items:
      - given: "таксі → попросити"
        answer: "Викличте, будь ласка, таксі."
      - given: "посилка → відправити"
        answer: "Я хочу відправити посилку."
      - given: "бібліотека → записатися"
        answer: "Чи можна записатися в бібліотеку?"
      - given: "валюта → обміняти"
        answer: "Де можна обміняти валюту?"
      - given: "абонемент → ціна"
        answer: "Скільки коштує абонемент?"
      - given: "банкомат → де?"
        answer: "Де найближчий банкомат?"

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "Бандероль — це те саме, що лист."
        answer: false
        correction: "Бандероль — це пакунок, більший за лист."
      - statement: "У бібліотеці є читальний зал."
        answer: true
      - statement: "Готівка — це гроші на картці."
        answer: false
        correction: "Готівка — це паперові й монетні гроші."
      - statement: "Абонемент у спортзал дає право тренуватися."
        answer: true
      - statement: "Марку наклеюють на посилку."
        answer: false
        correction: "Марку наклеюють на конверт (лист). На посилку — наклейку з адресою."

  - type: reading
    title: "Читання: На пошті"
    text: |
      — Добрий день! Я хочу відправити посилку до Польщі.
      — Добрий день! Покладіть посилку на ваги. Ваша посилка важить два кілограми. Вартість — сто двадцять гривень.
      — Добре. А скільки днів вона буде йти?
      — Звичайною поштою — сім-десять днів. Є експрес-доставка за три дні, але вона коштує двісті п'ятдесят гривень.
      — Звичайною, будь ласка. Ось гроші.
      — Дякую! Ось ваша квитанція. Номер для відстеження — на квитанції.
    questions:
      - question: "Куди відправляє посилку клієнт?"
        answer: "До Польщі."
      - question: "Скільки важить посилка?"
        answer: "Два кілограми."
      - question: "Скільки днів йде звичайна пошта?"
        answer: "Сім-десять днів."

  - type: pattern_drill
    title: "Де найближчий...?"
    prompt: "Запитай, де знаходиться заклад"
    items:
      - given: "банкомат"
        answer: "Де найближчий банкомат?"
      - given: "аптека"
        answer: "Де найближча аптека?"
      - given: "поштове відділення"
        answer: "Де найближче поштове відділення?"
      - given: "бібліотека"
        answer: "Де найближча бібліотека?"
      - given: "спортзал"
        answer: "Де найближчий спортзал?"

  - type: riddle
    title: "Загадка"
    clues:
      - "Мовчить,"
      - "а багатьох людей навчить."
    answer: "книга"
    source: "Grade 5 Avramenko p.27"
