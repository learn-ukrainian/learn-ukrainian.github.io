module: checkpoint-rodovyi
track: l2-uk-direct
level: a2
type: checkpoint
title: "Контрольна: родовий відмінок"
subtitle: "Перевірка всіх значень родового — утворення, прийменники, кількість, заперечення, дати"
standard_ref: "§4.2.3.2 — genitive full scope"
textbook_ref: "Grade 4 — genitive assessment"
teaching_notes: |
  Контрольний модуль — лише оцінювання, без нового матеріалу.
  Охоплює все: утворення форм (3 роди), прийменники (7), кількість (2-4 vs 5+), заперечення, дати.
  Структура: true_false × 8, pattern_drill × 6, build_sentence × 4, reading × 2, classify × 2.
  Поріг проходження: 70%.
  Вправи змішують усі типи — учень повинен орієнтуватися у всіх значеннях родового.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Родовий відмінок: КОГО? ЧОГО? — належність, прийменники, кількість, заперечення, дати."
  examples:
    - "Книга брата. Без цукру. П'ять книг. Немає хліба. Першого січня."

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Повторення — іменники"
    items:
      - word: "брат"
        emoji: "\U0001F466"
        sentence: "Це книга брата."
      - word: "сестра"
        emoji: "\U0001F467"
        sentence: "Кімната сестри велика."
      - word: "учитель"
        emoji: "\U0001F468"
        sentence: "Кабінет учителя на першому поверсі."
      - word: "школа"
        emoji: "\U0001F3EB"
        sentence: "Біля школи є парк."
      - word: "книга"
        emoji: "\U0001F4D6"
        sentence: "Десять книг на полиці."

  - category: "Повторення — прийменники"
    items:
      - word: "від"
        emoji: "\U000027A1"
        sentence: "Лист від подруги."
      - word: "до"
        emoji: "\U0001F3AF"
        sentence: "Їдемо до моря."
      - word: "без"
        emoji: "\U0000274C"
        sentence: "Суп без солі."
      - word: "для"
        emoji: "\U0001F381"
        sentence: "Подарунок для бабусі."
      - word: "після"
        emoji: "\U000023ED"
        sentence: "Після роботи іду додому."
      - word: "біля"
        emoji: "\U0001F4CD"
        sentence: "Аптека біля лікарні."

  - category: "Повторення — кількість"
    items:
      - word: "кілограм"
        emoji: "\U00002696"
        sentence: "Три кілограми помідорів."
      - word: "хвилина"
        emoji: "\U000023F1"
        sentence: "П'ять хвилин тому."
      - word: "студент"
        emoji: "\U0001F393"
        sentence: "У групі двадцять студентів."

  - category: "Повторення — заперечення"
    items:
      - word: "інтернет"
        emoji: "\U0001F4F6"
        sentence: "Немає інтернету."
      - word: "світло"
        emoji: "\U0001F4A1"
        sentence: "Не було світла вчора."
      - word: "квиток"
        emoji: "\U0001F3AB"
        sentence: "Немає квитків на поїзд."
      - word: "відповідь"
        emoji: "\U00002753"
        sentence: "Немає відповіді."
      - word: "дощ"
        emoji: "\U0001F327"
        sentence: "Не було дощу."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: true_false
    title: "Правильно чи неправильно? (Частина 1)"
    items:
      - statement: "Це книга брата."
        answer: true
      - statement: "Немає водо."
        answer: false
        correction: "Немає води."
      - statement: "П'ять книг."
        answer: true
      - statement: "Подарунок для мамо."
        answer: false
        correction: "Подарунок для мами."
      - statement: "Після обіду ми гуляємо."
        answer: true
      - statement: "Три книг."
        answer: false
        correction: "Три книги."
      - statement: "Він із Львова."
        answer: true
      - statement: "Не було дощ."
        answer: false
        correction: "Не було дощу."

  - type: pattern_drill
    title: "Утвори родовий відмінок"
    prompt: "Постав слово в правильну форму"
    items:
      - given: "сестра → це кімната..."
        answer: "сестри"
      - given: "батько → машина..."
        answer: "батька"
      - given: "місто → центр..."
        answer: "міста"
      - given: "школа → іду до..."
        answer: "до школи"
      - given: "хліб → немає..."
        answer: "немає хліба"
      - given: "3 + яблуко"
        answer: "три яблука"
      - given: "обід → після..."
        answer: "після обіду"
      - given: "10 + студент"
        answer: "десять студентів"
      - given: "мама → для..."
        answer: "для мами"
      - given: "дощ → не було..."
        answer: "не було дощу"
      - given: "1 січень → коли?"
        answer: "першого січня"
      - given: "друг → від..."
        answer: "від друга"

  - type: build_sentence
    title: "Склади речення"
    instruction: "Обери правильну форму"
    sentences:
      - words: ["Після", "[робота/роботи]", "я", "іду", "до", "[магазин/магазину]", "."]
        correct: "Після роботи я іду до магазину."
      - words: ["Немає", "[молоко/молока]", "—", "треба", "купити", "."]
        correct: "Немає молока — треба купити."
      - words: ["Це", "подарунок", "для", "[бабуся/бабусі]", "від", "[онук/онука]", "."]
        correct: "Це подарунок для бабусі від онука."
      - words: ["У", "класі", "двадцять", "п'ять", "[учень/учнів]", "."]
        correct: "У класі двадцять п'ять учнів."

  - type: reading
    title: "Читання: Ранок Олени"
    text: |
      Олена прокинулася рано. Після сніданку вона пішла до школи. Біля школи вона зустріла подругу. У подруги немає підручника — вона забула його вдома. Олена дала їй свій. На уроці було двадцять учнів. Після уроку Олена пішла до бібліотеки для мами — треба взяти дві книги.
    questions:
      - question: "Куди пішла Олена після сніданку?"
        answer: "До школи."
      - question: "Чого немає у подруги?"
        answer: "Немає підручника."
      - question: "Скільки учнів було на уроці?"
        answer: "Двадцять учнів."
      - question: "Для кого Олена пішла до бібліотеки?"
        answer: "Для мами."

  - type: reading
    title: "Читання: Оголошення"
    text: |
      Увага! Двадцять п'ятого грудня — новорічний концерт. Після уроків усі йдуть до актової зали. Для вчителів і батьків — місця в першому ряду. Квитків немає — вхід вільний. Без запізнень, будь ласка! Початок о шостій годині вечора.
    questions:
      - question: "Коли концерт?"
        answer: "Двадцять п'ятого грудня."
      - question: "Для кого місця в першому ряду?"
        answer: "Для вчителів і батьків."
      - question: "Чи потрібні квитки?"
        answer: "Ні, квитків немає — вхід вільний."

  - type: classify
    title: "Яке значення? (Частина 1)"
    instruction: "Розподіли за функцією родового відмінка"
    categories:
      - label: "Належність"
        items:
          - "зошит студента"
          - "дім бабусі"
          - "ключ квартири"
      - label: "Прийменник"
        items:
          - "до школи"
          - "без цукру"
          - "після обіду"
      - label: "Кількість"
        items:
          - "п'ять книг"
          - "два брати"
          - "багато людей"
      - label: "Заперечення"
        items:
          - "немає часу"
          - "не було дощу"
          - "не буде уроку"

  - type: classify
    title: "Яке значення? (Частина 2)"
    instruction: "Розподіли за функцією родового відмінка"
    categories:
      - label: "Належність"
        items:
          - "машина батька"
          - "сумка сестри"
      - label: "Прийменник"
        items:
          - "для мами"
          - "від друга"
          - "біля парку"
      - label: "Кількість"
        items:
          - "три яблука"
          - "десять хвилин"
      - label: "Заперечення"
        items:
          - "немає інтернету"
          - "не було світла"
