module: nakazovyi-povnyi
track: l2-uk-direct
level: a2
type: grammar
title: "Наказовий спосіб: повна парадигма"
subtitle: "Ідімо! Хай він читає. Нехай вони працюють."
standard_ref: "\xA74.2.4.2 — imperative — full paradigm"
textbook_ref: "Grade 4 — imperative: 1st pl, 3rd person with хай/нехай"
teaching_notes: |
  A1 дав 2-гу особу: читай/читайте. Тепер додаємо 1-шу множину (-мо/-ймо) і 3-тю особу (хай/нехай).
  1-ша множина — «Давайте!»: ідімо, читаймо, працюймо. Природна ситуація — пропозиція.
  3-тя особа — «Нехай робить»: хай він читає, нехай вона прийде. Дозвіл або побажання.
  Навчайте через сценарії: планування групової активності, побажання.
  Хай і нехай — синоніми, нехай трохи формальніший.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "1-ша мн.: основа + -мо/-ймо (Ідімо!). 3-тя особа: хай/нехай + дієслово 3-ї особи (Хай він читає)."
  examples:
    - "Ідімо в кіно! (1-ша мн.)"
    - "Читаймо разом! (1-ша мн.)"
    - "Хай він читає. (3-тя ос. одн.)"
    - "Нехай вони працюють. (3-тя ос. мн.)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Повна парадигма наказового способу"
    columns: ["Особа", "Форма", "Приклад", "Ситуація"]
    rows:
      - ["2-га одн.", "основа + -й/-и/-ь", "Читай! Піди! Сядь!", "Прохання/наказ"]
      - ["2-га мн.", "основа + -йте/-іть/-ьте", "Читайте! Підіть! Сядьте!", "Ввічливий наказ"]
      - ["1-ша мн.", "основа + -мо/-ймо", "Ідімо! Читаймо! Працюймо!", "Пропозиція: давайте!"]
      - ["3-тя одн.", "хай/нехай + 3-тя ос.", "Хай він читає. Нехай вона прийде.", "Дозвіл/побажання"]
      - ["3-тя мн.", "хай/нехай + 3-тя мн.", "Хай вони працюють. Нехай кажуть.", "Дозвіл/побажання"]

  - title: "Дієслова: усі форми наказового способу"
    columns: ["Інфінітив", "2 одн.", "2 мн.", "1 мн.", "3 одн. (хай)"]
    rows:
      - ["іти", "іди", "ідіть", "ідімо", "хай іде"]
      - ["читати", "читай", "читайте", "читаймо", "хай читає"]
      - ["писати", "пиши", "пишіть", "пишімо", "хай пише"]
      - ["працювати", "працюй", "працюйте", "працюймо", "хай працює"]
      - ["мріяти", "мрій", "мрійте", "мріймо", "хай мріє"]
      - ["казати", "кажи", "кажіть", "кажімо", "хай каже"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Дієслова (наказовий)"
    items:
      - word: "іти \u2192 ідімо"
        emoji: "\U0001F6B6"
        sentence: "Ідімо в парк після уроку!"
      - word: "читати \u2192 читаймо"
        emoji: "\U0001F4D6"
        sentence: "Читаймо цю книгу разом!"
      - word: "працювати \u2192 працюймо"
        emoji: "\U0001F4BC"
        sentence: "Працюймо над проєктом сьогодні!"
      - word: "мріяти \u2192 мріймо"
        emoji: "\U00002728"
        sentence: "Мріймо про подорож!"
      - word: "казати \u2192 кажімо"
        emoji: "\U0001F4AC"
        sentence: "Кажімо правду завжди."
      - word: "співати \u2192 співаймо"
        emoji: "\U0001F3B6"
        sentence: "Співаймо цю пісню!"
      - word: "грати \u2192 граймо"
        emoji: "\U000026BD"
        sentence: "Граймо у футбол!"

  - category: "Хай / нехай"
    items:
      - word: "хай"
        emoji: "\U0001F44C"
        sentence: "Хай він вирішить сам."
      - word: "нехай"
        emoji: "\U0001F64F"
        sentence: "Нехай вона прийде о третій."
      - word: "хай буде"
        emoji: "\U0001F91E"
        sentence: "Хай буде по-твоєму!"
      - word: "нехай живе"
        emoji: "\U0001F389"
        sentence: "Нехай живе дружба!"

  - category: "Слова-пропозиції"
    items:
      - word: "разом"
        emoji: "\U0001F46B"
        sentence: "Зробімо це разом!"
      - word: "давай"
        emoji: "\U0001F4AA"
        sentence: "Давай підемо в кіно!"
      - word: "давайте"
        emoji: "\U0001F91D"
        sentence: "Давайте працюймо швидше!"
      - word: "може"
        emoji: "\U0001F914"
        sentence: "Може, поїдімо піцу?"
      - word: "краще"
        emoji: "\U0001F447"
        sentence: "Краще почекаймо ще трохи."
      - word: "спочатку"
        emoji: "\U00000031\U0000FE0F\U000020E3"
        sentence: "Спочатку поїдімо, а потім підемо."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Утвори 1-шу множину"
    prompt: "Утвори наказовий спосіб 1-ї особи множини"
    items:
      - given: "іти \u2192 ми"
        answer: "Ідімо!"
      - given: "читати \u2192 ми"
        answer: "Читаймо!"
      - given: "працювати \u2192 ми"
        answer: "Працюймо!"
      - given: "мріяти \u2192 ми"
        answer: "Мріймо!"
      - given: "писати \u2192 ми"
        answer: "Пишімо!"
      - given: "грати \u2192 ми"
        answer: "Граймо!"
      - given: "співати \u2192 ми"
        answer: "Співаймо!"
      - given: "їсти \u2192 ми"
        answer: "Їжмо!"
      - given: "вчити \u2192 ми"
        answer: "Вчімо!"
      - given: "починати \u2192 ми"
        answer: "Починаймо!"

  - type: pattern_drill
    title: "3-тя особа з хай/нехай"
    prompt: "Утвори наказовий спосіб 3-ї особи"
    items:
      - given: "він + читати"
        answer: "Хай він читає."
      - given: "вона + прийти"
        answer: "Хай вона прийде."
      - given: "вони + працювати"
        answer: "Хай вони працюють."
      - given: "він + писати"
        answer: "Хай він пише."
      - given: "вона + казати"
        answer: "Нехай вона каже."
      - given: "вони + іти"
        answer: "Хай вони йдуть."
      - given: "він + мріяти"
        answer: "Хай він мріє."
      - given: "вона + вирішити"
        answer: "Нехай вона вирішить."

  - type: build_sentence
    title: "Пропозиція для групи"
    instruction: "Склади речення-пропозицію"
    sentences:
      - words: ["[Ідімо/Ідіть]", "в", "кіно", "разом", "!"]
        correct: "Ідімо в кіно разом!"
      - words: ["[Читаймо/Читайте]", "цю", "книгу", "!"]
        correct: "Читаймо цю книгу!"
      - words: ["Хай", "[він/його]", "вирішить", "сам", "."]
        correct: "Хай він вирішить сам."
      - words: ["Нехай", "[вона/її]", "прийде", "о", "третій", "."]
        correct: "Нехай вона прийде о третій."
      - words: ["[Працюймо/Працюйте]", "над", "проєктом", "!"]
        correct: "Працюймо над проєктом!"

  - type: true_false
    title: "Правильно чи ні?"
    items:
      - statement: "«Хай вона прийде» — це наказ для «вона»."
        answer: true
      - statement: "«Ідімо» — це наказ для «ви»."
        answer: false
        correction: "«Ідімо» — це пропозиція для «ми» (1-ша мн.)."
      - statement: "«Хай» і «нехай» — це синоніми."
        answer: true
      - statement: "«Читаймо» означає «читай ти»."
        answer: false
        correction: "«Читаймо» означає «читаймо ми» (1-ша мн.)."
      - statement: "«Нехай вони працюють» — правильне речення."
        answer: true

  - type: classify
    title: "Яка це особа?"
    instruction: "Розподіли наказові форми за особою"
    categories:
      - label: "2-га однина"
        items:
          - "Читай!"
          - "Іди!"
          - "Пиши!"
      - label: "2-га множина"
        items:
          - "Читайте!"
          - "Ідіть!"
          - "Пишіть!"
      - label: "1-ша множина"
        items:
          - "Читаймо!"
          - "Ідімо!"
          - "Пишімо!"
      - label: "3-тя особа"
        items:
          - "Хай читає."
          - "Нехай прийде."
          - "Хай працюють."

  - type: reading
    title: "Читання: Плануємо вихідний"
    text: |
      — Що робитимемо у суботу? — питає Оля.
      — Ідімо в кіно! — пропонує Тарас.
      — Ні, краще читаймо книги в кав'ярні! — каже Марія.
      — Хай Марко вирішить, — пропонує Олег.
      — Нехай кожен скаже свою ідею! — каже Оля.
      — Добре. Спочатку поїдімо, а потім підемо куди-небудь, — каже Марко.
      — Чудово! Граймо у боулінг після обіду! — каже Тарас.
      — Працюймо над планом! — сміється Оля.
    questions:
      - question: "Що пропонує Тарас?"
        answer: "Іти в кіно."
      - question: "Хто має вирішити?"
        answer: "Марко."
      - question: "Що пропонує Марко?"
        answer: "Спочатку поїсти, а потім піти куди-небудь."
      - question: "Знайди три форми 1-ї особи множини."
        answer: "Ідімо, читаймо, поїдімо (також: граймо, працюймо)."
