module: rodovyi-priymennyky
track: l2-uk-direct
level: a2
type: grammar
title: "Родовий із прийменниками"
subtitle: "Від, до, з, без, для, після, біля — прийменники з родовим відмінком"
standard_ref: "§4.2.3.2 — genitive prepositions"
textbook_ref: "Grade 4 — genitive with prepositions"
teaching_notes: |
  Прийменники — найприродніший спосіб відпрацювати родовий відмінок у контексті.
  Групуйте за значенням: від/до (напрямок), без/для (характеристика), після (час), біля (місце).
  Кожен прийменник вводьте з 2-3 прикладами, потім змішуйте.
  Зверніть увагу на з/із — використовують із перед збігом приголосних (із Львова).
  Додаткові прийменники: навпроти, серед, недалеко від — для опису місцезнаходження.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Прийменник + родовий відмінок: від кого? до чого? без чого? для кого?"
  examples:
    - "Лист від друга. (друг → друга)"
    - "Іду до школи. (школа → школи)"
    - "Кава без цукру. (цукор → цукру)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Прийменники з родовим відмінком"
    columns: ["Прийменник", "Значення", "Приклад"]
    rows:
      - ["від", "від кого/причина", "лист від друга"]
      - ["до", "напрямок/межа", "іти до школи"]
      - ["з / із", "походження/матеріал", "повернутися з подорожі"]
      - ["без", "відсутність", "кава без цукру"]
      - ["для", "призначення", "подарунок для мами"]
      - ["після", "час (після чого)", "після обіду"]
      - ["біля", "місце (поряд)", "біля школи"]
      - ["навпроти", "напроти", "навпроти парку"]
      - ["серед", "посеред", "серед людей"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Прийменники"
    items:
      - word: "від"
        emoji: "\U000027A1"
        sentence: "Я отримав лист від бабусі."
      - word: "до"
        emoji: "\U0001F3AF"
        sentence: "Ми йдемо до парку."
      - word: "без"
        emoji: "\U0000274C"
        sentence: "Чай без цукру, будь ласка."
      - word: "для"
        emoji: "\U0001F381"
        sentence: "Квіти для вчительки."
      - word: "після"
        emoji: "\U000023ED"
        sentence: "Після уроку ми граємо."
      - word: "біля"
        emoji: "\U0001F4CD"
        sentence: "Зупинка біля школи."

  - category: "Місця"
    items:
      - word: "школа"
        emoji: "\U0001F3EB"
        sentence: "Автобус зупиняється біля школи."
      - word: "парк"
        emoji: "\U0001F333"
        sentence: "Ми гуляємо недалеко від парку."
      - word: "музей"
        emoji: "\U0001F3DB"
        sentence: "Завтра піду до музею."
      - word: "готель"
        emoji: "\U0001F3E8"
        sentence: "Ресторан навпроти готелю."
      - word: "лікарня"
        emoji: "\U0001F3E5"
        sentence: "Аптека біля лікарні."

  - category: "Час і події"
    items:
      - word: "подорож"
        emoji: "\U00002708"
        sentence: "Після подорожі я відпочиваю."
      - word: "обід"
        emoji: "\U0001F37D"
        sentence: "Після обіду ми працюємо."
      - word: "урок"
        emoji: "\U0001F4DA"
        sentence: "До уроку залишилося п'ять хвилин."
      - word: "вечір"
        emoji: "\U0001F307"
        sentence: "Ми гуляємо до вечора."

  - category: "Люди та стосунки"
    items:
      - word: "друг"
        emoji: "\U0001F91D"
        sentence: "Подарунок від друга."
      - word: "вчителька"
        emoji: "\U0001F469"
        sentence: "Квіти для вчительки."
      - word: "сусід"
        emoji: "\U0001F3E0"
        sentence: "Лист від сусіда."
      - word: "колега"
        emoji: "\U0001F4BC"
        sentence: "Допомога від колеги."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Який прийменник?"
    instruction: "Розподіли речення за значенням прийменника"
    categories:
      - label: "Від (джерело)"
        items:
          - "Лист від друга."
          - "Подарунок від бабусі."
      - label: "До (напрямок)"
        items:
          - "Іду до школи."
          - "Їдемо до Києва."
      - label: "Без (відсутність)"
        items:
          - "Кава без цукру."
          - "День без дощу."
      - label: "Для (призначення)"
        items:
          - "Подарунок для мами."
          - "Книга для дітей."
      - label: "Після (час)"
        items:
          - "Після обіду."
          - "Після уроку."
      - label: "Біля (місце)"
        items:
          - "Біля школи."
          - "Біля будинку."

  - type: pattern_drill
    title: "Прийменник + родовий"
    prompt: "Постав іменник у родовий відмінок після прийменника"
    items:
      - given: "школа → іду до..."
        answer: "до школи"
      - given: "парк → гуляємо біля..."
        answer: "біля парку"
      - given: "друг → лист від..."
        answer: "від друга"
      - given: "мама → квіти для..."
        answer: "для мами"
      - given: "обід → відпочиваю після..."
        answer: "після обіду"
      - given: "цукор → кава без..."
        answer: "без цукру"
      - given: "лікарня → аптека біля..."
        answer: "біля лікарні"
      - given: "музей → ходимо до..."
        answer: "до музею"
      - given: "подорож → повернувся з..."
        answer: "з подорожі"
      - given: "бабуся → подарунок від..."
        answer: "від бабусі"
      - given: "урок → після..."
        answer: "після уроку"
      - given: "робота → втомився від..."
        answer: "від роботи"

  - type: build_sentence
    title: "Склади речення з прийменником"
    instruction: "Обери правильну форму іменника"
    sentences:
      - words: ["Подарунок", "для", "[мама/мами]", "."]
        correct: "Подарунок для мами."
      - words: ["Кава", "без", "[цукор/цукру]", "."]
        correct: "Кава без цукру."
      - words: ["Я", "іду", "до", "[школа/школи]", "."]
        correct: "Я іду до школи."
      - words: ["Лист", "від", "[друг/друга]", "."]
        correct: "Лист від друга."
      - words: ["Після", "[обід/обіду]", "ми", "гуляємо", "."]
        correct: "Після обіду ми гуляємо."
      - words: ["Зупинка", "біля", "[парк/парку]", "."]
        correct: "Зупинка біля парку."
      - words: ["Книга", "для", "[діти/дітей]", "."]
        correct: "Книга для дітей."
      - words: ["Він", "приїхав", "із", "[Одеса/Одеси]", "."]
        correct: "Він приїхав із Одеси."

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "Подарунок для мамо."
        answer: false
        correction: "Подарунок для мами."
      - statement: "Кава без цукру."
        answer: true
      - statement: "Я іду до школа."
        answer: false
        correction: "Я іду до школи."
      - statement: "Після обіду ми відпочиваємо."
        answer: true
      - statement: "Лист від друг."
        answer: false
        correction: "Лист від друга."
      - statement: "Магазин біля парку."
        answer: true

  - type: pattern_drill
    title: "Часові вирази"
    prompt: "Утвори вираз із «після»"
    items:
      - given: "обід → після..."
        answer: "після обіду"
      - given: "урок → після..."
        answer: "після уроку"
      - given: "робота → після..."
        answer: "після роботи"
      - given: "сніданок → після..."
        answer: "після сніданку"
      - given: "вечеря → після..."
        answer: "після вечері"
      - given: "екскурсія → після..."
        answer: "після екскурсії"

  - type: reading
    title: "Читання: Лист від друга"
    text: |
      Привіт! Я приїхав із Одеси до Львова. Після подорожі я дуже втомився. Зараз відпочиваю біля готелю. Готель стоїть навпроти парку. Завтра піду до музею. Купив подарунок для мами — книгу без картинок, але дуже цікаву. До зустрічі!
    questions:
      - question: "Звідки він приїхав?"
        answer: "Із Одеси."
      - question: "Де він відпочиває?"
        answer: "Біля готелю."
      - question: "Для кого подарунок?"
        answer: "Для мами."
      - question: "Куди він піде завтра?"
        answer: "До музею."

  - type: proverb_drill
    title: "Прислів'я"
    items:
      - proverb: "На сонці тепло, а біля матері ___."
        answer: "добре"
      - proverb: "З добрим дружись, а лихого ___."
        answer: "стережись"
