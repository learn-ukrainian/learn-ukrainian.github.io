module: checkpoint-a2
track: l2-uk-direct
level: a2
type: checkpoint
title: "Контрольна точка A2"
subtitle: "Підсумкова перевірка: відмінки, дієвідміни, лексика, читання, письмо"
standard_ref: "Повний обсяг A2 — усі каталоги"
textbook_ref: "Grade 3-5 (узагальнення)"
teaching_notes: |
  Фінальна перевірка всіх навичок рівня A2.
  Охоплює: 7 відмінків, видові пари, наказовий спосіб, дієслова руху, синтетичне майбутнє.
  Також: ступені порівняння, займенники, числівники, прислівники, стилістика.
  Поріг проходження — 70% по кожному розділу.
  Формат: різноманітні типи вправ для об'єктивної оцінки.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "A2 = усі 7 відмінків + видові пари + складні речення + ~1050 нових слів."
  examples:
    - "Я написав листа другові. (давальний)"
    - "Я напишу — синтетичне майбутнє."
    - "Він біжить швидше за мене. (порівняння)"

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Відмінки (ключові прийменники)"
    items:
      - word: "без"
        emoji: "\u274C"
        sentence: "Кава без цукру."
      - word: "для"
        emoji: "\U0001F381"
        sentence: "Подарунок для мами."
      - word: "між"
        emoji: "\u2194\uFE0F"
        sentence: "Між школою і парком є магазин."
      - word: "перед"
        emoji: "\u23EA"
        sentence: "Перед обідом я працюю."
      - word: "після"
        emoji: "\u23E9"
        sentence: "Після роботи я відпочиваю."
      - word: "над"
        emoji: "\u2B06\uFE0F"
        sentence: "Лампа висить над столом."

  - category: "Дієслова (видові пари)"
    items:
      - word: "писати"
        emoji: "\u270D\uFE0F"
        sentence: "Я пишу листа. (недоконаний)"
      - word: "написати"
        emoji: "\u2705"
        sentence: "Я написав листа. (доконаний)"
      - word: "читати"
        emoji: "\U0001F4D6"
        sentence: "Вона читає книгу. (недоконаний)"
      - word: "прочитати"
        emoji: "\U0001F4D7"
        sentence: "Вона прочитала книгу. (доконаний)"
      - word: "робити"
        emoji: "\U0001F528"
        sentence: "Він робить домашнє завдання."
      - word: "зробити"
        emoji: "\u2714\uFE0F"
        sentence: "Він зробив домашнє завдання."

  - category: "Порівняння"
    items:
      - word: "кращий"
        emoji: "\U0001F947"
        sentence: "Цей фільм кращий за той."
      - word: "гірший"
        emoji: "\U0001F44E"
        sentence: "Погода гірша, ніж учора."
      - word: "найкращий"
        emoji: "\U0001F3C6"
        sentence: "Це найкращий день у моєму житті."
      - word: "більший"
        emoji: "\U0001F4CF"
        sentence: "Цей будинок більший за наш."

  - category: "Прислівники і стилістика"
    items:
      - word: "правильно"
        emoji: "\u2705"
        sentence: "Ти відповів правильно."
      - word: "швидше"
        emoji: "\u26A1"
        sentence: "Іди швидше — ми запізнюємося!"
      - word: "синонім"
        emoji: "\U0001F504"
        sentence: "«Друг» і «приятель» — синоніми."
      - word: "антонім"
        emoji: "\u2194\uFE0F"
        sentence: "«Великий» і «малий» — антоніми."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  # TRUE/FALSE: vocabulary
  - type: true_false
    title: "Лексика: правда чи неправда?"
    items:
      - statement: "«Друг» і «приятель» — антоніми."
        answer: false
        correction: "Це синоніми."
      - statement: "«Гарячий» і «холодний» — антоніми."
        answer: true
      - statement: "«Золоте серце» означає серце з золота."
        answer: false
        correction: "Це метафора — добра, щедра людина."
      - statement: "«Швидко» — це прислівник."
        answer: true
      - statement: "«Ніколи» відповідає на питання ДЕ?"
        answer: false
        correction: "«Ніколи» відповідає на питання КОЛИ?"
      - statement: "«Обережно» — прислівник, утворений від «обережний»."
        answer: true
      - statement: "«Кришталева вода» — це пряме значення."
        answer: false
        correction: "Це епітет — вода чиста і прозора, як кришталь."
      - statement: "«Привіт» — формальне звертання."
        answer: false
        correction: "«Привіт» — неформальне. Формальне — «Шановний...»"
      - statement: "«Бо» і «тому що» — синоніми."
        answer: true
      - statement: "«Готівка» — це банківська картка."
        answer: false
        correction: "Готівка — це паперові гроші, не картка."

  # TRUE/FALSE: grammar
  - type: true_false
    title: "Граматика: правда чи неправда?"
    items:
      - statement: "«Ніс» і «носа» — форми одного слова."
        answer: true
      - statement: "Місцевий відмінок від «рука» — «у руку»."
        answer: false
        correction: "У руці. «У руку» — знахідний."
      - statement: "«Я ходжу» — правильна форма від «ходити»."
        answer: true
      - statement: "Кома перед «що» не потрібна: «Я знаю що він тут.»"
        answer: false
        correction: "Потрібна: «Я знаю, що він тут.»"
      - statement: "Порівняльний ступінь від «добре» — «добріше»."
        answer: false
        correction: "Краще."
      - statement: "«Козак → козаче» — чергування [к] → [ч]."
        answer: true
      - statement: "«Сон → сну» — випадна голосна."
        answer: true
      - statement: "«Щоб» означає «мета, ціль»."
        answer: true
      - statement: "«Друг → друже» — чергування [г] → [ж]."
        answer: true
      - statement: "Прислівники змінюються за відмінками."
        answer: false
        correction: "Прислівники не змінюються."

  # TRUE/FALSE: reading comprehension
  - type: true_false
    title: "Читання: правда чи неправда?"
    items:
      - statement: "У рецепті перший крок — завжди увімкнути піч."
        answer: false
        correction: "Перший крок залежить від рецепту."
      - statement: "В оголошенні вказують дату, час і місце."
        answer: true
      - statement: "Біографія починається з місця роботи."
        answer: false
        correction: "Біографія починається з імені."
      - statement: "У діалозі з лікарем пацієнт описує симптоми."
        answer: true
      - statement: "Розклад транспорту містить час відправлення і прибуття."
        answer: true

  # PATTERN DRILLS: one per major topic
  - type: pattern_drill
    title: "Відмінки: утвори правильну форму"
    prompt: "Зміни слово у дужках"
    items:
      - given: "Я дав книгу (друг) → давальний"
        answer: "другові"
      - given: "Я був у (школа) → місцевий"
        answer: "школі"
      - given: "(Ніс) → родовий"
        answer: "носа"
      - given: "Він живе з (сестра) → орудний"
        answer: "сестрою"
      - given: "(Рука) → місцевий: на..."
        answer: "руці"
      - given: "Немає (день) → родовий"
        answer: "дня"

  - type: pattern_drill
    title: "Видові пари"
    prompt: "Утвори доконаний вид"
    items:
      - given: "писати → ?"
        answer: "написати"
      - given: "читати → ?"
        answer: "прочитати"
      - given: "робити → ?"
        answer: "зробити"
      - given: "вчити → ?"
        answer: "вивчити"
      - given: "казати → ?"
        answer: "сказати"

  - type: pattern_drill
    title: "Порівняльний ступінь"
    prompt: "Утвори порівняльний ступінь"
    items:
      - given: "великий → ?"
        answer: "більший"
      - given: "добрий → ?"
        answer: "кращий"
      - given: "швидко → ?"
        answer: "швидше"
      - given: "погано → ?"
        answer: "гірше"
      - given: "малий → ?"
        answer: "менший"

  - type: pattern_drill
    title: "Синтетичне майбутнє"
    prompt: "Утвори форму майбутнього часу (доконаний вид)"
    items:
      - given: "написати → я..."
        answer: "напишу"
      - given: "прочитати → вона..."
        answer: "прочитає"
      - given: "зробити → ми..."
        answer: "зробимо"
      - given: "сказати → він..."
        answer: "скаже"
      - given: "вивчити → я..."
        answer: "вивчу"

  - type: pattern_drill
    title: "Прислівники: утвори від прикметника"
    prompt: "Прикметник → прислівник"
    items:
      - given: "швидкий → ?"
        answer: "швидко"
      - given: "тихий → ?"
        answer: "тихо"
      - given: "правильний → ?"
        answer: "правильно"
      - given: "уважний → ?"
        answer: "уважно"
      - given: "спокійний → ?"
        answer: "спокійно"

  # BUILD SENTENCE: complex sentences
  - type: build_sentence
    title: "Складні речення"
    instruction: "Склади складне речення з підрядним сполучником"
    sentences:
      - words: ["Я", "вчуся", ",", "щоб", "знати", "мову", "."]
        correct: "Я вчуся, щоб знати мову."
      - words: ["Він", "каже", ",", "що", "все", "добре", "."]
        correct: "Він каже, що все добре."
      - words: ["Я", "знаю", ",", "де", "вона", "живе", "."]
        correct: "Я знаю, де вона живе."
      - words: ["Ми", "не", "пішли", ",", "тому", "що", "йшов", "дощ", "."]
        correct: "Ми не пішли, тому що йшов дощ."
      - words: ["Зателефонуй", ",", "коли", "прийдеш", "."]
        correct: "Зателефонуй, коли прийдеш."

  # CLASSIFY: vocabulary categories
  - type: classify
    title: "Синоніми чи антоніми?"
    instruction: "Розподіли пари"
    categories:
      - label: "Синоніми"
        items:
          - "друг — приятель"
          - "сміливий — хоробрий"
          - "великий — величезний"
      - label: "Антоніми"
        items:
          - "великий — малий"
          - "далекий — близький"
          - "молодий — старий"

  - type: classify
    title: "Який тип тексту?"
    instruction: "Розподіли ознаки за типом тексту"
    categories:
      - label: "Стаття"
        items:
          - "Заголовок і дата."
          - "Відповідає на: Хто? Що? Де?"
      - label: "Рецепт"
        items:
          - "Список інгредієнтів."
          - "Кроки приготування."
      - label: "Лист"
        items:
          - "Звертання і прощання."
          - "Основна частина з новинами."

  - type: classify
    title: "Тип прислівника"
    instruction: "Розподіли за питанням"
    categories:
      - label: "ЯК?"
        items:
          - "швидко"
          - "добре"
          - "тихо"
      - label: "ДЕ?"
        items:
          - "тут"
          - "далеко"
          - "ліворуч"
      - label: "КОЛИ?"
        items:
          - "зараз"
          - "завжди"
          - "потім"

  # READING
  - type: reading
    title: "Читання: Новина"
    text: |
      У Львові відкрили новий парк біля річки. Парк має дитячий майданчик, велосипедну доріжку і кав'ярню. Мер міста сказав, що парк буде працювати щодня з 7:00 до 22:00. Вхід безкоштовний. Багато людей прийшли на відкриття, тому що погода була чудова.
    questions:
      - question: "Що відкрили у Львові?"
        answer: "Новий парк біля річки."
      - question: "Що є в парку?"
        answer: "Дитячий майданчик, велосипедна доріжка і кав'ярня."
      - question: "Чому багато людей прийшли?"
        answer: "Тому що погода була чудова."

  - type: reading
    title: "Читання: Рецепт"
    text: |
      ВАРЕНИКИ З КАРТОПЛЕЮ

      Інгредієнти: 300 г борошна, 1 яйце, 150 мл води, 4 картоплини, 1 цибулина, сіль.

      Замісіть тісто з борошна, яйця і води. Зваріть і розімніть картоплю. Посмажте цибулю. Змішайте картоплю з цибулею — це начинка. Розкачайте тісто, виріжте кружечки, покладіть начинку і зліпіть вареники. Варіть у підсоленій воді 5 хвилин. Подавайте зі сметаною.
    questions:
      - question: "Скільки борошна потрібно?"
        answer: "300 грамів."
      - question: "Що є начинкою?"
        answer: "Картопля з цибулею."
      - question: "Скільки хвилин варити?"
        answer: "5 хвилин."

  - type: reading
    title: "Читання: Діалог у магазині"
    text: |
      — Добрий день! Мені потрібні зимові черевики.
      — Добрий день! Який у вас розмір?
      — 42-й.
      — Ось ці чорні — дуже теплі. Хочете приміряти?
      — Так, будь ласка. О, вони зручні! Скільки коштують?
      — 1800 гривень. Але сьогодні знижка 15 відсотків.
      — Чудово! Я візьму їх. Платити карткою можна?
      — Так, звичайно.
    questions:
      - question: "Що шукає покупець?"
        answer: "Зимові черевики."
      - question: "Який розмір?"
        answer: "42-й."
      - question: "Яка знижка?"
        answer: "15 відсотків."

  - type: reading
    title: "Читання: Лист"
    text: |
      Шановний пане Коваленку!

      Повідомляю Вам, що збори відбудуться 20 березня о 15:00 у кімнаті 301. На порядку денному: звіт за минулий рік і плани на наступний. Прошу підтвердити Вашу участь до 18 березня.

      З повагою,
      Оксана Петренко.
    questions:
      - question: "Коли відбудуться збори?"
        answer: "20 березня о 15:00."
      - question: "Де відбудуться збори?"
        answer: "У кімнаті 301."
      - question: "До якого числа треба підтвердити участь?"
        answer: "До 18 березня."

  # RIDDLES
  - type: riddle
    title: "Загадка 1"
    clues:
      - "Без рук, без ніг,"
      - "а двері відчиняє."
    answer: "ВІТЕР"
    answer_emoji: "\U0001F32C\uFE0F"
    source: "Grade 3"

  - type: riddle
    title: "Загадка 2"
    clues:
      - "Сидить дівчина в коморі,"
      - "а коса — на дворі."
    answer: "МОРКВА"
    answer_emoji: "\U0001F955"
    source: "Grade 3"

  # PROVERB
  - type: proverb_drill
    title: "Прислів'я"
    proverb: "Хто рано встає, тому Бог дає."
    activity:
      type: fill_gap
      gap_word: "рано"
      options: ["рано", "пізно", "завжди"]
      answer: "рано"
      meaning: "Хто працює наполегливо і рано починає, той досягає успіху."
