module: davalnyi-komu-chomu
track: l2-uk-direct
level: a2
type: grammar
title: "Давальний відмінок (КОМУ? ЧОМУ?)"
subtitle: "Дарувати, казати, допомагати — кому? Вік і стан — мені, тобі, йому"
standard_ref: "§4.2.3.3 — dative case"
textbook_ref: "Grade 4 p.35 — dative: КОМУ? ЧОМУ?"
teaching_notes: |
  Головне питання — КОМУ? Кому дати? Кому сказати? Кому допомогти?
  Чоловічий рід має ДВІ форми: братові/брату. Форма -ові/-еві — переважна для живих істот.
  Жіночий рід: -а → -і, -я → -і (як у родовому, але не плутати!).
  Чотири значення: давання, вік, стан (мені холодно), потреба (мені потрібно).
  Почніть з давання — найінтуїтивніше значення давального.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "КОМУ? → давальний відмінок. Давати, казати, допомагати, вік, стан."
  examples:
    - "Я дав книгу братові. (брат → братові)"
    - "Мамі сорок років. (мама → мамі)"
    - "Мені холодно. (я → мені)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Давальний відмінок — основні закінчення"
    columns: ["Рід", "Називний", "Давальний", "Зміна"]
    rows:
      - ["Чоловічий (твердий)", "брат", "братові / брату", "+ові / +у"]
      - ["Чоловічий (м'який)", "учитель", "учителеві / учителю", "+еві / +ю"]
      - ["Жіночий -а", "мама", "мамі", "-а → -і"]
      - ["Жіночий -я", "земля", "землі", "-я → -і"]
      - ["Середній -о", "місто", "місту", "-о → -у"]
      - ["Середній -е", "море", "морю", "-е → -ю"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Дієслова з давальним"
    items:
      - word: "дарувати"
        emoji: "\U0001F381"
        sentence: "Я дарую квіти мамі."
      - word: "допомагати"
        emoji: "\U0001F91D"
        sentence: "Він допомагає другові."
      - word: "показувати"
        emoji: "\U0001F449"
        sentence: "Вона показує фото бабусі."
      - word: "пояснювати"
        emoji: "\U0001F4AC"
        sentence: "Учитель пояснює учневі правило."
      - word: "відповідати"
        emoji: "\U0001F4E9"
        sentence: "Я відповідаю другові."
      - word: "обіцяти"
        emoji: "\U0001F91E"
        sentence: "Він обіцяє мамі прийти вчасно."
      - word: "дзвонити"
        emoji: "\U0001F4DE"
        sentence: "Вона дзвонить бабусі щодня."
      - word: "повідомляти"
        emoji: "\U0001F4E2"
        sentence: "Ми повідомляємо колезі про зустріч."

  - category: "Родина (давальний контекст)"
    items:
      - word: "бабуся"
        emoji: "\U0001F475"
        sentence: "Бабусі вісімдесят років."
      - word: "дідусь"
        emoji: "\U0001F474"
        sentence: "Дідусеві вісімдесят п'ять."
      - word: "онук"
        emoji: "\U0001F466"
        sentence: "Онукові п'ять років."
      - word: "онука"
        emoji: "\U0001F467"
        sentence: "Онуці три роки."

  - category: "Стан і потреба"
    items:
      - word: "холодно"
        emoji: "\U00002744"
        sentence: "Мені холодно на вулиці."
      - word: "тепло"
        emoji: "\U00002600"
        sentence: "Тобі тепло в куртці?"
      - word: "весело"
        emoji: "\U0001F604"
        sentence: "Дітям весело в парку."
      - word: "сумно"
        emoji: "\U0001F622"
        sentence: "Йому сумно без друзів."
      - word: "потрібно"
        emoji: "\U00002757"
        sentence: "Мені потрібно купити хліб."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Утвори давальний відмінок"
    prompt: "Постав іменник у давальний відмінок"
    items:
      - given: "брат → дати книгу..."
        answer: "братові"
      - given: "мама → подарувати квіти..."
        answer: "мамі"
      - given: "сестра → написати лист..."
        answer: "сестрі"
      - given: "учитель → пояснити..."
        answer: "учителеві"
      - given: "бабуся → подзвонити..."
        answer: "бабусі"
      - given: "друг → допомогти..."
        answer: "другові"
      - given: "дитина → дати іграшку..."
        answer: "дитині"
      - given: "батько → показати фото..."
        answer: "батькові"
      - given: "подруга → відповісти..."
        answer: "подрузі"
      - given: "дідусь → сказати..."
        answer: "дідусеві"
      - given: "колега → повідомити..."
        answer: "колезі"
      - given: "студент → пояснити..."
        answer: "студентові"
      - given: "директор → написати..."
        answer: "директорові"
      - given: "місто → дати назву..."
        answer: "місту"
      - given: "море → немає назви..."
        answer: "морю"

  - type: build_sentence
    title: "Кому що дарувати?"
    instruction: "Склади речення за зразком: Я дарую [що?] [кому?]"
    sentences:
      - words: ["Я", "дарую", "квіти", "[мама/мамі]", "."]
        correct: "Я дарую квіти мамі."
      - words: ["Він", "дає", "книгу", "[брат/братові]", "."]
        correct: "Він дає книгу братові."
      - words: ["Вона", "пише", "лист", "[подруга/подрузі]", "."]
        correct: "Вона пише лист подрузі."
      - words: ["Ми", "допомагаємо", "[бабуся/бабусі]", "."]
        correct: "Ми допомагаємо бабусі."
      - words: ["Учитель", "пояснює", "правило", "[учень/учневі]", "."]
        correct: "Учитель пояснює правило учневі."
      - words: ["Я", "дзвоню", "[друг/другові]", "щодня", "."]
        correct: "Я дзвоню другові щодня."
      - words: ["Вона", "показує", "фото", "[дідусь/дідусеві]", "."]
        correct: "Вона показує фото дідусеві."
      - words: ["Тарас", "дарує", "цукерки", "[сестра/сестрі]", "."]
        correct: "Тарас дарує цукерки сестрі."

  - type: pattern_drill
    title: "Скільки років?"
    prompt: "Утвори речення про вік"
    items:
      - given: "бабуся, 80"
        answer: "Бабусі вісімдесят років."
      - given: "дідусь, 85"
        answer: "Дідусеві вісімдесят п'ять років."
      - given: "брат, 25"
        answer: "Братові двадцять п'ять років."
      - given: "сестра, 18"
        answer: "Сестрі вісімнадцять років."
      - given: "онук, 5"
        answer: "Онукові п'ять років."
      - given: "мама, 50"
        answer: "Мамі п'ятдесят років."

  - type: true_false
    title: "Правильно чи неправильно?"
    items:
      - statement: "Мені холодно."
        answer: true
      - statement: "Я дарую квіти мамо."
        answer: false
        correction: "Я дарую квіти мамі."
      - statement: "Бабусі вісімдесят років."
        answer: true
      - statement: "Він допомагає друг."
        answer: false
        correction: "Він допомагає другові."
      - statement: "Мені потрібно працювати."
        answer: true
      - statement: "Вона дзвонить сестра."
        answer: false
        correction: "Вона дзвонить сестрі."

  - type: classify
    title: "Які закінчення?"
    instruction: "Розподіли за родом"
    categories:
      - label: "-ові / -еві (чоловічий)"
        items:
          - "братові"
          - "другові"
          - "учителеві"
          - "батькові"
          - "дідусеві"
      - label: "-і (жіночий)"
        items:
          - "мамі"
          - "сестрі"
          - "бабусі"
          - "подрузі"
          - "дитині"
      - label: "-у / -ю (середній)"
        items:
          - "місту"
          - "морю"
          - "серцю"

  - type: reading
    title: "Читання: День народження"
    text: |
      Сьогодні день народження мами. Мамі п'ятдесят років! Тарас подарував мамі букет троянд. Оля дала мамі красиву хустку. Батько подарував мамі нову сумку. Бабуся спекла мамі торт. Увечері всі сиділи за столом. Дітям було весело, а мамі — щасливо.
    questions:
      - question: "Скільки років мамі?"
        answer: "П'ятдесят років."
      - question: "Що подарував Тарас мамі?"
        answer: "Букет троянд."
      - question: "Що зробила бабуся для мами?"
        answer: "Спекла торт."
      - question: "Як почувалися діти?"
        answer: "Дітям було весело."

  - type: proverb_drill
    title: "Прислів'я"
    items:
      - proverb: "Друга шукай, а знайдеш — ___."
        answer: "тримай"
      - proverb: "Нових друзів май, а старих не ___."
        answer: "забувай"
