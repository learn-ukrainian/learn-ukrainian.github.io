module: chytannia-praktyka
track: l2-uk-direct
level: a2
type: reading
title: "Практика читання"
subtitle: "Стаття, рецепт, інструкція, розклад — розуміємо різні типи текстів"
standard_ref: "§1.2 — читання: короткі статті, рецепти, інструкції, розклади"
textbook_ref: "Grade 4-5 (робота з текстами різних типів)"
teaching_notes: |
  Чотири типи текстів: новинна стаття, рецепт, інструкція, розклад транспорту.
  Кожен тип має свою структуру і лексику — навчайте розпізнавати тип тексту.
  Стаття: заголовок + факти. Рецепт: інгредієнти + кроки. Інструкція: послідовність дій.
  Розклад: таблиця з часом — знайди конкретну інформацію.
  Завдання: прочитати, зрозуміти основну думку, знайти деталі.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Різні типи текстів мають різну структуру. Визнач тип — і зрозуміти буде легше."
  examples:
    - "Стаття: Заголовок. Хто? Що? Де? Коли?"
    - "Рецепт: Інгредієнти. Крок 1, крок 2..."
    - "Розклад: Маршрут — час відправлення — час прибуття"

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Стаття (новини)"
    items:
      - word: "стаття"
        emoji: "\U0001F4F0"
        sentence: "Я прочитав цікаву статтю в газеті."
      - word: "заголовок"
        emoji: "\U0001F4CB"
        sentence: "Заголовок статті — «Нова школа в Києві»."
      - word: "повідомляти"
        emoji: "\U0001F4E3"
        sentence: "Газета повідомляє про нову подію."
      - word: "подія"
        emoji: "\U0001F4C5"
        sentence: "Це важлива подія для міста."
      - word: "відкриття"
        emoji: "\u2702\uFE0F"
        sentence: "Відкриття музею відбулося вчора."

  - category: "Рецепт (кухня)"
    items:
      - word: "інгредієнт"
        emoji: "\U0001F9C0"
        sentence: "Головний інгредієнт — борошно."
      - word: "додати"
        emoji: "\u2795"
        sentence: "Додайте дві ложки цукру."
      - word: "перемішати"
        emoji: "\U0001F944"
        sentence: "Перемішайте все разом."
      - word: "випікати"
        emoji: "\U0001F3F5\uFE0F"
        sentence: "Випікайте 30 хвилин при 180 градусах."
      - word: "готовий"
        emoji: "\u2705"
        sentence: "Страва готова — можна подавати!"

  - category: "Інструкція (техніка)"
    items:
      - word: "натиснути"
        emoji: "\U0001F446"
        sentence: "Натисніть кнопку «Увімкнути»."
      - word: "увімкнути"
        emoji: "\U0001F50C"
        sentence: "Увімкніть пристрій."
      - word: "вимкнути"
        emoji: "\u26D4"
        sentence: "Вимкніть після використання."
      - word: "крок"
        emoji: "1\uFE0F\u20E3"
        sentence: "Крок 1: відкрийте коробку."
      - word: "обережно"
        emoji: "\u26A0\uFE0F"
        sentence: "Обережно — поверхня гаряча!"

  - category: "Розклад (транспорт)"
    items:
      - word: "розклад"
        emoji: "\U0001F4C5"
        sentence: "Подивись розклад автобусів."
      - word: "маршрут"
        emoji: "\U0001F68C"
        sentence: "Маршрут 27 іде до центру."
      - word: "відправлення"
        emoji: "\U0001F55A"
        sentence: "Час відправлення — 08:30."
      - word: "прибуття"
        emoji: "\U0001F3C1"
        sentence: "Час прибуття — 09:15."
      - word: "зупинка"
        emoji: "\U0001F68F"
        sentence: "Наступна зупинка — площа Ринок."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: reading
    title: "Текст 1: Новинна стаття"
    text: |
      НОВА БІБЛІОТЕКА В ОДЕСІ

      У середу, 5 березня, в Одесі відкрили нову міську бібліотеку. Будівля знаходиться на вулиці Дерибасівській. У бібліотеці є 50 тисяч книг українською мовою. Також є комп'ютерний зал та дитяча кімната. Мер міста сказав, що бібліотека працюватиме щодня з 9:00 до 21:00.
    questions:
      - question: "Що відкрили в Одесі?"
        answer: "Нову міську бібліотеку."
      - question: "Де знаходиться бібліотека?"
        answer: "На вулиці Дерибасівській."
      - question: "Скільки книг є в бібліотеці?"
        answer: "50 тисяч."
      - question: "Коли бібліотека працює?"
        answer: "Щодня з 9:00 до 21:00."

  - type: reading
    title: "Текст 2: Рецепт"
    text: |
      СИРНИКИ

      Інгредієнти: 500 г сиру, 2 яйця, 3 ложки борошна, 2 ложки цукру.

      Крок 1. Покладіть сир у миску і розімніть виделкою.
      Крок 2. Додайте яйця, борошно і цукор. Перемішайте.
      Крок 3. Зліпіть маленькі кружечки.
      Крок 4. Обваляйте в борошні.
      Крок 5. Смажте на сковорідці 3 хвилини з кожного боку.
      Крок 6. Подавайте зі сметаною. Смачного!
    questions:
      - question: "Скільки сиру потрібно?"
        answer: "500 грамів."
      - question: "Що додають до сиру?"
        answer: "Яйця, борошно і цукор."
      - question: "Скільки хвилин смажити з кожного боку?"
        answer: "3 хвилини."

  - type: reading
    title: "Текст 3: Інструкція"
    text: |
      ЯК КОРИСТУВАТИСЯ КАВОВАРКОЮ

      Крок 1. Наповніть резервуар водою до позначки «MAX».
      Крок 2. Покладіть мелену каву в фільтр.
      Крок 3. Закрийте кришку.
      Крок 4. Натисніть кнопку «Увімкнути». Індикатор засвітиться.
      Крок 5. Зачекайте 3–5 хвилин. Кава готова!

      Обережно: не торкайтеся гарячих частин. Після використання вимкніть кавоварку.
    questions:
      - question: "До якої позначки наповнити воду?"
        answer: "До позначки «MAX»."
      - question: "Скільки чекати?"
        answer: "3–5 хвилин."
      - question: "Що треба зробити після використання?"
        answer: "Вимкнути кавоварку."

  - type: reading
    title: "Текст 4: Розклад автобусів"
    text: |
      РОЗКЛАД АВТОБУСА №27 (ВОКЗАЛ — ЦЕНТР — АЕРОПОРТ)

      Вокзал: 06:00, 07:30, 09:00, 10:30, 12:00, 14:00, 16:00, 18:00, 20:00.
      Центр (площа Ринок): через 25 хвилин після відправлення.
      Аеропорт: через 50 хвилин після відправлення.

      Квиток: 15 гривень. Учні та студенти — 8 гривень.
      У неділю автобус ходить рідше: 08:00, 12:00, 16:00, 20:00.
    questions:
      - question: "О котрій перший автобус у будній день?"
        answer: "О 06:00."
      - question: "Скільки часу їхати від вокзалу до центру?"
        answer: "25 хвилин."
      - question: "Скільки коштує квиток для студента?"
        answer: "8 гривень."
      - question: "Скільки рейсів у неділю?"
        answer: "Чотири."

  - type: classify
    title: "Який тип тексту?"
    instruction: "Розподіли ознаки за типом тексту"
    categories:
      - label: "Стаття"
        items:
          - "Є заголовок і дата."
          - "Розповідає про подію."
          - "Відповідає на «Хто? Що? Де? Коли?»"
      - label: "Рецепт"
        items:
          - "Список інгредієнтів."
          - "Кроки приготування."
          - "«Перемішайте», «додайте»."
      - label: "Інструкція"
        items:
          - "«Натисніть кнопку»."
          - "Послідовність дій."
          - "«Обережно!»"
      - label: "Розклад"
        items:
          - "Час відправлення."
          - "Маршрут і зупинки."
          - "Ціна квитка."

  - type: true_false
    title: "Розуміння текстів"
    items:
      - statement: "Нова бібліотека в Одесі працює тільки в будні."
        answer: false
        correction: "Бібліотека працює щодня."
      - statement: "Для сирників потрібно 500 г борошна."
        answer: false
        correction: "Потрібно 500 г сиру, а борошна — 3 ложки."
      - statement: "Кавоварку треба вимкнути після використання."
        answer: true
      - statement: "Автобус №27 їде від вокзалу до аеропорту за 25 хвилин."
        answer: false
        correction: "До аеропорту — 50 хвилин. До центру — 25."

  - type: build_sentence
    title: "Перекажи текст"
    instruction: "Склади короткий переказ (3 речення)"
    sentences:
      - words: ["В", "Одесі", "відкрили", "нову", "бібліотеку", "."]
        correct: "В Одесі відкрили нову бібліотеку."
      - words: ["Вона", "знаходиться", "на", "Дерибасівській", "."]
        correct: "Вона знаходиться на Дерибасівській."
      - words: ["Там", "є", "50", "тисяч", "книг", "."]
        correct: "Там є 50 тисяч книг."
