module: skladni-rechennia
track: l2-uk-direct
level: a2
type: grammar
title: "Складні речення"
subtitle: "Що, щоб, де, куди, тому що, коли — підрядні сполучники"
standard_ref: "§4.4 — складні речення з що, щоб, де/куди/звідки, тому що/бо"
textbook_ref: "Grade 4-5 (підрядні сполучники, складнопідрядні речення)"
teaching_notes: |
  Розширення А1-сполучників (і, а, але, бо) підрядними: що, щоб, де, куди, звідки, коли.
  Ключове правило пунктуації: кома ПЕРЕД сполучником у складному реченні.
  Навчайте через функцію: мета (щоб), причина (бо/тому що), місце (де/куди), час (коли).
  Починайте з найпростішого — «що» (Я знаю, що він тут).
  Дайте вправи на об'єднання двох простих речень в одне складне.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Головне речення + кома + сполучник + підрядне речення."
  examples:
    - "Я знаю, що він прийде."
    - "Я вчуся, щоб знати мову."
    - "Скажи, де ти живеш."
    - "Я прийду, коли закінчу."

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Підрядні сполучники"
    columns: ["Сполучник", "Функція", "Приклад"]
    rows:
      - ["що", "зміст", "Я знаю, що він тут."]
      - ["щоб", "мета", "Я вчуся, щоб знати мову."]
      - ["де", "місце", "Я знаю, де він живе."]
      - ["куди", "напрямок", "Скажи, куди ти йдеш."]
      - ["звідки", "походження", "Я не знаю, звідки він."]
      - ["тому що", "причина", "Я не пішов, тому що йшов дощ."]
      - ["бо", "причина (розм.)", "Він не прийшов, бо захворів."]
      - ["коли", "час", "Я прийду, коли закінчу."]

  - title: "Пунктуація"
    columns: ["Правило", "Правильно", "Неправильно"]
    rows:
      - ["Кома перед що", "Я знаю, що він тут.", "Я знаю що він тут."]
      - ["Кома перед щоб", "Вона вчиться, щоб знати.", "Вона вчиться щоб знати."]
      - ["Кома перед тому що", "Я не їм, тому що не хочу.", "Я не їм тому що не хочу."]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Підрядні сполучники"
    items:
      - word: "що"
        emoji: "\U0001F4AC"
        sentence: "Він каже, що все добре."
      - word: "щоб"
        emoji: "\U0001F3AF"
        sentence: "Я читаю, щоб знати більше."
      - word: "де"
        emoji: "\U0001F4CD"
        sentence: "Ти знаєш, де аптека?"
      - word: "куди"
        emoji: "\u27A1\uFE0F"
        sentence: "Скажи, куди ти йдеш."
      - word: "звідки"
        emoji: "\U0001F30D"
        sentence: "Вона не знає, звідки він."
      - word: "коли"
        emoji: "\u23F0"
        sentence: "Зателефонуй, коли прийдеш."

  - category: "Дієслова мовлення та думки"
    items:
      - word: "знати"
        emoji: "\U0001F4A1"
        sentence: "Я знаю, що це правда."
      - word: "казати"
        emoji: "\U0001F5E3\uFE0F"
        sentence: "Він каже, що не може прийти."
      - word: "думати"
        emoji: "\U0001F914"
        sentence: "Я думаю, що це правильно."
      - word: "розуміти"
        emoji: "\U0001F9E0"
        sentence: "Ти розумієш, що треба робити?"
      - word: "питати"
        emoji: "\u2753"
        sentence: "Вона питає, де бібліотека."
      - word: "відповідати"
        emoji: "\U0001F4E9"
        sentence: "Він відповідає, що не знає."

  - category: "Додаткові слова"
    items:
      - word: "головне"
        emoji: "\u2B50"
        sentence: "Головне, щоб усі були здорові."
      - word: "важливо"
        emoji: "\u2757"
        sentence: "Важливо, щоб ти прийшов вчасно."
      - word: "тому"
        emoji: "\U0001F4A1"
        sentence: "Він хворий, тому не прийшов."
      - word: "хоча"
        emoji: "\U0001F504"
        sentence: "Хоча він втомився, він працює далі."
      - word: "якщо"
        emoji: "\u2049\uFE0F"
        sentence: "Якщо буде сонце, ми підемо гуляти."
      - word: "поки"
        emoji: "\u23F3"
        sentence: "Читай, поки я готую обід."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Яка функція сполучника?"
    instruction: "Розподіли сполучники за функцією"
    categories:
      - label: "Мета (для чого?)"
        items:
          - "щоб"
      - label: "Причина (чому?)"
        items:
          - "бо"
          - "тому що"
      - label: "Місце (де? куди?)"
        items:
          - "де"
          - "куди"
          - "звідки"
      - label: "Час (коли?)"
        items:
          - "коли"
          - "поки"
      - label: "Зміст (що?)"
        items:
          - "що"

  - type: build_sentence
    title: "З'єднай два речення"
    instruction: "Об'єднай два прості речення в одне складне"
    sentences:
      - words: ["Я", "вчуся", ",", "щоб", "знати", "мову", "."]
        correct: "Я вчуся, щоб знати мову."
      - words: ["Він", "каже", ",", "що", "завтра", "буде", "дощ", "."]
        correct: "Він каже, що завтра буде дощ."
      - words: ["Я", "знаю", ",", "де", "вона", "живе", "."]
        correct: "Я знаю, де вона живе."
      - words: ["Я", "прийду", ",", "коли", "закінчу", "роботу", "."]
        correct: "Я прийду, коли закінчу роботу."
      - words: ["Він", "не", "прийшов", ",", "тому", "що", "захворів", "."]
        correct: "Він не прийшов, тому що захворів."

  - type: pattern_drill
    title: "Допиши сполучник"
    prompt: "Вибери правильний сполучник"
    items:
      - given: "Я не прийшов, ___ був хворий."
        answer: "тому що"
      - given: "Вона вчиться, ___ здати іспит."
        answer: "щоб"
      - given: "Він знає, ___ я живу."
        answer: "де"
      - given: "Скажи, ___ ти йдеш."
        answer: "куди"
      - given: "Я думаю, ___ це правильно."
        answer: "що"
      - given: "Зателефонуй, ___ прийдеш."
        answer: "коли"
      - given: "Я не знаю, ___ він приїхав."
        answer: "звідки"
      - given: "Він не їсть, ___ не голодний."
        answer: "бо"

  - type: true_false
    title: "Пунктуація: правильно чи ні?"
    items:
      - statement: "Я знаю що він тут."
        answer: false
        correction: "Я знаю, що він тут. (Кома перед «що».)"
      - statement: "Він каже, що все добре."
        answer: true
      - statement: "Вона вчиться щоб знати."
        answer: false
        correction: "Вона вчиться, щоб знати. (Кома перед «щоб».)"
      - statement: "Я прийду, коли закінчу."
        answer: true
      - statement: "Він не прийшов тому що захворів."
        answer: false
        correction: "Він не прийшов, тому що захворів. (Кома перед «тому що».)"
      - statement: "Скажи, де ти був."
        answer: true

  - type: build_sentence
    title: "Відповідай складним реченням"
    instruction: "Дай відповідь, використовуючи підрядний сполучник"
    sentences:
      - words: ["Чому?", "→", "Тому", "що", "йшов", "дощ", "."]
        correct: "Тому що йшов дощ."
      - words: ["Для", "чого?", "→", "Щоб", "вивчити", "мову", "."]
        correct: "Щоб вивчити мову."
      - words: ["Де?", "→", "Там", ",", "де", "живе", "бабуся", "."]
        correct: "Там, де живе бабуся."
      - words: ["Коли?", "→", "Коли", "закінчиться", "дощ", "."]
        correct: "Коли закінчиться дощ."

  - type: reading
    title: "Читання: Плани на літо"
    text: |
      Марія думає, що літо — найкраща пора року. Вона хоче поїхати на море, тому що дуже любить плавати. Марія знає, де є гарний пляж. Вона каже, що треба їхати рано, щоб знайти гарне місце. Коли вона приїде на пляж, вона буде плавати і читати книгу. Її подруга питає, куди Марія їде. Марія відповідає, що їде на море, бо хоче відпочити.
    questions:
      - question: "Що Марія думає про літо?"
        answer: "Що літо — найкраща пора року."
      - question: "Чому вона хоче на море?"
        answer: "Тому що дуже любить плавати."
      - question: "Навіщо треба їхати рано?"
        answer: "Щоб знайти гарне місце."
      - question: "Що питає подруга?"
        answer: "Куди Марія їде."
