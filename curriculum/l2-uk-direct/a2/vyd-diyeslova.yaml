module: vyd-diyeslova
track: l2-uk-direct
level: a2
type: grammar
title: "Вид дієслова: процес і результат"
subtitle: "Недоконаний і доконаний вид — читати/прочитати, робити/зробити"
standard_ref: "\xA74.3.1 — aspect pairs: робити\u2013зробити, писати\u2013написати"
textbook_ref: "Grade 4 p.97+ — aspect pairs"
teaching_notes: |
  Вид як значення, не як граматичний ярлик: процес (недоконаний) vs результат (доконаний).
  Опорні слова: завжди/часто/зараз \u2192 недоконаний; вже/нарешті/раптом \u2192 доконаний.
  Навчайте парами: читати\u2013прочитати, писати\u2013написати. Не абстрактні правила.
  Уникайте термінів «недоконаний/доконаний» — використовуйте «процес» і «результат».
  Почніть із найчастіших 10 пар, потім розширюйте через контекст.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Процес (що робиш?) — недоконаний вид. Результат (що зробив?) — доконаний вид. Опорні слова підказують вид."
  examples:
    - "Я читаю книгу щодня. (процес — недоконаний)"
    - "Я прочитав книгу вчора. (результат — доконаний)"
    - "Вона часто пише листи. (процес)"
    - "Вона написала листа сьогодні. (результат)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Основні видові пари"
    columns: ["Процес (недоконаний)", "Результат (доконаний)", "Значення"]
    rows:
      - ["читати", "прочитати", "читати / дочитати"]
      - ["писати", "написати", "писати / написати"]
      - ["робити", "зробити", "робити / зробити"]
      - ["говорити", "сказати", "говорити / сказати"]
      - ["бачити", "побачити", "бачити / помітити"]
      - ["їсти", "з'їсти", "їсти / з'їсти"]
      - ["пити", "випити", "пити / випити"]
      - ["вчити", "вивчити", "вчити / вивчити"]
      - ["ходити", "піти", "ходити / піти"]
      - ["їздити", "поїхати", "їздити / поїхати"]

  - title: "Опорні слова"
    columns: ["Процес (недоконаний)", "Результат (доконаний)"]
    rows:
      - ["завжди", "вже"]
      - ["часто", "нарешті"]
      - ["іноді", "раптом"]
      - ["зараз", "одного разу"]
      - ["кожного дня", "учора (за контекстом)"]
      - ["щоранку", "—"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Видові пари (дієслова)"
    items:
      - word: "читати / прочитати"
        emoji: "\U0001F4D6"
        sentence: "Я читаю книгу. Я вже прочитав її."
      - word: "писати / написати"
        emoji: "\U0000270D"
        sentence: "Він пише лист. Він уже написав лист."
      - word: "робити / зробити"
        emoji: "\U0001F6E0"
        sentence: "Вона робить домашнє завдання. Вона зробила його."
      - word: "говорити / сказати"
        emoji: "\U0001F4AC"
        sentence: "Він часто говорить про це. Він сказав це вчора."
      - word: "бачити / побачити"
        emoji: "\U0001F440"
        sentence: "Я бачу його щодня. Я побачив його вчора."
      - word: "їсти / з'їсти"
        emoji: "\U0001F37D"
        sentence: "Ми їмо обід. Ми з'їли все."
      - word: "пити / випити"
        emoji: "\U00002615"
        sentence: "Вона п'є чай. Вона випила чай."
      - word: "вчити / вивчити"
        emoji: "\U0001F393"
        sentence: "Він вчить нові слова. Він вивчив усі слова."

  - category: "Опорні слова"
    items:
      - word: "завжди"
        emoji: "\U0001F504"
        sentence: "Він завжди читає перед сном."
      - word: "часто"
        emoji: "\U0001F503"
        sentence: "Ми часто гуляємо в парку."
      - word: "іноді"
        emoji: "\U0001F914"
        sentence: "Іноді вона пише вірші."
      - word: "зараз"
        emoji: "\U000023F0"
        sentence: "Зараз я читаю книгу."
      - word: "вже"
        emoji: "\U00002705"
        sentence: "Я вже прочитав цю книгу."
      - word: "нарешті"
        emoji: "\U0001F389"
        sentence: "Нарешті він написав лист."
      - word: "раптом"
        emoji: "\U000026A1"
        sentence: "Раптом він побачив друга."

  - category: "Додаткові дієслова"
    items:
      - word: "купувати / купити"
        emoji: "\U0001F6D2"
        sentence: "Вона часто купує книги. Вчора вона купила словник."
      - word: "готувати / приготувати"
        emoji: "\U0001F373"
        sentence: "Мама готує обід. Мама приготувала борщ."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Процес чи результат?"
    instruction: "Розподіли дієслова: процес (недоконаний) чи результат (доконаний)"
    categories:
      - label: "Процес (недоконаний)"
        items:
          - "читати"
          - "писати"
          - "робити"
          - "говорити"
          - "бачити"
          - "їсти"
          - "пити"
          - "вчити"
          - "купувати"
          - "готувати"
      - label: "Результат (доконаний)"
        items:
          - "прочитати"
          - "написати"
          - "зробити"
          - "сказати"
          - "побачити"
          - "з'їсти"
          - "випити"
          - "вивчити"
          - "купити"
          - "приготувати"

  - type: pattern_drill
    title: "Утвори пару"
    prompt: "Назви доконаний вид дієслова"
    items:
      - given: "читати \u2192 ?"
        answer: "прочитати"
      - given: "писати \u2192 ?"
        answer: "написати"
      - given: "робити \u2192 ?"
        answer: "зробити"
      - given: "говорити \u2192 ?"
        answer: "сказати"
      - given: "бачити \u2192 ?"
        answer: "побачити"
      - given: "їсти \u2192 ?"
        answer: "з'їсти"
      - given: "пити \u2192 ?"
        answer: "випити"
      - given: "вчити \u2192 ?"
        answer: "вивчити"
      - given: "купувати \u2192 ?"
        answer: "купити"
      - given: "готувати \u2192 ?"
        answer: "приготувати"

  - type: build_sentence
    title: "Обери правильний вид"
    instruction: "Обери дієслово, яке підходить до контексту"
    sentences:
      - words: ["Я", "[читаю/прочитаю]", "книгу", "щодня", "."]
        correct: "Я читаю книгу щодня."
      - words: ["Вона", "вже", "[писала/написала]", "лист", "."]
        correct: "Вона вже написала лист."
      - words: ["Він", "завжди", "[говорить/скаже]", "правду", "."]
        correct: "Він завжди говорить правду."
      - words: ["Ми", "нарешті", "[робимо/зробили]", "це", "."]
        correct: "Ми нарешті зробили це."
      - words: ["Я", "зараз", "[п'ю/вип'ю]", "каву", "."]
        correct: "Я зараз п'ю каву."
      - words: ["Раптом", "він", "[бачить/побачив]", "друга", "."]
        correct: "Раптом він побачив друга."

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "«Написати» означає процес."
        answer: false
        correction: "«Написати» — це результат (доконаний вид)."
      - statement: "«Читати» — це процес."
        answer: true
      - statement: "Опорне слово «завжди» підказує доконаний вид."
        answer: false
        correction: "«Завжди» підказує недоконаний вид (процес)."
      - statement: "«Вже» підказує результат."
        answer: true
      - statement: "«Говорити» і «сказати» — це видова пара."
        answer: true

  - type: pattern_drill
    title: "Опорне слово \u2192 вид"
    prompt: "Яке дієслово підходить: процес чи результат?"
    items:
      - given: "завжди \u2192 (читати / прочитати)"
        answer: "читати"
      - given: "вже \u2192 (робити / зробити)"
        answer: "зробити"
      - given: "часто \u2192 (писати / написати)"
        answer: "писати"
      - given: "нарешті \u2192 (вчити / вивчити)"
        answer: "вивчити"
      - given: "зараз \u2192 (їсти / з'їсти)"
        answer: "їсти"
      - given: "раптом \u2192 (бачити / побачити)"
        answer: "побачити"
      - given: "іноді \u2192 (готувати / приготувати)"
        answer: "готувати"
      - given: "одного разу \u2192 (говорити / сказати)"
        answer: "сказати"

  - type: reading
    title: "Читання: Мій день"
    text: |
      Я завжди встаю о сьомій ранку. Щоранку я п'ю каву і читаю новини. Сьогодні я прочитав цікаву статтю. Потім я пішов на роботу. Я часто їжджу автобусом, але сьогодні пішов пішки. На роботі я написав важливий лист. Зазвичай я пишу листи довго, але цей написав швидко. Увечері я приготував вечерю. Нарешті я з'їв свій улюблений борщ!
    questions:
      - question: "Які дієслова процесу (недоконаний вид) є в тексті?"
        answer: "Встаю, п'ю, читаю, їжджу, пишу."
      - question: "Які дієслова результату (доконаний вид) є в тексті?"
        answer: "Прочитав, пішов, написав, приготував, з'їв."
      - question: "Яке опорне слово підказує, що «читаю» — процес?"
        answer: "Щоранку."

  - type: proverb_drill
    title: "Прислів'я"
    items:
      - proverb: "Те, що можна зробити сьогодні, не відкладай на ___."
        answer: "завтра"
      - proverb: "Хто рано встає, тому Бог ___."
        answer: "дає"
