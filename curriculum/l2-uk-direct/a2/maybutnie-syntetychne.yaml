# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Синтетичне майбутнє"
    prompt: "Утвори синтетичну форму майбутнього"
    items:
      - given: "читати \u2192 я"
        answer: "читатиму"
      - given: "писати \u2192 ти"
        answer: "писатимеш"
      - given: "говорити \u2192 він"
        answer: "говоритиме"
      - given: "працювати \u2192 ми"
        answer: "працюватимемо"
      - given: "вчити \u2192 ви"
        answer: "вчитимете"
      - given: "готувати \u2192 вони"
        answer: "готуватимуть"
      - given: "слухати \u2192 я"
        answer: "слухатиму"
      - given: "дивитися \u2192 вона"
        answer: "дивитиметься"
      - given: "гуляти \u2192 ми"
        answer: "гулятимемо"
      - given: "малювати \u2192 ти"
        answer: "малюватимеш"
      - given: "купувати \u2192 вони"
        answer: "купуватимуть"
      - given: "допомагати \u2192 я"
        answer: "допомагатиму"

  - type: classify
    title: "Який це тип майбутнього?"
    instruction: "Розподіли форми: складений, синтетичний чи доконаний простий"
    categories:
      - label: "Складений (буду + інф.)"
        items:
          - "буду читати"
          - "буде писати"
          - "будемо працювати"
          - "будуть говорити"
          - "будете вчити"
      - label: "Синтетичний (-тиму)"
        items:
          - "читатиму"
          - "писатиме"
          - "працюватимемо"
          - "говоритимуть"
          - "вчитимете"
      - label: "Доконаний простий"
        items:
          - "прочитаю"
          - "напишу"
          - "зроблю"
          - "скажу"
          - "вивчу"

  - type: build_sentence
    title: "Плани на завтра"
    instruction: "Обери правильну форму майбутнього"
    sentences:
      - words: ["Завтра", "я", "[читатиму/буду прочитаю]", "книгу", "."]
        correct: "Завтра я читатиму книгу."
      - words: ["Я", "[напишу/буду написати]", "лист", "до", "вечора", "."]
        correct: "Я напишу лист до вечора."
      - words: ["Ми", "[працюватимемо/будемо зробимо]", "весь", "день", "."]
        correct: "Ми працюватимемо весь день."
      - words: ["Вона", "[скаже/буде скаже]", "правду", "."]
        correct: "Вона скаже правду."
      - words: ["Вони", "[говоритимуть/будуть сказати]", "українською", "."]
        correct: "Вони говоритимуть українською."

  - type: pattern_drill
    title: "Доконаний простий майбутній"
    prompt: "Утвори форму доконаного майбутнього"
    items:
      - given: "написати \u2192 я"
        answer: "напишу"
      - given: "прочитати \u2192 ти"
        answer: "прочитаєш"
      - given: "сказати \u2192 він"
        answer: "скаже"
      - given: "зробити \u2192 ми"
        answer: "зробимо"
      - given: "вивчити \u2192 ви"
        answer: "вивчите"
      - given: "побачити \u2192 вони"
        answer: "побачать"
      - given: "купити \u2192 я"
        answer: "куплю"
      - given: "приготувати \u2192 вона"
        answer: "приготує"
      - given: "з'їсти \u2192 ми"
        answer: "з'їмо"
      - given: "випити \u2192 ти"
        answer: "вип'єш"

  - type: true_false
    title: "Правильно чи ні?"
    items:
      - statement: "«Я буду прочитаю» — це правильно."
        answer: false
        correction: "Не можна поєднувати «буду» з доконаним. Правильно: «Я прочитаю» або «Я буду читати»."
      - statement: "«Читатиму» і «буду читати» — це те саме."
        answer: true
      - statement: "«Напишу» — це теперішній час."
        answer: false
        correction: "«Напишу» — це простий майбутній (доконаний вид)."
      - statement: "Синтетичне майбутнє утворюється додаванням -тиму до інфінітива."
        answer: true
      - statement: "«Прочитаю» означає процес читання."
        answer: false
        correction: "«Прочитаю» — результат (доконаний вид)."

  - type: reading
    title: "Читання: Плани на вихідні"
    text: |
      У суботу я працюватиму вранці, а після обіду відпочиватиму. Мій друг Олег теж буде відпочивати. Ми домовилися: він приїде до мене о третій. Спочатку ми поїдемо в парк. Там гулятимемо і розмовлятимемо. Потім зайдемо в кав'ярню. Я замовлю каву, а Олег скаже: «Мені чай, будь ласка!» У неділю я прочитаю книгу, яку давно хотів прочитати. А ввечері напишу лист бабусі. Сподіваюся, вихідні будуть чудові!
    questions:
      - question: "Коли оповідач працюватиме?"
        answer: "У суботу вранці."
      - question: "Що вони робитимуть у парку?"
        answer: "Гулятимуть і розмовлятимуть."
      - question: "Що замовить Олег у кав'ярні?"
        answer: "Чай."
      - question: "Знайди синтетичну форму і складену форму з однаковим значенням."
        answer: "Працюватиму (синтетична) і буде відпочивати (складена)."

  - type: proverb_drill
    title: "Прислів'я"
    items:
      - proverb: "Хто хоче багато мати, тому треба мало ___."
        answer: "спати"
