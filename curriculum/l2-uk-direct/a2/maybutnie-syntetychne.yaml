module: maybutnie-syntetychne
track: l2-uk-direct
level: a2
type: grammar
title: "Синтетичне майбутнє"
subtitle: "Читатиму, писатимеш, говоритиме — простий майбутній час"
standard_ref: "\xA74.2.3 — synthetic future, \xA74.3.1 — perfective simple future"
textbook_ref: "Grade 4 (Kravtsova p.94) — dual future forms, Grade 5 — expanded conjugation"
teaching_notes: |
  Три способи виразити майбутнє: складений (буду + інфінітив), синтетичний (-тиму), доконаний простий (прочитаю).
  Синтетичний = інфінітив + -му/-меш/-ме/-мемо/-мете/-муть. Те саме значення, що й складений.
  Доконаний простий: доконане дієслово відмінюється як теперішній час, але значення — майбутнє.
  Головна помилка: «буду прочитаю» — не можна поєднувати буду + доконаний.
  Навчайте через плани: «Завтра я читатиму / буду читати / прочитаю».

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Складений: буду + інфінітив. Синтетичний: інфінітив + -тиму. Доконаний: відмінюється як теперішній. Ніколи: буду + доконаний."
  examples:
    - "Я буду читати. = Я читатиму. (недоконаний, процес)"
    - "Я прочитаю книгу. (доконаний, результат)"
    - "Він писатиме лист. = Він буде писати лист."

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Три типи майбутнього часу"
    columns: ["Тип", "Утворення", "Приклад", "Вживання"]
    rows:
      - ["Складений (A1)", "буду + інфінітив", "буду читати", "Недоконаний — процес"]
      - ["Синтетичний", "основа + -тиму/-меш...", "читатиму", "Недоконаний — те саме"]
      - ["Доконаний простий", "відмінюване доконане", "прочитаю", "Доконаний — результат"]

  - title: "Синтетичне майбутнє: відмінювання"
    columns: ["Особа", "читати", "писати", "говорити"]
    rows:
      - ["я", "читатиму", "писатиму", "говоритиму"]
      - ["ти", "читатимеш", "писатимеш", "говоритимеш"]
      - ["він/вона", "читатиме", "писатиме", "говоритиме"]
      - ["ми", "читатимемо", "писатимемо", "говоритимемо"]
      - ["ви", "читатимете", "писатимете", "говоритимете"]
      - ["вони", "читатимуть", "писатимуть", "говоритимуть"]

  - title: "Доконаний простий майбутній"
    columns: ["Дієслово", "я", "ти", "він/вона", "ми", "ви", "вони"]
    rows:
      - ["прочитати", "прочитаю", "прочитаєш", "прочитає", "прочитаємо", "прочитаєте", "прочитають"]
      - ["написати", "напишу", "напишеш", "напише", "напишемо", "напишете", "напишуть"]
      - ["сказати", "скажу", "скажеш", "скаже", "скажемо", "скажете", "скажуть"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
