module: rodovyi-praktyka
track: l2-uk-direct
level: a2
type: practice
title: "Родовий: практика"
subtitle: "Змішані вправи — належність, прийменники, кількість, заперечення"
standard_ref: "§4.2.3.2 — all genitive uses"
textbook_ref: "Grade 4 — genitive consolidation"
teaching_notes: |
  Консолідація всіх чотирьох значень родового: належність, прийменники, кількість, заперечення.
  Вправи змішують усі типи — учень має сам визначити, яке значення використано.
  Важливо: складніші речення з кількома родовими формами (Після уроку іду до друга без книги).
  Загадки та прислів'я — для закріплення і мотивації.
  Це останній модуль перед контрольним — має бути інтенсивна практика.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Родовий = 4 функції: належність, прийменники, кількість, заперечення."
  examples:
    - "Книга брата. (належність)"
    - "Після обіду іду до парку. (прийменники)"
    - "П'ять книг. (кількість)"
    - "Немає часу. (заперечення)"

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Змішана лексика — належність"
    items:
      - word: "колега"
        emoji: "\U0001F4BC"
        sentence: "Це ноутбук колеги."
      - word: "директор"
        emoji: "\U0001F468"
        sentence: "Кабінет директора на другому поверсі."
      - word: "студент"
        emoji: "\U0001F393"
        sentence: "Зошит студента лежить на столі."
      - word: "сусідка"
        emoji: "\U0001F469"
        sentence: "Кішка сусідки гуляє в дворі."

  - category: "Змішана лексика — прийменники"
    items:
      - word: "подорож"
        emoji: "\U00002708"
        sentence: "Після подорожі ми відпочиваємо."
      - word: "зустріч"
        emoji: "\U0001F91D"
        sentence: "До зустрічі залишилося п'ять хвилин."
      - word: "екзамен"
        emoji: "\U0001F4DD"
        sentence: "Перед екзаменом він нервує."
      - word: "вокзал"
        emoji: "\U0001F689"
        sentence: "Готель біля вокзалу."

  - category: "Змішана лексика — кількість"
    items:
      - word: "сторінка"
        emoji: "\U0001F4C4"
        sentence: "У книзі двісті сторінок."
      - word: "поверх"
        emoji: "\U0001F3E2"
        sentence: "У будинку дев'ять поверхів."
      - word: "кімната"
        emoji: "\U0001F6CF"
        sentence: "Три кімнати в квартирі."
      - word: "учасник"
        emoji: "\U0001F465"
        sentence: "Багато учасників на конференції."

  - category: "Змішана лексика — заперечення"
    items:
      - word: "досвід"
        emoji: "\U0001F4BC"
        sentence: "Немає досвіду в цій сфері."
      - word: "помилка"
        emoji: "\U0000274C"
        sentence: "Немає помилок у тексті."
      - word: "проблема"
        emoji: "\U000026A0"
        sentence: "Немає проблем!"
      - word: "новини"
        emoji: "\U0001F4F0"
        sentence: "Немає новин — це добрі новини."
      - word: "запитання"
        emoji: "\U00002753"
        sentence: "Немає запитань? Тоді починаємо."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Яка функція родового?"
    instruction: "Розподіли за значенням родового відмінка"
    categories:
      - label: "Належність"
        items:
          - "книга брата"
          - "машина батька"
          - "кімната сестри"
          - "зошит студента"
          - "кабінет директора"
      - label: "Прийменник"
        items:
          - "після обіду"
          - "до школи"
          - "біля парку"
          - "без цукру"
          - "для мами"
      - label: "Кількість"
        items:
          - "п'ять книг"
          - "три брати"
          - "багато людей"
          - "мало часу"
          - "два кілограми"
      - label: "Заперечення"
        items:
          - "немає хліба"
          - "не було дощу"
          - "не буде уроку"
          - "немає інтернету"
          - "немає часу"

  - type: pattern_drill
    title: "Змішаний родовий"
    prompt: "Утвори правильну форму"
    items:
      - given: "мама → подарунок для..."
        answer: "для мами"
      - given: "хліб → немає..."
        answer: "немає хліба"
      - given: "5 + учень"
        answer: "п'ять учнів"
      - given: "брат → це книга..."
        answer: "брата"
      - given: "школа → біля..."
        answer: "біля школи"
      - given: "дощ → не було..."
        answer: "не було дощу"
      - given: "3 + яблуко"
        answer: "три яблука"
      - given: "сестра → кімната..."
        answer: "сестри"
      - given: "обід → після..."
        answer: "після обіду"
      - given: "вода → немає..."
        answer: "немає води"
      - given: "2 + брат"
        answer: "два брати"
      - given: "друг → від..."
        answer: "від друга"
      - given: "урок → не буде..."
        answer: "не буде уроку"
      - given: "парк → до..."
        answer: "до парку"
      - given: "цукор → без..."
        answer: "без цукру"
      - given: "10 + книга"
        answer: "десять книг"
      - given: "бабуся → це дім..."
        answer: "бабусі"
      - given: "молоко → немає..."
        answer: "немає молока"
      - given: "вечір → до..."
        answer: "до вечора"
      - given: "багато + людина"
        answer: "багато людей"

  - type: build_sentence
    title: "Складне речення"
    instruction: "Склади речення з кількома родовими формами"
    sentences:
      - words: ["Після", "[урок/уроку]", "я", "іду", "до", "[друг/друга]", "."]
        correct: "Після уроку я іду до друга."
      - words: ["Немає", "[хліб/хліба]", "—", "треба", "піти", "до", "[магазин/магазину]", "."]
        correct: "Немає хліба — треба піти до магазину."
      - words: ["Без", "[книга/книги]", "не", "буде", "[урок/уроку]", "."]
        correct: "Без книги не буде уроку."
      - words: ["Я", "купив", "три", "[кілограм/кілограми]", "[яблуко/яблук]", "для", "[мама/мами]", "."]
        correct: "Я купив три кілограми яблук для мами."

  - type: reading
    title: "Читання: Після подорожі"
    text: |
      Марко повернувся з Києва. Після подорожі він дуже втомився. У нього немає сил. Але він привіз подарунки! Для сестри — два кілограми цукерок і букет квітів. Для батька — книгу про історію Києва. Для мами — красиву хустку з магазину біля Золотих воріт. Немає подарунка тільки для кота — але кіт і так радий, що Марко вдома!
    questions:
      - question: "Звідки повернувся Марко?"
        answer: "З Києва."
      - question: "Що він привіз для сестри?"
        answer: "Два кілограми цукерок і букет квітів."
      - question: "Для кого немає подарунка?"
        answer: "Для кота."

  - type: riddle
    title: "Загадка"
    clues:
      - "Хто ходить без ніг?"
    answer: "ГОДИННИК"
    answer_emoji: "\U0001F552"
    source: "Grade 3"

  - type: proverb_drill
    title: "Прислів'я"
    proverb: "Без діла нудно, без хліба голодно."
    source: "Grade 3"
    explanation: "Без + родовий: діло → діла, хліб → хліба."

  - type: tongue_twister
    title: "Скоромовка"
    text: "Летіли лелеки, летіли лелеки, летіли й сіли на ялинці гілці."
    source: "Grade 3 p.63"
