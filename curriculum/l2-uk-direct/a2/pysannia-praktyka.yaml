module: pysannia-praktyka
track: l2-uk-direct
level: a2
type: writing
title: "Практика письма"
subtitle: "Тексти до 50 слів: мій день, мій друг, відпустка, лист, оголошення"
standard_ref: "§1.3 — тексти до 50 слів, підтримання письмової комунікації"
textbook_ref: "Grade 4-5 (розвиток писемного мовлення, твори-описи)"
teaching_notes: |
  П'ять типів письмових завдань: опис дня, опис друга, розповідь про відпустку, відповідь на лист, оголошення.
  Кожен текст — близько 50 слів. Це не твір, а практичний текст.
  Навчайте через каркас: дайте структуру і ключові фрази.
  Зв'язність: вчіть використовувати сполучники (і, але, тому що, потім).
  Розрізняйте формальне (оголошення) і неформальне (лист другу) письмо.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Гарний текст = чітка структура + зв'язки між реченнями (потім, тому що, також)."
  examples:
    - "Спочатку я снідаю. Потім іду на роботу."
    - "Мій друг високий і спортивний. Він любить футбол."
    - "Оголошення: Увага! 15 березня о 18:00..."

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Розпорядок дня"
    items:
      - word: "вставати"
        emoji: "\u23F0"
        sentence: "Я встаю о сьомій ранку."
      - word: "снідати"
        emoji: "\U0001F95E"
        sentence: "Потім я снідаю."
      - word: "обідати"
        emoji: "\U0001F372"
        sentence: "Я обідаю о першій."
      - word: "вечеряти"
        emoji: "\U0001F37D\uFE0F"
        sentence: "Ми вечеряємо разом."
      - word: "лягати спати"
        emoji: "\U0001F634"
        sentence: "Я лягаю спати о десятій."

  - category: "Опис людини"
    items:
      - word: "зовнішність"
        emoji: "\U0001F464"
        sentence: "Він має приємну зовнішність."
      - word: "високий"
        emoji: "\U0001F4CF"
        sentence: "Мій друг високий."
      - word: "характер"
        emoji: "\U0001F60A"
        sentence: "Вона має добрий характер."
      - word: "веселий"
        emoji: "\U0001F604"
        sentence: "Він завжди веселий."
      - word: "розумний"
        emoji: "\U0001F9E0"
        sentence: "Вона дуже розумна."

  - category: "Відпустка і подорожі"
    items:
      - word: "відпустка"
        emoji: "\U0001F3D6\uFE0F"
        sentence: "Минулого літа я був у відпустці."
      - word: "подорожувати"
        emoji: "\u2708\uFE0F"
        sentence: "Ми подорожували по Україні."
      - word: "відвідати"
        emoji: "\U0001F4CD"
        sentence: "Я відвідав Львів."
      - word: "відпочивати"
        emoji: "\U0001F9D8"
        sentence: "Ми відпочивали на морі."
      - word: "вражений"
        emoji: "\U0001F929"
        sentence: "Я був вражений красою гір."

  - category: "Зв'язки між реченнями"
    items:
      - word: "спочатку"
        emoji: "1\uFE0F\u20E3"
        sentence: "Спочатку ми поїхали до Києва."
      - word: "потім"
        emoji: "2\uFE0F\u20E3"
        sentence: "Потім — до Одеси."
      - word: "нарешті"
        emoji: "3\uFE0F\u20E3"
        sentence: "Нарешті ми повернулися додому."
      - word: "крім того"
        emoji: "\u2795"
        sentence: "Крім того, я купив сувеніри."
      - word: "загалом"
        emoji: "\U0001F4CA"
        sentence: "Загалом, відпустка була чудова."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: build_sentence
    title: "Мій типовий день"
    instruction: "Склади текст про свій день із запропонованих фраз"
    sentences:
      - words: ["Я", "встаю", "о", "сьомій", "ранку", "."]
        correct: "Я встаю о сьомій ранку."
      - words: ["Потім", "я", "снідаю", "і", "п'ю", "каву", "."]
        correct: "Потім я снідаю і п'ю каву."
      - words: ["О", "дев'ятій", "я", "починаю", "працювати", "."]
        correct: "О дев'ятій я починаю працювати."
      - words: ["Я", "обідаю", "о", "першій", "."]
        correct: "Я обідаю о першій."
      - words: ["Увечері", "я", "гуляю", "або", "читаю", "."]
        correct: "Увечері я гуляю або читаю."

  - type: build_sentence
    title: "Мій найкращий друг"
    instruction: "Опиши друга: зовнішність + характер + інтереси"
    sentences:
      - words: ["Мого", "друга", "звати", "Андрій", "."]
        correct: "Мого друга звати Андрій."
      - words: ["Він", "високий", "і", "спортивний", "."]
        correct: "Він високий і спортивний."
      - words: ["Андрій", "дуже", "веселий", "і", "добрий", "."]
        correct: "Андрій дуже веселий і добрий."
      - words: ["Він", "любить", "грати", "у", "футбол", "."]
        correct: "Він любить грати у футбол."
      - words: ["Ми", "дружимо", "вже", "десять", "років", "."]
        correct: "Ми дружимо вже десять років."

  - type: build_sentence
    title: "Моя відпустка"
    instruction: "Розкажи про останню відпустку (минулий час)"
    sentences:
      - words: ["Минулого", "літа", "я", "відпочивав", "на", "морі", "."]
        correct: "Минулого літа я відпочивав на морі."
      - words: ["Ми", "поїхали", "в", "Одесу", "."]
        correct: "Ми поїхали в Одесу."
      - words: ["Спочатку", "ми", "гуляли", "по", "місту", "."]
        correct: "Спочатку ми гуляли по місту."
      - words: ["Потім", "ми", "ходили", "на", "пляж", "щодня", "."]
        correct: "Потім ми ходили на пляж щодня."
      - words: ["Відпустка", "була", "чудова", "!"]
        correct: "Відпустка була чудова!"

  - type: build_sentence
    title: "Відповідь на лист"
    instruction: "Напиши відповідь другу (неформальний лист)"
    sentences:
      - words: ["Привіт", ",", "Оленко", "!"]
        correct: "Привіт, Оленко!"
      - words: ["Дякую", "за", "листа", "!"]
        correct: "Дякую за листа!"
      - words: ["У", "мене", "все", "добре", "."]
        correct: "У мене все добре."
      - words: ["Я", "зараз", "багато", "працюю", ",", "але", "це", "цікаво", "."]
        correct: "Я зараз багато працюю, але це цікаво."
      - words: ["Чекаю", "на", "зустріч", "!", "Бувай", "!"]
        correct: "Чекаю на зустріч! Бувай!"

  - type: build_sentence
    title: "Оголошення"
    instruction: "Склади формальне оголошення про подію"
    sentences:
      - words: ["Увага", "!", "Концерт", "українського", "хору", "."]
        correct: "Увага! Концерт українського хору."
      - words: ["Дата", ":", "15", "березня", ",", "субота", "."]
        correct: "Дата: 15 березня, субота."
      - words: ["Час", ":", "о", "18:00", "."]
        correct: "Час: о 18:00."
      - words: ["Місце", ":", "Палац", "культури", "."]
        correct: "Місце: Палац культури."
      - words: ["Вхід", "вільний", ".", "Запрошуємо", "всіх", "!"]
        correct: "Вхід вільний. Запрошуємо всіх!"

  - type: pattern_drill
    title: "З'єднай речення сполучниками"
    prompt: "Об'єднай два речення в одне за допомогою сполучника"
    items:
      - given: "Я снідаю. Потім я йду на роботу."
        answer: "Я снідаю, а потім іду на роботу."
      - given: "Він веселий. Він добрий."
        answer: "Він веселий і добрий."
      - given: "Ми не гуляли. Йшов дощ."
        answer: "Ми не гуляли, бо йшов дощ."
      - given: "Я хотів піти. Я був зайнятий."
        answer: "Я хотів піти, але був зайнятий."
      - given: "Я вчу мову. Я хочу подорожувати."
        answer: "Я вчу мову, щоб подорожувати."

  - type: classify
    title: "Формальне чи неформальне?"
    instruction: "Розподіли вирази за стилем письма"
    categories:
      - label: "Формальне"
        items:
          - "Увага! Оголошення."
          - "Запрошуємо всіх бажаючих."
          - "Початок о 18:00."
          - "Вхід вільний."
      - label: "Неформальне"
        items:
          - "Привіт!"
          - "Як справи?"
          - "Було круто!"
          - "Пока! Бувай!"
