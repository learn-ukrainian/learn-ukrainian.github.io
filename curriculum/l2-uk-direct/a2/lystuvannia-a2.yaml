module: lystuvannia-a2
track: l2-uk-direct
level: a2
type: writing
title: "Листування"
subtitle: "Лист, біографія, запрошення, оголошення — тексти до 50 слів"
standard_ref: "§1.3 — написання: біографія 10–15 фраз, листи, запрошення, оголошення, 50 слів"
textbook_ref: "Grade 4-5 (листування, ділове мовлення)"
teaching_notes: |
  Чотири типи текстів: коротка біографія, особистий лист, запрошення, оголошення.
  Кожен тип має чітку структуру — навчайте саме структуру.
  Лист: звертання → основна частина → завершення.
  Розрізняйте формальне (Шановний!) і неформальне (Привіт!) звертання.
  Усі тексти — до 50 слів. Це не есе, а практичні тексти.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Кожен тип тексту має свою структуру: вступ → основна частина → завершення."
  examples:
    - "Лист: Дорога Оленко! ... З повагою, Марія."
    - "Біографія: Мене звати... Я народився... Я працюю..."
    - "Запрошення: Запрошую тебе на... Дата: ... Місце: ..."

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Структура особистого листа"
    columns: ["Частина", "Приклад (неформальний)", "Приклад (формальний)"]
    rows:
      - ["Звертання", "Привіт, Оленко!", "Шановний пане Іване!"]
      - ["Основна частина", "Як справи? У мене все добре.", "Пишу Вам щодо..."]
      - ["Завершення", "Чекаю на відповідь! Пока!", "З повагою, Марія Ковальчук."]

  - title: "Структура біографії"
    columns: ["Пункт", "Приклад"]
    rows:
      - ["Ім'я", "Мене звати Тарас Коваленко."]
      - ["Дата народження", "Я народився 5 березня 1995 року."]
      - ["Місце", "Я живу в Києві."]
      - ["Сім'я", "У мене є брат і сестра."]
      - ["Освіта", "Я закінчив університет."]
      - ["Робота", "Я працюю вчителем."]
      - ["Хобі", "Я люблю читати і грати на гітарі."]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Звертання і прощання"
    items:
      - word: "шановний"
        emoji: "\U0001F3A9"
        sentence: "Шановний пане директоре!"
      - word: "дорогий"
        emoji: "\u2764\uFE0F"
        sentence: "Дорогий друже, як справи?"
      - word: "з повагою"
        emoji: "\U0001F4DD"
        sentence: "З повагою, Оксана Петренко."
      - word: "чекаю на відповідь"
        emoji: "\U0001F4E9"
        sentence: "Чекаю на відповідь!"
      - word: "привіт"
        emoji: "\U0001F44B"
        sentence: "Привіт, Марійко!"

  - category: "Біографія"
    items:
      - word: "народитися"
        emoji: "\U0001F476"
        sentence: "Я народився в Києві."
      - word: "закінчити"
        emoji: "\U0001F393"
        sentence: "Вона закінчила школу у 2020 році."
      - word: "працювати"
        emoji: "\U0001F4BC"
        sentence: "Він працює лікарем."
      - word: "цікавитися"
        emoji: "\U0001F9D0"
        sentence: "Я цікавлюся історією."
      - word: "мріяти"
        emoji: "\U0001F31F"
        sentence: "Вона мріє подорожувати."

  - category: "Запрошення і оголошення"
    items:
      - word: "запрошувати"
        emoji: "\U0001F4E8"
        sentence: "Запрошуємо вас на свято!"
      - word: "відбутися"
        emoji: "\U0001F4C5"
        sentence: "Концерт відбудеться 10 травня."
      - word: "місце"
        emoji: "\U0001F4CD"
        sentence: "Місце проведення — парк Шевченка."
      - word: "час"
        emoji: "\u23F0"
        sentence: "Початок о 18:00."
      - word: "оголошення"
        emoji: "\U0001F4E2"
        sentence: "Читайте оголошення на дошці."

  - category: "Дієслова листування"
    items:
      - word: "писати"
        emoji: "\u270D\uFE0F"
        sentence: "Я пишу тобі листа."
      - word: "повідомляти"
        emoji: "\U0001F4E3"
        sentence: "Повідомляю, що зустріч перенесено."
      - word: "дякувати"
        emoji: "\U0001F64F"
        sentence: "Дякую за запрошення!"
      - word: "вибачати"
        emoji: "\U0001F614"
        sentence: "Вибачте за затримку."
      - word: "просити"
        emoji: "\U0001F91D"
        sentence: "Прошу підтвердити участь."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: build_sentence
    title: "Напиши біографію"
    instruction: "Склади речення біографії за підказками"
    sentences:
      - words: ["Мене", "звати", "Оксана", "Ковальчук", "."]
        correct: "Мене звати Оксана Ковальчук."
      - words: ["Я", "народилася", "15", "квітня", "1998", "року", "."]
        correct: "Я народилася 15 квітня 1998 року."
      - words: ["Я", "живу", "в", "Одесі", "."]
        correct: "Я живу в Одесі."
      - words: ["Я", "закінчила", "університет", "у", "2020", "році", "."]
        correct: "Я закінчила університет у 2020 році."
      - words: ["Я", "працюю", "вчителькою", "."]
        correct: "Я працюю вчителькою."
      - words: ["Я", "люблю", "подорожувати", "і", "читати", "."]
        correct: "Я люблю подорожувати і читати."

  - type: pattern_drill
    title: "Структура листа"
    prompt: "Визнач частину листа: звертання, основна частина чи завершення?"
    items:
      - given: "Дорога Маріє!"
        answer: "звертання"
      - given: "Як у тебе справи?"
        answer: "основна частина"
      - given: "З повагою, Тарас."
        answer: "завершення"
      - given: "Шановний пане Коваленку!"
        answer: "звертання"
      - given: "Пишу, щоб повідомити новину."
        answer: "основна частина"
      - given: "Чекаю на відповідь!"
        answer: "завершення"

  - type: build_sentence
    title: "Склади запрошення"
    instruction: "Склади запрошення на день народження"
    sentences:
      - words: ["Запрошую", "тебе", "на", "день", "народження", "!"]
        correct: "Запрошую тебе на день народження!"
      - words: ["Дата", ":", "20", "червня", ",", "субота", "."]
        correct: "Дата: 20 червня, субота."
      - words: ["Час", ":", "о", "17:00", "."]
        correct: "Час: о 17:00."
      - words: ["Місце", ":", "кафе", "«Веселка»", "."]
        correct: "Місце: кафе «Веселка»."
      - words: ["Будь", "ласка", ",", "підтвердь", "до", "18", "червня", "."]
        correct: "Будь ласка, підтвердь до 18 червня."

  - type: classify
    title: "Формальне чи неформальне?"
    instruction: "Розподіли фрази: формальне чи неформальне звертання?"
    categories:
      - label: "Формальне"
        items:
          - "Шановний пане Іване!"
          - "З повагою, Оксана Ковальчук."
          - "Повідомляю Вам, що..."
          - "Прошу Вас..."
          - "Щиро дякую."
      - label: "Неформальне"
        items:
          - "Привіт, Марійко!"
          - "Як справи?"
          - "Пока!"
          - "Цілую!"
          - "Бувай!"

  - type: reading
    title: "Читання: Лист подрузі"
    text: |
      Привіт, Оленко!

      Як у тебе справи? У мене все добре. Я зараз у Львові — приїхала на тиждень. Тут дуже гарно! Я вже була в кав'ярні на площі Ринок. Завтра хочу піти в музей.

      Може, приїдеш до мене на вихідні? Було б класно!

      Чекаю на відповідь!
      Марія.
    questions:
      - question: "Де зараз Марія?"
        answer: "У Львові."
      - question: "Де вона вже була?"
        answer: "У кав'ярні на площі Ринок."
      - question: "Що вона хоче зробити завтра?"
        answer: "Піти в музей."
      - question: "Що вона пропонує Оленці?"
        answer: "Приїхати на вихідні."

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "«Привіт» — це формальне звертання."
        answer: false
        correction: "«Привіт» — неформальне звертання."
      - statement: "У листі кома ставиться після звертання."
        answer: false
        correction: "Після звертання ставиться знак оклику: «Дорогий друже!»"
      - statement: "«З повагою» — це завершення листа."
        answer: true
      - statement: "Біографія починається з дати народження."
        answer: false
        correction: "Біографія починається з імені."
      - statement: "У запрошенні вказують дату, час і місце."
        answer: true
