module: orudnyi-priymennyky
track: l2-uk-direct
level: a2
type: grammar
title: "Орудний відмінок з прийменниками"
subtitle: "З/із, за, між, над, під, перед — місце і супровід"
standard_ref: "\xA74.2.3.5 — instrumental prepositions"
textbook_ref: "Grade 4 — instrumental with prepositions: з, за, між, над, під, перед"
teaching_notes: |
  Головна ідея — прийменники з/із, за, між, над, під, перед вимагають орудного відмінка.
  Ключовий контраст: з + орудний (супровід) vs з + родовий (походження): з другом vs з Києва.
  Навчайте через просторові сцени: опис кімнати, розташування предметів.
  Використовуйте реальні ситуації: «кава з молоком», «кіт під столом».
  Не перевантажуйте термінами — фокус на питаннях КИМ? ЧИМ? і прийменниках.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "Прийменники з/із, за, між, над, під, перед + орудний відмінок. З + орудний = супровід, з + родовий = звідки."
  examples:
    - "Кава з молоком. (молоко \u2192 молоком)"
    - "Кіт під столом. (стіл \u2192 столом)"
    - "Лампа над столом. (стіл \u2192 столом)"
    - "Він стоїть перед будинком. (будинок \u2192 будинком)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Прийменники + орудний відмінок"
    columns: ["Прийменник", "Значення", "Приклад"]
    rows:
      - ["з / із", "супровід", "кава з молоком, гуляти з другом"]
      - ["з / із", "ознака", "дівчина з довгим волоссям"]
      - ["за", "позаду", "за будинком, за столом"]
      - ["між", "поміж", "між школою і парком"]
      - ["над", "зверху", "лампа над столом"]
      - ["під", "знизу", "кіт під столом"]
      - ["перед", "попереду / до", "перед будинком, перед обідом"]

  - title: "Орудний відмінок: закінчення"
    columns: ["Рід", "Називний", "Орудний", "Зміна"]
    rows:
      - ["Чоловічий", "стіл", "столом", "-ом"]
      - ["Чоловічий", "друг", "другом", "-ом"]
      - ["Жіночий -а", "школа", "школою", "-а \u2192 -ою"]
      - ["Жіночий -я", "земля", "землею", "-я \u2192 -ею"]
      - ["Середній", "вікно", "вікном", "-о \u2192 -ом"]
      - ["Середній", "море", "морем", "-е \u2192 -ем"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Прийменники"
    items:
      - word: "з / із"
        emoji: "\U0001F91D"
        sentence: "Я гуляю з другом у парку."
      - word: "за"
        emoji: "\U0001F3E0"
        sentence: "Сад знаходиться за будинком."
      - word: "між"
        emoji: "\U00002194"
        sentence: "Магазин між школою і парком."
      - word: "над"
        emoji: "\U00002B06"
        sentence: "Лампа висить над столом."
      - word: "під"
        emoji: "\U00002B07"
        sentence: "Кіт спить під стільцем."
      - word: "перед"
        emoji: "\U000027A1"
        sentence: "Автобус зупинився перед школою."

  - category: "Місця і предмети"
    items:
      - word: "будинок"
        emoji: "\U0001F3E0"
        sentence: "Дерево росте перед будинком."
      - word: "стіл"
        emoji: "\U0001FA91"
        sentence: "Лампа стоїть над столом."
      - word: "стілець"
        emoji: "\U0001FA91"
        sentence: "Сумка лежить під стільцем."
      - word: "парк"
        emoji: "\U0001F333"
        sentence: "Ми гуляємо між деревами в парку."
      - word: "кімната"
        emoji: "\U0001F6CF"
        sentence: "Килим лежить між ліжком і шафою."

  - category: "Їжа і напої (з чим?)"
    items:
      - word: "молоко"
        emoji: "\U0001F95B"
        sentence: "Я п'ю каву з молоком."
      - word: "цукор"
        emoji: "\U0001F9C2"
        sentence: "Чай із цукром дуже смачний."
      - word: "масло"
        emoji: "\U0001F9C8"
        sentence: "Хліб з маслом — мій сніданок."
      - word: "сир"
        emoji: "\U0001F9C0"
        sentence: "Бутерброд із сиром і шинкою."
      - word: "сметана"
        emoji: "\U0001F95B"
        sentence: "Борщ зі сметаною — класика."

  - category: "Люди (з ким?)"
    items:
      - word: "друг"
        emoji: "\U0001F468"
        sentence: "Він гуляє з другом щовечора."
      - word: "подруга"
        emoji: "\U0001F469"
        sentence: "Оля розмовляє з подругою."
      - word: "сусід"
        emoji: "\U0001F3E1"
        sentence: "Ми познайомилися із сусідом."
      - word: "колега"
        emoji: "\U0001F4BC"
        sentence: "Вона обідає з колегою."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: classify
    title: "Значення прийменників"
    instruction: "Розподіли прийменники за значенням: супровід, місце чи час"
    categories:
      - label: "Супровід (з ким? з чим?)"
        items:
          - "кава з молоком"
          - "гуляти з другом"
          - "дівчина з довгим волоссям"
          - "хліб із маслом"
      - label: "Місце (де?)"
        items:
          - "під столом"
          - "над вікном"
          - "між деревами"
          - "за будинком"
      - label: "Час (коли?)"
        items:
          - "перед обідом"
          - "перед уроком"

  - type: pattern_drill
    title: "Де предмет? (місце)"
    prompt: "Постав іменник в орудний відмінок"
    items:
      - given: "стіл \u2192 кіт під..."
        answer: "під столом"
      - given: "стілець \u2192 сумка під..."
        answer: "під стільцем"
      - given: "будинок \u2192 сад за..."
        answer: "за будинком"
      - given: "школа \u2192 дерево перед..."
        answer: "перед школою"
      - given: "вікно \u2192 лампа над..."
        answer: "над вікном"
      - given: "ліжко \u2192 килим між шафою і..."
        answer: "між шафою і ліжком"
      - given: "парк \u2192 магазин між вулицею і..."
        answer: "між вулицею і парком"
      - given: "двері \u2192 килимок перед..."
        answer: "перед дверима"
      - given: "дерево \u2192 лавка під..."
        answer: "під деревом"
      - given: "дах \u2192 зірки над..."
        answer: "над дахом"
      - given: "шафа \u2192 кіт за..."
        answer: "за шафою"
      - given: "дзеркало \u2192 полиця над..."
        answer: "над дзеркалом"

  - type: build_sentence
    title: "Опиши кімнату"
    instruction: "Склади речення з прийменником і орудним відмінком"
    sentences:
      - words: ["Лампа", "висить", "[над столом/над стола]", "."]
        correct: "Лампа висить над столом."
      - words: ["Кіт", "спить", "[під стільцем/під стілець]", "."]
        correct: "Кіт спить під стільцем."
      - words: ["Книга", "лежить", "[між вікном і стіною/між вікно і стіна]", "."]
        correct: "Книга лежить між вікном і стіною."
      - words: ["Картина", "висить", "[над ліжком/над ліжко]", "."]
        correct: "Картина висить над ліжком."
      - words: ["Черевики", "стоять", "[під шафою/під шафа]", "."]
        correct: "Черевики стоять під шафою."
      - words: ["Дзеркало", "знаходиться", "[перед дверима/перед двері]", "."]
        correct: "Дзеркало знаходиться перед дверима."

  - type: true_false
    title: "Правильно чи ні?"
    items:
      - statement: "Він гуляє з друга."
        answer: false
        correction: "Він гуляє з другом. (орудний, не родовий)"
      - statement: "Кіт сидить під столом."
        answer: true
      - statement: "Я п'ю каву з молоком."
        answer: true
      - statement: "Лампа висить над стола."
        answer: false
        correction: "Лампа висить над столом."
      - statement: "Магазин між школа і парк."
        answer: false
        correction: "Магазин між школою і парком."
      - statement: "Борщ зі сметаною дуже смачний."
        answer: true

  - type: pattern_drill
    title: "Супровід чи походження?"
    prompt: "Обери правильну форму: з + орудний (супровід) чи з + родовий (звідки)"
    items:
      - given: "друг \u2192 гуляю з..."
        answer: "другом"
      - given: "Київ \u2192 їду з..."
        answer: "Києва"
      - given: "подруга \u2192 розмовляю з..."
        answer: "подругою"
      - given: "робота \u2192 повертаюся з..."
        answer: "роботи"
      - given: "молоко \u2192 кава з..."
        answer: "молоком"
      - given: "школа \u2192 іду з..."
        answer: "школи"
      - given: "сусід \u2192 знайомлюся із..."
        answer: "сусідом"
      - given: "магазин \u2192 повертаюся з..."
        answer: "магазину"

  - type: reading
    title: "Читання: Наша кімната"
    text: |
      Це наша кімната. Посередині стоїть великий стіл. Над столом висить лампа. Під столом лежить килим. Між столом і вікном стоїть стілець. За шафою сховався кіт. Перед дверима лежить маленький килимок. На столі стоїть чашка з чаєм. Поруч — тарілка з бутербродом із сиром.
    questions:
      - question: "Що висить над столом?"
        answer: "Лампа."
      - question: "Де сховався кіт?"
        answer: "За шафою."
      - question: "Що стоїть між столом і вікном?"
        answer: "Стілець."
      - question: "Що лежить перед дверима?"
        answer: "Маленький килимок."

  - type: riddle
    title: "Загадка"
    clues:
      - "Не гавкає, не кусає,"
      - "а до хати не пускає."
    answer: "замок"
    source: "Grade 5 Avramenko p.27"
