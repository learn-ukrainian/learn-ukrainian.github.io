module: checkpoint-morfolohiia
track: l2-uk-direct
level: a2
type: checkpoint
title: "Контрольна точка: морфологія"
subtitle: "Перевірка ступенів порівняння, займенників, числівників"
standard_ref: "§§4.2.1.3–4.2.1.4 — повторення модулів 21–23"
textbook_ref: "Повторення: Grade 4 — займенники, числівники, порівняння"
teaching_notes: |
  Комплексна перевірка морфології: ступені порівняння прикметників, повна відміна займенників, числівники.
  Нової граматики немає — фокус на інтеграції всіх вивчених форм.
  Зверніть увагу на типові помилки: «з його» замість «з нього», «три книг» замість «три книги».
  Перевірте також зворотний займенник «себе» і відносні конструкції.

# ─────────────────────────────────────────────
# ASSESSMENT SCOPE
# ─────────────────────────────────────────────
assessment_scope:
  - skill: "Ступені порівняння прикметників"
    tested: "Вищий і найвищий ступінь (регулярні + нерегулярні)"
    source_modules: [19, 20]
  - skill: "Повна відміна особових займенників"
    tested: "7 відмінків × 7 займенників, н-правило"
    source_modules: [21]
  - skill: "Відмінювання числівників 1–4"
    tested: "Відміна кількісних, узгодження порядкових"
    source_modules: [22]
  - skill: "Зворотний займенник себе"
    tested: "Форми себе/собі/собою в контексті"
    source_modules: [23]
  - skill: "Відносні займенники"
    tested: "Який/яка/яке в підрядних реченнях"
    source_modules: [23]

pass_threshold: 70

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Ступені порівняння (1)"
    prompt: "Утвори вищий ступінь"
    items:
      - given: "великий"
        answer: "більший"
      - given: "малий"
        answer: "менший"
      - given: "гарний"
        answer: "гарніший"
      - given: "цікавий"
        answer: "цікавіший"
      - given: "добрий"
        answer: "кращий"
      - given: "поганий"
        answer: "гірший"

  - type: pattern_drill
    title: "Ступені порівняння (2)"
    prompt: "Утвори найвищий ступінь"
    items:
      - given: "великий"
        answer: "найбільший"
      - given: "гарний"
        answer: "найгарніший"
      - given: "добрий"
        answer: "найкращий"
      - given: "поганий"
        answer: "найгірший"
      - given: "швидкий"
        answer: "найшвидший"

  - type: pattern_drill
    title: "Особові займенники"
    prompt: "Постав займенник у правильну форму"
    items:
      - given: "він → я бачу..."
        answer: "його"
      - given: "вона → я говорю про..."
        answer: "неї"
      - given: "ми → він іде з..."
        answer: "нами"
      - given: "ти → це для..."
        answer: "тебе"
      - given: "вони → я чекаю на..."
        answer: "них"
      - given: "я → вона допомагає..."
        answer: "мені"

  - type: pattern_drill
    title: "Числівники"
    prompt: "Постав числівник у правильну форму"
    items:
      - given: "два → я знаю ___ хлопців"
        answer: "двох"
      - given: "три → вона прийшла з ___ подругами"
        answer: "трьома"
      - given: "чотири → ми дали квитки ___ друзям"
        answer: "чотирьом"
      - given: "перший + книга"
        answer: "перша книга"
      - given: "другий + завдання"
        answer: "друге завдання"

  - type: pattern_drill
    title: "Зворотний займенник"
    prompt: "Встав правильну форму «себе»"
    items:
      - given: "Він купив для ___."
        answer: "себе"
      - given: "Вона задоволена ___."
        answer: "собою"
      - given: "Я сказав ___: «Спокійно!»"
        answer: "собі"
      - given: "Візьми із ___ парасолю."
        answer: "собою"

  - type: true_false
    title: "Правда чи неправда? (1)"
    items:
      - statement: "«З його» — правильно після прийменника."
        answer: false
        correction: "Правильно: з нього. Після прийменника додається н-."
      - statement: "«Три книги» — правильне словосполучення."
        answer: true
      - statement: "«Найгарніший» — це найвищий ступінь «гарний»."
        answer: true
      - statement: "Займенник «себе» має називний відмінок."
        answer: false
        correction: "«Себе» не має називного відмінка."
      - statement: "«Двома» — орудний відмінок «два»."
        answer: true

  - type: true_false
    title: "Правда чи неправда? (2)"
    items:
      - statement: "«Перший книга» — правильне словосполучення."
        answer: false
        correction: "Правильно: перша книга. Порядковий числівник узгоджується в роді."
      - statement: "«Людина, яка тут живе» — правильне речення."
        answer: true
      - statement: "«Він більш гарний за мене» — правильна конструкція."
        answer: false
        correction: "Правильно: він гарніший за мене."
      - statement: "«Кілька днів» — після «кілька» родовий множини."
        answer: true
      - statement: "«Задоволений себе» — правильна форма."
        answer: false
        correction: "Правильно: задоволений собою (орудний відмінок)."

  - type: classify
    title: "Відмінки займенників"
    instruction: "Розподіли за відмінками"
    categories:
      - label: "Родовий (КОГО?)"
        items:
          - "мене"
          - "тебе"
          - "його"
          - "себе"
      - label: "Давальний (КОМУ?)"
        items:
          - "мені"
          - "тобі"
          - "йому"
          - "собі"
      - label: "Орудний (КИМ?)"
        items:
          - "мною"
          - "тобою"
          - "ним"
          - "собою"

  - type: classify
    title: "Який? Яка? Яке?"
    instruction: "Узгодь займенник з іменником"
    categories:
      - label: "ЯКИЙ (чол.)"
        items:
          - "який дім"
          - "який фільм"
          - "який парк"
      - label: "ЯКА (жін.)"
        items:
          - "яка вулиця"
          - "яка книга"
          - "яка школа"
      - label: "ЯКЕ (серед.)"
        items:
          - "яке місто"
          - "яке питання"
          - "яке море"

  - type: classify
    title: "Кількісний чи порядковий?"
    instruction: "Розподіли числівники"
    categories:
      - label: "Кількісні (СКІЛЬКИ?)"
        items:
          - "два"
          - "три"
          - "кілька"
          - "багато"
      - label: "Порядкові (КОТРИЙ?)"
        items:
          - "перший"
          - "другий"
          - "третій"
          - "четвертий"

  - type: build_sentence
    title: "Побудуй речення (1)"
    instruction: "Обери правильну форму"
    sentences:
      - words: ["Це", "подарунок", "для", "[він/нього/його]", "."]
        correct: "Це подарунок для нього."
      - words: ["Я", "знаю", "[два/двох]", "лікарів", "."]
        correct: "Я знаю двох лікарів."
      - words: ["Вона", "[гарніший/гарніша]", "за", "подругу", "."]
        correct: "Вона гарніша за подругу."

  - type: build_sentence
    title: "Побудуй речення (2)"
    instruction: "Обери правильну форму"
    sentences:
      - words: ["Він", "задоволений", "[себе/собою]", "."]
        correct: "Він задоволений собою."
      - words: ["Людина", ",", "[яка/який]", "тут", "живе", ",", "привітна", "."]
        correct: "Людина, яка тут живе, привітна."
      - words: ["[Перший/Перша]", "зупинка", "—", "моя", "."]
        correct: "Перша зупинка — моя."
      - words: ["Ми", "дякуємо", "[ви/вам/вас]", "за", "допомогу", "."]
        correct: "Ми дякуємо вам за допомогу."

  - type: reading
    title: "Читання: Екскурсія"
    text: |
      Минулої суботи наш клас був на екскурсії. Нас було двадцять п'ять учнів і два вчителі. Перша зупинка — музей. Музей, який ми відвідали, був дуже цікавий. Вчителька розповіла нам про три найважливіші експонати. Другий був найцікавішим — стародавня карта. Потім ми пішли в парк, який знаходиться поруч. Кожен купив собі морозиво. Я був дуже задоволений собою, бо відповів на всі питання екскурсовода.
    questions:
      - question: "Скільки учнів було на екскурсії?"
        answer: "Двадцять п'ять."
      - question: "Який експонат був найцікавішим?"
        answer: "Другий — стародавня карта."
      - question: "Що кожен купив собі?"
        answer: "Морозиво."

  - type: reading
    title: "Читання: Лист другу"
    text: |
      Привіт, Олексію! Я хочу розповісти тобі про свою нову роботу. Я працюю з трьома колегами, які дуже привітні. Один із них — програміст, він старший за мене. Друга — дизайнерка, яка малює найкращі ілюстрації. Я задоволений собою, бо швидко вчуся. Начальник сказав мені, що я — один із найкращих нових працівників. Напиши мені про себе! Як справи?
    questions:
      - question: "Скільки колег у автора?"
        answer: "Три (троє)."
      - question: "Хто малює найкращі ілюстрації?"
        answer: "Друга колега — дизайнерка."
      - question: "Що начальник сказав автору?"
        answer: "Що він один із найкращих нових працівників."
