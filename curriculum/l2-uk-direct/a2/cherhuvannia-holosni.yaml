module: cherhuvannia-holosni
track: l2-uk-direct
level: a2
type: grammar
title: "Чергування голосних"
subtitle: "Коли [і] стає [о] або [е] — і коли голосна зникає"
standard_ref: "§4.1 — чергування голосних: [і]↔[о], [і]↔[е], випадні голосні"
textbook_ref: "Grade 3 (Вашуленко — чергування, будова слова)"
teaching_notes: |
  Головна ідея: «ніс» і «носа» — це ОДНЕ слово, а не два різні.
  Три типи: [і]↔[о] (ніс→носа), [і]↔[е] (річ→речі), випадні (сон→сну).
  Чергування відбувається при зміні відмінка або числа.
  Не пояснюйте теорію — покажіть пари і дайте вправи на розпізнавання.
  Починайте з найчастіших слів: ніс, стіл, рік, день, сон.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "При зміні форми слова голосна може змінюватися: [і]↔[о], [і]↔[е], або зникати зовсім."
  examples:
    - "ніс → носа ([і] → [о])"
    - "річ → речі ([і] → [е])"
    - "сон → сну (випадна [о])"
    - "день → дня (випадна [е])"

# ─────────────────────────────────────────────
# GRAMMAR TABLE
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Чергування [і] ↔ [о]"
    columns: ["Називний", "Родовий", "Зміна"]
    rows:
      - ["ніс", "носа", "[і] → [о]"]
      - ["стіл", "стола", "[і] → [о]"]
      - ["рік", "року", "[і] → [о]"]
      - ["кіт", "кота", "[і] → [о]"]
      - ["віл", "вола", "[і] → [о]"]
      - ["двір", "двору", "[і] → [о]"]

  - title: "Чергування [і] ↔ [е]"
    columns: ["Називний", "Родовий", "Зміна"]
    rows:
      - ["річ", "речі", "[і] → [е]"]
      - ["осінь", "осені", "[і] → [е]"]
      - ["піч", "печі", "[і] → [е]"]
      - ["сіль", "солі", "[і] → [о]"]

  - title: "Випадні голосні"
    columns: ["Називний", "Родовий", "Зміна"]
    rows:
      - ["сон", "сну", "[о] зникає"]
      - ["день", "дня", "[е] зникає"]
      - ["вікно", "вікон", "[о] з'являється"]
      - ["вітер", "вітру", "[е] зникає"]
      - ["пісок", "піску", "[о] зникає"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Чергування [і] ↔ [о]"
    items:
      - word: "ніс"
        emoji: "\U0001F443"
        sentence: "У нього великий ніс, а в неї — маленького носа не видно."
      - word: "стіл"
        emoji: "\U0001F4CF"
        sentence: "На столі стоїть ваза."
      - word: "рік"
        emoji: "\U0001F4C5"
        sentence: "Минулого року ми відпочивали на морі."
      - word: "кіт"
        emoji: "\U0001F408"
        sentence: "Кота звати Мурчик."
      - word: "двір"
        emoji: "\U0001F3E1"
        sentence: "Діти граються у дворі."

  - category: "Чергування [і] ↔ [е]"
    items:
      - word: "річ"
        emoji: "\U0001F4E6"
        sentence: "Ця річ дуже цінна — бережи її."
      - word: "осінь"
        emoji: "\U0001F342"
        sentence: "Восени листя стає жовтим."
      - word: "піч"
        emoji: "\U0001F525"
        sentence: "Бабуся пече хліб у печі."

  - category: "Випадні голосні"
    items:
      - word: "сон"
        emoji: "\U0001F4A4"
        sentence: "Після довгого сну він почувається добре."
      - word: "день"
        emoji: "\u2600\uFE0F"
        sentence: "Протягом дня ми працюємо."
      - word: "вітер"
        emoji: "\U0001F32C\uFE0F"
        sentence: "Сьогодні сильний вітер — вітру боїться кожен."
      - word: "пісок"
        emoji: "\U0001F3D6\uFE0F"
        sentence: "На пляжі багато піску."

  - category: "Додаткові слова"
    items:
      - word: "форма"
        emoji: "\U0001F4DD"
        sentence: "Слово має різні форми."
      - word: "зміна"
        emoji: "\U0001F504"
        sentence: "Зміна голосної — це чергування."
      - word: "основа"
        emoji: "\U0001F4D6"
        sentence: "Основа слова зберігається."
      - word: "відмінок"
        emoji: "\U0001F4CB"
        sentence: "Називний відмінок — це початкова форма."
      - word: "однина"
        emoji: "1\uFE0F\u20E3"
        sentence: "Ніс — це однина."
      - word: "множина"
        emoji: "\U0001F465"
        sentence: "Носи — це множина."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "Постав у родовий відмінок"
    prompt: "Зміни форму: називний → родовий"
    items:
      - given: "ніс → Р.в."
        answer: "носа"
      - given: "стіл → Р.в."
        answer: "стола"
      - given: "рік → Р.в."
        answer: "року"
      - given: "кіт → Р.в."
        answer: "кота"
      - given: "двір → Р.в."
        answer: "двору"
      - given: "віл → Р.в."
        answer: "вола"
      - given: "сон → Р.в."
        answer: "сну"
      - given: "день → Р.в."
        answer: "дня"
      - given: "вітер → Р.в."
        answer: "вітру"
      - given: "пісок → Р.в."
        answer: "піску"
      - given: "річ → Р.в."
        answer: "речі"
      - given: "осінь → Р.в."
        answer: "осені"
      - given: "піч → Р.в."
        answer: "печі"
      - given: "сіль → Р.в."
        answer: "солі"
      - given: "ніч → Р.в."
        answer: "ночі"

  - type: classify
    title: "Який тип чергування?"
    instruction: "Розподіли слова за типом чергування"
    categories:
      - label: "[і] ↔ [о]"
        items:
          - "ніс → носа"
          - "стіл → стола"
          - "кіт → кота"
          - "рік → року"
          - "двір → двору"
      - label: "[і] ↔ [е]"
        items:
          - "річ → речі"
          - "осінь → осені"
          - "піч → печі"
      - label: "Випадна голосна"
        items:
          - "сон → сну"
          - "день → дня"
          - "вітер → вітру"
          - "пісок → піску"

  - type: true_false
    title: "Правда чи неправда?"
    items:
      - statement: "«Ніс» і «носа» — це різні слова."
        answer: false
        correction: "Це форми одного слова."
      - statement: "У слові «сон → сну» голосна [о] зникає."
        answer: true
      - statement: "Стіл → стола: [і] чергується з [е]."
        answer: false
        correction: "Стіл → стола: [і] чергується з [о]."
      - statement: "Річ → речі: [і] чергується з [е]."
        answer: true
      - statement: "День → дня: голосна [е] зникає."
        answer: true
      - statement: "Кіт → коту: [і] чергується з [о]."
        answer: true

  - type: build_sentence
    title: "Обери правильну форму"
    instruction: "Обери правильну форму слова в реченні"
    sentences:
      - words: ["У", "мене", "немає", "[ніс/носа]", "."]
        correct: "У мене немає носа."
      - words: ["На", "[стіл/столі]", "лежить", "книга", "."]
        correct: "На столі лежить книга."
      - words: ["Минулого", "[рік/року]", "було", "тепло", "."]
        correct: "Минулого року було тепло."
      - words: ["Після", "[сон/сну]", "я", "їм", "."]
        correct: "Після сну я їм."
      - words: ["Протягом", "[день/дня]", "ми", "вчимося", "."]
        correct: "Протягом дня ми вчимося."
      - words: ["Біля", "[піч/печі]", "тепло", "."]
        correct: "Біля печі тепло."

  - type: pattern_drill
    title: "Зворотнє чергування: знайди називний"
    prompt: "Родовий → називний"
    items:
      - given: "носа → Н.в."
        answer: "ніс"
      - given: "стола → Н.в."
        answer: "стіл"
      - given: "кота → Н.в."
        answer: "кіт"
      - given: "сну → Н.в."
        answer: "сон"
      - given: "дня → Н.в."
        answer: "день"
      - given: "речі → Н.в."
        answer: "річ"
      - given: "вітру → Н.в."
        answer: "вітер"
      - given: "двору → Н.в."
        answer: "двір"

  - type: reading
    title: "Читання: Один день"
    text: |
      Кіт Мурчик спить на столі. Але коли він прокидається, він стрибає зі стола на підлогу. У дворі вітер, тому кіт не хоче виходити. Він сідає біля печі — там тепло. Після сну кіт завжди хоче їсти. Він їсть і знову спить — такий у нього день. А вночі кіт не спить — він ловить мишей.
    questions:
      - question: "Де спить кіт?"
        answer: "На столі."
      - question: "Чому кіт не хоче виходити у двір?"
        answer: "Бо там вітер."
      - question: "Де кіт сідає?"
        answer: "Біля печі."
      - question: "Що кіт робить вночі?"
        answer: "Ловить мишей."

  - type: tongue_twister
    title: "Скоромовка"
    text: "Кіт котові каже: «Коте, до комори кадуб вкотим.»"
    source: "Grade 2 Bolshakova p.12"
