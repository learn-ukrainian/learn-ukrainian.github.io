module: orudnyi-osobovi
track: l2-uk-direct
level: a2
type: grammar
title: "Орудний відмінок особових займенників"
subtitle: "Зі мною, з тобою, з ним, з нею, з нами, з вами, з ними"
standard_ref: "\xA74.2.1.4 — pronoun declension — instrumental"
textbook_ref: "Grade 4 p.135 — personal pronouns in instrumental case"
teaching_notes: |
  Фокус на формах: мною, тобою, ним, нею, нами, вами, ними.
  Обов'язково пояснити н-правило: після прийменника 3-тя особа додає н- (він \u2192 з ним, вона \u2192 з нею).
  Навчайте через діалоги «Хто з ким?» — природні ситуації супроводу.
  Контраст: називний (він/вона/вони) vs орудний після прийменника (з ним/з нею/з ними).
  Використовуйте пари: Оля з ним, Тарас з нею, ми з вами.

# ─────────────────────────────────────────────
# KEY PATTERN
# ─────────────────────────────────────────────
key_pattern:
  text: "З/із + особовий займенник в орудному відмінку. Після прийменника 3-тя особа додає н-: він \u2192 з ним."
  examples:
    - "Я гуляю з тобою. (ти \u2192 тобою)"
    - "Вона розмовляє зі мною. (я \u2192 мною)"
    - "Він іде з нею. (вона \u2192 нею, н-)"

# ─────────────────────────────────────────────
# GRAMMAR TABLES
# ─────────────────────────────────────────────
grammar_tables:
  - title: "Особові займенники в орудному відмінку"
    columns: ["Називний", "Орудний", "З прийменником"]
    rows:
      - ["я", "мною", "зі мною"]
      - ["ти", "тобою", "з тобою"]
      - ["він", "ним", "з ним"]
      - ["вона", "нею", "з нею"]
      - ["ми", "нами", "з нами"]
      - ["ви", "вами", "з вами"]
      - ["вони", "ними", "з ними"]

  - title: "Н-правило (3-тя особа після прийменника)"
    columns: ["Називний", "Без прийменника", "Після прийменника"]
    rows:
      - ["він", "—", "з ним (не: з ім)"]
      - ["вона", "—", "з нею (не: з ою)"]
      - ["вони", "—", "з ними (не: з ими)"]

# ─────────────────────────────────────────────
# VOCABULARY
# ─────────────────────────────────────────────
vocabulary:
  - category: "Займенники (орудний)"
    items:
      - word: "мною"
        emoji: "\U0001F9D1"
        sentence: "Хто хоче піти зі мною?"
      - word: "тобою"
        emoji: "\U0001F91D"
        sentence: "Я хочу поговорити з тобою."
      - word: "ним"
        emoji: "\U0001F468"
        sentence: "Марія гуляє з ним у парку."
      - word: "нею"
        emoji: "\U0001F469"
        sentence: "Тарас танцює з нею."
      - word: "нами"
        emoji: "\U0001F46B"
        sentence: "Вони хочуть поїхати з нами."
      - word: "вами"
        emoji: "\U0001F64F"
        sentence: "Ми раді познайомитися з вами."
      - word: "ними"
        emoji: "\U0001F46C"
        sentence: "Діти граються з ними."

  - category: "Дієслова (з ким?)"
    items:
      - word: "гуляти"
        emoji: "\U0001F6B6"
        sentence: "Він любить гуляти з другом."
      - word: "розмовляти"
        emoji: "\U0001F4AC"
        sentence: "Я розмовляю з нею щодня."
      - word: "танцювати"
        emoji: "\U0001F483"
        sentence: "Вона танцює з ним на святі."
      - word: "зустрітися"
        emoji: "\U0001F44B"
        sentence: "Давай зустрінемося з ними ввечері."
      - word: "працювати"
        emoji: "\U0001F4BC"
        sentence: "Він працює з нами в одному офісі."
      - word: "подорожувати"
        emoji: "\U00002708"
        sentence: "Ми подорожуємо з вами цього літа."

  - category: "Ситуації"
    items:
      - word: "разом"
        emoji: "\U0001F46B"
        sentence: "Ми робимо це разом з тобою."
      - word: "поруч"
        emoji: "\U0001F4CD"
        sentence: "Сідай поруч зі мною."
      - word: "знайомство"
        emoji: "\U0001F91D"
        sentence: "Приємно познайомитися з вами."
      - word: "зустріч"
        emoji: "\U0001F4C5"
        sentence: "У мене зустріч з ним о третій."
      - word: "прогулянка"
        emoji: "\U0001F333"
        sentence: "Ходімо на прогулянку з ними."
      - word: "вечеря"
        emoji: "\U0001F37D"
        sentence: "Ми запросили їх на вечерю з нами."

# ─────────────────────────────────────────────
# ACTIVITIES
# ─────────────────────────────────────────────
activities:

  - type: pattern_drill
    title: "З ким? (усі займенники)"
    prompt: "Постав займенник в орудний відмінок після прийменника"
    items:
      - given: "я \u2192 гуляти зі..."
        answer: "зі мною"
      - given: "ти \u2192 розмовляти з..."
        answer: "з тобою"
      - given: "він \u2192 працювати з..."
        answer: "з ним"
      - given: "вона \u2192 танцювати з..."
        answer: "з нею"
      - given: "ми \u2192 поїхати з..."
        answer: "з нами"
      - given: "ви \u2192 зустрітися з..."
        answer: "з вами"
      - given: "вони \u2192 гратися з..."
        answer: "з ними"

  - type: build_sentence
    title: "Хто з ким?"
    instruction: "Склади речення, обравши правильну форму займенника"
    sentences:
      - words: ["Оля", "гуляє", "[з він/з ним]", "."]
        correct: "Оля гуляє з ним."
      - words: ["Тарас", "танцює", "[з вона/з нею]", "."]
        correct: "Тарас танцює з нею."
      - words: ["Ми", "поїдемо", "[з вони/з ними]", "."]
        correct: "Ми поїдемо з ними."
      - words: ["Вона", "розмовляє", "[з я/зі мною]", "."]
        correct: "Вона розмовляє зі мною."
      - words: ["Я", "працюю", "[з ви/з вами]", "."]
        correct: "Я працюю з вами."
      - words: ["Діти", "граються", "[з ми/з нами]", "."]
        correct: "Діти граються з нами."

  - type: true_false
    title: "Правильно чи ні?"
    items:
      - statement: "Він гуляє з вона."
        answer: false
        correction: "Він гуляє з нею."
      - statement: "Я хочу поговорити з тобою."
        answer: true
      - statement: "Марія танцює з ім."
        answer: false
        correction: "Марія танцює з ним. (н-правило)"
      - statement: "Ми раді бачити вас з нами."
        answer: true
      - statement: "Вона розмовляє зі мною."
        answer: true
      - statement: "Тарас працює з ними в офісі."
        answer: true

  - type: pattern_drill
    title: "Н-правило (3-тя особа)"
    prompt: "Додай правильну форму після прийменника"
    items:
      - given: "він \u2192 з..."
        answer: "з ним"
      - given: "вона \u2192 з..."
        answer: "з нею"
      - given: "вони \u2192 з..."
        answer: "з ними"
      - given: "він \u2192 перед..."
        answer: "перед ним"
      - given: "вона \u2192 перед..."
        answer: "перед нею"
      - given: "вони \u2192 між..."
        answer: "між ними"
      - given: "він \u2192 за..."
        answer: "за ним"
      - given: "вона \u2192 під..."
        answer: "під нею"

  - type: classify
    title: "Називний чи орудний?"
    instruction: "Розподіли: форма без прийменника (називний) чи після прийменника (орудний)"
    categories:
      - label: "Називний (хто?)"
        items:
          - "він"
          - "вона"
          - "вони"
          - "ми"
          - "ви"
      - label: "Орудний (з ким?)"
        items:
          - "з ним"
          - "з нею"
          - "з ними"
          - "з нами"
          - "з вами"

  - type: reading
    title: "Читання: У парку"
    text: |
      У суботу ми пішли в парк. Марія пішла зі мною, а Тарас — з нею. Олег зустрівся з нами біля входу. Потім прийшли Оля і Петро. Ми гуляли з ними до вечора. Олег сів на лавку поруч зі мною. Марія розмовляла з ним про школу. Тарас грався з ними у м'яча. Було дуже весело з вами! — сказала Оля.
    questions:
      - question: "З ким пішла Марія в парк?"
        answer: "Зі мною (з оповідачем)."
      - question: "Хто зустрівся з ними біля входу?"
        answer: "Олег."
      - question: "З ким розмовляла Марія?"
        answer: "З ним (з Олегом)."
      - question: "Що сказала Оля наприкінці?"
        answer: "Було дуже весело з вами!"

  - type: proverb_drill
    title: "Прислів'я"
    items:
      - proverb: "Усяк правду знає, та не всяк про неї ___."
        answer: "дбає"
