module: a2-022
level: A2
sequence: 22
slug: services-and-communication
track: l1-uk
version: '2.0.0'
title: На пошті
subtitle: Давальний відмінок у ситуаціях обслуговування — надсилання, отримання, прохання
focus: communication
pedagogy: TBL
phase: 'A2.3 [Давальний відмінок]'
word_target: 2000
objectives:
- Опанувати спілкування на пошті українською мовою — відправлення листа чи посилки, запит про доставку, заповнення бланка з адресою.
- Вміти використовувати конструкції давального відмінка у сфері обслуговування для вираження передачі, надсилання та адресування (надіслати листа другові, дати посилку листоноші).
- Навчитися просити про допомогу та дякувати працівникам сфери послуг, використовуючи дієслова, що вимагають давального відмінка (допоможіть мені, дякую вам).
- Вміти написати коротке повідомлення або адресу, використовуючи форми давального відмінка (Дорогому другові Андрію, Любій бабусі Олені).
dialogue_situations:
- setting: 'На Укрпошті — відправлення посилки родичам: Бандероль (f, parcel) для сестри в Канаду. Скільки коштує? Заповніть бланк (m, form). Адреса одержувача (m, recipient)?'
  speakers:
  - Відправник
  - Працівник пошти
  motivation: 'Пошта: бандероль(f), бланк(m), адреса(f), одержувач(m)'
content_outline:
- section: 'На пошті: Базова лексика'
  words: 400
  points:
  - 'Поштова лексика: пошта, відділення, лист, конверт, марка, посилка, бандероль, квитанція, адреса, індекс.'
  - 'Люди: листоноша, одержувач, відправник.'
  - 'Дії: надіслати/відправити, отримати, заповнити, підписати.'
  - 'Коротка культурна довідка про Укрпошту та як працюють поштові послуги в Україні.'
- section: 'Надіслати листа: Діалоги на пошті'
  words: 550
  points:
  - 'Діалог 1: Відправлення листа — прохання дати конверт і марки, вказування адреси, оплата. Природне спілкування з працівником пошти.'
  - 'Діалог 2: Відправлення посилки другу — пояснення вмісту, заповнення бланка (кому — одержувач, від кого — відправник), запит про час доставки.'
  - 'Давальний відмінок у дії: Я хочу надіслати листа другові. Дайте мені два конверти. Покажіть мені бланк. Напишіть адресу одержувачеві.'
  - 'Ввічливі форми прохання з давальним відмінком: Допоможіть мені, будь ласка. Підкажіть мені, де...'
- section: 'Просити, дякувати, допомагати: Давальний у сфері послуг'
  words: 550
  points:
  - 'Прохання про допомогу: Допоможіть мені заповнити бланк. Покажіть мені, як це зробити. Поясніть мені правила.'
  - 'Подяка: Дякую вам за допомогу. Дякую листоноші.'
  - 'Надання порад: Раджу вам надіслати бандероллю. Раджу тобі перевірити адресу.'
  - 'Розширений сценарій: попросити сусіда допомогти щось відправити, пояснити, для кого це (Це подарунок моїй бабусі. Допоможи мені загорнути).'
  - 'Повторення наказового способу + давальний відмінок (дай мені, покажи нам, скажіть їй) з природних ситуацій обслуговування.'
- section: 'Написати адресу: Давальний у листуванні'
  words: 500
  points:
  - 'Адресування листів і повідомлень: Кому — дорогому другові Андрію, любій бабусі Олені, шановному професорові Петренку.'
  - 'Повне узгодження в давальному відмінку в адресах: присвійний займенник + прикметник + іменник + ім''я, все в давальному відмінку — моєму дорогому братові Михайлові.'
  - 'Написання коротких повідомлень: Дорогій подрузі! Пишу тобі з Києва. Посилаю тобі маленький подарунок.'
  - 'Практика написання адрес і коротких привітань з використанням форм давального відмінка.'
- section: Підсумок
  words: 200
  points:
  - 'Давальний відмінок використовується для прохання про допомогу, подяки та адресування кореспонденції: допоможіть мені, дякую вам, моєму дорогому братові Михайлові.'
  - 'Самоперевірка: Як сказати "Я хочу надіслати листа другу" українською? Напишіть коротку адресну етикетку "любій бабусі Олені". Яка різниця між відправником та одержувачем?'
vocabulary_hints:
  required:
  - пошта
  - лист
  - конверт
  - марка
  - посилка
  - адреса
  - надіслати
  - отримати
  - відправити
  - листоноша
  recommended:
  - бандероль
  - квитанція
  - одержувач
  - відправник
  - індекс
activity_hints:
- type: fill-in
  focus: 'Доповнити репліки з діалогу на пошті правильними формами давального відмінка (Надішліть цю посилку ___)'
  items: 8
- type: match-up
  focus: 'Поєднати прохання у сфері обслуговування з відповідними відповідями (Допоможіть мені → Звичайно, що вам потрібно?)'
  items: 8
- type: quiz
  focus: 'Обрати правильну форму давального відмінка для адреси (дорогому/дорогій/дорогим + ім''я)'
  items: 8
- type: group-sort
  focus: 'Розподілити фрази за категоріями — прохання, подяка, передача (давання)'
  items: 8
references:
- title: Заболотний Grade 10, §157
  notes: Давальний відмінок в офіційному звертанні та правилах написання листів
- title: 'ULP: At the Post Office'
  url: https://www.ukrainianlessons.com/at-the-post-office/
  notes: Поштова лексика та діалоги з конструкціями давального відмінка
- title: Кравцова Grade 4, §135
  notes: 'Розрізнення давального та місцевого відмінків — актуально для "на пошті" (Місц.) та "надіслати листоноші" (Дав.)'
