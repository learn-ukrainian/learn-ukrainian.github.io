# План l1-uk — україномовний модуль A2 metalanguage-morphology
# Відгалужено від curriculum/l2-uk-en/plans/a2/metalanguage-morphology.yaml v3.1.2
# Відгалужено 2026-04-22 як частина пакету форків A1+A2
module: a2-065
level: A2
sequence: 65
slug: metalanguage-morphology
track: l1-uk
version: '2.0.0'
title: Морфологія
subtitle: Будова слова і частини мови — від знання до називання
focus: morphology
pedagogy: PPP
phase: 'A2.9 [Метамова: місток та основи]'
word_target: 2000
objectives:
  - Студент вміє називати та розпізнавати п'ять частин українського слова (корінь, префікс, суфікс, закінчення, основа), використовуючи українську термінологію.
  - Студент вміє робити розбір слова за будовою (морфемний аналіз) для поширених українських слів.
  - Студент вміє розрізняти самостійні частини мови та службові частини мови, а також називати всі десять частин мови українською.
  - Студент вміє визначати спільнокореневі (споріднені) слова та пояснювати, як префікси й суфікси утворюють нові слова та змінюють їхнє значення.
  - Студент вміє використовувати специфічні суфікси частин мови, щоб визначати, чи є слово іменником, прикметником чи дієсловом.
dialogue_situations:
  - setting: 'Навчальна група в бібліотеці львівського університету — студенти перевіряють одне одного на знання морфологічних термінів: корінь (чол. р.), префікс (чол. р.), суфікс (чол. р.), закінчення (сер. р.), основа (жін. р.). Вони аналізують слова на кшталт переказувати, написання.'
    speakers:
      - Студентка Марина
      - Студент Богдан
    motivation: 'Морфологічні терміни: корінь, префікс, суфікс, закінчення — аналіз будови слова'
content_outline:
  - section: Що вивчає морфологія?
    words: 550
    points:
      - "Вступ до метамови: студенти вже ВИКОРИСТОВУЮТЬ українські форми слів на рівнях A1-A2. Цей модуль навчає їх НАЗИВАТИ частини слів та частини мови за допомогою української лінгвістичної термінології. Перехід: від 'root' до корінь, від 'ending' до закінчення, від 'noun' до іменник."
      - "Базові визначення (за Авраменком, 5 клас, с. 60): Морфологія — розділ мовознавства, що вивчає слово як частину мови. Будова слова — як слова будуються зі значущих частин (морфеми). Словотвір — як нові слова утворюються з уже існуючих. Ці три сфери працюють разом: потрібно знати частини, щоб розуміти, як вони поєднуються."
      - "Чому це важливо для рівня B1: майбутні граматичні модулі, присвячені чергуванню, словотвору та нюансам відмінків, спираються на морфологічну термінологію. Пояснення української граматики, як-от 'у суфіксі -ськ- відбувається чергування', неможливо зрозуміти без знання того, що таке суфікс."
  - section: Основа і закінчення
    words: 650
    points:
      - "За Авраменком, 5 клас, с. 58: Основа слова — це частина слова без закінчення. Вона виражає лексичне значення слова: люблю, полуницю, вершками. Закінчення — змінна значуща частина слова, що виражає його граматичне значення — рід, число, відмінок, особу. Приклад: полуниц|ю (Зн. в., одн.), полуниц|і (М. в., одн.)."
      - "Звукове та нульове закінчення (за Заболотним, 5 клас, с. 46): Звукове закінчення виражено звуком: альбоми, яблунею, дощу. Нульове закінчення не виражено звуком: альбом, яблунь, дощ. Як знайти нульове закінчення: змініть форму слова — якщо там, де нічого не було, з'являється звук, то початкова форма мала нульове закінчення. кінь (нульове) → коня (звукове -я)."
      - "Змінні та незмінні слова (за Авраменком, 5 клас, с. 59): Змінні слова мають закінчення (іменники, прикметники, дієслова, числівники). Незмінні слова не мають закінчення: прислівники (тут, учора, по-французьки), деякі іншомовні слова (хакі, лото, шосе, жалюзі). Ключова думка: незмінні слова складаються виключно з основи."
      - "Практика: студенти визначають основу та закінчення в групах слів, розрізняючи звукове і нульове закінчення. Приклади слів: вулиця/вулиць, перехід/перейду, Київ/Києва."
  - section: Корінь і спільнокореневі слова
    words: 600
    points:
      - "За Авраменком, 5 клас, с. 60: Корінь — це головна значуща частина слова, що містить у собі спільне лексичне значення споріднених слів: ліс, праліс, лісовий, лісник. Спільнокореневими (спорідненими) називають слова зі спільним коренем, але з різним лексичним значенням."
      - "Важлива відмінність: спільнокореневі слова порівняно з формами одного слова. ліс, лісовий, лісник — різні слова зі спільним коренем (спільнокореневі). ліс, лісу, лісом, лісі — те саме слово в різних формах (не спільнокореневі). Різниця полягає в тому, що спільнокореневі слова відрізняються за лексичним значенням, а форми слова — лише за граматичним значенням."
      - "Як знайти корінь: доберіть спільнокореневі слова та визначте спільну частину. вода, водний, підводний, водяний → вод-. Увага: корінь може змінюватися через чергування: друг — дружний (г→ж), рік — річний (к→ч). Вони залишаються спільнокореневими, незважаючи на зміну звуків."
      - "Практика читання: короткий текст, у якому студенти обводять групи спільнокореневих слів та позначають корені в кожному слові."
  - section: Префікс і суфікс
    words: 650
    points:
      - "За Авраменком, 5 клас, с. 62: Префікс — це значуща частина слова, що стоїть перед коренем і слугує для творення нових слів або нових відтінків у значенні: друк — передрук, друг — недруг, мудрий — премудрий. Поширені префікси: ви-, за-, на-, пере-, під-, при-, роз-, без-."
      - "За Авраменком, 5 клас, с. 66: Суфікс — це значуща частина слова, що стоїть після кореня й надає словам нового лексичного значення або нового відтінку: кіт — котик — котяра. Суфікс змінює не лише значення, а й емоційне забарвлення: -ик/-ок (зменшення, пестливість), -ищ/-юр (збільшення)."
      - "Специфічні суфікси частин мови (за Заболотним, 5 клас, с. 58): Іменникові суфікси: -ок-, -ар(-яр), -иц-, -ист-, -іст-, -тель-, -к- (місток, бджоляр, учитель, юристка). Прикметникові суфікси: -н-, -ив-, -ськ-, -еньк- (осінній, красивий, морський). Дієслівні суфікси: -и-, -а-, -ва-, -ува-, -ти- (писати, просити, зимувати). Це потужний інструмент розпізнавання: суфікс вказує на частину мови."
      - "Слово може мати кілька префіксів або суфіксів: пре-за-довгий (два префікси), висот-ин-а (два суфікси). Розбір слова за будовою — це поділ слова на всі його морфеми: пере-хід-н-ий = префікс + корінь + суфікс + закінчення."
  - section: Самостійні частини мови
    words: 650
    points:
      - "За Авраменком (5 клас, с. 144) та Заболотним (5 клас, с. 245): Самостійні частини мови називають предмети, дії, ознаки, кількості. Вони відповідають на запитання та виступають членами речення. Шість самостійних частин мови: Іменник (хто? що?) — сонце, мрія, Київ. Прикметник (який? чий?) — сонячний, мамин. Числівник (скільки? котрий?) — три, третій. Займенник (хто? що? який?) — я, ти, він, цей. Дієслово (що робити? що зробити?) — сидіти, написати. Прислівник (як? де? коли? куди?) — сонячно, восени."
      - "Кожна самостійна частина мови має свої граматичні категорії. Іменник: рід, число, відмінок, відміна. Прикметник: рід, число, відмінок (узгоджується з іменником). Дієслово: час, особа, число, спосіб, вид, стан. Розуміння цих категорій в українській мові є обов'язковим: граматичне правило на кшталт 'прикметник узгоджується з іменником у роді, числі та відмінку' вимагає знання всіх цих термінів."
      - "Контрастні пари для ясності: іменник книга і прикметник книжковий — однаковий корінь, різні частини мови. дієслово зеленіти, прислівник зелено, іменник зелень — суфікс визначає частину мови."
  - section: Службові частини мови
    words: 500
    points:
      - "За Заболотним (5 клас, с. 245): Службові частини мови нічого не називають, не відповідають на запитання і не можуть бути самостійними членами речення. Три службові частини мови: Прийменник (на, в, з, до, біля, серед) — зв'язує слова, керує відмінком. Сполучник (і, й, та, але, або, що, щоб, бо) — поєднує слова/частини речення. Частка (не, б, хай, нехай, чи, навіть) — додає відтінки значення."
      - "Чому службові слова важливі: вони є своєрідним клеєм українських речень. Прийменник визначає, який відмінок слідує: до + Р.в., з + О.в. Сполучник вказує на тип складного речення: але = протиставне, бо = причинове. Частка не створює заперечення. Студенти вже використовують ці слова — тепер вони вчаться їх називати."
      - "Вигук (ой, ах, гей) та особливі категорії слів: вигук не є ні самостійною, ні службовою частиною мови — він стоїть окремо. Деякі підручники подають його окремо; інші об'єднують зі службовими. На рівні B1 головне — усвідомити, що така категорія існує."
  - section: Підсумок
    words: 400
    points:
      - "Повний словник метамови — усі терміни з цього модуля: морфологія, будова слова, словотвір, морфема, корінь, префікс, суфікс, закінчення, основа, спільнокореневий, споріднений, змінний, незмінний, нульове закінчення, звукове закінчення, іменник, прикметник, числівник, займенник, дієслово, прислівник, прийменник, сполучник, частка, вигук, самостійний, службовий, граматичне значення, лексичне значення."
      - "Самоперевірка українською мовою: Дайте відповіді на запитання: 1. Назвіть п'ять значущих частин слова. 2. Чим основа слова відрізняється від закінчення? 3. Як відрізнити спільнокореневі слова від форм одного слова? 4. Назвіть шість самостійних частин мови і три службових. 5. Розберіть за будовою: перехідний, безхмарний, підводний."
      - "Анонс наступного модуля: Синтаксис і відмінки — підмет, присудок, додаток, означення, обставина. Після вивчення назв частин слова та частин мови ви навчитеся називати ролі, які слова відіграють у реченнях."
