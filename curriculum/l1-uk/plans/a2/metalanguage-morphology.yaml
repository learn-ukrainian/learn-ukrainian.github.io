activity_hints:
  - type: quiz
    focus: 'Визначити частини слова: Яка морфема виділена? (корінь, префікс, суфікс, закінчення)'
    items: 8
  - type: match-up
    focus: 'Зіставити українські частини мови з їхніми визначеннями та запитаннями (іменник — хто? що?)'
    items: 10
  - type: group-sort
    focus: 'Розподілити слова на самостійні та службові частини мови'
    items: 10
  - type: fill-in
    focus: 'Виконати розбір слова за будовою — вставити пропущені морфеми для вказаних слів'
    items: 6
  - type: mark-the-words
    focus: 'У тексті позначити всі спільнокореневі слова, що належать до однієї родини слів'
    items: 6
  - type: error-correction
    focus: 'Знайти та виправити помилки в морфемному аналізі (наприклад, неправильна межа кореня, пропущений префікс)'
    items: 6
