module: a2-036
level: A2
sequence: 36
slug: which-case-when
track: l1-uk
version: '2.0.0'
title: Компас відмінків
subtitle: Як обрати правильний відмінок за дієсловом, прийменником та контекстом
focus: grammar
pedagogy: PPP
phase: A2.5 [Синтез відмінків та множина]
word_target: 2000
objectives:
- Вміти обирати правильний відмінок іменника залежно від керованого дієслова (наприклад, допомагати + дав. в., бачити + знах. в., користуватися + ор. в.).
- Вміти обирати правильний відмінок після найуживаніших прийменників, включно з тими, що керують різними відмінками залежно від значення (на + знах. в. для напрямку проти на + місц. в. для місця).
- Вміти використовувати знахідний відмінок для вираження часу (у четвер, у середу), з прийменником про (думати про майбутнє) та розпізнавати місцевий відмінок для характеристик (хлопець у червоному светрі), шляху (бігати по кімнаті) та років (у 2014 році).
- Вміти застосовувати систематичний алгоритм (дієслово/прийменник → відмінок → закінчення) для визначення правильної форми будь-якого іменника в контексті.
dialogue_situations:
- setting: 'Гра в граматичного детектива: читання української газетної статті та визначення використаних відмінків і причин їхнього вживання: Президент (називний) зустрівся з прем''єром (орудний). Для журналістів (родовий) підготували зал (знахідний).'
  speakers:
  - Вчитель
  - Студенти
  motivation: 'Ідентифікація відмінків: називний, родовий, давальний, знахідний, орудний, місцевий у реальному тексті'
content_outline:
- section: 'Дієслово вирішує: який відмінок після дієслова?'
  words: 550
  points:
  - 'Дієслова, що вимагають знахідного відмінка (більшість перехідних): бачити, знати, любити, читати, купити, шукати. Я читаю книгу. Ми шукаємо ключі.'
  - 'Дієслова, що вимагають давального відмінка: допомагати, телефонувати, дякувати, радити, заважати. Я допомагаю сестрі. Ми дякуємо вчителям.'
  - 'Дієслова, що вимагають орудного відмінка: користуватися, цікавитися, займатися, керувати. Він користується комп''ютером. Вона цікавиться історією.'
  - 'Дієслова та конструкції з родовим відмінком: немає, боятися, потребувати. У мене немає часу. Вона боїться темряви.'
  - 'Конструкція з про + знахідний відмінок: думати про (думати про майбутнє, мріяти про подорож).'
- section: 'Прийменник вирішує: один прийменник — різні відмінки'
  words: 550
  points:
  - 'Прийменник на + знахідний відмінок (напрямок/мета): Я йду на роботу. Поклади книгу на стіл. Прийменник на + місцевий відмінок (місце): Я на роботі. Книга лежить на столі.'
  - 'Прийменники у/в + знахідний відмінок (напрямок): Я йду в магазин. Знахідний для часу: у четвер, у середу, у п''ятницю. Прийменники у/в + місцевий відмінок (місце): Я в магазині. Місцевий для років: у 2014 році, у минулому році.'
  - 'Прийменник по + місцевий відмінок (шлях/поверхня): бігати по кімнаті, ходити по вулиці, подорожувати по Україні.'
  - 'Прийменники з/із + родовий відмінок (звідки): вийти з дому, приїхати з Києва. Прийменники з/із + орудний відмінок (разом із): піти з другом, кава з молоком.'
  - 'Прийменник за + знахідний відмінок (в обмін на/за щось): дякувати за допомогу, платити за квитки. Прийменник за + орудний відмінок (розташування позаду/навздогін): за столом, бігти за автобусом.'
- section: 'Особливі випадки: час, характеристика, шлях'
  words: 500
  points:
  - 'Знахідний відмінок для днів та періодів часу: у четвер, у середу, у п''ятницю. Цю неділю я відпочиваю. Наступного тижня (родовий відмінок для наступного/минулого).'
  - 'Місцевий відмінок для характеристики/опису: хлопець у червоному светрі, дівчина в окулярах, жінка у білому пальті. Модель: іменник + у/в + місцевий відмінок описує, у що людина одягнена або як виглядає.'
  - 'Місцевий відмінок для років та часових контекстів: у 2014 році, у двадцять першому столітті, у дитинстві.'
  - 'Місцевий відмінок для шляху з прийменником по: бігати по кімнаті, гуляти по парку, їздити по місту.'
- section: Алгоритм вибору відмінка
  words: 400
  points:
  - 'Крок 1: Чи є прийменник? → Перевірити, яким відмінком (або відмінками) він керує. Крок 2: Немає прийменника? → Перевірити, якого відмінка вимагає дієслово. Крок 3: Досі не впевнені? → Поставити відмінкове питання (Кого? Що? Кому? Ким? тощо).'
  - 'Схема дерева рішень: Прийменник → Відмінок. Дієслово → Відмінок. Ні те, ні інше → Стандартний називний відмінок (підмет) або залежно від контексту.'
  - 'Типові пастки: плутанина між на + знахідний відмінок (напрямок) і на + місцевий відмінок (місце); забування, що дієслово думати вимагає про + знахідний відмінок, а не місцевий; використання родового відмінка замість давального після допомагати.'
  - 'Практика: мішані речення, де студент має визначити тригер (дієслово або прийменник) та обрати правильний відмінок.'
- section: Підсумок
  words: 200
  points:
  - "Вибір відмінка зумовлений дієсловами (допомагати + давальний, користуватися + орудний) та прийменниками (на + знахідний для напрямку, на + місцевий для місця). Самоперевірка: Яка різниця між 'йду на роботу' та 'я на роботі'? Опишіть, у що хтось одягнений, використовуючи 'у/в' + місцевий відмінок."
  - "Застосуйте Алгоритм вибору відмінка (Прийменник → Відмінок або Дієслово → Відмінок), щоб визначити правильне закінчення. Пам'ятайте про особливі контексти: дні (у середу - знах. в.), роки (у 2014 році - місц. в.) та шлях (по кімнаті - місц. в.). Самоперевірка: Який відмінок вживається після 'думати про'? Перекладіть: 'Я допомагаю сестрі' та 'Я користуюсь комп'ютером'."
