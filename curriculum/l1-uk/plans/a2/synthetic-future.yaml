- type: fill-in
  focus: Доповнити речення правильною формою майбутнього часу (простим доконаного або складеним недоконаного виду) на основі контексту
  items: 8
- type: quiz
  focus: Визначити, чи використовує речення простий, чи складений майбутній час, і пояснити вибір виду дієслова
  items: 8
- type: group-sort
  focus: Розподілити форми дієслів на дві групи — простий майбутній час (доконаний вид) і складений майбутній час (недоконаний вид)
  items: 8
- type: unjumble
  focus: Впорядкувати слова, щоб утворити правильні речення в майбутньому часі, використовуючи як прості (напишу), так і складені (буду писати) форми
  items: 6
