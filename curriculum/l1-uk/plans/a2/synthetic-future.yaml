module: a2-041
level: A2
sequence: 41
slug: synthetic-future
track: l1-uk
version: '2.0.0'
title: Я напишу!
subtitle: Простий майбутній час доконаного виду та складений майбутній недоконаного
focus: grammar
pedagogy: PPP
phase: 'A2.6 [Вид дієслова, часи та рух]'
word_target: 2000
objectives:
- Вміти утворювати та використовувати простий (синтетичний) майбутній час дієслів доконаного виду (скажу, напишу, зроблю, прочитаю) — розуміючи, що форми теперішнього часу дієслів доконаного виду автоматично несуть значення майбутнього.
- Вміти утворювати та використовувати складений (аналітичний) майбутній час дієслів недоконаного виду за допомогою «буду» + інфінітив (буду говорити, буду читати, буду писати).
- Розуміти та вміти пояснити, чому дієслова доконаного виду не мають справжнього теперішнього часу і чому дієсловам недоконаного виду потрібне допоміжне слово «буду» для значення майбутнього часу.
- Вміти обирати між простим і складеним майбутнім часом залежно від того, чи є дія одноразовим завершеним результатом (доконаний вид), чи тривалим/повторюваним процесом (недоконаний вид).
dialogue_situations:
- setting: 'Планування новорічних обіцянок з друзями — Я напишу книгу (f)! Я вивчу іспанську (f)! Він прочитає 50 книг! Вона складе іспит!'
  speakers:
  - Група друзів на Новий рік
  motivation: 'Майбутній час доконаного виду: написати→напишу, вивчити→вивчу, скласти→складу. Примітка: українською кажуть "складати/скласти іспит" (не русизм "здавати іспит").'
content_outline:
- section: Два майбутніх часи
  words: 450
  points:
  - 'Українська мова має два способи говорити про майбутнє, і вибір залежить від виду дієслова — а не від формальності чи стилю.'
  - 'Простий майбутній час (доконаний вид): використовуйте відмінювані форми дієслів доконаного виду, які виглядають як форми теперішнього часу. Оскільки дієслова доконаного виду не можуть описувати дію, що відбувається просто зараз, їхні форми вказують на майбутнє: скажу, напишу, зроблю.'
  - 'Складений майбутній час (недоконаний вид): буду + інфінітив недоконаного виду. Буду говорити, буду читати.'
  - 'Ключове розуміння: англійська має один майбутній час (will + verb). Українська має два — і вибір несе значення про те, як розгортається дія.'
- section: Простий майбутній час
  words: 550
  points:
  - 'Утворення: відмінюйте дієслово доконаного виду так само, як дієслово теперішнього часу. Форми виглядають як теперішній час, але означають майбутнє: я скажу, ти скажеш, він/вона скаже, ми скажемо, ви скажете, вони скажуть.'
  - 'Більше прикладів: написати → напишу, напишеш, напише...; зробити → зроблю, зробиш, зробить...; прочитати → прочитаю, прочитаєш, прочитає...'
  - 'Коли використовувати: одноразова, завершена дія в майбутньому. Я напишу листа (напишу і закінчу). Він прочитає книгу (прочитає її всю).'
  - 'Поширені форми простого майбутнього часу в повсякденному житті: подзвоню, куплю, приїду, скажу.'
- section: Складений майбутній час
  words: 550
  points:
  - 'Утворення: відмінюйте «буду» (я буду, ти будеш, він/вона буде, ми будемо, ви будете, вони будуть) + інфінітив недоконаного виду.'
  - 'Приклади: Я буду читати. Ми будемо працювати. Вони будуть вивчати українську.'
  - 'Коли використовувати: тривала, повторювана або загальна дія в майбутньому. Завтра я буду працювати весь день. Влітку вони будуть подорожувати.'
  - 'Контраст із доконаним видом: Я напишу листа (зроблю це — готово) порівняно з Я буду писати листа (буду в процесі написання, можливо, не закінчу).'
- section: Як обрати вид для майбутнього
  words: 450
  points:
  - 'Посібник для вибору: Чи буде дія завершена з результатом? → Доконаний вид (простий час). Чи буде вона тривалою, повторюваною, або чи важлива тривалість? → Недоконаний вид (складений час).'
  - 'Контрастні приклади: Я подзвоню тобі ввечері (один дзвінок) порівняно з Я буду дзвонити тобі щодня (регулярно). Він прочитає статтю (закінчить її) порівняно з Він буде читати статтю (буде в процесі читання).'
  - 'Практичні діалоги: планування, обіцянки, передбачення — все це вимагає вибору виду. Що ти будеш робити завтра? — Я прибиратиму квартиру, а потім приготую вечерю.'
- section: Підсумок
  words: 200
  points:
  - 'Утворення майбутнього часу залежить від виду дієслова: дієслова доконаного виду використовують прості форми для завершених дій (напишу, зроблю, скажу). Дієслова недоконаного виду використовують складені форми (буду + інфінітив) для тривалих або повторюваних процесів (буду писати, буду робити, буду говорити).'
  - 'Самоперевірка: Яка різниця у значенні між «я прочитаю книгу» та «я буду читати книгу»? Чому дієслова доконаного виду не мають теперішнього часу? Опишіть 3 речі, які ви плануєте зробити завтра, використовуючи обидві форми майбутнього часу.'
vocabulary_hints:
  required:
  - майбутній час — форма для позначення майбутньої дії
  - простий — синтетична форма
  - складений — аналітична форма
  - сказати / скажу — доконаний вид, майбутній час
  - написати / напишу — доконаний вид, майбутній час
  - зробити / зроблю — доконаний вид, майбутній час
  - буду — допоміжне дієслово
  - прочитати — доконаний вид
  - подзвонити — доконаний вид
  - купити — доконаний вид
  recommended:
  - приїхати — доконаний вид
  - обіцяти
  - планувати
  - прибирати / прибрати — недоконаний / доконаний вид
