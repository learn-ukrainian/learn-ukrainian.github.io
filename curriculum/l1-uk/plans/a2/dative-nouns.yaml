module: a2-018
level: A2
track: l1-uk
sequence: 18
slug: dative-nouns
version: '2.0.0'
title: Студентові, сестрі, дитині
subtitle: Закінчення давального відмінка іменників усіх родів
focus: grammar
pedagogy: PPP
phase: A2.3 [Давальний відмінок]
word_target: 2000
objectives:
- Вміти утворювати закінчення давального відмінка однини для іменників чоловічого роду, використовуючи правильний варіант (-ові/-еві/-єві або -у/-ю).
- Вміти утворювати закінчення давального відмінка однини для іменників жіночого роду (-і/-ї для твердої/м'якої груп, -ці/-зі після задньоязикових із чергуванням приголосних).
- Вміти утворювати закінчення давального відмінка однини для іменників середнього роду (-у/-ю).
- Вміти використовувати іменники в давальному відмінку як непрямі додатки з дієсловами подарувати, показати, розповісти, написати.
dialogue_situations:
- setting: 'На пошті — підписування посилок різним людям: Студентові Петренку — підручник. Сестрі Олені — листівка. Дитині — іграшка.'
  speakers:
  - Відправник
  - Працівник пошти
  motivation: 'Іменники в давальному відмінку: студент→студентові, сестра→сестрі, дитина→дитині'
content_outline:
- section: Давальний відмінок іменників чоловічого роду
  words: 650
  points:
  - 'Іменники чоловічого роду ІІ відміни мають паралельні закінчення: -ові/-еві/-єві та -у/-ю. Обидва варіанти правильні: братові = брату, лікареві = лікарю.'
  - '-ові для твердої групи (студентові, другові, батькові), -еві для м''якої групи та після шиплячих (вчителеві, товаришеві), -єві після голосних (героєві).'
  - 'Стилістичне правило за Заболотним: коли кілька іменників у давальному відмінку стоять поруч, чергуйте закінчення для уникнення одноманітності — подякувати сусідові Данилу.'
  - 'Іменники чоловічого роду І відміни (Дмитро, батько): відмінюються за своїм зразком — Дмитрові, батькові.'
  - 'Практика з поширеними іменниками чоловічого роду, знайомими з рівнів A1-A2.'
- section: Давальний відмінок іменників жіночого роду
  words: 500
  points:
  - 'І відміна: тверда група має закінчення -і (мамі, подрузі, сестрі), м''яка група має закінчення -і (землі, пісні), основи на -ія мають закінчення -ії (станції).'
  - 'Чергування приголосних перед -і: к→ц (подруга→подрузі), г→з (книга→книзі), х→с (свекруха→свекрусі).'
  - 'Іменники жіночого роду ІІІ відміни: -і (ночі, матері, любові, радості).'
  - 'Практика складання речень за моделлю непрямого додатка (подарувати квіти мамі, написати листа подрузі).'
- section: Давальний відмінок іменників середнього роду
  words: 350
  points:
  - 'ІІ відміна, середній рід: -у для твердої групи (місту, слову, вікну), -ю для м''якої групи (морю, серцю).'
  - 'IV відміна (іменники на -а/-ят-): -аті/-яті (немовляті, курчаті).'
  - 'Приклади з іменниками середнього роду в реальних контекстах (дати назву місту, радіти сонцю).'
- section: Давальний відмінок у реченні
  words: 500
  points:
  - 'Модель дієслова з двома додатками: Підмет + Дієслово + Давальний відмінок (одержувач) + Знахідний відмінок (предмет). Тетяна подарувала братові книгу. Вчитель показав студентам карту.'
  - 'Поширені дієслова з непрямими додатками: подарувати, показати, дати, розповісти, написати, пояснити, відповісти.'
  - 'Діалогічна практика — дарування подарунків, пояснення речей, написання комусь листів.'
  - 'Протиставлення конструкцій із родовим відмінком (дати братові проти немає брата) для закріплення розрізнення відмінків.'
- section: Підсумок
  words: 200
  points:
  - 'Давальний відмінок для іменників використовується з непрямими додатками (одержувачами). Чоловічий рід має паралельні закінчення -ові/-еві/-єві та -у/-ю. Жіночий рід закінчується на -і з можливим чергуванням приголосних (подруга → подрузі). Середній рід має закінчення -у/-ю.'
  - "Самоперевірка: Як сказати «подарувати книгу братові»? Як змінюється слово «подруга» у давальному відмінку? Назвіть 3 дієслова, які вимагають давального відмінка для особи."
vocabulary_hints:
  required:
  - студентові
  - сестрі
  - другові
  - подарувати
  - показати
  - написати
  - розповісти
  - пояснити
  - відповісти
  - закінчення
  recommended:
  - відміна
  - чергування
  - одержувач
  - немовля
activity_hints:
- type: fill-in
  focus: Поставити іменник у дужках у давальному відмінку (наприклад, подарувати [брат] → братові)
  items: 8
- type: group-sort
  focus: Відсортувати іменники в давальному відмінку за родами (чоловічий -ові/-у, жіночий -і, середній -у/-ю)
  items: 8
- type: quiz
  focus: Обрати правильне закінчення давального відмінка для іменників із чергуванням приголосних (подруга→подрузі проти *подругі)
  items: 8
- type: match-up
  focus: Зіставити словосполучення дієслово + іменник у давальному відмінку з їхніми англійськими значеннями
  items: 8
- type: unjumble
  focus: Розташувати слова у правильному порядку, щоб утворити правильні конструкції в давальному відмінку з непрямими додатками (наприклад, подарувати братові книгу)
  items: 6
references:
- title: Заболотний Grade 10, §157
  notes: Закінчення давального відмінка для іменників чоловічого роду ІІ відміни з паралельними закінченнями -ові/-еві/-єві та -у/-ю, стилістичне правило їх чергування
- title: Глазова Grade 10, §194
  notes: Закінчення давального відмінка однини для іменників чоловічого роду за групами відмінювання (тверда, м'яка, мішана)
- title: Кравцова Grade 4, §135
  notes: Розрізнення давального та місцевого відмінків — спільні закінчення, різні функції
