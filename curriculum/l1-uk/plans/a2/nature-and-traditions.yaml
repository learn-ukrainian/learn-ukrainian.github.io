module: a2-060
level: A2
track: l1-uk
sequence: 60
slug: nature-and-traditions
version: '2.0.0'
title: Пори року і свята
subtitle: Природа, пори року та українські традиції
focus: communication
pedagogy: TBL
phase: A2.8 [Удосконалення та випуск]
word_target: 2000
objectives:
- Учень вміє описувати всі чотири пори року та погоду, використовуючи прикметники, вищий ступінь порівняння та дієслова відповідного виду.
- Учень вміє розповідати про головні українські свята та традиції (Різдво, Великдень, Івана Купала, День Незалежності), використовуючи всю граматику рівня А2.
- Учень вміє розповідати про сезонні розваги та особисті традиції, використовуючи складні речення з тому що, коли, щоб.
- Учень вміє інтегрувати всю граматику рівня А2 (відмінки, вид, порівняння, прикметники) у тривалому комунікативному контексті.
dialogue_situations:
- setting: 'Українська родина готується до Івана Купала — плетуть вінок (m), стрибають через вогнище (n), шукають цвіт папороті (m). А також: Різдво (n) — колядки (pl), Великдень (m) — писанки (pl).'
  speakers:
  - Родина
  - Іноземний гість
  motivation: 'Традиції: вінок (m), вогнище (n), колядки (pl), писанки (pl)'
content_outline:
- section: Чотири пори року
  words: 550
  points:
  - 'Опис кожної пори року з багатим словниковим запасом: весна — все розквітає, птахи повертаються, стає тепліше; літо — спекотно, купатися, відпочивати; осінь — листя падає, дощить, прохолодно; зима — сніг, мороз, ковзанка.'
  - 'Вислови про погоду: Яка сьогодні погода? Сьогодні сонячно/хмарно/вітряно. Іде дощ/сніг. Температура — п''ять градусів.'
  - 'Порівняння пір року: Літо тепліше за весну. Зима — найхолодніша пора року. Восени більше дощів, ніж влітку.'
  - 'Діалог: друзі обговорюють свої улюблені пори року та чому вони їм подобаються.'
- section: 'Українські свята: від Різдва до Купала'
  words: 600
  points:
  - 'Зимові свята: Різдво, Святий Вечір, колядки, кутя. Святкування Нового року.'
  - 'Весняні свята: Великдень — писанки, паски, Христос воскрес! Вербна неділя. Весняні традиції пробудження природи.'
  - 'Літні свята: Івана Купала (7 липня) — вінки на воду, стрибати через вогонь. День Конституції (28 червня), День Незалежності (24 серпня).'
  - 'Осінь: День захисників і захисниць України (1 жовтня). Традиції збору врожаю.'
  - 'Культурний контекст: чому ці традиції важливі, як вони пов''язані з українською ідентичністю та землеробським календарем.'
- section: Що ми робимо у кожну пору року?
  words: 450
  points:
  - 'Сезонні розваги: збирати гриби та ягоди, кататися на лижах, садити квіти, подорожувати.'
  - 'Практика розповіді: Коли настає весна, ми завжди... Минулого літа ми поїхали... Цієї зими я планую...'
  - 'Природне використання виду дієслова: Сніг падав цілий день проти Сніг нарешті розтанув.'
- section: Мої традиції
  words: 400
  points:
  - 'Завдання: опишіть сімейні традиції на одне свято — що ви готуєте, куди йдете, з ким святкуєте. Інтегрує всю граматику А2: відмінки, порівняння, вид, складні речення.'
  - 'Практика читання: український підліток описує свої родинні традиції на Різдво — кутя, колядки, подарунки, родинна вечеря.'
  - 'Теми для обговорення: Яке свято вам найбільше подобається? Чому? Які українські традиції ви хотіли б спробувати?'
- section: Підсумок
  words: 200
  points:
  - 'Опис пір року та погоди вимагає багатого словникового запасу та вищих ступенів порівняння: літо тепліше за весну, зима — найхолодніша. Самоперевірка: Яка сьогодні погода українською мовою? Опишіть свою улюблену пору року, використовуючи щонайменше 3 прикметники та вислови про погоду.'
  - 'Розповідь про святкові традиції (Різдво, Великдень) та сезонні розваги спирається на правильний вид дієслова: сніг падав проти сніг розтанув. Самоперевірка: Яка різниця між "ми святкували" та "ми відсвяткували"? Назвіть 3 українські свята та одну конкретну традицію для кожного (наприклад, писанки).'
vocabulary_hints:
  required:
  - пора року — сезон
  - весна — тепла пора року після зими
  - літо — найтепліша пора року
  - осінь — пора року між літом і зимою
  - зима — холодна пора року
  - погода — стан природи надворі
  - свято — особливий святковий день
  - Різдво — зимове свято
  - Великдень — весняне свято
  - традиція — звичай, який передають
  - писанка — розписане великоднє яйце
  recommended:
  - кутя — різдвяна обрядова страва
  - колядка — різдвяна святкова пісня
  - вінок — сплетена прикраса з квітів або гілок
  - мороз — сильний холод
  - розквітати — починати цвісти
