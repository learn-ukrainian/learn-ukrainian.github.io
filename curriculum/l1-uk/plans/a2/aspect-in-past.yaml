module: a2-040
level: A2
sequence: 40
slug: aspect-in-past
track: l1-uk
version: '2.0.0'
title: Що ти робив? А що зробив?
subtitle: Вид дієслова в минулому часі — процес чи результат
focus: grammar
pedagogy: PPP
phase: 'A2.6 [Вид дієслова, часи та рух]'
word_target: 2000
objectives:
- Учень може розрізняти недоконаний вид у минулому часі (що робив?), який виражає процес, тривалість чи повторення, та доконаний вид (що зробив?), що вказує на завершену дію з видимим результатом.
- Учень може обрати правильний вид дієслова в минулому часі на основі контексту (слова-маркери, акцент на результаті, фонова дія проти основної).
- Учень може утворювати форми минулого часу для обох видів 10 поширених пар дієслів, правильно узгоджуючи рід та число (робив/робила/робили проти зробив/зробила/зробили).
- Учень може розповісти просту послідовність подій, використовуючи доконаний вид для завершених кроків і недоконаний вид для фонових дій.
dialogue_situations:
- setting: 'Двоє друзів обговорюють, як вони провели неділю — процес проти результату: Я читала (impf) весь день. А ти? Я прочитав (pf) роман (m)! Я готувала (impf) обід. Я приготувала (pf) борщ.'
  speakers:
  - Оля
  - Тарас
  motivation: 'Вид у минулому часі: читала (недоконаний, процес) проти прочитав (доконаний, завершено)'
content_outline:
- section: 'Два питання — два види'
  words: 500
  points:
  - 'Ключова пара запитань: Що ти робив? (процес) проти Що ти зробив? (результат). Це не просто граматичне правило, а реальна відмінність у тому, як українці сприймають дії.'
  - 'Минулий час недоконаного виду = камера знімає: Я читав книгу. Акцент робиться на самій дії, її тривалості чи повторюваності.'
  - 'Минулий час доконаного виду = фотографія результату: Я прочитав книгу. Акцент робиться на завершеному результаті.'
  - 'Повторення узгодження за родом: він робив / вона робила / воно робило / вони робили. Та сама модель і для доконаного виду: він зробив / вона зробила.'
- section: 'Коли вживати недоконаний вид'
  words: 500
  points:
  - 'Процес або тривалість: Я довго писав листа. Дія розтягнута в часі.'
  - 'Повторення або звичка: Вона щодня готувала сніданок. Повторювана дія, а не одна подія.'
  - 'Фонова дія: Коли я снідав, подзвонив друг. Недоконаний вид створює контекст для події.'
  - 'Слова-маркери: довго, часто, завжди, щодня, зазвичай, раніше, коли (для фону).'
- section: 'Коли вживати доконаний вид'
  words: 500
  points:
  - 'Завершений результат: Я написав листа. Дія досягла своєї мети і дала результат.'
  - 'Одинична подія в послідовності: Я прийшов додому, пообідав і подзвонив мамі. Кожне дієслово позначає завершений крок.'
  - 'Раптова дія: Раптом хтось постукав у двері. Одинична, точкова подія.'
  - 'Слова-маркери: вже, нарешті, раптом, одного разу, вчора (коли йдеться про одиничну завершену дію).'
- section: 'Практика вибору виду'
  words: 500
  points:
  - 'Контрастні пари в контексті: Він читав газету (процес) проти Він прочитав газету (завершив читати). Вона вчила слова (вивчала) проти Вона вивчила слова (вивчила напам''ять).'
  - 'Мінірозповіді, що поєднують обидва види: Коли я готував вечерю, раптом погасло світло. Я знайшов свічку і запалив її.'
  - 'Типові помилки: використання недоконаного виду, коли важливий результат (*Я писав листа вчора — двозначно), використання доконаного виду для повторюваних дій (*Він щодня зробив вправи — неправильно).'
  - 'Схема прийняття рішень: Є результат? → Доконаний вид. Це процес, звичка чи фонова дія? → Недоконаний вид.'
- section: Підсумок
  words: 200
  points:
  - 'Минулий час вимагає вибору між двома видами: недоконаний для процесу, повторення або фонової дії (що робив?) і доконаний для завершених результатів або послідовностей (що зробив?). Обидві форми узгоджуються в роді та числі (він робив, вона робила, вони робили).'
  - 'Самоперевірка: Яка різниця між "я читав книгу" і "я прочитав книгу"? Опишіть послідовність із 3 дій, які ви завершили вчора, використовуючи минулий час доконаного виду.'
vocabulary_hints:
  required:
  - минулий час
  - робити / зробити
  - писати / написати
  - читати / прочитати
  - готувати / приготувати
  - вчити / вивчити
  - процес
  - результат
  - довго
  - раптом
  recommended:
  - щодня
  - нарешті
  - одного разу
  - тривалість
activity_hints:
- type: quiz
  focus: 'Визначення виду дієслова в реченні (доконаний чи недоконаний) з поясненням причини'
  items: 8
- type: fill-in
  focus: 'Вибір правильної видової форми (недоконаний чи доконаний минулий час) для доповнення речень за контекстом'
  items: 8
- type: match-up
  focus: 'Зіставлення слів-маркерів (довго, раптом, щодня, нарешті) з відповідним видом і прикладом речення'
  items: 8
- type: error-correction
  focus: 'Виправлення неправильного вживання виду дієслова в реченнях'
  items: 6
