module: a2-062
level: A2
sequence: 62
slug: metalanguage-verbs-and-time
track: l1-uk
version: '2.0.0'
title: Дія і час
subtitle: Дієслівні категорії та словникова грамотність
focus: bridge
pedagogy: Bridge
phase: 'A2.9 [Метамова: місток та основи]'
word_target: 2000
objectives:
- Студент вміє називати українські дієслівні категорії (час, вид, спосіб, дієвідміна, особа) та визначати їх у формах дієслова.
- Студент вміє розрізняти доконаний і недоконаний вид, використовуючи українську термінологію.
- Студент вміє читати та інтерпретувати словникові статті з goroh.pp.ua, розуміючи скорочення (ж.р., док., недок., одн., мн. тощо).
- Студент вміє використовувати українську термінологію для прислівників (прислівник місця, часу, способу дії), щоб класифікувати вже знайомі прислівники.
dialogue_situations:
- setting: 'Студент просить викладача пояснити термінологію видів дієслова: Що означає "доконаний вид"? Як визначити дієвідміну? Викладач використовує знайомі дієслова як приклади.'
  motivation: 'Запитувати про граматичні поняття, розуміти українську термінологію, пов''язувати терміни зі знайомою граматикою'
  speakers:
  - Студент
  - Викладач
  key_vocabulary:
  - доконаний
  - недоконаний
  - дієвідміна
  - особа
- setting: 'Студент намагається знайти слово в онлайн-словнику — читає статтю вголос і запитує одногрупника, що означають скорочення.'
  motivation: 'Читати словникові статті, інтерпретувати скорочення, допомагати одне одному'
  speakers:
  - Студент
  - Одногрупник
  key_vocabulary:
  - словник
  - скорочення
  - ж.р.
  - док.
  - недок.
content_outline:
- section: 'Дієслово: категорії та терміни'
  words: 600
  points:
  - 'Нове називання знайомого: студент уже використовує часи та види дієслова — тепер він вивчає українські терміни. Метод: уривки з підручників для 4-5 класів.'
  - 'Час: минулий час, теперішній час, майбутній час. Приклади зі знайомими дієсловами: читав (мин.), читаю (теп.), читатиму/буду читати (майб.).'
  - 'Вид: доконаний вид — що зробити? прочитати, написати. Недоконаний вид — що робити? читати, писати. Зв''язок із вивченим у модулях рівня A2.1.'
  - 'Спосіб: дійсний спосіб (ствердження фактів), наказовий спосіб (висловлення наказів: читай!), умовний спосіб (лише ознайомлення з терміном: читав би. Використання — на рівні B1; тут ми вивчаємо термін, щоб студенти могли читати граматичні довідники).'
- section: 'Дієвідміна та особа'
  words: 450
  points:
  - 'Дієвідміна: I дієвідміна (модель -еш, -е: пишеш, пише) та II дієвідміна (модель -иш, -ить: говориш, говорить). Як визначити: подивіться на форму 3-ї особи однини.'
  - 'Особа: перша особа (я, ми), друга особа (ти, ви), третя особа (він/вона/воно, вони).'
  - 'Число в дієсловах: однина (читаю, читаєш, читає), множина (читаємо, читаєте, читають).'
  - 'Практика: визначити час, вид, особу та число для поданих дієслівних форм.'
- section: 'Словникова грамотність: читаємо словник'
  words: 550
  points:
  - 'Як читати статтю на goroh.pp.ua: заголовне слово, наголос, скорочення частини мови, граматична інформація, визначення.'
  - 'Основні скорочення: ім. (іменник), прикм. (прикметник), дієсл. (дієслово), займ. (займенник), присл. (прислівник), ч.р. (чоловічий рід), ж.р. (жіночий рід), с.р. (середній рід), док. (доконаний), недок. (недоконаний), одн. (однина), мн. (множина).'
  - 'Практика: прочитати 5-6 реальних словникових статей і витягти граматичну інформацію. Яка частина мови? Який рід? Який вид?'
  - 'Чому це важливо: на рівні B1 і далі використовуватимуться україномовні довідники. Ця навичка є важливою для самостійного навчання.'
- section: 'Прислівник: види та приклади'
  words: 400
  points:
  - 'Класифікація прислівників за допомогою українських термінів: прислівник місця — тут, там, далеко, близько; прислівник часу — сьогодні, завтра, вчора, завжди; прислівник способу дії — швидко, повільно, добре.'
  - 'Практика: розподілити знайомі прислівники за категоріями, використовуючи українські терміни.'
  - 'Зв''язок із прикметником: багато прислівників утворюються від прикметників (швидкий → швидко, гарний → гарно). Модель закінчення на -о.'
- section: 'Підсумок'
  words: 200
  points:
  - 'Дієслівні категорії та словникові скорочення використовують українську термінологію: час, вид (доконаний/недоконаний), особа, а також скорочення, як-от ім., дієсл., док., ж.р., одн. Самоперевірка: Визначте час, вид, особу та число для дієслова "пишемо". Що означають словникові скорочення "недок." та "мн."?'
  - 'Прислівники класифікуються за типами за допомогою українських термінів: місця (here/there), часу (today/tomorrow) і способу дії (quickly/slowly). Самоперевірка: Назвіть 3 прислівники, які ви вже знаєте, і класифікуйте їх за допомогою українських термінів. Як утворити прислівник від прикметника "швидкий"?'
