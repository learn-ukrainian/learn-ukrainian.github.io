module: a2-055
level: A2
sequence: 55
slug: numerals-and-cases
track: l1-uk
version: '2.0.0'
title: Числа у відмінках
subtitle: Порядкові числівники та узгодження числівників з іменниками
focus: grammar
pedagogy: PPP
phase: A2.8 [Удосконалення та випуск]
word_target: 2000
objectives:
- Учень вміє відмінювати порядкові числівники за всіма відмінками, розрізняючи числівники на -ий (п'ятий/п'ятого) та на -ій (третій/третього).
- Учень вміє відмінювати один/одна/одне за всіма відмінками та родами (одного, одній, одним).
- Учень вміє застосовувати правила узгодження числівників з іменниками: 2-4 + називний відмінок множини, 5-20 + родовий відмінок множини, 21 починає цикл спочатку.
- Учень вміє використовувати числівники в практичних контекстах, таких як дати, ціни, вік та адреси.
dialogue_situations:
- setting: 'Організація шкільного спортивного свята — підрахунок команд, спорядження, призів: Перша (f) команда — десять учнів. Другий (m) забіг о десятій. Одного м''яча (m) не вистачає. П''ять медалей (f) для переможців.'
  speakers:
  - Вчитель фізкультури
  - Учні
  motivation: 'Порядкові числівники + відмінки: перша, другий, одного м''яча, п''ять медалей'
content_outline:
- section: 'Порядкові числівники: -ий та -ій'
  words: 550
  points:
  - 'Два патерни: порядкові числівники на -ий відмінюються як тверда група прикметників (п''ятий → п''ятого, п''ятому, п''ятим). Порядкові числівники на -ій відмінюються як м''яка група прикметників (третій → третього, третьому, третім).'
  - 'Які порядкові числівники мають закінчення -ій: третій — головний з них. Також перший має змішаний патерн. Усі інші мають закінчення -ий.'
  - 'Практика з датами: двадцять першого березня, другого квітня, п''ятнадцятого серпня. Порядкові числівники в родовому відмінку для дат.'
  - 'Порядкові числівники узгоджуються в роді, числі та відмінку зі своїм іменником: перший день (m.), перша зустріч (f.), перше враження (n.).'
- section: Один/одна/одне у відмінках
  words: 400
  points:
  - 'Повне відмінювання один (m.), одна (f.), одне (n.) у всіх семи відмінках. Ключові форми: одного, одному, одним (m./n.); однієї/одної, одній, однією (f.).'
  - 'Використання поза лічбою: один означає "якийсь" (один чоловік сказав...), "сам" (я один/одна), "той самий" (ми з одного міста).'
  - 'Практичні речення з використанням один у різних відмінках та значеннях.'
- section: Скільки чого? Числівник + іменник
  words: 600
  points:
  - 'Цикл узгодження: 1 + Наз. одн. (один студент, одна книга), 2-4 + Наз. мн. (два студенти, три книги), 5-20 + Род. мн. (п''ять студентів, десять книг).'
  - 'Після 20 цикл починається знову залежно від останньої цифри: 21 студент, 22 студенти, 25 студентів.'
  - 'Рід має значення для два/дві та обидва/обидві: два брати, але дві сестри.'
  - 'Поширені вислови кількості: кілька, декілька, багато, мало, скільки — всі вимагають Род. мн.'
- section: Числа навколо нас
  words: 450
  points:
  - 'Діалог: на ринку — запитувати ціни, обговорювати кількість, торгуватися (Скільки коштує? Дайте, будь ласка, три кілограми).'
  - 'Практика читання: короткий текст про українські свята з датами, віком історичних постатей, відстанями між містами.'
  - 'Формат адреси: вулиця Хрещатик, будинок 22, квартира 5.'
- section: Підсумок
  words: 200
  points:
  - 'Порядкові числівники відмінюються за твердою або м''якою групою прикметників: -ий (п''ятий, п''ятого) проти -ій (третій, третього). Слово "один" має власне повне відмінювання за всіма відмінками. Самоперевірка: Яка різниця між відмінюванням п''ятий та третій? Як перекласти "третього квітня"?'
  - 'Узгодження числівника з іменником залежить від числа та роду: 1 + Наз. одн., 2-4 + Наз. мн., 5-20 + Род. мн. Цикл починається знову з 21. Самоперевірка: Чому правильно "два брати", але "дві сестри"? Напишіть свою адресу та опишіть кількість 3 предметів у вашій кімнаті, використовуючи числа 3, 5 та 22.'
vocabulary_hints:
  required:
  - числівник — назва числа або порядку
  - порядковий — про порядок у ряді
  - кількісний — про кількість
  - перший — початковий у порядку
  - третій — номер три в порядку
  - один — число 1
  - скільки — запит про кількість
  - кілограм — одиниця ваги
  - коштувати — мати ціну
  - вік — кількість років
  recommended:
  - обидва — двоє предметів чоловічого роду
  - обидві — двоє предметів жіночого роду
  - десяток — десять одиниць
  - пів — половина
