module: a2-053
level: A2
sequence: 53
slug: checkpoint-syntax
track: l1-uk
version: '2.0.0'
title: Контрольна робота — складне речення
subtitle: Перевірка знань з модулів M42-M46 — причина, мета, означення, умова
focus: review
pedagogy: Review
phase: А2.7 [Складні речення та умови]
word_target: 1500
objectives:
- Здобувач може визначати та утворювати підрядні речення причини (тому що, бо), допусту (хоча), мети (щоб), означальні (який, де) та умови (якщо).
- Здобувач може вибрати правильний сполучник для заданої комунікативної мети (пояснення причини, визначення мети, опис, встановлення умов).
- Здобувач може перетворювати пряму мову на непряму, використовуючи "він сказав, що...".
- Здобувач може використовувати всі типи складних речень разом у зв'язному мовленні про освіту, роботу та повсякденне життя.
dialogue_situations:
- situation: 'Студент розповідає викладачеві про свої плани на вихідні, використовуючи всі п''ять типів складних речень — причина, допуст, мета, означення, умова'
  functions:
  - вираження причини
  - вираження допусту
  - вираження мети
  - опис
  - встановлення умов
  key_vocabulary:
  - тому що
  - хоча
  - щоб
  - який
  - якщо
- situation: 'Два однокласники перевіряють письмові домашні завдання одне одного — знаходять помилки у сполучниках та пропущені коми в складних реченнях'
  functions:
  - виявлення помилок
  - взаємна перевірка
  - пояснення граматичних правил
  key_vocabulary:
  - сполучник
  - кома
  - складне речення
  - помилка
content_outline:
- section: 'Частина 1: Впізнай сполучник'
  words: 450
  points:
  - 'Визначення сполучника: для заданого складного речення визначити сполучник та назвати його тип — причина (тому що, бо), допуст (хоча), мета (щоб), означальне (який, де, куди, звідки), умова (якщо).'
  - 'Виявлення помилок: знайти та виправити помилки у складних реченнях — неправильний сполучник, пропущена кома, неправильна форма слова "який", неправильна форма дієслова після "щоб".'
  - 'Змішані приклади з усіх п''яти типів, взяті з повсякденних ситуацій, що розглядалися в M42-M46.'
- section: 'Частина 2: Вибери правильну форму'
  words: 500
  points:
  - 'Вибір сполучника: для пари думок вибрати правильний сполучник, щоб їх поєднати. Причина проти мети (тому що vs. щоб), сурядність проти підрядності (але vs. хоча). Примітка: "якщо" (реальна умова) — це рівень А2; "якби" (нереальна умова) — це В1 (тільки розпізнавання, без продукування).'
  - 'Узгодження форм: вибрати правильну форму слова "який" (рід, число) для підрядних означальних речень. Вибрати правильну форму дієслова після "щоб" (інфінітив vs. форма минулого часу).'
  - 'Базова непряма мова: передати сказане кимось за допомогою "що" та "чи" (в межах А2 — без узгодження часів або складних трансформацій).'
  - 'Пунктуація: поставити коми в складних реченнях, де відсутні розділові знаки.'
- section: 'Частина 3: Побудуй складне речення'
  words: 550
  points:
  - 'Побудова речень: для заданої ситуації (в університеті, на роботі, планування подорожі) утворити складні речення з використанням потрібного типу сполучника.'
  - 'Написання абзацу: поєднати кілька типів складних речень у короткий зв''язний абзац про освітні цілі, досвід роботи або плани на вихідні.'
  - 'Чек-лист для самооцінки: повторення всіх п''яти типів складних речень, вивчених у А2.7. Чи можу я пояснити причину? допуст? мету? означення? умову? Чи можу я передати те, що хтось сказав?'
  - 'Огляд синтаксису В1: коротка згадка про те, що буде далі — якби (нереальні умови), складнопідрядні речення з кількома підрядними, складні сполучники.'
- section: Підсумок
  words: 200
  points:
  - 'Складні речення поєднують думки за допомогою певних сполучників: причина (тому що, бо), допуст (хоча), мета (щоб), означальні (який, де) та умова (якщо). Пам''ятайте, що "який" має узгоджуватися в роді та числі з іменником, від якого воно залежить, а непряма мова використовує "що" для розповідних речень і "чи" для загальних запитань.'
  - 'Самоперевірка: Яка різниця між "тому що" та "щоб"? Як перетворити "Він запитав: Ти йдеш?" на непряму мову? (Він запитав, чи ти йдеш). З''єднайте "Я піду" та "Погода гарна" за допомогою умови (якщо). Опишіть свою роботу або навчання, використовуючи принаймні три різні типи складних речень.'
