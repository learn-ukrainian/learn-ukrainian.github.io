module: a2-026
level: A2
sequence: 26
slug: instrumental-profession
track: l1-uk
version: '2.0.0'
title: Я буду вчителькою
subtitle: Орудний відмінок для професії та стану; дієслова з орудним відмінком
focus: grammar
pedagogy: PPP
phase: A2.4 [Instrumental Case]
word_target: 2000
objectives:
- Учень може використовувати орудний відмінок для вираження професії або статусу після слів бути, стати, працювати (бути лікарем, стати вчителькою, працювати інженером).
- Учень вміє відмінювати та використовувати дієслова, які вимагають орудного відмінка (захоплюватися, цікавитися, пишатися, займатися).
- Учень може розрізняти присудок у називному відмінку (Я вчитель) від присудка в орудному відмінку (Я буду вчителем) і розуміти, коли кожен з них є доречним.
- Учень вміє ставити запитання про професії та відповідати на них, використовуючи "Ким?" і "Хто ти за фахом?".
dialogue_situations:
- setting: 'Зустріч випускників — розмови про кар''єру: Я стала лікаркою (f). Він працює інженером (m). Вона хоче бути журналісткою (f). А ти?'
  speakers:
  - Колишні однокласники
  motivation: 'Бути + орудний відмінок: лікарка→лікаркою, інженер→інженером'
content_outline:
- section: 'Бути ким? Професія в орудному відмінку'
  words: 550
  points:
  - 'Після бути (минулий/майбутній час), стати, працювати іменник, що позначає професію, ставиться в орудний відмінок: Вона була вчителькою. Він стане лікарем. Я працюю інженером.'
  - 'Виняток теперішнього часу: Я вчитель / Вона вчителька (називний відмінок, без "є"). Але минулий і майбутній часи використовують орудний: Він був лікарем. Вона буде програмісткою.'
  - 'Іменники професій жіночого роду в орудному відмінку: вчителька → вчителькою, лікарка → лікаркою, програмістка → програмісткою, журналістка → журналісткою.'
  - 'Іменники професій чоловічого роду в орудному відмінку: лікар → лікарем, кухар → кухарем, інженер → інженером, програміст → програмістом, музикант → музикантом.'
  - 'Українська мова природно утворює назви професій як чоловічого, так і жіночого роду — це норма, а не інновація: лікар/лікарка, вчитель/вчителька, кухар/кухарка.'
- section: 'Дієслова з орудним відмінком'
  words: 550
  points:
  - 'Дієслова інтересу та пристрасті: захоплюватися (to be passionate about) — захоплюватися музикою, спортом, мистецтвом; цікавитися (to be interested in) — цікавитися історією, наукою.'
  - 'Дієслова гордості та захоплення: пишатися (to be proud of) — Я пишаюся Україною, сином; милуватися (to admire) — милуватися природою.'
  - 'Дієслова діяльності: займатися (to be engaged in) — займатися спортом, йогою, бізнесом; володіти (to master/possess) — володіти мовою.'
  - 'Фокус на відмінюванні дієслів: захоплюватися (I дієвідміна: захоплююся, захоплюєшся...), цікавитися (II дієвідміна: цікавлюся, цікавишся...).'
  - 'Практика складання речень, що поєднують словнику професій та інтересів.'
- section: 'Хто ти за фахом?'
  words: 500
  points:
  - 'Основні моделі запитань: Ким ти працюєш? Ким ти хочеш стати? Хто ти за фахом? Чим ти захоплюєшся?'
  - 'Діалог: Двоє людей на вечірці знайомляться — обговорюють свою роботу, те, що вони вивчали, і чим вони захоплюються.'
  - 'Поширені професії для практики: вчитель/вчителька, лікар/лікарка, інженер/ інженерка, програміст/програмістка, кухар/кухарка, перукар/перукарка, журналіст/журналістка, музикант/музикантка.'
  - 'Корисні фрази: працювати за фахом (to work in one''s field), мріяти стати... (to dream of becoming...).'
- section: 'Практика: Ким бути?'
  words: 400
  points:
  - 'Вправа на трансформацію: Він лікар. → Він працює лікарем. → Він буде лікарем.'
  - 'Побудова речень із дієсловом + орудним відмінком: Мій брат займається програмуванням. Моя сестра цікавиться медициною. Я пишаюся своєю родиною.'
  - 'Міні-діалог: Дитина розповідає батькам про мрії щодо майбутньої кар''єри (Я хочу стати ветеринаром! — Чому? — Бо я захоплююся тваринами).'
- section: Підсумок
  words: 200
  points:
  - 'Використовуйте називний відмінок для професій у теперішньому часі (Я лікар), але переходьте на орудний відмінок після бути, стати та працювати (Він був лікарем, Вона працює вчителькою). Самоперевірка: Як сказати "I am a programmer" порівняно з "I will be a programmer"? Назвіть 3 професії в їхніх формах чоловічого та жіночого роду.'
  - 'Дієслова інтересу, гордості та діяльності (захоплюватися, цікавитися, пишатися, займатися) завжди вимагають орудного відмінка. Самоперевірка: Запитайте друга: "What are you interested in?" (Чим ти цікавишся?). Яка різниця між "Хто ти за фахом?" і "Ким ти працюєш?"'
