module: a2-050
level: A2
sequence: 50
slug: word-order-emphasis
track: l1-uk
version: '2.0.0'
title: Порядок слів і наголос у реченні
subtitle: Тема і рема, інверсія для контрасту та природний порядок слів
focus: grammar
pedagogy: PPP
phase: A2.7 [Складні речення та умовний спосіб]
word_target: 2000
objectives:
- Вміти ідентифікувати тему (відома інформація) та рему (нова інформація) в українських реченнях і розуміти, що рема зазвичай стоїть наприкінці.
- Вміти використовувати винесення наперед (переміщення слова на початок речення) для створення наголосу або контрасту (Книгу я вже прочитав, а не *Я вже прочитав книгу, коли акцентується увага саме на книзі).
- Вміти відрізняти нейтральний порядок слів (підмет-присудок-додаток) від маркованого та розуміти комунікативний ефект кожного з них.
- Вміти будувати природні українські речення, де порядок слів передає зміст, який виходить за межі самої граматики.
dialogue_situations:
- setting: 'Співмешканці розподіляють хатні обов''язки, з''ясовуючи, хто що робить: Хто помив посуд? — Посуд помив Тарас. А підлогу? — Підлогу ще ніхто не помив. Добре, підлогу помию я.'
  speakers:
  - Оленка
  - Марійка
  motivation: 'Природне винесення наперед для контрасту: Посуд помив Тарас (посуд = тема, Тарас = рема). Підлогу помию я (підлогу = тема, я = рема)'
- setting: 'Друзі обговорюють фільм, не погоджуючись щодо деталей: Цей фільм зняв Сенцов. — Ні, цей фільм зняв не Сенцов, а Лозниця. — А от «Номери» — це точно Сенцов зняв.'
  speakers:
  - Друг 1
  - Друг 2
  motivation: 'Контраст через зміну порядку слів: нейтральний (Сенцов зняв фільм) проти контрастного (Цей фільм зняв Сенцов) та коригувального (не Сенцов, а Лозниця)'
content_outline:
- section: 'Тема і рема: що відоме, що нове?'
  words: 550
  points:
  - 'Кожне речення складається з двох частин: теми (відома або подана інформація, про що йдеться в реченні) та реми (нова інформація, комунікативний фокус).'
  - 'За нейтрального порядку слів в українській мові тема стоїть на початку, а рема — наприкінці: Тарас (тема) купив нову книгу (рема). «Новина» знаходиться в кінці.'
  - 'Перевірка: дайте відповідь на запитання. Хто купив книгу? → Книгу купив Тарас (Тарас — нова інформація = рема = в кінці). Що купив Тарас? → Тарас купив книгу (книгу = рема = в кінці).'
  - 'Це відрізняється від англійської мови, де порядок слів граматично фіксований (підмет-присудок-додаток). Українська мова використовує порядок слів для передачі СЕНСУ: граматика закладена у відмінкових закінченнях, тому порядок слів вільно виражає наголос.'
- section: Прямий порядок слів
  words: 500
  points:
  - 'Стандартний нейтральний порядок: підмет + присудок + додаток: Студент читає книгу. Мама готує вечерю. Це немаркований, емоційно нейтральний порядок.'
  - 'Прикметник перед іменником: нова книга, великий будинок (так само, як і в англійській). Прислівник перед дієсловом або після нього: добре працює / працює добре (обидва варіанти правильні, але наголос зміщується).'
  - 'Вирази часу зазвичай стоять на початку або в кінці: Вчора ми ходили в кіно. Ми ходили в кіно вчора. (Вчора на початку = нейтральне задання контексту; вчора в кінці = підкреслення, що це було саме вчора).'
  - 'Практика: визначити нейтральний порядок слів у реченнях та пояснити, що є темою, а що — ремою.'
- section: Інверсія для контрасту
  words: 600
  points:
  - 'Винесення додатка наперед: Книгу я вже прочитав (я вже прочитав КНИГУ — на противагу чомусь іншому). Додаток переміщується на початок і стає темою, а підмет зміщується і стає частиною реми.'
  - 'Винесення дієслова наперед: Прочитав я цю книгу! (емфатично, експресивно — я ТАКИ прочитав цю книгу!). Порядок з дієсловом на початку передає сильне твердження або емоційний наголос.'
  - 'Коригувальний контраст: Не Тарас це зробив, а Олег. Виправлений елемент виноситься наперед за допомогою конструкції не... а.'
  - 'Специфічні конструкції виділення: Це Тарас допоміг мені. Частка це + іменник чітко вказує на рему.'
  - 'Практика: перетворити нейтральні речення на емфатичні, змінивши порядок слів, а потім пояснити зміну значення.'
- section: Порядок слів у реальному мовленні
  words: 350
  points:
  - 'У розмові порядок слів постійно змінюється залежно від того, що є відомим, а що — новим. Практика з мінідіалогами, де кожна відповідь змінює порядок слів у реченні, щоб виділити нову інформацію.'
  - 'Типові моделі: — Хто це зробив? — Це зробив Тарас. (Підмет-присудок-додаток → додаток-присудок-підмет). — Що ти купив? — Я купив каву. (нейтральний порядок залишається).'
  - 'Практика читання: визначення змін порядку слів у короткому українському тексті та пояснення, чому автор обрав саме такий порядок.'
- section: Підсумок
  words: 200
  points:
  - "Порядок слів в українській мові є гнучким і передає значення: відома інформація (тема) стоїть на початку, а нова (рема) — наприкінці. Самоперевірка: Яка різниця в наголосі між 'Тарас купив книгу' та 'Книгу купив Тарас'?"
  - "Винесення наперед (переміщення слова на початок) створює наголос або контраст. Самоперевірка: Як би ви використали порядок з дієсловом на початку, щоб рішуче стверджувати, що ви таки прочитали цю книгу? Перепишіть речення 'Вчора ми ходили в кіно', щоб підкреслити, що це було саме вчора."
vocabulary_hints:
  required:
  - порядок — розташування слів
  - речення — завершена думка
  - тема — відома частина повідомлення
  - рема — нова частина повідомлення
  - наголос — смислове виділення
  - інверсія — незвичний порядок слів
  - контраст — протиставлення
  - підкреслювати — робити помітним
  - початок — перша позиція
  - кінець — остання позиція
  recommended:
  - виділяти — робити головним у вислові
  - означення — слово, що характеризує предмет
  - нейтральний — без додаткового акценту
  - емфатичний — з сильним наголосом
  - акцент — смислове виділення
activity_hints:
- type: quiz
  focus: Ідентифікувати рему (нову інформацію) в кожному реченні на основі запитання, на яке воно відповідає
  items: 8
- type: match-up
  focus: Зіставити запитання з відповідями, що мають правильний порядок слів (Хто приїхав? → Приїхав Тарас, а не Тарас приїхав)
  items: 8
- type: fill-in
  focus: Змінити порядок слів, щоб створити правильний наголос для заданого контексту (щоб акцентувати на "книзі")
  items: 8
- type: group-sort
  focus: Відсортувати речення за категоріями нейтральний порядок слів проти маркованого/емфатичного
  items: 8
- type: error-correction
  focus: Виправити речення, де порядок слів створює ненавмисний наголос (наприклад, відповідь *Каву купив я замість Я купив каву на запитання Що ти купив?)
  items: 6
