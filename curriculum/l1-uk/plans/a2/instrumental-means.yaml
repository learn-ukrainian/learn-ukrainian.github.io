module: a2-025
level: A2
track: l1-uk
sequence: 25
slug: instrumental-means
version: '2.0.0'
title: Ручкою, автобусом
subtitle: Орудний відмінок без прийменника для знаряддя та засобу
focus: grammar
pedagogy: PPP
phase: A2.4 [Instrumental Case]
word_target: 2000
objectives:
- Учень може використовувати орудний відмінок без прийменника для вираження знаряддя або інструмента дії (писати ручкою, малювати олівцем).
- Учень вміє використовувати орудний відмінок для вираження засобу пересування (їхати автобусом, летіти літаком).
- Учень може розрізняти використання для супроводу (з другом) від використання для знаряддя/засобу (писати ручкою) — наявність чи відсутність прийменника.
- Учень вміє утворювати закінчення орудного відмінка множини для поширених іменників (-ами, -ями).
dialogue_situations:
- setting: 'Урок мистецтва — обговорення інструментів і методів: Малюю олівцем. Фарбую пензлем. Ріжу ножицями. Їду на виставку автобусом.'
  speakers:
  - Вчитель мистецтва
  - Учні
  motivation: 'Орудний відмінок засобу: олівець→олівцем, пензель→пензлем, ножиці→ножицями'
content_outline:
- section: 'Чим? Знаряддя дії'
  words: 550
  points:
  - 'Первісне значення орудного відмінка: інструмент, який ви використовуєте для виконання дії. Прийменник не потрібен — саме закінчення відмінка передає значення.'
  - 'Письмо та малювання: писати ручкою, писати олівцем, малювати фарбами, креслити лінійкою, різати ножем, їсти ложкою.'
  - 'Домашня робота та щоденні інструменти: мити водою, витирати ганчіркою, чистити щіткою, підмітати віником.'
  - 'Контраст з англійським "with a pen" — українська мова НЕ використовує прийменник з для знарядь. Писати з ручкою = неправильно (означає "write accompanied by a pen"). Писати ручкою = правильно.'
  - 'Практика утворення орудного відмінка з називного для поширених іменників-інструментів усіх трьох родів.'
- section: 'Їхати автобусом: Засіб пересування'
  words: 500
  points:
  - 'Транспорт в орудному відмінку без прийменника: їхати автобусом, їхати потягом, летіти літаком, пливти кораблем, їхати таксі (незмінюване).'
  - 'Модель запитання: Чим ти їдеш на роботу? — Я їду автобусом / метро / трамваєм.'
  - 'Діалог: Двоє колег обговорюють, як вони дістаються на роботу — один їде автобусом, інший іде пішки (іти пішки — виняток, який не використовує орудний відмінок).'
  - 'Поширений словник транспорту з формами орудного відмінка поруч.'
- section: 'Орудний відмінок множини'
  words: 500
  points:
  - 'Закінчення орудного відмінка множини: -ами для твердої групи (руками, столами, вікнами), -ями для м''якої групи (олівцями, дверями, конями).'
  - 'Модель множини простіша за однину — однакові закінчення для всіх родів.'
  - 'Практика з інструментами в множині: малювати фарбами, їсти паличками, працювати руками, писати олівцями.'
  - 'Множина III відміни жіночого роду: -ями з можливими змінами приголосних (ночами, але мишами).'
- section: 'Практика: Знаряддя чи супутник?'
  words: 450
  points:
  - 'Контрастивна вправа: Я пишу ручкою (інструмент) проти Я ходжу з ручкою (супутник — носити її з собою). Він їде автобусом (засіб) проти Він їде з другом (супутник).'
  - 'Вправи на заповнення пропусків: виберіть, чи додавати з, чи використовувати чистий орудний відмінок залежно від значення.'
  - 'Діалог: У школі — учні обговорюють, чим вони пишуть, чим малюють і як дістаються до школи.'
  - 'Поширені вирази: пахнути квітами, займатися спортом — орудний відмінок без прийменника у сталих фразах.'
- section: Підсумок
  words: 200
  points:
  - 'Орудний відмінок без прийменника вказує на інструмент дії (писати ручкою) або засіб пересування (їхати автобусом), тоді як додавання "з" змінює значення на супровід (їхати з другом). Закінчення множини: -ами для твердої групи (руками) та -ями для м''якої групи (олівцями).'
  - 'Самоперевірка: У чому різниця між "я пишу ручкою" та "я пишу з ручкою"? Опишіть 3 інструменти, які ви використовуєте для домашніх справ, і 2 транспортні засоби, якими ви можете добиратися на роботу, використовуючи орудний відмінок.'
vocabulary_hints:
  required:
  - ручка
  - олівець
  - фарба
  - лінійка
  - ніж
  - ложка
  - автобус
  - потяг
  - літак
  - трамвай
  - засіб
  recommended:
  - знаряддя
  - транспорт
  - пішки
  - корабель
activity_hints:
- type: fill-in
  focus: 'Поставте іменник в орудному відмінку однини, щоб виразити знаряддя дії'
  items: 8
- type: quiz
  focus: 'Виберіть між з + орудний відмінок (супутник) та чистим орудним відмінком (знаряддя)'
  items: 8
- type: match-up
  focus: 'З''єднайте іменники на позначення транспорту з їхніми формами в орудному відмінку'
  items: 8
- type: group-sort
  focus: 'Розподіліть речення за категоріями "Знаряддя/Засіб" та "Супровід"'
  items: 8
- type: unjumble
  focus: 'Перевпорядкуйте слова, щоб утворити правильні словосполучення в орудному відмінку, що виражають знаряддя або засіб пересування'
  items: 6
references:
- title: Кравцова Grade 4, с. 56-57
  notes: 'Вправи на відкриття закінчень орудного відмінка чоловічого роду (-ом, -ем, -єм) з дієсловами знаряддя (писати, малювати)'
- title: Захарійчук Grade 4, с. 62
  notes: 'Закінчення орудного відмінка для іменників чоловічого роду, вправи з контекстами інструментів та транспорту'
