module: a2-014
level: A2
sequence: 14
slug: genitive-plural
track: l1-uk
version: 2.0.0
title: Багато книг, мало студентів
subtitle: Родовий відмінок множини — найскладніша форма
focus: grammar
pedagogy: PPP
phase: 'A2.2 [Родовий відмінок: завершення]'
word_target: 2000
objectives:
  - Вміти утворювати родовий відмінок множини іменників чоловічого роду, використовуючи правильне закінчення (-ів або нульове закінчення для іменників на -ин/-їн).
  - Вміти утворювати родовий відмінок множини іменників жіночого роду, використовуючи нульове закінчення з можливим вставним голосним або м'яким знаком (та розпізнавати рідкісні винятки на -ей).
  - Вміти утворювати родовий відмінок множини іменників середнього роду (нульове закінчення, -ів для винятків).
  - Вміти правильно використовувати родовий відмінок множини після слів на позначення кількості (кілька, багато, мало, скільки) та числівників від 5 і більше.
dialogue_situations:
  - setting: 'Перевірка запасів у невеликому сільському магазині — рахуємо залишки: Скільки пляшок (f, bottles) води? П''ять. Скільки банок (f, jars) меду? Три. А булок (f, buns)? Немає булок!'
    speakers:
      - Продавець
      - Помічник (assistant)
    motivation: 'Родовий відмінок множини: пляшок, банок, булок — жіночий рід, нульове закінчення'
content_outline:
  - section: 'Чоловічий рід: закінчення -ів та нульове'
    words: 650
    points:
      - 'Основна модель -ів: столів, братів, студентів, будинків, підручників. Більшість іменників чоловічого роду твердої групи мають закінчення -ів.'
      - 'М''яка група -ів: учитель→учителів (вставний е випадає), олівець→олівців. Справжнє закінчення -їв з''являється лише після основи на голосний/апостроф: подвір''я→подвір''їв, відкриття→відкриттів. Більшість м''яких іменників чоловічого роду мають закінчення -ів, а не -їв.'
      - 'Нульове закінчення (рідко в чоловічому роді): іменники, що втрачають суфікс -ин/-їн, мають нульове закінчення: громадянин→громадян, селянин→селян, болгарин→болгар. Слово чоловік має паралельні форми (чоловік/чоловіків). Більшість іменників чоловічого роду мають закінчення -ів.'
      - 'Випадні голосні: день→днів (е випадає), хлопець→хлопців (е випадає). Практика розпізнавання змін в основі у родовому відмінку множини.'
  - section: 'Жіночий рід: моделі з нульовим закінченням'
    words: 700
    points:
      - 'Тверда група, нульове закінчення: книга→книг, жінка→жінок (вставний голосний о), сестра→сестер (вставний голосний е). Основна модель жіночого роду втрачає -а і має нульове закінчення.'
      - 'Правила появи вставних голосних: збіг приголосних у кінці основи часто вимагає вставного о або е. студентка→студенток, зупинка→зупинок, сумка→сумок.'
      - 'М''яка група, нульове закінчення + ь: пісня→пісень, вишня→вишень (звичайна модель I відміни м''якої групи). Винятки I відміни на -ей (невелика закрита група): стаття→статей, сім''я→сімей, миша→мишей. Група на -ія: станція→станцій, лекція→лекцій (нульове закінчення, й випадає).'
      - 'Мішана група: площа→площ, задача→задач. Основи на ж, ч, ш, щ мають нульове закінчення без вставного голосного.'
      - 'Практика з поширеними словами: кілька книг, багато жінок, мало сестер, скільки пісень, декілька лекцій.'
  - section: Середній рід та узагальнення
    words: 650
    points:
      - 'Середній рід, нульове закінчення: вікно→вікон, слово→слів, місто→міст. -о випадає і застосовується нульове закінчення. Вставний голосний за потреби: вікон (вставлене о).'
      - 'М''яка група середнього роду: море→морів, поле→полів (закінчення -ів, не нульове). Але: завдання→завдань (закінчення -ь), питання→питань.'
      - 'Середній рід на -тя: ім''я→імен, теля→телят. Вони мають особливі зміни основи в множині.'
      - 'Зведена таблиця: чоловічий рід (-ів, рідко нульове), жіночий рід (нульове + вставний голосний або ь, рідко винятки на -ей), середній рід (нульове/-ів). Зверніть увагу: справжнє закінчення -ей також існує в II відміні чол./сер. роду (гостей, коней, очей) — це невелика закрита група. Ключове розуміння: родовий відмінок множини має НАЙБІЛЬШЕ варіацій з-поміж усіх відмінків — запам''ятовуйте поширені слова, вивчайте моделі, приймайте винятки.'
      - 'Вирази кількості: багато студентів, кілька книг, мало міст, декілька днів, скільки людей.'
vocabulary_hints:
  required:
    - множина
    - нульове закінчення
    - кілька
    - багато
    - мало
    - скільки
    - людина / люди
    - стаття
    - завдання
    - питання
  recommended:
    - чоловічий рід
    - жіночий рід
    - середній рід
    - виняток
    - вставний голосний
activity_hints:
  - type: fill-in
    focus: Утворення родового відмінка множини поданих іменників (усіх трьох родів)
    items: 8
  - type: quiz
    focus: 'Вибір правильного закінчення родового відмінка множини (-ів, -ей, нульове або -їв)'
    items: 8
  - type: match-up
    focus: Встановлення відповідності між називним однини та родовим множини
    items: 8
  - type: group-sort
    focus: 'Групування форм родового відмінка множини за типом закінчення (-ів/-їв проти нульового проти -ей)'
    items: 8
references:
