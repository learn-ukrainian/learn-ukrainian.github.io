module: a2-016
level: A2
sequence: 16
slug: checkpoint-genitive
track: l1-uk
version: '2.0.0'
title: Контрольна робота — родовий відмінок
subtitle: Перевірка знань з модулів M08-M13 — прийменники, узгодження, множина, ситуації
focus: review
pedagogy: Review
phase: А2.2 [Родовий відмінок (повністю)]
word_target: 1500
objectives:
- Здобувач може розпізнавати та утворювати форми родового відмінка після всіх вивчених прийменників (з/із/зі, від, після, для, без, біля, навпроти, коло, до).
- Здобувач може правильно утворювати іменникові словосполучення в родовому відмінку з узгодженням прикметників і займенників (мого нового друга, цієї старої книги).
- Здобувач може утворювати форми родового відмінка множини для поширених іменників усіх трьох родів.
- Здобувач може застосовувати конструкції родового відмінка в реальних життєвих ситуаціях (покупки, здоров'я, орієнтування, вираження часу).
dialogue_situations:
- setting: 'Рольова гра: екскурсовод описує визначні місця Києва — використання всіх моделей родового відмінка: Біля Софійського собору. Без квитка не можна. Для групи з десяти людей. До Хрещатика (m) п''ять хвилин.'
  speakers:
  - Гід
  - Туристи
  motivation: 'Усі конструкції з родовим відмінком: біля собору, без квитка, для групи, до Хрещатика'
content_outline:
- section: 'Частина 1: Впізнавання форм'
  words: 450
  points:
  - 'Визначення прийменника: у заданому реченні визначити, який прийменник вимагає родового відмінка і яке значення він несе (джерело, мета, напрямок, час, розташування).'
  - 'Розпізнавання форми: для заданих словосполучень визначити, чи правильно вони утворені в родовому відмінку, чи містять помилки.'
  - 'Охоплює всі прийменники з M08-M10: з/із/зі, від, після, для, без, біля, навпроти, коло, до.'
  - 'Змішані приклади з повсякденних ситуацій: покупки, здоров''я, орієнтування в місті, розпорядок дня.'
- section: 'Частина 2: Вибір правильної форми'
  words: 500
  points:
  - 'Узгодження прикметників і займенників: вибрати правильну форму родового відмінка для прикметників (нового/нової), присвійних займенників (мого/моєї) та вказівних займенників (цього/цієї) у контексті.'
  - 'Вибір родового відмінка множини: для заданого слова, що позначає кількість + іменник, вибрати правильне закінчення родового відмінка множини (-ів, -ей, нульове або нестандартне).'
  - 'Вибір прийменника: вибрати між "з" та "від", "біля" та "навпроти", "до" та "після" в реченнях з мінімальними відмінностями.'
  - 'Виправлення помилок: знайти та виправити помилки в родовому відмінку в коротких реченнях (неправильне закінчення, неправильний прийменник, неправильне узгодження).'
- section: 'Частина 3: Вільне вживання'
  words: 550
  points:
  - 'Побудова речень: для заданої ситуації (на ринку, у лікаря, вказування дороги) скласти повні речення з використанням конструкцій родового відмінка.'
  - 'Завершення діалогу: заповнити обидві сторони короткого діалогу, використовуючи відповідні фрази в родовому відмінку — ситуація на ринку, запитування дороги, опис розпорядку дня.'
  - 'Переклад: перекласти короткі англійські речення українською мовою, правильно використовуючи прийменники родового відмінка, узгодження та форми множини.'
  - 'Чек-лист для самооцінки: чи можу я використовувати всі 9+ прийменників з родовим відмінком? Чи можу я утворювати родовий відмінок множини для всіх родів? Чи можу я узгоджувати прикметники та займенники в родовому відмінку?'
- section: Підсумок
  words: 200
  points:
  - 'Прийменники родового відмінка (з/із/зі, від, після, для, без, біля, навпроти, коло, до) та узгодження прикметників/займенників: мого нового друга, цієї старої книги. Самоперевірка: Яка різниця між "біля" та "навпроти"? Опишіть розташування 3 предметів у вашій кімнаті, використовуючи прийменники родового відмінка.'
  - 'Форми родового відмінка множини для всіх родів (-ів, -ей, нульові закінчення) та їхнє застосування в реальному житті. Самоперевірка: Як перекласти "after these new books"? (після цих нових книг). Запитайте дорогу до найближчої аптеки, використовуючи прийменник "до".'
