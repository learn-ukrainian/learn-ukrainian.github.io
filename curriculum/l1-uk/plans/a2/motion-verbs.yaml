# План l1-uk — україномовний модуль A2 motion-verbs
# Відгалужено від curriculum/l2-uk-en/plans/a2/motion-verbs.yaml v1.0.3
# Відгалужено 2026-04-22 як частина пакету форків A1+A2
module: a2-043
level: A2
sequence: 43
slug: motion-verbs
track: l1-uk
version: '2.0.0'
title: Іду, їду, лечу
subtitle: Дієслова руху та моделі дієвідмінювання з чергуванням основи
focus: grammar
pedagogy: PPP
phase: A2.6 [Вид, часи та рух]
word_target: 2000
objectives:
- Учень вміє розрізняти односпрямовані (іти, їхати, летіти) та різноспрямовані 
  (ходити, їздити, літати) дієслова руху і правильно використовувати кожен тип 
  залежно від того, чи це рух в один бік/у процесі, чи регулярний/в обидва боки.
- Учень вміє відмінювати всі три базові пари дієслів руху в теперішньому часі та
  утворювати їхні доконані відповідники за допомогою префікса по- (піти, 
  поїхати, полетіти).
- Учень вміє відмінювати три неправильні моделі дієслів — казати → кажу 
  (чергування приголосних основи), пити → пю (неправильне стягнення), боротися →
  борюся (зворотні на -отися) — і застосовувати ці патерни до схожих дієслів.
- Учень вміє використовувати дієслова руху з відповідними прийменниками та 
  відмінками для опису напрямку (іти до школи, їхати на роботу, летіти в 
  Україну).
dialogue_situations:
- setting: 'Хаос в аеропорту — всі рухаються в різних напрямках: Я іду до виходу (m).
    Він їде в місто. Літак (m) летить до Парижа. Ми пішли о третій.'
  speakers:
  - Пасажири
  - Друг (по телефону)
  motivation: 'Дієслова руху: іти/їхати/летіти з реальними ситуаціями подорожі'
content_outline:
- section: Три пари дієслів руху
  words: 500
  points:
  - Українська мова відрізняє рух в один бік (саме зараз, в одному напрямку) від
    регулярного руху або руху туди й назад. Це НЕ стосується швидкості чи 
    відстані — йдеться про характер поїздки.
  - 'Перша пара — пішки: іти (рух саме зараз, в один бік) проти ходити (регулярний
    рух, туди й назад). Я іду до магазину. Я ходжу до магазину щодня.'
  - 'Друга пара — транспортом: їхати (їхати саме зараз) проти їздити (їздити регулярно).
    Ми їдемо до Львова. Ми їздимо до Львова щоліта.'
  - 'Третя пара — повітрям: летіти (летіти саме зараз) проти літати (летіти регулярно/взагалі).
    Літак летить до Києва. Він часто літає до Києва.'
- section: Дієвідміна та доконаний вид
  words: 500
  points:
  - 'Відмінювання всіх шести дієслів у теперішньому часі. іти: іду, ідеш, іде, ідемо,
    ідете, ідуть. ходити: ходжу, ходиш, ходить, ходимо, ходите, ходять.'
  - 'їхати: їду, їдеш, їде, їдемо, їдете, їдуть. їздити: їжджу, їздиш, їздить, їздимо,
    їздите, їздять.'
  - 'летіти: лечу, летиш, летить, летимо, летите, летять. літати: літаю, літаєш, літає,
    літаємо, літаєте, літають.'
  - 'Доконаний вид з по-: піти, поїхати, полетіти. Він пішов додому. Вона поїхала
    на роботу. Літак полетів.'
- section: 'Моделі дієвідмінювання: казати, пити, боротися'
  words: 550
  points:
  - 'Перша модель — чергування приголосних основи (казати → кажу): чергування з →
    ж впливає на ВСЮ основу теперішнього часу (I дієвідміна). Повна дієвідміна: кажу,
    кажеш, каже, кажемо, кажете, кажуть. Схожі дієслова: писати → пишу, пишеш (с →
    ш усюди), сказати → скажу, скажеш.'
  - 'Друга модель — неправильне стягнення (пити → пю): основа скорочується і приймає
    стягнені закінчення. Повна дієвідміна: пю, пєш, пє, пємо, пєте, пють. Схожі дієслова:
    бити → бю, лити → ллю.'
  - 'Третя модель — зворотні на -отися (боротися → борюся): зворотна частка -ся залишається
    приєднаною усюди. Повна дієвідміна: борюся, борешся, бореться, боремося, боретеся,
    борються. Зверніть увагу на зміну основи от → ор.'
  - 'Чому ці моделі важливі: в українській мові є передбачувані чергування приголосних
    (з/ж, с/ш, т/ч, д/дж), які зявляються в багатьох дієсловах. Вивчення патерну один
    раз відкриває десятки дієслів.'
- section: Рух + прийменники + відмінки
  words: 450
  points:
  - 'Напрямок КУДИ: іти/їхати до + Род. (до школи, до друга), на + Знах. (на роботу,
    на пошту), в/у + Знах. (в Україну, у місто).'
  - 'Напрямок ЗВІДКИ: іти/їхати з + Род. (зі школи, з роботи), від + Род. (від друга).'
  - 'Через/по: через + Знах. (через парк), по + Місц. (по вулиці).'
  - 'Практичні діалоги: Куди ти їдеш? — Їду на роботу. Звідки ти йдеш? — Іду з магазину.
    Як ти їдеш? — Автобусом.'
- section: Підсумок
  words: 200
  points:
  - 'Дієслова руху існують у парах односпрямованих/різноспрямованих: іти/ходити, їхати/їздити,
    летіти/літати. Форми доконаного виду використовують префікс по- (піти, поїхати).
    Самоперевірка: Яка різниця між "Я іду" та "Я ходжу"? Опишіть свій типовий маршрут,
    використовуючи правильні дієслова руху та прийменники.'
  - 'Неправильні моделі дієвідмінювання включають чергування приголосних основи (казати
    → кажу), стягнення (пити → пю) та зворотні на -отися (боротися → борюся). Напрямок
    вимагає певних відмінків: до/з/від + Родовий, на/в/через + Знахідний. Самоперевірка:
    Провідміняйте "пити" в теперішньому часі. Перекладіть: "Ми їдемо до Львова" та
    "Я іду з магазину".'
vocabulary_hints:
  required:
  - іти / ходити (рух пішки — односпрямований/різноспрямований)
  - їхати / їздити (рух транспортом — односпрямований/різноспрямований)
  - летіти / літати (летіти — односпрямований/різноспрямований рух)
  - піти (почати рух пішки — доконаний вид)
  - поїхати (почати рух транспортом — доконаний вид)
  - казати / кажу (казати — модель зі зміною основи)
  - пити / п'ю (пити — неправильна модель)
  - боротися / борюся (боротися — зворотна модель)
  - напрямок (напрям)
  - рух (рух)
  recommended:
  - чергування (чергування)
  - односпрямований (односпрямований)
  - різноспрямований (різноспрямований)
  - звідки (звідки)
activity_hints:
- type: group-sort
  focus: 'Розподілити форми дієслів руху на категорії односпрямованих та різноспрямованих'
  items: 8
- type: fill-in
  focus: 'Доповнити речення правильною формою дієслова руху залежно від того, чи дія
    є односпрямованою/зараз, чи регулярною/туди й назад'
  items: 8
- type: quiz
  focus: 'Відміняти казати, пити та боротися — вибрати правильну форму для заданої
    особи та числа'
  items: 8
- type: match-up
  focus: 'Зіставити дієслова руху з правильним прийменником та відмінком для напрямку
    (до + Род., на + Знах., з + Род.)'
  items: 8
- type: unjumble
  focus: 'Розставити слова в правильному порядку, щоб утворити речення про напрямок
    з дієсловами руху та прийменниками (іду до школи, їду на роботу)'
  items: 6
references:
- title: Заболотний Grade 6, §39-41
  notes: 'Дієвідміни дієслів, чергування приголосних при дієвідмінюванні'
- title: Ohoiko, Verbs of Motion with Prefixes (2024)
  notes: 'Таблиця іти/ходити, їхати/їздити, летіти/літати + система префіксів'
