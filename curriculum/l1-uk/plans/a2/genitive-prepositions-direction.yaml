module: a2-011
level: A2
sequence: 11
slug: genitive-prepositions-direction
track: l1-uk
version: '2.0.0'
title: Куди? До якого часу?
subtitle: Прийменник до з родовим відмінком для напрямку, мети та часу
focus: grammar
pedagogy: PPP
phase: 'A2.2 [Родовий відмінок: завершення]'
word_target: 2000
objectives:
  - Вміти використовувати прийменник до + родовий відмінок для вираження напрямку до місця призначення.
  - Вміти використовувати до + родовий відмінок для позначення часової межі.
  - Вміти використовувати до + родовий відмінок для вираження мети (піти до когось, до лікаря).
  - Навчитися протиставляти конструкцію з до іншим конструкціям напрямку (в/на + знахідний відмінок) і пояснювати доцільність кожної з них.
dialogue_situations:
  - setting: 'Вказуємо дорогу таксисту — серія пунктів призначення: До вокзалу, будь ласка. Потім до аптеки. Чекайте до п''ятої години. А потім до готелю.'
    speakers:
      - Пасажир
      - Таксист
    motivation: 'До + родовий відмінок: вокзал→вокзалу, аптека→аптеки, готель→готелю'
content_outline:
  - section: Куди ти йдеш? До + родовий відмінок для напрямку
    words: 700
    points:
      - 'Пункт призначення як місце: до Львова, до Києва, до Одеси. Використовується для міст і країн: до України, до Польщі.'
      - 'Пункт призначення як особа: до друга, до бабусі, до лікаря. До + особа = йти до когось / до їхнього місця.'
      - 'Протиставлення до проти в/на + знахідний відмінок: ''Іду до магазину'' проти ''Іду в магазин'' — до наголошує на напрямку/шляху, в/на підкреслює саму кінцеву точку. Обидва варіанти є абсолютно нормативними в українській мові. Немає ієрархії — використовуйте те, що краще пасує до контексту.'
      - 'Тверда та м''яка групи: до будинку (тверда чол.), до музею (м''яка чол.), до школи (тверда жін.), до станції (-ія жін.), до моря (м''яка сер.).'
  - section: До якого часу? До + родовий відмінок для часу
    words: 650
    points:
      - 'Часова межа — до: до вечора, до ранку, до понеділка, до літа.'
      - 'Дедлайн: зробити до п''ятниці, прийти до восьмої.'
      - 'У парі з від/з для позначення часових проміжків: від ранку до вечора, з понеділка до п''ятниці.'
      - 'Поширені щоденні фрази: працювати до шостої, чекати до завтра, відкрито до дев''ятої.'
  - section: 'До + родовий відмінок: решта значень та узагальнення'
    words: 650
    points:
      - 'Мета — з абстрактними іменниками: до речі, до побачення, готовий до екзамену.'
      - 'Додавання та відношення: додати до списку, ставлення до роботи, інтерес до мови.'
      - 'Зведена таблиця всіх значень прийменника до: напрямок (до Львова), особа (до лікаря), часова межа (до вечора), дедлайн (до п''ятниці), мета (до побачення).'
      - 'Закріплення: порівняйте до з від і після з модуля M08 — усі три прийменники вимагають родового відмінка, але виражають різні відношення (назустріч, від, після).'
vocabulary_hints:
  required:
    - напрямок
    - мета
    - музей
    - лікар
    - бабуся
    - вечір
    - ранок
    - екзамен
    - побачення
    - список
  recommended:
    - ставлення
    - інтерес
    - готовий
    - завтра
activity_hints:
  - type: quiz
    focus: Вибір правильного значення прийменника до в контексті (напрямок, час, мета)
    items: 8
  - type: fill-in
    focus: Доповнення речень прийменником до + правильною формою іменника в родовому відмінку
    items: 8
  - type: match-up
    focus: Встановлення відповідності між фразами з до та їхніми функціями (напрямок, часова межа, мета)
    items: 8
  - type: group-sort
    focus: Групування фраз з до за категорією значення (напрямок проти часу проти мети)
    items: 8
references:
  - title: Заболотний Grade 5, §31
    notes: Прийменник до з родовим відмінком
  - title: 'ULP: 10 Uses of Genitive Case'
