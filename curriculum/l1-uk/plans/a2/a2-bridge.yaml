module: a2-001
level: A2
track: l1-uk
sequence: 1
slug: a2-bridge
version: '2.0.0'
title: Ласкаво просимо до рівня А2
subtitle: Огляд граматики рівня А1 та підготовка до нових тем
focus: review
pedagogy: PPP
phase: 'A2.1 [Основи та вступ до виду дієслова]'
word_target: 2000
objectives:
- Учень може впевнено пригадати та використовувати називний, знахідний, місцевий та кличний відмінки для іменників та прикметників, вивчених на рівні А1.
- Учень може розпізнавати та передбачати типові чергування голосних (наприклад, о/і, е/і в закритих складах) та приголосних (г/з/ж, к/ц/ч) в основах іменників та дієслів.
- Учень може активно застосовувати базові правила милозвучності (у/в, і/й, з/зі/із), щоб його українська мова звучала природніше.
- Учень розуміє план навчання на рівні А2, зокрема ознайомлення з родовим, давальним та орудним відмінками.
dialogue_situations:
- setting: 'Прибуття до мовної школи в Києві в перший день курсу А2 — повторення вивченого: Я — студент (називний відмінок). Я вивчаю українську мову (знахідний відмінок). Я живу в Києві (місцевий відмінок). Привіт, Оксано! (кличний відмінок).'
  speakers:
  - Новий студент
  - Викладач
  motivation: 'Повторити всі відмінки рівня А1 у природній вступній розмові'
content_outline:
- section: Пригадуємо відмінки
  words: 600
  points:
  - 'Короткий огляд чотирьох відмінків рівня А1: називний (Хто? Що?), знахідний (Кого? Що?), місцевий (Де? На кому? На чому?) та кличний (звертання).'
  - 'Практичні вправи: визначення відмінка в реченнях та відмінювання знайомих пар іменників з прикметниками.'
  - 'Ознайомлення з повною картою системи відмінків: демонстрація всіх семи відмінків і виділення трьох нових для рівня А2 (родового, давального, орудного).'
- section: Магія української фонології
  words: 700
  points:
  - 'Повторення ключових чергувань голосних: о/і, е/і (наприклад, стіл/стола, Київ/Києва). Пояснення правила закритого складу.'
  - 'Повторення ключових чергувань приголосних: перша палаталізація (г/ж, к/ч, х/ш) та її вплив на форми іменників і дієслів (нога/ніжка, рука/ручка).'
  - 'Вступ до моделей наголошування: розпізнавання типових моделей та використання наголосу для розрізнення слів (наприклад, за́мок vs. замо́к).'
  - 'Асиміляція приголосних: дж і дз як єдині звуки (африкати), а не два окремі приголосні — джерело, дзвінок, бджола. Асиміляція за дзвінкістю перед дзвінкими приголосними: просьба → [проз''ба], боротьба → [бород''ба], вокзал → [воґзал].'
  - 'Рухомий наголос у парадигмах іменників: переміщення наголосу між основою та закінченням у різних відмінках — вода/воду, рука/руки, голова/голову, нога/ногу. Розпізнавання цієї моделі допомагає передбачити вимову нових іменників.'
- section: 'Милозвучність мови: евфонія'
  words: 400
  points:
  - 'Формалізація правил чергування у/в та і/й залежно від сусідніх звуків (голосний чи приголосний).'
  - 'Пояснення вживання з/зі/із перед складними збігами приголосних.'
  - 'Практика побудови плавних речень шляхом вибору правильної евфонічної частки.'
- section: Що нас чекає на рівні А2?
  words: 300
  points:
  - 'Чіткий план курсу А2: вступ до виду дієслова, засвоєння всіх семи відмінків іменників, моделі дієвідмінювання та дієслова руху.'
  - 'Формування очікувань: на рівні А2 учні починають висловлювати складніші думки та переходять від простих тверджень до розгорнутого мовлення.'
- section: Підсумок
  words: 200
  points:
  - 'Відмінки рівня А1 (називний, знахідний, місцевий, кличний) утворюють базу перед вивченням родового, давального та орудного відмінків. Самоперевірка: Який відмінок відповідає на питання "Де? На кому? На чому?" Провідміняйте свою улюблену пару іменника з прикметником у знахідному відмінку.'
  - 'Чергування голосних (о/і, е/і) відбуваються в закритих складах, а чергування приголосних (г/ж, к/ч) передбачувано змінюють основи іменників та дієслів. Самоперевірка: Чому "і" в слові "Київ" змінюється на "є" в "Києва"? Яка зменшувальна форма слова "рука"?'
  - 'Правила милозвучності (у/в, і/й, з/зі/із) та асиміляція приголосних (одзвінчення перед дзвінкими приголосними) створюють природну мелодику української мови. Самоперевірка: Як ви вимовляєте "вокзал"? Складіть коротке речення, що демонструє правильний вибір між "і" та "й".'
