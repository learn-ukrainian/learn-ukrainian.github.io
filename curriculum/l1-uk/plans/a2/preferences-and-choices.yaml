module: a2-059
level: A2
track: l1-uk
sequence: 59
slug: preferences-and-choices
version: '2.0.0'
title: Я обираю, я вважаю
subtitle: Висловлення вподобань, думок та вибору
focus: communication
pedagogy: TBL
phase: A2.8 [Удосконалення та випуск]
word_target: 2000
objectives:
- Учень вміє висловлювати вподобання, використовуючи порівняльні конструкції (Мені більше подобається... ніж...; Я волію...).
- Учень вміє висловлювати думки з обґрунтуванням, використовуючи складні речення (Я вважаю, що... тому що...; На мою думку...).
- Учень вміє ввічливо погоджуватися і не погоджуватися в дискусії (Ви маєте рацію, але...; Я не зовсім згоден/згодна...).
- Учень вміє брати участь у структурованому обміні думками на повсякденні теми (їжа, подорожі, хобі, життєві вибори).
dialogue_situations:
- setting: 'Дебати в книжковому клубі — порівняння двох романів: Мені більше подобається цей роман (m). На мою думку, авторка (f) пише краще. Я не згоден — ця повість (f) цікавіша!'
  speakers:
  - Члени книжкового клубу
  motivation: 'Думки: подобається, на мою думку, згоден/не згоден з роман (m), повість (f)'
content_outline:
- section: Що тобі більше подобається?
  words: 500
  points:
  - 'Висловлення вподобань за допомогою порівняння: Мені більше подобається кава, ніж чай. Я волію читати, а не дивитися телевізор. Краще поїхати влітку, ніж взимку.'
  - 'Ключові дієслова: подобатися, воліти, обирати, вирішити. Керування дієслів: подобатися + Дав., обирати + Знах.'
  - 'Діалог: двоє друзів обговорюють плани на вихідні — порівнюють варіанти, висловлюють свої вподобання і пояснюють їх.'
- section: На мою думку...
  words: 550
  points:
  - 'Фрази для висловлення думки: Я вважаю, що... На мою думку... Мені здається, що... Я переконаний/переконана, що...'
  - 'Наведення причин: тому що, бо, адже, оскільки.'
  - 'Практика складних речень: Я вважаю, що українська кухня дуже смачна, тому що вона використовує свіжі продукти.'
  - 'Регістри: вважаю (офіційно) проти думаю (нейтрально) проти мені здається (м''яко/невпевнено).'
- section: Згоден чи ні?
  words: 500
  points:
  - 'Згода: Так, я згоден/згодна. Ви маєте рацію. Безумовно! Саме так! Цілком погоджуюся.'
  - 'Ввічлива незгода: Я не зовсім згоден/згодна. Можливо, але... Я думаю інакше. Дозвольте не погодитися. Навпаки, я вважаю...'
  - 'Часткова згода: З одного боку... з іншого боку... Це правда, але...'
  - 'Діалог: дружня дискусія про те, в якому українському місті краще жити — кожен аргументує свій вибір, погоджується та не погоджується з іншим.'
- section: 'Обговорення: що краще?'
  words: 450
  points:
  - 'Сценарій на основі завдання: учні обговорюють життєві вибори, використовуючи всі інструменти цього модуля. Теми: життя в місті проти села, приготування їжі вдома проти походів у ресторан, літня відпустка проти зимової.'
  - 'Практика читання: гілка форуму, де українці обговорюють свої вподобання — автентичний інтернет-регістр із висловлюванням думок.'
  - 'Корисні слова-зв''язки для структурованих аргументів: по-перше, по-друге, крім того, на завершення.'
- section: Підсумок
  words: 200
  points:
  - 'Висловлення вподобань та думок використовує такі структури, як "Мені більше подобається... ніж...". Фрази для думок відрізняються за регістром: "вважаю" (офіційно), "думаю" (нейтрально), "мені здається" (невпевнено). Самоперевірка: Яка різниця між "вважаю" та "мені здається"? Висловіть своє вподобання між чаєм і кавою, використовуючи "ніж".'
  - 'Для ввічливої згоди та незгоди використовуються фрази на кшталт "Ви маєте рацію" (згода) та "Я не зовсім згоден/згодна" (незгода). Для структурування аргументів використовуються слова-зв''язки: по-перше, по-друге, тому що. Самоперевірка: Ввічливо не погодьтеся з твердженням "Зима краща за літо". Наведіть 2 причини для вашої думки, використовуючи "по-перше" та "по-друге".'
vocabulary_hints:
  required:
  - вважати — дієслово думки й оцінки
  - воліти — дієслово вподобання
  - обирати — дієслово вибору
  - думка — іменник для висловлення позиції
  - згоден — форма згоди, чол. р.
  - згодна — форма згоди, жін. р.
  - рація — у вислові "мати рацію"
  - тому що — сполучник причини
  - навпаки — слово для протиставлення
  - переконаний — форма впевненості, чол. р.
  recommended:
  - безумовно — підсилювальне слово згоди
  - інакше — прислівник відмінності
  - дозволити — дієслово дозволу
  - погоджуватися — дієслово згоди
  - по-перше — зв'язка для структурування думки
activity_hints:
- type: quiz
  focus: 'Вибрати відповідну фразу для думки залежно від офіційного чи неофіційного контексту'
  items: 8
- type: fill-in
  focus: 'Доповнити речення-думки правильними словами-зв''язками та порівняннями'
  items: 8
- type: match-up
  focus: 'Зіставити фрази згоди/незгоди з відповідними ситуаціями'
  items: 8
- type: error-correction
  focus: 'Знайти та виправити граматичні помилки в реченнях'
  items: 6
references:
- title: 'ULP: How to Express Opinions in Ukrainian'
