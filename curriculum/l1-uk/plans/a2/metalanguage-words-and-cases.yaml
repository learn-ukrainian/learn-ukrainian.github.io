version: '2.0.0'
title: Слова і відмінки
subtitle: Частини мови, відмінки та граматичні терміни українською
focus: bridge
pedagogy: Bridge
phase: 'A2.9 [Метамова: місток та основи]'
word_target: 2000
objectives:
- Студент вміє називати всі основні частини мови українською (іменник, прикметник, дієслово, займенник, числівник, прислівник, прийменник, сполучник) та визначати їх у реченнях.
- Студент вміє перелічити назви всіх семи українських відмінків разом із парами запитань (Називний — хто? що?, Родовий — кого? чого? тощо).
- Студент вміє використовувати українські терміни для позначення граматичного роду та числа (чоловічий, жіночий, середній рід; однина, множина).
- Студент вміє розуміти граматичні пояснення, надані повністю українською метамовою.
dialogue_situations:
- setting: 'Студент просить викладача визначити частину мови складного слова: Це прислівник чи прикметник? А "мій" — це займенник? Викладач пояснює на прикладах.'
  motivation: 'Класифікувати слова, запитувати про частини мови, розрізняти категорії'
  speakers:
