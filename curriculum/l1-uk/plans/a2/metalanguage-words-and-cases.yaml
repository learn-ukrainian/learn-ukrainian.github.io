  - займенник
  - частина мови
- setting: 'Студент тренується у визначенні відмінків із партнером: один читає речення, інший називає відмінок кожного іменника за допомогою методу запитань.'
  motivation: 'Визначати відмінки, застосовувати метод запитань, практикуватися в парі'
  speakers:
  - Студент 1
