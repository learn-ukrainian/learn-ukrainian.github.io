content_outline:
- section: 'Частини мови: що це за слово?'
  words: 600
  points:
  - 'Нове називання знайомих понять: студент уже використовує іменники, дієслова, прикметники — тепер він дізнається, як їх називають українські вчителі. Метод: уривки з підручників 3-4 класів, які демонструють, як українські діти вивчають ці терміни.'
  - 'Іменник — назва предмета: хто? що? — мама, стіл, радість. Прикметник — ознака предмета: який? яка? яке? — великий, гарна, синє. Дієслово — дія предмета: що робити? що зробити? — читати, написати.'
  - 'Займенник — замість іменника: хто? що? — я, ти, він, хтось. Числівник — кількість або порядок: скільки? який? — п''ять, третій.'
  - 'Прислівник — ознака дії: як? де? коли? — швидко, тут, завтра. Прийменник — зв''язок слів: у, на, з, до. Сполучник — з''єднує слова/речення: і, але, що, бо.'
- section: 'Сім відмінків: питання та назви'
  words: 550
  points:
  - 'Повна система відмінків з українськими назвами та запитаннями: Називний — хто? що? Родовий — кого? чого? Давальний — кому? чому? Знахідний — кого? що? Орудний — ким? чим? Місцевий — на кому? на чому? Кличний — пряме звертання.'
  - 'Мнемонічна стратегія: українські школярі вчать фразу "Не Роби Дурниць, Знай, Орудуй Місцем, Кличний!" — або ж студент може придумати власну.'
  - 'Практика: маючи речення, визначити, у якому відмінку стоїть кожен іменник, використовуючи метод запитань (задати питання).'
  - 'Уривок із підручника для 3-4 класів: як українські вчителі пояснюють систему відмінків своїм учням, зі спрощеними прикладами.'
- section: 'Рід і число: чоловічий, жіночий, середній'
  words: 450
  points:
  - 'Три роди: чоловічий рід, жіночий рід, середній рід. Як визначити рід за закінченням: приголосний → ч.р., -а/-я → ж.р., -о/-е → с.р.'
  - 'Два числа: однина, множина. Як цьому навчають у підручниках: Один — однина. Багато — множина.'
  - 'Поєднання термінів: повний опис слова — іменник, жіночий рід, множина, родовий відмінок (наприклад, книг = noun, feminine, plural, genitive).'
  - 'Практика: надати повний граматичний опис українськими термінами для 10 слів із попередніх модулів.'
- section: Читаємо граматику українською
  words: 400
  points:
  - 'Вправа на читання: сторінка з підручника для 4 класу, де просте граматичне правило пояснюється повністю українською мовою. Студент відповідає на запитання для перевірки розуміння правила.'
  - 'Формування впевненості: студент усвідомлює, що вже може розуміти пояснення української граматики. Це місток до рівня B1, де граматика все частіше викладатиметься українською.'
  - 'Коротка довідкова картка: усі терміни, введені в цьому модулі, організовані як навчальний посібник, до якого студент може повертатися.'
- section: Підсумок
  words: 200
  points:
  - 'Українська граматична метамова охоплює частини мови (іменник, прикметник, дієслово тощо) та основні атрибути, такі як рід і число. Самоперевірка: Яка різниця між одниною та множиною? Назвіть 3 частини мови українською.'
  - 'Сім відмінків розпізнаються за допомогою пар запитань, починаючи з Називного (хто? що?) та Родового (кого? чого?). Самоперевірка: Чи можете ви перелічити всі 7 відмінків по порядку з їхніми запитаннями? Опишіть слово "книг", використовуючи повну українську граматичну термінологію.'
