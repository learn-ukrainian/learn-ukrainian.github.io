module: a2-015
level: A2
track: l1-uk
sequence: 15
slug: shopping-and-health
version: '2.0.0'
title: На ринку та у лікаря
subtitle: Родовий відмінок у реальних ситуаціях — покупки та здоров'я
focus: communication
pedagogy: TBL
phase: 'A2.2 [Родовий відмінок повністю]'
word_target: 2000
objectives:
- Вміти просити певну кількість продуктів на ринку, використовуючи родовий відмінок (кілограм яблук, пів кіло сиру, пляшка води).
- Навчитися описувати симптоми та скарги на здоров'я за допомогою конструкцій родового відмінка (немає температури, болить від холоду, ліки від кашлю).
- Опанувати участь у природному діалозі під час покупок, включаючи питання про ціни, кількість та вподобання.
- Вміти брати участь у базовому діалозі на прийомі у лікаря, включаючи опис симптомів та розуміння простих вказівок.
dialogue_situations:
- setting: 'На київському ринку — купуємо продукти: Дайте мені кілограм помідорів і півкіло огірків. Потім у лікаря: У мене болить горло. Потім в аптеці: Мені потрібні краплі.'
  speakers:
  - Покупець
  - Пацієнт
  - Продавець
  - Лікар
  - Фармацевт
  motivation: 'Три реальні ситуації: помідор(m), огірок(m), горло(n), краплі(pl)'
content_outline:
- section: 'На ринку: скільки вам?'
  words: 750
  points:
  - 'Кількість + родовий відмінок: кілограм яблук, пів кіло помідорів, літр молока, пляшка води, пачка масла, десяток яєць.'
  - 'Природний діалог на ринку: привітання з продавцем, запитання про те, що сьогодні свіже, запит на кількість, запитання про ціну, оплата. На основі реальних ситуацій на ринку — продавець пропонує скуштувати, радить альтернативи.'
  - 'Родовий відмінок після слів-мір: склянка соку, шматок хліба, банка меду. Практика з партитивним родовим відмінком.'
  - 'Вираження ціни: скільки коштує кілограм? по скільки? — дорого/дешево/нормально.'
  - 'Ввічливі форми: Дайте, будь ласка... Чи є у вас...? Мені, будь ласка...'
- section: 'У лікаря: що вас турбує?'
  words: 700
  points:
  - 'Запитання лікаря: Що вас турбує? Як давно? Чи є температура? Чи є алергія на ліки?'
  - 'Відповіді пацієнта з родовим відмінком: немає температури, немає апетиту, немає сил. А також: болить від холоду, кашель від алергії.'
  - 'Ліки та рецепти: ліки від кашлю, краплі від нежиті, таблетки від головного болю. Родовий відмінок після «від» для позначення засобу проти хвороби.'
  - 'Природний діалог: прихід, опис самопочуття, уточнюючі запитання лікаря, отримання порад (пийте багато води, відпочивайте).'
- section: В аптеці та повсякденне здоров'я
  words: 550
  points:
  - 'Діалог в аптеці: прохання дати конкретні ліки, запит на пораду (Що ви порадите від...?), розуміння рекомендацій фармацевта.'
  - 'Лексика про здоров''я з родовим відмінком: для здоров''я, без рецепта, після їжі.'
  - 'Повсякденні фрази про здоров''я: дбати про здоров''я, багато води, мало цукру, без кофеїну. Зв''язок лексики про дієту та здоров''я з конструкціями родового відмінка.'
  - 'Закріплення: обидва сценарії (ринок + здоров''я) використовують однакові моделі родового відмінка — кількість (кілограм яблук / багато води), відсутність (немає / без), джерело/причина (від кашлю / з ринку).'
- section: Підсумок
  words: 200
  points:
  - 'Опануйте вираження кількості за допомогою родового відмінка на ринку, наприклад «кілограм яблук», «пів кіло сиру» та «пляшка води». Це включає практику природного діалогу для запитань про свіжість продуктів, прохань про конкретну кількість та запитань про ціни. Самоперевірка: Як ви попросите "десяток яєць" і запитаєте "скільки це коштує" українською?'
  - 'Навчіться описувати симптоми та скарги на здоров''я за допомогою родового відмінка. Ключові моделі включають заперечення, наприклад «немає температури» або «немає апетиту», а також вказування причини фразами на кшталт «болить від холоду» або «кашель від алергії». Крім того, попрактикуйте спілкування в аптеці, запитуючи ліки («Що ви порадите від...?»). Самоперевірка: Як сказати лікареві "у мене немає сил" або попросити "щось від головного болю" українською?'
