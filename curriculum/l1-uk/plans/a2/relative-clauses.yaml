module: a2-049
level: A2
track: l1-uk
sequence: 49
slug: relative-clauses
version: '2.0.0'
title: Той, який...
subtitle: Означальні підрядні речення з який, де, куди, звідки
focus: grammar
pedagogy: PPP
phase: 'A2.7 [Складні речення та умовні конструкції]'
word_target: 2000
objectives:
- Вміти утворювати означальні підрядні речення за допомогою який/яка/яке/які, узгоджуючи їх у роді та числі з іменником, який вони описують.
- Навчитися використовувати де, куди та звідки як сполучні слова для опису місця в підрядних реченнях.
- Розрізняти «який» у питаннях (Який це будинок?) та «який» в означальних підрядних реченнях (Будинок, який стоїть на розі...).
- Вміти будувати природні речення з підрядними означальними для опису людей, предметів та місць.
dialogue_situations:
- setting: 'Агент з нерухомості показує квартири — опис характеристик: Це квартира (f), яка має балкон (m). Ось кімната (f), де можна працювати. Сусід (m), який живе поруч, дуже тихий.'
  speakers:
  - Ріелтор
  - Покупець
  motivation: 'Який/яка/яке, де, куди з квартира(f), балкон(m), кімната(f)'
content_outline:
- section: Який? Яка? Яке? Які?
  words: 750
  points:
  - 'Вступ до означальних підрядних речень: речення, що описує іменник у головній частині. Відносний займенник «який» узгоджується з іменником, якого він стосується, у роді та числі.'
  - 'Узгодження в роді та числі: Книжка, яка лежить на столі... Хлопець, який прийшов вчора... Місто, яке я люблю... Друзі, які живуть у Києві...'
  - 'Відмінок слова «який»: він набуває відмінка, який вимагається його роллю в підрядному реченні, а не в головному. Людина, яку я зустрів (Зн. в.) порівняно з Людина, яка мене зустріла (Наз. в.). На рівні А2 фокус на називному та знахідному відмінках.'
  - 'Розділові знаки: кома завжди ставиться перед який/яка/яке/які на початку означального підрядного речення.'
  - 'Контраст із питаннями: Який це фільм? (питання) порівняно з Фільм, який ми дивилися вчора, був цікавий (означальне підрядне речення). Одне й те саме слово, різна функція.'
- section: Де, куди, звідки — місце
  words: 600
  points:
  - 'Використання «де» як сполучного слова для місць: Кафе, де ми зустрілися, було затишне. Місто, де я народився, знаходиться на заході.'
  - 'Використання «куди» для напрямку: Парк, куди ми ходимо гуляти, дуже гарний.'
  - 'Використання «звідки» для походження: Країна, звідки вона приїхала, — це Україна.'
  - 'Коли використовувати «де» замість «який»: Будинок, де живе мій друг = Будинок, в якому живе мій друг. На рівні А2 «де» є простішим і природнішим для місць.'
- section: Описуємо людей, речі та місця
  words: 650
  points:
  - 'Побудова довших описів шляхом поєднання означальних підрядних речень із раніше вивченою граматикою: Подруга, яка живе у Львові, працює вчителькою. Ресторан, де ми вчора вечеряли, знаходиться біля парку.'
  - 'Уникнення типових помилок: зайвий займенник (Книжка, яка вона цікава = НЕПРАВИЛЬНО), неправильне узгодження в роді (Хлопець, яке = НЕПРАВИЛЬНО), пропущена кома.'
  - 'Природне нагромадження інформації: замість багатьох коротких речень (Це мій друг. Він живе у Києві. Він працює програмістом.), поєднайте їх за допомогою «який»: Це мій друг, який живе у Києві і працює програмістом.'
  - 'Практичне використання: опишіть ваше улюблене місце, людину, якою ви захоплюєтеся, предмет, яким ви щодня користуєтеся, — використовуючи означальні підрядні речення.'
  - 'Інтонація означальних речень: головне речення починається з нейтральною інтонацією, потім підрядне речення (який/яка/яке, де, куди) вимовляється трохи нижчим тоном як вставна конструкція, після чого речення повертається до нормального тону або спадає в кінці. Пауза з комою перед «який» сигналізує слухачеві про очікування описового доповнення.'
- section: Підсумок
  words: 200
  points:
  - 'Означальні підрядні речення використовують який/яка/яке/які (узгоджуючись у роді та числі з іменником) або де/куди/звідки для місць. Завжди ставте кому перед сполучним словом: чоловік, який читає; місто, де я живу.'
  - 'Самоперевірка: Яка різниця між «Який це фільм?» та «Фільм, який ми дивилися»? Природно поєднайте ці два речення: «Це моя подруга. Вона працює вчителькою.» Опишіть ваше улюблене місце, використовуючи означальне підрядне речення з «де».'
