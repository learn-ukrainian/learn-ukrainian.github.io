module: a2-052
level: A2
sequence: 52
slug: education-and-work
track: l1-uk
version: '2.0.0'
title: Навчання і робота
subtitle: Складні речення в академічному та професійному контексті
focus: communication
pedagogy: TBL
phase: A2.7 [Складні речення та умовний спосіб]
word_target: 2000
objectives:
- Вміти розповідати про свою освіту та досвід роботи, використовуючи складні речення (тому що, щоб, який, якщо).
- Вміти пояснювати мотивацію до навчання чи роботи, використовуючи підрядні речення мети (Я вивчаю українську, щоб працювати в Україні).
- Вміти описувати робоче місце чи навчальний заклад за допомогою підрядних означальних речень (Університет, де я навчаюся... / Компанія, в якій я працюю...).
- Вміти обговорювати плани та умови, пов'язані з освітою і кар'єрою, використовуючи реальні умовні речення (Якщо я складу іспит, то вступлю до університету).
dialogue_situations:
- setting: 'Консультація щодо кар''єри в університеті — Що ви вивчаєте? Право. Ким хочете стати? Адвокатом. Де хочете працювати? В юридичній фірмі.'
  speakers:
  - Консультант
  - Студент
  motivation: 'Освіта та кар''єра: право(n), адвокат(m), фірма(f)'
content_outline:
- section: 'Про освіту: школа та університет'
  words: 700
  points:
  - 'Розповідь про свій освітній шлях: Я закінчив школу у 2015 році. Потім я вступив до університету, тому що хотів стати інженером.'
  - 'Опис школи/університету за допомогою підрядних означальних речень: Університет, де я навчався, знаходиться у Львові. Предмет, який мені найбільше подобався, — це історія.'
  - 'Мета навчання: Я вчуся, щоб отримати диплом. Вона поїхала за кордон, щоб вивчити нову спеціальність.'
  - 'Українська освітня лексика: школа, гімназія, ліцей, університет, інститут, факультет, спеціальність, диплом, іспит, залік, предмет, курс.'
  - 'Природний діалог: двоє нових знайомих розпитують одне одного про освіту — Де ти навчався? Яку спеціальність обрав? Чому саме цю?'
- section: 'Про роботу: ким ви працюєте?'
  words: 700
  points:
  - 'Опис роботи та робочого місця: Я працюю програмістом у компанії, яка розробляє додатки. Моя колега, яка сидить поруч, допомагає мені з проєктами.'
  - 'Пояснення вибору професії: Я став вчителем, тому що люблю працювати з дітьми. Хоча робота важка, вона дає задоволення.'
  - 'Умови роботи зі сполучником якщо: Якщо я добре працюю, то отримую премію. Якщо є вільний час, я ходжу на курси.'
  - 'Поширена робоча лексика: робота, посада, компанія, офіс, колега, зарплата, графік, завдання, проєкт, керівник, співбесіда.'
  - 'Природний діалог: на вечірці хтось питає, чим ви займаєтесь — Ким ви працюєте? Вам подобається ваша робота? Що ви робите на роботі?'
- section: Плани на майбутнє
  words: 600
  points:
  - 'Обговорення цілей у кар''єрі та освіті: Якщо я складу іспит, то вступлю до магістратури. Я хочу змінити роботу, щоб мати більше вільного часу.'
  - 'Надання та отримання порад щодо кар''єри за допомогою умовних речень: Якщо хочеш знайти кращу роботу, вивчай нову мову. Якщо тобі не подобається робота, шукай іншу.'
  - 'Допустові речення про роботу/навчання: Хоча я ще студент, я вже працюю на частковий робочий день. Хоча зарплата невелика, робота цікава.'
  - 'Закріплювальний діалог: розмова про планування кар''єри або співбесіда, де студент природно використовує всі типи складних речень — причини, мети, означальні, умовні, допустові.'
- section: Підсумок
  words: 200
  points:
  - "Складні речення необхідні для професійних тем. Причина: я працюю, тому що... Мета: я вчуся, щоб... Умова: якщо я складу іспит, то... Самоперевірка: Як сказати «I study Ukrainian to work in Ukraine»? (Я вивчаю українську, щоб працювати в Україні)."
  - "Підрядні означальні речення пов'язують деталі вашого досвіду: університет, де я навчався; компанія, яка розробляє додатки. Самоперевірка: Опишіть вашу поточну роботу або навчання, використовуючи 3 нових слова (наприклад, спеціальність, посада, колега). У чому різниця між «тому що» та «щоб»?"
