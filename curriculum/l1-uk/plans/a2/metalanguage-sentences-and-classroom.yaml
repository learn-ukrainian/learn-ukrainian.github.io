content_outline:
- section: 'Члени речення: хто що робить?'
  words: 550
  points:
  - 'Нова термінологія за підручниками 3-4 класів: українські школярі вивчають розбір речення, ставлячи запитання. Підмет — хто? що? — підкреслюється однією рискою. Присудок — що робить? що зробив? — підкреслюється двома рисками.'
  - 'Другорядні члени речення: Додаток — кого? що? кому? чим? — відповідає на питання непрямих відмінків. Означення — який? яка? яке? чий? — описує іменник. Обставина — де? коли? як? куди? — описує дію.'
  - 'Практика: проаналізувати 5-6 простих речень, визначаючи підмет, присудок та інші члени речення. Формат підручника для 4 класу: малювати стрілки та підкреслювати.'
  - 'Просте і складне речення: просте речення (один підмет + присудок) і складне речення (дві або більше пар).'
- section: 'Будова слова: корінь, префікс, суфікс'
  words: 500
  points:
  - 'Корінь — основне значення: ліс → лісок, лісовий, лісник, пролісок. Усі вони мають спільний корінь ліс-. Споріднені слова мають спільний корінь.'
  - 'Префікс — стоїть перед коренем, змінює значення: ходити → виходити, заходити, приходити, переходити. Кожен префікс додає новий напрямок або відтінок.'
  - 'Суфікс — стоїть після кореня, змінює частину мови або додає значення: ліс → лісок (зменшувальне), лісовий (прикметник), лісник (особа). Зв''язок із суфіксами здрібнілості з модуля M52.'
  - 'Закінчення — граматична частина, що змінюється за відмінком, родом, числом: книга, книги, книзі, книгу, книгою. Основа = усе, крім закінчення.'
  - 'Практика: розібрати 8-10 слів на морфеми за схемою корінь-префікс-суфікс-закінчення.'
- section: 'Мова класу: накази вчителя'
  words: 550
  points:
  - 'Основні наказові форми, які студент зустріне під час україномовного навчання на рівні B1+: Прочитайте, Запишіть, Виберіть, Підкресліть, Вставте, Дайте відповідь, Знайдіть, Визначте, Порівняйте, Доповніть.'
  - 'Це форми ввічливого наказового способу (на "ви"). Зв''язок із наказовим способом із модуля M56. Утворення: основа + -іть/-йте.'
  - 'Поширені інструкції до вправ: Вставте пропущені букви. Підкресліть підмет і присудок. Визначте відмінок іменника.'
  - 'Практика: прочитати 5-6 українських інструкцій та виконати вправу. Це імітує реальну роботу в українському класі.'
- section: 'Усе разом: аналізуємо текст'
  words: 400
  points:
  - 'Комплексна вправа: короткий український текст (6-8 речень). Студент визначає частини мови, члени речення та розбирає вибрані слова на морфеми (будова слова).'
  - 'Читання: сторінка з підручника для 4 класу — студент виконує завдання так, як це робив би український школяр, дотримуючись інструкцій українською мовою.'
  - 'Самооцінювання: Чи розумію я граматичні інструкції українською? Чи готовий я до рівня B1, де більше матеріалу буде українською?'
- section: Підсумок
  words: 200
  points:
  - 'Члени речення відповідають на конкретні запитання: підмет (хто? що?) і присудок (що робить?). Будова слова розкладає слова на корінь, префікс, суфікс і закінчення. Самоперевірка: У чому різниця між коренем та основою? Розберіть слово "виходити" на морфеми.'
  - 'Мова класу спирається на ввічливі форми наказового способу (на "ви") для надання інструкцій: Прочитайте, Запишіть, Вставте і Підкресліть. Самоперевірка: Як сказати "Underline the subject and predicate" українською? Перекладіть 3 поширені інструкції з підручника (наприклад, "Визначте відмінок іменника").'
