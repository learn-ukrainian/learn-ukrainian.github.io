- setting: 'Двоє студентів разом виконують вправу з українського підручника — читають інструкції українською та допомагають одне одному з морфемним аналізом.'
  motivation: 'Виконувати інструкції українською, співпрацювати з одногрупниками, аналізувати будову слова'
