title: Речення і клас
subtitle: Синтаксичні терміни, будова слова та мова класу
focus: bridge
pedagogy: Bridge
phase: 'A2.9 [Метамова: місток та основи]'
word_target: 2000
objectives:
- Студент вміє називати та розпізнавати члени речення українською мовою (підмет, присудок, додаток, означення, обставина) у простих реченнях.
- Студент вміє розпізнавати частини слова, використовуючи українські терміни (корінь, префікс, суфікс, закінчення), та розбирати слова на морфеми.
- Студент вміє розуміти вказівки вчителя та реагувати на них українською мовою (Прочитайте, Запишіть, Виберіть, Підкресліть, Вставте, Дайте відповідь).
- Студент вміє виконувати граматичні вправи за україномовним форматом, готуючись до навчання методом занурення на рівні B1.
dialogue_situations:
