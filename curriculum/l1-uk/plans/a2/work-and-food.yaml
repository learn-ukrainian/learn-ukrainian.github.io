module: a2-030
level: A2
sequence: 30
slug: work-and-food
track: l1-uk
version: '2.0.0'
title: Професії та кулінарія
subtitle: Застосування орудного відмінка у розмовах про роботу та приготування їжі
focus: communication
pedagogy: TBL
phase: A2.4 [Орудний відмінок]
word_target: 2000
objectives:
- Вміти вести природну розмову про професії, використовуючи конструкції з орудним відмінком (Ким ти працюєш? Чим ти захоплюєшся?).
- Вміти описувати рецепт або процес приготування їжі, використовуючи орудний відмінок для знарядь (різати ножем) та інгредієнтів (салат з помідорами).
- Вміти поєднувати всі функції орудного відмінка (спільність, знаряддя, професія, просторове відношення) в одній розгорнутій розмові.
- Вміти використовувати іменникові словосполучення в орудному відмінку з прикметниками та займенниками в комунікативних контекстах.
dialogue_situations:
- setting: 'Співбесіда в ресторані: розмова про досвід і приготування тестової страви: Ким ви працювали? Кухарем. Що ви вмієте готувати? Борщ з яловичиною, вареники з картоплею.'
  speakers:
  - Шеф-кухар
  - Кандидат
  motivation: 'Професії + кулінарія: кухар → кухарем, з яловичиною, з картоплею'
content_outline:
- section: Розмова про професії
  words: 550
  points:
  - 'Сценарій завдання: Ви знайомитеся з кимось на вечірці. Розпитайте про професію цієї людини, її інтереси та захоплення.'
  - 'Ключові ланцюжки запитань: Хто ти за фахом? → Я працюю програмістом. Чим ти захоплюєшся? → Захоплююся фотографією. Ким ти хотів/хотіла стати в дитинстві? → Я мріяв/мріяла стати лікарем.'
  - 'Розширений діалог: двоє людей на вечірці — один кухар, інший вчитель. Вони обговорюють свою роботу, що їм у ній подобається і чим вони займаються у вільний час.'
  - 'Корисні шаблони відповідей: Я працюю... (орудний відмінок). Мені подобається бути... (орудний відмінок). Я цікавлюся... (орудний відмінок).'
- section: 'На кухні: готуємо разом'
  words: 550
  points:
  - 'Сценарій завдання: Опишіть, як приготувати просту українську страву (наприклад, вареники з картоплею, салат з овочами, бутерброд з маслом і сиром).'
  - 'Орудний відмінок знаряддя: різати ножем, мішати ложкою, смажити на сковорідці (місцевий відмінок — для порівняння!), посипати сіллю, поливати олією.'
  - 'Орудний відмінок інгредієнта з прийменником з: борщ зі сметаною, вареники з картоплею, салат з помідорами і огірками, чай з медом.'
  - 'Діалог: двоє друзів готують разом — один читає рецепт, інший ставить запитання (Чим мішати? Що різати? З чим подавати?).'
- section: Мій робочий день
  words: 500
  points:
  - 'Завдання: Опишіть повний робочий день, використовуючи всі функції орудного відмінка — Вранці я їду на роботу автобусом. Працюю за комп''ютером (орудний відмінок — знаряддя). Обідаю з колегами (спільність). Перед обідом маю нараду.'
  - 'Поєднання прийменників: перед роботою, між нарадами, за розкладом, з моїм начальником.'
  - 'Діалог: монолог у стилі відеоблогу, де людина описує свій типовий день, природно використовуючи всі конструкції з орудним відмінком.'
  - 'Повторення просторових відношень: Мій офіс між кафе і аптекою. Парковка за будинком. Над моїм столом висить картина.'
- section: 'Практика: розкажи про себе'
  words: 400
  points:
  - 'Комплексне завдання: Напишіть 8-10 речень про себе — вашу професію, інтереси, розпорядок дня, улюблену їжу — використовуючи якомога більше конструкцій з орудним відмінком.'
  - 'Самоперевірка: визначте, яка функція орудного відмінка використовується в кожному реченні (спільність, знаряддя, професія, просторове, часове відношення).'
  - 'Симуляція діалогу з партнером: Проведіть повноцінну розмову для знайомства, яка охоплює роботу, хобі, кулінарні вподобання та розпорядок дня.'
- section: Підсумок
  words: 200
  points:
  - 'Орудний відмінок виражає професії (працюю програмістом), інтереси (захоплююся фотографією), знаряддя (різати ножем), спільність/інгредієнти (з колегами, салат з помідорами) та просторові/часові відношення (перед обідом, між кафе і аптекою).'
  - 'Самоперевірка: Як розпитати когось про професію та хобі? (Ким ти працюєш? Чим ти захоплюєшся?) Опишіть свій типовий робочий день, використовуючи принаймні 3 різні функції орудного відмінка.'
  - 'Яка різниця між ''мішати ложкою'' (знаряддя) та ''борщ зі сметаною'' (супровідний об''єкт)? Опишіть, як приготувати просту страву, використовуючи принаймні 2 інгредієнти та 1 знаряддя.'
