slug: dozvillia-i-khobi
track: l1-uk
version: '2.0.0'
title: Чим ти захоплюєшся? Дозвілля та хобі
subtitle: Вільний час, спорт, розваги та плани на вихідні — з відмінками
focus: communication
pedagogy: PPP
phase: A2.5 [Синтез відмінків та множина]
word_target: 2000
objectives:
- Вміти розповідати про хобі та заняття у вільний час, використовуючи захоплюватися + орудний відмінок і займатися + орудний відмінок.
- Вміти описувати розваги з використанням відповідних форм відмінків — знахідного для напрямку (йти на виставку) та місцевого для розташування (бути на виставці).
- Вміти планувати дозвілля, використовуючи майбутній час та фрази для запрошення (Ходімо в кіно! Може, підемо на прогулянку?).
- Вміти обговорювати вподобання та регулярність занять (Я часто плаваю. Іноді ходжу в театр. Рідко дивлюся телевізор.).
dialogue_situations:
- setting: 'Двоє колег за обідом обговорюють плани на вихідні: Що робитимеш на вихідних? — Я захоплююся плаванням, тож піду в басейн у суботу. А в неділю — на виставку з подругою. А ти? — Може, пограю у футбол. Ходімо разом у парк!'
  speakers:
  - Колега 1
  - Колега 2
  motivation: 'Хобі з орудним відмінком (плаванням), напрямок зі знахідним відмінком (у басейн, на виставку), місце з місцевим відмінком (у парку)'
- setting: 'На зустрічі для мовного обміну — знайомство та розповідь про інтереси: Привіт, я Софія. Я займаюся малюванням і люблю ходити в театр. А ти чим захоплюєшся? — Я люблю музику й спорт. Граю на гітарі та бігаю щоранку.'
  speakers:
  - Софія
  - Новий знайомий
  motivation: 'Розповідь про себе через хобі: займатися + орудний відмінок (малюванням), грати на + місцевий відмінок (гітарі), сталі вирази'
content_outline:
- section: Хобі та вподобання
  words: 550
  points:
  - 'Ключові дієслова: захоплюватися + орудний відмінок, займатися + орудний відмінок, любити + інфінітив, цікавитися + орудний відмінок.'
  - 'Словник хобі: плавання, малювання, читання, танці, фотографія, кулінарія, садівництво, програмування, вишивання.'
  - 'Спорт: футбол, баскетбол, теніс, волейбол, біг, плавання, йога. Грати в/у + знахідний відмінок (грати у футбол). Займатися + орудний відмінок (займатися йогою).'
  - 'Вираження частоти дії: завжди, часто, іноді, рідко, ніколи. Щодня, щовихідних, раз на тиждень.'
- section: Куди йдемо? Де ми?
  words: 550
  points:
  - 'Практика відмінків через тему дозвілля: напрямок = знахідний відмінок (йти в кіно, на виставку, у басейн, на стадіон). Місцезнаходження = місцевий відмінок (бути в кіно, на виставці, у басейні, на стадіоні).'
  - 'Дієслова руху в контексті дозвілля: ходити (регулярно), піти (одноразово, док. вид), йти (зараз). Ходити в театр проти Піду в театр (I''ll go to the theater).'
  - 'Тренувальні пари: Ми йдемо на прогулянку → Ми на прогулянці. Вона їде на змагання → Вона на змаганні.'
  - 'Місця для розваг: кіно/кінотеатр, театр, музей, стадіон, басейн, парк, виставка, концерт.'
- section: Плани на вихідні
  words: 550
  points:
  - 'Як запропонувати: Ходімо в кіно! Може, підемо на прогулянку? Хочеш піти на концерт? Давай пограємо в теніс!'
  - 'Згода: З задоволенням! Чудова ідея! Так, давай! Я — за!'
  - 'Ввічлива відмова: На жаль, не можу. Я зайнятий/зайнята. Може, іншим разом? У мене вже є плани.'
  - 'Обговорення часу: О котрій? — О п''ятій. Де зустрінемося? — Біля входу. Як дістатися? — Метро до станції Хрещатик.'
  - 'Практика: планування повноцінного вихідного дня з другом — вибір заняття, домовленість про час і місце.'
- section: Що мені подобається найбільше
  words: 350
  points:
  - 'Вираження вподобань: мені подобається, мені найбільше подобається, я обожнюю, мені не подобається.'
  - 'Комбінування: Я захоплююся малюванням, але найбільше люблю ходити в гори. У вільний час я зазвичай читаю або граю на гітарі.'
  - 'Культурна нотатка: популярне дозвілля українців — поїздки в Карпати, відвідування замків, участь у фольклорних фестивалях, збирання ягід, збирання грибів.'
- section: Підсумок
  words: 200
  points:
  - 'Хобі вимагають певних відмінків: використовуйте орудний відмінок після захоплюватися і займатися (захоплюватися малюванням, займатися йогою), але в/у + знахідний відмінок після грати (грати у футбол). Самоперевірка: Як сказати «I am interested in photography» та «I play tennis»? Перелічіть 3 своїх хобі, використовуючи ці дієслова.'
  - 'Для вказування напрямку використовується знахідний відмінок (йти на виставку, в басейн), а для статичного місця — місцевий відмінок (бути на виставці, у басейні). Самоперевірка: У чому різниця між «Ми йдемо в кіно» та «Ми в кіно»? Запросіть друга до театру і запропонуйте час зустрічі.'
vocabulary_hints:
  required:
  - дозвілля — вільний час
  - хобі — улюблене заняття
  - захоплюватися — дуже любити певне заняття
  - займатися — регулярно робити щось
  - спорт — фізична активність
  - розвага — приємне заняття для відпочинку
  - вільний — не зайнятий справами
  - плавання — рух у воді
  - музика — мистецтво звуків
  - виставка — показ творів
  recommended:
  - вподобання — те, що подобається
  - прогулянка — ходьба для відпочинку
  - змагання — спортивне суперництво
  - малювання — створення зображень
  - кіно — перегляд фільмів
activity_hints:
- type: fill-in
  focus: Доповнити речення про хобі правильною формою відмінка (Я захоплююся ___ (плавання). Ми йдемо в/на ___)
  items: 8
- type: quiz
  focus: Обрати знахідний відмінок (рух до) або місцевий (перебування в) для місць відпочинку
  items: 8
- type: match-up
  focus: Зіставити дієслова, пов'язані з хобі, з їхнім правильним керуванням (захоплюватися + оруд. відм., грати в + знах. відм., ходити на + знах. відм.)
  items: 8
- type: group-sort
  focus: Відсортувати види дозвілля за категоріями (спорт, мистецтво, на природі, у місті)
  items: 8
- type: error-correction
  focus: 'Виправити помилки у відмінках у реченнях про дозвілля (наприклад, *захоплююся плавання → плаванням, *ходжу в кіно → потрібен місцевий відмінок? Ні — знахідний правильний для напрямку)'
  items: 6
