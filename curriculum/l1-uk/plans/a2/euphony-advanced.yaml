module: a2-012
level: A2
track: l1-uk
sequence: 12
slug: euphony-advanced
version: '2.0.0'
title: Милозвучність у складних контекстах
subtitle: Розширені правила у/в, з/із/зі та і/й у складних реченнях
focus: grammar
pedagogy: PPP
phase: A2.2 [Повний родовий відмінок]
word_target: 2000
objectives:
- Вміти правильно застосовувати чергування у/в у складних контекстах — після прийменників, на межі фраз і з відмінковими формами (у школі проти в університеті).
- Вміти застосовувати правила для з/із/зі при збігу приголосних та з відмінковими формами (з друзями, із задоволенням, зі школи, зі мною).
- Вміти застосовувати правила для і/й у складносурядних і складнопідрядних реченнях, зокрема після слів, що закінчуються на голосний, та перед збігом приголосних.
- Вміти без вагань будувати природні милозвучні речення, що складаються з кількох частин.
dialogue_situations:
- setting: 'Друзі планують поїздку на вихідні — домовляються, куди поїхати і як дістатися: Поїдемо в Карпати чи у Львів? — У Львів! Із задоволенням! Я поїду з Оленою й Тарасом. А ви зі Львова повернетесь у неділю?'
  speakers:
  - Оленка
  - Тарас
  motivation: 'Природне планування поїздки залучає всі три типи милозвучності: у/в з назвами місць, з/із/зі з людьми, і/й для зв''язку частин речення'
content_outline:
- section: У чи в? Складні випадки
  words: 600
  points:
  - 'Повторення базового правила рівня A1: у після приголосних, в після голосних. Тепер розглядаємо винятки та складні контексти.'
  - 'На початку речення або частини складного речення: В Україні зима холодна (початок речення дозволяє в перед голосними). Після коми або тире — новий фонетичний контекст скидає правило.'
  - 'З відмінковими формами: у школі, в університеті, у місті, в Одесі. Вибір залежить від сусідніх звуків, а не від самого прийменника.'
  - 'Префіксальні дієслова на у-/в-: увійти/ввійти — існують обидва варіанти, вибір залежить від останнього звука попереднього слова. Увечері прийшов / Він увійшов.'
  - 'Поширені помилки: *в вікно (в перед в) → у вікно, *у університеті (у перед у) → в університеті.'
- section: З, із чи зі? Правила перед збігами приголосних
  words: 600
  points:
  - 'Базове правило: з є формою за замовчуванням. Із вживається перед складними початковими збігами приголосних (із задоволенням, із сміхом). Зі вживається перед з-, с-, ш-, щ- та складними збігами (зі школи, зі мною, зі снігу).'
  - 'З відмінковими формами та займенниками: з ним, з нею, з нами, зі мною (збіг мн-). З Києва, зі Львова (збіг Льв-).'
  - 'Контекст родового відмінка (поточний фокус A2.2): з родини, із сім''ї, зі школи. Контекст прийменників родового відмінка робить практику милозвучності природною.'
  - 'Поширені помилки: *з школи → зі школи, *з мною → зі мною, *зі ним → з ним (після зі збігу приголосних немає).'
- section: І чи й? У складних реченнях
  words: 500
  points:
  - 'Повторення: й після голосних (мама й тато), і після приголосних (брат і сестра). Тепер у складнопідрядних та складносурядних реченнях.'
  - 'Після меж частин речення: кома скидає фонетичний контекст. Він прийшов, і ми поїхали (і після коми, нова частина речення). Вона заспівала, й усі заплакали (й тому що усі починається на голосний? Ні — після коми формою за замовчуванням завжди є і, вона є найбільш безпечною).'
  - 'З однорідними підметами та додатками: хліб і масло, кава й молоко. Застосовуйте правило до кожної пари окремо.'
  - 'Особливе: та як синонім до і — та ніколи не чергується, завжди залишається та. Корисно, коли милозвучність неоднозначна: мама та тато.'
- section: 'Все разом: мелодійні речення'
  words: 300
  points:
  - 'Побудова речень із кількома частинами, які звучать природно: Ми поїхали у Львів із друзями й провели чудовий вихідний.'
  - 'Практика читання вголос: милозвучність стосується ЗВУКУ, а не лише правил. Читайте речення вголос і відчувайте, коли вони ллються, а коли спотикаються.'
  - 'Закріплення: усі три правила (у/в, з/із/зі, і/й) служать одному принципу — милозвучності. Українська мова активно уникає збігу приголосних і зіткнення голосних на межі слів.'
- section: Підсумок
  words: 200
  points:
  - 'Правила милозвучності запобігають складним збігам звуків на межі слів: у/в (у школі, в університеті), з/із/зі (з ним, із задоволенням, зі школи) та і/й/та у складних реченнях.'
  - "Самоперевірка: Чому ми кажемо «зі мною», а не «з мною»? Що визначає вибір між «увійти» та «ввійти»? Напишіть природне складне речення, у якому правильно використано «у/в», «з/із/зі» та «і/й»."
