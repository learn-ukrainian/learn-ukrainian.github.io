module: a2-038
level: A2
track: l1-uk
sequence: 38
slug: home-and-daily-life
version: '2.0.0'
title: Мій дім, мій день
subtitle: Описуємо помешкання, меблі та щоденний розпорядок із повною системою відмінків
focus: communication
pedagogy: TBL
phase: A2.5 [Case Synthesis and Plurals]
word_target: 2000
objectives:
- Учень може описати свій дім та його кімнати, використовуючи місцевий відмінок для розташування (у кухні, на балконі), родовий для відсутності/кількості (немає гаража, багато кімнат) та називний для переліку (тут є диван, шафа, стіл).
- Учень вміє описувати меблі та предмети побуту, вживаючи орудний відмінок для характеристик (стіл з дерева, кімната з великими вікнами) та знахідний для дій (поставити стілець, повісити картину).
- Учень може розповісти про свій розпорядок дня у послідовності, правильно вживаючи часи та відмінки (вранці я встаю о сьомій годині, снідаю з родиною, їду на роботу).
- Учень вміє брати участь у діалозі про візит до когось додому, запитуючи про кімнати та розпорядок, природно використовуючи повну систему відмінків.
dialogue_situations:
- setting: 'Сценарій 1: Відеотур вашим помешканням (сер. р.) — кухня (ж. р.), вітальня (ж. р.), спальня (ж. р.). Сценарій 2: Опис вашого розпорядку дня (чол. р.). Сценарій 3: У гостях в українських друзів — приносимо гостинці (множина).'
  speakers:
  - Мешканець
  - Онлайн-друг / Господарі
  motivation: 'Дім та щоденне життя: кухня (ж. р.), вітальня (ж. р.), спальня (ж. р.), гостинці (множина)'
content_outline:
- section: 'Сценарій 1: Моє помешкання'
  words: 600
  points:
  - 'Діалог: показуємо другові нову квартиру. Господар описує кімнати та меблі. Відмінки з''являються природно: Ось вітальня (Nom.). У вітальні (Loc.) стоїть великий диван. На стіні (Loc.) висить картина. Біля вікна (Gen.) є крісло.'
  - 'Словник кімнат: кухня, спальня, вітальня, ванна кімната, коридор, балкон, кабінет.'
  - 'Словник меблів: диван, крісло, стіл, стілець, шафа, ліжко, полиця, дзеркало, килим.'
  - 'Гість ставить запитання: А скільки у вас кімнат (Gen.Pl.)? Що на балконі (Loc.)? Де ви поставили книжки (Acc.Pl.)?'
- section: 'Сценарій 2: Мій звичайний день'
  words: 600
  points:
  - 'Монолог: опис типового буднього дня з ранку до вечора. Вранці я встаю о сьомій (Loc. для часу). Іду у ванну (Acc. напрямок). Снідаю з родиною (Instr.). Їду на роботу (Acc.) автобусом (Instr.).'
  - 'Щоденні дії: вставати, вмиватися, снідати, обідати, вечеряти, працювати, відпочивати, лягати спати.'
  - 'Вирази часу: вранці, вдень, увечері, вночі; о котрій годині; після обіду (Gen.), перед сном (Instr.), під час роботи (Gen.).'
  - 'Порівняння буднів та вихідних: У будні я працюю, а у вихідні відпочиваю. По суботах ходжу на ринок (Acc.).'
- section: 'Сценарій 3: В гостях'
  words: 500
  points:
  - 'Діалог: візит до українського друга на вечерю. Прибуття, огляд дому, сідання за стіл, розмова про щоденний розпорядок.'
  - 'Вирази гостинності: Будь ласка, заходьте! Сідайте за стіл (Acc.). Пригощайтеся! Хочете чаю (Gen.) чи кави (Gen.)?'
  - 'Порівняння розпорядків: А о котрій ви встаєте? Хто у вас готує вечерю (Acc.)? Ви снідаєте вдома (Loc. мається на увазі) чи на роботі (Loc.)?'
  - 'Відмінки в дії: за столом (Instr.), на кухні (Loc.), для гостей (Gen.), з цукром (Instr.), дякую господарям (Dat.).'
- section: 'Мовленнєве завдання: Опишіть свій дім'
  words: 300
  points:
  - 'Завдання з керованого мовлення: учень пише 8-10 речень, описуючи свій дім і розпорядок дня, використовуючи контрольний список, щоб переконатися, що він включив щонайменше 5 різних відмінків.'
  - 'Контрольний список: використайте Nom. (що є), Gen. (чого немає / скільки), Dat. (для кого), Acc. (куди йдете / що робите), Instr. (з ким / чим), Loc. (де знаходяться речі).'
  - 'Надано зразок відповіді для порівняння.'
- section: Підсумок
  words: 200
  points:
  - 'Опис дому вимагає поєднання відмінків: місцевий для розташування (у вітальні), родовий для відсутності/кількості (немає балкона) та знахідний для руху (поставити шафу). Самоперевірка: опишіть 3 кімнати у вашому домі та назвіть 2 предмети меблів у кожній. У чому різниця між "на кухні" та "на кухню"?'
  - 'Щоденний розпорядок поєднує дієслова послідовності (вставати, снідати, працювати) з виразами часу (вранці, о сьомій, після обіду). Самоперевірка: розкажіть про свій типовий ранок буднього дня 3 реченнями. Як ви скажете "I eat breakfast with my family", використовуючи орудний відмінок?'
