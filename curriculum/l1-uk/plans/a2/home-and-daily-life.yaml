activity_hints:
- type: fill-in
  focus: 'Доповніть опис дому правильними формами відмінків для іменників, що позначають кімнати та меблі'
  items: 8
- type: quiz
  focus: 'Виберіть правильну форму відмінка в реченнях про розпорядок дня (вирази часу, прийменники, дієслова)'
  items: 8
- type: match-up
  focus: 'З''єднайте щоденні дії з правильним часом доби та відповідною відмінковою конструкцією'
  items: 8
- type: error-correction
  focus: 'Знайдіть та виправте граматичні помилки в реченнях'
  items: 6
references:
- title: Заболотний Grade 5, §§25-28
  notes: 'Опис місць та щоденних дій — вживання відмінків у контексті'
