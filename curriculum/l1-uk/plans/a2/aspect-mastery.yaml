module: a2-042
level: A2
track: l1-uk
sequence: 42
slug: aspect-mastery
version: '2.0.0'
title: 30 найважливіших видових пар
subtitle: Морфологія видових пар та вибір виду в контексті
focus: grammar
pedagogy: PPP
phase: 'A2.6 [Вид дієслова, часи та рух]'
word_target: 2000
objectives:
- Учень може по пам'яті відтворити обидва члени 30 основних видових пар, згрупованих за морфологічною моделлю (префікс, зміна суфікса, зміна основи, суплетив).
- Учень може визначити чотири основні моделі утворення видових пар та передбачити форму доконаного або недоконаного виду для незнайомого дієслова за допомогою цих моделей.
- Учень може вибрати правильний вид дієслова у складних реченнях, що описують послідовність, переривання, звичну дію та одиничний результат — виходячи за межі простих слів-маркерів.
- Учень може вільно використовувати видові пари в коротких діалогах про щоденні плани, завершені завдання та поточні дії.
dialogue_situations:
- setting: 'Батьки і дитина роблять домашнє завдання — вибір правильного виду: Ти написав (pf) домашнє завдання? Ні, я ще пишу (impf). Прочитай (pf) цей абзац. Я читаю (impf) вже годину!'
  speakers:
  - Мама/Тато
  - Школяр
  motivation: '30 видових пар у контексті домашнього завдання: писати/написати, читати/прочитати'
content_outline:
- section: 'Як утворюються видові пари'
  words: 500
  points:
  - 'Модель 1 — Префіксація (найпоширеніша): писати → написати, читати → прочитати, робити → зробити, їсти → з''їсти, варити → зварити. Префікс додає значення завершеності, не змінюючи основного змісту слова.'
  - 'Модель 2 — Зміна суфікса: записувати → записати (-увати → -ати), розповідати → розповісти (-ідати → -істи), пояснювати → пояснити (-ювати → -ити). Суфікси недоконаного виду зазвичай довші.'
  - 'Модель 3 — Зміна основи: допомагати → допомогти, відповідати → відповісти. Відбувається трансформація самої основи.'
  - 'Модель 4 — Суплетивізм (різні корені): брати → взяти, говорити → сказати, класти → покласти. Ці пари слід запам''ятовувати як окремі одиниці.'
- section: '30 пар: Список і приклади'
  words: 600
  points:
  - 'Група А — Повсякденні дії (10 пар): робити/зробити, писати/написати, читати/прочитати, готувати/приготувати, їсти/з''їсти, пити/випити, варити/зварити, мити/помити, прибирати/прибрати, прасувати/випрасувати.'
  - 'Група Б — Спілкування та навчання (10 пар): говорити/сказати, питати/запитати, відповідати/відповісти, пояснювати/пояснити, вчити/вивчити, розуміти/зрозуміти, казати/сказати, розповідати/розповісти, записувати/записати, перекладати/перекласти.'
  - 'Група В — Рух та взаємодія (10 пар): брати/взяти, давати/дати, класти/покласти, відкривати/відкрити, закривати/закрити, починати/почати, закінчувати/закінчити, допомагати/допомогти, купувати/купити, платити/заплатити.'
  - 'Кожна пара представлена в мінімально контрастному реченні: Я варив суп (був у процесі) проти Я зварив суп (приготував, зроблено).'
- section: 'Вибір виду в складних ситуаціях'
  words: 500
  points:
  - 'Послідовність завершених подій — лише доконаний вид: Я встав, вмився, поснідав і пішов на роботу.'
  - 'Переривання дії — фонова дія недоконаного виду + подія доконаного виду: Коли я готувала вечерю, подзвонила подруга.'
  - 'Звична дія проти одиничної — недоконаний вид для звички, доконаний для одноразової: Вона завжди допомагала сусідам проти Вона допомогла сусідці вчора.'
  - 'Нюанси заперечення: Я не читав цю книгу (ніколи не читав) проти Я не прочитав цю книгу (не дочитав до кінця).'
- section: 'Практика у діалогах'
  words: 400
  points:
  - 'Діалог 1: Що ти зробив сьогодні? — Перелік завершених завдань за допомогою доконаного виду. А що ти робив увечері? — Опис тривалої вечірньої дії за допомогою недоконаного виду.'
  - 'Діалог 2: Планування та звіт. Що ти будеш робити завтра? (недоконаний) проти Що ти зробиш до п''ятниці? (доконаний) — вид у контексті майбутнього часу.'
  - 'Типові розмовні конструкції з видами дієслів: Ти вже зробив?, Я ще роблю, Я тільки що зробив.'
- section: Підсумок
  words: 200
  points:
  - 'Видові пари утворюються за 4 моделями: префіксація (робити → зробити), зміна суфікса (записувати → записати), зміна основи (допомагати → допомогти) і суплетивні корені (брати → взяти). Самоперевірка: Яка доконана форма від "говорити"? (сказати) Опишіть 3 дії, які ви завершили сьогодні, використовуючи дієслова доконаного виду.'
  - 'Дієслова доконаного виду вказують на послідовність завершених дій або одиничний результат, тоді як дієслова недоконаного виду позначають звички або перервані фонові дії. Самоперевірка: Яка різниця між "Я не читав" та "Я не прочитав"? Який вид ви використаєте для переривання в реченні "Коли я готувала вечерю, подзвонила подруга"?'
