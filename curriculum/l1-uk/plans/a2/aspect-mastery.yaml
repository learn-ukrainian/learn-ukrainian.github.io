  - давати / дати — недоконаний / доконаний вид
  - говорити / сказати — недоконаний / доконаний вид
  - класти / покласти — недоконаний / доконаний вид
  - починати / почати — недоконаний / доконаний вид
  - закінчувати / закінчити — недоконаний / доконаний вид
  - допомагати / допомогти — недоконаний / доконаний вид
  recommended:
  - утворення
  - морфологія
  - тільки що
  - вже
