register: науково-навчальний
references:
  - title: "Заболотний Grade 5, p.73-77"
    notes: "Основний розділ про фонетику: звуки та літери, правила транскрипції, м'які та тверді звуки."
  - title: "Авраменко Grade 5, p.75-77"
    notes: "Різниця між твердими, м'якими та пом'якшеними звуками, пари дзвінких та глухих із діалогом."
  - title: "Литвінова Grade 5, p.104-130"
    notes: "Комплексний розділ з фонетики: звуки мовлення, голосні та приголосні, таблиця пар дзвінких і глухих, групи сонорних, свистячих, шиплячих, губних, тверді та м'які з м'яким знаком, правила правопису ненаголошених е та и."
  - title: "Голуб Grade 5, p.66"
    notes: "Поетичне обрамлення фонетики: 'Звуки — це щось надзвичайно своєрідне в мові'."
