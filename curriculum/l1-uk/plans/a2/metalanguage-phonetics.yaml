# План l1-uk — україномовний модуль A2 metalanguage-phonetics
# Відгалужено від curriculum/l2-uk-en/plans/a2/metalanguage-phonetics.yaml v3.1.2
# Відгалужено 2026-04-22 як частина пакету форків A1+A2
module: a2-064
level: A2
sequence: 64
slug: metalanguage-phonetics
track: l1-uk
version: '2.0.0'
title: Звуки і букви
subtitle: Фонетика українською — від звуків до транскрипції
focus: phonetics
pedagogy: PPP
phase: 'A2.9 [Метамова: місток та основи]'
word_target: 2000
objectives:
  - Студент вміє називати та класифікувати українські звуки, використовуючи українську метамову (голосний, приголосний, дзвінкий, глухий, твердий, м'який, сонорний).
  - Студент вміє пояснювати різницю між поняттями звук, літера та фонема в українській мові.
  - Студент вміє читати та створювати фонетичну транскрипцію для поширених українських слів.
  - Студент вміє визначати наголос у словах і пояснювати його роль в українській фонетиці.
  - 'Студент вміє класифікувати приголосні за трьома критеріями: дзвінкість/глухість, твердість/м''якість та місце творення (губні, свистячі, шиплячі).'
dialogue_situations:
  - setting: 'Аудиторія в київському університеті на лекції з мовознавства — студент запитує професора про українську фонетичну термінологію: голосний, приголосний, наголос, склад, звук, буква. Вони порівнюють звукові системи української та англійської мов на дошці.'
    speakers:
      - Професор
      - Студент-першокурсник
    motivation: 'Фонетична термінологія: голосний, приголосний, наголос, склад в академічному стилі'
content_outline:
  - section: Що вивчає фонетика?
    words: 600
    points:
      - "Вступ до метамови: студенти вже ЗНАЮТЬ українські звуки з рівнів A1-A2. Цей модуль навчає їх НАЗИВАТИ те, що вони знають, використовуючи українську лінгвістичну термінологію. Перехід: від 'vowels and consonants' до голосні та приголосні. Від 'stress' до наголос. Від 'soft consonant' до м'який приголосний."
      - "Базові визначення (за Заболотним, 5 клас, с. 74): Фонетика (від грец. phonetikos — звуковий) — розділ мовознавства, що вивчає звуковий склад мови. Графіка — розділ мовознавства, що вивчає систему умовних знаків для передачі звуків на письмі. Орфоепія — правила літературної вимови."
      - "Золоте правило, яке повторюється на рівні B1 (за Заболотним, 5 клас, с. 73): 'Ми чуємо і вимовляємо звуки, а бачимо і пишемо літери'. В алфавіті 33 літери, у мові — 38 звуків. Чому виникає розбіжність: я, ю, є, ї можуть позначати два звуки; щ = [шч]; ь та ' (апостроф) не мають власного звука."
      - "Звук та фонема: звук — це будь-який конкретний мовленнєвий звук, який вимовляє людина. Фонема — це абстрактна одиниця, що розрізняє значення. Приклад: [г] у слові горох — це одна фонема; реальна вимова може відрізнятися в різних мовців, але всі варіанти є тією самою фонемою. Ця відмінність важлива для розуміння пояснень української граматики."
  - section: Голосні звуки
    words: 550
    points:
      - "Визначення (за Литвіновою, 5 клас, с. 104): Голосні звуки утворюються голосом, без перешкоди. 6 голосних звуків: [а], [о], [у], [е], [и], [і]. 10 голосних літер: а, о, у, е, и, і, я, ю, є, ї."
      - "Чому літер 10, а звуків лише 6? 'Йотовані' літери я, ю, є, ї: — На початку слова: яма [йама], юнак [йунак], єдність [йедн'іст']. — Після голосного: мрія [мр'ійа], краює [крайуйе]. — Після апострофа: п'ять [пйат'], об'єм [обйем]. — Після приголосного (без апострофа): вони пом'якшують приголосний: ляля [л'ал'а], любов [л'убов], лід [л'ід]."
      - "Ненаголошені голосні — чому це важливо для правопису: У ненаголошеній позиції [е] та [и] звучать подібно. Саме тому самі українці вивчають правопис ненаголошених [е], [и]. Правило: змініть форму слова, щоб голосний опинився під наголосом — зелéний (бо зéлень), крилó (бо крила). Литвінова (5 клас, с. 118): 'Якщо під час зміни слова сумнівний звук чергується з [і] в закритому складі — пишемо е: осені (бо осінь)'. Зверніть увагу: чергування з [і] вказує на те, що базовим голосним є [е], а не [и]."
  - section: 'Приголосні звуки: дзвінкі та глухі'
    words: 700
    points:
      - "Визначення (за Авраменком, 5 клас, с. 77): Приголосні звуки бувають дзвінкі та глухі. Дзвінкі = голос + шум. Глухі = лише шум. Парна система (за Литвіновою, 5 клас, с. 122): дзвінкі: [б], [д], [ґ], [г], [з], [ж], [дж], [дз], глухі: [п], [т], [к], [х], [с], [ш], [ч], [ц]."
      - "Сонорні приголосні — особлива група (за Литвіновою, 5 клас, с. 123): Звуки [в], [м], [н], [л], [р] та їхні м'які пари + [й] не є ні дзвінкими, ні глухими. Голос переважає над шумом. Мнемонічна фраза з підручників: МіНеРаЛоВиЙ. Важливо: українські дзвінкі приголосні НЕ стають глухими в кінці слова (на відміну від російської чи німецької). дуб = [дуб], а не *[дуп]."
      - "Свистячі та шиплячі (за Литвіновою, 5 клас, с. 123): Свистячі: [з], [ц], [с], [дз] — звучать як свист. Шиплячі: [ж], [ч], [ш], [дж] — звучать як шипіння. Губні: [б], [п], [в], [м], [ф] — утворюються за допомогою губ. Ці групи є важливими для правил правопису (уподібнення, чергування), з якими студенти зустрінуться на рівні B1."
      - "Практика читання: короткий український текст про звуки, у якому студенти знаходять дзвінкі, глухі та сонорні звуки в контексті. Приклади слів для класифікації: безпека [безпека] — б(дзв.), з(дзв.), п(гл.), к(гл.); школярі [школ'ар'і] — ш(шипл.), к(гл.), л'(сон.), р'(сон.)."
  - section: 'Приголосні звуки: тверді та м''які'
    words: 700
    points:
      - "За Авраменком, 5 клас, с. 75: М'який приголосний утворюється, коли кінчик язика торкається до піднебіння (палаталізований). Твердий — коли торкається до зубів. Приклад пари: лис [лис] (тв.) та ліс [л'іс] (м'як.) — різне значення!"
      - "Як м'якість позначається на письмі (за Литвіновою, 5 клас, с. 126): — м'який знак (ь): день [ден'], кінь [к'ін'], сіль [с'іл']. — літери я, ю, є, і після приголосного: ляк [л'ак], любов [л'убов]. У транскрипції м'якість позначається знаком [']: тінь [т'ін'], дядько [д'ад'ко]."
      - "Пом'якшені приголосні — третя категорія (за Авраменком, 5 клас, с. 75): Деякі приголосні не є повністю м'якими, а пом'якшеними (частково пом'якшеними). Це стосується губних і задньоязикових приголосних перед м'якими: пісня [п'іс'н'а] — [п'] є пом'якшеним (губний, лише частково пом'якшується перед м'яким [і]). Але [с'] є повністю м'яким (має справжню м'яку пару). Відмінність: м'які мають повні м'які пари, пом'якшені є м'якими лише через своє фонетичне оточення (переважно губні: б, п, в, м, ф)."
      - "Приголосні, які ЗАВЖДИ тверді (не мають м'якої пари): [б], [п], [в], [м], [ф], [г], [ґ], [к], [х], [ж], [ч], [ш], [дж], [р]. Приголосні, які ЗАВЖДИ м'які: [й]. Приголосні, що утворюють тверді/м'які пари: [д]-[д'], [т]-[т'], [з]-[з'], [с]-[с'], [ц]-[ц'], [дз]-[дз'], [л]-[л'], [н]-[н']."
  - section: Наголос
    words: 600
    points:
      - "За Авраменком, 5 клас, с. 88: Наголос — це посилена вимова одного зі складів. Український наголос є вільним (може падати на будь-який склад) та рухомим (може змінюватися в різних формах слова): руки (множина) та руки (родовий відмінок однини). Це відрізняється від мов із фіксованим наголосом (польська — на передостанньому, французька — на останньому)."
      - "Наголос змінює значення: зáмок та замóк (за Авраменком, 5 клас, с. 88). óбід та обід. приклад та приклад. Орфоепічна помилка — це помилка у вимові, викликана неправильним наголосом."
      - "Наголошений та ненаголошений склад: Склад під наголосом є наголошеним, усі інші — ненаголошені. У слові калина [калина]: ка- (ненаголошений), -ли- (наголошений), -на (ненаголошений). Практика: студенти ставлять наголос у поширених словах і перевіряють за орфоепічним словником."
      - "Чому наголос важливий для рівня B1: майбутні модулі про чергування голосних (наприклад, рік-рóку, кінь-коня) базуються на зміщенні наголосу. Розуміння наголосу зараз дорівнює розумінню морфонології в майбутньому."
  - section: Фонетична транскрипція
    words: 550
    points:
      - "Правила (за Заболотним, 5 клас, с. 74): 1. Запис беремо у квадратні дужки: [калина]. 2. Кожен звук позначаємо окремою буквою. 3. НЕ використовуємо букви я, ю, є, ї, ь, щ та великі букви. 4. Позначаємо місце наголосу: [подорож]. 5. М'якість приголосного позначаємо скісною рисочкою: [ден']."
      - "Покрокова практика транскрибування: яблуко → [йáблуко] (я на початку = [йа]), воля → [вóл'а] (я після приголосного = пом'якшення), щастя → [шчáс'т'а] (щ = [шч], тя = [т'а]), об'їжджати → [обйіж:áти] (ї після ' = [йі], жд → [ж:]). Більше прикладів зі зростаючою складністю."
      - "Поширені помилки студентів під час транскрибування: — Забувають, що я/ю/є = два звуки на початку слова. — Пишуть щ як один звук замість [шч]. — Забувають позначити м'якість. — Плутають місце наголосу. Практична вправа: затранскрибувати 8-10 слів, перевірити за зразком відповідей."
  - section: Підсумок
    words: 300
    points:
      - "Повний словник метамови — усі терміни з цього модуля: фонетика, графіка, орфоепія, звук, літера, фонема, голосний, приголосний, дзвінкий, глухий, сонорний, твердий, м'який, пом'якшений, наголос, наголошений, ненаголошений, транскрипція, склад, орфоепічна помилка, свистячий, шиплячий, губний, йотований."
      - "Самоперевірка українською мовою: Дайте відповіді на запитання: 1. Скільки звуків в українській мові? Скільки літер? 2. Які звуки називаємо голосними? Скільки їх? 3. Чим дзвінкі приголосні відрізняються від глухих? 4. Що таке сонорні приголосні? Назвіть їх. 5. Запишіть фонетичною транскрипцією: день, яма, щастя."
      - "Анонс наступного модуля: Будова слова — корінь, префікс, суфікс, закінчення, основа. Місток метамови триває: як тільки ви навчитеся називати звуки, ви будете готові називати частини слів."
