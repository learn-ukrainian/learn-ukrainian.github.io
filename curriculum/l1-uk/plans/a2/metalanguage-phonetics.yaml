activity_hints:
  - type: quiz
    focus: 'Класифікувати звуки: голосний чи приголосний? дзвінкий чи глухий?'
    items: 8
  - type: match-up
    focus: 'Зіставити українські фонетичні терміни з їхніми визначеннями (наприклад, дзвінкий — голос + шум)'
    items: 8
  - type: fill-in
    focus: 'Доповнити фонетичну транскрипцію слів (вставити пропущені звуки або знаки)'
    items: 6
  - type: group-sort
    focus: 'Розподілити приголосні на групи: дзвінкі, глухі, сонорні'
    items: 10
  - type: mark-the-words
    focus: 'У тексті позначити всі сонорні приголосні (або всі глухі тощо)'
    items: 6
  - type: error-correction
    focus: 'Знайти та виправити помилки у фонетичній транскрипції'
    items: 6
