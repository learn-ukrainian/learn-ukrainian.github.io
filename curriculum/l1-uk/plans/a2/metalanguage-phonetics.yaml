  - "Звуки та літери — 33 літери, 38 звуків, і чому вони відрізняються"
  - "Голосні: 6 звуків, 10 літер, йотовані букви (я, ю, є, ї)"
  - "Класифікація приголосних: пари дзвінких/глухих, сонорні, свистячі/шиплячі/губні"
  - "Класифікація приголосних: пари твердих/м'яких, пом'якшені"
  - "Наголос: вільний і рухомий, функція розрізнення значення"
