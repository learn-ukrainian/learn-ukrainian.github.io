module: a2-045
level: A2
sequence: 45
slug: telling-stories-and-travel
track: l1-uk
version: '2.0.0'
title: Розповіді та подорожі
subtitle: Розповідаємо про минуле з видом дієслова та плануємо подорожі з дієсловами руху
focus: communication
pedagogy: TBL
phase: 'A2.6 [Вид дієслова, часи та рух]'
word_target: 2000
objectives:
- Вміти розповідати про подію в минулому як зв'язну історію, правильно чергуючи дієслова недоконаного (фон, процес) та доконаного (завершені дії, події сюжету) виду минулого часу.
- Вміти описувати плани на подорожі, використовуючи дієслова руху (іти/ходити, їхати/їздити, летіти/літати) з відповідними прийменниками та відмінками для точки відправлення, призначення та маршруту.
- Опанувати участь у діалозі про минулу поїздку — відповідаючи на запитання про те, куди їздили, як подорожували, що робили і що сталося.
- Вміти написати коротку розповідь (8-10 речень) про реальну або уявну подорож, поєднуючи вид дієслова в минулому часі, дієслова руху та вирази часу.
dialogue_situations:
- setting: 'Сценарій 1: Смішна історія на вокзалі вчора. Сценарій 2: Планування поїздки в Карпати (pl) — бронювання хатинки. Сценарій 3: Показ фотографій з відпустки в Одесі — пляж (m), море (n), ресторан (m).'
  speakers:
  - Друзі (розповідають історії)
  motivation: 'Минуле + майбутнє + подорож: вокзал(m), хатинка(f), пляж(m), море(n)'
content_outline:
- section: 'Сценарій 1: Що вчора трапилось?'
  words: 550
  points:
  - 'Структура розповіді: створення фону (недоконаний вид) → події (доконаний вид) → реакції (обидва види). Приклад: Був теплий вечір. Я сидів на балконі і читав книгу. Раптом подзвонив друг і запросив мене на вечерю.'
  - 'Зв''язкові слова часу для розповідей: спочатку, потім, після цього, нарешті, тим часом, раптом, у цей момент.'
  - 'Практика: студент читає коротку історію зі змішаними видами дієслів, визначає, які дієслова є фоном (недок. вид), а які — подіями сюжету (док. вид).'
  - 'Керована розповідь: отримавши послідовність картинок або підказок, студент розповідає, що сталося, використовуючи правильний вибір виду дієслова.'
- section: 'Сценарій 2: Плануємо подорож'
  words: 500
  points:
  - 'Діалог: двоє друзів планують поїздку до Львова. Куди поїдемо? (док. вид — конкретна поїздка). Як доберемося? Поїдемо потягом чи полетимо? Де зупинимося? (док. вид — конкретний результат). Що будемо робити? (недок. вид — загальні заняття).'
  - 'Лексика подорожей: подорож, квиток, потяг, літак, автобус, вокзал, аеропорт, готель, зупинитися.'
  - 'Дієслова руху в контексті: Ми поїдемо потягом до Львова (док. вид — конкретна поїздка). Зазвичай ми їздимо туди влітку (недок. вид — звичка). Літак летить дві години (в один бік — у процесі).'
  - 'Моделі прийменників: поїхати до + Род. в. (до міста/людини), поїхати на + Зн. в. (на подію/територію — на море, на фестиваль), прилетіти з + Род. в. (з місця).'
- section: 'Сценарій 3: Розкажи про поїздку!'
  words: 550
  points:
  - 'Діалог: один друг розпитує іншого про недавню поїздку. Де ти був? Куди їздив? Як доїхав? Що бачив? Що найбільше сподобалось? — На все дається відповідь у минулому часі з правильним видом дієслова.'
  - 'Приклад розповіді: Минулого тижня я їздив до Одеси (недок. вид — поїздка туди й назад). Ми поїхали потягом (док. вид — відправилися). Доїхали за десять годин (док. вид — завершено). Там ми ходили по місту (недок. вид — гуляли), відвідали музей (док. вид — конкретна подія), купили сувеніри (док. вид) і з''їли найсмачніший борщ (док. вид).'
  - 'Вираження вражень: Мені дуже сподобалось. Було чудово / цікаво / весело. Я хочу поїхати ще раз.'
  - 'Контраст: їздив (був там, поїздка туди-назад завершена) проти поїхав (відправився, поїхав геть). Я їздив до Києва (Я поїхав до Києва і повернувся) проти Він поїхав до Києва (Він відправився до Києва — можливо, ще там).'
- section: 'Мовленнєве завдання: Моя подорож'
  words: 400
  points:
  - 'Завдання з керованого письма: написати 8-10 речень про реальну або уявну подорож. Включіть: куди ви їздили (дієслово руху + місце призначення), як подорожували (транспортний засіб — Ор. в.), що робили (події доконаного виду), що відбувалося навколо вас (фон недоконаного виду).'
  - 'Чекліст: Ви використали принаймні 2 дієслова руху? Ви чергували види дієслів? Ви використали зв''язкові слова часу? Ви описали враження?'
  - 'Зразкова відповідь для порівняння, з анотаціями щодо видів дієслів.'
- section: Підсумок
  words: 200
  points:
  - 'У розповіді в минулому часі чергуються види дієслів: використовуйте дієслова недоконаного виду для фонових сцен або тривалих процесів (читав книгу) та дієслова доконаного виду для раптових або завершених подій сюжету (раптом подзвонив). Самоперевірка: Опишіть, що ви робили вчора, коли раптом щось сталося, використовуючи обидва види та слово "раптом".'
  - 'Планування подорожей та розповіді про них вимагають дієслів руху та специфічних прийменників: для місця призначення використовується «до» + родовий відмінок (до Львова) або «на» + знахідний відмінок (на море), тоді як для виду транспорту використовується орудний відмінок (потягом, автобусом). Самоперевірка: Яка різниця між «Я їздив до Києва» та «Він поїхав до Києва»? Розкажіть про коротку поїздку, використовуючи принаймні 3 слова з лексики подорожей.'
vocabulary_hints:
  required:
  - подорож
  - розповідати / розповісти — недок./док. вид
  - трапитися
  - квиток
  - потяг
  - вокзал
  - зупинитися — док. вид
  - доїхати — док. вид
  - сподобатися — док. вид
  - враження
  recommended:
  - спочатку
  - потім
  - нарешті
  - тим часом
  - сувенір
activity_hints:
- type: fill-in
  focus: Доповнити розповідь про подорож, вибравши правильну форму дієслова (вид і тип дієслова руху) для кожного пропуску
  items: 8
- type: quiz
  focus: Прочитати опис минулої поїздки та відповісти на запитання на розуміння про те, що сталося, в якому порядку та як людина подорожувала
  items: 8
- type: match-up
  focus: Поєднати ситуації з подорожей із правильною комбінацією дієслова руху та прийменника (їхати до + Род. в., летіти на + Зн. в.)
  items: 8
- type: error-correction
  focus: Знайти та виправити граматичні помилки в реченнях
  items: 6
references:
- title: Заболотний Grade 6, §42-44, §39-41
  notes: Вид дієслова + дієслова руху — об'єднані в комунікативному контексті
