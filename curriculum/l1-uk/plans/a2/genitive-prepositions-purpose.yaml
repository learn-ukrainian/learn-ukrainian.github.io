module: a2-010
level: A2
sequence: 10
slug: genitive-prepositions-purpose
track: l1-uk
version: '2.0.0'
title: Для кого? Без чого? Біля чого?
subtitle: Прийменники для, без, біля, навпроти, коло з родовим відмінком
focus: grammar
pedagogy: PPP
phase: 'A2.2 [Родовий відмінок: завершення]'
word_target: 2000
objectives:
  - Вміти використовувати для + родовий відмінок для вираження мети або передбачуваного одержувача.
  - Вміти використовувати без + родовий відмінок для вираження відсутності або нестачі чогось.
  - Вміти використовувати біля, навпроти та коло + родовий відмінок для опису розташування поруч з орієнтиром.
  - Навчитися правильно утворювати родовий відмінок для іменників твердої, м'якої та мішаної груп після цих прийменників.
dialogue_situations:
  - setting: 'Збирання речей у похід — вирішуємо, що потрібно взяти: Для кого ця ковдра (f, blanket)? Для Олени. Без ліхтарика (m, flashlight) — ніяк! Біля річки (f, river) поставимо намет (m, tent).'
    speakers:
      - Ігор
      - Марта
    motivation: 'Для/без/біля + родовий відмінок: ковдра(f), ліхтарик(m), річка(f), намет(m)'
content_outline:
  - section: Для кого це? Для + родовий відмінок
    words: 600
    points:
      - 'Мета: для здоров''я, для роботи, для навчання.'
      - 'Одержувач: для мами, для друга, для дітей.'
      - 'Практика з усіма родами: для брата (тверда чол.), для вчителя (м''яка чол. на -тель), для сестри (тверда жін.), для Марії (жін. на -ія), для щастя (сер. на -тя).'
      - 'Поширені фрази: подарунок для тебе, час для відпочинку, це важливо для мене.'
  - section: Без чого? Без + родовий відмінок
    words: 600
    points:
      - 'Основне значення: кава без цукру, чай без молока, день без дощу.'
      - 'Абстрактні значення: без сумніву, без проблем, без допомоги.'
      - 'Тверда та м''яка групи після без: без хліба (тверда чол.), без олівця (м''яка чол.), без води (тверда жін.), без солі (м''яка жін.), без вікна (тверда сер.), без моря (м''яка сер.).'
      - 'Щоденні фрази: я не можу без кави, вона прийшла без парасольки, ми поїхали без нього.'
  - section: Де це? Біля, навпроти, коло + родовий відмінок
    words: 800
    points:
      - 'Біля: біля школи, біля будинку, біля річки. Найпоширеніший прийменник просторової близькості.'
      - 'Навпроти: навпроти парку, навпроти вокзалу, навпроти церкви. Використовується для об''єктів, що розташовані один навпроти одного.'
      - 'Коло: коло хати, коло дороги. Менш поширений у розмовній мові, ніж біля, але зустрічається в літературі та піснях.'
      - 'Практика опису місцезнаходження: Аптека біля ринку. Кафе навпроти бібліотеки. Зупинка біля станції метро.'
      - 'Іменники мішаної групи та на -ія в контексті місця: біля станції (м''яка жін. -ія), біля площі (мішана жін.), навпроти лікарні (м''яка жін.).'
  - section: Підсумок
    words: 200
    points:
      - 'Прийменники для, без, біля, навпроти та коло завжди вимагають родового відмінка. Тверда група: для брата, без води, навпроти парку. М''яка група: для вчителя, без солі, біля станції.'
      - 'Перевірка: Яка різниця між біля та навпроти? Опишіть, як ви п''єте каву або чай, використовуючи без. Назвіть 3 місця поруч із вашим домом, використовуючи біля або навпроти.'
vocabulary_hints:
  required:
    - призначення
    - відпочинок
    - допомога
    - сумнів
    - будинок
    - зупинка
    - бібліотека
    - лікарня
    - площа
    - станція
  recommended:
    - навчання
    - церква
    - вокзал
    - річка
activity_hints:
  - type: fill-in
    focus: Доповнення описів місцезнаходження прийменниками біля/навпроти/коло + правильною формою родового відмінка
    items: 8
  - type: quiz
    focus: Вибір для, без або біля для доповнення повсякденних речень
    items: 8
  - type: match-up
    focus: Встановлення відповідності між українськими прийменниковими фразами та їхніми англійськими еквівалентами
    items: 8
  - type: true-false
    focus: Визначення граматичної правильності комбінацій прийменника та форми іменника
    items: 8
references:
  - title: Заболотний Grade 5, §31
    notes: Прийменники з родовим відмінком — для, без, біля
  - title: 'ULP: Ukrainian prepositions'
    url: https://www.ukrainianlessons.com/prepositions/
    notes: Прийменники місця з родовим відмінком
