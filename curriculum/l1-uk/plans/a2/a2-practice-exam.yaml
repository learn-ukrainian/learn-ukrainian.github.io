module: a2-068
level: A2
track: l1-uk
sequence: 68
slug: a2-practice-exam
version: '2.0.0'
title: Пробний іспит
subtitle: Тренувальний тест рівня A2 з читання, письма та граматики
focus: review
pedagogy: Review
phase: 'A2.10 [Вдосконалення та випуск]'
word_target: 1500
objectives:
- Учень може виконати секцію розуміння прочитаного на час, відповідаючи на питання за повсякденними україномовними текстами.
- Учень може продемонструвати граматичну правильність з усіх тем рівня А2 у структурованому тестовому форматі.
- Учень може написати коротку письмову відповідь (80-100 слів) на знайому тему, використовуючи правильну граматику та лексику.
- Учень може самостійно оцінити свою готовність до рівня B1 на основі результатів іспиту.
dialogue_situations:
- setting: 'Тренувальний усний іспит — екзаменатор ставить ситуативні питання: Розкажіть про свій день. Що ви робили вчора? Які плани на літо? Порівняйте Київ і ваше місто. Опишіть свою сім''ю.'
  speakers:
  - Екзаменатор
  - Кандидат
  motivation: 'Повна симуляція усного іспиту А2 — усі часи, відмінки, лексика'
content_outline:
- section: 'Частина 1: Читання'
  words: 450
  points:
  - 'Текст А: короткий інформаційний текст (оголошення, розклад — 80-100 слів) із 3-4 питаннями на розуміння. Перевіряє пошукове читання.'
  - 'Текст Б: особисте повідомлення або електронний лист (100-120 слів), у якому український друг описує свої плани, ставить питання, ділиться новинами. 4-5 питань, що вимагають розуміння деталей та вміння робити висновки.'
  - 'Текст В: коротка розповідь або допис у блозі (120-150 слів) про українську традицію або досвід подорожі. 4-5 питань на перевірку розуміння головної думки, лексики в контексті та формулювання висновків.'
- section: 'Частина 2: Граматика'
  words: 400
  points:
  - 'Секція А: Вибір відмінка (6 завдань) — обрати правильну форму відмінка в реченнях з різними маркерами (дієслова, прийменники, слова, що позначають кількість).'
  - 'Секція Б: Форма дієслова (6 завдань) — обрати правильний час, вид чи спосіб для певного контексту.'
  - 'Секція В: Змішана граматика (6 завдань) — вищі ступені порівняння, займенники (свій, себе, неозначені/заперечні), сполучники, узгодження числівників.'
- section: 'Частина 3: Спілкування та письмо'
  words: 350
  points:
  - 'Завдання А: Доповнення діалогу — заповнити 6 пропусків у природній розмові (у кав''ярні, по телефону, планування подорожі).'
  - 'Завдання Б: Кероване письмо — написати короткий текст (80-100 слів) на одну з трьох тем: (1) Опишіть вашу улюблену пору року і чому, (2) Напишіть українському другу про ваші плани на вихідні, (3) Опишіть святкову традицію, яка вам подобається.'
  - 'Критерії оцінювання: граматична правильність (відмінки, вид, узгодження), словниковий запас, зв''язність, виконання завдання.'
- section: Результати та самооцінка
  words: 300
  points:
  - 'Відповіді з поясненнями до кожного питання з граматики та читання. Чому кожна відповідь є правильною — навчання через сам тест.'
  - 'Таблиця самооцінювання: Сильно / Розвивається / Потребує роботи для кожної навички рівня А2 (відмінки, вид, порівняння, складні речення, словник, читання, письмо).'
  - 'Рекомендації: до яких модулів слід повернутися перед початком B1. Заохочення: результат від 70% означає готовність до B1.'
- section: Підсумок
  words: 200
  points:
  - 'Граматика рівня А2 вимагає впевненого володіння всіма сімома відмінками, видом дієслова, ступенями порівняння та зворотними займенниками (свій, себе). Самоперевірка: Яка різниця між "свій" і "мій"? Напишіть два речення з описом ваших планів на вихідні, використовуючи майбутній час доконаного виду.'
  - 'Комунікація на рівні А2 передбачає розуміння повсякденних текстів (повідомлення, розклади) та написання коротких розповідей (80-100 слів). Самоперевірка: Опишіть свою улюблену пору року 3-4 реченнями з правильним використанням відмінків. Чи набрали ви принаймні 70% на етапі самооцінювання, щоб підтвердити свою готовність до рівня B1?'
