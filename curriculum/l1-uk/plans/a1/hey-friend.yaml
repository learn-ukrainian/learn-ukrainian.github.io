grammar:
- 'Кличний відмінок: спеціальні закінчення для прямого звертання'
- Жіночий -а → -о (Олена → Олено), -ія → -іє (Марія → Маріє)
- Чоловічий твердий → -е (Тарас → Тарасе), м'який/-й → -ю (Андрій → Андрію)
- 'Чергування приголосних: друг → друже (г → ж)'
register: розмовний
references:
- title: State Standard 2024, §4.2.3.4
  notes: 'Кличний відмінок — форми звертання. Обсяг для A1: лише поширені моделі.'
- title: 'Підручник 4 класу: Кличний відмінок (Заболотний)'
  notes: Слово-помічник Кл. (!). Жіночий -а→-о, чоловічий твердий→-е, м'який→-ю.
