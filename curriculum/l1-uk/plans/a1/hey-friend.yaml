module: a1-042
level: A1
sequence: 42
slug: hey-friend
track: l1-uk
version: '2.0.0'
title: Гей, друже!
subtitle: Олено! Тарасе! Друже! Мамо! — звертання до людей на ім'я
focus: grammar
pedagogy: PPP
phase: A1.7 [Спілкування]
word_target: 1200
objectives:
- Утворювати кличний відмінок для поширених імен і назв родичів (Олено! Тарасе! Мамо!)
- Використовувати кличний відмінок у привітаннях і прямих звертаннях (Привіт, Андрію!)
- Розпізнавати закінчення кличного відмінка чоловічого (-е, -у/-ю) та жіночого (-о, -ю, -є) родів
- Природно звертатися до людей у повсякденних ситуаціях за допомогою кличного відмінка
dialogue_situations:
- setting: 'На шумній вечірці з нагоди дня народження — звертання до людей через кімнату на ім''я: Олено! Тарасе! Друже! Мамо! Бабусю! Дідусю! Кожен робить щось своє (танцює, їсть, розмовляє).'
  speakers:
  - Іменинник
  - Друзі
  motivation: 'Кличний відмінок: Олена→Олено, Тарас→Тарасе, мама→мамо, бабуся→бабусю'
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Зустріч з другом: — Олено, привіт! Як справи? — Добре, дякую, Тарасе! А в тебе? — Теж добре. Олено, ти знаєш мого брата? — Ні. — Андрію, ходи сюди! Це Олена. Олено, це Андрій. Форми кличного відмінка: Олено (Олена), Тарасе (Тарас), Андрію (Андрій).'
  - 'Діалог 2 — Вдома: — Мамо, де мій телефон? — На столі, синку. — Тату, а де ключі? — У кишені, дочко. — Бабусю, ми йдемо! — Добре, будьте обережні! Родинні звертання: мамо, тату, синку, дочко, бабусю.'
- section: Кличний відмінок
  words: 300
  points:
  - 'В українській мові є спеціальний відмінок для звертання — кличний відмінок. Англійською ви просто називаєте ім''я: «Olena, come here!» В українській мові ім''я змінюється: Олена → Олено, ходи сюди! Це обов''язково — українці завжди використовують кличний відмінок при звертанні. Слово-помічник з 4 класу: Кл. (!) — знак оклику нагадує: ви когось кличете, тому закінчення змінюється.'
  - 'Чому кличний відмінок важливий: Олена прийшла. (Olena came.) — називний, говоримо ПРО неї. Олено, ходи сюди! (Olena, come here!) — кличний, говоримо ДО неї. Використання називного відмінка для звертання звучить неприродно в українській. Це як сказати «Hey, him!» замість «Hey, you!» англійською.'
- section: Закінчення кличного відмінка
  words: 300
  points:
  - 'Жіночі імена та іменники (-а → -о): Олена → Олено, мама → мамо, сестра → сестро, Оксана → Оксано, подруга → подруго, бабуся → бабусю (-ся → -сю). Імена на -ка: Наталка → Наталко, Ірка → Ірко. Імена на -ія: Марія → Маріє (не Маріо!). Імена на -а (довгі): Катерина → Катерино, Тетяна → Тетяно.'
  - 'Чоловічі імена та іменники: Твердий приголосний → -е: Тарас → Тарасе, Іван → Іване, брат → брате, пан → пане. М''який приголосний / -й → -ю: Андрій → Андрію, дідусь → дідусю, вчитель → вчителю. Особливі випадки: друг → друже (г → ж), козак → козаче (к → ч). Тато → тату (виняток із закінченням -у, запам''ятати).'
- section: Підсумок
  words: 300
  points:
  - 'Короткий довідник кличного відмінка: | Шаблон | Називний → Кличний | Приклад | | Жіночий -а | -а → -о | Олена → Олено, мама → мамо | | Жіночий -ія | -ія → -іє | Марія → Маріє | | Жіночий -ся | -ся → -сю | бабуся → бабусю | | Чоловічий твердий | + -е | Тарас → Тарасе, брат → брате | | Чоловічий -й/м''який | + -ю | Андрій → Андрію, вчитель → вчителю | | Особливі (г, к) | г→ж, к→ч + -е | друг → друже | Самоперевірка: Як ви звертаєтеся до своєї родини? мама →? тато →? брат →?'
vocabulary_hints:
  required:
  - друг — іменник чоловічого роду
  - подруга — іменник жіночого роду
  - брат — іменник чоловічого роду
  - сестра — іменник жіночого роду
  - пан — форма звертання до чоловіка
  - пані — форма звертання до жінки
  recommended:
  - синку — кличний відмінок від син
  - дочко — кличний відмінок від дочка
  - козак — іменник чоловічого роду
  - вчитель — іменник чоловічого роду
  - бабуся — іменник жіночого роду
  - дідусь — іменник чоловічого роду
