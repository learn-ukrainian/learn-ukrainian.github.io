module: a1-023
track: l1-uk
level: A1
sequence: 23
slug: days-and-months
version: '2.0.0'
title: Дні та місяці
subtitle: У понеділок, у січні — календар українською
focus: vocabulary
pedagogy: PPP
phase: A1.4 [Час і природа]
word_target: 1200
objectives:
- Називати всі 7 днів тижня та використовувати прийменники "у/в" + день (як сталі вирази)
- Називати всі 12 місяців та 4 пори року
- Називати дати, використовуючи порядкові числівники (як сталі вирази)
- Планувати тиждень, обговорюючи дні, час і події
dialogue_situations:
- setting: У реєстратурі поліклініки — запис на прийом
  speakers:
  - Пацієнт
  - Реєстратор
  motivation: 'Дні та місяці: У понеділок? Ні, у середу. В якому місяці?'
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Планування тижня (за моделлю ULP Ep15): — Що ти робиш у понеділок? — Я працюю. А у вівторок? — У вівторок я вивчаю українську. — А у суботу? — У суботу гуляю. Неділя — вільний день! Дні тижня у практичному плануванні.'
  - 'Діалог 2 — Коли твій день народження? — Коли у тебе день народження? — У березні. — Якого числа? — П''ятнадцятого березня. А у тебе? — У мене в серпні. — О, це літо! Місяці та пори року в особистому контексті.'
- section: Дні тижня
  words: 300
  points:
  - 'Сім днів — в українській мові всі пишуться з МАЛОЇ літери: понеділок, вівторок, середа, четвер, п''ятниця, субота, неділя. Вашуленко, 2 клас, с. 83: завдання на планування тижня. Примітка: слово "неділя" означає день тижня неділю ТА слово "тиждень" у деяких діалектах. Стандартне слово для тижня — "тиждень".'
  - 'У певний день = у/в + знахідний відмінок (сталий вираз — без граматичного аналізу): у понеділок, у вівторок, у середу, у четвер, у п''ятницю, в суботу, в неділю. Зверніть увагу на зміну закінчень — просто запам''ятайте кожну форму.'
- section: Місяці і пори року
  words: 300
  points:
  - '12 місяців — також пишуться з малої літери, згруповані за сезонами: Зима: грудень, січень, лютий. Весна: березень, квітень, травень. Літо: червень, липень, серпень. Осінь: вересень, жовтень, листопад. Усі місяці чоловічого роду. Багато з них походять від слів, пов''язаних із природою (березень ← береза, липень ← липа, листопад ← листя падає).'
  - '4 пори року: зима (f), весна (f), літо (n), осінь (f). "В" якомусь місяці/сезоні = у/в + місцевий відмінок (як сталий вираз): у січні, у лютому, в березні... влітку, взимку, восени, навесні. Форми для пір року нерегулярні — їх слід вивчити як окремі слова.'
- section: Підсумок
  words: 300
  points:
  - 'Календарна лексика: Дні: понеділок → неділя (у понеділок, в суботу). Місяці: січень → грудень (у січні, в серпні). Пори року: зима, весна, літо, осінь (взимку, навесні, влітку, восени). Самоперевірка: Який сьогодні день? Який місяць? Яка пора року? Коли ваш день народження? Сплануйте свій наступний тиждень українською мовою.'
vocabulary_hints:
  required:
  - понеділок, вівторок, середа
  - четвер, п'ятниця
  - субота, неділя
  - тиждень
  - зима, весна, літо, осінь
  recommended:
  - січень, лютий, березень
  - квітень, травень, червень
  - липень, серпень, вересень
  - жовтень, листопад, грудень
  - день народження
activity_hints:
- type: fill-in
  focus: Розташувати дні тижня в правильному порядку
  items:
  - понеділок, {вівторок|субота|четвер}, середа
  - середа, {четвер|п'ятниця|неділя}, п'ятниця
  - п'ятниця, {субота|вівторок|середа}, неділя
  - неділя, {понеділок|вівторок|четвер}, вівторок
  - вівторок, середа, {четвер|п'ятниця|неділя}
  - четвер, п'ятниця, {субота|понеділок|вівторок}
  - субота, {неділя|понеділок|п'ятниця}, понеділок
- type: match-up
  focus: З'єднати місяць із відповідною порою року
  pairs:
  - січень ↔ зима
  - квітень ↔ весна
  - липень ↔ літо
  - жовтень ↔ осінь
  - лютий ↔ зима
  - травень ↔ весна
  - серпень ↔ літо
  - листопад ↔ осінь
- type: fill-in
  focus: Використовувати правильну форму з 'у/в' для днів і місяців
  items:
  - Я працюю {у понеділок|понеділок|в понеділок}.
  - Мій день народження {у березні|березень|в березень}.
  - Ми гуляємо {в суботу|субота|у субота}.
  - '{Взимку|Зима|У зима} холодно.'
  - Я вивчаю українську {у вівторок|вівторок|в вівторок}.
  - Вони відпочивають {у серпні|серпень|в серпень}.
