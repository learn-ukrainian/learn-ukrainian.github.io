module: a1-019
level: A1
sequence: 19
slug: questions
track: l1-uk
version: '2.0.0'
title: Питання
subtitle: Хто? Що? Де? — як запитувати про світ
focus: grammar
pedagogy: PPP
phase: A1.3 [Дії]
word_target: 1200
objectives:
- Вміти ставити питання за допомогою слів хто, що, де, куди, коли, чому, як
- Опанувати заперечення з часткою "не" (для дієслів) та "ні" (ніщо/ніхто)
- Навчитися утворювати загальні питання (так/ні) за допомогою інтонації (без зміни порядку слів)
- Поєднувати питальні слова з дієсловами з модулів M16-M18
dialogue_situations:
- setting: Турист просить у перехожого допомоги з орієнтуванням у центрі міста
  speakers:
  - Турист
  - Перехожий
  motivation: 'Питальні слова: Де? Куди? Як? Коли? у реальній навігації'
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Знайомство (розширення M05): — Хто ти? — Я студент. — Що ти вивчаєш? — Я вивчаю українську. — Де ти живеш? — Я живу в Києві. — Коли ти працюєш? — Вранці. Питальні слова продемонстровано у реальній розмові.'
  - 'Діалог 2 — Вдома: — Де моя книга? — Я не знаю. — А хто знає? — Мама знає. — Чому мама? — Тому що вона все знає! Питання та заперечення в практичному контексті.'
- section: Питальні слова
  words: 300
  points:
  - 'Сім основних питальних слів: Хто? — Хто це? Хто говорить? Що? — Що це? Що ти робиш? Де? — Де ти живеш? Де книга? Куди? — Куди ти ходиш? Коли? — Коли ти працюєш? Чому? — Чому ти не працюєш? Як? — Як справи? Як тебе звати?'
  - 'Порядок слів: питальне слово + дієслово + підмет (гнучкий): Де ти живеш? = Ти де живеш? (обидва варіанти прийнятні). Питання типу так/ні: просто підвищте інтонацію в кінці: Ти говориш українською? ↑ (жодних спеціальних слів не потрібно). Чи ти говориш? — формальний/письмовий варіант (необов''язковий для А1).'
- section: Заперечення
  words: 300
  points:
  - 'Не (перед дієсловом): Я не знаю. Він не працює. Ми не розуміємо. Частка «не» ставиться безпосередньо перед дієсловом — ніколи не відокремлюється. Повторення: Я не хочу. Мені не подобається. (з M15, M18)'
  - 'Ні (самостійно) / нічого, ніхто (із займенниками): Ні, я не знаю. Нічого, ніхто, ніколи, ніде. Подвійне заперечення є ОБОВ''ЯЗКОВИМ в українській мові: Я нічого не знаю. Ніхто не говорить. На відміну від англійської, потрібні і «не», і «ні-».'
- section: Підсумок
  words: 300
  points:
  - 'Питання: Хто? Що? Де? Куди? Коли? Чому? Як? Так/ні: лише інтонація (Ти знаєш? ↑) Заперечення: «не» перед дієсловом (Я не знаю). Подвійне заперечення: Ніхто не знає. Я нічого не бачу. Самоперевірка: Поставте 3 запитання про друга (Де...? Що...? Коли...?). Складіть 2 заперечні речення (Я не... / Ніхто не...).'
