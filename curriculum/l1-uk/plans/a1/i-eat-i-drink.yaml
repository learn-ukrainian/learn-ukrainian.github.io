title: Я їм, я п'ю
subtitle: Я їм хліб, п'ю каву — знахідний відмінок для того, що ви їсте та п'єте
focus: grammar
pedagogy: PPP
phase: A1.6 [Їжа та покупки]
word_target: 1200
objectives:
- Відмінювати дієслова «їсти» та «пити» в теперішньому часі
- Вживати знахідний відмінок для неістот-прямих додатків (Я їм хліб, п'ю каву)
- Розпізнавати зміну закінчення жіночого роду в знахідному відмінку (-а → -у): кава → каву, вода → воду
- Описувати звички харчування, використовуючи знахідний відмінок
dialogue_situations:
- setting: 'Обідня перерва на роботі — розпакування ланч-боксів: Я їм бутерброд і п''ю чай. А ти? Я їм салат (m) і п''ю каву. Також: яблуко (n), банан (m), вода (f), сік.'
  speakers:
  - Колега 1
  - Колега 2
  motivation: 'Знахідний відмінок: бутерброд (m), салат (m), каву (f→acc), яблуко (n), чай (m)'
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Розмова за сніданком: — Що ти їш на сніданок? — Я їм кашу і п''ю каву. — А Олена? — Вона їсть хліб з маслом і п''є чай. — А діти? — Вони їдять яйця і п''ють молоко. Повне відмінювання дієслів «їсти» та «пити» у природному контексті.'
  - 'Діалог 2 — За обідом: — Що ви їсте на обід? — Ми їмо суп і салат. — А що п''єте? — Ми п''ємо воду або сік. — Я теж хочу суп. — Добре, замовляй! Повторення «їсти/пити» з підметами у множині.'
- section: Їсти і пити
  words: 300
  points:
  - 'Відмінювання дієслова «їсти» (нерегулярне — НЕ I або II дієвідміна): я їм, ти їси, він/вона їсть, ми їмо, ви їсте, вони їдять. Відмінювання дієслова «пити» (I дієвідміна): я п''ю, ти п''єш, він/вона п''є, ми п''ємо, ви п''єте, вони п''ють. Обидва є важливими щоденними дієсловами з високою частотністю.'
  - 'Підхід української школи (4 клас — знахідний відмінок): «Бачу що? кого?» — знахідний відмінок відповідає на питання «що я бачу/їм/п''ю?» Я їм (що?) хліб. Я п''ю (що?) каву. Питання «що?» вимагає знахідного відмінка для неістот.'
- section: Знахідний відмінок — неживе
  words: 300
  points:
  - 'Знахідний відмінок для неістот — що змінюється: Чоловічий рід (неістоти): БЕЗ ЗМІН (= називний). хліб → хліб (Я їм хліб), суп → суп (Я їм суп), сік → сік (Я п''ю сік). Середній рід: БЕЗ ЗМІН (= називний). молоко → молоко (Я п''ю молоко), яйце → яйце (Я їм яйце).'
  - 'Жіночий рід -а → -у (ГОЛОВНА зміна на рівні A1): кава → каву (Я п''ю каву), вода → воду (Я п''ю воду), риба → рибу (Я їм рибу), каша → кашу (Я їм кашу), картопля → картоплю (Я їм картоплю). Правило: іменники жіночого роду на -а змінюються на -у, на -я змінюються на -ю. Це ЄДИНА зміна у знахідному відмінку, яку потрібно знати студентам на цьому етапі.'
- section: Підсумок
  words: 300
  points:
  - 'Коротко про знахідний відмінок неістот: Чоловічий/Середній рід: без змін (хліб, молоко залишаються такими ж). Жіночий рід -а → -у, -я → -ю (кава → каву, картопля → картоплю). Тест: Я їм ___ (риба → рибу). Я п''ю ___ (вода → воду). Самоперевірка: Назвіть 3 речі, які ви сьогодні їсте, і 3 речі, які п''єте. Використовуйте правильну форму знахідного відмінка для кожного слова.'
