module: a1-052
level: A1
track: l1-uk
sequence: 52
slug: my-story
version: '2.0.0'
title: Моя історія
subtitle: Я народився, я живу, я буду... — твоє життя у трьох часах
focus: communicative
pedagogy: PPP
phase: A1.8 [Минуле, майбутнє, випускний]
word_target: 1200
objectives:
- Поєднувати всі три часи (минулий, теперішній, майбутній) в одній зв'язній розповіді
- Вміти розповідати просту історію життя: де народився, де живеш, що плануєш
- Використовувати часові маркери для позначення зміни часу
- Розуміти коротку біографію на слух або в тексті
dialogue_situations:
- setting: Дідусь чи бабуся розповідає історію свого життя — Я народився в селі. Ходив у школу. Зараз живу в місті. Працюю в лікарні. Буду відпочивати на дачі.
  speakers:
  - Дідусь/Бабуся
  - Онуки
  motivation: Три часи зі словами село, школа, місто, лікарня, дача
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Глибоке знайомство: — Розкажи про себе! — Я народився в Канаді, у Торонто. — А зараз ти живеш тут? — Так, зараз я живу в Києві. — Чому ти переїхав? — Я хотів вивчати українську. Мої бабуся і дідусь з України. — А що ти будеш робити далі? — Я буду працювати тут і вчити мову. — Чудово! Успіхів тобі! Усі три часи в одній розмові.'
  - 'Діалог 2 — Історія Анни: — Я народилася у Львові. Там я вчилася в школі. — Потім я переїхала в Київ і закінчила університет. — Зараз я працюю вчителькою і живу в центрі міста. — А що далі? — Я буду подорожувати! Я хочу побачити Японію. — І ти будеш вчити японську? — Може! Але спочатку — українська для тебе! Плавний перехід від минулого через теперішній до майбутнього.'
- section: Три часи разом
  words: 300
  points:
  - 'Структура історії життя: Минулий час: Я народився/народилася в... Я жив/жила в... Я вчився/вчилася... Я працював/працювала... Теперішній час: Зараз я живу в... Я працюю... Я вивчаю... Я люблю... Майбутній час: Я буду працювати... Я буду вивчати... Я буду жити...'
  - 'Сигнальні слова, що позначають зміну часу: Минулий: раніше, у дитинстві, коли я був/була маленьким/маленькою. Теперішній: зараз, сьогодні, цього року. Майбутній: потім, далі, наступного року. Ці слова допомагають співрозмовнику зрозуміти, про який час ідеться.'
- section: Моя історія
  words: 300
  points:
  - 'Зразкова розповідь — історія життя Тараса: Я народився в Одесі у тисяча дев''ятсот дев''яносто п''ятому році. Я жив там з батьками і сестрою. Я ходив у школу і любив математику. Потім я переїхав у Київ і вчився в університеті. Зараз я живу в Києві. Я працюю програмістом. Я люблю свою роботу. У вільний час я граю у футбол і читаю книжки. Далі я буду подорожувати. Я буду вивчати англійську. І я буду жити в Києві — це моє місто! Перехід від минулого (народився, жив, ходив) до теперішнього (живу, працюю) та майбутнього (буду подорожувати).'
  - 'Твоя черга — розкажи СВОЮ історію: Початок: Я народився/народилася в [місто/країна]. Минулий: Я жив/жила... Я вчився/вчилася... Я працював/працювала... Теперішній: Зараз я живу... Я працюю... Я вивчаю українську, тому що... Майбутній: Я буду... Я хочу... Використай щонайменше 3 дієслова минулого, 3 теперішнього і 3 конструкції майбутнього часу.'
- section: Підсумок
  words: 300
  points:
  - 'Три часи — одна розповідь: Минулий: -в/-ла/-ло/-ли (родові закінчення). Я народився. Я жила. Теперішній: особові закінчення. Я живу. Ти працюєш. Вона вивчає. Майбутній: буду + інфінітив. Я буду працювати. Вона буде жити. Сигнальні слова: раніше → минулий, зараз → теперішній, далі → майбутній. Лексика історії життя: народитися, жити, вчитися, переїхати, подорожувати. Самоперевірка: Напиши історію свого життя у 8-10 реченнях, використовуючи всі три часи.'
vocabulary_hints:
  required:
  - народитися
  - жити
  - вчитися
  - переїхати
  - зараз
  - раніше
  - далі
  - розповідати
  recommended:
  - подорожувати
  - закінчити
  - дитинство
  - університет
  - програміст
  - успіх
  - мрія
  - батьки
activity_hints:
- type: ordering
  focus: Розташуй події життя у логічній хронологічній послідовності
  items:
  - Я народився в Торонто.
  - У дитинстві я жив з батьками.
  - Потім я вчився в університеті.
  - Зараз я живу в Києві і працюю програмістом.
  - Далі я буду подорожувати.
- type: fill-in
  focus: Використовуй сигнальні слова для визначення правильного часу
  items:
  - Раніше я {жив|живу|буду жити} в Канаді.
  - Зараз я {працюю|працював|буду працювати} в університеті.
  - Далі я {буду вивчати|вивчав|вивчаю} українську мову.
  - У дитинстві вона {любила|любить|буде любити} читати.
  - Сьогодні ми {живемо|жили|будемо жити} в Україні.
- type: matching
  focus: З'єднай дієслово з відповідною часовою категорією
  pairs:
  - народився: Минулий час
  - переїхала: Минулий час
  - живу: Теперішній час
  - працюю: Теперішній час
  - буду подорожувати: Майбутній час
  - будемо вчитися: Майбутній час
- type: fill-in
  focus: Доповни біографію, поєднуючи всі три часи
  items:
  - Я {народилася|народився|народилися} у Львові.
  - Там я {вчилася|вчився|вчилися} в школі.
  - Зараз я {працюю|працювала|буду працювати} вчителькою.
  - Наступного року я {буду подорожувати|подорожувала|подорожую}.
connects_to:
- a1-053 (Здоров'я)
prerequisites:
