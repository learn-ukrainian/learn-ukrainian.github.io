grammar:
- 'Всі три часи разом: минулий (-в/-ла), теперішній (особові закінчення), майбутній (буду + інфінітив)'
- 'Сигнальні слова зміни часу: раніше, зараз, далі'
- 'Дієслова для розповіді про життя: народитися, жити, вчитися, переїхати'
register: розмовний
references:
- title: State Standard 2024, §4.2.4.1
  notes: Усі три часи поєднані в розповіді — підсумкова граматика для рівня А1.
