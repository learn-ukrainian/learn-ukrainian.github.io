# План l1-uk — україномовний модуль A1 i-want-i-can
# Відгалужено від curriculum/l2-uk-en/plans/a1/i-want-i-can.yaml v1.1.4
# Відгалужено 2026-04-22 як частина пакету форків A1+A2
module: a1-018
level: A1
sequence: 18
slug: i-want-i-can
track: l1-uk
version: '2.0.0'
title: Я хочу, я можу
subtitle: Хочу, можу, мушу — як висловити бажання та можливості
focus: grammar
pedagogy: PPP
phase: A1.3 [Дії]
word_target: 1200
objectives:
- Вміти вживати дієслова «хотіти», «могти», «мусити» з інфінітивом
- Навчитися висловлювати бажання, можливості та обов'язки в теперішньому часі
- Опанувати особливості відмінювання неправильних дієслів «хотіти» та «могти»
- Вміти будувати прості речення для щоденного спілкування
dialogue_situations:
- setting: Вирішуємо, який фільм подивитися або куди піти погуляти
  speakers:
  - Оля
  - Денис
  motivation: 'Хочу/можу/мушу + інфінітив: Хочу піти в кіно, Не можу, мушу працювати'
- setting: Замовлення в кафе
  speakers:
  - Клієнт
  - Офіціантка
  motivation: 'Базовий діалог у сфері обслуговування (рівень А1): як ввічливо замовити напій, попросити просту пораду та природно погодитися'
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1: Оля і Денис планують вечір (кіно чи прогулянка). Використовуємо "Я хочу піти...", "Я не можу...", "Я мушу...". Фокус на живому мовленні, уникаємо абстрактних описів.'
  - 'Діалог 2: У кафе (підготовка до А1.6). Будуємо короткий, природний діалог у сфері обслуговування. Клієнт ввічливо замовляє каву, просить пораду і природно погоджується. Використовуємо формули рівня А1, такі як "Можна мені, будь ласка, каву?", "Що можете порадити?", "Тоді ще борщ, будь ласка." Демонструємо "хотіти + іменник" поруч в описовому тексті, але не нав''язуємо пряме "Я хочу [іменник]" як основну форму замовлення.'
- section: Дієслово «хотіти»
  words: 300
  points:
  - 'Дієслово «хотіти» є неправильним (І дієвідміна): я хочу, ти хочеш, він хоче, ми хочемо, ви хочете, вони хочуть. Зверніть увагу на чергування т→ч та специфічні закінчення для кожної особи. Вживається: з інфінітивом або з іменником у знахідному відмінку (наприклад, "хочу каву").'
  - 'Заперечення: "Я не хочу їсти". Зазначте, що частка "не" зазвичай стоїть перед модальним дієсловом, проте не варто подавати це як абсолютне правило, оскільки позиція може змінюватися для логічного наголосу.'
- section: Дієслова «могти» та «мусити»
  words: 300
  points:
  - 'Дієслово «могти» є неправильним (І дієвідміна): я можу, ти можеш, ми можемо, вони можуть (чергування г→ж). Воно виражає фізичну здатність, можливість або дозвіл (наприклад, навички або прохання).'
  - 'Дієслово «мусити» належить до ІІ дієвідміни. Воно виражає обов''язок або потребу. Поясніть, що воно означає необхідність, але не обов''язково "негайну" терміновість.'
- section: Підсумок
  words: 300
  points:
  - 'Підсумок: Порівнюємо бажання, здатність та обов''язок за допомогою трьох простих речень із повсякденного життя. Уникаємо абстрактних повчань та мета-коментарів на кшталт "У цьому модулі...".'
vocabulary_hints:
  required:
  - хотіти — неправильне дієслово
  - могти — неправильне дієслово
  - мусити — дієслово обов'язку
  - кава — іменник жіночого роду
  - їсти — дієслово
  recommended:
  - шкода — слово для жалю
  - допомогти — дієслово доконаного виду
  - борщ — іменник чоловічого роду
  - порадити — дієслово для поради
  - треба — безособова форма, випереджувально
activity_hints:
- type: fill-in
  focus: 'Провідміняйте: я хоч__, ти хоч__, він хоч__'
  items: 9
- type: quiz
  focus: 'Хочу, можу чи мушу? Оберіть правильне модальне дієслово відповідно до ситуації.'
  items: 8
- type: fill-in
  focus: 'Доповніть речення: Я ___ гуляти, але не ___ — ___ працювати.'
  items: 6
- type: quiz
  focus: 'Правильне чи неправильне дієслово? Визначте тип дієвідміни.'
  items: 6
connects_to:
- a1-019 (Запитання)
prerequisites:
- a1-017 (Дієслова ІІ дієвідміни)
grammar:
- 'Модальні дієслова: хотіти, могти, мусити + інфінітив'
- 'Особливості відмінювання: хот-→хоч-, мог-→мож-'
- 'Дієслово «мусити»: правильне (ІІ дієвідміна), крім форми 1-ї особи однини (мушу)'
- 'Хотіти + іменник (Я хочу каву) проти хотіти + інфінітив (Я хочу їсти)'
register: розмовний
references:
- title: Караман Grade 10, p.179
  notes: 'Дієслово «хотіти» подано як виняток І дієвідміни (попри інфінітив на -іти).'
- title: Літвінова Grade 7, p.55
  notes: 'Винятки: хотіти, гудіти, ревіти, іржати — належать до І дієвідміни попри суфікс -іти.'
