# План l1-uk — україномовний модуль A1 special-signs
# Відгалужено від curriculum/l2-uk-en/plans/a1/special-signs.yaml v1.3.1
# Відгалужено 2026-04-22 як частина пакету форків A1+A2
module: a1-003
level: A1
sequence: 3
slug: special-signs
track: l1-uk
version: '2.0.0'
title: Особливі знаки
subtitle: Ь, апостроф та дзвінкість приголосних
focus: phonetics
pedagogy: PPP
phase: A1.1 [Звуки, літери та перший контакт]
word_target: 1200
objectives:
- Розуміти вплив м'якого знака (Ь) на приголосні
- Правильно читати слова з апострофом (сім'я, м'ясо)
- Розрізняти пари дзвінких та глухих приголосних
- Опанувати вимову складних українських звуків И, Г, Р
content_outline:
- section: М'який знак
  words: 250
  points:
  - 'Ь не має власного звуку. Його завдання: пом''якшити приголосний, що стоїть перед ним. Потрійний поділ (Авраменко 5 клас, стор. 75, Большакова 2 клас, стор. 46): м''які приголосні (справді м''які, 9 пар: Д/Д'', Т/Т'', З/З'', С/С'', Ц/Ц'', Л/Л'', Н/Н'', Р/Р'', ДЗ/ДЗ'' + Й), пом''якшені (частково пом''якшені: губні, шиплячі, задньоязикові — Ь ніколи після них не ставиться), тверді. Позначення Захарійчук, 1 клас, стор. 15: тверді = [–], м''які = [=].'
  - 'Мнемонічне правило Літвінової для 5 класу: «ДЗіДЗьо, Де Ти З''їСи Ці ЛиНи» — саме ті 9 приголосних, які Ь може пом''якшити. Типові моделі: -нь (день, кінь, осінь), -ль (сіль, біль), -ть (мить), -зь (мазь). Практика: учитель, батько, маленький.'
- section: Апостроф
  words: 250
  points:
  - 'Захарійчук, 1 клас, стор. 97: Апостроф ставиться після б, п, в, м, ф, р перед я, ю, є, ї. Він зберігає приголосний ТВЕРДИМ і надає голосному його повний звук [й] + голосний.'
  - 'Без апострофа: приголосний пом''якшується (пісня — Н м''який). З апострофом: приголосний залишається твердим + голосний = два звуки. сім''я [сім-йа], м''ясо [м-йасо], п''ять [п-йать], комп''ютер [комп-йутер]. Практика читання: п''ять, дев''ять, м''який, м''яч, об''єкт. ВАЖЛИВО: Використовуйте лише ті слова з апострофом, де він ставиться за правилом губних приголосних та р (б, п, в, м, ф, р + я, ю, є, ї). НЕ використовуйте «під''їзд» або «з''їзд» — вони підпорядковуються правилу префіксів (під-/з- + їзд), що вивчається на рівні А2+. Крім того: «тварь» — це РОСІЙСЬКА форма, НЕ використовуйте її. В українській мові є слово «тварина».'
- section: Дзвінкі і глухі
  words: 250
  points:
  - 'Приголосні утворюють пари дзвінких і глухих. Тест із рукою на горлі: є вібрація = дзвінкий. Пари: Б-П, Д-Т, Г-Х, Ґ-К, З-С, Ж-Ш, ДЗ-Ц, ДЖ-Ч.'
  - 'Українська мова чітко вимовляє дзвінкі приголосні в кінці слова — дуб звучить як [дуб], мороз як [мороз]. Дзвінкі приголосні переважно зберігають своє звучання. Виняток: легко [лехко]. Це визначальна риса української фонетики.'
  - 'Мінімальні пари для тренування слуху: балка проти палка, коза проти коса.'
- section: Вимова українських звуків
  words: 250
  points:
  - 'И [и] — унікальний український голосний. Це НЕ те саме, що І [і]. Мінімальні пари, щоб почути різницю: бик проти бік, дим проти дім, лист проти ліс, кит проти кіт. Потренуйтеся з відео Анни Огойко про звук И.'
  - 'Г [ɦ] проти Ґ [g] — дві різні літери, два різні звуки. Г — це дзвінкий фрикативний (повітря проходить через звужене горло): гарно, гора, голова. Його глуха пара — Х; скажіть Х, потім додайте голос, щоб отримати Г. Ґ — це дзвінкий проривний (повне змикання горла, а потім вивільнення): ґанок, ґудзик. Його глуха пара — К. Ґ є унікальним для української мови — важливою частиною її фонетичної ідентичності. НЕ називайте Г "м''яким" — в українській фонетиці "м''який" означає палаталізований, яким Г не є.'
  - 'Р [р] — український дрижачий (сонорний) Р. Потренуйтеся з відео Анни Огойко: рука, робота, ранок, риба. Недосконалий Р завжди зрозумілий — зосередьтеся на тому, щоб вимовляти його комфортно, а не ідеально.'
- section: Підсумок
  words: 200
  points:
  - 'Самоперевірка: Що робить Ь? Після яких літер ставиться апостроф? Назвіть 3 пари дзвінких і глухих приголосних. Чим український Г відрізняється від Ґ? Прочитайте ці слова: сім''я, день, п''ять, гарно.'
vocabulary_hints:
  required:
  - сім'я — слово з апострофом
  - день — м'який знак після Н
  - сіль — м'який знак після Л
  - м'ясо — апостроф після М
  - п'ять — апостроф після П
  - гарно — практика Г [ɦ]
  - риба — практика Р та И
  recommended:
  - батько — м'який знак
  - учитель — м'який знак наприкінці
  - дев'ять — апостроф
  - комп'ютер — апостроф у спорідненому слові
  - м'який — лише апостроф (БЕЗ м'якого знака! Й є завжди м'яким)
activity_hints:
- type: odd-one-out
  section: "М'який знак"
  focus: 'Який приголосний НЕ має м''якої пари? (Ь не може його пом''якшити)'
  items: 6
- type: fill-in
  section: "Апостроф"
  focus: 'Додай пропущений Ь або апостроф: сім_я, ден_, п_ять'
  items: 6
- type: error-correction
  section: "Апостроф"
  focus: 'Знайди пропущені апострофи у словах типу м''ясо, сім''я, п''ять'
  items: 6
- type: group-sort
  section: "Апостроф"
  focus: 'Розподіли слова: є Ь / є апостроф / немає нічого'
  items: 18
- type: match-up
  section: "Дзвінкі і глухі"
  focus: 'З''єднай пари дзвінких та глухих: Б↔П, Д↔Т, Г↔Х, Ґ↔К, тощо.'
  items: 8
- type: true-false
  section: "Дзвінкі і глухі"
  focus: 'Твердження про правила дзвінких/глухих та не-оглушення в кінці слів'
  items: 6
- type: quiz
  section: "Вимова українських звуків"
  focus: 'Г чи Ґ: обери правильну літеру для кожного слова'
  items: 6
connects_to:
- a1-004 (Наголос та мелодика)
prerequisites:
- a1-002 (Читаємо українською)
grammar:
- 'М''який знак (Ь) — пом''якшує попередній приголосний, не має звуку. Тільки після 9 приголосних: Д, Т, З, С, Ц, Л, Н, Р, ДЗ (мнемоніка: ДЗіДЗьо, Де Ти З''їСи Ці ЛиНи)'
- 'Потрійний поділ: м''які (справді м''які, 9+Й), пом''якшені (частково пом''якшені губні/шиплячі/задньоязикові), тверді'
- 'Апостроф — після б, п, в, м, ф, р перед я, ю, є, ї (правило Захарійчук). ЖОДНИХ прикладів префіксного апострофа (під''їзд, з''їзд) на А1.'
- 'Пари дзвінких і глухих приголосних (8): Б-П, Д-Т, Г-Х, Ґ-К, З-С, Ж-Ш, ДЗ-Ц, ДЖ-Ч. Сонорні (В, Л, М, Н, Й, Р) НЕ є ані дзвінкими, ані глухими (вони лише дзвінкі).'
- 'Не-оглушення: дзвінкі приголосні переважно зберігають своє звучання в кінці слова. Виняток: легко [лехко].'
- 'Г [ɦ] (дзвінкий фрикативний, НЕ "м''який") проти Ґ [g] (дзвінкий проривний)'
register: розмовний
references:
- title: Захарійчук, 1 клас (НУШ 2025), стор. 97
  notes: 'Правило апострофа: після б, п, в, м, ф, р перед я, ю, є, ї.'
- title: Захарійчук, 1 клас (НУШ 2025), стор. 15
  notes: Позначення твердих [–] та м'яких [=] приголосних.
- title: Большакова, 1 клас, стор. 45-47
  notes: Тверді і пом'якшені приголосні звуки.
