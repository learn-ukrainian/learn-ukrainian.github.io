module: a1-040
level: A1
sequence: 40
slug: people-around-me
track: l1-uk
version: '2.0.0'
title: Люди навколо мене
subtitle: Я бачу маму, знаю Олену — знахідний відмінок для істот
focus: grammar
pedagogy: PPP
phase: A1.6 [Їжа та покупки]
word_target: 1200
objectives:
- Вміти використовувати знахідний відмінок для істот (Я бачу маму, знаю Олену)
- Розрізняти, що форма знахідного відмінка чоловічого роду для істот дорівнює формі родового (бачу брата, друга)
- Розрізняти знахідний відмінок для істот і неістот
- Розповідати про людей у своєму повсякденному житті, використовуючи знахідний відмінок
dialogue_situations:
- setting: 'Показ весільних фотографій — розпізнавання людей: Бачиш маму? А тата? Знаєш Олену? Це мій дядько, а це тітка. Ось наречена і наречений.'
  speakers:
  - Наречена
  - Друг
  motivation: 'Знахідний відмінок істот: маму, тата, Олену, дядька'
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Кого ти бачиш? — Кого ти бачиш? — Я бачу маму і тата. — А хто це? — Це мій брат. Ти знаєш мого брата? — Ні, я не знаю твого брата. — Ходімо, я тебе познайомлю! Знахідний відмінок істот: маму, тата, брата.'
  - 'Діалог 2 — На роботі: — Ти знаєш нашу вчительку? — Так, я знаю Олену Петрівну. — А нового лікаря? — Ні, я ще не знаю лікаря. — Він дуже добрий. Я чекаю його зараз. Знахідний відмінок істот із людьми навколо.'
- section: Кого?
  words: 300
  points:
  - 'Знахідний відмінок істот і неістот: Неістоти (М37): Я їм (що?) хліб. → форма чоловічого роду не змінюється. Істоти (М40): Я бачу (кого?) брата. → форма чоловічого роду змінюється! Ключовим є питальне слово: що? = неістоти → чоловічий рід залишається без змін. кого? = істоти (люди, тварини) → чоловічий рід змінюється.'
  - 'Підхід української школи (4 клас): «Бачу кого? що?» — два питання, дві моделі. Питання «Кого?» активує правило для істот: форма знахідного відмінка чоловічого роду істот дорівнює формі родового. брат → брата, друг → друга, тато → тата, лікар → лікаря. Ось чому категорія істот/неістот у знахідному відмінку має значення — вона змінює іменники чоловічого роду.'
- section: Знахідний відмінок — істоти
  words: 300
  points:
  - 'Жіночий рід істоти: так само, як неістоти (-а → -у, -я → -ю): мама → маму (Я бачу маму), сестра → сестру (Я знаю сестру), Олена → Олену (Я чекаю Олену), подруга → подругу (Я люблю подругу). Жодних несподіванок — закінчення такі ж, як у М37 (кава → каву).'
  - 'Чоловічий рід істоти: знахідний = родовий (нове правило): брат → брата (Я бачу брата), друг → друга (Я знаю друга), тато → тата (Я люблю тата), лікар → лікаря (Я чекаю лікаря), вчитель → вчителя (Я знаю вчителя), сусід → сусіда (Я бачу сусіда). Закономірність: іменники чоловічого роду для істот у знахідному відмінку мають закінчення родового. Порівняйте: Я бачу хліб (неістота — без змін) та Я бачу брата (істота — змінюється).'
- section: Підсумок
  words: 300
  points:
  - 'Знахідний відмінок: повна картина: | | Неістоти (що?) | Істоти (кого?) | | Чоловічий рід | = називний (хліб) | = родовий (брата) | | Жіночий рід | -а → -у (каву) | -а → -у (маму) | | Середній рід | = називний (молоко) | (рідко на А1) | Основні дієслова зі знахідним відмінком істот: бачити, знати, любити, чекати, шукати. Самоперевірка: Я бачу ___ (мама → маму, брат → брата).'
vocabulary_hints:
  required:
  - бачити
  - знати
  - любити
  - чекати
  - шукати
  - друг — чол. рід
  - подруга — жін. рід
  recommended:
  - сусід — чол. рід
  - колега — чол./жін. рід
  - викладач — чол. рід
  - вчитель — чол. рід
  - лікар — чол. рід
  - продавець — чол. рід
  - покупець — чол. рід
