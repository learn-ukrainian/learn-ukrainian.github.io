module: a1-010
level: A1
track: l1-uk
sequence: 10
slug: colors
version: '2.0.0'
title: Кольори
subtitle: Синій, жовтий — кольори України та вашого світу
focus: vocabulary
pedagogy: PPP
phase: A1.2 [Мій світ]
word_target: 1200
objectives:
- Називати 12 базових кольорів українською мовою
- Використовувати прикметники кольору з правильним узгодженням за родами (включно зі словом м'якої групи "синій")
- Розрізняти слова "синій" (темно-синій) та "блакитний" (світло-синій) — розрізнення, якого немає в англійській
- Описувати предмети, поєднуючи колір та прикметники з модуля M09
dialogue_situations:
- setting: 'На відкритому квітковому ринку — вибір букетів для різних подій. Описати: червоні троянди, білі лілії, жовті соняшники, синя ваза (f), зелене листя (n). Використовуються квіти, рослини та обгортка.'
  speakers:
  - Наталка
  - Продавець
  motivation: 'Прикметники кольору: червоний/а/е зі словами троянда(f), соняшник(m), листя(n)'
- setting: 'Вибір вбрання для вечірки з гардероба друга. Описати: чорна сукня (f), білий светр (m), сіре пальто (n), коричневі черевики (pl). Використовується одяг, БЕЗ сумок.'
  speakers:
  - Дмитро
  - Ліза
  motivation: 'Колір + рід: сукня(f), светр(m), пальто(n), черевики(pl)'
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Вибір подарунка (за мотивами вірша про кольори з підручника Большакової для 2 класу, с. 38): — Яка гарна сумка! Якого вона кольору? — Червона. А є ще синя і зелена. — Мені подобається синя. — А мені — жовта! Кольори вивчаються природно через ситуацію покупок. Примітка: "Мені подобається" — це сталий вираз (як "У мене є"); граматика давального відмінка вивчатиметься на рівні A2.'
  - 'Діалог 2 — Опис кімнати (продовження M08-M09): — Якого кольору твоя кімната? — Біла. — А стіл? — Стіл коричневий. А крісло — сіре. Повторення: узгодження за родами + нова лексика кольорів.'
- section: Кольори
  words: 300
  points:
  - '12 базових кольорів, поділених за типами прикметників: Тверда група (-ий/-а/-е — такий самий патерн, як у M09): червоний/червона/червоне, жовтий/жовта/жовте, зелений/зелена/зелене, чорний/чорна/чорне, білий/біла/біле, сірий/сіра/сіре.'
  - 'М''яка група (-ій/-я/-є — НОВИЙ патерн): синій/синя/синє. Вашуленко, 3 клас, с. 130: прикметники поділяються на тверду групу (-ий) та м''яку групу (-ій). Лише слово "синій" належить до м''якої групи серед базових кольорів — зараз варто вивчити його як окремий виняток. Порівняйте: великий стіл → синій стіл, велика книга → синя книга, велике вікно → синє вікно.'
- section: Синій ≠ блакитний
  words: 300
  points:
  - 'В українській мові є ДВА різні відтінки синього — в англійській лише один: синій = темно-синій (море, нічне небо, чорнило), блакитний = світло-синій (ясне денне небо). Прапор України — синьо-жовтий (Кравцова, 2 клас, с. 22: Синьо-жовтий прапор маєм: синє — небо, жовте — жито). Культурна примітка: "голубий" — це русизм для світло-синього кольору, слід вживати слово "блакитний".'
  - 'Інші кольори для опису речей: коричневий, рожевий, помаранчевий, фіолетовий. Усі вони належать до твердої групи (-ий/-а/-е). Складні кольори: темно-зелений, світло-синій. Культурна довідка: вишиванка — традиційна сорочка, зазвичай вишита червоним і чорним (Полісся) або червоним і синім (Полтавщина) кольорами.'
- section: Підсумок
  words: 300
  points:
  - 'Узгодження кольорів за правилами M09: Тверда група: червоний стіл, червона книга, червоне вікно. М''яка група: синій стіл, синя книга, синє вікно. Самоперевірка: Якого кольору український прапор? (синьо-жовтий) Опишіть 3 речі у вашій кімнаті, називаючи їх колір. У чому різниця між словами "синій" та "блакитний"?'
