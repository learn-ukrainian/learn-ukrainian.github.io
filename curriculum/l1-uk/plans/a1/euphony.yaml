module: a1-028
level: A1
sequence: 28
slug: euphony
track: l1-uk
version: '2.0.0'
title: Милозвучність
subtitle: У/в, і/й, з/із/зі — українська звучить красиво
focus: phonetics
pedagogy: PPP
phase: A1.5 [Місця]
word_target: 1200
objectives:
- Застосовувати чергування у/в залежно від сусідніх звуків
- Застосовувати чергування і/й у сполучниках
- Правильно вживати з/із/зі перед різними збігами приголосних
- Розуміти, чому в українській мові існують ці правила (уникнення збігу приголосних)
dialogue_situations:
- setting: 'Вичитування есе друга українською про город — пошук помилок у/в та і/й. У тексті: у городі/в городі, і яблука/й яблука, у школі/в школі. Читання речень вголос, щоб почути різницю.'
  speakers:
  - Студент (writing)
  - Друг (correcting)
  motivation: Чергування у/в, і/й зі словами город (m), школа (f), яблуко (n)
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Опис розташування речей: — Де ти живеш? — Я живу в Києві. А ти? — Я живу у Львові. — У Львові гарно! Зверніть увагу: в Києві (перед К=приголосним після голосного) проти у Львові (перед Л після приголосного). Правила милозвучності роблять плин мови природним.'
  - 'Діалог 2 — Планування: — Ти й Олена йдете в кіно? — Ні, я і Максим йдемо в парк. — А Олена й Тарас? — Вони йдуть у театр. Зверніть увагу: й між голосними (ти й Олена), і між приголосними (я і Максим).'
- section: У чи В?
  words: 300
  points:
  - 'Авраменко, 5 клас, с. 117: Чергування у–в забезпечує милозвучність мови. Головне правило: уникати збігу приголосних. В після голосного перед приголосним: живу в Києві, працюю в офісі. У після приголосного перед приголосним: Тарас у Львові, Максим у банку. Це стосується як прийменників (в/у), так і префіксів (вже/уже).'
  - 'Винятки, які варто знати: На початку речення: У мене є... (завжди У). Після паузи або коми: Так, у нас є... (У після паузи). Не ускладнюйте — носії мови використовують милозвучність інстинктивно. Мета: речення мають звучати плавно, а не жорстко підпорядковуватися правилам.'
- section: І чи Й? З, із, чи зі?
  words: 300
  points:
  - 'Літвінова, 5 клас, с. 176: Чергування і/й: І між приголосними: брат і сестра, Тарас і Максим. Й між голосними: мама й тато, вона й він. На початку речення: І він прийшов (завжди І).'
  - 'Літвінова, 5 клас, с. 177: Чергування з/із/зі: З перед голосними та більшістю приголосних: з Одеси, з другом. Із між приголосними (для уникнення збігу): Максим із Семеном. Зі перед з, с, ш, щ або збігом приголосних: зі мною, зі святом, зі школи. Це правило менш поширене, ніж у/в, але важливе для природного мовлення.'
- section: Підсумок
  words: 300
  points:
  - 'Три пари милозвучності: у/в — уникаємо збігу приголосних: у Львові, в Києві. і/й — уникаємо збігу голосних: брат і сестра, мама й тато. з/із/зі — перед складними збігами приголосних: з другом, із сестрою, зі мною. Самоперевірка: Як правильно? Я живу (в/у) Києві. Мама (і/й) тато. Практика: читайте свої речення вголос — чи звучать вони плавно?'
vocabulary_hints:
  required:
  - у/в — чергований прийменник
  - і/й — чергований сполучник
  - з/із/зі — чергований прийменник
  recommended:
