module: a1-017
level: A1
sequence: 17
slug: verbs-group-two
track: l1-uk
version: '2.0.0'
title: Дієслова другої групи
subtitle: Говорю, говориш, говорить — друга модель
focus: grammar
pedagogy: PPP
phase: A1.3 [Дії]
word_target: 1200
objectives:
- Відмінювати дієслова II дієвідміни (-ити) в теперішньому часі для всіх осіб
- Розрізняти закінчення I дієвідміни (-єш/-є/-ють) та II дієвідміни (-иш/-ить/-ять)
- Використовувати 6 найуживаніших дієслів II дієвідміни в реченнях
- Порівнювати та зіставляти обидві дієвідміни
dialogue_situations:
- setting: У спортзалі — двоє друзів роблять різні вправи та описують свої дії
  speakers:
  - Тарас
  - Микола
  motivation: Дієслова II дієвідміни (бачиш, говориш, робиш) у контексті фізичної активності
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Розмова про вміння: — Ти говориш українською? — Так, я говорю трохи. А ти? — Я бачу, що ти добре говориш! — Дякую, я вчуся. Дієслова II дієвідміни в природній розмові.'
  - 'Діалог 2 — Вечір удома: — Що ти робиш увечері? — Я дивлюся фільм. А ти? — Я вчу нові слова. — Молодець! Зверніть увагу: дивлюся — закінчення -ся означає зворотну дію (ознайомлення перед M20).'
- section: Друга дієвідміна
  words: 300
  points:
  - 'Дієслова II дієвідміни мають інфінітив на -ити (або -іти): говорити → я говорю, ти говориш, він/вона говорить, ми говоримо, ви говорите, вони говорять. Модель: основа + -ю/-у, -иш, -ить, -имо, -ите, -ять/-ать.'
  - 'Шість основних дієслів II дієвідміни: говорити: говорю, говориш, говорить... бачити: бачу, бачиш, бачить... робити: роблю, робиш, робить... вчити: вчу, вчиш, вчить... просити: прошу, просиш, просить... ходити: ходжу, ходиш, ходить...'
- section: Група I чи II?
  words: 300
  points:
  - 'Порівняння закінчень пліч-о-пліч: | | I дієвідміна (-ати) | II дієвідміна (-ити) | | я | читаю | говорю | | ти | читаєш | говориш | | він/вона | читає | говорить | | вони | читають | говорять | Ключова відмінність: форма на ти → -єш (I) порівняно з -иш (II), вони → -ють (I) порівняно з -ять/-ать (II). Зверніть увагу: після шиплячих (ч, ш, ж, щ) пишемо -ать (а не -ять): бачать, кричать. Після інших приголосних → -ять: говорять, ходять.'
  - 'Зміни приголосних у II дієвідміні (тільки у формі я): робити → роблю (б→бл), ходити → ходжу (д→дж), просити → прошу (с→ш), бачити → бачу (без змін). Ці зміни впливають лише на форму першої особи однини — решта форм регулярні. Не запам''ятовуйте правило — просто вивчайте форму на я разом із дієсловом.'
- section: Підсумок
  words: 300
  points:
  - 'Дві групи дієслів — дві моделі закінчень: I дієвідміна (-ати): -ю, -єш, -є, -ємо, -єте, -ють II дієвідміна (-ити): -ю/-у, -иш, -ить, -имо, -ите, -ять Чергування приголосних у формі на я II дієвідміни (роблю, ходжу, прошу). Самоперевірка: Провідміняйте слово "бачити" для я, ти, він/вона. Слово "слухати" належить до I чи II дієвідміни? А як щодо "говорити"?'
