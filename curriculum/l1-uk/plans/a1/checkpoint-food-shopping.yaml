module: a1-041
level: A1
sequence: 41
slug: checkpoint-food-shopping
track: l1-uk
version: '2.0.0'
title: 'Підсумок: Їжа та покупки'
subtitle: Чи вмієте ви замовляти їжу та купувати речі українською?
focus: review
pedagogy: PPP
phase: A1.6 [Їжа та покупки]
word_target: 1000
objectives:
- Використовувати лексику про їжу та напої в контексті
- Правильно використовувати знахідний відмінок для істот та неістот
- Замовляти в кафе та купувати речі в магазині чи на ринку
- Поєднувати всі навички рівня A1.6 у зв'язних ситуаціях
dialogue_situations:
- setting: 'Проведення вечері (f) — повний процес: купівля продуктів (pl) на ринку (m), приготування вареників (pl) та салату (m), сервірування столу тарілками (pl) та склянками (pl), частування гостей.'
  speakers:
  - Господиня
  - Гості
  motivation: 'Закріплення: продукти(pl), вареники(pl), тарілка(f), склянка(f)'
content_outline:
- section: Що ми знаємо?
  words: 200
  points:
  - 'Самоперевірка за темами M36-M40: Чи можете ви назвати 10 продуктів і 5 напоїв? (M36) Чи можете ви сказати, що їсте/п''єте, використовуючи знахідний відмінок? (M37) Чи вмієте ви замовляти в кафе? (M38) Чи можете ви запитати ціну та купити речі? (M39) Чи можете ви використовувати знахідний відмінок для людей? (M40)'
- section: Читання
  words: 250
  points:
  - 'Короткий український текст із використанням лексики з M36-M40. Зміст: Анна йде на ринок, купує продукти, потім іде в кафе. Вона замовляє борщ і каву з молоком, просить рахунок, потім зустрічає подругу та знайомить її з братом. Використовується лексика про їжу, знахідний відмінок для істот і неістот, фрази для кафе.'
- section: Граматика
  words: 200
  points:
  - 'Ключові конструкції з A1.6: 1. Лексика про їжу/напої: їжа, напої, прийоми їжі (M36) 2. Знахідний відмінок неістот: чол. = наз., жін. -а→-у (M37) 3. Замовлення: Мені каву, будь ласка (M38) 4. Ціни: Скільки коштує? Гривня/гривні/гривень (M39) 5. Знахідний відмінок істот: жін. -а→-у, чол. = родовий (M40) 6. Сталі вирази: кава з молоком, кілограм яблук (M36, M39)'
- section: Діалог
  words: 200
  points:
  - 'День покупок і їжі: — Що ти їш на сніданок? — Я їм кашу і п''ю каву з молоком. — Потім іду на ринок. Скільки коштують помідори? — Тридцять гривень. — Дайте кілограм, будь ласка. — Потім у кафе: Мені борщ і воду, будь ласка. — О, я бачу Олену! Олено, привіт! Ти знаєш мого брата? Поєднує всі навички A1.6 в одному реалістичному дні.'
- section: Підсумок
  words: 150
  points:
  - 'Огляд досягнень A1.6: Ви вмієте говорити про їжу та напої. Ви можете використовувати знахідний відмінок для речей І людей. Ви вмієте замовляти в кафе та розраховуватися. Ви можете робити покупки на ринку та питати ціни. Далі: A1.7 — Спілкування (телефон, електронна пошта, планування).'
vocabulary_hints:
  required: []
  recommended: []
activity_hints:
- type: quiz
  focus: 'Перевірка знахідного відмінка: обрати правильну форму для істот і неістот'
  items:
  - question: Я їм ___.
    options:
    - салат
    - салата
    - салату
  - question: Я бачу ___.
    options:
    - брата
    - брат
    - брату
  - question: Я п'ю ___.
    options:
    - воду
    - вода
    - води
  - question: Я знаю ___.
    options:
    - Олену
    - Олена
    - Олени
  - question: Я люблю ___.
    options:
    - борщ
    - борща
    - борщу
  - question: Я чекаю ___.
    options:
    - друга
    - друг
    - другу
  - question: Я купую ___.
    options:
    - хліб
    - хліба
    - хлібу
  - question: Я бачу ___.
    options:
    - лікаря
    - лікар
    - лікарю
  - question: Я їм ___.
    options:
    - піцу
    - піца
    - піци
  - question: Я люблю ___.
    options:
    - маму
    - мама
    - мами
- type: fill-in
  focus: Доповнити діалог у кафе та на ринку правильними формами
  items:
  - — Що ти їш на сніданок? — Я їм {кашу|каша|каші} і п'ю каву.
  - — Потім іду на ринок. Скільки {коштують|коштує|коштувати} помідори?
  - — Тридцять {гривень|гривні|гривня}.
  - — Дайте {кілограм|літр|пляшку} яблук, будь ласка.
  - '— Потім у кафе: {Мені|Я|Меня} борщ і воду, будь ласка.'
  - — Рахунок, будь ласка. Можна {карткою|картка|картки}?
  - — О, я бачу {Олену|Олена|Олени}! Олено, привіт!
  - — Ти знаєш мого {брата|брат|братом}?
- type: group-sort
  focus: 'Розподіл форм знахідного відмінка: неістоти (що?) проти істот (кого?)'
  groups:
  - name: Неістоти (що?)
    items:
    - борщ
    - хліб
    - сік
    - чай
    - сир
  - name: Істоти (кого?)
    items:
    - брата
    - лікаря
    - сусіда
    - друга
    - вчителя
- type: quiz
  focus: Що ви скажете? Підберіть правильні фрази для ситуацій у магазині чи кафе
  items:
  - question: 'Ви хочете замовити каву:'
    options:
    - Мені каву, будь ласка.
    - Скільки коштує?
    - Тут вільно?
  - question: 'Ви запитуєте ціну:'
    options:
    - Скільки коштує?
    - Можна карткою?
    - Що ви рекомендуєте?
  - question: 'Ви хочете заплатити карткою:'
    options:
    - Можна карткою?
    - Рахунок, будь ласка.
    - Дорого!
  - question: 'Ви просите рахунок:'
    options:
    - Рахунок, будь ласка.
    - Мені борщ.
    - Все було дуже смачно!
  - question: 'Ви просите 1 кг яблук:'
    options:
    - Дайте кілограм яблук.
    - Скільки коштує?
    - Можна меню?
  - question: 'Ви вважаєте, що ціна висока:'
    options:
    - Дорого!
    - Дешево!
    - Нормальна ціна.
  - question: 'Ви запитуєте, чи місце вільне:'
    options:
    - Тут вільно?
    - Можна меню?
    - Рахунок, будь ласка.
  - question: 'Ви робите комплімент їжі:'
    options:
    - Все було дуже смачно!
    - Можна карткою?
    - Це гостре?
