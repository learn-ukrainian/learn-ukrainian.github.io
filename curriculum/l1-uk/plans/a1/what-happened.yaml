grammar:
- Минулий час і родові закінчення -в, -ла, -ло, -ли
- Минулий час вказує на рід, а не на особу (на відміну від теперішнього часу)
- Утворення форм минулого часу за допомогою основи інфінітива та родового закінчення
- Запитання Що ти робив/робила?
register: розмовний
