module: a1-048
level: A1
sequence: 48
slug: what-happened
track: l1-uk
version: '2.0.0'
title: Що сталося?
subtitle: Він читав, вона читала — минулий час і рід
focus: grammar
pedagogy: PPP
phase: A1.8 [Минуле, майбутнє, підсумки]
word_target: 1200
objectives:
- Утворювати дієслова минулого часу для всіх родів та множини (він читав, вона читала, воно читало, вони читали)
- Розуміти, що український минулий час вказує на РІД, а не на особу
- Використовувати минулий час для опису завершених дій у простих реченнях
- Запитувати та відповідати на питання Що ти робив/робила?
dialogue_situations:
- setting: Ранок понеділка на роботі — розмови про вихідні. Я ходив на концерт. Я читала роман. Ми гуляли в парку. Він дивився фільм. Вона готувала вечерю.
  speakers:
  - Колеги
  motivation: Минулий час зі словами концерт, роман, парк, фільм, вечеря
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Що ти робив учора?: — Що ти робив учора? — Я читав книжку. А ти? — Я готувала вечерю. — А що робив Тарас? — Він гуляв у парку. — А Олена? — Вона працювала. Зверніть увагу на рід: робив (чоловічий), робила (жіночий). Те саме дієслово, різне закінчення.'
  - 'Діалог 2 — Вихідні: — Як ти провів вихідні? — Добре! У суботу я гуляв у місті. — А в неділю? — У неділю я дивився фільм. А ти? — Я ходила в кафе з подругою. Ми їли торт і пили каву. — Як смачно! Минулий час у природній розповіді.'
- section: Минулий час
  words: 300
  points:
  - 'Підручники 3-4 класів: минулий час. Як його утворити: беремо інфінітив, відкидаємо -ти, додаємо: він → -в (читати → читав), вона → -ла (читати → читала), воно → -ло (читати → читало), вони → -ли (читати → читали). КЛЮЧОВИЙ МОМЕНТ: минулий час вказує на РІД, а не на особу! Я читав (чоловік). Я читала (жінка). Особа та сама (я), але закінчення роду різне.'
  - 'Це відрізняється від теперішнього часу (який вказує на особу): Теперішній: я читаю, ти читаєш, він читає (особові закінчення). Минулий: я/ти/він читав, я/ти/вона читала (родові закінчення). Він працював. Вона працювала. Воно працювало. Вони працювали. На рівні A1 немає розрізнення виду — просто вивчайте форми.'
- section: Практика
  words: 300
  points:
  - 'Основні дієслова в минулому часі (всі відомі з A1.3): читати → читав / читала / читало / читали працювати → працював / працювала / працювало / працювали гуляти → гуляв / гуляла / гуляло / гуляли готувати → готував / готувала / готувало / готували дивитися → дивився / дивилася / дивилося / дивилися говорити → говорив / говорила / говорило / говорили'
  - 'Побудова речень про минуле: Учора я читав цікаву книжку. Вона працювала в офісі. Ми гуляли в парку. Вони готували вечерю разом. Слова-маркери часу: учора, минулого тижня.'
- section: Підсумок
  words: 300
  points:
  - 'Утворення минулого часу: основа інфінітива + -в (він), -ла (вона), -ло (воно), -ли (вони). Рід має значення: Я читав (мовець-чоловік). Я читала (мовець-жінка). Вони завжди -ли (множина = відсутність категорії роду). Запитання: Що ти робив/робила? Відповідь: Я читав/читала книжку. Самоперевірка: Розкажіть співрозмовнику, що ви робили вчора, використовуючи 3 різні дієслова.'
vocabulary_hints:
  required:
  - учора — про день перед сьогоднішнім
  - робити — загальне дієслово дії
  - читати — дієслово про книжки й тексти
  - працювати — дієслово про роботу
  - гуляти — дієслово про прогулянку
  - готувати — дієслово про приготування
  - дивитися — дієслово про перегляд
  - говорити — дієслово про мовлення
  recommended:
  - минулий — прикметник про те, що вже було
  - вихідні — дні відпочинку наприкінці тижня
  - субота — назва дня тижня
  - неділя — назва дня тижня
  - разом — спільно, не окремо
  - фільм — назва твору для перегляду
  - провести — про час, прожитий певним способом
activity_hints:
- type: fill-in
  focus: Утворіть минулий час (він / вона / вони) для основних дієслів
  items:
  - Учора він {читав|читала|читати} книжку.
  - Олена {готувала|готував|готували} вечерю.
  - Ми {гуляли|гуляв|гуляла} в парку.
  - Вони {працювали|працював|працювало} разом.
  - Тарас {дивився|дивилася|дивилися} фільм.
  - Що ти {робив|робила|робили} учора, Іване?
- type: matching
  focus: З'єднайте займенник із правильним закінченням минулого часу
  pairs:
  - він: працював
  - вона: працювала
  - воно: працювало
  - вони: працювали
  - Тарас: говорив
  - Олена: говорила
- type: fill-in
  focus: Виберіть правильний рід залежно від підмета
  items:
  - Марія {дивилася|дивився|дивилися} фільм.
  - Мій брат {гуляв|гуляла|гуляли} у парку.
  - Вони {провели|провів|провела} вихідні разом.
