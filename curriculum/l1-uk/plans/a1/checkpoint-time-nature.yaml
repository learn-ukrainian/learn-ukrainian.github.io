module: a1-027
level: A1
sequence: 27
slug: checkpoint-time-nature
track: l1-uk
version: '2.0.0'
title: 'Підсумок: Час і природа'
subtitle: Чи вмієте ви називати час, планувати тиждень та описувати погоду?
focus: review
pedagogy: PPP
phase: A1.4 [Час і природа]
word_target: 1200
objectives:
- Називати час і використовувати вирази "о/об" + час
- Називати дні, місяці та пори року з правильними прийменниками
- Описувати погоду за допомогою безособових конструкцій
- Розповідати зв'язну історію про свій звичайний день
- Обговорювати хобі та планувати справи, використовуючи слова на позначення частоти дії
dialogue_situations:
- setting: Спільне планування подорожі автомобілем — дати, погода, розклад
  speakers:
  - Організатор
  - Друзі
  motivation: 'Закріплення: час, календар, погода, розпорядок дня'
content_outline:
- section: Що ми знаємо?
  words: 200
  points:
  - 'Самоперевірка за темами M22-M26: Чи вмієте ви називати час? (M22) Чи можете назвати дні та місяці? (M23) Чи вмієте описувати погоду? (M24) Чи можете описати свій день? (M25) Чи можете говорити про хобі? (M26)'
- section: Читання
  words: 250
  points:
  - 'Короткий український текст (8-10 речень) з використанням лексики з M22-M26. Зміст: людина описує свій звичайний тиждень — розклад, погоду, хобі. Приклад: У понеділок я працюю з дев''ятої до п''ятої. У вівторок вивчаю українську. Влітку я часто гуляю. Взимку ходжу в кіно. Мені подобається осінь.'
- section: Граматика
  words: 200
  points:
  - 'Ключові конструкції з A1.4: 1. Час: Котра година? О котрій? (конструкції з порядковими числівниками) 2. Дні: у понеділок, в суботу (конструкції знахідного відмінка) 3. Місяці: у січні, в серпні (конструкції місцевого відмінка) 4. Пори року: взимку, навесні, влітку, восени 5. Погода: холодно, тепло, іде дощ, іде сніг 6. Послідовність: спочатку, потім, нарешті 7. Частота дії: завжди, часто, іноді, рідко, ніколи'
- section: Діалог
  words: 300
  points:
  - 'Комплексна розмова, що поєднує всі навички A1.4: Планування відпочинку на вихідні. — Яка завтра погода? — Тепло і сонячно. — Чудово! Ходімо в парк! О котрій? — О десятій ранку. — Добре! Я часто гуляю в суботу. — А потім ходімо в кіно! — О п''ятій? — Так! Використовується: час, день, погода, запрошення, частота дії.'
- section: Підсумок
  words: 250
  points:
  - 'Огляд досягнень A1.4: Тепер ви вмієте говорити про час, розклад та навколишній світ. Ви вмієте називати час і призначати зустрічі. Ви можете назвати всі дні, місяці та пори року. Ви вмієте описувати погоду. Ви можете розповісти про свій день. Ви вмієте обговорювати хобі та будувати плани. Далі: A1.5 — Місця (місто, напрямки, транспорт).'
vocabulary_hints:
  required: []
  recommended: []
activity_hints:
- type: fill-in
  focus: Змішане повторення конструкцій часу, днів та погоди
  items:
  - Зустріч {о п'ятій|в п'ятій|у п'ята} годині.
  - Ми йдемо в кіно {у суботу|в суботі|на суботу}.
  - Мій день народження {у січні|в січень|січень}.
  - Сьогодні {іде дощ|іде дощова|дощить} і холодно.
  - Взимку дуже {холодно|спекотно|тепло}.
  - Я прокидаюся о сьомій {ранку|рано|вранці}.
- type: match-up
  focus: З'єднайте запитання з логічними відповідями
  pairs:
  - Котра година? ↔ Десята тридцять.
  - О котрій зустріч? ↔ О першій.
  - Яка сьогодні погода? ↔ Тепло і сонячно.
  - Коли твій день народження? ↔ У жовтні.
  - Що ти робиш у суботу? ↔ Граю у футбол.
  - Як часто ти читаєш? ↔ Кожен день ввечері.
  - Ходімо в парк! ↔ Добре, о котрій?
  - Що ти будеш робити завтра? ↔ Буду працювати.
- type: fill-in
  focus: Доповніть абзац з описом дня
  items:
  - '{Спочатку|Потім|Нарешті} я прокидаюся і снідаю.'
  - '{Потім|Вранці|Вночі} я йду на роботу.'
  - Я працюю з дев'ятої {до|і|по} п'ятої.
  - '{Після обіду|Вранці|Вночі} я гуляю в парку.'
  - Я гуляю, тому що сьогодні {тепло|холодно|дощ} і сонячно.
  - '{Ввечері|Вдень|Вранці} я вечеряю і слухаю музику.'
  - '{Нарешті|Спочатку|Потім} я лягаю спати о дванадцятій.'
