module: a1-049
level: A1
sequence: 49
slug: yesterday
track: l1-uk
version: '2.0.0'
title: Учора
subtitle: Учора я прокинувся, поснідав і пішов — розповідь про свій день
focus: communicative
pedagogy: PPP
phase: A1.8 [Минуле, майбутнє, випускний]
word_target: 1200
objectives:
- Вміти розповідати про свій минулий день, послідовно вживаючи дієслова минулого часу
- Використовувати слова-маркери часу для структурування розповіді (зранку, вдень, ввечері)
- Поєднувати минулий час із засвоєною лексикою (їжа, місця, люди)
- Складати коротку власну розповідь про те, що відбулося вчора
dialogue_situations:
- setting: 'Заява в поліцію — опис викраденого велосипеда (m): Я припаркував велосипед біля магазину (m). Потім зайшов у кав''ярню (f). Коли вийшов, велосипед зник. Бачив чоловіка (m) в куртці (f) та кепці (f).'
  speakers:
  - Свідок
  - Поліцейський
  motivation: Розповідь у минулому часі зі словами велосипед(m), магазин(m), кав'ярня(f), куртка(f)
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Як минув твій день? — Як пройшов твій день? — Добре! Зранку я прокинувся о сьомій. — Що ти робив зранку? — Я поснідав і пішов на роботу. — А вдень? — Вдень я працював і обідав з колегою. — А ввечері? — Ввечері я дивився фільм і рано ліг спати. Розповідь про події цілого дня з використанням маркерів часу.'
  - 'Діалог 2 — Чудові вихідні: — Що ти робила у суботу? — О, я мала чудовий день! — Розкажи! — Зранку я ходила на ринок і купила фрукти. — А потім? — Потім я готувала обід. А вдень гуляла в парку. — А ввечері? — Ввечері ми з подругою ходили в ресторан. — Як файно! Побудова послідовності за допомогою слів «потім», «а потім».'
- section: Розповідь про день
  words: 300
  points:
  - 'Слова-маркери часу для структурування розповіді: зранку, вдень, ввечері, вночі. Сполучні слова для вираження послідовності: спочатку, потім, після цього, нарешті. Ці слова об''єднують окремі речення в єдину історію: Спочатку я поснідав. Потім я пішов на роботу. Після цього я обідав.'
  - 'Дієслова щоденної рутини в минулому часі (всі роди): прокинутися → прокинувся / прокинулася; поснідати → поснідав / поснідала; піти → пішов / пішла; обідати → обідав / обідала; повернутися → повернувся / повернулася; лягти спати → ліг / лягла спати.'
- section: Мій учорашній день
  words: 300
  points:
  - 'Зразок розповіді — вчорашній день Анни: Учора був звичайний день. Зранку я прокинулася о пів на сьому. Я поснідала — їла кашу і пила каву. Потім я пішла на роботу. Вдень я обідала в кафе біля офісу. Я замовила салат і сік. Після роботи я ходила в магазин і купила продукти. Ввечері я готувала вечерю і дивилася серіал. О одинадцятій я лягла спати. Зверніть увагу: усі дієслова мають закінчення -ла, оскільки Анна — жінка.'
  - 'Ваша черга — побудуйте власну розповідь: Скористайтеся шаблоном: Учора... Зранку я... Потім... Вдень... Ввечері... Поєднуйте дієслова минулого часу з назвами місць (кафе, парк, магазин), їжі (каша, кава, салат) та людей (друг, колега, подруга). Тут об''єднується все, що ви вивчили на рівні А1.'
- section: Підсумок
  words: 300
  points:
  - 'Інструментарій для розповіді. Структурування за часом: зранку → вдень → ввечері → вночі. Сполучні слова для послідовності: спочатку, потім, після цього, нарешті. Форми минулого часу для повсякденних дій: прокинувся/-лася, поснідав/-ла, пішов/пішла, обідав/-ла, повернувся/-лася, ліг/лягла спати. Граматична послідовність у роді: чоловіки використовують форми на -в/-вся в усьому тексті, жінки використовують форми на -ла/-лася. Самоперевірка: Розкажіть історію про свій вчорашній день, використовуючи щонайменше 5 дієслів.'
vocabulary_hints:
  required:
  - учора — прислівник часу
  - зранку — маркер часу
  - вдень — маркер часу
  - ввечері — маркер часу
  - потім — слово послідовності
  - прокинутися — дієслово доконаного виду
  - поснідати — дієслово доконаного виду
  - обідати — дієслово недоконаного виду
  recommended:
  - спочатку — слово послідовності
  - нарешті — слово завершення послідовності
  - повернутися — дієслово руху
  - лягти — дієслово доконаного виду
  - звичайний — прикметник
  - продукти — іменник у множині
  - серіал — іменник, чол. р.
  - колега — іменник спільного роду
activity_hints:
- type: ordering
  focus: Розташуйте повсякденні дії в хронологічному порядку
  items:
  - Зранку я прокинувся.
  - Спочатку я поснідав.
  - Потім я пішов на роботу.
  - Вдень я обідав з колегою.
  - Ввечері я повернувся і дивився серіал.
  - Нарешті я ліг спати.
- type: fill-in
  focus: Доповніть розповідь маркерами часу та послідовними дієсловами
  items:
  - Учора {зранку|вдень|потім} я прокинулася о сьомій.
  - '{Спочатку|Нарешті|Вночі} я поснідала.'
  - '{Потім|Зранку|Ввечері} я пішла на роботу.'
  - Вдень я {обідала|обідав|обідали} в кафе.
  - '{Ввечері|Вдень|Зранку} я готувала вечерю.'
  - О десятій я {лягла|ліг|лягли} спати.
- type: fill-in
  focus: Потренуйтеся у збереженні роді дієслів у розповіді (Мовець — жінка, Анна)
  items:
  - Я мала звичайний день. Я {прокинулася|прокинувся} рано.
  - Потім я {поснідала|поснідав}.
  - Після цього я {пішла|пішов} у магазин.
  - Там я {купила|купив} продукти.
connects_to:
