grammar:
- Минулий час у зв'язній розповіді (а не в ізольованих реченнях)
- 'Слова-маркери часу: зранку, вдень, ввечері, вночі'
- 'Сполучні слова для вираження послідовності: спочатку, потім, після цього, нарешті'
- Граматична послідовність дієслів у роді протягом усієї розповіді
register: розмовний
references:
- title: State Standard 2024, §4.2.4.1
  notes: Використання минулого часу в контексті розповіді.
