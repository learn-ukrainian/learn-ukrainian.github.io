module: a1-015
track: l1-uk
level: A1
sequence: 15
slug: what-i-like
version: '2.0.0'
title: Що я люблю
subtitle: Я люблю читати — ваші перші дієслова
focus: grammar
pedagogy: PPP
phase: A1.3 [Дії]
word_target: 1200
objectives:
- Вміти використовувати «люблю» + інфінітив, щоб розповісти про те, що вам подобається робити
- Вміти використовувати сталу фразу «мені подобається» + іменник, щоб висловити вподобання
- Розпізнавати форму українського інфінітива (закінчення -ти)
- Розповідати про хобі та інтереси за допомогою простих дієслівних конструкцій
dialogue_situations:
- setting: Перший день на мовному обміні — розмова про хобі за чаєм
  speakers:
  - Анна
  - Віктор
  motivation: '«Люблю» + інфінітив: Люблю читати, Люблю малювати'
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Запитуємо про інтереси співрозмовника (за зразком ULP Ep14): — Що ти любиш робити? — Я люблю читати і слухати музику. — А я люблю готувати. — Правда? Що ти готуєш? Інфінітиви природно вводяться через конструкцію «люблю + дієслово».'
  - 'Діалог 2 — Опис уподобань: — Тобі подобається ця книга? — Так, мені подобається. — А цей фільм? — Ні, мені не подобається. Мені подобається музика. «Подобається» подається як стала фраза — граматика давального відмінка ТУТ НЕ аналізується.'
- section: Я люблю...
  words: 300
  points:
  - 'Люблю + інфінітив (те, що вам подобається робити): Я люблю читати. Я люблю гуляти. Я люблю готувати. Я люблю слухати музику. Схема: підмет + люблю + інфінітив (закінчення -ти). Інфінітив = словникова форма дієслова, що завжди закінчується на -ти.'
  - 'Поширені інфінітиви для позначення хобі (нова лексика): читати, гуляти, готувати, слухати, дивитися, грати, малювати, подорожувати, співати. Вимова: наголос в інфінітивах може падати на різні склади — їх треба запам''ятовувати.'
- section: Мені подобається...
  words: 300
  points:
  - 'Два способи сказати про свої вподобання — різна граматика, але однакове значення на рівні А1: Я люблю + інфінітив = мені подобається щось робити. Мені подобається + іменник = мені подобається щось (якась річ). Мені подобається музика. Мені подобається ця книга. Мені подобається Київ. Зверніть увагу: «мені подобається» — це стала фраза, ми не аналізуємо ЧОМУ саме «мені» (давальний відмінок). Просто використовуємо її.'
  - 'Заперечення: Я не люблю / Мені не подобається: Я не люблю готувати. Мені не подобається цей фільм. Питання: Ти любиш читати? Тобі подобається? Зверніть увагу: дієслово «люблю» змінюється за особами (я люблю, ти любиш) — повне відмінювання розглядатиметься в М17 (Дієвідміна II).'
- section: Підсумок
  words: 300
  points:
  - 'Дві конструкції для висловлення вподобань: 1. Я люблю + інфінітив (-ти) — для дій 2. Мені подобається + іменник — для речей. Заперечення: частка «не» ставиться перед дієсловом (не люблю, не подобається). Самоперевірка: Назвіть 3 дії, які ви любите виконувати (Я люблю...). Назвіть 2 речі, які вам подобаються (Мені подобається...). Назвіть 1 річ, яка вам не подобається (Я не люблю... / Мені не подобається...).'
vocabulary_hints:
  required:
  - любити — дієслово вподобання
  - подобатися — дієслово для конструкції «мені подобається»
  - читати — інфінітив
  - гуляти — інфінітив
  - готувати — інфінітив
  - слухати — інфінітив
  - дивитися — інфінітив
  - грати — інфінітив
  recommended:
  - малювати — інфінітив
  - подорожувати — інфінітив
  - співати — інфінітив
  - музика — іменник, ж. р.
  - фільм — іменник, ч. р.
  - книга — повторення з М08
