module: a1-033
level: A1
sequence: 33
slug: around-the-city
track: l1-uk
version: '2.0.0'
title: У місті
subtitle: Де/куди + напрямки — орієнтування містом українською
focus: communication
pedagogy: PPP
phase: А1.5 [Місця]
word_target: 1200
objectives:
- Поєднувати "Де?" (місцевий відмінок) та "Куди?" (знахідний відмінок) у реальному орієнтуванні
- Давати та розуміти прості вказівки напрямку
- Описувати свій район та щоденні маршрути
- Синтезувати навички з модулів M28-M32 у зв'язному міському спілкуванні
dialogue_situations:
- setting: Пішохідна екскурсія старим містом Львова — йдемо від Площі Ринок (f) до Оперного театру (m), а потім до Високого замку (m). Де ми? На площі. Куди далі? В театр. Звідки прийшли? З замку.
  speakers:
  - Гід (guide)
  - Туристи
  motivation: 'Де/Куди/Звідки зі словами площа(f), театр(m), замок(m), парк(m)'
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Питаємо дорогу: — Вибачте, як дістатися до бібліотеки? — Ідіть прямо, потім направо. Бібліотека на розі. — А музей? — Музей далеко. Їдьте на метро до центру. Поєднує напрямки + транспорт + місця в місті.'
  - 'Діалог 2 — Описуємо свій маршрут: — Як ти дістаєшся на роботу? — Спочатку йду на зупинку. Потім їду автобусом до центру. — А потім? — Потім іду пішки п''ять хвилин. Робота в офісі на площі. Щоденний маршрут із використанням слів послідовності + транспорт + місця.'
- section: Де і куди разом
  words: 300
  points:
  - 'Реальне орієнтування використовує обидва відмінки разом: Я зараз у парку (де? — місцевий). Я йду в магазин (куди? — знахідний). Магазин на вулиці Шевченка (де? — місцевий). Потім їду на роботу (куди? — знахідний). Постійне перемикання між де? та куди? є природним для української мови.'
  - 'Шаблони прийменників (синтез): | Ситуація | Питання | Форма | | Статична | Де ти? | в/на + місцевий | | Напрямок | Куди йдеш? | в/на + знахідний | | Транспортом | Як? Чим? | автобусом / на метро | | Відстань | Далеко? | далеко / близько / пішки |'
- section: Мій район
  words: 300
  points:
  - 'Описуємо місце, де ви живете: Я живу на вулиці Франка. Біля мого дому є парк і магазин. Школа далеко — треба їхати автобусом. Аптека близько, можна піти пішки. У моєму районі є кафе, ресторан і бібліотека.'
  - 'Корисні фрази для життя в місті: пішки, хвилина — П''ять хвилин пішки. далеко/близько від. У центрі міста / на околиці.'
- section: Підсумок
  words: 300
  points:
  - 'Інструментарій для міського спілкування: Запитання: Де...? Як дістатися до...? Напрямки: прямо, направо, наліво. Розташування: в/на + місцевий, в/на + знахідний. Транспорт: автобусом, на метро, пішки. Самоперевірка: Опишіть свій маршрут від дому до роботи/школи.'
vocabulary_hints:
  required:
  - пішки
  - хвилина
  - район
  - центр
  - вибачте
  recommended:
  - дістатися
  - ідіть — наказова форма
  - їдьте — наказова форма для руху транспортом
  - поруч
activity_hints:
- type: fill-in
  focus: Вказувати напрямок, використовуючи прямо, направо, наліво
  items: 6
  blanks:
  - Ідіть {прямо}, потім {направо}. Бібліотека на розі.
  - Вибачте, як дістатися до музею? — Ідіть {наліво}.
  - Аптека близько. Ідіть {прямо} п'ять хвилин.
  - Потім ідіть {направо}, школа там.
  - Йдіть {прямо}, а потім {наліво}.
  - Ресторан поруч. Ідіть {прямо} і {направо}.
- type: quiz
  focus: '"Де" (місцевий відмінок) або "Куди" (знахідний відмінок) у контексті'
  items: 6
  questions:
  - Я зараз... (в парку / в парк)
  - Я йду... (в магазин / в магазині)
  - Магазин на... (вулиці / вулицю)
  - Потім їду на... (роботу / роботі)
  - Ми зараз у... (центрі / центр)
  - Вона йде в... (офіс / офісі)
- type: fill-in
  focus: Описати маршрут за допомогою транспорту (автобусом, пішки, на метро)
  items: 6
  blanks:
  - Я їду в центр {на метро}.
  - Потім іду {пішки} п'ять хвилин.
  - Вона їде на роботу {автобусом}.
  - Школа далеко, треба їхати {на метро}.
  - Парк близько, ми йдемо {пішки}.
  - Ми їдемо в ресторан {автобусом}.
- type: match-up
  focus: З'єднати питання з логічною відповіддю для орієнтування
  items: 6
  pairs:
  - Вибачте, як дістатися до бібліотеки?: Ідіть прямо, потім направо.
  - Де музей?: Він у центрі.
  - Як ти дістаєшся на роботу?: Їду автобусом.
  - Школа далеко?: Ні, близько. П'ять хвилин пішки.
  - Куди ви йдете?: У магазин.
  - Де ти живеш?: На вулиці Франка.
connects_to:
- a1-034 (Звідки?)
prerequisites:
- a1-032 (Транспорт)
grammar:
- 'Синтез: Де? (місцевий відмінок) + Куди? (знахідний відмінок) у реальному орієнтуванні'
- Напрямок + транспорт + розташування в поєднанні
- 'Ознайомлення з наказовим способом: ідіть, їдьте (ввічливі форми наказів)'
register: розмовний
references:
- title: Synthesis of M28-M32 skills
  notes: Прикладне спілкування — без нової граматики, лише інтеграція.
- title: Большакова Grade 2, розділ «Моє місто»
  notes: Базова лексика напрямків (прямо, направо, наліво), описи районів, запитання/вказівки дороги на рівні А1.
