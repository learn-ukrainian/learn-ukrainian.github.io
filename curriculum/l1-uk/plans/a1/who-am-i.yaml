grammar:
- "Особові займенники: я, ти, він, вона, ми, ви, вони (лише називний відмінок)"
- Конструкція «Мене звати» (безособова)
- Вказівна частка «це» + іменник
- Нульова зв'язка (Я — студент, пропуск дієслова «є»)
- Лексика на позначення національностей та професій (називний відмінок)
- Конструкція «Звідки?» + назва країни як стала фраза (БЕЗ пояснення граматики родового відмінка)
register: розмовний
