# План l1-uk — україномовний модуль A1 who-am-i
# Відгалужено від curriculum/l2-uk-en/plans/a1/who-am-i.yaml v1.1.1
# Відгалужено 2026-04-22 як частина пакету форків A1+A2
module: a1-005
level: A1
sequence: 5
slug: who-am-i
track: l1-uk
version: '2.0.0'
title: Хто я?
subtitle: Мене звати... — ваша перша справжня розмова
focus: vocabulary
pedagogy: PPP
phase: A1.1 [Звуки, літери та перший контакт]
word_target: 1200
objectives:
- Вміти представити себе, назвавши своє ім'я, національність і професію
- Використовувати конструкцію з часткою «це» для ідентифікації предметів і людей
- Вміти ставити запитання «Як тебе/вас звати?» та відповідати на нього формально і неформально
- Розуміти структуру українського речення без дієслова-зв'язки «бути» (Я — студент)
dialogue_situations:
- setting: Кімната відпочинку в хостелі — два туристи з рюкзаками вперше зустрічаються
  speakers:
  - Марко
  - Олена
  motivation: Мене звати, Звідки ти? — контекст реального першого знайомства
- setting: Орієнтаційний день в університеті — студенти представляються групі
  speakers:
  - Тарас
  - Софія
  motivation: Формальний та неформальний регістри, назви професій із конструкцією Я — студент
content_outline:
- section: Діалоги
  words: 350
  points:
  - 'Діалог 1 — У хостелі (неформальний, за зразком Anna Ep3): — Привіт! Як тебе звати? — Мене звати Марко. А тебе? — Мене звати Олена. Звідки ти? — Я з Канади. А ти? — Я з України. — Дуже приємно!'
  - 'Діалог 2 — На конференції (формальний, за зразком Anna Ep3-4): — Добрий день! Як вас звати? — Мене звати Петро. Дуже приємно! — Мені також! Ви з України? — Так, я з Києва.'
  - 'Діалог 3 — Представлення когось іншого: Це Андрій. Він зі Львова. Він — інженер. А це Оксана. Вона з Одеси. Вона — лікарка.'
- section: Мене звати...
  words: 250
  points:
  - 'За зразком Anna Ep3: Конструкція «Мене звати...» є безособовою. В українській мові для представлення себе дієслово-зв''язка «є» не потрібне. Питання: Як тебе звати? (неформально) / Як вас звати? (формально). Про інших: Як його звати? / Як її звати?.'
  - 'Приємно познайомитись: Дуже приємно! або Приємно познайомитись! Ця фраза звучить ПІСЛЯ обміну іменами.'
- section: Це...
  words: 200
  points:
  - 'Займенник «це» використовується для вказівки на щось або когось. Дієслово-зв''язка «є» тут також не потрібне. Це кава. Це Київ. Це Андрій. Питання: Що це? Хто це? Питальні слова завжди стоять НА ПОЧАТКУ речення: Хто це? (не *Це хто?).'
- section: Особові займенники
  words: 100
  points:
  - 'Базові особові займенники: я, ти (неформально), він, вона, ми, ви (формально/множина), вони. Зверніть увагу: «ви» використовується як для ввічливого звертання до однієї особи, так і для звертання до кількох осіб (на письмі при ввічливому звертанні часто пишеться з великої літери — Ви). Ці займенники знадобляться для побудови будь-якого речення.'
- section: Я — студент
  words: 150
  points:
  - 'У теперішньому часі дієслово-зв''язка «є» пропускається. Підмет — Іменник: Я — студент. Він — лікар. Вона — вчителька. Тире (—) позначає місце, де в інших мовах стояло б дієслово «бути».'
  - 'Національності (називний відмінок, без дієслова): українець / українка, американець / американка, канадієць / канадка. Професії: студент/студентка, вчитель/вчителька, лікар/лікарка, програміст/програмістка.'
- section: Звідки?
  words: 200
  points:
  - 'За зразком Anna Ep4: Звідки ти? / Звідки ви? Я з України. Я з Канади. Я зі Штатів. Я з Німеччини. Зверніть увагу: у конструкції «з/зі + країна» використовуються форми родового відмінка (України, Канади), але ми подаємо їх як ЗАВЧЕНІ ФРАЗИ, оскільки граматика родового відмінка вивчається на рівні А2. На цьому етапі НЕ вводьте питання «Де ви живете?» — використання місцевого відмінка та дієвідмінювання вивчатимуться пізніше (дієслова в М16, місцевий відмінок у М29).'
- section: Підсумок
  words: 0
  points:
  - 'Самоперевірка включена до практики діалогів, наведеної вище.'
vocabulary_hints:
  required:
  - я
  - ти — неформальне звертання
  - він
  - вона
  - ви — формальне звертання / множина
  - мене звати
  - як тебе звати? — неформально
  - як вас звати? — формально
  - це
  - дуже приємно
  - студент, студентка
  - вчитель, вчителька
  - лікар, лікарка
  - українець, українка
  - Україна
  recommended:
  - ми
  - вони
  - програміст, програмістка
  - інженер, інженерка
  - звідки
  - друг
  - його — форма не змінюється
  - її — форма не змінюється
  - Канада
  - Німеччина
