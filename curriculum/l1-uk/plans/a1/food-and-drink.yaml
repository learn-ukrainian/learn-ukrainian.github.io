module: a1-036
level: A1
sequence: 36
slug: food-and-drink
track: l1-uk
version: '2.0.0'
title: Їжа та напої
subtitle: Їжа і напої — що українці їдять і п'ють
focus: vocabulary
pedagogy: PPP
phase: A1.6 [Їжа та покупки]
word_target: 1200
objectives:
- Називати поширені українські страви та напої
- Вживати «кава з молоком», «чай з цукром» як завчені фрази (НЕ як граматику орудного відмінка)
- Розповідати про те, що ви їсте і п'єте щодня
- Розпізнавати знакові українські страви (борщ, вареники, сало)
dialogue_situations:
- setting: 'Приготування борщу з бабусею — перелік інгредієнтів: буряк, картопля, капуста, м''ясо, морква, цибуля, сметана.'
  speakers:
  - Бабуся (teaching)
  - Онучка (learning)
  motivation: Їжа зі словами буряк (m), картопля (f), капуста (f), м'ясо (n), сметана (f)
content_outline:
- section: Діалоги
  words: 300
  points:
  - 'Діалог 1 — Вранці вдома: — Що ти хочеш на сніданок? — Каву з молоком і хліб з маслом. — А я хочу чай з цукром і кашу. Поєднання їжі та напоїв як фрази (з + іменник = завчена фраза).'
  - 'Діалог 2 — Розмова про вподобання в їжі: — Що ти зазвичай їш на обід? — Суп і салат. — А на вечерю? — М''ясо з картоплею або рибу з рисом. Три прийоми їжі: сніданок, обід, вечеря.'
- section: Їжа
  words: 300
  points:
  - 'Основна лексика їжі за категоріями: Хліб і каша: хліб, каша, рис, макарони. М''ясо і риба: м''ясо, курка, риба. Овочі: картопля, морква, цибуля, помідор, огірок. Фрукти: яблуко, банан, апельсин. Молочне: молоко, сир, масло, сметана, йогурт. Інше: яйце, цукор, сіль, олія.'
  - 'Знакові українські страви (культурна довідка): борщ (beet soup — національна страва), вареники, сало, галушки, деруни. Ці слова — культурна ідентичність, а не просто лексика.'
- section: Напої
  words: 300
  points:
  - 'Основна лексика напоїв: Гарячі: кава, чай. Холодні: вода, сік, компот, лимонад. Молочні: молоко, кефір. Алкогольні: пиво, вино (для розпізнавання). Ключова конструкція фрази: [напій] з [додаток] — завчена фраза, НЕ граматика: кава з молоком, чай з цукром, чай з лимоном, вода з газом.'
  - 'Чому «з + іменник» — це фраза, а не граматика: На рівні A1 вивчайте «кава з молоком» як сталий вираз, подібно до «coffee with milk». Закінчення орудного відмінка (-ом, -ою) — це граматика для рівня A2. Наразі: запам''ятовуйте всю фразу цілком. Вимовляйте її як одне ціле.'
- section: Підсумок
  words: 300
  points:
  - 'Інструментарій їжі та напоїв: Що ти хочеш? — Каву з молоком. / Хліб з маслом. Що ти їш на сніданок / обід / вечерю? Три прийоми їжі: сніданок, обід, вечеря. Самоперевірка: Назвіть 5 страв і 3 напої, які вам подобаються. Назвіть одну українську страву і поясніть, чому вона важлива.'
