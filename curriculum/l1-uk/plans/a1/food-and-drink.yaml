activity_hints:
- type: match-up
  focus: Зіставте українські слова про їжу та напої з відповідниками
  items: 10
  pairs:
  - хліб: bread
  - м'ясо: meat
  - риба: fish
  - молоко: milk
  - вода: water
  - сік: juice
  - сніданок: breakfast
  - обід: lunch
  - вечеря: dinner
  - суп: soup
- type: group-sort
  focus: Розподіліть за категоріями Їжа та Напої
  items: 10
  groups:
  - name: Їжа
    items:
    - хліб
    - м'ясо
    - риба
    - суп
    - каша
  - name: Напої
    items:
    - кава
    - чай
    - вода
    - сік
    - молоко
- type: fill-in
  focus: Використовуйте «з + іменник» як завчені фрази для додатків
  items: 6
  blanks:
  - Я хочу каву {з молоком}.
  - Вона п'є чай {з цукром}.
  - Він їсть хліб {з маслом}.
  - Я люблю чай {з лимоном}.
  - Дайте, будь ласка, воду {з газом}.
  - Ми їмо м'ясо {з картоплею}.
- type: quiz
  focus: Визначте прийоми їжі та знакові українські страви
  items: 6
  questions:
  - Що ми їмо вранці? (сніданок / обід / вечерю)
  - Що ми їмо ввечері? (вечерю / сніданок / обід)
  - Традиційний український суп — це... (борщ / каша / вода)
  - 'Українська страва з тіста і картоплі або сиру: (вареники / сало / хліб)'
  - 'Популярний холодний напій з фруктів: (компот / борщ / кава)'
  - Що ми їмо вдень? (обід / сніданок / вечерю)
