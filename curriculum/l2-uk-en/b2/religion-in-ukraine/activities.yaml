version: '1.0'
module: religion-in-ukraine
level: b2

inline:
  - id: act-1
    type: reading
    title: Конфесійна точність
    instruction: Прочитайте фрагмент і визначте, які терміни допомагають уникнути узагальнення.
    text: >-
      У місті діють православна парафія, греко-католицька спільнота,
      протестантська молодіжна група, мусульманська громада і синагога. Усі вони
      можуть брати участь у благодійності, але їхні обряди, простори і
      організаційні структури різні.
    source: Навчальний фрагмент для модуля B2.
    tasks:
      - Які п'ять релігійних спільнот названо?
      - Чому слово "церква" не підходить для всіх прикладів?
      - Які два типи відмінностей згадані у фрагменті?
      - Як можна переформулювати перше речення офіційнішим стилем?
      - Який термін з модуля означає релігійну належність або традицію?

  - id: act-2
    type: critical-analysis
    title: Релігійна мозаїка без екзотизації
    instruction: Проаналізуйте, чому точний опис ісламу в Україні важливий для культурної грамотності.
    target_text: >-
      Іслам в Україні пов'язаний не лише з міграцією, а й із кримськотатарською
      історією, пам'яттю про депортацію, мечетями, родинними обрядами і правами
      корінного народу.
    questions:
      - Яке спрощення заперечує цей фрагмент?
      - Які елементи кримськотатарського контексту названо?
      - Чому слово "екзотичний" було б недоречним?
      - Як цей приклад розширює уявлення про українську культуру?
      - Яку тему громадянських прав можна додати?
    model_answers:
      - Він заперечує уявлення, що іслам в Україні є лише зовнішньою або новою присутністю.
      - Історія, депортація, мечеті, родинні обряди і права корінного народу.
      - Воно робить громаду чужою прикрасою, а не частиною країни.
      - Українська культура постає багатоконфесійною і пов'язаною з Кримом.
      - Можна додати свободу совісті або права кримськотатарського народу.

  - id: act-3
    type: critical-analysis
    title: Свято як багатошаровий досвід
    instruction: Визначте різні рівні релігійного свята.
    target_text: >-
      Для однієї родини Різдво починається з літургії і коляди. Для іншої це
      передусім родинна вечеря і пам'ять про дім. Для третьої громади свято
      стає нагодою організувати благодійний збір.
    questions:
      - Які три рівні свята показано?
      - Чому культурне значення не скасовує релігійного?
      - Яка дія перетворює свято на соціальну підтримку?
      - Як описати цей приклад без твердження, що всі святкують однаково?
    model_answers:
      - Богослужбовий, родинно-культурний і благодійний.
      - Різні люди можуть переживати одне свято на різних рівнях.
      - Благодійний збір.
      - Можна сказати, що в різних громадах свято поєднує літургію, пам'ять і допомогу.

  - id: act-4
    type: critical-analysis
    title: Свобода совісті
    instruction: Поясніть, чому свобода совісті захищає і релігійних, і нерелігійних людей.
    target_text: >-
      Свобода совісті означає право мати, змінювати або не мати релігійних
      переконань, а також право сповідувати віру індивідуально чи спільно з
      іншими в межах закону.
    questions:
      - Які три можливості захищає свобода совісті?
      - Чому це поняття не стосується лише віруючих?
      - Яку межу задає фраза "в межах закону"?
      - Як це поняття пов'язане з багатоконфесійністю?
    model_answers:
      - Мати переконання, змінювати їх або не мати релігійної належності.
      - Воно захищає також право не належати до конфесії.
      - Практика не має порушувати права інших людей і закон.
      - Різні громади можуть існувати рівно перед законом.

workbook:
  - type: match-up
    title: Релігійні поняття
    instruction: Поєднайте термін із поясненням.
    pairs:
      - left: конфесія
        right: релігійна традиція або спільнота з власною належністю
      - left: парафія
        right: місцева громада вірян навколо храму
      - left: єпархія
        right: церковна адміністративна одиниця ширша за парафію
      - left: літургія
        right: центральне богослужіння з усталеною структурою
      - left: томос
        right: церковно-правовий документ про статус або визнання
      - left: мечеть
        right: місце мусульманської молитви і громади
      - left: синагога
        right: простір юдейської молитви, навчання і громади
      - left: обряд
        right: дія з усталеною формою і символічним значенням
      - left: свобода совісті
        right: право мати, змінювати або не мати релігійних переконань
      - left: капелан
        right: духовна особа, що підтримує людей у військовому або іншому середовищі
      - left: іконостас
        right: стіна з іконами, що має богослужбове і символічне значення
      - left: секуляризм
        right: принцип нейтральності держави щодо релігійних належностей

  - type: fill-in
    title: Точні слова про релігію
    instruction: Уставте найдоречніший термін.
    items:
      - sentence: "Місцева громада вірян навколо храму - це ____."
        answer: "парафія"
        options: [парафія, мечеть, секуляризм, томос]
        explanation: Парафія є локальною церковною громадою.
      - sentence: "Центральне богослужіння у християнській традиції називають ____."
        answer: "літургією"
        options: [літургією, юрисдикцією, синагогою, свободою]
        explanation: Літургія має усталену богослужбову структуру.
      - sentence: "Релігійну належність або традицію можна назвати ____."
        answer: "конфесією"
        options: [конфесією, капеланом, іконостасом, притвором]
        explanation: Конфесія є нейтральним словом для релігійної належності.
      - sentence: "Мусульманська громада може збиратися в ____."
        answer: "мечеті"
        options: [мечеті, синагозі, єпархії, томосі]
        explanation: Мечеть є простором мусульманської молитви.
      - sentence: "Юдейська громада пов'язана з простором ____."
        answer: "синагоги"
        options: [синагоги, ікони, літургії, капеланства]
        explanation: Синагога є простором молитви, навчання і громади.
      - sentence: "Право мати або не мати релігійних переконань - це свобода ____."
        answer: "совісті"
        options: [совісті, купола, обряду, парафії]
        explanation: Свобода совісті захищає різні переконання.
      - sentence: "Духовну підтримку військовим може надавати ____."
        answer: "капелан"
        options: [капелан, іконостас, патріархат, календар]
        explanation: Капелан служить у середовищі, де потрібна духовна підтримка.
      - sentence: "Принцип відокремлення державної політики від однієї конфесії називають ____."
        answer: "секуляризмом"
        options: [секуляризмом, паломництвом, обрядовістю, ієрархією]
        explanation: Секуляризм не є ворожістю до релігії, а правовим принципом.
      - sentence: "Усталена символічна дія, наприклад хрещення або вінчання, - це ____."
        answer: "обряд"
        options: [обряд, статут, переказ, рецензія]
        explanation: Обряд має форму, учасників і значення.
      - sentence: "Подорож до святого місця з духовною метою називають ____."
        answer: "паломництвом"
        options: [паломництвом, рецензуванням, асиміляцією, кореляцією]
        explanation: Паломництво пов'язане з духовною дорогою і місцем пам'яті.
      - sentence: "Стіна з іконами між навою і вівтарною частиною храму - це ____."
        answer: "іконостас"
        options: [іконостас, томос, секуляризм, паломництво]
        explanation: Іконостас є важливим елементом східнохристиянського храмового простору.
      - sentence: "Розмова між різними християнськими, мусульманськими, юдейськими або іншими громадами може бути ____."
        answer: "міжконфесійною"
        options: [міжконфесійною, безособовою, беззмістовною, монологічною]
        explanation: Міжконфесійний означає такий, що стосується кількох релігійних спільнот.

  - type: true-false
    title: Релігія і суспільство
    instruction: Позначте, чи відповідає твердження змісту модуля.
    items:
      - statement: "Українське релігійне життя можна описати лише однією конфесією."
        correct: false
        explanation: Україна має багатоконфесійний простір.
      - statement: "Парафія є місцевою громадою, а єпархія - ширшою церковною одиницею."
        correct: true
        explanation: Ці терміни належать до різних рівнів організації.
      - statement: "Іслам в Україні пов'язаний також із кримськотатарською історією."
        correct: true
        explanation: Кримськотатарський контекст є ключовим для теми ісламу в Україні.
      - statement: "Юдейську історію України відповідально описувати лише як трагедію."
        correct: false
        explanation: Треба бачити і живу культуру, і пам'ять про насильство.
      - statement: "Свобода совісті захищає право не мати релігійної належності."
        correct: true
        explanation: Це право стосується і релігійних, і нерелігійних людей.
      - statement: "Секуляризм обов'язково означає ворожість до релігії."
        correct: false
        explanation: У політичному сенсі це принцип нейтральності держави щодо конфесій.
      - statement: "Капеланство може включати слухання, ритуал і моральну підтримку."
        correct: true
        explanation: Капелан не лише виголошує проповідь.
      - statement: "Міжконфесійний діалог означає, що всі відмінності зникають."
        correct: false
        explanation: Діалог визнає відмінності і шукає спільну дію.
      - statement: "Релігійне свято може мати богослужбовий, родинний і благодійний рівні."
        correct: true
        explanation: Одне свято може виконувати кілька функцій.
      - statement: "Точне письмо про релігію має розрізняти віру, інституцію і політичну позицію."
        correct: true
        explanation: Це допомагає уникати упереджених узагальнень.
      - statement: "Іконостас можна описувати лише як декоративну стіну без символічного значення."
        correct: false
        explanation: Іконостас має богослужбову, мистецьку і символічну функцію.
      - statement: "Паломництво поєднує рух у просторі з духовною метою або пам'яттю."
        correct: true
        explanation: Саме поєднання дороги, місця і наміру робить це поняття точним.

  - type: select
    title: Оберіть відповідальне формулювання
    instruction: Виберіть речення, яке найкраще підходить для аналітичного тексту про релігію.
    items:
      - question: Як точніше описати багатоконфесійність?
        options:
          - text: В Україні співіснують різні релігійні традиції, громади і світські позиції.
            correct: true
          - text: Усі люди в Україні належать до однієї конфесії.
            correct: false
          - text: Релігійні відмінності не потребують термінів.
            correct: false
          - text: Достатньо сказати "церква" про всі традиції.
            correct: false
      - question: Яке речення не екзотизує іслам в Україні?
        options:
          - text: Іслам є частиною українського простору, зокрема через кримськотатарську історію.
            correct: true
          - text: Іслам в Україні є лише чужою прикрасою.
            correct: false
          - text: Мусульманські громади не мають історичного контексту.
            correct: false
          - text: Про Крим не треба згадувати в цій темі.
            correct: false
      - question: Як відповідально говорити про юдейську історію?
        options:
          - text: Показувати живу культуру, громади, трагедії і пам'ять про насильство.
            correct: true
          - text: Згадувати лише трагедію без культури.
            correct: false
          - text: Говорити лише про фольклор без Голокосту.
            correct: false
          - text: Уникати будь-якого історичного контексту.
            correct: false
      - question: Що означає свобода совісті?
        options:
          - text: Право мати, змінювати або не мати релігійних переконань.
            correct: true
          - text: Обов'язок належати до більшості.
            correct: false
          - text: Заборону на міжконфесійний діалог.
            correct: false
          - text: Право держави призначати віру кожній людині.
            correct: false
      - question: Яке речення найкраще описує капеланство?
        options:
          - text: Капелан надає духовну і моральну підтримку з повагою до свободи людини.
            correct: true
          - text: Капеланство є лише адміністративною посадою без людського контакту.
            correct: false
          - text: Капелан має ігнорувати переконання людини.
            correct: false
          - text: Капеланство не може існувати в кризових ситуаціях.
            correct: false
      - question: Який опис свята є найточнішим?
        options:
          - text: Свято може поєднувати богослужіння, родинну пам'ять і благодійну дію.
            correct: true
          - text: Усі люди переживають свято однаково.
            correct: false
          - text: Культурний рівень завжди скасовує релігійний.
            correct: false
          - text: Свято не має жодної соціальної функції.
            correct: false
      - question: Як уникнути чуток у тексті про релігію?
        options:
          - text: Перевірити джерело, дату, інституцію і позицію іншої сторони.
            correct: true
          - text: Поширити перший емоційний допис.
            correct: false
          - text: Зробити висновок про всю конфесію з одного прикладу.
            correct: false
          - text: Не відрізняти документ від коментаря.
            correct: false
      - question: Яка структура есе найкраще підходить для теми релігії та ідентичності?
        options:
          - text: Теза, історичний контекст, релігійна мозаїка, сучасна роль і межа висновку.
            correct: true
          - text: Лише список свят без пояснення.
            correct: false
          - text: Тільки особиста оцінка без понять.
            correct: false
          - text: Загальне твердження без прикладів.
            correct: false
      - question: Як найточніше описати іконостас?
        options:
          - text: Як елемент храмового простору з мистецькою, символічною і богослужбовою роллю.
            correct: true
          - text: Як випадкову прикрасу без зв'язку з традицією.
            correct: false
          - text: Як документ про церковний статус.
            correct: false
          - text: Як назву будь-якого релігійного свята.
            correct: false
      - question: Яке речення найкраще пояснює секуляризм?
        options:
          - text: Держава не ототожнює себе з однією конфесією і захищає свободу совісті.
            correct: true
          - text: Держава повинна висміювати всі релігії.
            correct: false
          - text: Секуляризм забороняє людям мати віру.
            correct: false
          - text: Секуляризм означає, що релігійних громад не існує.
            correct: false
      - question: Як відповідально описати паломництво?
        options:
          - text: Назвати місце, традицію, мету дороги і значення для учасників.
            correct: true
          - text: Подати його як туристичну розвагу без пояснення віри.
            correct: false
          - text: Зробити висновок про всіх вірян з одного маршруту.
            correct: false
          - text: Уникати будь-якого контексту місця.
            correct: false
      - question: Яка фраза найкраще передає міжконфесійний діалог?
        options:
          - text: Різні громади зберігають відмінності, але можуть співпрацювати для спільного добра.
            correct: true
          - text: Усі відмінності треба стерти перед розмовою.
            correct: false
          - text: Діалог можливий лише без історичної пам'яті.
            correct: false
          - text: У діалозі не потрібні точні назви конфесій.
            correct: false

  - type: critical-analysis
    id: wb-rite-context
    title: Обряд і контекст
    instruction: Напишіть короткий аналіз фрагмента, розрізняючи форму і значення.
    target_text: >-
      Для зовнішнього спостерігача обряд може виглядати як повтор тих самих
      рухів і слів. Для учасника він може бути способом пам'ятати, просити,
      дякувати, каятися або бути разом із громадою.
    questions:
      - Яку різницю між зовнішнім і внутрішнім поглядом показано?
      - Чому повтор не обов'язково означає порожню форму?
      - Які п'ять можливих значень обряду названо?
      - Як описати обряд із повагою, якщо ви не належите до цієї традиції?
    model_answers:
      - Зовнішній погляд бачить форму, а внутрішній - особисте й спільнотне значення.
      - Повтор може створювати пам'ять, дисципліну і спільний ритм.
      - Пам'ятати, просити, дякувати, каятися і бути разом.
      - Треба описати дію, контекст і значення без насмішки або привласнення.

