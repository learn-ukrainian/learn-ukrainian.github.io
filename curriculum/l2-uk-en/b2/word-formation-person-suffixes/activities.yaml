version: '1.0'
module: word-formation-person-suffixes
level: b2
inline: []
workbook:
  - type: reading
    id: person-suffixes-reading
    title: "Читання: як назва людини змінює тон тексту"
    instruction: "Прочитайте уривок і виконайте завдання про суфікси, значення та стиль."
    source: "Навчальний уривок для модуля B2."
    text: >-
      У пресрелізі громада спершу назвала всіх учасників проєкту волонтерами, але редакторка попросила уточнити ролі. Частина людей справді працювала як волонтери: вони зустрічали гостей і роздавали матеріали. Дослідниця підготувала аналітичну довідку, фахівець із комунікацій написав оголошення, координаторка узгодила графік, а місцеві кияни й полтавці допомогли з навігацією. У чернетці було слово «помічники», проте воно приховувало професійну відповідальність. Після редагування текст став точнішим: кожна назва особи показувала не лише людину, а й її функцію, місце в команді та стиль повідомлення.
    tasks:
      - "Випишіть три назви осіб із професійним значенням."
      - "Знайдіть одну назву за місцем проживання."
      - "Поясніть, чому слово «помічники» було менш точним."
      - "Доберіть фемінітив до слова «дослідник» і поясніть суфікс."
  - type: essay-response
    id: person-suffixes-essay
    title: "Мініесе: точність назви особи"
    instruction: "Напишіть 150-180 слів про те, як суфікс змінює точність і тон назви людини."
    prompt: "Оберіть три слова з модуля: одне професійне, один фемінітив і одну назву за місцем проживання. Поясніть, яку інформацію несе кожне слово, у якому стилі воно доречне і яку помилку може зробити автор, якщо утворює назву механічно."
    min_words: 150
    model_answer: "У слові «дослідник» суфікс -ник називає людину за діяльністю, тому воно доречне в науковому, освітньому або медійному контексті. Якщо йдеться про конкретну жінку, природніше написати «дослідниця», бо форма показує і професійну роль, і стать особи. Механічна форма на -ка тут була б помилковою. Назва «киянка» працює інакше: вона не називає професію, а показує локальну належність. У новині про транспорт це слово звучить живо й точно, але в юридичному документі може бути потрібне нейтральніше «мешканка Києва» або «громадянка України». Отже, суфікс дає коротку форму, але автор має перевірити значення, стиль і усталений ужиток."
    rubric:
      - criteria: "Словотвірний аналіз"
        description: "Пояснено основу, суфікс і значення трьох назв осіб."
        points: 2
      - criteria: "Стильова доречність"
        description: "Показано, у яких контекстах слова природні або ризиковані."
        points: 2
      - criteria: "Мовна точність"
        description: "Текст написано українською без механічного калькування."
        points: 1
  - type: quiz
    title: "Розпізнайте модель і стиль"
    instruction: "Оберіть найточнішу відповідь."
    items:
      - question: "Яке слово найкраще називає людину, що професійно досліджує тему?"
        options:
          - text: "дослідник"
            correct: true
          - text: "дослідження"
            correct: false
          - text: "дослідний"
            correct: false
          - text: "дослідково"
            correct: false
        explanation: "Суфікс -ник творить назву особи за діяльністю."
      - question: "Яка форма є природним фемінітивом до слова «працівник»?"
        options:
          - text: "працівниця"
            correct: true
          - text: "працівникка"
            correct: false
          - text: "працівника"
            correct: false
          - text: "працювальниця"
            correct: false
        explanation: "Для основ на -ник типовий перехід до -ниця."
      - question: "Яке слово має виразно негативне оцінне забарвлення?"
        options:
          - text: "брехун"
            correct: true
          - text: "бігун"
            correct: false
          - text: "учасник"
            correct: false
          - text: "редактор"
            correct: false
        explanation: "Брехун оцінює поведінку людини як нечесну."
      - question: "Яка назва мешканки Києва є нормативною і звичною?"
        options:
          - text: "киянка"
            correct: true
          - text: "київка"
            correct: false
          - text: "києвиця"
            correct: false
          - text: "київ'янка"
            correct: false
        explanation: "Усталена форма: киянин, киянка, кияни."
      - question: "У якому слові суфікс -іст є частиною професійної назви?"
        options:
          - text: "програміст"
            correct: true
          - text: "програма"
            correct: false
          - text: "програмний"
            correct: false
          - text: "програмування"
            correct: false
        explanation: "Програміст називає особу за професійною діяльністю."
      - question: "Який варіант найкращий для офіційного опису ролі в команді?"
        options:
          - text: "фахівець із комунікацій"
            correct: true
          - text: "комунікаційник у прикольному сенсі"
            correct: false
          - text: "той самий комунікаторчик"
            correct: false
          - text: "людина по комунікаціям"
            correct: false
        explanation: "Фахівець із комунікацій звучить точно й нейтрально."
      - question: "Який фемінітив утворено за моделлю -к(а)?"
        options:
          - text: "редакторка"
            correct: true
          - text: "працівниця"
            correct: false
          - text: "продавчиня"
            correct: false
          - text: "філологиня"
            correct: false
        explanation: "Редакторка має суфікс -к(а)."
      - question: "Яке слово краще не вживати в нейтральному протоколі через оцінність?"
        options:
          - text: "критикан"
            correct: true
          - text: "учасник"
            correct: false
          - text: "секретар"
            correct: false
          - text: "координатор"
            correct: false
        explanation: "Критикан оцінює людину, а протокол потребує нейтральності."
      - question: "Яка пара правильно показує чоловічу й жіночу форму?"
        options:
          - text: "продавець — продавчиня"
            correct: true
          - text: "продавець — продавеця"
            correct: false
          - text: "продавець — продавка"
            correct: false
          - text: "продавець — продавниця"
            correct: false
        explanation: "У слові продавчиня відбувається зміна основи."
      - question: "Що найкраще робити, якщо назва мешканця міста викликає сумнів?"
        options:
          - text: "перевірити усталену українську форму"
            correct: true
          - text: "додати англійський суфікс -ian"
            correct: false
          - text: "використати будь-яку форму на -ець"
            correct: false
          - text: "завжди писати форму на -ич"
            correct: false
        explanation: "Катойконіми залежать від усталеного вжитку."
      - question: "Який варіант найточніше передає локальну ідентичність?"
        options:
          - text: "львів'янин"
            correct: true
          - text: "людина з населеного пункту"
            correct: false
          - text: "адміністративний суб'єкт"
            correct: false
          - text: "територіальна одиниця"
            correct: false
        explanation: "Львів'янин називає мешканця Львова."
      - question: "Яка назва найкраще підходить для професійної біографії жінки-редактора?"
        options:
          - text: "редакторка"
            correct: true
          - text: "редакторчик"
            correct: false
          - text: "редакторова"
            correct: false
          - text: "редакторська людина"
            correct: false
        explanation: "Редакторка стисло й природно називає професійну роль."
  - type: match-up
    title: "Суфікс і значення"
    instruction: "Поєднайте слово з найточнішим описом."
    pairs:
      - left: "садівник"
        right: "назва особи за заняттям; модель -івник"
      - left: "програміст"
        right: "професійна назва із суфіксом -іст"
      - left: "менеджер"
        right: "запозичена професійна назва із суфіксом -ер"
      - left: "консультант"
        right: "назва особи за службовою функцією"
      - left: "працівниця"
        right: "фемінітив від основи на -ник"
      - left: "продавчиня"
        right: "фемінітив із чергуванням основи"
      - left: "філологиня"
        right: "фемінітив із суфіксом -иня"
      - left: "брехун"
        right: "оцінна назва людини за поведінкою"
      - left: "співак"
        right: "назва особи за заняттям або здібністю"
      - left: "чужак"
        right: "назва, що підкреслює дистанцію"
      - left: "киянка"
        right: "жіноча назва мешканки Києва"
      - left: "полтавець"
        right: "назва мешканця Полтави"
  - type: fill-in
    title: "Доберіть нормативну назву особи"
    instruction: "Заповніть пропуск словом, яке відповідає змісту й стилю речення."
    items:
      - sentence: "____ центру допоміг відвідувачам заповнити заяву."
        answer: "Працівник"
        options: ["Працівник", "Працювання", "Працівний", "Працівниково"]
        explanation: "Потрібна назва особи за роллю в установі."
      - sentence: "Нова ____ підготувала випуск журналу."
        answer: "редакторка"
        options: ["редакторка", "редакторство", "редакторний", "редакторово"]
        explanation: "Редакторка природно називає професійну роль жінки."
      - sentence: "____ із комунікацій узгодив текст оголошення."
        answer: "Фахівець"
        options: ["Фахівець", "Фах", "Фаховість", "Фахово"]
        explanation: "Фахівець називає людину, а не абстрактну якість."
      - sentence: "____ пояснила, як змінюється основа слова."
        answer: "Дослідниця"
        options: ["Дослідниця", "Дослідність", "Дослідно", "Дослідний"]
        explanation: "Дослідниця є фемінітивом до дослідник."
      - sentence: "У пресрелізі написали, що ____ підтримали транспортну ініціативу."
        answer: "кияни"
        options: ["кияни", "київці", "києвити", "київськість"]
        explanation: "Кияни - усталена множина від киянин."
      - sentence: "На зустрічі виступила ____ департаменту."
        answer: "очільниця"
        options: ["очільниця", "очолення", "очільний", "очільно"]
        explanation: "Очільниця називає жінку, яка очолює установу або підрозділ."
      - sentence: "У рецензії герой постає як ____ у новому місті."
        answer: "чужак"
        options: ["чужак", "чужість", "чужийно", "чуження"]
        explanation: "Чужак називає людину через відчуття віддаленості."
      - sentence: "____ готується до благодійного старту."
        answer: "Бігун"
        options: ["Бігун", "Бігання", "Біжність", "Бігово"]
        explanation: "Бігун може бути нейтральною назвою спортсмена."
      - sentence: "____ перевірила наголос у професійній назві."
        answer: "Філологиня"
        options: ["Філологиня", "Філологість", "Філологово", "Філологування"]
        explanation: "Філологиня - жіноча назва особи за фахом."
      - sentence: "____ із лабораторії передав результати вимірювання."
        answer: "Лаборант"
        options: ["Лаборант", "Лабораторність", "Лабораторно", "Лабораторний"]
        explanation: "Лаборант називає особу за службовою функцією."
      - sentence: "____ запросив гостей на фестиваль локальної кухні."
        answer: "Полтавець"
        options: ["Полтавець", "Полтавіан", "Полтавність", "Полтавово"]
        explanation: "Полтавець - усталена назва мешканця Полтави."
      - sentence: "____ підтримав пропозицію на зборах."
        answer: "Однодумець"
        options: ["Однодумець", "Однодумство", "Однодумний", "Однодумно"]
        explanation: "Однодумець називає людину зі спільними поглядами."
  - type: cloze
    title: "Словотвір у редакторському рішенні"
    instruction: "Заповніть пропуски словами з банку."
    passage: >-
      У біографічній довідці важливо не приховувати професійну роль людини. Якщо жінка редагує видання, природно написати {1}. Якщо вона досліджує мову, доречна форма {2}. Для основ на -ник часто з'являється модель {3}, а для слова продавець нормативною є форма {4}. У тексті про місто не варто калькувати англійські назви: мешканка Києва - це {5}, а мешканець Полтави - {6}. Оцінні слова, як-от {7}, треба вживати лише тоді, коли автор справді хоче дати різку характеристику. У формальному описі ролі краще написати {8} із комунікацій. Людину зі спільними поглядами називаємо {9}. Жінка, яка очолює департамент, може бути {10}. Професійна назва на -іст помітна у слові {11}. Запозичена назва на -ер помітна у слові {12}. Назва мешканця Львова має апостроф: {13}. А нейтральне слово для людини, яка проходила повз, - {14}. Якщо треба назвати жінку-автора, природна форма {15}. У повідомленні про спорт слово {16} може бути цілком нейтральним.
    blanks:
      - id: 1
        answer: "редакторка"
        options: ["редакторка", "редакторство", "редакторно", "редакторський"]
      - id: 2
        answer: "дослідниця"
        options: ["дослідниця", "дослідність", "дослідно", "дослідницько"]
      - id: 3
        answer: "працівниця"
        options: ["працівниця", "працівникка", "працівність", "працівно"]
      - id: 4
        answer: "продавчиня"
        options: ["продавчиня", "продавеця", "продавність", "продавно"]
      - id: 5
        answer: "киянка"
        options: ["киянка", "київка", "києвиця", "київ'янка"]
      - id: 6
        answer: "полтавець"
        options: ["полтавець", "полтавіан", "полтавність", "полтавно"]
      - id: 7
        answer: "брехун"
        options: ["брехун", "брехня", "брехливість", "брехливо"]
      - id: 8
        answer: "фахівець"
        options: ["фахівець", "фаховість", "фахово", "фаховий"]
      - id: 9
        answer: "однодумцем"
        options: ["однодумцем", "однодумством", "однодумно", "однодумний"]
      - id: 10
        answer: "очільницею"
        options: ["очільницею", "очоленням", "очільно", "очільністю"]
      - id: 11
        answer: "програміст"
        options: ["програміст", "програма", "програмно", "програмний"]
      - id: 12
        answer: "менеджер"
        options: ["менеджер", "менеджмент", "менеджерно", "менеджерський"]
      - id: 13
        answer: "львів'янин"
        options: ["львів'янин", "львівянин", "львівець", "львівість"]
      - id: 14
        answer: "перехожий"
        options: ["перехожий", "перехід", "перехідність", "перехідно"]
      - id: 15
        answer: "авторка"
        options: ["авторка", "авторство", "авторно", "авторський"]
      - id: 16
        answer: "бігун"
        options: ["бігун", "бігання", "бігово", "біжність"]
  - type: error-correction
    title: "Виправте словотвірні помилки"
    instruction: "Знайдіть ненормативну або стилістично невдалу назву особи й виправте її."
    items:
      - sentence: "Нова працівникка архіву знайшла документ."
        error: "працівникка"
        correction: "працівниця"
        explanation: "Від працівник природна форма працівниця."
      - sentence: "Київка подала електронну петицію."
        error: "Київка"
        correction: "Киянка"
        explanation: "Усталена назва мешканки Києва - киянка."
      - sentence: "Полтавіан запросив гостей на фестиваль."
        error: "Полтавіан"
        correction: "Полтавець"
        explanation: "Не калькуйте англійську модель; українська форма - полтавець."
      - sentence: "Продавеця порадила нове видання."
        error: "Продавеця"
        correction: "Продавчиня"
        explanation: "Нормативна форма - продавчиня."
      - sentence: "У протоколі написали: критикан висловив зауваження."
        error: "критикан"
        correction: "учасник"
        explanation: "Для протоколу потрібна нейтральна назва без оцінки."
      - sentence: "Філологка пояснила історію суфікса."
        error: "Філологка"
        correction: "Філологиня"
        explanation: "Для цієї професійної назви поширена форма філологиня."
      - sentence: "Львівянин розповів про місцеву традицію."
        error: "Львівянин"
        correction: "Львів'янин"
        explanation: "Після в перед я потрібен апостроф."
      - sentence: "Спеціаліст по комунікаціям підготував заяву."
        error: "по комунікаціям"
        correction: "із комунікацій"
        explanation: "Нормативніше: фахівець або спеціаліст із комунікацій."
      - sentence: "Жінка-редактор підготувала випуск журналу."
        error: "Жінка-редактор"
        correction: "Редакторка"
        explanation: "Фемінітив коротший і природніший у біографічному контексті."
      - sentence: "Працівний центру допоміг гостям."
        error: "Працівний"
        correction: "Працівник"
        explanation: "Потрібна назва особи, а не прикметник."
