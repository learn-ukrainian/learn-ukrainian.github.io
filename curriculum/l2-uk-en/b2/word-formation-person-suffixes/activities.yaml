  - id: workbook-4
    type: essay-response
    title: "Коротке редагування профілю команди"
    min_words: 150
    prompt: >-
      Напишіть 150-180 слів про команду культурного проєкту. Використайте щонайменше
      вісім назв осіб: дві професійні назви, два фемінітиви, одну назву мешканця або
      мешканки, одну назву за дією та одну нейтральну заміну оцінного ярлика. Поясніть,
      чому ці форми доречні за стилем.
    model_answer: |-
      > [!model-answer]
      У проєкті працюють редакторка, дизайнер, фахівчиня з комунікацій і координатор волонтерів. Львів'янка Марія готує опис архівних матеріалів, а киянин Андрій відповідає за навігацію для гостей. У першій чернетці автор назвав частину учасників «критиканами», але в нейтральному тексті краще написати «учасники обговорення», бо вони поставили конкретні запитання до бюджету. Слово «дослідниця» доречне, бо йдеться про професійну роль жінки, а «фахівчиня з комунікацій» звучить точніше за розмовне «комунікаційниця». Такі назви не лише називають людей, а й показують їхню відповідальність у команді.
    rubric:
      - criteria: "Словотвірна різноманітність"
        description: "Є щонайменше вісім назв осіб із різними моделями."
        points: 2
      - criteria: "Регістр"
        description: "Пояснено, чому форми доречні для нейтрального або професійного стилю."
        points: 2
      - criteria: "Точність"
        description: "Фемінітиви, назви мешканців і керування вжито без грубих помилок."
        points: 1

  - type: true-false
    title: "Контроль регістру назв осіб"
    instruction: "Визначте, чи твердження відповідає редакторській логіці модуля."
    items:
      - statement: "Фемінітив треба узгоджувати з дієсловом і прикметником."
        correct: true
        explanation: "Редакторка підготувала, досвідчена фахівчиня пояснила."
      - statement: "Назви мешканців міст краще перевіряти як усталені форми."
        correct: true
        explanation: "Киянин, львів'янка, полтавець мають різні традиційні моделі."
      - statement: "Описова конструкція може бути безпечнішою за неперевірений новотвір."
        correct: true
        explanation: "Якщо форма сумнівна, краще тимчасово описати роль."
      - statement: "«Критикан» доречний у нейтральній новині без доказів оцінки."
        correct: false
        explanation: "Це оцінна назва; у нейтральному тексті краще описати дію."
      - statement: "Суфікс -ник завжди називає тільки людину."
        correct: false
        explanation: "У різних модулях -ник може траплятися і в назвах предметів."
      - statement: "«Фахівець із комунікацій» доречний для професійного регістру."
        correct: true
        explanation: "Це точна нейтральна назва ролі."
      - statement: "«Дівчина-редактор» завжди точніше за «редакторка»."
        correct: false
        explanation: "Вік або стать не треба ставити вище професійної ролі без потреби."
      - statement: "«Киянка» є усталеною назвою мешканки Києва."
        correct: true
        explanation: "Киянин, киянка, кияни - нормативні усталені форми."
      - statement: "Оцінну назву можна замінити описом конкретної дії."
        correct: true
        explanation: "Це робить текст точнішим і нейтральнішим."
      - statement: "Форма «продавецька» є кращим фемінітивом від «продавець»."
        correct: false
        explanation: "Усталена форма - продавчиня."
