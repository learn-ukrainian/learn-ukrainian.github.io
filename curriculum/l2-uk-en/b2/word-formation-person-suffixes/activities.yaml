version: '1.0'
module: word-formation-person-suffixes
level: b2
inline:
  - type: match-up
    title: "Позначте суфікс назви особи"
    instruction: "Поєднайте слово з суфіксом, який допомагає назвати людину за професією, роллю або дією."
    pairs:
      - left: "лікар"
        right: "-ар"
      - left: "садівник"
        right: "-ник"
      - left: "програміст"
        right: "-іст"
      - left: "консультант"
        right: "-ант"
      - left: "читач"
        right: "-ач"
      - left: "водій"
        right: "-ій"
      - left: "редакторка"
        right: "-к(а)"
      - left: "працівниця"
        right: "-иц(я)"
      - left: "філологиня"
        right: "-ин(я)"
      - left: "киянин"
        right: "-янин"

  - type: select
    title: "Форма і тон"
    instruction: "Позначте всі правильні твердження про значення або регістр назви особи."
    items:
      - question: "«Фахівець із комунікацій підготував оголошення»."
        min_correct: 2
        options:
          - text: "Форма звучить нейтрально й професійно."
            correct: true
          - text: "Це точніше за розмовне «комунікаційник» в офіційному тексті."
            correct: true
          - text: "Слово має зневажливий суфікс."
            correct: false
          - text: "Прийменник «із» тут треба замінити на «по»."
            correct: false
        explanation: "У фаховому тексті природно: фахівець із комунікацій."
      - question: "«Критикани зірвали обговорення»."
        min_correct: 2
        options:
          - text: "Слово «критикани» має зневажливий відтінок."
            correct: true
          - text: "Для нейтральної новини краще «критики» або «учасники дискусії»."
            correct: true
          - text: "Це безоцінна назва професії."
            correct: false
          - text: "Суфікс автоматично робить речення офіційним."
            correct: false
        explanation: "Назва з оцінним відтінком змінює позицію автора."
      - question: "«Бігун переміг у забігу»."
        min_correct: 2
        options:
          - text: "У спортивному контексті «бігун» нейтральний."
            correct: true
          - text: "Назва пов'язана з повторюваною дією."
            correct: true
          - text: "Слово обов'язково зневажливе."
            correct: false
          - text: "Це назва мешканця міста."
            correct: false
        explanation: "Суфікс -ун може бути нейтральним або оцінним залежно від слова й контексту."
      - question: "«Редакторка підготувала висновок»."
        min_correct: 2
        options:
          - text: "Фемінітив утворено моделлю -к(а)."
            correct: true
          - text: "Дієслово узгоджено з формою жіночого роду."
            correct: true
          - text: "Нормативно треба тільки «редактор підготувала»."
            correct: false
          - text: "Це назва мешканки міста."
            correct: false
        explanation: "Редакторка - поширений фемінітив, а «підготувала» узгоджує рід."
      - question: "«Кияни допомогли з навігацією»."
        min_correct: 2
        options:
          - text: "Це усталена назва мешканців Києва."
            correct: true
          - text: "Модель не можна механічно переносити на всі назви міст."
            correct: true
          - text: "Правильна форма множини - «київники»."
            correct: false
          - text: "Слово обов'язково означає професію."
            correct: false
        explanation: "Назви мешканців часто мають історично усталені форми."
      - question: "«Директорка дала коментар». "
        min_correct: 2
        options:
          - text: "Фемінітив узгоджено з дієсловом."
            correct: true
          - text: "Форма називає професійну роль."
            correct: true
          - text: "Слово є зневажливим ярликом."
            correct: false
          - text: "Треба писати тільки «директор дав»."
            correct: false
        explanation: "Директорка - професійна назва, узгоджена з присудком."
      - question: "«Архівістка підготувала опис фонду»."
        min_correct: 2
        options:
          - text: "Назва особи пов'язана з фахом."
            correct: true
          - text: "Форма точніша за «людина по архівах»."
            correct: true
          - text: "Це назва місткості."
            correct: false
          - text: "Форма обов'язково розмовна."
            correct: false
        explanation: "Архівістка точно називає професійну роль."
      - question: "«Представники громади розкритикували бюджет»."
        min_correct: 2
        options:
          - text: "Фраза нейтрально називає групу."
            correct: true
          - text: "Дію критики названо без зневажливого суфікса."
            correct: true
          - text: "Слово «представники» є образою."
            correct: false
          - text: "У новині треба замінити це на «галасуни»."
            correct: false
        explanation: "Нейтральний текст описує роль і дію без ярлика."

  - type: fill-in
    title: "Доберіть природну назву"
    instruction: "Виберіть назву особи, яка найкраще відповідає контексту й стилю."
    items:
      - sentence: "У пресрелізі краще написати: ____ із комунікацій підготував текст."
        answer: "фахівець"
        options: ["фахівець", "комунікаційник", "комунікаторчик", "людина по комунікаціям"]
        explanation: "Фахівець із комунікацій - нейтральна професійна формула."
      - sentence: "Жінка, яка редагує книжку, у сучасному тексті природно називається ____."
        answer: "редакторка"
        options: ["редакторка", "редакторова", "редакторчик", "редакторність"]
        explanation: "Редакторка - прозорий фемінітив із суфіксом -к(а)."
      - sentence: "Мешканка Києва - це ____."
        answer: "киянка"
        options: ["киянка", "київка", "київниця", "києвистка"]
        explanation: "Усталені форми: киянин, киянка, кияни."
      - sentence: "У спортивній новині доречно: досвідчений ____ переміг у марафоні."
        answer: "бігун"
        options: ["бігун", "бігачество", "бігатель", "бігова людина"]
        explanation: "Бігун - нейтральна назва спортсмена за дією."
      - sentence: "Фемінітив від «філолог» у сучасному вжитку - ____."
        answer: "філологиня"
        options: ["філологиня", "філоложка", "філологесса", "філологник"]
        explanation: "Філологиня - поширена форма з -ин(я)."
      - sentence: "Якщо слово має оцінний тон, у новині краще написати не «критикани», а ____."
        answer: "критики"
        options: ["критики", "критиканство", "критиканки", "критикарі"]
        explanation: "Критики або учасники дискусії звучать нейтральніше."
      - sentence: "Особа, яка консультує клієнтів, у службовому тексті - ____."
        answer: "консультант"
        options: ["консультант", "консультувальник усього", "консультаційник", "консультований"]
        explanation: "Консультант - усталена професійна назва."
      - sentence: "Жінка, яка працює в команді, - ____."
        answer: "працівниця"
        options: ["працівниця", "працівникка", "працівничка" , "працевик"]
        explanation: "Працівниця - усталений фемінітив від працівник."
      - sentence: "Людина, яка веде обговорення, - ____."
        answer: "модератор"
        options: ["модератор", "модерність", "модерняк", "модерація"]
        explanation: "Модератор називає роль у дискусії."
      - sentence: "Жінка, яка координує графік, - ____."
        answer: "координаторка"
        options: ["координаторка", "координаторесса", "координарка", "координаційність"]
        explanation: "Координаторка - природна назва професійної ролі."

  - type: match-up
    title: "Суфікс і функція"
    instruction: "Поєднайте слово з найточнішим словотвірним поясненням."
    pairs:
      - left: "пекар"
        right: "назва професії з суфіксом -ар"
      - left: "садівник"
        right: "особа за діяльністю або об'єктом праці; модель -івник"
      - left: "програміст"
        right: "професійна назва із суфіксом -іст"
      - left: "консультант"
        right: "усталена службова роль із -ант"
      - left: "читач"
        right: "особа за дією читання; модель -ач"
      - left: "водій"
        right: "нейтральна назва людини за дією"
      - left: "брехун"
        right: "оцінна назва людини за поведінкою"
      - left: "майстриня"
        right: "фемінітив із суфіксом -ин(я)"
      - left: "полтавець"
        right: "назва мешканця міста з -ець"
      - left: "однодумець"
        right: "назва людини за груповою або ідейною близькістю"

  - type: fill-in
    title: "Відредагуйте назви осіб"
    instruction: "Виберіть форму, яка виправляє назву особи або регістр речення."
    items:
      - sentence: "Комунікаційник по проєкту написав офіційний реліз."
        answer: "Фахівець із комунікацій проєкту"
        options: ["Фахівець із комунікацій проєкту", "Комунікаційник по проєкту", "Комунікаторчик проєкту", "Людина по комунікаціям"]
        explanation: "Офіційний стиль потребує нейтральної назви й керування із."
      - sentence: "Директор дала коментар, бо вона відповідає за рішення."
        answer: "Директорка дала"
        options: ["Директорка дала", "Директор дав", "Директор дали", "Директорка дав"]
        explanation: "Якщо обираємо фемінітив, узгоджуємо дієслово жіночого роду."
      - sentence: "Київники допомогли гостям знайти музей."
        answer: "Кияни"
        options: ["Кияни", "Київники", "Київці", "Києвисти"]
        explanation: "Усталена форма множини - кияни."
      - sentence: "Критикани поставили запитання щодо бюджету."
        answer: "Учасники дискусії"
        options: ["Учасники дискусії", "Критикани", "Критиканники", "Критиканство"]
        explanation: "У нейтральному тексті краще прибрати зневажливу оцінку."
      - sentence: "Вона працює як філологесса в університеті."
        answer: "філологиня"
        options: ["філологиня", "філологесса", "філологник", "філологова"]
        explanation: "Філологиня - природний сучасний фемінітив."
      - sentence: "Людина по архівах підготувала довідку."
        answer: "Архівістка"
        options: ["Архівістка", "Людина по архівах", "Архівний чоловік", "Архіваторша"]
        explanation: "Архівістка або фахівчиня з архівної роботи точніше називає роль."
      - sentence: "Дівчина-директор провела службову нараду."
        answer: "Директорка"
        options: ["Директорка", "Дівчина-директор", "Директоресса", "Директорова"]
        explanation: "Професійну роль краще назвати фемінітивом без зайвого вікового маркера."
      - sentence: "Продажник офіційно підписав угоду з партнерами."
        answer: "Менеджер з продажу"
        options: ["Менеджер з продажу", "Продажник", "Продажар", "Продажний чоловік"]
        explanation: "Для офіційного стилю доречніша повна професійна назва."
      - sentence: "Львівці запросили гостей до міської читальні."
        answer: "Львів'яни"
        options: ["Львів'яни", "Львівці", "Львівники", "Львівисти"]
        explanation: "Усталена форма множини - львів'яни."
      - sentence: "Автор назвав усіх учасників експертами, хоча вони лише голосували."
        answer: "учасниками"
        options: ["учасниками", "експертами", "експертниками", "фаховиками всього"]
        explanation: "Назва має відповідати реальній ролі, а не перебільшувати статус."

workbook:
  - type: group-sort
    title: "Розподіліть назви за значенням"
    instruction: "Перетягніть слова до групи, яка найкраще пояснює їхню словотвірну функцію."
    groups:
      - name: "Професія або фах"
        items: ["лікар", "програміст", "журналіст", "дизайнер"]
      - name: "Дія або участь"
        items: ["читач", "глядач", "водій", "учасник"]
      - name: "Оцінка або риса"
        items: ["брехун", "крутій", "чужак", "добряк"]
      - name: "Походження або належність"
        items: ["киянка", "львів'янин", "полтавець", "однодумець"]

  - type: fill-in
    title: "Фемінітиви й узгодження"
    instruction: "Доберіть форму й перевірте узгодження в реченні."
    items:
      - sentence: "____ представила результати дослідження."
        answer: "Дослідниця"
        options: ["Дослідниця", "Дослідник", "Дослідникова", "Дослідність"]
        explanation: "Дослідниця узгоджується з дієсловом представила."
      - sentence: "Нова ____ очолила відділ."
        answer: "директорка"
        options: ["директорка", "директор", "директоресса", "директорник"]
        explanation: "Директорка - прозорий фемінітив; прикметник нова узгоджений."
      - sentence: "Досвідчена ____ відновила дерев'яну раму."
        answer: "майстриня"
        options: ["майстриня", "майстерка", "майстрова", "майстерність"]
        explanation: "Майстриня - усталена назва жінки-майстра."
      - sentence: "Місцева ____ координувала волонтерів."
        answer: "координаторка"
        options: ["координаторка", "координатор", "координаторесса", "координувальність"]
        explanation: "Координаторка природно називає професійну роль."
      - sentence: "____ з архівної роботи підготувала опис фонду."
        answer: "Фахівчиня"
        options: ["Фахівчиня", "Фахівець", "Фахівство", "Фахова людина"]
        explanation: "Фахівчиня узгоджується з жіночим родом у реченні."
      - sentence: "Молода ____ написала репортаж із події."
        answer: "журналістка"
        options: ["журналістка", "журналіст", "журналістесса", "журналістник"]
        explanation: "Журналістка - усталена професійна назва."
      - sentence: "Досвідчена ____ модерувала дискусію."
        answer: "модераторка"
        options: ["модераторка", "модератор", "модераторесса", "модерність"]
        explanation: "Модераторка узгоджується з прикметником досвідчена."
      - sentence: "____ із музею зустріла гостей біля входу."
        answer: "Волонтерка"
        options: ["Волонтерка", "Волонтер", "Волонтерство", "Волонтерник"]
        explanation: "Волонтерка називає роль жінки в події."
      - sentence: "Нова ____ проєкту пояснила бюджет."
        answer: "координаторка"
        options: ["координаторка", "координатор", "координація", "координаторство"]
        explanation: "Координаторка узгоджується з прикметником нова."
      - sentence: "____ зі Львова представила міський архів."
        answer: "Дослідниця"
        options: ["Дослідниця", "Дослідник", "Дослідження", "Дослідниковість"]
        explanation: "Дослідниця називає професійну роль і узгоджується з дієсловом."

  - type: select
    title: "Редакторське рішення"
    instruction: "Позначте варіанти, які доречні для нейтрального інформаційного стилю."
    items:
      - question: "Як краще назвати людей, які висловили зауваження до рішення?"
        min_correct: 2
        options:
          - text: "учасники обговорення"
            correct: true
          - text: "представники громади"
            correct: true
          - text: "критикани"
            correct: false
          - text: "галасуни"
            correct: false
        explanation: "Нейтральний стиль називає роль, а не оцінює людей."
      - question: "Які форми природні для професійної назви жінки?"
        min_correct: 2
        options:
          - text: "редакторка"
            correct: true
          - text: "дослідниця"
            correct: true
          - text: "редакторесса"
            correct: false
          - text: "дослідникка"
            correct: false
        explanation: "Редакторка й дослідниця - усталені сучасні форми."
      - question: "Які назви мешканців усталені?"
        min_correct: 2
        options:
          - text: "киянин"
            correct: true
          - text: "львів'янка"
            correct: true
          - text: "київник"
            correct: false
          - text: "львівка як універсальна форма"
            correct: false
        explanation: "Назви мешканців треба перевіряти як окремі усталені слова."
      - question: "Які назви краще підходять для офіційного опису ролі?"
        min_correct: 2
        options:
          - text: "фахівець із комунікацій"
            correct: true
          - text: "керівниця відділу"
            correct: true
          - text: "комунікаційник у прикольному сенсі"
            correct: false
          - text: "головна людина"
            correct: false
        explanation: "Офіційний стиль потребує точних і нейтральних назв."
      - question: "Які слова мають оцінний або потенційно зневажливий тон?"
        min_correct: 2
        options:
          - text: "критикан"
            correct: true
          - text: "галасун"
            correct: true
          - text: "учасник"
            correct: false
          - text: "представниця"
            correct: false
        explanation: "Оцінні назви не варто використовувати без підстав."
      - question: "Які форми демонструють правильне узгодження?"
        min_correct: 2
        options:
          - text: "редакторка підготувала"
            correct: true
          - text: "досвідчена фахівчиня пояснила"
            correct: true
          - text: "директорка підготував"
            correct: false
          - text: "нова координатор сказав"
            correct: false
        explanation: "Фемінітив потребує узгодження прикметника й дієслова."
      - question: "Які варіанти безпечні, якщо коротка форма сумнівна?"
