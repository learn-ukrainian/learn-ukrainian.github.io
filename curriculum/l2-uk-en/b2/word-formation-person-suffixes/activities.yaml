      - words: ["Філологиня", "пояснила", "чому", "фемінітив", "має", "інший", "суфікс"]
        answer: "Філологиня пояснила, чому фемінітив має інший суфікс."
      - words: ["Полтавець", "запросив", "гостей", "на", "фестиваль", "локальної", "кухні"]
        answer: "Полтавець запросив гостей на фестиваль локальної кухні."
      - words: ["Фахівець", "із", "комунікацій", "відредагував", "текст", "оголошення", "для", "громади"]
        answer: "Фахівець із комунікацій відредагував текст оголошення для громади."
      - words: ["Дослідниця", "зібрала", "приклади", "назв", "осіб", "у", "медіатекстах"]
        answer: "Дослідниця зібрала приклади назв осіб у медіатекстах."
      - words: ["Учасник", "зустрічі", "висловив", "зауваження", "без", "оцінних", "слів"]
        answer: "Учасник зустрічі висловив зауваження без оцінних слів."
      - words: ["Одеситка", "описала", "життя", "біля", "моря", "в", "новому", "есе"]
        answer: "Одеситка описала життя біля моря в новому есе."
      - words: ["Словотвір", "допомагає", "точно", "називати", "роль", "людини", "в", "тексті"]
