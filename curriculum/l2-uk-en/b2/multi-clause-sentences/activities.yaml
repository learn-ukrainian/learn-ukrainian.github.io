- type: select
  title: Коли речення треба перебудувати?
  instruction: Виберіть ситуації, де пунктуації недостатньо й потрібне редагування структури.
  items:
  - question: Коли краще розбити речення?
    min_correct: 2
    options:
    - text: Головна дія з'являється після кількох вкладених уточнень.
      correct: true
    - text: Речення має дві короткі рівноправні частини.
      correct: false
    - text: У реченні три підрядні частини залежать одна від одної.
      correct: true
    - text: Є одна підрядна часу перед головною.
      correct: false
    explanation: Вкладені уточнення можуть перевантажити пам'ять читача.
  - question: Коли варто згорнути підрядну частину?
    min_correct: 2
    options:
    - text: Вона лише називає коротку відому ознаку.
      correct: true
    - text: Вона повторює інформацію з попереднього речення.
      correct: true
    - text: Вона містить головну причину рішення.
      correct: false
    - text: Вона ставить непряме питання.
      correct: false
    explanation: Згортання доречне для тла, але не для ключової логіки.
  - question: Коли краще залишити складне речення?
    min_correct: 2
    options:
    - text: Воно показує умову й наслідок в одному логічному русі.
      correct: true
    - text: Читач легко бачить головну основу.
      correct: true
    - text: У ньому важко знайти присудок.
      correct: false
    - text: Воно має п'ять непов'язаних уточнень.
      correct: false
    explanation: Довжина виправдана, якщо структура служить думці.
  - question: Які засоби показують наслідок?
    min_correct: 2
    options:
    - text: тому
      correct: true
    - text: отже
      correct: true
    - text: який
      correct: false
    - text: де
      correct: false
    explanation: «Тому» й «отже» явно вказують на наслідок або висновок.
  - question: Які засоби вводять підрядну означальну?
    min_correct: 2
    options:
    - text: який
      correct: true
    - text: у якому
      correct: true
    - text: бо
      correct: false
    - text: щоб
      correct: false
    explanation: Означальна частина уточнює іменник.
  - question: Які речення мають змішаний зв'язок?
    min_correct: 2
    options:
    - text: Коли команда зібралася, модератор відкрив зустріч, і обговорення почалося.
      correct: true
    - text: 'Файл готовий: його перевірили редактори, і сторінку можна публікувати.'
      correct: true
    - text: Файл готовий, і команда працює далі.
      correct: false
    - text: Коли файл готовий, команда працює далі.
      correct: false
    explanation: Змішаний зв'язок поєднує різні типи в одному реченні.
  - question: Які помилки типові для англомовних учнів?
    min_correct: 2
    options:
    - text: Пропуск «що» в з'ясувальній підрядній частині.
      correct: true
    - text: Відсутність коми перед підрядною означальною з «який».
      correct: true
    - text: Надмірне вживання кличного відмінка.
      correct: false
    - text: Плутання родів іменників у кожному складному реченні.
      correct: false
    explanation: Інтерференція часто стосується сполучників і ком.
  - question: Що треба зробити перед пунктуаційною правкою?
    min_correct: 2
    options:
    - text: Знайти граматичні основи.
      correct: true
    - text: Визначити тип зв'язку між частинами.
      correct: true
    - text: Порахувати всі слова.
      correct: false
    - text: Замінити всі коми на тире.
      correct: false
    explanation: Пунктуація має спиратися на синтаксичний аналіз.
- type: match-up
  title: Схема речення
  instruction: Поєднайте схему з описом.
  pairs:
  - left: (Коли...), [головна частина].
    right: Підрядна часу стоїть перед головною.
  - left: '[ ], і [ ].'
    right: Дві сурядні головні частини.
  - left: '[іменник], (який...), [присудок].'
    right: Підрядна означальна розриває головну частину.
  - left: '[ ]: [пояснення].'
    right: Безсполучниковий зв'язок із двокрапкою.
  - left: '[умова] - [наслідок].'
    right: Безсполучниковий зв'язок із тире.
  - left: '[ ], і, (коли...), [ ].'
    right: Підрядна частина вставлена після сурядного сполучника.
  - left: '[ ], бо [ ].'
    right: Підрядна причини після головної.
  - left: '[ ], щоб [ ].'
    right: Підрядна мети після головної.
  - left: '[дієслово мовлення], що [ ].'
    right: З'ясувальна підрядна передає зміст повідомлення.
  - left: '[дієслово питання], чи [ ].'
    right: Непряме загальне питання.
- id: workbook-essay-syntax-editing
  type: essay-response
  title: Синтаксичне редагування абзацу
  instruction: Напишіть 180-220 слів про зміну процедури, навчальний проєкт або громадську консультацію.
  prompt: Використайте щонайменше одне речення зі змішаним зв'язком, одне речення з підрядною означальною
    та одне безсполучникове речення з двокрапкою або тире. Після тексту коротко запишіть схему найскладнішого
    речення.
  min_words: 180
  model_answer: 'Сильна відповідь має видимі граматичні основи, правильні сполучники й хоча б одну редакторську
    правку, яка полегшує читання. У найскладнішому реченні студент має показати, які частини є головними,
    які підрядними, де є сурядний або безсполучниковий зв''язок, і чому обрано саме такі розділові знаки.
    Добра відповідь не накопичує підрядні частини заради складності: вона пояснює умову, причину, наслідок
    або уточнення так, щоб читач легко бачив головну дію.'
  peer_review_guidelines: Перевірте межі частин, типи зв'язку, пунктуацію на стику сполучників і читабельність
    найдовшого речення.
