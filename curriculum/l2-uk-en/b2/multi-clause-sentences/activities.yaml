  - type: true-false
    title: Пунктуаційні твердження
    instruction: Визнач, чи правильне твердження.
    items:
      - statement: "Спільна початкова підрядна частина може скасувати кому перед неповторюваним і між сурядними частинами."
        correct: true
        explanation: Якщо підрядна частина охоплює обидві дії, межа перед і слабша.
      - statement: "Між що і коли завжди треба ставити кому."
        correct: false
        explanation: Якщо є пара коли... то, кома між що і коли зазвичай не ставиться.
      - statement: "Двокрапка може вводити пояснення попередньої частини."
        correct: true
        explanation: Це одна з типових функцій двокрапки в безсполучниковому зв'язку.
      - statement: "Тире й двокрапка мають однаковий інтонаційний ефект."
        correct: false
        explanation: Двокрапка готує пояснення, а тире частіше створює поворот або наслідок.
      - statement: "Крапка з комою корисна між великими частинами, у яких уже є власні коми."
        correct: true
        explanation: Вона відділяє більші блоки без повного розриву крапкою.
      - statement: "Слово тому точніше передає наслідок, ніж просте і."
        correct: true
        explanation: Тому називає причинно-наслідковий зв'язок.
      - statement: "У нормативному письмі з'ясувальну частину після повідомив часто вводить що."
        correct: true
        explanation: "Наприклад: повідомив, що звіт готовий."
      - statement: "Парцеляція завжди краща за складне речення."
        correct: false
        explanation: Парцеляція доречна лише тоді, коли потрібен стилістичний акцент.
      - statement: "Кожне довге речення треба автоматично розбивати."
        correct: false
        explanation: Якщо ієрархія ясна, довге речення може бути найточнішим варіантом.
      - statement: "Аналіз починається з пошуку граматичних основ."
        correct: true
        explanation: Без основ неможливо надійно визначити межі частин.

  - type: true-false
    title: Редакторський вибір
    instruction: Визнач, чи доречне редакторське рішення.
    items:
      - statement: "«Документи надійшли пізно, тому голосування перенесли» точніше передає причину й наслідок, ніж просте поєднання через і."
        correct: true
        explanation: Тому прямо називає наслідок.
      - statement: "«Документи надійшли пізно або голосування перенесли» добре передає причинний зв'язок."
        correct: false
        explanation: Або створює вибір, а не причину.
      - statement: "Речення «Комісія розглянула звіт групи й попросила уточнення» прибирає двозначність займенника."
        correct: true
        explanation: Виконавець другої дії прозорий.
      - statement: "Речення «Комісія розглянула звіт групи, і вона попросила уточнення» завжди однозначне."
        correct: false
        explanation: Займенник вона може відсилати до комісії або групи.
      - statement: "Формальне повідомлення має називати умову й наслідок без розмовних скорочень."
        correct: true
        explanation: Формальний регістр потребує прозорої логіки.
      - statement: "Складний синтаксис виправданий, коли умова, причина й висновок належать до однієї тези."
        correct: true
        explanation: У такому разі довше речення підтримує логічну єдність.
      - statement: "Якщо коротший варіант точніший, довге речення треба скоротити або перебудувати."
        correct: false
        explanation: B2 означає контроль форми, а не демонстрацію довжини.
      - statement: "У реченні «Ми знаємо, що, коли дані перевірять, висновок оновлять» кома після що виправдана."
        correct: true
        explanation: Внутрішню підрядну частину можна вилучити.
      - statement: "Речення «Голосування перенесли, хоча частина учасників не отримала додатків» найточніше називає причину перенесення."
        correct: false
        explanation: Хоч вводить допустовість, а не причину.
      - statement: "У реченні «Висновок був очевидний: процедуру треба спростити» двокрапка вводить зміст висновку."
        correct: true
        explanation: Друга частина розкриває першу.


  - type: fill-in
    title: Сполучники за значенням
    instruction: Добери сполучник або сполучне слово за смисловим зв'язком.
    items:
      - sentence: "Звіт повернули, ____ в додатку бракувало джерел."
        answer: бо
        options:
          - бо
          - хоча
          - коли
          - щоб
        explanation: Бракування джерел є причиною повернення.
      - sentence: "Матеріали оприлюднили, ____ учасники могли підготувати зауваження."
        answer: щоб
        options:
          - щоб
          - хоч
          - але
          - де
        explanation: Тут ідеться про мету.
      - sentence: "____ рада погодить таблицю, документ оприлюднять завтра."
        answer: Якщо
        options:
          - Якщо
          - Бо
          - Хоч
          - Наче
        explanation: Погодження таблиці є умовою.
      - sentence: "Команда підтримала пропозицію, ____ попросила уточнити бюджет."
        answer: але
        options:
          - але
          - щоб
          - коли
          - бо
        explanation: Друга частина протиставляє обмеження підтримці.
      - sentence: "Зустріч почалася тоді, ____ всі отримали матеріали."
        answer: коли
        options:
          - коли
          - бо
          - хоча
          - аби
        explanation: Коли називає часову межу.
      - sentence: "Проєкт залишився в порядку денному, ____ бюджет ще уточнювали."
        answer: хоч
        options:
          - хоч
          - тому
          - де
          - щоб
        explanation: Хоч вводить допустову обставину.
      - sentence: "Дані були неповні, ____ висновок переглянули."
        answer: тому
        options:
          - тому
          - або
          - якщо
          - де
        explanation: Тому називає наслідок.
      - sentence: "Це протокол, ____ ми посилаємося в заяві."
        answer: на який
        options:
          - на який
          - що
          - тому
          - якщо
        explanation: Сполучне слово з прийменником приєднує означальну частину.
      - sentence: "Комісія пояснила, ____ голосування перенесуть."
        answer: що
        options:
          - що
          - де
          - хоч
          - або
        explanation: Після дієслова повідомлення потрібна з'ясувальна частина.
      - sentence: "Документи перевірили, ____ рішення стало надійнішим."
        answer: і
        options:
          - і
          - хоч
          - щоб
          - коли
        explanation: Тут друга частина додає результат у послідовності.

