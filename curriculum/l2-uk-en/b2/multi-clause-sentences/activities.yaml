version: '1.0'
module: multi-clause-sentences
level: b2
inline:
- type: select
  title: Знайдіть предикативні частини
  instruction: Виберіть твердження, які правильно описують межі частин.
  items:
  - question: Які речення мають дві граматичні основи?
    min_correct: 2
    options:
    - text: Коли файл буде готовий, команда надішле лист.
      correct: true
    - text: Після підготовки файлу команда надішле лист.
      correct: false
    - text: Звіт готовий, і редактор відкрив сторінку.
      correct: true
    - text: Оновлений звіт лежить у спільній папці.
      correct: false
    explanation: Підрядна частина або друга головна частина мають власну основу.
  - question: Де підрядна частина уточнює іменник?
    min_correct: 2
    options:
    - text: Лист, у якому пояснено зміни, надіслали всім.
      correct: true
    - text: Документ, який підготували юристи, уже оприлюднили.
      correct: true
    - text: Коли лист надіслали, команда почала обговорення.
      correct: false
    - text: Файл готовий, і команда працює далі.
      correct: false
    explanation: Означальна підрядна частина пояснює іменник.
  - question: Де частини поєднані сурядно?
    min_correct: 2
    options:
    - text: Звіт готовий, і команда може почати обговорення.
      correct: true
    - text: Комісія зібралася, але голосування перенесли.
      correct: true
    - text: Коли комісія зібралася, голосування перенесли.
      correct: false
    - text: Голосування перенесли, бо частина учасників запізнилася.
      correct: false
    explanation: Сурядні частини граматично рівноправні.
  - question: Де безсполучниковий зв'язок передає пояснення?
    min_correct: 2
    options:
    - text: 'Файл треба повернути: у ньому бракує підпису.'
      correct: true
    - text: 'Зрозуміло одне: графік треба уточнити.'
      correct: true
    - text: Коли файл повернуть, підпис додадуть.
      correct: false
    - text: Файл повернули, і підпис додали.
      correct: false
    explanation: Двокрапка часто вводить пояснення або розкриття змісту.
  - question: Де речення перевантажене підрядними частинами?
    min_correct: 2
    options:
    - text: Коли учасники отримали лист, у якому було пояснено, що графік змінено, вони написали модераторці.
      correct: true
    - text: Учасники отримали лист про зміну графіка. Після цього вони написали модераторці.
      correct: false
    - text: Документ, який підготували юристи й який затвердила комісія, надіслали групі, що чекала відповіді.
      correct: true
    - text: Комісія затвердила документ і надіслала його групі.
      correct: false
    explanation: Кілька вкладених підрядних можуть відсунути головну дію надто далеко.
  - question: Де сполучник вибрано неправильно?
    min_correct: 2
    options:
    - text: Редакторка попросила, що команда перевірила посилання.
      correct: true
    - text: Автор пояснив, коли джерело перевірено, хоча треба передати зміст.
      correct: true
    - text: Редакторка попросила, щоб команда перевірила посилання.
      correct: false
    - text: Автор пояснив, що джерело перевірено.
      correct: false
    explanation: Прохання природно вводити через «щоб», а зміст повідомлення - через «що».
  - question: Де кома перед «і» потрібна?
    min_correct: 2
    options:
    - text: Файл готовий, і команда надішле його сьогодні.
      correct: true
    - text: Координаторка відкрила зустріч, і учасники поставили питання.
      correct: true
    - text: Уранці команда перевірила файл і надіслала його.
      correct: false
    - text: Після зустрічі секретар підготував протокол і розіслав його.
      correct: false
    explanation: Кома потрібна між двома граматичними основами, але не між однорідними присудками.
  - question: Де краще розбити речення?
    min_correct: 2
    options:
    - text: Якщо головна дія з'являється після кількох уточнень.
      correct: true
    - text: Якщо три підрядні частини вкладаються одна в одну.
      correct: true
    - text: Якщо речення має один короткий підрядний часу.
      correct: false
    - text: Якщо дві головні частини з'єднані простим «і».
      correct: false
    explanation: Редагування потрібне, коли структура заважає читачеві тримати головну думку.
- type: group-sort
  title: Типи зв'язку
  instruction: Розподіліть речення за основним типом зв'язку.
  groups:
  - name: Сурядний
    items:
    - Звіт готовий, і команда починає обговорення.
    - Комісія зібралася, але голосування перенесли.
    - Файл оновлено, проте посилання ще треба перевірити.
  - name: Підрядний
    items:
    - Коли звіт буде готовий, команда почне обговорення.
    - Автор пояснив, що джерело перевірено.
    - Лист, у якому пояснено зміни, надіслали всім.
  - name: Безсполучниковий
    items:
    - 'Файл треба повернути: у ньому бракує підпису.'
    - Бракує підпису - файл повернуть.
    - Зустріч завершилася, учасники розійшлися.
  - name: Змішаний
    items:
    - Коли комісія зібралася, секретар відкрив протокол, і обговорення почалося.
    - Команда підготувала план, але, коли почалися запитання, модератор змінив порядок.
    - 'Звіт готовий: його перевірили редактори, і сторінку можна публікувати.'
- type: fill-in
  title: Доберіть сполучник
  instruction: Заповніть пропуск сполучником або сполучним словом, яке відповідає змісту.
  items:
  - sentence: Автор пояснив, ____ джерело перевірено.
    answer: що
    options:
    - що
    - коли
    - щоб
    - чи
    explanation: Тут передається зміст повідомлення.
  - sentence: Редактор уточнив, ____ збережено контекст цитати.
    answer: чи
    options:
    - чи
    - що
    - бо
    - коли
    explanation: Непряме загальне питання вводить «чи».
  - sentence: Зустріч перенесли, ____ частина учасників не отримала матеріалів.
    answer: бо
    options:
    - бо
    - щоб
    - який
    - де
    explanation: Друга частина називає причину.
  - sentence: План скоротили, ____ залишити час для запитань.
    answer: щоб
    options:
    - щоб
    - що
    - коли
    - чи
    explanation: Підрядна частина мети вводиться «щоб».
  - sentence: Лист, ____ пояснено новий порядок, надіслали всім.
    answer: у якому
    options:
    - у якому
    - коли
    - бо
    - щоб
    explanation: Підрядна означальна частина уточнює іменник «лист».
  - sentence: ____ файл буде готовий, ми надішлемо його користувачам.
    answer: Коли
    options:
    - Коли
    - Щоб
    - Який
    - Чи
    explanation: Перша частина називає час.
  - sentence: Команда не знала, ____ треба подавати нову заявку.
    answer: чи
    options:
    - чи
    - що
    - бо
    - аби
    explanation: Це непряме питання.
  - sentence: 'Документ повернули: ____ бракує підпису.'
    answer: у ньому
    options:
    - у ньому
    - щоб
    - який
    - коли
    explanation: Безсполучникова друга частина пояснює причину повернення.
  - sentence: Сторінку можна публікувати, ____ редактор перевірить посилання.
    answer: коли
    options:
    - коли
    - який
    - що
    - чи
    explanation: Підрядна частина вказує умову часу.
  - sentence: Модератор змінив план, ____ учасники мали час для дискусії.
    answer: щоб
    options:
    - щоб
    - бо
    - який
    - чи
    explanation: Зміна плану має мету.
- type: error-correction
  title: Пунктуація і межі частин
  instruction: Виправте речення так, щоб межі частин були видимі.
  items:
  - sentence: Коли файл буде готовий команда надішле лист.
    error: готовий команда
    correction: Коли файл буде готовий, команда надішле лист.
    error_type: construction
    options:
    - Коли файл буде готовий, команда надішле лист.
    - Коли файл, буде готовий команда надішле лист.
    - Коли файл буде, готовий команда надішле лист.
    - Коли файл буде готовий команда, надішле лист.
    explanation: Підрядну частину перед головною відділяємо комою.
  - sentence: Файл готовий і команда надішле його сьогодні.
    error: готовий і команда
    correction: Файл готовий, і команда надішле його сьогодні.
    error_type: construction
    options:
    - Файл готовий, і команда надішле його сьогодні.
    - Файл, готовий і команда надішле його сьогодні.
    - Файл готовий і, команда надішле його сьогодні.
    - Файл готовий і команда, надішле його сьогодні.
    explanation: Є дві граматичні основи, тому перед «і» потрібна кома.
  - sentence: Уранці команда перевірила файл, і надіслала його.
    error: файл, і надіслала
    correction: Уранці команда перевірила файл і надіслала його.
    error_type: construction
    options:
    - Уранці команда перевірила файл і надіслала його.
    - Уранці команда, перевірила файл і надіслала його.
    - Уранці команда перевірила, файл і надіслала його.
    - Уранці команда перевірила файл, і надіслала його.
    explanation: Це однорідні присудки при одному підметі.
  - sentence: Автор пояснив джерело перевірено.
    error: пояснив джерело
    correction: Автор пояснив, що джерело перевірено.
    error_type: construction
    options:
    - Автор пояснив, що джерело перевірено.
    - Автор пояснив що, джерело перевірено.
    - Автор, пояснив джерело перевірено.
    - Автор пояснив, джерело перевірено.
    explanation: З'ясувальну підрядну частину треба ввести сполучником «що».
  - sentence: Лист у якому пояснено зміни надіслали всім.
    error: Лист у якому
    correction: Лист, у якому пояснено зміни, надіслали всім.
    error_type: construction
    options:
    - Лист, у якому пояснено зміни, надіслали всім.
    - Лист у якому, пояснено зміни надіслали всім.
    - Лист, у якому пояснено зміни надіслали всім.
    - Лист у якому пояснено, зміни надіслали всім.
    explanation: Підрядна означальна частина всередині головної має коми з обох боків.
  - sentence: Файл треба повернути у ньому бракує підпису.
    error: повернути у ньому
    correction: 'Файл треба повернути: у ньому бракує підпису.'
    error_type: construction
    options:
    - 'Файл треба повернути: у ньому бракує підпису.'
    - Файл треба повернути, у ньому бракує підпису.
    - Файл треба, повернути у ньому бракує підпису.
    - 'Файл треба повернути у ньому: бракує підпису.'
    explanation: Друга частина пояснює причину повернення, тому природна двокрапка.
  - sentence: Ми завершили опис і коли редактор перевірить приклади сторінку можна буде публікувати.
    error: і коли редактор
    correction: Ми завершили опис, і, коли редактор перевірить приклади, сторінку можна буде публікувати.
    error_type: construction
    options:
    - Ми завершили опис, і, коли редактор перевірить приклади, сторінку можна буде публікувати.
    - Ми завершили опис і коли, редактор перевірить приклади сторінку можна буде публікувати.
    - Ми завершили опис, і коли редактор перевірить, приклади сторінку можна буде публікувати.
    - Ми завершили, опис і коли редактор перевірить приклади, сторінку можна буде публікувати.
    explanation: Після «і» вставлена підрядна часу, яка потребує своїх ком.
  - sentence: Редакторка попросила що команда перевірила посилання.
    error: попросила що
    correction: Редакторка попросила, щоб команда перевірила посилання.
    error_type: construction
    options:
    - Редакторка попросила, щоб команда перевірила посилання.
    - Редакторка попросила, що команда перевірила посилання.
    - Редакторка, попросила що команда перевірила посилання.
    - Редакторка попросила що, команда перевірила посилання.
    explanation: Прохання про дію вводиться через «щоб».
- type: select
  title: Редакторська операція
  instruction: Виберіть найкращу дію для редагування багатокомпонентного речення.
  items:
  - question: Головна дія з'являється після трьох підрядних частин. Що зробити?
    min_correct: 2
    options:
    - text: Розбити речення або перенести головну дію ближче до початку.
      correct: true
    - text: Винести частину тла в окреме речення.
      correct: true
    - text: Замінити всі сполучники на коми.
      correct: false
    - text: Залишити порядок, бо довжина не має значення.
      correct: false
    explanation: Читач має швидко знайти опорну дію речення.
  - question: Сполучник «що» передає мету прохання. Яка правка потрібна?
    min_correct: 2
    options:
    - text: Замінити його на «щоб».
      correct: true
    - text: Перебудувати прохання як підрядну мети.
      correct: true
    - text: Замінити його на «який».
      correct: false
    - text: Поставити крапку з комою після сполучника.
      correct: false
    explanation: Прохання про дію природно вводиться підрядною мети зі «щоб».
  - question: Кома стоїть між однорідними присудками при спільному підметі. Що зробити?
    min_correct: 2
    options:
    - text: Прибрати кому, якщо немає другої граматичної основи.
      correct: true
    - text: Перевірити, чи обидва присудки мають спільний підмет.
      correct: true
    - text: Автоматично перетворити речення на підрядне.
      correct: false
    - text: Залишити кому, бо речення довге.
      correct: false
    explanation: Кома перед «і» залежить від межі предикативних частин, а не від довжини.
  - question: Друга безсполучникова частина пояснює першу. Який знак часто доречний?
    min_correct: 2
    options:
    - text: Двокрапка.
      correct: true
    - text: Явний пояснювальний сполучник, якщо двокрапка надто різка.
      correct: true
    - text: Кома після кожного слова.
      correct: false
    - text: Дужки навколо всього речення.
      correct: false
    explanation: Двокрапка може позначати пояснення або розкриття змісту першої частини.
  - question: Довге речення правильне, але важке для памʼяті. Яка стратегія найкраща?
    min_correct: 2
    options:
    - text: Зберегти логіку, але розподілити тло, проблему й наслідок.
      correct: true
    - text: Скоротити ланцюг так, щоб причинно-наслідковий зв’язок лишився видимим.
      correct: true
    - text: Прибрати всі сполучники.
      correct: false
    - text: Замінити підрядність лише тире.
      correct: false
    explanation: Редагування має полегшити читання й не знищити зв’язок між подіями.
  - question: Після «і» стоїть підрядна часу. Які дії можливі?
    min_correct: 2
    options:
    - text: Виділити підрядну часу комами.
      correct: true
    - text: Розбити речення, якщо пунктуація стала надто важкою.
      correct: true
    - text: Прибрати всі коми після «і».
      correct: false
    - text: Замінити підрядну частину на випадковий додаток.
      correct: false
    explanation: Підрядна частина всередині другої головної зберігає власні межі.
  - question: Підрядна означальна відірвана від слова, яке пояснює. Що краще?
    min_correct: 2
    options:
    - text: Переставити її ближче до означуваного іменника.
      correct: true
    - text: Перебудувати речення, щоб не виникала двозначність.
      correct: true
    - text: Залишити її далеко, бо читач здогадається.
      correct: false
    - text: Прибрати сполучне слово «який» без заміни.
      correct: false
    explanation: Означальна частина має бути поруч із тим словом, яке уточнює.
  - question: У реченні повторюється ланцюг «що... що... що...». Як редагувати?
    min_correct: 2
    options:
    - text: Частину повідомлень винести в окреме речення.
      correct: true
    - text: Замінити частину зв’язків іменниковими конструкціями.
      correct: true
    - text: Додати ще один «що», щоб структура була симетрична.
      correct: false
    - text: Прибрати всі підрядні частини незалежно від змісту.
      correct: false
    explanation: Повтор з’ясувальних частин можна скоротити без втрати логіки.
workbook:
- id: workbook-reading-procedure-letter
  type: reading
  title: 'Читання: лист про зміну процедури'
  instruction: Прочитайте текст і виконайте синтаксичний аналіз.
  source: Навчальний текст для модуля B2.
  text: 'Коли робоча група завершила тестування, координаторка надіслала учасникам лист, у якому було
    пояснено, що нову форму треба заповнювати до п''ятниці, і додала посилання на інструкцію: у попередній
    версії бракувало прикладів. Частина учасників відповіла, що посилання не відкривається, тому модератор
    переніс дедлайн, щоб команда встигла виправити технічну помилку.

    '
  tasks:
  - Знайдіть усі граматичні основи.
  - Назвіть дві підрядні частини й поясніть, до чого вони залежать.
  - Поясніть, чому після слова «інструкцію» стоїть двокрапка.
  - Знайдіть сурядний зв'язок.
  - Запропонуйте спосіб розбити перше речення на два, не втративши логіку.
