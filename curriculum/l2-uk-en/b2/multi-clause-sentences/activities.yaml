workbook:
  - type: critical-analysis
    id: multi-clause-reading-brief
    title: 'Аналіз тексту: протокол консультації'
    instruction: Прочитай текст і виконай завдання до багатокомпонентних речень.
    target_text: 'Коли громадська рада отримала оновлений проєкт правил, кілька учасників одразу підтримали його, але секретарка попросила відкласти голосування, бо в додатку бракувало фінансового пояснення. Модератор запропонував компроміс: робочу групу створюють сьогодні, а остаточну редакцію виносять на наступне засідання, якщо бухгалтерія надішле таблицю до п’ятниці. Частина учасників наполягала, що, коли рішення відкладають без чіткої причини, довіра до процедури слабшає; інші відповідали, що поспіх теж небезпечний, бо помилка в кошторисі може зірвати весь проєкт. Після обговорення рада погодила проміжний варіант, і секретарка зафіксувала його в протоколі: таблицю публікують окремо, коментарі збирають протягом тижня, а голосування проводять лише після відкритої перевірки.'
    questions:
      - Визнач усі граматичні основи в першому реченні.
      - Знайди межу сурядності й підрядності в першому реченні.
      - Поясни, чому після слова компроміс стоїть двокрапка.
      - Випиши приклад збігу сполучників.
      - Поясни, чому в конструкції що, коли рішення відкладають потрібна кома після що.
      - Знайди речення, у якому крапка з комою могла б замінити кому між великими блоками.
      - Перетвори останнє речення на два коротші речення без втрати логіки.
      - Назви один фрагмент, де складний синтаксис справді допомагає аргументації.
    model_answers:
      - "У першому реченні є кілька основ: рада отримала, учасники підтримали, секретарка попросила відкласти, бракувало пояснення."
      - "Двокрапка після слова компроміс вводить зміст компромісного рішення."
      - "Збіг сполучників видно у фрагменті що, коли рішення відкладають; внутрішню підрядну частину можна вилучити."
      - "Останнє речення можна поділити так: Після обговорення рада погодила проміжний варіант, і секретарка зафіксувала його в протоколі. Таблицю публікують окремо, коментарі збирають протягом тижня, а голосування проводять після відкритої перевірки."


  - type: select
    title: Тип зв'язку
    instruction: Познач правильні твердження про структуру речень.
    items:
      - question: Які речення мають сурядний і підрядний зв'язок?
        options:
          - text: "Команда завершила звіт, але редакторка попросила уточнення, бо бракувало джерел."
            correct: true
          - text: "Звіт готовий: додатки перевірено."
            correct: false
          - text: "Коли зустріч завершилася, секретарка надіслала протокол, і учасники подали зауваження."
            correct: true
          - text: "Тиха зала після довгої дискусії."
            correct: false
      - question: Де є безсполучниковий зв'язок?
        options:
          - text: "Рішення очевидне: графік треба оновити."
            correct: true
          - text: "Ми перенесли зустріч, бо доповідач захворів."
            correct: false
          - text: "Дані зникли - обговорення довелося відкласти."
            correct: true
          - text: "Коли надійшов лист, команда зібралася."
            correct: false
      - question: Які варіанти правильно пояснюють двокрапку?
        options:
          - text: "Двокрапка може вводити пояснення."
            correct: true
          - text: "Двокрапка завжди замінює кому перед і."
            correct: false
          - text: "Двокрапка може розкривати зміст попередньої частини."
            correct: true
          - text: "Двокрапка потрібна після кожного підрядного речення."
            correct: false
      - question: Де кома перед неповторюваним і може не ставитися через спільну часову частину?
        options:
          - text: "Коли засідання завершилося, модератор підписав протокол і секретарка надіслала копію."
            correct: true
          - text: "Модератор підписав протокол, і секретарка надіслала копію."
            correct: false
          - text: "Засідання завершилося, і секретарка надіслала копію, коли всі вийшли."
            correct: false
          - text: "Після засідання модератор підписав протокол і секретарка надіслала копію."
            correct: true
      - question: Які речення мають правильну пунктуацію при збігу сполучників?
        options:
          - text: "Редакторка сказала, що, коли надійдуть уточнення, матеріал оновлять."
            correct: true
          - text: "Редакторка сказала, що коли надійдуть уточнення, то матеріал оновлять."
            correct: true
          - text: "Редакторка сказала, що, коли надійдуть уточнення, то матеріал оновлять."
            correct: false
          - text: "Редакторка сказала що коли надійдуть уточнення матеріал оновлять."
            correct: false
      - question: Які маркери найточніше передають причину або наслідок?
        options:
          - text: "бо"
            correct: true
          - text: "тому"
            correct: true
          - text: "і"
            correct: false
          - text: "або"
            correct: false
      - question: Де складне речення варто розбити?
        options:
          - text: "Речення має шість основ, кілька вкладених підрядних і незрозумілий центр."
            correct: true
          - text: "Речення має три частини, але кожна підтримує одну тезу."
            correct: false
          - text: "Читач мусить повертатися на початок, щоб знайти головну думку."
            correct: true
          - text: "Довге речення чітко показує умову, причину й висновок."
            correct: false
      - question: Які твердження про крапку з комою правильні?
        options:
          - text: "Вона розділяє великі частини, у яких уже є коми."
            correct: true
          - text: "Вона слабша за кому."
            correct: false
          - text: "Вона може об'єднати кілька частин одного процесу."
            correct: true
          - text: "Вона ставиться після кожного сполучника що."
            correct: false
      - question: Де підрядна частина називає мету?
        options:
          - text: "Команда додала приклади, щоб читач зрозумів правило."
            correct: true
          - text: "Команда додала приклади, аби читач зрозумів правило."
            correct: true
          - text: "Команда додала приклади, коли завершила пояснення."
            correct: false
          - text: "Команда додала приклади, хоч місця було мало."
            correct: false
      - question: Які дії допомагають аналізувати багатокомпонентне речення?
        options:
          - text: "Знайти всі граматичні основи."
            correct: true
          - text: "Назвати тип зв'язку на кожній межі."
            correct: true
          - text: "Ставити кому перед кожним і."
            correct: false
          - text: "Перевірити смисловий зв'язок між частинами."
            correct: true

  - type: fill-in
    title: Терміни й смислові зв'язки
    instruction: Заповни пропуски відповідними словами або словосполученнями.
    items:
      - sentence: "Сурядність поєднує ____ частини речення."
        answer: рівноправні
        options:
          - рівноправні
          - залежні
          - вставні
          - безособові
        explanation: Сурядні частини не підпорядковуються одна одній.
      - sentence: "Підрядність створює ____ однієї частини від іншої."
        answer: залежність
        options:
          - залежність
          - перелік
          - паузу
          - наголос
        explanation: Підрядна частина пояснює головну або залежить від неї.
      - sentence: "Безсполучниковий зв'язок часто спирається на інтонацію і ____ близькість."
        answer: смислову
        options:
          - смислову
          - звукову
          - відмінкову
          - лексикографічну
        explanation: Сполучника немає, тому зв'язок видно зі змісту й інтонації.
      - sentence: "У реченні з кількома основами треба спочатку визначити ____."
        answer: граматичні основи
        options:
          - граматичні основи
          - наголоси
          - роди іменників
          - суфікси
        explanation: Без основ неможливо знайти межі предикативних частин.
      - sentence: "Двокрапка часто вводить пояснення або ____."
        answer: причину
        options:
          - причину
          - звертання
          - рід
          - частку
        explanation: Двокрапка готує читача до розкриття змісту.
      - sentence: "Тире може підкреслювати різкий ____ або наслідок."
        answer: поворот
        options:
          - поворот
          - словник
          - відмінок
          - підмет
        explanation: Тире часто створює інтонаційний злам.
      - sentence: "Крапка з комою розділяє великі ____ з власними комами."
        answer: блоки
        options:
          - блоки
          - склади
          - звуки
          - закінчення
        explanation: Цей знак сильніший за кому, але слабший за крапку.
      - sentence: "У конструкції «що, коли надійдуть дані, звіт оновлять» підрядну часу можна ____."
        answer: вилучити
        options:
          - вилучити
          - відмінити
          - наголосити
          - узгодити
        explanation: Залишиться каркас «що звіт оновлять», тому кома після що доречна.
      - sentence: "Якщо в конструкції є пара «коли... то», кома між що і коли зазвичай ____."
        answer: не ставиться
        options:
          - не ставиться
          - подвоюється
          - переноситься в кінець
          - замінюється крапкою
        explanation: Співвідносне слово то тримає підрядну конструкцію.
      - sentence: "Парцеляція відокремлює частину висловлення для ____."
        answer: акценту
        options:
          - акценту
          - рими
          - перекладу
          - відмінювання
        explanation: У нейтральному тексті парцеляцію використовують обережно.
      - sentence: "Слово «тому» найчастіше позначає ____."
        answer: наслідок
        options:
          - наслідок
          - умову
          - звертання
          - місце
        explanation: Тому вводить результат попередньої причини.
      - sentence: "Слово «хоч» вводить ____ зв'язок."
        answer: допустовий
        options:
          - допустовий
          - часовий
          - означальний
          - кількісний
        explanation: Допустовий зв'язок називає обставину, яка не скасовує головної дії.
      - sentence: "Двозначність виникає, коли зв'язок між частинами ____."
        answer: не названо
        options:
          - не названо
          - відмінено
          - наголошено
          - процитовано
        explanation: Точний сполучник або знак може прибрати двозначність.
      - sentence: "Логічна ____ допомагає довгому реченню залишатися зрозумілим."
        answer: єдність
        options:
          - єдність
          - калька
          - помилка
          - пауза
        explanation: Усі частини мають підтримувати одну керовану думку.

  - type: error-correction
    title: Редагування багатокомпонентних речень
    instruction: Обери нормативний варіант і прочитай пояснення.
    items:
      - sentence: "Редакторка сказала що коли надійдуть уточнення матеріал оновлять."
        error: "сказала що коли"
        correction: "Редакторка сказала, що, коли надійдуть уточнення, матеріал оновлять."
        options:
          - "Редакторка сказала, що, коли надійдуть уточнення, матеріал оновлять."
          - "Редакторка сказала що, коли надійдуть уточнення матеріал оновлять."
          - "Редакторка сказала, що коли надійдуть уточнення матеріал оновлять."
          - "Редакторка, сказала що коли, надійдуть уточнення матеріал оновлять."
        explanation: Підрядну часу можна вилучити, тому її відокремлюємо з обох боків.
      - sentence: "Команда повідомила, що, якщо рада погодиться, то звіт оприлюднять."
        error: "що, якщо"
        correction: "Команда повідомила, що якщо рада погодиться, то звіт оприлюднять."
        options:
          - "Команда повідомила, що якщо рада погодиться, то звіт оприлюднять."
          - "Команда повідомила що якщо рада погодиться то звіт оприлюднять."
          - "Команда повідомила, що, якщо рада погодиться, то звіт оприлюднять."
          - "Команда повідомила, що якщо, рада погодиться то звіт оприлюднять."
        explanation: Пара якщо... то не розривається комою після що.
      - sentence: "Коли засідання завершилося, модератор підписав протокол, і секретарка надіслала копію."
        error: "підписав протокол, і секретарка"
        correction: "Коли засідання завершилося, модератор підписав протокол і секретарка надіслала копію."
        options:
          - "Коли засідання завершилося, модератор підписав протокол і секретарка надіслала копію."
          - "Коли засідання завершилося модератор підписав протокол і секретарка надіслала копію."
          - "Коли засідання завершилося, модератор підписав протокол, і секретарка надіслала копію."
          - "Коли засідання завершилося модератор, підписав протокол і секретарка надіслала копію."
        explanation: Початкова підрядна частина спільна для обох сурядних частин.
      - sentence: "Рішення очевидне, графік треба оновити."
        error: "очевидне,"
        correction: "Рішення очевидне: графік треба оновити."
        options:
          - "Рішення очевидне: графік треба оновити."
          - "Рішення очевидне, графік треба оновити."
          - "Рішення очевидне і: графік треба оновити."
          - "Рішення, очевидне графік треба оновити."
        explanation: Друга частина розкриває зміст першої, тому доречна двокрапка.
      - sentence: "Дані зникли: обговорення довелося перенести."
        error: "зникли:"
        correction: "Дані зникли - обговорення довелося перенести."
        options:
          - "Дані зникли - обговорення довелося перенести."
          - "Дані зникли: обговорення довелося перенести."
          - "Дані зникли, що обговорення довелося перенести."
          - "Дані зникли і обговорення довелося перенести."
        explanation: Тут друга частина звучить як наслідок, тому тире природніше.
      - sentence: "Матеріали надійшли пізно, і учасники не встигли їх прочитати."
        error: "і учасники"
        correction: "Матеріали надійшли пізно, тому учасники не встигли їх прочитати."
        options:
          - "Матеріали надійшли пізно, тому учасники не встигли їх прочитати."
          - "Матеріали надійшли пізно, і учасники не встигли їх прочитати."
          - "Матеріали надійшли пізно, але учасники не встигли їх прочитати."
          - "Матеріали надійшли пізно, або учасники не встигли їх прочитати."
        explanation: Слово тому точніше називає наслідок.
      - sentence: "Проєкт підтримали, але бюджет неповний, бо голосування перенесли."
        error: "бо голосування"
        correction: "Проєкт підтримали, але голосування перенесли, бо бюджет неповний."
        options:
          - "Проєкт підтримали, але голосування перенесли, бо бюджет неповний."
          - "Проєкт підтримали, але бюджет неповний, бо голосування перенесли."
          - "Проєкт підтримали бо, але бюджет неповний голосування перенесли."
          - "Проєкт підтримали, бюджет неповний але бо голосування перенесли."
        explanation: Причиною перенесення є неповний бюджет, а не навпаки.
      - sentence: "Команда додала приклади, бо читач зрозумів правило."
        error: "бо читач зрозумів"
        correction: "Команда додала приклади, щоб читач зрозумів правило."
        options:
          - "Команда додала приклади, щоб читач зрозумів правило."
          - "Команда додала приклади, бо читач зрозумів правило."
          - "Команда додала приклади, хоч читач зрозумів правило."
          - "Команда додала приклади, коли читач зрозумів правило."
        explanation: Приклади додають із метою, тому потрібне щоб.
      - sentence: "Якщо рада погодить додаток документ оприлюднять завтра."
        error: "додаток документ"
        correction: "Якщо рада погодить додаток, документ оприлюднять завтра."
        options:
          - "Якщо рада погодить додаток, документ оприлюднять завтра."
          - "Якщо рада погодить, додаток документ оприлюднять завтра."
          - "Якщо рада, погодить додаток документ оприлюднять завтра."
          - "Якщо рада погодить додаток документ, оприлюднять завтра."
        explanation: Підрядну умови відокремлюємо комою.
      - sentence: "Звіт готовий але додатки ще перевіряють."
        error: "готовий але"
        correction: "Звіт готовий, але додатки ще перевіряють."
        options:
          - "Звіт готовий, але додатки ще перевіряють."
          - "Звіт, готовий але додатки ще перевіряють."
          - "Звіт готовий але, додатки ще перевіряють."
          - "Звіт готовий: але додатки ще перевіряють."
