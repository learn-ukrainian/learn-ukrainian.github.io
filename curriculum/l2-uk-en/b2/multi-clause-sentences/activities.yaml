  - type: essay-response
    id: multi-clause-editing-note
    title: 'Письмо: синтаксичне редагування'
    instruction: Напиши короткий редакторський коментар українською.
    prompt: 'Перепиши фрагмент у двох версіях: 1) одне багатокомпонентне речення з чіткою ієрархією; 2) два або три коротші речення. Вихідний зміст: документи надійшли пізно; частина учасників не отримала додатків; комісія перенесла голосування; організатори хочуть зберегти довіру до процедури. Поясни, який варіант доречніший для протоколу, а який - для публічного повідомлення.'
    min_words: 170
    model_answer: 'Для протоколу доречний компактний варіант: Оскільки документи надійшли пізно і частина учасників не отримала додатків, комісія перенесла голосування, щоб зберегти довіру до процедури. Для публічного повідомлення можна розділити зміст: Документи надійшли пізно, і частина учасників не отримала додатків. Тому комісія перенесла голосування. Організатори пояснюють, що це рішення має зберегти довіру до процедури.'
    rubric:
      - criteria: "Синтаксична точність"
        description: "У відповіді правильно поєднано сурядність, підрядність або безсполучниковий зв'язок."
        points: 4
      - criteria: "Редакторське пояснення"
        description: "Автор пояснює різницю між протоколом і публічним повідомленням."
        points: 3
      - criteria: "Пунктуація"
        description: "Коми й інші знаки відповідають межам предикативних частин."
        points: 3
