        correct: true
        explanation: Центр речення має бути видимим для читача.
      - statement: "У формальному тексті можна замінити кожну двокрапку парцеляцією."
        correct: false
        explanation: Парцеляція створює стилістичний акцент і не завжди доречна.
      - statement: "У складному реченні займенник має мати прозорий референт."
        correct: true
        explanation: Інакше читач не зрозуміє, до кого або чого він відсилає.
      - statement: "Короткі речення завжди примітивніші за довгі."
        correct: false
        explanation: Коротке речення може бути найточнішим редакторським рішенням.
      - statement: "Чергуй довгі й короткі речення, щоб абзац мав природний ритм."
        correct: true
