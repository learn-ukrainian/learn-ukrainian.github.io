      - statement: "Речення з чотирма основами завжди помилкове."
        correct: false
        explanation: Воно нормативне, якщо ієрархія й пунктуація ясні.
      - statement: "Безсполучниковий зв'язок може бути точним, якщо знак відповідає змісту."
