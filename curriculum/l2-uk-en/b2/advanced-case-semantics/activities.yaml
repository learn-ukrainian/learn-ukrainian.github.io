- type: essay-response
  id: advanced-case-semantics-essay
  title: "Мініесе: відмінок як вибір змісту"
  instruction: >-
    Напишіть коротке пояснення для іншого учня. Покажіть, як зміна відмінка або
    прийменника змінює зміст речення.
  prompt: >-
    Поясніть різницю між парами: мені сумно / я сумую; текст акта / наслідки
    акту; підписати ручкою / прийти з ручкою; через хворобу / попри хворобу.
    Використайте щонайменше три терміни з модуля.
  min_words: 220
  model_answer: >-
    Відмінок в українській мові не просто додає закінчення, а показує роль
    слова в ситуації. У парі мені сумно / я сумую давальний мені називає
    переживача стану, тоді як я сумую має підмет і дієслово дії або
    переживання. У парі текст акта / наслідки акту родовий залежить від
    семантики: акт як документ має форму акта, а акт як подія або дія має форму
    акту. У парі підписати ручкою / прийти з ручкою орудний ручкою називає
    засіб дії, а з ручкою описує супровід або наявність предмета. Нарешті,
    через хворобу передає причину й керує знахідним, а попри хворобу передає
    допустове значення: хвороба була перешкодою, але дія відбулася. Тому на B2
    треба перевіряти не тільки форму, а й керування, семантичну роль і регістр.
