- type: reading
  id: advanced-case-semantics-reading
  title: "Читання: звіт після громадського обговорення"
  instruction: "Прочитайте текст і визначте семантичні ролі відмінків."
  source: "Навчальний уривок для модуля B2."
  text: >-
    Після перевірки документів комісія не знайшла доказів порушення процедури.
    Водночас заявникові потрібно надіслати копію акта електронною поштою, бо
    термін подання продовжено тільки до першого листопада. Попри застереження
    експертів, громада пішла назустріч підприємцям і дозволила провести
    змагання з футболу за новими правилами. Частину коштів переказали
    грошима, частину - через банк, а на дверях центру повісили оголошення для
    учасників. У звіті окремо пояснено, чому будинок із каменю потребує іншого
    ремонту, ніж край пошкодженого каменя біля входу.
  tasks:
    - "Знайдіть два приклади родового відмінка з прийменником."
    - "Поясніть, яку роль виконує давальний у слові заявникові."
    - "Випишіть приклад орудного засобу."
    - "Поясніть різницю між каменю і каменя в останньому реченні."
    - "Знайдіть форму pluralia tantum і назвіть її відмінок."

- type: quiz
  title: "Семантичні ролі відмінків"
  instruction: "Оберіть найточніше пояснення форми."
  items:
    - question: "Що виражає давальний у реченні Мені сумно?"
      options:
        - text: "переживача стану"
          correct: true
        - text: "інструмент дії"
          correct: false
        - text: "частину цілого"
          correct: false
        - text: "місце перебування"
          correct: false
      explanation: "Мені називає того, хто переживає стан."
    - question: "Яке речення правильно передає засіб дії?"
      options:
        - text: "Заяву підписали електронним підписом."
          correct: true
        - text: "Заяву підписали з електронним підписом."
          correct: false
        - text: "Заяву підписали електронного підпису."
          correct: false
        - text: "Заяву підписали електронному підпису."
          correct: false
      explanation: "Засіб дії передається безприйменниковим орудним."
    - question: "У якому варіанті родовий показує процес, а не дату місяця?"
      options:
        - text: "поетика осіннього листопаду"
          correct: true
        - text: "до першого листопада"
          correct: false
        - text: "зустріч першого листопада"
          correct: false
        - text: "розклад на кінець листопада"
          correct: false
      explanation: "Листопад як процес опадання листя має форму листопаду."
    - question: "Який прийменник керує давальним?"
      options:
        - text: "всупереч прогнозам"
          correct: true
        - text: "попри прогнози"
          correct: false
        - text: "після прогнозів"
          correct: false
        - text: "через прогнози"
          correct: false
      explanation: "Всупереч керує давальним відмінком."
    - question: "У якому реченні форма акта означає документ?"
      options:
        - text: "Юристи перевірили текст акта."
          correct: true
        - text: "Наслідки терористичного акту обговорили в парламенті."
          correct: false
        - text: "Після акту місто посилило безпеку."
          correct: false
        - text: "Це прояв акту доброї волі."
          correct: false
      explanation: "Акт як документ має родовий акта."
    - question: "Що виражає місцевий у конструкції у звіті?"
      options:
        - text: "середовище або місце в тексті"
          correct: true
        - text: "адресата дії"
          correct: false
        - text: "знаряддя"
          correct: false
        - text: "звертання"
          correct: false
      explanation: "У звіті показує, де саме міститься інформація."
    - question: "Яка форма pluralia tantum правильна?"
      options:
        - text: "немає грошей"
          correct: true
        - text: "немає гроша"
          correct: false
        - text: "немає грошом"
          correct: false
        - text: "немає грошах"
          correct: false
      explanation: "Гроші мають множинну парадигму: родовий грошей."
    - question: "Яка конструкція є нормативною для причини?"
      options:
        - text: "через хворобу"
          correct: true
        - text: "із-за хвороби"
          correct: false
        - text: "по хворобі"
          correct: false
        - text: "з хворобою"
          correct: false
      explanation: "Причину природно передає через + знахідний."
    - question: "Яка конструкція правильно передає відповідність наказу?"
      options:
        - text: "згідно з наказом"
          correct: true
        - text: "згідно наказу"
          correct: false
        - text: "відповідно з наказом"
          correct: false
        - text: "по наказу"
          correct: false
      explanation: "Згідно з керує орудним: згідно з наказом."
    - question: "У якому варіанті звертання має нормативний кличний?"
      options:
        - text: "Пане Михайле, зайдіть до кабінету."
          correct: true
        - text: "Пане Михайло, зайдіть до кабінету."
          correct: false
        - text: "Пан Михайле, зайдіть до кабінету."
          correct: false
        - text: "Пану Михайлу, зайдіть до кабінету."
          correct: false
      explanation: "У звертанні статусне слово й ім'я стоять у кличному."

