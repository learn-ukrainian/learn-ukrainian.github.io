version: '1.0'
module: advanced-case-semantics
level: b2

inline:
  - type: select
    title: Семантична роль відмінка
    instruction: Позначте всі правильні пояснення форми в контексті.
    items:
      - question: "У реченні «Комісія не знайшла доказів» правильні пояснення такі:"
        options:
          - text: "доказів є родовим після заперечення"
            correct: true
          - text: "форма передає відсутній об'єкт"
            correct: true
          - text: "це давальний адресата"
            correct: false
          - text: "це орудний способу"
            correct: false
        min_correct: 2
        explanation: "Заперечення й відсутність часто ведуть до родового."
      - question: "У реченні «Громаді бракує часу» правильні пояснення такі:"
        options:
          - text: "громаді є давальним носія стану"
            correct: true
          - text: "часу є родовим після бракує"
            correct: true
          - text: "громаді називає інструмент"
            correct: false
          - text: "часу є знахідним напряму"
            correct: false
        min_correct: 2
        explanation: "Давальний показує зацікавлену сторону, родовий - те, чого бракує."
      - question: "У реченні «Звіт перевірили новим методом» правильні пояснення такі:"
        options:
          - text: "методом називає спосіб дії"
            correct: true
          - text: "це орудний засобу"
            correct: true
          - text: "методом є адресатом дії"
            correct: false
          - text: "це родовий причини"
            correct: false
        min_correct: 2
        explanation: "Орудний називає спосіб або засіб перевірки."
      - question: "У фразі «унаслідок затримки» правильні пояснення такі:"
        options:
          - text: "унаслідок керує родовим"
            correct: true
          - text: "конструкція називає причину"
            correct: true
          - text: "затримки стоїть у давальному"
            correct: false
          - text: "це допустовість зі знахідним"
            correct: false
        min_correct: 2
        explanation: "Унаслідок + родовий вводить причину або результат."
      - question: "У фразі «завдяки підтримці» правильні пояснення такі:"
        options:
          - text: "завдяки керує давальним"
            correct: true
          - text: "конструкція зазвичай має позитивний причинний відтінок"
            correct: true
          - text: "підтримці є родовим"
            correct: false
          - text: "завдяки завжди нейтральне щодо наслідку"
            correct: false
        min_correct: 2
        explanation: "Завдяки доречне для корисної або позитивної причини."
      - question: "У фразі «попри дощ» правильні пояснення такі:"
        options:
          - text: "попри керує знахідним"
            correct: true
          - text: "конструкція передає допустовість"
            correct: true
          - text: "дощ стоїть в орудному"
            correct: false
          - text: "це модель завдяки + давальний"
            correct: false
        min_correct: 2
        explanation: "Попри дощ означає дію всупереч обставині."
      - question: "У реченні «Студенти йшли вулицею» правильні пояснення такі:"
        options:
          - text: "вулицею називає шлях руху"
            correct: true
          - text: "це безприйменниковий орудний"
            correct: true
          - text: "вулицею називає місце статичного перебування"
            correct: false
          - text: "це родовий джерела"
            correct: false
        min_correct: 2
        explanation: "Орудний може позначати шлях."
      - question: "У реченні «Перед дверима стояв охоронець» правильні пояснення такі:"
        options:
          - text: "дверима є орудним множини"
            correct: true
          - text: "двері належать до pluralia tantum"
            correct: true
          - text: "перед керує родовим"
            correct: false
          - text: "дверима має форму однини"
            correct: false
        min_correct: 2
        explanation: "Двері мають множинну парадигму; перед керує орудним."

  - type: group-sort
    title: Прийменник і відмінок
    instruction: Розподіліть конструкції за керуванням.
    groups:
      - name: "родовий"
        items:
          - "унаслідок затримки"
          - "з метою перевірки"
          - "відповідно до регламенту"
          - "протягом тижня"
      - name: "давальний"
        items:
          - "завдяки підтримці"
          - "всупереч прогнозам"
          - "наперекір обставинам"
          - "назустріч громаді"
      - name: "знахідний"
        items:
          - "попри дощ"
          - "через помилку"
          - "у місто"
          - "на зустріч"
      - name: "орудний"
        items:
          - "перед входом"
          - "між корпусами"
          - "над текстом"
          - "вулицею"

  - type: fill-in
    title: Простір, час, причина
    instruction: Виберіть форму, яка відповідає значенню речення.
    items:
      - sentence: "____ затримки фінансування графік змінили."
        answer: "Унаслідок"
        options: ["Унаслідок", "Завдяки", "Попри", "Всупереч"]
        explanation: "Унаслідок + родовий називає причину."
      - sentence: "____ підтримці громади проєкт завершили."
        answer: "Завдяки"
        options: ["Завдяки", "Унаслідок", "Попри", "Через"]
        explanation: "Завдяки + давальний має позитивний відтінок."
      - sentence: "____ втому учасники залишилися на обговоренні."
        answer: "Попри"
        options: ["Попри", "Завдяки", "Внаслідок", "До"]
        explanation: "Попри + знахідний передає допустовість."
      - sentence: "Команда працювала ____ текстом до вечора."
        answer: "над"
        options: ["над", "до", "без", "для"]
        explanation: "Над керує орудним."
      - sentence: "Перед ____ поставили тимчасову табличку."
        answer: "дверима"
        options: ["дверима", "дверей", "двері", "дверях"]
        explanation: "Перед керує орудним; двері мають множинну форму."
      - sentence: "У звіті бракує ____ для висновку."
        answer: "доказів"
        options: ["доказів", "докази", "доказами", "доказам"]
        explanation: "Бракувати керує родовим."
      - sentence: "Новий порядок допоможе ____ швидше отримувати послуги."
        answer: "громаді"
        options: ["громаді", "громаду", "громадою", "громади"]
        explanation: "Допомагати керує давальним."
      - sentence: "Ранками команда перевіряла дані, а ____ писала висновки."
        answer: "вечорами"
        options: ["вечорами", "вечорів", "вечори", "вечорах"]
        explanation: "Орудний може називати регулярний час."
      - sentence: "Зустріч перенесли ____ відсутність кворуму."
        answer: "через"
        options: ["через", "завдяки", "всупереч", "між"]
        explanation: "Через у причинному значенні керує знахідним."
      - sentence: "____ до регламенту рішення оприлюднили вчасно."
        answer: "Відповідно"
        options: ["Відповідно", "Попри", "Завдяки", "Між"]
        explanation: "Відповідно до + родовий називає норму."

  - type: error-correction
    title: Керування і форма
    instruction: Виправте помилку у відмінку або прийменнику.
    items:
      - sentence: "Завдяки підтримку громади проєкт завершили."
        error: "підтримку"
        correction: "підтримці"
        options: ["підтримці", "підтримку", "підтримкою", "підтримки"]
        explanation: "Завдяки керує давальним."
      - sentence: "Унаслідок затримкою графік змінили."
        error: "затримкою"
        correction: "затримки"
        options: ["затримки", "затримкою", "затримці", "затримку"]
        explanation: "Унаслідок керує родовим."
      - sentence: "Попри дощу учасники прийшли."
        error: "дощу"
        correction: "дощ"
        options: ["дощ", "дощу", "дощем", "дощі"]
        explanation: "Попри керує знахідним."
      - sentence: "Комісія не знайшла докази порушення."
        error: "докази"
        correction: "доказів"
        options: ["доказів", "докази", "доказами", "доказам"]
        explanation: "Після заперечення природний родовий."
      - sentence: "Перед дверей стояв волонтер."
        error: "дверей"
        correction: "дверима"
        options: ["дверима", "дверей", "двері", "дверях"]
        explanation: "Перед керує орудним."
      - sentence: "Громаду бракує часу."
        error: "громаду"
        correction: "громаді"
        options: ["громаді", "громаду", "громадою", "громади"]
        explanation: "Носій стану з бракує стоїть у давальному."
      - sentence: "Протягом три дні тривала перевірка."
        error: "три дні"
        correction: "трьох днів"
        options: ["трьох днів", "три дні", "трьома днями", "трьом дням"]
        explanation: "Протягом керує родовим."
      - sentence: "Ножицями бракує на столі."
        error: "ножицями"
        correction: "ножиць"
        options: ["ножиць", "ножицями", "ножицях", "ножицям"]
        explanation: "Бракує чого? ножиць."

  - type: quiz
    title: Поясни вибір
    instruction: Оберіть пояснення, яке найкраще відповідає контексту.
    items:
      - question: "Чому у фразі «бракує доказів» потрібен родовий?"
        options:
          - text: "бо бракувати керує тим, чого немає або недостатньо"
            correct: true
          - text: "бо доказів є інструментом"
            correct: false
          - text: "бо це напрям руху"
            correct: false
          - text: "бо після бракувати завжди називний"
            correct: false
        explanation: "Родовий називає відсутній ресурс."
      - question: "Чому «завдяки підтримці» краще за «завдяки помилці» в нейтральному звіті?"
        options:
          - text: "завдяки передбачає позитивний або корисний причинний відтінок"
            correct: true
          - text: "завдяки завжди означає негативну причину"
            correct: false
          - text: "після завдяки потрібен знахідний"
            correct: false
          - text: "помилка не може бути іменником"
            correct: false
        explanation: "Для негативної причини частіше підходить через або унаслідок."
      - question: "Яке пояснення найкраще для «після аудиту проєкт змінили»?"
        options:
          - text: "після називає часову послідовність, не обов'язково причину"
            correct: true
          - text: "після завжди означає мету"
            correct: false
          - text: "аудиту тут орудний"
            correct: false
          - text: "речення не може бути часовим"
            correct: false
        explanation: "Причину треба назвати окремо, якщо вона важлива."
      - question: "Яке слово належить до pluralia tantum?"
        options:
          - text: "гроші"
            correct: true
          - text: "лист"
            correct: false
          - text: "місто"
            correct: false
          - text: "рішення"
            correct: false
        explanation: "Гроші мають множинну форму в цьому значенні."
      - question: "Яка форма природна після «перед»?"
        options:
          - text: "перед дверима"
            correct: true
          - text: "перед дверей"
            correct: false
          - text: "перед двері"
            correct: false
          - text: "перед дверям"
            correct: false
        explanation: "Перед у просторовому значенні керує орудним."
      - question: "Яка пара показує напрям і місце?"
        options:
          - text: "у місто / у місті"
            correct: true
          - text: "містом / міста"
            correct: false
          - text: "до містом / на місто"
            correct: false
          - text: "місті / місто"
            correct: false
        explanation: "Знахідний показує напрям, місцевий - місце."
      - question: "Що пояснює різницю між «листопада» і «листопаду»?"
        options:
          - text: "місяць у даті проти процесу опадання листя"
            correct: true
          - text: "давальний проти орудного"
            correct: false
          - text: "однина проти множини"
            correct: false
          - text: "українська не має такої різниці"
            correct: false
        explanation: "Родовий може мати семантично різні закінчення."
      - question: "Чому «через помилку» не те саме, що «завдяки підтримці»?"
        options:
          - text: "через називає нейтральну або негативну причину, завдяки - корисну"
            correct: true
          - text: "через керує давальним"
            correct: false
          - text: "завдяки керує знахідним"
            correct: false
          - text: "обидві конструкції мають однаковий тон"
            correct: false
        explanation: "Причинові прийменники відрізняються керуванням і оцінкою."
      - question: "Яке пояснення найкраще для «рішення виявилося компромісом»?"
        options:
          - text: "компромісом є орудним ролі або результату оцінки"
            correct: true
          - text: "компромісом називає адресата"
            correct: false
          - text: "компромісом є місцевим"
            correct: false
          - text: "тут потрібен родовий компромісу"
            correct: false
        explanation: "Після виявитися часто стоїть орудний."
      - question: "Який варіант найпрозоріший для широкої аудиторії?"
        options:
          - text: "Графік змінили, бо фінансування затрималося."
            correct: true
          - text: "Унаслідок затримки фінансування здійснено зміну графіка."
            correct: false
          - text: "З метою графіка фінансування затримано."
            correct: false
          - text: "Графік змінено фінансуванням."
            correct: false
        explanation: "Для широкої аудиторії дієслівна причина часто прозоріша."

workbook:
  - id: workbook-1
    type: reading
    title: "Читання: службова записка"
    instruction: Прочитайте уривок і поясніть відмінкові вибори.
    source: "Навчальний уривок для модуля B2."
    text: "Унаслідок затримки фінансування команда змінила графік. Громаді повідомили про новий строк електронною поштою. Завдяки підтримці волонтерів консультації не скасували, хоча через відсутність частини документів рішення відклали. Перед дверима центру поставили табличку, а в оголошенні пояснили, що протягом трьох днів заявникам бракуватиме доступу до архіву."
    tasks:
      - "Знайдіть дві причинові конструкції з різним керуванням."
      - "Поясніть давальний у слові громаді."
      - "Випишіть орудний простору."
      - "Знайдіть родовий після бракувати."
      - "Поясніть, чому протягом трьох днів має родовий."

  - type: match-up
    title: Форма і пояснення
    instruction: Поєднайте приклад із семантичною роллю.
    pairs:
      - left: "немає доказів"
        right: "родовий відсутності"
      - left: "додати води"
        right: "партитивний родовий"
      - left: "громаді важливо"
        right: "давальний переживача або зацікавленої сторони"
      - left: "допоможе студентам"
        right: "давальний вигоди"
      - left: "перевірити методом"
        right: "орудний способу"
      - left: "перед входом"
        right: "просторовий орудний"
      - left: "у місто"
        right: "знахідний напряму"
      - left: "у місті"
        right: "місцевий локалізації"
      - left: "попри дощ"
        right: "допустовість зі знахідним"
      - left: "протягом тижня"
        right: "родовий тривалості"

  - type: fill-in
    title: Pluralia tantum
    instruction: Виберіть форму множинного іменника в потрібному відмінку.
    items:
      - sentence: "У бюджеті бракує ____ на ремонт."
        answer: "грошей"
        options: ["грошей", "грошима", "грошам", "грошах"]
        explanation: "Бракує чого? грошей."
      - sentence: "Перед ____ стояли учасники."
        answer: "дверима"
        options: ["дверима", "дверей", "двері", "дверям"]
        explanation: "Перед керує орудним."
      - sentence: "Картон вирізали ____."
        answer: "ножицями"
        options: ["ножицями", "ножиць", "ножицям", "ножицях"]
        explanation: "Орудний знаряддя."
      - sentence: "Без ____ він не бачив тексту на екрані."
        answer: "окулярів"
        options: ["окулярів", "окулярами", "окулярам", "окулярах"]
        explanation: "Без керує родовим."
      - sentence: "На ____ була пляма після фарби."
        answer: "штанах"
        options: ["штанах", "штанів", "штанами", "штанам"]
        explanation: "На у значенні місця керує місцевим."
      - sentence: "Волонтери допомогли ____ не зникнути під час переїзду."
        answer: "грошам"
        options: ["грошам", "грошей", "грошима", "грошах"]
        explanation: "Допомогти кому? чому? - давальний."
      - sentence: "Оголошення висіло на ____."
        answer: "дверях"
        options: ["дверях", "дверима", "дверей", "двері"]
        explanation: "На дверях - місцевий."
      - sentence: "Ремонт ____ перенесли на п'ятницю."
        answer: "штанів"
        options: ["штанів", "штанами", "штанах", "штанам"]
        explanation: "Ремонт чого? штанів."
      - sentence: "У ____ подряпалася лінза."
        answer: "окулярах"
        options: ["окулярах", "окулярів", "окулярами", "окулярам"]
        explanation: "У чому? в окулярах."
      - sentence: "До ____ прикріпили нову ручку."
        answer: "дверей"
        options: ["дверей", "дверима", "двері", "дверях"]
        explanation: "До керує родовим."

  - type: error-correction
    title: Складні іменники
    instruction: Виправте форму pluralia tantum або варіативний родовий.
    items:
      - sentence: "У касі бракує гроші."
        error: "гроші"
        correction: "грошей"
        options: ["грошей", "гроші", "грошима", "грошам"]
