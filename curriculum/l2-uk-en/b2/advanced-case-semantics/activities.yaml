  - id: workbook-5
    type: essay-response
    title: Пояснення відмінкового вибору
    instruction: Напишіть 150-180 слів, пояснюючи відмінки в одному службовому або навчальному уривку.
    prompt: "Створіть короткий уривок про зміну графіка, перевірку документів або волонтерську подію. Використайте родовий відсутності, давальний адресата або переживача, орудний способу, одну причинову конструкцію і один іменник pluralia tantum. Поясніть щонайменше три вибори."
    min_words: 150
    model_answer: |-
      > [!model-answer]
      > Унаслідок затримки фінансування команда змінила графік консультацій. Громаді повідомили про новий строк електронною поштою, але в оголошенні пояснили, що для частини заявників бракує документів. Перед дверима центру поставили табличку, а волонтери допомогли людям без окулярів прочитати інструкцію. Я використав **унаслідок затримки**, бо треба було назвати причину в офіційному стилі; **громаді** стоїть у давальному, бо це адресат повідомлення і зацікавлена сторона; **електронною поштою** є орудним засобу; **документів** після **бракує** називає відсутній ресурс; **дверима** має орудний множини, бо слово **двері** належить до pluralia tantum, а прийменник **перед** керує орудним.
    rubric:
      - criteria: "Семантичні ролі"
        description: "Автор пояснює відмінки через значення, а не лише через питання."
        points: 4
      - criteria: "Керування"
        description: "Прийменники й дієслова керують правильними формами."
        points: 4
      - criteria: "Складні іменники"
        description: "У тексті правильно використано pluralia tantum або варіативну парадигму."
        points: 4
