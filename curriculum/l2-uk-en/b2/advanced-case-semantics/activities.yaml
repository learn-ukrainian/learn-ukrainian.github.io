      right: "родовий причини"
    - left: "електронною поштою"
      right: "орудний засобу або каналу"

- type: fill-in
  title: "Виберіть відмінкову форму"
  instruction: "Заповніть пропуск формою, яка відповідає змісту речення."
  items:
    - sentence: "Будинок із ____ добре тримає прохолоду."
      answer: "каменю"
      options: ["каменю", "каменя", "каменем", "камінь"]
      explanation: "Ідеться про матеріал, тому потрібна форма каменю."
    - sentence: "Край великого ____ був пошкоджений."
      answer: "каменя"
      options: ["каменя", "каменю", "каменем", "камені"]
      explanation: "Ідеться про конкретний предмет."
    - sentence: "Заявникові потрібно надіслати копію ____."
      answer: "акта"
      options: ["акта", "акту", "актом", "актові"]
      explanation: "Акт як документ має форму акта."
    - sentence: "Після терористичного ____ місто посилило безпеку."
      answer: "акту"
      options: ["акту", "акта", "актом", "акті"]
      explanation: "Акт як подія або дія має форму акту."
    - sentence: "____ прогнозам, зустріч відбулася вчасно."
      answer: "Всупереч"
      options: ["Всупереч", "Через", "Після", "Без"]
      explanation: "Всупереч керує давальним і передає протидію очікуваному."
    - sentence: "Координатор подякував ____ за допомогу."
      answer: "лікареві"
      options: ["лікареві", "лікаря", "лікарем", "лікар"]
      explanation: "Подякувати кому? лікареві."
    - sentence: "Форму потрібно підписати ____."
      answer: "ручкою"
      options: ["ручкою", "з ручкою", "ручки", "ручці"]
      explanation: "Інструмент дії передається орудним без прийменника."
    - sentence: "Оголошення висить на ____ центру."
      answer: "дверях"
      options: ["дверях", "дверей", "дверима", "двері"]
      explanation: "На дверях - місцевий множинного іменника двері."
    - sentence: "Команда пішла ____ мешканцям і змінила графік."
      answer: "назустріч"
      options: ["назустріч", "замість", "після", "крім"]
      explanation: "Назустріч керує давальним."
    - sentence: "Змагання ____ футболу перенесли через дощ."
      answer: "з"
      options: ["з", "по", "на", "при"]
      explanation: "Нормативна модель: змагання з футболу."

- type: error-correction
  title: "Виправте керування і форму"
  instruction: "Виправте речення й поясніть граматичну причину."
  items:
    - sentence: "Я мешкаю по адресі вулиця Лесі Українки, 12."
      error: "по адресі"
      correction: "за адресою"
      error_type: "construction"
      options: ["за адресою", "по адресі", "на адресу", "адресою по"]
      explanation: "Нормативна просторова модель: мешкати за адресою."
    - sentence: "Учасники грали у змаганнях по футболу."
      error: "по футболу"
      correction: "з футболу"
      error_type: "construction"
      options: ["з футболу", "по футболу", "на футболі", "за футболом"]
      explanation: "Сферу діяльності передає прийменник з із родовим."
    - sentence: "Я оплатив послугу з карткою."
      error: "з карткою"
      correction: "карткою"
      error_type: "construction"
      options: ["карткою", "з карткою", "картці", "картки"]
      explanation: "Засіб оплати передається орудним без прийменника."
    - sentence: "Всупереч прогнози, дискусія була спокійною."
      error: "прогнози"
      correction: "прогнозам"
      error_type: "word"
      options: ["прогнозам", "прогнози", "прогнозами", "прогнозів"]
      explanation: "Всупереч керує давальним."
    - sentence: "Через недовіри частини учасників зустріч перенесли."
      error: "недовіри"
      correction: "недовіру"
      error_type: "word"
      options: ["недовіру", "недовіри", "недовірою", "недовірі"]
      explanation: "Через у причинному значенні керує знахідним."
    - sentence: "Подругі було ніяково ставити запитання."
      error: "Подругі"
      correction: "Подрузі"
      error_type: "word"
      options: ["Подрузі", "Подругі", "Подругою", "Подруга"]
      explanation: "У давальному відбувається чергування г - з."
    - sentence: "Юристи перевірили текст акту."
      error: "акту"
      correction: "акта"
      error_type: "word"
      options: ["акта", "акту", "актом", "актові"]
      explanation: "Коли акт означає документ, потрібна форма акта."
    - sentence: "На дверями висить нове оголошення."
      error: "дверями"
      correction: "дверях"
      error_type: "word"
      options: ["дверях", "дверями", "дверей", "дверям"]
      explanation: "На з місцевим позначає місце: на дверях."
    - sentence: "Звіт підготовлено аналітиком."
      error: "підготовлено аналітиком"
      correction: "аналітик підготував звіт"
      error_type: "construction"
      options: ["аналітик підготував звіт", "підготовлено аналітиком", "підготовлено аналітику", "аналітиком звіт"]
      explanation: "Людину-діяча краще зробити підметом активного речення."
    - sentence: "Пане Михайло, дозвольте уточнити питання."
      error: "Михайло"
      correction: "Михайле"
      error_type: "word"
      options: ["Михайле", "Михайло", "Михайла", "Михайлом"]
      explanation: "У звертанні ім'я має стояти в кличному відмінку."

- type: group-sort
  title: "Розподіліть приклади за значенням"
  instruction: "Перетягніть конструкції до груп за головною семантичною роллю."
  groups:
    - name: "родовий: частина, причина, відсутність"
      items:
        - "немає доказів"
        - "половина бюджету"
        - "унаслідок затримки"
        - "випити чаю"
    - name: "давальний: адресат або переживач"
      items:
        - "мені холодно"
        - "лист директорові"
        - "учасникам бракує часу"
        - "назустріч мешканцям"
    - name: "орудний: засіб, роль, шлях"
      items:
        - "підписати ручкою"
        - "стати редакторкою"
        - "іти вулицею"
        - "електронною поштою"
    - name: "місцевий або кличний"
      items:
        - "на дверях"
        - "у звіті"
        - "пане Михайле"
        - "колего"

- type: true-false
  title: "Перевірка тверджень"
  instruction: "Визначте, чи твердження правильне."
  items:
    - statement: "Форма мені в реченні Мені сумно називає переживача стану."
      correct: true
      explanation: "Давальний може бути центром безособової конструкції стану."
    - statement: "Фрази текст акта і наслідки акту мають однакове значення."
      correct: false
      explanation: "Акта стосується документа, акту - дії або події."
    - statement: "Інструмент дії зазвичай передається орудним без прийменника з."
      correct: true
      explanation: "Писати ручкою, оплатити карткою, підписати маркером."
    - statement: "Всупереч і наперекір керують родовим відмінком."
      correct: false
      explanation: "Ці прийменники керують давальним: всупереч прогнозам."
    - statement: "Слово двері має звичайну однину дверя."
      correct: false
      explanation: "Двері належать до pluralia tantum і мають множинну парадигму."
    - statement: "Згідно з наказом і відповідно до наказу є нормативними конструкціями."
      correct: true
      explanation: "Згідно з керує орудним, відповідно до - родовим."
    - statement: "У конструкції будинок із каменю слово каменю називає матеріал."
      correct: true
      explanation: "Матеріал часто має родовий на -у."
    - statement: "Форма директорові може називати адресата листа."
      correct: true
      explanation: "Директорові - давальний адресата."
    - statement: "У конструкції На дверях оголошення слово дверях стоїть в орудному."
      correct: false
      explanation: "На дверях - місцевий відмінок множини."
    - statement: "Кличний відмінок не потрібний у формальному звертанні."
      correct: false
      explanation: "У формальному звертанні кличний є маркером норми й поваги."

- type: reading
  id: advanced-case-semantics-editing-reading
  title: "Редакторська задача: службове оголошення"
  instruction: "Прочитайте оголошення й запропонуйте точніші форми."
  source: "Навчальний уривок для модуля B2."
  text: >-
    Шановний Михайло, повідомляємо, що по причині затримки ремонту зустріч
    переноситься. Згідно рішення адміністрації, учасників просять прийти з
    паспортом і оплатити внесок з карткою. Оголошення буде розміщено на дверями
    центру. Якщо вам незручно, напишіть координатору електронною поштою.
  tasks:
    - "Знайдіть звертання, яке треба поставити в кличному відмінку."
    - "Замініть кальку по причині на нормативну причинову конструкцію."
    - "Виправте конструкцію згідно рішення."
    - "Поясніть різницю між прийти з паспортом і оплатити карткою."
    - "Виправте форму на дверями й назвіть відмінок."

- type: select
  title: "Позначте природні варіанти"
  instruction: "Оберіть усі граматично й стилістично природні речення."
  items:
    - question: "Причина і наслідок."
      min_correct: 2
      options:
        - text: "Через хворобу зустріч перенесли."
          correct: true
        - text: "Унаслідок помилки дані втрачено."
          correct: true
        - text: "Із-за хвороби зустріч перенесли."
          correct: false
        - text: "Через хвороби зустріч перенесли."
          correct: false
      explanation: "Через керує знахідним, унаслідок - родовим."
    - question: "Форми pluralia tantum."
      min_correct: 2
      options:
        - text: "На дверях висить оголошення."
          correct: true
        - text: "Бракує грошей на ремонт."
          correct: true
        - text: "На дверями висить оголошення."
          correct: false
        - text: "Бракує гроша на ремонт."
          correct: false
      explanation: "Двері й гроші мають множинну парадигму."
    - question: "Давальний у порадах та інструкціях."
      min_correct: 2
      options:
        - text: "Заявникові потрібно додати копію паспорта."
          correct: true
        - text: "Учасникам варто перевірити адресу."
          correct: true
        - text: "Заявника потрібно додати копію паспорта."
          correct: false
        - text: "Учасників варто перевірити адресу."
          correct: false
      explanation: "Потрібно кому? варто кому? - давальний."
    - question: "Орудний засобу і супроводу."
      min_correct: 2
      options:
        - text: "Надішліть документ електронною поштою."
          correct: true
        - text: "Ми працювали з координаторкою."
          correct: true
        - text: "Надішліть документ з електронною поштою."
          correct: false
        - text: "Ми працювали координаторкою."
          correct: false
      explanation: "Засіб без прийменника, супровід із прийменником з."
    - question: "Родовий -а/-у за значенням."
      min_correct: 2
      options:
        - text: "Текст юридичного акта треба перевірити."
