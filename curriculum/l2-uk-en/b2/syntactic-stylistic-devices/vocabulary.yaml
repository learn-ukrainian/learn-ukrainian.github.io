- lemma: риторична фігура
  translation: rhetorical figure
  pos: phrase
  usage: "Риторична фігура змінює будову вислову, щоб посилити вплив на слухача."
- lemma: синтаксична фігура
  translation: syntactic figure
  pos: phrase
  usage: "Синтаксична фігура працює через порядок слів, повтор, паузу або пропуск."
- lemma: анафора
  translation: anaphora
  pos: noun
  usage: "Анафора повторює слово або фразу на початку сусідніх частин."
- lemma: епіфора
  translation: epiphora
  pos: noun
  usage: "Епіфора повторює важливе слово в кінці кількох фраз."
- lemma: симплока
  translation: symploce
  pos: noun
  usage: "Симплока поєднує анафору й епіфору в одній композиції."
- lemma: градація
  translation: gradation, climax
  pos: noun
  usage: "Градація нарощує або послаблює емоційну напругу."
