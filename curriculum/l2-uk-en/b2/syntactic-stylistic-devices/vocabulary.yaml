  translation: antithesis
  pos: noun
  usage: "Антитеза протиставляє пов'язані поняття на спільній смисловій осі."
- lemma: інверсія
  translation: inversion
  pos: noun
  usage: "Інверсія переносить важливий елемент у фокус речення."
- lemma: паралелізм
  translation: parallelism
  pos: noun
  usage: "Паралелізм тримає однакову будову сусідніх конструкцій."
- lemma: синтаксичний паралелізм
  translation: syntactic parallelism
  pos: phrase
  usage: "Синтаксичний паралелізм допомагає впорядкувати складну думку."
- lemma: хіазм
  translation: chiasmus
  pos: noun
  usage: "Хіазм створює дзеркальну структуру типу A-B / B-A."
- lemma: асиндетон
  translation: asyndeton
  pos: noun
  usage: "Асиндетон прибирає сполучники й пришвидшує ритм."
- lemma: полісиндетон
  translation: polysyndeton
  pos: noun
  usage: "Полісиндетон повторює сполучники й уповільнює речення."
