  pos: phrase
  usage: "Жанрова доречність визначає, чи не надто емоційна фігура для конкретного тексту."
- lemma: стилістична функція
  translation: stylistic function
  pos: phrase
  usage: "Стилістична функція пояснює, навіщо автор використав саме цю конструкцію."
- lemma: маніпуляція
  translation: manipulation
  pos: noun
  usage: "Маніпуляція виникає, коли риторичний прийом замінює докази."
- lemma: доказова межа
  translation: evidential limit
  pos: phrase
  usage: "Доказова межа показує, де виразність має поступитися фактам."
