  translation: sentence rhythm
  pos: phrase
  usage: "Ритм речення змінюється через повтор, довжину частин і паузи."
- lemma: пауза
  translation: pause
  pos: noun
  usage: "Пауза може підсилити смисл або приховати незавершену думку."
- lemma: темп мовлення
  translation: speech tempo
  pos: phrase
  usage: "Темп мовлення пришвидшується в асиндетоні й уповільнюється в полісиндетоні."
