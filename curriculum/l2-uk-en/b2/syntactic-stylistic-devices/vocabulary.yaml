  translation: ellipsis
  pos: noun
  usage: "Еліпсис пропускає член речення, який легко відновити."
- lemma: парцеляція
  translation: parceling, sentence fragmentation
  pos: noun
  usage: "Парцеляція робить паузу видимою через окремий фрагмент."
