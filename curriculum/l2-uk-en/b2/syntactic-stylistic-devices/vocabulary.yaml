  translation: aposiopesis, deliberate break
  pos: noun
  usage: "Апосіопеза навмисно перериває фразу й залишає зміст недомовленим."
- lemma: риторичне запитання
  translation: rhetorical question
  pos: phrase
  usage: "Риторичне запитання має очевидну відповідь і працює як твердження."
