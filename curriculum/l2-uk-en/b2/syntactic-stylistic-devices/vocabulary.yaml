  translation: journalistic style
  pos: phrase
  usage: "Публіцистичний стиль дає змогу використовувати виразні фігури, якщо вони спираються на факти."
- lemma: офіційний стиль
  translation: official style
  pos: phrase
  usage: "Офіційний стиль зазвичай обмежує вигуки, парцеляцію й риторичний тиск."
