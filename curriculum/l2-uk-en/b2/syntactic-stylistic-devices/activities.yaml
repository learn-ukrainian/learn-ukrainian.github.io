version: '1.0'
module: syntactic-stylistic-devices
level: b2
inline:
- type: select
  title: Визнач функцію фігури
  instruction: Виберіть відповідь, яка пояснює синтаксичний механізм і функцію.
  items:
  - question: «Коли діяти, якщо не сьогодні?» - це...
    options:
    - text: риторичне запитання, яке фактично стверджує потребу діяти сьогодні
      correct: true
    - text: інформаційне питання про календар
      correct: false
    - text: парцеляція без відновлюваного змісту
      correct: false
    - text: полісиндетон
      correct: false
    explanation: Питання має ствердну функцію.
  - question: «Сьогодні - діяти. Завтра - відповідати за бездіяльність». Головні засоби...
    options:
    - text: еліпсис, паралелізм і антитеза
      correct: true
    - text: метонімія й асонанс
      correct: false
    - text: тільки прямий порядок слів
      correct: false
    - text: лише офіційна формула
      correct: false
    explanation: Пропущені члени відновлюються, а дві частини протиставлено.
  - question: «Відповіді громада не почула» - головний ефект...
    options:
    - text: інверсія, що виносить об'єкт у фокус
      correct: true
    - text: анафора
      correct: false
    - text: риторичне звертання
      correct: false
    - text: звичайний службовий шаблон
      correct: false
    explanation: Об'єкт **відповіді** стоїть на початку.
  - question: Яка фігура найкраще організує три однотипні вимоги?
    options:
    - text: паралелізм
      correct: true
    - text: паронімія
      correct: false
    - text: літота
      correct: false
    - text: метонімія
      correct: false
    explanation: Однакова будова допомагає порівнювати елементи.
  - question: Що треба перевірити після риторичного запитання?
    options:
    - text: чи нейтральна версія зберігає зміст і чи є докази
      correct: true
    - text: чи можна додати ще три знаки питання
      correct: false
    - text: чи всі слова мають однаковий наголос
      correct: false
    - text: чи запитання приховує словник
      correct: false
    explanation: Фігура не має підміняти аргумент.
  - question: «Ми просили дані. Ми чекали відповіді» демонструє...
    options:
    - text: анафору, бо повторюється початок речень
      correct: true
    - text: метонімію, бо замінено суб'єкта
      correct: false
    - text: літоту, бо факт применшено
      correct: false
    - text: паронімію
      correct: false
    explanation: Повтор **ми** організує ритм.
  - question: «І листи, і фото, і голоси лишилися в архіві» - це...
    options:
    - text: полісиндетон, що виділяє кожний елемент
      correct: true
    - text: асиндетон, бо сполучники зникли
      correct: false
    - text: інверсія без акценту
      correct: false
    - text: риторичне звертання
      correct: false
    explanation: Повторюється сполучник **і**.
  - question: «Попросили, вимагали, домоглися» працює як...
    options:
    - text: градація, бо сила дії зростає
      correct: true
    - text: епіфора, бо кінець повторюється
      correct: false
    - text: синекдоха
      correct: false
    - text: звуконаслідування
      correct: false
    explanation: Порядок елементів створює наростання.
- type: match-up
  title: Синтаксична фігура і механізм
  instruction: Поєднайте назву з механізмом.
  pairs:
  - left: риторичне запитання
    right: питальна форма зі ствердною або оцінною функцією
  - left: анафора
    right: повтор початку
  - left: епіфора
    right: повтор кінця
  - left: паралелізм
    right: однакова граматична будова частин
  - left: градація
    right: розташування елементів за зростанням або спаданням сили
  - left: антитеза
    right: контраст на спільній смисловій осі
  - left: інверсія
    right: змінений порядок слів для акценту
  - left: парцеляція
    right: відокремлення фрагмента як окремої паузи
  - left: асиндетон
    right: відсутність сполучників у ряді
  - left: полісиндетон
    right: повтор сполучників у ряді
- type: group-sort
  title: Повтор, контраст, пауза
  instruction: Розподіліть приклади за головним синтаксичним засобом.
  groups:
  - items:
    - Ми пам'ятаємо дати. Ми пам'ятаємо імена.
    - Дані відкриті, процедури зрозумілі, рішення пояснені.
    - Пояснюємо рішення для людей, відкриваємо дані для людей.
    - Потрібні відкриті програми, відкриті бюджети, відкриті критерії.
    name: Повтор і паралелізм
  - items:
    - Спершу просили пояснення, потім вимагали звіту, зрештою домоглися зустрічі.
    - Обіцяли діалог - отримали монолог.
    - Говорили про сервіс - створили чергу.
    - Не школа для звіту, а звіт для школи.
    name: Градація й антитеза
  - items:
    - Рішення ухвалили. Надто швидко.
    - Перший розділ - про правило, другий - про виняток.
    - Відповіді громада не почула.
    - Сирена, коридор, телефони, повідомлення рідним.
    name: Пауза, пропуск, порядок слів
- type: error-correction
  title: Відремонтуй синтаксичну фігуру
  instruction: Виберіть редакцію, у якій фігура має зрозумілу функцію.
  items:
  - sentence: Бюджети мають бути відкритими, процедури пояснили, а рішення - це відповідальність.
    error: порушений паралелізм
    options:
    - Бюджети мають бути відкритими, процедури - зрозумілими, рішення - поясненими.
    - Бюджети мають бути відкритими, процедури пояснили, а рішення - це відповідальність.
    - Бюджети відкритими, процедури пояснили, рішення відповідальність.
    - Бюджети, процедури, рішення - відкритими пояснили.
    explanation: Однакова будова робить перелік керованим.
    answer: Бюджети мають бути відкритими, процедури - зрозумілими, рішення - поясненими.
  - sentence: Обіцяли прозорість - кава була гаряча.
    error: немає спільної осі антитези
    options:
    - Обіцяли прозорість - залишили закриті засідання.
    - Обіцяли прозорість - кава була гаряча.
    - Обіцяли прозорість - сонце зайшло.
    - Обіцяли прозорість - підлога була чиста.
    explanation: Контраст має стосуватися однієї теми.
    answer: Обіцяли прозорість - залишили закриті засідання.
  - sentence: Лист, підпис, коридор, бігли.
    error: асиндетон руйнує граматичну опору
    options:
    - Лист підписали, відповідь передали, двері зачинили.
    - Лист, підпис, коридор, бігли.
    - Підпис коридором лист біг.
    - Бігли листом підпис коридор.
    explanation: Швидкий темп не скасовує зрозумілої граматики.
    answer: Лист підписали, відповідь передали, двері зачинили.
  - sentence: Ми зробили все можливе, але...
    error: апосіопеза може приховувати факт
    options:
    - Ми виконали три дії, але не опублікували кошторис.
    - Ми зробили все можливе, але...
    - Ми зробили все можливе, але таємниця.
    - Ми зробили все можливе, але пауза все пояснює.
    explanation: Офіційний або аналітичний текст має називати пропущений факт.
    answer: Ми виконали три дії, але не опублікували кошторис.
  - sentence: 'До ЦНАПу. По довідку. Завтра. Жанр: сервісний лист.'
    error: парцеляція не відповідає жанру
    options:
    - Зверніться до ЦНАПу по довідку завтра.
    - До ЦНАПу. По довідку. Завтра.
    - ЦНАП. Довідка. Завтра. Можливо.
    - До довідки завтра ЦНАП.
    explanation: Сервісний лист потребує повного зрозумілого речення.
    answer: Зверніться до ЦНАПу по довідку завтра.
  - sentence: Попросили, домоглися, вимагали пояснення.
    error: порушена градація
    correction: Попросили пояснення, вимагали звіту, домоглися зустрічі.
    options:
    - Попросили пояснення, вимагали звіту, домоглися зустрічі.
    - Попросили, домоглися, вимагали пояснення.
    - Домоглися, попросили, можливо вимагали.
    - Вимагали зустрічі, попросили домогтися.
    explanation: Сила дії має наростати.
  - sentence: І рішення, і рішення, і рішення було рішенням.
    error: механічний повтор без змісту
    correction: Рішення ухвалили, але не пояснили підстав і строків.
    options:
    - Рішення ухвалили, але не пояснили підстав і строків.
    - І рішення, і рішення, і рішення було рішенням.
    - Рішення рішенням вирішило рішення.
    - І рішення, і підстава, і рішення, і рішення.
    explanation: Повтор має додавати зміст.
  - sentence: Відкритість дані не побачили.
    error: невдала інверсія
    correction: Громада не побачила відкритих даних.
    options:
    - Громада не побачила відкритих даних.
    - Відкритість дані не побачили.
    - Дані відкритість побачила громада.
    - Побачила відкритість дані не громада.
    explanation: Інверсія не повинна руйнувати зрозумілий порядок.
- type: fill-in
  title: Добери термін
  instruction: Вставте назву синтаксичного засобу.
  items:
  - sentence: Повтор початку кількох речень називається ____.
    answer: анафорою
    options:
    - анафорою
    - епіфорою
    - інверсією
    - літотою
    explanation: Анафора повторює початок.
  - sentence: Повтор кінця кількох конструкцій називається ____.
    answer: епіфорою
    options:
    - епіфорою
    - анафорою
    - асиндетоном
    - метафорою
    explanation: Епіфора повторює кінець.
  - sentence: Навмисне відокремлення фрагмента речення як окремої паузи - це ____.
    answer: парцеляція
    options:
    - парцеляція
    - полісиндетон
    - хіазм
    - епітет
    explanation: Парцеляція робить паузу видимою на письмі.
  - sentence: Повтор сполучників у переліку називається ____.
    answer: полісиндетоном
    options:
    - полісиндетоном
    - асиндетоном
    - інверсією
    - градацією
    explanation: Полісиндетон повторює сполучники.
  - sentence: Розташування елементів за наростанням сили - це ____.
    answer: градація
    options:
    - градація
    - епіфора
    - синекдоха
    - паронімія
    explanation: Градація керує силою елементів.
  - sentence: Змінений порядок слів для акценту - це ____.
    answer: інверсія
    options:
    - інверсія
    - епіфора
    - метафора
    - гіпербола
    explanation: Інверсія керує фокусом.
  - sentence: Протиставлення на спільній смисловій осі - це ____.
    answer: антитеза
    options:
    - антитеза
    - асонанс
    - евфемізм
    - епітет
    explanation: Антитеза тримається на контрасті.
  - sentence: Відсутність сполучників для швидкого темпу - це ____.
    answer: асиндетон
    options:
    - асиндетон
    - полісиндетон
    - літота
    - метонімія
    explanation: Асиндетон пришвидшує ряд.
  - sentence: Перехресна побудова «не А для Б, а Б для А» - це ____.
    answer: хіазм
    options:
    - хіазм
    - анафора
    - паронім
    - евфонія
    explanation: Хіазм дзеркально міняє порядок.
  - sentence: Навмисне переривання фрази й недомовленість - це ____.
    answer: апосіопеза
    options:
    - апосіопеза
    - градація
    - епітет
    - порівняння
    explanation: Апосіопеза створює ефект умовчання.
- id: act-6
  type: essay-response
  title: 'Мініписьмо: фігура і регістр'
  instruction: Створіть короткий фрагмент і поясніть синтаксичні рішення.
  prompt: Напишіть 150-180 слів про ситуацію, де обіцяли відкритість, але не опублікували документи. Використайте одну риторичну фігуру, один паралельний ряд і одну нейтральну офіційну редакцію того самого змісту. Поясніть, чому ці варіанти належать до різних регістрів.
  min_words: 150
  model_answer: |
    > [!model-answer]
    > Публіцистично: **Хіба можна назвати рішення відкритим, якщо договори лишилися в додатках, яких ніхто не бачить? Обіцяли діалог - залишили монолог. Обіцяли прозорість - залишили порожню сторінку.** Тут працюють риторичне запитання, антитеза й паралельний повтор **обіцяли - залишили**. Офіційно той самий зміст треба подати інакше: **Комісія не опублікувала договори й додатки до рішення; просимо надати ці документи у відкритому доступі**. У першому варіанті синтаксис створює тиск і ритм, у другому - називає факт і дію.
  rubric:
  - criteria: Критерій 1
    description: Є риторична фігура з поясненою функцією.
  - criteria: Критерій 2
    description: Паралельний ряд має однакову будову.
  - criteria: Критерій 3
    description: Офіційна редакція прибирає зайву експресію.
workbook:
- id: wb-reading-syntactic-manifest
  type: reading
  title: 'Читання: ритм короткого маніфесту'
  instruction: Прочитайте уривок і виконайте завдання.
  source: Навчальний уривок для B2.
  text: Чи можна назвати місто відкритим, якщо його рішення сховані в додатках до протоколів? Ми просили пояснень, ми чекали відповідей, ми збирали підписи. Обіцяли діалог - отримали тишу. І листи, і фото, і голоси мешканців залишилися в архіві. Відповідальності громада так і не почула. Не люди для системи, а система для людей - ось принцип, який треба повернути в кожний кабінет.
  tasks:
  - Знайдіть риторичне запитання і переформулюйте його як твердження.
  - Позначте анафору або паралельний повтор.
  - Поясніть антитезу в реченні про діалог і тишу.
  - Знайдіть хіазм і поясніть його функцію.
- type: error-correction
  title: 'Workbook: регістрова правка'
  instruction: Виберіть редакцію, доречну для жанру.
  items:
  - sentence: 'Чому підтримка мовчить? Жанр: сервісна відповідь.'
    error: риторичне запитання замість дії
    options:
    - Служба підтримки ще не надала відповіді.
    - Чому підтримка мовчить?
    - Підтримко, озвися!
    - Мовчить підтримка, мовчить система.
    explanation: Сервісний текст має назвати статус.
    answer: Служба підтримки ще не надала відповіді.
  - sentence: 'Рішення ухвалили. Без пояснень. Без строків. Жанр: офіційний звіт.'
    error: парцеляція
    options:
    - Рішення ухвалено без пояснення підстав і строків виконання.
    - Рішення ухвалили. Без пояснень. Без строків.
    - Без пояснень. Рішення. Без строків.
    - Рішення мовчить без строків.
    explanation: Офіційний звіт потребує повної конструкції.
    answer: Рішення ухвалено без пояснення підстав і строків виконання.
  - sentence: 'І дані, і строки, і відповідальні, і все треба зробити швидко. Жанр: інструкція.'
    error: надмірний полісиндетон
    options:
    - Потрібно подати дані, строки й відповідальних осіб.
    - І дані, і строки, і відповідальні, і все треба зробити швидко.
    - І дані, і строки, і відповідальні - звучить урочисто.
    - Дані і строки і відповідальні і швидко.
    explanation: Інструкція потребує компактного переліку.
    answer: Потрібно подати дані, строки й відповідальних осіб.
  - sentence: 'Сирена, коридор, телефони, повідомлення рідним. Жанр: новина.'
    error: асиндетон без пояснення факту
    options:
    - Після сирени люди вийшли в коридор і написали рідним.
    - Сирена, коридор, телефони, повідомлення рідним.
    - Коридор сирени повідомлення телефони.
    - Сирена. Коридор. Телефони. Усе.
    explanation: Новина має пояснити дію.
    answer: Після сирени люди вийшли в коридор і написали рідним.
  - sentence: 'Не дані для людей, а люди для даних. Жанр: правозахисна промова.'
    error: хіазм перевертає цінність
    options:
    - Не люди для даних, а дані для людей.
    - Не дані для людей, а люди для даних.
    - Дані даними, люди людьми.
    - Люди для системи, система для звіту.
    explanation: Хіазм має підтримувати заявлену етичну позицію.
    answer: Не люди для даних, а дані для людей.
  - sentence: 'Пояснити. Відповісти. Негайно. Жанр: службова інструкція.'
    error: парцеляція замість інструкції
    correction: Потрібно надати пояснення й відповідь негайно.
    options:
    - Потрібно надати пояснення й відповідь негайно.
    - Пояснити. Відповісти. Негайно.
    - Негайно. Пояснення. Відповідь.
    - Відповісти поясненням парцельовано.
    explanation: Інструкція потребує повної конструкції.
  - sentence: 'Хіба заявка не сама себе розгляне? Жанр: сервісний лист.'
    error: іронічне риторичне питання
    correction: Заявку розгляне відділ підтримки.
    options:
    - Заявку розгляне відділ підтримки.
    - Хіба заявка не сама себе розгляне?
    - Заявко, розглянь себе сама!
    - Саморозгляд заявки звучить весело.
    explanation: Сервісний лист не повинен іронізувати з клієнта.
  - sentence: 'Обіцяли строки - отримали каву. Жанр: публіцистика.'
    error: антитеза без спільної осі
    correction: Обіцяли строки - отримали мовчання.
    options:
    - Обіцяли строки - отримали мовчання.
    - Обіцяли строки - отримали каву.
    - Обіцяли строки - вікно було синє.
    - Строки кавово промовчали.
    explanation: Контраст має стосуватися виконання обіцянки.
