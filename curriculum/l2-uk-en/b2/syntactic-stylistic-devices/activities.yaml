version: '1.0'
module: syntactic-stylistic-devices
level: b2
inline: []
workbook:
  - type: reading
    id: syntactic-manifest-reading
    title: "Читання: ритм короткого маніфесту"
    instruction: "Прочитай уривок і визнач, які синтаксичні фігури створюють переконливий тон."
    source: "Навчальний уривок для модуля B2."
    text: >-
      Чи можна назвати місто відкритим, якщо його рішення сховані в додатках до протоколів?
      Ми просили пояснень, ми чекали відповідей, ми збирали підписи. Обіцяли діалог - отримали
      тишу. І листи, і фото, і голоси мешканців залишилися в архіві. Відповідальності громада так
      і не почула. Не люди для системи, а система для людей - ось простий принцип, який треба
      повернути в кожний кабінет. Сьогодні - оприлюднити документи. Завтра - пояснити рішення.
      Післязавтра - відповідати перед тими, хто довірив місту свій голос.
    tasks:
      - "Знайди риторичне запитання і переформулюй його як пряме твердження."
      - "Познач анафору й поясни, як вона створює колективний голос."
      - "Визнач антитезу та назви спільну вісь протиставлення."
      - "Знайди приклад полісиндетону й поясни, чому він уповільнює ритм."
      - "Поясни, як інверсія у реченні про відповідальність переносить фокус."

  - type: select
    title: "Визнач синтаксичну фігуру"
    instruction: "Вибери найточнішу назву прийому в кожному реченні."
    items:
      - question: "«Ми пам'ятаємо дати, ми пам'ятаємо імена, ми пам'ятаємо мовчання». Це..."
        options:
          - text: "анафора"
            correct: true
          - text: "хіазм"
            correct: false
          - text: "полісиндетон"
            correct: false
          - text: "апосіопеза"
            correct: false
        explanation: "Повтор стоїть на початку сусідніх частин."
      - question: "«Не місто для звіту, а звіт для міста». Це..."
        options:
          - text: "хіазм із антитезою"
            correct: true
          - text: "тавтологія"
            correct: false
          - text: "епіфора"
            correct: false
          - text: "еліпсис без фокусу"
            correct: false
        explanation: "Друга частина дзеркально переставляє елементи першої."
      - question: "«Обіцяли прозорість - отримали закриті засідання». Це..."
        options:
          - text: "антитеза"
            correct: true
          - text: "асиндетон"
            correct: false
          - text: "риторичний вигук"
            correct: false
          - text: "плеоназм"
            correct: false
        explanation: "Дві частини протиставлені на спільній осі відкритості."
      - question: "«Попросили, наполягли, домоглися». Це..."
        options:
          - text: "висхідна градація"
            correct: true
          - text: "епіфора"
            correct: false
          - text: "риторичне звертання"
            correct: false
          - text: "парцеляція"
            correct: false
        explanation: "Сила дії послідовно зростає."
      - question: "«Відповіді громада так і не почула». Головний ефект порядку слів - це..."
        options:
          - text: "інверсія, яка виносить об'єкт у фокус"
            correct: true
          - text: "звичайний прямий порядок без стилістичної дії"
            correct: false
          - text: "полісиндетон"
            correct: false
          - text: "риторичний вигук"
            correct: false
        explanation: "Об'єкт «відповіді» винесено на початок."
      - question: "«І листи, і фото, і голоси залишилися в архіві». Це..."
        options:
          - text: "полісиндетон"
            correct: true
          - text: "асиндетон"
            correct: false
          - text: "епіфора"
            correct: false
          - text: "апосіопеза"
            correct: false
        explanation: "Повтор сполучника «і» виділяє кожний елемент."
      - question: "«Лист підписали, коридором побігли, двері зачинили». Це..."
        options:
          - text: "асиндетон"
            correct: true
          - text: "полісиндетон"
            correct: false
          - text: "хіазм"
            correct: false
          - text: "риторичне звертання"
            correct: false
        explanation: "Сполучники прибрано, тому темп пришвидшується."
      - question: "«Ми зробили усе можливе, але...» У цьому реченні працює..."
        options:
          - text: "апосіопеза"
            correct: true
          - text: "паралелізм"
            correct: false
          - text: "симплока"
            correct: false
          - text: "тавтологія"
            correct: false
        explanation: "Фразу навмисно перервано."

  - type: fill-in
    title: "Добери назву синтаксичного засобу"
    instruction: "Заповни пропуск терміном або ключовим словом."
    items:
      - sentence: "Повтор на початку сусідніх речень або частин речення називається ____."
        answer: "анафорою"
        options: ["анафорою", "епіфорою", "градацією", "інверсією"]
        explanation: "Анафора стоїть на початку."
      - sentence: "Повтор у кінці сусідніх частин називається ____."
        answer: "епіфорою"
        options: ["епіфорою", "асиндетоном", "хіазмом", "антитезою"]
        explanation: "Епіфора збирає кінець фраз."
      - sentence: "Різке протиставлення пов'язаних понять - це ____."
        answer: "антитеза"
        options: ["антитеза", "полісиндетон", "апосіопеза", "парцеляція"]
        explanation: "Антитеза потребує змістовної осі контрасту."
      - sentence: "Нарощення або послаблення напруги через три й більше кроків - це ____."
        answer: "градація"
        options: ["градація", "тавтологія", "еліпсис", "епіфора"]
        explanation: "Градація має послідовну шкалу."
      - sentence: "Зміна звичного порядку слів для акценту називається ____."
        answer: "інверсією"
        options: ["інверсією", "плеоназмом", "симплокою", "полісиндетоном"]
        explanation: "Інверсія переносить фокус речення."
      - sentence: "Дзеркальна будова A-B / B-A називається ____."
        answer: "хіазмом"
        options: ["хіазмом", "асиндетоном", "еліпсисом", "вигуком"]
        explanation: "Хіазм перехрещує порядок елементів."
      - sentence: "Безсполучниковість як стилістичний прийом - це ____."
        answer: "асиндетон"
        options: ["асиндетон", "полісиндетон", "паралелізм", "риторичне звертання"]
        explanation: "Асиндетон прибирає сполучники."
      - sentence: "Багатосполучниковість, що уповільнює ритм, називається ____."
        answer: "полісиндетоном"
        options: ["полісиндетоном", "апосіопезою", "анафорою", "антитезою"]
        explanation: "Полісиндетон повторює сполучники."
      - sentence: "Навмисне переривання фрази й недомовленість називається ____."
        answer: "апосіопезою"
        options: ["апосіопезою", "паралелізмом", "хіазмом", "тавтологією"]
        explanation: "Апосіопеза створює ефект умовчання."
      - sentence: "Відокремлення фрагмента речення для емоційної паузи - це ____."
        answer: "парцеляція"
        options: ["парцеляція", "епіфора", "полісиндетон", "акцентуація"]
        explanation: "Парцеляція робить паузу видимою."

  - type: group-sort
    title: "Розподіли приклади за групами"
    instruction: "Визнач, до якої групи належить кожний приклад."
    groups:
      - name: "Повтори й паралелізм"
        items:
          - "Ми чуємо місто. Ми чуємо двори. Ми чуємо тишу."
          - "Плани мають бути відкритими, рішення - поясненими, терміни - реальними."
          - "Готуємо звіт для людей, відкриваємо дані для людей, пояснюємо рішення для людей."
          - "Коли мовчить архів, мовчить пам'ять. Коли мовчить школа, мовчить пам'ять."
          - "Документи відкриті, процедури зрозумілі, відповідальні названі."
      - name: "Протиставлення й розташування"
        items:
          - "Обіцяли діалог - отримали наказ."
          - "Не громада для кабінету, а кабінет для громади."
          - "Відповіді місто так і не почуло."
          - "Попросили пояснення, вимагали звіту, домоглися зустрічі."
          - "Не слова формують відповідальність, а відповідальність формує слова."
      - name: "Пауза й пропуск"
        items:
          - "Рішення ухвалили. Надто швидко. Без пояснень."
          - "Перший розділ - про правило, другий - про виняток."
          - "Ми чекали, писали, дзвонили."
          - "Я - до архіву, ти - до бібліотеки."
          - "Ми зробили усе можливе, але..."

  - type: mark-the-words
    title: "Познач повтори в уривку"
    instruction: "Познач слова або фрази, що створюють анафору чи епіфору."
    text: "Ми просили відповіді, ми чекали відповіді, ми вимагали відповіді від тих, хто обіцяв відкритість."
    answers:
      - "Ми"
      - "ми"
      - "ми"
      - "відповіді"
      - "відповіді"
      - "відповіді"

  - type: error-correction
    title: "Виправ невдалу синтаксичну фігуру"
    instruction: "Знайди проблему й вибери точнішу редакцію."
    items:
      - sentence: "Місто потребує чистого транспорту, відкритих бюджетів і щоб чиновники відповідали."
        error: "і щоб чиновники відповідали"
        correction: "Місто потребує чистого транспорту, відкритих бюджетів і відповідальних чиновників."
        options:
          - "Місто потребує чистого транспорту, відкритих бюджетів і відповідальних чиновників."
          - "Місто потребує чистого транспорту, відкритих бюджетів і щоб чиновники відповідали."
          - "Місто потребує чистого транспорту, відповідати чиновникам і відкриті бюджети."
          - "Місто потребує щоб транспорт, бюджети й чиновники."
        explanation: "У ряду треба зберегти однакову граматичну будову."
      - sentence: "Обіцяли прозорість - кава була гаряча."
        error: "кава була гаряча"
        correction: "Обіцяли прозорість - отримали закриті засідання."
        options:
          - "Обіцяли прозорість - отримали закриті засідання."
          - "Обіцяли прозорість - кава була гаряча."
          - "Обіцяли прозорість - трамвай приїхав рано."
          - "Обіцяли прозорість - вікно стояло праворуч."
        explanation: "Антитеза потребує спільної смислової осі."
      - sentence: "Лист, підпис, коридор, бігли."
        error: "Лист, підпис, коридор, бігли"
        correction: "Лист підписали, відповідь передали, двері зачинили."
        options:
          - "Лист підписали, відповідь передали, двері зачинили."
          - "Лист, підпис, коридор, бігли."
          - "Підпис листа коридор бігли двері."
          - "Коридор листом біг підпис."
        explanation: "Асиндетон не скасовує граматичної зрозумілості."
      - sentence: "Ми зробили це добре, пояснили це добре, завершили це добре."
        error: "добре, пояснили це добре, завершили це добре"
        correction: "Ми пояснили процедуру, відкрили документи й назвали відповідальних."
        options:
          - "Ми пояснили процедуру, відкрили документи й назвали відповідальних."
          - "Ми зробили це добре, пояснили це добре, завершили це добре."
          - "Ми дуже добре добре добре працювали."
          - "Добре ми, добре вони, добре усюди."
        explanation: "Повтор слова «добре» не додає змісту."
      - sentence: "Не рішення для команди, а команда для дверей."
        error: "команда для дверей"
        correction: "Не рішення для команди, а команда для рішення."
        options:
          - "Не рішення для команди, а команда для рішення."
          - "Не рішення для команди, а команда для дверей."
          - "Не рішення команді, а двері для рішення."
          - "Не команда рішення, а рішення двері."
        explanation: "Дзеркальна структура має повертати ті самі смислові елементи."
      - sentence: "Комісія відкрила архіви, нову виставку й щоб школярі приходили."
        error: "й щоб школярі приходили"
        correction: "Комісія відкрила архіви, підготувала нову виставку й запросила школярів."
        options:
          - "Комісія відкрила архіви, підготувала нову виставку й запросила школярів."
          - "Комісія відкрила архіви, нову виставку й щоб школярі приходили."
          - "Комісія відкрила архіви, виставку й приходити школярам."
          - "Комісія щоб архіви, виставку, школярів."
        explanation: "Паралельний ряд краще тримати через однакові дієслівні форми."
      - sentence: "Попросили, район, крик."
        error: "район, крик"
        correction: "Попросили, наполягли, домоглися."
        options:
          - "Попросили, наполягли, домоглися."
          - "Попросили, район, крик."
          - "Район, попросили, домоглися."
          - "Крик, вулиця, пояснили."
        explanation: "Градація потребує однієї логічної шкали."
      - sentence: "І рішення ухвалили. І надто швидко. І без пояснень."
        error: "І надто швидко"
        correction: "Рішення ухвалили. Надто швидко. Без пояснень."
        options:
          - "Рішення ухвалили. Надто швидко. Без пояснень."
          - "І рішення ухвалили. І надто швидко. І без пояснень."
          - "І надто рішення. І швидко без."
          - "Рішення і. Швидко і. Пояснень і."
        explanation: "Для парцеляції тут краще прибрати механічний повтор сполучника."

  - type: essay-response
    id: syntactic-essay-reading-analysis
    title: "Есе-аналіз: синтаксис маніфесту"
    instruction: "Напиши зв'язний аналіз українською."
    source_reading: syntactic-manifest-reading
    prompt: >-
      Проаналізуй уривок із вправи на читання. Назви щонайменше чотири синтаксичні фігури,
      поясни їхню функцію й оціни, де прийом переконує, а де потребує фактичної підтримки.
    min_words: 180
    model_answer: >-
      В уривку риторичне запитання відкриває тему прозорості й одразу залучає слухача до оцінки.
      Анафора «ми просили, ми чекали, ми збирали» створює колективний голос громади. Антитеза
      «обіцяли діалог - отримали тишу» показує розрив між заявою й результатом. Полісиндетон
      «і листи, і фото, і голоси» уповільнює темп і підкреслює кожну деталь. Водночас такі
      прийоми мають спиратися на факти: треба назвати документи, дати й відповідальних.
    rubric:
      - criteria: "Терміни"
        description: "Названо щонайменше чотири синтаксичні фігури."
        points: 3
      - criteria: "Функція"
        description: "Кожний прийом пояснено через вплив на читача або слухача."
        points: 4
      - criteria: "Критична межа"
        description: "Є оцінка доказової межі риторики."
        points: 3

  - type: essay-response
    id: syntactic-essay-transform
    title: "Письмо: побудуй переконливий абзац"
    instruction: "Створи абзац із контрольованими синтаксичними фігурами."
    prompt: >-
      Напиши абзац на тему «Чому публічні рішення потребують пояснення». Використай мінімум
      одну анафору, одну антитезу, одну градацію із трьох елементів і одну інверсію. Після абзацу
      коротко поясни, де саме вони працюють.
    min_words: 220
    model_answer: >-
      Чому рішення потребують пояснення? Бо громада має бачити не тільки результат, а й шлях до
      нього. Ми просимо даних, ми просимо причин, ми просимо відповідальних. Обіцяли швидкість -
      не повинні отримати тишу. Спершу треба назвати проблему, потім показати варіанти, зрештою
      пояснити вибір. Відповіді громада чекає не завтра, а сьогодні. У тексті анафора створює
      спільний голос, антитеза показує конфлікт між обіцянкою й тишею, градація вибудовує
      послідовність пояснення, а інверсія виносить «відповіді» у фокус.
    rubric:
      - criteria: "Виконання умов"
        description: "Усі чотири фігури використано доречно."
        points: 4
      - criteria: "Пояснення"
        description: "Автор пояснює функцію, а не лише називає прийом."
        points: 4
      - criteria: "Жанр"
        description: "Абзац звучить як переконливий публічний текст без маніпулятивного тону."
        points: 2

  - type: essay-response
    id: syntactic-essay-register
    title: "Редакторське завдання: зміни жанр"
    instruction: "Перепиши той самий зміст для двох різних жанрів."
    prompt: >-
      Нейтральне речення: «Комісія довго обговорювала рішення, але не пояснила причини».
      Створи 1) публіцистичний варіант із антитезою або риторичним запитанням; 2) офіційний
      варіант без емоційних фігур. Поясни різницю в тоні.
    min_words: 150
    model_answer: >-
      Публіцистичний варіант: Комісія обіцяла відкритість - залишила громаду з мовчанням.
      Офіційний варіант: Комісія провела тривале обговорення рішення, однак не оприлюднила
      пояснення причин. Перший варіант використовує антитезу й сильніший емоційний тиск, тому
      підходить для колонки або промови. Другий варіант нейтральний і точніший для звіту.
    rubric:
      - criteria: "Два жанри"
        description: "Обидва варіанти зберігають той самий зміст."
        points: 4
      - criteria: "Стилістична доречність"
        description: "Публіцистичний варіант виразний, офіційний - контрольований."
        points: 4
      - criteria: "Пояснення"
        description: "Різницю в тоні пояснено через синтаксис."
        points: 2

  - type: essay-response
    id: syntactic-essay-rhythm
    title: "Ритмічна редактура"
    instruction: "Відредагуй речення й поясни темп."
    prompt: >-
      Перетвори речення «Команда отримала лист, перевірила дані й передала відповідь комісії»
      на три варіанти: з асиндетоном, з полісиндетоном і з еліпсисом. Поясни, як змінився темп
      і в якому жанрі кожний варіант доречний.
    min_words: 160
    model_answer: >-
      Асиндетон: Команда отримала лист, перевірила дані, передала відповідь комісії. Темп швидший,
      варіант доречний у динамічній розповіді. Полісиндетон: І лист отримали, і дані перевірили,
      і відповідь комісії передали. Темп повільніший, кожна дія виділена; це може працювати в
      промові або виправдальному поясненні. Еліпсис: Лист - команді, дані - на перевірку, відповідь -
      комісії. Варіант стислий і напружений, більше підходить для публіцистики або художнього уривка.
    rubric:
      - criteria: "Три трансформації"
        description: "Створено асиндетон, полісиндетон і еліпсис."
        points: 4
      - criteria: "Ритм"
        description: "Пояснено зміну темпу й фокусу."
        points: 4
      - criteria: "Жанр"
        description: "Указано доречний жанр для кожного варіанта."
        points: 2

  - type: essay-response
    id: syntactic-essay-ethics
    title: "Критична оцінка: риторика й відповідальність"
    instruction: "Оціни межу між виразністю та маніпуляцією."
    prompt: >-
      Напиши коротку оцінку речення «Ми чекали. Терпіли. Боролися. Перемогли». Поясни, які
      синтаксичні засоби працюють, чому вони звучать сильно і яких фактів бракує, щоб вислів
      не був порожнім гаслом.
    min_words: 150
    model_answer: >-
      Речення використовує парцеляцію й висхідну градацію: кожний короткий фрагмент додає напругу,
      а шлях від очікування до перемоги створює драматичну історію. Воно звучить сильно, бо має
      чіткий ритм і колективне «ми». Проте вислів може бути маніпулятивним, якщо не названо, хто
      саме чекав, за що боровся і що означає перемога. Синтаксис створює вплив, але факти мають
      підтримати цей вплив.
    rubric:
      - criteria: "Розпізнавання"
        description: "Названо парцеляцію, градацію або колективний голос."
        points: 3
      - criteria: "Функція"
        description: "Пояснено, чому речення звучить сильно."
        points: 3
      - criteria: "Критична оцінка"
        description: "Названо факти, яких бракує для відповідальної риторики."
        points: 4
