- id: wb-final-syntactic-analysis
  type: essay-response
  title: 'Фінальний аналіз: фігура, доказ, жанр'
  instruction: Проаналізуйте уривок і запропонуйте нейтральну редакцію.
  prompt: Виберіть уривок з публічної промови або навчального маніфесту. Знайдіть риторичне запитання, повтор або паралелізм, антитезу чи градацію. Для кожного засобу поясніть механізм, функцію і жанрову межу. Потім перепишіть один фрагмент для академічного або сервісного тексту.
  min_words: 180
  model_answer: |
    > [!model-answer]
    > У фразі **Хіба довіра можлива без відкритих даних?** риторичне запитання фактично стверджує, що довіра потребує відкритості. У рядку **ми просили пояснень, ми чекали відповідей, ми збирали підписи** анафора й паралелізм показують послідовність дій громади. Антитеза **обіцяли діалог - отримали тишу** стискає розрив між заявою і результатом. Для академічного тексту я переписав би так: **У матеріалі простежується невідповідність між декларованим діалогом і відсутністю відповіді на запити громади**.
  rubric:
  - criteria: Зміст
    description: Відповідь пояснює механізм, функцію і жанр.
