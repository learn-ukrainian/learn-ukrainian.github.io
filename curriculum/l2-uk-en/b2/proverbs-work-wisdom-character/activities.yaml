  - "Прислів'я підкреслює, що результат потребує зусилля. У цій ситуації воно проблемне, бо працівник не уникав праці; проблема в організації дедлайну. Керівник перекладає відповідальність на людину. Нейтральніше: **Дякую за термінову роботу. Нам треба краще планувати строки, щоб не створювати нічних переробок.**"
