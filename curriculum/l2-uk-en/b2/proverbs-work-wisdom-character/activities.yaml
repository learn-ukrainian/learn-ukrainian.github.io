- id: act-1
  type: critical-analysis
  title: Функція прислів’я
  instruction: Проаналізуйте приклади й поясніть рішення через значення, регістр і контекст.
  target_text: Без праці нема плоду підтримує зв’язок зусилля й результату. Слово не горобець застерігає від необережного мовлення.
  questions:
  - Як визначити соціальну дію прислів’я?
  - Який варіант був би недоречним у формальнішому тексті?
  - Яке коротке правило можна вивести з прикладів?
  model_answers:
  - Рішення залежить від значення, типової сполучуваності й комунікативної функції вислову.
  - Недоречним буде варіант, який змінює регістр, створює кальку або переносить прислів’я в невідповідну ситуацію.
  - 'Коротке правило: спершу визначаємо функцію і контекст, а вже потім добираємо слово, прислів’я або сталий вислів.'
- id: act-2
  type: critical-analysis
  title: Коли формула стає недоречною
  instruction: Проаналізуйте ситуацію й вирішіть, чи доречно вжито прислів'я.
  target_text: "Працівник працював усю ніч, бо завдання надійшло запізно. Керівник сказав: «Без праці нема плоду», і не пояснив, чому дедлайн був нереалістичним."
  questions:
  - "Яке переносне значення має прислів'я?"
  - "Чому воно проблемне в цій ситуації?"
  - "Яку нейтральнішу фразу можна використати?"
  model_answers:
  - "Прислів'я підкреслює, що результат потребує зусилля. У цій ситуації воно проблемне, бо працівник не уникав праці; проблема в організації дедлайну. Керівник перекладає відповідальність на людину. Нейтральніше: **Дякую за термінову роботу. Нам треба краще планувати строки, щоб не створювати нічних переробок.**"
