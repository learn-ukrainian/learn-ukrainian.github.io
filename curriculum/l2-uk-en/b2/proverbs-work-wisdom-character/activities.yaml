- id: act-4
  type: critical-analysis
  title: Чесність чи грубість?
  instruction: Відділіть етичний зміст прислів'я від його можливого зловживання.
  target_text: "Після невдалої презентації колега сказав: «Не той друг, хто медом маже, а той, хто правду каже», а потім публічно висміяв промовця."
  questions:
  - "Яку цінність підтримує прислів'я?"
  - "Що саме порушує колега?"
  - "Як можна сказати правду етично?"
  model_answers:
  - "Прислів'я підтримує чесний зворотний зв'язок і відмову від порожніх лестощів. Колега порушує форму й ситуацію: публічне висміювання принижує людину і не допомагає поліпшити презентацію. Етичніше: **У презентації була сильна структура, але треба чіткіше пояснити джерела й скоротити вступ. Я можу допомогти переглянути слайди.**"
