- id: wb-essay-proverb-use
  type: essay-response
  title: Доречність прислів'я
  instruction: Напишіть 120-160 слів про доречне й недоречне вживання одного прислів'я.
  prompt: "Виберіть прислів'я про працю, мудрість або характер. Поясніть його буквальний образ, переносне значення, доречний контекст і контекст, де воно звучало б невдало."
  model_answer: |
    > [!model-answer]
    > Прислів'я **Слово не горобець: вилетить - не впіймаєш** має простий буквальний образ: птах вилетів, і його вже важко повернути. Переносне значення стосується відповідальності за сказане. Вислів доречний у розмові про публічні коментарі, конфлікт у чаті або необережний заголовок у медіа. Він нагадує, що слова можуть мати наслідки навіть після вибачення. Проте прислів'я може звучати невдало, якщо його використовують, щоб змусити людину мовчати про проблему. Наприклад, працівник має право повідомити про несправедливість, і фраза **Слово не горобець** у такій ситуації може стати тиском. Отже, прислів'я корисне як застереження, але не як заборона говорити.
  rubric:
  - criteria: Тлумачення
    description: Пояснено буквальний образ і переносне значення.
    points: 2
  - criteria: Доречність
    description: Наведено доречний контекст.
    points: 2
  - criteria: Межа застосування
    description: Пояснено, де прислів'я звучить невдало.
    points: 2
  - criteria: Регістр
    description: Враховано адресата або жанр.
    points: 2
  - criteria: Мовна якість
    description: Текст зв'язний і точний.
    points: 2
  min_words: 150
