  - "Прислів'я підтримує чесний зворотний зв'язок і відмову від порожніх лестощів. Колега порушує форму й ситуацію: публічне висміювання принижує людину і не допомагає поліпшити презентацію. Етичніше: **У презентації була сильна структура, але треба чіткіше пояснити джерела й скоротити вступ. Я можу допомогти переглянути слайди.**"
- id: act-5
  type: essay-response
  title: Мініаналіз антиприслів'я
  instruction: Напишіть 90-120 слів про сучасну трансформацію прислів'я.
  prompt: "Проаналізуйте антиприслів'я «Без кави нема коду»: яку традиційну форму воно змінює, який ефект створює і в якому регістрі доречне?"
  model_answer: |
    > [!model-answer]
    > Антиприслів'я **Без кави нема коду** змінює традиційну формулу **Без праці нема плоду**. Воно зберігає ритм і синтаксичну будову, але замінює ключові слова на лексику програмістської або офісної культури. Ефект гумористичний: стара мораль про працю перетворюється на жарт про залежність від кави під час роботи. Такий вислів доречний у неформальному чаті команди, мемі або рекламному тексті кав'ярні біля IT-офісу. В офіційному звіті він був би недоречним, бо там потрібні факти, а не гра з паремією.
  min_words: 150
