version: '1.0'
module: presentation-skills
level: b2

inline:
  - id: act-1
    type: reading
    title: Структура короткого виступу
    text: >-
      П'ятихвилинна презентація має вести слухача від гачка до рішення:
      проблема, теза, два докази, ризик і конкретний заклик до дії. Якщо
      доповідач додає забагато рівнозначних блоків, аудиторія втрачає головний
      маршрут.
    tasks:
      - Яку функцію виконує гачок?
      - Чому теза має з'явитися рано?
      - Чому ризик не варто приховувати?
      - Який фінал буде конкретним?

  - id: act-2
    type: critical-analysis
    title: Коментування графіка
    target_text: >-
      На графіку бачимо кількість заявок за чотири квартали. У третьому
      кварталі показник зріс, тому запуск у серпні дасть змогу використати пік
      інтересу.
    questions:
      - Яка частина описує дані?
      - Яка частина інтерпретує тренд?
      - Яка частина пов'язує графік із рішенням?
    model_answers:
      - "Опис даних: 'На графіку бачимо кількість заявок за чотири квартали'."
      - "Інтерпретація: 'У третьому кварталі показник зріс'."
      - "Рішення: запуск у серпні використовує пік інтересу."

  - id: act-3
    type: critical-analysis
    title: Переконання без маніпуляції
    target_text: >-
      Якщо ви не підтримаєте наш проєкт, місто втратить майбутнє. Ми просимо
      погодити пілот, бо попередня реєстрація вже перевищує місткість перших
      груп.
    questions:
      - Яка частина звучить як хибна дилема?
      - Яка частина спирається на доказ?
      - Як переписати початок чесніше?
    model_answers:
      - "Хибна дилема: 'якщо не підтримаєте, місто втратить майбутнє'."
      - "Доказом є попередня реєстрація, що перевищує місткість груп."
      - "Чесніше: 'Без додаткових просторів частина підлітків не матиме безпечних занять після уроків'."

  - id: act-4
    type: critical-analysis
    title: Відповідь на складне питання
    target_text: >-
      Так, зростання оренди є ризиком. Саме тому ми заклали резерв 10% і
      підготували два майданчики, щоб пілот не залежав від одного договору.
    questions:
      - Як доповідач визнає ризик?
      - Які два способи контролю названо?
      - Як відповідь повертається до головної тези?
    model_answers:
      - "Доповідач прямо каже, що зростання оренди є ризиком."
      - "Названо резерв 10% і два альтернативні майданчики."
      - "Фінальна частина повертає до тези про стійкість пілоту."

  - id: act-5
    type: critical-analysis
    title: Адаптація до аудиторії
    target_text: >-
      Міській раді потрібні бюджет, законні підстави й відповідальні; батькам -
      безпека, графік і комунікація; волонтерам - ролі, навчання й підтримка.
    questions:
      - Чому одну презентацію не можна повторювати без змін?
      - Який доказ важливий для міської ради?
      - Який заклик до дії доречний для батьків?
    model_answers:
      - "Різні аудиторії ухвалюють різні рішення і мають різні страхи."
      - "Для міської ради важливі бюджет, законні підстави, строки і відповідальні."
      - "Для батьків доречно просити зареєструвати дитину або обрати графік."

workbook:
  - type: unjumble
    title: Формули презентації
    instruction: Відновіть природний порядок слів.
    items:
      - words: [Гачок, має, бути, пов'язаний, із, головною, тезою]
        answer: Гачок має бути пов'язаний із головною тезою
      - words: [Перший, слайд, називає, проблему, і, обіцяє, рішення]
        answer: Перший слайд називає проблему і обіцяє рішення
      - words: [Перехід, пояснює, як, наступний, блок, пов'язаний, із, попереднім]
        answer: Перехід пояснює як наступний блок пов'язаний із попереднім
      - words: [Графік, треба, коментувати, від, опису, до, висновку]
        answer: Графік треба коментувати від опису до висновку
      - words: [Сильний, фінал, називає, конкретний, наступний, крок]
        answer: Сильний фінал називає конкретний наступний крок
      - words: [Карта, питань, допомагає, підготувати, відповіді, для, сесії, запитань]
        answer: Карта питань допомагає підготувати відповіді для сесії запитань
      - words: [Пауза, перед, цифрою, допомагає, аудиторії, сприйняти, висновок]
        answer: Пауза перед цифрою допомагає аудиторії сприйняти висновок
      - words: [Зворотний, зв'язок, має, бути, конкретним, і, дієвим]
        answer: Зворотний зв'язок має бути конкретним і дієвим

  - type: fill-in
    title: Мова доповідача
    instruction: Уставте слово або фразу, що відповідає контексту.
    items:
      - sentence: "Слайд має одну головну думку, тому текст повинен бути ___."
        answer: "лаконічним"
        options: [лаконічним, випадковим, прихованим, суперечливим]
        explanation: Лаконічний слайд не конкурує з мовленням.
      - sentence: "Фінал презентації завершується конкретним ___."
        answer: "закликом до дії"
        options: [закликом до дії, списком помилок, випадковим жартом, новою темою]
        explanation: Фінал має назвати дію аудиторії.
      - sentence: "Під час складного питання допомагає ____."
        answer: "метод мосту"
        options: [метод мосту, довге мовчання, зміна теми, відмова слухати]
        explanation: Метод мосту відповідає на ризик і повертає до тези.
      - sentence: "Перед виступом варто підготувати карту для ____."
        answer: "Q&A"
        options: [Q&A, реклами, титрів, архіву]
        explanation: Карта Q&A готує відповіді на складні запитання.
      - sentence: "Пояснення графіка починається з ____."
        answer: "опису даних"
        options: [опису даних, вибачення, фінального слайда, випадкової історії]
        explanation: Спочатку треба назвати, що показано.
      - sentence: "Довіру до доповідача називають ____."
        answer: "етосом"
        options: [етосом, патосом, таймінгом, фреймінгом]
        explanation: Етос пов'язаний із компетентністю й чесністю.
      - sentence: "Аргументи й докази належать до ____."
        answer: "логосу"
        options: [логосу, паузи, жарту, оренди]
        explanation: Логос відповідає за раціональну частину переконання.
      - sentence: "Емоційний зв'язок з аудиторією створює ____."
        answer: "патос"
        options: [патос, слайд, регламент, файл]
        explanation: Патос не має замінювати докази.
      - sentence: "Підготовлене усне пояснення ключових блоків - це ____."
        answer: "сценарій"
        options: [сценарій, джинса, фейк, опонент]
        explanation: Сценарій допомагає контролювати виступ.
      - sentence: "Керування часом виступу називають ____."
        answer: "таймінгом"
        options: [таймінгом, підтекстом, евфемізмом, адресатом]
        explanation: Таймінг визначає глибину кожного блоку.

  - type: select
    title: Остання перевірка презентації
    instruction: Виберіть професійне рішення перед виступом.
    items:
      - question: Якщо регламент скоротили з п'яти хвилин до трьох, що треба зробити?
        options:
          - text: Залишити тезу, найсильніший доказ і фінальний заклик.
            correct: true
          - text: Говорити вдвічі швидше.
            correct: false
          - text: Прибрати фінал.
            correct: false
          - text: Додати ще більше деталей.
            correct: false
        explanation: Скорочення часу потребує пріоритетів.
      - question: Який слайд найкраще підходить для фіналу?
        options:
          - text: Слайд із конкретним проханням і наступним кроком.
            correct: true
          - text: Випадкова ілюстрація без тексту.
            correct: false
          - text: Довгий список усіх деталей.
            correct: false
          - text: Порожній слайд без прохання.
            correct: false
        explanation: Фінал має фіксувати дію аудиторії.
      - question: Що робити, якщо не знаєте точного показника під час Q&A?
        options:
          - text: Чесно назвати межу знання і пообіцяти час перевірки.
            correct: true
          - text: Вигадати приблизну цифру.
            correct: false
          - text: Змінити тему без відповіді.
            correct: false
          - text: Звинуватити слухача.
            correct: false
        explanation: Чесність підтримує етос.
      - question: Навіщо потрібна пауза перед ключовою цифрою?
        options:
          - text: Щоб аудиторія встигла сприйняти важливий висновок.
            correct: true
          - text: Щоб приховати слабкий доказ.
            correct: false
          - text: Щоб замінити структуру.
            correct: false
          - text: Щоб уникнути запитань.
            correct: false
        explanation: Пауза керує увагою.
      - question: Яке питання після репетиції найкорисніше?
        options:
          - text: Яке критичне запитання поставить аудиторія?
            correct: true
          - text: Чи я виглядаю добре?
            correct: false
          - text: Чи можна нічого не змінювати?
            correct: false
          - text: Чи достатньо читати слайди?
            correct: false
        explanation: Репетиція має перевіряти ризики.
      - question: Що має містити підсумковий лист після презентації?
        options:
          - text: Тезу, рішення, відповідальних і строк наступного кроку.
            correct: true
          - text: Лише подяку без домовленостей.
            correct: false
          - text: Нову тему без зв'язку.
            correct: false
          - text: Усі чернетки слайдів.
            correct: false
        explanation: Післядія підтримує результат виступу.
      - question: Як адаптувати презентацію до нової аудиторії?
        options:
          - text: Змінити порядок, приклади й заклик відповідно до рішення аудиторії.
            correct: true
          - text: Завжди говорити той самий текст.
            correct: false
          - text: Прибрати докази.
            correct: false
          - text: Залишити лише жарти.
            correct: false
        explanation: Аудиторія визначає фокус і дію.
      - question: Яке твердження про сторітеллінг правильне?
        options:
          - text: Історія має підтримувати доказ, а не замінювати його.
            correct: true
          - text: Історія робить дані непотрібними.
            correct: false
          - text: Будь-яка вигадка доречна в пітчі.
            correct: false
          - text: Сторітеллінг заборонений.
            correct: false
        explanation: Сторітеллінг потребує логосу.

  - id: wb-essay
    type: essay-response
    title: Сценарій короткої промови
    prompt: >-
      Підготуйте сценарій презентації стартапу або екологічного проєкту.
      Додайте гачок, тезу, два аргументи, фразу-перехід і фінальний заклик до дії.
    min_words: 220
    model_answer: >-
      Уявіть шкільний двір, який після уроків стає безпечним простором для
      гуртків і зустрічей. Наш проєкт пропонує тримісячний пілот у двох школах.
      По-перше, попередня реєстрація вже показала попит: охочих більше, ніж
      місць у перших групах. По-друге, бюджет контрольований, бо ми маємо два
      партнерські майданчики й резерв на оренду. Перейдемо до ризиків: головні
      ризики стосуються тренерів, графіка й безпеки, і для кожного визначено
      відповідальну особу. Сьогодні просимо погодити пілот, призначити
      координатора і дозволити почати набір груп до кінця місяця.
    rubric:
      - criteria: Структура
        description: Є гачок, теза, аргументи, перехід і фінальний заклик.
      - criteria: Докази
        description: Аргументи підтримані даними, прикладами або ризик-планом.
      - criteria: Регістр
        description: Мова відповідає професійній аудиторії.

  - id: wb-critical
    type: critical-analysis
    title: Сторітеллінг і доказ
    target_text: >-
      Після уроків Марко чекає маму в коридорі. Ця історія пояснює потребу, але
      масштаб проблеми мають підтвердити дані реєстрації.
    questions:
      - Яку функцію виконує історія?
      - Чому вона не замінює статистику?
      - Як поєднати патос і логос у виступі?
    model_answers:
      - "Історія робить проблему конкретною й видимою."
      - "Один приклад не доводить масштаб проблеми."
      - "Патос показує людський досвід, а логос підтверджує масштаб даними."
