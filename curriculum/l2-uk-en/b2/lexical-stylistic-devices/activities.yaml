version: '1.0'
module: lexical-stylistic-devices
level: b2
inline:
- type: select
  title: Від етикетки до функції
  instruction: Виберіть відповідь, яка пояснює не тільки назву засобу, а й функцію.
  items:
  - question: «Місто прокинулося» - це...
    options:
    - text: персоніфікована метафора, що показує початок міського руху
      correct: true
    - text: буквальне повідомлення про будівлі
      correct: false
    - text: помилка метонімії без функції
      correct: false
    - text: службова формула для розкладу транспорту
      correct: false
    explanation: Місто описано як жива істота, але функція залежить від жанру.
  - question: Яка відповідь найкраще аналізує «площа заговорила плакатами»?
    options:
    - text: 'Персоніфікація з метонімічним ефектом: простір заміщує людей і їхні голоси.'
      correct: true
    - text: Паронімічна помилка між площею і плакатом.
      correct: false
    - text: Нейтральна офіційна назва події.
      correct: false
    - text: Літота, бо площу применшено.
      correct: false
    explanation: Образ стискає сцену громадського висловлення.
  - question: Яке слово найпряміше називає дію без евфемізму?
    options:
    - text: звільнення працівників
      correct: true
    - text: оптимізація персоналу
      correct: false
    - text: кадрове перезавантаження
      correct: false
    - text: оновлення людського ресурсу
      correct: false
    explanation: Евфемізми можуть пом'якшувати або приховувати факт.
  - question: Яка пара потребує особливої уваги як пароніми?
    options:
    - text: ефектний / ефективний
      correct: true
    - text: місто / площа
      correct: false
    - text: гучний / тихий
      correct: false
    - text: метафора / образ
      correct: false
    explanation: Слова подібні за формою, але різні за значенням.
  - question: Яка формула відповідає B2-аналізу тропу?
    options:
    - text: назва засобу + механізм + функція + жанрова доречність
      correct: true
    - text: назва засобу без пояснення
      correct: false
    - text: емоційна оцінка без текстового доказу
      correct: false
    - text: перелік усіх термінів, які пригадалися
      correct: false
    explanation: Термін має бути пов'язаний із роботою слова в тексті.
  - question: «Гірка перемога» найточніше описується як...
    options:
    - text: епітет, що додає суперечливу оцінку результату
      correct: true
    - text: нейтральна юридична формула
      correct: false
    - text: паронімічна помилка
      correct: false
    - text: чистий числівник
      correct: false
    explanation: Епітет не просто називає, а оцінює.
  - question: У фразі «зал аплодував» працює...
    options:
    - text: 'метонімія: місце заміщує людей у ньому'
      correct: true
    - text: 'літота: масштаб применшено'
      correct: false
    - text: 'евфемізм: факт приховано'
      correct: false
    - text: 'паронім: слово сплутано'
      correct: false
    explanation: Назва місця заміщує групу людей.
  - question: Яка редакція краще для академічного аналізу?
    options:
    - text: Фраза створює негативну оцінку через слово «цинічний».
      correct: true
    - text: Це просто жахливо й усе.
      correct: false
    - text: Автор точно ненавидить тему.
      correct: false
    - text: Слово автоматично доводить провину.
      correct: false
    explanation: Академічний стиль пояснює мовний механізм.
- type: match-up
  title: Троп і механізм
  instruction: Поєднайте засіб із механізмом.
  pairs:
  - left: метафора
    right: перенесення за подібністю
  - left: епітет
    right: образне означення
  - left: порівняння
    right: відкрите зіставлення через як, мов, ніби
  - left: метонімія
    right: перенесення за суміжністю
  - left: синекдоха
    right: частина замість цілого або ціле замість частини
  - left: персоніфікація
    right: надання неживому людських ознак
  - left: гіпербола
    right: навмисне перебільшення
  - left: літота
    right: навмисне применшення
  - left: іронія
    right: розрив між буквальним висловом і справжньою оцінкою
  - left: евфемізм
    right: пом'якшена назва складного факту
- type: error-correction
  title: Прибери змішану або нечітку образність
  instruction: Виберіть редакцію, яка тримає один образ або називає відповідального суб'єкта.
  items:
  - sentence: Ініціатива пустила коріння у вікні можливостей і повезла реформу локомотивом.
    error: змішана метафора
    options:
    - Ініціатива відкрила шлях до довготривалих змін.
    - Ініціатива пустила коріння у вікні можливостей.
    - Коріння реформи відчинило локомотив можливостей.
    - Вікно ініціативи проросло рейками.
    explanation: Один просторовий образ краще за хаотичне змішування.
    answer: Ініціатива відкрила шлях до довготривалих змін.
  - sentence: Влада помилилася з документами.
    error: нечіткий суб'єкт
    options:
    - Міська комісія не опублікувала протокол засідання.
    - Влада помилилася з документами.
    - Система якось не донесла папери.
    - Кабінети промовчали у тумані відповідальності.
    explanation: Якщо відповідальність важлива, метонімію треба розгорнути.
    answer: Міська комісія не опублікувала протокол засідання.
  - sentence: Команді потрібні нові руки для аналітики.
    error: можлива знеособлювальна синекдоха
    options:
    - Команді потрібні нові аналітики.
    - Команді потрібні нові руки для аналітики.
    - Руки команді потрібні аналітично.
    - Команда шукає ресурс рук.
    explanation: У вакансії краще назвати людей як фахівців.
    answer: Команді потрібні нові аналітики.
  - sentence: Звіт був цинічний, бо мені не сподобався.
    error: оцінка без доказу
    options:
    - Звіт має різко негативну тональність, бо називає скарги мешканців «шумом».
    - Звіт був цинічний, бо мені не сподобався.
    - Звіт страшенно цинічний без причин.
    - Звіт цинічний, бо такий настрій.
    explanation: Оцінне слово потребує текстового доказу.
    answer: Звіт має різко негативну тональність, бо називає скарги мешканців «шумом».
  - sentence: Адресант отримав листа.
    error: паронімічна помилка
    options:
    - Адресат отримав листа.
    - Адресант отримав листа.
    - Адресний отримав листа.
    - Адресність листа отримала адресанта.
    explanation: Адресат отримує повідомлення, адресант його надсилає.
    answer: Адресат отримав листа.
  - sentence: 'Архів мовчить. Жанр: офіційний запит.'
    error: образність у запиті
    correction: Архів не надав відповіді на запит.
    options:
    - Архів не надав відповіді на запит.
    - Архів мовчить.
    - Мовчання архіву говорить.
    - Архівна тиша співає.
    explanation: Офіційний запит потребує прямої дії.
  - sentence: Це тактовний план евакуації. Маємо на увазі план дій.
    error: паронімічна неточність
    correction: Це тактичний план евакуації.
    options:
    - Це тактичний план евакуації.
    - Це тактовний план евакуації.
    - Це тактово-тактичний план.
    - План евакуації тактовно тактикує.
    explanation: '**Тактичний** пов''язаний із тактикою.'
  - sentence: Рішення було трохи не найгірше, хоча порушило закон.
    error: літота приховує серйозність
    correction: Рішення порушило закон.
    options:
    - Рішення порушило закон.
    - Рішення було трохи не найгірше, хоча порушило закон.
    - Рішення ледь-ледь незаконно нормальне.
    - Не найгірша незаконність рішення.
    explanation: Правовий факт треба назвати прямо.
- type: group-sort
  title: Масштаб, іронія, оцінка
  instruction: Розподіліть приклади за головним лексичним ефектом.
  groups:
  - items:
    - Я сто разів пояснював.
    - Не найгірше рішення для кризового дня.
    - Море проблем після одного наказу.
    - Маленький крок до великої зміни.
    name: Гіпербола або літота
  - items:
    - 'Чудова прозорість: договорів знову немає.'
    - Гучна тиша архіву.
    - Лагідна жорсткість правила.
    - Прозора таємниця бюджету.
    name: Іронія або оксиморон
  - items:
    - маніпулятивний заголовок
    - цинічне рішення
    - відповідальна позиція
    - ризикований компроміс
    name: Оцінна лексика, що потребує доказу
- type: fill-in
  title: Синоніми й конотація
  instruction: Доберіть слово, яке найточніше відповідає регістрові.
  items:
  - sentence: 'Для офіційного повідомлення про ремонт краще: рух транспорту ____ з 6:00.'
    answer: відновлено
    options:
    - відновлено
    - прокинувся
    - ожив
    - заговорив
    explanation: Офіційний регістр потребує нейтрального дієслова.
  - sentence: Слово з додатковим емоційним або оцінним відтінком має ____.
    answer: конотацію
    options:
    - конотацію
    - склад
    - наголос
    - інфінітив
    explanation: Конотація відрізняє близькі слова за тоном.
  - sentence: У фразі «тримати руку на пульсі реформ» працює ____.
    answer: фразеологізм
    options:
    - фразеологізм
    - паронім
    - літота
    - синекдоха без образу
    explanation: Це сталий образний вислів.
  - sentence: Для вакансії етичніше написати «потрібні фахівці», а не «потрібні ____».
    answer: руки
    options:
    - руки
    - люди
    - аналітики
    - колеги
    explanation: Синекдоха може знеособлювати працівників.
  - sentence: У парі «ефектний / ефективний» слово ____ означає результативний.
    answer: ефективний
    options:
    - ефективний
    - ефектний
    - афективний
    - фактичний
    explanation: Ефективний = той, що дає результат.
  - sentence: Пом'якшена назва складного факту називається ____.
    answer: евфемізмом
    options:
    - евфемізмом
    - хіазмом
    - асонансом
    - асиндетоном
    explanation: Евфемізм може бути ввічливим або приховувати дію.
  - sentence: Перенесення назви за суміжністю - це ____.
    answer: метонімія
    options:
    - метонімія
    - гіпербола
    - епіфора
    - орфоепія
    explanation: Метонімія заміщує пов'язані явища.
  - sentence: Навмисне перебільшення масштабу називається ____.
    answer: гіперболою
    options:
    - гіперболою
    - літотою
    - метонімією
    - паронімом
    explanation: Гіпербола збільшує масштаб.
  - sentence: Навмисне применшення масштабу називається ____.
    answer: літотою
    options:
    - літотою
    - гіперболою
    - анафорою
    - алітерацією
    explanation: Літота зменшує масштаб або звучить стримано.
  - sentence: Слово, подібне за формою, але інше за значенням, - це ____.
    answer: паронім
    options:
    - паронім
    - епітет
    - порівняння
    - полісиндетон
    explanation: Пароніми легко сплутати.
- id: act-6
  type: essay-response
  title: 'Мініаналіз: образ, факт і регістр'
  instruction: Проаналізуйте фразу і перепишіть її для іншого жанру.
  prompt: 'Розгляньте фразу: «Архів мовчить про втрати, а прозорість знову лишилася в тіні». Назвіть два лексичні засоби, поясніть їхню функцію, а потім перепишіть зміст для офіційного запиту або аналітичного звіту.'
  min_words: 150
  model_answer: |
    > [!model-answer]
    > У фразі **архів мовчить** працює персоніфікована метафора або метонімія: інституцію описано як мовця, який не дає відповіді. **Прозорість лишилася в тіні** поєднує ціннісне слово з метафорою світла й темряви, щоб підкреслити брак відкритості. У колонці це може бути виразним, але в офіційному запиті треба назвати дію прямо: **Просимо повідомити, які матеріали архів втратив і чому інформацію про ці втрати не оприлюднено в доступному реєстрі**.
  rubric:
  - criteria: Критерій 1
    description: Названо два засоби і механізм їхньої роботи.
  - criteria: Критерій 2
    description: Пояснено функцію без перебільшення.
  - criteria: Критерій 3
    description: Офіційна редакція прибирає образність і називає потрібну дію.
workbook:
- id: wb-reading-lexical-landscape
  type: reading
  title: 'Читання: метафоричний ландшафт міста'
  instruction: Прочитайте уривок і виконайте завдання.
  source: Навчальний уривок для B2.
  text: 'Вранці місто не прокинулося відразу. Спершу озвалися трамваї, потім підземні переходи випустили людей, площа заговорила плакатами. У кав''ярні біля університету студентка сказала, що нова забудова з''їдає пам''ять району. Викладач усміхнувся: "Метафора гостра, але тепер доведіть її фактами". За вікном банер обіцяв "тиху революцію комфорту", а старий двір мовчав, ніби чекав, хто першим назве справжню проблему.'
  tasks:
  - Знайдіть дві метафори й поясніть, що переноситься.
  - Визначте приклад персоніфікації.
  - Поясніть, чому фраза «з'їдає пам'ять району» потребує доказів.
  - Знайдіть оцінне або рекламне словосполучення.
- id: wb-critical-public-discourse
  type: critical-analysis
  title: 'Критичний аналіз: тропи в публічному мовленні'
  target_text: Обіцяли діалог - отримали монолог. Назвали реформою - залишили стару процедуру. Прозорість без документів стала новою нормою.
  questions:
  - Які лексичні засоби створюють критику?
  - Де є іронія або антитеза?
  - Які факти треба додати, щоб текст не був лише ефектною формулою?
  model_answers:
  - |
    > [!model-answer]
    > У фрагменті працюють оцінні протиставлення **діалог - монолог**, **реформа - стара процедура**.
  - |
    > [!model-answer]
    > Іронічна формула **прозорість без документів** робить критику пам'ятною.
  - |
    > [!model-answer]
    > Текст потребує фактів: які саме документи не опубліковано, яка процедура не змінилася, хто відповідає за рішення.
- type: error-correction
  title: 'Workbook: зміни регістр'
  instruction: Виберіть варіант, доречний для вказаного жанру.
  items:
  - sentence: 'Архів мовчить про втрати. Жанр: офіційний запит.'
    error: образність замість прямої дії
    options:
    - Архів не надав інформації про втрачені матеріали.
    - Архів мовчить про втрати.
    - Мовчазний архів ховає тіні документів.
    - Тиша архіву говорить гучніше за факти.
    explanation: Офіційний запит потребує прямої дії.
    answer: Архів не надав інформації про втрачені матеріали.
  - sentence: 'Компанія оптимізувала персонал. Жанр: правозахисний звіт.'
    error: евфемізм приховує звільнення
    options:
    - Компанія звільнила частину працівників.
    - Компанія оптимізувала персонал.
    - Компанія перезавантажила людський ресурс.
    - Компанія провела м'яке кадрове оновлення.
    explanation: У звіті про права людей треба називати дію прямо.
    answer: Компанія звільнила частину працівників.
  - sentence: 'Площа заговорила плакатами. Жанр: офіційна довідка.'
    error: образність замість факту
    options:
    - На площі учасники акції розмістили плакати.
    - Площа заговорила плакатами.
    - Плакати навчили площу говорити.
    - Мовна площа плакатно заявила про себе.
    explanation: Офіційна довідка називає дію та учасників.
    answer: На площі учасники акції розмістили плакати.
  - sentence: Це ефектна система подання заяв. Маємо на увазі результативну систему.
    error: паронімічна неточність
    options:
    - Це ефективна система подання заяв.
