version: '1.0'
module: lexical-stylistic-devices
level: b2
inline: []
workbook:
  - type: reading
    id: lexical-reading-analysis
    title: "Читання: метафоричний ландшафт міста"
    instruction: "Прочитай уривок і визнач, які лексичні засоби створюють образ міського простору."
    source: "Навчальний уривок для модуля B2."
    text: >-
      Вранці місто не прокинулося відразу. Спершу озвалися трамваї, потім
      підземні переходи випустили людей, а площа заговорила плакатами. У кав'ярні
      біля університету студентка сказала, що нова забудова з'їдає пам'ять
      району. Її викладач усміхнувся: "Метафора гостра, але тепер доведіть її
      фактами". За вікном рекламний банер обіцяв "тиху революцію комфорту", а
      старий двір мовчав, ніби чекав, хто першим назве справжню проблему.
    tasks:
      - "Знайди дві метафори й поясни, що саме переноситься."
      - "Визнач приклад персоніфікації."
      - "Поясни, чому фраза «з'їдає пам'ять району» потребує доказів."
      - "Який оксиморон використано в рекламі?"
      - "Де в уривку є іронічний або критичний підтекст?"

  - type: critical-analysis
    id: lexical-public-discourse-analysis
    title: "Критичний аналіз: тропи в публічному мовленні"
    instruction: "Проаналізуй уривок і поясни, де образність допомагає, а де приховує відповідальність."
    target_text: >-
      У виступі посадовець сказав: "Місто входить у нову епоху прозорості.
      Старі проблеми тануть, а реформа відкриває вікно можливостей для кожного".
      У відповідь журналістка запитала, хто саме контролюватиме витрати і коли
      опублікують договори. Посадовець відповів, що "ринок сам підкаже правильний
      темп".
    questions:
      - "Які метафори використовує посадовець?"
      - "Яка метафора звучить як позитивна рамка, але не дає фактичної інформації?"
      - "Чому питання журналістки руйнує надмірну образність?"
      - "Що приховує вислів «ринок сам підкаже»?"
      - "Як переписати одну метафору точніше й відповідальніше?"
    model_answers:
      - "«Нова епоха», «проблеми тануть», «вікно можливостей», «ринок підкаже»."
      - "«Вікно можливостей» звучить позитивно, але не називає механізмів."
      - "Журналістка вимагає суб'єктів, строків і документів, тобто повертає текст до перевірних фактів."
      - "Вислів приховує конкретних людей та інституції, які ухвалюють рішення."
      - "Наприклад: «Договори опублікують до 15 травня, а витрати перевірить незалежна комісія»."

  - type: match-up
    title: "Зістав троп і механізм"
    instruction: "Поєднай назву засобу з найточнішим поясненням."
    pairs:
      - left: "метафора"
        right: "перенесення за подібністю"
      - left: "метонімія"
        right: "перенесення за суміжністю"
      - left: "синекдоха"
        right: "частина замість цілого або ціле замість частини"
      - left: "епітет"
        right: "образне означення, що підкреслює рису"
      - left: "гіпербола"
        right: "навмисне перебільшення"
      - left: "літота"
        right: "навмисне применшення"
      - left: "оксиморон"
        right: "поєднання логічно несумісних понять"
      - left: "евфемізм"
        right: "пом'якшена назва складного або різкого явища"
      - left: "перифраз"
        right: "описова заміна прямої назви"
      - left: "іронія"
        right: "розрив між буквальним висловом і справжньою оцінкою"
      - left: "паронім"
        right: "слово, подібне за формою до іншого, але відмінне за значенням"
      - left: "лексичний пласт"
        right: "група слів, пов'язана з часом, регіоном, професією або соціальним середовищем"

  - type: select
    title: "Визнач тип лексичного засобу"
    instruction: "Вибери найточнішу назву прийому."
    items:
      - question: "У реченні «площа заговорила плакатами» головний засіб - це..."
        options:
          - text: "персоніфікація з метонімічним ефектом"
            correct: true
          - text: "простий термін без переносного значення"
            correct: false
          - text: "паронімічна помилка"
            correct: false
          - text: "евфемізм"
            correct: false
        explanation: "Площа отримує людську дію, а плакати заміщують голос учасників."
      - question: "Який приклад є метонімією?"
        options:
          - text: "Увесь зал зааплодував."
            correct: true
          - text: "Тиха тривога росла в коридорі."
            correct: false
          - text: "Рішення було ефективним."
            correct: false
          - text: "Він працював як аналітик."
            correct: false
        explanation: "«Зал» заміщує людей у залі."
      - question: "Яке речення містить літоту?"
        options:
          - text: "Це не найгірший вихід із кризи."
            correct: true
          - text: "Місто чекало цілу вічність."
            correct: false
          - text: "Архів мовчав."
            correct: false
          - text: "Слова падали, мов листя."
            correct: false
        explanation: "Оцінка навмисно применшена через заперечну форму."
      - question: "Який вислів є оксимороном?"
        options:
          - text: "організований хаос"
            correct: true
          - text: "міська рада"
            correct: false
          - text: "ефективний план"
            correct: false
          - text: "читати Франка"
            correct: false
        explanation: "Поєднано протилежні смисли: організованість і хаос."
      - question: "Де паронім ужито правильно?"
        options:
          - text: "ефективна стратегія"
            correct: true
          - text: "ефектна стратегія скорочення витрат"
            correct: false
          - text: "адресант отримав лист"
            correct: false
          - text: "тактична відповідь на особистий біль"
            correct: false
        explanation: "«Ефективна» означає результативна; це доречно для стратегії."
      - question: "Яке речення найкраще показує відповідальне використання евфемізму?"
        options:
          - text: "Компанія повідомила про скорочення штату й пояснила причини."
            correct: true
          - text: "Компанія оптимізувала людський ресурс без деталей."
            correct: false
          - text: "Людей тихенько вивели з економічної гри."
            correct: false
          - text: "Ринок сам усе відрегулював."
            correct: false
        explanation: "Фраза пом'якшує тон, але не приховує подію."
      - question: "Який приклад найкраще показує синекдоху?"
        options:
          - text: "Команді бракує досвідчених рук."
            correct: true
          - text: "Архів мовчав після запиту."
            correct: false
          - text: "Рішення було холодним."
            correct: false
          - text: "Виступ прозвучав ефектно."
            correct: false
        explanation: "«Руки» називають людей, тобто частина заміщує ціле."
      - question: "Який варіант найкраще виправляє змішану метафору?"
        options:
          - text: "Ініціатива відкрила шлях до довготривалих змін."
            correct: true
          - text: "Ініціатива пустила коріння у вікні можливостей."
            correct: false
          - text: "Вікно змін проросло локомотивом."
            correct: false
          - text: "Коріння реформи відчинило двері поїзду."
            correct: false
        explanation: "Перший варіант тримає один просторовий образ."

  - type: fill-in
    title: "Добери точне слово або назву засобу"
    instruction: "Заповни пропуски так, щоб речення було стилістично точним."
    items:
      - sentence: "Перенесення назви за подібністю називається ____."
        answer: "метафорою"
        options: ["метафорою", "метонімією", "літотою", "паронімією"]
        explanation: "Метафора ґрунтується на подібності ознак або дій."
      - sentence: "Фраза «читати Костенко» є прикладом ____."
        answer: "метонімії"
        options: ["метонімії", "гіперболи", "евфемізму", "антитези"]
        explanation: "Ім'я авторки заміщує її тексти."
      - sentence: "Навмисне применшення називається ____."
        answer: "літотою"
        options: ["літотою", "гіперболою", "порівнянням", "епітетом"]
        explanation: "Літота зменшує масштаб для стилістичного ефекту."
      - sentence: "У парі «ефектний / ефективний» слова є ____."
        answer: "паронімами"
        options: ["паронімами", "омонімами", "синонімами", "архаїзмами"]
        explanation: "Вони схожі за формою, але різні за значенням."
      - sentence: "Описова назва замість прямої назви - це ____."
        answer: "перифраз"
        options: ["перифраз", "сарказм", "жаргонізм", "неологізм"]
        explanation: "Перифраз називає предмет або особу описово."
      - sentence: "Пом'якшена назва складного явища називається ____."
        answer: "евфемізмом"
        options: ["евфемізмом", "оксимороном", "синекдохою", "антитезою"]
        explanation: "Евфемізм пом'якшує вислів, але не має приховувати правду."
      - sentence: "У реченні «потрібні нові руки в команді» працює ____."
        answer: "синекдоха"
        options: ["синекдоха", "алегорія", "паронімія", "літота"]
        explanation: "Частина тіла заміщує людей, тобто частина називає ціле."
      - sentence: "Поєднання несумісних понять, як-от «мовчазна дискусія», називається ____."
        answer: "оксимороном"
        options: ["оксимороном", "метонімією", "професіоналізмом", "гіперболою"]
        explanation: "Оксиморон створює новий зміст через смисловий контраст."
      - sentence: "Слово, схоже за формою, але інше за значенням, називається ____."
        answer: "паронімом"
        options: ["паронімом", "епітетом", "перифразом", "жаргонізмом"]
        explanation: "Пароніми легко сплутати саме через подібну форму."
      - sentence: "Група слів, пов'язана з професією, регіоном або соціальним середовищем, - це ____."
        answer: "лексичний пласт"
        options: ["лексичний пласт", "гіпербола", "антитеза", "метафоричний корінь"]
        explanation: "Лексичні пласти допомагають описувати регістр і соціальний голос мовця."

  - type: group-sort
    title: "Розподіли лексичні засоби за групами"
    instruction: "Визнач, до якої групи належить кожен приклад."
    groups:
      - name: "Тропи образності"
        items:
          - "архів мовчить"
          - "кам'яна тиша"
          - "слова сипалися, мов листя"
          - "місто прокинулося"
      - name: "Кількісні тропи"
        items:
          - "чекали цілу вічність"
          - "не найгірший день"
          - "маленький крок до великої зміни"
          - "море проблем"
      - name: "Комічні або контрастні засоби"
        items:
          - "ну, дуже прозоро: договори зникли"
          - "організований хаос"
          - "обіцяли відкритість, отримали тишу"
          - "найгучнішою відповіддю було мовчання"
      - name: "Лексичні пласти"
        items:
          - "діалектизм у репліці персонажа"
          - "професіоналізм у фаховій інструкції"
          - "жаргонізм у молодіжному діалозі"
          - "архаїзм у стилізації"

  - type: error-correction
    title: "Виправ стилістично невдалий троп"
    instruction: "Знайди помилку або невдалий прийом і вибери точнішу редакцію."
    items:
      - sentence: "Ця реформа є ефектною, бо вже зменшила витрати."
        error: "ефектною"
        answer: "Ця реформа є ефективною, бо вже зменшила витрати."
        options:
          - "Ця реформа є ефективною, бо вже зменшила витрати."
          - "Ця реформа є ефектною, бо вже зменшила витрати."
          - "Ця реформа є афектною, бо вже зменшила витрати."
          - "Ця реформа є дефектною, бо вже зменшила витрати."
        explanation: "Йдеться про результативність, тому потрібне слово «ефективною»."
      - sentence: "Міська рада танцювала бюджетом до ранку."
        error: "танцювала бюджетом"
        answer: "Міська рада до ранку обговорювала бюджет."
        options:
          - "Міська рада до ранку обговорювала бюджет."
          - "Міська рада танцювала бюджетом до ранку."
          - "Бюджет до ранку метафорично ходив по раді."
          - "Рада бюджетно танцювала до ранку."
        explanation: "Випадкова метафора не має зрозумілого механізму перенесення."
      - sentence: "Через оптимізацію людського ресурсу двадцять працівників зникли з команди."
        error: "зникли з команди"
        answer: "Через скорочення штату двадцять працівників втратили роботу."
        options:
          - "Через скорочення штату двадцять працівників втратили роботу."
          - "Через оптимізацію людського ресурсу двадцять працівників зникли з команди."
          - "Через тиху революцію персоналу люди розчинилися."
          - "Через ринок команда стала легшою на двадцять людей."
        explanation: "Евфемізм не повинен приховувати реальну подію та відповідальність."
      - sentence: "Авторка використала метонімію: «ефектний результат»."
        error: "метонімію"
        answer: "Авторка використала паронімічно близьке слово: «ефектний результат»."
        options:
          - "Авторка використала паронімічно близьке слово: «ефектний результат»."
          - "Авторка використала метонімію: «ефектний результат»."
          - "Авторка використала синекдоху: «ефектний результат»."
          - "Авторка використала евфемізм: «ефектний результат»."
        explanation: "Проблема не в перенесенні назви, а в близькості паронімів."
      - sentence: "У статті йдеться про людей з обмеженими дефектами."
        error: "з обмеженими дефектами"
        answer: "У статті йдеться про людей з інвалідністю."
        options:
          - "У статті йдеться про людей з інвалідністю."
          - "У статті йдеться про людей з обмеженими дефектами."
          - "У статті йдеться про дефектних людей."
          - "У статті йдеться про людей без повної норми."
        explanation: "Потрібна етична й усталена назва без принизливого відтінку."
      - sentence: "Зал ухвалив постанову, тому меблі підтримали реформу."
        error: "меблі підтримали реформу"
        answer: "Зал ухвалив постанову, тобто депутати підтримали реформу."
        options:
          - "Зал ухвалив постанову, тобто депутати підтримали реформу."
          - "Зал ухвалив постанову, тому меблі підтримали реформу."
          - "Постанова ухвалила зал і підтримала меблі."
          - "Реформа підтримала зал як меблеву метонімію."
        explanation: "Метонімія «зал» може заміщувати людей, але не буквальні меблі."
      - sentence: "Команда відкрила вікно можливостей і посадила в ньому міцне коріння."
        error: "відкрила вікно можливостей і посадила в ньому міцне коріння"
        answer: "Команда відкрила можливість для довготривалих змін."
        options:
          - "Команда відкрила можливість для довготривалих змін."
          - "Команда відкрила вікно можливостей і посадила в ньому міцне коріння."
          - "Команда посадила вікно, щоб можливості проросли."
          - "Коріння відкрило команду для вікна змін."
        explanation: "В одному реченні змішано образ вікна й образ рослини."
      - sentence: "У статті автор тактично пояснив особистий біль співрозмовниці."
        error: "тактично"
        answer: "У статті автор тактовно пояснив особистий біль співрозмовниці."
        options:
          - "У статті автор тактовно пояснив особистий біль співрозмовниці."
          - "У статті автор тактично пояснив особистий біль співрозмовниці."
          - "У статті автор тактильно пояснив особистий біль співрозмовниці."
          - "У статті автор тактикою пояснив особистий біль співрозмовниці."
        explanation: "Йдеться про делікатність, тому потрібен паронім «тактовно»."

  - type: essay-response
    id: lexical-irony-responsibility-essay
    title: "Мініесе: іронія, метафора й відповідальність"
    instruction: "Напиши відповідь обсягом 150-180 слів. Використай щонайменше два лексичні засоби й поясни їхню функцію."
    prompt: >-
      Чи допомагає іронія захиститися від пропаганди, чи вона іноді замінює
      аналіз? Наведи приклад публічного вислову, де метафора або іронія
      викриває маніпуляцію, і приклад, де образність приховує відповідальність.
    min_words: 150
    model_answer: >-
      Іронія може захищати від пропаганди, коли вона показує розрив між гучною
      обіцянкою і фактом. Наприклад, фраза «чудова прозорість: договори зникли
      з сайту» викриває маніпуляцію, бо слово «прозорість» ужито іронічно.
      Водночас сама іронія не доводить провини: після неї треба назвати, які
      саме договори не опубліковано. Метафора теж може бути корисною: «цей
      закон - пластир на перелом» одразу показує поверховість рішення. Але якщо
      політик каже «ринок сам усе вилікує», образність приховує відповідальних
      людей та інституції. Отже, іронія й метафора сильні тоді, коли відкривають
      проблему, а не замінюють аналіз.
    rubric:
      - criteria: "Теза"
        description: "Текст чітко відповідає, коли іронія допомагає, а коли шкодить аналізу."
        points: 2
      - criteria: "Лексичні засоби"
        description: "Є щонайменше два доречні засоби: іронія, метафора, евфемізм або антитеза."
        points: 3
      - criteria: "Функція"
        description: "Автор пояснює функцію засобів, а не лише називає терміни."
        points: 3
      - criteria: "Етична оцінка"
        description: "Є висновок про відповідальність, жанр або межу сарказму."
        points: 2

  - type: essay-response
    id: lexical-register-rewrite
    title: "Редакторське завдання: зміни регістр"
    instruction: "Перепиши той самий зміст у двох різних регістрах і коротко поясни вибір лексики."
    prompt: >-
      Нейтральна теза: «Команда довго обговорювала рішення, але не визначила
      відповідальних». Створи 1) публіцистичний варіант із метафорою або
      антитезою; 2) офіційний варіант без зайвої образності. Після цього поясни,
      які слова ти додав або прибрав.
    min_words: 150
    model_answer: >-
      Публіцистичний варіант: Команда довго будувала міст до рішення, але так і
      не поставила на ньому табличку з іменами відповідальних. Офіційний
      варіант: Команда провела тривале обговорення, однак не визначила осіб,
      відповідальних за виконання рішення. У першому варіанті я використав
      метафору мосту, щоб показати рух до результату й незавершеність процесу.
      В офіційному варіанті прибрано образність, бо документ потребує точного
      суб'єкта, дії та відповідальності.
    rubric:
      - criteria: "Публіцистичний регістр"
        description: "Публіцистичний варіант має контрольований троп або антитезу."
        points: 3
      - criteria: "Офіційний регістр"
        description: "Офіційний варіант точний, нейтральний і не приховує відповідальність."
        points: 3
      - criteria: "Пояснення"
        description: "Автор називає конкретні слова, які додано або прибрано."
        points: 2
      - criteria: "Збереження змісту"
        description: "Обидва варіанти передають вихідну тезу без випадкової метафори."
        points: 2

  - type: essay-response
    id: lexical-layer-analysis
    title: "Аналіз стилістично забарвленої лексики"
    instruction: "Напиши 150-180 слів про роль одного лексичного пласта."
    prompt: >-
      Обери один пласт лексики: діалектизми, професіоналізми, жаргонізми,
      архаїзми або неологізми. Поясни, у якому жанрі він доречний, яку функцію
      виконує і який ризик виникає при надмірному використанні.
    min_words: 150
    model_answer: >-
      Діалектизми доречні в художньому діалозі, репортажі або есе, коли автор
      хоче передати регіональний голос. Вони можуть зробити персонажа живим і
      показати мовну географію України. Наприклад, кілька місцевих слів у репліці
      допоможуть читачеві почути середовище. Але надмір діалектизмів створює
      карикатуру або перетворює людину на декоративний знак регіону. Тому автор
      має використовувати такі слова точно, з повагою до носіїв і з достатнім
      контекстом. У службовому документі діалектизми зазвичай недоречні, бо там
      важливі стандартність і однозначність.
    rubric:
      - criteria: "Лексичний пласт"
        description: "Названо конкретний пласт лексики."
        points: 2
      - criteria: "Жанрова доречність"
        description: "Пояснено, у якому жанрі цей пласт працює природно."
        points: 3
      - criteria: "Приклад"
        description: "Є конкретний приклад або типова ситуація."
        points: 2
      - criteria: "Ризик"
        description: "Описано стилістичний або етичний ризик надмірного використання."
        points: 3
