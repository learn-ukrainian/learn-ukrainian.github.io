- id: b2-m03-editorial-justification
  type: essay-response
  title: Обґрунтуйте редакторське рішення
  instruction: Напишіть короткий редакторський коментар українською.
  prompt: Ви редагуєте службову замітку громади. Поясніть, де варто використати форму на -но/-то, де потрібен актив із названим діячем, а де дієприкметник лише описує готовий предмет. Використайте щонайменше три приклади з теми модуля.
  min_words: 150
  model_answer: 'У службовій замітці форму на -но/-то варто залишати там, де важливий завершений результат: заявку зареєстровано, маршрут погоджено, доступ відновлено. Такі речення не називають виконавця й не потребують підмета, тому об’єкт стоїть у знахідному відмінку. Якщо ж читач має знати відповідального, краще використати актив: комісія розглянула скаргу, підрядник завершив ремонт, організатори передали кошти фонду. Конструкції на зразок скаргу розглянуто комісією звучать кальковано, бо особовий діяч не має стояти в орудному після форми на -но/-то. Дієприкметник потрібен тоді, коли ми описуємо предмет після дії: підписаний договір, оновлена програма, перевірені документи. Отже, редактор обирає не “офіційнішу” форму, а форму, яка точно показує результат, відповідальність або ознаку предмета.'
  rubric:
  - criteria: Граматична точність
    description: Пояснює безпідметність, знахідний об’єкт і заборону особового діяча в орудному.
    points: 4
  - criteria: Стилістичний вибір
    description: Розрізняє результативну форму, актив і дієприкметниковий опис за комунікативною метою.
    points: 4
  - criteria: Приклади
    description: Наводить щонайменше три природні українські приклади без калькованого пасиву.
    points: 2
  peer_review_guidelines: Перевірте, чи автор не додає особового діяча в орудному після форм на -но/-то і чи вміє пояснити, чому актив інколи кращий.
