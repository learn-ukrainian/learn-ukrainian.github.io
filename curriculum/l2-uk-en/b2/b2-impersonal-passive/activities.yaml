version: '1.0'
module: b2-impersonal-passive
level: b2
inline:
  - id: act-1
    type: comparative-study
    title: Де немає підмета
    instruction: Порівняйте три речення й визначте синтаксичний фокус.
    items_to_compare:
      - "Комісія розглянула скаргу."
      - "Скаргу розглянуто."
      - "Розглянута скарга залишається в електронній справі."
    criteria:
      - підмет
      - об'єкт у знахідному
      - результат
      - ознака предмета
    prompt: "Яке речення активне, яке безособове, а яке дієприкметникове?"
    model_answer: >-
      Перше речення активне: комісія є підметом. Друге безособове: скаргу є
      об'єктом, а розглянуто фіксує результат. Третє використовує дієприкметник
      як означення при слові скарга.

  - id: act-2
    type: critical-analysis
    title: Ланцюжок форми
    instruction: Поясніть, як утворюються форми на -но, -то.
    target_text: >-
      Подати -> поданий -> подано. Підписати -> підписаний -> підписано.
      Ухвалити -> ухвалений -> ухвалено. Відкрити -> відкритий -> відкрито.
      Вилучити -> вилучений -> вилучено.
    questions:
      - "Який крок пов'язує форму на -но, -то з пасивним дієприкметником?"
      - "Чому форма не змінюється за родом або числом?"
      - "Як позначити минулий або майбутній час?"
    model_answers:
      - "Від дієприкметникової основи відкидаємо прикметникове закінчення й додаємо -о."
      - "Форма є незмінною предикативною формою, а не прикметником."
      - "Минулий час: було подано. Майбутній: буде розглянуто."

  - id: act-3
    type: critical-analysis
    title: Об'єкт у знахідному
    instruction: Виправте відмінок і поясніть, чому підмета немає.
    target_text: >-
      Заява подано до реєстру. Програма схвалено без зауважень. Скарга
      розглянуто на засіданні. Двері були зачинено о восьмій.
    questions:
      - "Які іменники треба поставити в знахідний відмінок?"
      - "Чому двері було, а не двері були?"
      - "Як перевірити модель на слові з видимим знахідним?"
    model_answers:
      - "Заяву подано; програму схвалено; скаргу розглянуто."
      - "Було не узгоджується з двері, бо речення безособове."
      - "Підставте форму типу заявку, програму, скаргу й перевірте питання що?"

  - id: act-4
    type: comparative-study
    title: Діяч чи інструмент
    instruction: Порівняйте орудний після форми на -но, -то.
    items_to_compare:
      - "Звіт підготовлено аналітиками."
      - "Документ підписано електронним ключем."
      - "Рішення схвалено радою."
      - "Поверхню оброблено розчином."
    criteria:
      - особовий діяч
      - інструмент або засіб
      - активне редагування
      - нормативність
    prompt: "Які речення треба переписати активом?"
    model_answer: >-
      **Аналітиками** і **радою** називають діячів, тому краще: аналітики
      підготували звіт; рада схвалила рішення. **Електронним ключем** і
      **розчином** називають інструмент або засіб, тому речення природні.

  - id: act-5
    type: comparative-study
    title: Результат, ознака чи правило
    instruction: Порівняйте три моделі й поясніть різницю.
    items_to_compare:
      - "Двері зачинено."
      - "Зачинені двері не пропускали світла."
      - "Двері зачиняються автоматично."
      - "Охоронець зачинив двері."
    criteria:
      - результат
      - ознака предмета
      - процес або правило
      - відповідальний діяч
    prompt: "Коли потрібна кожна модель?"
    model_answer: >-
      **Двері зачинено** повідомляє результат. **Зачинені двері** описують
      предмет. **Двері зачиняються автоматично** називає правило або механізм.
      **Охоронець зачинив** потрібне, коли важливий діяч.

workbook:
  - id: wb-1
    type: critical-analysis
    title: Статус заявки
    instruction: Визначте роль кожної форми на -но, -то.
    target_text: >-
      Заявку подано до електронної системи. Дані перевірено автоматично, але
      одну помилку виявлено під час ручної перевірки. Скаргу буде розглянуто
      завтра. Рішення надішлють заявниці електронною поштою.
    questions:
      - "Які форми повідомляють завершений результат?"
      - "Де майбутній результат виражено через буде?"
      - "Чому останнє речення не є формою на -но, -то?"
    model_answers:
      - "Подано, перевірено, виявлено повідомляють результат."
      - "Буде розглянуто називає майбутній результат."
      - "Надішлють є активною неозначено-особовою формою без орудного діяча."

  - id: wb-2
    type: comparative-study
    title: Інструмент чи діяч
    instruction: Порівняйте речення й визначте роль орудного.
    items_to_compare:
      - "Документ підписано електронним ключем."
      - "Лист написано пером."
      - "Звіт підготовлено аналітиками."
      - "Рішення ухвалено радою."
    criteria:
      - інструмент
      - особовий діяч
      - нормативний орудний
      - активне редагування
    prompt: "Які речення нормативні, а які треба перебудувати?"
    model_answer: >-
      Ключ і перо є інструментами, тому речення нормативні. Аналітики й рада є
      діячами, тому краще: аналітики підготували звіт; рада ухвалила рішення.

  - id: wb-3
    type: critical-analysis
    title: Перепишіть повідомлення
    instruction: Зробіть результативну, відповідальну і новинну версію.
    target_text: >-
      Було отримано звернення від мешканців. Було встановлено, що частину
      ліхтарів пошкоджено. Роботи було виконано підрядником, а оновлений графік
      було опубліковано пресслужбою.
    questions:
      - "Які форми можна залишити як результативні?"
      - "Де треба повернути діяча в актив?"
      - "Як написати живіший новинний варіант?"
    model_answers:
      - "Можна залишити пошкоджено, якщо виконавець невідомий, і оприлюднено, якщо важливий результат."
      - "Підрядник виконав роботи; пресслужба оприлюднила графік."
      - "Міська служба перевірила освітлення, частину ліхтарів пошкоджено, підрядник завершив роботи, графік оприлюднено на сайті."

  - id: wb-4
    type: comparative-study
    title: Фінальний вибір форми
    instruction: Порівняйте чотири речення для різних потреб.
    items_to_compare:
      - "Заявку подано."
      - "Комісія розглянула скаргу."
      - "Розглянута скарга залишається в системі."
      - "Дані оновлюються автоматично."
    criteria:
      - статус
      - відповідальний діяч
      - ознака предмета
      - регулярний процес
    prompt: "Яка модель відповідає кожній потребі?"
    model_answer: >-
      **Заявку подано** - статус результату. **Комісія розглянула** - діяч.
      **Розглянута скарга** - ознака предмета. **Дані оновлюються** - процес або
      правило.

  - id: wb-5
    type: critical-analysis
    title: Роль форми на -но, -то
    instruction: Поясніть редакторську оцінку кожного речення.
    target_text: >-
      Заявку подано. Заявку подано секретаркою. Документ підписано електронним
      ключем. Двері було зачинено. Ухвалу буде оприлюднено завтра. Ухвалу
      оприлюднила пресслужба.
    questions:
      - "Які речення є нормативними безособовими результатами?"
      - "Де треба актив через особового діяча?"
      - "Де інструмент або часова форма не порушують норму?"
    model_answers:
      - "Заявку подано; двері було зачинено; ухвалу буде оприлюднено."
      - "Заявку подано секретаркою треба переписати: секретарка подала заявку."
      - "Електронним ключем є інструментом; буде оприлюднено позначає майбутній результат."
