version: '1.0'
module: b2-impersonal-passive
level: b2
inline:
- type: fill-in
  title: Результат без названого діяча
  instruction: Заповніть пропуск нормативною формою, яка відповідає фокусу речення.
  items:
  - sentence: У повідомленні зазначено, що заявку ____ до реєстру вчасно.
    answer: подано
    options:
    - подано
    - подана комісією
    - подавалася секретарем
    - подану
    explanation: Форма подано стисло повідомляє результат без названого діяча.
  - sentence: Після обговорення нову редакцію програми ____ без зауважень.
    answer: схвалено
    options:
    - схвалено
    - схвалена радою
    - схвалювалася радою
    - схвалену
    explanation: Об'єкт нову редакцію стоїть у знахідному відмінку.
  - sentence: До початку брифінгу всі матеріали ____ на офіційному сайті.
    answer: оприлюднено
    options:
    - оприлюднено
    - оприлюднені пресслужбою
    - оприлюднюються пресслужбою
    - оприлюдненими
    explanation: Фокус на доступності матеріалів, а не на працівниках пресслужби.
  - sentence: Після перевірки підроблені документи ____ згідно з процедурою.
    answer: вилучено
    options:
    - вилучено
    - вилучені слідчими
    - вилучалися слідчими
    - вилученими
    explanation: Форма вилучено передає результат офіційної дії.
  - sentence: На вході до парку ____ нові інформаційні таблички.
    answer: встановлено
    options:
    - встановлено
    - встановлені майстрами
    - встановилися
    - встановленими
    explanation: Нові таблички є об'єктом дії, а не підметом.
  - sentence: Після марафону зібрані кошти ____ реабілітаційному фонду.
    answer: передано
    options:
    - передано
    - передані організаторами
    - передавалися організаторами
    - переданими
    explanation: Давальний реабілітаційному фонду називає адресата, не діяча.
  - sentence: У протоколі написано, що звернення мешканців ____ на засіданні.
    answer: розглянуто
    options:
    - розглянуто
    - розглянуте комісією
    - розглядалося комісією
    - розглянуту
    explanation: Форма розглянуто фіксує виконаний пункт порядку денного.
  - sentence: У звіті про операцію сказано, що небезпечну спробу ____ завчасно.
    answer: попереджено
    options:
    - попереджено
    - попереджена поліцією
    - попереджалася поліцією
    - попереджену
    explanation: Об'єкт небезпечну спробу має знахідний відмінок.
  - sentence: Після оновлення кабінету користувачів ____ про нові правила входу.
    answer: поінформовано
    options:
    - поінформовано
    - поінформовані адміністратором
    - інформувалися адміністратором
    - поінформованими
    explanation: Форма поінформовано називає результат повідомлення без особового діяча.
  - sentence: У підсумковій довідці порушення ____ за трьома категоріями.
    answer: згруповано
    options:
    - згруповано
    - згруповані експертами
    - групувалися експертами
    - згрупованими
    explanation: Згруповано фіксує результат аналітичної дії, не називаючи виконавця.
- type: error-correction
  title: Приберіть калькований орудний діяча
  instruction: Знайдіть помилковий фрагмент і виберіть нормативне редагування.
  items:
  - sentence: Звіт підготовлено аналітиками до ранкового засідання.
    error: підготовлено аналітиками
    answer: аналітики підготували
    error_type: construction
    options:
    - аналітики підготували
    - підготовлено аналітиками
    - аналітиками підготовлено
    - був підготовлений аналітиками
    explanation: Названих аналітиків треба зробити підметом активного речення.
  - sentence: Рішення схвалено радою після тривалих консультацій.
    error: схвалено радою
    answer: рада схвалила
    error_type: construction
    options:
    - рада схвалила
    - схвалено радою
    - було схвалене радою
    - схвалювалося радою
    explanation: Якщо рада важлива як діяч, потрібен актив.
  - sentence: Книжку підписано авторкою під час зустрічі з читачами.
    error: підписано авторкою
    answer: авторка підписала
    error_type: construction
    options:
    - авторка підписала
    - підписано авторкою
    - була підписана авторкою
    - підписувалася авторкою
    explanation: Особовий діяч після форми на -но є ненормативним.
  - sentence: Помилки виправлено редакторкою перед публікацією матеріалу.
    error: виправлено редакторкою
    answer: редакторка виправила
    error_type: construction
    options:
    - редакторка виправила
    - виправлено редакторкою
    - виправлені редакторкою
    - виправлялися редакторкою
    explanation: Відповідальну редакторку треба назвати підметом.
  - sentence: Проєкт було завершено командою за два місяці.
    error: було завершено командою
    answer: команда завершила
    error_type: construction
    options:
    - команда завершила
    - було завершено командою
    - завершувався командою
    - був завершений командою
    explanation: Коли команда названа, активне речення природніше.
  - sentence: Заяву зареєстровано секретарем в електронній системі.
    error: зареєстровано секретарем
    answer: секретар зареєстрував
    error_type: construction
    options:
    - секретар зареєстрував
    - зареєстровано секретарем
    - зареєстрована секретарем
    - реєструвалася секретарем
    explanation: Секретар є діячем, тому його треба зробити підметом.
  - sentence: Маршрут погоджено організаторами за день до старту.
    error: погоджено організаторами
    answer: організатори погодили
    error_type: construction
    options:
    - організатори погодили
    - погоджено організаторами
    - погоджений організаторами
    - погоджувався організаторами
    explanation: Організатори як виконавці мають бути підметом активного речення.
  - sentence: Дані оприлюднено пресслужбою після завершення перевірки.
    error: оприлюднено пресслужбою
    answer: пресслужба оприлюднила
    error_type: construction
    options:
    - пресслужба оприлюднила
    - оприлюднено пресслужбою
    - оприлюднені пресслужбою
    - оприлюднювалися пресслужбою
    explanation: Названа пресслужба є діячем, тому потрібен актив.
- type: select
  title: Оберіть усі нормативні рішення
  instruction: Позначте всі нормативні варіанти, які відповідають фокусу конкретної ситуації.
  items:
  - question: Які варіанти природно повідомляють результат без названого виконавця?
    min_correct: 3
    options:
    - text: Заявку подано до електронної системи.
      correct: true
    - text: Програму оновлено після тестування.
      correct: true
    - text: Кошти передано фонду.
      correct: true
    - text: Заявку подано секретарем.
      correct: false
    - text: Програма була оновлена командою.
      correct: false
    explanation: У правильних варіантах немає особового діяча в орудному.
  - question: Які варіанти краще називають відповідального діяча?
    min_correct: 2
    options:
    - text: Комісія розглянула скаргу.
      correct: true
    - text: Редакторка виправила помилки.
      correct: true
    - text: Скаргу розглянуто комісією.
      correct: false
    - text: Помилки було виправлено редакторкою.
      correct: false
    - text: Скарга розглядалася комісією.
      correct: false
    explanation: Коли діяч важливий, активне речення прозоріше.
  - question: Які речення правильно вживають орудний як інструмент або засіб?
    min_correct: 3
    options:
    - text: Документ підписано електронним ключем.
      correct: true
    - text: Лист написано пером.
      correct: true
    - text: Звіт підготовлено аналітиками.
      correct: false
    - text: Рішення ухвалено радою.
      correct: false
    - text: Двері відчинено запасним ключем.
      correct: true
    explanation: Інструмент допустимий, а особовий діяч після -но/-то ні.
  - question: Які варіанти правильно розрізняють дієприкметник і форму на -но, -то?
    min_correct: 2
    options:
    - text: Підготовлений звіт передано до архіву.
      correct: true
    - text: Звіт підготовлено до засідання.
      correct: true
    - text: Підготовлено звіт переданий секретарем.
      correct: false
    - text: Звіт був підготовлено.
      correct: false
    - text: Підготовлений звіт підготовлено командою.
      correct: false
    explanation: Дієприкметник описує предмет, а форма на -но/-то повідомляє результат.
  - question: Які варіанти правильно використовують допоміжне було?
    min_correct: 3
    options:
    - text: Учора було затримано двох підозрюваних.
      correct: true
    - text: До засідання було розглянуто всі заяви.
      correct: true
    - text: Двері були зачинено перед початком події.
      correct: false
    - text: Квитанції були перевірено бухгалтерією.
      correct: false
    - text: Програму було оприлюднено після підписання.
      correct: true
    explanation: Було не узгоджується з об'єктом і не дозволяє особового діяча.
  - question: Які речення доречні для репортажу про благодійний марафон?
    min_correct: 3
    options:
    - text: Маршрут погоджено з міськими службами.
      correct: true
    - text: Пункти води обладнано перед стартом.
      correct: true
    - text: Волонтери зустрічали учасників біля фінішу.
      correct: true
    - text: Кошти передано організаторами фонду.
      correct: false
    - text: Марафон проводився волонтерами дуже активно.
      correct: false
    explanation: Репортаж має чергувати результативні форми й активні речення.
  - question: Які варіанти правильно передають результат без названого виконавця?
    min_correct: 2
    options:
    - text: Ухвалу оприлюднено на сайті суду.
      correct: true
    - text: Ухвалу було оприлюднено після засідання.
      correct: true
    - text: Ухвала була оприлюднено секретарем.
      correct: false
    - text: Ухвалу оприлюднено секретарем.
      correct: false
    explanation: Фокус на результаті; якщо потрібен секретар як діяч, краще активне речення.
  - question: Які речення треба замінити активом, бо діяч важливий?
    min_correct: 2
    options:
    - text: Заявку відхилив модератор через неповні дані.
      correct: true
    - text: Комісія перенесла розгляд на пʼятницю.
      correct: true
    - text: Заявку відхилено через неповні дані.
      correct: false
    - text: Розгляд перенесено на пʼятницю.
      correct: false
    explanation: Коли відповідальність конкретного діяча важлива, українська норма віддає перевагу активу.
- type: translate
  title: Українська редакція замість кальки
  instruction: Оберіть найкращу українську редакцію початкової фрази.
  items:
  - source: 'Початкова фраза: Звіт був підготовлений аналітиками.'
    options:
    - text: Аналітики підготували звіт.
      correct: true
    - text: Звіт підготовлено аналітиками.
      correct: false
    - text: Звіт був підготовлено аналітиками.
      correct: false
    - text: Звіт готувався аналітиками.
      correct: false
    explanation: Названі аналітики мають бути підметом активного речення.
  - source: 'Початкова фраза: Заява була зареєстрована секретарем.'
    options:
    - text: Заяву зареєстровано.
      correct: true
    - text: Заява зареєстрована секретарем.
      correct: false
    - text: Заява була зареєстровано.
      correct: false
    - text: Заяву зареєстровано секретарем.
      correct: false
    explanation: Коли діяча не названо, форма на -но природна й лаконічна.
  - source: 'Початкова фраза: Рішення було схвалене радою.'
    options:
    - text: Рада схвалила рішення.
      correct: true
    - text: Рішення схвалено радою.
      correct: false
    - text: Рішення було схвалено радою.
      correct: false
    - text: Рішення схвалювалося радою.
      correct: false
    explanation: Якщо рада названа, краще активне речення.
  - source: 'Початкова фраза: Документ підписано за допомогою електронного ключа.'
    options:
    - text: Документ підписано електронним ключем.
      correct: true
    - text: Документ підписано директором.
      correct: false
    - text: Документ був підписано ключем.
      correct: false
    - text: Документ підписувався електронним ключем.
      correct: false
    explanation: Електронний ключ є інструментом, тому орудний відмінок допустимий.
  - source: 'Початкова фраза: Помилки були виправлені редакторкою.'
    options:
    - text: Редакторка виправила помилки.
      correct: true
    - text: Помилки виправлено редакторкою.
      correct: false
    - text: Помилки були виправлено редакторкою.
      correct: false
    - text: Помилки виправлялися редакторкою.
      correct: false
    explanation: Особового діяча треба зробити підметом.
  - source: 'Початкова фраза: Перед марафоном пункти води були обладнані волонтерами.'
    options:
    - text: Перед марафоном пункти води обладнано.
      correct: true
    - text: Перед марафоном пункти води обладнано волонтерами.
      correct: false
    - text: Перед марафоном пункти води були обладнано.
      correct: false
    - text: Перед марафоном пункти води обладнувалися волонтерами.
      correct: false
    explanation: Фокус на готовому результаті, без названого діяча.
  - source: 'Початкова фраза: Маршрут був погоджений організаторами ще в понеділок.'
    options:
    - text: Організатори погодили маршрут ще в понеділок.
      correct: true
    - text: Маршрут погоджено організаторами ще в понеділок.
      correct: false
    - text: Маршрут був погоджено організаторами ще в понеділок.
      correct: false
    - text: Маршрут погоджувався організаторами ще в понеділок.
      correct: false
    explanation: Названих організаторів треба зробити підметом активного речення.
  - source: 'Початкова фраза: Файл був підписаний електронним ключем.'
    options:
    - text: Файл підписано електронним ключем.
      correct: true
    - text: Електронний ключ підписав файл.
      correct: false
    - text: Файл був підписано електронним ключем.
      correct: false
    - text: Файл підписувався електронним ключем.
      correct: false
    explanation: Електронний ключ тут є інструментом, тому форма на -но нормативна.
workbook:
- type: quiz
  title: Фокус речення
  instruction: Оберіть варіант, який найточніше відповідає комунікативному завданню.
  items:
  - question: Яке речення найкраще фіксує результат без названого виконавця?
    options:
    - text: Скаргу розглянуто.
      correct: true
    - text: Комісія розглянула скаргу.
      correct: false
    - text: Скаргу розглянуто комісією.
      correct: false
    - text: Скарга була розглянута комісією.
      correct: false
    explanation: Форма розглянуто не називає діяча й підкреслює результат.
  - question: Який варіант краще називає відповідального виконавця?
    options:
    - text: Підрядник усунув недоліки.
      correct: true
    - text: Недоліки усунено підрядником.
      correct: false
    - text: Недоліки були усунено підрядником.
      correct: false
    - text: Недоліки усувалися підрядником.
      correct: false
    explanation: Коли підрядник важливий, активне речення прозоріше.
  - question: Яке речення правильно використовує інструмент в орудному відмінку?
    options:
    - text: Файл підписано електронним ключем.
      correct: true
    - text: Файл підписано директоркою.
      correct: false
    - text: Файл був підписано ключем.
      correct: false
    - text: Файл підписувався директоркою.
      correct: false
    explanation: Електронний ключ є засобом, а не особовим діячем.
  - question: Який варіант правильно показує минулий час?
    options:
    - text: Учора було оприлюднено результати.
      correct: true
    - text: Учора були оприлюднено результати.
      correct: false
    - text: Учора результати були оприлюднено.
      correct: false
    - text: Учора було оприлюднені результати.
      correct: false
    explanation: Допоміжне було не узгоджується з об'єктом.
  - question: Яке речення найкраще описує предмет після дії?
    options:
    - text: Підписаний договір передано юристові.
      correct: true
    - text: Договір підписано юристом.
      correct: false
