  - 'Коротке правило: спершу визначаємо функцію і контекст, а вже потім добираємо слово, прислів’я або сталий вислів.'
- id: act-3
  type: critical-analysis
  title: Обережність чи звинувачення?
  instruction: Проаналізуйте прагматичний ризик вислову.
  target_text: "Після того як користувач втратив гроші через шахрайський сайт, коментатор написав: «Береженого Бог береже». Він не згадав, що сайт імітував офіційний сервіс."
  questions:
  - "Яке нормальне значення має прислів'я?"
  - "Чому воно може звучати як звинувачення постраждалого?"
  - "Як сказати обережніше й відповідальніше?"
  model_answers:
  - "Прислів'я підкреслює цінність передбачливості. У цій ситуації воно може звучати як звинувачення, бо ігнорує шахрайську імітацію офіційного сервісу. Відповідальніше: **Цей випадок показує, що треба перевіряти адресу сайту, але відповідальність також лежить на шахраях і на системах захисту користувачів.**"
