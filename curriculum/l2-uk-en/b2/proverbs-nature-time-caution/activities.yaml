- id: act-4
  type: critical-analysis
  title: Антитеза чи паралелізм?
  instruction: Визначте, яка стилістична фігура організує вислів.
  target_text: "Не все те золото, що блищить. Що посієш, те й пожнеш. Поспішиш - людей насмішиш."
  questions:
  - "Де працює антитеза?"
  - "Де працює паралелізм дії й наслідку?"
  - "Де важлива рима або співзвуччя?"
  model_answers:
  - '**Не все те золото, що блищить** спирається на антитезу між видимим блиском і справжньою цінністю. **Що посієш, те й пожнеш** має паралелізм дії й наслідку. **Поспішиш - людей насмішиш** теж показує наслідок, але особливо тримається на римі й співзвуччі **-шиш**.'
