- id: wb-essay-caution
  type: essay-response
  title: Прислів'я про обачність
  instruction: Напишіть 120-160 слів про прислів'я, яке радить обережність або передбачливість.
  prompt: "Поясніть буквальний образ, переносне значення, доречний сучасний контекст і можливий ризик неправильного вживання."
  model_answer: |
    > [!model-answer]
    > Прислів'я **Не все те золото, що блищить** протиставляє зовнішній блиск і справжню цінність. Буквально золото блищить, але не кожен блискучий предмет є золотом. Переносне значення стосується обережного оцінювання: приваблива форма не гарантує якості, правдивості або безпеки. У сучасному контексті вислів доречний, коли ми говоримо про рекламу курсу, вакансію з нереалістичними обіцянками або неперевірене джерело в інтернеті. Проте він може стати надмірно підозрілим, якщо ним відкидати все нове тільки через страх. Тому краще поєднувати прислів'я з конкретною перевіркою: умови оплати, джерело інформації, репутація автора.
  rubric:
  - criteria: Образ
    description: Пояснено буквальний природний або предметний образ.
    points: 2
  - criteria: Перенесення
    description: Чітко названо переносне значення.
    points: 2
  - criteria: Контекст
    description: Наведено доречну сучасну ситуацію.
    points: 2
  - criteria: Ризик
    description: Названо межу або небезпеку неправильного вживання.
    points: 2
  - criteria: Мовна якість
    description: Текст зв'язний і відповідає завданню.
    points: 2
  min_words: 150
