- id: act-5
  type: essay-response
  title: Вибір прислів'я для ситуації
  instruction: Напишіть 90-120 слів про найточніший вислів для мікроситуації.
  prompt: "Команда має підписати важливий договір, але в останній момент помічає нечіткий пункт про оплату. Яке прислів'я доречніше: «Куй залізо, поки гаряче» чи «Сім разів відмір, один раз відріж»? Поясніть."
  model_answer: |
    > [!model-answer]
    > У цій ситуації доречніше **Сім разів відмір, один раз відріж**. Договір є незворотним або важко змінюваним кроком, тому перед підписанням треба перевірити умови. Прислів'я **Куй залізо, поки гаряче** підкреслює швидке використання нагоди, але тут поспіх може створити фінансовий ризик. Природний або ремісничий образ першого вислову переноситься на юридичну дію: спочатку виміряти, тобто перевірити пункт про оплату, а вже потім підписувати. Такий вибір не означає страху; це передбачливість.
  min_words: 150
