items:
  - lemma: 'бути'
    translation: 'to be'
    pos: 'verb'
    aspect: 'impf'
    notes: 'High frequency; universal usage, often requires Instrumental (бути лікарем).'
  - lemma: 'існувати'
    translation: 'to exist'
    pos: 'verb'
    aspect: 'impf'
    notes: 'Medium frequency; abstract/philosophical contexts (існує проблема, існують ризики).'
  - lemma: 'перебувати'
    translation: 'to be located / situated (for people/states)'
    pos: 'verb'
    aspect: 'impf'
    notes: 'Formal/State; markers of condition (перебувати в стані спокою, перебувати під контролем).'
  - lemma: 'становити'
    translation: 'to constitute / to amount to'
    pos: 'verb'
    aspect: 'impf'
    notes: 'Formal register; crucial for definitions (становити загрозу, становити більшість).'
  - lemma: 'знаходитися'
    translation: 'to be found'
    pos: 'verb'
    aspect: 'impf'
    notes: 'High frequency; note: often misused as a calque, replace with розташовуватися or міститися for precision.'
  - lemma: 'здаватися'
    translation: 'to seem'
    pos: 'verb'
    aspect: 'impf'
    notes: 'Subjective perception; fixed phrase: здавалося б (it would seem).'
  - lemma: 'виглядати'
    translation: 'to look / to appear (visually)'
    pos: 'verb'
    aspect: 'impf'
    notes: 'Visual appearance only (виглядати чудово); do not confuse with дивитися.'
  - lemma: 'виявлятися'
    translation: 'to turn out to be'
    pos: 'verb'
    aspect: 'impf'
    notes: 'Resultative/Discovery (виявлятися правдою, як виявилося).'
  - lemma: 'розташовуватися'
