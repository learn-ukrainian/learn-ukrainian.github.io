items:
  - lemma: 'суддя'
    ipa: '[suˈdʲːɑ]'
    translation: 'judge'
    pos: 'noun'
    gender: 'm'
    notes: 'Офіційне звертання до судді — «Ваша честь».'
  - lemma: 'прокурор'
    ipa: '[prɔkuˈrɔr]'
    translation: 'prosecutor'
    pos: 'noun'
    gender: 'm'
    notes: 'Державний обвинувач у кримінальному процесі.'
  - lemma: 'адвокат'
    ipa: '[ɑdʋɔˈkɑt]'
    translation: 'defense attorney'
    pos: 'noun'
    gender: 'm'
    notes: 'Професійний захисник; не плутати з ширшим терміном «юрист».'
  - lemma: 'позов'
    ipa: '[ˈpɔzɔu̯]'
    translation: 'lawsuit, claim'
    pos: 'noun'
    gender: 'm'
    notes: 'Офіційний документ для початку цивільної справи.'
  - lemma: 'свідок'
    ipa: '[ˈsʲʋʲidɔk]'
    translation: 'witness'
    pos: 'noun'
    gender: 'm'
    notes: 'Особа, яка дає свідчення (не покази) в суді.'
  - lemma: 'термін'
    ipa: '[ˈtɛrmʲin]'
    translation: 'term'
    pos: 'noun'
    gender: 'm'
  - lemma: 'процес'
    ipa: '[prɔˈt͡sɛs]'
    translation: 'trial, process'
    pos: 'noun'
    gender: 'm'
  - lemma: 'вирок'
    ipa: '[ʋɪrɔk]'
    translation: 'verdict'
    pos: 'noun'
    gender: 'm'
    notes: 'Рішення у кримінальній справі (обвинувальний або виправдувальний).'
  - lemma: 'згідно із законом'
    ipa: '[ˈzʲɦʲidnɔ iz zɑˈkɔnɔm]'
    translation: 'according to the law'
    pos: 'phrase'
    notes: 'Нормативна заміна для російської кальки «по закону».'
  - lemma: 'Магдебурзьке право'
    ipa: '[mɑɦdɛˈburzʲkɛ ˈprɑʋɔ]'
    translation: 'Magdeburg Law'
    pos: 'noun'
    gender: 'n'
    notes: 'Історичний символ європейського самоврядування.'
  - lemma: 'віра'
    ipa: '[ˈʋʲirɑ]'
    translation: 'vira (financial fine)'
    pos: 'noun'
    gender: 'f'
    notes: 'Грошовий штраф за вбивство з Руської Правди.'
  - lemma: 'доказ'
    ipa: '[ˈdɔkɑz]'
    translation: 'evidence, proof'
    pos: 'noun'
    gender: 'm'
  - lemma: 'задовольнити'
    ipa: '[zɑdɔʋɔlʲˈnɪtɪ]'
    translation: 'to grant, to satisfy (a claim)'
    pos: 'verb'
    aspect: 'perfective'
  - lemma: 'відхилити'
    ipa: '[ʋʲidxɪˈlɪtɪ]'
    translation: 'to dismiss, to reject (a claim)'
    pos: 'verb'
    aspect: 'perfective'
  - lemma: 'оскаржити'
    ipa: '[ɔˈskɑrʒɪtɪ]'
    translation: 'to appeal, to challenge'
    pos: 'verb'
    aspect: 'perfective'
  - lemma: 'злочин'
    ipa: '[ˈzlɔt͡ʃɪn]'
    translation: 'crime'
    pos: 'noun'
    gender: 'm'
  - lemma: 'правопорушення'
    ipa: '[prɑʋɔpɔˈruʃɛnʲːɑ]'
    translation: 'offense, violation'
    pos: 'noun'
    gender: 'n'
    notes: 'Часто використовується з прикметником «адміністративне».'
  - lemma: 'суд'
    ipa: '[sud]'
    translation: 'court'
    pos: 'noun'
    gender: 'm'
  - lemma: 'інстанція'
    ipa: '[inˈstɑnʲt͡sʲijɑ]'
    translation: 'instance, level of court'
    pos: 'noun'
    gender: 'f'
  - lemma: 'апеляція'
    ipa: '[ɑpɛˈlʲɑt͡sʲijɑ]'
    translation: 'appeal'
    pos: 'noun'
    gender: 'f'
  - lemma: 'касація'
    ipa: '[kɑˈsɑt͡sʲijɑ]'
    translation: 'cassation'
    pos: 'noun'
    gender: 'f'
  - lemma: 'відповідач'
    ipa: '[ʋʲidpɔʋʲiˈdɑt͡ʃ]'
    translation: 'defendant'
    pos: 'noun'
    gender: 'm'
  - lemma: 'позивач'
    ipa: '[pɔˈzɪˈʋɑt͡ʃ]'
    translation: 'plaintiff'
    pos: 'noun'
    gender: 'm'
  - lemma: 'рішення'
    ipa: '[ˈrʲiʃɛnʲːɑ]'
    translation: 'decision, ruling'
    pos: 'noun'
    gender: 'n'
  - lemma: 'обвинувач'
    ipa: '[ɔbʋɪnuˈʋɑt͡ʃ]'
    translation: 'accuser, prosecutor'
    pos: 'noun'
    gender: 'm'
  - lemma: 'рівність'
    ipa: '[ˈrʲiu̯nʲisʲtʲ]'
    translation: 'equality'
    pos: 'noun'
    gender: 'f'
  - lemma: 'обов''язок'
    ipa: '[ɔbɔu̯jɑzɔk]'
    translation: 'duty, obligation'
    pos: 'noun'
    gender: 'm'
  - lemma: 'справедливість'
    ipa: '[sprɑʋɛˈdlɪʋʲisʲtʲ]'
    translation: 'justice, fairness'
    pos: 'noun'
    gender: 'f'
  - lemma: 'судочинство'
    ipa: '[sudɔˈt͡ʃɪnstʋɔ]'
    translation: 'legal proceedings'
    pos: 'noun'
    gender: 'n'
  - lemma: 'скарга'
    ipa: '[ˈskɑrɦɑ]'
    translation: 'complaint, appeal'
    pos: 'noun'
    gender: 'f'