items:
  - lemma: "казати"
    ipa: '[kɑˈzɑtɪ]'
    translation: "to say"
    pos: "verb"
    aspect: "imperfective"
    usage: "кажуть, що... (it is said that...); мені казали (I was told)"
    example: "Кажуть, що завтра буде дощ."
  - lemma: "повідомити"
    ipa: '[pɔʋʲiˈdɔmɪtɪ]'
    translation: "to inform"
    pos: "verb"
    aspect: "perfective"
    usage: "повідомили про... (it was reported about...); нам повідомили (we were informed)"
    example: "Нам повідомили про зміну розкладу."
  - lemma: "чутка"
    ipa: '[ˈt͡ʃutkɑ]'
    translation: "rumor"
    pos: "noun"
    gender: "f"
    usage: "чутка пішла (rumor spread); пустити чутку (start a rumor); за чутками (rumor has it)"
    example: "За чутками, він скоро переїде до іншого міста."
  - lemma: "плітка"
    ipa: '[ˈplʲitkɑ]'
    translation: "gossip"
    pos: "noun"
    gender: "f"
    usage: "розпускати плітки (spread gossip); плести плітки (weave gossip)"
    example: "Я не люблю людей, які постійно плетуть плітки."
  - lemma: "сказати"
    ipa: '[skɑˈzɑtɪ]'
    translation: "to say, to tell"
    pos: "verb"
    aspect: "perfective"
    usage: "сказали, що... (was told that...)"
    example: "Мені сказали почекати в коридорі."
  - lemma: "запитати"
    ipa: '[zɑpɪˈtɑtɪ]'
    translation: "to ask"
    pos: "verb"
    aspect: "perfective"
    usage: "мене запитали (I was asked)"
    example: "Мене запитали про мій попередній досвід."
  - lemma: "пообіцяти"
    ipa: '[pɔɔbʲiˈt͡sʲɑtɪ]'
    translation: "to promise"
    pos: "verb"
    aspect: "perfective"
    usage: "нам пообіцяли (we were promised)"
    example: "Студентам пообіцяли додаткову стипендію."
  - lemma: "неозначено-особовий"
    ipa: '[nɛɔznɑt͡ʃɛnɔ-ɔsɔˈbɔʋɪj]'
    translation: "indefinite-personal"
    pos: "adjective"
    notes: "Лінгвістичний термін для цього типу речень."
    example: "У розмовній мові часто вживають неозначено-особові конструкції."
  - lemma: "соціальний клей"
    ipa: '[sɔt͡sʲiˈɑlʲnɪj klɛj]'
    translation: "social glue"
    pos: "noun phrase"
    notes: "Метафора для опису культурної ролі пліток."
    example: "У маленьких селах плітки виступають як соціальний клей."
  - lemma: "чужий рот не хлів"
    ipa: '[t͡ʃuˈʒɪj rɔt nɛ xlʲiu̯]'
    translation: "stranger's mouth is not a barn (you can't close it)"
    pos: "idiom"
    notes: "Означає неможливість зупинити поширення новин."
    example: "Хай говорять, що хочуть, чужий рот не хлів — не зачинити."
  - lemma: "сорока на хвості принесла"
    ipa: '[sɔˈrɔkɑ nɑ xʋɔˈsʲtʲi prɪnɛˈslɑ]'
    translation: "a magpie brought it on its tail (a little bird told me)"
    pos: "idiom"
    notes: "Використовується для позначення прихованого джерела інформації."
    example: "Мені тут сорока на хвості принесла, що ти отримав підвищення."
  - lemma: "побутовий"
    ipa: '[pɔbuˈtɔʋɪj]'
    translation: "everyday, domestic"
    pos: "adjective"
    usage: "побутовий пасив (everyday passive)"
    example: "Ця граматика є дуже важливою для побутового спілкування."
  - lemma: "передати"
    ipa: '[pɛrɛˈdɑtɪ]'
    translation: "to transmit, to pass on (information)"
    pos: "verb"
    aspect: "perfective"
    example: "По телевізору передали штормове попередження."
  - lemma: "виплатити"
    ipa: '[ˈʋɪplɑtɪtɪ]'
    translation: "to pay out"
    pos: "verb"
    aspect: "perfective"
    example: "Працівникам вчасно виплатили зарплату."
  - lemma: "перевести"
    ipa: '[pɛrɛʋɛˈstɪ]'
    translation: "to transfer"
    pos: "verb"
    aspect: "perfective"
    example: "Наш відділ перевели у новий офіс."
  - lemma: "затвердити"
    ipa: '[zɑtʋɛrdɪtɪ]'
    translation: "to approve"
    pos: "verb"
    aspect: "perfective"
    example: "Новий проєкт вже затвердили керівники."
  - lemma: "скасувати"
    ipa: '[skɑsuˈʋɑtɪ]'
    translation: "to cancel"
    pos: "verb"
    aspect: "perfective"
    example: "Вчорашню зустріч скасували через хворобу лектора."
  - lemma: "відхилити"
    ipa: '[ʋʲidxɪˈlɪtɪ]'
    translation: "to reject"
    pos: "verb"
    aspect: "perfective"
    example: "Мою заяву на відпустку відхилили."
  - lemma: "розпускати"
    ipa: '[rɔzpuˈskɑtɪ]'
    translation: "to spread (rumors)"
    pos: "verb"
    aspect: "imperfective"
    example: "Він любить розпускати брудні чутки про колег."
  - lemma: "плести"
    ipa: '[plɛˈstɪ]'
    translation: "to weave (gossip)"
    pos: "verb"
    aspect: "imperfective"
    example: "Вони цілий день тільки те й роблять, що плетуть плітки."
  - lemma: "інтрига"
    ipa: '[inˈtrɪɦɑ]'
    translation: "intrigue"
    pos: "noun"
    gender: "f"
    example: "Така анонімність створює справжню інтригу навколо події."
  - lemma: "анонімність"
    ipa: '[ɑnɔˈnʲimnʲisʲtʲ]'
    translation: "anonymity"
    pos: "noun"
    gender: "f"
    example: "Світські оглядачі часто зберігають повну анонімність своїх джерел."
  - lemma: "джерело"
    ipa: '[d͡ʒɛrɛˈlɔ]'
    translation: "source"
    pos: "noun"
    gender: "n"
    example: "Журналіст відмовився назвати джерело своєї інформації."
  - lemma: "наклеп"
    ipa: '[ˈnɑklɛp]'
    translation: "slander, defamation"
    pos: "noun"
    gender: "m"
    example: "Звинувачення в крадіжці виявилися звичайним наклепом."
  - lemma: "достовірний"
    ipa: '[dɔstɔˈʋʲirnɪj]'
    translation: "reliable, trustworthy"
    pos: "adjective"
    example: "Нам потрібна достовірна інформація, а не просто чутки."
  - lemma: "перевірений"
    ipa: '[pɛrɛˈʋʲirɛnɪj]'
    translation: "verified"
    pos: "adjective"
    example: "Він публікує лише перевірені факти у своїх статтях."
  - lemma: "скандал"
    ipa: '[skɑnˈdɑl]'
    translation: "scandal"
    pos: "noun"
    gender: "m"
    example: "Вчора на вечірці стався великий гучний скандал."
  - lemma: "обговорювати"
    ipa: '[ɔbɦɔˈʋɔrʲuʋɑtɪ]'
    translation: "to discuss"
    pos: "verb"
    aspect: "imperfective"
    example: "Люди завжди будуть обговорювати життя відомих зірок."
  - lemma: "сенсаційний"
    ipa: '[sɛnsɑˈt͡sʲijnɪj]'
    translation: "sensational"
    pos: "adjective"
    example: "У газеті з'явилася дуже сенсаційна новина про мера."
  - lemma: "імпліцитний"
    ipa: '[implʲiˈt͡sɪtnɪj]'
    translation: "implicit"
    pos: "adjective"
    notes: "Лінгвістичний термін для агента дії."
    example: "У цих реченнях завжди є імпліцитний виконавець дії."