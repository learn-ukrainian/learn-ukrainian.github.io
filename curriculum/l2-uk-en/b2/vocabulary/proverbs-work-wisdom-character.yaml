items:
  - lemma: 'праця'
    ipa: '[ˈprɑt͡sʲɑ]'
    translation: 'work, labor'
    pos: 'noun'
    gender: 'f'
    notes: 'Used for effort or global concepts (сродна праця, плідна праця).'
  - lemma: 'мудрість'
    ipa: '[ˈmudʲrʲisʲtʲ]'
    translation: 'wisdom'
    pos: 'noun'
    gender: 'f'
    notes: 'Common in phrases like народна мудрість, перлина мудрості.'
  - lemma: 'характер'
    ipa: '[xɑˈrɑktɛr]'
    translation: 'character'
    pos: 'noun'
    gender: 'm'
    notes: 'To be strong-willed is мати характер.'
  - lemma: 'плід'
    ipa: '[plʲid]'
    translation: 'fruit, result'
    pos: 'noun'
    gender: 'm'
    notes: 'Metaphorical use: пожинати плоди (reap the fruits).'
  - lemma: 'поняття'
    ipa: '[pɔˈnʲɑtʲːɑ]'
    translation: 'concept'
    pos: 'noun'
    gender: 'n'
    notes: 'Standard academic usage: ключове поняття.'
  - lemma: 'дослідження'
    ipa: '[dɔˈsʲlʲid͡ʒɛnʲːɑ]'
    translation: 'research'
    pos: 'noun'
    gender: 'n'
    notes: 'Ґрунтовне дослідження (thorough research).'
  - lemma: 'аналіз'
    ipa: '[ɑˈnɑlʲiz]'
    translation: 'analysis'
    pos: 'noun'
    gender: 'm'
    notes: 'Проводити системний аналіз (conduct systemic analysis).'
  - lemma: 'синтез'
    ipa: '[ˈsɪntɛz]'
    translation: 'synthesis'
    pos: 'noun'
    gender: 'm'
    notes: 'Синтез знань (synthesis of knowledge).'
  - lemma: 'процес'
    ipa: '[prɔˈt͡sɛs]'
    translation: 'process'
    pos: 'noun'
    gender: 'm'
    notes: 'Робочий процес, творчий процес.'
  - lemma: 'сродний'
    ipa: '[srɔdnɪj]'
    translation: 'congenial, kindred'
    pos: 'adjective'
    notes: 'Historical philosophical term by H. Skovoroda.'
  - lemma: 'найманий'
    ipa: '[ˈnɑjmɑnɪj]'
    translation: 'hired'
    pos: 'adjective'
    notes: 'Наймана праця (wage labor).'
  - lemma: 'плідний'
    ipa: '[ˈplʲidnɪj]'
    translation: 'fruitful, productive'
    pos: 'adjective'
    notes: 'Плідна робота.'
  - lemma: 'загартовувати'
    ipa: '[zɑɦɑrˈtɔʋuʋɑtɪ]'
    translation: 'to temper, to build (character)'
    pos: 'verb'
    aspect: 'impf'
  - lemma: 'блудити'
    ipa: '[bluˈdɪtɪ]'
    translation: 'to wander, to get lost'
    pos: 'verb'
    aspect: 'impf'
  - lemma: 'відміряти'
    ipa: '[ʋʲidʲmʲirʲɑtɪ]'
    translation: 'to measure'
    pos: 'verb'
    aspect: 'pf'
  - lemma: 'горобець'
    ipa: '[ɦɔrɔˈbɛt͡sʲ]'
    translation: 'sparrow'
    pos: 'noun'
    gender: 'm'
    notes: 'Used in proverb: Слово — не горобець.'
  - lemma: 'бджола'
    ipa: '[bd͡ʒɔˈlɑ]'
    translation: 'bee'
    pos: 'noun'
    gender: 'f'
  - lemma: 'мед'
    ipa: '[mɛd]'
    translation: 'honey'
    pos: 'noun'
    gender: 'm'
  - lemma: 'золото'
    ipa: '[ˈzɔlɔtɔ]'
    translation: 'gold'
    pos: 'noun'
    gender: 'n'
    notes: 'Не все те золото, що блищить.'
  - lemma: 'клин'
    ipa: '[klɪn]'
    translation: 'wedge'
    pos: 'noun'
    gender: 'm'
  - lemma: 'сивина'
    ipa: '[sɪʋɪˈnɑ]'
    translation: 'gray hair'
    pos: 'noun'
    gender: 'f'
    notes: 'Сивина в бороду — біс у ребро.'
  - lemma: 'ребро'
    ipa: '[rɛˈbrɔ]'
    translation: 'rib'
    pos: 'noun'
    gender: 'n'
  - lemma: 'лестощі'
    ipa: '[ˈlɛstɔʃt͡ʃʲi]'
    translation: 'flattery'
    pos: 'noun'
    gender: 'pl'
  - lemma: 'русизм'
    ipa: '[ruˈsɪzm]'
    translation: 'Russianism'
    pos: 'noun'
    gender: 'm'
    notes: 'Linguistic borrowing from Russian.'
  - lemma: 'алгоритм'
    ipa: '[ɑlɦɔˈrɪtm]'
    translation: 'algorithm'
    pos: 'noun'
    gender: 'm'
  - lemma: 'старійшина'
    ipa: '[stɑˈrʲijʃɪnɑ]'
    translation: 'elder'
    pos: 'noun'
    gender: 'm'
  - lemma: 'покликання'
    ipa: '[pɔˈklɪkɑnʲːɑ]'
    translation: 'calling, vocation'
    pos: 'noun'
    gender: 'n'
  - lemma: 'висновок'
    ipa: '[ˈʋɪsnɔʋɔk]'
    translation: 'conclusion'
    pos: 'noun'
    gender: 'm'
  - lemma: 'спадковість'
    ipa: '[spɑˈdkɔʋʲisʲtʲ]'
    translation: 'heredity'
    pos: 'noun'
    gender: 'f'
  - lemma: 'калькування'
    ipa: '[kɑlʲkuˈʋɑnʲːɑ]'
    translation: 'calquing'
    pos: 'noun'
    gender: 'n'
    notes: 'Literal translation of idioms.'