items:
  - lemma: 'вдача'
    translation: 'disposition / character'
    pos: 'noun'
    gender: 'f'
    notes: 'ключове слово для опису внутрішньої особистості'
    example: 'Вона має надзвичайно лагідну вдачу.'
  - lemma: 'удача'
    translation: 'luck / success'
    pos: 'noun'
    gender: 'f'
    notes: 'часто плутають із словом вдача'
    example: 'Бажаю тобі удачі на завтрашньому тестуванні!'
  - lemma: 'натура'
    translation: 'nature / temperament'
    pos: 'noun'
    gender: 'f'
    notes: 'вказує на біологічний, інстинктивний аспект'
    example: 'Його мистецька натура вимагала нових вражень.'
  - lemma: 'розумний'
    translation: 'intelligent / smart'
    pos: 'adjective'
    notes: 'найбільш частотний, загальний вжиток'
    example: 'Він дуже розумний студент.'
  - lemma: 'мудрий'
    translation: 'wise'
    pos: 'adjective'
    notes: 'передбачає наявність життєвого досвіду'
    example: 'Дідусь завжди давав мені мудрі поради.'
  - lemma: 'кмітливий'
    translation: 'quick-witted / resourceful'
    pos: 'adjective'
    notes: 'практичний, винахідливий розум'
    example: 'Це був дуже кмітливий хід у переговорах.'
  - lemma: 'тямущий'
    translation: 'clever / brainy'
    pos: 'adjective'
    notes: 'розмовне слово, позначає того, хто швидко розуміє'
    example: 'Новий стажер виявився дуже тямущим хлопчиною.'
  - lemma: 'геніальний'
    translation: 'genius / brilliant'
    pos: 'adjective'
    notes: 'книжне слово, позначає винятковий талант'
    example: 'Це була справді геніальна ідея.'
  - lemma: 'добрий'
    translation: 'kind / good'
    pos: 'adjective'
    notes: 'базовий синонім для позитивної характеристики'
    example: 'У нього завжди було дуже добре серце.'
  - lemma: 'чуйний'
    translation: 'sensitive / responsive'
    pos: 'adjective'
    notes: 'робить акцент на емпатії'
    example: 'Медична сестра виявилася напрочуд чуйною.'
  - lemma: 'лагідний'
    translation: 'gentle / mild'
    pos: 'adjective'
    notes: 'позначає зовнішню м''якість у поведінці'
    example: 'Її лагідний голос діяв заспокійливо.'
  - lemma: 'щедрий'
    translation: 'generous'
    pos: 'adjective'
    notes: 'готовність віддавати більше, ніж вимагають'
    example: 'Викладач був завжди щедрий на похвалу.'
  - lemma: 'милосердний'
    translation: 'merciful'
    pos: 'adjective'
    notes: 'книжне слово, глибоке співчуття та допомога'
    example: 'Це був справді милосердний вчинок.'
  - lemma: 'характер'
    translation: 'character'
    pos: 'noun'
    gender: 'm'
    notes: 'описує сукупність психологічних рис'
    example: 'Він має дуже складний характер.'
  - lemma: 'особистість'
    translation: 'personality'
    pos: 'noun'
    gender: 'f'
    notes: 'використовується в психологічних описах'
    example: 'Кожна людина є унікальною особистістю.'
  - lemma: 'емпатія'
    translation: 'empathy'
    pos: 'noun'
    gender: 'f'
    notes: 'здатність співчувати іншим'
    example: 'Цій професії необхідна висока емпатія.'
  - lemma: 'співчуття'
    translation: 'sympathy / compassion'
    pos: 'noun'
    gender: 'n'
    example: 'Я висловлюю вам своє глибоке співчуття.'
  - lemma: 'співчувати'
    translation: 'to sympathize'
    pos: 'verb'
    aspect: 'imperfective'
    example: 'Я щиро співчуваю вашому горю.'
  - lemma: 'байдужий'
    translation: 'indifferent / apathetic'
    pos: 'adjective'
    notes: 'антонім до слова чуйний'
    example: 'Він залишився байдужим до нашої проблеми.'
  - lemma: 'винахідливий'
    translation: 'inventive / resourceful'
    pos: 'adjective'
    notes: 'дуже близький синонім до кмітливий'
    example: 'Цей хлопець надзвичайно винахідливий.'
  - lemma: 'здібний'
    translation: 'capable / able'
    pos: 'adjective'
    example: 'Це дуже здібний молодий спеціаліст.'
  - lemma: 'розсудливий'
    translation: 'prudent / sensible'
    pos: 'adjective'
    example: 'Вона прийняла дуже розсудливе рішення.'
  - lemma: 'поступливий'
    translation: 'compliant / yielding'
    pos: 'adjective'
    example: 'Він був людиною поступливою та спокійною.'
  - lemma: 'впертий'
    translation: 'stubborn / obstinate'
    pos: 'adjective'
    notes: 'негативна риса характеру'
    example: 'Через свій впертий характер він втратив друзів.'
  - lemma: 'розрада'
    translation: 'solace / comfort'
    pos: 'noun'
    gender: 'f'
    example: 'Вона знайшла розраду в читанні книг.'
  - lemma: 'досвід'
    translation: 'experience'
    pos: 'noun'
    gender: 'm'
    example: 'Для цієї роботи потрібен життєвий досвід.'
  - lemma: 'інтелект'
    translation: 'intellect'
    pos: 'noun'
    gender: 'm'
    example: 'Його інтелект не є емоційним.'
  - lemma: 'портрет'
    translation: 'portrait'
    pos: 'noun'
    gender: 'm'
    notes: 'часто використовується у виразі психологічний портрет'
    example: 'Автор створив глибокий психологічний портрет.'
  - lemma: 'прощення'
    translation: 'forgiveness'
    pos: 'noun'
    gender: 'n'
    example: 'Щедрість може проявлятися через щире прощення.'
  - lemma: 'збіг'
    translation: 'coincidence'
    pos: 'noun'
    gender: 'm'
    notes: 'збіг обставин (coincidence of circumstances)'
    example: 'Це був просто щасливий збіг обставин.'