items:
  - lemma: "великий"
    translation: "big / large"
    pos: "adj"
    notes: "neutral foundation word for size"
  - lemma: "величезний"
    translation: "enormous / huge"
    pos: "adj"
    notes: "emphatic variation of big"
  - lemma: "велетенський"
    translation: "gigantic / colossal"
    pos: "adj"
    notes: "physical hyper-scale, related to the word giant"
  - lemma: "грандіозний"
    translation: "grand / grandiose"
    pos: "adj"
    notes: "used in bookish/publicistic style for ambitious plans or events"
  - lemma: "малий"
    translation: "small"
    pos: "adj"
    notes: "neutral word for small size"
  - lemma: "маленький"
    translation: "little / small"
    pos: "adj"
    notes: "diminutive form of малий, adds affectionate tone"
  - lemma: "крихітний"
    translation: "tiny"
    pos: "adj"
    notes: "high expression, often used with social irony (e.g., tiny salary)"
  - lemma: "мізерний"
    translation: "minuscule / negligible"
    pos: "adj"
    notes: "negative connotation, implies critical lack of resources"
  - lemma: "здоровенний"
