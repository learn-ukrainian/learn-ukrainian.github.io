items:
  - lemma: 'активний'
    translation: 'active'
    pos: 'adjective'
    notes: 'граматична категорія форми дієприкметника'
  - lemma: 'дієприкметник'
    translation: 'participle'
    pos: 'noun'
    gender: 'm'
    notes: 'термін для позначення дієслівної форми з ознаками прикметника'
  - lemma: 'теперішній час'
    translation: 'present tense'
    pos: 'phrase'
    notes: 'час, у якому творяться форми на -учий/-ючий'
  - lemma: 'чинний'
    translation: 'valid, in force'
    pos: 'adjective'
    notes: 'чинне законодавство, чинний закон; ключовий маркер професійної мови'
  - lemma: 'діючий'
    translation: 'acting, functioning'
    pos: 'adjective'
    notes: 'діючий вулкан, діюча армія; часто помилково вживається як калька «valid»'
  - lemma: 'завідуючий'
    translation: 'head, manager'
    pos: 'noun'
    gender: 'm'
    notes: 'лексикалізований іменник (посада)'
  - lemma: 'керуючий'
    translation: 'manager, governor'
    pos: 'noun'
    gender: 'm'
    notes: 'офіційне звання'
  - lemma: 'наступний'
    translation: 'next'
    pos: 'adjective'
    notes: 'обов’язкова ідіоматична заміна помилкової кальки «слідуючий»'
  - lemma: 'наявний'
    translation: 'available, existing'
    pos: 'adjective'
    notes: 'природна заміна канцеляризму «існуючий»'
  - lemma: 'довкілля'
    translation: 'environment'
    pos: 'noun'
    gender: 'n'
    notes: 'природна заміна штучного терміну «оточуюче середовище»'
  - lemma: 'підрядне речення'
    translation: 'subordinate clause'
    pos: 'phrase'
    notes: 'конструкція «який + дієслово», що є стандартом для заміни дієприкметника'
  - lemma: 'книжний'
    translation: 'bookish, literary'
    pos: 'adjective'
    notes: 'характеристика високого стилю, де ці форми зустрічаються найчастіше'
  - lemma: 'архаїчний'
    translation: 'archaic'
    pos: 'adjective'
    notes: 'відчуття продуктивних активних дієприкметників у сучасному розмовному мовленні'
  - lemma: 'лексикалізований'
    translation: 'lexicalized'
    pos: 'adjective'
    notes: 'форма, що втратила значення дії і стала іменником або прикметником'
  - lemma: 'діюча особа'
    translation: 'acting person, character'
    pos: 'phrase'
    notes: 'театральний або літературний персонаж'
  - lemma: 'цілющий'
    translation: 'healing, medicinal'
    pos: 'adjective'
    notes: 'цілюща вода, цілющі трави; прикметник, що описує постійну якість'
  - lemma: 'родючий'
    translation: 'fertile'
    pos: 'adjective'
    notes: 'родюча земля, родючий ґрунт; прикметник, що став окремим словом'
  - lemma: 'канцеляризм'
    translation: 'bureaucratese'
    pos: 'noun'
    gender: 'm'
    notes: 'термін для опису надмірного вживання штучних дієприкметників'
  - lemma: 'штучний'
    translation: 'artificial'
    pos: 'adjective'
  - lemma: 'природний'
    translation: 'natural'
    pos: 'adjective'
  - lemma: 'ідіоматичний'
    translation: 'idiomatic'
    pos: 'adjective'
  - lemma: 'відносний займенник'
    translation: 'relative pronoun'
    pos: 'phrase'
  - lemma: 'законодавство'
    translation: 'legislation'
    pos: 'noun'
    gender: 'n'
  - lemma: 'повноваження'
    translation: 'authority, powers'
    pos: 'noun'
    gender: 'n'
  - lemma: 'суфікс'
    translation: 'suffix'
    pos: 'noun'
    gender: 'm'
  - lemma: 'дієвідміна'
    translation: 'conjugation'
    pos: 'noun'
    gender: 'f'
  - lemma: 'недоконаний вид'
    translation: 'imperfective aspect'
    pos: 'phrase'
  - lemma: 'завідувач'
    translation: 'head, manager (modern)'
    pos: 'noun'
    gender: 'm'
  - lemma: 'керівник'
    translation: 'manager, leader (modern)'
    pos: 'noun'
    gender: 'm'
  - lemma: 'мовознавець'
    translation: 'linguist'
    pos: 'noun'
    gender: 'm'