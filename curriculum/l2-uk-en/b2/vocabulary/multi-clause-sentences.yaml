  - lemma: 'єднальний зв''язок'
    translation: 'copulative connection'
    pos: 'phrase'
  - lemma: 'протиставний зв''язок'
    translation: 'adversative connection'
    pos: 'phrase'
  - lemma: 'розділовий зв''язок'
    translation: 'disjunctive connection'
    pos: 'phrase'
  - lemma: 'означальне речення'
    translation: 'attributive clause'
    pos: 'phrase'
  - lemma: 'з''ясувальне речення'
    translation: 'object clause'
    pos: 'phrase'
  - lemma: 'обставинне речення'
    translation: 'adverbial clause'
    pos: 'phrase'
  - lemma: 'милозвучність'
    translation: 'euphony'
    pos: 'noun'
    gender: 'f'
  - lemma: 'русизм'
    translation: 'Russianism'
    pos: 'noun'
