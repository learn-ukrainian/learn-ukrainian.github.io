items:
  - lemma: 'складносурядне речення'
    translation: 'compound sentence'
    pos: 'phrase'
    notes: 'сполучниковий зв''язок між рівноправними частинами'
  - lemma: 'складнопідрядне речення'
    translation: 'complex sentence'
    pos: 'phrase'
    notes: 'ієрархічний зв''язок (головне та підрядне)'
  - lemma: 'підрядне речення'
    translation: 'subordinate clause'
    pos: 'phrase'
    notes: 'залежна частина складнопідрядного речення'
  - lemma: 'головне речення'
    translation: 'main clause'
    pos: 'phrase'
    notes: 'частина, від якої ставиться питання до підрядної'
  - lemma: 'сполучник'
    translation: 'conjunction'
    pos: 'noun'
    gender: 'm'
    notes: 'і, та, а, але, проте'
  - lemma: 'сполучне слово'
    translation: 'relative word'
    pos: 'phrase'
    notes: 'що, щоб, як, який, котрий'
  - lemma: 'послідовне підпорядкування'
    translation: 'sequential subordination'
    pos: 'phrase'
    notes: 'ланцюжкова залежність частин'
  - lemma: 'однорідне підпорядкування'
    translation: 'homogeneous subordination'
    pos: 'phrase'
    notes: 'декілька підрядних одного типу до одного слова'
  - lemma: 'пунктуація'
    translation: 'punctuation'
    pos: 'noun'
    gender: 'f'
    notes: 'система розділових знаків'
  - lemma: 'кома'
    translation: 'comma'
    pos: 'noun'
    gender: 'f'
    notes: 'основний розділовий знак у багатоскладних реченнях'
  - lemma: 'вкладене речення'
    translation: 'embedded clause'
    pos: 'phrase'
    notes: 'підрядне речення всередині іншої частини'
  - lemma: 'синтаксис'
    translation: 'syntax'
    pos: 'noun'
    gender: 'm'
    notes: 'розділ мовознавства, що вивчає структуру речень'
  - lemma: 'проте'
    translation: 'however'
    pos: 'conjunction'
    notes: 'для вираження формального або літературного контрасту'
  - lemma: 'оскільки'
    translation: 'since / as'
    pos: 'conjunction'
    notes: 'нормативна альтернатива калькованому «так як»'
  - lemma: 'дарма що'
    translation: 'albeit / even though'
    pos: 'conjunction'
    notes: 'експресивний сполучник допусту для художнього стилю'
  - lemma: 'який'
    translation: 'which'
    pos: 'pronoun'
    notes: 'домінантне сполучне слово для означальних підрядних частин'
  - lemma: 'котрий'
    translation: 'which / who'
    pos: 'pronoun'
    notes: 'для вибору з-поміж об''єктів або в часових конструкціях'
  - lemma: 'залежно від'
    translation: 'depending on'
    pos: 'preposition'
    notes: 'правильна конструкція замість кальки «дивлячись на»'
  - lemma: 'плинність'
