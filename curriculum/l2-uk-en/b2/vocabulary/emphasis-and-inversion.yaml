items:
  - lemma: "емфаза"
    translation: "emphasis"
    pos: "noun"
    gender: "f"
    notes: "Логічна або емоційна емфаза; академічний та стилістичний термін."
  - lemma: "інверсія"
    translation: "inversion"
    pos: "noun"
    gender: "f"
    notes: "Непрямий порядок слів (наприклад, поетична інверсія)."
  - lemma: "порядок слів"
    translation: "word order"
    pos: "noun"
    gender: "m"
    notes: "Основа синтаксису; може бути прямим або непрямим."
  - lemma: "тема"
    translation: "theme / topic"
    pos: "noun"
    gender: "f"
    notes: "Тема повідомлення, відома інформація; зазвичай початок нейтрального речення."
  - lemma: "рема"
    translation: "rheme / comment"
    pos: "noun"
    gender: "f"
    notes: "Нова інформація, ядро речення; зазвичай кінець нейтрального речення."
  - lemma: "виділення"
    translation: "highlighting / emphasis"
    pos: "noun"
    gender: "n"
    notes: "Логічне виділення, акцентування уваги співрозмовника."
  - lemma: "саме"
    translation: "exactly / precisely"
    pos: "particle"
    notes: "Підсилювальна частка високої частотності (саме той, саме зараз)."
  - lemma: "якраз"
    translation: "just / exactly"
    pos: "particle"
    notes: "Розмовний та нейтральний синонім до частки 'саме'."
  - lemma: "навіть"
    translation: "even"
    pos: "particle"
    notes: "Частка екстремуму, що додає відтінок несподіванки."
  - lemma: "тільки"
    translation: "only"
    pos: "particle"
    notes: "Частка, що слугує для жорсткого обмеження або ексклюзивності."
  - lemma: "нейтральний"
    translation: "neutral"
    pos: "adjective"
    notes: "Нейтральний порядок слів; об'єктивний виклад фактів."
  - lemma: "наголос"
    translation: "stress / emphasis"
    pos: "noun"
    gender: "m"
    notes: "Логічний наголос, емфатичний наголос; фонетичний засіб виділення."
  - lemma: "парцеляція"
    translation: "parcellation"
    pos: "noun"
    gender: "f"
    notes: "Стилістичне розчленування речення на коротші частини для підсилення."
  - lemma: "прагматика"
    translation: "pragmatics"
    pos: "noun"
    gender: "f"
    notes: "Вивчення впливу контексту на значення висловлювання."
  - lemma: "контекст"
    translation: "context"
    pos: "noun"
    gender: "m"
    notes: "Контекстуальний вплив визначає актуальне членування та порядок слів."
  - lemma: "художній стиль"
    translation: "artistic style"
    pos: "noun"
    gender: "m"
    notes: "Сфера найширшого використання стилістичної інверсії."
  - lemma: "прямий порядок"
    translation: "direct order"
    pos: "noun"
    gender: "m"
    notes: "Підмет перед присудком, означення перед іменником."
  - lemma: "суб'єктивний"
    translation: "subjective"
    pos: "adjective"
    notes: "Емфатичний порядок часто кваліфікується як суб'єктивний."
  - lemma: "об'єктивний"
    translation: "objective"
    pos: "adjective"
    notes: "Нейтральний порядок використовується для об'єктивного викладу."
  - lemma: "узгодження"
    translation: "agreement"
    pos: "noun"
    gender: "n"
    notes: "Граматичний механізм, що забезпечує гнучкість синтаксису."
  - lemma: "керування"
    translation: "government"
    pos: "noun"
    gender: "n"
    notes: "Граматичний зв'язок між членами речення."
  - lemma: "логічний центр"
    translation: "logical center"
    pos: "noun"
    gender: "m"
    notes: "Фізична позиція слова у фразі визначає її логічний центр."
  - lemma: "комунікативний"
    translation: "communicative"
    pos: "adjective"
    notes: "Комунікативний майданчик, комунікативний намір мовця."
  - lemma: "фокус"
    translation: "focus"
    pos: "noun"
    gender: "m"
    notes: "Фокус уваги співрозмовника; виділення ключової ідеї."
  - lemma: "актуальне членування"
    translation: "topic-comment structure"
    pos: "noun"
    gender: "n"
    notes: "Розподіл інформації на Тему (дане) і Рему (нове)."
  - lemma: "частка"
    translation: "particle"
    pos: "noun"
    gender: "f"
    notes: "Підсилювальні частки (саме, якраз, навіть) є засобами виділення."
  - lemma: "ідентифікація"
    translation: "identification"
    pos: "noun"
    gender: "f"
    notes: "Конструкція ідентифікації 'це... що/який'."
  - lemma: "анафора"
    translation: "anaphora"
    pos: "noun"
    gender: "f"
    notes: "Лексична анафора; повторення слова на початку сусідніх речень."
  - lemma: "паралелізм"
    translation: "parallelism"
    pos: "noun"
    gender: "m"
    notes: "Синтаксичний паралелізм для створення сильного внутрішнього ритму."
  - lemma: "зв'язність"
    translation: "cohesion"
    pos: "noun"
    gender: "f"
    notes: "Логічна зв'язність тексту, яка забезпечується правильним порядком слів."