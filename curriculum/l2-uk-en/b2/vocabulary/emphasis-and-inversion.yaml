items:
  - lemma: "械屑褎邪蟹邪"
    ipa: '[蓻m藞f蓱z蓱]'
    translation: "emphasis"
    pos: "noun"
    gender: "f"
    notes: "袥芯谐褨褔薪邪 邪斜芯 械屑芯褑褨泄薪邪 械屑褎邪蟹邪; 邪泻邪写械屑褨褔薪懈泄 褌邪 褋褌懈谢褨褋褌懈褔薪懈泄 褌械褉屑褨薪."
  - lemma: "褨薪胁械褉褋褨褟"
    ipa: '[in藞蕥蓻rs什ij蓱]'
    translation: "inversion"
    pos: "noun"
    gender: "f"
    notes: "袧械锌褉褟屑懈泄 锌芯褉褟写芯泻 褋谢褨胁 (薪邪锌褉懈泻谢邪写, 锌芯械褌懈褔薪邪 褨薪胁械褉褋褨褟)."
  - lemma: "锌芯褉褟写芯泻 褋谢褨胁"
    ipa: '[p蓴藞r什蓱d蓴k s什l什iu摊]'
    translation: "word order"
    pos: "noun"
    gender: "m"
    notes: "袨褋薪芯胁邪 褋懈薪褌邪泻褋懈褋褍; 屑芯卸械 斜褍褌懈 锌褉褟屑懈屑 邪斜芯 薪械锌褉褟屑懈屑."
  - lemma: "褌械屑邪"
    ipa: '[藞t蓻m蓱]'
    translation: "theme / topic"
    pos: "noun"
    gender: "f"
    notes: "孝械屑邪 锌芯胁褨写芯屑谢械薪薪褟, 胁褨写芯屑邪 褨薪褎芯褉屑邪褑褨褟; 蟹邪蟹胁懈褔邪泄 锌芯褔邪褌芯泻 薪械泄褌褉邪谢褜薪芯谐芯 褉械褔械薪薪褟."
  - lemma: "褉械屑邪"
    ipa: '[藞r蓻m蓱]'
    translation: "rheme / comment"
    pos: "noun"
    gender: "f"
    notes: "袧芯胁邪 褨薪褎芯褉屑邪褑褨褟, 褟写褉芯 褉械褔械薪薪褟; 蟹邪蟹胁懈褔邪泄 泻褨薪械褑褜 薪械泄褌褉邪谢褜薪芯谐芯 褉械褔械薪薪褟."
  - lemma: "胁懈写褨谢械薪薪褟"
    ipa: '[藞蕥瑟d什il蓻n什藧蓱]'
    translation: "highlighting / emphasis"
    pos: "noun"
    gender: "n"
    notes: "袥芯谐褨褔薪械 胁懈写褨谢械薪薪褟, 邪泻褑械薪褌褍胁邪薪薪褟 褍胁邪谐懈 褋锌褨胁褉芯蟹屑芯胁薪懈泻邪."
  - lemma: "褋邪屑械"
    ipa: '[藞s蓱m蓻]'
    translation: "exactly / precisely"
    pos: "particle"
    notes: "袩褨写褋懈谢褞胁邪谢褜薪邪 褔邪褋褌泻邪 胁懈褋芯泻芯褩 褔邪褋褌芯褌薪芯褋褌褨 (褋邪屑械 褌芯泄, 褋邪屑械 蟹邪褉邪蟹)."
  - lemma: "褟泻褉邪蟹"
    ipa: '[j蓱藞kr蓱z]'
    translation: "just / exactly"
    pos: "particle"
    notes: "袪芯蟹屑芯胁薪懈泄 褌邪 薪械泄褌褉邪谢褜薪懈泄 褋懈薪芯薪褨屑 写芯 褔邪褋褌泻懈 '褋邪屑械'."
  - lemma: "薪邪胁褨褌褜"
    ipa: '[藞n蓱蕥什it什]'
    translation: "even"
    pos: "particle"
    notes: "效邪褋褌泻邪 械泻褋褌褉械屑褍屑褍, 褖芯 写芯写邪褦 胁褨写褌褨薪芯泻 薪械褋锌芯写褨胁邪薪泻懈."
  - lemma: "褌褨谢褜泻懈"
    ipa: '[藞t什il什k瑟]'
    translation: "only"
    pos: "particle"
    notes: "效邪褋褌泻邪, 褖芯 褋谢褍谐褍褦 写谢褟 卸芯褉褋褌泻芯谐芯 芯斜屑械卸械薪薪褟 邪斜芯 械泻褋泻谢褞蟹懈胁薪芯褋褌褨."
  - lemma: "薪械泄褌褉邪谢褜薪懈泄"
    ipa: '[n蓻j藞tr蓱l什n瑟j]'
    translation: "neutral"
    pos: "adjective"
    notes: "袧械泄褌褉邪谢褜薪懈泄 锌芯褉褟写芯泻 褋谢褨胁; 芯斜'褦泻褌懈胁薪懈泄 胁懈泻谢邪写 褎邪泻褌褨胁."
  - lemma: "薪邪谐芯谢芯褋"
    ipa: '[藞n蓱搔蓴l蓴s]'
    translation: "stress / emphasis"
    pos: "noun"
    gender: "m"
    notes: "袥芯谐褨褔薪懈泄 薪邪谐芯谢芯褋, 械屑褎邪褌懈褔薪懈泄 薪邪谐芯谢芯褋; 褎芯薪械褌懈褔薪懈泄 蟹邪褋褨斜 胁懈写褨谢械薪薪褟."
  - lemma: "锌邪褉褑械谢褟褑褨褟"
    ipa: '[p蓱rt汀s蓻藞l什蓱t汀s什ij蓱]'
    translation: "parcellation"
    pos: "noun"
    gender: "f"
    notes: "小褌懈谢褨褋褌懈褔薪械 褉芯蟹褔谢械薪褍胁邪薪薪褟 褉械褔械薪薪褟 薪邪 泻芯褉芯褌褕褨 褔邪褋褌懈薪懈 写谢褟 锌褨写褋懈谢械薪薪褟."
  - lemma: "锌褉邪谐屑邪褌懈泻邪"
    ipa: '[pr蓱藞搔m蓱t瑟k蓱]'
    translation: "pragmatics"
    pos: "noun"
    gender: "f"
    notes: "袙懈胁褔械薪薪褟 胁锌谢懈胁褍 泻芯薪褌械泻褋褌褍 薪邪 蟹薪邪褔械薪薪褟 胁懈褋谢芯胁谢褞胁邪薪薪褟."
  - lemma: "泻芯薪褌械泻褋褌"
    ipa: '[k蓴n藞t蓻kst]'
    translation: "context"
    pos: "noun"
    gender: "m"
    notes: "袣芯薪褌械泻褋褌褍邪谢褜薪懈泄 胁锌谢懈胁 胁懈蟹薪邪褔邪褦 邪泻褌褍邪谢褜薪械 褔谢械薪褍胁邪薪薪褟 褌邪 锌芯褉褟写芯泻 褋谢褨胁."
  - lemma: "褏褍写芯卸薪褨泄 褋褌懈谢褜"
    ipa: '[xu藞d蓴蕭n什ij st瑟l什]'
    translation: "artistic style"
    pos: "noun"
    gender: "m"
    notes: "小褎械褉邪 薪邪泄褕懈褉褕芯谐芯 胁懈泻芯褉懈褋褌邪薪薪褟 褋褌懈谢褨褋褌懈褔薪芯褩 褨薪胁械褉褋褨褩."
  - lemma: "锌褉褟屑懈泄 锌芯褉褟写芯泻"
    ipa: '[pr什蓱藞m瑟j p蓴藞r什蓱d蓴k]'
    translation: "direct order"
    pos: "noun"
    gender: "m"
    notes: "袩褨写屑械褌 锌械褉械写 锌褉懈褋褍写泻芯屑, 芯蟹薪邪褔械薪薪褟 锌械褉械写 褨屑械薪薪懈泻芯屑."
  - lemma: "褋褍斜'褦泻褌懈胁薪懈泄"
    ipa: '[subj蓻藞kt瑟u摊n瑟j]'
    translation: "subjective"
    pos: "adjective"
    notes: "袝屑褎邪褌懈褔薪懈泄 锌芯褉褟写芯泻 褔邪褋褌芯 泻胁邪谢褨褎褨泻褍褦褌褜褋褟 褟泻 褋褍斜'褦泻褌懈胁薪懈泄."
  - lemma: "芯斜'褦泻褌懈胁薪懈泄"
    ipa: '[蓴bj蓻藞kt瑟u摊n瑟j]'
    translation: "objective"
    pos: "adjective"
    notes: "袧械泄褌褉邪谢褜薪懈泄 锌芯褉褟写芯泻 胁懈泻芯褉懈褋褌芯胁褍褦褌褜褋褟 写谢褟 芯斜'褦泻褌懈胁薪芯谐芯 胁懈泻谢邪写褍."
  - lemma: "褍蟹谐芯写卸械薪薪褟"
    ipa: '[u藞z搔蓴d汀蕭蓻n什藧蓱]'
    translation: "agreement"
    pos: "noun"
    gender: "n"
    notes: "袚褉邪屑邪褌懈褔薪懈泄 屑械褏邪薪褨蟹屑, 褖芯 蟹邪斜械蟹锌械褔褍褦 谐薪褍褔泻褨褋褌褜 褋懈薪褌邪泻褋懈褋褍."
  - lemma: "泻械褉褍胁邪薪薪褟"
    ipa: '[k蓻ru藞蕥蓱n什藧蓱]'
    translation: "government"
    pos: "noun"
    gender: "n"
    notes: "袚褉邪屑邪褌懈褔薪懈泄 蟹胁'褟蟹芯泻 屑褨卸 褔谢械薪邪屑懈 褉械褔械薪薪褟."
  - lemma: "谢芯谐褨褔薪懈泄 褑械薪褌褉"
    ipa: '[l蓴藞搔什it汀蕛n瑟j t汀s蓻ntr]'
    translation: "logical center"
    pos: "noun"
    gender: "m"
    notes: "肖褨蟹懈褔薪邪 锌芯蟹懈褑褨褟 褋谢芯胁邪 褍 褎褉邪蟹褨 胁懈蟹薪邪褔邪褦 褩褩 谢芯谐褨褔薪懈泄 褑械薪褌褉."
  - lemma: "泻芯屑褍薪褨泻邪褌懈胁薪懈泄"
    ipa: '[k蓴mun什ik蓱藞t瑟u摊n瑟j]'
    translation: "communicative"
    pos: "adjective"
    notes: "袣芯屑褍薪褨泻邪褌懈胁薪懈泄 屑邪泄写邪薪褔懈泻, 泻芯屑褍薪褨泻邪褌懈胁薪懈泄 薪邪屑褨褉 屑芯胁褑褟."
  - lemma: "褎芯泻褍褋"
    ipa: '[藞f蓴kus]'
    translation: "focus"
    pos: "noun"
    gender: "m"
    notes: "肖芯泻褍褋 褍胁邪谐懈 褋锌褨胁褉芯蟹屑芯胁薪懈泻邪; 胁懈写褨谢械薪薪褟 泻谢褞褔芯胁芯褩 褨写械褩."
  - lemma: "邪泻褌褍邪谢褜薪械 褔谢械薪褍胁邪薪薪褟"
    ipa: '[蓱ktu藞蓱l什n蓻 t汀蕛l蓻nu藞蕥蓱n什藧蓱]'
    translation: "topic-comment structure"
    pos: "noun"
    gender: "n"
    notes: "袪芯蟹锌芯写褨谢 褨薪褎芯褉屑邪褑褨褩 薪邪 孝械屑褍 (写邪薪械) 褨 袪械屑褍 (薪芯胁械)."
  - lemma: "褔邪褋褌泻邪"
    ipa: '[藞t汀蕛蓱stk蓱]'
    translation: "particle"
    pos: "noun"
    gender: "f"
    notes: "袩褨写褋懈谢褞胁邪谢褜薪褨 褔邪褋褌泻懈 (褋邪屑械, 褟泻褉邪蟹, 薪邪胁褨褌褜) 褦 蟹邪褋芯斜邪屑懈 胁懈写褨谢械薪薪褟."
  - lemma: "褨写械薪褌懈褎褨泻邪褑褨褟"
    ipa: '[id蓻nt瑟f什i藞k蓱t汀s什ij蓱]'
    translation: "identification"
    pos: "noun"
    gender: "f"
    notes: "袣芯薪褋褌褉褍泻褑褨褟 褨写械薪褌懈褎褨泻邪褑褨褩 '褑械... 褖芯/褟泻懈泄'."
  - lemma: "邪薪邪褎芯褉邪"
    ipa: '[蓱藞n蓱f蓴r蓱]'
    translation: "anaphora"
    pos: "noun"
    gender: "f"
    notes: "袥械泻褋懈褔薪邪 邪薪邪褎芯褉邪; 锌芯胁褌芯褉械薪薪褟 褋谢芯胁邪 薪邪 锌芯褔邪褌泻褍 褋褍褋褨写薪褨褏 褉械褔械薪褜."
  - lemma: "锌邪褉邪谢械谢褨蟹屑"
    ipa: '[p蓱r蓱l蓻藞l什izm]'
    translation: "parallelism"
    pos: "noun"
    gender: "m"
    notes: "小懈薪褌邪泻褋懈褔薪懈泄 锌邪褉邪谢械谢褨蟹屑 写谢褟 褋褌胁芯褉械薪薪褟 褋懈谢褜薪芯谐芯 胁薪褍褌褉褨褕薪褜芯谐芯 褉懈褌屑褍."
  - lemma: "蟹胁'褟蟹薪褨褋褌褜"
    ipa: '[藞z蕥j蓱z什n什is什t什]'
    translation: "cohesion"
    pos: "noun"
    gender: "f"
    notes: "袥芯谐褨褔薪邪 蟹胁'褟蟹薪褨褋褌褜 褌械泻褋褌褍, 褟泻邪 蟹邪斜械蟹锌械褔褍褦褌褜褋褟 锌褉邪胁懈谢褜薪懈屑 锌芯褉褟写泻芯屑 褋谢褨胁."