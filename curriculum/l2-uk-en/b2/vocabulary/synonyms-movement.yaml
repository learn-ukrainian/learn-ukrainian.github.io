items:
  - lemma: 'йти'
    translation: 'to go / to walk (linear)'
    pos: 'verb'
    aspect: 'imperfective'
    notes: 'used for unidirectional, continuous motion happening now'
  - lemma: 'ходити'
    translation: 'to go / to walk (habitual)'
    pos: 'verb'
    aspect: 'imperfective'
    notes: 'used for multidirectional, habitual, or round-trip motion'
  - lemma: 'синонім'
    translation: 'synonym'
    pos: 'noun'
    gender: 'm'
  - lemma: 'значення'
    translation: 'meaning'
    pos: 'noun'
    gender: 'n'
  - lemma: 'контекст'
    translation: 'context'
    pos: 'noun'
    gender: 'm'
  - lemma: 'крокувати'
    translation: 'to stride / to march'
    pos: 'verb'
    aspect: 'imperfective'
    notes: 'conveys a cheerful, confident, or ceremonial manner of walking'
  - lemma: 'брести'
    translation: 'to trudge / to wade'
    pos: 'verb'
    aspect: 'imperfective'
    notes: 'conveys slow, exhausted movement overcoming physical resistance'
  - lemma: 'тупати'
    translation: 'to stomp / to clatter / to patter'
    pos: 'verb'
    aspect: 'imperfective'
    notes: 'emphasizes the sound of footsteps'
  - lemma: 'мчати'
    translation: 'to race / to speed'
    pos: 'verb'
    aspect: 'imperfective'
    notes: 'implies high speed and determination'
  - lemma: 'нестися'
    translation: 'to dash / to hurtle'
    pos: 'verb'
    aspect: 'imperfective'
    notes: 'implies extreme speed, loss of control, or chaotic movement'
  - lemma: 'чимчикувати'
    translation: 'to trudge steadily / to shuffle'
    pos: 'verb'
    aspect: 'imperfective'
    notes: 'often used humorously for a long, unhurried walk'
  - lemma: 'блукати'
    translation: 'to wander / to roam'
    pos: 'verb'
    aspect: 'imperfective'
    notes: 'moving without a clear destination, often feeling lost'
  - lemma: 'бігти'
    translation: 'to run (linear)'
    pos: 'verb'
    aspect: 'imperfective'
  - lemma: 'бігати'
    translation: 'to run (habitual)'
    pos: 'verb'
    aspect: 'imperfective'