  - type: essay-response
    id: complaint-response-writing
    title: "Напиши рекламацію або сервісну відповідь"
    instruction: "Напиши 150-180 слів українською."
    prompt: >
      Обери одну роль: покупець пише рекламацію щодо бракованого товару або сервіс відповідає на звернення клієнта. У тексті використай щонайменше п'ять нормативних моделей: оплатити товар, дякувати продавцеві, потребувати допомоги, відповідно до умов, завдати збитків, нехтувати правилами, опанувати систему.
    min_words: 150
    model_answer: >
      Я замовив настільну лампу й оплатив товар карткою після підтвердження замовлення. Під час отримання пакування було цілим, однак удома виявилося, що вимикач не працює, а в коробці немає гарантійного талона. Дякую консультантці за швидку відповідь у чаті, проте мені потрібне письмове пояснення подальших дій. Товар потребує перевірки в сервісному центрі, тому прошу повідомити, чи можливий обмін або повернення коштів відповідно до умов магазину. Фото дефекту, номер замовлення й копію чека додаю до звернення. Прошу не залишати це повідомлення без відповіді, бо затримка може завдати мені додаткових витрат на повторну доставку. Якщо для розгляду потрібна заява за окремою формою, надішліть її, будь ласка, у відповідь на це повідомлення.
    rubric:
      - criteria: "Граматичне керування"
        description: "Текст правильно використовує ключові моделі без калькованих форм."
        points: 3
      - criteria: "Сервісна структура"
        description: "Є факт, документ або доказ, проблема й очікуване рішення."
        points: 3
      - criteria: "Регістр і тон"
        description: "Тон ввічливий, доказовий і відповідає жанру рекламації або відповіді."
        points: 2
      - criteria: "B2-синтаксис"
        description: "Є складні речення з умовою, причиною, наслідком або уточненням."
        points: 2
