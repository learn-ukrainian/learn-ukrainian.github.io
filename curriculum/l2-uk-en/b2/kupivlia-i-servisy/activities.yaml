version: '1.0'
module: kupivlia-i-servisy
level: b2
inline:
  - type: select
    title: "Канал купівлі і точне питання"
    instruction: "Виберіть формули, які відповідають ситуації та не змішують відповідальність сторін."
    items:
      - question: "Ви купуєте товар на маркетплейсі й хочете знати, хто відповідає за гарантію. Які формули доречні?"
        min_correct: 2
        options:
          - text: "Підтвердьте, будь ласка, хто є продавцем товару."
            correct: true
          - text: "Прошу уточнити, хто здійснює гарантійне обслуговування."
            correct: true
          - text: "Чому ви всі приховуєте гарантію?"
            correct: false
          - text: "Мені все одно, просто зробіть дешевше."
            correct: false
        explanation: "Питання мають назвати продавця й гарантійну відповідальність без звинувачення."
      - question: "Яке речення найкраще уточнює кінцеву ціну онлайн-замовлення?"
        options:
          - text: "Підтвердьте, будь ласка, кінцеву суму до оплати разом із доставкою."
            correct: true
          - text: "А точно не обдурите з ціною?"
            correct: false
          - text: "Ціна нормальна?"
            correct: false
          - text: "Дайте мені хоч якусь знижку."
            correct: false
        explanation: "Сильна формула називає саме параметр: кінцеву суму з доставкою."
      - question: "Які деталі роблять відгук корисним для іншого покупця?"
        min_correct: 3
        options:
          - text: "сценарій використання"
            correct: true
          - text: "строк користування"
            correct: true
          - text: "конкретна характеристика товару"
            correct: true
          - text: "лише слово супер"
            correct: false
          - text: "лише образа продавця"
            correct: false
        explanation: "Корисний відгук дає перевірні деталі, а не тільки емоцію."
      - question: "Що варто зберегти після онлайн-покупки?"
        min_correct: 3
        options:
          - text: "номер замовлення"
            correct: true
          - text: "чек або електронну квитанцію"
            correct: true
          - text: "письмові умови повернення"
            correct: true
          - text: "лише усну обіцянку консультанта"
            correct: false
        explanation: "Письмові підтвердження допомагають відтворити домовленість."
      - question: "Яке речення доказово порівнює два товари?"
        options:
          - text: "Перша модель дешевша, але друга має довший гарантійний строк."
            correct: true
          - text: "Перша нормальна, друга якась дивна."
            correct: false
          - text: "Усі кажуть, що друга краща."
            correct: false
          - text: "Беріть ту, яка гарніша."
            correct: false
        explanation: "Доказове порівняння називає критерій."
      - question: "Яке питання найкраще перевіряє комплектацію?"
        options:
          - text: "Чи входить зарядний кабель до комплекту?"
            correct: true
          - text: "Комплект нормальний?"
            correct: false
          - text: "Там усе є, правда?"
            correct: false
          - text: "Дайте щось додаткове."
            correct: false
        explanation: "Питання має назвати конкретний елемент комплекту."
      - question: "Що найкраще уточнює умови акції?"
        options:
          - text: "Чи видно суму знижки в чеку після оплати?"
            correct: true
          - text: "Акція справжня?"
            correct: false
          - text: "Можна ще дешевше?"
            correct: false
          - text: "Чому так дорого?"
            correct: false
        explanation: "Уточнюємо перевірний наслідок акції."
      - question: "Яка фраза правильно адресує питання маркетплейсу?"
        options:
          - text: "Прошу повідомити, хто розглядає звернення щодо продавця."
            correct: true
          - text: "Ви всі відповідаєте за все."
            correct: false
          - text: "Ніхто не хоче працювати."
            correct: false
          - text: "Поверніть гроші без перевірки."
            correct: false
        explanation: "Маркетплейс часто координує відповідальність різних сторін."
  - type: fill-in
    title: "Сервісна домовленість"
    instruction: "Заповніть пропуски словами, які перетворюють нечітку домовленість на перевірну."
    items:
      - sentence: "Прошу назвати орієнтовну ____ ремонту до початку робіт."
        answer: "вартість"
        options: ["вартість", "настрій", "звичку", "похвалу"]
        explanation: "У сервісі треба погодити суму або діапазон."
      - sentence: "Чи входить ____ на замінену деталь у вартість ремонту?"
        answer: "гарантія"
        options: ["гарантія", "реклама", "черга", "скарга"]
        explanation: "Клієнт уточнює межу відповідальності після ремонту."
      - sentence: "Підтвердьте, будь ласка, ____ виконання робіт."
        answer: "строк"
        options: ["строк", "смак", "колір", "відгук"]
        explanation: "Без строку домовленість лишається нечіткою."
      - sentence: "Прошу погодити додаткові витрати ____ заміни деталі."
        answer: "до"
        options: ["до", "після", "замість", "попри"]
        explanation: "Додаткові витрати треба погоджувати до виконання."
      - sentence: "Надішліть умови ремонту ____ або на електронну пошту."
        answer: "письмово"
        options: ["письмово", "випадково", "мовчки", "неточно"]
        explanation: "Письмове підтвердження зменшує ризик непорозуміння."
      - sentence: "Прошу додати до квитанції ____ замовлення."
        answer: "номер"
        options: ["номер", "настрій", "смак", "знижку"]
        explanation: "Номер допомагає відстежувати звернення."
      - sentence: "До початку робіт прошу надати ____."
        answer: "кошторис"
        options: ["кошторис", "комплімент", "відгук", "слоган"]
        explanation: "Кошторис фіксує очікувану вартість."
      - sentence: "Прошу уточнити, чи покриває гарантія ____ деталь."
        answer: "замінену"
        options: ["замінену", "випадкову", "зелену", "усну"]
        explanation: "Гарантія часто стосується конкретної заміненої деталі."
      - sentence: "Після ремонту прошу надати акт ____ робіт."
        answer: "виконаних"
        options: ["виконаних", "майбутніх", "усних", "прихованих"]
        explanation: "Акт виконаних робіт фіксує результат послуги."
      - sentence: "Якщо сума зміниться, прошу ____ її зі мною до ремонту."
        answer: "погодити"
        options: ["погодити", "приховати", "похвалити", "забути"]
        explanation: "Додаткові витрати мають бути погоджені."
  - type: error-correction
    title: "Скарга без зайвої агресії"
    instruction: "Виправте речення так, щоб воно стало точним, ввічливим і доказовим."
    items:
      - sentence: "Ви мене обдурили, бо товар не такий."
        error: "обдурили"
        answer: "Товар не відповідає опису на сторінці замовлення."
        options:
          - "Товар не відповідає опису на сторінці замовлення."
          - "Ви точно все зіпсували."
          - "Товар якийсь не такий."
          - "Я просто незадоволений усім."
        explanation: "Краще назвати невідповідність, а не бездоказове звинувачення."
      - sentence: "Вирішіть мою проблему швидко."
        error: "швидко"
        answer: "Прошу повідомити порядок розгляду звернення і орієнтовний строк відповіді."
        options:
          - "Прошу повідомити порядок розгляду звернення і орієнтовний строк відповіді."
          - "Прошу швидше, бо мені треба."
          - "Дайте вже якусь відповідь."
          - "Не хочу нічого пояснювати."
        explanation: "Скарга має просити процедуру й строк."
      - sentence: "Ваш майстер нічого нормально не зробив."
        error: "нічого нормально"
        answer: "Послугу виконано не в повному обсязі: у заявці погоджено очищення фільтра, але в акті цього не зазначено."
        options:
          - "Послугу виконано не в повному обсязі: у заявці погоджено очищення фільтра, але в акті цього не зазначено."
          - "Ваш майстер працює жахливо."
          - "Майстер дивний, і мені це не подобається."
          - "Нехай майстер сам здогадається."
        explanation: "Описуйте конкретний розрив між домовленістю і результатом."
      - sentence: "Компенсуйте мені нерви."
        error: "нерви"
        answer: "Прошу компенсувати додаткову доставку в сумі 120 гривень; квитанцію додаю."
        options:
          - "Прошу компенсувати додаткову доставку в сумі 120 гривень; квитанцію додаю."
          - "Прошу компенсувати все, що я пережив."
          - "Компенсуйте хоч щось."
          - "Я хочу будь-який бонус."
        explanation: "Компенсація має спиратися на перевірну суму або умову."
      - sentence: "Я знаю свої права, тому щось зробіть."
        error: "щось зробіть"
        answer: "Прошу повідомити порядок повернення товару й коштів."
        options:
          - "Прошу повідомити порядок повернення товару й коштів."
          - "Тому негайно дійте."
          - "Тому ви самі знаєте, що треба."
          - "Тому зробіть усе без уточнень."
        explanation: "Називайте конкретну дію, а не загальний тиск."
      - sentence: "Гарантія у вас якась мутна."
        error: "мутна"
        answer: "Прошу уточнити, на які випадки поширюється гарантія."
        options:
          - "Прошу уточнити, на які випадки поширюється гарантія."
          - "Гарантія у вас якась мутна."
          - "Ви самі не розумієте гарантію."
          - "Напишіть хоч щось."
        explanation: "Розмовну оцінку треба замінити точним питанням."
      - sentence: "Ваш кур'єр усе зіпсував."
        error: "усе зіпсував"
        answer: "Посилку доставлено з пошкодженим пакованням."
        options:
          - "Посилку доставлено з пошкодженим пакованням."
          - "Ваш кур'єр усе зіпсував."
          - "Доставка просто погана."
          - "Мені це не подобається."
        explanation: "Факт пошкодження перевірний."
      - sentence: "Акція виглядає підозріло."
        error: "підозріло"
        answer: "Прошу уточнити, чи застосовується знижка до кінцевої суми в чеку."
        options:
          - "Прошу уточнити, чи застосовується знижка до кінцевої суми в чеку."
          - "Акція виглядає підозріло."
          - "Чому у вас дивні акції?"
          - "Я не довіряю цій ціні."
        explanation: "Нейтральне питання називає перевірний механізм знижки."
  - type: match-up
    title: "Документ, умова, дія"
    instruction: "Поєднайте слово або формулу з найточнішою функцією."
    pairs:
      - left: "чек"
        right: "підтверджує оплату або купівлю"
      - left: "гарантійний талон"
        right: "пояснює строк і межі гарантії"
      - left: "акт виконаних робіт"
        right: "фіксує, що саме зроблено в послузі"
      - left: "на підставі"
        right: "вводить доказ або документ для рішення"
      - left: "відповідно до"
        right: "пов'язує дію з умовою або договором"
      - left: "рекламація"
        right: "формальне звернення щодо невідповідності або дефекту"
      - left: "компенсація"
        right: "відшкодування підтверджених витрат або збитків"
      - left: "невідповідність"
        right: "розрив між описом, умовою або очікуваним результатом і фактом"
      - left: "кошторис"
        right: "орієнтовна або погоджена вартість робіт"
      - left: "письмове підтвердження"
        right: "фіксує умову, до якої можна повернутися"
  - type: group-sort
    title: "Жанр і короткий синтаксис"
    instruction: "Розподіліть фрази за жанром, у якому вони звучать найприродніше."
    groups:
      - name: "Рекламний або публіцистичний короткий синтаксис"
        items:
          - "Менше пластику. Більше змісту."
          - "Ремонт за два дні. Без черг."
          - "Замовили вчора - отримали сьогодні."
      - name: "Офіційна рекламація"
        items:
          - "У комплекті відсутня інструкція, зазначена в описі товару."
          - "Прошу повідомити порядок повернення коштів."
          - "Звернення подано в межах гарантійного строку."
      - name: "Доказовий відгук"
        items:
          - "Доставили швидко, однак інструкції в комплекті не було."
          - "Підтримка відповіла за десять хвилин."
          - "Після місяця користування батарея тримає два дні."
      - name: "Нечітко або ризиковано"
        items:
          - "Зробіть щось із цим."
          - "Усе жахливо."
          - "Гарантія нормальна?"
workbook:
  - type: reading
    id: wb-reading-return-request
    title: "Читання: повернення онлайн-замовлення"
    instruction: "Прочитайте листування й визначте, де клієнт формулює факт, доказ, прохання і строк."
    source: "Навчальний текст для модуля B2."
    text: >
      Клієнт написав до підтримки: "Замовлення №4821 отримано 14 червня. У характеристиках товару
      зазначено металевий корпус, однак отриманий товар має пластиковий корпус. Додаю фото товару,
      паковання, чека й скриншот опису на сайті. Прошу повідомити порядок повернення товару й коштів
      або оформити обмін на модель, що відповідає опису. Також прошу уточнити орієнтовний строк
      розгляду звернення." Підтримка відповіла, що звернення передано на перевірку продавцю.
    tasks:
      - "Випишіть факт проблеми."
      - "Назвіть докази, які клієнт додає."
      - "Знайдіть прохання клієнта."
      - "Поясніть, чому тон листа твердий, але не агресивний."
      - "Перепишіть відповідь підтримки так, щоб у ній був строк."
  - type: select
    title: "Права споживача: що просити?"
    instruction: "Виберіть доречну дію для кожної ситуації."
    items:
      - question: "Доставлено інший розмір, ніж у замовленні. Що просити?"
        min_correct: 2
        options:
          - text: "обмін на правильний розмір"
            correct: true
          - text: "повідомити порядок повернення коштів"
            correct: true
          - text: "компенсацію без пояснення суми"
            correct: false
          - text: "усунути дефект ремонтом"
            correct: false
        explanation: "Проблема стосується невідповідності замовленню, не ремонту."
      - question: "Ремонт затримується, але сервіс не називає дату. Що просити?"
        options:
          - text: "письмово повідомити новий строк виконання"
            correct: true
          - text: "зробити якось швидше"
            correct: false
          - text: "дати будь-яку знижку"
            correct: false
          - text: "забути про квитанцію"
            correct: false
        explanation: "Ключова дія - отримати строк і підтвердження."
      - question: "У чеку немає позиції, за яку знято кошти. Що просити?"
        options:
          - text: "деталізувати оплату або надати виправлений чек"
            correct: true
          - text: "прибрати всі документи"
            correct: false
          - text: "пояснити усно без підтвердження"
            correct: false
          - text: "залишити все як є"
            correct: false
        explanation: "Проблема стосується доказу оплати."
      - question: "Посилка пошкоджена під час доставки. Яку дію просити у перевізника?"
        options:
          - text: "скласти акт огляду або пошкодження"
            correct: true
          - text: "змінити опис товару на сайті"
            correct: false
          - text: "видати гарантійний талон"
            correct: false
          - text: "написати рекламний слоган"
            correct: false
        explanation: "Перевізник фіксує стан посилки."
      - question: "Сервіс просить оплатити додаткову деталь. Що варто зробити до ремонту?"
        options:
          - text: "попросити кошторис і письмове погодження"
            correct: true
          - text: "погодитися без суми"
            correct: false
          - text: "написати лише негативний відгук"
            correct: false
          - text: "відмовитися від усіх документів"
            correct: false
        explanation: "Додаткові витрати треба погодити до роботи."
      - question: "Товар справний, але не підійшов за розміром. Яка назва проблеми точніша?"
        options:
          - text: "товар не підійшов за розміром"
            correct: true
          - text: "товар бракований"
            correct: false
          - text: "товар небезпечний"
            correct: false
          - text: "послугу виконано неякісно"
            correct: false
        explanation: "Не треба називати справний товар бракованим."
      - question: "У договорі незрозуміла умова про додаткові роботи. Що просити?"
        options:
          - text: "письмове роз'яснення, які роботи є додатковими"
            correct: true
          - text: "усно пообіцяти, що все буде добре"
            correct: false
          - text: "прибрати договір"
            correct: false
          - text: "не читати умову"
            correct: false
        explanation: "Незрозумілу умову треба роз'яснити письмово."
      - question: "Позитивний відгук про сервіс має містити:"
        options:
