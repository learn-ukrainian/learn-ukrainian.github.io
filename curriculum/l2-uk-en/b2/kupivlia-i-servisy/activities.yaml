version: '1.0'
module: kupivlia-i-servisy
level: b2
inline: []
workbook:
  - type: critical-analysis
    id: service-review-analysis
    title: "Аналіз тексту: відгук про сервіс"
    instruction: "Прочитай відгук і проаналізуй, як автор поєднує факт, оцінку й нормативне керування."
    target_text: >
      Замовлення підтвердили швидко, однак доставку перенесли двічі й не пояснили причини затримки. Товар я оплатив карткою, чек зберігся. Після отримання виявилося, що корпус подряпаний, а в описі було зазначено новий стан. Я звернувся до підтримки, бо потребую обміну або повернення коштів. Дякую консультантці за ввічливу відповідь, проте прошу магазин чіткіше пояснити порядок рекламації.
    questions:
      - "Які факти в тексті можна перевірити за документами або повідомленнями?"
      - "Де автор правильно використовує керування після дієслів оплатити, потребувати й дякувати?"
      - "Яке речення формулює очікуване рішення, а не лише емоційну оцінку?"
      - "Як можна зробити тон відгуку ще нейтральнішим, не послаблюючи вимогу?"
    model_answers:
      - "Перевірними є підтвердження замовлення, дві зміни доставки, оплата карткою, чек, стан корпусу й опис товару."
      - "Правильні моделі: **оплатив товар**, **потребую обміну або повернення коштів**, **дякую консультантці**."
      - "Очікуване рішення містить речення про обмін або повернення коштів, бо воно називає конкретний результат звернення."
      - "Тон можна нейтралізувати так: **Прошу перевірити стан товару й письмово повідомити порядок обміну або повернення коштів.**"

  - type: match-up
    title: "Поєднай дію і нормативну модель"
    instruction: "З'єднай комунікативну дію з правильною граматичною рамкою."
    pairs:
      - left: "оплата замовлення"
        right: "оплатити що: оплатити замовлення"
      - left: "подяка консультантові"
        right: "дякувати кому: дякувати консультантові"
      - left: "потреба в ремонті"
        right: "потребувати чого: потребувати ремонту"
      - left: "вибачення клієнтові"
        right: "вибачте кому: вибачте клієнтові"
      - left: "компенсація шкоди"
        right: "завдати чого: завдати збитків"
      - left: "виконання умов"
        right: "відповідно до чого: відповідно до договору"
      - left: "ігнорування правил"
        right: "нехтувати чим: нехтувати правилами"
      - left: "освоєння системи"
        right: "опанувати що: опанувати систему"
      - left: "перевірка дефекту"
        right: "перевірити що: перевірити дефект"
      - left: "прохання про інформацію"
        right: "просити чого: просити пояснення"
      - left: "збереження документа"
        right: "зберегти що: зберегти чек"
      - left: "повідомлення клієнтові"
        right: "повідомити кому: повідомити покупцеві"

  - type: group-sort
    title: "Розподіли сервісні формули за керуванням"
    instruction: "Визнач, який відмінок або прийменникова модель потрібні в кожній формулі."
    groups:
      - name: "Знахідний без прийменника"
        items:
          - "оплатити доставку"
          - "опанувати систему обліку"
          - "перевірити комплектацію"
          - "отримати чек"
      - name: "Давальний"
        items:
          - "дякувати продавцеві"
          - "вибачте клієнтові"
          - "повідомити покупцеві"
          - "пояснити майстрові проблему"
      - name: "Родовий"
        items:
          - "потребувати ремонту"
          - "потребувати допомоги"
          - "завдати збитків"
          - "не мати підтвердження"
      - name: "Орудний або прийменникова норма"
        items:
          - "нехтувати правилами"
          - "милуватися вітриною"
          - "відповідно до договору"
          - "за умовами гарантії"

  - type: fill-in
    title: "Заповни пропуск нормативною формою"
    instruction: "Обери форму, яка відповідає українському керуванню в сервісному контексті."
    items:
      - sentence: "Покупець може ____ замовлення карткою або готівкою."
        answer: "оплатити"
        options: ["оплатити", "оплатити за", "дякувати", "потребувати"]
        explanation: "Дієслово **оплатити** керує прямим додатком без прийменника."
      - sentence: "Після консультації клієнтка подякувала ____ за терпіння."
        answer: "продавцеві"
        options: ["продавцеві", "продавця", "продавцем", "продавець"]
        explanation: "Після **дякувати** потрібен давальний відмінок."
      - sentence: "Інструкція ____ точнішого опису гарантійних умов."
        answer: "потребує"
        options: ["потребує", "оплачує", "дякує", "нехтує"]
        explanation: "**Потребувати** відкриває місце для родового відмінка: **опису**."
      - sentence: "Вибачте ____ за повторне звернення до підтримки."
        answer: "мені"
        options: ["мені", "мене", "мною", "я"]
        explanation: "У розгорнутій формулі вибачення адресат стоїть у давальному."
      - sentence: "Помилка в адресі може завдати ____ покупцеві."
        answer: "збитків"
        options: ["збитків", "збитки", "збитками", "збиток"]
        explanation: "Нормативна конструкція: **завдати збитків**."
      - sentence: "Сервіс має діяти ____ умов договору."
        answer: "відповідно до"
        options: ["відповідно до", "відповідно з", "по", "згідно з до"]
        explanation: "Нормативна модель: **відповідно до чого**."
      - sentence: "Компанія не повинна ____ повторними скаргами клієнтів."
        answer: "нехтувати"
        options: ["нехтувати", "оплатити", "дякувати", "потребувати"]
        explanation: "**Нехтувати** керує орудним: **скаргами**."
      - sentence: "Працівник швидко ____ нову систему обліку замовлень."
        answer: "опанував"
        options: ["опанував", "опанував мовою", "нехтував", "дякував"]
        explanation: "Нормативно: **опанувати що**, без орудного."
      - sentence: "Якщо товар бракований, покупець може попросити ____ або повернення коштів."
        answer: "обміну"
        options: ["обміну", "обмін", "обміном", "обміна"]
        explanation: "Після **попросити** в цьому значенні природний родовий: **попросити обміну**."
      - sentence: "Перед оплатою варто перевірити ____ товару."
        answer: "характеристики"
        options: ["характеристики", "характеристиками", "характеристикам", "характеристиці"]
        explanation: "Після **перевірити** потрібен прямий додаток."

  - type: select
    title: "Вибери нормативні сервісні формули"
    instruction: "Познач усі варіанти, які звучать природно й граматично правильно."
    items:
      - question: "Які формули правильно описують оплату товару або послуги?"
        min_correct: 3
        options:
          - text: "оплатити замовлення карткою"
            correct: true
          - text: "оплатити за ремонт"
            correct: false
          - text: "заплатити за доставку"
            correct: true
          - text: "оплатити консультацію після зустрічі"
            correct: true
          - text: "оплатити за товар на касі"
            correct: false
        explanation: "**Оплатити** вимагає прямого додатка, а **заплатити** може мати прийменник **за**."
      - question: "Де правильно використано дієслово дякувати?"
        min_correct: 2
        options:
          - text: "дякувати продавцеві за консультацію"
            correct: true
          - text: "дякувати продавця за знижку"
            correct: false
          - text: "подякувати майстрові за ремонт"
            correct: true
          - text: "подякувати майстра за діагностику"
            correct: false
          - text: "дякувати служба підтримки"
            correct: false
        explanation: "Після **дякувати** і **подякувати** потрібен давальний відмінок."
      - question: "Які варіанти правильно передають потребу або нестачу?"
        min_correct: 4
        options:
          - text: "товар потребує перевірки"
            correct: true
          - text: "клієнт потребує допомоги"
            correct: true
          - text: "сервіс потребує прозорішої інструкції"
            correct: true
          - text: "сайт потребує оновлення"
            correct: true
          - text: "покупець потребує консультацію"
            correct: false
        explanation: "**Потребувати** керує родовим відмінком."
      - question: "Де формула вибачення звучить нормативно в сервісному листуванні?"
        min_correct: 2
        options:
          - text: "Вибачте мені за повторне звернення."
            correct: true
          - text: "Вибачте мене за уточнення."
            correct: false
          - text: "Вибачте, будь ласка, за затримку відповіді."
            correct: true
          - text: "Вибачте мною за незручність."
            correct: false
          - text: "Вибачте я за питання."
            correct: false
        explanation: "Коротке **вибачте** можливе саме по собі; розгорнутий адресат має давальний."
      - question: "Які речення мають коректну офіційну або нейтральну рамку?"
        min_correct: 3
        options:
          - text: "Магазин діє відповідно до умов договору."
            correct: true
          - text: "Сервіс працює відповідно з правилами."
            correct: false
          - text: "Повернення можливе за умовами магазину."
            correct: true
          - text: "Підтримка відповіла згідно з інструкцією."
            correct: true
          - text: "Рішення ухвалено по договору."
            correct: false
        explanation: "Нормативні моделі: **відповідно до**, **за умовами**, **згідно з**."
      - question: "Де автор відгуку називає факт, а не лише емоцію?"
        min_correct: 3
        options:
          - text: "Доставку перенесли двічі без попередження."
            correct: true
          - text: "Магазин просто жахливий."
            correct: false
          - text: "У коробці не було гарантійного талона."
            correct: true
          - text: "Підтримка відповіла через три дні."
            correct: true
          - text: "Нікому не раджу цей сервіс."
            correct: false
        explanation: "Факт можна перевірити або уточнити; емоційне узагальнення саме по собі слабше."
      - question: "Які формули доречні для рекламації, а не для емоційного допису?"
        min_correct: 3
        options:
          - text: "Прошу повідомити порядок обміну товару."
            correct: true
          - text: "Ви зіпсували мені день, це нечувано."
            correct: false
          - text: "Копію чека й фото дефекту додаю."
            correct: true
          - text: "Прошу письмово підтвердити отримання звернення."
            correct: true
          - text: "Усі мають знати, які ви погані."
            correct: false
        explanation: "Рекламація має факт, доказ і вимогу, а не лише емоційний тиск."
      - question: "Які вислови показують відповідальне свідоме споживання без моралізування?"
        min_correct: 3
        options:
          - text: "Варто перевірити, чи ремонт дешевший і довговічніший за нову покупку."
            correct: true
          - text: "Усі зобов'язані купувати тільки найдорожчі локальні товари."
            correct: false
          - text: "Локальний виробник може бути добрим вибором, якщо якість і ціна прийнятні."
            correct: true
          - text: "Повторне використання пакування допомагає зменшити кількість відходів."
            correct: true
          - text: "Хто купує онлайн, той не думає про довкілля."
            correct: false
        explanation: "Відповідальний тон враховує умови й не перетворює пораду на категоричний осуд."

  - type: error-correction
    title: "Виправ кальковане керування"
    instruction: "Знайди неправильну форму або конструкцію й обери нормативну заміну."
    items:
      - sentence: "Я оплатив за доставку одразу після підтвердження замовлення."
        error: "оплатив за доставку"
        correction: "оплатив доставку"
        error_type: "construction"
        options: ["оплатив доставку", "дякував доставці", "потребував доставку", "оплатив з доставкою"]
        explanation: "**Оплатити** керує прямим додатком без прийменника."
      - sentence: "Покупчиня подякувала продавця за докладне пояснення характеристик."
        error: "подякувала продавця"
        correction: "подякувала продавцеві"
        error_type: "construction"
        options: ["подякувала продавцеві", "подякувала продавцем", "подякувала продавець", "подякувала продавцю за"]
        explanation: "Після **подякувати** потрібен давальний відмінок."
      - sentence: "Товар потребує повторну перевірку в сервісному центрі."
        error: "потребує повторну перевірку"
        correction: "потребує повторної перевірки"
        error_type: "construction"
        options: ["потребує повторної перевірки", "потребує повторною перевіркою", "потребує повторна перевірка", "потребує у повторну перевірку"]
        explanation: "**Потребувати** керує родовим відмінком."
      - sentence: "Вибачте мене за повторне звернення до служби підтримки."
        error: "Вибачте мене"
        correction: "Вибачте мені"
        error_type: "construction"
        options: ["Вибачте мені", "Вибачте мною", "Вибачте я", "Вибачте мене"]
        explanation: "У розгорнутій формулі адресат вибачення стоїть у давальному."
      - sentence: "Затримка доставки завдала збитки покупцеві."
        error: "завдала збитки"
        correction: "завдала збитків"
        error_type: "construction"
        options: ["завдала збитків", "завдала збитками", "завдала збиток", "завдала збитки"]
        explanation: "Нормативна конструкція: **завдати збитків**."
      - sentence: "Магазин має діяти відповідно з договором."
        error: "відповідно з договором"
        correction: "відповідно до договору"
        error_type: "construction"
        options: ["відповідно до договору", "відповідно з договором", "відповідно договором", "відповідно на договір"]
        explanation: "Правильна прийменникова модель: **відповідно до чого**."
      - sentence: "Працівник швидко опанував новою системою обліку."
        error: "опанував новою системою"
        correction: "опанував нову систему"
        error_type: "construction"
        options: ["опанував нову систему", "опанував новою системою", "опанував у нову систему", "опанував до нової системи"]
        explanation: "**Опанувати** вимагає знахідного відмінка."
      - sentence: "Сервіс не повинен нехтувати повторні скарги клієнтів."
        error: "нехтувати повторні скарги"
        correction: "нехтувати повторними скаргами"
        error_type: "construction"
        options: ["нехтувати повторними скаргами", "нехтувати повторні скарги", "нехтувати повторних скарг", "нехтувати повторним скаргам"]
        explanation: "**Нехтувати** керує орудним відмінком."

  - type: true-false
    title: "Правда чи ні: сервісний регістр"
    instruction: "Оціни твердження про мову купівлі, послуг і рекламацій."
    items:
      - statement: "У нейтральному тексті правильно сказати: покупець оплатив товар."
        correct: true
        explanation: "**Оплатив товар** має прямий додаток без зайвого прийменника."
      - statement: "Формула дякувати продавця є нормативною в українській мові."
        correct: false
        explanation: "Потрібен давальний: **дякувати продавцеві**."
      - statement: "Сильна рекламація називає факт, доказ і очікуване рішення."
        correct: true
        explanation: "Це робить звернення перевірним і придатним для розгляду."
      - statement: "Публічний відгук може містити приватні телефони працівників, якщо автор сердитий."
        correct: false
        explanation: "Відгук не повинен порушувати приватність інших людей."
      - statement: "Потребувати допомоги є правильною моделлю з родовим відмінком."
        correct: true
        explanation: "**Потребувати** керує родовим."
      - statement: "В офіційній відповіді сервіс має обіцяти результат ще до перевірки товару."
        correct: false
        explanation: "Професійна відповідь називає процедуру й не обіцяє неперевіреного."
      - statement: "Відповідно до умов договору є нормативною прийменниковою моделлю."
        correct: true
        explanation: "Модель **відповідно до чого** відповідає літературній нормі."
      - statement: "Емоційний вислів магазин жахливий завжди сильніший за опис конкретної проблеми."
        correct: false
        explanation: "Конкретний факт переконливіший за загальну образу."
      - statement: "Скорочені репліки на кшталт Оплата карткою? природні в діалозі."
        correct: true
        explanation: "У діалозі контекст може робити неповну репліку зрозумілою."
      - statement: "У рекламації краще написати прошу повідомити порядок обміну, ніж просто я розчарований."
        correct: true
        explanation: "Рекламація потребує дії, а не лише емоційної оцінки."

  - type: unjumble
    title: "Віднови нормативне речення"
    instruction: "Склади речення так, щоб воно звучало природно в сервісній ситуації."
    items:
      - words: ["Покупець", "оплатив", "замовлення", "після", "перевірки", "комплектації"]
        answer: "Покупець оплатив замовлення після перевірки комплектації."
      - words: ["Клієнтка", "подякувала", "консультантці", "за", "детальне", "пояснення"]
        answer: "Клієнтка подякувала консультантці за детальне пояснення."
      - words: ["Товар", "потребує", "повторної", "діагностики", "в", "сервісному", "центрі"]
        answer: "Товар потребує повторної діагностики в сервісному центрі."
      - words: ["Магазин", "діє", "відповідно", "до", "умов", "гарантії"]
        answer: "Магазин діє відповідно до умов гарантії."
      - words: ["Прошу", "повідомити", "порядок", "обміну", "бракованого", "товару"]
        answer: "Прошу повідомити порядок обміну бракованого товару."
      - words: ["Підтримка", "не", "повинна", "нехтувати", "повторними", "скаргами"]
        answer: "Підтримка не повинна нехтувати повторними скаргами."
      - words: ["Працівник", "опанував", "нову", "систему", "обліку", "замовлень"]
        answer: "Працівник опанував нову систему обліку замовлень."
      - words: ["Затримка", "доставки", "може", "завдати", "матеріальних", "збитків"]
        answer: "Затримка доставки може завдати матеріальних збитків."

