version: '1.0'
module: register-practice-cross-register-rewriting
level: b2
inline:
  - id: act-1
    type: comparative-study
    title: "Одна подія, три регістри"
    instruction: "Порівняйте три версії й визначте, яка пасує до приватного чату, офіційного оголошення та допису організаторів."
    items_to_compare:
      - "Зустріч із письменницею перенесено у зв'язку з необхідністю підготувати залу для безпекового тренінгу. Нову дату буде повідомлено додатково."
      - "Зустріч у бібліотеці переносять, бо залу віддали під тренінг із безпеки. Нову дату ще скажуть."
      - "Ми переносимо зустріч, щоб підготувати залу до безпекового тренінгу. Щойно узгодимо нову дату, одразу повідомимо."
    criteria:
      - "адресат"
      - "канал"
      - "дистанція"
      - "лексичні маркери"
      - "межі факту"
    prompt: "Для кожної версії назвіть регістр і два мовні докази. Поясніть, чому факти залишаються однаковими."
    model_answer: "Перша версія офіційна: безособова конструкція, формула причини, стриманий тон. Друга пасує до приватного чату: короткі речення, прості дієслова, неформальна рамка. Третя є публічним дописом організаторів: є займенник «ми», тепліший тон і обіцянка наступного кроку. Факти однакові: зустріч переносять, причина - підготовка зали до тренінгу, нову дату ще повідомлять."

  - type: match-up
    title: "Регістрові заміни без втрати змісту"
    instruction: "Поєднайте вихідну фразу з доречною версією для офіційного або нейтрального тексту."
    pairs:
      - left: "здійснити інформування"
        right: "повідомити"
      - left: "питання зависло"
        right: "розгляд питання призупинено"
      - left: "люди дуже злі"
        right: "учасники висловили критику"
      - left: "якийсь тренінг"
        right: "безпековий тренінг"
      - left: "усе знову перенесли"
        right: "подію перенесено повторно"
      - left: "не придумали дату"
        right: "нову дату ще не погоджено"
      - left: "папери не ок"
        right: "документи потребують уточнення"
      - left: "буде погано"
        right: "оформлення не завершать"
      - left: "нам треба поговорити"
        right: "пропоную короткий дзвінок щодо графіка"
      - left: "усі дуже обурені"
        right: "частина учасників висловила критику"

  - type: translate
    title: "Функція фрази українською"
    instruction: "Оберіть український варіант, який передає функцію англійської підказки й пасує до регістру."
    items:
      - source: "Please inform participants by Friday."
        options:
          - text: "Просимо повідомити учасників до п'ятниці."
            correct: true
          - text: "Скажіть людям якось до п'ятниці."
            correct: false
          - text: "Здійсніть проведення інформування людей."
            correct: false
          - text: "Учасники будуть повідомлені кимось."
            correct: false
        explanation: "Офіційна, але не захаращена формула називає дію й строк."
      - source: "The new date has not been confirmed yet."
        options:
          - text: "Нову дату ще не погоджено."
            correct: true
          - text: "Нову дату не придумали."
            correct: false
          - text: "Дата зависла в повітрі."
            correct: false
          - text: "Дата абсолютно провалена."
            correct: false
        explanation: "Погоджено зберігає нейтральну межу знання."
      - source: "The meeting is moved because the room is unavailable."
        options:
          - text: "Зустріч переноситься, оскільки приміщення тимчасово недоступне."
            correct: true
          - text: "Зустріч злетіла, бо зала не варіант."
            correct: false
          - text: "Здійснюється переміщення зустрічі внаслідок кімнати."
            correct: false
          - text: "Кімната винна в перенесенні зустрічі."
            correct: false
        explanation: "Версія називає причину без комічного змішання регістрів."
      - source: "We will send the updated schedule separately."
        options:
          - text: "Оновлений графік надішлемо окремо."
            correct: true
          - text: "Ми якось кинемо вам новий графік."
            correct: false
          - text: "Окреме надсилання графіка буде здійснено нами."
            correct: false
          - text: "Графік сам надішлеться пізніше."
            correct: false
        explanation: "Коротке дієслово зберігає професійний тон."
      - source: "The reason is still being clarified."
        options:
          - text: "Причину ще уточнюють."
            correct: true
          - text: "Причина мутна."
            correct: false
          - text: "Причина точно прихована."
            correct: false
          - text: "Відбувається уточнювальний процес причинності."
            correct: false
        explanation: "Безпечна формула не додає неперевіреного звинувачення."
      - source: "The issue is outside our authority."
        options:
          - text: "Це питання не належить до наших повноважень."
            correct: true
          - text: "Це взагалі не наше, відчепіться."
            correct: false
          - text: "Питання повноважно поза нами."
            correct: false
          - text: "Ми точно нічого не винні."
            correct: false
        explanation: "Формула називає межу відповідальності без грубості."
      - source: "The public version should avoid blame."
        options:
          - text: "Публічна версія має уникати звинувачення без підстав."
            correct: true
          - text: "Публічно треба когось винуватити."
            correct: false
          - text: "У версії хай буде драматичний винний."
            correct: false
          - text: "Звинувачення саме додасться."
            correct: false
        explanation: "Публічна комунікація потребує підстав для оцінки."
      - source: "The short notice must keep the deadline."
        options:
          - text: "Коротке оголошення має зберегти строк."
            correct: true
          - text: "Коротке оголошення може викинути всі дати."
            correct: false
          - text: "Строк не важливий, якщо текст короткий."
            correct: false
          - text: "Дедлайн хай буде десь потім."
            correct: false
        explanation: "Стиснення не повинно прибирати практичну інформацію."

  - type: error-correction
    title: "Діагностика стилістичного дисонансу"
    instruction: "Виправте чужорідний елемент так, щоб зміст залишився тим самим."
    items:
      - sentence: "Шановні мешканці, ну ми там трохи переносимо слухання."
        error: "ну ми там трохи переносимо"
        correction: "повідомляємо про перенесення"
        options:
          - "повідомляємо про перенесення"
          - "типу переносимо"
          - "здійснюємо трішки перенос"
          - "мабуть, якось переноситься"
        explanation: "Офіційне звертання потребує нейтральної дії."
      - sentence: "Комісія зробила повний провал реформи."
        error: "зробила повний провал"
        correction: "не досягла запланованих показників"
        options:
          - "не досягла запланованих показників"
          - "влаштувала суцільну катастрофу"
          - "дуже все зіпсувала"
          - "провально реформувалася"
        explanation: "Оцінку треба підкріпити критерієм або замінити конкретним фактом."
      - sentence: "Просимо здійснити проведення обговорення графіка."
        error: "здійснити проведення обговорення"
        correction: "обговорити графік"
        options:
          - "обговорити графік"
          - "зробити графік поговореним"
          - "провести здійснення графіка"
          - "балакнути графік"
        explanation: "Просте дієслово прибирає зайву канцелярію."
      - sentence: "У звіті написали, що сервіс дуже класний."
        error: "дуже класний"
        correction: "зручний для користувачів за результатами опитування"
        options:
          - "зручний для користувачів за результатами опитування"
          - "прям топовий"
          - "неймовірно класний"
          - "класність сервісу очевидна"
        explanation: "Звіт потребує ознаки й джерела оцінки."
      - sentence: "Організатори точно приховують справжню причину перенесення."
        error: "точно приховують"
        correction: "ще не повідомили причину перенесення"
        options:
          - "ще не повідомили причину перенесення"
          - "стовідсотково щось мутять"
          - "абсолютно винні"
          - "мають таємну причину"
        explanation: "Якщо доказу немає, треба назвати межу знання."
      - sentence: "Друзі, відповідно до вищезазначеного просимо здійснити явку."
        error: "відповідно до вищезазначеного просимо здійснити явку"
        correction: "будь ласка, прийдіть у зазначений час"
        options:
          - "будь ласка, прийдіть у зазначений час"
          - "здійсніть явочний захід"
          - "приходьте, бо так треба згідно всього"
          - "явка буде проведена вами"
        explanation: "Дружнє звертання потребує простої, ввічливої формули."
      - sentence: "Команда здійснить проведення процесу пояснення змін."
        error: "здійснить проведення процесу пояснення"
        correction: "пояснить"
        options:
          - "пояснить"
          - "проведе процесність"
          - "здійснить пояснювання"
          - "якось розкаже все"
        explanation: "Просте дієслово точніше за зайву іменникову конструкцію."
      - sentence: "Учасники точно зірвали консультацію своїми скаргами."
        error: "точно зірвали"
        correction: "подали звернення, після яких консультацію перенесли"
        options:
          - "подали звернення, після яких консультацію перенесли"
          - "винні у зриві"
          - "усе зламали скаргами"
          - "створили хаос"
        explanation: "Факти треба відокремити від звинувачення."

  - id: act-5
    type: critical-analysis
    title: "Факт, оцінка, припущення"
    instruction: "Проаналізуйте фрагмент і вирішіть, що можна залишити, а що треба переписати."
    target_text: "Активісти заявили, що графік слухань знову зірвали через бюрократичний хаос. Міська рада повідомила тільки те, що дату змінено через потребу додатково перевірити схему руху. У чаті мешканці пишуть, що це перемога громади."
    questions:
      - "Які твердження мають назване джерело?"
      - "Де є оцінка або емоційна рамка?"
      - "Яку нейтральну версію можна подати в новині?"
      - "Що не можна стверджувати без додаткового документа?"
    model_answers:
      - "Джерела названо для заяви активістів і повідомлення міської ради; чат мешканців є голосом учасників, але не офіційним джерелом."
      - "«Бюрократичний хаос» і «перемога громади» є оцінними рамками."
      - "Нейтральна версія: «Міська рада повідомила про зміну дати слухань через потребу додатково перевірити схему руху. Активісти критикують рішення й пов'язують його з організаційними проблемами»."
      - "Без документа не можна стверджувати, що слухання «зірвали» або що причина точно бюрократична."

  - type: select
    title: "Повний цикл перекодування"
    instruction: "Позначте версії, які зберігають факти й пасують до зазначеного регістру."
    items:
      - question: "Офіційний лист учасникам про перенесення воркшопу."
        min_correct: 2
        options:
          - text: "Повідомляємо, що воркшоп, запланований на 12 серпня, переноситься через ремонт електромережі в культурному центрі."
            correct: true
          - text: "Центр нас підвів, тому все летить."
            correct: false
          - text: "Нову дату надішлемо на вашу електронну адресу до 9 серпня."
            correct: true
          - text: "Можете самі здогадатися, коли буде нова дата."
            correct: false
        explanation: "Лист має назвати подію, причину й наступний крок без звинувачень."
      - question: "Внутрішній чат волонтерів."
        min_correct: 2
        options:
          - text: "До 18:00 оновлюємо форму реєстрації й готуємо лист учасникам."
            correct: true
          - text: "У зв'язку з вищевикладеним здійснюємо волонтерське реагування."
            correct: false
          - text: "Нову дату погоджує Олена; дедлайн - 9 серпня."
            correct: true
          - text: "Хтось потім щось зробить."
            correct: false
        explanation: "У чаті потрібні короткі дії, відповідальні й строки."
      - question: "Допис у соцмережах для широкої аудиторії."
        min_correct: 2
        options:
          - text: "Воркшоп 12 серпня переносимо: у центрі терміново ремонтують електромережу."
            correct: true
          - text: "Нам усе зірвали, тримайтеся."
            correct: false
          - text: "Учасникам напишемо на пошту, а нову дату повідомимо до 9 серпня."
            correct: true
          - text: "Захід скасовано назавжди."
            correct: false
        explanation: "Публічний допис може бути теплішим, але не має змінювати статус події."
      - question: "Оголошення на дверях має бути коротким."
        min_correct: 2
        options:
          - text: "Воркшоп 12 серпня перенесено через ремонт електромережі."
            correct: true
          - text: "Усі деталі шукайте самі."
            correct: false
          - text: "Нову дату повідомимо до 9 серпня."
            correct: true
          - text: "Організатори знову все провалили."
            correct: false
        explanation: "Коротке оголошення зберігає факт, причину й строк."
      - question: "Пояснення для партнера."
        min_correct: 2
        options:
          - text: "Після погодження нової дати надішлемо оновлений графік і матеріали для поширення."
            correct: true
          - text: "Партнери якось самі зорієнтуються."
            correct: false
          - text: "Дякуємо за підтримку події й повідомляємо про перенесення."
            correct: true
          - text: "Центр усе зіпсував, тому ми безсилі."
            correct: false
        explanation: "Партнеру потрібні контроль ситуації й наступний крок."
      - question: "Внутрішній протокол після зміни дати."
        min_correct: 2
        options:
          - text: "Відповідальна за нову дату - Олена."
            correct: true
          - text: "Хтось має щось узгодити."
            correct: false
          - text: "Лист учасникам підготувати до 18:00."
            correct: true
          - text: "Усе в процесі, деталей немає."
            correct: false
        explanation: "Протокол потребує відповідального й строку."
      - question: "Нейтральна новина про перенесення слухань."
        min_correct: 2
        options:
          - text: "Міська рада повідомила про зміну дати слухань."
            correct: true
          - text: "Влада злякалася критики й відступила."
            correct: false
          - text: "Причиною названо потребу додатково перевірити схему руху."
            correct: true
          - text: "Громада остаточно перемогла бюрократів."
            correct: false
        explanation: "Новина відокремлює джерело, причину й оцінку."
      - question: "Поважне спрощення для заявника."
        min_correct: 2
        options:
          - text: "Ви можете подати документи повторно після виправлення недоліків."
            correct: true
          - text: "Ви знову все не так зробили."
            correct: false
          - text: "Додайте копію документа, якої бракує."
            correct: true
          - text: "Без папірця нічого не світить."
            correct: false
        explanation: "Поважне спрощення дає дію без зверхності."

workbook:
  - id: wb-reading-register-map
    type: reading
    title: "Читання: чотири версії повідомлення"
    source: "Навчальний редакторський кейс для B2."
    text: >-
      Вихідний факт: консультацію щодо маршруту громадського транспорту перенесли, бо комісія отримала додаткові звернення мешканців і має перевірити схему руху. Офіційна версія: Консультацію щодо маршруту громадського транспорту перенесено у зв'язку з необхідністю додатково перевірити схему руху після звернень мешканців. Нову дату буде оголошено на сайті ради. Неформальна версія: Консультацію переносять, бо після звернень мешканців схему руху ще раз перевірятимуть. Нову дату мають викласти на сайті. Публіцистична версія: Після звернень мешканців комісія ще раз перевірить схему руху, тому консультацію перенесли. Громада очікує, що нову дату оголосять публічно. Невдала версія: Рада знову все зірвала, бо люди поскаржилися, а тепер ніхто не знає, що буде з маршрутом.
    tasks:
      - "Позначте фактичне ядро."
      - "Порівняйте офіційну, неформальну й публіцистичну версії."
      - "Поясніть, чому невдала версія змінює рамку події."

  - id: wb-essay-register-rewrite
    type: essay-response
    title: "Есе: перекодування без зміни фактів"
    source_reading: wb-reading-register-map
    instruction: "Напишіть 150-200 слів українською."
    prompt: "Поясніть, чому стилістичне перекодування потребує одночасно мовної гнучкості й фактичної дисципліни. Використайте щонайменше шість слів із модуля."
    min_words: 150
    model_answer: |-
      > [!model-answer]
      > Стилістичне перекодування вимагає гнучкості, бо один і той самий факт треба подати різним адресатам: мешканцям, колегам, партнерам або широкій аудиторії. У кожному контексті змінюються регістр, канал, синтаксис і ступінь пояснення. Водночас потрібна фактична дисципліна. Якщо під час адаптації зникає джерело або додається емоційна оцінка, текст уже не є еквівалентним. Добрий редактор зберігає подію, причину, строк і межі знання, але добирає доречні слова. Він може стиснути офіційну фразу для допису або розгорнути короткий коментар у поважне пояснення. Якісна трансформація прибирає дисонанс, надмірність і канцеляризм, але не приховує відповідальності.
    rubric:
      - criteria: "Еквівалентність"
        description: "Збережено факти й межі знання."
        points: 3
      - criteria: "Регістр"
        description: "Пояснено роль адресата, каналу й мети."
        points: 3
      - criteria: "Лексика"
        description: "Ужито словник модуля доречно."
        points: 2
      - criteria: "Зв'язність"
        description: "Текст має послідовний аргумент."
        points: 2

  - type: fill-in
    title: "Терміни перекодування"
    instruction: "Вставте слово, яке завершує редакторське правило."
    items:
      - sentence: "____ визначає, скільки пояснення потрібно адресатові."
        answer: "Контекст"
        options: ["Контекст", "Сленг", "Плеоназм", "Рима"]
        explanation: "Контекст охоплює ситуацію, канал і попереднє знання."
      - sentence: "____ означає відповідність слова ситуації спілкування."
        answer: "Доречність"
        options: ["Доречність", "Фамільярність", "Надмірність", "Іронія"]
        explanation: "Доречність важливіша за механічну книжність."
      - sentence: "Під час перекодування треба зберегти фактичний ____."
        answer: "еквівалент"
        options: ["еквівалент", "жарт", "ефект", "шум"]
        explanation: "Еквівалент передає той самий зміст іншою формою."
      - sentence: "Надмірне «здійснити проведення» є прикладом ____."
        answer: "канцеляризму"
        options: ["канцеляризму", "діалогізації", "синоніміки", "прагматики"]
        explanation: "Канцеляризм імітує офіційність без потреби."
      - sentence: "Коли чужий регістр руйнує тон, виникає стилістичний ____."
        answer: "дисонанс"
        options: ["дисонанс", "канал", "коментар", "адресат"]
        explanation: "Дисонанс помітний як випадкове змішання стилів."
      - sentence: "____ допомагає перетворити складну фахову фразу на зрозуміле пояснення."
        answer: "Адаптація"
        options: ["Адаптація", "Догадка", "Пародія", "Погроза"]
        explanation: "Адаптація змінює форму під адресата."
      - sentence: "____ показує, хто повідомив факт."
        answer: "Джерело"
        options: ["Джерело", "Сленг", "Рима", "Пауза"]
        explanation: "Джерело потрібне для відповідального переказу."
      - sentence: "____ не дозволяє перетворювати припущення на факт."
        answer: "Межа знання"
        options: ["Межа знання", "Фамільярність", "Пародія", "Інверсія"]
        explanation: "Межа знання показує, що ще не підтверджено."
      - sentence: "____ робить складний текст доступним без зверхності."
        answer: "Поважне спрощення"
        options: ["Поважне спрощення", "Рекламний шум", "Грубий наказ", "Випадкова цитата"]
        explanation: "Поважне спрощення зберігає точність і людяність."
      - sentence: "Перед переписуванням треба виписати фактичне ____."
        answer: "ядро"
        options: ["ядро", "гасло", "враження", "прикрасу"]
        explanation: "Фактичне ядро захищає зміст під час трансформації."

