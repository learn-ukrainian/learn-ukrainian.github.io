  - left: дані свідчать
    right: науковий стиль
  - left: можна припустити
    right: науковий стиль
  - left: громадськість очікує пояснення
    right: публіцистичний стиль
  - left: це рішення має наслідки
    right: публіцистичний стиль
  - left: глянь, будь ласка
    right: розмовний стиль
  - left: скинь документ у чат
    right: розмовний стиль
  - left: образ тримає підтекст
    right: художній стиль
  - left: ритм фрази підсилює напругу
    right: художній стиль
  - left: технічне завдання погоджено
    right: професійно-діловий стиль
  - left: показник рентабельності зріс
    right: економічний професійний стиль
- type: match-up
  title: Операція перекодування
  instruction: Поєднай трансформацію з назвою операції.
  pairs:
  - left: Здійснено перевірку -> Ми перевірили
    right: діалогізація
  - left: Ми вирішили проблему -> вирішення проблеми
    right: номіналізація
  - left: скинути документ -> надіслати документ
    right: лексична заміна
  - left: мені прикро -> на жаль
    right: зміна модальності
  - left: я бачу помилку -> у тексті виявлено помилку
    right: усунення персонального фокуса
  - left: купа людей -> значна кількість учасників
    right: підвищення регістру
  - left: порушення строку -> ви не виконали вчасно
    right: персоналізація
  - left: повний провал -> не досяг заявленої мети
    right: нейтралізація оцінки
  - left: звіт написаний важко -> звіт перевантажено іменниками
    right: редакторська діагностика
  - left: це дивно -> це потребує пояснення
    right: публічне уточнення
  - left: наша фірма робить хороше -> компанія виробляє високоякісне
    right: професіоналізація лексики
  - left: всі знають -> дані підтверджують
    right: доказове переформулювання
- type: fill-in
  title: Добір регістру
  instruction: Встав доречний варіант так, щоб регістр речення залишався цілісним.
  items:
  - sentence: 'У службовому листі: ____ отримання документа.'
    answer: Підтверджую
    options:
    - Підтверджую
    - Глянув
    - Зацінив
    - Кинув оком
    explanation: Офіційний лист потребує нейтральної формули фіксації.
  - sentence: 'У робочому чаті: ____ реквізити, будь ласка.'
    answer: Уточни
    options:
    - Уточни
    - Просимо розглянути
    - Встановлено
    - Здійснено
    explanation: Напівформальний чат допускає коротке ввічливе прохання.
  - sentence: 'У звіті: За результатами аналізу ____ три ризики.'
    answer: виявлено
    options:
    - виявлено
    - вилізло
    - надибано
    - замаячило
    explanation: Звіт потребує нейтрального дієслова результату.
  - sentence: 'У публічному коментарі: Рішення потребує ____ пояснення.'
    answer: відкритого
    options:
    - відкритого
    - крутого
    - мутного
    - прикольного
    explanation: Публічний регістр може оцінювати, але без зниженого сленгу.
  - sentence: 'У науковому тексті: Дані ____ попередню гіпотезу.'
    answer: підтверджують
    options:
    - підтверджують
    - підганяють
    - качають
    - розкручують
    explanation: Науковий стиль вимагає точного дієслова доказу.
  - sentence: 'У претензії: Послугу не надано у ____ строк.'
    answer: встановлений
    options:
    - встановлений
    - нормальний
    - якийсь
    - прикольний
    explanation: Офіційно-діловий стиль фіксує норму або строк.
  - sentence: 'У нейтральному повідомленні: Обговорення ____ на понеділок.'
    answer: перенесено
    options:
    - перенесено
    - перекинули
    - посунули якось
    - закрутили
    explanation: Нейтральний регістр уникає зайвої розмовності.
  - sentence: 'У редакторському коментарі: Варто ____ емоційне слово нейтральним.'
    answer: замінити
    options:
    - замінити
    - зацінити
    - підкрутити
    - завалити
    explanation: Редакторська дія має бути названою прямо.
  - sentence: 'В аналітиці: Висновок ____ на трьох прикладах.'
    answer: грунтується
    options:
    - грунтується
    - висить
    - якось стоїть
    - підкручений
    explanation: Аналітичний регістр потребує точного зв’язку доказу й висновку.
  - sentence: 'У короткому оголошенні: Матеріали ____ до кінця дня.'
    answer: оновлять
    options:
    - оновлять
    - забабахають
    - підмутять
    - кинуть якось
    explanation: Оголошення має бути коротким, але не зниженим.
- type: true-false
  title: Дисонанс
  instruction: Познач, чи є твердження правильним.
  items:
  - statement: Офіційне звертання вимагає відповідної дистанції.
    correct: true
    explanation: Звертання задає тон усього тексту.
  - statement: Суржик є окремим функціональним стилем української мови.
    correct: false
    explanation: Суржик є наслідком мовного змішування, а не стилістичною нормою.
  - statement: Розмовне слово може бути доречним у цитаті, але недоречним у протоколі.
    correct: true
    explanation: Жанр і функція визначають допустимість маркера.
  - statement: Перекодування означає дослівно зберегти всі слова старого тексту.
    correct: false
    explanation: Зберігається зміст, а мовні засоби змінюються.
  - statement: Номіналізація може зробити текст офіційнішим, але надмірність створює канцелярит.
    correct: true
    explanation: Іменникові конструкції корисні лише там, де вони служать жанру.
  - statement: Найвищий регістр завжди є найкращим варіантом.
    correct: false
    explanation: Доречність важливіша за механічне підвищення стилю.
  - statement: Адресат і мета важливіші за канал, коли треба обрати тон.
    correct: true
    explanation: Чат може бути службовим, а лист може бути дружнім.
  - statement: Деколонізаційне редагування дозволяє автоматично замінити всі живі розмовні слова книжними.
    correct: false
    explanation: Завдання - відрізнити природну розмовність від русизму, суржику й кальки.
  - statement: Публіцистичний текст може бути емоційним, але має відрізняти факт від припущення.
    correct: true
    explanation: Без цього оцінка стає маніпуляцією.
  - statement: Канцеляризм завжди треба прибирати з будь-якого офіційного документа.
    correct: false
    explanation: Частина формул потрібна для процедури, але надмірність шкодить.
- type: mark-the-words
  title: Стильові маркери
  instruction: Познач слова й вислови, які сигналізують регістр.
  text: 'Відповідно до звернення комісія перенесла розгляд питання. У робочому чаті учасники написали: надішли, будь ласка,
