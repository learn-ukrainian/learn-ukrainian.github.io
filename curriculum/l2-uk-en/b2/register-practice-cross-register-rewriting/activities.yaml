- type: error-correction
  title: Виправлення дисонансу
  instruction: Виправ речення так, щоб регістр був цілісний.
  items:
  - sentence: Шановний пане директоре, я хочу сказати тобі одну річ.
    error: тобі
    answer: Вам
    error_type: register
    explanation: Офіційне звертання потребує пошанного Ви та відповідної дистанції.
  - sentence: Я маю багато роботи сьогодні, тому я є дуже зайнятий.
    error: я є дуже зайнятий
    answer: я дуже зайнятий
    error_type: construction
    explanation: Нейтральна українська конструкція уникає кальки з англійської.
  - sentence: По цьому питанню комісія нічого не пояснила.
    error: По цьому питанню
    answer: Щодо цього питання
    error_type: phrase
    explanation: 'Нормативно й природно: щодо цього питання.'
  - sentence: Комісія глянула кошторис на засіданні.
    error: глянула
    answer: розглянула
    error_type: register
    explanation: Офіційний контекст потребує нейтрального дієслова.
  - sentence: Цей проєкт являється дуже рентабельним.
    error: являється
    answer: є
    error_type: word
    explanation: 'У цьому значенні природно: є.'
  - sentence: Без кошторису це пахне корупцією.
    error: пахне корупцією
    answer: потребує перевірки фінансових документів
    error_type: register
    explanation: Оцінку треба замінити перевірним фактом або процедурою.
  - sentence: Дедлайн посунули, бо матеріали сирі.
    error: сирі
    answer: потребують доопрацювання
    error_type: register
    explanation: Нейтральний текст уникає жаргонного скорочення.
  - sentence: Згідно договору учасники мають надати відповідь.
    error: Згідно договору
    answer: Згідно з договором
    error_type: construction
    explanation: 'Нормативна керована форма: згідно з чим.'
