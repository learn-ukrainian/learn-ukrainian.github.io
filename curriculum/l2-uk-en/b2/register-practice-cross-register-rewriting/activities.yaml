  - type: match-up
    title: "Редакторські функції"
    instruction: "Поєднайте англійську функцію з точною українською формулою."
    pairs:
      - left: "The document needs clarification."
        right: "Документ потребує уточнення."
      - left: "Please send two alternative dates."
        right: "Просимо надіслати дві альтернативні дати."
      - left: "The statement has not been confirmed."
        right: "Твердження не підтверджено."
      - left: "The audience needs a shorter explanation."
        right: "Аудиторії потрібне коротше пояснення."
      - left: "Keep the facts, change the tone."
        right: "Збережіть факти, змініть тон."
      - left: "The reason is still being clarified."
        right: "Причину ще уточнюють."
      - left: "The audience needs a clear next step."
        right: "Адресатові потрібен чіткий наступний крок."
      - left: "The official version should name the source."
        right: "Офіційна версія має назвати джерело."
      - left: "The short version should keep the deadline."
        right: "Коротка версія має зберегти строк."
      - left: "The formal text should not add blame."
        right: "Формальний текст не має додавати звинувачення."
