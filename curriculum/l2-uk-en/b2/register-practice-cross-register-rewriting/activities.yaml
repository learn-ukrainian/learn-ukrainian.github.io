- id: act-16
  type: critical-analysis
  title: Критика перекодування
  target_text: Перепрошуємо за затримку й надішлемо оновлений договір до понеділка. Сорі за затримку, кинемо договір у понеділок.
    Висловлюємо глибоку стурбованість затримкою та здійснимо надсилання договору.
  questions:
  - Який варіант найдоречніший для клієнта?
  - Який варіант надто розмовний?
  - Який варіант створює порожню офіційність?
  - Які елементи змісту мають зберегтися в доброму варіанті?
  model_answers:
  - 'Перший варіант найдоречніший: він ввічливий, стислий і називає строк.'
  - Другий варіант надто розмовний через сорі й кинемо.
  - Третій варіант перевантажений канцеляритом і затемнює просту дію.
  - Потрібно зберегти вибачення, факт затримки, дію й строк надсилання договору.
  instruction: Проаналізуй три варіанти і поясни, який регістр відповідає ситуації.
- id: act-17
  type: reading
  title: Мінітекст для редагування
  instruction: Прочитай фрагмент і виконай завдання.
  source: Навчальний фрагмент для B2.
  text: 'Шановні учасники, комісія перенесла обговорення проєкту, бо частина матеріалів потребує додаткового узгодження. У
    робочому чаті це можна сказати коротше: обговорення переносимо, бо треба звірити таблиці. У публічному повідомленні варто
    додати причину й строк, але не варто писати, що хтось усе зірвав, якщо для цього немає доказу.'
  tasks:
  - Визнач офіційно-діловий фрагмент.
  - Перепиши зміст для робочого чату.
  - Поясни, чому публічний текст має уникати бездоказового звинувачення.
  - Назви зміст, який зберігається в усіх трьох регістрах.
- id: act-18
  type: essay-response
  title: Власне перекодування
  instruction: Напиши два варіанти одного змісту.
  prompt: 'Візьми повідомлення: "Команда не встигла підготувати матеріали, тому зустріч треба перенести". Напиши офіційне
    повідомлення для учасників засідання і коротке робоче повідомлення для колег. Поясни, які слова ти змінив і чому.'
  min_words: 150
  model_answer: 'Офіційний варіант: Шановні учасники, повідомляємо, що засідання перенесено у зв’язку з необхідністю додаткового
    доопрацювання матеріалів. Про нову дату буде повідомлено окремо після погодження оновленого пакета документів. Робочий
    варіант: Колеги, зустріч переносимо, бо матеріали ще треба допрацювати. Новий час напишу, щойно все погодимо. У першому
    варіанті використано нейтральні формули повідомляємо, перенесено, необхідність доопрацювання, бо адресат ширший і ситуація
    офіційна. У другому варіанті збережено зміст, але синтаксис коротший, є пряме звертання до колег і природна форма напишу.
    Обидва тексти не звинувачують команду, а називають причину та наступну дію.'
  rubric:
  - criteria: Збереження змісту
    description: Обидва варіанти передають причину перенесення і наступну дію.
    points: 3
  - criteria: Регістр
    description: Офіційний і робочий варіанти мають різні, але доречні мовні засоби.
    points: 4
  - criteria: Пояснення
    description: Автор пояснює конкретні заміни, а не лише переписує текст.
    points: 3
