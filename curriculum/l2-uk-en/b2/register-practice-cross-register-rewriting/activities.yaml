- type: true-false
  title: Редакторська перевірка
  instruction: Оціни твердження з позиції редактора.
  items:
  - statement: Еквівалентність означає збереження ключового змісту.
    correct: true
    explanation: Форма може змінитися, але змістова опора лишається.
  - statement: Перекодування завжди вимагає підвищення регістру.
    correct: false
    explanation: Іноді текст треба зробити простішим або ближчим до адресата.
  - statement: Професійний текст може містити терміни, але вони мають бути потрібними.
    correct: true
    explanation: Терміни не прикрашають текст, а уточнюють його.
  - statement: Розмовний варіант автоматично є суржиком.
    correct: false
    explanation: Жива розмовність не дорівнює мовному змішуванню.
  - statement: У новині правове звинувачення потребує доказової підстави.
    correct: true
    explanation: Інакше оцінка стає небезпечною й недобросовісною.
  - statement: Канцеляризм завжди треба прибрати з офіційного документа.
    correct: false
    explanation: У своєму жанрі частина канцелярських формул є функціональною.
  - statement: У робочому чаті можна бути стислим, але не грубим.
    correct: true
    explanation: Напівформальність не скасовує поваги.
  - statement: Якщо текст звучить серйозно, його регістр уже правильний.
    correct: false
    explanation: Треба перевірити жанр, адресата, мету й мовні засоби.
  - statement: У перекодуванні треба перевіряти не лише слова, а й синтаксис.
    correct: true
    explanation: Регістр видно в побудові речень і модальності.
  - statement: Порожня офіційність може приховувати відсутність змісту.
    correct: true
    explanation: Редактор має відрізняти точність від туману.
