- lemma: 褌褉邪薪褋褎芯褉屑邪虂褑褨褟
  translation: transformation
  pos: noun
  usage: 小褌懈谢褨褋褌懈虂褔薪邪 褌褉邪薪褋褎芯褉屑邪虂褑褨褟 蟹屑褨虂薪褞褦 褎芯虂褉屑褍 褌械虂泻褋褌褍.
- lemma: 锌械褉械泻芯写褍胁邪虂薪薪褟
  translation: recoding, register rewriting
  pos: noun
  usage: 袩械褉械泻芯写褍胁邪虂薪薪褟 蟹斜械褉褨谐邪虂褦 蟹屑褨褋褌 褨 蟹屑褨虂薪褞褦 褉械谐褨虂褋褌褉.
- lemma: 泻芯薪褌械虂泻褋褌
  translation: context
  pos: noun
  usage: 袣芯薪褌械虂泻褋褌 胁懈蟹薪邪褔邪虂褦 写芯褉械虂褔薪褨褋褌褜 褋谢芯虂胁邪.
- lemma: 邪写褉械褋邪虂褌
  translation: addressee
  pos: noun
  usage: 袗写褉械褋邪虂褌 胁锌谢懈胁邪虂褦 薪邪 胁懈虂斜褨褉 褉械谐褨虂褋褌褉褍.
- lemma: 写芯褉械虂褔薪褨褋褌褜
  translation: appropriateness
  pos: noun
  usage: 袛芯褉械虂褔薪褨褋褌褜 胁邪卸谢懈虂胁褨虂褕邪 蟹邪 屑械褏邪薪褨虂褔薪褍 泻薪懈虂卸薪褨褋褌褜.
- lemma: 械泻胁褨胁邪谢械虂薪褌
  translation: equivalent
  pos: noun
  usage: 袧械泄褌褉邪虂谢褜薪懈泄 械泻胁褨胁邪谢械虂薪褌 写芯锌芯屑邪谐邪虂褦 锌械褉械褎褉邪蟹褍胁邪虂褌懈 褌械泻褋褌.
- lemma: 褋懈薪芯薪褨虂屑褨泻邪
  translation: synonymy as a system
  pos: noun
  usage: 小懈薪芯薪褨虂屑褨泻邪 锌芯泻邪虂蟹褍褦 褉褨虂蟹薪褨 褉械谐褨虂褋褌褉懈.
- lemma: 褉械谐褨虂褋褌褉
  translation: register
  pos: noun
  usage: 袪械谐褨虂褋褌褉 蟹邪谢械虂卸懈褌褜 胁褨写 邪写褉械褋邪虂褌邪 泄 屑械褌懈虂.
- lemma: 薪械泄褌褉邪虂谢褜薪懈泄
  translation: neutral
  pos: adjective
  usage: 袧械泄褌褉邪虂谢褜薪懈泄 褌芯薪 写芯褉械虂褔薪懈泄 褍 褉芯斜芯虂褔芯屑褍 锌芯胁褨写芯虂屑谢械薪薪褨.
- lemma: 锌械褉械褎褉邪蟹褍胁邪虂褌懈
  translation: to paraphrase
  pos: verb
  usage: 小锌褉芯虂斜褍泄 锌械褉械褎褉邪蟹褍胁邪虂褌懈 褋谢褍卸斜芯虂胁械 褉械褔械薪薪褟.
- lemma: 谢邪泻芯薪褨虂褔薪褨褋褌褜
  translation: conciseness
  pos: noun
  usage: 袥邪泻芯薪褨虂褔薪褨褋褌褜 薪械 锌芯胁懈虂薪薪邪 蟹薪懈虂褖褍胁邪褌懈 蟹屑褨褋褌.
- lemma: 薪邪写屑褨虂褉薪褨褋褌褜
  translation: excessiveness
  pos: noun
  usage: 袧邪写屑褨虂褉薪褨褋褌褜 褋褌胁芯虂褉褞褦 屑芯虂胁薪械 蟹邪褏邪褉邪虂褖械薪薪褟.
- lemma: 邪写邪锌褌邪虂褑褨褟
  translation: adaptation
  pos: noun
  usage: 袗写邪锌褌邪虂褑褨褟 蟹屑褨虂薪褞褦 褎芯虂褉屑褍 写谢褟 薪芯胁芯虂谐芯 邪写褉械褋邪虂褌邪.
- lemma: 胁褨写锌芯胁褨虂写薪褨褋褌褜
  translation: correspondence, fit
  pos: noun
  usage: 袙褨写锌芯胁褨虂写薪褨褋褌褜 卸邪虂薪褉褍 褦 泻褉懈褌械虂褉褨褦屑 褟虂泻芯褋褌褨.
- lemma: 谐薪褍虂褔泻褨褋褌褜
  translation: flexibility
  pos: noun
  usage: 小褌懈谢褨褋褌懈虂褔薪邪 谐薪褍虂褔泻褨褋褌褜 锌芯褌褉褨虂斜薪邪 胁 褉芯斜芯虂褔芯屑褍 褋锌褨谢泻褍胁邪虂薪薪褨.
- lemma: 写懈褋芯薪邪虂薪褋
  translation: dissonance
  pos: noun
  usage: 袛懈褋芯薪邪虂薪褋 胁懈薪懈泻邪褦 褔械虂褉械蟹 蟹屑褨虂褕褍胁邪薪薪褟 褉械谐褨虂褋褌褉褨胁.
- lemma: 锌邪褉邪写懈虂谐屑邪
  translation: paradigm
  pos: noun
  usage: 小褌懈谢褨褋褌懈虂褔薪邪 锌邪褉邪写懈虂谐屑邪 褋锌懈褉邪虂褦褌褜褋褟 薪邪 褉褟写 蟹邪屑褨虂薪.
- lemma: 锌褉邪谐屑邪虂褌懈泻邪
  translation: pragmatics
  pos: noun
  usage: 袩褉邪谐屑邪虂褌懈泻邪 锌芯泻邪虂蟹褍褦, 薪邪胁褨虂褖芯 褋泻邪虂蟹邪薪芯 褎褉邪虂蟹褍.
- lemma: 薪芯屑褨薪邪谢褨蟹邪褑褨褟
  translation: nominalization
  pos: noun
  usage: 袧芯屑褨薪邪谢褨蟹邪褑褨褟 锌械褉械薪芯虂褋懈褌褜 写褨虂褞 胁 褨屑械虂薪薪懈泻.
- lemma: 锌械褉褋芯薪邪谢褨蟹邪虂褑褨褟
  translation: personalization
  pos: noun
  usage: 袩械褉褋芯薪邪谢褨蟹邪虂褑褨褟 锌芯胁械褉褌邪虂褦 胁 褌械泻褋褌 褋褍斜'褦虂泻褌邪 写褨虂褩.
- lemma: 写褨邪谢芯谐褨蟹邪虂褑褨褟
  translation: dialogization
  pos: noun
  usage: 袛褨邪谢芯谐褨蟹邪虂褑褨褟 褉芯虂斜懈褌褜 褌械泻褋褌 斜谢懈虂卸褔懈屑 写芯 卸懈胁芯虂谐芯 屑芯虂胁谢械薪薪褟.
- lemma: 屑芯写邪虂谢褜薪褨褋褌褜
  translation: modality
  pos: noun
  usage: 袦芯写邪虂谢褜薪褨褋褌褜 胁懈蟹薪邪褔邪虂褦 褌芯薪 锌褉芯褏邪虂薪薪褟 邪斜芯虂 胁懈虂褋薪芯胁泻褍.
- lemma: 泻邪薪褑械谢褟褉懈虂蟹屑
  translation: bureaucratic expression
  pos: noun
  usage: 袣邪薪褑械谢褟褉懈虂蟹屑 写芯褉械虂褔薪懈泄 薪械 胁 泻芯虂卸薪芯屑褍 卸邪虂薪褉褨.
- lemma: 褋谢械薪谐
  translation: slang
  pos: noun
  usage: 小谢械薪谐 锌芯褌褉械斜褍虂褦 褌芯虂褔薪芯谐芯 邪写褉械褋邪虂褌邪.
- lemma: 锌褉芯褋褌芯褉褨虂褔褔褟
  translation: colloquial low-register speech
  pos: noun
  usage: 袩褉芯褋褌芯褉褨虂褔褔褟 薪械写芯褉械虂褔薪械 胁 芯褎褨褑褨虂泄薪芯屑褍 谢懈褋褌褨.
- lemma: 泻芯褉械泻褌褍虂褉邪
  translation: proofreading, correction pass
  pos: noun
  usage: 袣芯褉械泻褌褍虂褉邪 锌械褉械胁褨褉褟虂褦 褑褨虂谢褨褋薪褨褋褌褜 褉械谐褨虂褋褌褉褍.
- lemma: 胁懈褉邪虂蟹薪褨褋褌褜
  translation: expressiveness
  pos: noun
  usage: 袙懈褉邪虂蟹薪褨褋褌褜 屑邪虂褦 胁褨写锌芯胁褨写邪虂褌懈 卸邪虂薪褉褍.
- lemma: 胁锌褉邪虂胁薪褨褋褌褜
  translation: skillfulness
  pos: noun
  usage: 袦芯虂胁薪邪 胁锌褉邪虂胁薪褨褋褌褜 锌褉芯褟胁谢褟虂褦褌褜褋褟 胁 褌芯虂褔薪芯屑褍 锌械褉械屑懈泻邪虂薪薪褨.
- lemma: 褎邪屑褨谢褜褟虂褉薪褨褋褌褜
  translation: over-familiarity
  pos: noun
  usage: 肖邪屑褨谢褜褟虂褉薪褨褋褌褜 褉褍泄薪褍虂褦 芯褎褨褑褨虂泄薪懈泄 褌芯薪.
- lemma: 褋褍斜芯褉写懈薪邪虂褑褨褟
  translation: subordination, hierarchy of address
  pos: noun
  usage: 小褍斜芯褉写懈薪邪虂褑褨褟 胁锌谢懈胁邪虂褦 薪邪 褎芯虂褉屑褍谢褍 蟹胁械褉褌邪虂薪薪褟.
