version: '1.0'
module: register-public-discourse
level: b2
inline: []
workbook:
- type: reading
  id: public-discourse-news-comments
  title: 'Читання: новина і коментарі'
  instruction: Прочитайте навчальний уривок і визначте, як змінюється регістр.
  source: Навчальний уривок для модуля B2.
  text: 'Редакція міського медіа повідомила, що громадські слухання щодо нового маршруту транспорту перенесено на 14 серпня. У повідомленні зазначено, що причиною стала технічна підготовка зали, але документа з поясненням ще не оприлюднено. У коментарях читачі реагують по-різному: "Знову все без пояснень", "Та ну, це ж клікбейт", "Дайте посилання на рішення". Один коментатор просить джерело, інший одразу звинувачує організаторів у маніпуляції. Тому читачеві треба відділити факт перенесення від емоційних реакцій.'
  tasks:
  - Назвіть факт, який можна перевірити.
  - Знайдіть розмовну реакцію в коментарях.
  - Поясніть, чому фраза про маніпуляцію потребує доказу.
  - Запропонуйте нейтральний заголовок до цього тексту.
  - Поясніть, який регістр доречний для офіційного запиту.
- type: fill-in
  title: 'Медіарегістр: ключові слова'
  instruction: Заповніть пропуски доречними словами.
  items:
  - sentence: Перед поширенням новини перевірте ____.
    answer: джерело
    options:
    - джерело
    - вигук
    - сленг
    - демінутив
    explanation: Джерело є основою фактчекінгу.
  - sentence: Заголовок, який перебільшує зміст тексту, називається ____.
    answer: клікбейт
    options:
    - клікбейт
    - репортаж
    - огляд
    - етикет
    explanation: Клікбейт обіцяє більше, ніж дає текст.
  - sentence: Спосіб подати подію в певній рамці - це ____.
    answer: фреймінг
    options:
    - фреймінг
    - демінутив
    - еліпсис
    - привітання
    explanation: Фреймінг організовує погляд читача.
  - sentence: Перевірка тверджень і джерел - це ____.
    answer: фактчекінг
    options:
    - фактчекінг
    - самовиправлення
    - суржик
    - інтонація
    explanation: Фактчекінг допомагає не поширювати фейки.
  - sentence: Слово або фраза на зразок 'ну', 'типу', 'короче' може бути ____.
    answer: дискурсивним маркером
    options:
    - дискурсивним маркером
    - офіційним терміном
    - джерелом
    - репортажем
    explanation: Такі маркери організовують розмову.
  - sentence: Пропуск частини речення в розмові називається ____.
    answer: еліпсисом
    options:
    - еліпсисом
    - фейком
    - фреймінгом
    - закликом
    explanation: Еліпсис природний у коротких репліках.
  - sentence: Свідомий перехід між стилями - це ____.
    answer: перемикання регістрів
    options:
    - перемикання регістрів
    - оприлюднення
    - спростування
    - цитування
    explanation: Регістр змінюють за ситуацією й адресатом.
  - sentence: Слово 'капець' передає емоцію, але не замінює ____.
    answer: аргумент
    options:
    - аргумент
    - вигук
    - коментар
    - паузу
    explanation: Розмовна емоція не є доказом.
  - sentence: Текст, який навмисно вводить читача в оману, може бути ____.
    answer: фейком
    options:
    - фейком
    - епітетом
    - протоколом
    - вступом
    explanation: Фейк треба перевіряти й не поширювати без спростування.
  - sentence: Публічне твердження без доказу краще назвати ____.
    answer: припущенням
    options:
    - припущенням
    - документом
    - цитатою
    - репортажем
    explanation: Припущення не можна подавати як факт.
- type: error-correction
  title: Редагування публічного мовлення
  instruction: Виправте кальку, суржик або стилістичний дисонанс.
  items:
  - sentence: Редакція взяла учать у фактчекінгу.
    error: учать
    answer: участь
    error_type: word
    explanation: 'Потрібна форма: участь.'
  - sentence: Це рішення являється важливим чинником довіри.
    error: являється
    answer: є
    error_type: word
    explanation: 'У цьому значенні природно: є.'
  - sentence: В теперішній час джерело не підтверджено.
    error: В теперішній час
    answer: Зараз
    error_type: phrase
    explanation: Зараз або нині звучить простіше й природніше.
  - sentence: Керуючий орган оприлюднив заяву.
    error: Керуючий орган
    answer: Керівний орган
    error_type: phrase
    explanation: 'Для органу природно: керівний.'
  - sentence: Діючий закон не пояснює цієї процедури.
    error: Діючий закон
    answer: Чинний закон
    error_type: phrase
    explanation: 'Нормативне словосполучення: чинний закон.'
  - sentence: У новині все було просто капець.
    error: просто капець
    answer: дуже проблемно
    error_type: phrase
    explanation: У новині потрібен нейтральніший регістр.
  - sentence: Прапор описали як жовто-блакитний.
    error: жовто-блакитний
    answer: синьо-жовтий
    error_type: phrase
    explanation: Точний нормативний опис прапора України - синьо-жовтий.
  - sentence: Автор використовує фейк як перевірене джерело.
    error: фейк як перевірене джерело
    answer: неперевірене твердження
    error_type: phrase
    explanation: Фейк не може бути джерелом; його треба спростовувати або перевіряти.
- type: select
  title: Обери доречні варіанти
  instruction: Позначте всі речення, які відповідають названому регістру або аналітичному завданню.
  items:
  - question: Інформаційна замітка.
    min_correct: 2
    options:
    - text: Комітет оприлюднив звіт у п'ятницю.
      correct: true
    - text: Ви не повірите, що сталося!
      correct: false
    - text: У повідомленні зазначено дату й місце події.
      correct: true
    - text: Та ну, це просто капець.
      correct: false
    explanation: Замітка називає факт без розмовної реакції.
  - question: Розмовна реакція.
    min_correct: 2
    options:
    - text: Ого, а джерело там є?
      correct: true
    - text: Редакція надала посилання на документ.
      correct: false
    - text: Та ну, це схоже на клікбейт.
      correct: true
    - text: Рішення потребує додаткового обговорення.
      correct: false
    explanation: Розмовна реакція має маркери живої розмови.
  - question: Критичний аналіз.
    min_correct: 2
    options:
    - text: У тексті є оцінка, але немає посилання на джерело.
      correct: true
    - text: Усі нормальні люди й так розуміють правду.
      correct: false
    - text: Заголовок створює страх без конкретного факту.
      correct: true
    - text: Автори точно все приховують.
      correct: false
    explanation: Критичний аналіз називає мовний механізм і доказову проблему.
  - question: Нормативне публічне мовлення про Україну.
    min_correct: 2
    options:
    - text: Українська мова має власну традицію публічного мовлення.
      correct: true
    - text: Малоросійське наріччя треба берегти в лапках без коментаря.
      correct: false
    - text: Прапор України - синьо-жовтий.
      correct: true
    - text: Тризуб можна порівнювати з імперськими символами для краси.
      correct: false
    explanation: Потрібна точна, деімперська термінологія.
  - question: Перемикання регістру.
    min_correct: 2
    options:
    - text: Та ну, це клікбейт. → Заголовок не відповідає змісту тексту.
      correct: true
    - text: Дайте джерело. → Короче, давайте якось.
      correct: false
    - text: Капець, усе перенесли. → Слухання перенесено без пояснення причин.
      correct: true
    - text: Уряд ухвалив рішення. → Урядик щось там зробив.
      correct: false
    explanation: Перемикання має зберігати зміст і змінювати регістр.
  - question: Факт і оцінка.
    min_correct: 2
    options:
    - text: Звіт оприлюднили 12 липня.
      correct: true
    - text: Звіт ганебний, бо всі це бачать.
      correct: false
    - text: Текст оцінює рішення, але не називає джерела.
      correct: true
    - text: Очевидно, винні всі організатори.
      correct: false
    explanation: Факт і аналіз мають бути перевірюваними.
  - question: Джерело і доказ.
    min_correct: 2
    options:
    - text: У тексті є посилання на офіційний документ.
      correct: true
    - text: Кажуть, що це всі давно знають.
      correct: false
    - text: Автор називає, хто підтвердив інформацію.
      correct: true
    - text: Емоційна цитата сама доводить факт.
      correct: false
    explanation: Джерело й доказ мають бути названі прямо.
  - question: Етичний публічний коментар.
    min_correct: 2
    options:
    - text: Попросімо оприлюднити підставу рішення.
      correct: true
    - text: Очевидно, вони все приховують.
      correct: false
    - text: Без документа це твердження потребує перевірки.
      correct: true
    - text: Немає сенсу читати, усі винні.
      correct: false
    explanation: Етичний коментар формулює перевірюване питання або коректний заклик.
- type: group-sort
  title: Розподіліть мовні ознаки
  instruction: Перетягніть елементи до відповідного регістру.
  groups:
  - name: Публіцистичний
    items:
    - оприлюднити звіт
    - громадськість вимагає пояснень
    - риторичне запитання
    - оцінна лексика з доказом
    - спростувати фейк
  - name: Розмовний
    items:
    - та ну
    - короче
    - ого
    - неповне речення
    - самовиправлення
  - name: Критичний аналіз
    items:
    - перевірити джерело
    - відділити факт від оцінки
    - назвати фреймінг
    - попросити посилання
    - уточнити суб'єкта дії
- type: match-up
  title: Термін і пояснення
  instruction: Поєднайте термін із точним поясненням.
  pairs:
  - left: Клікбейт
    right: заголовок або подача, що перебільшує зміст
  - left: Фактчекінг
    right: перевірка твердження за джерелами
  - left: Фреймінг
    right: рамка, у якій подають подію
  - left: Еліпсис
    right: пропуск частини речення, зрозумілої з контексту
  - left: Дискурсивний маркер
    right: слово або фраза, що організовує розмову
  - left: Оцінна лексика
    right: слова, які передають ставлення до явища
  - left: Суржик
    right: змішування українських і російських мовних елементів
  - left: Медіаграмотність
    right: уміння критично читати й перевіряти медіатексти
  - left: Репортаж
    right: жанр, що показує подію з місця
  - left: Замітка
    right: коротке повідомлення про факт
  - left: Демінутив
    right: форма, що може створювати близькість або іронію
  - left: Стилістичний дисонанс
    right: невідповідність регістру ситуації
- type: reading
  id: public-discourse-interview-conversation
  title: 'Читання: інтерв''ю переходить у розмову'
  instruction: Прочитайте діалог і визначте місця перемикання регістру.
  source: Навчальний діалог для модуля B2.
  text: 'Журналістка: Яка ваша позиція щодо перенесення слухань? Респондент: Офіційно ми очікуємо письмового пояснення від організаторів. Журналістка: А якщо не для протоколу? Респондент: Якщо чесно, люди вже втомилися чекати. Короче, потрібна нормальна комунікація. Журналістка: Тоді в матеріалі я залишу офіційну позицію, а неформальну реакцію використаю як контекст.'
  tasks:
  - Знайдіть офіційно-публічну репліку.
  - Знайдіть розмовний маркер.
  - Поясніть, чому журналістка не може просто змішати два регістри.
  - Перепишіть останню репліку респондента нейтрально.
  - Назвіть етичний ризик неформальної цитати.
- type: fill-in
  title: Перемикання регістру
  instruction: Виберіть слово або фразу, яка робить речення доречним у публічному регістрі.
  items:
  - sentence: Та ну, це фейк. → Це твердження не має ____.
    answer: джерела
    options:
    - джерела
    - вигуку
    - сленгу
    - паузи
  - sentence: Капець, усе перенесли. → Слухання ____ без пояснення причин.
    answer: перенесено
    options:
    - перенесено
    - емоційно
    - класно
    - типу
  - sentence: Короче, вони нічого не сказали. → У повідомленні немає ____ пояснення.
    answer: достатнього
    options:
    - достатнього
    - розмовного
    - кумедного
    - смішного
  - sentence: Ого, звучить дивно. → Це формулювання потребує ____.
    answer: уточнення
    options:
    - уточнення
    - мему
    - вигуку
    - демінутива
  - sentence: Вони все приховують. → Автор не називає ____ дії.
    answer: суб'єкта
    options:
    - суб'єкта
    - сленгу
    - вигуку
    - жесту
  - sentence: Це рішення топ. → Це рішення ____.
    answer: доречне
    options:
    - доречне
    - топове
    - капцеве
    - ну
  - sentence: Це ж клікбейт! → Заголовок ____ зміст тексту.
    answer: перебільшує
    options:
    - перебільшує
    - висвітлює
    - оприлюднює
    - цитує
  - sentence: Ну, не знаю. → Позиція потребує ____.
    answer: аргументації
    options:
    - аргументації
    - вигуку
    - сленгу
    - паузи
  - sentence: Вау, вони щось там вирішили. → Організатори ____ рішення без пояснення.
    answer: ухвалили
    options:
    - ухвалили
    - вигукнули
    - пожартували
    - натякнули
  - sentence: Типу все ясно. → Позиція потребує ____ формулювання.
    answer: точного
    options:
    - точного
    - розмовного
    - емоційного
    - жартівливого
- type: error-correction
  title: Факт, оцінка, припущення
  instruction: Зробіть речення точнішим для критичного аналізу.
  items:
  - sentence: Очевидно, вони приховують правду.
    error: Очевидно
    answer: Можливо
    error_type: word
    explanation: Без доказу треба формулювати обережніше.
  - sentence: Експерти заявили, що все погано.
    error: Експерти
    answer: Неназвані експерти
    error_type: word
    explanation: Якщо імен немає, це треба позначити.
  - sentence: Усі нормальні люди підтримують це рішення.
    error: Усі нормальні люди
    answer: Прихильники рішення
    error_type: phrase
    explanation: Фраза тисне на читача і створює рамку свої-чужі.
  - sentence: Це стовідсотково маніпуляція.
    error: стовідсотково
    answer: може бути
    error_type: word
    explanation: Без аналізу механізму потрібна обережність.
  - sentence: Новина доказує, що всі винні.
    error: доказує
    answer: показує
    error_type: word
    explanation: 'У публіцистичному аналізі природніше: показує або доводить, залежно від доказів.'
  - sentence: Коментарі являються реакцією громадськості.
    error: являються
    answer: є
    error_type: word
    explanation: У цьому значенні потрібно є.
  - sentence: Автор доказує, що всі проти рішення.
    error: доказує
    answer: стверджує
    error_type: word
    explanation: 'Без наведених доказів краще писати: стверджує або припускає.'
  - sentence: Це просто клікбейт і крапка.
    error: і крапка
    answer: бо заголовок не відповідає змісту
    error_type: phrase
    explanation: Публіцистична оцінка має називати підставу.
- type: mark-the-words
  title: Позначте розмовні маркери
  instruction: Позначте слова й фрази, які належать до розмовного регістру.
  text: Ну, я не знаю, короче, стаття типу цікава, ніби є джерело, але ого, який заголовок, та ну, це схоже на клікбейт.
  answers:
  - Ну
  - короче
  - типу
  - ніби
  - ого
  - та ну
- type: cloze
  title: 'Клоз: критичний коментар'
  instruction: Заповніть пропуски словами, які роблять коментар аналітичним.
  blanks:
  - id: 1
    answer: емоцію
    options:
    - емоцію
    - дату
    - жест
    - адресу
  - id: 2
    answer: джерело
    options:
    - джерело
    - вигук
    - сленг
    - демінутив
  - id: 3
    answer: оцінка
    options:
    - оцінка
    - пауза
    - жест
    - міміка
  - id: 4
    answer: факту
    options:
