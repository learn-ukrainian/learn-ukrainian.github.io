  - type: essay-response
    id: public-discourse-essay
    title: "Письмо: одна новина у двох стилях"
    instruction: "Напишіть загалом мінімум 300 слів: одну новину як публіцистичну замітку і як повідомлення другу в месенджері. Потім порівняйте мовні засоби."
    prompt: "Новина: у місті відкриють новий парк після громадського обговорення. Подайте її у двох регістрах без зміни фактів."
    min_words: 300
    model_answer: |-
      > [!model-answer]
      > Публіцистичний варіант. Міська рада повідомила, що після громадського обговорення в мікрорайоні Озерний розпочнуть облаштування нового парку. За даними департаменту благоустрою, роботи стартують 15 серпня і триватимуть до кінця жовтня. У проєкті передбачено дитячий майданчик, безбар'єрні доріжки, освітлення, місця для відпочинку та збереження частини старих дерев. Кошторис і графік робіт оприлюднять на сайті громади. Мешканці можуть подати додаткові пропозиції через електронну форму до 20 липня.
      >
      > Розмовний варіант. Привіт! Ти чув? В Озерному нарешті робитимуть парк. Не просто лавочки поставлять, а планують доріжки, світло, дитячий майданчик і нормальний доступ для людей на кріслах колісних. Починають 15 серпня, завершити хочуть до кінця жовтня. Якщо маєш ідеї, можна ще написати пропозицію до 20 липня на сайті громади. Класно, що після обговорення частину старих дерев обіцяють лишити.
      >
      > Порівняння. У публіцистичному варіанті є джерело, дати, офіційні назви й нейтральна оцінка. У розмовному варіанті з'являються привітання, коротші речення, емоційні слова "нарешті" й "класно", але факти не змінено. Це і є свідоме перемикання регістру.
