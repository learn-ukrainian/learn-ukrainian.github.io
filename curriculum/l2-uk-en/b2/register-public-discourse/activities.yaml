  id: public-discourse-comment-rewrite
  title: Перепишіть коментар у публіцистичному регістрі
  instruction: Перепишіть розмовний коментар як короткий публічний аргумент.
  prompt: 'Розмовний варіант: «Капець, вони знову все перенесли і нічого не пояснили». Напишіть 3-4 речення у публіцистичному регістрі: назвіть факт, проблему, джерело або його відсутність і коректний заклик.'
  min_words: 150
  model_answer: Громадські слухання перенесено, але в повідомленні поки не подано достатнього пояснення причини. Така комунікація може знижувати довіру, тому відповідальній установі варто оприлюднити документ або коротко пояснити підставу рішення. Без джерела читачам складно відділити факт перенесення від емоційних реакцій у коментарях. Коректний публічний коментар має вимагати прозорості, а не замінювати перевірку різкими звинуваченнями.
  rubric:
  - criteria: Факт
    description: Є перевірюваний факт без перебільшення.
    points: 2
  - criteria: Оцінка
    description: Оцінка спирається на названу причину.
    points: 2
  - criteria: Регістр
    description: Немає розмовних маркерів типу «капець», «короче».
    points: 2
  - criteria: Дія
    description: Є коректний заклик або питання до відповідальної сторони.
    points: 2
