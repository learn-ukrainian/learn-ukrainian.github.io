version: '1.0'
module: register-public-discourse
level: b2
inline:
  - type: select
    title: Доречний регістр для ситуації
    instruction: Оберіть формулювання, яке відповідає ситуації та аудиторії.
    items:
      - question: Новина на сайті громади про зміну маршруту.
        min_correct: 2
        options:
          - text: Маршрут 5 тимчасово змінять із 10 до 14 липня через ремонт водогону.
            correct: true
          - text: Капець, маршрут знову їде якось не так.
            correct: false
          - text: Привіт, хто знає, де там автобус?
            correct: false
          - text: Ну, типу, транспорт буде не там.
            correct: false
          - text: За повідомленням міської ради, автобуси тимчасово оминатимуть вулицю Шевченка.
            correct: true
        explanation: Публіцистичний/офіційний канал потребує факту, строку й причини.
      - question: Повідомлення другу в месенджері про ту саму подію.
        min_correct: 2
        options:
          - text: Привіт! Маршрут 5 з 10 до 14 липня їде в об'їзд, бо ремонтують водогін.
            correct: true
          - text: У рішенні комісії зазначено порядок оминання.
            correct: false
          - text: Громадськість повідомляється про транспортну зміну.
            correct: false
          - text: Згідно з актом, здійснюється коригування.
            correct: false
          - text: Глянь перед виходом карту об'їзду на сайті громади.
            correct: true
        explanation: Розмовний канал допускає привітання й простіший синтаксис, але не втрату фактів.
      - question: Коротка репліка у волонтерському чаті.
        min_correct: 2
        options:
          - text: Друзі, потрібно 12 людей на пакування в суботу з 10:00.
            correct: true
          - text: Шановні адресати, просимо здійснити присутність.
            correct: false
          - text: Поширте негайно, бо всі байдужі!
            correct: false
          - text: За повідомленням без джерела, хтось щось робить.
            correct: false
          - text: Хто може прийти на 10:00, поставте плюс у чаті.
            correct: true
        explanation: Чат може бути дружнім, але має назвати дію, кількість і час.
      - question: Запитання на публічному брифінгу.
        min_correct: 2
        options:
          - text: Які роботи заплановано і коли вони завершаться?
            correct: true
          - text: Ви знову все зіпсували?
            correct: false
          - text: Ну що, капець буде?
            correct: false
          - text: А можна без подробиць, просто скажіть нормально?
            correct: false
          - text: Яке джерело даних використано для цього рішення?
            correct: true
        explanation: Публічне запитання має не підштовхувати й не принижувати.
      - question: Коментар у медіааналізі.
        min_correct: 2
        options:
          - text: Заголовок перебільшує наслідки й не називає джерела.
            correct: true
          - text: Це просто дурня, не читайте.
            correct: false
          - text: Класно хайпонули, прикольно.
            correct: false
          - text: Автори точно ненавидять місто.
            correct: false
          - text: Бракує конкретного джерела й часу події.
            correct: true
        explanation: Медіааналіз називає прийом і доказ, а не лише емоцію.
      - question: Офіційне спростування фейку.
        min_correct: 2
        options:
          - text: Повідомлення не підтверджено; перевіряйте інформацію на офіційному сайті громади.
            correct: true
          - text: Не ведіться, це якась дурня.
            correct: false
          - text: Капець, знову хтось щось вигадав.
            correct: false
          - text: Короче, не ясно.
            correct: false
          - text: Офіційні канали не підтвердили цю інформацію станом на 18:00.
            correct: true
        explanation: Спростування має назвати статус інформації й канал перевірки.
      - question: Неформальне нагадування одногрупникам.
        min_correct: 2
        options:
          - text: Привіт! Не забудьте, зустріч завтра о 12:00 в аудиторії 305.
            correct: true
          - text: Громадськість повідомляється про проведення зустрічі.
            correct: false
          - text: Захід буде висвітлено у встановленому порядку.
            correct: false
          - text: Усі, хто не прийде, зривають процес.
            correct: false
          - text: Якщо не встигаєте, напишіть у чат до вечора.
            correct: true
        explanation: Розмовне нагадування може бути теплим і коротким, але точним.
      - question: Аналітичний коментар про медіатекст.
        min_correct: 2
        options:
          - text: Текст використовує фреймінг конфлікту й не подає позицію другої сторони.
            correct: true
          - text: Автор просто поганий, тому текст поганий.
            correct: false
          - text: Типу все ясно, там маніпуляція.
            correct: false
          - text: Мені не подобається, отже це фейк.
            correct: false
          - text: Висновок потребує прикладу з тексту, а не лише оцінки.
            correct: true
        explanation: Аналітичний регістр потребує терміна, доказу й обмеження висновку.
  - type: match-up
    title: "Публічний дискурс: терміни"
    instruction: "Поєднайте поняття з поясненням."
    pairs:
      - left: "факт"
        right: "перевірна інформація про подію"
      - left: "оцінка"
        right: "ставлення або інтерпретація події"
      - left: "джерело"
        right: "той, хто надає інформацію"
      - left: "фреймінг"
        right: "рамка, у якій подано тему"
      - left: "клікбейт"
        right: "заголовок, що перебільшує заради уваги"
      - left: "маніпуляція"
        right: "вплив, який приховує важливу інформацію або тисне"
      - left: "риторичне запитання"
        right: "запитання, що веде до позиції, а не просить факту"
      - left: "аудиторія"
        right: "люди, для яких створено повідомлення"
      - left: "контраргумент"
        right: "можливе заперечення, яке треба врахувати"
      - left: "заклик до дії"
        right: "чітка інструкція, що має зробити адресат"
  - type: fill-in
    title: "Формули ясного повідомлення"
    instruction: "Вставте слово або формулу."
    items:
      - sentence: "За ____ міської ради, рух обмежать із 10 липня."
        answer: "повідомленням"
        options: ["повідомленням", "емоцією", "чуткою", "жартом"]
        explanation: "За повідомленням називає джерело."
      - sentence: "Карту об'їзду ____ сьогодні о 18:00."
        answer: "оприлюднять"
        options: ["оприлюднять", "заховають", "вигадують", "знецінять"]
        explanation: "Оприлюднити - зробити публічним."
      - sentence: "Клікбейтний заголовок часто ____ зміст."
        answer: "перебільшує"
        options: ["перебільшує", "уточнює", "підписує", "спростовує"]
        explanation: "Клікбейт привертає увагу перебільшенням."
      - sentence: "Фреймінг - це ____ подання теми."
        answer: "рамка"
        options: ["рамка", "помилка", "страва", "реквізит"]
        explanation: "Фрейм задає спосіб бачення."
      - sentence: "У публічному тексті треба відрізняти факт від ____."
        answer: "оцінки"
        options: ["оцінки", "дати", "джерела", "карти"]
        explanation: "Оцінка - ставлення до факту."
      - sentence: "Заклик до дії має бути ____."
        answer: "конкретним"
        options: ["конкретним", "таємним", "сором'язливим", "розмитим"]
        explanation: "Адресат має знати, що робити."
      - sentence: "Розмите джерело виглядає як: ____ кажуть."
        answer: "експерти"
        options: ["експерти", "дата", "адреса", "маршрут"]
        explanation: "Без уточнення це слабке джерело."
      - sentence: "Фальшива ____ звужує вибір до двох крайніх варіантів."
        answer: "дилема"
        options: ["дилема", "паска", "анотація", "деталь"]
        explanation: "Фальшива дилема приховує інші можливості."
      - sentence: "Аудиторна ____ означає зміну тону й деталей під слухача."
        answer: "адаптація"
        options: ["адаптація", "маніпуляція", "крашанка", "інверсія"]
        explanation: "Адаптація не змінює фактів, а змінює подання."
      - sentence: "Спростування має давати перевірний ____."
        answer: "канал"
        options: ["канал", "ярлик", "страх", "слоган"]
        explanation: "Канал перевірки допомагає не поширювати фейк."
  - type: error-correction
    title: 'Стилістичний дисонанс: новина і розмова'
    instruction: Виправте канцеляризм у розмові або сленг у публіцистичному тексті.
    items:
      - sentence: Привіт! Здійснюється перенесення нашої зустрічі на 18:00.
        error: Здійснюється перенесення
        correction: переносимо зустріч
        explanation: У чаті краще природне дієслово.
      - sentence: Капець, міська рада ухвалила рішення про бюджет.
        error: Капець
        correction: Міська рада ухвалила рішення про бюджет
        explanation: У новині сленг треба прибрати.
      - sentence: Друзі, просимо забезпечити присутність учасників.
        error: забезпечити присутність
        correction: прийти
        explanation: У волонтерському чаті канцеляризм звучить зайво.
      - sentence: 'У репортажі: "Прикольно, що дорогу нарешті зробили".'
        error: Прикольно
        correction: Мешканці позитивно оцінюють завершення ремонту
        explanation: Репортаж може цитувати розмовну мову, але авторський текст має бути точним.
      - sentence: 'Повідомлення другу: "Відповідно до графіка руху відбудеться коригування".'
        error: Відповідно до графіка руху відбудеться коригування
        correction: автобус їхатиме за новим графіком
        explanation: Для друга потрібна ясність, а не офіційна формула.
      - sentence: 'Новина: "Привіт, друзі, ставте плюсики, якщо читали бюджет".'
        error: Привіт, друзі, ставте плюсики
        correction: Міська рада оприлюднила бюджет і запросила мешканців на обговорення
        explanation: Новина потребує нейтрального публіцистичного тону.
      - sentence: 'Чат сусідів: "Громадськість повідомляється про необхідність здійснити прибирання".'
        error: Громадськість повідомляється про необхідність здійснити
        correction: Сусіди, треба
        explanation: У чаті краще коротка пряма формула.
      - sentence: 'Репортаж: "Типу ремонт уже майже все, от".'
        error: Типу ремонт уже майже все, от
        correction: Ремонт майже завершено, повідомили підрядники
        explanation: Дискурсивні маркери доречні в розмові, але не в авторському тексті репортажу.
  - type: group-sort
    title: Публіцистичний, розмовний, нейтральний
    instruction: Розподіліть слова й формули за основним регістром.
    groups:
      - name: Публіцистичний
        items:
          - репортаж
          - висвітлювати подію
          - громадськість
          - оприлюднити рішення
          - за повідомленням джерела
      - name: Розмовний
        items:
          - класно
          - привіт
          - прикольно
          - капець
          - короче
      - name: Нейтральний
        items:
          - подія
          - зміна маршруту
          - зустріч о 10:00
          - перевірити інформацію
          - поставити запитання
workbook:
  - type: reading
    id: public-discourse-reading
    title: "Читання: зміна маршруту"
    instruction: "Прочитайте повідомлення й оцініть ясність, джерела та тон."
    source: "Навчальний публічний текст для модуля B2."
    text: >-
      За повідомленням міської ради, з 10 до 14 липня маршрут 5 тимчасово оминатиме вулицю Шевченка через ремонт водогону. Автобуси курсуватимуть через вулиці Садову та Миру. Карту об'їзду оприлюднять сьогодні о 18:00 на сайті громади та в офіційному телеграм-каналі. Мешканців просять планувати поїздки заздалегідь. Якщо ремонт завершать раніше, маршрут повернуть до звичного руху після перевірки безпеки дороги.
    tasks:
      - "Випишіть факт, джерело й наступний крок."
      - "Поясніть, чому цей текст не є клікбейтом."
      - "Перепишіть повідомлення для короткого волонтерського чату без втрати фактів."
  - type: true-false
    title: "Правда чи неправда: публічний дискурс"
    instruction: "Оцініть твердження."
    items:
      - statement: "Публічне повідомлення має називати дію, час і джерело, якщо це важливо для рішення людей."
        correct: true
        explanation: "Це основа ясності."
      - statement: "Клікбейт завжди підвищує довіру до новини."
        correct: false
        explanation: "Він привертає увагу ціною точності."
      - statement: "Фреймінг неминучий, але його можна зробити прозорішим."
        correct: true
        explanation: "Кожен текст має рамку подання."
      - statement: "Розмите джерело експерти кажуть достатнє для відповідальної новини."
        correct: false
        explanation: "Потрібно конкретизувати експертів."
      - statement: "Риторичні запитання можуть бути етичними, якщо не замінюють доказів."
        correct: true
        explanation: "Риторика не обов'язково маніпуляція."
      - statement: "Фальшива дилема приховує інші можливі позиції."
        correct: true
        explanation: "Вона звужує вибір."
      - statement: "У широкому публічному тексті всі професійні терміни можна лишати без пояснення."
        correct: false
        explanation: "Аудиторія може не знати термінів."
      - statement: "Спростування фейку має давати канал перевірки."
        correct: true
        explanation: "Інакше читач не знає, де перевірити."
      - statement: "Розмовний тон у волонтерському чаті може бути доречним."
        correct: true
        explanation: "Канал і аудиторія впливають на регістр."
      - statement: "Емоційний ярлик завжди кращий за опис позиції опонента."
        correct: false
        explanation: "Ярлики часто маніпулюють."
  - type: critical-analysis
    id: public-discourse-analysis
    title: "Аналіз маніпулятивного повідомлення"
    target_text: "Шок! Експерти кажуть, що місто паралізують. Поширте негайно, поки влада все приховує!"
    questions:
      - "Які маніпулятивні прийоми є в повідомленні?"
      - "Якої інформації бракує?"
      - "Запропонуйте відповідальніший варіант."
    model_answers:
      - "Є клікбейт, розмите джерело, штучна терміновість і недоведене звинувачення."
      - "Бракує конкретного джерела, події, часу, причини, наслідків і каналу перевірки."
      - "Відповідальніше: За повідомленням міської ради, маршрут 5 тимчасово змінять через ремонт водогону з 10 до 14 липня; деталі оприлюднять на сайті громади."
  - type: fill-in
    title: "Медіаграмотність у реченнях"
    instruction: "Вставте слово, яке робить аналіз точним."
    items:
      - sentence: "Заголовок не відповідає змісту, отже це може бути ____."
        answer: "клікбейт"
        options: ["клікбейт", "доказ", "маршрут", "джерело"]
        explanation: "Клікбейт перебільшує або викривлює."
      - sentence: "Слова експерти кажуть без імені є ____ джерелом."
        answer: "розмитим"
        options: ["розмитим", "точним", "офіційним", "достатнім"]
        explanation: "Джерело треба конкретизувати."
      - sentence: "Або з нами, або проти нас - це фальшива ____."
        answer: "дилема"
        options: ["дилема", "карта", "анотація", "паска"]
        explanation: "Вона приховує інші позиції."
      - sentence: "Текст має відрізняти факт від ____."
        answer: "оцінки"
        options: ["оцінки", "дати", "джерела", "адреси"]
        explanation: "Оцінка - ставлення до факту."
      - sentence: "У широкому повідомленні термін краще ____."
        answer: "пояснити"
        options: ["пояснити", "ускладнити", "заховати", "знецінити"]
        explanation: "Пояснення робить текст доступним."
      - sentence: "Фрейм конфлікту може ____ інші аспекти теми."
        answer: "приховувати"
        options: ["приховувати", "уточнювати", "підписувати", "фарбувати"]
        explanation: "Фрейм висуває одне й відсуває інше."
      - sentence: "Заклик до дії має називати час, місце й ____."
        answer: "контакт"
        options: ["контакт", "ярлик", "страх", "плітку"]
        explanation: "Адресат має знати, як долучитися."
      - sentence: "Повідомлення не підтверджено, тому його не варто ____ як факт."
        answer: "поширювати"
        options: ["поширювати", "читати", "бачити", "чути"]
        explanation: "Неперевірену інформацію не поширюють як факт."
      - sentence: "Аудиторна адаптація змінює подання, але не ____."
        answer: "факти"
        options: ["факти", "шрифт", "дату", "карту"]
        explanation: "Факти не можна змінювати під аудиторію."
      - sentence: "Етична риторика веде до дії, але не ____ перевірку."
        answer: "блокує"
