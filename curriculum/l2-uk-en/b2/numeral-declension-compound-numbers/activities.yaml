  - id: workbook-5
    type: essay-response
    title: "Редакторський коментар до чисел"
    prompt: >-
      Напишіть 130-180 слів як редакторський коментар до аналітичного звіту. Використайте щонайменше шість складених або складних числівників у непрямих відмінках, одне число з тисяча/мільйон, один збірний числівник і одну форму півтора/півтори.
    rubric:
      - criteria: "Відмінювання компонентів"
        description: "Складені й складні числівники мають потрібні форми в непрямих відмінках."
        points: 4
      - criteria: "Керування"
        description: "Форми з тисяча/мільйон/мільярд правильно керують залежним іменником."
        points: 3
      - criteria: "Контрасти"
        description: "Є точне розрізнення збірного числівника, кількісної форми та півтора/півтори."
        points: 3
    model_answer: |-
      > [!model-answer]
      > У звіті варто перевірити кілька числових форм. У таблиці про заявки правильно писати: комісія працювала з вісьмастами п'ятдесятьма чотирма зверненнями, але не отримала восьмисот п'ятдесяти чотирьох підтверджень. Дані передано трьомстам сорока двом громадам, а додаток розміщено на двох тисячах трьохстах сторінках архіву. У фінансовому розділі фраза з трьома мільйонами гривень нормативна, бо мільйонами керує залежним родовим гривень. Окремо виправив би приклад про учасників: двоє хлопців можливо, але для жіночої групи треба дві студентки. Нарешті, доповідь тривала півтори години, а не півтора години.
