version: '1.0'
module: numeral-declension-compound-numbers
level: b2
inline:
  - type: fill-in
    title: "Де змінюється числівник?"
    instruction: "Виберіть форму, яка відповідає відмінку й типу числівника."
    items:
      - sentence: "У звіті немає ____ сторінок."
        answer: "п'ятдесяти"
        options: ["п'ятдесяти", "п'ятдесят", "п'ятдесятьма", "п'ятидесяти"]
        explanation: "У 50-80 змінюється друга частина: п'ятдесяти."
      - sentence: "Комісія працювала з ____ учасниками."
        answer: "шістдесятьма"
        options: ["шістдесятьма", "шістдесят", "шістдесяти", "шістьдесятьма"]
        explanation: "Орудний відмінок: з шістдесятьма учасниками."
      - sentence: "Рішення передали ____ заявникам."
        answer: "сімдесяти"
        options: ["сімдесяти", "сімдесят", "сімдесятьма", "семидесяти"]
        explanation: "Давальний для 70 має форму сімдесяти."
      - sentence: "На ____ сторінках додатка подано карти."
        answer: "вісімдесяти"
        options: ["вісімдесяти", "вісімдесят", "вісімдесятьма", "восьмидесяти"]
        explanation: "Місцевий: на вісімдесяти сторінках."
      - sentence: "Архів не має ____ примірників."
        answer: "двохсот"
        options: ["двохсот", "двісті", "двомастами", "двомстам"]
        explanation: "У сотнях змінюються обидві частини: двохсот."
      - sentence: "Лист надіслали ____ учасникам."
        answer: "трьомстам"
        options: ["трьомстам", "триста", "трьохсот", "трьомастами"]
        explanation: "Давальний відмінок: трьомстам учасникам."
      - sentence: "Дослідники працювали з ____ анкетами."
        answer: "чотирмастами"
        options: ["чотирмастами", "чотириста", "чотирьохсот", "чотирьомстам"]
        explanation: "Орудний: з чотирмастами анкетами."
      - sentence: "У базі немає ____ записів."
        answer: "восьмисот"
        options: ["восьмисот", "вісімсот", "восьмистам", "вісьмастами"]
        explanation: "Родовий сотень: восьмисот."
      - sentence: "Проєкт працює з ____ п'ятдесятьма чотирма заявками."
        answer: "вісьмастами"
        options: ["вісьмастами", "восьмисот", "восьмистам", "вісімсот"]
        explanation: "Орудний для 854: вісьмастами п'ятдесятьма чотирма."
      - sentence: "Комісія не отримала ____ п'ятдесяти чотирьох заявок."
        answer: "восьмисот"
        options: ["восьмисот", "вісімсот", "восьмистам", "вісьмастами"]
        explanation: "Родовий для 854: восьмисот п'ятдесяти чотирьох."

  - type: select
    title: "Оберіть нормативні форми"
    instruction: "Позначте всі варіанти, які правильно відмінюють числівник і керований іменник."
    items:
      - question: "Родовий відмінок після немає."
        min_correct: 2
        options:
          - text: "немає п'ятдесяти заяв"
            correct: true
          - text: "немає восьмисот сорока сторінок"
            correct: true
          - text: "немає п'ятдесят заяв"
            correct: false
          - text: "немає вісімсот сорок сторінок"
            correct: false
        explanation: "У родовому змінюються потрібні компоненти числівника."
      - question: "Давальний відмінок адресата."
        min_correct: 2
        options:
          - text: "передати трьомстам сорока двом учасникам"
            correct: true
          - text: "надіслати восьмистам двадцяти п'яти адресатам"
            correct: true
          - text: "передати триста сорок двом учасникам"
            correct: false
          - text: "надіслати вісімсот двадцять п'яти адресатам"
            correct: false
        explanation: "Адресат дії вимагає давального: трьомстам, восьмистам."
      - question: "Орудний відмінок із прийменником з."
        min_correct: 2
        options:
          - text: "з п'ятьмастами шістдесятьма підписами"
            correct: true
          - text: "із двомастами тридцятьма примірниками"
            correct: true
          - text: "з п'ятсот шістдесят підписами"
            correct: false
          - text: "із двісті тридцять примірниками"
            correct: false
        explanation: "Орудний має форми п'ятьмастами, шістдесятьма, двомастами."
      - question: "Форми з мільйоном."
        min_correct: 2
        options:
          - text: "з трьома мільйонами гривень"
            correct: true
          - text: "без трьох мільйонів гривень"
            correct: true
          - text: "з три мільйони гривень"
            correct: false
          - text: "з трьома мільйонами гривнями"
            correct: false
        explanation: "Мільйон відмінюється як іменник, а гривень лишається залежним родовим."
      - question: "Місцевий відмінок."
        min_correct: 2
        options:
          - text: "на восьмистах п'ятдесяти чотирьох сторінках"
            correct: true
          - text: "у двох тисячах трьохстах записах"
            correct: true
          - text: "на вісімсот п'ятдесят чотири сторінках"
            correct: false
          - text: "у дві тисячі триста записах"
            correct: false
        explanation: "Після на/у в місцевому значенні компоненти мають місцеві форми."
      - question: "Складені кількісні числівники."
        min_correct: 2
        options:
          - text: "без двох тисяч трьохсот п'ятдесяти чотирьох заявок"
            correct: true
          - text: "перед двома тисячами трьомастами п'ятдесятьма чотирма заявками"
            correct: true
          - text: "без дві тисячі триста п'ятдесят чотири заявок"
            correct: false
          - text: "перед дві тисячі трьома сотнями заявками"
            correct: false
        explanation: "У складеному числівнику відмінюється кожен потрібний компонент."
      - question: "Збірні числівники."
        min_correct: 2
        options:
          - text: "двоє хлопців"
            correct: true
          - text: "троє саней"
            correct: true
          - text: "двоє дівчини"
            correct: false
          - text: "троє студентки"
            correct: false
        explanation: "Збірні природні з чоловічими назвами осіб і pluralia tantum, але не з жіночими іменниками."
      - question: "Півтора / півтори."
        min_correct: 2
        options:
          - text: "півтора року"
            correct: true
          - text: "півтори години"
            correct: true
          - text: "півтори року"
            correct: false
          - text: "півтора години"
            correct: false
        explanation: "Півтора з чоловічим/середнім, півтори з жіночим родом."
      - question: "Дробові числівники."
        min_correct: 2
        options:
          - text: "три четвертих площі"
            correct: true
          - text: "дві цілих п'ять десятих відсотка"
            correct: true
          - text: "три четверті площа"
            correct: false
          - text: "дві цілих п'ять десятих відсоток"
            correct: false
        explanation: "Дробові конструкції керують залежним іменником у родовому."
      - question: "Адміністративний стиль із числом."
        min_correct: 2
        options:
          - text: "угоду підписано з двомастами сорока працівниками"
            correct: true
          - text: "дані надіслано трьомстам двадцяти громадам"
            correct: true
          - text: "угоду підписано з двісті сорок працівниками"
            correct: false
          - text: "дані надіслано триста двадцять громадам"
            correct: false
        explanation: "Прийменник або синтаксична роль визначає відмінок числівника."

  - type: match-up
    title: "Число й відмінок"
    instruction: "Поєднайте контекст із правильною формою."
    pairs:
      - left: "немає 854 заявок"
        right: "немає восьмисот п'ятдесяти чотирьох заявок"
      - left: "передати 854 учасникам"
        right: "передати восьмистам п'ятдесяти чотирьом учасникам"
      - left: "працювати з 854 заявками"
        right: "працювати з вісьмастами п'ятдесятьма чотирма заявками"
      - left: "на 854 сторінках"
        right: "на восьмистах п'ятдесяти чотирьох сторінках"
      - left: "немає 230 примірників"
        right: "немає двохсот тридцяти примірників"
      - left: "з 230 примірниками"
        right: "з двомастами тридцятьма примірниками"
      - left: "без 3 мільйонів гривень"
        right: "без трьох мільйонів гривень"
      - left: "з 3 мільйонами гривень"
        right: "з трьома мільйонами гривень"
      - left: "1.5 року"
        right: "півтора року"
      - left: "1.5 години"
        right: "півтори години"

  - type: error-correction
    title: "Виправте числівникові збої"
    instruction: "Знайдіть помилкову форму й подайте нормативний варіант."
    items:
      - sentence: "Архів працює з п'ятсот заявами."
        error: "п'ятсот"
        correction: "п'ятьмастами"
        explanation: "Після з потрібен орудний відмінок."
      - sentence: "Рішення передали вісімсот п'ятдесяти чотирьом учасникам."
        error: "вісімсот"
        correction: "восьмистам"
        explanation: "У давальному змінюється компонент сотень."
      - sentence: "У звіті немає двісті сторінок."
        error: "двісті"
        correction: "двохсот"
        explanation: "Немає керує родовим відмінком."
      - sentence: "Проєкт профінансовано трьома мільйонами гривнями."
        error: "гривнями"
        correction: "гривень"
        explanation: "Мільйонами керує залежним родовим множини: гривень."
      - sentence: "У родині виховується двоє сестри."
        error: "двоє сестри"
        correction: "дві сестри"
        explanation: "З жіночим іменником потрібна кількісна форма."
      - sentence: "Зустріч тривала півтора години."
        error: "півтора"
        correction: "півтори"
        explanation: "Година жіночого роду: півтори години."
      - sentence: "Показник зріс на півтори відсотка."
        error: "півтори"
        correction: "півтора"
        explanation: "Відсоток чоловічого роду: півтора відсотка."
      - sentence: "Комісія працювала з шістдесят експертами."
        error: "шістдесят"
        correction: "шістдесятьма"
        explanation: "Орудний відмінок для 60: шістдесятьма."
      - sentence: "Дані надіслали триста сорока громадам."
        error: "триста"
        correction: "трьомстам"
        explanation: "Давальний: трьомстам сорока громадам."
      - sentence: "У дві тисячі трьохстах записах є помилка."
        error: "дві тисячі"
        correction: "двох тисячах"
        explanation: "Місцевий: у двох тисячах трьохстах записах."

  - id: act-5
    type: essay-response
    title: "Поясніть правку до числівника"
    prompt: >-
      Напишіть 90-120 слів як коментар редактора до статистичного абзацу. Використайте один складений числівник у родовому, один в орудному та одну форму з мільйон або тисяча.
    model_answer: |-
      > [!model-answer]
      > У цьому абзаці треба узгодити числівники з їхніми синтаксичними ролями. Якщо йдеться про відсутність заявок, пишемо без восьмисот п'ятдесяти чотирьох заявок, бо немає керує родовим. Якщо команда працювала з матеріалами, потрібен орудний: з вісьмастами п'ятдесятьма чотирма заявками. У фінансовій частині форма з трьома мільйонами гривень нормативна, бо мільйонами керує залежним родовим гривень.
    rubric:
      - criteria: "Відмінки"
        description: "Є родовий і орудний складеного числівника."
        points: 4
      - criteria: "Керування"
        description: "Форма з мільйон або тисяча керує залежним іменником."
        points: 3
      - criteria: "Редакторська логіка"
        description: "Коментар пояснює, чому саме таку форму потрібно обрати."
        points: 3

workbook:
  - type: unjumble
    title: "Складіть речення з числом"
    instruction: "Розташуйте слова так, щоб отримати нормативне адміністративне або кількісне речення."
    items:
      - words: ["Звіт", "працює", "з", "вісьмастами", "п'ятдесятьма", "чотирма", "заявками"]
        answer: "Звіт працює з вісьмастами п'ятдесятьма чотирма заявками."
      - words: ["Комісія", "не", "отримала", "восьмисот", "п'ятдесяти", "чотирьох", "відповідей"]
        answer: "Комісія не отримала восьмисот п'ятдесяти чотирьох відповідей."
      - words: ["Лист", "надіслали", "трьомстам", "сорока", "двом", "учасникам"]
        answer: "Лист надіслали трьомстам сорока двом учасникам."
      - words: ["Дані", "розміщено", "на", "двох", "тисячах", "трьохстах", "сторінках"]
        answer: "Дані розміщено на двох тисячах трьохстах сторінках."
      - words: ["Бюджет", "не", "досягає", "трьох", "мільйонів", "гривень"]
        answer: "Бюджет не досягає трьох мільйонів гривень."
      - words: ["Група", "працювала", "з", "двомастами", "тридцятьма", "примірниками"]
        answer: "Група працювала з двомастами тридцятьма примірниками."
      - words: ["Доповідь", "тривала", "півтори", "години", "після", "перерви"]
        answer: "Доповідь тривала півтори години після перерви."
      - words: ["У", "тексті", "бракує", "трьох", "четвертих", "таблиці"]
        answer: "У тексті бракує трьох четвертих таблиці."

  - type: fill-in
    title: "Фінансовий абзац"
    instruction: "Заповніть пропуски у фрагменті звіту."
    items:
      - sentence: "У бюджеті бракує ____ мільйонів гривень."
        answer: "трьох"
        options: ["трьох", "три", "трьома", "трьом"]
        explanation: "Бракує керує родовим."
      - sentence: "Громада працює з ____ мільйонами гривень грантових коштів."
        answer: "двома"
        options: ["двома", "дві", "двох", "двом"]
        explanation: "З мільйонами - орудний."
      - sentence: "Заявки передано ____ п'ятдесяти громадам."
        answer: "двомстам"
        options: ["двомстам", "двісті", "двохсот", "двомастами"]
        explanation: "Передано кому? - двомстам п'ятдесяти громадам."
      - sentence: "У додатку немає ____ шістдесяти таблиць."
        answer: "чотирьохсот"
        options: ["чотирьохсот", "чотириста", "чотирмастами", "чотирьомстам"]
        explanation: "Немає чотирьохсот шістдесяти таблиць."
      - sentence: "Аналітики працювали з ____ двадцятьма записами."
        answer: "двомастами"
        options: ["двомастами", "двісті", "двохсот", "двомстам"]
        explanation: "З ким/чим? - з двомастами двадцятьма записами."
      - sentence: "Рішення надіслано ____ тридцяти заявникам."
        answer: "трьомстам"
        options: ["трьомстам", "триста", "трьохсот", "трьомастами"]
        explanation: "Надіслано кому? - трьомстам тридцяти заявникам."
      - sentence: "У базі немає ____ вісімдесяти анкет."
        answer: "п'ятисот"
        options: ["п'ятисот", "п'ятсот", "п'ятьмастами", "п'ятистам"]
        explanation: "Немає керує родовим."
      - sentence: "У звіті йдеться про ____ сорок дві громади."
        answer: "триста"
        options: ["триста", "трьохсот", "трьомстам", "трьомастами"]
        explanation: "Після про з неістотою можливий знахідний, як називний."
      - sentence: "Команда завершила роботу за ____ року."
        answer: "півтора"
        options: ["півтора", "півтори", "півторами", "півторома"]
        explanation: "Рік чоловічого роду: півтора року."
      - sentence: "Обговорення тривало ____ години."
        answer: "півтори"
        options: ["півтори", "півтора", "півторою", "півторами"]
        explanation: "Година жіночого роду: півтори години."

  - type: error-correction
    title: "Редактор статистичного тексту"
    instruction: "Виправте числівники в коротких статистичних фрагментах."
    items:
      - sentence: "Опитування проведено з вісімсот респондентами."
        error: "вісімсот"
        correction: "вісьмастами"
        explanation: "З респондентами - орудний."
      - sentence: "Звіт бракує п'ятсот сорока підписів."
        error: "п'ятсот"
        correction: "п'ятисот"
        explanation: "Бракує потребує родового."
      - sentence: "Проєкт допоміг двісті десяти родинам."
        error: "двісті"
        correction: "двомстам"
        explanation: "Допоміг кому? - давальний."
      - sentence: "Команда звітувала перед триста учасниками."
        error: "триста"
        correction: "трьомастами"
        explanation: "Перед ким? - орудний."
      - sentence: "У додатку немає шістдесят таблиць."
        error: "шістдесят"
        correction: "шістдесяти"
        explanation: "Немає керує родовим."
      - sentence: "Дані передали двісті сорока громадам."
        error: "двісті"
        correction: "двомстам"
        explanation: "Давальний: двомстам сорока громадам."
      - sentence: "Нарада тривала півтора години."
        error: "півтора"
        correction: "півтори"
        explanation: "Година жіночого роду."
      - sentence: "У звіті є троє громади."
        error: "троє громади"
        correction: "три громади"
        explanation: "З жіночим іменником потрібна кількісна форма."

  - type: match-up
    title: "Керування після тисяча, мільйон, мільярд"
    instruction: "Поєднайте числову рамку з правильною формою."
    pairs:
      - left: "без 2 000 заявок"
        right: "без двох тисяч заявок"
      - left: "з 2 000 заявками"
