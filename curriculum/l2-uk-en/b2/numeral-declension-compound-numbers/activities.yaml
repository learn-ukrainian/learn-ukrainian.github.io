- type: fill-in
  title: "Кожен компонент у відмінку"
  instruction: "Заповніть пропуск нормативною формою числівника."
  items:
    - sentence: "Звіт працює з ____ п'ятдесятьма чотирма показниками."
      answer: "восьмистами"
      options: ["восьмистами", "вісімсот", "восьмисот", "восьмистам"]
      explanation: "Після прийменника з потрібен орудний: восьмистами п'ятдесятьма чотирма."
    - sentence: "Бюджет не досягає ____ п'ятдесяти гривень."
      answer: "п'ятисот"
      options: ["п'ятисот", "п'ятсот", "п'ятьмастами", "п'ятистам"]
      explanation: "Дієслово не досягає керує родовим відмінком."
    - sentence: "Рішення передано ____ п'ятдесяти чотирьом учасникам."
      answer: "восьмистам"
      options: ["восьмистам", "вісімсот", "восьмистами", "восьмисот"]
      explanation: "Адресат дії стоїть у давальному відмінку."
    - sentence: "На ____ сторінках додатка подано карти."
      answer: "трьохстах"
      options: ["трьохстах", "триста", "трьомастами", "трьохсот"]
      explanation: "Після на в місцевому значенні потрібен місцевий відмінок."
    - sentence: "Комісія працювала з ____ тисячами заяв."
      answer: "трьома"
      options: ["трьома", "три", "трьох", "трьом"]
      explanation: "У сполуці з іменником тисяча числівник три також відмінюється."
    - sentence: "Порівняння виконано для ____ цілих і п'яти десятих відсотка."
      answer: "двох"
      options: ["двох", "два", "двома", "двом"]
      explanation: "Дробова назва залежить від форми двох цілих."
    - sentence: "Коментар стосується ____ шістдесяти семи рішень."
      answer: "чотирьохсот"
      options: ["чотирьохсот", "чотириста", "чотирмастами", "чотирьомстам"]
      explanation: "Стосується керує родовим відмінком: чотирьохсот шістдесяти семи."
    - sentence: "Секретарка відповіла ____ дев'яноста двом заявникам."
      answer: "трьомстам"
      options: ["трьомстам", "триста", "трьомастами", "трьохсот"]
      explanation: "Адресат відповіді стоїть у давальному відмінку."
    - sentence: "В архіві немає ____ сорока карток."
      answer: "семисот"
      options: ["семисот", "сімсот", "сімомастами", "семистам"]
      explanation: "Немає керує родовим відмінком."
    - sentence: "Координатори працювали з ____ двадцятьма підписами."
      answer: "п'ятьмастами"
      options: ["п'ятьмастами", "п'ятисот", "п'ятсот", "п'ятистам"]
      explanation: "Після з потрібен орудний відмінок."

- type: select
  title: "Виберіть нормативні форми"
  instruction: "Позначте всі варіанти, у яких числівник узгоджено з керуванням."
  items:
    - question: "Родовий відмінок після немає."
      min_correct: 2
      options:
        - text: "немає двохсот п'ятдесяти заяв"
          correct: true
        - text: "немає восьмисот сорока сторінок"
          correct: true
        - text: "немає двісті п'ятдесят заяв"
          correct: false
        - text: "немає вісімсот сорок сторінок"
          correct: false
      explanation: "У родовому змінюються і сотні, і десятки, і одиниці."
    - question: "Давальний відмінок адресата."
      min_correct: 2
      options:
        - text: "передати трьомстам сорока двом учасникам"
          correct: true
        - text: "надіслати восьмистам двадцяти п'яти адресатам"
          correct: true
        - text: "передати триста сорок двом учасникам"
          correct: false
        - text: "надіслати вісімсот двадцять п'яти адресатам"
          correct: false
      explanation: "Давальний показує адресата: трьомстам, восьмистам."
    - question: "Орудний відмінок засобу або супроводу."
      min_correct: 2
      options:
        - text: "з п'ятьмастами шістдесятьма підписами"
          correct: true
        - text: "із двомастами тридцятьма примірниками"
          correct: true
        - text: "з п'ятсот шістдесять підписами"
          correct: false
        - text: "із двісті тридцять примірниками"
          correct: false
      explanation: "Орудний вимагає форм п'ятьмастами, шістдесятьма, двомастами."
    - question: "Форми з мільйоном."
      min_correct: 2
      options:
        - text: "з трьома мільйонами гривень"
          correct: true
        - text: "без трьох мільйонів гривень"
          correct: true
        - text: "з трьома мільйонами гривнями"
          correct: false
        - text: "без три мільйони гривень"
          correct: false
      explanation: "Мільйон відмінюється як іменник і керує родовим гривень."
    - question: "Дробові та збірні форми."
      min_correct: 3
      options:
        - text: "півтора року"
          correct: true
        - text: "півтори години"
          correct: true
        - text: "двоє дітей"
          correct: true
        - text: "двоє сестри"
          correct: false
      explanation: "Півтора/півтори залежать від роду іменника; збірні мають обмежену сполучуваність."
    - question: "Місцевий відмінок у числовій групі."
      min_correct: 2
      options:
        - text: "на двохстах сорока сторінках"
          correct: true
        - text: "у п'ятистах шістдесяти двох документах"
          correct: true
        - text: "на двісті сорок сторінках"
          correct: false
        - text: "у п'ятсот шістдесят двох документах"
          correct: false
      explanation: "Місцевий вимагає відмінювання сотень і наступних компонентів."
    - question: "Керування після слова бракує."
      min_correct: 2
      options:
        - text: "бракує чотирьохсот двадцяти гривень"
          correct: true
        - text: "бракує двох мільйонів гривень"
          correct: true
        - text: "бракує чотириста двадцять гривень"
          correct: false
        - text: "бракує двома мільйонами гривень"
          correct: false
      explanation: "Бракує керує родовим відмінком."
    - question: "Форми після прийменника з."
      min_correct: 2
      options:
        - text: "з двомастами сімдесятьма п'ятьма родинами"
          correct: true
        - text: "з п'ятьма мільйонами гривень"
          correct: true
        - text: "з двісті сімдесят п'ять родинами"
          correct: false
        - text: "з п'ятьма мільйонами гривнями"
          correct: false
      explanation: "Прийменник з задає орудний для центру групи, але залежний іменник після мільйон лишається родовим."

- type: error-correction
  title: "Виправте числівникові збої"
  instruction: "Знайдіть помилкову форму і подайте нормативну."
  items:
    - sentence: "Архів працює з п'ятсот заявами."
      error: "п'ятсот"
      correction: "п'ятьмастами"
      explanation: "Після з потрібен орудний відмінок."
    - sentence: "Рішення передали вісімсот п'ятдесяти чотирьом учасникам."
      error: "вісімсот"
      correction: "восьмистам"
      explanation: "У давальному змінюється компонент сотень."
    - sentence: "У звіті немає двісті сторінок."
      error: "двісті"
      correction: "двохсот"
      explanation: "Немає керує родовим відмінком."
    - sentence: "Проєкт профінансовано трьома мільйонами гривнями."
      error: "гривнями"
      correction: "гривень"
      explanation: "Іменник мільйонами керує залежним родовим множини."
    - sentence: "У родині виховується двоє сестри."
      error: "двоє сестри"
      correction: "дві сестри"
      explanation: "З іменником жіночого роду потрібна кількісна форма."
    - sentence: "До суміші додали одну другу літри розчину."
      error: "літри"
      correction: "літра"
      explanation: "Після дробу іменник стоїть у родовому однини."
    - sentence: "Показник зріс на півтори відсотка."
      error: "півтори"
      correction: "півтора"
      explanation: "Відсоток чоловічого роду, тому потрібне півтора."
    - sentence: "Команда працювала з двісті тридцятьма файлами."
      error: "двісті"
      correction: "двомастами"
      explanation: "В орудному відмінку змінюється і компонент сотень."

- type: match-up
  title: "Відмінок і нормативна форма"
  instruction: "Поєднайте контекст із формою числівника."
  pairs:
    - left: "немає 854 заяв"
