- type: true-false
  title: "Перевірте правило"
  instruction: "Позначте, чи правильне твердження."
  items:
    - statement: "У складеному кількісному числівнику в непрямих відмінках змінюються всі потрібні компоненти."
      correct: true
      explanation: "Наприклад: восьмистами п'ятдесятьма чотирма."
    - statement: "Слова мільйон і мільярд не керують залежним іменником."
      correct: false
      explanation: "Вони поводяться як іменники: мільйон гривень."
    - statement: "Форма з трьома мільйонами гривень нормативна."
      correct: true
      explanation: "Гривень залежить від іменника мільйонами."
    - statement: "Форма двоє сестри нормативна для жіночого роду."
      correct: false
      explanation: "Потрібно дві сестри."
    - statement: "Півтора року і півтори години розрізняються за родом іменника."
      correct: true
      explanation: "Рік чоловічого роду, година жіночого."
    - statement: "Після дробового числівника іменник часто має родовий відмінок однини."
      correct: true
      explanation: "Одна друга літра, три десятих відсотка."
    - statement: "У формі п'ятистам шістдесяти двом відмінено тільки останнє слово."
      correct: false
      explanation: "Давальний видно в п'ятистам, шістдесяти, двом."
    - statement: "Збірні числівники доречні з pluralia tantum, наприклад двоє дверей."
      correct: true
      explanation: "Pluralia tantum є типовим контекстом для збірних форм."
    - statement: "У формі на двохстах сорока сторінках місцевий відмінок видно тільки в слові сторінках."
      correct: false
      explanation: "Місцевий також видно в числівникових компонентах: двохстах, сорока."
    - statement: "У фразі три десятих відсотка залежний іменник має родовий однини."
      correct: true
      explanation: "Дробова форма називає частину одного відсотка."

