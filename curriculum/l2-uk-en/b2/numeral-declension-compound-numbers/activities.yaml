- type: essay-response
  id: essay-numeral-editor-comment
  title: "Редакторський коментар до числівників"
  instruction: "Напишіть короткий редакторський коментар українською."
  prompt: "Поясніть, як ви перевірили б службовий текст із великою кількістю складених числівників. Згадайте родовий, давальний і орудний відмінки, окремо поясніть форми з мільйон, мільярд, півтора/півтори та одну типову помилку зі збірними числівниками."
  min_words: 150
  model_answer: "Я спершу визначив би синтаксичну роль числової групи: бракує вимагає родового, надіслати адресатові - давального, працювати з матеріалами - орудного. Потім перевірив би кожен компонент складеного числівника, бо форма восьмисот п'ятдесяти чотирьох не може залишати вісімсот у називному. Окремо треба дивитися на слова мільйон і мільярд: вони відмінюються як іменники і керують родовим, тому правильно з трьома мільйонами гривень. Дробові форми залежать від роду і моделі: півтора року, але півтори години; одна друга літра. Збірні числівники не можна механічно ставити з будь-яким іменником, тому двоє дітей нормативно, а двоє сестри треба замінити на дві сестри."
  peer_review_guidelines: "Перевірте, чи автор пояснив керування, а не тільки навів правильні форми. Позначте один приклад, де всі компоненти складеного числівника відмінено послідовно. Знайдіть, чи розмежовано мільйон/мільярд, дробові та збірні числівники."
  rubric:
    - criteria: "Відмінкове керування"
      description: "Коментар правильно пояснює родовий, давальний і орудний відмінки."
      points: 4
    - criteria: "Складені числівники"
      description: "У відповіді показано, що змінюються всі потрібні компоненти числівника."
      points: 3
    - criteria: "Окремі моделі"
      description: "Пояснено іменникові, дробові та збірні числівники."
      points: 3
