version: '1.0'
module: phrases-word-combinations
level: b2
inline:
- type: match-up
  title: Головне слово
  instruction: Зістав словосполучення з його синтаксичним центром.
  pairs:
  - left: шкільний музей
    right: музей
  - left: хтось із команди
    right: хтось
  - left: один зі спортсменів
    right: один
  - left: редагувати текст
    right: редагувати
  - left: працювати послідовно
    right: працювати
  - left: дуже швидко
    right: швидко
  - left: потребує допомоги
    right: потребує
  - left: звіт про виконання
    right: звіт
  - left: готовий до розмови
    right: готовий
  - left: майже точно
    right: точно
  - left: підготовлений учора
    right: підготовлений
  - left: повага до людей
    right: повага
- type: select
  title: Ознаки узгодження
  instruction: Познач конструкції, у яких залежне слово змінюється разом із головним.
  items:
  - question: Де є узгодження?
    min_correct: 3
    options:
    - text: рясний дощ
      correct: true
    - text: синтаксична норма
      correct: true
    - text: цей документ
      correct: true
    - text: дякувати колезі
      correct: false
    - text: працювати мовчки
      correct: false
  - question: Які форми показують узгодження з іменником звіт?
    min_correct: 2
    options:
    - text: річний звіт
      correct: true
    - text: підготовлений звіт
      correct: true
    - text: звітувати завтра
      correct: false
    - text: потребує звіту
      correct: false
    - text: швидко звітувати
      correct: false
  - question: Де залежне слово має форму головного центру?
    min_correct: 2
    options:
    - text: обґрунтоване рішення
      correct: true
    - text: перша спроба
      correct: true
    - text: запобігати ризику
      correct: false
    - text: дуже обережно
      correct: false
    - text: сміятися з помилки
      correct: false
  - question: Які приклади не є узгодженням?
    min_correct: 2
    options:
    - text: потребує підтримки
      correct: true
    - text: відповісти коротко
      correct: true
    - text: державна мова
      correct: false
    - text: цей проєкт
      correct: false
    - text: підписаний акт
      correct: false
  - question: Де прикметник мусить змінитися при зміні відмінка іменника?
    min_correct: 3
    options:
    - text: складний проєкт
      correct: true
    - text: уважний редактор
      correct: true
    - text: нормативний вислів
      correct: true
    - text: працювати системно
      correct: false
    - text: говорити про текст
      correct: false
  - question: Які сполуки мають атрибутивний зв’язок?
    min_correct: 3
    options:
    - text: мовна стійкість
      correct: true
    - text: корисна порада
      correct: true
    - text: підготовлена заява
      correct: true
    - text: навчатися мови
      correct: false
    - text: читати захоплено
      correct: false
  - question: Де центр треба шукати не в найближчому слові?
    min_correct: 2
    options:
    - text: рішення, ухвалене більшістю
      correct: true
    - text: звіт, підготовлений комісією
      correct: true
    - text: дуже швидко
      correct: false
    - text: дякувати вам
      correct: false
    - text: сміятися з мене
      correct: false
  - question: Які дії допомагають перевірити узгодження?
    min_correct: 3
    options:
    - text: знайти синтаксичний центр
      correct: true
    - text: змінити центр у відмінку
      correct: true
    - text: перевірити форму залежного слова
      correct: true
    - text: ігнорувати рід і число
      correct: false
    - text: замінити залежне слово прийменником
      correct: false
- type: fill-in
  title: Керування дієслова
  instruction: Заповни пропуск нормативною формою залежного слова.
  items:
  - sentence: Команда потребує ____ перед поданням звіту.
    answer: підтримки
    options:
    - підтримки
    - підтримку
    - підтримка
    - підтримкою
  - sentence: Ми дякуємо ____ за детальні пояснення.
    answer: викладачеві
    options:
    - викладачеві
    - викладача
    - викладач
    - викладачем
  - sentence: Студенти навчаються ____ в академічному контексті.
    answer: мови
    options:
    - мови
    - мову
    - мовою
    - мова
  - sentence: Автор відповідає ____ професійного стилю.
    answer: нормі
    options:
    - нормі
    - норму
    - норма
    - нормою
  - sentence: Редактор запобігає ____ у фінальній версії.
    answer: помилці
    options:
    - помилці
    - помилку
    - помилка
    - помилкою
  - sentence: Учасник сміявся ____ власної неточності.
    answer: з
    options:
    - з
    - на
    - до
    - у
  - sentence: Вона одружилася ____ коханою людиною.
    answer: з
    options:
    - з
    - на
    - до
    - після
  - sentence: Війна завдає ____ громадам.
    answer: шкоди
    options:
    - шкоди
    - шкоду
    - шкода
    - шкодою
  - sentence: Звіт відповідає ____ конкурсу.
    answer: вимогам
    options:
    - вимогам
    - вимоги
    - вимогами
    - вимогу
  - sentence: Команда дотримується ____ безпеки.
    answer: правил
    options:
    - правил
    - правила
    - правилами
    - правило
- type: group-sort
  title: Три механізми зв’язку
  instruction: Розподіли словосполучення за типом підрядного зв’язку.
  groups:
  - name: Узгодження
    items:
    - рясний дощ
    - цей документ
    - підготовлена заява
    - синтаксична норма
    - перша спроба
  - name: Керування
    items:
    - потребує допомоги
    - дякувати колезі
    - сміятися з помилки
    - запобігати ризику
    - повага до людей
  - name: Прилягання
    items:
    - читати уважно
    - працювати мовчки
    - дуже швидко
    - відповісти коротко
    - діяти обережно
- type: true-false
  title: Культура сполучуваності
  instruction: Визнач, чи правильне твердження.
  items:
  - statement: Сполучуваність перевіряє не окреме слово, а його природне оточення.
    correct: true
  - statement: Усталений вислів можна змінювати так само вільно, як будь-яке словосполучення.
    correct: false
  - statement: Плеоназм завжди корисний в офіційно-діловому стилі.
    correct: false
  - statement: Дієслово може вимагати певного відмінка залежного слова.
    correct: true
  - statement: У фразі працювати системно слово системно прилягає до дієслова.
    correct: true
  - statement: Керування не може мати прийменника.
    correct: false
  - statement: Редактор має перевіряти і відмінок, і прийменник у ризикових моделях.
    correct: true
  - statement: Підмет і присудок разом утворюють звичайне словосполучення.
    correct: false
  - statement: Фраза вжити заходів є природною професійною колокацією.
    correct: true
  - statement: У фразі дотримуватися правил головне слово не має жодного керування.
    correct: false
