- type: error-correction
  title: Редагування керування
  instruction: Виправ ненормативну форму залежного слова.
  items:
  - sentence: Я дякую колегу за допомогу.
    error: дякую колегу
    correction: дякую колезі
    explanation: Дякувати керує давальним відмінком.
  - sentence: Цей проєкт потребує підтримку.
    error: потребує підтримку
    correction: потребує підтримки
    explanation: Потребувати керує родовим відмінком.
  - sentence: Команда запобігла конфлікт.
    error: запобігла конфлікт
    correction: запобігла конфлікту
    explanation: Запобігати керує давальним відмінком.
  - sentence: Текст відповідає норму академічного стилю.
    error: відповідає норму
    correction: відповідає нормі
    explanation: Відповідати у значенні відповідності керує давальним.
  - sentence: Він сміявся на помилці.
    error: сміявся на помилці
    correction: сміявся з помилки
    explanation: 'Нормативна модель: сміятися з кого або з чого.'
  - sentence: Вона одружилася на коханій людині.
    error: одружилася на коханій людині
    correction: одружилася з коханою людиною
    explanation: 'Нормативна модель: одружитися з ким.'
  - sentence: Війна завдає великі збитки громадам.
    error: завдає великі збитки
    correction: завдає великих збитків
    explanation: Завдавати керує родовим відмінком.
  - sentence: Редактор уважний на деталі.
    error: уважний на деталі
    correction: уважний до деталей
    explanation: Прикметник уважний вимагає моделі до чого.
  - sentence: Заява багата прикладами.
    error: багата прикладами
    correction: багата на приклади
    explanation: У значенні наявності природна модель багатий на що.
  - sentence: Автор дотримується правила.
    error: дотримується правила
    correction: дотримується правил
    explanation: Дотримуватися керує родовим відмінком множини в цій моделі.
