version: '1.0'
module: phrases-word-combinations
level: b2
inline:
- type: match-up
  title: Головне слово і межа словосполучення
  instruction: Зіставте фрагмент із правильним синтаксичним рішенням.
  pairs:
  - left: "уважний редактор"
    right: "словосполучення: головне слово редактор"
  - left: "редактор працює"
    right: "не словосполучення: граматична основа"
  - left: "редактор і автор"
    right: "не словосполучення: сурядний ряд"
  - left: "працювати над текстом"
    right: "словосполучення: головне слово працювати"
  - left: "дуже швидко"
    right: "словосполучення: головне слово швидко"
  - left: "один із варіантів"
    right: "словосполучення: головне слово один"
  - left: "правити теревені"
    right: "стійкий вислів, який у реченні працює як неподільна одиниця"
  - left: "архіви та бібліотеки"
    right: "не словосполучення: рівноправні члени"
  - left: читати уважно
    right: 'словосполучення: головне слово читати'
  - left: надзвичайно важливий
    right: 'словосполучення: головне слово важливий'
- type: select
  title: Доказ узгодження
  instruction: Позначте варіанти, де залежне слово змінюється разом із головним.
  items:
  - question: Де є узгодження?
    min_correct: 3
    options:
    - text: "новий маршрут"
      correct: true
    - text: "цей документ"
      correct: true
    - text: "підготовлена заява"
      correct: true
    - text: "потребувати підтримки"
      correct: false
    - text: "працювати уважно"
      correct: false
    explanation: Узгодження видно там, де залежна форма повторює граматичні категорії головного слова.
  - question: У яких парах зміна головного слова має змінити залежне?
    min_correct: 3
    options:
    - text: "докладний звіт -> докладного звіту"
      correct: true
    - text: "електронна заява -> електронною заявою"
      correct: true
    - text: "зазначені умови -> зазначених умов"
      correct: true
    - text: "дякувати викладачеві -> дякувати викладачеві"
      correct: false
    - text: "пояснити коротко -> пояснити коротко"
      correct: false
    explanation: Керування і прилягання можуть лишати залежну форму незмінною, а узгодження перебудовує її.
  - question: Де центр треба шукати за змістом, а не за найближчим словом?
    min_correct: 2
    options:
    - text: "заява, підготовлена робочою групою"
      correct: true
    - text: "рішення, ухвалене більшістю"
      correct: true
    - text: "дуже швидко"
      correct: false
    - text: "потребує допомоги"
      correct: false
    - text: "архіви й музеї"
      correct: false
    explanation: Поширене означення може стояти після паузи, але воно все одно узгоджується зі своїм центром.
  - question: Які дії допомагають перевірити узгодження?
    min_correct: 3
    options:
    - text: "знайти іменник-центр"
      correct: true
    - text: "змінити центр у відмінку"
      correct: true
    - text: "перевірити форму залежного слова"
      correct: true
    - text: "перекласти конструкцію англійською"
      correct: false
    - text: "вибрати найближче слово зліва"
      correct: false
    explanation: Узгодження перевіряють українською формою та синтаксичним центром, не перекладом.
  - question: Де прикметникове нанизування варто редагувати для ясності?
    min_correct: 2
    options:
    - text: "новий комплексний стратегічний регіональний план"
      correct: true
    - text: "електронна заява"
      correct: false
    - text: "докладний звіт"
      correct: false
    - text: "старий загальний неузгоджений попередній порядок"
      correct: true
    - text: "чинний закон"
      correct: false
    explanation: Граматично правильне узгодження може бути стилістично важким, якщо ознак забагато.
  - question: Де залежне слово має повторити рід, число або відмінок головного?
    min_correct: 3
    options:
    - text: актуальна проблема
      correct: true
    - text: відкриті архіви
      correct: true
    - text: підписаного договору
      correct: true
    - text: працювати над проєктом
      correct: false
    - text: говорити впевнено
      correct: false
    explanation: Узгоджені прикметникові й дієприкметникові форми змінюються разом з іменником-центром.
  - question: Де зміна числа головного слова змінить залежну форму?
    min_correct: 2
    options:
    - text: нове дослідження -> нові дослідження
      correct: true
    - text: запланована зустріч -> заплановані зустрічі
      correct: true
    - text: залежати від обставин -> залежати від обставин
      correct: false
    - text: пояснити докладно -> пояснити докладно
      correct: false
    - text: після засідання -> після засідань
      correct: false
    explanation: Узгодження реагує на граматичні зміни центру, а керування й прилягання мають інші механізми.
  - question: Де після перестановки треба зберегти узгодження з тим самим іменником?
    min_correct: 2
    options:
    - text: заява, подана вчасно
      correct: true
    - text: умови, зазначені в договорі
      correct: true
    - text: потребує допомоги
      correct: false
    - text: відповідати письмово
      correct: false
    - text: студенти й викладачі
      correct: false
    explanation: Відокремлене або поширене означення все одно узгоджується зі своїм іменником, а не з найближчим словом.
- type: fill-in
  title: Керування без кальки
  instruction: Заповніть пропуск нормативною формою залежного слова.
  items:
  - sentence: "Команда потребує ____ перед поданням звіту."
    answer: "підтримки"
    options: ["підтримки", "підтримку", "підтримка", "підтримкою"]
    explanation: Дієслово потребувати керує родовим відмінком.
  - sentence: "Ми дякуємо ____ за детальні пояснення."
    answer: "викладачеві"
    options: ["викладачеві", "викладача", "викладачем", "викладач"]
    explanation: Дякувати керує давальним відмінком адресата.
  - sentence: "Ця помилка завдала ____ всій команді."
    answer: "шкоди"
    options: ["шкоди", "шкоду", "шкода", "шкодою"]
    explanation: "Завдавати вимагає родового: шкоди, збитків, болю."
  - sentence: "Студенти цікавляться ____ міста."
    answer: "історією"
    options: ["історією", "про історію", "історію", "історії"]
    explanation: Цікавитися керує орудним відмінком.
  - sentence: "Автор дійшов ____ після повторного аналізу."
    answer: "висновку"
    options: ["висновку", "висновок", "висновком", "до висновок"]
    explanation: "Нормативна колокація: дійти висновку."
  - sentence: "Організація вжила ____ для захисту даних."
    answer: "заходів"
    options: ["заходів", "міри", "заходи", "мір"]
    explanation: В офіційному стилі природно вжити заходів.
  - sentence: Доповідач наголосив ____ перевірити джерела.
    answer: на потребі
    options: [на потребі, потребу, про потребу, потребою]
    explanation: Наголошувати в цьому значенні вимагає прийменникової форми на чому.
  - sentence: Кафедра надала перевагу ____ плану.
    answer: новому
    options: [новому, новий, нового, новим]
    explanation: Надати перевагу керує давальним відмінком.
  - sentence: Рецензент застеріг авторів ____ поспішних висновків.
    answer: від
    options: [від, про, за, на]
    explanation: Застерегти когось від чогось - нормативна модель керування.
  - sentence: Комісія погодилася ____ запропонованими змінами.
    answer: із
    options: [із, на, до, про]
    explanation: Погодитися із чимось передає прийняття або згоду з пропозицією.
- type: group-sort
  title: Узгодження, керування чи прилягання
  instruction: Розподіліть словосполучення за типом підрядного зв'язку.
  groups:
  - name: Узгодження
    items:
    - "новий маршрут"
    - "ця заява"
    - "підготовлений документ"
    - "третя спроба"
    - "електронна форма"
  - name: Керування
    items:
    - "потребувати допомоги"
    - "дякувати колезі"
    - "завдати шкоди"
    - "повага до людей"
    - "готовий до розмови"
  - name: Прилягання
    items:
    - "пояснити коротко"
    - "дуже швидко"
    - "читати сидячи"
    - "говорити пошепки"
    - "надзвичайно точно"
- type: error-correction
  title: Колокація і керування в редакторській правці
  instruction: Виправте кальковану або неприродну конструкцію.
  items:
  - sentence: "Комісія зробила рішення про перенесення зустрічі."
    error: "зробила рішення"
    correction: "Комісія ухвалила рішення про перенесення зустрічі."
    options: ["ухвалила рішення", "зробила рішення", "здійснила рішення", "виконала рішення"]
    explanation: У цьому контексті природна колокація ухвалити рішення.
  - sentence: "Проєкт потребує додаткову підтримку."
    error: "потребує додаткову підтримку"
    correction: "Проєкт потребує додаткової підтримки."
    options: ["додаткової підтримки", "додаткову підтримку", "додатковою підтримкою", "додаткова підтримка"]
    explanation: Потребувати керує родовим відмінком.
  - sentence: "Я дякую вашу команду за консультацію."
    error: "дякую вашу команду"
    correction: "Я дякую вашій команді за консультацію."
    options: ["вашій команді", "вашу команду", "вашою командою", "ваша команда"]
    explanation: Дякувати керує давальним відмінком.
  - sentence: "Цей пункт завдав серйозні збитки бюджету."
    error: "завдав серйозні збитки"
    correction: "Цей пункт завдав серйозних збитків бюджету."
    options: ["серйозних збитків", "серйозні збитки", "серйозними збитками", "серйозний збиток"]
    explanation: Завдати збитків вимагає родового відмінка.
  - sentence: "У листі треба прийняти міри до п'ятниці."
    error: "прийняти міри"
    correction: "У листі треба вжити заходів до п'ятниці."
    options: ["вжити заходів", "прийняти міри", "зробити міри", "виконати міри"]
    explanation: "Нормативна українська колокація: вжити заходів."
  - sentence: "Студенти навчалися українську синтаксису."
    error: "навчалися українську синтаксису"
    correction: "Студенти навчалися українського синтаксису."
    options: ["українського синтаксису", "українську синтаксису", "українським синтаксисом", "про український синтаксис"]
    explanation: Навчатися керує родовим відмінком.
  - sentence: "Ми цікавимося про історію міста."
    error: "цікавимося про історію"
    correction: "Ми цікавимося історією міста."
    options: ["історією", "про історію", "історію", "історії"]
    explanation: Цікавитися керує орудним відмінком.
  - sentence: "Звіт складається з короткий вступ і висновки."
    error: "з короткий вступ"
    correction: "Звіт складається з короткого вступу і висновків."
    options: ["з короткого вступу", "з короткий вступ", "коротким вступом", "про короткий вступ"]
    explanation: Складається з чого? з короткого вступу.
workbook:
- id: wb-reading-syntax-chain
  type: reading
  title: "Читання: ланцюг залежностей"
  instruction: Прочитайте уривок і простежте, як словосполучення будують речення.
  source: "Навчальний уривок для модуля B2."
  text: >-
    Після тривалого обговорення рада ухвалила рішення про відновлення парку біля озера. У документі зазначено потребу в додатковій
    підтримці громади, графік громадських консультацій і відповідальних осіб. Редактор уважно перевірив текст рішення, бо
    кілька конструкцій звучали як кальки: зробити рішення, прийняти міри, завдати збитки. Після правки документ став коротшим
    і точнішим.
  tasks:
  - "Знайдіть граматичну основу першого речення."
  - "Випишіть три словосполучення з керуванням."
  - "Які кальки виправив редактор?"
- type: match-up
  title: Паспорт колокації
  instruction: Поєднайте конструкцію з її поясненням.
  pairs:
  - left: "ухвалити рішення"
    right: "стала офіційна колокація для рішення органу"
  - left: "завдати шкоди"
    right: "дієслово керує родовим відмінком"
  - left: "дякувати колезі"
    right: "давальний відмінок адресата"
  - left: "пояснити коротко"
    right: "прилягання прислівника до дієслова"
  - left: "докладний звіт"
    right: "узгодження прикметника з іменником"
  - left: "потребувати підтримки"
    right: "керування родовим відмінком"
  - left: "цікавитися історією"
    right: "керування орудним відмінком"
  - left: "після обговорення"
    right: "прийменникова рамка часу або передумови"
  - left: "правити теревені"
    right: "стійкий вислів, що працює як неподільна одиниця"
  - left: "план розвитку"
    right: "іменникове словосполучення з неузгодженим уточненням"
- type: fill-in
  title: Керування в реченнях
  instruction: Оберіть нормативну форму.
  items:
  - sentence: "Група навчалася ____ протягом семестру."
    answer: "синтаксису"
    options: ["синтаксису", "синтаксис", "синтаксисом", "про синтаксис"]
    explanation: Навчатися керує родовим.
  - sentence: "Ми говорили ____ під час консультації."
    answer: "про бюджет"
    options: ["про бюджет", "бюджет", "бюджетом", "бюджету"]
    explanation: Говорити про щось називає тему мовлення.
  - sentence: "Команда обговорила ____ без зайвих емоцій."
    answer: "бюджет"
    options: ["бюджет", "про бюджет", "бюджету", "бюджетом"]
    explanation: Обговорити може мати прямий додаток.
  - sentence: "Студент відповідав ____ і послідовно."
    answer: "упевнено"
    options: ["упевнено", "упевнений", "упевненого", "упевненим"]
    explanation: Прислівник приєднується до дії приляганням.
  - sentence: "Рішення ухвалили ____ тривалого обговорення."
    answer: "після"
    options: ["після", "про", "з", "для"]
    explanation: Після обговорення задає часову рамку.
  - sentence: "Проєкт залежить ____ підтримки партнерів."
    answer: "від"
    options: ["від", "на", "за", "про"]
    explanation: Залежати від чогось - нормативна модель.
  - sentence: "Відділ відповідальний ____ перевірку документів."
    answer: "за"
    options: ["за", "до", "при", "в"]
    explanation: Відповідальний за що? за перевірку.
  - sentence: "Команда готова ____ обговорення пропозицій."
    answer: "до"
    options: ["до", "про", "за", "на"]
    explanation: Готовий до чого? до обговорення.
  - sentence: "Учасники дійшли ____ після аналізу всіх даних."
    answer: "висновку"
    options: ["висновку", "висновок", "висновком", "до висновок"]
    explanation: Дійти висновку - нормативна колокація.
  - sentence: "Студенти сперечалися ____ правил оцінювання."
    answer: "щодо"
    options: ["щодо", "за", "у", "при"]
    explanation: Щодо правил називає тему суперечки.
- type: error-correction
  title: Виправте й поясніть зв'язок
  instruction: Виправте форму, а потім назвіть тип зв'язку.
  items:
  - sentence: "Стаття була присвячена про розвиток громади."
    error: "присвячена про розвиток"
    correction: "Стаття була присвячена розвитку громади."
    options: ["присвячена розвитку", "присвячена про розвиток", "присвячена розвиток", "присвячена розвитком"]
    explanation: Присвячений керує давальному/родовому за моделлю присвячений чому? розвитку.
  - sentence: "Команда зазнала великі витрати."
    error: "зазнала великі витрати"
    correction: "Команда зазнала великих витрат."
    options: ["великих витрат", "великі витрати", "великими витратами", "велика витрата"]
    explanation: Зазнати керує родовим відмінком.
  - sentence: "Директор цікавився про результати опитування."
    error: "цікавився про результати"
    correction: "Директор цікавився результатами опитування."
    options: ["результатами", "про результати", "результати", "результатів"]
    explanation: Цікавитися керує орудним відмінком.
  - sentence: "Після засідання комісія провела обговорення по бюджету."
