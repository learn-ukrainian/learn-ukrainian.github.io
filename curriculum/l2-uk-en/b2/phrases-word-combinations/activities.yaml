- type: error-correction
  title: Редагування сполучуваності
  instruction: Заміни неприродне словосполучення нормативним.
  items:
  - sentence: Комісія зробила рішення після обговорення.
    error: зробила рішення
    correction: ухвалила рішення
    explanation: У професійному стилі рішення ухвалюють.
  - sentence: Автор поставив проблему в статті.
    error: поставив проблему
    correction: порушив проблему
    explanation: 'Усталена колокація: порушити проблему.'
  - sentence: Ми взяли заходи для безпеки.
    error: взяли заходи
    correction: вжили заходів
    explanation: 'Нормативна модель: вжити заходів.'
  - sentence: Команда трималася правил дискусії.
    error: трималася правил
    correction: дотримувалася правил
    explanation: Дотримуватися правил — природна сполука.
  - sentence: Звіт має відповідність вимоги.
    error: має відповідність вимоги
    correction: відповідає вимогам
    explanation: Краще дієслівне керування давальним відмінком.
  - sentence: Фраза робить ясність тексту.
    error: робить ясність
    correction: увиразнює текст / робить текст яснішим
    explanation: Потрібна природна дієслівна модель.
  - sentence: Редактор дивиться керування дієслів.
    error: дивиться керування
    correction: перевіряє керування
    explanation: У професійному описі керування перевіряють.
  - sentence: Пояснення багате прикладами.
    error: багате прикладами
    correction: багате на приклади
    explanation: У цій моделі прикметник керує прийменником на.
  - sentence: Автор зробив пропозицію для правки.
    error: зробив пропозицію
    correction: висунув пропозицію / запропонував правку
    explanation: Обидва варіанти природніші за кальковану модель.
  - sentence: Текст має зайву надмірність у вислові.
    error: зайву надмірність
    correction: надмірність / зайве слово
    explanation: Плеоназм треба скоротити.
- type: essay-response
  id: syntax-editing-note
  title: 'Письмо: редакторський коментар до словосполучень'
  instruction: Напишіть короткий редакторський коментар українською.
  prompt: 'Відредагуйте абзац із п’ятьма помилками сполучуваності: «Комісія зробила рішення, що проєкт потребує підтримку.
    Автор дякує команду, сміється на власній помилці й має увагу на деталі». Подайте нормативну версію й поясніть щонайменше
    три типи підрядного зв’язку.'
  min_words: 170
  model_answer: Комісія ухвалила рішення, що проєкт потребує підтримки. Автор дякує команді, сміється з власної помилки й
    звертає увагу на деталі. У словосполученні потребує підтримки дієслово керує родовим відмінком. У дякує команді працює
    давальний відмінок, бо дякувати відповідає на питання кому. У сміється з помилки прийменник з входить до моделі керування.
    У фразі власної помилки прикметник узгоджується з іменником, а у звертає увагу маємо стійку колокацію професійного стилю.
    Така редакція точніша, бо виправляє не окремі слова, а зв’язки між ними.
  rubric:
  - criteria: Нормативність керування
    description: Виправлено форми після потребувати, дякувати, сміятися та звертати увагу.
  - criteria: Пояснення типів зв’язку
    description: Коментар називає керування й узгодження, а також пояснює роль стійкої колокації.
  - criteria: Редакторський регістр
    description: Відповідь написано чіткою українською без англійських підказок.
