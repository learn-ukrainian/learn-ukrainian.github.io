        options: ["підставку", "підставність", "підставник", "підставище"]
  - type: error-correction
    title: "Виправте словотвір і стиль"
    instruction: "Знайдіть помилки й подайте нормативний варіант."
    items:
      - sentence: "У бібліотеці відкрили нову читанню для студентів."
        error: "читанню"
        correction: "читальню"
        explanation: "Назва приміщення - читальня."
      - sentence: "Документи перенесли в архівну схованість."
        error: "схованість"
        correction: "сховище"
        explanation: "Сховище називає місце зберігання."
      - sentence: "На вході зламався вимикник світла."
        error: "вимикник"
        correction: "вимикач"
        explanation: "Нормативна назва пристрою - вимикач."
      - sentence: "Лічильня показує споживання газу."
        error: "Лічильня"
        correction: "Лічильник"
        explanation: "Лічильник - пристрій обліку."
      - sentence: "На столі стояла цукорність."
