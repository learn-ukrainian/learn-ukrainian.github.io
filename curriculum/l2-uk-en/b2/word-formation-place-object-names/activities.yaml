version: '1.0'
module: word-formation-place-object-names
level: b2
inline: []
workbook:
  - type: reading
    id: place-object-reading
    title: "Читання: маршрут через громадський простір"
    instruction: "Прочитайте уривок і визначте, як назви місць та предметів передають функцію."
    source: "Навчальний уривок для модуля B2."
    text: >-
      У колишній друкарні відкрили громадський простір. На першому поверсі працює кав'ярня і невелика книгарня, поруч розташована читальня з архівним сховищем. У дворі облаштували майданчик для лекцій, а в окремому приміщенні діє майстерня реставрації. Відвідувачі одразу бачать вказівник маршруту, електронний лічильник відвідуваності та стенд з історією будівлі. Старе виробництво не зникло безслідно: воно стало культурним вогнищем району.
    tasks:
      - "Випишіть п'ять назв місць або приміщень."
      - "Знайдіть два слова, що називають пристрої або предмети."
      - "Поясніть, як слово «сховище» пов'язане з функцією простору."
      - "Сформулюйте головну думку уривка одним реченням."
      - "Визначте, яке слово називає культурну функцію району метафорично."
      - "Поясніть різницю між друкарнею як виробничим місцем і друкарнею як простором пам'яті."
      - "Знайдіть назву місця, утворену від дії читання."
      - "Знайдіть назву місця, пов'язану з роботою майстра."
      - "Поясніть, чому «майданчик» у тексті не просто фізична площа."
      - "Назвіть слово, яке допомагає відвідувачам орієнтуватися."
      - "Доберіть загальні родові назви до слів «чайник», «лічильник», «вказівник»."
      - "Перепишіть одне речення так, щоб у ньому було менше загальних слів і більше точних назв."
  - type: essay-response
    id: place-object-essay
    title: "Власне висловлення: простір за функцією"
    instruction: "Напишіть 180-220 слів з описом громадського простору або майстерні."
    prompt: "Опишіть стару садибу, сучасний громадський простір або майстерню. Використайте щонайменше 12 назв місць і предметів із суфіксами -ня, -арня, -ище, -ач, -ник, -лк(а), -ниця або -ик. Поясніть, як назва показує функцію простору чи предмета."
    min_words: 180
    model_answer: "Сучасний громадський простір у колишній друкарні зберіг пам'ять про виробництво, але змінив свою функцію. На вході стоїть вказівник, який веде до читальні, книгарні та кав'ярні. У читальні облаштовано архівне сховище, де зберігають документи про історію району. Поруч працює майстерня реставрації: там є вимикачі для окремих зон, лічильник вологості, записник для замовлень і спеціальне обладнання. У дворі створили майданчик для лекцій, а стара світлиця стала кімнатою зустрічей. Мені подобається, що назви цих місць не випадкові: читальня передбачає читання, майстерня - працю майстра, сховище - збереження, а майданчик - відкриту дію. Так словотвір допомагає бачити простір не як набір кімнат, а як систему функцій."
    rubric:
      - criteria: "Словотвір"
        description: "Використано різні моделі назв місць і предметів."
        points: 2
      - criteria: "Функціональний опис"
        description: "Пояснено призначення простору або предметів."
        points: 2
      - criteria: "Мовна точність"
        description: "Дотримано нормативного роду, числа й відмінка."
        points: 1
  - type: critical-analysis
    id: place-object-critical
    title: "Критичний аналіз: назва і функція"
    instruction: "Проаналізуйте, як назва змінює сприйняття простору."
    target_text: "У будівлі є кімната для читання, місце для зберігання документів і місце, де майстри ремонтують речі. У будівлі є читальня, архівне сховище і майстерня реставрації."
    questions:
      - "Яка версія звучить точніше й чому?"
      - "Які суфікси допомагають передати функцію?"
      - "Коли загальний опис може бути кращим за суфіксальну назву?"
      - "Яке слово в другій версії називає приміщення за дією читання?"
      - "Яке слово в другій версії називає місце зберігання?"
      - "Яке слово в другій версії називає місце професійної дії?"
      - "Чому «місце, де майстри ремонтують речі» звучить менш економно, ніж «майстерня реставрації»?"
      - "У якому жанрі перша версія могла б бути доречною?"
      - "Який ризик має автоматичне творення нових назв місць?"
      - "Як друга версія допомагає читачеві уявити організацію простору?"
      - "Яку назву можна замінити родовим словом, якщо точна функція невідома?"
      - "Який висновок про зв'язок словотвору й функції простору можна зробити?"
    model_answers:
      - "Друга версія точніша, бо читальня, сховище й майстерня одразу називають функцію простору."
      - "Функцію передають моделі -льня, -ище та -ня: вони формують назви місць за дією або призначенням."
      - "Загальний опис кращий тоді, коли точна назва невідома або суфіксальна форма звучить штучно."
      - "Читальня називає приміщення за дією читання."
      - "Архівне сховище називає місце зберігання документів."
      - "Майстерня реставрації називає простір професійної роботи."
      - "Слово майстерня стисло поєднує місце, дію й професійну функцію."
      - "Перша версія доречна в поясненні для читача, який ще не знає точних назв."
      - "Ризик у тому, що штучна форма може звучати ненормативно або комічно."
      - "Вона одразу показує зони будівлі й допомагає уявити маршрут."
      - "Можна вжити родове слово приміщення, якщо функція ще не уточнена."
      - "Словотвір допомагає називати простір через дію, призначення й соціальну роль."
    focus_points:
      - "функція простору"
      - "словотвірна точність"
      - "редагування загальних описів"
  - type: quiz
    title: "Розпізнайте модель"
    instruction: "Оберіть правильну відповідь."
    items:
      - question: "Яке слово називає приміщення для читання?"
        options:
          - text: "читальня"
            correct: true
          - text: "читач"
            correct: false
          - text: "читання"
            correct: false
          - text: "читанка"
            correct: false
        explanation: "Читальня - місце або приміщення для читання."
      - question: "Яке слово має модель місця зберігання?"
        options:
          - text: "сховище"
            correct: true
          - text: "сховати"
            correct: false
          - text: "схований"
            correct: false
          - text: "сховокий"
            correct: false
        explanation: "Сховище називає місце або систему зберігання."
      - question: "У якому слові суфікс -ач називає пристрій?"
        options:
          - text: "вимикач"
            correct: true
          - text: "читач"
            correct: false
          - text: "глядач"
            correct: false
          - text: "слухач"
            correct: false
        explanation: "Вимикач - предмет, а не особа."
      - question: "Яке слово природно позначає пристрій обліку?"
        options:
          - text: "лічильник"
            correct: true
          - text: "лічарня"
            correct: false
          - text: "лічиця"
            correct: false
          - text: "лічисько"
            correct: false
        explanation: "Лічильник рахує або фіксує показники."
      - question: "Яка форма має історичне значення давнього поселення?"
        options:
          - text: "городище"
            correct: true
          - text: "городник"
            correct: false
          - text: "городина"
            correct: false
          - text: "городянство"
            correct: false
        explanation: "Городище - археологічна або історична назва місця."
      - question: "Яке слово є місткістю для цукру?"
        options:
          - text: "цукорниця"
            correct: true
          - text: "цукровість"
            correct: false
          - text: "цукорник"
            correct: false
          - text: "цукрище"
            correct: false
        explanation: "Цукорниця - посудина для цукру."
      - question: "Яке слово розмовно називає пральну машину?"
        options:
          - text: "пралка"
            correct: true
          - text: "праник"
            correct: false
          - text: "пралище"
            correct: false
          - text: "пральня"
            correct: false
        explanation: "Пралка - розмовна назва пристрою, а пральня - місце."
      - question: "Яке слово може бути метафорою культурного центру?"
        options:
          - text: "вогнище"
            correct: true
          - text: "вогник"
            correct: false
          - text: "вогненний"
            correct: false
          - text: "вогнювання"
            correct: false
        explanation: "Вогнище може означати осередок активності."
      - question: "Яке слово є родовою назвою технічної речі?"
        options:
          - text: "пристрій"
            correct: true
          - text: "приміщення"
            correct: false
          - text: "установа"
            correct: false
          - text: "пасовище"
            correct: false
        explanation: "Пристрій - загальна назва технічного предмета."
      - question: "Яке слово називає місце видобування?"
        options:
          - text: "копальня"
            correct: true
          - text: "копач"
            correct: false
          - text: "копанка"
            correct: false
          - text: "копання"
            correct: false
        explanation: "Копальня - виробнича локація."
      - question: "Яке слово називає знак або предмет, що скеровує?"
        options:
          - text: "вказівник"
            correct: true
          - text: "показник"
            correct: false
          - text: "казкар"
            correct: false
          - text: "указ"
            correct: false
        explanation: "Вказівник указує напрям або місце."
      - question: "Яке слово найдоречніше в офіційному технічному описі?"
        options:
          - text: "пральна машина"
            correct: true
          - text: "пралка"
            correct: false
          - text: "пральничка"
            correct: false
          - text: "пралишко"
            correct: false
        explanation: "Пральна машина нейтральна, пралка розмовна."
  - type: match-up
    title: "Слово і функція"
    instruction: "Поєднайте слово з його функцією."
    pairs:
      - left: "читальня"
        right: "приміщення для читання"
      - left: "пекарня"
        right: "місце випікання або продажу хліба"
      - left: "сховище"
        right: "місце зберігання"
      - left: "городище"
        right: "давнє укріплене поселення"
      - left: "вимикач"
        right: "пристрій керування електрикою"
      - left: "лічильник"
        right: "пристрій обліку"
      - left: "записник"
        right: "предмет для нотаток"
      - left: "сівалка"
        right: "машина для сівби"
      - left: "цукорниця"
        right: "посудина для цукру"
      - left: "соусник"
        right: "посудина для соусу"
      - left: "вказівник"
        right: "знак, що скеровує"
      - left: "обладнання"
        right: "сукупність пристроїв"
  - type: fill-in
    title: "Доберіть назву місця або предмета"
    instruction: "Заповніть пропуски доречними словами."
    items:
      - sentence: "У бібліотеці відкрили нову ____ для роботи з архівами."
        answer: "читальню"
        options: ["читальню", "читача", "читанку", "читання"]
        explanation: "Читальня - спеціальне приміщення."
      - sentence: "Документи перенесли в безпечне архівне ____."
        answer: "сховище"
        options: ["сховище", "схованку", "сховність", "сховальню"]
        explanation: "Сховище називає місце зберігання."
      - sentence: "На вході встановили новий ____ світла."
        answer: "вимикач"
        options: ["вимикач", "вимикання", "вимикник", "вимиця"]
        explanation: "Вимикач - пристрій керування."
      - sentence: "Електронний ____ показує споживання води."
        answer: "лічильник"
        options: ["лічильник", "лічильня", "лічба", "лічення"]
        explanation: "Лічильник фіксує показники."
      - sentence: "У дворі облаштували дитячий ____."
        answer: "майданчик"
        options: ["майданчик", "майданність", "майданарня", "майданник"]
        explanation: "Майданчик - невеликий простір для дії."
      - sentence: "Стара ____ стала музеєм промислової історії."
        answer: "копальня"
        options: ["копальня", "копач", "копання", "копалка"]
        explanation: "Копальня - місце видобування."
      - sentence: "На столі стояла порцелянова ____."
        answer: "цукорниця"
        options: ["цукорниця", "цукрість", "цукорник", "цукрище"]
        explanation: "Цукорниця - місткість для цукру."
      - sentence: "До салату подали окремий ____."
        answer: "соусник"
        options: ["соусник", "соусництво", "соусарня", "соусність"]
        explanation: "Соусник - посудина для соусу."
      - sentence: "У майстерні перевірили все ____ перед заняттям."
        answer: "обладнання"
        options: ["обладнання", "обладність", "обладник", "обладище"]
        explanation: "Обладнання - сукупність пристроїв."
      - sentence: "Біля дороги поставили новий ____ до музею."
        answer: "вказівник"
        options: ["вказівник", "показник", "указник", "казальня"]
        explanation: "Вказівник скеровує."
      - sentence: "Археологи досліджували давнє ____."
        answer: "городище"
        options: ["городище", "городник", "городянство", "городина"]
        explanation: "Городище - історична назва місця."
      - sentence: "У побутовій розмові пральну машину часто називають ____."
        answer: "пралкою"
        options: ["пралкою", "пральнею", "праником", "пралищем"]
        explanation: "Пралка - розмовна назва пристрою."
  - type: cloze
    title: "Назви в описі простору"
    instruction: "Вставте пропущені слова."
    passage: "У старій {1} відкрили культурну {2}. На першому поверсі працює {3}, поруч розташована {4}. Архівні матеріали перенесли в окреме {5}, а у дворі облаштували {6} для лекцій. У {7} перевірили {8}: {9}, {10}, {11} і кілька ручних {12}. На кухні стояли {13} і {14}, а біля входу висів {15} маршруту. Під гарячий чайник поставили дерев'яну {16}."
    blanks:
      - id: 1
