        options: ["майданчик", "майданність", "майданище", "майданарня"]
      - id: 7
        answer: "майстерні"
        options: ["майстерні", "майстерності", "майстрині", "майструванні"]
      - id: 8
        answer: "обладнання"
        options: ["обладнання", "обладник", "обладність", "обладище"]
      - id: 9
