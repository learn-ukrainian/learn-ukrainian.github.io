version: '1.0'
module: word-formation-place-object-names
level: b2
inline:
  - type: match-up
    title: "Місце і суфікс"
    instruction: "Поєднайте назву місця з її функцією або словотвірною моделлю."
    pairs:
      - left: "їдальня"
        right: "приміщення для їжі; модель -ня"
      - left: "читальня"
        right: "місце, де читають; модель -льня"
      - left: "пекарня"
        right: "місце випікання або продажу хліба; модель -арня"
      - left: "друкарня"
        right: "підприємство або місце друку"
      - left: "світлиця"
        right: "традиційна назва кімнати з культурним відтінком"
      - left: "сховище"
        right: "місце для зберігання або захисту"
      - left: "майстерня"
        right: "місце роботи майстра або творчої праці"
      - left: "котельня"
        right: "технічне приміщення за функцією"
      - left: "пральня"
        right: "місце або сервіс для прання"
      - left: "копальня"
        right: "місце видобутку"

  - type: select
    title: "-ище, -исько і регістр"
    instruction: "Позначте всі правильні твердження про значення й тон назви."
    items:
      - question: "«Сховище документів розташоване в підвалі»."
        min_correct: 2
        options:
          - text: "Слово називає місце зберігання."
            correct: true
          - text: "Форма звучить нейтрально й технічно."
            correct: true
          - text: "Слово обов'язково зневажливе."
            correct: false
          - text: "У формальному тексті його завжди треба замінити."
            correct: false
        explanation: "Сховище є нейтральною назвою місця або системи зберігання."
      - question: "«У звіті територію назвали болотищем»."
        min_correct: 2
        options:
          - text: "Слово може звучати розмовно або оцінно."
            correct: true
          - text: "У нейтральному звіті краще «заболочена ділянка»."
            correct: true
          - text: "Це найточніший науковий термін для будь-якого болота."
            correct: false
          - text: "Суфікс автоматично робить назву офіційною."
            correct: false
        explanation: "Експресивна форма не завжди доречна в технічному описі."
      - question: "«Городище досліджують археологи»."
        min_correct: 2
        options:
          - text: "Слово може називати залишки давнього укріпленого поселення."
            correct: true
          - text: "Назва належить до історико-культурного контексту."
            correct: true
          - text: "Це розмовна назва кухонного предмета."
            correct: false
          - text: "Слово треба замінити на «містечко» в усіх контекстах."
            correct: false
        explanation: "Городище є усталеною історико-археологічною назвою."
      - question: "«Пасовисько розташоване за селом»."
        min_correct: 2
        options:
          - text: "Слово називає місце дії."
            correct: true
          - text: "Форма може бути нейтральною назвою території."
            correct: true
          - text: "Це назва електричного пристрою."
            correct: false
          - text: "Слово обов'язково означає зневагу."
            correct: false
        explanation: "Пасовисько - місце, де пасуть худобу."
      - question: "«Згарище оглянули після пожежі»."
        min_correct: 2
        options:
          - text: "Слово називає місце після дії горіння."
            correct: true
          - text: "Назва має драматичний наслідковий зміст."
            correct: true
          - text: "Це нейтральна назва кухонного пристрою."
            correct: false
          - text: "Слово означає місткість для попелу."
            correct: false
        explanation: "Згарище не те саме, що попільниця."
      - question: "«Майданчик відкрили біля школи»."
        min_correct: 2
        options:
          - text: "Слово може називати обмежену зону для дії."
            correct: true
          - text: "Форма не обов'язково означає дуже малий майдан."
            correct: true
          - text: "Це завжди розмовна образа."
            correct: false
          - text: "Слово треба замінити на «майданище»."
            correct: false
        explanation: "Майданчик може бути стандартною назвою простору."
      - question: "«Сміттєзвалище перевіряє громада»."
        min_correct: 2
        options:
          - text: "Слово називає місце складування відходів."
            correct: true
          - text: "У публіцистиці воно може мати негативний відтінок."
            correct: true
          - text: "Це назва фемінітиву."
            correct: false
          - text: "Це суто назва пристрою."
            correct: false
        explanation: "Назви місць можуть бути точними й водночас емоційно сильними."
      - question: "«Урочище позначили на мапі»."
        min_correct: 2
        options:
          - text: "Слово належить до географічної лексики."
            correct: true
          - text: "Назву краще пояснити в путівнику для широкої аудиторії."
            correct: true
          - text: "Це побутовий контейнер."
            correct: false
          - text: "Це завжди назва пральної машини."
            correct: false
        explanation: "Непрозорі географічні назви потребують контексту."

  - type: fill-in
    title: "Назвіть пристрій або предмет"
    instruction: "Виберіть природну назву за функцією предмета."
    items:
      - sentence: "Пристрій, який обігріває кімнату, - ____."
        answer: "обігрівач"
        options: ["обігрівач", "обігрівальність", "грівникарня", "обігрівство"]
        explanation: "Обігрівач прозоро називає пристрій за дією."
      - sentence: "Елемент, яким вмикають або вимикають світло, - ____."
        answer: "вимикач"
        options: ["вимикач", "вимикальність", "вимиканнячко", "вимикарня"]
        explanation: "Вимикач - усталена назва пристрою."
      - sentence: "Посудина або електричний предмет для води й чаю - ____."
        answer: "чайник"
        options: ["чайник", "чайництво", "чайкарня", "чайність"]
        explanation: "Чайник має суфікс -ник, але називає предмет, не людину."
      - sentence: "Предмет для цукру на столі - ____."
        answer: "цукорниця"
        options: ["цукорниця", "цукорникарня", "цукровість", "цукрисько"]
        explanation: "Цукорниця - місткість для цукру."
      - sentence: "Знак, що показує напрям, - ____."
        answer: "вказівник"
        options: ["вказівник", "вказувачество", "вказарня", "вказаність"]
        explanation: "Вказівник - усталена назва знака або елемента інтерфейсу."
      - sentence: "Розмовна назва пральної машини - ____."
        answer: "пралка"
        options: ["пралка", "пральність", "праннярня", "пральник як пристрій"]
        explanation: "Пралка природна в побутовій розмові, але не в технічному описі."
      - sentence: "Предмет для серветок - ____."
        answer: "серветниця"
        options: ["серветниця", "серветність", "серветарня", "серветище"]
        explanation: "Серветниця - місткість або підставка для серветок."
      - sentence: "Кількісна величина в таблиці - ____."
        answer: "показник"
        options: ["показник", "показальня", "показище", "показність"]
        explanation: "Показник може називати індикатор або величину."
      - sentence: "Прилад, що рахує споживання електроенергії, - ____."
        answer: "лічильник"
        options: ["лічильник", "лічильня", "лічильність", "лічище"]
        explanation: "Лічильник називає прилад обліку."
      - sentence: "Місткість для хліба на кухні - ____."
        answer: "хлібниця"
        options: ["хлібниця", "хлібарня", "хлібність", "хлібище"]
        explanation: "Хлібниця - усталена назва місткості."

  - type: group-sort
    title: "Місце, пристрій чи місткість?"
    instruction: "Розподіліть слова за головною функцією."
    groups:
      - name: "Місце або приміщення"
        items: ["їдальня", "пекарня", "читальня", "сховище"]
      - name: "Пристрій або технічний предмет"
        items: ["обігрівач", "вимикач", "зволожувач", "лічильник"]
      - name: "Місткість або побутовий контейнер"
        items: ["цукорниця", "серветниця", "хлібниця", "попільниця"]
      - name: "Простір або зона"
        items: ["майданчик", "пасовисько", "городище", "згарище"]

  - type: error-correction
    title: "Виправте назву за регістром"
    instruction: "Замініть штучну або стилістично невдалу назву природнішою."
    items:
      - sentence: "У технічному описі написали: пралка має гарантію два роки."
        error: "пралка"
        correction: "пральна машина"
        options: ["пральна машина", "пралка", "праннялка", "пральність"]
        explanation: "У технічному описі доречна повна нейтральна назва."
      - sentence: "У звіті територію назвали великим болотищем."
        error: "великим болотищем"
        correction: "заболоченою ділянкою"
        options: ["заболоченою ділянкою", "великим болотищем", "болотним болотиськом", "болотарнею"]
        explanation: "Нейтральний природничий опис краще за експресивну форму."
      - sentence: "На вході немає навігаційного вказувача."
        error: "навігаційного вказувача"
        correction: "вказівника"
        options: ["вказівника", "навігаційного вказувача", "вказівальника", "вказарні"]
        explanation: "Вказівник - усталена коротка назва."
      - sentence: "Для батарейок потрібна контейнерниця."
        error: "контейнерниця"
        correction: "контейнер"
        options: ["контейнер", "контейнерниця", "контейнерість", "контейнерисько"]
        explanation: "Описова або запозичена назва тут точніша за штучний новотвір."
      - sentence: "У кімнаті поставили повітроочищувальник."
        error: "повітроочищувальник"
        correction: "очищувач повітря"
        options: ["очищувач повітря", "повітроочищувальник", "очисткарня", "повітряниця"]
        explanation: "Очищувач повітря звучить прозоріше й природніше."
      - sentence: "Музей має стару кімнату-світло."
        error: "кімнату-світло"
        correction: "світлицю"
        options: ["світлицю", "кімнату-світло", "світловарню", "світильність"]
        explanation: "Світлиця - традиційна назва кімнати в культурному описі."
      - sentence: "У гарантії написали: зарядка має бути сухою."
        error: "зарядка"
        correction: "зарядний пристрій"
        options: ["зарядний пристрій", "зарядка", "зарядність", "зарядарня"]
        explanation: "В офіційному тексті краще повна технічна назва."
      - sentence: "На стіні повісили показувач до укриття."
        error: "показувач"
        correction: "вказівник"
        options: ["вказівник", "показувач", "показальник", "показарня"]
        explanation: "Вказівник - усталена назва знака напряму."

workbook:
  - type: unjumble
    title: "Складіть точну назву"
    instruction: "Розставте слова так, щоб утворити природне речення з назвою місця або предмета."
    items:
      - words: ["У", "підвалі", "облаштували", "сховище", "для", "документів"]
        answer: "У підвалі облаштували сховище для документів"
      - words: ["На", "вході", "потрібен", "новий", "чіткий", "вказівник"]
        answer: "На вході потрібен новий чіткий вказівник"
      - words: ["Пральна", "машина", "має", "дворічну", "технічну", "гарантію"]
        answer: "Пральна машина має дворічну технічну гарантію"
      - words: ["Цукорниця", "стоїть", "поруч", "із", "білим", "чайником"]
        answer: "Цукорниця стоїть поруч із білим чайником"
      - words: ["У", "читальні", "поставили", "новий", "дерев'яний", "стіл"]
        answer: "У читальні поставили новий дерев'яний стіл"
      - words: ["Сховище", "даних", "потребує", "надійного", "технічного", "захисту"]
        answer: "Сховище даних потребує надійного технічного захисту"
      - words: ["Обігрівач", "працює", "лише", "в", "малій", "кімнаті"]
        answer: "Обігрівач працює лише в малій кімнаті"
      - words: ["Контейнер", "для", "батарейок", "стоїть", "біля", "входу"]
        answer: "Контейнер для батарейок стоїть біля входу"
      - words: ["Городище", "позначили", "на", "новій", "туристичній", "мапі"]
        answer: "Городище позначили на новій туристичній мапі"
      - words: ["Вказівник", "до", "укриття", "має", "бути", "видимим"]
        answer: "Вказівник до укриття має бути видимим"

  - type: match-up
    title: "Назва і стиль"
    instruction: "Поєднайте назву з контекстом, де вона найприродніша."
    pairs:
      - left: "пралка"
        right: "побутова розмова"
      - left: "пральна машина"
        right: "інструкція або гарантійний опис"
      - left: "світлиця"
        right: "культурний або музейний опис"
      - left: "сховище даних"
        right: "технічний або інформаційний контекст"
      - left: "заболочена ділянка"
        right: "нейтральний природничий звіт"
      - left: "болотище"
        right: "розмовний або експресивний опис"
      - left: "зарядний пристрій"
        right: "офіційна назва предмета"
      - left: "зарядка"
        right: "побутова коротка назва"
      - left: "контейнер для батарейок"
        right: "нейтральна описова назва місткості"
      - left: "городище"
        right: "історико-культурний або археологічний контекст"

  - type: fill-in
    title: "Місткість або пристрій"
    instruction: "Виберіть слово, яке точно називає предмет."
    items:
      - sentence: "Для хліба на кухні стоїть ____."
        answer: "хлібниця"
        options: ["хлібниця", "хлібарня", "хлібність", "хлібище"]
        explanation: "Хлібниця - місткість для хліба."
      - sentence: "Для кавових зерен потрібна ____."
        answer: "кавомолка"
        options: ["кавомолка", "каванниця", "кавовість", "кависько"]
        explanation: "Кавомолка - пристрій, що меле каву."
      - sentence: "Прилад, що вимірює споживання, - ____."
        answer: "лічильник"
        options: ["лічильник", "лічильня", "лічильність", "лічище"]
        explanation: "Лічильник називає пристрій або прилад обліку."
      - sentence: "Предмет для попелу - ____."
        answer: "попільниця"
        options: ["попільниця", "попеларня", "попільність", "попелище"]
        explanation: "Попільниця - побутова місткість; попелище має інше значення."
      - sentence: "Пристрій, що зволожує повітря, - ____."
        answer: "зволожувач"
        options: ["зволожувач", "зволожарня", "зволоженість", "зволожище"]
        explanation: "Зволожувач прозоро називає функцію пристрою."
      - sentence: "Пристрій, що обігріває кімнату, - ____."
        answer: "обігрівач"
        options: ["обігрівач", "обігрівальність", "гріварня", "обігрівство"]
        explanation: "Обігрівач називає пристрій за дією."
      - sentence: "Знак, що показує напрям, - ____."
        answer: "вказівник"
        options: ["вказівник", "вказувачество", "вказарня", "вказаність"]
        explanation: "Вказівник - усталена функціональна назва."
      - sentence: "Предмет для серветок - ____."
        answer: "серветниця"
        options: ["серветниця", "серветність", "серветарня", "серветище"]
        explanation: "Серветниця - місткість або підставка для серветок."
      - sentence: "Місце для зберігання або захисту - ____."
        answer: "сховище"
        options: ["сховище", "сховальність", "сховарня", "сховник як людина"]
        explanation: "Сховище називає місце або систему зберігання."
      - sentence: "Розмовна назва зарядного пристрою - ____."
        answer: "зарядка"
        options: ["зарядка", "зарядність", "зарядище", "зарядникарня"]
        explanation: "Зарядка доречна в побутовій розмові."

  - id: workbook-4
    type: essay-response
    title: "Опис простору з точними назвами"
    min_words: 150
    prompt: >-
      Напишіть 150-180 слів як короткий опис громадського простору або старої садиби.
      Використайте щонайменше десять назв місць і предметів: дві назви приміщень,
      дві назви на -ище/-исько, три назви пристроїв або знарядь, дві місткості й
      одну розмовну форму, яку ви одразу заміните нейтральною для офіційного стилю.
    model_answer: |-
      > [!model-answer]
      У старій садибі відновили світлицю, невелику читальню й майстерню для роботи з деревом. За будинком збереглося городище, а біля господарського двору облаштували сховище для інструментів. В експозиції є чайник, цукорниця, хлібниця та старий лічильник, який показує, як обліковували електроенергію. У побутовій розмові екскурсовод сказав би «пралка», але в описі для відвідувачів краще написати «пральна машина». На вході потрібен вказівник, а в холодній кімнаті - обігрівач. Такі назви допомагають не просто перелічити речі, а пояснити їхню функцію й стиль.
    rubric:
      - criteria: "Словотвірні моделі"
        description: "У тексті використано потрібні типи назв місць і предметів."
        points: 2
      - criteria: "Регістр"
        description: "Показано різницю між розмовною й нейтральною назвою."
        points: 2
      - criteria: "Функціональна прозорість"
        description: "Назви предметів пояснюють їхню функцію в просторі."
        points: 1

  - type: true-false
    title: "Контроль назв місць і предметів"
    instruction: "Визначте, чи твердження відповідає словотвірним і регістровим правилам."
    items:
      - statement: "«Пралка» природна в побутовій розмові, але не найкраща для технічного акта."
        correct: true
        explanation: "В офіційному описі краще «пральна машина»."
      - statement: "Слово «сховище» може бути нейтральною технічною назвою."
        correct: true
        explanation: "Сховище документів або даних є нейтральною назвою місця зберігання."
      - statement: "Добра назва предмета часто підказує його функцію."
        correct: true
        explanation: "Вимикач, обігрівач, цукорниця й вказівник є функціонально прозорими."
      - statement: "«Контейнерниця» завжди точніша за «контейнер для батарейок»."
        correct: false
        explanation: "Описова назва тут природніша й точніша."
      - statement: "Назви предметів не залежать від жанру тексту."
        correct: false
        explanation: "Розмова, інструкція, путівник і технічний акт потребують різної точності."
      - statement: "«Вказівник» є усталеною назвою знака або елемента, що вказує напрям."
        correct: true
        explanation: "Це функціонально прозора назва."
      - statement: "«Болотище» завжди найкращий термін для природничого звіту."
        correct: false
        explanation: "У звіті часто краще «заболочена ділянка»."
      - statement: "«Цукорниця» називає місткість для цукру."
        correct: true
        explanation: "Суфікс -ниця часто творить назви місткостей."
      - statement: "«Читальня» і «майстерня» називають простори за функцією."
        correct: true
        explanation: "Назва місця підказує, що там роблять."
      - statement: "Штучний новотвір завжди кращий за описову конструкцію."
        correct: false
        explanation: "Якщо слово не усталене, описова назва часто безпечніша."
