  - type: essay-response
    id: wb-final-syntax-self-review
    title: "Фінальне письмо: синтаксис і саморевізія"
    instruction: "Напишіть 180-220 слів і додайте коротку самоперевірку."
    prompt: >-
      Опишіть ситуацію, у якій культурний, освітній або сервісний проєкт змінив
      план після обговорення з аудиторією. Використайте складнопідрядне речення,
      сурядне або безсполучникове пояснення, корелятивну пару, контрольований
      експресивний прийом і пряму або непряму мову. Після тексту додайте
      самоперевірку з трьох пунктів: один знак пунктуації, один конектор, один
      вибір регістру.
    min_words: 180
    rubric:
      - criteria: "Інтеграція M22-M30"
        description: "Текст природно поєднує вставки, складне речення, конектори, експресію та чуже слово."
        points: 4
      - criteria: "Діагностична прозорість"
        description: "Самоперевірка пояснює конкретні рішення, а не повторює загальні правила."
        points: 4
      - criteria: "Регістр і точність"
        description: "Синтаксис відповідає жанру; експресія не руйнує ясність."
        points: 2
    model_answer: |-
      > [!model-answer]
      > Коли центр міських ініціатив оголосив програму зустрічей, організатори
      > планували лише короткі презентації, однак перша дискусія показала, що
      > аудиторії потрібен інший формат: люди хотіли не тільки слухати, а й
      > перевіряти власні приклади. Координаторка сказала: "Без практики ця тема
      > залишиться красивою назвою". Після цього команда вирішила, що ті, хто
      > прийде з готовими текстами, отримають окремий час для редакторської
      > роботи. Саме цей крок змінив атмосферу. Перший блок пояснював правила;
      > другий - показував, як вони працюють у листах, відгуках і публічних
      > оголошеннях. Зустріч стала повільнішою, зате кориснішою, бо кожен учасник
      > міг побачити власну помилку в контексті. Самоперевірка: двокрапка після
      > **формат** відкриває пояснення, чому програму змінили. Конектор **зате**
      > створює протиставлення між темпом і користю. Парцельований акцент **Саме
      > цей крок** доречний у публіцистичному описі, але в офіційному звіті я
      > замінив би його нейтральним порядком.
