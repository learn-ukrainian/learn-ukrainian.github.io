version: '1.0'
module: checkpoint-syntax-ii
level: b2
inline: []
workbook:
  - type: reading
    id: syntax-ii-reading-map
    title: "Читання: карта складного речення"
    instruction: "Прочитай фрагмент і визнач, як пов'язані його частини."
    source: "Навчальний текст для контрольного модуля B2."
    text: >
      Коли громадська організація відкрила новий простір для мовних зустрічей, перші учасники чекали звичайної лекції, але формат швидко змінився: модераторка запропонувала не тільки слухати пояснення, а й аналізувати власні тексти. Вона сказала: «Синтаксис видно тоді, коли автор може пояснити кожен знак». Після цього група розібрала абзац, у якому поєдналися підрядна умова, сурядне протиставлення й безсполучникове пояснення.
    tasks:
      - "Випиши підрядну частину часу або умови."
      - "Знайди сурядне протиставлення й назви сполучник."
      - "Поясни, чому після слова «змінився» стоїть двокрапка."
      - "Визнач, як оформлено пряму мову."
      - "Знайди парний сполучник і перевір симетрію частин."
      - "Сформулюй головну синтаксичну проблему фрагмента."

  - type: reading
    id: syntax-ii-reading-cohesion
    title: "Читання: когезія абзацу"
    instruction: "Прочитай абзац і простеж, як конектори ведуть аргумент."
    source: "Навчальний текст для контрольного модуля B2."
    text: >
      Місто оновило культурний центр, однак перші відгуки були обережні. Причина полягала не в самому просторі, а в тому, що відвідувачі не одразу зрозуміли новий формат. Через це команда змінила комунікацію: замість довгих оголошень вона підготувала короткі пояснення, приклади подій і запрошення до розмови. Отже, успіх залежав не тільки від архітектури, а й від зв'язності повідомлення.
    tasks:
      - "Випиши конектор протиставлення."
      - "Знайди причиново-наслідковий перехід."
      - "Поясни функцію двокрапки після слова «комунікацію»."
      - "Знайди парний сполучник «не тільки... а й»."
      - "Визнач, який конектор підсумовує абзац."
      - "Запропонуй один синонімічний конектор без зміни змісту."

  - type: reading
    id: syntax-ii-reading-expression
    title: "Читання: експресивний синтаксис"
    instruction: "Прочитай уривок і визнач, які засоби створюють акцент."
    source: "Навчальний текст для контрольного модуля B2."
    text: >
      Команда чекала відповіді три тижні. Без пояснень. Без конкретної дати. Саме ця пауза змінила тон публічного обговорення: учасники вже не просили загальної інформації, а вимагали чіткої відповіді. «Ми готові чекати, - написала координаторка, - але не готові мовчати». Уривок звучить напружено, бо парцеляція, інверсія й пряма мова працюють разом.
    tasks:
      - "Випиши два парцельовані фрагменти."
      - "Поясни, що підсилює частка «саме»."
      - "Знайди протиставлення в прямій мові."
      - "Назви знак, який відкриває пояснення після слова «обговорення»."
      - "Поясни, чому уривок не підходить для сухого офіційного звіту."
      - "Перепиши перше речення нейтральніше."

  - type: reading
    id: syntax-ii-reading-reported-speech
    title: "Читання: чужий голос у складному реченні"
    instruction: "Прочитай текст і розмежуй пряму, непряму та авторську мову."
    source: "Навчальний текст для контрольного модуля B2."
    text: >
      Редакторка запитала, чи всі джерела перевірено, і студент відповів, що сторінки вже додано. Потім він процитував консультанта: «Без контексту навіть точна фраза може стати неточною». Викладачка погодилася, але нагадала, що цитата не замінює власного аналізу. Знову цей баланс: чуже слово потрібне, однак воно має працювати в аргументі.
    tasks:
      - "Знайди непряме загальне питання."
      - "Поясни, чому використано частку «чи»."
      - "Випиши приклад прямої мови."
      - "Знайди непряму мову з підрядною частиною."
      - "Визнач фрагмент, який звучить як внутрішній коментар."
      - "Поясни, чому цитата не може замінити аналіз."

  - type: reading
    id: syntax-ii-reading-editing
    title: "Читання: редакторська діагностика"
    instruction: "Прочитай фрагмент і знайди місця, які варто перевірити редакторові."
    source: "Навчальний текст для контрольного модуля B2."
    text: >
      Автор підготував огляд, оскільки він поспішав, тому частина прикладів залишилася без пояснення. Він написав, що якщо читачі зрозуміють ідею, але не показав, як саме працює головний конектор. У фіналі з'явилася сильна фраза. Дуже сильна. Проте без попередньої логіки вона звучала як емоційна заміна аргументу.
    tasks:
      - "Знайди подвійний конектор і запропонуй виправлення."
      - "Поясни, чому конструкція з «що якщо» потребує перебудови."
      - "Визнач парцеляцію й оцінити її доречність."
      - "Знайди протиставлення в останньому реченні."
      - "Запропонуй нейтральніший варіант фіналу."
      - "Поясни, чого бракує для когезії абзацу."

  - type: fill-in
    title: "Заповнення: типи складного зв'язку"
    instruction: "Обери слово або словосполучення, яке точно називає зв'язок."
    items:
      - sentence: "У реченні з рівноправними частинами переважає ____ зв'язок."
        answer: "сурядний"
        options: ["сурядний", "підрядний", "безсполучниковий", "вставний"]
        explanation: "Рівноправні частини поєднує сурядний зв'язок."
      - sentence: "Підрядна частина залежить від ____ частини речення."
        answer: "головної"
        options: ["головної", "однорідної", "вставної", "парцельованої"]
        explanation: "Підрядна частина пояснює або уточнює головну."
      - sentence: "Якщо зв'язок тримається без сполучника, він є ____."
        answer: "безсполучниковим"
        options: ["безсполучниковим", "узгодженим", "прямим", "цитованим"]
        explanation: "Безсполучниковий зв'язок спирається на інтонацію й знак."
      - sentence: "Двокрапка часто відкриває ____ другої частини."
        answer: "пояснення"
        options: ["пояснення", "заперечення", "звертання", "наголос"]
        explanation: "Друга частина може пояснювати першу."
      - sentence: "Сполучник «але» зазвичай позначає ____ між частинами."
        answer: "протиставлення"
        options: ["протиставлення", "причину", "умову", "перелік"]
        explanation: "Але вводить протиставне сурядне відношення."
      - sentence: "Підрядна частина з «коли» часто позначає ____ дії."
        answer: "час"
        options: ["час", "особу", "цитату", "перелік"]
        explanation: "Коли може вводити підрядну частину часу."
      - sentence: "Слово «який» у підрядній частині часто є ____ словом."
        answer: "сполучним"
        options: ["сполучним", "вставним", "емфатичним", "розмовним"]
        explanation: "Сполучне слово поєднує частини й виконує роль у підрядній."
      - sentence: "Крапка з комою доречна між поширеними ____ частинами."
        answer: "рівноправними"
        options: ["рівноправними", "питальними", "цитатними", "вигуковими"]
        explanation: "Вона допомагає розділити великі рівноправні блоки."
      - sentence: "У реченні з різними видами зв'язку спершу шукають ____."
        answer: "граматичні основи"
        options: ["граматичні основи", "найдовше слово", "емоційні вигуки", "усі прикметники"]
        explanation: "Основи допомагають побачити межі предикативних частин."
      - sentence: "Тире може позначати різкий ____ між частинами."
        answer: "перехід"
        options: ["перехід", "займенник", "прийменник", "переклад"]
        explanation: "Тире часто передає різку зміну або наслідок."

  - type: fill-in
    title: "Заповнення: конектори й когезія"
    instruction: "Обери конектор, який найточніше передає відношення."
    items:
      - sentence: "Команда запізнилася, ____ обговорення скоротили."
        answer: "тому"
        options: ["тому", "однак", "зокрема", "натомість"]
        explanation: "Тому вводить наслідок."
      - sentence: "План був продуманий, ____ вступ залишався надто довгим."
        answer: "проте"
        options: ["проте", "отже", "саме", "також"]
        explanation: "Проте передає протиставлення."
      - sentence: "____ обмежений бюджет, команда зберегла головні події."
        answer: "Попри"
        options: ["Попри", "Тому", "Зокрема", "Отже"]
        explanation: "Попри вводить допустове значення."
      - sentence: "У тексті бракувало прикладів; ____, теза звучала абстрактно."
        answer: "через це"
        options: ["через це", "до того ж", "однак", "зокрема"]
        explanation: "Через це називає наслідок попередньої проблеми."
      - sentence: "Автор не тільки описав подію, ____ пояснив її наслідки."
        answer: "а й"
        options: ["а й", "але", "тому", "якщо"]
        explanation: "Парний сполучник має форму не тільки... а й."
      - sentence: "____ викладачі, так і студенти підтримали новий формат."
        answer: "Як"
        options: ["Як", "Бо", "Коли", "Хоч"]
        explanation: "Парна конструкція має форму як... так і."
      - sentence: "____, головна проблема полягала не в темі, а в структурі."
        answer: "Отже"
        options: ["Отже", "Але", "Натомість", "Лише"]
        explanation: "Отже підсумовує попередній аналіз."
      - sentence: "Коментар звучав різко, ____ автор пом'якшив формулювання."
        answer: "тому"
        options: ["тому", "зокрема", "проте", "якраз"]
        explanation: "Тому називає наслідок попередньої оцінки."
      - sentence: "У першому абзаці є теза; ____, у другому подано докази."
        answer: "натомість"
        options: ["натомість", "бо", "саме", "навіть"]
        explanation: "Натомість зіставляє дві частини викладу."
      - sentence: "____ повторів, абзац має чіткий рух думки."
        answer: "Без"
        options: ["Без", "Тому", "Якщо", "Саме"]
        explanation: "Прийменник без утворює стислий допустово-оцінний вступ."

  - type: fill-in
    title: "Заповнення: експресивний синтаксис"
    instruction: "Вибери засіб, який створює потрібний акцент."
    items:
      - sentence: "____ ця затримка змінила тон обговорення."
        answer: "Саме"
        options: ["Саме", "Бо", "Однак", "Зокрема"]
        explanation: "Саме виділяє причину як фокус."
      - sentence: "У фразі «Вони чекали. Довго.» другий фрагмент є ____."
        answer: "парцелятом"
        options: ["парцелятом", "цитатою", "підметом", "конектором"]
        explanation: "Парцелят граматично залежить від базового речення."
      - sentence: "Пропуск відновлюваного присудка називається ____."
        answer: "еліпсисом"
        options: ["еліпсисом", "когезією", "цитуванням", "узгодженням"]
        explanation: "Еліпсис працює з пропуском зрозумілого елемента."
      - sentence: "Зміна звичного порядку слів для фокусу - це ____."
        answer: "інверсія"
        options: ["інверсія", "сурядність", "реферування", "двокрапка"]
        explanation: "Інверсія керує позицією важливого елемента."
      - sentence: "Частка «лише» створює ____ обмеження."
        answer: "емфазу"
        options: ["емфазу", "перелік", "умову", "цитату"]
        explanation: "Емфаза підсилює або звужує фокус."
      - sentence: "Парцеляція доречна, якщо окрема крапка додає ____."
        answer: "акцент"
        options: ["акцент", "переклад", "підмет", "сполучник"]
        explanation: "Парцеляція має працювати на змістовий акцент."
      - sentence: "У службовому листі надмірна парцеляція може звучати ____."
        answer: "театрально"
        options: ["театрально", "нейтрально", "обов'язково", "безособово"]
        explanation: "Регістр обмежує використання експресивних прийомів."
      - sentence: "Риторичне запитання має відкривати ____ або підсумок."
        answer: "аргумент"
        options: ["аргумент", "відмінок", "лапки", "перелік"]
        explanation: "Риторичне питання не має замінювати аналіз."
      - sentence: "Емфатична частка має стояти біля слова, яке отримує ____."
        answer: "фокус"
        options: ["фокус", "родовий відмінок", "лапки", "пряму мову"]
        explanation: "Місце частки визначає, що саме підсилено."
      - sentence: "Експресивність не скасовує синтаксичної ____."
        answer: "точності"
        options: ["точності", "випадковості", "надмірності", "двозначності"]
        explanation: "Навіть виразне речення має бути граматично точним."

  - type: fill-in
    title: "Заповнення: пряма й непряма мова"
    instruction: "Обери форму, потрібну для коректної передачі чужого мовлення."
    items:
      - sentence: "Редакторка запитала, ____ готовий остаточний текст."
        answer: "чи"
        options: ["чи", "що", "якщо", "тому"]
        explanation: "Чи вводить непряме загальне питання."
      - sentence: "Автор пояснив, ____ цитату треба скоротити."
        answer: "що"
        options: ["що", "чи", "якщо", "або"]
        explanation: "Що вводить непряме повідомлення."
      - sentence: "Після слів автора перед прямою мовою ставимо ____."
        answer: "двокрапку"
        options: ["двокрапку", "крапку з комою", "трикрапку", "дужки"]
        explanation: "Слова автора перед реплікою відкриваються двокрапкою."
      - sentence: "Точний фрагмент чужого тексту в лапках - це ____."
        answer: "цитата"
        options: ["цитата", "парцеляція", "інверсія", "когезія"]
        explanation: "Цитата зберігає дослівну форму."
      - sentence: "Стислий переказ чужої думки називають ____."
        answer: "реферуванням"
        options: ["реферуванням", "еліпсисом", "сурядністю", "вигуком"]
        explanation: "Реферування передає зміст без дослівного цитування."
      - sentence: "У діалозі репліку часто починають з ____."
        answer: "тире"
        options: ["тире", "коми", "дужки", "крапки з комою"]
        explanation: "Абзацне тире показує початок репліки."
      - sentence: "Невласне пряма мова зазвичай не має ____."
        answer: "лапок"
        options: ["лапок", "інтонації", "оцінки", "ритму"]
        explanation: "Її межі визначаються контекстом, а не лапками."
      - sentence: "Під час трансформації прямої мови змінюються ____."
        answer: "займенники"
        options: ["займенники", "усі іменники", "усі прикметники", "усі коми"]
        explanation: "Займенники узгоджуються з новою ситуацією переказу."
      - sentence: "Наказ у непрямій мові часто передає конструкція зі ____."
        answer: "щоб"
        options: ["щоб", "бо", "або", "саме"]
        explanation: "Щоб допомагає передати прохання або наказ."
      - sentence: "Авторський коментар має чітко відділятися від ____."
        answer: "репліки"
        options: ["репліки", "відмінка", "наголосу", "словника"]
        explanation: "Межа між словами автора й реплікою має бути видимою."

  - type: fill-in
    title: "Заповнення: пунктуаційний практикум"
    instruction: "Обери знак або поняття, що пояснює пунктуацію."
    items:
      - sentence: "У реченні «Ми чекали - відповідь не надходила» тире передає ____."
        answer: "напружене зіставлення"
        options: ["напружене зіставлення", "точну цитату", "підрядну мету", "звертання"]
        explanation: "Тире може передавати різкий перехід між частинами."
      - sentence: "У реченні «План змінили: вступ був затягнутий» двокрапка відкриває ____."
        answer: "пояснення"
        options: ["пояснення", "звертання", "пряму мову", "вигук"]
        explanation: "Друга частина пояснює причину зміни."
      - sentence: "Кому ставимо між головною і ____ частиною."
        answer: "підрядною"
        options: ["підрядною", "словниковою", "займенниковою", "наголошеною"]
        explanation: "Підрядну частину відокремлюють комою."
      - sentence: "Якщо частини довгі й мають внутрішні коми, допомагає ____."
        answer: "крапка з комою"
        options: ["крапка з комою", "лапка", "апостроф", "наголос"]
        explanation: "Крапка з комою розділяє великі блоки."
      - sentence: "У прямій мові знак питання належить самій ____."
        answer: "репліці"
        options: ["репліці", "схемі", "таблиці", "лексиці"]
        explanation: "Питальний знак стоїть усередині прямої мови."
      - sentence: "Вставне слово відокремлюється, бо не є ____ речення."
        answer: "членом"
