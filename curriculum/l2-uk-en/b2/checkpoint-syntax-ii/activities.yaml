  - type: essay-response
    id: syntax-ii-essay-types
    title: "Письмо: карта типів зв'язку"
    instruction: "Напиши відповідь українською мовою."
    prompt: "Напиши 180-220 слів про те, як відрізнити складносурядне, складнопідрядне й безсполучникове речення в реальному абзаці. Додай власний приклад речення з різними видами зв'язку."
    min_words: 180
    model_answer: >
      У реальному абзаці тип складного речення треба визначати не за довжиною, а за відношенням між частинами. Якщо частини рівноправні й поєднані сполучниками і, а, але, проте або або, ідеться про сурядність. Якщо одна частина залежить від іншої та відповідає на питання часу, причини, умови, з'ясування чи означення, це підрядність. Якщо сполучника немає, але друга частина пояснює, доповнює або різко протиставляється першій, працює безсполучниковий зв'язок. Наприклад: Коли обговорення завершилося, команда ухвалила рішення, але модераторка попросила не поспішати з висновками: частина даних ще потребувала перевірки. Тут є підрядна частина часу, сурядне протиставлення й безсполучникове пояснення.
    rubric:
      - criteria: "Аналіз"
        description: "Чітко розрізнено три типи зв'язку."
        points: 3
      - criteria: "Приклад"
        description: "Власне речення має кілька предикативних частин."
        points: 3
      - criteria: "Пунктуація"
        description: "Розділові знаки пояснені синтаксично."
        points: 4

  - type: essay-response
    id: syntax-ii-essay-cohesion
    title: "Письмо: конектори й когезія"
    instruction: "Побудуй зв'язний абзац із контрольованими конекторами."
    prompt: "Напиши 170-210 слів про культурну або освітню подію. Використай щонайменше п'ять різних конекторів: причини, наслідку, протиставлення, доповнення й підсумку."
    min_words: 170
    model_answer: >
      Університетська зустріч про академічне письмо спочатку здавалася звичайною лекцією, однак формат швидко змінився. Оскільки учасники принесли власні чернетки, розмова стала практичною: кожен міг побачити, як синтаксис впливає на переконливість тексту. До того ж викладачка показала кілька варіантів одного абзацу, і студенти порівняли, де конектор справді пояснює зв'язок, а де лише створює видимість логіки. Через це фінальна дискусія була конкретною, а не загальною. Отже, подія стала корисною не тільки завдяки темі, а й завдяки чіткій організації думки.
    rubric:
      - criteria: "Когезія"
        description: "Конектори передають різні логічні відношення."
        points: 4
      - criteria: "Регістр"
        description: "Стиль відповідає B2 академічному або публіцистичному письму."
        points: 3
      - criteria: "Зміст"
        description: "Абзац має чіткий розвиток думки."
        points: 3

  - type: essay-response
    id: syntax-ii-essay-expression
    title: "Письмо: експресивний синтаксис без надміру"
    instruction: "Покажи, що експресивний засіб має функцію."
    prompt: "Напиши 180-220 слів про ситуацію, у якій інверсія, емфаза, еліпсис або парцеляція допомагають передати зміст. Поясни, чому цей засіб доречний."
    min_words: 180
    model_answer: >
      Експресивний синтаксис доречний тоді, коли він робить важливий зміст видимішим. Наприклад, у тексті про затриману відповідь можна написати: Команда чекала три тижні. Без пояснень. Без дати. Така парцеляція не просто прикрашає фразу, а передає відчуття виснаженої паузи. Якщо об'єднати все в одне речення, інформація залишиться, але напруження зменшиться. Водночас у службовому листі такий прийом може бути надмірним, тому там краще написати: Команда чекала відповіді три тижні, але не отримала пояснення або конкретної дати. Отже, доречність залежить від жанру. Емфаза, інверсія й парцеляція мають підтримувати зміст, а не приховувати слабкий аргумент.
    rubric:
      - criteria: "Функція"
        description: "Експресивний прийом пояснено через зміст."
        points: 4
      - criteria: "Жанр"
        description: "Порівняно доречність у різних регістрах."
        points: 3
      - criteria: "Мова"
        description: "Текст граматично точний і зв'язний."
        points: 3

  - type: essay-response
    id: syntax-ii-essay-reported-speech
    title: "Письмо: трансформація чужого мовлення"
    instruction: "Порівняй пряму й непряму мову на власному прикладі."
    prompt: "Напиши 170-210 слів, у яких перекажи коротку дискусію між редактором і автором. Використай одну пряму цитату, одне непряме питання й один приклад реферування."
    min_words: 170
    model_answer: >
      Під час обговорення редактор спочатку запитав, чи автор перевірив сторінки всіх цитат. Автор відповів, що джерела вже внесено, але визнав, що контекст двох фраз треба уточнити. Тоді редактор сказав: «Точна цитата без контексту може ввести читача в оману». Після цього автор не став захищати чернетку, а коротко переказав позицію консультантки: вона вважала, що вступ має називати проблему раніше, бо читач не повинен чекати головної тези до третього абзацу. У цій дискусії пряма мова зберігає принципову фразу редактора, непряме питання передає перевірку, а реферування стисло вводить позицію третьої особи.
    rubric:
      - criteria: "Чужий голос"
        description: "Чітко розмежовано цитату, непряму мову й реферування."
        points: 4
      - criteria: "Пунктуація"
        description: "Пряма мова оформлена правильно."
        points: 3
      - criteria: "Трансформація"
        description: "Займенники й частка «чи» використані коректно."
        points: 3

  - type: essay-response
    id: syntax-ii-essay-self-reflection
    title: "Письмо: саморефлексія після checkpoint"
    instruction: "Оціни власні сильні й слабкі сторони."
    prompt: "Напиши 180-230 слів саморефлексії: які елементи складного синтаксису ти вже контролюєш, а які потребують повторення. Обов'язково згадай пунктуацію, конектори й один експресивний засіб."
    min_words: 180
    model_answer: >
      Після повторення складного синтаксису я найупевненіше розпізнаю сурядний і підрядний зв'язок, бо можу знайти граматичні основи й визначити, чи частини рівноправні. Найбільше уваги ще потребує безсполучниковий зв'язок: я не завжди швидко вирішую, коли потрібна двокрапка, а коли тире. Конектори стали зрозумілішими, особливо різниця між протиставленням і наслідком, але треба стежити, щоб не поєднувати «оскільки» з «тому». З експресивних засобів мені подобається парцеляція, проте я бачу, що її не можна використовувати в кожному абзаці. Моя наступна мета - пояснювати пунктуацію не інтуїтивно, а через тип зв'язку між частинами.
    rubric:
      - criteria: "Самооцінка"
        description: "Названо конкретні сильні й слабкі місця."
        points: 4
      - criteria: "Терміни"
        description: "Використано синтаксичну лексику модуля."
        points: 3
      - criteria: "План дії"
        description: "Є конкретна наступна навчальна мета."
        points: 3
