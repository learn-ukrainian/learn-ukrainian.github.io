version: '1.0'
module: checkpoint-syntax-ii
level: b2
inline:
  - type: reading
    id: act-1
    title: "Діагностика: карта складного речення"
    instruction: "Прочитайте уривок і побудуйте карту зв'язків перед правилами."
    source: "Навчальний checkpoint B2."
    text: >-
      Коли у просторі сучасної української культури з'являється новий фестиваль,
      глядачі часто очікують тільки афіші й концертів, але організатори швидко
      пояснюють: подія має стати місцем розмови про пам'ять, мову й відповідальність.
      Кураторка сказала: "Ми не хочемо повторити готову формулу". Потім вона
      додала, що програму змінюватимуть тоді, коли дискусія покаже слабкі місця.
      Саме ця гнучкість, на думку команди, робить фестиваль живим.
    tasks:
      - "Випишіть часову підрядну частину."
      - "Знайдіть сурядне протиставлення й назвіть сполучник."
      - "Поясніть, чому після слова **пояснюють** стоїть двокрапка."
      - "Знайдіть пряму мову та слова автора."
      - "Перетворіть пряму мову на непряму."
      - "Визначте, яку функцію має вставка **на думку команди**."
      - "Поясніть, що підсилює частка **саме**."

  - type: select
    title: "Класифікація зв'язків"
    instruction: "Виберіть правильний тип зв'язку або синтаксичну функцію."
    items:
      - question: "Який зв'язок у реченні: **Заявку прийняли, але відповідь відклали**?"
        options:
          - text: "сурядне протиставлення"
            correct: true
          - text: "підрядна умова"
            correct: false
          - text: "безсполучникове пояснення"
            correct: false
          - text: "пряма мова"
            correct: false
        explanation: "Сполучник **але** поєднує рівноправні частини й створює протиставлення."
      - question: "Що робить частина **який підготувала комісія** у реченні **Звіт, який підготувала комісія, потребує скорочення**?"
        options:
          - text: "уточнює іменник **звіт**"
            correct: true
          - text: "називає наслідок"
            correct: false
          - text: "передає чуже питання"
            correct: false
          - text: "є вставним реченням"
            correct: false
        explanation: "Це означальна підрядна частина."
      - question: "Де друга частина пояснює першу?"
        options:
          - text: "Аргумент ослаб: прикладів бракувало."
            correct: true
          - text: "Аргумент ослаб, і аудиторія чекала."
            correct: false
          - text: "Аргумент ослаб, але висновок залишився."
            correct: false
          - text: "Аргумент, який звучав голосно, ослаб."
            correct: false
        explanation: "Двокрапка відкриває пояснення причини слабкого аргументу."
      - question: "У яких реченнях є корелятивна пара?"
        min_correct: 2
        options:
          - text: "Ті, хто зареєструвався вчасно, отримають лист."
            correct: true
          - text: "Чим чіткіше правило, тим менше помилок."
            correct: true
          - text: "Заявку перевірили, але підпису не було."
            correct: false
          - text: "Редакторка сказала, що текст готовий."
            correct: false
        explanation: "Корелятивні опори: **ті, хто** і **чим... тим**."
      - question: "Де слово **здається** є вставним?"
        options:
          - text: "Здається, цей висновок потребує доказу."
            correct: true
          - text: "Цей висновок здається переконливим."
            correct: false
          - text: "Мені здається знайомим цей приклад."
            correct: false
          - text: "Висновок здається після другого абзацу."
            correct: false
        explanation: "У першому реченні **здається** виражає невпевненість автора й відокремлюється комою."
      - question: "Де є підрядна з'ясувальна частина?"
        options:
          - text: "Редакторка пояснила, що вступ треба скоротити."
            correct: true
          - text: "Редакторка працювала довго, але спокійно."
            correct: false
          - text: "Вступ короткий - текст читати легше."
            correct: false
          - text: "На жаль, вступ лишився довгим."
            correct: false
        explanation: "Підрядна частина з **що** розкриває зміст пояснення."
      - question: "Де парцеляція доречна саме як публіцистичний акцент?"
        options:
          - text: "Громада чекала відповіді. Довго. Без пояснень."
            correct: true
          - text: "Просимо. Надати. Копію. Договору."
            correct: false
          - text: "У заяві, яку подано вчора. Бракує підпису."
            correct: false
          - text: "Договір. Є чинним. До серпня."
            correct: false
        explanation: "Перший варіант має контрольований ритм відгуку; інші руйнують офіційний або граматичний зв'язок."
      - question: "Де змішано пряму й непряму мову?"
        options:
          - text: "Він сказав, що: «Приклад треба перевірити»."
            correct: true
          - text: "Він сказав: «Приклад треба перевірити»."
            correct: false
          - text: "Він сказав, що приклад треба перевірити."
            correct: false
          - text: "«Приклад треба перевірити», - сказав він."
            correct: false
        explanation: "Не можна одночасно вводити підрядну з **що** й відкривати пряму мову двокрапкою."

  - type: error-correction
    title: "Пунктуаційний ремонт"
    instruction: "Виберіть виправлений варіант і поясніть, який зв'язок керує знаком."
    items:
      - sentence: "Коли дискусія завершилася модератор підсумував результати."
        error: "немає коми після підрядної частини"
        answer: "Коли дискусія завершилася, модератор підсумував результати."
        options:
          - "Коли дискусія завершилася, модератор підсумував результати."
          - "Коли дискусія, завершилася модератор підсумував результати."
          - "Коли дискусія завершилася: модератор підсумував результати."
          - "Коли дискусія завершилася модератор, підсумував результати."
        explanation: "Підрядна частина часу стоїть перед головною."
      - sentence: "Аргумент звучав сильно, прикладів було достатньо."
        error: "зв'язок пояснення краще показати двокрапкою"
        answer: "Аргумент звучав сильно: прикладів було достатньо."
        options:
          - "Аргумент звучав сильно: прикладів було достатньо."
          - "Аргумент звучав сильно, але прикладів було достатньо."
          - "Аргумент звучав сильно прикладів було достатньо."
          - "Аргумент звучав сильно - тому що прикладів було достатньо."
        explanation: "Друга частина пояснює першу."
      - sentence: "У першому листі бракує підпису, у другому бракує дати, у третьому бракує адреси тому пакет повернули."
        error: "межі поширених частин і наслідку нечіткі"
        answer: "У першому листі бракує підпису; у другому - дати; у третьому - адреси, тому пакет повернули."
        options:
          - "У першому листі бракує підпису; у другому - дати; у третьому - адреси, тому пакет повернули."
          - "У першому листі бракує підпису, у другому - дати у третьому - адреси тому пакет повернули."
          - "У першому листі бракує підпису: у другому - дати: у третьому - адреси."
          - "У першому листі бракує підпису - у другому - дати - у третьому - адреси."
        explanation: "Крапка з комою розділяє паралельні поширені частини; тире позначає еліпсис."
      - sentence: "Редакторка сказала «Почнімо з джерела»."
        error: "перед прямою мовою після слів автора потрібна двокрапка"
        answer: "Редакторка сказала: «Почнімо з джерела»."
        options:
          - "Редакторка сказала: «Почнімо з джерела»."
          - "Редакторка сказала, «Почнімо з джерела»."
          - "Редакторка сказала - «Почнімо з джерела»."
          - "Редакторка сказала «Почнімо з джерела»."
        explanation: "Слова автора передують прямій мові."
      - sentence: "Команда безперечно, виконала умови договору."
        error: "слово не є вставним у цій позиції"
        answer: "Команда безперечно виконала умови договору."
        options:
          - "Команда безперечно виконала умови договору."
          - "Команда, безперечно виконала умови договору."
          - "Команда безперечно, виконала умови договору."
          - "Команда, безперечно, виконала, умови договору."
        explanation: "Тут **безперечно** тісно входить у присудковий центр і не потребує коми після себе."
      - sentence: "Вона запитала, що чи джерело перевірено."
        error: "змішано сполучники непрямого питання"
        answer: "Вона запитала, чи джерело перевірено."
        options:
          - "Вона запитала, чи джерело перевірено."
          - "Вона запитала, що чи джерело перевірено."
          - "Вона сказала, чи джерело перевірено."
          - "Вона запитала, що джерело перевірено?"
        explanation: "Загальне питання в непрямій мові вводить **чи**."
      - sentence: "Ті хто подав заявку вчасно отримають відповідь першими."
        error: "не відокремлено підрядну частину в корелятивній конструкції"
        answer: "Ті, хто подав заявку вчасно, отримають відповідь першими."
        options:
          - "Ті, хто подав заявку вчасно, отримають відповідь першими."
          - "Ті хто, подав заявку вчасно отримають відповідь першими."
          - "Ті хто подав заявку, вчасно отримають відповідь першими."
          - "Ті, хто подав заявку вчасно отримають, відповідь першими."
        explanation: "Підрядна частина **хто подав заявку вчасно** стоїть усередині головної."
      - sentence: "Перший розділ аналізує причини, другий наслідки."
        error: "еліпсис треба позначити тире"
        answer: "Перший розділ аналізує причини, другий - наслідки."
        options:
          - "Перший розділ аналізує причини, другий - наслідки."
          - "Перший розділ аналізує причини: другий наслідки."
          - "Перший розділ аналізує, причини другий - наслідки."
          - "Перший розділ - аналізує причини, другий наслідки."
        explanation: "Тире позначає пропущений присудок **аналізує**."

  - type: fill-in
    title: "Конектори й кореляти"
    instruction: "Вставте форму, яка точно передає зв'язок і не дублює інший конектор."
    items:
      - sentence: "____ доказів бракувало, висновок звучав обережно."
        answer: "Оскільки"
        options:
          - "Оскільки"
          - "Тому"
          - "Натомість"
          - "Зокрема"
        explanation: "**Оскільки** вводить причину; **тому** тут створило б дублювання."
      - sentence: "Доказів бракувало, ____ висновок звучав обережно."
        answer: "тому"
        options:
          - "тому"
          - "хоча"
          - "зокрема"
          - "водночас"
        explanation: "**Тому** називає наслідок попередньої причини."
      - sentence: "Документи зберігають там, ____ є захищений доступ."
        answer: "де"
        options:
          - "де"
          - "куди"
          - "скільки"
          - "що"
        explanation: "Пара **там, де** називає місце або умову."
      - sentence: "____ чіткіше сформульовано правило, ____ менше помилок у заявках."
        answer: "Чим, тим"
        options:
          - "Чим, тим"
          - "Де, там"
          - "Хто, той"
          - "Коли, тоді"
        explanation: "**Чим... тим** передає пропорційну залежність."
      - sentence: "Перший абзац подає тезу; ____, другий аналізує приклад."
        answer: "натомість"
        options:
          - "натомість"
          - "бо"
          - "саме"
          - "зокрема"
        explanation: "**Натомість** зіставляє функції двох абзаців."
      - sentence: "Вона запитала, ____ джерело перевірено."
        answer: "чи"
        options:
          - "чи"
          - "що"
          - "щоб"
          - "тому"
        explanation: "**Чи** вводить непряме загальне питання."
      - sentence: "Редакторка сказала, ____ вступ треба скоротити."
        answer: "що"
        options:
          - "що"
          - "чи"
          - "щоб"
          - "де"
        explanation: "**Що** вводить непряме твердження."
      - sentence: "Текст звучить переконливо; ____, прикладів у ньому бракує."
        answer: "водночас"
        options:
          - "водночас"
          - "тому"
          - "зокрема"
          - "саме"
        explanation: "**Водночас** показує обмеження або контрастну характеристику."
      - sentence: "Ті, ____ працюють із цитатами, мають пояснювати контекст."
        answer: "хто"
        options:
          - "хто"
          - "де"
          - "куди"
          - "що"
        explanation: "Корелятивна пара **ті, хто** називає групу людей."
      - sentence: "Електронну заявку надіслали туди, ____ треба подавати такі форми."
        answer: "куди"
        options:
          - "куди"
          - "де"
          - "коли"
          - "скільки"
        explanation: "**Туди, куди** позначає напрям подання, а не місце перебування."

  - type: group-sort
    title: "Регістр і експресивний синтаксис"
    instruction: "Розподіліть фрагменти за найкращою редакторською дією."
    groups:
      - name: "Залишити як експресивний прийом"
        items:
          - "Команда чекала відповіді. Довго. Без пояснень."
          - "Саме цей приклад змінив тон дискусії."
          - "На це питання відповідь дала не адміністрація, а студентська рада."
      - name: "Нейтралізувати для офіційного регістру"
        items:
          - "Документи? На столі. Без підпису."
          - "Просимо відповідь. Негайно."
          - "Саме-саме ваш чек нам потрібен для процедури."
      - name: "Відновити пропущену граматику"
        items:
          - "Перший пункт причина, другий наслідок."
          - "Я в центр, вона вокзал."
          - "Комісія за строки, клієнт за якість."
      - name: "Перевірити межу чужого голосу"
        items:
          - "Він сказав що цитата точна, але де джерело?"
          - "Авторка заперечила: це не висновок це припущення."
          - "Редакторка подумала. Чому приклад без контексту?"

  - type: essay-response
    id: act-6
    title: "Мініписьмо: синтаксичний маршрут"
    instruction: "Напишіть 150-180 слів про коротку культурну, освітню або сервісну ситуацію."
    prompt: >-
      У тексті використайте одне складнопідрядне речення, один сурядний або
      безсполучниковий зв'язок, один стилістичний конектор, один контрольований
      акцент (**саме**, інверсія, еліпсис або парцеляція) і один випадок прямої
      або непрямої мови. Після тексту додайте 2-3 речення самоперевірки:
      поясніть один розділовий знак і один вибір регістру.
    min_words: 150
    rubric:
      - criteria: "Складне речення"
        description: "Є щонайменше два типи синтаксичного зв'язку, межі частин зрозумілі."
        points: 3
      - criteria: "Пунктуація"
        description: "Ключові знаки можна пояснити синтаксично."
        points: 3
      - criteria: "Когезія й регістр"
        description: "Конектори, акцент і чуже слово відповідають жанру."
        points: 4
    model_answer: |-
      > [!model-answer]
      > Коли міський простір відкрив літню програму читань, частина відвідувачів
      > чекала звичайної презентації, але формат швидко змінився: модераторка
      > запропонувала обговорити не тільки книжки, а й те, як вони працюють у
      > пам'яті міста. Вона сказала, що саме живі питання роблять подію потрібною,
      > і цей акцент допоміг аудиторії перейти від загальних вражень до конкретних
      > прикладів. Перший виступ пояснював історичний контекст; другий - сучасний
      > читацький досвід. Так програма стала не афішею, а розмовою. У реченні з
      > двокрапкою друга частина пояснює, чому формат змінився. Еліпсис у фразі
      > **другий - сучасний читацький досвід** доречний, бо пропущене **пояснював**
      > легко відновлюється.

workbook:
  - type: reading
    id: wb-reading-integrated-map
    title: "Читання: інтегрована карта синтаксису"
    instruction: "Прочитайте абзац і виконайте діагностичні завдання."
    source: "Навчальний checkpoint B2."
    text: >-
      Організатори ярмарку спершу планували коротку презентацію локальних
      видавництв, однак після розмови з бібліотекарями формат змінили: кожен
      стенд мав не тільки продавати книжки, а й пояснювати, чому певна тема
      важлива для громади. "Без діалогу ярмарок стане просто крамницею", -
      зауважила координаторка. Коли перші відвідувачі попросили більше
      інформації про переклади, команда зрозуміла, що саме цей запит треба
      винести в окрему дискусію. Рішення, яке спершу здавалося технічним,
      поступово стало змістовним: воно поєднало сервіс, культуру й освіту.
    tasks:
