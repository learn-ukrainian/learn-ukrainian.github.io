version: '1.0'
module: register-literary-ukrainian
level: b2
inline:
  - type: select
    title: "Доказове літературне спостереження"
    instruction: "Позначте формулювання, які спираються на текст і не перебільшують."
    items:
      - question: "В уривку герой мовчить після запитання."
        min_correct: 2
        options:
          - text: "Мовчання може вказувати на уникання відповіді."
            correct: true
          - text: "Автор остаточно довів, що герой злочинець."
            correct: false
          - text: "Варто перевірити, чи повторюється мовчання далі."
            correct: true
          - text: "Мовчання завжди означає провину."
            correct: false
        explanation: "Обережний аналіз не робить абсолютних висновків."
      - question: "У реченні місто дихало під дощем."
        min_correct: 2
        options:
          - text: "Уособлення робить місто живим учасником сцени."
            correct: true
          - text: "Це лише помилка, бо місто не може дихати."
            correct: false
          - text: "Образ може передавати емоційний стан простору."
            correct: true
          - text: "Це доводить біографічний факт про автора."
            correct: false
        explanation: "Художній образ не треба читати буквально."
      - question: "Персонаж говорить уривчасто."
        min_correct: 2
        options:
          - text: "Уривчастість може створювати напруження."
            correct: true
          - text: "Це автоматично означає низьку освіту персонажа."
            correct: false
          - text: "Синтаксис реплік може бути характеристикою."
            correct: true
          - text: "Репліки не мають значення для аналізу."
            correct: false
        explanation: "Мовлення персонажа часто виконує характеристичну функцію."
      - question: "В уривку повторюється слово ключ."
        min_correct: 2
        options:
          - text: "Повтор може виділяти деталь як важливу."
            correct: true
          - text: "Один повтор завжди означає символ долі."
            correct: false
          - text: "Треба подивитися, як деталь пов'язана з дією."
            correct: true
          - text: "Повтор ніколи не буває художнім."
            correct: false
        explanation: "Функцію повтору треба доводити контекстом."
      - question: "Оповідач використовує я."
        min_correct: 2
        options:
          - text: "Перша особа може наблизити читача до внутрішнього досвіду."
            correct: true
          - text: "Я завжди дорівнює авторові."
            correct: false
          - text: "Потрібно відрізняти автора від оповідача."
            correct: true
          - text: "Перша особа не впливає на перспективу."
            correct: false
        explanation: "Оповідач і автор не тотожні автоматично."
      - question: "У тексті з'являється офіційна фраза."
        min_correct: 2
        options:
          - text: "Вона може створювати ефект бюрократичної дистанції."
            correct: true
          - text: "Інші стилі не можуть з'являтися в художньому тексті."
            correct: false
          - text: "Треба з'ясувати, хто говорить цією фразою і навіщо."
            correct: true
          - text: "Це автоматично руйнує художній стиль."
            correct: false
        explanation: "Художній текст може стилізувати інші регістри."
      - question: "В описі природи багато темних кольорів."
        min_correct: 2
        options:
          - text: "Темна палітра може підтримувати тривожний настрій."
            correct: true
          - text: "Темний колір завжди має одне значення."
            correct: false
          - text: "Варто пов'язати кольори з подією або станом персонажа."
            correct: true
          - text: "Колір у літературі не має функції."
            correct: false
        explanation: "Колір аналізують у конкретному контексті."
      - question: "Ви пишете висновок до аналізу."
        min_correct: 2
        options:
          - text: "Уривок створює враження прихованої тривоги через деталь ключа."
            correct: true
          - text: "Тут точно зашифровано всі події роману."
            correct: false
          - text: "Точне значення деталі потребує ширшого контексту."
            correct: true
          - text: "Докази не потрібні, бо це література."
            correct: false
        explanation: "Літературний аналіз потребує доказів."
  - type: match-up
    title: "Засіб і конкретний приклад"
    instruction: "Поєднайте стилістичний засіб із конкретним прикладом з українського художнього тексту або навчального уривка."
    pairs:
      - left: метафора
        right: 'Франко: "Лупайте сю скалу" - образ перешкоди як скелі'
      - left: епітет
        right: 'Шевченко: "Дніпр широкий" - ознака підсилює масштаб образу'
      - left: уособлення
        right: 'Шевченко: "Реве та стогне Дніпр широкий" - ріка діє як жива істота'
      - left: порівняння
        right: 'Навчальний уривок: "ранок, ніби лист" - зближує час і предмет'
      - left: деталь
        right: 'Навчальний уривок: "мокрий квиток" - предмет концентрує приховану історію'
      - left: інверсія
        right: 'Навчальний уривок: "темна була вода" - незвичний порядок виділяє ознаку'
      - left: парцеляція
        right: 'Навчальний уривок: "Вона повернулася. Без валізи. Без пояснень." - фрагменти стають ударними'
      - left: повтор
        right: 'Леся Українка: "Ні! Я жива! Я буду вічно жити!" - повтор "я" підсилює голос'
      - left: алітерація
        right: 'Навчальний уривок: "сухе сонце сипало світло" - повтор с підсилює звучання'
      - left: підтекст
        right: 'Навчальний уривок: герой не торкається ключа - значення не назване прямо'
  - type: fill-in
    title: "Терміни літературного аналізу"
    instruction: "Вставте відповідний термін."
    items:
      - sentence: "Перенесення ознак з однієї сфери на іншу називають ____."
        answer: "метафорою"
        options: ["метафорою", "протоколом", "реквізитом", "діаспорою"]
        explanation: "Метафора переносить значення."
      - sentence: "Опис неживого предмета як живого - це ____."
        answer: "уособлення"
        options: ["уособлення", "позов", "обряд", "звіт"]
        explanation: "Уособлення оживлює предмет або явище."
      - sentence: "Незвичний порядок слів називають ____."
        answer: "інверсією"
        options: ["інверсією", "гіпотезою", "крашанкою", "заявою"]
        explanation: "Інверсія змінює звичний порядок."
      - sentence: "Розбиття речення на короткі фрагменти - це ____."
        answer: "парцеляція"
        options: ["парцеляція", "анотація", "повноваження", "кутя"]
        explanation: "Парцеляція робить фрагменти ударними."
      - sentence: "Прихований, прямо не названий зміст називають ____."
        answer: "підтекстом"
        options: ["підтекстом", "реквізитом", "коровай", "строком"]
        explanation: "Підтекст читається через натяк і контекст."
      - sentence: "Система повторів і пауз створює ____ прози."
        answer: "ритм"
        options: ["ритм", "договір", "позов", "обжинки"]
        explanation: "Ритм є важливим не лише в поезії."
      - sentence: "Слова персонажа можуть виконувати ____ функцію."
        answer: "характеристичну"
        options: ["характеристичну", "юридичну", "арифметичну", "календарну"]
        explanation: "Мовлення показує риси персонажа."
      - sentence: "Обережний аналіз спирається на текстові ____."
        answer: "докази"
        options: ["докази", "плітки", "ярлики", "погрози"]
        explanation: "Інтерпретацію треба доводити деталями тексту."
      - sentence: "Той, хто розповідає історію в тексті, - це ____."
        answer: "оповідач"
        options: ["оповідач", "реквізит", "паска", "закон"]
        explanation: "Оповідач не завжди дорівнює авторові."
      - sentence: "Ставлення тексту до подій часто називають авторською ____."
        answer: "позицією"
        options: ["позицією", "накладною", "крашанкою", "адресою"]
        explanation: "Авторська позиція виводиться з текстових засобів."
  - type: error-correction
    title: "Виправте надмірний висновок"
    instruction: "Замініть недоведене або неточне формулювання на обережніший аналіз."
    items:
      - sentence: "Автор точно хотів сказати, що ключ символізує смерть."
        error: "точно хотів сказати"
        correction: "деталь ключа може натякати на втрату або приховане минуле"
        explanation: "Не приписуйте авторові намір без доказів."
      - sentence: "Герой поганий, бо він мовчить."
        error: "поганий"
        correction: "мовчання може свідчити про страх або уникання відповіді"
        explanation: "Характеристика має спиратися на контекст."
      - sentence: "Тут є метафора, і це все."
        error: "і це все"
        correction: "метафора змінює спосіб бачення міста"
        explanation: "Потрібно назвати функцію засобу."
      - sentence: "Оповідач я - це завжди сам автор."
        error: "завжди сам автор"
        correction: "може бути художнім оповідачем, якого треба відрізняти від автора"
        explanation: "Автор і оповідач не тотожні автоматично."
      - sentence: "Діалектне мовлення персонажа просто неправильне."
        error: "просто неправильне"
        correction: "може виконувати характеристичну або соціальну функцію"
        explanation: "У художньому тексті мовний вибір може бути стилістичним."
      - sentence: "Темний колір завжди означає зло."
        error: "завжди означає зло"
        correction: "може створювати тривожний настрій у цьому контексті"
        explanation: "Символіка кольору залежить від тексту."
      - sentence: "Повтор показує, що автор не вмів редагувати."
        error: "не вмів редагувати"
        correction: "може створювати ритм або нав'язливу думку"
        explanation: "Повтор може бути свідомим засобом."
      - sentence: "Якщо в тексті природа, аналізувати треба тільки пейзаж."
        error: "тільки пейзаж"
        correction: "треба перевірити, як пейзаж пов'язаний зі станом героя або композицією"
        explanation: "Пейзаж може мати психологічну функцію."
  - type: group-sort
    title: "Що саме аналізуємо?"
    instruction: "Розподіліть спостереження за фокусом аналізу."
    groups:
      - name: "Голос і перспектива"
        items:
          - "перша особа"
          - "ненадійний оповідач"
          - "дистанція між оповідачем і героєм"
          - "внутрішня перспектива"
      - name: "Образність і деталь"
        items:
          - "метафора міста"
          - "деталь ключа"
          - "уособлення ночі"
          - "кольорова палітра"
      - name: "Ритм і синтаксис"
        items:
          - "короткі речення"
          - "повтор дієслова"
          - "інверсія"
          - "парцеляція"
workbook:
  - type: reading
    id: literary-reading
    title: "Читання: образ і підтекст у прозі"
    instruction: "Прочитайте уривок і простежте, як деталь, ритм і перспектива створюють напруження."
    source: "Навчальний уривок; орієнтири для порівняння: Михайло Коцюбинський, «Intermezzo»; Оксана Забужко, художня проза."
    text: >-
      На столі лежав ключ. Малий, темний, ніби витягнутий із землі. Марта торкнулася його двома пальцями й одразу відсмикнула руку. За вікном хтось сміявся, але сміх не входив до кімнати. Він бився об шибку, розсипався на подвір'ї й затихав. Марта дивилася на ключ так, ніби він міг сам назвати двері, які давно не відчиняли. Порівнюючи такий навчальний уривок із реальними фрагментами Коцюбинського або Забужко, звертайте увагу не на "красивість", а на функцію образу, ритму, підтексту й авторської перспективи.
    tasks:
      - Випишіть одну промовисту деталь, один образ і одну синтаксичну особливість.
      - Поясніть, як сміх за вікном контрастує з атмосферою кімнати.
      - Сформулюйте обережний висновок про можливу функцію ключа й підтекст сцени.
      - 'Порівняйте цей уривок із коротким реальним фрагментом Коцюбинського або Забужко: що робить образ, а не лише який термін його називає?'
      - 'Сформулюйте один висновок із межувальним словом: може, ймовірно, у цьому уривку.'
  - type: reading
    id: literary-reading-franko
    title: 'Читання: метафора боротьби'
    instruction: Прочитайте короткий фрагмент і поясніть функцію образу.
    source: Іван Франко, коротка публічно відома фраза; навчальний коментар B2.
    text: 'Фраза "Лупайте сю скалу" працює не як буквальна інструкція, а як метафора наполегливої праці проти великої перешкоди. Для аналізу важливо не лише назвати метафору, а пояснити її дію: камінь робить проблему матеріальною, важкою й опорною для колективного зусилля.'
    tasks:
      - Назвіть образ, який організує фрагмент.
      - Поясніть, чому це метафора, а не буквальна дія.
      - Сформулюйте одну обережну фразу про авторську позицію.
  - type: reading
    id: literary-reading-shevchenko
    title: 'Читання: звук і уособлення'
    instruction: Прочитайте короткий фрагмент і визначте засоби звучання.
    source: Тарас Шевченко, коротка публічно відома фраза; навчальний коментар B2.
    text: 'У фразі "Реве та стогне Дніпр широкий" ріка отримує голос і дію. Уособлення поєднується зі звуковим ефектом: повтор приголосних і важкі дієслова створюють відчуття сили, тривоги й руху. Аналіз має показати, як звук підтримує образ.'
    tasks:
      - Визначте уособлення у фразі.
      - Поясніть роль дієслів "реве" і "стогне".
      - Назвіть звуковий ефект, який підтримує настрій.
  - type: reading
    id: literary-reading-lesia
    title: 'Читання: повтор і голос'
    instruction: Прочитайте короткий фрагмент і поясніть, як повтор формує позицію мовця.
    source: Леся Українка, коротка публічно відома фраза; навчальний коментар B2.
    text: 'Фраза "Ні! Я жива! Я буду вічно жити!" будує сильний голос через повтор займенника й короткі окличні речення. Тут емоція не є випадковою: синтаксис створює ритм спротиву, а повтор підкреслює присутність мовця.'
    tasks:
      - Випишіть повтор і поясніть його функцію.
      - Поясніть, як короткі речення впливають на темп.
      - Сформулюйте висновок без біографічного перебільшення.
  - type: reading
    id: literary-reading-composition
    title: 'Читання: композиція сцени'
    instruction: Прочитайте навчальний уривок і простежте порядок деталей.
    source: Навчальний уривок для модуля B2.
    text: Спершу герой читає офіційний наказ. Потім складає сорочку, знаходить дитячу іграшку й довго тримає її в руці. Наприкінці він кладе ключ на стіл, але не зачиняє дверей. Композиція рухається від документа до предмета пам'яті й відкритої межі.
    tasks:
      - Назвіть три етапи композиції.
      - Поясніть, як іграшка змінює тон сцени.
      - Сформулюйте можливий підтекст фінального ключа.
  - type: true-false
    title: "Правда чи неправда: художній аналіз"
    instruction: "Оцініть твердження."
    items:
      - statement: "Оповідача треба автоматично ототожнювати з автором."
        correct: false
        explanation: "Це різні рівні тексту."
      - statement: "Метафору потрібно пояснювати через функцію в уривку."
        correct: true
        explanation: "Сам термін ще не є аналізом."
      - statement: "Деталь може організовувати настрій сцени."
        correct: true
        explanation: "Предмет може концентрувати значення."
      - statement: "Будь-який колір у літературі має одне універсальне значення."
        correct: false
        explanation: "Значення залежить від контексту."
      - statement: "Парцеляція може робити фрагменти ударними."
        correct: true
        explanation: "Розбиття речення змінює ритм."
      - statement: "Мовлення персонажа не має стосунку до характеристики."
        correct: false
        explanation: "Лексика й синтаксис реплік часто характеризують героя."
      - statement: "Обережні формули послаблюють аналіз і тому заборонені."
        correct: false
        explanation: "Вони показують межу доказу."
      - statement: "Повтор може створювати ритм або нав'язливість."
        correct: true
        explanation: "Потрібно дивитися, як саме він працює."
      - statement: "Пейзаж може відображати або контрастувати з внутрішнім станом."
        correct: true
        explanation: "Опис природи часто має психологічну функцію."
      - statement: "Сильний аналіз має спиратися на слова, деталі або структуру тексту."
        correct: true
        explanation: "Без доказу інтерпретація стає здогадом."
  - type: critical-analysis
    id: literary-analysis
    title: "Аналіз міні-уривка"
    target_text: "На столі лежав ключ. Малий, темний, ніби витягнутий із землі. Марта торкнулася його двома пальцями й одразу відсмикнула руку."
    questions:
      - "Яка деталь організовує уривок?"
      - "Яку функцію має порівняння із землею?"
      - "Який обережний висновок можна зробити про стан Марти?"
    model_answers:
      - "Центральна деталь - ключ; текст виділяє його окремими короткими фразами."
      - "Порівняння із землею робить ключ темним, важким і пов'язаним із прихованим минулим."
      - "Реакція Марти може свідчити про тривогу або небажання торкатися пов'язаного з ключем минулого."
  - type: fill-in
    title: "Формули обережного аналізу"
    instruction: "Доповніть речення формулою або терміном."
    items:
      - sentence: "Ця деталь може ____ на приховану тривогу."
        answer: "натякати"
        options: ["натякати", "гарантувати", "скасовувати", "реєструвати"]
        explanation: "Натякати - обережна аналітична формула."
      - sentence: "Уривок створює ____ замкненого простору."
        answer: "враження"
        options: ["враження", "договір", "свято", "реквізит"]
        explanation: "Враження описує ефект тексту."
      - sentence: "Точне значення символу потребує ширшого ____."
        answer: "контексту"
        options: ["контексту", "рахунку", "квитка", "обжинків"]
        explanation: "Без контексту висновок може бути надмірним."
      - sentence: "Короткі речення змінюють ____ сцени."
        answer: "ритм"
        options: ["ритм", "договір", "діаспору", "паску"]
        explanation: "Синтаксис впливає на ритм."
      - sentence: "Мовлення героя виконує ____ функцію."
        answer: "характеристичну"
        options: ["характеристичну", "календарну", "юридичну", "сервісну"]
        explanation: "Репліки можуть показувати риси персонажа."
      - sentence: "Оповідь від першої особи наближає читача до ____ досвіду."
        answer: "внутрішнього"
        options: ["внутрішнього", "договірного", "обрядового", "побутового"]
        explanation: "Перша особа часто відкриває внутрішню перспективу."
      - sentence: "Не варто ____ автора з оповідачем."
        answer: "ототожнювати"
        options: ["ототожнювати", "фарбувати", "реєструвати", "колядувати"]
        explanation: "Автор і оповідач - різні категорії."
      - sentence: "Повтор може підсилювати ____ героя на одній думці."
        answer: "зацикленість"
        options: ["зацикленість", "накладну", "паску", "анотацію"]
        explanation: "Повтор може показувати нав'язливість думки."
      - sentence: "Інверсія ____ важливе слово на перший план."
        answer: "висуває"
        options: ["висуває", "забороняє", "підписує", "спростовує"]
        explanation: "Незвичний порядок виділяє елемент."
      - sentence: "Підтекст - це значення, яке не названо ____."
        answer: "прямо"
        options: ["прямо", "юридично", "календарно", "господарськи"]
        explanation: "Підтекст читається непрямо."
      - sentence: Творча ____ допомагає побачити новий зв'язок між деталями.
        answer: уява
        options:
          - уява
          - довідка
          - заява
          - скарга
        explanation: Уява потрібна для образу, але аналіз потребує доказів.
      - sentence: Слово ____ варто вживати лише після аргументації художньої цінності.
        answer: шедевр
        options:
          - шедевр
          - маршрут
          - обряд
          - рахунок
        explanation: Оцінка має бути обґрунтованою.
      - sentence: ____ жест персонажа може сказати більше, ніж пряма характеристика.
        answer: Промовистий
        options:
          - Промовистий
          - Канцелярський
          - Календарний
          - Побутовий
        explanation: Промовиста деталь підтримує непряму характеристику.
      - sentence: ____ сенс сцени виводять із повторів, деталей і композиції.
        answer: Глибинний
        options:
          - Глибинний
          - Випадковий
          - Сервісний
          - Офіційний
        explanation: Глибинний сенс не можна проголошувати без доказів.
  - type: essay-response
    id: literary-essay
    title: "Письмо: художній опис Київського вечора або степового світанку"
    instruction: "Напишіть щонайменше 300 слів: створіть художній опис Київського вечора або степового світанку, використовуючи метафори, індивідуальні епітети, уособлення та інверсію."
    prompt: "Створіть власний художній опис і після нього коротко поясніть, які засоби формують настрій, підтекст і авторську позицію."
    min_words: 300
    model_answer: |-
      > [!model-answer]
      > Київський вечір повільно сходив на Поділ, ніби велика синя завіса, яку хтось опускав над втомленим містом. Вікна кав'ярень світилися теплими прямокутниками, і кожен прямокутник обіцяв короткий прихисток від дощу. На бруківці тремтіли ліхтарі: не світло лежало на камені, а камінь беріг у собі світло. Трамвай, старий і впертий, продзвенів униз вулицею, залишивши після себе металевий слід у повітрі. Біля зупинки хлопець тримав букет так обережно, ніби ніс не квіти, а чиєсь запізніле вибачення. Місто не говорило прямо, проте кожна деталь натякала на очікування: мокрий квиток у руці, пара над чашкою, темний Дніпро за мостом. Саме в цій стриманості народжувався настрій. У тексті використано метафори "вечір сходив" і "камінь беріг світло", уособлення міста, промовисту деталь букета та інверсію "не світло лежало". Вони створюють не просто зворушливий опис, а глибинний підтекст: герой або героїня стоїть на межі зустрічі, спогаду й рішення. Такий опис потребує уяви й натхнення, але його майстерність тримається на точних деталях, а не на слові "шедевр".
    rubric:
      - criteria: "Текстові докази"
        description: "Автор називає конкретні слова, деталі або синтаксичні форми."
        points: 2
      - criteria: "Функція засобів"
        description: "Аналіз пояснює, що робить образ або деталь."
        points: 2
      - criteria: "Обережний висновок"
        description: "Текст уникає недоведених тверджень про автора або символ."
        points: 2
  - type: essay-response
    id: literary-essay-neutral-rewrite
    title: 'Письмо: нейтральне речення в художній опис'
    instruction: 'Напишіть 150-180 слів: перетворіть нейтральний факт на художній опис і поясніть два засоби.'
    prompt: 'Факт: людина повернулася до порожньої кімнати після довгої дороги.'
    min_words: 150
    model_answer: "> [!model-answer]\n> Після довгої дороги кімната зустріла її не тишею, а пилом, що повільно сідав на підвіконня, ніби час тут не минав, а тільки осідав шарами. Вона поставила сумку біля дверей і не ввімкнула світла: темрява здавалася чеснішою за лампу. У цьому описі нейтральний факт перетворено на сцену через уособлення кімнати й метафору пилу як часу. Образ не просто прикрашає подію, а створює підтекст повернення до місця, де щось залишилося невирішеним."
    rubric:
      - criteria: Образність
        description: Є щонайменше два художні засоби.
        points: 2
      - criteria: Функція
        description: Пояснено, що роблять засоби.
        points: 2
      - criteria: Точність
        description: Висновок не перебільшено.
        points: 2
  - type: essay-response
    id: literary-essay-symbol
    title: 'Письмо: символ і доказ'
    instruction: 'Напишіть 150-180 слів: поясніть можливу функцію одного символу без категоричних тверджень.'
    prompt: 'Символ: зачинені двері, до яких персонаж повертається тричі.'
    min_words: 150
    model_answer: "> [!model-answer]\n> Зачинені двері можуть працювати як символ межі, але це треба доводити через повтор і контекст. Якщо персонаж тричі повертається до дверей і жодного разу не відчиняє їх, текст підкреслює не сам предмет, а неможливість переходу. Двері відокремлюють теперішнє від минулого або бажання від дії. Водночас не варто писати, що вони \"точно означають смерть\" без ширшого уривка. Обережніше: повтор дверей створює мотив недоступності й може натякати на страх перед поверненням."
    rubric:
      - criteria: Спостереження
        description: Названо повтор або деталь.
        points: 2
      - criteria: Функція
        description: Пояснено можливу роль символу.
        points: 2
      - criteria: Обережність
        description: Є межа інтерпретації.
        points: 2
  - type: essay-response
    id: literary-essay-characterization
    title: 'Письмо: непряма характеристика'
    instruction: 'Напишіть 150-180 слів: охарактеризуйте персонажа через дію, репліку або деталь.'
    prompt: Персонаж отримує важливий лист, але не відкриває його.
    min_words: 150
    model_answer: "> [!model-answer]\n> Персонажа можна показати без прямої фрази \"він боявся\". Він бере лист, проводить пальцем по краю конверта, кладе його під книжку й починає прибирати стіл, хоча на столі майже нічого немає. Коли сестра питає, чи він прочитав повідомлення, герой відповідає: \"Потім. Там, мабуть, нічого термінового\". Дія, предмет і репліка створюють непряму характеристику: він уникає правди або відкладає рішення. Такий висновок не остаточний, але він спирається на поведінку в сцені."
    rubric:
      - criteria: Непряма характеристика
        description: Риса показана через дію або мовлення.
        points: 2
      - criteria: Текстова опора
        description: Є конкретні деталі.
        points: 2
      - criteria: Аналіз
        description: Пояснено можливий висновок.
        points: 2
  - type: essay-response
    id: literary-essay-author-stance
    title: 'Письмо: авторська позиція через композицію'
    instruction: 'Напишіть 150-180 слів: поясніть, як порядок деталей формує авторську позицію.'
    prompt: 'Сцена: спершу офіційний наказ, потім дитяча іграшка біля валізи, потім мовчання героя.'
    min_words: 150
    model_answer: "> [!model-answer]\n> Композиція сцени рухається від безособового документа до приватної втрати. Офіційний наказ подає зовнішню причину події, але дитяча іграшка біля валізи переводить увагу на сімейний наслідок. Мовчання героя в кінці не пояснює все прямо, зате залишає читача перед людською ціною рішення. Тому авторська позиція може виявлятися не в прямому коментарі, а в тому, які деталі поставлено поруч. Висновок має бути обережним: композиція схиляє читача співчувати, але не замінює всього контексту твору."
    rubric:
      - criteria: Композиція
        description: Названо порядок деталей.
        points: 2
      - criteria: Позиція
        description: Пояснено ефект зіставлення.
        points: 2
      - criteria: Доказовість
        description: Висновок спирається на сцену.
        points: 2
