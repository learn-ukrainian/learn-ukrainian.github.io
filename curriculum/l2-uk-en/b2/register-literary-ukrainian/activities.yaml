  - type: match-up
    title: "Слабкий аналіз і сильніша заміна"
    instruction: "Поєднайте слабке аналітичне твердження з точнішою версією."
    pairs:
      - left: "Метафора робить текст красивим."
        right: "Метафора змінює спосіб бачення сцени й переносить емоцію на простір."
      - left: "Автор використовує епітети."
        right: "Епітети показують, як оповідач оцінює предмети."
      - left: "Символ води означає життя."
        right: "У цьому уривку вода може означати пам'ять, бо з'являється біля спогадів героїні."
      - left: "У тексті є підтекст."
        right: "Підтекст видно з того, що героїня заперечує сум, але береже лист."
      - left: "Інверсія додає емоційності."
        right: "Інверсія висуває ознаку на початок і сповільнює читання."
      - left: "Діалог звучить розмовно."
        right: "Неповні речення й повтори показують близькість персонажів."
      - left: "Опис міста гарний."
        right: "Опис міста будується через звуки й темні вікна, тому створює тривогу."
      - left: "Парцеляція є в тексті."
        right: "Парцеляція передає паузи очікування й уривчастий внутрішній стан."
      - left: "Переклад не дослівний."
        right: "Переклад зберігає образ і ритм, але змінює порядок слів для природної української інтонації."
      - left: "Образ хати важливий."
        right: "Хата важлива як простір пам'яті, бо герой не заходить усередину й зупиняється на порозі."
      - left: "Повтор створює ритм."
        right: "Повтор слова «чекав» показує нав'язливу думку героя й сповільнює сцену."
      - left: "Пейзаж передає настрій."
        right: "Мокра бруківка й темні вікна переносять тривогу героя на міський простір."

  - type: essay-response
    id: literary-description-essay
    title: "Художній опис із підтекстом"
    instruction: "Напишіть короткий художній абзац і перевірте його за критеріями."
    prompt: >-
      Напишіть 160-190 слів про повернення людини до знайомого місця після довгої відсутності. Не пояснюйте емоцію прямо в першому реченні. Використайте одну центральну деталь, один епітет, одну метафору або уособлення, одну коротку парцельовану фразу й підтекст, який читач може вивести з дії.
    min_words: 160
    model_answer: >-
      Потяг прибув раніше, ніж вона очікувала, і станція ще не прокинулася повністю. На пероні пахло мокрим металом, кавою з кіоску й холодним листям. Олена впізнала годинник над касами: стрілка хвилин трохи тремтіла, як і колись, коли вона бігла сюди з валізою й не озиралася. Тепер валіза була легка. Занадто легка. Вона пройшла повз нову вивіску, повз автомат із квитками, повз хлопця в навушниках, а потім зупинилася біля старої лавки. На дереві лишився вирізаний знак, нерівний і майже стертий. Олена провела пальцем по шорсткій лінії, усміхнулася й одразу прибрала руку, ніби знак міг запитати, чому вона так довго мовчала. Місто за вікнами станції світлішало повільно, без докору, але в кожному склі тримало її відбиття.
    rubric:
      - criteria: "Центральна деталь"
        description: "Один предмет або місце повторюється й тримає сцену."
        points: 2
      - criteria: "Образність"
        description: "Є доречний епітет, метафора або уособлення."
        points: 2
      - criteria: "Синтаксис"
        description: "Є керована коротка фраза або парцеляція."
        points: 2
      - criteria: "Підтекст"
        description: "Емоцію можна вивести з дії, а не з прямого пояснення."
        points: 2
      - criteria: "Мовна точність"
        description: "Немає випадкових кальок і русизмів."
        points: 2
