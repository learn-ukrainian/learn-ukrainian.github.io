version: '1.0'
module: register-literary-ukrainian
level: b2
inline: []
workbook:
  - type: mark-the-words
    title: "Позначте художні засоби"
    instruction: "Позначте слова або словосполуки, які створюють образність."
    text: "Місто мовчало після дощу, важкий сніг ліг на темні дахи, тихий поріг чекав на кроки, а стара брама тримала в собі пам'ять повернення."
    answers:
      - "Місто мовчало"
      - "важкий сніг"
      - "тихий поріг"
      - "чекав на кроки"
      - "брама тримала"
      - "пам'ять повернення"
  - type: group-sort
    title: "Розподіліть засоби"
    instruction: "Перетягніть приклади до відповідної групи."
    groups:
      - name: "Тропи"
        items:
          - "метафора"
          - "епітет"
          - "уособлення"
          - "метонімія"
      - name: "Синтаксичні засоби"
        items:
          - "інверсія"
          - "парцеляція"
          - "анафора"
          - "риторичне питання"
          - "паралелізм"
      - name: "Звукові засоби"
        items:
          - "алітерація"
          - "асонанс"
          - "ритмічний повтор"
          - "звукова пауза"
          - "повтор шиплячих"
  - type: match-up
    title: "Термін і коротке пояснення"
    instruction: "Поєднайте термін із найкоротшим поясненням."
    pairs:
      - left: "підтекст"
        right: "прихований зміст"
      - left: "епітет"
        right: "художнє означення"
      - left: "інверсія"
        right: "незвичний порядок слів"
      - left: "парцеляція"
        right: "поділ речення на фрагменти"
      - left: "символ"
        right: "деталь із додатковим значенням"
      - left: "алітерація"
        right: "повтор приголосних"
      - left: "асонанс"
        right: "повтор голосних"
      - left: "стилізація"
        right: "свідоме відтворення голосу"
      - left: "штамп"
        right: "стертий образ"
      - left: "перспектива"
        right: "точка бачення сцени"
      - left: "метонімія"
        right: "перенесення за суміжністю"
      - left: "ритм"
        right: "організація темпу читання"
  - type: fill-in
    title: "Мінітерміни"
    instruction: "Заповніть пропуск точним терміном."
    items:
      - sentence: "Прихований зміст називається ____."
        answer: "підтекстом"
        options: ["підтекстом", "підписом", "строком", "рішенням"]
      - sentence: "Художнє означення називається ____."
        answer: "епітетом"
        options: ["епітетом", "договором", "пунктом", "методом"]
      - sentence: "Повтор початку фраз називається ____."
        answer: "анафорою"
        options: ["анафорою", "асонансом", "заявою", "цитатою"]
      - sentence: "Повтор приголосних називається ____."
        answer: "алітерацією"
        options: ["алітерацією", "метонімією", "анотацією", "рецензією"]
      - sentence: "Предмет із додатковим значенням стає ____."
        answer: "символом"
        options: ["символом", "підписом", "додатком", "планом"]
      - sentence: "Перенесення значення за подібністю - це ____."
        answer: "метафора"
        options: ["метафора", "протокол", "закон", "кошторис"]
      - sentence: "Незвичний порядок слів називається ____."
        answer: "інверсією"
        options: ["інверсією", "заявою", "нормою", "умовою"]
      - sentence: "Стертий образ часто стає ____."
        answer: "штампом"
        options: ["штампом", "джерелом", "парафразом", "доказом"]
      - sentence: "Керований погляд на сцену - це ____."
        answer: "перспектива"
        options: ["перспектива", "печатка", "мета", "дата"]
      - sentence: "Свідоме відтворення голосу називається ____."
        answer: "стилізацією"
        options: ["стилізацією", "інструкцією", "кореляцією", "компенсацією"]
  - type: fill-in
    title: "Функція засобу"
    instruction: "Заповніть пропуск словом, яке називає функцію художнього засобу."
    items:
      - sentence: "Підтекст має спиратися на ____."
        answer: "деталі"
        options: ["деталі", "печатки", "дати", "рахунки"]
      - sentence: "Довгий епітет не завжди сильніший за ____."
        answer: "точний"
        options: ["точний", "офіційний", "чужий", "порожній"]
      - sentence: "Інверсія може змінити ____ речення."
        answer: "фокус"
        options: ["фокус", "договір", "адресу", "підпис"]
      - sentence: "Парцеляція створює паузу або ____."
        answer: "напруження"
        options: ["напруження", "рахунок", "закон", "анкету"]
      - sentence: "Символ залежить від конкретного ____."
        answer: "контексту"
        options: ["контексту", "терміну", "кошторису", "додатка"]
      - sentence: "Стертий штамп слабший за точну ____."
        answer: "деталь"
        options: ["деталь", "форму", "дату", "печатку"]
      - sentence: "Авторський голос видно в повторюваних мовних ____."
        answer: "виборах"
        options: ["виборах", "платежах", "довідках", "посадах"]
      - sentence: "Кальку не варто автоматично називати ____."
        answer: "стилізацією"
        options: ["стилізацією", "анотацією", "заявою", "угодою"]
      - sentence: "Алітерація пов'язана зі ____."
        answer: "звучанням"
        options: ["звучанням", "строком", "підписом", "законом"]
      - sentence: "Художній переклад має враховувати ____."
        answer: "ритм"
        options: ["ритм", "ціну", "адресу", "посаду"]
  - type: reading
    id: literary-scene-reading
    title: "Читання: місто після дощу"
    instruction: "Прочитайте навчальний художній уривок і проаналізуйте, як працюють образи, ритм і підтекст."
    source: "Навчальний уривок для модуля B2."
    text: >-
      Дощ ущух перед світанком, але місто ще не наважувалося заговорити. На площі лежали калюжі, і в кожній трималося по клаптику сірого неба. Марта йшла повільно, наче перевіряла, чи пам'ятає бруківка її кроки. Біля старої аптеки вона зупинилася: вивіску замінили, двері пофарбували, а тонка тріщина на сходах лишилася тією самою. Марта торкнулася перил і раптом усміхнулася не людям, не ранку, а цій тріщині, що вперто берегла адресу її дитинства.
    tasks:
      - "Визначте центральну деталь уривка й поясніть, чому вона важлива для підтексту."
      - "Знайдіть уособлення або метафору й опишіть її функцію."
      - "Поясніть, як ритм речень передає повільне повернення героїні."
      - "Сформулюйте одне можливе альтернативне тлумачення образу тріщини."

  - type: match-up
    title: "Тропи й функції"
    instruction: "Поєднайте художній засіб із його найточнішою функцією."
    pairs:
      - left: "Метафора"
        right: "переносить значення за подібністю й створює нове бачення предмета"
      - left: "Метонімія"
        right: "називає явище через суміжну деталь або простір"
      - left: "Синекдоха"
        right: "називає частину замість цілого або ціле замість частини"
      - left: "Епітет"
        right: "додає художнє означення, яке показує погляд оповідача"
      - left: "Уособлення"
        right: "надає неживому людських дій або станів"
      - left: "Порівняння"
        right: "пояснює образ через зіставлення з іншим явищем"
      - left: "Інверсія"
        right: "змінює порядок слів, щоб виділити потрібний елемент"
      - left: "Парцеляція"
        right: "розбиває висловлення на короткі фрагменти для паузи або напруги"
      - left: "Анафора"
        right: "повторює початок конструкцій і створює ритм"
      - left: "Підтекст"
        right: "передає прихований зміст через деталі, паузи й композицію"
      - left: "Гіпербола"
        right: "навмисно перебільшує ознаку або дію"
      - left: "Паралелізм"
        right: "будує подібні синтаксичні конструкції для ритму й зіставлення"

  - type: fill-in
    title: "Художні засоби в реченні"
    instruction: "Доберіть слово або термін, який точно завершує речення."
    items:
      - sentence: "Речення «місто ще не наважувалося заговорити» містить ____."
        answer: "уособлення"
        options: ["уособлення", "протокол", "термінологію", "заяву"]
        explanation: "Місто отримує людську здатність наважуватися й говорити."
      - sentence: "Словосполука «важкий сніг» може бути художнім ____."
        answer: "епітетом"
        options: ["епітетом", "підписом", "адресатом", "пунктом"]
        explanation: "Епітет додає художньо значуще означення."
      - sentence: "Зміна звичного порядку слів у художньому реченні називається ____."
        answer: "інверсією"
        options: ["інверсією", "анотацією", "реквізитом", "цитуванням"]
        explanation: "Інверсія виділяє елемент і змінює ритм."
      - sentence: "Повтор початку кількох конструкцій називається ____."
        answer: "анафорою"
        options: ["анафорою", "метонімією", "заявою", "парафразом"]
        explanation: "Анафора організовує ритм через повтор початку."
      - sentence: "Коли зал «мовчить», хоча мовчать люди, це приклад ____."
        answer: "метонімії"
        options: ["метонімії", "парцеляції", "гіпотези", "рецензії"]
        explanation: "Простір називає людей, які в ньому перебувають."
      - sentence: "Прихований зміст, який читач виводить із деталей, називається ____."
        answer: "підтекстом"
        options: ["підтекстом", "договором", "протоколом", "висновком"]
        explanation: "Підтекст не висловлено прямо, але він підтриманий сигналами."
      - sentence: "Речення «Двері. Тінь. Тиша.» використовує ____."
        answer: "парцеляцію"
        options: ["парцеляцію", "методологію", "узгодження", "законодавство"]
        explanation: "Парцеляція розбиває висловлення на фрагменти."
      - sentence: "Повтор приголосних для слухового ефекту називається ____."
        answer: "алітерацією"
        options: ["алітерацією", "асонансом", "заявником", "переказом"]
        explanation: "Алітерація працює з приголосними звуками."
      - sentence: "Повтор голосних у художньому звучанні називається ____."
        answer: "асонансом"
        options: ["асонансом", "алгоритмом", "терміном", "підставою"]
        explanation: "Асонанс працює з голосними звуками."
      - sentence: "Предмет, який у контексті набуває додаткового значення, може стати ____."
        answer: "символом"
        options: ["символом", "шаблоном", "підписом", "канцеляритом"]
        explanation: "Символ має значення понад буквальну функцію предмета."

  - type: error-correction
    title: "Редагування художнього й аналітичного стилю"
    instruction: "Виправте кальку, штамп або стилістично слабкий фрагмент."
    items:
      - sentence: "Цей образ виступає в ролі головного символу спогаду."
        error: "виступає в ролі головного символу"
        answer: "є головним символом"
        error_type: "phrase"
        explanation: "У нейтральному аналізі природно: «є символом» або «символізує»."
      - sentence: "Вона була самою одинокою людиною на вулиці."
        error: "самою одинокою"
        answer: "найсамотнішою"
        error_type: "construction"
        explanation: "Нормативна форма: найсамотнішою; часто краще показати стан через деталь."
      - sentence: "Автор робить підтекст через деталі."
        error: "робить підтекст"
        answer: "створює підтекст"
        error_type: "phrase"
        explanation: "У літературному аналізі природніше: створює або формує підтекст."
      - sentence: "Метафора робить текст красивим, і цього досить."
        error: "красивим, і цього досить"
        answer: "образнішим і змінює спосіб бачення сцени"
        error_type: "register"
        explanation: "Потрібно пояснити функцію засобу."
      - sentence: "Дощ був дуже прекрасний і неймовірно чудовий."
        error: "дуже прекрасний і неймовірно чудовий"
        answer: "дрібний дощ шурхотів по підвіконню"
        error_type: "phrase"
        explanation: "Конкретна деталь сильніша за нагромадження оцінних прикметників."
      - sentence: "Символ води завжди означає тільки життя."
        error: "завжди означає тільки життя"
        answer: "у цьому уривку може означати пам'ять або повернення"
        error_type: "register"
        explanation: "Символ залежить від контексту."
      - sentence: "Герой сказав, прошипів, проспівав і вибухнув кожну репліку."
        error: "прошипів, проспівав і вибухнув кожну репліку"
        answer: "сказав кілька реплік нейтрально, а одну вимовив різко"
        error_type: "register"
        explanation: "Не кожне дієслово мовлення має бути яскравим."
      - sentence: "Руйнування міста було дуже ефектним фоном для гарної метафори."
        error: "ефектним фоном"
        answer: "травматичним досвідом, який потребує конкретної людської перспективи"
        error_type: "register"
        explanation: "Теми війни й втрати не можна декоративно романтизувати."

  - type: true-false
    title: "Правда чи ні: художній стиль"
    instruction: "Позначте, чи твердження правильне."
    items:
      - statement: "Художній стиль може використовувати елементи інших функціональних стилів."
        correct: true
        explanation: "У романі можуть з'являтися листи, документи, новини або розмовні діалоги."
      - statement: "Будь-яка метафора автоматично робить текст сильним."
        correct: false
        explanation: "Стерта або невмотивована метафора може послабити текст."
      - statement: "Підтекст має підтримуватися деталями, паузами або композицією."
        correct: true
        explanation: "Без сигналів підтекст стає випадковою здогадкою."
      - statement: "Інверсія змінює порядок слів і може змінити фокус речення."
        correct: true
        explanation: "Вона висуває важливий елемент у сильнішу позицію."
      - statement: "У художньому аналізі достатньо написати: «автор використовує епітети»."
        correct: false
        explanation: "Потрібно пояснити, яку функцію виконують епітети."
      - statement: "Фразеологізми потрібно вживати обережно й у сталій формі."
        correct: true
        explanation: "Змішування ідіом часто створює помилку."
      - statement: "Авторський голос формується через повторювані лексичні, ритмічні й образні вибори."
        correct: true
        explanation: "Голос не зводиться до однієї красивої фрази."
      - statement: "У темах травми образність може замінити фактичну й етичну точність."
        correct: false
        explanation: "Образність не звільняє від відповідальності."
      - statement: "Художній переклад має враховувати ритм і культурну деталь."
        correct: true
        explanation: "Стиль включає більше, ніж словникове значення."
      - statement: "Парцеляція завжди є пунктуаційною помилкою."
        correct: false
        explanation: "У художньому тексті вона може бути свідомим ритмічним засобом."

  - type: cloze
    title: "Клоз: аналіз художнього уривка"
    instruction: "Заповніть пропуски словами, що найкраще описують художній аналіз."
    passage: >-
      У художньому тексті важливо визначити {1}, з якої подано сцену. Центральна {2} може повторюватися й набувати символічного значення. Якщо неживий предмет отримує людську дію, це {3}. Якщо слово переносить значення за подібністю, це {4}. Зміна звичного порядку слів називається {5}, а розбиття речення на короткі фрагменти - {6}. Прихований зміст, який не сказано прямо, називається {7}. У сильному аналізі треба пояснити не лише назву засобу, а його {8}. Стертий образ або надмірно загальна фраза може стати {9}. Повтор початку кількох речень - це {10}. Повтор приголосних називають {11}, а повтор голосних - {12}. Предмет, який у контексті отримує додатковий сенс, стає {13}. У перекладі важливо зберегти {14} персонажа. У темах травми потрібна етична {15}. Найкращий художній опис починається з конкретної {16}.
    blanks:
      - id: 1
        answer: "перспективу"
        options: ["перспективу", "заяву", "статистику", "анотацію"]
      - id: 2
        answer: "деталь"
        options: ["деталь", "печать", "ціна", "форма"]
      - id: 3
        answer: "уособлення"
        options: ["уособлення", "методологія", "договір", "протокол"]
      - id: 4
        answer: "метафора"
        options: ["метафора", "метонімія", "заява", "підпис"]
