version: '1.0'
module: mystetstvo-i-literatura
level: b2

inline:
  - id: act-1
    type: reading
    title: Від враження до доказу
    instruction: Прочитайте фрагмент відгуку й визначте, де є оцінка, а де доказ.
    text: >-
      Фільм справляє неоднозначне враження не через слабкий сюжет, а через
      напружену композицію: глядач довго не знає, чи можна довіряти голосу
      оповідача. Повтор темного коридору і тиша перед фіналом створюють
      відчуття пастки, а не просто сумної атмосфери.
    source: Навчальний фрагмент для модуля B2.
    tasks:
      - Яке оцінне слово використано на початку?
      - Який доказ стосується композиції?
      - Який образ повторюється?
      - Як звук або тиша впливає на інтерпретацію?
      - Чому це не просто фраза "мені сподобалося"?

  - id: act-2
    type: critical-analysis
    title: Опис картини
    instruction: Проаналізуйте, чому другий опис точніший.
    target_text: >-
      Картина гарна і сумна. Темний фон концентрує увагу на обличчі, а різкий
      контраст червоного й чорного посилює відчуття тривоги.
    questions:
      - Яке речення є лише загальною оцінкою?
      - Які візуальні елементи названо в другому реченні?
      - Як колір пов'язано з емоційним ефектом?
      - Який ще елемент можна додати до аналізу?
    model_answers:
      - Перше речення не містить доказу.
      - Темний фон, обличчя, контраст червоного й чорного.
      - Контраст створює тривожний настрій.
      - Можна додати лінію, масштаб, фактуру або композиційний центр.

  - id: act-3
    type: critical-analysis
    title: Документальне кіно й етика
    instruction: Визначте, які питання треба поставити до документального фільму.
    target_text: >-
      Документальний фільм показує людину після травматичної події. Камера
      довго затримується на мовчанні героя, але не пояснює контексту події
      і не дає глядачеві інформації про подальшу підтримку.
    questions:
      - Який етичний ризик має така сцена?
      - Чому контекст важливий?
      - Як можна показати мовчання відповідальніше?
      - Яке питання має поставити критик?
    model_answers:
      - Ризик полягає в перетворенні травми на ефект.
      - Без контексту глядач може бачити лише шок, а не ситуацію людини.
      - Можна дати рамку, згоду героя, межу показу й інформацію про підтримку.
      - Чи поважає фільм гідність героя?

  - id: act-4
    type: critical-analysis
    title: Деколонізація як рамка читання
    instruction: Поясніть, чому зміна культурної рамки не має бути механічною.
    target_text: >-
      Перейменування вулиці саме по собі не завершує деколонізацію. Воно
      відкриває питання: чому одне ім'я було центральним, кого не помічали
      раніше і яку історію нова назва допомагає розповісти.
    questions:
      - Чому перейменування не є лише технічною дією?
      - Які питання ставить нова рамка пам'яті?
      - Чому важливо не стирати складність?
      - Як цю думку застосувати до музейного підпису?
    model_answers:
      - Воно змінює публічну пам'ять і пояснення простору.
      - Хто був видимим, хто витісненим, яку історію тепер розповідають.
      - Бо культура має багатошарові контексти, які треба пояснювати.
      - Підпис може назвати попередню рамку, нову інтерпретацію і джерело зміни.

workbook:
  - type: match-up
    title: Термінологія аналізу
    instruction: Поєднайте термін із поясненням.
    pairs:
      - left: сюжет
        right: послідовність подій твору
      - left: композиція
        right: спосіб організації частин твору
      - left: художній образ
        right: узагальнення досвіду через деталь, символ або персонажа
      - left: інтертекстуальність
        right: діалог твору з іншими текстами
      - left: культурна дипломатія
        right: представлення країни через мистецькі й інтелектуальні проєкти
      - left: деколонізація
        right: перегляд імперських рамок пам'яті та видимості
      - left: експозиція
        right: організація музейного простору, об'єктів і пояснень
      - left: монтаж
        right: поєднання кадрів або сцен для створення ритму й значення
      - left: алюзія
        right: непрямий натяк на інший текст, образ або подію
      - left: канон
        right: коло творів і авторів, які культура визнає центральними

  - type: unjumble
    title: Формули критичного відгуку
    instruction: Відновіть речення для культурного аналізу.
    items:
      - words: [Композиція, фільму, створює, напруження, через, повтор, сцени]
        answer: "Композиція фільму створює напруження через повтор сцени"
      - words: [Образ, міста, працює, як, символ, пам'яті, і, втрати]
        answer: "Образ міста працює як символ пам'яті і втрати"
      - words: [Відгук, потребує, оцінки, доказу, і, короткого, висновку]
        answer: "Відгук потребує оцінки доказу і короткого висновку"
      - words: [Мурал, реагує, на, подію, швидше, ніж, музейна, експозиція]
        answer: "Мурал реагує на подію швидше ніж музейна експозиція"
      - words: [Деколонізація, змінює, рамку, пам'яті, а, не, лише, назву]
        answer: "Деколонізація змінює рамку пам'яті а не лише назву"
      - words: [Рецензія, має, пояснити, як, працює, художня, форма]
        answer: "Рецензія має пояснити як працює художня форма"
      - words: [Переклад, переносить, ритм, регістр, і, культурні, натяки]
        answer: "Переклад переносить ритм регістр і культурні натяки"
      - words: [Музей, формує, маршрут, глядача, через, підписи, і, простір]
        answer: "Музей формує маршрут глядача через підписи і простір"

  - type: select
    title: Точність культурного аналізу
    instruction: Виберіть найкраще формулювання.
    items:
      - question: Яке речення містить доказову оцінку?
        options:
          - text: Різкий монтаж створює тривогу, бо сцени обриваються перед розв'язкою.
            correct: true
          - text: Фільм просто класний.
            correct: false
          - text: Усім має сподобатися цей твір.
            correct: false
          - text: У творі щось відбувається.
            correct: false
      - question: Що найкраще описує інтертекстуальність?
        options:
          - text: Твір розмовляє з іншими текстами через цитати або алюзії.
            correct: true
          - text: Текст не має жодного контексту.
            correct: false
          - text: Це лише список персонажів.
            correct: false
          - text: Це технічна помилка друку.
            correct: false
      - question: Яке питання доречне для аналізу муралу?
        options:
          - text: Де розміщено роботу і яку аудиторію вона бачить?
            correct: true
          - text: Чи можна не дивитися на контекст?
            correct: false
          - text: Чи достатньо сказати, що кольори гарні?
            correct: false
          - text: Чи треба ігнорувати місце роботи?
            correct: false
      - question: Яка фраза найточніше говорить про культуру спротиву?
        options:
          - text: Спротив може полягати в збереженні мови, пам'яті й гідності.
            correct: true
          - text: Кожен твір має бути прямим плакатом.
            correct: false
          - text: Мистецтво не має жодного суспільного контексту.
            correct: false
          - text: Пам'ять не може бути темою мистецтва.
            correct: false
      - question: Що має містити критичний відгук?
        options:
          - text: короткий опис, головну оцінку, докази і висновок
            correct: true
          - text: лише переказ сюжету
            correct: false
          - text: тільки емоційні прикметники
            correct: false
          - text: список випадкових асоціацій
            correct: false
      - question: Яке твердження доречне для аналізу адаптації класики?
        options:
          - text: Треба пояснити, яку функцію має зміна джерела.
            correct: true
          - text: Будь-яка зміна автоматично псує твір.
            correct: false
          - text: Достатньо перевірити лише костюми.
            correct: false
          - text: Контекст постановки не має значення.
            correct: false
      - question: Що допомагає чесно говорити про власне читання?
        options:
          - text: Формула "я читаю цей образ як..." плюс доказ із твору.
            correct: true
          - text: Заборона іншим тлумаченням існувати.
            correct: false
          - text: Відмова від деталей форми.
            correct: false
          - text: Підміна аналізу рейтингом.
            correct: false
      - question: Що найточніше описує культурну інституцію як текст?
        options:
          - text: Вона має маршрут, акценти, мовчання і спосіб комунікації.
            correct: true
          - text: Вона є лише будівлею без змісту.
            correct: false
          - text: Вона не впливає на пам'ять.
            correct: false
          - text: Її не можна аналізувати.
            correct: false

  - type: critical-analysis
    id: act-8
    title: Рамка складності
    instruction: Напишіть короткий аналіз фрагмента, не зводячи культуру до одного символу.
    target_text: >-
      Українська культура - це не лише впізнавані народні символи. Це також
      модернізм, кіно, кримськотатарська спадщина, цифрові архіви, переклад
      і складні дебати про пам'ять.
    questions:
      - Яку небезпеку має сувенірне спрощення культури?
      - Які сфери культури названо поруч із традиційними символами?
      - Як це формулювання допомагає культурній дипломатії?
      - Який приклад можна додати без перетворення культури на список?
    model_answers:
      - Воно зменшує складність культури до кількох зручних знаків.
      - Модернізм, кіно, кримськотатарська спадщина, архіви, переклад і дебати.
      - Воно показує країну як сучасну й багатошарову.
      - Можна коротко описати один фестиваль або перекладацький проєкт і пояснити його роль.

  - type: fill-in
    title: Слова для рецензії
    instruction: Уставте термін, який точно описує елемент твору.
    items:
      - sentence: "Послідовність подій у творі - це ____."
        answer: "сюжет"
        options: [сюжет, монтаж, реставрація, дипломатія]
        explanation: Сюжет відповідає за подієву лінію.
      - sentence: "Організація частин твору називається ____."
        answer: "композицією"
        options: [композицією, афішею, експозицією, прем'єрою]
        explanation: Композиція показує, як побудовано ціле.
      - sentence: "Діалог твору з іншими текстами - це ____."
        answer: "інтертекстуальність"
        options: [інтертекстуальність, реставрація, аранжування, жанр]
        explanation: Інтертекстуальність працює через цитати, алюзії або переосмислення.
      - sentence: "Представлення країни через мистецькі проєкти - це культурна ____."
        answer: "дипломатія"
        options: [дипломатія, фактура, декорація, репліка]
        explanation: Культурна дипломатія показує країну через культуру.
      - sentence: "Перегляд імперських рамок пам'яті називають ____."
        answer: "деколонізацією"
        options: [деколонізацією, стилізацією, римуванням, монтажем]
        explanation: Деколонізація змінює видимість і пояснення культурних явищ.
      - sentence: "Натяк на інший текст або культурний образ - це ____."
        answer: "алюзія"
        options: [алюзія, декорація, прем'єра, реставрація]
        explanation: Алюзія працює через упізнаване, але непряме посилання.
      - sentence: "Розташування експонатів і пояснень у музеї утворює ____."
        answer: "експозицію"
        options: [експозицію, риму, репліку, афішу]
        explanation: Експозиція організує маршрут і рамку сприйняття.
      - sentence: "Техніка поєднання кадрів у кіно називається ____."
        answer: "монтажем"
        options: [монтажем, каноном, ритмом, прозою]
        explanation: Монтаж формує послідовність і зв'язки між кадрами.
      - sentence: "Система визнаних культурою творів і авторів - це ____."
        answer: "канон"
        options: [канон, фактура, репліка, афіша]
        explanation: Канон визначає, що вважають центральним для культурної пам'яті.
      - sentence: "Передача твору іншою мовою з увагою до стилю - це ____."
        answer: "переклад"
        options: [переклад, декорація, експозиція, монтаж]
        explanation: Переклад переносить не лише зміст, а й регістр та культурні натяки.

  - type: essay-response
    id: act-10
    title: Критичний відгук
    instruction: Напишіть короткий відгук із доказовою оцінкою.
    prompt: >-
      Оберіть сучасний український фільм, книгу, виставку, мурал або музичний
      твір. Напишіть відгук на 160-220 слів: короткий опис, головна оцінка,
      два докази, культурний контекст і висновок.
    min_words: 160
    model_answer: >-
      Сильний відгук не переказує весь сюжет, а формулює оцінку і доводить її
      через конкретні прийоми. Автор може назвати композицію, образ, монтаж,
      ритм, колір або наративну перспективу, навести один-два приклади й
      пояснити, як вони працюють у темі твору. Культурний контекст потрібен
      для рамки, але він не замінює уважного аналізу самого твору.
    rubric:
      - criteria: Оцінка і докази
        description: Є головна оцінка і щонайменше два конкретні докази.
        points: 2
      - criteria: Термінологія
        description: Терміни з модуля використано природно й точно.
        points: 2
      - criteria: Контекст
        description: Культурний контекст підтримує аналіз, але не замінює його.
        points: 2
