version: '1.0'
module: b2-058
level: b2
inline:
  - type: fill-in
    title: Заповніть дату або час
    instruction: Оберіть форму, яка граматично відповідає контексту.
    items:
      - sentence: Зустріч відбудеться ____ березня.
        answer: п'ятого
        options:
          - п'ятого
          - п'яте
          - п'ятий
          - п'ятому
        explanation: Дата відповідає на питання коли? - родовий відмінок.
      - sentence: Документ підписано двадцять ____ серпня.
        answer: четвертого
        options:
          - четвертого
          - четвертий
          - четвертому
          - четверте
        explanation: День у даті має родовий відмінок.
      - sentence: Конференція починається ____ одинадцятій.
        answer: об
        options:
          - об
          - у
          - на
          - до
        explanation: Перед одинадцятій природно об.
      - sentence: Семінар почнеться о ____ годині.
        answer: дев'ятій
        options:
          - дев'ятій
          - дев'ята
          - дев'яту
          - дев'ятої
        explanation: О котрій? - о дев'ятій.
      - sentence: '8:30 розмовно: пів на ____.'
        answer: дев'яту
        options:
          - дев'яту
          - дев'ятої
          - дев'ята
          - дев'ятій
        explanation: Пів на + знахідний наступної години.
      - sentence: '9:45 розмовно: за чверть ____.'
        answer: десята
        options:
          - десята
          - десяту
          - десятої
          - десятій
        explanation: За чверть десята.
      - sentence: Події дві тисячі двадцять ____ року.
        answer: четвертого
        options:
          - четвертого
          - четвертому
          - четвертий
          - четвертим
        explanation: Родовий відмінок року.
      - sentence: У дві тисячі двадцять ____ році.
        answer: четвертому
        options:
          - четвертому
          - четвертого
          - четвертий
          - четвертим
        explanation: У році - місцевий відмінок останнього компонента.
      - sentence: Заняття тривають ____ дев'ятої до одинадцятої.
        answer: з
        options:
          - з
          - на
          - у
          - біля
        explanation: 'Інтервал: з... до...'
      - sentence: Ми повторюємо лексику ____.
        answer: щодня
        options:
          - щодня
          - кожним днем
          - по дням
          - в день
        explanation: Щодня - нормативний прислівник періодичності.
      - sentence: Виставка триватиме з першого ____ п'ятнадцяте липня.
        answer: по
        options:
          - по
          - на
          - о
          - біля
        explanation: З... по... можливе для включного календарного інтервалу.
      - sentence: 'Приблизний час: ____ сьомої.'
        answer: близько
        options:
          - близько
          - без
          - на
          - під
        explanation: Близько + родовий відмінок.
  - type: match-up
    title: Поєднайте форму й пояснення
    instruction: Доберіть правильне пояснення до часової форми.
    pairs:
      - left: першого вересня
        right: день і місяць у родовому відмінку
      - left: у дві тисячі двадцять четвертому році
        right: місцевий відмінок останнього компонента року
      - left: дві тисячі двадцять четвертого року
        right: родовий відмінок останнього компонента року
      - left: о п'ятій
        right: точний час із прийменником о
      - left: об одинадцятій
        right: точний час перед голосним
      - left: пів на четверту
        right: половина до наступної години
      - left: чверть на восьму
        right: 7:15 у розмовному стилі
      - left: за десять шоста
        right: 5:50 у розмовному стилі
      - left: щодня
        right: регулярність кожного дня
      - left: двічі на тиждень
        right: кількість повторів за період
      - left: з першого до п'ятого червня
        right: календарний інтервал
      - left: близько сьомої
        right: приблизний час
  - type: select
    title: Оберіть правильні пояснення
    instruction: Позначте всі твердження, які відповідають наведеній формі.
    items:
      - question: Форма «двадцять четвертого серпня».
        min_correct: 2
        options:
          - text: День стоїть у родовому відмінку.
            correct: true
          - text: Місяць стоїть у родовому відмінку.
            correct: true
          - text: Треба казати двадцять четверте серпень.
            correct: false
          - text: Це форма точного часу.
            correct: false
        explanation: Дата вимагає родового відмінка.
      - question: Форма «о сьомій годині».
        min_correct: 2
        options:
          - text: Відповідає на питання о котрій?
            correct: true
          - text: Має прийменник о.
            correct: true
          - text: Сьомій треба замінити на сьома.
            correct: false
          - text: Це дата, а не час.
            correct: false
        explanation: О сьомій - нормативна форма часу.
      - question: Форма «пів на дев'яту».
        min_correct: 2
        options:
          - text: Означає 8:30.
            correct: true
          - text: Потрібен знахідний наступної години.
            correct: true
          - text: Означає 9:30.
            correct: false
          - text: Треба казати пів дев'ятої.
            correct: false
        explanation: Пів на дев'яту - половина до дев'ятої.
      - question: Форма «у дві тисячі двадцять четвертому році».
        min_correct: 2
        options:
          - text: Останній компонент має місцевий відмінок.
            correct: true
          - text: Попередні компоненти не відмінюються як кількість.
            correct: true
          - text: Правильно тільки у двох тисячах.
            correct: false
          - text: Це розмовна форма половини години.
            correct: false
        explanation: У році - місцевий відмінок.
      - question: Форма «за чверть третя».
        min_correct: 2
        options:
          - text: Означає 2:45.
            correct: true
          - text: Це розмовний спосіб позначення часу.
            correct: true
          - text: Є калькою без п'ятнадцяти три.
            correct: false
          - text: Означає 3:15.
            correct: false
        explanation: За чверть третя - чверть до третьої.
      - question: Форма «з першого до п'ятого червня».
        min_correct: 2
        options:
          - text: Позначає інтервал.
            correct: true
          - text: Обидва дні мають родовий відмінок.
            correct: true
          - text: Треба з перше до п'яте.
            correct: false
          - text: Це назва століття.
            correct: false
        explanation: З... до... керує формами інтервалу.
      - question: Форма «близько сьомої».
        min_correct: 2
        options:
          - text: Передає приблизний час.
            correct: true
          - text: Має родовий відмінок після близько.
            correct: true
          - text: Означає точний офіційний час.
            correct: false
          - text: Треба близько сьома.
            correct: false
        explanation: Близько потребує родового відмінка.
      - question: Форма «кожні два тижні».
        min_correct: 2
        options:
          - text: Позначає регулярність через два тижні.
            correct: true
          - text: Позначає регулярність, а не точні календарні межі.
            correct: true
          - text: Означає двічі на тиждень.
            correct: false
          - text: Це дата з місяцем.
            correct: false
        explanation: Кожні два тижні - періодичність, не кількість разів.
      - question: Форма «у двадцять першому столітті».
        min_correct: 2
        options:
          - text: Порядковий числівник має місцевий відмінок.
            correct: true
          - text: Слово столітті стоїть у місцевому відмінку.
            correct: true
          - text: Треба у двадцять першого століття.
            correct: false
          - text: Це форма години.
            correct: false
        explanation: У столітті - місцевий відмінок.
      - question: Форма «п'ятнадцять хвилин до десятої».
        min_correct: 2
        options:
          - text: Означає 9:45.
            correct: true
          - text: До десятої має родовий відмінок.
            correct: true
          - text: Означає 10:15.
            correct: false
          - text: Треба без п'ятнадцяти десять.
            correct: false
        explanation: Це нормативна розмовна модель.
      - question: Форма «п'ятнадцята тридцять».
        min_correct: 2
        options:
          - text: Це офіційна форма 15:30.
            correct: true
          - text: Може вживатися в розкладі.
            correct: true
          - text: Це єдина розмовна форма.
            correct: false
          - text: Означає пів на п'ятнадцяту.
            correct: false
        explanation: Офіційний стиль читає години й хвилини.
      - question: Форма «протягом двох днів».
        min_correct: 2
        options:
          - text: Є нормативною часовою конструкцією.
            correct: true
          - text: Краща за на протязі двох днів.
            correct: true
          - text: Означає місце на протязі.
            correct: false
          - text: Має форму називного відмінка.
            correct: false
        explanation: Протягом виражає часову тривалість.
  - type: error-correction
    title: Виправте дату або час
    instruction: Знайдіть помилку й виберіть нормативну форму.
    items:
      - sentence: Зустріч буде в перше травня.
        error: в перше травня
        correction: першого травня
        options:
          - першого травня
          - в перше травня
          - перше травень
          - на перше травня
        error_type: phrase
        explanation: Дата без прийменника, день у родовому відмінку.
      - sentence: Документ датовано двадцять четверте серпень.
        error: двадцять четверте серпень
        correction: двадцять четвертого серпня
        options:
          - двадцять четвертого серпня
          - двадцять четверте серпень
          - двадцять четвертому серпні
          - двадцять четвертий серпень
        error_type: phrase
        explanation: День і місяць у родовому відмінку.
      - sentence: Семінар починається у дев'ята година.
        error: у дев'ята година
        correction: о дев'ятій годині
        options:
          - о дев'ятій годині
          - у дев'ята година
          - на дев'яту годину
          - до дев'ята година
        error_type: phrase
        explanation: О котрій? - о дев'ятій годині.
      - sentence: 8:30 - пів дев'ятої.
        error: пів дев'ятої
        correction: пів на дев'яту
        options:
          - пів на дев'яту
          - пів дев'ятої
          - половина дев'ять
          - пів у дев'ятій
        error_type: phrase
        explanation: 'Нормативна розмовна модель: пів на + знахідний.'
      - sentence: 9:45 - без п'ятнадцяти десять.
        error: без п'ятнадцяти десять
        correction: за чверть десята
        options:
          - за чверть десята
          - без п'ятнадцяти десять
          - пів на десяту
          - чверть по десятій
        error_type: phrase
        explanation: Без п'ятнадцяти - калька.
      - sentence: У двох тисячах двадцять четвертому році.
        error: У двох тисячах
        correction: У дві тисячі
        options:
          - У дві тисячі
          - У двох тисячах
          - На дві тисячі
          - До двох тисяч
        error_type: phrase
        explanation: У назві року не відмінюємо попередні компоненти.
      - sentence: Події дві тисячі двадцять четвертому року.
        error: четвертому
        correction: четвертого
        options:
          - четвертого
          - четвертому
          - четвертий
          - четвертим
        error_type: word
        explanation: Події року - родовий відмінок.
      - sentence: Ми працюємо на протязі двох днів.
        error: на протязі
        correction: протягом
        options:
          - протягом
          - на протязі
          - по протязі
          - у протязі
        error_type: phrase
        explanation: Для часу нормативно протягом.
      - sentence: Заняття тривають з дев'ята до одинадцята.
        error: з дев'ята до одинадцята
        correction: з дев'ятої до одинадцятої
        options:
          - з дев'ятої до одинадцятої
          - з дев'ята до одинадцята
          - на дев'яту до одинадцяту
          - у дев'ятій до одинадцятій
        error_type: phrase
        explanation: Інтервал часу потребує відмінкових форм.
      - sentence: Ми зустрічаємося кожного другого тижня.
        error: кожного другого тижня
        correction: кожні два тижні
        options:
          - кожні два тижні
          - кожного другого тижня
          - двічі тижнем
          - по двох тижнях
        error_type: phrase
        explanation: Для регулярності краще кожні два тижні.
      - sentence: Квитки продають до перше липня.
        error: перше
        correction: першого
        options:
          - першого
          - перше
          - першому
          - перший
        error_type: word
        explanation: До + родовий відмінок.
      - sentence: У двадцять першого століття це звучить дивно.
        error: двадцять першого століття
        correction: двадцять першому столітті
        options:
          - двадцять першому столітті
          - двадцять першого століття
          - двадцять перше століття
          - двадцять першим століттям
        error_type: phrase
        explanation: У столітті - місцевий відмінок.
  - type: quiz
    title: Перевірте числівники в часі
    instruction: Оберіть один найточніший варіант.
    items:
      - question: Як правильно сказати дату 1 вересня?
        options:
          - text: першого вересня
            correct: true
          - text: перше вересень
            correct: false
          - text: у перше вересня
            correct: false
          - text: першому вересні
            correct: false
        explanation: Дата потребує родового відмінка.
      - question: Як правильно прочитати 15:30 в офіційному стилі?
        options:
          - text: п'ятнадцята тридцять
            correct: true
          - text: пів на четверту
            correct: false
          - text: п'ятнадцять і тридцять
            correct: false
          - text: половина п'ятнадцятої
            correct: false
        explanation: Офіційний стиль читає години й хвилини.
      - question: Як правильно сказати 8:30 розмовно?
        options:
          - text: пів на дев'яту
            correct: true
          - text: пів дев'ятої
            correct: false
          - text: пів на восьму
            correct: false
          - text: за пів дев'ята
            correct: false
        explanation: Половина до наступної години.
      - question: Яке питання найкраще питає поточний час?
        options:
          - text: Котра година?
            correct: true
          - text: Котрий день?
            correct: false
          - text: Скільки дата?
            correct: false
          - text: Яке число годин?
            correct: false
        explanation: Котра година? - нейтральна стандартна форма.
      - question: Як правильно назвати події 2024 року?
        options:
          - text: події дві тисячі двадцять четвертого року
            correct: true
          - text: події у двох тисячах двадцять четвертому року
            correct: false
          - text: події дві тисячі двадцять четвертому року
            correct: false
          - text: події двох тисяч двадцять четвертий року
            correct: false
        explanation: Потрібен родовий відмінок останнього компонента.
      - question: Як правильно сказати 9:45 розмовно?
        options:
          - text: за чверть десята
            correct: true
          - text: без п'ятнадцяти десять
            correct: false
          - text: чверть по десятій
            correct: false
          - text: пів на десяту
            correct: false
        explanation: За чверть десята - чверть до десятої.
      - question: Яка форма позначає регулярність кожного дня?
        options:
          - text: щодня
            correct: true
          - text: по дням
            correct: false
          - text: у деньом
            correct: false
          - text: кожним днем
            correct: false
        explanation: Щодня - нормативний прислівник.
      - question: Який варіант правильно передає інтервал?
        options:
          - text: з дев'ятої до одинадцятої
            correct: true
          - text: з дев'ята до одинадцята
            correct: false
          - text: на дев'яту по одинадцять
            correct: false
          - text: у дев'ятій одинадцята
            correct: false
        explanation: З... до... потребує відмінкових форм.
      - question: Як правильно сказати приблизний час?
        options:
          - text: близько сьомої
            correct: true
          - text: близько сьома
            correct: false
          - text: без сьомої
            correct: false
          - text: на сьомої
            correct: false
        explanation: Близько + родовий відмінок.
      - question: Яке речення правильно називає століття?
        options:
          - text: у двадцять першому столітті
            correct: true
          - text: у двадцять першого століття
            correct: false
          - text: на двадцять перше століття
            correct: false
          - text: у двадцять першим століттям
            correct: false
        explanation: У столітті - місцевий відмінок.
      - question: Яка форма краща для часової тривалості?
        options:
          - text: протягом двох днів
            correct: true
          - text: на протязі двох днів
            correct: false
          - text: по протязі двох днів
            correct: false
          - text: у протягу двох днів
            correct: false
        explanation: Протягом - нормативно для часу.
      - question: Як правильно сказати час події?
        options:
          - text: О котрій годині починається лекція?
            correct: true
          - text: Куди година починається лекція?
            correct: false
          - text: Яке число години лекція?
            correct: false
          - text: Скільки годин лекція починає?
            correct: false
        explanation: О котрій годині? питає про час події.
workbook:
  - type: reading
    id: numeral-time-reading
    title: 'Читання: оголошення з датами й часом'
    instruction: Прочитайте оголошення і знайдіть усі часові форми.
    source: Навчальний уривок для модуля B2.
    text: Реєстрація на семінар триватиме з першого до десятого червня. Перша зустріч відбудеться дванадцятого червня о пів
      на одинадцяту, а підсумкова розмова - двадцять восьмого червня о п'ятнадцятій тридцять. У дві тисячі двадцять шостому
      році організатори планують проводити такі зустрічі щомісяця.
    tasks:
