  - type: true-false
    title: Правда чи ні
    instruction: Визначте, чи твердження відповідає нормі.
    items:
      - statement: У даті день зазвичай має форму родового відмінка.
        correct: true
        explanation: Першого вересня, двадцять четвертого серпня.
      - statement: У повній даті назва місяця стоїть у називному відмінку.
        correct: false
        explanation: 'Потрібен родовий: березня, квітня, травня.'
      - statement: У назві року відмінюється останній компонент.
        correct: true
        explanation: У дві тисячі двадцять четвертому році.
      - statement: Пів на четверту означає 3:30.
        correct: true
        explanation: Це половина до четвертої.
      - statement: Без п'ятнадцяти три є нормативною українською формою.
        correct: false
        explanation: Краще за чверть третя або п'ятнадцять хвилин до третьої.
      - statement: Котра година? доречно питає поточний час.
        correct: true
        explanation: Це стандартна нейтральна форма.
      - statement: О котрій годині? питає про час події.
        correct: true
        explanation: 'Наприклад: о котрій годині початок?'
