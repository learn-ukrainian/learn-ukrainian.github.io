  - type: essay-response
    id: numeral-time-response
    title: 'Письмова відповідь: розклад і дата'
    instruction: Напишіть службове повідомлення з датою, часом та періодичністю.
    prompt: Складіть повідомлення для учасників мовного клубу. Назвіть дату першої зустрічі, точний офіційний час, розмовну
      форму цього часу, тривалість зустрічей та регулярність.
    min_words: 150
    model_answer: '> [!model-answer]

      > Перша зустріч мовного клубу відбудеться дванадцятого вересня о

      > сімнадцятій тридцять. У розмовному повідомленні це можна сказати як пів

      > на шосту, але в офіційному розкладі залишаємо точну форму 17:30. Заняття

      > триватимуть з сімнадцятої тридцяти до дев''ятнадцятої години. У дві тисячі

      > двадцять шостому році клуб працюватиме щотижня, а додаткові консультації

      > відбуватимуться кожні два тижні. Реєстрація відкрита з першого до

      > десятого вересня. Просимо учасників перевірити дату в календарі й прийти

      > за десять хвилин до початку, аби група могла почати роботу вчасно.'
    rubric:
      - criteria: Дати
        description: День, місяць і рік оформлені нормативно.
        points: 2
      - criteria: Час
        description: Є офіційна й розмовна форма часу.
        points: 2
      - criteria: Періодичність
        description: Регулярність і інтервал сформульовані граматично.
        points: 1
    peer_review_guidelines: Перевірте родовий відмінок дат, форму року та моделі о/об, пів на, з... до...
