  - id: workbook-5
    type: essay-response
    title: "Два регістри одного розкладу"
    prompt: >-
      Напишіть 120-160 слів: спочатку офіційне повідомлення про подію з повною датою, роком, точним часом та інтервалом, а потім коротку розмовну версію для друга. Використайте щонайменше шість часових або календарних форм.
    rubric:
      - criteria: "Дата і рік"
        description: "Повна дата має родовий дня й місяця, а назва року має правильний останній компонент."
        points: 4
      - criteria: "Час і інтервал"
        description: "Є офіційний час через о/об та інтервал з... до...."
        points: 3
      - criteria: "Регістр"
        description: "Розмовна версія природно використовує пів на, за чверть, близько або подібну форму."
        points: 3
    model_answer: |-
      > [!model-answer]
      > Офіційно: Презентація міської програми відбудеться двадцять четвертого серпня дві тисячі двадцять шостого року о десятій годині тридцять хвилин у залі громадської ради. Реєстрація триватиме з дев'ятої до десятої, а обговорення заплановано з одинадцятої до дванадцятої. Розмовно: Приходь двадцять четвертого серпня, десь о пів на одинадцяту. Краще бути біля входу близько десятої, бо реєстрація закінчиться за кілька хвилин до одинадцятої. Якщо матимеш час, залишайся до дванадцятої: після презентації буде коротке обговорення.
