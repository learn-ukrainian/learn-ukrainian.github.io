version: '1.0'
module: numeral-declension-time-dates
level: b2
inline:
  - type: fill-in
    title: "Дата керує родовим"
    instruction: "Виберіть форму дня, місяця або року, яка відповідає календарній рамці."
    items:
      - sentence: "Зустріч відбудеться ____ березня."
        answer: "п'ятого"
        options: ["п'ятого", "п'яте", "п'ятий", "п'ятому"]
        explanation: "Дата відповідає на питання коли?, тому день має родовий відмінок."
      - sentence: "Документ підписано двадцять ____ серпня."
        answer: "четвертого"
        options: ["четвертого", "четвертий", "четвертому", "четверте"]
        explanation: "У даті змінюється останній компонент порядкового числівника."
      - sentence: "Наказ від ____ листопада зберігається в архіві."
        answer: "чотирнадцятого"
        options: ["чотирнадцятого", "чотирнадцяте", "чотирнадцятий", "чотирнадцятому"]
        explanation: "Після від і в даті потрібен родовий."
      - sentence: "Виступ перенесено на ____ квітня."
        answer: "третє"
        options: ["третє", "третього", "третьому", "третій"]
        explanation: "На яку дату? - на третє квітня як календарну позицію."
      - sentence: "Рішення ухвалили ____ квітня."
        answer: "третього"
        options: ["третього", "третє", "третьому", "третій"]
        explanation: "Коли ухвалили? - третього квітня."
      - sentence: "Він народився дев'ятого березня тисяча вісімсот ____ року."
        answer: "чотирнадцятого"
        options: ["чотирнадцятого", "чотирнадцятий", "чотирнадцять", "чотирнадцятому"]
        explanation: "У повній даті року змінюється останній порядковий компонент."
      - sentence: "Подія сталася у дві тисячі двадцять ____ році."
        answer: "першому"
        options: ["першому", "першого", "перший", "одному"]
        explanation: "У якому році? - місцевий відмінок останнього компонента."
      - sentence: "Довідка стосується дві тисячі двадцять ____ року."
        answer: "четвертого"
        options: ["четвертого", "четвертому", "чотири", "четвертий"]
        explanation: "Документ якого року? - родовий відмінок останнього компонента."
      - sentence: "У ____ столітті зросла роль цифрових архівів."
        answer: "двадцять першому"
        options: ["двадцять першому", "двадцять першого", "двадцять перше", "двадцять один"]
        explanation: "У якому столітті? - місцевий відмінок."
      - sentence: "Пам'ятка ____ століття потребує реставрації."
        answer: "дев'ятнадцятого"
        options: ["дев'ятнадцятого", "дев'ятнадцятому", "дев'ятнадцять", "дев'ятнадцятий"]
        explanation: "Пам'ятка якого століття? - родовий."
      - sentence: "Звіт охоплює дані ____ років."
        answer: "двох"
        options: ["двох", "два", "другого", "двом"]
        explanation: "Тут ідеться не про назву року, а про кількість років."
      - sentence: "Упродовж ____ років команда збирала матеріали."
        answer: "трьох"
        options: ["трьох", "три", "третього", "трьом"]
        explanation: "Упродовж скількох років? - родовий множини."

  - type: match-up
    title: "Питання до часової форми"
    instruction: "Поєднайте форму з граматичною рамкою, яка її пояснює."
    pairs:
      - left: "першого вересня"
        right: "коли? день і місяць у родовому"
      - left: "на перше вересня"
        right: "на яку дату? календарна позиція"
      - left: "у дві тисячі двадцять четвертому році"
        right: "у якому році? місцевий останнього компонента"
      - left: "дві тисячі двадцять четвертого року"
        right: "якого року? родовий останнього компонента"
      - left: "у двадцять першому столітті"
        right: "у якому столітті? місцевий"
      - left: "двадцять першого століття"
        right: "якого століття? родовий"
      - left: "о сьомій годині"
        right: "о котрій? точний час"
      - left: "об одинадцятій"
        right: "милозвучна форма перед голосним"
      - left: "пів на четверту"
        right: "розмовно: 3:30"
      - left: "за чверть десята"
        right: "розмовно: 9:45"
      - left: "з першого до п'ятого червня"
        right: "інтервал із двома родовими межами"
      - left: "близько сьомої"
        right: "приблизний час із родовим"

  - type: select
    title: "Офіційно чи розмовно?"
    instruction: "Позначте всі правильні твердження про спосіб позначення часу."
    items:
      - question: "«О п'ятнадцятій тридцять»."
        min_correct: 2
        options:
          - text: "Це офіційний спосіб читання 15:30."
            correct: true
          - text: "Форма доречна в розкладі або службовому повідомленні."
            correct: true
          - text: "Це розмовне пів на третю."
            correct: false
          - text: "Треба сказати у п'ятнадцять тридцять годині."
            correct: false
        explanation: "Офіційний формат зберігає точність і 24-годинну рамку."
      - question: "«Пів на дев'яту»."
        min_correct: 2
        options:
          - text: "Це розмовна форма для 8:30."
            correct: true
          - text: "Наступна година має знахідну форму."
            correct: true
          - text: "Фраза означає 9:30."
            correct: false
          - text: "Її краще ставити в офіційний наказ."
            correct: false
        explanation: "Пів на + наступна година: пів на дев'яту = 8:30."
      - question: "«За чверть третя»."
        min_correct: 2
        options:
          - text: "Означає 2:45."
            correct: true
          - text: "Це природна розмовна форма."
            correct: true
          - text: "Це калька без п'ятнадцяти три."
            correct: false
          - text: "Означає 3:15."
            correct: false
        explanation: "За чверть третя - чверть до третьої."
      - question: "«Об одинадцятій»."
        min_correct: 2
        options:
          - text: "Перед голосним ужито об."
            correct: true
          - text: "Це відповідь на питання о котрій?"
            correct: true
          - text: "Правильно тільки у одинадцятій."
            correct: false
          - text: "Це дата, а не час."
            correct: false
        explanation: "О/об керує формою часу; об зручне перед голосним."
      - question: "«Близько сьомої»."
        min_correct: 2
        options:
          - text: "Передає приблизний час."
            correct: true
          - text: "Після близько потрібен родовий."
            correct: true
          - text: "Означає точний офіційний час."
            correct: false
          - text: "Нормативно тільки близько сьома."
            correct: false
        explanation: "Близько сьомої - приблизна часова рамка."
      - question: "«Щоп'ятниці»."
        min_correct: 2
        options:
          - text: "Позначає регулярність."
            correct: true
          - text: "Означає кожної п'ятниці."
            correct: true
          - text: "Це точна дата з місяцем."
            correct: false
          - text: "Має значення двічі на тиждень."
            correct: false
        explanation: "Що-формули позначають повторюваність."
      - question: "«З першого до п'ятого червня»."
        min_correct: 2
        options:
          - text: "Позначає інтервал."
            correct: true
          - text: "Обидві межі мають родовий відмінок."
            correct: true
          - text: "Треба з перше до п'яте."
            correct: false
          - text: "Це розмовна формула пів на."
            correct: false
        explanation: "З... до... керує межами інтервалу."
      - question: "«На третє квітня»."
        min_correct: 2
        options:
          - text: "Відповідає на питання на яку дату?"
            correct: true
          - text: "Може означати призначення на календарну позицію."
            correct: true
          - text: "Завжди замінює третього квітня."
            correct: false
          - text: "Місяць має називний відмінок."
            correct: false
        explanation: "На третє квітня і третього квітня відповідають на різні питання."
      - question: "«Дві тисячі двадцять четвертого року»."
        min_correct: 2
        options:
          - text: "Це календарна назва року в родовому."
            correct: true
          - text: "Змінюється останній порядковий компонент."
            correct: true
          - text: "Це кількість двох тисяч років."
            correct: false
          - text: "Треба двох тисяч двадцяти чотирьох років у даті."
            correct: false
        explanation: "Назва року не відмінюється як кількість років."
      - question: "«Раз на два тижні»."
        min_correct: 2
        options:
          - text: "Позначає періодичність."
            correct: true
          - text: "Відрізняється від двічі на тиждень."
            correct: true
          - text: "Означає щоденну дію."
            correct: false
          - text: "Це назва століття."
            correct: false
        explanation: "Періодичність треба відрізняти від календарної межі."

  - type: error-correction
    title: "Виправте дату або час"
    instruction: "Знайдіть помилкову форму й подайте нормативний варіант."
    items:
      - sentence: "Зустріч відбудеться п'яте березня."
        error: "п'яте"
        correction: "п'ятого"
        explanation: "Коли? - п'ятого березня."
      - sentence: "Документ від чотирнадцяте листопада."
        error: "чотирнадцяте"
        correction: "чотирнадцятого"
        explanation: "Від якої дати? - родовий."
      - sentence: "Подія сталася у дві тисячі двадцять четвертого році."
        error: "четвертого"
        correction: "четвертому"
        explanation: "У якому році? - місцевий відмінок."
      - sentence: "Довідка дві тисячі двадцять четвертому року."
        error: "четвертому"
        correction: "четвертого"
        explanation: "Довідка якого року? - родовий."
      - sentence: "Консультація починається у дев'ятій годині."
        error: "у дев'ятій"
        correction: "о дев'ятій"
        explanation: "О котрій годині? - о дев'ятій."
      - sentence: "Запис об п'ятнадцятій тридцять хвилин."
        error: "об"
        correction: "о"
        explanation: "Перед приголосним природно о п'ятнадцятій."
      - sentence: "8:30 розмовно: пів на восьму."
        error: "восьму"
        correction: "дев'яту"
        explanation: "Пів на дев'яту означає 8:30."
      - sentence: "9:45 розмовно: без п'ятнадцяти десять."
        error: "без п'ятнадцяти десять"
        correction: "за чверть десята"
        explanation: "Українська розмовна модель: за чверть десята."
      - sentence: "Виставка триває з перше до п'яте червня."
        error: "перше до п'яте"
        correction: "першого до п'ятого"
        explanation: "У межах з... до... потрібен родовий."
      - sentence: "Зустрінемося близько сьома."
        error: "сьома"
        correction: "сьомої"
        explanation: "Близько керує родовим відмінком."

  - id: act-5
    type: essay-response
    title: "Перемкніть час між регістрами"
    prompt: >-
      Напишіть 90-120 слів: одне офіційне повідомлення з повною датою, роком і точним часом, а потім одну розмовну репліку з тим самим часом.
    model_answer: |-
      > [!model-answer]
      > Офіційно: Консультація для учасників програми відбудеться п'ятого березня дві тисячі двадцять шостого року о п'ятнадцятій тридцять у читальній залі архіву. Реєстрація триватиме з чотирнадцятої до п'ятнадцятої. Розмовно: Приходь п'ятого березня десь о пів на четверту, але краще бути біля входу близько третьої, бо реєстрація швидко закінчиться.
    rubric:
      - criteria: "Дата"
        description: "Офіційна частина має дату з правильним родовим."
        points: 3
      - criteria: "Час"
        description: "Є офіційний час і розмовний відповідник."
        points: 4
      - criteria: "Інтервал"
        description: "Інтервал або приблизний час оформлено нормативно."
        points: 3

workbook:
  - type: unjumble
    title: "Складіть календарне речення"
    instruction: "Розташуйте слова так, щоб утворити нормативне речення з датою, часом або інтервалом."
    items:
      - words: ["Зустріч", "відбудеться", "п'ятого", "березня", "об", "одинадцятій"]
        answer: "Зустріч відбудеться п'ятого березня об одинадцятій."
      - words: ["Документ", "підписано", "двадцять", "четвертого", "серпня", "цього", "року"]
        answer: "Документ підписано двадцять четвертого серпня цього року."
      - words: ["Подія", "сталася", "у", "дві", "тисячі", "двадцять", "першому", "році"]
        answer: "Подія сталася у дві тисячі двадцять першому році."
      - words: ["Консультація", "триває", "з", "дев'ятої", "до", "одинадцятої"]
        answer: "Консультація триває з дев'ятої до одинадцятої."
      - words: ["Поїзд", "вирушає", "о", "п'ятнадцятій", "тридцять", "із", "перону"]
        answer: "Поїзд вирушає о п'ятнадцятій тридцять із перону."
      - words: ["У", "розмові", "8:30", "це", "пів", "на", "дев'яту"]
        answer: "У розмові 8:30 - це пів на дев'яту."
      - words: ["Зустрінемося", "близько", "сьомої", "біля", "головного", "входу"]
        answer: "Зустрінемося близько сьомої біля головного входу."
      - words: ["Виставка", "триватиме", "з", "першого", "до", "п'ятого", "червня"]
        answer: "Виставка триватиме з першого до п'ятого червня."

  - type: fill-in
    title: "Оголошення з датами"
    instruction: "Заповніть пропуски в короткому службовому оголошенні."
    items:
      - sentence: "Реєстрація триває з ____ до ____ липня."
        answer: "першого; п'ятнадцятого"
        options: ["першого; п'ятнадцятого", "перше; п'ятнадцяте", "першому; п'ятнадцятому", "один; п'ятнадцять"]
        explanation: "З... до... вимагає родового для обох меж."
      - sentence: "Форум відкриється ____ жовтня ____ десятій."
        answer: "третього; о"
        options: ["третього; о", "третє; у", "третьому; на", "третій; до"]
        explanation: "Дата в родовому, точний час із о."
      - sentence: "Доповідь перенесено на ____ листопада."
        answer: "двадцять перше"
        options: ["двадцять перше", "двадцять першого", "двадцять першому", "двадцять один"]
        explanation: "На яку дату? - на двадцять перше листопада."
      - sentence: "Архів працює щодня ____ дев'ятої ____ сімнадцятої."
        answer: "з; до"
        options: ["з; до", "від; на", "о; до", "з; по"]
        explanation: "З дев'ятої до сімнадцятої - найпрозоріша модель інтервалу."
      - sentence: "Засідання почнеться ____ одинадцятій."
        answer: "об"
        options: ["об", "о", "у", "на"]
        explanation: "Перед одинадцятій природно об."
      - sentence: "Брифінг заплановано ____ п'ятнадцяту тридцять."
        answer: "на"
        options: ["на", "о", "до", "від"]
        explanation: "Заплановано на яку годину? - на п'ятнадцяту тридцять."
      - sentence: "Повідомлення датовано ____ грудня."
        answer: "тридцять першого"
        options: ["тридцять першого", "тридцять перше", "тридцять першому", "тридцять один"]
        explanation: "Датовано яким числом? - родовий."
      - sentence: "Експозиція діятиме ____ першого ____ десятого вересня."
        answer: "з; до"
        options: ["з; до", "о; до", "на; з", "від; на"]
        explanation: "З... до... задає межі інтервалу."
      - sentence: "Зустріч перенесли ____ двадцять четверте серпня."
        answer: "на"
        options: ["на", "о", "до", "близько"]
        explanation: "Перенести на яку дату? - на двадцять четверте серпня."
      - sentence: "Учасники збираються ____ сьомої."
        answer: "близько"
        options: ["близько", "о", "на", "від"]
        explanation: "Близько сьомої передає приблизний час."

  - type: error-correction
    title: "Редактор розкладу"
    instruction: "Виправте помилки в уривках із розкладу або запрошення."
    items:
      - sentence: "Семінар починається об десятій тридцять."
        error: "об"
        correction: "о"
        explanation: "Перед десятій природно о."
      - sentence: "Прийом документів з перше по п'ятнадцяте липня."
        error: "з перше"
        correction: "з першого"
        explanation: "Початкова межа після з має родовий."
      - sentence: "Засідання у дві тисячі двадцять четвертого році."
        error: "четвертого"
        correction: "четвертому"
        explanation: "У якому році? - четвертому."
      - sentence: "Розмова почнеться десь о сьомої."
        error: "о сьомої"
        correction: "о сьомій"
        explanation: "Точний час після о має форму о сьомій; приблизність уже дає десь."
      - sentence: "Збори відбудуться двадцять четверте серпня."
        error: "двадцять четверте"
        correction: "двадцять четвертого"
        explanation: "Коли? - двадцять четвертого серпня."
      - sentence: "Екскурсію призначено на третього квітня."
        error: "на третього"
        correction: "на третє"
        explanation: "Призначено на яку дату? - на третє квітня."
      - sentence: "Архів відкритий з дев'ята до сімнадцята."
        error: "дев'ята до сімнадцята"
        correction: "дев'ятої до сімнадцятої"
        explanation: "Межі часового інтервалу мають родовий."
      - sentence: "Зустрінемося близько восьмій."
        error: "восьмій"
        correction: "восьмої"
