- lemma: 锌芯谢褨虂褌懈泻邪
  translation: politics, policy
  pos: noun
  usage: 袩芯谢褨虂褌懈泻邪 锌芯褌褉械虂斜褍褦 褌芯虂褔薪懈褏 锌芯虂薪褟褌褜 褨 胁褨写锌芯胁褨写邪虂谢褜薪芯褩 邪褉谐褍屑械薪褌邪虂褑褨褩.
- lemma: 写械褉卸邪虂胁邪
  translation: state
  pos: noun
  usage: 袛械褉卸邪虂胁邪 屑邪虂褦 褨薪褋褌懈褌褍虂褑褨褩, 蟹邪泻芯虂薪懈 泄 褋懈褋褌械虂屑褍 褍锌褉邪胁谢褨虂薪薪褟.
- lemma: 褍虂褉褟写
  translation: government, cabinet
  pos: noun
  usage: 校虂褉褟写 谐芯褌褍虂褦 锌芯褉褟虂写芯泻 褍锌褉芯胁邪虂写卸械薪薪褟 锌褉芯谐褉邪虂屑懈.
- lemma: 锌邪褉谢邪虂屑械薪褌
  translation: parliament
  pos: noun
  usage: 袩邪褉谢邪虂屑械薪褌 褉芯蟹谐谢褟写邪虂褦 蟹邪泻芯薪芯锌褉芯褦虂泻褌 褍 泻褨谢褜泻芯虂褏 褔懈褌邪虂薪薪褟褏.
- lemma: 胁懈虂斜芯褉懈
  translation: elections
  pos: noun
  usage: 袙懈虂斜芯褉懈 芯褏芯虂锌谢褞褞褌褜 泻邪屑锌邪薪褨褞, 谐芯谢芯褋褍胁邪虂薪薪褟 泄 锌褨写褉邪虂褏褍薪芯泻 谐芯谢芯褋褨虂胁.
- lemma: 锌邪虂褉褌褨褟
  translation: political party
  pos: noun
  usage: 袩邪虂褉褌褨褟 芯锌褉懈谢褞虂写薪懈谢邪 锌褉芯谐褉邪虂屑褍 写谢褟 锌褍斜谢褨虂褔薪芯谐芯 芯斜谐芯胁芯虂褉械薪薪褟.
- lemma: 写械屑芯泻褉邪虂褌褨褟
  translation: democracy
  pos: noun
  usage: 袛械屑芯泻褉邪虂褌褨褟 锌芯褌褉械斜褍虂褦 泻芯薪泻褍褉械虂薪褑褨褩, 褍褔邪虂褋褌褨 泄 锌褨写蟹胁褨虂褌薪芯褋褌褨.
- lemma: 写懈泻褌邪褌褍虂褉邪
  translation: dictatorship
  pos: noun
  usage: 小谢芯虂胁芯 写懈泻褌邪褌褍虂褉邪 锌芯褌褉械虂斜褍褦 褔褨褌泻懈虂褏 芯蟹薪邪虂泻 褨 写芯泻邪虂蟹褨胁.
- lemma: 泻芯薪褋褌懈褌褍虂褑褨褟
  translation: constitution
  pos: noun
  usage: 袣芯薪褋褌懈褌褍虂褑褨褟 胁懈虂蟹薪邪褔邪褦 芯褋薪芯胁懈虂 写械褉卸邪虂胁薪芯谐芯 褍褋褌褉芯虂褞.
- lemma: 谐褉芯屑邪写褟薪懈虂薪
  translation: citizen
  pos: noun
  usage: 袚褉芯屑邪写褟薪懈虂薪 屑邪虂褦 锌褉邪胁邪虂 泄 芯斜芯胁'褟蟹泻懈 褍 蟹胁'褟蟹泻褍 蟹 写械褉卸邪虂胁芯褞.
- lemma: 写懈锌谢芯屑邪虂褌褨褟
  translation: diplomacy
  pos: noun
  usage: 袛懈锌谢芯屑邪虂褌褨褟 蟹斜械褉褨谐邪虂褦 泻邪薪邪虂谢懈 锌械褉械谐芯胁芯虂褉褨胁 屑褨卸 写械褉卸邪虂胁邪屑懈.
- lemma: 褋邪虂薪泻褑褨褩
  translation: sanctions
  pos: noun
  usage: 小邪虂薪泻褑褨褩 芯褑褨虂薪褞褞褌褜 蟹邪 锌褉邪胁芯胁懈虂屑懈 泄 锌芯谢褨褌懈虂褔薪懈屑懈 薪邪褋谢褨虂写泻邪屑懈.
- lemma: 泻芯褉褍虂锌褑褨褟
  translation: corruption
  pos: noun
  usage: 袨斜胁懈薪褍胁邪虂褔械薪薪褟 胁 泻芯褉褍虂锌褑褨褩 锌芯褌褉械虂斜褍褦 褎邪泻褌褨胁 褨 锌褉芯褑械写褍虂褉懈.
- lemma: 褉械褎芯虂褉屑邪
  translation: reform
  pos: noun
  usage: 袪械褎芯虂褉屑邪 屑邪虂褦 屑械褌褍虂, 屑械褏邪薪褨虂蟹屑 褍锌褉芯胁邪虂写卸械薪薪褟 泄 泻褉懈褌械褉褨虂褩 褍褋锌褨虂褏褍.
- lemma: 锌芯胁薪芯胁邪虂卸械薪薪褟
  translation: authority, powers
  pos: noun
  usage: 袩芯胁薪芯胁邪虂卸械薪薪褟 芯虂褉谐邪薪褍 胁谢邪虂写懈 褌褉械虂斜邪 薪邪蟹懈胁邪虂褌懈 褌芯虂褔薪芯.
- lemma: 褋褍胁械褉械薪褨褌械虂褌
  translation: sovereignty
  pos: noun
  usage: 小褍胁械褉械薪褨褌械虂褌 锌芯胁'褟虂蟹邪薪懈泄 褨蟹 褋邪屑芯褋褌褨虂泄薪褨褋褌褞 写械褉卸邪虂胁懈.
- lemma: 胁锌褉芯胁邪虂写卸械薪薪褟
  translation: implementation
  pos: noun
  usage: 袙锌褉芯胁邪虂写卸械薪薪褟 褉褨虂褕械薪薪褟 锌芯褌褉械虂斜褍褦 谐褉邪虂褎褨泻邪 泄 胁褨写锌芯胁褨写邪虂谢褜薪懈褏 胁懈泻芯薪邪虂胁褑褨胁.
- lemma: 胁蟹邪褦屑芯写褨虂褟
  translation: cooperation, interaction
  pos: noun
  usage: 袙蟹邪褦屑芯写褨虂褟 屑褨卸 褨薪褋褌懈褌褍虂褑褨褟屑懈 屑邪褦虂 斜褍虂褌懈 蟹褉芯虂蟹褍屑褨谢芯褞 写谢褟 谐褉芯屑邪虂写懈.
- lemma: 锌褨写蟹胁褨虂褌薪褨褋褌褜
  translation: accountability
  pos: noun
  usage: 袩褨写蟹胁褨虂褌薪褨褋褌褜 芯蟹薪邪褔邪虂褦 芯斜芯胁'褟蟹芯泻 锌芯褟褋薪褞虂胁邪褌懈 褉褨虂褕械薪薪褟 泄 褉械蟹褍谢褜褌邪虂褌懈.
- lemma: 胁械褉褏芯胁械虂薪褋褌胁芯 锌褉邪虂胁邪
  translation: rule of law
  pos: phrase
  usage: 袙械褉褏芯胁械虂薪褋褌胁芯 锌褉邪虂胁邪 芯斜屑械虂卸褍褦 褋胁邪胁褨虂谢谢褟 泄 蟹邪褏懈褖邪虂褦 锌褉芯褑械写褍虂褉褍.
- lemma: 谐械芯锌芯谢褨褌懈虂褔薪懈泄
  translation: geopolitical
  pos: adj
  usage: 袚械芯锌芯谢褨褌懈虂褔薪懈泄 褨薪褌械褉械虂褋 褌褉械斜邪虂 锌芯褟褋薪褞虂胁邪褌懈 褔械虂褉械蟹 斜械蟹锌械虂泻褍 泄 胁锌谢懈胁.
- lemma: 褋褌邪斜褨虂谢褜薪褨褋褌褜
  translation: stability
  pos: noun
  usage: 袩芯谢褨褌懈虂褔薪邪 褋褌邪斜褨虂谢褜薪褨褋褌褜 薪械 褋泻邪褋芯虂胁褍褦 锌芯褌褉械虂斜懈 胁 泻芯薪褌褉芯虂谢褨 胁谢邪虂写懈.
- lemma: 谢芯斜褨褞胁邪虂薪薪褟
  translation: lobbying
  pos: noun
  usage: 袥芯斜褨褞胁邪虂薪薪褟 屑芯虂卸械 斜褍虂褌懈 胁褨写泻褉懈虂褌懈屑 邪斜芯 薪械锌褉芯蟹芯虂褉懈屑.
- lemma: 谢械谐褨褌懈虂屑薪褨褋褌褜
  translation: legitimacy
  pos: noun
  usage: 袥械谐褨褌懈虂屑薪褨褋褌褜 褉褨虂褕械薪薪褟 蟹邪谢械虂卸懈褌褜 胁褨写 锌褉芯褑械写褍虂褉懈 泄 写芯胁褨虂褉懈.
- lemma: 褨薪褋褌懈褌褍虂褑褨褟
  translation: institution
  pos: noun
  usage: 袉薪褋褌懈褌褍虂褑褨褟 屑邪虂褦 胁懈虂蟹薪邪褔械薪褨 褎褍薪泻褑褨褩 褌邪 胁褨写锌芯胁褨写邪虂谢褜薪褨褋褌褜.
- lemma: 蟹邪泻芯薪芯锌褉芯褦虂泻褌
  translation: draft law
  pos: noun
  usage: 袟邪泻芯薪芯锌褉芯褦虂泻褌 芯斜谐芯胁芯虂褉褞褞褌褜 写芯 芯褋褌邪褌芯褔薪芯谐芯 谐芯谢芯褋褍胁邪虂薪薪褟.
- lemma: 胁懈斜芯褉褔邪 泻邪屑锌邪虂薪褨褟
  translation: election campaign
  pos: phrase
  usage: 袙懈斜芯褉褔邪 泻邪屑锌邪虂薪褨褟 屑邪褦虂 锌褉芯谐褉邪虂屑褍, 邪谐褨褌邪虂褑褨褞 泄 褎褨薪邪薪褋褍胁邪虂薪薪褟.
- lemma: 邪谐褨褌邪虂褑褨褟
  translation: campaigning, agitation
  pos: noun
  usage: 袗谐褨褌邪虂褑褨褟 屑邪虂褦 胁褨写斜褍胁邪虂褌懈褋褟 胁 屑械虂卸邪褏 胁懈虂斜芯褉褔懈褏 锌褉邪虂胁懈谢.
- lemma: 褋锌芯褋褌械褉褨谐邪虂褔
  translation: observer
  pos: noun
  usage: 小锌芯褋褌械褉褨谐邪虂褔褨 褎褨泻褋褍虂褞褌褜 锌褉芯褑械写褍虂褉薪褨 蟹邪褍胁邪虂卸械薪薪褟 锌褨写 褔邪褋 胁懈虂斜芯褉褨胁.
- lemma: 锌褉芯蟹芯虂褉褨褋褌褜
  translation: transparency
  pos: noun
  usage: 袩褉芯蟹芯虂褉褨褋褌褜 斜褞写卸械虂褌褍 锌褨写褋懈谢褞虂褦 写芯胁褨虂褉褍 谐褉芯屑邪虂写懈.
- lemma: 泻芯薪褋褍谢褜褌邪虂褑褨褩
  translation: consultations
  pos: noun
  usage: 袣芯薪褋褍谢褜褌邪虂褑褨褩 写芯锌芯屑邪谐邪虂褞褌褜 褍褉邪褏褍胁邪虂褌懈 锌芯蟹懈虂褑褨褞 屑械褕泻邪虂薪褑褨胁.
- lemma: 谐褉芯屑邪写褟虂薪褋褜泻械 褋褍褋锌褨虂谢褜褋褌胁芯
  translation: civil society
  pos: phrase
  usage: 袚褉芯屑邪写褟虂薪褋褜泻械 褋褍褋锌褨虂谢褜褋褌胁芯 胁锌谢懈胁邪虂褦 薪邪 褟泻褨虂褋褌褜 锌褍斜谢褨虂褔薪芯褩 锌芯谢褨虂褌懈泻懈.
- lemma: 屑褨卸薪邪褉芯虂写薪械 锌褉邪虂胁芯
  translation: international law
  pos: phrase
  usage: 袦褨卸薪邪褉芯虂写薪械 锌褉邪虂胁芯 蟹邪写邪褦虂 褉邪虂屑泻褍 写谢褟 锌械褉械谐芯胁芯虂褉褨胁 褨 褍谐芯虂写.
- lemma: 褉械蟹芯谢褞虂褑褨褟
  translation: resolution
  pos: noun
  usage: 袪械蟹芯谢褞虂褑褨褟 褎褨泻褋褍虂褦 锌芯蟹懈虂褑褨褞 芯虂褉谐邪薪褍 邪斜芯 屑褨卸薪邪褉芯虂写薪芯褩 芯褉谐邪薪褨蟹邪虂褑褨褩.
- lemma: 褍锌芯胁薪芯胁邪虂卸械薪懈泄
  translation: authorized, commissioner
  pos: adj
  usage: 校锌芯胁薪芯胁邪虂卸械薪懈泄 锌褉械写褋褌邪虂胁薪懈泻 屑邪虂褦 锌褉邪虂胁芯 谐芯胁芯褉懈虂褌懈 胁褨写 褨虂屑械薪褨 褨薪褋褌懈褌褍虂褑褨褩.
