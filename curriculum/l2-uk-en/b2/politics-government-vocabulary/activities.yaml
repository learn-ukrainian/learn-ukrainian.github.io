- type: quiz
  title: Політичні поняття
  instruction: Оберіть найточніше тлумачення або найдоречніше формулювання.
  items:
    - question: Що найточніше називає слово "повноваження"?
      options:
        - text: офіційно визначене право діяти або ухвалювати рішення
          correct: true
        - text: будь-яку особисту думку посадовця
          correct: false
        - text: емоційну підтримку виборців
          correct: false
        - text: випадкову домовленість у приватній розмові
          correct: false
      explanation: Повноваження пов'язані з правом і процедурою.
    - question: У якому реченні слово "корупція" вжито найвідповідальніше?
      options:
        - text: У процедурі закупівлі виявили ризики корупції, які потребують перевірки.
          correct: true
        - text: Усе це просто корупція, бо мені не подобається рішення.
          correct: false
        - text: Корупція - це будь-яка незручна політика.
          correct: false
        - text: Корупція означає довге обговорення документа.
          correct: false
      explanation: Сильне правове слово потребує факту, ризику або процедури перевірки.
    - question: Яке формулювання найкраще передає нейтральну виборчу дію?
      options:
        - text: Комісія підрахувала голоси й оприлюднила протокол.
          correct: true
        - text: Комісія накрутила результат.
          correct: false
        - text: Усі там щось зробили.
          correct: false
        - text: Вибори були просто дивні.
          correct: false
      explanation: Нейтральний опис називає діяча, дію й документ.
    - question: Що означає "підзвітність" у політичному мовленні?
      options:
        - text: обов'язок пояснювати рішення, витрати й результати
          correct: true
        - text: право не відповідати на запитання
          correct: false
        - text: будь-яке публічне голосування
          correct: false
        - text: короткий допис у соціальній мережі
          correct: false
      explanation: Підзвітність пов'язує владу з контролем і поясненням.
    - question: Яке речення найточніше вживає "санкції"?
      options:
        - text: Партнери запровадили санкції проти посадовців, яких пов'язують із порушенням угоди.
          correct: true
        - text: Учитель поставив санкцію за запізнення.
          correct: false
        - text: Коментар у чаті був дуже санкційний.
          correct: false
        - text: Санкції - це будь-яка критика в новинах.
          correct: false
      explanation: У міжнародній політиці санкції є обмежувальними заходами.
    - question: Коли слово "геополітичний" доречне?
      options:
        - text: коли йдеться про простір, безпеку, вплив і стратегічні інтереси
          correct: true
        - text: коли треба зробити будь-яке речення урочистим
          correct: false
        - text: коли автор не знає, хто ухвалив рішення
          correct: false
        - text: коли йдеться лише про побутову суперечку
          correct: false
      explanation: Геополітичний контекст потребує поясненого масштабу.
    - question: Яке формулювання не говорить від імені всіх?
      options:
        - text: Частина мешканців просить оприлюднити кошторис.
          correct: true
        - text: Народ усе зрозумів.
          correct: false
        - text: Суспільство повністю проти.
          correct: false
        - text: Усі виборці підтримали ідею.
          correct: false
      explanation: Обережне узагальнення називає конкретну групу.
    - question: Що робить політичну оцінку сильнішою?
      options:
        - text: конкретний критерій, джерело або доказ
          correct: true
        - text: більше знаків оклику
          correct: false
        - text: прихований діяч
          correct: false
        - text: заміна всіх дієслів іменниками
          correct: false
      explanation: Оцінка має спиратися на перевірювану підставу.
    - question: Яке речення найточніше передає підзвітність виконавця програми?
      options:
        - text: Виконавець оприлюднив звіт про витрати й досягнуті результати.
          correct: true
        - text: Виконавець якось пояснив, що все нормально.
          correct: false
        - text: Програма просто існує без додаткових питань.
          correct: false
        - text: Громада не повинна бачити жодних документів.
          correct: false
      explanation: Підзвітність потребує звіту, даних і зрозумілих результатів.
    - question: Що найкраще відрізняє законопроєкт від чинного закону?
      options:
        - text: Законопроєкт ще розглядають, а закон уже має встановлений правовий статус.
          correct: true
        - text: Законопроєкт завжди сильніший за конституцію.
          correct: false
        - text: Закон і законопроєкт завжди означають той самий документ.
          correct: false
        - text: Законопроєкт уживають тільки в приватній розмові.
          correct: false
      explanation: Політичний текст має розрізняти етап документа.
