      right: офіційно зафіксована позиція органу
    - left: прозорість
      right: доступність інформації для перевірки
- type: match-up
  title: Регістр і формулювання
  instruction: Поєднайте формулювання з регістром.
  pairs:
    - left: Просимо оприлюднити фінансове обґрунтування.
      right: офіційно-діловий
    - left: Без кошторису громада не може оцінити рішення.
      right: публіцистично-аналітичний
    - left: Нам потрібні цифри, строки й відповідальні.
      right: робочий нейтральний
    - left: Дані не підтверджують заявлений результат.
      right: аналітичний
    - left: Комісія підрахувала голоси.
      right: інформаційний нейтральний
    - left: Це рішення викликає занепокоєння через непрозору процедуру.
      right: публічний критичний
    - left: Уряд затвердив порядок реалізації програми.
      right: офіційно-інформаційний
    - left: Спершу перевірмо джерело.
      right: модераційний
    - left: Автори звернення стверджують про можливі порушення.
      right: обережне передавання чужої позиції
    - left: Суд встановив факт порушення процедури.
      right: правовий висновок
    - left: Потрібен незалежний аудит закупівлі.
      right: контроль і підзвітність
    - left: Сторони підтвердили готовність до переговорів.
      right: дипломатичний стиль
- type: fill-in
  title: Точне слово
  instruction: Заповніть пропуск доречним політичним терміном.
  items:
    - sentence: "____ визначає основи державного устрою й права громадян."
      answer: Конституція
      options:
        - Конституція
        - Агітація
        - Кампанія
        - Коментар
      explanation: Конституція є основним законом держави.
    - sentence: "Орган влади діє лише в межах своїх ____."
      answer: повноважень
      options:
        - повноважень
        - настроїв
        - чуток
        - лайків
      explanation: Повноваження задають правову межу дії.
    - sentence: "____ бюджету допомагає громаді перевірити витрати."
      answer: Прозорість
      options:
        - Прозорість
        - Випадковість
        - Емоційність
        - Закритість
      explanation: Прозорість означає доступність інформації.
    - sentence: "Партнери запровадили ____ у відповідь на порушення угоди."
      answer: санкції
      options:
        - санкції
        - вибори
        - консультації
        - абревіатури
      explanation: Санкції є обмежувальними заходами.
    - sentence: "____ рішення залежить від процедури, довіри й визнання."
      answer: Легітимність
      options:
        - Легітимність
        - Географія
        - Черга
        - Дрібниця
      explanation: Легітимність описує прийнятність і правомірність влади чи рішення.
    - sentence: "____ дає державі змогу самостійно здійснювати владу."
      answer: Суверенітет
      options:
        - Суверенітет
        - Лобіювання
        - Пресреліз
        - Дільниця
      explanation: Суверенітет є ключовим поняттям державності.
    - sentence: "Перед ухваленням рішення громада просить провести публічні ____."
      answer: консультації
      options:
        - консультації
        - санкції
        - диктатури
        - суверенітети
      explanation: Консультації дають учасникам можливість висловити позицію.
    - sentence: "____ може бути відкритим представленням інтересів або непрозорим впливом."
      answer: Лобіювання
      options:
        - Лобіювання
        - Голосування
        - Конституція
        - Дипломатія
      explanation: Лобіювання потребує прозорості й правил.
    - sentence: "____ допомагає державам вести переговори й підтримувати офіційні контакти."
      answer: Дипломатія
      options:
        - Дипломатія
        - Агітація
        - Децентралізація
        - Черга
      explanation: Дипломатія стосується офіційних міжнародних контактів.
    - sentence: "Громадські організації вимагають більшої ____ від виконавців програми."
      answer: підзвітності
      options:
        - підзвітності
        - випадковості
        - мовчанки
        - фамільярності
      explanation: Підзвітність означає пояснення рішень і результатів.
- type: fill-in
  title: Переписування без ярлика
  instruction: Оберіть варіант, який замінює емоційний ярлик відповідальним формулюванням.
  items:
    - sentence: "Замість 'там корупція' краще: У процедурі закупівлі є ____."
      answer: корупційні ризики
      options:
        - корупційні ризики
        - веселі настрої
        - чужі слова
        - географічні деталі
      explanation: Ризик можна назвати до завершення перевірки.
    - sentence: "Замість 'усі проти' краще: ____ мешканців критикує рішення."
      answer: Частина
      options:
        - Частина
        - Усі без винятку
        - Кожен
        - Абсолютно всі
      explanation: Конкретизація групи зменшує маніпулятивне узагальнення.
    - sentence: "Замість 'реформа провалилася' краще: перший етап не досяг заявлених ____."
      answer: показників
      options:
        - показників
        - вигуків
        - чуток
        - жестів
      explanation: Аналітична критика потребує критерію.
    - sentence: "Замість 'вони приховують' краще: орган влади не ____ повний кошторис."
      answer: оприлюднив
      options:
        - оприлюднив
        - прикрасив
        - вигукнув
        - посварив
      explanation: Дієслово називає перевірювану дію.
    - sentence: "Замість 'країни посварилися' краще: між урядами виникла ____."
      answer: напруженість
      options:
        - напруженість
        - тиша
        - розвага
        - побутовість
      explanation: Дипломатичний контекст потребує точнішої назви.
    - sentence: "Замість 'влада все вирішила' краще: уряд ____ порядок реалізації програми."
      answer: затвердив
      options:
        - затвердив
        - прошепотів
        - погортав
        - вигадував
      explanation: Точне дієслово називає офіційну дію.
    - sentence: "Замість 'це перемога' краще: рішення досягло ____ результату для громади."
      answer: вимірюваного
      options:
        - вимірюваного
        - випадкового
        - дивного
        - галасливого
      explanation: Позитивна оцінка теж потребує критерію.
    - sentence: "Замість 'експерти все довели' краще: експерти ____ дані й зробили висновок."
      answer: проаналізували
      options:
        - проаналізували
        - замаскували
        - прогуляли
        - відчули
      explanation: Аналіз даних звучить точніше, ніж загальне "довели".
    - sentence: "Замість 'люди хочуть' краще: учасники консультацій ____ прозорого графіка."
      answer: вимагають
      options:
        - вимагають
        - шумлять
        - вигадують
        - зникають
      explanation: Уточнено групу й дію без надмірного узагальнення.
    - sentence: "Замість 'міжнародники щось сказали' краще: партнери ____ спільну заяву."
      answer: оприлюднили
      options:
        - оприлюднили
        - пошепки сховали
        - образили
        - прикрасили
      explanation: Дипломатичний текст має називати документ і дію.
- type: true-false
  title: Відповідальне політичне мовлення
  instruction: Позначте, чи правильне твердження.
  items:
    - statement: Слово "корупція" варто вживати з доказом, процедурою або обережною рамкою.
      correct: true
      explanation: Це сильний правовий і політичний термін.
    - statement: '"Суспільство вимагає" завжди точніше, ніж "частина мешканців вимагає".'
      correct: false
      explanation: Широке узагальнення може перебільшувати підтримку.
    - statement: Дипломатичний стиль часто використовує обережні формули.
      correct: true
      explanation: Вони допомагають зберегти точність і простір для переговорів.
    - statement: Абревіатуру, незнайому читачеві, краще розшифрувати при першій згадці.
      correct: true
      explanation: Розшифрування зменшує бар'єр для читача.
    - statement: Політична оцінка стає сильнішою, якщо прибрати всі докази.
      correct: false
      explanation: Без доказів оцінка перетворюється на вигук.
    - statement: Слово "геополітичний" доречне лише тоді, коли є просторовий, безпековий або стратегічний контекст.
      correct: true
      explanation: Інакше це слово стає декоративним.
    - statement: Активне речення часто краще показує, хто ухвалив рішення.
      correct: true
      explanation: Названий діяч підсилює прозорість.
    - statement: Партія, уряд, парламент і громадська організація позначають одну й ту саму роль.
      correct: false
      explanation: Це різні учасники політичного процесу.
    - statement: Договір і спільна заява можуть мати різну правову силу.
      correct: true
      explanation: У міжнародній темі статус документа треба називати точно.
    - statement: Підзвітність означає, що виконавець не пояснює витрати й результати.
      correct: false
      explanation: Підзвітність якраз передбачає пояснення дій, витрат і наслідків.
- type: mark-the-words
  title: Ролі й інституції
  instruction: Позначте слова, які називають учасників або інституції політичного процесу.
  text: "Парламент ухвалив законопроєкт, уряд підготував порядок впровадження, комісія перевірила протокол, експерти підготували висновок, громадські організації подали пропозиції, а мешканці попросили оприлюднити фінансове обґрунтування."
  answers:
    - Парламент
    - уряд
    - комісія
    - експерти
    - громадські організації
    - мешканці
- type: error-correction
  title: Нейтральніша політична фраза
  instruction: Виправте речення так, щоб воно було точнішим і відповідальнішим.
  items:
    - sentence: "Влада знову щось мутить із бюджетом."
      error: "щось мутить"
      answer: "не оприлюднила повний кошторис"
      error_type: register
      explanation: Нейтральна версія називає дію, документ і наслідок.
    - sentence: "Ця партія всіх обманула."
      error: "всіх обманула"
      answer: "окремі обіцянки програми не мають фінансового обґрунтування"
      error_type: phrase
      explanation: Виправлення переводить звинувачення в перевірюваний критерій.
    - sentence: "Країни просто посварилися."
      error: "просто посварилися"
      answer: "між урядами виникла напруженість"
      error_type: register
      explanation: Дипломатичний контекст потребує точніших іменників.
    - sentence: "Реформа пішла нормально."
      error: "пішла нормально"
      answer: "перший етап реформи почали впроваджувати за графіком"
      error_type: phrase
      explanation: Уточнено етап, дію й місце.
    - sentence: "Про бюджет там якось незрозуміло."
      error: "якось незрозуміло"
      answer: "Щодо питань бюджету"
      error_type: construction
      explanation: Нормативна конструкція потребує прийменника "щодо" або "з" залежно від контексту.
    - sentence: "Комісія щось зробила після звернення."
      error: "щось зробила"
      answer: "вжила заходів"
      error_type: phrase
      explanation: Нормативна українська формула - "вжити заходів".
    - sentence: "Спостерігачі сказали, що на дільниці були дивні речі."
      error: "дивні речі"
      answer: "процедурні зауваження"
      error_type: register
      explanation: У виборчому контексті потрібно називати тип порушення або зауваження.
    - sentence: "Партія показала класний план без жодних цифр."
      error: "класний план"
      answer: "програму без фінансового обґрунтування"
      error_type: register
      explanation: Оцінне слово варто замінити критерієм, який можна перевірити.
