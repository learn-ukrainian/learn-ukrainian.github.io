version: '1.0'
module: politics-government-vocabulary
level: b2
inline:
  - type: quiz
    title: "Інституції та повноваження"
    instruction: "Оберіть точне слово або формулу для політичного контексту."
    items:
      - question: "Яке слово найточніше називає офіційно визначене право органу діяти?"
        options:
          - text: "повноваження"
            correct: true
          - text: "настрій"
            correct: false
          - text: "гасло"
            correct: false
          - text: "чутка"
            correct: false
        explanation: "Повноваження показують, що орган може робити за процедурою."
      - question: "Що найкраще описує підзвітність?"
        options:
          - text: "обов'язок пояснювати рішення й результати"
            correct: true
          - text: "право не відповідати на запитання"
            correct: false
          - text: "емоційна підтримка виборців"
            correct: false
          - text: "будь-яка публічна реклама"
            correct: false
        explanation: "Підзвітність пов'язана зі звітами, поясненнями й контролем."
      - question: "Яке дієслово точніше за загальне «вирішили»?"
        options:
          - text: "затвердили програму"
            correct: true
          - text: "зробили політику"
            correct: false
          - text: "провели владу"
            correct: false
          - text: "настроїли рішення"
            correct: false
        explanation: "Затвердили програму називає конкретну процедуру."
      - question: "Що означає децентралізація в політичній лексиці?"
        options:
          - text: "передавання частини рішень ближче до громад"
            correct: true
          - text: "повна відмова від державних інституцій"
            correct: false
          - text: "заборона місцевих бюджетів"
            correct: false
          - text: "випадкове голосування без правил"
            correct: false
        explanation: "Децентралізація змінює розподіл відповідальності й ресурсів."
      - question: "Яка фраза є найобережнішою для новини?"
        options:
          - text: "спостерігачі повідомили про процедурні зауваження"
            correct: true
          - text: "усі знають, що вибори були хаосом"
            correct: false
          - text: "влада все приховала"
            correct: false
          - text: "народ однозначно переміг"
            correct: false
        explanation: "Обережна фраза має джерело й тип проблеми."
      - question: "Що найкраще називає простір організацій та ініціатив поза владою?"
        options:
          - text: "громадянське суспільство"
            correct: true
          - text: "кабінет міністрів"
            correct: false
          - text: "виборча дільниця"
            correct: false
          - text: "закритий протокол"
            correct: false
        explanation: "Громадянське суспільство впливає на рішення, але не є органом влади."
      - question: "Який приклад найкраще показує прозорість?"
        options:
          - text: "оприлюднено критерії, дані й звіт"
            correct: true
          - text: "усім сказали просто довіряти"
            correct: false
          - text: "документи сховали до завершення спору"
            correct: false
          - text: "коментарі заборонили"
            correct: false
        explanation: "Прозорість дає можливість перевірити рішення."
      - question: "Яка формула обережна для дипломатичного контексту?"
        options:
          - text: "сторони оприлюднили спільну заяву"
            correct: true
          - text: "країни стали союзом назавжди"
            correct: false
          - text: "усі все остаточно вирішили"
            correct: false
          - text: "саміт автоматично створив договір"
            correct: false
        explanation: "Спільна заява не дорівнює договору або союзу."
      - question: "Яка фраза точніше описує громадянську участь?"
        options:
          - text: "ініціативна група просить провести консультації"
            correct: true
          - text: "люди просто шумлять"
            correct: false
          - text: "усі проти всього"
            correct: false
          - text: "натовп заважає політиці"
            correct: false
        explanation: "Точна фраза називає суб'єкта й дію."
      - question: "Що краще показує етап реформи?"
        options:
          - text: "запущено пілотний сервіс, показники ще оцінюють"
            correct: true
          - text: "реформа все вирішила"
            correct: false
          - text: "система перемогла проблеми"
            correct: false
          - text: "усі питання закрито назавжди"
            correct: false
        explanation: "Етап і статус даних важливіші за гасло."

  - type: match-up
    title: "Хто що робить?"
    instruction: "Поєднайте термін із типовою дією або функцією."
    pairs:
      - left: "парламент"
        right: "розглядає законопроєкти"
      - left: "уряд"
        right: "організовує виконання політики"
      - left: "місцева рада"
        right: "затверджує місцеву програму"
      - left: "виборча комісія"
        right: "організовує голосування й підрахунок"
      - left: "спостерігач"
        right: "фіксує процедурні зауваження"
      - left: "громадська організація"
        right: "оприлюднює моніторинговий звіт"
      - left: "петиція"
        right: "збирає підтримку під вимогою"
      - left: "меморандум"
        right: "фіксує рамкову домовленість або наміри"
      - left: "відкриті дані"
        right: "дають змогу перевірити рішення"
      - left: "ратифікація"
        right: "офіційно затверджує міжнародний договір"

  - type: fill-in
    title: "Лексика виборів і урядування"
    instruction: "Вставте слово, яке завершує речення."
    items:
      - sentence: "Кандидат подав документи для ____."
        answer: "реєстрації"
        options: ["реєстрації", "дезінформації", "санкції", "самовільності"]
        explanation: "Реєстрація є етапом виборчого процесу."
      - sentence: "Партія оприлюднила свою виборчу ____."
        answer: "програму"
        options: ["програму", "дільницю", "комісію", "ратифікацію"]
        explanation: "Програма містить обіцянки й напрям політики."
      - sentence: "Спостерігачі подали зауваження до ____ голосів."
        answer: "підрахунку"
        options: ["підрахунку", "суверенітету", "самітів", "дипломатії"]
        explanation: "Підрахунок голосів є окремим етапом."
      - sentence: "Орган влади має пояснити рішення в межах своєї ____."
        answer: "підзвітності"
        options: ["підзвітності", "агітації", "популярності", "чутки"]
        explanation: "Підзвітність вимагає пояснення результатів."
      - sentence: "Громада просить провести публічні ____ щодо нової схеми руху."
        answer: "консультації"
        options: ["консультації", "бюлетені", "саміт", "диктатуру"]
        explanation: "Консультації дають можливість обговорити проєкт рішення."
      - sentence: "Для прозорості закупівель потрібні відкриті ____."
        answer: "дані"
        options: ["дані", "гасла", "чутки", "емоції"]
        explanation: "Відкриті дані дозволяють перевіряти рішення."
      - sentence: "Міжнародний договір може потребувати ____."
        answer: "ратифікації"
        options: ["ратифікації", "агітації", "дільниці", "популізму"]
        explanation: "Ратифікація є офіційним затвердженням договору."
      - sentence: "Емоційне гасло без механізму часто має ознаки ____."
        answer: "популізму"
        options: ["популізму", "протоколу", "комісії", "суверенітету"]
        explanation: "Популізм спрощує складну проблему до гасла."
      - sentence: "Для перевірки прозорості потрібна публічна ____."
        answer: "звітність"
        options: ["звітність", "емоційність", "таємність", "випадковість"]
        explanation: "Звітність показує рішення й результати."
      - sentence: "Спільна ____ не завжди є юридичним договором."
        answer: "заява"
        options: ["заява", "дільниця", "агітація", "корупція"]
        explanation: "Статус дипломатичного документа треба перевіряти."

  - type: true-false
    title: "Факт чи рамка?"
    instruction: "Визначте, чи твердження є відповідальним для нейтрального політичного тексту."
    items:
      - statement: "«Комісія підрахувала голоси» є нейтральнішою формулою, ніж «комісія намалювала результат»."
        correct: true
        explanation: "Перша фраза називає процедуру; друга додає звинувачення."
      - statement: "«Усі громадяни проти» можна писати без джерела, якщо автор упевнений."
        correct: false
        explanation: "Потрібні дані, джерело або межа узагальнення."
      - statement: "«Партія оприлюднила програму» називає дію без оцінки."
        correct: true
        explanation: "Це процедурний опис."
      - statement: "«Реформа запрацювала» завжди достатньо точна фраза."
        correct: false
        explanation: "Потрібно пояснити етап і показники."
      - statement: "Спільна заява не завжди дорівнює юридичному договору."
        correct: true
        explanation: "Статус документа треба перевіряти."
      - statement: "Популізм можна вживати як синонім до «позиція опонента»."
        correct: false
        explanation: "Популізм має конкретні комунікативні ознаки."
      - statement: "Відкриті дані допомагають перевірити прозорість рішення."
        correct: true
        explanation: "Дані дають матеріал для перевірки."
      - statement: "Слово «влада» завжди достатньо точне для аналітичного тексту."
        correct: false
        explanation: "Часто треба назвати конкретний орган або посадову особу."
      - statement: "Петиція є однією з форм громадянської участі."
        correct: true
        explanation: "Вона збирає підтримку під публічною вимогою."
      - statement: "Меморандум завжди означає ратифікований договір."
        correct: false
        explanation: "Меморандум може бути рамковою домовленістю."

  - type: error-correction
    title: "Нейтралізуйте маніпулятивну рамку"
    instruction: "Виправте фразу так, щоб вона зберегла проблему, але не додавала неперевіреної оцінки."
    items:
      - sentence: "Усі мешканці повністю проти нової програми."
        error: "Усі мешканці повністю проти"
        correction: "частина учасників консультацій заперечує"
        options:
          - "частина учасників консультацій заперечує"
          - "народ однозначно обурений"
          - "усі нормальні люди проти"
          - "громада тотально кипить"
        explanation: "Нейтральна версія має межу й джерело."
      - sentence: "Влада приховує правду про закупівлю."
        error: "приховує правду"
        correction: "ще не оприлюднила повний звіт про закупівлю"
        options:
          - "ще не оприлюднила повний звіт про закупівлю"
          - "точно має таємну схему"
          - "знову всіх обманює"
          - "повністю винна"
        explanation: "Без доказу треба назвати відсутній документ, а не мотив."
      - sentence: "Реформа повністю провалилася."
        error: "повністю провалилася"
        correction: "не досягла двох запланованих показників"
        options:
          - "не досягла двох запланованих показників"
          - "стала катастрофою"
          - "всіх зрадила"
          - "померла як ідея"
        explanation: "Критерій робить оцінку перевірною."
      - sentence: "Кандидат купив любов виборців обіцянками."
        error: "купив любов виборців"
        correction: "використав емоційні обіцянки без фінансового обґрунтування"
        options:
          - "використав емоційні обіцянки без фінансового обґрунтування"
          - "зачарував усіх казками"
          - "зробив людей своїми"
          - "купив усіх словом"
        explanation: "Фраза називає комунікативну техніку й критерій."
      - sentence: "Саміт автоматично вирішив усі проблеми інтеграції."
        error: "автоматично вирішив усі проблеми"
        correction: "завершився спільною заявою про подальші кроки"
        options:
          - "завершився спільною заявою про подальші кроки"
          - "остаточно все закрив"
          - "створив повну перемогу"
          - "зняв усі питання назавжди"
        explanation: "Дипломатична формула має не перебільшувати статус події."
      - sentence: "Лобіювання завжди означає корупцію."
        error: "завжди означає корупцію"
        correction: "може бути легальною адвокацією або ризиком непрозорого впливу"
        options:
          - "може бути легальною адвокацією або ризиком непрозорого впливу"
          - "завжди є темною змовою"
          - "ніколи не має правил"
          - "автоматично кримінальне"
        explanation: "Потрібно розрізняти явище, процедуру й правову оцінку."
      - sentence: "Громадськість просто заважає нормальному управлінню."
        error: "просто заважає"
        correction: "висловлює зауваження до проєкту рішення"
        options:
          - "висловлює зауваження до проєкту рішення"
          - "блокує все без причини"
          - "створює шум"
          - "не розуміє політики"
        explanation: "Нейтральна версія називає дію без знецінення."
      - sentence: "Партнери остаточно вирішили майбутнє України."
        error: "остаточно вирішили майбутнє України"
        correction: "погодили спільну заяву про подальшу підтримку"
        options:
          - "погодили спільну заяву про подальшу підтримку"
          - "зробили Україну пасивним об'єктом"
          - "закрили всі питання"
          - "вирішили все замість українців"
        explanation: "Дипломатичний текст не має стирати суб'єктність України."

  - id: act-6
    type: critical-analysis
    title: "Політичний текст: джерело, дія, рамка"
    instruction: "Проаналізуйте фрагмент і запропонуйте відповідальнішу версію."
    target_text: "У соцмережах пишуть, що влада знову провалила реформу. Орган влади повідомив, що перший етап сервісу запущено у великих містах, а малі громади отримають технічну підтримку після додаткового навчання працівників. Громадська організація просить оприлюднити графік навчань і показники роботи сервісу."
    questions:
      - "Які три джерела або голоси є у фрагменті?"
      - "Де оцінка, а де процедурний факт?"
      - "Які слова треба замінити в нейтральній новині?"
      - "Який запит громадської організації є конкретним?"
    model_answers:
      - "Є голос соцмереж, повідомлення органу влади й позиція громадської організації."
      - "Оцінка - «знову провалила реформу»; процедурні факти - запуск першого етапу у великих містах і майбутня підтримка малих громад."
      - "Нейтральна версія: «Перший етап сервісу запущено у великих містах; малі громади очікують технічної підтримки після навчання працівників. Громадська організація просить оприлюднити графік навчань і показники роботи сервісу»."
      - "Конкретний запит - графік і показники."

workbook:
  - id: wb-reading-civic-policy
    type: reading
    title: "Читання: консультації щодо міської програми"
    source: "Навчальний політичний кейс для B2."
    text: >-
      Міська рада оприлюднила проєкт програми розвитку громадського транспорту й оголосила публічні консультації. У документі передбачено оновлення маршрутів, закупівлю частини електробусів і створення відкритої панелі даних про пасажиропотоки. Громадська організація підтримала ідею відкритих даних, але попросила пояснити критерії вибору маршрутів. Частина мешканців критикує скорочення двох старих маршрутів і просить провести додаткову зустріч у мікрорайоні. Представник ради заявив, що остаточне рішення ухвалюватимуть після аналізу письмових зауважень.
    tasks:
      - "Випишіть інституції й учасників громадянського суспільства."
      - "Назвіть процедурні дії."
      - "Відокремте підтримку, критику й факти."

  - id: wb-essay-civic-society
    type: essay-response
    title: "Есе: громадянське суспільство і відповідальна політична мова"
    source_reading: wb-reading-civic-policy
    instruction: "Напишіть 180-220 слів українською."
    prompt: "Поясніть роль громадянського суспільства в розвитку демократії. Використайте щонайменше десять слів із модуля."
    min_words: 180
    model_answer: |-
      > [!model-answer]
      > Громадянське суспільство допомагає демократії працювати не лише під час виборів. Громадські організації, волонтерські ініціативи, експертні спільноти й активні громадяни можуть аналізувати відкриті дані, подавати звернення, брати участь у консультаціях і вимагати підзвітності. Це не замінює державу або парламент, але створює тиск на прозорість і якість рішень. Відповідальна політична мова тут дуже важлива. Якщо автор пише лише «влада знову все провалила», читач не бачить повноваження, документ, процедуру й критерій оцінки. Краще назвати орган, програму, показники й джерело критики. Демократія потребує конкуренції позицій, але ця конкуренція має спиратися на факти, верховенство права і готовність перевіряти власні твердження.
    rubric:
      - criteria: "Лексика"
        description: "Використано щонайменше десять термінів модуля."
        points: 3
      - criteria: "Аргумент"
        description: "Пояснено роль громадянського суспільства."
        points: 3
      - criteria: "Регістр"
        description: "Факти відділено від оцінок."
        points: 2
      - criteria: "Зв'язність"
        description: "Є вступ, розвиток і висновок."
        points: 2

