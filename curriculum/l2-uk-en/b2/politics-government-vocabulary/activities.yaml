- type: essay-response
  id: politics-government-responsible-comment
  title: Відповідальний політичний коментар
  instruction: Напишіть короткий публічний коментар із чіткою тезою, доказом і нейтральним словником.
  prompt: "Перепишіть емоційну реакцію 'влада знову все приховує' як відповідальний політичний коментар на 150-180 слів. Назвіть інституцію або роль, проблему, потрібний документ, можливий наслідок для довіри та коректну вимогу до підзвітності."
  min_words: 150
  model_answer: "Міська комісія має оприлюднити повний кошторис програми, бо без фінансового обґрунтування мешканці не можуть оцінити витрати й очікуваний результат. Йдеться не про загальне звинувачення, а про конкретну потребу в прозорості: громада має бачити джерела фінансування, календар упровадження, відповідальних виконавців і критерії оцінювання. Якщо ці дані залишаються неповними, довіра до процесу консультацій знижується, навіть коли сама мета програми є корисною. Тому коректна вимога звучить так: просимо орган місцевого самоврядування оприлюднити фінансове обґрунтування, пояснити порядок контролю за витратами й визначити строк публічного звіту. Такий коментар зберігає критичність, але не перетворює припущення на вирок. Він називає інституцію, документ, наслідок і механізм підзвітності."
  rubric:
    - criteria: Точність термінів
      description: У тексті коректно вжито лексику прозорості, підзвітності, інституцій і документів.
      points: 3
    - criteria: Відділення факту від оцінки
      description: Автор не підміняє доказ емоційним ярликом.
      points: 3
    - criteria: Комунікативна доречність
      description: Коментар має публічний тон без образ і без надмірного канцеляриту.
      points: 2
