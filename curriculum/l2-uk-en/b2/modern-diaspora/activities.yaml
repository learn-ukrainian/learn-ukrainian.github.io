version: '1.0'
module: modern-diaspora
level: b2

inline:
  - id: act-1
    type: reading
    title: Статус і причина переїзду
    instruction: Прочитайте фрагмент і визначте, чому загальне слово "виїхали" не достатнє.
    text: >-
      У групі новоприбулих були студентка за обміном, родина з тимчасовим
      захистом, фахівець, який релокувався разом із компанією, і чоловік, що
      повертається до України кожні кілька місяців для волонтерського проєкту.
      Усі вони живуть за кордоном, але їхні права, плани і потреби різні.
    source: Навчальний фрагмент для модуля B2.
    tasks:
      - Які чотири різні ситуації названо у фрагменті?
      - Чому слово "емігранти" не описує всіх однаково точно?
      - Який статус пов'язаний із доступом до послуг і документів?
      - Який приклад показує мережевий зв'язок з Україною?
      - Як переписати перше речення офіційнішим стилем?

  - id: act-2
    type: critical-analysis
    title: Формальна й неформальна громада
    instruction: Поясніть, як різні форми самоорганізації доповнюють одна одну.
    target_text: >-
      Формальна організація має статут, бюджет і відповідальних осіб. Неформальна
      мережа швидко поширює інформацію, зустрічає новоприбулих і знаходить
      перекладача або психологічну підтримку. Сильна громада часто потребує
      обох форматів.
    questions:
      - Які ознаки формальної організації названо?
      - У чому сила неформальної мережі?
      - Чому один формат не завжди замінює інший?
      - Який приклад можна додати зі школи вихідного дня?
      - Як слово "осередок" відрізняється від випадкової групи?
    model_answers:
      - Статут, бюджет і відповідальні особи.
      - Швидкість реакції, контактність і практична допомога.
      - Формальна структура дає стабільність, а мережа швидко реагує на потреби.
      - Наприклад, школа має розклад, але батьківський чат швидко вирішує побутові питання.
      - Осередок має сталість, місце або функцію, а не лише тимчасову присутність.

  - id: act-3
    type: critical-analysis
    title: Мовна стійкість у родині
    instruction: Визначте, які умови роблять українську живою мовою, а не лише символом.
    target_text: >-
      Якщо українська звучить тільки на святі, дитина може сприймати її як
      урочистий символ. Якщо українською пишуть повідомлення, жартують, читають,
      дивляться відео і планують спільні справи, мова стає інструментом життя.
    questions:
      - Який ризик має мова лише для свят?
      - Які щоденні практики названо?
      - Чому помилки не мають бути причиною сорому?
      - Як школа вихідного дня може підтримати родину?
      - Яку роль можуть мати сучасні медіа?
    model_answers:
      - Мова може стати декоративною і віддаленою від щоденного життя.
      - Повідомлення, жарти, читання, відео і планування справ.
      - Помилки є природною частиною багатомовного розвитку.
      - Вона створює ровесницьке середовище, де українська має соціальну функцію.
      - Медіа дають сучасний контент і регулярний контакт із мовою.

  - id: act-4
    type: critical-analysis
    title: Адвокація без гасла
    instruction: Порівняйте загальне гасло і стратегічне повідомлення.
    target_text: >-
      Підтримайте Україну! Підтримайте програму стипендій для українських
      студентів, бо вона дає змогу продовжити навчання, зберегти академічні
      зв'язки й повернути знання до українських університетів.
    questions:
      - Яке речення є гаслом?
      - У другому реченні хто є адресатом підтримки?
      - Які три наслідки підтримки названо?
      - Чому конкретна пропозиція переконливіша?
      - Який доказ або контакт варто додати до такого повідомлення?
    model_answers:
      - Перше речення є загальним гаслом.
      - Українські студенти.
      - Продовження навчання, академічні зв'язки і повернення знань.
      - Адресат розуміє, що саме зміниться після дії.
      - Варто додати умови програми, суму, організацію і контакт відповідальної особи.

workbook:
  - type: match-up
    title: Лексика міграції та громади
    instruction: Поєднайте термін із поясненням.
    pairs:
      - left: діаспора
        right: спільнота людей певного походження, що живе поза історичною батьківщиною
      - left: еміграція
        right: виїзд із країни походження на триваліший час
      - left: імміграція
        right: в'їзд до країни проживання з погляду цієї країни
      - left: репатріація
        right: повернення до країни або землі походження
      - left: інтеграція
        right: участь у житті нового суспільства без обов'язкової втрати ідентичності
      - left: асиміляція
        right: поступова втрата окремої культурної або мовної видимості
      - left: осередок
        right: місце або група, що стабільно організовує спільну діяльність
      - left: статут
        right: документ із правилами роботи організації
      - left: адвокація
        right: організований захист позиції або інтересів перед аудиторією рішень
      - left: грошові перекази
        right: фінансова підтримка, яку люди за кордоном надсилають родині або громаді
      - left: транснаціональна мережа
        right: зв'язок людей та інституцій, що працюють через кордони
      - left: мовна стійкість
        right: здатність підтримувати активне вживання української в різних середовищах

  - type: fill-in
    title: Точні слова про діаспору
    instruction: Уставте слово, яке найточніше завершує речення.
    items:
      - sentence: "Українська ____ у місті організувала школу вихідного дня."
        answer: "громада"
        options: [громада, репатріація, асиміляція, статус]
        explanation: Громада називає організовану спільноту людей.
      - sentence: "Повернення до країни походження називають ____."
        answer: "репатріацією"
        options: [репатріацією, інтеграцією, адвокацією, волонтерством]
        explanation: Репатріація підкреслює повернення, а не виїзд.
      - sentence: "Документ із правилами організації - це ____."
        answer: "статут"
        options: [статут, переказ, імідж, кордон]
        explanation: Статут описує правила, повноваження і процедури.
      - sentence: "Організований захист інтересів України за кордоном - це ____."
        answer: "адвокація"
        options: [адвокація, асиміляція, двомовність, спадщина]
        explanation: Адвокація має ціль, адресата і аргументи.
      - sentence: "Життя між двома мовами часто формує ____."
        answer: "двомовність"
        options: [двомовність, репатріацію, статут, лобіювання]
        explanation: Двомовність означає активне використання двох мов.
      - sentence: "Втрата мовної видимості в новому середовищі може бути формою ____."
        answer: "асиміляції"
        options: [асиміляції, координації, волонтерства, підтримки]
        explanation: Асиміляція описує поступове злиття з домінантним середовищем.
      - sentence: "Мережа суботніх шкіл підтримує культурну ____."
        answer: "спадщину"
        options: [спадщину, заяву, процедуру, перевагу]
        explanation: Спадщина передається через практики, мову і пам'ять.
      - sentence: "Фінансова допомога родині з-за кордону може мати форму грошового ____."
        answer: "переказу"
        options: [переказу, осередку, кордону, статуту]
        explanation: Грошовий переказ є фінансовим зв'язком між країнами.
      - sentence: "Щоденне використання української в родині підтримує мовну ____."
        answer: "стійкість"
        options: [стійкість, заяву, межу, квитанцію]
        explanation: Мовна стійкість залежить від регулярних практик.
      - sentence: "Робота з посадовцями і медіа для конкретного рішення потребує ____."
        answer: "адвокації"
        options: [адвокації, репатріації, асиміляції, ностальгії]
        explanation: Адвокація має адресата, доказ і пропозицію дії.
      - sentence: "Зв'язки між громадами в різних країнах утворюють транснаціональну ____."
        answer: "мережу"
        options: [мережу, втрату, чергу, межу]
        explanation: Транснаціональна мережа працює через кордони.
      - sentence: "Участь у житті нового суспільства без автоматичної втрати мови - це ____."
        answer: "інтеграція"
        options: [інтеграція, асиміляція, репатріація, ізоляція]
        explanation: Інтеграція не тотожна повній асиміляції.

  - type: true-false
    title: Міграційні твердження
    instruction: Позначте, чи твердження відповідає змісту модуля.
    items:
      - statement: "Усі українці за кордоном мають однаковий юридичний статус."
        correct: false
        explanation: Статус залежить від причини переїзду, країни і документів.
      - statement: "Інтеграція може поєднувати участь у новому суспільстві зі збереженням української ідентичності."
        correct: true
        explanation: Інтеграція не обов'язково означає повну асиміляцію.
      - statement: "Школа вихідного дня може бути осередком мовної стійкості."
        correct: true
        explanation: Вона створює середовище, де українська має соціальну функцію.
      - statement: "Адвокація не потребує адресата або доказів."
        correct: false
        explanation: Адвокація має бути стратегічною, адресною і доказовою.
      - statement: "Діаспорна культура охоплює лише фольклорні символи."
        correct: false
        explanation: Вона також включає сучасну культуру, професійні мережі, медіа і громадську участь.
      - statement: "Неформальні мережі можуть швидко допомагати новоприбулим."
        correct: true
        explanation: Саме швидкість і контактність є їхньою перевагою.
      - statement: "Репортаж про діаспору має враховувати етику інтерв'ю."
        correct: true
        explanation: Особливо коли йдеться про досвід війни або вимушеного переїзду.
      - statement: "Повернення знань можливе лише після фізичного переїзду в Україну."
        correct: false
        explanation: Онлайн-курси, консультації і спільні проєкти теж повертають знання.
      - statement: "Історичні громади і новоприбулі можуть мати різні пріоритети."
        correct: true
        explanation: Одні можуть зосереджуватися на спадщині, інші - на практичній адаптації.
      - statement: "Етичне інтерв'ю має пояснювати, де і як буде використано матеріал."
        correct: true
        explanation: Згода, приватність і межі цитування є частиною відповідального репортажу.
      - statement: "Грошові перекази можуть бути економічним зв'язком між діаспорою та родиною в Україні."
        correct: true
        explanation: Перекази показують практичний, а не лише символічний зв'язок.
      - statement: "Транснаціональна мережа існує лише тоді, коли всі учасники живуть в одному місті."
        correct: false
        explanation: Така мережа саме поєднує людей, організації і дії через кордони.

  - type: select
    title: Оберіть точне формулювання
    instruction: Виберіть речення, яке найкраще підходить для B2-аналітики про діаспору.
    items:
      - question: Як краще описати групу українців за кордоном?
        options:
          - text: Група має різні міграційні статуси, професії і плани щодо повернення.
            correct: true
          - text: Усі вони однакові, бо живуть не в Україні.
            correct: false
          - text: Їхній досвід не потребує уточнення.
            correct: false
          - text: Достатньо назвати їх туристами.
            correct: false
      - question: Яке речення найточніше пояснює інтеграцію?
        options:
          - text: Інтеграція означає участь у новому суспільстві й може поєднуватися зі збереженням мови.
            correct: true
          - text: Інтеграція завжди вимагає забути походження.
            correct: false
          - text: Інтеграція неможлива для багатомовної людини.
            correct: false
          - text: Інтеграція є лише адміністративною процедурою.
            correct: false
      - question: Що робить адвокаційне повідомлення сильним?
        options:
          - text: Чітка ціль, адресат, доказ і конкретна дія.
            correct: true
          - text: Максимально загальний заклик без деталей.
            correct: false
          - text: Відсутність джерел і контактів.
            correct: false
          - text: Обіцянка результату без механізму.
            correct: false
      - question: Яке питання доречне для інтерв'ю з представником громади?
        options:
          - text: Якої підтримки найбільше бракує новоприбулим і як громада на це реагує?
            correct: true
          - text: Чому всі мають однаковий досвід?
            correct: false
          - text: Чи можна не пояснювати мету інтерв'ю?
            correct: false
          - text: Які травматичні деталі ви зобов'язані розповісти?
            correct: false
      - question: Як відповідально говорити про діаспорну мову?
        options:
          - text: Розрізняти родинну спадщину, місцевий варіант і літературну норму.
            correct: true
          - text: Висміювати будь-яку відмінність від сучасної норми.
            correct: false
          - text: Заборонити двомовність як явище.
            correct: false
          - text: Вважати помилки доказом відсутності ідентичності.
            correct: false
      - question: Яке речення найкраще описує школу вихідного дня?
        options:
          - text: Це осередок, де українська має соціальну, освітню і культурну функцію.
            correct: true
          - text: Це місце, яке завжди повністю замінює місцеву школу.
            correct: false
          - text: Це лише формальна адміністративна установа.
            correct: false
          - text: Це доказ, що родині не треба працювати з мовою вдома.
            correct: false
      - question: Який висновок найкраще враховує межі прикладу?
        options:
          - text: У цій громаді волонтерська мережа допомогла новоприбулим швидше знайти інформацію.
            correct: true
          - text: Усі громади світу працюють однаково.
            correct: false
          - text: Один приклад доводить загальне правило.
            correct: false
          - text: Висновок не потребує межі або контексту.
            correct: false
      - question: Що робить критику діаспорної організації конструктивною?
        options:
          - text: Вона називає проблему і пропонує прозору процедуру поліпшення.
            correct: true
          - text: Вона лише звинувачує всіх учасників.
            correct: false
          - text: Вона приховує фінансові й організаційні питання.
            correct: false
          - text: Вона забороняє молодшим учасникам висловлюватися.
            correct: false
      - question: Як найкраще описати грошові перекази в аналітичному тексті?
        options:
          - text: Це фінансова практика, яка може підтримувати родини, громади і проєкти в Україні.
            correct: true
          - text: Це доказ, що мова вже не має значення.
            correct: false
          - text: Це лише приватна дія без соціального контексту.
            correct: false
          - text: Це завжди замінює громадську участь.
            correct: false
      - question: Яке речення найточніше пояснює транснаціональну мережу?
        options:
          - text: Вона поєднує людей, інституції і ресурси між кількома країнами.
            correct: true
          - text: Вона можлива лише без цифрових комунікацій.
            correct: false
          - text: Вона завжди скасовує місцеву інтеграцію.
            correct: false
          - text: Вона не має жодного зв'язку з Україною.
            correct: false
      - question: Як варто говорити про конфлікт поколінь у діаспорі?
        options:
          - text: Як про різницю досвідів, мовних практик і очікувань, а не як про провину однієї групи.
            correct: true
          - text: Як про доказ, що громада не може співпрацювати.
            correct: false
          - text: Як про тему, яку треба замовчати.
            correct: false
          - text: Як про проблему без історичного або родинного контексту.
            correct: false
      - question: Яка дія найкраще підтримує мовну стійкість?
        options:
