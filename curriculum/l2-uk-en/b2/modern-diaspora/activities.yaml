    instruction: Напишіть короткий аналіз того, як деталь допомагає показати громаду.
    target_text: >-
      У суботу в невеликій бібліотеці діти повторюють українські назви місяців,
      а батьки поруч обговорюють, де знайти перекладача для шкільної зустрічі.
    questions:
