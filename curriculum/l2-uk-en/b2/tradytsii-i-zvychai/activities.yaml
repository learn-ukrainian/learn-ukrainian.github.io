workbook:
- type: reading
  id: traditions-reading-cycle
  title: 'Читання: традиція як жива практика'
  instruction: Прочитайте текст і дайте відповіді.
  source: Навчальний текст для модуля B2.
  text: У невеликій громаді за кордоном українська суботня школа щороку організовує різдвяну коляду. Діти вчать колядки українською, батьки готують кутю й узвар, а старші учасники пояснюють гостям, чому Святвечір пов'язаний з їжею та пам'яттю про родину. Частину програми перекладають мовою країни проживання, щоб сусіди й друзі могли зрозуміти зміст пісень. Після виступу громада збирає кошти на гуманітарну допомогу Україні. Для частини дітей це перший досвід колядування, тому організатори не вимагають "ідеального" відтворення сільського обряду. Вони пояснюють, що традиція залишається живою тоді, коли її передають, осмислюють і пристосовують до нових умов.
  tasks:
  - Поясніть, чому коляду в діаспорі не названо менш справжньою.
  - Випишіть три елементи, які належать до традиційної практики.
  - Випишіть два елементи, які показують сучасну адаптацію традиції.
  - Знайдіть у тексті віддієслівний іменник і поясніть його значення.
  - Сформулюйте головну думку тексту одним складним реченням.
- type: match-up
  title: Терміни й пояснення
  instruction: Поєднайте слово з точним поясненням.
  pairs:
  - left: обряд
    right: дія з усталеною формою і символічним значенням
  - left: звичай
    right: повторювана соціальна або родинна практика
  - left: кутя
    right: ритуальна страва зі зерна, меду, маку або горіхів
  - left: коровай
    right: весільний хліб, пов'язаний із побажанням достатку
  - left: ревіталізація
    right: оновлення або повернення послабленої традиції
  - left: діаспора
    right: громада людей за межами країни походження
  - left: прикмета
    right: народне пояснення або знак, пов'язаний із майбутньою подією
  - left: оберіг
    right: предмет або символ, якому приписують захисне значення
  - left: рушник
    right: вишитий предмет, який може мати ритуальне значення
  - left: дідух
    right: різдвяний сніп, пов'язаний із пам'яттю про предків
  - left: вертеп
    right: різдвяна вистава або театр із кількома сценами
  - left: День вишиванки
    right: сучасна громадянська традиція видимості української культури
- type: fill-in
  title: Віддієслівні іменники й обрядова лексика
  instruction: Заповніть пропуски найдоречнішими словами.
  items:
  - sentence: Під час ____ діти співають колядки й бажають господарям добра.
    answer: колядування
    options:
    - колядування
    - коровай
    - крашанка
    - поминки
    explanation: Колядування називає процес виконання колядок.
  - sentence: Після ____ родина зібралася на скромний поминальний обід.
    answer: поминок
    options:
    - поминок
    - паски
    - вишиванки
    - дідуха
    explanation: Поминки - pluralia tantum; після чого? після поминок.
  - sentence: До великоднього кошика поклали паску, сіль і кілька ____.
    answer: крашанок
    options:
    - крашанок
    - колядок
    - обжинків
    - звичаїв
    explanation: Крашанка - фарбоване великоднє яйце.
  - sentence: У весільному обряді ____ символізує достаток і благословення.
    answer: коровай
    options:
    - коровай
    - Водохреще
    - забобон
    - посівання
    explanation: Коровай є весільним хлібом із символічним значенням.
  - sentence: У громаді ____ пам'ять загиблих хвилиною мовчання.
    answer: вшановують
    options:
    - вшановують
    - фарбують
    - колядують
    - забобонять
    explanation: Вшановувати пам'ять - нормативна формула.
  - sentence: ____ традицій не означає сліпого копіювання минулого.
    answer: Ревіталізація
    options:
    - Ревіталізація
    - Поріг
    - Кутя
    - Прикмета
    explanation: Ревіталізація - оновлення або повернення практики.
  - sentence: На ____ не кажуть «один», бо це слово вживається як множина.
    answer: хрестини
    options:
    - хрестини
    - паска
    - рушник
    - коровай
    explanation: Хрестини мають граматичну форму множини.
  - sentence: У локальних говорах можуть існувати ____ назви того самого звичаю.
    answer: діалектні
    options:
    - діалектні
    - порожні
    - випадкові
    - однині
    explanation: Діалектні назви пов'язані з місцевим мовленням.
  - sentence: На Святвечір у деяких родинах до кімнати ставлять ____.
    answer: дідух
    options:
    - дідух
    - поріг
    - коровай
    - обжинки
    explanation: Дідух пов'язаний із різдвяним циклом і пам'яттю про предків.
  - sentence: ____ може поєднувати біблійний сюжет і народний гумор.
    answer: Вертеп
    options:
    - Вертеп
    - Поріг
    - Забобон
    - Строк
    explanation: Вертеп - різдвяна вистава або театр.
- type: error-correction
  title: Виправте неточні формулювання
  instruction: Виправте речення так, щоб воно звучало природно й точно.
  items:
  - sentence: Усі українці святкують Різдво абсолютно однаково.
    error: Усі українці святкують Різдво абсолютно однаково
    answer: У багатьох українських родинах Різдво святкують по-різному залежно від регіону, конфесії та родинної традиції
    error_type: register
    options:
    - У багатьох українських родинах Різдво святкують по-різному залежно від регіону, конфесії та родинної традиції
    - Усі українці святкують Різдво ще однаковіше
    - Різдво робиться однаково всіма
    - Українці мусять святкувати Різдво однаково
    explanation: Уникаємо універсального узагальнення.
  - sentence: Вони були на один хрестини.
    error: на один хрестини
    answer: на одних хрестинах
    error_type: phrase
    options:
    - на одних хрестинах
    - на одну хрестину
    - на один хрестини
    - на хрестина
    explanation: Хрестини - pluralia tantum, тому потрібна форма множини.
  - sentence: Під час вінчаня молодята стояли на рушнику.
    error: вінчаня
    answer: вінчання
    error_type: word
    options:
    - вінчання
    - вінчаня
    - вінчане
    - вінчаннямся
    explanation: У слові вінчання пишемо подвоєне нн.
  - sentence: На Україні люди зберігають багато традицій.
    error: На Україні
    answer: В Україні
    error_type: phrase
    options:
    - В Україні
    - На Україні
    - При Україні
    - По Україні
    explanation: Нормативна сучасна форма - в Україні.
  - sentence: Масляна - єдина правильна українська назва цього періоду.
    error: єдина правильна українська назва
    answer: одна з розмовних назв поруч із Масницею, Колодієм і Сиропусним тижнем
    error_type: register
    options:
    - одна з розмовних назв поруч із Масницею, Колодієм і Сиропусним тижнем
    - єдина правильна назва для всіх регіонів
    - не українське слово, яке ніколи не трапляється
    - назва, що скасовує всі місцеві варіанти
    explanation: Потрібне точне й неколоніальне формулювання.
  - sentence: У діаспорі традиції несправжні, бо вони змінені.
    error: традиції несправжні, бо вони змінені
    answer: традиції можуть змінювати форму, але зберігати мову, пам'ять і спільноту
    error_type: register
    options:
    - традиції можуть змінювати форму, але зберігати мову, пам'ять і спільноту
    - традиції завжди несправжні поза Україною
    - традиції не мають значення для діаспори
    - змінені традиції треба забороняти
    explanation: Зміна форми не робить практику несправжньою.
  - sentence: Люди роблять колядки на Різдво.
    error: роблять колядки
    answer: співають колядки
    error_type: phrase
    options:
    - співають колядки
    - роблять колядки
    - мають колядки
    - чинять колядки
    explanation: Колядки співають; процес називається колядування.
  - sentence: Покрова - просто старе сільське свято без сучасного значення.
    error: просто старе сільське свято без сучасного значення
    answer: свято з церковним, історичним і сучасним громадянським вимірами
    error_type: register
    options:
    - свято з церковним, історичним і сучасним громадянським вимірами
    - просто старе сільське свято без значення
    - день, який не має жодної пам'яті
    - тільки музейний предмет
    explanation: Формулювання має відобразити кілька смислових шарів.
- type: select
  title: Оберіть природний варіант
  instruction: Позначте всі варіанти, які відповідають контексту.
  items:
  - question: Нейтральний опис звичаю.
    min_correct: 2
    options:
    - text: У багатьох родинах на стіл подають кутю.
      correct: true
    - text: У частині громад зберігся звичай колядування.
      correct: true
    - text: Абсолютно всі завжди їдять кутю однаково.
      correct: false
    - text: Українці мусять робити кутю.
      correct: false
    explanation: Варіанти визнають поширеність без надмірного узагальнення.
  - question: Pluralia tantum форми.
    min_correct: 2
    options:
    - text: хрестини
      correct: true
    - text: поминки
      correct: true
    - text: паска
      correct: false
    - text: рушник
      correct: false
    explanation: Хрестини й поминки граматично поводяться як множина.
  - question: Книжніші варіанти до дієслівного опису.
    min_correct: 2
    options:
    - text: під час щедрування
      correct: true
    - text: традиція колядування
      correct: true
    - text: у щедрий
      correct: false
    - text: на щедрівка
      correct: false
    explanation: Віддієслівний іменник дає книжний опис процесу.
  - question: Слова, пов'язані з оновленням або передаванням традиції.
    min_correct: 2
    options:
    - text: ревіталізація
      correct: true
    - text: відроджувати
      correct: true
    - text: поріг
      correct: false
    - text: коровай
      correct: false
    explanation: Ревіталізація й відроджувати називають оновлення практики.
  - question: Точні речення про діалектні назви.
    min_correct: 2
    options:
    - text: Локальна назва залежить від громади й мовного середовища.
      correct: true
    - text: У фольклорних записах можуть бути місцеві варіанти.
      correct: true
    - text: Діалектні слова завжди неправильні.
      correct: false
    - text: Регіональні назви не мають значення.
      correct: false
    explanation: Діалектна різноманітність є частиною культури.
  - question: Коректні формули пам'яті.
    min_correct: 2
    options:
    - text: ушановувати пам'ять
      correct: true
    - text: вшанувати загиблих хвилиною мовчання
      correct: true
    - text: робити пам'ять
      correct: false
    - text: святкувати втрату
      correct: false
    explanation: Ушановувати пам'ять і вшанувати загиблих - нормативні сполуки.
  - question: Коректні порівняння з іншою культурою.
    min_correct: 2
    options:
    - text: В обох культурах є зимові пісенні обходи, але українське колядування має власні тексти й календарні межі.
      correct: true
    - text: Великодні яйця відомі в багатьох культурах, проте українська писанка має власні орнаменти й техніки.
      correct: true
    - text: В інших країнах немає справжніх традицій.
      correct: false
    - text: Усі слов'яни святкують однаково.
      correct: false
    explanation: Порівняння має бути конкретним і не знецінювати інших.
  - question: Коректні безособові конструкції.
    min_correct: 2
    options:
    - text: Паску освячують перед великоднім сніданком.
      correct: true
    - text: На стіл подають кутю.
      correct: true
    - text: Паска освячують перед сніданком.
      correct: false
    - text: Паску освячувати людина.
      correct: false
    explanation: Безособові речення природно описують загальну практику.
- type: true-false
  title: Правда чи ні?
  instruction: Позначте твердження як правильні або неправильні.
  items:
  - statement: Традиції можуть змінювати форму й залишатися значущими.
    correct: true
    explanation: Жива традиція пристосовується до нових умов.
  - statement: Слово хрестини треба вживати як звичайний іменник однини.
    correct: false
    explanation: Хрестини мають граматичну форму множини.
  - statement: Колядування - віддієслівний іменник на -ння.
    correct: true
    explanation: Він називає процес виконання колядок.
  - statement: Діаспорна традиція автоматично менш справжня.
    correct: false
    explanation: Вона може виконувати інші, але важливі культурні функції.
  - statement: Регіональні відмінності слід описувати без стереотипів.
    correct: true
    explanation: Треба називати конкретні практики, а не карикатури.
  - statement: Забобони варто описувати тільки з насмішкою.
    correct: false
    explanation: Краще пояснювати їхню культурну або жартівливу функцію.
  - statement: Коровай у весільному контексті може символізувати достаток.
    correct: true
    explanation: Це поширене символічне пояснення.
  - statement: Фраза «усі українці святкують однаково» є точним академічним описом.
    correct: false
    explanation: Вона ігнорує регіональні, родинні й конфесійні відмінності.
  - statement: Вертеп може поєднувати релігійний сюжет і народні сценки.
    correct: true
    explanation: У різдвяній традиції вертеп часто має кілька шарів.
  - statement: Ревіталізація завжди означає точне копіювання кожної деталі минулого.
    correct: false
    explanation: Ревіталізація відбувається в сучасних умовах і може змінювати форму.
- type: group-sort
  title: Розподіліть приклади за типом
  instruction: Перетягніть приклади до відповідної групи.
  groups:
  - name: Календарні свята
    items:
    - Святвечір
    - Великдень
    - Покрова
    - Зелені свята
  - name: Родинні обряди
    items:
    - хрестини
    - сватання
    - вінчання
    - поминки
  - name: Символічні предмети або страви
    items:
    - кутя
    - коровай
    - рушник
    - писанка
  - name: Сучасні форми збереження
    items:
    - цифровий архів родинних фото
    - благодійна коляда
    - майстер-клас із писанкарства
    - шкільний проєкт про громаду
- type: quiz
  title: Переклад як вибір природної фрази
  instruction: Оберіть природний український переклад.
  items:
  - question: During caroling, people sing carols and wish the hosts well.
    options:
    - text: Під час колядування люди співають колядки й бажають господарям добра.
      correct: true
    - text: Під час короваю люди роблять колядки й бажають хату.
      correct: false
    - text: На хрестинах люди фарбують колядки.
      correct: false
    - text: У щедрівці люди освячують поріг.
      correct: false
    explanation: Колядування - процес виконання колядок.
  - question: At baptisms, relatives and godparents gather.
    options:
    - text: На хрестинах збираються родичі й хрещені батьки.
      correct: true
    - text: На один хрестини збирається родичі.
      correct: false
    - text: У пасці збирають хрещених батьків.
      correct: false
    - text: Після короваю збирається один хрестини.
      correct: false
    explanation: Хрестини вимагають множинної форми.
  - question: The community honors the memory of fallen defenders.
    options:
    - text: Громада вшановує пам'ять загиблих захисників.
      correct: true
    - text: Громада робить пам'ять упалих оборон.
      correct: false
    - text: Громада святкує пам'ять захисників.
      correct: false
    - text: Громада має пам'яті загиблих оборонців.
      correct: false
    explanation: Ушановувати пам'ять - природна українська сполука.
  - question: Revitalization of traditions does not mean copying the past mechanically.
    options:
    - text: Ревіталізація традицій не означає механічного копіювання минулого.
      correct: true
