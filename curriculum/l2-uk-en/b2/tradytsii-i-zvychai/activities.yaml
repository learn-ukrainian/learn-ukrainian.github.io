version: '1.0'
module: tradytsii-i-zvychai
level: b2
inline:
  - type: select
    title: "Повага без узагальнення"
    instruction: "Позначте формулювання, які доречно описують традиції на рівні B2."
    items:
      - question: "Ви описуєте Святвечір."
        min_correct: 2
        options:
          - text: "У багатьох родинах готують кутю, але набір страв може різнитися."
            correct: true
          - text: "Усі українці завжди роблять абсолютно однаково."
            correct: false
          - text: "У моїй родині цей звичай пов'язаний із пам'яттю про бабусю."
            correct: true
          - text: "Хто робить інакше, той не знає традиції."
            correct: false
        explanation: "B2-опис уточнює межі досвіду."
      - question: "Ви пояснюєте регіональну назву."
        min_correct: 2
        options:
          - text: "У цьому селі вживають місцеву назву; у стандартному описі я поясню її."
            correct: true
          - text: "Діалектні назви завжди неправильні."
            correct: false
          - text: "Цей варіант є частиною локальної пам'яті."
            correct: true
          - text: "Правильна традиція існує тільки в одному регіоні."
            correct: false
        explanation: "Локальна назва може співіснувати зі стандартним поясненням."
      - question: "Ви говорите про сучасну зміну."
        min_correct: 2
        options:
          - text: "Онлайн-формат змінює простір традиції, але не обов'язково скасовує спільну дію."
            correct: true
          - text: "Якщо щось змінилося, це вже не традиція."
            correct: false
          - text: "Міська майстерня писанкарства може бути формою ревіталізації."
            correct: true
          - text: "Традиції мають існувати тільки так, як у минулому."
            correct: false
        explanation: "Зміна може бути адаптацією або ревіталізацією."
      - question: "Ви порівнюєте з іншою культурою."
        min_correct: 2
        options:
          - text: "Обидві традиції використовують ритуальну їжу, але мають різний календар."
            correct: true
          - text: "Наші традиції глибші, ніж їхні."
            correct: false
          - text: "У моєму досвіді ця практика менш поширена, але треба уточнити локальний контекст."
            correct: true
          - text: "Якщо я не знаю аналога, його не існує."
            correct: false
        explanation: "Порівняння має бути описовим, а не зверхнім."
      - question: "Ви описуєте День вишиванки."
        min_correct: 2
        options:
          - text: "Це сучасна громадська традиція з видимим символом і щорічним повторенням."
            correct: true
          - text: "Це не традиція, бо вона не середньовічна."
            correct: false
          - text: "Для частини людей це спосіб підтримати мову й ідентичність."
            correct: true
          - text: "Одяг автоматично пояснює всю культуру."
            correct: false
        explanation: "Сучасна повторювана практика теж може стати традицією."
      - question: "Ви говорите про діаспору."
        min_correct: 2
        options:
          - text: "Діаспорна громада може зберігати практику й водночас адаптувати її до нового середовища."
            correct: true
          - text: "За кордоном традиція автоматично несправжня."
            correct: false
          - text: "Для дітей діаспори майстерня може бути мовним і спільнотним простором."
            correct: true
          - text: "Діаспора не змінює традицій ніколи."
            correct: false
        explanation: "Діаспорні практики мають власну динаміку."
      - question: "Ви пишете про символіку."
        min_correct: 2
        options:
          - text: "У цій родинній історії рушник пов'язаний із весіллям бабусі."
            correct: true
          - text: "Кожен символ завжди має лише одне значення."
            correct: false
          - text: "У поясненні майстрині цей знак пов'язаний із захистом."
            correct: true
          - text: "Символіку можна вигадати без контексту."
            correct: false
        explanation: "Символіка потребує джерела або конкретного контексту."
      - question: "Ви формулюєте висновок."
        min_correct: 2
        options:
          - text: "Традиція може одночасно зберігати пам'ять і реагувати на сучасні потреби."
            correct: true
          - text: "Справжня традиція не має жодного зв'язку із сучасністю."
            correct: false
          - text: "Варіативність не обов'язково означає втрату."
            correct: true
          - text: "Одна версія має скасувати всі інші."
            correct: false
        explanation: "B2-висновок визнає складність."
  - type: group-sort
    title: "Ритуальна лексика"
    instruction: "Розподіліть слова за основним контекстом уживання."
    groups:
      - name: "Різдвяний і зимовий цикл"
        items:
          - "кутя"
          - "дідух"
          - "колядка"
          - "щедрівка"
          - "вертеп"
      - name: "Великодній і весняний цикл"
        items:
          - "паска"
          - "крашанка"
          - "писанка"
          - "гаївка"
          - "веснянка"
      - name: "Родинні та громадські обряди"
        items:
          - "коровай"
          - "сватання"
          - "вінчання"
          - "хрестини"
          - "обжинки"
  - type: match-up
    title: "Поняття і контекст"
    instruction: "Поєднайте слово з обережним поясненням."
    pairs:
      - left: "традиція"
        right: "повторювана практика, що передає значення або пам'ять"
      - left: "звичай"
        right: "звична дія спільноти або родини"
      - left: "обряд"
        right: "символічна послідовність дій"
      - left: "ритуал"
        right: "дія з особливим значенням у спільноті"
      - left: "спадщина"
        right: "культурна пам'ять, яку передають і переосмислюють"
      - left: "ревіталізація"
        right: "повернення практики до активного життя"
      - left: "варіативність"
        right: "наявність кількох локальних або родинних версій"
      - left: "діаспора"
        right: "громада за межами країни походження"
      - left: "символіка"
        right: "система значень предметів, дій або кольорів"
      - left: "стереотип"
        right: "спрощене уявлення, яке стирає реальну складність"
  - type: fill-in
    title: "Обрядова лексика в контексті"
    instruction: "Вставте слово, яке найкраще завершує речення."
    items:
      - sentence: "На Святвечір у багатьох родинах готують ____."
        answer: "кутю"
        options: ["кутю", "коровай", "гаївку", "обжинки"]
        explanation: "Кутя пов'язана зі Святвечором."
      - sentence: "____ - це яйце з орнаментом, а крашанка зазвичай просто пофарбована."
        answer: "Писанка"
        options: ["Писанка", "Кутя", "Вертеп", "Поминки"]
        explanation: "Писанка має орнамент."
      - sentence: "Весільний ____ може символізувати благословення родини."
        answer: "коровай"
        options: ["коровай", "дідух", "вертеп", "колядка"]
        explanation: "Коровай належить до весільної традиції."
      - sentence: "Діти співають ____ під час різдвяного обходу."
        answer: "колядки"
        options: ["колядки", "паски", "рушники", "поминки"]
        explanation: "Колядки - різдвяні пісні."
      - sentence: "Повернення забутої практики до життя називають ____."
        answer: "ревіталізацією"
        options: ["ревіталізацією", "стереотипом", "діаспорою", "реквізитом"]
        explanation: "Ревіталізація - оживлення практики."
      - sentence: "Різні локальні версії звичаю показують культурну ____."
        answer: "варіативність"
        options: ["варіативність", "одноманітність", "помилку", "заборону"]
        explanation: "Варіативність - наявність кількох версій."
      - sentence: "Українська громада за кордоном є частиною ____."
        answer: "діаспори"
        options: ["діаспори", "обжинків", "коровай", "прикмети"]
        explanation: "Діаспора - спільнота за межами країни."
      - sentence: "____ мовчання може бути громадянським ритуалом пам'яті."
        answer: "Хвилина"
        options: ["Хвилина", "Каша", "Сукня", "Крамниця"]
        explanation: "Хвилина мовчання - сучасний ритуал пам'яті."
      - sentence: "У стандартному тексті діалектну назву варто ____."
        answer: "пояснити"
        options: ["пояснити", "висміяти", "заборонити", "приховати"]
        explanation: "Пояснення зберігає повагу й ясність."
      - sentence: "Порівнюючи традиції, краще описувати функції, а не створювати ____."
        answer: "ієрархію"
        options: ["ієрархію", "контекст", "пояснення", "приклад"]
        explanation: "Порівняння не має бути зверхнім."
  - type: error-correction
    title: "Приберіть стереотип або неточність"
    instruction: "Виправте фразу так, щоб вона була точнішою й поважнішою."
    items:
      - sentence: "Усі українці завжди готують абсолютно однакові 12 страв."
        error: "Усі українці завжди"
        correction: "У багатьох родинах"
        explanation: "Треба уникати повного узагальнення."
      - sentence: "Справжні традиції існують тільки в селах."
        error: "тільки в селах"
        correction: "також у містах, музеях, школах і діаспорі"
        explanation: "Традиції живуть у різних середовищах."
      - sentence: "Діалектна назва неправильна, бо її немає в моєму словнику."
        error: "неправильна"
        correction: "може бути локальною; у стандартному тексті її треба пояснити"
        explanation: "Локальний варіант не слід автоматично знецінювати."
      - sentence: "Якщо традиція змінилася, її вже зіпсовано."
        error: "зіпсовано"
        correction: "вона могла адаптуватися або отримати нову функцію"
        explanation: "Зміна не завжди означає втрату."
      - sentence: "Наші традиції кращі, ніж традиції інших країн."
        error: "кращі"
        correction: "мають інші функції, символи й історичні контексти"
        explanation: "Порівняння має бути описовим."
      - sentence: "Писанка - це просто прикольна прикраса."
        error: "просто прикольна прикраса"
        correction: "обрядовий або мистецький предмет із символікою"
        explanation: "Розмовне знецінення не пасує до B2-опису."
      - sentence: "День вишиванки не традиція, бо він сучасний."
        error: "бо він сучасний"
        correction: "хоч він сучасний, він має щорічне повторення і символічну функцію"
        explanation: "Сучасна практика може стати традиційною."
      - sentence: "Діаспора лише копіює традиції без змін."
        error: "лише копіює"
        correction: "може зберігати, адаптувати й навчати традицій"
        explanation: "Діаспорна практика має власний контекст."
workbook:
  - type: reading
    id: traditions-reading
    title: "Читання: річний цикл українських свят"
    instruction: "Прочитайте текст про річний цикл і дайте відповіді щодо ключових понять."
    source: "Навчальний уривок для модуля B2."
    text: >-
      У шкільному культурному центрі підготували річну програму українських свят. Узимку діти вивчатимуть Святвечір, Різдво, Маланку, Водохреще й колядування; навесні порівняють Масляну, Великдень, Зелені свята, паску, крашанку й писанку; улітку поговорять про Купала без романтизації небезпечних практик; восени розглянуть обжинки, Покрову й сучасні дні пам'яті. Організатори наголосили, що календар не однаковий для всіх родин: на нього впливають регіон, конфесія, міграція, війна, діаспора й особиста історія. Тому кожне заняття починається з формули: "у цій громаді", "за родинною розповіддю", "сьогодні ця практика може означати".
    tasks:
      - Випишіть чотири частини річного циклу, які згадано в тексті.
      - Поясніть, чому автори програми уникають формули "усі українці завжди".
      - Знайдіть у тексті приклад сучасного або громадянського переосмислення традиції.
  - type: true-false
    title: "Правда чи неправда: традиції"
    instruction: "Оцініть твердження."
    items:
      - statement: "Традиція може змінювати форму й залишатися значущою."
        correct: true
        explanation: "Зміна може бути адаптацією."
      - statement: "Регіональна варіативність автоматично означає помилку."
        correct: false
        explanation: "Варіативність є частиною культурного досвіду."
      - statement: "Обрядова лексика потребує контексту, а не лише перекладу."
        correct: true
        explanation: "Слова називають дії, предмети й значення."
      - statement: "Діаспорні практики завжди несправжні."
        correct: false
        explanation: "Діаспора може зберігати й адаптувати традиції."
      - statement: "Символ має однакове значення в усіх родинах і регіонах."
        correct: false
        explanation: "Символіку треба пояснювати в контексті."
      - statement: "Колядування може мати волонтерську функцію."
        correct: true
        explanation: "Сучасна громада може поєднувати пісню і збір коштів."
      - statement: "Міські традиції менш вартісні тільки тому, що вони міські."
        correct: false
        explanation: "Місце практики саме по собі не знецінює її."
      - statement: "Слово свято ширше за конкретний обряд."
        correct: true
        explanation: "Свято може містити багато звичаїв і обрядів."
      - statement: "Порівняння культур має бути описовим, а не зверхнім."
        correct: true
        explanation: "Мета - зіставити функції й контексти."
      - statement: "Фраза усі українці завжди є безпечною для академічного опису."
        correct: false
        explanation: "Вона стирає різноманітність."
  - type: critical-analysis
    id: traditions-analysis
    title: "Аналіз зв'язку: річний цикл і сучасна практика"
    target_text: "Річний цикл не є музейним списком дат. Святвечір, Великдень, Покрова або День вишиванки отримують значення через конкретну громаду: родина може берегти страву, школа може організувати майстерню, діаспора може створити онлайн-зустріч, а волонтери можуть перетворити колядування на збір допомоги."
    questions:
      - Як у тексті пов'язані календарне свято, громада й сучасна функція?
      - Які слова допомагають уникнути стереотипу про незмінну традицію?
      - Наведіть власний приклад, де традиція змінює форму, але не втрачає значення.
    model_answers:
      - 'Текст показує, що дата сама по собі не пояснює традицію: значення виникає в родині, школі, діаспорі або волонтерській спільноті.'
      - 'Допомагають формули конкретизації: "конкретна громада", "може", "родина", "діаспора", "волонтери".'
      - Наприклад, колядування може перейти з обходу хат у шкільний концерт або онлайн-збір, але зберегти побажання, пісню, пам'ять і взаємодопомогу.
  - type: fill-in
    title: "Сучасний опис традицій"
    instruction: "Вставте слово або формулу."
    items:
      - sentence: "Не варто писати ____ українці завжди."
        answer: "усі"
        options: ["усі", "деякі", "частина", "окремі"]
        explanation: "Повне узагальнення небезпечне."
      - sentence: "У ____ родинах цей звичай пов'язаний із пам'яттю про предків."
        answer: "багатьох"
        options: ["багатьох", "жодних", "випадкових", "чужих"]
        explanation: "Багатьох лишає місце для варіативності."
      - sentence: "____ може означати повернення практики до активного життя."
        answer: "Ревіталізація"
        options: ["Ревіталізація", "Стереотип", "Заборона", "Плутанина"]
        explanation: "Ревіталізація - оживлення практики."
      - sentence: "У ____ громаді традиція може підтримувати мову дітей."
        answer: "діаспорній"
        options: ["діаспорній", "канцелярській", "юридичній", "випадковій"]
        explanation: "Діаспорна громада живе за кордоном."
      - sentence: "Різні версії показують культурну ____."
        answer: "варіативність"
        options: ["варіативність", "помилку", "одноманітність", "заборону"]
        explanation: "Варіативність не дорівнює помилці."
      - sentence: "У цьому описі символіку треба ____ контекстом."
        answer: "підтвердити"
        options: ["підтвердити", "знецінити", "замовчати", "висміяти"]
        explanation: "Символіка має спиратися на контекст."
      - sentence: "____ - це символічна послідовність дій."
        answer: "Обряд"
        options: ["Обряд", "Слоган", "Протокол", "Реквізит"]
        explanation: "Обряд має послідовність і значення."
      - sentence: "Хвилина мовчання є сучасним ритуалом ____."
        answer: "пам'яті"
