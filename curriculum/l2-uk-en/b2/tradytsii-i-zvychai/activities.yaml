- type: critical-analysis
  id: traditions-critical-analysis
  title: Критичний аналіз традиції
  instruction: Проаналізуйте короткий опис і відредагуйте його.
  target_text: 'Українці завжди святкують весілля однаково: наречену викупляють, усі їдять коровай, а старі правила треба просто повторювати.'
  questions:
  - Які універсальні узагальнення роблять це речення неточним?
  - Як можна описати коровай без твердження, що всі весілля однакові?
  - Як сучасні пари можуть переосмислювати окремі елементи обряду?
  model_answers:
  - Слова завжди, однаково й усі створюють хибне враження, що українське весілля має один сценарій для всіх регіонів і родин.
  - 'Краще написати: у традиційному весільному обряді коровай може символізувати достаток і благословення, але сучасні весілля використовують цей елемент по-різному.'
  - Сучасні пари можуть залишити коровай як символ, змінити жарти про викуп або відмовитися від елементів, які не відповідають їхньому уявленню про рівність.
  focus_points:
  - універсальні узагальнення
  - регіональна різноманітність
  - сучасне переосмислення
  - етична уважність
- type: essay-response
  id: traditions-community-essay
  title: Моя традиція або традиція громади
  instruction: Напишіть коротке есе.
  prompt: Напишіть 150-180 слів про одну традицію вашої родини, міста, регіону або діаспорної громади. Поясніть її функцію, назвіть один символічний предмет або страву, опишіть одну зміну в сучасному житті. Використайте один віддієслівний іменник на -ння, одну форму pluralia tantum і одну безособову конструкцію.
  min_words: 150
  model_answer: У моїй громаді щороку організовують благодійне колядування. Діти й дорослі співають колядки, а перед виступом пояснюють гостям, що кутя на Святвечір пов'язана з родинною пам'яттю. Після концерту збирають кошти на підтримку України. На хрестинах і родинних святах старші люди також нагадують дітям про українські слова й пісні. Для мене ця традиція важлива, бо вона повторює минуле й створює спільноту в сучасному місті. У громаді вшановують пам'ять загиблих, тому святковий настрій поєднується з відповідальністю.
  rubric:
  - criteria: Конкретність
    description: Є конкретна традиція, а не загальна тема.
    points: 2
  - criteria: Символіка
    description: Пояснено функцію, символічний предмет або страву.
    points: 2
  - criteria: Граматика
    description: Використано -ння, pluralia tantum і безособову конструкцію.
    points: 2
  - criteria: Точність
    description: Немає фрази на зразок «усі завжди роблять однаково».
    points: 2
