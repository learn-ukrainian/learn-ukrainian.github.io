- id: wb-critical-nature
  type: critical-analysis
  title: Перепишіть погодний заголовок
  target_text: "Заголовок: «Над університетом згущуються хмари». У статті йдеться лише про перенесення однієї зустрічі на наступний тиждень."
  questions:
  - Чи відповідає образ масштабу події?
  - Який нейтральний заголовок був би точнішим?
  - Коли вислів "хмари згущуються" був би доречним?
  model_answers:
  - "Ні, образ загрози завеликий для перенесення однієї зустрічі."
  - "Точніше: **Зустріч університетської ради перенесено на наступний тиждень.**"
  - "Вислів був би доречним, якби було кілька ознак серйозної загрози: фінансова криза, відставки, аудит, протести."
- id: wb-essay-nature
  type: essay-response
  title: Природний образ і факт
  instruction: Напишіть 150-180 слів, у яких природнича ідіома підтримана конкретним фактом.
  prompt: Оберіть одну ідіому та покажіть, як після образу додати доказ.
  min_words: 150
  model_answer: >-
    > [!model-answer]
    > Вислів **хмари згущуються** доречний лише тоді, коли загроза справді наростає. Наприклад: "Над проєктом згущуються хмари: фінансування не затверджено, двоє координаторів звільнилися, а аудит відклав погодження". Тут образ підтриманий трьома фактами. Якщо сказати лише "хмари згущуються", читач отримає атмосферу, але не зрозуміє причини. У нейтральному звіті можна написати: "проєкт має три ризики: фінансування, кадрову нестачу й затримку аудиту". Ідіома робить текст виразним, але доказ робить його відповідальним.
  rubric:
  - criteria: Ідіома
    description: Обрано природничий фразеологізм.
    points: 3
  - criteria: Доказ
    description: Після образу наведено конкретні факти.
    points: 4
  - criteria: Нейтральна версія
    description: Є безобразна редакція.
    points: 3
