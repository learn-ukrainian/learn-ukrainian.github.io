- type: fill-in
  title: Стійкі компоненти
  instruction: Заповніть пропуски компонентами природничих ідіом.
  items:
  - sentence: "Він набрав у рот ____ і не відповідав."
    answer: води
    options:
    - води
    - вогню
    - землі
    - диму
    explanation: Усталена форма - "набрати в рот води".
  - sentence: "Після вибачення камінь з ____ впав."
    answer: душі
    options:
    - душі
    - неба
    - поля
    - кореня
    explanation: Вислів означає полегшення.
  - sentence: "Не варто шукати ____ в полі."
    answer: вітра
    options:
    - вітра
    - плоду
    - каменя
    - зірки
    explanation: Ідіома описує марний пошук.
  - sentence: "Це стало каменем ____ для переговорів."
    answer: спотикання
    options:
    - спотикання
    - очищення
    - згущення
    - коріння
    explanation: '"Камінь спотикання" - перешкода.'
  - sentence: "Він не хапає ____ з неба, але працює стабільно."
    answer: зірок
    options:
    - зірок
    - хмар
    - вогнів
    - плодів
    explanation: Вислів описує виняткові здібності або амбіції.
  - sentence: "Сумніви розвіялися як ____ після перевірки."
    answer: дим
    options:
    - дим
    - камінь
    - ліс
    - корінь
    explanation: Ідіома описує швидке зникнення.
  - sentence: "Це рішення стало як ____ на голову."
    answer: сніг
    options:
    - сніг
    - дощ
    - вогонь
    - плід
    explanation: Вислів означає несподіванку.
  - sentence: "Не кидай обіцянок на ____."
    answer: вітер
    options:
    - вітер
    - воду
    - камінь
    - небо
    explanation: Так кажуть про безвідповідальні слова.
  - sentence: "Команда пройшла ____ і воду."
    answer: вогонь
    options:
    - вогонь
    - хмари
    - поле
    - плоди
    explanation: Вислів означає пережити випробування.
  - sentence: "Проблему не можна вирвати з ____ одним наказом."
    answer: коренем
    options:
    - коренем
    - димом
    - громом
    - вітром
    explanation: Ідіома означає радикально усунути причину.
