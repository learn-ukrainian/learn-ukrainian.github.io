  - words:
    - Космонім
    - пов'язаний
    - із
    - небом
    - зорями
    - або
    - космосом
    answer: Космонім пов'язаний із небом зорями або космосом
  - words:
    - Стихія
    - створює
    - відчуття
    - ризику
    - руху
    - або
    - сили
    answer: Стихія створює відчуття ризику руху або сили
  - words:
    - Ландшафт
    - може
    - стати
    - моделлю
    - життєвої
    - ситуації
    answer: Ландшафт може стати моделлю життєвої ситуації
  - words:
    - Орієнтир
    - допомагає
    - пояснити
    - напрям
    - у
    - метафорі
    answer: Орієнтир допомагає пояснити напрям у метафорі
  - words:
    - Мінливість
    - часто
    - передають
    - погодні
    - образи
    - тексту
    answer: Мінливість часто передають погодні образи тексту
  - words:
    - Очищення
    - може
    - символізувати
    - вогонь
    - після
    - випробування
    answer: Очищення може символізувати вогонь після випробування
  - words:
    - Скороминущість
    - сумніву
    - передає
    - образ
    - диму
    - у
    - тексті
    answer: Скороминущість сумніву передає образ диму у тексті
- id: act-4
  type: critical-analysis
  title: Метафора чи доказ?
  target_text: "Автор пише: «Над реформою згущуються хмари, а старі проблеми пустили коріння». Далі він не називає жодного ризику, процедури або прикладу."
  questions:
  - Які природничі ідіоми використано?
  - Чого бракує для аналітичного тексту?
  - Як переписати речення з доказом?
  model_answers:
  - "Використано **хмари згущуються** для загрози та **пустити коріння** для закріпленої проблеми."
  - "Бракує конкретних ризиків, процедур, прикладів і причинного зв'язку."
  - "Можлива редакція: **Реформа має три ризики: незатверджене фінансування, брак виконавців і опір установ; ці проблеми діють ще з попереднього етапу.**"
- id: act-5
  type: essay-response
  title: Природна ідіома в трьох жанрах
  instruction: Напишіть 150-180 слів про одну природничу ідіому у розмовному, публіцистичному й нейтральному жанрі.
  prompt: Поясніть образ, переносне значення, регістр і межу доречного вживання.
  min_words: 150
  model_answer: >-
    > [!model-answer]
    > Вислів **грати з вогнем** означає ризикувати небезпечно. У розмові можна сказати: "Ти граєш з вогнем, якщо відкриваєш файл без перевірки". У публіцистиці цей вислів драматизує ситуацію: "Місто грає з вогнем, відкладаючи ремонт мосту". У нейтральному звіті краще написати: "відкладання ремонту підвищує ризик аварії". Образ вогню сильний, бо натякає на швидке поширення небезпеки. Межа така: якщо ризик не доведено, ідіома буде перебільшенням. Тому після неї треба назвати конкретну загрозу.
  rubric:
  - criteria: Образ
    description: Пояснено природний образ і переносне значення.
    points: 3
  - criteria: Жанри
    description: Є три регістрові варіанти.
    points: 3
  - criteria: Межа
    description: Названо ризик перебільшення або шаблонності.
    points: 2
  - criteria: Мова
    description: Текст зв'язний і природний.
    points: 2
