inline:
- type: match-up
  title: Стихія і значення
  instruction: Поєднайте природничу ідіому з переносним значенням.
  pairs:
  - left: як у воду опущений
    right: пригнічений або сумний
  - left: вийти сухим із води
    right: уникнути відповідальності або наслідків
  - left: набрати в рот води
    right: мовчати й не відповідати
  - left: мутити воду
    right: навмисно заплутувати ситуацію
  - left: грати з вогнем
    right: ризикувати небезпечно
  - left: підливати олії у вогонь
    right: загострювати конфлікт
  - left: втратити ґрунт під ногами
    right: втратити стабільність
  - left: камінь спотикання
    right: головна перешкода
  - left: кинути слова на вітер
    right: говорити без відповідальності
  - left: шукати вітра в полі
    right: марно шукати того, хто зник
- type: fill-in
  title: Доберіть природний образ
  instruction: Заповніть пропуски потрібними компонентами ідіом.
  items:
  - sentence: "Після критики він ходив як у ____ опущений."
    answer: воду
    options:
    - воду
    - вогонь
    - камінь
    - вітер
    explanation: Ідіома описує пригнічений настрій.
  - sentence: "Він знову вийшов сухим із ____."
    answer: води
    options:
    - води
    - землі
    - хмар
    - коріння
    explanation: Вислів означає уникнути наслідків.
  - sentence: "Не треба підливати ____ у вогонь під час конфлікту."
    answer: олії
    options:
    - олії
    - води
    - піску
    - снігу
    explanation: Усталена форма - "підливати олії у вогонь".
  - sentence: "Головним ____ спотикання стала процедура закупівлі."
    answer: каменем
    options:
    - каменем
    - вітром
    - дощем
    - коренем
    explanation: '"Камінь спотикання" - головна перешкода.'
  - sentence: "Після переїзду родина поступово пустила ____."
    answer: коріння
    options:
    - коріння
    - хмари
    - вогонь
    - воду
    explanation: '"Пустити коріння" означає закріпитися.'
  - sentence: "Не кидай слова на ____."
    answer: вітер
    options:
    - вітер
    - землю
    - камінь
    - небо
    explanation: Вислів означає говорити без відповідальності.
  - sentence: "Новина була як ____ серед ясного неба."
    answer: грім
    options:
    - грім
    - корінь
    - плід
    - дим
    explanation: Ідіома описує несподіванку.
  - sentence: "Над проєктом почали ____ хмари."
    answer: згущуватися
    options:
    - згущуватися
    - пускати
    - холонути
    - пожинати
    explanation: '"Хмари згущуються" означає наростання загрози.'
  - sentence: "Команда вже пожинає ____ власних рішень."
    answer: плоди
    options:
    - плоди
    - вітри
    - камені
    - хмари
    explanation: '"Пожинати плоди" означає отримувати наслідки.'
  - sentence: "Сумнів розвіявся як ____."
    answer: дим
    options:
    - дим
    - земля
    - ліс
    - вода
    explanation: Вислів описує зникнення ілюзії або сумніву.
- type: unjumble
