  - id: workbook-5
    type: essay-response
    title: "М'яка критика без втрати позиції"
    prompt: >-
      Напишіть 120-160 слів як відповідь редактора авторові короткого аналітичного тексту. Попросіть уточнити одне джерело, запропонуйте одну зміну структури та сформулюйте одну гіпотетичну умову через якби. Використайте щонайменше чотири форми з би/б.
    rubric:
      - criteria: "Умовні форми"
        description: "Є щонайменше чотири коректні форми з би/б."
        points: 4
      - criteria: "Складна умова"
        description: "Є одна конструкція якби... то або якби без то з чітким наслідком."
        points: 3
      - criteria: "Регістр"
        description: "Прохання і порада звучать ввічливо, але позиція редактора не зникає."
        points: 3
    model_answer: |-
      > [!model-answer]
      > Я хотів би уточнити одне джерело до статистики в другому абзаці, бо без нього висновок звучав би надто категорично. Чи могли б ви додати посилання або коротко пояснити, звідки взято цифру? Я б також радив перенести приклад про громаду ближче до початку: тоді читач швидше зрозумів би, чому проблема практична, а не лише теоретична. Якби в тексті з'явився один конкретний випадок і таблиця з даними, аргумент став би переконливішим. Загалом пропозиція має сильну ідею, але була б точнішою, якби чіткіше розділити факт, припущення й авторську оцінку.
