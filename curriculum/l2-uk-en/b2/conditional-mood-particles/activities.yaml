      right: "офіційна ввічливість"
    - left: "Варто було б зазначити джерело."
      right: "обережна редакторська рекомендація"
    - left: "Якби вибірка була більшою..."
      right: "наукова гіпотеза"

- type: group-sort
  title: "Розподіліть умовні конструкції"
  instruction: "Розкладіть приклади за функцією."
  groups:
    - name: "ввічливе прохання"
      items:
        - "Чи могли б ви повторити?"
        - "Я хотів би уточнити."
        - "Ми були б вдячні за відповідь."
        - "Чи не могли б ви надіслати файл?"
    - name: "порада"
      items:
        - "Я б на вашому місці зачекав."
        - "Я б радила перевірити джерело."
        - "Ми б запропонували почати з даних."
        - "Я б не поспішав із висновком."
    - name: "умова й наслідок"
      items:
        - "Якби були розрахунки, рішення підтримали б."
        - "Коли б погода дозволила, зустріч провели б надворі."
        - "Аби була згода, угоду підписали б швидше."
        - "Якби команда підготувалася, дискусія була б коротшою."
    - name: "стала формула"
      items:
        - "Хоч би що сталося."
        - "Якби ж то."
        - "Бодай би."
        - "Що б там не було."

