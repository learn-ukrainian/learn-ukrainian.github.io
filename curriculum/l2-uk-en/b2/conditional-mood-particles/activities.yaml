- type: reading
  id: conditional-particles-reading
  title: "Читання: лист із м'якими проханнями"
  instruction: "Прочитайте уривок і визначте, як умовний спосіб змінює тон листа."
  source: "Навчальний уривок для модуля B2."
  text: >-
    Якби ми отримали підтвердження до четверга, то підготували б матеріали
    раніше. Чи могли б ви уточнити список учасників? Ми хотіли б запросити
    також представників громади. Я б на вашому місці додала коротке пояснення
    про бюджет, аби читачі краще зрозуміли пропозицію. Хоч би що вирішила
    робоча група, відповідь треба сформулювати спокійно.
  tasks:
    - "Випишіть три форми з часткою би/б."
    - "Поясніть, де частка пом'якшує прохання."
    - "Знайдіть складне умовне речення з якби."
    - "Перепишіть одне речення так, щоб воно звучало пряміше."

- type: fill-in
  title: "Доберіть частку би або б"
  instruction: "Заповніть пропуск часткою, яка звучить природно й пишеться окремо."
  items:
    - sentence: "Він прочитав ____ цей звіт уважніше."
      answer: "би"
      options: ["би", "б", "же", "но"]
      explanation: "Після приголосного в минулій формі природно звучить би."
    - sentence: "Вона пояснила ____ це рішення спокійніше."
      answer: "б"
      options: ["б", "би", "же", "но"]
      explanation: "Після голосного природніша коротка частка б."
    - sentence: "Ми хотіли ____ отримати відповідь до середи."
      answer: "б"
      options: ["б", "би", "ж", "то"]
      explanation: "Хотіли закінчується голосним, тому нейтрально звучить б."
    - sentence: "Я поставив ____ це питання на зборах."
      answer: "би"
      options: ["би", "б", "же", "то"]
      explanation: "Після приголосного в формі поставив уживаємо би."
    - sentence: "Чи могли ____ ви повторити адресу?"
      answer: "б"
      options: ["б", "би", "же", "то"]
      explanation: "Могли б - усталена ввічлива форма."
    - sentence: "Якби команда мала час, вона перевірила ____ джерела."
      answer: "б"
      options: ["б", "би", "же", "но"]
      explanation: "Перевірила закінчується голосним."
    - sentence: "Я ____ на вашому місці не поспішав."
      answer: "б"
      options: ["б", "би", "же", "но"]
      explanation: "Після займенника я природно звучить б."
    - sentence: "Сказати ____ це прямо було б ризиковано."
      answer: "б"
      options: ["б", "би", "же", "то"]
      explanation: "Після інфінітива на -и коротка частка звучить природно."
    - sentence: "Коли ____ громада підтримала пропозицію, центр відкрили б восени."
      answer: "б"
      options: ["б", "би", "же", "но"]
      explanation: "У сполученні коли б частка коротка."
    - sentence: "Бодай ____ ця розмова допомогла знайти спільне рішення."
      answer: "би"
      options: ["би", "б", "же", "но"]
      explanation: "Бодай би - стале побажальне сполучення."

- type: select
  title: "Оберіть правильні пояснення"
  instruction: "Позначте всі твердження, які точно описують речення."
  items:
    - question: "Речення: «Я хотів би поставити запитання»."
      min_correct: 2
      options:
        - text: "Дієслово має форму минулого часу."
          correct: true
        - text: "Частка написана окремо."
          correct: true
        - text: "Це наказовий спосіб."
          correct: false
        - text: "Правильно тільки хотівби."
          correct: false
      explanation: "Хотів би - нормативна умовна форма."
    - question: "Речення: «Вона сказала б інакше»."
      min_correct: 2
      options:
        - text: "Після голосного природна частка б."
          correct: true
        - text: "Форма може позначати гіпотетичну дію."
          correct: true
        - text: "Частка має писатися разом."
          correct: false
        - text: "Це форма теперішнього часу."
          correct: false
      explanation: "Сказала б - минула форма плюс окрема частка."
    - question: "Речення: «Якби я знав, допоміг би»."
      min_correct: 2
      options:
        - text: "Якби є сполучником умови."
          correct: true
        - text: "Допоміг би називає наслідок."
          correct: true
        - text: "Якби треба писати як би."
          correct: false
        - text: "Речення описує встановлений факт."
          correct: false
      explanation: "Умова подана як гіпотетична."
    - question: "Речення: «Як би ви пояснили це правило?»."
      min_correct: 2
      options:
        - text: "Як питає про спосіб дії."
          correct: true
        - text: "Як і би пишуться окремо."
          correct: true
        - text: "Тут потрібен сполучник якби."
          correct: false
        - text: "Речення не має питання про спосіб."
          correct: false
      explanation: "Як би окремо, коли йдеться про спосіб пояснення."
    - question: "Речення: «Чи могли б ви повторити адресу?»."
      min_correct: 2
      options:
        - text: "Умовний спосіб пом'якшує прохання."
          correct: true
        - text: "Могли б написано окремо."
          correct: true
        - text: "Речення є грубим наказом."
          correct: false
        - text: "Потрібно писати моглиби."
          correct: false
      explanation: "Могли б - ввічлива умовна конструкція."
    - question: "Речення: «Я б на вашому місці перевірив джерело»."
      min_correct: 2
      options:
        - text: "Це м'яка порада."
          correct: true
        - text: "Частка стоїть після займенника."
          correct: true
        - text: "Це майбутній час."
          correct: false
        - text: "Форма перевірив не може бути умовною."
          correct: false
      explanation: "Я б на вашому місці - типова формула поради."
    - question: "Речення: «Хоч би що сталося, не панікуймо»."
      min_correct: 2
      options:
        - text: "Хоч би що є сталим сполученням."
          correct: true
        - text: "Фраза означає за будь-яких обставин."
          correct: true
        - text: "Би треба приєднати до хоч."
          correct: false
        - text: "Речення не має умовного відтінку."
          correct: false
      explanation: "Хоч би що працює як стійка умовна формула."
    - question: "Речення: «Вона хотіла би уточнити деталь»."
      min_correct: 2
      options:
        - text: "Форма можлива в повільному або наголошеному мовленні."
          correct: true
        - text: "Нейтральніше часто звучить хотіла б."
          correct: true
        - text: "Хотілаби треба писати разом."
          correct: false
        - text: "Тут немає частки."
          correct: false
      explanation: "Милозвучність схиляє до короткої б після голосного."

- type: error-correction
  title: "Виправте частку або форму"
  instruction: "Знайдіть помилку й виберіть нормативний варіант."
  items:
    - sentence: "Я хотівби уточнити деталь."
      error: "хотівби"
      correction: "хотів би"
      options: ["хотів би", "хотівби", "хочу би", "хотіти б"]
      error_type: "construction"
      explanation: "Частка пишеться окремо."
    - sentence: "Вона сказалаби інакше."
      error: "сказалаби"
      correction: "сказала б"
      options: ["сказала б", "сказалаби", "сказала би-то", "скаже б"]
      error_type: "construction"
      explanation: "Після голосного природно б, окремо."
    - sentence: "Я би хочу запитати."
      error: "хочу"
      correction: "хотів"
      options: ["хотів", "хочу", "хотіти", "хотітиму"]
      error_type: "word"
      explanation: "Умовний спосіб потребує минулої форми."
    - sentence: "Як би я мав час, допоміг би."
      error: "Як би"
      correction: "Якби"
      options: ["Якби", "Як би", "Якже", "Як то"]
      error_type: "phrase"
      explanation: "Тут потрібен сполучник умови."
    - sentence: "Якби ви пояснили це правило?"
      error: "Якби"
      correction: "Як би"
      options: ["Як би", "Якби", "Якщо", "Аби"]
      error_type: "phrase"
      explanation: "Питання про спосіб потребує окремого написання."
    - sentence: "Він б підтримав ідею."
      error: "б"
      correction: "би"
      options: ["би", "б", "же", "но"]
      error_type: "word"
      explanation: "Після приголосного в він природніше би."
    - sentence: "Ми могли би прийти."
      error: "би"
      correction: "б"
      options: ["б", "би", "же", "но"]
      error_type: "word"
      explanation: "Після голосного в могли нейтральніше б."
    - sentence: "Чи не можете б повторити?"
      error: "можете"
      correction: "могли"
      options: ["могли", "можете", "могти", "можна"]
      error_type: "word"
      explanation: "Ввічлива умовна форма: чи не могли б."
    - sentence: "Комісія підтримають б пропозицію."
      error: "підтримають"
      correction: "підтримала"
      options: ["підтримала", "підтримають", "підтримати", "підтримуючи"]
      error_type: "word"
      explanation: "Умовний спосіб вимагає минулої форми."
    - sentence: "Якщо б громада підтримала, центр відкрили б."
      error: "Якщо б"
      correction: "Якби"
      options: ["Якби", "Якщо б", "Як би", "Коли"]
      error_type: "phrase"
      explanation: "У відшліфованому стилі для нереальної умови краще якби."

- type: unjumble
  title: "Складіть умовні речення"
  instruction: "Розташуйте слова так, щоб утворити природне речення."
  items:
    - words: ["Я", "хотів", "би", "уточнити", "одну", "деталь"]
      answer: "Я хотів би уточнити одну деталь."
    - words: ["Вона", "сказала", "б", "це", "спокійніше", "сьогодні"]
      answer: "Вона сказала б це спокійніше сьогодні."
    - words: ["Якби", "ми", "мали", "час", "то", "перевірили", "б", "джерела"]
      answer: "Якби ми мали час, то перевірили б джерела."
    - words: ["Чи", "могли", "б", "ви", "повторити", "адресу"]
      answer: "Чи могли б ви повторити адресу?"
    - words: ["Я", "б", "у", "цій", "ситуації", "зачекав"]
      answer: "Я б у цій ситуації зачекав."
    - words: ["Бодай", "би", "ця", "зустріч", "дала", "результат"]
      answer: "Бодай би ця зустріч дала результат."
    - words: ["Хоч", "би", "що", "сталося", "ми", "відповімо", "спокійно"]
      answer: "Хоч би що сталося, ми відповімо спокійно."
    - words: ["Коли", "б", "команда", "знала", "ризики", "вона", "підготувалася", "б"]
      answer: "Коли б команда знала ризики, вона підготувалася б."
    - words: ["Було", "б", "корисно", "обговорити", "це", "на", "зборах"]
      answer: "Було б корисно обговорити це на зборах."
    - words: ["Як", "би", "ви", "сформулювали", "таку", "гіпотезу"]
      answer: "Як би ви сформулювали таку гіпотезу?"

