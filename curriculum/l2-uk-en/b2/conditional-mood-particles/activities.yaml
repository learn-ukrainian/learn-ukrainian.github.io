- type: essay-response
  id: conditional-particles-response
  title: "Письмова відповідь: умова, тон і відповідальність"
  instruction: "Напишіть короткий службовий коментар із двома умовними конструкціями."
  prompt: >-
    Уявіть, що робоча група обговорює спірне рішення. Поясніть, за яких умов
    ви підтримали б пропозицію, і сформулюйте одну ввічливу пораду для команди.
  min_words: 150
  model_answer: |-
    Я підтримав би пропозицію, якби робоча група показала відкритий кошторис і
    пояснила, хто відповідатиме за виконання кожного етапу. Без цих даних
    рішення виглядає поспішним, хоча сама ідея може бути корисною для громади.
    Чи могли б автори проєкту додати коротку таблицю з термінами, джерелами
    фінансування й очікуваними результатами? Я б також на їхньому місці
    передбачив окреме обговорення для мешканців, яких зміни торкнуться
    найпершими. Тоді підтримка не була б формальною: учасники бачили б умови,
    ризики й відповідальних осіб. Умовний спосіб тут допомагає говорити
    спокійно: він не відкидає пропозицію, а чітко називає умови, за яких вона
    могла б стати переконливою.
  rubric:
    - criteria: "Граматика"
      description: "Є щонайменше дві нормативні форми умовного способу з окремою часткою."
      points: 2
    - criteria: "Логіка"
      description: "Умова й наслідок сформульовані прозоро."
      points: 2
    - criteria: "Реєстр"
      description: "Тон службовий, ввічливий, без надмірної розмитості."
      points: 1
  peer_review_guidelines: "Перевірте, чи частка би/б написана окремо і чи порада не звучить як наказ."
