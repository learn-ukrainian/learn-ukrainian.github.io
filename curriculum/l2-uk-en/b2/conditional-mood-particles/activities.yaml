version: '1.0'
module: conditional-mood-particles
level: b2
inline:
  - type: select
    title: "Що робить частка би/б?"
    instruction: "Позначте всі твердження, які правильно пояснюють форму або комунікативний ефект речення."
    items:
      - question: "«Я хотів би уточнити одну деталь»."
        min_correct: 2
        options:
          - text: "Дієслово має форму минулого часу."
            correct: true
          - text: "Частка пишеться окремо."
            correct: true
          - text: "Це прямий наказ."
            correct: false
          - text: "Нормативно писати хотівби разом."
            correct: false
        explanation: "Умовний спосіб твориться минулою формою та окремою часткою."
      - question: "«Вона сказала б це спокійніше»."
        min_correct: 2
        options:
          - text: "Коротка частка б стоїть після голосного."
            correct: true
          - text: "Речення називає можливу, а не фактичну дію."
            correct: true
          - text: "Форма сказала б є майбутнім часом."
            correct: false
          - text: "Частку треба перенести всередину дієслова."
            correct: false
        explanation: "Сказала б зберігає минулу форму, але передає умовність."
      - question: "«Я б на вашому місці перевірив джерело»."
        min_correct: 2
        options:
          - text: "Це м'яка порада."
            correct: true
          - text: "Частка відділена від дієслова для фокусування позиції мовця."
            correct: true
          - text: "Так можна писати тільки в художньому стилі."
            correct: false
          - text: "Форма перевірив не може входити до умовного способу."
            correct: false
        explanation: "Рухлива частка може стояти після займенника, якщо речення звучить природно."
      - question: "«Якби команда мала більше даних, висновок був би точнішим»."
        min_correct: 2
        options:
          - text: "Перша частина задає умову."
            correct: true
          - text: "Друга частина називає наслідок."
            correct: true
          - text: "Якби тут треба писати окремо як би."
            correct: false
          - text: "Речення описує доконаний факт."
            correct: false
        explanation: "Якби як сполучник вводить умову, а був би називає можливий результат."
      - question: "«Чи могли б ви надіслати оновлену таблицю?»"
        min_correct: 2
        options:
          - text: "Умовний спосіб пом'якшує прохання."
            correct: true
          - text: "Фраза доречна в службовому листі."
            correct: true
          - text: "Це груба вимога."
            correct: false
          - text: "Частка має писатися разом із могли."
            correct: false
        explanation: "Могли б ви - типова формула ввічливого запиту."
      - question: "«Хоч би що сталося, звіт треба подати вчасно»."
        min_correct: 2
        options:
          - text: "Хоч би що є сталою умовною формулою."
            correct: true
          - text: "Фраза означає за будь-яких обставин."
            correct: true
          - text: "Би треба вилучити, бо тут немає дієслова минулого часу."
            correct: false
          - text: "Речення означає тільки минулу подію."
            correct: false
        explanation: "Сталий зворот має умовно-допустове значення."
      - question: "«Було б корисно додати приклад»."
        min_correct: 2
        options:
          - text: "Форма було б пом'якшує рекомендацію."
            correct: true
          - text: "Речення оцінює можливу користь."
            correct: true
          - text: "Це наказовий спосіб."
            correct: false
          - text: "Частку треба писати разом."
            correct: false
        explanation: "Було б корисно - ввічлива оцінна формула."
      - question: "«Результат міг би змінитися за інших умов»."
        min_correct: 2
        options:
          - text: "Це обережна гіпотеза."
            correct: true
          - text: "Умова названа прийменниковою групою."
            correct: true
          - text: "Фраза стверджує доведений факт."
            correct: false
          - text: "Міг би треба замінити на може би."
            correct: false
        explanation: "Міг би відділяє припущення від факту."

  - type: fill-in
    title: "Доберіть би або б"
    instruction: "Виберіть частку, яка звучить природно в наведеному контексті. Пам'ятайте, що частка пишеться окремо."
    items:
      - sentence: "Я хотів ____ поставити уточнювальне запитання."
        answer: "би"
        options: ["би", "б", "же", "но"]
        explanation: "Після приголосного в хотів природна повна частка би."
      - sentence: "Вона відповіла ____ інакше, якби мала більше часу."
        answer: "б"
        options: ["б", "би", "то", "ж"]
        explanation: "Після голосного у відповіла природна коротка частка б."
      - sentence: "Ми підготували ____ коротшу версію для оголошення."
        answer: "б"
        options: ["б", "би", "ж", "же"]
        explanation: "Підготували б: після голосного доречна коротка частка."
      - sentence: "Редактор додав ____ примітку до таблиці."
        answer: "би"
        options: ["би", "б", "же", "хай"]
        explanation: "Додав закінчується на приголосний, тому повна частка легша для вимови."
      - sentence: "Коли ____ ви мали доступ до архіву, перевірили б дату."
        answer: "б"
        options: ["б", "би", "же", "то"]
        explanation: "У сполученні коли б коротка частка є нейтральною."
      - sentence: "Бодай ____ ця розмова допомогла знайти спільне рішення."
        answer: "би"
        options: ["би", "б", "ж", "то"]
        explanation: "Бодай би - стале побажальне сполучення."
      - sentence: "Це було ____ переконливіше з конкретним прикладом."
        answer: "б"
        options: ["б", "би", "но", "ж"]
        explanation: "Було б - регулярна умовна форма після голосного."
      - sentence: "Він порадив ____ не поспішати з висновком."
        answer: "би"
        options: ["би", "б", "же", "то"]
        explanation: "Порадив би звучить природно після приголосного."
      - sentence: "Як ____ ви пояснили цю зміну читачам?"
        answer: "би"
        options: ["би", "б", "то", "хай"]
        explanation: "Як би у питанні про спосіб дії пишеться окремо."
      - sentence: "Якби автор додав джерело, теза стала ____ сильнішою."
        answer: "б"
        options: ["б", "би", "же", "но"]
        explanation: "Стала б: після голосного уживаємо коротку частку."

  - type: match-up
    title: "Умова, наслідок, тон"
    instruction: "Поєднайте конструкцію з її основною функцією."
    pairs:
      - left: "якби команда мала більше даних"
        right: "умова"
      - left: "висновок був би точнішим"
        right: "наслідок"
      - left: "чи могли б ви уточнити"
        right: "ввічливе прохання"
      - left: "я б на вашому місці перевірив джерело"
        right: "м'яка порада"
      - left: "бодай би все минуло спокійно"
        right: "побажання"
      - left: "хоч би що сталося"
        right: "допустова умова"
      - left: "як би ви сформулювали відповідь?"
        right: "питання про спосіб дії"
      - left: "якби ми знали результат"
        right: "сполучник умови"
      - left: "ми підтримали б пропозицію за однієї умови"
        right: "обережна згода"
      - left: "це могло б означати іншу тенденцію"
        right: "наукове припущення"

  - type: error-correction
    title: "Виправте частку або умовну форму"
    instruction: "Знайдіть помилку і виберіть нормативний варіант."
    items:
      - sentence: "Я хотівби уточнити одну деталь."
        error: "хотівби"
        correction: "хотів би"
        options: ["хотів би", "хотівби", "хочу би", "хотіти б"]
        explanation: "Частка би пишеться окремо від дієслова."
      - sentence: "Вона сказалаби це спокійніше."
        error: "сказалаби"
        correction: "сказала б"
        options: ["сказала б", "сказалаби", "сказала би-то", "скаже б"]
        explanation: "Після голосного природна коротка частка б, окремо."
      - sentence: "Як би ми мали час, то перевірили б джерела."
        error: "Як би"
        correction: "Якби"
        options: ["Якби", "Як би", "Як же", "Як-то"]
        explanation: "Тут потрібен сполучник умови якби."
      - sentence: "Якби автор додав джерело, теза стане б переконливішою."
        error: "стане б"
        correction: "стала б"
        options: ["стала б", "стане б", "стати б", "становить би"]
        explanation: "Умовний спосіб вимагає минулої форми: стала б."
      - sentence: "Чи можете б ви надіслати таблицю?"
        error: "можете б"
        correction: "могли б"
        options: ["могли б", "можете б", "моглиби", "можна б ви"]
        explanation: "Ввічливе прохання має форму могли б."
      - sentence: "Бодай б ця поїздка була спокійною."
        error: "б"
        correction: "би"
        options: ["би", "б", "же", "то"]
        explanation: "Стале побажальне сполучення: бодай би."
      - sentence: "Я б радив би не поспішати."
        error: "б ... би"
        correction: "Я б радив не поспішати"
        options: ["Я б радив не поспішати", "Я б радив би не поспішати", "Я радити б не поспішати", "Я раджу би не поспішати"]
        explanation: "Не дублюйте частку в одній простій конструкції."
      - sentence: "Коли би ми отримали відповідь, то повідомимо б групу."
        error: "повідомимо б"
        correction: "повідомили б"
        options: ["повідомили б", "повідомимо б", "повідомляємо б", "повідомити б"]
        explanation: "Наслідок в умовному способі має минулу форму."
      - sentence: "Вона хотілаб поставити питання."
        error: "хотілаб"
        correction: "хотіла б"
        options: ["хотіла б", "хотілаб", "хоче б", "хотіла би-то"]
        explanation: "Частка пишеться окремо; після голосного нейтральна форма б."
      - sentence: "Якби дані були відкриті, дослідники мають би кращі підстави."
        error: "мають би"
        correction: "мали б"
        options: ["мали б", "мають би", "мати б", "матимуть би"]
        explanation: "Умовний спосіб потребує форми минулого часу: мали б."

  - id: act-5
    type: essay-response
    title: "Сформулюйте умовну позицію"
    prompt: >-
      Напишіть 90-120 слів як короткий редакторський коментар. Використайте одну конструкцію якби, одну форму ввічливого прохання та одну м'яку пораду з би/б.
    model_answer: |-
      > [!model-answer]
      > Я хотів би уточнити джерело до другої цифри, бо без нього висновок звучить надто категорично. Якби автор додав посилання й короткий приклад, читачі краще зрозуміли б логіку аргументу. Чи могли б ви також перенести пояснення про методику перед таблицею? Я б радив не прибирати саму тезу, а зробити її обережнішою: це могло б бути не остаточне твердження, а гіпотеза, яку підтверджують наведені дані.
    rubric:
      - criteria: "Форми"
        description: "Є якби, ввічливе прохання і м'яка порада з би/б."
        points: 4
      - criteria: "Тон"
        description: "Коментар звучить професійно й не перетворюється на наказ."
        points: 3
      - criteria: "Зміст"
        description: "Є конкретна редакторська умова або пропозиція."
        points: 3

workbook:
  - type: unjumble
    title: "Складіть умовне речення"
    instruction: "Розташуйте слова так, щоб утворити природне речення з умовним способом."
    items:
      - words: ["Я", "хотів", "би", "уточнити", "одну", "деталь"]
        answer: "Я хотів би уточнити одну деталь."
      - words: ["Вона", "сказала", "б", "це", "спокійніше", "на", "нараді"]
        answer: "Вона сказала б це спокійніше на нараді."
      - words: ["Якби", "ми", "мали", "час", "перевірили", "б", "джерела"]
        answer: "Якби ми мали час, перевірили б джерела."
      - words: ["Чи", "могли", "б", "ви", "надіслати", "оновлену", "таблицю"]
        answer: "Чи могли б ви надіслати оновлену таблицю?"
      - words: ["Я", "б", "на", "вашому", "місці", "додав", "приклад"]
        answer: "Я б на вашому місці додав приклад."
      - words: ["Бодай", "би", "зустріч", "пройшла", "спокійно", "для", "всіх"]
        answer: "Бодай би зустріч пройшла спокійно для всіх."
      - words: ["Ми", "підтримали", "б", "пропозицію", "за", "цієї", "умови"]
        answer: "Ми підтримали б пропозицію за цієї умови."
      - words: ["Як", "би", "ви", "пояснили", "цю", "зміну"]
        answer: "Як би ви пояснили цю зміну?"

  - type: fill-in
    title: "Перепишіть у м'якшому регістрі"
    instruction: "Виберіть умовну форму, яка робить службову фразу ввічливішою або обережнішою."
    items:
      - sentence: "Надішліть файл сьогодні. -> Чи ____ ви надіслати файл сьогодні?"
        answer: "могли б"
        options: ["могли б", "можете б", "моглиби", "могти б"]
        explanation: "Могли б ви - стандартна ввічлива формула."
      - sentence: "Перевірте джерело. -> Я ____ радив перевірити джерело."
        answer: "б"
        options: ["б", "би", "же", "то"]
        explanation: "Я б радив - м'яка порада."
      - sentence: "Висновок неточний. -> Висновок ____ точнішим із додатковими даними."
        answer: "був би"
        options: ["був би", "є би", "буде б", "бути б"]
        explanation: "Був би називає можливу якість за умови."
      - sentence: "Дайте пояснення. -> Було ____ корисно додати коротке пояснення."
        answer: "б"
        options: ["б", "би", "же", "но"]
        explanation: "Було б корисно - нейтральне пом'якшення."
      - sentence: "Ми не приймаємо текст. -> Ми ____ прийняли текст, якби були джерела."
        answer: "б"
        options: ["б", "би", "же", "то"]
        explanation: "Прийняли б називає можливе рішення за умови."
      - sentence: "Скажіть, хто відповідає. -> Хотілося ____ знати, хто відповідає."
        answer: "б"
        options: ["б", "би", "же", "то"]
        explanation: "Хотілося б - безособове пом'якшення запиту."
      - sentence: "Висновок може бути іншим. -> Висновок ____ бути іншим за ширшої вибірки."
        answer: "міг би"
        options: ["міг би", "може би", "мігби", "могти б"]
        explanation: "Міг би - умовна форма для обережної гіпотези."
      - sentence: "Запросіть учасників. -> Ми були ____ вдячні за запрошення учасників."
        answer: "б"
        options: ["б", "би", "же", "то"]
        explanation: "Були б вдячні - службова формула ввічливого прохання."
      - sentence: "Додайте таблицю. -> Варто було ____ додати таблицю."
        answer: "б"
        options: ["б", "би", "же", "но"]
        explanation: "Варто було б - м'яка рекомендація."
      - sentence: "Перевірмо цифру. -> Я ____ перевірив цю цифру ще раз."
        answer: "б"
        options: ["б", "би", "же", "то"]
        explanation: "Після голосного в Я природна коротка частка б."

  - type: error-correction
    title: "Редактор умовних речень"
    instruction: "Виправте помилки в коротких фрагментах службового або наукового стилю."
    items:
      - sentence: "Як би вибірка була ширшою, результат був би надійнішим."
        error: "Як би"
        correction: "Якби"
        explanation: "Умова потребує сполучника якби."
      - sentence: "Команда могла б підготувала коротшу версію."
        error: "могла б підготувала"
        correction: "могла б підготувати"
        explanation: "Після могла б потрібен інфінітив."
      - sentence: "За інших умов показник буде би нижчим."
        error: "буде би"
        correction: "був би"
        explanation: "Умовний спосіб утворюється з минулої форми."
      - sentence: "Я радивби не використовувати неперевірену цифру."
        error: "радивби"
        correction: "радив би"
        explanation: "Частка пишеться окремо."
      - sentence: "Вона сказала би-то, що це факт, хоча це лише припущення."
        error: "сказала би-то"
        correction: "сказала б"
        explanation: "Частку би/б не приєднуємо до то; після голосного природна коротка б."
      - sentence: "Чи моглиби ви уточнити дату?"
        error: "моглиби"
        correction: "могли б"
        explanation: "Частка пишеться окремо."
      - sentence: "Якби були джерела, ми приймемо б текст."
        error: "приймемо б"
        correction: "прийняли б"
        explanation: "Наслідок умовного речення має минулу форму."
      - sentence: "Я би пораджу скоротити абзац."
        error: "пораджу"
        correction: "порадив"
        explanation: "Потрібна форма минулого часу: я би порадив."

  - type: select
    title: "Факт чи припущення?"
    instruction: "Позначте правильні пояснення до кожного речення."
    items:
      - question: "«Комісія підтримала пропозицію»."
        min_correct: 2
        options:
          - text: "Це факт або твердження про факт."
            correct: true
          - text: "У реченні немає частки би/б."
            correct: true
          - text: "Це умовний спосіб."
            correct: false
          - text: "Тут є ввічливе прохання."
            correct: false
        explanation: "Без умовної частки речення подає дію як факт."
      - question: "«Комісія підтримала б пропозицію, якби були розрахунки»."
        min_correct: 2
        options:
          - text: "Це умовний спосіб."
