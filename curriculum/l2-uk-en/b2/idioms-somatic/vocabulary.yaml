- lemma: від щирого серця
  translation: from the bottom of one's heart
  pos: phrase
  usage: Від щирого серця дякуємо всім учасникам.
- lemma: кров холоне в жилах
  translation: one's blood runs cold
  pos: phrase
  usage: Від цієї історії кров холоне в жилах.
- lemma: душа болить
  translation: one's soul aches; to be deeply troubled
  pos: phrase
  usage: У волонтерів душа болить за долю зруйнованої школи.
