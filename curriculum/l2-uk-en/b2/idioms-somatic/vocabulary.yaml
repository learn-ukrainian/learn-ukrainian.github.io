  gender: f
  usage: Метафоризація перетворює фізичну дію на образ думки або емоції.
- lemma: сприйняття
  translation: perception
  pos: noun
  gender: n
  usage: Ідіоми про очі й вуха часто описують сприйняття та увагу.
- lemma: темперамент
  translation: temperament
  pos: noun
  gender: m
  usage: Вислів "гаряча кров" може натякати на запальний темперамент.
- lemma: іронія
  translation: irony
  pos: noun
  gender: f
  usage: Іронія може перетворити похвалу "золоті руки" на критику.
- lemma: антропоцентризм
  translation: anthropocentrism
  pos: noun
  gender: m
  usage: Антропоцентризм пояснює, чому тіло стає основою багатьох образів.
- lemma: щирість
