version: '1.0'
module: idioms-somatic
level: b2
inline:
- type: match-up
  title: Образ і переносне значення
  instruction: Поєднайте соматичний фразеологізм із найточнішим значенням.
  pairs:
  - left: мати голову на плечах
    right: діяти розсудливо й кмітливо
  - left: ламати голову
    right: напружено шукати рішення
  - left: дивитися правді у вічі
    right: прийняти неприємний факт без самообману
  - left: пустити туман в очі
    right: створити оманливе враження
  - left: пропустити повз вуха
    right: не звернути уваги на важливе повідомлення
  - left: тримати вуха гостро
    right: бути насторожі й уважно слухати
  - left: очі розбігаються
    right: важко вибрати через надмір варіантів
  - left: замилювати очі
    right: приховувати правду оманливою видимістю
  - left: голова йде обертом
    right: людина перевантажена враженнями або інформацією
  - left: дивитися крізь пальці
    right: свідомо не помічати порушення
- type: select
  title: Руки, ноги й відповідальність
  instruction: Виберіть усі доречні тлумачення або редакторські рішення.
  items:
  - question: У реченні "Після третьої відмови в мене опустилися руки" вислів означає...
    options:
    - text: психологічне знесилення
      correct: true
    - text: буквальну травму рук
      correct: false
    - text: втрату мотивації діяти
      correct: true
    - text: офіційне завершення процедури
      correct: false
    explanation: '"Опускаються руки" описує втому й відчай, а не фізичний рух.'
  - question: Де вислів "умити руки" доречний без нейтралізації?
    options:
    - text: у публіцистичній критиці уникнення відповідальності
      correct: true
    - text: у сухому судовому формулюванні
      correct: false
    - text: у художньому монолозі персонажа
      correct: true
    - text: у таблиці з фінансовими показниками
      correct: false
    explanation: Вислів має оцінний тон, тому не пасує до максимально нейтрального документа.
  - question: Які вислови позитивно оцінюють дію або підтримку?
    options:
    - text: золоті руки
      correct: true
    - text: підставити ногу
      correct: false
    - text: простягнути руку допомоги
      correct: true
    - text: рука руку миє
      correct: false
    explanation: Останній вислів часто має негативний натяк на нечесну взаємовигоду.
  - question: Чому "рука руку миє" небезпечно вживати як похвалу команді?
    options:
    - text: бо може натякати на корупційну взаємовигоду
      correct: true
    - text: бо це суто медичний термін
      correct: false
    - text: бо краще прямо сказати "взаємодопомога"
      correct: true
    - text: бо вислів не має переносного значення
      correct: false
    explanation: Позитивну підтримку краще назвати нейтрально або іншим образом.
  - question: У якому випадку "взяти себе в руки" може звучати неетично?
    options:
    - text: коли фраза наказово знецінює сильне переживання
      correct: true
    - text: коли персонаж у романі описує власний самоконтроль
      correct: false
    - text: коли вона подана як єдиний спосіб підтримки після травми
      correct: true
    - text: коли мовець пояснює, що заспокоївся перед виступом
      correct: false
    explanation: Проблема не у формі як такій, а в ситуації й тоні.
  - question: Які вислови позначають заблоковану або припинену дію?
    options:
    - text: руки зв'язані
      correct: true
    - text: скласти руки
      correct: true
    - text: золоті руки
      correct: false
    - text: від щирого серця
      correct: false
    explanation: Перші два вислови описують обмеження або припинення дії.
  - question: Які речення краще редагувати нейтрально в офіційному жанрі?
    options:
    - text: "Керівник умив руки після рішення."
      correct: true
    - text: "Проєкт став на ноги після гранту."
      correct: true
    - text: "Звіт містить таблицю витрат."
      correct: false
    - text: "Угоду підписано 4 травня."
      correct: false
    explanation: Образні оцінки в офіційному жанрі краще замінювати фактами.
  - question: Які вислови мають переважно позитивну конотацію?
    options:
    - text: золоті руки
      correct: true
    - text: простягнути руку допомоги
      correct: true
    - text: підставити ногу
      correct: false
    - text: рука руку миє
      correct: false
    explanation: Позитивна конотація залежить від контексту, але ці два вислови зазвичай підтримувальні.
- type: unjumble
  title: Відновіть стійкий вислів
  instruction: Розставте слова так, щоб утворився природний соматичний фразеологізм.
  items:
  - words:
    - Не
    - варто
    - брати
    - критику
    - так
    - близько
    - до
    - серця
    answer: Не варто брати критику так близько до серця
  - words:
    - Від
    - цієї
    - новини
    - у
    - мене
    - кров
    - холоне
    - в
    - жилах
    answer: Від цієї новини у мене кров холоне в жилах
  - words:
    - Вона
    - сказала
    - це
    - привітання
    - від
    - щирого
    - серця
    answer: Вона сказала це привітання від щирого серця
  - words:
    - До
    - цієї
    - пропозиції
    - в
    - мене
    - серце
    - не
    - лежить
    answer: До цієї пропозиції в мене серце не лежить
  - words:
    - За
    - цю
    - справу
    - в
    - нього
    - душа
    - болить
    answer: За цю справу в нього душа болить
  - words:
    - Після
    - третьої
    - невдачі
    - в
    - команди
    - опустилися
    - руки
    answer: Після третьої невдачі в команди опустилися руки
  - words:
    - На
    - переговорах
    - треба
    - тримати
    - вуха
    - гостро
    - постійно
    answer: На переговорах треба постійно тримати вуха гостро
  - words:
    - Керівник
    - не
    - може
    - умити
    - руки
    - після
    - рішення
    answer: Керівник не може умити руки після рішення
- id: act-4
  type: critical-analysis
  title: Ідіома чи нейтральна редакція?
  target_text: "1. Компанія знову вмила руки після скарг клієнтів. 2. Після третього перенесення запуску в команди опустилися руки. 3. Комісія пустила туман в очі громадськості, не подавши даних. 4. У протоколі написано: учасник ледве ноги волочив після наради."
  questions:
  - У яких реченнях ідіома виконує доречну оцінну функцію?
  - Де потрібна нейтральна редакція для офіційного жанру?
  - Яке речення можна переписати так, щоб зберегти факт без образності?
  model_answers:
  - "Перше і третє можуть бути доречними в публіцистиці, якщо автор має факти для критики. Вони прямо оцінюють уникнення відповідальності або оманливу комунікацію."
  - "Четверте речення не пасує до протоколу: фізичну втому або стан учасника треба описати нейтрально лише тоді, коли це справді релевантно."
  - "Можлива редакція: **Комісія не подала достатніх даних, тому громадськість не могла оцінити рішення.** Тут збережено факт без звинувачувальної ідіоми."
- id: act-5
  type: essay-response
  title: Соматизм у трьох регістрах
  instruction: "Напишіть 150-180 слів про один соматичний фразеологізм у трьох регістрах: розмовному, публіцистичному й офіційному."
  prompt: Оберіть вислів про голову, очі, руки, ноги, серце або душу. Поясніть його образ, переносне значення, доречний контекст і можливий ризик.
  min_words: 150
  model_answer: >-
    > [!model-answer]
    > Вислів **опускаються руки** побудований на образі тіла, яке перестає діяти. У розмові він природно передає втому: "Після кількох невдалих спроб у мене опустилися руки". У публіцистичному тексті його можна використати для опису суспільного настрою, але треба додати причину: "Після непрозорих рішень у волонтерів опускаються руки". В офіційному звіті краще писати нейтрально: "Команда потребує додаткової підтримки після серії невдалих спроб". Ризик ідіоми в тому, що вона узагальнює емоцію й може приховати конкретні умови. Якщо треба співпережити, образ доречний; якщо треба ухвалити рішення, потрібні факти.
  rubric:
  - criteria: Образ
    description: Пояснено тілесний образ і переносне значення.
    points: 3
  - criteria: Регістр
    description: Подано три різні жанрові варіанти.
    points: 3
  - criteria: Ризик
    description: Названо межу доречного вживання.
    points: 2
  - criteria: Мова
    description: Текст зв'язний, без кальок і грубих помилок.
    points: 2
workbook:
- type: match-up
  title: Регістр соматизмів
  instruction: Поєднайте вислів із найдоречнішим жанром або комунікативною дією.
  pairs:
  - left: від щирого серця вітаємо
    right: урочисте привітання
  - left: ледве ноги волочити
    right: розмовний опис виснаження
  - left: дивитися правді у вічі
    right: публіцистичний заклик до чесної оцінки
  - left: умивати руки
    right: критика уникнення відповідальності
  - left: очі розбігаються
    right: художній або розмовний опис надміру варіантів
  - left: серце не лежить
    right: приватне пояснення інтуїтивної недовіри
  - left: руки опускаються
    right: розмовний опис знесилення після невдачі
  - left: покласти руку на серце
    right: формула щирого зізнання або запевнення
  - left: брати близько до серця
    right: сильно переживати через слова або подію
  - left: кров холоне в жилах
    right: образ дуже сильного страху
- type: fill-in
  title: Доберіть соматичну ідіому
  instruction: Заповніть пропуски доречними висловами.
  items:
  - sentence: "Після суперечливого звіту команда мусила ____ правді у вічі."
    answer: дивитися
    options:
    - дивитися
    - слухати
    - тримати
    - волочити
    explanation: Усталений вислів - "дивитися правді у вічі".
  - sentence: "Коли варіантів забагато, у покупця ____ розбігаються."
    answer: очі
    options:
    - очі
    - руки
    - ноги
    - вуха
    explanation: '"Очі розбігаються" означає надмір вибору.'
  - sentence: "Після невдачі не варто одразу ____ руки."
    answer: складати
    options:
    - складати
    - замилювати
    - холонути
    - лежати
    explanation: '"Скласти руки" означає перестати діяти.'
  - sentence: "Він сказав це не з іронії, а від ____ серця."
    answer: щирого
    options:
    - щирого
    - широкого
    - гострого
    - золотого
    explanation: Формула щирості - "від щирого серця".
  - sentence: "Керівник не мав права ____ руки після власного рішення."
    answer: умити
    options:
    - умити
    - дивитися
    - поставити
    - краяти
    explanation: '"Умити руки" означає відмовитися від відповідальності.'
  - sentence: "Під час перемовин треба тримати ____ гостро."
    answer: вуха
    options:
    - вуха
    - серце
    - ноги
    - кров
    explanation: '"Тримати вуха гостро" означає бути уважним і настороженим.'
  - sentence: "Не варто ____ голову над тим, що вже має просте рішення."
    answer: ламати
    options:
    - ламати
    - умити
    - краяти
    - холонути
    explanation: '"Ламати голову" означає напружено шукати відповідь.'
  - sentence: "Після чесної розмови йому стало легше ____ душу."
    answer: відвести
    options:
    - відвести
    - скласти
    - замилити
    - волочити
    explanation: '"Відвести душу" означає отримати емоційне полегшення.'
  - sentence: "У цьому питанні в мене серце не ____ до запропонованого рішення."
    answer: лежить
    options:
    - лежить
    - дивиться
    - холоне
    - миє
    explanation: '"Серце не лежить" означає внутрішню недовіру або небажання.'
  - sentence: "Після страшної новини в нього кров ____ в жилах."
    answer: холоне
    options:
    - холоне
    - складає
    - дивиться
    - замилює
    explanation: '"Кров холоне в жилах" описує сильний страх.'
- type: select
  title: Етична межа
  instruction: Виберіть відповідальні редакторські рішення.
  items:
  - question: Як нейтралізувати речення "Міністерство вмило руки" для звіту?
    options:
    - text: "Міністерство не взяло на себе відповідальності за виконання рішення."
      correct: true
    - text: "Міністерство фізично помило руки."
      correct: false
    - text: "Міністерство ухилилося від пояснення причин."
      correct: true
    - text: "Міністерство мало золоті руки."
      correct: false
    explanation: Нейтральна редакція називає дію без образного звинувачення.
  - question: Які вислови можуть підтримати людину, якщо сказані м'яко?
    options:
    - text: "Не бери це так близько до серця."
      correct: true
    - text: "Ти знову пустив туман в очі."
      correct: false
    - text: "Я кажу це від щирого серця."
      correct: true
    - text: "У тебе руки зв'язані."
      correct: false
    explanation: Підтримка залежить від тону і стосунку між співрозмовниками.
  - question: Які вислови прямо натякають на обман або маніпуляцію?
    options:
    - text: "замилювати очі"
      correct: true
    - text: "пустити туман в очі"
      correct: true
    - text: "мати голову на плечах"
      correct: false
    - text: "відвести душу"
      correct: false
    explanation: Обидва вислови про очі пов'язані з оманливою видимістю.
  - question: Які варіанти краще підходять для офіційного звіту?
    options:
    - text: "Команда продовжила роботу після відмови."
      correct: true
    - text: "Команда не склала руки після відмови."
      correct: false
    - text: "Учасники переглянули дані й погодили новий термін."
      correct: true
    - text: "В учасників очі розбіглися від таблиць."
      correct: false
    explanation: Офіційний звіт потребує нейтральних дій, а не образного голосу.
  - question: Коли доречно залишити "золоті руки"?
    options:
    - text: "у дружній похвалі майстра"
      correct: true
    - text: "як єдиний доказ у рекомендаційному листі"
      correct: false
    - text: "у художньому описі персонажа"
      correct: true
    - text: "у технічній специфікації ремонту"
      correct: false
    explanation: Ідіома може хвалити, але в формальних жанрах її треба підкріплювати фактами.
  - question: Які вислови краще не використовувати як доказ без фактів?
    options:
    - text: "керівник умив руки"
      correct: true
    - text: "комісія пустила туман в очі"
      correct: true
    - text: "звіт подано 12 червня"
      correct: false
    - text: "у таблиці є 18 рядків"
      correct: false
    explanation: Оцінні ідіоми потребують фактичного підкріплення.
  - question: Які варіанти передають емоційний стан, а не фізичну дію?
    options:
    - text: "серце крається"
      correct: true
    - text: "душа болить"
      correct: true
    - text: "підписати протокол"
      correct: false
    - text: "відчинити двері"
      correct: false
    explanation: Обидва вислови описують переживання через тілесний образ.
  - question: Які формулювання найкраще показують B2-рівень аналізу?
    options:
    - text: "Ідіома має тілесний образ, переносне значення і регістрову межу."
      correct: true
    - text: "Ідіому треба завжди перекладати буквально."
      correct: false
    - text: "У формальному жанрі образ можна замінити точним фактом."
      correct: true
    - text: "Усі вислови про тіло мають однаковий тон."
      correct: false
    explanation: B2-аналіз пояснює механізм, контекст і межу доречності.
- type: error-correction
  title: Виправте регістр і стійкість
  instruction: Знайдіть проблемний вислів або невдалий регістр і запропонуйте природну редакцію.
  items:
  - sentence: "У протоколі зазначено: після засідання секретар ледве ноги волочив."
    error: "ледве ноги волочив"
    answer: "після засідання секретар був дуже втомлений"
    error_type: register
    options:
    - "після засідання секретар був дуже втомлений"
    - "секретар пустив туман в очі"
    - "секретар мав золоті ноги"
