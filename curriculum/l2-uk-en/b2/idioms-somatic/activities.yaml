- id: wb-essay-map
  type: essay-response
  title: Карта соматизмів
  instruction: Створіть коротку карту трьох соматичних ідіом з різними частинами тіла.
  prompt: Для кожної ідіоми вкажіть образ, значення, регістр і власне речення. Використайте щонайменше один вислів про сприйняття, один про дію і один про емоцію.
  min_words: 150
  model_answer: >-
    > [!model-answer]
    > **Дивитися правді у вічі** спирається на образ очей і означає чесно приймати факт; доречне в публіцистиці: "Громада має подивитися правді у вічі". **Скласти руки** пов'язане з дією рук і означає припинити працювати; воно природне в розмові: "Після відмови ми не склали руки". **Брати близько до серця** передає емоційну вразливість; у приватній розмові можна сказати: "Не бери цю критику так близько до серця". У кожному випадку важливо бачити не лише переклад, а й тон.
  rubric:
  - criteria: Три групи
    description: Є ідіома про сприйняття, дію та емоцію.
    points: 3
  - criteria: Контекст
    description: Для кожної ідіоми названо регістр.
    points: 3
  - criteria: Приклади
    description: Речення природні й відповідають значенню.
    points: 4
