level: b2
inline:
- id: act-1
  type: critical-analysis
  title: Шкала сталості
  instruction: Проаналізуйте приклади й поясніть рішення через значення, регістр і контекст.
  target_text: Червона книжка є вільним поєднанням, міцна кава - колокацією, бити байдики - ідіомою.
  questions:
    - Як перевірити ступінь сталості?
    - Який варіант був би недоречним у формальнішому тексті?
    - Яке коротке правило можна вивести з прикладів?
  model_answers:
    - Ступінь сталості перевіряємо заміною компонента і зміною значення. **Червона книжка** допускає заміну прикметника, бо це вільний опис. **Міцна кава** має прозоре значення, але прикметник закріплений колокаційно. **Бити байдики** не можна механічно переробити, бо це ідіома.
    - У формальнішому тексті недоречним буде **бити байдики**, якщо треба нейтрально описати бездіяльність; краще **не працювати**, **уникати роботи**, **марнувати час** залежно від контексту. **Міцна кава** нейтральна, а **червона книжка** є звичайним описом.
    - "Коротке правило: що сталіший вислів, то обережніше треба змінювати його компоненти і то важливіше перевіряти регістр."
- id: act-2
  type: critical-analysis
  title: Колокаційна природність
  instruction: Проаналізуйте приклади й поясніть рішення через значення, регістр і контекст.
  target_text: Strong coffee стає міцною кавою, heavy rain - сильним дощем або зливою, take measures - вжити заходів.
  questions:
    - Чому перекладаємо словосполучення, а не окремі слова?
    - Який варіант був би недоречним у формальнішому тексті?
    - Яке коротке правило можна вивести з прикладів?
  model_answers:
    - Окреме англійське слово не гарантує природної української колокації. **Strong** у напоях дає **міцний**, **heavy rain** передаємо як **сильний дощ** або **злива**, а **take measures** в офіційному стилі відповідає формулі **вжити заходів**.
    - У формальнішому тексті недоречні кальки **сильна кава**, **важкий дощ** у нейтральному описі погоди та **взяти міри**. Вони зрозумілі, але звучать перекладно або ненормативно.
    - "Коротке правило: перекладайте не словниковий компонент, а типове українське партнерство слів у потрібному жанрі."
- id: act-3
  type: critical-analysis
  title: Калька і стала форма
  instruction: Проаналізуйте приклади й поясніть рішення через значення, регістр і контекст.
  target_text: Взяти міри, зробити рішення і бути під погодою показують різні типи кальок та порушень сталості.
  questions:
    - Як визначити тип правки?
    - Який варіант був би недоречним у формальнішому тексті?
    - Яке коротке правило можна вивести з прикладів?
  model_answers:
    - Тип правки визначаємо за джерелом помилки. **Взяти міри** порушує нормативну офіційну формулу, тому треба **вжити заходів**. **Зробити рішення** калькує англійське *make a decision*; природніше **ухвалити рішення**, **прийняти рішення** або просто **вирішити**. **Бути під погодою** не є українською ідіомою; треба **нездужати** або **почуватися зле**.
    - У формальнішому тексті особливо недоречне **взяти міри**, бо офіційний стиль очікує **вжити заходів**. **Зробити рішення** теж варто замінити, якщо потрібна відредагована норма.
    - "Коротке правило: спершу з'ясуйте, чи це нормативна формула, калька перекладу чи відсутня ідіома, а тоді добирайте функціональний український варіант."
- id: act-4
  type: critical-analysis
  title: Регістр сталого вислову
  instruction: Проаналізуйте приклади й поясніть рішення через значення, регістр і контекст.
  target_text: Розрулити ситуацію природне в чаті, але в листі клієнту краще допоможемо вирішити проблему.
  questions:
    - Як регістр змінює вибір сталого вислову?
    - Який варіант був би недоречним у формальнішому тексті?
    - Яке коротке правило можна вивести з прикладів?
  model_answers:
    - Регістр визначає не тільки значення, а й стосунок до адресата. **Розрулити ситуацію** може бути природним у неформальному командному чаті, бо звучить швидко й розмовно. У листі клієнту краще **допоможемо вирішити проблему**, **узгодимо подальші дії** або **знайдемо рішення**.
    - У формальнішому тексті недоречним буде **розрулити ситуацію**, бо воно жаргонізоване й може знизити довіру. Нейтральний варіант має називати дію без розмовної оцінки.
    - "Коротке правило: якщо адресат або жанр офіційні, замініть розмовну сталу формулу на нейтральний опис дії."
- id: act-5
  type: critical-analysis
  title: Переклад без буквальної пастки
  instruction: Проаналізуйте варіанти перекладу і виберіть функціональний.
  target_text: 'The new manager tried to break the ice at the first team meeting.'
  questions:
    - 'Чому **зламати лід** може бути буквальним або неприродним?'
    - 'Який український варіант передає функцію вислову?'
    - 'У якому контексті **розтопити лід** може бути прийнятним?'
  model_answers:
    - 'У цьому реченні *break the ice* означає не фізичну дію, а спробу почати невимушене спілкування. **Зламати лід** без усталеного контексту звучить як буквальна калька.'
    - 'Функцію найкраще передають варіанти **новий менеджер спробував розрядити атмосферу на першій зустрічі команди**, **налагодити невимушений контакт** або **зняти напруження на початку зустрічі**.'
    - '**Розтопити лід** може бути прийнятним у художньому або публіцистичному тексті, якщо йдеться про поступове потепління стосунків і метафора підтримана контекстом.'
