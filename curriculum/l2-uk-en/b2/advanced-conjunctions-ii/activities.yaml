- type: essay-response
  id: subordination-essay
  title: "Письмо: аргумент із підрядними зв'язками"
  instruction: "Напишіть аналітичний абзац про зміну в освітньому, міському або культурному проєкті."
  prompt: "Напишіть 180-220 слів про зміну в освітньому, міському або культурному проєкті. Використайте щонайменше одну причинову, одну умовну, одну допустову і одну цільову підрядну конструкцію. Додайте одне сполучне слово який/де/коли/що у підрядній частині. Після абзацу коротко поясніть функцію кожного засобу зв'язку."
  min_words: 180
  model_answer: |-
    > [!model-answer]
    > Міська бібліотека змінила формат мовних зустрічей, тому що частина
    > учасників не могла регулярно приходити ввечері. Якщо група працюватиме
    > лише очно, організатори втратять слухачів, які живуть далеко від центру.
    > Тому команда відкрила онлайн-реєстрацію, щоб кожен міг заздалегідь
    > поставити запитання й отримати матеріали. Хоча деякі викладачі спершу
    > сумнівалися, змішаний формат виявився зручним: аудиторія, яка раніше
    > пропускала зустрічі, почала виконувати домашні завдання стабільніше.
    > У міру того як надходили відгуки, бібліотекарі уточнювали календар і
    > додавали короткі консультації після основних занять.
    >
    > **Тому що** називає причину зміни. **Якщо** вводить умову, від якої
    > залежить результат. **Щоб** показує мету онлайн-реєстрації. **Хоча**
    > оформлює допуст, бо сумніви не зупинили дію. **Яка** є сполучним словом
    > в означальній підрядній частині, а **у міру того як** описує поступовий
    > розвиток процесу.

