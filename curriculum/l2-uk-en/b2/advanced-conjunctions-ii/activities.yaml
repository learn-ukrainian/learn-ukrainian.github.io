version: '1.0'
module: advanced-conjunctions-ii
level: b2
inline:
- type: group-sort
  title: "Семантична група підрядності"
  instruction: "Розсортуйте засоби зв'язку за тим, яку підрядну частину вони вводять."
  groups:
  - name: "Причина"
    items: ["бо", "тому що", "оскільки", "через те що"]
  - name: "Умова"
    items: ["якщо", "якби", "аби", "коли в умовному значенні"]
  - name: "Допуст"
    items: ["хоч", "хоча", "незважаючи на те що", "дарма що"]
  - name: "Мета"
    items: ["щоб", "аби", "для того щоб"]
  - name: "Час або поступова динаміка"
    items: ["коли", "поки", "після того як", "у міру того як"]

- type: select
  title: "Сполучник чи сполучне слово?"
  instruction: "Позначте всі правильні твердження."
  items:
  - question: "«Ми знаємо, що зустріч перенесли»."
    min_correct: 2
    options:
    - text: "Що вводить з'ясувальну підрядну частину."
      correct: true
    - text: "До що тут не ставимо синтаксичного питання як до члена речення."
      correct: true
    - text: "Що тут означає предмет у підрядній частині."
      correct: false
    - text: "Це розділовий сурядний сполучник."
      correct: false
    explanation: "У з'ясувальній конструкції що є підрядним сполучником."
  - question: "«Ми знаємо, що саме змінило рішення»."
    min_correct: 2
    options:
    - text: "Що виконує роль члена підрядної частини."
      correct: true
    - text: "До що можна поставити питання: що змінило?"
      correct: true
    - text: "Це завжди простий підрядний сполучник без синтаксичної ролі."
      correct: false
    - text: "Кома перед що тут заборонена."
      correct: false
    explanation: "У цій позиції що поводиться як сполучне слово."
  - question: "«Місто змінило маршрут, тому що міст закрили на ремонт»."
    min_correct: 2
    options:
    - text: "Тому що вводить причину."
      correct: true
    - text: "Кома стоїть перед підрядною частиною."
      correct: true
    - text: "Тому що вводить мету."
      correct: false
    - text: "Це сурядне протиставлення."
      correct: false
    explanation: "Причинна підрядна частина пояснює, чому змінили маршрут."
  - question: "«Команда відкрила консультації, щоб мешканці поставили запитання»."
    min_correct: 2
    options:
    - text: "Щоб вводить мету."
      correct: true
    - text: "Підрядна частина відповідає на питання для чого?"
      correct: true
    - text: "Щоб тут означає реальну причину."
      correct: false
    - text: "Кома перед щоб зайва."
      correct: false
    explanation: "Мета і причина не взаємозамінні."
  - question: "«Хоч бюджет обмежений, команда зберегла головний етап»."
    min_correct: 2
    options:
    - text: "Хоч вводить допуст."
      correct: true
    - text: "Підрядна частина називає перешкоду, попри яку дія відбулася."
      correct: true
    - text: "Хоч тут означає вибір між двома діями."
      correct: false
    - text: "Кома після підрядної частини не потрібна."
      correct: false
    explanation: "Допустова частина відокремлюється комою."
  - question: "«Якщо група збереться раніше, ми почнемо обговорення о десятій»."
    min_correct: 2
    options:
    - text: "Якщо вводить умову."
      correct: true
    - text: "Кома закриває підрядну частину перед головною."
      correct: true
    - text: "Якщо тут означає причину, яка вже сталася."
      correct: false
    - text: "Це конструкція не тільки..., а й."
      correct: false
    explanation: "Умова визначає, за якої обставини можлива дія."
  - question: "«У міру того як команда збирала дані, рішення ставало точнішим»."
    min_correct: 2
    options:
    - text: "Конструкція передає поступову паралельну динаміку."
      correct: true
    - text: "Це не те саме, що просте коли."
      correct: true
    - text: "Нормативна базова форма - по мірі того як."
      correct: false
    - text: "Це парний сурядний сполучник."
      correct: false
    explanation: "У міру того як показує зміну одного процесу разом з іншим."
  - question: "«Люди, яких ми запросили, підтвердили участь»."
    min_correct: 2
    options:
    - text: "Яких є сполучним словом."
      correct: true
    - text: "Форма яких узгоджена з роллю об'єкта в підрядній частині."
      correct: true
    - text: "У формальному письмі краще люди, що ми запросили."
      correct: false
    - text: "Яких тут не має синтаксичної ролі."
      correct: false
    explanation: "Сполучне слово відмінюється за роллю в підрядній частині."

- type: fill-in
  title: "Складений підрядний засіб у контексті"
  instruction: "Оберіть підрядний засіб, який відповідає логіці речення."
  items:
  - sentence: "Ми змінили календар, ____ партнери попросили більше часу."
    answer: "тому що"
    options: ["тому що", "щоб", "хоч", "якби"]
    explanation: "Йдеться про причину."
  - sentence: "Команда відкрила консультації, ____ мешканці могли поставити запитання."
    answer: "щоб"
    options: ["щоб", "тому що", "хоча", "у міру того як"]
    explanation: "Йдеться про мету."
  - sentence: "____ бюджет був обмежений, етап зберегли."
    answer: "Хоча"
    options: ["Хоча", "Тому що", "Якщо", "Після того як"]
    explanation: "Перешкода не зупинила дію, тому це допуст."
  - sentence: "____ учасники надішлють питання до вечора, відповіді додадуть у документ."
    answer: "Якщо"
    options: ["Якщо", "Бо", "Дарма що", "Оскільки"]
    explanation: "Потрібна умова."
  - sentence: "____ місто розширювало веломережу, короткі поїздки ставали частішими."
    answer: "У міру того як"
    options: ["У міру того як", "По мірі того як", "Незважаючи на те що", "Для того щоб"]
    explanation: "Нормативна форма - у міру того як."
  - sentence: "Ми перенесли зустріч, ____ координатор захворів."
    answer: "бо"
    options: ["бо", "щоб", "хоч", "аби"]
    explanation: "Бо коротко вводить причину."
  - sentence: "План лишили коротким, ____ читачі швидко побачили головне."
    answer: "щоб"
    options: ["щоб", "тому що", "хоч", "якби"]
    explanation: "Мета - зробити головне видимим."
  - sentence: "____ команда мала лише два дні, вона підготувала якісний звіт."
    answer: "Незважаючи на те що"
    options: ["Незважаючи на те що", "Через те що", "Для того щоб", "Після того як"]
    explanation: "Допустова конструкція підкреслює перешкоду."
  - sentence: "Ми перевірили місце, ____ відбудеться консультація."
    answer: "де"
    options: ["де", "бо", "щоб", "хоч"]
    explanation: "Де є сполучним словом місця."
  - sentence: "Координатор пояснив, ____ попередній графік не спрацював."
    answer: "чому"
    options: ["чому", "щоб", "хоч", "або"]
    explanation: "Чому є сполучним словом, яке вводить зміст пояснення."

- type: error-correction
  title: "Омонімія, кальки і пунктуація"
  instruction: "Виправте помилковий підрядний засіб або розділовий знак."
  items:
  - sentence: "Я вивчаю мову, щоб живу в Україні."
    error: "щоб"
    correction: "бо"
    options: ["бо", "щоб", "хоч", "якби"]
    explanation: "Реальна причина потребує бо або тому що, не щоб."
  - sentence: "Команда працювала по мірі того як з'являлися дані."
    error: "по мірі того як"
    correction: "у міру того як"
    options: ["у міру того як", "по мірі того як", "для того щоб", "незважаючи на те що"]
    explanation: "Нормативна українська форма - у міру того як."
  - sentence: "Не дивлячись на те що бракувало часу, звіт завершили."
    error: "Не дивлячись на те що"
    correction: "Незважаючи на те що"
    options: ["Незважаючи на те що", "Не дивлячись на те що", "Для того щоб", "Через те що"]
    explanation: "Для допусту вживаємо незважаючи на те що."
  - sentence: "Люди, що ми запросили, підтвердили участь."
    error: "що"
    correction: "яких"
    options: ["яких", "що", "бо", "щоб"]
    explanation: "Потрібне сполучне слово у знахідному/родовому відмінку множини."
  - sentence: "Як би було більше часу, ми провели б додаткову зустріч."
    error: "Як би"
    correction: "Якби"
    options: ["Якби", "Як би", "Що б", "Щоб"]
    explanation: "Умовний сполучник пишеться разом: якби."
  - sentence: "Я не знаю щоб додати до звіту."
    error: "щоб"
    correction: "що б"
    options: ["що б", "щоб", "якби", "бо"]
    explanation: "Тут що б означає який саме елемент додати."
  - sentence: "Коли консультація завершилася координатор пояснив висновки."
    error: "завершилася координатор"
    correction: "завершилася, координатор"
    options: ["завершилася, координатор", "завершилася координатор", "завершилася; координатор", "завершилася і координатор"]
    explanation: "Підрядна частина перед головною закривається комою."
  - sentence: "Ми відкрили форму для того щоб учасники зареєструвалися."
    error: "для того щоб"
    correction: "для того, щоб"
    options: ["для того, щоб", "для того щоб", "для, того щоб", "для того; щоб"]
    explanation: "Розчленована конструкція може мати кому після того."

- type: match-up
  title: "Пунктуаційна схема підрядності"
  instruction: "Поєднайте схему з поясненням."
  pairs:
  - left: "Головна, тому що підрядна"
    right: "причина після головної частини"
  - left: "Якщо підрядна, головна"
    right: "умова перед головною частиною"
  - left: "Хоч підрядна, головна"
    right: "допустова перешкода не зупиняє дію"
  - left: "Головна, щоб підрядна"
    right: "мета після головної частини"
  - left: "У міру того як підрядна, головна"
    right: "поступова паралельна динаміка"
  - left: "Іменник, який..., головна"
    right: "означальна підрядна частина зі сполучним словом"
  - left: "Пояснив, чому..."
    right: "сполучне слово вводить зміст пояснення"
  - left: "Саме через те, що..."
    right: "розчленована причина з логічним наголосом"
  - left: "Що б ти додав?"
    right: "займенник із часткою, не сполучник щоб"
  - left: "Якби було більше часу..."
    right: "умовний сполучник пишеться разом"

- type: select
  title: "Фінальне редагування підрядності"
  instruction: "Позначте всі правильні редакторські рішення."
  items:
  - question: "Речення має три підрядні частини й важко читається."
    min_correct: 2
    options:
    - text: "Можна розділити думку на два речення."
      correct: true
    - text: "Треба перевірити, чи кожна підрядна відповідає на своє питання."
      correct: true
    - text: "Треба додати ще один складений сполучник."
      correct: false
    - text: "Коми можна прибрати, щоб речення стало легшим."
      correct: false
    explanation: "Складність треба керувати, а не маскувати."
  - question: "Потрібно висловити мету реєстраційної форми."
    min_correct: 2
    options:
    - text: "Можна використати щоб."
      correct: true
    - text: "Можна використати для того щоб у формальнішому стилі."
      correct: true
    - text: "Треба використати тому що."
      correct: false
    - text: "Треба використати дарма що."
      correct: false
    explanation: "Мета відповідає на для чого?"
  - question: "Потрібно назвати перешкоду, попри яку дію виконано."
    min_correct: 2
    options:
    - text: "Доречні хоч або хоча."
      correct: true
    - text: "Доречне незважаючи на те що."
      correct: true
    - text: "Доречне тому що."
      correct: false
    - text: "Доречне або... або."
      correct: false
    explanation: "Це допустові відношення."
  - question: "У реченні «люди, яких ми запросили» слово яких..."
    min_correct: 2
    options:
    - text: "є сполучним словом."
      correct: true
    - text: "має відмінкову форму через роль у підрядній частині."
      correct: true
    - text: "є незмінним підрядним сполучником."
      correct: false
    - text: "завжди можна замінити на що без зміни стилю."
      correct: false
    explanation: "Сполучні слова мають синтаксичну роль."
  - question: "Коли автор хоче підкреслити причину на початку речення..."
    min_correct: 2
    options:
    - text: "Можна написати саме через те, що..."
      correct: true
    - text: "Кома після те показує розчленування."
      correct: true
    - text: "Треба замінити причину на мету."
      correct: false
    - text: "Коми в такій конструкції не буває."
      correct: false
    explanation: "Розчленування пов'язане з логічним наголосом."
  - question: "Форма «по мірі того як» у навчальному тексті..."
    min_correct: 2
    options:
    - text: "краще редагується як у міру того як."
      correct: true
    - text: "може бути замінена конструкцією що більше..., то..."
      correct: true
    - text: "є базовою нормативною формою."
      correct: false
    - text: "означає просту альтернативу."
      correct: false
    explanation: "Це типова калькована зона."
  - question: "Умовний сполучник «якби»..."
    min_correct: 2
    options:
    - text: "пишеться разом."
      correct: true
    - text: "вводить гіпотетичну умову."
      correct: true
    - text: "завжди тотожний поєднанню як би."
      correct: false
    - text: "є сурядним розділовим засобом."
      correct: false
    explanation: "Якби і як би треба розрізняти."
  - question: "Щоб не перевантажити B2-абзац підрядністю..."
    min_correct: 2
    options:
    - text: "варто залишити тільки потрібні логічні зв'язки."
      correct: true
    - text: "варто замінити зайві складені конструкції коротшими, якщо зміст не втрачається."
      correct: true
    - text: "варто додати більше однакових тому що."
      correct: false
    - text: "варто прибрати всі коми."
      correct: false
    explanation: "Зріла підрядність керує ясністю."

workbook:
- id: subordinating-reading
  type: reading
  title: "Читання: підрядність у рішенні громади"
  instruction: "Прочитайте уривок і визначте типи підрядних зв'язків."
  source: "Навчальний аналітичний уривок для модуля B2."
  text: >-
    Міська бібліотека змінила формат мовних зустрічей, тому що частина
    учасників не могла приходити ввечері. Якщо група працюватиме лише
    очно, організатори втратять слухачів, які живуть далеко від центру.
    Тому команда відкрила онлайн-реєстрацію, щоб кожен міг заздалегідь
    поставити запитання. Хоча бюджет був обмежений, волонтери підготували
    короткі інструкції. У міру того як учасники звикали до нового формату,
    обговорення ставали точнішими.
  tasks:
  - "Випишіть причинову, умовну, цільову, допустову й означальну підрядні частини."
  - "Поясніть, яке слово є сполучним словом і чому."
  - "Знайдіть складений сполучник і поясніть пунктуацію."
  - "Запропонуйте коротшу версію одного речення без втрати змісту."

- type: group-sort
  title: "Засіб зв'язку і регістр"
  instruction: "Розсортуйте конструкції за стилістичною роллю."
  groups:
  - name: "Нейтральна причина"
    items: ["бо", "тому що", "оскільки"]
  - name: "Формальніша або наголошена причина"
    items: ["через те що", "саме через те, що", "внаслідок того що"]
  - name: "Допуст"
    items: ["хоч", "хоча", "незважаючи на те що", "дарма що"]
  - name: "Поступова динаміка"
    items: ["у міру того як", "що більше..., то...", "щодалі, то..."]

- type: fill-in
  title: "Комбінуйте прості речення"
  instruction: "Оберіть найприродніший підрядний засіб для поєднання двох думок."
  items:
  - sentence: "Зустріч перенесли. Частина учасників захворіла. -> Зустріч перенесли, ____ частина учасників захворіла."
    answer: "тому що"
    options: ["тому що", "щоб", "хоча", "якби"]
    explanation: "Друга думка називає причину."
  - sentence: "Команда створила форму. Учасники мають зареєструватися. -> Команда створила форму, ____ учасники зареєструвалися."
    answer: "щоб"
    options: ["щоб", "бо", "дарма що", "коли"]
    explanation: "Друга частина передає мету."
  - sentence: "Бюджет був малий. Етап зберегли. -> ____ бюджет був малий, етап зберегли."
    answer: "Хоча"
    options: ["Хоча", "Тому що", "Якби", "Після того як"]
    explanation: "Перешкода не зупинила дію."
  - sentence: "Група збереться раніше. Ми почнемо о десятій. -> ____ група збереться раніше, ми почнемо о десятій."
    answer: "Якщо"
    options: ["Якщо", "Бо", "Хоч", "Оскільки"]
    explanation: "Це умова."
  - sentence: "Дані надходили поступово. Рішення ставало точнішим. -> ____ дані надходили, рішення ставало точнішим."
    answer: "У міру того як"
    options: ["У міру того як", "По мірі того як", "Незважаючи на те що", "Для того щоб"]
    explanation: "Конструкція передає паралельну зміну."
  - sentence: "Ми запросили людей. Вони працюють у районних бібліотеках. -> Ми запросили людей, ____ працюють у районних бібліотеках."
    answer: "які"
    options: ["які", "бо", "щоб", "хоч"]
    explanation: "Які є сполучним словом і узгоджується з люди."
  - sentence: "Координатор пояснив причину. Графік не спрацював. -> Координатор пояснив, ____ графік не спрацював."
    answer: "чому"
    options: ["чому", "щоб", "хоча", "або"]
    explanation: "Чому вводить зміст пояснення."
  - sentence: "Ми відкриємо додаткову групу. Буде достатньо охочих. -> Ми відкриємо додаткову групу, ____ буде достатньо охочих."
    answer: "якщо"
    options: ["якщо", "бо", "хоч", "щоб"]
    explanation: "Це умова майбутньої дії."
  - sentence: "Учасники запізнилися. Дощ затримав транспорт. -> Учасники запізнилися, ____ дощ затримав транспорт."
    answer: "оскільки"
    options: ["оскільки", "щоб", "дарма що", "якби"]
    explanation: "Оскільки вводить причину в книжнішому стилі."
  - sentence: "Текст короткий. Він зрозумілий. -> ____ текст короткий, він зрозумілий."
    answer: "Хоч"
    options: ["Хоч", "Тому що", "Для того щоб", "Після того як"]
    explanation: "Короткість тут не завадила зрозумілості."

- type: error-correction
  title: "Редагування підрядного абзацу"
  instruction: "Виправте одну помилку в кожному реченні."
  items:
  - sentence: "Бібліотека змінила графік, щоб частина учасників не могла приходити ввечері."
    error: "щоб"
    correction: "тому що"
    options: ["тому що", "щоб", "хоча", "якби"]
    explanation: "Йдеться про причину, не мету."
  - sentence: "По мірі того як учасники звикали, зустрічі ставали коротшими."
    error: "По мірі того як"
    correction: "У міру того як"
    options: ["У міру того як", "По мірі того як", "Через те що", "Для того щоб"]
    explanation: "Нормативна форма - у міру того як."
  - sentence: "Не дивлячись на те що бюджет малий, команду підтримали."
    error: "Не дивлячись на те що"
    correction: "Незважаючи на те що"
    options: ["Незважаючи на те що", "Не дивлячись на те що", "Оскільки", "Якби"]
    explanation: "Допустова конструкція не має калькувати дієприслівник."
  - sentence: "Люди, що ми запросили, живуть далеко від центру."
    error: "що"
    correction: "яких"
    options: ["яких", "що", "бо", "щоб"]
    explanation: "Потрібне сполучне слово в ролі додатка."
  - sentence: "Як би група зібралася раніше, ми почали б о десятій."
    error: "Як би"
    correction: "Якби"
    options: ["Якби", "Як би", "Що б", "Щоб"]
    explanation: "Умовний сполучник пишеться разом."
  - sentence: "Я не знаю щоб змінити в плані."
    error: "щоб"
    correction: "що б"
    options: ["що б", "щоб", "якби", "бо"]
    explanation: "Тут потрібен займенник що з часткою б."
  - sentence: "Коли зустріч завершилася координатор розіслав матеріали."
    error: "завершилася координатор"
    correction: "завершилася, координатор"
    options: ["завершилася, координатор", "завершилася координатор", "завершилася; координатор", "завершилася або координатор"]
    explanation: "Кома закриває підрядну частину."
  - sentence: "Ми відкрили форму для того щоб слухачі поставили запитання."
    error: "для того щоб"
    correction: "для того, щоб"
    options: ["для того, щоб", "для того щоб", "для, того щоб", "для того; щоб"]
    explanation: "Розчленована цільова конструкція може мати кому після того."

- id: subordination-essay
  type: essay-response
  title: "Письмо: аргумент із підрядними зв'язками"
  instruction: "Напишіть 180-220 слів про зміну в освітньому, міському або культурному проєкті."
  prompt: >-
    Використайте щонайменше одну причинову, одну умовну, одну допустову
    і одну цільову підрядну конструкцію. Додайте одне сполучне слово
    який/де/коли/що у підрядній частині. Після абзацу коротко поясніть
    функцію кожного засобу зв'язку.
  min_words: 180
  model_answer: |-
    > [!model-answer]
    > Міська бібліотека змінила формат мовних зустрічей, тому що частина
    > учасників не могла регулярно приходити ввечері. Якщо група працюватиме
    > лише очно, організатори втратять слухачів, які живуть далеко від
    > центру. Тому команда відкрила онлайн-реєстрацію, щоб кожен міг
    > заздалегідь поставити запитання й отримати матеріали. Хоча бюджет
    > був обмежений, волонтери підготували короткі інструкції, у яких
    > пояснили новий порядок роботи. Тому що вводить причину зміни, якщо
    > формулює умову, щоб називає мету, хоча вводить допуст, а які та
    > у яких є сполучними словами, бо виконують роль у підрядних частинах.
  rubric:
  - criteria: "Типи підрядності"
    description: "Є причина, умова, допуст, мета і хоча б одне сполучне слово."
    points: 2
  - criteria: "Пунктуація"
    description: "Підрядні частини відокремлені комами відповідно до позиції."
    points: 2
  - criteria: "Регістр і ясність"
    description: "Складені сполучники доречні, речення не перевантажені."
    points: 1
