- type: reading
  id: subordinating-reading
  title: "Читання: підрядність у поясненні соціальної зміни"
  instruction: "Прочитайте аналітичний уривок і визначте, як підрядні засоби зв'язку будують аргумент."
  source: "Навчальний уривок для модуля B2."
  text: >-
    Коли громадська організація відкрила консультації для мешканців,
    команда швидко побачила, що попередній план не враховував кількох
    важливих груп. Частина учасників просила простіших онлайн-форм,
    тому що не всі могли прийти до центру міста. Інші підтримували
    очні зустрічі, незважаючи на те що дорога займала багато часу.
    Організатори змінили календар, щоб кожна група мала реальну
    можливість висловитися. У міру того як надходили нові пропозиції,
    план ставав точнішим, а пояснювальна записка - переконливішою.
  tasks:
  - "Знайдіть часову підрядну частину і поясніть, яку межу події вона задає."
  - "Випишіть причиновий сполучник і визначте, яку дію він пояснює."
  - "Знайдіть допустову конструкцію та переформулюйте її зі словом хоча."
  - "Поясніть, чому у фрагменті у міру того як не можна просто замінити на коли без втрати змісту."

- type: quiz
  title: "Семантичні групи підрядності"
  instruction: "Оберіть правильне пояснення або найточнішу редакцію речення."
  items:
  - question: "У якому реченні підрядна частина виражає причину?"
    options:
    - text: "Зустріч перенесли, тому що частина учасників не встигла приїхати."
      correct: true
    - text: "Зустріч перенесуть, якщо частина учасників не встигне приїхати."
      correct: false
    - text: "Зустріч перенесли, щоб учасники мали час прочитати матеріали."
      correct: false
    - text: "Зустріч перенесли, хоча зал уже був заброньований."
      correct: false
    explanation: "Тому що вводить причину вже ухваленого рішення."
  - question: "Яка конструкція найточніше передає допуст?"
    options:
    - text: "Незважаючи на те що фінансування скоротили, команда завершила дослідження."
      correct: true
    - text: "Через те що фінансування скоротили, команда завершила дослідження."
      correct: false
    - text: "Для того щоб фінансування скоротили, команда завершила дослідження."
      correct: false
    - text: "У міру того як фінансування скоротили, команда завершила дослідження."
      correct: false
    explanation: "Допуст показує дію попри перешкоду."
  - question: "Де слово що є сполучним словом, а не лише сполучником?"
    options:
    - text: "Я бачу те, що змінило рішення комісії."
      correct: true
    - text: "Я бачу, що комісія змінила рішення."
      correct: false
    - text: "Ми домовилися, що зустріч буде короткою."
      correct: false
    - text: "Вона сказала, що дані ще перевіряють."
      correct: false
    explanation: "У першому реченні що виконує роль підмета в підрядній частині."
  - question: "Яке речення правильно використовує щоб?"
    options:
    - text: "Команда відкрила консультації, щоб мешканці могли поставити запитання."
      correct: true
    - text: "Щоб команда не обрала, рішення треба пояснити."
      correct: false
    - text: "Щоб ви порадили в цій ситуації?"
      correct: false
    - text: "Я не знаю, щоб саме змінило план."
      correct: false
    explanation: "Разом щоб виражає мету; в інших прикладах потрібне що б або що."
  - question: "У якому реченні якби треба писати разом?"
    options:
    - text: "Якби команда мала більше часу, вона перевірила б усі джерела."
      correct: true
    - text: "Якби ви пояснили це першокурсникам?"
      correct: false
    - text: "Я не знаю, якби краще подати таблицю."
      correct: false
    - text: "Покажіть, якби працює нова форма."
      correct: false
    explanation: "Разом якби вводить умову."
  - question: "Яка редакція найкраща для позитивної причини?"
    options:
    - text: "Завдяки тому що архів оцифрував матеріали, дослідники працювали дистанційно."
      correct: true
    - text: "Завдяки тому що сталася помилка, дедлайн перенесли."
      correct: false
    - text: "Через те щоб архів оцифрував матеріали, дослідники працювали дистанційно."
      correct: false
    - text: "Дарма що архів оцифрував матеріали, дослідники працювали дистанційно."
      correct: false
    explanation: "Завдяки тому що називає сприятливу причину."
  - question: "Яке речення найкраще показує поступову залежність?"
    options:
    - text: "У міру того як надходили відгуки, команда уточнювала план."
      correct: true
    - text: "Бо надходили відгуки, команда уточнювала план."
      correct: false
    - text: "Щоб надходили відгуки, команда уточнювала план."
      correct: false
    - text: "Дарма що надходили відгуки, команда уточнювала план."
      correct: false
    explanation: "У міру того як описує паралельний розвиток двох процесів."
  - question: "Де коли має умовне, а не часове значення?"
    options:
    - text: "Коли команда не встигне перевірити дані, звіт краще відкласти."
      correct: true
    - text: "Коли завершилася зустріч, учасники підписали протокол."
      correct: false
    - text: "Коли архів відкрився, дослідники повернулися до роботи."
      correct: false
    - text: "Коли почалася лекція, аудиторія вже була повна."
      correct: false
    explanation: "У першому реченні коли близьке до якщо."
  - question: "Який варіант прибирає небажану кальку по мірі того як?"
    options:
    - text: "У міру того як місто розширювало веломережу, мешканці частіше їздили без авто."
      correct: true
    - text: "По мірі того як місто розширювало веломережу, мешканці частіше їздили без авто."
      correct: false
    - text: "В мірі того як місто розширювало веломережу, мешканці частіше їздили без авто."
      correct: false
    - text: "Мірою того що місто розширювало веломережу, мешканці частіше їздили без авто."
      correct: false
    explanation: "Нормативна навчальна форма - у міру того як."
  - question: "Яке речення має послідовну підрядність?"
    options:
    - text: "Ми знали, що якщо дані підтвердяться, команда змінить рекомендацію."
      correct: true
    - text: "Коли зустріч завершилася, ми надіслали документ."
      correct: false
    - text: "Документ, який ми надіслали, був короткий."
      correct: false
    - text: "Ми пояснили, чому змінили календар і чому додали консультацію."
      correct: false
    explanation: "Умова з якщо вкладена в з'ясувальну частину з що."
  - question: "Яка редакція найприродніша для нейтрального зіставлення?"
    options:
    - text: "Одні учасники підтримали онлайн-формат, тоді як інші просили очних зустрічей."
      correct: true
    - text: "Одні учасники підтримали онлайн-формат, в той час як інші просили очних зустрічей."
      correct: false
    - text: "Одні учасники підтримали онлайн-формат, по мірі того як інші просили очних зустрічей."
      correct: false
    - text: "Одні учасники підтримали онлайн-формат, щоб інші просили очних зустрічей."
      correct: false
    explanation: "Тоді як часто коротше і природніше для нейтрального зіставлення."
  - question: "Яке речення правильно передає мету, а не причину?"
    options:
    - text: "Ми додали приклади, щоб читачі швидше побачили різницю."
      correct: true
    - text: "Ми додали приклади, бо читачі швидше побачили різницю."
      correct: false
    - text: "Ми додали приклади, хоча читачі швидше побачили різницю."
      correct: false
    - text: "Ми додали приклади, коли читачі швидше побачили різницю."
      correct: false
    explanation: "Щоб називає бажаний результат дії."

- type: fill-in
  title: "Добір підрядного засобу зв'язку"
  instruction: "Заповніть пропуски найдоречнішим сполучником або складеною конструкцією."
  items:
  - sentence: "Команда перенесла презентацію, ____ частина експертів попросила більше часу на рецензію."
    answer: "тому що"
    options: ["тому що", "щоб", "хоча", "у міру того як"]
    explanation: "Підрядна частина пояснює причину перенесення."
  - sentence: "____ бюджет залишався обмеженим, організатори зберегли безкоштовну реєстрацію."
    answer: "Незважаючи на те що"
    options: ["Незважаючи на те що", "Через те що", "Для того щоб", "Після того як"]
    explanation: "Йдеться про дію попри перешкоду."
  - sentence: "Ми відкрили додаткову групу, ____ слухачі з черги могли долучитися."
    answer: "щоб"
    options: ["щоб", "бо", "хоча", "коли"]
    explanation: "Підрядна частина називає мету."
  - sentence: "____ надходили нові заявки, координатори уточнювали графік консультацій."
    answer: "У міру того як"
    options: ["У міру того як", "Дарма що", "Завдяки тому що", "Незважаючи на те що"]
    explanation: "Дві дії розвиваються паралельно."
  - sentence: "____ архів оцифрував документи, дослідники змогли працювати дистанційно."
    answer: "Завдяки тому що"
    options: ["Завдяки тому що", "Через те що", "Хоча", "Якби"]
    explanation: "Причина позитивна, тому завдяки тому що доречне."
  - sentence: "____ команда не отримає підтвердження до п'ятниці, звіт краще не публікувати."
    answer: "Якщо"
    options: ["Якщо", "Бо", "Хоч", "Щоб"]
    explanation: "Підрядна частина задає умову."
  - sentence: "Редактор пояснив, ____ саме треба змінити в другому абзаці."
    answer: "що"
    options: ["що", "щоб", "бо", "хоча"]
    explanation: "Тут що є сполучним словом: змінити що?"
  - sentence: "Поясніть, ____ працює новий механізм подання заявок."
    answer: "як"
    options: ["як", "бо", "хоч", "аби"]
    explanation: "Як виконує роль сполучного слова способу дії."
  - sentence: "____ було більше часу, ми перевірили б усі посилання."
    answer: "Якби"
    options: ["Якби", "Як би", "Що б", "Щоб"]
    explanation: "Разом якби вводить умову."
  - sentence: "____ ви порадили авторам, якщо обсяг тексту вже перевищено?"
    answer: "Що б"
    options: ["Що б", "Щоб", "Якби", "Аби"]
    explanation: "Питальне що з часткою б пишеться окремо."
  - sentence: "Учасники підтримали короткий формат, ____ просили залишити час для запитань."
    answer: "хоча"
    options: ["хоча", "тому що", "для того щоб", "після того як"]
    explanation: "Друга частина обмежує або уточнює першу через допуст."
  - sentence: "____ зустріч завершилася, модератор надіслав усім спільний протокол."
    answer: "Коли"
    options: ["Коли", "Якщо", "Щоб", "Дарма що"]
    explanation: "Тут коли має часове значення."

- type: error-correction
  title: "Редагування: підрядні сполучники і коми"
  instruction: "Виправте помилку в підрядному засобі зв'язку, написанні або пунктуації."
  items:
  - sentence: "Ми додали консультацію, бо учасники могли поставити запитання."
    error: "бо"
    correction: "Ми додали консультацію, щоб учасники могли поставити запитання."
    explanation: "Йдеться про мету, а не причину."
  - sentence: "Щоб команда не вирішила, календар треба пояснити публічно."
    error: "Щоб"
    correction: "Що б команда не вирішила, календар треба пояснити публічно."
    explanation: "У значенні будь-яке рішення пишемо що б окремо."
  - sentence: "Як би ми мали більше часу, ми перевірили б усі джерела."
    error: "Як би"
    correction: "Якби ми мали більше часу, ми перевірили б усі джерела."
    explanation: "Умовний сполучник якби пишеться разом."
  - sentence: "По мірі того як надходили відгуки, план ставав точнішим."
    error: "По мірі того як"
    correction: "У міру того як надходили відгуки, план ставав точнішим."
    explanation: "Нормативна форма - у міру того як."
  - sentence: "Не дивлячись на те що дощ посилився, волонтери завершили маршрут."
    error: "Не дивлячись на те що"
    correction: "Незважаючи на те що дощ посилився, волонтери завершили маршрут."
    explanation: "Для допусту вживаємо незважаючи на те що."
  - sentence: "Завдяки тому що сталася помилка, дедлайн перенесли."
    error: "Завдяки тому що"
    correction: "Через те що сталася помилка, дедлайн перенесли."
    explanation: "Негативна причина не потребує завдяки."
  - sentence: "Команда відкрила простір для того щоб мешканці могли поставити запитання."
    error: "для того щоб"
    correction: "Команда відкрила простір для того, щоб мешканці могли поставити запитання."
    explanation: "Розчленована конструкція потребує коми після того."
  - sentence: "Ми знали, що, якщо дані підтвердяться, команда змінить рекомендацію."
    error: "що, якщо"
    correction: "Ми знали, що якщо дані підтвердяться, команда змінить рекомендацію."
    explanation: "У цій вкладеній конструкції кома між що і якщо не потрібна."
  - sentence: "Документ який ми обговорювали вчора потребує правок."
    error: "Документ який"
    correction: "Документ, який ми обговорювали вчора, потребує правок."
    explanation: "Означальна підрядна частина відокремлюється комами."
  - sentence: "Я вивчаю українську, щоб живу в Україні."
    error: "щоб"
    correction: "Я вивчаю українську, бо живу в Україні."
    explanation: "Жити в Україні тут причина, а не мета."
  - sentence: "Коли команда не встигне перевірити дані звіт краще відкласти."
    error: "дані звіт"
    correction: "Коли команда не встигне перевірити дані, звіт краще відкласти."
    explanation: "Підрядна частина умови відокремлюється комою."
  - sentence: "Одні учасники підтримали онлайн-формат, в той час як інші просили очних зустрічей."
    error: "в той час як"
    correction: "Одні учасники підтримали онлайн-формат, тоді як інші просили очних зустрічей."
    explanation: "Для нейтрального зіставлення коротше тоді як часто природніше."

