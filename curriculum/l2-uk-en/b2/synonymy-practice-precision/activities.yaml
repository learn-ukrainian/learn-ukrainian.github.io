- id: wb-critical-context
  type: critical-analysis
  title: Чи потрібна заміна?
  instruction: Проаналізуйте уривок і вирішіть, де повтор треба залишити, а де замінити.
  target_text: "Категоризація допомагає людині впорядковувати досвід. У процесі категоризації мовець виділяє спільні ознаки. Цей гарний процес сильно впливає на мислення."
  questions:
  - "Який повтор є термінологічно виправданим?"
  - "Які слова треба уточнити?"
