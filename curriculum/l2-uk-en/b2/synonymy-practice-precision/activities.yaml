inline:
- id: act-1
  type: comparative-study
  title: Одна оцінка чи різні ознаки?
  instruction: Порівняйте чотири варіанти й визначте, яку ознаку додає кожен синонім.
  items_to_compare:
  - "Вона написала гарний текст для сайту."
  - "Вона написала влучний текст для сайту."
  - "Вона написала красивий текст для сайту."
  - "Вона написала досконалий текст для сайту."
  criteria:
  - семантичне ядро
  - диференційна ознака
  - жанр
  - ризик перебільшення
  prompt: "Який варіант найточніше підходить для інструкції на сайті, а який для естетичної оцінки есе? Поясніть через ознаку, а не через переклад."
  model_answer: >-
    Для інструкції найчастіше підійде **влучний** або **ясний**, бо важлива відповідність меті й адресатові. **Красивий** доречний для естетичної оцінки есе або художнього фрагмента. **Гарний** занадто загальний, якщо треба назвати критерій. **Досконалий** може бути перебільшенням, якщо немає доказу повної бездоганності.
- id: act-2
  type: critical-analysis
  title: Колокаційний вибір
  instruction: Проаналізуйте приклади й поясніть рішення через значення, регістр і контекст.
  target_text: Комісія ухвалила рішення. Вагомий аргумент підтримує тезу. Міцна кава не є сильною кавою в нейтральному стилі.
  questions:
  - Який принцип об’єднує ці приклади?
  - Який варіант був би недоречним у формальнішому тексті?
  - Яке коротке правило можна вивести з прикладів?
  model_answers:
  - Рішення залежить від значення, типової сполучуваності й комунікативної функції вислову.
  - Недоречним буде варіант, який змінює регістр, створює кальку або переносить прислів’я в невідповідну ситуацію.
  - 'Коротке правило: спершу визначаємо функцію і контекст, а вже потім добираємо слово, прислів’я або сталий вислів.'
- id: act-3
  type: critical-analysis
  title: Паронімічний ризик
  instruction: Проаналізуйте приклади й поясніть рішення через значення, регістр і контекст.
  target_text: Абонент користується послугою, абонемент дає право на відвідування. Кампанія є організованою дією, компанія є групою або бізнесом.
  questions:
  - Як контекст відрізняє пароніми?
  - Який варіант був би недоречним у формальнішому тексті?
  - Яке коротке правило можна вивести з прикладів?
  model_answers:
  - Рішення залежить від значення, типової сполучуваності й комунікативної функції вислову.
  - Недоречним буде варіант, який змінює регістр, створює кальку або переносить прислів’я в невідповідну ситуацію.
  - 'Коротке правило: спершу визначаємо функцію і контекст, а вже потім добираємо слово, прислів’я або сталий вислів.'
- id: act-4
  type: critical-analysis
  title: Компресія як редакторське рішення
  instruction: Проаналізуйте приклади й поясніть рішення через значення, регістр і контекст.
  target_text: Редактор залишає термінологічний повтор, прибирає плеоназм і стискає зайву іменникову конструкцію без втрати регістру.
  questions:
  - Коли скорочення поліпшує текст, а коли шкодить?
  - Який варіант був би недоречним у формальнішому тексті?
  - Яке коротке правило можна вивести з прикладів?
  model_answers:
  - Рішення залежить від значення, типової сполучуваності й комунікативної функції вислову.
  - Недоречним буде варіант, який змінює регістр, створює кальку або переносить прислів’я в невідповідну ситуацію.
  - 'Коротке правило: спершу визначаємо функцію і контекст, а вже потім добираємо слово, прислів’я або сталий вислів.'
- id: act-5
  type: critical-analysis
  title: Редакторська карта абзацу
  instruction: Проаналізуйте абзац і запропонуйте точнішу редакцію.
  target_text: "Цей гарний підхід сильно впливає на навчання, бо робить хорошу роботу з виправлення поганих слів. Студент має зробити аналіз прикладів і підібрати красиві синоніми."
  questions:
  - "Які слова занадто загальні або розмиті?"
  - "Які конструкції можна стиснути?"
  - "Які синоніми краще вибрати для навчального контексту?"
  - "Що треба зберегти, щоб абзац не став занадто офіційним?"
