  title: Поясніть вибір синоніма
  instruction: Напишіть 120-160 слів про те, чому синонім не можна вибирати тільки за перекладом.
  prompt: "Поясніть на прикладах роль сполучуваності, регістру й квазісинонімів у точному слововживанні."
  model_answer: |
    > [!model-answer]
    > Синонім не можна вибирати тільки за перекладом, бо слово живе в конкретному реченні. Англійське *good* може відповідати українським **гарний**, **добрий**, **вдалий**, **якісний**, **переконливий**, але ці варіанти називають різні ознаки. Для навчального тексту природніше **вдалий приклад**, ніж **красивий приклад**, бо важлива не краса, а відповідність меті. Сполучуваність теж обмежує вибір: кажемо **міцна кава**, **вагомий аргумент**, **ухвалити рішення**. Квазісиноніми створюють ще тонший ризик: **причина**, **підстава**, **мотив** і **привід** не однакові. Тому точний вибір синоніма потребує трьох перевірок: що саме слово додає, з чим воно природно поєднується і який регістр очікує адресат.
