  - 'Ризикові слова: **гарний**, **сильно**, **хорошу**, **поганих**, **красиві**. Конструкцію **зробити аналіз** можна стиснути до **проаналізувати**. Можлива редакція: **Цей підхід ефективний, бо допомагає студентам точніше розрізняти неточні слова, пароніми й квазісиноніми. Студент аналізує приклади та добирає доречні синоніми для конкретного жанру.** Тут збережено навчальний тон і додано критерії точності.'
