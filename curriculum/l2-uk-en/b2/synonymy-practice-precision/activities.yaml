workbook:
- type: quiz
  title: Перевірка точності
  instruction: Виберіть правильне пояснення.
  items:
  - question: "Чому **гарний аргумент** часто слабше за **вагомий аргумент**?"
    options:
    - text: "Бо вагомий називає переконливість або силу доказу."
      correct: true
    - text: "Бо гарний є завжди грубим словом."
      correct: false
    - text: "Бо аргументи не можна оцінювати."
      correct: false
    - text: "Бо вагомий означає красивий."
      correct: false
    explanation: "Вагомий точніше називає функцію аргументу."
  - question: "Що перевіряє колокація?"
    options:
    - text: "Чи природно слова поєднуються між собою."
      correct: true
    - text: "Чи слово має латинське походження."
      correct: false
    - text: "Чи речення має риму."
      correct: false
    - text: "Чи синонім довший за домінанту."
      correct: false
    explanation: "Колокація стосується типових словесних партнерств."
  - question: "Що таке квазісинонім?"
    options:
    - text: "Слово, яке здається синонімом, але збігається лише частково."
      correct: true
    - text: "Слово, яке звучить однаково в усіх мовах."
      correct: false
    - text: "Будь-який термін у словнику."
      correct: false
    - text: "Завжди груба помилка правопису."
      correct: false
    explanation: "Квазісинонім створює ризик зміщення значення."
  - question: "Коли повтор краще залишити?"
    options:
    - text: "Коли це потрібний термін або навмисний паралелізм."
      correct: true
    - text: "Коли автор хоче приховати думку."
      correct: false
    - text: "Коли слово можна замінити будь-чим."
      correct: false
    - text: "Коли повтор випадковий."
      correct: false
    explanation: "Термінологічний повтор підтримує точність."
  - question: "Який варіант є плеоназмом?"
    options:
    - text: "спільна співпраця"
      correct: true
    - text: "точна відповідь"
      correct: false
    - text: "міцна кава"
      correct: false
    - text: "вагомий аргумент"
      correct: false
    explanation: "Співпраця вже передбачає спільність."
  - question: Що краще для офіційного документа?
    options:
    - text: вжити заходів
      correct: true
    - text: взяти міри
      correct: false
    - text: зробити міри
      correct: false
    - text: підняти міри
      correct: false
    explanation: 'Нормативна офіційна формула: вжити заходів.'
  - question: Яке слово називає надмірне дублювання змісту?
    options:
    - text: плеоназм
      correct: true
    - text: паронім
      correct: false
    - text: абонент
      correct: false
    - text: привід
      correct: false
    explanation: Плеоназм дублює вже наявний зміст.
  - question: Що є квазісинонімом до причини в юридичному контексті?
    options:
    - text: підстава
      correct: true
    - text: кава
      correct: false
    - text: адрес
      correct: false
    - text: ефект
      correct: false
    explanation: Підстава дає право або аргумент.
  - question: Яка форма природна?
    options:
    - text: порушити питання
      correct: true
    - text: виготовити питання
      correct: false
    - text: зварити питання
      correct: false
    - text: підсмажити питання
      correct: false
    explanation: Питання в дискусії порушують або ставлять.
  - question: Що треба перевіряти поруч із синонімом?
    options:
    - text: сполучуваність
      correct: true
    - text: колір шрифту
      correct: false
    - text: довжину абзацу
      correct: false
    - text: номер сторінки
      correct: false
    explanation: Синонім має природно поєднуватися з сусідніми словами.
- type: fill-in
  title: Доберіть природне слово
  instruction: Заповніть пропуски найточнішим варіантом.
  items:
  - sentence: "У документі комісія ____ рішення."
    answer: "ухвалила"
    options:
    - "ухвалила"
    - "виготовила"
    - "намалювала"
    - "зварила"
    explanation: "Рішення в офіційному контексті ухвалюють."
  - sentence: "Для кави природна колокація: ____ кава."
    answer: "міцна"
    options:
    - "міцна"
    - "гостра"
    - "вагома"
    - "правдива"
    explanation: "Міцна кава є усталеним поєднанням."
  - sentence: "У героя може бути прихований ____ учинку."
    answer: "мотив"
    options:
    - "мотив"
    - "адрес"
    - "абонемент"
    - "кава"
    explanation: "Мотив належить людині або персонажу."
  - sentence: "Для юридичної відмови потрібна достатня ____."
    answer: "підстава"
    options:
    - "підстава"
    - "пика"
    - "злива"
    - "краса"
    explanation: "Підстава дає право або аргумент для дії."
  - sentence: "Передвиборча ____ тривала два місяці."
    answer: "кампанія"
    options:
    - "кампанія"
    - "компанія"
    - "компресія"
    - "конотація"
    explanation: "Кампанія - організована дія."
  - sentence: "Надмірне дублювання значення називається ____."
    answer: "плеоназм"
    options:
    - "плеоназм"
    - "абонент"
    - "жанр"
    - "регістр"
    explanation: "Плеоназм дублює зміст компонентів."
  - sentence: Для офіційної відмови потрібна достатня ____.
    answer: підстава
    options:
    - підстава
    - мотив
    - абонент
    - ефект
    explanation: Підстава дає право або аргумент для дії.
  - sentence: Яскравий виступ може бути ____, але не обов'язково результативним.
    answer: ефектним
    options:
    - ефектним
    - ефективним
    - особовим
    - адресним
    explanation: Ефектний справляє враження.
  - sentence: Метод, який дав результат, є ____.
    answer: ефективним
    options:
    - ефективним
    - ефектним
    - особистим
    - кампанійним
    explanation: Ефективний означає результативний.
  - sentence: Людина, яка користується послугою зв'язку, - це ____.
    answer: абонент
    options:
    - абонент
    - абонемент
    - адрес
    - плеоназм
    explanation: Абонент є користувачем послуги.
