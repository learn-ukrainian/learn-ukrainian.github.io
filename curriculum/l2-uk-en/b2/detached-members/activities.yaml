  - id: "wb-essay-detached-focus"
    type: essay-response
    title: "Деталізація без перевантаження"
    instruction: "Напишіть 150-180 слів про подію в університеті або громаді."
    prompt: "Опишіть подію, використавши щонайменше п'ять відокремлених конструкцій різних типів: означення, прикладку, дієприслівниковий зворот, виняток або зіставлення, уточнення місця чи часу. Поясніть, як вони змінюють фокус."
    min_words: 150
    model_answer: "У суботу волонтери зібралися в бібліотеці, на другому поверсі, щоб підготувати зустріч із переселенцями. Координаторка, пані Олена, коротко розподілила ролі й перевірила списки. Матеріали, надруковані напередодні, лежали на окремому столі, тому учасники швидко знаходили потрібні анкети. Перевіривши обладнання, технічна група відкрила реєстрацію. Усі, крім двох запрошених експертів, прийшли вчасно, і це дало змогу почати без затримки. На відміну від попередньої зустрічі, цього разу в програмі було більше практичних порад. Відокремлені конструкції не просто прикрашають текст: вони додають тло, уточнюють місце, пояснюють роль людей і показують винятки. Якщо прибрати коми й ці додаткові частини, опис стане коротшим, але втратить логіку події та людські деталі."
    rubric:
      - criteria: "Різноманітність конструкцій"
        description: "Є щонайменше п'ять відокремлених конструкцій різних типів."
        points: 4
      - criteria: "Пунктуація і керування"
        description: "Коми та відмінки після крім, окрім, на відміну від ужито нормативно."
        points: 4
      - criteria: "Фокус і зв'язність"
        description: "Текст пояснює, як відокремлені частини додають тло, уточнення або оцінку."
        points: 4
