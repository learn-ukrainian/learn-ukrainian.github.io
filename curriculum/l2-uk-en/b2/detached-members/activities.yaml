            correct: true
          - text: Зустрінемося завтра, о дев'ятій ранку.
            correct: true
          - text: У Львові вчора почалася екскурсія.
            correct: false
          - text: У бібліотеці голосно розмовляли студенти.
            correct: false
          - text: Команда працювала швидко й уважно.
            correct: false
      - question: Де кома не потрібна?
        min_correct: 2
        options:
          - text: Підготовлений командою звіт оприлюднили.
            correct: true
          - text: Місто Львів має давні традиції.
            correct: true
          - text: Звіт, підготовлений командою, оприлюднили.
            correct: false
          - text: Олена, координаторка події, надішле програму.
            correct: false
