  - type: error-correction
    title: Відредагуй перевантажені речення
    instruction: Обери варіант, який зберігає зміст і полегшує структуру.
    items:
      - sentence: Координаторка, втомлена після дороги, перевіривши списки, разом із волонтерами, біля входу, пояснила правила.
        error: втомлена після дороги, перевіривши списки, разом із волонтерами, біля входу
        correction: Координаторка втомилася після дороги, але перевірила списки разом із волонтерами. Біля входу вона пояснила правила.
        options:
          - Координаторка втомилася після дороги, але перевірила списки разом із волонтерами. Біля входу вона пояснила правила.
          - Координаторка, втомлена, після дороги, перевіривши, списки пояснила, правила.
          - Координаторка після дороги волонтерами списки пояснила правила.
          - Координаторка, біля входу, разом, із волонтерами, правила.
        explanation: Поділ на два речення знімає надмір відокремлень і зберігає логіку.
      - sentence: Підписавши договір, умови стали зрозумілими.
        error: умови стали
        correction: Підписавши договір, сторони краще зрозуміли умови.
        options:
          - Підписавши договір, сторони краще зрозуміли умови.
