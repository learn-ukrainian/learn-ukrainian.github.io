  - type: reading
    id: detached-reading-editor
    title: 'Мінітекст: редакторський вибір'
    instruction: Прочитай два варіанти й поясни, де відокремлення справді допомагає стилю.
    text: 'Варіант А: Заявку, подану 12 червня, розглянуть до кінця тижня. Після консультації з юристами комісія надішле відповідь. Варіант Б: Заявку, важливу й цікаву, розглянуть, після консультації, до кінця тижня. Комісія, уважна, надішле відповідь.'
    tasks:
      - Поясни, чому перше відокремлене означення у варіанті А корисне.
      - Знайди штучне відокремлення у варіанті Б.
      - Запропонуй один відредагований варіант другого речення.
      - Назви конструкцію, яка в офіційному тексті звучить найточніше.

