version: '1.0'
module: detached-members
level: b2
inline:
  - type: select
    title: "Навіщо тут відокремлення?"
    instruction: "Виберіть речення, де коми справді змінюють фокус або позначають додаткову деталь."
    items:
      - question: "Де відокремлена частина додає тло, а не потрібна для впізнавання предмета?"
        min_correct: 2
        options:
          - text: "Звіт, підготовлений після консультацій, оприлюднили вранці."
            correct: true
          - text: "Підготовлений після консультацій звіт оприлюднили вранці."
            correct: false
          - text: "Команда, втомлена після дороги, працювала повільніше."
            correct: true
          - text: "Новий, звіт оприлюднили вранці."
            correct: false
      - question: "Де прикладка пояснює, ким є названа особа?"
        min_correct: 2
        options:
          - text: "Олена Марчук, координаторка проєкту, відкрила зустріч."
            correct: true
          - text: "Координаторка проєкту Олена Марчук відкрила зустріч."
            correct: false
          - text: "Пан Сорока, наш перекладач, уточнив термін."
            correct: true
          - text: "Наш, перекладач уточнив термін."
            correct: false
      - question: "Де дієприслівниковий зворот має спільного виконавця з основною дією?"
        min_correct: 2
        options:
          - text: "Перевіривши списки, волонтери роздали матеріали."
            correct: true
          - text: "Перевіривши списки, матеріали роздали волонтери."
            correct: false
          - text: "Повернувшись із відрядження, дослідниця написала звіт."
            correct: true
          - text: "Повернувшись із відрядження, звіт було написано швидко."
            correct: false
      - question: "Де відокремлений додаток називає виняток або зіставлення?"
        min_correct: 2
        options:
          - text: "Усі, крім Марини, погодилися з висновком."
            correct: true
          - text: "Усі крім Марина погодилися з висновком."
            correct: false
          - text: "На відміну від чернетки, фінальна версія містить таблиці."
            correct: true
          - text: "На відміну чернетки фінальна версія містить таблиці."
            correct: false
      - question: "Де уточнення місця звужує попередню обставину?"
        min_correct: 2
        options:
          - text: "У центрі міста, біля ратуші, чекали учасники."
            correct: true
          - text: "Біля ратуші в центрі міста чекали учасники."
            correct: false
          - text: "У бібліотеці, на другому поверсі, відкрили виставку."
            correct: true
          - text: "На другому, поверсі відкрили виставку."
            correct: false
      - question: "Де коми створюють небажане відокремлення?"
        min_correct: 2
        options:
          - text: "Підготовлений експертами, проєкт обговорили на засіданні."
            correct: true
          - text: "Проєкт, підготовлений експертами, обговорили на засіданні."
            correct: false
          - text: "Новий, документ надіслали вчора."
            correct: true
          - text: "Документ, новий і докладний, надіслали вчора."
            correct: false
      - question: "Де відокремлення змінює оцінку або причину?"
        min_correct: 2
        options:
          - text: "Виснажений дорогою, водій зупинився біля станції."
            correct: true
          - text: "Виснажений дорогою водій зупинився біля станції."
            correct: false
          - text: "Здивована новиною, група замовкла."
            correct: true
          - text: "Здивована новиною група замовкла."
            correct: false
      - question: "Де відокремлена частина не руйнує потрібне означення?"
        min_correct: 2
        options:
          - text: "Документ, який підписали вчора, уже надіслали."
            correct: true
          - text: "Підписаний, документ уже надіслали."
            correct: false
          - text: "Стаття, опублікована в журналі, спричинила дискусію."
            correct: true
          - text: "Опублікована, стаття спричинила дискусію."
            correct: false
  - type: fill-in
    title: "Позиція означення"
    instruction: "Добери перебудову, у якій означення після іменника стає відокремленим."
    items:
      - sentence: "Підготовлений експертами проєкт обговорили. -> Проєкт, ____, обговорили."
        answer: "підготовлений експертами"
        options: ["підготовлений експертами", "підготовленим експертами", "підготували експерти", "експертно підготовка"]
      - sentence: "Створена для архіву копія зберігається окремо. -> Копія, ____, зберігається окремо."
        answer: "створена для архіву"
        options: ["створена для архіву", "створено для архіву", "створивши архів", "архів створена"]
      - sentence: "Виснажені дорогою учасники мовчали. -> Учасники, ____, мовчали."
        answer: "виснажені дорогою"
        options: ["виснажені дорогою", "виснажено дорогою", "виснаживши дорогу", "дорога виснажені"]
      - sentence: "Опублікована торік стаття досі актуальна. -> Стаття, ____, досі актуальна."
        answer: "опублікована торік"
        options: ["опублікована торік", "опублікувавши торік", "торік опубліковано", "стаття торік"]
      - sentence: "Написаний поспіхом лист містив помилки. -> Лист, ____, містив помилки."
        answer: "написаний поспіхом"
        options: ["написаний поспіхом", "написавши поспіхом", "поспіх написаний", "було написаний"]
      - sentence: "Зацікавлені темою вони залишилися після лекції. -> ____, вони залишилися після лекції."
        answer: "Зацікавлені темою"
        options: ["Зацікавлені темою", "Зацікавлено темою", "Зацікавивши тему", "Темою зацікавити"]
      - sentence: "Відредагований уночі текст потребує перевірки. -> Текст, ____, потребує перевірки."
        answer: "відредагований уночі"
        options: ["відредагований уночі", "відредаговано уночі", "редагуючи ніч", "уночі текстовий"]
      - sentence: "Зібрана волонтерами інформація допомогла команді. -> Інформація, ____, допомогла команді."
        answer: "зібрана волонтерами"
        options: ["зібрана волонтерами", "зібрано волонтерами", "волонтери зібравши", "збір волонтерів"]
      - sentence: "Надрукована дрібним шрифтом примітка загубилася. -> Примітка, ____, загубилася."
        answer: "надрукована дрібним шрифтом"
        options: ["надрукована дрібним шрифтом", "надруковано дрібним шрифтом", "шрифт дрібно надрукував", "дрібним друкована"]
      - sentence: "Повернені без підпису документи знову перевіряють. -> Документи, ____, знову перевіряють."
        answer: "повернені без підпису"
        options: ["повернені без підпису", "повернуто без підпису", "без підпису повертаючи", "повернення без підпис"]
