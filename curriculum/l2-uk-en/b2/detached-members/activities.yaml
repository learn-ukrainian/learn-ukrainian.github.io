workbook:
  - type: reading
    id: detached-reading-report
    title: 'Текст для читання: звіт після події'
    instruction: Прочитай уривок і знайди всі відокремлені члени речення.
    text: 'Команда, втомлена після дороги, зібралася біля входу до бібліотеки. Координаторка, Олена Марчук, коротко пояснила план зустрічі. Перевіривши списки, волонтери роздали матеріали учасникам. Усі, крім двох запрошених експертів, прийшли вчасно. У центрі міста, біля ратуші, уже чекала друга група. Звіт, підготовлений після консультацій, надіслали редакторові ввечері.'
    tasks:
      - Знайди відокремлене означення.
      - Знайди прикладку й поясни, чому вона виділена комами.
      - Знайди дієприслівниковий зворот і назви його виконавця.
      - Знайди відокремлений додаток із винятком.
      - Знайди уточнення місця.

  - type: match-up
    title: Тип відокремленої конструкції
    instruction: Зістав приклад із типом відокремленого члена речення.
    pairs:
      - left: Звіт, підготовлений командою, оприлюднили.
        right: відокремлене означення
      - left: Олена, координаторка події, надішле програму.
        right: прикладка
      - left: Перевіривши джерела, автор уточнив дату.
        right: відокремлена обставина
      - left: Усі, крім Марини, були готові.
        right: відокремлений додаток
      - left: У Львові, на площі Ринок, почалася екскурсія.
        right: уточнення місця
      - left: Зустрінемося завтра, о дев'ятій ранку.
        right: уточнення часу
      - left: Втомлені після дороги, ми мовчали.
        right: означення при займеннику
      - left: Попри втому, команда завершила роботу.
        right: обставина допусту
      - left: На відміну від чернетки, фінальна версія точна.
        right: зіставний відокремлений додаток
      - left: Місто, темне й мокре, прокидалося.
        right: кілька відокремлених означень
      - left: Усі документи, за винятком договору, подано.
        right: конструкція винятку
      - left: Вони працювали не покладаючи рук.
        right: фразеологізм без коми

  - type: fill-in
    title: Доповни граматичний висновок
    instruction: Обери слово або словосполучення, яке завершує правило.
    items:
      - sentence: "У реченні «Звіт, підготовлений командою, оприлюднили» виділено відокремлене ____."
        answer: означення
        options:
          - означення
          - додаток
          - присудок
          - підмет
      - sentence: "Прикладка по-іншому ____ предмет або особу."
        answer: називає
        options:
          - називає
          - заперечує
          - відмінює
          - скорочує
      - sentence: "Дієприслівниковий зворот має стосуватися того самого ____."
        answer: виконавця
        options:
          - виконавця
          - прийменника
          - додатка
          - числа
      - sentence: "Після «окрім» часто перевіряємо ____ відмінок."
        answer: родовий
        options:
          - родовий
          - називний
          - орудний
          - місцевий
      - sentence: "Уточнення працює за логікою ширше - ____."
        answer: вужче
        options:
          - вужче
          - голосніше
          - давніше
          - складніше
      - sentence: "Конструкція «на відміну від» створює ____."
        answer: зіставлення
        options:
          - зіставлення
          - звертання
          - наказ
          - підмет
      - sentence: "Стійкий вислів «не покладаючи рук» часто сприймаємо як ____."
        answer: фразеологізм
        options:
          - фразеологізм
          - прикладку
          - підмет
          - цитату
      - sentence: "Якщо пауза допомагає змісту, відокремлення є ____."
        answer: виправданим
        options:
          - виправданим
          - випадковим
          - забороненим
          - непомітним
      - sentence: "У реченні «У центрі, біля ратуші» друга частина ____ місце."
        answer: уточнює
        options:
          - уточнює
          - заперечує
          - замінює
          - повторює
      - sentence: "Надмір відокремлених конструкцій створює ____ речення."
        answer: перевантаження
        options:
          - перевантаження
          - узгодження
          - наголос
          - правопис

  - type: error-correction
    title: Виправ пунктуацію та логіку
    instruction: Обери нормативний варіант і поясни, що було неправильно.
    items:
      - sentence: Звіт підготовлений командою оприлюднили вранці.
        error: підготовлений командою
        correction: Звіт, підготовлений командою, оприлюднили вранці.
        options:
          - Звіт, підготовлений командою, оприлюднили вранці.
          - Звіт підготовлений, командою оприлюднили вранці.
          - Звіт підготовлений командою, оприлюднили, вранці.
          - Звіт підготовлений командою оприлюднили вранці.
        explanation: Поширене означення після означуваного слова відокремлюємо комами.
      - sentence: Прочитавши статтю питання стали ясними.
        error: питання стали
        correction: Прочитавши статтю, студент зрозумів питання краще.
        options:
          - Прочитавши статтю, студент зрозумів питання краще.
          - Прочитавши статтю, питання стали ясними.
          - Статтю прочитавши, питання стали ясними.
          - Питання, прочитавши статтю, стали ясними.
        explanation: Дієприслівниковий зворот має спільного виконавця з головною дією.
      - sentence: Усі окрім Марина прийшли вчасно.
        error: окрім Марина
        correction: Усі, окрім Марини, прийшли вчасно.
        options:
          - Усі, окрім Марини, прийшли вчасно.
          - Усі окрім Марина прийшли вчасно.
          - Усі, окрім Марина прийшли, вчасно.
          - Усі окрім Марини прийшли, вчасно.
        explanation: Після окрім потрібен родовий відмінок, а межу винятку виділяємо комами.
      - sentence: На відміну чернетки фінальна версія точна.
        error: На відміну чернетки
        correction: На відміну від чернетки, фінальна версія точна.
        options:
          - На відміну від чернетки, фінальна версія точна.
          - На відміну чернетки фінальна версія точна.
          - На відміну, від чернетки фінальна версія точна.
          - На відміну від чернетки фінальна, версія точна.
        explanation: У складеному прийменнику потрібне слово від, а початкову конструкцію відокремлюємо комою.
      - sentence: Київ столиця України має складну історію.
        error: столиця України
        correction: Київ, столиця України, має складну історію.
        options:
          - Київ, столиця України, має складну історію.
          - Київ столиця, України має складну історію.
          - Київ столиця України, має складну історію.
          - Київ, столиця України має, складну історію.
        explanation: Прикладка пояснює назву й виділяється комами.
      - sentence: У Львові на площі Ринок почалася екскурсія.
        error: на площі Ринок
        correction: У Львові, на площі Ринок, почалася екскурсія.
        options:
          - У Львові, на площі Ринок, почалася екскурсія.
          - У Львові на площі, Ринок почалася екскурсія.
          - У Львові на площі Ринок, почалася екскурсія.
          - У Львові, на площі Ринок почалася, екскурсія.
        explanation: Друга обставина звужує першу, тому це уточнення місця.
      - sentence: Підійшовши до вікна місто ніби наблизилося.
        error: місто ніби наблизилося
        correction: Підійшовши до вікна, я побачив місто ближче.
        options:
          - Підійшовши до вікна, я побачив місто ближче.
          - Підійшовши до вікна, місто ніби наблизилося.
          - До вікна підійшовши, місто ніби наблизилося.
          - Місто, підійшовши до вікна, ніби наблизилося.
        explanation: Місто не може виконувати дію підійшовши.
      - sentence: Олена координаторка події надішле програму.
        error: координаторка події
        correction: Олена, координаторка події, надішле програму.
        options:
          - Олена, координаторка події, надішле програму.
          - Олена координаторка, події надішле програму.
          - Олена координаторка події, надішле, програму.
          - Олена координаторка події надішле програму.
        explanation: Прикладка дає додаткове пояснення про особу.

  - type: select
    title: Обери нормативні речення
    instruction: Познач усі правильні або стилістично доречні варіанти.
    items:
      - question: Де правильно відокремлено означення?
        min_correct: 2
        options:
          - text: Звіт, підготовлений командою, оприлюднили.
            correct: true
          - text: Підготовлений командою звіт оприлюднили.
            correct: true
          - text: Звіт підготовлений, командою оприлюднили.
            correct: false
          - text: Звіт, підготовлений, командою оприлюднили.
            correct: false
          - text: Підготовлений, командою звіт, оприлюднили.
            correct: false
      - question: Де правильно оформлено прикладку?
