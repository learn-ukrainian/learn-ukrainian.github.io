  - type: fill-in
    title: "Виняток і зіставлення"
    instruction: "Доповніть речення маркером і правильною формою."
    items:
      - sentence: "Усі, ____, погодилися з висновком."
        answer: "крім Марини"
        options: ["крім Марини", "крім Марина", "на відміну Марини", "зокрема Марина"]
      - sentence: "____, фінальна версія містить таблиці."
        answer: "На відміну від чернетки"
        options: ["На відміну від чернетки", "На відміну чернетки", "Крім чернетка", "Зокрема чернетки"]
      - sentence: "Учасники, ____, ставили багато питань."
        answer: "зокрема новачки"
        options: ["зокрема новачки", "зокрема новачків", "на відміну новачки", "крім новачки"]
      - sentence: "Усі, ____, прийшли вчасно."
        answer: "окрім двох експертів"
        options: ["окрім двох експертів", "окрім два експерти", "на відміну два експерти", "зокрема двох експертів"]
      - sentence: "____, цей варіант має докази."
        answer: "На відміну від першої версії"
        options: ["На відміну від першої версії", "На відміну першої версії", "Крім перша версія", "Зокрема першої версії"]
      - sentence: "Документи, ____, уже підписали."
        answer: "крім додатків"
        options: ["крім додатків", "крім додатки", "на відміну додатків", "зокрема додатків"]
      - sentence: "Студенти, ____, швидко адаптувалися."
        answer: "особливо першокурсники"
        options: ["особливо першокурсники", "особливо першокурсників", "крім першокурсники", "на відміну першокурсники"]
      - sentence: "____, новий розклад зручніший для волонтерів."
        answer: "Порівняно з торішнім"
        options: ["Порівняно з торішнім", "Порівняно торішнього", "Крім торішній", "Зокрема торішнього"]
      - sentence: "Усі пропозиції, ____, варто обговорити окремо."
        answer: "зокрема фінансові"
        options: ["зокрема фінансові", "зокрема фінансових", "крім фінансові", "на відміну фінансові"]
      - sentence: "Команда, ____, підтримала коротший формат."
        answer: "крім модераторки"
        options: ["крім модераторки", "крім модераторка", "зокрема модераторки", "на відміну модераторка"]
