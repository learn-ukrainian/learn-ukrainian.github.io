  - type: essay-response
    id: detached-style-essay
    title: Розгорнута відповідь
    instruction: Напиши короткий редакторський коментар.
    prompt: "Вибери один професійний або навчальний текст обсягом 5-7 речень. Перепиши два речення так, щоб у них з'явилися відокремлені члени речення. Поясни, чому саме ці відокремлення покращують або не покращують стиль."
    min_words: 180
    model_answer: "У навчальному оголошенні можна написати: «Заявки, подані до 12 червня, розглянуть першими». Відокремлене означення уточнює, які саме заявки мають пріоритет, і не створює нового речення. Другий варіант: «Після консультації з викладачем, у середу, група затвердить теми проєктів». Уточнення часу робить повідомлення точнішим, але речення треба читати вголос, щоб пауза не звучала штучно. Якщо деталь не важлива, краще залишити просту будову. Відокремлення корисне тоді, коли воно керує увагою читача, замість ускладнювати текст."
    rubric:
      - criteria: Типи конструкцій
        description: Є щонайменше два різні відокремлені члени речення.
        points: 4
      - criteria: Пояснення пунктуації
        description: Автор пояснює, чому потрібні коми або чому конструкцію варто перебудувати.
        points: 4
      - criteria: Стиль і ясність
        description: Коментар показує, як відокремлення впливає на фокус, ритм або точність.
        points: 4
