            correct: false
      - question: Де конструкція створює зіставлення?
        min_correct: 2
        options:
          - text: На відміну від чернетки, фінальна версія має джерела.
            correct: true
          - text: На відміну від попередньої редакції, новий текст коротший.
            correct: true
