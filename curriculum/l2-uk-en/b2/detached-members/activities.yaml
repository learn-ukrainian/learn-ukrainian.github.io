            correct: false

  - type: match-up
    title: Пунктуаційне рішення
    instruction: Зістав ситуацію з потрібним пунктуаційним рішенням.
    pairs:
      - left: Поширене означення після означуваного слова
        right: виділити комами
      - left: Поширене означення перед означуваним словом
        right: кома зазвичай не потрібна
      - left: Прикладка як додаткова довідка
        right: виділити з обох боків
      - left: Назва типу місто Львів
        right: писати без коми
      - left: Дієприслівниковий зворот на початку речення
        right: поставити кому після звороту
      - left: Стійкий вислів не покладаючи рук
        right: часто не відокремлювати
      - left: Конструкція крім Марини в середині речення
        right: виділити комами
      - left: На відміну від на початку речення
        right: поставити кому після конструкції
      - left: Уточнення місця після ширшої обставини
        right: відокремити як звуження
      - left: Дві незалежні обставини різних типів
        right: не ставити кому автоматично
      - left: Надмір трьох відокремлених фрагментів
        right: перебудувати речення
      - left: Сумнів щодо інтонації
        right: прочитати речення вголос

  - type: fill-in
    title: Встав потрібну форму або конструкцію
    instruction: Обери нормативний фрагмент для речення.
    items:
      - sentence: "Усі, ____ Марини, були готові."
        answer: крім
        options:
          - крім
          - крім з
          - крім до
          - крім про
      - sentence: "На відміну ____ чернетки, фінальна версія точна."
        answer: від
        options:
          - від
          - до
          - з
          - при
      - sentence: "Звіт, ____ командою, оприлюднили вранці."
        answer: підготовлений
        options:
          - підготовлений
          - підготувавши
          - підготовка
          - підготувати
      - sentence: "____ джерела, автор уточнив дату."
        answer: Перевіривши
        options:
          - Перевіривши
          - Перевірений
          - Перевірка
          - Перевіряли
      - sentence: "Олена, ____ події, надішле програму."
        answer: координаторка
        options:
          - координаторка
          - координаторку
          - координаторці
          - координаторкою
      - sentence: "У Львові, ____ ратуші, почалася екскурсія."
