          - ані
          - без
      - sentence: "Зустрінемося завтра, ____ дев'ятій ранку."
        answer: о
        options:
          - о
          - упродовж
          - крім
          - попри
      - sentence: "Місто, темне й ____, прокидалося."
        answer: мокре
