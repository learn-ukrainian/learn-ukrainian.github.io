  - type: essay-response
    id: memo-register-rewrite
    title: "Письмо: з чату в доповідну записку"
    instruction: "Перетворіть неформальне повідомлення на офіційну доповідну записку."
    prompt: "Вихідний чат: 'Привіт! У нас знову баг у формі оплати, частина клієнтів не може завершити замовлення. Можеш сказати керівництву, що нам треба ще дві людини на фікс і день на тестування?' Напишіть офіційний текст мінімум на 250 слів із ввічливим звертанням, структурою, нейтральною лексикою й чітким проханням."
    min_words: 250
    model_answer: >-
      Шановна пані Олено! Доводжу до Вашого відома, що під час повторної перевірки форми оплати виявлено технічну помилку, яка перешкоджає частині клієнтів завершити замовлення. За попереднім аналізом, проблема впливає на стабільність роботи сервісу та потребує оперативного усунення. Для виправлення помилки команда потребує залучення двох додаткових фахівців і одного робочого дня на повне тестування оновленої форми. Просимо розглянути можливість виділення зазначених ресурсів і підтвердити оновлений термін виконання завдання. Після завершення технічних робіт команда підготує короткий звіт із результатами перевірки. З повагою, команда проєкту.
    rubric:
      - criteria: "Звертання"
        description: "Є ввічливе звертання й правильна форма Ви."
        points: 3
      - criteria: "Регістр"
        description: "Сленг і емоційні слова замінено нейтральною офіційною лексикою."
        points: 3
      - criteria: "Структура"
        description: "Текст називає проблему, наслідок, потребу й прохання."
        points: 3
      - criteria: "Зміст"
        description: "Факти з вихідного чату збережено без перекручення."
        points: 3
