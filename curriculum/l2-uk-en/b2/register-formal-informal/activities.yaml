version: '1.0'
module: register-formal-informal
level: b2
inline:
  - type: select
    title: "Оберіть доречний регістр"
    instruction: "Позначте фрази, які відповідають ситуації й не втрачають поваги."
    items:
      - question: "Лист до викладачки після пропущеної консультації."
        min_correct: 2
        options:
          - text: "Пані Ірино, перепрошую за пропущену консультацію."
            correct: true
          - text: "Іро, сорі, я випав."
            correct: false
          - text: "Чи могли б Ви запропонувати інший час?"
            correct: true
          - text: "Коли там ще можна?"
            correct: false
        explanation: "Потрібні кличний відмінок, пошанне Ви й пом'якшене прохання."
      - question: "Чат із близьким колегою про файл."
        min_correct: 2
        options:
          - text: "Можеш скинути файл ще раз?"
            correct: true
          - text: "Просимо здійснити повторне надсилання документації."
            correct: false
          - text: "Глянеш таблицю після дзвінка?"
            correct: true
          - text: "Шановний пане колего, доводжу до відома."
            correct: false
        explanation: "У близькому чаті доречні коротші фрази, але вони не мають бути грубими."
      - question: "Службова записка про технічну проблему."
        min_correct: 2
        options:
          - text: "Під час перевірки виявлено технічну помилку."
            correct: true
          - text: "Усе полетіло, капець."
            correct: false
          - text: "Ситуація потребує додаткового тестування."
            correct: true
          - text: "Це якийсь зашквар."
            correct: false
        explanation: "Службова записка потребує стриманого опису фактів."
      - question: "Перехід на 'ти' з новою колегою."
        min_correct: 2
        options:
          - text: "Можемо перейти на 'ти', якщо Вам зручно?"
            correct: true
          - text: "Я всіх називаю на ти, звикай."
            correct: false
          - text: "Пропоную звертатися одне до одного на 'ти'."
            correct: true
          - text: "Ви мені не потрібне, будемо на ти."
            correct: false
        explanation: "Перехід має бути взаємним і ввічливим."
      - question: "Офіційне прохання про перенесення терміну."
        min_correct: 2
        options:
          - text: "Просимо розглянути можливість перенесення терміну."
            correct: true
          - text: "Давайте посунемо дедлайн, бо так простіше."
            correct: false
          - text: "Будемо вдячні за підтвердження нового терміну."
            correct: true
          - text: "Та перенесіть уже."
            correct: false
        explanation: "Офіційне прохання називає дію й пом'якшує тон."
      - question: "Формула звертання до директора."
        min_correct: 2
        options:
          - text: "Шановний директоре"
            correct: true
          - text: "Шановний директор"
            correct: false
          - text: "Шановний пане директоре"
            correct: true
          - text: "Ей, директор"
            correct: false
        explanation: "У звертанні потрібен кличний відмінок."
      - question: "Нейтральне повідомлення групі колег."
        min_correct: 2
        options:
          - text: "Колеги, чи можете ви підтвердити участь?"
            correct: true
          - text: "Колеги, чи можеш ти підтвердити участь?"
            correct: false
          - text: "Будь ласка, напишіть, хто буде на зустрічі."
            correct: true
          - text: "Пане колеги, підтверди."
            correct: false
        explanation: "До групи потрібна множина й природна форма звертання."
      - question: "Неформальне повідомлення без грубості."
        min_correct: 2
        options:
          - text: "Привіт! Можеш глянути файл після обіду?"
            correct: true
          - text: "Слухай, ти знов таблицю зіпсував."
            correct: false
          - text: "Дякую, отримав, гляну ввечері."
            correct: true
          - text: "Вимагаю негайного здійснення перегляду."
            correct: false
        explanation: "Неформальний стиль теж може бути ввічливим."
  - type: match-up
    title: "Пари регістрів"
    instruction: "Зіставте неформальний вислів з офіційнішим відповідником."
    pairs:
      - left: "скинь файл"
        right: "надішліть файл"
      - left: "глянь документ"
        right: "перегляньте документ"
      - left: "там баг"
        right: "виявлено технічну помилку"
      - left: "посунути дедлайн"
        right: "перенести термін виконання"
      - left: "ок, зроблю"
        right: "підтверджую виконання завдання"
      - left: "без поняття"
        right: "наразі не маю достатньої інформації"
      - left: "це не моя зона"
        right: "це питання належить до компетенції іншого відділу"
      - left: "може, якось пізніше"
        right: "пропоную повернутися до питання після погодження графіка"
      - left: "усе полетіло"
        right: "система працює нестабільно"
      - left: "закинь у чат"
        right: "додайте, будь ласка, документ до робочого чату"
      - left: "пане директоре"
        right: "кличний відмінок у формальному звертанні"
      - left: "за можливості"
        right: "пом'якшена формула прохання"
  - type: fill-in
    title: "Звертання і пом'якшення"
    instruction: "Вставте форму, яка відповідає ситуації."
    items:
      - sentence: "____ Олено, дякую за відповідь."
        answer: "Пані"
        options: ["Пані", "Пане", "Колегою", "Оленою"]
        explanation: "Пані + кличний відмінок."
      - sentence: "Шановний пане ____, прошу розглянути заяву."
        answer: "директоре"
        options: ["директоре", "директор", "директором", "директора"]
        explanation: "У звертанні вживаємо кличний відмінок."
      - sentence: "Колеги, чи можете ____ підтвердити час зустрічі?"
        answer: "ви"
        options: ["ви", "вони", "ти", "він"]
        explanation: "До групи людей пишемо ви з малої літери."
      - sentence: "____, зайдеш на хвилину?"
        answer: "Іване"
        options: ["Іване", "Іван", "Іваном", "Івану"]
        explanation: "Іване - кличний відмінок."
      - sentence: "Буду ____ за відповідь до кінця дня."
        answer: "вдячна"
        options: ["вдячна", "вдячно", "вдячніший", "вдячністю"]
        explanation: "Формула пом'якшення: буду вдячна/вдячний."
      - sentence: "За ____ просимо надати коментарі сьогодні."
        answer: "можливості"
        options: ["можливості", "сленгу", "просторіччя", "еліпсису"]
        explanation: "За можливості пом'якшує прохання."
      - sentence: "Це ____ технічне питання, без зміни змісту."
        answer: "суто"
        options: ["суто", "кльово", "ей", "норм"]
        explanation: "Суто означає виключно або тільки."
      - sentence: "У листі краще написати: прошу ____ документ."
        answer: "переглянути"
        options: ["переглянути", "глянути", "зиркнути", "зацінити"]
        explanation: "Переглянути нейтральніше й офіційніше."
      - sentence: "____ правильно розумію, зустріч перенесено?"
        answer: "Наскільки я"
        options: ["Наскільки я", "Коротше я", "Прикинь я", "Ну я"]
        explanation: "Формула м'яко вводить уточнення."
      - sentence: "____ надати файл у форматі PDF."
        answer: "Прошу"
        options: ["Прошу", "Скинь", "Закинь", "Зашли"]
        explanation: "Прошу - офіційна й нейтральна форма."
  - type: true-false
    title: "Правда чи неправда: регістр"
    instruction: "Визначте, чи твердження правильне."
    items:
      - statement: "Регістр залежить від адресата, каналу й мети спілкування."
        correct: true
        explanation: "Це базові параметри ситуації."
      - statement: "Офіційний стиль завжди має бути максимально важким."
        correct: false
        explanation: "Офіційність не повинна знищувати ясність."
      - statement: "Пошанне Ви до однієї людини в листі часто пишуть з великої літери."
        correct: true
        explanation: "Це маркер поваги."
      - statement: "До групи людей завжди пишемо Ви з великої літери."
        correct: false
        explanation: "До групи зазвичай пишемо ви з малої літери."
      - statement: "Кличний відмінок підтримує природне звертання."
        correct: true
        explanation: "Наприклад: пані Олено, директоре, колего."
      - statement: "Сленг доречний у будь-якому діловому листі."
        correct: false
        explanation: "Сленг залежить від групи, каналу й ризику."
      - statement: "Еліпсис частіший у чаті, ніж у службовій записці."
        correct: true
        explanation: "Чат спирається на спільний контекст."
      - statement: "Пом'якшення може зникнути, якщо прохання термінове."
        correct: false
        explanation: "Терміновість треба назвати, але тон можна лишити коректним."
      - statement: "Перефразування між регістрами має зберігати факти."
        correct: true
        explanation: "Змінюється форма, а не зміст."
      - statement: "Неформальний тон автоматично означає грубість."
        correct: false
        explanation: "Неформальний стиль може бути теплим і ввічливим."
  - type: error-correction
    title: "Виправ регістровий збій"
    instruction: "Знайдіть невідповідність регістру й запропонуйте кращу форму."
    items:
      - sentence: "Шановна пані Олена, прошу розглянути заяву."
        error: "Олена"
        correction: "Олено"
        error_type: "word"
        explanation: "У звертанні потрібен кличний відмінок."
      - sentence: "Колеги, чи можеш ти підтвердити участь?"
        error: "можеш ти"
        correction: "можете ви"
        error_type: "construction"
        explanation: "До групи звертаємося у множині."
      - sentence: "Пане Сергію, скиньте мені той файл швиденько."
        error: "скиньте мені той файл швиденько"
        correction: "надішліть, будь ласка, файл до кінця дня"
        error_type: "register"
        explanation: "Звертання офіційне, тому прохання також має бути нейтрально-ввічливим."
      - sentence: "Іро, доводжу до Вашого відома, що мем у чаті смішний."
        error: "доводжу до Вашого відома"
        correction: "хочу сказати"
        error_type: "register"
        explanation: "Канцеляризм не пасує до дружнього чату."
      - sentence: "Пані директор, будемо вдячні за відповідь."
        error: "директор"
        correction: "директорко або директоре"
        error_type: "word"
        explanation: "Потрібна форма кличного відмінка відповідно до обраного звертання."
      - sentence: "У службовій записці: усе полетіло, треба людей."
        error: "усе полетіло, треба людей"
        correction: "виявлено технічну помилку; для її усунення потрібні двоє фахівців"
        error_type: "register"
        explanation: "Службова записка потребує факту, дії й ресурсу."
      - sentence: "Ви, колеги, підтверди участь."
        error: "підтверди"
        correction: "підтвердьте"
        error_type: "construction"
        explanation: "До групи потрібна форма множини."
      - sentence: "Чи могли б Ви коли-небудь, якщо захочете, подивитися це терміново?"
        error: "коли-небудь, якщо захочете"
        correction: "переглянути це до 17:00"
        error_type: "phrase"
        explanation: "Надмірне пом'якшення приховує строк."
workbook:
  - type: reading
    id: deadline-email-chat-reading
    title: "Читання: дедлайн у листі й чаті"
    instruction: "Прочитайте два повідомлення про одну ситуацію й визначте, як змінюється регістр."
    source: "Навчальний уривок для модуля B2."
    text: >-
      Офіційний лист. Шановна пані Олено! У зв'язку з додатковим тестуванням просимо розглянути можливість перенесення терміну подання звіту на п'ятницю. Команда виявила технічну помилку, яка потребує повторної перевірки. Будемо вдячні за підтвердження нового терміну. З повагою, команда проєкту. Повідомлення в чаті. Олено, привіт! У звіті знайшли баг, треба ще раз повністю прогнати тест. Можемо посунути дедлайн до п'ятниці?
    tasks:
      - "Знайдіть формулу звертання в офіційному листі."
      - "Випишіть два маркери офіційності."
      - "Випишіть два маркери неформальності з чату."
      - "Поясніть, чому обидва тексти можуть бути доречними."
      - "Перепишіть чат так, щоб він був нейтральним, але не надто офіційним."
      - "Назвіть форму пом'якшення в листі."
  - type: essay-response
    id: memo-from-chat-essay
    title: "Службова записка з неформального повідомлення"
    instruction: "Перетворіть неформальне повідомлення на службову записку для керівництва."
    prompt: "Вихідне повідомлення: Привіт! У нас там баг із формою, клієнти можуть не оплатити. Можеш дати ще людей сьогодні? Напишіть 180-220 слів у стриманому офіційному регістрі."
    min_words: 180
    model_answer: >-
      > [!model-answer]
      > Шановна пані Олено! Під час перевірки форми оплати команда виявила технічну помилку, яка може перешкодити клієнтам завершити оплату. Помилка потребує повторного тестування сьогодні, оскільки без виправлення існує ризик затримки платежів і негативного досвіду користувачів. Просимо розглянути можливість залучення двох додаткових фахівців до 17:00 для аналізу причини та підготовки виправлення. Команда підтримки готова надати журнал помилок і короткий опис сценаріїв, у яких проблема повторюється. Будемо вдячні за погодження ресурсу або за інформацію про інший можливий порядок дій. З повагою, команда проєкту.
    rubric:
      - criteria: "Збереження фактів"
        description: "Проблема, ризик, прохання й строк не зникли."
        points: 4
      - criteria: "Регістрова доречність"
        description: "Сленг і емоційність замінено нейтральними формами."
        points: 3
      - criteria: "Структура"
        description: "Є звертання, контекст, потрібна дія й завершення."
        points: 3
  - type: critical-analysis
    id: register-shift-analysis
    title: "Аналіз: що змінюється під час перефразування"
    instruction: "Порівняйте дві версії одного повідомлення."
    target_text: "Чат: Скинь мені файл сьогодні, бо без нього ми зависнемо. Лист: Просимо надіслати файл до 17:00, оскільки він потрібний для завершення фінальної перевірки."
    questions:
      - "Які факти збережено в обох версіях?"
      - "Які слова або конструкції змінили регістр?"
      - "Чи офіційна версія стала надто важкою? Обґрунтуйте."
    model_answers:
      - "Збережено потрібну дію, строк і причину: файл потрібний сьогодні до завершення перевірки."
      - "Скинь стало просимо надіслати; ми зависнемо стало потрібний для завершення фінальної перевірки."
      - "Версія достатньо офіційна, але не перевантажена: вона має одну причину й один чіткий строк."
    focus_points:
      - "факти"
      - "лексика"
      - "синтаксис"
  - type: group-sort
    title: "Маркери регістру"
    instruction: "Розподіліть фрази за регістром."
    groups:
      - name: "Офіційний або нейтрально-офіційний"
        items:
          - "просимо надати"
          - "будемо вдячні за відповідь"
          - "у зв'язку з"
          - "підтверджую отримання"
          - "шановна пані"
      - name: "Нейтральний робочий"
        items:
          - "колеги, чи можете"
          - "пропоную перенести"
          - "потрібно уточнити"
          - "дякую, отримав"
          - "чи правильно я розумію"
      - name: "Неформальний або розмовний"
        items:
          - "скинь файл"
          - "глянеш після дзвінка"
          - "там баг"
          - "посунемо дедлайн"
  - type: fill-in
    title: "Перепишіть без втрати змісту"
    instruction: "Виберіть формулу, яка зберігає зміст і змінює регістр доречно."
    items:
      - sentence: "Неформальне 'скинь файл' в офіційному листі стане: ____ файл."
        answer: "прошу надіслати"
        options: ["прошу надіслати", "закинь", "кинь", "підкинь"]
        explanation: "Прошу надіслати - нейтрально-офіційна формула."
      - sentence: "'Там баг' у службовій записці: ____ технічну помилку."
        answer: "виявлено"
        options: ["виявлено", "зашкварено", "прикольно", "окейнуто"]
        explanation: "Виявлено технічну помилку - офіційніший опис."
      - sentence: "'Дедлайн посунемо?' офіційно: чи можемо ____ термін?"
        answer: "перенести"
        options: ["перенести", "засунути", "підсунути", "перекинути"]
        explanation: "Перенести термін - нейтральна формула."
      - sentence: "'Глянь документ' нейтрально: ____ документ, будь ласка."
        answer: "переглянь"
        options: ["переглянь", "заціни", "зиркни", "кинь оком"]
        explanation: "Переглянь природне в робочому нейтральному тоні."
      - sentence: "'Ви не праві' м'якше: ____ я розумію, є інший варіант."
        answer: "Наскільки"
        options: ["Наскільки", "Капець", "Ну", "Сорі"]
