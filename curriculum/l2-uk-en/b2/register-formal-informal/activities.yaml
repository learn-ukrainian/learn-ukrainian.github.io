version: '1.0'
module: register-formal-informal
level: b2
inline: []
workbook:
  - type: reading
    id: deadline-email-chat-reading
    title: "Читання: дедлайн у листі й чаті"
    instruction: "Прочитайте два повідомлення про одну ситуацію й визначте, як змінюється регістр."
    source: "Навчальний уривок для модуля B2."
    text: >-
      Офіційний лист. Шановна пані Олено! У зв'язку з додатковим тестуванням просимо розглянути можливість перенесення терміну подання звіту на п'ятницю. Команда виявила технічну помилку, яка потребує повторної перевірки. Будемо вдячні за підтвердження нового терміну. З повагою, команда проєкту. Повідомлення в чаті. Олено, привіт! У звіті знайшли баг, треба ще раз повністю прогнати тест. Можемо посунути дедлайн до п'ятниці?
    tasks:
      - "Знайдіть формулу звертання в офіційному листі."
      - "Випишіть два маркери офіційності."
      - "Випишіть два маркери неформальності з чату."
      - "Поясніть, чому обидва тексти можуть бути доречними."
      - "Перепишіть чат так, щоб він був нейтральним, але не надто офіційним."
      - "Назвіть форму пом'якшення в листі."

  - type: match-up
    title: "Пари регістрів"
    instruction: "Зіставте неформальний вислів з офіційнішим відповідником."
    pairs:
      - left: "скинь файл"
        right: "надішліть файл"
      - left: "глянь документ"
        right: "перегляньте документ"
      - left: "там баг"
        right: "виявлено технічну помилку"
      - left: "дедлайн посунули"
        right: "термін виконання змінено"
      - left: "ок, зроблю"
        right: "підтверджую виконання"
      - left: "не встигаємо"
        right: "потребуємо додаткового часу"
      - left: "напиши мені"
        right: "прошу надати відповідь"
      - left: "це суто технічне"
        right: "питання має технічний характер"
      - left: "форма зламалася"
        right: "сервіс працює нестабільно"
      - left: "давай на ти"
        right: "можемо перейти на 'ти', якщо Вам зручно"
      - left: "дякую, отримав"
        right: "підтверджую отримання"
      - left: "підчистити текст"
        right: "відредагувати текст"

  - type: fill-in
    title: "Звертання й ввічливість"
    instruction: "Заповніть пропуск найдоречнішою формою."
    items:
      - sentence: "____ Олено, дякую за відповідь."
        answer: "Пані"
        options: ["Пані", "Пан", "Ей", "Друже"]
        explanation: "Пані + кличний відмінок створює ввічливе звертання."
      - sentence: "Шановний ____, прошу розглянути мою заяву."
        answer: "директоре"
        options: ["директоре", "директор", "директором", "директора"]
        explanation: "У звертанні потрібен кличний відмінок."
      - sentence: "Чи могли б ____ надіслати оновлений файл?"
        answer: "Ви"
        options: ["Ви", "ти", "вони", "воно"]
        explanation: "Пошанне звертання до однієї людини."
      - sentence: "Колеги, чи можете ____ підтвердити час зустрічі?"
        answer: "ви"
        options: ["ви", "вони", "ти", "він"]
        explanation: "До групи пишемо ви з малої літери."
      - sentence: "____, зайдеш на хвилину?"
        answer: "Іване"
        options: ["Іване", "Іван", "Іваном", "Івану"]
        explanation: "Іване - кличний відмінок."
      - sentence: "Буду ____ за відповідь до кінця дня."
        answer: "вдячна"
        options: ["вдячна", "вдячно", "вдячніший", "вдячністю"]
        explanation: "Формула пом'якшення: буду вдячна/вдячний."
      - sentence: "За ____ просимо надати коментарі сьогодні."
        answer: "можливості"
        options: ["можливості", "сленгу", "просторіччя", "еліпсису"]
        explanation: "За можливості пом'якшує прохання."
      - sentence: "Це ____ технічне питання, без зміни змісту."
        answer: "суто"
        options: ["суто", "кльово", "ей", "норм"]
        explanation: "Суто означає 'виключно, тільки'."
      - sentence: "У листі краще написати: прошу ____ документ."
        answer: "переглянути"
        options: ["переглянути", "глянути", "зиркнути", "зацінити"]
        explanation: "Переглянути нейтральніше й офіційніше."
      - sentence: "У дружньому чаті природно: ____ файл, будь ласка."
        answer: "скинь"
        options: ["скинь", "надайте", "доведіть", "здійсніть"]
        explanation: "Скинь - розмовне слово для близького спілкування."

  - type: fill-in
    title: "Пом'якшення в офіційному стилі"
    instruction: "Доберіть формулу, яка робить прохання ввічливим і точним."
    items:
      - sentence: "____ Ви уточнити час зустрічі?"
        answer: "Чи могли б"
        options: ["Чи могли б", "Ану", "Давай", "Ти мусиш"]
        explanation: "Чи могли б Ви - ввічлива формула прохання."
      - sentence: "____, надішліть відповідь до 17:00."
        answer: "Будь ласка"
        options: ["Будь ласка", "Ну", "Ей", "Та"]
        explanation: "Будь ласка пом'якшує пряме прохання."
      - sentence: "____, ми перенесемо зустріч на п'ятницю."
        answer: "За можливості"
        options: ["За можливості", "По приколу", "Коротше", "Та ну"]
        explanation: "За можливості показує ввічливу умову."
      - sentence: "____ розглянути це питання на нараді."
        answer: "Пропоную"
        options: ["Пропоную", "Гони", "Забий", "Скинь"]
        explanation: "Пропоную нейтрально вводить ініціативу."
      - sentence: "____, тут є помилка в таблиці."
        answer: "Здається"
        options: ["Здається", "Сто пудів", "Капець", "Жесть"]
        explanation: "Здається пом'якшує оцінку."
      - sentence: "____ Вашу відповідь до кінця дня."
        answer: "Буду вдячний за"
        options: ["Буду вдячний за", "Кидай", "Давай уже", "Не тяни з"]
        explanation: "Формула ввічливо називає очікувану дію."
      - sentence: "____ до результатів перевірки, потрібне додаткове тестування."
        answer: "З огляду на"
        options: ["З огляду на", "Типу через", "Ну бо", "Так як"]
        explanation: "З огляду на вводить офіційну підставу."
      - sentence: "____ підтвердити отримання листа."
        answer: "Просимо"
        options: ["Просимо", "Гляньте-но", "Ей", "Підкиньте"]
        explanation: "Просимо доречне в офіційному проханні."
      - sentence: "____ правильно розумію, зустріч перенесено?"
        answer: "Наскільки я"
        options: ["Наскільки я", "Коротше я", "Прикинь я", "Ну я"]
        explanation: "Формула пом'якшує уточнення."
      - sentence: "____ надати файл у форматі PDF."
        answer: "Прошу"
        options: ["Прошу", "Скинь", "Закинь", "Зашли"]
        explanation: "Прошу - офіційна й нейтральна форма."

  - type: select
    title: "Оберіть доречний регістр"
    instruction: "Позначте варіанти, які пасують до описаної ситуації."
    items:
      - question: "Лист до викладачки після пропущеної консультації."
        min_correct: 2
        options:
          - text: "Пані Ірино, перепрошую за пропущену консультацію."
            correct: true
          - text: "Іро, сорі, я випав."
            correct: false
          - text: "Чи могли б Ви запропонувати інший час?"
            correct: true
          - text: "Коли там ще можна?"
            correct: false
        explanation: "Потрібні кличний відмінок, Ви й пом'якшене прохання."
      - question: "Чат із близьким колегою про файл."
        min_correct: 2
        options:
          - text: "Можеш скинути файл ще раз?"
            correct: true
          - text: "Просимо здійснити повторне надсилання документації."
            correct: false
          - text: "Глянеш таблицю після дзвінка?"
            correct: true
          - text: "Шановний пане колего, доводжу до відома."
            correct: false
        explanation: "У близькому чаті доречні коротші фрази."
      - question: "Службова записка про технічну проблему."
        min_correct: 2
        options:
          - text: "Під час перевірки виявлено технічну помилку."
            correct: true
          - text: "Усе полетіло, капець."
            correct: false
          - text: "Ситуація потребує додаткового тестування."
            correct: true
          - text: "Це якийсь зашквар."
            correct: false
        explanation: "Службова записка потребує стриманого опису фактів."
      - question: "Перехід на 'ти' з новою колегою."
        min_correct: 2
        options:
          - text: "Можемо перейти на 'ти', якщо Вам зручно."
            correct: true
          - text: "Я всіх називаю на ти, звикай."
            correct: false
          - text: "Пропоную звертатися одне до одного на 'ти'."
            correct: true
          - text: "Ви мені не потрібне, будемо на ти."
            correct: false
        explanation: "Перехід має бути взаємним і ввічливим."
      - question: "Офіційне прохання про перенесення терміну."
        min_correct: 2
        options:
          - text: "Просимо розглянути можливість перенесення терміну."
            correct: true
          - text: "Давайте посунемо дедлайн, бо так простіше."
            correct: false
          - text: "Будемо вдячні за підтвердження нового терміну."
            correct: true
          - text: "Та перенесіть уже."
            correct: false
        explanation: "Офіційне прохання називає дію й пом'якшує тон."
      - question: "Формула звертання до директора."
        min_correct: 2
        options:
          - text: "Шановний директоре"
            correct: true
          - text: "Шановний директор"
            correct: false
          - text: "Шановний пане директоре"
            correct: true
          - text: "Ей, директор"
            correct: false
        explanation: "Потрібен кличний відмінок."
      - question: "Нейтральне повідомлення групі колег."
        min_correct: 2
        options:
          - text: "Колеги, чи можете ви підтвердити участь?"
            correct: true
          - text: "Колеги, чи можеш ти підтвердити участь?"
            correct: false
          - text: "Будь ласка, напишіть, хто буде на зустрічі."
            correct: true
          - text: "Пане колеги, підтверди."
            correct: false
        explanation: "До групи потрібна множина."
      - question: "Неформальне повідомлення без грубості."
        min_correct: 2
        options:
          - text: "Привіт! Можеш глянути файл після обіду?"
            correct: true
          - text: "Слухай, ти знов таблицю зіпсував."
            correct: false
          - text: "Дякую, отримав, гляну ввечері."
            correct: true
          - text: "Вимагаю негайного здійснення перегляду."
            correct: false
        explanation: "Неформальний стиль теж може бути ввічливим."

  - type: true-false
    title: "Правда чи неправда: регістр"
    instruction: "Визначте, чи твердження правильне."
    items:
      - statement: "Регістр залежить від адресата, каналу й мети спілкування."
        correct: true
        explanation: "Це базові параметри ситуації."
      - statement: "Офіційний стиль завжди має бути максимально важким."
        correct: false
        explanation: "Офіційність не повинна знищувати ясність."
      - statement: "Пошанне Ви до однієї людини в листі часто пишуть з великої літери."
        correct: true
        explanation: "Це маркер поваги."
      - statement: "До групи людей завжди пишемо Ви з великої літери."
        correct: false
        explanation: "До групи зазвичай пишемо ви з малої літери."
      - statement: "Кличний відмінок підтримує природне звертання."
        correct: true
        explanation: "Наприклад: пані Олено, директоре, колего."
      - statement: "Сленг доречний у будь-якому діловому листі."
        correct: false
        explanation: "Сленг залежить від групи й каналу."
      - statement: "Еліпсис частіший у неформальному чаті."
        correct: true
        explanation: "Контекст дозволяє пропускати частини речення."
      - statement: "Безособові конструкції можуть робити офіційний текст нейтральнішим."
        correct: true
        explanation: "Наприклад: виявлено помилку."
      - statement: "Пом'якшення завжди має приховувати дедлайн."
        correct: false
        explanation: "Ввічливість і чіткість мають працювати разом."
      - statement: "Перефразування має зберігати факти, навіть коли тон змінюється."
        correct: true
        explanation: "Зміст не повинен зникати разом із регістром."

  - type: error-correction
    title: "Виправте невідповідність регістру"
    instruction: "Виберіть природний виправлений варіант."
    items:
      - sentence: "Шановний директор, прошу розглянути заяву."
        error: "Шановний директор"
        correction: "Шановний директоре, прошу розглянути заяву."
        error_type: "construction"
        options:
          - "Шановний директоре, прошу розглянути заяву."
          - "Шановний директор, прошу розглянути заяву."
          - "Шановному директор, прошу розглянути заяву."
          - "Ей директор, прошу розглянути заяву."
        explanation: "У звертанні потрібен кличний відмінок."
      - sentence: "Пані Олена, чи могли б Ви відповісти?"
        error: "Пані Олена"
        correction: "Пані Олено, чи могли б Ви відповісти?"
        error_type: "construction"
        options:
          - "Пані Олено, чи могли б Ви відповісти?"
          - "Пані Олена, чи могли б Ви відповісти?"
          - "Пані Оленою, чи могли б Ви відповісти?"
          - "Пані Олені, чи могли б Ви відповісти?"
        explanation: "Після пані в звертанні потрібен кличний."
      - sentence: "У службовій записці: форма полетіла, капець."
        error: "форма полетіла, капець"
        correction: "виявлено критичну технічну помилку"
        error_type: "register"
        options:
          - "виявлено критичну технічну помилку"
          - "форма полетіла, капець"
          - "жесть, форма впала"
          - "там якийсь треш"
        explanation: "Службова записка потребує нейтрального формулювання."
      - sentence: "У чаті з другом: прошу розглянути можливість піти на каву."
        error: "прошу розглянути можливість"
        correction: "ходімо на каву"
        error_type: "register"
        options:
          - "ходімо на каву"
          - "прошу розглянути можливість"
          - "відповідно до кави"
          - "здійснимо кавування"
        explanation: "Дружній чат не потребує канцеляризму."
      - sentence: "Ви знаєш про зміну графіка?"
        error: "Ви знаєш"
        correction: "Ви знаєте"
        error_type: "construction"
        options: ["Ви знаєте", "Ви знаєш", "Ви знаю", "Ви знати"]
        explanation: "З Ви потрібна форма другої особи множини."
      - sentence: "Колеги, чи можеш ти підтвердити участь?"
        error: "можеш ти"
        correction: "можете ви"
        error_type: "construction"
        options: ["можете ви", "можеш ти", "може він", "можу я"]
        explanation: "До групи потрібно звертатися у множині."
      - sentence: "Доброго дня, скинь мені, будь ласка, наказ."
        error: "скинь мені"
        correction: "надішліть мені"
        error_type: "register"
        options: ["надішліть мені", "скинь мені", "закинь мені", "підкинь мені"]
        explanation: "У формальному звертанні краще надішліть."
      - sentence: "Привіт, доводжу до твого відома, що я вже в метро."
        error: "доводжу до твого відома"
        correction: "я вже в метро"
        error_type: "register"
        options: ["я вже в метро", "доводжу до твого відома", "відповідно до метро", "з метою метро"]
        explanation: "У дружньому чаті зайвий канцеляризм."

  - type: translate
    title: "Перекладіть з урахуванням регістру"
    instruction: "Виберіть найдоречніший український варіант."
    items:
      - source: "Could you please send the file by 5 p.m.? (formal)"
        options:
          - text: "Чи могли б Ви надіслати файл до 17:00?"
            correct: true
          - text: "Скинь файл до п'ятої."
            correct: false
          - text: "Ей, кидай файл."
            correct: false
        explanation: "Формальний запит потребує Ви й пом'якшення."
      - source: "Can you look at the table? (informal)"
        options:
          - text: "Можеш глянути таблицю?"
            correct: true
          - text: "Просимо здійснити табличний перегляд."
            correct: false
          - text: "Шановний друже, доводжу таблицю."
            correct: false
        explanation: "У чаті природне коротке прохання."
      - source: "Dear Director, I am writing about the schedule."
        options:
          - text: "Шановний директоре, звертаюся щодо графіка."
            correct: true
          - text: "Шановний директор, пишу про графік."
            correct: false
          - text: "Ей директоре, там графік."
            correct: false
        explanation: "Потрібен кличний відмінок і стриманий тон."
      - source: "We found a bug in the form. (formal)"
        options:
          - text: "У формі виявлено технічну помилку."
            correct: true
          - text: "У формі якийсь баг."
            correct: false
          - text: "Форма глючить, жесть."
            correct: false
        explanation: "Офіційно краще технічна помилка."
      - source: "I confirm receipt of the document."
        options:
          - text: "Підтверджую отримання документа."
            correct: true
          - text: "Ок, бачив."
            correct: false
          - text: "Документ мене отримав."
            correct: false
        explanation: "Підтверджую отримання - офіційна формула."
