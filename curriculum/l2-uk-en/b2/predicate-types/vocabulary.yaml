- lemma: простий присудок
  translation: simple predicate
  pos: phrase
  usage: Простий присудок виражений особовою формою дієслова.
- lemma: складений дієслівний присудок
  translation: compound verbal predicate
  pos: phrase
  usage: Складений дієслівний присудок має допоміжне слово й інфінітив.
- lemma: складений іменний присудок
  translation: compound nominal predicate
  pos: phrase
  usage: Складений іменний присудок називає стан або якість підмета.
- lemma: дієслово-зв'язка
  translation: linking verb
  pos: noun
  usage: У реченні Олег став переможцем слово став є дієсловом-зв'язкою.
  notes: Plan-whitelisted grammatical term.
- lemma: інфінітив
  translation: infinitive
  pos: noun
  usage: Після допоміжного слова основна дія стоїть в інфінітиві.
- lemma: допоміжне дієслово
  translation: auxiliary verb
  pos: phrase
  usage: Допоміжне дієслово додає фазу або модальність.
- lemma: узгодження
  translation: agreement
  pos: noun
  usage: Узгодження присудка залежить від центру підмета.
- lemma: модальність
  translation: modality
  pos: noun
  usage: Модальність показує можливість, потребу або бажання.
- lemma: фазовість
  translation: phasal meaning
  pos: noun
  usage: Фазовість показує початок, продовження або кінець дії.
- lemma: предикативність
  translation: predicativity
  pos: noun
  usage: Предикативність виникає, коли ознака стає повідомленням про підмет.
- lemma: прикладка
  translation: apposition
  pos: noun
  usage: Прикладка не керує родом присудка, якщо головне слово інше.
- lemma: абревіатура
  translation: abbreviation
  pos: noun
  usage: Абревіатура потребує перевірки за повною назвою.
- lemma: контекст
  translation: context
  pos: noun
  usage: Контекст допомагає вибрати тип присудка.
- lemma: особова форма
  translation: finite personal form
  pos: phrase
  usage: Особова форма дієслова може сама бути присудком.
- lemma: фразеологічний присудок
  translation: phraseological predicate
  pos: phrase
  usage: Правлять теревені — фразеологічний присудок.
- lemma: іменна частина
  translation: nominal part
  pos: phrase
  usage: Іменна частина називає роль або якість підмета.
- lemma: нульова зв'язка
  translation: zero copula
  pos: phrase
  usage: У реченні Я студент є нульова зв'язка.
- lemma: кількісне сполучення
  translation: quantitative phrase
  pos: phrase
  usage: Кількісне сполучення може вимагати форми однини.
- lemma: синтаксична норма
  translation: syntactic norm
  pos: phrase
  usage: Синтаксична норма визначає узгодження з головним словом.
- lemma: граматична основа
  translation: grammatical base
  pos: phrase
  usage: Підмет і присудок утворюють граматичну основу.
- lemma: підмет
  translation: subject
  pos: noun
  usage: Підмет називає предмет, про який ідеться в реченні.
- lemma: присудок
  translation: predicate
  pos: noun
  usage: Присудок показує дію, стан або ознаку підмета.
- lemma: орудний відмінок
  translation: instrumental case
  pos: phrase
  usage: Після стати іменна частина часто має орудний відмінок.
- lemma: називний відмінок
  translation: nominative case
  pos: phrase
  usage: Називний відмінок може називати підмет.
- lemma: родовий відмінок
  translation: genitive case
  pos: phrase
  usage: Кількісне сполучення часто містить іменник у родовому відмінку.
- lemma: множина
  translation: plural
  pos: noun
  usage: Множина може акцентувати дію окремих виконавців.
- lemma: однина
  translation: singular
  pos: noun
  usage: Однина може акцентувати кількість як ціле.
- lemma: предикативний центр
  translation: predicative center
  pos: phrase
  usage: Предикативний центр речення тримається на присудку.
- lemma: номіналізація
  translation: nominalization
  pos: noun
  usage: Номіналізація переводить дію в іменну форму.
- lemma: стилістична трансформація
