  pos: phrase
  usage: Стилістична трансформація змінює фокус речення.
- lemma: акцентування
  translation: emphasis
  pos: noun
  usage: Акцентування залежить від вибору присудка.
- lemma: допоміжне слово
  translation: auxiliary word
  pos: phrase
  usage: Допоміжне слово разом з інфінітивом творить присудок.
