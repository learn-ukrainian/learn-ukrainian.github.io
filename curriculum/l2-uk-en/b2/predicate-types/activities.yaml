version: '1.0'
module: predicate-types
level: b2
inline:
- type: select
  title: Простий дієслівний присудок
  instruction: Позначте речення, де присудок є простим дієслівним.
  items:
  - question: Де присудок простий дієслівний?
    min_correct: 3
    options:
    - text: "Студенти обговорили план."
      correct: true
    - text: "Ми будемо перевіряти звіт."
      correct: true
    - text: "Діти правили теревені."
      correct: true
    - text: "Команда почала працювати."
      correct: false
    - text: "Звіт готовий."
      correct: false
    explanation: Аналітичний майбутній час і фразеологізм можуть бути простими присудками, але фазова модель і іменний
      стан - ні.
  - question: Яке пояснення правильне для речення "Ми будемо аналізувати дані"?
    options:
    - text: "будемо аналізувати - простий дієслівний присудок майбутнього часу"
      correct: true
    - text: "будемо аналізувати - складений дієслівний присудок, бо має два слова"
      correct: false
    - text: "дані - іменна частина присудка"
      correct: false
    - text: "будемо - підмет"
      correct: false
    explanation: Кількість слів не визначає тип; тут це аналітичний майбутній час.
  - question: Де частка або заперечення не змінює тип присудка?
    min_correct: 2
    options:
    - text: "Він не погодився."
      correct: true
    - text: "Викладач таки відповів."
      correct: true
    - text: "Нам треба відповісти."
      correct: false
    - text: "Відповідь була переконливою."
      correct: false
    - text: "Команда почала відповідати."
      correct: false
    explanation: Не і таки уточнюють дію, але не створюють складений присудок.
  - question: Де фразеологізм працює як простий присудок?
    min_correct: 2
    options:
    - text: "Вони били байдики."
      correct: true
    - text: "Діти правили теревені."
      correct: true
    - text: "Вони мають працювати."
      correct: false
    - text: "Він став переможцем."
      correct: false
    - text: "Місто було тихим."
      correct: false
    explanation: Стійкий вислів може мати кілька слів, але синтаксично бути одним простим присудком.
  - question: Яке речення має простий дієслівний присудок у формі наказового способу?
    options:
    - text: Перевірте джерела перед поданням.
      correct: true
    - text: Джерела треба перевірити.
      correct: false
    - text: Звіт був готовий.
      correct: false
    - text: Команда почала перевіряти джерела.
      correct: false
    explanation: Наказова форма дієслова може бути простим дієслівним присудком.
  - question: Де багатослівна форма все одно є простим дієслівним присудком?
    options:
    - text: Вони будуть працювати над текстом.
      correct: true
    - text: Вони можуть працювати над текстом.
      correct: false
    - text: Вони почали працювати над текстом.
      correct: false
    - text: Вони були готові до роботи.
      correct: false
    explanation: Аналітичний майбутній час належить до простої дієслівної форми, а не до складеного присудка.
  - question: Де фразеологічний присудок не треба розбирати на окремі члени речення?
    options:
    - text: Делегати били байдики до перерви.
      correct: true
    - text: Делегати били м'яч на подвір'ї.
      correct: false
    - text: Делегати були уважні.
      correct: false
    - text: Делегати почали слухати.
      correct: false
    explanation: Стійкий вислів зі значенням дії може працювати як один простий присудок.
  - question: Де дієслово минулого часу саме називає дію підмета?
    options:
    - text: Комісія ухвалила рішення.
      correct: true
    - text: Комісія була готова.
      correct: false
    - text: Комісія мусила ухвалити рішення.
      correct: false
    - text: Комісія стала впливовою.
      correct: false
    explanation: Ухвалила є самостійним дієслівним присудком без модальної чи іменної частини.
- type: group-sort
  title: Фаза, модальність або не присудок
  instruction: Розподіліть конструкції за діагностикою.
  groups:
  - name: Складений дієслівний присудок
    items:
    - "почав читати"
    - "може пояснити"
    - "мусить перевірити"
    - "слід уточнити"
    - "перестали сперечатися"
  - name: Простий дієслівний присудок
    items:
    - "буде читати"
    - "перевірив"
    - "не погодився"
    - "правив теревені"
    - "ледь устиг"
  - name: Простий присудок із залежним інфінітивом
    items:
    - "любить читати"
    - "попросив пояснити"
    - "запропонував обговорити"
    - "забув попередити"
    - "навчився розрізняти"
- type: match-up
  title: Іменний присудок і зв'язка
  instruction: Зіставте речення з поясненням типу присудка.
  pairs:
  - left: "Олег став переможцем."
    right: "складений іменний: зв'язка стала + іменна частина в орудному"
  - left: "Звіт готовий."
    right: "складений іменний із нульовою зв'язкою теперішнього часу"
  - left: "Ніч була ясна."
    right: "складений іменний: була + прикметникова іменна частина"
  - left: "Рішення чинне."
    right: "складений іменний: стан підмета без явного є"
  - left: "Олег переміг."
    right: "простий дієслівний: дія"
  - left: "Олег може перемогти."
    right: "складений дієслівний: модальність + інфінітив"
  - left: Місто є відкритим для студентів.
    right: 'складений іменний: є + прикметникова іменна частина'
  - left: Завдання залишилося складним.
    right: "складений іменний: зв'язка залишилося + прикметник"
  - left: Висновок видається переконливим.
    right: "складений іменний: зв'язка видається + іменна частина"
  - left: Команда була напоготові.
    right: 'складений іменний: була + предикативна іменна/прислівникова частина стану'
- type: fill-in
  title: Межові випадки з інфінітивом
  instruction: Заповніть пропуск діагностичним описом присудка або ролі інфінітива.
  items:
  - sentence: У реченні "Я хочу пояснити правило" хочу пояснити - ____.
    answer: складений дієслівний присудок
    options: [складений дієслівний присудок, складений іменний присудок, простий підмет, неузгоджене означення]
    explanation: Хочу виражає модальність бажання, а інфінітив називає основну дію підмета.
  - sentence: У реченні "Я попросив пояснити правило" попросив - ____, а пояснити називає зміст прохання.
    answer: простий дієслівний присудок
    options: [простий дієслівний присудок, складений іменний присудок, зв’язка, прикладка]
    explanation: Інфінітив тут не є дією підмета, а залежить від змісту прохання.
  - sentence: У реченні "Нам треба завершити звіт" треба завершити - ____.
    answer: безособова модальна модель
    options: [безособова модальна модель, простий дієслівний присудок минулого часу, підмет з означенням, сурядний ряд]
    explanation: Треба виражає потребу, а інфінітив називає дію, яку треба виконати.
  - sentence: У реченні "Ми маємо намір подати заявку" намір подати - ____.
    answer: іменник із залежним інфінітивом
    options: [іменник із залежним інфінітивом, фразеологічний простий присудок, нульова зв’язка, обставина часу]
    explanation: Слово намір є іменником, а інфінітив уточнює зміст цього наміру.
  - sentence: У реченні "Викладач дозволив студентам користуватися словником" користуватися залежить від ____.
    answer: додатка студентам
    options: [додатка студентам, підмета викладач, іменної частини присудка, обставини часу]
    explanation: Дію з інфінітива виконують студенти, тому це не основна дія підмета викладач.
  - sentence: У реченні "Дослідниця почала перевіряти архівні дані" почала перевіряти - ____.
    answer: складений дієслівний присудок
    options: [складений дієслівний присудок, простий іменний підмет, неузгоджене означення, прямий додаток]
    explanation: Фазове дієслово почала показує етап дії, а інфінітив називає саму дію.
  - sentence: У реченні "Його обрали головою комісії" обрали - ____.
    answer: простий дієслівний присудок
    options: [простий дієслівний присудок, складений іменний присудок, модальне слово, непрямий додаток]
    explanation: Орудний головою називає результативну роль, але не перетворює обрали на іменний присудок.
  - sentence: У реченні "Завдання було виконане вчасно" було виконане - ____.
    answer: складена пасивна форма присудка
    options: [складена пасивна форма присудка, простий присудок наказового способу, підмет із прикладкою, обставина
        способу]
    explanation: Форма стану передає результат дії над підметом, але не є англійською калькою be + adjective.
  - sentence: У реченні "Звіт готовий" готовий із нульовою зв’язкою - ____.
    answer: складений іменний присудок
    options: [складений іменний присудок, простий дієслівний присудок, залежний інфінітив, додаток]
    explanation: У теперішньому часі зв’язка може бути нульовою, а іменна частина називає стан підмета.
  - sentence: У реченні "Ми будемо аналізувати дані" будемо аналізувати - ____.
    answer: простий дієслівний присудок майбутнього часу
    options: [простий дієслівний присудок майбутнього часу, складений дієслівний присудок із модальністю, іменник із
        залежним інфінітивом, складений іменний присудок]
    explanation: Аналітичний майбутній час є формою дієслова, а не окремим складеним присудком.
- type: error-correction
  title: Узгодження і стиль присудка
  instruction: Виправте форму або переформулюйте речення, щоб тип присудка працював доречно.
  items:
  - sentence: "Група студентів підготували звіт як одне ціле."
    error: "підготували"
    correction: "Група студентів підготувала звіт як одне ціле."
    options: ["підготувала", "підготували", "підготувало", "підготовлена"]
    explanation: Якщо центр підмета група і автор бачить її як ціле, присудок має форму жіночого роду однини.
  - sentence: "Звіт є готовий до подання."
    error: "є готовий"
    correction: "Звіт готовий до подання."
    options: ["готовий", "є готовий", "бути готовий", "готового"]
    explanation: У теперішньому часі українська часто має нульову зв'язку.
  - sentence: "Команда буде починати перевіряти дані завтра."
    error: "буде починати перевіряти"
    correction: "Команда почне перевіряти дані завтра."
    options: ["почне перевіряти", "буде починати перевіряти", "є починати перевіряти", "почала готова"]
    explanation: Якщо потрібен старт дії, природніше почне перевіряти.
  - sentence: "Відповідь була здійснена студентом швидко."
    error: "Відповідь була здійснена студентом"
    correction: "Студент відповів швидко."
    options: ["Студент відповів", "Відповідь була здійснена студентом", "Студент був відповідь", "Відповідь є відповів"]
    explanation: Простий дієслівний присудок ясніше називає дію й виконавця.
  - sentence: "Оновлення платформи було зроблене командою без потреби в такій пасивності."
    error: "було зроблене командою"
    correction: "Команда оновила платформу."
    options: ["Команда оновила платформу", "Оновлення було зроблене", "Команда є оновлена", "Платформа була командою"]
    explanation: Якщо важливий виконавець, дієслівний присудок часто кращий за важку іменну конструкцію.
  - sentence: "Ми будемо починати обговорювати план завтра."
    error: "будемо починати обговорювати"
    correction: "Ми почнемо обговорювати план завтра."
    options: ["почнемо обговорювати", "будемо починати обговорювати", "є починати обговорювати", "початок обговорення"]
    explanation: Фаза старту природніше виражається формою почнемо.
  - sentence: "Рішення є чинне до кінця року."
    error: "є чинне"
    correction: "Рішення чинне до кінця року."
    options: ["чинне", "є чинне", "чинним є", "чинного"]
    explanation: Нульова зв'язка в теперішньому часі звучить природніше.
  - sentence: "Автор був пояснив причини."
    error: "був пояснив"
    correction: "Автор пояснив причини."
    options: ["пояснив", "був пояснив", "є пояснив", "пояснення"]
    explanation: Для завершеної дії потрібен простий дієслівний присудок.
workbook:
- id: wb-reading-predicate-focus
  type: reading
  title: "Читання: один зміст, різні присудки"
  instruction: Прочитайте уривок і визначте, як тип присудка змінює фокус.
  source: "Навчальний уривок для модуля B2."
  text: >-
    Команда оновила платформу за два тижні. Спочатку розробники почали перевіряти старі матеріали, потім мали узгодити новий
    графік доступу. Після тестування платформа була готова до запуску, а оновлення стало пріоритетом для наступного етапу
    курсу. У звіті важливо назвати виконавців, але в технічній довідці важливішим є стан системи.
  tasks:
  - "Випишіть простий дієслівний присудок."
  - "Знайдіть складений дієслівний присудок."
  - "Знайдіть складений іменний присудок."
  - "Який варіант найкраще називає виконавця?"
- type: fill-in
  title: Вибір присудка за змістом
  instruction: Доповніть речення доречною формою.
  items:
  - sentence: "Якщо треба назвати завершену дію, напишіть: Команда ____ платформу."
    answer: "оновила"
    options: ["оновила", "почала оновлювати", "готова", "є оновленням"]
    explanation: Завершена дія потребує простого дієслівного присудка.
  - sentence: "Якщо треба показати старт процесу, напишіть: Команда ____ платформу."
    answer: "почала оновлювати"
    options: ["почала оновлювати", "оновила", "готова", "чинна"]
    explanation: Почала оновлювати додає фазу.
  - sentence: "Якщо треба назвати стан, напишіть: Платформа ____."
    answer: "готова"
    options: ["готова", "оновила", "перевірила", "почала"]
    explanation: Готова є іменною частиною присудка.
  - sentence: "Якщо треба назвати обов'язок, напишіть: Відділ ____ звіт."
    answer: "має подати"
    options: ["має подати", "подав", "звіт", "готовий"]
    explanation: Має подати виражає модальність обов'язку.
  - sentence: "Якщо треба назвати нульову зв'язку, напишіть: Звіт ____."
    answer: "готовий"
    options: ["готовий", "є готовий", "подав", "почав"]
    explanation: Готовий є іменною частиною присудка.
  - sentence: "Якщо треба показати можливість, напишіть: Відділ ____ звіт."
    answer: "може подати"
    options: ["може подати", "подав", "готовий", "звіт"]
    explanation: Може подати виражає модальність можливості.
  - sentence: "Якщо треба показати припинення дії, напишіть: Команда ____."
    answer: "перестала сперечатися"
    options: ["перестала сперечатися", "сперечалася", "готова", "рішення"]
    explanation: Перестала сперечатися має фазове значення завершення.
  - sentence: "Якщо треба назвати роль, напишіть: Олег став ____."
    answer: "переможцем"
    options: ["переможцем", "переміг", "може", "писати"]
    explanation: Переможцем є іменною частиною після зв'язки став.
  - sentence: "Якщо треба назвати рекомендацію, напишіть: Причини ____."
    answer: "слід пояснити"
    options: ["слід пояснити", "пояснили", "готові", "пояснення"]
    explanation: Слід пояснити - безособова модальна модель.
  - sentence: "Якщо треба назвати якість результату, напишіть: Доповідь була ____."
    answer: "переконливою"
    options: ["переконливою", "переконала", "може", "почала"]
    explanation: Переконливою є іменною частиною складеного іменного присудка.
- type: match-up
  title: Межові моделі
  instruction: Поєднайте речення з найточнішим поясненням.
  pairs:
  - left: "Він любить читати."
    right: "простий присудок із залежним інфінітивом"
  - left: "Він може читати."
    right: "складений дієслівний присудок"
  - left: "Він читатиме."
    right: "простий дієслівний присудок"
  - left: "Він буде читати."
    right: "аналітичний майбутній час, простий дієслівний"
