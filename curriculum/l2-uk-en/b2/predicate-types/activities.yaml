version: '1.0'
module: predicate-types
level: b2
inline:
- type: quiz
  title: Простий присудок
  instruction: Обери правильний опис присудка.
  items:
  - question: Тихі сосни до ранку шумлять.
    options:
    - text: шумлять — простий дієслівний присудок
      correct: true
    - text: до ранку — присудок
      correct: false
    - text: тихі сосни — присудок
      correct: false
    - text: складений іменний присудок
      correct: false
  - question: Хлопці правлять теревені.
    options:
    - text: правлять теревені — простий фразеологічний присудок
      correct: true
    - text: правлять — зв’язка
      correct: false
    - text: теревені — іменна частина
      correct: false
    - text: складений дієслівний присудок
      correct: false
  - question: Ми будемо перевіряти звітність.
    options:
    - text: будемо перевіряти — простий дієслівний присудок майбутнього часу
      correct: true
    - text: складений іменний присудок
      correct: false
    - text: підмет із прикладкою
      correct: false
    - text: прилягання
      correct: false
  - question: Команда ухвалила рішення.
    options:
    - text: ухвалила — простий дієслівний присудок
      correct: true
    - text: рішення — присудок
      correct: false
    - text: команда ухвалила — словосполучення
      correct: false
    - text: ухвалила рішення — складений іменний присудок
      correct: false
  - question: Рада проголосувала за бюджет.
    options:
    - text: проголосувала — простий дієслівний присудок
      correct: true
    - text: за бюджет — присудок
      correct: false
    - text: рада — присудок
      correct: false
    - text: складений дієслівний присудок
      correct: false
  - question: Редактор перевірив текст.
    options:
    - text: перевірив — простий присудок минулого часу
      correct: true
    - text: перевірив текст — підмет
      correct: false
    - text: редактор перевірив — словосполучення
      correct: false
    - text: складений іменний присудок
      correct: false
  - question: Учасники обговорюватимуть пропозицію.
    options:
    - text: обговорюватимуть — простий дієслівний присудок
      correct: true
    - text: пропозицію — присудок
      correct: false
    - text: учасники — присудок
      correct: false
    - text: нульова зв’язка
      correct: false
  - question: Волонтери допомогли громаді.
    options:
    - text: допомогли — простий дієслівний присудок
      correct: true
    - text: громаді — присудок
      correct: false
    - text: допомогли громаді — складений іменний присудок
      correct: false
    - text: волонтери допомогли — словосполучення
      correct: false
  - question: Звіт надійшов учора.
    options:
    - text: надійшов — простий дієслівний присудок
      correct: true
    - text: учора — присудок
      correct: false
    - text: звіт надійшов — складений дієслівний присудок
      correct: false
    - text: нульова зв’язка
      correct: false
  - question: Експерт поставив запитання.
    options:
    - text: поставив — простий дієслівний присудок
      correct: true
    - text: запитання — присудок
      correct: false
    - text: експерт поставив — складений іменний присудок
      correct: false
    - text: поставив запитання — обставина
      correct: false
- type: fill-in
  title: Інфінітив після допоміжного слова
  instruction: Заповни пропуск інфінітивом.
  items:
  - sentence: Хлопчина почав ____ на запитання.
    answer: відповідати
    options:
    - відповідати
    - відповів
    - відповідь
    - відповідальним
  - sentence: Команда може ____ текст до вечора.
    answer: доопрацювати
    options:
    - доопрацювати
    - доопрацювала
    - доопрацювання
    - доопрацьований
  - sentence: Нам треба ____ джерела.
    answer: перевірити
    options:
    - перевірити
    - перевірка
    - перевірив
    - перевірений
  - sentence: Автор має намір ____ тезу.
    answer: уточнити
    options:
    - уточнити
    - уточнення
    - уточнив
    - уточнений
  - sentence: Учасники перестали ____ про порядок денний.
    answer: сперечатися
    options:
    - сперечатися
    - сперечались
    - суперечка
    - спірний
  - sentence: Секретар повинен ____ рішення.
    answer: зафіксувати
    options:
    - зафіксувати
    - фіксація
    - зафіксував
    - фіксований
  - sentence: Комісія продовжує ____ документи.
    answer: розглядати
    options:
    - розглядати
    - розгляд
    - розглянула
    - розглянутий
  - sentence: Заявник може ____ копію онлайн.
    answer: подати
    options:
    - подати
    - подав
    - подання
    - поданий
  - sentence: Редактор має ____ висновок.
    answer: сформулювати
    options:
    - сформулювати
    - сформулював
    - формулювання
    - сформульований
  - sentence: Група почала ____ результати.
    answer: обговорювати
    options:
    - обговорювати
    - обговорила
    - обговорення
    - обговорений
- type: quiz
  title: Іменна частина
  instruction: Обери правильний опис присудка.
  items:
  - question: Олег став переможцем.
    options:
    - text: став переможцем — складений іменний присудок
      correct: true
    - text: став — простий дієслівний присудок без іменної частини
      correct: false
    - text: переможцем — підмет
      correct: false
    - text: Олег став — словосполучення
      correct: false
  - question: Рішення чинне.
    options:
    - text: чинне — іменна частина з нульовою зв’язкою
      correct: true
    - text: чинне — додаток
      correct: false
    - text: рішення чинне — словосполучення
      correct: false
    - text: простий дієслівний присудок
      correct: false
  - question: Ніч була ясна.
    options:
    - text: була ясна — складений іменний присудок
      correct: true
    - text: була — додаток
      correct: false
    - text: ясна — підмет
      correct: false
    - text: простий фразеологічний присудок
      correct: false
  - question: Порада корисна.
    options:
    - text: корисна — іменна частина присудка
      correct: true
    - text: корисна порада — те саме речення
      correct: false
    - text: порада — присудок
      correct: false
    - text: складений дієслівний присудок
      correct: false
  - question: Документи готові.
    options:
    - text: готові — іменна частина з нульовою зв’язкою
      correct: true
    - text: готові — підмет
      correct: false
    - text: документи готові — сурядний ряд
      correct: false
    - text: майбутній час
      correct: false
  - question: Відповідальність визначена.
    options:
    - text: визначена — результативна іменна частина
      correct: true
    - text: відповідальність — присудок
      correct: false
    - text: визначена — прийменник
      correct: false
    - text: складений дієслівний присудок
      correct: false
  - question: Я студент.
    options:
    - text: студент — іменна частина з нульовою зв’язкою
      correct: true
    - text: я студент — словосполучення
      correct: false
    - text: студент — додаток
      correct: false
    - text: простий дієслівний присудок
      correct: false
  - question: Договір був чинним.
    options:
    - text: був чинним — складений іменний присудок
      correct: true
    - text: був — підмет
      correct: false
    - text: чинним — обставина
      correct: false
    - text: фразеологічний присудок
      correct: false
  - question: Досвід був корисним.
    options:
    - text: був корисним — складений іменний присудок
      correct: true
    - text: досвід — присудок
      correct: false
    - text: корисним — підмет
      correct: false
    - text: простий дієслівний присудок
      correct: false
  - question: Заява стала чинною.
    options:
    - text: стала чинною — складений іменний присудок
      correct: true
    - text: стала — додаток
      correct: false
    - text: чинною — підмет
      correct: false
    - text: майбутній час
      correct: false
- type: group-sort
  title: Центр підмета
  instruction: Розподіли приклади за моделлю узгодження присудка.
  groups:
  - name: Центр — перший компонент
    items:
    - виставка-продаж пройшла
    - музей-садиба придбав
    - школа-інтернат підготувала
    - кафе-книгарня відкрилася
    - місто-герой вистояло
  - name: Кількісна група
    items:
    - росло п’ять сосон
    - п’ять сосон росли
    - багато людей підтримали
    - частина учасників погодилася
    - низка змін набрала чинності
  - name: Проста прозора основа
    items:
    - команда працює
    - учасники працюють
    - рішення готове
    - програма запрацювала
    - сервіс запрацював
- type: match-up
  title: Присудок і регістр
  instruction: Зістав модель присудка з типовим комунікативним ефектом.
  pairs:
  - left: Комісія перевірила документи.
    right: пряма дія і відповідальний виконавець
  - left: Комісія має перевірити документи.
    right: план або обов’язок
  - left: Документи перевірені.
    right: стан результату
  - left: Рішення чинне.
    right: офіційний статус
  - left: Учасники почали обговорювати правку.
    right: початок дії
  - left: Заявник може подати копію онлайн.
    right: можливість
  - left: Мета — бути корисним громаді.
    right: цінність або роль
  - left: Автор довів тезу.
    right: динамічний аргумент
  - left: Слід перевірити адресу.
    right: нормативна рекомендація
  - left: Досвід був корисним.
    right: оцінка стану або результату
  - left: Заявку перевірено.
    right: результат без названого виконавця
  - left: Відділ перевірив заявку.
    right: відповідальний виконавець
