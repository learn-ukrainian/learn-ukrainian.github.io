- type: error-correction
  title: Редагування стилю присудка
  instruction: Заміни важку або неприродну присудкову модель.
  items:
  - sentence: Було здійснено проведення перевірки комісією.
    error: Було здійснено проведення перевірки комісією
    correction: Комісія провела перевірку
    explanation: Якщо виконавець важливий, краще прямий простий присудок.
  - sentence: Документи являються готовими до подання.
    error: являються готовими
    correction: готові
    explanation: Нульова зв’язка природна в теперішньому часі.
  - sentence: Команда має намір перевірка даних.
    error: має намір перевірка
    correction: має намір перевірити дані
    explanation: Після має намір потрібен інфінітив.
  - sentence: Рішення є чинне після голосування.
    error: є чинне
    correction: є чинним / чинне
    explanation: Після явної зв’язки форма має бути послідовною.
  - sentence: Сервіс була запущена вчора.
    error: була запущена
    correction: був запущений / запрацював
    explanation: Присудок узгоджується з іменником сервіс.
  - sentence: Програма запрацював після оновлення.
    error: запрацював
    correction: запрацювала
    explanation: Присудок минулого часу узгоджується з програмою.
  - sentence: П’ять сосон росло на галявині, коли група була попереду.
    error: П’ять сосон росло
    correction: П’ять сосон росли
    explanation: Коли кількісний підмет стоїть перед присудком і фокус на предметах, множина природна.
  - sentence: Моя задача являється пояснити правило.
    error: являється пояснити
    correction: Моє завдання — пояснити правило
    explanation: Краще нульова зв’язка й нормативне слово завдання.
  - sentence: Комісія почала розгляд документів.
    error: почала розгляд
    correction: почала розглядати документи
    explanation: Фазове допоміжне слово відкриває інфінітив.
  - sentence: Порада була корисна у цьому контексті.
    error: була корисна
    correction: була корисною
    explanation: В орудній формі іменна частина після була звучить природніше в цій моделі.
- type: essay-response
  id: predicate-register-note
  title: 'Письмо: вибір присудка для жанру'
  instruction: Напишіть короткий коментар українською про вибір присудків.
  prompt: 'Перепишіть повідомлення у двох версіях: 1) новинна версія з названим виконавцем; 2) офіційна версія з фокусом на
    стані документів. Вихідний зміст: відділ перевірив заявку, виявив помилки, документи готові до повторного подання. Поясніть
    типи присудків.'
  min_words: 170
  model_answer: 'Новинна версія: Відділ перевірив заявку, виявив помилки й підготував документи до повторного подання. Тут
    працюють прості дієслівні присудки, бо важливо назвати виконавця та послідовність дій. Офіційна версія: Заявку перевірено,
    помилки виявлено, документи готові до повторного подання. У цій редакції фокус переходить на результат і стан документів;
    остання частина має складений іменний присудок із нульовою зв’язкою. Обидві версії граматично можливі, але вони відповідають
    різним жанрам. Якщо відповідальність важлива, краще назвати відділ. Якщо важливий статус процедури, природніша результативна
    або іменна модель.'
  rubric:
  - criteria: Розрізнення типів присудків
    description: Відповідь пояснює простий дієслівний і складений іменний присудок.
  - criteria: Жанровий фокус
    description: Автор показує різницю між новинною й офіційною версією.
  - criteria: Нормативність форм
    description: У тексті немає калькованої зв’язки й хибного узгодження.
