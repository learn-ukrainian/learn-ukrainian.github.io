- type: error-correction
  title: Типові помилки інтерференції
  instruction: Виправ граматичну або стилістичну помилку в присудку.
  items:
  - sentence: Рішення являється чинним.
    error: являється чинним
    correction: рішення чинне / рішення є чинним
    explanation: Для теперішнього стану природна нульова зв’язка або є.
  - sentence: Олег став переможець конкурсу.
    error: став переможець
    correction: став переможцем
    explanation: Після стати іменна частина часто має орудний відмінок.
  - sentence: Команда почала робота над текстом.
    error: почала робота
    correction: почала працювати
    explanation: Складений дієслівний присудок потребує інфінітива.
  - sentence: Виставка-продаж пройшов успішно.
    error: пройшов
    correction: пройшла
    explanation: Присудок узгоджується з центром виставка.
  - sentence: Музей-садиба придбала нові експонати.
    error: придбала
    correction: придбав
    explanation: Присудок узгоджується з центром музей.
  - sentence: На галявині росли п’ять високих сосон.
    error: росли
    correction: росло
    explanation: У препозиції з кількісною групою природна форма однини середнього роду.
  - sentence: Моя мета бути корисний громаді.
    error: корисний
    correction: корисним
    explanation: Іменна частина має узгодитися з потрібною формою в конструкції.
