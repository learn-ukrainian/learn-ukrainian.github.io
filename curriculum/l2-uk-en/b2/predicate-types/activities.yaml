- type: error-correction
  title: Узгодження присудка
  instruction: Виправте форму присудка й поясніть центр підмета.
  items:
  - sentence: "Частина учасників підтримали поправку як єдиний блок."
    error: "підтримали"
    correction: "Частина учасників підтримала поправку як єдиний блок."
    options: ["підтримала", "підтримали", "підтримало", "підтриманий"]
    explanation: Центр підмета - частина.
  - sentence: "Рішення про зміни були чинні з понеділка."
    error: "були чинні"
    correction: "Рішення про зміни було чинним з понеділка."
    options: ["було чинним", "були чинні", "була чинна", "був чинний"]
    explanation: Центр підмета рішення в однині середнього роду.
  - sentence: "Троє друзів прийшов на консультацію."
    error: "прийшов"
    correction: "Троє друзів прийшли на консультацію."
    options: ["прийшли", "прийшов", "прийшла", "прийшло"]
    explanation: Кількісна група з кількома виконавцями природно має множину.
  - sentence: "Звіт є готовий до публікації."
    error: "є готовий"
    correction: "Звіт готовий до публікації."
    options: ["готовий", "є готовий", "буде готовий", "готовим"]
    explanation: "У теперішньому часі нейтральна українська модель часто має нульову зв'язку."
  - sentence: "Команда буде починати писати висновок після обіду."
