- id: wb-essay-predicate-rewrite
  type: essay-response
  title: Перепишіть під фокус
  instruction: Перепишіть три речення, змінюючи тип присудка.
  prompt: >-
    Візьміть речення "Команда перевірила матеріали". Напишіть три варіанти: один із фазовим складеним дієслівним присудком,
    один із модальністю, один зі складеним іменним присудком про стан матеріалів. Поясніть, як змінився фокус.
  min_words: 160
  model_answer: >-
    Сильна відповідь має розрізнити дію, старт або обов'язок дії та стан результату: "Команда почала перевіряти матеріали",
    "Команда має перевірити матеріали", "Матеріали готові до публікації після перевірки".
