    correction: "Команда почне писати висновок після обіду."
    options: ["почне писати", "буде починати писати", "є починати", "писання буде"]
    explanation: "Фазу старту природніше виразити формою почне писати."
  - sentence: "Мета курсу є навчити студентів аналізувати речення."
    error: "є навчити"
    correction: "Мета курсу - навчити студентів аналізувати речення."
    options: ["- навчити", "є навчити", "була навчити", "навчила"]
    explanation: "Інфінітивна іменна частина природно оформлюється через тире або іншу ясну модель."
  - sentence: "Комісією було здійснено ухвалення рішення."
    error: "було здійснено ухвалення рішення"
