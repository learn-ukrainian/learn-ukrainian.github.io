    \ це давня коротка фор-\nма зворотного займенника себе \nв Зн. в. однини: Я не\
    \ боюся. — \nЯ ся не бою (діал.). Уживається -ся(-сь) після інфі-\nнітивного суфікса\
    \ -ти(-ть) або \nзакінчення в особових формах \nдієслова: вмивати — вмивати-\n\
