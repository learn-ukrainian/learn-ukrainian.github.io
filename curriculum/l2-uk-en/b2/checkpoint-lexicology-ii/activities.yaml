version: '1.0'
module: checkpoint-lexicology-ii
level: b2

inline:
  - type: match-up
    title: Образ і нейтральне значення
    instruction: Поєднайте ідіому або термін із найточнішим контрольним поясненням.
    pairs:
      - left: мати голову на плечах
        right: діяти розсудливо й кмітливо
      - left: опустилися руки
        right: людина втратила внутрішню готовність діяти
      - left: умити руки
        right: відмовитися від відповідальності за наслідок
      - left: ведмежа послуга
        right: допомога, що фактично шкодить
      - left: стріляний горобець
        right: досвідчена людина, яку важко обдурити
      - left: як з гуски вода
        right: людина не реагує на критику або зауваження
      - left: підлити олії у вогонь
        right: посилити конфлікт або напруження
      - left: камінь спотикання
        right: головна перешкода для домовленості
      - left: згущуються хмари
        right: ситуація стає ризикованішою
      - left: пустити туман в очі
        right: створити оманливе враження

  - type: quiz
    title: Змішане розпізнавання ідіом
    instruction: Виберіть найточніше пояснення для кожної контрольної ситуації.
    items:
      - question: Яке речення найкраще показує соматичну ідіому про відповідальність?
        options:
          - text: Керівник умив руки після власного рішення.
            correct: true
          - text: Над містом згущувалися хмари.
            correct: false
          - text: Волонтер працював як бджілка.
            correct: false
          - text: Команда оновила план дій.
            correct: false
        explanation: Вислів "умити руки" пов'язує образ рук із відмовою від відповідальності.
      - question: Чому "стріляний горобець" небажаний в офіційному відгуку?
        options:
          - text: Бо вислів має фамільярний розмовно-оцінний тон.
            correct: true
          - text: Бо він не має переносного значення.
            correct: false
          - text: Бо він завжди означає недосвідченість.
            correct: false
          - text: Бо це термін цифрової сфери.
            correct: false
        explanation: В офіційному тексті краще "досвідчений фахівець".
      - question: Який вислів найточніше називає посилення конфлікту?
        options:
          - text: підлити олії у вогонь
            correct: true
          - text: пустити коріння
            correct: false
          - text: тримати вуха гостро
            correct: false
          - text: пустити туман в очі
            correct: false
        explanation: Образ вогню передає зростання напруження.
      - question: У якому випадку "біла ворона" потребує етичної обережності?
        options:
          - text: Коли вислів може прозвучати як ярлик для людини.
            correct: true
          - text: Коли треба назвати нейтральний математичний термін.
            correct: false
          - text: Коли слово позначає нову технологічну реалію.
            correct: false
          - text: Коли описано прямий колір птаха.
            correct: false
        explanation: Зооморфний образ може стигматизувати, якщо його вжити без контексту.
      - question: Що найкраще пояснює "камінь спотикання" у переговорах?
        options:
          - text: Головна перешкода, через яку сторони не домовляються.
            correct: true
          - text: Почуття провини після помилки.
            correct: false
          - text: Буквальний предмет на дорозі.
            correct: false
          - text: Будь-який новий термін у тексті.
            correct: false
        explanation: Вислови "камінь на душі" і "камінь спотикання" мають різні значення.
      - question: Коли природнича ідіома "згущуються хмари" доречна?
        options:
          - text: Коли автор образно показує зростання загрози.
            correct: true
          - text: Коли треба назвати хмарне сховище даних.
            correct: false
          - text: Коли описують граматичну форму іменника.
            correct: false
          - text: Коли виправляють паронім.
            correct: false
        explanation: Контекст відрізняє природничий образ від цифрового терміна.
      - question: Яка пара показує протилежні стани дії?
        options:
          - text: опустилися руки - не складати рук
            correct: true
          - text: дрон - дрона
            correct: false
          - text: ефектний - ефективний
            correct: false
          - text: адресат - адресант
            correct: false
        explanation: Перша ідіома називає втрату сил, друга - продовження дії.
      - question: Що треба додати до звинувачення "пустили туман в очі"?
        options:
          - text: Факти, які показують, що саме було приховано або затемнено.
            correct: true
          - text: Список усіх можливих синонімів до слова очі.
            correct: false
          - text: Тільки переклад англійською мовою.
            correct: false
          - text: Обов'язкову заміну на інший зооморфізм.
            correct: false
        explanation: Оцінна ідіома має спиратися на конкретику.
      - question: Яке речення найкраще зберігає офіційний регістр?
        options:
          - text: Досвідчений аналітик виявив ключову перешкоду.
            correct: true
          - text: Стріляний горобець швидко нюхом усе вловив.
            correct: false
          - text: Після наради всі були як риби у воді.
            correct: false
          - text: Він підклав свиню партнерові у звіті.
            correct: false
        explanation: Офіційний текст потребує нейтральної редакції без фамільярного образу.
      - question: Що є найсильнішою B2-відповіддю про ідіому?
        options:
          - text: Назвати групу, значення, регістр і доречну редакцію.
            correct: true
          - text: Лише перекласти її одним англійським словом.
            correct: false
          - text: Заборонити всі образні вислови в будь-якому тексті.
            correct: false
          - text: Виписати тільки частину тіла або назву тварини.
            correct: false
        explanation: Контрольна відповідь має поєднати зміст, функцію і жанр.

  - type: error-correction
    title: Неологізми, кальки і сполучуваність
    instruction: Знайдіть лексичний ризик і виберіть найдоречнішу правку.
    items:
      - sentence: Команда зробила апдейт дорожньої карти після зустрічі з громадою.
        error: зробила апдейт дорожньої карти
        correction: оновила план дій
        error_type: construction
        options:
          - оновила план дій
          - зварила карту
          - зробила дорогу
          - апдейтнула без змін
        explanation: Для широкого тексту природніше "оновила план дій".
      - sentence: Керівник пообіцяв ефектні міри для навчання волонтерів.
        error: ефектні міри
        correction: ефективні заходи
        error_type: phrase
        options:
          - ефективні заходи
          - ефектні виміри
          - ефективні мірила
          - видовищні метри
        explanation: Слово "ефективний" означає результативний, а "заходи" замінює кальку "міри".
      - sentence: Просимо дати фідбек назад до дедлайну.
        error: дати фідбек назад
        correction: надіслати відгуки
        error_type: phrase
        options:
          - надіслати відгуки
          - повернути назад назад
          - фідбекувати відгуком
          - дедлайнити відповідь
        explanation: Слово "назад" дублює значення фідбеку; для широкої аудиторії прозоріше "відгуки".
      - sentence: Після публікації критики команда підлила масло у вогонь.
        error: підлила масло у вогонь
        correction: підлила олії у вогонь
        error_type: phrase
        options:
          - підлила олії у вогонь
          - підлила води в землю
          - поклала камінь на вогонь
          - пустила коріння у вогонь
        explanation: Усталена українська форма - "підлити олії у вогонь".
      - sentence: У заяві підняли проблему непрозорих умов.
        error: підняли проблему
        correction: порушили проблему
        error_type: phrase
        options:
          - порушили проблему
          - підкинули проблему
          - піднесли проблему
          - підняли висоту
        explanation: У нейтральному публічному стилі природніше "порушити проблему".
      - sentence: Адресант отримав листа від університету.
        error: Адресант
        correction: Адресат
        error_type: word
        options:
          - Адресат
          - Адресант
          - Адресація
          - Адресний
        explanation: Адресат отримує повідомлення, адресант його надсилає.
      - sentence: Це ефектний спосіб скоротити витрати на перевірку.
        error: ефектний
        correction: ефективний
        error_type: word
        options:
          - ефективний
          - ефектний
          - дефектний
          - афектний
        explanation: Тут ідеться про результативність, а не про враження.
      - sentence: У широкому оголошенні написали, що онбординг буде після івенту.
        error: онбординг буде після івенту
        correction: вступне навчання відбудеться після заходу
        error_type: register
        options:
          - вступне навчання відбудеться після заходу
          - онбординг івентиться після івенту
          - захід буде після вступного заходу
          - навчання задедлайнили
        explanation: Для широкої аудиторії прозоріші українські відповідники.

  - id: act-4
    type: critical-analysis
    title: Полісемія, паронімія і регістр
    instruction: Проаналізуйте уривок як лексикологічний контроль.
    target_text: "Команда запустила хмару для архіву, але над проєктом згущуються хмари через бюджет. У звіті написали, що ефектні міри дадуть швидкий результат, а адресант отримає інструкцію після дедлайну."
    questions:
      - Які два значення слова "хмара" активовано в уривку?
      - Де є паронімічна помилка і як її виправити?
      - Які слова або конструкції треба змінити для нейтрального звітного регістру?
    model_answers:
      - 'Перша "хмара" є цифровим терміном для зберігання даних, а "згущуються хмари" є природничим образом загрози.'
      - '"Ефектні міри" треба виправити на "ефективні заходи": йдеться про результативність, не про враження.'
      - '"Адресант отримає" треба замінити на "адресат отримає"; "дедлайн" у звіті можна замінити на "кінцевий термін".'
    focus_points:
      - контекстуальна семантика
      - паронімія
      - регістр
      - лексична сполучуваність

  - id: act-5
    type: essay-response
    title: Редакторський висновок
    instruction: Напишіть короткий контрольний висновок з поясненням рішень.
    prompt: "У 150-180 словах проаналізуйте уривок: «Після невдалого івенту команда зробила апдейт дорожньої карти. Керівник попросив не підливати масло у вогонь, бо в усіх руки опустилися, і пообіцяв ефектні міри для онбордингу». Назвіть типи лексичних ризиків і запропонуйте редакцію для широкої аудиторії."
    min_words: 150
    model_answer: |-
      > [!model-answer]
      > Уривок має кілька різних лексичних ризиків. **Івент**, **апдейт** і **онбординг** можуть бути зрозумілі в професійному жаргоні, але для широкої аудиторії прозоріші **захід**, **оновлення**, **вступне навчання**. Конструкція **зробила апдейт дорожньої карти** калькує чужу модель і затемнює зміст; краще **оновила план дій**. Вислів **підливати масло у вогонь** треба виправити на усталену форму **підливати олії у вогонь** або нейтрально **загострювати конфлікт**. **Руки опустилися** зрозуміло, але в нейтральному оголошенні краще **учасники втратили мотивацію**. **Ефектні міри** поєднує паронімічну помилку й кальку; потрібно **ефективні заходи**. Можлива редакція: **Після невдалого заходу команда оновила план дій. Керівник попросив не загострювати конфлікт, бо учасники втратили мотивацію, і пообіцяв ефективні заходи для вступного навчання нових волонтерів.**
    rubric:
      - criteria: Типи ризиків
        description: Названо ідіому, кальку, запозичення, паронімію або регістровий ризик.
        points: 4
      - criteria: Редакція
        description: Запропоновано природну редакцію для широкої аудиторії.
        points: 3
      - criteria: Обґрунтування
        description: Пояснено, чому частину слів треба замінити або пояснити.
        points: 2
      - criteria: Точність
        description: Не змішано "ефектний" з "ефективний" і не заборонено всі запозичення автоматично.
        points: 1

workbook:
  - type: quiz
    title: Термінологічний контроль
    instruction: Виберіть найточніше твердження.
    items:
      - question: Що найкраще описує семантичний неологізм?
        options:
          - text: Старе слово отримує нове значення в новій сфері.
            correct: true
          - text: Будь-яке слово, яке важко вимовити.
            correct: false
          - text: Будь-яке застаріле слово з художнього тексту.
            correct: false
          - text: Слово, що завжди треба заборонити.
            correct: false
        explanation: Наприклад, "хмара" в ІТ має нове термінологічне значення.
      - question: Що є активним словником мовця?
        options:
          - text: Одиниці, які мовець реально вживає.
            correct: true
          - text: Слова, які мовець ніколи не бачив.
            correct: false
          - text: Тільки архаїзми й історизми.
            correct: false
          - text: Усі слова іншомовного походження.
            correct: false
        explanation: Пасивний словник ширший за активне вживання.
      - question: Яка пара є паронімами?
        options:
          - text: ефектний - ефективний
            correct: true
          - text: дрон - дрона
            correct: false
          - text: рука - руки
            correct: false
          - text: хмара - хмарою
            correct: false
        explanation: Пароніми подібні за формою, але різні за значенням.
      - question: Що найкраще описує пуризм у редакторському балансі?
        options:
          - text: Прагнення питомих відповідників, яке має служити ясності.
            correct: true
          - text: Обов'язкове вилучення всіх термінів іншомовного походження.
            correct: false
          - text: Невміння розрізняти ідіоми.
            correct: false
          - text: Буквальний переклад кожного фразеологізму.
            correct: false
        explanation: Продуктивний пуризм не є автоматичною забороною.
      - question: Коли запозичення варто залишити без заміни?
        options:
          - text: Коли воно є точним фаховим терміном для адресатів.
            correct: true
          - text: Коли воно робить текст незрозумілим для всіх.
            correct: false
          - text: Коли існує паронімічна помилка.
            correct: false
          - text: Коли воно спотворює ідіому.
            correct: false
        explanation: Рішення залежить від жанру, аудиторії й точності.
      - question: Що показує полісемія слова "ключ"?
        options:
          - text: Одна форма має кілька пов'язаних значень.
            correct: true
          - text: Дві різні форми звучать майже однаково.
            correct: false
          - text: Слово обов'язково є запозиченим.
            correct: false
          - text: Слово завжди належить до пасивного словника.
            correct: false
        explanation: Слово "ключ" може бути предметом, відповіддю або принципом.
      - question: Яка заміна найкраща для "дати фідбек назад" у широкому оголошенні?
        options:
          - text: надіслати відгуки
            correct: true
          - text: повернути фідбек назад
            correct: false
          - text: зробити реакцію реверсом
            correct: false
          - text: загуглити відповідь
            correct: false
        explanation: Варіант без дублювання значення прозоріший.
      - question: Яка одиниця є історизмом?
        options:
          - text: Назва предмета або явища, що зникло з життя.
            correct: true
          - text: Новий цифровий термін.
            correct: false
          - text: Помилка в паронімічній парі.
            correct: false
          - text: Будь-який розмовний фразеологізм.
            correct: false
        explanation: Історизм пов'язаний зі зниклою реалією.
      - question: Яке речення має природну сполучуваність?
        options:
          - text: Комісія ухвалила рішення і навела аргументи.
            correct: true
          - text: Комісія виготовила рішення і зварила аргументи.
            correct: false
          - text: Комісія дедлайнила рішення і підняла аргументи.
            correct: false
          - text: Комісія зробила рішення і дала фідбек назад.
            correct: false
        explanation: Рішення ухвалюють, аргументи наводять.
      - question: Що має містити сильний лексичний розбір?
        options:
          - text: Тип одиниці, контекст, регістр, ризик і редакцію.
            correct: true
          - text: Лише список усіх слів іншомовного походження.
            correct: false
          - text: Тільки буквальний переклад кожної ідіоми.
            correct: false
          - text: Заборону всіх образних висловів.
            correct: false
        explanation: B2-рівень вимагає пояснити рішення, а не просто знайти слово.

  - type: match-up
    title: Поняття і контрольне питання
    instruction: Поєднайте поняття з питанням, яке його перевіряє.
    pairs:
      - left: полісемія
