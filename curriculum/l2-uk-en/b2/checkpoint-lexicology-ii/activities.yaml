  - id: wb-critical-register
    type: critical-analysis
    title: Жанр змінює рішення
    instruction: Порівняйте два варіанти й поясніть, де який доречний.
    target_text: "Варіант А: «Після івенту просимо дати фідбек до дедлайну». Варіант Б: «Після заходу просимо надіслати відгуки до кінцевого терміну»."
    questions:
      - Для якої аудиторії варіант А може бути прийнятним?
      - Чому варіант Б краще пасує до широкого оголошення?
      - Який принцип редакторського балансу показує ця пара?
    model_answers:
      - Варіант А може бути прийнятним у внутрішньому чаті команди, де "івент", "фідбек" і "дедлайн" є звичними словами.
      - 'Варіант Б прозоріший для ширшої аудиторії: "захід", "відгуки" і "кінцевий термін" не потребують фахового жаргону.'
      - Рішення залежить не від автоматичної заборони запозичень, а від жанру, адресата, мети й точності.
    focus_points:
      - регістр
      - аудиторія
      - редакторський баланс

  - id: wb-essay-lexicology
    type: essay-response
    title: Повний лексичний розбір
    instruction: Напишіть короткий розбір із редакцією.
    prompt: "У 150-180 словах проаналізуйте речення: «Новий застосунок зробив ефектний апдейт, але користувачі як з гуски вода пропустили інструкцію повз вуха». Визначте неологізм або запозичення, ідіоми, паронімічний ризик і запропонуйте нейтральну редакцію."
    min_words: 150
    model_answer: |-
      > [!model-answer]
      > У реченні є кілька різних явищ. **Застосунок** є новішим словом українського словотвору для цифрової сфери; воно доречне, якщо йдеться про програму. **Апдейт** у широкому тексті краще замінити на **оновлення** або дієслово **оновив**. **Ефектний** є паронімічним ризиком: якщо автор має на увазі результативність, потрібно **ефективний**; якщо йдеться про враження, треба пояснити, яке саме. Поєднання **як з гуски вода пропустили інструкцію повз вуха** перевантажує речення двома ідіомами. Перша означає байдужість до критики, друга - не звернути уваги. Для нейтрального повідомлення краще: **Новий застосунок отримав ефективне оновлення, але користувачі не звернули уваги на інструкцію**. Якщо треба зберегти оцінку, можна додати: **попередження пройшло повз увагу частини користувачів**.
    rubric:
      - criteria: Явища
        description: Названо неологізм або запозичення, ідіоми й паронімічний ризик.
        points: 4
      - criteria: Контекст
        description: Пояснено, які значення активні саме в цьому реченні.
        points: 3
      - criteria: Редакція
        description: Подано нейтральну редакцію без втрати факту.
        points: 2
      - criteria: Стиль
        description: Висновок не перетворюється на автоматичну заборону всіх нових слів.
        points: 1
