version: '1.0'
module: passive-voice-system
level: b2
inline: []
workbook:
  - type: quiz
    title: "Вибір конструкції за фокусом"
    instruction: "Оберіть варіант, який найкраще відповідає українській нормі й фокусу речення."
    items:
      - question: "Який варіант найкращий, якщо важливо назвати виконавця рішення?"
        options:
          - text: "Комісія ухвалила рішення."
            correct: true
          - text: "Рішення було ухвалене комісією."
            correct: false
          - text: "Комісією ухвалено рішення."
            correct: false
          - text: "Рішення ухвалюється комісією."
            correct: false
        explanation: "Коли діяч важливий, його треба зробити підметом активного речення."
      - question: "Яке речення найкраще повідомляє лише про завершений результат?"
        options:
          - text: "Заявку погоджено."
            correct: true
          - text: "Заявка була погоджена комісією."
            correct: false
          - text: "Комісією погоджено заявку."
            correct: false
          - text: "Заявка погоджується комісією."
            correct: false
        explanation: "Форма на -но, -то доречна, коли діяча не названо й важливий результат."
      - question: "Який варіант природно описує предмет після виконаної дії?"
        options:
          - text: "Підготовлений звіт передали до архіву."
            correct: true
          - text: "Звіт був підготовлений аналітиками."
            correct: false
          - text: "Аналітиками підготовлено звіт."
            correct: false
          - text: "Звіт підготовлювався аналітиками."
            correct: false
        explanation: "Пасивний дієприкметник природний як означення при іменнику."
      - question: "Яке речення має правильний орудний інструмента?"
        options:
          - text: "Документ підписано електронним ключем."
            correct: true
          - text: "Документ підписано директоркою."
            correct: false
          - text: "Документ був підписаний директоркою."
            correct: false
          - text: "Директоркою підписано документ."
            correct: false
        explanation: "Електронний ключ є засобом, а директорка була б особовим діячем."
      - question: "Який варіант найкраще виправляє кальку з особовим діячем?"
        options:
          - text: "Дослідники перевірили дані."
            correct: true
          - text: "Дані перевірено дослідниками."
            correct: false
          - text: "Дані були перевірені дослідниками."
            correct: false
          - text: "Дані перевірялися дослідниками."
            correct: false
        explanation: "Названий особовий діяч має стояти в активному реченні."
      - question: "Який варіант доречний у короткому офіційному повідомленні без діяча?"
        options:
          - text: "Матеріали оприлюднено на сайті."
            correct: true
          - text: "Матеріали були оприлюднені пресслужбою."
            correct: false
          - text: "Пресслужбою оприлюднено матеріали."
            correct: false
          - text: "Матеріали оприлюднюються пресслужбою."
            correct: false
        explanation: "Форма оприлюднено стисло подає результат і не вводить зайвого діяча."
      - question: "Яке речення найточніше розрізняє природний стан і виконану дію?"
        options:
          - text: "Схили вкриті лісом, а доріжки очищено після зливи."
            correct: true
          - text: "Схили вкрито лісом, а доріжки очищені працівниками."
            correct: false
          - text: "Схили були вкриті лісом працівниками."
            correct: false
          - text: "Доріжки очищалися працівниками, а схили вкрито лісом."
            correct: false
        explanation: "Природний стан краще передати дієприкметником або прикметником; результат дії - формою на -но, -то."
      - question: "Яка версія найкраща для напівофіційного листа від автора?"
        options:
          - text: "Надсилаю оновлений файл і додаю підписаний договір."
            correct: true
          - text: "Оновлений файл надсилається мною, а договір був доданий."
            correct: false
          - text: "Мною надіслано файл і додано договір."
            correct: false
          - text: "Файл був оновлений і надсилався автором."
            correct: false
        explanation: "Коли автор діє прямо, активні форми звучать природніше й відповідальніше."
      - question: "Який варіант найкраще показує процес без названого діяча?"
        options:
          - text: "Нова система впроваджується поступово."
            correct: true
          - text: "Нова система впроваджується міністерством."
            correct: false
          - text: "Міністерством впроваджується нова система."
            correct: false
          - text: "Нова система була впроваджувана міністерством."
            correct: false
        explanation: "Форма на -ся допустима як процес без названого діяча; з діячем краще актив."
      - question: "Яке речення найкраще підходить для протоколу про виконані етапи?"
        options:
          - text: "Проведено консультації, зібрано пропозиції, підготовлено проєкт рішення."
            correct: true
          - text: "Консультації були проведені групою, пропозиції були зібрані нею."
            correct: false
          - text: "Групою проведено консультації та підготовлено проєкт."
            correct: false
          - text: "Консультації проводилися групою, пропозиції збиралися учасниками."
            correct: false
        explanation: "У переліку результатів форми на -но, -то працюють стисло й нормативно."

  - type: fill-in
    title: "Форма результату або актив"
    instruction: "Заповніть пропуск нормативною формою з поданих варіантів."
    items:
      - sentence: "Якщо діяча не названо, у звіті природно: рішення ____ одноголосно."
        answer: "ухвалено"
        options:
          - "ухвалено"
          - "ухвалене комісією"
          - "ухвалюється радою"
          - "ухвалене радою"
        explanation: "Форма ухвалено подає результат без названого діяча."
      - sentence: "Якщо важлива відповідальність, пишемо: комісія ____ рішення."
        answer: "ухвалила"
        options:
          - "ухвалила"
          - "ухвалено"
          - "ухвалена"
          - "ухвалюється"
        explanation: "Названий діяч потребує активного присудка."
      - sentence: "Документ ____ електронним ключем."
        answer: "підписано"
        options:
          - "підписано"
          - "підписаний директоркою"
          - "підписувався директоркою"
          - "підписано директоркою"
        explanation: "Електронний ключ є інструментом, тому орудний доречний."
      - sentence: "Директорка ____ документ після перевірки."
        answer: "підписала"
        options:
          - "підписала"
          - "підписано"
          - "підписана"
          - "підписувалася"
        explanation: "Коли директорка є діячем, потрібен актив."
      - sentence: "У повідомленні про результат краще: дані ____ на сайті."
        answer: "оприлюднено"
        options:
          - "оприлюднено"
          - "оприлюднені пресслужбою"
          - "оприлюднюються пресслужбою"
          - "оприлюдненими"
        explanation: "Оприлюднено фокусує готовий результат."
      - sentence: "У новині з відповідальністю краще: пресслужба ____ дані на сайті."
        answer: "оприлюднила"
        options:
          - "оприлюднила"
          - "оприлюднено"
          - "оприлюднюється"
          - "оприлюднена"
        explanation: "Названа пресслужба виконує дію, тому потрібне активне дієслово."
      - sentence: "У технічному описі природно: поверхню ____ спеціальним розчином."
        answer: "оброблено"
        options:
          - "оброблено"
          - "оброблено майстром"
          - "оброблена майстром"
          - "оброблялася майстром"
        explanation: "Розчин є засобом обробки."
      - sentence: "Якщо названо особу, пишемо: майстер ____ поверхню."
        answer: "обробив"
        options:
          - "обробив"
          - "оброблено"
          - "оброблявся"
          - "оброблений"
        explanation: "Особовий діяч переходить у підмет активного речення."
      - sentence: "Для ознаки предмета доречно: ____ документи передали до архіву."
        answer: "погоджені"
        options:
          - "погоджені"
          - "погоджено"
          - "погодили"
          - "погоджувалися"
        explanation: "Погоджені узгоджується з іменником документи."
      - sentence: "Для процесу без названого діяча можливе: програма ____ поступово."
        answer: "впроваджується"
        options:
          - "впроваджується"
          - "впроваджується командою"
          - "впроваджено командою"
          - "впроваджена командою"
        explanation: "Форма на -ся можлива без названого діяча, якщо фокус на процесі."

  - type: select
    title: "Виберіть нормативні варіанти"
    instruction: "У кожному пункті позначте всі варіанти, що відповідають українській нормі та заданому фокусу."
    items:
      - question: "Які варіанти нормативні, якщо ідеться про результат без названого діяча?"
        min_correct: 2
        options:
          - text: "Звіт підготовлено."
            correct: true
          - text: "Матеріали оприлюднено."
            correct: true
          - text: "Звіт підготовлено аналітиками."
            correct: false
          - text: "Матеріали були оприлюднені пресслужбою."
            correct: false
        explanation: "Форми на -но, -то мають працювати без особового діяча."
      - question: "Які речення правильно називають відповідального діяча?"
        min_correct: 2
        options:
          - text: "Комісія перевірила документи."
            correct: true
          - text: "Директор підписав заяву."
            correct: true
          - text: "Документи перевірено комісією."
            correct: false
          - text: "Заяву підписано директором."
            correct: false
        explanation: "Названий діяч має бути підметом активного речення."
      - question: "Які варіанти мають орудний інструмента, а не діяча?"
        min_correct: 2
        options:
          - text: "Файл захищено паролем."
            correct: true
          - text: "Поверхню оброблено розчином."
            correct: true
          - text: "Файл захищено адміністратором."
            correct: false
          - text: "Поверхню оброблено майстром."
            correct: false
        explanation: "Пароль і розчин є засобами; адміністратор і майстер є діячами."
      - question: "Які варіанти природно використовують пасивний дієприкметник як означення?"
        min_correct: 2
        options:
          - text: "Підписаний договір зберігається в архіві."
            correct: true
          - text: "Оприлюднені дані потребують уточнення."
            correct: true
          - text: "Договір був підписаний сторонами."
            correct: false
          - text: "Дані були оприлюднені пресслужбою."
            correct: false
        explanation: "Означення при іменнику звучить природніше за важкий пасивний присудок."
      - question: "Які речення краще передають процес без названого діяча?"
        min_correct: 2
        options:
          - text: "Система оновлюється щотижня."
            correct: true
          - text: "У відділі готують новий регламент."
            correct: true
          - text: "Система оновлюється адміністраторами."
            correct: false
          - text: "Регламент готується працівниками."
            correct: false
        explanation: "Процес без названого діяча можливий; названого діяча краще подати активно."
      - question: "Які варіанти правильно розрізняють природний стан і результат дії?"
        min_correct: 2
        options:
          - text: "Береги вкриті очеретом."
            correct: true
          - text: "Ділянку засаджено деревами."
            correct: true
          - text: "Береги вкрито очеретом без мислимої дії."
            correct: false
          - text: "Ділянка була засаджена волонтерами."
            correct: false
        explanation: "Природний стан і виконана робота потребують різних моделей."
      - question: "Які варіанти природні в офіційному листі від автора?"
        min_correct: 2
        options:
          - text: "Надсилаю оновлений файл."
            correct: true
          - text: "Додаємо підписаний договір."
            correct: true
          - text: "Файл надсилається мною."
            correct: false
          - text: "Договір був доданий нами."
            correct: false
        explanation: "Автор листа може діяти прямо; штучна безособовість тут не потрібна."
      - question: "Які варіанти доречні для звіту про виконані етапи?"
        min_correct: 2
        options:
          - text: "Проведено консультації."
            correct: true
          - text: "Підготовлено проєкт рішення."
            correct: true
          - text: "Консультації були проведені групою."
            correct: false
          - text: "Проєкт був підготовлений секретарем."
            correct: false
        explanation: "У звіті про результат можна не називати виконавців, якщо вони неважливі."

  - type: error-correction
    title: "Виправте калькований пасив"
    instruction: "Знайдіть помилкову або неприродну конструкцію та замініть її нормативним варіантом."
    items:
      - sentence: "Звіт підготовлено аналітиками відділу."
        error: "підготовлено аналітиками відділу"
        correction: "аналітики відділу підготували звіт"
        error_type: "construction"
        options:
          - "аналітики відділу підготували звіт"
          - "звіт підготовлено аналітиками"
          - "звіт підготовлювався аналітиками"
          - "звіт був підготовлений аналітиками"
        explanation: "Особовий діяч має бути підметом активного речення."
      - sentence: "Заяву підписано директором після наради."
        error: "підписано директором"
        correction: "директор підписав заяву"
        error_type: "construction"
        options:
          - "директор підписав заяву"
          - "підписано директором"
          - "заява підписувалася директором"
          - "заява була підписана директором"
        explanation: "Орудний діяча після -но, -то треба перебудувати на актив."
      - sentence: "Питання розглядається комісією вже третій тиждень."
        error: "розглядається комісією"
        correction: "комісія розглядає питання"
        error_type: "construction"
        options:
          - "комісія розглядає питання"
          - "питання розглядається комісією"
          - "питання було розглядуване комісією"
          - "комісією розглядається питання"
        explanation: "Названу комісію краще поставити підметом."
      - sentence: "Недоліки були помічені мешканцями під час огляду."
        error: "були помічені мешканцями"
        correction: "мешканці помітили недоліки"
        error_type: "construction"
        options:
          - "мешканці помітили недоліки"
          - "недоліки були помічені мешканцями"
          - "мешканцями помічено недоліки"
          - "недоліки помічалися мешканцями"
        explanation: "Якщо мешканці є діячами, актив звучить природніше."
      - sentence: "Документи перевірялися юристкою протягом дня."
        error: "перевірялися юристкою"
        correction: "юристка перевіряла документи"
        error_type: "construction"
        options:
          - "юристка перевіряла документи"
          - "документи перевірялися юристкою"
          - "документи було перевірювано юристкою"
          - "юристкою перевірялися документи"
        explanation: "Форма на -ся з названим діячем калькує пасивну модель."
      - sentence: "Поверхню оброблено майстром перед фарбуванням."
        error: "оброблено майстром"
        correction: "майстер обробив поверхню"
        error_type: "construction"
        options:
          - "майстер обробив поверхню"
          - "оброблено майстром"
          - "поверхня оброблялася майстром"
          - "поверхню було оброблено майстром"
        explanation: "Майстер є діячем, а не інструментом."
      - sentence: "Презентацію було додано нами до листа."
        error: "було додано нами"
        correction: "ми додали презентацію"
        error_type: "construction"
        options:
          - "ми додали презентацію"
          - "було додано нами"
          - "нами додано презентацію"
          - "презентація додавалася нами"
        explanation: "У листі автори можуть назвати свою дію прямо."
      - sentence: "Рішення було ухвалене радою без обговорення."
        error: "було ухвалене радою"
        correction: "рада ухвалила рішення"
        error_type: "construction"
        options:
          - "рада ухвалила рішення"
          - "було ухвалене радою"
          - "радою ухвалено рішення"
          - "рішення ухвалювалося радою"
        explanation: "Коли рада названа, активна конструкція найчіткіша."

  - type: group-sort
    title: "Розподіліть за синтаксичною моделлю"
    instruction: "Розкладіть речення за тим, яку модель вони представляють."
    groups:
      - name: "Активний стан"
        items:
          - "Команда підготувала звіт."
          - "Комісія розглядає питання."
          - "Директор підписав заяву."
          - "Дослідники перевірили дані."
      - name: "Форма на -но, -то"
        items:
          - "Звіт підготовлено."
          - "Заявку погоджено."
          - "Дані оприлюднено."
          - "Поверхню оброблено розчином."
      - name: "Дієприкметник як означення"
        items:
