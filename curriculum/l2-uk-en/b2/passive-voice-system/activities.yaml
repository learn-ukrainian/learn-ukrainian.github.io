version: '1.0'
module: passive-voice-system
level: b2
inline:
  - id: act-1
    type: comparative-study
    title: Один факт, чотири фокуси
    instruction: Порівняйте речення й визначте, що стоїть у центрі кожного варіанта.
    items_to_compare:
      - "Комісія погодила звіт після правок."
      - "Звіт погоджено після правок."
      - "Погоджений звіт передали до архіву."
      - "Звіт погоджувався комісією після правок."
    criteria:
      - діяч
      - результат
      - ознака предмета
      - ризик кальки
    prompt: "Який варіант найкращий для відповідальності, для статусу, для опису документа і для редагування?"
    model_answer: >-
      Актив **комісія погодила звіт** називає відповідального діяча. **Звіт
      погоджено** фіксує результат. **Погоджений звіт** описує документ після
      дії. **Звіт погоджувався комісією** треба перебудувати, бо орудний називає
      особового діяча.

  - id: act-2
    type: critical-analysis
    title: Поверніть діяча в підмет
    instruction: Проаналізуйте кальки й запропонуйте активне редагування.
    target_text: >-
      Заявку погоджено координаторкою. Протокол було підписано членами групи.
      Дані були перевірені аналітиками. Файл був надісланий мною.
    questions:
      - "Де орудний називає особового діяча?"
      - "Які діячі мають стати підметами?"
      - "Який активний варіант звучить найприродніше?"
    model_answers:
      - "Особові діячі: координаторка, члени групи, аналітики, я."
      - "Їх треба зробити підметами, бо вони відповідають за дію."
      - "Координаторка погодила заявку; члени групи підписали протокол; аналітики перевірили дані; я надіслав файл."

  - id: act-3
    type: comparative-study
    title: Результат, діяч чи інструмент
    instruction: Порівняйте речення з орудним і визначте роль орудного.
    items_to_compare:
      - "Документ підписано директором."
      - "Документ підписано електронним ключем."
      - "Поверхню очищено волонтерами."
      - "Поверхню очищено спеціальним розчином."
    criteria:
      - особовий діяч
      - інструмент або засіб
      - активне редагування
      - допустимий орудний
    prompt: "Які речення треба перебудувати на актив, а які можна залишити?"
    model_answer: >-
      **Директором** і **волонтерами** називають особових діячів, тому краще:
      директор підписав документ; волонтери очистили поверхню. **Електронним
      ключем** і **розчином** називають інструмент або засіб, тому орудний
      природний.

  - id: act-4
    type: comparative-study
    title: Форма і функція
    instruction: Зіставте чотири моделі з одним коренем.
    items_to_compare:
      - "Команда оновила платформу."
      - "Платформу оновлено."
      - "Оновлена платформа працює швидше."
      - "Платформа оновлюється щоп'ятниці."
    criteria:
      - актив
      - результат
      - ознака предмета
      - процес або правило
    prompt: "Коли потрібна кожна модель?"
    model_answer: >-
      Актив називає команду. **Оновлено** повідомляє результат. **Оновлена
      платформа** описує предмет після дії. **Оновлюється щоп'ятниці** називає
      регулярний процес або правило.

  - id: act-5
    type: critical-analysis
    title: Перевірте форму на -ся
    instruction: Визначте, де форма на -ся є процесом, а де калькою.
    target_text: >-
      Реєстрація відкривається о дев'ятій. Система оновлюється програмістами.
      Квитки продаються онлайн. Дані оновлюються автоматично. Квитки продавалися
      касиркою.
    questions:
      - "Де форма на -ся називає правило або процес?"
      - "Де орудний називає особового діяча?"
      - "Як переписати кальковані речення?"
    model_answers:
      - "Природні процесові або правилові форми: реєстрація відкривається, квитки продаються онлайн, дані оновлюються автоматично."
      - "Особові діячі в орудному: програмістами, касиркою."
      - "Краще: програмісти оновлюють систему; касирка продавала квитки."

workbook:
  - id: wb-1
    type: critical-analysis
    title: Один процес у трьох стилях
    instruction: Порівняйте три версії повідомлення й визначте, як змінюється фокус.
    target_text: >-
      А: Робоча група підготувала проєкт правил, рада схвалила його, пресслужба
      оприлюднила текст. Б: Проєкт правил підготовлено й схвалено; текст
      оприлюднено. В: Підготовлений і схвалений проєкт правил доступний на сайті.
    questions:
      - "У якій версії видно відповідальних діячів?"
      - "У якій версії найсильніший фокус на результаті?"
      - "У якій версії дієприкметники описують документ?"
    model_answers:
      - "Версія А називає робочу групу, раду й пресслужбу."
      - "Версія Б фіксує результат через форми на -но, -то."
      - "Версія В описує готовий документ через дієприкметники."

  - id: wb-2
    type: critical-analysis
    title: Приберіть кальки в абзаці
    instruction: Виправте речення й поясніть рішення.
    target_text: >-
      Рішення було прийняте радою. Фасад очищено волонтерами. Поверхню очищено
      спеціальним розчином. Оновлений файл надіслано всім учасникам.
    questions:
      - "Які речення треба зробити активними?"
      - "Яке речення з орудним можна залишити?"
      - "Де дієприкметник і форма на -но працюють разом природно?"
    model_answers:
      - "Рада ухвалила рішення; волонтери очистили фасад."
      - "Поверхню очищено спеціальним розчином, бо розчин є засобом."
      - "Оновлений файл надіслано природно поєднує означення й результат."

  - id: wb-3
    type: critical-analysis
    title: Перебудуйте англійський пасив
    instruction: Запропонуйте українські варіанти з відповідальністю і з результатом.
    target_text: >-
      The report was prepared by the analysts. The decision was approved by the
      council. The data were published on the website. The file was protected by
      a password.
    questions:
      - "Де потрібен актив, якщо діяч важливий?"
      - "Де доречна форма на -но, -то?"
      - "Де орудний є інструментом?"
    model_answers:
      - "Аналітики підготували звіт; рада схвалила рішення; пресслужба оприлюднила дані."
      - "Звіт підготовлено; рішення схвалено; дані оприлюднено."
      - "Файл захищено паролем, бо пароль є інструментом."

  - id: wb-4
    type: comparative-study
    title: Фінальна перевірка системи
    instruction: Порівняйте правильні моделі для трьох потреб.
    items_to_compare:
      - "Звіт підготовлено."
      - "Підписаний договір лежить у теці."
      - "Комісія схвалила зміни."
      - "Дані оновлюються автоматично."
    criteria:
      - результат
      - ознака предмета
      - відповідальний діяч
      - процес або правило
    prompt: "Яка модель відповідає кожній потребі?"
    model_answer: >-
      **Звіт підготовлено** - результат. **Підписаний договір** - ознака
      предмета. **Комісія схвалила** - відповідальний діяч. **Дані оновлюються**
      - процес або правило.

  - id: wb-5
    type: critical-analysis
    title: Редакторський маршрут
    instruction: Складіть маршрут редагування для пасивної кальки.
    target_text: >-
      План був підготовлений експертами, обговорювався мешканцями й був
      затверджений радою. Після цього матеріали були опубліковані пресслужбою.
    questions:
      - "Як виглядає версія з відповідальністю?"
      - "Як виглядає коротка результативна версія?"
      - "Як виглядає версія з дієприкметниками як означеннями?"
    model_answers:
      - "Експерти підготували план, мешканці його обговорили, рада затвердила, пресслужба оприлюднила матеріали."
      - "План підготовлено, обговорено й затверджено; матеріали оприлюднено."
      - "Підготовлений, обговорений і затверджений план став основою для програми."
