  - type: essay-response
    id: official-request
    title: "Письмо: офіційний запит"
    instruction: "Напишіть короткий офіційний текст і свідомо розподіліть активні та результативні форми."
    prompt: "Напишіть звернення до міської ради про стан виконання проєкту з оновлення паркової зони. Використайте щонайменше три форми на -но, -то, один пасивний дієприкметник як означення та два активні речення з названими діячами."
    min_words: 180
    model_answer: "Просимо надати інформацію про стан виконання проєкту з оновлення паркової зони. Згідно з оприлюдненим графіком, проєктну документацію підготовлено, частину доріжок відремонтовано, а систему освітлення має бути оновлено до кінця кварталу. Водночас мешканці помітили кілька недоліків: біля дитячого майданчика не встановлено інформаційний стенд, а частину лавок досі не закріплено. Просимо повідомити, хто відповідає за усунення цих недоліків і коли підрядник завершить роботи. Також просимо пояснити, чи міська рада вже погодила додатковий кошторис і чи підрядник подав уточнений графік."
    rubric:
      - criteria: "Нормативність пасивних конструкцій"
        description: "Форми на -но, -то не мають названого особового діяча в орудному."
        points: 3
      - criteria: "Керування фокусом"
        description: "Актив використано там, де важлива відповідальність, а результативні форми - там, де важливий факт виконання."
        points: 3
      - criteria: "Регістр"
        description: "Текст звучить як офіційний запит без зайвого канцелярського пасиву."
        points: 2
      - criteria: "Мовна точність"
        description: "Речення граматично узгоджені, без калькованих конструкцій на -ся з названим діячем."
        points: 2
    peer_review_guidelines: "Перевірте наявність орудного діяча після форм на -но, -то; окремо позначте активні речення, які називають відповідальних виконавців."

