  - type: reading
    id: reading-report
    title: "Читання: службове повідомлення"
    instruction: "Прочитайте уривок і виконайте мовні завдання до нього."
    text: "Після громадського обговорення проєкт оновлення скверу доопрацьовано. До плану внесено пропозиції щодо освітлення, доступності та збереження старих дерев. Частину зауваг відхилено, бо вони суперечили вимогам безпеки. Підрядник підготує уточнений графік робіт до кінця тижня. Мешканці можуть подати додаткові коментарі через електронну форму."
    source: "Навчальний текст для модуля B2."
    tasks:
