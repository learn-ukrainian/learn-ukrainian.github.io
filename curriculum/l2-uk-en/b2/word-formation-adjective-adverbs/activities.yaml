version: '1.0'
module: word-formation-adjective-adverbs
level: b2
inline: []
workbook:
  - type: reading
    id: adjective-adverbs-reading
    title: "Читання: мовний портрет міста"
    instruction: "Прочитайте уривок і визначте, як прикметники та прислівники уточнюють опис."
    source: "Навчальний уривок для модуля B2."
    text: >-
      Київська громада заздалегідь підготувала новий культурний маршрут. Спершу волонтери дбайливо відновили кам'яний вхід до старої читальні, потім обережно розмістили паперові архівні копії у прозорих теках. Празький реставратор по-братерськи допоміг команді, а кременчуцький майстер запропонував ефективний спосіб очищення дерева. Простір виглядав барвисто, але не випадково: кожен вказівник, кожна мальовнича деталь і кожне стисло написане пояснення працювали на зв'язність маршруту.
    tasks:
      - "Випишіть п'ять прикметників, утворених від іменників або географічних назв."
      - "Випишіть п'ять прислівників і визначте їхній тип: спосіб дії, час, порядок, міра."
      - "Поясніть, чому «київська громада» є відносним прикметником."
      - "Знайдіть у тексті прикметник із суфіксом -н-."
      - "Знайдіть прикметник, який містить географічне чергування перед -ськ-."
      - "Поясніть написання прислівника «по-братерськи»."
      - "Знайдіть прислівник, який організовує порядок подій."
      - "Поясніть, як прислівник «заздалегідь» змінює часову рамку дії."
      - "Визначте, який прикметник у тексті має оцінне значення."
      - "Знайдіть пару прикметник-прислівник, пов'язану зі способом роботи."
      - "Сформулюйте головну думку уривка одним реченням."
      - "Перепишіть одне речення так, щоб у ньому було менше прикметників, але зміст не втратив точності."
  - type: essay-response
    id: adjective-adverbs-essay
    title: "Власне висловлення: точний опис простору"
    instruction: "Напишіть 180-220 слів про громадський простір, школу, майстерню або культурний маршрут."
    prompt: "Використайте щонайменше 10 прикметників різних моделей і 8 прислівників різних типів. Поясніть, як ці слова допомагають створити точний стиль."
    min_words: 180
    model_answer: >-
      У старій кам'яній школі відкрили навчальний простір для міської громади. Київські волонтери заздалегідь підготували маршрут, а місцевий майстер дбайливо відновив дерев'яні сходи. У першій кімнаті зберігаються паперові копії архівних документів, у другій працює барвиста майстерня для дітей, а на подвір'ї стоїть мальовничий вказівник. Простір організовано по-новому: спершу відвідувач читає коротке пояснення, потім переходить до практичного завдання і зрештою сам описує побачене. Прикметники уточнюють матеріал, походження й оцінку, а прислівники показують час, порядок і спосіб дії.
    rubric:
      - criteria: "Словотвірна різноманітність"
        description: "Використано прикметники з різними суфіксами й географічними моделями."
        points: 2
      - criteria: "Прислівникова точність"
        description: "Прислівники справді уточнюють час, спосіб, порядок або міру."
        points: 2
      - criteria: "Правопис"
        description: "Правильно написано дефісні, суцільні й окремі форми."
        points: 1
  - type: critical-analysis
    id: adjective-adverbs-critical
    title: "Критичний аналіз: прикметник, прислівник і стиль"
    instruction: "Порівняйте дві версії опису й визначте, яка точніша."
    target_text: "Місце було гарне, і команда добре все зробила. Старий кам'яний простір виглядав мальовничо, а команда дбайливо й послідовно відновила архівну читальню."
    questions:
      - "Яка версія точніша й чому?"
      - "Які прикметники в другій версії називають матеріал або функцію?"
      - "Які прислівники уточнюють спосіб дії?"
      - "Чому слово «гарне» слабше за «кам'яний» і «мальовничо»?"
      - "Який прикметник у другій версії є відносним?"
      - "Який прикметник у другій версії має оцінне значення?"
      - "Чи можна прибрати один прислівник без втрати змісту?"
      - "Як слово «послідовно» допомагає когезії?"
      - "Яку дію конкретизує прислівник «дбайливо»?"
      - "Яку роль має словосполучення «архівна читальня»?"
      - "Коли загальна оцінка «добре» може бути доречною?"
      - "Сформулюйте правило редагування для прикметників і прислівників."
    model_answers:
      - "Друга версія точніша, бо називає матеріал, вигляд, спосіб роботи й функцію простору."
      - "Кам'яний називає матеріал, архівна - функціональну сферу."
      - "Дбайливо й послідовно уточнюють спосіб роботи."
      - "Гарне є загальною оцінкою, а друга версія показує конкретні ознаки."
      - "Архівна є відносним прикметником."
      - "Мальовничо має оцінний описовий відтінок."
      - "Можна прибрати один прислівник, якщо попередній контекст уже показує спосіб роботи."
      - "Послідовно показує порядок і логіку дій."
      - "Дбайливо конкретизує дію відновлення."
      - "Архівна читальня називає простір через його функцію."
      - "Добре доречне в короткій розмовній оцінці, коли точність не потрібна."
      - "Загальну оцінку треба замінювати конкретною ознакою або способом дії."
    focus_points:
      - "точність ознаки"
      - "прислівник як обставина"
      - "редагування загальних слів"
  - type: quiz
    title: "Оберіть нормативну форму"
    instruction: "Виберіть правильний прикметник або прислівник."
    items:
      - question: "Прикметник від «Прага»:"
        options:
          - text: "празький"
            correct: true
          - text: "прагський"
            correct: false
          - text: "працький"
            correct: false
          - text: "пражний"
            correct: false
        explanation: "г + ськ переходить у зьк: празький."
      - question: "Прикметник від «козак»:"
        options:
          - text: "козацький"
            correct: true
          - text: "козакський"
            correct: false
          - text: "козаський"
            correct: false
          - text: "козачний"
            correct: false
        explanation: "к + ськ переходить у цьк."
      - question: "Як пишеться прислівник за моделлю по-...-ому?"
        options:
          - text: "по-новому"
            correct: true
          - text: "по новому"
            correct: false
          - text: "поновому"
            correct: false
          - text: "по новім"
            correct: false
        explanation: "Модель по-...-ому пишеться через дефіс."
      - question: "Яке слово означає «такий, що дає результат»?"
        options:
          - text: "ефективний"
            correct: true
          - text: "ефектний"
            correct: false
          - text: "ефектовий"
            correct: false
          - text: "ефектливий"
            correct: false
        explanation: "Ефективний дає результат, ефектний справляє враження."
      - question: "Який прислівник означає дію з наміром?"
        options:
          - text: "навмисно"
            correct: true
          - text: "випадково"
            correct: false
          - text: "здалеку"
            correct: false
          - text: "удвічі"
            correct: false
        explanation: "Навмисно означає свідомо, з наміром."
      - question: "Яке написання правильне для напряму руху?"
        options:
          - text: "вийти назустріч гостям"
            correct: true
          - text: "вийти на зустріч гостям"
            correct: false
          - text: "вийти на-зустріч гостям"
            correct: false
          - text: "вийти назу стріч гостям"
            correct: false
        explanation: "Для напряму або руху до когось уживаємо назустріч."
      - question: "Прикметник від «Париж»:"
        options:
          - text: "паризький"
            correct: true
          - text: "парижський"
            correct: false
          - text: "парицький"
            correct: false
          - text: "парижевий"
            correct: false
        explanation: "ж + ськ переходить у зьк."
      - question: "Яке слово є якісним прикметником з ознакою турботи?"
        options:
          - text: "дбайливий"
            correct: true
          - text: "дбайний"
            correct: false
          - text: "дбайовий"
            correct: false
          - text: "дбайський"
            correct: false
        explanation: "Дбайливий означає уважний, турботливий."
      - question: "Яка форма є прислівником часу?"
        options:
          - text: "заздалегідь"
            correct: true
          - text: "празький"
            correct: false
          - text: "кам'яний"
            correct: false
          - text: "громадянський"
            correct: false
        explanation: "Заздалегідь показує час виконання дії."
      - question: "Який прикметник стосується громадянина й правового статусу?"
        options:
          - text: "громадянський"
            correct: true
          - text: "громадський"
            correct: false
          - text: "громадний"
            correct: false
          - text: "громадовий"
            correct: false
        explanation: "Громадянський пов'язаний із громадянином, правами, обов'язками."
      - question: "Який прислівник пишеться через дефіс?"
        options:
          - text: "по-братерськи"
            correct: true
          - text: "заздалегідь"
            correct: false
          - text: "навмисно"
            correct: false
          - text: "додому"
            correct: false
        explanation: "По-братерськи має модель по-...-и."
      - question: "Яке слово називає зв'язність тексту?"
        options:
          - text: "когезія"
            correct: true
          - text: "подвоєння"
            correct: false
          - text: "дефіс"
            correct: false
          - text: "суфікс"
            correct: false
        explanation: "Когезія - зв'язність частин тексту."
  - type: match-up
    title: "Слово і словотвірна функція"
    instruction: "Поєднайте слово з поясненням."
    pairs:
      - left: "лісний"
        right: "прикметник із суфіксом -н-"
      - left: "паперовий"
        right: "відносний прикметник із -ов-"
      - left: "дбайливий"
        right: "прикметник ознаки з -лив-"
      - left: "барвистий"
        right: "прикметник насиченої ознаки з -ист-"
      - left: "козацький"
        right: "к + ськ -> цьк"
      - left: "празький"
        right: "г + ськ -> зьк"
      - left: "по-новому"
        right: "прислівник через дефіс"
      - left: "заздалегідь"
        right: "прислівник часу"
      - left: "додому"
        right: "адвербіалізована форма напряму"
      - left: "вдвічі"
        right: "прислівник міри"
      - left: "назустріч"
        right: "цілісна форма напряму"
      - left: "когезія"
        right: "зв'язність тексту"
  - type: fill-in
    title: "Доберіть прикметник або прислівник"
    instruction: "Заповніть пропуски нормативними формами."
    items:
      - sentence: "Екскурсія почалася біля ____ брами старого міста."
        answer: "кам'яної"
        options: ["кам'яної", "камінної", "кам'янистської", "кам'януватої"]
        explanation: "Кам'яний називає матеріал."
      - sentence: "У тексті згадано ____ музей і паризький бульвар."
        answer: "празький"
        options: ["празький", "прагський", "працький", "празовий"]
        explanation: "Прага -> празький."
      - sentence: "Від слова «козак» утворюємо прикметник ____."
        answer: "козацький"
        options: ["козацький", "козакський", "козаський", "козачевий"]
        explanation: "к + ськ -> цьк."
      - sentence: "Команда ____ підготувала матеріали до виставки."
        answer: "заздалегідь"
        options: ["заздалегідь", "за здалегідь", "заздале гідь", "за-здалегідь"]
        explanation: "Заздалегідь пишеться разом."
      - sentence: "Волонтери діяли ____ і не пошкодили архів."
        answer: "обережно"
        options: ["обережно", "обережний", "обережність", "обережним"]
        explanation: "Потрібен прислівник способу дії."
      - sentence: "Проєкт організували ____."
        answer: "по-новому"
        options: ["по-новому", "по новому", "поновому", "по-новім"]
        explanation: "Модель по-...-ому пишеться через дефіс."
      - sentence: "Він вийшов ____ гостям."
        answer: "назустріч"
        options: ["назустріч", "на зустріч", "на-зустріч", "на зу стріч"]
        explanation: "Тут ідеться про напрям руху."
      - sentence: "Вона прийшла ____ з редактором."
        answer: "на зустріч"
        options: ["на зустріч", "назустріч", "на-зустріч", "назу стріч"]
        explanation: "Можна додати означення: на важливу зустріч."
      - sentence: "У звіті потрібен ____ метод, а не лише ефектна презентація."
        answer: "ефективний"
        options: ["ефективний", "ефектний", "ефектливий", "ефектовий"]
        explanation: "Ефективний означає результативний."
      - sentence: "Автор ____ поєднав аргументи в один висновок."
        answer: "послідовно"
        options: ["послідовно", "послідовний", "послідовність", "послідовного"]
        explanation: "Потрібен прислівник способу дії."
      - sentence: "У тексті бракує ____, тому абзаци погано пов'язані."
        answer: "когезії"
        options: ["когезії", "когезійний", "когезійно", "когезією"]
        explanation: "Після «бракує» потрібен родовий відмінок іменника."
      - sentence: "Маршрут ____ веде до оглядового майданчика."
        answer: "вгору"
        options: ["вгору", "у гору", "в-гору", "в гору"]
        explanation: "Тут форма означає напрям руху."
  - type: cloze
    title: "Прикметники та прислівники в описі"
    instruction: "Вставте пропущені слова."
    passage: "У {1} громаді відкрили {2} простір. Команда {3} підготувала маршрут, {4} перевірила джерела і {5} пояснила правила. У залі стояли {6} шафи з {7} документами, а на стіні висів {8} вказівник. Гість із Праги написав {9} відгук, а майстер із Кременчука запропонував {10} рішення. Потім усі вийшли {11} волонтерам і {12} піднялися {13}. У фінальному абзаці автор використав {14}, щоб текст був {15} і {16}."
