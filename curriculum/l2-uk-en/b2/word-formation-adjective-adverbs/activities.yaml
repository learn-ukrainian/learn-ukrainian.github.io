      - id: 11
        answer: "назустріч"
        options: ["назустріч", "на зустріч", "на-зустріч", "назу стріч"]
      - id: 12
        answer: "повільно"
        options: ["повільно", "повільний", "повільність", "повільного"]
      - id: 13
