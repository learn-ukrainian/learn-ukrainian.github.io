version: '1.0'
module: word-formation-adjective-adverbs
level: b2
inline:
- type: match-up
  title: "Прикметникова модель і значення"
  instruction: "Поєднайте прикметник або модель із тим, що вона додає до змісту."
  pairs:
  - left: "лісний"
    right: "зв'язок з іменником; суфікс -н-"
  - left: "денний"
    right: "суфікс -н- із подвоєнням приголосного"
  - left: "паперовий"
    right: "матеріал або належність; модель -ов-"
  - left: "металевий"
    right: "матеріал; модель -ев-"
  - left: "дбайливий"
    right: "схильність або якість дії; модель -лив-"
  - left: "барвистий"
    right: "насичена видима ознака; модель -ист-"
  - left: "вусатий"
    right: "наявність помітної ознаки; модель -ат-"
  - left: "зеленкуватий"
    right: "неповний або слабший відтінок"
  - left: "малесенький"
    right: "експресивне пом'якшення або емоційна оцінка"
  - left: "ефективний"
    right: "результативний; не те саме, що ефектний"

- type: select
  title: "Географічний прикметник: форма і пастка"
  instruction: "Позначте всі правильні твердження для кожного прикладу."
  items:
  - question: "«Празький досвід допоміг команді»."
    min_correct: 2
    options:
    - text: "Форма утворена за моделлю г + ськ -> зьк."
      correct: true
    - text: "Йдеться про зв'язок із Прагою."
      correct: true
    - text: "Правильна форма - прагський."
      correct: false
    - text: "Це прислівник способу дії."
      correct: false
    explanation: "Прага дає прикметник празький."
  - question: "«Козацька рада зібралася на майдані»."
    min_correct: 2
    options:
    - text: "К + ськ переходить у цьк."
      correct: true
    - text: "Прикметник може мати історико-культурний зміст."
      correct: true
    - text: "Нормативна форма - козакський."
      correct: false
    - text: "Слово треба писати через дефіс."
      correct: false
    explanation: "Козак -> козацький."
  - question: "«Кременчуцький міст відремонтували»."
    min_correct: 2
    options:
    - text: "Форма пов'язана з топонімом Кременчук."
      correct: true
    - text: "К + ськ дає цьк."
      correct: true
    - text: "Правильно - кременчукський."
      correct: false
    - text: "Це якісний прикметник зі ступенями порівняння."
      correct: false
    explanation: "Кременчук -> кременчуцький."
  - question: "«Громадський транспорт працює довше»."
    min_correct: 2
    options:
    - text: "Громадський пов'язаний із суспільством або публічною сферою."
      correct: true
    - text: "Тут не треба замінювати на громадянський."
      correct: true
    - text: "Громадянський транспорт - точніша офіційна форма."
      correct: false
    - text: "Слово громадський є прислівником."
      correct: false
    explanation: "Транспорт є публічним, а не пов'язаним із правовим статусом громадянина."
  - question: "«Нью-йоркський університет відкрив програму»."
    min_correct: 2
    options:
    - text: "Форму іншомовної назви треба перевіряти як усталену."
      correct: true
    - text: "Нью-йоркський пишеться через дефіс у складі основи."
      correct: true
    - text: "Правильно - нью-йорцький."
      correct: false
    - text: "Це приклад суфікса -ат-."
      correct: false
    explanation: "Не всі іншомовні основи підпорядковуються механічній зміні к + ськ."
  - question: "«Казахський орнамент описали в каталозі»."
    min_correct: 2
    options:
    - text: "Форма казахський є усталеною."
      correct: true
    - text: "Не треба механічно писати казацький."
      correct: true
    - text: "Це прислівник, утворений від прикметника."
      correct: false
    - text: "Правильна форма завжди казаський."
      correct: false
    explanation: "Казахський належить до форм, які треба перевіряти як усталені."
  - question: "«Золоте серце»."
    min_correct: 2
    options:
    - text: "Прикметник має метафоричне якісне значення."
      correct: true
    - text: "Це не обов'язково матеріал із золота."
      correct: true
    - text: "Слово золоте тут є прислівником."
      correct: false
    - text: "Таке вживання завжди помилка."
      correct: false
    explanation: "Відносний прикметник може переходити в якісний через метафору."
  - question: "«Кам'яниста стежка веде вгору»."
    min_correct: 2
    options:
    - text: "Кам'яниста означає таку, що має багато каміння."
      correct: true
    - text: "Вгору є прислівником напряму."
      correct: true
    - text: "Кам'яниста завжди означає зроблена з каменю."
      correct: false
    - text: "Вгору тут треба писати окремо як у гору."
      correct: false
    explanation: "Кам'яний і кам'янистий розрізняють матеріал і ознаку поверхні."

- type: group-sort
  title: "Як утворено прислівник?"
  instruction: "Розсортуйте форми за способом творення або функцією."
  groups:
  - name: "Від прикметника: -о / -е"
    items: ["швидко", "добре", "гаряче", "упевнено", "обережно"]
  - name: "По-...-ому / -и"
    items: ["по-новому", "по-братерськи", "по-особливому", "по-українському"]
  - name: "Адвербіалізована форма напряму або часу"
    items: ["додому", "влітку", "вдвічі", "зранку"]
  - name: "Когезія або організація тексту"
    items: ["спершу", "потім", "отже", "зрештою"]

- type: fill-in
  title: "Правопис прислівників у контексті"
  instruction: "Оберіть форму, яка відповідає змісту речення."
  items:
  - sentence: "Команда пояснила правило ____: спочатку показала помилку, а потім дала алгоритм."
    answer: "по-новому"
    options: ["по-новому", "по новому", "поновому", "по новім"]
    explanation: "Модель по-...-ому пишеться через дефіс."
  - sentence: "Волонтери вийшли ____ гостям біля входу."
    answer: "назустріч"
    options: ["назустріч", "на зустріч", "на-зустріч", "назу стріч"]
    explanation: "Тут ідеться про рух у бік когось, тому це цілісний прислівник."
  - sentence: "Делегація прийшла ____ з координатором о десятій."
    answer: "на зустріч"
    options: ["на зустріч", "назустріч", "на-зустріч", "назу стріч"]
    explanation: "Можна додати означення: на робочу зустріч."
  - sentence: "Студенти вивчили таблицю ____."
    answer: "напам'ять"
    options: ["напам'ять", "на пам'ять", "на-пам'ять", "напам ять"]
    explanation: "Цілісний спосіб дії пишеться разом."
  - sentence: "У звіті покладалися ____ очевидця."
    answer: "на пам'ять"
    options: ["на пам'ять", "напам'ять", "на-пам'ять", "напам ять"]
    explanation: "Тут пам'ять лишається іменником."
  - sentence: "Майстер піднявся ____ сходами."
    answer: "вгору"
    options: ["вгору", "у гору", "в-гору", "в гору"]
    explanation: "Напрям руху передано прислівником."
  - sentence: "Стежка вела ____ над селом."
    answer: "у гору"
    options: ["у гору", "вгору", "у-гору", "в гору"]
    explanation: "Гора є конкретним об'єктом."
  - sentence: "Редактор ____ перевіряє приклади перед публікацією."
    answer: "заздалегідь"
    options: ["заздалегідь", "за здалегідь", "за-здалегідь", "заздалегідьо"]
    explanation: "Усталений прислівник часу пишеться разом."
  - sentence: "Вона підтримала колегу ____."
    answer: "по-братерськи"
    options: ["по-братерськи", "по братерськи", "побратерськи", "по-братерський"]
    explanation: "Модель по-...-и пишеться через дефіс."
  - sentence: "Група тренується ____, щоб автоматизувати правопис."
    answer: "щоденно"
    options: ["щоденно", "що денно", "що-денно", "щоденний"]
    explanation: "Щоденно є прислівником регулярності."

- type: error-correction
  title: "Суфікс, правопис або калька?"
  instruction: "Виправте форму й поясніть тип помилки."
  items:
  - sentence: "Це ефектний метод запам'ятовування правил."
    error: "ефектний"
    correction: "ефективний"
    options: ["ефективний", "ефектний", "ефектовий", "ефектливий"]
    explanation: "Effective перекладаємо як ефективний: такий, що дає результат."
  - sentence: "Ми обговорили громадянський транспорт у центрі міста."
    error: "громадянський"
    correction: "громадський"
    options: ["громадський", "громадянський", "громадяний", "громадовий"]
    explanation: "Транспорт належить до публічної сфери, не до статусу громадянина."
  - sentence: "У тексті згадано парижський музей."
    error: "парижський"
    correction: "паризький"
    options: ["паризький", "парижський", "парицький", "парижовий"]
    explanation: "Ж + ськ переходить у зьк."
  - sentence: "Козакський мотив повторюється у фіналі."
    error: "козакський"
    correction: "козацький"
    options: ["козацький", "козакський", "козаський", "козачний"]
    explanation: "К + ськ переходить у цьк."
  - sentence: "Автор пояснив правило по новому."
    error: "по новому"
    correction: "по-новому"
    options: ["по-новому", "по новому", "поновому", "по новій"]
    explanation: "Модель по-...-ому пишеться через дефіс."
  - sentence: "Волонтер ішов на зустріч гостям біля входу."
    error: "на зустріч"
    correction: "назустріч"
    options: ["назустріч", "на зустріч", "на-зустріч", "назу стріч"]
    explanation: "Ідеться про напрям до гостей, а не про подію-зустріч."
  - sentence: "Семінар щоденний відбувався онлайн."
    error: "щоденний"
    correction: "щоденно"
    options: ["щоденно", "щоденний", "що денно", "щоденніше"]
    explanation: "Потрібен прислівник, бо слово уточнює дію."
  - sentence: "Команда навмисний повторила приклад."
    error: "навмисний"
    correction: "навмисно"
    options: ["навмисно", "навмисний", "навмисним", "навмисність"]
    explanation: "Дію уточнює прислівник."
  - sentence: "У звіті написали кременчукський міст."
    error: "кременчукський"
    correction: "кременчуцький"
    options: ["кременчуцький", "кременчукський", "кременчуський", "кременчуковий"]
    explanation: "К + ськ переходить у цьк."
  - sentence: "Вона описала барвовий плакат."
    error: "барвовий"
    correction: "барвистий"
    options: ["барвистий", "барвовий", "барвний", "барватий"]
    explanation: "Барвистий природно означає насичений барвами."

workbook:
- id: workbook-1
  type: reading
  title: "Читання: мовний портрет майстерні"
  instruction: "Прочитайте уривок і визначте роль прикметників та прислівників."
  source: "Навчальний уривок для модуля B2."
  text: >-
    Київська реставраційна майстерня заздалегідь підготувала новий маршрут
    для відвідувачів. У першій кімнаті лежали паперові копії архівних
    документів, у другій дбайливий викладач пояснював, як безпечно очищати
    дерев'яні рами, а в коридорі висів барвистий вказівник до виставкової
    зали. Празький консультант по-братерськи допоміг команді, проте
    кременчуцький майстер наполіг на точнішій технічній інструкції. Текст
    на стенді переписали по-новому: спершу назвали матеріали, потім
    пояснили послідовність дій і зрештою додали коротке попередження.
  tasks:
  - "Випишіть п'ять прикметників і назвіть їхню функцію."
  - "Знайдіть чотири прислівники способу, часу або послідовності."
  - "Поясніть, чому празький і кременчуцький мають різні чергування."
  - "Знайдіть приклад реєстрового вибору між побутовим і технічним описом."

- type: match-up
  title: "Слово і редакторська перевірка"
  instruction: "Поєднайте форму з питанням, яке треба поставити під час редагування."
  pairs:
  - left: "кам'яний"
    right: "це матеріал чи переносна твердість?"
  - left: "кам'янистий"
    right: "чи йдеться про поверхню з багатьма каменями?"
  - left: "громадський"
    right: "чи зв'язок із суспільством або публічною сферою?"
  - left: "громадянський"
    right: "чи зв'язок із правами, обов'язками або статусом громадянина?"
  - left: "ефективний"
    right: "чи слово означає результативність?"
  - left: "ефектний"
    right: "чи слово означає яскраве враження?"
  - left: "по-особливому"
    right: "чи модель по-...-ому пишеться через дефіс?"
  - left: "на зустріч"
    right: "чи можна додати означення до іменника?"
  - left: "заздалегідь"
    right: "чи це усталений прислівник часу?"
  - left: "вдвічі"
    right: "чи слово уточнює міру?"

- type: fill-in
  title: "Точний прикметник або прислівник"
  instruction: "Заповніть пропуск природною формою."
  items:
  - sentence: "Документ із паперу - це ____ документ."
    answer: "паперовий"
    options: ["паперовий", "паперний", "паперистий", "паператний"]
    explanation: "Паперовий - природний відносний прикметник."
  - sentence: "Людина, яка діє з турботою, - ____."
    answer: "дбайлива"
    options: ["дбайлива", "дбайна", "дбайова", "дбайська"]
    explanation: "Дбайливий передає схильність або якість поведінки."
  - sentence: "Опис із багатьма кольорами - ____."
    answer: "барвистий"
    options: ["барвистий", "барвовий", "барвний", "барвський"]
    explanation: "Барвистий означає насичений барвами."
  - sentence: "Місто Кременчук дає форму ____."
    answer: "кременчуцький"
    options: ["кременчуцький", "кременчукський", "кременчузький", "кременчуковий"]
    explanation: "К + ськ переходить у цьк."
  - sentence: "Прага дає форму ____."
    answer: "празький"
    options: ["празький", "прагський", "праський", "празьковий"]
    explanation: "Г + ськ переходить у зьк."
  - sentence: "Дія з наміром відбувається ____."
    answer: "навмисно"
    options: ["навмисно", "навмисний", "навмисність", "навмисним"]
    explanation: "Потрібен прислівник способу."
  - sentence: "Регулярна щоденна дія відбувається ____."
    answer: "щоденно"
    options: ["щоденно", "щоденний", "що денно", "щоденність"]
    explanation: "Щоденно уточнює дію."
  - sentence: "У братерський спосіб - ____."
    answer: "по-братерськи"
    options: ["по-братерськи", "по братерськи", "побратерськи", "по-братерський"]
    explanation: "Модель по-...-и пишеться через дефіс."
  - sentence: "У спеціальний спосіб - ____."
    answer: "по-особливому"
    options: ["по-особливому", "по особливому", "поособливому", "по-особливий"]
    explanation: "Модель по-...-ому пишеться через дефіс."
  - sentence: "Зв'язність частин тексту - ____."
    answer: "когезія"
    options: ["когезія", "дефіс", "подвоєння", "обставина"]
    explanation: "Когезія означає зв'язність тексту."

- type: error-correction
  title: "Редагування абзацу"
  instruction: "Виправте помилку у кожному реченні."
  items:
  - sentence: "Громадянська організація відкрила громадянський простір для лекцій."
    error: "громадянський простір"
    correction: "громадський простір"
    options: ["громадський простір", "громадянський простір", "громадяний простір", "громадовий простір"]
    explanation: "Простір є публічним або спільнотним."
  - sentence: "Автор назвав метод ефектним, бо він справді дав результат."
    error: "ефектним"
    correction: "ефективним"
    options: ["ефективним", "ефектним", "ефектовим", "ефектливим"]
    explanation: "Результат дає ефективний метод."
  - sentence: "Ми ішли на зустріч гостям."
    error: "на зустріч"
    correction: "назустріч"
    options: ["назустріч", "на зустріч", "на-зустріч", "назу стріч"]
    explanation: "Напрям руху пишеться разом."
  - sentence: "У день заняття студенти зустрілися вдень відкриття центру."
    error: "вдень відкриття"
    correction: "в день відкриття"
    options: ["в день відкриття", "вдень відкриття", "в-день відкриття", "удень відкриття"]
    explanation: "Є залежне слово відкриття, тому це іменникова група."
  - sentence: "У новині написали нью-йорцький університет."
    error: "нью-йорцький"
    correction: "нью-йоркський"
    options: ["нью-йоркський", "нью-йорцький", "нью-йорський", "нью-йорковий"]
    explanation: "Усталена форма зберігає кськ."
  - sentence: "Празьський консультант перевірив переклад."
    error: "Празьський"
    correction: "Празький"
    options: ["Празький", "Празьський", "Прагський", "Празьковий"]
    explanation: "Прага дає форму празький."
  - sentence: "Майстер говорив впевнений про результат."
    error: "впевнений"
    correction: "впевнено"
    options: ["впевнено", "впевнений", "впевненність", "впевненим"]
    explanation: "Потрібен прислівник способу дії."
  - sentence: "Вони підтримали проєкт по братерськи."
    error: "по братерськи"
    correction: "по-братерськи"
    options: ["по-братерськи", "по братерськи", "побратерськи", "по-братерський"]
    explanation: "Модель по-...-и пишеться через дефіс."
  - sentence: "Автор поклався напам'ять очевидця."
    error: "напам'ять"
    correction: "на пам'ять"
    options: ["на пам'ять", "напам'ять", "на-пам'ять", "напам ять"]
    explanation: "Пам'ять тут іменник із залежним словом."
  - sentence: "У путівнику описали вишукано стиль будівлі."
    error: "вишукано стиль"
    correction: "вишуканий стиль"
    options: ["вишуканий стиль", "вишукано стиль", "вишуканість стиль", "вишуканськи стиль"]
    explanation: "Іменник стиль потребує прикметника, а не прислівника."

- id: workbook-5
  type: essay-response
  title: "Критичний аналіз: що саме додає форма?"
  instruction: "Порівняйте дві версії опису й поясніть, яка точніша."
  prompt: >-
    Перша версія: У гарному центрі команда добре зробила нову виставку.
    Друга версія: У кам'яному громадському центрі команда заздалегідь
    підготувала барвисту, але стриману виставку й по-новому пояснила
    козацький контекст експонатів. Напишіть 150-180 слів: яка версія
    точніша, які прикметники є відносними, які прислівники уточнюють
    спосіб або час, і яке слово вимагає правила к + ськ -> цьк.
  min_words: 150
  model_answer: |-
    > [!model-answer]
    > Друга версія точніша, бо не обмежується загальною оцінкою. Кам'яний
    > називає матеріал, громадський - суспільну функцію простору, барвисту
    > й стриману разом описують стиль виставки. Заздалегідь показує час
    > підготовки, а по-новому пояснює спосіб подання матеріалу. Козацький
    > вимагає правила к + ськ -> цьк. Перша версія зрозуміла, але слова
    > гарний і добре не пояснюють, що саме зроблено якісно.

- id: workbook-6
  type: essay-response
  title: "Власне висловлення: словотвір і регістр"
  instruction: "Напишіть 180-220 слів про громадський простір, освітній проєкт або культурний маршрут."
  prompt: >-
    Використайте щонайменше 10 прикметників різних моделей і 8 прислівників
    різних типів. Після тексту коротко поясніть три редакторські рішення:
    один географічний прикметник, один прислівник із дефісом і одну пару
    слів, де треба уникнути кальки або паронімічної помилки.
  min_words: 180
  model_answer: |-
    > [!model-answer]
    > У старій кам'яній школі відкрили громадський простір для мовних
    > зустрічей. Київські волонтери заздалегідь підготували маршрут,
    > дбайливий викладач уважно перевірив паперові матеріали, а
    > кременчуцький майстер запропонував ефективний спосіб оформлення
    > виставкової кімнати. Простір виглядає барвисто, але не випадково:
    > спершу відвідувач бачить мальовничий вказівник, потім читає коротке
    > пояснення, а зрештою переходить до практичної вправи. Команда
    > по-новому організувала заняття, бо кожен приклад пов'язаний із
    > реальною дією. Я обрав кременчуцький, бо Кременчук дає к + ськ ->
    > цьк. По-новому пишу через дефіс за моделлю по-...-ому. У фразі
    > ефективний спосіб уникаю кальки з English effective і не замінюю
    > слово на ефектний, бо йдеться про результат, а не про враження.
  rubric:
  - criteria: "Словотвірна точність"
    description: "Є різні моделі прикметників і прислівників без штучних форм."
    points: 2
  - criteria: "Правопис і пунктуація"
    description: "Дефісні, суцільні й окремі прислівникові форми написані правильно."
    points: 2
  - criteria: "Регістр"
    description: "Автор пояснює, чому обрані форми доречні для жанру."
    points: 1
