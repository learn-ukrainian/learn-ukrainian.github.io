        options: ["вгору", "у гору", "в-гору", "в гору"]
      - id: 14
        answer: "прислівники"
        options: ["прислівники", "прикметники", "суфікси", "подвоєння"]
      - id: 15
        answer: "зв'язним"
        options: ["зв'язним", "зв'язно", "зв'язність", "зв'язаний"]
      - id: 16
        answer: "переконливим"
        options: ["переконливим", "переконливо", "переконанням", "переконливість"]
  - type: error-correction
    title: "Виправте словотвір і правопис"
    instruction: "Знайдіть помилки й подайте нормативний варіант."
    items:
      - sentence: "У статті згадано парижський музей."
        error: "парижський"
        correction: "паризький"
        explanation: "ж + ськ переходить у зьк."
      - sentence: "Кременчукський міст відкрили після ремонту."
        error: "Кременчукський"
        correction: "Кременчуцький"
        explanation: "к + ськ переходить у цьк."
      - sentence: "Команда діяла по новому."
        error: "по новому"
        correction: "по-новому"
        explanation: "Модель по-...-ому пишеться через дефіс."
      - sentence: "Він прийшов назустріч із редактором."
        error: "назустріч"
        correction: "на зустріч"
