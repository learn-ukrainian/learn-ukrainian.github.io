  - type: essay-response
    id: syntax-checkpoint-essay
    title: Підсумковий синтаксичний коментар
    instruction: Напиши короткий контрольний коментар українською.
    prompt: "Візьми власний абзац із 3-4 речень. Знайди граматичну основу, одне словосполучення з керуванням, один однорідний ряд і одну відокремлену або уточнювальну конструкцію. Поясни одну редакторську правку."
    min_words: 180
    model_answer: "У реченні «Увечері команда перевірила план, бюджет і список джерел» граматична основа - «команда перевірила». Словосполучення «перевірила план» має керування, бо дієслово вимагає знахідного відмінка. «План, бюджет і список джерел» - однорідні додатки. У фразі «Звіт, підготовлений командою, оприлюднили вранці» є відокремлене означення. Я б відредагував речення «Після консультації, команда змінила рішення», бо коротка початкова обставина не потребує коми. Краще: «Після консультації команда змінила рішення». Такий розбір показує не лише знаки, а структуру речення."
    rubric:
      - criteria: Синтаксична основа
        description: Автор правильно знаходить основу й тип речення.
        points: 4
      - criteria: Ускладнення
        description: Автор називає однорідний або відокремлений компонент і пояснює знак.
        points: 4
      - criteria: Редагування
        description: Автор пропонує змістовну правку й обґрунтовує її.
        points: 4
