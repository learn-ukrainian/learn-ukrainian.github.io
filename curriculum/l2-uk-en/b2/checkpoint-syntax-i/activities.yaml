  - id: wb-5
    type: essay-response
    title: "Підсумковий синтаксичний коментар"
    prompt: >-
      Напишіть 150-180 слів. Візьміть два речення з навчального, медичного або
      спортивного контексту. Для кожного речення назвіть основу, тип присудка
      або тип односкладності, один тип словосполучення, один другорядний член і
      одну пунктуаційну або редакторську правку. Уникайте тем із пізнішого
      синтаксичного блоку.
    min_words: 150
    model_answer: >-
      У реченні **Після тренування команда мала перевірити графік відновлення**
      основа **команда мала перевірити** має складений дієслівний присудок:
      модальне слово поєднується з інфінітивом. **Перевірити графік** - керування,
      бо дієслово вимагає залежного іменника. **Після тренування** є обставиною
      часу. У реченні **Звіт, підготовлений лікаркою, надіслали тренерам**
      основа односкладна: **надіслали**. Зворот **підготовлений лікаркою** є
      відокремленим означенням після слова **звіт**, тому потрібні дві коми.
      **Надіслали тренерам** показує керування, а **тренерам** є непрямим
      додатком. Обидва речення залишаються в межах простого речення.
    rubric:
      - criteria: "Діагностика основи"
        description: "Названо основу й тип присудка або односкладності."
        points: 2
      - criteria: "Зв'язки й члени речення"
        description: "Є принаймні один тип словосполучення і один другорядний член з поясненням."
        points: 2
      - criteria: "Редагування"
        description: "Пояснено пунктуаційну або нормативну правку."
        points: 2
      - criteria: "Межі checkpoint"
        description: "Відповідь залишається в межах перевірюваного простого речення."
        points: 1
