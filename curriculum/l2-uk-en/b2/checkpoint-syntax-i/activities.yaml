version: '1.0'
module: checkpoint-syntax-i
level: b2
inline:
  - id: act-1
    type: critical-analysis
    title: "Синтаксична карта речення"
    instruction: "Прочитайте речення і дайте короткі діагностичні відповіді."
    target_text: >-
      Після тренування команда мала перевірити план відновлення.
      У поліклініці після обіду пацієнтам пояснюють результати аналізів.
      Тренер перевірив план, форму і графік.
      Звіт, підготовлений після консультацій, надіслали команді ввечері.
    questions:
      - "У якому реченні є складений дієслівний присудок?"
      - "Яке речення є односкладним неозначено-особовим?"
      - "Де є однорідні додатки?"
      - "Де є відокремлене означення?"
    model_answers:
      - "У першому реченні: **команда мала перевірити**. Слово **мала** додає модальність, а інфінітив **перевірити** називає дію."
      - "У другому реченні: **пояснюють**. Діяч не названий, форма 3-ї особи множини створює неозначено-особову модель."
      - "У третьому реченні: **план, форму і графік** виконують спільну роль додатків."
      - "У четвертому реченні: **підготовлений після консультацій** стоїть після означуваного слова **звіт** і виділяється комами."

  - id: act-2
    type: comparative-study
    title: "Дієприкметник чи підрядне означальне"
    instruction: "Порівняйте варіанти й оберіть нормативну редакцію."
    items_to_compare:
      - "Пожовкле листя лежало біля стадіону."
      - "Листя, яке пожовкло після морозу, лежало біля стадіону."
      - "Заснувший пацієнт не чув оголошення."
      - "Пацієнт, який заснув, не чув оголошення."
      - "Працюючі після травми спортсмени виконують легші вправи."
      - "Спортсмени, які тренуються після травми, виконують легші вправи."
    criteria:
      - "нормативність форми"
      - "чи йдеться про результативну ознаку або живу дію"
      - "пунктуація при звороті або підрядному реченні"
      - "стильова доречність у нейтральному тексті"
    prompt: "Які три редакції залишаємо без правки, а які три треба замінити?"
    model_answer: >-
      Без правки можна залишити **пожовкле листя**, бо це нормативна результативна
      ознака, а також два підрядні речення: **листя, яке пожовкло** і
      **пацієнт, який заснув**. Ненормативне **заснувший** треба замінити
      підрядним означальним реченням або іншою конструкцією. Форма
      **працюючі після травми спортсмени** у нейтральному тексті неприродна;
      краще **спортсмени, які тренуються після травми**.

  - id: act-3
    type: critical-analysis
    title: "Односкладність і другорядні члени"
    instruction: "Визначте тип речення й роль виділених фрагментів."
    target_text: >-
      У спортзалі провели інструктаж. Тренери провели інструктаж у спортзалі.
      Сутеніє над містом. Тиха зала після матчу. Пацієнтам пояснили результати
      після обстеження.
    questions:
      - "Які два приклади є односкладними з присудковим головним членом?"
      - "Який приклад є називним реченням?"
      - "Де початковий прийменниковий фрагмент є обставиною місця, а не підметом?"
      - "У реченні про пацієнтів назвіть непрямий додаток, прямий додаток і обставину часу."
    model_answers:
      - "**У спортзалі провели інструктаж** є неозначено-особовим; **Сутеніє над містом** є безособовим."
      - "**Тиха зала після матчу** є називним реченням: воно називає кадр без присудка."
      - "У фрагменті **У спортзалі провели інструктаж** слова **у спортзалі** є обставиною місця."
      - "**Пацієнтам** - непрямий додаток, **результати** - прямий додаток, **після обстеження** - обставина часу."

  - id: act-4
    type: critical-analysis
    title: "Ряд, зв'язок і узагальнення"
    instruction: "Проаналізуйте ряд і зв'язок слів; дайте коротку редакторську відповідь."
    target_text: >-
      Лікарка пояснила дозування, протипоказання і побічні ефекти.
      Лікарка пояснила дозування препарату. Потрібні три речі: вода, відпочинок
      і консультація. Вода, відпочинок і консультація - три умови відновлення.
      Команда обговорила травми, графік і відповідально.
    questions:
      - "Де є однорідні додатки, а де словосполучення з керуванням?"
      - "У якому прикладі після узагальнювального слова потрібна двокрапка?"
      - "У якому прикладі після ряду потрібне тире?"
      - "Який приклад треба відредагувати через різнорідний ряд?"
    model_answers:
      - "**Дозування, протипоказання і побічні ефекти** - однорідні додатки; **дозування препарату** - словосполучення з керуванням."
      - "Двокрапка потрібна в реченні **Потрібні три речі: вода, відпочинок і консультація**."
      - "Тире потрібне у варіанті **Вода, відпочинок і консультація - три умови відновлення**."
      - "**Команда обговорила травми, графік і відповідально** треба виправити: **травми, графік і відповідальність** або перебудувати речення."

  - id: act-5
    type: critical-analysis
    title: "Коми й нормативність"
    instruction: "Знайдіть помилку, запропонуйте редакцію і назвіть правило."
    target_text: >-
      Звіт підготовлений після консультацій надіслали команді. Повернувшись із
      тренування, самопочуття покращилося. Піклуватися за здоров'я треба щодня.
      Діючі правила запису оновлено. Зустріч відбудеться в центрі біля стадіону.
    questions:
      - "Яке речення потребує ком навколо дієприкметникового звороту?"
      - "Де дієприслівниковий зворот не має спільного діяча з присудком?"
      - "Де порушено керування?"
      - "Де треба замінити кальковану активну форму?"
      - "Де потрібна кома при уточненні місця?"
    model_answers:
      - "**Звіт, підготовлений після консультацій, надіслали команді**: зворот після означуваного слова відокремлюємо."
      - "**Після тренування самопочуття покращилося**: самопочуття не може виконувати дію **повернувшись**."
      - "**Піклуватися про здоров'я**: нормативне керування вимагає прийменника **про**."
      - "**Чинні правила запису оновлено**: для правил природний прикметник **чинні**."
      - "**Зустріч відбудеться в центрі, біля стадіону**: друга частина уточнює місце."

workbook:
  - id: wb-reading-syntax-review
    type: reading
    title: "Читання: редакторський фрагмент"
    text: >-
      Після матчу медична команда перевірила гравців, графік відновлення і
      правила повернення до тренувань. У клубі пояснили, що охочі пройти
      додаткове обстеження можуть записатися до п'ятниці. Звіт, підготовлений
      після консультацій із лікарями, надіслали тренерам увечері. На щастя,
      травми виявилися легкими, але кілька спортсменів мають тренуватися за
      індивідуальною програмою.
    tasks:
      - "Знайдіть граматичні основи в кожному реченні."
      - "Назвіть один складений присудок і поясніть його тип."
      - "Випишіть однорідний ряд і визначте його синтаксичну роль."
      - "Знайдіть відокремлене означення та вставне слово."
      - "Поясніть, чому **охочі пройти** краще за **бажаючі пройти**."

  - type: match-up
    title: "Термін і доказ"
    instruction: "Зіставте термін із коротким синтаксичним доказом."
    pairs:
      - left: "узгодження"
        right: "залежне слово повторює граматичні ознаки головного"
      - left: "керування"
        right: "головне слово вимагає певного відмінка або прийменника"
      - left: "прилягання"
        right: "залежне слово незмінне"
      - left: "складений дієслівний присудок"
        right: "модальне або фазове слово плюс інфінітив"
      - left: "складений іменний присудок"
        right: "зв'язка плюс іменна частина"
      - left: "уточнювальний член"
        right: "звужує місце, час або іншу ознаку"
      - left: "вставне слово"
        right: "передає ставлення мовця і не є членом речення"
      - left: "однорідний ряд"
        right: "кілька членів мають спільну роль і відповідають на те саме питання"
      - left: "відокремлене означення"
        right: "поширена ознака, яку виділяємо інтонаційно й комами"
      - left: "неозначено-особове речення"
        right: "дія названа, але конкретного виконавця не названо"
      - left: "дієприкметниковий зворот"
        right: "означення, виражене дієприкметником із залежними словами"
      - left: "пунктуаційна норма"
        right: "розділовий знак спирається на синтаксичну будову"

  - type: select
    title: "Фінальна діагностика речень"
    instruction: "Оберіть правильні твердження."
    items:
      - question: "Що правильно сказано про речення **У центрі щодня проводять консультації**?"
        min_correct: 2
        options:
          - text: "Це неозначено-особове речення."
            correct: true
          - text: "**У центрі** є обставиною місця."
            correct: true
          - text: "**У центрі** є підметом."
            correct: false
          - text: "**проводять консультації** є складеним іменним присудком."
            correct: false
        explanation: "Основа односкладна: **проводять**; місце виражене прийменниковою групою."
      - question: "Де пунктуація правильна?"
        min_correct: 3
        options:
          - text: "Лікарка, уважна до деталей, пояснила графік."
            correct: true
          - text: "У центрі, біля входу, розмістили оголошення."
            correct: true
          - text: "Підготовлений після консультацій, звіт надіслали ввечері."
            correct: false
          - text: "На щастя, травма була легкою."
            correct: true
          - text: "Команда перевірила форму, графік, і протокол."
            correct: false
        explanation: "Означення перед іменником зазвичай не відокремлюємо; перед одиничним **і** кома не потрібна."
      - question: "Де є нормативна заміна керування або форми?"
        min_correct: 3
        options:
          - text: "**дякувати тренерові** замість **дякувати тренера**"
            correct: true
          - text: "**згідно з планом** замість **згідно плану**"
            correct: true
          - text: "**чинні правила** замість **діючі правила**"
            correct: true
          - text: "**заснувший пацієнт** замість **пацієнт, який заснув**"
            correct: false
          - text: "**піклуватися за здоров'я** замість **піклуватися про здоров'я**"
            correct: false
        explanation: "Правильні варіанти виправляють керування або кальковану форму."
      - question: "Де речення має складений дієслівний присудок?"
        min_correct: 2
        options:
          - text: "Команда має перевірити графік."
            correct: true
          - text: "Тренер почав пояснювати вправу."
            correct: true
          - text: "Звіт був точний."
            correct: false
          - text: "Тренування завершилося ввечері."
            correct: false
        explanation: "Модальне або фазове слово поєднується з інфінітивом."
      - question: "Де є складений іменний присудок?"
        min_correct: 2
        options:
          - text: "Звіт був точний."
            correct: true
          - text: "Команда стала уважнішою."
            correct: true
          - text: "Команда має працювати."
            correct: false
          - text: "У кабінеті видали довідку."
            correct: false
        explanation: "Зв'язка поєднується з іменною частиною."
      - question: "Де підрядне означальне речення є кращою заміною?"
        min_correct: 2
        options:
          - text: "**заснувший пацієнт** -> **пацієнт, який заснув**"
            correct: true
          - text: "**працюючі після травми спортсмени** -> **спортсмени, які тренуються після травми**"
            correct: true
          - text: "**пожовкле листя** завжди треба замінювати підрядним реченням"
            correct: false
          - text: "**чинні правила** завжди треба замінювати на **правила, які діють**"
            correct: false
        explanation: "Підрядне речення потрібне передусім для ненормативних або неприродних активних форм."
      - question: "Де є узагальнювальне слово перед рядом?"
        min_correct: 2
        options:
          - text: "Потрібні три речі: вода, сон і консультація."
            correct: true
          - text: "Усе було готове: план, зал і матеріали."
            correct: true
          - text: "Вода, сон і консультація - три умови."
            correct: false
          - text: "Команда перевірила план і графік."
            correct: false
        explanation: "Перед рядом узагальнювальне слово зазвичай потребує двокрапки."
      - question: "Де відокремлений фрагмент має правильну роль?"
        min_correct: 2
        options:
          - text: "Олена, координаторка програми, надіслала графік."
            correct: true
          - text: "Звіт, підготовлений лікаркою, лежить у теці."
            correct: true
          - text: "Місто, Львів, має довгу історію."
            correct: false
          - text: "Новий, спортивний центр відкрили вранці."
            correct: false
        explanation: "Прикладка й означення можуть відокремлюватися, але не кожна пара слів потребує ком."

  - type: error-correction
    title: "Редагування контрольного абзацу"
    instruction: "Оберіть нормативну редакцію кожного проблемного речення."
    items:
      - sentence: "Згідно плану спортсмени повертаються до навантажень поступово."
        error: "Згідно плану"
        correction: "Згідно з планом спортсмени повертаються до навантажень поступово."
        options:
          - "Згідно з планом спортсмени повертаються до навантажень поступово."
          - "Згідно плану спортсмени повертаються до навантажень поступово."
          - "Згідно до плану спортсмени повертаються до навантажень поступово."
          - "Згідно при плані спортсмени повертаються до навантажень поступово."
        explanation: "Складений прийменник має форму **згідно з**."
      - sentence: "Команда обговорила травми, графік і відповідально."
        error: "травми, графік і відповідально"
        correction: "Команда обговорила травми, графік і відповідальність."
        options:
          - "Команда обговорила травми, графік і відповідальність."
          - "Команда обговорила травми, графік і відповідально."
          - "Команда обговорила травми графік і відповідально."
          - "Команда, обговорила травми, графік і відповідальність."
        explanation: "Елементи однорідного ряду мають виконувати спільну роль."
      - sentence: "Бажаючі пройти обстеження записуються онлайн."
        error: "Бажаючі"
        correction: "Охочі пройти обстеження записуються онлайн."
        options:
          - "Охочі пройти обстеження записуються онлайн."
          - "Бажаючі пройти обстеження записуються онлайн."
          - "Бажальні пройти обстеження записуються онлайн."
          - "Бажаючи пройти обстеження записуються онлайн."
        explanation: "У цьому значенні природний прикметник **охочі**."
      - sentence: "На відміну чернетки фінальний текст має ясну структуру."
        error: "На відміну чернетки"
        correction: "На відміну від чернетки, фінальний текст має ясну структуру."
        options:
          - "На відміну від чернетки, фінальний текст має ясну структуру."
          - "На відміну чернетки фінальний текст має ясну структуру."
          - "На відміну, від чернетки фінальний текст має ясну структуру."
          - "На відміну від чернетки фінальний, текст має ясну структуру."
        explanation: "Нормативна форма: **на відміну від**; початковий зворот відокремлюємо комою."
      - sentence: "Три речі важливі вода відпочинок консультація."
        error: "важливі вода"
        correction: "Три речі важливі: вода, відпочинок, консультація."
        options:
          - "Три речі важливі: вода, відпочинок, консультація."
          - "Три речі важливі вода відпочинок консультація."
          - "Три речі: важливі вода, відпочинок, консультація."
          - "Три речі важливі вода, відпочинок консультація."
        explanation: "Узагальнювальне слово перед рядом вимагає двокрапки."
      - sentence: "Повернувшись із тренування самопочуття покращилося."
