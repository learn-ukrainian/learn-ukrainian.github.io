version: '1.0'
module: checkpoint-syntax-i
level: b2
inline: []
workbook:
  - type: reading
    id: syntax-checkpoint-reading
    title: 'Діагностичний текст: синтаксична карта'
    instruction: Прочитай текст і випиши синтаксичні явища.
    text: 'Увечері, після консультації з редакторкою, команда, втомлена після дороги, перевірила план, бюджет і список джерел. У місті відкрили виставку, підготовлену студентами, дослідниками й волонтерами. Усе було готове: програма, зал, матеріали. На щастя, учасники швидко зорієнтувалися в новому просторі. У центрі міста, біля ратуші, уже чекала друга група.'
    tasks:
      - Знайди граматичну основу першого речення.
      - Випиши однорідний ряд.
      - Знайди відокремлене означення.
      - Знайди уточнення місця.
      - Поясни роль вставного слова.

  - type: match-up
    title: Синтаксичне поняття й приклад
    instruction: Зістав поняття з прикладом.
    pairs:
      - left: узгодження
        right: уважна редакторка
      - left: керування
        right: перевірити джерело
      - left: прилягання
        right: працювати мовчки
      - left: простий присудок
        right: Команда працює.
      - left: складений дієслівний присудок
        right: Команда почала працювати.
      - left: складений іменний присудок
        right: Текст був переконливий.
      - left: означено-особове речення
        right: Пишу відповідь до ранку.
      - left: неозначено-особове речення
        right: У місті відкрили виставку.
      - left: безособове речення
        right: Мені зрозуміло.
      - left: називне речення
        right: Тиха вулиця.
      - left: однорідні додатки
        right: план, бюджет і графік
      - left: прикладка
        right: Олена, координаторка події
      - left: уточнення місця
        right: у центрі, біля ратуші
      - left: вставне слово
        right: на щастя

  - type: fill-in
    title: Заповни синтаксичний висновок
    instruction: Обери правильний термін або форму.
    items:
      - sentence: "Поєднання «читати книжку» є словосполученням із типом зв'язку ____."
        answer: керування
        options:
          - керування
          - узгодження
          - прилягання
          - однорідність
      - sentence: "У поєднанні «новий підхід» бачимо ____."
        answer: узгодження
        options:
          - узгодження
          - керування
          - прилягання
          - вставність
      - sentence: "У поєднанні «говорити спокійно» залежне слово приєднується через ____."
        answer: прилягання
        options:
          - прилягання
          - керування
          - узгодження
          - відокремлення
      - sentence: "Підмет і присудок утворюють не словосполучення, а ____."
        answer: граматичну основу
        options:
          - граматичну основу
          - однорідний ряд
          - прикладку
          - уточнення
      - sentence: "Речення «Темніє» є ____."
        answer: безособовим
        options:
          - безособовим
          - двоскладним
          - називним
          - означено-особовим
      - sentence: "Речення «Пишу звіт» є ____."
        answer: означено-особовим
        options:
          - означено-особовим
          - називним
          - безособовим
          - двоскладним із підметом
      - sentence: "У реченні «У місті відкрили виставку» діяч ____."
        answer: не названий
        options:
          - не названий
          - названий підметом
          - є прикладкою
          - є уточненням
      - sentence: "Після узагальнювального слова перед переліком ставимо ____."
        answer: двокрапку
        options:
          - двокрапку
          - тире
          - крапку з комою
          - лапки
      - sentence: "Після переліку перед узагальнювальним словом ставимо ____."
        answer: тире
        options:
          - тире
          - двокрапку
          - кому
          - крапку
      - sentence: "Конструкція «крім Марини» вимагає ____ відмінка."
        answer: родового
        options:
          - родового
          - називного
          - орудного
          - місцевого
      - sentence: "Конструкція «на відміну ____ чернетки» потребує слова від."
        answer: від
        options:
          - від
          - до
          - при
          - за
      - sentence: "У фразі «у центрі, біля ратуші» друга частина ____ місце."
        answer: уточнює
        options:
          - уточнює
          - заперечує
          - замінює
          - узагальнює
      - sentence: "Вставне слово виражає ____ мовця."
        answer: ставлення
        options:
          - ставлення
          - додаток
          - підмет
          - керування
      - sentence: "Синтаксичний розбір починається з ____."
        answer: основи
        options:
          - основи
          - стилю
          - перекладу
          - словника

  - type: error-correction
    title: Виправ синтаксичні помилки
    instruction: Обери нормативний варіант.
    items:
      - sentence: Воно дощить увесь день.
        error: Воно дощить
        correction: Дощить увесь день.
        options:
          - Дощить увесь день.
          - Воно дощить увесь день.
          - Це дощить увесь день.
          - Дощ є дощить увесь день.
        explanation: Українське безособове речення не потребує формального підмета.
      - sentence: Я маю двадцять років.
        error: Я маю двадцять років
        correction: Мені двадцять років.
        options:
          - Мені двадцять років.
          - Я маю двадцять років.
          - Я є двадцять років.
          - Мене двадцять років.
        explanation: Вік природно передаємо давальною моделлю.
      - sentence: Прочитавши статтю, питання стали ясними.
        error: питання стали
        correction: Прочитавши статтю, студент зрозумів питання.
        options:
          - Прочитавши статтю, студент зрозумів питання.
          - Прочитавши статтю, питання стали ясними.
          - Питання, прочитавши статтю, стали ясними.
          - Статтю, питання прочитавши, стали ясними.
        explanation: Дієприслівниковий зворот потребує спільного виконавця.
      - sentence: Усі окрім Марина прийшли.
        error: окрім Марина
        correction: Усі, окрім Марини, прийшли.
        options:
          - Усі, окрім Марини, прийшли.
          - Усі окрім Марина прийшли.
          - Усі, окрім Марина прийшли.
          - Усі окрім, Марини, прийшли.
        explanation: Потрібен родовий відмінок і коми навколо винятку.
      - sentence: На відміну чернетки фінальна версія точна.
        error: На відміну чернетки
        correction: На відміну від чернетки, фінальна версія точна.
        options:
          - На відміну від чернетки, фінальна версія точна.
          - На відміну чернетки фінальна версія точна.
          - На відміну, від чернетки фінальна версія точна.
          - На відміну від чернетки фінальна, версія точна.
        explanation: Складений прийменник має форму на відміну від.
      - sentence: Київ столиця України має складну історію.
        error: столиця України
        correction: Київ, столиця України, має складну історію.
        options:
          - Київ, столиця України, має складну історію.
          - Київ столиця України має складну історію.
          - Київ столиця, України має складну історію.
          - Київ, столиця України має, складну історію.
        explanation: Прикладка пояснює назву й виділяється комами.
      - sentence: Усе було готове план зал матеріали.
        error: готове план
        correction: 'Усе було готове: план, зал, матеріали.'
        options:
          - 'Усе було готове: план, зал, матеріали.'
          - Усе було готове план зал матеріали.
          - Усе було готове, план зал матеріали.
          - Усе було готове - план зал матеріали.
        explanation: Після узагальнювального слова перед рядом потрібна двокрапка.
      - sentence: Зацікавлені темою, студенти ставили багато запитань.
        error: Зацікавлені темою, студенти
        correction: Зацікавлені темою студенти ставили багато запитань.
        options:
          - Зацікавлені темою студенти ставили багато запитань.
          - Зацікавлені темою, студенти ставили багато запитань.
          - Зацікавлені, темою студенти, ставили багато запитань.
          - Студенти зацікавлені темою, ставили багато запитань.
        explanation: Означення перед іменником тут розпізнає групу, тому кома не потрібна.

  - type: select
    title: Обери правильні твердження
    instruction: Познач усі правильні твердження.
    items:
      - question: Що є словосполученням?
        min_correct: 2
        options:
          - text: читати статтю
            correct: true
          - text: уважний до деталей
            correct: true
          - text: студент читає
            correct: false
          - text: карти й таблиці
            correct: false
          - text: дощить
            correct: false
      - question: Де правильно визначено тип зв'язку?
        min_correct: 2
        options:
          - text: новий підхід - узгодження
            correct: true
          - text: перевірити джерело - керування
            correct: true
          - text: говорити спокійно - керування
            correct: false
          - text: пишатися командою - прилягання
            correct: false
          - text: тиха вулиця - предикативний зв'язок
            correct: false
      - question: Де речення односкладне?
        min_correct: 2
        options:
          - text: Темніє.
            correct: true
          - text: У місті відкрили виставку.
            correct: true
          - text: Команда працює.
            correct: false
          - text: Студенти обговорюють тему.
            correct: false
          - text: Редактор перевірив текст.
            correct: false
      - question: Де правильно оформлено однорідний ряд?
        min_correct: 2
        options:
          - text: Команда підготувала план, презентацію й список джерел.
            correct: true
          - text: 'Усе було готове: план, зал, матеріали.'
            correct: true
          - text: На столі лежали карти, настрій і швидко.
            correct: false
          - text: Команда підготувала план презентацію й список.
            correct: false
          - text: Усе було готове план, зал, матеріали.
            correct: false
      - question: Де правильно оформлено відокремлення?
        min_correct: 2
        options:
          - text: Звіт, підготовлений командою, оприлюднили.
            correct: true
          - text: Олена, координаторка події, надішле програму.
            correct: true
          - text: Звіт підготовлений, командою оприлюднили.
            correct: false
          - text: Місто, Київ має давні традиції.
            correct: false
          - text: Річка, Дніпро протікає через Київ.
            correct: false
      - question: Де правильно виправлено безособову модель?
        min_correct: 2
        options:
          - text: Дощить.
            correct: true
          - text: Мені холодно.
            correct: true
          - text: Воно дощить.
            correct: false
          - text: Я холодний після прогулянки.
            correct: false
          - text: Це мені холодно є.
            correct: false
      - question: Які кроки належать до синтаксичного розбору?
        min_correct: 2
        options:
          - text: Знайти граматичну основу.
            correct: true
          - text: Визначити ускладнення речення.
            correct: true
          - text: Почати з перекладу англійською.
            correct: false
          - text: Ігнорувати тип присудка.
            correct: false
          - text: Ставити коми перед кожним довгим словом.
            correct: false
      - question: Де потрібне редагування?
        min_correct: 2
        options:
          - text: Прочитавши статтю, питання стали ясними.
            correct: true
          - text: Усі окрім Марина прийшли.
            correct: true
          - text: Перевіривши джерела, автор уточнив дату.
            correct: false
          - text: На відміну від чернетки, фінальна версія точна.
            correct: false
          - text: У центрі, біля ратуші, відкрили виставку.
            correct: false

  - type: fill-in
    title: Алгоритм розбору
    instruction: Доповни кроки синтаксичного аналізу.
    items:
      - sentence: "Перший крок аналізу - знайти ____."
        answer: основу
        options:
          - основу
          - переклад
          - заголовок
          - цитату
      - sentence: "Другий крок - визначити тип ____."
        answer: присудка
        options:
          - присудка
          - абзацу
          - словника
          - джерела
      - sentence: "Третій крок - виписати ____."
        answer: словосполучення
        options:
          - словосполучення
          - алфавіт
          - переклади
          - дати
      - sentence: "Четвертий крок - знайти ____ члени."
        answer: другорядні
        options:
          - другорядні
          - випадкові
          - іншомовні
          - службові
      - sentence: "П'ятий крок - перевірити однорідні й ____ конструкції."
        answer: відокремлені
        options:
          - відокремлені
          - перекладені
          - фонетичні
          - лексичні
      - sentence: "Шостий крок - пояснити ____."
        answer: пунктуацію
        options:
          - пунктуацію
          - наголос
          - алфавіт
          - транскрипцію
      - sentence: "Сьомий крок - оцінити ____."
        answer: стиль
        options:
          - стиль
          - рід
          - число
          - особу
      - sentence: "Якщо ускладнень забагато, речення варто ____."
        answer: перебудувати
        options:
          - перебудувати
          - затемнити
          - перекласти
          - скоротити до слова
      - sentence: "Якщо є виняток, перевіряємо ____."
        answer: відмінок
        options:
          - відмінок
          - риму
          - голос
          - алфавіт
      - sentence: "Якщо є дієприслівник, перевіряємо ____."
        answer: виконавця
        options:
          - виконавця
          - наголос
          - прикметник
          - цитату
      - sentence: "Якщо є вставне слово, воно виражає ____."
        answer: ставлення
        options:
          - ставлення
          - додаток
          - підмет
          - означення
      - sentence: "Якщо є узагальнювальне слово перед рядом, потрібна ____."
        answer: двокрапка
        options:
          - двокрапка
          - лапка
          - крапка
          - дужка
      - sentence: "Якщо ряд стоїть перед узагальнювальним словом, потрібне ____."
        answer: тире
        options:
          - тире
          - двокрапка
          - тире й лапки
          - крапка з комою
      - sentence: "Фінальний крок - прочитати речення ____."
        answer: вголос
        options:
          - вголос
          - англійською
          - навпаки
          - без пауз

  - type: error-correction
    title: Відредагуй контрольний абзац
    instruction: Обери виправлений варіант.
    items:
      - sentence: У Львові вчора, біля ратуші почалася екскурсія.
        error: вчора, біля ратуші
        correction: У Львові, біля ратуші, вчора почалася екскурсія.
        options:
          - У Львові, біля ратуші, вчора почалася екскурсія.
          - У Львові вчора, біля ратуші почалася екскурсія.
          - У Львові, вчора біля, ратуші почалася екскурсія.
          - У Львові вчора біля ратуші, почалася, екскурсія.
        explanation: Уточнення місця треба поставити поруч із ширшою обставиною місця.
      - sentence: Мені є холодно після прогулянки.
        error: Мені є холодно
        correction: Мені холодно після прогулянки.
        options:
          - Мені холодно після прогулянки.
          - Мені є холодно після прогулянки.
          - Я є холодно після прогулянки.
          - Воно мені холодно після прогулянки.
        explanation: Безособова модель стану не потребує зв'язки є.
      - sentence: Команда підготувала план бюджет і графік.
        error: план бюджет і графік
        correction: Команда підготувала план, бюджет і графік.
        options:
          - Команда підготувала план, бюджет і графік.
          - Команда підготувала план бюджет і графік.
          - 'Команда підготувала план: бюджет і графік.'
          - Команда підготувала план - бюджет і графік.
        explanation: У безсполучниковій частині однорідного ряду потрібна кома.
      - sentence: Студенти, які втомлені після дороги, мовчали.
        error: які втомлені після дороги
        correction: Студенти, втомлені після дороги, мовчали.
        options:
          - Студенти, втомлені після дороги, мовчали.
          - Студенти, які втомлені після дороги, мовчали.
          - Студенти які, втомлені після дороги, мовчали.
          - Студенти, втомлені, після дороги мовчали.
        explanation: У темі відокремлення можна стисло подати ознаку дієприкметниковим зворотом.
      - sentence: Завершивши зустріч, протокол був підписаний.
        error: протокол був
        correction: Завершивши зустріч, учасники підписали протокол.
        options:
          - Завершивши зустріч, учасники підписали протокол.
          - Завершивши зустріч, протокол був підписаний.
          - Протокол, завершивши зустріч, був підписаний.
          - Зустріч, завершивши протокол, була підписана.
        explanation: Дієприслівниковий зворот потребує реального виконавця.
      - sentence: Виставку підготували студенти дослідники і волонтери.
