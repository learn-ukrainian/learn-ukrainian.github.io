version: '1.0'
module: checkpoint-lexicology-i
level: b2
inline:
- id: act-1
  type: comparative-study
  title: Тип синонімії в контексті
  instruction: Визначте тип синонімії та поясніть, що змінює кожна заміна.
  items_to_compare:
  - мовознавство - лінгвістика
  - великий - значний - величезний
  - обличчя - лице - пика - лик
  - сивий Львів - давній Львів
  - причина аварії - підстава для рішення - мотив учинку
  criteria:
  - спільне ядро значення
  - інтенсивність або поняттєва шкала
  - регістр і оцінка
  - залежність від конкретного образу
  - типова сполучуваність
  prompt: Для кожного набору назвіть тип або поясніть, чому це не простий синонімічний ряд. Дайте коротке обгрунтування через контекст.
  model_answer: '**Мовознавство - лінгвістика** можуть бути майже абсолютними, але жанр і традиція назви важливі. **Великий - значний - величезний** показує поняттєву шкалу сили. **Обличчя - лице - пика - лик** є стилістичним рядом, бо змінюється тон і соціальна оцінка. **Сивий Львів - давній Львів** працює як контекстуальна синонімія лише в художньому образі. **Причина - підстава - мотив** не є одним простим рядом: ці слова близькі у сфері пояснення, але мають різні ролі й різну сполучуваність.'
- id: act-2
  type: critical-analysis
  title: Точне слово для жанру
  instruction: Проаналізуйте речення й запропонуйте точніші варіанти для різних регістрів.
  target_text: '1. Команда зробила рішення закрити питання. 2. У листі клієнту написали: скиньте відповідь до обіду. 3. У звіті сказано: ця міра підніме якість сервісу.'
  questions:
  - Які слова або сталі формули потребують правки?
  - Які варіанти пасують до офіційного або напівофіційного тексту?
  - Як переписати одне речення так, щоб зберегти факт і регістр?
  model_answers:
  - 'Проблемні місця: **зробила рішення**, **закрити питання**, розмовне **скиньте**, калькована або неточна формула **підніме якість сервісу**.'
  - 'Для офіційного тексту природніші варіанти: **ухвалила рішення**, **розглянути / розв’язати питання**, **надішліть / надайте відповідь**, **поліпшити якість обслуговування**.'
  - 'Можлива редакція: **Команда ухвалила рішення відкласти розгляд питання до отримання додаткових даних.** Тут названо дію й не приховано факт розмовною формулою.'
- id: act-3
  type: critical-analysis
  title: Прислів'я як аргумент
  instruction: Проаналізуйте, чи вислів доречний у ситуації.
  target_text: 'Менеджер після невдалого запуску сказав команді: «Не кажи гоп, поки не перескочиш». У звіті про затримку він написав: «Кінець діло хвалить», але не навів нових строків, причин затримки або плану виправлення.'
  questions:
  - У якій частині прислів'я доречне як застереження?
  - Де паремія підміняє фактичний аргумент?
  - Як переписати звітне речення нейтрально й відповідально?
  model_answers:
  - «Не кажи гоп, поки не перескочиш» доречне як усне застереження проти передчасної самовпевненості після невдалого запуску.
  - «Кінець діло хвалить» у звіті не замінює конкретики. Для звіту потрібні причини затримки, нові строки, відповідальні особи й план дій.
  - 'Нейтрально: **Запуск затримано через неповне тестування; оновлений графік і план виправлення буде подано до 12 червня.**'
- id: act-4
  type: critical-analysis
  title: Спотворення, калька чи регістр?
  instruction: Визначте тип помилки й запропонуйте правку.
  target_text: '1. Команда зробила рішення відкласти реліз. 2. Він тримав язик у зубах. 3. Університет взяв міри. 4. Не все золото, що блистить. 5. У технічному звіті: розробник бив байдики.'
  questions:
  - Які приклади є кальками або спотвореннями сталої форми?
  - Який приклад є радше регістровою проблемою?
  - Дайте п’ять коротких правок.
  model_answers:
  - '**Зробила рішення** калькує англійську сполучуваність; **у зубах** спотворює фразеологізм; **взяв міри** є ненормативною калькою; **блистить** треба замінити на форму прислів’я **блищить**.'
  - '**Бив байдики** може бути правильним фразеологізмом, але в технічному звіті він розмовно-оцінний; краще нейтрально назвати невиконану дію.'
  - 'Правки: **ухвалила рішення**; **тримав язик за зубами**; **вжив заходів**; **Не все те золото, що блищить**; **розробник не виконував тестові завдання**.'
- id: act-5
  type: essay-response
  title: Короткий комплексний розбір
  prompt: Напишіть 150-180 слів. Оберіть один синонімічний ряд, одне прислів'я або приказку й один сталий вислів. Для кожного поясніть функцію, регістр і можливий ризик помилкового вживання. Завершіть одним відредагованим реченням.
  min_words: 150
  model_answer: '> [!model-answer]

    > У синонімічному ряду **причина - підстава - мотив** спільною є сфера пояснення, але ролі різні. **Причина** відповідає на питання, чому подія сталася; **підстава** дає опору для рішення; **мотив** пояснює внутрішнє спонукання людини. Прислів''я **Не кажи гоп, поки не перескочиш** доречне як застереження проти передчасної самовпевненості, але воно не замінює фактичного аргументу у звіті. Сталий вислів **вжити заходів** належить до офіційного регістру; форма **взяти міри** є калькою і має бути виправлена. Відредаговане речення: **Комісія ухвалила рішення вжити додаткових заходів після того, як встановила причину затримки.**

    '
  rubric:
  - criteria: Функції
    description: Точно названо функції трьох одиниць.
    points: 4
  - criteria: Регістр
    description: Пояснено регістр і доречність.
    points: 3
  - criteria: Ризик
    description: Наведено ризик помилки або кальки.
    points: 2
  - criteria: Редакція
    description: Фінальне речення граматично й стилістично відредаговане.
    points: 1
workbook:
- type: quiz
  title: Розпізнавання понять
  instruction: Виберіть найточнішу відповідь.
  items:
  - question: Що є домінантою синонімічного ряду?
    options:
    - text: Найнейтральніше або найширше опорне слово ряду.
      correct: true
    - text: Будь-яке найдовше слово.
      correct: false
    - text: Слово, яке завжди має найвищий стиль.
      correct: false
    - text: Випадкова асоціація з темою.
      correct: false
    explanation: Домінанта є опорою, від якої зручно вимірювати відтінки.
  - question: Який приклад найкраще показує стилістичні синоніми?
    options:
    - text: обличчя - пика
      correct: true
    - text: причина - подія
      correct: false
    - text: кава - чашка
      correct: false
    - text: дощ - парасоля
      correct: false
    explanation: Пика має знижене оцінне забарвлення, на відміну від нейтрального обличчя.
  - question: Коли прислів'я НЕ може замінити аргумент?
    options:
    - text: Коли потрібні факти, причини, строки або відповідальні дії.
      correct: true
    - text: Коли автор хоче створити культурну рамку.
      correct: false
    - text: Коли текст є художнім.
      correct: false
    - text: Коли вислів зрозумілий читачам.
      correct: false
    explanation: Паремія може підтримати думку, але доказ потребує конкретики.
  - question: Що таке калька в сталому вислові?
    options:
    - text: Буквальне копіювання чужої форми, яке звучить неприродно українською.
      correct: true
    - text: Будь-яке коротке прислів'я.
      correct: false
    - text: Усі офіційні формули.
      correct: false
    - text: Нейтральне слово без відтінку.
      correct: false
    explanation: Калька переносить чужу модель замість природної української форми.
  - question: Яка форма нормативна в офіційному контексті?
    options:
    - text: вжити заходів
      correct: true
    - text: взяти міри
      correct: false
    - text: зробити рішення
      correct: false
    - text: бути під погодою
      correct: false
    explanation: Вжити заходів - усталена літературна формула.
  - question: Що перевіряє регістр?
    options:
    - text: Чи слово пасує до жанру, адресата й соціальної ситуації.
      correct: true
    - text: Чи слово має стільки ж літер, як англійський відповідник.
      correct: false
    - text: Чи речення обов'язково римується.
      correct: false
    - text: Чи вислів є стародавнім.
      correct: false
    explanation: Регістр пов'язує мовний вибір із ситуацією спілкування.
  - question: Яка пара найкраще показує контекстуальну синонімію?
    options:
    - text: сивий Львів - давній Львів у художньому описі
      correct: true
    - text: кава - чашка в меню
      correct: false
    - text: дощ - парасоля в прогнозі
      correct: false
    - text: студент - аудиторія в розкладі
      correct: false
    explanation: Сивий може зблизитися з давній лише в конкретному образному контексті.
  - question: Що найкраще описує фразеологічне зрощення?
    options:
    - text: цілісне значення майже не виводиться з компонентів
      correct: true
    - text: будь-який офіційний підпис у листі
      correct: false
    - text: вільне словосполучення з кольором
      correct: false
    - text: термін, який треба постійно замінювати
      correct: false
    explanation: У зрощенні значення сталої одиниці не складається прозоро з окремих слів.
  - question: Коли евфемізм стає проблемою?
    options:
    - text: коли пом’якшення приховує реальну дію або відповідальність
      correct: true
    - text: коли слово має українське походження
      correct: false
    - text: коли текст має один термінологічний повтор
      correct: false
    - text: коли автор наводить конкретний факт
      correct: false
    explanation: Евфемізм може бути ввічливим, але не повинен маскувати факт.
  - question: Який варіант найкраще замінює under the weather?
    options:
    - text: нездужати або почуватися зле
      correct: true
    - text: бути під погодою
      correct: false
    - text: стояти над дощем
      correct: false
    - text: тримати погоду
      correct: false
    explanation: Потрібен функціональний український відповідник, не буквальна копія англійської ідіоми.
- type: match-up
  title: Поєднайте одиницю з функцією
  instruction: Знайдіть найточніший опис.
  pairs:
  - left: Не кажи гоп, поки не перескочиш.
    right: застерігає від передчасної самовпевненості
  - left: Не все те золото, що блищить.
    right: попереджає не довіряти лише зовнішній привабливості
  - left: 'Слово не горобець: вилетить - не спіймаєш.'
    right: нагадує про відповідальність за сказане
  - left: вжити заходів
    right: офіційна формула для дії у відповідь на проблему
  - left: тримати язик за зубами
    right: не розголошувати інформацію
  - left: бити байдики
    right: ледарювати або нічого не робити
  - left: підстава для рішення
    right: правова або організаційна опора
  - left: мотив учинку
    right: внутрішнє спонукання людини
  - left: контекстуальний синонім
    right: слово, що стає близьким лише в конкретному уривку
  - left: стилістичний синонім
    right: варіант, який змінює тон або соціальну оцінку
- type: fill-in
  title: Лексична сполучуваність
  instruction: Заповніть пропуски природними словами.
  items:
  - sentence: Автор ____ аргументи на користь реформи.
    answer: навів
    options:
    - навів
    - зварив
    - поклав
    - заморозив
    explanation: Аргументи наводять.
  - sentence: Команда ____ проблему після повторного тестування.
    answer: розв'язала
    options:
    - розв'язала
    - закусила
    - спекла
    - блиснула
    explanation: Проблему розв'язують або вирішують.
  - sentence: Рішення має достатню юридичну ____.
    answer: підставу
    options:
    - підставу
    - погоду
    - периферію
    - хату
    explanation: Підстава підтримує правомірність рішення.
  - sentence: У художньому описі слово ____ може створити образ давнього міста.
    answer: сивий
    options:
    - сивий
    - юридичний
    - порожній
    - службовий
    explanation: Сивий у такому контексті працює як образний контекстуальний синонім до давній.
  - sentence: Фразеологізм має ____ значення.
    answer: переносне
    options:
    - переносне
    - буквальне
    - арифметичне
    - адресне
    explanation: Фразеологізм зазвичай має цілісне переносне значення.
  - sentence: Комісія ____ заходів після перевірки.
    answer: вжила
    options:
    - вжила
    - взяла
    - спекла
    - намалювала
    explanation: 'Нормативна формула: вжити заходів.'
  - sentence: Після запуску команда ____ висновку, що потрібне додаткове тестування.
    answer: дійшла
    options:
    - дійшла
    - зробила
    - зварила
    - закрила
    explanation: 'Природна колокація: дійти висновку.'
  - sentence: У публічному поясненні краще прямо назвати ____ зміни розкладу.
    answer: причину
    options:
    - причину
    - периферію
    - каву
    - ідіому
    explanation: Зміна розкладу має причину; підстава потрібна для рішення або дозволу.
  - sentence: Прислів’я може відкрити тему, але не замінює ____.
    answer: доказу
    options:
    - доказу
    - обрію
    - байдики
    - підпису
    explanation: Аргумент потребує фактів, причин або прикладів.
  - sentence: У протоколі фразеологізм часто замінюють ____ описом.
    answer: нейтральним
    options:
    - нейтральним
    - зниженим
    - жартівливим
    - римованим
    explanation: Офіційний документ потребує точного й нейтрального опису.
- type: error-correction
  title: Редакторський контроль
  instruction: Знайдіть лексичну помилку або недоречний регістр.
  items:
  - sentence: Після переговорів сторони зробили компроміс.
    error: зробили компроміс
    correction: досягли компромісу
    options:
    - досягли компромісу
    - зварили компроміс
    - впали компроміс
    - спіймали компроміс
    explanation: 'Природна колокація: досягти компромісу.'
  - sentence: 'У листі клієнту написали: ми розрулимо вашу проблему.'
    error: розрулимо
    correction: допоможемо розв'язати
    options:
    - допоможемо розв'язати
    - зробимо під погоду
    - піднімемо язик
    - намалюємо проблему
    explanation: Розрулити є розмовним; у листі клієнту потрібен нейтральний професійний регістр.
  - sentence: Він був під погодою і не прийшов на зустріч.
    error: був під погодою
    correction: почувався зле
    options:
    - почувався зле
    - стояв над дощем
    - тримав погоду
    - казав хмару
    explanation: Це буквальна калька англійської ідіоми under the weather.
  - sentence: Автор використав прислів'я як доказ і не навів фактів.
    error: як доказ
    correction: як вступну формулу
    options:
    - немає помилки
    - прислів'я завжди доказ
    - фактів не треба
    - треба написати блистить
    explanation: Прислів'я може відкрити тему або підтримати оцінку, але не замінює фактичного доказу.
  - sentence: 'У статті написано: людина без дому шкандибала до пункту допомоги.'
    error: шкандибала
    correction: прямувала
    options:
    - прямувала
    - бовкнула
    - золоте
    - пекла
    explanation: Шкандибати додає оцінний або принизливий відтінок; нейтральніше прямувала або йшла.
  - sentence: Комісія прийняла участь у підготовці звіту.
    error: прийняла участь
    correction: взяла участь
    options:
    - взяла участь
    - зробила участь
    - підняла участь
    - спекла участь
    explanation: 'Нормативна форма: взяти участь.'
  - sentence: Після обговорення група зробила висновок про потребу змін.
    error: зробила висновок
    correction: дійшла висновку
    options:
    - дійшла висновку
