- id: wb-critical-integrated
  type: critical-analysis
  title: Повний розбір абзацу
  instruction: Проаналізуйте абзац за схемою одиниця - функція - регістр - правка.
  target_text: 'У пресрелізі написано: «Ми зробили рішення оптимізувати студентський ресурс. Хто рано встає, тому Бог дає, отже, консультації починатимуться о сьомій ранку. Це підніме якість сервісу».'
  questions:
  - Які три лексичні одиниці потребують правки або пояснення?
  - Чому прислів'я не є достатнім аргументом?
  - Запропонуйте нейтральну редакцію двох речень.
  model_answers:
  - Потребують правки **зробили рішення**, **оптимізувати студентський ресурс**, **підніме якість сервісу**; прислів'я потребує оцінки доречності.
  - Прислів'я підтримує ідею ранньої активності, але не доводить, що консультації о сьомій зручні, справедливі або педагогічно потрібні.
  - 'Можлива редакція: **Адміністрація ухвалила рішення змінити графік консультацій. Новий розклад має поліпшити доступність консультацій, але потребує погодження зі студентами й викладачами.**'
- id: wb-essay-synthesis
  type: essay-response
  title: Синтез лексикології I
  prompt: Напишіть 150-190 слів про те, як синоніми, прислів'я і сталі вирази можуть одночасно збагачувати текст і створювати ризик неточності. Обов'язково наведіть один приклад правки.
  min_words: 150
  model_answer: '> [!model-answer]

    > Синоніми, прислів''я і сталі вирази збагачують текст тоді, коли автор керує їхньою функцією. Синонім може уточнити думку: **вагомий аргумент** точніше за **гарний аргумент**, бо називає силу доказу. Прислів''я може створити культурну рамку: **Не кажи гоп, поки не перескочиш** добре застерігає від передчасного успіху. Сталий вислів може стисло передати дію: **вжити заходів** одразу звучить як офіційна відповідь на проблему. Але ці самі засоби створюють ризик. Неточний синонім змінює оцінку, прислів''я може підмінити факти, а калька псує норму. Тому речення **Команда зробила рішення і взяла міри** треба виправити: **Команда ухвалила рішення і вжила заходів.** У такій правці збережено зміст, поліпшено сполучуваність і регістр.

    '
