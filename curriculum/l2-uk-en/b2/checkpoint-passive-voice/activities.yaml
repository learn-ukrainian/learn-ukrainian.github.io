  - id: wb-5
    type: essay-response
    title: Підсумковий редакторський висновок
    instruction: Напишіть 180-220 слів українською.
    prompt: >-
      Візьміть один побутовий або житловий приклад: ремонт, оренду квартири,
      заявку до сервісу, повідомлення в чаті мешканців. Напишіть короткий
      редакторський висновок: де ви використали актив, де форму на -но, -то, де
      пасивний дієприкметник, де неозначено-особову модель або обережне -ся, і
      які активні дієприкметники замінили.
    min_words: 180
    model_answer: >-
      У повідомленні про ремонт під'їзду я залишив актив там, де важлива
      відповідальність: "Правління погодило кошторис", "майстри встановлять
      двері". Для коротких статусів використав форми на -но, -то: "заявку
      подано", "фото додано", "матеріали закуплено". Коли треба описати предмет
      після дії, взяв пасивний дієприкметник: "відремонтований під'їзд",
      "пофарбовані перила", "підключене освітлення". Для регулярної процедури
      написав: "у будинку перевіряють ліфти щомісяця"; це звучить природніше,
      ніж "ліфти перевіряються працівниками". Форми "бажаючі" і "діючі правила"
      замінив на "охочі" та "чинні правила". Так текст став коротшим, а
      відповідальність не зникла за пасивними зворотами.
    rubric:
      - criteria: "Повнота"
        description: "Є актив, форма на -но/-то, пасивний дієприкметник і процедурна модель."
        points: 4
      - criteria: "Нормативність"
        description: "Неприродні активні дієприкметники замінено нормативними засобами."
        points: 4
      - criteria: "Аргументація"
        description: "Вибір конструкцій пояснено через фокус і жанр."
        points: 4
