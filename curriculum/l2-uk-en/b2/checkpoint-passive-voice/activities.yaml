version: '1.0'
module: checkpoint-passive-voice
level: b2
inline:
  - type: quiz
    title: "Діагностика контрольної точки"
    instruction: "Оберіть варіант, який найточніше відповідає українській нормі та фокусу."
    items:
      - question: "Яке речення найкраще показує відповідального діяча в новині?"
        options:
          - text: "Рішення було ухвалене комісією."
            correct: false
          - text: "Комісія ухвалила рішення."
            correct: true
          - text: "Рішення ухвалено комісією."
            correct: false
          - text: "Рішення ухвалювалося комісією."
            correct: false
        explanation: "У новині з названим діячем природніше працює актив."
      - question: "Яка версія найкраще фіксує лише результат без названого виконавця?"
        options:
          - text: "Звіт підготувала редакторка."
            correct: false
          - text: "Звіт було підготовлено редакторкою."
            correct: false
          - text: "Підготовлений звіт лежить у теці."
            correct: false
          - text: "Звіт підготовлено."
            correct: true
        explanation: "Форма на -но повідомляє результат без особового діяча."
      - question: "Який варіант доречно описує предмет після завершеної дії?"
        options:
          - text: "Відреставрований рушник зберігають у вітрині."
            correct: true
          - text: "Рушник було відреставровано майстринями."
            correct: false
          - text: "Майстрині відреставрували рушник."
            correct: false
          - text: "Рушник реставрується в музеї."
            correct: false
        explanation: "Тут потрібна ознака предмета після дії, а не процес або діяч."
      - question: "Яка заміна калькованого оголошення є найприроднішою?"
        options:
          - text: "Усі бажаючі читають діючі правила."
            correct: false
          - text: "Усі охочі читають чинні правила."
            correct: true
          - text: "Усі бажані читають дієві правила."
            correct: false
          - text: "Усі працюючі з правилами можуть прийти."
            correct: false
        explanation: "Охочі й чинні є точними українськими відповідниками."
      - question: "Яке речення найкраще передає установчу процедуру без персоналізації?"
        options:
          - text: "У відділі розглядають заяви щодня."
            correct: true
          - text: "Заяви розглянуто працівниками щодня."
            correct: false
          - text: "Працівниками розглядаються заяви щодня."
            correct: false
          - text: "Заяви були розглянуті працівниками щодня."
            correct: false
        explanation: "Для регулярної процедури природна неозначено-особова модель."
      - question: "Яка версія найкраще працює як музейний підпис?"
        options:
          - text: "Експонат було знайдено дослідниками в експедиції."
            correct: false
          - text: "Дослідники знайшли експонат в експедиції."
            correct: false
          - text: "Знайдений під час експедиції експонат походить з Полтавщини."
            correct: true
          - text: "Експонат знаходився дослідниками під час експедиції."
            correct: false
        explanation: "Для підпису природніше описати сам предмет через означення."
      - question: "Яке речення краще подає відповідальність у громадському повідомленні?"
        options:
          - text: "Мешканцями було помічено витік води."
            correct: false
          - text: "Витік води було помічено."
            correct: false
          - text: "Мешканці помітили витік води."
            correct: true
          - text: "Витік води помічався мешканцями."
            correct: false
        explanation: "Якщо відповідальні спостерігачі відомі, їх варто назвати прямо."
      - question: "Який варіант найточніше розрізняє стан і результат у парі?"
        options:
          - text: "Вікна зачинено, а зал зачинений після концерту."
            correct: false
          - text: "Вікна зачинені, а зал підготовлено до лекції."
            correct: true
          - text: "Вікна зачиняються, а зал був підготовлений студентами."
            correct: false
          - text: "Вікна було зачинено мешканцями, а зал підготовлений."
            correct: false
        explanation: "Зачинені називає стан, а підготовлено - результат дії."
      - question: "Яка версія найкраще формулює результат у короткому службовому листі?"
        options:
          - text: "Документи вже перевірено і передано до деканату."
            correct: true
          - text: "Документи були вже перевірені працівниками і передані."
            correct: false
          - text: "Працівниками вже перевіряються документи для деканату."
            correct: false
          - text: "Документи перевірялися працівниками для деканату."
            correct: false
        explanation: "Службовий підсумок природно стискає повідомлення до результату."
      - question: "Який варіант найкраще редагує кальковану назву людей за дією?"
        options:
          - text: "експерти, які працюють над темою"
            correct: true
          - text: "працюючі над темою експерти"
            correct: false
          - text: "експерти працюючі тематично"
            correct: false
          - text: "тема працюючих експертів"
            correct: false
        explanation: "Для людей за поточною дією природніше підрядне речення."
  - type: true-false
    title: "Досьє для ревізії: три жанри, три фокуси"
    instruction: "Позначте, чи правильно описано роль форми в поданій ситуації."
    items:
      - statement: "У протокольному підсумку форма на -но, -то часто фіксує готовий результат."
        correct: true
        explanation: "Для протоколу важливо стисло назвати завершену дію."
      - statement: "У новині з названим виконавцем описовий пасив зазвичай кращий за актив."
        correct: false
        explanation: "Коли діяч названий і важливий, актив майже завжди природніший."
      - statement: "Музейний підпис часто користується дієприкметниковим означенням, щоб описати предмет після дії."
        correct: true
        explanation: "Такі підписи називають сам об'єкт, а не розгортають подію."
      - statement: "Фраза чинні правила є нормативною заміною для калькованого вислову діючі правила."
        correct: true
        explanation: "У правовому та службовому контексті вживаємо чинний."
      - statement: "Речення виставка була підготовлена працівниками центру найкраще показує відповідальність у новині."
        correct: false
        explanation: "Відповідальність у новині краще передає актив: працівники центру підготували виставку."
      - statement: "Неозначено-особове речення типу у відділі перевіряють заявки може природно описувати регулярну процедуру."
        correct: true
        explanation: "Тут у центрі не конкретний виконавець, а звична дія."
      - statement: "Слово охочі в оголошенні стилістично сильніше за форму бажаючі."
        correct: true
        explanation: "Охочі є усталеним українським відповідником."
      - statement: "Будь-яка форма на -учий автоматично є доброю книжною нормою."
        correct: false
        explanation: "Багато таких форм є калькованими або дуже обмеженими в уживанні."
      - statement: "Речення матеріали оцифровано працівниками архіву є нейтральним взірцем українського підсумку."
        correct: false
        explanation: "Особовий діяч після форми на -но, -то зазвичай треба прибрати або винести в актив."
      - statement: "Сполука погоджений проєкт може природно називати документ після погодження."
        correct: true
        explanation: "У цьому випадку дієприкметник працює як означення до предмета."
  - type: critical-analysis
    id: act-3
    title: "Критичний аналіз: чому форма змінюється разом із жанром"
    instruction: "Дайте стислу аргументовану відповідь за прочитаним фрагментом."
    target_text: "Фрагмент про протокол, новину, виставковий підпис і правку пресрелізу."
    questions:
      - "Чому той самий зміст у протоколі, новині й підписі потребує різних граматичних стратегій?"
      - "Яку роль у фрагменті виконує протиставлення активу та форм на -но, -то?"
      - "Чому правка кальок у пресрелізі є не тільки мовною, а й стилістичною дією?"
    model_answers:
      - "Жанр змінює центр уваги: протокол фіксує підсумок, новина показує відповідальних діячів, а підпис описує об'єкт після дії."
      - "Протиставлення активу й форм на -но, -то показує різницю між відповідальністю та результатом, а не боротьбу правильного з неправильним."
      - "Правка кальок повертає текстові природний український регістр, тож вона одночасно виправляє форму і вирівнює тон повідомлення."
  - type: comparative-study
    id: act-4
    title: "Порівняльне дослідження: один факт у трьох регістрах"
    instruction: "Зіставте три жанрові моделі й сформулюйте висновок."
    prompt: "Порівняйте, як один і той самий завершений проєкт оформлюється в трьох жанрах, і зробіть висновок про розподіл фокусу."
    criteria:
      - "Видимість діяча"
      - "Сила результату"
      - "Стислий або образний тон"
      - "Природність для жанру"
    items_to_compare:
      - "Новинний абзац: Міська рада відкрила оновлене молодіжне простірне укриття."
      - "Протокольний підсумок: Молодіжне укриття відкрито після завершення ремонту."
      - "Підпис до фото: Відкритий після ремонту простір для молодіжних подій."
    model_answer: >-
      Новинний абзац найкраще показує відповідального діяча, тому актив тут
      виправданий. Протокольний підсумок стискає інформацію до факту завершення,
      тому форма "відкрито" працює найсильніше. Підпис до фото не розгортає
      подію, а описує простір після зміни, тому дієприкметник "відкритий"
      виконує образну й описову функцію. Отже, різні жанри не дублюють одна
      одну, а розподіляють між собою відповідальність, результат і візуальну
      характеристику об'єкта.
  - type: essay-response
    id: act-5
    title: "Есе: редакторський меморандум про пасив і відповідальність"
    instruction: "Напишіть розгорнуту позицію українською з прикладами та короткою самоаргументацією."
    prompt: >-
      Уявіть, що ви пишете короткий меморандум для нового редактора університетського
      сайту. Поясніть, коли в текстах про події варто називати діяча прямо, коли
      доречні форми на -но, -то, а коли потрібен дієприкметник як означення.
      Порівняйте щонайменше два жанри з прочитаного фрагмента, відредагуйте одну
      кальковану форму і наведіть один власний приклад із культурного або
      громадського контексту.
    min_words: 180
    model_answer: >-
      Для редактора головне - не підміняти граматику жанровим автоматизмом.
      Якщо новина називає тих, хто ухвалив рішення або виконав роботу, діяча
      треба ставити на перший план: студентська рада погодила програму,
      волонтери зібрали книжки, працівники центру підготували виставку. Якщо
      важливий уже не виконавець, а результат, у підсумковому абзаці або
      протоколі природно сказати: сцену облаштовано, список учасників
      узгоджено, вхід відкрито. Коли ж текст описує сам об'єкт після зміни,
      доречний дієприкметник: відреставровані плакати, оцифровані листи,
      збережені каталоги. Кальковану фразу "усі бажаючі" треба замінити на
      "усі охочі", а "діючі правила" - на "чинні правила". У громадському
      контексті це особливо важливо, бо від точного слова залежить довіра до
      повідомлення. Так само в музейному тексті краще написати "відреставрована
      вишиванка", ніж "вишиванка була відреставрована майстринями", якщо фокус
      стоїть на самій речі.
    rubric:
      - criteria: "Керування фокусом"
        description: "Актив, результативні форми й дієприкметники розподілено відповідно до жанру."
        points: 4
      - criteria: "Нормативність"
        description: "У тексті немає калькованих активних дієприкметників і орудного діяча після -но, -то."
        points: 3
      - criteria: "Стилістична гнучкість"
        description: "Автор переконливо пояснює різницю між жанрами і не спрощує її до одного шаблону."
        points: 2
      - criteria: "Мовна точність"
        description: "Речення граматично узгоджені, приклади природні, терміни вжито доречно."
        points: 2
workbook:
  - type: select
    title: "Оберіть усі нормативні рішення"
    instruction: "У кожному пункті виберіть усі варіанти, які звучать природно в поданому контексті."
    items:
      - question: "Які два варіанти доречні для короткого протокольного підсумку засідання?"
        min_correct: 2
        options:
          - text: "Порядок денний затверджено."
            correct: true
          - text: "Комісія затвердила порядок денний."
            correct: true
          - text: "Порядок денний був затверджений комісією."
            correct: false
          - text: "Порядок денний затверджувався комісією."
            correct: false
          - text: "Комісією було здійснено затвердження порядку денного."
            correct: false
        explanation: "Протокол приймає і стислий результат, і пряме називання діяча без канцеляриту."
      - question: "Які два вислови природно описують людину, що зараз працює в архіві?"
        min_correct: 2
        options:
          - text: "працівник архіву"
            correct: true
          - text: "людина, яка працює в архіві"
            correct: true
          - text: "працюючий в архіві"
            correct: false
          - text: "архівно працююча людина"
            correct: false
          - text: "архівом працюючий"
            correct: false
        explanation: "Роль або підрядне речення тут природніші за калькований активний дієприкметник."
      - question: "Які два варіанти краще зберігають відповідальність у новині про фестиваль?"
        min_correct: 2
        options:
          - text: "Організатори відкрили сцену вчасно."
            correct: true
          - text: "Волонтери розвісили афіші на вході."
            correct: true
          - text: "Сцену було відкрито організаторами."
            correct: false
          - text: "Афіші були розвішані волонтерами."
            correct: false
          - text: "Було здійснено відкриття сцени організаторами."
            correct: false
        explanation: "Новина краще працює з прямим активом і названими діячами."
      - question: "Які два словосполучення доречні для музейного підпису до експоната?"
        min_correct: 2
        options:
          - text: "відреставрована ікона"
            correct: true
          - text: "оцифрований лист"
            correct: true
          - text: "ікону було відреставровано майстрами"
            correct: false
          - text: "лист був оцифрований працівниками"
            correct: false
          - text: "лист оцифровувався працівниками"
            correct: false
        explanation: "Підпис називає об'єкт після дії, тому означення тут найприродніше."
      - question: "Які два варіанти правильно замінюють кальковані форми в оголошенні?"
        min_correct: 2
        options:
          - text: "усі охочі"
            correct: true
          - text: "чинні правила"
            correct: true
          - text: "усі бажаючі"
            correct: false
          - text: "діючі правила"
            correct: false
          - text: "працюючий порядок"
            correct: false
        explanation: "Охочі й чинні є усталеними нормативними рішеннями."
      - question: "Які два речення природно подають регулярну безособову процедуру в установі?"
        min_correct: 2
        options:
          - text: "У відділі перевіряють заявки щовівторка."
            correct: true
          - text: "Заявки розглядаються протягом тижня."
            correct: true
          - text: "Заявки перевірено працівниками щовівторка."
            correct: false
          - text: "Працівниками розглядаються заявки протягом тижня."
            correct: false
          - text: "Заявки були перевірені працівниками щотижня."
            correct: false
        explanation: "Тут важливий повторюваний процес, а не разовий завершений результат."
      - question: "Які два варіанти доречні для стислого післяподійного підсумку без названого виконавця?"
        min_correct: 2
        options:
          - text: "Список учасників оновлено."
            correct: true
          - text: "Інформацію про зміни розіслано."
            correct: true
          - text: "Список учасників був оновлений координаторкою."
            correct: false
          - text: "Координаторка оновила список учасників у цьому рядку підсумку."
            correct: false
          - text: "Інформація розсилалася відповідальними особами."
            correct: false
        explanation: "У короткому підсумку центр може стояти на результаті, а не на діячеві."
      - question: "Які два вислови правильно розводять ознаку предмета і названу дію в новині?"
        min_correct: 2
        options:
          - text: "відредагований рукопис"
            correct: true
          - text: "редакторка відредагувала рукопис"
            correct: true
          - text: "рукопис був відредагований редакторкою"
