version: '1.0'
module: checkpoint-passive-voice
level: b2
inline:
  - id: act-1
    type: critical-analysis
    title: Діагностична карта фокусу
    instruction: Прочитайте набір речень і розподіліть їх за комунікативною роллю.
    target_text: >-
      Правління ухвалило рішення. Заявку на ремонт подано. Підключений інтернет
      працює стабільно. Двері відчиняються карткою. У приймальні видають
      перепустки з дев'ятої. Договір підписано електронним ключем.
    questions:
      - "Яке речення називає відповідального діяча?"
      - "Яке речення стисло фіксує результат?"
      - "Де дієприкметник описує предмет після дії?"
      - "Де форма на -ся або неозначено-особова модель описує процедуру?"
    model_answers:
      - "Правління ухвалило рішення."
      - "Заявку на ремонт подано."
      - "Підключений інтернет працює стабільно."
      - "Двері відчиняються карткою; у приймальні видають перепустки з дев'ятої."

  - id: act-2
    type: comparative-study
    title: Один факт у чотирьох жанрах
    instruction: Порівняйте варіанти й поясніть, який фокус має кожен жанр.
    items_to_compare:
      - "ОСББ погодило кошторис ремонту."
      - "Кошторис ремонту погоджено."
      - "Погоджений кошторис додали до спільної теки."
      - "У будинку щороку погоджують кошторис на зборах."
    criteria:
      - відповідальний діяч
      - завершений результат
      - ознака документа
      - регулярна процедура
    prompt: "Який варіант ви виберете для новини, протоколу, опису документів і пояснення звичної процедури?"
    model_answer: >-
      У новині найкраще працює актив: ОСББ погодило кошторис ремонту. Для
      протоколу достатньо результату: кошторис погоджено. Якщо треба описати
      документ у теці, потрібен пасивний дієприкметник: погоджений кошторис.
      Для регулярної практики природне неозначено-особове речення: у будинку
      погоджують кошторис на зборах.

  - id: act-3
    type: critical-analysis
    title: Визначте стратегію заміни
    instruction: Прочитайте уривок і вирішіть, яку модель треба застосувати в кожному місці.
    target_text: >-
      Заявку погоджено координаторкою. Двері встановлюються майстрами у
      п'ятницю. Усі бажаючі можуть оглянути квартиру. Діючі правила оренди
      оновлено. Працюючі в укритті волонтери отримають мийні засоби.
    questions:
      - "Де треба повернути особового діяча в підмет?"
      - "Де потрібна лексична заміна активного дієприкметника?"
      - "Де краще використати підрядне означальне речення?"
      - "Який приклад можна залишити як результативну форму?"
    model_answers:
      - "Координаторка погодила заявку; майстри встановлять двері у п'ятницю."
      - "Бажаючі -> охочі; діючі правила -> чинні правила."
      - "Працюючі в укритті волонтери -> волонтери, які працюють в укритті."
      - "Оновлено можна залишити, якщо йдеться про статус оновлення правил."

  - id: act-4
    type: comparative-study
    title: Переклад як редакторський вибір
    instruction: Порівняйте українські редакції англійських пасивних і -ing конструкцій.
    items_to_compare:
      - "The repair request has been submitted. -> Заявку на ремонт подано."
      - "The board approved the budget. -> Правління погодило кошторис."
      - "The approved budget is in the folder. -> Погоджений кошторис лежить у теці."
      - "Applications are reviewed every Tuesday. -> Заявки розглядають щовівторка."
      - "People who want to help can sign up. -> Охочі допомогти можуть записатися."
      - "The door opens with a card. -> Двері відчиняються карткою."
    criteria:
      - статус без діяча
      - відповідальний діяч
      - ознака предмета
      - регулярна процедура
      - заміна активного дієприкметника
      - механізм або засіб
    prompt: "Яку українську стратегію показує кожна пара?"
    model_answer: >-
      Перша пара показує результативну форму на -но. Друга повертає названий
      орган у підмет активного речення. Третя використовує пасивний
      дієприкметник для ознаки документа. Четверта передає регулярну процедуру
      неозначено-особовою моделлю. П'ята замінює кальковане бажаючі на охочі.
      Шоста використовує форму на -ся для механізму, бо картка є засобом, а не
      прихованим виконавцем.

  - id: act-5
    type: essay-response
    title: Редакторський меморандум
    instruction: Напишіть 150-180 слів українською.
    prompt: >-
      Поясніть, як ви редагуватимете повідомлення ОСББ: "Рішення було ухвалене
      правлінням, матеріали закуплено волонтерами, бажаючі можуть допомогти, а
      приміщення буде використовуватися мешканцями". Назвіть щонайменше три
      трансформації й поясніть фокус кожної.
    min_words: 150
    model_answer: >-
      Я спершу визначу, де важлива відповідальність, а де достатньо результату.
      Якщо правління має бути видимим, напишу: "Правління ухвалило рішення".
      Якщо потрібен лише протокольний статус, можливий варіант "рішення
      ухвалено". У фразі "матеріали закуплено волонтерами" особовий діяч стоїть
      після форми на -но, тому краще: "Волонтери закупили матеріали". Слово
      "бажаючі" заміню на "охочі". Останнє речення залежить від фокусу: якщо
      йдеться про звичну функцію приміщення, можна написати "приміщення
      використовуватимуть для велосипедів"; якщо важливі мешканці як діячі,
      краще "мешканці зберігатимуть там велосипеди". Так текст стане коротшим і
      природнішим.
    rubric:
      - criteria: "Фокус"
        description: "Названо, де потрібен актив, результат, ознака або процедура."
        points: 4
      - criteria: "Редагування"
        description: "Кальковані пасиви й активні дієприкметники замінено природно."
        points: 4
      - criteria: "Пояснення"
        description: "Кожну зміну пояснено через жанр і комунікативну мету."
        points: 4

workbook:
  - type: quiz
    title: Діагностика контрольної точки
    instruction: Оберіть варіант, який найточніше відповідає українській нормі та фокусу.
    items:
      - question: "Що найкраще показує відповідального діяча в новині?"
        options:
          - text: "Рішення було ухвалене правлінням."
            correct: false
          - text: "Правління ухвалило рішення."
            correct: true
          - text: "Рішення ухвалено правлінням."
            correct: false
          - text: "Рішення ухвалювалося правлінням."
            correct: false
        explanation: "Якщо діяч важливий, українська новина природно називає його підметом."
      - question: "Де форма на -но, -то найкраще фіксує результат без діяча?"
        options:
          - text: "Майстер замінив змішувач."
            correct: false
          - text: "Змішувач замінено."
            correct: true
          - text: "Замінений змішувач лежить у коробці."
            correct: false
          - text: "Змішувач замінювався майстром."
            correct: false
        explanation: "Змішувач замінено стисло повідомляє завершений результат."
      - question: "Яке речення описує предмет після дії?"
        options:
          - text: "Підключений інтернет працює стабільно."
            correct: true
          - text: "Інтернет підключено вчора."
            correct: false
          - text: "Провайдер підключив інтернет."
            correct: false
          - text: "Інтернет підключається провайдером."
            correct: false
        explanation: "Підключений узгоджується з іменником і описує його ознаку."
      - question: "Де форма на -ся природно описує механізм або правило?"
        options:
          - text: "Двері відчиняються карткою."
            correct: true
          - text: "Двері відчиняються охоронцем."
            correct: false
          - text: "Двері були відчинені охоронцем."
            correct: false
          - text: "Охоронцем відчиняються двері."
            correct: false
        explanation: "Двері відчиняються карткою описує механізм, а не прихованого виконавця."
      - question: "Який орудний після -но, -то є природним?"
        options:
          - text: "Договір підписано директором."
            correct: false
          - text: "Договір підписано електронним ключем."
            correct: true
          - text: "Договір підписано юристкою."
            correct: false
          - text: "Договір підписувався сторонами."
            correct: false
        explanation: "Електронний ключ є інструментом, а не особовим діячем."
      - question: "Як найкраще замінити кальку бажаючі мешканці?"
        options:
          - text: "бажані мешканці"
            correct: false
          - text: "охочі мешканці"
            correct: true
          - text: "мешканці бажаючого типу"
            correct: false
          - text: "бажаючіся мешканці"
            correct: false
        explanation: "Охочі є усталеним українським відповідником."
      - question: "Яке речення найкраще передає регулярну процедуру без конкретного виконавця?"
        options:
          - text: "У приймальні видають перепустки з дев'ятої."
            correct: true
          - text: "Перепустки видаються адміністраторкою з дев'ятої."
            correct: false
          - text: "Адміністраторкою було видано перепустки з дев'ятої."
            correct: false
          - text: "Перепустки видані адміністраторкою з дев'ятої."
            correct: false
        explanation: "Неозначено-особова модель природно описує звичну практику."
      - question: "Де правильно розрізнено стан і результат?"
        options:
          - text: "Вікна зачинені, а заявку подано."
            correct: true
          - text: "Вікна зачинено, а заявка подана менеджером."
            correct: false
          - text: "Вікна зачинялися мешканцями, а заявку було подано менеджером."
            correct: false
          - text: "Вікна зачинені менеджером, а заявку подано менеджером."
            correct: false
        explanation: "Зачинені описує стан, подано фіксує результат."
      - question: "Який варіант найкраще редагує працівниками було перевірено ліфт?"
        options:
          - text: "Працівники перевірили ліфт."
            correct: true
          - text: "Ліфт було перевірено працівниками."
            correct: false
          - text: "Ліфт перевірявся працівниками."
            correct: false
          - text: "Працівниками перевірявся ліфт."
            correct: false
        explanation: "Названі працівники мають бути підметом активного речення."
      - question: "Який варіант найкраще передає чинність правил?"
        options:
          - text: "чинні правила"
            correct: true
          - text: "діючі правила"
            correct: false
          - text: "діяльні правила"
            correct: false
          - text: "працюючі правила"
            correct: false
        explanation: "У правовому та службовому контексті правила є чинними."

  - id: wb-1
    type: critical-analysis
    title: Аудит житлового повідомлення
    instruction: Прочитайте уривок і проведіть редакторську діагностику.
    target_text: >-
      Ремонт сходів було завершено бригадою у четвер. Фото додано до звіту.
      Діючі правила користування підвалом будуть оновлені правлінням.
      Бажаючі отримати ключі мають звернутися до адміністратора. Двері
      відкриваються карткою.
    questions:
      - "Де треба повернути діяча в підмет?"
      - "Де форма на -но, -то природна?"
      - "Які активні дієприкметники або кальки треба замінити?"
      - "Де форма на -ся описує механізм, а не помилку?"
    model_answers:
      - "Бригада завершила ремонт сходів; правління оновить правила."
      - "Фото додано до звіту."
      - "Діючі правила -> чинні правила; бажаючі -> охочі."
      - "Двері відкриваються карткою природно описує механізм."

  - type: select
    title: Оберіть усі природні редакції
    instruction: Позначте всі варіанти, які природно відповідають контексту.
    items:
      - question: "Короткий статус після виконання заявки."
        min_correct: 2
        options:
          - text: "Заявку виконано."
            correct: true
          - text: "Фото додано до повідомлення."
            correct: true
          - text: "Заявку виконано менеджером."
            correct: false
          - text: "Менеджером виконувалася заявка."
            correct: false
        explanation: "Для статусу природні короткі результативні форми без особового діяча."
      - question: "Новина про відповідальне рішення."
        min_correct: 2
        options:
          - text: "Комісія затвердила графік."
            correct: true
          - text: "Правління погодило кошторис."
            correct: true
          - text: "Графік було затверджено комісією."
            correct: false
          - text: "Кошторис погоджувався правлінням."
            correct: false
        explanation: "Новина з відповідальністю потребує активу."
      - question: "Опис предмета після дії."
        min_correct: 2
        options:
          - text: "Відремонтований балкон безпечний."
            correct: true
          - text: "Підключений інтернет працює стабільно."
            correct: true
          - text: "Балкон відремонтовано безпечний."
            correct: false
          - text: "Інтернет підключився провайдером."
            correct: false
        explanation: "Пасивний дієприкметник узгоджується з іменником і описує ознаку."
      - question: "Заміна активних дієприкметників теперішнього часу."
        min_correct: 3
        options:
          - text: "охочі"
            correct: true
          - text: "чинний договір"
            correct: true
          - text: "мийний засіб"
            correct: true
          - text: "бажаючі"
            correct: false
          - text: "діючий закон"
            correct: false
        explanation: "Охочі, чинний і мийний є природними замінами в цих контекстах."
      - question: "Регулярна процедура без персоналізації."
        min_correct: 2
        options:
          - text: "У відділі перевіряють документи щоп'ятниці."
            correct: true
          - text: "Заявки приймаються онлайн."
            correct: true
          - text: "Документи перевіряються менеджеркою."
            correct: false
          - text: "Заявки прийнято менеджером щодня."
            correct: false
        explanation: "Процедура може бути неозначено-особовою або процесовою, але без орудного діяча."
      - question: "Природний інструментальний орудний."
        min_correct: 2
        options:
          - text: "Файл підписано електронним ключем."
            correct: true
          - text: "Поверхню очищено спеціальним розчином."
            correct: true
          - text: "Звіт підготовлено аналітиками."
            correct: false
          - text: "Рішення ухвалено депутатами."
            correct: false
        explanation: "Ключ і розчин є засобами; аналітики й депутати є особовими діячами."
      - question: "Побутовий статус без зайвого діяча."
        min_correct: 2
        options:
          - text: "Ключі передано орендареві."
            correct: true
          - text: "Показники лічильників внесено до акта."
            correct: true
          - text: "Ключі передано власником орендареві."
            correct: false
          - text: "Показники вносилися адміністраторкою."
            correct: false
        explanation: "Короткий статус не потребує особового діяча в орудному."
      - question: "Довгий дієприкметниковий зворот краще полегшити."
        min_correct: 2
        options:
          - text: "Після обговорення мешканці підготували кошторис."
            correct: true
          - text: "Кошторис, підготовлений після обговорення, подали на затвердження."
            correct: true
          - text: "Підготовлений після тривалого обговорення мешканцями будинку кошторис було подано правлінням."
            correct: false
          - text: "Кошторис підготовлювався мешканцями правлінням."
            correct: false
        explanation: "Довгі звороти й кальковані пасиви варто розбивати або повертати в актив."

  - type: error-correction
    title: Редакторська корекція контрольної
    instruction: Виправте речення й визначте тип помилки.
    items:
      - sentence: "Звіт було підготовлено аналітиками."
        error: "було підготовлено аналітиками"
        correction: "Аналітики підготували звіт."
        explanation: "Названі аналітики мають бути підметом."
      - sentence: "Рішення ухвалювалося радою після обговорення."
        error: "ухвалювалося радою"
        correction: "Рада ухвалила рішення після обговорення."
        explanation: "Форма на -ся з орудним діяча звучить кальковано."
      - sentence: "Працюючі над заявкою учасники отримають лист."
        error: "Працюючі над заявкою учасники"
        correction: "Учасники, які працюють над заявкою"
        explanation: "Тимчасову дію людей краще передає підрядне речення."
      - sentence: "Діючий договір зберігається в теці."
        error: "Діючий"
        correction: "Чинний"
        explanation: "У правовому значенні договір є чинним."
      - sentence: "Файл було захищено адміністраторкою."
        error: "захищено адміністраторкою"
        correction: "Адміністраторка захистила файл."
        explanation: "Адміністраторка є особовим діячем."
