  translation: "relative clause"
  pos: phrase
  usage: "Підрядне означальне речення часто рятує текст від неприродної активної форми на -учий."
- lemma: результативність
  translation: "resultativity"
  pos: noun
  usage: "Результативність форми на -но, -то особливо відчутна в підсумкових абзацах."
- lemma: відповідальність
  translation: "responsibility"
  pos: noun
  usage: "У новині важливо не ховати відповідальність за безособовою конструкцією."
- lemma: фокус висловлення
  translation: "utterance focus"
  pos: phrase
  usage: "Фокус висловлення визначає, чи потрібен актив, результат або означення."
- lemma: калька
  translation: "calque"
  pos: noun
  usage: "Калька на зразок бажаючі або діючий одразу послаблює враження від тексту."
- lemma: перебудувати
  translation: "to restructure"
  pos: verb
  usage: "Редактор повинен уміти швидко перебудувати важкий пасив на природніше речення."
- lemma: відредагувати
  translation: "to edit"
  pos: verb
  usage: "На контрольній потрібно не лише впізнати, а й відредагувати хибну конструкцію."
