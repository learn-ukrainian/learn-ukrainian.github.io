  translation: "interested, willing"
  pos: adj
  usage: "В оголошеннях природно писати усі охочі, а не усі бажаючі."
- lemma: мийний
  translation: "washing, cleaning"
  pos: adj
  usage: "Мийний засіб називає призначення предмета точніше за кальковану форму."
- lemma: зворушливий
  translation: "moving, touching"
  pos: adj
  usage: "Зворушливий спогад є кращою українською заміною для калькованого хвилюючого спогаду."
