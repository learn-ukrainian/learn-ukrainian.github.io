  usage: "Нормативність форми треба перевіряти разом зі стилістичною доречністю."
- lemma: стилістична гнучкість
  translation: "stylistic flexibility"
  pos: phrase
  usage: "Стилістична гнучкість дає змогу не зводити всі жанри до одного шаблону."
- lemma: канцеляризм
  translation: "officialese, bureaucratism"
  pos: noun
  usage: "Канцеляризм часто маскується під солідність, але послаблює український текст."
- lemma: трансформація
  translation: "transformation"
  pos: noun
  usage: "Трансформація речення показує, як змінюється фокус висловлення."
- lemma: пунктуаційна пильність
  translation: "punctuation vigilance"
  pos: phrase
  usage: "Пунктуаційна пильність потрібна, коли дієприкметниковий зворот відокремлюється комами."
