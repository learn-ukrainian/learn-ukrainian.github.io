  translation: "expressiveness"
  pos: noun
  usage: "Експресивність доречна в описі, але не повинна руйнувати точність."
- lemma: безособова форма
  translation: "impersonal form"
  pos: phrase
  usage: "Безособова форма на -но, -то фіксує результат без названого виконавця."
- lemma: неозначено-особове речення
  translation: "indefinite-personal sentence"
  pos: phrase
  usage: "Неозначено-особове речення добре передає повторювану інституційну дію."
- lemma: пасивний дієприкметник
  translation: "passive participle"
  pos: phrase
  usage: "Пасивний дієприкметник найприродніше працює як означення до предмета."
- lemma: активний дієприкметник
  translation: "active participle"
  pos: phrase
  usage: "Активний дієприкметник теперішнього часу вимагає суворого стилістичного контролю."
