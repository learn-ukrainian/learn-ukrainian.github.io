  translation: "lexicalization"
  pos: noun
  usage: "Лексикалізація пояснює, чому окремі форми вже сприймаються як прикметники."
- lemma: віддієслівний прикметник
  translation: "deverbal adjective"
  pos: phrase
  usage: "Віддієслівний прикметник часто точніше називає призначення предмета, ніж калькований дієприкметник."
