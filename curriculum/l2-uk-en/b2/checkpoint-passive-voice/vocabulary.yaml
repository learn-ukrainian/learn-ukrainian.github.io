  translation: "functionality"
  pos: noun
  usage: "Функціональність форми залежить від того, яку роль вона виконує в жанрі."
- lemma: аудит
  translation: "audit"
  pos: noun
  usage: "Стилістичний аудит змушує не тільки знайти помилку, а й пояснити її."
- lemma: рефлексія
  translation: "reflection"
  pos: noun
  usage: "Після вправи корисна коротка рефлексія над повторюваними хибами."
- lemma: ієрархія
  translation: "hierarchy"
  pos: noun
  usage: "Ієрархія пасивних стратегій допомагає вибрати природний варіант."
- lemma: автоматизм
  translation: "automaticity"
  pos: noun
  usage: "Автоматизм з'являється тоді, коли редакторське рішення ухвалюється швидко, але мотивовано."
