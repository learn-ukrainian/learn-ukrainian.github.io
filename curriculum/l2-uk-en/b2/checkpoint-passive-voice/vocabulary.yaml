- lemma: консолідація
  translation: "consolidation"
  pos: noun
  usage: "Ця контрольна завершує консолідацію всього пасивного блоку B2."
- lemma: ревізія
  translation: "review, revision"
  pos: noun
  usage: "Ревізія пасивної системи допомагає побачити ієрархію конструкцій."
- lemma: нормативність
  translation: "normativity, standardness"
