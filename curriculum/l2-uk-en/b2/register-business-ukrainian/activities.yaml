        explanation: "Переговори потребують уточнення, меж і альтернатив."
      - question: "Презентація."
        min_correct: 2
        options:
          - text: "На початку варто назвати тему й мету."
            correct: true
          - text: "Слухачі мають самі здогадатися про наступні кроки."
            correct: false
          - text: "Мовні маркери допомагають перейти між частинами."
            correct: true
          - text: "Що більше канцеляриту, то зрозуміліша презентація."
            correct: false
        explanation: "Презентація має вести слухача зрозумілим маршрутом."
      - question: "Запозичення."
