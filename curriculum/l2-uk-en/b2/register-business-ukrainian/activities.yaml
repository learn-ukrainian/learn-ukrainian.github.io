  - type: fill-in
    title: "Фрази для переговорів"
    instruction: "Доповніть фрази переговорів."
    items:
      - sentence: "Правильно ____, що для Вас пріоритетом є строк запуску?"
        answer: "розумію"
        options: ["розумію", "тисну", "вимагаю", "ламаю"]
        explanation: "Правильно розумію - формула уточнення."
      - sentence: "Як ____ пропонуємо поетапну оплату."
        answer: "альтернативу"
        options: ["альтернативу", "погрозу", "емоцію", "прикрасу"]
        explanation: "Альтернатива відкриває компроміс."
      - sentence: "Потрібен час, щоб ____ фінансові умови."
        answer: "перевірити"
        options: ["перевірити", "забути", "загубити", "прикрасити"]
        explanation: "Перевірити умови - нейтральна ділова дія."
      - sentence: "Повернемося з ____ завтра до 15:00."
        answer: "відповіддю"
        options: ["відповіддю", "мовчанкою", "жартом", "панікою"]
        explanation: "Фраза фіксує строк наступного контакту."
      - sentence: "Отже, ____ перший етап до 20 серпня."
        answer: "погоджуємо"
        options: ["погоджуємо", "плутаємо", "вгадуємо", "ігноруємо"]
        explanation: "Погоджуємо фіксує домовленість."
      - sentence: "З огляду на ____ пропонуємо скоротити обсяг першого етапу."
        answer: "строк"
        options: ["строк", "жарт", "мем", "настрій"]
        explanation: "Строк може бути аргументом у переговорах."
      - sentence: "Ми можемо взяти цей обсяг за ____ погодження бюджету."
        answer: "умови"
        options: ["умови", "емоції", "враження", "прикладу"]
        explanation: "За умови називає межу домовленості."
      - sentence: "Просимо ____ залучення одного фахівця на два тижні."
        answer: "погодити"
        options: ["погодити", "забути", "прикрасити", "вгадати"]
        explanation: "Погодити ресурс - типове ділове прохання."
      - sentence: "Цей варіант зменшує ____ на підтримку."
        answer: "витрати"
        options: ["витрати", "усмішки", "плітки", "паузи"]
        explanation: "Витрати - точний фінансовий термін."
      - sentence: "Після тестування ____ фінальний варіант."
        answer: "оберемо"
        options: ["оберемо", "загубимо", "засмутимо", "розсердимо"]
        explanation: "Оберемо фінальний варіант - нейтральна формула рішення."

  - type: essay-response
    id: business-writing-essay
    title: "Письмо: діловий текст"
    instruction: "Напишіть відповіді українською, зберігаючи діловий регістр."
    prompt: >-
      Напишіть діловий текст на 180-220 слів. Оберіть одну ситуацію: лист-запит до партнерської організації, ввічлива відмова від запропонованого строку або коротка службова записка про технічну помилку. У тексті мають бути звертання, контекст, потрібна дія, строк і завершальна формула.
    min_words: 180
    model_answer: >-
      Шановна пані Олено! У відповідь на Ваш запит надсилаємо уточнену інформацію щодо першого етапу співпраці. Для підготовки договору просимо надати реквізити компанії, контакт відповідальної особи та актуальну редакцію технічного завдання. Ці дані потрібні, щоб погодити бюджет і зарезервувати команду на липень. Будемо вдячні за відповідь до 15 липня, 12:00. Якщо потрібен додатковий формат документів, просимо повідомити нас окремо. З повагою, команда проєкту.
    rubric:
      - criteria: "Структура"
        description: "Є звертання, контекст, потрібна дія, строк і завершення."
        points: 4
      - criteria: "Діловий регістр"
        description: "Тон ввічливий, точний, без розмовних скорочень і зайвого канцеляриту."
        points: 4
      - criteria: "Лексика"
        description: "Використано доречні слова з модуля: запит, договір, строк, відповідальна особа, погодити."
        points: 4
