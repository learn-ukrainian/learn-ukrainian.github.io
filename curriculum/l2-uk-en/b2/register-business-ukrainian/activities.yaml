version: '1.0'
module: register-business-ukrainian
level: b2
inline: []
workbook:
  - type: reading
    id: commercial-proposal-reading
    title: "Читання: комерційна пропозиція"
    instruction: "Прочитайте навчальний уривок і визначте, які елементи роблять його діловим текстом."
    source: "Навчальний уривок для модуля B2."
    text: >-
      Шановна пані Оксано! У відповідь на Ваш запит надсилаємо коротку комерційну пропозицію щодо оновлення електронного кабінету учня. Наша команда пропонує три етапи роботи: аудит поточної структури, створення прототипу нового розділу та тестування з групою користувачів. Очікуваний результат - скорочення часу пошуку домашніх завдань і зменшення кількості повторних звернень до служби підтримки. Орієнтовний строк виконання першого етапу - десять робочих днів після погодження технічного завдання. Будемо вдячні за відповідь до 18 липня, щоб зарезервувати команду для пілотного запуску. З повагою, команда проєкту.
    tasks:
      - "Випишіть формулу звертання."
      - "Назвіть три етапи роботи."
      - "Знайдіть речення, яке пояснює очікуваний результат."
      - "Випишіть строк і умову початку першого етапу."
      - "Поясніть, чому завершальна формула звучить ділово."

  - type: match-up
    title: "Формули й функції"
    instruction: "Поєднайте ділову формулу з її комунікативною функцією."
    pairs:
      - left: "У відповідь на Ваш запит"
        right: "зв'язок із попереднім зверненням"
      - left: "Просимо надати"
        right: "ввічливе прохання"
      - left: "Підтверджуємо отримання"
        right: "фіксація отриманого документа"
      - left: "Будемо вдячні за відповідь до"
        right: "прохання зі строком"
      - left: "На жаль, не можемо"
        right: "коректна відмова"
      - left: "Як альтернативу пропонуємо"
        right: "компромісний варіант"
      - left: "Правильно розумію, що"
        right: "уточнення позиції"
      - left: "З огляду на строк"
        right: "аргументація через умову"
      - left: "Отже, домовилися"
        right: "підсумок переговорів"
      - left: "З повагою"
        right: "завершальна формула листа"
      - left: "Просимо розглянути можливість"
        right: "пом'якшене прохання або пропозиція"
      - left: "Станом на 10 липня"
        right: "точна фіксація дати або стану"

  - type: fill-in
    title: "Заповніть пропуски"
    instruction: "Виберіть слово або формулу, доречну для ділового регістру."
    items:
      - sentence: "____ отримання Вашого запиту."
        answer: "Підтверджуємо"
        options: ["Підтверджуємо", "Прикинь", "Скидаємо", "Ну"]
        explanation: "Підтверджуємо - нейтральна ділова формула."
      - sentence: "Просимо надати реквізити компанії до ____ дня."
        answer: "кінця"
        options: ["кінця", "фінішу", "краю", "завалу"]
        explanation: "До кінця дня - нормативна формула строку."
      - sentence: "У зв'язку зі зміною графіка просимо ____ зустріч."
        answer: "перенести"
        options: ["перенести", "перекинути", "заштовхати", "підкрутити"]
        explanation: "Перенести зустріч - доречне ділове словосполучення."
      - sentence: "Будемо ____ за відповідь до 18 липня."
        answer: "вдячні"
        options: ["вдячні", "кайфові", "боржні", "прикро"]
        explanation: "Будемо вдячні - ввічлива формула прохання."
      - sentence: "Комерційна ____ має пояснювати потребу клієнта й умови співпраці."
        answer: "пропозиція"
        options: ["пропозиція", "прикмета", "погроза", "розвага"]
        explanation: "Комерційна пропозиція - жанр ділового тексту."
      - sentence: "Після зустрічі підготуємо короткий ____ домовленостей."
        answer: "протокол"
        options: ["протокол", "слух", "жарт", "мем"]
        explanation: "Протокол фіксує рішення й відповідальних."
      - sentence: "Для першого етапу потрібно погодити технічне ____."
        answer: "завдання"
        options: ["завдання", "настрій", "враження", "побажання"]
        explanation: "Технічне завдання визначає умови роботи."
      - sentence: "На жаль, не можемо виконати це завдання в запропонований ____."
        answer: "строк"
        options: ["строк", "настрій", "ритм", "клік"]
        explanation: "Строк - нормативна назва часової межі."
      - sentence: "Як ____ пропонуємо розділити запуск на два етапи."
        answer: "альтернативу"
        options: ["альтернативу", "емоцію", "прикрасу", "затримку"]
        explanation: "Альтернатива допомагає відмовити без закриття діалогу."
      - sentence: "Просимо погодити залучення додаткового ____."
        answer: "ресурсу"
        options: ["ресурсу", "приколу", "шуму", "лайку"]
        explanation: "Ресурс у діловому тексті означає людей, час або кошти."

  - type: select
    title: "Оберіть діловий варіант"
    instruction: "Позначте фрази, доречні для професійного листа або переговорів."
    items:
      - question: "Лист партнерові про зміну дати зустрічі."
        min_correct: 2
        options:
          - text: "У зв'язку зі зміною графіка просимо перенести зустріч."
            correct: true
          - text: "Давайте якось перекинемо той дзвінок."
            correct: false
          - text: "Будемо вдячні за підтвердження нової дати."
            correct: true
          - text: "Ну ви ж розумієте, у нас завал."
            correct: false
        explanation: "Діловий лист потребує причини, прохання й нейтрального тону."
      - question: "Ввічлива відмова у переговорах."
        min_correct: 2
        options:
          - text: "На жаль, не можемо погодити цей строк."
            correct: true
          - text: "Це взагалі не варіант."
            correct: false
          - text: "Як альтернативу пропонуємо другий етап у вересні."
            correct: true
          - text: "Ви просто не врахували реальність."
            correct: false
        explanation: "Відмова має назвати межу й, за можливості, альтернативу."
      - question: "Початок презентації для керівництва."
        min_correct: 2
        options:
          - text: "Сьогодні представлю три варіанти оновлення сервісу."
            correct: true
          - text: "Ну, я тут щось накидав."
            correct: false
          - text: "Наприкінці потрібно вибрати сценарій для тестування."
            correct: true
          - text: "Як піде, так і розкажу."
            correct: false
        explanation: "Потрібні тема, мета й очікуваний результат."
      - question: "Протокол наради."
        min_correct: 2
        options:
          - text: "Рішення: підготувати дві версії головної сторінки до 12 липня."
            correct: true
          - text: "Були різні думки, усі щось казали."
            correct: false
          - text: "Відповідальна особа: менеджерка проєкту."
            correct: true
          - text: "Поговорили нормально, рухаємося."
            correct: false
        explanation: "Протокол фіксує рішення, відповідальних і строки."
      - question: "Комерційна пропозиція."
        min_correct: 2
        options:
          - text: "Пропонуємо оновити кабінет учня, щоб скоротити час пошуку матеріалів."
            correct: true
          - text: "Ми круті й точно зробимо всім красиво."
            correct: false
          - text: "Орієнтовний строк першого етапу - десять робочих днів."
            correct: true
          - text: "Це буде просто топ, без питань."
            correct: false
        explanation: "Комерційна пропозиція має потребу, рішення й умови."
      - question: "Лист-запит до партнерів."
        min_correct: 2
        options:
          - text: "Просимо надати оновлений прайс-лист до 18 липня."
            correct: true
          - text: "Киньте нам ціни, коли буде час."
            correct: false
          - text: "Ці дані потрібні для фінансового порівняння."
            correct: true
          - text: "Бо нам там треба щось порахувати."
            correct: false
        explanation: "Лист-запит називає дію, строк і причину."
      - question: "Службова записка."
        min_correct: 2
        options:
          - text: "Під час перевірки виявлено технічну помилку."
            correct: true
          - text: "Відділ знов усе зіпсував."
            correct: false
          - text: "Просимо погодити залучення додаткового ресурсу."
            correct: true
          - text: "Треба терміново когось дати, бо все погано."
            correct: false
        explanation: "Службова записка фіксує факт і прохання без емоційної атаки."
      - question: "Професійний зворотний зв'язок."
        min_correct: 2
        options:
          - text: "Рекомендую уточнити опис послуги в першому абзаці."
            correct: true
          - text: "Текст якийсь не дуже."
            correct: false
          - text: "Клієнт має одразу бачити проблему, рішення й результат."
            correct: true
          - text: "Переробіть нормально."
            correct: false
        explanation: "Зворотний зв'язок має бути конкретним і корисним."

  - type: true-false
    title: "Правда чи неправда: ділова мова"
    instruction: "Визначте, чи твердження правильне."
    items:
      - statement: "Ділова мова повинна бути точною, але не обов'язково громіздкою."
        correct: true
        explanation: "Ясність важливіша за канцелярську вагу."
      - statement: "У темі листа достатньо написати «Питання»."
        correct: false
        explanation: "Тема має називати конкретну справу."
      - statement: "У переговорах корисно називати межі й альтернативи."
        correct: true
        explanation: "Так зберігається простір для домовленості."
      - statement: "Протокол може бути зрозумілим лише тим, хто був на зустрічі."
        correct: false
        explanation: "Документ має бути зрозумілий поза ситуацією."
      - statement: "Запозичення в бізнес-лексиці треба оцінювати за доречністю для адресата."
        correct: true
        explanation: "Не всі запозичення помилкові, але вони мають бути зрозумілі."
      - statement: "Фраза «На жаль, не можемо» може бути частиною коректної відмови."
        correct: true
        explanation: "Вона пом'якшує тон, якщо далі є причина або межа."
      - statement: "У презентації не треба називати наступні кроки."
        correct: false
        explanation: "Наступні кроки переводять слухання в дію."
      - statement: "Комерційна пропозиція має показувати потребу клієнта, а не тільки продукт."
        correct: true
        explanation: "Інакше текст звучить як загальна реклама."
      - statement: "Кличний відмінок у звертанні допомагає зробити лист мовно охайним."
        correct: true
        explanation: "Форми пане Олеже, пані Маріє показують увагу до адресата."
      - statement: "Діловий текст завжди кращий, якщо містить якомога більше запозичень."
        correct: false
        explanation: "Запозичення мають бути доречні й зрозумілі адресатові."

  - type: error-correction
    title: "Виправте діловий стиль"
    instruction: "Знайдіть недоречну форму й замініть її діловим варіантом."
    items:
      - sentence: "Скиньте нам договір якнайшвидше, бо все горить."
        error: "Скиньте"
        correction: "Надішліть"
        explanation: "У діловому листі краще вживати надішліть."
      - sentence: "Петренко, дайте відповідь до обіду."
        error: "Петренко"
        correction: "Пане Петренку"
        explanation: "Потрібна форма звертання й кличний відмінок."
      - sentence: "Ми здійснили проведення перевірки сервісу."
        error: "здійснили проведення"
        correction: "провели"
        explanation: "Канцелярський надмір замінюємо простим дієсловом."
      - sentence: "У нас там щось поламалося з оплатою."
        error: "щось поламалося"
        correction: "виявлено технічну помилку"
        explanation: "Діловий текст потребує точнішого опису проблеми."
      - sentence: "Це взагалі не варіант для нас."
        error: "взагалі не варіант"
        correction: "не можемо погодити цей варіант"
        explanation: "Коректна відмова називає межу без розмовної різкості."
      - sentence: "Давайте швидко зафіксимо, хто що робить, бо потім забудемо."
        error: "бо потім забудемо"
        correction: "щоб зафіксувати відповідальних і строки"
        explanation: "Пояснення має звучати професійно."
      - sentence: "Ми хочемо імплементувати синергію клієнтського досвіду."
        error: "імплементувати синергію клієнтського досвіду"
        correction: "покращити взаємодію з клієнтами"
        explanation: "Термінологія не повинна маскувати зміст."
      - sentence: "Напишіть, чи вам окей цей дедлайн."
        error: "окей цей дедлайн"
        correction: "підходить цей строк"
        explanation: "У зовнішньому листі краще нейтральне підходить цей строк."
      - sentence: "Я тут накидав резюме домовленостей."
        error: "накидав"
        correction: "підготував"
        explanation: "Підготував доречніше для ділового регістру."
      - sentence: "Ми гарантуємо абсолютне зростання ефективності."
        error: "гарантуємо абсолютне"
        correction: "очікуємо"
        explanation: "Не варто давати бездоказові абсолютні гарантії."

  - type: match-up
    title: "Елементи документів"
    instruction: "Поєднайте елемент документа з його призначенням."
    pairs:
      - left: "тема листа"
        right: "коротко називає справу"
      - left: "звертання"
        right: "задає тон і дистанцію"
      - left: "контекст"
        right: "пояснює підставу звернення"
      - left: "потрібна дія"
        right: "показує, чого очікують від адресата"
      - left: "строк"
        right: "визначає часову межу"
      - left: "протокол"
        right: "фіксує рішення наради"
      - left: "звіт"
        right: "описує виконану роботу й результат"
      - left: "резюме"
        right: "подає професійний досвід і навички"
      - left: "комерційна пропозиція"
        right: "пояснює рішення й умови співпраці"
      - left: "технічне завдання"
        right: "визначає вимоги до виконання"
      - left: "службова записка"
        right: "пояснює проблему й пропонує дію всередині організації"
      - left: "мотиваційний лист"
        right: "пояснює зв'язок кандидата з посадою"

  - type: select
    title: "Точність термінів"
    instruction: "Виберіть варіанти, де термін ужито точно."
    items:
      - question: "Фінансова лексика."
        min_correct: 2
        options:
          - text: "Витрати на підтримку зросли в липні."
            correct: true
          - text: "Прибуток - це будь-яке надходження коштів."
            correct: false
          - text: "Рентабельність проєкту залежить від доходів і витрат."
            correct: true
          - text: "Рахунок і договір - це те саме."
            correct: false
        explanation: "Фінансові терміни не є взаємозамінними."
      - question: "Строки."
        min_correct: 2
        options:
          - text: "Термін дії договору завершується 31 грудня."
            correct: true
          - text: "Крайній строк оплати - 15 липня."
            correct: true
          - text: "Строк - це завжди назва документа."
            correct: false
          - text: "Термін виконання не треба уточнювати."
            correct: false
        explanation: "Треба розрізняти строк дії, виконання й оплати."
      - question: "Корпоративна культура."
        min_correct: 2
        options:
          - text: "Зворотний зв'язок має містити конкретні приклади."
            correct: true
          - text: "Прозорість краще показувати через регулярні звіти."
            correct: true
          - text: "Слово «цінності» саме доводить якість роботи."
            correct: false
          - text: "Будь-який корпоративний термін автоматично точний."
            correct: false
        explanation: "Абстрактні слова потребують практичного підтвердження."
      - question: "Документація."
        min_correct: 2
        options:
          - text: "Протокол фіксує рішення, відповідальних і строки."
            correct: true
          - text: "Звіт може описувати виконану роботу й невирішені ризики."
            correct: true
          - text: "Службова записка має складатися лише з емоційної оцінки."
            correct: false
          - text: "Резюме повинне повторювати всі деталі біографії без добору."
            correct: false
        explanation: "Ділові документи добирають релевантну інформацію."
      - question: "Листування."
        min_correct: 2
        options:
          - text: "Тема листа має називати конкретну справу."
            correct: true
          - text: "Звертання задає тон професійного контакту."
            correct: true
          - text: "У листі-запиті не потрібно називати потрібну дію."
            correct: false
          - text: "Формула «з повагою» доречна лише в художньому тексті."
            correct: false
        explanation: "Лист має бути зрозумілий за темою, звертанням і проханням."
      - question: "Переговори."
        min_correct: 2
        options:
          - text: "Фраза «правильно розумію, що...» допомагає уточнити позицію."
            correct: true
          - text: "Відмова без причини завжди звучить професійніше."
            correct: false
