version: '1.0'
module: register-business-ukrainian
level: b2
inline:
  - type: select
    title: "Професійний тон без канцелярського надміру"
    instruction: "Позначте варіанти, які пасують до ділової ситуації."
    items:
      - question: "Партнер просить перенести зустріч через зміну графіка."
        min_correct: 2
        options:
          - text: "Підтверджуємо отримання Вашого запиту щодо перенесення зустрічі."
            correct: true
          - text: "Ок, тоді якось потім."
            correct: false
          - text: "Пропонуємо два можливі часові проміжки для нового дзвінка."
            correct: true
          - text: "Ваша проблема не на часі."
            correct: false
        explanation: "Діловий тон підтверджує запит і пропонує наступний крок."
      - question: "Потрібно ввічливо відмовити від неприйнятного строку."
        min_correct: 2
        options:
          - text: "На жаль, не можемо виконати завдання в запропонований строк."
            correct: true
          - text: "Це нереально, навіть не пробуйте."
            correct: false
          - text: "Як альтернативу пропонуємо завершити перший етап до 20 липня."
            correct: true
          - text: "Нам це не підходить, крапка."
            correct: false
        explanation: "Коректна відмова називає межу й альтернативу."
      - question: "У комерційній пропозиції треба показати цінність послуги."
        min_correct: 2
        options:
          - text: "Послуга скорочує час обробки заявок на першому етапі."
            correct: true
          - text: "Наше рішення просто найкраще на ринку."
            correct: false
          - text: "Після пілоту надамо дані про ефективність."
            correct: true
          - text: "Повірте нам без доказів."
            correct: false
        explanation: "Бізнес-текст має бути переконливим через факти й обмеження."
      - question: "Після наради треба зафіксувати рішення."
        min_correct: 2
        options:
          - text: "Рішення: запуск основного сервісу відбудеться в п'ятницю."
            correct: true
          - text: "Ми трохи поговорили й ніби домовилися."
            correct: false
          - text: "Відповідальна особа: менеджерка проєкту."
            correct: true
          - text: "Якось розберемося."
            correct: false
        explanation: "Протокол фіксує рішення, відповідальних і строки."
      - question: "Клієнт запитує про реквізити й договір."
        min_correct: 2
        options:
          - text: "У відповідь на Ваш запит надсилаємо реквізити компанії."
            correct: true
          - text: "Тримайте, що знайшли."
            correct: false
          - text: "Проєкт договору додаємо до листа."
            correct: true
          - text: "Договір десь у вкладеннях, пошукайте."
            correct: false
        explanation: "Ділова відповідь називає документи й дію."
      - question: "У листі не варто перевантажувати текст канцеляризмами."
        min_correct: 2
        options:
          - text: "Просимо оплатити рахунок до 15 липня."
            correct: true
          - text: "Просимо здійснити проведення процесу оплати рахунку."
            correct: false
          - text: "Команда проаналізує дані до п'ятниці."
            correct: true
          - text: "Команда здійснить проведення аналізу даних."
            correct: false
        explanation: "Дієслова часто ясніші за важкі іменникові конструкції."
      - question: "Потрібно м'яко попросити зворотний зв'язок."
        min_correct: 2
        options:
          - text: "Будемо вдячні за коментарі до пунктів 2-4 договору."
            correct: true
          - text: "Чекаємо на Вашу реакцію щодо цього всього."
            correct: false
          - text: "Просимо надіслати правки в режимі редагування до середи."
            correct: true
          - text: "Прокоментуйте вже якось."
            correct: false
        explanation: "Потрібні об'єкт, формат і строк."
      - question: "Презентація керівництву має вести слухача."
        min_correct: 3
        options:
          - text: "Спочатку назвати контекст."
            correct: true
          - text: "Показати проблему й ризик."
            correct: true
          - text: "Запропонувати рішення й наступний крок."
            correct: true
          - text: "Почати з усіх технічних подробиць без рамки."
            correct: false
        explanation: "Ділова презентація потребує маршруту для рішення."
  - type: match-up
    title: "Бізнес-функція і формула"
    instruction: "Зіставте комунікативну функцію з доречною фразою."
    pairs:
      - left: "підтвердження отримання"
        right: "Підтверджуємо отримання Вашого запиту."
      - left: "прохання про строк"
        right: "Будемо вдячні за відповідь до 17:00."
      - left: "ввічлива відмова"
        right: "На жаль, не можемо погодити запропонований строк."
      - left: "альтернатива"
        right: "Як альтернативу пропонуємо поетапне виконання."
      - left: "запит документів"
        right: "Просимо надіслати реквізити компанії."
      - left: "комерційна пропозиція"
        right: "Пропонуємо розглянути можливість довгострокової співпраці."
      - left: "протокол рішення"
        right: "Рішення: повторне тестування провести до понеділка."
      - left: "відповідальна особа"
        right: "Відповідальна особа - менеджерка проєкту."
      - left: "зниження категоричності"
        right: "Очікуємо скорочення витрат після пілотного етапу."
      - left: "завершення листа"
        right: "З повагою"
      - left: "технічне завдання"
        right: "опис вимог до сервісу або продукту"
      - left: "зворотний зв'язок"
        right: "коментарі з конкретними прикладами"
  - type: fill-in
    title: "Ділові формули"
    instruction: "Вставте формулу або термін, який робить текст професійним і ясним."
    items:
      - sentence: "У ____ на Ваш запит надсилаємо оновлену пропозицію."
        answer: "відповідь"
        options: ["відповідь", "відмову", "прибуток", "чат"]
        explanation: "У відповідь на Ваш запит - стала ділова формула."
      - sentence: "Просимо надіслати ____ компанії для підготовки договору."
        answer: "реквізити"
        options: ["реквізити", "емоції", "жарти", "сленг"]
        explanation: "Реквізити потрібні для ділових документів."
      - sentence: "Порядок ____ містить три питання."
        answer: "денний"
        options: ["денний", "нічний", "дружній", "випадковий"]
        explanation: "Порядок денний - agenda."
      - sentence: "____ фіксує рішення, відповідальних і строки."
        answer: "Протокол"
        options: ["Протокол", "Смайлик", "Жарт", "Слоган"]
        explanation: "Протокол є документом після наради."
      - sentence: "Будемо ____ за коментарі до договору."
        answer: "вдячні"
        options: ["вдячні", "вигідні", "прибуткові", "канцелярські"]
        explanation: "Будемо вдячні - формула ввічливого прохання."
      - sentence: "На жаль, не можемо ____ запропонований строк."
        answer: "погодити"
        options: ["погодити", "зламати", "скинути", "зарелізити"]
        explanation: "Погодити строк - ділова формула."
      - sentence: "Як ____ пропонуємо другий етап у вересні."
        answer: "альтернативу"
        options: ["альтернативу", "емоцію", "переписку", "прикрасу"]
        explanation: "Відмова краще звучить із альтернативою."
      - sentence: "Просимо ____ можливість поетапної оплати."
        answer: "розглянути"
        options: ["розглянути", "зацінити", "кинути", "вгадати"]
        explanation: "Розглянути можливість - ввічлива формула пропозиції."
      - sentence: "З огляду ____ строк пропонуємо скоротити перший етап."
        answer: "на"
        options: ["на", "під", "крізь", "поміж"]
        explanation: "З огляду на - логічний зв'язок."
      - sentence: "Ефективність рішення треба підтвердити ____."
        answer: "даними"
        options: ["даними", "вигуками", "смайликами", "припущеннями"]
        explanation: "Бізнес-текст спирається на дані."
  - type: true-false
    title: "Діловий тон: перевірка рішень"
    instruction: "Позначте, чи твердження відповідає добрій діловій українській."
    items:
      - statement: "Ділова ввічливість має допомагати сказати позицію, а не приховувати її."
        correct: true
        explanation: "Коректний тон не скасовує ясної дії."
      - statement: "Слово якнайшвидше завжди достатньо конкретне."
        correct: false
        explanation: "Краще назвати дату або умову."
      - statement: "Відмова звучить професійніше, коли містить причину або альтернативу."
        correct: true
        explanation: "Адресат розуміє межу й наступний крок."
      - statement: "У протоколі можна не називати відповідальних, якщо всі були на зустрічі."
        correct: false
        explanation: "Документ має бути зрозумілий поза ситуацією."
      - statement: "Кліше З повагою доречне в більшості нейтральних листів."
        correct: true
        explanation: "Це стандартне завершення."
      - statement: "Діловий текст стає кращим, якщо кожне дієслово замінити іменником."
        correct: false
        explanation: "Надмір іменникових конструкцій ускладнює читання."
      - statement: "Термін корисний, якщо адресат його розуміє або отримує пояснення."
        correct: true
        explanation: "Термін має уточнювати, а не маскувати зміст."
      - statement: "Внутрішній чат можна без змін пересилати клієнтові."
        correct: false
        explanation: "Потрібно змінити адресата, лексику, контекст і тон."
      - statement: "Комерційна пропозиція має називати проблему, рішення й очікуваний результат."
        correct: true
        explanation: "Це робить цінність видимою."
      - statement: "Перепрошуємо за незручності треба додавати до кожного речення."
        correct: false
        explanation: "Надмір вибачень робить текст невпевненим."
  - type: error-correction
    title: "Редагування ділового тексту"
    instruction: "Виправте формулу, яка заважає професійному тону."
    items:
      - sentence: "Просимо здійснити проведення процесу оплати рахунку."
        error: "здійснити проведення процесу оплати рахунку"
        correction: "оплатити рахунок"
        error_type: "phrase"
        explanation: "Дієслово коротше й вимагає знахідного відмінка: оплатити рахунок."
      - sentence: "Ваш дедлайн нереальний, не пишіть такого."
        error: "нереальний, не пишіть такого"
        correction: "не можемо виконати завдання в запропонований строк"
        error_type: "register"
        explanation: "Коректна відмова називає межу без конфліктної оцінки."
      - sentence: "Чекаємо на Вашу реакцію щодо цього питання."
        error: "цього питання"
        correction: "коментарі до пунктів 2-4 договору до 15 липня"
        error_type: "phrase"
        explanation: "Потрібні об'єкт, формат і строк."
      - sentence: "Шановний Олег, надсилаємо договір."
        error: "Олег"
        correction: "Олеже"
        error_type: "word"
        explanation: "У звертанні потрібен кличний відмінок."
      - sentence: "Було запропоновано провести перевірку колись."
        error: "було запропоновано провести перевірку колись"
        correction: "Команда підтримки пропонує провести перевірку до п'ятниці."
        error_type: "construction"
        explanation: "Потрібні суб'єкт і строк."
      - sentence: "Гарантовано скоротимо витрати на 40 відсотків без пілоту."
        error: "Гарантовано"
        correction: "Очікуємо можливе скорочення витрат; точний показник визначимо після пілоту."
        error_type: "register"
        explanation: "Категоричну обіцянку треба підтримати даними або послабити."
      - sentence: "Ми надзвичайно захоплені Вашою фантастичною компанією."
        error: "надзвичайно захоплені Вашою фантастичною"
        correction: "дякуємо за інтерес до співпраці з Вашою компанією"
        error_type: "register"
        explanation: "Ділова ввічливість стримана."
      - sentence: "Документ десь у вкладеннях, пошукайте."
        error: "десь у вкладеннях, пошукайте"
        correction: "Проєкт договору додаємо до листа."
        error_type: "phrase"
        explanation: "Ділова відповідь має називати документ прямо."
workbook:
  - type: reading
    id: commercial-proposal-reading
    title: "Читання: комерційна пропозиція"
    instruction: "Прочитайте навчальний уривок і визначте, які елементи роблять його діловим текстом."
    source: "Навчальний уривок для модуля B2."
    text: >-
      Шановна пані Оксано! У відповідь на Ваш запит надсилаємо коротку пропозицію щодо впровадження системи онлайн-запису для навчального центру. Наше рішення допомагає скоротити час ручної обробки заявок і зменшити кількість пропущених повідомлень. Пропонуємо провести пілотний етап упродовж двох тижнів: команда налаштує форму запису, підготує коротку інструкцію для адміністраторів і надасть звіт про перші результати. Орієнтовна вартість пілоту зазначена в додатку. Будемо вдячні за коментарі до 18 липня, щоб погодити технічне завдання і графік запуску.
    tasks:
      - "Знайдіть формулу відповіді на запит."
      - "Випишіть проблему, яку розв'язує пропозиція."
      - "Назвіть два конкретні результати пілотного етапу."
      - "Поясніть, чому фраза про вартість звучить обережно."
      - "Знайдіть строк відповіді."
      - "Перепишіть останнє речення менш канцелярсько, але ділово."
  - type: essay-response
    id: partner-request-letter
    title: "Лист-запит про співпрацю"
    instruction: "Напишіть офіційний лист-запит до потенційного партнера."
    prompt: "У 180-230 словах коротко представте вашу діяльність, запропонуйте формат співпраці, попросіть про зустріч і назвіть строк відповіді. Уникайте надмірних канцеляризмів."
    min_words: 180
    model_answer: >-
      > [!model-answer]
      > Шановні колеги! Звертаємося до Вас із пропозицією розглянути можливість співпраці у сфері освітніх онлайн-сервісів. Наша команда розробляє інструменти для керування навчальними групами, реєстрацією учасників і зворотним зв'язком після занять. Вважаємо, що спільний пілотний проєкт може бути корисним для Вашого центру, оскільки він допоможе швидше обробляти заявки й отримувати структуровані дані про потреби слухачів. Пропонуємо провести коротку онлайн-зустріч наступного тижня, щоб обговорити формат пілоту, технічне завдання, відповідальних осіб і орієнтовні строки. Будемо вдячні за відповідь до п'ятниці, 17:00. За потреби готові надіслати презентацію рішення й приклади попередніх впроваджень. З повагою, команда проєкту.
    rubric:
      - criteria: "Структура листа"
        description: "Є звертання, контекст, пропозиція, прохання, строк і завершення."
        points: 4
      - criteria: "Діловий тон"
        description: "Текст професійний, але не перевантажений кліше."
        points: 3
      - criteria: "Конкретність"
        description: "Названо формат співпраці й наступний крок."
        points: 3
  - type: critical-analysis
    id: business-tone-analysis
    title: "Аналіз: діловість без бюрократичного шуму"
    instruction: "Проаналізуйте чернетку й запропонуйте точнішу редакцію."
    target_text: "Просимо здійснити проведення додаткового розгляду питання щодо можливої реалізації комунікаційного процесу між нашими структурами з метою майбутньої взаємодії."
    questions:
      - "Які слова створюють канцелярське перевантаження?"
      - "Якої конкретної дії бракує адресатові?"
      - "Як переписати речення професійно й зрозуміло?"
    model_answers:
      - "Здійснити проведення, додаткового розгляду, можливої реалізації, комунікаційного процесу, структурами."
      - "Неясно, чи автор просить зустріч, відповідь, документи або погодження співпраці."
      - "Просимо провести коротку зустріч наступного тижня, щоб обговорити можливий формат співпраці між нашими командами."
    focus_points:
      - "канцеляризм"
      - "потрібна дія"
      - "ясність"
  - type: group-sort
    title: "Діловий документ, лист чи переговори?"
    instruction: "Розсортуйте фрази за типовою функцією."
    groups:
      - name: "Лист"
        items:
          - "У відповідь на Ваш запит"
          - "Проєкт договору додаємо до листа"
          - "Будемо вдячні за відповідь до 17:00"
          - "З повагою"
          - "Просимо розглянути можливість"
      - name: "Протокол або звіт"
        items:
          - "Рішення 1"
          - "Відповідальна особа"
          - "Строк виконання"
          - "Ризик для запуску"
          - "Порядок денний"
      - name: "Переговори або презентація"
        items:
          - "Розумію, що для Вас ключовим є строк"
          - "Пропонуємо два сценарії"
          - "Рекомендуємо другий варіант"
