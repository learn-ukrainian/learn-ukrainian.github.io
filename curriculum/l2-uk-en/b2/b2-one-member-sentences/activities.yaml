workbook:
- type: reading
  id: one-member-reading
  title: 'Текст для читання: вечір у місті'
  instruction: Прочитай уривок і визнач роль односкладних речень.
  text: Вечір. Порожня площа. У вікнах бібліотеки ще світиться. На зупинці чекають на останній автобус. Мені трохи зимно, але йти додому не хочеться. У місті відремонтували старий міст, відкрили нову кав'ярню, оновили афіші біля театру. Сутеніє. Треба повертатися.
  tasks:
  - Знайди два називні речення.
  - Знайди одне безособове речення про стан людини.
  - Поясни, чому речення "На зупинці чекають" неозначено-особове.
- type: match-up
  title: Тип односкладного речення
  instruction: Зістав речення з його типом.
  pairs:
  - left: Пишу звіт до ранку.
    right: означено-особове
  - left: У місті відкрили виставку.
    right: неозначено-особове
  - left: Не перевіриш — помилишся.
    right: узагальнено-особове
  - left: Мені холодно.
    right: безособове
  - left: Тиха вулиця.
    right: називне
  - left: Переходимо до прикладів.
    right: означено-особове
  - left: У редакції змінили заголовок.
    right: неозначено-особове
  - left: Світає.
    right: безособове
  - left: Ранок. Порожня аудиторія.
    right: називне
  - left: Поспішаєш — втрачаєш уважність.
    right: узагальнено-особове
  - left: Звіт підготовлено.
    right: безособове
  - left: Починаємо без запізнення.
    right: означено-особове
- type: fill-in
  title: Доповни головний член
  instruction: Обери форму, яка створює природне односкладне речення.
  items:
  - sentence: Увечері швидко ____.
    answer: стемніло
    options:
    - стемніло
    - темний
    - темрява
    - темні
  - sentence: Мені сьогодні ____ працювати.
    answer: важко
    options:
    - важко
    - важкий
    - важкість
    - важким
  - sentence: У школі ____ новий розклад.
    answer: оголосили
    options:
    - оголосили
    - оголосив
    - оголошення
    - оголошений
  - sentence: ____ список учасників.
    answer: Перевірено
    options:
    - Перевірено
    - Перевірений
    - Перевірилися
    - Перевірка
  - sentence: ____ без запізнення.
    answer: Починаємо
    options:
    - Починаємо
    - Початок
    - Початий
    - Почався
  - sentence: На подвір'ї ____ липою.
    answer: пахне
    options:
    - пахне
    - пахучий
    - запах
    - пахнуть
  - sentence: ____ тихо й уважно.
    answer: Слухайте
    options:
    - Слухайте
    - Слухання
    - Слухач
    - Слухав
  - sentence: До ранку ____ всі листи.
    answer: надіслано
    options:
    - надіслано
    - надісланий
    - надіслалися
    - надсилання
  - sentence: У кімнаті ____.
    answer: затишно
    options:
    - затишно
    - затишний
    - затишок
    - затишком
  - sentence: ____ джерело — перевіриш висновок.
    answer: Перевіриш
    options:
    - Перевіриш
    - Перевірка
    - Перевірений
    - Перевіривши
- type: error-correction
  title: Виправ кальковані або невдалі речення
  instruction: Обери природний український варіант.
  items:
  - sentence: Воно дощить на вулиці.
    options:
    - Дощить.
    - Воно дощить.
    - Дощ робить.
    - Є дощить.
    error: Воно дощить на вулиці.
    correction: Дощить.
    explanation: Виправлення відновлює природну українську односкладну конструкцію.
  - sentence: Я холодний після прогулянки.
    options:
    - Мені холодно після прогулянки.
    - Я холодний після прогулянки.
    - Мене є холодно.
    - Я маю холодно.
    error: Я холодний після прогулянки.
    correction: Мені холодно після прогулянки.
    explanation: Виправлення відновлює природну українську односкладну конструкцію.
  - sentence: Трава скошена в парку.
    options:
    - Траву в парку скошено.
    - Трава скошена в парку.
    - Травою скошено парк.
    - Парк скошений травою.
    error: Трава скошена в парку.
    correction: Траву в парку скошено.
    explanation: Виправлення відновлює природну українську односкладну конструкцію.
  - sentence: Ми нам потрібно зачекати.
    options:
    - Треба зачекати.
    - Ми нам потрібно зачекати.
    - Нам треба ми зачекали.
    - Треба ми.
    error: Ми нам потрібно зачекати.
    correction: Треба зачекати.
    explanation: Виправлення відновлює природну українську односкладну конструкцію.
  - sentence: У місті вони відкрили виставку, але виконавці неважливі.
    options:
    - У місті відкрили виставку.
    - У місті вони відкрили виставку.
    - Місто виставку відкрилося.
    - Виставку місто.
    error: У місті вони відкрили виставку, але виконавці неважливі.
    correction: У місті відкрили виставку.
    explanation: Виправлення відновлює природну українську односкладну конструкцію.
  - sentence: Я пишу я звіт.
    options:
    - Пишу звіт.
    - Я пишу я звіт.
    - Мене пише звіт.
    - Писання звіту я.
    error: Я пишу я звіт.
    correction: Пишу звіт.
    explanation: Виправлення відновлює природну українську односкладну конструкцію.
  - sentence: Після дощу свіже.
    options:
    - Після дощу свіжо.
    - Після дощу свіже.
    - Після дощу свіжий.
    - Після дощу свіжість робить.
    error: Після дощу свіже.
    correction: Після дощу свіжо.
    explanation: Виправлення відновлює природну українську односкладну конструкцію.
  - sentence: Не перевіряєш — помилка.
    options:
    - Не перевіриш — помилишся.
    - Не перевіряєш — помилка.
    - Не перевірка — помиляється.
    - Ти не перевіряєш — помилка.
    error: Не перевіряєш — помилка.
    correction: Не перевіриш — помилишся.
    explanation: Виправлення відновлює природну українську односкладну конструкцію.
- type: select
  title: Визнач тип речення
  instruction: Обери правильну відповідь.
  items:
  - question: Який тип має речення "Переходимо до висновків"?
    options:
    - text: означено-особове
      correct: true
    - text: означено-особове (доречно)
      correct: true
    - text: неозначено-особове
      correct: false
    - text: називне
      correct: false
    - text: безособове
      correct: false
    min_correct: 2
  - question: Який тип має речення "У коридорі тихо"?
    options:
    - text: безособове
      correct: true
    - text: безособове (доречно)
      correct: true
    - text: означено-особове
      correct: false
    - text: називне
      correct: false
    - text: двоскладне
      correct: false
    min_correct: 2
  - question: Який тип має речення "У редакції виправили заголовок"?
    options:
    - text: неозначено-особове
      correct: true
    - text: неозначено-особове (доречно)
      correct: true
    - text: називне
      correct: false
    - text: узагальнено-особове
      correct: false
    - text: безособове
      correct: false
    min_correct: 2
  - question: Який тип має речення "Ранок. Порожня площа"?
    options:
    - text: називне
      correct: true
    - text: називне (доречно)
      correct: true
    - text: означено-особове
      correct: false
    - text: неозначено-особове
      correct: false
    - text: безособове
      correct: false
    min_correct: 2
  - question: Яке речення передає загальне правило?
    options:
    - text: Не поспішаєш — краще бачиш деталі.
      correct: true
    - text: Не поспішаєш — краще бачиш деталі. (доречно)
      correct: true
    - text: У місті змінили розклад.
      correct: false
    - text: На вулиці темно.
      correct: false
    - text: Тиха кімната.
      correct: false
    min_correct: 2
  - question: Яке речення має форму на -но, -то?
    options:
    - text: Листа надіслано.
      correct: true
    - text: Листа надіслано. (доречно)
      correct: true
    - text: Лист надісланий.
      correct: false
    - text: Надіслали листа.
      correct: false
    - text: Надсилання листа.
      correct: false
    min_correct: 2
  - question: Де виконавець зрозумілий із дієслова?
    options:
    - text: Пишемо спільний план.
      correct: true
    - text: Пишемо спільний план. (доречно)
      correct: true
    - text: У місті відкрили міст.
      correct: false
    - text: Смеркає.
      correct: false
    - text: Порожній зал.
      correct: false
    min_correct: 2
  - question: Де виконавця свідомо не названо?
    options:
    - text: На зборах ухвалили рішення.
      correct: true
    - text: На зборах ухвалили рішення. (доречно)
      correct: true
    - text: Ухвалюємо рішення разом.
      correct: false
    - text: Мені легко.
      correct: false
    - text: Рішення ради.
      correct: false
    min_correct: 2
- type: quiz
  title: Перевірка розуміння
  instruction: Обери одну правильну відповідь.
  items:
  - question: Чому "Світає" є повним реченням?
    options:
    - text: Воно передає завершений стан природи.
      correct: true
    - text: У ньому приховано підмет "сонце".
      correct: false
    - text: Це лише частина речення.
      correct: false
    - text: Воно має два головні члени.
      correct: false
  - question: Що показує форма "Працюємо"?
    options:
    - text: першу особу множини
      correct: true
    - text: третю особу множини
      correct: false
    - text: називний відмінок
      correct: false
    - text: форму на -но
      correct: false
  - question: Який приклад найкраще підкреслює результат?
    options:
    - text: Звіт підготовлено.
      correct: true
    - text: Ми готуємо звіт.
      correct: false
    - text: Звіт був довгий.
      correct: false
    - text: Підготовка звіту.
      correct: false
  - question: Який приклад є називним реченням?
    options:
    - text: Тиха аудиторія.
      correct: true
    - text: У аудиторії тихо.
      correct: false
    - text: Працюємо в аудиторії.
      correct: false
    - text: Аудиторію прибрали.
      correct: false
  - question: Чому "Мені холодно" не має підмета?
    options:
    - text: Стан виражено безособово.
      correct: true
    - text: Підметом є "мені".
      correct: false
    - text: Підметом є "холодно".
      correct: false
    - text: Це неповне речення.
      correct: false
  - question: Де є узагальнення?
    options:
    - text: Поспішаєш — помиляєшся.
      correct: true
    - text: Поспішаю на автобус.
      correct: false
    - text: У місті поспішають.
      correct: false
    - text: Швидкий автобус.
      correct: false
  - question: Коли варто назвати виконавця прямо?
    options:
    - text: коли важлива відповідальність
      correct: true
    - text: коли потрібна називна експозиція
      correct: false
    - text: коли описуємо погоду
      correct: false
    - text: коли речення має форму "світає"
      correct: false
  - question: Яка трансформація змінює фокус на результат?
    options:
    - text: Комісія підготувала звіт → Звіт підготовлено.
      correct: true
    - text: Я пишу → Пишу.
      correct: false
    - text: Ніч → Темна ніч.
      correct: false
    - text: Мені сумно → Я сумний.
      correct: false
  - question: Яке речення неозначено-особове?
    options:
    - text: У школі оголосили перерву.
      correct: true
    - text: Оголошуємо перерву.
      correct: false
    - text: Перерву оголошено.
      correct: false
    - text: Перерва.
      correct: false
  - question: Яке питання допомагає розпізнати тип?
    options:
    - text: Чим виражено єдиний головний член?
      correct: true
    - text: Скільки прикметників у реченні?
      correct: false
    - text: Чи є англійський переклад?
      correct: false
    - text: Чи довге речення?
      correct: false
- type: mark-the-words
  title: Познач головний член
  instruction: Познач слово або групу слів, що є головним членом односкладного речення.
  text: Працюємо над новим планом. У місті відкрили нову бібліотеку. Мені сьогодні спокійно. Звіт підготовлено до ранку. Тиха зимова вулиця. Не перевіриш джерело — помилишся.
  answers:
  - Працюємо
  - відкрили
  - спокійно
  - підготовлено
  - вулиця
  - перевіриш
  - помилишся
- type: critical-analysis
  id: one-member-style-analysis
  title: 'Аналіз: хто зник із речення?'
  instruction: Проаналізуй уривок і дай відповіді.
  target_text: На засіданні ухвалили нові правила. Помилки в попередньому документі виправлено. У залі тихо. Кілька людей переглядають нотатки. Пауза. Напружене очікування.
  questions:
  - Де виконавця не названо, хоча він існує?
  - Де результат подано безособовою формою?
  - Яку роль відіграють називні речення наприкінці?
  model_answers:
  - У реченні "На засіданні ухвалили нові правила" виконавця не названо.
  - '"Помилки в попередньому документі виправлено" подає результат через форму на -но.'
  - Називні речення "Пауза. Напружене очікування" створюють атмосферу.
  focus_points:
  - відповідальність і прихований виконавець
  - безособова форма на -но
  - називна експозиція
- type: reading
  id: one-member-mini-reading
  title: 'Мінітекст: тиша перед виступом'
  instruction: Прочитай мінітекст і поясни стилістичний ефект.
  text: Порожня сцена. Світло над мікрофоном. У залі тихо. За кулісами перевіряють звук. Мені тривожно, але починаємо вчасно.
  tasks:
  - Назви два називні речення.
  - Знайди безособове речення про стан людини.
  - Поясни, як короткі речення створюють напруження.
- type: essay-response
  id: one-member-transform-essay
  title: 'Письмо: стилістична трансформація'
  instruction: Напиши зв'язний текст українською.
  prompt: Перетвори короткий двоскладний уривок на текст із різними типами односкладних речень. Поясни, як змінився фокус і тон.
  min_words: 180
  model_answer: 'Команда завершила підготовку. У залі прибрали стільці. Вечір був тихий. Я хвилювався перед виступом. Можна подати це інакше: Підготовку завершено. У залі прибрано стільці. Вечір. Тиша перед виступом. Мені тривожно, але починаємо вчасно. У другому варіанті виконавці відходять на другий план. Форми на -но підкреслюють результат, називні речення створюють атмосферу, а безособове речення передає стан мовця без прямого підмета. Текст стає лаконічнішим і напруженішим.'
  rubric:
  - criteria: Типи односкладних речень
    description: Використано щонайменше три типи односкладних речень.
    points: 4
  - criteria: Пояснення фокусу
    description: Автор пояснює, що змінилося після трансформації.
    points: 4
  - criteria: Природність
    description: Речення звучать українською природно й не калькують англійську модель.
    points: 4
