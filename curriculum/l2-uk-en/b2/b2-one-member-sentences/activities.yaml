version: '1.0'
module: b2-one-member-sentences
level: b2
inline:
  - type: select
    title: "Розпізнай односкладність"
    instruction: "Обери речення, які мають завершений зміст і справді є односкладними."
    items:
      - question: "Де є завершене безособове речення, а не лише обставинний фрагмент?"
        min_correct: 2
        options:
          - text: "Світає."
            correct: true
          - text: "У бібліотеці."
            correct: false
          - text: "Треба перевірити джерело."
            correct: true
          - text: "Після зустрічі з викладачем."
            correct: false
      - question: "Де форма дієслова сама показує виконавця дії?"
        min_correct: 2
        options:
          - text: "Працюємо над планом."
            correct: true
          - text: "План готовий."
            correct: false
          - text: "Перевірте останній абзац."
            correct: true
          - text: "У залі тихо."
            correct: false
      - question: "Де виконавця навмисно не названо?"
        min_correct: 2
        options:
          - text: "У місті відкрили виставку."
            correct: true
          - text: "Куратор відкрив виставку."
            correct: false
          - text: "У документі виправили дату."
            correct: true
          - text: "Дата в документі важлива."
            correct: false
      - question: "Де короткий іменниковий кадр може працювати як називне речення?"
        min_correct: 2
        options:
          - text: "Тиха площа."
            correct: true
          - text: "На тихій площі."
            correct: false
          - text: "Порожня аудиторія."
            correct: true
          - text: "Після порожньої аудиторії."
            correct: false
      - question: "Де стан людини передано безособово й природно?"
        min_correct: 2
        options:
          - text: "Мені холодно після прогулянки."
            correct: true
          - text: "Я холодний після прогулянки."
            correct: false
          - text: "Нам було ніяково після паузи."
            correct: true
          - text: "Ми були ніякові після паузи."
            correct: false
      - question: "Де речення звучить як узагальнена порада?"
        min_correct: 2
        options:
          - text: "Без практики мови не вивчиш."
            correct: true
          - text: "Я вивчив мову за рік."
            correct: false
          - text: "Поспішиш - пропустиш деталі."
            correct: true
          - text: "Він пропустив деталі."
            correct: false
      - question: "Де результат подано відсторонено через форму на -но або -то?"
        min_correct: 2
        options:
          - text: "Заяву розглянуто."
            correct: true
          - text: "Комісія розглянула заяву."
            correct: false
          - text: "Рішення ухвалено вчора."
            correct: true
          - text: "Ухвалене рішення лежало на столі."
            correct: false
      - question: "Де це двоскладна конструкція, а не односкладне речення?"
        min_correct: 2
        options:
          - text: "Звіт підготовлено."
            correct: false
          - text: "Команда підготувала звіт."
            correct: true
          - text: "На вулиці темно."
            correct: false
          - text: "Вулиця темна."
            correct: true
  - type: match-up
    title: "Особові типи"
    instruction: "Зістав речення з типом односкладної конструкції."
    pairs:
      - left: "Пишу коментар до ранку."
        right: "означено-особове"
      - left: "Повертаємося до питання джерел."
        right: "означено-особове"
      - left: "Не поспішай із висновком."
        right: "означено-особове"
      - left: "У музеї проводять екскурсії."
        right: "неозначено-особове"
      - left: "У документі виправили дату."
        right: "неозначено-особове"
      - left: "Нам пояснили нові правила."
        right: "неозначено-особове"
      - left: "Без практики мови не вивчиш."
        right: "узагальнено-особове"
      - left: "Що посієш, те й пожнеш."
        right: "узагальнено-особове"
      - left: "Поспішиш - пропустиш деталі."
        right: "узагальнено-особове"
      - left: "З добрим словом легше домовишся."
        right: "узагальнено-особове"
  - type: error-correction
    title: "Безособовий ремонт"
    instruction: "Виправ кальку або двоскладну модель там, де природніша односкладна конструкція."
    items:
      - sentence: "Я холодний після прогулянки."
        error: "Я холодний"
        correction: "Мені холодно"
        error_type: "construction"
        options: ["Мені холодно", "Я є холодний", "Мене холодить прогулянка", "Я маю холод"]
        explanation: "Стан людини передаємо безособовою моделлю з давальним."
      - sentence: "Є темно в коридорі."
        error: "Є темно"
        correction: "У коридорі темно."
        error_type: "construction"
        options: ["У коридорі темно.", "Коридор є темно.", "Темний є коридор.", "Є коридорно темно."]
        explanation: "Стан простору не потребує службового є."
      - sentence: "Ми зробили рішення вчора, але не хочемо називати комісію."
        error: "Ми зробили рішення"
        correction: "Рішення ухвалено"
        error_type: "construction"
        options: ["Рішення ухвалено", "Рішення зроблено нами", "Ми є ухвалені", "Рішення зробилося"]
        explanation: "Форма на -но фокусує результат, а не виконавця."
      - sentence: "Воно смеркає над містом."
        error: "Воно смеркає"
        correction: "Над містом смеркає."
        error_type: "construction"
        options: ["Над містом смеркає.", "Воно є смеркає.", "Місто смеркає себе.", "Смеркання робить місто."]
        explanation: "Українське безособове речення не потребує формального підмета."
      - sentence: "У статті помилки були зроблені."
        error: "помилки були зроблені"
        correction: "У статті зробили помилки."
        error_type: "construction"
        options: ["У статті зробили помилки.", "У статті помилки були зроблені кимсь.", "Помилки зробилися в статті.", "Стаття була помилками."]
        explanation: "Неозначено-особова модель природніша для факту без названого автора."
      - sentence: "Мені є сумно через новину."
        error: "є сумно"
        correction: "Мені сумно через новину."
        error_type: "construction"
        options: ["Мені сумно через новину.", "Мене є сумно через новину.", "Я сумний новиною є.", "Сумно має мене через новину."]
        explanation: "Категорія стану поєднується з давальним без є."
      - sentence: "Після бурі дорога була заметена снігом."
        error: "дорога була заметена снігом"
        correction: "Дорогу замело."
        error_type: "construction"
        options: ["Дорогу замело.", "Дорога замела себе.", "Сніг був дорогою.", "Заметено сніг дорогу."]
        explanation: "Стихійну дію часто передає безособова конструкція."
      - sentence: "Ти якщо читаєш уважно, бачиш різницю."
        error: "Ти якщо читаєш"
        correction: "Читаєш уважно - бачиш різницю."
        error_type: "construction"
        options: ["Читаєш уважно - бачиш різницю.", "Ти якщо є уважно читаєш.", "Уважне читання ти бачиш.", "Бачиш різницю читач."]
        explanation: "Узагальнено-особова форма стискає пораду або правило."
  - type: fill-in
    title: "Називний кадр"
    instruction: "Доповни короткі сцени називними реченнями або безособовою формою, якщо йдеться про стан."
    items:
      - sentence: "____. Порожня аудиторія. На дошці дата."
        answer: "Ранок"
        options: ["Ранок", "Ранком", "Ранкує", "Ранковий є"]
      - sentence: "Вечір. ____. Далекий шум трамвая."
        answer: "Мокра вулиця"
        options: ["Мокра вулиця", "Вулицю намочило", "На вулиці мокро є", "Вулиця мокріє швидко"]
      - sentence: "У коридорі ____. Треба говорити тихіше."
        answer: "лунко"
        options: ["лунко", "лункий", "луна", "лункість"]
      - sentence: "____. Закриті двері. Світло під порогом."
        answer: "Ніч"
        options: ["Ніч", "Вночі", "Нічна", "Ночує"]
      - sentence: "Перед виступом. Тиша. ____."
        answer: "Погляди на сцену"
        options: ["Погляди на сцену", "Дивляться на сцену вони", "Сцена дивиться", "На сцені дивитися"]
      - sentence: "Після зливи ____. Машини їдуть повільно."
        answer: "слизько"
        options: ["слизько", "слизький", "слизькість", "слизько є"]
      - sentence: "____. Черга біля входу. Квитки в руках."
        answer: "Прем'єра"
        options: ["Прем'єра", "Прем'єрою", "Прем'єрити", "Прем'єрна є"]
      - sentence: "У кімнаті ____, тому вмикаємо лампу."
        answer: "темно"
        options: ["темно", "темний", "темрява є", "темніє кімната"]
      - sentence: "____. На столі рукопис і чашка кави."
        answer: "Пізній вечір"
        options: ["Пізній вечір", "Пізнього вечора", "Пізно вечірній", "Вечоріє пізній"]
      - sentence: "Після новини всім ____, але треба працювати."
        answer: "тривожно"
        options: ["тривожно", "тривожні", "тривога вони", "є тривожно всім"]
  - type: select
    title: "Трансформація і фокус"
    instruction: "Обери варіант, який відповідає заданому комунікативному фокусу."
    items:
      - question: "Треба підкреслити результат, а не команду."
        options:
          - text: "Команда підготувала зал."
            correct: false
          - text: "Зал підготовлено."
            correct: true
          - text: "Команда була залі."
            correct: false
          - text: "Підготуймо зал."
            correct: false
      - question: "Треба дати пораду як загальне правило."
        options:
          - text: "Ти перевірив джерело."
            correct: false
          - text: "Не перевіриш джерело - втратиш довіру."
            correct: true
          - text: "Джерело перевірене."
            correct: false
          - text: "Вони перевірили джерело."
            correct: false
      - question: "Треба не називати виконавця оновлення."
        options:
          - text: "Редактор оновив розклад."
            correct: false
          - text: "Розклад оновили."
            correct: true
          - text: "Розклад оновлений редактором."
            correct: false
          - text: "Я оновив розклад."
            correct: false
      - question: "Треба створити короткий кадр для репортажу."
        options:
          - text: "Темний вокзал. Порожня каса. Годинник над входом."
            correct: true
          - text: "На вокзалі працюють касири."
            correct: false
          - text: "Треба вийти на вокзалі."
            correct: false
          - text: "Касир відкрив вікно."
            correct: false
      - question: "Треба прямо взяти відповідальність на себе."
        options:
          - text: "Помилку допущено."
            correct: false
          - text: "У тексті допустили помилку."
            correct: false
          - text: "Я допустив помилку."
            correct: true
          - text: "Помилка в тексті."
            correct: false
      - question: "Треба офіційно повідомити про готовність документа."
        options:
          - text: "Документ підготовлено до подання."
            correct: true
          - text: "Ми зробили документ."
            correct: false
          - text: "Документ сам готовий зробився."
            correct: false
          - text: "Є документ підготовлений нами."
            correct: false
      - question: "Треба передати фізичний стан після дороги."
        options:
          - text: "Ми втомлені після дороги."
            correct: false
          - text: "Нам втомлено після дороги."
            correct: false
          - text: "Нам важко після дороги."
            correct: true
          - text: "Дорога є втома."
            correct: false
      - question: "Треба показати досвід як правило для багатьох людей."
        options:
          - text: "Коли читаєш поспіхом, пропускаєш головне."
            correct: true
          - text: "Я читав поспіхом."
            correct: false
          - text: "Автор прочитав поспіхом."
            correct: false
          - text: "Текст був прочитаний поспіхом автором."
            correct: false
workbook:
  - type: group-sort
    title: "Розподіл за типами"
    instruction: "Розподіли речення за п'ятьма типами односкладних речень."
    groups:
      - name: "означено-особове"
        items: ["Надішлю відповідь після обіду.", "Починаємо з короткого огляду.", "Перевірте останній абзац.", "Не поспішай із висновком.", "Повертаємося до питання джерел."]
      - name: "неозначено-особове"
        items: ["На сайті оновили розклад.", "У дворі ремонтують лавки.", "Нам пояснили нові правила.", "У музеї проводять екскурсії.", "У документі виправили дату."]
      - name: "узагальнено-особове"
        items: ["Не перевіриш факти - втратиш довіру.", "Без практики мови не вивчиш.", "Поспішиш - пропустиш деталі.", "Що посієш, те й пожнеш.", "З добрим словом легше домовишся."]
      - name: "безособове"
        items: ["Сутеніє.", "Мені спокійно.", "Треба зачекати.", "Дорогу замело.", "Заяву розглянуто."]
      - name: "називне"
        items: ["Пізній вечір.", "Порожня станція.", "Старий сад.", "Тиша перед виступом.", "Довгий коридор."]
  - type: match-up
    title: "Зміна фокусу"
    instruction: "Зістав трансформацію з її стилістичним ефектом."
    pairs:
      - left: "Ми підготували звіт. -> Звіт підготовлено."
        right: "результат важливіший за виконавця"
      - left: "Автори не вказали джерела. -> У тексті не вказали джерел."
        right: "відповідальність відсунено"
      - left: "Людина без досвіду губиться. -> Без досвіду губишся."
        right: "теза стала правилом"
      - left: "На площі була тиша. -> Площа. Тиша."
        right: "пояснення стало кадром"
      - left: "Я надішлю файл. -> Надішлю файл."
        right: "займенник знято, дія лишилася"
      - left: "Комісія ухвалила рішення. -> Рішення ухвалено."
        right: "офіційний результат без діяча"
      - left: "Сніг замів дорогу. -> Дорогу замело."
        right: "стихійна дія без підмета"
      - left: "Я почуваюся незручно. -> Мені ніяково."
        right: "стан людини передано безособово"
      - left: "Глядачі сиділи мовчки. -> Мовчання. Напружені обличчя."
        right: "репортажний монтаж"
      - left: "Ти маєш читати уважно. -> Читай уважно."
        right: "пряме звернення без підмета"
  - type: error-correction
    title: "Редагування односкладних речень"
    instruction: "Виправ речення й назви тип виправленої конструкції."
    items:
      - sentence: "Воно смеркає над містом."
        error: "Воно смеркає"
        correction: "Над містом смеркає."
        error_type: "construction"
        options: ["Над містом смеркає.", "Воно є смеркає.", "Місто робить смерки.", "Над містом є смеркає."]
      - sentence: "Я сумний у цій кімнаті, бо холод."
        error: "Я сумний"
        correction: "Мені сумно й холодно в цій кімнаті."
        error_type: "construction"
        options: ["Мені сумно й холодно в цій кімнаті.", "Я є сумний і холод.", "Кімната сумна мною.", "Мене сумний холод."]
      - sentence: "У статті помилки були зроблені."
        error: "помилки були зроблені"
        correction: "У статті зробили помилки."
        error_type: "construction"
        options: ["У статті зробили помилки.", "Помилки були зроблені у статті.", "Стаття зробила помилки.", "Помилки робилися статтею."]
      - sentence: "Ти якщо читаєш уважно, розумієш підтекст."
        error: "Ти якщо читаєш"
        correction: "Читаєш уважно - розумієш підтекст."
        error_type: "construction"
        options: ["Читаєш уважно - розумієш підтекст.", "Ти є якщо читаєш уважно.", "Уважне читання ти розуміє.", "Підтекст читає уважно."]
      - sentence: "У залі є тихо перед початком."
        error: "є тихо"
        correction: "У залі тихо перед початком."
        error_type: "construction"
        options: ["У залі тихо перед початком.", "Зал є тихо перед початком.", "Тихий є зал перед початком.", "У залі має тихо."]
      - sentence: "Рішення зроблено комісією, але текст має бути нейтральним."
        error: "зроблено комісією"
        correction: "Рішення ухвалено."
        error_type: "construction"
        options: ["Рішення ухвалено.", "Рішення зроблено комісією.", "Комісією є зроблене рішення.", "Рішення зробило комісію."]
      - sentence: "На площі була порожнеча, темрява і вітер."
        error: "На площі була"
        correction: "Порожня площа. Темрява. Вітер."
        error_type: "construction"
        options: ["Порожня площа. Темрява. Вітер.", "Площа була порожньо.", "Темрява була вітром.", "Є порожня площа темрява."]
      - sentence: "Ми можемо починати, але стиль має звучати як безособова потреба."
        error: "Ми можемо починати"
        correction: "Можна починати."
        error_type: "construction"
        options: ["Можна починати.", "Ми є можна починати.", "Починання має нас.", "Починати ми можна."]
  - id: "wb-reading-one-member-report"
    type: reading
    title: "Короткий репортаж"
    instruction: "Прочитайте текст і визначте, як односкладні речення керують фокусом."
