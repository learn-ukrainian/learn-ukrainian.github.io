- id: workbook-essay
  type: essay-response
  title: Мініесе з керуванням позицією
  instruction: Напишіть 180-220 слів про зміну розкладу, громадську консультацію або навчальний формат.
  prompt: 'Використайте щонайменше п''ять вставних одиниць: одну для джерела, дві для послідовності, одну
    для ступеня упевненості й одну для обережної емоційної оцінки. Після тексту випишіть ці вставки й
    поясніть їхню функцію.'
  min_words: 180
  model_answer: У сильній відповіді джерело не змішується з авторською позицією, вставки послідовності
    мають реальні аргументи після себе, а слова впевненості відповідають доказам.
  peer_review_guidelines: Перевірте, чи кожна вставка має функцію; позначте одну вставку, яку можна прибрати
    без втрати змісту; знайдіть омонімічну форму, якщо вона є, і поясніть пунктуацію.
