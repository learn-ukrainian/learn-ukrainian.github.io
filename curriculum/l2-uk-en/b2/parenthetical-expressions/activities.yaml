version: '1.0'
module: parenthetical-expressions
level: b2
inline:
- type: select
  title: Вставка чи член речення?
  instruction: Виберіть речення, де виділена одиниця справді коментує все повідомлення.
  items:
  - question: Де слово «може» є вставним?
    min_correct: 2
    options:
    - text: Він, може, приєднається пізніше.
      correct: true
    - text: Він може приєднатися пізніше.
      correct: false
    - text: Ця команда може завершити роботу.
      correct: false
    - text: Вона, може, прийде завтра.
      correct: true
    explanation: У першому реченні «може» означає припущення мовця, а не можливість дії.
  - question: Де конструкція називає джерело інформації?
    min_correct: 2
    options:
    - text: За словами координаторки, зустріч перенесли.
      correct: true
    - text: На думку комісії, процедуру треба уточнити.
      correct: true
    - text: Комісія уточнила процедуру.
      correct: false
    - text: Уточнена процедура вже на сайті.
      correct: false
    explanation: Джерельна вставка відділяє голос автора від позиції іншої особи або групи.
  - question: Де слово не треба автоматично виділяти комами?
    min_correct: 3
    options:
    - text: Навіть досвідчені редактори помиляються.
      correct: true
    - text: Він майже завершив переклад.
      correct: true
    - text: Вона нібито погодилася.
      correct: true
    - text: Мабуть зустріч перенесуть.
      correct: false
    explanation: «Навіть», «майже», «нібито» не є вставними словами в цих реченнях.
  - question: Де тест вилучення підтримує вставне тлумачення?
    min_correct: 2
    options:
    - text: Рішення, очевидно, треба пояснити.
      correct: true
    - text: Рішення було очевидно помилковим.
      correct: false
    - text: Очевидно помилкове рішення треба скасувати.
      correct: false
    - text: Очевидно, це стало проблемою після голосування.
      correct: true
    explanation: У першому реченні «очевидно» можна вилучити без руйнування граматичної основи.
  - question: Де вставлене речення має власну граматичну основу?
    min_correct: 2
    options:
    - text: Проєкт - це визнають навіть критики - змінив правила участі.
      correct: true
    - text: Проєкт, безперечно, змінив правила участі.
      correct: false
    - text: Безперечно, проєкт змінив правила участі.
      correct: false
    - text: Проєкт (це визнають навіть критики) змінив правила участі.
      correct: true
    explanation: «Це визнають навіть критики» має підмет і присудок, тому це вставлене речення.
  - question: Де слово «правда» є вставним застереженням?
    min_correct: 2
    options:
    - text: Правда, цей варіант дорожчий.
      correct: true
    - text: Правда перемогла не одразу.
      correct: false
    - text: Ми шукаємо правду в документах.
      correct: false
    - text: Цей варіант, правда, дорожчий.
      correct: true
    explanation: У першому реченні «правда» не є членом речення, а вводить застереження.
  - question: Де вставка доречно називає позицію іншої групи?
    min_correct: 2
    options:
    - text: На думку частини мешканців, маршрут треба змінити.
      correct: true
    - text: За словами волонтерів, зустріч почалася вчасно.
      correct: true
    - text: Усі знають, що маршрут треба змінити.
      correct: false
    - text: Маршрут, навіть, треба змінити.
      correct: false
    explanation: Джерельна вставка називає, кому належить повідомлення або оцінка.
  - question: Де вставка перевантажує речення суперечливими сигналами?
    min_correct: 2
    options:
    - text: На нашу думку, безперечно, це, можливо, найкраще рішення.
      correct: true
    - text: За даними звіту, рішення підтримали 62 відсотки учасників.
      correct: false
    - text: Безперечно, можливо, це рішення остаточне.
      correct: true
    - text: По-перше, треба перевірити джерело; по-друге, уточнити дату.
      correct: false
    explanation: В одному реченні змішано власну думку, категоричність і припущення.
- type: group-sort
  title: Функція вставної одиниці
  instruction: Розподіліть вставні одиниці за тим, яку роботу вони виконують у тексті.
  groups:
  - name: Упевненість / припущення
    items:
    - безперечно
    - імовірно
    - мабуть
    - можна припустити
  - name: Джерело інформації
    items:
    - за словами дослідниці
    - на думку комісії
    - як повідомляє пресслужба
    - за даними звіту
  - name: Послідовність і логіка
    items:
    - по-перше
    - по-друге
    - отже
    - зрештою
  - name: Емоційна оцінка
    items:
    - на жаль
    - на щастя
    - на диво
    - дивна річ
  - name: Контакт з адресатом
    items:
    - бачите
    - уявіть собі
    - погодьтеся
    - зверніть увагу
- type: error-correction
  title: Коми навколо вставок
  instruction: Виправте пунктуацію так, щоб вставні одиниці були відокремлені, а слова-пастки не отримали
    зайвих ком.
  items:
  - sentence: Мабуть зустріч перенесуть на п'ятницю.
    error: Мабуть зустріч
    correction: Мабуть, зустріч перенесуть на п'ятницю.
    error_type: construction
    options:
    - Мабуть, зустріч перенесуть на п'ятницю.
    - Мабуть зустріч, перенесуть на п'ятницю.
    - Мабуть зустріч перенесуть, на п'ятницю.
    - Мабуть, зустріч, перенесуть на п'ятницю.
    explanation: Вставне слово на початку речення відокремлюємо комою.
  - sentence: Команда завершила звіт і безперечно подасть його завтра.
    error: і безперечно подасть
    correction: Команда завершила звіт і, безперечно, подасть його завтра.
    error_type: construction
    options:
    - Команда завершила звіт і, безперечно, подасть його завтра.
    - Команда завершила звіт, і безперечно подасть його завтра.
    - Команда завершила, звіт і безперечно, подасть його завтра.
    - Команда завершила звіт і безперечно, подасть його завтра.
    explanation: Вставка коментує другу дію після сполучника «і».
  - sentence: Навіть, досвідчені редактори, іноді помиляються.
    error: Навіть, досвідчені редактори,
    correction: Навіть досвідчені редактори іноді помиляються.
    error_type: construction
    options:
    - Навіть досвідчені редактори іноді помиляються.
    - Навіть, досвідчені редактори іноді помиляються.
    - Навіть досвідчені редактори, іноді помиляються.
    - Навіть, досвідчені редактори, іноді помиляються.
    explanation: «Навіть» підсилює групу підмета й не є вставним словом.
  - sentence: Проєкт це визнають навіть критики змінив правила участі.
    error: це визнають навіть критики
    correction: Проєкт - це визнають навіть критики - змінив правила участі.
    error_type: construction
    options:
    - Проєкт - це визнають навіть критики - змінив правила участі.
    - Проєкт, це визнають навіть критики змінив правила участі.
    - Проєкт це визнають, навіть критики, змінив правила участі.
    - Проєкт це визнають навіть критики, змінив правила участі.
    explanation: Вставлене речення можна виділити тире, щоб показати сильніше втручання.
  - sentence: Рішення було, очевидно, помилковим.
    error: було, очевидно, помилковим
    correction: Рішення було очевидно помилковим.
    error_type: construction
    options:
    - Рішення було очевидно помилковим.
    - Рішення, було очевидно, помилковим.
    - Рішення було, очевидно, помилковим.
    - Рішення, було, очевидно помилковим.
    explanation: Тут «очевидно» посилює ознаку «помилковим», тому коми не потрібні.
  - sentence: Правда цей пункт потребує доказів.
    error: Правда цей
    correction: Правда, цей пункт потребує доказів.
    error_type: construction
    options:
    - Правда, цей пункт потребує доказів.
    - Правда цей, пункт потребує доказів.
    - Правда цей пункт, потребує доказів.
    - Правда, цей, пункт потребує доказів.
    explanation: Вставне «правда» вводить застереження й відокремлюється комою.
  - sentence: Ми навіть, не встигли обговорити бюджет.
    error: навіть,
    correction: Ми навіть не встигли обговорити бюджет.
    error_type: construction
    options:
    - Ми навіть не встигли обговорити бюджет.
    - Ми, навіть, не встигли обговорити бюджет.
    - Ми навіть, не встигли обговорити бюджет.
    - Ми навіть не встигли, обговорити бюджет.
    explanation: «Навіть» підсилює заперечення й не є вставкою.
  - sentence: За словами організаторів зустріч почнеться о десятій.
    error: За словами організаторів зустріч
    correction: За словами організаторів, зустріч почнеться о десятій.
    error_type: construction
    options:
    - За словами організаторів, зустріч почнеться о десятій.
    - За словами, організаторів зустріч почнеться о десятій.
    - За словами організаторів зустріч, почнеться о десятій.
    - За словами організаторів, зустріч, почнеться о десятій.
    explanation: Джерельна вставка на початку речення відокремлюється комою.
- type: fill-in
  title: Омонімічні форми
  instruction: Доберіть форму або функцію, яка пояснює пунктуацію.
  items:
  - sentence: У реченні «Він, може, приєднається пізніше» слово «може» означає ____.
    answer: припущення
    options:
    - припущення
    - можливість
    - наказ
    - джерело
    explanation: Вставне «може» дорівнює «можливо».
  - sentence: У реченні «Він може приєднатися пізніше» слово «може» є частиною ____.
    answer: присудка
    options:
    - присудка
    - звертання
    - вставленого речення
    - переліку
    explanation: Тут «може приєднатися» називає можливість виконати дію.
  - sentence: У реченні «З вікна видно парк» слово «видно» не є вставним, бо воно є ____.
    answer: присудком
    options:
    - присудком
    - джерелом
    - емоційною оцінкою
    - порядком викладу
    explanation: Без слова «видно» граматична основа руйнується.
  - sentence: У реченні «Правда, цей варіант дорожчий» слово «правда» вводить ____.
    answer: застереження
    options:
    - застереження
    - підмет
    - додаток
    - означення
    explanation: Вставне «правда» часто додає поступку або застереження.
  - sentence: Слова «навіть», «майже», «нібито» не треба автоматично виділяти комами, бо вони не коментують
      ____.
    answer: все повідомлення
    options:
    - все повідомлення
    - один звук
    - рід іменника
    - відмінок прикметника
    explanation: Вони пов'язані зі словом або групою слів поруч.
  - sentence: Вставка «за словами координаторки» називає ____ інформації.
    answer: джерело
    options:
    - джерело
    - підмет
    - наказ
    - ознаку
    explanation: Джерельна вставка показує, звідки походить повідомлення.
  - sentence: Слова «по-перше» й «по-друге» позначають ____ аргументів.
    answer: послідовність
    options:
    - послідовність
    - емоцію
    - час дії
    - рід іменника
    explanation: Такі вставки організовують виклад.
  - sentence: У службовому тексті емоційну вставку часто краще замінити на ____ формулювання.
    answer: нейтральне
    options:
    - нейтральне
    - розмовне
    - жартівливе
    - риторичне
    explanation: Жанр визначає доречність емоційної оцінки.
  - sentence: Якщо вставка стала надто довгою, її можна винести в ____ речення.
    answer: окреме
    options:
    - окреме
    - підметове
    - беззмістовне
    - кличне
    explanation: Окреме речення часто полегшує читання.
  - sentence: У реченні «Сусіди кажуть, що завтра буде дощ» слово «кажуть» є ____.
    answer: присудком
    options:
    - присудком
    - вставкою
    - означенням
    - дужками
    explanation: Названий мовець робить «кажуть» звичайним присудком.
- type: select
  title: Редакторська функція вставки
  instruction: Виберіть найкращу редакторську дію для кожної проблеми.
  items:
  - question: Автор пише «безперечно», але доказів немає. Що краще зробити?
    min_correct: 2
    options:
    - text: Послабити до «імовірно» або назвати джерело.
      correct: true
    - text: Додати доказ перед категоричною вставкою.
      correct: true
    - text: Прибрати всі коми в реченні.
      correct: false
    - text: Замінити твердження на емоційний вигук.
      correct: false
    explanation: Сила вставки має відповідати доказам або названому джерелу.
  - question: У реченні разом стоять «на нашу думку», «безперечно» і «можливо». Яка правка найкраща?
    min_correct: 2
    options:
    - text: Розвести позицію, доказ і припущення в окремі речення.
      correct: true
    - text: Залишити одну функцію, яка справді потрібна абзацу.
      correct: true
    - text: Замінити всі вставки одним «звичайно».
      correct: false
    - text: Поставити тире замість усіх ком.
      correct: false
    explanation: Кілька різних сигналів в одному реченні заважають зрозуміти позицію автора.
  - question: У службовому листі стоїть контактна вставка «бачите». Що доречно?
    min_correct: 2
    options:
    - text: Замінити її на нейтральну інструкцію або факт.
      correct: true
    - text: Переписати речення без розмовного контакту з адресатом.
      correct: true
    - text: Виділити слово дужками й лишити стиль без змін.
      correct: false
    - text: Зробити речення ще розмовнішим.
      correct: false
    explanation: Офіційний регістр потребує нейтрального контакту з адресатом.
  - question: Після «по-перше» немає другого аргументу. Яка дія правильна?
    min_correct: 2
    options:
    - text: Додати логічне продовження або прибрати маркер послідовності.
      correct: true
    - text: Замінити нумерацію на нейтральний перехід, якщо другого пункту немає.
      correct: true
    - text: Замінити «по-перше» на «на жаль».
      correct: false
    - text: Додати кому перед кожним словом.
      correct: false
    explanation: Маркер послідовності має відповідати реальній структурі аргументу.
  - question: Слово «майже» помилково виділено комами. Чому їх треба прибрати?
    min_correct: 2
    options:
    - text: Бо воно підсилює слово поруч, а не коментує все речення.
      correct: true
    - text: Бо це не окремий авторський коментар до всього повідомлення.
      correct: true
    - text: Бо вставні слова ніколи не стоять усередині речення.
      correct: false
    - text: Бо коми потрібні тільки після джерела інформації.
      correct: false
    explanation: Не кожне слово з паузою є вставкою; треба перевіряти синтаксичну роль.
  - question: Вставка ховає чужу позицію без джерела. Які правки доречні?
    min_correct: 2
    options:
    - text: Написати «за словами...», «на думку...», «за даними...».
      correct: true
    - text: Назвати групу або документ, на який спирається автор.
      correct: true
    - text: Замінити джерело словом «кажуть» у формальному тексті.
      correct: false
    - text: Зробити твердження категоричним без посилання.
      correct: false
    explanation: Джерельна вставка має відділяти голос автора від чужої позиції.
  - question: Речення перевантажене чотирма вставками. Що допоможе?
    min_correct: 2
    options:
    - text: Розділити речення й лишити тільки функціональні вставки.
      correct: true
    - text: 'Визначити, яка вставка потрібна: джерело, послідовність чи оцінка.'
      correct: true
    - text: Додати ще одну вставку на початку.
      correct: false
    - text: Замінити всі вставки однаковим словом.
      correct: false
    explanation: Вставки мають керувати читанням, а не конкурувати між собою.
  - question: Вставлене речення має власну граматичну основу. Як його оформити?
    min_correct: 2
    options:
    - text: Виділити тире, якщо коментар помітний і публіцистичний.
      correct: true
    - text: Використати дужки, якщо інформація додаткова й тиха.
      correct: true
    - text: Не відокремлювати його, бо це не одне слово.
      correct: false
    - text: Автоматично замінити всі тире комами.
      correct: false
    explanation: Вставлені речення теж ізолюються, але знак залежить від тону.
workbook:
- id: workbook-reading
  type: reading
  title: 'Читання: позиція автора в редакційному коментарі'
  instruction: Прочитайте уривок і визначте, яку функцію виконують вставні конструкції.
  source: Навчальний текст для модуля B2.
  text: 'За словами організаторів, громадські консультації цього року відбулися в змішаному форматі. По-перше,
    частина учасників прийшла до зали, а по-друге, частина долучилася онлайн. Такий формат, очевидно,
    допоміг залучити більше людей, але, на жаль, не всі мали стабільний доступ до зв''язку. Отже, перед
    наступною зустріччю треба не лише оприлюднити порядок денний, а й перевірити технічні умови участі.
    Можливо, окрему сесію варто присвятити саме питанням доступності, бо без цього обговорення, як показує
    досвід попередніх років, не буде рівним.

    '
  tasks:
  - Випишіть конструкцію, яка називає джерело інформації.
  - Знайдіть дві вставки, що організовують послідовність і висновок.
  - Поясніть, чому «очевидно» не дорівнює перевіреному факту.
  - Знайдіть емоційну оцінку й запропонуйте нейтральну службову версію.
  - Перепишіть останнє речення так, щоб воно звучало формальніше.
