  - type: true-false
    title: Правда чи хиба
    instruction: Визнач, чи правильне твердження.
    items:
      - statement: "Вставне слово не є членом речення."
        correct: true
        explanation: Воно синтаксично ізольоване й коментує все висловлення.
      - statement: "Слово навіть завжди виділяється комами."
        correct: false
        explanation: Навіть не є вставним словом.
      - statement: "Конструкція за даними звіту може називати джерело інформації."
        correct: true
        explanation: Вона показує, на який документ спирається автор.
      - statement: "Слово здається завжди вставне."
        correct: false
        explanation: У реченні мені здається воно є присудком.
      - statement: "Дужки можуть виділяти вставлене речення."
        correct: true
        explanation: Дужки подають вставку як додаткову інформацію.
      - statement: "Надмір вставних слів робить аргументацію сильнішою."
        correct: false
        explanation: Надмір створює перевантаження й послаблює ясність.
      - statement: "Слова по-перше і по-друге допомагають показати порядок аргументів."
        correct: true
        explanation: Вони організовують виклад і ведуть читача за логікою автора.
      - statement: "У реченні «Він може пояснити правило» слово може треба виділити комами."
        correct: false
        explanation: Тут може є частиною присудка, а не вставним словом.
      - statement: "Конструкція «за словами координаторки» може відділяти чужу позицію від авторської."
        correct: true
        explanation: Вона називає джерело й показує, кому належить повідомлення.
      - statement: "Якщо вставку можна вилучити, пунктуацію й регістр уже не треба перевіряти."
        correct: false
        explanation: Тест вилучення допомагає, але потрібно ще перевірити функцію, пунктуацію і доречність.

  - type: match-up
    title: Одна форма - різна роль
    instruction: Зістав речення з роллю виділеного слова.
    pairs:
      - left: "Він, може, приєднається пізніше."
        right: "вставне слово"
      - left: "Він може приєднатися пізніше."
        right: "частина присудка"
      - left: "Правда, аргумент слабкий."
