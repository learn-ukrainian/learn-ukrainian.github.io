  - type: essay-response
    id: parenthetical-argument-essay
    title: Аналітичний абзац із вставними конструкціями
    instruction: Напиши зв'язний абзац українською.
    prompt: "Напиши 170-220 слів про те, чи варто університетам дозволяти студентам обирати формат підсумкового проєкту. Використай щонайменше п'ять вставних конструкцій: одну для джерела позиції, дві для послідовності аргументів, одну для припущення або обережного висновку, одну для підсумку. Не перевантажуй одне речення кількома вставками."
    min_words: 170
    model_answer: "На думку частини викладачів, вибір формату підсумкового проєкту підвищує відповідальність студентів за результат і робить навчання ближчим до реальної професійної комунікації. По-перше, студент може обрати той жанр, у якому найкраще покаже дослідницьку роботу: статтю, презентацію, подкаст або візуальне портфоліо. По-друге, різні формати навчають по-різному структурувати матеріал і думати про аудиторію, а це, безперечно, важливо для B2-рівня. Водночас, можливо, повна свобода без чітких критеріїв створить нерівні умови оцінювання: відео може справити сильніше враження, ніж добре написаний, але спокійний текст. Тому викладач має визначити спільні вимоги: джерела, аргументацію, обсяг, дедлайн, спосіб захисту й прозору рубрику. Крім того, студент повинен коротко пояснити, чому саме цей формат відповідає темі. Такий коментар, на мою думку, змушує автора усвідомити власний вибір і допомагає викладачеві оцінювати не технічну ефектність, а якість мислення. Зрештою, гнучкість формату може підтримати студентів із різними сильними сторонами, однак вона не повинна перетворювати підсумкову роботу на конкурс дизайну. Саме тому критерії потрібно оголосити заздалегідь і застосовувати однаково. Отже, університетам варто дозволяти вибір формату, але не скасовувати академічні стандарти, бо свобода працює лише тоді, коли вона поєднана з відповідальністю."
