version: '1.0'
module: parenthetical-expressions
level: b2
inline: []
workbook:
  - type: reading
    id: parenthetical-reading-brief
    title: 'Текст для читання: редакційний коментар'
    instruction: Прочитай текст і виконай завдання до вставних конструкцій.
    text: 'На думку редакційної групи, оновлений формат громадських консультацій зробив обговорення прозорішим. По-перше, учасники отримали матеріали заздалегідь; по-друге, модератори фіксували всі пропозиції в спільному документі. Водночас, очевидно, не всі групи мали однаковий доступ до технічної підтримки. Частину питань, на жаль, довелося перенести на наступну зустріч. Отже, перед другим етапом треба перевірити умови участі й чітко назвати джерела кожного висновку.'
    tasks:
      - Випиши конструкцію, яка називає джерело оцінки.
      - Знайди дві конструкції, що організовують послідовність аргументів.
      - Випиши вставне слово, яке передає висновок мовця.
      - Знайди емоційну вставку.
      - Поясни, чому слово отже допомагає аргументації.

  - type: mark-the-words
    title: Познач вставні конструкції
    instruction: Познач лише ті слова й словосполучення, які є вставними.
    text: "На думку експертів, новий графік, можливо, полегшить участь громад. Навіть коротке пояснення потребує джерела. По-перше, учасники мають отримати матеріали заздалегідь. Це рішення, правда, потребує додаткового фінансування. Майже всі заявки перевірили до вечора. На жаль, частину даних повернули на уточнення. Отже, наступний етап варто почати з уточнення правил."
    answers:
      - На думку експертів
      - можливо
      - По-перше
      - правда
      - На жаль
      - Отже

  - type: group-sort
    title: Семантичні групи вставних одиниць
    instruction: Розсортуй вставні одиниці за їхньою функцією.
    groups:
      - name: Упевненість
        items:
          - безперечно
          - без сумніву
          - справді
          - звичайно
      - name: Припущення
        items:
          - мабуть
          - можливо
          - імовірно
          - здається
      - name: Джерело інформації
        items:
          - за словами редакторки
          - на думку комісії
          - як повідомляють організатори
          - за даними звіту
      - name: Порядок викладу
        items:
          - по-перше
          - по-друге
          - отже
          - зрештою

  - type: select
    title: Обери вставні одиниці
    items:
      - question: Які речення містять вставне слово?
        options:
          - text: "Звіт, безперечно, треба доопрацювати."
            correct: true
          - text: "Майже всі учасники відповіли."
            correct: false
          - text: "Команда, мабуть, перенесе зустріч."
            correct: true
          - text: "Він може пояснити правило."
            correct: false
      - question: Які конструкції називають джерело інформації?
        options:
          - text: "за словами координаторки"
            correct: true
          - text: "на жаль"
            correct: false
          - text: "за даними звіту"
            correct: true
          - text: "по-перше"
            correct: false
      - question: Які слова не треба автоматично виділяти комами як вставні?
        options:
          - text: "навіть"
            correct: true
          - text: "майже"
            correct: true
          - text: "нібито"
            correct: true
          - text: "безперечно"
            correct: false
      - question: Де слово правда є вставним?
        options:
          - text: "Правда, цей аргумент потребує доказів."
            correct: true
          - text: "Правда іноді незручна."
            correct: false
          - text: "Ми шукаємо правду в документах."
            correct: false
          - text: "Ця правда важлива для громади."
            correct: false
      - question: Які речення мають доречний формальний регістр?
        options:
          - text: "За даними звіту, кількість заявок зросла."
            correct: true
          - text: "Уявіть собі, протокол треба оновити."
            correct: false
          - text: "На думку комісії, процедуру слід уточнити."
            correct: true
          - text: "Бачите, правила змінилися."
            correct: false
      - question: Які речення правильно розрізняють вставне слово і член речення?
        options:
          - text: "Він, може, приєднається пізніше."
            correct: true
          - text: "Він, може приєднатися, пізніше."
            correct: false
          - text: "Мені здається, що висновок передчасний."
            correct: true
          - text: "Мені, здається, що висновок передчасний."
            correct: false
      - question: Які вставки логічно завершують аргументацію?
        options:
          - text: "отже"
            correct: true
          - text: "зрештою"
            correct: true
          - text: "на жаль"
            correct: false
          - text: "за словами сусідів"
            correct: false
      - question: Які варіанти краще називають надійне джерело в офіційному тексті?
        options:
          - text: "за даними звіту"
            correct: true
          - text: "кажуть"
            correct: false
          - text: "як зазначено в протоколі"
            correct: true
          - text: "мабуть"
            correct: false

  - type: fill-in
    title: Терміни й функції
    instruction: Заповни пропуски відповідними словами.
    items:
      - sentence: "Вставне слово не входить до ____ основи речення."
        answer: граматичної
        options:
          - граматичної
          - звукової
          - лексичної
          - службової
        explanation: Вставна одиниця не є частиною граматичної основи.
      - sentence: "Конструкція «за словами експертів» називає ____ інформації."
        answer: джерело
        options:
          - джерело
          - присудок
          - підмет
          - наголос
        explanation: Вона показує, звідки походить твердження.
      - sentence: "Слова «по-перше» і «по-друге» позначають ____ викладу."
        answer: послідовність
        options:
          - послідовність
          - сумнів
          - інструмент
          - час
        explanation: Ці слова організовують аргументи.
      - sentence: "Слово «мабуть» передає ____ мовця."
        answer: припущення
        options:
          - припущення
          - наказ
          - адресу
          - цитату
        explanation: Мабуть сигналізує неповну впевненість.
      - sentence: "Надмір вставних конструкцій створює ____ речення."
        answer: перевантаження
        options:
          - перевантаження
          - відмінювання
          - узгодження
          - заперечення
        explanation: Вставки мають допомагати, а не заважати читанню.
      - sentence: "Вставлене речення можна виділити комами, тире або ____."
        answer: дужками
        options:
          - дужками
          - апострофами
          - наголосами
          - лапками
        explanation: Дужки роблять вставку тихішою й додатковою.
      - sentence: "Слова «на жаль» передають ____ оцінку мовця."
        answer: емоційну
        options:
          - емоційну
          - часову
          - кількісну
          - просторову
        explanation: На жаль показує ставлення мовця до факту.
      - sentence: "Слово «навіть» не є вставним, бо воно ____ елемент речення."
        answer: підсилює
        options:
          - підсилює
          - цитує
          - відокремлює
          - називає
        explanation: Навіть тісно пов'язане зі словом, яке підсилює.
      - sentence: "У реченні «Він може пояснити правило» слово «може» є частиною ____."
        answer: присудка
        options:
          - присудка
          - звертання
          - прикладки
          - вставки
        explanation: Тут може виражає здатність або можливість дії.
      - sentence: "У формальному тексті вставка «кажуть» часто звучить ____."
        answer: ненадійно
        options:
          - ненадійно
          - урочисто
          - точно
          - нейтрально
        explanation: Невизначене джерело послаблює офіційний текст.

  - type: error-correction
    title: Виправ пунктуацію
    instruction: Обери нормативний варіант і прочитай пояснення.
    items:
      - sentence: "На мою думку цей абзац треба скоротити."
        error: "На мою думку цей"
        correction: "На мою думку, цей абзац треба скоротити."
        options:
          - "На мою думку, цей абзац треба скоротити."
          - "На мою, думку цей абзац треба скоротити."
          - "На мою думку цей, абзац треба скоротити."
          - "На мою думку цей абзац, треба скоротити."
        explanation: Вставне словосполучення на початку речення відокремлюємо комою.
      - sentence: "Зустріч мабуть перенесуть на п'ятницю."
        error: "мабуть"
        correction: "Зустріч, мабуть, перенесуть на п'ятницю."
        options:
          - "Зустріч, мабуть, перенесуть на п'ятницю."
          - "Зустріч мабуть, перенесуть на п'ятницю."
          - "Зустріч, мабуть перенесуть на п'ятницю."
          - "Зустріч мабуть перенесуть, на п'ятницю."
        explanation: Вставне слово всередині речення виділяємо з обох боків.
      - sentence: "Навіть, короткий звіт потребує джерела."
        error: "Навіть,"
        correction: "Навіть короткий звіт потребує джерела."
        options:
          - "Навіть короткий звіт потребує джерела."
          - "Навіть, короткий звіт потребує джерела."
          - "Навіть короткий, звіт потребує джерела."
          - "Навіть короткий звіт, потребує джерела."
        explanation: Навіть не є вставним словом і не відокремлюється комою.
      - sentence: "Команда за словами координаторки уже перевірила дані."
        error: "за словами координаторки"
        correction: "Команда, за словами координаторки, уже перевірила дані."
        options:
          - "Команда, за словами координаторки, уже перевірила дані."
          - "Команда за словами, координаторки уже перевірила дані."
          - "Команда, за словами координаторки уже перевірила дані."
          - "Команда за словами координаторки, уже перевірила дані."
        explanation: Джерельну вставку всередині речення виділяємо комами.
      - sentence: "Мені, здається, цей приклад переконливим."
        error: "Мені, здається,"
        correction: "Мені здається, що цей приклад переконливий."
        options:
          - "Мені здається, що цей приклад переконливий."
          - "Мені, здається, цей приклад переконливий."
          - "Мені здається що, цей приклад переконливий."
          - "Мені, здається цей приклад, переконливий."
        explanation: Тут здається має бути присудком, тому треба перебудувати речення.
      - sentence: "Звіт це підтверджують нові дані потребує оновлення."
        error: "це підтверджують нові дані"
        correction: "Звіт - це підтверджують нові дані - потребує оновлення."
        options:
          - "Звіт - це підтверджують нові дані - потребує оновлення."
          - "Звіт це, підтверджують нові дані, потребує оновлення."
          - "Звіт, це підтверджують, нові дані потребує оновлення."
          - "Звіт це підтверджують нові дані, потребує оновлення."
        explanation: Важке вставлене речення можна виділити тире.
      - sentence: "Майже, всі учасники отримали матеріали."
        error: "Майже,"
        correction: "Майже всі учасники отримали матеріали."
        options:
          - "Майже всі учасники отримали матеріали."
          - "Майже, всі учасники отримали матеріали."
          - "Майже всі, учасники отримали матеріали."
          - "Майже всі учасники, отримали матеріали."
        explanation: Майже позначає міру, а не вставний коментар.
      - sentence: "Правда цей варіант дорожчий."
        error: "Правда цей"
        correction: "Правда, цей варіант дорожчий."
        options:
          - "Правда, цей варіант дорожчий."
          - "Правда цей, варіант дорожчий."
          - "Правда цей варіант, дорожчий."
          - "Правда, цей, варіант дорожчий."
        explanation: На початку речення правда може вводити застереження.

