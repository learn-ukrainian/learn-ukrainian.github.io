version: '1.0'
module: questions-deliberative-rhetorical
level: b2

inline:
  - type: select
    title: Тип запитання
    instruction: Позначте всі правильні пояснення типу запитання.
    items:
      - question: "«Що нам робити далі?» у командній нараді можна пояснити так:"
        options:
          - text: "це деліберативне запитання"
            correct: true
          - text: "воно показує роздум і вибір дії"
            correct: true
          - text: "це обов'язково риторичний тиск"
            correct: false
          - text: "це вкладене запитання після головного речення"
            correct: false
        min_correct: 2
        explanation: "Питання відкриває спільне зважування варіантів."
      - question: "«Хіба ми можемо мовчати?» у промові найімовірніше означає:"
        options:
          - text: "риторичне підсилення позиції"
            correct: true
          - text: "очікування висновку від аудиторії"
            correct: true
          - text: "нейтральне прохання повідомити час"
            correct: false
          - text: "вкладене yes/no запитання"
            correct: false
        min_correct: 2
        explanation: "Речення веде слухача до очевидної для мовця відповіді."
      - question: "«Я не знаю, коли почнеться зустріч» правильніше описати так:"
        options:
          - text: "це вкладене запитання в повідомному реченні"
            correct: true
          - text: "усе речення закінчується крапкою"
            correct: true
          - text: "це пряме питання до адресата"
            correct: false
          - text: "потрібно обов'язково поставити знак питання"
            correct: false
        min_correct: 2
        explanation: "Головна рамка повідомляє про незнання."
      - question: "«Може, спершу перевіримо дані?» у робочому чаті може бути:"
        options:
          - text: "м'якою деліберативною пропозицією"
            correct: true
          - text: "способом запросити групу до роздуму"
            correct: true
          - text: "гарантовано образливим риторичним питанням"
            correct: false
          - text: "непрямою мовою без питального значення"
            correct: false
        min_correct: 2
        explanation: "Може пом'якшує пропозицію, якщо контекст не тисне."
      - question: "«Чи знаєте ви, де буде зустріч?» правильні пояснення такі:"
        options:
          - text: "усе речення є прямим запитанням"
            correct: true
          - text: "всередині є вкладене запитання"
            correct: true
          - text: "кінцевий знак питання зумовлений головною рамкою"
            correct: true
          - text: "це не може містити вкладеної частини"
            correct: false
        min_correct: 2
        explanation: "Головне речення питає адресата, а підрядна частина передає зміст."
      - question: "«Невже ви цього не знали?» не завжди є риторичним, бо:"
        options:
          - text: "мовець може справді очікувати відповідь"
            correct: true
          - text: "тип залежить від контексту і мети"
            correct: true
          - text: "частка невже автоматично скасовує питальність"
            correct: false
          - text: "усі речення з невже є вкладеними"
            correct: false
        min_correct: 2
        explanation: "Частка створює відтінок, але не визначає тип сама."
      - question: "«Редакція уточнює, чи всі отримали лист» має такі ознаки:"
        options:
          - text: "yes/no запитання стало підрядною частиною"
            correct: true
          - text: "чи вводить вкладене запитання"
            correct: true
          - text: "якщо було б тут точнішою формою"
            correct: false
          - text: "це наказове речення"
            correct: false
        min_correct: 2
        explanation: "У вкладених yes/no питаннях українська використовує чи."
      - question: "«Які докази підтримують вашу тезу?» у дискусії краще за «Хіба це теза?» тому що:"
        options:
          - text: "перше запитання спрямоване на аргумент"
            correct: true
          - text: "перше залишає простір для відповіді"
            correct: true
          - text: "друге може звучати як приниження"
            correct: true
          - text: "перше не є граматично питальним"
            correct: false
        min_correct: 2
        explanation: "Етична форма запитання підтримує якість дискусії."

  - type: group-sort
    title: Делібератив чи риторика
    instruction: Розподіліть репліки за комунікативною функцією.
    groups:
      - name: "деліберативний роздум"
        items:
          - "Що нам робити далі?"
          - "Чи варто відповідати одразу?"
          - "А що, якщо план не спрацює?"
          - "Кому першому повідомити про зміну?"
      - name: "риторичне підсилення"
        items:
          - "Хіба можна ігнорувати ці дані?"
          - "Невже ми знову відкладемо перевірку?"
          - "Чи маємо ми право мовчати?"
          - "Де ж відповідальність?"
      - name: "вкладене запитання"
        items:
          - "Я не знаю, коли буде зустріч."
          - "Комісія з'ясовує, хто підписав акт."
          - "Мене цікавить, чи буде запис."
          - "Важливо зрозуміти, як це пояснити."
      - name: "нейтральне інформаційне запитання"
        items:
          - "Коли починається лекція?"
          - "Де буде реєстрація?"
          - "Хто відповідальний за звук?"
          - "Скільки триватиме обговорення?"

  - type: fill-in
    title: Вкладені запитання
    instruction: Заповніть пропуск словом або формою, що природно вводить вкладене запитання.
    items:
      - sentence: "Я не знаю, ____ почнеться зустріч."
        answer: "коли"
        options: ["коли", "чи", "якщо", "хіба"]
        explanation: "Питальне слово коли зберігається у вкладеній формі."
      - sentence: "Мене цікавить, ____ буде запис семінару."
        answer: "чи"
        options: ["чи", "якщо", "де", "хіба"]
        explanation: "Yes/no вкладене запитання вводить чи."
      - sentence: "Редакція уточнює, ____ документи потрібні для заявки."
        answer: "які"
        options: ["які", "чи", "якщо", "невже"]
        explanation: "Питальне слово які лишається в підрядній частині."
      - sentence: "Потрібно з'ясувати, ____ підписав акт."
        answer: "хто"
        options: ["хто", "чи", "якщо", "хіба"]
        explanation: "Хто передає зміст прямого питання."
      - sentence: "Команда вирішувала, ____ пояснити зміну графіка."
        answer: "як"
        options: ["як", "чи", "невже", "хіба"]
        explanation: "Деліберативне як пояснити стало вкладеною частиною."
      - sentence: "Запитайте, ____ прийде координаторка на зустріч."
        answer: "чи"
        options: ["чи", "якщо", "де", "хіба"]
        explanation: "У непрямому yes/no питанні потрібне чи."
      - sentence: "Модератор уточнив, ____ саме ці дані потрапили до звіту."
        answer: "чому"
        options: ["чому", "чи", "якщо", "невже"]
        explanation: "Чому зберігає причинне питальне значення."
      - sentence: "Я хочу зрозуміти, ____ ризики ми ще не врахували."
        answer: "які"
        options: ["які", "чи", "хіба", "невже"]
        explanation: "Які відкриває вкладене питання про вибір із групи."
      - sentence: "Уточніть, будь ласка, ____ всіх повідомили."
        answer: "чи"
        options: ["чи", "якщо", "хіба", "коли"]
        explanation: "Чи вводить yes/no зміст після уточніть."
      - sentence: "Автор пояснює, ____ риторичне запитання може тиснути."
        answer: "чому"
        options: ["чому", "чи", "якщо", "хіба"]
        explanation: "Чому вводить причинове вкладене питання."

  - type: error-correction
    title: Пунктуація і синтаксис
    instruction: Виправте слово, пунктуацію або конструкцію.
    items:
      - sentence: "Я не знаю, коли буде зустріч?"
        error: "?"
        correction: "."
        options: [".", "!", "?!", "...?"]
        explanation: "Головне речення повідомне, тому наприкінці крапка."
      - sentence: "Мене цікавить, якщо буде запис."
        error: "якщо"
        correction: "чи"
        options: ["чи", "де", "хіба", "невже"]
        explanation: "У вкладеному yes/no запитанні потрібне чи."
      - sentence: "Чи знаєте ви, коли буде зустріч."
        error: "."
        correction: "?"
        options: ["?", ".", "!", ","]
        explanation: "Усе речення питає адресата, тому потрібен знак питання."
      - sentence: "Я запитав, якщо вона прийде."
        error: "якщо"
        correction: "чи"
        options: ["чи", "де", "коли", "хіба"]
        explanation: "Тут ідеться не про умову, а про непряме yes/no питання."
      - sentence: "Хіба ви не розумієте, що це дурниця?"
        error: "дурниця"
        correction: "потребує доказів"
        options: ["потребує доказів", "дурниця", "смішно", "нісенітниця"]
        explanation: "У дискусії краще критикувати аргумент, а не принижувати співрозмовника."
      - sentence: "Команда обговорювала, що робити далі?"
        error: "?"
        correction: "."
        options: [".", "?", "!", "?!"]
        explanation: "Це повідомлення про обговорення, не пряме питання до адресата."
      - sentence: "Невже ми можемо ігнорувати ці дані."
        error: "."
        correction: "?"
        options: ["?", ".", "!", ","]
        explanation: "Риторичне запитання зберігає питальний знак."
      - sentence: "Поясніть, де ви були о дев'ятій?"
        error: "?"
        correction: "."
        options: [".", "?", "!", "?!"]
        explanation: "Спонукальна головна рамка природно закінчується крапкою."

  - type: quiz
    title: Редакторський вибір
    instruction: Оберіть найточнішу або найетичнішу форму запитання.
    items:
      - question: "Потрібно нейтрально отримати факт про строк. Яка форма найкраща?"
        options:
          - text: "Коли оприлюднять методику?"
            correct: true
          - text: "Невже методики знову не буде?"
            correct: false
          - text: "Хіба ви не соромитеся?"
            correct: false
          - text: "Методика буде, правда?"
            correct: false
        explanation: "Перша форма прямо питає про факт без тиску."
      - question: "Треба перетворити «Де він?» на вкладене повідомлення. Оберіть правильне."
        options:
          - text: "Я не знаю, де він."
            correct: true
          - text: "Я не знаю, де він?"
            correct: false
          - text: "Я не знаю, якщо він."
            correct: false
          - text: "Я не знаю, хіба він."
            correct: false
        explanation: "Вкладене питання стоїть у повідомному реченні."
      - question: "Яка форма найкраще відкриває груповий роздум без тиску?"
        options:
          - text: "Які варіанти ми ще не перевірили?"
            correct: true
          - text: "Може, нарешті зробимо як я сказав?"
            correct: false
          - text: "Хіба всі не бачать, що я правий?"
            correct: false
          - text: "Ви ж не будете сперечатися?"
            correct: false
        explanation: "Перша форма залишає простір для реальної відповіді."
      - question: "У якому реченні yes/no питання правильно вкладене?"
        options:
          - text: "Редакція уточнює, чи всі отримали лист."
            correct: true
          - text: "Редакція уточнює, якщо всі отримали лист."
            correct: false
          - text: "Редакція уточнює, хіба всі отримали лист."
            correct: false
          - text: "Редакція уточнює, невже всі отримали лист."
            correct: false
        explanation: "Чи вводить вкладене yes/no запитання."
      - question: "Яке риторичне запитання найкраще пов'язане з аргументом, а не образою?"
        options:
          - text: "Чи можемо ми ігнорувати дані аудиту?"
            correct: true
          - text: "Хіба ви не вмієте читати?"
            correct: false
          - text: "Невже ваша команда взагалі думала?"
            correct: false
          - text: "Де ваша совість?"
            correct: false
        explanation: "Перша форма апелює до даних, а не до особи."
      - question: "Який варіант правильно передає прохальну рамку з вкладеним питанням?"
        options:
          - text: "Уточніть, будь ласка, чи всіх повідомили."
            correct: true
          - text: "Уточніть, будь ласка, якщо всіх повідомили?"
            correct: false
          - text: "Уточніть, будь ласка, хіба всіх повідомили."
            correct: false
          - text: "Уточніть, будь ласка, всіх повідомили?"
            correct: false
        explanation: "Прохальна рамка завершується крапкою, а yes/no зміст вводить чи."
      - question: "Яке речення є деліберативним, а не риторичним тиском?"
        options:
          - text: "Чи варто спершу вислухати учасників?"
            correct: true
          - text: "Хіба учасники не заважають?"
            correct: false
          - text: "Невже ми знову слухатимемо всіх?"
            correct: false
          - text: "То ви вже нарешті погодитесь?"
            correct: false
        explanation: "Перше речення зважує дію."
      - question: "У якому реченні знак питання залежить від головного речення?"
        options:
          - text: "Чи знаєте ви, коли почнеться зустріч?"
            correct: true
          - text: "Я не знаю, коли почнеться зустріч."
            correct: false
          - text: "Команда обговорювала, коли почати."
            correct: false
          - text: "Редакція уточнює, хто прийде."
            correct: false
        explanation: "Головна частина «Чи знаєте ви» робить усе речення питальним."
      - question: "Яка трансформація найкраще знімає напад із фрази «Хіба ваша теза не слабка?»"
        options:
          - text: "Які докази підтримують вашу тезу?"
            correct: true
          - text: "Невже ви не бачите слабкість?"
            correct: false
          - text: "Хіба це взагалі теза?"
            correct: false
          - text: "То ви визнаєте помилку?"
            correct: false
        explanation: "Питання про докази спрямоване на аргумент."
      - question: "Який приклад показує, що делібератив може стати вкладеним?"
        options:
          - text: "Команда вирішувала, що робити далі."
            correct: true
          - text: "Що робити далі?"
            correct: false
          - text: "Хіба ми знаємо, що робити?"
            correct: false
          - text: "Невже робити далі?"
            correct: false
        explanation: "Зміст роздуму входить у повідомне речення."

workbook:
  - id: workbook-1
    type: reading
    title: "Читання: інтерв'ю після міської наради"
    instruction: Прочитайте уривок і визначте функції запитань.
    source: "Навчальний уривок для модуля B2."
    text: "Журналістка запитала посадовця: «Коли місто оприлюднить методику розподілу коштів?» Потім вона уточнила, чи врахували потреби малих громад. Посадовець відповів, що команда ще вирішує, як пояснити новий графік. «Хіба можна просити довіри без відкритих даних?» - сказала журналістка наприкінці. Модератор втрутився: «Чи правильно я розумію, що вас цікавить не лише строк, а й підстава рішення?»"
    tasks:
      - "Знайдіть пряме інформаційне запитання."
      - "Випишіть вкладене yes/no запитання."
      - "Знайдіть деліберативний роздум."
      - "Поясніть риторичне запитання журналістки."
      - "Поясніть, чому остання репліка модератора має знак питання."

  - id: workbook-2
    type: reading
    title: "Читання: редакторський коментар"
    instruction: Прочитайте коментар і визначте, як запитання змінюють тон редагування.
    source: "Навчальний уривок для модуля B2."
    text: "Редактор написав авторці: «Я не зовсім розумію, чому висновок з'являється перед доказами. Чи варто спершу показати дані, а вже потім сформулювати тезу? Хіба читач повірить твердженню без джерела?» Після цього він додав м'якшу версію для коментаря в документі: «Уточніть, будь ласка, які дані підтримують висновок і чи можна перенести тезу після прикладу»."
    tasks:
      - "Знайдіть вкладене запитання з чому."
      - "Знайдіть деліберативну пропозицію редактора."
      - "Поясніть риторичне запитання про читача."
      - "Випишіть спонукальну рамку з вкладеним yes/no питанням."
      - "Поясніть, яка версія коментаря менш тискова."

  - type: match-up
    title: Формула і функція
    instruction: Поєднайте формулу з функцією.
    pairs:
      - left: "Що робити?"
        right: "деліберативний пошук дії"
      - left: "Чи варто відповідати?"
        right: "зважування доцільності"
      - left: "Хіба це справедливо?"
        right: "риторичне підсилення оцінки"
      - left: "Невже ми повторимо помилку?"
        right: "риторичне застереження або здивування"
      - left: "Я не знаю, де він."
        right: "вкладене питання в повідомленні"
      - left: "Мене цікавить, чи буде запис."
        right: "вкладене yes/no запитання"
      - left: "Чи знаєте ви, де буде вхід?"
        right: "пряме запитання з вкладеною частиною"
      - left: "Уточніть, будь ласка, хто відповідальний."
        right: "спонукальна рамка з непрямим питанням"
      - left: "Які докази підтримують тезу?"
        right: "нейтральна аргументативна перевірка"
      - left: "А що, якщо план не спрацює?"
        right: "перевірка гіпотези"

  - type: fill-in
    title: Трансформації
    instruction: Перетворіть пряме запитання на вкладене або оберіть пунктуацію.
    items:
      - sentence: "Де буде зустріч? → Я не знаю, ____ буде зустріч."
        answer: "де"
        options: ["де", "чи", "якщо", "хіба"]
        explanation: "Питальне слово де зберігається."
      - sentence: "Чи буде запис? → Мене цікавить, ____ буде запис."
        answer: "чи"
        options: ["чи", "якщо", "де", "хіба"]
        explanation: "Yes/no вкладене питання вводить чи."
      - sentence: "Хто підписав акт? → Комісія з'ясовує, ____ підписав акт."
        answer: "хто"
        options: ["хто", "чи", "якщо", "невже"]
        explanation: "Хто лишається питальним словом."
      - sentence: "Коли почнеться семінар? → Редакція уточнює, ____ почнеться семінар."
        answer: "коли"
        options: ["коли", "чи", "якщо", "хіба"]
        explanation: "Коли передає часовий параметр."
      - sentence: "Чи всіх повідомили? → Уточніть, будь ласка, ____ всіх повідомили."
        answer: "чи"
        options: ["чи", "якщо", "де", "невже"]
        explanation: "Чи вводить yes/no зміст."
      - sentence: "Як пояснити зміну? → Команда вирішувала, ____ пояснити зміну."
        answer: "як"
        options: ["як", "чи", "хіба", "якщо"]
        explanation: "Деліберативне питання стало вкладеним."
      - sentence: "Чому перенесли зустріч? → Учасники питають, ____ перенесли зустріч."
        answer: "чому"
        options: ["чому", "чи", "якщо", "хіба"]
        explanation: "Чому передає причину."
      - sentence: "Я не знаю, коли буде зустріч____"
        answer: "."
        options: [".", "?", "!", "?!"]
        explanation: "Головна рамка повідомна."
      - sentence: "Чи знаєте ви, коли буде зустріч____"
        answer: "?"
        options: ["?", ".", "!", ","]
        explanation: "Головна рамка питальна."
      - sentence: "Поясніть, будь ласка, чому строк змінився____"
        answer: "."
        options: [".", "?", "!", "?!"]
        explanation: "Спонукальна рамка природно закінчується крапкою."

  - id: workbook-4
    type: essay-response
    title: Редагування запитань
    instruction: Напишіть 150-180 слів про те, як змінюється тон запитання після редагування.
    prompt: "Оберіть одну гостру ситуацію: інтерв'ю, редакторський коментар, студентський семінар або робочу нараду. Використайте одне деліберативне, одне риторичне й одне вкладене запитання. Поясніть, яке з них відкриває діалог, а яке може тиснути."
    min_words: 150
    model_answer: |-
      > [!model-answer]
      > На редакторській нараді фраза «Хіба ви не бачите, що абзац слабкий?» звучить як напад, навіть якщо проблема реальна. Я б почав із делібератива: «Як нам переписати абзац, щоб теза була точнішою?» Таке запитання відкриває спільну роботу. Потім можна поставити нейтральне вкладене питання: «Мені потрібно зрозуміти, які дані підтримують висновок». Якщо автор опирається, риторичне запитання теж можливе, але воно має спиратися на доказ: «Чи можемо ми залишити твердження без джерела?» Воно тисне менше, бо спрямоване на норму якості, а не на людину. У цій ситуації делібератив створює простір для рішення, вкладене питання уточнює зміст, а риторичне підсилює межу відповідальності.
    rubric:
      - criteria: "Три типи запитань"
        description: "Текст містить деліберативне, риторичне й вкладене запитання."
        points: 4
      - criteria: "Пояснення тону"
        description: "Автор пояснює, як форма запитання змінює позицію мовця."
        points: 4
      - criteria: "Пунктуація"
        description: "Вкладені й прямі запитання оформлено відповідно до головної синтаксичної рамки."
        points: 4
