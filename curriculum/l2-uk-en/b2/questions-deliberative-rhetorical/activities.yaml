- type: fill-in
  title: "Вкладені запитання"
  instruction: "Виберіть нормативний сполучник або форму."
  items:
    - sentence: "Я не знаю, ____ він прийде."
      answer: "чи"
      options: ["чи", "якщо", "щоб", "бо"]
      explanation: "Це вкладене yes/no запитання."
    - sentence: "Комісія з'ясовує, ____ ухвалили рішення."
      answer: "як"
      options: ["як", "якщо", "бо", "аби"]
      explanation: "Як вводить непряме запитання про спосіб."
    - sentence: "Мене цікавить, ____ починається зустріч."
      answer: "коли"
      options: ["коли", "якщо", "тому", "щоб"]
      explanation: "Коли вводить вкладене запитання про час."
    - sentence: "Він запитав, ____ моя мама."
      answer: "де"
      options: ["де", "де є", "якщо", "щоб"]
      explanation: "У нейтральній українській теперішнє бути не потрібне."
    - sentence: "Поясніть, будь ласка, ____ потрібно додати копію."
      answer: "чи"
      options: ["чи", "якщо", "хоч", "аби"]
      explanation: "Потрібно додати копію? -> чи потрібно додати копію."
    - sentence: "Ми уточнили, ____ учасників буде на зустрічі."
      answer: "скільки"
      options: ["скільки", "якщо", "хіба", "невже"]
      explanation: "Скільки вводить непряме кількісне запитання."
    - sentence: "Редакторка пояснила, ____ заголовок змінили."
      answer: "чому"
      options: ["чому", "якщо", "хіба", "щоб"]
      explanation: "Чому вводить запитання про причину."
    - sentence: "Хотілося б дізнатися, ____ ви плануєте консультації."
      answer: "чи"
      options: ["чи", "якщо", "бо", "ніби"]
      explanation: "Хотілося б дізнатися, чи..."
    - sentence: "Я довго думав, ____ відповідати опонентові."
      answer: "як"
      options: ["як", "якщо", "хіба", "тому"]
      explanation: "Це роздум про спосіб дії."
    - sentence: "Модератор уточнив, ____ правильно зрозумів запитання."
      answer: "чи"
      options: ["чи", "якщо", "де", "куди"]
      explanation: "Уточнити, чи правильно..."

