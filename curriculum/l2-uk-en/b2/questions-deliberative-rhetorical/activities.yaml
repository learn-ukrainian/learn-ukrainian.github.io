- type: error-correction
  title: "Виправте запитання"
  instruction: "Знайдіть помилку й виберіть нормативну форму."
  items:
    - sentence: "Ви задаєте дуже хороше питання."
      error: "задаєте дуже хороше питання"
      correction: "ставите дуже слушне запитання"
      error_type: "phrase"
      options:
      - "ставите дуже слушне запитання"
      - "задаєте дуже хороше питання"
      - "даєте дуже питання"
      - "ставите дуже питанням"
      explanation: "Українською запитання ставлять."
    - sentence: "Я запитав, якщо вона прийде."
      error: "якщо"
      correction: "чи"
      error_type: "word"
      options: ["чи", "якщо", "бо", "щоб"]
      explanation: "Це вкладене yes/no запитання."
    - sentence: "Я запитав, де він?"
      error: "?"
      correction: "."
      error_type: "construction"
      options: [".", "?", "!", "..."]
      explanation: "Головна частина розповідна."
    - sentence: "Він запитав мене, де є моя мама."
      error: "де є моя мама"
      correction: "де моя мама"
      error_type: "phrase"
      options: ["де моя мама", "де є моя мама", "якщо моя мама", "де мама є?"]
      explanation: "У нейтральній теперішній конструкції бути не потрібне."
    - sentence: "Що я повинен робити?"
      error: "я повинен робити"
      correction: "мені робити"
      error_type: "construction"
      options: ["мені робити", "я повинен робити", "я маю робиться", "для мене робити"]
      explanation: "Для роздумливого запитання природніше що мені робити?"
    - sentence: "Я не знаю чи він прийде."
      error: "не знаю чи"
      correction: "не знаю, чи"
      error_type: "phrase"
      options:
        - "не знаю, чи"
        - "не знаю чи"
        - "не знаю: чи"
        - "не знаю? чи"
      explanation: "Між головною та підрядною частиною потрібна кома."
    - sentence: "Хіба це не очевидно."
      error: "."
      correction: "?"
      error_type: "construction"
      options: ["?", ".", "!", ","]
      explanation: "Уся репліка має питальну форму."
    - sentence: "Поясніть, якщо потрібно реєструватися повторно."
      error: "якщо"
      correction: "чи"
      error_type: "word"
      options: ["чи", "якщо", "аби", "хоч"]
      explanation: "Поясніть, чи потрібно..."

- type: group-sort
  title: "Класифікуйте запитання"
