- type: reading
  id: questions-education-column-reading
  title: "Читання: колонка про освіту"
  instruction: "Прочитайте уривок і визначте функції запитань."
  source: "Навчальний уривок для модуля B2."
  text: >-
    Як навчати дітей ставити точні запитання? Це не дрібниця, а основа
    критичного мислення. Хіба школа може говорити про відповідальність, якщо не
    вчить учнів перевіряти аргументи? Мене цікавить, чи готові вчителі
    обговорювати помилки відкрито. Варто також з'ясувати, які запитання
    допомагають класу думати, а які лише тиснуть на співрозмовника. Може,
    спершу треба навчити дітей розрізняти сумнів, риторику й справжній запит
    на інформацію?
  tasks:
    - "Знайдіть деліберативне запитання."
    - "Знайдіть риторичне запитання й поясніть його тезу."
    - "Випишіть вкладене запитання з чи."
    - "Поясніть, чому останнє речення має знак питання."

- type: quiz
  title: "Типи питальних речень"
  instruction: "Оберіть найточніше пояснення."
  items:
    - question: "Що робити? у внутрішньому монолозі - це..."
      options:
        - text: "деліберативне запитання"
          correct: true
        - text: "риторичне запитання"
          correct: false
        - text: "вкладене запитання"
          correct: false
        - text: "розповідне речення"
          correct: false
      explanation: "Короткий інфінітив виражає пошук дії."
    - question: "Хіба це не очевидно? найчастіше виконує функцію..."
      options:
        - text: "підсилення очевидної тези"
          correct: true
        - text: "нейтрального запиту часу"
          correct: false
        - text: "підрядного з'ясувального"
          correct: false
        - text: "умовної конструкції"
          correct: false
      explanation: "Хіба часто сигналізує риторичний ефект."
    - question: "Я не знаю, чи він прийде. Чому вжито чи?"
      options:
        - text: "це вкладене yes/no запитання"
          correct: true
        - text: "це умовне речення"
          correct: false
        - text: "це наказ"
          correct: false
        - text: "це калька з якщо"
          correct: false
      explanation: "Для непрямих yes/no запитань нормативне чи."
    - question: "Яка пунктуація правильна?"
      options:
        - text: "Я запитав, де він."
          correct: true
        - text: "Я запитав, де він?"
          correct: false
        - text: "Я запитав де він?"
          correct: false
        - text: "Я запитав? де він."
          correct: false
      explanation: "Головна частина розповідна, тому в кінці крапка."
    - question: "Яке формулювання нормативне?"
      options:
        - text: "Ви ставите слушне запитання."
          correct: true
        - text: "Ви задаєте слушне питання."
          correct: false
        - text: "Ви задаєте запитання дуже слушно."
          correct: false
        - text: "Ви ставите питання у сенсі задаєте."
          correct: false
      explanation: "Українською запитання ставлять."
    - question: "Чи правильно я зрозумів, що зустріч перенесли? має знак питання, бо..."
      options:
        - text: "питальною є вся репліка"
          correct: true
        - text: "будь-яке що вимагає знака питання"
          correct: false
        - text: "це завжди риторичне запитання"
          correct: false
        - text: "підрядне речення завжди питальне"
          correct: false
      explanation: "Головна частина сама оформлена як запитання."
    - question: "А що, якщо план не спрацює? найкраще описує..."
      options:
        - text: "деліберативну гіпотезу"
          correct: true
        - text: "вкладене питання з чи"
          correct: false
        - text: "безособову форму"
          correct: false
        - text: "кличний відмінок"
          correct: false
      explanation: "Мовець зважує можливий сценарій."
    - question: "Яке речення є вкладеним запитанням?"
      options:
        - text: "Комісія з'ясовує, як ухвалили рішення."
          correct: true
        - text: "Як ухвалили рішення?"
          correct: false
        - text: "Хіба рішення не очевидне?"
          correct: false
        - text: "Рішення ухвалили вчора."
          correct: false
      explanation: "Питальний зміст залежить від головної частини."
    - question: "Невже ми знову повторимо цю помилку? у промові може бути..."
      options:
        - text: "риторичним застереженням"
          correct: true
        - text: "словниковою статтею"
          correct: false
        - text: "прямим наказом"
          correct: false
        - text: "умовним реченням"
          correct: false
      explanation: "Мовець не шукає інформації, а підсилює попередження."
    - question: "Яке речення правильно перетворює Вона прийде?"
      options:
        - text: "Я запитав, чи вона прийде."
          correct: true
        - text: "Я запитав, якщо вона прийде."
          correct: false
        - text: "Я запитав, вона прийде?"
          correct: false
        - text: "Я запитав чи вона прийде?"
          correct: false
      explanation: "Потрібні кома, чи і крапка."

