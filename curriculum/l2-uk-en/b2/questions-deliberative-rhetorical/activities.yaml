- type: true-false
  title: "Правила й функції"
  instruction: "Визначте, чи твердження правильне."
  items:
    - statement: "Деліберативне запитання може виражати сумнів мовця."
      correct: true
      explanation: "Це основна функція роздумливих запитань."
    - statement: "Риторичне запитання завжди очікує нову інформацію від слухача."
      correct: false
      explanation: "Відповідь часто очевидна або не потрібна."
    - statement: "У вкладеному yes/no запитанні нормативно вживати чи."
      correct: true
      explanation: "Я не знаю, чи він прийде."
    - statement: "Я не знаю, якщо він прийде є нормативною українською моделлю."
      correct: false
      explanation: "Якщо вводить умову, не непряме запитання."
    - statement: "Українською краще казати ставити запитання."
      correct: true
      explanation: "Задавати питання є небажаною калькою."
    - statement: "Я запитав, де він. має крапку, бо головна частина розповідна."
      correct: true
      explanation: "Пунктуацію визначає мета всього речення."
    - statement: "Чи знаєте ви, де він? має знак питання, бо вся репліка питальна."
      correct: true
      explanation: "Головна частина ставить запитання."
    - statement: "Де є моя мама завжди природніше за де моя мама."
      correct: false
      explanation: "У нейтральному теперішньому контексті бути часто не виражається."
    - statement: "Хіба не час діяти? може підсилювати заклик."
      correct: true
      explanation: "Це риторична функція."
    - statement: "У науковому тексті риторичні запитання можна використовувати без доказів."
      correct: false
      explanation: "Академічний стиль потребує аргументації."

- type: unjumble
  title: "Складіть непрямі запитання"
  instruction: "Розташуйте слова так, щоб утворити нормативне речення."
  items:
    - words: ["Я", "не", "знаю", "чи", "він", "прийде", "сьогодні"]
      answer: "Я не знаю, чи він прийде сьогодні."
    - words: ["Комісія", "з'ясовує", "як", "ухвалили", "це", "рішення"]
      answer: "Комісія з'ясовує, як ухвалили це рішення."
    - words: ["Мене", "цікавить", "коли", "починається", "відкрита", "зустріч"]
      answer: "Мене цікавить, коли починається відкрита зустріч."
    - words: ["Поясніть", "будь", "ласка", "чи", "потрібна", "реєстрація"]
      answer: "Поясніть, будь ласка, чи потрібна реєстрація."
    - words: ["Чи", "правильно", "я", "зрозумів", "що", "зустріч", "перенесли"]
      answer: "Чи правильно я зрозумів, що зустріч перенесли?"
    - words: ["Викладачка", "запитала", "скільки", "часу", "потрібно", "групі"]
      answer: "Викладачка запитала, скільки часу потрібно групі."
    - words: ["Хотілося", "б", "дізнатися", "чи", "готова", "команда"]
      answer: "Хотілося б дізнатися, чи готова команда."
    - words: ["Редакторка", "пояснила", "чому", "заголовок", "змінили", "вранці"]
      answer: "Редакторка пояснила, чому заголовок змінили вранці."

- type: reading
  id: questions-parliament-debate-listening
  title: "Аудіювання: стенограма парламентських дебатів"
  instruction: "Прочитайте стенограму як слуховий сценарій і визначте функції запитань."
  source: "Навчальна стенограма без зовнішнього медіа."
  text: >-
    Головуюча відкриває обговорення законопроєкту про безпеку в школах.
    Доповідач каже: "Чи варто вводити обов'язкову воєнну підготовку в
    школах, якщо громади ще не мають однакових ресурсів?" Представниця
    комітету відповідає: "Хіба можна говорити про безпеку без підготовки
    вчителів, психологічного супроводу й чітких меж відповідальності?"
    Депутат з опозиції уточнює: "Мене цікавить, чи передбачено добровільні
    модулі для учнів, які не можуть брати участь у практичних заняттях".
    Наприкінці головуюча підсумовує: "Залишається питання, як саме школи
    пояснять батькам мету програми й хто перевірить її зміст".
  tasks:
    - "Випишіть деліберативне запитання про доцільність рішення."
    - "Знайдіть риторичне запитання й поясніть, яку тезу воно підсилює."
    - "Випишіть вкладене запитання з чи."
    - "Поясніть, чому останнє речення завершується крапкою."

- type: essay-response
  id: questions-persuasive-essay
  title: "Есе: запитання в аргументації"
  instruction: >-
    Напишіть переконувальне есе на суспільну тему. Використайте деліберативні,
    риторичні та вкладені запитання.
  prompt: >-
    Чи варто вводити обов'язкову воєнну підготовку в школах?
  min_words: 300
  model_answer: >-
    Чи має право держава вирішувати за дитину, якою саме має бути її
    підготовка до небезпеки? Це запитання не можна відкинути, бо школа справді
    відповідає за безпеку учнів. Водночас я замислююся: а що, якби обов'язкова
    воєнна підготовка перетворилася не на відповідальне навчання, а на ще один
    формальний предмет? Хіба можна назвати корисною програму, якщо вчителі не
    мають підготовки, а батьки не розуміють її мети? Залишається питання, чи
    готові школи пояснити дітям межу між громадянською відповідальністю,
    психологічною безпекою й мілітаризацією повсякденного життя. Тому я
    підтримав би не обов'язкову воєнну підготовку, а прозорий курс безпеки з
    добровільними практичними модулями, медичною грамотністю й участю громади.
  rubric:
    - criteria: "Три типи запитань"
      description: "Є деліберативні, риторичні та вкладені запитання."
      points: 4
    - criteria: "Пунктуація"
      description: "Правильно вжито знак питання або крапку у вкладених конструкціях."
      points: 2
    - criteria: "Норма"
      description: "Немає кальок задавати питання або запитав, якщо."
      points: 2
    - criteria: "Аргументація"
      description: "Риторичні запитання підтримані поясненням або доказами."
      points: 2
