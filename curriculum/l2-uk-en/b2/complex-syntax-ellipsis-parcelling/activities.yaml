      - words: ["Після", "довгого", "пояснення", "короткий", "парцелят", "виділяє", "висновок"]
        answer: "Після довгого пояснення короткий парцелят виділяє висновок."
      - words: ["Службове", "слово", "не", "має", "бути", "самостійним", "парцелятом"]
