  - type: essay-response
    id: ellipsis-parcelling-writing
    title: "Напиши стилістичний аналіз"
    instruction: "Напиши 150-180 слів українською."
    prompt: >
      Поясни різницю між еліпсисом і парцеляцією на власних прикладах. Обов'язково покажи один приклад природного діалогічного еліпсису, один приклад тире на місці пропущеного присудка, один приклад доречної парцеляції та один приклад помилки, яку не можна виправдовувати стилем.
    min_words: 150
    model_answer: >
      Еліпсис стискає речення, коли пропущений компонент легко відновити. Наприклад, у діалозі **Коли зустріч? - О третій** відповідь неповна, але зміст зрозумілий із питання. У письмі еліпсис може уникати повтору: **Перший абзац пояснює правило, другий - виняток**. Тут тире показує місце пропущеного присудка **пояснює**. Парцеляція працює інакше: вона розчленовує речення для акценту або ритму. У фразі **Ми чекали відповіді. Довго. Без пояснень** друге й третє речення виділяють тривалість і проблему мовчання. Але не кожна неповнота є прийомом. Речення **Я йду університет, а брат магазин** має втрачений прийменник, тому це помилка. Нормативно: **Я йду до університету, а брат - у магазин**.
    rubric:
      - criteria: "Термінологічна точність"
        description: "Автор чітко розрізняє еліпсис, парцеляцію, парцелят і помилкову неповноту."
        points: 3
      - criteria: "Приклади"
        description: "Є власні приклади для діалогу, тире на місці пропуску, парцеляції та помилки."
        points: 3
      - criteria: "Пунктуація"
        description: "Тире, крапка й кома використані свідомо."
        points: 2
      - criteria: "Стиль B2"
        description: "Текст пояснює жанрову доречність, а не просто перелічує правила."
        points: 2
