      - question: "Де речення краще розгорнути для офіційного стилю?"
        min_correct: 3
        options:
          - text: "Після оплати - доставка."
            correct: true
          - text: "Рішення ухвалено. Без обговорення."
            correct: true
          - text: "Команда подала звіт."
            correct: false
          - text: "Після перевірки - відповідь."
            correct: true
          - text: "Документи надійшли вчасно."
            correct: false
        explanation: "Офіційний стиль потребує виконавця, дії та умов."
      - question: "Які варіанти зберігають потрібний прийменник після еліпсису?"
        min_correct: 3
        options:
          - text: "Я йду до архіву, а вона - до бібліотеки."
            correct: true
          - text: "Я їду в центр, а він - на вокзал."
            correct: true
          - text: "Ми говорили про правило, а вони - про виняток."
            correct: true
          - text: "Я йду до архіву, а вона - бібліотеки."
            correct: false
          - text: "Ми говорили про правило, а вони - виняток."
            correct: false
        explanation: "Прийменник лишається, бо він керує формою залежного слова."
      - question: "Які фрагменти мають очевидну акцентну функцію?"
        min_correct: 3
        options:
          - text: "Надто пізно."
            correct: true
          - text: "Без пояснень."
            correct: true
          - text: "Після трьох нагадувань."
            correct: true
          - text: "І."
            correct: false
          - text: "У кімнату."
            correct: false
        explanation: "Акцентні парцеляти додають оцінку, обставину або уточнення."
      - question: "Які твердження про стиль правильні?"
        min_correct: 3
        options:
          - text: "Прийом має відповідати жанру."
            correct: true
          - text: "Повне речення часто дає ясність."
            correct: true
          - text: "Неповне речення може створити темп."
            correct: true
          - text: "Парцеляція завжди робить текст кращим."
            correct: false
          - text: "Еліпсис скасовує пунктуацію."
            correct: false
        explanation: "Стилістична доречність залежить від функції й жанру."

  - type: error-correction
    title: "Виправ невдалий еліпсис або парцеляцію"
    instruction: "Знайди помилковий фрагмент і вибери нормативну або стилістично кращу заміну."
    items:
      - sentence: "Я йду університет, а брат магазин."
        error: "йду університет"
        correction: "йду до університету"
        error_type: "construction"
        options: ["йду до університету", "йду університет", "йду університетом", "йду про університет"]
        explanation: "Еліпсис не може знищувати потрібний прийменник."
      - sentence: "Перший розділ пояснює правило, другий виняток."
        error: "другий виняток"
        correction: "другий - виняток"
        error_type: "construction"
        options: ["другий - виняток", "другий виняток", "другий у виняток", "другим винятком"]
        explanation: "Тире показує місце пропущеного присудка."
      - sentence: "Ми погодилися. І. Пішли далі."
        error: "І."
        correction: "і пішли далі"
        error_type: "construction"
        options: ["і пішли далі", "І.", "але", "бо"]
        explanation: "Службове слово не має бути самостійним парцелятом."
      - sentence: "Після оплати - доставка."
        error: "Після оплати - доставка."
        correction: "Після оплати продавець передає товар службі доставки."
        error_type: "construction"
        options: ["Після оплати продавець передає товар службі доставки.", "Після оплати - доставка.", "Доставка оплатою.", "Оплата після доставка."]
        explanation: "Для офіційного стилю треба назвати виконавця й дію."
      - sentence: "Команда підготувала звіт. Для ради. Про бюджет."
        error: "Для ради. Про бюджет."
        correction: "для ради звіт про бюджет"
        error_type: "construction"
        options: ["для ради звіт про бюджет", "Для ради. Про бюджет.", "для рада бюджет", "ради про бюджет"]
        explanation: "Фрагменти не мають акцентної функції, тому краще розгорнути."
      - sentence: "Я їду центр, а вона вокзал."
        error: "їду центр"
        correction: "їду в центр"
        error_type: "construction"
        options: ["їду в центр", "їду центр", "їду центром", "їду про центр"]
        explanation: "Потрібний прийменник зберігається і після скорочення."
      - sentence: "Парцеляція. Це коли. Речення розірване."
        error: "Це коли."
        correction: "це розчленування речення"
        error_type: "construction"
        options: ["це розчленування речення", "Це коли.", "це де", "коли речення"]
        explanation: "Визначення має бути граматично повним."
      - sentence: "Мені двадцять років, а брат двадцять два."
        error: "брат двадцять два"
        correction: "братові - двадцять два"
        error_type: "construction"
        options: ["братові - двадцять два", "брат двадцять два", "братом двадцять два", "брата двадцять два"]
        explanation: "Для віку потрібна давальна модель."
      - sentence: "Рішення ухвалили. Бо поспішали."
        error: "Бо поспішали."
        correction: "бо поспішали"
        error_type: "construction"
        options: ["бо поспішали", "Бо поспішали.", "і бо поспішали", "тому що."]
        explanation: "У нейтральному стилі підрядну причини краще приєднати комою."
      - sentence: "Мова інструмент мислення."
        error: "Мова інструмент"
        correction: "Мова - інструмент"
