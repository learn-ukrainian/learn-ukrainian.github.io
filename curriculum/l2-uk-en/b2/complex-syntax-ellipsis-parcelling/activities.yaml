version: '1.0'
module: complex-syntax-ellipsis-parcelling
level: b2
inline:
  - type: fill-in
    title: "Відновіть пропущене"
    instruction: "Вставте пропущений елемент так, щоб еліпсис став зрозумілим."
    items:
      - sentence: "Марко читає звіт, Олена - ____."
        answer: "лист"
        options: ["лист", "з листом", "листом", "листу"]
        explanation: "Паралель відновлює присудок читає: Олена читає лист."
      - sentence: "У першій заявці бракує підпису, у другій - ____."
        answer: "дати"
        options: ["дати", "датися", "датою", "дату"]
        explanation: "Пропущено бракує; потрібний родовий відмінок: бракує дати."
      - sentence: "Вона працює над проєктом, він - ____ звітом."
        answer: "над"
        options: ["над", "з", "для", "без"]
        explanation: "Еліпсис не скасовує прийменникового керування."
      - sentence: "Я їду в центр, брат - ____ сервісу."
        answer: "до"
        options: ["до", "сервіс", "сервісом", "від"]
        explanation: "Потрібний прийменник для напряму."
      - sentence: "Перший розділ описує причини, другий - ____."
        answer: "наслідки"
        options: ["наслідки", "наслідками", "наслідковий", "наслідку"]
        explanation: "Паралель відновлює присудок описує."
      - sentence: "Перший аргумент - економічний, другий - ____."
        answer: "етичний"
        options: ["етичний", "етикою", "етично", "етику"]
        explanation: "Паралель іменних присудків має зберегти форму прикметника."
      - sentence: "У першому абзаці йдеться про причини, у другому - ____ наслідки."
        answer: "про"
        options: ["про", "над", "з", "без"]
        explanation: "Прийменник про зберігає керування."
      - sentence: "Команда підготувала звіт, редактор - ____."
        answer: "висновок"
        options: ["висновок", "висновком", "висновку", "висновковий"]
        explanation: "Пропущено підготував або перевірив; потрібний прямий додаток."
      - sentence: "Одні чекали пояснення, інші - ____."
        answer: "строку"
        options: ["строку", "строк", "строком", "строковий"]
        explanation: "Чекати потребує родового відмінка."
      - sentence: "Після перевірки - ____."
        answer: "рішення"
        options: ["рішення", "рішенню", "рішенням", "рішуче"]
        explanation: "У нотатковій формі пропущено буде або ухвалюють."
  - type: select
    title: "Тире: структура чи прикраса?"
    instruction: "Виберіть речення, де тире допомагає показати пропуск або іменний присудок."
    items:
      - question: "Де тире підтримує еліптичне зіставлення?"
        min_correct: 2
        options:
          - text: "Одна команда готує текст, інша - таблицю."
            correct: true
          - text: "У першому листі - дата, у другому - підпис."
            correct: true
          - text: "Звіт - готовий."
            correct: false
          - text: "Вона - швидко відповіла."
            correct: false
        explanation: "Тире має показувати пропуск або структуру, а не випадкову паузу."
      - question: "Які речення варто розгорнути, бо вони двозначні або граматично слабкі?"
        min_correct: 2
        options:
          - text: "Я центр, вона вокзал."
            correct: true
          - text: "Ми говорили про гарантію, вони - про повернення."
            correct: false
          - text: "Перший приклад правило, другий виняток."
            correct: true
          - text: "Парцеляція - стилістичний прийом."
            correct: false
        explanation: "Проблемні варіанти не зберігають достатньої граматичної опори."
      - question: "Які перевірки потрібні перед еліпсисом?"
        min_correct: 3
        options:
          - text: "відновити повний варіант"
            correct: true
          - text: "перевірити прийменники й відмінки"
            correct: true
          - text: "оцінити жанр"
            correct: true
          - text: "прибрати всі службові слова"
            correct: false
        explanation: "Еліпсис має бути відновлюваним, граматично видимим і жанрово доречним."
      - question: "Де тире між підметом і присудком доречне?"
        options:
          - text: "Еліпсис - форма синтаксичної компресії."
            correct: true
          - text: "Текст - виразний у нейтральному описі."
            correct: false
          - text: "Вона - швидко відповіла."
            correct: false
          - text: "Заявку - подали вчасно."
            correct: false
        explanation: "Тире доречне між іменними частинами, а не всередині звичайного присудка."
      - question: "Яке речення найкраще зберігає керування?"
        options:
          - text: "Ми говорили про гарантію, вони - про повернення."
            correct: true
          - text: "Ми говорили про гарантію, вони - повернення."
            correct: false
          - text: "Ми говорили гарантію, вони повернення."
            correct: false
          - text: "Ми - гарантію, вони - повернення."
            correct: false
        explanation: "Прийменник про не зникає після пропуску присудка."
      - question: "Де фрагмент краще розгорнути для інструкції?"
        options:
          - text: "Після перевірки комісія ухвалює рішення."
            correct: true
          - text: "Після перевірки - рішення."
            correct: false
          - text: "Рішення. Після перевірки."
            correct: false
          - text: "Перевірка. Рішення."
            correct: false
        explanation: "Інструкція потребує повної процедури."
      - question: "Що найкраще описує небезпечний еліпсис?"
        options:
          - text: "читач мусить сам вгадувати пропущену дію"
            correct: true
          - text: "присудок легко відновити"
            correct: false
          - text: "прийменник збережено"
            correct: false
          - text: "жанр допускає нотатковість"
            correct: false
        explanation: "Небезпека починається там, де пропуск не відновлюється."
      - question: "Який варіант найкраще підходить для службового звіту?"
        options:
          - text: "Відповідь надійшла після повторного звернення."
            correct: true
          - text: "Відповіли. Після повторного звернення."
            correct: false
          - text: "Після звернення. Відповідь."
            correct: false
          - text: "Повторно. Звернення. Відповідь."
            correct: false
        explanation: "Службовий звіт потребує нейтральної повної форми."
  - type: group-sort
    title: "Типи парцелятів"
    instruction: "Розподіліть приклади за типом винесеного фрагмента."
    groups:
      - name: "Означення"
        items:
          - "На столі лежав лист. Короткий."
          - "У коридорі стояла валіза. Стара."
          - "Він побачив будинок. Порожній."
      - name: "Обставина"
        items:
          - "Вона погодилася. Неохоче."
          - "Ми чекали відповіді. Довго."
          - "Команда повернулася. Без пояснень."
      - name: "Уточнення або додаток"
        items:
          - "Команда чекала документа. Підписаного кошторису."
          - "Він просив одного. Точного строку."
          - "У листі бракувало деталі. Номера замовлення."
      - name: "Підрядна частина"
        items:
          - "Ми повернемося до обговорення. Коли буде висновок."
          - "Заявку подали вчасно. Хоч документи перевірили не всі."
          - "Вона відповіла пізніше. Бо чекала підтвердження."
  - type: error-correction
    title: "З маркованого в нейтральне"
    instruction: "Перепишіть речення нейтрально, якщо парцеляція або еліпсис не пасують до жанру."
    items:
      - sentence: "Заявку подали. Без підпису."
        error: "Без підпису."
        answer: "Заявку подали без підпису."
        options:
          - "Заявку подали без підпису."
          - "Заявку. Подали. Без підпису."
          - "Без підпису заявку."
          - "Заявку без. Підпису."
        explanation: "У нейтральному звіті обставину краще приєднати до речення."
      - sentence: "Одна команда - за звіт, інша - за презентацію."
        error: "за"
        answer: "Одна команда відповідає за звіт, інша - за презентацію."
        options:
          - "Одна команда відповідає за звіт, інша - за презентацію."
          - "Одна команда за звіт, інша презентацію."
          - "Одна. Команда. Звіт."
          - "Команда звіт, інша презентація."
        explanation: "Відновлений присудок робить відповідальність ясною."
      - sentence: "Звіт. Підготували. Вчасно."
        error: "механічний розрив"
        answer: "Звіт підготували вчасно."
        options:
          - "Звіт підготували вчасно."
          - "Звіт. Вчасно підготували. Його."
          - "Підготували. Звіт."
          - "Вчасно. Звіт. Підготували."
        explanation: "Крапки не додають смислового акценту."
      - sentence: "Перший приклад правило, другий виняток."
        error: "забагато пропусків"
        answer: "Перший приклад показує правило, другий - виняток."
        options:
          - "Перший приклад показує правило, другий - виняток."
          - "Перший приклад правило, другий виняток."
          - "Правило перший, виняток другий."
          - "Перший. Правило. Другий. Виняток."
        explanation: "Потрібно відновити присудок і залишити зрозумілу паралель."
      - sentence: "Ми чекали. Довго. Без пояснень."
        error: "надмірна парцеляція"
        answer: "Ми довго чекали без пояснень."
        options:
          - "Ми довго чекали без пояснень."
          - "Ми чекали. Довго. Без пояснень."
          - "Довго. Ми. Без пояснень."
          - "Очікування довго без."
        explanation: "У нейтральному варіанті обставини можна повернути в речення."
      - sentence: "Я центр, вона вокзал."
        error: "немає прийменників"
        answer: "Я їду в центр, вона - на вокзал."
        options:
          - "Я їду в центр, вона - на вокзал."
          - "Я центр, вона вокзал."
          - "Я - центр, вона - вокзал."
          - "Центр я, вокзал вона."
        explanation: "Напрям потребує прийменників."
      - sentence: "Документи подали. Через сервіс."
        error: "неясний причинний зв'язок"
        answer: "Документи подали пізно через збій у сервісі."
        options:
          - "Документи подали пізно через збій у сервісі."
          - "Документи подали. Через сервіс."
          - "Через. Сервіс. Документи."
          - "Сервіс документи через."
        explanation: "Причину треба сформулювати повно."
      - sentence: "Другий - презентацію."
        error: "немає опори"
        answer: "Перший відділ готує звіт, другий - презентацію."
        options:
          - "Перший відділ готує звіт, другий - презентацію."
          - "Другий - презентацію."
          - "Другий презентацію просто."
          - "Презентацію другий."
        explanation: "Еліпсис потребує попередньої моделі."
  - type: match-up
    title: "Прийом чи помилка"
    instruction: "Поєднайте критерій із редакторським питанням."
    pairs:
      - left: "відновлюваність"
        right: "Що саме пропущено і звідки це видно?"
      - left: "керування"
        right: "Чи збережено прийменник і потрібний відмінок?"
      - left: "жанр"
        right: "Чи допускає цей тип тексту стислу або розірвану форму?"
      - left: "пунктуаційна підтримка"
        right: "Чи знак пояснює структуру, а не прикрашає рядок?"
      - left: "нейтральне переписування"
        right: "Чи можна об'єднати фрагмент у повне речення?"
      - left: "парцелят"
        right: "До якого базового речення належить винесений фрагмент?"
      - left: "механічний розрив"
        right: "Чи додає пауза зміст, чи тільки ламає речення?"
      - left: "синтаксична компресія"
        right: "Чи скорочення не знищує потрібні граматичні зв'язки?"
      - left: "службовий жанр"
        right: "Чи не треба повернути повну процедуру?"
      - left: "публіцистичний акцент"
        right: "Чи пауза справді підсилює оцінку?"
workbook:
  - type: reading
    id: wb-reading-short-syntax-comment
    title: "Читання: короткий синтаксис у коментарі"
    instruction: "Прочитайте уривок і позначте еліпсис, парцеляцію та нейтральні речення."
    source: "Навчальний текст для модуля B2."
    text: >
      Сервіс обіцяв відповідь до п'ятниці. У понеділок - тиша. У вівторок клієнт написав повторно.
      Відповіли швидко. Але без конкретного строку. У звіті така форма була б надто емоційною:
      потрібно написати, що відповідь надійшла після повторного звернення, але не містила строку
      виконання робіт.
    tasks:
      - "Знайдіть еліптичне речення."
      - "Знайдіть парцельований фрагмент."
      - "Поясніть, чому останнє речення нейтральніше."
      - "Перепишіть перші чотири речення як службовий звіт."
  - type: select
    title: "Стильова доречність"
    instruction: "Виберіть жанр, у якому коротка конструкція звучить природно."
    items:
      - question: "«Менше слів. Більше дії.» Найприродніший жанр?"
        options:
          - text: "слоган або публіцистичний заголовок"
            correct: true
          - text: "юридичний договір"
            correct: false
          - text: "технічна інструкція"
            correct: false
          - text: "академічне визначення"
            correct: false
        explanation: "Короткий ритм працює в слогані, але не в документах, де потрібна повна ясність."
      - question: "«Рішення ухвалили. Без обговорення.» Де це може працювати?"
        min_correct: 2
        options:
          - text: "колонка"
            correct: true
          - text: "есе"
            correct: true
          - text: "офіційний протокол"
            correct: false
          - text: "договір на послугу"
            correct: false
        explanation: "Парцеляція підсилює оцінку, тому не завжди пасує до офіційного жанру."
      - question: "«Після перевірки - рішення.» Де ця форма найприродніша?"
        options:
          - text: "коротка нотатка або план"
            correct: true
          - text: "детальна інструкція"
            correct: false
          - text: "договір"
            correct: false
          - text: "академічне визначення"
            correct: false
        explanation: "Нотатка допускає стислість, інструкція потребує повної дії."
      - question: "«Місто чекало. Довго. Без пояснень.» Де можливий такий ритм?"
        options:
          - text: "есе або колонка"
            correct: true
          - text: "акт виконаних робіт"
            correct: false
          - text: "технічний паспорт"
            correct: false
          - text: "юридична умова"
            correct: false
        explanation: "Емоційний ритм природніший у публіцистичному тексті."
      - question: "Який варіант найкращий для академічного пояснення?"
        options:
          - text: "Парцеляція виносить обставину в окрему інтонаційну одиницю."
            correct: true
          - text: "Парцеляція. Обставина. Окремо."
            correct: false
          - text: "Ну це коли крапки всюди."
            correct: false
          - text: "Пауза і все."
            correct: false
        explanation: "Академічне пояснення потребує терміна й механізму."
      - question: "Де еліпсис працює найкраще?"
        options:
          - text: "Перший пункт стосується оплати, другий - гарантії."
            correct: true
          - text: "Перший оплата другий гарантія."
            correct: false
          - text: "Оплата. Гарантія. Пункти."
            correct: false
          - text: "Другий - без першого."
            correct: false
        explanation: "Перша частина дає модель для відновлення пропуску."
      - question: "Що треба зробити з фрагментом без базового речення?"
        options:
          - text: "розгорнути або додати опору"
            correct: true
          - text: "назвати його парцеляцією автоматично"
            correct: false
          - text: "прибрати всі прийменники"
            correct: false
          - text: "залишити для договору"
            correct: false
        explanation: "Парцеляція потребує базового речення."
      - question: "Який варіант краще передає нейтральний звіт?"
        options:
          - text: "Рішення ухвалили без дискусії."
            correct: true
          - text: "Рішення ухвалили. Без дискусії."
            correct: false
          - text: "Без дискусії. Рішення."
            correct: false
          - text: "Ухвалили. Без."
            correct: false
        explanation: "Нейтральний звіт уникає зайвої оцінної паузи."
  - type: fill-in
    title: "Терміни модуля"
    instruction: "Вставте потрібний термін."
    items:
      - sentence: "Пропуск відновлюваного компонента речення називається ____."
        answer: "еліпсисом"
        options: ["еліпсисом", "парцелятом", "діалогом", "рефератом"]
        explanation: "Еліпсис стискає речення."
      - sentence: "Винесений після крапки фрагмент речення називається ____."
        answer: "парцелятом"
        options: ["парцелятом", "присудком", "підметом", "сполучником"]
        explanation: "Парцелят залежить від базового речення."
      - sentence: "Стиснення речення без втрати відновлюваного змісту - це синтаксична ____."
        answer: "компресія"
        options: ["компресія", "інверсія", "цитата", "рекламація"]
        explanation: "Компресія означає скорочення структури."
      - sentence: "Окремий фрагмент після базового речення називається ____."
        answer: "парцелят"
        options: ["парцелят", "підмет", "сполучник", "чек"]
