version: '1.0'
module: complex-syntax-ellipsis-parcelling
level: b2
inline: []
workbook:
  - type: critical-analysis
    id: ellipsis-parcelling-analysis
    title: "Аналіз тексту: неповнота і ритм"
    instruction: "Прочитай уривок і поясни, де працює еліпсис, а де парцеляція."
    target_text: >
      Команда завершила обговорення пізно. Надто пізно. Перший розділ пояснював правило, другий - виняток, третій - типові помилки. У протоколі ці паузи прибрали: речення розгорнули, уточнення приєднали, формулювання зробили нейтральними. У публічному дописі редакторка залишила інший ритм. Коротший. Напруженіший. Ближчий до живої розмови.
    questions:
      - "Де в уривку є еліпсис присудка, який можна відновити з першої частини?"
      - "Які фрагменти є парцелятами й яку інтонаційну функцію вони виконують?"
      - "Чому протокол потребує розгорнутішої форми, ніж публічний допис?"
      - "Який фрагмент можна було б об'єднати в одне речення без втрати фактичного змісту?"
    model_answers:
      - "Еліпсис є в реченні **перший розділ пояснював правило, другий - виняток, третій - типові помилки**: у другій і третій частині відновлюється присудок **пояснював**."
      - "Парцелятами є **Надто пізно**, **Коротший**, **Напруженіший**, **Ближчий до живої розмови**. Вони виділяють оцінку й змінюють темп."
      - "Протокол має бути однозначним і нейтральним, тому надмірна парцеляція там може виглядати як емоційне втручання."
      - "Фрагмент **Коротший. Напруженіший. Ближчий до живої розмови** можна об'єднати: **ритм був коротший, напруженіший і ближчий до живої розмови**."

  - type: match-up
    title: "Поєднай термін і дію"
    instruction: "З'єднай поняття з точним поясненням."
    pairs:
      - left: "еліпсис"
        right: "пропуск компонента, який можна відновити"
      - left: "парцеляція"
        right: "розчленування речення на інтонаційні частини"
      - left: "парцелят"
        right: "відокремлений фрагмент, залежний від базового речення"
      - left: "неповне речення"
        right: "речення з пропущеним, але зрозумілим членом"
      - left: "синтаксична компресія"
        right: "стиснення без втрати ключового змісту"
      - left: "тире на місці пропуску"
        right: "пунктуаційний сигнал відновлюваного присудка"
      - left: "діалогічний еліпсис"
        right: "неповна відповідь, зрозуміла з репліки співрозмовника"
      - left: "ситуативний еліпсис"
        right: "пропуск, зрозумілий зі спільної ситуації"
      - left: "контекстуальний еліпсис"
        right: "пропуск, відновлюваний із сусіднього тексту"
      - left: "експресивний ритм"
        right: "темп і напруга, створені короткими фрагментами"
      - left: "жанрова доречність"
        right: "відповідність прийому типу тексту"
      - left: "розгорнення"
        right: "відновлення повної граматичної конструкції"

  - type: group-sort
    title: "Розподіли приклади"
    instruction: "Визнач, що перед тобою: еліпсис, парцеляція, повне речення або помилка."
    groups:
      - name: "Еліпсис"
        items:
          - "Перший розділ пояснює правило, другий - виняток."
          - "Мені каву, будь ласка."
          - "Одна група працює з текстом, інша - з таблицею."
          - "До архіву - завтра."
      - name: "Парцеляція"
        items:
          - "Він повернувся пізно. Мокрий. Мовчазний."
          - "Ми чекали відповіді. Довго. Без пояснень."
          - "Потрібна інструкція. Коротка. Зрозуміла."
          - "Рішення ухвалили. Надто швидко."
      - name: "Повне речення"
        items:
          - "Редакторка скоротила вступ і додала приклади."
          - "Після перевірки комісія ухвалила рішення."
          - "У понеділок команда отримала лист від редактора."
          - "Документи надійшли після обіду."
      - name: "Помилка або невдала неповнота"
        items:
          - "Я йду університет, а брат магазин."
          - "Ми погодилися. І. Пішли далі."
          - "Перший приклад правило, другий виняток."
          - "Після оплати - доставка."

  - type: fill-in
    title: "Віднови пропущений елемент"
    instruction: "Заповни пропуск так, щоб речення було нормативним і стилістично доречним."
    items:
      - sentence: "Перший абзац пояснює правило, другий ____ виняток."
        answer: "-"
        options: ["-", "і", "але", "бо"]
        explanation: "Тире позначає пропущений присудок **пояснює**."
      - sentence: "Я йду до архіву, а вона ____ бібліотеки."
        answer: "до"
        options: ["до", "-", "з", "про"]
        explanation: "Після еліпсису присудка потрібний прийменник не зникає."
      - sentence: "Парцельований фрагмент має спиратися на ____ речення."
        answer: "базове"
        options: ["базове", "випадкове", "службове", "беззмістове"]
        explanation: "Без базового речення парцелят стає уламком."
      - sentence: "У діалозі відповідь «О третій» є ____ реченням."
        answer: "неповним"
        options: ["неповним", "помилковим", "безособовим", "пасивним"]
        explanation: "Відповідь відновлюється з питання про час."
      - sentence: "У технічній інструкції еліпсис часто ____ однозначність."
        answer: "послаблює"
        options: ["послаблює", "підміняє", "відмінює", "захоплює"]
        explanation: "Інструкція потребує повної дії та виконавця."
      - sentence: "Фрагмент «Надто швидко» після речення про рішення є ____."
        answer: "парцелятом"
        options: ["парцелятом", "підметом", "присудком", "звертанням"]
        explanation: "Він залежить від попереднього речення й додає оцінку."
      - sentence: "Еліпсис працює, якщо пропущене слово можна ____."
        answer: "відновити"
        options: ["відновити", "заборонити", "перекласти", "приховати"]
        explanation: "Відновлюваність є головною умовою еліпсису."
      - sentence: "Парцеляція змінює ____ читання."
        answer: "темп"
        options: ["темп", "відмінок", "рід", "число"]
        explanation: "Розчленування створює паузи й акценти."
      - sentence: "У реченні «Мова - інструмент» тире стоїть між ____ і присудком."
        answer: "підметом"
        options: ["підметом", "обставиною", "додатком", "звертанням"]
        explanation: "Присудок виражений іменником, а дієслово-зв'язку пропущено."
      - sentence: "Парцеляція в офіційному протоколі часто звучить надто ____."
        answer: "емоційно"
        options: ["емоційно", "точно", "нейтрально", "документально"]
        explanation: "Протокол потребує нейтральної й однозначної форми."
      - sentence: "Щоб перевірити неповне речення, спершу запиши ____ варіант."
        answer: "повний"
        options: ["повний", "рекламний", "усний", "випадковий"]
        explanation: "Повний варіант показує, чи пропуск безпечний."
      - sentence: "Парцелят не повинен бути службовим словом без ____."
        answer: "опори"
        options: ["опори", "наголосу", "рими", "лапок"]
        explanation: "Окремий фрагмент має мати граматичну й смислову опору."

  - type: select
    title: "Вибери точні твердження"
    instruction: "Познач усі правильні варіанти."
    items:
      - question: "Які твердження правильно описують еліпсис?"
        min_correct: 3
        options:
          - text: "Пропущений компонент має відновлюватися з контексту."
            correct: true
          - text: "Еліпсис завжди є помилкою."
            correct: false
          - text: "Еліпсис може економити повтор."
            correct: true
          - text: "У діалозі еліпсис часто природний."
            correct: true
          - text: "Еліпсис дозволяє втрачати прийменники."
            correct: false
        explanation: "Еліпсис стискає конструкцію, але не руйнує керування."
      - question: "Які твердження правильно описують парцеляцію?"
        min_correct: 3
        options:
          - text: "Парцелят залежить від базового речення."
            correct: true
          - text: "Парцеляція завжди потрібна в протоколі."
            correct: false
          - text: "Парцеляція може створювати акцент."
            correct: true
          - text: "Парцеляція змінює темп читання."
            correct: true
          - text: "Кожне коротке речення є парцеляцією."
            correct: false
        explanation: "Парцеляція є стилістичним розчленуванням, а не просто короткістю."
      - question: "Де тире позначає пропущений присудок?"
        min_correct: 3
        options:
          - text: "Перший розділ пояснює правило, другий - виняток."
            correct: true
          - text: "Одна група працює з текстом, інша - з таблицею."
            correct: true
          - text: "Мова - інструмент мислення."
            correct: false
          - text: "Я до архіву, а вона - до бібліотеки."
            correct: true
          - text: "Після оплати - доставка."
            correct: false
        explanation: "У перших, других і четвертих прикладах відновлюється дія."
      - question: "Які приклади є парцеляцією?"
        min_correct: 3
        options:
          - text: "Ми чекали відповіді. Довго."
            correct: true
          - text: "Він повернувся. Мокрий. Мовчазний."
            correct: true
          - text: "Документи надійшли після обіду."
            correct: false
          - text: "Рішення ухвалили. Без обговорення."
            correct: true
          - text: "Команда працювала з текстом."
            correct: false
        explanation: "Парцелят відокремлює залежну деталь від базового речення."
      - question: "Де неповнота є помилкою?"
        min_correct: 3
        options:
          - text: "Я йду університет."
            correct: true
          - text: "Брат - у магазин."
            correct: false
          - text: "Ми погодилися. І."
            correct: true
