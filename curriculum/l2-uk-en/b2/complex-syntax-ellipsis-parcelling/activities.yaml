  - type: unjumble
    title: "Склади нормативне речення"
    instruction: "Віднови порядок слів і пунктуаційний сигнал."
    items:
      - words: ["Перший", "розділ", "пояснює", "правило", "другий", "-", "виняток"]
        answer: "Перший розділ пояснює правило, другий - виняток."
      - words: ["Я", "йду", "до", "архіву", "а", "вона", "-", "до", "бібліотеки"]
        answer: "Я йду до архіву, а вона - до бібліотеки."
      - words: ["Команда", "працювала", "з", "текстом", "інша", "-", "з", "таблицею"]
        answer: "Команда працювала з текстом, інша - з таблицею."
      - words: ["Парцеляція", "-", "це", "стилістичне", "розчленування", "речення"]
        answer: "Парцеляція - це стилістичне розчленування речення."
      - words: ["Парцелят", "має", "спиратися", "на", "базове", "речення"]
        answer: "Парцелят має спиратися на базове речення."
      - words: ["У", "протоколі", "краще", "розгорнути", "неповну", "конструкцію"]
        answer: "У протоколі краще розгорнути неповну конструкцію."
      - words: ["Еліпсис", "економить", "повтор", "але", "не", "руйнує", "керування"]
        answer: "Еліпсис економить повтор, але не руйнує керування."
      - words: ["Пауза", "має", "додавати", "акцент", "а", "не", "хаос"]
