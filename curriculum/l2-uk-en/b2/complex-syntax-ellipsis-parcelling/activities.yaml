      - question: "Які дії допомагають перевірити еліпсис?"
        min_correct: 3
        options:
          - text: "відновити повний варіант"
            correct: true
          - text: "перевірити прийменники"
            correct: true
          - text: "знайти джерело відновлення"
            correct: true
          - text: "прибрати всі тире"
            correct: false
          - text: "розірвати речення на більше фрагментів"
            correct: false
        explanation: "Еліпсис має бути відновлюваним і граматично безпечним."
      - question: "Які дії допомагають перевірити парцеляцію?"
        min_correct: 3
        options:
          - text: "знайти базове речення"
            correct: true
          - text: "пояснити функцію паузи"
            correct: true
          - text: "зіставити з повним варіантом"
            correct: true
