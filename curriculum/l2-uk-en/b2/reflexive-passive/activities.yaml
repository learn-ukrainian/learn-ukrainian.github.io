- type: essay-response
  id: client-request-procedure
  title: 'Письмо: інструкція для нових співробітників'
  instruction: Напишіть коротку службову інструкцію українською й свідомо розподіліть процес, результат і відповідальність.
  prompt: Складіть інструкцію для нових співробітників про те, як у вашій компанії обробляються запити клієнтів. Напишіть щонайменше 170 слів. Використайте щонайменше п'ять бездіячевих зворотних дієслів у пасивному значенні для опису регулярної процедури, один активний фрагмент із названим відповідальним працівником і один підсумковий результативний фрагмент на -но, -то. Не вживайте конструкцій на -ся з персональним діячем в орудному відмінку.
  min_words: 170
  model_answer: 'Кожен вхідний запит спочатку реєструється в електронній системі й автоматично позначається за темою звернення. Після реєстрації повідомлення передається до відповідного підрозділу, а контактні дані клієнта перевіряються перед подальшим опрацюванням. Якщо у зверненні бракує інформації, клієнтові надсилається короткий запит на уточнення. Стандартні звернення опрацьовуються в порядку надходження, а термінові випадки передаються керівникові зміни без черги. Спірні питання розглядаються окремо, щоб відповідь формулювалася на підставі повних даних. Після перевірки профільний менеджер готує остаточну відповідь і погоджує її з керівником відділу, якщо цього вимагає тема звернення. Наприкінці роботи результат зафіксовано в системі, а клієнтові надіслано повідомлення про завершення опрацювання. Така модель допомагає уникнути плутанини: процедура описується без зайвих персоналій, але відповідальний працівник називається там, де це справді важливо. У внутрішньому описі процедури пасивні
    форми на -ся доречні там, де важлива повторювана послідовність дій, а не конкретний працівник: запит реєструється, повідомлення передається, дані перевіряються. Водночас відповідальність не слід приховувати, коли рішення залежить від посадової особи. Тому в останньому етапі краще перейти до активної конструкції: менеджер готує відповідь, керівник погоджує її, служба підтримки надсилає клієнтові підсумкове повідомлення. Такий баланс допомагає текстові залишатися офіційним, але не безособово туманним.'
  rubric:
  - criteria: Нормативність пасивного -ся
    description: Процедурні форми на -ся вжито доречно, без персонального діяча в орудному відмінку.
    points: 4
  - criteria: Керування фокусом
    description: Текст виразно розрізняє процес, названого виконавця й завершений результат.
    points: 4
  - criteria: Офіційно-діловий регістр
    description: Інструкція звучить як зрілий службовий текст без кальок і штучної канцелярщини.
    points: 2
