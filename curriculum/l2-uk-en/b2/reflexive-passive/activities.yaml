version: '1.0'
module: reflexive-passive
level: b2
inline: []
workbook:
- type: select
  title: Виберіть нормативні варіанти
  instruction: Позначте речення, які природно передають потрібний фокус.
  items:
  - question: Які речення природно описують процедуру без названого виконавця?
    min_correct: 2
    options:
    - text: Запит реєструється в електронній системі.
      correct: true
    - text: Дані перевіряються перед публікацією.
      correct: true
    - text: Відповідь готується менеджером.
      correct: false
    - text: Заявка обробляється оператором.
      correct: false
    explanation: Пасивне -ся нормативне без названого персонального виконавця в орудному відмінку.
  - question: Які варіанти треба вибрати, якщо важливо назвати відповідального діяча?
    min_correct: 2
    options:
    - text: Комісія ухвалює рішення.
      correct: true
    - text: Менеджер перевіряє заявку.
      correct: true
    - text: Рішення ухвалюється комісією.
      correct: false
    - text: Заявка перевіряється менеджером.
      correct: false
    explanation: Коли діяч важливий, він має бути підметом активного речення.
  - question: Які речення НЕ є пасивними, хоча мають дієслово на -ся?
    min_correct: 3
    options:
    - text: Дитина вмивається перед сніданком.
      correct: true
    - text: Колеги вітаються в коридорі.
      correct: true
    - text: Працівник готується до зустрічі.
      correct: true
    - text: Звіти готуються до засідання.
      correct: false
    explanation: Вмиватися, вітатися й готуватися тут мають власне-зворотне або взаємне значення.
  - question: Які речення краще повідомляють завершений результат?
    min_correct: 2
    options:
    - text: Заявку зареєстровано.
      correct: true
    - text: Дані перевірено.
      correct: true
    - text: Заявка реєструється адміністратором.
      correct: false
    - text: Дані перевіряються аналітиком.
      correct: false
    explanation: Форми на -но, -то стисло фіксують результат без названого виконавця.
  - question: Які варіанти природні для офіційної інструкції?
    min_correct: 2
    options:
    - text: Повідомлення надсилається після перевірки даних.
      correct: true
    - text: Запити обробляються в порядку надходження.
      correct: true
    - text: Повідомлення надсилається адміністратором.
      correct: false
    - text: Запити обробляються службою підтримки.
      correct: false
    explanation: В інструкції природний бездіячевий опис процедури, але не орудний виконавця.
  - question: Які речення правильно розрізняють канал і виконавця?
    min_correct: 2
    options:
    - text: Культурні цінності транслюються через медійні канали.
      correct: true
    - text: Медіа транслюють культурні цінності.
      correct: true
    - text: Культурні цінності транслюються медіа.
      correct: false
    - text: Цінності транслюються редакторами щодня.
      correct: false
    explanation: Через медійні канали називає шлях передавання, а медіа як діяч потребують активу.
  - question: Які варіанти природні для короткого звіту про вже виконану роботу?
    min_correct: 2
    options:
    - text: Заявку зареєстровано.
      correct: true
    - text: Відповідь надіслано клієнтові.
      correct: true
    - text: Заявка реєструється оператором.
      correct: false
    - text: Відповідь надсилається менеджером.
      correct: false
    explanation: У звіті про результат природні форми на -но, -то без названого виконавця.
  - question: Які речення краще зберегти як активні?
    min_correct: 2
    options:
    - text: Я надсилаю оновлений файл.
      correct: true
    - text: Команда розробляє регламент.
      correct: true
    - text: Файл надсилається мною.
      correct: false
    - text: Регламент розробляється командою.
      correct: false
    explanation: Коли діяч прямо названий і важливий, активна конструкція точніша.
- type: fill-in
  title: Доберіть форму за фокусом
  instruction: Оберіть форму, яка відповідає змісту й стилю речення.
  items:
  - sentence: Усі звернення ____ в базі даних у день надходження.
    answer: реєструються
    options:
    - реєструються
    - реєструються оператором
    - зареєстрований
    - реєструючі
    explanation: Регламент описує регулярний процес без названого виконавця.
  - sentence: Оператор ____ звернення після перевірки контактних даних.
    answer: реєструє
    options:
    - реєструє
    - реєструється
    - зареєстровано
    - реєструючись
    explanation: Оператор названий як діяч, тому потрібен актив.
  - sentence: Після реєстрації дані ____ перед підготовкою відповіді.
    answer: перевіряються
    options:
    - перевіряються
    - перевіряються менеджером
    - перевірений
    - перевіряючі
    explanation: Процедура без названого персонального виконавця може мати форму на -ся.
  - sentence: Менеджер ____ дані, якщо в заявці є неточності.
    answer: перевіряє
    options:
    - перевіряє
    - перевіряється
    - перевірено
    - перевірюваний менеджером
    explanation: Названий менеджер є підметом активного речення.
  - sentence: Проєкт бюджету ____ протягом кількох етапів.
    answer: розробляється
    options:
    - розробляється
    - розробляється урядом
    - розроблений урядом
    - розробляючийся
    explanation: Речення фокусує процес і не називає виконавця.
  - sentence: Уряд ____ проєкт бюджету перед поданням до парламенту.
    answer: розробляє
    options:
    - розробляє
    - розробляється
    - розроблено
    - розроблюваний
    explanation: Уряд є названим інституційним діячем, тому потрібен актив.
  - sentence: Готовий звіт ____ до архіву після засідання.
    answer: передається
    options:
    - передається
    - передається секретарем
    - передавальний
    - передаючийся
    explanation: Бездіячеве речення описує крок процедури.
  - sentence: Секретар ____ готовий звіт до архіву після засідання.
    answer: передає
    options:
    - передає
    - передається
    - передано
    - переданий секретарем
    explanation: Коли секретар названий, актив звучить природніше.
  - sentence: Після завершення перевірки клієнтові ____ коротке повідомлення.
    answer: надсилається
    options:
    - надсилається
    - надсилається консультантом
    - надіслано консультантом
    - надсилаючийся
    explanation: Речення описує стандартний крок процедури без названого виконавця.
  - sentence: Консультант ____ клієнтові коротке повідомлення після перевірки.
    answer: надсилає
    options:
    - надсилає
    - надсилається
    - надіслано
    - надсилальний
    explanation: Консультант названий як виконавець, тому потрібна активна форма.
- type: group-sort
  title: Розрізніть значення дієслів на -ся
  instruction: Розкладіть приклади за типом значення.
  groups:
  - name: Пасивне значення
    items:
    - Заявки реєструються в системі.
    - Дані обробляються перед публікацією.
    - Пропозиції обговорюються на засіданні.
    - Повідомлення надсилаються автоматично.
    - Сировина готується до ферментації.
  - name: Власне-зворотне значення
    items:
    - Дитина вмивається вранці.
    - Працівник готується до співбесіди.
    - Студент зосереджується перед іспитом.
    - Автор помиляється в даті.
    - Клієнт реєструється на сайті.
  - name: Взаємно-зворотне значення
    items:
    - Колеги вітаються біля входу.
    - Учасники знайомляться перед тренінгом.
    - Сторони домовляються про умови.
    - Друзі листуються щотижня.
    - Команди змагаються у фіналі.
  - name: Автономна зміна або властивість
    items:
    - Двері відчиняються автоматично.
    - Хліб кришиться після висихання.
    - Кава охолоджується на столі.
    - Система оновлюється вночі.
    - Екран вимикається через п'ять хвилин.
- type: error-correction
  title: Виправте пасив із названим виконавцем
  instruction: Знайдіть помилковий елемент і виберіть природну перебудову.
  items:
  - sentence: Завдання виконується студентом до п'ятниці.
    error: виконується студентом
    answer: студент виконує
    options:
    - студент виконує
    - виконується студентом
    - виконане студентом
    - виконуючись студентом
    explanation: Студент є виконавцем, тому має бути підметом активного речення.
  - sentence: Відповідь готується профільним відділом після перевірки.
    error: готується профільним відділом
    answer: профільний відділ готує
    options:
    - профільний відділ готує
    - готується профільним відділом
    - готуючий відділ
    - приготована профільним відділом
    explanation: Відділ названо як виконавця, тому природний актив.
  - sentence: Правила пояснюються викладачем на початку заняття.
    error: пояснюються викладачем
    answer: викладач пояснює
    options:
    - викладач пояснює
    - пояснюються викладачем
    - пояснено викладачем
    - пояснюючий викладач
    explanation: Особова дія викладача потребує активної конструкції.
  - sentence: Рішення ухвалюється комісією після обговорення.
    error: ухвалюється комісією
    answer: комісія ухвалює
    options:
    - комісія ухвалює
    - ухвалюється комісією
    - приймається комісією
    - ухвалюючись комісією
    explanation: Комісія є інституційним діячем; її треба зробити підметом.
  - sentence: Арія виконується відомим співаком у другій дії.
    error: виконується відомим співаком
    answer: відомий співак виконує
    options:
    - відомий співак виконує
    - виконується відомим співаком
    - виконана відомим співаком
    - виконуючася співаком
    explanation: Коли співак важливий як виконавець, потрібен актив.
  - sentence: Проєкт розробляється командою протягом місяця.
    error: розробляється командою
    answer: команда розробляє
    options:
    - команда розробляє
    - розробляється командою
    - розробляючись командою
    - розроблений командою
    explanation: Команда є названим виконавцем, тому актив природніший.
  - sentence: Заявка обробляється менеджером у день надходження.
    error: обробляється менеджером
    answer: менеджер обробляє
    options:
    - менеджер обробляє
    - обробляється менеджером
    - оброблено менеджером
    - оброблювана менеджером
    explanation: Менеджер має бути підметом, якщо він важливий для змісту.
  - sentence: Культурні цінності транслюються редакторами через медіа.
    error: транслюються редакторами
    answer: редактори транслюють
    options:
    - редактори транслюють
    - транслюються редакторами
    - транслюючись редакторами
    - трансльовані редакторами
    explanation: Редактори є персональними діячами; для них потрібна активна будова.
- type: match-up
  title: Фокус і найкраща граматична форма
  instruction: Зіставте комунікативну потребу з природним реченням.
  pairs:
  - left: Описати регулярну процедуру без виконавця
    right: Запити обробляються в порядку надходження.
  - left: Повідомити завершений результат
    right: Запит оброблено.
  - left: Назвати відповідального працівника
    right: Менеджер обробляє запит.
  - left: Узагальнити дію без конкретного діяча
    right: Такі запити обробляють протягом дня.
  - left: Показати автономну роботу системи
    right: Повідомлення надсилається автоматично.
  - left: Назвати інституційного діяча
    right: Парламент ухвалює остаточне рішення.
  - left: Описати технологічний процес
    right: Сировина перемішується до рівномірної консистенції.
  - left: Передати взаємну дію
    right: Учасники знайомляться перед тренінгом.
  - left: Передати власне-зворотну дію
    right: Працівник готується до співбесіди.
  - left: Показати готовий офіційний підсумок
    right: Дані перевірено перед публікацією.
  - left: Підкреслити відкриту відповідальність
    right: Редакція публікує матеріал після перевірки.
  - left: Описати суспільний процес без одного автора
    right: Ідентичність формується через мову й пам'ять.
- type: quiz
  title: Швидка редакторська діагностика
  instruction: Оберіть найкращий варіант для кожної ситуації.
  items:
  - question: Як найкраще сказати, якщо важливо назвати виконавця перевірки?
    options:
    - text: Аналітик перевіряє дані.
      correct: true
    - text: Дані перевіряються аналітиком.
      correct: false
    - text: Дані перевіряються.
      correct: false
    - text: Перевіряючий аналітик дані.
      correct: false
    explanation: Названий аналітик має бути підметом активного речення.
  - question: Яке речення найкраще підходить для регламенту без названого виконавця?
    options:
    - text: Запити обробляються в порядку надходження.
      correct: true
    - text: Запити обробляються працівниками.
      correct: false
    - text: Працівники обробляються запитами.
      correct: false
    - text: Запитами обробляються працівники.
      correct: false
    explanation: Регламент може фокусувати процес, але не додає виконавця в орудному.
  - question: Яка форма найкраще повідомляє готовий результат?
    options:
    - text: Дані перевірено.
      correct: true
    - text: Дані перевіряються менеджером.
      correct: false
    - text: Дані перевіряючі.
      correct: false
    - text: Дані перевіряються мною.
      correct: false
    explanation: Форма на -но стисло передає результат.
  - question: Яке речення має взаємно-зворотне значення?
    options:
    - text: Колеги радяться перед зустріччю.
      correct: true
    - text: Звіт готується до засідання.
      correct: false
    - text: Дані перевіряються перед публікацією.
      correct: false
    - text: Повідомлення надсилається автоматично.
      correct: false
    explanation: Радитися означає взаємну дію учасників.
  - question: Яке речення краще для дружнього листа від автора дії?
    options:
    - text: Я надішлю файл завтра.
      correct: true
    - text: Файл надсилатиметься мною завтра.
      correct: false
    - text: Файл надсилається автором завтра.
      correct: false
    - text: Мною файл надсилатиметься завтра.
      correct: false
    explanation: Коли автор дії говорить про себе, актив звучить природно.
  - question: Який варіант найточніше описує канал передавання цінностей?
    options:
    - text: Цінності передаються через освіту й медіа.
      correct: true
    - text: Цінності передаються освітянами й редакторами.
      correct: false
    - text: Освітянами передаються цінності.
      correct: false
    - text: Цінності передаючіся медіа.
      correct: false
    explanation: Через освіту й медіа називає канали, а не персонального виконавця.
  - question: Як найкраще сказати, якщо важлива роль парламенту?
    options:
    - text: Парламент ухвалює остаточне рішення.
      correct: true
    - text: Остаточне рішення ухвалюється парламентом.
      correct: false
    - text: Парламентом ухвалюється остаточне рішення.
      correct: false
    - text: Остаточне рішення ухвалюючеся парламентом.
      correct: false
    explanation: Інституційний діяч має бути підметом активного речення.
  - question: Яке речення найкраще описує технологічний етап без виконавця?
    options:
    - text: Суміш перемішується до рівномірної консистенції.
      correct: true
    - text: Суміш перемішується працівником.
      correct: false
    - text: Працівником перемішується суміш.
      correct: false
    - text: Суміш перемішуючася працівником.
      correct: false
    explanation: Технологічний опис може фокусувати процес без персонального діяча.
  - question: Яке речення найкраще розрізняє властивість предмета?
    options:
    - text: Хліб кришиться після висихання.
      correct: true
    - text: Хліб кришиться пекарем.
      correct: false
    - text: Пекарем кришиться хліб.
      correct: false
