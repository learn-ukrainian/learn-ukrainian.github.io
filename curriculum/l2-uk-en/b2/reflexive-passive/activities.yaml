version: '1.0'
module: reflexive-passive
level: b2
inline:
  - id: act-1
    type: comparative-study
    title: Процедура чи відповідальний діяч
    instruction: Порівняйте речення й визначте, яке треба перебудувати.
    items_to_compare:
      - "Звернення реєструється в електронній системі."
      - "Менеджер реєструє звернення."
      - "Звернення реєструється менеджером."
      - "Звернення зареєстровано."
    criteria:
      - процедура
      - активний діяч
      - калька з орудним діячем
      - завершений результат
    prompt: "Яке речення не варто залишати в нейтральному нормативному тексті?"
    model_answer: >-
      **Звернення реєструється менеджером** треба перебудувати, бо менеджер є
      особовим діячем. Краще: **менеджер реєструє звернення**. Інші речення
      мають природний фокус: процедура, актив або результат.
  - id: act-2
    type: critical-analysis
    title: Розпізнайте значення -ся
    instruction: Визначте тип кожної форми на -ся.
    target_text: >-
      Документи перевіряються перед підписанням. Дитина вмивається перед школою.
      Колеги вітаються після наради. Кава охолоджується на столі. Двері
      відчиняються автоматично.
    questions:
      - "Де форма має пасивне значення?"
      - "Де форма є власне-зворотною або взаємною?"
      - "Де йдеться про автономну зміну або механізм?"
    model_answers:
      - "Пасивне значення: документи перевіряються."
      - "Власне-зворотне: дитина вмивається; взаємне: колеги вітаються."
      - "Автономна зміна: кава охолоджується; механізм: двері відчиняються автоматично."
  - id: act-3
    type: critical-analysis
    title: Орудний діяча
    instruction: Знайдіть особових або інституційних діячів в орудному й перебудуйте речення.
    target_text: >-
      Книга читається студентом. Бюджет розробляється урядом. Двері відчиняються
      карткою. Відповідь готується відділом. Форма заповнюється латиницею.
    questions:
      - "Які орудні називають діяча?"
      - "Які орудні називають інструмент або спосіб?"
      - "Як переписати ненормативні речення?"
    model_answers:
      - "Діячі: студентом, урядом, відділом."
      - "Інструмент або спосіб: карткою, латиницею."
      - "Краще: студент читає книгу; уряд розробляє бюджет; відділ готує відповідь."
  - id: act-4
    type: comparative-study
    title: Чотири моделі одного факту
    instruction: Порівняйте фокус у реченнях про перевірку даних.
    items_to_compare:
      - "Дані перевіряються перед публікацією."
      - "Дані перевірено."
      - "Аналітики перевірили дані."
      - "Дані перевіряють перед публікацією."
      - "Перевірені дані додали до звіту."
    criteria:
      - процедура
      - результат
      - відповідальний діяч
      - дія без названого виконавця
      - ознака предмета
    prompt: "Яку форму вибрати для регламенту, а яку для звіту про виконану роботу?"
    model_answer: >-
      Для регламенту природне **дані перевіряються** або **дані перевіряють**.
      Для звіту про виконану роботу доречне **дані перевірено**. Якщо важливі
      аналітики, потрібен актив.
  - id: act-5
    type: critical-analysis
    title: Відредагуйте службовий абзац
    instruction: Приберіть зайві форми на -ся й поясніть вибір.
    target_text: >-
      Надання відповіді здійснюється відділом протягом п'яти днів. Заявки
      обробляються менеджерами в порядку надходження. Після перевірки дані
      надсилаються клієнтам автоматично.
    questions:
      - "Де названий діяч має стати підметом?"
      - "Де можна залишити форму на -ся?"
      - "Де неозначено-особова модель звучить природніше?"
    model_answers:
      - "Відділ надає відповідь протягом п'яти днів."
      - "Дані надсилаються клієнтам автоматично можна залишити як опис процедури."
      - "Заявки обробляють у порядку надходження звучить легше, ніж обробляються менеджерами."
workbook:
  - type: group-sort
    title: Значення форм на -ся
    instruction: Розподіліть приклади за значенням.
    groups:
      - name: "Пасивне або процедурне"
        items:
          - "заявки обробляються"
          - "матеріали надсилаються"
          - "температура контролюється"
      - name: "Власне-зворотне або взаємне"
        items:
          - "дитина вмивається"
          - "колеги вітаються"
          - "учасники домовляються"
      - name: "Стан, механізм або автономна зміна"
        items:
          - "кава охолоджується"
          - "двері відчиняються автоматично"
          - "фарба висихає"
  - id: wb-2
    type: critical-analysis
    title: Заборонений орудний діяча
    instruction: Перебудуйте речення з названим виконавцем.
    target_text: >-
      Бюджет розробляється урядом. Звіт готується аналітиками. Книга читається
      студентом. Рішення ухвалюється комісією. Відповідь готується відділом.
    questions:
      - "Які слова називають особового або інституційного діяча?"
      - "Як їх зробити підметами активних речень?"
      - "Де можливе неозначено-особове речення без діяча?"
    model_answers:
      - "Урядом, аналітиками, студентом, комісією, відділом."
      - "Уряд розробляє бюджет; аналітики готують звіт; студент читає книгу; комісія ухвалює рішення; відділ готує відповідь."
      - "Звіт готують або відповідь готують можливі, якщо діяч не важливий."
  - id: wb-3
    type: critical-analysis
    title: Доберіть модель за фокусом
    instruction: Поясніть, яка граматична модель відповідає кожній потребі.
    target_text: >-
      Процедура: заявки обробляються щодня. Результат: заявку оброблено. Діяч:
      менеджер обробляє заявку. Жива дія без діяча: заявки обробляють щодня.
      Ознака предмета: оброблена заявка лежить у теці.
    questions:
      - "Яка форма показує процедуру?"
      - "Яка форма показує завершений результат?"
      - "Коли потрібен актив, а коли неозначено-особове речення?"
    model_answers:
      - "Процедуру показує форма на -ся: заявки обробляються."
      - "Результат показує форма на -но: заявку оброблено."
      - "Актив потрібен для менеджера; неозначено-особове заявки обробляють потрібне без названого діяча."
  - id: wb-4
    type: critical-analysis
    title: Нормативний вибір
    instruction: Виберіть природну модель для кожної потреби.
    target_text: >-
      Треба назвати відповідального діяча. Треба описати процедуру без діяча.
      Треба зафіксувати завершений результат.
    questions:
      - "Яке речення називає відповідального діяча?"
      - "Яке речення описує процедуру без діяча?"
      - "Яке речення фіксує завершений результат?"
    model_answers:
      - "Комісія ухвалює рішення."
      - "Запити розглядаються в порядку надходження."
      - "Запит розглянуто."
  - id: wb-5
    type: critical-analysis
    title: Редакторський коментар
    instruction: Напишіть коротке пояснення, чому речення треба або не треба редагувати.
    target_text: >-
      Двері відчиняються карткою. Заявки обробляються менеджерами. Дані
      перевіряються автоматично. Відповідь готується профільним відділом.
    questions:
      - "Які речення можна залишити?"
      - "Які треба перебудувати?"
      - "Який принцип пояснює різницю?"
    model_answers:
      - "Можна залишити: двері відчиняються карткою; дані перевіряються автоматично."
      - "Треба перебудувати: менеджери обробляють заявки; профільний відділ готує відповідь."
      - "Інструмент або спосіб допустимі; названий особовий чи інституційний діяч потребує активу."
