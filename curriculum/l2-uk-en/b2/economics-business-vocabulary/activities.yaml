- type: fill-in
  title: Точний термін
  instruction: Заповніть пропуск доречним економічним або бізнесовим словом.
  items:
    - sentence: "____ показує надходження, але не враховує всі витрати."
      answer: дохід
      options:
        - дохід
        - збитки
        - рекрутинг
        - застава
      explanation: Дохід є надходженням, а прибуток рахується після витрат.
    - sentence: "Якщо витрати перевищують доходи, компанія може мати ____."
      answer: збитки
      options:
        - збитки
        - дивіденди
        - субсидію
        - бренд
      explanation: Збитки означають негативний фінансовий результат.
    - sentence: "Уряд пояснив зміну ____ потребою фінансувати видатки."
      answer: податків
      options:
        - податків
        - аутсорсингу
        - логотипів
        - вакансій
      explanation: Податки пов'язані з бюджетними надходженнями.
    - sentence: "Стартап залучив ____ для масштабування продукту."
      answer: інвестиції
      options:
        - інвестиції
        - інфляцію
        - безробіття
        - видатки
      explanation: Інвестиції можуть фінансувати розвиток.
    - sentence: "Компанія виходить на новий ____ після дослідження попиту."
      answer: ринок
      options:
        - ринок
        - аудит
        - депозит
        - лікарняний
      explanation: Ринок описує середовище попиту й пропозиції.
    - sentence: "Державний ____ має доходи, видатки й можливий дефіцит."
      answer: бюджет
      options:
        - бюджет
        - стартап
        - бренд
        - портфель
      explanation: Бюджет планує рух публічних коштів.
    - sentence: "____ розрахував собівартість і ризики перед запуском."
      answer: підприємець
      options:
        - підприємець
        - облігація
        - дивіденд
        - інфляція
      explanation: Підприємець організовує бізнес і бере ризик.
    - sentence: "____ впливає на купівельну спроможність."
      answer: інфляція
      options:
        - інфляція
        - брендинг
        - рекрутинг
        - застава
      explanation: Інфляція пов'язана зі зміною цін.
    - sentence: "Банк оцінює ____ перед наданням кредиту."
      answer: заставу
      options:
        - заставу
        - рекламу
        - вакансію
        - субсидію
      explanation: Застава зменшує ризик кредитора.
    - sentence: "Компанія пройшла незалежний ____ фінансової звітності."
      answer: аудит
      options:
        - аудит
        - попит
        - бонус
        - стартап
      explanation: Аудит перевіряє дані або процеси.

- type: fill-in
  title: Ділове переформулювання
  instruction: Замініть розмовне або неточне слово професійним формулюванням.
  items:
    - sentence: "Компанія не просто 'класно заробила', а отримала ____."
      answer: прибуток
      options:
        - прибуток
        - безробіття
        - ліквідність
        - заставу
      explanation: Прибуток є точним фінансовим результатом.
    - sentence: "Замість 'ринок провалився' краще сказати: ____ зменшився."
      answer: попит
      options:
        - попит
        - рекрутинг
        - соціальний пакет
        - CVV-код
      explanation: Треба назвати конкретний показник.
    - sentence: "Замість 'людей прибрали' в трудовому тексті пишуть: оголосили ____ штату."
      answer: скорочення
      options:
        - скорочення
        - капіталізацію
        - депозит
        - дивіденди
      explanation: Скорочення штату є точнішим трудовим формулюванням.
    - sentence: "Замість 'ідея точно зайде' краще сказати: гіпотезу перевірять на ____."
      answer: ринку
      options:
        - ринку
        - лікарняному
        - миті
        - заставі
      explanation: Бізнесова гіпотеза потребує перевірки на ринку.
    - sentence: "Замість 'банк дав гроші' професійніше: банк надав ____."
      answer: кредит
      options:
        - кредит
        - бренд
        - попит
        - аудит
      explanation: Кредит має умови повернення.
    - sentence: "Замість 'перевірили бухгалтерію' точніше: провели ____ звітності."
      answer: аудит
      options:
        - аудит
        - інфляцію
        - рекламу
        - фріланс
      explanation: Аудит є незалежною перевіркою.
    - sentence: "Замість 'віддали роботу комусь' ділово: передали функцію на ____."
      answer: аутсорсинг
      options:
        - аутсорсинг
        - дефіцит
        - дивіденд
        - ставку
      explanation: Аутсорсинг описує передання функції зовнішньому виконавцю.
    - sentence: "Замість 'працівник став сильнішим' у професійному тексті: працівник підвищив ____."
      answer: кваліфікацію
      options:
        - кваліфікацію
        - інфляцію
        - дефіцит
        - капіталізацію
      explanation: Кваліфікацію можна підвищувати через навчання й практику.
    - sentence: "Замість 'компанія стала дорожчою на біржі' точніше: зросла її ____."
      answer: капіталізація
      options:
        - капіталізація
        - відпустка
        - застава
        - кваліфікація
      explanation: Капіталізація описує ринкову вартість компанії.
    - sentence: "Замість 'грошей не вистачило в бюджеті' точніше: виник ____ бюджету."
      answer: дефіцит
      options:
        - дефіцит
        - брендинг
        - рекрутинг
        - дивіденд
      explanation: Дефіцит бюджету виникає, коли видатки перевищують доходи.

- type: true-false
  title: Фінансові відмінності
  instruction: Позначте, чи твердження точне.
  items:
    - statement: Дохід автоматично означає прибуток.
      correct: false
      explanation: Прибуток рахується після витрат.
    - statement: Видатки бюджету і витрати компанії належать до різних регістрів.
      correct: true
      explanation: У публічних фінансах кажуть "видатки бюджету".
    - statement: Акція і облігація мають однакову правову природу.
      correct: false
      explanation: Акція пов'язана з часткою власності, облігація - із борговим зобов'язанням.
    - statement: Рентабельність допомагає оцінити ефективність бізнесу.
      correct: true
      explanation: Вона пов'язує результат із витратами або ресурсами.
    - statement: Аудит є рекламою компанії.
      correct: false
      explanation: Аудит перевіряє дані або процеси.
    - statement: Попит і пропозиція можуть описувати ринок праці.
      correct: true
      explanation: Роботодавці формують попит, працівники - пропозицію праці.
    - statement: Облікова ставка може впливати на кредити й депозити.
      correct: true
      explanation: Це інструмент монетарної політики.
    - statement: Інвестиції гарантують прибуток.
      correct: false
      explanation: Інвестиції завжди мають ризик.
    - statement: Соціальний пакет може бути частиною пропозиції роботодавця.
      correct: true
      explanation: Це елемент умов праці.
    - statement: Дефіцит бюджету не потребує джерел фінансування.
      correct: false
      explanation: Дефіцит треба покривати певними джерелами.

- type: error-correction
  title: Виправлення бізнесового регістру
  instruction: Виправте неточне або надто розмовне формулювання.
  items:
    - sentence: "Компанія заробила багато доходу, отже прибуток гарантований."
      error: "прибуток гарантований"
      answer: "прибуток треба рахувати після витрат"
      error_type: phrase
      explanation: Дохід не гарантує прибутку.
    - sentence: "Бюджет витратив гроші на освіту."
      error: "витратив гроші"
      answer: "передбачив видатки"
      error_type: register
      explanation: У публічних фінансах доречне слово "видатки".
    - sentence: "Інвестор купив облігацію і став власником частки компанії."
      error: "став власником частки компанії"
      answer: "став кредитором емітента за умовами облігації"
      error_type: phrase
      explanation: Частка власності пов'язана з акціями.
    - sentence: "Податки завжди тільки заважають економіці."
      error: "завжди тільки заважають"
      answer: "мають вплив, який треба оцінювати за ставкою, базою та метою"
      error_type: construction
      explanation: Економічний текст не має робити необґрунтовані абсолютні висновки.
    - sentence: "Ринок просто впав, і цього досить для звіту."
      error: "просто впав"
      answer: "треба назвати показник: попит, продаж, ціна або капіталізація зменшилися"
      error_type: phrase
      explanation: Потрібно вказувати конкретний показник.
    - sentence: "Працівників прибрали, бо так захотіли."
      error: "прибрали"
      answer: "оголосили скорочення штату або змінили умови зайнятості"
      error_type: register
      explanation: Ринок праці потребує точного трудового формулювання.
    - sentence: "Стартап точно стане успішним, бо отримав інвестиції."
      error: "точно стане успішним"
      answer: "отримав фінансування, але має перевірити бізнес-модель і ризики"
      error_type: construction
      explanation: Інвестиції не гарантують успіху.
    - sentence: "Аудит сказав, що бренд дуже класний."
      error: "бренд дуже класний"
      answer: "аудит перевірив дані, процеси або звітність"
      error_type: phrase
      explanation: Аудит не є емоційною оцінкою бренду.

