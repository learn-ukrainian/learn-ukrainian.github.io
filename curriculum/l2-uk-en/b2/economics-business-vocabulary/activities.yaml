version: '1.0'
module: economics-business-vocabulary
level: b2
inline:
  - type: quiz
    title: "Макропоказник чи висновок"
    instruction: "Оберіть формулювання, яке найточніше описує економічний показник або межу висновку."
    items:
      - question: "Що найточніше описує ВВП?"
        options:
          - text: "обсяг вироблених товарів і послуг за певний період"
            correct: true
          - text: "сума всіх кредитів у банках"
            correct: false
          - text: "прибуток державного бюджету"
            correct: false
          - text: "ціна однієї акції"
            correct: false
        explanation: "ВВП описує економічну активність, а не бюджетний прибуток або біржову ціну."
      - question: "Яка фраза найкраще враховує інфляцію?"
        options:
          - text: "номінальна зарплата зросла, але реальна купівельна спроможність залежить від цін"
            correct: true
          - text: "зарплата зросла, тому всі стали багатшими"
            correct: false
          - text: "інфляція не впливає на домогосподарства"
            correct: false
          - text: "ціни зросли, отже ВВП автоматично впав"
            correct: false
        explanation: "Потрібно розрізняти номінальну суму й реальну купівельну спроможність."
      - question: "Що означає дефіцит бюджету?"
        options:
          - text: "видатки перевищують доходи за певний період"
            correct: true
          - text: "держава не має жодних податків"
            correct: false
          - text: "компанія працює без прибутку"
            correct: false
          - text: "банк не видає кредити"
            correct: false
        explanation: "Дефіцит бюджету стосується державних доходів і видатків."
      - question: "Яке дієслово найточніше для статистичної служби?"
        options:
          - text: "оприлюднює дані"
            correct: true
          - text: "ухвалює бюджет"
            correct: false
          - text: "зберігає облікову ставку"
            correct: false
          - text: "випускає дивіденди"
            correct: false
        explanation: "Статистична служба публікує дані, а не ухвалює політичні рішення."
      - question: "Яка фраза обережна для макроекономічної новини?"
        options:
          - text: "показник знизився порівняно з попереднім кварталом"
            correct: true
          - text: "економіка остаточно провалилася"
            correct: false
          - text: "ринок наказав людям економити"
            correct: false
          - text: "усі підприємства стали збитковими"
            correct: false
        explanation: "Обережна фраза називає порівняння і не перебільшує."
      - question: "Що найкраще перевірити після фрази \"доходи зросли\"?"
        options:
          - text: "період, джерело даних і вплив інфляції"
            correct: true
          - text: "лише назву компанії"
            correct: false
          - text: "тільки кількість лайків"
            correct: false
          - text: "колір логотипа"
            correct: false
        explanation: "Без періоду, джерела й інфляційної рамки висновок може бути слабким."
      - question: "Яка пара належить до монетарної політики?"
        options:
          - text: "облікова ставка і банківська ліквідність"
            correct: true
          - text: "видатки бюджету і субсидія"
            correct: false
          - text: "вакансія і співбесіда"
            correct: false
          - text: "бренд і логотип"
            correct: false
        explanation: "Монетарна політика пов'язана з грошима, ставками й банківською системою."
      - question: "Яке слово краще для державних витрат у бюджетному документі?"
        options:
          - text: "видатки"
            correct: true
          - text: "дрібні покупки"
            correct: false
          - text: "кешбек"
            correct: false
          - text: "маржа"
            correct: false
        explanation: "У публічних фінансах нормативним словом є видатки бюджету."
      - question: "Яка фраза найкраще показує базу порівняння?"
        options:
          - text: "порівняно з попереднім кварталом"
            correct: true
          - text: "дуже багато"
            correct: false
          - text: "як усі знають"
            correct: false
          - text: "без жодного джерела"
            correct: false
        explanation: "База порівняння показує, з чим зіставляють показник."
      - question: "Яке речення не змішує інституції?"
        options:
          - text: "Парламент ухвалює бюджет, а Національний банк змінює ставку."
            correct: true
          - text: "Банк ухвалив державний бюджет."
            correct: false
          - text: "Уряд виплатив дивіденди за акціями."
            correct: false
          - text: "Біржа призначила податкову ставку."
            correct: false
        explanation: "Точний текст називає інституцію та її повноваження."

  - type: match-up
    title: "Бюджет і податкова рамка"
    instruction: "Поєднайте термін із типовим B2-поясненням."
    pairs:
      - left: "податкові надходження"
        right: "кошти, які бюджет отримує через податки"
      - left: "видатки бюджету"
        right: "державні кошти, спрямовані на визначені потреби"
      - left: "дефіцит бюджету"
        right: "перевищення видатків над доходами"
      - left: "субсидія"
        right: "підтримка визначеної групи або витрати"
      - left: "акциз"
        right: "податок на окремі товари"
      - left: "державний борг"
        right: "зобов'язання держави перед кредиторами"
      - left: "фіскальна політика"
        right: "рішення про податки й державні видатки"
      - left: "монетарна політика"
        right: "рішення щодо грошей, ставок і цінової стабільності"
      - left: "боргове навантаження"
        right: "тиск виплат за боргом на бюджет або компанію"
      - left: "податкова база"
        right: "обсяг доходів, майна або операцій, з яких сплачують податок"

  - type: fill-in
    title: "Банки й фінансові ринки"
    instruction: "Заповніть пропуски точними фінансовими словами."
    items:
      - sentence: "Здатність компанії швидко виконувати платежі називають ____."
        answer: "ліквідністю"
        options: ["ліквідністю", "субсидією", "брендом", "інфляцією"]
        explanation: "Ліквідність описує здатність платити в потрібний момент."
      - sentence: "Майно або право, яке забезпечує кредит, може бути ____."
        answer: "заставою"
        options: ["заставою", "акцією", "дивідендом", "конверсією"]
        explanation: "Застава зменшує ризик кредитора."
      - sentence: "Борговий цінний папір, який передбачає повернення коштів, - це ____."
        answer: "облігація"
        options: ["облігація", "акція", "бренд", "попит"]
        explanation: "Облігація зазвичай фіксує боргове зобов'язання."
      - sentence: "Частка власності в компанії називається ____."
        answer: "акцією"
        options: ["акцією", "депозитом", "акцизом", "маржею"]
        explanation: "Акція може давати право на частку власності й дивіденди."
      - sentence: "Набір інвестицій або активів інвестора називають ____."
        answer: "портфелем"
        options: ["портфелем", "дефіцитом", "вакансією", "субсидією"]
        explanation: "Портфель може містити різні фінансові інструменти."
      - sentence: "Кошти, розміщені в банку, - це ____."
        answer: "депозит"
        options: ["депозит", "акциз", "рентабельність", "аутсорсинг"]
        explanation: "Депозит є банківським продуктом для розміщення коштів."
      - sentence: "Ціна користування кредитними грошима описується через ____ ставку."
        answer: "відсоткову"
        options: ["відсоткову", "трудову", "брендову", "митну"]
        explanation: "Відсоткова ставка впливає на вартість кредиту."
      - sentence: "Виплата частини прибутку акціонерам може називатися ____."
        answer: "дивідендами"
        options: ["дивідендами", "податками", "видатками", "заставами"]
        explanation: "Дивіденди залежать від рішення компанії та її фінансового результату."
      - sentence: "Банк оцінює ____ клієнта перед ухваленням кредитного рішення."
        answer: "платоспроможність"
        options: ["платоспроможність", "цільову аудиторію", "конверсію", "акциз"]
        explanation: "Платоспроможність показує здатність виконувати фінансові зобов'язання."
      - sentence: "Розподіл інвестицій між різними інструментами називають ____ портфеля."
        answer: "диверсифікацією"
        options: ["диверсифікацією", "субсидією", "вакансією", "інфляцією"]
        explanation: "Диверсифікація зменшує залежність від одного активу."

  - type: group-sort
    title: "Бізнес, менеджмент, маркетинг"
    instruction: "Розподіліть слова за сферою вживання."
    groups:
      - name: "Фінансовий результат"
        items:
          - "дохід"
          - "прибуток"
          - "збитки"
          - "маржа"
      - name: "Підприємницька модель"
        items:
          - "бізнес-модель"
          - "ціннісна пропозиція"
          - "масштабування"
          - "собівартість"
      - name: "Маркетинг"
        items:
          - "цільова аудиторія"
          - "канал продажу"
          - "конверсія"
          - "утримання клієнтів"
      - name: "Менеджмент і процеси"
        items:
          - "делегування"
          - "аутсорсинг"
          - "управління ризиками"
          - "контроль якості"

  - type: error-correction
    title: "Нейтрально замість маніпулятивно"
    instruction: "Знайдіть слабке або маніпулятивне формулювання й замініть його точнішою фразою."
    items:
      - sentence: "Наш продукт гарантовано принесе прибуток усім інвесторам."
        error: "гарантовано принесе прибуток усім інвесторам"
        correction: "має базовий сценарій прибутковості за умови стабільного попиту"
        options:
          - "має базовий сценарій прибутковості за умови стабільного попиту"
          - "ніколи не має ризику"
          - "усі точно зароблять"
          - "ринок сам усе зробить"
        explanation: "Бізнесовий текст має називати умови й ризики."
      - sentence: "Податки знищили весь малий бізнес."
        error: "знищили весь малий бізнес"
        correction: "створили додатковий тиск для частини малого бізнесу з низькою маржею"
        options:
          - "створили додатковий тиск для частини малого бізнесу з низькою маржею"
          - "довели, що бізнесу немає"
          - "автоматично скасували попит"
          - "покращили логотипи"
        explanation: "Потрібно назвати групу, механізм і межу узагальнення."
      - sentence: "Ми оптимізували людей у відділі підтримки."
        error: "оптимізували людей"
        correction: "змінили ролі, автоматизували частину задач або скоротили штат"
        options:
          - "змінили ролі, автоматизували частину задач або скоротили штат"
          - "зробили людей активами"
          - "прибрали всі витрати без наслідків"
          - "збільшили інфляцію"
        explanation: "Слово оптимізація не має приховувати людський наслідок."
      - sentence: "Ринок вибухне вже наступного місяця."
        error: "вибухне"
        correction: "може зрости за базовим сценарієм попиту"
        options:
          - "може зрости за базовим сценарієм попиту"
          - "точно стане безмежним"
          - "усі клієнти підпишуть договір"
          - "зникне дефіцит бюджету"
        explanation: "Метафору краще замінити на прогноз і умову."
      - sentence: "Кредит за п'ять хвилин без будь-якої ціни."
        error: "без будь-якої ціни"
        correction: "потребує перевірки ставки, комісії й графіка платежів"
        options:
          - "потребує перевірки ставки, комісії й графіка платежів"
          - "ніколи не має комісій"
          - "не має договору"
          - "автоматично є грантом"
        explanation: "Кредит має повну вартість, навіть якщо реклама її не показує."
      - sentence: "Працівники мають жити роботою, бо ми сім'я."
        error: "жити роботою, бо ми сім'я"
        correction: "працювати з високим темпом задач за прозорого графіка й компенсації"
        options:
          - "працювати з високим темпом задач за прозорого графіка й компенсації"
          - "не потребувати договору"
          - "працювати без відпочинку"
          - "замінити зарплату емоціями"
        explanation: "Вакансія має називати умови, а не тиснути емоційною метафорою."
      - sentence: "Маржа неважлива, якщо є попит."
        error: "Маржа неважлива"
        correction: "попит треба оцінювати разом із маржею і собівартістю"
        options:
          - "попит треба оцінювати разом із маржею і собівартістю"
          - "попит скасовує витрати"
          - "маржа є податком"
          - "собівартість не існує"
        explanation: "Попит не гарантує прибутковість."
      - sentence: "Усі клієнти хочуть саме цей сервіс."
        error: "Усі клієнти"
        correction: "опитування конкретного сегмента показало інтерес до сервісу"
        options:
          - "опитування конкретного сегмента показало інтерес до сервісу"
          - "усі без винятку"
          - "ринок наказав"
          - "клієнти не мають вибору"
        explanation: "Потрібно назвати сегмент і джерело даних."

  - type: quiz
    title: "Звіт чи пітч"
    instruction: "Оберіть найкращу фразу для бізнес-звіту або пітчу."
    items:
      - question: "Яке речення найкраще для бізнес-звіту?"
        options:
          - text: "Виручка зросла на 12%, але маржа знизилася через доставку."
            correct: true
          - text: "У нас усе чудово, бо продажі красиві."
            correct: false
          - text: "Ринок точно наш назавжди."
            correct: false
          - text: "Ніяких ризиків немає."
            correct: false
        explanation: "Звіт має показувати і позитивний показник, і ризик."
      - question: "Яка фраза добра для пітчу?"
        options:
          - text: "Пілот із 30 клієнтами показав інтерес, а основний ризик - собівартість доставки."
            correct: true
          - text: "Інвестори гарантовано зароблять."
            correct: false
          - text: "Клієнти самі все оплатять без витрат."
            correct: false
          - text: "Дані не потрібні, бо ідея сильна."
            correct: false
        explanation: "Пітч може переконувати, але має назвати дані й ризик."
      - question: "Що потрібно додати до фрази \"ринок зростає\"?"
        options:
          - text: "джерело, період і сегмент"
            correct: true
          - text: "лише емоційний прикметник"
            correct: false
          - text: "гарантію прибутку"
            correct: false
          - text: "невизначене слово \"усі\""
            correct: false
        explanation: "Зростання ринку без джерела й сегмента погано працює в аналізі."
      - question: "Який блок належить до пітчу?"
        options:
          - text: "проблема, рішення, ринок, модель доходу, команда, запит"
            correct: true
          - text: "тільки слоган і логотип"
            correct: false
          - text: "лише список податків"
            correct: false
          - text: "випадкова біржова ціна"
            correct: false
        explanation: "Пітч має структуровано показати бізнесову логіку."
      - question: "Яка формула зберігає межу знання?"
        options:
          - text: "за базовим сценарієм команда очікує зростання попиту"
            correct: true
          - text: "попит точно безмежний"
            correct: false
          - text: "ринок не має ризиків"
            correct: false
          - text: "усі конкуренти зникнуть"
            correct: false
        explanation: "Модальні слова й сценарії роблять прогноз відповідальним."
      - question: "Що робить економічну довідку корисною для рішення?"
        options:
          - text: "висновок, показники, наслідок і дія"
            correct: true
          - text: "довгий список гасел"
            correct: false
          - text: "обіцянка без перевірки"
            correct: false
          - text: "змішування всіх термінів"
            correct: false
        explanation: "Довідка має допомагати діяти, а не лише звучати серйозно."
      - question: "Яка фраза найкраще називає ризик у пітчі?"
        options:
          - text: "головний ризик - висока собівартість доставки"
            correct: true
          - text: "ризиків немає взагалі"
            correct: false
          - text: "ризик не треба показувати"
            correct: false
          - text: "ризик дорівнює логотипу"
            correct: false
        explanation: "Сильний пітч називає ризик і спосіб роботи з ним."
      - question: "Що краще за фразу \"усі клієнти хочуть\"?"
        options:
          - text: "опитування конкретного сегмента показало інтерес"
            correct: true
          - text: "усі без винятку хочуть"
            correct: false
          - text: "ринок сам підтвердив"
            correct: false
          - text: "клієнти не мають альтернатив"
            correct: false
        explanation: "Потрібно назвати сегмент і джерело."
      - question: "Який елемент потрібен у бізнес-звіті після показника?"
        options:
