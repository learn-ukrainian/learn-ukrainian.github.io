- type: quiz
  title: Економічна точність
  instruction: Оберіть найточніше економічне або бізнесове формулювання.
  items:
    - question: Чому дохід не дорівнює прибутку?
      options:
        - text: бо прибуток залишається після витрат, податків та інших платежів
          correct: true
        - text: бо дохід завжди менший за витрати
          correct: false
        - text: бо прибуток стосується тільки державного бюджету
          correct: false
        - text: бо ці слова повністю синонімічні
          correct: false
      explanation: Дохід показує надходження, а прибуток враховує витрати.
    - question: Яке слово найточніше для видатків державного бюджету?
      options:
        - text: видатки
          correct: true
        - text: дрібні покупки
          correct: false
        - text: кешбек
          correct: false
        - text: рекламні лайки
          correct: false
      explanation: У публічних фінансах нормативно говорять про видатки бюджету.
    - question: Що означає облікова ставка?
      options:
        - text: ключовий інструмент монетарної політики Національного банку
          correct: true
        - text: кількість працівників у відділі кадрів
          correct: false
        - text: назву рекламної кампанії
          correct: false
        - text: суму готівки в касі магазину
          correct: false
      explanation: Облікова ставка впливає на вартість грошей і кредитів.
    - question: Яке речення правильно описує дефіцит бюджету?
      options:
        - text: Видатки бюджету перевищують доходи, тому треба джерело фінансування.
          correct: true
        - text: Усі компанії автоматично мають збитки.
          correct: false
        - text: Банк не може відкрити депозит.
          correct: false
        - text: Працівник отримав бонус.
          correct: false
      explanation: Дефіцит стосується співвідношення доходів і видатків.
    - question: Що таке ліквідність?
      options:
        - text: здатність швидко виконувати фінансові зобов'язання або перетворювати актив на гроші
          correct: true
        - text: будь-яка реклама нового бренду
          correct: false
        - text: список кандидатів на посаду
          correct: false
        - text: неформальна назва податку
          correct: false
      explanation: Ліквідність описує доступність коштів і швидкість платежів.
    - question: Що найточніше називає слово "рентабельність"?
      options:
        - text: показник ефективності, який пов'язує результат із витратами або ресурсами
          correct: true
        - text: будь-яку високу ціну
          correct: false
        - text: назву трудового договору
          correct: false
        - text: гарантію успіху стартапу
          correct: false
      explanation: Рентабельність допомагає оцінити ефективність бізнесу.
    - question: Яке формулювання точніше для фондового ринку?
      options:
        - text: Інвестор диверсифікує портфель між акціями та облігаціями.
          correct: true
        - text: Інвестор просто бере гроші з повітря.
          correct: false
        - text: Облігація завжди є часткою власності.
          correct: false
        - text: Дивіденди виплачують до створення компанії.
          correct: false
      explanation: Портфель може містити різні фінансові інструменти.
    - question: Що означає аутсорсинг?
      options:
        - text: передання певної функції зовнішньому виконавцю
          correct: true
        - text: підвищення ціни без пояснення
          correct: false
        - text: зниження інфляції
          correct: false
        - text: купівля державних облігацій
          correct: false
      explanation: Аутсорсинг стосується організації роботи.
    - question: Яке речення найкраще для презентації бізнес-ідеї?
      options:
        - text: Ми дослідили попит, розрахували витрати й бачимо джерело доходу.
          correct: true
        - text: Ідея класна, тому прибуток гарантований.
          correct: false
        - text: Податки не мають значення для фінансового результату.
          correct: false
        - text: Ринок завжди приймає будь-який продукт.
          correct: false
      explanation: Бізнес-презентація має спиратися на дані й припущення.
    - question: Яке формулювання точне для ринку праці?
      options:
        - text: Попит на фахівців зріс, але пропозиція праці залишається обмеженою.
          correct: true
        - text: Усі працівники однаково кваліфіковані.
          correct: false
        - text: Рекрутинг означає податок на прибуток.
          correct: false
        - text: Соціальний пакет є видом валюти.
          correct: false
      explanation: Попит і пропозиція допомагають описати ринок праці.

