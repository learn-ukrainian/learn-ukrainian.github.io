workbook:
  - id: workbook-1
    type: reading
    title: "Міні-звіт про кав'ярню"
    text: "Кав'ярня збільшила кількість замовлень на 16% за квартал, але прибуток зменшився. Основні причини - подорожчання молока, оренди й доставки. Команда планує переглянути меню, домовитися з постачальниками й протестувати передзамовлення для корпоративних клієнтів."
    tasks:
      - "Випишіть три показники або економічні причини."
      - "Позначте, де в тексті є ризик ліквідності або маржі."
      - "Перепишіть текст як два речення для бізнес-звіту."

  - type: fill-in
    title: "Колокації для економічного коментаря"
    instruction: "Заповніть пропуски словами з модуля."
    items:
      - sentence: "Компанія підтримує ____ через резерв коштів."
        answer: "ліквідність"
        options: ["ліквідність", "акциз", "бренд", "вакансію"]
        explanation: "Ліквідність пов'язана зі здатністю платити."
      - sentence: "Перед масштабуванням команда перевірила ____ продукту."
        answer: "собівартість"
        options: ["собівартість", "субсидію", "облікову ставку", "митницю"]
        explanation: "Собівартість впливає на маржу й прибутковість."
      - sentence: "Уряд пояснив збільшення ____ потребою фінансувати відновлення."
        answer: "видатків"
        options: ["видатків", "дивідендів", "портфелів", "брендів"]
        explanation: "У бюджетному контексті йдеться про видатки."
      - sentence: "Пітч має назвати проблему, рішення, ринок і модель ____."
        answer: "доходу"
        options: ["доходу", "інфляції", "застави", "акцизу"]
        explanation: "Модель доходу пояснює, як бізнес заробляє."
      - sentence: "____ показує, яка частка користувачів виконала потрібну дію."
        answer: "Конверсія"
        options: ["Конверсія", "Застава", "Субсидія", "Облігація"]
        explanation: "Конверсія є маркетинговим показником."
      - sentence: "____ - це частка власності в компанії."
        answer: "Акція"
        options: ["Акція", "Облігація", "Акциз", "Депозит"]
        explanation: "Акція не є борговим папером."
      - sentence: "____ може включати медичне страхування й навчання."
        answer: "Соціальний пакет"
        options: ["Соціальний пакет", "Державний борг", "Біржовий портфель", "Дефіцит бюджету"]
        explanation: "Соціальний пакет належить до умов праці."
      - sentence: "____ описує здатність бізнесу давати прибуток від вкладених ресурсів."
        answer: "Рентабельність"
        options: ["Рентабельність", "Інфляція", "Вакансія", "Акциз"]
        explanation: "Рентабельність є показником ефективності бізнесу."
      - sentence: "Банківський ____ має містити графік платежів і повну вартість."
        answer: "кредит"
        options: ["кредит", "бренд", "попит", "акциз"]
        explanation: "Кредит потребує умов повернення й оплати."
      - sentence: "____ продажу впливає на вартість залучення клієнта."
        answer: "Канал"
        options: ["Канал", "Дефіцит", "Дивіденд", "Акциз"]
        explanation: "Канал продажу належить до маркетингової моделі."

  - type: error-correction
    title: "Редагування бізнесового абзацу"
    instruction: "Виправте перебільшення або неточний термін."
    items:
      - sentence: "Компанія отримала прибуток, бо дохід зріс, а витрати ніхто не рахує."
        error: "витрати ніхто не рахує"
        correction: "прибуток треба рахувати після витрат, податків та інших платежів"
        options:
          - "прибуток треба рахувати після витрат, податків та інших платежів"
          - "дохід завжди дорівнює прибутку"
          - "податки не впливають на результат"
          - "витрати не існують"
        explanation: "Дохід і прибуток не є синонімами."
      - sentence: "Банк дав грант, який треба повернути з відсотками."
        error: "грант"
        correction: "кредит"
        options:
          - "кредит"
          - "дивіденд"
          - "акція"
          - "субсидія"
        explanation: "Кошти, які треба повернути з відсотками, є кредитом."
      - sentence: "Акція завжди є борговим папером."
        error: "борговим папером"
        correction: "часткою власності в компанії"
        options:
          - "часткою власності в компанії"
          - "податковим надходженням"
          - "платіжною інструкцією"
          - "вакансією"
        explanation: "Борговим папером зазвичай є облігація."
      - sentence: "Попит автоматично доводить рентабельність."
        error: "автоматично доводить рентабельність"
        correction: "потребує перевірки ціни, собівартості й маржі"
        options:
          - "потребує перевірки ціни, собівартості й маржі"
          - "скасовує всі витрати"
          - "замінює фінансовий звіт"
          - "є державною субсидією"
        explanation: "Попит не гарантує прибутковість."
      - sentence: "Облікова ставка - це стаття видатків бюджету."
        error: "стаття видатків бюджету"
        correction: "інструмент монетарної політики"
        options:
          - "інструмент монетарної політики"
          - "соціальний пакет"
          - "канал продажу"
          - "дивідендна виплата"
        explanation: "Облікова ставка належить до монетарної, а не фіскальної політики."
      - sentence: "Дефіцит бюджету означає прибуток держави."
        error: "прибуток держави"
        correction: "перевищення видатків над доходами"
        options:
          - "перевищення видатків над доходами"
          - "дивіденди акціонерів"
          - "вартість бренду"
          - "ринкову конверсію"
        explanation: "Дефіцит бюджету не є прибутком."
      - sentence: "Соціальний пакет - це біржовий портфель інвестора."
        error: "біржовий портфель інвестора"
        correction: "набір додаткових умов і переваг для працівника"
        options:
          - "набір додаткових умов і переваг для працівника"
          - "державний борг"
          - "податкова база"
          - "облігаційний випуск"
        explanation: "Соціальний пакет належить до ринку праці."
      - sentence: "Конверсія показує суму державного боргу."
        error: "суму державного боргу"
        correction: "частку користувачів, які виконали потрібну дію"
        options:
          - "частку користувачів, які виконали потрібну дію"
          - "ціну кредиту"
          - "видатки бюджету"
          - "заставу банку"
        explanation: "Конверсія є маркетинговим показником."

  - id: workbook-4
    type: essay-response
    title: "Короткий економічний коментар"
    instruction: "Напишіть 150-180 слів про бізнесову або економічну ситуацію. Назвіть показник, період, ризик і наступний крок."
    min_words: 150
    prompt: "Оберіть ситуацію: зміна податку, кредит для малого бізнесу, запуск продукту або зміна умов праці. Напишіть нейтральний коментар без рекламних гарантій."
    model_answer: |-
      > [!model-answer]
      > Компанія збільшила дохід у другому кварталі, але прибуток зріс повільніше через подорожчання доставки й оренди. Це означає, що попит на продукт є, проте бізнес-модель потребує перевірки собівартості. Перед масштабуванням команда має порівняти маржу в різних каналах продажу, домовитися з постачальниками й оцінити запас ліквідності на три місяці. У публічному повідомленні не варто писати, що прибуток гарантований. Обережніше сказати, що пілот показав інтерес клієнтів, а головні ризики пов'язані з логістикою, ціною й утриманням клієнтів.
    rubric:
      - criteria: "Показник і період"
        description: "Названо конкретний показник і часову рамку."
        points: 3
      - criteria: "Фінансова точність"
        description: "Розрізнено дохід, прибуток, витрати або маржу."
        points: 3
      - criteria: "Ризик і дія"
        description: "Є ризик і практичний наступний крок."
        points: 3
      - criteria: "Регістр"
        description: "Тон нейтральний, без маніпулятивних гарантій."
        points: 3
