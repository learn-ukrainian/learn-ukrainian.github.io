- type: essay-response
  id: economics-business-pitch
  title: Відповідальна бізнесова презентація
  instruction: Напишіть короткий бізнесовий текст із точними фінансовими термінами.
  prompt: "Опишіть бізнес-ідею або економічну новину на 150-180 слів. Обов'язково використайте щонайменше шість слів: ринок, дохід, витрати, прибуток, податки, інвестиції, попит, рентабельність, ризик, кваліфікація."
  min_words: 150
  model_answer: "Наша команда планує вийти на ринок послуг для малого бізнесу. Спершу ми досліджуємо попит і перевіряємо, чи готові клієнти платити за автоматизацію обліку. Очікуваний дохід залежатиме від кількості підписок, але прибуток можна буде оцінити тільки після витрат на розробку, маркетинг, підтримку й податки. Для запуску потрібні інвестиції, тому ми готуємо фінансову модель і пояснюємо ризики. Рентабельність стане реальною лише тоді, коли витрати на залучення клієнта будуть нижчими за довгостроковий дохід від підписки. Команда має підвищити кваліфікацію в кібербезпеці, бо клієнти передаватимуть фінансові дані. Такий опис не гарантує успіху, але показує ринок, джерело доходу, витрати й умови ухвалення рішення."
  rubric:
    - criteria: Термінологічна точність
      description: Текст розрізняє дохід, витрати, прибуток, інвестиції та ризик.
      points: 4
    - criteria: Діловий регістр
      description: Формулювання нейтральні, без необґрунтованих гарантій.
      points: 3
    - criteria: Зв'язність
      description: Ідея має ринок, клієнта, фінансову логіку й наступний крок.
      points: 3

