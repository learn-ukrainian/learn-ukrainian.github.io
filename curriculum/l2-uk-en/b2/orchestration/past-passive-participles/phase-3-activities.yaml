- type: true-false
  title: "Мовні нюанси"
  instruction: "Визначте, чи є твердження про вживання дієприкметників правильними."
  items:
    - statement: "Слово 'відкритий' може означати як фізичний стан (дверей), так і доступність (музею)."
      correct: true
      explanation: "Так, це слово має широке значення: відкриті двері, відкрите питання, відкритий музей."
    - statement: "Слово 'забутий' і 'загублений' є повними синонімами в усіх контекстах."
      correct: false
      explanation: "'Забутий' стосується пам'яті (forgotten), а 'загублений' — фізичної втрати (lost)."
    - statement: "Конструкція 'Книга була написана мною' є стилістично кращою за 'Я написав книгу'."
      correct: false
      explanation: "Навпаки, українська мова надає перевагу активному стану ('Я написав'), якщо виконавець відомий."
    - statement: "Дієприкметники завжди вказують на дію, яка відбувається зараз."
      correct: false
      explanation: "Пасивні дієприкметники минулого часу вказують на результат дії, яка вже завершилася."
    - statement: "Слово 'печений' — це дієприкметник, а 'спечений' — прикметник."
      correct: false
      explanation: "Навпаки: 'спечений' (доконаний вид) — це дієприкметник (результат), а 'печений' — часто прикметник (ознака)."
    - statement: "У слові 'розбитий' ми пишемо -тий, бо основа інфінітива 'розби-' односкладова."
      correct: true
      explanation: "Так, від 'розбити' (би-ти) утворюємо форму на -тий."
    - statement: "Чергування приголосних відбувається лише в розмовному стилі."
      correct: false
      explanation: "Чергування (саджу - посаджений) є обов'язковим для літературної мови."
    - statement: "Пасивні конструкції з 'бути' дозволяють чітко розрізняти час події."
      correct: true
      explanation: "Так: була написана (минуле), є написана (теперішній), буде написана (майбутнє)."
    - statement: "Дієприкметники не відмінюються за відмінками."
      correct: false
      explanation: "Вони відмінюються так само, як прикметники."
    - statement: "Слово 'намальований' пишеться з м'яким знаком."
      correct: true
      explanation: "Так, суфікс -ува- змінюється на -ьова-."

