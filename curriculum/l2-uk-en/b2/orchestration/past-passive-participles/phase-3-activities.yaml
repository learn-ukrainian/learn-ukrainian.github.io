- type: fill-in
  title: "Магія чергування"
  instruction: "Вставте правильну форму дієприкметника, зважаючи на чергування приголосних."
  items:
    - sentence: "Цей сад був ___ моїм дідусем багато років тому."
      answer: "посаджений"
      options: ["посаджений", "посадений", "посажений", "посадже"]
      explanation: "Від дієслова 'посадити': д чергується з дж."
    - sentence: "Усі гості вже ___ до святкового столу."
      answer: "запрошені"
      options: ["запрошені", "запросені", "запрохані", "запроше"]
      explanation: "Від дієслова 'запросити': с чергується з ш."
    - sentence: "Цей вірш ___ видатній українській поетесі."
      answer: "присвячений"
      options: ["присвячений", "присвятений", "присвяче", "присвята"]
      explanation: "Від дієслова 'присвятити': т чергується з ч."
    - sentence: "Ми стояли перед ___ храмом, милуючись його красою."
      answer: "відродженим"
      options: ["відродженим", "відроденим", "відродженням", "відроди"]
      explanation: "Від дієслова 'відродити': д чергується з дж."
    - sentence: "Рахунок у ресторані був ___ вчасно."
      answer: "сплачений"
      options: ["сплачений", "сплатений", "сплаче", "плата"]
      explanation: "Від дієслова 'сплатити': т чергується з ч."
    - sentence: "Я був глибоко ___ цією новиною."
      answer: "вражений"
      options: ["вражений", "вразений", "враже", "вразливий"]
      explanation: "Від дієслова 'вразити': з чергується з ж."
    - sentence: "Килим, ___ на ярмарку, ідеально пасував до інтер'єру."
      answer: "куплений"
      options: ["куплений", "купений", "купив", "купля"]
      explanation: "Від 'купити': губний п отримує вставний л (пл)."
    - sentence: "Цей документ був ___ з правилами безпеки."
      answer: "ознайомлений"
      options: ["ознайомлений", "ознайомений", "знайомий", "знати"]
      explanation: "Від 'ознайомити': губний м отримує вставний л (мл)."
    - sentence: "Голос оповідача був трохи ___."
      answer: "знижений"
      options: ["знижений", "знизений", "низький", "знизив"]
      explanation: "Від 'знизити': з чергується з ж."
    - sentence: "Цей портрет ___ відомим художником."
      answer: "намальований"
      options: ["намальований", "намалюваний", "намалований", "мальований"]
      explanation: "Від 'намалювати': суфікс -ува- змінюється на -ьова-."

- type: mark-the-words
  title: "Пошук артефактів"
  instruction: "Знайдіть і позначте всі пасивні дієприкметники минулого часу в тексті звіту реставратора."
  text: "Сьогодні до музею надійшла унікальна колекція. Центральним експонатом є знайдена в землі скіфська ваза. Вона трохи пошкоджена часом, але її орнамент добре збережений. Поруч лежить розбитий глек, який ще потребує відновлення. Також у ящику був старовинний вишитий рушник, дбайливо загорнутий у папір. Ця колекція, зібрана ентузіастами, стане перлиною нашої експозиції."
  answers: ["знайдена", "пошкоджена", "збережений", "розбитий", "вишитий", "загорнутий", "зібрана"]

- type: select
  title: "Граматичне узгодження"
  instruction: "Оберіть речення, в яких дієприкметник правильно узгоджений з іменником."
  items:
    - question: "Оберіть речення з правильним узгодженням (Книга - вона):"
      min_correct: 1
      options:
        - text: "Ця книга написана відомим автором."
          correct: true
        - text: "Ця книга написаний відомим автором."
          correct: false
        - text: "Ця книга написане відомим автором."
          correct: false
        - text: "Ця книга написані відомим автором."
          correct: false
      explanation: "Іменник 'книга' — жіночого роду, тому дієприкметник має закінчення -а."
    - question: "Оберіть речення з правильним узгодженням (Лист - він):"
      min_correct: 1
      options:
        - text: "Я отримав давно написаний лист."
          correct: true
        - text: "Я отримав давно написана лист."
          correct: false
        - text: "Я отримав давно написане лист."
          correct: false
        - text: "Я отримав давно написані лист."
          correct: false
      explanation: "Іменник 'лист' — чоловічого роду, тому дієприкметник має закінчення -ий."
    - question: "Оберіть речення з правильним узгодженням (Вікно - воно):"
      min_correct: 1
      options:
        - text: "Вікно було відкрите цілий день."
          correct: true
        - text: "Вікно було відкритий цілий день."
          correct: false
        - text: "Вікно було відкрита цілий день."
          correct: false
        - text: "Вікно було відкриті цілий день."
          correct: false
      explanation: "Іменник 'вікно' — середнього роду, тому дієприкметник має закінчення -е."
    - question: "Оберіть речення з правильним узгодженням (Двері - вони, множина):"
      min_correct: 1
      options:
        - text: "Усі двері були зачинені на замок."
          correct: true
        - text: "Усі двері були зачинена на замок."
          correct: false
        - text: "Усі двері були зачинений на замок."
          correct: false
        - text: "Усі двері були зачинене на замок."
          correct: false
      explanation: "Іменник 'двері' вживається лише в множині, тому закінчення -і."
    - question: "Оберіть речення з правильним узгодженням (непрямий відмінок):"
      min_correct: 1
      options:
        - text: "Ми підійшли до відреставрованого собору."
          correct: true
        - text: "Ми підійшли до відреставрований собору."
          correct: false
        - text: "Ми підійшли до відреставрована собору."
          correct: false
        - text: "Ми підійшли до відреставрованим собору."
          correct: false
      explanation: "Родовий відмінок (до кого? чого?) вимагає закінчення -ого."
    - question: "Оберіть речення з правильним узгодженням (множина):"
      min_correct: 1
      options:
        - text: "Знайдені артефакти передали в музей."
          correct: true
        - text: "Знайдений артефакти передали в музей."
          correct: false
        - text: "Знайдена артефакти передали в музей."
          correct: false
        - text: "Знайдене артефакти передали в музей."
          correct: false
      explanation: "Множина вимагає закінчення -і."
    - question: "Оберіть речення з правильним узгодженням (середній рід):"
      min_correct: 1
      options:
        - text: "Розбите серце довго гоїться."
          correct: true
        - text: "Розбитий серце довго гоїться."
          correct: false
        - text: "Розбита серце довго гоїться."
          correct: false
        - text: "Розбиті серце довго гоїться."
          correct: false
      explanation: "Серце — середній рід (-е)."
    - question: "Оберіть речення з правильним узгодженням (жіночий рід):"
      min_correct: 1
      options:
        - text: "Вона була вдягнена у вишиту сорочку."
          correct: true
        - text: "Вона була вдягнена у вишитий сорочку."
          correct: false
        - text: "Вона була вдягнена у вишите сорочку."
          correct: false
        - text: "Вона була вдягнена у вишиті сорочку."
          correct: false
      explanation: "Сорочка — жіночий рід, знахідний відмінок (-у)."

- type: error-correction
  title: "Коректор текстів"
  instruction: "Знайдіть і виправте помилки у вживанні дієприкметників."
  items:
    - sentence: "На столі лежав забунений кимось зошит."
      error: "забунений"
      answer: "забутий"
      options: ["забутий", "забут", "забув", "забу"]
      explanation: "Дієслово 'забути' має основу на голосний -у, тому потребує суфікса -тий."
    - sentence: "Сад був посадений моїм батьком."
      error: "посадений"
      answer: "посаджений"
      options: ["посаджений", "саджаний", "саджений", "посадив"]
      explanation: "Потрібно врахувати чергування приголосних: д змінюється на дж."
    - sentence: "Ми побачили розбитий вазу на підлозі."
      error: "розбитий"
      answer: "розбиту"
      options: ["розбиту", "розбита", "розбите", "розбиті"]
      explanation: "Узгодження: вазу (жіночий рід, знахідний відмінок) вимагає форми 'розбиту'."
    - sentence: "Ця тема вже закрита і не обговорюється."
      error: "закрита"
      answer: "закрита"
      options: ["закрита", "закритий", "закрите", "закриті"]
      explanation: "У цьому реченні помилки немає, слово вжито правильно. (Але для вправи оберіть 'закрита' як підтвердження)."
      error_type: "word"
    - sentence: "Вікно було відкритий цілу ніч."
      error: "відкритий"
      answer: "відкрите"
      options: ["відкрите", "відкрита", "відкрити", "відкрили"]
      explanation: "Вікно — середній рід, тому 'відкрите'."
    - sentence: "Він був запросений на вечірку."
      error: "запросений"
      answer: "запрошений"
      options: ["запрошений", "прошений", "запросив", "запроси"]
      explanation: "Чергування с // ш є обов'язковим."
    - sentence: "Зроблений робота заслуговує похвали."
      error: "Зроблений"
      answer: "Зроблена"
      options: ["Зроблена", "Зроблено", "Зробити", "Зроблене"]
      explanation: "Робота — жіночий рід, тому 'Зроблена'."
    - sentence: "Книга була написана Шевченком."
      error: "була написана"
      answer: "написана"
      options: ["написана", "була написана", "писалася", "написав"]
      explanation: "За правилом агентності, якщо є виконавець (Шевченко), краще сказати 'Шевченко написав книгу'. Але якщо виправляти лише форму: пасив тут граматично можливий, проте стилістично краще актив."
    - sentence: "Мити посуд стояв на кухні."
      error: "Мити"
      answer: "Митий"
      options: ["Митий", "Мила", "Миття", "Помити"]
      explanation: "Потрібен дієприкметник (який?), а не інфінітив."
    - sentence: "Дім був збудуваний дуже швидко."
      error: "збудуваний"
      answer: "збудований"
      options: ["збудований", "збудов", "будований", "будував"]
      explanation: "Суфікс -ува- змінюється на -ьова-."

- type: unjumble
  title: "Реставрація речень"
  instruction: "Складіть слова у правильному порядку, щоб утворити граматично правильні речення з пасивним станом."
  items:
    - words: ["був", "цей", "храм", "збудований", "у", "давнину"]
      answer: "Цей храм був збудований у давнину"
    - words: ["книга", "була", "ця", "написана", "відомим", "автором"]
      answer: "Ця книга була написана відомим автором"
    - words: ["двері", "музею", "були", "відкриті", "для", "всіх"]
      answer: "Двері музею були відкриті для всіх"
    - words: ["скарб", "був", "знайдений", "випадково", "в", "лісі"]
      answer: "Скарб був знайдений випадково в лісі"
    - words: ["ікона", "була", "пошкоджена", "під", "час", "пожежі"]
