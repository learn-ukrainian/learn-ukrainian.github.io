  text: "114\nОдноскладні речення урізноманітнюють і збагачують мовлення, \nможуть\
    \ надавати динамізму й лаконічності висловленню. Ними \nможна передати думки,\
    \ почуття, відтінки емоцій, які неможливо \nвисловити двоскладними реченнями.\n\
    Головний член односкладного речення не називають під­ме­том чи \nприсудком. Адже\
    \ підмет і присудок взаємозалежні й не існують один \nбез одного, а в односкладному\
    \ реченні є лише один головний член \n(у формі підмета або у формі присудка).\
    \ \n259\t І. Прочитайте односкладні речення та"
  section_title: Сторінка 118
  grade: 8
