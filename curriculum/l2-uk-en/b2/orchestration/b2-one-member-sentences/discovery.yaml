  text: "У сполучникових складних реченнях завдяки сполучникам і сполучним словам\
    \ чіт-\nкіше, ніж у безсполучникових, виражаються смислові відношення, логічні\
    \ зв’язки між \nчастинами. А в безсполучникових реченнях ці відношення більше\
    \ вгадуються на\nоснові значення частин речення та інтонації. Відсутність сполучників\
    \ між частинами\nнадає безсполучниковим складним реченням характерної легкості,\
    \ безпосередності,\nневимушеності, що й зумовлює їх широке вживання в розмовному\
    \ й художньому мов-\nленні. 291\n292\n293\n2"
