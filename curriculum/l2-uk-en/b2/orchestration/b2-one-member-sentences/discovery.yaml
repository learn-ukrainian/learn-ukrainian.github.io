  text: "90\n§ 41\nТИПИ ОДНОСКЛАДНИХ РЕЧЕНЬ\nРечення, у якому граматична основа складається\
    \ з одного головного члена, на-\nзиваємо односкладним. Другий головний член односкладному\
    \ реченню не потрі-\nбен, бо його зміст і так зрозумілий. Наприклад, у речення\
    \ Давно читаєш? можна \nввести підмет (Ти давно читаєш?), але потреби в цьому\
    \ немає, бо особове закін-\nчення -єш і так указує, що дію виконує 2-га особа\
    \ однини (ти). Тому односкладні \nречення вважаємо повними. \nОдноскладне речення\
    \ може мати головний член у фор"
  section_title: Сторінка 91
