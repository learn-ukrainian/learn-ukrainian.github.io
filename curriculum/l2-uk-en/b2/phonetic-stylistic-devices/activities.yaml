workbook:
  - type: critical-analysis
    id: phonetic-reading-analysis
    title: "Аналіз звукової організації уривка"
    instruction: "Прочитай уривок і поясни, як звук підтримує зміст."
    target_text: >-
      Сухий сніг сипався з темного неба, скрипів під кроками й стишував
      подвір'я. Біля під'їзду ключ клацнув у замку, двері гупнули, і коридором
      покотився короткий холодний звук. У повідомленні для мешканців цю сцену
      скоротили: Увечері випав сніг. Вхідні двері зачиняються гучно. Просимо
      перевірити доводчик.
    questions:
      - "Які приголосні повторюються в першому реченні й який настрій вони створюють?"
      - "Де звуконаслідувальні дієслова роблять сцену чутною?"
      - "Чому службове повідомлення прибирає більшість звукових ефектів?"
      - "Який один звуковий елемент можна було б залишити в оголошенні без втрати офіційного тону?"
    model_answers:
      - "У першому реченні повторюються с, ск і ст; вони створюють холодний, тихий, трохи шорсткий настрій."
      - "Слова клацнув і гупнули передають конкретні короткі звуки та роблять сцену слуховою."
      - "Службове повідомлення має бути нейтральним, тому прибирає художню образність і залишає дію."
      - "Можна залишити слово гучно, бо воно описує звук точно, але не перетворює оголошення на художній уривок."
  - type: group-sort
    title: "Розподіли фонетичні засоби"
    instruction: "Визнач, який фонетичний засіб працює в кожному прикладі."
    groups:
      - name: "Алітерація"
        items:
          - "Сухий сніг сипався з сірого неба."
          - "Короткі кроки стукали коридором."
          - "Шурхотіли шини шосе."
          - "Голос громади гучніший за гасла."
      - name: "Асонанс"
        items:
          - "Далека трава пахла теплом."
          - "Сині тіні лягли під вікнами."
          - "Довго коло дому ходив холодний подих."
          - "Громада має право на правду."
      - name: "Ономатопея"
        items:
          - "Ключ клацнув у замку."
          - "Кап-кап по підвіконню."
          - "Двері гупнули за спиною."
          - "Дзень пролунав у тиші."
      - name: "Милозвучна редактура"
        items:
          - "У зв'язку зі зміною графіка відділ працює з восьмої."
          - "Звіт у відділі підготували до обіду."
          - "Вона й Олег представили проєкт."
          - "Після зустрічі зі студентами викладачка оновила план."
  - type: fill-in
    title: "Добери милозвучну форму"
    instruction: "Заповни пропуск так, щоб речення звучало природно."
    items:
      - sentence: "____ зв'язку зі зміною графіка приймальня працює до шостої."
        answer: "У"
        options: ["У", "В", "Й", "І"]
        explanation: "На початку речення перед збігом приголосних природно звучить У."
      - sentence: "Зустріч відбудеться ____ актовій залі."
        answer: "в"
        options: ["в", "у", "зі", "із"]
        explanation: "Перед голосним у слові актовій зручно вжити в."
      - sentence: "Після розмови ____ Олегом команда змінила заголовок."
        answer: "з"
        options: ["з", "зі", "із", "зо"]
        explanation: "Перед голосним О у власній назві форма з не створює важкого збігу."
      - sentence: "Редакторка працювала ____ студентами над інтонацією."
        answer: "зі"
        options: ["з", "зі", "із", "у"]
        explanation: "Перед збігом ст у слові студентами форма зі полегшує вимову."
      - sentence: "Автор пояснив правило ____ навів приклад."
        answer: "і"
        options: ["і", "й", "у", "в"]
        explanation: "Після приголосного в слові правило природно звучить і."
      - sentence: "Вона прочитала текст уголос ____ одразу знайшла важкий збіг."
        answer: "й"
        options: ["й", "і", "у", "в"]
        explanation: "Після голосного у слові уголос форма й підтримує плавність."
      - sentence: "Після зустрічі ____ студентами викладачка оновила план."
        answer: "зі"
        options: ["зі", "з", "у", "й"]
        explanation: "Перед збігом ст форма зі полегшує вимову."
      - sentence: "Команда працювала ____ університетській аудиторії."
        answer: "в"
        options: ["в", "у", "й", "зі"]
        explanation: "Перед голосним у слові університетській природно звучить в."
      - sentence: "Редакторка перевірила заголовок ____ основний абзац."
        answer: "і"
        options: ["і", "й", "в", "зі"]
        explanation: "Після приголосного в слові заголовок форма і підтримує плавність."
      - sentence: "У промові повтор має працювати ____ зміст, а не проти нього."
        answer: "на"
        options: ["на", "в", "зі", "й"]
        explanation: "Стійке формулювання працювати на зміст означає підтримувати його."
  - type: quiz
    title: "Вибери точні твердження"
    instruction: "Познач правильний варіант або варіанти для кожного питання."
    items:
      - question: "Яке твердження найточніше описує алітерацію у стилістичному аналізі?"
        options:
          - text: "Це повтор приголосних, який створює ритм або настрій."
            correct: true
          - text: "Це нормативне чергування у та в."
            correct: false
          - text: "Це будь-яке слово, що наслідує звук."
            correct: false
          - text: "Це помилкове оглушення кінцевих приголосних."
            correct: false
        explanation: "Алітерація є стилістичним повтором приголосних."
      - question: "Яке твердження найточніше описує асонанс у прозовому реченні?"
        options:
          - text: "Це повтор голосних, який впливає на мелодику фрази."
            correct: true
          - text: "Це повтор службових слів у протоколі."
            correct: false
          - text: "Це заміна з на зі перед збігом."
            correct: false
          - text: "Це скорочення речення до одного слова."
            correct: false
        explanation: "Асонанс працює через голосні, а не через службові форми."
      - question: "Де фонетична редактура потрібна передусім для нормативної милозвучності?"
        options:
          - text: "В відповідному відділі підготували звіт."
            correct: true
          - text: "Сухий сніг сипався з неба."
            correct: false
          - text: "Ключ клацнув у замку."
            correct: false
          - text: "Громада має право на правду."
            correct: false
        explanation: "Форма в відповідному створює важкий збіг."
      - question: "Яке речення найдоречніше для офіційного повідомлення про доводчик?"
        options:
          - text: "Через несправність доводчика двері зачиняються гучно."
            correct: true
          - text: "Бах, двері гупають через доводчик."
            correct: false
          - text: "Гупотять гучні двері, грізно гойдаючись."
            correct: false
          - text: "Клац-гуп, і коридор здригнувся."
            correct: false
        explanation: "Офіційний регістр потребує нейтрального опису звуку."
      - question: "Яке речення найкраще демонструє помірну рекламну алітерацію?"
        options:
          - text: "Швидкий сервіс - спокій щодня."
            correct: true
          - text: "Сервіс сервісно сервісує сервіс."
            correct: false
          - text: "З метою здійснення сервісу повідомляємо."
            correct: false
          - text: "Бах-бах, сервіс уже тут."
            correct: false
        explanation: "Помірний повтор підтримує слоган, але не руйнує зміст."
      - question: "Яке речення найвиразніше використовує ономатопею в художньому режимі?"
        options:
          - text: "Кап-кап по підвіконню, шурх-шурх по листю."
            correct: true
          - text: "Заявку опрацьовано відповідно до порядку."
            correct: false
          - text: "Відділ працює до шостої години."
            correct: false
          - text: "Графік змінено через ремонт."
            correct: false
        explanation: "Кап-кап і шурх-шурх прямо передають звук."
      - question: "Що найкраще пояснює роль логічного наголосу в публічному виступі?"
        options:
          - text: "Він показує, яка частина висловлення є смисловим центром."
            correct: true
          - text: "Він завжди замінює розділові знаки."
            correct: false
          - text: "Він робить усі слова однаково важливими."
            correct: false
          - text: "Він потрібен тільки в поезії."
            correct: false
        explanation: "Логічний наголос керує увагою слухача."
      - question: "Яке рішення найкраще виправляє фразу з структурними підрозділами?"
        options:
          - text: "Зі структурними підрозділами."
            correct: true
          - text: "Й структурними підрозділами."
            correct: false
          - text: "У структурними підрозділами."
            correct: false
          - text: "В структурними підрозділами."
            correct: false
        explanation: "Перед збігом ст форма зі полегшує вимову."
      - question: "Коли звукопис стає стилістично невдалим у B2-письмі?"
        options:
          - text: "Коли повтор не підтримує зміст і лише демонструє прийом."
            correct: true
          - text: "Коли текст має один помірний повтор."
            correct: false
          - text: "Коли автор читає речення вголос."
            correct: false
          - text: "Коли офіційний текст звучить нейтрально."
            correct: false
        explanation: "Прийом має служити змісту, а не закривати його."
      - question: "Яке твердження найкраще підсумовує фонетичну редактуру?"
        options:
          - text: "Спочатку перевіряють норму, потім виразність і жанр."
            correct: true
          - text: "Спочатку додають якомога більше повторів."
            correct: false
          - text: "Спочатку замінюють усі в на у."
            correct: false
          - text: "Спочатку прибирають усі паузи."
            correct: false
        explanation: "Послідовність допомагає не плутати норму, прийом і жанр."
  - type: error-correction
    title: "Виправ фонетичну й стилістичну незграбність"
    instruction: "Знайди помилковий або невдалий фрагмент і вибери точнішу редакцію."
    items:
      - sentence: "В зв'язку з зміною розкладу просимо звернутися з заявою."
        error: "В зв'язку з зміною"
        correction: "У зв'язку зі зміною"
        error_type: "phrase"
        options:
          - "У зв'язку зі зміною розкладу просимо подати заяву."
          - "В зв'язку з зміною розкладу просимо подати заяву."
          - "Й зв'язку зі зміною розкладу просимо подати заяву."
          - "У зв'язку з зміною розкладу просимо звернутися з заявою."
        explanation: "Форми у та зі прибирають важкий збіг, а подати заяву звучить точніше."
      - sentence: "Редактор працював з студентами і Оленою над інтонацією."
        error: "з студентами і Оленою"
        correction: "зі студентами й Оленою"
        error_type: "phrase"
        options:
          - "Редактор працював зі студентами й Оленою над інтонацією."
          - "Редактор працював з студентами і Оленою над інтонацією."
          - "Редактор працював із студентами і Оленою над інтонацією."
          - "Редактор працював у студентами й Оленою над інтонацією."
        explanation: "Зі полегшує вимову перед ст, а й природне після голосного."
      - sentence: "Креативна кампанія комунікує казково корисні кроки клієнтам."
        error: "казково корисні кроки"
        correction: "корисні кроки"
        error_type: "register"
        options:
          - "Кампанія пояснює клієнтам корисні кроки."
          - "Креативна кампанія комунікує казково корисні кроки клієнтам."
          - "Кампанія комунікує клієнтам казково креативні кроки."
          - "Креативна кампанія крокує корисними клієнтами."
        explanation: "Надмірна алітерація робить речення штучним і нечітким."
      - sentence: "У звіті написали: бах, двері гупнули через несправність доводчика."
        error: "бах"
        correction: "пролунав удар"
        error_type: "register"
        options:
          - "У звіті написали: через несправність доводчика пролунав удар дверей."
          - "У звіті написали: бах, двері гупнули через несправність доводчика."
          - "У звіті написали: двері зробили кап-кап через доводчик."
          - "У звіті написали: дзень і гуп, бо доводчик."
        explanation: "Офіційний жанр потребує нейтрального опису звуку."
      - sentence: "Ми чекали відповідь. Довго. Без."
        error: "Без."
        correction: "Без пояснень."
        error_type: "construction"
        options:
          - "Ми чекали відповідь довго й без пояснень."
          - "Ми чекали відповідь. Довго. Без."
          - "Ми чекали відповідь. Довго. Без пояснень."
          - "Ми чекали відповідь і без."
        explanation: "Окремий фрагмент має мати смислову опору."
      - sentence: "Звіт в відділі підготували до обіду."
        error: "в відділі"
        correction: "у відділі"
        error_type: "phrase"
        options:
          - "Звіт у відділі підготували до обіду."
          - "Звіт в відділі підготували до обіду."
          - "Звіт й відділі підготували до обіду."
          - "Звіт зі відділі підготували до обіду."
        explanation: "Перед приголосним в слові відділі форма у звучить природніше."
      - sentence: "І інструкцію, і оплату перенесли в кабінет."
        error: "І інструкцію"
        correction: "Й інструкцію"
        error_type: "phrase"
        options:
          - "Й інструкцію, і оплату перенесли в кабінет."
          - "І інструкцію, і оплату перенесли в кабінет."
          - "У інструкцію, і оплату перенесли в кабінет."
          - "Зі інструкцію, і оплату перенесли в кабінет."
        explanation: "Після паузи можливе і, але для плавного переліку тут природніше й."
      - sentence: "У промові прозвучало: правда правдива правдиво правдить."
        error: "правда правдива правдиво правдить"
        correction: "громада має право на правду"
        error_type: "register"
        options:
          - "У промові прозвучало: громада має право на правду."
          - "У промові прозвучало: правда правдива правдиво правдить."
          - "У промові прозвучало: правдою правдити праведну правдивість."
          - "У промові прозвучало: правдива правда править правдою."
        explanation: "Промова може мати ритмічний повтор, але не порожню гру слів."
  - type: cloze
    title: "Віднови фонетичну термінологію"
    instruction: "Заповни пропуски термінами з модуля."
    passage: >-
      ___ повторює приголосні звуки, а ___ повторює голосні. ___ або
      звуконаслідування допомагає передати конкретний шум. ___ підтримує
      природне звучання речення, зокрема через чергування у/в та і/й. У
      публічному виступі важливі також ___, пауза й темп мовлення. ___
      описує загальну красу звучання, а ___ допомагає аналізувати повтори в
      тексті. ___ перевіряє нормативну вимову, ___ організовує усне мовлення,
      а ___ тримає темп фрази. ___ особливо помітне в словах бах і дзень.
      Повтор ___ створює алітерацію, повтор ___ створює асонанс, а правильний
      ___ підтримує довіру до промовця. Вибір засобу залежить від ___ і
      потрібного ___.
    blanks:
      - id: 1
        answer: "Алітерація"
        options: ["Алітерація", "Асонанс", "Ономатопея", "Евфонія"]
      - id: 2
        answer: "асонанс"
        options: ["асонанс", "алітерація", "наголос", "паузування"]
      - id: 3
        answer: "Ономатопея"
        options: ["Ономатопея", "Редукція", "Когезія", "Парцеляція"]
      - id: 4
        answer: "Милозвучність"
        options: ["Милозвучність", "Оглушення", "Канцеляризм", "Еліпсис"]
      - id: 5
        answer: "логічний наголос"
        options: ["логічний наголос", "збіг приголосних", "пряма мова", "паронім"]
      - id: 6
        answer: "евфонія"
        options: ["евфонія", "тавтологія", "інверсія", "анотація"]
      - id: 7
        answer: "звукопис"
        options: ["звукопис", "описка", "підрядність", "калька"]
      - id: 8
        answer: "орфоепія"
        options: ["орфоепія", "орфографія", "морфологія", "пунктуація"]
      - id: 9
        answer: "пауза"
        options: ["пауза", "префікс", "суфікс", "артикль"]
      - id: 10
        answer: "ритм"
        options: ["ритм", "рід", "число", "відмінок"]
      - id: 11
        answer: "звуконаслідування"
        options: ["звуконаслідування", "узгодження", "керування", "відокремлення"]
      - id: 12
        answer: "приголосні"
        options: ["приголосні", "прийменники", "частки", "вигуки"]
      - id: 13
        answer: "голосні"
        options: ["голосні", "займенники", "числівники", "сполучники"]
