version: '1.0'
module: phonetic-stylistic-devices
level: b2
inline:
- type: select
  title: Почуй і поясни ефект
  instruction: Виберіть найточніше пояснення звукового рішення.
  items:
  - question: У фразі «Сухий сніг сипався з неба» повтор **с** найімовірніше...
    options:
    - text: підсилює відчуття тихого, сипкого руху
      correct: true
    - text: доводить фактичну температуру повітря
      correct: false
    - text: є помилкою милозвучності
      correct: false
    - text: підходить лише для офіційної довідки
      correct: false
    explanation: Повтор може створювати слуховий образ, але не доводить факт.
  - question: Яка відповідь найкраще аналізує «Громада має право на правду»?
    options:
    - text: Повтор **а** створює ритм, але фразі потрібні факти після неї.
      correct: true
    - text: Повтор **а** сам доводить правоту мовця.
      correct: false
    - text: Це приклад какофонії, тому фразу треба прибрати.
      correct: false
    - text: Це тільки орфографічне правило.
      correct: false
    explanation: Ритм допомагає пам'ятності, але не замінює доказ.
  - question: Де проблема передусім нормативно-фонетична?
    options:
    - text: В відповідному відділі підготували звіт.
      correct: true
    - text: Ключ клацнув у замку.
      correct: false
    - text: Дрібний дощ дряпав дах.
      correct: false
    - text: Ми чуємо місто, ми чуємо двори.
      correct: false
    explanation: Збіг **в в** потребує редактури.
  - question: Яка формула аналізу звуку є найобережнішою?
    options:
    - text: Повтор **р** може підсилювати напруження в цьому контексті.
      correct: true
    - text: Повтор **р** завжди означає загрозу.
      correct: false
    - text: Автор безперечно хотів показати страх.
      correct: false
    - text: Будь-який повтор є алітерацією високого стилю.
      correct: false
    explanation: B2-аналіз не перебільшує намір без доказів.
  - question: Який варіант доречніший для службового повідомлення?
    options:
    - text: Через несправність доводчика двері зачиняються надто гучно.
      correct: true
    - text: Бахнули двері, і коридор аж здригнувся.
      correct: false
    - text: Гуп-гуп, двері гримлять у гнівному коридорі.
      correct: false
    - text: Двері драматично загриміли, мов грім.
      correct: false
    explanation: Офіційний жанр потребує нейтрального опису звуку.
  - question: У реченні «Шелестів шовковий шум дощу» повтор **ш** найкраще описати як...
    options:
    - text: алітерацію, що створює м'який шурхотливий ефект
      correct: true
    - text: літоту, що применшує дощ
      correct: false
    - text: метонімію міського простору
      correct: false
    - text: порушення службового регістру
      correct: false
    explanation: Повтор приголосного **ш** підтримує слуховий образ.
  - question: Що робить пауза в реченні «Рішення ухвалили швидко - надто швидко»?
    options:
    - text: додає оцінку після нейтрального повідомлення
      correct: true
    - text: перетворює фразу на метонімію
      correct: false
    - text: прибирає логічний наголос
      correct: false
    - text: доводить юридичний факт
      correct: false
    explanation: Пауза змінює інтонаційну й оцінну рамку.
  - question: Яке твердження найточніше про фонетичний прийом?
    options:
    - text: Він має служити змісту й жанрові.
      correct: true
    - text: Він завжди важливіший за факти.
      correct: false
    - text: Його треба додавати в кожне речення.
      correct: false
    - text: Він не пов'язаний з вимовою.
      correct: false
    explanation: Звукопис є інструментом, а не самостійною метою.
- type: error-correction
  title: Виправ милозвучність
  instruction: Виберіть редакцію, яка полегшує звучання і зберігає зміст.
  items:
  - sentence: В зв'язку з зміною графіка зверніться в відділ реєстрації.
    error: важкі збіги в/з
    options:
    - У зв'язку зі зміною графіка зверніться до відділу реєстрації.
    - В зв'язку із зміною графіка зверніться в відділ реєстрації.
    - Зміною графіка в зв'язку зверніться в відділ.
    - У зв'язку з зміною графіка в відділ зверніться.
    explanation: Форми **у**, **зі** і прийменник **до** знімають кілька важких місць.
    answer: У зв'язку зі зміною графіка зверніться до відділу реєстрації.
  - sentence: Звіт з школи надійшов в управління.
    error: з школи
    options:
    - Звіт зі школи надійшов в управління.
    - Звіт з школи надійшов у управління.
    - Звіт із школи надійшов в управління.
    - З школи звіт в управління надійшов.
    explanation: Перед збігом **шк** природно вжити **зі**.
    answer: Звіт зі школи надійшов в управління.
  - sentence: Автор пояснив правило й навів приклад.
    error: немає помилки
    options:
    - Автор пояснив правило й навів приклад.
    - Автор пояснив правило і навів приклад.
    - Автор пояснив правило у навів приклад.
    - Автор пояснив правилой навів приклад.
    explanation: Після голосного в слові **правило** форма **й** звучить природно.
    answer: Автор пояснив правило й навів приклад.
  - sentence: Працюємо з студентами над вимовою.
    error: з студентами
    options:
    - Працюємо зі студентами над вимовою.
    - Працюємо з студентами над вимовою.
    - Працюємо із студентами над вимовою.
    - Працюємо в студентами над вимовою.
    explanation: Форма **зі** полегшує збіг **ст**.
    answer: Працюємо зі студентами над вимовою.
  - sentence: З метою здійснення перевірки звітів з структурними підрозділами надіслано запит.
    error: канцелярит і важкий повтор з
    options:
    - Щоб перевірити звіти зі структурними підрозділами, надіслано запит.
    - З метою здійснення перевірки звітів з структурними підрозділами надіслано запит.
    - Для здійснення з перевірки звітів з структурними підрозділами запит надіслано.
    - Здійснюючи з метою перевірки, з підрозділами звіти запитано.
    explanation: Фонетична правка поєднується з лексико-синтаксичною ясністю.
    answer: Щоб перевірити звіти зі структурними підрозділами, надіслано запит.
  - sentence: І інструкція, і оголошення були готові.
    error: і інструкція
    correction: Й інструкція, і оголошення були готові.
    options:
    - Й інструкція, і оголошення були готові.
    - І інструкція, і оголошення були готові.
    - У інструкція, і оголошення були готові.
    - В інструкція, й оголошення були готові.
    explanation: Після паузи та перед голосним можлива форма **й** для плавності.
  - sentence: В університеті і інституті провели зустрічі.
    error: і інституті
    correction: В університеті й інституті провели зустрічі.
    options:
    - В університеті й інституті провели зустрічі.
    - В університеті і інституті провели зустрічі.
    - У університеті у інституті провели зустрічі.
    - Й університеті і інституті провели зустрічі.
    explanation: Форма **й** уникає збігу голосних.
  - sentence: З Оксаною і Ігорем записали подкаст.
    error: і Ігорем
    correction: З Оксаною й Ігорем записали подкаст.
    options:
    - З Оксаною й Ігорем записали подкаст.
    - З Оксаною і Ігорем записали подкаст.
    - Із Оксаною у Ігорем записали подкаст.
    - Зі Оксаною і Ігорем записали подкаст.
    explanation: Після голосного природно звучить **й**.
- type: group-sort
  title: Розрізни повтори
  instruction: Розподіліть приклади за головним фонетичним механізмом.
  groups:
  - items:
    - Дрібний дощ дряпав дах.
    - Сухий сніг сипався з неба.
    - Шурхотіли шини на шосе.
    - Ключ клацнув у замку.
    name: Алітерація
  - items:
    - Громада має право на правду.
    - Озеро поволі розгортало холодну прозорість.
    - Мала зала чекала ранку.
    - Дорога довго вела до дому.
    name: Асонанс
  - items:
    - В відповідному відділі.
    - З школою з звітом.
    - І інші інструкції.
    - З структурними змінами.
    name: Не стилістичний повтор, а проблема звучання
- type: select
  title: Евфонія, какофонія чи нейтральність
  instruction: Виберіть найкращу редакторську оцінку.
  items:
  - question: «Скрип, скрегіт, сухий пил» у художньому описі під'їзду - це...
    options:
    - text: можлива вмотивована какофонія
      correct: true
    - text: обов'язкова помилка милозвучності
      correct: false
    - text: офіційна формула
      correct: false
    - text: асонанс відкритого а
      correct: false
    explanation: Різке звучання може бути прийомом, якщо підтримує образ.
  - question: «Ключ клацнув у замку» найкраще описує...
    options:
    - text: звуконаслідувальний ефект через дієслово й приголосні
      correct: true
    - text: помилку чергування у/в
      correct: false
    - text: літоту
      correct: false
    - text: офіційно-діловий штамп
      correct: false
    explanation: Дієслово **клацнув** робить дію чутною.
  - question: Яка редакція найкраща для акта про несправні двері?
    options:
    - text: Двері зачиняються надто гучно через несправність доводчика.
      correct: true
    - text: Двері гупають, мов грім у коридорі.
      correct: false
    - text: Бах-бах, і весь під'їзд здригається.
      correct: false
    - text: Скрегіт сервісу сколихнув сходи.
      correct: false
    explanation: Сервісний документ називає проблему без художнього звукопису.
  - question: Коли звукова гра стає невдалою?
    options:
    - text: Коли прийом помітніший за зміст.
      correct: true
    - text: Коли в тексті є один помірний повтор.
      correct: false
    - text: Коли автор читає текст уголос.
      correct: false
    - text: Коли офіційний текст звучить нейтрально.
      correct: false
    explanation: Звук має служити комунікативній меті.
  - question: Що треба зробити перед висновком про какофонію?
    options:
    - text: Перевірити, чи важкість випадкова, нормативна або художньо вмотивована.
      correct: true
    - text: Назвати кожний збіг приголосних авторською символікою.
      correct: false
    - text: Замінити всі приголосні повтори голосними.
      correct: false
    - text: Прибрати всі різкі слова незалежно від жанру.
      correct: false
    explanation: Оцінка залежить від функції й жанру.
  - question: Який приклад найкраще показує евфонічну правку?
    options:
    - text: з структурними -> зі структурними
      correct: true
    - text: звіт -> звітище
      correct: false
    - text: двері -> бах
      correct: false
    - text: пауза -> метафора
      correct: false
    explanation: Форма **зі** полегшує вимову перед збігом.
  - question: Де звукопис доречний передусім як художній засіб?
    options:
    - text: Старі сходи скрипіли й сипали пил.
      correct: true
    - text: Заяву зареєстровано 12 травня.
      correct: false
    - text: Номер заявки буде надіслано поштою.
      correct: false
    - text: Строк розгляду становить п'ять днів.
      correct: false
    explanation: Художній опис може використовувати звук для атмосфери.
  - question: Яке формулювання найкраще уникає надмірного висновку?
    options:
    - text: Повтор може підсилювати відчуття напруги.
      correct: true
    - text: Автор точно хотів показати страх.
      correct: false
    - text: Будь-який звук **р** означає небезпеку.
      correct: false
    - text: Звук доводить зміст без контексту.
      correct: false
    explanation: Обачні модальні формули потрібні для чесного аналізу.
- type: fill-in
  title: Наголос, пауза, жанр
  instruction: Доберіть слово або формулу, яка завершує редакторське пояснення.
  items:
  - sentence: У реченні «Рішення ухвалили швидко - надто швидко» тире створює оцінну ____.
    answer: паузу
    options:
    - паузу
    - метафору
    - паронімію
    - синекдоху
    explanation: Після паузи нейтральне повідомлення стає оцінним.
  - sentence: Якщо наголос падає на «ми» у фразі «Ми не відмовляємося від змін», фокус зміщується на ____.
    answer: мовця
    options:
    - мовця
    - час дії
    - кількість доказів
    - орфографію
    explanation: Логічний наголос виділяє саме групу мовців.
  - sentence: Ритмічна формула в промові не замінює ____.
    answer: доказів
    options:
    - доказів
    - пауз
    - голосних
    - алфавіту
    explanation: Стилістичний ефект має підтримувати аргумент, а не закривати його.
  - sentence: Перший прохід фонетичної редактури варто робити ____.
    answer: уголос
    options:
    - уголос
    - мовчки
    - без пауз
    - лише за словником
    explanation: Звучання треба почути, а не тільки побачити.
  - sentence: 'Останнє питання до фонетичного прийому: чи дозволяє його ____.'
    answer: жанр
    options:
    - жанр
    - колір
    - шрифт
    - номер сторінки
    explanation: Жанрова доречність визначає, чи ефект залишити.
  - sentence: Повтор приголосних звуків називається ____.
    answer: алітерацією
    options:
    - алітерацією
    - асонансом
    - літотою
    - метонімією
    explanation: Алітерація працює з приголосними.
  - sentence: Повтор голосних звуків називається ____.
    answer: асонансом
    options:
    - асонансом
    - алітерацією
    - гіперболою
    - парцеляцією
    explanation: Асонанс працює з голосними.
  - sentence: Імітація звуку словами або дієсловами - це ____.
    answer: звуконаслідування
    options:
    - звуконаслідування
    - евфемізм
    - синекдоха
    - хіазм
    explanation: Звуконаслідування робить сцену чутною.
  - sentence: Важке, різке звучання, якщо воно вмотивоване, може бути ____.
    answer: какофонією
    options:
    - какофонією
    - літотою
    - епітетом
    - паронімією
    explanation: Какофонія може бути художнім засобом.
  - sentence: Легке й плавне звучання часто називають ____.
    answer: евфонією
    options:
    - евфонією
    - антитезою
    - інверсією
    - анафорою
    explanation: Евфонія пов'язана з милозвучністю.
- id: act-6
  type: essay-response
  title: 'Мініаналіз: звук без перебільшення'
  instruction: Проаналізуйте фрагмент і відредагуйте одну фразу.
  prompt: 'Розгляньте фрагмент: «Сірий сніг сповзав зі сходів, і старий двір стишував голоси. В відповідному повідомленні написали: двері бахнули через доводчик». Назвіть один фонетичний ефект у першому реченні, поясніть його обережно, а друге речення перепишіть для сервісного повідомлення.'
  min_words: 150
  model_answer: |
    > [!model-answer]
    > У першому реченні повторюються свистячі **с/з/ст** у словах **сірий**, **сніг**, **сповзав**, **зі сходів**, **старий**, **стишував**. Це може створювати приглушений зимовий настрій, але не треба стверджувати, що звук сам по собі доводить емоційний стан автора. Друге речення для сервісного повідомлення краще зробити нейтральним: **У відповідному повідомленні зазначили, що через несправність доводчика двері зачиняються надто гучно.**
  rubric:
  - criteria: Критерій 1
    description: Названо конкретний звук або групу звуків.
  - criteria: Критерій 2
    description: Пояснення сформульовано без надмірного авторського наміру.
  - criteria: Критерій 3
    description: Сервісна редакція зберігає факт і прибирає художнє «бахнули».
workbook:
- id: wb-reading-phonetic-analysis
  type: reading
  title: 'Читання: звук у міському описі'
  instruction: Прочитайте уривок і виконайте завдання.
