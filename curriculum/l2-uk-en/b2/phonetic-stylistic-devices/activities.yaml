  - type: essay-response
    id: phonetic-editing-task
    title: "Фонетична редактура абзацу"
    instruction: "Відредагуй абзац і коротко поясни три рішення: милозвучність, звуковий повтор, жанр."
    prompt: >-
      Відредагуй текст: В зв'язку з зміною графіка і оновленням інструкції
      відділ звертається з запитом до студентів. Сильний сервіс створює
      супершвидкі суперспокійні сценарії. Бах, двері зачиняються через доводчик.
      Потрібно отримати природний текст для офіційного оголошення з одним
      помірним ритмічним акцентом.
    min_words: 150
    model_answer: >-
      У зв'язку зі зміною графіка й оновленням інструкції відділ просить
      студентів подати запит через електронну форму. Сервіс має працювати
      швидко й спокійно, тому в оголошенні залишено лише помірний повтор с,
      без рекламного перебільшення. Через несправність доводчика двері
      зачиняються гучно; перевірку заплановано на завтра. Я замінив в на у та
      з на зі, бо початкові збіги заважали милозвучності. Звуконаслідування
      бах не підходить офіційному жанру, тому його замінено нейтральним описом.
    rubric:
      - criteria: "Милозвучність"
        points: 3
        description: "Виправлено чергування у/в, і/й, з/зі/із там, де це потрібно."
      - criteria: "Звуковий повтор"
        points: 3
        description: "Прибрано надмірну алітерацію або пояснено, чому залишено помірний повтор."
      - criteria: "Жанрова доречність"
        points: 2
        description: "Звуконаслідування замінено на жанрово нейтральний опис."
      - criteria: "Метамова"
        points: 2
        description: "Пояснення написане українською й спирається на терміни модуля."
