version: '1.0'
module: checkpoint-morphology
level: b2

inline:
  - id: act-1
    type: reading
    title: "Діагностика іменної групи"
    instruction: "Прочитайте фрагмент і визначте форми, які треба пояснити редакторові."
    source: "Навчальний checkpoint-фрагмент B2."
    text: >-
      Комісія розглянула звернення трьох громадських організацій і відповідь
      семисот сорока двох учасників. Після відкритих консультацій координатори
      оновили правила реєстрації для місцевих ініціатив.
    tasks:
      - "Поясніть форму трьох громадських організацій."
      - "Поясніть, чому в семисот сорока двох відмінюються кілька частин."
      - "Випишіть прикметник, який узгоджується з консультацій."
      - "Знайдіть іменникову групу з прийменником після."
      - "Запропонуйте простішу редакцію з цифрою 742."
  - type: quiz
    title: "Аспект, спосіб і виконавець"
    instruction: "Оберіть варіант, який найкраще пояснює дієслівну форму."
    items:
      - question: "Команда перевіряла анкети протягом травня."
        options:
          - text: "Форма перевіряла показує процес або тривалу дію."
            correct: true
          - text: "Форма перевіряла обов'язково означає завершений результат."
            correct: false
          - text: "Це умовний спосіб."
            correct: false
          - text: "Це безособова форма на -но."
            correct: false
        explanation: "Недоконаний вид тут описує процес."
      - question: "Команда перевірила анкети до першого червня."
        options:
          - text: "Форма перевірила називає завершений результат."
            correct: true
          - text: "Форма перевірила показує повторювану процедуру без межі."
            correct: false
          - text: "Це давноминулий час."
            correct: false
          - text: "Це наказовий спосіб."
            correct: false
        explanation: "Доконаний вид потрібен для результату до дедлайну."
      - question: "Якби список надійшов раніше, команда перевірила б дані."
        options:
          - text: "Якби + перевірила б формує нереалізовану умову."
            correct: true
          - text: "Якби тут дорівнює реальному якщо."
            correct: false
          - text: "Частка б є зайвою в умовному способі."
            correct: false
          - text: "Це наказова інструкція."
            correct: false
        explanation: "Умовний спосіб має частку б/би і минулу форму дієслова."
      - question: "Перевіривши таблицю, редактор виправив числівники."
        options:
          - text: "Дієприслівник правильний, бо виконавець той самий."
            correct: true
          - text: "Дієприслівник помилковий, бо таблиця виконує дію."
            correct: false
          - text: "Це безособова конструкція."
            correct: false
          - text: "Треба обов'язково замінити на активний дієприкметник."
            correct: false
        explanation: "Редактор і перевірив, і виправив."
      - question: "Після перевірки таблиці результати було опубліковано."
        options:
          - text: "Форма опубліковано ставить у центр результат."
            correct: true
          - text: "Форма опубліковано називає ознаку іменника."
            correct: false
          - text: "Це активний дієприкметник."
            correct: false
          - text: "Це помилка, бо безособові форми не вживаються в офіційному стилі."
            correct: false
        explanation: "Безособові форми на -но/-то природні для результату."
      - question: "Учасники, які працюють над проєктом, отримали лист."
        options:
          - text: "Підрядна частина уникає калькованого активного дієприкметника."
            correct: true
          - text: "Треба замінити на працюючі над проєктом учасники."
            correct: false
          - text: "Які тут є часткою."
            correct: false
          - text: "Це приклад давноминулого часу."
            correct: false
        explanation: "Підрядна частина часто природніша за форму на -юч-."
      - question: "Від семисот сорока двох заявок залишилося десять неперевірених."
        options:
          - text: "Складений числівник стоїть у родовому після від."
            correct: true
          - text: "Після від потрібен називний відмінок."
            correct: false
          - text: "Треба писати від сімсот сорок дві заявки."
            correct: false
          - text: "Це форма орудного відмінка."
            correct: false
        explanation: "Від керує родовим, тому відмінюються частини числівника."
      - question: "Завдяки підтримці партнерів команда завершила звіт раніше."
        options:
          - text: "Завдяки керує давальним і називає позитивну причину."
            correct: true
          - text: "Завдяки керує знахідним і називає перешкоду."
            correct: false
          - text: "Потрібно замінити підтримці на підтримку."
            correct: false
          - text: "Це приклад підрядного сполучника."
            correct: false
        explanation: "Форма підтримці є давальним після завдяки."
      - question: "Ми були домовилися про зустріч, але її перенесли."
        options:
          - text: "Форма були домовилися може показувати попередню минулу домовленість."
            correct: true
          - text: "Це майбутній час доконаного виду."
            correct: false
          - text: "Це безособова форма на -то."
            correct: false
          - text: "Форма обов'язкова в кожному офіційному звіті."
            correct: false
        explanation: "Давноминулий час доречний лише тоді, коли треба підкреслити попередність."
      - question: "Ефективне пояснення правил зменшує кількість повторних звернень."
        options:
          - text: "Ефективне означає результативне, тому форма відповідає змісту."
            correct: true
          - text: "Тут треба ефектне, бо йдеться про результат."
            correct: false
          - text: "Ефективне є прийменником."
            correct: false
          - text: "Це активний дієприкметник на -юч-."
            correct: false
        explanation: "Ефективний стосується результату, а ефектний - враження."

  - type: fill-in
    title: "Керування службових слів"
    instruction: "Оберіть форму, яка відповідає прийменнику або логіці сполучника."
    items:
      - sentence: "Звіт підготували згідно ____ комісії."
        answer: "з рішенням"
        options: ["з рішенням", "рішення", "до рішення", "рішенням"]
        explanation: "Згідно з керує орудним."
      - sentence: "Консультації тривали ____ трьох тижнів."
        answer: "протягом"
        options: ["протягом", "на протязі", "із-за", "по"]
        explanation: "Для тривалості часу нормативно вживаємо протягом."
      - sentence: "Процедуру змінили, ____ учасники могли уточнити дані."
        answer: "щоб"
        options: ["щоб", "бо", "хоча", "якби"]
        explanation: "Йдеться про мету."
      - sentence: "____ партнери надали підтримку, команда завершила звіт раніше."
        answer: "Завдяки тому що"
        options: ["Завдяки тому що", "Хоча", "Якби", "Попри те що"]
        explanation: "Потрібна позитивна причина."
      - sentence: "____ частину анкет подали раніше, команда перевірила б дані до дедлайну."
        answer: "Якби"
        options: ["Якби", "Якщо", "Бо", "Після того як"]
        explanation: "Нереалізована умова потребує якби."
      - sentence: "____ технічну помилку таблицю опублікували пізніше."
        answer: "Через"
        options: ["Через", "Завдяки", "Відповідно до", "Всупереч"]
        explanation: "Через + знахідний називає небажану причину."
      - sentence: "____ нового порядку заявки приймали онлайн."
        answer: "Відповідно до"
        options: ["Відповідно до", "Згідно з", "Через", "Попри"]
        explanation: "Відповідно до керує родовим."
      - sentence: "____ прогнозам учасників стало більше."
        answer: "Всупереч"
        options: ["Всупереч", "Через", "Протягом", "Замість"]
        explanation: "Всупереч керує давальним і створює допустову рамку."
      - sentence: "Команда опублікувала таблицю, ____ частина адрес ще уточнювалася."
        answer: "хоча"
        options: ["хоча", "щоб", "якби", "тому що"]
        explanation: "Потрібен допуст: перешкода не зупинила дію."
      - sentence: "Учасники надіслали ____ коментарі після консультації."
        answer: "свої"
        options: ["свої", "свій", "свого", "своїм"]
        explanation: "Коментарі - множина знахідного, тому займенник має форму свої."

  - type: mark-the-words
    title: "Морфемні підказки"
    instruction: "Позначте слова, у яких морфемний елемент допомагає зрозуміти значення або граматичну форму."
    text: "Учасник і координаторка підготували узгодження правил, щоб прозорість процедури стала помітнішою; офіційно документ опублікували по-українському."
    answers:
      - "Учасник"
      - "координаторка"
      - "узгодження"
      - "прозорість"
      - "помітнішою"
      - "офіційно"
      - "опублікували"
      - "по-українському"

  - type: error-correction
    title: "Морфологічна коректура"
    instruction: "Виправте помилку й поясніть тип морфологічного рішення."
    items:
      - sentence: "Згідно рішення комісії консультації перенесли."
        error: "Згідно рішення"
        correction: "Згідно з рішенням"
        explanation: "Згідно з керує орудним."
      - sentence: "На протязі трьох тижнів команда опрацювала заявки."
        error: "На протязі"
        correction: "Протягом"
        explanation: "Для часу вживаємо протягом."
      - sentence: "Від сімсот сорок дві заявки залишилося десять неперевірених."
        error: "сімсот сорок дві заявки"
        correction: "семисот сорока двох заявок"
        explanation: "Після від потрібен родовий складеного числівника."
      - sentence: "Якщо анкети подали б раніше, команда перевірила б дані."
        error: "Якщо анкети подали б"
        correction: "Якби анкети подали"
        explanation: "Нереалізована умова потребує якби, а частка б стоїть у головній частині."
      - sentence: "Перевіривши таблицю, результати було опубліковано."
        error: "Перевіривши таблицю, результати було опубліковано"
        correction: "Після перевірки таблиці результати було опубліковано"
        explanation: "Дієприслівниковий зворот мав би спільного виконавця з головною дією."
      - sentence: "Працюючі над проєктом учасники отримали інструкцію."
        error: "Працюючі над проєктом учасники"
        correction: "Учасники, які працюють над проєктом"
        explanation: "Підрядна частина природніша за активний дієприкметник на -юч-."
      - sentence: "Затримку подолали завдяки технічну підтримку."
        error: "технічну підтримку"
        correction: "технічній підтримці"
        explanation: "Завдяки керує давальним."
      - sentence: "У звіті описано ефектний порядок реєстрації, який дає кращий результат."
        error: "ефектний"
        correction: "ефективний"
        explanation: "Тут потрібне значення результативності, а не зовнішнього враження."

  - id: act-6
    type: essay-response
    title: "Короткий морфологічний аудит"
    instruction: "Напишіть 150-180 слів: знайдіть три морфологічні вузли, виправте один і поясніть редакторський ефект."
    prompt: >-
      Проаналізуйте короткий офіційний або академічний фрагмент. Обов'язково
      використайте: один приклад прийменникового керування, один приклад
      аспекту або умовного способу, один приклад словотвірної чи дієприкметникової
      правки. Завершіть реченням про те, як правки змінюють тон або ясність тексту.
    min_words: 150
    model_answer: |-
      > [!model-answer]
      > У фрагменті про консультації перша контрольна форма - **згідно з рішенням комісії**: прийменник **згідно з** керує орудним, тому форма **рішенням** нормативна. Друга форма - **якби анкети подали раніше, команда перевірила б дані**. Тут умовний спосіб послідовний, бо **якби** вводить нереалізовану умову, а частка **б** стоїть у головній частині. Третя правка стосується фрази **працюючі над проєктом учасники**. Я замінив би її на **учасники, які працюють над проєктом**, бо підрядна частина звучить природніше в нейтральному реєстрі. Такі правки роблять текст точним: читач бачить, що автор контролює відмінок, спосіб і стилістичну доречність форми.
    rubric:
      - criteria: "Керування"
        description: "Названо прийменник або дієслово, яке визначає форму."
        points: 4
      - criteria: "Дієслівна система"
        description: "Пояснено аспект, спосіб, дієприкметник або дієприслівник."
        points: 4
      - criteria: "Словотвір і реєстр"
        description: "Є словотвірна або регістрова правка з поясненням."
        points: 4
      - criteria: "Зв'язність"
        description: "Відповідь читається як короткий аналіз, а не список форм."
        points: 3

workbook:
  - id: workbook-1
    type: reading
    title: "Читання: повний checkpoint-фрагмент"
    instruction: "Прочитайте фрагмент і виконайте завдання для письмової перевірки."
    source: "Навчальний контрольний текст B2."
    text: >-
      Відповідно до нового порядку реєстрації, протягом квітня координатори
      опрацювали дев'ятсот тридцять одну заявку. Якби частину анкет подали
      раніше, комісія перевірила б дані до засідання. Після перевірки таблиці
      результати було опубліковано, хоча частина учасників ще уточнювала адреси.
      У звіті зазначено, що громадський контроль робить процедуру прозорішою,
      а ефективне пояснення правил зменшує кількість повторних звернень.
    tasks:
      - "Випишіть прийменникову групу з родовим відмінком."
      - "Поясніть форму дев'ятсот тридцять одну заявку."
      - "Знайдіть умовний спосіб і назвіть його частини."
      - "Поясніть функцію безособової форми на -но."
      - "Випишіть словотвірну пару громадський / ефективне й поясніть значення."
  - type: translate
    title: "Переклад із морфологічним контролем"
    instruction: "Оберіть український варіант, який зберігає граматику й реєстр."
    items:
      - source: "according to the commission's decision"
        options:
          - text: "згідно з рішенням комісії"
            correct: true
          - text: "згідно рішення комісії"
            correct: false
          - text: "по рішенню комісії"
            correct: false
          - text: "відповідно рішення комісії"
            correct: false
        explanation: "Згідно з керує орудним."
      - source: "during three weeks"
        options:
          - text: "протягом трьох тижнів"
            correct: true
          - text: "на протязі три тижні"
            correct: false
          - text: "по трьох тижнях"
            correct: false
          - text: "із-за трьох тижнів"
            correct: false
        explanation: "Для часу потрібне протягом + родовий."
      - source: "if they had submitted the forms earlier"
        options:
          - text: "якби вони подали анкети раніше"
            correct: true
          - text: "якщо вони подали б анкети раніше"
            correct: false
          - text: "бо вони подали анкети раніше"
            correct: false
          - text: "щоб вони подали анкети раніше"
            correct: false
        explanation: "Нереалізована умова потребує якби."
      - source: "the results have been published"
        options:
          - text: "результати опубліковано"
            correct: true
          - text: "результати були опубліковані кимось"
            correct: false
          - text: "результати публікуючі"
            correct: false
          - text: "результати опублікувався"
            correct: false
        explanation: "Безособова форма природно передає результат."
      - source: "participants working on the project"
        options:
          - text: "учасники, які працюють над проєктом"
            correct: true
          - text: "працюючі над проєктом учасники"
            correct: false
          - text: "учасники працюючі над проєктом"
            correct: false
          - text: "учасники, працюючі проєкт"
            correct: false
        explanation: "Підрядна частина природніша в нейтральному реєстрі."
      - source: "an effective explanation of the rules"
        options:
          - text: "ефективне пояснення правил"
            correct: true
          - text: "ефектне пояснення правил"
            correct: false
          - text: "пояснення ефекту правил"
            correct: false
          - text: "ефектовне пояснення правил"
            correct: false
        explanation: "Effective у значенні результативності - ефективний."
      - source: "contrary to the forecasts"
        options:
          - text: "всупереч прогнозам"
            correct: true
          - text: "всупереч прогнозів"
            correct: false
          - text: "попри прогнозам"
            correct: false
          - text: "завдяки прогнозам"
            correct: false
        explanation: "Всупереч керує давальним."
      - source: "from nine hundred thirty-one applications"
        options:
          - text: "від дев'ятисот тридцяти однієї заявки"
            correct: true
          - text: "від дев'ятсот тридцять одна заявка"
            correct: false
          - text: "від дев'ятьмастами тридцятьма однією заявкою"
            correct: false
