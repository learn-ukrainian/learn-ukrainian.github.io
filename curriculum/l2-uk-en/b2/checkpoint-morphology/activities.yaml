  - id: workbook-4
    type: critical-analysis
    title: "Морфологічний аудит абзацу"
    instruction: "Проаналізуйте абзац і запропонуйте контрольну редакцію."
    target_text: >-
      Згідно рішення комісії, на протязі квітня координатори опрацьовували
      дев'ятсот тридцять одну заявку. Якщо б анкети подали раніше, дані були б
      перевірені до засідання. Звіривши списки, результати було опубліковано.
      У звіті згадано ефектний порядок реєстрації та працюючих над проєктом
      учасників.
    questions:
      - "Які дві прийменникові конструкції треба виправити?"
      - "Де треба змінити аспект або умовний спосіб?"
      - "Який дієприслівниковий зворот має проблему виконавця?"
      - "Які дві словотвірні або дієприкметникові правки потрібні?"
      - "Подайте повну відредаговану версію."
    model_answers:
      - "Згідно рішення -> згідно з рішенням; на протязі квітня -> протягом квітня."
      - "Для підсумку краще опрацювали; якщо б анкети подали -> якби анкети подали."
      - "Звіривши списки, результати було опубліковано: результати не звіряли списки."
      - "Ефектний -> ефективний; працюючих над проєктом учасників -> учасників, які працюють над проєктом."
      - "Згідно з рішенням комісії, протягом квітня координатори опрацювали дев'ятсот тридцять одну заявку. Якби анкети подали раніше, дані перевірили б до засідання. Після звірення списків результати було опубліковано. У звіті згадано ефективний порядок реєстрації та учасників, які працюють над проєктом."

  - id: workbook-5
    type: essay-response
    title: "Підсумкова відповідь checkpoint"
    instruction: "Напишіть 150-200 слів як відповідь на контрольній роботі."
    prompt: >-
      Виберіть один офіційний або академічний абзац і зробіть морфологічний
      аудит. Поясніть щонайменше п'ять рішень: іменна група або числівник,
      прийменникове керування, аспект або умовний спосіб, дієприкметник /
      дієприслівник / форма на -но/-то, службове слово або частка, словотвірна
      точність. Додайте одну повну редакцію речення.
    min_words: 150
    model_answer: |-
      > [!model-answer]
      > У контрольному абзаці я спершу перевірив іменні групи. Форма **дев'ятсот тридцять одну заявку** можлива після **опрацювали**, бо це знахідний неживого об'єкта, але після **серед** треба було б **дев'ятисот тридцяти однієї заявки**. Далі я виправив прийменникове керування: **згідно рішення** має стати **згідно з рішенням**, а **на протязі квітня** - **протягом квітня**. У реченні **якщо б анкети подали раніше** потрібне **якби анкети подали раніше**, бо це нереалізована умова. Зворот **звіривши списки, результати було опубліковано** я замінив на **після звірення списків результати було опубліковано**, щоб прибрати помилку виконавця. Нарешті, **ефектний порядок** змінив на **ефективний порядок**, бо йдеться про результативність. Такі правки роблять текст нейтральним, точним і придатним для офіційного звіту.
    rubric:
      - criteria: "Охоплення"
        description: "Пояснено щонайменше п'ять різних морфологічних рішень."
        points: 5
      - criteria: "Нормативність"
        description: "Правки граматично правильні й не створюють нових помилок."
        points: 5
      - criteria: "Редакторський ефект"
        description: "Пояснено, як правки впливають на ясність або реєстр."
        points: 4
      - criteria: "Структура"
        description: "Відповідь має зв'язний абзац і одну повну редакцію."
        points: 3
