version: '1.0'
module: checkpoint-morphology
level: b2
inline: []
workbook:
- type: reading
  id: morphology-document-reading
  title: "Читання: морфологічний аудит документа"
  instruction: "Прочитайте фрагмент офіційного тексту і визначте, які морфологічні рішення потребують перевірки."
  source: "Навчальний фрагмент для checkpoint."
  text: >-
    Згідно з рішенням правління, протягом двох місяців проведено
    опитування серед п'ятисот шістдесяти двох учасників, які працюють
    у Києві, Львові та Одесі. Завдяки підтримці партнерів підготовлено
    оновлений календар консультацій. Якщо реєстрація затягнеться,
    координатори відкриють додаткову групу, щоб учасники з регіонів
    могли поставити запитання до початку основної програми.
  tasks:
  - "Випишіть прийменниково-іменникову конструкцію з орудним відмінком."
  - "Поясніть, чому числівник після серед має родовий відмінок."
  - "Знайдіть безособову форму на -но/-то і поясніть її функцію."
  - "Визначте, чому які працюють природніше за активний дієприкметник."
  - "Назвіть підрядну частину мети."

- type: quiz
  title: "Морфологічна норма: оперативна діагностика"
  instruction: "Оберіть правильну форму або пояснення."
  items:
  - question: "Яка форма правильна після до?"
    options:
    - text: "до п'ятисот шістдесяти заявок"
      correct: true
    - text: "до п'ятсот шістдесят заявок"
      correct: false
    - text: "до п'ятьмастами шістдесятьма заявками"
      correct: false
    - text: "до п'ятисот шістдесят заявками"
      correct: false
    explanation: "Після до потрібен родовий відмінок."
  - question: "Яка конструкція нормативна для відповідності документу?"
    options:
    - text: "згідно з рішенням"
      correct: true
    - text: "згідно рішення"
      correct: false
    - text: "згідно по рішенню"
      correct: false
    - text: "згідно рішенням"
      correct: false
    explanation: "Нормативна форма: згідно з + орудний."
  - question: "Де правильно названо сприятливу причину?"
    options:
    - text: "завдяки підтримці"
      correct: true
    - text: "через підтримці"
      correct: false
    - text: "завдяки підтримку"
      correct: false
    - text: "із-за підтримки"
      correct: false
    explanation: "Завдяки керує давальним і називає позитивну причину."
  - question: "Яка редакція природніша за калькований пасив?"
    options:
    - text: "Заявки опрацьовано."
      correct: true
    - text: "Заявки були опрацьовані комісією."
      correct: false
    - text: "Заявки являються опрацьованими."
      correct: false
    - text: "Заявки опрацьовувалися комісією."
      correct: false
    explanation: "Якщо виконавець неважливий, форма на -но природна й коротка."
  - question: "Де дієприслівниковий зворот ужито правильно?"
    options:
    - text: "Перевіривши таблицю, редактор виправив числівники."
      correct: true
    - text: "Перевіривши таблицю, звіт було подано."
      correct: false
    - text: "Читаючи документ, помилки були знайдені."
      correct: false
    - text: "Опрацювавши заявки, рішення ухвалено."
      correct: false
    explanation: "Той самий виконавець має виконувати основну й додаткову дію."
  - question: "Який варіант уникає активного дієприкметника на -юч-?"
    options:
    - text: "учасники, які працюють над проєктом"
      correct: true
    - text: "працюючі над проєктом учасники"
      correct: false
    - text: "учасники працюючі над проєктом"
      correct: false
    - text: "працюючі учасники над проєктом"
      correct: false
    explanation: "Підрядна частина звучить природніше й нормативніше."
  - question: "Яка форма місця перебування правильна?"
    options:
    - text: "у школі"
      correct: true
    - text: "в школу"
      correct: false
    - text: "у школу"
      correct: false
    - text: "по школі"
      correct: false
    explanation: "Місце перебування вимагає місцевого відмінка."
  - question: "Яке речення правильно передає умову?"
    options:
    - text: "Якби система не зависала, заявки опрацювали б оперативніше."
      correct: true
    - text: "Якщо система не зависала б, заявки опрацювали оперативніше."
      correct: false
    - text: "Коли б система не зависала, заявки опрацювали."
      correct: false
    - text: "Щоб система не зависала, заявки опрацювали б."
      correct: false
    explanation: "Умовний спосіб потребує узгодженої конструкції якби ... б."
  - question: "Який прийменник правильно називає тривалість?"
    options:
    - text: "протягом місяця"
      correct: true
    - text: "на протязі місяця"
      correct: false
    - text: "по місяцю"
      correct: false
    - text: "із-за місяця"
      correct: false
    explanation: "Для часу вживаємо протягом."
  - question: "Де числівник узгоджено в орудному?"
    options:
    - text: "двома третинами голосів"
      correct: true
    - text: "двома третини голосів"
      correct: false
    - text: "дві третинами голосів"
      correct: false
    - text: "двох третинами голосів"
      correct: false
    explanation: "Після двома потрібна орудна форма дробового компонента."
  - question: "Яка форма власної назви нормативна?"
    options:
    - text: "про досвід Марини В'язовської"
      correct: true
    - text: "про досвід Марина В'язовська"
      correct: false
    - text: "про досвід Марину В'язовську"
      correct: false
    - text: "про досвід з Мариною В'язовською"
      correct: false
    explanation: "Після про досвід потрібен родовий відмінок."
  - question: "Яка частка творить умовний спосіб?"
    options:
    - text: "б"
      correct: true
    - text: "ні"
      correct: false
    - text: "аж"
      correct: false
    - text: "таки"
      correct: false
    explanation: "Частка б/би входить до умовного способу."

- type: fill-in
  title: "Заповнення: відмінок і керування"
  instruction: "Заповніть пропуск нормативною формою."
  items:
  - sentence: "Звіт підготували згідно ____ правління."
    answer: "з рішенням"
    options: ["з рішенням", "рішення", "по рішенню", "рішенням"]
    explanation: "Згідно з вимагає орудного."
  - sentence: "Опитування тривало ____ двох місяців."
    answer: "протягом"
    options: ["протягом", "на протязі", "із-за", "по"]
    explanation: "Для тривалості часу вживаємо протягом."
  - sentence: "Заявки надійшли від ____ учасників."
    answer: "п'ятисот шістдесяти двох"
    options: ["п'ятисот шістдесяти двох", "п'ятсот шістдесят двох", "п'ятьмастами шістдесятьма двома", "п'ятисот шістдесят два"]
    explanation: "Після від потрібен родовий відмінок."
  - sentence: "Рішення ухвалено ____ голосів."
    answer: "двома третинами"
    options: ["двома третинами", "двома третини", "дві третини", "двох третинами"]
    explanation: "Орудний відмінок дробового числівника."
  - sentence: "Команда перемогла ____ наполегливості."
    answer: "завдяки"
    options: ["завдяки", "через", "із-за", "по"]
    explanation: "Позитивна причина потребує завдяки + давальний."
  - sentence: "Зустріч перенесли ____ помилку в календарі."
    answer: "через"
    options: ["через", "завдяки", "на протязі", "згідно"]
    explanation: "Негативна причина - через + знахідний."
  - sentence: "____ таблицю, редактор виправив числівники."
    answer: "Перевіривши"
    options: ["Перевіривши", "Перевіряючий", "Було перевірено", "Працюючи"]
    explanation: "Дієприслівник називає додаткову дію того самого виконавця."
  - sentence: "Заявки ____ до п'ятниці."
    answer: "опрацьовано"
    options: ["опрацьовано", "були опрацьовані", "являються опрацьованими", "опрацьовуючі"]
    explanation: "Безособова форма фокусує результат."
  - sentence: "Люди, ____ запросили на обговорення, отримали матеріали."
    answer: "яких"
    options: ["яких", "який", "які", "котрий"]
    explanation: "Сполучне слово є об'єктом дії запросили."
  - sentence: "Якби система не зависала, заявки ____ оперативніше."
    answer: "опрацювали б"
    options: ["опрацювали б", "опрацювали", "опрацюють би", "опрацьовано"]
    explanation: "Умовний спосіб має частку б."
  - sentence: "Ми говорили про досвід ____."
    answer: "Марини В'язовської"
    options: ["Марини В'язовської", "Марина В'язовська", "Марину В'язовську", "Марині В'язовській"]
    explanation: "Потрібен родовий відмінок."
  - sentence: "Учасники працювали ____ напрямі освіти."
    answer: "в освітньому"
    options: ["в освітньому", "по освітньому", "на освітній", "за освітнього"]
    explanation: "Природна редакція уникає кальки по напрямку."

- type: error-correction
  title: "Редагування: морфологічні помилки"
  instruction: "Виправте форму і поясніть правило."
  items:
  - sentence: "Згідно рішення правління, реєстрацію продовжено."
    error: "Згідно рішення"
    correction: "Згідно з рішенням правління, реєстрацію продовжено."
    explanation: "Потрібно згідно з + орудний."
  - sentence: "На протязі року команда збирала дані."
    error: "На протязі року"
    correction: "Протягом року команда збирала дані."
    explanation: "Для часу вживаємо протягом."
  - sentence: "Зустріч перенесли із-за хвороби лектора."
    error: "із-за хвороби"
    correction: "Зустріч перенесли через хворобу лектора."
    explanation: "Із-за має просторове значення; причина - через."
  - sentence: "Команда перемогла завдяки підтримку партнерів."
    error: "підтримку"
    correction: "Команда перемогла завдяки підтримці партнерів."
    explanation: "Завдяки керує давальним."
  - sentence: "Серед п'ятсот шістдесят двох учасників було багато волонтерів."
    error: "п'ятсот шістдесят двох"
    correction: "Серед п'ятисот шістдесяти двох учасників було багато волонтерів."
    explanation: "Після серед потрібен родовий відмінок складеного числівника."
  - sentence: "Серед п'ятсот шістдесят двох учасників було багато студентів."
    error: "п'ятсот шістдесят двох"
    correction: "Серед п'ятисот шістдесяти двох учасників було багато студентів."
    explanation: "Після серед потрібен родовий."
  - sentence: "Перевіривши таблицю, звіт було подано."
    error: "Перевіривши таблицю, звіт"
    correction: "Після перевірки таблиці звіт було подано."
    explanation: "Дієприслівниковий зворот не має того самого виконавця."
  - sentence: "Працюючі над проєктом учасники отримали матеріали."
    error: "Працюючі над проєктом"
    correction: "Учасники, які працюють над проєктом, отримали матеріали."
    explanation: "Підрядна частина природніша за активний дієприкметник."
  - sentence: "Заявки були опрацьовані до п'ятниці."
    error: "були опрацьовані"
    correction: "Заявки опрацьовано до п'ятниці."
    explanation: "Безособова форма краще фокусує результат."
  - sentence: "Ми говорили про досвід Марина В'язовська."
    error: "Марина В'язовська"
    correction: "Ми говорили про досвід Марини В'язовської."
    explanation: "Власна назва особи відмінюється."
  - sentence: "Рішення прийняте двома третини голосів."
    error: "двома третини"
    correction: "Рішення ухвалено двома третинами голосів."
    explanation: "Потрібен орудний дробового числівника; ухвалено звучить офіційніше."
  - sentence: "Якщо система не зависала б, заявки опрацювали оперативніше."
    error: "Якщо система не зависала б"
    correction: "Якби система не зависала, заявки опрацювали б оперативніше."
    explanation: "Умовна конструкція має узгоджену рамку якби ... б."

- type: mark-the-words
  title: "Морфемний фокус: форми для перевірки"
  instruction: "Позначте слова або форми, у яких закінчення, суфікс чи частка допомагають розпізнати відмінок, спосіб або безособовість."
  text: "до п'ятисот шістдесяти заявок; із двадцятьма трьома учасниками; у цьому протоколі; перевірили б; опрацьовано; підготовлений; Марини В'язовської; двома третинами"
  answers:
  - "п'ятисот"
  - "шістдесяти"
  - "двадцятьма"
  - "трьома"
  - "цьому"
  - "б"
  - "опрацьовано"
  - "підготовлений"
  - "Марини"
  - "В'язовської"
  - "двома"
  - "третинами"

