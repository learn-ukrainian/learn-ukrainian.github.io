- type: essay-response
  id: morphology-audit-essay
  title: "Письмо: короткий морфологічний аудит"
  instruction: "Напишіть короткий аудит офіційного або навчального абзацу."
  prompt: "Напишіть 180-220 слів: опишіть фрагмент документа, у якому треба перевірити числівник, прийменникове керування, дієслівну форму і реєстр. Додайте щонайменше три виправлення з поясненнями."
  min_words: 180
  model_answer: |-
    > [!model-answer]
    > У фрагменті статуту я спершу перевірив прийменникове керування:
    > форма **згідно рішення** має бути **згідно з рішенням**, бо ця
    > конструкція потребує орудного відмінка. Далі я виправив часову
    > кальку **на протязі двох місяців** на **протягом двох місяців**.
    > У реченні про учасників числівник після **серед** треба поставити
    > в родовому: **серед п'ятисот шістдесяти двох учасників**. Нарешті,
    > фразу **працюючі над проєктом люди** я замінив на **люди, які
    > працюють над проєктом**, бо підрядна частина звучить природніше.
    > Якщо виконавець неважливий, пасивну конструкцію можна скоротити:
    > **заявки опрацьовано**.
