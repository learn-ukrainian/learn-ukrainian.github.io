- title: "Граматика B2: Складна система займенників"
  role: wiki
  source_ref: "wiki/grammar/b2/pronoun-system-advanced.md"
  notes: >-
    Модульний граматичний якір: себе, один одного, сам/самий, весь, кожний,
    всякий, інший, типові L2-помилки й антисуржикові застереження.
- title: "Літвінова, Українська мова, 6 клас (2023), §54"
  role: textbook
  source_ref: "6-klas-ukrmova-litvinova-2023_s3371"
  pages: "255"
  notes: "Розряди займенників за значенням та особливості відмінювання; шкільна класифікація займенників."
- title: "Заболотний, Українська мова, 6 клас (2020), §62"
  role: textbook
  source_ref: "6-klas-ukrmova-zabolotnyi-2020_s3401"
  pages: "207"
  notes: "Присвійні та споріднені займенникові форми; опора для розрізнення займенникових парадигм і стягнених форм."
- title: "Авраменко, Українська мова, 6 клас (2023), §95-96"
  role: textbook
  source_ref: "6-klas-ukrmova-avramenko-2023_s3107"
  pages: "187"
  notes: "Відмінювання займенників, зокрема форми весь, усі та означальні займенники."
- title: "Заболотний, Українська мова, 6 клас (2020), §58"
  role: textbook
  source_ref: "6-klas-ukrmova-zabolotnyi-2020_s3399"
  pages: "192"
  notes: "Займенник як частина мови; базова функція вказування без прямого називання."
- title: "Авраменко, Українська мова, 6 клас (2023), §89"
  role: textbook
  source_ref: "6-klas-ukrmova-avramenko-2023_s3102"
  pages: "175"
  notes: "Займенник як частина мови; опора для нормативного вживання розрядів займенників."
