- type: unjumble
  title: "Складіть речення"
  instruction: "Поставте слова в нормативному порядку."
  items:
    - words: ["Кожний", "учасник", "відповідає", "за", "свою", "частину"]
      answer: "Кожний учасник відповідає за свою частину."
    - words: ["Колеги", "допомагають", "один", "одному", "під", "час", "перевірки"]
      answer: "Колеги допомагають один одному під час перевірки."
    - words: ["Вона", "поставила", "собі", "нову", "мету", "на", "семестр"]
      answer: "Вона поставила собі нову мету на семестр."
    - words: ["Ми", "повернулися", "до", "того", "самого", "питання"]
      answer: "Ми повернулися до того самого питання."
    - words: ["Можна", "обрати", "будь-який", "зручний", "день", "наступного", "тижня"]
      answer: "Можна обрати будь-який зручний день наступного тижня."
    - words: ["Він", "сам", "перевірив", "усі", "приклади", "перед", "уроком"]
      answer: "Він сам перевірив усі приклади перед уроком."
    - words: ["Увесь", "вечір", "учасники", "говорили", "один", "з", "одним"]
      answer: "Увесь вечір учасники говорили один з одним."
    - words: ["Після", "обговорення", "ми", "обрали", "інший", "маршрут", "додому"]
      answer: "Після обговорення ми обрали інший маршрут додому."

- type: essay-response
  id: pronoun-system-responsibility-essay
  title: "Есе: відповідальність у групі"
  instruction: >-
    Напишіть 280-330 слів про групову роботу, де треба розподілити ролі,
    підтримувати один одного й уникати нечіткої відповідальності.
  prompt: >-
    Опишіть ситуацію в навчальній, волонтерській або професійній групі.
    Використайте щонайменше десять займенникових форм із модуля: себе, собі,
    собою, один одного або один одному, сам, той самий, весь або усі, кожний,
    будь-який, інший. Поясніть, хто що бере на себе, як учасники говорять один
    з одним і чому вибір займенника змінює відповідальність.
  min_words: 280
  model_answer: >-
    У нашій волонтерській групі кожний учасник відповідає за свою частину, але
    всі рішення ми обговорюємо разом. Координаторка взяла на себе листування з
    бібліотекою, я поставив собі завдання перевірити розклад, а інші учасники
    самі підготували список матеріалів. Ми не перекладаємо провину один на
    одного: якщо виникає помилка, спершу перевіряємо себе й говоримо один з
    одним спокійно. Коли текст листа був готовий, ми повернулися до того самого
    абзацу, бо він звучав нечітко. Потім обрали інший час зустрічі й дозволили
    новачкам запропонувати будь-який зручний день.
  rubric:
    - criteria: "Зворотні форми"
      description: "Є щонайменше три нормативні форми себе, собі, собою або прийменникові групи."
      points: 3
    - criteria: "Взаємність"
      description: "Є щонайменше дві конструкції з один одного, один одному або один з одним."
      points: 3
    - criteria: "Означальні займенники"
      description: "Є точне розрізнення сам, той самий, усі, кожний, будь-який та інший."
      points: 4
    - criteria: "Антикалька"
      description: "Немає ненормативних калькованих відповідників для any або найвищого ступеня."
      points: 3
    - criteria: "Зв'язність тексту"
      description: "Займенники допомагають читачеві зрозуміти ролі, відповідальність і логіку групи."
      points: 3
