- type: error-correction
  title: "Виправте займенникові помилки"
  instruction: "Знайдіть помилку й виберіть нормативну форму."
  items:
    - sentence: "Марко побачив його в дзеркалі й здивувався."
      error: "його"
      correction: "себе"
      error_type: "word"
      options: ["себе", "собою", "собі", "йому"]
      explanation: "Якщо Марко бачить власне відображення, потрібне себе."
    - sentence: "Ми допомагалися під час підготовки проєкту."
      error: "допомагалися"
      correction: "допомагали один одному"
      error_type: "construction"
      options: ["допомагали один одному", "допомагали себе", "допомагалися собою", "допомагали самий"]
      explanation: "Допомагати потребує давального: допомагати один одному."
    - sentence: "Вона пишається себе після перемоги."
      error: "себе"
      correction: "собою"
      error_type: "word"
      options: ["собою", "себе", "собі", "сама"]
      explanation: "Пишатися ким? собою."
    - sentence: "Це той сама приклад у статті."
      error: "той сама"
      correction: "той самий"
      error_type: "phrase"
      options: ["той самий", "та сама", "те саме", "ті самі"]
      explanation: "Приклад чоловічого роду, тому потрібна форма той самий."
    - sentence: "Приходьте у весь час після обіду."
      error: "у весь час"
      correction: "у будь-який час"
      error_type: "phrase"
      options: ["у будь-який час", "у весь час", "у сам час", "у другий час"]
      explanation: "Any time у запрошенні природно передає у будь-який час."
    - sentence: "Всі студент має перевірити свою роботу."
      error: "Всі студент"
      correction: "Кожний студент"
      error_type: "phrase"
      options: ["Кожний студент", "Всі студент", "Весь студент", "Уся студент"]
      explanation: "Для індивідуального обов'язку потрібне кожний студент."
    - sentence: "Ми повернулися до той самий теми після перерви."
      error: "той самий"
      correction: "тієї самої"
      error_type: "phrase"
      options: ["тієї самої", "той самий", "того самого", "та сама"]
      explanation: "До теми: жіночий рід, родовий відмінок - до тієї самої теми."
    - sentence: "Потрібен другий підхід, бо старий не працює."
      error: "другий"
      correction: "інший"
      error_type: "word"
      options: ["інший", "другий", "самий", "весь"]
      explanation: "Якщо йдеться про альтернативний підхід, точніше інший, не другий."

