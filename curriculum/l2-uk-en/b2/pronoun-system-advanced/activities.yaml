- type: reading
  id: pronoun-system-community-reading
  title: "Читання: мовний клуб після переїзду"
  instruction: "Прочитайте уривок і простежте, як займенники розподіляють ролі."
  source: "Навчальний уривок для модуля B2."
  text: >-
    Після переїзду мовного клубу кожний учасник записав для себе, що йому
    потрібно для комфортної роботи. Потім усі обговорили план кімнати й
    перевірили, чи зручно буде бачити один одного під час розмовних пар.
    Координаторка взяла на себе листування з бібліотекою, але попросила інших
    перечитати той самий лист перед надсиланням. Двоє студентів запропонували
    інший час зустрічі, бо весь вечірній слот уже був зайнятий. Група швидко
    домовилася: ніхто не перекладає відповідальність один на одного, а кожний
    перевіряє свою частину сам.
  tasks:
    - "Випишіть два приклади зворотного займенника себе або його форм."
    - "Знайдіть взаємну конструкцію з один одного."
    - "Поясніть різницю між усі й кожний у цьому уривку."
    - "Знайдіть форму той самий і поясніть, що саме лишається тотожним."

