  - id: workbook-5
    type: essay-response
    title: Займенники в мінітексті
    instruction: Напишіть 150-180 слів про командну роботу, використавши зворотний, взаємний і означальні займенники.
    prompt: "Опишіть навчальний семінар, редакційну команду або волонтерську зустріч. Використайте себе/собі/собою, один одного або одну одну, сам, той самий, весь, кожний, всякий або інший. Поясніть щонайменше три вибори."
    min_words: 150
    model_answer: |-
      > [!model-answer]
      > На редакційному семінарі кожний учасник спершу написав коротку нотатку про себе. Потім автори обмінялися текстами й уважно читали один одного, а в парах допомагали один одному уточнити тезу. Модератор сам стежив за часом, але не контролював весь процес: група навчилася організовувати себе без постійних нагадувань. Коли з'явилися всякі неперевірені припущення, ми замінили цю розмовну фразу на нейтральне «різні неперевірені припущення». Я використав **кожний**, бо обов'язок стосувався кожного учасника окремо; **про себе** повертає тему нотатки до автора; **один одному** потрібне після дієслова допомагати; **сам** підкреслює особисту роль модератора; **весь** називає процес як ціле.
    rubric:
      - criteria: "Займенникове різноманіття"
        description: "Текст містить зворотний, взаємний і означальні займенники."
        points: 4
      - criteria: "Пояснення вибору"
        description: "Автор пояснює щонайменше три займенникові рішення через значення або стиль."
        points: 4
      - criteria: "Стилістична точність"
        description: "Текст уникає форми самий для найвищого ступеня й контролює тон слова всякий."
        points: 4
