version: '1.0'
module: pronoun-system-advanced
level: b2

inline:
  - type: select
    title: Себе в контексті
    instruction: Позначте всі правильні пояснення зворотного займенника.
    items:
      - question: "У реченні «Олена поважає себе» правильні пояснення такі:"
        options:
          - text: "себе повертає дію до підмета"
            correct: true
          - text: "себе не має роду й числа"
            correct: true
          - text: "себе є називним відмінком"
            correct: false
          - text: "себе означає іншу людину"
            correct: false
        min_correct: 2
        explanation: "Зворотний займенник повертає дію до того самого учасника."
      - question: "У фразі «дати собі час» правильні пояснення такі:"
        options:
          - text: "собі стоїть у давальному"
            correct: true
          - text: "собі називає адресата дії"
            correct: true
          - text: "собі є орудним"
            correct: false
          - text: "форма має бути себе"
            correct: false
        min_correct: 2
        explanation: "Дати кому? собі."
      - question: "У фразі «пишатися собою» правильні пояснення такі:"
        options:
          - text: "собою стоїть в орудному"
            correct: true
          - text: "дієслово пишатися керує орудним"
            correct: true
          - text: "собою є знахідним"
            correct: false
          - text: "треба писати пишатися себе"
            correct: false
        min_correct: 2
        explanation: "Пишатися ким? чим? - собою."
      - question: "У реченні «Марко попросив Ірину написати про себе» можливе ускладнення таке:"
        options:
          - text: "неясно, про Марка чи про Ірину йдеться"
            correct: true
          - text: "референт себе треба уточнити контекстом"
            correct: true
          - text: "себе тут має називний відмінок"
            correct: false
          - text: "речення не може мати двозначності"
            correct: false
        min_correct: 2
        explanation: "Коли підметів кілька, себе може потребувати уточнення."
      - question: "У вислові «взяти на себе відповідальність» правильні пояснення такі:"
        options:
          - text: "це стала конструкція"
            correct: true
          - text: "на себе означає прийняти обов'язок"
            correct: true
          - text: "це форма взаємності"
            correct: false
          - text: "себе треба замінити на самий"
            correct: false
        min_correct: 2
        explanation: "Ідіоматична модель має власне значення."
      - question: "У реченні «Вони говорили про себе чесно» правильні пояснення такі:"
        options:
          - text: "про себе залежить від прийменника про"
            correct: true
          - text: "референтом є ті самі люди, що говорили"
            correct: true
          - text: "себе тут називає сторонню групу"
            correct: false
          - text: "форма має бути собою"
            correct: false
        min_correct: 2
        explanation: "Про кого? про себе."
      - question: "У реченні «Я тримаю себе в руках» правильні пояснення такі:"
        options:
          - text: "це ідіоматичний вислів самоконтролю"
            correct: true
          - text: "себе є об'єктом дії"
            correct: true
          - text: "це взаємна дія між двома людьми"
            correct: false
          - text: "себе має множину"
            correct: false
        min_correct: 2
        explanation: "Фраза означає контролювати власний стан."
      - question: "У фразі «для себе» правильні пояснення такі:"
        options:
          - text: "прийменник для керує родовим"
            correct: true
          - text: "форма себе використана після прийменника"
            correct: true
          - text: "це називний відмінок"
            correct: false
          - text: "форма має змінюватися за родом"
            correct: false
        min_correct: 2
        explanation: "Себе не має роду, але входить у прийменникові групи."

  - type: group-sort
    title: Себе чи -ся
    instruction: Розподіліть приклади за моделлю.
    groups:
      - name: "окремий займенник себе"
        items:
          - "критикувати себе"
          - "дати собі час"
          - "пишатися собою"
          - "думати про себе"
      - name: "дієслово з -ся"
        items:
          - "вмиватися"
          - "хвилюватися"
          - "зустрічатися"
          - "здаватися"
      - name: "обидві моделі можливі з різним фокусом"
        items:
          - "заспокоїти себе / заспокоїтися"
          - "готувати себе / готуватися"
          - "навчити себе / навчитися"
          - "захищати себе / захищатися"
      - name: "не замінювати на себе"
        items:
          - "сміятися"
          - "сподіватися"
          - "боятися"
          - "пишатися"

  - type: fill-in
    title: Взаємна конструкція
    instruction: Виберіть форму один одного, яка відповідає дієслову або прийменнику.
    items:
      - sentence: "Студенти уважно слухали ____."
        answer: "один одного"
        options: ["один одного", "один одному", "один з одним", "одним одним"]
        explanation: "Слухати має прямий об'єкт."
      - sentence: "Колеги допомагали ____ під час підготовки."
        answer: "один одному"
        options: ["один одному", "один одного", "один з одним", "одних одних"]
        explanation: "Допомагати керує давальним."
      - sentence: "Учасники радилися ____ після зустрічі."
        answer: "один з одним"
        options: ["один з одним", "один одного", "один одному", "одних одних"]
        explanation: "Радитися з ким? один з одним."
      - sentence: "Дві редакторки підтримали ____ після критики."
        answer: "одна одну"
        options: ["одна одну", "одна одній", "одна з одною", "одні одних"]
        explanation: "Підтримати має прямий об'єкт жіночого роду."
      - sentence: "Подруги довіряли ____ у складній ситуації."
        answer: "одна одній"
        options: ["одна одній", "одна одну", "одна з одною", "одні одних"]
        explanation: "Довіряти керує давальним."
      - sentence: "Команди обмінювалися досвідом ____."
        answer: "одна з одною"
        options: ["одна з одною", "одна одну", "одна одній", "одних одних"]
        explanation: "Обмінюватися з ким? одна з одною."
      - sentence: "Групи звинувачували ____ у затримці."
        answer: "одні одних"
        options: ["одні одних", "один одному", "один з одним", "одна одній"]
        explanation: "Множинний контраст може мати форму одні одних."
      - sentence: "Після дебатів учасники говорили ____ спокійніше."
        answer: "один з одним"
        options: ["один з одним", "один одного", "один одному", "одні одних"]
        explanation: "Говорити з ким? один з одним."
      - sentence: "Вони бачать ____ щоп'ятниці на семінарі."
        answer: "один одного"
        options: ["один одного", "один одному", "один з одним", "одним одним"]
        explanation: "Бачити має прямий об'єкт."
      - sentence: "Ментори писали ____ короткі поради."
        answer: "один одному"
        options: ["один одному", "один одного", "один з одним", "одні одних"]
        explanation: "Писати кому? один одному."

  - type: error-correction
    title: Означальні займенники
    instruction: Виправте невдалий займенник або форму.
    items:
      - sentence: "Це самий важливий аргумент у звіті."
        error: "самий важливий"
        correction: "найважливіший"
        options: ["найважливіший", "самий важливий", "той самий важливий", "всякий важливий"]
        explanation: "Найвищий ступінь утворюємо формою найважливіший."
      - sentence: "Ми повернулися до сам питання."
        error: "сам питання"
        correction: "того самого питання"
        options: ["того самого питання", "сам питання", "самій питання", "всього питання"]
        explanation: "Тотожність передає модель той самий."
      - sentence: "Весь учасник має подати заяву."
        error: "Весь учасник"
        correction: "Кожний учасник"
        options: ["Кожний учасник", "Весь учасник", "Всякий учасник", "Інший учасник"]
        explanation: "Індивідуальний обов'язок передає кожний."
      - sentence: "Кожний текст треба перечитати від початку до кінця, бо йдеться про цілість."
        error: "Кожний текст"
        correction: "Весь текст"
        options: ["Весь текст", "Кожний текст", "Всякий текст", "Інший текст"]
        explanation: "Якщо йдеться про один текст як ціле, потрібне весь."
      - sentence: "Не поширюйте всякі повідомлення в офіційному звіті."
        error: "всякі повідомлення"
        correction: "неперевірені повідомлення"
        options: ["неперевірені повідомлення", "всякі повідомлення", "самі повідомлення", "ті самі повідомлення"]
        explanation: "Всякі може звучати розмовно або зневажливо."
      - sentence: "Це інший самий документ, який ми бачили вчора."
        error: "інший самий"
        correction: "той самий"
        options: ["той самий", "інший самий", "весь самий", "кожний самий"]
        explanation: "Тотожність передає той самий, а не інший."
      - sentence: "Директор самий відповів на лист."
        error: "самий"
        correction: "сам"
        options: ["сам", "самий", "весь", "інший"]
        explanation: "Особисту участь передає сам."
      - sentence: "Усі розділ має приклад."
        error: "Усі розділ"
        correction: "Кожний розділ"
        options: ["Кожний розділ", "Усі розділ", "Весь розділ", "Самий розділ"]
        explanation: "Кожний узгоджується з одниною й розподіляє вимогу."

  - type: quiz
    title: Стиль і займенниковий вибір
    instruction: Оберіть форму, яка найточніше відповідає змісту.
    items:
      - question: "Треба сказати, що автор виконав роботу без допомоги. Яка форма найкраща?"
        options:
          - text: "Автор сам підготував звіт."
            correct: true
          - text: "Автор самий підготував звіт."
            correct: false
          - text: "Автор весь підготував звіт."
            correct: false
          - text: "Автор всякий підготував звіт."
            correct: false
        explanation: "Сам підкреслює особисту участь."
      - question: "Треба назвати той самий документ, а не інший. Оберіть форму."
        options:
          - text: "той самий документ"
            correct: true
          - text: "сам документ"
            correct: false
          - text: "всякий документ"
            correct: false
          - text: "найсамий документ"
            correct: false
        explanation: "Тотожність передає той самий."
      - question: "У формальній інструкції потрібен індивідуальний обов'язок усіх учасників."
        options:
          - text: "Кожний учасник подає заяву."
            correct: true
          - text: "Весь учасник подає заяву."
            correct: false
          - text: "Всякий учасник подає заяву."
            correct: false
          - text: "Інший учасник подає заяву."
            correct: false
        explanation: "Кожний розподіляє обов'язок на кожну особу."
      - question: "Треба сказати про один текст як ціле. Оберіть форму."
        options:
          - text: "Весь текст треба перечитати."
            correct: true
          - text: "Кожний текст треба перечитати."
            correct: false
          - text: "Інший текст треба перечитати."
            correct: false
          - text: "Самий текст треба перечитати."
            correct: false
        explanation: "Весь охоплює цілий текст."
      - question: "Який варіант найкраще передає взаємну допомогу?"
        options:
          - text: "Колеги допомагали один одному."
            correct: true
          - text: "Колеги допомагали себе."
            correct: false
          - text: "Колеги допомагали самий."
            correct: false
          - text: "Колеги допомагали весь."
            correct: false
        explanation: "Допомагати кому? один одному."
      - question: "Який варіант прямо підкреслює об'єкт самокритики?"
        options:
          - text: "Автор критикує себе."
            correct: true
          - text: "Автор критикується."
            correct: false
          - text: "Автор самий критикує."
            correct: false
          - text: "Автор весь критикує."
            correct: false
        explanation: "Себе прямо називає об'єкт дії."
      - question: "Який варіант найкращий для нейтрального офіційного стилю?"
        options:
          - text: "Не поширюйте неперевірені повідомлення."
            correct: true
          - text: "Не поширюйте всякі повідомлення."
            correct: false
          - text: "Не поширюйте самі повідомлення."
            correct: false
          - text: "Не поширюйте ті самі повідомлення."
            correct: false
        explanation: "Неперевірені повідомлення точніше й нейтральніше."
      - question: "Яке речення правильно розрізняє себе і -ся?"
        options:
          - text: "Він заспокоїв себе, а потім заспокоївся."
            correct: true
          - text: "Він заспокоївся себе."
            correct: false
          - text: "Він себеся заспокоїв."
            correct: false
          - text: "Він самий заспокоївся себе."
            correct: false
        explanation: "Перша частина називає дію на себе, друга - зміну стану."
      - question: "Яке речення має можливу двозначність референта?"
        options:
          - text: "Марко попросив Ірину написати про себе."
            correct: true
          - text: "Ірина написала про свій досвід."
            correct: false
          - text: "Марко написав про власний досвід."
            correct: false
          - text: "Ірина говорила про Ірину."
            correct: false
        explanation: "Себе може повернутися до різних учасників у складній конструкції."
      - question: "Яке речення найкраще вводить контраст?"
        options:
          - text: "Інший модератор обрав інший темп."
            correct: true
          - text: "Той самий модератор обрав той самий темп."
            correct: false
          - text: "Весь модератор обрав темп."
            correct: false
          - text: "Самий модератор обрав темп."
            correct: false
        explanation: "Інший вводить відмінність або контраст."

workbook:
  - id: workbook-1
    type: reading
    title: "Читання: команда фасилітаторів"
    instruction: Прочитайте уривок і поясніть займенникові вибори.
    source: "Навчальний уривок для модуля B2."
    text: "Кожний фасилітатор спершу заповнив анкету про себе. Потім учасники представилися один одному і домовилися слухати один одного без перебивань. Модератор сам стежив за часом, але весь процес не контролював одноосібно. Коли з'явилися всякі неперевірені припущення, команда замінила їх точними питаннями. Інший модератор запропонував інший темп, але правила взаємної поваги лишилися тими самими."
    tasks:
      - "Поясніть форму про себе."
      - "Знайдіть дві взаємні конструкції й поясніть відмінок."
      - "Поясніть різницю між сам і весь."
      - "Замініть всякі неперевірені припущення на нейтральнішу форму."
      - "Поясніть, що робить займенник інший."

  - type: match-up
    title: Займенник і функція
    instruction: Поєднайте приклад із функцією.
    pairs:
      - left: "поважати себе"
        right: "зворотний об'єкт"
      - left: "дати собі час"
        right: "давальний зворотного займенника"
      - left: "пишатися собою"
        right: "орудний після дієслова"
      - left: "заспокоїтися"
        right: "дієслово з -ся"
      - left: "бачити один одного"
        right: "взаємний прямий об'єкт"
      - left: "допомагати один одному"
        right: "взаємний давальний"
      - left: "я сам зробив"
        right: "самостійна дія"
      - left: "той самий текст"
        right: "тотожність"
      - left: "весь текст"
        right: "повнота цілого"
      - left: "кожний розділ"
        right: "індивідуальний розподіл"

  - type: fill-in
    title: Означальні форми
    instruction: Виберіть займенник, який відповідає змісту речення.
    items:
      - sentence: "Автор ____ підготував фінальну версію."
        answer: "сам"
        options: ["сам", "самий", "весь", "всякий"]
        explanation: "Сам підкреслює особисту участь."
      - sentence: "Ми повернулися до ____ питання, яке обговорювали вчора."
        answer: "того самого"
        options: ["того самого", "самого кращого", "всякого", "іншого самого"]
        explanation: "Тотожність передає той самий."
      - sentence: "____ розділ має містити приклад."
        answer: "Кожний"
        options: ["Кожний", "Весь", "Всякий", "Самий"]
        explanation: "Кожний розподіляє вимогу."
      - sentence: "____ текст треба перечитати перед публікацією."
        answer: "Весь"
        options: ["Весь", "Кожний", "Всякий", "Інший"]
        explanation: "Весь називає цілість одного тексту."
      - sentence: "У звіті краще написати «неперевірені припущення», а не «____ припущення»."
        answer: "всякі"
        options: ["всякі", "ті самі", "кожні", "самі"]
        explanation: "Всякі може звучати розмовно або зневажливо."
      - sentence: "____ підхід потребує окремого пояснення."
        answer: "Інший"
        options: ["Інший", "Самий", "Весь", "Кожний"]
        explanation: "Інший вводить контраст."
      - sentence: "Вони радилися ____ перед виступом."
        answer: "один з одним"
        options: ["один з одним", "один одного", "один одному", "себе"]
        explanation: "Радитися з ким? один з одним."
      - sentence: "Вона дала ____ час подумати."
        answer: "собі"
        options: ["собі", "себе", "собою", "сама"]
        explanation: "Дати кому? собі."
      - sentence: "Він не впізнав ____ на старому фото."
        answer: "себе"
        options: ["себе", "собі", "собою", "сам"]
        explanation: "Не впізнав кого? себе."
      - sentence: "Команда пишається ____ після складного проєкту."
        answer: "собою"
