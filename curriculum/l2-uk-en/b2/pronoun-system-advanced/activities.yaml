- type: fill-in
  title: "Доберіть форму займенника"
  instruction: "Виберіть форму, яка граматично й змістово пасує до речення."
  items:
    - sentence: "Після помилки редакторка не звинувачувала інших, а перевірила ____."
      answer: "себе"
      options: ["себе", "собою", "собі", "один одного"]
      explanation: "Перевірити кого? себе."
    - sentence: "Ми поставили ____ реалістичну мету на місяць."
      answer: "собі"
      options: ["собі", "себе", "собою", "самого"]
      explanation: "Поставити кому? собі."
    - sentence: "Після складного семестру студенти пишалися ____."
      answer: "собою"
      options: ["собою", "себе", "собі", "самий"]
      explanation: "Пишатися ким? собою."
    - sentence: "Колеги допомагали ____ під час підготовки конференції."
      answer: "один одному"
      options: ["один одному", "один одного", "себе", "самий"]
      explanation: "Допомагати кому? один одному."
    - sentence: "Сестри підтримували ____ після переїзду."
      answer: "одна одну"
      options: ["одна одну", "одна одній", "один одному", "собою"]
      explanation: "Підтримувати кого? одна одну."
    - sentence: "Група повернулася до ____ питання на наступній зустрічі."
      answer: "того самого"
      options: ["того самого", "той самий", "цього самого", "іншого"]
      explanation: "До чого? до того самого питання."
    - sentence: "____ учасник має перевірити свою частину тексту."
      answer: "Кожний"
      options: ["Кожний", "Усі", "Весь", "Інший"]
      explanation: "Кожний підкреслює індивідуальну відповідальність."
    - sentence: "Можна обрати ____ день наступного тижня."
      answer: "будь-який"
      options: ["будь-який", "інший", "самий", "весь"]
      explanation: "Для значення any потрібне будь-який або близька нормативна форма."
    - sentence: "Учасники говорили ____ після засідання."
      answer: "один з одним"
      options: ["один з одним", "один одного", "себе", "самий"]
      explanation: "Говорити з ким? один з одним."
    - sentence: "Вона ____ підготувала всі документи."
      answer: "сама"
      options: ["сама", "самий", "собою", "інший"]
      explanation: "Сама підкреслює самостійне виконання дії."
    - sentence: "____ вечір ми редагували той самий абзац."
      answer: "Увесь"
      options: ["Увесь", "Кожний", "Будь-який", "Інший"]
      explanation: "Увесь вечір означає весь часовий проміжок."
    - sentence: "Після критики команда обрала ____ підхід."
      answer: "інший"
      options: ["інший", "другий", "той самий", "самий"]
      explanation: "Інший означає альтернативний, не попередній підхід."

