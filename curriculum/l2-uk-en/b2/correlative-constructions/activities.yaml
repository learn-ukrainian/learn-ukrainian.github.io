- id: workbook-5
  type: essay-response
  title: Перебудуйте пояснення
  instruction: Напишіть короткий абзац, у якому ви свідомо використовуєте або скорочуєте корелятивні конструкції.
  prompt: 'Візьміть зміст: користувачі подали заявки; частина заявок була неповною; система показала помилки тільки в тих
    полях, де бракувало даних. Напишіть 150-180 слів для службового пояснення. Використайте щонайменше дві корелятивні пари
    й одну скорочену правку без зайвого ''те, що''.'
  min_words: 150
  model_answer: Після оновлення форми ми перевірили ті заявки, які система позначила як неповні. Помилки з'являлися там, де
    користувачі не додали обов'язкових даних або завантажили файл не в тому форматі. Чим точніше поле описує вимогу, тим менше
    повторних звернень отримує підтримка. Важливо, що система тепер показує попередження до надсилання заявки, а не після
    ручної перевірки. Тому наступний крок - уточнити підказки для тих користувачів, хто подає документи вперше, або замінити
    цю фразу на нейтральніше 'для нових користувачів'.
  peer_review_guidelines: Позначте дві корелятивні пари й перевірте, чи відповідають вони своїм питанням. Знайдіть одну важку
    рамку з 'те, що' або 'факт того, що' й запропонуйте коротшу правку. Оцініть, чи стиль пасує до службового пояснення.
  rubric:
  - criteria: Точність пар
    description: Кореляти відповідають підрядним частинам за значенням.
    points: 3
  - criteria: Пунктуація
    description: Межі підрядних частин позначено без механічних ком.
    points: 3
  - criteria: Стиль
    description: Автор залишає потрібні кореляти й скорочує баласт.
    points: 4
