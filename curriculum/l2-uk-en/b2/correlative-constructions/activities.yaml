version: '1.0'
module: correlative-constructions
level: b2
inline: []
workbook:
  - type: critical-analysis
    id: correlative-reading-brief
    title: "Аналіз тексту: кореляти в службовому повідомленні"
    instruction: Прочитай текст і виконай завдання до корелятивних конструкцій.
    target_text: "Ті, хто подав заявку до п'ятниці, отримають відповідь першими. Команда перевіряє дані там, де форма дає змогу ввести кілька адрес однієї організації. Якщо заявник не додав копію документа, він має повторно подати файл туди, куди його спрямує адміністратор. Чим точніше названо документ, тим швидше його знаходять в архіві. Саме тому інструкцію переписали так, щоб кожен крок мав приклад."
    questions:
      - Випиши корелятивну пару, яка називає групу людей.
      - Знайди пару, що називає місце або зону перевірки.
      - Випиши пару, яка показує напрям повторного подання.
      - Поясни, яку закономірність передає конструкція чим, тим.
      - Назви речення, у якому корелят допомагає уникнути двозначності.
    model_answers:
      - "Групу людей називає пара **ті, хто**."
      - "Місце або зону перевірки називає пара **там, де**."
      - "Напрям повторного подання показує пара **туди, куди**."
      - "Конструкція **чим точніше..., тим швидше...** показує залежність між точністю назви документа й швидкістю пошуку."
      - "Речення про повторне подання файла використовує **туди, куди**, щоб читач бачив саме напрям дії."

  - type: match-up
    title: "Пари та функції"
    instruction: Поєднай корелятивну пару з її типовою функцією.
    pairs:
      - left: "той, хто"
        right: "особа або група через дію"
      - left: "те, що"
        right: "факт або зміст"
      - left: "такий, який"
        right: "ознака через відповідність"
      - left: "там, де"
        right: "місце або зона дії"
      - left: "туди, куди"
        right: "напрям"
      - left: "тоді, коли"
        right: "момент або часова умова"
      - left: "настільки, що"
        right: "міра з наслідком"
      - left: "чим, тим"
        right: "залежність між двома змінами"
      - left: "доти, доки"
        right: "часова межа"
      - left: "звідти, звідки"
        right: "походження або джерело руху"
      - left: "стільки, скільки"
        right: "точна кількість або обсяг"
      - left: "тому, що"
        right: "підстава оцінки або дії"

  - type: select
    title: "Вибір нормативної моделі"
    instruction: Обери всі правильні варіанти.
    items:
      - question: Де правильно вжито пару той, хто або ті, хто?
        options:
          - text: "Ті, хто подав заявку, отримають відповідь."
            correct: true
          - text: "Люди, хто подав заявку, отримають відповідь."
            correct: false
          - text: "Той, хто перевіряє джерела, рідше помиляється."
            correct: true
          - text: "Фахівці, хто працювали з архівом, подали звіт."
            correct: false
      - question: Де корелят потрібний для керування?
        options:
          - text: "Я пишаюся тим, що команда не приховала помилку."
            correct: true
          - text: "Ми бачимо будинок, який ремонтують."
            correct: false
          - text: "Питання полягає в тому, як розподілити відповідальність."
            correct: true
          - text: "Звіт, який надійшов учора, уже прочитали."
            correct: false
      - question: Які речення правильно передають просторовий зв'язок?
        options:
          - text: "Помилки виправляють там, де вони виникають."
            correct: true
          - text: "Ми повернули файл, де його приймає адміністратор."
            correct: false
          - text: "Документи перенесли туди, куди має доступ уся команда."
            correct: true
          - text: "Команда працює, куди її запросили."
            correct: false
      - question: Де пара чим, тим оформлена правильно?
        options:
          - text: "Чим точніше правило, тим легше його застосувати."
            correct: true
          - text: "Чим точніше правило, то тим легше його застосувати."
            correct: false
          - text: "Чим довше триває пауза, тим більше зростає недовіра."
            correct: true
          - text: "Чим довше триває пауза тим більше зростає недовіра."
            correct: false
      - question: Які формули звучать природніше за канцелярський баласт?
        options:
          - text: "Оскільки бракувало даних, засідання перенесли."
            correct: true
          - text: "У зв'язку з тим, що мало місце ненадання даних, засідання перенесли."
            correct: false
          - text: "Через брак доказів рішення відклали."
            correct: true
          - text: "По причині того, що доказів не було, рішення відклали."
            correct: false
      - question: Де слово який потрібне після іменника, що називає особу?
        options:
          - text: "Редакторка, яка перевіряла текст, знайшла помилку."
            correct: true
          - text: "Редакторка, хто перевіряла текст, знайшла помилку."
            correct: false
          - text: "Фахівці, які працювали з даними, подали висновок."
            correct: true
          - text: "Фахівці, хто працювали з даними, подали висновок."
            correct: false
      - question: Де правильно розрізнено спосіб і наслідок?
        options:
          - text: "Поясни так, як пояснив би новому колезі."
            correct: true
          - text: "Пояснення було настільки коротке, що всі попросили приклади."
            correct: true
          - text: "Поясни так, що пояснив би новому колезі."
            correct: false
          - text: "Пояснення було настільки коротке, як усі попросили приклади."
            correct: false
      - question: Де правильно поставлено коми навколо підрядної частини?
        options:
          - text: "Ті, хто прочитав інструкцію, працюють швидше."
            correct: true
          - text: "Ті хто прочитав інструкцію працюють швидше."
            correct: false
          - text: "Місця, де виникають помилки, треба перевірити окремо."
            correct: true
          - text: "Місця де виникають помилки треба перевірити окремо."
            correct: false

  - type: fill-in
    title: "Добери корелят"
    instruction: Заповни пропуск правильною частиною корелятивної пари.
    items:
      - sentence: "____, хто працює з персональними даними, мають дотримуватися конфіденційності."
        answer: Ті
        options: [Ті, Там, Так, Тоді]
        explanation: Підрядна частина називає групу людей.
      - sentence: "Документи треба зберігати там, ____ є резервна копія."
        answer: де
        options: [де, хто, що, як]
        explanation: Пара там, де називає місце або зону дії.
      - sentence: "Файл повернули туди, ____ його має перевірити адміністратор."
        answer: куди
        options: [куди, де, коли, хто]
        explanation: Туди, куди передає напрям.
      - sentence: "Рішення було настільки переконливим, ____ опоненти погодилися на повторну зустріч."
        answer: що
        options: [що, який, де, хто]
        explanation: Настільки, що передає міру з наслідком.
      - sentence: "Чим точніше сформульовано запитання, ____ кориснішою буде відповідь."
        answer: тим
        options: [тим, так, там, тоді]
        explanation: У парі чим, тим друга частина починається словом тим.
      - sentence: "Поясни правило так, ____ пояснив би новому колезі."
        answer: як
        options: [як, що, хто, скільки]
        explanation: Так, як називає спосіб дії.
      - sentence: "Ми чекали доти, ____ надійшло письмове підтвердження."
        answer: доки
        options: [доки, де, хто, наскільки]
        explanation: Доти, доки називає часову межу.
      - sentence: "Мене непокоїть те, ____ дані зникли без пояснення."
        answer: що
        options: [що, де, куди, скільки]
        explanation: Те, що називає факт або зміст.
      - sentence: "Потрібен такий формат, ____ витримає публічну перевірку."
        answer: який
        options: [який, хто, куди, наскільки]
        explanation: Після іменника формат потрібне сполучне слово який.
      - sentence: "У бюджеті залишили стільки коштів, ____ потрібно для першого етапу."
        answer: скільки
        options: [скільки, наскільки, де, коли]
        explanation: Стільки, скільки передає кількість.

  - type: error-correction
    title: "Виправлення корелятивних конструкцій"
    instruction: Знайди помилку й обери найкращу редакцію.
    items:
      - sentence: "Люди, хто подали заявку, отримають листа."
        error: "хто"
        correction: "які"
        error_type: "construction"
        options: ["які", "де", "куди", "скільки"]
        explanation: Після іменника люди потрібне сполучне слово які.
      - sentence: "Ми повернулися, де починали роботу."
        error: "де"
        correction: "туди, де"
        error_type: "construction"
        options: ["туди, де", "той, хто", "стільки, скільки", "так, що"]
        explanation: Потрібна опора місця або напряму.
      - sentence: "Чим більше прикладів, то тим легше правило."
        error: "то тим"
        correction: "тим"
        error_type: "construction"
        options: ["тим", "так", "тоді", "там"]
        explanation: У парі чим, тим слово то зайве.
      - sentence: "Фахівці, хто працювали з архівом, подали звіт."
        error: "хто"
        correction: "які"
        error_type: "construction"
        options: ["які", "де", "коли", "що"]
        explanation: Після назви людей у нейтральному стилі потрібне які.
      - sentence: "Питання заключається в тому, що бракує доказів."
        error: "заключається"
        correction: "полягає"
        error_type: "register"
        options: ["полягає", "становиться", "знаходиться", "робиться"]
        explanation: "Нормативна модель: питання полягає в тому, що."
      - sentence: "У зв'язку з тим, що мало місце запізнення звіту, зустріч перенесли."
        error: "У зв'язку з тим, що мало місце запізнення звіту"
        correction: "Оскільки звіт запізнився"
        error_type: "register"
        options:
          - "Оскільки звіт запізнився"
          - "По причині запізнення звіту"
          - "В силу того, що звіт запізнився"
          - "Через те, що мало місце"
        explanation: Коротший причиновий зв'язок звучить природніше.
      - sentence: "Поясни правило так, що це зроблено в інструкції."
        error: "що"
        correction: "як"
        error_type: "construction"
        options: ["як", "хто", "куди", "скільки"]
        explanation: Так, як передає спосіб дії.
      - sentence: "Рішення було так важливе, яке змінило весь план."
        error: "яке"
        correction: "що"
        error_type: "construction"
        options: ["що", "де", "хто", "коли"]
        explanation: Міра з наслідком потребує таке, що або настільки, що.
      - sentence: "Ті хто прочитав інструкцію працюють швидше."
        error: "Ті хто прочитав інструкцію працюють"
        correction: "Ті, хто прочитав інструкцію, працюють"
        error_type: "construction"
        options:
          - "Ті, хто прочитав інструкцію, працюють"
          - "Ті хто, прочитав інструкцію працюють"
          - "Ті хто прочитав, інструкцію працюють"
          - "Ті, хто прочитав, інструкцію працюють"
        explanation: Підрядна частина всередині головної відокремлюється з обох боків.
      - sentence: "Документи перенесли там, куди має доступ команда."
        error: "там, куди"
        correction: "туди, куди"
        error_type: "construction"
        options: ["туди, куди", "той, хто", "так, як", "стільки, скільки"]
        explanation: Перенесли куди? Потрібна пара туди, куди.

  - type: fill-in
    title: "Редакторський фрагмент"
    instruction: Заповни пропуски корелятивними словами.
    items:
      - sentence: "____, хто редагує службові повідомлення, мають перевіряти коми й логіку зв'язку."
        answer: Ті
        options: [Ті, Там, Так, Тому]
        explanation: Підрядна частина називає групу людей.
      - sentence: "Якщо підрядна частина називає місце, використовуємо пару там, ____."
        answer: де
        options: [де, куди, хто, що]
        explanation: Там, де називає місце або зону дії.
      - sentence: "Якщо йдеться про напрям, потрібна пара туди, ____."
        answer: куди
        options: [куди, де, коли, як]
        explanation: Туди, куди передає напрям.
      - sentence: "____ точніше автор бачить роль підрядної частини, тим легше він обирає корелят."
        answer: Чим
        options: [Чим, Там, Тоді, Так]
        explanation: Перша частина залежності починається словом чим.
      - sentence: "Чим точніше автор бачить роль підрядної частини, ____ легше він обирає корелят."
        answer: тим
        options: [тим, так, там, тоді]
        explanation: Друга частина залежності починається словом тим.
      - sentence: "Питання полягає в ____, як розподілити відповідальність."
        answer: тому
        options: [тому, там, так, тих]
        explanation: Конструкція полягати в потребує опори в тому.
      - sentence: "Потрібен такий приклад, ____ не залишає двозначності."
        answer: який
        options: [який, хто, де, куди]
        explanation: Після іменника приклад потрібне сполучне слово який.
      - sentence: "Пояснення було настільки коротке, ____ учасники попросили додаткову схему."
        answer: що
        options: [що, де, хто, куди]
        explanation: Настільки, що передає міру з наслідком.
      - sentence: "Ми повернули документи звідти, ____ вони надійшли."
        answer: звідки
        options: [звідки, куди, де, хто]
        explanation: Звідти, звідки називає походження.
      - sentence: "Зачекаємо доти, ____ надійде офіційне підтвердження."
        answer: доки
        options: [доки, де, хто, наскільки]
        explanation: Доти, доки називає часову межу.

  - type: group-sort
    title: "Сортування за значенням"
    instruction: Розподіли конструкції за значенням.
    groups:
      - name: "Особа або група"
        items: ["ті, хто", "кожен, хто", "той, хто"]
      - name: "Місце або напрям"
        items: ["там, де", "туди, куди", "звідти, звідки"]
      - name: "Міра або наслідок"
        items: ["настільки, що", "стільки, скільки", "так, що"]
      - name: "Закономірність"
        items: ["чим, тим", "що більше, то"]
      - name: "Ознака і зміст"
        items: ["такий, який", "те, що", "те, як"]

  - type: comparative-study
    id: correlative-register-study
    title: "Порівняння регістру"
    instruction: Порівняй пари речень і поясни, яке речення доречніше для службового повідомлення.
    items_to_compare:
      - "Люди, які подали заявку, отримають листа. / Ті, хто подав заявку, отримають листа."
      - "Через брак даних засідання перенесли. / У зв'язку з тим, що мало місце ненадання даних, засідання перенесли."
      - "Помилки виправляють там, де вони виникають. / Помилки виправляють, де вони виникають."
      - "Чим простіша форма, тим менше помилок у заявках. / Форма проста, і помилок менше."
    criteria:
      - "точність корелятивної пари"
      - "доречність для службового повідомлення"
      - "стислість без втрати змісту"
      - "логічний наголос"
    prompt: "Порівняй кожну пару. Для кожної назви варіант, який доречніший у службовому повідомленні, і поясни граматичну або стилістичну причину."
    model_answer: "У першій парі службовий текст може обрати **Люди, які подали заявку**, бо іменник із підрядною означальною частиною називає групу точніше; варіант **Ті, хто** доречніший для узагальненого висновку. У другій парі кращий варіант **Через брак даних засідання перенесли**, бо він стислий і не має канцелярського баласту. У третій парі **там, де** сильніше підкреслює зону виникнення помилок; коротший варіант можливий, але менш виразний. У четвертій парі **чим, тим** краще показує закономірність, тоді як друге речення лише зіставляє два факти."

  - type: essay-response
    id: correlative-sentence-expansion
    title: "Розгортання речень"
    instruction: Напиши розгорнуту відповідь українською.
    prompt: "Перетвори п'ять коротких речень на зв'язний службовий мінітекст із корелятивними конструкціями: **Команда виправляє помилки в проблемних полях**; **Уважні заявники отримують відповідь швидше**; **Точніше правило зменшує кількість винятків**; **Рішення має бути зрозумілим виконавцям**; **Формат має витримати публічну перевірку**. Обов'язково використай пари **там, де**, **ті, хто**, **чим, тим**, **настільки, наскільки**, **такий, який** і після тексту коротко поясни роль двох пар."
    min_words: 160
    model_answer: "Команда виправляє помилки там, де форма дає змогу ввести різні назви однієї організації. Ті, хто уважно читає інструкцію, отримують відповідь швидше, бо їхні заявки не потребують повторної перевірки. Чим точніше сформульовано правило, тим менше винятків доводиться пояснювати адміністратору. Рішення ефективне настільки, наскільки воно зрозуміле виконавцям, які мають застосовувати його щодня. Саме тому потрібен такий формат, який витримає публічну перевірку й не змусить заявника здогадуватися про порядок дій. У цьому тексті пара **там, де** називає зону виправлення, а пара **чим, тим** показує залежність між точністю правила й кількістю винятків."
    rubric:
      - criteria: "Корелятивні пари"
        description: "Використано всі задані пари без змішування моделей."
        points: 4
      - criteria: "Пунктуація"
        description: "Підрядні частини правильно відокремлено комами."
        points: 3
      - criteria: "Стиль"
        description: "Відповідь звучить як зв'язний B2-текст, а не як список речень."
        points: 3

  - type: essay-response
    id: correlative-editing-response
    title: "Редакторське пояснення"
    instruction: Відредагуй кілька речень і поясни правки українською.
    prompt: "Відредагуй цей фрагмент як редактор службового повідомлення: **Люди, хто не додали копію паспорта, мають подати документи туди, де їх приймає адміністратор. Факт того, що зустріч відбулася пізно, призвів до того, що команда не завершила обговорення. Чим більше даних, то тим краще рішення, яке прийме рада. Проєкт був такий складний, який ніхто не зрозумів без прикладів. У зв'язку з тим, що мало місце технічне обмеження, файл повернули назад.** Після редакції поясни щонайменше три правки: вибір **які/хто**, пару **чим, тим**, модель **такий, що** або **настільки, що**, і заміну канцелярського баласту."
    min_words: 180
    model_answer: "Заявники, які не додали копію паспорта, мають подати документи там, де їх приймає адміністратор. Через пізній початок зустрічі команда не завершила обговорення. Чим більше даних має рада, тим точніше рішення вона може ухвалити. Проєкт був настільки складний, що ніхто не зрозумів його без прикладів. Через технічне обмеження файл повернули. У першому реченні після іменника **заявники** потрібне сполучне слово **які**, а не **хто**; модель **хто** природна після займенника **ті**. Пара **чим, тим** не потребує додаткового **то**. У реченні про проєкт ідеться про міру та наслідок, тому природна модель **настільки, що**. Конструкції **факт того, що** і **у зв'язку з тим, що мало місце** створюють канцелярський баласт, тому їх краще замінити коротшими причиновими формами."
    rubric:
      - criteria: "Редакція"
        description: "Виправлено граматичні й стилістичні помилки без втрати змісту."
        points: 4
      - criteria: "Пояснення"
        description: "Пояснено щонайменше три корелятивні або пунктуаційні рішення."
        points: 4
      - criteria: "Регістр"
        description: "Редакція звучить природно для службового повідомлення."
        points: 2
