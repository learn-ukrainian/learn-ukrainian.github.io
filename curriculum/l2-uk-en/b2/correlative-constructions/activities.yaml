version: '1.0'
module: correlative-constructions
level: b2
inline:
- type: select
  title: Корелят чи зайва опора?
  instruction: Виберіть речення, де корелят справді допомагає структурі або фокусу.
  items:
  - question: Де корелят потрібний як опора для підрядної частини?
    min_correct: 2
    options:
    - text: Ті, хто зареєструвався до п'ятниці, отримають листа.
      correct: true
    - text: Документи зберігають там, де є захищений доступ.
      correct: true
    - text: Важливо те, що сторінку оновили вчасно.
      correct: false
    - text: Факт того, що звіт готовий, усіх заспокоїв.
      correct: false
    explanation: У перших двох реченнях корелят тримає особу або місце; у двох інших його можна скоротити.
  - question: Де корелят лише підсилює вже відому підмножину?
    min_correct: 2
    options:
    - text: Ми перевіримо ті заявки, які надійшли після оновлення форми.
      correct: true
    - text: Повернімося до того питання, яке залишили вчора.
      correct: true
    - text: Ми перевіримо заявки, які надійшли після оновлення форми.
      correct: false
    - text: Повернімося до питання, яке залишили вчора.
      correct: false
    explanation: Корелят виділяє саме відому або обмежену групу.
  - question: Де корелят краще прибрати?
    min_correct: 2
    options:
    - text: Важливо, що інструкцію оновили до запуску.
      correct: true
    - text: Повернення заявки засмутило команду.
      correct: true
    - text: Важливо те, що інструкцію оновили до запуску.
      correct: false
    - text: Факт того, що заявку повернули, засмутив команду.
      correct: false
    explanation: Короткі правки зберігають зміст без важкої рамки.
  - question: Де після названого іменника потрібне сполучне слово 'які', а не 'хто'?
    min_correct: 2
    options:
    - text: Фахівці, які перевіряли дані, подали висновок.
      correct: true
    - text: Люди, які подали заявку, отримають листа.
      correct: true
    - text: Фахівці, хто перевіряли дані, подали висновок.
      correct: false
    - text: Люди, хто подали заявку, отримають листа.
      correct: false
    explanation: Після іменника природна означальна підрядна частина з 'який/яка/які'.
  - question: Де корелят створює риторичний фокус?
    min_correct: 2
    options:
    - text: Хто бере відповідальність, той має право на підтримку.
      correct: true
    - text: Той, хто працює з даними, має пояснити джерело.
      correct: true
    - text: Особа, яка працює з даними, має пояснити джерело.
      correct: false
    - text: Працівники з доступом до даних пояснюють джерело.
      correct: false
    explanation: Пари з 'хто... той' або 'той, хто' сильніше виділяють тип поведінки.
  - question: Де корелят показує місце помилки?
    min_correct: 2
    options:
    - text: Помилка виникає там, де поле лишається порожнім.
      correct: true
    - text: Дані губляться там, де форма дозволяє кілька адрес.
      correct: true
    - text: Помилка виникає туди, де поле порожнє.
      correct: false
    - text: Дані губляться стільки, скільки адрес.
      correct: false
    explanation: Місце або ситуацію вводить пара там... де.
  - question: Де пара передає пропорційну залежність?
    min_correct: 2
    options:
    - text: Чим чіткіше правило, тим менше помилок.
      correct: true
    - text: Чим довший абзац, тим важче стежити за зв’язком.
      correct: true
    - text: Стільки чіткіше правило, скільки помилок.
      correct: false
    - text: Де чіткіше правило, там помилки.
      correct: false
    explanation: Пропорцію передає саме чим... тим.
  - question: Де корелят підтримує питання про спосіб?
    min_correct: 2
    options:
    - text: Ми перевіряємо те, як користувач заповнює форму.
      correct: true
    - text: У звіті описано те, як команда збирала дані.
      correct: true
    - text: Ми перевіряємо те, де користувач заповнює форму, хоча йдеться про спосіб.
      correct: false
    - text: У звіті описано те, що команда збирала дані, хоча йдеться про метод.
      correct: false
    explanation: Спосіб вимагає як, а не універсального що.
- type: match-up
  title: Пара і значення
  instruction: Зіставте корелятивну пару з її основним значенням.
  pairs:
  - left: той / ті ... хто
    right: особа або група через дію
  - left: там ... де
    right: місце або ситуація
  - left: туди ... куди
    right: напрям руху
  - left: стільки ... скільки
    right: кількісна відповідність
  - left: чим ... тим
    right: пропорційна залежність
  - left: тоді ... коли
    right: часова умова або момент
  - left: настільки ... що
    right: міра з наслідком
  - left: те ... як
    right: спосіб виконання дії
  - left: те ... чому
    right: причина або мотив
  - left: якщо ... то
    right: умова й очікуваний результат
- type: fill-in
  title: Доберіть другу частину пари
  instruction: Заповніть пропуск так, щоб корелятивна пара була збалансована.
  items:
  - sentence: Чим точніше сформульовано правило, ____ легше його застосувати.
    answer: тим
    options:
    - тим
    - так
    - де
    - коли
    explanation: Пара 'чим... тим' передає пропорційну залежність.
  - sentence: Документи зберігають там, ____ є захищений доступ.
    answer: де
    options:
    - де
    - куди
    - скільки
    - як
    explanation: Йдеться про місце, а не напрям.
  - sentence: Файл треба надіслати туди, ____ подають основну заявку.
    answer: куди
    options:
    - куди
    - де
    - хто
    - що
    explanation: Дієслово 'надіслати' вимагає напряму.
  - sentence: Ми аналізуємо те, ____ команда збирала дані.
    answer: як
    options:
    - як
    - що
    - де
    - скільки
    explanation: Тут важливий спосіб дії.
  - sentence: Ті, ____ подали заявку до п'ятниці, отримають відповідь першими.
    answer: хто
    options:
    - хто
    - які
    - де
    - куди
    explanation: Опорою є займенник 'ті', тому природна пара 'ті, хто'.
  - sentence: Рішення стане зрозумілим тоді, ____ команда пояснить причину.
    answer: коли
    options:
    - коли
    - де
    - куди
    - скільки
    explanation: Тоді співвідноситься з коли.
  - sentence: Результат був настільки переконливий, ____ опоненти погодилися.
    answer: що
    options:
    - що
    - як
    - де
    - куди
    explanation: Настільки... що передає міру з наслідком.
  - sentence: Збережіть стільки прикладів, ____ потрібно для перевірки.
    answer: скільки
    options:
    - скільки
    - стільки
    - коли
    - хто
    explanation: Кількісна відповідність потребує скільки.
  - sentence: Не тільки форму оновили, ____ інструкцію переписали.
    answer: а й
    options:
    - а й
    - тому
    - де
    - скільки
    explanation: Парний сполучник потребує другої частини а й.
  - sentence: Якщо користувач не додав підпис, ____ заяву повертають.
    answer: то
    options:
    - то
    - там
    - тим
    - так
    explanation: Умовна рамка може підхоплюватися словом то.
- type: error-correction
  title: Межі й пунктуація
  instruction: Виберіть найкраще виправлення корелятивної конструкції.
  items:
  - sentence: Ті хто зареєструвався до п'ятниці отримають листа.
    error: Ті хто зареєструвався до п'ятниці отримають
    correction: Ті, хто зареєструвався до п'ятниці, отримають листа.
    options:
    - Ті, хто зареєструвався до п'ятниці, отримають листа.
    - Ті хто, зареєструвався до п'ятниці отримають листа.
    - Ті, хто зареєструвався до п'ятниці отримають, листа.
    - Ті хто зареєструвався, до п'ятниці, отримають листа.
    explanation: Підрядна частина стоїть усередині головної й відокремлюється з двох боків.
  - sentence: Чим коротший шлях користувача, тим, менше помилок виникає.
    error: тим, менше
    correction: Чим коротший шлях користувача, тим менше помилок виникає.
    options:
    - Чим коротший шлях користувача, тим менше помилок виникає.
    - Чим коротший шлях користувача тим, менше помилок виникає.
    - Чим коротший шлях користувача, тим, менше помилок виникає.
    - Чим, коротший шлях користувача, тим менше помилок виникає.
    explanation: Кома розділяє частини пари, але не ставиться після 'тим'.
  - sentence: Люди, хто подав заявку, отримають листа.
    error: Люди, хто
    correction: Люди, які подали заявку, отримають листа.
    options:
    - Люди, які подали заявку, отримають листа.
    - Люди, хто подав заявку, отримають листа.
    - Люди, де подали заявку, отримають листа.
    - Люди хто, подали заявку, отримають листа.
    explanation: Після іменника 'люди' потрібне сполучне слово 'які'.
  - sentence: Ми залишили ті після перевірки заявки, які мали повні дані.
    error: ті після перевірки заявки
    correction: Після перевірки ми залишили ті заявки, які мали повні дані.
    options:
    - Після перевірки ми залишили ті заявки, які мали повні дані.
    - Ми залишили ті після перевірки заявки, які мали повні дані.
    - Ми залишили ті, після перевірки заявки які мали повні дані.
    - Ми після залишили ті перевірки заявки, які мали повні дані.
    explanation: Корелят має стояти поруч з іменником, який він обмежує.
  - sentence: Файл треба надіслати там, куди подають основну заявку.
    error: там, куди
    correction: Файл треба надіслати туди, куди подають основну заявку.
    options:
    - Файл треба надіслати туди, куди подають основну заявку.
    - Файл треба надіслати там, куди подають основну заявку.
    - Файл треба надіслати тоді, куди подають основну заявку.
    - Файл треба надіслати стільки, куди подають основну заявку.
    explanation: Дія має напрям, тому потрібна пара 'туди... куди'.
  - sentence: Результат був настільки переконливий що учасники погодилися.
    error: переконливий що
    correction: Результат був настільки переконливий, що учасники погодилися.
    options:
    - Результат був настільки переконливий, що учасники погодилися.
    - Результат був настільки, переконливий що учасники погодилися.
    - Результат був настільки переконливий що, учасники погодилися.
    - Результат був, настільки переконливий, що учасники погодилися.
    explanation: Кома ставиться перед підрядною частиною з що.
  - sentence: Якщо форму оновили, заявники, то бачать нові підказки.
    error: заявники, то
    correction: Якщо форму оновили, то заявники бачать нові підказки.
    options:
    - Якщо форму оновили, то заявники бачать нові підказки.
    - Якщо форму оновили, заявники, то бачать нові підказки.
    - Якщо, форму оновили то заявники бачать нові підказки.
    - Якщо форму, оновили заявники то бачать нові підказки.
    explanation: То має підхоплювати всю умову, а не розривати підмет і присудок.
  - sentence: Ми пояснили те, що користувачі заповнювали форму, хоча йдеться про спосіб.
    error: те, що
    correction: Ми пояснили те, як користувачі заповнювали форму.
    options:
    - Ми пояснили те, як користувачі заповнювали форму.
    - Ми пояснили те, що користувачі заповнювали форму.
    - Ми пояснили там, як користувачі заповнювали форму.
    - Ми пояснили стільки, що користувачі заповнювали форму.
    explanation: Спосіб потребує те, як.
- type: group-sort
  title: Редакторське рішення
  instruction: Розподіліть речення за найкращою редакторською дією.
  groups:
  - name: Залишити корелят
    items:
    - Ті, хто має доступ до персональних даних, проходять навчання.
    - Документи зберігають там, де є захищений доступ.
    - Чим прозоріша інструкція, тим менше помилок у заявках.
  - name: Скоротити корелят
    items:
    - Важливо те, що інструкцію оновили вчасно.
    - Факт того, що заявку повернули, засмутив команду.
    - Важливим є те, як користувач заповнює поле.
  - name: Замінити опору іменником
    items:
    - Той, хто працює з даними, має пояснити джерело.
    - Ті, хто подали скаргу, очікують відповіді.
    - Ті, хто модерують форму, бачать типові помилки.
  - name: Виправити пару
    items:
    - Файл надіслали там, куди треба подавати заявку.
    - Помилка виникла туди, де поле лишилося порожнім.
    - Стільки точніше правило, скільки легше його застосувати.
workbook:
- type: select
  title: Корелят і жанр
  instruction: Виберіть речення, доречні для формального пояснення.
  items:
  - question: Які варіанти найкраще пасують до службової інструкції?
    min_correct: 2
    options:
    - text: Працівники, які мають доступ до даних, проходять окреме навчання.
      correct: true
    - text: Документи зберігають там, де є захищений доступ.
      correct: true
    - text: Хто бере відповідальність, той завжди перемагає.
      correct: false
    - text: Факт того, що інструкція довга, є проблемним.
      correct: false
    explanation: Формальний текст потребує точної опори й мінімуму риторики.
  - question: Де пара має правильну семантику?
    min_correct: 2
    options:
    - text: Файл надішліть туди, куди подають основну заявку.
      correct: true
    - text: Помилка виникає там, де поле лишається порожнім.
      correct: true
    - text: Файл надішліть там, куди подають заявку.
      correct: false
    - text: Помилка виникає туди, де поле порожнє.
      correct: false
    explanation: Напрям вимагає 'туди... куди', місце - 'там... де'.
  - question: Де збережено паралельність?
    min_correct: 2
    options:
    - text: Не тільки студенти, а й викладачі подали пропозиції.
      correct: true
    - text: Студенти не тільки подали пропозиції, а й запропонували графік.
      correct: true
    - text: Не тільки студенти подали пропозиції, а й графік змінили.
      correct: false
    - text: Як документи, так і надіслали листа.
      correct: false
    explanation: Обидві частини пари мають бути граматично співмірні.
  - question: Де корелят змінює фокус, а не лише додає ваги?
    min_correct: 2
    options:
    - text: Ми перевіримо ті заявки, які надійшли після оновлення.
      correct: true
    - text: Повернімося до того питання, яке лишилося відкритим.
      correct: true
    - text: Важливо те, що інструкція коротка.
      correct: false
    - text: Причина полягає в тому, що форма складна.
      correct: false
    explanation: Перші два речення виділяють підмножину або відому тему.
  - question: Де потрібна корекція пунктуації?
    min_correct: 2
    options:
    - text: Ті хто подав заявку отримають листа.
      correct: true
    - text: Чим коротший шлях, тим, менше помилок.
      correct: true
    - text: Ті, хто подав заявку, отримають листа.
      correct: false
    - text: Чим коротший шлях, тим менше помилок.
      correct: false
    explanation: Підрядну частину треба відокремити, а після 'тим' кома не потрібна.
  - question: Де службовий стиль не перевантажений корелятом?
    min_correct: 2
    options:
    - text: Важливо, що користувач бачить попередження до оплати.
      correct: true
    - text: Причина в нечіткій інструкції.
      correct: true
    - text: Важливим є те, що користувач бачить попередження.
      correct: false
    - text: Причина полягає в тому, що інструкція є нечіткою.
      correct: false
    explanation: Коротші версії точніші для службового пояснення.
  - question: Де корелят потрібний для однозначності?
    min_correct: 2
    options:
    - text: Ті заявки, які надійшли після дедлайну, розглянуть окремо.
      correct: true
    - text: Ті, хто має доступ до архіву, підписують угоду.
      correct: true
    - text: Заявки, які надійшли після дедлайну, розглянуть окремо.
      correct: false
    - text: Працівники з доступом до архіву підписують угоду.
      correct: false
    explanation: Перші варіанти спеціально виділяють підмножину або групу через умову.
  - question: Де пара не калькує англійську структуру?
    min_correct: 2
    options:
