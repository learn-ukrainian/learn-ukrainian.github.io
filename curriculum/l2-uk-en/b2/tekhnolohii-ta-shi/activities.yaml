version: '1.0'
module: tekhnolohii-ta-shi
level: b2

inline:
  - id: act-1
    type: reading
    title: Технічний термін і пояснення
    instruction: Прочитайте фрагмент і визначте, як автор робить терміни зрозумілими.
    text: >-
      У внутрішній інструкції слово "дашборд" залишили, але поруч дали пояснення:
      це панель показників, де видно кількість заявок, час обробки і помилки
      введення. Для технічної команди цього пояснення забагато, але для
      адміністраторів воно зменшує ризик неправильного використання системи.
    source: Навчальний фрагмент для модуля B2.
    tasks:
      - Який англіцизм залишено в тексті?
      - Який український відповідник або опис подано поруч?
      - Чому пояснення доречне для нетехнічної аудиторії?
      - Який ризик виник би без пояснення?
      - Як можна скоротити фрагмент для фахової команди?

  - id: act-2
    type: critical-analysis
    title: Гасло чи механізм
    instruction: Проаналізуйте, чому друге речення точніше описує автоматизацію.
    target_text: >-
      Автоматизація забере роботу в людей. Автоматизація змінює набір завдань:
      рутинні перевірки може виконувати система, але людині потрібні навички
      контролю, інтерпретації та відповідального рішення.
    questions:
      - Яке речення звучить як гасло?
      - Яке речення називає механізм зміни?
      - Які людські навички залишаються важливими?
      - Чому слово "може" робить висновок обережнішим?
      - Як додати до цього абзацу приклад з освіти або бізнесу?
    model_answers:
      - Перше речення узагальнює без доказу.
      - Друге речення пояснює, які завдання автоматизуються і які навички зростають.
      - Контроль, інтерпретація, комунікація і відповідальне рішення.
      - Воно не перетворює можливість на гарантований результат.
      - Наприклад, система може перевіряти неповні поля заявки, а працівник пояснює рішення заявникові.

  - id: act-3
    type: critical-analysis
    title: Межа академічної доброчесності
    instruction: Визначте, де ШІ є редакторською допомогою, а де замінює навчальну роботу.
    target_text: >-
      Студент написав план есе самостійно, попросив ШІ запропонувати коротші
      заголовки, а потім перевірив усі приклади. Інший студент подав текст,
      повністю згенерований моделлю, як власну роботу.
    questions:
      - У якому випадку студент зберігає власний внесок?
      - Яка дія потребує прозорого позначення?
      - Чому неперевірені приклади є ризиком?
      - Яке правило можна записати для класу?
    model_answers:
      - У першому випадку студент контролює план, зміст і перевірку.
      - Варто позначити редакторську допомогу ШІ, якщо це суттєво для оцінювання.
      - Модель може вигадати факт або дати неточний приклад.
      - Дозволено використовувати ШІ для чернетки, але фінальні докази й формулювання має перевірити автор.

  - id: act-4
    type: critical-analysis
    title: Якість промпту
    instruction: Порівняйте два запити й поясніть, який з них керує результатом.
    target_text: >-
      Напиши текст про кібербезпеку. Підготуй українською коротке пояснення
      для працівників школи про три ризики фішингових листів; уникай технічного
      жаргону і заверши списком із трьох перевірних дій.
    questions:
      - Який запит має конкретного адресата?
      - Які обмеження задано в другому запиті?
      - Чому формат відповіді важливий?
      - Який критерій якості можна додати?
    model_answers:
      - Другий запит адресовано працівникам школи.
      - Три ризики, українська мова, без технічного жаргону, фінальний список дій.
      - Формат допомагає отримати придатний для роботи текст, а не загальні міркування.
      - "Наприклад: кожна дія має бути виконуваною без спеціального програмного забезпечення."

workbook:
  - type: match-up
    title: Терміни цифрової епохи
    instruction: Поєднайте термін із точним поясненням.
    pairs:
      - left: алгоритм
        right: послідовність правил або модель для обробки задачі
      - left: персональні дані
        right: інформація, за якою можна прямо або непрямо ідентифікувати людину
      - left: кібербезпека
        right: захист систем, мереж і даних від цифрових загроз
      - left: промпт
        right: запит або інструкція, яку користувач подає ШІ-системі
      - left: діпфейк
        right: синтетичний медіаматеріал, що може імітувати реальну людину
      - left: автоматизація
        right: виконання повторюваних дій системою за заданими правилами
      - left: нейромережа
        right: модель, що навчається виявляти закономірності у даних
      - left: токенізація
        right: поділ тексту на одиниці для комп'ютерної обробки
      - left: упередження алгоритму
        right: систематична помилка, що може шкодити певним групам
      - left: людський нагляд
        right: перевірка автоматизованого рішення відповідальною людиною

  - type: fill-in
    title: Точні формули про ШІ
    instruction: Уставте найдоречніший термін.
    items:
      - sentence: "____ пропонує результат на підставі правил або навчальних даних."
        answer: "алгоритм"
        options: [алгоритм, приватність, діпфейк, інтерфейс]
        explanation: Алгоритм описує механізм обробки задачі.
      - sentence: "Право контролювати доступ до особистої інформації пов'язане з ____."
        answer: "приватністю"
        options: [приватністю, токенізацією, автоматизацією, синергією]
        explanation: Приватність стосується меж доступу до даних людини.
      - sentence: "Система, навчена розпізнавати закономірності, у цьому контексті називається ____."
        answer: "моделлю"
        options: [моделлю, заявкою, гаслом, маршрутом]
        explanation: У ШІ модель не є предметною копією, а обчислювальною системою.
      - sentence: "Перевірка роботи системи за критеріями якості - це ____."
        answer: "аудит"
        options: [аудит, стартап, браузер, стиль]
        explanation: Аудит допомагає побачити помилки, ризики й упередження.
      - sentence: "Людський ____ потрібен, коли автоматизоване рішення має наслідки для прав людини."
        answer: "нагляд"
        options: [нагляд, файл, дизайн, пароль]
        explanation: Нагляд означає, що людина контролює рішення, а не лише приймає його.
      - sentence: "Синтетичне відео, яке імітує реальну людину, називають ____."
        answer: "діпфейком"
        options: [діпфейком, аудитом, інтерфейсом, грантом]
        explanation: Діпфейк може створювати ризики для довіри й безпеки.
      - sentence: "Зручний ____ допомагає користувачеві зрозуміти наступну дію."
        answer: "інтерфейс"
        options: [інтерфейс, гіпотеза, сюжет, регламент]
        explanation: Інтерфейс організує взаємодію людини з системою.
      - sentence: "Перенесення процесів у цифрові сервіси називають ____."
        answer: "цифровізацією"
        options: [цифровізацією, реставрацією, бібліографією, композицією]
        explanation: Цифровізація змінює спосіб доступу до послуг і даних.
      - sentence: "____ має повідомляти, що відповідь створена автоматично."
        answer: "чат-бот"
        options: [чат-бот, архів, рецензент, куратор]
        explanation: Користувач має знати, коли спілкується не з людиною.
      - sentence: "Перенавчання працівників для нових цифрових ролей - це ____."
        answer: "перекваліфікація"
        options: [перекваліфікація, токенізація, алюзія, рима]
        explanation: Автоматизація часто потребує нових навичок і ролей.

  - type: unjumble
    title: Технологічні формули
    instruction: Відновіть речення з ключовими термінами модуля.
    items:
      - words: [Модель, навчається, на, даних, і, потребує, перевірки]
        answer: "Модель навчається на даних і потребує перевірки"
      - words: [Промпт, має, називати, мету, формат, і, критерій]
        answer: "Промпт має називати мету формат і критерій"
      - words: [Аудит, допомагає, знайти, упередження, в, алгоритмі, системи]
        answer: "Аудит допомагає знайти упередження в алгоритмі системи"
      - words: [Дані, не, можна, збирати, без, чіткої, мети]
        answer: "Дані не можна збирати без чіткої мети"
      - words: [Користувач, має, знати, коли, спілкується, із, ботом]
        answer: "Користувач має знати коли спілкується із ботом"
      - words: [Діпфейк, потребує, позначення, джерела, і, контексту, поширення]
        answer: "Діпфейк потребує позначення джерела і контексту поширення"
      - words: [Автоматизація, не, скасовує, людської, відповідальності, за, рішення]
        answer: "Автоматизація не скасовує людської відповідальності за рішення"
      - words: [Інтерфейс, має, пояснювати, помилку, і, наступну, дію]
        answer: "Інтерфейс має пояснювати помилку і наступну дію"

  - type: select
    title: Обережні висновки
    instruction: Виберіть формулу, яка найкраще підходить для професійного технологічного тексту.
    items:
      - question: Яке речення найточніше описує можливість ШІ?
        options:
          - text: ШІ може допомогти підготувати чернетку, але результат треба перевірити.
            correct: true
          - text: ШІ завжди знає правильну відповідь.
            correct: false
          - text: Людина більше не потрібна в жодному процесі.
            correct: false
          - text: Перевірка лише заважає інноваціям.
            correct: false
      - question: Яка фраза не перекладає відповідальність на систему?
        options:
          - text: Система позначила ризик, а рішення ухвалює відповідальна команда.
            correct: true
          - text: Алгоритм так сказав, тому ніхто не відповідає.
            correct: false
          - text: Помилку неможливо оскаржити, бо це автоматизація.
            correct: false
          - text: Відповідальність зникає після запуску сервісу.
            correct: false
      - question: Яке формулювання найкраще пояснює англіцизм?
        options:
          - text: Промпт - це запит або інструкція для моделі.
            correct: true
          - text: Промпт - це щось модне в інтернеті.
            correct: false
          - text: Промпт не треба пояснювати нікому.
            correct: false
          - text: Промпт завжди є програмним кодом.
            correct: false
      - question: Яка дія є частиною цифрової безпеки?
        options:
          - text: Перевірити джерело листа перед відкриттям вкладення.
            correct: true
          - text: Надіслати пароль у спільний чат.
            correct: false
          - text: Поширити неперевірене відео без контексту.
            correct: false
          - text: Ігнорувати попередження браузера.
            correct: false
      - question: Який критерій робить технологічне твердження доказовим?
        options:
          - text: Названо проблему, механізм і спосіб перевірки результату.
            correct: true
          - text: Використано багато слів "інноваційний" і "революційний".
            correct: false
          - text: Автор говорить дуже впевнено.
            correct: false
          - text: Не названо умови перевірки.
            correct: false
      - question: Яка умова робить автоматизацію безпечнішою для користувача?
        options:
          - text: Є зрозумілий канал звернення до людини.
            correct: true
          - text: Користувач не може поставити додаткове питання.
            correct: false
          - text: Система приховує критерії рішення.
            correct: false
          - text: Помилки не записують і не аналізують.
            correct: false
      - question: Який текст найкраще пояснює діпфейк?
        options:
          - text: Це синтетичне медіа, яке може імітувати голос або обличчя.
            correct: true
          - text: Це завжди офіційний документ.
            correct: false
          - text: Це звичайна фотографія без змін.
            correct: false
          - text: Це пароль для входу в систему.
            correct: false
      - question: Що означає принцип мінімізації даних?
        options:
          - text: Збирати лише ті дані, які потрібні для конкретної мети.
            correct: true
          - text: Зберігати всі можливі дані наперед.
            correct: false
          - text: Просити користувача дублювати приватні документи.
            correct: false
          - text: Передавати дані без пояснення.
            correct: false

  - type: error-correction
    title: Редагування технологічного тексту
    instruction: Виберіть точнішу і відповідальнішу редакцію.
    items:
      - sentence: "Алгоритм сам вирішив, тому ніхто не відповідає за помилку."
        error: "ніхто не відповідає"
        correction: "відповідальна команда має перевірити помилку"
        error_type: phrase
        options:
          - "відповідальна команда має перевірити помилку"
          - "помилки не існує"
          - "користувач не має права питати"
          - "алгоритм має право мовчати"
        explanation: Автоматизація не скасовує відповідальності людей або установи.
      - sentence: "Цей інноваційний продукт покращує все."
        error: "покращує все"
        correction: "скорочує час ручної перевірки заявок"
        error_type: phrase
        options:
          - "скорочує час ручної перевірки заявок"
          - "робить майбутнє революційним"
          - "є дуже цифровим"
          - "вирішує всі питання назавжди"
        explanation: Конкретна дія сильніша за рекламне узагальнення.
      - sentence: "Користувачі повинні вводити будь-які персональні дані в чат."
        error: "будь-які персональні дані"
        correction: "лише дані, потрібні для конкретної послуги"
        error_type: phrase
        options:
          - "лише дані, потрібні для конкретної послуги"
          - "усі можливі приватні деталі"
          - "паролі й медичні записи"
          - "чужі документи для швидкості"
        explanation: Принцип мінімізації даних зменшує ризик.
      - sentence: "Якщо відповідь ШІ звучить грамотно, її не треба перевіряти."
        error: "не треба перевіряти"
        correction: "треба перевірити за джерелами"
        error_type: phrase
        options:
          - "треба перевірити за джерелами"
          - "можна одразу цитувати як факт"
          - "слід приховати від читача"
          - "варто прибрати всі посилання"
        explanation: Грамотний стиль не гарантує правдивості.
      - sentence: "Промпт має бути таємничим, щоб модель здогадалася."
        error: "таємничим"
        correction: "конкретним"
        error_type: word
        options:
          - "конкретним"
          - "розмитим"
          - "випадковим"
          - "суперечливим"
        explanation: Добрий запит називає мету, адресата, формат і критерій.
      - sentence: "Діпфейк можна поширювати без попередження, якщо він якісний."
        error: "без попередження"
        correction: "лише з чітким позначенням синтетичного матеріалу"
        error_type: phrase
        options:
          - "лише з чітким позначенням синтетичного матеріалу"
          - "без пояснення джерела"
          - "як справжній доказ"
          - "після видалення контексту"
        explanation: Синтетичні медіа потребують прозорого маркування.
      - sentence: "Помилка в навчальному чат-боті є дрібницею, бо відповідь автоматична."
        error: "є дрібницею"
        correction: "може вплинути на рішення користувача"
        error_type: phrase
        options:
          - "може вплинути на рішення користувача"
          - "не має жодних наслідків"
          - "завжди покращує сервіс"
          - "скасовує потребу в підтримці"
        explanation: Автоматичні відповіді можуть мати реальні наслідки для людей.
      - sentence: "Інструкцію для користувача слід писати максимально технічно."
        error: "максимально технічно"
        correction: "зрозуміло для конкретної аудиторії"
        error_type: phrase
        options:
          - "зрозуміло для конкретної аудиторії"
          - "без пояснення термінів"
          - "лише англійськими абревіатурами"
          - "як внутрішній код команди"
        explanation: Технологічний текст має відповідати знанням адресата.

  - type: essay-response
    id: act-10
    title: Етичний сценарій упровадження ШІ
    instruction: Напишіть коротку відповідь із чіткою позицією.
    prompt: >-
      Школа хоче запустити ШІ-помічника для відповідей на адміністративні
      запитання батьків. Опишіть три переваги, три ризики і правила людського
      нагляду. Використайте щонайменше п'ять термінів з модуля.
    min_words: 160
    model_answer: >-
      Сильна відповідь називає конкретну користь, наприклад швидкі відповіді
      на типові запити, менше навантаження на адміністрацію і доступність
      інформації поза робочим часом. Водночас вона описує приватність,
      оновлення даних, ризик хибних порад, процедуру оскарження і межу
      автоматизації. Обов'язково має бути правило: відповідальні рішення
      підтверджує людина, а відповіді помічника регулярно перевіряють.
    rubric:
      - criteria: Аудиторія і завдання
        description: Названо конкретну аудиторію і реальну функцію ШІ-помічника.
        points: 2
      - criteria: Ризики
        description: Ризики пов'язані з даними, помилками або відповідальністю.
        points: 2
      - criteria: Нагляд
        description: Є правила людського нагляду, перевірки й оскарження.
        points: 2
