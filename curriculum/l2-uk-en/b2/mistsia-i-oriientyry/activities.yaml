version: '1.0'
module: mistsia-i-oriientyry
level: b2
inline:
  - type: select
    title: "Орієнтир, опис чи небезпека?"
    instruction: "Позначте варіанти, які справді допомагають людині зорієнтуватися або описати місце доречно."
    items:
      - question: "Турист просить пояснити шлях від метро до музею."
        min_correct: 2
        options:
          - text: "Вийдіть у бік театру й ідіть прямо до перехрестя."
            correct: true
          - text: "Там недалеко, якось знайдете."
            correct: false
          - text: "Музей буде навпроти старої пошти, ліворуч від парку."
            correct: true
          - text: "Повернете там, де всі повертають."
            correct: false
        explanation: "Добрий маршрут має видимий орієнтир, напрямок і точку перевірки."
      - question: "У путівнику треба описати набережну так, щоб читач уявив простір."
        min_correct: 2
        options:
          - text: "Набережна тягнеться вздовж річки й відкриває вид на пішохідний міст."
            correct: true
          - text: "Набережна дуже класна й атмосферна."
            correct: false
          - text: "Від перехрестя видно широкі сходи до води."
            correct: true
          - text: "Там просто красиво."
            correct: false
        explanation: "B2-опис спирається на просторову деталь, а не тільки на загальну оцінку."
      - question: "Ви пояснюєте маршрут людині, яка вперше в місті."
        min_correct: 2
        options:
          - text: "Назвіть кінцеву зупинку й запасний орієнтир."
            correct: true
          - text: "Скористайтеся тільки місцевою назвою двору."
            correct: false
          - text: "Уточніть, з якого боку площі треба чекати."
            correct: true
          - text: "Скажіть: зустрінемося там, де завжди."
            correct: false
        explanation: "Для незнайомої людини локальна назва потребує уточнення."
      - question: "Опис пам'ятки має бути точним і не перетворювати місто на штамп."
        min_correct: 2
        options:
          - text: "Фасад театру виходить на площу, а вежа слугує орієнтиром."
            correct: true
          - text: "Це неймовірна перлина, яку треба побачити."
            correct: false
          - text: "Нова забудова змінює силует історичного району."
            correct: true
          - text: "Старовинне місто зупинило час назавжди."
            correct: false
        explanation: "Кліше треба замінювати деталями простору, функції й історії."
      - question: "В описі природного маршруту важливо показати рух простором."
        min_correct: 2
        options:
          - text: "Стежка піднімається крізь ліс і виходить на полонину."
            correct: true
          - text: "Там є гори, ліс і вода."
            correct: false
          - text: "Після дощу перевал може бути слизьким, тому потрібне взуття з протектором."
            correct: true
          - text: "Дика природа чекає на туристів."
            correct: false
        explanation: "Природний опис має рух, точність і відповідальність."
      - question: "Треба сказати про відновлення міста після руйнувань."
        min_correct: 2
        options:
          - text: "Відбудова має врахувати пам'ять громади й доступність."
            correct: true
          - text: "Місто-фенікс красиво постало з попелу."
            correct: false
          - text: "Перед образом назвіть факти: що зруйновано, що відновлюють, хто повертається."
            correct: true
          - text: "Чим сильніша метафора, тим менше потрібні факти."
            correct: false
        explanation: "Меморіальні й воєнні теми потребують етичної точності."
      - question: "Прикметник від топоніма треба обрати нормативно."
        min_correct: 2
        options:
          - text: "київський"
            correct: true
          - text: "києвський"
            correct: false
          - text: "чернівецький"
            correct: true
          - text: "чернівцівський"
            correct: false
        explanation: "Форми прикметників від назв міст не завжди творяться механічно."
      - question: "Маршрут звучить як реальний план, якщо в ньому є..."
        min_correct: 3
        options:
          - text: "початкова точка"
            correct: true
          - text: "причина вибору зупинки"
            correct: true
          - text: "запасний варіант"
            correct: true
          - text: "лише список міст"
            correct: false
        explanation: "План має послідовність, логіку й умови, а не тільки топоніми."
  - type: match-up
    title: "Просторові слова і функції"
    instruction: "Зіставте слово або формулу з її функцією в описі місця."
    pairs:
      - left: "орієнтир"
        right: "помітний об'єкт, за яким легко знайти шлях"
      - left: "перехрестя"
        right: "точка вибору напрямку"
      - left: "набережна"
        right: "міський простір уздовж води"
      - left: "передмістя"
        right: "населений простір за межами центрального міста"
      - left: "мікрорайон"
        right: "житловий район із власною внутрішньою логікою"
      - left: "фасад"
        right: "зовнішній бік будівлі, який бачить перехожий"
      - left: "узвіз"
        right: "вулиця або шлях із помітним підйомом чи спуском"
      - left: "полонина"
        right: "високогірна лука в Карпатах"
      - left: "пересадка"
        right: "зміна транспорту на маршруті"
      - left: "запасний варіант"
        right: "план дії, якщо погода, транспорт або безпека зміняться"
      - left: "пам'ятка"
        right: "місце або об'єкт культурної чи історичної цінності"
      - left: "забудова"
        right: "сукупність будівель, що формують вигляд району"
  - type: fill-in
    title: "Маршрутні формули"
    instruction: "Вставте слово або формулу, яка робить маршрут точним."
    items:
      - sentence: "Від вокзалу доїдьте до ____ зупинки, а далі йдіть пішки."
        answer: "кінцевої"
        options: ["кінцевої", "високої", "старовинної", "суворої"]
        explanation: "Кінцева зупинка є зрозумілою транспортною точкою."
      - sentence: "Музей розташований ____ старої пошти."
        answer: "навпроти"
        options: ["навпроти", "попри", "крізь", "завдяки"]
        explanation: "Навпроти називає позицію через протилежний бік."
      - sentence: "Поверніть праворуч ____ аптеки."
        answer: "за"
        options: ["за", "впродовж", "з-поміж", "попід"]
        explanation: "За аптекою означає після орієнтира."
      - sentence: "Стежка веде ____ потоку до полонини."
        answer: "вздовж"
        options: ["вздовж", "поміжу", "заради", "попри те"]
        explanation: "Вздовж показує рух паралельно об'єкту."
      - sentence: "Якщо транспорт затримається, залишимо замок як ____ варіант."
        answer: "запасний"
        options: ["запасний", "величний", "офіційний", "суворий"]
        explanation: "Запасний варіант потрібен у реальному плані."
      - sentence: "З площі видно світлий ____ театру."
        answer: "фасад"
        options: ["фасад", "перевал", "лиман", "хребет"]
        explanation: "Фасад - зовнішня частина будівлі."
      - sentence: "Нова ____ змінює силует району."
        answer: "забудова"
        options: ["забудова", "пересадка", "полонина", "околиця"]
        explanation: "Забудова описує сукупність будівель у просторі."
      - sentence: "Перед походом перевірте правила ____."
        answer: "заповідника"
        options: ["заповідника", "набережної", "перехрестя", "квитка"]
        explanation: "Заповідник має правила відвідування."
      - sentence: "Андріївський ____ піднімається від Подолу."
        answer: "узвіз"
        options: ["узвіз", "узбіччя", "узбережжя", "перевал"]
        explanation: "Узвіз - традиційна назва крутого міського підйому або спуску."
      - sentence: "Чернівецький університет можна подати як приклад архітектурної ____."
        answer: "пам'ятки"
        options: ["пам'ятки", "кінцевої", "пересадки", "околиці"]
        explanation: "Пам'ятка - об'єкт культурної або історичної цінності."
  - type: true-false
    title: "Рішення в описі місця"
    instruction: "Визначте, чи твердження відповідає B2-опису місця й маршруту."
    items:
      - statement: "Орієнтир має бути видимим і зрозумілим людині, яка не знає місцевості."
        correct: true
        explanation: "Інакше маршрут працює тільки для місцевих."
      - statement: "У путівнику достатньо написати: там красиво."
        correct: false
        explanation: "Потрібні просторові, архітектурні або природні деталі."
      - statement: "Прикметники від топонімів треба перевіряти, бо форми можуть змінювати основу."
        correct: true
        explanation: "Наприклад: Чернівці - чернівецький."
      - statement: "Будь-який сильний образ автоматично доречний у тексті про зруйноване місто."
        correct: false
        explanation: "Образ має спиратися на факти й повагу до людей."
      - statement: "Маршрутний текст виграє від часових маркерів: спершу, потім, наступного ранку."
        correct: true
        explanation: "Вони допомагають читачеві не загубитися в плані."
      - statement: "Район і мікрорайон завжди означають те саме."
        correct: false
        explanation: "Мікрорайон зазвичай вужчий житловий простір."
      - statement: "У природному описі дієслова руху можуть зробити простір живішим."
        correct: true
        explanation: "Стежка піднімається, туман спускається, потік збігає."
      - statement: "Безпека подорожей під час війни є зайвою деталлю для маршруту."
        correct: false
        explanation: "Вона впливає на транспорт, час, правила й етичний тон."
      - statement: "Один маршрут можна подати розмовно, організаційно або описово."
        correct: true
        explanation: "Зміст близький, але регістр і деталізація різні."
      - statement: "Слова узбіччя й узбережжя можна вільно взаємозамінювати."
        correct: false
        explanation: "Узбіччя стосується дороги, узбережжя - берега моря, річки або озера."
  - type: error-correction
    title: "Виправ просторову неточність"
    instruction: "Виберіть або запишіть точніший варіант."
    items:
      - sentence: "Музей там біля чогось старого, якось знайдете."
        error: "якось знайдете"
        correction: "Музей розташований навпроти старої пошти, ліворуч від парку."
        error_type: "phrase"
        explanation: "Маршрут має називати орієнтир і позицію."
      - sentence: "Поверніть до перехрестя праворуч, а потім навпроти через міст."
        error: "до перехрестя праворуч"
        correction: "На перехресті поверніть праворуч, а потім перейдіть міст."
        error_type: "construction"
        explanation: "Потрібна природна керована конструкція."
      - sentence: "Це самий атмосферний старий район міста."
        error: "самий атмосферний"
        correction: "найатмосферніший або дуже виразний"
        error_type: "word"
        explanation: "Для найвищого ступеня використовуємо най-, а краще додати конкретну деталь."
      - sentence: "Дика природа чекає туристів і дозволяє все."
        error: "дозволяє все"
        correction: "Заповідна територія має правила, яких відвідувачі дотримуються."
        error_type: "register"
        explanation: "Екотуризм потребує етичної точності."
      - sentence: "Чернівцівський університет є головною пам'яткою маршруту."
        error: "Чернівцівський"
        correction: "Чернівецький"
        error_type: "word"
        explanation: "Нормативний прикметник від Чернівці - чернівецький."
      - sentence: "На узбережжі дороги стояв автобус."
        error: "узбережжі"
        correction: "узбіччі"
        error_type: "word"
        explanation: "Узбіччя - край дороги; узбережжя - берег."
      - sentence: "Місто-фенікс красиво воскресло, і цього досить для опису відновлення."
        error: "цього досить"
        correction: "Потрібно назвати факти руйнування, потреби громади й кроки відбудови."
        error_type: "register"
        explanation: "Сильна метафора без фактів може звучати нечутливо."
      - sentence: "Їдемо до Львова, Чернівців і Хотина, бо всі кажуть, що там класно."
        error: "бо всі кажуть, що там класно"
        correction: "бо маршрут поєднує залізничне сполучення, архітектурну пам'ятку й фортецю над Дністром."
        error_type: "phrase"
        explanation: "B2-план пояснює логіку вибору місць."
workbook:
  - type: reading
    id: zakarpattia-route-reading
    title: "Читання: маршрут Закарпаттям"
    instruction: "Прочитайте путівниковий уривок і визначте, як у ньому поєднано маршрут, орієнтири й описовий стиль."
    source: "Навчальний уривок для модуля B2."
    text: >-
      Маршрут починається в Ужгороді: від вокзалу зручно доїхати автобусом до старого центру, а звідти пішки піднятися до замку. Головний орієнтир - кам'яна брама, за якою відкривається внутрішній двір і панорама міста. Наступного дня варто вирушити до Мукачевого, щоб побачити замок Паланок. Його мури стоять над долиною, мов суворий кам'яний корабель. Якщо погода сприятлива, третій день можна присвятити короткій карпатській стежці: вона веде вздовж потоку до полонини, але після дощу потребує обережності. Перед поїздкою треба перевірити транспорт, правила відвідування заповідних територій і актуальні повідомлення місцевої влади.
    tasks:
      - "Випишіть три просторові орієнтири."
      - "Назвіть два транспортні або логістичні рішення."
      - "Знайдіть один образний вислів і поясніть його функцію."
      - "Поясніть, чому речення про безпеку не є зайвим."
      - "Перепишіть уривок у розмовному регістрі для друга."
      - "Додайте один запасний варіант маршруту."
  - type: essay-response
    id: opis-mistsia-essay
    title: "Опис місця з маршрутом і тоном"
    instruction: "Напишіть 180-230 слів про місце в Україні, яке варто показати гостеві."
    prompt: "У тексті назвіть розташування, два орієнтири, шлях або транспорт, одну архітектурну чи природну деталь, а також поясніть, який тон обираєте: розмовний, путівниковий, меморіальний або художній."
    min_words: 180
    model_answer: >-
      > [!model-answer]
      > Я би показала гостеві Чернівецький університет і старий центр довкола нього. Маршрут починається біля вокзалу: звідти можна доїхати тролейбусом до центральної частини міста, а далі пройти пішки в бік університету. Добрим орієнтиром є висока брама й червона цегла корпусів; навіть якщо людина не знає міста, ці деталі легко впізнати. Я обрала б путівниковий тон із кількома образними фразами, але без реклами. Університет не просто "гарний": його внутрішні двори, арки й дахові лінії створюють відчуття міста в місті. Після огляду варто спуститися до старих вулиць, де кам'яниці змінюють масштаб простору. Якщо буде дощ, маршрут можна скоротити й залишити прогулянку центром на другий день. Такий опис дає гостеві карту, причину вибору й реальний план дії.
    rubric:
      - criteria: "Навігаційна ясність"
        description: "Є розташування, орієнтири й маршрутна логіка."
        points: 3
      - criteria: "Лексична точність"
        description: "Використано просторову, архітектурну або природну лексику без кліше."
        points: 3
      - criteria: "Регістр і стиль"
        description: "Тон відповідає адресату й темі."
        points: 4
  - type: critical-analysis
    id: route-register-analysis
    title: "Аналіз: коли образ заважає маршруту"
    instruction: "Проаналізуйте уривок і запропонуйте редакцію."
    target_text: "Неймовірний куточок Закарпаття чекає на всіх, хто хоче втекти від міської метушні. Там є старий замок, гори й термальні джерела. Дорога проста: їдьте туди, де гарно, і ви не пошкодуєте."
    questions:
      - "Якої інформації бракує людині, яка хоче реально поїхати?"
      - "Які слова звучать рекламно й не додають просторової точності?"
      - "Як можна переписати уривок, зберігши привабливий тон?"
    model_answers:
      - "Бракує початкової точки, транспорту, орієнтирів, часу, запасного варіанту й умов безпеки."
      - "Неймовірний, куточок, втекти від метушні, там гарно - це загальні оцінки без деталей."
      - "Краще назвати маршрут: від Ужгорода автобусом до замку, далі прогулянка до оглядового майданчика; термальні джерела залишити як окремий пункт залежно від часу."
    focus_points:
      - "орієнтири"
      - "рекламний тон"
