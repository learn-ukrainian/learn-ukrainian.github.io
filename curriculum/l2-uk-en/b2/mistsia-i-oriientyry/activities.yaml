  - type: essay-response
    id: favorite-place-description
    title: "Письмо: опис улюбленого місця"
    instruction: "Напишіть приблизно 300 слів про улюблене місце в Україні."
    prompt: "Опишіть місце так, щоб читач міг зорієнтуватися в просторі й відчути його настрій. Додайте маршрут, орієнтири, географічні прикметники та щонайменше п'ять доречних стилістичних засобів."
    min_words: 250
    model_answer: >-
      Моє улюблене місце - київська набережна біля пішохідного мосту. Найзручніше дістатися туди від метро: треба вийти в бік парку, пройти алеєю до сходів і спуститися до води. Головні орієнтири - міст, широка лінія Дніпра й світлі фасади на протилежному березі. Увечері набережна не поспішає: вона веде повз дерева, під арками мосту й до води, яка тримає небо, мов відполіроване скло. Це місце подобається мені краєвидом і ритмом. Тут місто звучить м'якше: кроки стишуються, вітер рухає листя, а річка ніби зшиває два береги. Для туриста це гарний маршрут, для мешканця - коротка пауза в щоденному житті. Я б описав це місце як відкриту кімнату міста: без стін, але з власною пам'яттю, світлом і напрямком.
    rubric:
      - criteria: "Орієнтація"
        description: "Текст пояснює, де розташоване місце і як туди дістатися."
        points: 3
      - criteria: "Лексика"
        description: "Ужито точні слова для міського, архітектурного або природного простору."
        points: 3
      - criteria: "Стиль"
        description: "Є доречні епітети, метафори або порівняння, які підтримують зміст."
        points: 3
      - criteria: "Регістр і етика"
        description: "Тон відповідає темі й не романтизує руйнування або чужий досвід."
        points: 3
