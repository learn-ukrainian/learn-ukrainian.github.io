workbook:
  - type: reading
    id: zakarpattia-route-reading
    title: "Читання: маршрут Закарпаттям"
    instruction: "Прочитайте путівниковий уривок і визначте, як у ньому поєднано маршрут, орієнтири й описовий стиль."
    source: "Навчальний уривок для модуля B2."
    text: >-
      Маршрут починається в Ужгороді: від вокзалу зручно доїхати автобусом до старого центру, а звідти пішки піднятися до замку. Головний орієнтир - кам'яна брама, за якою відкривається внутрішній двір і панорама міста. Наступного дня варто вирушити до Мукачевого, щоб побачити замок Паланок. Його мури стоять над долиною, мов суворий кам'яний корабель. Якщо погода сприятлива, третій день можна присвятити короткій карпатській стежці: вона веде вздовж потоку до полонини, але після дощу потребує обережності. Після походу доречно запланувати термальні джерела, попередньо перевіривши розклад і правила відвідування.
    tasks:
      - "Назвіть початкову точку маршруту й перший транспортний крок."
      - "Випишіть два міські орієнтири з тексту."
      - "Поясніть, чому порівняння замку з кораблем працює в цьому контексті."
      - "Знайдіть речення, де автор дає умову або обмеження маршруту."
      - "Випишіть один географічний прикметник і поясніть його форму."
      - "Перепишіть останнє речення в більш розмовному регістрі."

  - type: match-up
    title: "Поєднайте просторове слово з функцією"
    instruction: "Зіставте слово або словосполучення з найточнішим поясненням."
    pairs:
      - left: "орієнтир"
        right: "помітний об'єкт, за яким легко знайти шлях"
      - left: "набережна"
        right: "простір або вулиця біля води"
      - left: "пересадка"
        right: "зміна одного транспорту на інший"
      - left: "мікрорайон"
        right: "менша житлова частина міста"
      - left: "передмістя"
        right: "поселення або зона біля великого міста"
      - left: "фасад"
        right: "зовнішній бік будівлі"
      - left: "полонина"
        right: "високогірна лука в Карпатах"
      - left: "заповідник"
        right: "територія з особливим режимом охорони природи"
      - left: "узбіччя"
        right: "край дороги"
      - left: "узбережжя"
        right: "простір біля моря, річки або озера"
      - left: "спадщина"
        right: "культурна пам'ять і цінність, яку потрібно берегти"
      - left: "реставрація"
        right: "фахове відновлення пошкодженого або старого об'єкта"

  - type: fill-in
    title: "Доберіть слово для простору"
    instruction: "Заповніть пропуск так, щоб речення було точним за змістом і керуванням."
    items:
      - sentence: "Музей розташований ____ старої площі, у будинку з темно-зеленими дверима."
        answer: "навпроти"
        options: ["навпроти", "через", "між", "попід"]
        explanation: "Навпроти вимагає родового відмінка: навпроти площі."
      - sentence: "На ____ дороги стояли туристичні автобуси, тому пішоходам було незручно."
        answer: "узбіччі"
        options: ["узбіччі", "узбережжі", "полонині", "фасаді"]
        explanation: "Узбіччя стосується дороги, а не води."
      - sentence: "Одеське ____ добре підходить для прогулянки біля моря."
        answer: "узбережжя"
        options: ["узбережжя", "узбіччя", "перехрестя", "передмістя"]
        explanation: "Узбережжя - простір біля моря, річки або озера."
      - sentence: "У цьому ____ є школа, кілька дворів і кінцева зупинка тролейбуса."
        answer: "мікрорайоні"
        options: ["мікрорайоні", "соборі", "перевалі", "лимані"]
        explanation: "Мікрорайон - менша житлова частина міста."
      - sentence: "Карпатська ____ після дощу була мокра, тому група йшла повільніше."
        answer: "стежка"
        options: ["стежка", "брама", "колія", "забудова"]
        explanation: "Стежка є природним маршрутом у горах або лісі."
      - sentence: "Від вокзалу треба зробити ____ на трамвай біля ринку."
        answer: "пересадку"
        options: ["пересадку", "полонину", "реставрацію", "окраїну"]
        explanation: "Пересадка означає зміну транспорту."
      - sentence: "____ театру виходить на головну площу міста."
        answer: "Фасад"
        options: ["Фасад", "Лиман", "Обрій", "Хребет"]
        explanation: "Фасад - зовнішній бік будівлі."
      - sentence: "Нова ____ змінила силует району й закрила панораму старої вежі."
        answer: "забудова"
        options: ["забудова", "полонина", "пересадка", "ковила"]
        explanation: "Забудова - сукупність будівель у просторі."
      - sentence: "Головним ____ для туристів стала дзвіниця собору."
        answer: "орієнтиром"
        options: ["орієнтиром", "узбіччям", "потоком", "розкладом"]
        explanation: "Орієнтир допомагає зорієнтуватися в просторі."
      - sentence: "На ____ над селом відкривається широка панорама хребта."
        answer: "полонині"
        options: ["полонині", "набережній", "арці", "колії"]
        explanation: "Полонина - високогірна лука в Карпатах."

  - type: fill-in
    title: "Географічні прикметники"
    instruction: "Доберіть правильну форму прикметника від географічної назви."
    items:
      - sentence: "____ набережна ввечері освітлена ліхтарями."
        answer: "Київська"
        options: ["Київська", "Київна", "Київова", "Києвська"]
        explanation: "Від Київ утворюємо київський, київська."
      - sentence: "____ дворик має балкони й виноград над аркою."
        answer: "Одеський"
        options: ["Одеський", "Одесський", "Одесовий", "Одеськовий"]
        explanation: "Нормативна форма - одеський."
      - sentence: "____ конструктивізм важливий для історії модерної архітектури."
        answer: "Харківський"
        options: ["Харківський", "Харківовий", "Харківний", "Харківецький"]
        explanation: "Від Харків утворюємо харківський."
      - sentence: "____ університет є однією з найвідоміших пам'яток міста."
        answer: "Чернівецький"
        options: ["Чернівецький", "Чернівський", "Чернівціський", "Чернівцевий"]
        explanation: "Від Чернівці - чернівецький."
      - sentence: "____ стежка після дощу потребує обережності."
        answer: "Карпатська"
        options: ["Карпатська", "Карпатцька", "Карпатова", "Карпативна"]
        explanation: "Від Карпати - карпатський, карпатська."
      - sentence: "____ брама веде до внутрішнього двору."
        answer: "Львівська"
        options: ["Львівська", "Львовська", "Львівова", "Львівна"]
        explanation: "Від Львів - львівський, львівська."
      - sentence: "____ краєвид відкривається з високого берега."
        answer: "Дніпровський"
        options: ["Дніпровський", "Дніпрянський", "Дніпрський", "Дніпровий"]
        explanation: "Від Дніпро природна форма - дніпровський."
      - sentence: "____ фортеця стоїть над Дністром."
        answer: "Хотинська"
        options: ["Хотинська", "Хотиновська", "Хотинецька", "Хотинова"]
        explanation: "Від Хотин - хотинський, хотинська."
      - sentence: "____ маршрут поєднує замок, ринок і старий центр."
        answer: "Ужгородський"
        options: ["Ужгородський", "Ужгородовий", "Ужгорідський", "Ужгородецький"]
        explanation: "Від Ужгород - ужгородський."
      - sentence: "____ центр має кілька важливих туристичних орієнтирів."
        answer: "Мукачівський"
        options: ["Мукачівський", "Мукачевовий", "Мукачівецький", "Мукачівний"]
        explanation: "Від Мукачево вживаємо мукачівський."

  - type: select
    title: "Виберіть точний варіант"
    instruction: "Позначте речення, які відповідають нормі, регістру й змісту."
    items:
      - question: "Де правильно вжито навпроти?"
        min_correct: 2
        options:
          - text: "Музей розташований навпроти площі."
            correct: true
          - text: "Музей розташований навпроти площу."
            correct: false
          - text: "Кав'ярня стоїть навпроти собору."
            correct: true
          - text: "Зупинка навпроти старим театром."
            correct: false
        explanation: "Навпроти керує родовим відмінком."
      - question: "Де опис маршруту достатньо конкретний?"
        min_correct: 2
        options:
          - text: "Від метро пройдіть прямо до перехрестя й поверніть ліворуч біля аптеки."
            correct: true
          - text: "Місто красиве, знайдете."
            correct: false
          - text: "Сідайте на автобус до кінцевої, потім ідіть уздовж парку до брами."
            correct: true
          - text: "Ідіть кудись угору, там буде музей."
            correct: false
        explanation: "Добрий маршрут дає початкову точку, дію й видимі орієнтири."
      - question: "Де географічний прикметник утворено правильно?"
        min_correct: 3
        options:
          - text: "київська набережна"
            correct: true
          - text: "одесський дворик"
            correct: false
          - text: "харківський конструктивізм"
            correct: true
          - text: "чернівецький університет"
            correct: true
        explanation: "Правильні форми: київський, одеський, харківський, чернівецький."
      - question: "Де стилістичний образ доречний для путівника?"
        min_correct: 2
        options:
          - text: "Вузький узвіз піднімається кам'яною стрічкою до церкви."
            correct: true
          - text: "Місто неймовірно неймовірне й просто вау."
            correct: false
          - text: "З набережної відкривається спокійна панорама річки й старого мосту."
            correct: true
          - text: "Фортеця кричить космічним болем без жодної причини."
            correct: false
        explanation: "Образ має спиратися на видиму деталь і жанр."
      - question: "Де опис відновлення міста є етичним?"
        min_correct: 2
        options:
          - text: "Відбудова має врахувати пам'ять громади й потреби мешканців."
            correct: true
          - text: "Руйнування - це просто ефектний фон для красивих фото."
            correct: false
          - text: "Перед описом втрат треба перевірити факти й назвати джерела."
            correct: true
          - text: "Можна романтизувати будь-яке руйнування, якщо метафора сильна."
            correct: false
        explanation: "Теми війни й відновлення потребують фактів, поваги й стриманих образів."
      - question: "Де правильно розрізнено пам'ятник і пам'ятку?"
        min_correct: 2
        options:
          - text: "Собор - архітектурна пам'ятка."
            correct: true
          - text: "Монумент поетові - пам'ятник."
            correct: true
          - text: "Собор - пам'ятник, бо це будь-яка стара будівля."
            correct: false
          - text: "Пам'ятка завжди означає тільки статую."
            correct: false
        explanation: "Пам'ятка ширша за пам'ятник."
      - question: "Де опис природи містить конкретну деталь?"
        min_correct: 2
        options:
          - text: "Тихий потік збігає вздовж смерекової стежки."
            correct: true
          - text: "Природа дуже прекрасна й максимально чудова."
            correct: false
          - text: "Низьке срібне небо висить над Дністром."
            correct: true
          - text: "Усе було неймовірне, бо гарне."
            correct: false
        explanation: "Конкретні іменники й образи сильніші за порожні оцінки."
      - question: "Де маршрут враховує безпеку?"
        min_correct: 2
        options:
          - text: "Після дощу не виходимо на відкриту полонину під час грози."
            correct: true
          - text: "У заповіднику можна сходити зі стежки, якщо фото буде краще."
            correct: false
          - text: "Перед поїздкою перевіряємо розклад транспорту й офіційні обмеження."
            correct: true
          - text: "Якщо немає зв'язку, група розходиться швидше."
            correct: false
        explanation: "Відповідальний маршрут враховує погоду, правила й актуальні обмеження."

  - type: true-false
    title: "Правда чи неправда: орієнтація й опис"
    instruction: "Визначте, чи твердження відповідає змісту модуля."
    items:
      - statement: "Орієнтир має бути видимим і зрозумілим людині, яка не знає місцевості."
        correct: true
        explanation: "Нестабільні або невидимі орієнтири погано працюють."
      - statement: "Навпроти вимагає знахідного відмінка: навпроти площу."
        correct: false
        explanation: "Потрібен родовий відмінок: навпроти площі."
      - statement: "Узбіччя дороги й узбережжя моря - різні слова для різних просторів."
        correct: true
        explanation: "Узбіччя стосується дороги, узбережжя - води."
      - statement: "Пам'ятник і пам'ятка завжди означають одне й те саме."
        correct: false
        explanation: "Пам'ятка ширша, а пам'ятник зазвичай монумент."
      - statement: "У путівнику доречно пояснювати запасний варіант маршруту."
        correct: true
        explanation: "Запасний варіант робить інструкцію практичною."
      - statement: "Екотуризм дозволяє ігнорувати правила заповідника, якщо місце красиве."
        correct: false
        explanation: "Екотуризм передбачає повагу до правил і ландшафту."
      - statement: "Географічні прикметники допомагають точніше описувати місця."
        correct: true
        explanation: "Наприклад: київський, одеський, карпатський."
      - statement: "У тексті про руйнування міста достатньо красивої метафори без фактів."
        correct: false
        explanation: "Такі теми потребують точності, поваги й перевірених фактів."
      - statement: "Опис природного маршруту може включати сезон, погоду й складність."
        correct: true
        explanation: "Це робить текст відповідальним і корисним."
      - statement: "Слово гарний завжди достатньо для B2-опису архітектури."
        correct: false
        explanation: "На B2 потрібні конкретні деталі: фасад, вежа, арка, силует."

  - type: error-correction
    title: "Виправте просторові й стилістичні помилки"
    instruction: "Знайдіть помилку в реченні та виберіть виправлений варіант."
    items:
      - sentence: "Музей стоїть навпроти площу."
        error: "навпроти площу"
        correction: "Музей стоїть навпроти площі."
        error_type: "construction"
        options:
          - "Музей стоїть навпроти площі."
          - "Музей стоїть навпроти площу."
          - "Музей стоїть навпроти площею."
          - "Музей стоїть навпроти в площі."
        explanation: "Після навпроти потрібен родовий відмінок."
      - sentence: "Ми гуляли узбіччям Чорного моря."
        error: "узбіччям Чорного моря"
        correction: "Ми гуляли узбережжям Чорного моря."
        error_type: "word"
        options:
          - "Ми гуляли узбережжям Чорного моря."
          - "Ми гуляли узбіччям Чорного моря."
          - "Ми гуляли фасадом Чорного моря."
          - "Ми гуляли перехрестям Чорного моря."
        explanation: "Узбіччя стосується дороги; біля моря потрібне узбережжя."
      - sentence: "Головний орієнтир - маленька тимчасова вивіска, яку можуть зняти завтра."
        error: "маленька тимчасова вивіска"
        correction: "Головний орієнтир - дзвіниця собору, яку видно з площі."
        error_type: "phrase"
        options:
          - "Головний орієнтир - дзвіниця собору, яку видно з площі."
          - "Головний орієнтир - маленька тимчасова вивіска, яку можуть зняти завтра."
          - "Головний орієнтир - настрій району."
          - "Головний орієнтир - будь-який випадковий камінь."
        explanation: "Орієнтир має бути видимим, стабільним і зрозумілим."
      - sentence: "Одеський узбіччя дуже красиве влітку."
        error: "Одеський узбіччя"
        correction: "Одеське узбережжя дуже красиве влітку."
        error_type: "construction"
        options:
          - "Одеське узбережжя дуже красиве влітку."
          - "Одеський узбіччя дуже красиве влітку."
          - "Одеська узбіччя дуже красиве влітку."
          - "Одеські узбережжя дуже красиве влітку."
        explanation: "Узбережжя середнього роду; для моря потрібне саме узбережжя."
      - sentence: "Цей маршрут фантастично неймовірний, бо він просто дуже класний."
        error: "фантастично неймовірний, бо він просто дуже класний"
        correction: "Цей маршрут веде вздовж Дністра й відкриває панораму кам'яних мурів фортеці."
