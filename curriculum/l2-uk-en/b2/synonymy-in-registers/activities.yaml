  - type: essay-response
    id: register-transformation-essay
    title: "Письмо: одна подія у трьох регістрах"
    instruction: "Напишіть 150-180 слів. Оберіть одну подію і подайте її у трьох регістрах: офіційному, науково-популярному або нейтральному, і неформальному. Поясніть щонайменше п'ять лексичних замін."
    prompt: "Подія: перенесення зустрічі, відкриття лабораторії, запуск навчальної платформи або власний приклад."
    min_words: 150
    model_answer: >-
      [!model-answer]
      Подія - відкриття навчальної платформи. Офіційний варіант - Університет запустив оновлену платформу, що забезпечить студентам доступ до навчальних матеріалів і консультацій. Нейтральний варіант - Університет відкрив платформу, де студенти можуть знайти матеріали курсу й записатися на консультації. Неформальний варіант - У нас з'явилася нова платформа, де легше знайти матеріали й домовитися про консультацію. Я замінив запустив на відкрив у нейтральному тексті, бо це простіше. Забезпечить доступ стало можуть знайти, бо блог потребує меншої дистанції. Навчальні матеріали лишилися в усіх версіях, бо це точний термін. Записатися на консультації офіційніше за домовитися про консультацію. У нас з'явилася зменшує дистанцію і підходить для студентського допису, але не для прес-релізу.
