version: '1.0'
module: synonymy-in-registers
level: b2
inline: []
workbook:
  - type: reading
    id: register-press-blog-reading
    title: "Читання: одна подія у двох регістрах"
    instruction: "Порівняйте офіційний і неформальний опис тієї самої події."
    source: "Навчальний уривок для модуля B2."
    text: >-
      Офіційний прес-реліз: Університет відкрив лабораторію цифрової гуманітаристики, яка забезпечить студентам доступ до сучасних інструментів аналізу текстів. Команда проєкту підготувала розширений банк прикладів і повідомила про початок реєстрації на консультації. Неформальний допис у блозі: У нас нарешті з'явилася нова лабораторія, де можна працювати з текстами, даними й цифровими інструментами. Викладачі зібрали багато прикладів, а студентам уже відкрили запис на консультації. Обидва тексти повідомляють той самий факт, але прес-реліз тримає дистанцію, а блог говорить ближче до читача.
    tasks:
      - "Випишіть три слова або словосполучення, які роблять перший фрагмент офіційнішим."
      - "Випишіть два варіанти, які роблять другий фрагмент ближчим до студентської аудиторії."
      - "Поясніть, чому словосполучення розширений банк прикладів офіційніше за багато прикладів."

  - type: match-up
    title: "Поєднайте регістр із найкращим прикладом"
    instruction: "Зіставте стилістичний регістр або явище з типовим прикладом."
    pairs:
      - left: "нейтральний регістр"
        right: "команда повідомила про зміну графіка"
      - left: "офіційно-діловий регістр"
        right: "відповідно до наказу зустріч перенесено"
      - left: "науковий регістр"
        right: "дані засвідчують частотну перевагу нейтральних лексем"
      - left: "розмовний регістр"
        right: "ми перенесли зустріч, бо спікер захворів"
      - left: "книжний регістр"
        right: "автор наголошує на потребі точного терміна"
      - left: "знижений регістр"
        right: "він знову базікав не по темі"
      - left: "медійне рамкування"
        right: "скорочення назвали оптимізацією"
      - left: "художня метафоризація"
        right: "старий дім дрімав над рікою"
      - left: "стилістичний дисонанс"
        right: "шановна тусовка здійснила крутий перезапуск"
      - left: "термінологічна сталість"
        right: "у документі послідовно повторено слово договір"
      - left: "етична нейтралізація"
        right: "ледачі студенти -> частина студентів не виконала завдання"
      - left: "науково-популярне пояснення"
        right: "корпусний аналіз -> аналіз великого набору текстів"

  - type: fill-in
    title: "Заповнення: регістр і доречність"
    instruction: "Виберіть слово або словосполучення, яке найточніше доповнює речення."
    items:
      - sentence: "Набір очікувань, що пов'язує слово з жанром і адресатом, називають стилістичним ____."
        answer: "регістром"
        options: ["регістром", "відмінком", "наголосом", "числом"]
        explanation: "Регістр визначає соціальну й жанрову доречність слова."
      - sentence: "У протоколі краще написати директор ____ рішення, а не директор бурмотів рішення."
        answer: "повідомив"
        options: ["повідомив", "базікав", "теревенив", "чіпляв"]
        explanation: "Повідомив є нейтрально-офіційним дієсловом мовлення."
      - sentence: "У науковому тексті важливо повторювати визначений ____ послідовно."
        answer: "термін"
        options: ["термін", "жарт", "вигук", "сленг"]
        explanation: "Термінологічна сталість зменшує двозначність."
      - sentence: "Фраза провести обговорення часто може бути простішою: ____."
        answer: "обговорити"
        options: ["обговорити", "обговореність", "перебалакати", "забалакати"]
        explanation: "Дієслово обговорити прибирає зайву канцелярськість."
      - sentence: "У медійному тексті слово оптимізація може ____ непопулярне скорочення."
        answer: "пом'якшувати"
        options: ["пом'якшувати", "відмінювати", "римувати", "наголошувати"]
        explanation: "Оптимізація часто звучить технічно й менш різко."
      - sentence: "Словосполучення корпусний аналіз у тексті для нефахівців варто ____."
        answer: "пояснити"
        options: ["пояснити", "засекретити", "заримувати", "знизити"]
        explanation: "Науково-популярний регістр зберігає термін, але пояснює його."
      - sentence: "Випадкове змішування офіційних і жаргонних слів створює стилістичний ____."
        answer: "дисонанс"
        options: ["дисонанс", "алфавіт", "прислівник", "відмінок"]
        explanation: "Дисонанс означає несумісність регістрів у тексті."
      - sentence: "Щоб передати take measures українською в офіційному тексті, пишемо ____ заходів."
        answer: "вжити"
        options: ["вжити", "взяти", "схопити", "забрати"]
        explanation: "Нормативна колокація: вжити заходів."
      - sentence: "Слово ____ у новині може звучати як технічне пом'якшення скорочення."
        answer: "оптимізація"
        options: ["оптимізація", "кома", "відмінок", "наголос"]
        explanation: "Оптимізація часто рамкує непопулярне рішення м'якше."
      - sentence: "У формулярі українською стандартно пишемо прізвище, ім'я і ____."
        answer: "по батькові"
        options: ["по батькові", "кличку", "нік", "тусовку"]
        explanation: "Це нейтральна формула для ідентифікаційних даних."

  - type: error-correction
    title: "Редагування: виправте стилістичний збій"
    instruction: "Знайдіть недоречний регістр або кальку і запропонуйте природнішу редакцію."
    items:
      - sentence: "Шановні учасники, наша тусовка здійснила крутий перезапуск процедури."
        error: "тусовка здійснила крутий перезапуск"
        correction: "Шановні учасники, наша команда оновила процедуру."
        explanation: "Офіційне звертання не поєднується з жаргонними й рекламними словами."
      - sentence: "Комісія зробила рішення про перенесення засідання."
        error: "зробила рішення"
        correction: "Комісія ухвалила рішення про перенесення засідання."
        explanation: "Українська офіційна колокація: ухвалити рішення."
      - sentence: "Дослідження доказує, що всі студенти завжди обирають книжні слова."
        error: "доказує, що всі студенти завжди"
        correction: "Дослідження дає підстави припустити, що частина студентів обирає книжні слова."
        explanation: "Науковий регістр потребує обережнішого висновку."
      - sentence: "У протоколі зазначено, що директор базікав про новий графік."
        error: "базікав"
        correction: "У протоколі зазначено, що директор повідомив про новий графік."
        explanation: "Базікати має знижене й оцінне забарвлення."
      - sentence: "Організатори провели допомогу студентам під час реєстрації."
        error: "провели допомогу"
        correction: "Організатори допомогли студентам під час реєстрації."
        explanation: "Тут краще просте дієслово допомогли, а не штучний канцеляризм."
      - sentence: "У новині працівників назвали ледарями без перевірених фактів."
        error: "ледарями"
        correction: "У новині зазначили, що частина працівників не виконала завдання вчасно."
        explanation: "Медійний текст не повинен замінювати факт образливим ярликом."
      - sentence: "Форма просить написати фамілію, ім'я і по батькові."
        error: "фамілію"
        correction: "Форма просить написати прізвище, ім'я і по батькові."
        explanation: "Для українського формуляра доречно прізвище, ім'я, по батькові."
      - sentence: "Для оплати курсу студент має взяти міри до п'ятниці."
        error: "взяти міри"
        correction: "Для оплати курсу студент має вжити заходів до п'ятниці."
        explanation: "Вжити заходів є нормативною офіційною колокацією."

  - type: group-sort
    title: "Сортування: куди належить вислів?"
    instruction: "Розподіліть приклади за головною регістровою функцією."
    groups:
      - name: "Офіційно-діловий"
        items:
          - "відповідно до наказу"
          - "на підставі заяви"
          - "у зв'язку зі зміною графіка"
          - "вжити заходів"
      - name: "Науковий"
        items:
          - "дані засвідчують тенденцію"
          - "обґрунтувати висновок"
          - "термінологічна сталість"
          - "корпусний аналіз"
      - name: "Розмовний або знижений"
        items:
          - "крута постановка"
          - "базікати не по темі"
          - "забити на справу"
          - "тягнути резину"
      - name: "Медійно-художній"
        items:
          - "молочна завіса туману"
          - "перезапуск програми"
          - "кам'яна пам'ять міста"
          - "слово чіпляє за живе"

  - type: quiz
    title: "Тест: регістр і синоніми"
    instruction: "Оберіть найкращу відповідь."
    items:
      - question: "Чому в офіційному документі інколи краще повторити термін?"
        options:
          - text: "щоб зберегти точність і уникнути двозначності"
            correct: true
          - text: "щоб текст був довшим"
            correct: false
          - text: "щоб приховати виконавця"
            correct: false
          - text: "щоб зробити текст художнім"
            correct: false
        explanation: "Стабільний термін підтримує юридичну або фахову ясність."
      - question: "Яке слово має найвиразніше знижене забарвлення?"
        options:
          - text: "базікати"
            correct: true
          - text: "повідомляти"
            correct: false
          - text: "зазначати"
            correct: false
          - text: "інформувати"
            correct: false
        explanation: "Базікати оцінює мовлення як пусте або недоречне."
      - question: "Що означає стилістичне перекодування?"
        options:
          - text: "адаптацію тексту до нового жанру й адресата"
            correct: true
          - text: "механічну заміну кожного слова довшим словом"
            correct: false
          - text: "вилучення всіх термінів з тексту"
            correct: false
          - text: "переклад без перевірки контексту"
            correct: false
        explanation: "Перекодування змінює лексику, тон і часто синтаксис."
      - question: "Який варіант найкраще підходить для прес-релізу?"
        options:
          - text: "Команда запустила оновлену платформу."
            correct: true
          - text: "Команда нарешті врубила класну штуку."
            correct: false
          - text: "Наша тусовка замутила платформу."
            correct: false
          - text: "Платформа чіпляє за живе."
            correct: false
        explanation: "Прес-реліз потребує нейтральної й стриманої лексики."
      - question: "Яка пара демонструє медійне рамкування?"
        options:
          - text: "скорочення - оптимізація"
            correct: true
          - text: "іменник - дієслово"
            correct: false
          - text: "кома - крапка"
            correct: false
          - text: "однина - множина"
            correct: false
        explanation: "Оптимізація може пом'якшити сприйняття скорочення."
      - question: "Яке речення найкраще пояснює науково-популярний регістр?"
        options:
          - text: "Термін зберігаємо, але пояснюємо простішим реченням."
            correct: true
          - text: "Усі терміни замінюємо жартами."
            correct: false
          - text: "Пишемо тільки канцелярські кліше."
            correct: false
          - text: "Уникаємо будь-яких прикладів."
            correct: false
        explanation: "Науково-популярний текст має бути точним і доступним."
      - question: "Що найкраще передає офіційне take measures?"
        options:
          - text: "вжити заходів"
            correct: true
          - text: "взяти міри"
            correct: false
          - text: "схопити кроки"
            correct: false
          - text: "робити міри"
            correct: false
        explanation: "Вжити заходів є нормативною українською колокацією."
      - question: "Чому речення старий дім дрімав над рікою не пасує до технічного опису?"
        options:
          - text: "воно використовує художню метафоризацію"
            correct: true
          - text: "воно не має дієслова"
            correct: false
          - text: "воно обов'язково граматично неправильне"
            correct: false
          - text: "воно офіційно-ділове"
            correct: false
        explanation: "Дрімав переносить людську дію на будинок і створює образ."
      - question: "Який критерій найважливіший для вибору синоніма в регістрі?"
        options:
          - text: "жанр, адресат і мета"
            correct: true
          - text: "лише кількість складів"
            correct: false
          - text: "лише алфавітний порядок"
            correct: false
          - text: "лише наявність префікса"
            correct: false
        explanation: "Трикутник жанр - адресат - мета допомагає перевірити доречність."
      - question: "Коли знижене слово може бути доречним?"
        options:
          - text: "коли воно свідомо працює в художньому діалозі або неформальному контексті"
            correct: true
          - text: "завжди в офіційній заяві"
            correct: false
          - text: "коли треба образити адресата"
            correct: false
          - text: "коли автор не знає нейтрального слова"
            correct: false
        explanation: "Знижена лексика потребує контрольованого контексту."

  - type: true-false
    title: "Так чи ні: регістр"
    instruction: "Позначте, чи твердження правильне."
    items:
      - statement: "Нейтральна лексика часто є безпечною точкою відліку для синонімічного ряду."
        correct: true
        explanation: "Нейтральне слово не додає сильного стилістичного сигналу."
      - statement: "Книжне слово автоматично покращує будь-який текст."
        correct: false
        explanation: "Книжне слово може бути недоречним у неформальному повідомленні."
      - statement: "Офіційний документ може повторювати визначений термін для точності."
        correct: true
        explanation: "Термінологічна сталість важливіша за декоративну варіативність."
      - statement: "Слово базікати нейтральне й доречне в протоколі."
        correct: false
        explanation: "Базікати має знижене оцінне забарвлення."
      - statement: "Медійний синонім може непомітно змінити оцінку події."
        correct: true
        explanation: "Наприклад, оптимізація і скорочення рамкують подію по-різному."
      - statement: "Науково-популярний текст має право пояснювати термін простішими словами."
        correct: true
        explanation: "Так він зберігає точність і стає доступнішим."
      - statement: "Стилістичний дисонанс завжди є бажаним художнім прийомом."
        correct: false
        explanation: "Він може бути прийомом, але часто є випадковим збоєм."
      - statement: "У формулярі доречно писати прізвище, ім'я, по батькові."
        correct: true
        explanation: "Це нейтральна українська формула для ідентифікаційних даних."
      - statement: "Перекодування тексту може вимагати зміни синтаксису, а не лише слова."
        correct: true
        explanation: "Заміна регістру часто змінює структуру речення."
      - statement: "Усі синоніми з одного словника можна вільно міняти місцями в будь-якому жанрі."
        correct: false
        explanation: "Синоніми перевіряють за контекстом, сполучуваністю і регістром."

  - type: translate
    title: "Переклад: регістр і колокації"
    instruction: "Оберіть найкращу українську редакцію."
    items:
      - source: "to make a decision"
        options:
          - text: "ухвалити рішення"
            correct: true
          - text: "зробити рішення"
            correct: false
          - text: "склеїти рішення"
            correct: false
          - text: "балакати рішення"
            correct: false
        explanation: "Ухвалити рішення є природною офіційною колокацією."
      - source: "to take measures"
        options:
          - text: "вжити заходів"
            correct: true
          - text: "взяти міри"
            correct: false
          - text: "узяти розміри"
            correct: false
          - text: "забрати заходи"
            correct: false
        explanation: "Офіційний український вислів: вжити заходів."
      - source: "the data indicate a trend"
        options:
          - text: "дані засвідчують тенденцію"
            correct: true
          - text: "дані базікають тенденцію"
            correct: false
          - text: "дані роблять тренд"
            correct: false
          - text: "дані чіпляють тренд"
            correct: false
        explanation: "Засвідчують доречне для наукового або аналітичного регістру."
      - source: "to provide information"
        options:
          - text: "надати інформацію"
            correct: true
          - text: "дати інформаціюшку"
            correct: false
          - text: "провести інформацію"
            correct: false
