  - id: wb-essay-register-transformation
    type: essay-response
    title: "Письмо: одна подія у трьох регістрах"
    instruction: "Напишіть 150-180 слів українською."
    prompt: "Оберіть одну подію: перенесення зустрічі, відкриття лабораторії, запуск навчальної платформи або власний приклад. Подайте її у трьох регістрах: офіційному, науково-популярному або нейтральному, і неформальному. Поясніть щонайменше п'ять лексичних замін."
    min_words: 150
    model_answer: >-
      > [!model-answer]
      > Подія: відкриття навчальної платформи. Офіційний варіант: **Команда проєкту запустила оновлену навчальну платформу й повідомила студентів про доступ до розширеного банку прикладів.** Нейтрально-науково-популярний варіант: **Оновлена платформа поєднує матеріали, приклади й навігацію, тому студентам легше знаходити потрібні теми.** Неформальний варіант: **Ми оновили платформу: тепер прикладів більше, а потрібну тему знайти простіше.** Я замінив **запустила** / **оновила** залежно від дистанції, **розширений банк прикладів** на **прикладів більше**, **доступ** на **знайти простіше**, **повідомила студентів** на ближче **ми оновили**. Офіційний текст тримає дистанцію, нейтральний пояснює користь, неформальний говорить ближче до читача.
    rubric:
      - criteria: "Три регістри"
        description: "Є окремі офіційний, нейтральний або науково-популярний, і неформальний варіанти."
        points: 3
      - criteria: "Пояснення замін"
        description: "Автор пояснює щонайменше п'ять лексичних або синтаксичних змін."
        points: 3
      - criteria: "Точність факту"
        description: "Усі версії зберігають той самий факт і не приховують відповідальність."
        points: 2
      - criteria: "Українська доречність"
        description: "Колокації природні; немає кальок на кшталт взяти міри або зробити рішення."
        points: 2
