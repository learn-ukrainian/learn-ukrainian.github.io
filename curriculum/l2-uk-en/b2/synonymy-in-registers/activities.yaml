version: '1.0'
module: synonymy-in-registers
level: b2
inline:
  - id: act-1
    type: comparative-study
    title: Одна подія, три дистанції
    instruction: Порівняйте три повідомлення про ту саму подію й визначте регістр кожного варіанта.
    items_to_compare:
      - "Університет повідомив про відкриття лабораторії цифрової гуманітаристики."
      - "Ми нарешті відкрили лабораторію, де можна спокійно працювати з текстами й даними."
      - "Дослідницька група презентувала інфраструктуру для корпусного аналізу текстів."
    criteria:
      - жанр
      - адресат
      - дистанція між автором і читачем
      - лексичні маркери регістру
    prompt: "Який варіант найкраще підходить для прес-релізу, який для блогу, а який для академічного опису? Назвіть слова, що це доводять."
    model_answer: >-
      Перший варіант пасує до прес-релізу або офіційного повідомлення: нейтральне **повідомив** фіксує факт. Другий ближчий до блогу: **ми**, **нарешті**, **спокійно працювати** зменшують дистанцію. Третій академічніший, бо має фахові маркери **дослідницька група**, **інфраструктура**, **корпусний аналіз**. Подія однакова, але регістр і адресат різні.
  - id: act-2
    type: critical-analysis
    title: Паспорт регістру
    instruction: Проаналізуйте ряд навколо дієслова мовлення.
    target_text: "говорити - повідомляти - зазначати - наголошувати - балакати - базікати"
    questions:
      - "Яке слово є нейтральним ядром ряду?"
      - "Які два слова найкраще пасують до офіційного або аналітичного тексту?"
      - "Яке слово має знижене оцінне забарвлення?"
      - "Чому не можна механічно замінити говорити на базікати в протоколі?"
    model_answers:
      - "Нейтральним ядром може бути **говорити**, бо воно лише називає дію мовлення без сильної оцінки."
      - "**Повідомляти** й **зазначати** пасують до офіційного або аналітичного тексту: перше передає факт адресатові, друге фіксує пункт у тексті."
      - "**Базікати** має знижене й оцінне забарвлення: воно натякає на пусте або недоречне мовлення."
      - "У протоколі **базікати** перетворить нейтральний факт на насмішку. Якщо автор не хоче оцінки, треба залишити **говорити**, **повідомити** або **зазначити**."
  - id: act-3
    type: comparative-study
    title: Формула чи мертвий стиль
    instruction: Визначте, де офіційна формула потрібна, а де її краще спростити.
    items_to_compare:
      - "Комісія ухвалила рішення про перенесення засідання."
      - "Команда здійснила оновлення розкладу для студентів."
      - "Секретаріат надасть інформацію учасникам до п'ятниці."
      - "Викладач провів пояснення нового правила на парі."
    criteria:
      - юридична або процедурна точність
      - природна українська колокація
      - зайва іменникова конструкція
      - адресат тексту
    prompt: "Для кожного речення вирішіть: залишити формулу, замінити простим дієсловом чи виправити колокацію. Поясніть рішення."
    model_answer: >-
      **Ухвалила рішення** варто залишити: це природна офіційна колокація. **Здійснила оновлення** краще спростити до **оновила розклад**, якщо не йдеться про формальну процедуру. **Надасть інформацію** природне в офіційному листі. **Провів пояснення** краще замінити на **пояснив правило**, бо навчальна ситуація не потребує канцелярської конструкції.
  - id: act-4
    type: critical-analysis
    title: Факт і рамкування
    instruction: Відокремте факт від оцінки або пом'якшення.
    target_text: "Компанія скоротила двадцять посад. Компанія оптимізувала структуру команди. Мешканці протестували проти зміни тарифів. У місті спалахнули заворушення через тарифи. Над містом лежав туман. Молочна завіса стерла дахи."
    questions:
      - "Які пари можуть описувати той самий факт, але по-різному рамкують його?"
      - "Де слово пом'якшує неприємну дію?"
      - "Де слово або образ потребує доказу в новині?"
      - "Де художній образ доречний, а де краще нейтральне слово?"
    model_answers:
      - "**Скоротила посади** і **оптимізувала структуру** можуть стосуватися тієї самої зміни, але друга формула звучить технічніше й м'якше. **Протестували** і **заворушення** теж рамкують подію по-різному."
      - "**Оптимізувала** може пом'якшувати скорочення, якщо текст не пояснює, що саме сталося з людьми."
      - "**Заворушення** потребує доказу хаосу або насильства; інакше це оцінна рамка замість факту."
      - "**Молочна завіса** доречна в художньому описі туману, але в прогнозі або попередженні водіям краще написати **густий туман**."
  - id: act-5
    type: critical-analysis
    title: Перекодування без втрати факту
    instruction: Перетворіть неформальний уривок на інший регістр і поясніть заміни.
    target_text: "Наша команда нарешті запустила класну платформу. Вона реально допомагає студентам не губитися в матеріалі. Викладачі зібрали купу прикладів, а старий графік ми просто переробили, бо він усіх дратував."
    questions:
      - "Які слова мають розмовне або емоційне забарвлення?"
      - "Яке нейтральне ядро події треба зберегти?"
      - "Як можна переписати уривок для прес-релізу?"
      - "Що не можна приховати під час офіційного перекодування?"
    model_answers:
      - "Розмовними або емоційними є **нарешті**, **класну**, **реально**, **не губитися**, **купу**, **усіх дратував**."
      - "Ядро: команда запустила або оновила платформу, платформа допомагає студентам орієнтуватися, викладачі підготували приклади, графік змінено після проблем або відгуків."
      - "Можливий прес-реліз: **Команда запустила оновлену навчальну платформу, що допомагає студентам орієнтуватися в матеріалі. Викладачі підготували розширений банк прикладів. Графік роботи платформи оновлено з урахуванням відгуків користувачів.**"
      - "Не можна приховати, що старий графік був проблемним. Офіційна версія може бути стриманою, але має зберегти відповідальність і причину зміни."
workbook:
  - type: reading
    id: wb-reading-press-blog
    title: "Читання: одна подія у двох регістрах"
    instruction: "Порівняйте офіційний і неформальний опис тієї самої події."
    source: "Навчальний уривок для модуля B2."
    text: >-
      Офіційний прес-реліз: Університет відкрив лабораторію цифрової гуманітаристики, яка забезпечить студентам доступ до сучасних інструментів аналізу текстів. Команда проєкту підготувала розширений банк прикладів і повідомила про початок реєстрації на консультації. Неформальний допис у блозі: У нас нарешті з'явилася нова лабораторія, де можна працювати з текстами, даними й цифровими інструментами. Викладачі зібрали багато прикладів, студентам уже відкрили запис на консультації. Обидва тексти повідомляють той самий факт, але прес-реліз тримає дистанцію, а блог говорить ближче до читача.
    tasks:
      - "Випишіть три слова або формули, які створюють офіційний регістр."
      - "Випишіть три елементи, які наближають блог до читача."
      - "Перепишіть одне речення прес-релізу так, щоб воно звучало як короткий блоговий допис."
  - type: match-up
    title: "Поєднайте регістр із найкращим прикладом"
    instruction: "Зіставте регістр або поняття з природним прикладом."
    pairs:
      - left: "офіційний регістр"
        right: "ухвалити рішення про зміну графіка"
      - left: "науковий регістр"
        right: "дані засвідчують тенденцію"
      - left: "нейтральний регістр"
        right: "команда змінила правила реєстрації"
      - left: "розмовний регістр"
        right: "скинь мені приклад після пари"
      - left: "знижена оцінка"
        right: "він базікав без змісту"
      - left: "медійне рамкування"
        right: "скорочення названо оптимізацією"
      - left: "художній образ"
        right: "молочна завіса туману"
      - left: "стилістичний дисонанс"
        right: "шановні учасники, наша тусовка перезапустила процедуру"
      - left: "паспорт регістру"
        right: "нейтральне ядро, дистанція, оцінка і типові сполучення"
      - left: "перекодування"
        right: "зміна лексики й синтаксису під новий жанр"
  - type: fill-in
    title: "Заповнення: регістр і доречність"
    instruction: "Виберіть слово або словосполучення, яке найточніше доповнює речення."
    items:
      - sentence: "Набір очікувань, що пов'язує слово з жанром і адресатом, називають стилістичним ____."
        answer: "регістром"
        options:
          - "регістром"
          - "відмінком"
          - "наголосом"
          - "числом"
        explanation: "Регістр визначає соціальну й жанрову доречність слова."
      - sentence: "У протоколі природніше написати: директор ____ про новий графік."
        answer: "повідомив"
        options:
          - "повідомив"
          - "базікав"
          - "теревенив"
          - "чіпляв"
        explanation: "Повідомив є нейтрально-офіційним дієсловом мовлення."
      - sentence: "У науковому тексті важливо повторювати визначений ____ послідовно."
        answer: "термін"
        options:
          - "термін"
          - "жарт"
          - "вигук"
          - "сленг"
        explanation: "Термінологічна сталість зменшує двозначність."
      - sentence: "Фраза провести обговорення часто може бути простішою: ____."
        answer: "обговорити"
        options:
          - "обговорити"
          - "обговореність"
          - "перебалакати"
          - "забалакати"
        explanation: "Дієслово обговорити прибирає зайву канцелярськість."
      - sentence: "У медійному тексті слово ____ може пом'якшувати непопулярне скорочення."
        answer: "оптимізація"
        options:
          - "оптимізація"
          - "орфографія"
          - "відмінок"
          - "кома"
        explanation: "Оптимізація звучить технічно й може змінити сприйняття події."
      - sentence: "Для художнього опису туману можлива метафора ____."
        answer: "молочна завіса"
        options:
          - "молочна завіса"
          - "офіційний протокол"
          - "ухвалене рішення"
          - "науковий висновок"
        explanation: "Молочна завіса працює як контекстуальний художній образ."
      - sentence: "Англійське accurate data українською зазвичай ____ дані."
        answer: "точні"
        options:
          - "точні"
          - "акуратні"
          - "знижені"
          - "фамільярні"
        explanation: "Accurate у цьому контексті означає точний, а не акуратний."
      - sentence: "Офіційне take measures українською природно передати як ____."
        answer: "вжити заходів"
        options:
          - "вжити заходів"
          - "взяти міри"
          - "схопити кроки"
          - "робити міри"
        explanation: "Вжити заходів є нормативною українською колокацією."
      - sentence: "Перший крок перекодування - визначити ____ ядро події."
        answer: "нейтральне"
        options:
          - "нейтральне"
          - "жаргонне"
          - "випадкове"
          - "грубе"
        explanation: "Нейтральне ядро допомагає зберегти факт у новому регістрі."
      - sentence: "Випадкове змішання офіційного звертання і жаргону називаємо стилістичним ____."
        answer: "дисонансом"
        options:
          - "дисонансом"
          - "наголосом"
          - "відмінком"
          - "алфавітом"
        explanation: "Дисонанс виникає, коли сигнали жанру й тону суперечать одне одному."
  - type: error-correction
    title: "Редагування: виправте стилістичний збій"
    instruction: "Виправте слово, словосполучення або конструкцію, що не пасує до регістру."
    items:
      - sentence: "У протоколі зазначено, що директор базікав про новий графік."
        error: "базікав"
        correction: "У протоколі зазначено, що директор повідомив про новий графік."
        explanation: "Базікати має знижене й оцінне забарвлення."
      - sentence: "Організатори провели допомогу студентам під час реєстрації."
        error: "провели допомогу"
        correction: "Організатори допомогли студентам під час реєстрації."
        explanation: "Тут краще просте дієслово допомогли, а не штучний канцеляризм."
      - sentence: "У новині працівників назвали ледарями без перевірених фактів."
        error: "ледарями"
        correction: "У новині зазначили, що частина працівників не виконала завдання вчасно."
        explanation: "Медійний текст не повинен замінювати факт образливим ярликом."
      - sentence: "Форма просить написати фамілію, ім'я і по батькові."
        error: "фамілію"
        correction: "Форма просить написати прізвище, ім'я і по батькові."
        explanation: "Для українського формуляра доречно прізвище, ім'я, по батькові."
      - sentence: "Для оплати курсу студент має взяти міри до п'ятниці."
        error: "взяти міри"
        correction: "Для оплати курсу студент має вжити заходів до п'ятниці."
        explanation: "Офіційна українська колокація: вжити заходів."
      - sentence: "Шановні учасники, наша тусовка здійснила крутий перезапуск процедури."
        error: "тусовка здійснила крутий перезапуск"
        correction: "Шановні учасники, наша команда оновила процедуру."
        explanation: "Офіційне звертання не поєднується з жаргонними й рекламними словами."
      - sentence: "Комісія зробила рішення про перенесення засідання."
        error: "зробила рішення"
        correction: "Комісія ухвалила рішення про перенесення засідання."
        explanation: "Українська офіційна колокація: ухвалити рішення."
      - sentence: "Дослідження доказує, що всі студенти завжди обирають книжні слова."
        error: "доказує, що всі студенти завжди"
        correction: "Дослідження дає підстави припустити, що частина студентів обирає книжні слова."
        explanation: "Науковий регістр потребує обережнішого висновку."
  - type: group-sort
    title: "Сортування: куди належить вислів?"
    instruction: "Розподіліть вислови за найімовірнішим регістром."
    groups:
      - name: "Офіційний або діловий"
        items:
          - "ухвалити рішення"
          - "вжити заходів"
          - "надати інформацію"
          - "відповідно до наказу"
      - name: "Науковий або аналітичний"
        items:
          - "дані засвідчують тенденцію"
          - "обґрунтувати висновок"
          - "термінологічна уніфікація"
          - "можна припустити"
      - name: "Розмовний або знижений"
        items:
          - "крута постановка"
          - "базікати не по темі"
          - "забити на справу"
          - "скинь мені приклад"
      - name: "Медійно-художній"
        items:
          - "молочна завіса туману"
          - "перезапуск програми"
          - "кам'яна пам'ять міста"
          - "слово чіпляє за живе"
  - type: quiz
    title: "Тест: регістр і синоніми"
    instruction: "Оберіть найкращу відповідь."
    items:
      - question: "Чому в офіційному документі інколи краще повторити термін?"
        options:
          - text: "щоб зберегти точність і уникнути двозначності"
            correct: true
          - text: "щоб текст був довшим"
            correct: false
          - text: "щоб приховати виконавця"
            correct: false
          - text: "щоб зробити текст художнім"
            correct: false
        explanation: "Стабільний термін підтримує юридичну або фахову ясність."
      - question: "Яке слово має найвиразніше знижене забарвлення?"
        options:
          - text: "базікати"
            correct: true
          - text: "повідомляти"
            correct: false
          - text: "зазначати"
            correct: false
          - text: "інформувати"
            correct: false
        explanation: "Базікати оцінює мовлення як пусте або недоречне."
      - question: "Яка пара найкраще показує медійне рамкування?"
        options:
          - text: "скорочення - оптимізація"
            correct: true
