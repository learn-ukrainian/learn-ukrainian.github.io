  - id: wb-essay-literature
    type: essay-response
    title: Сформулюйте академічний вступ
    instruction: Напишіть короткий вступ до дослідження.
    prompt: "Напишіть 150-180 слів українською до теми: Академічна доброчесність у цифрову епоху. Включіть актуальність, мету, об'єкт, предмет, матеріал і метод."
    min_words: 150
    model_answer: |-
      > [!model-answer]
      > Актуальність теми зумовлена тим, що цифрові інструменти істотно змінюють практики добору джерел, парафразування та перевірки студентських текстів. Академічна доброчесність у цифрову епоху потребує не лише заборони плагіату, а й зрозумілих процедур роботи з інформацією. Мета дослідження - проаналізувати, як студенти позначають запозичені ідеї у коротких академічних текстах.
      >
      > Об'єктом дослідження є академічне письмо студентів гуманітарних спеціальностей. Предметом дослідження є мовні й структурні засоби позначення джерел у парафразах. Матеріалом дослідження слугувало тридцять студентських анотацій, підготовлених у межах практичного курсу української мови. У роботі використано описовий метод, елементи якісного аналізу помилок і порівняння коректних та некоректних прикладів цитування. Гіпотеза полягає в тому, що більшість помилок виникає не через навмисне приховування джерел, а через нерозуміння межі між парафразою і власним висновком. Такий підхід дає змогу уточнити типові труднощі й запропонувати навчальні рекомендації. Очікуваний результат - короткий алгоритм перевірки посилань перед поданням роботи. Результати також допоможуть викладачам добирати вправи для поетапного навчання цитування і парафразування на різних етапах підготовки тексту.
    rubric:
      - criteria: Формули вступу
        description: Є актуальність, мета, об'єкт, предмет, матеріал і метод.
        points: 5
      - criteria: Логіка
        description: Формулювання пов'язані між собою і не суперечать темі.
        points: 3
      - criteria: Мова
        description: Текст витримано в академічному регістрі.
        points: 2
