version: '1.0'
module: academic-writing
level: b2
inline:
  - type: match-up
    title: Академічне поняття і функція
    instruction: Поєднайте поняття з його роллю в академічному тексті.
    pairs:
      - left: анотація
        right: стисло подає мету, матеріал, метод і результат
      - left: актуальність
        right: пояснює, чому тема важлива для дослідження
      - left: об'єкт дослідження
        right: називає ширше явище, яке вивчається
      - left: предмет дослідження
        right: уточнює конкретний аспект об'єкта
      - left: методологія
        right: описує способи роботи з матеріалом
      - left: першоджерело
        right: дає початкову інформацію або оригінальну позицію
      - left: парафраза
        right: передає чужу думку своїми словами з посиланням
      - left: бібліографічний опис
        right: дає дані, потрібні для пошуку джерела
      - left: гіпотеза
        right: формулює припущення, яке треба перевірити
      - left: терміносистема
        right: об'єднує пов'язані поняття певної галузі

  - type: fill-in
    title: Формули вступу
    instruction: Заповніть пропуски академічними формулами.
    items:
      - sentence: "____ теми зумовлена поширенням цифрових інструментів."
        answer: "Актуальність"
        options: [Актуальність, Випадковість, Приємність, Розмовність]
        explanation: Актуальність пояснює важливість теми.
      - sentence: "____ дослідження - проаналізувати студентські анотації."
        answer: "Мета"
        options: [Мета, Думка, Емоція, Прикраса]
        explanation: Мета називає головну дію дослідження.
      - sentence: "____ дослідження є академічне письмо студентів."
        answer: "Об'єктом"
        options: [Об'єктом, Предметом, Висновком, Додатком]
        explanation: Об'єкт - ширше явище.
      - sentence: "____ дослідження є мовні засоби парафразування."
        answer: "Предметом"
        options: [Предметом, Об'єктом, Списком, Епізодом]
        explanation: Предмет - конкретний аспект об'єкта.
      - sentence: "Матеріалом дослідження ____ двадцять студентських текстів."
        answer: "слугувало"
        options: [слугувало, думали, прикрашали, сварили]
        explanation: Це типова академічна формула для матеріалу.
      - sentence: "У роботі ____ описовий і порівняльний методи."
        answer: "використано"
        options: [використано, поговорено, зіграно, сховано]
        explanation: Безособова форма доречна для методології.
      - sentence: "У результаті дослідження ____ три типи помилок."
        answer: "виявлено"
        options: [виявлено, сподобано, вигадано, замовчано]
        explanation: Результат краще подавати точно.
      - sentence: "Отримані результати ____ про потребу навчати парафразування."
        answer: "свідчать"
        options: [свідчать, шумлять, смакують, зникають]
        explanation: Дані можуть свідчити про висновок.
      - sentence: "Дослідниця ____ увагу на межі між парафразою і плагіатом."
        answer: "звертає"
        options: [звертає, витрачає, ховає, губить]
        explanation: Формула вводить позицію джерела.
      - sentence: "У висновках ____ основні результати аналізу."
        answer: "узагальнено"
        options: [узагальнено, розважено, посварено, розмито]
        explanation: Висновки узагальнюють, а не просто повторюють вступ.

  - type: error-correction
    title: Редагування наукового стилю
    instruction: Виправте розмовну або неточну фразу для академічного тексту.
    items:
      - sentence: "Мені здається, що тема дуже класна."
        error: "Мені здається, що тема дуже класна."
        correction: "Тема дослідження є актуальною."
        error_type: register
        options: [Тема дослідження є актуальною., дуже класна, прикольна, нормальна]
        explanation: Академічний текст пояснює актуальність, а не емоцію.
      - sentence: "У роботі розказано про студентів."
        error: "розказано про студентів"
        correction: "проаналізовано діяльність студентів"
        error_type: word
        options: [проаналізовано діяльність студентів, розказано, поговорено, згадано трошки]
        explanation: Мета має використовувати дослідницьке дієслово.
      - sentence: "Автор дуже сильно доказує свою думку."
        error: "доказує"
        correction: "доводить"
        error_type: word
        options: [доводить, доказує, показує типу, каже]
        explanation: У науковому стилі потрібне нормативне дієслово.
      - sentence: "По даним статті видно проблему."
        error: "По даним"
        correction: "За даними"
        error_type: phrase
        options: [За даними, По даним, На даним, Даними по]
        explanation: Нормативна конструкція - за даними.
      - sentence: "Купа джерел говорить про це."
        error: "Купа"
        correction: "Значна кількість"
        error_type: register
        options: [Значна кількість, Купа, Море, Гора]
        explanation: Розмовне слово треба замінити нейтральним.
      - sentence: "Ми взяли чужу думку і трохи переробили."
        error: "взяли чужу думку і трохи переробили"
        correction: "переказали позицію джерела своїми словами та додали посилання"
        error_type: phrase
        options: [переказали позицію джерела своїми словами та додали посилання, взяли чужу думку, трохи переробили, замаскували текст]
        explanation: Парафраза потребує посилання на джерело.
      - sentence: "Висновок просто повторяє все спочатку."
        error: "просто повторяє все спочатку"
        correction: "узагальнює результати дослідження"
        error_type: construction
        options: [узагальнює результати дослідження, просто повторяє, копіює вступ, каже те саме]
        explanation: Висновок має відповідати меті й результатам.
      - sentence: "Дані точно довели, що це правило універсальне."
        error: "точно довели, що"
        correction: "дають підстави вважати, що"
        error_type: register
        options: ["дають підстави вважати, що", точно назавжди, без сумніву всюди, стопроцентно]
        explanation: Академічна модальність має уникати перебільшення.

  - id: act-4
    type: critical-analysis
    title: Парафраза і доброчесність
    instruction: Проаналізуйте фрагмент і визначте межу між коректною парафразою та плагіатом.
    target_text: "Джерело стверджує, що академічне письмо поєднує мовну вправність, критичне мислення і відповідальне використання інформації. Студентський текст пише: Академічне письмо поєднує мовну вправність, критичне думання і відповідальне використання даних. Посилання на джерело відсутнє."
    questions:
      - Чому студентський варіант не є повноцінною парафразою?
      - Яку проблему створює відсутність посилання?
      - Як можна переформулювати думку чесніше?
      - Яке дієслово введення чужого мовлення доречне для позиції джерела?
      - Як цей приклад пов'язаний з академічною доброчесністю?
    model_answers:
      - Студентський варіант майже повторює структуру джерела і лише замінює кілька слів.
      - Без посилання читач не бачить, що ідею взято з іншого тексту.
      - Можна написати, що автор пов'язує академічне письмо не лише з мовною вправністю, а й з критичним оцінюванням інформації.
      - Доречні дієслова зазначає, стверджує або наголошує залежно від змісту джерела.
      - Приклад показує, що доброчесність вимагає і переформулювання, і позначення джерела.

  - id: act-5
    type: essay-response
    title: Напишіть анотацію
    instruction: Напишіть академічну анотацію до малого дослідження.
    prompt: "Напишіть 150-180 слів українською: уявіть дослідження про типові помилки цитування в студентських роботах. Згадайте актуальність, мету, матеріал, метод, основні результати і практичне значення."
    min_words: 150
    model_answer: |-
      > [!model-answer]
      > У статті проаналізовано типові помилки цитування в студентських роботах з української мови. Актуальність теми зумовлена поширенням цифрових джерел і потребою формувати сталі навички академічної доброчесності. Мета дослідження - виявити найчастотніші порушення в оформленні прямих цитат, парафраз і бібліографічних описів. Матеріалом дослідження слугувало двадцять фрагментів студентських есе та рефератів. У роботі використано описовий метод і елементи якісного аналізу помилок.
      >
      > У результаті дослідження виявлено три групи порушень: відсутність посилання після парафрази, неточне відтворення сторінок і змішування різних стандартів оформлення джерел. Отримані результати свідчать, що студентам потрібні не лише технічні інструкції, а й вправи на розмежування власної думки та позиції джерела. Практичне значення роботи полягає в можливості використати результати для створення короткого чекліста академічного цитування.
      >
      > Такий чекліст має містити три кроки: перевірити, чи позначено джерело після кожної парафрази, звірити сторінки прямих цитат і переконатися, що всі позиції у списку літератури справді використано в тексті. Це допоможе студентам планувати роботу з джерелами до написання чернетки, а не виправляти посилання лише перед здачею.
    rubric:
      - criteria: Структура
        description: Анотація містить актуальність, мету, матеріал, метод і результат.
        points: 4
      - criteria: Академічний стиль
        description: Використано нейтральні формули й безособові конструкції.
        points: 3
      - criteria: Змістова точність
        description: Результати пов'язані з проблемою цитування.
        points: 3

workbook:
  - id: wb-reading-academic
    type: reading
    title: "Читання: фрагмент академічного вступу"
    instruction: Прочитайте фрагмент і визначте його структурні елементи.
    text: >-
      Академічна доброчесність у студентських роботах часто розглядається як
      питання покарання за плагіат. Проте не менш важливо навчати процедур:
      як відрізнити пряму цитату від парафрази, як позначити джерело і як
      сформулювати власний висновок після чужої позиції. Мета цього дослідження -
      проаналізувати типові помилки в позначенні джерел у студентських анотаціях.
      Матеріалом дослідження слугувало двадцять анотацій, підготовлених на
      практичному курсі української мови. У роботі використано описовий метод
      і класифікацію помилок за типом порушення.
    source: Навчальний фрагмент вступу для модуля B2.
    tasks:
      - Яку проблему названо у першому реченні?
      - Якою є мета дослідження?
      - Що слугувало матеріалом дослідження?
      - Який метод згадано у фрагменті?

  - type: translate
    title: Переклад академічних формул
    instruction: Оберіть найприродніший український варіант.
    items:
      - source: "The aim of the study is to analyze citation errors."
        options:
          - text: "Мета дослідження - проаналізувати помилки цитування."
            correct: true
          - text: "Ціль студії є аналізувати цитатні ерори."
            correct: false
          - text: "Дослідження хоче подивитися на цитати."
            correct: false
        explanation: Формула мети має бути нейтральною і точною.
      - source: "The material of the study consisted of twenty abstracts."
        options:
          - text: "Матеріалом дослідження слугувало двадцять анотацій."
            correct: true
          - text: "Матеріал був з двадцяти абстрактів."
            correct: false
          - text: "Двадцять текстів стали матеріальними."
            correct: false
        explanation: Анотація - природний відповідник abstract у цьому контексті.
      - source: "The results indicate the need for clearer instructions."
        options:
          - text: "Результати свідчать про потребу в чіткіших інструкціях."
            correct: true
          - text: "Результати індикують потребу більш клірних інструкцій."
            correct: false
          - text: "Результати кажуть, що треба щось пояснити."
            correct: false
        explanation: Свідчать про - академічна формула висновку.
      - source: "The source should be cited after the paraphrase."
        options:
          - text: "Після парафрази потрібно подати посилання на джерело."
            correct: true
          - text: "Джерело треба процитувати після перефразування, може."
            correct: false
          - text: "Парафраза сама знає джерело."
            correct: false
        explanation: Парафраза також потребує посилання.
      - source: "The author argues that academic writing develops critical thinking."
        options:
          - text: "Автор стверджує, що академічне письмо розвиває критичне мислення."
            correct: true
          - text: "Автор аргументує, що письмо девелопить думання."
            correct: false
          - text: "Автор сильно каже про мислення."
            correct: false
        explanation: Стверджує природно вводить позицію джерела.
      - source: "The hypothesis was partially confirmed."
        options:
          - text: "Гіпотезу частково підтверджено."
            correct: true
          - text: "Гіпотеза була парціально конфірмована."
            correct: false
          - text: "Гіпотеза ніби зайшла."
            correct: false
        explanation: Безособова форма доречна для результату.
      - source: "The article reviews recent studies on plagiarism."
        options:
          - text: "У статті оглянуто нові дослідження про плагіат."
            correct: true
          - text: "Стаття рев'ює ресентні студії про плагіат."
            correct: false
          - text: "Стаття переглядає плагіатні речі."
            correct: false
        explanation: Оглянуто - природна академічна формула.
      - source: "The conclusion summarizes the main findings."
        options:
          - text: "У висновку узагальнено основні результати."
            correct: true
          - text: "Конклюзія сумаризує головні файндінги."
            correct: false
          - text: "Кінець просто повторює все."
            correct: false
        explanation: Висновок узагальнює результати.

  - type: match-up
    title: Цитування і джерела
    instruction: Поєднайте ситуацію з коректною дією.
    pairs:
      - left: пряма цитата
        right: передати слова дослівно і позначити джерело
      - left: парафраза
        right: переказати думку своїми словами і подати посилання
      - left: бібліографія
        right: подати повний список використаних джерел
      - left: рецензія
        right: оцінити роботу, а не особистість автора
      - left: вигадане джерело
        right: вилучити, бо це порушення академічної доброчесності
      - left: змішування стилів
        right: оформити список літератури за єдиним стандартом
      - left: першоджерело
        right: перевірити оригінальну позицію або дані
      - left: непряме цитування
        right: зазначити, чию думку переказано
      - left: сторінка цитати
        right: уточнити місце, звідки взято дослівний фрагмент
      - left: власний висновок
        right: відділити від позиції джерела

  - type: select
    title: Вибір академічної стратегії
    instruction: Оберіть найкращий варіант для академічного тексту.
    items:
      - question: Яке речення найточніше формулює мету?
        options:
          - text: "Мета дослідження - виявити типові помилки парафразування."
            correct: true
          - text: "Ми хочемо поговорити про цікаві помилки."
            correct: false
          - text: "Ця тема дуже важлива для всіх."
            correct: false
          - text: "У роботі буде багато джерел."
            correct: false
        explanation: Мета має називати дослідницьку дію.
      - question: Що є предметом у темі про академічне письмо студентів?
        options:
          - text: "Мовні засоби парафразування в анотаціях."
            correct: true
          - text: "Усі студенти університету."
            correct: false
          - text: "Будівля факультету."
            correct: false
          - text: "Усі тексти українською мовою."
            correct: false
        explanation: Предмет звужує об'єкт до конкретного аспекту.
      - question: Коли потрібне посилання?
        options:
          - text: "Коли переказуємо чужу ідею своїми словами."
            correct: true
          - text: "Лише коли копіюємо цілу сторінку."
            correct: false
          - text: "Тільки якщо джерело паперове."
            correct: false
          - text: "Ніколи після парафрази."
            correct: false
        explanation: Парафраза також спирається на джерело.
      - question: Який варіант має академічну модальність?
        options:
          - text: "Результати дають підстави вважати, що інструкції були недостатньо чіткими."
            correct: true
          - text: "Дані стовідсотково назавжди довели все."
            correct: false
          - text: "Це просто очевидно."
            correct: false
          - text: "Усі й так знають відповідь."
            correct: false
        explanation: Обережна модальність не перебільшує висновок.
