  - type: essay-response
    id: synonymy-essay
    title: "Письмо: один ряд, три регістри"
    instruction: >-
      Напишіть 150-180 слів про один синонімічний ряд. Назвіть домінанту,
      поясніть принаймні три варіанти і покажіть, який варіант доречний
      в офіційному, нейтральному та публіцистичному контексті.
    prompt: "Обраний ряд: казати, іти, важливий або власний приклад."
    min_words: 150
    model_answer: |-
      [!model-answer]
      Домінанта мого ряду - **казати**. У протоколі доречніше написати
      **зазначати** або **повідомляти**, бо ці слова мають офіційний
      регістр: **Доповідач зазначив, що графік змінено**. У художньому
      описі можна використати **шепотіти** або **бурмотіти**, якщо важлива
      сила голосу чи психологічний стан персонажа. У нейтральній розмові
      достатньо **сказати** або **пояснити**. Отже, слова цього ряду
      мають спільне ядро мовлення, але відрізняються жанром, тоном і
      способом звучання. Я не замінюю їх механічно, бо **зазначити** у
      дружній розмові звучить сухо, а **бурмотіти** в офіційному звіті
      створює небажану оцінку.
