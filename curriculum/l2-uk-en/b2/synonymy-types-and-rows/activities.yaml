version: '1.0'
module: synonymy-types-and-rows
level: b2
inline: []
workbook:
  - type: reading
    id: synonymy-landscape-reading
    title: "Читання: синонімія в описі міста"
    instruction: "Прочитайте уривок і визначте, як автор підтримує один образ різними словами."
    source: "Навчальний уривок для модуля B2."
    text: >-
      Надвечір Львів ставав тихішим. Давнє місто ховало шум у вузьких
      вулицях, а кам'яна пам'ять будинків повільно темніла під дощем.
      На обрії ще трималася смуга світла, але небосхил уже збирав
      хмари над дахами. Туристи прямували до площі, місцеві крокували
      додому, а втомлені студенти пленталися до трамвая. У цьому
      короткому описі близькі слова не просто замінюють одне одного:
      вони уточнюють образ, темп і настрій.
    tasks:
      - "Випишіть три слова або словосполучення, які в уривку зближуються навколо образу міста."
      - "Поясніть різницю між прямували, крокували і пленталися."
      - "Знайдіть пару обрій / небосхил і поясніть, чому це не повна взаємозамінність."
      - "Назвіть один контекстуальний синонім з уривка."
      - "Запропонуйте нейтральніший варіант для фрази кам'яна пам'ять будинків."

  - type: match-up
    title: "Поєднайте тип синонімії з прикладом"
    instruction: "Зіставте тип синонімів із найточнішим прикладом."
    pairs:
      - left: "поняттєві синоніми"
        right: "великий - значний - величезний"
      - left: "стилістичні синоніми"
        right: "обличчя - пика - лик"
      - left: "контекстуальні синоніми"
        right: "туман - молочна завіса - біла стіна в одному описі"
      - left: "домінанта"
        right: "нейтральне центральне слово ряду"
      - left: "периферія ряду"
        right: "варіанти з додатковим відтінком"
      - left: "евфемізм"
        right: "пішов із життя замість різкішого помер"
      - left: "тавтологія"
        right: "організатори організували організаційну зустріч"
      - left: "сполучуваність"
        right: "приємний голос, але не завжди приємна проблема"
      - left: "хибний друг перекладача"
        right: "accurate як точний, а не акуратний"
      - left: "синонімічний ряд"
        right: "іти - прямувати - крокувати - шкандибати"
      - left: "регістр"
        right: "офіційний, нейтральний або розмовний тон висловлення"
      - left: "плеоназм"
        right: "зайве слово, яке не додає змісту"

  - type: fill-in
    title: "Заповнення: домінанта і відтінок"
    instruction: "Виберіть слово, яке найточніше доповнює речення."
    items:
      - sentence: "Нейтральне центральне слово синонімічного ряду називають ____."
        answer: "домінантою"
        options: ["домінантою", "тавтологією", "перифразою", "евфемізмом"]
        explanation: "Домінанта збирає ряд і має найзагальніше значення."
      - sentence: "У реченні «делегація ____ до зали» найточніше передано напрям і мету руху."
        answer: "прямувала"
        options: ["прямувала", "пленталася", "шкандибала", "бурмотіла"]
        explanation: "Прямувати додає цілеспрямований напрям."
      - sentence: "Слова великий, значний, величезний відрізняються передусім ____."
        answer: "інтенсивністю"
        options: ["інтенсивністю", "грубістю", "частиною мови", "правописом"]
        explanation: "Це поняттєві синоніми зі шкалою сили ознаки."
      - sentence: "Слово пика у ряду обличчя - лице - пика має ____ забарвлення."
        answer: "знижене"
        options: ["знижене", "офіційне", "термінологічне", "нейтральне"]
        explanation: "Пика є грубішим, зниженим варіантом."
      - sentence: "Молочна завіса як назва туману в одному уривку є ____ синонімом."
        answer: "контекстуальним"
        options: ["контекстуальним", "абсолютним", "правописним", "числівниковим"]
        explanation: "Це зближення працює в конкретному образі."
      - sentence: "Щоб пом'якшити різке слово, автор може використати ____."
        answer: "евфемізм"
        options: ["евфемізм", "плеоназм", "домінанту", "антонім"]
        explanation: "Евфемізм називає явище м'якше або непрямо."
      - sentence: "Фраза accurate data в більшості навчальних контекстів українською - ____ дані."
        answer: "точні"
        options: ["точні", "акуратні", "елегантні", "пишні"]
        explanation: "Accurate часто відповідає українському точний."
      - sentence: "Повтор спільного кореня без потреби називають ____."
        answer: "тавтологією"
        options: ["тавтологією", "контекстуалізацією", "домінантою", "периферією"]
        explanation: "Тавтологія створює зайвий повтор."
      - sentence: "Слова причина, підстава, мотив і аргумент треба розрізняти за ____ роллю."
        answer: "логічною"
        options: ["логічною", "фонетичною", "орфографічною", "числовою"]
        explanation: "Вони належать до різних типів пояснення або доведення."
      - sentence: "У заяві до університету природніше написати доповідач ____."
        answer: "зазначив"
        options: ["зазначив", "прохихотів", "плентався", "сфотографував"]
        explanation: "Зазначив має офіційний відтінок повідомлення."

  - type: select
    title: "Виберіть усі доречні варіанти"
    instruction: "Позначте всі відповіді, які відповідають вимозі."
    items:
      - question: "Які слова можуть входити до ряду з домінантою іти?"
        options:
          - text: "прямувати"
            correct: true
          - text: "крокувати"
            correct: true
          - text: "шкандибати"
            correct: true
          - text: "читати"
            correct: false
        explanation: "Перші три слова описують різновиди ходи або руху пішки."
      - question: "Які варіанти є стилістично забарвленими щодо нейтрального обличчя?"
        options:
          - text: "пика"
            correct: true
          - text: "лик"
            correct: true
          - text: "обличчя"
            correct: false
          - text: "трамвай"
            correct: false
        explanation: "Пика знижене, лик урочисте або архаїзоване."
      - question: "Які заміни допомагають прибрати тавтологію організатори організували організаційну зустріч?"
        options:
          - text: "координатори провели робочу зустріч"
            correct: true
          - text: "організатори зробили організаційну організацію"
            correct: false
          - text: "команда провела робочу зустріч"
            correct: true
          - text: "організаційні організатори організували"
            correct: false
        explanation: "Потрібно прибрати зайве повторення кореня."
      - question: "Які слова можуть бути нейтральнішими за знижене пика?"
        options:
          - text: "обличчя"
            correct: true
          - text: "лице"
            correct: true
          - text: "морда щодо людини в офіційному тексті"
            correct: false
          - text: "фото"
            correct: false
        explanation: "Обличчя і лице нейтральніші для людини."
      - question: "Які приклади показують контекстуальну синонімію?"
        options:
          - text: "туман - молочна завіса - біла стіна в одному пейзажі"
            correct: true
          - text: "Київ - українська столиця в тексті про місто"
            correct: true
          - text: "кома - крапка як однакові знаки"
            correct: false
          - text: "стіл - слухати як один ряд"
            correct: false
        explanation: "Контекст зближує назви того самого образу або об'єкта."
      - question: "Які варіанти коректно передають accurate у словосполученні accurate answer?"
        options:
          - text: "точна відповідь"
            correct: true
          - text: "акуратна відповідь у значенні точна"
            correct: false
          - text: "правильна відповідь"
            correct: true
          - text: "елегантна відповідь у будь-якому контексті"
            correct: false
        explanation: "Accurate передає точність або правильність, не охайність."
      - question: "Які питання варто поставити перед заміною синоніма?"
        options:
          - text: "Чи збігається ядро значення?"
            correct: true
          - text: "Чи змінюється регістр?"
            correct: true
          - text: "Чи слово має потрібну сполучуваність?"
            correct: true
          - text: "Чи слово довше за попереднє?"
            correct: false
        explanation: "Довжина слова не є головним критерієм."
      - question: "Які слова доречніші для офіційного повідомлення?"
        options:
          - text: "повідомити"
            correct: true
          - text: "зазначити"
            correct: true
          - text: "бурмотіти"
            correct: false
          - text: "прохихотіти"
            correct: false
        explanation: "Офіційний регістр потребує нейтральних або книжних дієслів повідомлення."

  - type: error-correction
    title: "Редагування: неточний синонім"
    instruction: "Виправте речення і поясніть, який критерій синонімії порушено."
    items:
      - sentence: "У мене елегантний настрій після зустрічі."
        error: "елегантний настрій"
        correction: "У мене піднесений настрій після зустрічі."
        explanation: "Елегантний не має потрібної сполучуваності з настрій."
      - sentence: "Команда робить контроль над проєктом."
        error: "робить контроль"
        correction: "Команда контролює проєкт."
        explanation: "Дієслово контролює природніше за кальковану конструкцію."
      - sentence: "Організатори організували організаційну зустріч."
        error: "Організатори організували організаційну"
        correction: "Координатори провели робочу зустріч."
        explanation: "Редакція прибирає тавтологію."
      - sentence: "Доповідач прошепотів у протоколі, що рішення змінено."
        error: "прошепотів у протоколі"
        correction: "У протоколі зазначено, що рішення змінено."
        explanation: "Офіційний жанр потребує дієслова повідомлення, а не опису голосу."
      - sentence: "Мотив аварії досі не встановлено."
        error: "Мотив аварії"
        correction: "Причину аварії досі не встановлено."
        explanation: "Аварія має причину, а мотив має особа."
      - sentence: "На фото видно пики учасників конференції."
        error: "пики учасників"
        correction: "На фото видно обличчя учасників конференції."
        explanation: "Пика є зниженим і образливим словом для офіційного опису."
      - sentence: "Бездонна повага до вчителя була записана в анкеті."
        error: "Бездонна повага"
        correction: "Глибока повага до вчителя була записана в анкеті."
        explanation: "Глибока краще сполучається з абстрактним іменником повага."
      - sentence: "Місто було красиве, будинки красиві, площа красива."
        error: "красиве, будинки красиві, площа красива"
        correction: "Місто вражало гармонією: старі будинки оточували простору площу."
        explanation: "Краще уточнити зміст, а не механічно замінити кожен повтор."

  - type: group-sort
    title: "Сортування: тип синонімічного відтінку"
    instruction: "Розподіліть приклади за головним типом відмінності."
    groups:
      - name: "Поняттєвий відтінок"
        items:
          - "великий - значний - величезний"
          - "причина - підстава - мотив"
          - "тихий - приглушений - безмовний"
      - name: "Стилістичне забарвлення"
        items:
          - "обличчя - пика - лик"
          - "діти - малеча - неповнолітні особи"
          - "казати - зазначати - бурмотіти"
      - name: "Контекстуальна заміна"
        items:
          - "туман - молочна завіса"
          - "Київ - українська столиця"
          - "старе місто - кам'яна пам'ять"
      - name: "Культура мовлення"
        items:
          - "помер - пішов із життя"
          - "старі люди - літні люди"
          - "організатори організували - координатори провели"
          - "реорганізація персоналу - скорочення працівників"
          - "зробити контроль - контролювати"

  - type: quiz
    title: "Швидка діагностика синонімічного вибору"
    instruction: "Оберіть найточнішу відповідь."
    items:
      - question: "Що є домінантою в ряду казати - зазначати - шепотіти - бурмотіти?"
        options:
          - text: "казати"
            correct: true
          - text: "шепотіти"
            correct: false
          - text: "бурмотіти"
            correct: false
          - text: "зазначати"
            correct: false
        explanation: "Казати є найзагальнішим і найменш забарвленим словом."
      - question: "Який варіант найкраще пасує до офіційного протоколу?"
        options:
          - text: "доповідач зазначив"
            correct: true
          - text: "доповідач пробурмотів"
            correct: false
          - text: "доповідач прохихотів"
            correct: false
          - text: "доповідач чалапав"
            correct: false
        explanation: "Зазначив відповідає офіційному повідомленню."
      - question: "Який приклад найкраще показує евфемізм?"
        options:
          - text: "пішов із життя"
            correct: true
          - text: "крокував майданом"
            correct: false
          - text: "точні дані"
            correct: false
          - text: "синонімічний ряд"
            correct: false
        explanation: "Евфемізм м'якше називає складне або болісне явище."
      - question: "Який критерій порушено у фразі елегантний настрій?"
        options:
          - text: "сполучуваність"
            correct: true
          - text: "відмінювання"
            correct: false
          - text: "наголос"
            correct: false
          - text: "число іменника"
            correct: false
        explanation: "Прикметник елегантний не поєднується природно з настрій."
      - question: "Яка заміна найкраще передає accurate answer?"
        options:
          - text: "точна відповідь"
            correct: true
          - text: "акуратна відповідь"
            correct: false
          - text: "пишна відповідь"
            correct: false
          - text: "знижена відповідь"
            correct: false
        explanation: "Accurate у цьому контексті означає точна."
      - question: "Що перевіряємо після словникового добору синоніма?"
        options:
          - text: "контекст і регістр"
            correct: true
          - text: "лише довжину слова"
            correct: false
          - text: "лише алфавітний порядок"
            correct: false
          - text: "кількість літер"
            correct: false
        explanation: "Синонім треба перевірити в реченні та жанрі."
      - question: "Яка пара належить до поняттєвої синонімії?"
        options:
          - text: "великий - величезний"
            correct: true
          - text: "обличчя - пика"
            correct: false
          - text: "туман - біла стіна в одному описі"
            correct: false
          - text: "Київ - українська столиця"
            correct: false
        explanation: "Ця пара змінює інтенсивність ознаки."
      - question: "Коли повтор терміна можна залишити?"
        options:
          - text: "коли він підтримує точність"
            correct: true
          - text: "коли він випадково повторився"
            correct: false
          - text: "коли бракує словника"
            correct: false
          - text: "коли треба приховати зміст"
            correct: false
        explanation: "Термінологічний повтор інколи потрібен для ясності."
      - question: "Який варіант найкраще виправляє тавтологію в діловому реченні?"
        options:
          - text: "координатори провели робочу зустріч"
            correct: true
          - text: "організатори організували організаційну зустріч"
            correct: false
          - text: "організація організаційно організувала"
            correct: false
          - text: "зустріч зустріла зустріч"
            correct: false
        explanation: "Редакція прибирає повтор кореня і зберігає зміст."
      - question: "Що найкраще показує контекстуальну заміну в пейзажному описі?"
        options:
          - text: "туман - молочна завіса"
            correct: true
          - text: "аргумент - підстава в будь-якому документі"
            correct: false
          - text: "кома - крапка"
            correct: false
          - text: "числівник - відмінок"
            correct: false
        explanation: "Образ туману зближує слова лише в конкретному уривку."

  - type: true-false
    title: "Так чи ні: межі синонімії"
    instruction: "Позначте, чи твердження правильне."
    items:
      - statement: "Домінанта зазвичай є нейтральним центром ряду."
        correct: true
        explanation: "Саме домінанта допомагає впорядкувати ряд."
      - statement: "Будь-який словниковий синонім можна вставити в будь-яке речення."
        correct: false
        explanation: "Потрібно перевіряти сполучуваність, регістр і контекст."
      - statement: "Контекстуальний синонім може працювати лише в одному уривку."
        correct: true
        explanation: "Його зближення залежить від конкретного образу."
      - statement: "Пика є нейтральним офіційним словом для фото учасників."
        correct: false
