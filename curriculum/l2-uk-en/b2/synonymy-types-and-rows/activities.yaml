version: '1.0'
module: synonymy-types-and-rows
level: b2
inline:
  - id: act-1
    type: comparative-study
    title: Речення вирішує
    instruction: Порівняйте три варіанти й визначте, що змінюється в кожному реченні.
    items_to_compare:
      - "На горизонті з'явилася темна смуга хмар."
      - "На обрії з'явилася темна смуга хмар."
      - "На небосхилі з'явилася темна смуга хмар."
    criteria:
      - ядро значення
      - жанр
      - стилістичний відтінок
      - типова сполучуваність
    prompt: "Який варіант найкраще підходить для технічного опису фото, а який для художнього пейзажу? Поясніть через жанр і відтінок."
    model_answer: "Горизонт найкраще працює в технічному або нейтральному описі, бо це звичний термін. Обрій звучить м'якше й образніше, тому пасує до художнього пейзажу. Небосхил книжніший і урочистіший. У всіх трьох випадках ядро значення близьке, але жанр і тон різні."
  - id: act-2
    type: critical-analysis
    title: Домінанта і периферія
    instruction: Проаналізуйте два набори й визначте, який з них є синонімічним рядом.
    target_text: "Набір А: казати - говорити - мовити - зазначати - стверджувати - бурмотіти - вигукувати. Набір Б: казати - слухати - відповідь - розмова - голосний - телефон."
    questions:
      - "Який набір можна перетворити на синонімічний ряд і чому?"
      - "Яке слово може бути домінантою у наборі А?"
      - "Які два слова з набору А мають найсильніший додатковий відтінок?"
    model_answers:
      - "Набір А можна аналізувати як ряд, бо більшість слів є дієсловами мовлення. Набір Б є тематичним полем комунікації, але змішує різні частини мови й різні дії."
      - "Домінантою може бути казати або говорити, бо це найширші й найменш забарвлені дієслова."
      - "Бурмотіти додає нечіткість і оцінку, а вигукувати додає гучність або сильну емоцію."
  - id: act-3
    type: comparative-study
    title: Тип синонімії
    instruction: Порівняйте приклади й назвіть тип синонімічної близькості.
    items_to_compare:
      - "мовознавство - лінгвістика"
      - "великий - значний - величезний"
      - "обличчя - лице - фізіономія - пика - лик"
      - "туман - молочна завіса - біла стіна"
    criteria:
      - повнота збігу значення
      - інтенсивність або поняттєва шкала
      - регістр і соціальна оцінка
      - залежність від конкретного образу
    prompt: "Для кожного прикладу визначте тип: майже абсолютні, поняттєві, стилістичні або контекстуальні синоніми."
    model_answer: "Мовознавство - лінгвістика є майже абсолютною парою, але жанр і термінологічна традиція можуть відрізнятися. Великий - значний - величезний показує поняттєву шкалу сили. Обличчя - лице - фізіономія - пика - лик є стилістичним рядом. Туман - молочна завіса - біла стіна працює як контекстуальна синонімія в одному пейзажному образі."
  - id: act-4
    type: critical-analysis
    title: Логічна роль слова
    instruction: Визначте, яке слово потрібне в кожному контексті й чому.
    target_text: "Причину аварії ще не встановлено. Для перенесення іспиту є достатня підстава. Мотив учинку залишився незрозумілим. Accurate answer українською найчастіше точна відповідь."
    questions:
      - "Чому в першому реченні природна причина, а не мотив?"
      - "Чому підстава пасує до рішення про іспит?"
      - "Як accurate answer показує небезпеку хибного друга перекладача?"
    model_answers:
      - "Аварія має причину, бо йдеться про те, що спричинило подію. Мотив стосується внутрішнього спонукання людини."
      - "Підстава називає опору для рішення, вимоги або офіційної дії, тому вона природна в адміністративному контексті."
      - "Accurate у цьому словосполученні означає точний, а не акуратний. Механічна калька змінює значення."
  - id: act-5
    type: critical-analysis
    title: Редакторський слух
    instruction: Визначте, що треба виправити в кожному реченні.
    target_text: "Команда організувала організаційну зустріч для організаторів проєкту. На офіційному фото видно пики учасників конференції. Компанія назвала скорочення працівників оптимізацією без додаткового пояснення."
    questions:
      - "Який повтор у першому реченні є тавтологічним і як його прибрати?"
      - "Чому слово пики недоречне в офіційному описі?"
      - "Коли евфемізм оптимізація стає проблемним?"
    model_answers:
      - "Повтор кореня організ- можна замінити: команда провела робочу зустріч для координаторів проєкту."
      - "Пики має знижене й грубе забарвлення щодо людей; у нейтральному описі потрібно обличчя учасників."
      - "Евфемізм проблемний, коли приховує факт або відповідальність. Якщо йдеться про скорочення працівників, це треба назвати прямо й коректно."
workbook:
  - type: quiz
    title: Аналіз мікротексту
    instruction: Прочитайте мікротексти в питаннях і виберіть найточніші пояснення.
    items:
      - question: "У мікротексті «Над містом лежав туман. Молочна завіса стирала дахи» другий образ є:"
        options:
          - text: "контекстуальним синонімом до туману"
            correct: true
          - text: "абсолютним терміном метеорології"
            correct: false
          - text: "антонімом до туману"
            correct: false
          - text: "назвою іншого граматичного часу"
            correct: false
        explanation: "Молочна завіса зближується з туманом тільки в цьому образі."
      - question: "У реченні «Делегація прямувала до зали» слово прямувала додає:"
        options:
          - text: "напрям і мету"
            correct: true
          - text: "грубу оцінку"
            correct: false
          - text: "приховану тавтологію"
            correct: false
          - text: "евфемізм"
            correct: false
        explanation: "Прямувати підкреслює рух до певної мети."
      - question: "У реченні «Студенти пленталися позаду» дієслово пленталися показує:"
        options:
          - text: "повільний втомлений рух"
            correct: true
          - text: "офіційне повідомлення"
            correct: false
          - text: "нейтральний термін"
            correct: false
          - text: "абсолютну синонімію"
            correct: false
        explanation: "Плентатися додає повільність, втому або небажання рухатися."
      - question: "Яка пара найкраще показує стилістичну різницю?"
        options:
          - text: "обличчя - пика"
            correct: true
          - text: "причина - подія"
            correct: false
          - text: "туман - дощ"
            correct: false
          - text: "аудиторія - заняття"
            correct: false
        explanation: "Пика має знижене й грубе забарвлення, на відміну від нейтрального обличчя."
      - question: "Який варіант найкраще передає accurate description?"
        options:
          - text: "точний опис"
            correct: true
          - text: "акуратний настрій"
            correct: false
          - text: "елегантний контроль"
            correct: false
          - text: "бездонна відповідь"
            correct: false
        explanation: "Accurate в цьому контексті означає точний."
      - question: "Яке слово природне в реченні «____ аварії ще не встановлено»?"
        options:
          - text: "Причину"
            correct: true
          - text: "Мотив"
            correct: false
          - text: "Аргумент"
            correct: false
          - text: "Обрій"
            correct: false
        explanation: "Подія має причину; мотив має людина або персонаж."
      - question: "Яке слово природне в реченні «для рішення є достатня ____»?"
        options:
          - text: "підстава"
            correct: true
          - text: "хмара"
            correct: false
          - text: "пика"
            correct: false
          - text: "шепіт"
            correct: false
        explanation: "Підстава є опорою для рішення або вимоги."
      - question: "Який варіант є нейтральнішим за знижене слово пика?"
        options:
          - text: "обличчя"
            correct: true
          - text: "морда"
            correct: false
          - text: "лайка"
            correct: false
          - text: "вигук"
            correct: false
        explanation: "Обличчя є нейтральним словом щодо людини."
      - question: "Що треба зробити з терміном, який потрібен для точності?"
        options:
          - text: "залишити послідовним"
            correct: true
          - text: "замінювати щоразу"
            correct: false
          - text: "перетворити на евфемізм"
            correct: false
          - text: "знизити регістр"
            correct: false
        explanation: "Термінологічний повтор може бути потрібним."
      - question: "Коли евфемізм стає проблемним?"
        options:
          - text: "коли приховує факт або відповідальність"
            correct: true
          - text: "коли зберігає повагу до людини"
            correct: false
          - text: "коли пояснює термін"
            correct: false
          - text: "коли прибирає грубість без втрати факту"
            correct: false
        explanation: "Пом'якшення не має маскувати реальну дію або наслідок."
  - type: group-sort
    title: Ряди і тематичні поля
    instruction: Розподіліть слова за тим, як їх варто аналізувати.
    groups:
      - name: Синонімічний ряд мовлення
        items:
          - казати
          - зазначати
          - стверджувати
          - шепотіти
      - name: Синонімічний ряд руху
        items:
          - іти
          - прямувати
          - крокувати
          - плентатися
      - name: Тематичне поле комунікації
        items:
          - телефон
          - розмова
          - слухати
          - відповідь
      - name: Абстрактні іменники з різними ролями
        items:
          - причина
          - підстава
          - мотив
          - аргумент
  - type: match-up
    title: Словниковий паспорт
    instruction: Поєднайте слово з його найкориснішою паспортною приміткою.
    pairs:
      - left: плентатися
        right: іти повільно, втомлено, часто з розмовним або художнім відтінком
      - left: зазначати
        right: офіційно або аналітично повідомляти факт
      - left: підстава
        right: опора для рішення, вимоги або відмови
      - left: мотив
        right: внутрішнє спонукання людини або персонажа
      - left: обличчя
        right: нейтральна назва фронтальної частини голови людини
      - left: евфемізм
        right: пом'якшена назва, яка має бути коректною, а не приховувальною
      - left: домінанта
        right: нейтральний центр, від якого вимірюємо відтінки ряду
      - left: контекстуальний синонім
        right: зближення слів, яке працює в одному уривку або образі
      - left: канцеляризм
        right: офіційно-ділова формула, яка може бути потрібною або зайвою
      - left: хибний друг перекладача
        right: видимий відповідник, який змінює значення в українському контексті
  - type: fill-in
    title: Переклад без кальки
    instruction: Оберіть природний український відповідник для англомовної ситуації.
    items:
      - sentence: "accurate answer -> ____ відповідь"
        answer: точна
        options:
          - точна
          - акуратна
          - пишна
          - канцелярська
        explanation: "Для accuracy в змісті відповіді потрібне слово точна."
      - sentence: "elegant solution in technical explanation -> ____ рішення"
        answer: вдале
        options:
          - вдале
          - ошатне
          - знижене
          - безхатнє
        explanation: "У технічному контексті elegant часто означає вдале, витончене або лаконічне."
      - sentence: "reason for the accident -> ____ аварії"
        answer: причина
        options:
          - причина
          - мотив
          - аргумент
          - піднесення
        explanation: "Подія має причину; мотив має людина."
      - sentence: "grounds for appeal -> ____ для скарги"
        answer: підстава
        options:
          - підстава
          - туман
          - обличчя
          - ритм
        explanation: "Підстава підтримує офіційну дію або вимогу."
      - sentence: "motive of the character -> ____ героя"
        answer: мотив
        options:
          - мотив
          - причина
          - дефект
          - обрій
        explanation: "Мотив пояснює внутрішнє спонукання персонажа."
      - sentence: "neat handwriting -> ____ почерк"
        answer: акуратний
        options:
          - акуратний
          - точний
          - знижений
          - бездомний
        explanation: "Акуратний природне зі словом почерк."
      - sentence: "precise data -> ____ дані"
        answer: точні
        options:
          - точні
          - акуратні
          - святкові
          - сиві
        explanation: "Для даних потрібне значення точності."
      - sentence: "official report: комісія ____ умови змінено"
        answer: зазначила
        options:
          - зазначила
          - пленталася
          - пика
          - шкандибала
        explanation: "Зазначити пасує до офіційного або аналітичного повідомлення."
      - sentence: "satirical description: учасники ____ до сцени"
        answer: пленталися
        options:
          - пленталися
          - зазначили
          - обґрунтували
          - стверджували
        explanation: "Плентатися додає оцінку повільного втомленого руху."
      - sentence: "neutral photo caption: видно ____ учасників"
        answer: обличчя
        options:
          - обличчя
          - пики
          - мотиви
          - підстави
        explanation: "Обличчя нейтральне; пики знижене й грубе."
  - type: error-correction
    title: Редагування абзацу
    instruction: Виправте недоречну синонімічну заміну або кальку.
    items:
      - sentence: "У звіті директор бурмотів, що графік змінено."
        error: "директор бурмотів"
        correction: "зазначено"
        error_type: register
        explanation: "Звіт потребує офіційного дієслова повідомлення, а не оцінки голосу."
      - sentence: "Головний дефект у характері героя - байдужість."
        error: "дефект у характері"
        correction: "вада в характері"
        error_type: word
        explanation: "Дефект природніший для предмета або механізму; щодо характеру доречніше вада."
      - sentence: "У мене сьогодні елегантний настрій."
        error: "елегантний настрій"
        correction: "піднесений настрій"
        error_type: word
        explanation: "Елегантний не є природним синонімом до настрою."
      - sentence: "Пташина прилетіла. Пташина зліпила гніздо під стріхою."
        error: "Пташина. Пташина"
        correction: "Ластівка прилетіла. Пташина зліпила гніздо під стріхою."
        error_type: phrase
        explanation: "Контекстуальна заміна може прибрати повтор і зберегти образ."
      - sentence: "Я роблю контроль над проєктом щоп'ятниці."
        error: "роблю контроль над"
        correction: "контролюю"
        error_type: construction
        explanation: "У звичайному реченні природніше просте дієслово контролюю."
      - sentence: "На офіційному фото видно пики учасників конференції."
        error: "пики учасників"
        correction: "обличчя учасників"
        error_type: register
        explanation: "Знижене слово не пасує до нейтрального підпису."
      - sentence: "Мотив аварії досі не встановлено."
        error: "Мотив аварії"
        correction: "Причину аварії"
        error_type: word
        explanation: "Аварія має причину, а мотив має людина."
      - sentence: "Організатори організували організаційну зустріч."
        error: "організували організаційну"
        correction: "провели робочу"
        error_type: phrase
        explanation: "Повтор кореня організ- створює тавтологію."
  - id: wb-essay-synonym-row
    type: essay-response
    title: Письмо про синонімічний ряд
    instruction: Напишіть короткий зв'язний текст українською.
    prompt: "Напишіть 150-180 слів про один синонімічний ряд з уроку. Назвіть домінанту, поясніть щонайменше три варіанти, покажіть різницю між поняттєвим і стилістичним відтінком та наведіть одне речення, де механічна заміна була б недоречною."
    min_words: 150
    model_answer: >-
      > [!model-answer]
      > Домінанта мого ряду - **казати**. Найближчі нейтральні варіанти -
      **говорити** і **сказати**, але вони не завжди однакові:
      **говорити українською** означає володіти мовою, а **сказати
      правду** називає завершену дію. Офіційний варіант **зазначати**
      доречний у протоколі або звіті: **комісія зазначила, що графік
      змінено**. Дієслово **стверджувати** додає логічну позицію і
      впевненість мовця. Слова **шепотіти**, **бурмотіти** і
      **вигукувати** вже описують спосіб звучання або емоцію. Якщо в
      офіційному повідомленні написати **директор бурмотів про
      рішення**, текст отримає небажану оцінку. Отже, синонімічний ряд
      потрібний не для випадкової заміни повторів, а для точного вибору
      слова за жанром, регістром і змістом.
    rubric:
      - criteria: Домінанта і ряд
        description: Названо домінанту й щонайменше три синонімічні варіанти.
        points: 2
      - criteria: Відтінки
        description: Пояснено поняттєву або стилістичну різницю між варіантами.
        points: 2
      - criteria: Контекст
        description: Наведено речення, де механічна заміна змінює тон або зміст.
        points: 2
      - criteria: Мова
        description: Текст зв'язний, українська сполучуваність природна.
        points: 2
    peer_review_guidelines: "Перевірте, чи автор не замінює слова механічно і чи пояснює вибір через жанр, регістр або сполучуваність."
