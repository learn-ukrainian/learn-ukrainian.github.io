version: '1.0'
module: passive-in-context
level: b2
inline: []
workbook:
  - type: fill-in
    title: "Доберіть форму до регістру й фокусу"
    instruction: "Заповніть пропуск нормативною формою з поданих варіантів."
    items:
      - sentence: "У короткому протоколі доречно написати: пропозиції ____ після обговорення."
        answer: "враховано"
        options:
          - "враховано"
          - "врахували комісією"
          - "враховуються секретарем"
          - "були враховані комісією"
        explanation: "Для підсумку без названого діяча найкраще працює форма на -но, -то."
      - sentence: "Якщо важливо назвати відповідальний орган, пишемо: міська рада ____ нове положення."
        answer: "ухвалила"
        options:
          - "ухвалила"
          - "ухвалено"
          - "ухвалюється"
          - "була ухвалена"
        explanation: "Названий діяч природно стає підметом активного речення."
      - sentence: "У науковому описі процедури природно: у вибірці ____ дві повторювані моделі."
        answer: "зафіксовано"
        options:
          - "зафіксовано"
          - "зафіксували дослідниками"
          - "зафіксовується лабораторією"
          - "були зафіксовані експертами"
        explanation: "Науковий результат можна лаконічно подати формою на -но, -то."
      - sentence: "Для регулярної процедури без названого діяча можливе речення: заява ____ упродовж п'яти робочих днів."
        answer: "розглядається"
        options:
          - "розглядається"
          - "розглянуто"
          - "розглянулася"
          - "розглянута відділом"
        explanation: "Тут важливий процес, а не завершений підсумок."
      - sentence: "У живішій новинній манері краще: новий пункт підтримки ____ у центрі громади."
        answer: "відкрили"
        options:
          - "відкрили"
          - "було відкрито кимось"
          - "відкривається радою"
          - "відкритий"
        explanation: "Неозначено-особове речення звучить природно для новини про подію."
      - sentence: "Коли описуємо документ після процедури, пишемо: до листа додаємо ____ договір."
        answer: "погоджений"
        options:
          - "погоджений"
          - "погоджено"
          - "погоджуємий"
          - "був погоджений"
        explanation: "Тут потрібне означення до іменника договір."
      - sentence: "У звіті про завершений етап природно: крайній строк подання заяв уже ____."
        answer: "перенесено"
        options:
          - "перенесено"
          - "перенісся"
          - "перенеслись"
          - "є перенесений"
        explanation: "Йдеться про результат адміністративного рішення."
      - sentence: "Щоб уникнути кальки з названим діячем, перебудовуємо так: юридичний відділ ____ шаблон заяви."
        answer: "погоджує"
        options:
          - "погоджує"
          - "погоджується"
          - "погоджено"
          - "був погоджений"
        explanation: "Названий діяч краще стоїть у позиції підмета."
      - sentence: "У короткій новині про щойно завершену роботу природно: укриття вже ____ до прийому людей."
        answer: "обладнано"
        options:
          - "обладнано"
          - "обладнується волонтерами"
          - "було обладнане волонтерами"
          - "обладнене кимось"
        explanation: "Тут важливий підсумок роботи, а не перелік виконавців."
      - sentence: "Щоб не розмити відповідальність у кризовому повідомленні, пишемо: пресслужба ____ причину затримки."
        answer: "пояснила"
        options:
          - "пояснила"
          - "пояснюється"
          - "пояснено"
          - "була пояснена"
        explanation: "Коли інституція дає пояснення, активна форма прозоріша."

  - type: select
    title: "Позначте нормативні варіанти"
    instruction: "У кожному пункті виберіть усі варіанти, які відповідають українській нормі та заданому фокусу."
    items:
      - question: "Які варіанти природні, якщо треба лише зафіксувати результат без названого діяча?"
        min_correct: 2
        options:
          - text: "Звернення опрацьовано."
            correct: true
          - text: "Ризики враховано."
            correct: true
          - text: "Звернення опрацьовано менеджером."
            correct: false
          - text: "Ризики були враховані відділом."
            correct: false
          - text: "Звернення розглядається комісією."
            correct: false
        explanation: "Форма на -но, -то працює без особового діяча."
      - question: "Які варіанти правильно називають відповідального виконавця?"
        min_correct: 2
        options:
          - text: "Редакція уточнила формулювання."
            correct: true
          - text: "Юридичний відділ погодив зміни."
            correct: true
          - text: "Формулювання було уточнене редакцією."
            correct: false
          - text: "Зміни погоджено юридичним відділом."
            correct: false
          - text: "Зміни погоджуються відділом."
            correct: false
        explanation: "Коли діяч важливий, українська мова тяжіє до активу."
      - question: "Які речення доречні для опису регулярної процедури або процесу?"
        min_correct: 2
        options:
          - text: "Заява розглядається упродовж п'яти днів."
            correct: true
          - text: "У відділі щодня перевіряють нові заявки."
            correct: true
          - text: "Заява розглядається працівниками відділу."
            correct: false
          - text: "Заявку було розглянуто працівниками відділу."
            correct: false
          - text: "Працівниками відділу розглядається заявка."
            correct: false
        explanation: "Для процесу доречні форма на -ся без названого діяча або третя особа множини."
      - question: "Які варіанти природні для медійного повідомлення про подію?"
        min_correct: 2
        options:
          - text: "У громаді відкрили консультаційний центр."
            correct: true
          - text: "Консультаційний центр відкрито в громаді."
            correct: true
          - text: "Консультаційний центр був відкритий службою."
            correct: false
          - text: "Центр відкривається службою щойно."
            correct: false
          - text: "Центр відкрито службою."
            correct: false
        explanation: "У новині можна вибирати між живою подією та результатом, але не варто вводити калькований орудний діяча."
      - question: "Які варіанти правильно розрізняють природний стан і наслідок дії?"
        min_correct: 2
        options:
          - text: "Берег укритий травою."
            correct: true
          - text: "Територію очищено після буревію."
            correct: true
          - text: "Берег укрито травою без мислимої дії."
            correct: false
          - text: "Територія була очищена комунальниками."
            correct: false
          - text: "Територія очищується комунальниками вчора."
            correct: false
        explanation: "Природний стан і завершена дія потребують різних моделей."
      - question: "Які фрази підходять для ввічливого, але прозорого службового листа?"
        min_correct: 2
        options:
          - text: "Надсилаємо оновлену редакцію документа."
            correct: true
          - text: "Просимо уточнити, хто відповідає за наступний етап."
            correct: true
          - text: "Оновлена редакція надсилається нами."
            correct: false
          - text: "Питання має бути вирішене кимось найближчим часом."
            correct: false
          - text: "Уточнення являються необхідними."
            correct: false
        explanation: "Лист виграє від прямого дієслова, ясного прохання і видимої відповідальності."
      - question: "Які варіанти природні для наукового коментаря про процедуру?"
        min_correct: 2
        options:
          - text: "Під час аналізу зіставлено три набори даних."
            correct: true
          - text: "Дослідницька група зіставила три набори даних."
            correct: true
          - text: "Три набори даних були зіставлені групою."
            correct: false
          - text: "Три набори даних зіставляються групою вчора."
            correct: false
          - text: "Набори являються зіставленими."
            correct: false
        explanation: "І безособова результативність, і актив можуть бути нормативними, якщо фокус ясний."
      - question: "Які варіанти правильно редагують кризове повідомлення для громади?"
        min_correct: 2
        options:
          - text: "Інспекція перевірила укриття й оприлюднила висновок."
            correct: true
          - text: "Укриття перевірено, а висновок оприлюднено."
            correct: true
          - text: "Укриття було перевірене інспекцією, а висновок являвся оприлюдненим."
            correct: false
          - text: "Укриття перевіряється інспекцією вчора."
            correct: false
          - text: "Інспекцією було перевірено укриття й висновок."
            correct: false
        explanation: "Тут важливо або чітко назвати інституцію, або стисло подати результат без калькованого орудного діяча."

  - type: error-correction
    title: "Виправте кальковані або стилістично слабкі пасиви"
    instruction: "Знайдіть помилку або стилістичну ваду й виберіть найкращий нормативний варіант."
    items:
      - sentence: "Звіт було підготовлено аналітиками у вівторок."
        error: "було підготовлено аналітиками"
        correction: "аналітики підготували звіт"
        error_type: "construction"
        options:
          - "аналітики підготували звіт"
          - "звіт було підготовлено аналітиками"
          - "звіт підготувався аналітиками"
          - "аналітиками був підготовлений звіт"
        explanation: "Названий діяч краще стає підметом активного речення."
      - sentence: "Питання розглядається комісією вже третій тиждень."
        error: "розглядається комісією"
        correction: "комісія розглядає питання"
        error_type: "construction"
        options:
          - "комісія розглядає питання"
          - "питання розглядається комісією"
          - "питання розглянулося комісією"
          - "комісією розглядається питання"
        explanation: "Форма на -ся з названим діячем звучить штучно."
      - sentence: "Зауваження були враховані робочою групою перед публікацією."
        error: "були враховані робочою групою"
        correction: "робоча група врахувала зауваження"
        error_type: "construction"
        options:
          - "робоча група врахувала зауваження"
          - "зауваження були враховані робочою групою"
          - "зауваження врахувалося робочою групою"
          - "робочою групою враховано зауваження"
        explanation: "Для відповідальності й динаміки природніший актив."
      - sentence: "Частину заяв було повернуто заявникам через неповний пакет документів."
        error: "було повернуто"
        correction: "частину заяв повернули заявникам"
        error_type: "register"
        options:
          - "частину заяв повернули заявникам"
          - "частину заяв було повернуто заявникам"
          - "частина заяв повернулася заявникам"
          - "частину заяв являлося повернуто"
        explanation: "У новинно-службовому контексті неозначено-особове речення звучить живіше."
      - sentence: "Нові правила участі являються погодженими й оприлюдненими."
        error: "являються погодженими й оприлюдненими"
        correction: "нові правила участі погоджено й оприлюднено"
        error_type: "register"
        options:
          - "нові правила участі погоджено й оприлюднено"
          - "нові правила участі являються погодженими й оприлюдненими"
          - "нові правила участі були являючимися"
          - "правила участі погоджуються оприлюдненими"
        explanation: "Тут потрібен короткий результат без зайвих зв'язок."
      - sentence: "У пояснювальній записці було написано, що помилок було допущено багато."
        error: "було написано, що помилок було допущено"
        correction: "у пояснювальній записці зазначено, що допущено багато помилок"
        error_type: "register"
        options:
          - "у пояснювальній записці зазначено, що допущено багато помилок"
          - "у пояснювальній записці було написано, що помилок було допущено багато"
          - "записка написалася про помилки"
          - "було зазначається багато помилок"
        explanation: "Редагуємо і лексику, і надмірний описовий пасив."
      - sentence: "Графік консультацій був погоджений наглядовою радою вчора ввечері."
        error: "був погоджений наглядовою радою"
        correction: "наглядова рада погодила графік консультацій"
        error_type: "construction"
        options:
          - "наглядова рада погодила графік консультацій"
          - "графік консультацій був погоджений наглядовою радою"
          - "графік консультацій погодився радою"
          - "радою був погоджуючий графік"
        explanation: "Орудний діяча після пасивного присудка краще перебудувати на актив."
      - sentence: "У повідомленні зазначалося, що копії документів додаються заявником."
        error: "додаються заявником"
        correction: "заявник додає копії документів"
        error_type: "construction"
        options:
          - "заявник додає копії документів"
          - "копії документів додаються заявником"
          - "копії документів додалися заявником"
          - "заявником були додаючіся копії"
        explanation: "Якщо діяч названий, природніше подати його підметом."

  - type: reading
    id: reading-passive-registers
    title: "Один текст - кілька регістрів"
    instruction: "Прочитайте уривок і зверніть увагу на те, як змінюється фокус між результатом, процедурою та відповідальністю."
    source: "Авторський навчальний текст для модуля"
    text: >-
      Після відкритого обговорення в громаді оновлений проєкт положення вже
      погоджено. У супровідній записці зазначено, що зауваження мешканців
      враховано частково: пропозиції щодо доступності включено до остаточної
      редакції, а пункти, які суперечили чинному законодавству, відхилили ще
      на етапі юридичної перевірки. Тим часом у профільному департаменті
      щодня опрацьовують нові звернення, бо після публікації документа
      з'явилося багато уточнювальних запитів. У пресслужбі окремо пояснили,
      що графік громадських консультацій переглядається, а підсумковий звіт
      оприлюднять після того, як його погодить наглядова рада.
    tasks:
      - "Випишіть усі форми на -но, -то й поясніть, який результат вони називають."
      - "Знайдіть неозначено-особове речення і поясніть, чому воно тут природне."
      - "Покажіть, де текст свідомо називає відповідальний орган."
      - "Поясніть, чим відрізняються графік переглядається і звіт оприлюднять."
      - "Запропонуйте одне редагування, яке зробить уривок ще прозорішим."

  - type: group-sort
    title: "Співвіднесіть форму з регістром"
    instruction: "Розподіліть елементи за тим, у якому регістрі або функції вони найприродніші."
    groups:
      - name: "Результат у короткому службовому повідомленні"
        items:
          - "звернення опрацьовано"
          - "зауваження враховано"
          - "вжито заходів"
          - "крайній строк перенесено"
      - name: "Процедура або регулярний процес"
        items:
          - "заява розглядається"
          - "дані оновлюються"
          - "у відділі перевіряють копії"
          - "у лабораторії щодня тестують зразки"
      - name: "Названа відповідальність"
        items:
          - "комісія ухвалила рішення"
          - "пресслужба пояснила затримку"
          - "редакція уточнила цитату"
          - "юридичний відділ погоджує шаблон"
      - name: "Означення предмета після дії"
        items:
          - "погоджений документ"
          - "уточнена редакція"
          - "підписана заява"
          - "зафіксований інцидент"

  - type: quiz
    title: "Оберіть найточніше редакторське рішення"
    instruction: "У кожному пункті виберіть один найкращий варіант."
    items:
      - question: "Яке речення найкраще пояснює, хто відповідає за затримку?"
        options:
          - text: "Відділ закупівель затримав оплату."
            correct: true
          - text: "Оплату було затримано відділом закупівель."
            correct: false
          - text: "Оплата затрималася відділом."
            correct: false
          - text: "Затримка оплати являється наявною."
            correct: false
        explanation: "Названий виконавець має стояти в підметі."
      - question: "Який варіант найдоречніший для короткої підсумкової довідки?"
        options:
          - text: "Звернення опрацьовано."
            correct: true
          - text: "Звернення опрацював відділ."
            correct: false
          - text: "Звернення опрацьовується вчора."
            correct: false
          - text: "Звернення було являється опрацьованим."
