  - type: true-false
    title: "Перевірте твердження про пасив у контексті"
    instruction: "Позначте, чи відповідає твердження змісту модуля."
    items:
      - statement: "Форма на -но, -то зазвичай не потребує поруч названого особового діяча."
        correct: true
        explanation: "Якщо діяча треба назвати, українська мова часто обирає актив."
      - statement: "Речення 'Комісія ухвалила рішення' менш природне, ніж 'Рішення було ухвалене комісією'."
        correct: false
        explanation: "У більшості випадків перше речення прозоріше й природніше."
      - statement: "Неозначено-особове речення може бути природним замінником важкого пасиву в новині."
        correct: true
        explanation: "Форма на зразок 'у місті відкрили центр' звучить живо й нормативно."
      - statement: "Форма на -ся автоматично означає помилку."
        correct: false
        explanation: "Вона доречна для процесу, регламенту або регулярної процедури."
      - statement: "Пасивний дієприкметник найкраще працює як означення до іменника."
        correct: true
        explanation: "Саме тому природні сполуки на кшталт підписана заява або уточнена редакція."
      - statement: "У кризовому повідомленні безособові формули завжди кращі за актив, бо звучать офіційніше."
        correct: false
        explanation: "Коли потрібна відповідальність, актив часто чесніший і сильніший."
      - statement: "Речення 'У відділі перевірили копії документів' може бути природнішим за пасивну кальку з названим діячем."
        correct: true
        explanation: "Неозначено-особова форма часто робить службове повідомлення рухливішим."
      - statement: "Описовий пасив із було завжди обов'язковий, якщо дія сталася в минулому."
        correct: false
        explanation: "Часто достатньо форми на -но, -то або звичайного активного минулого часу."
      - statement: "Фраза 'двері зачиняються автоматично' природна, коли йдеться про роботу механізму."
        correct: true
        explanation: "Тут форма на -ся описує процес, а не приховує діяча."
      - statement: "У вислові 'погоджений документ' дієприкметник називає ознаку предмета після дії."
        correct: true
        explanation: "Саме це і є типовою функцією пасивного дієприкметника в тексті."

  - type: mark-the-words
    title: "Позначте форми, що називають результат"
    instruction: "Позначте всі слова або словосполучення, які в цьому уривку подають завершений результат, а не процес."
    text: "Після перевірки зауваження враховано, нову редакцію погоджено, а підсумковий файл уже оприлюднено. Тим часом у відділі ще уточнюють список адресатів, і графік консультацій переглядається. Частину звернень повернули заявникам, бо копії документів не було додано, а повторні запити зареєстровано окремо."
    answers:
      - "враховано"
      - "погоджено"
      - "оприлюднено"
      - "повернули"
      - "не було додано"
      - "зареєстровано"

  - type: critical-analysis
    id: passive-and-accountability
    title: "Пасив як інструмент точності або прикриття"
    source_reading: "reading-passive-registers"
    target_text: >-
      У дослідженні проаналізовано 240 повідомлень громадських установ. У
      вибірці зафіксовано регулярне використання безособових форм для опису
      процедур, але там, де йшлося про відповідальність, дослідники радили
      називати діяча прямо. Після інциденту в місті було заявлено, що
      порушення усунуто й заходів ужито. Водночас журналісти зауважили, що в
      повідомленні не названо, хто саме затримав реакцію, хто відповідав за
      перевірку і хто ухвалив рішення не попереджати мешканців завчасно.
    questions:
      - "Який фрагмент використовує безособові форми для опису процедури, а який може розмивати відповідальність?"
      - "Де саме в другій частині тексту читачеві бракує названого діяча?"
      - "Які два речення ви відредагували б активом, щоб зробити повідомлення прозорішим?"
    model_answers:
      - "Перший фрагмент про дослідження використовує форми проаналізовано й зафіксовано для опису процедури та результату, тому безособовість там виправдана."
      - "У другій частині проблемними є було заявлено, усунуто й ужито заходів, бо вони не називають інституцію або посадових осіб, які діяли чи не діяли."
      - "Можна переписати так: міська служба затримала реакцію; кризовий штаб не попередив мешканців завчасно; інспекція ще не завершила перевірку."
    focus_points:
      - "Який текст використовує пасив для опису процедури, а який - для розмиття відповідальності?"
      - "Де безособова форма звучить виправдано, а де читачеві бракує названого діяча?"
      - "Як змінився б тон новинного повідомлення, якби там з'явилися активні речення з названими інституціями?"
      - "Чому науковий текст може дозволити собі більше результативних форм, ніж кризова новина?"

  - type: essay-response
    id: rewrite-formal-text
    title: "Перепишіть формальний текст без зайвого пасиву"
    instruction: "Напишіть редакторську версію тексту українською."
    prompt: >-
      Відредагуйте фрагмент службового повідомлення: "У зв'язку з інцидентом
      було повідомлено, що затримку в доставці документів було спричинено
      технічними труднощами. Заходів було вжито, а відповідні шаблони вже
      погоджуються юридичним відділом. Частину звернень було повернуто
      заявникам, а громадянам пояснюється порядок повторного подання". У
      відповіді виконайте п'ять кроків: 1) перепишіть текст природною
      українською; 2) збережіть офіційно-коректний тон; 3) використайте
      щонайменше дві форми на -но, -то там, де справді важливий результат;
      4) назвіть щонайменше двох відповідальних діячів активними реченнями;
      5) додайте одне речення, яке прозоро пояснює наступний крок для
      заявників.
    min_words: 180
    source_reading: "reading-passive-registers"
    model_answer: >-
      Після інциденту пресслужба повідомила, що доставку документів затримали
      технічні труднощі. Частину наслідків уже усунуто, першочергові заходи
      вжито ще в день збою, а заявників окремо поінформовано про зміни в
      порядку повторного подання. Юридичний відділ погоджує оновлені шаблони,
      щоб повторне подання було простішим і прозорішим. Сервісний центр
      повернув частину звернень заявникам через неповні дані, а фахівці
      консультаційного центру пояснюють порядок повторного подання на сайті,
      телефоном і під час особистих консультацій. Якщо заявник отримав
      повідомлення про повернення, він може подати уточнений пакет документів до
      п'ятниці без повторної реєстрації. У цьому редагуванні я залишив форми на
      -но, -то там, де важливий зафіксований результат: наслідки усунуто,
      заходи вжито, заявників поінформовано. Водночас відповідальних діячів
      названо активом: пресслужба повідомила, юридичний відділ погоджує,
      сервісний центр повернув, фахівці пояснюють. Так текст зберігає офіційний
      тон, але не ховає відповідальність за безособовими формулами. Окремо я
      прибрав важкі конструкції на зразок було повідомлено, було спричинено та
      погоджуються юридичним відділом, бо вони роблять текст довшим і менш
      прозорим. Там, де потрібен процес, я назвав людей або підрозділи, а там,
      де потрібен підсумок, залишив стислу результативну форму. Останнє речення
      дає адресатові практичний наступний крок, тому повідомлення стає
      правильним і корисним.
    rubric:
      - criteria: "Керування фокусом"
        description: "Активні речення називають відповідальних виконавців, а форми на -но, -то залишено лише там, де справді важливий результат."
        points: 4
      - criteria: "Регістр"
        description: "Текст звучить офіційно, але не канцелярсько; немає надмірного туману чи штучних кальок."
        points: 4
      - criteria: "Мовна чистота"
        description: "Немає орудного діяча після форм на -но, -то, штучних форм на -ся з названим діячем і важких описових пасивів без потреби."
        points: 4
      - criteria: "Комунікативна повнота"
        description: "Додано зрозумілий наступний крок для адресатів і збережено причинно-наслідкові зв'язки."
        points: 4
    peer_review_guidelines: "Перевірте, чи автор не замінив усі безособові конструкції активом механічно, чи залишив природні результативні форми і чи назвав відповідальних діячів саме там, де цього вимагає зміст."
