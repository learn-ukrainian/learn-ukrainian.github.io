version: '1.0'
module: passive-in-context
level: b2
inline:
  - id: act-1
    type: comparative-study
    title: "Один факт, п'ять фокусів"
    instruction: "Порівняйте варіанти й визначте, що стоїть у центрі кожного речення."
    items_to_compare:
      - "Юридичний відділ погодив шаблон заяви."
      - "Шаблон заяви погоджено."
      - "Погоджений шаблон заяви додали до інструкції."
      - "Шаблон заяви погодили перед публікацією."
      - "Шаблон заяви погоджується перед публікацією."
    criteria:
      - "відповідальний діяч"
      - "завершений результат"
      - "ознака предмета"
      - "подія без названого виконавця"
      - "процедура або регулярний порядок"
    prompt: "Підпишіть фокус кожного речення."
    model_answer: "Актив називає юридичний відділ; -но/-то фіксує статус; дієприкметник описує предмет; неозначено-особова форма подає подію; -ся описує процедуру."
  - id: act-2
    type: comparative-study
    title: "Орудний: інструмент чи діяч"
    instruction: "Порівняйте речення й визначте, де орудний природний."
    items_to_compare:
      - "Документ підписано електронним ключем."
      - "Документ підписано директором."
      - "Поверхню очищено спеціальним розчином."
      - "Поверхню очищено волонтерами."
      - "Звіт підготовлено аналітиками."
    criteria:
      - "інструмент або спосіб"
      - "особовий діяч"
      - "потрібен актив"
    prompt: "Які речення можна залишити, а які треба перебудувати?"
    model_answer: "Електронний ключ і розчин є засобами, тож речення природні. Директор, волонтери й аналітики є діячами: директор підписав документ; волонтери очистили поверхню; аналітики підготували звіт."
  - id: act-3
    type: comparative-study
    title: "Неозначено-особове чи результат"
    instruction: "Порівняйте моделі для новини, статусу й інструкції."
    items_to_compare:
      - "У громаді відкрили консультаційний центр."
      - "Консультаційний центр відкрито."
      - "Заявку перевірено."
      - "Документи подають через електронний кабінет."
      - "Документи подаються заявником через кабінет."
    criteria:
      - "жива подія"
      - "статус"
      - "регулярний порядок"
      - "калька з названим діячем"
    model_answer: "Для новини природне відкрили; для статусу відкрито або перевірено; для порядку документи подають. Варіант із заявником після форми на -ся краще перебудувати."
  - id: act-4
    type: critical-analysis
    title: "Виправте форму на -ся"
    instruction: "Визначте, де форма на -ся є процедурою, а де калькою."
    target_text: >-
      Заяви розглядаються комісією щочетверга. Код надсилається користувачеві
      автоматично. Скарга опрацьовується менеджером протягом дня.
    questions:
      - "Де названого діяча треба зробити підметом?"
      - "Де форма на -ся описує автоматичну процедуру?"
      - "Які два речення треба переписати активом?"
    model_answers:
      - "Комісія і менеджер мають стати підметами."
      - "Код надсилається автоматично можна залишити."
      - "Комісія розглядає заяви щочетверга; менеджер опрацьовує скаргу протягом дня."
  - id: act-5
    type: critical-analysis
    title: "Відредагуйте абзац про інцидент"
    instruction: "Розділіть результат, відповідальність і процедуру."
    target_text: >-
      Під час перевірки укриття було виявлено порушення. Акт був переданий
      інспекцією до міської ради. Мешканцям пояснюється, що ремонт буде
      проведений підрядником наступного тижня.
    questions:
      - "Де форма на -но, -то доречна?"
      - "Де названого діяча треба зробити підметом?"
      - "Де неозначено-особове речення звучатиме природніше?"
    model_answers:
      - "Порушення виявлено можна залишити як результат."
      - "Інспекція передала акт; підрядник проведе ремонт."
      - "Мешканцям пояснюють порядок ремонту звучить живіше за пояснюється."
workbook:
  - id: wb-1
    type: comparative-study
    title: "Доберіть конструкцію до фокусу"
    instruction: "Зіставте фокус і найкращу модель."
    items_to_compare:
      - "Пропозиції враховано після обговорення."
      - "Рада ухвалила рішення."
      - "Дані оновлюються автоматично щовечора."
      - "У місті запровадили нові правила."
      - "Погоджені правки надіслали авторці."
    criteria:
      - "результат"
      - "відповідальність"
      - "процедура"
      - "подія"
      - "ознака предмета"
    model_answer: "Враховано - результат; рада ухвалила - відповідальність; оновлюються - процедура; запровадили - подія; погоджені правки - ознака предмета."
  - id: wb-2
    type: comparative-study
    title: "Чотири моделі одного рішення"
    items_to_compare:
      - "Комісія відклала розгляд."
      - "Розгляд відкладено."
      - "Відкладений розгляд перенесли на п'ятницю."
      - "Розгляд відкладають до уточнення даних."
    criteria:
      - "актив"
      - "форма на -но, -то"
      - "пасивний дієприкметник"
      - "неозначено-особове"
    model_answer: "Кожна модель відповідає іншому фокусу: діяч, статус, ознака предмета або дія без названого виконавця."
  - id: wb-3
    type: critical-analysis
    title: "Перевірте редакторські твердження"
    target_text: >-
      Форма на -но, -то не узгоджується з іменником. Особового діяча після
      -но, -то краще робити підметом. Неозначено-особова модель може бути
      природною, якщо жанр не вимагає назвати джерело.
    questions:
      - "Яке твердження пояснює незмінність форми?"
      - "Яке твердження стосується відповідальності?"
      - "Яке твердження стосується жанру?"
    model_answers:
      - "Перше."
      - "Друге."
      - "Третє."
  - id: wb-4
    type: critical-analysis
    title: "Редакторський швидкий тест"
    target_text: >-
      Звіт був підготовлений аналітиками в понеділок. Питання безпеки
      розглядається робочою групою.
    questions:
      - "Де діяч названий, але схований у пасиві?"
      - "Який активний варіант кращий для першого речення?"
      - "Який активний варіант кращий для другого речення?"
    model_answers:
      - "В обох реченнях."
      - "Аналітики підготували звіт у понеділок."
      - "Робоча група розглядає питання безпеки."
  - id: wb-5
    type: essay-response
    title: "Мініредактура службового повідомлення"
    instruction: "Напишіть 150-180 слів."
    prompt: >-
      Перепишіть повідомлення так, щоб у ньому були щонайменше три моделі:
      актив для відповідальності, форма на -но/-то для результату і
      неозначено-особове або -ся для процедури.
    min_words: 150
    model_answer: >-
      Комісія перевірила документи й вилучила два неповні пакети. Результати
      перевірки передано до секретаріату, а заявникам уже надіслано коротке
      пояснення нового порядку. На сайті також пояснюють, які довідки треба
      додати перед повторним поданням.
    rubric:
      - criteria: "Фокус"
        description: "Кожна конструкція відповідає комунікативній потребі."
        points: 3
