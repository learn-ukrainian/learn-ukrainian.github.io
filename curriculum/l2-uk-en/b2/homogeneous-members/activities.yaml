version: '1.0'
module: homogeneous-members
level: b2
inline:
  - type: select
    title: "Діагностика однорідності"
    instruction: "Обери речення, де ряд справді складається з однорідних членів."
    items:
      - question: "Де всі елементи відповідають на те саме питання і залежать від одного слова?"
        min_correct: 2
        options:
          - text: "Редактор перевірив заголовок, підпис і джерело."
            correct: true
          - text: "Редактор перевірив заголовок статті."
            correct: false
          - text: "Команда працювала швидко, уважно й без зайвого шуму."
            correct: true
          - text: "Вона пояснила тему спокійно і прикладами."
            correct: false
      - question: "Де ряд складається з однорідних підметів?"
        min_correct: 2
        options:
          - text: "У папці лежали заяви, копії паспортів і квитанції."
            correct: true
          - text: "Заяви лежали в папці на столі."
            correct: false
          - text: "Викладач, студенти й волонтери обговорили план."
            correct: true
          - text: "Викладач студентів попросив залишитися."
            correct: false
      - question: "Де немає однорідності, бо елементи виконують різні ролі?"
        min_correct: 2
        options:
          - text: "Ми говорили про бюджет, терміни й з командою."
            correct: true
          - text: "Ми говорили про бюджет, терміни й ризики."
            correct: false
          - text: "Він відповів коротко, ввічливо й без пауз."
            correct: false
          - text: "Він відповів коротко і на запитання."
            correct: true
      - question: "Де однорідні присудки мають спільного підмета?"
        min_correct: 2
        options:
          - text: "Комісія зібралася, обговорила правки й затвердила текст."
            correct: true
          - text: "Комісія після правок затвердила текст."
            correct: false
          - text: "Автор слухав, нотував і ставив уточнення."
            correct: true
          - text: "Автор слухав лекцію в аудиторії."
            correct: false
      - question: "Де ряд однорідних означень потребує коми?"
        min_correct: 2
        options:
          - text: "свіжий, прохолодний ранок"
            correct: true
          - text: "перший весняний дощ"
            correct: false
          - text: "короткий, але змістовний лист"
            correct: true
          - text: "новий університетський корпус"
            correct: false
      - question: "Де спільний залежний компонент стосується всього ряду?"
        min_correct: 2
        options:
          - text: "Підготовка до семінару й до дискусії тривала тиждень."
            correct: true
          - text: "Підготовка семінару й до дискусії тривала тиждень."
            correct: false
          - text: "Розмова про джерела, про стиль і про відповідальність була складною."
            correct: true
          - text: "Розмова про джерела, стиль і з відповідальністю була складною."
            correct: false
      - question: "Де повторюваний сполучник створює ритм вибору або накопичення?"
        min_correct: 2
        options:
          - text: "Можемо зустрітися або у вівторок, або в середу."
            correct: true
          - text: "Можемо зустрітися або у вівторок і в середу."
            correct: false
          - text: "Треба перевірити і цифри, і цитати, і підписи."
            correct: true
          - text: "Треба перевірити і цифри, підписи але цитати."
            correct: false
      - question: "Де узагальнювальне слово справді охоплює весь ряд?"
        min_correct: 2
        options:
          - text: "Для реєстрації потрібні такі документи: паспорт, заява і квитанція."
            correct: true
          - text: "В аудиторії: викладач, студенти й волонтери обговорили план."
            correct: false
          - text: "Паспорт, заява і квитанція - усі ці документи треба подати сьогодні."
            correct: true
          - text: "На столі: документи лежали й чекали підпису."
            correct: false
  - type: match-up
    title: "Роль у реченні"
    instruction: "Зістав ряд із синтаксичною роллю однорідних членів."
    pairs:
      - left: "План, кошторис і лист готові."
        right: "однорідні підмети"
      - left: "Команда перевірила цифри, цитати й підписи."
        right: "однорідні додатки"
      - left: "Автор говорить спокійно, точно й без поспіху."
        right: "однорідні обставини"
      - left: "Зустріч була коротка, але змістовна."
        right: "однорідні означення"
      - left: "Ми слухали, нотували й уточнювали деталі."
        right: "однорідні присудки"
      - left: "Не перемога, а участь стала головною."
        right: "протиставний ряд"
      - left: "І документи, і фото, і підписи треба оновити."
        right: "повторюваний сполучник"
      - left: "Потрібні три речі: точність, послідовність і тон."
        right: "узагальнювальне слово перед рядом"
      - left: "Точність, послідовність і тон - три важливі речі."
        right: "узагальнювальне слово після ряду"
      - left: "Старий дерев'яний стіл стояв біля вікна."
        right: "неоднорідні означення"
  - type: fill-in
    title: "Сполучник і знак"
    instruction: "Встав потрібний сполучник або розділовий знак."
    items:
      - sentence: "Рішення було не швидке ____ зважене."
        answer: ", а"
        options: [", а", "і", "або", ": а"]
        explanation: "Перед протиставним а потрібна кома."
      - sentence: "Ми можемо зустрітися ____ у вівторок, або в середу."
        answer: "або"
        options: ["або", "і", "але", "та"]
      - sentence: "Автор аналізує не тільки факти ____ спосіб їх подання."
        answer: ", а й"
        options: [", а й", "і", ", але й як", ": а й"]
      - sentence: "У звіті є три розділи____ вступ, аналіз і висновки."
        answer: ":"
        options: [":", ",", ";", "без знака"]
      - sentence: "Вступ, аналіз і висновки ____ три розділи звіту."
        answer: "-"
        options: ["-", ":", ",", ";"]
      - sentence: "Доповідь була не стільки довгою ____ перевантаженою деталями."
        answer: "скільки"
        options: ["скільки", "а", "і", "проте"]
      - sentence: "Команда перевірила як джерела ____ цитати."
        answer: "так і"
        options: ["так і", "але", "або", "проте"]
      - sentence: "Ми оберемо ____ очну зустріч, або онлайн-семінар."
        answer: "або"
        options: ["або", "і", "а", "та"]
      - sentence: "Він говорив тихо ____ переконливо."
        answer: ", але"
        options: [", але", "і але", ": але", "але,"]
      - sentence: "Потрібні і час ____ підтримка."
        answer: ", і"
        options: [", і", "і", ", але", ": і"]
  - type: error-correction
    title: "Узагальнювальне слово"
    instruction: "Виправ пунктуацію або поясни, чому узагальнення відсутнє."
