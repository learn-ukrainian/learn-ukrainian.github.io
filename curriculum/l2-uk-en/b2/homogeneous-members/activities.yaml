  - id: "wb-essay-homogeneous-style"
    type: essay-response
    title: "Ряд як інструмент стилю"
    instruction: "Напишіть аналіз власного або запропонованого речення з однорідними членами."
    prompt: "Напишіть 150-180 слів про те, як однорідні члени можуть створювати точність, ритм або маніпуляцію. Використайте один ряд із повторюваним сполучником і один приклад з узагальнювальним словом."
    min_words: 150
    model_answer: "Однорідні члени речення допомагають не лише перелічити факти, а й керувати увагою читача. У реченні «Команда перевірила джерела, цитати й підписи» ряд стискає три дії в один відповідальний блок. Якщо написати «Треба перевірити і джерела, і цитати, і підписи», повторюваний сполучник підсилює кожен елемент і не дозволяє пропустити жодного. Узагальнювальне слово працює інакше: «У звіті бракує трьох речей: точності, контексту й чесного тону». Тут двокрапка готує читача до класифікованого переліку. Але ряд може бути й маніпулятивним, якщо поєднує різні за вагою або роллю елементи: «помилки, критика й вороги». Тоді граматична рівність створює хибну смислову рівність. Тому однорідність треба перевіряти за питанням, залежним словом і стилістичним ефектом."
    rubric:
      - criteria: "Синтаксична точність"
        description: "Приклади справді містять однорідні члени з однаковою роллю."
        points: 4
      - criteria: "Пунктуація"
        description: "Коректно використано кому, двокрапку або тире."
        points: 4
      - criteria: "Стильовий коментар"
        description: "Пояснено, як ряд змінює ритм, фокус або оцінку."
        points: 4
