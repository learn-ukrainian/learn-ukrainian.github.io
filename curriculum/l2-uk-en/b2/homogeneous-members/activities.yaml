version: '1.0'
module: homogeneous-members
level: b2
inline: []
workbook:
  - type: reading
    id: homogeneous-reading
    title: 'Текст для читання: підготовка події'
    instruction: Прочитай уривок і знайди однорідні члени речення.
    text: 'До семінару команда підготувала програму, список учасників, презентацію й короткі інструкції для волонтерів. У залі поставили столи, стільці та інформаційні стенди. Усе: реєстраційні картки, маркери, вода, таблички з іменами — чекало біля входу. Організатори говорили спокійно, чітко, без поспіху, але з помітним хвилюванням.'
    tasks:
      - Знайди однорідні додатки в першому реченні.
      - Поясни, чому перед останнім "й" у першому реченні немає коми.
      - Знайди конструкцію з узагальнюючим словом і поясни знаки.
  - type: match-up
    title: Тип зв'язку в однорідному ряду
    instruction: Зістав приклад із типом зв'язку або пунктуаційним принципом.
    pairs:
      - left: карти, схеми, таблиці
        right: безсполучниковий зв'язок
      - left: карти, схеми й таблиці
        right: одиничний єднальний сполучник
      - left: і карти, і схеми, і таблиці
        right: повторюваний сполучник
      - left: не швидко, а точно
        right: протиставний сполучник
      - left: не тільки правило, а й приклади
        right: парний сполучник
      - left: 'усе було готове: план, зал, матеріали'
        right: двокрапка після узагальнюючого слова
      - left: план, зал, матеріали — усе було готове
        right: тире перед узагальнюючим словом
      - left: старий, занедбаний сад
        right: однорідні означення
      - left: великий кам'яний міст
        right: неоднорідні означення
      - left: тихо, уважно, доброзичливо
        right: однорідні обставини
      - left: план, бюджет, графік
        right: однорідні додатки
      - left: швидко, але обережно
        right: протиставний зв'язок обставин
  - type: fill-in
    title: Додай знак або сполучник
    instruction: Заповни пропуск правильною формою.
    items:
      - sentence: 'Усе було готове ____ план, зал, матеріали.'
        answer: ':'
        options:
          - ':'
          - —
          - ','
          - ';'
      - sentence: 'План, зал, матеріали ____ усе було готове.'
        answer: —
        options:
          - —
          - ':'
          - ','
          - .
      - sentence: 'Він говорив не голосно ____ переконливо.'
        answer: а
        options:
          - а
          - і
          - й
          - або
      - sentence: 'У рюкзаку були зошит, словник ____ ручка.'
        answer: і
        options:
          - і
          - але
          - проте
          - а
      - sentence: 'У рюкзаку були і зошит ____ і словник, і ручка.'
        answer: ','
        options:
          - ','
          - ':'
          - —
          - ';'
      - sentence: 'Команда підготувала не тільки презентацію ____ а й список джерел.'
        answer: ','
        options:
          - ','
          - ':'
          - —
          - ';'
      - sentence: '____ навколо: дерева, дах, дорога — блищало після дощу.'
        answer: Усе
        options:
          - Усе
          - Усім
          - Усі
          - Усього
      - sentence: 'Це був тихий ____ уважний голос.'
        answer: ','
        options:
          - ','
          - ':'
          - —
          - ';'
      - sentence: 'Вона принесла карти ____ схеми та маркери.'
        answer: ','
        options:
          - ','
          - ':'
          - —
          - ';'
      - sentence: 'Ми оберемо бібліотеку ____ читальну залу.'
        answer: або
        options:
          - або
          - але
          - проте
          - а
  - type: error-correction
    title: Виправ пунктуацію й логіку ряду
    instruction: Обери нормативний варіант і поясни виправлення.
    items:
      - sentence: Усе було готове план, зал, матеріали.
        error: готове план
        correction: 'Усе було готове: план, зал, матеріали.'
        options:
          - 'Усе було готове: план, зал, матеріали.'
          - Усе було готове — план, зал, матеріали.
          - Усе було готове план, зал і матеріали.
          - Усе було готове; план зал матеріали.
        explanation: Після узагальнюючого слова перед переліком потрібна двокрапка.
      - sentence: План, зал, матеріали усе було готове.
        error: матеріали усе
        correction: План, зал, матеріали — усе було готове.
        options:
          - План, зал, матеріали — усе було готове.
          - 'План, зал, матеріали: усе було готове.'
          - План зал матеріали усе було готове.
          - План, зал і матеріали, усе було готове.
        explanation: Узагальнююче слово після ряду відділяємо тире.
      - sentence: Він говорив не голосно а переконливо.
        error: не голосно а
        correction: Він говорив не голосно, а переконливо.
        options:
          - Він говорив не голосно, а переконливо.
          - Він говорив не голосно а переконливо.
          - 'Він говорив не голосно: а переконливо.'
          - Він говорив не голосно — а переконливо.
        explanation: Перед протиставним сполучником "а" ставимо кому.
      - sentence: У рюкзаку були і зошит і словник і ручка.
        error: і зошит і словник
        correction: У рюкзаку були і зошит, і словник, і ручка.
        options:
          - У рюкзаку були і зошит, і словник, і ручка.
          - У рюкзаку були і зошит і словник і ручка.
          - 'У рюкзаку були і зошит: і словник: і ручка.'
          - У рюкзаку були і зошит — і словник — і ручка.
        explanation: При повторюваному сполучнику коми ставимо перед наступними елементами.
      - sentence: Це був великий, кам'яний будинок.
        error: великий, кам'яний
        correction: Це був великий кам'яний будинок.
        options:
          - Це був великий кам'яний будинок.
          - Це був великий, кам'яний будинок.
          - 'Це був великий: кам''яний будинок.'
          - Це був великий — кам'яний будинок.
        explanation: Означення розміру й матеріалу зазвичай неоднорідні, тому коми немає.
      - sentence: Це був старий занедбаний сад.
        error: старий занедбаний
        correction: Це був старий, занедбаний сад.
        options:
          - Це був старий, занедбаний сад.
          - Це був старий занедбаний сад.
          - 'Це був старий: занедбаний сад.'
          - Це був старий — занедбаний сад.
        explanation: Оцінні означення рівноправні, тому між ними потрібна кома.
      - sentence: Вона любить і пишається командою.
        error: любить і пишається командою
        correction: Вона любить команду й пишається нею.
        options:
          - Вона любить команду й пишається нею.
          - Вона любить і пишається командою.
          - Вона любить командою й пишається команду.
          - Вона любить над командою і пишається.
        explanation: Дієслова мають різне керування, тому спільний додаток треба перебудувати.
      - sentence: Не тільки точність і відповідальність важливі.
        error: Не тільки точність і
        correction: Важлива не тільки точність, а й відповідальність.
        options:
          - Важлива не тільки точність, а й відповідальність.
          - Не тільки точність і відповідальність важливі.
          - Важлива не тільки точність та відповідальність а.
          - 'Важлива точність: а й відповідальність.'
        explanation: Парна конструкція "не тільки..., а й..." потребує другої частини.
  - type: select
    title: Обери правильні речення
    instruction: Познач усі нормативні або стилістично доречні варіанти.
    items:
      - question: Де правильно оформлено узагальнююче слово перед рядом?
        min_correct: 2
        options:
          - text: 'Усе було готове: план, зал, матеріали.'
            correct: true
          - text: 'Три речі допомогли команді: план, спокій і довіра.'
            correct: true
          - text: Усе було готове план, зал, матеріали.
            correct: false
          - text: Усе було готове — план, зал, матеріали.
            correct: false
          - text: Усе було готове; план зал матеріали.
            correct: false
      - question: Де правильно оформлено узагальнююче слово після ряду?
        min_correct: 2
        options:
          - text: План, зал, матеріали — усе було готове.
            correct: true
          - text: Карти, схеми, таблиці — усі матеріали лежали на столі.
            correct: true
          - text: План, зал, матеріали усе було готове.
            correct: false
          - text: 'План, зал, матеріали: усе було готове.'
            correct: false
          - text: Карти схеми таблиці усі матеріали.
            correct: false
      - question: Де правильно вжито повторюваний сполучник?
        min_correct: 2
        options:
          - text: У рюкзаку були і зошит, і словник, і ручка.
            correct: true
          - text: Він говорив і спокійно, і точно.
            correct: true
          - text: У рюкзаку були і зошит і словник і ручка.
            correct: false
          - text: Він говорив і спокійно і точно.
            correct: false
          - text: І план і зал і матеріали були готові.
            correct: false
      - question: Де правильно оформлено протиставлення?
        min_correct: 2
        options:
          - text: Не швидко, а точно.
            correct: true
          - text: Короткий, але змістовний виступ.
            correct: true
          - text: Не швидко а точно.
            correct: false
          - text: Короткий але змістовний виступ.
            correct: false
          - text: 'Не швидко: а точно.'
            correct: false
      - question: Де означення однорідні?
        min_correct: 2
        options:
          - text: Старий, занедбаний сад.
            correct: true
          - text: Тихий, уважний голос.
            correct: true
          - text: Великий кам'яний міст.
            correct: false
          - text: Новий міський автобус.
            correct: false
          - text: Перший весняний дощ.
            correct: false
      - question: Де означення неоднорідні й кома не потрібна?
        min_correct: 2
        options:
          - text: Великий кам'яний будинок.
            correct: true
          - text: Новий шкільний автобус.
            correct: true
          - text: Сумний, втомлений голос.
            correct: false
          - text: Старий, занедбаний парк.
            correct: false
          - text: Тихий, ясний ранок.
            correct: false
      - question: Де ряд логічно сумісний?
        min_correct: 2
        options:
          - text: На столі лежали карти, схеми й таблиці.
            correct: true
          - text: Команда перевірила факти, дати й посилання.
            correct: true
          - text: На столі лежали карти, настрій і швидко.
            correct: false
          - text: Команда перевірила факти, відповідальність і зелено.
            correct: false
          - text: Він купив зошит, ручку й уважно.
            correct: false
      - question: Де парна конструкція симетрична?
        min_correct: 2
        options:
          - text: Важлива не тільки точність, а й послідовність.
            correct: true
          - text: Вона пояснила як правило, так і винятки.
            correct: true
          - text: Важлива не тільки точність і послідовність.
            correct: false
          - text: Вона пояснила як правило і винятки.
            correct: false
          - text: Не тільки текст, але без прикладів.
            correct: false
  - type: match-up
    title: 'Означення: кома чи без коми'
    instruction: Зістав словосполучення з поясненням.
    pairs:
      - left: старий, занедбаний парк
        right: однорідні оцінні означення
      - left: великий дерев'яний стіл
        right: неоднорідні означення
      - left: сумний, утомлений голос
        right: ознаки одного стану
      - left: перший зимовий день
        right: порядок і сезонна належність
      - left: короткий службовий лист
        right: обсяг і жанровий тип
      - left: ясний, теплий ранок
        right: рівноправні образні ознаки
      - left: новий міський автобус
        right: неоднорідне уточнення типу
      - left: вузька, мокра вулиця
        right: однорідні образні ознаки
      - left: перша літня гроза
        right: порядок і сезонна ознака
      - left: тихий, спокійний тон
        right: близькі оцінні ознаки
      - left: короткий навчальний текст
        right: обсяг і призначення
      - left: темний, порожній коридор
        right: однорідний опис атмосфери
  - type: fill-in
    title: Встав пунктуаційне рішення
    instruction: Обери словесну відповідь про потрібний знак.
    items:
      - sentence: "У словосполученні «старий, занедбаний сад» між означеннями потрібна ____."
        answer: кома
        options:
          - кома
          - двокрапка
          - тире
          - без коми
      - sentence: "У словосполученні «великий камяний міст» між означеннями пишемо ____."
        answer: без коми
        options:
          - без коми
          - кому
          - двокрапку
          - тире
      - sentence: "У реченні «Не поспіх, а точність допомогла» перед а стоїть ____."
        answer: кома
        options:
          - кома
          - двокрапка
          - тире
          - без коми
      - sentence: "Після узагальнюючого слова перед переліком ставимо ____."
        answer: двокрапку
        options:
          - двокрапку
          - тире
          - кому
          - крапку
      - sentence: "Перед узагальнюючим словом після переліку ставимо ____."
        answer: тире
        options:
          - тире
          - двокрапку
          - кому
          - лапки
      - sentence: "У реченні «говорив спокійно, точно й доброзичливо» після першої обставини потрібна ____."
        answer: кома
        options:
          - кома
          - тире
          - двокрапка
          - без коми
      - sentence: "У фразі «зал або бібліотеку» між двома варіантами стоїть ____."
        answer: розділовий сполучник
        options:
          - розділовий сполучник
          - узагальнююче слово
          - протиставний сполучник
          - означення
      - sentence: "У конструкції «і план, і бюджет, і графік» сполучник є ____."
        answer: повторюваним
        options:
          - повторюваним
          - одиничним
          - узагальнюючим
          - неоднорідним
      - sentence: "У конструкції «не тільки план, а й бюджет» сполучник є ____."
        answer: парним
        options:
          - парним
          - безсполучниковим
          - називним
          - обставинним
      - sentence: "У фразі «спокій і точність» сполучник є ____."
        answer: єднальним
        options:
          - єднальним
          - протиставним
          - узагальнюючим
          - розділовим

  - type: reading
    id: homogeneous-mini-reading
    title: "Мінітекст: перелік у повідомленні"
    instruction: Прочитай повідомлення й поясни пунктуацію в рядах.
    text: "Для відкритої зустрічі підготували все: зал, програму, список учасників і матеріали для волонтерів. Організатори просили не поспіху, а точності, спокою й уважності до гостей. Після події у звіті окремо згадали Львів, Київ і Харків як міста, де подібні зустрічі вже відбулися."
    tasks:
      - Знайди узагальнююче слово перед однорідним рядом.
      - Поясни кому перед протиставним сполучником а.
      - Визнач, де одиничний єднальний сполучник закриває перелік.

  - type: mark-the-words
    title: Познач однорідні ряди
    instruction: Познач фрагменти, які утворюють однорідні ряди.
    text: 'Команда перевірила факти, дати й посилання. Усе було готове: план, зал, матеріали. Це був старий, занедбаний парк. Ми потребуємо не поспіху, а точності. Говори коротко, точно й доброзичливо. На столі лежали карти, схеми, таблиці.'
    answers:
      - факти, дати й посилання
      - план, зал, матеріали
      - старий, занедбаний
      - не поспіху, а точності
      - коротко, точно й доброзичливо
      - карти, схеми, таблиці
  - type: essay-response
    id: homogeneous-style-essay
    title: 'Письмо: перелік і стиль'
    instruction: Напиши зв'язний текст українською.
    prompt: Напиши короткий абзац із двома однорідними рядами, одним узагальнюючим словом і одним прикладом антитези. Поясни, чому ти обрав саме такі розділові знаки.
    min_words: 180
    model_answer: 'До виступу команда підготувала усе: план, презентацію, список джерел і короткі інструкції для волонтерів. У тексті важливі не гучні обіцянки, а точні факти, прозорі процедури й відповідальна комунікація. У першому реченні узагальнююче слово "усе" стоїть перед переліком, тому після нього потрібна двокрапка. У другому реченні є антитеза "не гучні обіцянки, а точні факти", тому перед "а" ставлю кому. Далі йде однорідний ряд додатків із одиничним єднальним сполучником перед останнім елементом.'
    rubric:
      - criteria: Однорідні ряди
        description: Є щонайменше два граматично правильні однорідні ряди.
        points: 4
      - criteria: Узагальнююче слово
        description: Узагальнююче слово логічно охоплює всі елементи переліку.
        points: 4
      - criteria: Пояснення пунктуації
        description: Автор пояснює вибір двокрапки, тире або ком.
        points: 4
