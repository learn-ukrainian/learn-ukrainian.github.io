        options: ["Для реєстрації потрібні такі документи: паспорт, заява і квитанція.", "Для реєстрації потрібні такі документи - паспорт, заява і квитанція.", "Для реєстрації потрібні такі документи, паспорт, заява і квитанція.", "Для реєстрації потрібні такі документи паспорт: заява і квитанція."]
