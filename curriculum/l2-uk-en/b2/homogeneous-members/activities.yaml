      - sentence: "Світло, звук і монтаж: усе було готове."
        error: "монтаж:"
        correction: "Світло, звук і монтаж - усе було готове."
        error_type: "construction"
        options: ["Світло, звук і монтаж - усе було готове.", "Світло, звук і монтаж: усе було готове.", "Світло: звук і монтаж - усе було готове.", "Світло, звук і монтаж усе: було готове."]
      - sentence: "На столі: рукопис, олівець і чашка кави лежали поруч."
        error: "На столі:"
        correction: "На столі рукопис, олівець і чашка кави лежали поруч."
        error_type: "construction"
        options: ["На столі рукопис, олівець і чашка кави лежали поруч.", "На столі: рукопис, олівець і чашка кави лежали поруч.", "На столі - рукопис, олівець і чашка кави лежали поруч.", "На столі, рукопис, олівець і чашка кави: лежали поруч."]
  - type: error-correction
    title: "Означення, стиль і симетрія"
    instruction: "Виправ помилку в однорідному ряду або в пунктуації означень."
    items:
      - sentence: "На розі стояв великий, кам'яний будинок."
        error: "великий, кам'яний"
        correction: "На розі стояв великий кам'яний будинок."
        error_type: "construction"
        options: ["На розі стояв великий кам'яний будинок.", "На розі стояв великий, кам'яний будинок.", "На розі стояв великий і, кам'яний будинок.", "На розі стояв, великий кам'яний будинок."]
