workbook:
  - type: group-sort
    title: "Типи однорідних членів"
    instruction: "Розподіли приклади за синтаксичною роллю ряду."
    groups:
      - name: "підмети"
        items: ["План, лист і кошторис готові.", "Викладач, студенти й волонтери обговорили графік.", "Тиша, світло й простір допомагали зосередитися."]
      - name: "додатки"
        items: ["Ми перевірили джерела, цитати й підписи.", "Команда потребує часу, бюджету й підтримки.", "Редактор уточнив дату, місце і контакт."]
      - name: "обставини"
        items: ["Вона говорила спокійно, повільно й без пауз.", "Ми працювали в аудиторії, в бібліотеці й удома.", "Він відповів коротко, ввічливо й по суті."]
      - name: "означення"
        items: ["Ранок був тихий, прохолодний і ясний.", "Лист виявився коротким, але змістовним.", "Це була давня, майже забута історія."]
      - name: "присудки"
        items: ["Комісія прочитала, обговорила й затвердила текст.", "Автор слухав, нотував і уточнював.", "Група зібралася, порадилася й розійшлася."]
  - type: select
    title: "Кома чи ні"
    instruction: "Обери варіанти, де пунктуація між однорідними або неоднорідними означеннями виправдана."
    items:
      - question: "Де кома між означеннями потрібна?"
        min_correct: 2
        options:
          - text: "теплий, сонячний день"
            correct: true
          - text: "новий шкільний автобус"
            correct: false
          - text: "сумний, але чесний лист"
            correct: true
          - text: "третій міський конкурс"
            correct: false
      - question: "Де кома зайва?"
        min_correct: 2
        options:
          - text: "старий дерев'яний стілець"
            correct: true
          - text: "свіжий, прохолодний вітер"
            correct: false
          - text: "перший осінній туман"
            correct: true
          - text: "темний, безлюдний парк"
            correct: false
      - question: "Де є протиставлення між однорідними членами?"
        min_correct: 2
        options:
          - text: "не швидке, а зважене рішення"
            correct: true
          - text: "швидке і зважене рішення"
            correct: false
          - text: "короткий, але змістовний звіт"
            correct: true
          - text: "перший і весняний дощ"
            correct: false
      - question: "Де повторюваний сполучник оформлено послідовно?"
        min_correct: 2
        options:
          - text: "і план, і бюджет, і дедлайн"
            correct: true
          - text: "і план, бюджет і дедлайн"
            correct: false
          - text: "або сьогодні, або завтра"
            correct: true
