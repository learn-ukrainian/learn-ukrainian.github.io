- lemma: однорідні члени речення
  translation: homogeneous sentence members
  ipa: "[od.no.rid.ni tʃle.nɪ re.tʃen.nʲa]"
  pos: noun phrase
  usage: "Однорідні члени речення виконують однакову синтаксичну роль і залежать від одного керівного слова."
- lemma: однорідний ряд
  translation: homogeneous series
  ipa: "[od.no.rid.nɪj rʲad]"
  pos: noun phrase
  usage: "Однорідний ряд має спільне питання, спільну роль і логічно сумісні елементи."
- lemma: узагальнювальне слово
  translation: generalizing word
  ipa: "[u.za.halʲ.nʲu.ju.tʃe slo.wo]"
  pos: noun phrase
  usage: "Узагальнювальне слово може стояти перед переліком або після нього."
- lemma: сполучниковий зв'язок
  translation: conjunctional connection
  ipa: "[spo.lu.tʃnɪ.ko.wɪj zʲvja.zok]"
  pos: noun phrase
  usage: "Сполучниковий зв'язок виражають і, або, але та інші сполучники."
- lemma: безсполучниковий зв'язок
  translation: asyndetic connection
  ipa: "[bez.spo.lu.tʃnɪ.ko.wɪj zʲvja.zok]"
  pos: noun phrase
  usage: "Безсполучниковий зв'язок спирається на перелічувальну інтонацію і коми."
- lemma: перелічувальна інтонація
  translation: enumerative intonation
  ipa: "[pe.re.lʲi.tʃu.walʲ.na in.to.na.t͡sʲi.ja]"
  pos: noun phrase
  usage: "Перелічувальна інтонація допомагає почути межі однорідного ряду."
- lemma: двокрапка
  translation: colon
  ipa: "[dwo.krap.ka]"
  pos: noun
  usage: "Двокрапка ставиться після узагальнювального слова перед переліком."
- lemma: тире
  translation: dash
  ipa: "[tɪ.re]"
  pos: noun
  usage: "Тире може підсумовувати однорідний ряд перед узагальнювальним словом."
- lemma: градація
  translation: gradation
  ipa: "[ɦra.da.t͡sʲi.ja]"
  pos: noun
  usage: "Градація розташовує однорідні елементи за наростанням або спаданням сили."
- lemma: антитеза
  translation: antithesis
  ipa: "[an.tɪ.te.za]"
  pos: noun
  usage: "Антитеза зіставляє протилежні поняття в однаковій синтаксичній позиції."
- lemma: систематизація
  translation: systematization
  ipa: "[sɪs.te.ma.tɪ.za.t͡sʲi.ja]"
  pos: noun
  usage: "Систематизація правил допомагає швидко вибрати кому, двокрапку або тире."
- lemma: пунктограма
  translation: punctuation pattern
  ipa: "[punk.to.hra.ma]"
  pos: noun
  usage: "Пунктограма з узагальнювальним словом має схеми з двокрапкою і тире."
- lemma: сурядність
  translation: coordination
  ipa: "[su.rʲad.nʲistʲ]"
  pos: noun
  usage: "Сурядність означає рівноправний зв'язок між елементами однорідного ряду."
- lemma: контекст
  translation: context
  ipa: "[kon.tekst]"
  pos: noun
  usage: "Контекст може змінити тлумачення означень як однорідних або неоднорідних."
- lemma: синтаксична роль
  translation: syntactic role
  ipa: "[sɪn.tak.sɪ.tʃna rolʲ]"
  pos: noun phrase
  usage: "Синтаксична роль кожного елемента має збігатися з роллю інших елементів ряду."
- lemma: керівне слово
  translation: governing word
  ipa: "[ke.rʲiw.ne slo.wo]"
  pos: noun phrase
  usage: "Керівне слово допомагає визначити, від чого залежать однорідні члени."
- lemma: логічна сумісність
  translation: logical compatibility
  ipa: "[lo.hʲi.tʃna su.mʲis.nʲistʲ]"
  pos: noun phrase
  usage: "Логічна сумісність захищає ряд від випадкового змішування понять."
- lemma: однорідні означення
  translation: homogeneous attributes
  ipa: "[od.no.rid.ni o.zna.tʃen.nʲa]"
  pos: noun phrase
  usage: "Однорідні означення рівноправно характеризують предмет з одного боку."
- lemma: неоднорідні означення
  translation: non-homogeneous attributes
  ipa: "[ne.od.no.rid.ni o.zna.tʃen.nʲa]"
  pos: noun phrase
  usage: "Неоднорідні означення описують предмет з різних боків і не відділяються комою."
- lemma: спільний залежний елемент
  translation: shared dependent element
  ipa: "[spʲilʲ.nɪj za.leʒ.nɪj e.le.ment]"
  pos: noun phrase
  usage: "Спільний залежний елемент має підходити до кожного однорідного присудка."
- lemma: парний сполучник
  translation: correlative conjunction
  ipa: "[par.nɪj spo.lu.tʃnɪk]"
  pos: noun phrase
  usage: "Парний сполучник вимагає симетрії: не тільки факти, а й способи подання."
- lemma: протиставний сполучник
  translation: adversative conjunction
  ipa: "[pro.tɪ.staw.nɪj spo.lu.tʃnɪk]"
  pos: noun phrase
  usage: "Перед протиставним сполучником але або а між однорідними членами ставимо кому."
- lemma: розділовий сполучник
  translation: disjunctive conjunction
  ipa: "[roz.dʲi.lo.wɪj spo.lu.tʃnɪk]"
  pos: noun phrase
  usage: "Розділовий сполучник або показує вибір між однорідними елементами."
- lemma: накопичення
  translation: accumulation
  ipa: "[na.ko.pɪ.tʃen.nʲa]"
  pos: noun
  usage: "Накопичення деталей у ряду може створювати відчуття достатку або хаосу."
- lemma: ритм речення
  translation: sentence rhythm
  ipa: "[rɪtm re.tʃen.nʲa]"
  pos: noun phrase
  usage: "Ритм речення змінюється, коли автор обирає безсполучниковий або повторюваний зв'язок."
