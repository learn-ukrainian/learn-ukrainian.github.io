version: '1.0'
module: instrumental-advanced
level: b2

inline:
  - type: select
    title: Ролі орудного
    instruction: Позначте всі правильні пояснення орудної форми.
    items:
      - question: "У реченні «Олена позначила межу синім олівцем» правильні пояснення такі:"
        options:
          - text: "олівцем називає фізичне знаряддя дії"
            correct: true
          - text: "форма стоїть без прийменника"
            correct: true
          - text: "це орудний супроводу"
            correct: false
          - text: "олівцем називає виконавця дії"
            correct: false
        min_correct: 2
        explanation: "Олівець є предметом, яким виконують дію."
      - question: "У реченні «Запрошення надіслали електронною поштою» правильні пояснення такі:"
        options:
          - text: "електронною поштою називає канал передавання"
            correct: true
          - text: "це орудний засобу"
            correct: true
          - text: "пошта є людиною-супутником"
            correct: false
          - text: "тут потрібна форма до пошти"
            correct: false
        min_correct: 2
        explanation: "Форма називає спосіб, яким виконано дію."
      - question: "У вислові «голос лився рікою» правильні пояснення такі:"
        options:
          - text: "рікою створює образне порівняння"
            correct: true
          - text: "форма не називає реальний інструмент"
            correct: true
          - text: "рікою є адресатом дії"
            correct: false
          - text: "це обов'язкова службова формула"
            correct: false
        min_correct: 2
        explanation: "Орудний порівняння показує образ способу або руху."
      - question: "У реченні «Ми працювали з обережністю» правильні пояснення такі:"
        options:
          - text: "з обережністю описує спосіб дії"
            correct: true
          - text: "прийменник з не завжди означає супутника"
            correct: true
          - text: "обережність є людиною-партнером"
            correct: false
          - text: "форма має бути обережності"
            correct: false
        min_correct: 2
        explanation: "Абстрактний іменник після з може передавати манеру або стан."
      - question: "У реченні «Ранками я повторюю таблицю» правильні пояснення такі:"
        options:
          - text: "ранками називає повторюваний час"
            correct: true
          - text: "це безприйменниковий орудний"
            correct: true
          - text: "ранками є знаряддям дії"
            correct: false
          - text: "форма має бути ранків"
            correct: false
        min_correct: 2
        explanation: "Орудний може називати час регулярної дії."
      - question: "У реченні «Вона стала модераторкою дискусії» правильні пояснення такі:"
        options:
          - text: "модераторкою входить до складеного присудка"
            correct: true
          - text: "форма відповідає на питання ким стала?"
            correct: true
          - text: "це просторове значення"
            correct: false
          - text: "тут обов'язковий називний"
            correct: false
        min_correct: 2
        explanation: "Після стати роль часто виражає орудний."
      - question: "У реченні «Зміни затверджено наказом» правильні пояснення такі:"
        options:
          - text: "наказом називає документальну підставу"
            correct: true
          - text: "це не людський діяч"
            correct: true
          - text: "наказом є супутником людини"
            correct: false
          - text: "форму треба замінити на наказу"
            correct: false
        min_correct: 2
        explanation: "Орудний може називати документ, яким щось затверджено."
      - question: "У реченні «Кав'ярня розташована поряд із театром» правильні пояснення такі:"
        options:
          - text: "поряд із театром називає просторову близькість"
            correct: true
          - text: "театром стоїть в орудному після сполуки поряд із"
            correct: true
          - text: "театром є інструментом"
            correct: false
          - text: "це приклад родового відмінка"
            correct: false
        min_correct: 2
        explanation: "Сполука поряд із керує орудним."

  - type: fill-in
    title: Прийменники з орудним
    instruction: Виберіть форму або прийменникову групу, яка природно завершує речення.
    items:
      - sentence: "Перед ____ студенти зібралися біля аудиторії."
        answer: "засіданням"
        options: ["засіданням", "засідання", "засіданню", "засіданнями"]
        explanation: "Перед у часовому значенні керує орудним."
      - sentence: "Стенд поставили ____ двома корпусами."
        answer: "між"
        options: ["між", "до", "без", "після"]
        explanation: "Між з орудним називає простір між об'єктами."
      - sentence: "Книгарня розташована ____ театром."
        answer: "поряд із"
        options: ["поряд із", "замість", "протягом", "унаслідок"]
        explanation: "Поряд із керує орудним і називає близькість."
      - sentence: "Волонтери працювали ____ наметом під час дощу."
        answer: "під"
        options: ["під", "для", "до", "без"]
        explanation: "Під з орудним називає розташування нижче або всередині захищеного простору."
      - sentence: "Ранками Марко їздить на роботу ____."
        answer: "потягом"
        options: ["потягом", "потягу", "потяг", "з потягом"]
        explanation: "Засіб пересування часто стоїть в орудному без прийменника."
      - sentence: "____ нами кажучи, цей текст треба скоротити."
        answer: "Між"
        options: ["Між", "До", "Для", "Після"]
        explanation: "Між нами кажучи - стала вставна модель з орудним."
      - sentence: "Після занять ми поверталися додому вузькою ____."
        answer: "вулицею"
        options: ["вулицею", "вулицю", "вулиці", "вулиць"]
        explanation: "Орудний може називати шлях руху."
      - sentence: "Проєкт розвивався ____ підтримкою громади."
        answer: "з"
        options: ["з", "до", "без", "для"]
        explanation: "З підтримкою описує супровідні умови."
      - sentence: "Команда працює ____ новою методикою."
        answer: "за"
        options: ["за", "до", "без", "після"]
        explanation: "За з орудним може називати спосіб або правило."
      - sentence: "Над ____ висів великий інформаційний екран."
        answer: "входом"
        options: ["входом", "вхід", "входу", "входові"]
        explanation: "Над керує орудним у просторовому значенні."

  - type: quiz
    title: Складений присудок
    instruction: Оберіть форму, яка правильно передає роль або статус.
    items:
      - question: "Після інтернатури вона стала ____."
        options:
          - text: "лікаркою"
            correct: true
          - text: "лікарка"
            correct: false
          - text: "лікарці"
            correct: false
          - text: "лікарки"
            correct: false
        explanation: "Після стати потрібен орудний: стала ким?"
      - question: "Неформальна зустріч виявилася ____ для нового проєкту."
        options:
          - text: "поштовхом"
            correct: true
          - text: "поштовх"
            correct: false
          - text: "поштовху"
            correct: false
          - text: "поштовхові"
            correct: false
        explanation: "Виявитися чим? - поштовхом."
      - question: "Марко працює ____ освітніх текстів."
        options:
          - text: "редактором"
            correct: true
          - text: "редактор"
            correct: false
          - text: "редактору"
            correct: false
          - text: "редактора"
            correct: false
        explanation: "Працювати ким? - редактором."
      - question: "Після дискусії вона лишилася ____ групи."
        options:
          - text: "наставницею"
            correct: true
          - text: "наставниця"
            correct: false
          - text: "наставниці"
            correct: false
          - text: "наставницю"
            correct: false
        explanation: "Лишитися ким? - наставницею."
      - question: "Після перевірки проста ідея виявилася ____ для всієї команди."
        options:
          - text: "ризиком"
            correct: true
          - text: "ризик"
            correct: false
          - text: "ризику"
            correct: false
          - text: "ризикові"
            correct: false
        explanation: "Виявитися чим? - ризиком."
      - question: "У цьому проєкті Оксана була ____ для нових авторів."
        options:
          - text: "наставницею"
            correct: true
          - text: "наставниця"
            correct: false
          - text: "наставниці"
            correct: false
          - text: "наставницю"
            correct: false
        explanation: "Бути ким? - наставницею."
      - question: "Після конкурсу він залишився ____ шкільного медіаклубу."
        options:
          - text: "координатором"
            correct: true
          - text: "координатор"
            correct: false
          - text: "координатора"
            correct: false
          - text: "координаторові"
            correct: false
        explanation: "Залишитися ким? - координатором."
      - question: "На перший погляд рішення здавалося ____."
        options:
          - text: "компромісом"
            correct: true
          - text: "компроміс"
            correct: false
          - text: "компромісу"
            correct: false
          - text: "компромісі"
            correct: false
        explanation: "Здаватися чим? - компромісом."
      - question: "У звіті ця обставина стала ____ для перенесення строку."
        options:
          - text: "підставою"
            correct: true
          - text: "підстава"
            correct: false
          - text: "підставі"
            correct: false
          - text: "підставу"
            correct: false
        explanation: "Стати чим? - підставою."
      - question: "Під час практики він працював ____ у місцевій редакції."
        options:
          - text: "кореспондентом"
            correct: true
          - text: "кореспондент"
            correct: false
          - text: "кореспондента"
            correct: false
          - text: "кореспондентові"
            correct: false
        explanation: "Працювати ким? - кореспондентом."

  - type: error-correction
    title: Пасив і діяч
    instruction: Виправте речення так, щоб виконавець, засіб або підстава були названі природно.
    items:
      - sentence: "Лист написано студентом учора."
        error: "написано студентом"
        correction: "студент написав лист"
        options: ["студент написав лист", "лист написано студенту", "лист написано студента", "лист написано зі студентом"]
        explanation: "Якщо важливий виконавець, активне речення природніше."
      - sentence: "Заявку перевірено координаторкою о 15:00."
        error: "перевірено координаторкою"
        correction: "координаторка перевірила заявку"
        options: ["координаторка перевірила заявку", "перевірено координаторці", "перевірено координаторки", "перевірено з координаторкою"]
        explanation: "Людину-діяча після -но/-то краще назвати підметом."
      - sentence: "Зміни ухвалено редакцією в понеділок."
        error: "ухвалено редакцією"
        correction: "редакція ухвалила зміни"
        options: ["редакція ухвалила зміни", "ухвалено редакції", "ухвалено з редакцією", "ухвалено редакцію"]
        explanation: "Для виконавця доречна активна конструкція."
      - sentence: "Порядок затверджено директором наказу."
        error: "директором наказу"
        correction: "наказом директора"
        options: ["наказом директора", "наказ директора", "наказу директором", "директором наказ"]
        explanation: "Документальна підстава може стояти в орудному: наказом."
      - sentence: "Документ підписано працівником електронним підписом."
        error: "працівником електронним підписом"
        correction: "працівник підписав документ електронним підписом"
        options: ["працівник підписав документ електронним підписом", "документ підписано працівнику", "підписано працівника електронним підписом", "підписано з працівником"]
        explanation: "Тут треба розвести виконавця й засіб."
      - sentence: "Повідомлення надіслано адміністраторкою вранці."
        error: "надіслано адміністраторкою"
        correction: "адміністраторка надіслала повідомлення"
        options: ["адміністраторка надіслала повідомлення", "надіслано адміністраторці", "надіслано адміністраторку", "надіслано з адміністраторкою"]
        explanation: "Людину-виконавицю краще назвати підметом активного речення."
      - sentence: "Правки внесено редактором за коментарями автора."
        error: "внесено редактором"
        correction: "редактор вніс правки"
        options: ["редактор вніс правки", "внесено редактору", "внесено редактора", "внесено з редактором"]
        explanation: "Активна конструкція робить відповідальну особу видимою."
      - sentence: "Рішення оформлено секретарем протоколу."
        error: "секретарем протоколу"
        correction: "протоколом секретаря"
        options: ["протоколом секретаря", "секретарю протоколу", "секретаря протоколом", "з секретарем протоколу"]
        explanation: "Якщо потрібна підстава, назвіть документ в орудному."

  - type: group-sort
    title: Регістр і значення
    instruction: Розподіліть фрази за тим, яку функцію виконує орудний або суміжна конструкція.
    groups:
      - name: "інструмент або засіб"
        items:
          - "підписати ручкою"
          - "надіслати електронною поштою"
          - "оплатити карткою"
          - "перевірити новим методом"
      - name: "супровід, стан або спосіб"
        items:
          - "працювати з колегою"
          - "говорити з обережністю"
          - "слухати з увагою"
          - "рухатися з надією"
      - name: "простір або межа"
        items:
          - "між будинками"
          - "перед входом"
          - "поза законом"
          - "поряд із театром"
      - name: "не орудний у допустовій моделі"
        items:
          - "попри втому"
          - "незважаючи на обмеження"
          - "за складних умов"
          - "усупереч прогнозам"

  - id: act-6
    type: reading
    title: "Читання: редакторський день"
    instruction: Прочитайте уривок і поясніть функції орудного.
    source: "Навчальний уривок для модуля B2."
    text: "Ранками Ірина працювала над текстом за великим столом поряд із вікном. Вона позначала сумнівні місця синім олівцем, звіряла терміни зі словником і говорила з автором спокійним голосом. Перед дедлайном текст здавався хаосом, але поступово став ясною інструкцією. Зміни затверджено рішенням редакції, а фінальний лист надіслано електронною поштою. Увечері команда йшла вулицею між старими будинками й жартувала, що після цього проєкту стоятиме стіною за якість."
    tasks:
      - "Знайдіть два орудні інструмента або засобу."
      - "Випишіть одну форму, що входить до складеного присудка."
      - "Поясніть одну просторову прийменникову групу."
      - "Знайдіть приклад документальної підстави."
      - "Поясніть, чому «стіною» не є реальним знаряддям."

workbook:
  - type: match-up
    title: Функція форми
    instruction: Поєднайте приклад із функцією орудного.
    pairs:
      - left: "різати ножицями"
        right: "фізичне знаряддя"
      - left: "оплатити карткою"
        right: "засіб операції"
      - left: "летіти стрілою"
        right: "образне порівняння"
      - left: "стати лікаркою"
        right: "складений присудок"
      - left: "між корпусами"
        right: "просторова прийменникова група"
      - left: "затверджено наказом"
        right: "документальна підстава"
      - left: "ранками повторювати"
        right: "час регулярної дії"
      - left: "вулицею до вокзалу"
        right: "шлях руху"
      - left: "говорити з обережністю"
        right: "спосіб або тон дії"
      - left: "поряд із театром"
        right: "просторова близькість"

  - type: fill-in
    title: Форми і керування
    instruction: Виберіть правильну форму орудного або суміжну конструкцію.
    items:
      - sentence: "Команда працювала ____ до пізнього вечора."
        answer: "з натхненням"
        options: ["з натхненням", "натхнення", "до натхнення", "натхненню"]
        explanation: "З натхненням описує спосіб і внутрішній стан."
      - sentence: "Рішення затверджено ____ ректора."
        answer: "наказом"
        options: ["наказом", "наказ", "наказу", "наказові"]
        explanation: "Орудний називає документальну підставу."
      - sentence: "Перед ____ треба перевірити техніку."
        answer: "виступом"
        options: ["виступом", "виступу", "виступ", "виступові"]
        explanation: "Перед у часовому значенні керує орудним."
      - sentence: "Вона пишається ____."
        answer: "своєю командою"
        options: ["своєю командою", "про свою команду", "своєї команди", "своїй команді"]
        explanation: "Пишатися керує орудним."
      - sentence: "____ законом такі дії неприпустимі."
        answer: "Поза"
        options: ["Поза", "Для", "До", "Без"]
        explanation: "Поза з орудним називає перебування за межами норми."
      - sentence: "Студенти йшли ____ до гуртожитку."
        answer: "вулицею"
        options: ["вулицею", "вулиця", "вулиці", "вулицю"]
        explanation: "Орудний може позначати шлях руху."
      - sentence: "Файл надіслали ____."
        answer: "захищеним каналом"
        options: ["захищеним каналом", "захищений канал", "захищеному каналу", "захищеного каналу"]
        explanation: "Орудний називає канал передавання."
      - sentence: "Команда стояла ____ за якість перекладу."
        answer: "стіною"
