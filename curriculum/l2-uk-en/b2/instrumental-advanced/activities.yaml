  - id: workbook-4
    type: essay-response
    title: Мініесе про орудний
    instruction: Напишіть 150-180 слів про навчальний або робочий день, використавши щонайменше шість різних функцій орудного.
    prompt: "Опишіть день у майстерні, університеті, офісі або волонтерському центрі. Використайте орудний інструмента, засобу, супроводу, простору, присудка й документальної підстави. Наприкінці поясніть два свої граматичні вибори."
    min_words: 150
    model_answer: |-
      > [!model-answer]
      > Ранками я працюю над навчальними матеріалами за великим столом поряд із вікном. Чернетки позначаю синім олівцем, а фінальні файли надсилаю електронною поштою координаторці курсу. Цього місяця я став редактором невеликої волонтерської команди, тому часто працюю з дизайнеркою і говорю з авторами спокійним тоном. Перед дедлайном текст іноді здається хаосом, але після кількох перевірок стає зрозумілою інструкцією. Зміни затверджено рішенням редакції, а не просто "кимось зроблено", бо в цьому реченні важлива саме підстава. Я використав орудний **олівцем** як інструмент, **електронною поштою** як засіб, **з дизайнеркою** як супровід, **редактором** як роль у присудку, **перед дедлайном** як часову межу і **рішенням редакції** як документальну підставу.
    rubric:
      - criteria: "Функції орудного"
        description: "Текст містить щонайменше шість різних функцій орудного, а не лише повтор однієї моделі."
        points: 4
      - criteria: "Редакторське пояснення"
        description: "Автор пояснює два граматичні вибори через значення і регістр."
        points: 4
      - criteria: "Мовна природність"
        description: "Речення звучать природно й не зловживають орудним діяча в конструкціях на -но/-то."
        points: 4
