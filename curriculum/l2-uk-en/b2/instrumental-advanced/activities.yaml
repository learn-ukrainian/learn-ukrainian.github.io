- type: essay-response
  id: instrumental-profession-essay
  title: "Есе: ким я став або хочу стати"
  instruction: >-
    Напишіть 300-350 слів про професійний шлях або мрію. Використайте орудний у
    щонайменше шести різних функціях: присудок, знаряддя, засіб, супровід,
    порівняння, час або простір.
  prompt: >-
    Опишіть, ким ви мріяли стати, ким працюєте або хочете працювати, якими
    засобами навчаєтеся, з ким співпрацюєте й у якому стилі варто говорити про
    відповідальність.
  min_words: 300
  rubric:
    - criteria: "Присудковий орудний"
      description: "Є щонайменше два приклади з бути, стати, працювати або лишитися."
      points: 3
    - criteria: "Знаряддя й засіб"
      description: "Є щонайменше два приклади без зайвого прийменника з."
      points: 3
    - criteria: "Семантична різноманітність"
      description: "Є образне порівняння та прийменникова група з орудним."
      points: 2
    - criteria: "Норма й регістр"
      description: "Немає діяча в -но/-то конструкції; стиль відповідає жанру есе."
      points: 2
  model_answer: >-
    У дитинстві я мріяв стати архітектором, бо любив малювати міста синім
    олівцем і будувати вежі з паперу. Пізніше я працював волонтером у
    культурному центрі й зрозумів, що хочу бути перекладачем між різними
    спільнотами. Тепер я вчуся вечорами, користуюся електронним словником,
    надсилаю вправи електронною поштою й обговорюю помилки з наставницею. Іноді
    робота здається стіною, але маленькі успіхи летять стрілою. Перед іспитом я
    хочу лишитися спокійною людиною, яка працює з натхненням і не ховається за
    формальностями.
