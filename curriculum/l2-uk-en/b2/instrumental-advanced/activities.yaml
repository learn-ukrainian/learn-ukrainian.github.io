- type: reading
  id: instrumental-studio-reading
  title: "Читання: майстерня перед виставкою"
  instruction: "Прочитайте текст і визначте функції орудного відмінка."
  source: "Навчальний уривок для модуля B2."
  text: >-
    У майстерні перед виставкою всі працювали зосереджено. Олена позначала
    ескізи синім олівцем, Назар різав картон ножицями, а кураторка надсилала
    запрошення електронною поштою. За великим столом студенти обговорювали, ким
    хочуть стати після навчання: хтось мріяв бути архітекторкою, хтось -
    дизайнером, а хтось лишитися дослідником міського простору. Вечорами вони
    поверталися додому вузькою вулицею, між старими будинками, і жартували, що
    перед відкриттям стоять стіною. Рішення про дату виставки затверджено
    наказом декана, але афішу підготували самі студенти.
  tasks:
    - "Випишіть два приклади орудного знаряддя або засобу."
    - "Знайдіть орудний у складеному іменному присудку."
    - "Поясніть, чому стоять стіною є орудним порівняння."
    - "Знайдіть офіційну формулу й поясніть, чому наказом не є людиною-діячем."

- type: quiz
  title: "Функції орудного"
  instruction: "Оберіть правильне пояснення або природний варіант."
  items:
    - question: "Яку функцію має орудний у реченні Вона пише синім олівцем?"
      options:
        - text: "знаряддя дії"
          correct: true
        - text: "людина-супутник"
          correct: false
        - text: "родовий належності"
          correct: false
        - text: "місцевий відмінок"
          correct: false
      explanation: "Олівець є інструментом письма, тому прийменник не потрібен."
    - question: "Який варіант природний для інструмента?"
      options:
        - text: "Ріжте папір ножицями."
          correct: true
        - text: "Ріжте папір з ножицями."
          correct: false
        - text: "Ріжте папір ножиць."
          correct: false
        - text: "Ріжте папір у ножицях."
          correct: false
      explanation: "Знаряддя дії виражається безприйменниковим орудним."
    - question: "Що означає форма лікарем у реченні Він став лікарем?"
      options:
        - text: "іменна частина присудка, професійна роль"
          correct: true
        - text: "фізичний інструмент дії"
          correct: false
        - text: "адресат дії"
          correct: false
        - text: "час дії"
          correct: false
      explanation: "Стати ким? лікарем - це присудковий орудний."
    - question: "Яке речення уникає ненормативного діяча в -но/-то конструкції?"
      options:
        - text: "Студенти підготували звіт."
          correct: true
        - text: "Звіт підготовлено студентами."
          correct: false
        - text: "Звіт студентами підготовано."
          correct: false
        - text: "Студентами було звіт."
          correct: false
      explanation: "Коли діяч важливий, природніше зробити його підметом."
    - question: "У якому варіанті орудний називає документальну підставу?"
      options:
        - text: "Рішення затверджено наказом."
          correct: true
        - text: "Студент написав лист ручкою."
          correct: false
        - text: "Вони прийшли з другом."
          correct: false
        - text: "Вечорами ми читаємо."
          correct: false
      explanation: "Наказ є офіційним документом, яким затверджено рішення."
    - question: "Яка форма прикметника жіночого роду правильна?"
      options:
        - text: "синьою ручкою"
          correct: true
        - text: "синьой ручкою"
          correct: false
        - text: "синьєю ручкою"
          correct: false
        - text: "синім ручкою"
          correct: false
      explanation: "Жіночий рід однини в орудному має закінчення -ою."
    - question: "Що виражає орудний у фразі стояти стіною?"
      options:
        - text: "образне порівняння"
          correct: true
        - text: "реальний інструмент"
          correct: false
        - text: "адресата"
          correct: false
        - text: "причину"
          correct: false
      explanation: "Стіною означає щільно, разом, непохитно."
    - question: "Який прийменник керує орудним у просторовій моделі?"
      options:
        - text: "перед школою"
          correct: true
        - text: "до школи"
          correct: false
        - text: "без школи"
          correct: false
        - text: "для школи"
          correct: false
      explanation: "Перед у просторовому значенні керує орудним."
    - question: "Яке речення містить орудний часу?"
      options:
        - text: "Вечорами вона слухала подкаст."
          correct: true
        - text: "Вона слухала подкаст із другом."
          correct: false
        - text: "Вона слухала подкаст за столом."
          correct: false
        - text: "Вона слухала подкаст про історію."
          correct: false
      explanation: "Вечорами називає повторюваний час дії."
    - question: "Яке дієслово природно керує орудним без прийменника?"
      options:
        - text: "пишатися країною"
          correct: true
        - text: "пишатися про країну"
          correct: false
        - text: "пишатися для країни"
          correct: false
        - text: "пишатися країни"
          correct: false
      explanation: "Пишатися країною - нормативна безприйменникова модель керування."

