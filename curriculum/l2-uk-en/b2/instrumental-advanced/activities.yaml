- type: fill-in
  title: "Форми орудного"
  instruction: "Виберіть природну форму орудного відмінка."
  items:
    - sentence: "Олена позначила помилку ____."
      answer: "синім олівцем"
      options: ["синім олівцем", "синій олівець", "з синім олівцем", "синьою олівцем"]
      explanation: "Олівець є інструментом, тому потрібен безприйменниковий орудний."
    - sentence: "Ми пишаємося ____."
      answer: "своєю країною"
      options: ["своєю країною", "про свою країну", "своя країна", "своєї країни"]
      explanation: "Пишатися керує орудним без прийменника."
    - sentence: "Вона стала ____ після інтернатури."
      answer: "лікаркою"
      options: ["лікаркою", "лікарка", "лікарці", "лікарки"]
      explanation: "Стати ким? лікаркою."
    - sentence: "Команда працювала ____ до пізнього вечора."
      answer: "з ентузіазмом"
      options: ["з ентузіазмом", "ентузіазму", "ентузіазм", "до ентузіазму"]
      explanation: "З ентузіазмом описує спосіб або емоційний тон дії."
    - sentence: "Діти стояли ____ перед сценою."
      answer: "стіною"
      options: ["стіною", "стіна", "стіні", "стіни"]
      explanation: "Стіною є образним орудним порівняння."
    - sentence: "Зустрінемося ____ о дев'ятій."
      answer: "перед музеєм"
      options: ["перед музеєм", "перед музей", "перед музею", "перед музеї"]
      explanation: "Перед у просторовому значенні керує орудним."
    - sentence: "Рішення затверджено ____ директора."
      answer: "наказом"
      options: ["наказом", "наказ", "наказу", "наказові"]
      explanation: "Наказом називає офіційну підставу."
    - sentence: "Вечорами ми поверталися додому ____."
      answer: "вузькою дорогою"
      options: ["вузькою дорогою", "вузька дорога", "вузької дороги", "вузьку дорогу"]
      explanation: "Дорогою називає шлях руху, прикметник узгоджується в орудному."
    - sentence: "Температуру виміряли новим ____."
      answer: "приладом"
      options: ["приладом", "приладу", "прилад", "приладі"]
      explanation: "Приладом є знаряддям дії."
    - sentence: "Баланс треба знайти між мрією та ____."
      answer: "реальністю"
      options: ["реальністю", "реальність", "реальності", "реальностей"]
      explanation: "Між керує орудним обох частин пари."

- type: select
  title: "Визначте роль"
  instruction: "Оберіть усі граматично й стилістично правильні пояснення."
  items:
    - question: "Речення: Документ підписано електронним підписом."
      min_correct: 2
      options:
        - text: "Електронним підписом називає засіб підписання."
          correct: true
        - text: "Це не людина-діяч у -но/-то конструкції."
          correct: true
        - text: "Електронним підписом є адресатом дії."
          correct: false
        - text: "Фразу треба виправити на з електронним підписом."
          correct: false
      explanation: "Орудний тут називає засіб або інструмент."
    - question: "Речення: Звіт підготовлено аналітиком."
      min_correct: 2
      options:
        - text: "Краще: Аналітик підготував звіт."
          correct: true
        - text: "Аналітиком є людиною-діячем, тому конструкція небажана."
          correct: true
        - text: "Аналітиком називає документальну підставу."
          correct: false
        - text: "Тут потрібна форма аналітику."
          correct: false
      explanation: "Діяча в -но/-то конструкції краще зробити підметом."
    - question: "Речення: Вони зустрілися з новою наставницею."
      min_correct: 2
      options:
        - text: "З керує орудним."
          correct: true
        - text: "Новою наставницею є супровід або співучасник зустрічі."
          correct: true
        - text: "Наставницею є інструментом зустрічі."
          correct: false
        - text: "Правильно: з нова наставниця."
          correct: false
      explanation: "Уся іменна група стоїть в орудному."
    - question: "Речення: Голос лився рікою."
      min_correct: 2
      options:
        - text: "Рікою створює образне порівняння."
          correct: true
        - text: "Це доречно в художньому або образному стилі."
          correct: true
        - text: "Рікою є реальним інструментом мовлення."
          correct: false
        - text: "Форма має бути ріку."
          correct: false
      explanation: "Орудний порівняння не називає фізичне знаряддя."
    - question: "Речення: Ранками вона працює за комп'ютером."
      min_correct: 2
      options:
        - text: "Ранками називає повторюваний час."
          correct: true
        - text: "За комп'ютером є прийменниковою групою з орудним."
          correct: true
        - text: "Комп'ютером тут є прямим додатком."
          correct: false
        - text: "Ранками є родовим множини."
          correct: false
      explanation: "У реченні поєднано часовий і прийменниковий орудний."
    - question: "Речення: Ми оплатили квитки карткою."
      min_correct: 2
      options:
        - text: "Карткою називає засіб оплати."
          correct: true
        - text: "Прийменник з тут не потрібен."
          correct: true
        - text: "Правильно лише: оплатили з карткою."
          correct: false
        - text: "Карткою є орудним супроводу."
          correct: false
      explanation: "Засіб оплати виражається без прийменника."
    - question: "Речення: Вона виявилася доброю редакторкою."
      min_correct: 2
      options:
        - text: "Редакторкою є іменною частиною присудка."
          correct: true
        - text: "Доброю узгоджується з редакторкою в орудному."
          correct: true
        - text: "Редакторкою є знаряддям дії."
          correct: false
        - text: "Форма має бути добра редакторка."
          correct: false
      explanation: "Виявитися ким? доброю редакторкою."
    - question: "Речення: Поза законом такі дії неприпустимі."
      min_correct: 2
      options:
        - text: "Поза керує орудним."
          correct: true
        - text: "Законом тут позначає межу правового поля."
          correct: true
        - text: "Законом є інструментом фізичної дії."
          correct: false
        - text: "Поза завжди керує знахідним."
          correct: false
      explanation: "Поза законом є абстрактною прийменниковою групою з орудним."

