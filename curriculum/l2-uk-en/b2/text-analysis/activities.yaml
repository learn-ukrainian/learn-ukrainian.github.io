version: '1.0'
module: text-analysis
level: b2

inline:
  - id: act-1
    type: reading
    title: Три рівні змісту
    instruction: Прочитайте фрагмент і розмежуйте факт, інтерпретацію та підтекст.
    text: >-
      Міська рада перенесла голосування щодо транспортної реформи на наступний
      тиждень. У повідомленні сказано, що депутатам потрібен додатковий час
      для консультацій. Автор колонки додає: "Мешканці знову чекають, поки
      чиновники наважаться назвати конкретні строки".
    source: Навчальний фрагмент для модуля B2.
    tasks:
      - Який факт можна перевірити незалежно від оцінки автора?
      - Яка фраза містить авторську інтерпретацію?
      - Що дає зрозуміти слово "знову"?
      - Який підтекст створює дієслово "наважаться"?
      - Якого контексту бракує для повного висновку?

  - id: act-2
    type: critical-analysis
    title: Лексика й конотація
    target_text: "Міська рада знову відклала розмову про транспортну реформу, хоча містяни чекають конкретних рішень уже кілька місяців."
    questions:
      - Які слова містять оцінку, а не лише факт?
      - Як дієслово "відклала" змінює сприйняття події?
      - Якою нейтральнішою фразою можна передати той самий факт?
    model_answers:
      - "Оцінку створюють слова 'знову', 'відклала', 'чекають конкретних рішень'."
      - "Дієслово 'відклала' натякає на зволікання, а не просто на процедурне перенесення."
      - "Нейтральніше: 'Міська рада перенесла обговорення транспортної реформи на наступне засідання'."

  - id: act-3
    type: critical-analysis
    title: Синтаксис і відповідальність
    target_text: "Рішення було перенесено на наступний тиждень у зв'язку з потребою додаткових консультацій."
    questions:
      - Хто виконавець дії в цьому реченні?
      - Як безособова конструкція впливає на видимість відповідальності?
      - Як переписати речення з активним виконавцем?
    model_answers:
      - "Виконавця прямо не названо."
      - "Безособова конструкція переносить увагу з того, хто вирішив, на сам факт перенесення."
      - "Наприклад: 'Комісія перенесла рішення на наступний тиждень через потребу додаткових консультацій'."

  - id: act-4
    type: critical-analysis
    title: Прагматика адресата
    target_text: >-
      Кожен відповідальний містянин розуміє: без нових правил паркування
      центр залишиться хаотичним. Ми всі хочемо безпечного простору, тому
      маємо підтримати запропоноване рішення вже зараз.
    questions:
      - Яку роль автор пропонує читачеві?
      - Чому фраза "кожен відповідальний містянин" може тиснути на адресата?
      - Який прагматичний ефект має займенник "ми"?
    model_answers:
      - "Читачеві пропонують роль відповідального учасника міської спільноти."
      - "Фраза натякає, що незгода може виглядати як безвідповідальність."
      - "Займенник 'ми' створює відчуття спільної мети й спільної дії."

  - id: act-5
    type: critical-analysis
    title: Мініаналіз колонки
    target_text: >-
      Коли місто втрачає старі дерева, воно втрачає не лише тінь. Воно
      втрачає пам'ять про повільне життя, у якому подвір'я було місцем
      зустрічі, а не тільки територією для паркування.
    questions:
      - Який образ створює автор?
      - Що є підтекстом зіставлення "зустріч" і "паркування"?
      - Сформулюйте авторську інтенцію одним реченням.
    model_answers:
      - "Автор створює образ міста як простору пам'яті й людських зв'язків."
      - "Зіставлення натякає на конфлікт між спільнотним життям і утилітарним використанням простору."
      - "Автор хоче переконати читача бачити в деревах частину міської пам'яті, а не лише елемент благоустрою."

workbook:
  - type: select
    title: Рівні аналізу
    instruction: Виберіть точне пояснення.
    items:
      - question: Що належить до фактологічного рівня?
        options:
          - text: Перевірна дата публікації звіту.
            correct: true
          - text: Прихована іронія автора.
            correct: false
          - text: Емоційний відтінок слова.
            correct: false
          - text: Портрет адресата.
            correct: false
        explanation: Фактологічний рівень відповідає на питання що, де і коли.
      - question: Що найкраще описує підтекст?
        options:
          - text: Непрямий смисл, підтриманий мовними маркерами.
            correct: true
          - text: Будь-яка фантазія читача.
            correct: false
          - text: Список джерел.
            correct: false
          - text: Орфографічна норма.
            correct: false
        explanation: Підтекст має спиратися на слова, контрасти або замовчування.
      - question: Що робить конотація?
        options:
          - text: Додає оцінне або емоційне забарвлення.
            correct: true
          - text: Називає лише базове значення.
            correct: false
          - text: Замінює жанр тексту.
            correct: false
          - text: Позначає дату події.
            correct: false
        explanation: Конотація відрізняється від денотації.
      - question: Коли емоційна лексика стає проблемною?
        options:
          - text: Коли вона замінює докази.
            correct: true
          - text: Коли автор наводить приклади.
            correct: false
          - text: Коли текст має абзаци.
            correct: false
          - text: Коли речення граматично правильне.
            correct: false
        explanation: Емоція без доказу може тиснути на читача.
      - question: Що показує портрет адресата?
        options:
          - text: Яких знань і дій текст очікує від читача.
            correct: true
          - text: Лише вік автора.
            correct: false
          - text: Кількість речень.
            correct: false
          - text: Тип шрифту.
            correct: false
        explanation: Адресат видно через тон, терміни й приклади.
      - question: Навіщо аналізувати синтаксис?
        options:
          - text: Щоб побачити темп, акценти й відповідальність.
            correct: true
          - text: Щоб не читати лексику.
            correct: false
          - text: Щоб замінити висновок переказом.
            correct: false
          - text: Щоб прибрати жанровий контекст.
            correct: false
        explanation: Синтаксис працює разом зі змістом.
      - question: Який висновок є аналітичним?
        options:
          - text: Той, що називає стиль, аудиторію, позицію і докази.
            correct: true
          - text: Той, що каже "мені сподобалося".
            correct: false
          - text: Той, що повторює заголовок.
            correct: false
          - text: Той, що не містить прикладів.
            correct: false
        explanation: Висновок має збирати спостереження в доказову тезу.
      - question: Що є нейтральнішою редакцією фрази "місто знову відклало розмову"?
        options:
          - text: Обговорення перенесено на наступне засідання.
            correct: true
          - text: Місто зрадило всіх мешканців.
            correct: false
          - text: Усі знову чекатимуть без кінця.
            correct: false
          - text: Розмова остаточно провалена.
            correct: false
        explanation: Нейтральна редакція прибирає оцінний докір.

  - type: unjumble
    title: Ключові формули аналізу
    instruction: Відновіть формули для аналітичної записки.
    items:
      - words: [Авторська, позиція, простежується, у, доборі, оцінної, лексики]
        answer: Авторська позиція простежується у доборі оцінної лексики
      - words: [Цільова, аудиторія, має, спільний, міський, досвід, читання]
        answer: Цільова аудиторія має спільний міський досвід читання
      - words: [Підтекст, підтверджують, повтор, контраст, і, значущі, замовчування]
        answer: Підтекст підтверджують повтор контраст і значущі замовчування
      - words: [Жанр, визначає, очікувану, глибину, пояснення, для, читача]
        answer: Жанр визначає очікувану глибину пояснення для читача
      - words: [Конотація, впливає, на, емоційну, реакцію, уважного, адресата]
        answer: Конотація впливає на емоційну реакцію уважного адресата
      - words: [Безособова, конструкція, може, приховувати, реального, виконавця, дії]
        answer: Безособова конструкція може приховувати реального виконавця дії
      - words: [Риторичне, питання, часто, підштовхує, читача, до, висновку]
        answer: Риторичне питання часто підштовхує читача до висновку
      - words: [Аналітична, записка, має, спиратися, на, конкретні, мовні, маркери]
        answer: Аналітична записка має спиратися на конкретні мовні маркери

  - type: fill-in
    title: Терміни аналізу тексту
    instruction: Уставте ключовий термін у правильній формі.
    items:
      - sentence: "Основне предметне значення слова називають ____."
        answer: "денотацією"
        options: [денотацією, парцеляцією, інверсією, аудиторією]
        explanation: Денотація відповідає за базове значення.
      - sentence: "Додаткове оцінне забарвлення слова - це ____."
        answer: "конотація"
        options: [конотація, дата, жанр, цитата]
        explanation: Конотація створює емоційний або культурний відтінок.
      - sentence: "Непрямий смисл між рядками називають ____."
        answer: "підтекстом"
        options: [підтекстом, лідом, регламентом, фреймінгом]
        explanation: Підтекст треба підтверджувати мовними маркерами.
      - sentence: "Той, кому адресовано текст, - це ____."
        answer: "адресат"
        options: [адресат, адресант, автор, редактор]
        explanation: Адресат визначає тон, приклади й рівень пояснення.
      - sentence: "Відокремлення частини речення для акценту - це ____."
        answer: "парцеляція"
        options: [парцеляція, денотація, верифікація, компроміс]
        explanation: Парцеляція створює паузу й посилює наголос.
      - sentence: "Зміна звичного порядку слів називається ____."
        answer: "інверсією"
        options: [інверсією, джинсою, лідом, компромісом]
        explanation: Інверсія змінює логічний наголос.
      - sentence: "Намір автора у ситуації спілкування - це ____."
        answer: "інтенція"
        options: [інтенція, дата, цитата, абревіатура]
        explanation: Інтенція пояснює комунікативну мету.
      - sentence: "Сфера публічного мовлення й аргументів - це ____."
        answer: "дискурс"
        options: [дискурс, таймінг, лід, фейк]
        explanation: Дискурс охоплює мовні практики навколо теми.
      - sentence: "Оцінне слово потребує ____ у тексті."
        answer: "доказу"
        options: [доказу, рими, реклами, паузи]
        explanation: Оцінка без доказу може тиснути на читача.
      - sentence: "Аналіз адресата допомагає зрозуміти ____ тексту."
        answer: "прагматику"
        options: [прагматику, орфографію, нумерацію, шрифт]
        explanation: Прагматика показує, що текст робить із читачем.

  - id: wb-reading
    type: reading
    title: Офіційна заява і пост
    text: >-
      Офіційна заява: "Рух транспорту буде тимчасово обмежено у зв'язку з
      проведенням ремонтних робіт". Пост у соцмережі: "Центр знову перекриють,
      бо ремонтники доробляють те, що обіцяли завершити ще навесні".
    tasks:
      - Який текст нейтральніший?
      - Яке слово в пості створює критику повторюваності?
      - Де відповідальність названа прямо, а де прихована?
      - Який текст краще підходить для офіційного сайту?

  - id: wb-critical
    type: critical-analysis
    title: Повний висновок
    target_text: >-
      Автор пише, що місто "нарешті згадало про людей у заторах", але не
      наводить даних про кількість затримок або попередні рішення.
    questions:
      - Яку оцінку створює слово "нарешті"?
      - Яких доказів бракує для сильного висновку?
      - Як сформулювати обережний аналітичний висновок?
    model_answers:
      - "Слово 'нарешті' натякає, що дія була запізнілою."
      - "Бракує даних про кількість затримок, попередні рішення і реакцію мешканців."
      - "Можна написати: 'Фраза створює критичний ефект, але твердження про системне зволікання потребує додаткових фактів'."
