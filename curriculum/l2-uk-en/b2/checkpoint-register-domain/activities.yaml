  - type: critical-analysis
    id: register-domain-critical-analysis
    title: "Критичний аналіз: межа оцінки"
    instruction: "Проаналізуйте фрагмент і поясніть межу між критикою та звинуваченням."
    target_text: >
      У публіцистичному тексті написано: "Міська рада знову приховала кошторис, і це доводить корупцію". Автор хоче критикувати непрозорість, але формулювання вже містить припущення про мотив і правове звинувачення без доказів.
    questions:
      - "Яку частину критики можна залишити?"
      - "Чому слово «приховала» потребує обережності?"
      - "Чому формула «доводить корупцію» є правово небезпечною?"
      - "Який нейтральніший варіант можна запропонувати?"
      - "Як зберегти критичний зміст без безпідставного звинувачення?"
    model_answers:
      - "Можна залишити критику непрозорості й вимогу оприлюднити кошторис."
      - "Слово «приховала» називає мотив, який треба довести; нейтральніше: «не оприлюднила»."
      - "Формула «доводить корупцію» робить правовий висновок без доказів і процедури."
      - "Відповідальніше: «Міська рада не оприлюднила кошторис, тому громада не може перевірити витрати й підстави рішення»."
      - "Критичний зміст зберігають через конкретну проблему, документ і потребу перевірки, а не через категоричне звинувачення."
    focus_points:
      - "правова обережність"
      - "публіцистична оцінка"
      - "точність терміна"
      - "редагування регістру"

  - type: essay-response
    id: register-domain-register-switching
    title: "Письмо: перемикання регістру"
    instruction: "Напишіть три версії одного змісту."
    prompt: >
      Візьміть зміст: "освітню програму підтримали, але кошторис і критерії результативності не оприлюднено". Напишіть три варіанти: нейтральне повідомлення, офіційний запит і публіцистичний коментар. Після кожного варіанта коротко поясніть, які слова й конструкції створюють регістр.
