version: '1.0'
module: checkpoint-register-domain
level: b2
inline:
  - type: reading
    id: act-1
    title: "Паспорт змішаного фрагмента"
    instruction: "Прочитайте фрагмент і визначте домінанту, допустиму вставку та місце для редагування."
    source: "Авторський навчальний фрагмент для checkpoint B2."
    text: >-
      Міська рада повідомила, що консультацію щодо маршруту перенесено на підставі звернення мешканців. У коментарях частина учасників написала: "Добре, що дали ще час, бо схема поки туманна". Організатори зазначили, що оновлений кошторис і карту об'їзду оприлюднять до п'ятниці. Один дописувач назвав рішення "повним провалом", але не навів жодного джерела.
    tasks:
      - "Назвіть домінантний регістр фрагмента."
      - "Випишіть офіційно-діловий маркер."
      - "Поясніть, чому розмовну цитату можна залишити тільки як голос учасника."
      - "Знайдіть оцінку без доказу й запропонуйте нейтральнішу авторську версію."
      - "Назвіть предметну сферу й два терміни, що її підтримують."

  - type: select
    title: "Стилістичний ресурс чи шум"
    instruction: "Оберіть твердження, які точно оцінюють прийом і його регістрову доречність."
    items:
      - question: "Фраза «без кошторису немає контролю; без контролю немає довіри» у колонці працює як:"
        min_correct: 2
        options:
          - text: "паралелізм, що організує публічний аргумент"
            correct: true
          - text: "офіційний реквізит документа"
            correct: false
          - text: "риторичне підсилення, яке треба підкріпити фактом"
            correct: true
          - text: "правова кваліфікація винуватості"
            correct: false
        explanation: "Повтор має аргументативну функцію, але не замінює доказ."
      - question: "Речення «у коридорі зафіксовано недостатній рівень освітлення» найкраще пасує до:"
        options:
          - text: "службового або технічного опису"
            correct: true
          - text: "ліричного опису атмосфери"
            correct: false
          - text: "дружнього чату"
            correct: false
          - text: "репліки персонажа без авторського коментаря"
            correct: false
        explanation: "Безособова формула й точна ознака підтримують формальний опис."
      - question: "Фраза «цунамі критики» небезпечна в новині, якщо:"
        options:
          - text: "немає даних про кількість реакцій"
            correct: true
          - text: "є чітке джерело й статистика"
            correct: false
          - text: "текст є художнім монологом"
            correct: false
          - text: "потрібна лише інструкція маршруту"
            correct: false
        explanation: "Сильна метафора без масштабу перебільшує факт."
      - question: "Риторичне питання «Хіба можна довіряти рішенню без кошторису?» доречне насамперед у:"
        options:
          - text: "публічному виступі або аналітичній колонці"
            correct: true
          - text: "юридичній ухвалі"
            correct: false
          - text: "таблиці витрат"
            correct: false
          - text: "офіційному реквізиті листа"
            correct: false
        explanation: "Риторичне питання впливає на адресата; правовий документ потребує твердження й підстави."
      - question: "Фраза «маршрут поволі спускається до річки» є прикладом:"
        options:
          - text: "образного опису простору"
            correct: true
          - text: "юридичної термінології"
            correct: false
          - text: "ділового дедлайну"
            correct: false
          - text: "нейтральної інструкції для водія"
            correct: false
        explanation: "Дієслово створює образ руху, але не дає точної навігації."
      - question: "Повтор терміна в науковому або правовому тексті часто треба залишити, бо він:"
        options:
          - text: "зберігає поняттєву точність"
            correct: true
          - text: "завжди робить текст емоційнішим"
            correct: false
          - text: "замінює посилання на джерело"
            correct: false
          - text: "автоматично створює художній ефект"
            correct: false
        explanation: "У формальних сферах точність терміна важливіша за декоративну варіативність."
      - question: "Парцеляція «Чекали відповіді. Довго. Без пояснень.» найкраще працює як:"
        options:
          - text: "публіцистичний або художній акцент на тривалому очікуванні"
            correct: true
          - text: "обов'язковий реквізит службового документа"
            correct: false
          - text: "правова підстава рішення"
            correct: false
          - text: "нейтральна навігаційна інструкція"
            correct: false
        explanation: "Парцеляція створює емоційний фокус, тому в офіційному тексті її зазвичай нейтралізують."
      - question: "Фраза «рішення критикують через відсутність публічного кошторису» сильніша за «рішення погане», бо:"
        options:
          - text: "називає причину оцінки"
            correct: true
          - text: "відмовляється від будь-якого факту"
            correct: false
          - text: "звучить більш розмовно"
            correct: false
          - text: "перетворює новину на художній опис"
            correct: false
        explanation: "Оцінка стає переконливішою, коли має перевірну підставу."

  - type: match-up
    title: "Сфера і мовний маркер"
    instruction: "Поєднайте маркер із сферою або функцією, де він працює найточніше."
    pairs:
      - left: "кошторис"
        right: "ділова або адміністративна оцінка витрат"
      - left: "ухвала"
        right: "правове або процедурне рішення"
      - left: "обряд"
        right: "традиційна практика з послідовністю дій"
      - left: "набережна"
        right: "опис міського простору"
      - left: "фреймінг"
        right: "рамка подання теми в публічному дискурсі"
      - left: "алітерація"
        right: "звуковий повтор як стилістичний ресурс"
      - left: "підзвітність"
        right: "публічне пояснення рішень і результатів"
      - left: "реквізит"
        right: "обов'язковий елемент офіційного документа"
      - left: "голос персонажа"
        right: "ознака художнього або літературного аналізу"
      - left: "маршрут"
        right: "просторова інструкція або опис руху"

  - type: fill-in
    title: "Переписування за адресатом"
    instruction: "Вставте формулу, яка відповідає потрібному регістру."
    items:
      - sentence: "Офіційний лист: ____ про перенесення зустрічі на 14 липня."
        answer: "Повідомляємо"
        options: ["Повідомляємо", "Слухайте", "Класно", "Мабуть"]
        explanation: "Офіційний лист починає дію нейтральною формулою."
      - sentence: "Діловий чат: Колеги, зустріч ____ на 14 липня, матеріали треба оновити до п'ятниці."
        answer: "переносимо"
        options: ["переносимо", "ухвалюється", "велично спливає", "типу буде"]
        explanation: "Для командного чату природне коротке дієслово й конкретний строк."
      - sentence: "Новина: За повідомленням організаторів, новий графік ____ до 16:00."
        answer: "оприлюднять"
        options: ["оприлюднять", "забалакають", "відчують", "сховається"]
        explanation: "Новина називає джерело й публічну дію."
      - sentence: "Юридичний коментар: Рішення набере чинності ____ його оприлюднення."
        answer: "після"
        options: ["після", "десь біля", "якось після", "настрійно"]
        explanation: "Правовий регістр потребує точної часової умови."
      - sentence: "Опис маршруту: Після перехрестя поверніть ____ і рухайтеся 300 метрів."
        answer: "праворуч"
        options: ["праворуч", "прекрасно", "юридично", "підзвітно"]
        explanation: "Навігаційний текст потребує просторового орієнтира."
      - sentence: "Текст про традиції: У цьому регіоні обряд ____ кілька локальних варіантів."
        answer: "має"
        options: ["має", "завжди однаковий", "винуватий", "окуповує"]
        explanation: "Обережне формулювання визнає регіональну різноманітність."
      - sentence: "Аналітика: Оцінка має спиратися на ____ або джерело."
        answer: "факт"
        options: ["факт", "ярлик", "жарт", "плітку"]
        explanation: "Публічний аналіз розводить факт і оцінку."
      - sentence: "Художній опис: Авторська деталь допомагає показати ____ персонажа."
        answer: "перспективу"
        options: ["перспективу", "реквізит", "позов", "дедлайн"]
        explanation: "У літературному аналізі важлива точка зору або перспектива."
      - sentence: "Офіційний документ: У зверненні бракує обов'язкового ____."
        answer: "реквізиту"
        options: ["реквізиту", "епітета", "жарту", "пейзажу"]
        explanation: "Реквізит є обов'язковим елементом офіційного документа."
      - sentence: "Публічний аналіз: Сильний ____ не має замінювати джерело."
        answer: "фреймінг"
        options: ["фреймінг", "перехрестя", "дедлайн", "ухвала"]
        explanation: "Рамка подання теми важлива, але вона не замінює доказу."

  - type: error-correction
    title: "Редакторська діагностика"
    instruction: "Виберіть виправлений варіант і поясніть, що саме було порушено."
    items:
      - sentence: "По цьому питанню було прийнято рішення."
        error: "по цьому питанню; було прийнято рішення"
        answer: "Комісія ухвалила рішення щодо цього питання."
        options:
          - "Комісія ухвалила рішення щодо цього питання."
          - "Комісія зробила прийняття по цьому питанню."
          - "По цьому питанню рішення само прийнялося."
          - "Комісія дуже рішуче вирішила рішення."
        explanation: "Нормативно: щодо цього питання; просте дієслово ухвалила точніше."
      - sentence: "У звіті написали, що маршрут капець незручний."
        error: "капець незручний"
        answer: "У звіті зазначили, що маршрут має незручні пересадки."
        options:
          - "У звіті зазначили, що маршрут має незручні пересадки."
          - "У звіті написали, що маршрут прям дуже такий."
          - "У звіті капецьово зазначили маршрут."
          - "Маршрут у звіті якось не дуже."
        explanation: "Формальний звіт потребує конкретної ознаки, а не розмовного маркера."
      - sentence: "Суд довів, що людина точно винна."
        error: "Суд довів; точно винна"
        answer: "Суд розглянув докази й ухвалив рішення у справі."
        options:
          - "Суд розглянув докази й ухвалив рішення у справі."
          - "Суд емоційно довів усім усе."
          - "Суд сказав, що людина сто відсотків погана."
          - "Судове рішення якось довелося."
        explanation: "Правовий регістр має називати процедуру, а не побутову моральну оцінку."
      - sentence: "Українці завжди однаково виконують цей обряд."
        error: "завжди однаково"
        answer: "У різних регіонах цей обряд має локальні варіанти."
        options:
          - "У різних регіонах цей обряд має локальні варіанти."
          - "Українці точно всі без винятку роблять однаково."
          - "Обряд однаковий, бо так звучить традиційно."
          - "Усі регіони завжди повторюють одну форму."
        explanation: "Тема традицій потребує обережної межі узагальнення."
      - sentence: "Було здійснено оплату рахунку."
        error: "здійснено оплату"
        answer: "Рахунок оплачено."
        options:
          - "Рахунок оплачено."
          - "Було зроблено здійснення оплати рахунку."
          - "Рахунок якось проплатився."
          - "Оплата здійснилася рахунком."
        explanation: "Канцеляризм можна замінити коротшою формальною конструкцією."
      - sentence: "Це рішення - повний провал, кажуть джерела."
        error: "повний провал; джерела"
        answer: "Двоє учасників розкритикували рішення через відсутність кошторису."
        options:
          - "Двоє учасників розкритикували рішення через відсутність кошторису."
          - "Джерела просто вважають усе провалом."
          - "Повний провал повідомляється джерелами."
          - "Рішення провально провалилося."
        explanation: "Публічний текст має назвати джерело, кількість або підставу оцінки."
      - sentence: "Старі стіни стишували кроки у службовому акті огляду."
        error: "образність у службовому акті"
        answer: "В акті зафіксовано слабку звукоізоляцію приміщення."
        options:
          - "В акті зафіксовано слабку звукоізоляцію приміщення."
          - "В акті стіни сумно стишували все."
          - "Службовий акт крокував стінами."
          - "Кроки в акті художньо тремтіли."
        explanation: "Офіційний опис перетворює образ на спостережувану ознаку."
      - sentence: "В теперішній час ми маємо попереднє планування наперед."
        error: "в теперішній час; попереднє планування наперед"
        answer: "Зараз ми плануємо наступний етап."
        options:
          - "Зараз ми плануємо наступний етап."
          - "У теперішній час наперед попередньо плануємо."
          - "Планування планується попередньо."
          - "Ми маємо часову теперішність планування."
        explanation: "Плеоназми й канцеляризми треба прибрати без втрати змісту."

  - type: critical-analysis
    id: act-6
    title: "Джерело, рамка, відповідальність"
    instruction: "Проаналізуйте публічний фрагмент і запропонуйте безпечну правку."
    target_text: >-
      Експерти кажуть, що старий обряд втратив справжній зміст, а громада нарешті прокинулася. Організатори планують показати речі з родинних архівів і називають виставку живою пам'яттю.
    questions:
      - "Де факт, де оцінка, а де метафора?"
      - "Яке джерело або межу узагальнення треба уточнити?"
      - "Чому фраза «справжній зміст» небезпечна без критерію?"
      - "Який регістр має керувати авторським текстом?"
      - "Запропонуйте одну нейтральнішу версію першого речення."
    model_answers:
      - "Факт: організатори планують показати речі з родинних архівів. Оцінки: «втратив справжній зміст», «громада нарешті прокинулася». Метафора: «жива пам'ять»."
      - "Потрібно назвати, хто саме говорить, про який регіон або матеріал ідеться, і чи це позиція організаторів, куратора або дослідника."
      - "«Справжній зміст» створює нормативну оцінку без доказу й може знецінити локальні практики."
      - "Домінанта має бути інформаційно-аналітична з обережною культурною лексикою."
      - "Нейтральніше: «Дослідники виставки зазначають, що значення обряду змінювалося в різних родинних практиках»."

workbook:
  - type: reading
    id: workbook-1
    title: "Читання: рішення, маршрут і культурна подія"
    instruction: "Прочитайте текст і підготуйтеся до комплексного аналізу регістру."
    source: "Авторський навчальний текст для контрольного модуля B2."
    text: >-
      Музей громади повідомив, що у вересні відкриє виставку про родинні обряди й міські маршрути пам'яті. За словами кураторки, експозиція покаже, як речі з приватних архівів допомагають говорити про історію району без гучних узагальнень. Міська рада планує профінансувати частину навігаційних матеріалів, але кошторис ще не оприлюднено. У бізнесовій презентації партнерів зазначено, що проєкт може підвищити туристичну привабливість центру. У соцмережах частина мешканців підтримала ідею, а частина написала, що "без цифр це поки красива афіша". Юридичний відділ уточнює умови використання приватних фото.
    tasks:
      - "Назвіть основну домінанту тексту."
      - "Знайдіть два офіційні або адміністративні маркери."
      - "Знайдіть бізнесовий маркер і поясніть його функцію."
      - "Поясніть, чому розмовну репліку можна залишити як цитату."
      - "Назвіть чутливу культурну межу, яку текст має зберегти."
      - "Запропонуйте одну правку, яка посилить джерельну точність."

  - type: quiz
    title: "Quiz: класифікація й доказ"
    instruction: "Оберіть найточнішу відповідь."
    items:
      - question: "Який перший крок у checkpoint-аналізі регістру?"
        options:
