version: '1.0'
module: checkpoint-register-domain
level: b2
inline: []
workbook:
  - type: reading
    id: register-domain-reading-council
    title: "Читання: рішення громадської ради"
    instruction: "Прочитайте фрагмент і визначте, як у ньому поєднуються регістри та предметні сфери."
    source: "Навчальний текст для контрольного модуля B2."
    text: >
      Громадська рада підтримала освітню програму для старшокласників, однак кошторис проєкту станом на день обговорення не оприлюднено. У повідомленні зазначено, що фінансування планують залучити з міського бюджету й партнерських внесків. Частина учасників консультацій вважає рішення перспективним, але просить надати дані про очікувані витрати, критерії результативності та відповідальних виконавців. Один із коментаторів у соцмережі написав: "Ідея непогана, але без цифр це виглядає туманно". Юридичний відділ повідомив, що правову експертизу проєкту ще не завершено.
    tasks:
      - "Назвіть стильову домінанту основного повідомлення."
      - "Знайдіть політичну лексику."
      - "Знайдіть економічну лексику."
      - "Знайдіть правову лексику."
      - "Випишіть розмовну реакцію коментатора."
      - "Поясніть, чому слово «туманно» не підходить для офіційного звіту."
      - "Сформулюйте нейтральніше речення про відсутність кошторису."
      - "Назвіть дані, яких бракує для оцінки рентабельності."
      - "Поясніть, чому правову оцінку не можна робити до завершення експертизи."
      - "Перепишіть останнє речення у публіцистичному регістрі."

  - type: quiz
    title: "Тест: стильова діагностика"
    instruction: "Оберіть найточнішу відповідь."
    items:
      - question: "Стильова домінанта тексту визначає:"
        options:
          - text: "який стиль керує текстом загалом"
            correct: true
          - text: "скільки прикметників ужито в тексті"
            correct: false
          - text: "чи є в тексті складні речення"
            correct: false
          - text: "який абзац найдовший"
            correct: false
        explanation: "Домінанта показує головну комунікативну організацію тексту."
      - question: "Найдоречніше для офіційного запиту:"
        options:
          - text: "Просимо надати кошторис програми."
            correct: true
          - text: "Покажіть уже ті цифри."
            correct: false
          - text: "Без цифр усе якось мутно."
            correct: false
          - text: "Громада вирує через темну історію."
            correct: false
        explanation: "Офіційний запит потребує ввічливої процедури й точного документа."
      - question: "Слово «рентабельність» належить передусім до:"
        options:
          - text: "економічної лексики"
            correct: true
          - text: "розмовної лексики"
            correct: false
          - text: "конфесійної лексики"
            correct: false
          - text: "художньої лексики"
            correct: false
        explanation: "Рентабельність описує співвідношення результату й витрат."
      - question: "Безпідставне слово «корупція» у новині створює ризик:"
        options:
          - text: "необґрунтованого правового звинувачення"
            correct: true
          - text: "надто нейтрального тону"
            correct: false
          - text: "нестачі розмовних маркерів"
            correct: false
          - text: "надлишку фонетичних засобів"
            correct: false
        explanation: "Правові твердження потребують доказу й процедури."
      - question: "Фраза «це капець як дивно» має регістр:"
        options:
          - text: "розмовно-експресивний"
            correct: true
          - text: "науково-термінологічний"
            correct: false
          - text: "офіційно-діловий"
            correct: false
          - text: "конфесійний"
            correct: false
        explanation: "Маркер «капець як» є розмовним і сильно експресивним."
      - question: "У науковому або правовому тексті повтор терміна часто потрібний, бо він:"
        options:
          - text: "зберігає точність поняття"
            correct: true
          - text: "створює жартівливий тон"
            correct: false
          - text: "замінює докази"
            correct: false
          - text: "знижує регістр"
            correct: false
        explanation: "Термінологічна стабільність важливіша за декоративну варіативність."
      - question: "Публіцистична оцінка є сильною, якщо вона:"
        options:
          - text: "спирається на факт або джерело"
            correct: true
          - text: "звучить максимально різко"
            correct: false
          - text: "не називає діяча"
            correct: false
          - text: "уникає конкретики"
            correct: false
        explanation: "Оцінка без факту перетворюється на емоційний тиск."
      - question: "Слово «ухвала» точніше за «рішення», коли йдеться про:"
        options:
          - text: "офіційну або судову процедуру"
            correct: true
          - text: "дружню побутову пораду"
            correct: false
          - text: "художній пейзаж"
            correct: false
          - text: "розмовний жарт"
            correct: false
        explanation: "Ухвала має процедурно-правовий відтінок."
      - question: "Парцеляція найбільш природна в:"
        options:
          - text: "колонці або художньому фрагменті"
            correct: true
          - text: "кошторисі"
            correct: false
          - text: "протоколі судового засідання"
            correct: false
          - text: "офіційному переліку документів"
            correct: false
        explanation: "Парцеляція створює ритм і акцент, тому потребує контрольованого контексту."
      - question: "Канцеляризм стає проблемою, коли він:"
        options:
          - text: "імітує офіційність і приховує дію"
            correct: true
          - text: "уточнює документ"
            correct: false
          - text: "називає відповідального виконавця"
            correct: false
          - text: "скорочує фразу"
            correct: false
        explanation: "Офіційність має бути точною, а не туманною."
      - question: "Найкраща заміна для кальки «по цьому питанню»:"
        options:
          - text: "щодо цього питання"
            correct: true
          - text: "по цьому питанню"
            correct: false
          - text: "на дану тему"
            correct: false
          - text: "по питанню цьому"
            correct: false
        explanation: "Нормативно й природно: «щодо цього питання»."
      - question: "Фраза «бюджет нормальний» у аналітичному тексті слабка, бо:"
        options:
          - text: "не має критерію оцінки"
            correct: true
          - text: "містить забагато термінів"
            correct: false
          - text: "є надто офіційною"
            correct: false
          - text: "містить алітерацію"
            correct: false
        explanation: "Аналітика потребує конкретних витрат, джерел і показників."
      - question: "Етичний регістр особливо важливий у темах:"
        options:
          - text: "війни, втрат, пам'яті й гідності"
            correct: true
          - text: "нейтрального розкладу транспорту"
            correct: false
          - text: "списку офісного обладнання"
            correct: false
          - text: "таблиці неправильних дієслів"
            correct: false
        explanation: "Такі теми потребують точності й людяності."
      - question: "Сильне B2-пояснення виправлення має містити:"
        options:
          - text: "причину, регістр і комунікативну мету"
            correct: true
          - text: "лише слова «так краще»"
            correct: false
          - text: "максимально довгу фразу"
            correct: false
          - text: "англійський переклад"
            correct: false
        explanation: "B2 вимагає усвідомленого обґрунтування мовного вибору."

  - type: match-up
    title: "Поєднання: терміни й функції"
    instruction: "Поєднайте слово або формулу з її комунікативною функцією."
    pairs:
      - left: "кошторис"
        right: "деталізований розрахунок витрат"
      - left: "рентабельність"
        right: "співвідношення результату й витрат"
      - left: "ухвала"
        right: "процедурне рішення компетентного органу"
      - left: "юрисдикція"
        right: "межа правових повноважень"
      - left: "мандат"
        right: "надане повноваження діяти"
      - left: "підзвітність"
        right: "обов'язок пояснювати рішення й результати"
      - left: "стильова домінанта"
        right: "головний регістр, що керує текстом"
      - left: "стилістичний дисонанс"
        right: "невідповідність мовного засобу ситуації"
      - left: "конотація"
        right: "додатковий оцінний або емоційний відтінок"
      - left: "канцеляризм"
        right: "надмірно офіційна або туманна формула"
      - left: "алітерація"
        right: "повтор приголосних"
      - left: "асонанс"
        right: "повтор голосних"
      - left: "метонімія"
        right: "перенесення за суміжністю"
      - left: "парцеляція"
        right: "навмисне відокремлення фрагмента"
      - left: "презумпція невинуватості"
        right: "обережність із твердженням про вину"
      - left: "термінологічна міграція"
        right: "перехід терміна між сферами зі зміною відтінку"

  - type: error-correction
    title: "Редагування: дисонанс і норма"
    instruction: "Виправте кальку, суржик, неточний термін або регістровий дисонанс."
    items:
      - sentence: "По цьому питанню комісія нічого не пояснила."
        error: "По цьому питанню"
        answer: "Щодо цього питання"
        error_type: "phrase"
        explanation: "Нормативно й природно: «щодо цього питання»."
      - sentence: "Комісія прийняла участь в обговоренні кошторису."
        error: "прийняла участь"
        answer: "взяла участь"
        error_type: "phrase"
        explanation: "Українською: брати участь."
      - sentence: "Цей проєкт являється дуже рентабельним."
        error: "являється"
        answer: "є"
        error_type: "word"
        explanation: "У цьому значенні природно: «є»."
      - sentence: "Депутати повинні якось чути людей."
        error: "якось чути людей"
        answer: "оприлюднити відповідь на пропозиції громадян"
        error_type: "register"
        explanation: "Публічний текст потребує конкретної дії."
      - sentence: "Без кошторису це пахне корупцією."
        error: "пахне корупцією"
        answer: "потребує перевірки фінансових документів"
        error_type: "phrase"
        explanation: "Правове звинувачення не можна робити без доказу."
      - sentence: "В теперішній час кошторис не оприлюднений."
        error: "В теперішній час"
        answer: "Нині"
        error_type: "phrase"
        explanation: "Природно: «нині», «зараз», «наразі»."
      - sentence: "Керуючий орган має показати джерела фінансування."
        error: "Керуючий орган"
        answer: "Керівний орган"
        error_type: "word"
        explanation: "Для органу управління вживаємо «керівний»."
      - sentence: "Бюджет програми нормальний, тому рішення окей."
        error: "нормальний, тому рішення окей"
        answer: "потребує оцінки за витратами й очікуваними результатами"
        error_type: "register"
        explanation: "Аналітичний регістр потребує критеріїв."
      - sentence: "Суд точно покарає компанію, бо всі бачать, що вона винна."
        error: "точно покарає"
        answer: "розглядає справу; висновок залежить від доказів"
        error_type: "register"
        explanation: "Правовий текст має поважати процедуру."
      - sentence: "Громадська рада теревенила про інвестиції."
        error: "теревенила"
        answer: "обговорювала"
        error_type: "register"
        explanation: "Розмовне дієслово не відповідає офіційній ситуації."
      - sentence: "Проєкт зробить місто щасливим і багатим."
        error: "щасливим і багатим"
        answer: "може поліпшити освітні можливості за умови стабільного фінансування"
        error_type: "phrase"
        explanation: "Оцінку треба конкретизувати."
      - sentence: "Рішення було прийнято по причині нестачі часу."
        error: "було прийнято по причині"
        answer: "ухвалили через"
        error_type: "phrase"
        explanation: "Природно: «ухвалили через» або «з огляду на»."
      - sentence: "Автор тексту доказує, що інвестиції класні."
        error: "доказує"
        answer: "доводить; перспективні"
        error_type: "word"
        explanation: "Нормативно: «доводить»; у аналітиці потрібне нейтральне означення."
      - sentence: "Учасники консультацій були шоковані супер-процедурою."
        error: "шоковані супер-процедурою"
        answer: "критично оцінили непрозору процедуру"
        error_type: "register"
        explanation: "Публіцистичний текст потребує точнішої оцінки."
      - sentence: "Даний кошторис показує, що порушень немає."
        error: "Даний"
        answer: "Цей; витрати відповідають заявленій меті"
        error_type: "register"
        explanation: "«Даний» часто зайвий; оцінку треба конкретизувати."
      - sentence: "Згідно до рішення комісії програму перенесли."
        error: "Згідно до"
        answer: "Згідно з"
        error_type: "phrase"
        explanation: "Правильне керування: «згідно з»."

  - type: select
    title: "Вибір: доречні формулювання"
    instruction: "Оберіть усі формулювання, доречні для названого регістру."
    items:
      - question: "Офіційний запит."
        min_correct: 2
        options:
          - text: "Просимо надати кошторис програми."
            correct: true
          - text: "Дайте вже цифри, бо дані мутні."
            correct: false
          - text: "Просимо повідомити джерела фінансування."
            correct: true
          - text: "Невже знову приховали дані?"
            correct: false
        explanation: "Офіційний запит має бути точним і процедурним."
      - question: "Публіцистичний аналіз."
        min_correct: 2
        options:
          - text: "Без кошторису громада не може оцінити витрати."
            correct: true
          - text: "Там усе стовідсотково незаконно."
            correct: false
          - text: "Прозорість фінансування є умовою довіри."
            correct: true
          - text: "Це просто капець."
            correct: false
        explanation: "Публіцистична оцінка потребує факту й відповідального тону."
      - question: "Розмовний, але точний коментар."
        min_correct: 2
        options:
          - text: "Ідея непогана, але без кошторису важко оцінити витрати."
            correct: true
          - text: "Пахне корупцією, бо мені так здається."
            correct: false
          - text: "Я б спершу подивився документи."
            correct: true
          - text: "Усі й так розуміють."
            correct: false
        explanation: "Розмовність може бути точною й обережною."
      - question: "Правова обережність."
        min_correct: 2
        options:
          - text: "Справу розглядає суд."
            correct: true
          - text: "Вони точно винні."
            correct: false
          - text: "Висновок залежить від доказів."
            correct: true
          - text: "Юристи якось розберуться."
            correct: false
        explanation: "Правовий регістр не підміняє процедуру припущенням."
      - question: "Економічна точність."
        min_correct: 2
        options:
          - text: "Потрібні дані про витрати й джерела фінансування."
            correct: true
          - text: "Бюджет нормальний."
            correct: false
          - text: "Рентабельність можна оцінити після розрахунку результатів."
            correct: true
          - text: "Інвестиції будуть класні."
            correct: false
        explanation: "Економічний текст потребує критеріїв."
      - question: "Художньо-публіцистична образність із фактом."
        min_correct: 2
        options:
          - text: "Місто чекало відповіді, але протокол так і не оприлюднили."
            correct: true
          - text: "Місто задихалося від байдужості без жодної деталі."
            correct: false
          - text: "Метафора підтримує оцінку, бо далі названо конкретний документ."
            correct: true
          - text: "Гучне слово автоматично посилює доказ."
            correct: false
        explanation: "Образ має спиратися на зміст."
      - question: "Нейтральний навчальний стиль."
        min_correct: 2
        options:
          - text: "Порівняйте три варіанти одного змісту."
            correct: true
          - text: "Це суперважливо, не провтикайте."
            correct: false
          - text: "Визначте, який регістр керує текстом."
            correct: true
          - text: "Влада знову мутить."
            correct: false
        explanation: "Навчальний стиль має бути ясним і контрольованим."
      - question: "Редакторське пояснення."
        min_correct: 2
        options:
          - text: "Слово замінено, бо воно знижує регістр."
            correct: true
          - text: "Так просто красивіше."
            correct: false
          - text: "Термін уточнено, бо загальне слово не передає поняття."
            correct: true
          - text: "Мені так подобається."
            correct: false
        explanation: "B2-пояснення має назвати причину."
      - question: "Канцеляризм, який треба скоротити."
        min_correct: 2
        options:
          - text: "з метою забезпечення належного рівня інформування"
            correct: true
          - text: "просимо надати документи"
            correct: false
          - text: "здійснити надання відповідної документації"
            correct: true
          - text: "повідомити джерела фінансування"
            correct: false
