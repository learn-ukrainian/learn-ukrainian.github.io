  - type: essay-response
    id: workbook-essay-register-domain
    title: "Порівняльний аналіз двох регістрів"
    instruction: "Напишіть аналіз на 300-350 слів. Порівняйте два фрагменти на одну тему й поясніть, як змінюються лексика, синтаксис, джерела та стилістичні ресурси."
    source_reading: workbook-1
    min_words: 300
    prompt: >-
      Порівняйте офіційне повідомлення музею та публічний коментар мешканців про ту саму виставку. Визначте домінанту кожного тексту, назвіть щонайменше три мовні маркери, поясніть одну допустиму вставку іншого регістру й запропонуйте одну правку для джерельної або термінологічної точності.
    model_answer: |-
      > [!model-answer]
      > Офіційне повідомлення музею має інформаційно-адміністративну домінанту. Його маркери - формули на кшталт "повідомив", "планує відкрити", "умови використання", а також предметні слова "експозиція", "навігаційні матеріали", "кошторис". Синтаксис має бути нейтральним і чітким: хто діє, що робить, коли й на якій підставі. Публічний коментар мешканців має іншу функцію: він показує реакцію адресатів і може містити розмовну цитату "без цифр це поки красива афіша". Таку цитату можна залишити, якщо вона позначена як голос учасників, а не як авторський висновок. У тексті важливо не перетворити тему традицій на стереотип: фраза про "родинні обряди" потребує межі джерела або регіону. Також варто уточнити фінансовий блок: "кошторис ще не оприлюднено" краще доповнити датою або відповідальною установою, якщо ці дані відомі. Отже, два регістри не конфліктують, якщо автор розводить факт, оцінку й цитату. Найсильніша правка: "Музей повідомив, що кошторис навігаційних матеріалів оприлюднять після погодження з міською радою; мешканці в коментарях просять надати цифри до відкриття виставки".
    peer_review_guidelines: "Перевірте, чи автор назвав домінанту обох фрагментів; чи кожен маркер прив'язаний до регістру або сфери; чи автор не узагальнює традиції ширше, ніж дозволяє текст; чи запропонована правка зберігає зміст."
    rubric:
      - criteria: "Класифікація"
        description: "Названо домінанти, жанри й адресатів двох фрагментів."
        points: 3
      - criteria: "Докази"
        description: "Наведено конкретні мовні маркери й пояснено їхню функцію."
        points: 3
      - criteria: "Редагування"
        description: "Запропоновано точну правку без зміни фактичного змісту."
        points: 2
      - criteria: "Мова"
        description: "Текст зв'язний, терміни використано доречно."
        points: 2
