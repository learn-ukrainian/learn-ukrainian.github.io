- id: essay-transform-register
  type: essay-response
  title: Редакторський коментар про синтаксичну синонімію
  instruction: Напишіть розгорнуту відповідь українською.
  prompt: Поясніть, як вибрати між дієприкметниковим зворотом і підрядним означальним реченням у новині, науковому тексті
    та офіційному повідомленні.
  min_words: 180
  model_answer: 'Вибір залежить не від бажання скоротити речення будь-якою ціною, а від змісту й реєстру. У новині підрядне
    означальне речення часто краще показує дію учасника: волонтери, які зібрали кошти, передали обладнання лікарні. В офіційному
    повідомленні пасивний дієприкметниковий зворот може бути доречним, коли в центрі документ або рішення: матеріали, подані
    після строку, розглядатимуть окремо. У науковому тексті зворот стискає опис результату: дані, отримані під час досліду.
    Проте трансформація має межі. Люди, які повернулися додому, не те саме, що повернені люди. Так само бажаючі взяти участь
    краще замінити на охочі або ті, хто хоче взяти участь. Редактор перевіряє не лише граматику, а й ритм, точність і природність
    українського тексту.'
  rubric:
  - criteria: Зміст
    description: Пояснює залежність вибору від змісту й реєстру.
    points: 4
  - criteria: Приклади
    description: Наводить щонайменше три нормативні приклади.
    points: 3
  - criteria: Обмеження
    description: Показує випадки, де трансформація змінює зміст.
    points: 3
