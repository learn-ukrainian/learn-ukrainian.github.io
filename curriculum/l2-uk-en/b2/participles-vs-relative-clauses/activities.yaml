version: '1.0'
module: participles-vs-relative-clauses
level: b2
inline:
  - id: act-1
    type: comparative-study
    title: "Один факт, три моделі"
    instruction: "Порівняйте варіанти й визначте, що змінюється у фокусі."
    items_to_compare:
      - "лист, написаний учора"
      - "лист, який брат написав учора"
      - "учорашній лист"
      - "експертка, яка підготувала звіт"
      - "звіт, підготовлений експерткою"
    criteria:
      - "предмет після дії"
      - "названий виконавець"
      - "лексична заміна"
      - "ризик втрати змісту"
    prompt: "Які два варіанти стискають дію, а який розгортає її?"
    model_answer: "Дієприкметник стискає результат дії в ознаку предмета. Підрядне речення розгортає дію й виконавця. Лексична заміна може бути доречною, але вона прибирає саму дію, тому її треба використовувати лише тоді, коли дія не є важливою."

  - id: act-2
    type: comparative-study
    title: "Переклад як редакторський вибір"
    instruction: "Порівняйте англійські підказки й природні українські рішення."
    items_to_compare:
      - "the report prepared yesterday -> звіт, підготовлений учора"
      - "the student who read the article -> студент, який прочитав статтю"
      - "people working in the laboratory -> люди, які працюють у лабораторії"
      - "valid rules -> чинні правила"
      - "materials collected in archive -> матеріали, зібрані в архіві"
    criteria:
      - "дієприкметник"
      - "підрядне речення"
      - "лексична заміна"
      - "збереження ролей"
    prompt: "Назвіть модель для кожного українського варіанта."
    model_answer: "Звіт і матеріали є предметами після дії, тому дієприкметник природний. Студент і люди виконують активну дію, тому потрібне підрядне речення. Valid rules перекладається лексично як чинні правила."

  - id: act-3
    type: critical-analysis
    title: "Чи зберігається зміст"
    instruction: "Оцініть трансформації й знайдіть втрату часу, виду або модальності."
    target_text: >-
      Лист, написаний учора, можна розгорнути як лист, який написали учора.
      Учасники, які мали подати документи, не стають мавші подати документи.
      Жінка, яка читає газету, не стає читаючою газету жінкою.
    questions:
      - "Де трансформація зберігає зміст?"
      - "Де зникає модальність?"
      - "Де поточна дія вимагає підрядного речення?"
    model_answers:
      - "Лист, написаний учора -> лист, який написали учора."
      - "Учасники, які мали подати документи."
      - "Жінка, яка читає газету."

  - id: act-4
    type: critical-analysis
    title: "Де підрядне речення ясніше"
    instruction: "Виправте стискання, яке змінює зміст або звучить кальковано."
    target_text: >-
      Повернені додому мешканці подали заяви. Лікар, лікуючий пацієнта,
      пояснив дозування. Прочитавший звіт аналітик відповів на запитання.
      Будинок, відновлений після пожежі, відкрили для мешканців.
    questions:
      - "Які три фрагменти треба розгорнути підрядним реченням?"
      - "Який дієприкметниковий зворот можна залишити?"
      - "Чому люди як діячі часто потребують підрядної моделі?"
    model_answers:
      - "Мешканці, які повернулися додому; лікар, який лікує пацієнта; аналітик, який прочитав звіт."
      - "Будинок, відновлений після пожежі."
      - "Підрядна модель зберігає агентність людей і не перетворює їх на об'єкт дії."

  - id: act-5
    type: critical-analysis
    title: "Розплутайте абзац"
    instruction: "Знайдіть, де залишити підрядне речення, де використати дієприкметник, а де лексичну заміну."
    target_text: >-
      Комісія розглянула заяви, які подали мешканці, які повернулися до
      будинку, який відновили після пожежі. Бажаючі допомогти можуть
      заповнити діючу форму.
    questions:
      - "Де підрядне речення потрібне для людей?"
      - "Де дієприкметник стискає результат без втрати змісту?"
      - "Які дві лексичні заміни потрібні в кінці?"
    model_answers:
      - "Мешканці, які повернулися до будинку."
      - "Будинку, відновленого після пожежі."
      - "Бажаючі -> охочі; діючу форму -> чинну форму."

workbook:
  - id: wb-1
    type: comparative-study
    title: "Перебудова конструкцій"
    instruction: "Порівняйте пропоновані редакції й визначте модель."
    items_to_compare:
      - "Документи, підписані директором"
      - "Студент, який прочитав статтю"
      - "Будинок, відновлений після пожежі"
      - "Люди, які працюють у лабораторії"
      - "Чинні правила"
      - "Матеріали, зібрані в архіві"
    criteria:
      - "дієприкметник"
      - "підрядне речення"
      - "лексична заміна"
      - "фокус"
    prompt: "Розподіліть приклади за трьома моделями."
    model_answer: "Документи, будинок і матеріали допускають дієприкметник, бо це предмети після дії. Студент і люди потребують підрядного речення, бо вони діячі. Чинні правила є лексичною заміною."

  - id: wb-2
    type: comparative-study
    title: "П'ять англійських пасток"
    instruction: "Порівняйте буквальний і природний переклад."
    items_to_compare:
      - "people who returned home -> люди, які повернулися додому"
      - "the approved plan -> погоджений план"
      - "students wanting to join -> студенти, які хочуть долучитися / охочі долучитися"
      - "the question raised at the meeting -> питання, порушене на зборах"
      - "a fascinating article -> захоплива стаття"
    criteria:
      - "роль людини"
      - "предмет після дії"
      - "лексична заміна"
      - "калька"
    prompt: "Де коротка українська форма доречна, а де небезпечна?"
    model_answer: "Погоджений план і питання, порушене на зборах, є природними дієприкметниковими моделями. Люди, які повернулися, і студенти, які хочуть долучитися, потребують підрядної частини або лексичного слова охочі. Захоплива стаття є прикметниковою заміною."

  - id: wb-3
    type: authorial-intent
    title: "Редагування довгих означень"
    instruction: "Виправте помилки або стилістично важкі конструкції."
    text_excerpt: >-
      Матеріали, зібрані волонтерами в архіві після кількох місяців пошуку й
      передані комісії для перевірки, опублікували. Заявники, подавші
      документи після строку, отримали лист. Працюючі в укритті волонтери
      отримали інструкції.
    prompt: "Поясніть, яку редакторську мету має кожна правка: скоротити, розгорнути або повернути діяча."
    techniques_to_identify:
      - "розділення перевантаженого означення"
      - "підрядне речення замість -вш-"
      - "поточна дія людей через підрядну частину"
    model_answer: "Перше речення краще розділити, бо довгий зворот перевантажує предмет: волонтери шукали матеріали, а зібрані документи передали комісії. Заявники, які подали документи після строку, замінює ненормативне подавші. Волонтери, які працюють в укритті, зберігає активну поточну дію людей."

  - id: wb-4
    type: comparative-study
    title: "Пунктуаційний контроль"
    instruction: "Порівняйте розміщення означення й поясніть коми."
    items_to_compare:
      - "Документи, підписані вчора, лежать у теці."
      - "Підписані вчора документи лежать у теці."
      - "Документи, які підписали вчора, лежать у теці."
    criteria:
      - "відокремлення"
      - "місце звороту"
      - "підрядна частина"
    prompt: "Де потрібні коми й чому?"
    model_answer: "Зворот після іменника й підрядна частина відокремлюються комами. Коротке означення перед іменником зазвичай не потребує ком. Після трансформації треба перевірити не тільки слова, а й пунктуаційний каркас."

  - id: wb-5
    type: essay-response
    title: "Абзац із чергуванням"
    instruction: "Перепишіть абзац, свідомо чергуючи моделі."
    prompt: >-
      Перепишіть абзац: "Комісія розглянула документи, які подали люди, які
      повернулися до будинку, який відновили після пожежі, і форму, яка діє
      до п'ятниці". Поясніть свій вибір.
    min_words: 150
    model_answer: >-
      Комісія розглянула документи мешканців, які повернулися до будинку,
      відновленого після пожежі. Чинну форму можна подати до п'ятниці. Я
      залишив підрядне речення для людей, бо вони виконують дію й важливо не
      зробити їх пасивними об'єктами. Для будинку використав дієприкметник,
      бо він є предметом після відновлення. Форму, яка діє, замінив на чинну
      форму, бо це точний службовий прикметник. Так абзац втрачає нанизування
      який, але не втрачає змісту, строку й ролей учасників.
    rubric:
      - criteria: "Збереження змісту"
        description: "Люди, будинок і строк не переплутані."
        points: 4
      - criteria: "Чергування"
        description: "Є підрядне речення, дієприкметник і лексична заміна."
        points: 4
      - criteria: "Пояснення"
        description: "Рішення пояснено через фокус і стиль."
        points: 4
