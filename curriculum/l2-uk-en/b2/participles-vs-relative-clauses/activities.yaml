version: '1.0'
module: participles-vs-relative-clauses
level: b2
inline: []
workbook:
- type: translate
  title: Переклад як вибір конструкції
  instruction: Оберіть український варіант, який найприродніше передає зміст.
  items:
  - source: the report prepared yesterday
    options:
    - text: звіт, підготовлений учора
      correct: true
    - text: звіт, який підготувався вчора
      correct: false
    - text: учора підготувавший звіт
      correct: false
    explanation: Пасивний дієприкметник природний для результату підготовки.
  - source: the student who read the article
    options:
    - text: студент, який прочитав статтю
      correct: true
    - text: прочитавший статтю студент
      correct: false
    - text: прочитаний статтю студент
      correct: false
    explanation: Перехідна дія з додатком потребує підрядного речення.
  - source: documents signed by the director
    options:
    - text: документи, підписані директором
      correct: true
    - text: директором підписавші документи
      correct: false
    - text: документи, які підписався директор
      correct: false
    explanation: Пасивний дієприкметник компактно називає результат.
  - source: a person who wants to join
    options:
    - text: людина, яка хоче долучитися
      correct: true
    - text: хочуча долучитися людина
      correct: false
    - text: долучаючася людина
      correct: false
    explanation: Для теперішньої активної дії без усталеної форми потрібне підрядне речення.
  - source: the street flooded after rain
    options:
    - text: вулиця, яку затопило після дощу
      correct: true
    - text: затопивша після дощу вулиця
      correct: false
    - text: затоплююча вулиця після дощу
      correct: false
    explanation: Безособова або підрядна модель точніша.
  - source: the decision adopted at the meeting
    options:
    - text: рішення, ухвалене на засіданні
      correct: true
    - text: ухваливше на засіданні рішення
      correct: false
    - text: рішення, яке ухвалилося на засіданні
      correct: false
    explanation: Пасивний дієприкметник працює для результату офіційної дії.
  - source: people who returned home
    options:
    - text: люди, які повернулися додому
      correct: true
    - text: повернувшіся додому люди
      correct: false
    - text: повернені додому люди
      correct: false
    explanation: Підрядне речення звучить природно для дії групи людей.
  - source: a faded poster hanging near the entrance
    options:
    - text: вицвіла афіша, що висить біля входу
      correct: true
    - text: вицвівша афіша, висівша біля входу
      correct: false
    - text: афіша, яка вицвітала і висівша
      correct: false
    explanation: Можна поєднати прикметникову форму для стану з підрядною частиною для розташування.
- type: error-correction
  title: Редагування важких означень
  instruction: Виправте ненормативну або стилістично важку конструкцію.
  items:
  - sentence: Прочитавший архівні листи студент підготував довідку.
    error: Прочитавший архівні листи
    correction: студент, який прочитав архівні листи
    explanation: Дію з додатком розгортаємо.
  - sentence: Звіт, який був підготовлений учора, лежить у теці.
    error: який був підготовлений учора
    correction: підготовлений учора
    explanation: Тут пасивний дієприкметник стискає текст без втрати змісту.
  - sentence: Учасники, які були запрошені організаторами, отримали листа.
    error: які були запрошені організаторами
    correction: запрошені організаторами
    explanation: Пасивний зворот доречний для офіційного контексту.
  - sentence: Бажаючі взяти участь мають заповнити форму.
    error: Бажаючі
    correction: Охочі або ті, хто хоче взяти участь
    explanation: Кальковану форму замінюємо іменником або підрядною конструкцією.
  - sentence: Автор використав дані, зібравшіся протягом року.
    error: зібравшіся
    correction: зібрані протягом року
    explanation: Для результату збору даних потрібен пасивний дієприкметник.
  - sentence: Люди, повернені додому після зборів, обговорили рішення.
    error: повернені додому
    correction: які повернулися додому
    explanation: Повернутися - дія самих людей; пасив тут змінює зміст.
  - sentence: Матеріали, які зберігалися в архіві, були пошкоджені.
    error: які зберігалися в архіві
    correction: збережені в архіві / що зберігалися в архіві
    explanation: Вибір залежить від того, чи йдеться про результат збереження, чи про тривале перебування.
  - sentence: Документ, написаний юрист, треба оновити.
    error: написаний юрист
    correction: написаний юристом
    explanation: У пасивному звороті потрібен орудний виконавця, якщо його називаємо.
- type: select
  title: Позначте природні трансформації
  instruction: Виберіть усі варіанти, які не втрачають змісту.
  items:
  - question: 'Для речення "лист, написаний учора" природні варіанти:'
    min_correct: 2
    options:
    - text: лист, який написали учора
      correct: true
    - text: учора написаний лист
      correct: true
    - text: написавший учора лист
      correct: false
    - text: лист, що написався учора
      correct: false
    explanation: Пасивний зворот і підрядне речення можливі.
  - question: 'Для "людина, яка хоче допомогти" природні варіанти:'
    min_correct: 2
    options:
    - text: людина, яка хоче допомогти
      correct: true
    - text: охоча допомогти людина
      correct: true
    - text: хочуча допомогти людина
      correct: false
    - text: допомагаюча хотіти людина
      correct: false
    explanation: Охоча можлива як прикметникова форма, але кальковане хочуча ні.
  - question: Де підрядне речення краще за дієприкметник?
    min_correct: 2
    options:
    - text: фахівець, який перевірив дані
      correct: true
    - text: люди, які повернулися додому
      correct: true
    - text: підписаний документ
      correct: false
    - text: охолола рідина
      correct: false
    explanation: Дії з виконавцями краще розгорнути.
  - question: Які варіанти надто важкі або ненормативні?
    min_correct: 2
    options:
    - text: прагнучий справедливості герой
      correct: true
    - text: підписавший угоду директор
      correct: true
    - text: рішення, ухвалене радою
      correct: false
    - text: афіша, що висить біля входу
      correct: false
    explanation: Перші два потребують перебудови.
  - question: Які конструкції доречні в офіційному повідомленні?
    min_correct: 2
    options:
    - text: заяву розглянуто
      correct: true
    - text: документи, подані після строку
      correct: true
    - text: подаючі документи особи
      correct: false
    - text: розглянувші заяву працівники
      correct: false
    explanation: Офіційний стиль потребує прозорих нормативних моделей.
  - question: Які варіанти зберігають динаміку оповіді?
    min_correct: 2
    options:
    - text: герой, який повернувся до міста
      correct: true
    - text: люди, що чекали на вокзалі
      correct: true
    - text: повернувшийся герой
      correct: false
    - text: чекаючі на вокзалі люди
      correct: false
    explanation: Підрядні речення добре передають дію.
  - question: Які варіанти стискають текст без втрати змісту?
    min_correct: 2
    options:
    - text: зібрані матеріали
      correct: true
    - text: підготовлений висновок
      correct: true
    - text: зібравші матеріали автори
      correct: false
    - text: готуючийся висновок
      correct: false
    explanation: Пасивні дієприкметники називають результат дії над предметом.
  - question: Де трансформація змінює зміст?
    min_correct: 2
    options:
    - text: люди, які повернулися -> повернені люди
      correct: true
    - text: дослідник, який відкрив явище -> відкритий дослідник
      correct: true
    - text: лист, який написали -> написаний лист
      correct: false
    - text: матеріали, які зібрали -> зібрані матеріали
      correct: false
    explanation: Пасивна форма може змінити роль учасника.
- id: compare-participle-clause
  type: comparative-study
  title: Порівняйте два синтаксичні рішення
  instruction: Проаналізуйте ритм, точність і реєстр.
  items_to_compare:
  - звіт, підготовлений учора
  - звіт, який підготували учора
  - люди, які повернулися додому
  - повернені додому люди
  - матеріали, зібрані в архіві
  - дослідниця, яка зібрала матеріали
  - рішення, ухвалене радою
  - рада, яка ухвалила рішення
  - дані, отримані під час досліду
  - дослідники, які отримали дані
  - охочі долучитися
  - люди, які хочуть долучитися
  - будинок, відновлений громадою
  - громада, яка відновила будинок
  criteria:
  - стислість
  - видимість дії
  - доречність в офіційному стилі
  - пунктуаційна прозорість
  prompt: Поясніть, який варіант краще пасує до короткого протоколу, а який до розгорнутого пояснення.
  model_answer: 'Перший варіант компактніший і добре пасує до протоколу або службового повідомлення: у центрі стоїть документ
    і його готовий стан. Другий варіант помітніше показує дію підготовки, тому може бути доречним у пояснювальному тексті,
    де важливо розгорнути послідовність подій. Обидва варіанти нормативні, але вони по-різному розподіляють увагу читача.'
- type: quiz
  title: Пунктуація і фокус
  instruction: Оберіть найкращий варіант.
  items:
  - question: Який варіант найкраще стискає результат підготовки документа?
    options:
    - text: звіт, підготовлений учора
      correct: true
    - text: звіт, який підготувався учора
      correct: false
    - text: підготувавший учора звіт
      correct: false
    - text: учора підготовивший звіт
      correct: false
    explanation: Пасивний дієприкметник компактно називає результат.
  - question: Де треба залишити підрядне речення, бо важливий виконавець?
    options:
    - text: редакторка, яка перевірила джерела
      correct: true
    - text: джерела, перевірені редакторкою
      correct: false
    - text: перевірені джерела
      correct: false
    - text: редакторкою перевірені джерела
      correct: false
    explanation: У центрі саме редакторка як виконавиця дії.
  - question: Який варіант має правильну пунктуацію з дієприкметниковим зворотом?
    options:
    - text: Матеріали, зібрані в архіві, передали дослідникам.
      correct: true
    - text: Матеріали зібрані в архіві, передали дослідникам.
      correct: false
    - text: Матеріали, зібрані в архіві передали дослідникам.
      correct: false
    - text: Матеріали зібрані, в архіві, передали дослідникам.
      correct: false
    explanation: Зворот після означуваного слова відокремлюється з обох боків.
  - question: Де трансформація змінює зміст небезпечно?
    options:
    - text: люди, які повернулися додому -> повернені додому люди
      correct: true
    - text: лист, який написали учора -> лист, написаний учора
      correct: false
    - text: рішення, яке ухвалила рада -> рішення, ухвалене радою
      correct: false
    - text: дані, які отримали під час досліду -> дані, отримані під час досліду
      correct: false
    explanation: 'Повернені люди звучить пасивно: ніби їх хтось повернув.'
  - question: Який варіант краще у короткому протоколі?
    options:
    - text: рішення, ухвалене радою
      correct: true
    - text: рада, яка довго ухвалювала рішення
      correct: false
    - text: ухваливша рішення рада
      correct: false
    - text: рада, ухвалена рішенням
      correct: false
    explanation: Протокол фокусує результат, не драму ухвалення.
  - question: Який варіант краще в новині про відповідальність посадовців?
    options:
    - text: депутати, які підтримали рішення
      correct: true
    - text: підтримане депутатами рішення
      correct: false
    - text: депутатами підтримане рішення
      correct: false
    - text: підтримавші рішення депутати
      correct: false
    explanation: Якщо відповідальність важлива, називаємо виконавців прямо.
  - question: Де зворот став надто важким і потребує підрядного речення?
    options:
    - text: висновок, який експерти підготували після кількох консультацій із громадою
      correct: true
    - text: підготовлений висновок
      correct: false
    - text: зібрані матеріали
      correct: false
    - text: ухвалене рішення
      correct: false
    explanation: Довгі залежні компоненти краще винести в підрядну частину.
  - question: Який варіант виправляє кальку бажаючі?
    options:
    - text: охочі взяти участь
      correct: true
    - text: бажаючі взяти участь
      correct: false
    - text: участь бажаючі
      correct: false
    - text: взявші бажання участі
      correct: false
    explanation: Охочі або ті, хто хоче - природні українські варіанти.
  - question: Який варіант правильно поєднує стан і дію в одному реченні?
    options:
    - text: Вицвіла афіша, що висить біля входу, привертає увагу.
      correct: true
    - text: Вицвівша афіша, висівша біля входу, привертає увагу.
      correct: false
    - text: Афіша, вицвітаюча і висівша, привертає увагу.
      correct: false
    - text: Вицвіла афіша висівша біля входу привертає увагу.
      correct: false
    explanation: Стан можна передати прикметниково, розташування - підрядною частиною.
  - question: Який варіант найточніше пояснює різницю двох моделей?
    options:
    - text: дієприкметниковий зворот стискає результат, підрядне речення розгортає дію
      correct: true
    - text: підрядне речення завжди гірше за дієприкметник
      correct: false
    - text: дієприкметник завжди називає виконавця
      correct: false
    - text: обидві моделі завжди повністю тотожні
      correct: false
    explanation: Це головна стилістична різниця модуля.
- type: fill-in
  title: Доберіть конструкцію
  instruction: Заповніть пропуск нормативним варіантом.
  items:
  - sentence: Документи, ____, передали до архіву.
    answer: підготовлені комісією
    options:
    - підготовлені комісією
    - підготувавші комісією
    - підготовивші комісію
    - готуючі комісією
  - sentence: Люди, ____, чекали біля входу.
    answer: які повернулися з подорожі
    options:
    - які повернулися з подорожі
    - повернувшіся з подорожі
    - повернені самі
    - повертаючіся вчора
  - sentence: Заява, ____, потребує уточнення.
    answer: подана після строку
    options:
    - подана після строку
    - подавша після строку
    - подалий після строку
    - подаючася після строку
  - sentence: Автор, ____, змінив висновок.
    answer: який перечитав джерела
    options:
    - який перечитав джерела
    - перечитавший джерела
    - перечитаний джерела
    - читавшийся джерела
  - sentence: У тексті забагато речень, ____.
    answer: які починаються з який
    options:
    - які починаються з який
    - починаючихся з який
    - початих з який людьми
    - починавших який
  - sentence: Рішення, ____, опублікували ввечері.
    answer: ухвалене радою
    options:
    - ухвалене радою
    - ухваливше радою
    - ухвалююче радою
    - ухвалене рада
  - sentence: Студенти, ____, поставили запитання.
    answer: які прослухали лекцію
    options:
    - які прослухали лекцію
    - прослухавші лекцію
    - прослухані лекцію
    - слухаючі лекцію вчора
  - sentence: Текст, ____, став легшим.
    answer: відредагований редакторкою
    options:
    - відредагований редакторкою
    - відредагувавший редакторкою
    - редагуючийся редакторкою
    - редагований редакторка
  - sentence: Будинок, ____, відчинили для відвідувачів.
    answer: відновлений громадою
    options:
    - відновлений громадою
    - відновивший громаду
    - відновлюючий громаду
    - відновлене громада
  - sentence: Фраза, ____, звучить важко.
    answer: яку автор перевантажив означеннями
    options:
    - яку автор перевантажив означеннями
    - перевантаживша означеннями
    - перевантажена автор означеннями
    - перевантажуюча автором
- type: match-up
  title: Конструкція і функція
  instruction: Поєднайте приклад із функцією.
  pairs:
  - left: лист, написаний учора
    right: стислий результат
  - left: лист, який написали учора
    right: розгорнута дія
  - left: люди, які повернулися
    right: активна дія учасників
  - left: повернені люди
    right: змінений зміст, пасив
