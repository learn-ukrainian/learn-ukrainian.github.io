version: '1.0'
module: zdorovya-i-medytsyna
level: b2
inline:
  - id: act-1
    type: critical-analysis
    title: "Скарга з часом і обставиною"
    instruction: "Проаналізуйте фрази пацієнта й визначте, яку інформацію вони додають."
    target_text: >-
      У мене болить горло з учорашнього вечора. Температура піднялася вночі
      й тримається досі. Після препарату з'явилося запаморочення. Я хочу
      записатися до терапевта.
    questions:
      - "Яка фраза називає головну скаргу?"
      - "Де додано час або тривалість?"
      - "Де описано зміну після препарату без діагнозу?"
    model_answers:
      - "У мене болить горло."
      - "З учорашнього вечора; температура піднялася вночі й тримається досі."
      - "Після препарату з'явилося запаморочення."

  - id: act-2
    type: critical-analysis
    title: "Маршрут пацієнта"
    instruction: "Визначте, який документ або дія потрібні в кожній репліці."
    target_text: >-
      Пацієнт хоче потрапити до кардіолога, має документ від сімейного
      лікаря, питає про результати аналізів і просить час повторного огляду.
    questions:
      - "Який документ відкриває шлях до кардіолога?"
      - "Що треба принести, якщо лікар хоче бачити попередні дані?"
      - "Чому рецепт не є тим самим, що направлення?"
    model_answers:
      - "Направлення."
      - "Результати аналізів або виписку."
      - "Рецепт стосується ліків, а направлення - консультації чи обстеження."

  - id: act-3
    type: comparative-study
    title: "Інструкція як жанр"
    instruction: "Порівняйте формулювання з інструкції й нейтральні перекази."
    items_to_compare:
      - "дозування зазначено в інструкції"
      - "лікар пояснив дозування"
      - "можливі побічні ефекти"
      - "у разі погіршення стану"
      - "за призначенням лікаря"
    criteria:
      - "джерело інформації"
      - "статус документа"
      - "обережне перефразування"
      - "без медичної поради"
    prompt: "Які формули повідомляють про документ, а які називають дію лікаря?"
    model_answer: "Зазначено в інструкції, можливі побічні ефекти, у разі погіршення стану і за призначенням лікаря є документно-інструкційними формулами. Лікар пояснив дозування називає конкретну дію фахівця."

  - id: act-4
    type: critical-analysis
    title: "Граматика медичного реєстру"
    instruction: "Виправте кальку або нечітку конструкцію."
    target_text: >-
      Прийшовший пацієнт описав симптоми. Лікарем було призначено аналізи.
      Діючі правила клініки опубліковано на сайті. Лікуючий лікар пояснив
      дозування.
    questions:
      - "Де потрібне підрядне речення замість форми на -вш-?"
      - "Де названого діяча краще зробити підметом?"
      - "Які дві лексичні або синтаксичні заміни потрібні в останніх реченнях?"
    model_answers:
      - "Пацієнт, який прийшов."
      - "Лікар призначив аналізи."
      - "Діючі правила -> чинні правила; лікуючий лікар -> лікар, який лікує пацієнта, або відповідний назив ролі."

  - id: act-5
    type: essay-response
    title: "Публічне здоров'я без порадництва"
    instruction: "Напишіть коротке нейтральне повідомлення для громади."
    prompt: >-
      Створіть повідомлення про профілактичний огляд або консультацію. Не
      ставте діагнозів і не радьте лікування; поясніть маршрут, час і документ.
    min_words: 150
    model_answer: >-
      У середу в поліклініці проводять профілактичні консультації для
      мешканців громади. Записатися можна через електронну систему або в
      реєстратурі. Візьміть документ, результати попередніх аналізів і
      направлення, якщо його видав сімейний лікар. Якщо треба уточнити час
      повторного огляду, зверніться до реєстратури. Повідомлення не ставить
      діагнозів і не радить лікування: воно пояснює маршрут, документи й
      спосіб уточнення інформації. Такий тон підходить для публічного здоров'я,
      бо він практичний, нейтральний і не замінює консультацію фахівця.
    rubric:
      - criteria: "Безпека"
        description: "Немає діагнозів або лікувальних порад."
        points: 4
      - criteria: "Маршрут"
        description: "Названо запис, документи й уточнення."
        points: 4
      - criteria: "Реєстр"
        description: "Тон нейтральний і зрозумілий."
        points: 4

workbook:
  - id: wb-1
    type: comparative-study
    title: "Керування в медичному контексті"
    instruction: "Порівняйте словосполучення й поясніть керування."
    items_to_compare:
      - "хворіти на грип"
      - "записатися до кардіолога"
      - "скаржитися на біль"
      - "приймати препарат за рецептом"
      - "повідомити про побічний ефект"
      - "отримати виписку після лікування"
    criteria:
      - "дієслово"
      - "прийменник"
      - "документ"
      - "медична дія"
    prompt: "Які прийменники є ключовими для точного змісту?"
    model_answer: "На потрібне з хворіти й скаржитися, до - із записатися до лікаря, за - із рецептом, про - з повідомити про ефект. Виписка називає документ після лікування."

  - id: wb-2
    type: critical-analysis
    title: "Виправте небезпечну нечіткість"
    instruction: "Зробіть речення граматично й комунікативно точним."
    target_text: >-
      Мій діагноз - температура. Я маю біль у спині після тренування.
      Рецепт до кардіолога вже в системі. Пацієнт, приймавший препарат,
      відчув нудоту.
    questions:
      - "Де симптом помилково названо діагнозом?"
      - "Де треба замінити кальку з мати біль?"
      - "Де потрібні направлення і підрядне речення?"
    model_answers:
      - "Температура є симптомом: у мене температура."
      - "У мене болить спина після тренування."
      - "Направлення до кардіолога; пацієнт, який приймав препарат."

  - id: wb-3
    type: reading
    title: "Прочитайте запис"
    instruction: "Розділіть симптом, документ і дію фахівця."
    text: >-
      У пацієнта третій день температура. Направлення до терапевта є в
      системі. Лікар призначив аналіз крові й пояснив дозування препарату.
      В інструкції зазначено можливі побічні ефекти.
    tasks:
      - "Знайдіть фразу, яка називає симптом."
      - "Знайдіть фразу, яка називає документ або електронний запис."
      - "Поясніть, де актив називає дію лікаря."

  - id: wb-4
    type: comparative-study
    title: "Лексика документів"
    instruction: "Порівняйте терміни й поясніть, які не можна змішувати."
    items_to_compare:
      - "направлення"
      - "рецепт"
      - "виписка"
      - "побічний ефект"
      - "профілактика"
      - "страхування"
    criteria:
      - "документ"
      - "ліки"
      - "симптом або реакція"
      - "система послуг"
    prompt: "Які слова стосуються документів, а які описують стан або систему?"
    model_answer: "Направлення, рецепт і виписка є документами різного типу. Побічний ефект описує можливу небажану реакцію. Профілактика стосується попередження хвороб, а страхування - системи покриття послуг."

  - id: wb-5
    type: essay-response
    title: "Редакція медичного повідомлення"
    instruction: "Перепишіть чернетку нейтрально й без кальок."
    prompt: >-
      Відредагуйте: "Прийшовший пацієнт мав біль. Лікарем було призначено
      аналізи. Діючі правила клініки пояснив лікуючий лікар". Поясніть
      граматичні та реєстрові зміни.
    min_words: 150
    model_answer: >-
      Пацієнт, який прийшов на прийом, описав біль. Лікар призначив аналізи
      й пояснив чинні правила клініки. Якщо треба уточнити дозування або час
      повторного огляду, пацієнт може звернутися до реєстратури чи сімейного
      лікаря. У редакції прибрано форму на -вш-, бо вона не є нормативною.
      Названого діяча повернуто в позицію підмета: лікар призначив аналізи.
      Кальковане діючі замінено на чинні, бо йдеться про службові правила.
      Текст лишається практичним і не дає порад щодо лікування.
    rubric:
      - criteria: "Граматика"
        description: "Актив, підрядне речення й лексична заміна використані доречно."
        points: 4
      - criteria: "Медична безпека"
        description: "Немає діагнозів або порад щодо лікування."
        points: 4
      - criteria: "Реєстр"
        description: "Текст звучить нейтрально й практично."
        points: 4
