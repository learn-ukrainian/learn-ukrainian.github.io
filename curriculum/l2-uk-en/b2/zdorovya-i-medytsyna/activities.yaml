      correct: false
    explanation: Нормативна сполука.
- id: essay-medical-visit
  type: essay-response
  title: Опис візиту до лікаря
  instruction: Напишіть звʼязний текст українською.
  prompt: 'Опишіть візит до сімейного лікаря: скарга, симптоми, обстеження, діагноз, призначене лікування, подальші дії. Уникайте
    кальок і використайте щонайменше 8 медичних слів із модуля.'
  min_words: 180
  model_answer: 'Учора я звернувся до сімейного лікаря, бо третій день трималася температура і зʼявився кашель. На прийомі
    я коротко описав скарги: болить горло, є виснаження, запаморочення немає. Лікар оглянув мене, послухав легені й призначив
    аналіз крові. Після обстеження діагноз поставлено без поспіху, а призначене лікування пояснено письмово. У рецепті зазначено
    дозування препарату і час приймання. Лікар також попередив про можливий побічний ефект і попросив звернутися повторно,
    якщо температура не знизиться. На завершення він порадив профілактику: відпочинок, пиття, щеплення проти грипу восени
    й контрольний огляд через кілька днів. Такий опис допомагає пацієнтові говорити точно й не губити важливих деталей.'
  rubric:
  - criteria: Лексика
    description: Використано медичні терміни точно.
    points: 4
  - criteria: Послідовність
    description: Є скарга, обстеження, діагноз, лікування.
    points: 3
  - criteria: Норма
    description: Немає кальок на зразок маю тридцять років чи побочний.
    points: 3
