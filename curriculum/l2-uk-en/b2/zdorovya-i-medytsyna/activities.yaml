    options:
    - text: направлення
      correct: true
    - text: спрямовуючий папір
      correct: false
    - text: дирекція до лікаря
      correct: false
    explanation: Медичний термін - направлення.
  - source: preventive check-up
    options:
    - text: профілактичний огляд
      correct: true
    - text: попереджуючий огляд всього
      correct: false
