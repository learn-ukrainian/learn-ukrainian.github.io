- type: reading
  id: reading-rental-repair-chat
  title: 'Читання: оренда, ремонт і домовий чат'
  instruction: Прочитайте уривок і виконайте мовні завдання.
  source: Навчальний текст для модуля B2.
  text: 'Орендарка Марта переїхала до двокімнатної квартири в новобудові. Перед заселенням сторони підписали договір, а стан квартири внесено до акта приймання-передачі. У квартирі було встановлено бойлер, підключено інтернет і залишено частину меблів. Через два тижні Марта помітила протікання під мийкою. Вона перекрила воду, звільнила шафу й надіслала власникові фото. Власник відповів, що сантехнік прийде наступного дня, але оплату матеріалів треба погодити після огляду. Того ж вечора в домовому чаті сусіди обговорювали ремонт під''їзду: стіни вже пофарбовано, але вхідні двері досі не відремонтовано. Частина мешканців пропонувала скинутися порівну, а інші вимагали спочатку побачити кошторис і квитанції.

    '
  tasks:
  - Випишіть усі форми на -но, -то й поясніть, який результат вони повідомляють.
  - Знайдіть активні речення, у яких названо відповідального виконавця.
  - Поясніть, чому словосполучення вхідні двері має множинне узгодження.
  - Сформулюйте два ввічливі питання, які Марта може поставити власникові після огляду сантехніка.
  - 'Напишіть коротку позицію для домового чату: чи варто збирати кошти до появи кошторису?'
- type: essay-response
  id: housing-decision-note
  title: 'Письмо: обґрунтований вибір житла'
  instruction: Напишіть коротку позицію про вибір житла з аргументами.
  source_reading: reading-rental-repair-chat
  prompt: Уявіть, що вам треба вибрати між дешевою кімнатою в гуртожитку, дорогою квартирою в центрі й більшою квартирою в новобудові на околиці. Обґрунтуйте вибір, використовуючи лексику модуля та щонайменше три форми на -но, -то.
  min_words: 160
  model_answer: 'Сильна відповідь називає критерії вибору, зіставляє бюджет, транспорт і спільний простір, а також коректно використовує форми на -но, -то для результатів: умови перевірено, ремонт завершено, договір підготовлено.'
  peer_review_guidelines: Перевірте, чи є чітка теза; позначте всі форми на -но, -то й перевірте, чи не мають вони особового діяча в орудному; перевірте, чи автор пояснив фінансові та побутові ризики.
  rubric:
  - criteria: Аргументація
    description: Вибір обґрунтовано кількома реальними критеріями.
    points: 4
  - criteria: Мовна точність
    description: Житлова лексика й форми на -но, -то вжиті нормативно.
    points: 4
  - criteria: Регістр
    description: Текст звучить як зріла B2-позиція без кальок і зайвої емоційності.
    points: 2
