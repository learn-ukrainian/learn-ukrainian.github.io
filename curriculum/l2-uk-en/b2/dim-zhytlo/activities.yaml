version: '1.0'
module: dim-zhytlo
level: b2
inline: []
workbook:
- type: quiz
  title: Фокус у житловій ситуації
  instruction: Оберіть варіант, який найточніше відповідає ситуації та українській нормі.
  items:
  - question: Яке речення найкраще повідомляє лише про готовий стан квартири?
    options:
    - text: У квартирі зроблено ремонт.
      correct: true
    - text: Майстер зробив ремонт у квартирі.
      correct: false
    - text: Ремонт був зроблений майстром.
      correct: false
    - text: Ремонт робиться майстром.
      correct: false
    explanation: Форма на -но повідомляє результат без названого виконавця.
  - question: Який варіант найприродніший, якщо важливо назвати відповідального?
    options:
    - text: Орендодавець передав ключі орендареві.
      correct: true
    - text: Ключі передано орендодавцем орендареві.
      correct: false
    - text: Ключі були передані орендодавцем.
      correct: false
    - text: Передача ключів здійснилася орендодавцем.
      correct: false
    explanation: Коли діяч важливий, активне речення найточніше.
  - question: Який вислів нормативно називає проживання в чужій квартирі за плату?
    options:
    - text: винаймати квартиру
      correct: true
    - text: знімати квартиру
      correct: false
    - text: брати квартиру
      correct: false
    - text: рентувати квартиру
      correct: false
    explanation: Українською житло винаймають або орендують.
  - question: Яке речення правильно узгоджує множинний іменник двері?
    options:
    - text: Вхідні двері зачинені.
      correct: true
    - text: Вхідна двері зачинена.
      correct: false
    - text: Новий двері вже встановлено.
      correct: false
    - text: Одна двері скрипить.
      correct: false
    explanation: Двері мають лише форму множини, тому залежні слова теж множинні.
  - question: Який варіант найкращий для повідомлення власникові про аварію?
    options:
    - text: У ванній з'явилося протікання; воду перекрито, фото додаю.
      correct: true
    - text: У ванній здійснилася аварійна ситуація, яка була побачена мною.
      correct: false
    - text: Кран був зламаний кимось, і це питання має бути вирішене.
      correct: false
    - text: Ванна погана, тому треба щось робити.
      correct: false
    explanation: Добре повідомлення називає факт, уже виконану дію й доказ.
  - question: Яке речення найточніше розрізняє матеріал і документ?
    options:
    - text: Немає паперу для друку договору, але копія потрібного папера вже є.
      correct: true
    - text: Немає папера для друку договору, але копія потрібного паперу вже є.
      correct: false
    - text: Немає папір для договору, але копія папір є.
      correct: false
    - text: Немає паперами для договору, але документ готовий.
      correct: false
    explanation: Паперу - матеріал; папера - конкретний документ.
  - question: Який варіант найкращий для короткого звіту про комунальні?
    options:
    - text: Комунальні за червень оплачено, квитанції додаю.
      correct: true
    - text: Комунальні були оплачені мною, квитанції додаються.
      correct: false
    - text: Я здійснив оплату комунального характеру.
      correct: false
    - text: Комунальні оплатилися через застосунок.
      correct: false
    explanation: Короткий звіт природно використовує форму на -но й конкретний доказ.
  - question: Яке речення найкраще вводить прохання в домовому чаті?
    options:
    - text: Пропоную спочатку побачити кошторис, а потім збирати кошти.
      correct: true
    - text: Усі повинні негайно скинутися, бо так треба.
      correct: false
    - text: Кошти будуть збиратися сусідами без пояснення.
      correct: false
    - text: Хто не здає гроші, той поганий сусід.
      correct: false
    explanation: У спільному просторі аргумент і процедура працюють краще за тиск.
  - question: Який варіант найточніше описує ризик новобудови?
    options:
    - text: Будинок новий, але інфраструктуру району ще не сформовано.
      correct: true
    - text: Будинок новий, тому жодних ризиків немає.
      correct: false
    - text: Новобудова завжди краща за старий будинок.
      correct: false
    - text: Інфраструктура сформувалася забудовником автоматично.
      correct: false
    explanation: Новий будинок не гарантує готового району.
  - question: Яке речення найкраще фіксує стан меблів у договорі?
    options:
    - text: У квартирі є ліжко, шафа, стіл і пральна машина.
      correct: true
    - text: У квартирі є все нормальне.
      correct: false
    - text: Меблі є, але які саме, неважливо.
      correct: false
    - text: Квартира мебльована якось.
      correct: false
    explanation: У договорі потрібен перелік, а не загальна оцінка.
- type: fill-in
  title: Результат, діяч або ознака
  instruction: Оберіть форму, яка найкраще відповідає фокусу речення.
  items:
  - sentence: У кухні ____ новий бойлер.
    answer: встановлено
    options:
    - встановлено
    - встановлений майстром
    - встановився
    - встановлюючий
    explanation: Речення повідомляє результат без потреби називати виконавця.
  - sentence: Сантехнік ____ пошкоджене з'єднання біля труби.
    answer: замінив
    options:
    - замінив
    - замінено
    - замінений
    - замінився
    explanation: Названий сантехнік є діячем, тому потрібен актив.
  - sentence: ____ квартира коштує дорожче, але зручна для швидкого переїзду.
    answer: Умебльована
    options:
    - Умебльована
    - Умебльовано
    - Умеблюючи
    - Умеблювати
    explanation: Дієприкметник узгоджується зі словом квартира.
  - sentence: Комунальні за травень ____ повністю.
    answer: оплачено
    options:
    - оплачено
    - оплатилися
    - оплачений
    - оплачуючі
    explanation: Форма на -но стисло повідомляє готовий результат.
  - sentence: Орендодавець ____ умови повернення застави.
    answer: пояснив
    options:
    - пояснив
    - пояснено
    - пояснений
    - пояснювано
    explanation: Орендодавець названий як виконавець дії.
  - sentence: Показники лічильників ____ до акта.
    answer: внесено
    options:
    - внесено
    - внесені орендарем
    - внісся
    - внесучі
    explanation: Важливий факт фіксації показників, не виконавець.
  - sentence: ____ двері треба перевірити перед заселенням.
    answer: Вхідні
    options:
    - Вхідні
    - Вхідна
    - Вхідний
    - Вхідне
    explanation: Двері вимагають множинного узгодження.
  - sentence: Після ____ в під'їзді стало світліше.
    answer: ремонту
    options:
    - ремонту
    - ремонта
    - ремонтом
    - ремонт
    explanation: Ремонт як процес у родовому відмінку має форму ремонту.
  - sentence: Заявку до керуючої компанії вже ____.
    answer: подано
    options:
    - подано
    - подана диспетчером
    - подалася
    - подаюча
    explanation: Форма на -но підкреслює результат подання заявки.
  - sentence: Мешканці ____ за ремонт сходів.
    answer: проголосували
    options:
    - проголосували
    - проголосовано
    - проголосовані
    - голосувалися
    explanation: Мешканці є діячами, тому потрібне активне речення.
- type: error-correction
  title: Редагування житлових кальок
  instruction: Знайдіть помилковий елемент і виберіть нормативний варіант.
  items:
  - sentence: Я хочу знімати квартиру біля метро.
    error: знімати
    answer: винаймати
    options:
    - винаймати
    - зніматися
    - знімати
    - рентувати
    explanation: Житло українською винаймають або орендують.
  - sentence: У прихожій стоїть стара шафа.
    error: прихожій
    answer: передпокої
    options:
    - передпокої
    - прихожій
    - сходовій
    - ворітній
    explanation: Нормативне слово для вхідної зони квартири - передпокій.
  - sentence: Новий двері вже встановлено.
    error: Новий
    answer: Нові
    options:
    - Нові
    - Нова
    - Нове
    - Новий
    explanation: Двері мають форму множини.
  - sentence: Не вистачає асфальта для ремонту двору.
    error: асфальта
    answer: асфальту
    options:
    - асфальту
    - асфальта
    - асфальтом
    - асфальті
    explanation: Назва матеріалу в родовому відмінку має закінчення -у.
  - sentence: Ключі передано орендодавцем учора.
    error: орендодавцем
    answer: Орендодавець передав ключі учора.
    options:
    - Орендодавець передав ключі учора.
    - Ключі передалися орендодавцем учора.
    - Ключі були передані орендодавцем учора.
    - Передача ключів здійснена орендодавцем учора.
    explanation: Якщо важливий виконавець, його краще зробити підметом активного речення.
  - sentence: Скільки коштує рент за цю квартиру?
    error: рент
    answer: оренда
    options:
    - оренда
    - рент
    - аренда
    - зйом
    explanation: Українською кажемо оренда або орендна плата.
  - sentence: На лєстніці знову не працює світло.
    error: лєстніці
    answer: сходах
    options:
    - сходах
    - лєстніці
    - драбині
    - підлозі
    explanation: 'У будинку природно: на сходах.'
  - sentence: Меблі стара, але придатна до користування.
    error: стара
    answer: старі
    options:
    - старі
    - стара
    - старий
    - старе
    explanation: Меблі - множинний іменник.
  - sentence: Ремонт буде проводитися майстром завтра.
    error: буде проводитися майстром
    answer: майстер робитиме
    options:
    - майстер робитиме
    - буде проводитися майстром
    - майстром буде проводитися
    - проведеться майстром
    explanation: Названий майстер має стати діячем активного речення.
  - sentence: У договорі не зафіксовано власником стан техніки.
    error: власником
    answer: Власник не зафіксував стан техніки.
    options:
    - Власник не зафіксував стан техніки.
    - Не зафіксовано власником стан техніки.
    - Стан техніки був не зафіксований власником.
    - Фіксація стану не здійснена власником.
    explanation: Відповідальність власника треба назвати активом.
- type: cloze
  title: Оголошення з точними умовами
  passage: Здається {двокімнатна|двокімнатну|двокімнатний|двокімнатне} квартира біля парку. У квартирі {зроблено|зроблена|зробив|зробилися} косметичний ремонт, {встановлено|встановлений|встановився|встановлюючи} бойлер і {підключено|підключений|підключивши|підключилися} інтернет. Кухню {умебльовано|умебльована|умеблюючий|умеблювати}, але частину {меблів|мебля|меблею|меблі} можна замінити за домовленістю. Комунальні послуги оплачуються {окремо|окремий|окрема|окремими}, показники лічильників {внесено|внесені орендарем|внісся|вносячі} до акта. Договір {підписано|підписаний власником|підписався|підписуючи} на рік, заставу {сплачено|сплачена|сплатився|сплачувати} перед заселенням. Якщо у ванній з'явиться {протікання|протіканням|протіканню|протікати}, заявку треба {подати|подана|подано|подаючи} власникові протягом доби. Стан техніки внесено до {акта|акту|актом|акт}, ключі передано {орендареві|орендарем|орендаря|орендар}, а несправність {зафіксовано|зафіксована майстром|зафіксувався|фіксуючи} на
    фото. Після огляду майстер має {пояснити|пояснений|пояснюваний|пояснено}, чи ремонт входить у гарантію.
- type: unjumble
  title: Складні речення про житло
  instruction: Складіть природне речення з поданих частин.
  items:
  - words:
    - Після
    - огляду
    - квартири
    - стан
    - техніки
    - внесено
    - до
    - акта
    answer: Після огляду квартири стан техніки внесено до акта.
  - words:
    - Орендодавець
    - пояснив
    - коли
    - повертається
    - застава
    - після
    - виїзду
    answer: Орендодавець пояснив, коли повертається застава після виїзду.
  - words:
    - У
    - під'їзді
    - пофарбовано
    - стіни
    - але
    - сходи
    - ще
    - не
    - відремонтовано
    answer: У під'їзді пофарбовано стіни, але сходи ще не відремонтовано.
  - words:
    - Мешканці
    - вирішили
    - скинутися
    - на
    - ремонт
    - вхідних
    - дверей
    answer: Мешканці вирішили скинутися на ремонт вхідних дверей.
  - words:
    - Якщо
    - опалення
    - не
    - працює
    - заявку
    - треба
    - подати
    - негайно
    answer: Якщо опалення не працює, заявку треба подати негайно.
  - words:
    - Новобудова
    - зручна
    - але
    - інфраструктуру
    - району
    - ще
    - не
    - сформовано
    answer: Новобудова зручна, але інфраструктуру району ще не сформовано.
  - words:
    - Перед
    - заселенням
    - меблі
    - й
    - техніку
    - треба
    - описати
    - окремо
    answer: Перед заселенням меблі й техніку треба описати окремо.
  - words:
    - Якщо
    - заставу
    - не
    - повертають
    - причину
    - слід
    - пояснити
    - письмово
    answer: Якщо заставу не повертають, причину слід пояснити письмово.
- type: match-up
  title: Термін і комунікативна функція
  instruction: Зіставте слово або фразу з найточнішою функцією в житловій комунікації.
  pairs:
  - left: акт приймання-передачі
    right: фіксує стан квартири, меблів і техніки
  - left: орендна плата
    right: називає суму, яку регулярно сплачує орендар
  - left: застава
    right: захищає власника від пошкоджень або боргів
  - left: показники лічильників
    right: потрібні для точного розрахунку комунальних послуг
  - left: ОСББ
    right: організовує рішення співвласників будинку
  - left: передпокій
    right: називає вхідну зону квартири
  - left: сходи
    right: множинний іменник для руху між поверхами
  - left: протікання
    right: аварійна проблема з водою
  - left: кошторис
    right: попередній розрахунок вартості робіт
  - left: новобудова
    right: житловий будинок або комплекс недавнього будівництва
  - left: керуюча компанія
    right: приймає заявки щодо обслуговування будинку
  - left: домовий чат
    right: канал швидкого узгодження між мешканцями
- type: select
  title: Оберіть усі нормативні варіанти
  instruction: Позначте всі речення, які звучать природно й відповідають фокусу ситуації.
  items:
  - question: Які варіанти природно повідомляють результат без названого виконавця?
    min_correct: 2
    options:
    - text: Квитанції оплачено.
      correct: true
    - text: Заявку подано до керуючої компанії.
      correct: true
    - text: Квитанції оплачено орендарем.
      correct: false
    - text: Заявка подалася диспетчером.
      correct: false
    explanation: Форми на -но, -то природні без особового діяча в орудному.
  - question: Які варіанти правильно узгоджують множинні іменники?
    min_correct: 2
    options:
    - text: Вхідні двері зачинені.
      correct: true
    - text: Старі меблі залишилися від попередніх орендарів.
      correct: true
    - text: Нова сходи вже чиста.
      correct: false
    - text: Ця ворота відчинена.
      correct: false
    explanation: Двері, меблі, сходи, ворота вимагають множинного узгодження.
  - question: Які питання варто поставити перед підписанням договору?
    min_correct: 3
    options:
    - text: Чи зафіксовано стан техніки в акті?
      correct: true
    - text: Яка середня сума комунальних узимку?
      correct: true
    - text: Чи повертається застава після виїзду?
      correct: true
    - text: Чому власник не хоче знижувати ціну без причини?
      correct: false
    explanation: Добрі питання стосуються умов, витрат і доказів, а не тиску.
  - question: Які речення краще називають відповідального виконавця?
    min_correct: 2
    options:
    - text: Підрядник не завершив ремонт вчасно.
      correct: true
