version: '1.0'
module: dim-zhytlo
level: b2
inline:
  - id: act-1
    type: comparative-study
    title: Оголошення як набір умов
    instruction: Порівняйте фрагменти оголошення й визначте, яку практичну інформацію вони несуть.
    items_to_compare:
      - "Квартира біля метро."
      - "Кухню умебльовано."
      - "Комунальні оплачуються окремо."
      - "Без тварин."
      - "Договір підписуємо після огляду."
    criteria:
      - розташування
      - готовий результат
      - фінансова умова
      - правило проживання
      - наступний крок
    prompt: "Який фрагмент треба перевірити фактом, а який уже описує зафіксований стан?"
    model_answer: >-
      **Квартира біля метро** треба перевірити фактичним часом до станції.
      **Кухню умебльовано** описує готовий стан. **Комунальні окремо** вимагає
      уточнення сум. **Без тварин** є правилом проживання. **Договір підписуємо
      після огляду** називає наступний крок.
  - id: act-2
    type: critical-analysis
    title: Статус у договорі
    instruction: Визначте, де потрібна форма на -но, -то, а де актив.
    target_text: >-
      Завдаток сплачено. Договір підписано сторонами. Ключі передано орендареві.
      Власник перевірив бойлер. Показники лічильників внесено до акта.
    questions:
      - "Які речення фіксують результат без важливого діяча?"
      - "Де названий діяч має залишитися підметом активного речення?"
      - "Яке речення звучить важко й потребує перебудови?"
    model_answers:
      - "Результат фіксують: завдаток сплачено, ключі передано, показники внесено."
      - "Власник перевірив бойлер природно називає відповідального."
      - "Договір підписано сторонами краще перебудувати: сторони підписали договір."
  - id: act-3
    type: comparative-study
    title: Результат, діяч або ознака
    instruction: Порівняйте речення про ремонт і виберіть комунікативний фокус.
    items_to_compare:
      - "У ванній замінено змішувач."
      - "Сантехнік замінив змішувач у ванній."
      - "Замінений змішувач працює без шуму."
      - "Змішувач замінюють завтра."
    criteria:
      - завершений результат
      - відповідальний діяч
      - ознака предмета
      - майбутній процес
    prompt: "Коли потрібна кожна модель у повідомленні власникові?"
    model_answer: >-
      **Замінено** повідомляє статус після роботи. **Сантехнік замінив** потрібне
      для відповідальності. **Замінений змішувач** описує предмет після дії.
      **Замінюють завтра** повідомляє процес або заплановану роботу.
  - id: act-4
    type: critical-analysis
    title: Конкретизуйте опис квартири
    instruction: Знайдіть загальні формули й перепишіть їх конкретніше.
    target_text: >-
      У квартирі є меблі й техніка. У ванній усе погано. На кухні щось не працює.
      Після ремонту стало краще.
    questions:
      - "Які слова занадто загальні для договору або акта?"
      - "Які предмети й результати треба назвати?"
      - "Які форми на -но, -то доречні після ремонту?"
    model_answers:
      - "Занадто загальні: меблі, техніка, усе погано, щось, краще."
      - "Треба назвати ліжко, шафу, пральну машину, бойлер, змішувач, розетку."
      - "Доречно: бойлер перевірено, змішувач замінено, протікання усунено, фото додано."
  - id: act-5
    type: comparative-study
    title: Сусідство і фокус речення
    instruction: Виберіть форму для повідомлення в чаті ОСББ.
    items_to_compare:
      - "Заявку подано до керуючої компанії."
      - "Керуюча компанія має повідомити термін ремонту."
      - "У дворі встановлять додаткове освітлення."
      - "Мешканці погодили кошторис."
      - "Пофарбовані перила вже висохли."
    criteria:
      - статус
      - відповідальність
      - дія без названого виконавця
      - спільне рішення
      - ознака предмета
    prompt: "Які два речення найкраще підходять для ввічливої скарги про затримку ремонту?"
    model_answer: >-
      Для скарги доречні **заявку подано** як факт і **керуюча компанія має
      повідомити термін ремонту** як названу відповідальність. Інші речення
      потрібні для плану робіт або опису результату.
workbook:
  - id: wb-1
    type: critical-analysis
    title: Форми результату в акті
    instruction: Доберіть природні форми на -но, -то й поясніть, чому це статус.
    target_text: >-
      Показники лічильників внесено до акта. Бойлер перевірено. Ключі передано
      орендареві. Протікання усунено. Інтернет підключено до заселення.
    questions:
      - "Які слова фіксують результат без названого діяча?"
      - "Чому ці форми доречні саме в акті?"
      - "Де треба перейти до активу, якщо важлива відповідальність?"
    model_answers:
      - "Внесено, перевірено, передано, усунено, підключено."
      - "Акт документує стан і завершені дії, а не розповідає історію ремонту."
      - "Якщо важливо, хто перевірив бойлер або усунув протікання, треба назвати майстра чи власника активом."
  - id: wb-2
    type: critical-analysis
    title: Житлові кальки
    instruction: Виправте речення й поясніть фокус.
    target_text: >-
      Договір підписано сторонами вчора. Квартира здається з меблями
      орендодавцем. У прихожій стоїть шафа. Оренда сплачується орендарем до
      п'ятого числа. Підлога була замінена майстром.
    questions:
      - "Де названий діяч має стати підметом?"
      - "Де треба замінити ненормативну або слабку лексику?"
      - "Де можливі два природні варіанти залежно від фокусу?"
    model_answers:
      - "Сторони підписали договір; орендодавець здає квартиру; орендар сплачує орендну плату; майстер замінив підлогу."
      - "Прихожій краще замінити на передпокої."
      - "Підлогу замінено, якщо важливий результат; майстер замінив підлогу, якщо важливий діяч."
  - id: wb-3
    type: critical-analysis
    title: Яке питання поставити власникові
    instruction: Сформулюйте природні уточнення перед підписанням договору.
    target_text: >-
      В оголошенні написано: комунальні окремо, квартира здається з меблями,
      після ремонту ванної власник пише "усе нормально".
    questions:
      - "Що треба запитати про комунальні платежі?"
      - "Що треба уточнити про меблі?"
      - "Як переписати розмите повідомлення після ремонту?"
    model_answers:
      - "Яка середня сума комунальних узимку й улітку?"
      - "Які саме меблі залишаються у квартирі й чи внесено їх до акта?"
      - "Природно: протікання усунено, змішувач замінено, фото додано."
  - type: group-sort
    title: Розподіліть житлові формули
    instruction: Розкладіть фрази за комунікативною роллю.
    groups:
      - name: "Результат"
        items:
          - "ключі передано"
          - "показники внесено"
          - "протікання усунено"
      - name: "Відповідальний діяч"
        items:
          - "орендар сплачує"
          - "майстер замінив"
          - "керуюча компанія повідомляє"
      - name: "Ознака предмета"
        items:
          - "замінений змішувач"
          - "пофарбовані стіни"
          - "підключений інтернет"
  - id: wb-5
    type: critical-analysis
    title: Напишіть повідомлення про проблему
    instruction: Складіть коротке повідомлення власникові, використавши точну лексику й одну форму на -но, -то.
    target_text: >-
      Ситуація: у ванній протікає змішувач, під раковиною з'явилася вода, фото вже
      прикріплено до повідомлення. Попросіть власника узгодити час майстра.
    questions:
      - "Які факти треба назвати?"
      - "Яку форму на -но, -то можна використати?"
      - "Як зробити тон ввічливим, але чітким?"
    model_answers:
      - "Треба назвати місце, проблему, наслідок і фото."
      - "Можна написати: фото додано."
      - "Наприклад: У ванній протікає змішувач, під раковиною з'явилася вода. Фото додано. Чи можемо узгодити час майстра?"
