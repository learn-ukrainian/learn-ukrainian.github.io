version: '1.0'
module: discussion-debate
level: b2

inline:
  - id: act-1
    type: reading
    title: Частини аргументу
    text: >-
      Сильний аргумент має тезу, обґрунтування, доказ і висновок. Якщо одна
      частина зникає, позиція стає слабшою: теза без доказу звучить як думка,
      а доказ без висновку не пояснює, що з нього випливає.
    tasks:
      - Що формулює теза?
      - Навіщо потрібне обґрунтування?
      - Чому доказ має бути пов'язаний із висновком?
      - Яку частину аргументу найчастіше пропускають у швидкій суперечці?

  - id: act-2
    type: critical-analysis
    title: Спростування без спотворення
    target_text: >-
      Потрібно заборонити всі анонімні коментарі, бо саме анонімність створює
      образи, дезінформацію і загрозу для суспільства.
    questions:
      - Яку реальну проблему називає опонент?
      - Яке узагальнення робить тезу надто широкою?
      - Який альтернативний механізм можна запропонувати?
    model_answers:
      - "Опонент називає проблему образ, дезінформації й небезпечного контенту."
      - "Теза припускає, що всі анонімні коментарі однаково шкідливі."
      - "Можна запропонувати модерацію небезпечного контенту, систему скарг і право на оскарження."

  - id: act-3
    type: critical-analysis
    title: Етикет незгоди
    target_text: "Тільки наївна людина може підтримувати вашу пропозицію."
    questions:
      - У чому проблема цієї репліки?
      - Як зберегти незгоду без образ?
      - Який аспект аргументу треба критикувати?
    model_answers:
      - "Репліка атакує людину, а не тезу."
      - "Можна сказати: 'Ця пропозиція потребує сильніших доказів'."
      - "Критикувати треба доказ, механізм або логічний зв'язок."

  - id: act-4
    type: critical-analysis
    title: Логічна помилка
    target_text: "Після запуску програми кількість скарг зросла, отже програма провальна."
    questions:
      - Яка логічна помилка можлива в цьому висновку?
      - Яких даних бракує?
      - Як відповісти у формальній дискусії?
    model_answers:
      - "Можлива помилка 'після того - отже внаслідок того'."
      - "Бракує даних про типи скарг, кількість до запуску та інші фактори."
      - "Треба визнати зростання як сигнал, але попросити дані про причинний зв'язок."

  - id: act-5
    type: critical-analysis
    title: Аргументативна позиція
    target_text: >-
      Держава може обмежувати лише контент, який прямо закликає до насильства,
      якщо процедура прозора і передбачає право на оскарження.
    questions:
      - Яка теза сформульована в реченні?
      - Який критерій обмеження названо?
      - Який захист від зловживань передбачено?
    model_answers:
      - "Теза: обмеження можливе лише для контенту з прямим закликом до насильства."
      - "Критерій - пряма загроза або заклик до насильства."
      - "Захистом є прозора процедура і право на оскарження."

workbook:
  - type: match-up
    title: Частини аргументу і помилки
    instruction: Поєднайте термін із поясненням.
    pairs:
      - left: теза
        right: формулює, що саме мовець стверджує
      - left: обґрунтування
        right: пояснює, чому теза має значення
      - left: доказ
        right: підтверджує тезу фактом, прикладом або даними
      - left: висновок
        right: показує, що випливає з аргументу
      - left: контраргумент
        right: відповідає на позицію іншої сторони власною логікою
      - left: регламент
        right: визначає порядок і час виступів
      - left: аргумент до суті
        right: аналізує позицію, а не особу
      - left: аргумент до людини
        right: атакує мовця замість тези
      - left: хибна дилема
        right: подає два варіанти там, де можливостей більше
      - left: солом'яне опудало
        right: спотворює позицію опонента для легшої атаки

  - type: error-correction
    title: Від конфлікту до аргументу
    instruction: Виберіть редакцію, яка зберігає незгоду, але прибирає конфліктоген.
    items:
      - sentence: "Тільки наївна людина може підтримувати вашу пропозицію."
        error: "Тільки наївна людина"
        correction: "Ця пропозиція потребує сильніших доказів"
        error_type: register
        options:
          - "Ця пропозиція потребує сильніших доказів"
          - "Ви нічого не розумієте"
          - "Усім очевидно, що це смішно"
          - "Ваші прихильники наївні"
        explanation: Коректна критика оцінює доказ, а не людину.
      - sentence: "Ви завжди перекручуєте тему."
        error: "завжди перекручуєте"
        correction: "у цій репліці зміщено фокус із механізму на мотиви"
        error_type: phrase
        options:
          - "у цій репліці зміщено фокус із механізму на мотиви"
          - "ви ніколи не говорите правду"
          - "усі ваші аргументи погані"
          - "це повна нісенітниця"
        explanation: Точна редакція називає конкретну проблему аргументу.
      - sentence: "Це абсолютна дурниця, навіть обговорювати не треба."
        error: "абсолютна дурниця"
        correction: "це твердження потребує доказів і чіткішого визначення"
        error_type: register
        options:
          - "це твердження потребує доказів і чіткішого визначення"
          - "це дурниця для всіх"
          - "не витрачаймо час на таке"
          - "опонент некомпетентний"
        explanation: Формальна дискусія має критикувати тезу, а не автора.
      - sentence: "Або ми заборонимо все, або країна зануриться в хаос."
        error: "Або ми заборонимо все, або країна зануриться в хаос"
        correction: "між повною забороною і бездіяльністю є проміжні механізми"
        error_type: construction
        options:
          - "між повною забороною і бездіяльністю є проміжні механізми"
          - "справді існує лише два варіанти"
          - "хаос неминучий"
          - "заборона автоматично вирішить проблему"
        explanation: Хибна дилема приховує інші можливі рішення.
      - sentence: "Усі нормальні люди підтримують цю позицію."
        error: "Усі нормальні люди"
        correction: "частина опитаних підтримує цю позицію, але потрібні дані про метод опитування"
        error_type: phrase
        options:
          - "частина опитаних підтримує цю позицію, але потрібні дані про метод опитування"
          - "більшість завжди має рацію"
          - "нормальні люди все вирішили"
          - "інакша позиція ненормальна"
        explanation: Апеляція до більшості не замінює доказу.
      - sentence: "Ваш аргумент смішний."
        error: "смішний"
        correction: "не пояснює причинний зв'язок"
        error_type: register
        options: ["не пояснює причинний зв'язок", "абсолютно безглуздий", "типово слабкий", "не вартий уваги"]
        explanation: Конструктивна критика називає проблему логіки.
      - sentence: "Ви хочете повної цензури."
        error: "повної цензури"
        correction: "ви пропонуєте обмежити конкретні типи небезпечного контенту"
        error_type: phrase
        options:
          - "ви пропонуєте обмежити конкретні типи небезпечного контенту"
          - "ви ненавидите свободу слова"
          - "ваша позиція тоталітарна"
          - "ви хочете закрити всі медіа"
        explanation: Треба точно назвати позицію опонента.
      - sentence: "Більшість у коментарях так думає, отже це правда."
        error: "отже це правда"
        correction: "коментарі показують частину настроїв, але не доводять факту"
        error_type: construction
        options:
          - "коментарі показують частину настроїв, але не доводять факту"
          - "коментарі завжди надійні"
          - "факти не потрібні"
          - "хто голосніший, той правий"
        explanation: Популярність не є доказом істинності.

  - id: wb-essay
    type: essay-response
    title: Повна дебатна відповідь
    prompt: >-
      Відповідайте на тезу: "Анонімність у мережі треба повністю заборонити".
      Спершу чесно перефразуйте позицію опонента, потім дайте контраргумент,
      один доказ, можливий компроміс і висновок.
    min_words: 220
    model_answer: >-
      Я розумію позицію опонента так: анонімність може полегшувати образи,
      дезінформацію і заклики до насильства, тому її пропонують повністю
      заборонити. Проблема справді існує, однак повна заборона є надмірною,
      бо вона зачепить людей, яким приватність потрібна для безпечного
      висловлення. Сильнішим механізмом буде прозора модерація конкретних
      типів небезпечного контенту, система скарг і право на оскарження.
      Компромісом може бути підтвердження особи для платформи без публічного
      розкриття імені. Отже, треба обмежувати шкоду, а не саме право на
      приватне висловлення.
    rubric:
      - criteria: Позиція опонента
        description: Передано найсильнішу версію позиції без спотворення.
      - criteria: Контраргумент
        description: Є власна теза, доказ і можливий компроміс.
      - criteria: Етикет
        description: Тон відповідає формальній дискусії.

  - id: wb-critical
    type: critical-analysis
    title: Порівняння позицій
    target_text: >-
      Сторона А: держава має швидко блокувати контент, який загрожує безпеці.
      Сторона Б: будь-яке блокування без незалежного контролю може стати
      цензурою.
    questions:
      - Яку спільну мету можна знайти в обох позиціях?
      - Який ризик підкреслює сторона А?
      - Яке процедурне рішення може врахувати обидва ризики?
    model_answers:
      - "Спільна мета - безпечний публічний простір без необґрунтованого обмеження свободи слова."
      - "Сторона А підкреслює ризик небезпечного контенту."
      - "Можлива прозора процедура: тимчасове обмеження, незалежна перевірка і право на оскарження."

  - type: select
    title: Ролі в дискусії
    instruction: Виберіть формулу, яка відповідає професійній ролі.
    items:
      - question: Модератор має повернути розмову до теми. Яка фраза найкраща?
        options:
          - text: Повернімося до питання механізму контролю.
            correct: true
          - text: Усі говорять неправильно.
            correct: false
          - text: Ця тема мені нецікава.
            correct: false
          - text: Обговорення треба зірвати.
            correct: false
        explanation: Модератор тримає рамку без особистої атаки.
      - question: Учасник визнає сильну частину позиції опонента. Яка формула доречна?
        options:
          - text: Я погоджуюся з проблемою, але не з механізмом.
            correct: true
          - text: Ви повністю помиляєтеся.
            correct: false
          - text: Цей аргумент не вартий відповіді.
            correct: false
          - text: Опонент не має права говорити.
            correct: false
        explanation: Поступка допомагає перейти до контраргументу.
      - question: Яка фраза називає логічну проблему без образ?
        options:
          - text: З часової послідовності тут зроблено причинний висновок.
            correct: true
          - text: Ви не розумієте причинності.
            correct: false
          - text: Це смішна думка.
            correct: false
          - text: Усі мають мовчати.
            correct: false
        explanation: Критика має стосуватися міркування.
      - question: Що робить підсумкова репліка після групової дискусії?
        options:
          - text: Фіксує згоду, відкриті питання і наступні кроки.
            correct: true
          - text: Оголошує всіх опонентів неправими.
            correct: false
          - text: Починає нову тему без зв'язку.
            correct: false
          - text: Приховує відкриті питання.
            correct: false
        explanation: Підсумок перетворює розбіжності на план роботи.
      - question: Яка формула найкраще замінює "це дурниця"?
        options:
          - text: Цей висновок не випливає з наведених даних.
            correct: true
          - text: Це ще більша дурниця.
            correct: false
          - text: Про це не треба говорити.
            correct: false
          - text: Автор позиції смішний.
            correct: false
        explanation: Професійна незгода називає проблему доказу.
      - question: Яке питання є рамковим?
        options:
          - text: Ми оцінюємо це рішення за швидкістю чи за захистом прав?
            correct: true
          - text: Скільки абзаців у вашому виступі?
            correct: false
          - text: Чому ви говорите так тихо?
            correct: false
          - text: Який колір має презентація?
            correct: false
        explanation: Рамкове питання повертає до критеріїв.
      - question: Що робить сильний контраргумент?
        options:
          - text: Визнає реальну проблему й показує кращий висновок.
            correct: true
          - text: Атакує вік опонента.
            correct: false
          - text: Ігнорує докази іншої сторони.
            correct: false
          - text: Замінює аргументи сарказмом.
            correct: false
        explanation: Контраргумент має власну логіку.
      - question: Коли компроміс може бути конструктивним?
        options:
          - text: Коли сторони мають спільну мету й уточнюють механізм.
            correct: true
          - text: Коли докази не мають значення.
            correct: false
          - text: Коли одна сторона принижує іншу.
            correct: false
          - text: Коли регламент ігнорують.
            correct: false
        explanation: Компроміс має спиратися на критерії.
