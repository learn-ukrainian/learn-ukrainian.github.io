version: '1.0'
module: checkpoint-communication
level: b2

inline:
  - id: act-1
    type: critical-analysis
    title: Редакторська ревізія листа
    target_text: >-
      Просимо розглянути питання щодо оновлення матеріалів і повідомити про
      можливі пропозиції найближчим часом.
    questions:
      - Якої конкретної дії бракує адресатові?
      - Який строк або формат відповіді треба додати?
      - Як переписати речення без зайвого канцеляриту?
    model_answers:
      - "Адресат не знає, що саме має зробити: погодити, відхилити чи надіслати правки."
      - "Треба назвати строк і формат, наприклад: до п'ятниці, у таблиці з коментарями."
      - "До п'ятниці просимо підтвердити структуру матеріалів або надіслати правки в таблиці."

  - id: act-2
    type: critical-analysis
    title: Факт, оцінка, маніпуляція
    target_text: >-
      Після запуску нової програми кількість скарг зросла, отже рішення
      повністю провальне.
    questions:
      - Який факт можна зберегти без оцінки?
      - Якого доказу бракує для висновку про провал?
      - Як сформулювати обережніший публічний коментар?
    model_answers:
      - "Факт: після запуску програми кількість скарг зросла."
      - "Бракує даних про типи скарг, попередню динаміку, аудиторію і причини зростання."
      - "Зростання скарг є сигналом для перевірки, але саме по собі не доводить провалу програми."

  - id: act-3
    type: critical-analysis
    title: Q&A без вигадування
    target_text: >-
      Слухач питає про статистику, якої у вас немає. Доповідач відповідає:
      "Я не маю зараз точних даних, тому не буду припускати. Перевірю це після
      зустрічі; попередньо важливо відрізнити швидкість процедури від її
      прозорості".
    questions:
      - Чому ця відповідь професійніша за здогад?
      - Як доповідач зберігає рамку дискусії?
      - Яку коротшу формулу можна використати в реальному Q&A?
    model_answers:
      - "Відповідь прямо визнає межу знання і не вигадує статистику."
      - "Доповідач повертає питання до двох критеріїв: швидкості і прозорості."
      - "Можна сказати: 'Точних даних зараз не маю; перевірю і повернуся з відповіддю'."

  - id: act-4
    type: critical-analysis
    title: Самооцінка портфоліо
    target_text: >-
      У моєму звіті є дані про три зустрічі, але фінальний абзац лише повторює,
      що робота триває.
    questions:
      - Який комунікативний ризик має такий звіт?
      - Який висновок треба додати?
      - Який тренувальний крок допоможе перейти до C1?
    model_answers:
      - "Читач бачить факти, але не отримує пріоритету або рекомендації."
      - "Треба назвати головний ризик, доказ і наступну дію."
      - "Раз на тиждень переписувати фінальний абзац звіту за схемою ризик - доказ - рекомендація."

workbook:
  - type: select
    title: Комунікативні рішення
    instruction: Виберіть точну дію або критерій для B2-комунікації.
    items:
      - question: "Що має бути в професійному листі, якщо адресат має відповісти?"
        options:
          - text: "конкретна дія, строк і формат відповіді"
            correct: true
          - text: "якомога більше ввічливих абстрактних формул"
            correct: false
          - text: "довга історія питання без прохання"
            correct: false
          - text: "емоційна оцінка ситуації"
            correct: false
        explanation: "Адресат має розуміти наступний крок."
      - question: "Яка фраза найточніше обмежує академічний висновок?"
        options:
          - text: "У межах наведених даних можна припустити..."
            correct: true
          - text: "Це без сумніву доводить усе."
            correct: false
          - text: "Усі нормальні читачі погодяться."
            correct: false
          - text: "Докази не потрібні."
            correct: false
        explanation: "Академічний стиль називає межі твердження."
      - question: "Де факт відділено від оцінки?"
        options:
          - text: "Рішення ухвалено 12 червня; його наслідки потребують оцінки."
            correct: true
          - text: "Чиновники знову все зіпсували."
            correct: false
          - text: "Це очевидний провал без деталей."
            correct: false
          - text: "Усі обурені, тому факт доведено."
            correct: false
        explanation: "Перша відповідь називає факт і окремо позначає потребу в аналізі."
      - question: "Яка відповідь на опонента є чесним перефразуванням?"
        options:
          - text: "Як я розумію, ви підтримуєте швидке обмеження небезпечного контенту."
            correct: true
          - text: "Ви хочете повної цензури."
            correct: false
          - text: "Ви проти свободи."
            correct: false
          - text: "Ваша позиція не має права на існування."
            correct: false
        explanation: "Перефразування має передати найсильнішу версію позиції."
      - question: "Що найкраще показує готовність до C1?"
        options:
          - text: "конкретний план правки з жанром, вправою і строком"
            correct: true
          - text: "загальна обіцянка більше практикувати"
            correct: false
          - text: "відмова визнавати слабкі місця"
            correct: false
          - text: "довгий список тем без пріоритетів"
            correct: false
        explanation: "План має бути виконуваним і перевірним."
      - question: "Який варіант найкраще формулює висновок звіту?"
        options:
          - text: "Дві проблеми можна виправити редакторськи; третя потребує зміни процедури."
            correct: true
          - text: "Було проведено багато різних дій."
            correct: false
          - text: "Ситуація загалом цікава."
            correct: false
          - text: "Висновки будуть потім."
            correct: false
        explanation: "Сильний висновок називає пріоритет і дію."
      - question: "Що є коректною реакцією на неповні дані?"
        options:
          - text: "За наявними даними можна бачити сигнал, але потрібна перевірка причин."
            correct: true
          - text: "Неповні дані доводять будь-який висновок."
            correct: false
          - text: "Краще приховати невпевненість."
            correct: false
          - text: "Дані можна замінити тоном."
            correct: false
        explanation: "B2-комунікація позначає межу знання."
      - question: "Яка формула незгоди не атакує людину?"
        options:
          - text: "Цей доказ не підтверджує саме такий висновок."
            correct: true
          - text: "Ви нічого не розумієте."
            correct: false
          - text: "Ваше питання смішне."
            correct: false
          - text: "Опоненту не варто відповідати."
            correct: false
        explanation: "Коректна незгода критикує доказ або логіку."
      - question: "Який початок публічного коментаря найменше маніпулює читачем?"
        options:
          - text: "За наявними даними видно три ризики, але причинність ще треба перевірити."
            correct: true
          - text: "Будь-хто чесний одразу бачить єдину правду."
            correct: false
          - text: "Інших пояснень просто не існує."
            correct: false
          - text: "Опоненти навмисне приховують очевидне."
            correct: false
        explanation: "Нейтральний коментар називає дані, ризик і межу висновку."
      - question: "Що має зробити доповідач після складного запитання про невідомий факт?"
        options:
          - text: "Визнати межу знання, уточнити джерело і домовитися про відповідь після перевірки."
            correct: true
          - text: "Дати приблизну цифру, щоб не втратити впевненість."
            correct: false
          - text: "Перевести увагу на помилку слухача."
            correct: false
          - text: "Сказати, що питання не стосується теми, без пояснення."
            correct: false
        explanation: "B2-мовець не вигадує дані і зберігає рамку розмови."
      - question: "Який критерій допомагає оцінити дебатну відповідь?"
        options:
          - text: "Вона чесно відтворює позицію опонента і відповідає на її найсильнішу частину."
            correct: true
          - text: "Вона робить позицію опонента максимально смішною."
            correct: false
          - text: "Вона змінює тему на зручнішу."
            correct: false
          - text: "Вона замінює аргумент високим тоном."
            correct: false
        explanation: "Сильна відповідь працює з реальним аргументом, а не з карикатурою."
      - question: "Яка самооцінка найкраще підходить для контрольної точки?"
        options:
          - text: "Я можу назвати доказ прогресу, типову помилку і конкретну вправу на наступний місяць."
            correct: true
          - text: "Я загалом відчуваю, що стало краще."
            correct: false
          - text: "Мені більше не потрібні правки."
            correct: false
          - text: "Усі слабкі місця пояснюються браком часу."
            correct: false
        explanation: "Контрольна точка вимагає доказу, діагнозу і наступного кроку."

  - type: error-correction
    title: Регістр і доказовість
    instruction: Виберіть редакцію, яка робить речення професійним або доказовим.
    items:
      - sentence: "Просимо якнайшвидше щось вирішити щодо документів."
        error: "щось вирішити"
        answer: "До середи просимо підтвердити, чи погоджуєте пакет документів."
        options:
          - "До середи просимо підтвердити, чи погоджуєте пакет документів."
          - "Просимо не затягувати з якимось рішенням."
          - "Було б добре щось зробити."
          - "Документи самі по собі важливі."
        explanation: "Редакція називає дію, об'єкт і строк."
      - sentence: "Цей приклад доводить, що всі такі програми провальні."
        error: "всі такі програми"
        answer: "Цей приклад показує ризик, який треба перевірити на ширших даних."
        options:
          - "Цей приклад показує ризик, який треба перевірити на ширших даних."
          - "Цей приклад точно доводить усе."
          - "Усі програми однакові."
          - "Дані не мають значення."
        explanation: "Один приклад не дає права на необмежене узагальнення."
      - sentence: "Опонент нічого не розуміє в процедурі."
        error: "нічого не розуміє"
        answer: "У позиції опонента не пояснено процедуру оскарження."
        options:
          - "У позиції опонента не пояснено процедуру оскарження."
          - "Опонент не має компетентності."
          - "Це смішна позиція."
          - "Дискусію можна завершити."
        explanation: "Критика має стосуватися позиції, а не особи."
      - sentence: "Новий порядок абсолютно знищив можливість подання заявок."
        error: "абсолютно знищив"
        answer: "Новий порядок може ускладнити подання заявок, якщо строк залишиться коротким."
        options:
          - "Новий порядок може ускладнити подання заявок, якщо строк залишиться коротким."
          - "Новий порядок катастрофічний без винятків."
          - "Усі заявники приречені."
          - "Коментувати немає сенсу."
        explanation: "Обережна редакція називає умову і не перебільшує."
      - sentence: "Було здійснено реалізацію підготовки звіту."
        error: "здійснено реалізацію підготовки"
        answer: "Команда підготувала звіт."
        options:
          - "Команда підготувала звіт."
          - "Було здійснено здійснення звіту."
          - "Мала місце реалізація."
          - "Звітність відбулася."
        explanation: "Коротка активна форма точніше називає виконавця і дію."
      - sentence: "Усі розуміють, що це рішення правильне."
        error: "Усі розуміють"
        answer: "Наведені дані підтримують це рішення."
        options:
          - "Наведені дані підтримують це рішення."
          - "Усі нормальні люди це розуміють."
          - "Очевидність не потребує доказів."
          - "Правильність рішення безумовна."
        explanation: "Публічний або академічний текст має спиратися на дані, а не на апеляцію до очевидності."
      - sentence: "Слайд містить усю інформацію, тому виступ можна не структурувати."
        error: "виступ можна не структурувати"
        answer: "слайд підтримує виступ, але не замінює його маршрут"
        options:
          - "слайд підтримує виступ, але не замінює його маршрут"
          - "слайд має замінити промовця"
          - "структура не потрібна"
          - "аудиторія сама знайде головне"
        explanation: "Презентація потребує маршруту, навіть якщо слайди інформативні."
      - sentence: "Я більше практикуватиму українську колись пізніше."
        error: "колись пізніше"
        answer: "щоп'ятниці писатиму 180-слівний аналіз новини"
        options:
          - "щоп'ятниці писатиму 180-слівний аналіз новини"
          - "практика буде інтенсивною в майбутньому"
          - "треба якось більше працювати"
          - "колись повернуся до цього"
        explanation: "План переходу до C1 має містити конкретну вправу і строк."
      - sentence: "Наше рішення найкраще, бо всі відповідальні люди його підтримують."
        error: "всі відповідальні люди"
        answer: "рішення підтримують три профільні організації, але потрібна публічна консультація"
        options:
          - "рішення підтримують три профільні організації, але потрібна публічна консультація"
          - "відповідальні люди не помиляються"
          - "критики просто некомпетентні"
          - "публічна консультація зайва"
        explanation: "Доказ має бути конкретним, а статус прихильників не замінює процедуру."
      - sentence: "У презентації я скажу все, що знаю про тему."
        error: "все, що знаю"
        answer: "оберу тезу, два докази, ризик і фінальний заклик"
        options:
          - "оберу тезу, два докази, ризик і фінальний заклик"
          - "перелічу всі деталі без відбору"
          - "прочитаю весь текст зі слайдів"
          - "додам більше прикладів, ніж дозволяє час"
        explanation: "Професійна презентація потребує відбору, а не повної енциклопедії."
      - sentence: "Якщо читач не погоджується, значить він проти змін."
        error: "проти змін"
        answer: "читач може не погоджуватися з механізмом, навіть якщо підтримує мету"
        options:
          - "читач може не погоджуватися з механізмом, навіть якщо підтримує мету"
          - "незгода завжди означає спротив"
          - "можна не відповідати на критику"
          - "мета автоматично виправдовує механізм"
        explanation: "Чесний аналіз відділяє мету від конкретного способу дії."
      - sentence: "Фінальний абзац звіту просто повторює попередні факти."
        error: "просто повторює"
        answer: "фінальний абзац має назвати висновок, ризик і рекомендовану дію"
        options:
          - "фінальний абзац має назвати висновок, ризик і рекомендовану дію"
          - "повторення фактів достатнє"
          - "висновок краще не формулювати"
          - "рекомендація не належить до звіту"
        explanation: "Звіт має вести читача від фактів до рішення або наступної перевірки."

  - type: match-up
    title: Жанр і контрольне питання
    instruction: Поєднайте комунікативний жанр із питанням, яке найкраще його перевіряє.
    pairs:
      - left: професійний email
        right: яку дію має виконати адресат після прочитання
      - left: звіт
        right: який висновок випливає з наведених фактів
      - left: академічний абзац
        right: де межа твердження і який доказ його підтримує
      - left: новинний аналіз
        right: де факт переходить в оцінку або рамку
      - left: презентація
        right: чи може аудиторія повторити головну тезу
      - left: дебатна відповідь
        right: чи відповідає репліка на реальну позицію опонента
      - left: Q&A
        right: як мовець визнає межу знання і зберігає рамку
      - left: самооцінка
        right: який конкретний тренувальний крок веде до C1
      - left: контраргумент
        right: яку сильну частину чужої позиції треба визнати перед незгодою
      - left: медіаграмотність
        right: які дані потрібні, щоб відділити факт від інтерпретації
      - left: публічний коментар
        right: яку межу твердження треба назвати перед оцінкою
      - left: післяпрезентаційний лист
        right: які домовленості, відповідальні і строки треба зафіксувати

  - id: wb-essay-1
    type: essay-response
    title: Аналітичний звіт про комунікативний прогрес
    prompt: >-
      Напишіть 220-280 слів про власний прогрес у B2-комунікації. Обов'язково
      назвіть один сильний доказ, один ризик, одну редакторську правку і один
      крок перед C1.
    min_words: 220
    model_answer: >-
      Мій найсильніший доказ прогресу - короткий звіт, у якому я зміг відділити
      факти від висновку і сформулювати рекомендацію. Раніше я часто перелічував
      події без пріоритету, тому читач не бачив наступної дії. Тепер я перевіряю
      кожен звіт за схемою: ризик, доказ, рекомендація. Водночас у моєму письмі
      ще є ризик надто широких узагальнень, особливо після одного прикладу. Тому
      редакторська правка для мене така: замінювати категоричні фрази на точніші
      формули межі, наприклад "у межах наведених даних" або "цей приклад показує
      ризик". Перед C1 я планую щотижня писати короткий аналіз новини з трьома
      рядками: факт, оцінка, питання до джерела.
    rubric:
      - criteria: Доказ
        description: Є конкретний приклад із мовного портфоліо.
      - criteria: Саморедагування
        description: Названо реальну правку, а не загальну обіцянку.
      - criteria: План
        description: Крок перед C1 має жанр, частоту і критерій перевірки.

  - id: wb-essay-2
    type: essay-response
    title: Відповідальна публічна позиція
    prompt: >-
      Напишіть 180-240 слів як відповідь на тезу: "Усі анонімні коментарі треба
      заборонити". Спершу чесно перефразуйте позицію опонента, потім дайте
      контраргумент, критерій і можливий компроміс.
    min_words: 180
    model_answer: >-
      Як я розумію позицію опонента, анонімні коментарі можуть полегшувати
      образи, дезінформацію і заклики до насильства, тому пропонується повна
      заборона анонімності. Проблема справді існує, але повна заборона є
      надмірним механізмом. Вона зачепить людей, яким приватність потрібна для
      безпечного висловлення, наприклад у чутливих професійних або громадських
      темах. Критерієм має бути не сама анонімність, а конкретна шкода: заклик
      до насильства, координоване цькування або доведена дезінформаційна дія.
      Компромісом може бути підтвердження особи для платформи без публічного
      розкриття імені, прозора процедура скарг і право на оскарження. Таке
      рішення обмежує шкоду, але не знищує право на приватне висловлення.
    rubric:
      - criteria: Перефразування
        description: Позицію опонента передано без карикатури.
      - criteria: Критерій
        description: Є межа, за якою можливе обмеження.
      - criteria: Компроміс
        description: Запропоновано механізм із процедурним захистом.

  - id: wb-critical
    type: critical-analysis
    title: Змішаний пакет документів
    target_text: >-
      Звіт: "За місяць команда опрацювала 42 заявки, 11 повернула на доопрацювання".
      Новина: "Нова процедура різко збільшила кількість відмов".
      Коментар: "Чиновники знову довели, що система не працює".
    questions:
      - Який текст найближчий до факту і чому?
      - Де з'являється інтерпретація?
      - Який маніпулятивний маркер є в коментарі?
      - Яких даних бракує для висновку про відмови?
      - Як написати нейтральний підсумок пакета?
    model_answers:
      - "Звіт найближчий до факту, бо називає числа і дію без оцінки."
      - "Інтерпретація з'являється в новині через слово 'різко'."
      - "Маркером є узагальнення 'знову довели' і ярлик 'система не працює'."
      - "Бракує даних про попередні місяці, причини повернення і критерії відмови."
      - "За місяць команда опрацювала 42 заявки; частку повернень треба порівняти з попереднім періодом і причинами доопрацювання."
