  - id: workbook-5
    type: essay-response
    title: "Підсумковий редакторський коментар"
    instruction: "Напишіть 170-220 слів про змішаний громадсько-правовий або бізнесовий фрагмент."
    prompt: >-
      Оберіть короткий фрагмент із темами громади, права або бізнесу. Назвіть
      домен і регістр, поясніть 4 граматичні вузли: родовий, давальний, орудний,
      питання або займенник. Запропонуйте дві точні правки й поясніть, як вони
      змінюють ясність тексту.
    min_words: 170
    model_answer: |-
      > [!model-answer]
      > Фрагмент має змішаний громадсько-правовий і економічний регістр, бо говорить про раду, аудит, підприємців, скаргу й інвесторів. У сполуці через затримку аудиту форма затримку залежить від прийменника через у причинному значенні, а аудиту є родовим уточненням події. У сполуці всупереч попереднім прогнозам треба давальний, тому варіант всупереч попередніх прогнозів був би помилкою. У реченні бізнесу бракує доказів слово бізнесу є давальним переживача або носія стану, а доказів - родовим того, чого не вистачає. У реченні документ підписали електронним підписом орудний називає засіб. Я б виправив юристка питає, якщо потрібна скарга на юристка з'ясовує, чи потрібна скарга, бо це вкладене питання. Також самий важливий аргумент треба замінити на найважливіший аргумент. Обидві правки роблять текст нейтральним і точним.
    peer_review_guidelines: "Перевірте, чи автор назвав домен і регістр, пояснив щонайменше чотири граматичні вузли, не ввів теми після M53 і дав правки з причинами."
    rubric:
      - criteria: "Домен і регістр"
        description: "Коментар визначає сферу й тон тексту."
        points: 3
      - criteria: "Граматика відмінків"
        description: "Родовий, давальний і орудний пояснено через керування або функцію."
        points: 6
      - criteria: "Запитання/займенники"
        description: "Є коректний аналіз вкладеного, деліберативного, риторичного запитання або займенникової форми."
        points: 4
      - criteria: "Редагування"
        description: "Правки точні, регістрово доречні й пояснені."
        points: 4
      - criteria: "Мова"
        description: "Відповідь зв'язна, без зайвої теорії."
        points: 3
