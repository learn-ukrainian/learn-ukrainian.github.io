version: '1.0'
module: checkpoint-cases-morphology
level: b2

inline:
  - id: act-1
    type: reading
    title: "Паспорт тексту і перші граматичні вузли"
    instruction: "Прочитайте фрагмент і визначте сферу, регістр та контрольні форми."
    source: "Навчальний checkpoint-фрагмент B2."
    text: >-
      Комітет із фінансів повідомив громаді, що через затримку аудиту слухання
      перенесено. Всупереч попереднім прогнозам, підприємцям вдалося подати
      частину документів до ради. Юристка з'ясовує, чи вистачить доказів для
      скарги, а фасилітатор питає себе: що нам робити далі?
    tasks:
      - "Назвіть домінантні сфери фрагмента."
      - "Випишіть два слова, які вказують на правовий або громадський регістр."
      - "Поясніть форму прогнозам у сполуці всупереч попереднім прогнозам."
      - "Поясніть форму доказів у сполуці чи вистачить доказів."
      - "Назвіть тип запитання що нам робити далі?"
  - type: select
    title: "Функція відмінка"
    instruction: "Позначте всі правильні пояснення для кожного прикладу."
    items:
      - question: "У фразі бракує доказів правильні пояснення такі:"
        options:
          - text: "доказів стоїть у родовому"
            correct: true
          - text: "форма називає те, чого не вистачає"
            correct: true
          - text: "це орудний знаряддя"
            correct: false
          - text: "це давальний адресата"
            correct: false
        min_correct: 2
        explanation: "Дієслово бракує керує родовим того, чого немає або недостатньо."
      - question: "У реченні підприємцям варто перевірити договір правильні пояснення такі:"
        options:
          - text: "підприємцям є давальним"
            correct: true
          - text: "форма називає носія потреби або рекомендації"
            correct: true
          - text: "підприємцям є родовим після прийменника"
            correct: false
          - text: "форма є підметом у називному"
            correct: false
        min_correct: 2
        explanation: "Конструкція варто + інфінітив часто має давальний того, кому варто діяти."
      - question: "У фразі підписати заяву електронним підписом правильні пояснення такі:"
        options:
          - text: "електронним підписом є орудним"
            correct: true
          - text: "форма називає засіб дії"
            correct: true
          - text: "форма є родовим належності"
            correct: false
          - text: "потрібен прийменник з перед засобом"
            correct: false
        min_correct: 2
        explanation: "Орудний без прийменника може називати інструмент або засіб."
      - question: "У сполуці рішення комісії можливі пояснення такі:"
        options:
          - text: "комісії може називати джерело або автора рішення"
            correct: true
          - text: "це родовий, пов'язаний з номіналізацією"
            correct: true
          - text: "комісії обов'язково означає адресата рішення"
            correct: false
          - text: "це орудний у складеному присудку"
            correct: false
        min_correct: 2
        explanation: "Родовий після іменника рішення часто називає орган, який ухвалив рішення."
      - question: "У реченні редакторка стала консультанткою правильні пояснення такі:"
        options:
          - text: "консультанткою є орудним у складеному присудку"
            correct: true
          - text: "форма називає роль або статус"
            correct: true
          - text: "це родовий після заперечення"
            correct: false
          - text: "це давальний переживача"
            correct: false
        min_correct: 2
        explanation: "Після стала іменна частина присудка часто стоїть в орудному."
      - question: "У сполуці без підтримки громади правильні пояснення такі:"
        options:
          - text: "підтримки стоїть у родовому після без"
            correct: true
          - text: "громади може називати джерело підтримки"
            correct: true
          - text: "без керує давальним"
            correct: false
          - text: "підтримки є орудним ролі"
            correct: false
        min_correct: 2
        explanation: "Без керує родовим; другий родовий уточнює, чия або для кого підтримка."
      - question: "У фразі всупереч технічним проблемам правильні пояснення такі:"
        options:
          - text: "технічним проблемам є давальним"
            correct: true
          - text: "всупереч виражає протиставлення очікуваній перешкоді"
            correct: true
          - text: "всупереч вимагає родового"
            correct: false
          - text: "це приклад вкладеного запитання"
            correct: false
        min_correct: 2
        explanation: "Всупереч керує давальним і вводить перешкоду або контраст."
      - question: "У реченні команда питає себе, що робити далі правильні пояснення такі:"
        options:
          - text: "себе є зворотним займенником"
            correct: true
          - text: "що робити далі є деліберативним питанням"
            correct: true
          - text: "себе є підметом у називному"
            correct: false
          - text: "це риторичне питання з готовою відповіддю"
            correct: false
        min_correct: 2
        explanation: "Команда спрямовує питання на себе й зважує майбутню дію."

  - type: fill-in
    title: "Керування і закінчення"
    instruction: "Вставте форму, яка відповідає прийменниковому керуванню."
    items:
      - sentence: "____ швидкому рішенню комісії проєкт зекономив час."
        answer: "Завдяки"
        options:
          - "Завдяки"
          - "Через"
          - "Без"
          - "Після"
        explanation: "Завдяки керує давальним: швидкому рішенню."
      - sentence: "____ затримку аудиту бізнес не отримав відповіді вчасно."
        answer: "Через"
        options:
          - "Через"
          - "Всупереч"
          - "Назустріч"
          - "Наперекір"
        explanation: "Через керує знахідним у причинному значенні; тут воно краще за завдяки, бо причина негативна."
      - sentence: "____ попереднім домовленостям зустріч перенесли."
        answer: "Всупереч"
        options:
          - "Всупереч"
          - "Без"
          - "Після"
          - "Замість"
        explanation: "Всупереч керує давальним: попереднім домовленостям."
      - sentence: "____ підтримки громади рішення не матиме довіри."
        answer: "Без"
        options:
          - "Без"
          - "Завдяки"
          - "Насупроти"
          - "Навстріч"
        explanation: "Без керує родовим: підтримки громади."
      - sentence: "____ важливою зустріччю команда перевірила документи."
        answer: "Перед"
        options:
          - "Перед"
          - "Після"
          - "Для"
          - "Замість"
        explanation: "Перед у часовому значенні керує орудним: важливою зустріччю."
      - sentence: "Діалог триває ____ представниками громади й бізнесу."
        answer: "між"
        options:
          - "між"
          - "без"
          - "до"
          - "замість"
        explanation: "Між у цьому значенні керує орудним множини: представниками."
      - sentence: "Пояснення ____ закупівлі оприлюднили на сайті ради."
        answer: "щодо"
        options:
          - "щодо"
          - "всупереч"
          - "завдяки"
          - "назустріч"
        explanation: "Щодо керує родовим: закупівлі."
      - sentence: "____ відсутності кворуму засідання перенесуть."
        answer: "У разі"
        options:
          - "У разі"
          - "Всупереч"
          - "Навстріч"
          - "Завдяки"
        explanation: "У разі керує родовим: відсутності."
      - sentence: "Команда працювала ____ новими партнерами над звітом."
        answer: "з"
        options:
          - "з"
          - "без"
          - "до"
          - "після"
        explanation: "З у значенні супроводу керує орудним: новими партнерами."
      - sentence: "____ одного пункту, договір залишився без змін."
        answer: "За винятком"
        options:
          - "За винятком"
          - "Всупереч"
          - "Завдяки"
          - "Назустріч"
        explanation: "За винятком керує родовим: одного пункту."

  - type: error-correction
    title: "Запитання і займенники"
    instruction: "Виправте помилку й поясніть, що саме змінилося."
    items:
      - sentence: "Юристка питає, якщо потрібні додаткові документи?"
        error: "якщо потрібні"
        correction: "чи потрібні"
        explanation: "Після питає у вкладеному yes/no-запитанні потрібне чи; якщо виражає умову."
      - sentence: "Команда поставила їй запитання, що нам робити далі?"
        error: "їй запитання, що нам робити далі?"
        correction: "собі запитання: що нам робити далі?"
        explanation: "Якщо команда сама зважує дію, потрібен зворотний займенник собі й деліберативне питання після двокрапки."
      - sentence: "Учасники домовилися один одного про дедлайн."
        error: "один одного"
        correction: "один з одним"
        explanation: "Домовитися вимагає взаємної конструкції з прийменником з + орудний."
      - sentence: "Самий важливий доказ треба додати до скарги."
        error: "Самий важливий"
        correction: "Найважливіший"
        explanation: "Самий не утворює нормативний найвищий ступінь у нейтральному стилі; потрібне найважливіший."
      - sentence: "Ми не знаємо, де вони живуть?"
        error: "?"
        correction: "."
        explanation: "Це вкладене wh-запитання всередині твердження, тому кінцевий знак питання не потрібен."
      - sentence: "Кожні учасники отримали той самий інструкції."
        error: "Кожні учасники отримали той самий інструкції"
        correction: "Кожен учасник отримав ті самі інструкції"
        explanation: "Кожен узгоджується з одниною, тому потрібне отримав; інструкції - множина, тому треба ті самі інструкції."
      - sentence: "Кожен учасник отримав той самий інструкції."
        error: "той самий інструкції"
        correction: "ті самі інструкції"
        explanation: "Інструкції - множина, тому потрібна форма ті самі."
      - sentence: "Вони слухали одне одному під час наради."
        error: "одне одному"
        correction: "одне одного"
        explanation: "Після слухати потрібен знахідний у взаємній конструкції: слухали одне одного."

  - id: act-5
    type: critical-analysis
    title: "Комплексна коректура checkpoint-фрагмента"
    instruction: "Проаналізуйте фрагмент і дайте короткі редакторські пояснення."
    target_text: >-
      Завдяки затримки аудиту бізнес не отримав відповіді, але всупереч проблем
      проєкт продовжився. Учасники написали один одному звіт і питали, якщо
      потрібно подати скаргу? Хіба не очевидно, що без підтримку громади рішення
      суду буде самим важливим аргументом для інвесторів?
    questions:
      - "Яка причина робить завдяки затримки семантично невдалою?"
      - "Які дві прийменникові групи треба відремонтувати за відмінком?"
      - "Яке питання треба перетворити на вкладене?"
      - "Яку займенникову або прикметникову помилку треба виправити?"
      - "Запропонуйте одну повну відредаговану версію."
    model_answers:
      - "Семантично краще через затримку аудиту, бо затримка є негативною причиною, а завдяки підходить до бажаної причини."
      - "Треба виправити всупереч проблем на всупереч проблемам і без підтримку громади на без підтримки громади."
      - "Питали, якщо потрібно подати скаргу треба перетворити на з'ясовували, чи потрібно подати скаргу."
      - "Самим важливим треба замінити на найважливішим; один одному звіт краще уточнити як підготували спільний звіт або написали одне одному."
      - "Можлива версія: Через затримку аудиту бізнес не отримав відповіді, але всупереч технічним проблемам проєкт продовжився. Учасники підготували спільний звіт і з'ясовували, чи потрібно подати скаргу. Хіба не очевидно, що без підтримки громади рішення суду не стане найважливішим аргументом для інвесторів?"
    focus_points:
      - "прийменникове керування"
      - "семантика завдяки/через"
      - "вкладене yes/no-запитання"
      - "займенникова й прикметникова точність"

  - id: act-6
    type: essay-response
    title: "Коротка B2-синтеза"
    instruction: "Напишіть 150-180 слів: паспорт тексту, 3 граматичні вузли, одна правка."
    prompt: >-
      Проаналізуйте короткий громадсько-правовий або бізнесовий фрагмент. Обов'язково
      використайте: один родовий після прийменника, один давальний після прийменника
      або в безособовій конструкції, один орудний ролі чи засобу, одне вкладене або
      деліберативне запитання, одну займенникову правку.
    min_words: 150
    model_answer: |-
      > [!model-answer]
      > Фрагмент належить до громадсько-правового регістру: у ньому є рада, скарга, доказ і рішення суду. У сполуці без підтримки громади слово підтримки стоїть у родовому, бо прийменник без керує родовим. У реченні всупереч попереднім прогнозам команда продовжила роботу форма прогнозам є давальним після всупереч. У фразі документ підписали електронним підписом орудний називає засіб дії. Я б виправив речення юристка питає, якщо потрібні додаткові документи на юристка з'ясовує, чи потрібні додаткові документи, бо це вкладене yes/no-запитання. Також форма самий важливий доказ має стати найважливіший доказ. Такі правки роблять текст нейтральним і точним.
    rubric:
      - criteria: "Паспорт тексту"
        description: "Названо домен і регістр, а не лише тему."
        points: 3
      - criteria: "Відмінки"
        description: "Є родовий, давальний і орудний з поясненням функції."
        points: 5
      - criteria: "Питання і займенники"
        description: "Є правильна трансформація запитання або займенникова правка."
        points: 4
      - criteria: "Зв'язність"
        description: "Відповідь читається як короткий аналіз, а не список форм."
        points: 3

workbook:
  - id: workbook-1
    type: reading
    title: "Читання: аналітичний фрагмент із контрольними формами"
    instruction: "Прочитайте текст і виконайте діагностичні завдання."
    source: "Навчальний текст для підсумкового контролю B2.4."
    text: >-
      Місце України в європейській економічній і правовій системі залежить від
      безпеки, прозорості інституцій і довіри до процедур. Після консультацій
      громади підприємцям запропонували подати зауваження до проєкту регламенту.
      Всупереч попереднім прогнозам, частина учасників підтримала жорсткіші
      правила звітності, бо без відкритого доступу до даних бюджет не матиме
      суспільної довіри. Юристи з'ясовують, чи вистачить доказів для скарги, а
      економісти питають себе: що робити з витратами, які зростають швидше за
      доходи? Рішення ради може стати аргументом для інвесторів, але тільки за
      умови, що його пояснять нейтральною мовою, а не рекламним гаслом.
    tasks:
      - "Визначте домен і регістр тексту."
      - "Випишіть 3 прийменникові групи й назвіть відмінок."
      - "Знайдіть один давальний адресата або носія потреби."
      - "Знайдіть вкладене й деліберативне запитання."
      - "Поясніть, чому рекламне гасло було б невдалим регістровим вибором."
  - type: quiz
    title: "Швидка перевірка керування"
    instruction: "Оберіть правильний варіант."
    items:
      - question: "Який варіант правильно вживає завдяки?"
        options:
          - text: "завдяки своєчасній допомозі"
            correct: true
          - text: "завдяки своєчасної допомоги"
            correct: false
          - text: "завдяки своєчасну допомогу"
            correct: false
          - text: "завдяки своєчасною допомогою"
            correct: false
        explanation: "Завдяки керує давальним."
      - question: "Який варіант правильно вживає без?"
        options:
          - text: "без достатніх доказів"
            correct: true
          - text: "без достатні докази"
            correct: false
          - text: "без достатніми доказами"
            correct: false
          - text: "без достатнім доказам"
            correct: false
        explanation: "Без керує родовим."
      - question: "Який варіант правильно передає вкладене yes/no-запитання?"
        options:
          - text: "Комісія з'ясовує, чи потрібна додаткова перевірка."
            correct: true
          - text: "Комісія з'ясовує, якщо потрібна додаткова перевірка?"
            correct: false
          - text: "Комісія з'ясовує, де потрібна додаткова перевірка?"
            correct: false
          - text: "Комісія з'ясовує, хіба потрібна додаткова перевірка."
            correct: false
        explanation: "Для вкладеного yes/no-запитання потрібне чи."
      - question: "У якому реченні орудний називає роль?"
        options:
          - text: "Вона працює адвокаткою."
            correct: true
          - text: "Вона підписала заяву ручкою."
            correct: false
