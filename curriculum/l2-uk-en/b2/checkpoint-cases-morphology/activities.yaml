  - type: error-correction
    title: "Коректура відмінків, запитань і займенників"
    instruction: "Виправте речення й поясніть граматичну причину."
    items:
      - sentence: "Всупереч попередніх прогнозів, бізнес підтримав зміни."
        error: "попередніх прогнозів"
        correction: "попереднім прогнозам"
        explanation: "Всупереч керує давальним, тому вся група має давальний."
      - sentence: "Без відкритий доступ до даних бюджет не матиме довіри."
        error: "відкритий доступ"
        correction: "відкритого доступу"
        explanation: "Без керує родовим: відкритого доступу."
      - sentence: "Редакторка стала консультантка юридичного відділу."
        error: "консультантка"
        correction: "консультанткою"
        explanation: "Після стала роль виражається орудним: консультанткою."
      - sentence: "Фасилітатор запитав себе, якщо треба змінити порядок денний?"
        error: "якщо треба"
        correction: "чи треба"
        explanation: "Вкладене yes/no-запитання оформлюється через чи; кінцевий знак питання не потрібен у твердженні."
      - sentence: "Учасники надіслали один одного коментарі."
        error: "один одного"
        correction: "одне одному"
        explanation: "Адресат у взаємній конструкції стоїть у давальному: одне одному."
      - sentence: "Сам документ і той самий документ означає одне й те саме."
        error: "означає одне й те саме"
        correction: "означають різне"
        explanation: "Сам документ фокусує документ без посередника; той самий документ означає ідентичність."
      - sentence: "Завдяки затримки аудиту слухання перенесли."
        error: "Завдяки затримки"
        correction: "Через затримку"
        explanation: "Затримка є негативною причиною, тому краще через; форма затримку відповідає причинному через."
      - sentence: "Після важлива зустріч команда оновила договір."
        error: "важлива зустріч"
        correction: "важливої зустрічі"
        explanation: "Після керує родовим: після важливої зустрічі."

