version: '1.0'
module: checkpoint-cases-morphology
level: b2
inline:
  - type: quiz
    title: "Діагностика: форма і функція"
    instruction: "Оберіть варіант, який найточніше пояснює форму в контексті."
    items:
      - question: "Яку функцію має родовий у фразі бракує доказів?"
        options:
          - text: "нестача або відсутність потрібної кількості"
            correct: true
          - text: "інструмент дії"
            correct: false
          - text: "адресат поради"
            correct: false
          - text: "простір перед предметом"
            correct: false
        explanation: "Після бракує залежне слово стоїть у родовому й називає те, чого не вистачає."
      - question: "Який варіант правильно показує давальний після прийменника?"
        options:
          - text: "всупереч прогнозам"
            correct: true
          - text: "всупереч прогнози"
            correct: false
          - text: "всупереч прогнозів"
            correct: false
          - text: "всупереч прогнозами"
            correct: false
        explanation: "Прийменник всупереч керує давальним відмінком."
      - question: "У якому реченні орудний називає інструмент?"
        options:
          - text: "Редакторка позначила помилку синім олівцем."
            correct: true
          - text: "Студентові варто повторити правило."
            correct: false
          - text: "Команда потребує підтримки."
            correct: false
          - text: "Я не знаю, чи буде зустріч."
            correct: false
        explanation: "Синім олівцем має форму орудного й називає знаряддя дії."
      - question: "Яке речення містить вкладене yes/no-запитання?"
        options:
          - text: "Організатори уточнюють, чи потрібна реєстрація."
            correct: true
          - text: "Чи потрібна реєстрація?"
            correct: false
          - text: "Якщо потрібна реєстрація, заповніть форму."
            correct: false
          - text: "Хіба можна прийти без реєстрації?"
            correct: false
        explanation: "Чи потрібна реєстрація стало підрядною частиною після уточнюють."
      - question: "Який варіант найкраще виправляє помилку завдяки лікаря?"
        options:
          - text: "завдяки лікареві"
            correct: true
          - text: "завдяки лікарем"
            correct: false
          - text: "завдяки лікаря"
            correct: false
          - text: "завдяки лікар"
            correct: false
        explanation: "Після завдяки потрібен давальний; лікареві й лікарю є можливими формами."
      - question: "Яке пояснення найточніше для питання Що нам робити далі?"
        options:
          - text: "деліберативне запитання з давальним носія сумніву"
            correct: true
          - text: "риторичне запитання з уже готовою відповіддю"
            correct: false
          - text: "родовий після заперечення"
            correct: false
          - text: "орудний присудкової ролі"
            correct: false
        explanation: "Форма нам називає групу, що зважує дію."
      - question: "Яке речення правильно вживає родовий після прийменника без?"
        options:
          - text: "Без підтримки громади проєкт не матиме довіри."
            correct: true
          - text: "Без підтримку громади проєкт не матиме довіри."
            correct: false
          - text: "Без підтримкою громади проєкт не матиме довіри."
            correct: false
          - text: "Без підтримці громади проєкт не матиме довіри."
            correct: false
        explanation: "Прийменник без керує родовим відмінком."
      - question: "Який варіант правильно показує взаємну займенникову конструкцію?"
        options:
          - text: "Студенти писали одне одному короткі пояснення."
            correct: true
          - text: "Студенти писали один одного короткі пояснення."
            correct: false
          - text: "Студенти писали собою короткі пояснення."
            correct: false
          - text: "Студенти писали себе короткі пояснення."
            correct: false
        explanation: "Адресат письма потребує давального: одне одному."
      - question: "Яке речення правильно використовує між у нейтральному просторовому значенні?"
        options:
          - text: "Між новими корпусами відкрили прохід."
            correct: true
          - text: "Між нових корпусів відкрили прохід."
            correct: false
          - text: "Між новим корпусам відкрили прохід."
            correct: false
          - text: "Між нові корпуси відкрили прохід."
            correct: false
        explanation: "У нейтральній просторовій моделі між керує орудним."
      - question: "Який варіант правильно передає родовий конкретного документа?"
        options:
          - text: "номер акта"
            correct: true
          - text: "номер акту"
            correct: false
          - text: "номер актом"
            correct: false
          - text: "номер актові"
            correct: false
        explanation: "Коли йдеться про конкретний документ, нормативною є форма акта."

  - type: true-false
    title: "Швидка ревізія функцій"
    instruction: "Позначте, чи правильно описано граматичну функцію."
    items:
      - statement: "У фразі додати води родовий може передавати частковість."
        correct: true
        explanation: "Йдеться про невизначену кількість речовини."
      - statement: "Прийменник всупереч керує родовим відмінком."
        correct: false
        explanation: "Всупереч керує давальним: всупереч прогнозам."
      - statement: "У реченні мені холодно форма мені називає переживача стану."
        correct: true
        explanation: "Це давальний переживача в безособовій конструкції."
      - statement: "У фразі писати олівцем орудний потребує прийменника з."
        correct: false
        explanation: "Інструмент звичайно виражається безприйменниковим орудним."
      - statement: "Речення Я не знаю, де вони живуть містить вкладене запитання."
        correct: true
        explanation: "Пряме питання стало підрядною частиною після не знаю."
      - statement: "Форма себе може бути підметом у називному відмінку."
        correct: false
        explanation: "Займенник себе не має називної форми."
      - statement: "У конструкції один одного змінюється друга частина."
        correct: true
        explanation: "Наприклад: бачити один одного, писати одне одному."
      - statement: "Риторичне запитання завжди просить нову фактичну інформацію."
        correct: false
        explanation: "Риторичне запитання веде до висновку або підсилює тезу."
      - statement: "У фразі перед старим будинком прикметник і іменник стоять в орудному."
        correct: true
        explanation: "Після перед у просторовому значенні треба узгодити всю групу."
      - statement: "У реченні Я не знаю, якщо буде зустріч слово якщо вводить правильне вкладене запитання."
        correct: false
        explanation: "Для вкладеного yes/no-запитання потрібне чи."

  - type: critical-analysis
    id: act-3
    title: "Критичний аналіз: прийменник і зміст"
    instruction: "Прочитайте фрагмент і дайте короткі аргументовані відповіді."
    target_text: >-
      Завдяки підтримці громади центр відкрив новий курс. Попри технічні
      труднощі команда не відклала запуск. Проте через затримку фінансування
      частині учасників бракує матеріалів. Організатори з'ясовують, чи варто
      змінити розклад.
    questions:
      - "Чому завдяки підтримці і через затримку не можна міняти місцями без зміни змісту?"
      - "Яку функцію має родовий у фразі бракує матеріалів?"
      - "Який тип запитання містить останнє речення?"
    model_answers:
      - "Завдяки називає позитивну або бажану причину й керує давальним, а через у цьому контексті називає небажану причину й керує знахідним відмінком."
      - "Матеріалів є родовим нестачі: фраза називає те, чого не вистачає учасникам."
      - "Чи варто змінити розклад є вкладеним yes/no-запитанням після дієслова з'ясовують."

  - type: match-up
    title: "Поєднайте форму з функцією"
    instruction: "Зіставте приклад із його граматичною роллю."
    pairs:
      - left: "замість відповіді"
        right: "родовий після прийменника заміни"
      - left: "учасникові потрібно"
        right: "давальний адресата інструкції"
      - left: "синім олівцем"
        right: "орудний знаряддя з узгодженням"
      - left: "всупереч прогнозам"
        right: "давальний після прийменника протиставлення"
      - left: "перед старим будинком"
        right: "орудний після просторового прийменника"
      - left: "Я не знаю, де вони живуть."
        right: "вкладене wh-запитання"
      - left: "Хіба можна діяти без даних?"
        right: "риторичне запитання"
      - left: "Що нам робити далі?"
        right: "деліберативне запитання"
      - left: "пишатися країною"
        right: "дієслівне керування орудним"
      - left: "поставити собі запитання"
        right: "зворотний займенник у давальному"
      - left: "номер акта"
        right: "родовий конкретного документа"
      - left: "колір каменю"
        right: "родовий матеріалу або властивості"

  - type: essay-response
    id: act-5
    title: "Мініесе: граматичний паспорт абзацу"
    instruction: "Напишіть українською короткий аналіз власного або поданого абзацу."
    prompt: >-
      Складіть абзац про громадський, освітній або культурний проєкт. Ужийте
      щонайменше одну форму родового, давального й орудного відмінків, один
      прийменник із давальним, одне вкладене запитання і одне деліберативне
      або риторичне запитання. Після абзацу додайте 5-6 речень пояснення:
      яку функцію виконує кожна контрольна форма.
    min_words: 170
    model_answer: >-
      Майбутній курс залежить від підтримки громади, досвіду викладачів і
      готовності студентів працювати один з одним. Завдяки новим партнерам
      університет відкрив консультації, але всупереч прогнозам частині
      учасників бракує часу на підготовку. Що нам змінити в розкладі, щоб
      заняття не стали формальністю? Організатори з'ясовують, чи потрібна
      додаткова зустріч перед стартом. У цьому абзаці від підтримки громади
      має родовий залежності, завдяки партнерам і всупереч прогнозам керують
      давальним, бракує часу вимагає родового нестачі, а працювати один з одним
      має взаємну займенникову конструкцію з орудним. Питання що нам змінити
      є деліберативним, бо група зважує дію. Конструкція чи потрібна додаткова
      зустріч є вкладеним запитанням після з'ясовують.
    rubric:
      - criteria: "Покриття граматики"
        description: "Є родовий, давальний, орудний, прийменникове керування й типи запитань."
        points: 4
      - criteria: "Пояснення функцій"
        description: "Автор не лише вживає форми, а й пояснює їхню роль у реченні."
        points: 4
      - criteria: "Морфологічна точність"
        description: "Узгодження груп, займенники й пунктуація вкладених запитань правильні."
        points: 4
      - criteria: "Зв'язність"
        description: "Абзац має зрозумілу тему й не перетворюється на механічний список форм."
        points: 3

workbook:
  - type: reading
    id: cases-morphology-reading
    title: "Читання: аналітичний фрагмент із контрольними формами"
    instruction: "Прочитайте фрагмент і виконайте завдання після нього."
    source: "Навчальний текст для контрольного модуля B2."
    text: >-
      Місце України в Європі залежить від безпеки, економічної довіри,
      культурної пам'яті й здатності громад пояснювати власні рішення. Завдяки
      досвіду волонтерів багато міст навчилися діяти швидко, але всупереч
      оптимістичним прогнозам частині проєктів бракує довгого планування.
      Команди працюють із міжнародними партнерами, передають дані захищеним
      каналом і дедалі частіше питають себе, чи вистачить відкритості для
      тривалої співпраці. Хіба можна говорити про розвиток без прозорого
      кошторису й відповідальності перед громадою? Що нам робити далі, якщо
      коротка мобілізація має стати сталою інституційною практикою?
    tasks:
      - "Випишіть дві родові форми й поясніть їхню функцію."
      - "Знайдіть два прийменники або дієслова, що керують давальним."
      - "Випишіть орудний інструмента або способу."
      - "Знайдіть вкладене запитання."
      - "Знайдіть риторичне або деліберативне запитання й поясніть його мету."

  - type: select
    title: "Оберіть усі природні формулювання"
    instruction: "У кожному пункті виберіть усі варіанти, що відповідають українській нормі й контексту."
    items:
      - question: "Які два варіанти правильно передають давальний після прийменника?"
        min_correct: 2
        options:
          - text: "завдяки підтримці громади"
            correct: true
          - text: "всупереч попереднім прогнозам"
            correct: true
          - text: "завдяки підтримку громади"
            correct: false
          - text: "всупереч попередніх прогнозів"
            correct: false
          - text: "наперекір технічних труднощів"
            correct: false
        explanation: "Завдяки, всупереч і наперекір керують давальним."
      - question: "Які два варіанти природно виражають інструмент або засіб?"
        min_correct: 2
        options:
          - text: "позначити форму синім олівцем"
            correct: true
          - text: "надіслати дані захищеним каналом"
            correct: true
          - text: "позначити форму з синім олівцем"
            correct: false
          - text: "надіслати дані захищеного каналу"
            correct: false
          - text: "позначити форму синьому олівцеві"
            correct: false
        explanation: "Інструмент або засіб часто виражається орудним без прийменника."
      - question: "Які два варіанти правильно передають вкладене запитання?"
        min_correct: 2
        options:
          - text: "Я не знаю, чи буде зустріч."
            correct: true
          - text: "Організатори уточнюють, де відбудеться подія."
            correct: true
          - text: "Я не знаю, якщо буде зустріч."
            correct: false
          - text: "Організатори уточнюють, де відбудеться подія?"
            correct: false
          - text: "Якщо буде зустріч, я не знаю."
            correct: false
        explanation: "Чи і питальне слово вводять вкладені запитання; якщо вводить умову."
      - question: "Які два варіанти правильно узгоджують орудну групу?"
        min_correct: 2
        options:
          - text: "перед старим будинком"
            correct: true
          - text: "між новими корпусами"
            correct: true
          - text: "перед старий будинком"
            correct: false
          - text: "між нові корпуси"
            correct: false
          - text: "поза офіційна програма"
            correct: false
        explanation: "У непрямому відмінку змінюється вся іменна група."
      - question: "Які два варіанти правильно передають родовий після заперечення або нестачі?"
        min_correct: 2
        options:
          - text: "Команда не отримала відповіді."
            correct: true
          - text: "Учасникам бракує часу."
            correct: true
          - text: "Команда не отримала відповідь у загальному значенні відсутності."
            correct: false
          - text: "Учасникам бракує час."
            correct: false
          - text: "Бракує часом для підготовки."
            correct: false
        explanation: "Відсутність і нестача часто виражаються родовим."
      - question: "Які два варіанти правильно вживають зворотний або взаємний займенник?"
        min_correct: 2
        options:
          - text: "поставити собі запитання"
            correct: true
          - text: "писати одне одному"
            correct: true
          - text: "себе поставив запитання"
            correct: false
          - text: "писати один одного листи"
            correct: false
          - text: "пишатися себе"
            correct: false
        explanation: "Себе не має називної форми, а адресат у взаємній дії стоїть у давальному."
      - question: "Які два варіанти доречно розрізняють риторику й делібератив?"
        min_correct: 2
        options:
          - text: "Що нам робити далі?"
            correct: true
          - text: "Хіба можна діяти без доказів?"
            correct: true
          - text: "Я не знаю, чи буде зустріч?"
            correct: false
          - text: "Якщо нам робити далі?"
            correct: false
          - text: "Де вони живуть у ролі риторики без контексту?"
            correct: false
        explanation: "Перше запитання зважує дію, друге підсилює тезу."
      - question: "Які два варіанти правильно показують дієслівне керування?"
        min_correct: 2
        options:
          - text: "пишатися країною"
            correct: true
          - text: "довіряти команді"
            correct: true
          - text: "пишатися за країну"
            correct: false
          - text: "довіряти команду"
            correct: false
          - text: "користуватися словника"
            correct: false
        explanation: "Пишатися керує орудним, а довіряти - давальним."

  - type: fill-in
    title: "Доберіть правильну форму"
    instruction: "Заповніть пропуск формою, що відповідає керуванню й змісту."
    items:
      - sentence: "Команда завершила роботу ____ підтримці партнерів."
        answer: "завдяки"
        options:
          - "завдяки"
          - "всупереч"
          - "замість"
          - "перед"
        explanation: "Підтримка партнерів є позитивною причиною, тому природне завдяки."
      - sentence: "Учасникам бракує ____ для підготовки презентації."
        answer: "часу"
        options:
          - "часу"
          - "часом"
          - "часові"
          - "час"
        explanation: "Після бракує потрібен родовий."
      - sentence: "Студентові варто поставити ____ три контрольні запитання."
        answer: "собі"
        options:
          - "собі"
          - "себе"
          - "собою"
          - "себею"
        explanation: "Поставити кому? собі - давальний зворотного займенника."
      - sentence: "Редакторка позначила сумнівну форму ____ олівцем."
        answer: "синім"
        options:
          - "синім"
          - "синій"
          - "синього"
          - "синьому"
        explanation: "Олівцем стоїть в орудному, тому прикметник теж має форму синім."
      - sentence: "Ми з'ясовуємо, ____ потрібна додаткова зустріч."
        answer: "чи"
        options:
          - "чи"
          - "якщо"
          - "бо"
          - "щоб"
        explanation: "У вкладеному yes/no-запитанні потрібне чи."
      - sentence: "____ прогнозам, команда не відклала запуск."
        answer: "Всупереч"
        options:
          - "Всупереч"
          - "Замість"
          - "Після"
          - "Навколо"
        explanation: "Всупереч керує давальним і позначає дію проти очікування."
      - sentence: "Без ____ громади проєкт не матиме довіри."
        answer: "підтримки"
        options:
          - "підтримки"
          - "підтримку"
          - "підтримкою"
          - "підтримці"
        explanation: "Після без потрібен родовий."
      - sentence: "Між новими ____ відкрили пішохідний прохід."
        answer: "корпусами"
        options:
          - "корпусами"
          - "корпусів"
          - "корпусам"
          - "корпуси"
        explanation: "У нейтральному просторовому значенні між керує орудним."
      - sentence: "Команда ____ країною й довіряє партнерам."
        answer: "пишається"
        options:
          - "пишається"
          - "пишається за"
          - "пишається до"
          - "пишається про"
        explanation: "Пишатися керує орудним без прийменника."
      - sentence: "Організатори уточнюють, ____ всі отримали лист."
        answer: "чи"
        options:
          - "чи"
          - "якщо"
          - "коли"
          - "бо"
        explanation: "Для вкладеного yes/no-запитання потрібне чи."

  - type: error-correction
    title: "Виправте морфологічні помилки"
    instruction: "Знайдіть помилкову форму й виберіть найкраще редагування."
    items:
      - sentence: "Завдяки лікаря команда швидко отримала консультацію."
        error: "Завдяки лікаря"
        correction: "Завдяки лікареві"
        error_type: "construction"
        options:
          - "Завдяки лікареві"
          - "Завдяки лікарем"
          - "Завдяки лікар"
          - "Завдяки лікаря"
        explanation: "Після завдяки потрібен давальний."
      - sentence: "Вони писали звіт з олівцем і перевіряли таблицю з калькулятором."
        error: "з олівцем"
        correction: "олівцем"
        error_type: "construction"
        options:
          - "олівцем"
          - "до олівця"
          - "олівцеві"
          - "олівця"
        explanation: "Інструмент письма виражається безприйменниковим орудним."
      - sentence: "Я не знаю, якщо учасники отримали лист."
        error: "якщо"
        correction: "чи"
        error_type: "construction"
        options:
          - "чи"
          - "коли"
          - "бо"
          - "щоб"
        explanation: "Після не знаю для yes/no-запитання потрібне чи."
      - sentence: "Перед старий будинком зібралися учасники екскурсії."
        error: "старий будинком"
        correction: "старим будинком"
        error_type: "construction"
        options:
          - "старим будинком"
          - "старого будинку"
          - "старому будинку"
          - "старий будинок"
        explanation: "Після перед у просторовому значенні потрібен орудний усієї групи."
      - sentence: "Команда пишається за країну й довіряє партнерів."
        error: "пишається за країну"
        correction: "пишається країною"
        error_type: "construction"
        options:
          - "пишається країною"
          - "пишається країні"
          - "пишається країни"
          - "пишається про країну"
        explanation: "Пишатися керує орудним без прийменника."
      - sentence: "Учасники дивилися один на одного й писали один з одним листи."
        error: "писали один з одним листи"
        correction: "писали одне одному листи"
        error_type: "construction"
        options:
          - "писали одне одному листи"
          - "писали один одного листи"
          - "писали одним одним листи"
          - "писали себе листи"
        explanation: "Для адресата листа потрібен давальний: одне одному."
      - sentence: "Відповідно рішення комісії зустріч перенесли."
        error: "Відповідно рішення"
        correction: "Відповідно до рішення"
        error_type: "construction"
        options:
          - "Відповідно до рішення"
          - "Відповідно рішенням"
          - "Відповідно рішенню"
          - "Відповідно рішення"
        explanation: "Складений прийменник відповідно до керує родовим."
      - sentence: "Перед новий корпусом встановили інформаційний стенд."
        error: "новий корпусом"
        correction: "новим корпусом"
        error_type: "construction"
        options:
          - "новим корпусом"
          - "новий корпусом"
          - "нового корпусу"
          - "новому корпусі"
        explanation: "Після перед у просторовому значенні вся група стоїть в орудному."

