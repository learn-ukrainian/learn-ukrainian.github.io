          correct: false
        - text: "Суд обрав запобіжний захід."
          correct: true
        - text: "Адвокат заважає правосуддю самим фактом захисту."
          correct: false
    - question: "Цивільний спір."
      min_correct: 2
      options:
        - text: "Позивач просить стягнути борг."
          correct: true
        - text: "Відповідач автоматично злочинець."
          correct: false
        - text: "Суд досліджує докази сторін."
          correct: true
        - text: "Позов завжди означає кримінальну справу."
          correct: false
    - question: "Трудове право."
      min_correct: 2
      options:
        - text: "Працівник оскаржує звільнення."
          correct: true
        - text: "Роботодавець точно винний без рішення суду."
          correct: false
        - text: "Суд може поновити працівника на роботі."
          correct: true
        - text: "Відпустка є запобіжним заходом."
          correct: false
    - question: "Господарський договір."
      min_correct: 2
      options:
        - text: "Контрагент порушив строк виконання зобов'язання."
          correct: true
        - text: "Будь-який борг є воєнним злочином."
          correct: false
        - text: "Сторони можуть укласти мирову угоду."
          correct: true
        - text: "Договір не створює правових наслідків."
          correct: false
    - question: "Права людини."
