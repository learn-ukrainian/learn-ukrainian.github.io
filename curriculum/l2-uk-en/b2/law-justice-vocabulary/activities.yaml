- type: fill-in
  title: Точний термін
  instruction: Заповніть пропуск доречним юридичним терміном.
  items:
    - sentence: "До обвинувального вироку діє ____."
      answer: презумпція невинуватості
      options:
        - презумпція невинуватості
        - трудова відпустка
        - виборча кампанія
        - дипломатична заява
      explanation: Особу не можна вважати винною до вироку.
    - sentence: "Сторона захисту подала ____ про долучення доказів."
      answer: клопотання
      options:
        - клопотання
        - вирок
        - санкцію
        - касацію
      explanation: Клопотання є процесуальним проханням.
    - sentence: "У цивільній справі ____ звертається до суду з вимогою."
      answer: позивач
      options:
        - позивач
        - прокурор
        - свідок
        - дипломат
      explanation: Позивач ініціює позов.
    - sentence: "Суд обрав ____ у вигляді застави."
      answer: запобіжний захід
      options:
        - запобіжний захід
        - остаточний вирок
        - трудовий договір
        - міжнародний договір
      explanation: Застава може бути запобіжним заходом.
    - sentence: "Рішення першої інстанції можна ____ у визначений строк."
      answer: оскаржити
      options:
        - оскаржити
        - вигукнути
        - приховати
        - затягнути без процедури
      explanation: Оскарження має процесуальний порядок.
    - sentence: "____ визначає, який суд може розглядати справу."
      answer: Юрисдикція
      options:
        - Юрисдикція
        - Агітація
        - Реклама
        - Дипломатія
      explanation: Юрисдикція описує межі компетенції.
    - sentence: "Працівник оскаржує ____ і просить поновити його на роботі."
      answer: звільнення
      options:
        - звільнення
        - обшук
        - вирок
        - санкції
      explanation: Це типова трудова лексика.
    - sentence: "Компанія вимагає ____ збитків за договором."
      answer: відшкодування
      options:
        - відшкодування
        - підозри
        - допиту
        - свідка
      explanation: Відшкодування пов'язане з компенсацією.
    - sentence: "____ дає показання про відомі йому обставини."
      answer: Свідок
      options:
        - Свідок
        - Позов
        - Санкція
        - Юрисдикція
      explanation: Свідок повідомляє факти.
    - sentence: "____ підтримує позицію обвинувачення в суді."
      answer: Прокурор
      options:
        - Прокурор
        - Позивач
        - Омбудсмен
        - Кредитор
      explanation: Прокурор є стороною обвинувачення.
- type: fill-in
  title: Переформулювання без правового ризику
  instruction: Оберіть слово, яке робить речення точнішим.
  items:
    - sentence: "Замість 'злочинець' до вироку краще: ____."
      answer: підозрюваний
      options:
        - підозрюваний
        - переможець
        - свідоцтво
        - коментар
      explanation: Статус залежить від етапу провадження.
    - sentence: "Замість 'суд покарав до розгляду' краще: суд обрав ____."
      answer: запобіжний захід
      options:
        - запобіжний захід
        - рекламу
        - гасло
        - коаліцію
      explanation: Запобіжний захід не є покаранням.
    - sentence: "Замість 'адвокат виправдовує злочин' краще: адвокат здійснює ____."
      answer: захист
      options:
        - захист
        - підрахунок
        - дипломатію
        - агітацію
      explanation: Захист є процесуальним правом.
    - sentence: "Замість 'працівника вигнали' краще: працівник оскаржує ____."
      answer: звільнення
      options:
        - звільнення
        - вирок
        - санкцію
        - обшук
      explanation: Трудовий спір потребує точного терміна.
    - sentence: "Замість 'компанія кинула партнера' краще: контрагент порушив ____."
      answer: зобов'язання
      options:
        - зобов'язання
        - свідка
        - презумпцію
        - юрисдикцію
      explanation: Господарський спір описують через договірні обов'язки.
    - sentence: "Замість 'людині зламали права' краще: заявник стверджує про ____ права."
      answer: порушення
      options:
        - порушення
        - підрахунок
        - рекламу
        - погоду
      explanation: Правозахисний текст називає конкретне порушення.
    - sentence: "Замість 'суд усе підтвердив' краще: суд ____ докази."
      answer: дослідив
      options:
        - дослідив
        - прикрасив
        - вигукнув
        - забув
      explanation: Суд досліджує докази, а не просто повторює оцінку.
    - sentence: "Замість 'справу закрили назавжди' краще: провадження ____."
      answer: закрито
      options:
        - закрито
        - намальовано
        - вигадано
        - проголосовано
      explanation: Далі треба перевіряти, чи можливе оскарження.
    - sentence: "Замість 'правозахисники обурені' краще: правозахисники повідомляють про ____ дискримінації."
      answer: ризик
      options:
        - ризик
        - відпустку
        - поставку
        - агітацію
      explanation: Конкретний ризик сильніший за загальну емоцію.
    - sentence: "Замість 'вирок змінили' краще: апеляційний суд ____ вирок."
      answer: переглянув
      options:
        - переглянув
        - погортав
        - приховав
        - прокоментував без рішення
      explanation: Апеляція є процедурою перегляду.
- type: true-false
  title: Правова обережність
  instruction: Позначте, чи правильне твердження.
  items:
    - statement: Підозрюваний і засуджений мають різний процесуальний статус.
      correct: true
      explanation: Засудженим особа стає після відповідного вироку.
    - statement: Запобіжний захід автоматично означає покарання.
      correct: false
      explanation: Це процесуальний захід, а не вирок.
    - statement: Адвокат має право захищати клієнта незалежно від суспільної емоції.
      correct: true
      explanation: Право на захист є основою справедливого процесу.
    - statement: Позивач і відповідач є типовими ролями цивільного спору.
      correct: true
      explanation: Це сторони позовного провадження.
    - statement: Будь-який договірний спір треба називати злочином.
      correct: false
      explanation: Договірний спір може бути цивільним або господарським.
    - statement: Оскарження рішення має визначений процедурний порядок.
      correct: true
      explanation: Апеляція чи касація подаються за правилами.
    - statement: Свідок автоматично стає стороною обвинувачення.
      correct: false
      explanation: Свідок повідомляє обставини, але не є стороною.
    - statement: Правозахисний текст має називати конкретне право або групу.
      correct: true
      explanation: Це зменшує ризик порожнього узагальнення.
    - statement: Вирок можна вживати як синонім будь-якої думки редакції.
      correct: false
      explanation: Вирок є судовим рішенням у кримінальній справі.
    - statement: Юрисдикція допомагає визначити компетентний суд або орган.
      correct: true
      explanation: Без юрисдикції незрозуміло, хто розглядає справу.
- type: mark-the-words
  title: Процесуальні ролі
  instruction: Позначте слова, які називають учасників судового або правового процесу.
  text: "Суддя відкрив засідання, прокурор оголосив позицію обвинувачення, адвокат заявив клопотання, свідок дав показання, потерпілий підтримав вимогу про відшкодування, а відповідач подав заперечення."
  answers:
    - Суддя
    - прокурор
    - адвокат
    - свідок
    - потерпілий
    - відповідач
- type: error-correction
  title: Виправлення правового ризику
  instruction: Виправте речення так, щоб воно було точним і юридично обережним.
  items:
    - sentence: "Особу вже точно визнали злочинцем."
      error: "вже точно визнали злочинцем"
      answer: "називають підозрюваною до вироку"
      error_type: register
      explanation: До вироку не можна оголошувати людину винною.
    - sentence: "Суд покарав людину заставою."
      error: "покарав людину заставою"
      answer: "обрав запобіжний захід у вигляді застави"
      error_type: phrase
      explanation: Застава як запобіжний захід не є покаранням.
    - sentence: "Адвокат приховує правду, бо захищає клієнта."
      error: "приховує правду"
      answer: "здійснює захист клієнта"
      error_type: register
      explanation: Захист є процесуальною роллю.
    - sentence: "Працівника вигнали з роботи."
      error: "вигнали"
      answer: "звільнили; працівник оскаржує звільнення"
      error_type: register
      explanation: Для трудового спору потрібні точні дієслова.
    - sentence: "Компанія кинула партнера за договором."
      error: "кинула партнера"
      answer: "не виконала договірне зобов'язання"
      error_type: register
      explanation: Господарський текст називає зобов'язання.
    - sentence: "Свідок довів вирок."
      error: "довів вирок"
      answer: "дав показання, які суд оцінює"
      error_type: phrase
      explanation: Свідок не ухвалює вирок.
    - sentence: "Правозахисники кажуть, що всім порушили все."
      error: "всім порушили все"
      answer: "повідомляють про ризик порушення конкретного права"
      error_type: register
      explanation: Потрібно назвати право й групу.
    - sentence: "Апеляція просто не погодилася."
      error: "просто не погодилася"
      answer: "апеляційний суд переглянув рішення"
      error_type: phrase
      explanation: Апеляція є процедурою перегляду.
