- type: essay-response
  id: law-justice-responsible-news
  title: Відповідальна юридична новина
  instruction: Напишіть короткий юридично обережний текст із правильними статусами.
  prompt: "Перепишіть емоційне повідомлення 'суд відпустив злочинця, адвокат усе приховав' як відповідальну юридичну новину на 150-180 слів. Назвіть процесуальний статус особи, дію суду, роль адвоката, можливість оскарження й межу між фактом та оцінкою."
  min_words: 150
  model_answer: "Суд змінив запобіжний захід особі, якій повідомлено про підозру. Це рішення не означає визнання невинуватості або винуватості, адже питання вини має вирішуватися під час розгляду справи по суті. Адвокат у цьому провадженні здійснює захист клієнта й має право заявляти клопотання, подавати докази та оскаржувати процесуальні дії. Сторона обвинувачення може не погодитися з рішенням суду й подати апеляційну скаргу, якщо для цього є процесуальні підстави. У новині важливо відділити факт від оцінки: факт полягає у зміні запобіжного заходу, а оцінка рішення може бути різною. До обвинувального вироку особу не варто називати злочинцем, бо діє презумпція невинуватості."
  rubric:
    - criteria: Процесуальна точність
      description: Автор правильно називає статус особи й дію суду.
      points: 3
    - criteria: Презумпція невинуватості
      description: Текст не оголошує людину винною до вироку.
      points: 3
    - criteria: Регістр новини
      description: Формулювання нейтральні, без образ і без зайвої драматизації.
      points: 2
