- type: quiz
  title: Правова точність
  instruction: Оберіть найточніше формулювання або визначення.
  items:
    - question: Чому до вироку не варто називати особу злочинцем?
      options:
        - text: це порушує презумпцію невинуватості
          correct: true
        - text: це робить речення довшим
          correct: false
        - text: це завжди художній прийом
          correct: false
        - text: це стосується тільки економіки
          correct: false
      explanation: Процесуальний статус треба називати точно.
    - question: Що найточніше називає слово "клопотання"?
      options:
        - text: процесуальне прохання до суду або органу
          correct: true
        - text: будь-який емоційний коментар
          correct: false
        - text: вирок у кримінальній справі
          correct: false
        - text: заголовок журналістської статті
          correct: false
      explanation: Клопотання є процесуальною дією.
    - question: Яке речення найкраще передає роль адвоката?
      options:
        - text: Адвокат здійснює захист прав клієнта.
          correct: true
        - text: Адвокат скасовує вирок без суду.
          correct: false
        - text: Адвокат автоматично підтверджує вину.
          correct: false
        - text: Адвокат замінює прокурора.
          correct: false
      explanation: Захист є правом у процедурі.
    - question: Що означає "запобіжний захід"?
      options:
        - text: процесуальний захід до вирішення справи по суті
          correct: true
        - text: остаточне кримінальне покарання
          correct: false
        - text: будь-яку цивільну угоду
          correct: false
        - text: рішення роботодавця про відпустку
          correct: false
      explanation: Запобіжний захід не є вироком.
    - question: У якій справі природно вживати слово "позивач"?
      options:
        - text: у цивільній справі про стягнення боргу
          correct: true
        - text: у розмові про погоду
          correct: false
        - text: у підрахунку голосів
          correct: false
        - text: у дипломатичному комюніке без спору
          correct: false
      explanation: Позивач звертається з позовом.
    - question: Що робить правову новину відповідальною?
      options:
        - text: названий статус особи, орган, документ і етап процедури
          correct: true
        - text: максимально гучний заголовок
          correct: false
        - text: відсутність джерел
          correct: false
        - text: заміна всіх термінів емоціями
          correct: false
      explanation: Правовий текст потребує джерела й процедури.
    - question: Чим апеляція відрізняється від звичайного незадоволення?
      options:
        - text: це процесуальний спосіб перегляду рішення
          correct: true
        - text: це приватна образа на суд
          correct: false
        - text: це доказ винуватості
          correct: false
        - text: це синонім обшуку
          correct: false
      explanation: Апеляція має визначену процедуру.
    - question: Коли доречно слово "юрисдикція"?
      options:
        - text: коли треба визначити компетентний суд або орган
          correct: true
        - text: коли бракує емоційності
          correct: false
        - text: коли йдеться про кулінарний рецепт
          correct: false
        - text: коли автор не знає статусу справи
          correct: false
      explanation: Юрисдикція визначає межі розгляду.
    - question: Яке формулювання точніше для трудового спору?
      options:
        - text: Працівник оскаржує звільнення й просить поновити його на роботі.
          correct: true
        - text: Працівника просто вигнали якось.
          correct: false
        - text: Роботодавець уже злочинець.
          correct: false
        - text: Це міжнародний трибунал.
          correct: false
      explanation: Трудовий спір має власну лексику.
    - question: Що означає "відшкодування" у правовому тексті?
      options:
        - text: компенсацію завданої шкоди або збитків
          correct: true
        - text: автоматичне позбавлення волі
          correct: false
        - text: політичну рекламу
          correct: false
        - text: опис виборчої кампанії
          correct: false
      explanation: Відшкодування пов'язане з компенсацією.
