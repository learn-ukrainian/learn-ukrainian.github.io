version: '1.0'
module: law-justice-vocabulary
level: b2
inline:
  - type: match-up
    title: "Учасник і роль"
    instruction: "Поєднайте учасника правової ситуації з обережною роллю."
    pairs:
      - left: "суддя"
        right: "розглядає справу й ухвалює рішення"
      - left: "прокурор"
        right: "підтримує позицію обвинувачення"
      - left: "адвокат"
        right: "здійснює захист або представництво"
      - left: "позивач"
        right: "подає вимогу до суду"
      - left: "відповідач"
        right: "відповідає на позовні вимоги"
      - left: "підозрюваний"
        right: "має право на захист до вироку"
      - left: "свідок"
        right: "повідомляє відомі обставини"
      - left: "потерпілий"
        right: "особа, якій могла бути завдана шкода"
      - left: "експерт"
        right: "надає висновок із фахового питання"
      - left: "присяжний"
        right: "бере участь у розгляді у визначених законом випадках"

  - type: quiz
    title: "Процедурно безпечне слово"
    instruction: "Оберіть формулу, яка не перебільшує правовий статус."
    items:
      - question: "Як краще написати до вироку суду?"
        options:
          - text: "особу затримали за підозрою"
            correct: true
          - text: "злочинця вже впіймали"
            correct: false
          - text: "винного нарешті покарали"
            correct: false
          - text: "порушник без прав"
            correct: false
        explanation: "До вироку треба називати процесуальний статус."
      - question: "Що таке запобіжний захід?"
        options:
          - text: "процесуальне рішення, яке не дорівнює покаранню"
            correct: true
          - text: "автоматичний вирок"
            correct: false
          - text: "побутова оцінка поведінки"
            correct: false
          - text: "гарантія винуватості"
            correct: false
        explanation: "Запобіжний захід забезпечує процедуру."
      - question: "Яка фраза найточніша для правової допомоги?"
        options:
          - text: "юрист перевірить, чи є підстави для оскарження"
            correct: true
          - text: "юрист точно виграє справу"
            correct: false
          - text: "адвокат гарантує перемогу"
            correct: false
          - text: "право саме все вирішить"
            correct: false
        explanation: "Фахівець може оцінити підстави, але не гарантувати результат."
      - question: "Що означає презумпція невинуватості в мовленні?"
        options:
          - text: "не називати людину винною до вироку"
            correct: true
          - text: "ніколи не писати про підозру"
            correct: false
          - text: "забороняти всі правові новини"
            correct: false
          - text: "ігнорувати докази"
            correct: false
        explanation: "Принцип не скасовує опис процедури, але обмежує ярлики."
      - question: "Яка формула обережна щодо прав людини?"
        options:
          - text: "заявник стверджує, що йому не надали доступу до адвоката"
            correct: true
          - text: "усі права точно знищено"
            correct: false
          - text: "держава завжди винна"
            correct: false
          - text: "суд уже морально все довів"
            correct: false
        explanation: "Обережна формула називає джерело твердження."
      - question: "Що треба додати до plain-language пояснення?"
        options:
          - text: "дію, строк, документ і межу"
            correct: true
          - text: "тільки складні терміни"
            correct: false
          - text: "гарантію позитивного рішення"
            correct: false
          - text: "емоційний тиск"
            correct: false
        explanation: "Пояснення має допомогти адресату діяти."
      - question: "Яка фраза точна для цивільної справи?"
        options:
          - text: "позивач просить відшкодування шкоди"
            correct: true
          - text: "позивач карає відповідача"
            correct: false
          - text: "відповідач уже злочинець"
            correct: false
          - text: "суд автоматично дасть гроші"
            correct: false
        explanation: "Цивільний спір не треба описувати кримінальними ярликами."
      - question: "Що робить апеляція?"
        options:
          - text: "просить переглянути рішення у визначеному порядку"
            correct: true
          - text: "скасовує рішення автоматично"
            correct: false
          - text: "забороняє суду працювати"
            correct: false
          - text: "перетворює підозру на вирок"
            correct: false
        explanation: "Оскарження запускає процедуру перегляду, а не гарантує результат."
      - question: "Яка фраза точна для повідомлення про докази?"
        options:
          - text: "сторона подала докази, які суд має дослідити"
            correct: true
          - text: "докази вже все довели до суду"
            correct: false
          - text: "коментарі є вироком"
            correct: false
          - text: "пости автоматично підтвердили провину"
            correct: false
        explanation: "Докази оцінюють у процедурі."
      - question: "Яке пояснення не є юридичною гарантією?"
        options:
          - text: "результат залежить від документів і процедури"
            correct: true
          - text: "суд точно скасує рішення"
            correct: false
          - text: "компенсацію виплатять безумовно"
            correct: false
          - text: "апеляція завжди успішна"
            correct: false
        explanation: "Обережна межа не обіцяє результату."

  - type: fill-in
    title: "Правові терміни в контексті"
    instruction: "Вставте потрібний термін."
    items:
      - sentence: "Особа має право на ____ під час провадження."
        answer: "захист"
        options: ["захист", "вирок", "штраф", "сенсацію"]
        explanation: "Право на захист є базовою процесуальною гарантією."
      - sentence: "____ невинуватості не дозволяє називати людину винною до вироку."
        answer: "Презумпція"
        options: ["Презумпція", "Компенсація", "Екстрадиція", "Договір"]
        explanation: "Презумпція невинуватості є принципом."
      - sentence: "Сторона подала ____ про зміну запобіжного заходу."
        answer: "клопотання"
        options: ["клопотання", "ярлик", "чутку", "гасло"]
        explanation: "Клопотання є процесуальним проханням."
      - sentence: "Рішення може бути ____ в апеляційному порядку."
        answer: "оскаржено"
        options: ["оскаржено", "засуджено", "сховано", "вгадано"]
        explanation: "Оскарження означає спробу перегляду."
      - sentence: "Позивач просить ____ шкоди."
        answer: "відшкодування"
        options: ["відшкодування", "затримання", "підозру", "свідка"]
        explanation: "Відшкодування стосується компенсації шкоди."
      - sentence: "До скарги треба додати ____ документів."
        answer: "копії"
        options: ["копії", "вироки", "плітки", "саміт"]
        explanation: "Документи підтверджують обставини."
      - sentence: "Суд досліджує ____ під час розгляду."
        answer: "докази"
        options: ["докази", "емоції", "пости", "гасла"]
        explanation: "Докази мають процесуальний статус."
      - sentence: "Правова ____ допомагає людині зрозуміти можливі кроки."
        answer: "допомога"
        options: ["допомога", "сенсація", "провина", "реклама"]
        explanation: "Правова допомога може бути консультацією або представництвом."
      - sentence: "____ заява формулює вимогу до суду."
        answer: "Позовна"
        options: ["Позовна", "Сенсаційна", "Випадкова", "Побутова"]
        explanation: "Позовна заява містить вимогу й підстави."
      - sentence: "Питання компенсації залежить від ____ і процедури."
        answer: "доказів"
        options: ["доказів", "чуток", "гасел", "емоцій"]
        explanation: "Компенсація потребує підтвердження."

  - type: error-correction
    title: "Уникаємо юридичного overclaiming"
    instruction: "Виправте фразу так, щоб вона була правово обережною."
    items:
      - sentence: "Злочинця вже впіймали."
        error: "Злочинця"
        correction: "Особу затримали за підозрою"
        options:
          - "Особу затримали за підозрою"
          - "Винного остаточно схопили"
          - "Погану людину закрили"
          - "Злочинність людини доведено"
        explanation: "До вироку не можна оголошувати людину злочинцем."
      - sentence: "Суд покарав підозрюваного запобіжним заходом."
        error: "покарав"
        correction: "обрав запобіжний захід щодо підозрюваного"
        options:
          - "обрав запобіжний захід щодо підозрюваного"
          - "видав вирок наперед"
          - "покарав без доказів"
          - "вирішив винуватість заходом"
        explanation: "Запобіжний захід не є покаранням."
      - sentence: "Адвокат захищає злочин."
        error: "захищає злочин"
        correction: "здійснює захист клієнта"
        options:
          - "здійснює захист клієнта"
          - "підтримує злочин"
          - "скасовує право"
          - "виправдовує все"
        explanation: "Захист клієнта є процесуальною роллю."
      - sentence: "Юрист гарантує, що суд скасує рішення."
        error: "гарантує"
        correction: "оцінює підстави для оскарження"
        options:
          - "оцінює підстави для оскарження"
          - "точно виграє"
          - "обіцяє результат"
          - "вирішує замість суду"
        explanation: "Правова допомога не має гарантувати результат."
      - sentence: "Договір усе, бо одна сторона не заплатила."
        error: "Договір усе"
        correction: "може постати питання про розірвання договору"
        options:
          - "може постати питання про розірвання договору"
          - "договір помер"
          - "усі автоматично винні"
          - "право закінчилося"
        explanation: "Наслідок залежить від умов і процедури."
      - sentence: "Дискримінацію вже доведено в дописі."
        error: "доведено в дописі"
        correction: "автор допису вказує на можливі ознаки дискримінації"
        options:
          - "автор допису вказує на можливі ознаки дискримінації"
          - "допис є вироком"
          - "усе очевидно без перевірки"
          - "дискримінація автоматична"
        explanation: "Сильне правове твердження потребує процедури або джерела."
      - sentence: "Компенсацію виплатять без проблем."
        error: "виплатять без проблем"
        correction: "питання компенсації залежить від доказів і процедури"
        options:
          - "питання компенсації залежить від доказів і процедури"
          - "гроші гарантовані"
          - "суд зобов'язаний дати все"
          - "відшкодування автоматичне"
        explanation: "Компенсація потребує підстав."
      - sentence: "Скарга скасовує рішення автоматично."
        error: "скасовує рішення автоматично"
        correction: "може запустити процедуру перегляду рішення"
        options:
          - "може запустити процедуру перегляду рішення"
          - "одразу знищує рішення"
          - "є фінальним вироком"
          - "робить суд непотрібним"
        explanation: "Оскарження не гарантує результат."

  - type: true-false
    title: "Правова точність"
    instruction: "Визначте, чи твердження відповідає обережному правовому мовленню."
    items:
      - statement: "Підозра не дорівнює вироку."
        correct: true
        explanation: "Це різні етапи процедури."
      - statement: "Адвокат може гарантувати рішення суду."
        correct: false
        explanation: "Фахівець може оцінювати й представляти позицію, але не гарантувати рішення."
      - statement: "Plain-language пояснення може зберігати юридичний термін і додавати просту дію."
        correct: true
        explanation: "Таке пояснення допомагає адресату діяти."
      - statement: "Запобіжний захід завжди є покаранням."
        correct: false
        explanation: "Це процесуальне рішення."
      - statement: "Позовна заява формулює вимогу до суду."
        correct: true
        explanation: "Позов починає або оформлює цивільний спір."
      - statement: "Слово «незаконно» можна писати без документа або правової оцінки."
        correct: false
        explanation: "Потрібна підстава або обережна формула."
      - statement: "Оскарження означає спробу перегляду у визначеному порядку."
        correct: true
        explanation: "Результат залежить від процедури."
      - statement: "До вироку краще писати «підозрюваний» або «обвинувачений», а не «злочинець»."
        correct: true
        explanation: "Так зберігається презумпція невинуватості."
      - statement: "Докази має досліджувати суд у межах процедури."
        correct: true
        explanation: "Це обережне процесуальне формулювання."
      - statement: "Допис у соцмережі автоматично доводить дискримінацію."
        correct: false
        explanation: "Сильне правове твердження потребує перевірки."

  - id: act-6
    type: critical-analysis
    title: "Новина про справу: що можна стверджувати?"
    instruction: "Проаналізуйте фрагмент і запропонуйте правово обережну версію."
    target_text: "У місцевому чаті написали, що злочинця вже впіймали й суд точно його покарає. Поліція повідомила про затримання особи за підозрою у правопорушенні. Адвокат заявив, що захист перевіряє законність затримання. Суд має розглянути клопотання про запобіжний захід."
    questions:
      - "Яке джерело є офіційним?"
      - "Які слова порушують презумпцію невинуватості?"
      - "Яку дію ще має розглянути суд?"
      - "Напишіть нейтральну версію двома реченнями."
    model_answers:
      - "Офіційним джерелом у фрагменті є повідомлення поліції; також є позиція адвоката."
      - "Слова «злочинця» і «точно покарає» порушують обережність, бо вироку ще немає."
      - "Суд має розглянути клопотання про запобіжний захід."
      - "Нейтральна версія: «Поліція повідомила про затримання особи за підозрою у правопорушенні. Захист перевіряє законність затримання, а суд має розглянути клопотання про запобіжний захід»."

workbook:
  - id: wb-reading-legal-aid
    type: reading
    title: "Читання: скарга і правова допомога"
    source: "Навчальний правовий кейс для B2."
    text: >-
      Заявниця отримала відповідь від органу влади, але вважає, що документ не пояснює причину відмови. Вона звернулася по правову допомогу. Юрист пояснив, що можна перевірити підстави рішення, строк для оскарження й перелік документів, які підтверджують обставини. Він не гарантував результат, але запропонував підготувати скаргу, додати копію відповіді та сформулювати вимогу про повторний розгляд. У консультаційному повідомленні заявниці написали: «Ви можете подати скаргу протягом десяти робочих днів. Додайте копію відповіді й документи, які підтверджують вашу позицію. Результат залежить від процедури та оцінки матеріалів».
    tasks:
      - "Випишіть право, обов'язкові дії й строк."
      - "Знайдіть фразу, яка уникає гарантії результату."
      - "Поясніть, чому текст є plain-language версією."

  - id: wb-essay-legal-precision
    type: essay-response
    title: "Есе: чому правова мова має бути обережною"
    source_reading: wb-reading-legal-aid
    instruction: "Напишіть 180-220 слів українською."
    prompt: "Поясніть, чому в правових темах важливо уникати overclaiming і водночас писати зрозуміло. Використайте щонайменше десять слів із модуля."
    min_words: 180
    model_answer: |-
      > [!model-answer]
      > Правова мова має бути обережною, бо слова змінюють статус людини або дії. Якщо журналіст називає підозрюваного злочинцем до вироку, він порушує презумпцію невинуватості. Якщо юрист гарантує результат, він приховує залежність від доказів і процедури. Тому в правових темах треба називати учасника, документ, строк, клопотання, докази й межу твердження. Водночас точність не повинна робити текст незрозумілим. Plain-language пояснення зберігає терміни, але додає дію: хто може подати скаргу, які копії документів потрібні, коли можливе оскарження, що залежить від суду або органу влади. Така мова поважає право, адресата й відповідальність слова.
    rubric:
      - criteria: "Правова точність"
        description: "Не перебільшено статус і результат."
        points: 3
      - criteria: "Plain language"
        description: "Складні терміни пояснено через дії."
        points: 3
      - criteria: "Лексика"
        description: "Ужито щонайменше десять термінів."
        points: 2
      - criteria: "Зв'язність"
        description: "Аргумент послідовний."
        points: 2

  - type: group-sort
    title: "Галузі й слова"
    instruction: "Розподіліть терміни за сферою."
    groups:
      - name: "Кримінальне провадження"
        items:
          - "підозра"
          - "запобіжний захід"
          - "вирок"
          - "досудове розслідування"
      - name: "Цивільний спір"
        items:
          - "позовна заява"
          - "відповідач"
          - "відшкодування шкоди"
          - "договір"
      - name: "Права людини"
        items:
          - "дискримінація"
