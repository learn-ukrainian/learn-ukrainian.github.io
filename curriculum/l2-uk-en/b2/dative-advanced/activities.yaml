- type: reading
  id: dative-advice-reading
  title: "Читання: порада новим учасникам"
  instruction: "Прочитайте текст і визначте ролі давального відмінка."
  source: "Навчальний уривок для модуля B2."
  text: >-
    Новим учасникам програми потрібно зареєструватися до п'ятниці. Координатор
    пояснив волонтерам правила безпеки й подякував лікареві за консультацію.
    Завдяки підтримці громади родинам швидко передали необхідні речі. Всупереч
    прогнозам, зустріч відбулася вчасно, а адміністрація пішла назустріч
    студентам і відкрила додаткову консультацію. Декому було ніяково ставити
    запитання, тому модератор порадив учасникам писати їх у чаті.
  tasks:
    - "Знайдіть два приклади давального адресата."
    - "Поясніть, де давальний називає переживача стану."
    - "Випишіть прийменникову конструкцію з давальним."
    - "Перефразуйте одну іменникову конструкцію дієслівно."

- type: quiz
  title: "Ролі давального"
  instruction: "Оберіть найточніше пояснення давального в реченні."
  items:
    - question: "Яку роль має давальний у реченні Учитель пояснив правило студентові?"
      options:
        - text: "адресат дії"
          correct: true
        - text: "місце дії"
          correct: false
        - text: "прямий об'єкт"
          correct: false
        - text: "означення предмета"
          correct: false
      explanation: "Студентові - той, кому пояснили правило."
    - question: "Що називає мені в реченні Мені тривожно перед виступом?"
      options:
        - text: "переживача стану"
          correct: true
        - text: "адресата подарунка"
          correct: false
        - text: "власника предмета"
          correct: false
        - text: "місце перебування"
          correct: false
      explanation: "Мені називає того, хто відчуває стан."
    - question: "Яке значення має завдяки у фразі завдяки підтримці друзів?"
      options:
        - text: "позитивна причина"
          correct: true
        - text: "заборона"
          correct: false
        - text: "місце"
          correct: false
        - text: "прямий наказ"
          correct: false
      explanation: "Завдяки вказує на корисну причину."
    - question: "Чому фраза всупереч прогнозам потребує давального?"
      options:
        - text: "всупереч керує давальним і вводить контраст"
          correct: true
        - text: "прогнозам є кличним відмінком"
          correct: false
        - text: "це завжди місцевий відмінок"
          correct: false
        - text: "прогнозам є прямим додатком"
          correct: false
      explanation: "Всупереч прогнозам означає проти прогнозів."
    - question: "Яке речення найкраще для офіційної інструкції?"
      options:
        - text: "Заявникові потрібно додати копію документа."
          correct: true
        - text: "Заявника потрібно додати копію документа."
          correct: false
        - text: "Для заявник потрібно копія документа."
          correct: false
        - text: "Заявникові копію документом потрібно."
          correct: false
      explanation: "Давальний заявникові називає адресата інструкції."
    - question: "У якому варіанті етичний давальний звучить розмовно?"
      options:
        - text: "Ти мені тільки не запізнюйся."
          correct: true
        - text: "Панові директору надіслано лист."
          correct: false
        - text: "Учасникам слід зареєструватися."
          correct: false
        - text: "Завдяки підтримці проєкт завершено."
          correct: false
      explanation: "Мені додає емоційну причетність мовця."
    - question: "Що краще пояснює форму подрузі?"
      options:
        - text: "давальний жіночого роду з чергуванням г - з"
          correct: true
        - text: "родовий множини без прийменника"
          correct: false
        - text: "кличний відмінок"
          correct: false
        - text: "форма орудного"
          correct: false
      explanation: "Подруга дає подрузі в давальному."
    - question: "Який варіант природно підкреслює адресата документа?"
      options:
        - text: "Лист директорові підготували вранці."
          correct: true
        - text: "Лист директора підготували вранці."
          correct: false
        - text: "Лист директором підготували вранці."
          correct: false
        - text: "Лист директоре підготували вранці."
          correct: false
      explanation: "Директорові означає, кому адресовано лист."
    - question: "Коли доречніше для мене, а не мені?"
      options:
        - text: "коли треба підкреслити перспективу або оцінку"
          correct: true
        - text: "коли є прийменник всупереч"
          correct: false
        - text: "коли це кличний відмінок"
          correct: false
        - text: "коли дія має прямий об'єкт"
          correct: false
      explanation: "Для мене часто подає оцінку з певної перспективи."
    - question: "Яке речення правильно використовує назустріч?"
      options:
        - text: "Адміністрація пішла назустріч мешканцям."
          correct: true
        - text: "Адміністрація пішла назустріч мешканці."
          correct: false
        - text: "Адміністрація пішла назустріч мешканцями."
          correct: false
        - text: "Адміністрація пішла назустріч мешканців."
          correct: false
      explanation: "Назустріч керує давальним."

