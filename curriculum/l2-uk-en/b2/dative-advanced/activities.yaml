version: '1.0'
module: dative-advanced
level: b2
inline:
- type: select
  title: Ролі давального
  instruction: Позначте всі правильні пояснення давальної форми.
  items:
  - question: 'У реченні «координатор надіслав волонтерам інструкцію» правильні пояснення такі:'
    options:
    - text: волонтерам є адресатом дії
      correct: true
    - text: інструкцію отримують волонтери
      correct: true
    - text: волонтерам є родовим належності
      correct: false
    - text: це етичний давальний
      correct: false
    min_correct: 2
  - question: 'У реченні «мені тривожно перед співбесідою» форма «мені» означає:'
    options:
    - text: переживача стану
      correct: true
    - text: того, хто відчуває тривогу
      correct: true
    - text: адресата листа
      correct: false
    - text: прийменниковий родовий
      correct: false
    min_correct: 2
  - question: 'У фразі «лист директорові» правильні твердження такі:'
    options:
    - text: це лист, адресований директорові
      correct: true
    - text: давальний допомагає відрізнити адресата від власника
      correct: true
    - text: це те саме, що лист директора
      correct: false
    - text: це форма місцевого відмінка
      correct: false
    min_correct: 2
  - question: 'У реченні «пацієнтові слід звернутися до лікаря» давальний називає:'
    options:
    - text: носія рекомендації
      correct: true
    - text: людину, для якої актуальна дія
      correct: true
    - text: того, кому надсилають лист
      correct: false
    - text: об’єкт дії звернутися
      correct: false
    min_correct: 2
  - question: 'У реченні «затримка шкодить довірі» правильні пояснення такі:'
    options:
    - text: довірі називає адресата шкоди
      correct: true
    - text: давальний показує, чому дія шкодить
      correct: true
    - text: довірі є кличним відмінком
      correct: false
    - text: треба замінити на родовий довіри
      correct: false
    min_correct: 2
  - question: 'Етичний давальний найкраще описують такі твердження:'
    options:
    - text: він додає емоційну причетність мовця
      correct: true
    - text: він типовий для розмовного стилю
      correct: true
    - text: він обов’язковий у ділових листах
      correct: false
    - text: він завжди означає отримувача предмета
      correct: false
    min_correct: 2
  - question: 'У реченні «завдяки підтримці громади проєкт завершили» правильні твердження такі:'
    options:
    - text: підтримці стоїть у давальному
      correct: true
    - text: завдяки має позитивний відтінок причини
      correct: true
    - text: підтримці є родовим після прийменника
      correct: false
    - text: завдяки треба вживати з негативними причинами
      correct: false
    min_correct: 2
  - question: 'У реченні «адміністрація пішла назустріч студентам» правильні пояснення такі:'
    options:
    - text: студентам залежить від назустріч
      correct: true
    - text: йдеться про готовність врахувати прохання
      correct: true
    - text: студентам є знахідним
      correct: false
    - text: це завжди фізичний рух
      correct: false
    min_correct: 2
- type: group-sort
  title: Давальні ролі
  instruction: Розподіліть фрази за роллю давального.
  groups:
  - name: адресат дії
    items:
    - надіслати лист директорові
    - пояснити волонтерам правила
    - дати подрузі книжку
    - повідомити заявникові результат
  - name: переживач або носій стану
    items:
    - мені холодно
    - пацієнтові важко дихати
    - команді бракує часу
    - декому ніяково запитати
  - name: вигода або шкода
    items:
    - допомогти громаді
    - зашкодити здоров’ю
    - сприяти розвитку
    - заважати роботі
  - name: етичний давальний
    items:
    - ти мені не запізнюйся
    - дивись мені уважно
    - не плач мені тут
    - він мені раптом телефонує
- type: fill-in
  title: Модальність із давальним
  instruction: Заповніть пропуск формою або модальним словом.
  items:
  - sentence: ____ потрібно подати заяву до п’ятниці.
    answer: Студентові
    options:
    - Студентові
    - Студента
    - Студентом
    - Студенте
    explanation: Давальний називає носія потреби.
  - sentence: Пацієнтові ____ звернутися до лікаря, якщо симптоми посилюються.
    answer: слід
    options:
    - слід
    - попри
    - замість
    - крім
    explanation: Слід вводить офіційну рекомендацію.
  - sentence: Учасникам ____ зберегти копію листа.
    answer: варто
    options:
    - варто
    - поза
    - без
    - замість
    explanation: Варто дає м’яку рекомендацію.
  - sentence: Відвідувачам ____ чекати в холі після реєстрації.
    answer: можна
    options:
    - можна
    - навколо
    - крім
    - після
    explanation: Можна означає дозвіл або можливість.
  - sentence: ____ важко читати текст без прикладів.
    answer: Мені
    options:
    - Мені
    - Мене
    - Мною
    - Мій
    explanation: Мені є переживачем стану.
  - sentence: Пам’ятку ____ надіслали електронною поштою.
    answer: студентам
    options:
    - студентам
    - студентів
    - студентами
    - студенти
    explanation: Давальний називає адресатів матеріалу.
  - sentence: Добра порада ____ допомагає уникнути помилки.
    answer: учневі
    options:
    - учневі
    - учня
    - учнем
    - учень
    explanation: Допомагати керує давальним.
  - sentence: ____ потрібна консультація перед поданням документів.
    answer: Заявникові
    options:
    - Заявникові
    - Заявника
    - Заявником
    - Заявник
    explanation: Давальний називає того, кому потрібна дія.
  - sentence: Для мене цей текст важкий, але ____ легше читати його з таблицею.
    answer: мені
    options:
    - мені
    - мене
    - мною
    - мій
    explanation: Мені описує досвід читання.
  - sentence: Працівникам ____ знати графік змін заздалегідь.
    answer: потрібно
    options:
    - потрібно
    - попри
    - замість
    - навколо
    explanation: Потрібно + інфінітив формує конструкцію потреби.
- type: fill-in
  title: Прийменники з давальним
  instruction: Оберіть прийменник або форму, яка керує давальним.
  items:
  - sentence: ____ підтримці громади проєкт завершили вчасно.
    answer: Завдяки
    options:
    - Завдяки
    - Через
    - Після
    - Без
    explanation: Завдяки керує давальним і має позитивний відтінок.
  - sentence: ____ прогнозам, команда зберегла темп.
    answer: Всупереч
    options:
    - Всупереч
    - Замість
    - Крім
    - Після
    explanation: Всупереч керує давальним.
  - sentence: ____ труднощам волонтери продовжили роботу.
    answer: Наперекір
    options:
    - Наперекір
    - Поблизу
    - Без
    - Після
    explanation: Наперекір керує давальним.
  - sentence: Дитина побігла ____ друзям.
    answer: навстріч
    options:
    - навстріч
    - замість
    - крім
    - після
    explanation: Навстріч керує давальним.
  - sentence: Адміністрація пішла ____ мешканцям і змінила графік.
    answer: назустріч
    options:
    - назустріч
    - поза
    - після
    - без
    explanation: Назустріч керує давальним у переносному значенні.
  - sentence: Завдяки швидкій ____ рух відновили.
    answer: реакції
    options:
    - реакції
    - реакцію
    - реакцією
    - реакція
    explanation: Після завдяки потрібен давальний.
  - sentence: Всупереч песимістичним ____ зустріч відбулася.
    answer: прогнозам
    options:
    - прогнозам
    - прогнозів
    - прогнози
    - прогнозами
    explanation: Всупереч керує давальним множини.
  - sentence: Наперекір усім ____ команда завершила ремонт.
    answer: перешкодам
    options:
    - перешкодам
    - перешкоди
    - перешкод
    - перешкодами
    explanation: Наперекір керує давальним.
  - sentence: Платформа рухається ____ потребам малого бізнесу.
    answer: назустріч
    options:
    - назустріч
    - замість
    - попри
    - після
    explanation: Нaзустріч може означати пристосування до потреб.
  - sentence: Не пишіть «завдяки аварії»; для негативної причини краще ____ аварію.
    answer: через
    options:
    - через
    - завдяки
    - назустріч
    - всупереч
    explanation: Через керує знахідним і підходить для негативної причини.
- type: error-correction
  title: Регістр і керування
  instruction: Виправте форму або регістрово недоречний вислів.
  items:
  - sentence: Завдяки підтримки друзів команда не зупинилася.
    error: підтримки
    correction: підтримці
    options:
    - підтримці
    - підтримки
    - підтримкою
    - підтримку
    explanation: Завдяки керує давальним.
  - sentence: Всупереч прогнози, зустріч відбулася вчасно.
    error: прогнози
    correction: прогнозам
    options:
    - прогнозам
    - прогнози
    - прогнозів
    - прогнозами
    explanation: Всупереч керує давальним множини.
  - sentence: Наперекір труднощі команда продовжила роботу.
    error: труднощі
    correction: труднощам
    options:
    - труднощам
    - труднощі
    - труднощів
    - труднощами
    explanation: Наперекір керує давальним.
  - sentence: Адміністрація пішла назустріч студенти.
    error: студенти
    correction: студентам
    options:
    - студентам
    - студенти
    - студентів
    - студентами
    explanation: Назустріч керує давальним.
  - sentence: Панові директоре надіслано копію листа.
    error: директоре
    correction: директорові
    options:
    - директорові
    - директоре
    - директора
    - директором
    explanation: В адресній формулі потрібен давальний, не кличний.
  - sentence: Ти мені не запізнюйся на офіційну співбесіду.
    error: Ти мені не запізнюйся
    correction: Будь ласка, не запізнюйтеся
    options:
    - Будь ласка, не запізнюйтеся
    - Ти мені не запізнюйся
    - Не плач мені тут
    - Він мені каже
    explanation: Етичний давальний розмовний і недоречний в офіційній інструкції.
  - sentence: Пацієнту слід звернутися до лікаря, бо лікареві холодно.
    error: бо лікареві холодно
    correction: якщо симптоми посилюються
    options:
    - якщо симптоми посилюються
    - бо лікареві холодно
    - завдяки симптомів
    - попри лікареві
    explanation: Причина поради має бути змістовною, не випадковою давальною формою.
  - sentence: Відповідно до наказові учасникам потрібно подати копії.
    error: наказові
    correction: наказу
    options:
    - наказу
    - наказові
    - наказом
    - наказ
    explanation: Відповідно до керує родовим, а учасникам є давальним.
- id: act-6
  type: reading
  title: 'Читання: інструкція для учасників'
  instruction: Прочитайте уривок і визначте ролі давального.
  source: Навчальний уривок для модуля B2.
  text: Новим учасникам програми потрібно підтвердити реєстрацію до п’ятниці. Координатор пояснив волонтерам правила безпеки й подякував лікареві за консультацію. Завдяки підтримці громади родинам швидко передали необхідні речі. Всупереч прогнозам, зустріч відбулася вчасно, а адміністрація пішла назустріч студентам і відкрила додаткову консультацію. Декому було ніяково ставити запитання, тому модератор порадив учасникам писати їх у чаті.
  tasks:
  - Знайдіть два приклади давального адресата.
  - Поясніть, де давальний називає переживача стану.
  - Випишіть прийменникову конструкцію з давальним.
  - Перепишіть одну офіційну фразу дружнішим регістром.
workbook:
- id: workbook-1
  type: reading
  title: 'Читання: порада батькам'
  instruction: Прочитайте текст і знайдіть давальні ролі.
  source: Навчальний уривок для модуля B2.
  text: Дитині може бути складно адаптуватися до нової школи, тому батькам варто заздалегідь обговорити маршрут, графік і спосіб зв’язку з учителем. Класному керівникові потрібно повідомити, якщо дитині потрібна додаткова підтримка. Завдяки співпраці родині легше помітити перші труднощі, а школі простіше запропонувати допомогу.
  tasks:
  - Випишіть давальний переживача.
  - Знайдіть два давальні адресата або носія потреби.
  - Поясніть конструкцію з завдяки.
  - Перепишіть одну пораду менш офіційно.
- type: fill-in
  title: Форми давального
  instruction: Заповніть пропуск правильною давальною формою.
  items:
  - sentence: Лікар дав рекомендації ____.
    answer: пацієнтові
    options:
    - пацієнтові
    - пацієнта
    - пацієнтом
    - пацієнт
    explanation: Дати комусь - давальний.
  - sentence: Поясніть правила ____ перед початком роботи.
    answer: волонтерам
    options:
    - волонтерам
    - волонтерів
    - волонтерами
    - волонтери
    explanation: Пояснювати комусь - давальний.
  - sentence: ____ потрібно додати копію документа.
    answer: Заявникові
    options:
    - Заявникові
    - Заявника
    - Заявником
    - Заявник
    explanation: Носій потреби стоїть у давальному.
  - sentence: Це рішення допоможе ____.
    answer: громаді
    options:
    - громаді
    - громаду
    - громади
    - громадою
    explanation: Допомагати керує давальним.
  - sentence: Надмір роботи шкодить ____.
    answer: здоров’ю
    options:
    - здоров’ю
    - здоров’я
    - здоров’ям
    - здоров’ї
    explanation: Шкодити керує давальним.
  - sentence: Пам’ятку ____ опублікували на сайті.
    answer: учасникам
    options:
    - учасникам
    - учасників
    - учасниками
    - учасники
    explanation: Пам’ятка адресована учасникам.
  - sentence: ____ варто повторити приклади перед тестом.
    answer: Учневі
    options:
    - Учневі
    - Учня
    - Учнем
    - Учень
    explanation: Давальний називає адресата поради.
  - sentence: ____ зручно отримати відповідь електронною поштою.
    answer: Клієнтові
    options:
    - Клієнтові
    - Клієнта
    - Клієнтом
    - Клієнт
    explanation: Давальний переживача або користувача стану.
  - sentence: Адміністрація пішла назустріч ____.
    answer: мешканцям
    options:
    - мешканцям
    - мешканців
    - мешканцями
    - мешканці
    explanation: Назустріч керує давальним.
  - sentence: Всупереч ____ команда завершила роботу.
    answer: перешкодам
    options:
    - перешкодам
    - перешкоди
    - перешкод
    - перешкодами
    explanation: Всупереч керує давальним.
- type: error-correction
  title: Редагування давального
  instruction: Виправте помилку у формі або регістрі.
  items:
  - sentence: Координатор пояснив волонтерів правила безпеки.
    error: волонтерів
    correction: волонтерам
    options:
    - волонтерам
    - волонтерів
    - волонтерами
    - волонтери
    explanation: Пояснити комусь - давальний.
  - sentence: Мене холодно в аудиторії.
    error: Мене
    correction: Мені
    options:
    - Мені
    - Мене
    - Мною
    - Мій
    explanation: Переживач стану стоїть у давальному.
  - sentence: Рішенню шкодить довіру до команди.
    error: довіру
    correction: довірі
    options:
    - довірі
    - довіру
    - довіри
    - довірою
    explanation: Шкодити керує давальним.
  - sentence: Завдяки швидкої реакції зустріч не скасували.
    error: швидкої реакції
    correction: швидкій реакції
    options:
    - швидкій реакції
    - швидкої реакції
    - швидку реакцію
    - швидкою реакцією
    explanation: Завдяки керує давальним.
  - sentence: Панові директор надіслано копію звернення.
    error: директор
    correction: директорові
    options:
    - директорові
    - директор
    - директора
    - директором
    explanation: В адресній формулі потрібен давальний.
  - sentence: Учасників слід зареєструватися до п’ятниці.
    error: Учасників
    correction: Учасникам
    options:
    - Учасникам
    - Учасників
    - Учасниками
