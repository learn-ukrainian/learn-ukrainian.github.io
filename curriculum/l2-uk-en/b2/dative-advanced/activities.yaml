- type: essay-response
  id: dative-editorial-comment
  title: "Письмовий коментар: давальний і регістр"
  instruction: "Напишіть короткий редакторський коментар до давальних конструкцій."
  prompt: >-
    Поясніть різницю між реченнями: "Мені потрібно подати заяву", "Для мене це
    важлива заява", "Заявникові потрібно додати копію документа", "Ти мені не
    запізнюйся". Назвіть ролі давального, опишіть регістр і запропонуйте одну
    офіційну та одну розмовну версію.
  min_words: 150
  model_answer: >-
    У реченні "Мені потрібно подати заяву" давальний називає особу, для якої
    існує потреба або обов'язок. Це безособова модальна конструкція з давальним
    переживача або носія необхідності. У реченні "Для мене це важлива заява"
    конструкція з "для" подає перспективу мовця, а не саму потребу виконати
    дію. "Заявникові потрібно додати копію документа" належить до офіційного
    регістру: давальний називає адресата інструкції. "Ти мені не запізнюйся" є
    розмовною емоційною конструкцією з етичним давальним; вона передає
    причетність і контроль мовця, але не пасує до формального листа. Офіційна
    версія може звучати так: "Заявникові необхідно подати заяву й додати копію
    документа до п'ятниці". Розмовна версія: "Мені треба подати заяву, а тобі
    не запізнюватися".
  rubric:
    - criteria: "Ролі давального"
      description: "Названо давальний потреби, офіційного адресата й етичний давальний."
      points: 4
    - criteria: "Регістр"
      description: "Пояснено різницю між офіційним і розмовним тоном."
      points: 3
    - criteria: "Редагування"
      description: "Запропоновано природну офіційну й розмовну версії."
      points: 3
