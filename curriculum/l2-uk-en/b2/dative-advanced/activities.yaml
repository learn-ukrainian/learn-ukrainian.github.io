- type: fill-in
  title: "Прийменники з давальним"
  instruction: "Заповніть пропуск прийменником або прийменниковою сполукою з давальним."
  items:
    - sentence: "____ підтримці громади проєкт завершили вчасно."
      answer: "Завдяки"
      options: ["Завдяки", "Через", "Після", "Без"]
      explanation: "Завдяки називає позитивну причину й керує давальним."
    - sentence: "____ прогнозам, команда перемогла."
      answer: "Всупереч"
      options: ["Всупереч", "Згідно", "Замість", "Крім"]
      explanation: "Всупереч вводить контраст із прогнозами."
    - sentence: "____ труднощам студент завершив роботу."
      answer: "Наперекір"
      options: ["Наперекір", "Після", "Поруч", "Від"]
      explanation: "Наперекір підкреслює спротив перешкодам."
    - sentence: "Дитина побігла ____ друзям."
      answer: "навстріч"
      options: ["навстріч", "завдяки", "після", "замість"]
      explanation: "Навстріч керує давальним."
    - sentence: "Адміністрація пішла ____ мешканцям і змінила графік."
      answer: "назустріч"
      options: ["назустріч", "попри", "крім", "без"]
      explanation: "Назустріч означає поступку або рух до когось."
    - sentence: "____ вашій пораді я переписав вступ."
      answer: "Завдяки"
      options: ["Завдяки", "Всупереч", "Наперекір", "Окрім"]
      explanation: "Порада дала корисний результат."
    - sentence: "____ попереднім обіцянкам, підрядник змінив графік."
      answer: "Всупереч"
      options: ["Всупереч", "Завдяки", "Навстріч", "Після"]
      explanation: "Тут дія відбулася проти домовленостей."
    - sentence: "Вона діяла ____ тискові й захистила позицію."
      answer: "наперекір"
      options: ["наперекір", "завдяки", "замість", "після"]
      explanation: "Наперекір передає спротив."
    - sentence: "Команда зробила крок ____ студентам."
      answer: "назустріч"
      options: ["назустріч", "згідно", "крізь", "біля"]
      explanation: "Крок назустріч комусь потребує давального."
    - sentence: "____ швидкій реакції лікарів пацієнта врятували."
      answer: "Завдяки"
      options: ["Завдяки", "Всупереч", "Наперекір", "Попри"]
      explanation: "Реакція лікарів є позитивною причиною."

- type: fill-in
  title: "Форми давального"
  instruction: "Виберіть природну форму давального."
  items:
    - sentence: "Учитель пояснив правило ____."
      answer: "студентові"
      options: ["студентові", "студента", "студентом", "студенте"]
      explanation: "Студентові - давальний адресата."
    - sentence: "Координатор подякував ____ за консультацію."
      answer: "лікареві"
      options: ["лікареві", "лікаря", "лікарем", "лікарював"]
      explanation: "Подякувати кому? лікареві."
    - sentence: "____ потрібно додати копію документа."
      answer: "Заявникові"
      options: ["Заявникові", "Заявника", "Заявником", "Заявникувати"]
      explanation: "Офіційна інструкція використовує давальний."
    - sentence: "____ було ніяково ставити питання."
      answer: "Учасникам"
      options: ["Учасникам", "Учасників", "Учасниками", "Учасники"]
      explanation: "Давальний називає переживача стану."
    - sentence: "Подрузі ____ звернутися до лікаря."
      answer: "порадили"
      options: ["порадили", "порадила", "порадою", "порад"]
      explanation: "Подрузі - давальний із чергуванням г - з."
    - sentence: "Директорові ____ копію листа."
      answer: "надіслали"
      options: ["надіслали", "надісланої", "надіславши", "надіслання"]
      explanation: "Директорові називає адресата."
    - sentence: "Громаді ____ довгострокової підтримки."
      answer: "бракує"
      options: ["бракує", "бракувати", "брак", "браком"]
      explanation: "Бракувати керує давальним особи або групи."
    - sentence: "Сергієві ____ порядок реєстрації."
      answer: "пояснили"
      options: ["пояснили", "пояснення", "поясненим", "пояснивши"]
      explanation: "Сергієві - давальний адресата пояснення."
    - sentence: "____ варто перевірити електронну адресу."
      answer: "Кожному учасникові"
      options: ["Кожному учасникові", "Кожного учасника", "Кожним учасником", "Кожен учасник"]
      explanation: "Варто кому? кожному учасникові."
    - sentence: "Недосипання шкодить ____."
      answer: "здоров'ю"
      options: ["здоров'ю", "здоров'я", "здоров'ям", "здоров'ї"]
      explanation: "Шкодити керує давальним."

