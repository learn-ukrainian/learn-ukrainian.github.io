version: '1.0'
module: pobut-shchodenne
level: b2
inline:
  - id: act-1
    type: comparative-study
    title: "Ранок як мовне завдання"
    instruction: "Порівняйте речення й визначте, яку побутову функцію вони виконують."
    items_to_compare:
      - "Щоранку ми перевіряємо графік відключень."
      - "Прання перенесено на вечір."
      - "Домовмося, хто сьогодні миє кухню."
      - "Посудомийка зупиняється на середині програми."
      - "Софія записала витрати за доставку."
    criteria:
      - "рутина"
      - "результат"
      - "спільна домовленість"
      - "проблема з технікою"
      - "видима відповідальність"
    model_answer: "Перше речення описує звичку, друге фіксує результат, третє організовує спільну дію, четверте називає технічну проблему, п'яте робить відповідальну людину видимою."
  - id: act-2
    type: comparative-study
    title: "Дія і побутовий процес"
    instruction: "Зіставте конкретну дію з ширшим процесом."
    items_to_compare:
      - "прати рушники щосуботи"
      - "прасувати сорочки на тиждень"
      - "перевіряти крупи, воду й батарейки"
      - "домовлятися, хто миє кухню"
      - "записувати витрати за доставку"
      - "чистити фільтр посудомийки"
    criteria:
      - "прання"
      - "прасування"
      - "контроль запасів"
      - "розподіл обов'язків"
      - "ведення бюджету"
      - "догляд за технікою"
    model_answer: "Кожна дія має ширшу назву процесу; саме ці іменники дають змогу говорити про навантаження, а не тільки про окремі дії."
  - id: act-3
    type: comparative-study
    title: "Домовленість без наказу"
    items_to_compare:
      - "Домовмося, хто сьогодні купує воду."
      - "Перевірмо таблицю витрат разом."
      - "Після вечері приберімо кухню."
      - "Будьмо уважні до сусідів після десятої."
      - "Ти знову не записав витрати."
    criteria:
      - "спільна дія"
      - "м'який тон"
      - "звинувачення"
      - "прохання"
    model_answer: "Перші чотири речення організовують спільну дію без різкого наказу. Останнє називає проблему, але звучить як звинувачення."
  - id: act-4
    type: critical-analysis
    title: "Хто виконує дію"
    instruction: "Виправте речення з помилковим або нечітким суб'єктом."
    target_text: >-
      Прасуючи сорочки, світло раптом вимкнулося. Очікуючи майстра, заявка
      загубилася в сервісі. Покупки самі плануються відповідальними людьми.
    questions:
      - "Де дієприслівник має неправильного виконавця?"
      - "Де треба назвати реального діяча?"
      - "Які природні редакції ви запропонуєте?"
    model_answers:
      - "У перших двох реченнях."
      - "У реченні про покупки."
      - "Коли я прасував сорочки, світло вимкнулося; поки ми чекали майстра, заявку загубили; відповідальні люди планують покупки."
  - id: act-5
    type: critical-analysis
    title: "Повідомлення в чаті будинку"
    instruction: "Перепишіть повідомлення за схемою факт - наслідок - прохання."
    target_text: >-
      Генератор стоїть під вікнами вже третій вечір. Через шум дітям важко
      заснути, а в під'їзді пахне вихлопом. Давайте щось зробимо.
    questions:
      - "Який факт треба назвати без перебільшення?"
      - "Який наслідок важливий для сусідів?"
      - "Яке прохання можна сформулювати формою спільної дії?"
    model_answers:
      - "Генератор стоїть під вікнами третій вечір."
      - "Шум і вихлоп заважають мешканцям."
      - "Домовмося перенести генератор у безпечніше місце або обговорити інший графік."
workbook:
  - id: wb-1
    type: reading
    title: "Один побутовий день із кількома обмеженнями"
    source: "Авторський навчальний текст"
    text: >-
      День почався з повідомлення в чаті будинку: світло вимкнуть на годину
      раніше. Олена перенесла прання на вечір і перевірила, чи заряджений
      павербанк. Марко, готуючи каву, помітив, що посудомийка зупиняється на
      середині програми, тому очистив фільтр і написав у сервісний центр.
    tasks:
      - "Знайдіть три часові маркери або слова послідовності."
      - "Випишіть, де названо відповідальну людину."
      - "Знайдіть одну форму на -ся й поясніть, чому вона природна."
  - id: wb-2
    type: comparative-study
    title: "Побутова точність"
    items_to_compare:
      - "Приберімо кухню після вечері."
      - "Посудомийка зупиняється на середині програми."
      - "Фільтр очищено, фото додано."
      - "Кухня має бути прибрана кимось."
    criteria:
      - "спільна дія"
      - "поведінка техніки"
      - "результат"
      - "нечіткий пасив"
    model_answer: "Перші три речення природні для своїх функцій. Останнє звучить нечітко й потребує конкретизації."
  - id: wb-3
    type: critical-analysis
    title: "Природні побутові речення"
    target_text: >-
      Домовмося перевіряти витрати щонеділі. Щоранку провітрюємо кімнату.
      Прання перенесено на вечір. Витрати являються записаними Софією.
      Покупки плануються Марком.
    questions:
      - "Які три речення природні?"
      - "Де є калькована конструкція з являються?"
      - "Де названого діяча краще зробити підметом?"
    model_answers:
      - "Перші три."
      - "Витрати являються записаними Софією."
      - "Марко планує покупки."
  - id: wb-4
    type: comparative-study
    title: "Побутові маркери"
    items_to_compare:
      - "Щоранку ми перевіряємо повідомлення будинку."
      - "Фото виконаних робіт додано до чату."
      - "Генератор під вікнами створює шум і питання безпеки."
      - "У спільній квартирі важлива домовленість про чергування."
    criteria:
      - "часовий маркер"
      - "результат"
      - "наслідок"
      - "домовленість"
    model_answer: "Речення демонструють чотири потрібні для побуту функції: регулярність, статус, наслідок і правило співжиття."
  - id: wb-5
    type: essay-response
    title: "Повідомлення до сервісного центру"
    instruction: "Напишіть 150-180 слів."
    prompt: "Опишіть проблему з побутовою технікою: симптом, уже виконані дії, питання про гарантію або час майстра і ввічливе завершення."
    min_words: 150
    model_answer: >-
      Добрий день. Посудомийка зупиняється на середині програми, а на екрані
      з'являється код E4. Фільтр очищено, дверцята перевірено, фото коду додано
      до заявки. Чи діє гарантія, якщо техніку куплено в іншому місті?
    rubric:
      - criteria: "Факти"
        description: "Є симптом і вже виконані дії."
        points: 3
