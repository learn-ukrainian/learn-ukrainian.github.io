workbook:
  - id: reading-pobut-den
    type: reading
    title: "Один побутовий день із кількома обмеженнями"
    instruction: "Прочитайте текст і зверніть увагу на домовленості, часові маркери, ввічливі прохання та форми спільної дії."
    source: "Авторський навчальний текст для модуля"
    text: >-
      У квартирі на третьому поверсі день почався не з будильника, а з повідомлення в чаті будинку:
      світло вимкнуть раніше, ніж було зазначено в графіку. Олена, прокинувшись, одразу перевірила,
      чи заряджений павербанк, і перенесла прання на вечір. Марко збирався на роботу, але встиг
      поставити чайник на газову плитку і написати майстру про посудомийку, яка зупиняється на
      середині програми. Софія, готуючи сніданок, помітила, що крупи майже закінчилися, а в спільній
      таблиці витрат досі не враховано доставку минулого тижня.

      Увечері вони не почали з претензій. Спершу домовилися про факти: кухню прибрано, сміття не
      винесено, рахунок за воду сплачено, заявку майстру надіслано. Потім обговорили невидиму працю:
      хто перевіряє запаси, хто пам'ятає про гарантію, хто погоджує час ремонту, хто попереджає
      сусідів про шум. Марко визнав, що останнім часом помічав лише видимі справи. Софія запропонувала:
      "Складімо графік для прибирання й окремо для планування". Олена додала, що їй важливо
      не сваритися через кожну тарілку, а мати зрозумілий порядок.

      Наступного ранку в чаті будинку з'явилося ще одне повідомлення: генератор у дворі працюватиме
      до дев'ятої. Мешканці погодилися перенести його далі від вікон першого поверху, бо запах і шум
      заважали дітям спати. Ніхто не назвав це великою подією. Просто побут знову вимагав точності:
      перевірити графік, зарядити пристрої, домовитися про чергування, не забути про довкілля і бути
      уважними до людей поруч.
    tasks:
      - "Випишіть три домовленості, які зменшили напругу між співмешканцями."
      - "Знайдіть дві форми спільної дії в наказовому способі й поясніть їхній тон."
      - "Поясніть, чому фраза 'кухню прибрано' має інший фокус, ніж 'ми прибрали кухню'."
      - "Назвіть дві невидимі побутові справи, які згадано в тексті."
      - "Сформулюйте одне ввічливе повідомлення до сусідів за мотивами тексту."

  - type: quiz
    title: "Фокус побутового речення"
    instruction: "Оберіть варіант, який найточніше відповідає ситуації та українській нормі."
    items:
      - question: "Яке речення найкраще називає відповідальних за прибирання?"
        options:
          - text: "Співмешканці прибрали кухню після вечері."
            correct: true
          - text: "Кухня була прибрана співмешканцями після вечері."
            correct: false
          - text: "Кухню прибрано співмешканцями після вечері."
            correct: false
          - text: "Кухня прибиралася співмешканцями після вечері."
            correct: false
        explanation: "Коли діячі важливі, активне речення звучить природніше."
      - question: "Який варіант найкраще повідомляє лише про завершений результат?"
        options:
          - text: "Підлогу вимито, сміття винесено, рахунки оплачено."
            correct: true
          - text: "Ми вимили підлогу, винесли сміття й оплатили рахунки."
            correct: false
          - text: "Підлога вимита нами, сміття винесене нами."
            correct: false
          - text: "Підлога вимивалася мешканцями до вечора."
            correct: false
        explanation: "Форми на -но, -то фокусують результат без названого діяча."
      - question: "Яка фраза найкраще організовує спільну дію без кальки?"
        options:
          - text: "Приберімо кухню сьогодні, а ванну залишмо на завтра."
            correct: true
          - text: "Давайте приберемо кухню сьогодні."
            correct: false
          - text: "Ми маємо бути прибираючими кухню сьогодні."
            correct: false
          - text: "Кухня нехай буде прибрана нами сьогодні."
            correct: false
        explanation: "Форма приберімо є природним наказовим способом першої особи множини."
      - question: "Який варіант правильно визнає слушність співрозмовника?"
        options:
          - text: "Маєш рацію, доставку треба додати до спільних витрат."
            correct: true
          - text: "Ти є правий щодо доставки."
            correct: false
          - text: "Ти являєшся правим про доставку."
            correct: false
          - text: "Ти правийся щодо доставки."
            correct: false
        explanation: "Нормативна формула - мати рацію."
      - question: "Яке речення не порушує правило спільного підмета для дієприслівника?"
        options:
          - text: "Готуючи вечерю, Марко слухав повідомлення будинку."
            correct: true
          - text: "Готуючи вечерю, повідомлення будинку прозвучало в телефоні."
            correct: false
          - text: "Прасуючи сорочки, світло вимкнулося раніше."
            correct: false
          - text: "Очікуючи майстра, заявка загубилася в сервісі."
            correct: false
        explanation: "Додаткова й головна дія мають стосуватися Марка."
      - question: "Яке речення найкраще описує процес без важливого діяча?"
        options:
          - text: "Поки готується кава, перевірмо графік відключень."
            correct: true
          - text: "Кава готується Оленою на кухні."
            correct: false
          - text: "Оленою готується кава."
            correct: false
          - text: "Кава була готована Оленою."
            correct: false
        explanation: "Форма готується природна, коли діяч неважливий і в центрі процес."
      - question: "Який варіант найточніше описує невидиму побутову працю?"
        options:
          - text: "Планування покупок і перевірка запасів теж потребують часу."
            correct: true
          - text: "Покупки самі плануються відповідальними людьми."
            correct: false
          - text: "Плануючі покупки завжди легші за прибирання."
            correct: false
          - text: "Планування покупок являється невидимою штукою."
            correct: false
        explanation: "Віддієслівні іменники допомагають назвати процеси, а не тільки окремі дії."
      - question: "Яка фраза найкраща для коректної скарги сервісу?"
        options:
          - text: "Після ремонту кран знову підтікає; просимо повторно оглянути з'єднання."
            correct: true
          - text: "Ви усе зробили погано, негайно прийдіть."
            correct: false
          - text: "Кран був погано поремонтований майстром."
            correct: false
          - text: "Нам щось не так, зробіть якось нормально."
            correct: false
        explanation: "Коректна скарга називає факт, наслідок і прохання."
      - question: "Яке речення найкраще уникає стереотипу в розподілі обов'язків?"
        options:
          - text: "Розподілімо справи за часом і навичками, а не за звичними ролями."
            correct: true
          - text: "Готування автоматично належить тому, хто краще мовчить."
            correct: false
          - text: "Прання має виконуватися жінками."
            correct: false
          - text: "Ремонт завжди являється чоловічою справою."
            correct: false
        explanation: "B2-мовець уміє назвати стереотип і запропонувати справедливу домовленість."
      - question: "Який варіант найкраще передає екологічну думку без кальки?"
        options:
          - text: "Довкілля починається з нашого під'їзду, сортування і води, яку ми не марнуємо."
            correct: true
          - text: "Штучний вислів про середовище починається з під'їзду."
            correct: false
          - text: "Навколишня екологія повинна бути захищена нами."
            correct: false
          - text: "Довкілля являється штучним описом середовища."
            correct: false
        explanation: "Довкілля - природний український відповідник у цьому контексті."

  - type: match-up
    title: "Побутова дія і ширший процес"
    instruction: "Поєднайте дію або ситуацію з точним процесом чи поняттям."
    pairs:
      - left: "прати рушники щосуботи"
        right: "прання"
      - left: "прасувати сорочки на тиждень"
        right: "прасування"
      - left: "перевіряти крупи, воду й батарейки"
        right: "контроль запасів"
      - left: "домовлятися, хто миє кухню"
        right: "розподіл обов'язків"
      - left: "записувати витрати за доставку"
        right: "ведення спільного бюджету"
      - left: "чистити фільтр посудомийки"
        right: "догляд за технікою"
      - left: "попереджати сусідів про ремонт"
        right: "комунікація в спільному просторі"
      - left: "заряджати павербанк до відключення"
        right: "підготовка до обмежень"
      - left: "переносити шумні роботи на день"
        right: "повага до меж сусідів"
      - left: "формулювати факт, наслідок і прохання"
        right: "коректна скарга"
      - left: "говорити про невидимі справи"
        right: "усвідомлення побутового навантаження"
      - left: "погоджувати графік після тижня спроби"
        right: "перегляд домовленостей"

  - type: fill-in
    title: "Часові маркери й побутові процеси"
    instruction: "Виберіть слово або словосполучення, яке найточніше завершує речення."
    items:
      - sentence: "____ я перевіряю графік відключень і заряд павербанка."
        answer: "Щоранку"
        options:
          - "Щоранку"
          - "Зрідка"
          - "Колись"
          - "Натомість"
        explanation: "Щоранку позначає регулярну ранкову дію."
      - sentence: "____ ми готуємо вдома, але в дні з пізніми зустрічами користуємося доставкою."
        answer: "Зазвичай"
        options:
          - "Зазвичай"
          - "Навмисно"
          - "Учора"
          - "Попри"
        explanation: "Зазвичай залишає місце для винятків."
      - sentence: "____ ми замовляємо клінінг після ремонту, коли самі не справляємося."
        answer: "Зрідка"
        options:
          - "Зрідка"
          - "Щохвилини"
          - "Доти"
          - "Понад"
        explanation: "Зрідка означає рідко, але не ніколи."
      - sentence: "____ графік змінився, ми перенесли прання на вечір."
        answer: "Оскільки"
        options:
          - "Оскільки"
          - "Нібито"
          - "Ледве"
          - "Аби"
        explanation: "Оскільки вводить причину рішення."
      - sentence: "Після вечері ми записали ____ за доставку в спільну таблицю."
        answer: "витрати"
        options:
          - "витрати"
          - "вигадки"
          - "вікна"
          - "вузли"
        explanation: "У таблиці побутового бюджету записують витрати."
      - sentence: "Коли посудомийка зупинилася, ми перевірили ____ і номер гарантії."
        answer: "фільтр"
        options:
          - "фільтр"
          - "під'їзд"
          - "розеткування"
          - "гостинність"
        explanation: "Фільтр є типовою деталлю побутової техніки, яку перевіряють."
      - sentence: "У спільній квартирі важливо мати графік і окрему ____ про винятки."
        answer: "домовленість"
        options:
          - "домовленість"
          - "суперечність"
          - "прикрасу"
          - "мовчанку"
        explanation: "Домовленість допомагає уникати побутових конфліктів."
      - sentence: "Якщо генератор стоїть під вікнами, треба врахувати шум, запах і ____."
        answer: "безпеку"
        options:
          - "безпеку"
          - "прасування"
          - "застілля"
          - "звітність"
        explanation: "Генератор пов'язаний із питаннями безпеки."
      - sentence: "Планування закупівель зменшує ____ рішень уранці."
        answer: "кількість"
        options:
          - "кількість"
          - "підлогу"
          - "коридор"
          - "підозру"
        explanation: "Йдеться про зменшення кількості дрібних рішень."
      - sentence: "Сусідська ____ часто складається з малих щоденних дій."
        answer: "взаємодопомога"
        options:
          - "взаємодопомога"
          - "посудомийка"
          - "прасувальність"
          - "розетка"
        explanation: "Взаємодопомога може бути буденною, не тільки героїчною."

  - type: fill-in
    title: "Наказовий спосіб без кальки"
    instruction: "Заповніть пропуск природною формою спільної дії."
    items:
      - sentence: "____ кухню сьогодні, а коридор залишмо на завтра."
        answer: "Приберімо"
        options:
          - "Приберімо"
          - "Давайте приберемо"
          - "Прибираючі"
          - "Прибиралося"
        explanation: "Приберімо - нормативна форма першої особи множини."
      - sentence: "____ про графік прання до неділі."
        answer: "Домовмося"
        options:
          - "Домовмося"
          - "Давайте домовимося"
          - "Домовляючі"
          - "Домовлено нами"
        explanation: "Домовмося організовує спільне рішення без кальки."
      - sentence: "____ суму в таблиці, перш ніж переказувати гроші."
        answer: "Перевірмо"
        options:
          - "Перевірмо"
          - "Провіряймо"
          - "Перевіряючі"
          - "Перевірено нами"
        explanation: "Перевірмо - природна форма спільного прохання."
      - sentence: "____ список невидимих справ, щоб їх було легше розподілити."
        answer: "Складімо"
        options:
          - "Складімо"
          - "Давайте складемо"
          - "Складаючі"
          - "Складено нами"
        explanation: "Складімо звучить точніше за автоматичне давайте."
      - sentence: "____ шумні роботи на денний час."
        answer: "Перенесімо"
        options:
          - "Перенесімо"
          - "Переносимося"
          - "Перенесено сусідами"
          - "Давайте перенесемо"
        explanation: "Форма перенесімо є коректною для спільної дії."
      - sentence: "____ уважні до людей, у яких малі діти."
        answer: "Будьмо"
        options:
          - "Будьмо"
          - "Давайте будемо"
          - "Являймося"
          - "Бувши"
        explanation: "Будьмо - нормативна форма заклику."
      - sentence: "____ майстру коротке повідомлення з фото поломки."
        answer: "Напишімо"
        options:
          - "Напишімо"
          - "Пишучі"
          - "Написано майстром"
          - "Давайте напишемо"
        explanation: "Напишімо організовує спільну дію."
      - sentence: "____ витрати до вечора, щоб не повертатися до них уночі."
        answer: "Погодьмо"
        options:
          - "Погодьмо"
          - "Погоджуючі"
          - "Погоджено нами"
          - "Давайте погодимо"
        explanation: "Погодьмо - природна форма спонукання."
      - sentence: "____ коробки від доставки до контейнера для паперу."
        answer: "Винесімо"
        options:
          - "Винесімо"
          - "Виносячі"
          - "Винесено сусідами"
          - "Давайте винесемо"
        explanation: "Винесімо підкреслює спільну відповідальність."
      - sentence: "____ цей графік після тижня спроби."
        answer: "Перегляньмо"
        options:
          - "Перегляньмо"
          - "Переглядаючі"
          - "Переглядається нами"
          - "Давайте переглянемо"
        explanation: "Перегляньмо звучить нормативно й достатньо м'яко."

  - type: error-correction
    title: "Відредагуйте побутові кальки й збої"
    instruction: "Знайдіть помилковий фрагмент і виберіть природний український варіант."
    items:
      - sentence: "Давайте приберемо кухню сьогодні ввечері."
        error: "Давайте приберемо"
        error_type: "construction"
        correction: "Приберімо"
        options:
          - "Приберімо"
          - "Прибираючі"
          - "Прибирається нами"
          - "Будемо являтися прибраними"
        explanation: "Для спільної дії краще наказовий спосіб першої особи множини."
      - sentence: "Ти є правий щодо рахунків за доставку."
        error: "є правий"
        error_type: "phrase"
        correction: "маєш рацію"
        options:
          - "маєш рацію"
          - "являєшся правим"
          - "правишся"
          - "будеш правийся"
        explanation: "Стандартна українська формула - мати рацію."
      - sentence: "Цей засіб вирішить любу проблему з плямами."
        error: "любу"
        error_type: "word"
        correction: "будь-яку"
        options:
          - "будь-яку"
          - "милу"
          - "любиму"
          - "всякує"
        explanation: "Люба означає дорога серцю; для значення 'any' потрібне будь-яку."
      - sentence: "Ми маємо захищати штучний вислів про середовище навіть у побуті."
        error: "штучний вислів про середовище"
        error_type: "phrase"
        correction: "довкілля"
        options:
          - "довкілля"
          - "штучність"
          - "середовище, яке оточує"
          - "окруження побуту"
