  - type: essay-response
    id: essay-pobut-domovlenist
    source_reading: "reading-pobut-den"
    title: "Есе: реальний і бажаний побутовий порядок"
    instruction: "Напишіть розгорнутий текст із конкретними домовленостями, часовими маркерами та ввічливими формулами."
    prompt: >-
      Опишіть свій реальний або вигаданий побутовий розпорядок у спільному житлі. Порівняйте його з бажаним
      розпорядком, назвіть одну видиму й одну невидиму справу, сформулюйте ввічливе прохання або скаргу,
      використайте принаймні дві форми спільної дії на зразок "домовмося", "перевірмо", "приберімо".
    min_words: 250
    model_answer: >-
      У нашій квартирі побут тримається не на ідеальному порядку, а на домовленостях. Зазвичай я готую сніданок
      і перевіряю запаси, але цього тижня зрозумів, що контроль покупок забирає більше часу, ніж саме готування.
      Тому запропонував: домовмося про миття посуду й про планування. Якщо світло вимикають зранку,
      ми переносимо прання на вечір і заздалегідь заряджаємо павербанки. Коли посудомийка зламалася, я написав
      майстру точне повідомлення: програма зупиняється через десять хвилин, фільтр очищено, помилка не зникає.
      Мій бажаний розпорядок простий: менше прихованої роботи, більше коротких перевірок і спокійніші прохання.
      Приберімо кухню після вечері, перевірмо витрати в неділю, а графік перегляньмо після тижня спроби.
    rubric:
      - criteria: "Зміст"
        description: "Є реальний або вигаданий побутовий контекст, видимі й невидимі справи, конкретні домовленості."
        points: 4
      - criteria: "Граматика"
        description: "Правильно вжито часові маркери, зворотні дієслова, наказовий спосіб і принаймні одну складну конструкцію."
        points: 4
      - criteria: "Регістр"
        description: "Прохання або скарга звучить ввічливо, але достатньо точно."
        points: 3
      - criteria: "Мовна чистота"
        description: "Немає кальок на зразок 'давайте', 'штучний вислів про середовище', 'бути правим', 'люба проблема'."
        points: 3
    peer_review_guidelines: "Перевірте, чи текст не перетворився на простий список дій, чи є в ньому причини, винятки й реальні мовні домовленості."
