version: '1.0'
module: professional-email-advanced
level: b2
inline:
  - type: error-correction
    title: Претензія без зайвої агресії
    instruction: Виправте фразу так, щоб вона зберігала твердість і професійний тон.
    items:
      - sentence: "Ви знову все зірвали, негайно виправляйте."
        error: "Ви знову все зірвали, негайно виправляйте."
        correction: "Роботи не були завершені до погодженого строку."
        error_type: phrase
        options:
          - Роботи не були завершені до погодженого строку.
          - ви все зіпсували назавжди
          - хтось щось не так зробив
          - проблема якось сталася
        explanation: Факт і строк сильніші за образливу оцінку.
      - sentence: "Просимо якось вирішити цю ситуацію."
        error: "якось вирішити цю ситуацію"
        correction: "надати оновлений графік виконання робіт"
        error_type: phrase
        options:
          - надати оновлений графік виконання робіт
          - зробити все нормально
          - закрити момент
          - не мати проблем
        explanation: Вимога має називати конкретну дію.
      - sentence: "Ви ніколи не відповідаєте на наші листи."
        error: "Ви ніколи не відповідаєте на наші листи."
        correction: "Ми не отримали відповіді на наші листи від 10 і 14 липня."
        error_type: phrase
        options:
          - Ми не отримали відповіді на наші листи від 10 і 14 липня.
          - ви мовчите завжди
          - відповідей у світі немає
          - все ігнорується
        explanation: Конкретні дати замінюють перебільшення.
      - sentence: "Терміново дайте пояснення."
        error: "Терміново дайте пояснення."
        correction: "Просимо надати пояснення до 17 липня."
        error_type: register
        options:
          - Просимо надати пояснення до 17 липня.
          - поясніть негайно
          - дайте вже щось
          - киньте причину
        explanation: Строк і ввічлива формула зберігають твердість.
      - sentence: "Ставлю керівництво в копію, бо ви не реагуєте."
        error: "бо ви не реагуєте"
        correction: "оскільки питання впливає на строк запуску"
        error_type: register
        options:
          - оскільки питання впливає на строк запуску
          - бо треба вас присоромити
          - тому що мовчите
          - для тиску
        explanation: Ескалацію краще пояснювати процесною причиною.
      - sentence: "Ми дуже здивовані вашим непрофесіоналізмом."
        error: "вашим непрофесіоналізмом"
        correction: "відсутністю оновленого графіка після погодженого строку"
        error_type: phrase
        options:
          - відсутністю оновленого графіка після погодженого строку
          - вашим жахливим стилем
          - тотальною проблемністю
          - всім, що сталося
        explanation: Оцінку людини треба замінити описом проблеми.
      - sentence: "Ваш сервіс тотально провалився."
        error: "тотально провалився"
        correction: "не працював у погоджений період"
        error_type: phrase
        options:
          - не працював у погоджений період
          - тотально провалився
          - був катастрофою
          - усе зламав
        explanation: У претензії треба описати факт, а не емоційну оцінку.
      - sentence: "Якщо не відповісте, ми всім розкажемо."
        error: "ми всім розкажемо"
        correction: "ми будемо змушені передати питання на рівень керівництва"
        error_type: register
        options:
          - ми будемо змушені передати питання на рівень керівництва
          - ми всім розкажемо
          - буде репутаційний вибух
          - ви пошкодуєте
        explanation: Ескалація має бути процесною, а не погрозливою.

  - id: act-2
    type: critical-analysis
    title: Теза, доказ, висновок
    instruction: Проаналізуйте аргумент у листі й оцініть його силу.
    target_text: "Пропонуємо перенести запуск програми на 5 серпня. Станом на 20 липня технічне завдання ще не погоджено, а реєстрація учасників триває. Якщо залишити попередню дату, команда матиме лише два робочі дні на перевірку матеріалів. Перенесення на тиждень дасть змогу завершити підготовку без повторної зміни графіка."
    questions:
      - Яка теза цього уривка?
      - Які два докази підтримують тезу?
      - Який висновок пропонує автор?
      - Яка конструкція пом'якшує позицію без втрати змісту?
      - Чому цей уривок не звучить як маніпуляція?
    model_answers:
      - Теза - перенести запуск програми на 5 серпня.
      - Докази - технічне завдання ще не погоджено, а реєстрація учасників триває.
      - Висновок - перенесення дасть змогу завершити підготовку без повторної зміни графіка.
      - '"Пропонуємо перенести" відкриває переговори, але називає конкретне рішення.'
      - Автор пояснює умову й наслідок, а не лякає адресата прихованими втратами.

  - type: translate
    title: Переклад складних ділових формул
    instruction: Оберіть природний український варіант для складної ситуації.
    items:
      - source: "We request an updated delivery schedule by July 17."
        options:
          - text: "Просимо надати оновлений графік постачання до 17 липня."
            correct: true
          - text: "Ми реквестимо апдейт доставки."
            correct: false
          - text: "Просимо зробити графічність доставлення."
            correct: false
        explanation: Є ввічлива вимога, предмет і строк.
      - source: "Unfortunately, we cannot support the proposed deadline."
        options:
          - text: "На жаль, ми не можемо підтримати запропонований строк."
            correct: true
          - text: "Ми проти всього вашого строку."
            correct: false
          - text: "Дедлайн не сапортиться."
            correct: false
        explanation: Формула відмови нейтральна й точна.
      - source: "Could you clarify the reasons for the delay?"
        options:
          - text: "Чи могли б ви пояснити причини затримки?"
            correct: true
          - text: "Чому ви затягнули?"
            correct: false
          - text: "Дайте причиновість запізнення."
            correct: false
        explanation: Питальна форма зменшує напруження.
      - source: "We are copying the project lead because the issue affects the launch date."
        options:
          - text: "Ставимо в копію керівницю проєкту, оскільки питання впливає на дату запуску."
            correct: true
          - text: "Копіюємо начальство, бо ви мовчите."
            correct: false
          - text: "Лідерка проєкту копіюється запуском."
            correct: false
        explanation: Ескалація пояснена процесною причиною.
      - source: "We appreciate your prompt attention to this matter."
        options:
          - text: "Будемо вдячні за оперативну увагу до цього питання."
            correct: true
          - text: "Цінується ваш промптний атеншн."
            correct: false
          - text: "Зверніть увагу негайно, бо ми чекаємо."
            correct: false
        explanation: Формула зберігає ввічливу наполегливість.
      - source: "The attached portfolio includes two partner communication samples."
        options:
          - text: "У вкладенні додаю портфоліо з двома прикладами партнерської комунікації."
            correct: true
          - text: "В аттачі портфоліо з комунікаційними семплами."
            correct: false
          - text: "Портфель прикладено для двох партнерів."
            correct: false
        explanation: Супровідний лист має прямо назвати вкладення.
      - source: "We propose two options for resolving the issue."
        options:
          - text: "Пропонуємо два варіанти врегулювання питання."
            correct: true
          - text: "Ми пропозимо дві опції резолюції."
            correct: false
          - text: "Є два способи якось закрити момент."
            correct: false
        explanation: Формула зберігає професійний регістр і конкретну дію.
      - source: "Please confirm whether the revised deadline is acceptable."
        options:
          - text: "Просимо підтвердити, чи прийнятний оновлений строк."
            correct: true
          - text: "Підтвердіть, чи окей дедлайн."
            correct: false
          - text: "Чи акцептується ревізований дедлайн?"
            correct: false
        explanation: '"Оновлений строк" природніше за калькований варіант.'

  - type: select
    title: Follow-up, відмова, ескалація
    instruction: Виберіть найкращу професійну реакцію.
    items:
      - question: Яке нагадування найменш пасивно-агресивне?
        options:
          - text: Повертаюся до листа від 12 липня щодо погодження бюджету.
            correct: true
          - text: Ви досі не спромоглися відповісти.
            correct: false
          - text: Нагадую вже вкотре, якщо раптом забули.
            correct: false
          - text: Мовчання триває.
            correct: false
        explanation: Нейтральне посилання на попередній лист відновлює контекст.
      - question: Коли доречно писати "наполягаємо"?
        options:
          - text: Коли є чітка підстава і м'якіші попередні кроки не спрацювали.
            correct: true
          - text: У будь-якому першому листі.
            correct: false
          - text: Коли немає фактів, але є сильні емоції.
            correct: false
          - text: Лише для дружніх запрошень.
            correct: false
        explanation: Сильна модальність потребує підстави.
      - question: Що має містити кризове оновлення?
        options:
          - text: Факт, вплив, дію і час наступного оновлення.
            correct: true
          - text: Лише вибачення.
            correct: false
          - text: Внутрішні звинувачення.
            correct: false
          - text: Загальну фразу "ситуація складна".
            correct: false
        explanation: Адресатові потрібна інформація для планування.
      - question: Який супровідний лист сильніший?
        options:
          - text: Той, що пов'язує конкретний досвід із потребою посади.
            correct: true
          - text: Той, що просто повторює резюме.
            correct: false
          - text: Той, що має найбільше прикметників.
            correct: false
          - text: Той, що не називає посаду.
            correct: false
        explanation: Аргумент у супровідному листі має бути релевантним.
      - question: Яке речення найкраще деескалює конфлікт?
        options:
          - text: Пропонуємо обговорити два можливі строки виконання і зафіксувати оновлений графік.
            correct: true
          - text: Досить сперечатися.
            correct: false
          - text: Ви самі створили конфлікт.
            correct: false
          - text: Ми не будемо нічого пояснювати.
            correct: false
        explanation: Деескалація має вести до конкретного рішення.
      - question: Що є ознакою маніпуляції в комерційному листі?
        options:
          - text: Прихований тиск без прозорих умов.
            correct: true
          - text: Чітко названа вигода партнера.
            correct: false
          - text: Пояснення строку.
            correct: false
          - text: Посилання на погоджений бюджет.
            correct: false
        explanation: Аргументація показує умови, маніпуляція їх затемнює.
      - question: Яке речення найкраще визнає факт без зайвого юридичного самозвинувачення?
        options:
          - text: Підтверджуємо, що доступ для трьох учасників не було активовано вчасно.
            correct: true
          - text: Ми повністю винні в усьому, що сталося.
            correct: false
          - text: Проблеми нібито були, але це не наше.
            correct: false
          - text: Ви перебільшуєте ситуацію.
            correct: false
        explanation: Факт визнано прямо, без зайвої емоції.
      - question: Що найкраще робить сильне дієслово в супровідному листі?
        options:
          - text: Показує конкретну дію кандидата і реальний внесок.
            correct: true
          - text: Замінює всі докази загальною похвалою.
            correct: false
          - text: Робить текст неформальним незалежно від контексту.
            correct: false
          - text: Дозволяє не називати посаду.
            correct: false
        explanation: Дієслово має підтримувати доказ, а не прикрашати порожній текст.

  - id: act-5
    type: essay-response
    title: Напишіть лист-претензію
    instruction: Складіть офіційний лист-претензію зі збереженням професійного тону.
    prompt: "Постачальник тричі затримав виконання етапу за договором. Напишіть лист-претензію: назвіть номер договору, хронологію фактів, наслідок для вашої команди, вимогу конкретних дій і строк відповіді."
    min_words: 180
    model_answer: |-
      > [!model-answer]
      > Тема: Претензія щодо порушення строків за договором N 42/24
      >
      > Шановні партнери,
      >
      > відповідно до договору N 42/24 етап налаштування платформи мав бути завершений до 10 липня. Попередньо строк уже переносився з 3 на 8 липня, а потім на 10 липня. Станом на 15 липня доступ для учасників не активовано, тому наша команда не може розпочати навчальний модуль і змушена змінювати календар програми.
      >
      > Для нас важливо мати не лише загальне підтвердження, а й конкретний план подальших дій, оскільки від запуску платформи залежить участь регіональних координаторів і вже погоджений розклад консультацій. Окремо просимо зазначити, хто з вашого боку відповідає за технічне виправлення, щоб подальше листування не втрачалося між кількома контактними особами. Це допоможе нашій команді швидко погоджувати уточнення і не дублювати запити. Також готові провести коротку технічну зустріч після отримання вашого плану, якщо це прискорить узгодження.
      >
      > Просимо до 17 липня надати письмове пояснення причин затримки, оновлений графік виконання робіт і підтвердження дати активації доступу. Якщо виконання в зазначений строк неможливе, просимо запропонувати компенсаційний варіант або інший погоджений механізм врегулювання. До отримання відповіді ми не можемо підтвердити наступний етап навчання для учасників, тому просимо розглядати це питання як пріоритетне.
      >
      > Сподіваємося на оперативне вирішення питання і збереження робочої співпраці.
      >
      > З повагою,
      > Ірина Коваль
    rubric:
      - criteria: Факти і підстава
        description: Названо договір, дати й порушення без перебільшень.
        points: 4
      - criteria: Вимоги
        description: Сформульовано конкретні дії і строк відповіді.
        points: 3
      - criteria: Тон
        description: Текст асертивний, але не образливий.
        points: 3

workbook:
  - id: wb-reading-claim-response
    type: reading
    title: "Читання: відповідь на скаргу"
    instruction: Прочитайте відповідь і визначте, як автор визнає факт без зайвих виправдань.
    text: >-
      Дякуємо, що повідомили про проблему з доступом. Підтверджуємо, що три учасники
      не змогли увійти на платформу 15 липня. Технічна команда вже перевіряє журнал
      доступу і налаштування облікових записів. До 16:00 надішлемо оновлення зі
      статусом і, якщо потрібно, новими посиланнями для входу. Перепрошуємо за
      незручність і розуміємо, що затримка впливає на календар навчального модуля.
    source: Навчальний лист для модуля B2.
    tasks:
      - Який факт автор визнає прямо?
      - Яку дію команда вже виконує?
      - Коли адресат отримає наступне оновлення?

  - type: match-up
    title: Формула і функція
    instruction: Поєднайте формулу зі стратегічною функцією в складному листуванні.
    pairs:
      - left: відповідно до договору
        right: називає підставу претензії
      - left: станом на 15 липня
        right: фіксує момент перевірки факту
      - left: просимо надати пояснення
        right: формулює вимогу без образи
      - left: пропонуємо перенести запуск
        right: відкриває переговори щодо рішення
      - left: наполягаємо на виконанні умов
        right: посилює позицію за наявності підстави
      - left: повертаюся до листа від...
        right: нейтрально вводить follow-up
      - left: додаю керівницю проєкту
        right: пояснює ескалацію
      - left: перепрошуємо за незручність
        right: визнає вплив проблеми на адресата
      - left: до 17 липня
        right: встановлює вимірюваний строк
      - left: готові обговорити альтернативу
        right: зберігає канал співпраці
      - left: сильні дієслова дії
        right: показують реальний внесок у супровідному листі
      - left: теза - доказ - висновок
        right: структурує переконливий аргумент

  - type: fill-in
    title: Модальність і тон
    instruction: Заповніть пропуски словами, які точно регулюють силу позиції.
    items:
      - sentence: "____ перенести запуск на 5 серпня."
        answer: "Пропонуємо"
        options:
          - Пропонуємо
          - Змушуємо
          - Натякаємо
          - Караємо
        explanation: '"Пропонуємо" відкриває переговори.'
      - sentence: "____ надати відповідь до 17 липня."
        answer: "Просимо"
        options:
          - Просимо
          - Киньте
          - Мовчіть
          - Забудьте
        explanation: Вимога лишається ввічливою.
      - sentence: "Ми ____ на виконанні погоджених умов."
        answer: "наполягаємо"
        options:
          - наполягаємо
          - розважаємо
          - вагаємо
          - розчиняємо
        explanation: '"Наполягаємо" доречне за наявності підстав.'
      - sentence: "____ не можемо підтримати запропонований строк."
        answer: "На жаль,"
        options:
          - На жаль,
          - Весело,
          - Байдуже,
          - Несподівано
        explanation: Формула вводить коректну відмову.
      - sentence: "До листа ____ портфоліо з прикладами комунікації."
        answer: "додаю"
        options:
          - додаю
          - докидаю
          - прикольно ставлю
          - запихаю
        explanation: Супровідний лист має назвати вкладення.
      - sentence: "____ до листа від 12 липня щодо бюджету."
        answer: "Повертаюся"
        options:
          - Повертаюся
          - Нападаю
          - Ображаюся
          - Караю
        explanation: Це нейтральна follow-up формула.
      - sentence: "Питання ____ на дату запуску."
        answer: "впливає"
        options:
          - впливає
          - нападає
          - звучить
          - ховається
        explanation: Причина ескалації має бути процесною.
      - sentence: "До 16:00 ____ оновлення зі статусом."
        answer: "надішлемо"
        options:
          - надішлемо
          - надішлеться само
