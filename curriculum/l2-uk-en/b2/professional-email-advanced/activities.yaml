          - підкинути
        explanation: '"Надати графік" є нейтральною діловою формулою.'
      - sentence: "У листі ____ керівницю проєкту через вплив на строк запуску."
        answer: "додаю"
        options:
          - додаю
          - караю
          - ховаю
          - підставляю
        explanation: Так можна процесно пояснити ескалацію.

  - id: wb-comparative-claim
    type: comparative-study
    title: Агресія чи асертивність
    instruction: Порівняйте два варіанти претензії.
    items_to_compare:
      - "Ви знову не виконали обіцянку, тому негайно виправляйте ситуацію."
      - "Роботи за етапом 2 не були завершені до погодженого строку 10 липня. Просимо надати оновлений графік виконання до 17 липня."
    criteria:
      - факти
      - тон
      - вимога
      - строк
    prompt: "Який варіант сильніший для ділового листування і чому?"
    model_answer: "Другий варіант сильніший: він називає факт, строк порушення, конкретну вимогу і новий дедлайн. Перший варіант емоційний, але не дає адресатові чіткої дії."

  - type: true-false
    title: Кризова комунікація
    instruction: Визначте, чи твердження відповідає професійній кризовій комунікації.
    items:
      - statement: Кризовий лист має називати факт, вплив, дію і час наступного оновлення.
        correct: true
        explanation: Це зменшує невизначеність для адресата.
      - statement: Follow-up найкраще починати з докору.
        correct: false
        explanation: Нейтральне повернення до попереднього листа професійніше.
      - statement: Ескалацію варто пояснювати процесною причиною.
        correct: true
        explanation: Так вона не виглядає як персональне покарання.
      - statement: У претензії краще уникати конкретних дат.
        correct: false
        explanation: Дати роблять позицію доказовою.
      - statement: Супровідний лист має пов'язати досвід кандидата з потребою посади.
        correct: true
        explanation: Це перетворює самопрезентацію на аргумент.
      - statement: Маніпуляція і аргументація відрізняються прозорістю умов.
        correct: true
        explanation: Аргументація показує умови й наслідки, маніпуляція їх приховує.
      - statement: У претензії сильніше працюють конкретні дати, ніж слова "завжди" і "ніколи".
        correct: true
        explanation: Дати легше перевірити і складніше спростувати.
      - statement: Відповідь на скаргу має починатися з виправдань.
        correct: false
        explanation: Спочатку краще визнати факт і назвати дію.
      - statement: Слово "наполягаємо" доречне лише тоді, коли позиція має підставу.
        correct: true
        explanation: Сильна модальність без доказів звучить як тиск.
      - statement: Кризовий лист може не називати час наступного оновлення.
        correct: false
        explanation: Час оновлення зменшує невизначеність.
