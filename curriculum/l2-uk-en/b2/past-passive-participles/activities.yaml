version: '1.0'
module: past-passive-participles
level: b2
inline: []
workbook:
  - type: quiz
    title: "Форма і функція"
    instruction: "Оберіть варіант, який найточніше відповідає фокусу речення."
    items:
      - question: "Який варіант найкраще описує документ як предмет після дії?"
        options:
          - text: "Підписаний договір передано до архіву."
            correct: true
          - text: "Договір підписано директоркою."
            correct: false
          - text: "Директорка підписала договір."
            correct: false
          - text: "Договір був підписаний директоркою."
            correct: false
        explanation: "Дієприкметник підписаний працює як означення при іменнику договір."
      - question: "Який варіант найкраще повідомляє результат без названого діяча?"
        options:
          - text: "Заяву зареєстровано."
            correct: true
          - text: "Зареєстрована заява лежить у теці."
            correct: false
          - text: "Секретар зареєстрував заяву."
            correct: false
          - text: "Заява була зареєстрована секретарем."
            correct: false
        explanation: "Форма на -но, -то фокусує результат і не називає виконавця."
      - question: "Яка форма нормативна для результату від дієслова зробити?"
        options:
          - text: "зроблений"
            correct: true
          - text: "зробитий"
            correct: false
          - text: "зробивший"
            correct: false
          - text: "зроблений кимось як присудок завжди найкращий"
            correct: false
        explanation: "Нормативна форма - зроблений; суфікс -вш- ненормативний, а присудок треба оцінювати за фокусом."
      - question: "Яке речення правильно використовує дієприкметниковий зворот після іменника?"
        options:
          - text: "Матеріали, зібрані під час експедиції, передали до архіву."
            correct: true
          - text: "Матеріали зібрані під час експедиції передали до архіву."
            correct: false
          - text: "Зібрані, матеріали під час експедиції передали до архіву."
            correct: false
          - text: "Матеріали зібравші під час експедиції передали до архіву."
            correct: false
        explanation: "Після іменника поширений дієприкметниковий зворот відокремлюється комами."
      - question: "Який варіант найкраще виправляє форму заснувший?"
        options:
          - text: "хлопець, який заснув"
            correct: true
          - text: "заснутий хлопець"
            correct: false
          - text: "заснувший хлопець"
            correct: false
          - text: "хлопець, заснутий сном"
            correct: false
        explanation: "Дія заснути неперехідна, тому потрібне підрядне речення або інший опис."
      - question: "Який варіант найточніше називає відповідального діяча?"
        options:
          - text: "Комісія затвердила порядок."
            correct: true
          - text: "Порядок затверджено комісією."
            correct: false
          - text: "Порядок був затверджений комісією."
            correct: false
          - text: "Затверджений комісією порядок був затверджений."
            correct: false
        explanation: "Коли діяч важливий, активне речення природніше й точніше."
      - question: "Який варіант правильно поєднує дієприкметник і форму на -но, -то?"
        options:
          - text: "Підписані документи перевірено перед засіданням."
            correct: true
          - text: "Підписано документи перевірені перед засіданням."
            correct: false
          - text: "Документи підписані директором і перевірено секретарем."
            correct: false
          - text: "Підписавші документи перевірено."
            correct: false
        explanation: "Дієприкметник описує документи, а форма перевірено повідомляє результат."
      - question: "Яка форма найкраща для художнього опису занедбаного місця?"
        options:
          - text: "забутий сад"
            correct: true
          - text: "сад, забувший людей"
            correct: false
          - text: "сад було забуто людьми"
            correct: false
          - text: "забуто сад стояв"
            correct: false
        explanation: "Забутий сад працює як образне означення."
      - question: "Який варіант найкраще показує стан предмета після дії?"
        options:
          - text: "відновлена брама"
            correct: true
          - text: "брама відновила майстра"
            correct: false
          - text: "брама відновившася"
            correct: false
          - text: "відновлено брама стоїть"
            correct: false
        explanation: "Відновлена узгоджується зі словом брама й описує предмет після дії."
      - question: "Яке речення найкраще виправляє калькований пасив із діячем?"
        options:
          - text: "Архів оприлюднив документи."
            correct: true
          - text: "Документи було оприлюднено архівом."
            correct: false
          - text: "Документи оприлюднені архівом були."
            correct: false
          - text: "Архівом документи були оприлюднені."
            correct: false
        explanation: "Коли архів важливий як діяч, активне речення найпрозоріше."
  - type: fill-in
    title: "Утворіть нормативну форму"
    instruction: "Заповніть пропуск пасивним дієприкметником або формою на -но, -то відповідно до контексту."
    items:
      - sentence: "____ договір передано до архіву."
        answer: "підписаний"
        options:
          - "підписаний"
          - "підписано"
          - "підписавший"
          - "підписитий"
        explanation: "Перед іменником договір потрібен узгоджений дієприкметник."
      - sentence: "Договір ____ після юридичної перевірки."
        answer: "підписано"
        options:
          - "підписано"
          - "підписаний"
          - "підписавший"
          - "підписаними"
        explanation: "Тут присудок повідомляє результат без названого діяча."
      - sentence: "____ звіт обговорили на засіданні."
        answer: "підготовлений"
        options:
          - "підготовлений"
          - "підготований"
          - "підготувавший"
          - "підготовлено"
        explanation: "Потрібен дієприкметник-означення при іменнику звіт."
      - sentence: "Після ремонту дах був повністю ____."
        answer: "відновлений"
        options:
          - "відновлений"
          - "відновитий"
          - "відновивший"
          - "відновлено"
        explanation: "Форма відновлений нормативна; відновитий і відновивший помилкові."
      - sentence: "На столі лежав ____ аркуш."
        answer: "зім'ятий"
        options:
          - "зім'ятий"
          - "м'яний"
          - "м'явший"
          - "зім'ято"
        explanation: "Ознаку предмета передає дієприкметник зім'ятий."
      - sentence: "У кутку стояла ____ шафа."
        answer: "зачинена"
        options:
          - "зачинена"
          - "зачинено"
          - "зачинивша"
          - "зачинитая"
        explanation: "Форма має узгоджуватися з іменником шафа."
      - sentence: "Текст, ____ від руки, важко читався."
        answer: "написаний"
        options:
          - "написаний"
          - "написано"
          - "написавший"
          - "писавший"
        explanation: "Після іменника дієприкметник утворює зворот."
      - sentence: "Помилки ____ перед публікацією."
        answer: "виправлено"
        options:
          - "виправлено"
          - "виправлені редакторкою"
          - "виправивші"
          - "виправлений"
        explanation: "Речення повідомляє результат, тому доречна форма на -но, -то."
      - sentence: "____ виставку відкрили після реставрації залу."
        answer: "відкриту"
        options:
          - "відкриту"
          - "відкрито"
          - "відкрившу"
          - "відкрита"
        explanation: "Форма має узгоджуватися зі словом виставку в знахідному відмінку."
      - sentence: "Матеріали, ____ під час практики, передали до музею."
        answer: "зібрані"
        options:
          - "зібрані"
          - "зібрано"
          - "зібравші"
          - "збірні"
        explanation: "Після іменника потрібен дієприкметниковий зворот."
  - type: match-up
    title: "Дієслово і дієприкметник"
    instruction: "Поєднайте інфінітив із нормативною формою пасивного дієприкметника."
    pairs:
      - left: "прочитати"
        right: "прочитаний"
      - left: "написати"
        right: "написаний"
      - left: "зробити"
        right: "зроблений"
      - left: "спекти"
        right: "спечений"
      - left: "відкрити"
        right: "відкритий"
      - left: "забути"
        right: "забутий"
      - left: "стерти"
        right: "стертий"
      - left: "зім'яти"
        right: "зім'ятий"
      - left: "озброїти"
        right: "озброєний"
      - left: "відновити"
        right: "відновлений"
      - left: "поставити"
        right: "поставлений"
      - left: "налити"
        right: "налитий"
  - type: select
    title: "Позначте нормативні речення"
    instruction: "У кожному пункті виберіть усі варіанти, які відповідають нормі й заданому фокусу."
    items:
      - question: "Які варіанти природні, якщо треба описати предмет після дії?"
        min_correct: 2
        options:
          - text: "підписаний договір"
            correct: true
          - text: "відновлений парк"
            correct: true
          - text: "договір підписано директором"
            correct: false
          - text: "відновивший парк"
            correct: false
        explanation: "Дієприкметники підписаний і відновлений узгоджуються з іменниками."
      - question: "Які варіанти правильно виправляють форму прочитавший?"
        min_correct: 2
        options:
          - text: "студент, який прочитав текст"
            correct: true
          - text: "прочитаний студент текст"
            correct: false
          - text: "прочитаний текст"
            correct: true
          - text: "студент прочитавший текст"
            correct: false
        explanation: "Активного діяча передає підрядне речення; предмет після дії - дієприкметник."
      - question: "Які варіанти краще називають відповідального діяча?"
        min_correct: 2
        options:
          - text: "Редакторка виправила помилки."
            correct: true
          - text: "Комісія ухвалила рішення."
            correct: true
          - text: "Помилки виправлено редакторкою."
            correct: false
          - text: "Рішення було ухвалене комісією."
            correct: false
        explanation: "Відповідального діяча найкраще зробити підметом."
      - question: "Які форми на -т- нормативні в поданих парах?"
        min_correct: 2
        options:
          - text: "відкритий"
            correct: true
          - text: "забутий"
            correct: true
          - text: "зробитий"
            correct: false
          - text: "відновитий"
            correct: false
        explanation: "Не всі дієслова приймають суфікс -т-."
      - question: "Які речення правильно ставлять коми при звороті?"
        min_correct: 2
        options:
          - text: "Лист, написаний від руки, зберігали в архіві."
            correct: true
          - text: "Документи, зібрані під час експедиції, передали музею."
            correct: true
          - text: "Лист написаний від руки, зберігали в архіві."
            correct: false
          - text: "Документи зібрані під час експедиції передали музею."
            correct: false
        explanation: "Поширений зворот після іменника відокремлюється комами."
      - question: "Які варіанти правильно розрізняють форму на -но, -то і дієприкметник?"
        min_correct: 2
        options:
          - text: "Звіт підготовлено."
            correct: true
          - text: "Підготовлений звіт оприлюднили."
            correct: true
          - text: "Підготовлено звіт лежить на столі."
            correct: false
          - text: "Звіт підготовлений аналітиком, тому аналітик прихований."
            correct: false
        explanation: "Підготовлено - присудок результату; підготовлений - узгоджене означення."
      - question: "Які варіанти правильно використовують орудний відмінок?"
        min_correct: 2
        options:
          - text: "Документ підписано електронним ключем."
            correct: true
          - text: "Поверхню очищено спеціальним розчином."
            correct: true
          - text: "Звіт підготовлено аналітиком."
            correct: false
          - text: "Рішення ухвалено радою."
            correct: false
        explanation: "Орудний інструмента або засобу природний; особового діяча краще зробити підметом."
      - question: "Які варіанти доречні для стислого художнього опису?"
        min_correct: 2
        options:
          - text: "забутий сад"
            correct: true
          - text: "зім'ята записка"
            correct: true
          - text: "сад, забувший людей"
            correct: false
          - text: "записка була зім'ята кимось невідомим"
            correct: false
        explanation: "У художньому описі дієприкметник може стисло називати слід дії."
  - type: error-correction
    title: "Виправте помилкову форму"
    instruction: "Знайдіть помилку й оберіть нормативне редагування."
    items:
      - sentence: "Зробитий висновок не переконав комісію."
        error: "Зробитий"
        correction: "Зроблений"
        error_type: "word"
        options:
          - "Зроблений"
          - "Зробивший"
          - "Зроблений кимось"
          - "Зроблено"
        explanation: "Від зробити нормативна форма зроблений."
      - sentence: "У статті згадано учня, прочитавшого всі джерела."
        error: "прочитавшого"
        correction: "який прочитав"
        error_type: "construction"
        options:
          - "який прочитав"
          - "прочитаного"
          - "прочитавшого"
          - "прочитого"
        explanation: "Активну дію учня передає підрядне речення."
      - sentence: "Заснувша дитина прокинулася від шуму."
        error: "Заснувша"
        correction: "Дитина, яка заснула,"
        error_type: "construction"
        options:
          - "Дитина, яка заснула,"
          - "Заснута дитина"
          - "Заснувша дитина"
          - "Заснувлена дитина"
        explanation: "Заснути - неперехідна дія, тому потрібна інша конструкція."
      - sentence: "Парк відновитий після бурі знову відкрили."
        error: "відновитий"
        correction: "відновлений"
        error_type: "word"
        options:
          - "відновлений"
          - "відновивший"
          - "відновитий"
          - "відновлено"
        explanation: "Нормативний дієприкметник - відновлений."
      - sentence: "Документи підписані директором і передані до архіву."
        error: "підписані директором"
        correction: "директор підписав документи"
        error_type: "construction"
        options:
          - "директор підписав документи"
          - "підписані директором"
          - "підписано директором"
          - "директором підписані"
        explanation: "Якщо директор важливий як діяч, потрібен актив."
      - sentence: "Пектий хліб залишили на столі."
        error: "Пектий"
        correction: "Печений"
        error_type: "word"
        options:
          - "Печений"
          - "Пектий"
          - "Пекший"
          - "Печено"
        explanation: "У формі печений відбувається чергування к -> ч."
      - sentence: "Озброїтий підрозділ повернувся з навчань."
        error: "Озброїтий"
        correction: "Озброєний"
        error_type: "word"
        options:
          - "Озброєний"
          - "Озброїтий"
          - "Озброївший"
          - "Озброєно"
        explanation: "Нормативна форма - озброєний."
      - sentence: "Лист написаний від руки лежав на столі."
        error: "написаний від руки"
        correction: "лист, написаний від руки,"
        error_type: "construction"
        options:
          - "лист, написаний від руки,"
          - "лист написаний від руки"
          - "лист написавший від руки"
          - "листом написано від руки"
        explanation: "Поширений зворот після іменника треба відокремити комами."
  - type: fill-in
    title: "Позначте суфікси"
    instruction: "Виберіть суфікс пасивного дієприкметника в кожному слові."
    items:
      - sentence: "У слові прочитаний суфікс пасивного дієприкметника - ____."
        answer: "н"
        options: ["н", "ен", "т", "вш"]
        explanation: "Прочитаний має модель із суфіксом -н-."
      - sentence: "У слові написаний суфікс пасивного дієприкметника - ____."
        answer: "н"
        options: ["н", "ен", "т", "ш"]
        explanation: "Написаний має суфікс -н-."
      - sentence: "У слові зроблений суфікс пасивного дієприкметника - ____."
        answer: "ен"
        options: ["н", "ен", "т", "л"]
        explanation: "Зроблений належить до моделі з -ен-."
      - sentence: "У слові відновлений суфікс пасивного дієприкметника - ____."
        answer: "ен"
        options: ["н", "ен", "т", "вш"]
        explanation: "Відновлений має суфікс -ен- із чергуванням."
      - sentence: "У слові відкритий суфікс пасивного дієприкметника - ____."
        answer: "т"
        options: ["н", "ен", "т", "ш"]
        explanation: "Відкритий має модель із суфіксом -т-."
      - sentence: "У слові забутий суфікс пасивного дієприкметника - ____."
        answer: "т"
        options: ["н", "ен", "т", "л"]
        explanation: "Забутий має суфікс -т-."
      - sentence: "У слові стертий суфікс пасивного дієприкметника - ____."
        answer: "т"
        options: ["н", "ен", "т", "вш"]
        explanation: "Стертий має суфікс -т-."
      - sentence: "У слові зім'ятий суфікс пасивного дієприкметника - ____."
        answer: "т"
        options: ["н", "ен", "т", "ш"]
        explanation: "Зім'ятий має суфікс -т-."
      - sentence: "У слові озброєний суфікс пасивного дієприкметника - ____."
        answer: "єн"
        options: ["н", "єн", "т", "вш"]
        explanation: "Озброєний має варіант -єн- після зміни основи."
