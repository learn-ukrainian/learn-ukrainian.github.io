version: '1.0'
module: past-passive-participles
level: b2
inline:
  - id: act-1
    type: comparative-study
    title: Що описує дієприкметник
    instruction: Порівняйте три моделі з одним коренем.
    items_to_compare:
      - "Редакторка виправила текст."
      - "Текст виправлено перед публікацією."
      - "Виправлений текст надіслали авторові."
    criteria:
      - діяч
      - результат
      - ознака предмета
    prompt: "Яке речення називає діяча, яке фіксує результат, а яке описує предмет після дії?"
    model_answer: >-
      Актив називає редакторку. **Текст виправлено** повідомляє результат без
      діяча. **Виправлений текст** описує предмет після виконаної дії.

  - id: act-2
    type: critical-analysis
    title: Суфіксальний маршрут
    instruction: Проаналізуйте форми й поясніть суфікс або чергування.
    target_text: >-
      Прочитаний розділ, написаний лист, зібрані матеріали, зроблене завдання,
      поставлене питання, відновлена брама, озброєний загін, відкрита виставка,
      забута обіцянка, стертий напис.
    questions:
      - "Які форми належать до маршруту -н-?"
      - "Які форми мають -ен- / -єн- або чергування?"
      - "Які форми належать до маршруту -т-?"
    model_answers:
      - "Прочитаний, написаний, зібрані."
      - "Зроблене, поставлене, відновлена, озброєний."
      - "Відкрита, забута, стертий."

  - id: act-3
    type: critical-analysis
    title: Узгодьте форму
    instruction: Поясніть, чому потрібна саме така форма дієприкметника.
    target_text: >-
      Підписана заява лежить у теці. Ми говорили про оновлену програму. Немає
      підписаного договору. Працюємо з перевіреними даними. До поставленого
      питання повернемося пізніше.
    questions:
      - "Де видно узгодження за родом?"
      - "Де форму визначає прийменник або керування?"
      - "Чому форма на -но, -то тут не замінює дієприкметник?"
    model_answers:
      - "Підписана узгоджується із заява; оновлену із програму."
      - "Про вимагає знахідного, немає - родового, з - орудного, до - родового."
      - "Речення описують предмети, а не лише повідомляють результат."

  - id: act-4
    type: comparative-study
    title: Актив, -но/-то чи означення
    instruction: Порівняйте три варіанти й поясніть, коли кожен доречний.
    items_to_compare:
      - "Директорка підписала заяву вчора."
      - "Заяву підписано вчора."
      - "Підписана заява лежить у теці."
    criteria:
      - відповідальний діяч
      - результат
      - ознака документа
      - жанр
    prompt: "Який варіант потрібен для новини, статусу й опису документа?"
    model_answer: >-
      Для новини про відповідальність потрібен актив. Для статусу потрібне
      **заяву підписано**. Для опису документа потрібне **підписана заява**.

  - id: act-5
    type: critical-analysis
    title: Приберіть ненормативні форми
    instruction: Виправте форми й поясніть тип помилки.
    target_text: >-
      Зробитий проєкт надіслали комісії. Студент, прочитавший статтю, поставив
      запитання. Оновлений програму показали користувачам. Документи підписані
      й передано до архіву.
    questions:
      - "Де неправильний суфікс?"
      - "Де потрібне підрядне речення замість форми на -вш-?"
      - "Де порушено узгодження або змішано моделі?"
    model_answers:
      - "Зробитий треба замінити на зроблений."
      - "Прочитавший треба замінити на який прочитав."
      - "Оновлену програму; документи підписано й передано або підписані документи передано."

workbook:
  - id: wb-1
    type: critical-analysis
    title: Суфіксальна група в тексті
    instruction: Знайдіть форми й розподіліть їх за маршрутами.
    target_text: >-
      Прочитаний розділ і написаний лист лежали поруч із відновленою мапою.
      На стіні висів стертий напис, а біля дверей стояла забута валіза.
    questions:
      - "Які форми мають суфікс -н-?"
      - "Які форми мають -ен- / -єн-?"
      - "Які форми мають -т-?"
    model_answers:
      - "Прочитаний, написаний."
      - "Відновленою."
      - "Стертий, забута."

  - id: wb-2
    type: critical-analysis
    title: Занедбана садиба
    instruction: Визначте, як дієприкметники створюють опис.
    target_text: >-
      За старими липами стояла забута садиба. Зачинені вікна темніли над
      засипаною стежкою, а біля дверей висіла стерта табличка. У кімнаті лежав
      написаний від руки щоденник.
    questions:
      - "Які форми описують предмети після дії?"
      - "Які форми працюють як художні означення?"
      - "Де можна було б замінити опис активним реченням?"
    model_answers:
      - "Забута, зачинені, засипаною, стерта, написаний."
      - "Забута садиба, зачинені вікна, стерта табличка створюють атмосферу."
      - "Написаний від руки щоденник можна розгорнути: хтось написав щоденник від руки."

  - id: wb-3
    type: critical-analysis
    title: Чотири версії одного змісту
    instruction: Перебудуйте речення за чотирма моделями.
    target_text: "Документи були підготовлені секретарем і передані комісії."
    questions:
      - "Як виглядає активний варіант?"
      - "Як виглядає результативний варіант на -но, -то?"
      - "Як виглядає варіант із дієприкметником-означенням?"
    model_answers:
      - "Секретар підготував документи й передав їх комісії."
      - "Документи підготовлено й передано комісії."
      - "Підготовлені документи передали комісії."

  - id: wb-4
    type: comparative-study
    title: Словниковий контроль
    instruction: Порівняйте форми різної активності в словнику учня.
    items_to_compare:
      - "підписана заява"
      - "бачений мною фільм"
      - "студент, який прочитав статтю"
      - "знайдені в архіві листи"
    criteria:
      - активне вживання
      - книжність або обмеженість
      - потреба в підрядному реченні
      - фокус на предметі
    prompt: "Які форми можна активно вживати, а які краще перевірити або перебудувати?"
    model_answer: >-
      **Підписана заява** і **знайдені листи** природні як означення. **Бачений
      мною фільм** книжне, часто краще підрядне речення. **Студент, який
      прочитав** потрібне, бо дія активна.

  - id: wb-5
    type: critical-analysis
    title: Морфологічна перевірка
    instruction: Поясніть, яку дію має виконати редактор.
    target_text: >-
      Зробитий проєкт, оновлений програму, студент прочитавший статтю,
      документи підписані й передано, підписані документи, документи підписано.
    questions:
      - "Які фрагменти треба виправити морфологічно?"
      - "Які фрагменти є природними, але мають різний фокус?"
      - "Яка головна різниця між підписані документи і документи підписано?"
    model_answers:
      - "Зробитий -> зроблений; оновлений програму -> оновлену програму; прочитавший -> який прочитав."
      - "Підписані документи і документи підписано природні, але виконують різні ролі."
      - "Підписані документи описує предмети; документи підписано повідомляє результат."
