  - type: essay-response
    id: participle-editing-note
    title: "Письмо: редакторська примітка"
    instruction: "Напишіть коротку редакторську примітку до службового або публіцистичного тексту."
    prompt: "Уявіть, що ви редагуєте текст про громадський проєкт. Поясніть авторові, де треба використати активне речення, де форму на -но, -то, а де пасивний дієприкметник як означення. У відповіді наведіть щонайменше три власні приклади: один із суфіксом -н-, один із суфіксом -ен-/-єн-, один із суфіксом -т-."
    min_words: 180
    model_answer: "У цьому тексті актив потрібен там, де треба назвати відповідального виконавця: робоча група підготувала звіт, рада ухвалила рішення, координаторка перевірила дані. Форму на -но, -то варто використати тоді, коли важливий завершений результат без названого діяча: звіт підготовлено, графік погоджено, пропозиції передано комісії. Пасивний дієприкметник доречний як означення при іменнику: підписаний договір, відновлений парк, відкрита виставка. Я б не залишав конструкцій на зразок звіт був підготовлений робочою групою, якщо можна прямо назвати діяча. Також треба прибрати форми на -вш- і механічні форми типу зробитий або відновитий. Редагування має не ускладнювати текст, а точніше розподіляти фокус між діячем, результатом і ознакою предмета."
    rubric:
      - criteria: "Розрізнення форм"
        description: "У відповіді чітко розмежовано актив, форму на -но, -то і пасивний дієприкметник."
        points: 3
      - criteria: "Суфіксальні моделі"
        description: "Наведено приклади з моделями -н-, -ен-/-єн-, -т-."
        points: 3
      - criteria: "Редакторський фокус"
        description: "Пояснено, як форма керує відповідальністю, результатом або ознакою предмета."
        points: 4
