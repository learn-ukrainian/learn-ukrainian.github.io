- type: reading
  id: genitive-analysis-reading
  title: "Читання: службова записка з родовими ланцюжками"
  instruction: "Прочитайте текст і визначте, які функції виконує родовий відмінок."
  source: "Навчальний уривок для модуля B2."
  text: >-
    Після перевірки документів комісія не знайшла доказів порушення процедури.
    Водночас, за винятком двох технічних правок, текст рішення суду залишився
    без змін. Унаслідок затримки фінансування підрядник переніс частину робіт
    на кінець місяця. Навколо будівлі університету встановили тимчасові
    огорожі, а поблизу центрального входу відкрили пункт консультації. Попри
    застереження експертів, команда не відмовилася від аналізу даних опитування,
    бо саме цей аналіз пояснює причини недовіри частини учасників.
  tasks:
    - "Знайдіть два приклади прийменникового родового."
    - "Поясніть, чому у фразі доказів порушення перший родовий пов'язаний із запереченням."
    - "Визначте, де родовий є суб'єктним, а де об'єктним."
    - "Знайдіть родовий ланцюжок і запропонуйте прозорішу дієслівну версію."

- type: quiz
  title: "Функції родового відмінка"
  instruction: "Оберіть найточніше пояснення функції родового в кожному прикладі."
  items:
    - question: "Яку функцію має родовий у словосполученні приїзд делегації?"
      options:
        - text: "суб'єктний родовий, бо делегація приїхала"
          correct: true
        - text: "об'єктний родовий, бо делегацію приїхали"
          correct: false
        - text: "кількісний родовий після числівника"
          correct: false
        - text: "родовий після прийменника без"
          correct: false
      explanation: "Дія приїзду походить від делегації, тому це суб'єктний родовий."
    - question: "Яку функцію має родовий у фразі захист прав працівників?"
      options:
        - text: "об'єктний родовий, бо права захищають"
          correct: true
        - text: "частковий родовий, бо права є речовиною"
          correct: false
        - text: "просторовий родовий після навколо"
          correct: false
        - text: "клична форма для звертання"
          correct: false
      explanation: "Права є об'єктом дії захищати."
    - question: "Що показує форма чаю у реченні Випий чаю після дороги?"
      options:
        - text: "частину або невизначену порцію напою"
          correct: true
        - text: "повну конкретну чашку як завершений об'єкт"
          correct: false
        - text: "місце дії біля столу"
          correct: false
        - text: "виконавця дії випити"
          correct: false
      explanation: "Чаю має партитивний відтінок."
    - question: "Чому у фразі сюжет міфу очікуємо закінчення -у?"
      options:
        - text: "міф тут є абстрактним культурним поняттям"
          correct: true
        - text: "усі слова чоловічого роду мають -у"
          correct: false
        - text: "після слова сюжет завжди пишемо -а"
          correct: false
        - text: "міф є назвою конкретної особи"
          correct: false
      explanation: "Абстрактні поняття часто мають -у/-ю."
    - question: "У якому реченні прийменник задає допустове значення?"
      options:
        - text: "Попри застереження експертів, проєкт підтримали."
          correct: true
        - text: "Після застереження експертів проєкт переписали."
          correct: false
        - text: "Замість застереження експерти подали звіт."
          correct: false
        - text: "Навколо застереження виникла дискусія."
          correct: false
      explanation: "Попри означає всупереч перешкоді."
    - question: "Що означає родовий у фразі без жодного доказу?"
      options:
        - text: "відсутність підстави або доказу"
          correct: true
        - text: "конкретну адресу руху"
          correct: false
        - text: "виконавця дії довести"
          correct: false
        - text: "порівняння двох документів"
          correct: false
      explanation: "Без керує родовим і позначає відсутність."
    - question: "Яке пояснення найкраще для форми університету?"
      options:
        - text: "це назва установи, тому природна форма на -у"
          correct: true
        - text: "це ім'я людини, тому треба -а"
          correct: false
        - text: "це тварина, тому треба -я"
          correct: false
        - text: "це завжди знахідний відмінок"
          correct: false
      explanation: "Установа або інституція часто має -у/-ю."
    - question: "Яка конструкція є найпрозорішою, якщо треба назвати виконавця?"
      options:
        - text: "Команда проаналізувала результати опитування."
          correct: true
        - text: "Проведення аналізу результатів опитування."
          correct: false
        - text: "Питання здійснення аналізу результатів."
          correct: false
        - text: "У разі аналізу результатів."
          correct: false
      explanation: "Дієслівна конструкція прямо називає виконавця."
    - question: "Чому у фразі протягом трьох робочих днів усі залежні слова стоять у родовому?"
      options:
        - text: "протягом керує родовим, а числівникова група узгоджена всередині"
          correct: true
        - text: "це кличний відмінок множини"
          correct: false
        - text: "протягом завжди потребує знахідного"
          correct: false
        - text: "прикметник робочих не має відмінка"
          correct: false
      explanation: "Прийменник і кількісна група створюють родову конструкцію."
    - question: "У якому варіанті родовий ланцюжок найкраще розгорнуто?"
      options:
        - text: "Після того як комісія перевірила рішення, його оприлюднили."
          correct: true
        - text: "Після перевірки рішення комісії порядку оприлюднення."
          correct: false
        - text: "Перевірки рішення комісії оприлюднення порядку."
          correct: false
        - text: "Без рішення перевірки оприлюднення комісії."
          correct: false
      explanation: "Розгорнуте речення показує дію й виконавця."

