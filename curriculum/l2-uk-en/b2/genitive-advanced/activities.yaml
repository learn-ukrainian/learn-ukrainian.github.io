version: '1.0'
module: genitive-advanced
level: b2
inline:
- type: select
  title: Роль родового
  instruction: Позначте всі правильні пояснення функції родового.
  items:
  - question: 'У фразі «налити чаю» правильні пояснення такі:'
    options:
    - text: родовий має партитивне значення
      correct: true
    - text: йдеться про невизначену кількість
      correct: true
    - text: це родовий належності
      correct: false
    - text: тут потрібен знахідний
      correct: false
    min_correct: 2
  - question: 'У фразі «рішення суду» слово «суду» можна пояснити так:'
    options:
    - text: суд ухвалив рішення
      correct: true
    - text: це суб’єктний або джерельний родовий
      correct: true
    - text: це частина суду
      correct: false
    - text: це кількісний родовий
      correct: false
    min_correct: 2
  - question: 'У фразі «захист прав працівників» правильні пояснення такі:'
    options:
    - text: «прав» є об’єктним родовим
      correct: true
    - text: «працівників» уточнює групу осіб
      correct: true
    - text: обидві форми означають виконавця
      correct: false
    - text: родовий тут не має змісту
      correct: false
    min_correct: 2
  - question: Які формули допомагають перевірити номіналізацію?
    options:
    - text: хто виконує дію?
      correct: true
    - text: що є об’єктом дії?
      correct: true
    - text: який колір у слова?
      correct: false
    - text: чи можна замінити все одним прикметником?
      correct: false
    min_correct: 2
  - question: 'Для означального родового правильні приклади такі:'
    options:
    - text: людина честі
      correct: true
    - text: криза довіри
      correct: true
    - text: три заяви
      correct: false
    - text: попри дощ
      correct: false
    min_correct: 2
  - question: Які фрази показують партитивний відтінок?
    options:
    - text: додати цукру
      correct: true
    - text: зібрати матеріалу
      correct: true
    - text: рішення суду
      correct: false
    - text: будинок батька
      correct: false
    min_correct: 2
  - question: Які речення прозоро розгортають родовий ланцюжок?
    options:
    - text: Комісія перевірила документи.
      correct: true
    - text: Експерти обговорили план.
      correct: true
    - text: Документи перевірили комісію.
      correct: false
    - text: План обговорив експертів.
      correct: false
    min_correct: 2
  - question: Де родовий може створити двозначність без контексту?
    options:
    - text: оцінка експерта
      correct: true
    - text: аналіз директора
      correct: true
    - text: протягом тижня
      correct: false
    - text: без відповіді
      correct: false
    min_correct: 2
- type: fill-in
  title: Прийменники з родовим
  instruction: Заповніть пропуск прийменником або сполукою, що керує родовим.
  items:
  - sentence: ____ затримки фінансування підрядник переніс частину робіт.
    answer: Унаслідок
    options:
    - Унаслідок
    - Завдяки
    - Всупереч
    - Попри
    explanation: Унаслідок керує родовим і називає причину.
  - sentence: ____ одного пункту, договір залишився без змін.
    answer: За винятком
    options:
    - За винятком
    - Навстріч
    - Всупереч
    - Через
    explanation: За винятком керує родовим і називає виняток.
  - sentence: Зустріч перенесли ____ відсутності кворуму.
    answer: у разі
    options:
    - у разі
    - попри
    - завдяки
    - навстріч
    explanation: 'У разі вимагає родового: відсутності.'
  - sentence: ____ межами міста відкрили новий логістичний центр.
    answer: Поза
    options:
    - Поза
    - Всупереч
    - Завдяки
    - Наперекір
    explanation: Поза керує родовим у просторовому значенні.
  - sentence: ____ попереднього звіту, новий документ містить джерела.
    answer: На відміну від
    options:
    - На відміну від
    - Попри
    - Через
    - Назустріч
    explanation: На відміну від є сполукою з родовим.
  - sentence: Команда діяла ____ прозорості процедури.
    answer: задля
    options:
    - задля
    - завдяки
    - всупереч
    - попри
    explanation: Задля керує родовим і називає мету.
  - sentence: ____ центрального входу відкрили пункт консультації.
    answer: Поблизу
    options:
    - Поблизу
    - Завдяки
    - Через
    - Попри
    explanation: Поблизу керує родовим у просторовому значенні.
  - sentence: ____ результатів аудиту план можуть змінити.
    answer: Залежно від
    options:
    - Залежно від
    - Всупереч
    - Навстріч
    - Попри
    explanation: Залежно від керує родовим.
  - sentence: ____ договору команда підготувала окремий коментар.
    answer: Щодо
    options:
    - Щодо
    - Завдяки
    - Попри
    - Через
    explanation: Щодо керує родовим.
  - sentence: ____ перевірки документів комісія зібралася вранці.
    answer: З метою
    options:
    - З метою
    - Всупереч
    - Навстріч
    - Попри
    explanation: З метою керує родовим.
- type: quiz
  title: Закінчення -а/-я чи -у/-ю
  instruction: Оберіть форму, яка найкраще відповідає значенню.
  items:
  - question: Край ____ був гострий після розколу.
    options:
    - text: каменя
      correct: true
    - text: каменю
      correct: false
    - text: камінь
      correct: false
    - text: камені
      correct: false
    explanation: Ідеться про конкретний предмет, тому природна форма «каменя».
  - question: Колір ____ змінився після дощу.
    options:
    - text: каменю
      correct: true
    - text: каменя
      correct: false
    - text: каменем
      correct: false
    - text: камені
      correct: false
    explanation: Ідеться про матеріал або його властивість.
  - question: Економіка ____ має іншу структуру, ніж економіка міста.
    options:
    - text: Донбасу
      correct: true
    - text: Донбаса
      correct: false
    - text: Донбасом
      correct: false
    - text: Донбасі
      correct: false
    explanation: Донбас сприймається як регіон, тому форма на -у.
  - question: Рішення ____ оприлюднили після засідання.
    options:
    - text: суду
      correct: true
    - text: суда
      correct: false
    - text: судом
      correct: false
    - text: суді
      correct: false
    explanation: Установа або орган часто має форму на -у.
  - question: Копію ____ додали до заяви.
    options:
    - text: документа
      correct: true
    - text: документу
      correct: false
    - text: документом
      correct: false
    - text: документі
      correct: false
    explanation: У цьому контексті йдеться про конкретний документ.
  - question: Сюжет цього ____ обговорили на семінарі.
    options:
    - text: міфу
      correct: true
    - text: міфа
      correct: false
    - text: міфом
      correct: false
    - text: міфі
      correct: false
    explanation: Міф як культурне поняття має форму на -у.
  - question: Наприкінці ____ команда подала короткий звіт.
    options:
    - text: листопада
      correct: true
    - text: листопаду
      correct: false
    - text: листопадом
      correct: false
    - text: листопаді
      correct: false
    explanation: Назва місяця має форму листопада.
  - question: Показник ____ знизився після зміни тарифу.
    options:
    - text: прибутку
      correct: true
    - text: прибутка
      correct: false
    - text: прибутком
      correct: false
    - text: прибутці
      correct: false
    explanation: Абстрактне економічне поняття має форму на -у.
  - question: Кілометр ____ відремонтували перед відкриттям маршруту.
    options:
    - text: шляху
      correct: true
    - text: шляха
      correct: false
    - text: шляхом
      correct: false
    - text: шляхові
      correct: false
    explanation: Шлях як простір або напрям має форму на -у.
  - question: Кабінет ____ перенесли на другий поверх.
    options:
    - text: директора
      correct: true
    - text: директору
      correct: false
    - text: директором
      correct: false
    - text: директорові
      correct: false
    explanation: Назва особи в родовому однини має форму директора.
- type: error-correction
  title: Заперечення і кількість
  instruction: Виправте форму або поясніть, чому родовий потрібен.
  items:
  - sentence: Комісія не знайшла докази порушення.
    error: докази
    correction: доказів
    options:
    - доказів
    - доказами
    - докази
    - доказах
    explanation: 'Після заперечення природний родовий: не знайшла доказів.'
  - sentence: У звіті бракує конкретні дані.
    error: конкретні дані
    correction: конкретних даних
    options:
    - конкретних даних
    - конкретні дані
    - конкретними даними
    - конкретних дані
    explanation: Бракувати керує родовим.
  - sentence: Протягом три дні не було відповіді.
    error: три дні
    correction: трьох днів
    options:
    - трьох днів
    - три дні
    - трьома днями
    - трьох день
    explanation: Протягом керує родовим числівникової групи.
  - sentence: Не було жодна підстава для відмови.
    error: жодна підстава
    correction: жодної підстави
    options:
    - жодної підстави
    - жодна підстава
    - жодною підставою
    - жодній підставі
    explanation: Немає / не було + жодної підстави.
  - sentence: Більшість учасники підтримала пропозицію.
    error: учасники
    correction: учасників
    options:
    - учасників
    - учасники
    - учасниками
    - учасникам
    explanation: Після «більшість» залежний іменник стоїть у родовому.
  - sentence: Не було жодні докази в матеріалах справи.
    error: жодні докази
    correction: жодних доказів
    options:
    - жодних доказів
    - жодні докази
    - жодними доказами
    - жодних доказами
    explanation: Заперечення з жодних вимагає родового множини.
  - sentence: Частина місцевий бюджет спрямована на освіту.
    error: місцевий бюджет
    correction: місцевого бюджету
    options:
    - місцевого бюджету
    - місцевий бюджет
    - місцевим бюджетом
    - місцевому бюджету
    explanation: Після частина залежна група стоїть у родовому.
  - sentence: Кілька важливі зауваження залишили без відповіді.
    error: важливі зауваження
    correction: важливих зауважень
    options:
    - важливих зауважень
    - важливі зауваження
    - важливими зауваженнями
    - важливих зауваження
    explanation: Після кілька потрібен родовий множини.
- id: act-5
  type: reading
  title: 'Читання: формальна довідка'
  instruction: Прочитайте уривок і поясніть родові ланцюжки.
  source: Навчальний уривок для модуля B2.
  text: Після аналізу результатів опитування мешканців громади робоча група підготувала проєкт змін до правил розподілу коштів. За винятком двох технічних правок, структура документа залишилася без змін. Унаслідок відсутності підтвердження частини витрат аудитори не затвердили фінальний звіт, але не знайшли доказів порушення процедури.
  tasks:
  - Знайдіть два прийменникові родові.
  - Поясніть, де родовий є об'єктним.
  - Визначте один родовий належності або тематичного уточнення.
  - Перепишіть одне речення простішою мовою для широкої аудиторії.
- type: group-sort
  title: Родовий чи не родовий
  instruction: Розподіліть фрази за моделлю керування.
  groups:
  - name: родовий після прийменника
    items:
    - без дозволу
    - унаслідок помилки
    - за винятком одного пункту
    - поблизу офісу
    - залежно від результату
  - name: 'не родовий: давальний'
    items:
    - завдяки підтримці
    - всупереч прогнозам
    - наперекір обставинам
    - навстріч гостям
  - name: 'не родовий: знахідний'
    items:
    - попри дощ
    - через помилку
    - попри труднощі
    - через затримку
workbook:
- id: workbook-1
  type: reading
  title: Міні-корпус для редактора
  instruction: Прочитайте текст і виконайте аналітичні завдання.
  source: Навчальний уривок для модуля B2.
  text: Упродовж трьох місяців команда збирала матеріали для аналізу впливу програми на зайнятість молоді. Частина учасників не надала підтвердження стажу, тому аудитори не включили цих даних до фінальної таблиці. На відміну від попереднього звіту, новий документ містить опис методики, перелік джерел і пояснення обмежень вибірки.
  tasks:
  - Випишіть усі форми родового.
  - Позначте, які з них залежать від прийменника.
  - Знайдіть кількісний або партитивний родовий.
  - Скоротіть один важкий родовий ланцюжок.
- type: fill-in
  title: Шари родового
  instruction: Заповніть пропуски правильною формою.
  items:
  - sentence: Аудитори не знайшли ____ порушення процедури.
    answer: доказів
    options:
    - доказів
    - докази
    - доказами
    - доказах
    explanation: Заперечення і відсутність вимагають родового.
  - sentence: ____ початку засідання учасники отримали матеріали.
    answer: До
    options:
    - До
    - Завдяки
    - Всупереч
    - Через
    explanation: До керує родовим.
  - sentence: У бюджеті бракує ____ для нового етапу.
    answer: коштів
    options:
    - коштів
    - кошти
    - коштами
    - коштам
    explanation: Бракувати керує родовим.
  - sentence: Після ____ суду компанія змінила правила.
    answer: рішення
    options:
    - рішення
    - рішенням
    - рішенню
    - рішенні
    explanation: Після керує родовим.
  - sentence: ____ прозорості команда оприлюднила методику.
    answer: Задля
    options:
    - Задля
    - Всупереч
    - Завдяки
    - Попри
    explanation: Задля керує родовим і називає мету.
  - sentence: У фразі «половина ____» потрібен родовий.
    answer: бюджету
    options:
    - бюджету
    - бюджет
    - бюджетом
    - бюджеті
    explanation: Кількісне слово «половина» потребує родового.
  - sentence: ____ одного пункту, пропозицію підтримали всі учасники.
    answer: Крім
    options:
    - Крім
    - Завдяки
    - Попри
    - Через
    explanation: Крім керує родовим.
  - sentence: Поблизу ____ відкрили тимчасовий пункт допомоги.
    answer: вокзалу
    options:
    - вокзалу
    - вокзал
    - вокзалом
    - вокзалі
    explanation: Поблизу керує родовим.
  - sentence: Не було ____ для повторного голосування.
    answer: підстав
    options:
    - підстав
    - підстави
    - підставами
    - підставах
    explanation: Після не було природний родовий множини.
  - sentence: Десять відсотків ____ спрямували на резерв.
    answer: доходу
    options:
    - доходу
    - дохід
    - доходом
    - доході
    explanation: Після відсотків залежний іменник стоїть у родовому.
- type: error-correction
  title: Редагування формального стилю
  instruction: Виправте помилку або зробіть фразу прозорішою.
  items:
  - sentence: Завдяки підтримки громади проєкт завершили.
    error: підтримки
    correction: підтримці
    options:
    - підтримці
    - підтримки
    - підтримкою
    - підтримку
    explanation: Завдяки керує давальним, не родовим.
  - sentence: Попри дощу зустріч відбулася.
    error: дощу
    correction: дощ
    options:
    - дощ
    - дощу
    - дощем
    - дощі
    explanation: 'Попри вимагає знахідного: попри дощ.'
  - sentence: З метою здійснення проведення перевірки документів комісія зібралася.
    error: здійснення проведення перевірки
    correction: щоб перевірити документи
    options:
    - щоб перевірити документи
    - здійснення проведення перевірки
    - задля здійснення здійснення
    - для документів перевіркою
    explanation: Формально правильну номіналізацію краще спростити.
  - sentence: Через затримки команда змінила графік.
    error: затримки
    correction: затримку
    options:
    - затримку
    - затримки
    - затримкою
    - затримці
    explanation: Через у причинному значенні керує знахідним.
  - sentence: У разі відсутність кворуму засідання перенесуть.
    error: відсутність
    correction: відсутності
    options:
    - відсутності
    - відсутність
    - відсутністю
    - відсутностям
    explanation: У разі керує родовим.
  - sentence: Комісія не знайшла підстави для скасування рішення.
    error: підстави
    correction: підстав
    options:
    - підстав
    - підстави
    - підставами
    - підставах
    explanation: У нейтральному запереченні природний родовий множини.
  - sentence: Поблизу центральний вхід відкрили пункт консультації.
    error: центральний вхід
