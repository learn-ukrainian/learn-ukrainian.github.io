        - text: "Комісія не знайшла докази порушення."
          correct: false
        - text: "У заяві немає посиланнями на джерела."
          correct: false
      explanation: "Заперечення й відсутність часто вимагають родового."
    - question: "Переклад англійського of без перевантаження."
      min_correct: 2
      options:
        - text: "Експерти обговорили план."
          correct: true
        - text: "Обговорення плану експертами тривало годину."
          correct: true
        - text: "Обговорення експертів плану тривало годину."
          correct: false
        - text: "План експертів обговорення тривав годину."
          correct: false
      explanation: "Іноді краще повернути дієслово або орудний виконавця."
    - question: "Форма прикметника в родовому."
