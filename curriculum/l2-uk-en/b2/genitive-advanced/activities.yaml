        - text: "Стіна з каменя описує матеріал без контексту."
          correct: false
      explanation: "Каменя - предмет; каменю - матеріал."
    - question: "Родовий після заперечення."
      min_correct: 2
      options:
        - text: "Комісія не знайшла доказів порушення."
          correct: true
        - text: "У заяві немає посилань на джерела."
