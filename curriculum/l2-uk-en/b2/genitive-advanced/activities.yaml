        - text: "За виняток одного пункту текст погодили."
          correct: false
      explanation: "Винятку є нормативною формою в абстрактному значенні."
    - question: "Конструкції з просторовими прийменниками."
      min_correct: 2
      options:
        - text: "Навколо офісу встановили огорожу."
          correct: true
        - text: "Поблизу вокзалу відкрили пункт допомоги."
          correct: true
        - text: "Уздовж річка проклали стежку."
          correct: false
        - text: "Посеред площа стояв намет."
          correct: false
      explanation: "Навколо, поблизу, уздовж і посеред потребують родового."
    - question: "Вибір між каменя й каменю."
      min_correct: 2
