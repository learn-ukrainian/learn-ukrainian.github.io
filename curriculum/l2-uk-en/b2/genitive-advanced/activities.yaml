- type: fill-in
  title: "Прийменники з родовим"
  instruction: "Заповніть пропуск прийменником або прийменниковою сполукою, що керує родовим."
  items:
    - sentence: "____ затримки фінансування підрядник переніс частину робіт."
      answer: "Унаслідок"
      options: ["Унаслідок", "Завдяки", "Згідно з", "Крізь"]
      explanation: "Унаслідок називає причину й керує родовим."
    - sentence: "____ відповіді він надіслав порожній файл."
      answer: "Замість"
      options: ["Замість", "Понад", "При", "Між"]
      explanation: "Замість показує заміну очікуваної дії."
    - sentence: "____ будинку встановили тимчасову огорожу."
      answer: "Навколо"
      options: ["Навколо", "Завдяки", "Відповідно до", "Передусім"]
      explanation: "Навколо керує родовим і позначає простір."
    - sentence: "____ застереження експертів, рішення не змінили."
      answer: "Попри"
      options: ["Попри", "Згідно з", "Над", "Поміж"]
      explanation: "Попри означає всупереч перешкоді."
    - sentence: "____ двох технічних правок, текст залишився без змін."
      answer: "За винятком"
      options: ["За винятком", "Завдяки", "Відповідно з", "Поруч"]
      explanation: "За винятком вводить виняток."
    - sentence: "____ результатів опитування команда змінить план."
      answer: "Залежно від"
      options: ["Залежно від", "Згідно з", "Наперекір із", "Завдяки до"]
      explanation: "Залежно від керує родовим і позначає умову."
    - sentence: "____ відсутності кворуму засідання перенесуть."
      answer: "У разі"
      options: ["У разі", "Завдяки", "При", "Попід"]
      explanation: "У разі вводить умову з родовим."
    - sentence: "____ обговорення комісія перевірила всі документи."
      answer: "Під час"
      options: ["Під час", "Після з", "Згідно", "Коло до"]
      explanation: "Під час керує родовим і задає часову рамку."
    - sentence: "____ площі стояв інформаційний намет."
      answer: "Посеред"
      options: ["Посеред", "Завдяки", "Відповідно", "Для з"]
      explanation: "Посеред позначає місце в середині простору."
    - sentence: "____ усіх пропозицій обрали найреалістичнішу."
      answer: "З-посеред"
      options: ["З-посеред", "Після до", "Над", "Згідно"]
      explanation: "З-посеред означає вибір із групи й керує родовим."

- type: fill-in
  title: "Закінчення -а/-я чи -у/-ю"
  instruction: "Виберіть форму родового однини, яка найкраще відповідає значенню."
  items:
    - sentence: "Сюжет цього ____ важливо пояснити без спрощення."
      answer: "міфу"
      options: ["міфу", "міфа", "міфом", "міфі"]
      explanation: "Міф як культурне поняття має форму міфу."
    - sentence: "Край ____ був гострий після розколу."
      answer: "каменя"
      options: ["каменя", "каменю", "камень", "каменем"]
      explanation: "Ідеться про конкретний камінь як предмет."
    - sentence: "Будинок із ____ зберіг прохолоду навіть улітку."
      answer: "каменю"
      options: ["каменю", "каменя", "камінь", "каменем"]
      explanation: "Ідеться про матеріал, тому каменю."
    - sentence: "Рішення ____ оприлюднили після засідання."
      answer: "університету"
      options: ["університету", "університета", "університетом", "університеті"]
      explanation: "Університет як установа має форму університету."
    - sentence: "Номер ____ внесли до реєстру."
      answer: "акта"
      options: ["акта", "акту", "актом", "акті"]
      explanation: "Акт як конкретний документ має форму акта."
    - sentence: "Сенс ____ підтримки був також практичним."
      answer: "акту"
      options: ["акту", "акта", "актом", "акті"]
      explanation: "Акт як дія або вчинок має форму акту."
    - sentence: "Без жодного ____ правило не буде універсальним."
      answer: "винятку"
      options: ["винятку", "винятка", "винятком", "винятці"]
      explanation: "Виняток як абстрактне правило має форму винятку."
    - sentence: "Делегація приїхала з центру ____."
      answer: "Києва"
      options: ["Києва", "Київу", "Києвом", "Києві"]
      explanation: "Назва міста Київ у родовому має форму Києва."
    - sentence: "Рівень ____ у залі заважав запису."
      answer: "шуму"
      options: ["шуму", "шума", "шумом", "шумі"]
      explanation: "Шум як явище або маса має форму шуму."
    - sentence: "Формулу ____ пояснили на дошці."
      answer: "синуса"
      options: ["синуса", "синусу", "синусом", "синусі"]
      explanation: "Математичний термін синус часто має форму синуса."

- type: select
  title: "Позначте природні родові конструкції"
  instruction: "Оберіть усі варіанти, які є граматично й семантично природними."
  items:
    - question: "Офіційний текст про затримку руху."
      min_correct: 2
      options:
        - text: "Унаслідок туману рух обмежили."
