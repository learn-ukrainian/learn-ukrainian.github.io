- id: workbook-4
  type: essay-response
  title: Короткий редакторський коментар
  instruction: 'Напишіть 150-180 слів про один родовий ланцюжок: поясніть ролі форм і запропонуйте прозорішу редакцію.'
  min_words: 150
  prompt: 'Виберіть фразу: «аналіз результатів опитування мешканців громади», «виконання рішення суду», «перевірка відповідності договору вимогам регламенту». Поясніть родові й відредагуйте фразу для нефахового читача.'
  model_answer: |-
    > [!model-answer]
    > У фразі «аналіз результатів опитування мешканців громади» є кілька шарів родового. Слово «результатів» є об'єктним родовим, бо аналізують саме результати. «Опитування» уточнює, яких результатів; це тематичний або об'єктний зв'язок із процесом. «Мешканців» називає учасників опитування, а «громади» уточнює, до якої спільноти вони належать. Для аналітичної довідки така стислість можлива. Для широкої аудиторії краще написати: «ми проаналізували відповіді мешканців громади в опитуванні». У цій редакції з'являється виконавець, дієслово і зрозумілий об'єкт. Родовий не зникає повністю, але перестає створювати довгий ланцюжок.
