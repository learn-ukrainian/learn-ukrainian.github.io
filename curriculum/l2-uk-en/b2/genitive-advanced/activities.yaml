- type: essay-response
  id: genitive-editorial-comment
  title: "Письмовий коментар: поясніть вибір родового"
  instruction: "Напишіть короткий редакторський коментар до речень із родовими конструкціями."
  prompt: >-
    Поясніть, як у фрагменті працюють родові конструкції: "Попри застереження
    експертів, комісія не знайшла доказів порушення процедури. За винятком
    двох технічних правок, рішення університету залишилося чинним." Назвіть
    щонайменше три функції родового й запропонуйте одну прозорішу дієслівну
    версію для надто щільної конструкції.
  min_words: 150
  model_answer: >-
    У цьому фрагменті родовий відмінок виконує кілька різних функцій. У
    конструкції "попри застереження експертів" прийменник "попри" керує
    родовим і передає допустове значення: застереження були перешкодою, але
    комісія попри це діяла. У словосполученні "застереження експертів" другий
    родовий уточнює, хто є джерелом застережень. У реченні "не знайшла доказів"
    родовий множини пов'язаний із запереченням і відсутністю категорії доказів.
    У фразі "порушення процедури" родовий називає об'єкт або сферу порушення.
    "За винятком двох технічних правок" поєднує прийменникову сполуку з
    кількісною групою, тому вся конструкція потребує родового. "Рішення
    університету" має родовий належності або джерела: університет ухвалив чи
    видав рішення. Якщо треба зробити текст прозорішим, можна написати:
    "Комісія врахувала застереження експертів, але не знайшла доказів того, що
    процедуру порушили."
  rubric:
    - criteria: "Семантичний аналіз"
      description: "Названо щонайменше три різні функції родового відмінка."
      points: 4
    - criteria: "Морфологічна точність"
      description: "Правильно пояснено форми після прийменників, заперечення й кількості."
      points: 3
    - criteria: "Редакторська прозорість"
      description: "Запропоновано природну дієслівну версію без втрати змісту."
      points: 3
