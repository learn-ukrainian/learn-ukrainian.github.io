version: '1.0'
module: idioms-animals
level: b2
inline:
- type: group-sort
  title: Домашні образи й оцінки
  instruction: Розподіліть вислови за домінантною оцінкою або дією.
  groups:
  - name: Праця і витривалість
    items:
    - працювати як віл
    - трудитися як бджілка
    - мурашина праця
  - name: Конфлікт і перешкода
    items:
    - жити як кіт із собакою
    - підкласти свиню
    - як собака на сіні
  - name: Розгубленість або впертість
    items:
    - як баран на нові ворота
    - упертий як баран
    - крутитися як вуж на сковорідці
  - name: Відмінність або байдужість
    items:
    - біла ворона
    - як з гуски вода
    - мухи не скривдить
- type: match-up
  title: Зоонім і значення
  instruction: Поєднайте ідіому з найточнішим переносним значенням.
  pairs:
  - left: хоч вовком вий
    right: бути у відчаї або безсиллі
  - left: лисицею підшитий
    right: хитрий і спритний у спілкуванні
  - left: ведмежа послуга
    right: допомога, яка шкодить
  - left: біла ворона
    right: людина, що помітно відрізняється
  - left: стріляний горобець
    right: досвідчена людина, яку важко обдурити
  - left: як з гуски вода
    right: критика або наслідки не впливають
  - left: крокодилячі сльози
    right: удаване співчуття
  - left: страусова політика
    right: уникання проблеми через удаване не-бачення
  - left: робити з мухи слона
    right: перебільшувати масштаб проблеми
  - left: пригріти змію на грудях
    right: допомогти тому, хто згодом зрадить
- type: fill-in
  title: Доберіть зооморфну ідіому
  instruction: Заповніть пропуски природними словами.
  items:
  - sentence: "Після невдалої допомоги всі назвали це ____ послугою."
    answer: ведмежою
    options:
    - ведмежою
    - гусячою
    - котячою
    - бджолиною
    explanation: '"Ведмежа послуга" - допомога, що завдала шкоди.'
  - sentence: "Він досвідчений перемовник, справжній ____ горобець."
    answer: стріляний
    options:
    - стріляний
    - білий
    - сонний
    - водяний
    explanation: '"Стріляний горобець" означає досвідчену людину.'
  - sentence: "Не треба робити з ____ слона через одну помилку."
    answer: мухи
    options:
    - мухи
    - вовка
    - кота
    - коня
    explanation: Ідіома описує перебільшення.
  - sentence: "Після критики з нього як з ____ вода."
    answer: гуски
    options:
    - гуски
    - лисиці
    - бджоли
    - змії
    explanation: Вислів означає байдужість до зауважень.
  - sentence: "У новій групі вона почувалася як біла ____."
    answer: ворона
    options:
    - ворона
    - корова
    - мураха
    - жаба
    explanation: '"Біла ворона" - людина, що виділяється.'
  - sentence: "Коли він приховав документи, колеги сказали, що він підклав ____."
    answer: свиню
    options:
    - свиню
    - горобця
    - слона
    - бджолу
    explanation: Вислів означає навмисно створити неприємність.
  - sentence: "У цій ситуації він крутиться як ____ на сковорідці."
    answer: вуж
    options:
    - вуж
    - віл
    - півень
    - гуска
    explanation: Ідіома описує ухиляння й спробу викрутитися.
  - sentence: "Його ____ давить, бо сусід отримав грант."
    answer: жаба
    options:
    - жаба
    - бджола
    - кішка
    - ворона
    explanation: Розмовний вислів про заздрість або жадібність.
  - sentence: "Вона працює як ____, але керівник має помітити ризик перевтоми."
    answer: віл
    options:
    - віл
    - слон
    - заєць
    - кіт
    explanation: Вислів підкреслює важку витривалу працю.
  - sentence: "Політик демонстрував ____ сльози після критики."
    answer: крокодилячі
    options:
    - крокодилячі
    - мурашині
    - собачі
    - гусячі
    explanation: '"Крокодилячі сльози" означають удаване співчуття.'
- id: act-4
  type: critical-analysis
  title: Ярлик чи точний опис?
  target_text: "У чаті написали: «Олег лисицею підшитий, тому знову всіх обвів навколо пальця». У службовому звіті цю фразу переписали так: «Олег використав двозначне формулювання угоди, щоб змінити термін виконання без погодження команди»."
  questions:
  - Яку оцінку створює зооморфна ідіома?
  - Чому службова редакція точніша?
  - У якому жанрі можна залишити образ лисиці?
  model_answers:
  - "Ідіома створює образ хитрої людини й одразу задає негативну оцінку."
  - "Службова редакція називає конкретну дію: використання двозначного формулювання та зміну терміну без погодження."
  - "Образ лисиці можна залишити в художньому діалозі, колонці або усній скарзі, але не як єдиний доказ у звіті."
- id: act-5
  type: essay-response
  title: Зооморфна ідіома без стереотипу
  instruction: Напишіть 150-180 слів про одну зооморфну ідіому, пояснивши образ, значення, регістр і етичний ризик.
  prompt: Оберіть вислів із домашньою твариною, диким звіром, птахом, комахою або екзотичною твариною. Додайте нейтральну редакцію для формального жанру.
  min_words: 150
  model_answer: >-
    > [!model-answer]
    > Вислів **робити з мухи слона** описує перебільшення: маленька проблема подається як велика загроза. У розмові він може швидко зупинити паніку: "Не робімо з мухи слона, перевіримо два рядки". У публіцистиці він створює критику автора, який драматизує подію. У формальному звіті краще написати нейтрально: "ризик локальний і стосується двох рядків таблиці". Етичний ризик у тому, що ідіома може знецінити реальну тривогу. Тому після неї треба пояснити масштаб проблеми й показати, чому реакція надмірна.
  rubric:
  - criteria: Образ і значення
    description: Пояснено зоонім та переносне значення.
    points: 3
  - criteria: Регістр
    description: Є розмовний або публіцистичний контекст і нейтральна редакція.
    points: 3
  - criteria: Етика
    description: Названо ризик ярлика або знецінення.
    points: 2
  - criteria: Мова
    description: Текст зв'язний і природний.
    points: 2
workbook:
- type: match-up
  title: Доречний контекст
  instruction: Поєднайте ідіому з ситуацією, де вона найприродніша.
  pairs:
  - left: як кіт із собакою
    right: сусіди постійно сваряться через спільний двір
  - left: як собака на сіні
    right: власник не користується ресурсом і не дає іншим
  - left: працювати як віл
    right: команда тягне надмірне навантаження
  - left: біла ворона
    right: студентка має позицію, що різко відрізняється від групи
  - left: ведмежа послуга
    right: друг хотів допомогти, але зіпсував домовленість
  - left: робити з мухи слона
    right: автор перебільшує наслідки дрібної помилки
  - left: пригріти змію на грудях
    right: людина допомогла тому, хто згодом її зрадив
  - left: жаба давить
    right: мовець заздрить чужому успіху
  - left: страусова політика
    right: керівництво вдає, що проблеми не існує
  - left: крокодилячі сльози
    right: публічна жалість виглядає нещирою
- type: group-sort
  title: Сила оцінки
  instruction: Розподіліть ідіоми за силою оцінного тону.
  groups:
  - name: Переважно позитивні або підтримувальні
    items:
    - трудитися як бджілка
    - мурашина праця
    - стріляний горобець
  - name: Контекстно нейтральні
    items:
    - біла ворона
    - як вільний птах
    - як білка в колесі
  - name: Різко негативні
    items:
    - підкласти свиню
    - пригріти змію на грудях
    - крокодилячі сльози
  - name: Жартівливо-розмовні
    items:
    - жаба давить
    - робити з мухи слона
    - як з гуски вода
- type: fill-in
  title: Зооморфні формули
  instruction: Заповніть пропуски правильними компонентами ідіом.
  items:
  - sentence: "Він не новачок, а ____ горобець."
    answer: стріляний
    options:
    - стріляний
    - білий
    - ведмежий
    - мурашиний
    explanation: '"Стріляний горобець" - досвідчена людина.'
  - sentence: "Їхня допомога стала ____ послугою."
    answer: ведмежою
    options:
    - ведмежою
    - котячою
    - вовчою
    - жаб'ячою
    explanation: '"Ведмежа послуга" шкодить, хоча задумана як допомога.'
  - sentence: "Автор зробив із ____ слона."
    answer: мухи
    options:
    - мухи
    - лисиці
    - коня
    - гуски
    explanation: Ідіома описує перебільшення.
  - sentence: "Після всіх зауважень з нього як з ____ вода."
    answer: гуски
    options:
    - гуски
    - бджоли
    - вовка
    - барана
    explanation: Вислів означає, що критика не впливає.
  - sentence: "Не хочу бути собакою на ____."
    answer: сіні
    options:
    - сіні
    - воді
    - колесі
    - грудях
    explanation: Вислів засуджує утримування непотрібного ресурсу.
  - sentence: "Після такого рішення хоч ____ вий."
    answer: вовком
    options:
    - вовком
    - котом
    - слоном
    - півнем
    explanation: '"Хоч вовком вий" передає відчай.'
  - sentence: "Він знову крутиться як ____ на сковорідці."
    answer: вуж
    options:
    - вуж
    - віл
    - ворона
    - мураха
    explanation: Ідіома описує ухиляння.
  - sentence: "Це були ____ сльози, а не справжнє співчуття."
    answer: крокодилячі
    options:
    - крокодилячі
    - мурашині
    - білі
    - вовчі
    explanation: Вислів означає удаване співчуття.
  - sentence: "Політика мовчання стала ____ політикою."
    answer: страусовою
    options:
    - страусовою
    - котячою
    - бджолиною
    - баранячою
    explanation: '"Страусова політика" означає уникання проблеми.'
  - sentence: "Після переїзду вона почувалася білою ____."
    answer: вороною
    options:
    - вороною
    - змією
    - мухою
    - бджолою
    explanation: '"Біла ворона" - людина, що виділяється.'
- id: wb-critical-animals
  type: critical-analysis
  title: Перепишіть ярлик
  target_text: "У відгуку на стажера написали: «Він як баран на нові ворота дивиться на бюджет». Інший варіант: «Стажер поки що не розуміє структуру бюджету й потребує прикладу з поясненням категорій»."
  questions:
  - Який варіант принижує людину?
  - Чому другий варіант корисніший для навчання?
  - Як зберегти точність без зооморфного ярлика?
  model_answers:
  - "Перший варіант принижує, бо порівнює людину з бараном і висміює нерозуміння."
  - "Другий варіант називає конкретну прогалину та спосіб допомоги: приклад із категоріями бюджету."
  - "Точність зберігається через опис поведінки або навички, а не через образ тварини."
- id: wb-essay-animal
  type: essay-response
  title: Від ідіоми до редакції
  instruction: Напишіть 150-180 слів, де одна зооморфна ідіома спочатку працює в живому тексті, а потім замінюється нейтральним описом.
  prompt: Покажіть, що змінюється в тоні, коли ідіому замінити фактом.
  min_words: 150
  model_answer: >-
    > [!model-answer]
    > У розмові після невдалого релізу хтось може сказати: **"Ми зробили з мухи слона"**. Це звучить природно, якщо команда справді перебільшила одну дрібну помилку. Але у звіті потрібна точність: **"помилка стосувалася двох рядків таблиці й не вплинула на фінальний розрахунок"**. Ідіома передає емоційне роздратування через надмірну реакцію, а нейтральний опис пояснює масштаб. Якщо залишити тільки ідіому, читач не дізнається, чому проблема мала. Якщо залишити тільки сухий факт, може зникнути оцінка поведінки. Найкращий варіант - поєднати їх: спершу назвати емоційну рамку, потім довести її даними.
  rubric:
  - criteria: Ідіома
    description: Обрано доречний зооморфний вислів.
    points: 3
  - criteria: Нейтральна редакція
    description: Є точний безобразний варіант.
    points: 3
  - criteria: Порівняння тону
    description: Пояснено різницю між ідіомою і фактом.
    points: 4
