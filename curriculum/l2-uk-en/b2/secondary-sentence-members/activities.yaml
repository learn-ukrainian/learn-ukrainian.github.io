version: '1.0'
module: secondary-sentence-members
level: b2
inline:
- type: mark-the-words
  title: Означення в реченні
  instruction: Виділіть слова або групи слів, які уточнюють іменник, а не дію.
  text: "Після громадського обговорення міська комісія затвердила **оновлену** програму **модернізації бібліотек**. Учасники
    підтримали **план відновлення** ідеї **відкритої освіти**."
  answers:
  - "оновлену"
  - "модернізації бібліотек"
  - "план відновлення"
  - "відкритої освіти"
- type: select
  title: Додаток чи означення
  instruction: Визначте, де залежна частина є додатком, а де лише уточнює іменник.
  items:
  - question: Де родовий відмінок працює як неузгоджене означення?
    min_correct: 3
    options:
    - text: "план розвитку"
      correct: true
    - text: "центр громади"
      correct: true
    - text: "право голосу"
      correct: true
    - text: "потребує розвитку"
      correct: false
    - text: "не знайшов відповіді"
      correct: false
    explanation: Якщо форма залежить від іменника і уточнює предмет, це означення.
  - question: Де залежна частина є додатком?
    min_correct: 3
    options:
    - text: "перевірити дані"
      correct: true
    - text: "дякувати колезі"
      correct: true
    - text: "говорити про бюджет"
      correct: true
    - text: "будинок біля парку"
      correct: false
    - text: "кава по-львівськи"
      correct: false
    explanation: Додаток залежить від дії або стану й називає об'єкт, адресата чи тему.
  - question: Де прийменникова конструкція є обставиною?
    min_correct: 2
    options:
    - text: "зустрілися біля парку"
      correct: true
    - text: "після лекції обговорили план"
      correct: true
    - text: "будинок біля парку"
      correct: false
    - text: "говорили про план"
      correct: false
    - text: "право на освіту"
      correct: false
    explanation: Обставина задає рамку дії, а не характеристику предмета чи тему мовлення.
  - question: Де інфінітив уточнює іменник?
    min_correct: 2
    options:
    - text: "бажання перемогти"
      correct: true
    - text: "право голосувати"
      correct: true
    - text: "треба перевірити"
      correct: false
    - text: "прийшов уточнити"
      correct: false
    - text: "запропонував обговорити"
      correct: false
    explanation: Інфінітив при іменнику може працювати як неузгоджене означення.
  - question: Де залежна форма при іменнику називає ознаку предмета?
    min_correct: 3
    options:
    - text: звіт комісії
      correct: true
    - text: дорога до школи
      correct: true
    - text: готовність працювати
      correct: true
    - text: пояснити комісії
      correct: false
    - text: рухатися до школи
      correct: false
    explanation: Залежність від іменника створює означення, навіть якщо форма схожа на додаток або обставину.
  - question: Де залежна частина називає адресата або предмет дії?
    min_correct: 3
    options:
    - text: надіслати колегам
      correct: true
    - text: обговорити звіт
      correct: true
    - text: керувати відділом
      correct: true
    - text: звіт колег
      correct: false
    - text: увечері обговорити
      correct: false
    explanation: Додаток керується дієсловом або предикативним словом і входить до ситуації дії.
  - question: Де однакова форма біля парку має різну роль?
    min_correct: 2
    options:
    - text: будинок біля парку - означення
      correct: true
    - text: зустрілися біля парку - обставина місця
      correct: true
    - text: будинок біля парку - прямий додаток
      correct: false
    - text: зустрілися біля парку - узгоджене означення
      correct: false
    - text: біля парку завжди однакова роль
      correct: false
    explanation: 'Синтаксична роль залежить від центру: іменник робить означення, дієслово - обставину.'
  - question: Де залежна частина змінює комунікативний фокус речення?
    min_correct: 2
    options:
    - text: Статтю перевірили після засідання.
      correct: true
    - text: Статтю для засідання перевірили.
      correct: true
    - text: Статтю і звіт перевірили.
      correct: false
    - text: Перевірили.
      correct: false
    - text: Стаття перевірена.
      correct: false
    explanation: Додавання обставини або означення по-різному розподіляє увагу між дією, предметом і рамкою ситуації.
- type: fill-in
  title: Розширення речення за роллю
  instruction: Доповніть речення залежною частиною потрібного типу.
  items:
  - sentence: "Додайте узгоджене означення: Комісія затвердила ____ програму."
    answer: "оновлену"
    options: ["оновлену", "для студентів", "після засідання", "програму"]
    explanation: Оновлену узгоджується зі словом програму.
  - sentence: "Додайте неузгоджене означення: Комісія затвердила програму ____."
    answer: "модернізації бібліотек"
    options: ["модернізації бібліотек", "швидко", "вчора", "підписала"]
    explanation: Модернізації бібліотек уточнює іменник програму.
  - sentence: "Додайте прямий додаток: Редактор перевірив ____."
    answer: "текст"
    options: ["текст", "уважно", "після лекції", "новий"]
    explanation: Текст є предметом дії перевірив.
  - sentence: "Додайте обставину способу дії: Студенти відповідали ____."
    answer: "упевнено"
    options: ["упевнено", "викладачеві", "відповідь", "плану"]
    explanation: Упевнено пояснює, як виконувалася дія.
  - sentence: "Додайте обставину мети: Команда зібралася ____."
    answer: "для перевірки даних"
    options: ["для перевірки даних", "дані", "нову", "команді"]
    explanation: Для перевірки даних пояснює мету зібрання.
  - sentence: 'Додайте непрямий додаток: Комісія довіряє ____.'
    answer: експертам
    options: [експертам, обережно, після звіту, експертний]
    explanation: Експертам є адресатом довіри й залежить від присудка.
  - sentence: 'Додайте обставину часу: Обговорення тривало ____.'
    answer: після перерви
    options: [після перерви, пропозицію, відкриту, команді]
    explanation: Після перерви задає часову рамку дії.
  - sentence: 'Додайте обставину місця: Архів зберігає копії ____.'
    answer: у центральній залі
    options: [у центральній залі, копії, докладні, читачам]
    explanation: У центральній залі уточнює місце зберігання.
  - sentence: 'Додайте прикладку: Дослідниця, ____, представила нову статтю.'
    answer: мовознавиця
    options: [мовознавиця, уважно, після лекції, статтю]
    explanation: Мовознавиця називає ту саму особу іншою назвою й працює як прикладка.
  - sentence: 'Додайте обставину причини: Засідання перенесли ____.'
    answer: через відсутність кворуму
    options: [через відсутність кворуму, рішення, головний, учасникам]
    explanation: Через відсутність кворуму пояснює причину перенесення.
- type: group-sort
  title: Роль інфінітива
  instruction: Розподіліть речення за роллю інфінітива.
  groups:
  - name: Частина присудка
    items:
    - "Нам треба перевірити дані."
    - "Він може пояснити правило."
    - "Команда почала обговорювати план."
  - name: Додаток або зміст дії
    items:
    - "Комісія запропонувала переглянути графік."
    - "Студент навчився розрізняти ролі."
    - "Редактор попросив уточнити джерело."
  - name: Означення при іменнику
    items:
    - "Право голосувати мають усі учасники."
    - "Бажання перемогти допомогло команді."
    - "Потреба пояснити правило лишилася."
  - name: Обставина мети
    items:
    - "Студент прийшов уточнити питання."
    - "Команда зібралася обговорити бюджет."
    - "Ми зайшли перевірити розклад."
- type: error-correction
  title: Пунктуація і перевантаження
  instruction: Виправте речення так, щоб другорядні члени працювали прозоро.
  items:
  - sentence: "Заява підготовлена робочою групою надійшла вчасно."
    error: "Заява підготовлена робочою групою"
    correction: "Заява, підготовлена робочою групою, надійшла вчасно."
    options: ["Заява, підготовлена робочою групою, надійшла вчасно.", "Заява підготовлена, робочою групою надійшла вчасно.",
      "Заява підготовлена робочою, групою надійшла вчасно.", "Підготовлена заява групою надійшла робочою."]
    explanation: Поширене означення після означуваного слова треба відокремити.
  - sentence: "Повертаючись із консультації, висновок був переписаний студентом."
    error: "Повертаючись із консультації, висновок був переписаний"
    correction: "Повертаючись із консультації, студент переписав висновок."
    options: ["Повертаючись із консультації, студент переписав висновок.", "Повертаючись із консультації, висновок переписав
        студента.", "Повертаючись із консультації, висновок був студент.", "Висновком студент був консультації."]
    explanation: Дієприслівниковий зворот потребує спільного виконавця.
  - sentence: "План реалізації програми розвитку системи підтримки студентів громади був затверджений."
    error: "План реалізації програми розвитку системи підтримки студентів громади був затверджений."
    correction: "Громада затвердила програму підтримки студентів. Окремий план описує її реалізацію."
    options: ["Громада затвердила програму підтримки студентів. Окремий план описує її реалізацію.", "План програми системи
        студентів громади був.", "Реалізації підтримки був затверджений студентів.", "Студентів громади був план."]
    explanation: Довгий іменниковий ланцюг краще розподілити на два речення.
  - sentence: "Студенти з Харкова які подали заявки отримали листи."
    error: "які подали заявки"
    correction: "Студенти з Харкова, які подали заявки, отримали листи."
    options: ["Студенти з Харкова, які подали заявки, отримали листи.", "Студенти, з Харкова які подали, заявки отримали листи.",
      "Студенти з Харкова які, подали заявки отримали, листи.", "Подали студенти листи які."]
    explanation: Означальне уточнення потрібно відокремити, щоб показати межі групи.
  - sentence: "Ми говорили після бюджет."
    error: "після бюджет"
    correction: "Ми говорили про бюджет після лекції."
    options: ["про бюджет після лекції", "після бюджет", "бюджетом після", "у бюджет"]
    explanation: Треба розрізнити додаток-тему і обставину часу.
  - sentence: "Будинок біля парку зустрілися о восьмій."
    error: "Будинок біля парку зустрілися"
    correction: "Ми зустрілися біля будинку біля парку о восьмій."
    options: ["Ми зустрілися біля будинку біля парку о восьмій.", "Будинок біля парку зустрілися о восьмій.", "Біля парку
        будинок зустрівся нами.", "Зустрічний будинок."]
    explanation: Будинок біля парку є іменниковою групою, а місце дії треба оформити окремо.
  - sentence: "Право голосувати студенти пояснили після."
    error: "після"
    correction: "Студенти пояснили право голосувати після консультації."
    options: ["після консультації", "після", "консультацію право", "голосувати після"]
    explanation: Обставина часу має бути повною й прикріпленою до дії.
  - sentence: "Тренерка Олена, пояснила вправу."
    error: "Тренерка Олена,"
    correction: "Тренерка Олена пояснила вправу."
    options: ["Тренерка Олена пояснила вправу.", "Тренерка Олена, пояснила вправу.", "Тренерка, Олена пояснила вправу.", "Олена
        пояснила тренерка."]
    explanation: Тісна прикладка без додаткового уточнення не потребує коми.
workbook:
- id: wb-reading-roles
  type: reading
  title: "Читання: розгорнуте речення"
  instruction: Прочитайте уривок і визначте роль залежних частин.
  source: "Навчальний уривок для модуля B2."
  text: >-
    Після громадського обговорення міська комісія затвердила оновлену програму модернізації бібліотек. Документ для директорів
    шкіл містить графік консультацій, умови участі й право подати пропозиції до п'ятниці. Учасники говорили про бюджет уважно,
    але без зайвих емоцій.
  tasks:
  - "Знайдіть два означення."
  - "Знайдіть два додатки."
  - "Знайдіть дві обставини."
  - "Поясніть роль інфінітива подати."
- type: match-up
  title: Роль залежної частини
  instruction: Зіставте фрагмент із його синтаксичною роллю.
  pairs:
  - left: "оновлену програму"
    right: "узгоджене означення"
  - left: "програма модернізації"
    right: "неузгоджене означення"
  - left: "перевірити дані"
    right: "прямий додаток у дієслівній конструкції"
  - left: "дякувати колегам"
    right: "непрямий додаток"
  - left: "після консультації"
    right: "обставина часу"
  - left: "для перевірки"
    right: "обставина мети"
  - left: "журнал \"Критика\""
    right: "прикладка-назва"
  - left: "говорили про бюджет"
    right: "непрямий додаток, тема мовлення"
  - left: "працювали уважно"
    right: "обставина способу дії"
  - left: "право голосувати"
    right: "неузгоджене означення з інфінітивом"
- type: fill-in
  title: Доберіть роль до контексту
  instruction: Виберіть форму, яка виконує потрібну синтаксичну роль.
  items:
  - sentence: "Неузгоджене означення: Розклад ____ змінився."
    answer: "занять"
    options: ["занять", "швидко", "після обіду", "студентам"]
    explanation: Занять уточнює іменник розклад.
  - sentence: "Непрямий додаток: Волонтери допомогли ____."
    answer: "учасникам"
    options: ["учасникам", "уважно", "після лекції", "новий"]
    explanation: Учасникам є адресатом допомоги.
  - sentence: "Обставина причини: Матч перенесли ____."
    answer: "через негоду"
    options: ["через негоду", "квитки", "новий", "команді"]
    explanation: Через негоду пояснює причину.
  - sentence: "Прикладка: Тренерка ____ пояснила вправу."
    answer: "Олена"
    options: ["Олена", "уважно", "після тренування", "перемогу"]
    explanation: Олена конкретизує особу тренерки.
  - sentence: "Обставина часу: Комісія зустрілася ____."
    answer: "після лекції"
    options: ["після лекції", "нову програму", "студентам", "корисна"]
    explanation: Після лекції задає час дії.
  - sentence: "Прямий додаток: Команда обговорила ____."
    answer: "бюджет"
    options: ["бюджет", "після лекції", "уважно", "новий"]
    explanation: Бюджет є предметом дії обговорила.
  - sentence: "Неузгоджене означення: Право ____ треба пояснити."
    answer: "голосу"
    options: ["голосу", "уважно", "після", "студентам"]
    explanation: Голосу уточнює іменник право.
  - sentence: "Обставина мети: Вони прийшли ____."
    answer: "уточнити графік"
    options: ["уточнити графік", "графік", "новий", "учасникам"]
    explanation: Інфінітивна група пояснює мету приходу.
  - sentence: "Обставина способу: Студенти відповідали ____."
    answer: "упевнено"
    options: ["упевнено", "відповідь", "студентам", "нова"]
    explanation: Упевнено пояснює спосіб дії.
  - sentence: "Додаток-тема: Вони говорили ____."
    answer: "про графік"
    options: ["про графік", "після лекції", "уважно", "новий"]
    explanation: Про графік називає тему мовлення.
- type: error-correction
  title: Редакторська правка другорядних членів
  instruction: Виправте речення й поясніть, яка роль була нечіткою.
  items:
  - sentence: "Редактор перевірив план підтримки студентів із викладачем і основного курсу."
    error: "із викладачем і основного курсу"
    correction: "Редактор із викладачем перевірив план підтримки студентів основного курсу."
    options: ["Редактор із викладачем перевірив план підтримки студентів основного курсу.", "Редактор перевірив із планом
        викладача студентів.", "Підтримки редактор перевірив викладачем.", "Редактор основного курсу із планом перевірив."]
    explanation: Треба розрізнити супровід дії та означення до студентів.
  - sentence: "Після лекції про бюджет було говорено студентами."
