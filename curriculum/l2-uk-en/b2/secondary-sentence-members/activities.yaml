- type: essay-response
  id: secondary-members-editing-note
  title: 'Письмо: поширення і скорочення речення'
  instruction: Напиши короткий редакторський коментар українською.
  prompt: 'Візьми речення «Команда обговорила план» і створи дві версії: 1) докладну офіційну версію з означеннями, додатками й обставинами; 2) стислу новинну версію. Поясни, які другорядні члени ти додав або прибрав і чому.'
  min_words: 170
  model_answer: 'Офіційна версія: Після вечірнього тренування юніорська команда «Сокіл» у роздягальні спокійно обговорила план відновлення гравців із новим лікарем-реабілітологом. Тут означення «вечірнього», «юніорська», «новим» уточнюють предмети й учасників, прикладка «Сокіл» називає команду, додаток «план» є прямим об’єктом дії, а «відновлення гравців» звужує зміст плану. Обставини «після тренування», «у роздягальні» й «спокійно» задають час, місце та спосіб розмови. Новинна версія: Команда «Сокіл» обговорила план відновлення після тренування. У ній лишилися тільки ті другорядні члени, які потрібні для розуміння події: назва команди, предмет обговорення й час. Я прибрав місце, спосіб і спеціаліста, бо для короткого повідомлення ці деталі другорядні. У протоколі їх варто зберегти, а в новині краще не перевантажувати перше речення.'
  rubric:
  - criteria: Синтаксичний аналіз
    description: Учень правильно називає означення, додатки, обставини та прикладку.
    points: 4
  - criteria: Редакторське рішення
    description: Учень пояснює, чому докладна й стисла версії потребують різної кількості деталей.
    points: 4
  - criteria: Українська природність
    description: Текст звучить природно, без калькованого керування й зайвого канцеляриту.
    points: 4
