version: '1.0'
module: secondary-sentence-members
level: b2
inline: []
workbook:
- type: match-up
  title: Синтаксична роль залежної частини
  instruction: Зістав конструкцію з типом другорядного члена.
  pairs:
  - left: оновлений стадіон
    right: узгоджене означення
  - left: центр міста
    right: неузгоджене означення
  - left: тренерка Олена
    right: прикладка
  - left: подали заявку
    right: прямий додаток
  - left: дякували команді
    right: непрямий додаток
  - left: зустрілися після фіналу
    right: обставина часу
  - left: тренувалися на стадіоні
    right: обставина місця
  - left: працювали для перемоги
    right: обставина мети
  - left: через негоду матч перенесли
    right: обставина причини
  - left: попри втому команда грала
    right: обставина допусту
  - left: за наявності квитка зайдіть
    right: обставина умови
  - left: відповідали по черзі
    right: обставина способу дії
- type: select
  title: Означення чи додаток
  instruction: Познач усі варіанти, де виділена частина є означенням.
  items:
  - question: Де залежна частина уточнює іменник, а не дію?
    min_correct: 3
    options:
    - text: аналіз результатів
      correct: true
    - text: потребує результатів
      correct: false
    - text: програма відновлення
      correct: true
    - text: чекали відновлення
      correct: false
    - text: право голосу
      correct: true
    explanation: Означення залежить від іменника й уточнює предмет.
  - question: У яких сполуках є узгоджене означення?
    min_correct: 3
    options:
    - text: уважний редактор
      correct: true
    - text: нова програма
      correct: true
    - text: рішення комісії
      correct: false
    - text: другий етап
      correct: true
    - text: робота над планом
      correct: false
    explanation: Узгоджене означення змінюється разом із головним словом.
  - question: Де є неузгоджене означення?
    min_correct: 3
    options:
    - text: графік тренувань
      correct: true
    - text: теплий вечір
      correct: false
    - text: будинок біля парку
      correct: true
    - text: бажання перемогти
      correct: true
    - text: команда працює
      correct: false
    explanation: Неузгоджене означення може бути іменниковою, прийменниковою або інфінітивною конструкцією.
  - question: Де виділена логіка відповідає прикладці?
    min_correct: 2
    options:
    - text: місто Львів
      correct: true
    - text: швидко відповіли
      correct: false
    - text: лікар-реабілітолог
      correct: true
    - text: після тренування
      correct: false
    - text: допомогли команді
      correct: false
    explanation: Прикладка дає предмету другу назву.
  - question: Де родовий відмінок НЕ робить слово автоматично додатком?
    min_correct: 2
    options:
    - text: план розвитку
      correct: true
    - text: не знайшов відповіді
      correct: false
    - text: центр громади
      correct: true
    - text: потребує підтримки
      correct: false
    - text: випив води
      correct: false
    explanation: У фразах із головним іменником родовий часто є неузгодженим означенням.
  - question: Де залежна частина називає об'єкт мовлення?
    min_correct: 2
    options:
    - text: говорили про бюджет
      correct: true
    - text: говорили після засідання
      correct: false
    - text: сперечалися щодо правил
      correct: true
    - text: сперечалися ввечері
      correct: false
    - text: відповідали спокійно
      correct: false
    explanation: Тема мовлення є непрямим додатком, а не обставиною.
  - question: Де залежна частина є додатком, а не означенням?
    min_correct: 2
    options:
    - text: потребували підтримки
      correct: true
    - text: дякували волонтерам
      correct: true
    - text: план підтримки
      correct: false
    - text: команда волонтерів
      correct: false
    - text: право вибору
      correct: false
    explanation: Додаток залежить від дії, стану або керування, а не просто уточнює іменник.
  - question: Де залежна частина є означенням, а не додатком?
    min_correct: 2
    options:
    - text: графік тренувань
      correct: true
    - text: рішення комісії
      correct: true
    - text: допомогли учасникам
      correct: false
    - text: обговорили правила
      correct: false
    - text: пишалися командою
      correct: false
    explanation: Неузгоджене означення уточнює іменник усередині словосполучення.
- type: fill-in
  title: Керування і точність
  instruction: Заповни пропуск формою, яка відповідає українській моделі керування.
  items:
  - sentence: Редактор дякував ____ за уважні зауваги.
    answer: авторові
    options: [авторові, автора, автором, автор]
    explanation: Дякувати кому? — давальний відмінок.
  - sentence: Команда потребувала ____ перед фіналом.
    answer: підтримки
    options: [підтримки, підтримку, підтримкою, підтримка]
    explanation: Потребувати чого? — родовий відмінок.
  - sentence: Учасники пишалися ____ після змагання.
    answer: результатом
    options: [результатом, результату, результат, результаті]
    explanation: Пишатися ким? чим? — орудний відмінок.
  - sentence: Ми говорили ____ зміну графіка.
    answer: про
    options: [про, після, завдяки, попри]
    explanation: Тема мовлення оформлюється прийменником про.
  - sentence: Тренер піклувався ____ відновлення спортсменів.
    answer: про
    options: [про, за, над, під]
    explanation: Піклуватися про кого? про що?
  - sentence: Організатори працювали ____ новим маршрутом.
    answer: над
    options: [над, через, без, попри]
    explanation: Працювати над чим?
  - sentence: Волонтери допомогли ____ під час реєстрації.
    answer: учасникам
    options: [учасникам, учасників, учасниками, учасники]
    explanation: Допомагати кому? — давальний відмінок.
  - sentence: Журналістка запитала ____ причину затримки.
    answer: про
    options: [про, після, для, між]
    explanation: Запитати про що?
  - sentence: Комісія запобігла ____ в документах.
    answer: помилці
    options: [помилці, помилку, помилкою, помилка]
    explanation: Запобігати чому? — давальний відмінок.
  - sentence: Автор навчився ____ джерела уважніше.
    answer: перевіряти
    options: [перевіряти, перевірка, перевірений, перевірив]
    explanation: Інфінітив називає зміст навички.
- type: mark-the-words
  title: Познач означення
  instruction: Клацни всі слова або словосполучення, які виконують роль означення.
  text: Оновлений міський стадіон біля парку відкрили після реконструкції. Тренерка Олена показала план відновлення команди й право кожного учасника на безпечне тренування.
  answers:
  - Оновлений
  - міський
  - біля парку
  - Олена
  - відновлення
  - команди
  - кожного
  - на безпечне тренування
- type: error-correction
  title: Виправ керування
  instruction: Знайди помилкову форму й обери нормативне виправлення.
  items:
  - sentence: Редактор дякував автора за точні покликання.
    error: автора
    answer: авторові
    options: [авторові, автором, автор, автори]
    explanation: Дякувати кому? — авторові.
  - sentence: Команда потребувала підтримку перед фіналом.
    error: підтримку
    answer: підтримки
    options: [підтримки, підтримкою, підтримка, підтримці]
    explanation: Потребувати чого? — підтримки.
  - sentence: Учасники пишалися результату після турніру.
    error: результату
    answer: результатом
    options: [результатом, результат, результаті, результати]
    explanation: Пишатися ким? чим? — результатом.
  - sentence: Ми говорили після бюджет на зустрічі.
    error: після бюджет
    answer: про бюджет
    error_type: phrase
    options: [про бюджет, бюджетом, для бюджету, без бюджету]
    explanation: Тема мовлення оформлюється як додаток із прийменником про.
  - sentence: Організатори працювали через новим маршрутом.
    error: через новим маршрутом
    answer: над новим маршрутом
    error_type: phrase
    options: [над новим маршрутом, новий маршрут, у новому маршруті, перед новим маршрутом]
    explanation: Працювати над чим? — над маршрутом.
  - sentence: Комісія запобігла помилку в протоколі.
    error: помилку
    answer: помилці
    options: [помилці, помилкою, помилка, помилки]
    explanation: Запобігати чому? — помилці.
  - sentence: Тренер піклувався за відновлення команди.
    error: за відновлення
    answer: про відновлення
    error_type: phrase
    options: [про відновлення, відновленням, після відновлення, у відновленні]
    explanation: Піклуватися про що? — про відновлення.
  - sentence: Волонтери допомогли учасників біля входу.
    error: учасників
    answer: учасникам
    options: [учасникам, учасниками, учасники, учасника]
    explanation: Допомагати кому? — учасникам.
- type: select
  title: Обставина чи додаток
  instruction: Познач усі варіанти, де залежна частина є обставиною.
  items:
  - question: Де конструкція називає час події?
    min_correct: 2
    options:
    - text: після тренування команда відпочила
      correct: true
    - text: говорили про тренування
      correct: false
    - text: до фіналу залишився тиждень
      correct: true
    - text: потребували тренування
      correct: false
    - text: план тренування змінили
      correct: false
    explanation: Часова рамка є обставиною.
  - question: Де конструкція називає місце?
    min_correct: 2
    options:
    - text: на стадіоні чекали вболівальники
      correct: true
    - text: говорили про стадіон
      correct: false
    - text: біля входу стояли волонтери
      correct: true
    - text: реконструкція стадіону триває
      correct: false
    - text: дякували волонтерам
      correct: false
    explanation: Місце відповідає на питання де.
  - question: Де є обставина мети?
    min_correct: 2
    options:
    - text: приїхали підтримати команду
      correct: true
    - text: попросили підтримати команду
      correct: false
    - text: зібралися для перевірки результатів
      correct: true
    - text: перевірка результатів тривала годину
      correct: false
    - text: бажання перемогти зросло
      correct: false
    explanation: Мета відповідає на питання навіщо.
  - question: Де є обставина причини?
    min_correct: 2
    options:
    - text: через негоду матч перенесли
      correct: true
    - text: у негоду матч тривав
      correct: false
    - text: від хвилювання голос тремтів
      correct: true
    - text: хвилювання команди зросло
      correct: false
    - text: працювали над заявою
      correct: false
    explanation: Причина пояснює, чому сталася дія.
  - question: Де є обставина допусту?
    min_correct: 2
    options:
    - text: попри втому команда продовжила гру
      correct: true
    - text: за підтримки тренера команда зросла
      correct: false
    - text: незважаючи на дощ, турнір відбувся
      correct: true
    - text: через дощ турнір перенесли
      correct: false
    - text: дощовий турнір запам'ятався
      correct: false
    explanation: Допуст показує перешкоду, попри яку дія відбулася.
  - question: Де є обставина способу дії?
    min_correct: 3
    options:
    - text: відповідали по черзі
      correct: true
    - text: працювали мовчки
      correct: true
    - text: з усмішкою привітали команду
      correct: true
    - text: відповідь команди була короткою
      correct: false
    - text: план команди змінився
      correct: false
    explanation: Спосіб дії відповідає на питання як або яким способом.
  - question: Де є обставина умови?
    min_correct: 2
    options:
    - text: за наявності квитка зайдіть до сектору
      correct: true
    - text: у разі зміни графіка повідомте координатора
      correct: true
    - text: через зміну графіка учасники спізнилися
      correct: false
    - text: після зміни графіка команда відпочила
      correct: false
    - text: графік зміни тренувань оприлюднили
      correct: false
    explanation: Умова називає ситуацію, за якої дія можлива або потрібна.
  - question: Де є обставина міри або ступеня?
    min_correct: 2
    options:
    - text: команда працювала вдвічі інтенсивніше
      correct: true
    - text: результат став помітно кращим
      correct: true
    - text: команда працювала на стадіоні
      correct: false
    - text: результат матчу обговорили
      correct: false
    - text: після матчу команда відпочила
      correct: false
    explanation: Міра і ступінь уточнюють інтенсивність дії або ознаки.
- type: fill-in
  title: Розрізни роль інфінітива
  instruction: Обери синтаксичну роль інфінітива в реченні.
  items:
  - sentence: У реченні «Ми почали ____ після перерви» інфінітив входить до ____.
    answer: присудка
    options: [присудка, додатка, означення, обставини]
    explanation: Почали працювати — складений дієслівний присудок.
  - sentence: У реченні «Попросили ____ звіт» інфінітив є ____.
    answer: додатком
    options: [додатком, означенням, обставиною, прикладкою]
    explanation: Попросили що зробити? — перевірити.
  - sentence: У реченні «Право ____ має кожен учасник» інфінітив є ____.
    answer: означенням
    options: [означенням, обставиною, додатком, підметом]
    explanation: Інфінітив уточнює іменник право.
  - sentence: У реченні «Приїхали ____ команду» інфінітив є ____.
    answer: обставиною
    options: [обставиною, присудком, прикладкою, означенням]
    explanation: Приїхали навіщо? — підтримати.
  - sentence: У реченні «Час ____ настав» інфінітив залежить від іменника ____.
    answer: час
    options: [час, настав, реченні, інфінітив]
    explanation: Це неузгоджене означення до слова час.
  - sentence: У реченні «Навчилися ____ джерела» інфінітив називає зміст ____.
    answer: навички
    options: [навички, місця, часу, прикладки]
    explanation: Навчилися чого? — перевіряти джерела.
  - sentence: У реченні «Залишилися ____ після наради» інфінітив показує ____.
    answer: мету
    options: [мету, причину, назву, відмінок]
    explanation: Залишилися навіщо? — обговорити.
  - sentence: У реченні «Бажання ____ було сильним» інфінітив уточнює ____.
    answer: іменник
    options: [іменник, дієслово, прислівник, частку]
    explanation: Бажання перемогти — інфінітивне означення.
  - sentence: У реченні «Має намір ____ заяву» інфінітив входить до ____ присудка.
    answer: складеного
    options: [складеного, простого, іменного, нульового]
    explanation: Має намір подати — складений дієслівний присудок.
  - sentence: У реченні «Зібралися ____ правила» інфінітив найчастіше є обставиною ____.
    answer: мети
    options: [мети, місця, допусту, способу]
    explanation: Зібралися навіщо? — обговорити.
- type: mark-the-words
  title: Познач обставини
  instruction: Клацни всі слова або словосполучення, які виконують роль обставин.
  text: Увечері команда зустрілася біля стадіону, щоб обговорити маршрут. Через негоду організатори перенесли старт, але попри втому волонтери працювали спокійно й по черзі відповідали учасникам.
  answers:
  - Увечері
  - біля стадіону
  - щоб обговорити маршрут
  - Через негоду
  - попри втому
  - спокійно
  - по черзі
- type: error-correction
  title: Виправ синтаксичну роль або пунктуацію
  instruction: Знайди помилковий фрагмент і обери кращий варіант.
  items:
  - sentence: Переглянувши звіт, помилки стали очевидними.
    error: помилки стали очевидними
    answer: редактор помітив помилки
    error_type: construction
    options: [редактор помітив помилки, помилки очевидні, було очевидно, звіт із помилками]
    explanation: Дієприслівниковий зворот потребує виконавця дії.
  - sentence: Новий важливий стратегічний комплексний спортивний міський проєкт стартував.
    error: Новий важливий стратегічний комплексний спортивний міський
    answer: Новий міський спортивний
    error_type: phrase
    options: [Новий міський спортивний, Нового міського спортивного, Спортивно важливий, Міським спортивним]
    explanation: Надмірне накопичення означень треба скоротити.
  - sentence: Олена тренерка команди пояснила вправу.
    error: Олена тренерка команди
    answer: Олена, тренерка команди,
    error_type: phrase
    options:
    - Олена, тренерка команди,
    - Олена тренеркою команди
    - Олена тренерку команди
    - Олена-тренерка команди
    explanation: Поширену прикладку після власної назви відокремлюємо.
  - sentence: Звіт підготовлений комісією оприлюднили вранці.
    error: Звіт підготовлений комісією
    answer: Звіт, підготовлений комісією,
    error_type: phrase
    options:
    - Звіт, підготовлений комісією,
    - Звітом підготовленим комісією
