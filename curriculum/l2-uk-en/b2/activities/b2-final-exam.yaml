- type: reading
  title: "Прочитайте текст про сучасний ринок праці"
  instruction: "Уважно прочитайте статтю та дайте відповіді на запитання."
  text: |
    Сучасний ринок праці вимагає від кандидатів не лише професійних знань, але й так званих "м'яких навичок". Гнучкість, здатність до швидкої адаптації та вміння працювати в команді стають критично важливими для успішного працевлаштування. Роботодавці все частіше звертають увагу на емоційний інтелект та здатність до комунікації. Тому під час співбесіди важливо продемонструвати не тільки своє ідеальне резюме, але й уміння знаходити компроміси та вирішувати конфліктні ситуації.
  tasks:
    - "Які навички, крім професійних, вимагає сучасний ринок праці?"
    - "Що стає критично важливим для успішного працевлаштування?"
    - "На що роботодавці все частіше звертають увагу?"
    - "Що важливо продемонструвати під час співбесіди?"

- type: quiz
  title: "Перевірте розуміння лексики"
  items:
    - question: "Яке з цих слів означає офіційну зустріч для отримання роботи?"
      explanation: "Співбесіда — це інтерв'ю з роботодавцем."
      options:
        - text: "співбесіда"
          correct: true
        - text: "відповідальність"
          correct: false
        - text: "стажування"
          correct: false
        - text: "керівництво"
          correct: false
    - question: "Як називається процес втілення нових ідей або проєктів у життя?"
      explanation: "Впроваджувати означає реалізовувати на практиці."
      options:
        - text: "працевлаштування"
          correct: false
        - text: "впровадження"
          correct: true
        - text: "конкуренція"
          correct: false
        - text: "компроміс"
          correct: false
    - question: "Який прикметник описує людину, що ставить високі стандарти до інших?"
      explanation: "Вимогливий — той, хто багато вимагає."
      options:
        - text: "гнучкий"
          correct: false
        - text: "вимогливий"
          correct: true
        - text: "підлеглий"
          correct: false
        - text: "ефективний"
          correct: false
    - question: "Що ми називаємо здатністю людини швидко пристосовуватися до нових умов?"
      explanation: "Адаптуватися означає звикати до нових обставин."
      options:
        - text: "відповідальність"
          correct: false
        - text: "гнучкість"
          correct: true
        - text: "конкуренція"
          correct: false
        - text: "мета"
          correct: false
    - question: "Хто такий підлеглий у контексті робочих чи професійних відносин?"
      explanation: "Підлеглий — це працівник, який підпорядковується керівнику."
      options:
        - text: "співробітник, який підпорядковується іншому"
          correct: true
        - text: "керівник великого підприємства"
          correct: false
        - text: "кандидат на нову посаду"
          correct: false
        - text: "людина, яка шукає роботу"
          correct: false
    - question: "Яке слово використовується для опису успішного результату після довгої роботи?"
      explanation: "Досягнення — це позитивний результат зусиль."
      options:
        - text: "досягнення"
          correct: true
        - text: "стажування"
          correct: false
        - text: "компроміс"
          correct: false
        - text: "обов'язок"
          correct: false
    - question: "Як називається угода, досягнута шляхом взаємних поступок сторін під час переговорів?"
      explanation: "Компроміс — це згода на основі взаємних поступок."
      options:
        - text: "компроміс"
          correct: true
        - text: "конкуренція"
          correct: false
        - text: "резюме"
          correct: false
        - text: "співпраця"
          correct: false
    - question: "Який термін позначає короткочасну роботу для отримання практичного досвіду студентами?"
      explanation: "Стажування — це практика для набуття досвіду."
      options:
        - text: "співбесіда"
          correct: false
        - text: "стажування"
          correct: true
        - text: "працевлаштування"
          correct: false
        - text: "кваліфікація"
          correct: false

- type: fill-in
  title: "Вставте пропущені слова"
  items:
    - sentence: "Його головна мета — отримати керівну _____ в цій компанії."
      answer: "посаду"
      options: ["посаду", "навичку", "відповідальність"]
    - sentence: "Після університету він почав своє _____ у міжнародній корпорації."
      answer: "стажування"
      options: ["стажування", "керівництво", "працевлаштування"]
    - sentence: "Під час співбесіди важливо підкреслити свої професійні _____."
      answer: "навички"
      options: ["навички", "компроміси", "обов'язки"]
    - sentence: "Наш директор дуже _____, але справедливий до всіх співробітників."
      answer: "вимогливий"
      options: ["вимогливий", "гнучкий", "підлеглий"]
    - sentence: "Компанія планує _____ нову систему оцінки ефективності працівників."
      answer: "впроваджувати"
      options: ["впроваджувати", "звільняти", "адаптуватися"]
    - sentence: "Успішні _____ завжди завершуються вигідним компромісом для обох сторін."
      answer: "переговори"
      options: ["переговори", "досягнення", "підприємства"]
    - sentence: "Вона змогла _____ директора змінити стратегію розвитку відділу."
      answer: "переконати"
      options: ["переконати", "звільнити", "керувати"]
    - sentence: "Умови ринку швидко змінюються, тому потрібно _____."
      answer: "адаптуватися"
      options: ["адаптуватися", "аналізувати", "співпрацювати"]

