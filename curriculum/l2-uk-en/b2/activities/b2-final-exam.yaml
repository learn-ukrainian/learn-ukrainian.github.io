- type: unjumble
  title: "Побудуйте речення"
  items:
    - words: ["він", "успішно", "пройшов", "співбесіду", "вчора"]
      answer: "Він успішно пройшов співбесіду вчора"
    - words: ["наша", "мета", "покращити", "ефективність", "роботи"]
      answer: "Наша мета покращити ефективність роботи"
    - words: ["керівництво", "вирішило", "впроваджувати", "нові", "технології"]
      answer: "Керівництво вирішило впроваджувати нові технології"
    - words: ["мені", "потрібно", "написати", "професійне", "резюме"]
      answer: "Мені потрібно написати професійне резюме"
    - words: ["вони", "довго", "вели", "переговори", "з", "партнерами"]
      answer: "Вони довго вели переговори з партнерами"
    - words: ["гнучкий", "графік", "роботи", "дуже", "зручний"]
      answer: "Гнучкий графік роботи дуже зручний"
    - words: ["підприємство", "шукає", "співробітників", "з", "досвідом"]
      answer: "Підприємство шукає співробітників з досвідом"

- type: error-correction
  title: "Виправте граматичні та лексичні помилки"
  items:
    - sentence: "Він приймає участь у важливих переговорах."
      error: "приймає"
      answer: "бере"
      options: ["бере", "робить", "має", "дає"]
      explanation: "Українською правильно говорити 'брати участь', а не 'приймати'."
    - sentence: "Я хочу получити цю посаду в компанії."
      error: "получити"
      answer: "отримати"
      options: ["отримати", "взяти", "здобути", "знайти"]
      explanation: "Слово 'получити' — русизм, правильно 'отримати'."
    - sentence: "Це самий кращий співробітник нашого відділу."
      error: "самий кращий"
      answer: "найкращий"
      options: ["найкращий", "більш кращий", "дуже кращий", "самий хороший"]
      explanation: "Ступені порівняння утворюються префіксом 'най-', слово 'самий' тут не вживається."
    - sentence: "Вона завжди мішає мені працювати."
      error: "мішає"
      answer: "заважає"
      options: ["заважає", "плутає", "перебиває", "турбує"]
      explanation: "'Мішати' можна суп, а людям 'заважають'."
    - sentence: "Ми підписали договір на слідуючий рік."
      error: "слідуючий"
      answer: "наступний"
      options: ["наступний", "майбутній", "другий", "новий"]
      explanation: "Слово 'слідуючий' — калька, правильно 'наступний'."
    - sentence: "Його звільнили із-за поганої роботи."
      error: "із-за"
      answer: "через"
      options: ["через", "від", "для", "заради"]
      explanation: "Причину вказують прийменником 'через', а 'із-за' означає рух з-за предмета."

- type: cloze
  title: "Заповніть пропуски в тексті"
  passage: "Мій друг нещодавно закінчив університет і почав шукати роботу. Спочатку він склав професійне {{1}}, де описав свою {{2}} та навички. Потім він почав надсилати його на різні {{3}}. Через тиждень його запросили на першу {{4}}. Він дуже хвилювався, але зміг продемонструвати свою {{5}} до навчання та {{6}} мислення. Роботодавець виявився досить {{7}}, але справедливим. Після успішного інтерв'ю йому запропонували {{8}} на два місяці. Це був чудовий шанс отримати практичний {{9}}. Під час роботи він навчився {{10}} конфлікти та знаходити {{11}} з колегами. Його головна {{12}} полягала в тому, щоб показати свою {{13}}. Врешті-решт, компанія запропонувала йому постійне {{14}}."
  blanks:
    - id: 1
      answer: "резюме"
      options: ["резюме", "есе", "завдання", "рішення"]
    - id: 2
      answer: "кваліфікацію"
      options: ["кваліфікацію", "зовнішність", "стратегію", "конкуренцію"]
    - id: 3
      answer: "підприємства"
      options: ["підприємства", "співбесіди", "досягнення", "обов'язки"]
    - id: 4
      answer: "співбесіду"
      options: ["співбесіду", "перерву", "посаду", "конкуренцію"]
    - id: 5
      answer: "готовність"
      options: ["готовність", "відповідальність", "мета", "співпраця"]
    - id: 6
      answer: "гнучке"
      options: ["гнучке", "вимогливе", "підлегле", "керівне"]
    - id: 7
      answer: "вимогливим"
      options: ["вимогливим", "гнучким", "відповідальним", "новим"]
    - id: 8
      answer: "стажування"
      options: ["стажування", "звільнення", "керівництво", "досягнення"]
    - id: 9
      answer: "досвід"
      options: ["досвід", "компроміс", "обов'язок", "підлеглий"]
    - id: 10
      answer: "вирішувати"
      options: ["вирішувати", "впроваджувати", "звільняти", "керувати"]
    - id: 11
      answer: "компроміс"
      options: ["компроміс", "стажування", "резюме", "конкуренцію"]
    - id: 12
      answer: "мета"
      options: ["мета", "стратегія", "кваліфікація", "посада"]
    - id: 13
      answer: "ефективність"
      options: ["ефективність", "конкуренцію", "співбесіду", "відповідальність"]
    - id: 14
      answer: "працевлаштування"
      options: ["працевлаштування", "звільнення", "стажування", "керівництво"]

