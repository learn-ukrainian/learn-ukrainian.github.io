- type: reading
  id: reading-publicism
  title: 'Первинне джерело: Аналітична стаття про суспільство'
  source: Типовий приклад української публіцистики
  text: 'Сучасне суспільство втомилося від порожніх обіцянок. Щороку перед виборами
    ми чуємо гучні заяви про реформи, але на практиці ці політики просто звикли кидати
    слова на вітер. Замість того, щоб вирішувати реальні економічні проблеми, певні
    групи впливу намагаються розпалити конфлікт, свідомо підливаючи масла у вогонь
    соціальної напруги. Проте громадянське суспільство в Україні має довгу пам''ять
    і неймовірну витримку. Ми знаємо, що вода камінь точить. Навіть якщо зміни відбуваються
    не так швидко, як нам би хотілося, щоденна, наполеглива праця мільйонів волонтерів
    та активістів обов''язково зруйнує систему корупції. Ми не чекаємо миттєвих див,
    ми методично працюємо на результат.

    '
  tasks:
  - Які фразеологізми використовує автор для гострої критики політиків?
  - Яку стихію автор використовує як головний символ щоденної наполегливої праці?
- type: essay-response
  title: 'Есе: Аналіз публіцистичного тексту'
  source_reading: reading-publicism
  prompt: Проаналізуйте наведений публіцистичний текст. Як використання фразеологізмів
    «кидати слова на вітер», «підливати масла у вогонь» та «вода камінь точить» підсилює
    емоційний вплив статті на читача? Чому автор обрав саме ці природні стихії для
    ілюстрації своєї думки?
  min_words: 150
  model_answer: У наведеному публіцистичному тексті фразеологізми про природу відіграють
    ключову роль у формуванні емоційного впливу на читача. Вираз «кидати слова на
    вітер» ідеально описує безвідповідальність сучасних політиків, асоціюючи їхні
    порожні обіцянки з мінливістю та легкістю вітру. Метафора «підливати масла у вогонь»
    візуалізує величезну небезпеку штучного розпалювання конфліктів, що викликає у
    читача тривогу та усвідомлення загрози. Натомість фразеологізм «вода камінь точить»
    створює потужний контраст, символізуючи надію, витримку та невідворотність позитивних
    змін у суспільстві завдяки праці волонтерів. Використання знайомих образів вітру,
    вогню та води дозволяє автору не просто констатувати сухі факти, а успішно апелювати
    до глибоких культурних кодів українців. Це робить політичну аргументацію значно
    переконливішою, яскравішою та близькою до світогляду кожного громадянина.
  rubric:
  - criteria: Аналіз стилістики
    description: Здатність глибоко пояснити функцію фразеологізмів у публіцистичному
      тексті.
    points: 5
  - criteria: Структура і логіка
    description: Чітка аргументація та строге дотримання вимог до есе.
    points: 5
