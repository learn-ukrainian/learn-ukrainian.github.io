  text: 'Українська земля завжди була щедрою до своїх дітей. Чиста вода в річках давала
    життя, а теплий вітер приносив добрі новини з півдня. Але коли починалася посуха,
    лише вогонь у печі нагадував про домашній затишок. Кожна стихія мала свій характер.
    Люди вірили, що місцева криниця зберігає пам''ять роду.

    '
