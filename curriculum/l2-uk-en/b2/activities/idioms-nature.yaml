- type: match-up
  title: Знайдіть відповідність між фразеологізмом та його значенням
  pairs:
  - left: пройти вогонь і воду
    right: здобути великий життєвий досвід
  - left: вода камінь точить
    right: наполегливість дає результат
  - left: товкти воду в ступі
    right: робити монотонну роботу без результату
  - left: носити воду решетом
    right: марнувати зусилля без шансу на успіх
  - left: провалитися крізь землю
    right: відчути надзвичайно сильний сором
  - left: як земля носить
    right: найвищий ступінь морального обурення
  - left: вітер у голові
    right: легковажність та відсутність серйозних думок
  - left: кидати слова на вітер
    right: обіцяти і не виконувати обіцянок
  - left: звідки вітер віє
    right: справжня причина або джерело подій
  - left: гратися з вогнем
    right: поводитися вкрай необережно і ризикувати
  instruction: З'єднайте відповідні елементи.
- type: quiz
  title: Перевірте знання контексту та значень фразеологізмів
  items:
  - question: Який фразеологізм найкраще описує людину, яка здобула величезний життєвий
      досвід?
    options:
    - text: пройти вогонь і воду
      correct: true
    - text: носити воду решетом
      correct: false
    - text: вітер у голові
      correct: false
    - text: гратися з вогнем
      correct: false
    explanation: Цей вираз описує подолання численних перешкод і труднощів на життєвому
      шляху.
  - question: Що означає вираз товкти воду в ступі в українській мові?
    options:
    - text: робити монотонну марну роботу
      correct: true
    - text: швидко вирішувати складну проблему
      correct: false
    - text: говорити неправду на роботі
      correct: false
    - text: відчувати надзвичайно сильний сором
      correct: false
    explanation: Товкти воду в ступі означає виконувати дію, яка зовсім не змінює
      стану речей.
  - question: Який вираз використовують для вираження найвищого ступеня морального
      обурення діями людини?
    options:
    - text: як земля носить
      correct: true
    - text: вітер у голові
      correct: false
    - text: вода камінь точить
      correct: false
    - text: провалитися крізь землю
      correct: false
    explanation: Цей вираз є апеляцією до вищої справедливості через абсолютно ганебні
      вчинки.
  - question: До якої стихії звертаються, коли хочуть описати легковажну та безвідповідальну
      людину?
    options:
    - text: вітер
      correct: true
    - text: вода
      correct: false
    - text: вогонь
      correct: false
    - text: земля
      correct: false
    explanation: Фразеологізм вітер у голові характеризує саме таку несерйозну людину.
  - question: Який фразеологізм вживається переважно в доконаному виді для опису раптового
      сорому?
    options:
    - text: провалитися крізь землю
      correct: true
    - text: носити воду решетом
      correct: false
    - text: кидати слова на вітер
      correct: false
    - text: товкти воду в ступі
      correct: false
    explanation: Бажання зникнути через сором є миттєвим, тому завжди використовується
      доконаний вид.
  - question: Як правильно граматично побудувати фразу про провокування більшого соціального
      або політичного конфлікту?
    options:
    - text: підливати масла у вогонь
      correct: true
    - text: підливати масла з вогнем
      correct: false
    - text: підливати масла до вогню
      correct: false
    - text: підливати масла на вогонь
      correct: false
    explanation: Цей вираз жорстко вимагає знахідного відмінка напрямку з прийменником
      у або в.
  - question: У якому стилі мовлення абсолютно недоречно використовувати ці емоційні
      фразеологізми про природу?
    options:
    - text: офіційно-діловий
      correct: true
    - text: розмовний
      correct: false
    - text: публіцистичний
      correct: false
    - text: художній
      correct: false
    explanation: Офіційні документи завжди вимагають стандарту точності та повністю
      уникають метафор.
  - question: Який український вираз є функціональним еквівалентом англійського виразу
      to beat the air?
    options:
    - text: носити воду решетом
      correct: true
    - text: гратися з вогнем
      correct: false
    - text: вода камінь точить
      correct: false
    - text: провалитися крізь землю
      correct: false
    explanation: Обидва вирази описують марну працю, але використовують абсолютно
      різні візуальні образи.
  - question: Яка стихія в українському фольклорі найчастіше уособлювала очищення,
      святу правду та пам'ять?
    options:
    - text: вода
      correct: true
    - text: вогонь
      correct: false
    - text: земля
      correct: false
    - text: вітер
      correct: false
    explanation: Джерела та криниці завжди вважалися сакральними місцями, пов'язаними
      з ритуальним очищенням.
  - question: Який вираз найкраще підійде для критики політика, що роками не виконує
      своїх обіцянок?
    options:
    - text: кидати слова на вітер
      correct: true
    - text: вітер у голові
      correct: false
    - text: як земля носить
      correct: false
    - text: пройти вогонь і воду
      correct: false
    explanation: Цей вираз ідеально описує безвідповідальне та легковажне ставлення
      до власних заяв.
  instruction: Оберіть правильну відповідь.
- type: unjumble
  title: Складіть речення з правильним порядком слів
  items:
  - words:
    - Цей
    - політик
    - постійно
    - кидає
    - слова
    - на
    - вітер
    - перед
    - своїми
    - виборцями
    answer: Цей політик постійно кидає слова на вітер перед своїми виборцями
  - words:
    - Я
    - був
    - готовий
    - провалитися
    - крізь
    - землю
    - від
    - сорому
    - за
    - свою
    - помилку
    answer: Я був готовий провалитися крізь землю від сорому за свою помилку
  - words:
    - Не
    - можна
    - гратися
    - з
    - вогнем
    - ігноруючи
    - важливі
    - правила
    - безпеки
    - на
    - роботі
    answer: Не можна гратися з вогнем ігноруючи важливі правила безпеки на роботі
  - words:
    - Ваша
    - нова
    - стратегія
    - зовсім
    - неефективна
    - ви
    - просто
    - носите
    - воду
    - решетом
    answer: Ваша нова стратегія зовсім неефективна ви просто носите воду решетом
  - words:
    - Кожен
    - його
    - новий
    - коментар
    - лише
    - підливав
    - масла
    - у
    - вогонь
    - нашого
    - конфлікту
    answer: Кожен його новий коментар лише підливав масла у вогонь нашого конфлікту
  - words:
    - Досить
    - товкти
    - воду
    - в
    - ступі
    - на
    - цих
    - довгих
    - і
    - нудних
    - нарадах
    answer: Досить товкти воду в ступі на цих довгих і нудних нарадах
  - words:
    - Пам'ятайте
    - що
    - вода
    - камінь
    - точить
    - тому
    - ніколи
    - не
    - здавайтеся
    - після
    - невдачі
    answer: Пам'ятайте що вода камінь точить тому ніколи не здавайтеся після невдачі
  - words:
    - У
    - цього
    - молодого
    - хлопця
    - ще
    - вітер
    - у
    - голові
    - замість
    - серйозних
    - думок
    answer: У цього молодого хлопця ще вітер у голові замість серйозних думок
  instruction: Розташуйте слова у правильному порядку.
- type: fill-in
  title: Вставте правильне слово у фразеологізм
  items:
  - sentence: Новий керівник відділу — людина надійна; він на цій роботі пройшов вогонь
      і _____.
    answer: воду
    options:
    - воду
    - землю
    - вітер
    - мідь
  - sentence: 'Не здавайся після першої невдалої спроби, пам''ятай: вода камінь _____.'
    answer: точить
    options:
    - точить
    - б'є
    - миє
    - руйнує
  - sentence: Ігноруючи правила безпеки на підприємстві, керівництво грається з _____.
    answer: вогнем
    options:
    - вогнем
    - вітром
    - водою
    - землею
  - sentence: Кожен новий коментар політика лише підливав _____ у вогонь суспільного
      обурення.
    answer: масла
    options:
    - масла
    - води
    - бензину
    - вітру
  - sentence: Намагатися переконати його за допомогою логіки — це все одно що носити
      воду _____.
    answer: решетом
    options:
    - решетом
    - відром
    - руками
    - чашкою
  - sentence: Депутати вже три години обговорюють цей закон, але фактично просто товчуть
      воду в _____.
    answer: ступі
    options:
    - ступі
    - мисці
    - каструлі
    - діжці
  - sentence: Коли я зрозумів свою жахливу помилку, я був ладен провалитися крізь
      _____ від сорому.
    answer: землю
    options:
    - землю
    - підлогу
    - стіну
    - дахи
  - sentence: Він залишив свою матір без допомоги. І як тільки таких людей земля _____!
    answer: носить
    options:
    - носить
    - тримає
    - терпить
    - любить
  - sentence: Не доручайте йому цей складний проект, у нього ж _____ у голові.
    answer: вітер
    options:
    - вітер
    - протяг
    - порожнеча
    - туман
  - sentence: Справжній лідер ніколи не буде кидати слова на _____ перед своїми виборцями.
    answer: вітер
    options:
    - вітер
    - землю
    - воду
    - вогонь
  instruction: Оберіть правильне слово для заповнення пропуску.
- type: true-false
  title: Визначте, чи є твердження правильним
  items:
  - statement: Фразеологізм пройти вогонь і воду означає отримати серйозні опіки під
      час пожежі.
    correct: false
    explanation: Це переносне значення, яке описує здобуття великого життєвого досвіду.
  - statement: Метафора вода камінь точить використовується для опису систематичних
      та наполегливих зусиль.
    correct: true
    explanation: Він ілюструє концепцію перемоги терпіння над силою.
  - statement: Після дієслова гратися у виразі про вогонь використовується орудний
      відмінок з прийменником з.
    correct: true
    explanation: 'Це правильна граматична конструкція: гратися ким? чим? — з вогнем.'
  - statement: Вирази носити воду решетом та товкти воду в ступі є синонімами ефективної
      роботи.
    correct: false
    explanation: Навпаки, обидва вирази описують марну, безглузду та неефективну роботу.
  - statement: Бажання провалитися крізь землю описує стан надзвичайної гордості за
      свої вчинки.
    correct: false
    explanation: Цей вираз використовується для опису сильного сорому або незручності.
  - statement: Риторичне запитання як земля носить виражає найвищий ступінь морального
      обурення.
    correct: true
    explanation: Воно базується на уявленні про святу землю, яка не повинна терпіти
      злочинців.
  - statement: Вираз вітер у голові характеризує дуже відповідальну людину, яка завжди
      виконує обіцянки.
    correct: false
    explanation: Навпаки, він описує легковажну людину без серйозних намірів.
  - statement: Емоційні фразеологізми про природу доречно використовувати в офіційно-діловому
      стилі.
    correct: false
    explanation: Офіційний стиль уникає емоцій та метафор, вимагаючи максимальної
      точності.
  - statement: Буквальний переклад англійського виразу to beat the air буде незрозумілим
      для українців.
    correct: true
    explanation: В українській мові існують власні функціональні еквіваленти, такі
      як товкти воду в ступі.
  - statement: Українська мова дозволяє певну варіативність, наприклад, можна сказати
      підливати масла у багаття.
    correct: true
    explanation: Така гнучкість існує, головне — зберігати ключові компоненти метафори.
  instruction: Визначте, чи твердження правильне.
- type: error-correction
  title: Виправте граматичні та лексичні помилки
  items:
  - sentence: Ігноруючи правила безпеки на підприємстві, керівництво грається у вогонь.
    error: у вогонь
    answer: з вогнем
    error_type: phrase
    options:
    - з вогнем
    - у вогонь
    - на вогні
    - до вогню
    explanation: Правильна конструкція вимагає орудного відмінка з прийменником З
      (гратися з вогнем).
  - sentence: Кожен новий коментар політика лише підливав масла з вогнем суспільного
      обурення.
    error: з вогнем
    answer: у вогонь
    error_type: phrase
    options:
    - у вогонь
    - з вогнем
    - до вогню
    - на вогонь
    explanation: Цей вираз вимагає знахідного відмінка напрямку (підливати масла у
      що? — у вогонь).
  - sentence: Намагатися переконати його логікою — це все одно що носити воду відром.
    error: відром
    answer: решетом
    options:
    - решетом
    - відром
    - руками
    - чашкою
    explanation: Решето не тримає воду, що і створює метафору абсолютно даремної праці.
  - sentence: Депутати обговорюють закон, але фактично просто б'ють воду в ступі.
    error: б'ють
    answer: товчуть
    options:
    - товчуть
    - б'ють
    - мішають
    - варять
    explanation: Стійкий вираз використовує виключно дієслово товкти.
  - sentence: Від його різкого зауваження дівчина хотіла провалюватися крізь землю.
    error: провалюватися
    answer: провалитися
    options:
    - провалитися
    - провалюватися
    - впасти
    - зникнути
    explanation: Бажання зникнути від сорому є миттєвим, тому використовується доконаний
      вид.
  - sentence: Компанія втратила довіру інвесторів, бо її директор звик кидати слова
      на підлогу.
    error: підлогу
    answer: вітер
    options:
    - вітер
    - підлогу
    - землю
    - стіл
    explanation: Правильний фразеологізм звучить як кидати слова на вітер.
  - sentence: Цей молодий хлопець дуже безвідповідальний, у нього протяг у голові.
    error: протяг
    answer: вітер
    options:
    - вітер
    - протяг
    - повітря
    - ураган
    explanation: Для опису легковажності традиційно використовується образ вітру.
  - sentence: Він залишив матір без допомоги, як тільки таких людей природа носить!
    error: природа
    answer: земля
    options:
    - земля
    - природа
    - планета
    - країна
    explanation: В українській культурі саме земля виступає моральним мірилом.
  instruction: Знайдіть і виправте помилку в реченні.
- type: select
  title: Оберіть усі правильні відповіді
  items:
  - question: Які з цих виразів описують абсолютно марну, безрезультатну працю?
    min_correct: 2
    options:
    - text: носити воду решетом
      correct: true
    - text: товкти воду в ступі
      correct: true
    - text: вода камінь точить
      correct: false
    - text: пройти вогонь і воду
      correct: false
    explanation: Обидва ці вирази метафорично описують дію, яка не приносить користі.
  - question: Які фразеологізми безпосередньо пов'язані зі стихією вогню?
    min_correct: 3
    options:
    - text: гратися з вогнем
      correct: true
    - text: підливати масла у вогонь
      correct: true
    - text: пройти вогонь і воду
      correct: true
    - text: провалитися крізь землю
      correct: false
  - question: Які вирази доречно використовувати для гострої критики безвідповідального
      політика?
    min_correct: 2
    options:
    - text: кидати слова на вітер
      correct: true
    - text: як земля носить
      correct: true
    - text: провалитися крізь землю
      correct: false
    - text: вода камінь точить
      correct: false
  - question: Які граматичні форми є абсолютно правильними для цих ідіом?
    min_correct: 2
    options:
    - text: провалитися (доконаний вид) крізь землю
      correct: true
    - text: провалюватися (недоконаний вид) крізь землю
      correct: false
    - text: підливати масла у вогонь (знахідний відмінок)
      correct: true
    - text: гратися у вогонь (знахідний відмінок)
      correct: false
  - question: Які характеристики традиційно приписуються стихії вітру у фразеологізмах?
    min_correct: 2
    options:
    - text: легковажність
      correct: true
    - text: перенесення інформації або новин
      correct: true
    - text: стабільність і надійність
      correct: false
