- type: reading
  title: Аналіз наукового тексту
  instruction: Прочитайте уривок та дайте відповіді на запитання.
  text: Інститут української наукової мови, заснований у 1921 році, мав за мету створення
    питомої термінології. Мовознавці та науковці працювали над тим, щоб кожне поняття
    мало точний відповідник. Вони прагнули уникнути сліпого копіювання з інших мов.
    Проте цей процес був перерваний репресіями.
  tasks:
  - Коли було засновано Інститут української наукової мови?
  - Якою була головна мета цієї установи?
  - Чому науковці уникали сліпого копіювання термінів?
  - Яка подія перервала роботу Інституту?
- type: true-false
  title: 'Культурний контекст та граматика: Правда чи міф?'
  items:
  - statement: Києво-Могилянська академія була першим вищим навчальним закладом у
      Східній Європі.
    correct: true
    explanation: Так, вона була заснована у 1632 році і стала першим університетом
      у регіоні.
  - statement: Студенти Києво-Могилянської академії вивчали лише українську мову.
    correct: false
    explanation: Вони вивчали латину, грецьку, польську та старослов'янську мови.
  - statement: Слово 'термін' завжди означає лише час виконання якогось завдання.
    correct: false
    explanation: 'Слово ''термін'' має два значення: спеціальне слово та час.'
  - statement: Пасивні конструкції з орудним відмінком діяча є природними для української
      мови.
    correct: false
    explanation: Це калька. Українська мова надає перевагу активним конструкціям.
  - statement: Інститут української наукової мови успішно завершив свою роботу без
      перешкод.
    correct: false
    explanation: Робота Інституту була зупинена репресіями 1930-х років.
  - statement: З'ясувальні підрядні речення відповідають на питання непрямих відмінків.
    correct: true
    explanation: Вони з'ясовують зміст дієслова в головній частині, відповідаючи на
      кого? що? чому? тощо.
  - statement: Сполучник 'щоб' використовується для констатації реального факту.
    correct: false
    explanation: Він виражає бажання, прохання або наказ, а факт констатує сполучник
      'що'.
  - statement: Обставинні речення часу відповідають на питання який?
    correct: false
    explanation: Означальні речення відповідають на питання який?, а часові — коли?.
  - statement: У безособових формах на -но, -то не можна використовувати орудний відмінок
      діяча.
    correct: true
    explanation: Додавання діяча в орудному відмінку (наприклад, 'написано автором')
      є грубою стилістичною помилкою.
  - statement: Шкільна драма була жанром театральних вистав, які писали студенти академії.
    correct: true
    explanation: Студенти ставили такі драми на свята, тренуючи навички красномовства.
  instruction: Визначте, чи твердження правильне.
- type: quiz
  title: Граматика та стилістика
  instruction: Оберіть одну правильну відповідь на кожне запитання.
  items:
  - question: Яке з цих речень є граматично правильною активною конструкцією?
    explanation: Українська мова уникає пасивних конструкцій з орудним відмінком діяча.
    options:
    - text: Робітники успішно будують цей новий комплекс.
      correct: true
    - text: Цей новий комплекс успішно будується робітниками.
      correct: false
    - text: Цей комплекс є побудований робітниками.
      correct: false
    - text: Новий комплекс успішно будувався робітниками.
      correct: false
  - question: Який сполучник необхідно використати для вираження наказу або сильного
      бажання?
    explanation: Сполучник 'щоб' передає модальність бажання чи наказу.
    options:
    - text: щоб
      correct: true
    - text: що
      correct: false
    - text: ніби
      correct: false
    - text: тому що
      correct: false
  - question: Яке слово є правильним перекладом англійського слова 'deadline'?
    explanation: Для позначення часу закінчення чогось використовують слово 'термін'
      або 'кінцевий термін'.
    options:
    - text: кінцевий термін
      correct: true
    - text: строк
      correct: false
    - text: дослідження
      correct: false
    - text: реєстр
      correct: false
  - question: Яку синтаксичну роль відіграє підрядне означальне речення?
    explanation: Означальне речення відповідає на питання 'який?' і характеризує іменник.
    options:
    - text: Характеризує іменник, відповідаючи на питання який
      correct: true
    - text: З'ясовує зміст дієслова, відповідаючи на питання відмінків
      correct: false
    - text: Вказує на час виконання дії в головному реченні
      correct: false
    - text: Вказує на причину, чому відбулася головна дія
      correct: false
  - question: Що було головною метою створення Інституту української наукової мови?
    explanation: Інститут створював національну термінологію для різних галузей науки.
    options:
    - text: Створення питомої наукової термінології
      correct: true
    - text: Переклад літератури російською мовою
      correct: false
    - text: Дослідження фольклору та народних пісень
      correct: false
    - text: Написання театральних вистав для студентів
      correct: false
  - question: Як правильно перекласти словосполучення 'trial and error method'?
    explanation: Український відповідник — метод спроб і помилок.
    options:
    - text: метод спроб і помилок
      correct: true
    - text: процес спроб і помилок
      correct: false
    - text: аналіз проб і помилок
      correct: false
    - text: дослідження помилок
      correct: false
  - question: Чому пасивні дієприкметники часто звучать неприродно в українській мові?
    explanation: Вони обважнюють текст і часто є калькою з інших мов.
    options:
    - text: Вони роблять текст важким і часто є калькою
      correct: true
    - text: Вони порушують правила орфографії
      correct: false
    - text: Вони використовуються лише у розмовній мові
      correct: false
    - text: Вони замінюють собою іменники
      correct: false
  - question: Яке слово означає глибоке вивчення певної проблеми або явища?
    explanation: Слово 'дослідження' передає процес наукового вивчення.
    options:
    - text: дослідження
      correct: true
    - text: реєстр
      correct: false
    - text: термін
      correct: false
    - text: калька
      correct: false
  - question: Що таке 'регістр мовлення' у контексті вивчення української мови?
    explanation: Це рівень формальності мовлення залежно від ситуації.
    options:
    - text: Рівень формальності мовлення залежно від ситуації
      correct: true
    - text: Спеціальний словник для запису наукових термінів
      correct: false
    - text: Граматичний час, у якому відбувається подія
      correct: false
    - text: Список правильних відповідей на тест
      correct: false
  - question: Яке речення містить правильну безособову форму на -но, -то?
    explanation: Безособова форма не допускає діяча в орудному відмінку.
    options:
    - text: У статті детально проаналізовано цю складну проблему.
      correct: true
    - text: Цю проблему проаналізовано нами дуже детально.
      correct: false
    - text: У статті детально проаналізовано автором цю проблему.
      correct: false
    - text: Стаття є проаналізована дуже детально.
      correct: false
- type: match-up
  title: 'Наукова лексика: Знайдіть відповідники'
  instruction: З'єднайте український термін з його перекладом або синонімічним значенням.
  pairs:
  - left: метод спроб і помилок
    right: trial and error
  - left: системний аналіз
    right: комплексне вивчення проблеми
  - left: навчальний процес
    right: хід здобуття освіти
  - left: кінцевий термін
    right: час, до якого треба щось зробити
  - left: науковий метод
    right: спосіб дослідження у науці
  - left: творчий синтез
    right: поєднання ідей для створення нового
  - left: зміна регістра мовлення
    right: перехід від формального до розмовного стилю
  - left: підмінити поняття
    right: використати слово в хибному значенні
  - left: фундаментальне дослідження
    right: глибоке академічне вивчення
  - left: технічний термін
    right: спеціалізоване слово з галузі
  - left: оцінка ризиків
    right: визначення можливих небезпек
  - left: побічні ефекти
    right: небажані наслідки дії препарату
- type: fill-in
  title: Заповніть пропуски у фахових текстах
  items:
  - sentence: Комісія повинна встановити чіткий ___ для подачі цих документів.
    answer: термін
    options:
    - термін
    - процес
    - реєстр
    - синтез
    explanation: '''Встановити термін'' означає визначити дедлайн.'
  - sentence: Цей ___ дослідження дозволяє отримати найточніші результати.
    answer: метод
    options:
    - метод
    - поняття
    - реєстр
    - користувач
    explanation: Використовується слово 'метод' як спосіб дослідження.
  - sentence: Важливо не підміняти ___, коли ми дискутуємо про складні речі.
    answer: поняття
    options:
    - поняття
    - терміни
    - процеси
    - дослідження
    explanation: '''Підмінити поняття'' — стійкий вираз.'
  - sentence: Для перевірки цієї гіпотези необхідно провести системний ___.
    answer: аналіз
    options:
    - аналіз
    - синтез
    - реєстр
    - додаток
    explanation: '''Проводити аналіз'' — стандартна наукова колокація.'
  - sentence: У цій ситуації зміна ___ мовлення є абсолютно недоречною.
    answer: регістра
    options:
    - регістра
    - терміна
    - методу
    - диспута
    explanation: Йдеться про 'регістр мовлення' (стиль).
  - sentence: Цей незворотний ___ може призвести до серйозних наслідків.
    answer: процес
    options:
    - процес
    - синтез
    - реєстр
    - відповідник
    explanation: '''Незворотний процес'' — стійке словосполучення.'
  - sentence: Мовознавці шукали український ___ до цього іншомовного слова.
    answer: відповідник
    options:
    - відповідник
    - аналіз
    - метод
    - термін
    explanation: Слово 'відповідник' означає еквівалент.
  - sentence: Він є незалежним ___ мови на рівні B2.
    answer: користувачем
    options:
    - користувачем
    - дослідником
    - аналітиком
    - студентом
    explanation: '''Незалежний користувач'' (independent user).'
  - sentence: Це фундаментальне ___ змінило наше розуміння історії.
    answer: дослідження
    options:
    - дослідження
    - поняття
    - реєстр
    - сполучник
    explanation: '''Фундаментальне дослідження'' — наукове вивчення.'
  - sentence: У реченні з'ясувальна ___ частина відповідає на питання відмінків.
    answer: підрядна
    options:
    - підрядна
    - головна
    - безособова
    - спонтанна
    explanation: Граматичний термін — підрядна частина речення.
  instruction: Оберіть правильне слово для заповнення пропуску.
- type: group-sort
  title: Класифікація складнопідрядних речень
  instruction: Розподіліть сполучники та сполучні слова за типами речень.
  groups:
  - name: Часові (коли відбулася дія)
    items:
    - коли
    - поки
    - щойно
    - після того як
    - доки
    - ледве
  - name: З'ясувальні (про що йдеться)
    items:
    - що
    - щоб
    - ніби
    - хто
  - name: Причинові (чому відбулася дія)
    items:
    - тому що
    - бо
    - через те що
    - оскільки
- type: unjumble
  title: Відновіть порядок слів у складнопідрядних реченні
  items:
  - words:
    - дослідники
    - представили
    - нову
    - концепцію
    - яка
    - докорінно
    - змінює
    - наше
    - розуміння
    - проблеми
    answer: Дослідники представили нову концепцію яка докорінно змінює наше розуміння
      проблеми
  - words:
    - керівник
    - команди
    - запитав
    - коли
    - ми
    - зможемо
    - надати
    - остаточний
    - звіт
    answer: Керівник команди запитав коли ми зможемо надати остаточний звіт
  - words:
    - після
    - того
    - як
    - ми
    - проаналізували
    - всі
    - дані
    - з'явилася
    - чітка
    - тенденція
    answer: Після того як ми проаналізували всі дані з'явилася чітка тенденція
  - words:
    - ми
    - будемо
    - продовжувати
    - цей
    - складний
    - експеримент
    - поки
    - не
    - отримаємо
    - результат
    answer: Ми будемо продовжувати цей складний експеримент поки не отримаємо результат
  - words:
    - науковці
    - працювали
    - над
    - тим
    - щоб
    - кожне
    - поняття
    - мало
    - точний
    - відповідник
    answer: Науковці працювали над тим щоб кожне поняття мало точний відповідник
  - words:
    - студенти
    - чиї
    - наукові
    - роботи
    - отримали
    - найвищі
    - бали
    - будуть
    - запрошені
    - на
    - конференцію
    answer: Студенти чиї наукові роботи отримали найвищі бали будуть запрошені на
      конференцію
  - words:
    - комісія
    - швидко
    - дійшла
    - важливого
    - висновку
    - що
    - цей
    - метод
    - є
    - найефективнішим
    answer: Комісія швидко дійшла важливого висновку що цей метод є найефективнішим
  - words:
    - вони
    - робили
    - це
    - для
    - того
    - щоб
    - уникнути
    - сліпого
    - копіювання
    - термінів
    answer: Вони робили це для того щоб уникнути сліпого копіювання термінів
  instruction: Розташуйте слова у правильному порядку.
- type: error-correction
  title: 'Стилістичне редагування: Позбавляємося кальок'
  instruction: Знайдіть та виправте русизми або неправильні пасивні конструкції.
  items:
  - sentence: Новий закон приймається парламентом дуже швидко.
    error: приймається парламентом
    answer: ухвалює парламент
    error_type: construction
    options:
    - ухвалює парламент
    - є прийнятий
    - парламентом приймають
    - прийнято парламентом
    explanation: Українська мова уникає пасивних дієслів на -ся з орудним відмінком
      діяча. Краще використовувати активний стан.
  - sentence: Проєкт був розроблений нашим кращим спеціалістом.
    error: розроблений нашим кращим спеціалістом
    answer: розробив наш найкращий спеціаліст
    error_type: construction
    options:
    - розробив наш найкращий спеціаліст
    - було розроблено спеціалістом
    - розроблений кращим
    - розробив самий кращий
    explanation: Замість пасивної конструкції варто вжити активну. Також 'найкращий'
      замість 'кращий'.
  - sentence: Робота написана студентом на високому рівні.
    error: написана студентом
    answer: написав студент
    error_type: construction
    options:
    - написав студент
    - є написаною студентом
    - було написано студентом
    - студентом пишеться
    explanation: Орудний відмінок діяча (студентом) не вживається в пасивних конструкціях.
  - sentence: Ми повинні встановити строк для цього завдання.
    error: строк
    answer: термін
    error_type: word
    options:
    - термін
    - час
    - реєстр
    - аналіз
    explanation: Для позначення дедлайну, фіксованої дати використовують 'термін'.
      Строк — це тривалість.
  - sentence: Ця стаття перекладена перекладачем дуже точно.
    error: перекладена перекладачем
    answer: переклав перекладач
    error_type: construction
    options:
    - переклав перекладач
    - є перекладеною
    - перекладено перекладачем
    - перекладалась перекладачем
    explanation: Активна конструкція є єдиним стилістично правильним варіантом.
  - sentence: У звіті було проаналізовано експертами головні ризики.
    error: проаналізовано експертами
    answer: експерти проаналізували
    error_type: construction
    options:
    - експерти проаналізували
    - є проаналізовані експертами
    - було експертами проаналізовано
    - проаналізували експертами
    explanation: Біля форм на -но, -то ніколи не може стояти діяч в орудному відмінку.
  - sentence: Він є самим кращим експертом у цій галузі.
