    роль відіграло вивчення культурного контексту? Обсяг — мінімум 150 слів.'
  min_words: 150
  model_answer: Мій шлях до рівня B2 був складним, але надзвичайно цікавим процесом.
    Коли я тільки починав вивчати українську мову, мені було важко формулювати свої
    думки. Я використовував прості речення і часто шукав відповідники до слів з моєї
    рідної мови. Однак з часом я зрозумів, що українська мова має свою унікальну логіку.
    Я навчився використовувати складнопідрядні речення, щоб чітко висловлювати причиново-наслідкові
    зв'язки у своїх есе. Важливим досягненням стало розуміння того, що активні конструкції
    звучать набагато природніше, ніж пасивні, які обважнюють текст. Я намагаюся уникати
    кальок і постійно збагачую свій словниковий запас науковими та фаховими поняттями.
    Крім того, вивчення історії мови, зокрема діяльності Інституту української наукової
    мови, допомогло мені глибше зрозуміти культурний контекст і відчути повагу до
    тих, хто створював українську термінологію. Тепер я почуваюся незалежним користувачем
    і готовий до викликів рівня C1.
  rubric:
  - criteria: Лексичне багатство
    description: Використано мінімум 5 термінів з модуля (процес, поняття, відповідник
      тощо).
    points: 10
  - criteria: Синтаксис
    description: Правильно побудовано мінімум 3 складнопідрядні речення різних типів.
    points: 10
  - criteria: Стилістика
    description: Текст не містить пасивних конструкцій з орудним відмінком діяча (кальок).
    points: 10
