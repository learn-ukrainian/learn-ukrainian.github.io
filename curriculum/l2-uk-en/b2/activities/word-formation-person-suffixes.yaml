- type: essay-response
  id: "essay-1"
  title: "Есе: Професійні ролі та мовний імідж"
  source_reading: "reading-job-advert"
  instruction: "Напишіть розгорнуту відповідь, дотримуючись офіційно-ділового стилю."
  prompt: |
    Уявіть, що ви подаєте своє резюме на вакансію, описану в попередньому завданні (читання). 
    Напишіть мотиваційний лист (150-200 слів), у якому ви переконуєте рекрутера, що саме ви є ідеальним кандидатом.
    Обов'язково використовуйте правильні назви осіб (наприклад, діяч, працівник, керівник, аналітик, слухач), щоб підкреслити свої професійні якості та розуміння корпоративної культури.
  min_words: 150
  model_answer: |
    Шановний керівнику відділу персоналу!
    Звертаюся до вас щодо відкритої вакансії. Я маю багаторічний досвід роботи в інноваційному секторі, де зарекомендував себе як проактивний діяч та надійний працівник. На моїй попередній посаді я щоденно взаємодіяв як досвідчений перемовник зі складними клієнтами та був уважним слухачем їхніх потреб. 
    Я глибоко розумію європейський ринок, оскільки раніше працював як провідний аналітик та дослідник маркетингових трендів. Я впевнений, що зможу стати цінним союзником для вашої команди та ефективним керівником для відділу стратегічних продажів. 
    Моя здатність швидко адаптуватися та вміння знаходити спільну мову з будь-яким співрозмовником роблять мене ідеальним кандидатом на цю посаду. У своїй роботі я завжди орієнтуюся на високі результати та командну синергію. Сподіваюся на можливість детальніше обговорити мій професійний досвід під час особистої зустрічі.
  rubric:
    - criteria: "Використання цільової лексики"
      description: "У тексті доречно вжито щонайменше 5 назв осіб із суфіксами -ач, -ник, -ар."
      points: 40
    - criteria: "Стилістична відповідність"
      description: "Текст витримано в офіційно-діловому стилі, тон переконливий та професійний."
      points: 30
    - criteria: "Граматична правильність"
      description: "Відсутні помилки в правописі суфіксів (зокрема, немає м'якого знака після 'р')."
      points: 30