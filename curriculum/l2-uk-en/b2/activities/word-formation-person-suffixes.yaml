- type: reading
  id: "reading-job-advert"
  title: "Аналіз тексту: Вакансія в IT-компанії"
  instruction: "Прочитайте уривок типової посадової інструкції та дайте відповіді на запитання."
  text: |
    Нашій інноваційній компанії терміново потрібен амбітний та досвідчений керівник відділу стратегічних продажів.
    Успішний кандидат на цю посаду — це насамперед проактивний, невтомний діяч, який ідеально розуміє кон'юнктуру європейського ринку.
    На цій позиції ви будете щоденно і тісно взаємодіяти з найрізноманітнішими фахівцями нашого офісу: починаючи від талановитих програмістів і закінчуючи надійними постачальниками обладнання.
    Ваш ідеальний працівник і підлеглий у нашій згуртованій команді — це насамперед дуже уважний, емпатичний слухач та геніальний, неперевершений перемовник.
  tasks:
    - "Які обов'язки передбачає посада керівника згідно з текстом?"
    - "Як суфікс -ач у слові 'діяч' підкреслює вимоги до кандидата?"
    - "Чому в тексті використано слово 'працівник', а не 'робітник'?"
    - "Які ще назви осіб згадуються в тексті та за допомогою яких суфіксів вони утворені?"

- type: true-false
  title: "Правила словотворення"
  instruction: "Визначте, чи є ці твердження про суфікси правильними."
  items:
    - statement: "Суфікс -ар завжди пишеться з м'яким знаком у кінці слова в називному відмінку."
      correct: false
      explanation: "В українській мові звук 'р' у кінці слова завжди залишається твердим (лікар, секретар)."
    - statement: "Слово 'лікар' історично утворене від дієслова 'лікувати'."
      correct: true
      explanation: "Це приклад того, як суфікс -ар може вказувати на постійну дію або професію."
    - statement: "Суфікс -ач найчастіше приєднується до дієслівних основ для позначення активного діяча."
      correct: true
      explanation: "Наприклад, викладати -> викладач, читати -> читач."
    - statement: "Слова 'робітник' і 'працівник' є абсолютними синонімами і можуть використовуватися в будь-якому контексті."
      correct: false
      explanation: "'Робітник' частіше позначає фізичну працю, а 'працівник' - загальний термін для найманої або інтелектуальної праці."
    - statement: "Вибір між варіантами -ар та -яр залежить виключно від останнього приголосного звука основи."
      correct: true
      explanation: "Після м'яких приголосних пишеться -яр (каменяр), після твердих і шиплячих - -ар (лікар, пекар)."
    - statement: "Форма слова 'викладник' є правильною літературною нормою для назви професії."
      correct: false
      explanation: "Правильна форма - 'викладач', оскільки суфікс -ач вказує на виконавця дії."
    - statement: "Фемінітиви на зразок 'викладачка' є нормативними в сучасному офіційно-діловому стилі."
      correct: true
      explanation: "Вони активно підтримуються новим правописом та діловим етикетом."
    - statement: "Суфікс -ник може вказувати на приналежність людини до певної соціальної групи чи професії."
      correct: true
      explanation: "Наприклад, керівник, робітник, письменник."
    - statement: "Після шиплячих приголосних (ж, ч, ш) завжди пишеться суфікс -яр."
      correct: false
      explanation: "Після шиплячих завжди пишеться твердий -ар (наприклад, піч -> пекар)."
    - statement: "Слово 'каменяр' походить від іменника 'камінь' і позначає роботу з матеріалом."
      correct: true
      explanation: "Це класичний приклад утворення від іменникової основи з м'яким приголосним."

- type: quiz
  title: "Перевірка розуміння теорії"
  instruction: "Оберіть одну правильну відповідь на кожне запитання."
  items:
    - question: "Яке з наведених слів означає людину, яка професійно викладає в університеті?"
      explanation: "Правильна форма утворюється за допомогою суфікса -ач, який позначає виконавця дії."
      options:
        - text: "викладач"
          correct: true
        - text: "викладник"
          correct: false
        - text: "викладар"
          correct: false
        - text: "викладень"
          correct: false
    - question: "Який суфікс необхідно додати до слова 'аптека', щоб утворити назву професії?"
      explanation: "Основа закінчується на твердий приголосний 'к', тому додається суфікс -ар."
      options:
        - text: "-ар"
          correct: true
        - text: "-яр"
          correct: false
        - text: "-ач"
          correct: false
        - text: "-ник"
          correct: false
    - question: "Яке з цих слів найкраще описує людину, яка виконує складну офісну чи інтелектуальну роботу?"
      explanation: "Слово 'працівник' є ширшим терміном для інтелектуальної та офісної праці."
      options:
        - text: "працівник"
          correct: true
        - text: "робітник"
          correct: false
        - text: "трудяга"
          correct: false
        - text: "робочий"
          correct: false
    - question: "Як правильно написати назву найпоширенішої медичної професії в називному відмінку однини?"
      explanation: "В українській мові звук 'р' у кінці слова завжди твердий."
      options:
        - text: "лікар"
          correct: true
        - text: "лікарь"
          correct: false
        - text: "лікорь"
          correct: false
        - text: "лікер"
          correct: false
    - question: "Яке з наведених слів історично утворене безпосередньо від прикметникової основи?"
      explanation: "Слово 'художник' утворене від прикметника 'художній'."
      options:
        - text: "художник"
          correct: true
        - text: "письменник"
          correct: false
        - text: "читач"
          correct: false
        - text: "слухач"
          correct: false
    - question: "Яку головну семантичну функцію виконує суфікс '-ач' у сучасній українській мові?"
      explanation: "Він перетворює дієслово на іменник, що означає безпосереднього діяча."
      options:
        - text: "вказує на активного виконавця дії"
          correct: true
        - text: "позначає інструмент для роботи"
          correct: false
        - text: "вказує на місце роботи особи"
          correct: false
        - text: "позначає пасивний об'єкт дії"
          correct: false
    - question: "Що означає метафоричне слово 'каменяр' у відомій поезії українського письменника Івана Франка?"
      explanation: "У літературі це слово стало потужним символом духовної сили."
      options:
        - text: "борець за соціальний прогрес"
          correct: true
        - text: "майстер з обробки каменю"
          correct: false
        - text: "будівельник нових доріг"
          correct: false
        - text: "продавець будівельних матеріалів"
          correct: false
    - question: "Який суфікс найчастіше використовується для позначення належності людини до певної соціальної групи?"
      explanation: "Суфікс -ник є універсальним для ролей та приналежності (спільник, учасник)."
      options:
        - text: "-ник"
          correct: true
        - text: "-ач"
          correct: false
        - text: "-ар"
          correct: false
        - text: "-яр"
          correct: false
    - question: "Як правильно утворити сучасний фемінітив від іменника 'слухач' у діловому мовленні?"
      explanation: "Найпоширеніший спосіб - додавання суфікса -к(а)."
      options:
        - text: "слухачка"
          correct: true
        - text: "слухачиха"
          correct: false
        - text: "слухачиня"
          correct: false
        - text: "слуханкиня"
          correct: false
    - question: "Від якого базового слова етимологічно походить поширений академічний термін 'дослідник'?"
      explanation: "Дослідник - це особа, яка виконує дію 'досліджувати'."
      options:
        - text: "досліджувати"
          correct: true
        - text: "слід"
          correct: false
        - text: "слідити"
          correct: false
        - text: "слідопит"
          correct: false

