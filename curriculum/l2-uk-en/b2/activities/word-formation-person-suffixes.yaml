- type: group-sort
  title: "Розподіліть слова за суфіксами"
  instruction: "Віднесіть кожне слово до правильної групи залежно від суфікса, за допомогою якого воно утворене."
  groups:
    - name: "Суфікс -ар / -яр"
      items:
        - "лікар"
        - "бібліотекар"
        - "каменяр"
        - "аптекар"
        - "школяр"
    - name: "Суфікс -ач"
      items:
        - "викладач"
        - "читач"
        - "слухач"
        - "споживач"
        - "діяч"
    - name: "Суфікс -ник"
      items:
        - "робітник"
        - "працівник"
        - "письменник"
        - "керівник"
        - "захисник"

- type: fill-in
  title: "Доповніть речення"
  instruction: "Виберіть правильне слово, щоб завершити речення."
  items:
    - sentence: "Цей досвідчений _____ уважно вислухав усі мої скарги на здоров'я."
      answer: "лікар"
      options:
        - "лікар"
        - "аптекар"
        - "діяч"
        - "керівник"
    - sentence: "Головний _____ курсу підготував надзвичайно цікаву презентацію."
      answer: "викладач"
      options:
        - "викладач"
        - "дослідник"
        - "письменник"
        - "робітник"
    - sentence: "Компанія терміново шукає нових _____ для роботи на металургійному заводі."
      answer: "робітників"
      options:
        - "робітників"
        - "працівників"
        - "діячів"
        - "слухачів"
    - sentence: "Кожен державний _____ повинен суворо дотримуватися професійної етики."
      answer: "працівник"
      options:
        - "працівник"
        - "робітник"
        - "кобзар"
        - "каменяр"
    - sentence: "Відомий український _____ Сергій Жадан презентував свою нову книгу."
      answer: "письменник"
      options:
        - "письменник"
        - "читач"
        - "бібліотекар"
        - "слухач"
    - sentence: "Наша найактивніша _____ надіслала дуже детальний відгук на статтю."
      answer: "читачка"
      options:
        - "читачка"
        - "діячка"
        - "робітниця"
        - "лікарка"
    - sentence: "Нам потрібен амбітний _____ для нового відділу стратегічних продажів."
      answer: "керівник"
      options:
        - "керівник"
        - "захисник"
        - "споживач"
        - "аптекар"
    - sentence: "Цей талановитий _____ опублікував революційну наукову статтю про космос."
      answer: "дослідник"
      options:
        - "дослідник"
        - "спільник"
        - "учасник"
        - "пекар"
    - sentence: "Сучасний ринок швидко змінюється, тому кожен _____ повинен бути уважним."
      answer: "споживач"
      options:
        - "споживач"
        - "кобзар"
        - "вівчар"
        - "школяр"
    - sentence: "Старий мандрівний _____ виконував давні історичні думи на площі."
      answer: "кобзар"
      options:
        - "кобзар"
        - "керівник"
        - "аптекар"
        - "робітник"

- type: cloze
  title: "Текст з пропусками: Рекрутинг"
  instruction: "Заповніть пропуски відповідними назвами осіб."
  passage: |
    Сьогодні український ринок праці є дуже динамічним. Кожен сучасний {{1}} шукає в свою команду справжніх професіоналів. Якщо ви досвідчений {{2}} або талановитий {{3}}, ви легко знайдете роботу. Для нас важливо, щоб кожен новий {{4}} розумів наші корпоративні цінності. Наш ідеальний {{5}} — це проактивний {{6}}, а не пасивний {{7}}.
    На заводі потрібен кваліфікований {{8}}, який вміє працювати зі складним обладнанням. У лікарні відкрита вакансія: потрібен головний {{9}} та уважний {{10}} або {{11}}.
    В університеті новий {{12}} має зацікавити студентів. Кожен {{13}} лекції повинен брати активну участь у дискусії. Успішний {{14}} завжди перевіряє свої гіпотези. Великий {{15}} створює нові світи, а відданий {{16}} живе в них.
  blanks:
    - id: 1
      answer: "керівник"
      options: ["керівник", "робітник", "діяч", "читач"]
    - id: 2
      answer: "аналітик"
      options: ["аналітик", "аптекар", "бібліотекар", "пекар"]
    - id: 3
      answer: "розробник"
      options: ["розробник", "каменяр", "вівчар", "бджоляр"]
    - id: 4
      answer: "працівник"
      options: ["працівник", "робітник", "письменник", "художник"]
    - id: 5
      answer: "кандидат"
      options: ["кандидат", "учасник", "спільник", "союзник"]
    - id: 6
      answer: "діяч"
      options: ["діяч", "лікар", "школяр", "кобзар"]
    - id: 7
      answer: "спостерігач"
      options: ["спостерігач", "слухач", "викладач", "споживач"]
    - id: 8
      answer: "робітник"
      options: ["робітник", "працівник", "керівник", "наставник"]
    - id: 9
      answer: "лікар"
      options: ["лікар", "лікарь", "лікарю", "лікорь"]
    - id: 10
      answer: "фармацевт"
      options: ["фармацевт", "фермер", "фінансист", "фотограф"]
    - id: 11
      answer: "аптекар"
      options: ["аптекар", "аптекарь", "аптекарю", "аптечник"]
    - id: 12
      answer: "викладач"
      options: ["викладач", "викладник", "викладар", "викладень"]
    - id: 13
      answer: "слухач"
      options: ["слухач", "слухатель", "слухальник", "слухар"]
    - id: 14
      answer: "дослідник"
      options: ["дослідник", "дослідач", "дослідар", "дослідень"]
    - id: 15
      answer: "письменник"
      options: ["письменник", "писатєль", "писар", "писець"]
    - id: 16
      answer: "читач"
      options: ["читач", "читатель", "читайло", "читар"]

- type: error-correction
  title: "Виправте типові помилки"
  instruction: "Знайдіть і виправте орфографічні та стилістичні помилки в назвах професій."
  items:
    - sentence: "Цей лікарь дуже допоміг моїй родині минулого року."
      error: "лікарь"
      answer: "лікар"
      options: ["лікар", "лікарь", "лікарю", "лікорь"]
      explanation: "В українській мові звук 'р' у кінці слова залишається твердим."
    - sentence: "Наш новий викладник дуже цікаво подає складний матеріал."
      error: "викладник"
      answer: "викладач"
      options: ["викладач", "викладник", "викладар", "викладень"]
      explanation: "Правильна форма 'викладач' утворюється за допомогою суфікса -ач."
    - sentence: "На заводі не вистачає кваліфікованих працівників для важкої фізичної роботи."
      error: "працівників"
      answer: "робітників"
      options: ["робітників", "працівників", "діячів", "керівників"]
      explanation: "Для важкої фізичної праці використовується термін 'робітник'."
    - sentence: "Цей секретарь працює в нашій корпорації вже понад десять років."
      error: "секретарь"
      answer: "секретар"
      options: ["секретар", "секретарь", "секретарю", "секретарів"]
      explanation: "М'який знак після 'р' у кінці слова не пишеться."
    - sentence: "Він дуже талановитий каменар, який робить неймовірні гранітні скульптури."
      error: "каменар"
      answer: "каменяр"
      options: ["каменяр", "каменар", "каменщик", "камінець"]
      explanation: "Після м'якого приголосного основи 'н' використовується суфікс -яр."
    - sentence: "Кожен слухатель нашої відкритої лекції отримає електронний сертифікат."
      error: "слухатель"
      answer: "слухач"
      options: ["слухач", "слухатель", "слухальник", "слухачю"]
