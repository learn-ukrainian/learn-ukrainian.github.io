- type: reading
  title: 'Уривок для аналізу: Динаміка вокзалу'
  instruction: 'Прочитайте уривок та дайте відповіді на запитання.'
  text: |
    Величезна, залита яскравим світлом головна зала центрального київського вокзалу завжди нагадувала розбурханий мурашник. Час від часу повз мене стрімко мчали знервовані люди з великими валізами. Неподалік спокійно крокував охоронець у синій формі. Трохи далі сумно брів самотній старенький дідусь, а поруч дзвінко тупали маленькі діти. Величезна юрба невпинно неслася до виходів на посадку.
  tasks:
    - 'Яке дієслово передає найвищу швидкість та неконтрольованість у цьому тексті?'
    - 'Якими словами автор підкреслює впевненість охоронця?'
    - 'Чому для дідуся обрано слово брів?'
    - 'Які звукові асоціації створює дієслово тупали?'

- type: true-false
  title: 'Правда чи хибність: Стилістика руху'
  instruction: 'Визначте, чи є ці твердження правильними.'
  items:
    - statement: 'Дієслово йти описує регулярний, повторюваний рух людини.'
      correct: false
      explanation: 'Йти позначає односпрямований рух, а ходити — регулярний.'
    - statement: 'Слово чимчикувати має іронічний відтінок та означає повільний ритмічний рух.'
      correct: true
      explanation: 'Це народне слово використовується для теплого розмовного стилю.'
    - statement: 'Вираз багато ходити – довго жити пов’язаний із концепцією здоров’я.'
      correct: true
      explanation: 'В українській культурі рух тісно пов’язаний із життєвою силою.'
    - statement: 'Дієслово крокувати часто передає меланхолійний та сумний настрій.'
      correct: false
      explanation: 'Крокувати має позитивну конотацію впевненості та бадьорості.'
    - statement: 'Брести означає рухатися швидко та без будь-яких перешкод.'
      correct: false
      explanation: 'Брести означає важкий рух із подоланням фізичного опору.'
    - statement: 'Дієслово нестися містить семантичний компонент втрати контролю.'
      correct: true
      explanation: 'Воно часто описує стихійні явища або небезпечні ситуації.'
    - statement: 'Фразеологізм на ходу підметки рве описує людину з поганим взуттям.'
      correct: false
      explanation: 'Це метафора, яка позначає дуже хитру та соціально спритну людину.'
    - statement: 'Дієслово тупати зміщує акцент із візуального сприйняття на аудіальне.'
      correct: true
      explanation: 'Це слово підкреслює звук кроків по поверхні.'
    - statement: 'Мчати часто передбачає наявність цілеспрямованості та високої швидкості.'
      correct: true
      explanation: 'Це слово ідеально підходить для швидких потягів або людей, що поспішають.'
    - statement: 'Блукати позначає впевнений рух до чітко визначеної мети.'
      correct: false
      explanation: 'Блукати означає відсутність чіткої мети та дезорієнтацію.'

- type: match-up
