- type: translate
  title: 'Перекладіть речення'
  instruction: 'Оберіть найбільш точний український переклад, враховуючи стилістику та відтінки.'
  items:
    - source: 'I go to work every day.'
      explanation: 'Регулярна дія вимагає використання ходити.'
      options:
        - text: 'Я щодня ходжу на роботу.'
          correct: true
        - text: 'Я щодня йду на роботу.'
          correct: false
        - text: 'Я завжди іду до роботи.'
          correct: false
    - source: 'The tired man was trudging through the deep snow.'
      explanation: 'Trudge через сніг і втома найкраще перекладаються словом брести.'
      options:
        - text: 'Втомлений чоловік брів через глибокий сніг.'
          correct: true
        - text: 'Втомлений чоловік крокував через сніг.'
          correct: false
        - text: 'Втомлений чоловік чимчикував через сніг.'
          correct: false
    - source: 'The soldiers were striding proudly across the square.'
      explanation: 'Stride з гордістю означає крокувати.'
      options:
        - text: 'Солдати гордо крокували площею.'
          correct: true
        - text: 'Солдати гордо брели площею.'
          correct: false
        - text: 'Солдати гордо тупали площею.'
          correct: false
    - source: 'Look, our new teacher is walking down the street.'
      explanation: 'Одномоментна дія зараз перекладається як іде.'
      options:
        - text: 'Подивися, вулицею іде наш новий викладач.'
          correct: true
        - text: 'Подивися, вулицею ходить наш новий викладач.'
          correct: false
        - text: 'Подивися, вулицею чимчикує наш викладач.'
          correct: false
    - source: 'The little girl was pattering happily barefoot.'
      explanation: 'Patter (звук легких кроків) перекладається як тупати.'
      options:
        - text: 'Маленька дівчинка весело тупала босоніж.'
          correct: true
        - text: 'Маленька дівчинка весело мчала босоніж.'
          correct: false
        - text: 'Маленька дівчинка весело брела босоніж.'
          correct: false
    - source: 'The heavy truck was hurtling out of control.'
      explanation: 'Hurtle (втрата контролю) перекладається як нестися.'
      options:
        - text: 'Важка вантажівка неконтрольовано неслася.'
          correct: true
        - text: 'Важка вантажівка швидко мчала.'
          correct: false
        - text: 'Важка вантажівка впевнено крокувала.'
          correct: false
    - source: 'He is so cunning, he tears the soles on the go.'
      explanation: 'Тут використовується метафора соціальної хитрості.'
      options:
        - text: 'Він такий хитрий, просто на ходу підметки рве.'
          correct: true
        - text: 'Він такий хитрий, швидко ходить і рве взуття.'
          correct: false
        - text: 'Він такий хитрий, що бігає дуже швидко.'
          correct: false
    - source: 'We had to trudge all the way home.'
      explanation: 'Тут trudge в іронічному довгому шляху найкраще перекласти як чимчикувати або довго йти.'
      options:
        - text: 'Нам довелося чимчикувати всю дорогу додому.'
          correct: true
        - text: 'Нам довелося мчати всю дорогу додому.'
          correct: false
        - text: 'Нам довелося нестися всю дорогу додому.'
          correct: false

- type: essay-response
  title: 'Стилістика руху: Аналітичне есе'
  instruction: 'Напишіть невелике есе обсягом 100-150 слів.'
  prompt: 'Уявіть ситуацію: "Велика, чорна хмара насувалася з лісу. Вітер шалено мчав верхівками дерев. Люди на полі кинули свої граблі і з переляком неслися до найближчого сховища. Тільки старий дід повільно брів своєю стежкою, ніби не помічаючи небезпеки." Проаналізуйте, як вибір слів «мчав», «неслися» та «брів» допомагає створити контраст між стихією, панікою людей та спокоєм діда.'
  model_answer: |
    У цьому невеликому уривку автор майстерно використовує дієслова руху для створення психологічного та емоційного контрасту. Дієслово «мчав» передає неймовірну швидкість та цілеспрямованість небезпечної природної стихії. Дієслово «неслися» має сильний компонент втрати контролю; люди не просто біжать, вони охоплені панікою та жахом, рятуючи своє життя. Натомість, дієслово «брів» використовується для опису старого діда, що підкреслює його фізичну втому або абсолютну покірність долі. Цей контраст між динамічним хаосом («мчав», «неслися») та статичним фаталізмом («брів») створює надзвичайно сильну та реалістичну драматичну картину.