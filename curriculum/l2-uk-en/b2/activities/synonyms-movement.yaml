- type: fill-in
  title: 'Заповніть пропуски відповідним дієсловом'
  instruction: 'Оберіть дієслово руху, яке найкраще відповідає контексту речення.'
  items:
    - sentence: 'Маленька дівчинка весело і безтурботно ___ ніжками по підлозі.'
      answer: 'тупала'
      options: ['тупала', 'мчала', 'неслася', 'блукала']
      explanation: 'Слово тупала найкраще передає легкі кроки дитини та звук.'
    - sentence: 'Ми дуже довго, загубивши компас, приречено ___ карпатським лісом.'
      answer: 'блукали'
      options: ['блукали', 'крокували', 'чимчикували', 'мчали']
      explanation: 'Втрата компаса та відсутність напрямку вимагають дієслова блукали.'
    - sentence: 'Військові рівно та впевнено ___ головною площею столиці.'
      answer: 'крокували'
      options: ['крокували', 'брели', 'тупали', 'неслися']
      explanation: 'Для опису урочистої ходи використовується дієслово крокувати.'
    - sentence: 'Після аварії вантажівка неконтрольовано ___ на зустрічну смугу.'
      answer: 'неслася'
      options: ['неслася', 'крокувала', 'йшла', 'чимчикувала']
      explanation: 'Втрата контролю та небезпека вимагають дієслова нестися.'
    - sentence: 'Оскільки автобус поїхав, нам довелося цілу годину ___ пішки.'
      answer: 'чимчикувати'
      options: ['чимчикувати', 'мчати', 'летіти', 'повзти']
      explanation: 'Чимчикувати ідеально підходить для іронічного опису вимушеної тривалої прогулянки.'
    - sentence: 'Втомлені мандрівники ледве ___ по глибокому, пухкому снігу.'
      answer: 'брели'
      options: ['брели', 'крокували', 'бігли', 'мчали']
      explanation: 'Фізичний опір снігу та втома вимагають дієслова брести.'
    - sentence: 'Сучасний швидкісний потяг гучно ___ крізь нічну темряву.'
      answer: 'мчав'
      options: ['мчав', 'брів', 'крокував', 'тупав']
      explanation: 'Для швидкого транспорту з чітким напрямком підходить мчати.'
    - sentence: 'Щоб мати здорове серце, треба завжди пам’ятати, що багато ___ – довго жити.'
      answer: 'ходити'
      options: ['ходити', 'бігати', 'стояти', 'сидіти']
      explanation: 'Це відоме народне прислів’я про важливість руху.'
    - sentence: 'Я щодня ___ на роботу цим мальовничим старим парком.'
      answer: 'ходжу'
      options: ['ходжу', 'йду', 'крокую', 'бреду']
      explanation: 'Слово щодня вказує на регулярність, тому потрібне дієслово ходити.'
    - sentence: 'Подивися, он ___ наш новий викладач історії.'
      answer: 'іде'
      options: ['іде', 'ходить', 'мчить', 'несеться']
      explanation: 'Дія відбувається прямо зараз в одному напрямку, тому іде.'

- type: quiz
  title: 'Тест на стилістичні відтінки'
  instruction: 'Оберіть правильну відповідь до кожного запитання.'
  items:
    - question: 'Яке дієслово найкраще передає звук важких людських кроків по дерев’яній підлозі?'
      explanation: 'Дієслово тупати зміщує фокус на акустичні властивості пересування.'
      options:
        - text: 'тупати'
          correct: true
        - text: 'мчати'
          correct: false
        - text: 'нестися'
          correct: false
        - text: 'чимчикувати'
          correct: false
    - question: 'Що означає український фразеологізм на ходу підметки рве у розмовній мові?'
      explanation: 'Він є метафорою соціальної спритності, меткості та певної хитрості.'
      options:
        - text: 'бути дуже спритним та хитрим у соціальних справах'
          correct: true
        - text: 'мати старе, зношене та неякісне взуття'
          correct: false
        - text: 'займатися професійним ремонтом одягу та чобіт'
          correct: false
        - text: 'швидко бігати під час спортивних марафонських змагань'
          correct: false
    - question: 'Як правильно побудувати речення про регулярну щоденну дію?'
      explanation: 'Регулярна, звична дія вимагає дієслова ходити замість йти.'
      options:
        - text: 'Я щодня ходжу до великого супермаркету.'
          correct: true
        - text: 'Я щодня йду до великого супермаркету.'
          correct: false
        - text: 'Я завжди іду в цей старий магазин.'
          correct: false
        - text: 'Моя сестра щоранку йде до школи.'
          correct: false
    - question: 'Яке дієслово варто обрати для опису втомленої людини, яка йде по глибокому болоту?'
      explanation: 'Дієслово брести ідеально передає важкий рух та опір зовнішнього середовища.'
      options:
        - text: 'брести'
          correct: true
        - text: 'крокувати'
          correct: false
        - text: 'чимчикувати'
          correct: false
        - text: 'бігати'
          correct: false
    - question: 'Яке слово має яскраво виражену позитивну конотацію бадьорості, гордості та детермінованості?'
      explanation: 'Слово крокувати означає впевнений, ритмічний рух із чіткою метою.'
      options:
        - text: 'крокувати'
          correct: true
        - text: 'блукати'
          correct: false
        - text: 'брести'
          correct: false
        - text: 'тупати'
          correct: false
    - question: 'Чому для опису небезпечної ситуації з вантажівкою без гальм краще використати слово нестися?'
      explanation: 'Тому що воно має важливий семантичний компонент втрати контролю над рухом.'
      options:
        - text: 'воно вказує на абсолютну втрату контролю над рухом'
          correct: true
        - text: 'воно означає найбільш безпечний та комфортний рух'
          correct: false
        - text: 'воно використовується лише для опису людей, а не машин'
          correct: false
        - text: 'воно позначає повільний, дуже обережний рух водія'
          correct: false
    - question: 'Що підкреслює українське народне дієслово чимчикувати у повсякденній розповіді?'
      explanation: 'Це слово найчастіше вживається з іронічним підтекстом для опису тривалої пішої прогулянки.'
      options:
        - text: 'тривалий рух пішки без поспіху з іронічним відтінком'
          correct: true
        - text: 'неймовірно швидкий біг від реальної фізичної небезпеки'
          correct: false
        - text: 'офіційну урочисту ходу військових на параді у столиці'
          correct: false
        - text: 'повну дезорієнтацію в просторі та втрату життєвої надії'
          correct: false
    - question: 'Що означає популярний вислів крокувати в ногу з часом у переносному значенні?'
      explanation: 'Він означає бути сучасним, відповідати викликам сьогодення.'
      options:
        - text: 'розвиватися і бути сучасним у своєму житті чи роботі'
          correct: true
        - text: 'ходити дуже швидко і завжди поспішати на зустріч'
          correct: false
        - text: 'маршувати разом із військовими в одному чіткому ритмі'
          correct: false
        - text: 'мати багато вільного часу для довгих піших прогулянок'
          correct: false
    - question: 'Яке слово найкраще описує швидкий рух сучасного потяга, що їде за точним розкладом?'
      explanation: 'Мчати передбачає високу швидкість та цілеспрямованість транспорту.'
      options:
        - text: 'мчати'
          correct: true
        - text: 'бігти'
          correct: false
        - text: 'крокувати'
          correct: false
        - text: 'брести'
          correct: false
    - question: 'Чому дієслова блукати і брести часто використовуються в художній літературі разом?'
      explanation: 'Цей стилістичний тандем чудово передає психологічну втому та розгубленість.'
      options:
        - text: 'вони передають стан глибокої меланхолії та розгубленості'
          correct: true
        - text: 'вони означають велику радість та невичерпну життєву енергію'
          correct: false
        - text: 'вони описують виключно регулярний маршрут людини на роботу'
          correct: false
        - text: 'вони вказують на неймовірну соціальну спритність персонажа'
          correct: false

- type: unjumble
  title: 'Складіть речення: Відтінки руху'
  instruction: 'Розташуйте слова у правильному порядку, щоб утворити граматично коректні речення.'
  items:
    - words: ['Багато', 'ходити', '—', 'це', 'означає', 'довго', 'жити.']
      answer: 'Багато ходити — це означає довго жити.'
    - words: ['Військові', 'солдати', 'впевнено', 'крокували', 'головною', 'площею', 'міста.']
      answer: 'Військові солдати впевнено крокували головною площею міста.'
    - words: ['Цей', 'хитрий', 'співробітник', 'буквально', 'на', 'ходу', 'підметки', 'рве.']
      answer: 'Цей хитрий співробітник буквально на ходу підметки рве.'
    - words: ['Старий', 'дідусь', 'дуже', 'важко', 'брів', 'через', 'глибокий', 'сніг.']
      answer: 'Старий дідусь дуже важко брів через глибокий сніг.'
    - words: ['Маленька', 'дівчинка', 'дзвінко', 'тупала', 'ніжками', 'по', 'дерев’яній', 'підлозі.']
      answer: 'Маленька дівчинка дзвінко тупала ніжками по дерев’яній підлозі.'
    - words: ['Велика', 'вантажівка', 'неконтрольовано', 'неслася', 'на', 'зустрічну', 'смугу', 'руху.']
      answer: 'Велика вантажівка неконтрольовано неслася на зустрічну смугу руху.'
    - words: ['Швидкісний', 'сучасний', 'потяг', 'гучно', 'мчав', 'крізь', 'нічну', 'темряву.']
      answer: 'Швидкісний сучасний потяг гучно мчав крізь нічну темряву.'
    - words: ['Мені', 'довелося', 'цілу', 'довгу', 'годину', 'чимчикувати', 'до', 'дому.']
      answer: 'Мені довелося цілу довгу годину чимчикувати до дому.'

- type: error-correction
  title: 'Виправте лексичні та граматичні помилки'
  instruction: 'Знайдіть некоректне слово у реченні та оберіть правильний варіант.'
  items:
    - sentence: 'Я завжди йду до супермаркету, щоб купити свіжий хліб.'
      error: 'йду'
      answer: 'ходжу'
      options: ['ходжу', 'біжу', 'їду', 'повзу']
      explanation: 'Слово завжди вказує на регулярність, тому потрібно використовувати ходити.'
    - sentence: 'Моя сестра щоранку йде в гості до старих друзів.'
      error: 'йде'
      answer: 'ходить'
      options: ['ходить', 'крокує', 'мчить', 'несеться']
      explanation: 'Регулярна дія (щоранку) вимагає дієслова ходити.'
    - sentence: 'Подивися, он по вулиці ходить наш новий викладач історії.'
      error: 'ходить'
      answer: 'іде'
      options: ['іде', 'бреде', 'мчить', 'тупає']
      explanation: 'Дія відбувається в один конкретний момент, тому потрібно іде.'
    - sentence: 'Я дуже швидко кушаю свій сніданок перед школою.'
      error: 'кушаю'
      answer: 'їм'
      options: ['їм', 'їжу', 'кусаю', 'гризу']
      explanation: 'Слово кушати є русизмом, правильно українською казати їсти.'
    - sentence: 'Новий автомобіль біжить по рівній трасі дуже плавно.'
      error: 'біжить'
      answer: 'їде'
      options: ['їде', 'мчить', 'несеться', 'крокує']
      explanation: 'Для механічного транспорту українська мова вимагає дієслів їхати або мчати.'
    - sentence: 'Стомлений мандрівник швидко крокував по глибокому пухкому снігу.'
      error: 'крокував'
      answer: 'брів'
      options: ['брів', 'мчав', 'біг', 'тупав']
      explanation: 'Важкий рух із втомою і через сніг найкраще передається словом брів.'
    - sentence: 'Солдати на параді повільно брели площею під звуки маршу.'
      error: 'брели'
      answer: 'крокували'
      options: ['крокували', 'бігли', 'неслися', 'чимчикували']
      explanation: 'Для опису урочистої військової ходи використовується дієслово крокувати.'
    - sentence: 'Цей хлопець дуже хитрий, він на ходу підошви рве.'
      error: 'підошви'
      answer: 'підметки'
      options: ['підметки', 'чоботи', 'черевики', 'шнурки']
      explanation: 'Правильний український фразеологізм звучить як на ходу підметки рве.'

- type: cloze
