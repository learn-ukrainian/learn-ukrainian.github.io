- type: quiz
  title: 'Тест: Контексти вживання'
  instruction: Оберіть одну правильну відповідь на кожне запитання.
  items:
  - question: Який філософський термін позначає серце як центр пізнання та духовного
      життя людини?
    explanation: Кордоцентризм — це унікальна українська філософія серця.
    options:
    - text: кордоцентризм
      correct: true
    - text: раціоналізм
      correct: false
    - text: егоцентризм
      correct: false
    - text: інтелектуалізм
      correct: false
  - question: Що саме має на увазі людина, коли відверто каже, що в неї душа в п'яти
      ховається?
    explanation: Цей вираз описує тваринний страх або паніку під час загрози.
    options:
    - text: Вона відчуває дуже сильний, раптовий переляк.
      correct: true
    - text: Вона почувається надзвичайно втомленою після важкої роботи.
      correct: false
    - text: Вона відчуває сильний фізичний біль у ногах.
      correct: false
    - text: Вона намагається непомітно втекти з приміщення.
      correct: false
  - question: Який фразеологізм найкраще використати, якщо ви хочете точно описати
      стан тривалого емоційного тягаря?
    explanation: Метафора каменя на душі чудово передає внутрішню провину чи смуток.
    options:
    - text: носити камінь на душі
      correct: true
    - text: вкладати свою чисту душу
      correct: false
    - text: брати щось близько до серця
      correct: false
    - text: мати надзвичайно добре серце
      correct: false
  - question: У якій із наведених ситуацій використання виразу віддати Богу душу буде
      вважатися абсолютно правильним?
    explanation: Це урочистий евфемізм для природної смерті в старості, не для техніки.
    options:
    - text: Коли уві сні мирно помирає старенька, поважна людина.
      correct: true
    - text: Коли раптово ламається ваш новий робочий комп'ютер.
      correct: false
    - text: Коли молода людина гине в трагічній автомобільній аварії.
      correct: false
    - text: Коли студент дуже міцно засинає після важкого іспиту.
      correct: false
  - question: Яке дієслово найчастіше вживається разом зі словом душа для висловлення
      найвищого ступеня співчуття до інших?
    explanation: 'Ми традиційно кажемо: у мене душа болить за долю цих людей.'
    options:
    - text: болить
      correct: true
    - text: співає
      correct: false
    - text: плаче
      correct: false
    - text: мовчить
      correct: false
  - question: Як правильно і красиво сказати про творчого майстра, який працює з величезним
      натхненням та любов'ю?
    explanation: Вкладати душу — це процес повної творчої самовіддачі.
    options:
    - text: Він завжди вкладає душу у свою роботу.
      correct: true
    - text: Він щодня знімає камінь зі своєї душі.
      correct: false
    - text: Він бере чужу роботу дуже близько до серця.
      correct: false
    - text: Він просто має велике і дуже щире серце.
      correct: false
  - question: Який дуже сильний фразеологізм використовується для опису нестерпного
      жалю від споглядання чужого горя?
    explanation: Це найсильніша метафора болю від надзвичайної емпатії.
    options:
    - text: серце кров'ю обливається
      correct: true
    - text: серце повільно падає в п'яти
      correct: false
    - text: душа починає дуже гірко плакати
      correct: false
    - text: важкий камінь лягає просто на серце
      correct: false
  - question: Чим саме кардинально відрізняється вираз брати за серце від схожого
      виразу брати до серця?
    explanation: За серце бере красивий зовнішній об'єкт, а до серця людина бере чужі
      проблеми.
    options:
    - text: Брати за серце — це про зовнішнє зворушення від краси чи доброго вчинку.
      correct: true
    - text: Брати до серця — це про дуже позитивні, радісні почуття людини.
      correct: false
    - text: Ці два вирази є абсолютно повними синонімами в сучасній мові.
      correct: false
    - text: Брати за серце означає мати певні медичні проблеми з кардіологією.
      correct: false
  - question: Як українською мовою найкраще та найбільш природно перекласти англійське
      емоційне прохання have a heart?
    explanation: Дослівний переклад мати серце звучить неприродно. Ми апелюємо до
      совісті.
    options:
    - text: Майте ж ви нарешті совість!
      correct: true
    - text: Будь ласка, завжди майте серце!
      correct: false
    - text: У вас завжди є своє серце!
      correct: false
    - text: Дайте мені ваше велике серце!
      correct: false
  - question: Що точно означає вставна конструкція поклавши руку на серце під час
      дуже серйозної розмови?
    explanation: Цей вираз є надійним маркером максимальної відвертості мовця.
    options:
    - text: Мовець обіцяє сказати абсолютно чесну, відверту і неприкрашену правду.
      correct: true
    - text: Мовець дуже сильно хвилюється за своє поточне фізичне здоров'я.
      correct: false
    - text: Мовець щиро просить свого співрозмовника бути більш милосердним.
      correct: false
    - text: Мовець урочисто клянеться ніколи не розповідати цей секрет іншим.
      correct: false
- type: fill-in
  title: Доповніть фразеологізми
  instruction: Вставте пропущене слово, щоб утворити правильний соматичний вираз.
  items:
  - sentence: Коли раптом пролунав страшний вибух, у мене від страху душа в п'яти
      пішла.
    answer: п'яти
    options:
    - п'яти
    - ноги
    - руки
    - черевики
    explanation: 'Правильно: душа в п''яти пішла.'
  - sentence: Після складної розмови з другом мені здалося, ніби важкий камінь з душі
      впав.
    answer: камінь
    options:
    - камінь
    - тягар
    - годинник
    - метал
    explanation: 'Правильно: камінь з душі впав.'
  - sentence: Цей талановитий архітектор завжди вкладає всю свою душу в кожен новий
      проект.
    answer: душу
    options:
    - душу
    - енергію
    - голову
    - силу
    explanation: 'Правильно: вкладати душу.'
  - sentence: Коли я бачу цих бездомних тварин, моє серце просто кров'ю обливається
      від жалю.
    answer: кров'ю
    options:
    - кров'ю
    - сльозами
    - водою
    - фарбою
    explanation: 'Правильно: серце кров''ю обливається.'
  - sentence: Ця старовинна народна пісня настільки красива, що завжди бере мене за
      серце.
    answer: серце
    options:
    - серце
    - душу
    - руку
    - розум
    explanation: 'Правильно: бере за серце.'
  - sentence: Поклавши руку на серце, мушу відверто визнати, що ми тоді зробили помилку.
    answer: руку
    options:
    - руку
    - долоню
    - пальці
    - голову
    explanation: 'Правильно: поклавши руку на серце.'
  - sentence: Майте ж ви нарешті серце і допоможіть цій бідній, самотній людині!
    answer: серце
    options:
    - серце
    - розум
    - гроші
    - час
    explanation: 'Правильно: мати серце (бути милосердним).'
  - sentence: Я щиро вітаю вас із ювілеєм від щирого серця і бажаю міцного здоров'я.
    answer: щирого
    options:
    - щирого
    - доброго
    - великого
    - чистого
    explanation: 'Правильно: від щирого серця.'
  - sentence: Моя душа постійно і нестерпно болить за долю цих талановитих молодих
      людей.
    answer: болить
    options:
    - болить
    - страждає
    - плаче
    - переживає
    explanation: 'Правильно: душа болить за когось.'
  - sentence: Лікар настійно порадив йому не брати дрібні проблеми так близько до
      серця.
    answer: близько
    options:
    - близько
    - сильно
    - глибоко
    - важко
    explanation: 'Правильно: брати близько до серця.'
