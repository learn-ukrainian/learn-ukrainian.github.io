  - source: To be honest, I didn't like that new movie at all.
    options:
    - text: Поклавши руку на серце, мені цей фільм зовсім не сподобався.
      correct: true
    - text: Поклавши своє серце на руку, мені не сподобалося.
      correct: false
    - text: Будучи дуже чесним із серцем, мені не сподобалося.
      correct: false
    - text: З правою рукою на серці скажу, що не сподобалося.
      correct: false
    explanation: Вставна конструкція поклавши руку на серце є найкращим маркером відвертості.
- type: mark-the-words
  title: Знайдіть дієслова, що керують соматизмами
  instruction: Знайдіть і позначте всі дієслова, які керують соматичними іменниками
    у цих реченнях.
  text: Від раптового жаху її душа сховалася в п'яти. Після цієї відвертої розмови
    величезний камінь впав з душі. Цей талановитий молодий актор вкладає усю свою
    енергію в цю складну роль. Ця трагічна історія переселенців дуже бере за серце
    кожного емпатичного глядача.
  answers:
  - сховалася
  - впав
  - вкладає
