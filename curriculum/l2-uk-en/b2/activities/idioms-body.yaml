    - text: Коли спокійно йде з життя шанована довгожителька.
      correct: true
    - text: Коли раптово зламався ваш новий дорогий смартфон.
      correct: false
    - text: Коли випадково розбилася ваша улюблена чашка.
      correct: false
    - text: Коли студент з ганьбою провалив важливий іспит.
