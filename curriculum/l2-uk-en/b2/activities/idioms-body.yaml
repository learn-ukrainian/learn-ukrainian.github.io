- type: reading
  title: 'Читання: Кордоцентризм в українській культурі'
  instruction: Прочитайте текст та дайте відповіді на запитання.
  text: В основі української світоглядної ментальності лежить поняття кордоцентризму.
    Цей термін походить від латинського слова cordis, що означає серце. Видатний філософ
    Григорій Сковорода вважав, що саме серце, а не холодний прагматичний розум, є
    абсолютним центром духовного та емоційного буття людини. Згідно з його вченням,
    справжнє пізнання світу відбувається через глибоке емоційне співпереживання. Саме
    тому в українській мові та фразеології серце і душа часто виступають головними
    акторами, які здатні самостійно відчувати, боліти, радіти та тікати від небезпеки.
  tasks:
  - Що означає термін кордоцентризм у контексті української філософії?
  - Хто з українських мислителів найяскравіше сформулював ідею філософії серця?
  - Як, згідно зі Сковородою, відбувається справжнє пізнання навколишнього світу?
  - Чому українська мова наділяє серце і душу рисами живих істот?
- type: true-false
  title: 'Правда чи хиба: Значення фразеологізмів'
  instruction: Визначте, чи є ці твердження про українські соматичні фразеологізми
    правильними.
  items:
  - statement: Кордоцентризм визначає холодний розум як абсолютний центр духовного
      буття людини.
    correct: false
    explanation: Кордоцентризм визначає саме серце як емоційний і духовний центр.
  - statement: В українській мовній картині світу душа часто наділяється рисами живої,
      автономної істоти.
    correct: true
    explanation: Душа може рухатися, ховатися та відчувати тиск обставин.
  - statement: Вираз душа в п'яти описує стан неймовірної, раптової радості.
    correct: false
    explanation: Він описує стан раптового тваринного страху або паніки.
  - statement: Фразеологізм камінь на душі означає відчуття великого емоційного тягаря
      чи провини.
    correct: true
    explanation: Це метафора постійного внутрішнього тиску.
  - statement: Евфемізм віддати Богу душу доречно вживати, коли зламався ваш старий
      телефон.
    correct: false
    explanation: Цей урочистий вираз застосовується виключно щодо смерті живих істот.
  - statement: Коли людина каже, що в неї душа болить за когось, вона демонструє найвищий
      ступінь емпатії.
    correct: true
    explanation: Це свідчить про щире співчуття до чужого болю.
  - statement: Вираз серце кров'ю обливається передає відчуття легкого, приємного
      хвилювання.
    correct: false
    explanation: Він передає відчуття нестерпного жалю та розпачу.
  - statement: Фрази брати за серце і брати до серця мають абсолютно однакове значення
      в сучасній мові.
    correct: false
    explanation: Перший описує зовнішнє зворушення, другий — внутрішнє хворобливе
      переймання проблемами.
  - statement: Вкладати душу означає виконувати роботу з любов'ю, натхненням та самовіддачею.
    correct: true
    explanation: Цей вираз пов'язаний з ідеєю сродної праці.
  - statement: Вираз поклавши руку на серце вживається перед тим, як людина збирається
      сказати відверту правду.
    correct: true
    explanation: Це маркер абсолютної чесності мовця.
