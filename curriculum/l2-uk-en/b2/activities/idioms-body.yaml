- type: translate
  title: Адекватний переклад на українську
  instruction: Оберіть правильний та стилістично найбільш доречний український переклад
    для кожної англійської фрази, уникаючи дослівного калькування.
  items:
  - source: When the explosion happened, my heart sank into my boots.
    options:
    - text: Коли пролунав вибух, у мене душа в п'яти пішла.
      correct: true
    - text: Коли пролунав вибух, моє серце впало в черевики.
      correct: false
    - text: Коли пролунав вибух, моя душа опинилася в ногах.
      correct: false
    - text: Коли пролунав вибух, моє серце сховалося.
      correct: false
    explanation: Англійській ідіомі ідеально відповідає українська душа в п'яти пішла.
  - source: He has a heavy heart because of the tragic news.
    options:
    - text: Він має дуже важке серце через ці новини.
      correct: false
    - text: Він носить камінь на душі через ці трагічні новини.
      correct: true
    - text: У нього великий камінь просто в серці.
      correct: false
    - text: Його власна душа стала дуже важкою.
      correct: false
    explanation: Український відповідник використовує метафору каменя на душі.
  - source: She is a true artist who puts her soul into her work.
    options:
    - text: Вона кладе свою душу прямо в роботу.
      correct: false
    - text: Вона справжня мисткиня, яка вкладає душу у свою роботу.
      correct: true
    - text: Вона щодня дає свою душу цій складній роботі.
      correct: false
    - text: Вона просто працює з великою душею.
      correct: false
    explanation: Правильне та природне дієслово — вкладати душу.
  - source: It breaks my heart to see these poor animals.
    options:
    - text: Це жорстоко ламає моє бідне серце.
      correct: false
    - text: Моє серце кров'ю обливається, коли я бачу цих тварин.
      correct: true
    - text: Моя душа дуже болить просто від серця.
      correct: false
    - text: Моє серце розбивається на маленькі шматки.
      correct: false
    explanation: Для нестерпного жалю використовується серце кров'ю обливається або
      крається.
  - source: That beautiful old song really touched my heart.
    options:
    - text: Та прекрасна стара пісня справді взяла мене за серце.
      correct: true
    - text: Та пісня дуже глибоко взяла мене до серця.
      correct: false
    - text: Та стара пісня обережно доторкнулася до мого серця.
      correct: false
    - text: Та гарна пісня раптово вдарила мене в серце.
      correct: false
    explanation: Щось зовнішнє, що емоційно зворушує, бере людину ЗА серце.
  - source: I wish you great happiness from the bottom of my heart.
    options:
    - text: Я бажаю вам щастя з самого дна мого серця.
      correct: false
    - text: Я бажаю вам великого щастя від щирого серця.
      correct: true
    - text: Я бажаю щастя з дуже глибокого серця.
      correct: false
    - text: Я бажаю вам щастя від чистої та світлої душі.
      correct: false
    explanation: Традиційний і найбільш автентичний український вираз — від щирого
      серця.
  - source: Have a heart and help these homeless people!
    options:
    - text: Майте своє серце і швидко допоможіть їм!
      correct: false
    - text: Майте ж ви совість і допоможіть цим бездомним людям!
      correct: true
    - text: Тримайте своє серце і допоможіть їм!
      correct: false
    - text: Віддайте їм своє серце на допомогу!
      correct: false
