  title: Оберіть усі правильні варіанти
  instruction: Уважно прочитайте запитання та оберіть усі правильні відповіді, які
    підходять до ситуації.
  items:
  - question: Які з цих фразеологізмів описують відчуття сильного, паралізуючого страху?
    min_correct: 2
    options:
    - text: душа в п'яти пішла
      correct: true
    - text: душа в п'яти ховається
      correct: true
    - text: камінь на душі лежить
      correct: false
    - text: серце кров'ю обливається
      correct: false
    - text: душа радіє і співає
      correct: false
