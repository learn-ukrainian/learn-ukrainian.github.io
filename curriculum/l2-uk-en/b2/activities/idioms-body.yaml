  - left: серце кров'ю обливається
    right: відчувати нестерпний жаль через чуже горе
  - left: брати за серце
    right: глибоко зворушувати емоції (про пісню чи витвір мистецтва)
  - left: мати серце
    right: бути милосердним та здатним на співчуття
  - left: від щирого серця
