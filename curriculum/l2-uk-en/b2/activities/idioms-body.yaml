- type: essay-response
  title: 'Письмове завдання: Роздум про кордоцентризм у житті'
  prompt: 'Напишіть невеликий роздум (150-200 слів) на тему: ''Що для мене особисто
    означає вкладати душу в роботу?''. Використайте у своєму тексті щонайменше три
    українські соматичні фразеологізми з тих, що ми вивчили (наприклад: поклавши руку
    на серце, від щирого серця, камінь на душі, душа болить тощо). Поясніть свою думку
    на прикладі власного професійного чи життєвого досвіду.'
  model_answer: Поклавши руку на серце, я можу з абсолютною упевненістю сказати, що
    справжній життєвий успіх приходить лише тоді, коли людина щодня займається своєю
    улюбленою справою. Для мене філософська концепція 'вкладати душу' означає не просто
    формальне, механічне виконання своїх нудних щоденних обов'язків, а глибоке, постійне
    емоційне залучення до робочого процесу. Коли я натхненно працюю над складним,
    але дійсно цікавим проектом, я добровільно віддаю йому свою енергію від щирого
    серця. Звісно, іноді у кожного бувають важкі моменти професійного вигорання або
    несподіваних невдач, і тоді мені об'єктивно здається, що я ношу неймовірно важкий
    камінь на душі через повну невідповідність отриманих результатів моїм високим
    очікуванням. У такі кризові миті моє серце болісно крається від розчарування.
    Однак, коли складна проблема нарешті успішно вирішується, цей холодний камінь
    миттєво падає з душі, і я відчуваю неймовірне, цілюще полегшення. Я щиро вважаю,
    що робота абсолютно без душі перетворює живу людину на звичайний механізм, тоді
    як справжня творча самовіддача робить нас по-справжньому живими, корисними та
    глибоко щасливими у цьому світі.
  rubric:
  - criteria: Використання цільової лексики
    description: У тексті доречно і граматично правильно використано щонайменше три
      українські соматичні фразеологізми.
    points: 4
  - criteria: Змістове наповнення та аргументація
    description: Думка автора чітко, логічно аргументована, наведено переконливий
      конкретный приклад із власного життя.
