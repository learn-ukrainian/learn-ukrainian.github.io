          correct: false
        - text: 'Соціальний погляд змінюється швидко.'
          correct: false
        - text: 'Громадська думка швидко змінюється.'
          correct: true
        - text: 'Публічне переконання швидко змінюється.'
          correct: false
    - source: 'We managed to confirm our theory.'
      explanation: 'Підтвердити теорію = to confirm a theory.'
      options:
