- type: error-correction
  title: 'Виправте типові помилки перекладу та синтаксису'
  instruction: 'Знайдіть русизми або граматичні кальки та оберіть правильний варіант.'
  items:
    - sentence: 'З моєї думки, ця теорія не має жодного сенсу.'
      error: 'З моєї думки'
      answer: 'На мою думку'
      error_type: 'phrase'
      options:
        - 'З моєї думки'
        - 'На мою думку'
        - 'В моїй думці'
        - 'За моєю думкою'
      explanation: 'Правильна форма вимагає прийменника "на" і знахідного відмінка.'
    - sentence: 'Мій погляд, що суспільство має змінитися.'
      error: 'Мій погляд'
      answer: 'Я вважаю'
      error_type: 'phrase'
      options:
        - 'Мій погляд'
        - 'Я вважаю'
        - 'З мого погляду'
        - 'Моя ідея'
      explanation: 'Іменник не може напряму керувати підрядним реченням. Потрібне дієслово.'
    - sentence: 'Він приймав участь у цікавій академічній дискусії.'
      error: 'приймав участь'
      answer: 'брав участь'
      error_type: 'phrase'
      options:
        - 'приймав участь'
        - 'брав участь'
        - 'робив участь'
        - 'мав участь'
      explanation: '"Приймати участь" — це калька з російської. Правильно "брати участь".'
    - sentence: 'У мене виникла дуже хороша мисля щодо нашого проєкту.'
      error: 'мисля'
      answer: 'думка'
      error_type: 'word'
      options:
        - 'мисля'
        - 'думка'
        - 'теорія'
        - 'наука'
      explanation: 'Слово "мисля" є суржиком. Літературна норма — "думка".'
    - sentence: 'Моя думка зводиться до того, щоб ми працювали швидше.'
      error: 'щоб'
      answer: 'що'
      error_type: 'word'
      options:
        - 'щоб'
        - 'що'
        - 'як'
        - 'коли'
      explanation: 'Після зв’язки "зводиться до того" вживаємо сполучник "що" для констатації факту.'
    - sentence: 'Я рахую, що цей експеримент був дуже успішним.'
      error: 'рахую'
      answer: 'вважаю'
      error_type: 'word'
      options:
        - 'рахую'
        - 'вважаю'
        - 'думаю'
        - 'бачу'
      explanation: '"Рахувати" можна гроші. Власну позицію виражають словом "вважати".'
    - sentence: 'Ми підтвердили цю робочу гіпотезу в минулому году.'
      error: 'в минулому году'
      answer: 'минулого року'
      error_type: 'phrase'
      options:
        - 'в минулому году'
        - 'минулого року'
        - 'в минулий рік'
        - 'минулого года'
      explanation: 'Українською правильно говорити "минулого року".'
    - sentence: 'Вони получають нові дані для своєї теорії щодня.'
      error: 'получають'
      answer: 'отримують'
      error_type: 'word'
      options:
        - 'получають'
        - 'отримують'
        - 'беруть'
        - 'мають'
      explanation: '"Получати" — русизм. Правильно — "отримувати".'

- type: unjumble
  title: 'Побудова академічних речень'
  instruction: 'Складіть слова в правильному порядку, щоб утворити речення.'
  items:
    - words: ['дослідники', 'вирішили', 'висунути', 'нову', 'гіпотезу', 'про', 'зміни', 'клімату']
      answer: 'Дослідники вирішили висунути нову гіпотезу про зміни клімату.'
    - words: ['його', 'авторська', 'концепція', 'викликала', 'палкі', 'дискусії', 'на', 'конференції']
      answer: 'Його авторська концепція викликала палкі дискусії на конференції.'
    - words: ['на', 'мою', 'думку', 'система', 'освіти', 'потребує', 'негайного', 'реформування']
      answer: 'На мою думку система освіти потребує негайного реформування.'
    - words: ['ми', 'змогли', 'повністю', 'підтвердити', 'нашу', 'робочу', 'гіпотезу', 'сьогодні']
      answer: 'Ми змогли повністю підтвердити нашу робочу гіпотезу сьогодні.'
    - words: ['громадська', 'думка', 'поступово', 'змінюється', 'під', 'впливом', 'нових', 'технологій']
      answer: 'Громадська думка поступово змінюється під впливом нових технологій.'
    - words: ['він', 'любив', 'заглибитися', 'в', 'думки', 'під', 'час', 'подорожі']
      answer: 'Він любив заглибитися в думки під час подорожі.'
    - words: ['у', 'нас', 'виникла', 'блискуча', 'ідея', 'для', 'нового', 'проєкту']
