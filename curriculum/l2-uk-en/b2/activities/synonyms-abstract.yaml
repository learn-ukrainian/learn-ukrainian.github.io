- type: mark-the-words
  title: 'Знайдіть абстрактні іменники'
  instruction: 'Знайдіть і позначте всі абстрактні іменники (терміни), що означають результати мислення, у тексті.'
  text: 'У цій статті представлена нова авторська концепція інтеграції переселенців. Основна робоча гіпотеза полягала в тому, що активність пришвидшує адаптацію. Автори мали можливість обмінятися поглядами. Запропонована теорія соціальних мереж працює ефективно. Наше глибоке переконання допомагає знаходити нові ідеї.'
