          correct: true
        - text: 'Дослідники показали нову теорію.'
          correct: false
        - text: 'Дослідники дали нову концепцію.'
          correct: false
        - text: 'Дослідники зробили нову ідею.'
          correct: false
    - source: 'It is a common misconception.'
      explanation: 'Помилкове уявлення — misconception.'
      options:
        - text: 'Це популярна думка.'
          correct: false
        - text: 'Це помилкове уявлення.'
          correct: true
        - text: 'Це неправильне переконання.'
          correct: false
        - text: 'Це погана ідея.'
          correct: false
    - source: 'Public opinion is changing rapidly.'
      explanation: 'Громадська думка = public opinion.'
      options:
