- type: fill-in
  title: 'Заповніть пропуски у науковому тексті'
  instruction: 'Оберіть правильне слово для кожного речення.'
  items:
    - sentence: 'На мою _______, цей проєкт потребує додаткового фінансування.'
      answer: 'думку'
      options: ['думку', 'ідею', 'теорію', 'концепцію']
    - sentence: 'Дослідники вирішили висунути нову _______ щодо походження цього виду.'
      answer: 'гіпотезу'
      options: ['гіпотезу', 'думку', 'помилку', 'анотацію']
    - sentence: 'З роками його філософські _______ стали ще більш консервативними.'
      answer: 'погляди'
      options: ['погляди', 'мрії', 'фантазії', 'ідеї']
    - sentence: 'Під час зустрічі експерти мали можливість обмінятися _______.'
      answer: 'поглядами'
      options: ['поглядами', 'гіпотезами', 'теоріями', 'почуттями']
    - sentence: 'Ця блискуча _______ виникла в нього під час ранкової пробіжки.'
      answer: 'ідея'
      options: ['ідея', 'концепція', 'теорія', 'анотація']
    - sentence: 'Після довгих дискусій ми змогли повністю підтвердити нашу робочу _______.'
      answer: 'гіпотезу'
      options: ['гіпотезу', 'ідею', 'фантазію', 'ілюзію']
    - sentence: 'Його авторська _______ розвитку міста викликала неабиякий інтерес.'
      answer: 'концепція'
      options: ['концепція', 'думка', 'наука', 'правда']
    - sentence: 'Багато людей мають хибне _______ про життя в середньовіччі.'
      answer: 'уявлення'
      options: ['уявлення', 'переконання', 'поняття', 'правило']
    - sentence: 'Я глибоко _______, що кожна дитина має право на якісну освіту.'
      answer: 'переконаний'
      options: ['переконаний', 'уявлений', 'подуманий', 'розгублений']
    - sentence: 'Вчені намагаються об’єднати ці розрізнені факти в єдину струнку _______.'
      answer: 'теорію'
      options: ['теорію', 'думку', 'ідею', 'помилку']

