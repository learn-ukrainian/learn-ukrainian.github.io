- type: translate
  title: 'Переклад інтелектуальної лексики'
  instruction: 'Оберіть правильний переклад для кожного англійського речення.'
  items:
    - source: 'In my opinion, this is a brilliant idea.'
      explanation: 'Правильний переклад використовує прийменник "на".'
