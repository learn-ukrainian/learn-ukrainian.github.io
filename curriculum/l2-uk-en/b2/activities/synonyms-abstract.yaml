- type: reading
  title: 'Щоденник науковця'
  instruction: 'Прочитайте текст і дайте відповіді на запитання.'
  text: |
    Сьогодні під час спостережень за волонтерськими центрами у мене виникла цікава думка. Я звернув увагу на те, як швидко люди самоорганізовуються без будь-яких вказівок зверху. На мою думку, це не просто ситуативна реакція на небезпеку, а глибока культурна традиція. З’явилося перше припущення: горизонтальні зв’язки в нашому суспільстві є набагато сильнішими, ніж вертикальні інституції.
    Проаналізувавши попередні дані, ми з командою змогли висунути робочу гіпотезу. Вона полягає в тому, що соціальна стійкість напряму корелює з рівнем довіри до сусідів, а не до державних органів. Можна припустити, що саме ця децентралізована мережа довіри забезпечує швидке вирішення логістичних проблем.
  tasks:
    - 'Яке припущення виникло у дослідника під час спостережень?'
    - 'У чому полягає суть робочої гіпотези команди?'
    - 'Які модальні слова використовує автор для висловлення непевності?'
    - 'Який зв’язок між довірою до сусідів та соціальною стійкістю описано в тексті?'

- type: true-false
  title: 'Розуміння термінів: Правда чи хиба?'
  instruction: 'Визначте, чи є ці твердження про інтелектуальну лексику правильними.'
  items:
    - statement: 'Слово "думка" завжди має виключно логічний, холодний характер і не пов’язане з емоціями.'
      correct: false
      explanation: 'В українській традиції (кордоцентризм) думка часто має емоційний відтінок.'
    - statement: 'Ідея має більш виражений творчий і конструктивний характер порівняно з думкою.'
      correct: true
      explanation: 'Ідея — це кристалізований задум, орієнтований на результат.'
    - statement: 'Слово "погляд" означає швидкоплинне, тимчасове судження про певну ситуацію.'
      correct: false
      explanation: 'Погляд — це стійка позиція та система переконань, що формується роками.'
    - statement: 'Граматична конструкція "Мій погляд, що клімат змінюється" є калькою з англійської мови і вважається помилкою.'
      correct: true
      explanation: 'Іменник "погляд" не може прямо приєднувати підрядне речення зі сполучником "що".'
    - statement: 'Для пом’якшення категоричності гіпотези науковці використовують слова "ймовірно" та "можна припустити".'
      correct: true
      explanation: 'Модальні слова необхідні для висловлення наукового припущення.'
    - statement: 'Теорія є менш доведеною і менш структурованою системою знань, ніж гіпотеза.'
      correct: false
      explanation: 'Навпаки, гіпотеза перетворюється на теорію після підтвердження доказами.'
    - statement: 'Авторська концепція відображає унікальний підхід дослідника до проблеми.'
      correct: true
      explanation: 'Концепція містить сильний авторський елемент.'
    - statement: 'Слово "переконання" використовується для опису поверхневих, ілюзорних знань.'
      correct: false
      explanation: 'Переконання стосується глибокої, непохитної позиції. Для ілюзорних знань використовується "уявлення".'
    - statement: 'В офіційному стилі краще вживати дієслово "вважати", ніж іменникові конструкції на кшталт "моя думка".'
      correct: true
      explanation: 'Дієслово робить висловлювання більш динамічним та граматично правильним.'
    - statement: 'Використання прийменника "з" у фразі "з моєї думки" є правильною українською формою.'
      correct: false
      explanation: 'Правильно говорити "на мою думку" (знахідний відмінок).'

- type: quiz
  title: 'Лексичні нюанси та відтінки значень'
  instruction: 'Оберіть правильний варіант відповіді для кожного запитання.'
  items:
    - question: 'Який термін найкраще описує систему узагальнених знань, що пояснює закономірності природи?'
      explanation: 'Теорія є доведеною системою узагальнених знань.'
      options:
        - text: 'теорія'
          correct: true
        - text: 'гіпотеза'
          correct: false
        - text: 'думка'
          correct: false
        - text: 'уявлення'
          correct: false
    - question: 'Як правильно розпочати речення, щоб висловити свою особисту позицію українською мовою?'
      explanation: 'Правильна конструкція вимагає прийменника "на" та знахідного відмінка.'
      options:
        - text: 'На мою думку...'
          correct: true
        - text: 'В моїй думці...'
          correct: false
        - text: 'З моєї думки...'
          correct: false
        - text: 'За моєю думкою...'
          correct: false
    - question: 'Яке з наведених слів означає творчий спалах або задум, готовий до реалізації?'
      explanation: 'Ідея має конструктивний та ініціативний характер.'
      options:
        - text: 'ідея'
          correct: true
        - text: 'світогляд'
          correct: false
        - text: 'переконання'
          correct: false
        - text: 'погляд'
          correct: false
    - question: 'Який з цих термінів є стартовою точкою будь-якого академічного дослідження і потребує доведення?'
      explanation: 'Гіпотеза — це наукове припущення, що потребує перевірки.'
      options:
        - text: 'гіпотеза'
          correct: true
        - text: 'концепція'
          correct: false
        - text: 'теорія'
          correct: false
        - text: 'аксіома'
          correct: false
    - question: 'Як називається філософська система Григорія Сковороди, в якій центр мислення переміщено з розуму?'
      explanation: 'Кордоцентризм означає філософію серця, де перетинаються емоції та інтелект.'
      options:
        - text: 'кордоцентризм'
          correct: true
        - text: 'раціоналізм'
          correct: false
        - text: 'емпіризм'
          correct: false
        - text: 'прагматизм'
          correct: false
    - question: 'Яке слово доречно використати для опису хибного або неповного мисленнєвого образу предмета?'
      explanation: 'Уявлення часто буває неповним або стереотипним.'
      options:
        - text: 'уявлення'
          correct: true
        - text: 'переконання'
          correct: false
        - text: 'бачення'
          correct: false
        - text: 'судження'
          correct: false
    - question: 'Яке дієслово найкраще використати, щоб уникнути граматичної помилки у фразі "мій погляд, що..."?'
      explanation: 'Дієслово "вважати" дозволяє правильно приєднати підрядне речення.'
      options:
        - text: 'вважати'
          correct: true
        - text: 'дивитися'
          correct: false
        - text: 'спостерігати'
          correct: false
        - text: 'виглядати'
          correct: false
    - question: 'З чим порівнювала слово та висловлену думку українська поетеса Леся Українка?'
      explanation: 'Вона порівнювала слово зі зброєю та твердою крицею (сталлю).'
      options:
        - text: 'з твердою крицею'
          correct: true
        - text: 'з легким вітром'
          correct: false
        - text: 'з яскравим сонцем'
          correct: false
        - text: 'з глибоким морем'
          correct: false
    - question: 'Який прикметник найчастіше вживається разом з іменником "концепція" в науковому дискурсі?'
      explanation: 'У науці часто говорять про "авторську концепцію".'
      options:
        - text: 'авторська'
          correct: true
        - text: 'випадкова'
          correct: false
        - text: 'емоційна'
          correct: false
        - text: 'швидкоплинна'
          correct: false
    - question: 'Яке словосполучення описує колективне ставлення суспільства до певної соціальної проблеми?'
      explanation: 'Громадська думка — це сукупність переконань групи людей.'
      options:
        - text: 'громадська думка'
          correct: true
        - text: 'соціальна ідея'
          correct: false
        - text: 'народний погляд'
          correct: false
        - text: 'публічне уявлення'
          correct: false

