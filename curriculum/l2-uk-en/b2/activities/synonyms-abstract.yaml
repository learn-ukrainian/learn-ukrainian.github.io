        - text: 'Ми змогли зробити нашу теорію.'
          correct: false
        - text: 'Ми змогли показати нашу гіпотезу.'
          correct: false
        - text: 'Ми змогли переконати нашу думку.'
          correct: false
    - source: 'I consider that we need more data.'
      explanation: 'Я вважаю, що... = I consider/believe that...'
      options:
