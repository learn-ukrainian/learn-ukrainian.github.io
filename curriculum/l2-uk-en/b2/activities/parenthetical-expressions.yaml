- type: quiz
  title: 'Теорія комунікації: функції вставних слів'
  items:
    - question: 'До якої семантичної групи належить слово безумовно у сучасному професійному українському тексті?'
      options:
        - text: 'Вираження абсолютної впевненості'
          correct: true
        - text: 'Вираження припущеної ймовірності'
          correct: false
        - text: 'Вказівка на джерело інформації'
          correct: false
        - text: 'Логічна організація дискурсу'
          correct: false
      explanation: 'Слово безумовно є потужним маркером абсолютної впевненості, що цементує аргументацію.'
    - question: 'Яку саме функцію виконує вставна конструкція на жаль під час прямого телеефіру?'
      options:
        - text: 'Вираження негативної емоційної оцінки події'
          correct: true
        - text: 'Вказівка на джерело негативної інформації'
          correct: false
        - text: 'Перемикання теми на щось більш сумне'
          correct: false
        - text: 'Висловлення невпевненості у сказаному'
          correct: false
      explanation: 'Конструкція на жаль демонструє вашу солідарність із ситуацією та виражає сум.'
    - question: 'Яке з цих вставних слів є характерним маркером колективного знання або суспільної думки?'
      options:
        - text: 'кажуть'
          correct: true
        - text: 'мабуть'
          correct: false
        - text: 'напевно'
          correct: false
        - text: 'очевидно'
          correct: false
      explanation: 'Слово кажуть апелює до авторитету спільноти, так званої колективної мудрості.'
    - question: 'Яка базова пунктуаційна норма застосовується, якщо вставне слово стоїть чітко у середині речення?'
      options:
        - text: 'Слово виділяється комами з обох боків'
          correct: true
        - text: 'Кома ставиться лише перед вставним словом'
          correct: false
        - text: 'Кома ставиться лише після вставного слова'
          correct: false
        - text: 'Жодні коми не потрібні взагалі'
          correct: false
      explanation: 'У позиції інтерпозиції вставне слово розриває потік інформації, тому ізолюється комами з обох боків.'
    - question: 'Яке з наведених слів належить до так званих псевдовставних слів і ніколи не виділяється комами?'
      options:
        - text: 'навіть'
          correct: true
        - text: 'очевидно'
          correct: false
        - text: 'зокрема'
          correct: false
        - text: 'до речі'
          correct: false
      explanation: 'Слово навіть є підсилювальною часткою, що є структурним компонентом речення.'
    - question: 'Як правильно та орфографічно грамотно написати вираз, що означає прикрість або сум через певну подію?'
      options:
        - text: 'на жаль'
          correct: true
        - text: 'нажаль'
          correct: false
        - text: 'з жалем'
          correct: false
        - text: 'на-жаль'
          correct: false
      explanation: 'Цей вираз складається з прийменника та іменника, тому завжди пишеться окремо.'
    - question: 'Чому слово мабуть часто використовується українцями навіть тоді, коли вони стовідсотково впевнені у факті?'
      options:
        - text: 'Для ввічливого пом''якшення власної категоричності'
          correct: true
        - text: 'Через погане знання граматичних правил'
          correct: false
        - text: 'Щоб приховати власну некомпетентність'
          correct: false
        - text: 'Це просто поширена регіональна діалектна форма'
          correct: false
      explanation: 'Це феномен ввічливої невпевненості, що допомагає уникати зайвої грубості в розмові.'
    - question: 'Яке вставне слово найкраще підходить ведучому ток-шоу для плавного перемикання теми під час дискусії?'
      options:
        - text: 'до речі'
          correct: true
        - text: 'по-перше'
          correct: false
        - text: 'безперечно'
          correct: false
        - text: 'напевно'
          correct: false
      explanation: 'Слово до речі працює як лінгвістичний шарнір для непомітної зміни вектора розмови.'
    - question: 'Яке з наведених слів є надійним маркером для логічного підбиття підсумків наприкінці промови?'
      options:
        - text: 'отже'
          correct: true
        - text: 'кажуть'
          correct: false
        - text: 'мабуть'
          correct: false
        - text: 'на щастя'
          correct: false
      explanation: 'Слово отже сигналізує про завершення аргументації та перехід до фінальних висновків.'
    - question: 'Який універсальний тест мовознавці пропонують використовувати для надійної ідентифікації справжнього вставного слова?'
      options:
        - text: 'Спроба вилучити слово з речення без втрати граматичного змісту'
          correct: true
        - text: 'Перевірка можливості замінити слово на будь-яке дієслово'
          correct: false
        - text: 'Аналіз слова на наявність м''якого знака в кінці'
          correct: false
        - text: 'Спроба поставити питання від підмета до цього слова'
          correct: false
      explanation: 'Критерій вилучення є найпростішим і найточнішим тестом: якщо без слова речення не руйнується, це вставна конструкція.'

- type: fill-in
  title: 'Контекстуальне використання вставних слів'
  instruction: 'Оберіть найбільш доречне вставне слово для кожного речення.'
  items:
    - sentence: 'Цей інноваційний проект, _____, принесе нашій компанії значний прибуток та нових клієнтів.'
      answer: 'безумовно'
      options:
        - 'безумовно'
        - 'кажуть'
        - 'на жаль'
        - 'між іншим'
      explanation: 'Контекст вказує на сильну впевненість в успіху.'
    - sentence: 'Ця сувора зима, _____, буде набагато теплішою за попередню, хоча це ще не доведено.'
      answer: 'здається'
      options:
        - 'здається'
        - 'безперечно'
        - 'звісно'
        - 'на щастя'
      explanation: 'Друга частина речення підкреслює відсутність доказів, тому використовуємо маркер припущення.'
    - sentence: 'Шановні колеги, _____, ми змушені відхилити вашу цікаву пропозицію через брак фінансування.'
      answer: 'на жаль'
      options:
        - 'на жаль'
        - 'на радість'
        - 'слава Богу'
        - 'безумовно'
      explanation: 'Повідомлення про відхилення пропозиції вимагає маркера негативної емоційної оцінки.'
    - sentence: 'Складні фінансові документи, _____ усім присутнім, були успішно підписані без жодних затримок.'
      answer: 'на радість'
      options:
        - 'на радість'
        - 'на біду'
        - 'як на зло'
        - 'очевидно'
      explanation: 'Успішне підписання документів викликає позитивні емоції.'
    - sentence: '_____, нові стандарти навчання будуть впроваджені в усіх школах вже наступного академічного року.'
      answer: 'За словами міністра'
      options:
        - 'За словами міністра'
        - 'На мою думку'
        - 'Як на мене'
        - 'Зрозуміла річ'
      explanation: 'Офіційна інформація про стандарти навчання потребує посилання на авторитетне джерело.'
    - sentence: 'Цей застарілий підхід до вирішення проблеми, _____, є занадто складним і абсолютно неефективним.'
      answer: 'як на мене'
      options:
        - 'як на мене'
        - 'за даними експертів'
        - 'як відомо'
        - 'по-перше'
      explanation: 'Конструкція як на мене ідеально підходить для вираження суб''єктивної критики.'
    - sentence: 'Ми маємо ретельно підготуватися до цієї стратегічної зустрічі, _____ від неї залежить доля нашого бізнесу.'
      answer: 'адже'
      options:
        - 'адже'
        - 'навіть'
        - 'принаймні'
        - 'мабуть'
      explanation: 'Тут потрібен підрядний сполучник причини, який пов''язує дві частини складного речення.'
    - sentence: 'Я вчора зустрічався з директором відділу маркетингу. _____, він дуже тепло відгукувався про твій проект.'
      answer: 'До речі'
      options:
        - 'До речі'
        - 'По-друге'
        - 'Отже'
        - 'На жаль'
      explanation: 'Слово до речі слугує для органічного перемикання уваги на пов''язану тему.'
    - sentence: 'Ця ідея є чудовою. _____, необхідно детально проаналізувати всі існуючі ринкові ризики перед її запуском.'
      answer: 'По-перше'
      options:
        - 'По-перше'
        - 'Таким чином'
        - 'Отже'
        - 'Загалом'
      explanation: 'Початок переліку аргументів чи етапів завжди маркується словом по-перше.'
    - sentence: 'Ми перевірили всі гіпотези та дані. _____, інвестиція в цей технологічний сектор є цілком виправданою.'
      answer: 'Отже'
      options:
        - 'Отже'
        - 'Кажуть'
        - 'По-перше'
        - 'До речі'
      explanation: 'Після аналізу логічно підбити підсумок словом отже.'

- type: group-sort
  title: 'Семантичні групи вставних слів'
  instruction: 'Розподіліть запропоновані вставні конструкції за їхнім основним значенням.'
  groups:
    - name: 'Впевненість та припущення'
      items:
        - 'безумовно'
        - 'мабуть'
        - 'очевидно'
        - 'безперечно'
        - 'здається'
    - name: 'Емоційна оцінка'
      items:
        - 'на жаль'
        - 'на щастя'
        - 'як не дивно'
        - 'на біду'
        - 'слава Богу'
    - name: 'Джерело інформації'
      items:
        - 'за словами'
        - 'на мою думку'
        - 'кажуть'
        - 'як відомо'
        - 'за даними'
    - name: 'Організація висловлювання'
      items:
        - 'по-перше'
        - 'отже'
        - 'до речі'
        - 'між іншим'
        - 'таким чином'

- type: error-correction
  title: 'Редакторський аудит: пунктуація та орфографія'
  instruction: 'Знайдіть та виправте помилки в оформленні речень.'
  items:
    - sentence: 'Нажаль ми не зможемо відвідати цю важливу міжнародну конференцію.'
      error: 'Нажаль'
      answer: 'На жаль'
      error_type: 'word'
      options:
        - 'На жаль'
        - 'Нажаль'
        - 'До жалю'
        - 'З жалем'
      explanation: 'Вираз на жаль завжди пишеться як два окремих слова.'
    - sentence: 'Він гордо відмовився від пропозиції, навіть, не дослухавши її до кінця.'
      error: 'навіть,'
      answer: 'навіть'
      error_type: 'word'
      options:
        - 'навіть'
        - 'навіть,'
        - ',навіть,'
        - 'навіть-'
      explanation: 'Слово навіть є підсилювальною часткою, а не вставним словом, тому коми після нього ставити не можна.'
    - sentence: 'Цей альтернативний план є, принаймні, більш безпечним для нашої компанії.'
      error: 'є, принаймні,'
      answer: 'є принаймні'
      error_type: 'phrase'
      options:
        - 'є принаймні'
        - 'є, принаймні,'
        - 'є принаймні,'
        - ',є принаймні,'
      explanation: 'Частка принаймні є псевдовставним словом і не вимагає виділення комами.'
    - sentence: 'По перше нам потрібно кардинально змінити нашу маркетингову стратегію.'
      error: 'По перше'
      answer: 'По-перше'
      error_type: 'word'
      options:
        - 'По-перше'
        - 'По перше'
        - 'Поперше'
        - 'По_перше'
      explanation: 'Вставні слова, що позначають послідовність думок, пишуться через дефіс.'
    - sentence: 'Мабуть так ми нарешті зможемо вирішити цю давню і дуже складну проблему.'
      error: 'Мабуть так'
      answer: 'Мабуть, так'
      error_type: 'phrase'
      options:
        - 'Мабуть, так'
        - 'Мабуть так'
        - 'Мабуть-так'
        - ',Мабуть так'
      explanation: 'Після вставного слова мабуть на початку речення обов''язково ставиться кома.'
    - sentence: 'Цей економічний спад за даними експертів триватиме ще щонайменше рік.'
      error: 'спад за даними експертів триватиме'
      answer: 'спад, за даними експертів, триватиме'
      error_type: 'phrase'
      options:
        - 'спад, за даними експертів, триватиме'
        - 'спад за даними експертів триватиме'
        - 'спад, за даними експертів триватиме'
        - 'спад за даними експертів, триватиме'
      explanation: 'Вставна конструкція в інтерпозиції (всередині речення) обов''язково виділяється комами з обох боків.'
    - sentence: 'Вони вирішили не запрошувати його на святкування ювілею очевидно.'
      error: 'ювілею очевидно'
      answer: 'ювілею, очевидно'
      error_type: 'phrase'
      options:
        - 'ювілею, очевидно'
        - 'ювілею очевидно'
        - 'ювілею-очевидно'
        - 'ювілею очевидно,'
      explanation: 'Вставне слово в постпозиції (в кінці речення) відокремлюється комою від основного тексту.'
    - sentence: 'Ми маємо дуже ретельно підготуватися, адже, від цього залежить наша репутація.'
      error: 'адже,'
      answer: 'адже'
      error_type: 'word'
      options:
        - 'адже'
        - 'адже,'
        - ',адже,'
        - '-адже'
      explanation: 'Слово адже є сполучником. Кома ставиться перед ним, але після нього кома є помилкою.'

- type: match-up
  title: 'Англо-українські відповідники'
  instruction: 'З''єднайте українські вставні конструкції з їхніми англійськими еквівалентами.'
