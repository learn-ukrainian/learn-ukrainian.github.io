- type: select
  title: 'Пастки гомонімії: де заховалося вставне слово?'
  instruction: 'Оберіть усі речення, у яких виділене слово дійсно є вставним і вимагає пунктуаційного виділення.'
  items:
    - question: 'У яких реченнях слово ЗДАЄТЬСЯ виконує функцію вставного слова?'
      min_correct: 2
      options:
        - text: 'Вона, здається, вже пішла додому.'
          correct: true
        - text: 'Ця будівля здається дуже старою.'
          correct: false
        - text: 'Мені здається, що ми йдемо неправильним шляхом.'
          correct: false
        - text: 'Погода сьогодні, здається, буде чудовою.'
          correct: true
        - text: 'Завдання здається абсолютно неможливим.'
          correct: false
      explanation: 'Вставне слово можна вилучити без втрати змісту. Якщо слово є присудком, його не можна прибрати.'
    - question: 'Оберіть речення, де МОЖЕ виступає як маркер ймовірності (вставне слово).'
      min_correct: 2
      options:
        - text: 'Він може прийти на зустріч вчасно.'
          correct: false
        - text: 'Ми, може, зустрінемося завтра ввечері.'
          correct: true
        - text: 'Вона може вирішити цю проблему самостійно.'
          correct: false
        - text: 'Ця складна ситуація, може, ще зміниться на краще.'
          correct: true
        - text: 'Ніхто не може передбачити майбутнє.'
          correct: false
      explanation: 'Як дієслово може означає здатність. Як вставне слово воно означає припущення і виділяється комами.'
    - question: 'Знайдіть речення, де правильно використані маркери емоційної оцінки як вставні слова.'
      min_correct: 2
      options:
        - text: 'На щастя, ніхто не постраждав у цій жахливій аварії.'
          correct: true
        - text: 'Він щиро сподівався на щастя у своєму новому житті.'
          correct: false
        - text: 'На превеликий жаль, наш улюблений гурт скасував концерт.'
          correct: true
        - text: 'Вона постійно скаржилася на біль і на жаль до себе.'
          correct: false
      explanation: 'Іменники з прийменниками виступають додатками і не відокремлюються комами.'
    - question: 'Визначте речення, де коректно застосовано псевдовставні слова (без зайвих ком).'
      min_correct: 2
      options:
        - text: 'Він майже завершив цей важливий архітектурний проект.'
          correct: true
        - text: 'Вони, майже, завершили свою щоденну рутинну роботу.'
          correct: false
        - text: 'Вона навіть не привіталася зі мною під час зустрічі.'
          correct: true
        - text: 'Він, навіть, забув мій особистий номер телефону.'
          correct: false
      explanation: 'Слова навіть та майже є підсилювальними частками, тому їх не можна брати в коми.'
    - question: 'У яких реченнях маркери логічної послідовності вжиті та оформлені абсолютно правильно?'
      min_correct: 2
      options:
        - text: 'По-перше, нам треба терміново знайти нове приміщення.'
          correct: true
        - text: 'По перше, ми маємо негайно змінити наш фінансовий план.'
          correct: false
        - text: 'По-друге, бюджет проекту значно зріс за останній місяць.'
          correct: true
