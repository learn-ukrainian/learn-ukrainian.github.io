- type: essay-response
  title: 'Есе: Екологічна відповідальність'
  prompt: 'Напишіть коротке есе (мінімум 150 слів) на тему екологічної відповідальності громадян. Висловіть свою думку щодо проблеми сортування сміття у вашому місті. Обов''язково використайте щонайменше 5 різних вставних конструкцій (наприклад: по-перше, на мою думку, на жаль, безумовно, отже) для логічної організації тексту та вираження емоційного ставлення.'
  min_words: 150
  model_answer: 'На мою думку, проблема сортування сміття є однією з найгостріших у сучасному суспільстві. По-перше, наші міста потопають у пластику, який розкладається сотні років. По-друге, ми безвідповідально ставимося до природних ресурсів. На жаль, багато людей досі вважають, що ця проблема їх не стосується. Вони, очевидно, не розуміють масштабів екологічної загрози. Безумовно, місцева влада має створити належну інфраструктуру: встановити спеціальні баки, організувати регулярний вивіз відходів. Проте, як відомо, жодна ініціатива не запрацює без активної участі самих громадян. На щастя, останнім часом молодь стає дедалі більш екосвідомою. Кажуть, що нове покоління зможе змінити ситуацію на краще. До речі, у нашому районі нещодавно відкрили нову станцію переробки. Отже, якщо кожен із нас зробить свій невеликий внесок, ми зможемо зберегти природу для майбутніх поколінь. Таким чином, відповідальність лежить на всіх нас.'
  rubric:
    - criteria: 'Використання вставних слів'
      description: 'У тексті органічно вжито щонайменше 5 вставних конструкцій із різних семантичних груп.'
      points: 4
    - criteria: 'Зв''язність та логіка викладу'
      description: 'Текст логічно структурований, думки послідовні, аргументація вибудувана зрозуміло.'
      points: 3
    - criteria: 'Граматика та пунктуація'
      description: 'Продемонстровано правильне виділення вставних слів комами, відсутні орфографічні помилки.'
      points: 3