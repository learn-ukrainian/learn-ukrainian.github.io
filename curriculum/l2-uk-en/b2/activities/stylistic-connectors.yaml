- type: essay-response
  title: "Написання аргументованого тексту"
  prompt: "Напишіть абзац-роздум (150-200 слів) на тему: «Чи може штучний інтелект повністю замінити живого викладача?». Використовуйте різноманітні стилістичні сполучники (проте, натомість, причому, відтак, отже) для забезпечення логічної зв'язності та потужної аргументації."
  min_words: 150
  model_answer: "Сьогодні багато експертів прогнозують швидке зникнення традиційних професій через стрімкий розвиток сучасних технологій. Дехто вважає, що штучний інтелект здатний повністю замінити живого викладача, оскільки алгоритми можуть миттєво генерувати навчальні матеріали і швидко перевіряти складні тести. Проте така популярна думка є надто оптимістичною і відверто поверхневою. Машина дійсно володіє гігантськими обсягами інформації, причому вона ніколи не втомлюється і зовсім не вимагає перерв. Натомість штучний інтелект абсолютно позбавлений емоційної емпатії, яка є критично важливою у педагогічному процесі навчання. Живий викладач не просто передає сухі факти, він мотивує студента, глибоко відчуває його настрій і психологічний стан, відтак він може вчасно адаптувати свою методику під конкретну людину. Алгоритм бачить лише механічну помилку в тесті, хоча справжня причина цієї помилки може ховатися у невпевненості або страху студента. Отже, новітні технології є лише потужним допоміжним інструментом, але вони ніколи не зможуть повністю відтворити той глибокий людський зв'язок, який необхідний для справжньої, якісної освіти."
  rubric:
    - criteria: "Використання сполучників"
      description: "У тексті органічно використано не менше 4 різних стилістичних сполучників (напр., проте, причому, натомість, відтак)."
      points: 10
    - criteria: "Зв'язність та логіка"
      description: "Думки викладено послідовно, аргументи логічно випливають один з одного."
      points: 10
    - criteria: "Граматична правильність"
      description: "Відсутність орфографічних та пунктуаційних помилок, правильне виділення вставних слів."
      points: 5