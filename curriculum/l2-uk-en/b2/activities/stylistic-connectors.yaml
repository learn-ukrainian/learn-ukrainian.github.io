- type: unjumble
  title: "Складіть речення зі сполучниками"
  instruction: "Розташуйте слова у правильному порядку, щоб утворити граматично та стилістично правильні речення."
  items:
    - words: ["Ми", "успішно", "впоралися", "із", "завданням,", "хоча", "робота", "була", "надзвичайно", "важкою."]
      answer: "Ми успішно впоралися із завданням, хоча робота була надзвичайно важкою."
    - words: ["Він", "так", "і", "не", "з'явився,", "проте", "ми", "терпляче", "чекали", "на", "нього."]
      answer: "Він так і не з'явився, проте ми терпляче чекали на нього."
    - words: ["Ця", "квартира", "дійсно", "дуже", "маленька,", "зате", "з", "вікна", "відкривається", "чудовий", "краєвид."]
      answer: "Ця квартира дійсно дуже маленька, зате з вікна відкривається чудовий краєвид."
    - words: ["Уряд", "публічно", "обіцяв", "знизити", "податки,", "натомість", "підприємці", "отримали", "нові", "великі", "штрафи."]
      answer: "Уряд публічно обіцяв знизити податки, натомість підприємці отримали нові великі штрафи."
    - words: ["Цей", "проєкт", "виглядає", "надзвичайно", "ризикованим,", "втім", "усе", "може", "вдатися", "набагато", "краще."]
      answer: "Цей проєкт виглядає надзвичайно ризикованим, втім усе може вдатися набагато краще."
    - words: ["Команда", "розробників", "закінчила", "проєкт", "вчасно,", "причому", "фінальна", "якість", "була", "абсолютно", "бездоганною."]
      answer: "Команда розробників закінчила проєкт вчасно, причому фінальна якість була абсолютно бездоганною."
    - words: ["Парламент", "ухвалив", "новий", "прогресивний", "закон,", "відтак", "усі", "університети", "повинні", "оновити", "програми."]
      answer: "Парламент ухвалив новий прогресивний закон, відтак усі університети повинні оновити програми."
    - words: ["Ви", "повинні", "погодитися", "на", "цю", "пропозицію,", "тим", "більше", "іншого", "шансу", "не", "буде."]
      answer: "Ви повинні погодитися на цю пропозицію, тим більше іншого шансу не буде."

