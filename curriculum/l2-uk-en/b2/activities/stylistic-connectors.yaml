- type: quiz
  title: "Перевірте знання: Функції стилістичних сполучників"
  instruction: "Оберіть правильну відповідь для кожного питання."
  items:
    - question: "Який стилістичний сполучник найкраще підходить для вираження різкого заміщення однієї дії іншою у публіцистичному тексті?"
      explanation: "Слово натомість вказує на заміщення або категоричний контраст."
      options:
        - text: "натомість"
          correct: true
        - text: "проте"
          correct: false
        - text: "відтак"
          correct: false
        - text: "причому"
          correct: false
    - question: "Яке слово ми використовуємо у невимушеній дружній розмові для створення ефекту психологічної компенсації певних недоліків?"
      explanation: "Сполучник зате має яскравий розмовний відтінок психологічної компенсації."
      options:
        - text: "зате"
          correct: true
        - text: "однак"
          correct: false
        - text: "тому"
          correct: false
        - text: "дарма що"
          correct: false
    - question: "Який із цих сполучників належить до суворого офіційно-наукового стилю і вказує на прямий логічний наслідок?"
      explanation: "Слово відтак позначає логічний наслідок або послідовність у високому стилі."
      options:
        - text: "відтак"
          correct: true
        - text: "тож"
          correct: false
        - text: "втім"
          correct: false
        - text: "натомість"
          correct: false
    - question: "Що ми обов'язково повинні зробити з пунктуацією, якщо слово проте стоїть на самому початку нового речення?"
      explanation: "Після сполучника на початку речення кома ніколи не ставиться."
      options:
        - text: "не ставити після нього кому"
          correct: true
        - text: "поставити кому після нього"
          correct: false
        - text: "поставити двокрапку"
          correct: false
        - text: "виділити його тире"
          correct: false
    - question: "Яка граматична форма іменника чи займенника завжди вимагається після складної допустової конструкції незважаючи на?"
      explanation: "Ця конструкція завжди вимагає після себе знахідного відмінка."
      options:
        - text: "знахідний відмінок"
          correct: true
        - text: "родовий відмінок"
          correct: false
        - text: "давальний відмінок"
          correct: false
        - text: "орудний відмінок"
          correct: false
    - question: "Яким автентичним і динамічним українським прийменником найкраще замінити громіздку конструкцію незважаючи на у сучасному тексті?"
      explanation: "Слово попри є чудовим і милозвучним замінником для довгого незважаючи на."
      options:
        - text: "попри"
          correct: true
        - text: "задля"
          correct: false
        - text: "натомість"
          correct: false
        - text: "крім"
          correct: false
    - question: "Який сполучник ми використовуємо для делікатного введення сумніву або легкої зміни власної думки під час розмови?"
      explanation: "Сполучник втім ідеально підходить для пом'якшення категоричності та вираження вагань."
      options:
        - text: "втім"
          correct: true
        - text: "отже"
          correct: false
        - text: "причому"
          correct: false
        - text: "тим більше"
          correct: false
    - question: "Яке слово ідеально підходить для додавання нової уточнювальної деталі, яка суттєво підсилює попередню частину вашого речення?"
      explanation: "Слово причому створює ієрархію, додаючи важливу деталь, що підсилює першу частину."
      options:
        - text: "причому"
          correct: true
        - text: "зате"
          correct: false
        - text: "відтак"
          correct: false
        - text: "однак"
          correct: false
    - question: "Який сполучник слід обрати, якщо ви хочете зробити гучний тріумфальний підсумок або завершити великий логічний блок?"
      explanation: "Сполучник отже є класичним інструментом для підбиття фінальних логічних підсумків."
      options:
        - text: "отже"
          correct: true
        - text: "проте"
          correct: false
        - text: "дарма що"
          correct: false
        - text: "бо"
          correct: false
    - question: "Як правильно перевірити, чи потрібно писати слово проте разом як сполучник, чи окремо як займенник з прийменником?"
      explanation: "Якщо до слів можна поставити логічне питання про що?, вони пишуться окремо (про те)."
      options:
        - text: "спробувати поставити запитання про що?"
          correct: true
        - text: "перевірити, чи стоїть слово на початку"
          correct: false
        - text: "порахувати кількість складів у реченні"
          correct: false
        - text: "спробувати замінити його на слово тому"
          correct: false

- type: fill-in
  title: "Доповніть речення сполучниками"
  instruction: "Оберіть найбільш влучний сполучник для кожного речення."
  items:
    - sentence: "Наша команда успішно завершила складний проєкт раніше встановленого терміну, ___ фінальна якість коду була абсолютно бездоганною."
      answer: "причому"
      explanation: "Тут додається деталь, яка підсилює досягнення."
      options:
        - "причому"
        - "зате"
        - "натомість"
        - "відтак"
    - sentence: "Ця квартира дійсно дуже маленька і потребує ремонту, ___ з її вікна відкривається фантастичний краєвид на річку."
      answer: "зате"
      explanation: "Сполучник зате вказує на емоційну компенсацію недоліків."
      options:
        - "зате"
        - "отже"
        - "причому"
        - "втім"
    - sentence: "Уряд обіцяв знизити податки для малого бізнесу під час виборів, ___ підприємці раптово отримали низку нових перевірок."
      answer: "натомість"
      explanation: "Слово натомість демонструє різке заміщення обіцяної дії протилежною."
      options:
        - "натомість"
        - "тому"
        - "причому"
        - "дарма що"
    - sentence: "Парламент вчора ухвалив прогресивний закон про освіту, ___ усі університети повинні повністю оновити свої навчальні програми."
      answer: "відтак"
      explanation: "Офіційний контекст вимагає слова відтак для позначення логічного наслідку."
      options:
        - "відтак"
        - "зате"
        - "натомість"
        - "хоча"
    - sentence: "Ми терпляче чекали на його появу біля театру майже дві години, ___ він так і не з'явився."
      answer: "проте"
      explanation: "Слово проте виражає пряме протиставлення очікуванням."
      options:
        - "проте"
        - "відтак"
        - "причому"
        - "отже"
    - sentence: "Вам обов'язково варто погодитися на цю неймовірну кар'єрну пропозицію, ___ іншого такого шансу може не бути."
      answer: "тим більше"
      explanation: "Ця конструкція вводить найсильніший, вбивчий аргумент."
      options:
        - "тим більше"
        - "натомість"
        - "зате"
        - "відтак"
    - sentence: "Цей інноваційний проєкт виглядає зараз надзвичайно ризикованим, ___ якщо ми знайдемо надійних партнерів, усе може вдатися."
      answer: "втім"
      explanation: "Сполучник втім делікатно пом'якшує категоричність попереднього твердження."
      options:
        - "втім"
        - "причому"
        - "відтак"
        - "отже"
    - sentence: "Він продовжує щодня ходити на річку на риболовлю, ___ йому минулого місяця виповнилося вже понад вісімдесят років."
      answer: "дарма що"
      explanation: "Емоційне розмовне речення вимагає допустового сполучника дарма що."
      options:
        - "дарма що"
        - "відтак"
        - "натомість"
        - "причому"
    - sentence: "Я сьогодні страшенно втомився після роботи, ___ можливо, мені дійсно варто піти на вечірку і трохи розвіятися."
      answer: "втім"
      explanation: "Втім чудово передає зміну власної думки під час розмови."
      options:
        - "втім"
        - "зате"
        - "відтак"
        - "тому"
    - sentence: "Ми довго і натхненно говорили з нашими колегами ___ , як важливо берегти природу для майбутніх поколінь."
      answer: "про те"
      explanation: "Тут відповідаємо на питання 'говорили про що?', тому пишемо окремо."
      options:
        - "про те"
        - "проте"
        - "зате"
        - "за те"

- type: error-correction
  title: "Виправте стилістичні та граматичні помилки"
  instruction: "Знайдіть помилку в реченні та оберіть правильний варіант."
  items:
    - sentence: "Незважаючи на сильного дощу, ми з ентузіазмом продовжили нашу гірську подорож до вершини."
      error: "сильного дощу"
      answer: "сильний дощ"
      error_type: "construction"
      options:
        - "сильний дощ"
        - "сильному дощу"
        - "сильним дощем"
        - "сильному дощі"
      explanation: "Після конструкції незважаючи на завжди вимагається знахідний відмінок."
    - sentence: "Я забув ключі від машини, відтак мені довелося швидко повертатися назад додому."
      error: "відтак"
      answer: "тому"
      error_type: "register"
      options:
        - "тому"
        - "причому"
        - "дарма що"
        - "втім"
      explanation: "Слово відтак належить до офіційного стилю, у побутовій розмові слід вживати тому."
    - sentence: "На вулиці цілий день ішов дощ, натомість ми взяли з собою парасольки."
      error: "натомість"
      answer: "тому"
      error_type: "word"
      options:
        - "тому"
        - "зате"
        - "проте"
        - "втім"
      explanation: "Натомість означає заміщення очікуваної дії, а не логічний наслідок."
    - sentence: "Однак, ми вирішили не йти на той нудний концерт у філармонії."
      error: "Однак,"
      answer: "Однак"
      error_type: "construction"
      options:
        - "Однак"
        - "Однак -"
        - "Однак:"
        - "Однак;"
      explanation: "Якщо сполучник стоїть на початку речення, кома після нього ніколи не ставиться."
    - sentence: "Ми успішно закінчили роботу, при чому зробили це абсолютно безкоштовно."
      error: "при чому"
      answer: "причому"
      error_type: "word"
      options:
        - "причому"
        - "притім"
        - "до того"
        - "натомість"
      explanation: "Сполучник причому, який додає важливу деталь, завжди пишеться разом як одне слово."
    - sentence: "Вона багато знала проте, як працює ця складна фінансова система."
      error: "проте"
      answer: "про те"
      error_type: "word"
      options:
        - "про те"
        - "натомість"
        - "зате"
        - "причому"
      explanation: "Якщо до слів можна поставити питання про що?, вони пишуться тільки окремо."
    - sentence: "Завтра в нашому регіоні проте синоптики обіцяють значне і різке похолодання."
      error: "проте"
      answer: ", проте,"
      error_type: "construction"
      options:
        - ", проте,"
        - "- проте -"
        - "проте,"
        - ", проте"
      explanation: "Коли слово проте є вставним всередині речення, воно обов'язково виділяється комами з обох боків."
    - sentence: "Було прийнято рішення про скорочення бюджету, хоча було погоджено інший план."
      error: "Було прийнято рішення"
      answer: "Керівництво ухвалило рішення"
      error_type: "register"
      options:
        - "Керівництво ухвалило рішення"
        - "Рішення приймалося"
        - "Прийнялося рішення"
        - "Вирішили"
      explanation: "Українська мова надає перевагу активному стану з чітким живим діячем замість пасивного канцеляризму."

