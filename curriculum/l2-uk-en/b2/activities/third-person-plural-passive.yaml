- type: essay-response
  title: Світська хроніка
  instruction: Напишіть невеликий текст-розповідь, використовуючи неозначено-особові
    речення.
  prompt: Уявіть, що ви – відомий світський оглядач. Напишіть коротку статтю (мінімум
    150 слів) про скандал на вчорашній церемонії нагородження. Використовуйте розмовний
    пасив третьої особи множини ('кажуть', 'повідомили', 'заборонили'), щоб приховати
    свої джерела та створити інтригу. Уникайте офіційних конструкцій на -но/-то.
  min_words: 150
  model_answer: 'Вчорашня церемонія нагородження стала справжнім шоком для багатьох
    присутніх. Кажуть, що скандал почався ще за лаштунками, коли одному з найвідоміших
    акторів несподівано відмовили у виході на сцену. Мені повідомили, що його ім''я
    просто викреслили зі списку гостей в останню хвилину. Звісно, офіційно ніхто нічого
    не пояснив, але в кулуарах одразу пішла чутка про його конфлікт із головним продюсером.


    За чутками, актору пообіцяли головну нагороду, але потім рішення різко змінили.
    Більше того, сорока на хвості принесла, що його навіть попросили покинути будівлю
    до початку трансляції. Охоронцям суворо наказали не пускати журналістів до гримерки,
    тому дізнатися деталі було майже неможливо. Деякі заздрісники спробували пустити
    чутку, що актор був у нетверезому стані, але ті, хто стояв поруч, запевняють,
    що це наклеп.


    Зараз усі чекають на офіційні коментарі, але організаторам, очевидно, порадили
    мовчати. Побачимо, чим усе це закінчиться, адже чужий рот не хлів — не зачинити,
    і правда рано чи пізно випливе назовні. Подейкують, що наступного року церемонію
    взагалі перенесуть в інше місто.'
  rubric:
  - criteria: Використання пасиву
    description: Текст повинен містити щонайменше 5 прикладів пасиву третьою особою
      множини.
    points: 40
  - criteria: Стилістика
    description: Текст повинен бути написаний у розмовному стилі світської хроніки
      без офіційних форм на -но/-то.
    points: 30
  - criteria: Лексика
    description: Правильне та доречне використання слів 'чутка', 'плітка', 'кажуть'
      та відповідних ідіом.
    points: 30
