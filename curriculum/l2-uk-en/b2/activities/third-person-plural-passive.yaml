- type: fill-in
  title: Від офіційного до розмовного
  instruction: Перетворіть офіційні пасивні речення на розмовні неозначено-особові
    конструкції, обравши правильне дієслово.
  items:
  - sentence: 'Офіційно: Гаманець було знайдено. Розмовно: Гаманець ___.'
    answer: знайшли
    options:
    - знайшли
    - знайдуть
    - знайдено
    - знайти
  - sentence: 'Офіційно: Рішення було прийнято. Розмовно: Рішення ___.'
    answer: прийняли
    options:
    - прийняли
    - приймуть
    - прийнято
    - приймати
  - sentence: 'Офіційно: Дорогу було відремонтовано. Розмовно: Дорогу ___.'
    answer: відремонтували
    options:
    - відремонтували
    - відремонтують
    - відремонтовано
    - ремонтувати
  - sentence: 'Офіційно: Зустріч було скасовано. Розмовно: Зустріч ___.'
    answer: скасували
    options:
    - скасували
    - скасують
    - скасовано
    - скасувати
  - sentence: 'Офіційно: Закон було підписано. Розмовно: Закон ___.'
    answer: підписали
    options:
    - підписали
    - підпишуть
    - підписано
    - підписувати
  - sentence: 'Офіційно: Документи було перевірено. Розмовно: Документи ___.'
    answer: перевірили
    options:
    - перевірили
    - перевірять
    - перевірено
    - перевіряти
  - sentence: 'Офіційно: Заяву було відхилено. Розмовно: Заяву ___.'
    answer: відхилили
    options:
    - відхилили
    - відхилять
    - відхилено
    - відхиляти
  - sentence: 'Офіційно: Будинок було збудовано. Розмовно: Будинок ___.'
    answer: збудували
    options:
    - збудували
    - збудують
    - збудовано
    - будувати
  - sentence: 'Офіційно: Концерт було перенесено. Розмовно: Концерт ___.'
    answer: перенесли
    options:
    - перенесли
    - перенесуть
    - перенесено
    - переносити
  - sentence: 'Офіційно: Помилку було виправлено. Розмовно: Помилку ___.'
    answer: виправили
    options:
    - виправили
    - виправлять
    - виправлено
    - виправляти
- type: fill-in
  title: Повсякденні розмови
  instruction: Доповніть речення правильним дієсловом у формі третьої особи множини,
    щоб утворити природний розмовний пасив.
  items:
  - sentence: ___, що наступного тижня буде дуже сильне похолодання.
    answer: Кажуть
    options:
    - Кажуть
    - Каже
    - Казати
    - Сказано
  - sentence: Мені ___, що ти нарешті отримав цю омріяну посаду.
    answer: сказали
    options:
    - сказали
    - сказав
    - сказати
    - сказано
  - sentence: Нам офіційно ___, що сьогоднішній авіарейс затримується на дві години.
    answer: повідомили
    options:
    - повідомили
    - повідомить
    - повідомлено
    - повідомляти
  - sentence: У нашому спальному районі зараз ___ новий великий сучасний супермаркет.
    answer: будують
    options:
    - будують
    - будує
    - збудовано
    - будувати
  - sentence: Студентам урочисто ___ виплатити додаткову стипендію за відмінне навчання.
    answer: пообіцяли
    options:
    - пообіцяли
    - пообіцяє
    - обіцяно
    - обіцяти
  - sentence: Мене дуже детально ___ про мій попередній професійний досвід роботи.
    answer: запитали
    options:
    - запитали
    - запитав
    - запитано
    - запитувати
  - sentence: По телевізору щойно ___, що ціни на пальне знову стрімко зростуть.
    answer: передали
    options:
    - передали
    - передав
    - передано
    - передавати
  - sentence: Вчора в самому центрі нашого міста гучно ___ новий італійський ресторан.
    answer: відкрили
    options:
    - відкрили
    - відкриє
    - відкрито
    - відкривати
  - sentence: На жаль, нам не ___ всієї гіркої правди про цю складну ситуацію.
    answer: розповіли
    options:
    - розповіли
    - розповів
    - розказано
    - розповідати
  - sentence: В університеті на дошці оголошень вже нарешті ___ результати вступних
      іспитів.
    answer: оголосили
    options:
    - оголосили
    - оголосить
    - оголошено
    - оголошувати
- type: quiz
  title: Граматичний тест
  instruction: Оберіть правильну відповідь на запитання щодо використання неозначено-особових
    речень.
  items:
  - question: Який відмінок необхідно використовувати для позначення особи, на яку
      спрямована дія, у реченні типу 'Мені сказали'?
    options:
    - text: Давальний відмінок
      correct: true
    - text: Називний відмінок
      correct: false
    - text: Знахідний відмінок
      correct: false
    - text: Родовий відмінок
      correct: false
    explanation: Дієслова комунікації вимагають після себе Давального відмінка для
      адресата.
  - question: Чому використання займенника 'вони' у реченнях на кшталт 'Вони кажуть,
      що піде дощ' є семантичною помилкою?
    options:
    - text: Воно руйнує неозначеність і перетворює речення на активне.
      correct: true
    - text: Це занадто офіційна конструкція для розмовного стилю.
      correct: false
    - text: Займенник 'вони' можна використовувати лише з живими істотами.
      correct: false
    - text: Це суперечить правилам узгодження часів.
      correct: false
    explanation: Додавання 'вони' змушує слухача шукати конкретних виконавців дії,
      руйнуючи пасивний ефект.
  - question: Яке з наведених нижче речень є правильним прикладом неозначено-особової
      конструкції в українській мові?
    options:
    - text: Проєкт закрили через фінансові проблеми.
      correct: true
    - text: Проєкт було закрито через проблеми.
      correct: false
    - text: Вони закрили проєкт через кризу.
      correct: false
    - text: Проєкт є закритий керівництвом компанії.
      correct: false
    explanation: Тільки перше речення використовує дієслово 3-ї особи множини без
      підмета, що є ознакою цього пасиву.
  - question: Як найкраще перекласти українською мовою англійське речення 'I was asked
      about my previous job'?
    options:
    - text: Мене запитали про мою попередню роботу.
      correct: true
    - text: Я був запитаний про попередню роботу.
      correct: false
    - text: Вони запитали мене про мою роботу.
      correct: false
    - text: Я запитали про мою попередню роботу.
      correct: false
    explanation: В українській мові використовується Знахідний відмінок (мене) та
      дієслово 3-ї особи множини (запитали).
  - question: У якому стилі мовлення найчастіше і найбільш природно використовується
      пасив третьою особою множини?
    options:
    - text: У повсякденному розмовному спілкуванні.
      correct: true
    - text: У строгих офіційно-ділових документах.
      correct: false
    - text: У наукових статтях та монографіях.
      correct: false
    - text: У юридичних контрактах та законах.
      correct: false
    explanation: Ця конструкція є найрозмовнішим варіантом пасиву, ідеальним для неформальних
      розповідей.
  - question: Що означає популярна українська ідіома 'сорока на хвості принесла' у
      контексті поширення чуток?
    options:
    - text: Спосіб приховати реальне джерело неперевіреної інформації.
      correct: true
    - text: Абсолютно достовірна та офіційно підтверджена новина.
      correct: false
    - text: Новина, яка стосується виключно тварин або природи.
      correct: false
    - text: Повідомлення, яке було надіслано поштою.
      correct: false
    explanation: Ця ідіома використовується, коли людина не хоче розкривати, від кого
      вона дізналася новину.
  - question: Яку граматичну форму дієслова ми використовуємо для утворення неозначено-особового
      речення в минулому часі?
    options:
    - text: Форму множини із закінченням -ли.
      correct: true
    - text: Безособову форму із закінченням -но або -то.
      correct: false
    - text: Дієприкметник чоловічого роду однини.
      correct: false
    - text: Форму першої особи множини із закінченням -мо.
      correct: false
    explanation: Минулий час використовує форму множини (казали, зробили), яка є універсальною
      для всіх родів.
  - question: Який відмінок використовується для прямого об'єкта дії (наприклад, у
      реченні 'Книгу видали')?
    options:
    - text: Знахідний відмінок
      correct: true
    - text: Називний відмінок
      correct: false
    - text: Родовий відмінок
      correct: false
    - text: Орудний відмінок
      correct: false
    explanation: Прямий об'єкт дії у таких реченнях обов'язково стоїть у Знахідному
      відмінку.
  - question: Яка з наведених фраз означає цілеспрямоване та навмисне поширення неправдивої
      інформації з певною метою?
    options:
    - text: Пустити чутку
      correct: true
    - text: Чутка пішла
      correct: false
    - text: За чутками
      correct: false
    - text: Почути новину
      correct: false
    explanation: Вираз 'пустити чутку' вказує на свідому, активну дію зі створення
      пліток.
  - question: Що ілюструє українське народне прислів'я 'Чужий рот не хлів — не зачинити'?
    options:
    - text: Неможливість контролювати обговорення подій людьми у суспільстві.
      correct: true
    - text: Важливість зберігання своїх власних таємниць від сусідів.
      correct: false
    - text: Необхідність завжди говорити тільки правду в очі.
      correct: false
    - text: Правила етикету під час прийому їжі в гостях.
      correct: false
    explanation: Прислів'я підкреслює, що люди завжди будуть говорити і поширювати
      інформацію, і цей процес не спинити.
- type: match-up
  title: Відповідність ситуацій
  instruction: З'єднайте офіційне повідомлення з його типовим розмовним еквівалентом.
  pairs:
  - left: Автомобіль було знайдено за містом.
    right: Кажуть, машину знайшли за містом.
  - left: Рішення про звільнення було ухвалено.
    right: Подейкують, його звільнили через конфлікт.
  - left: Вашу кредитну картку було заблоковано.
    right: Уявляєш, мені заблокували картку!
  - left: Ремонтні роботи на мості було завершено.
    right: Нарешті відремонтували той старий міст.
  - left: Дослідження було проведено минулого року.
    right: Минулого року провели дуже цікаве дослідження.
  - left: Кандидатуру було відхилено комісією.
    right: На жаль, мою кандидатуру відхилили.
  - left: Зарплату було підвищено на десять відсотків.
    right: Нам нарешті підвищили зарплату.
  - left: Контракт було підписано вчора ввечері.
    right: Вони все ж таки підписали контракт вчора.
  - left: Зустріч було перенесено на наступний вівторок.
    right: Зустріч перенесли на наступний вівторок.
  - left: Помилку було знайдено під час аудиту.
    right: Під час перевірки знайшли серйозну помилку.
- type: error-correction
  title: Виправте помилку
  instruction: Знайдіть і виправте типові граматичні помилки у вживанні неозначено-особових
    конструкцій.
  items:
  - sentence: Вони кажуть, що ця відома актриса скоро виходить заміж.
    error: Вони кажуть
    answer: Кажуть
    error_type: construction
    options:
    - Кажуть
    - Каже
    - Казати
    - Сказано
    explanation: Для створення неозначеності займенник 'вони' не використовується.
  - sentence: Вони повідомили мені про зміну розкладу поїздів.
    error: Вони повідомили
    answer: Мені повідомили
    error_type: construction
    options:
    - Мені повідомили
    - Повідомлено
    - Повідомив
    - Повідомляти
    explanation: Ми починаємо речення з адресата в Давальному відмінку без слова 'вони'.
  - sentence: Я запитали на співбесіді про мій попередній досвід роботи.
    error: Я
    answer: Мене
    error_type: word
    options:
    - Мене
    - Мені
    - Мною
    - Моє
    explanation: 'Об''єкт дії повинен стояти у Знахідному відмінку: запитали кого?
      — мене.'
  - sentence: Вони будують новий великий стадіон біля нашого міського парку.
    error: Вони будують
    answer: Будують
    error_type: construction
    options:
    - Будують
    - Будує
    - Збудовано
    - Будувати
    explanation: Видаліть займенник, щоб фокус залишився на самому факті будівництва.
  - sentence: Він обіцяли швидке підвищення зарплати вже наступного місяця.
    error: Він
    answer: Йому
    error_type: word
    options:
    - Йому
    - Його
    - Ним
    - На ньому
    explanation: 'Адресат обіцянки повинен стояти у Давальному відмінку: пообіцяли
      кому? — йому.'
  - sentence: Вона сказали прийти на важливу зустріч рівно о десятій годині.
    error: Вона
    answer: Їй
    error_type: word
    options:
    - Їй
    - Її
    - Нею
    - На ній
    explanation: 'Адресат дії вимагає Давального відмінка: сказали кому? — їй.'
  - sentence: Ми попросили зачекати в просторому холі ще п'ять хвилин.
    error: Ми
    answer: Нас
    error_type: word
    options:
    - Нас
    - Нам
    - Нами
    - На нас
    explanation: 'Об''єкт прохання ставиться у Знахідному відмінку: попросили кого?
      — нас.'
  - sentence: Я відповіли на всі надіслані запитання дуже швидко і чітко.
    error: Я
    answer: Мені
    error_type: word
    options:
    - Мені
    - Мене
    - Мною
    - На мені
    explanation: 'Отримувач відповіді ставиться у Давальному відмінку: відповіли кому?
      — мені.'
- type: true-false
  title: Правда чи хиба
  instruction: Визначте, чи є наступні твердження про пасив третьою особою множини
    правильними.
  items:
  - statement: В українській мові неозначено-особові речення обов'язково вимагають
      наявності займенника 'вони' перед дієсловом.
    correct: false
    explanation: Займенник 'вони' категорично не вживається, щоб зберегти справжнє
      пасивне значення.
  - statement: Ця граматична конструкція вважається найрозмовнішим варіантом пасиву
      в українській мові.
    correct: true
    explanation: Дійсно, це найприродніший спосіб розповісти про події у неформальному
      побутовому спілкуванні.
  - statement: Дієслова у таких реченнях завжди стоять у формі третьої особи однини.
    correct: false
    explanation: Дієслова стоять у формі третьої особи множини (наприклад, кажуть,
      роблять).
  - statement: У минулому часі для утворення цієї конструкції використовується закінчення
      -ли (наприклад, сказали, принесли).
    correct: true
    explanation: Форма на -ли є стандартною формою минулого часу множини в українській
      мові.
  - statement: Дієслова комунікації у цій конструкції вимагають використання Знахідного
      відмінка для особи-адресата (наприклад, Мене сказали).
    correct: false
    explanation: 'Для адресата комунікації використовується Давальний відмінок: Мені
      сказали.'
  - statement: Прямий об'єкт дії в неозначено-особових реченнях повинен стояти у Називному
      відмінку.
    correct: false
    explanation: Прямий об'єкт стоїть у Знахідному відмінку (наприклад, Машину вкрали,
      а не Машина вкрали).
  - statement: Ідіома 'сорока на хвості принесла' використовується для жартівливого
      приховування джерела інформації.
    correct: true
    explanation: Це класичний вираз, коли людина не хоче розкривати, від кого вона
      дізналася новину або плітку.
  - statement: В офіційно-діловому стилі частіше використовуються конструкції на -но/-то,
      ніж пасив третьою особою множини.
    correct: true
    explanation: Офіційні документи уникають розмовних конструкцій, віддаючи перевагу
      строгому пасиву на -но/-то.
  - statement: Вираз 'пустити чутку' означає пасивне спостереження за поширенням інформації.
    correct: false
    explanation: Цей вираз означає активну, свідому дію — навмисне поширення неперевіреної
      інформації.
  - statement: Українське прислів'я 'Чужий рот не хлів — не зачинити' ілюструє неможливість
      контролювати людські обговорення.
    correct: true
    explanation: Воно означає, що люди завжди будуть говорити і поширювати інформацію,
