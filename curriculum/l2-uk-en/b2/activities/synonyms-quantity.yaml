  instruction: Оберіть правильне слово для заповнення пропуску.
- type: quiz
  title: Оберіть правильний варіант
  items:
  - question: До якої частини мови або граматичної категорії належать слова багато
      та мало?
    explanation: Ці слова є неозначено-кількісними прислівниками або числівниками
      залежно від контексту.
    options:
    - text: прислівники
      correct: true
    - text: іменники
      correct: false
    - text: дієслова
      correct: false
    - text: прийменники
      correct: false
  - question: Який відмінок іменника слід використовувати після слова багато для злічуваних
      предметів?
    explanation: Після слів кількості використовується родовий відмінок множини.
    options:
    - text: родовий множини
      correct: true
    - text: називний множини
      correct: false
    - text: знахідний однини
      correct: false
    - text: давальний множини
      correct: false
  - question: Як правильно утворити вищий ступінь порівняння від прислівника багато?
    explanation: Слово багато має суплетивну форму вищого ступеня — більше.
    options:
    - text: більше
      correct: true
    - text: багатше
      correct: false
    - text: найбагатше
      correct: false
    - text: більш багато
      correct: false
  - question: Скільки одиниць чого-небудь містила традиційна українська міра під назвою
      копа?
    explanation: Копа — це шістдесят одиниць, зазвичай снопів.
    options:
    - text: шістдесят
      correct: true
    - text: сорок
      correct: false
    - text: сто
      correct: false
    - text: шістнадцять
      correct: false
  - question: Що буквально означає історичний фразеологізм не твоя копа молотиться?
    explanation: 'Цей вираз означає: зараз обмолочують не твої снопи пшениці.'
    options:
    - text: обмолочують не твої снопи
      correct: true
    - text: твоя робота ще не завершена
      correct: false
    - text: ти погано працюєш на полі
      correct: false
    - text: твоє зерно гіршої якості
      correct: false
  - question: Яку вагу в кілограмах мав традиційний український пуд у давнину?
    explanation: Пуд дорівнював приблизно 16,38 кілограма.
    options:
    - text: понад шістнадцять
      correct: true
    - text: рівно десять
      correct: false
    - text: близько тридцяти
      correct: false
    - text: понад сорок
      correct: false
  - question: Яке слово краще використати замість багато, щоб описати критичну нестачу
      ресурсів?
    explanation: Слово обмаль означає критичний дефіцит.
    options:
    - text: обмаль
      correct: true
    - text: чимало
      correct: false
    - text: купа
      correct: false
    - text: безліч
      correct: false
  - question: Чому вираз пара годин вважається стилістичною помилкою в українській
      літературній мові?
    explanation: Слово пара позначає два предмети, які складають одне ціле, а години
      такими не є.
    options:
    - text: години не утворюють пари
      correct: true
    - text: це застарілий вислів
      correct: false
    - text: це формальний вираз
      correct: false
    - text: слово пара стосується тварин
      correct: false
  - question: Яке слово слід використовувати перед прикметником для позначення високої
