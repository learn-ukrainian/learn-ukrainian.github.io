- type: reading
  title: 'Первинне джерело: Звіт про демографічну ситуацію'
  text: 'Згідно з останніми статистичними даними, у регіоні спостерігається значна
    кількість демографічних змін. Переважна більшість молодих фахівців обирає міські
    центри для розбудови кар''єри. Натомість у сільській місцевості залишається обмаль
    кваліфікованих кадрів. Хоча держава виділяє чимало коштів на підтримку аграрного
    сектору, левова частка цих фінансів іде на технічне переоснащення. Безліч експертів
    наголошує, що для стабільного розвитку потрібно набагато більше соціальних ініціатив.

    '
  tasks:
  - Яка демографічна тенденція спостерігається серед молодих фахівців?
  - Чого найбільше не вистачає у сільській місцевості?
  - На що витрачається левова частка державних коштів?
  - Що, на думку безлічі експертів, потрібно для стабільного розвитку?
- type: true-false
  title: 'Правда чи неправда: Сприйняття кількості'
  instruction: Визначте, чи відповідають твердження правилам вживання синонімів.
  items:
  - statement: Слово багато є емоційно забарвленим і використовується лише в розмовному
      стилі.
    correct: false
    explanation: Багато — це абсолютно нейтральне слово, доречне в усіх стилях.
  - statement: Слово чимало сигналізує про більшу кількість, ніж можна було очікувати.
    correct: true
    explanation: Чимало містить елемент експресії і означає солідну кількість.
  - statement: Безліч використовується для позначення дуже малої, незліченної кількості.
    correct: false
    explanation: Безліч означає величезну, неосяжну кількість, а не малу.
  - statement: У розмовному стилі слово купа часто має відтінок хаотичності.
    correct: true
    explanation: Наприклад, вираз купа проблем підкреслює їхню неорганізованість.
  - statement: Маса частіше використовується для опису позитивних вражень, ніж купа.
    correct: true
    explanation: Маса задоволення звучить природніше, ніж купа задоволення.
  - statement: Слово мало завжди має позитивну конотацію і означає достатність.
    correct: false
    explanation: Мало майже завжди несе в собі значення недостатності та дефіциту.
  - statement: Слово трохи констатує наявність хоча б невеликої частини чогось.
    correct: true
    explanation: На відміну від мало, трохи має позитивний фокус.
  - statement: Обмаль використовується переважно в розмовному стилі для опису великих
      обсягів.
    correct: false
    explanation: Обмаль означає критичну нестачу і характерне для офіційно-ділового
      та публіцистичного стилів.
  - statement: Слова кілька та декілька є абсолютними семантичними синонімами.
    correct: true
    explanation: Вони означають одне й те саме, хоча декілька є трохи формальнішим.
  - statement: В українській мові правильно казати пара хвилин на позначення невизначеного
      короткого часу.
    correct: false
    explanation: Це російська калька. Правильно казати кілька хвилин, бо хвилини не
      утворюють логічної пари.
