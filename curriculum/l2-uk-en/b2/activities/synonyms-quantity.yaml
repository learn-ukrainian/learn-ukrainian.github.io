    explanation: Перед прикметниками і прислівниками використовується слово дуже.
    options:
    - text: дуже
      correct: true
    - text: багато
      correct: false
    - text: чимало
      correct: false
    - text: безліч
      correct: false
  - question: Яка стала фраза з публіцистичного стилю означає понад сімдесят відсотків
      від загальної кількості?
