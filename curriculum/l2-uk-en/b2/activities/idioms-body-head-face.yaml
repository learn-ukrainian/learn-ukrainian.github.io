- type: reading
  title: "Текст: Портрет нового колеги"
  instruction: "Прочитайте короткий опис і дайте відповіді на запитання."
  text: |
    Наш новий співробітник з'явився в офісі як сніг на голову. Його перевели з іншого відділу без попередження. Спочатку ми подумали, що він буде задирати носа, адже він обіймав високу посаду. Але виявилося, що він має світлу голову і швидко вирішує найскладніші проблеми. Він ніколи не дозволяє конкурентам замилювати собі очі. Коли підрядник намагався водити нас за ніс з термінами, Тарас одразу нашорошив вуха і сказав усе не в бров, а в око. Його зауваження врятувало компанію від фінансових втрат, і він точно не дав нам втратити обличчя перед клієнтами.
  tasks:
    - "Яке перше враження справив новий співробітник на колектив?"
    - "Як Тарас відреагував на дії несумлінного підрядника?"
    - "Що означає фраза 'сказав усе не в бров, а в око' в цьому контексті?"

- type: true-false
  title: "Правда чи неправда: Значення фразеологізмів"
  items:
    - statement: "Вираз 'впадати в око' є питомо українським і правильним."
      answer: true
      explanation: "Так, це правильний український відповідник до російської кальки 'кидатися в очі'."
    - statement: "Фразеологізм 'вішати голову' означає радіти успіхам."
      answer: false
      explanation: "Цей вираз означає впадати у відчай, зневірюватися."
    - statement: "'Ламати голову' — це процес напруженого мислення над складною задачею."
      answer: true
      explanation: "Так, це метафора важкої розумової праці."
    - statement: "Вираз 'опростоволоситися' пов'язаний із традиційним чоловічим одягом."
      answer: false
      explanation: "Він пов'язаний із жіночим головним убором — очіпком."
    - statement: "'Замилювати очі' означає навмисно приховувати правду і створювати хибне враження."
      answer: true
      explanation: "Так, це ідіома на позначення обману та лицемірства."
    - statement: "Правильно говорити 'сміятися над кимось', а не 'сміятися з когось'."
      answer: false
      explanation: "Українська граматична норма вимагає конструкції 'сміятися з когось'."
    - statement: "Ідіома 'як сніг на голову' описує подію, яка відбувається дуже повільно."
      answer: false
      explanation: "Цей вираз означає щось абсолютно раптове і несподіване."
    - statement: "'Водити за ніс' — це обманювати когось і давати пусті обіцянки."
      answer: true
      explanation: "Так, цей вираз походить від традиції водіння ведмедів на ярмарках."
    - statement: "'Втратити обличчя' є фразеологізмом офіційно-ділового та публіцистичного стилю."
      answer: true
      explanation: "Так, він часто вживається в корпоративному та політичному контекстах."
    - statement: "Вираз 'не в бров, а в око' означає зробити серйозну помилку."
      answer: false
      explanation: "Він означає зробити дуже влучне зауваження або дію."
    - statement: "'Нашорошити вуха' означає уважно прислухатися до чогось."
      answer: true
      explanation: "Так, це метафора максимальної уважності та пильності."
    - statement: "'Морочити голову' та 'ламати голову' мають абсолютно однакове значення."
      answer: false
      explanation: "'Ламати голову' — думати самому, а 'морочити голову' — створювати проблеми іншому."

- type: match-up
  title: "Знайдіть пару: Фразеологізм і його значення"
  items:
    - premise: "мати голову на плечах"
      response: "керуватися здоровим глуздом"
    - premise: "замилювати очі"
      response: "створювати хибне враження"
    - premise: "задирати носа"
      response: "демонструвати пихатість"
    - premise: "розвісити вуха"
      response: "бути занадто довірливим"
    - premise: "хоч око виколи"
      response: "про абсолютну темряву"
    - premise: "світла голова"
      response: "розумна, розсудлива людина"
    - premise: "пропустити повз вуха"
      response: "свідомо проігнорувати інформацію"
    - premise: "опростоволоситися"
      response: "зробити помилку, зганьбитися"

