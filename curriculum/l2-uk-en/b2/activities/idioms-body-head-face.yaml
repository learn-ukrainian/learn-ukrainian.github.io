- type: fill-in
  title: 'Доповніть речення'
  instruction: 'Оберіть правильний фразеологізм, щоб доповнити кожне речення.'
  items:
    - sentence: 'Наш новий інженер — справді світла _____; він швидко розв`язав усі проблеми.'
      answer: 'голова'
      options:
        - 'голова'
        - 'особа'
        - 'людина'
        - 'думка'
      explanation: 'Вислів "світла голова" описує дуже розумну людину.'
    - sentence: 'Новий співробітник одразу впав мені в _____, адже він був надзвичайно активним.'
      answer: 'око'
      options:
        - 'око'
        - 'вухо'
        - 'обличчя'
        - 'пам`ять'
      explanation: 'Правильний український вираз — "впадати в око".'
    - sentence: 'Підрядник уже третій місяць водить нас за _____, обіцяючи закінчити ремонт.'
      answer: 'ніс'
      options:
        - 'ніс'
        - 'вухо'
        - 'руку'
        - 'палець'
      explanation: 'Фразеологізм "водити за ніс" означає постійно обманювати.'
    - sentence: 'Він сказав не в бров, а в _____, і це повністю змінило хід нашої розмови.'
      answer: 'око'
      options:
        - 'око'
        - 'ніс'
        - 'лоб'
        - 'вухо'
      explanation: 'Цей вираз описує абсолютну точність слів.'
    - sentence: 'Шахраї обіцяли йому швидкий прибуток, а він і розвісив _____, віддавши їм гроші.'
      answer: 'вуха'
      options:
        - 'вуха'
        - 'руки'
        - 'очі'
        - 'волосся'
      explanation: 'Розвісити вуха означає бути наївним і довірливим.'
    - sentence: 'Щоб вести бізнес у такі складні часи, треба мати голову на _____ і добре думати.'
      answer: 'плечах'
      options:
        - 'плечах'
        - 'шиї'
        - 'місці'
        - 'роботі'
      explanation: 'Вислів "мати голову на плечах" означає бути розсудливим.'
    - sentence: 'Я вже дві години ламаю _____ над цим звітом, але цифри не сходяться.'
      answer: 'голову'
      options:
        - 'голову'
        - 'руки'
        - 'олівець'
        - 'стіл'
      explanation: 'Ламати голову — це інтенсивно думати над чимось.'
    - sentence: 'Після того корупційного скандалу політик назавжди втратив _____ перед виборцями.'
      answer: 'обличчя'
      options:
        - 'обличчя'
        - 'статус'
        - 'владу'
        - 'гроші'
      explanation: 'Втратити обличчя — зазнати серйозного репутаційного краху.'
    - sentence: 'Потрібно припинити замилювати нам _____ своїми порожніми обіцянками!'
      answer: 'очі'
      options:
        - 'очі'
        - 'окуляри'
        - 'вікна'
        - 'обличчя'
      explanation: 'Замилювати очі означає створювати хибне враження.'
    - sentence: 'Як тільки вчителі заговорили про іспит, усі учні миттєво нашорошили _____.'
      answer: 'вуха'
      options:
        - 'вуха'
        - 'голови'
        - 'носи'
        - 'очі'
      explanation: 'Нашорошити вуха — це почати уважно прислухатися.'

