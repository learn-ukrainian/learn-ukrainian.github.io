- type: error-correction
  title: 'Виправте лексичні помилки'
  instruction: 'Знайдіть та виправте неправильно вжитий фразеологізм або його частину.'
  items:
    - sentence: 'Її нова червона сукня одразу кинулася мені в очі на вечірці.'
      error: 'кинулася мені в очі'
      answer: 'впала мені в око'
      error_type: 'phrase'
      options:
        - 'впала мені в око'
        - 'впала мені в очі'
        - 'кинулася мені в око'
        - 'вдарила мені в очі'
      explanation: 'Правильний український вираз — впадати в око, а "кидатися в очі" є калькою.'
    - sentence: 'Колеги довго сміялися над ним після тієї безглуздої помилки.'
      error: 'сміялися над ним'
      answer: 'сміялися з нього'
      error_type: 'construction'
      options:
        - 'сміялися з нього'
        - 'сміялися біля нього'
        - 'сміялися через нього'
        - 'сміялися від нього'
      explanation: 'В українській мові використовується прийменник "з": сміятися з когось.'
    - sentence: 'Коли він не зміг відповісти на просте запитання, він дуже обличчя втратив.'
      error: 'обличчя втратив'
      answer: 'опростоволосився'
      error_type: 'register'
      options:
        - 'опростоволосився'
        - 'обличчя загубив'
        - 'ніс опустив'
        - 'голову схилив'
      explanation: 'У розмовному стилі для опису дрібної помилки краще використати слово "опростоволосився".'
    - sentence: 'Ми вже три години морочимо голову над цією складною математичною задачею.'
      error: 'морочимо голову'
      answer: 'ламаємо голову'
      error_type: 'phrase'
      options:
        - 'ламаємо голову'
        - 'крутимо голову'
        - 'сушимо очі'
        - 'ламаємо ніс'
