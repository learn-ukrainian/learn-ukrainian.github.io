- type: fill-in
  title: "Вставте пропущене слово у фразеологізм"
  items:
    - sentence: "Директор постійно намагався замилювати інвесторам _, приховуючи реальні проблеми компанії."
      answer: "очі"
      options: ["очі", "вуха", "ніс", "голову"]
    - sentence: "Коли він зрозумів, що його план провалився, він сумно повісив _ і вийшов з кімнати."
      answer: "голову"
      options: ["голову", "очі", "ніс", "руки"]
    - sentence: "Не дозволяй цьому шахраю водити себе за _; вимагай чітких відповідей."
      answer: "ніс"
      options: ["ніс", "око", "вухо", "палець"]
    - sentence: "Ця яскрава картина у вітрині галереї одразу впала мені в _."
      answer: "око"
      options: ["око", "голову", "душу", "серце"]
    - sentence: "Студенти уважно нашорошили _, коли професор почав розповідати про екзамен."
      answer: "вуха"
      options: ["вуха", "носи", "брови", "очі"]
    - sentence: "Він сказав так влучно, просто не в бров, а в _, що ніхто не міг йому заперечити."
      answer: "око"
      options: ["око", "ніс", "чоло", "вухо"]
    - sentence: "Після підвищення вона так задерла _, що навіть не вітається з колишніми колегами."
      answer: "носа"
      options: ["носа", "голову", "підборіддя", "очі"]
    - sentence: "Мені довелося довго ламати _, щоб вирішити цю математичну задачу."
      answer: "голову"
      options: ["голову", "розум", "мозок", "думки"]

- type: unjumble
  title: "Складіть речення з ідіомами"
  items:
    - words: ["він", "завжди", "має", "голову", "на", "плечах", "і", "діє", "спокійно"]
      answer: "Він завжди має голову на плечах і діє спокійно"
    - words: ["цей", "сюрприз", "звалився", "на", "нас", "як", "сніг", "на", "голову"]
      answer: "Цей сюрприз звалився на нас як сніг на голову"
    - words: ["не", "треба", "сміятися", "з", "людини", "яка", "зробила", "помилку"]
      answer: "Не треба сміятися з людини яка зробила помилку"
    - words: ["політик", "втратив", "обличчя", "після", "цього", "корупційного", "скандалу"]
      answer: "Політик втратив обличчя після цього корупційного скандалу"
    - words: ["менеджер", "серйозно", "опростоволосився", "під", "час", "важливої", "презентації"]
      answer: "Менеджер серйозно опростоволосився під час важливої презентації"
    - words: ["вона", "пропустила", "всі", "зауваження", "керівника", "повз", "вуха"]
      answer: "Вона пропустила всі зауваження керівника повз вуха"

- type: error-correction
  title: "Виправте лексичні та граматичні помилки"
  items:
    - sentence: "Ця червона сукня одразу кинулася мені в очі, коли я зайшла до магазину."
      error: "кинулася мені в очі"
      answer: "впала мені в око"
      options: ["впала мені в око", "вдарила мені в ніс", "кинулася на мене", "потрапила в очі"]
      explanation: "Українською мовою правильно говорити 'впадати в око', уникайте російської кальки 'кидатися в очі'."
    - sentence: "Колеги довго сміялися над ним після його безглуздого виступу."
      error: "над ним"
      answer: "з нього"
      options: ["з нього", "під ним", "за нього", "про нього"]
      explanation: "Українська норма вимагає вживання прийменника 'з' після дієслова 'сміятися' (сміятися з когось)."
    - sentence: "Перестань морочити собі голову цією складною задачею і просто відпочинь."
      error: "морочити"
      answer: "ламати"
      options: ["ламати", "вішати", "задирати", "крутити"]
      explanation: "Докладати важких когнітивних зусиль — це 'ламати голову'. 'Морочити голову' означає створювати проблеми іншому."
    - sentence: "Він постійно ламає мені голову своїми безглуздими запитаннями."
      error: "ламає"
      answer: "морочить"
      options: ["морочить", "милить", "вішає", "рубає"]
      explanation: "Коли хтось набридає і створює незручності іншому, він 'морочить голову'."
    - sentence: "Хлопчик дуже уважно слухав казку і навіть розвісив вуха від цікавості."
      error: "розвісив"
      answer: "нашорошив"
      options: ["нашорошив", "підняв", "відкрив", "витягнув"]
      explanation: "Уважно прислухатися — це 'нашорошити вуха'. 'Розвісити вуха' означає бути наївно довірливим."
    - sentence: "Ця новина про звільнення впала на нас як лід на голову."
      error: "лід"
      answer: "сніг"
      options: ["сніг", "дощ", "камінь", "град"]
      explanation: "Правильний фразеологізм звучить 'як сніг на голову'."

