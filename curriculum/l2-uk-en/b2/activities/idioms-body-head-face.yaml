- type: reading
  title: 'Первинне джерело: Текст для аналізу'
  instruction: 'Прочитайте короткий текст і дайте відповіді на запитання нижче.'
  text: |
    Наш новий керівник відділу, пан Тарас, — людина надзвичайна. Всі в офісі погоджуються, що він справді світла голова. Він ніколи не панікує під час криз, бо завжди має голову на плечах і вміє швидко знаходити рішення. Проте він терпіти не може, коли співробітники намагаються замилювати йому очі неправдивими звітами. Він завжди вимагає повної чесності, і його зауваження часто б'ють не в бров, а в око. Одного разу наш молодий стажер спробував водити його за ніс, обіцяючи здати проект вчасно, хоча навіть не розпочинав роботу. Тарас відразу нашорошив вуха, зрозумівши обман. Стажер страшенно опростоволосився перед усім колективом, і довго ще колеги потайки сміялися з нього.
  tasks:
    - 'Які риси характеру має пан Тарас?'
    - 'Чому він не любить неправдиві звіти?'
    - 'Що зробив стажер і які були наслідки?'
    - 'Як колеги відреагували на ситуацію зі стажером?'

- type: true-false
  title: 'Визначте правдивість тверджень'
  instruction: 'Прочитайте твердження та визначте, чи вони відповідають змісту прочитаного.'
  items:
    - statement: 'Фразеологізм "світла голова" описує імпульсивну людину.'
      correct: false
      explanation: 'Світла голова позначає розумну та розсудливу людину.'
    - statement: 'Вираз "водити за ніс" походить від ярмаркових розваг із ведмедями.'
      correct: true
      explanation: 'Ведмедів водили за кільце в носі, що стало метафорою маніпуляції.'
    - statement: 'Слово "опростоволоситися" пов`язане зі старовинним чоловічим одягом.'
      correct: false
      explanation: 'Цей вираз пов`язаний із жіночим головним убором — очіпком.'
    - statement: 'Вираз "втратити обличчя" найчастіше вживається в офіційно-діловому стилі.'
      correct: true
      explanation: 'Цей фразеологізм стосується серйозних репутаційних втрат.'
    - statement: 'Правильно казати "сміятися над ним", а не "сміятися з нього".'
      correct: false
      explanation: 'Українська мова вимагає прийменника "з": сміятися з когось.'
    - statement: 'Вислів "як сніг на голову" означає, що подія відбулася дуже раптово.'
      correct: true
      explanation: 'Це метафора повної несподіванки.'
    - statement: 'Якщо хтось "морочить голову", він активно й напружено думає над проблемою.'
      correct: false
      explanation: 'Це означає "набридати або заплутувати". Напружено думати — "ламати голову".'
    - statement: 'Фразеологізм "хоч око виколи" описує абсолютну, непроглядну темряву.'
      correct: true
      explanation: 'Цей гіперболічний вираз позначає цілковиту відсутність світла.'
    - statement: 'Казати "кидатися в очі" є правильною українською літературною нормою.'
      correct: false
      explanation: 'Це калька з російської. Правильно казати "впадати в око".'
    - statement: 'Вислів "нашорошити вуха" означає почати дуже уважно прислухатися.'
      correct: true
      explanation: 'Він походить від поведінки тварин, які піднімають вуха, коли відчувають небезпеку або цікавість.'

- type: quiz
  title: 'Перевірте свої знання'
  instruction: 'Оберіть правильний варіант відповіді на кожне запитання.'
  items:
    - question: 'Який фразеологізм найкраще описує людину, яка діє дуже імпульсивно та під впливом емоцій?'
      explanation: 'Гаряча голова — це людина, схильна до раптових емоційних вчинків.'
      options:
        - text: 'світла голова'
          correct: false
        - text: 'гаряча голова'
          correct: true
        - text: 'голова зборів'
          correct: false
        - text: 'розумна голова'
          correct: false
    - question: 'Звідки в українську мову прийшов концепт втрати репутації через вираз "втратити обличчя"?'
      explanation: 'Цей вираз є перекладом метафори з далекосхідної філософії.'
      options:
        - text: 'Зі східної філософії'
          correct: true
        - text: 'З європейської дипломатії'
          correct: false
        - text: 'З народних ярмарків'
          correct: false
        - text: 'З військової термінології'
          correct: false
    - question: 'Яке дієслово найкраще передає ідею навмисного обману та створення хибної картини реальності?'
      explanation: 'Замилювати очі означає відволікати увагу від правди красивою ілюзією.'
      options:
        - text: 'замилювати очі'
          correct: true
        - text: 'впадати в око'
          correct: false
        - text: 'морочити голову'
          correct: false
        - text: 'розвісити вуха'
          correct: false
    - question: 'Як правильно сказати про глузування над іншою людиною українською мовою?'
      explanation: 'Нормативне прийменникове керування — сміятися з когось.'
      options:
        - text: 'сміятися над кимось'
          correct: false
        - text: 'сміятися з когось'
          correct: true
        - text: 'сміятися об когось'
          correct: false
        - text: 'сміятися від когось'
          correct: false
    - question: 'Який із цих виразів має найвиразніше офіційно-ділове стилістичне забарвлення?'
      explanation: 'Втратити обличчя використовується у формальному та діловому мовленні.'
      options:
        - text: 'опростоволоситися'
          correct: false
        - text: 'задирати носа'
          correct: false
        - text: 'втратити обличчя'
          correct: true
        - text: 'водити за ніс'
          correct: false
    - question: 'Що буквально означало "опростоволоситися" в традиційній українській культурі минулих століть?'
      explanation: 'Це означало появу заміжньої жінки на людях без очіпка, з непокритим волоссям.'
      options:
        - text: 'Показатися людям з непокритою головою'
          correct: true
        - text: 'Помити волосся в річці'
          correct: false
        - text: 'Обрізати довгу косу'
          correct: false
        - text: 'Забути розчесатися вранці'
          correct: false
    - question: 'Який соматизм використовують для опису надзвичайно влучного і точного висловлювання?'
      explanation: 'Вираз "не в бров, а в око" означає ідеальну точність слів або дій.'
      options:
        - text: 'хоч око виколи'
          correct: false
        - text: 'впадати в око'
          correct: false
        - text: 'замилювати очі'
          correct: false
        - text: 'не в бров, а в око'
          correct: true
    - question: 'Що означає вислів "ламати голову" в контексті виконання складного робочого завдання?'
      explanation: 'Він позначає активний внутрішній когнітивний процес розв`язання проблеми.'
      options:
        - text: 'створювати проблеми колегам'
          correct: false
        - text: 'дуже напружено та довго думати'
          correct: true
        - text: 'відмовитися від виконання роботи'
          correct: false
        - text: 'робити щось дуже швидко і недбало'
          correct: false
    - question: 'Який із цих соматизмів описує дуже наївну та довірливу людину, якою легко маніпулювати?'
      explanation: 'Розвісити вуха означає слухати надто довірливо, втративши критичне мислення.'
      options:
        - text: 'нашорошити вуха'
          correct: false
        - text: 'пропустити повз вуха'
          correct: false
        - text: 'розвісити вуха'
          correct: true
        - text: 'закрити вуха'
          correct: false
    - question: 'Що ми маємо на увазі, коли кажемо, що людина має "голову на плечах"?'
      explanation: 'Цей вираз означає розсудливість і здатність самостійно приймати правильні рішення.'
      options:
        - text: 'людина є дуже впертою'
          correct: false
        - text: 'людина має гарну поставу'
          correct: false
        - text: 'людина є розумною і зваженою'
          correct: true
        - text: 'людина дуже швидко бігає'
          correct: false

