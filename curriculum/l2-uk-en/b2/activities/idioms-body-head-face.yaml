- type: essay-response
  title: 'Лінгвістичний портрет особистості'
  instruction: 'Напишіть невелике есе, використовуючи фразеологізми.'
  prompt: 'Створіть лінгвістичний портрет знайомої вам людини (або вигаданого персонажа). Опишіть її характер, поведінку та стиль спілкування. Обов`язково використайте принаймні п`ять соматичних фразеологізмів із цього модуля (наприклад: світла голова, водити за ніс, задирати носа, впадати в око тощо). Обсяг — мінімум 150 слів.'
  min_words: 150
  model_answer: 'Хочу детально розповісти про свого колишнього начальника, талановитого пана Андрія. Усі в нашій великій компанії абсолютно погоджувалися з тим, що він справжня світла голова. Він завжди мав голову на плечах і вмів блискавично швидко знаходити правильний вихід із найскладніших кризових ситуацій, які час від часу падали на нас як сніг на голову. Пан Андрій був дуже вимогливим і ніколи не дозволяв своїм підлеглим замилювати очі пустими обіцянками або неточними фінансовими звітами. Проте, навіть коли хтось із молодих працівників робив дуже серйозну помилку і відверто опростоволосився на нараді, керівник ніколи не починав сміятися з нього чи жорстоко публічно критикувати. Він міг викликати людину наодинці у свій кабінет і сказати все чесно, прямо не в бров, а в око. Лише одного єдиного разу я бачив, як він по-справжньому розлютився: це сталося того дня, коли наш новий діловий партнер спробував нахабно водити його за ніс під час підписання важливого контракту. Андрій одразу нашорошив вуха, помітивши нестиковки в документах, і миттєво зупинив переговори, щоб зберегти бездоганну ділову репутацію і назавжди не втратити обличчя нашої успішної фірми. Працювати пліч-о-пліч з такою неймовірною людиною було найбільшою школою справжнього професіоналізму для мене і всіх моїх колег.'
  rubric:
    - criteria: 'Використання фразеологізмів'
      description: 'Використано щонайменше 5 соматичних фразеологізмів з модуля.'
      points: 5
    - criteria: 'Доречність регістра'
      description: 'Фразеологізми вжито доречно, без порушення стилістичних норм.'
      points: 3
    - criteria: 'Граматична правильність'
      description: 'Текст не містить граматичних помилок (особливо кальк на кшталт "сміятися над").'
      points: 2