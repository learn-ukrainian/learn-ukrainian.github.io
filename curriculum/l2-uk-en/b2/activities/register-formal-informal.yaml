- type: essay-response
  title: Напишіть два прохання
  prompt: 'Уявіть, що вам потрібно терміново перенести зустріч на інший день через
    непередбачені обставини. Напишіть два різних повідомлення: 1) Офіційний електронний
    лист до директора департаменту (використовуйте формальний стиль, поважні форми
    звертання та віддієслівні іменники). 2) Коротке повідомлення колезі-приятелю у
    месенджері (використовуйте неформальний стиль, еліпсис та колегіальний тон). Обидва
    тексти повинні передавати одну й ту саму інформацію.'
  min_words: 150
  model_answer: 1) Вельмишановний пане Директоре! Звертаюся до вас із проханням розглянути
    можливість перенесення нашої запланованої зустрічі на інший день. З огляду на
    непередбачені технічні обставини, я об'єктивно потребую додаткового часу для підготовки
    належних матеріалів. Заздалегідь вдячний за ваше розуміння. 2) Привіт, Максе!
    Слухай, у мене тут виник невеликий завал. Чи можемо ми якось посунути нашу зустріч
    на інший день? Хочу все нормально підготувати без поспіху. Що скажеш?
  rubric:
  - criteria: Формальний стиль
    description: Наявність правильного офіційного звертання (пане Директоре), використання
      Ви, відсутність розмовної лексики.
    points: 4
  - criteria: Неформальний стиль
    description: Наявність дружнього звертання (на ти), використання розмовних виразів
      та еліпсису.
    points: 4
  - criteria: Лексичне різноманіття
