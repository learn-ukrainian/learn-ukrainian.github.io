  - words:
    - пане
    - директоре
    - дозвольте
    - поставити
    - вам
    - декілька
    - запитань
    answer: Пане директоре, дозвольте поставити вам декілька запитань.
  - words:
    - керівництво
    - ухвалило
    - рішення
    - щодо
    - припинення
    - цієї
    - співпраці
    answer: Керівництво ухвалило рішення щодо припинення цієї співпраці.
  - words:
    - пропоную
    - звертатися
    - одне
    - до
    - одного
    - на
    - ти
    answer: Пропоную звертатися одне до одного на ти.
  - words:
    - яка
    - ви
    - сьогодні
    - надзвичайно
    - красива
    - та
    - елегантна
    answer: Яка ви сьогодні надзвичайно красива та елегантна!
  - words:
    - ви
    - завжди
    - такі
    - уважні
    - до
    - найдрібніших
    - деталей
    answer: Ви завжди такі уважні до найдрібніших деталей.
  - words:
    - чи
    - можемо
    - ми
    - перенести
    - нашу
    - завтрашню
    - зустріч
    answer: Чи можемо ми перенести нашу завтрашню зустріч?
  instruction: Розташуйте слова у правильному порядку.
- type: select
  title: Оберіть усі правильні варіанти
  items:
  - question: Які слова допомагають логічно структурувати текст у формальному мовленні?
    min_correct: 3
    options:
    - text: по-перше
      correct: true
    - text: отже
      correct: true
    - text: коротше кажучи
      correct: false
    - text: водночас
      correct: true
