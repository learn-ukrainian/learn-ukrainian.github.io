- type: match-up
  title: 'Знайдіть пару: ситуація та доречне звертання'
  pairs:
  - left: Звертання до директора школи
    right: Пане директоре
  - left: Звертання до давнього друга
    right: Привіт, Максе
  - left: Звертання до лікаря в лікарні
    right: Пані лікарко
  - left: Звертання до професора університету
    right: Пане професоре
  - left: Ввічливе звертання до незнайомця на вулиці
    right: Перепрошую, підкажіть
  - left: Звертання до судді під час засідання
    right: Ваша честе
  - left: Звертання до президента країни
    right: Вельмишановний пане Президенте
  - left: Завершення формального ділового листа
    right: З повагою
  - left: Завершення повідомлення товаришу
    right: До зустрічі
  - left: Традиційне звертання до вчительки
    right: Олено Петрівно
  instruction: З'єднайте відповідні елементи.
- type: quiz
  title: Перевірте знання мовленнєвого етикету
  items:
  - question: Як правильно звернутися до незнайомої людини на вулиці, щоб запитати
      дорогу, не порушуючи правил етикету?
    explanation: Використання нейтральних дієслівних форм, таких як Перепрошую або
      Вибачте, є найвищим проявом поваги до особистих кордонів.
    options:
    - text: Перепрошую, ви не підкажете дорогу?
      correct: true
    - text: Жіночко, як пройти до метро?
      correct: false
    - text: Чоловіче, де тут зупинка?
      correct: false
    - text: Гей, підкажіть шлях, будь ласка.
      correct: false
  - question: Яке граматичне правило узгодження дієслів у минулому часі діє при ввічливому
      звертанні до однієї людини на Ви?
    explanation: Дієслово після ввічливого Ви завжди стоїть у формі множини, незалежно
      від реальної кількості людей.
    options:
    - text: Дієслово завжди стоїть у формі множини.
      correct: true
    - text: Дієслово стоїть в однині чоловічого роду.
      correct: false
    - text: Дієслово стоїть в однині жіночого роду.
      correct: false
    - text: Дієслово можна використовувати в будь-якій формі.
      correct: false
  - question: Яка форма звертання вважається сучасним єталоном ділового та ввічливого
      спілкування в українському суспільстві?
    explanation: Сучасним стандартом, який витісняє радянську форму з по батькові,
      є конструкція Пан або Пані разом з іменем.
    options:
    - text: Пан або пані разом з іменем.
      correct: true
    - text: Ім'я разом з по батькові.
      correct: false
    - text: Тільки прізвище людини без імені.
      correct: false
    - text: Пан разом з іменем і по батькові.
      correct: false
  - question: Чому використання конструкції Пане Іване Петровичу (пан + ім'я + по
      батькові) є грубою стилістичною помилкою?
    explanation: 'Це явище називається Pan mismatch і є змішуванням двох абсолютно
      різних парадигм етикету: західної та радянської.'
    options:
    - text: Це змішування західноєвропейської та східноєвропейської традицій.
      correct: true
    - text: Ця форма є занадто короткою і неформальною.
      correct: false
    - text: Слово пан використовується лише з прізвищами.
      correct: false
    - text: Це правило стосується лише звертань до жінок.
      correct: false
  - question: Згідно з чинним правописом, у яких специфічних випадках ми маємо обов'язково
      писати займенник Ви з великої літери?
    explanation: Займенник Ви пишеться з великої літери виключно в індивідуальному
      офіційному листуванні або на персональних вітальних листівках.
    options:
    - text: Лише в індивідуальному офіційному або вітальному листуванні.
      correct: true
    - text: Завжди у всіх публічних текстах та коментарях.
      correct: false
    - text: У групових робочих чатах у соціальних мережах.
      correct: false
    - text: У рекламних текстах, звернених до широкої аудиторії.
      correct: false
  - question: Хто за правилами класичного українського ділового етикету має пріоритетне
      право першим запропонувати перехід з Ви на ти?
    explanation: Старша за віком або вища за посадою людина завжди має пріоритетне
      право ініціювати скорочення соціальної дистанції.
    options:
    - text: Старша за віком або вища за посадою людина.
      correct: true
    - text: Молодша за віком або нижча за посадою людина.
      correct: false
    - text: Людина, яка працює в компанії менше часу.
      correct: false
    - text: Будь-який учасник розмови в будь-який зручний момент.
      correct: false
  - question: Як правильно граматично узгодити прикметник-предикат у яскравому емоційному
      вигуку, який починається зі слова Яка?
    explanation: В емоційних вигуках прикметник несподівано втрачає форму множини
      і узгоджується безпосередньо з біологічною статтю.
    options:
    - text: Прикметник узгоджується в однині з біологічною статтю.
      correct: true
    - text: Прикметник обов'язково узгоджується у формі множини.
      correct: false
    - text: Прикметник завжди стоїть у чоловічому роді однини.
      correct: false
    - text: Прикметник завжди стоїть у середньому роді однини.
      correct: false
  - question: Яке з цих слів ідеально описує людину, з якою вас пов'язують випробувані
      роками стосунки та найвища довіра?
    explanation: Слово друг описує найвищий рівень емоційної близькості та абсолютної
      довіри у стосунках.
    options:
    - text: Друг.
      correct: true
    - text: Приятель.
      correct: false
    - text: Колега.
      correct: false
    - text: Знайомий.
      correct: false
  - question: Що таке синтаксичний еліпсис, який дуже часто використовується носіями
      мови у неформальному повсякденному спілкуванні?
    explanation: Еліпсис — це свідомий пропуск у реченні слів, які співрозмовник може
      миттєво відновити із загального контексту.
    options:
    - text: Пропуск у реченні слів, які можна зрозуміти з контексту.
      correct: true
    - text: Використання складних граматичних конструкцій і зворотів.
      correct: false
    - text: Написання всіх займенників виключно з великої літери.
      correct: false
    - text: Вживання застарілих та маловживаних історичних слів.
      correct: false
  - question: Який відмінок є безальтернативним та обов'язковим при прямому звертанні
      до людини за чинним Державним стандартом?
    explanation: Будь-яке пряме звертання до особи безальтернативно вимагає використання
      форми кличного відмінка.
    options:
    - text: Кличний відмінок завжди обов'язковий.
      correct: true
    - text: Називний відмінок завжди обов'язковий.
      correct: false
    - text: Родовий відмінок завжди обов'язковий.
      correct: false
    - text: Знахідний відмінок завжди обов'язковий.
      correct: false
  instruction: Оберіть правильну відповідь.
- type: fill-in
  title: Оберіть правильне слово для контексту
  items:
  - sentence: Пане Андрію, чи ви вже __ цей важливий фінансовий звіт?
    answer: підготували
    options:
    - підготували
    - підготував
    - підготувала
    - підготуємо
  - sentence: Шановна __, дозвольте розпочати нашу сьогоднішню конференцію.
    answer: громадо
    options:
    - громадо
    - громада
    - громаду
    - громаді
  - sentence: Олено, ти __ зі мною на каву після закінчення робочого дня?
    answer: підеш
    options:
    - підеш
    - підемо
    - підете
    - піду
  - sentence: Після ретельного аналізу ми __ рішення щодо припинення співпраці.
    answer: ухвалили
    options:
    - ухвалили
    - прийняли
    - вирішили
    - зробили
  - sentence: Яка ви сьогодні __ та елегантна у цій новій сукні!
    answer: красива
    options:
    - красива
    - красиві
    - красивих
    - красивим
  - sentence: __, чи не підкажете ви, як мені пройти до найближчого парку?
    answer: Перепрошую
    options:
    - Перепрошую
    - Чоловіче
    - Жіночко
    - Слухай
  - sentence: Ви завжди такі __ до найдрібніших деталей нашого контракту.
    answer: уважні
    options:
    - уважні
    - уважний
    - уважна
    - уважному
  - sentence: Маріє Іванівно, як сьогодні ваше __ після вчорашньої процедури?
    answer: самопочуття
    options:
    - самопочуття
    - справи
    - здоров'ячко
    - настрій
  - sentence: Шановний пане __, дозвольте поставити вам кілька уточнюючих запитань.
    answer: директоре
    options:
    - директоре
    - директор
    - директору
    - директором
  - sentence: Ми дуже довго обговорювали і нарешті __ цю складну проблему.
    answer: вирішили
    options:
    - вирішили
    - ухвалили
    - забезпечили
    - реалізували
  instruction: Оберіть правильне слово для заповнення пропуску.
- type: true-false
  title: 'Правда чи вигадка: правила етикету'
  items:
  - statement: Слово товариш у сучасному українському бізнес-середовищі є найпопулярнішим
      звертанням до колег.
    correct: false
    explanation: Слово товариш має радянське минуле і сьогодні майже не використовується
      в офісах. Натомість кажуть колега.
  - statement: В українській культурі старша за віком людина завжди має пріоритетне
      право запропонувати перейти на ти.
    correct: true
    explanation: За правилами етикету молодша людина не повинна першою пропонувати
      скорочення соціальної дистанції.
  - statement: Використання кличного відмінка при прямому звертанні є обов'язковою
      нормою української мови.
    correct: true
    explanation: Звертання в називному відмінку (наприклад, Оксана замість Оксано)
      вважається просторіччям.
  - statement: Займенник Ви завжди потрібно писати з великої літери у коментарях у
      соціальних мережах.
    correct: false
    explanation: У публічному просторі та соціальних мережах займенник ви пишеться
      виключно з маленької літери.
  - statement: Дієслово після ввічливого Ви завжди і без винятків має стояти у формі
      множини.
    correct: true
    explanation: Це залізне граматичне правило, яке стосується навіть звертання до
      однієї людини.
  - statement: Форма Пане Олегу Івановичу є найвищим виявом поваги в українському
      етикеті.
    correct: false
    explanation: Це груба помилка, яка неприродно поєднує західну (пан) і східну (по
      батькові) традиції.
  - statement: Синтаксичний еліпсис — це пропуск слів, які легко відновити з контексту
      розмови.
    correct: true
    explanation: Еліпсис часто використовується у неформальному спілкуванні для прискорення
      розмови та економії зусиль.
  - statement: Звертання жіночко або чоловіче є нормальними та ввічливими формами
      у громадському транспорті.
    correct: false
    explanation: Ці форми є грубими і застарілими. Замість них потрібно використовувати
      універсальне перепрошую.
  - statement: У креативних індустріях часто відразу переходять на ти незалежно від
      посади співробітників.
    correct: true
    explanation: Колегіальний дух у сучасних компаніях дозволяє спілкуватися неформально
      для стимулювання креативності.
  - statement: Слово приятель описує людину з найвищим рівнем абсолютної довіри та
      відкритості.
    correct: false
    explanation: Найвищий рівень довіри стосується слова друг, а приятель позначає
      лише хороших знайомих.
  instruction: Визначте, чи твердження правильне.
- type: error-correction
  title: Виправте стилістичні та граматичні помилки
  items:
  - sentence: Пане Іване Петровичу, ми раді вас вітати на нашому форумі.
    error: Іване Петровичу
    answer: Іване
    options:
    - Іване
    - Іван
    - Петровичу
    - Іваном
    explanation: Слово пан не поєднується з по батькові. Правильно казати Пане Іване.
  - sentence: Марино, Ви читала цей новий документ вчора ввечері?
    error: читала
    answer: читали
    options:
    - читали
    - читав
    - читає
    - читатимете
    explanation: Після ввічливого Ви дієслово завжди стоїть у формі множини.
  - sentence: Жіночко, передайте гроші за проїзд, будь ласка.
    error: Жіночко
    answer: Перепрошую
    options:
    - Перепрошую
    - Пані
    - Дівчино
    - Тітко
    explanation: Звертання жіночко є грубим. Правильно використовувати нейтральні
      форми прохання.
  - sentence: Я прийняв рішення перенести нашу зустріч на наступний тиждень.
    error: прийняв
    answer: ухвалив
    options:
    - ухвалив
    - вирішив
    - зробив
    - створив
    explanation: В українській мові офіційні рішення ухвалюють, а не приймають.
  - sentence: Олег, підійди до мене на кілька хвилин.
    error: Олег
    answer: Олеже
    options:
    - Олеже
    - Олегу
    - Олегом
    - Олегові
    explanation: При прямому звертанні обов'язково використовується кличний відмінок.
  - sentence: Як Ви вважаєте, друзі, чи варто нам змінювати плани?
    error: Ви
    answer: ви
    options:
    - ви
    - ти
    - тебе
    - вас
    explanation: При звертанні до кількох осіб або широкої аудиторії ви завжди пишеться
      з маленької літери.
  - sentence: Ми з ним гарні товариші і часто ходимо разом у кіно.
    error: товариші
    answer: приятелі
    options:
    - приятелі
    - сусіди
    - колеги
    - співробітники
    explanation: Для опису людей, з якими приємно проводити вільний час, краще використовувати
      слово приятелі.
  - sentence: Варто відверто сказати, що ця ідея точно не спрацює.
    error: ідея
    answer: концепція
    options:
    - концепція
    - думка
    - проблема
    - задача
    explanation: В офіційному стилі доцільно замінювати слово ідея на більш вагоме
      концепція.
  instruction: Знайдіть і виправте помилку в реченні.
- type: unjumble
  title: Складіть формальні речення
  items:
  - words:
    - ми
    - маємо
    - детально
    - проаналізувати
    - фінансові
    - звіти
