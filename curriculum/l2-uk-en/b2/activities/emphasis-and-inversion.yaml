  instruction: "Знайдіть і позначте всі підсилювальні частки (саме, якраз, навіть, тільки), які автор використав для створення емфази."
  text: "Цей талановитий музикант слухає у вільний час тільки складну класичну музику. Навіть найбільш скептичні експерти були щиро здивовані цим фантастичним результатом. Це якраз те фантастичне рішення, що мені було життєво потрібно. Я дуже довго шукав саме цю унікальну статтю в архіві. Тільки постійна практика допоможе вам подолати цей бар'єр. Навіть досвідчений оратор іноді хвилюється перед великою аудиторією. Саме майстерне володіння стилістичною інверсією є показником високого рівня. Це якраз той випадок, коли слова зайві. Ми маємо діяти саме зараз, інакше буде пізно. Навіть сьогодні ця тема залишається надзвичайно актуальною."
  answers:
    - "тільки"
    - "Навіть"
    - "якраз"
    - "саме"
    - "Тільки"
    - "Саме"

