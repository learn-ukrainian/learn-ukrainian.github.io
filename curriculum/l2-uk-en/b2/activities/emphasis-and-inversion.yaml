- type: quiz
  title: "Теорія: актуальне членування та емфаза"
  instruction: "Оберіть одну правильну відповідь на кожне запитання."
  items:
    - question: "До якої частини актуального членування речення належить вже відома інформація?"
      explanation: "Тема — це вихідна точка повідомлення, яка містить уже відому інформацію."
      options:
        - text: "до теми"
          correct: true
        - text: "до реми"
          correct: false
        - text: "до інверсії"
          correct: false
        - text: "до парцеляції"
          correct: false
    - question: "Яка позиція в українському реченні зазвичай містить найважливішу нову інформацію?"
      explanation: "За правилом нейтрального синтаксису, рема (нова інформація) розташовується в кінці речення."
      options:
        - text: "у кінці речення"
          correct: true
        - text: "на початку речення"
          correct: false
        - text: "строго всередині речення"
          correct: false
        - text: "одразу після підмета"
          correct: false
    - question: "Що відбувається, коли ми виносимо рему на початок українського речення?"
      explanation: "Переміщення реми на початок створює емфазу — сильне емоційне виділення."
      options:
        - text: "створюється потужна емоційна емфаза"
          correct: true
        - text: "речення стає абсолютно нейтральним"
          correct: false
        - text: "речення перетворюється на запитання"
          correct: false
        - text: "це вважається серйозною граматичною помилкою"
          correct: false
    - question: "Яку функцію виконує частка 'саме' в сучасному українському реченні?"
      explanation: "Частка 'саме' діє як засіб для точної ідентифікації об'єкта чи особи."
      options:
        - text: "забезпечує точну ідентифікацію об'єкта або особи"
          correct: true
        - text: "робить речення більш розмовним і неофіційним"
          correct: false
        - text: "змінює граматичний час дієслова"
          correct: false
        - text: "завжди перетворює дієслово на пасивний стан"
          correct: false
    - question: "Який стиль мовлення найчастіше використовує стилістичну інверсію для створення піднесеності?"
      explanation: "Художній стиль активно використовує інверсію для створення епічності, урочистості чи інтимності."
      options:
        - text: "художній стиль"
          correct: true
        - text: "офіційно-діловий стиль"
          correct: false
        - text: "науковий стиль"
          correct: false
        - text: "канцелярський стиль"
          correct: false
    - question: "Що означає термін 'парцеляція' в контексті сучасної синтаксичної стилістики?"
      explanation: "Парцеляція — це штучне розчленування єдиного речення на кілька дрібних частин, розділених крапками."
      options:
        - text: "розчленування одного речення на кілька дрібних частин"
          correct: true
        - text: "об'єднання кількох коротких речень у велике"
          correct: false
        - text: "використання великої кількості іноземних слів"
          correct: false
        - text: "повторення одного слова на початку абзацу"
          correct: false
    - question: "Яка основна проблема виникає через надмірне дотримання структури SVO в українській мові?"
      explanation: "SVO-flatness робить український текст механічним, беземоційним та роботизованим."
      options:
        - text: "текст стає механічним, плоским та беземоційним"
          correct: true
        - text: "текст стає занадто емоційним та агресивним"
          correct: false
        - text: "речення стають незрозумілими для носіїв мови"
          correct: false
        - text: "виникають серйозні орфографічні помилки"
          correct: false
    - question: "Яка синтаксична конструкція використовується для безапеляційної ідентифікації суб'єкта?"
      explanation: "Конструкція 'це... що/який/хто' слугує для виділення фокусу (як cleft sentences)."
      options:
        - text: "конструкція 'це... що/який'"
          correct: true
        - text: "конструкція 'чи... чи'"
          correct: false
        - text: "конструкція 'не тільки... а й'"
          correct: false
        - text: "конструкція 'як... так і'"
          correct: false
    - question: "Що таке лексична анафора як засіб ефективного стилістичного підсилення тексту?"
      explanation: "Анафора — це свідоме повторення слова на початку сусідніх речень для накопичення напруги."
      options:
        - text: "повторення слова на початку кількох сусідніх речень"
          correct: true
        - text: "використання складних наукових термінів у тексті"
          correct: false
        - text: "зміна порядку слів у питальному реченні"
          correct: false
        - text: "розбивання довгого речення на кілька коротких"
          correct: false
    - question: "Чому порядок слів в українській мові категорично не можна вважати хаотичним?"
      explanation: "Він є гнучким, але підпорядковується внутрішній логіці актуального членування та граматичного керування."
      options:
        - text: "він суворо підпорядковується правилам актуального членування"
          correct: true
        - text: "слова в реченні можна ставити абсолютно випадково"
          correct: false
        - text: "він закріплений законом і ніколи не змінюється"
          correct: false
        - text: "граматичні закінчення не впливають на зміст висловлювання"
          correct: false
    - question: "Який елемент речення є надійною вихідною точкою повідомлення та комунікативним майданчиком?"
      explanation: "Тема виконує функцію фундаменту, готуючи слухача до нової інформації."
      options:
        - text: "тема висловлювання"
          correct: true
        - text: "рема висловлювання"
          correct: false
        - text: "логічний наголос"
          correct: false
        - text: "стилістична інверсія"
          correct: false
    - question: "Як у лінгвістиці називається свідоме порушення звичного нейтрального порядку слів?"
      explanation: "Це явище називається інверсією, яка використовується для створення емфази."
      options:
        - text: "стилістична інверсія"
          correct: true
        - text: "синтаксичний паралелізм"
          correct: false
        - text: "граматичне керування"
          correct: false
        - text: "лексична анафора"
          correct: false
    - question: "Яка частка чітко вказує на досягнення якоїсь крайньої, неочікуваної межі в реченні?"
      explanation: "Частка 'навіть' додає відтінок несподіванки або крайньої межі."
      options:
        - text: "частка 'навіть'"
          correct: true
        - text: "частка 'тільки'"
          correct: false
        - text: "частка 'саме'"
          correct: false
        - text: "частка 'якраз'"
          correct: false
    - question: "Що відбувається з ритмом тексту, коли досвідчений автор використовує синтаксичний паралелізм?"
      explanation: "Паралелізм передбачає побудову речень за однаковою схемою, що забезпечує сильний внутрішній ритм."
      options:
        - text: "створюється потужний і передбачуваний внутрішній ритм"
          correct: true
        - text: "текст стає хаотичним і складним для розуміння"
          correct: false
        - text: "ритм повністю руйнується через постійні паузи"
          correct: false
        - text: "втрачається будь-який логічний зв'язок між абзацами"
          correct: false

- type: fill-in
  title: "Підсилювальні частки та терміни"
  instruction: "Заповніть пропуски відповідними лінгвістичними термінами або частками."
  items:
    - sentence: "Вчора цю рідкісну книгу купила _____ Марія."
      answer: "саме"
      explanation: "Частка 'саме' точно ідентифікує особу."
      options:
        - "ніби"
        - "майже"
        - "саме"
        - "можливо"
    - sentence: "Це _____ те фантастичне рішення, що мені було життєво потрібно."
      answer: "якраз"
      explanation: "Розмовна частка 'якраз' підкреслює точний збіг обставин."
      options:
        - "якраз"
        - "вже"
        - "ще"
        - "нехай"
    - sentence: "_____ найбільш скептичні експерти були щиро здивовані цим результатом."
      answer: "навіть"
      explanation: "Частка 'навіть' позначає крайню, неочікувану межу."
      options:
        - "навіть"
        - "лише"
        - "тільки"
        - "хіба"
    - sentence: "Цей талановитий музикант слухає у вільний час _____ складну класичну музику."
      answer: "тільки"
      explanation: "Частка 'тільки' виражає ексклюзивність та обмеження."
      options:
        - "тільки"
        - "ніколи"
        - "часто"
        - "можливо"
    - sentence: "Нову, невідому інформацію в лінгвістиці прийнято називати терміном _____."
      answer: "рема"
      explanation: "Рема — це ядро повідомлення."
      options:
        - "рема"
        - "тема"
        - "інверсія"
        - "емфаза"
    - sentence: "Відома інформація, яка слугує комунікативним майданчиком, називається _____."
      answer: "тема"
      explanation: "Тема — це вихідна точка повідомлення."
      options:
        - "тема"
        - "рема"
        - "частка"
        - "анафора"
    - sentence: "Свідоме порушення прямого порядку слів називається стилістичною _____."
      answer: "інверсією"
      explanation: "Інверсія — це непрямий порядок слів."
      options:
        - "інверсією"
        - "парцеляцією"
        - "лексикою"
        - "граматикою"
    - sentence: "Штучне розчленування єдиного речення на кілька дрібних частин — це _____."
      answer: "парцеляція"
      explanation: "Парцеляція створює драматичні паузи (крапки)."
      options:
        - "парцеляція"
        - "інверсія"
        - "анафора"
        - "емфаза"
    - sentence: "В українській мові нейтральний порядок підпорядкований руху від теми до _____."
      answer: "реми"
      explanation: "Природний рух інформації йде від відомого (теми) до нового (реми)."
      options:
        - "реми"
        - "теми"
        - "інверсії"
        - "синтаксису"
    - sentence: "Винесення реми на самий початок речення створює потужну емоційну _____."
      answer: "емфазу"
      explanation: "Емфаза — це виділення важливого елемента висловлювання."
      options:
        - "емфазу"
        - "проблему"
        - "паузу"
        - "помилку"
    - sentence: "Повторення одного слова на початку кількох речень називається лексичною _____."
      answer: "анафорою"
      explanation: "Анафора підсилює емоційне напруження тексту."
      options:
        - "анафорою"
        - "парцеляцією"
        - "інверсією"
        - "граматикою"
    - sentence: "Надмірне дотримання прямого порядку англомовними студентами викликає _____."
      answer: "SVO-flatness"
      explanation: "Це явище робить текст пласким і беземоційним."
      options:
        - "SVO-flatness"
        - "багатослівність"
        - "агресивність"
        - "розгубленість"
    - sentence: "Російські патерни канцелярської мови часто формують потворний _____ синтаксис."
      answer: "суржиковий"
      explanation: "Суржиковий синтаксис використовує неприродні пасивні конструкції."
      options:
        - "суржиковий"
        - "науковий"
        - "художній"
        - "епічний"
    - sentence: "Для безапеляційної вказівки на суб'єкта використовується конструкція _____."
      answer: "це"
      explanation: "Конструкція 'це... що/який' ідеально виділяє фокус."
      options:
        - "це"
        - "ні"
        - "так"
        - "нехай"

- type: match-up
  title: "Комунікативний намір та структура"
  instruction: "З'єднайте речення з їхньою прагматичною функцією або стилістичним ефектом."
  pairs:
    - left: "Завтра наша команда презентує важливий проект."
      right: "Фокус на тому, що саме презентують (об'єкт у кінці)."
    - left: "Важливий проект наша команда презентує завтра."
      right: "Фокус на тому, коли саме відбувається презентація (час у кінці)."
    - left: "Завтра важливий проект презентує наша команда."
      right: "Фокус на тому, хто саме виконує дію (суб'єкт у кінці)."
    - left: "Цю жахливу зраду я ніколи в житті не пробачу!"
      right: "Емфатичне виділення об'єкта дії за допомогою препозиції."
    - left: "Влітку ми обов'язково поїдемо на море!"
      right: "Емфатичне виділення обставини часу."
    - left: "Співає вона надзвичайно чудово!"
      right: "Емфатичне виділення самої дії (присудка)."
    - left: "Спить велике місто нічне."
      right: "Створення спокійного, заколисливого ритму в художньому стилі."
    - left: "У сивих віках залишиться вічна слава."
      right: "Створення епічної монументальності та урочистості."
    - left: "Зруйновано черговий корупційний міф."
      right: "Залучення уваги розбещеної медіа-аудиторії."
    - left: "Холодно як сьогодні на вулиці!"
      right: "Передача сильних та спонтанних емоцій мовця."
    - left: "Ми маємо захищати. Ми маємо підтримувати."
      right: "Лексична анафора для поступового наростання емоцій."
    - left: "Він відмовився. Остаточно. Безповоротно."
      right: "Парцеляція для створення несподіваної драматичної паузи."
    - left: "Розум шукає логіку, серце прагне емоцій."
      right: "Синтаксичний паралелізм для сильного внутрішнього ритму."
    - left: "Новий директор кардинально змінив правила!"
      right: "Емфатичне виділення персони суб'єкта через обурення чи здивування."

- type: group-sort
  title: "Нейтральний чи емфатичний?"
  instruction: "Розподіліть наведені речення на ті, що мають спокійний нейтральний порядок, і ті, що використовують експресивну емфазу."
  groups:
    - name: "Нейтральний порядок"
      items:
        - "Досвідчений викладач читає нову лекцію."
        - "Цей розумний студент швидко вирішив завдання."
        - "Я нарешті прочитав цю нову книгу."
        - "Ми обов'язково поїдемо на море влітку."
        - "Наш новий директор кардинально змінив правила."
        - "Вона надзвичайно чудово співає."
        - "Вчора після роботи Марія купила книгу."
    - name: "Емфатичний порядок"
      items:
        - "Нову лекцію читає досвідчений викладач."
        - "Цю жахливу зраду я ніколи не пробачу!"
        - "Влітку ми обов'язково поїдемо на море!"
        - "Співає вона надзвичайно чудово!"
        - "Саме вчора склали студенти цей складний іспит!"
        - "Холодно як сьогодні на вулиці!"
        - "Дивний він якийсь, цей абсолютно новий сусід!"

- type: unjumble
  title: "Відновіть архітектуру речень"
  instruction: "Розташуйте слова в правильному порядку, звертаючи увагу на логічні зв'язки та засоби емфази."
  items:
    - words: ["Свідоме", "повернення", "до", "українського", "синтаксису", "є", "важливим", "актом", "відродження"]
      answer: "Свідоме повернення до українського синтаксису є важливим актом відродження."
    - words: ["Навіть", "найбільш", "скептичні", "експерти", "були", "щиро", "здивовані", "цим", "фантастичним", "результатом"]
      answer: "Навіть найбільш скептичні експерти були щиро здивовані цим фантастичним результатом."
    - words: ["Це", "саме", "те", "інноваційне", "рішення", "яке", "мені", "було", "життєво", "потрібно"]
      answer: "Це саме те інноваційне рішення яке мені було життєво потрібно."
    - words: ["У", "сучасній", "лінгвістиці", "існує", "концепція", "актуального", "членування", "яка", "пояснює", "розподіл", "інформації"]
      answer: "У сучасній лінгвістиці існує концепція актуального членування яка пояснює розподіл інформації."
    - words: ["Коли", "ми", "переміщуємо", "слово", "на", "кінець", "ми", "робимо", "його", "головною", "новиною"]
      answer: "Коли ми переміщуємо слово на кінець ми робимо його головною новиною."
    - words: ["Стилістична", "інверсія", "є", "добровільною", "волею", "автора", "для", "створення", "потужного", "художнього", "ефекту"]
      answer: "Стилістична інверсія є добровільною волею автора для створення потужного художнього ефекту."
    - words: ["Сліпе", "дотримання", "прямого", "порядку", "жорстоко", "вбиває", "природну", "мелодійність", "та", "гнучкість", "тексту"]
