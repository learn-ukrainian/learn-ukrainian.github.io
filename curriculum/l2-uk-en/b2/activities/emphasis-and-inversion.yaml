- type: error-correction
  title: "Деколонізація синтаксису: геть канцеляризми"
  instruction: "Виправте поширені синтаксичні та лексичні помилки, які є наслідком впливу російського офіціозу (суржику)."
  items:
    - sentence: "Нарада була проведена новим керівником дуже своєчасно."
      error: "була проведена новим керівником"
      answer: "новий керівник провів"
      error_type: "construction"
      options: ["новий керівник провів", "проведена новим", "була проведена", "проводив новий керівник"]
      explanation: "Пасивний стан з орудним відмінком є калькою з російської канцелярської мови; використовуйте активну дію."
    - sentence: "Цей розумний студент швидко рішив дуже складне завдання."
      error: "рішив"
      answer: "вирішив"
      error_type: "word"
      options: ["вирішив", "зробив", "порішав", "рішив"]
      explanation: "Слово 'рішив' є русизмом, правильно казати 'вирішив завдання'."
    - sentence: "Я приймаю участь у цій блискучій міжнародній конференції."
      error: "приймаю участь"
      answer: "беру участь"
      error_type: "phrase"
      options: ["беру участь", "приймаю участь", "роблю участь", "маю участь"]
      explanation: "Вислів 'приймати участь' — це калька, правильно українською 'брати участь'."
    - sentence: "Ми постійно получаємо надзвичайно високі оцінки за проекти."
      error: "получаємо"
      answer: "отримуємо"
      error_type: "word"
      options: ["отримуємо", "здобуваємо", "получаємо", "беремо"]
      explanation: "Слово 'получати' — русизм, український відповідник — 'отримувати' або 'одержувати'."
    - sentence: "Це самий кращий інноваційний проект цього складного року."
      error: "самий кращий"
      answer: "найкращий"
      error_type: "phrase"
      options: ["найкращий", "самий кращий", "найбільш кращий", "дуже кращий"]
      explanation: "Формування ступенів порівняння з часткою 'самий' є граматичною помилкою; правильно 'найкращий'."
    - sentence: "Він відмовився співпрацювати з нами під час міроприємства."
      error: "міроприємства"
      answer: "заходу"
      error_type: "word"
      options: ["заходу", "міроприємства", "завдання", "події"]
      explanation: "Слово 'міроприємство' — це суржик і калька, українською — 'захід'."
    - sentence: "Слідуючий доповідач розкаже про емфатичний наголос."
      error: "Слідуючий"
      answer: "Наступний"
      error_type: "word"
      options: ["Наступний", "Слідуючий", "Другий", "Новий"]
      explanation: "Слово 'слідуючий' є грубим русизмом, українською мовою правильно вживати слово 'наступний'."
    - sentence: "Я рахую, що порядок слів в українській мові є гнучким."
      error: "рахую"
      answer: "вважаю"
      error_type: "word"
      options: ["вважаю", "думаю", "рахую", "мислю"]
      explanation: "Коли йдеться про власну думку, використовується дієслово 'вважати', а 'рахувати' — це математична дія."
    - sentence: "Ми маємо відноситися до нашої державної мови з повагою."
      error: "відноситися"
      answer: "ставитися"
      error_type: "word"
      options: ["ставитися", "відноситися", "поводитися", "триматися"]
      explanation: "До людей, явищ або мови потрібно 'ставитися', а 'відноситися' можуть лише математичні величини."
    - sentence: "Ця стаття повністю співпадає з моєю власною думкою."
