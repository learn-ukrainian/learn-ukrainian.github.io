- type: reading
  title: 'Первинне джерело: Звіт про результати року'
  instruction: Прочитайте уривок із формального звіту та дайте відповіді на запитання.
  text: 'У цьому році наша компанія здобула значний успіх на міжнародному ринку. Ми
    змогли реалізувати масштабні проєкти, які мали величезний вплив на розвиток усієї
    інфраструктури регіону. Незважаючи на мізерні початкові інвестиції, зараз ми фіксуємо
    значний прибуток. Цей результат став можливим завдяки філігранній роботі кожного
    відділу.

    '
  tasks:
  - Які синоніми використано для опису успіху компанії?
  - Як автор описує початкові ресурси?
  - Чому в тексті використано слово 'значний' замість 'здоровенний'?
- type: reading
  title: 'Первинне джерело: Опис архітектурної пам''ятки'
  instruction: Прочитайте текст про Софійський собор і проаналізуйте лексику.
  text: 'Софійський собор у Києві — це справді величний монумент архітектури часів
    Київської Русі. Його грандіозний розмах та монументальність вражають кожного відвідувача.
    Усередині можна побачити мініатюрні деталі стародавніх мозаїк, кожна з яких має
    величезне значення для світової культури.

    '
  tasks:
  - Які емоції передає прикметник 'величний' у цьому тексті?
  - Що підкреслює слово 'мініатюрні' при описі мозаїк?
  - Як автор протиставляє макросвіт і мікросвіт у своєму описі?
- type: true-false
  title: 'Правда чи хиба: Значення синонімів'
  instruction: Визначте, чи є твердження правильними.
  items:
  - statement: Слово 'грандіозний' зазвичай використовується в розмовному стилі для
      опису щоденних справ.
    correct: false
    explanation: Слово грандіозний належить до книжного та публіцистичного стилів.
  - statement: Прикметник 'величезний' містить у собі емоційне виділення, підкреслюючи,
      що об'єкт значно перевищує норму.
    correct: true
    explanation: Це слово має потужне емфатичне підсилення.
  - statement: Ми можемо сказати 'більш грандіозний', якщо хочемо підкреслити ще більший
      масштаб.
    correct: false
    explanation: Слова з абсолютною інтенсивністю не утворюють ступенів порівняння
      з 'більш'.
  - statement: Прикметник 'велетенський' часто асоціюється з фізичною міццю та гіпермасштабом.
    correct: true
    explanation: Це слово походить від слова 'велетень' (giant).
  - statement: Слово 'мізерний' має нейтральне емоційне забарвлення і просто означає
      щось мале.
    correct: false
    explanation: Слово 'мізерний' має негативну конотацію і позначає критичну нестачу.
  - statement: В офіційно-діловому стилі слово 'здоровенний' є найкращим вибором для
      опису прибутку.
    correct: false
    explanation: Слово 'здоровенний' є розмовним, в офіційному стилі слід використовувати
      'значний'.
  - statement: Слово 'мініатюрний' часто несе позитивну конотацію витонченості та
      майстерності.
    correct: true
    explanation: Воно походить з мистецтва і підкреслює увагу до деталей.
  - statement: Суфікс -еньк- у слові 'маленький' додає відтінок пестливості або симпатії.
    correct: true
    explanation: Цей суфікс кардинально змінює емоційний фон на позитивний або ніжний.
  - statement: Українське слово 'великий' ідеально перекладає всі значення англійського
      слова great.
    correct: false
    explanation: Англійське great має багато значень, які в українській мові передаються
      словами 'значний', 'величний' або 'видатний'.
  - statement: Підсилювач 'абсолютно' часто поєднують зі словом 'мізерний' для акценту
      на браку ресурсів.
    correct: true
    explanation: Ця комбінація підкреслює катастрофічність ситуації.
