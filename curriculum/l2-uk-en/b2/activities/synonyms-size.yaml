- type: error-correction
  title: Виправте стилістичні та граматичні помилки
  instruction: Знайдіть неправильне слово та замініть його на стилістично або граматично
    коректне.
  items:
  - sentence: У цьому кварталі ми отримали здоровенний прибуток завдяки інвестиціям.
    error: здоровенний
    answer: значний
    error_type: register
    options:
    - значний
    - велетенський
    - масштабний
    - величний
    explanation: В офіційних звітах замість 'здоровенний' слід використовувати 'значний'.
  - sentence: Це був самий величезний успіх нашої команди за останні роки.
    error: самий величезний
    answer: найбільший
    error_type: construction
    options:
    - найбільший
    - найбільш величезний
    - величезніший
    - дуже величезний
    explanation: Слова абсолютної інтенсивності не утворюють ступенів порівняння.
      Крім того, 'самий' — це росіянізм.
  - sentence: Мій новий проєкт є більш грандіозний, ніж минулорічний.
    error: більш грандіозний
    answer: набагато масштабніший
    error_type: construction
    options:
    - набагато масштабніший
    - ще грандіозніший
    - грандіозніший
    - найграндіозніший
    explanation: Слово 'грандіозний' не може мати вищого ступеня, бо вже означає максимум.
