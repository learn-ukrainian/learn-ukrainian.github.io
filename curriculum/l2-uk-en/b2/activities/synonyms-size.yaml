- type: fill-in
  title: Вставте правильне слово
  instruction: Оберіть синонім, який найкраще підходить до контексту речення.
  items:
  - sentence: Журналісти написали, що цей інженерний проєкт має абсолютно ___________
      розмах.
    answer: грандіозний
    options:
    - грандіозний
    - величезний
    - здоровенний
    - велетенський
    explanation: Слово 'розмах' найкраще поєднується зі словом 'грандіозний' у книжному
      стилі.
  - sentence: У своєму фінансовому звіті компанія зазначила, що отримала ___________
      прибуток.
    answer: значний
    options:
    - здоровенний
    - значний
    - велетенський
    - величний
    explanation: В офіційно-діловому стилі слід використовувати 'значний'.
  - sentence: Пенсіонери часто скаржаться на те, що держава виплачує їм ___________
      кошти.
    answer: мізерні
    options:
    - мініатюрні
    - малі
    - мізерні
    - дрібні
    explanation: Слово 'мізерний' підкреслює критичну нестачу ресурсів.
  - sentence: Ми вчора зустріли такого ___________ охоронця, що мені стало страшно.
    answer: здоровенного
    options:
    - величного
    - значного
    - здоровенного
    - масштабного
    explanation: У розмовному стилі для опису масивного хлопця використовують 'здоровенний'.
  - sentence: Після реставрації цей собор знову виглядає як справді ___________ монумент.
    answer: величний
    options:
    - великий
    - здоровенний
    - величний
    - величезний
    explanation: Монументи і архітектура, що викликають захоплення, описуються словом
      'величний'.
  - sentence: Майстер витратив місяць, щоб створити цю ___________ копію корабля в
      пляшці.
    answer: мініатюрну
    options:
    - малу
    - мініатюрну
    - крихітну
    - мізерну
    explanation: Слово 'мініатюрна' підкреслює витонченість та ретельну роботу.
  - sentence: На старті нашої кампанії ми мали лише ___________ шанс на успіх.
    answer: мізерний
    options:
    - мініатюрний
    - мізерний
    - крихітний
    - малий
    explanation: Для абстрактного поняття шансу із негативним відтінком нестачі береться
      'мізерний'.
  - sentence: Транспортний літак завжди вражав усіх своїми ___________ розмірами.
    answer: велетенськими
    options:
    - великими
    - значними
    - велетенськими
    - грандіозними
    explanation: Для фізичного гіпермасштабу найкраще підходить 'велетенський'.
  - sentence: Його новий план розвитку відділу є ___________ більшим, ніж попередній.
    answer: набагато
    options:
    - більш
    - самим
    - набагато
    - дуже
    explanation: Не можна казати 'більш величезний', потрібно використовувати 'набагато
      більший'.
  - sentence: Це була просто ___________ дитина, яка потребувала нашої допомоги та
      підтримки.
    answer: маленька
    options:
    - мізерна
    - мініатюрна
    - маленька
    - мала
    explanation: Пестливе ставлення до дітей передається словом 'маленький'.
