- type: essay-response
  title: 'Створення наративу: Історія успіху'
  instruction: 'Напишіть коротку історію, продемонструвавши ваше розуміння стилістичного регістру соматичних ідіом.'
  prompt: 'Напишіть розповідь (мінімум 150 слів) про людину, яка змогла подолати значні життєві чи професійні труднощі та досягти успіху. Обов''язково використайте фразеологізми золоті руки та стати на ноги, а також ще щонайменше 2 інші соматичні вислови з цього модуля. Зверніть особливу увагу на дотримання єдиного публіцистичного або художнього стилістичного регістру.'
  min_words: 150
  model_answer: 'Коли старий завод раптово закрили, багато працівників не знали, що їм робити далі. Деякі колеги одразу опустили руки, вважаючи, що в їхньому поважному віці змінити професію просто неможливо. Але мій давній сусід, пан Іван, не здався і вирішив ризикнути. Усі в нашому районі добре знали, що він має справжні золоті руки — він міг відремонтувати будь-який найскладніший двигун, просто уважно послухавши його звук. Спочатку, звичайно, було надзвичайно важко. Роботи навалилося стільки, що до власних сімейних справ у нього тижнями просто не доходили руки. Деякі колишні працівники, які звикли працювати за старою системою, де рука руку миє, відверто сміялися з його щоденних спроб вести повністю чесний бізнес. Вони часто приходили в його нову приватну майстерню, давали свої непотрібні поради і тільки плуталися під ногами. Проте Іван мовчки продовжував наполегливо працювати. Його маленька майстерня знаходилася дуже зручно — від центру міста було рукою подати, тому нових клієнтів з кожним днем ставало все більше. За два важких роки він нарешті зміг міцно стати на ноги, офіційно найняти двох молодих перспективних помічників і навіть відкрити другий філіал в іншому районі.'
  rubric:
    - criteria: 'Використання цільової лексики'
      description: 'У тексті доречно та змістовно використано щонайменше 4 фразеологізми (обов''язково включно із золоті руки та стати на ноги).'
      points: 4
    - criteria: 'Стилістична відповідність'
      description: 'Фразеологізми повністю відповідають загальному серйозному регістру розповіді, відсутнє недоречне фамільярне панібратство чи буквальні кальки з інших мов.'
      points: 3
    - criteria: 'Граматична та синтаксична правильність'
      description: 'Усі фразеологізми граматично правильно інтегровані в речення (наприклад, використані правильні відмінки, збережена усталена структура висловів).'
      points: 3