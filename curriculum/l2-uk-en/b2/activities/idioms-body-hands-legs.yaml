- type: reading
  title: 'Аналіз тексту: Професійний шлях'
  instruction: 'Прочитайте короткий текст та дайте відповіді на запитання, аналізуючи використання фразеологізмів.'
  text: |
    Коли старий завод закрили, багато працівників не знали, що робити далі. Деякі одразу опустили руки, вважаючи, що в їхньому віці змінити професію неможливо. Але мій сусід, пан Іван, не здався. Усі в районі знали, що він має справжні золоті руки — він міг відремонтувати будь-який складний двигун, просто послухавши його звук. Спочатку було важко. Роботи було стільки, що до власних справ у нього тижнями не доходили руки. Деякі колишні колеги, які звикли до старої системи, де рука руку миє, сміялися з його спроб вести чесний бізнес. Вони часто приходили в його нову майстерню, давали непотрібні поради і просто плуталися під ногами. Проте Іван продовжував працювати. Його майстерня знаходилася дуже зручно — від центру міста рукою подати, тому клієнтів ставало все більше. За два роки він зміг міцно стати на ноги, найняти молодих помічників і навіть відкрити другий філіал. Ця історія доводить, що справжня майстерність і наполегливість завжди перемагають.
  tasks:
    - 'Які саме труднощі виникли у пана Івана на початку його самостійної підприємницької діяльності?'
    - 'Як фразеологізм рука руку миє характеризує поведінку та цінності колишніх колег Івана?'
    - 'Що саме допомогло майстру успішно стати на ноги попри всі перешкоди та брак часу?'
    - 'Чому використання вислову опустити руки є влучним у контексті раптового закриття заводу?'

- type: true-false
  title: 'Концептуальна основа фразеологізмів'
  instruction: 'Визначте, чи є наведені твердження щодо значень фразеологізмів правильними чи хибними.'
  items:
    - statement: 'Фразеологізм руки не доходять описує ситуацію, коли людина фізично не може дістати предмет з дуже високої полиці.'
      correct: false
      explanation: 'Цей вислів стосується виключно браку часу на виконання певного завдання, а не фізичної відстані.'
    - statement: 'Вираз золоті руки має позитивне значення і вказує на виняткову практичну майстерність людини.'
      correct: true
      explanation: 'Золото символізує найвищий стандарт якості, тому так кажуть про дуже талановитих майстрів.'
    - statement: 'Вислів одна нога тут, інша там абсолютно доречно використовувати під час формального ділового листування з керівництвом.'
      correct: false
      explanation: 'Це фамільярний розмовний вислів, який неприпустимо використовувати у формальній комунікації.'
    - statement: 'Конструкція опустити руки дуже точно описує психологічний стан втрати надії, мотивації або бажання діяти.'
      correct: true
      explanation: 'Вислів метафорично передає стан людини, яка розслабляє м''язи і припиняє боротьбу з обставинами.'
    - statement: 'Фразеологізм рука руку миє зазвичай використовується для опису чесної, відкритої та ефективної командної роботи.'
      correct: false
      explanation: 'Цей вислів описує кругову поруку, корупцію та взаємне приховування незаконних дій.'
    - statement: 'Фраза стати на ноги може означати як фізичне одужання після хвороби, так і здобуття фінансової незалежності.'
      correct: true
      explanation: 'Цей потужний вислів охоплює фінансовий, фізичний та інституційний виміри незалежності.'
    - statement: 'Вираз бути на короткій нозі завжди має позитивний відтінок справжньої, міцної та рівноправної дружби.'
      correct: false
      explanation: 'Часто цей вислів вказує на панібратство — порушення субординації та професійної дистанції.'
    - statement: 'Коли хтось постійно плутається під ногами, він зазвичай заважає працювати, створюючи непотрібні перешкоди.'
      correct: true
      explanation: 'Цей розмовний вислів передає емоцію роздратування від чиєїсь зайвої присутності.'
    - statement: 'Фразеологізм нога за ногою зазвичай використовується для опису дуже швидкого, радісного та енергійного руху.'
      correct: false
      explanation: 'Навпаки, цей вислів означає надзвичайно повільний, млявий або втомлений рух.'
    - statement: 'Вираз рукою подати традиційно вживається для позначення дуже короткої просторової відстані між об''єктами.'
      correct: true
      explanation: 'Метафора означає, що об''єкт розташований настільки близько, що до нього можна дотягнутися.'

- type: quiz
  title: 'Виберіть правильне значення'
  instruction: 'Оберіть єдиний правильний варіант відповіді для кожної описаної комунікативної ситуації.'
  items:
    - question: 'Що саме має на увазі україномовна людина, коли з великою повагою каже, що певний майстер має золоті руки?'
      explanation: 'Цей вислів є найвищою похвалою для людини, яка здатна робити речі надзвичайно якісно.'
      options:
        - text: 'Вона дуже вправно та якісно виконує певну практичну роботу.'
          correct: true
        - text: 'Вона носить багато дорогих золотих прикрас на своїх руках.'
          correct: false
        - text: 'Вона завжди вимагає дуже високу плату за свої послуги.'
          correct: false
        - text: 'Вона ніколи не працює фізично і береже свої руки.'
          correct: false
    - question: 'Яка з цих повсякденних життєвих ситуацій найкраще ілюструє правильне використання поширеного соматичного фразеологізму руки не доходять?'
      explanation: 'Цей фразеологізм завжди описує критичний брак часу для менш пріоритетних справ.'
      options:
        - text: 'Людина має багато завдань і не може знайти час для менш пріоритетної справи.'
          correct: true
        - text: 'Людина не має достатньої фізичної розтяжки, щоб дістати річ з верхньої полиці.'
          correct: false
        - text: 'Людина відмовляється вітатися з кимось через особистий давній конфлікт.'
          correct: false
        - text: 'Людина відчуває сильний біль у суглобах після тривалого спортивного тренування.'
          correct: false
    - question: 'У якому з наведених випадків буде найбільш доречно та природно використати відомий емоційний вислів опустити руки?'
      explanation: 'Опустити руки — це візуальна метафора повної втрати мотивації та припинення боротьби.'
      options:
        - text: 'Коли людина після багатьох невдалих спроб вирішує припинити боротьбу.'
          correct: true
        - text: 'Коли спортсмен завершує виконання складної гімнастичної вправи на змаганнях.'
          correct: false
        - text: 'Коли працівник закінчує свою зміну і спокійно йде додому відпочивати.'
          correct: false
        - text: 'Коли людина погоджується виконати роботу за дуже низьку заробітну плату.'
          correct: false
    - question: 'Яке з цих розгорнутих тверджень найточніше передає суть фразеологізму рука руку миє в контексті українського суспільства?'
      explanation: 'В українському суспільно-політичному дискурсі цей вислів має негативну конотацію кругової поруки.'
      options:
        - text: 'Учасники певної групи приховують нечесні дії одне одного заради власної вигоди.'
          correct: true
        - text: 'Співробітники компанії злагоджено і чесно працюють для досягнення спільної мети.'
          correct: false
        - text: 'Лікарі ретельно дотримуються суворих правил гігієни перед початком операції.'
          correct: false
        - text: 'Друзі завжди готові безкорисливо прийти на допомогу у скрутну життєву хвилину.'
          correct: false
    - question: 'Який саме життєвий стан людини чи цілої організації описує дуже відомий український соматичний фразеологізм стати на ноги?'
      explanation: 'Цей вислів позначає процес переходу від вразливості до повної самостійності.'
      options:
        - text: 'Перехід від стану залежності чи хвороби до повної самостійності та здоров''я.'
          correct: true
        - text: 'Готовність негайно розпочати фізичний конфлікт або жорстку суперечку з опонентом.'
          correct: false
        - text: 'Рішення звільнитися з роботи і розпочати тривалу навколосвітню подорож.'
          correct: false
        - text: 'Втрату балансу і падіння через непередбачувані життєві обставини чи кризу.'
          correct: false
    - question: 'Для якої конкретної комунікативної ситуації найбільш характерне та стилістично виправдане використання розмовного вислову одна нога тут, інша там?'
      explanation: 'Це розмовний імператив, що вимагає блискавичного виконання завдання.'
      options:
        - text: 'Коли потрібно наказати комусь дуже швидко збігати кудись і відразу повернутися.'
          correct: true
        - text: 'Коли ви описуєте свої грандіозні плани на наступну тривалу відпустку за кордоном.'
          correct: false
        - text: 'Коли ви офіційно звітуєте керівництву про успішне завершення складного проєкту.'
          correct: false
        - text: 'Коли ви намагаєтеся обережно перепросити за значну затримку в роботі.'
          correct: false
    - question: 'Що саме означає фразеологізм бути на короткій нозі, якщо ми говоримо про стосунки підлеглого з генеральним директором компанії?'
      explanation: 'Вислів часто вказує на панібратство і порушення субординації між людьми різного статусу.'
      options:
        - text: 'Мати занадто близькі, часто фамільярні стосунки, ігноруючи професійну дистанцію.'
          correct: true
        - text: 'Працювати в одному кабінеті, але ніколи не спілкуватися на особисті теми.'
          correct: false
        - text: 'Мати жорсткий конфлікт і постійно сперечатися через робочі питання.'
          correct: false
        - text: 'Бути родичами або земляками, які походять з одного маленького містечка.'
          correct: false
    - question: 'У якому саме професійному або побутовому випадку ми з роздратуванням скажемо, що хтось постійно плутається під ногами?'
      explanation: 'Цей вислів описує ситуацію, коли чиясь присутність відволікає і заважає процесу.'
      options:
        - text: 'Коли стороння людина своєю присутністю заважає фахівцю виконувати його роботу.'
          correct: true
        - text: 'Коли новий співробітник швидко і якісно виконує всі адміністративні доручення.'
          correct: false
        - text: 'Коли людина має проблеми з координацією рухів через сильну фізичну втому.'
          correct: false
        - text: 'Коли керівник допомагає своїм підлеглим вирішувати найскладніші проблеми.'
          correct: false
    - question: 'Яку саме просторову відстань між двома об''єктами або географічними локаціями найчастіше описують за допомогою розмовного фразеологізму рукою подати?'
      explanation: 'Вислів метафорично вказує, що об''єкт знаходиться настільки близько, що його можна торкнутися рукою.'
      options:
        - text: 'Дуже коротку відстань, яку можна легко, швидко та без зусиль подолати пішки.'
          correct: true
        - text: 'Надзвичайно велику дистанцію, для подолання якої обов''язково потрібен літак.'
          correct: false
        - text: 'Відстань, яку взагалі неможливо виміряти ніякими сучасними фізичними приладами.'
          correct: false
        - text: 'Місце, про яке ніхто ніколи не чув і якого немає на жодній географічній мапі.'
          correct: false
    - question: 'Як саме пересувається людина, якщо про її ходу зі співчуттям або роздратуванням кажуть, що вона йде нога за ногою?'
      explanation: 'Цей фразеологізм ілюструє млявий, неохочий рух виснаженої або сумної людини.'
      options:
        - text: 'Вона йде надзвичайно повільно, ледве переставляючи ноги через втому чи неохоту.'
          correct: true
        - text: 'Вона біжить так швидко, що її ноги навіть не торкаються землі від швидкості.'
          correct: false
        - text: 'Вона впевнено маршує, карбуючи кожен крок на військовому чи святковому параді.'
          correct: false
        - text: 'Вона постійно перечіплюється і падає через свою неуважність або поганий зір.'
          correct: false

- type: fill-in
  title: 'Доповніть речення правильним висловом'
  instruction: 'Вставте пропущене слово, щоб утворити правильний соматичний фразеологізм.'
  items:
    - sentence: 'До цього старого парку від нашого будинку зовсім близько, просто ___ подати.'
      answer: 'рукою'
      options:
        - 'рукою'
        - 'ногою'
        - 'головою'
        - 'оком'
    - sentence: 'Після несподіваного звільнення він спочатку опустив ___, але потім вирішив шукати нові можливості.'
      answer: 'руки'
      options:
        - 'руки'
        - 'ноги'
        - 'плечі'
        - 'очі'
    - sentence: 'Мій старший брат — справжній майстер, усі сусіди завжди кажуть, що він має ___ руки.'
      answer: 'золоті'
      options:
        - 'золоті'
        - 'срібні'
        - 'залізні'
        - 'важкі'
    - sentence: 'Я дуже хочу нарешті прочитати цю історичну книгу, але через великий обсяг роботи в мене просто не ___ руки.'
      answer: 'доходять'
      options:
        - 'доходять'
        - 'дотягуються'
        - 'долітають'
        - 'допливають'
    - sentence: 'У цьому бюрократичному відділі марно шукати справедливості, там давно вже рука ___ миє.'
      answer: 'руку'
      options:
        - 'руку'
        - 'ногу'
        - 'шию'
        - 'спину'
    - sentence: 'Він важко хворів майже цілий місяць, але завдяки лікарям нарешті зміг твердо стати на ___.'
      answer: 'ноги'
      options:
        - 'ноги'
        - 'руки'
        - 'коліна'
        - 'костилі'
    - sentence: 'Збігай швиденько до найближчого магазину по хліб, щоб одна ___ тут, інша там!'
      answer: 'нога'
      options:
        - 'нога'
        - 'рука'
        - 'голова'
        - 'думка'
    - sentence: 'Втомлені туристи після довгого дванадцятигодинного гірського походу ледве плелися нога за ___.'
      answer: 'ногою'
      options:
        - 'ногою'
        - 'рукою'
        - 'спиною'
        - 'кроком'
    - sentence: 'Цей абсолютно новий співробітник поводиться так зухвало, ніби він на ___ нозі з генеральним директором.'
      answer: 'короткій'
      options:
        - 'короткій'
        - 'довгій'
        - 'швидкій'
        - 'прямій'
    - sentence: 'Малі діти весь вечір галасливо бігали по тісній кухні і постійно плуталися під ___ у матері.'
      answer: 'ногами'
      options:
        - 'ногами'
        - 'руками'
        - 'столом'
        - 'стільцями'

- type: error-correction
  title: 'Виправте кальки та стилістичні помилки'
  instruction: 'Знайдіть русизм, кальку або стилістичну помилку у кожному реченні та оберіть правильний варіант для заміни.'
  items:
    - sentence: 'Я дуже хотів би допомогти команді, але мої руки не доходять до цього додаткового завдання.'
      error: 'мої руки не доходять'
      answer: 'у мене руки не доходять'
      options:
        - 'у мене руки не доходять'
        - 'я не маю рук до'
        - 'мої руки занадто зайняті'
        - 'у мене бракує рук до'
      explanation: 'В українській мові підметом у цьому фразеологізмі є руки, а особа виражається родовим відмінком з прийменником (у мене).'
    - sentence: 'Шановний пане директоре, я надішлю фінансовий звіт негайно: одна нога тут, інша там.'
      error: 'одна нога тут, інша там'
      answer: 'якнайшвидше'
      options:
        - 'якнайшвидше'
        - 'швидко ногами'
        - 'біжучи швидко'
        - 'негайно ногами'
      explanation: 'Вислів одна нога тут, інша там є фамільярним і абсолютно неприпустимим у формальному діловому спілкуванні.'
    - sentence: 'Скажи чесно, ти зараз серйозно це кажеш, чи просто тягнеш мене за ногу?'
      error: 'тягнеш мене за ногу'
      answer: 'жартуєш з мене'
      options:
        - 'жартуєш з мене'
        - 'тягнеш мою ногу'
        - 'смикаєш за ногу'
        - 'жартуєш за ногу'
      explanation: 'Англійська ідіома to pull someone''s leg не перекладається дослівно. Український відповідник — жартувати з когось або водити за ніс.'
