- type: select
  title: 'Множинний вибір: Аналіз граматичних явищ'
  instruction: Оберіть усі правильні варіанти відповіді (може бути більше однієї правильної).
  items:
  - question: Які з наведених слів є питомими українськими іменниками, що правильно
      замінюють невластиві активні дієприкметники?
    min_correct: 2
    explanation: Слова 'охочі' та 'відпочивальники' є правильними українськими відповідниками.
    options:
    - text: охочі
      correct: true
    - text: бажаючі
      correct: false
    - text: відпочивальники
      correct: true
    - text: відпочиваючі
      correct: false
  - question: Які речення демонструють правильне використання пасивного стану в офіційно-діловому
      стилі?
    min_correct: 2
    explanation: В офіційному стилі використовуються форми на -но/-то без орудного
      відмінка діяча.
    options:
    - text: Договір про оренду успішно розірвано вчора.
      correct: true
    - text: Усі бюджетні кошти було розподілено.
      correct: true
    - text: Договір про оренду розірвався вчора.
      correct: false
    - text: Ці кошти розподіляються нашим директором.
      correct: false
  - question: Які з цих конструкцій містять грубі граматичні або стилістичні помилки
      (русизми чи кальки)?
    min_correct: 2
    explanation: Введення агенса в орудному відмінку та зворотний пасив для неживих
      предметів є грубими помилками.
    options:
    - text: Ця цікава книга написана відомим студентом.
      correct: true
    - text: Наш новий багатоповерховий будинок будується.
      correct: true
    - text: Студент нарешті написав цю цікаву книгу.
      correct: false
    - text: Цей будинок зараз активно будують.
      correct: false
  - question: Оберіть правильні варіанти заміни для штучної та важкої фрази 'працюючий
      у полі чоловік'.
    min_correct: 2
    explanation: Найкращий спосіб — використання означального підрядного речення із
      'який' або 'що'.
    options:
    - text: Чоловік, який зараз працює у полі.
      correct: true
    - text: Чоловік, що щоденно працює у полі.
      correct: true
    - text: Працювавший у великому полі чоловік.
      correct: false
    - text: Той, що працюючий у полі чоловік.
      correct: false
  - question: Які з наведених слів є цілком природними українськими дієприкметниками
      минулого часу (з суфіксом -лий)?
    min_correct: 2
    explanation: Форми на -лий (пожовклий, зів'ялий) є питомими, правильними і дуже
      милозвучними.
    options:
    - text: пожовклий
      correct: true
    - text: зів'ялий
      correct: true
    - text: пожовкнувший
      correct: false
    - text: в'янучий
