- type: true-false
  title: 'Правда чи хиба: Правила пасивного стану'
  instruction: Визначте, чи є наведені твердження про українську граматику правильними.
  items:
  - statement: Безособові конструкції на -но/-то ідеально підходять для використання
      в офіційних звітах та юридичних документах.
    correct: true
    explanation: Вони створюють об'єктивний, відсторонений тон, необхідний для ділового
      стилю і державної мови.
  - statement: У реченні 'Дім будується швидкими темпами' форма зворотного дієслова
      використана абсолютно правильно та стилістично доречно.
    correct: false
    explanation: 'Ця форма є нелогічною для неживих предметів. Природно сказати: ''Дім
      будують''.'
  - statement: Українська мова віддає перевагу використанню діяча в орудному відмінку
      (наприклад, 'текст написаний студентом').
    correct: false
    explanation: 'Це є російською калькою. В українській мові слід використовувати
      актив: ''студент написав текст''.'
  - statement: Активні дієприкметники теперішнього часу на -учий/-ючий (як-от 'бажаючі'
      або 'виступаючий') вважаються русизмами.
    correct: true
    explanation: Ці форми невластиві українській мові, їх треба замінювати питомими
      іменниками або підрядними реченнями.
  - statement: Дієприкметники минулого часу на -лий (наприклад, 'пожовклий', 'опалий')
      є цілком природними для української літературної мови.
    correct: true
    explanation: Вони історично питомі, втратили зв'язок із процесом і повноцінно
      функціонують як прикметники.
  - statement: Щоб уникнути русизму 'працюючий чоловік', найкраще перебудувати фразу
      на 'чоловік, який працює'.
    correct: true
    explanation: Використання підрядного означального речення є універсальним і безпомилковим
      способом заміни.
  - statement: Неозначено-особові речення (наприклад, 'у місті будують міст') звучать
      занадто штучно у повсякденному спілкуванні.
    correct: false
    explanation: Навпаки, це один із найприродніших і найживіших способів замінити
      пасив в українській розмовній мові.
  - statement: Форми на -но/-то вимагають, щоб об'єкт дії стояв у знахідному відмінку,
      а підмета в реченні взагалі не було.
    correct: true
    explanation: 'Це головна синтаксична особливість таких конструкцій: відсутність
      підмета і фокус на об''єкті (''роботу виконано'').'
  - statement: Пасивні дієприкметники на -ний/-тий завжди залишаються незмінними і
      ніколи не узгоджуються з іменником у роді чи числі.
    correct: false
    explanation: Вони поводяться як прикметники і завжди узгоджуються з іменником
      (написаний лист, написана книга).
  - statement: Використання складних пасивних конструкцій у живій бесіді з друзями
      робить ваше мовлення більш правильним та високопрофесійним.
    correct: false
    explanation: У розмовному регістрі надмірний пасив звучить як недоречний канцеляризм.
