- type: reading
  id: reading-01
  title: 'Джерело: Інструкція з діловодства'
  source: Типова інструкція з діловодства
  text: 'Документи, що створюються в установах, повинні оформлятися належним чином.
    Усі сторінки обов''язково нумеруються. Після перевірки документ має бути підписано
    керівником або його заступником. Якщо під час перевірки було виявлено помилки,
    документ повертають на доопрацювання. Кожен співробітник, який працює з документами,
    несе особисту відповідальність за їхнє збереження.

    '
  tasks:
  - Які форми пасивного стану використані в цьому тексті?
  - Знайдіть неозначено-особове речення і поясніть його функцію в діловому стилі.
  - Яким чином безособові форми на -но/-то сприяють підвищенню об'єктивності ділового
    тексту?
- type: essay-response
  title: 'Есе: Стилістичний аналіз тексту'
  source_reading: reading-01
  prompt: Проаналізуйте використання різних форм пасивного стану та активних конструкцій
    у наведеному уривку. Яким чином вибір граматичної форми впливає на загальний тон
    і сприйняття тексту? Напишіть розгорнуту відповідь, спираючись на знання про стилістичні
    регістри.
  min_words: 150
  model_answer: У наведеному тексті автор свідомо використовує різні граматичні форми
    для досягнення максимальної стилістичної точності. Безособові форми на -но/-то
    ('підписано', 'виявлено') підкреслюють офіційність вимог. Вони знімають акцент
    з конкретного виконавця і переносять його на результативність та обов'язковість
    самої дії, що є ключовим для діловодства. Неозначено-особове речення ('повертають
    на доопрацювання') описує стандартну адміністративну процедуру, де виконавець
    мається на увазі, але не називається прямо. Водночас для опису конкретної особи
    використано активне підрядне речення ('співробітник, який працює'), що дозволяє
    уникнути важкого і невластивого українській мові активного дієприкметника ('працюючий
    співробітник'). Така майстерна комбінація різних інструментів дозволяє створити
    об'єктивний, авторитетний і водночас цілком природний діловий текст.
  rubric:
  - criteria: Ідентифікація форм
    description: Студент правильно визначив усі використані форми пасиву та активу.
    points: 5
  - criteria: Стилістичний аналіз
    description: Студент детально пояснив вплив вибраних граматичних форм на загальний
      тон тексту.
    points: 5
- type: quiz
  title: 'Тест: Ідентифікація граматичних форм'
  instruction: Прочитайте питання та оберіть одну правильну відповідь.
  items:
  - question: 'Прочитайте речення та визначте, яка саме форма пасивного стану або
      її еквівалент тут використана: ''Новий наказ директора підписано вчора ввечері''.'
    explanation: Слово 'підписано' має закінчення -но, що вказує на безособову форму,
      яка фокусується виключно на результаті виконаної дії.
    options:
    - text: безособова форма на -но/-то
      correct: true
    - text: пасивний дієприкметник
      correct: false
    - text: зворотне дієслово на -ся
      correct: false
    - text: неозначено-особове речення
      correct: false
  - question: 'Яку граматичну конструкцію використано в такому типовому повсякденному
      реченні: ''У нашому ресторані завжди готують дуже смачний борщ''?'
    explanation: Дієслово 'готують' стоїть у третій особі множини без підмета, що
      є класичним неозначено-особовим реченням.
    options:
    - text: неозначено-особове речення
      correct: true
    - text: пасивний дієприкметник
      correct: false
    - text: активний дієприкметник
      correct: false
    - text: безособове речення
      correct: false
  - question: 'Проаналізуйте це речення і виберіть правильну граматичну характеристику
      виділеного слова: ''Він швидко підняв із землі давно опале листя''.'
    explanation: Слово 'опале' описує ознаку предмета, що виникла внаслідок завершеної
      дії, і є дієприкметником минулого часу.
    options:
    - text: дієприкметник минулого часу на -лий
      correct: true
    - text: активний дієприкметник на -учий
      correct: false
    - text: пасивний дієприкметник на -тий
      correct: false
    - text: дієприслівник недоконаного виду
      correct: false
  - question: До якого стилістичного регістру найкраще підходить використання конструкцій
      типу 'договір розірвано' або 'бюджет розподілено'?
    explanation: Безособові форми на -но/-то створюють необхідну бюрократичну об'єктивність
      для ділового стилю.
    options:
    - text: офіційно-діловий регістр
      correct: true
    - text: художній стиль
      correct: false
    - text: розмовний регістр
      correct: false
    - text: науковий стиль
      correct: false
  - question: Що з наведеного нижче є поширеною стилістичною помилкою при спробі перекладу
      пасивних речень з інших слов'янських мов?
    explanation: Введення агенса в орудному відмінку ('робота написана студентом')
      є грубою калькою, неприродною для української традиції.
    options:
    - text: використання діяча в орудному відмінку
      correct: true
    - text: використання третьої особи множини
      correct: false
    - text: заміна дієприкметника підрядним реченням
      correct: false
    - text: вживання форм минулого часу на -лий
      correct: false
  - question: Який варіант є найкращим і найбільш природним українським відповідником
      до штучної конструкції 'бажаючі отримати квитки'?
    explanation: Українська мова віддає перевагу питомим іменникам, таким як 'охочі',
      уникаючи активних дієприкметників.
    options:
    - text: охочі отримати квитки
      correct: true
    - text: ті, що бажаючи отримати квитки
      correct: false
    - text: бажавші отримати квитки
      correct: false
    - text: забажані отримати квитки
      correct: false
  - question: Чому українська мова уникає використання зворотного пасиву на -ся стосовно
      неживих предметів у реченнях на зразок 'будинок будується'?
    explanation: Частка -ся зберігає значення зворотності, тому виникає комічний ефект,
      ніби неживий будинок будує сам себе.
    options:
    - text: це створює ефект самодіяльного об'єкта
      correct: true
    - text: це порушує правила чергування звуків
      correct: false
    - text: така форма є виключно поетичною
      correct: false
    - text: це вимагає використання непрямих відмінків
      correct: false
  - question: 'Виберіть граматично правильний і стилістично доречний варіант заміни
      для помилкового вислову ''завідуючий нашою кафедрою'':'
    explanation: Найкраще замінити непитомий активний дієприкметник українським іменником
      'завідувач'.
    options:
    - text: завідувач нашої кафедри
      correct: true
    - text: той, що завідуючий кафедрою
      correct: false
    - text: завіданий нашою кафедрою
      correct: false
    - text: керуючий нашою кафедрою
      correct: false
  - question: Яка граматична форма найкраще підходить для перекладу англійської пасивної
      конструкції 'The road is being repaired' у розмовній мові?
    explanation: Для незавершеної дії, де виконавець невідомий або неважливий, найчастіше
      вживають третю особу множини.
    options:
    - text: неозначено-особове речення 'Дорогу ремонтують'
      correct: true
    - text: безособове речення 'Дорогу відремонтовано'
      correct: false
    - text: зворотне дієслово 'Дорога ремонтується'
      correct: false
    - text: пасивний дієприкметник 'Дорога є ремонтована'
      correct: false
  - question: Яку основну функцію найчастіше виконують пасивні дієприкметники на -ний
      та -тий у художніх описових текстах?
    explanation: Вони перетворюють минулу дію на ознаку, фокусуючись на наслідках
      і створюючи статичну картину.
    options:
    - text: описують стан як результат минулої дії
      correct: true
    - text: передають швидкість розгортання подій
      correct: false
    - text: вказують на емоційний стан автора тексту
      correct: false
    - text: означають дію, яка відбувається прямо зараз
      correct: false
- type: fill-in
  title: 'Заповніть пропуски: Трансформація в пасив'
  instruction: Оберіть правильну безособову форму або дієприкметник для завершення
    речення.
  items:
  - sentence: Комісія виявила численні порушення під час перевірки, тому всі результати
      офіційно _____ у цьому звіті.
    answer: зафіксовано
    options:
    - зафіксовано
    - зафіксували
    - зафіксовані
    - фіксуючи
    explanation: Для звіту потрібна безособова форма на -но.
  - sentence: Директор учора підписав новий наказ, тому сьогодні цей важливий документ
      уже повністю _____.
    answer: затверджено
    options:
    - затверджено
    - затвердив
    - затверджується
    - затверджений
    explanation: В офіційно-діловому стилі використовуємо форму на -то/-но.
  - sentence: Будівельники швидко закінчили ремонт, і тепер уся складна робота повністю
      _____.
    answer: зроблена
    options:
    - зроблена
    - зроблено
    - робиться
    - зробили
    explanation: Тут дієприкметник узгоджується з іменником жіночого роду (робота).
  - sentence: Студенти постійно ставлять це питання, тому ми вирішили, що його часто
      _____ на наших лекціях.
    answer: обговорюють
    options:
    - обговорюють
    - обговорюється
    - обговорено
    - обговорене
    explanation: Третя особа множини (актив) є найкращим вибором для таких ситуацій.
  - sentence: Ми знайшли старі фотографії, які були давно _____ у цій дерев'яній шафі.
    answer: забуті
    options:
    - забуті
    - забуто
    - забуваються
    - забули
    explanation: Пасивний дієприкметник у множині, що узгоджується зі словом 'фотографії'.
  - sentence: Якщо ви не знаєте виконавця дії, цілком нормально сказати, що по телевізору
      про це просто _____.
    answer: кажуть
    options:
    - кажуть
    - казано
    - кажеться
    - сказані
    explanation: Неозначено-особове речення (кажуть) підходить ідеально.
  - sentence: Новий проєкт розробила команда інженерів, тобто наша команда успішно
      _____ цей проєкт.
    answer: розробила
    options:
    - розробила
    - розроблено
    - розробляється
    - розроблений
    explanation: Перетворення на активний стан із чітким підметом.
  - sentence: Цей лист хтось написав синім чорнилом, тому можна констатувати, що його
      _____ дуже акуратно.
    answer: написано
    options:
    - написано
    - написаний
    - написується
    - написали
    explanation: Форма на -но описує об'єктивний результат.
  - sentence: Усі необхідні зміни до закону вже успішно _____ на останньому засіданні
      комітету.
    answer: внесено
    options:
    - внесено
    - внесені
    - вносяться
    - внесли
    explanation: Законотворчий процес описується безособовими формами.
  - sentence: Завтра будівельники відремонтують дорогу, тому невдовзі ця ділянка буде
      повністю _____.
    answer: відремонтована
    options:
    - відремонтована
    - відремонтовано
    - ремонтується
    - ремонтували
    explanation: Пасивний дієприкметник жіночого роду в майбутньому часі.
- type: error-correction
  title: 'Редагування: Виправте стилістичний регістр'
  instruction: Знайдіть і виправте штучні пасивні конструкції, замінивши їх на природний
    активний стан.
  items:
  - sentence: Сніданок був приготований мною сьогодні дуже рано вранці, тому він уже
      холодний.
    error: був приготований мною
    answer: я приготував
    error_type: phrase
    options:
    - я приготував
    - мною приготовано
    - приготувався
    - я готую
    explanation: Використання діяча в орудному відмінку ('мною') неприродне. Слід
      казати 'я приготував'.
  - sentence: Ця складна проблема буде вирішена нашими експертами вже до кінця наступного
      тижня.
    error: буде вирішена нашими експертами
    answer: наші експерти вирішать
    error_type: phrase
    options:
    - наші експерти вирішать
    - буде вирішено експертами
    - вирішиться нашими експертами
    - експертами вирішиться
    explanation: Замість пасиву з орудним відмінком ('експертами') слід будувати активне
      речення.
  - sentence: Наш новий багатоповерховий будинок будується швидкими темпами вже понад
      два місяці.
    error: будується
    answer: будують
    error_type: word
    options:
    - будують
    - збудувався
    - є будований
    - будувався
    explanation: Неживий предмет не може себе будувати. Використовуйте неозначено-особове
      речення ('будують').
  - sentence: Мною було помічено дуже цікаву деталь під час перегляду цього навчального
      відеофільму.
    error: Мною було помічено
    answer: Я помітив
    error_type: phrase
    options:
    - Я помітив
    - Помітилося мною
    - Мною помічено
    - Я був помітив
    explanation: Канцеляризми на кшталт 'мною було помічено' руйнують живу розмовну
      мову.
  - sentence: Велике вікно у кімнаті було відчинене кимось із наших нових сусідів
      учора пізно ввечері.
    error: було відчинене кимось
    answer: відчинив хтось
    error_type: phrase
    options:
    - відчинив хтось
    - відчинилося кимось
    - було відчинено
    - кимось відчинили
    explanation: Якщо діяч існує (навіть 'хтось'), краще використовувати звичайну
      активну конструкцію.
  - sentence: Ці фінансові документи підписуються нашим генеральним директором кожної
      п'ятниці після обіду.
    error: підписуються нашим генеральним директором
    answer: наш генеральний директор підписує
    error_type: phrase
    options:
    - наш генеральний директор підписує
    - підписує директор
    - директором підписані
    - підписують директори
    explanation: Зворотний пасив із додаванням діяча ('директором') є типовою стилістичною
      помилкою.
  - sentence: Робота над цим проєктом була завершена студентами набагато раніше встановленого
      графіком терміну.
    error: була завершена студентами
    answer: студенти завершили
    error_type: phrase
    options:
    - студенти завершили
    - завершено студентами
    - студентами завершилася
    - завершували студенти
    explanation: Підмет ('студенти') має стояти в називному відмінку з відповідним
      активним присудком.
  - sentence: Широка дорога в нашому рідному місті ремонтується вже майже цілий рік
      без жодних перерв.
    error: ремонтується
    answer: ремонтують
    error_type: word
    options:
    - ремонтують
    - відремонтувалася
    - є ремонтована
    - ремонтували
    explanation: 'Дорога не ремонтує сама себе. Вживайте третю особу множини: ''дорогу
      ремонтують''.'
- type: error-correction
  title: 'Редагування: Усунення русизмів та непитомих дієприкметників'
  instruction: Знайдіть штучні активні дієприкметники теперішнього часу та замініть
    їх на питомі українські відповідники.
  items:
  - sentence: Усім подорожуючим у цьому нічному поїзді обов'язково потрібно показати
      свої квитки контролеру.
    error: подорожуючим
    answer: пасажирам
    error_type: word
    options:
    - пасажирам
    - подорожувавшим
    - тим подорожуючим
    - мандруючим
    explanation: Активні дієприкметники краще замінювати питомими іменниками (пасажирам,
      подорожнім).
  - sentence: Після довгої лекції виступаючий із задоволенням відповів на всі додаткові
      запитання від студентів.
    error: виступаючий
    answer: доповідач
    error_type: word
    options:
    - доповідач
    - той виступаючий
    - виступивший
    - виступач
    explanation: Штучне слово 'виступаючий' ідеально замінюється іменником 'доповідач'
      або 'промовець'.
