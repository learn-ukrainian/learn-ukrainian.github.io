  prompt: 'Уявіть, що ви є редактором сучасної української енциклопедії. Напишіть
    коротку енциклопедичну статтю (мінімум 150 слів) про внесок Михайла Кравчука у
    формування української математичної термінології. У своєму тексті обов''язково
    використайте: мінімум три абстрактні віддієслівні іменники (на зразок ''обчислення''),
    щонайменше два складені числівники (дати або кількості у правильних відмінках),
    та принаймні одне безособове речення (на -но/-то) для опису факту з його біографії.'
  min_words: 150
  model_answer: Михайло Пилипович Кравчук — видатний український математик, чия спадщина
    мала колосальний вплив на розвиток вітчизняної науки. Народився вчений у тисяча
    вісімсот дев'яносто другому році. Його фундаментальні дослідження у галузі диференціальних
    рівнянь здобули визнання в усій Європі. Проте одним із найвизначніших досягнень
    Кравчука стало формування сучасної української математичної термінології. Розуміючи
    критичну важливість рідної мови для наукового процесу, він очолив створення масштабного
    словника. До цього академічного словника увійшло понад сорок тисяч спеціалізованих
    фахових термінів. Вчений активно впроваджував у науковий обіг віддієслівні іменники,
    такі як обчислення, доведення та креслення, що дозволило описувати складні аналітичні
    процеси органічно, без калькування іноземних слів. Завдяки його титанічній праці
    застосування української мови у точних науках стало не лише можливим, але й абсолютно
    природним. На превеликий жаль, творчий шлях цієї геніальної людини було жорстоко
    перервано. У тисяча дев'ятсот тридцять восьмому році видатного математика було
    безпідставно заарештовано радянською владою. Попри трагічну долю, його інноваційний
    метод та створена ним термінологічна база продовжують служити сучасній українській
    науці.
  rubric:
  - criteria: Обсяг та структура
    description: Текст містить не менше 150 слів та відповідає формальному енциклопедичному
      стилю (без займенників 'я', 'ми' та розмовних слів).
    points: 3
  - criteria: Лексика (Віддієслівні іменники)
    description: У тексті правильно вжито щонайменше три віддієслівні іменники, які
      позначають процеси (дослідження, формування, обчислення тощо).
    points: 3
  - criteria: Граматика (Числівники та Синтаксис)
    description: Правильно відмінені дати або числа; доречно використано принаймні
      одне безособове речення (на -но/-то) для констатації факту.
    points: 4
