- type: reading
  title: 'Первинне джерело: Роль Михайла Кравчука у розвитку термінології'
  instruction: Прочитайте уривок і дайте відповіді на запитання.
  text: Український науковий ренесанс двадцятих років минулого століття подарував
    світові плеяду видатних дослідників, серед яких особливе місце посідає Михайло
    Кравчук. Працюючи над словником математичної термінології, він довів, що українська
    мова здатна передавати найскладніші абстрактні поняття без зайвих запозичень.
    Кравчук активно використовував віддієслівні іменники, як-от 'обчислення' чи 'доведення',
    для опису наукових процесів. Окрім суто лінгвістичної роботи, його інноваційний
    математичний метод моментів став фундаментальним для багатьох європейських наукових
    шкіл. Трагічно, що у тисяча дев'ятсот тридцять восьмому році його життєвий та
    творчий шлях було жорстоко перервано, коли вченого було безпідставно заарештовано.
  tasks:
  - Яку роль відіграв Михайло Кравчук у формуванні української наукової термінології?
  - Які граматичні засоби він найчастіше використовував для опису наукових процесів?
  - Чому математичний метод Кравчука є важливим для європейської науки?
  - Які синтаксичні конструкції автор тексту використовує для опису арешту вченого?
- type: true-false
  title: Правда чи випадок? Числівники та синтаксис
  instruction: Визначте, чи є твердження правильними (true) або хибними (false).
  items:
  - statement: Після кількісних числівників 'два', 'три', 'чотири' іменник завжди
      стоїть у формі родового відмінка однини.
    correct: false
    explanation: Ні, після числівників 2, 3, 4 іменник стоїть у називному відмінку
      множини (наприклад, два методи).
  - statement: У числівниках, що позначають десятки (від 50 до 80), під час відмінювання
      змінюється лише друга частина слова.
    correct: true
    explanation: Саме так, правильно казати 'п'ятдесяти', 'шістдесяти', перша частина
      завжди залишається незмінною.
  - statement: У складених порядкових числівниках, що позначають рік (наприклад, 1991-й),
      відмінюються всі складові частини.
    correct: false
    explanation: У складених порядкових числівниках відмінюється лише останнє слово
      (тисяча дев'ятсот дев'яносто першого).
  - statement: Форма 'п'ятидесяти' є граматично правильною в українській мові та часто
      використовується в науковому стилі.
    correct: false
    explanation: Це поширена помилка і калька. Правильна форма — 'п'ятдесяти'.
  - statement: Для позначення точної години в українській мові використовується прийменник
      'о' (або 'об') та порядковий числівник у місцевому відмінку.
    correct: true
    explanation: Так, ми кажемо 'о восьмій годині', 'об одинадцятій'.
  - statement: Віддієслівні іменники із суфіксами -нн-, -енн-, -інн- дуже часто використовуються
      для опису процесів у наукових текстах.
    correct: true
    explanation: Так, такі слова, як 'обчислення' чи 'дослідження', є базовою лексикою
      академічного письма.
  - statement: Безособові речення з формами на -но/-то фокусуються на особі, яка виконала
      дію, а не на самій дії.
    correct: false
    explanation: Навпаки, вони повністю прибирають особу виконавця і фокусуються виключно
      на дії або її результаті (його було заарештовано).
  - statement: У словосполученні 'сорок студентів' числівник 'сорок' стоїть у формі
      називного або знахідного відмінка.
    correct: true
    explanation: 'Так, числівник 40 має лише дві форми: сорок (Н.в., З.в.) та сорока
      (для всіх інших відмінків).'
  - statement: Номінативні (називні) речення складаються лише з підмета і можуть використовуватися
      як заголовки.
    correct: true
    explanation: 'Так, наприклад: ''Київ. Двадцяті роки. Теорема Кравчука''.'
  - statement: Означено-особові речення обов'язково містять займенники 'я' або 'ми'
      як підмет.
    correct: false
    explanation: 'Ні, в означено-особових реченнях підмет відсутній, але особа легко
      зрозуміла із закінчення дієслова (наприклад: Застосуємо метод).'
- type: fill-in
  title: Вставте правильні числівники та терміни
  instruction: Оберіть правильний варіант для заповнення пропуску в реченні.
  items:
  - sentence: У лабораторії зараз активно працюють три молоді _______, які аналізують
      зібрані результати.
    answer: дослідники
    options:
    - дослідники
    - дослідника
    - дослідників
    - досліднику
    explanation: Після числівника 'три' іменник має бути у називному відмінку множини.
  - sentence: Для успішного завершення цього етапу нам потрібно проаналізувати дані
      з _______ різних історичних джерел.
    answer: п'ятдесяти
    options:
    - п'ятидесяти
    - п'ятдесяти
    - п'ятдесят
    - п'ятдесятьма
    explanation: 'У числівників 50-80 відмінюється лише друга частина. Родовий відмінок:
      п''ятдесяти.'
  - sentence: Комісія розпочне своє термінологічне засідання рівно _______ дев'ятій
      годині ранку.
    answer: о
    options:
    - о
    - в
    - на
    - у
    explanation: Для вказівки точного часу використовується прийменник 'о' (або 'об').
  - sentence: Студенти повинні завершити написання контрольного есе до пів на _______.
    answer: п'яту
    options:
    - п'ятої
    - п'ять
    - п'ята
    - п'яту
    explanation: Час із конструкцією 'пів на' вимагає знахідного відмінка наступної
      години.
  - sentence: Великий український математик народився двадцять сьомого вересня тисяча
      вісімсот _______ року на Волині.
    answer: дев'яносто другого
    options:
    - дев'яносто другий
    - дев'яноста другого
    - дев'яносто другого
    - дев'яностих двох
    explanation: У складених порядкових числівниках відмінюється виключно останнє
      слово.
  - sentence: Професор запропонував абсолютно новий _______ для швидкого вирішення
      цих складних диференціальних рівнянь.
    answer: метод
    options:
    - процес
    - метод
    - аналіз
    - синтез
    explanation: Метод — це спосіб або практичний шлях для вирішення задачі.
  - sentence: У його фундаментальній монографії було використано близько _______ тисяч
      специфічних наукових понять.
    answer: сорока
    options:
    - сорок
    - сорока
    - сороках
    - сорокам
    explanation: Числівник 40 у родовому відмінку має форму 'сорока'.
  - sentence: Трагічно, але абсолютно всі праці видатного математика було _______
      радянською репресивною владою.
    answer: конфісковано
    options:
    - конфісковані
    - конфіскували
    - конфісковано
    - конфіскувати
    explanation: Для опису історичних фактів без фокусу на виконавці використовуються
      безособові форми на -но/-то.
  - sentence: Комплексне та системне _______ цієї наукової проблеми зайняло у нього
      понад п'ять років кропіткої роботи.
    answer: дослідження
    options:
    - досліджування
    - дослідження
    - дослідити
    - досліджувати
    explanation: Віддієслівний іменник на -ення, який означає процес наукового вивчення.
  - sentence: За _______ до початку важливого іспиту викладач роздав усім студентам
      необхідні екзаменаційні матеріали.
    answer: чверть
    options:
    - чверть
    - п'ятнадцять
    - половину
    - десять
    explanation: В офіційному позначенні часу п'ятнадцять хвилин до години часто називають
      словом 'чверть'.
- type: unjumble
  title: Синтаксис наукового стилю
  instruction: Розташуйте слова у правильному порядку, щоб утворити граматично правильні
    академічні речення.
  items:
  - words:
    - у
    - роботі
    - запропоновано
    - новий
    - метод
    - швидкого
    - обчислення
    - складних
    - математичних
    - рівнянь
    answer: У роботі запропоновано новий метод швидкого обчислення складних математичних
      рівнянь.
  - words:
    - для
    - проведення
    - цього
    - дослідження
    - науковцям
    - знадобилося
    - близько
    - п'ятдесяти
    - різних
    - джерел
    answer: Для проведення цього дослідження науковцям знадобилося близько п'ятдесяти
      різних джерел.
  - words:
    - михайло
    - кравчук
    - вважав
    - що
    - українська
    - мова
    - здатна
    - передавати
    - найвищі
    - абстрактні
    - поняття
    answer: Михайло Кравчук вважав що українська мова здатна передавати найвищі абстрактні
      поняття.
  - words:
    - у
    - тисяча
    - дев'ятсот
    - тридцять
    - восьмому
    - році
    - відомого
    - вченого
    - було
    - безпідставно
    - заарештовано
    answer: У тисяча дев'ятсот тридцять восьмому році відомого вченого було безпідставно
      заарештовано.
  - words:
    - результати
    - системного
    - аналізу
    - будуть
    - опубліковані
    - у
    - наступному
    - випуску
    - престижного
    - наукового
    - журналу
    answer: Результати системного аналізу будуть опубліковані у наступному випуску
      престижного наукового журналу.
  - words:
    - сьогодні
    - ми
    - розглянемо
    - основні
    - правила
    - відмінювання
    - складних
    - кількісних
    - та
    - порядкових
    - числівників
    answer: Сьогодні ми розглянемо основні правила відмінювання складних кількісних
      та порядкових числівників.
  - words:
    - засідання
    - термінологічної
    - комісії
    - було
    - призначено
    - на
    - пів
    - на
    - дванадцяту
    - годину
    - дня
    answer: Засідання термінологічної комісії було призначено на пів на дванадцяту
      годину дня.
  - words:
    - доведення
    - цієї
    - складної
    - теореми
    - стало
    - справжнім
    - проривом
    - у
    - сучасній
    - європейській
    - математиці
    answer: Доведення цієї складної теореми стало справжнім проривом у сучасній європейській
      математиці.
- type: error-correction
  title: 'Інспекторський контроль: Виправте граматичні помилки'
  instruction: Знайдіть помилку у реченні та оберіть правильний варіант.
  items:
  - sentence: У цьому процесі беруть участь три метода обчислення.
    error: метода
    answer: методи
    error_type: word
    options:
    - методи
    - методів
    - методу
    - методі
    explanation: За правилом 2, 3, 4 іменник має стояти у називному відмінку множини
      (методи).
  - sentence: База даних складається з п'ятидесяти наукових статей.
    error: п'ятидесяти
    answer: п'ятдесяти
    error_type: word
    options:
    - п'ятдесяти
    - п'ятдесят
    - п'ятдесятьма
    - п'ятдесятьох
    explanation: У десятках (50-80) під час відмінювання змінюється лише друга частина
      слова.
  - sentence: Конференція розпочнеться в десять годин ранку.
    error: в десять годин
    answer: о десятій годині
    error_type: phrase
    options:
    - о десятій годині
    - у десять
    - в десяту
    - десятій
    explanation: Офіційний час вимагає використання прийменника 'о/об' та порядкового
      числівника у місцевому відмінку.
  - sentence: Він народився у тисяча дев'ятисотому другому році.
    error: дев'ятисотому
    answer: дев'ятсот
    error_type: word
    options:
    - дев'ятсот
    - дев'ятисот
    - дев'ятистах
    - дев'ятисотці
    explanation: У складених порядкових числівниках відмінюється лише останнє слово
      (другому).
  - sentence: Завдяки сорокам новим правилам термінологія стала кращою.
    error: сорокам
    answer: сорока
    error_type: word
    options:
    - сорока
    - сороку
    - сороками
    - сорок
    explanation: Числівник 40 у всіх непрямих відмінках має лише одну форму — 'сорока'.
  - sentence: Комісія активно обговорювала формування нових поняттів.
    error: поняттів
    answer: понять
    error_type: word
    options:
    - понять
    - поняття
    - поняттях
    - поняттєв
    explanation: Форма родового відмінка множини від іменника 'поняття' — 'понять'.
  - sentence: Видатного вченого забрали до в'язниці вночі.
    error: забрали до в'язниці
    answer: було заарештовано
    error_type: register
    options:
    - було заарештовано
    - пішов до в'язниці
    - забрали у тюрму
    - арештували його
    explanation: В енциклопедичному стилі слід використовувати безособові форми (було
      заарештовано).
  - sentence: Для цього нам знадобиться чотири складних процеса.
    error: процеса
    answer: процеси
    error_type: word
    options:
    - процеси
    - процесів
    - процесу
    - процесі
    explanation: 'Після числівника ''чотири'' ми завжди вживаємо називний відмінок
      множини: чотири процеси.'
- type: cloze
  title: Відновіть наукову біографію
  passage: Михайло Кравчук був одним із найвидатніших математиків України. Він народився
    наприкінці дев'ятнадцятого {{1}}. Професор Кравчук наполегливо працював над створенням
    сучасної української наукової {{2}}. У його словнику зібрано понад {{3}} тисяч
    фахових слів. Комісія щодня збиралася {{4}} дев'ятій годині ранку і працювала
    до самого вечора. Вони обговорювали {{5}} багатьох абстрактних слів. Замість того,
    щоб просто калькувати іноземні терміни, вчений пропонував використовувати українські
    віддієслівні {{6}}, такі як 'обчислення' або '{{7}}'. У результаті цих зусиль
    математичний {{8}} українською мовою зазвучав переконливо та органічно. Для розрахунків
    він часто використовував {{9}} метод моментів. На жаль, у тисяча дев'ятсот тридцять
    {{10}} році його наукова діяльність обірвалася. Видатного діяча {{11}} безпідставно
    заарештовано. Точну кількість його нереалізованих ідей важко уявити, але їх було
    не два чи {{12}}, а значно більше. У його архівах зберігалося щонайменше {{13}}
    унікальних проєктів, які так і не побачили світу. Сучасні дослідники щоразу дивуються
    результатам {{14}} його залишених записів. Глобальний {{15}} його впливу на розвиток
    вітчизняної науки є предметом захоплення багатьох істориків. Лише за кілька десятиліть
    його ім'я повернулося у науковий {{16}}.
