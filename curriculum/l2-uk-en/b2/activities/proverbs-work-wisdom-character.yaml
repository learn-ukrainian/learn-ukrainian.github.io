- type: essay-response
  title: 'Аналітичне есе: Сродна праця'
  instruction: Напишіть розгорнуту та аргументовану відповідь на поставлене запитання.
  prompt: Поясніть концепцію сродної праці філософа Григорія Сковороди. Як ця історична
    ідея застосовується до сучасного життєвого вибору кар'єри? Наведіть один розгорнутий
    приклад з реального життя.
  min_words: 150
  model_answer: 'Концепція сродної праці Григорія Сковороди є одним із найважливіших
    філософських здобутків української культури вісімнадцятого століття. Її головна
    ідея полягає в тому, що кожна людина народжується з певними вродженими талантами
    та унікальними нахилами до конкретної діяльності. Справжнє людське щастя можливе
    лише тоді, коли особа займається справою, яка повністю відповідає її внутрішній
    природі. Якщо ж людина під тиском суспільства обирає дуже престижну або високооплачувану,
    але абсолютно несродну професію, вона неминуче буде відчувати глибоке внутрішнє
    незадоволення та розчарування.

    У нашому сучасному світі ця глибока ідея залишається надзвичайно актуальною. Сьогодні
    дуже багато людей стикаються з емоційним та професійним вигоранням на високих
    корпоративних посадах, незважаючи на величезні зарплати. Наприклад, успішний корпоративний
    юрист може раптово покинути міжнародну фірму, щоб відкрити власну невеличку кав''ярню
    або ремісничу пекарню. Він робить цей крок тому, що саме в такій простій праці
    він знаходить гармонію та відчуває радість справжнього творчого процесу. Це і
    є сучасний пошук сродної праці — постійна спроба знайти ідеальний баланс між фінансовим
    заробітком та душевним спокоєм. Сковорода вчив нас усіх, що лише через щиру сродну
    працю ми можемо приносити найбільшу користь суспільству, подібно до працьовитої
    бджоли, яка із задоволенням збирає солодкий нектар та перетворює його на цілющий
    мед.

    '
  rubric:
    - criteria: Змістове наповнення та повнота розкриття
      description: Дуже точне пояснення концепції та наявність релевантного сучасного
        прикладу з життя.
