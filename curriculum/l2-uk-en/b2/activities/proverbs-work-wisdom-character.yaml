- type: reading
  title: 'Первинне джерело: Сила слова та праці'
  text: 'Народна мудрість передавалася з покоління в покоління і часто слугувала замість
    писаних законів. Якщо хтось порушував обіцянку, йому нагадували, що слово не горобець.
    Це означало, що після того, як ви щось сказали, ви вже не можете повернути свої
    слова назад. З іншого боку, люди дуже поважали тих, хто багато працював. Вважалося,
    що людина, яка не боїться важкої праці, обов''язково досягне успіху, тому що без
    труда нема плода. Але перед початком будь-якої великої справи старійшини радили
    сім разів відміряти, щоб уникнути фатальних помилок.

    '
  tasks:
    - Чому народну мудрість можна порівняти з неписаними законами?
    - Що символізує прислів'я про горобця в контексті обіцянок?
    - Яке ставлення до важкої праці описано в тексті?
    - Чому перед початком великої справи варто сім разів відміряти?
- type: true-false
  title: Перевірка розуміння концепцій
  instruction: Визначте, чи є наведені твердження правильними.
  items:
    - statement: Прислів'я про горобця означає, що дрібних птахів важко ловити руками.
      correct: false
      explanation: Це метафора про те, що сказане слово не можна повернути назад.
    - statement: Фраза про бджолу і мед є метафорою продуктивної та результативної
        праці.
      correct: true
      explanation: Вона ілюструє, що працьовита людина завжди матиме позитивний результат.
    - statement: Концепція сродної праці історично належить українському поету Тарасу
        Шевченку.
      correct: false
      explanation: Ця важлива концепція належить філософу Григорію Сковороді.
    - statement: Вислів про сивину в бороду описує несподівану легковажність літньої
        людини.
      correct: true
      explanation: Він вказує на ситуацію, коли людина ігнорує розсудливість свого
        віку.
    - statement: Наймана праця у фольклорі завжди асоціюється з повною радістю та
        свободою.
      correct: false
      explanation: Навпаки, наймана праця часто розглядалася як експлуатація або втрата
        свободи.
    - statement: Народні прислів'я завжди радять ретельно думати перед ухваленням
        важливого рішення.
      correct: true
      explanation: 'Для цього найчастіше використовується правило: сім разів відміряй,
        один раз відріж.'
    - statement: Слово труд в українській мові означає приємний відпочинок після тривалої
        роботи.
      correct: false
      explanation: Труд є синонімом до праці, часто з акцентом на великі важкі зусилля.
    - statement: Вираз мати характер зазвичай означає бути сильною, стійкою та принциповою
        людиною.
      correct: true
      explanation: Це дуже позитивна характеристика, на відміну від виразу про важкий
        характер.
    - statement: Справжній друг, згідно з прислів'ям, завжди говорить лише найприємніші
        слова.
      correct: false
      explanation: Справжній друг каже правду, а не маже вас солодким медом лестощів.
    - statement: Українське прислів'я про вічне навчання звучить як вік живи, вік
        учись.
      correct: true
      explanation: Це класичний концепт безперервної освіти, який відомий з дуже давніх
        часів.
- type: quiz
  title: Значення народної мудрості
  instruction: Оберіть одну правильну відповідь на кожне запитання.
  items:
    - question: Яке точне визначення концепції сродна праця за філософією видатного
        українського мислителя Григорія Сковороди?
      explanation: Це робота за покликанням, яка повністю відповідає природним талантам
        людини.
      options:
        - text: Робота за покликанням та природними здібностями
          correct: true
        - text: Важка фізична робота в сільському господарстві
          correct: false
        - text: Робота, яка приносить найбільше грошей
          correct: false
        - text: Виконання наказів керівництва без заперечень
          correct: false
    - question: У якій з наведених життєвих ситуацій найбільш доречно використати
        давню пораду сім разів відміряти перед дією?
      explanation: Ця порада стосується складних ситуацій, де потрібен детальний системний
        аналіз.
      options:
        - text: Перед підписанням важливого і ризикованого контракту
          correct: true
        - text: Під час щоденної купівлі продуктів у супермаркеті
          correct: false
        - text: Коли вибираєш, що вдягнути на звичайну прогулянку
          correct: false
        - text: Під час дружньої розмови про погоду надворі
          correct: false
    - question: Який традиційний вислів використовують українці, щоб зупинити людину,
        яка дуже хоче ухвалити серйозне, але поспішне рішення?
      explanation: Сім разів відміряй, один раз відріж — класичне правило розсудливості.
      options:
        - text: Сім разів відміряй, один раз відріж
          correct: true
        - text: Вік живи, вік учись усьому новому
          correct: false
        - text: Де є бджола, там обов'язково є мед
          correct: false
        - text: Не все те золото, що яскраво блищить
          correct: false
    - question: Яким чином слід правильно перекласти українською мовою відому англійську
        ідіому про свиней, які навчаться літати?
      explanation: Український еквівалент для неможливої події використовує образ
        рака, що свистить на горі.
      options:
        - text: Коли рак на горі голосно свисне
          correct: true
        - text: Коли свині навчаться швидко літати
          correct: false
        - text: Коли настане абсолютно новий день
          correct: false
        - text: Коли сніг впаде на зелені дерева
          correct: false
    - question: Яку головну думку намагається донести до нас людина, використовуючи
        популярну фразу про те, що не все є золотом, що яскраво блищить?
      explanation: Ця відома фраза завжди закликає нас до критичного мислення та обережного
        аналізу.
      options:
        - text: Зовнішня краса товару або людини може бути дуже оманливою
          correct: true
        - text: Коштовні метали завжди мають надзвичайно високу ринкову вартість
          correct: false
        - text: Справжні друзі дарують один одному лише найдорожчі подарунки
          correct: false
        - text: Усі яскраві речі обов'язково зроблені з найдорожчого у світі матеріалу
          correct: false
    - question: Кого українська народна традиція та мудрість дуже влучно називає тим
        другом, хто завжди солодким медом маже?
      explanation: Це метафора лицеміра, який говорить лише приємні, але абсолютно
        неправдиві речі.
      options:
        - text: Людину, яка постійно використовує лестощі заради власної вигоди
          correct: true
        - text: Щирого товариша, який завжди прийде на допомогу у біді
          correct: false
        - text: Того, хто любить цілими днями працювати на пасіці з бджолами
          correct: false
        - text: Людину, яка завжди говорить вам дуже неприємну правду в очі
          correct: false
    - question: Якими словами українці зазвичай описують людину, яка є дуже сильною
        духом і має непохитні моральні принципи?
      explanation: Вираз мати характер завжди означає внутрішню стійкість та сильну
        волю.
      options:
        - text: Кажуть, що ця людина має справжній характер
          correct: true
        - text: Кажуть, що ця людина має дуже важкий характер
          correct: false
        - text: Кажуть, що ця людина має абсолютно золотий характер
          correct: false
        - text: Кажуть, що ця людина взагалі не має ніякого характеру
          correct: false
    - question: Яке дієслово слід використовувати в сучасній літературній українській
        мові, коли ви говорите про щоденне споживання їжі?
      explanation: Слово кушати — це російський відповідник (русизм), українською
        правильно казати їсти.
      options:
        - text: 'Літературною мовою правильно говорити: я дуже хочу їсти'
          correct: true
        - text: 'Літературною мовою правильно говорити: я дуже хочу кушати'
          correct: false
        - text: 'Літературною мовою правильно говорити: я буду питатися'
          correct: false
        - text: 'Літературною мовою правильно говорити: я збираюся приймати'
          correct: false
    - question: Який глибокий зміст має приказка про сивину в бороду і біса в ребро
        у контексті сучасної комунікації?
      explanation: Цей вислів означає легковажну поведінку літньої людини, яка повністю
        суперечить очікуваній розсудливості віку.
      options:
        - text: Літня людина раптом починає поводитися дуже легковажно та шукати пригод
          correct: true
        - text: Людина стає надзвичайно мудрою та розсудливою з роками
          correct: false
        - text: Старі люди завжди страждають від сильного болю в спині
          correct: false
        - text: Чоловіки з бородою завжди виявляються найбільш розумними в компанії
          correct: false
    - question: До якої конкретної життєвої ситуації чи теми найкраще підходить відоме
        прислів'я про те, що хто питає, той не блудить?
      explanation: 'Це правило про легалізацію незнання: завжди краще запитати, ніж
        самостійно помилитися.'
      options:
        - text: Не варто ніколи соромитися звертатися по допомогу до інших людей
          correct: true
        - text: Якщо забагато запитувати інших, можна дуже легко загубитися в місті
          correct: false
        - text: Люди, які ставлять запитання іншим, завжди роблять найбільше помилок
          correct: false
        - text: Дослідники ніколи не повинні питати поради у своїх старших колег
          correct: false
- type: error-correction
  title: Виправте русизми та кальки
  instruction: Знайдіть помилку в реченні, виправте її та оберіть правильний варіант.
  items:
    - sentence: Сьогодні ми відвідаємо дуже важливе міроприємство, присвячене українській
        культурі.
      error: міроприємство
      answer: захід
      error_type: phrase
      options:
        - захід
        - свято
        - дійство
        - подію
      explanation: Слово міроприємство є російською калькою. Українською літературною
        мовою правильно казати захід.
    - sentence: Після закінчення університету він хоче працювати в банку і получати
        велику зарплату.
      error: получати
      answer: отримувати
      error_type: word
      options:
        - отримувати
        - заробляти
        - добувати
        - знаходити
      explanation: Дієслово получати — це русизм, український відповідник — отримувати.
    - sentence: Маленька дівчинка дуже любить кушати свіжі червоні яблука з бабусиного
        саду.
      error: кушати
      answer: їсти
      error_type: word
      options:
        - їсти
        - жувати
        - смакувати
        - гризти
      explanation: Кушати — це яскравий русизм, літературна форма — їсти.
    - sentence: Вона вважає, що це самий цікавий фільм цього року.
      error: самий цікавий
      answer: найцікавіший
      error_type: construction
      options:
        - найцікавіший
        - найбільш цікавіший
        - дуже цікавий
        - найбільш цікавий
      explanation: В українській мові ступені порівняння утворюються за допомогою
        префікса най-, а не слова самий.
    - sentence: На вулиці почалася страшенна злива, ллє як з відра котами і собаками.
      error: котами і собаками
      answer: вода
      error_type: phrase
      options:
        - вода
        - ріка
        - озеро
        - море
      explanation: 'В українській мові немає ідіоми про котів і собак під час дощу.
        Достатньо сказати: ллє як з відра.'
    - sentence: Він сказав це в гніві, але слово не пташка, вже не впіймаєш.
      error: пташка
      answer: горобець
      error_type: word
      options:
        - горобець
        - орел
        - сокіл
        - лелека
      explanation: 'В оригінальному прислів''ї фігурує саме горобець: слово не горобець.'
    - sentence: Для мене розв'язати цю математичну задачу — це просто шматок торта.
      error: шматок торта
      answer: простіше простого
      error_type: phrase
      options:
        - простіше простого
        - легка справа
        - як два плюс два
        - дуже легко
      explanation: Калькування piece of cake є стилістичною помилкою. Український
        еквівалент — простіше простого.
    - sentence: Ми знаємо, що без праці не витягнеш і рибку зі ставка.
      error: не витягнеш і рибку
      answer: нема плода
      error_type: phrase
      options:
        - нема плода
        - немає результату
        - нічого не буде
        - немає грошей
      explanation: 'Прислів''я про рибку є російським. Українська паремія звучить:
        без труда нема плода.'
