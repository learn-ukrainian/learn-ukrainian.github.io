- type: fill-in
  title: Заповніть пропуски у прислів'ях
  instruction: Оберіть правильне слово, щоб завершити речення.
  items:
    - sentence: Без труда нема ________, тому треба дуже багато і наполегливо працювати.
      answer: плода
      options:
        - плода
        - результату
        - щастя
        - грошей
      explanation: 'Оригінальна форма прислів''я: без труда нема плода.'
    - sentence: Де працює ________, там обов'язково є і солодкий корисний мед.
      answer: бджола
      options:
        - бджола
        - квітка
        - робота
        - пасіка
      explanation: Бджола — класичний символ працелюбності в українській культурі.
    - sentence: Сім разів ретельно відміряй, один раз акуратно ________.
      answer: відріж
      options:
        - відріж
        - зроби
        - подумай
        - скажи
      explanation: Це відоме прислів'я закликає до розсудливості перед дією.
    - sentence: Вік живи, вік ________ усьому новому, бо світ постійно змінюється.
      answer: учись
      options:
        - учись
        - працюй
        - читай
        - думай
      explanation: 'Традиційна народна концепція безперервного навчання: вік живи
        — вік учись.'
    - sentence: Пам'ятай, що не все те ________, що так яскраво блищить на сонці.
      answer: золото
      options:
        - золото
        - срібло
        - багатство
        - каміння
      explanation: 'Сильний заклик до критичного мислення: зовнішність часто буває
        оманливою.'
    - sentence: 'Слово не маленька ________: вилетить, то вже його ніколи не впіймаєш.'
