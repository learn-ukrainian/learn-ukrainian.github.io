  instruction: Заповніть пропуски, обравши правильні слова.
- type: essay-response
  title: Напишіть вступ до презентації
  instruction: Створіть ефективний вступ до вашої презентації на професійну тему,
    уникаючи вибачень і використовуючи 'гачок'.
  prompt: Уявіть, що ви виступаєте на конференції з презентацією вашого нового проєкту.
    Напишіть вступну частину (мінімум 150 слів), яка включає привітання, 'гачок' (захоплення
    уваги), представлення проблеми та формулювання головної тези.
  min_words: 150
  model_answer: Доброго дня, шановні колеги! Чи замислювалися ви коли-небудь, скільки
    часу ми щодня витрачаємо на перевірку електронної пошти? Згідно з останніми дослідженнями,
    середньостатистичний офісний працівник витрачає на це понад дві години щодня.
    Це двадцять п'ять відсотків нашого робочого часу, які могли б бути інвестовані
    у творчі завдання або стратегічне планування. Мене звати Олексій, і сьогодні я
    хочу представити вам нашу нову платформу для внутрішньої комунікації, яка здатна
    скоротити цей час удвічі. Наш проєкт не просто пропонує новий месенджер, він змінює
    філософію обміну інформацією в компанії. Ми проаналізували досвід провідних технологічних
    корпорацій і створили інструмент, який мінімізує інформаційний шум. Протягом наступних
    п'ятнадцяти хвилин я покажу вам, як саме працює наша система, які результати ми
    вже отримали під час тестування у відділі продажів, і чому впровадження цієї платформи
    стане ключовим кроком до підвищення загальної ефективності нашої команди. Отже,
    давайте перейдемо до головного.
  rubric:
  - criteria: Наявність 'гачка'
    description: Вступ містить цікавий факт, запитання або коротку історію для захоплення
      уваги.
    points: 5
  - criteria: Відсутність вибачень
    description: Текст не містить вибачень за хвилювання чи недоліки.
    points: 5
  - criteria: Чіткість тези
    description: Головна ідея презентації сформульована ясно і зрозуміло.
    points: 5
