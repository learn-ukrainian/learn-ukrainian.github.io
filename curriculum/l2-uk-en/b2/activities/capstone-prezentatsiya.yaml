      correct: false
    - text: Дивитися у стелю поверх голів слухачів
      correct: false
  - question: Що слід робити оратору під час сесії запитань і відповідей? Оберіть
      усі правильні.
    min_correct: 3
    options:
    - text: Витримати коротку паузу перед початком відповіді
      correct: true
    - text: Подякувати слухачеві за цікаве запитання
      correct: true
    - text: Чесно визнати, якщо ви не знаєте точної відповіді
      correct: true
    - text: Агресивно захищатися від будь-якої критики
      correct: false
    - text: Вигадати відповідь, щоб не здатися некомпетентним
      correct: false
  - question: Які риси були притаманні українській бароковій риториці Києво-Могилянської
      академії? Оберіть усі правильні.
