- type: reading
  title: 'Первинне джерело: Сучасна риторика'
  text: 'Будь-яка успішна презентація починається задовго до того, як ви виходите
    на сцену. Вона починається з чіткого планування. У цьому розділі ми розберемо,
    як побудувати архітектуру вашої промови так, щоб аудиторія слідувала за вашою
    думкою від першого до останнього слова. Класична тріада структурування тексту
    залишається неперевершеною. Вона працює, тому що відповідає природному алгоритму
    людського мислення: знайомство з ідеєю, її розгляд та прийняття рішення. Вступ
    (10-15% часу) захоплює увагу. Основна частина (70-80% часу) наводить аргументи.
    Висновок (10-15% часу) синтезує все сказане вище.

    '
  tasks:
  - Які три ключові елементи класичної структури презентації описуються в тексті?
  - Чому планування вважається найважливішим етапом ще до виходу на сцену?
  - Яке завдання має виконувати висновок згідно з цим текстом?
  - Як ви розумієте фразу 'архітектура промови'?
- type: true-false
  title: Правильно чи неправильно?
  instruction: Визначте, чи є твердження правильним або неправильним відповідно до
    правил ефективної презентації.
  items:
  - statement: Починати свій виступ із вибачення за хвилювання є найкращим способом
      завоювати прихильність аудиторії.
    correct: false
    explanation: Вибачення руйнує ваш авторитет; краще використовувати 'гачок' для
      захоплення уваги.
  - statement: Слайд презентації має містити якомога більше тексту, щоб бути корисним.
    correct: false
    explanation: Слайд повинен бути візуальною опорою з мінімальною кількістю тексту.
  - statement: Усвідомлена пауза допомагає позбутися використання слів-паразитів.
    correct: true
    explanation: Пауза дає час зібратися з думками і не використовувати звуки 'е-е-е'
      або 'ну'.
  - statement: Під час виступу оратору слід постійно дивитися на екран зі слайдами,
      щоб не забути текст.
    correct: false
    explanation: Читання зі слайдів і відсутність зорового контакту свідчать про неповагу
      та невпевненість.
  - statement: Вставні слова, такі як 'по-перше' або 'отже', допомагають логічно структурувати
      презентацію.
    correct: true
    explanation: Вони діють як дорожні знаки, показуючи аудиторії логіку вашого виступу.
  - statement: Висновок презентації обов'язково повинен містити нову інформацію, про
      яку раніше не йшлося.
    correct: false
    explanation: Висновок не повинен містити нової інформації; його завдання — синтезувати
      сказане.
  - statement: Риторичне запитання є одним із найефективніших методів захоплення уваги
      на початку.
    correct: true
    explanation: Воно змушує слухачів задуматися і одразу залучає їх до теми.
  - statement: Професійний оратор ніколи не відчуває хвилювання або стресу перед виходом
      на сцену.
    correct: false
    explanation: Хвилювання — це нормальна реакція; професіонали просто перетворюють
      цей стрес на енергію.
  - statement: Завершувати сесію запитань і відповідей найкраще потужним підсумком
      та закликом до дії.
    correct: true
    explanation: Це залишає сильне фінальне враження після того, як ви відповіли на
      всі запитання.
  - statement: Визнання того, що ви не знаєте відповіді на запитання, назавжди знищить
      вашу репутацію експерта.
    correct: false
    explanation: Чесне визнання меж своєї компетенції лише зміцнює ваш авторитет.
- type: quiz
  title: Перевірте свої знання про презентації
  items:
  - question: Яка головна мета використання прийому 'гачок' на початку вашого публічного
      виступу?
    explanation: Гачок (несподіваний факт або запитання) одразу захоплює увагу аудиторії.
    options:
    - text: Захопити увагу аудиторії та змусити її слухати
      correct: true
    - text: Детально перелічити всі свої регалії
      correct: false
    - text: Вибачитися за можливі помилки у виступі
      correct: false
    - text: Одразу показати найважливіший графік
      correct: false
  - question: Яку важливу роль відіграють вставні слова, такі як 'по-перше' чи 'отже'?
    explanation: Ці слова є маркерами переходів, які допомагають аудиторії не загубитися
      у ваших роздумах.
    options:
    - text: Вони показують логічну структуру вашого виступу
      correct: true
    - text: Вони допомагають подовжити час презентації
      correct: false
    - text: Вони замінюють необхідність використання слайдів
      correct: false
    - text: Вони приховують вашу невпевненість на сцені
      correct: false
  - question: Що саме рекомендують експерти робити замість того, щоб читати текст
      прямо зі слайдів?
    explanation: Слайд має бути лише візуальною опорою, а не суфлером для читання.
    options:
    - text: Використовувати слайди як опору і тримати зоровий контакт
      correct: true
    - text: Записати весь текст на папір і читати з нього
      correct: false
    - text: Вивчити всю презентацію напам'ять слово в слово
      correct: false
    - text: Вимкнути екран і розказувати все в темряві
      correct: false
  - question: Яка частина успішної презентації повинна обов'язково містити синтез
      усього сказаного раніше матеріалу?
    explanation: Висновок має синтезувати ваші аргументи без додавання нової інформації.
    options:
    - text: Висновок презентації
      correct: true
    - text: Головна частина презентації
      correct: false
    - text: Вступна частина презентації
      correct: false
    - text: Сесія запитань і відповідей
      correct: false
  - question: Чим найкраще і найефективніше замінити слова-паразити (наприклад, 'ну',
      'е-е-е') під час вашої доповіді?
    explanation: Пауза — це простір, який ви даєте слухачам для перетравлення інформації.
    options:
    - text: Усвідомленою паузою та диханням
      correct: true
    - text: Сміхом або жартом
      correct: false
    - text: Швидким ковтанням води
      correct: false
    - text: Іншими, більш професійними словами-паразитами
      correct: false
  - question: Що варто зробити оратору в першу чергу, якщо він почує дуже гостру критику
      з аудиторії?
    explanation: Відділення емоції від факту допомагає зберегти професіоналізм.
    options:
    - text: Нейтралізувати емоції та перейти до мови фактів
      correct: true
    - text: Агресивно захищатися і нападати у відповідь
      correct: false
    - text: Проігнорувати людину і продовжити читати лекцію
      correct: false
    - text: Вибачитися і повністю погодитися з критикою
      correct: false
  - question: Як потрібно відповідати на запитання з аудиторії, якщо ви дійсно не
      знаєте на нього точної відповіді?
    explanation: Чесне визнання меж своєї компетенції лише зміцнює ваш авторитет.
    options:
    - text: Чесно визнати це і запропонувати знайти інформацію пізніше
      correct: true
    - text: Спробувати швидко вигадати найбільш правдоподібну відповідь
      correct: false
    - text: Зробити вигляд, що ви не почули цього складного запитання
      correct: false
    - text: Сказати, що це запитання є абсолютно неважливим і дурним
      correct: false
  - question: Яка максимальна кількість слів зазвичай рекомендується для одного рядка
      тексту на екрані слайда презентації?
    explanation: 'Правило шести: не більше шести слів у рядку і не більше шести рядків
      на екрані.'
    options:
    - text: Не більше шести слів
      correct: true
    - text: Близько п'ятнадцяти слів
      correct: false
    - text: Стільки, скільки поміститься
      correct: false
    - text: Не більше двох слів
      correct: false
  - question: Яким має бути оптимальний темп мовлення під час пояснення найважливішої
      або дуже складної для розуміння інформації?
    explanation: Складну інформацію треба промовляти повільніше, чітко артикулюючи
      кожне слово.
    options:
    - text: Повільнішим, із чіткою артикуляцією кожного слова
      correct: true
    - text: Максимально швидким, щоб зекономити час слухачів
      correct: false
    - text: Монотонним, щоб не відволікати зайвими емоціями
      correct: false
    - text: Темп взагалі не має ніякого значення для презентації
      correct: false
  - question: Як правильно і професійно реагувати на будь-які непередбачені технічні
      проблеми під час вашого публічного виступу?
    explanation: Легка посмішка і спокійна самоіронія зроблять вас людянішим в очах
      публіки.
    options:
    - text: Спокійно прийняти ситуацію, можливо, з легкою самоіронією
      correct: true
    - text: Влаштувати паніку і звинуватити технічного працівника
      correct: false
    - text: Одразу скасувати презентацію і піти зі сцени
      correct: false
    - text: Довго вибачатися перед кожним слухачем у залі
      correct: false
  instruction: Оберіть правильну відповідь.
- type: fill-in
  title: Заповніть пропуски маркерами переходів
  items:
  - sentence: Ми маємо проаналізувати звіти. _____, варто звернути увагу на відгуки
      клієнтів.
    answer: Крім того
    options:
    - Крім того
    - На мою думку
    - Підсумовуючи
    - Отже
  - sentence: Зростання продажів вражає. _____, витрати на рекламу також значно збільшилися.
    answer: Однак
    options:
    - Однак
    - По-перше
    - Насамперед
    - Таким чином
  - sentence: _____ я хочу підкреслити три найголовніші тези нашої сьогоднішньої зустрічі.
    answer: На завершення
    options:
    - На завершення
    - Для початку
    - З іншого боку
    - По-друге
  - sentence: Ми узгодили всі деталі проєкту. _____, ми можемо переходити до підписання
      контракту.
    answer: Отже
    options:
    - Отже
    - Проте
    - Незважаючи на
    - Як на мене
  - sentence: _____, ця інвестиція є занадто ризикованою для нашої компанії у поточних
      умовах.
    answer: На мою думку
    options:
    - На мою думку
    - Далі
    - Потім
    - У результаті
  - sentence: _____, ми маємо визначити головну цільову аудиторію для нашого нового
      продукту.
    answer: По-перше
    options:
    - По-перше
    - Наслідок
    - Висновок
    - Також
  - sentence: Цей ринок швидко розвивається. _____, ми бачимо багато нових конкурентів
      щомісяця.
    answer: У результаті
    options:
    - У результаті
    - Для початку
    - По-перше
    - Проте
  - sentence: _____, хочу подякувати всім присутнім за активну участь у нашій дискусії.
    answer: Підсумовуючи
    options:
    - Підсумовуючи
    - Однак
    - З іншого боку
    - По-друге
  - sentence: Ми маємо чудовий продукт. _____, нам варто покращити стратегію його
      просування.
    answer: З іншого боку
    options:
    - З іншого боку
    - Насамперед
    - Отже
    - Таким чином
  - sentence: _____, ми зібралися тут сьогодні, щоб обговорити фінансові результати
      минулого року.
    answer: Насамперед
    options:
    - Насамперед
    - Підсумовуючи
    - Тому
    - У результаті
  instruction: Оберіть правильне слово для заповнення пропуску.
- type: group-sort
  title: Розподіліть елементи виступу за етапами
  groups:
  - name: Вступ
    items:
    - захоплення уваги аудиторії
    - риторичне запитання
    - представлення проблеми
  - name: Основна частина
    items:
    - наведення сильних аргументів
    - демонстрація графіків
    - докази та приклади
  - name: Висновок
    items:
    - підбиття загальних підсумків
    - заклик до дії
    - синтез сказаного матеріалу
  instruction: Розподіліть елементи за групами.
- type: unjumble
  title: Складіть речення правильно
  items:
  - words:
    - Успішна
    - презентація
    - завжди
    - починається
    - з
    - ретельного
    - та
    - детального
    - планування
    answer: Успішна презентація завжди починається з ретельного та детального планування.
  - words:
    - Починати
    - свій
    - виступ
    - із
    - вибачення
    - за
    - хвилювання
    - є
    - великою
    - помилкою
    answer: Починати свій виступ із вибачення за хвилювання є великою помилкою.
  - words:
    - Вставні
    - слова
    - допомагають
    - слухачам
    - краще
    - розуміти
    - логічну
    - структуру
    - вашого
    - виступу
    answer: Вставні слова допомагають слухачам краще розуміти логічну структуру вашого
      виступу.
  - words:
    - Сучасний
    - слайд
    - повинен
    - бути
    - лише
    - візуальною
    - опорою
    - для
    - ваших
    - слів
    answer: Сучасний слайд повинен бути лише візуальною опорою для ваших слів.
  - words:
    - Зоровий
    - контакт
    - із
    - залом
    - створює
    - атмосферу
    - довіри
    - та
    - максимальної
    - залученості
    answer: Зоровий контакт із залом створює атмосферу довіри та максимальної залученості.
  - words:
    - Усвідомлена
    - пауза
    - є
    - найкращою
    - альтернативою
    - використанню
    - різноманітних
    - слів-паразитів
    - у
    - мовленні
    answer: Усвідомлена пауза є найкращою альтернативою використанню різноманітних
      слів-паразитів у мовленні.
  - words:
    - Завершення
    - виступу
    - має
    - містити
    - сильний
    - висновок
    - та
    - чіткий
    - заклик
    - до
    - дії
    answer: Завершення виступу має містити сильний висновок та чіткий заклик до дії.
  - words:
    - Ніколи
    - не
    - намагайтеся
    - вигадати
    - відповідь
    - на
    - питання
    - якщо
    - ви
    - її
    - не
    - знаєте
    answer: Ніколи не намагайтеся вигадати відповідь на питання якщо ви її не знаєте.
  instruction: Розташуйте слова у правильному порядку.
- type: mark-the-words
  title: Знайдіть маркери переходів
  instruction: Знайдіть і позначте всі вставні слова та маркери переходів у тексті.
  text: По-перше, ми маємо проаналізувати звіт. Крім того, варто звернути увагу на
    відгуки. Отже, ми змінюємо стратегію. На завершення, я хочу подякувати всім.
  answers:
  - По-перше
  - Крім того
  - Отже
  - На завершення
- type: error-correction
  title: Виправте помилки в мовленні
  items:
  - sentence: Я трохи хвилююся, тому вибачаюся за можливі помилки.
    error: вибачаюся
    answer: перепрошую
    options:
    - перепрошую
    - пробачаюся
    - прошу вибачення
    - вибачатимусь
    explanation: Слово 'вибачаюся' містить зворотну частку '-ся' (вибачаю себе), тому
      правильно казати 'перепрошую' або 'прошу вибачення'.
  - sentence: Ми маємо приймати участь у цій важливій конференції.
    error: приймати участь
    answer: брати участь
    options:
    - брати участь
    - мати участь
    - робити участь
    - взяти участь
    explanation: Вираз 'приймати участь' є калькою з російської мови. Українською
      правильно казати 'брати участь'.
  - sentence: Це самий кращий аргумент на користь нашої стратегії.
    error: самий кращий
    answer: найкращий
    options:
    - найкращий
    - більш кращий
    - саме кращий
    - найбільш кращий
    explanation: Слово 'самий' для творення найвищого ступеня порівняння є русизмом.
      Слід використовувати префікс 'най-'.
  - sentence: Слідуючий слайд показує зростання наших прибутків.
    error: Слідуючий
    answer: Наступний
    options:
    - Наступний
    - Другий
    - Дальший
    - Послідовний
    explanation: Слово 'слідуючий' є русизмом (калькою з 'следующий'). Правильно використовувати
      слово 'наступний'.
  - sentence: Ми отримали ці результати на протязі двох місяців.
    error: на протязі
    answer: протягом
    options:
    - протягом
    - за протяг
    - в протязі
    - напротязі
    explanation: Вираз 'на протязі' вживається лише стосовно руху повітря (протяг
      = draft). Щодо часу використовується прийменник 'протягом'.
  - sentence: Я хочу підкреслити про те, що цей проєкт є ключовим.
    error: підкреслити про те
    answer: підкреслити те
    options:
    - підкреслити те
    - підкреслити на тому
    - підкреслити за те
    - підкреслити в тому
    explanation: 'Дієслово ''підкреслити'' вимагає прямого додатка без прийменника:
      підкреслити щось, підкреслити те.'
  - sentence: Давайте підведемо ітоги нашої сьогоднішньої зустрічі.
    error: підведемо ітоги
    answer: підіб'ємо підсумки
    options:
    - підіб'ємо підсумки
    - зробимо ітоги
    - підведемо підсумки
    - зведемо ітоги
    explanation: Вираз 'підводити ітоги' є русизмом. В українській мові правильно
      казати 'підбивати підсумки'.
  - sentence: Я співпадаю з вашою думкою щодо цього питання.
    error: співпадаю
    answer: погоджуюся
    options:
    - погоджуюся
    - співпадаюсь
    - збігаюся
    - годжуся
    explanation: З думкою можна 'погоджуватися'. Слово 'співпадати' використовується
      для подій у часі.
  instruction: Знайдіть і виправте помилку в реченні.
- type: select
  title: Оберіть усі правильні варіанти
  items:
