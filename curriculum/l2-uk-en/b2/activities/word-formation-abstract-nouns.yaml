- type: fill-in
  title: 'Заповніть пропуски в академічних реченнях'
  instruction: 'Оберіть правильний абстрактний іменник для кожного речення.'
  items:
    - sentence: 'Швидкий ___ штучного інтелекту змінює сучасний ринок праці.'
      answer: 'розвиток'
      options: ['розвиток', 'розвивання', 'розвиватися', 'досягнення']
      explanation: 'Іменник "розвиток" фіксує процес і його наслідки.'
    - sentence: 'Нова технологія відкриває перед нами чудову ___ для масштабування бізнесу.'
      answer: 'можливість'
      options: ['можливість', 'гідність', 'діяльність', 'спроможність']
      explanation: 'Слово "можливість" означає сприятливі умови для дії.'
    - sentence: 'Компанія запровадила суворий контроль ___ на кожному етапі виробництва.'
      answer: 'якості'
      options: ['якості', 'якісно', 'діяльності', 'кількості']
      explanation: 'Контроль якості (quality control) — сталий бізнес-термін.'
    - sentence: 'Наукові ___ інституту отримали міжнародне визнання минулого року.'
      answer: 'досягнення'
      options: ['досягнення', 'досягання', 'значення', 'здобутки']
      explanation: '"Наукові досягнення" (scientific achievements) вказують на вагомі результати.'
    - sentence: 'Важко переоцінити ___ цієї реформи для економіки держави.'
      answer: 'значення'
      options: ['значення', 'знання', 'ставлення', 'розуміння']
      explanation: '"Мати значення" означає бути важливим.'
    - sentence: 'Ретельна ___ ризиків допоможе нам уникнути серйозних фінансових втрат.'
      answer: 'оцінка'
      options: ['оцінка', 'помилка', 'знахідка', 'оцінювати']
      explanation: 'Оцінка (assessment) використовується в аналізі процесів.'
    - sentence: 'Розвинуте громадянське ___ є запорукою стійкості демократії.'
      answer: 'суспільство'
      options: ['суспільство', 'керівництво', 'людство', 'громадянство']
      explanation: 'Слово "суспільство" описує соціум загалом.'
    - sentence: 'Висока загальна ___ населення є запорукою інноваційного розвитку країни.'
      answer: 'освіченість'
      options: ['освіченість', 'гідність', 'свідомість', 'якість']
      explanation: 'Освіченість позначає високий рівень освіти громадян.'
    - sentence: 'Толерантне ___ до інакшості є базовою європейською цінністю.'
      answer: 'ставлення'
      options: ['ставлення', 'відношення', 'розуміння', 'значення']
      explanation: 'Тільки "ставлення" (attitude) вживається щодо поглядів та емоцій.'
    - sentence: 'Психологи розробили тренінг для підвищення емоційної ___ рятувальників.'
      answer: 'стійкості'
      options: ['стійкості', 'можливості', 'свідомості', 'ефективності']
      explanation: 'Емоційна стійкість (resilience) допомагає долати кризи.'

- type: error-correction
  title: 'Виправте лексичні та стилістичні помилки'
  instruction: 'Знайдіть та виправте помилку в реченні, уникаючи суржику або неправильного вживання роду/множини.'
  items:
    - sentence: 'Керівник має дуже добре отношеніє до всіх своїх працівників.'
      error: 'отношеніє'
      answer: 'ставлення'
      error_type: 'word'
      options: ['ставлення', 'поніманіє', 'значення', 'відношення']
      explanation: 'Слово "отношеніє" є російською калькою. Правильно — "ставлення".'
    - sentence: 'Між партнерами виникло повне поніманіє ситуації на ринку.'
      error: 'поніманіє'
      answer: 'розуміння'
      error_type: 'word'
      options: ['розуміння', 'досягнення', 'значення', 'сприйняття']
      explanation: '"Поніманіє" — це суржик. Питоме українське слово — "розуміння".'
    - sentence: 'Ми бажаємо нашим клієнтам багато міцних здоров''їв у новому році.'
      error: 'здоров''їв'
      answer: 'здоров''я'
      error_type: 'construction'
      options: ['здоров''я', 'радощів', 'успіхів', 'щасть']
      explanation: 'Абстрактні іменники, як-от "здоров''я", вживаються лише в однині (singularia tantum).'
    - sentence: 'Відношення суспільства до екологічних проблем поступово змінюється на краще.'
      error: 'Відношення'
      answer: 'Ставлення'
      error_type: 'word'
      options: ['Ставлення', 'Розуміння', 'Сприйняття', 'Досягнення']
      explanation: 'Коли йдеться про позицію чи емоції людей, треба вживати слово "ставлення".'
    - sentence: 'Нами було прийнято рішення про розширення компанії.'
      error: 'Нами було прийнято рішення'
      answer: 'Ми вирішили'
      error_type: 'register'
      options: ['Ми вирішили', 'Ми маємо рішення', 'Нами ухвалено', 'Від нас пішло рішення']
