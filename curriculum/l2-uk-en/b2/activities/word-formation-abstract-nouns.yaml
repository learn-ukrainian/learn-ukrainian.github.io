- type: essay-response
  title: 'Есе: Сила абстракцій у професійній мові'
  instruction: 'Напишіть формальне есе про значення абстрактних понять у діловому та науковому спілкуванні.'
  prompt: 'Проаналізуйте, чому абстрактні іменники (такі як якість, стійкість, ефективність, свідомість) є життєво необхідними для сучасного професійного спілкування. Наведіть конкретні приклади номіналізації, трансформувавши 2-3 власні життєві ситуації або робочі процеси в формальний академічний чи діловий текст.'
  min_words: 150
  model_answer: "Абстрактні іменники відіграють вирішальну роль у структуруванні професійного дискурсу, оскільки вони дозволяють узагальнювати досвід, відходити від опису дрібних деталей і фокусуватися на стратегічних поняттях. У діловому та науковому світі слова на кшталт 'ефективність', 'стійкість' та 'якість' виступають як інструменти вимірювання успіху. Без них було б неможливо оцінити роботу компанії чи результати дослідження.\n\nОдним із ключових механізмів створення формального тексту є номіналізація — перетворення дієслів на іменники. Наприклад, якщо у розмовній мові ми кажемо: 'Ми швидко вирішили проблему, тому що команда добре працювала', то в офіційному звіті це звучатиме як: 'Швидке вирішення проблеми стало можливим завдяки злагодженій роботі команди'. Ця трансформація знімає емоційне забарвлення і переносить фокус з виконавців на сам процес.\n\nІнший приклад: 'Компанія витратила багато грошей на те, щоб оновити обладнання'. У діловому стилі це перетворюється на: 'Оновлення обладнання потребувало значних інвестицій'. Завдяки таким змінам текст стає лаконічним і об'єктивним. Крім того, абстрактні поняття, такі як 'громадянська свідомість' або 'гідність', мають величезне соціокультурне значення. Вони формують ціннісний каркас суспільства, дозволяючи вести глибокі філософські та політичні дискусії. Опанування цих лексичних інструментів свідчить про високий інтелектуальний рівень та професійну компетентність мовця."
  rubric:
    - criteria: 'Змістове наповнення'
      description: 'Есе містить аргументований аналіз ролі абстрактних іменників та чіткі приклади номіналізації.'
      points: 40
    - criteria: 'Лексична різноманітність'
      description: 'Правильне і доречне використання слів на -ння, -ість, -ство, уникнення кальок (напр., поніманіє).'
      points: 30
    - criteria: 'Стилістична відповідність'
      description: 'Текст витримано у формальному діловому або науковому стилі без перевантаження канцеляритом.'
      points: 30