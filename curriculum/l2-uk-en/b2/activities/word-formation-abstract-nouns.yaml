- type: reading
  title: 'Первинне джерело: Роль абстракцій'
  text: |
    Абстрактні іменники є невід'ємною частиною наукового та ділового стилів. Вони дозволяють мовцю відійти від опису конкретних дій і перейти до рівня узагальнення та аналізу. Номіналізація, тобто перетворення дієслів на іменники, робить текст більш формальним та об'єктивним. Наприклад, замість 'ми дослідили проблему' науковці пишуть 'дослідження проблеми виявило...'. Крім того, абстрактні поняття часто виступають як національні символи. Слово 'гідність' стало ключовим для розуміння сучасних процесів в Україні, а 'свідомість' вказує на громадянську відповідальність.
  tasks:
    - 'Чому абстрактні іменники важливі для наукового стилю?'
    - 'Що таке номіналізація?'
    - 'Які слова з тексту є прикладами національних символів?'
    - 'Як номіналізація впливає на об''єктивність тексту?'

- type: true-false
  title: 'Правда чи хиба: Абстрактні іменники'
  instruction: 'Визначте, чи є наведені твердження правильними.'
  items:
    - statement: 'Абстрактні іменники зазвичай позначають предмети, які можна торкнутися.'
      correct: false
      explanation: 'Абстрактні іменники позначають дії, стани, якості, які існують у мисленні, а не фізично.'
    - statement: 'Номіналізація — це перетворення різних частин мови на іменники.'
      correct: true
      explanation: 'Це ключовий інструмент для підвищення формальності тексту.'
    - statement: 'Слово "розуміння" є правильним українським відповідником кальки "поніманіє".'
      correct: true
      explanation: 'Використання слова "поніманіє" є суржиком.'
    - statement: 'Абстрактні іменники із суфіксом -ість часто утворюються від дієслів доконаного виду.'
      correct: false
      explanation: 'Іменники на -ість утворюються переважно від прикметників або дієприкметників.'
    - statement: 'Слово "значення" може означати як зміст слова, так і важливість події.'
      correct: true
      explanation: 'Це слово має два основні семантичні відтінки в діловому спілкуванні.'
    - statement: 'Переважна більшість абстрактних іменників має як форму однини, так і форму множини.'
      correct: false
      explanation: 'Вони належать до категорії singularia tantum, тобто мають лише форму однини.'
    - statement: 'Суфікс -ок зазвичай вказує на конкретний результат дії, наприклад, "здобуток".'
      correct: true
      explanation: 'Цей суфікс фіксує те, що залишилося після завершення процесу.'
    - statement: 'Слово "ставлення" використовується для вираження емоційної чи раціональної оцінки когось або чогось.'
      correct: true
      explanation: 'Це правильний відповідник замість хибного "відношення" щодо людей.'
    - statement: 'У живому неформальному спілкуванні рекомендується використовувати якомога більше абстрактних іменників.'
      correct: false
      explanation: 'У неформальному спілкуванні краще використовувати дієслова, щоб уникнути канцеляриту.'
    - statement: 'Суфікс -ство використовується виключно для позначення назв організацій та фізичних осіб.'
      correct: false
      explanation: 'Він також формує абстрактні назви якостей та статусів, як-от "геройство" чи "громадянство".'

- type: select
  title: 'Оберіть правильні варіанти'
  instruction: 'Оберіть усі правильні відповіді для кожного запитання.'
  items:
    - question: 'Які слова утворені за допомогою суфікса -ість?'
      min_correct: 3
      options:
        - text: 'можливість'
          correct: true
        - text: 'свідомість'
          correct: true
        - text: 'досягнення'
          correct: false
        - text: 'стійкість'
          correct: true
        - text: 'написання'
          correct: false
    - question: 'Які слова позначають результат дії за допомогою суфіксів -ок або -ка?'
      min_correct: 2
      options:
        - text: 'внесок'
          correct: true
        - text: 'сприйняття'
          correct: false
        - text: 'розвиток'
          correct: true
        - text: 'людство'
          correct: false
    - question: 'Які поняття належать до категорії singularia tantum (лише однина)?'
      min_correct: 3
      options:
        - text: 'щастя'
          correct: true
        - text: 'мудрість'
          correct: true
        - text: 'свобода'
          correct: true
        - text: 'стіл'
          correct: false
    - question: 'Які з цих слів є прикладами типового суржику, якого слід уникати?'
      min_correct: 2
      options:
        - text: 'поніманіє'
          correct: true
        - text: 'отношеніє'
          correct: true
        - text: 'ставлення'
          correct: false
        - text: 'розуміння'
          correct: false
    - question: 'Які суфікси найчастіше використовуються для творення абстрактних іменників від дієслів недоконаного виду?'
      min_correct: 2
      options:
        - text: '-ння'
          correct: true
        - text: '-ення'
          correct: true
        - text: '-ість'
          correct: false
        - text: '-ство'
          correct: false
    - question: 'Які з наведених слів передають колективні поняття або сфери діяльності?'
      min_correct: 3
      options:
        - text: 'суспільство'
          correct: true
        - text: 'керівництво'
          correct: true
        - text: 'студентство'
          correct: true
        - text: 'оцінка'
          correct: false
    - question: 'Які прикметники є основою для слова "гідність" та "освіченість"?'
      min_correct: 2
      options:
        - text: 'гідний'
          correct: true
        - text: 'освічений'
          correct: true
        - text: 'гід'
          correct: false
        - text: 'освіта'
          correct: false
    - question: 'Які терміни пов''язані з процесом обробки інформації в науковому дискурсі?'
      min_correct: 2
      options:
        - text: 'аналіз'
          correct: true
        - text: 'синтез'
          correct: true
        - text: 'додаток'
          correct: false
        - text: 'знахідка'
          correct: false

- type: group-sort
  title: 'Розподіліть абстрактні іменники'
  instruction: 'Розподіліть слова за суфіксом, який було використано для їх творення.'
  groups:
    - name: 'Суфікс -ння (процес/дія)'
      items: ['досягнення', 'сприйняття', 'ставлення', 'читання']
    - name: 'Суфікс -ість (якість/властивість)'
      items: ['можливість', 'ефективність', 'гідність', 'свідомість']
    - name: 'Суфікс -ство (сфера/статус)'
      items: ['суспільство', 'керівництво', 'громадянство', 'новаторство']

- type: quiz
  title: 'Тест на розуміння словотворення'
  instruction: 'Оберіть одну правильну відповідь для кожного запитання.'
  items:
    - question: 'Від якої частини мови найчастіше утворюються абстрактні іменники із суфіксом -ість?'
      explanation: 'Іменники на -ість (наприклад, актуальність, можливість) зазвичай утворюються від прикметників.'
      options:
        - text: 'Від дієслів'
          correct: false
        - text: 'Від прикметників'
          correct: true
        - text: 'Від інших іменників'
          correct: false
        - text: 'Від прислівників'
          correct: false
    - question: 'Яке слово є правильним українським відповідником для російського калькованого "отношеніє" щодо ставлення до людей?'
      explanation: 'В українській мові щодо людей і почуттів вживається слово "ставлення".'
      options:
        - text: 'Ставлення'
          correct: true
        - text: 'Відношення'
          correct: false
        - text: 'Поніманіє'
          correct: false
        - text: 'Сприйняття'
          correct: false
    - question: 'Яке явище лежить в основі стилістичного інструмента, що перетворює дієслова на іменники для академічних текстів?'
      explanation: 'Цей процес називається номіналізацією і активно використовується в академічному стилі.'
      options:
        - text: 'Персоніфікація'
          correct: false
        - text: 'Номіналізація'
          correct: true
        - text: 'Транслітерація'
          correct: false
        - text: 'Спрощення'
          correct: false
    - question: 'Який суфікс використовується для творення слова "суспільство" від слова "суспільний" у професійному контексті?'
      explanation: 'Слово "суспільство" утворене за допомогою суфікса -ство.'
      options:
        - text: '-ння'
          correct: false
        - text: '-ість'
          correct: false
        - text: '-ство'
          correct: true
        - text: '-ок'
          correct: false
    - question: 'Яке з наведених слів позначає абстрактне поняття, що не має форми множини і належить до категорії singularia tantum?'
      explanation: 'Слово "щастя" належить до абстрактних понять і використовується лише в однині.'
      options:
        - text: 'Щастя'
          correct: true
        - text: 'Стіл'
          correct: false
        - text: 'Проєкт'
          correct: false
        - text: 'Документ'
          correct: false
    - question: 'Що саме означає термін "свідомість" у контексті сучасного українського суспільно-політичного та деколонізаційного дискурсу?'
      explanation: 'Свідомість означає здатність до усвідомленого вибору та ідентифікації.'
      options:
        - text: 'Уміння швидко читати текст'
          correct: false
        - text: 'Активний, вольовий вибір ідентичності'
          correct: true
        - text: 'Бажання працювати в команді'
          correct: false
        - text: 'Здатність створювати нові слова'
          correct: false
    - question: 'Який абстрактний іменник найкраще позначає завершений матеріальний чи інтелектуальний результат цілеспрямованої дії?'
      explanation: 'Слово "здобуток" вказує на досягнутий позитивний результат, надбання.'
      options:
        - text: 'Читання'
          correct: false
        - text: 'Здобуток'
          correct: true
        - text: 'Можливість'
          correct: false
        - text: 'Діяльність'
          correct: false
    - question: 'Як краще переформулювати речення "Ми дослідили проблему", щоб надати йому формального та об''єктивного наукового стилю?'
      explanation: 'Використання іменника "дослідження" робить тон більш об''єктивним.'
      options:
        - text: 'Ми уважно подивилися на проблему.'
          correct: false
        - text: 'Дослідження проблеми було завершено.'
          correct: true
        - text: 'Ця проблема нами досліджена дуже добре.'
          correct: false
        - text: 'Ми багато думали про цю проблему.'
          correct: false
    - question: 'Яке абстрактне поняття, утворене від пасивного дієприкметника за допомогою суфікса -ість, описує стан суспільства?'
      explanation: 'Слово "освіченість" утворене від дієприкметника "освічений".'
      options:
        - text: 'Можливість'
          correct: false
        - text: 'Освіченість'
          correct: true
        - text: 'Актуальність'
          correct: false
        - text: 'Ефективність'
          correct: false
    - question: 'Чому надмірне використання абстрактних іменників у живому розмовному стилі є стилістично небажаним для мовця?'
      explanation: 'Надмір абстрактних іменників утворює канцелярит, роблячи живу розмову важкою для сприйняття.'
      options:
        - text: 'Бо це створює ефект канцеляриту і перевантажує мову.'
          correct: true
        - text: 'Бо це порушує граматичні правила української мови.'
          correct: false
        - text: 'Бо слова стають занадто короткими.'
          correct: false
        - text: 'Бо це свідчить про низький словниковий запас.'
          correct: false

