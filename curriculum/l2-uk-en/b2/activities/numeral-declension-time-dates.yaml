- type: reading
  title: "Службова записка: Розклад поставок"
  text: "Шановні колеги! Доводимо до вашого відома, що процес постачання товарів на склад номер три змінено. З першого березня розвантаження розпочинатиметься о чотирнадцятій тридцять. Кінцевий термін подачі заявок на відвантаження — за двадцять одинадцята щодня. Метод обробки залишається незмінним. Аналіз попередніх місяців показав, що цей графік є найбільш оптимальним. Просимо суворо дотримуватися визначених строків."
  tasks:
    - "Коли починається розвантаження за новим графіком?"
    - "Який кінцевий термін подачі заявок на відвантаження?"
    - "Чим відрізняється термін від строку в цьому контексті?"
    - "З якого числа діють нові правила постачання?"

- type: true-false
  title: "Аналіз тверджень: Час і дати"
  items:
    - statement: "Питання 'Скільки годин?' використовується для того, щоб дізнатися поточний час."
      correct: false
      explanation: "Для поточного часу ми запитуємо 'Котра година?', а 'Скільки годин?' стосується тривалості процесу."
    - statement: "В офіційному стилі час 14:30 звучить як 'чотирнадцята тридцять'."
      correct: true
      explanation: "Офіційно-діловий регістр вимагає 24-годинного формату без додаткових прийменників для хвилин."
    - statement: "Відповідаючи на запитання 'Коли?', ми ставимо назву місяця в називний відмінок."
      correct: false
      explanation: "Назва місяця завжди стоїть у родовому відмінку (наприклад, 'першого вересня')."
    - statement: "У складених порядкових числівниках, що позначають роки, відмінюється лише останнє слово."
      correct: true
      explanation: "Наприклад: 'у дві тисячі двадцять шостому році'."
    - statement: "Слово 'термін' позначає проміжок часу, протягом якого триває дія."
      correct: false
      explanation: "'Термін' — це кінцева точка (дедлайн), а проміжок часу — це 'строк'."
    - statement: "Прийменник 'на' використовується для хвилин у першій половині години (від 1 до 30)."
      correct: true
      explanation: "Наприклад: 'десять хвилин на десяту'."
    - statement: "Форма 'без десяти сім' є правильною українською літературною нормою."
      correct: false
      explanation: "Це русизм. Правильно казати 'за десять сьома' або 'десять до сьомої'."
    - statement: "Слово 'година' — це іменник жіночого роду, тому порядковий числівник із ним узгоджується у жіночому роді."
      correct: true
      explanation: "Тому ми кажемо 'о першій годині', 'о другій годині'."
    - statement: "Перед голосним звуком прийменник 'о' змінюється на 'об' для милозвучності."
      correct: true
      explanation: "Наприклад: 'об одинадцятій годині'."
    - statement: "Якщо дія триватиме з 1 по 5 число включно, ми використовуємо прийменник 'до' (до п'ятого)."
      correct: false
      explanation: "Для включення останнього дня краще використовувати прийменник 'по' (по п'яте число)."

- type: fill-in
  title: "Робочий графік: Вставте правильне слово"
  instruction: "Оберіть правильну форму слова для логістичного розкладу."
  items:
    - sentence: "Зустріч з керівником відділу призначено на _____ годину."
      answer: "п'ятнадцяту"
      options: ["п'ятнадцяту", "п'ятнадцять", "п'ятнадцятій", "п'ятнадцятої"]
      explanation: "Після прийменника 'на' використовується знахідний відмінок."
    - sentence: "Конференція розпочнеться _____ десятій ранку."
      answer: "о"
      options: ["о", "об", "в", "на"]
      explanation: "Для вказівки точного часу події використовуємо прийменник 'о'."
    - sentence: "Ми маємо подати звіт до двадцять _____ листопада."
      answer: "п'ятого"
      options: ["п'ятого", "п'яте", "п'ятому", "п'ятий"]
      explanation: "Прийменник 'до' вимагає родового відмінка."
    - sentence: "Обідня перерва триватиме _____ однієї години."
      answer: "протягом"
      options: ["протягом", "на протязі", "за", "біля"]
      explanation: "Для позначення тривалості правильно використовувати 'протягом'."
    - sentence: "Наш процес узгодження документів завершиться у дві тисячі двадцять _____ році."
      answer: "сьомому"
      options: ["сьомому", "сьомий", "сьомого", "сьома"]
      explanation: "У роках відмінюється лише останнє слово (місцевий відмінок)."
    - sentence: "Новий термін постачання — _____ квітня."
      answer: "перше"
      options: ["перше", "першого", "першому", "перший"]
      explanation: "Констатація дати (що це є?) вимагає називного відмінка."
    - sentence: "Вантажівка прибуде на склад за чверть _____."
      answer: "восьма"
      options: ["восьма", "восьму", "восьмої", "восьмій"]
      explanation: "Після прийменника 'за' (коли залишається час до повної години) використовуємо називний відмінок."
    - sentence: "Дослідження ринку тривало _____ п'яти місяців."
      answer: "близько"
      options: ["близько", "біля", "коло", "приблизно"]
      explanation: "'Близько' використовується з родовим відмінком для приблизної кількості."
    - sentence: "Сьогодні на календарі двадцять _____ жовтня."
      answer: "друге"
      options: ["друге", "другого", "другому", "другий"]
      explanation: "Констатація факту (називний відмінок)."
    - sentence: "Лекція про ефективний метод управління закінчилася о вісімнадцятій _____."
      answer: "тридцять"
      options: ["тридцять", "тридцятій", "тридцятої", "тридцяту"]
      explanation: "В офіційному форматі хвилини позначаються кількісним числівником."

- type: quiz
  title: "Граматичний тест: Відмінювання та час"
  items:
    - question: "Яке запитання ви поставите колезі, щоб дізнатися поточний час?"
      options:
        - text: "Котра година?"
          correct: true
        - text: "Скільки годин?"
          correct: false
        - text: "Скільки зараз годин?"
          correct: false
        - text: "Котрий час?"
          correct: false
      explanation: "Правильно запитувати 'Котра година?', оскільки година — це порядкове поняття на циферблаті."
    - question: "Як правильно сказати українською мовою час 13:45?"
      options:
        - text: "За чверть друга."
          correct: true
        - text: "Без п'ятнадцяти два."
          correct: false
        - text: "За п'ятнадцять другу."
          correct: false
        - text: "Без чверті друга."
          correct: false
      explanation: "Нормативна конструкція — 'за' + кількість хвилин (називний відмінок) + година (називний відмінок)."
    - question: "Оберіть правильний варіант відповіді на запитання 'Коли ти народився?'."
      options:
        - text: "Двадцять п'ятого травня."
          correct: true
        - text: "Двадцять п'яте травня."
          correct: false
        - text: "Двадцять п'ятого травень."
          correct: false
        - text: "Двадцять п'яте травня місяця."
          correct: false
      explanation: "Для вказівки на час події (коли?) використовується родовий відмінок числівника і родовий відмінок місяця."
    - question: "Яка форма складеного порядкового числівника є правильною для позначення року?"
      options:
        - text: "У тисяча дев'ятсот дев'яносто першому році."
          correct: true
        - text: "У тисячі дев'ятсот дев'яносто першому році."
          correct: false
        - text: "У тисячу дев'ятисотому дев'яносто першому році."
          correct: false
        - text: "У тисяча дев'ятсот дев'яносто перший рік."
          correct: false
      explanation: "У роках відмінюється лише останнє слово."
    - question: "Що означає слово 'термін' у діловому та юридичному контексті?"
      options:
        - text: "Кінцева календарна дата або точний час завершення дії."
          correct: true
        - text: "Відрізок часу, протягом якого триває процес."
          correct: false
        - text: "Кількість витрачених на роботу годин."
          correct: false
        - text: "Тривалість відпустки співробітника."
          correct: false
      explanation: "'Термін' позначає конкретну точку у часі (дедлайн), тоді як тривалість — це 'строк'."
    - question: "Який прийменник слід використати для позначення часу 10:20 згідно зі стандартом?"
      options:
        - text: "Двадцять хвилин на одинадцяту."
          correct: true
        - text: "Двадцять хвилин після десятої."
          correct: false
        - text: "Двадцять хвилин в одинадцятій."
          correct: false
        - text: "Одинадцята година двадцять хвилин."
          correct: false
      explanation: "Для першої половини години використовуємо прийменник 'на' (на кого/що) або 'по' (по кому/чому)."
    - question: "Яке слово доречно використати для опису відрізка часу з 1 до 10 жовтня?"
      options:
        - text: "Строк дії договору."
          correct: true
        - text: "Термін дії договору."
          correct: false
        - text: "Поняття дії договору."
          correct: false
        - text: "Метод дії договору."
          correct: false
      explanation: "Період тривалості називається строком."
    - question: "Як правильно сказати про час прибуття поїзда в офіційному повідомленні?"
      options:
        - text: "Поїзд прибуває о сімнадцятій сорок."
          correct: true
        - text: "Поїзд прибуває за двадцять шоста."
          correct: false
        - text: "Поїзд прибуває о пів на шосту."
          correct: false
        - text: "Поїзд прибуває без двадцяти шість."
          correct: false
      explanation: "В офіційному регістрі використовується 24-годинний формат без прийменників для хвилин."
    - question: "О котрій годині ми зустрінемося, якщо на годиннику 12:30?"
      options:
        - text: "О пів на першу."
          correct: true
        - text: "В половині першої."
          correct: false
        - text: "В дванадцять тридцять."
          correct: false
        - text: "Пів першої."
          correct: false
      explanation: "Нормативна конструкція — 'о пів на' + знахідний відмінок."
    - question: "Який із цих варіантів є русизмом при позначенні часу 09:50?"
      options:
        - text: "Без десяти десять."
          correct: true
        - text: "За десять десята."
          correct: false
        - text: "Десять хвилин до десятої."
          correct: false
        - text: "О дев'ятій п'ятдесят."
          correct: false
      explanation: "'Без десяти десять' є типовою калькою з російської мови."

- type: unjumble
  title: "Побудова ділових речень"
  items:
    - words: ["дослідження", "показують", "що", "найкращий", "час", "для", "зустрічі", "це", "одинадцята", "година"]
      answer: "Дослідження показують що найкращий час для зустрічі це одинадцята година"
    - words: ["ми", "повинні", "завершити", "цей", "складний", "процес", "до", "двадцять", "другого", "жовтня"]
      answer: "Ми повинні завершити цей складний процес до двадцять другого жовтня"
    - words: ["зверніть", "увагу", "на", "кінцевий", "термін", "подачі", "документів", "першого", "вересня"]
      answer: "Зверніть увагу на кінцевий термін подачі документів першого вересня"
    - words: ["новий", "метод", "аналізу", "дозволяє", "значно", "скоротити", "строк", "виконання", "завдання"]
      answer: "Новий метод аналізу дозволяє значно скоротити строк виконання завдання"
    - words: ["поїзд", "до", "києва", "відправляється", "о", "дев'ятнадцятій", "годині", "сорок", "п'ять", "хвилин"]
      answer: "Поїзд до Києва відправляється о дев'ятнадцятій годині сорок п'ять хвилин"
    - words: ["цей", "синтез", "даних", "був", "опублікований", "у", "дві", "тисячі", "двадцять", "першому", "році"]
      answer: "Цей синтез даних був опублікований у дві тисячі двадцять першому році"
    - words: ["наша", "команда", "буде", "працювати", "над", "проектом", "з", "п'ятого", "до", "десятого", "травня"]
      answer: "Наша команда буде працювати над проектом з п'ятого до десятого травня"
    - words: ["важливо", "чітко", "розмежовувати", "поняття", "терміну", "та", "строку", "в", "офіційних", "договорах"]
      answer: "Важливо чітко розмежовувати поняття терміну та строку в офіційних договорах"

- type: error-correction
  title: "Редагування: Час і дати"
  items:
    - sentence: "Я прийду на зустріч в дві години."
      error: "в дві"
      answer: "о другій"
      error_type: "phrase"
      options: ["о другій", "у дві", "біля двох", "на другу"]
      explanation: "В українській мові для позначення часу використовується прийменник 'о/об' та порядковий числівник."
    - sentence: "Мій автобус рушає без двадцяти дев'ять."
      error: "без двадцяти дев'ять"
      answer: "за двадцять дев'ята"
      error_type: "phrase"
      options: ["за двадцять дев'ята", "без двадцяти дев'ять", "двадцять до дев'яти", "дев'ята без двадцять"]
      explanation: "Конструкція 'без' — це русизм. Використовуйте прийменник 'за'."
    - sentence: "Я народився п'яте лютого."
      error: "п'яте"
      answer: "п'ятого"
      options: ["п'ятого", "п'ятій", "п'ятому", "п'ята"]
      explanation: "Для відповіді на запитання 'коли?' використовуємо родовий відмінок."
    - sentence: "Термін дії цього договору становить три роки."
      error: "Термін"
      answer: "Строк"
      options: ["Строк", "Час", "Період", "Ліміт"]
      explanation: "Проміжок часу називається строком, а термін — це кінцева дата."
    - sentence: "Скільки зараз годин?"
      error: "Скільки зараз годин"
      answer: "Котра година"
      error_type: "phrase"
      options: ["Котра година", "Скільки часу", "Яка година", "Який час"]
      explanation: "Для того, щоб дізнатися поточний час, використовується питання 'Котра година?'."
    - sentence: "Цей процес почався у двох тисячах двадцятому році."
      error: "двох тисячах"
      answer: "дві тисячі"
      error_type: "phrase"
      options: ["дві тисячі", "двох тисячах", "двом тисячам", "двома тисячами"]
      explanation: "У складених порядкових числівниках, що позначають рік, змінюється лише останнє слово."
    - sentence: "Всякому овочеві свій строк."
      error: "строк"
      answer: "час"
      options: ["час", "період", "термін", "місяць"]
      explanation: "У сталому прислів'ї використовується слово 'час'."
    - sentence: "Він завершив дослідження на протязі трьох тижнів."
      error: "на протязі"
      answer: "протягом"
      error_type: "phrase"
      options: ["протягом", "на протязі", "за час", "через"]
      explanation: "'На протязі' означає перебування на холодному вітрі. Про час кажемо 'протягом'."

