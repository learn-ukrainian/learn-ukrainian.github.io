- type: cloze
  title: "Заповніть пропуски: Розклад"
  passage: "Шановні колеги! Зверніть увагу на оновлений {{1}}. Наш {{2}} доставки товарів зазнав змін. З {{3}} листопада вантажівки прибуватимуть на склад о {{4}} тридцять. Кінцевий {{5}} подачі документів — до {{6}} години щодня. Відвантаження триватиме {{7}} чотирьох годин. Якщо виникають питання, звертайтеся до керівника. {{8}} показує, що новий {{9}} роботи значно підвищить ефективність. Цей {{10}} узгоджено з керівництвом. {{11}} дії нових правил становить шість {{12}}. З {{13}} грудня ми також запровадимо додатковий {{14}} перевірки якості. Кожне нове {{15}} вимагає часу на адаптацію, але {{16}} результатів буде позитивним."
  blanks:
    - id: 1
      answer: "графік"
      options: ["графік", "термін", "шлях", "процес"]
    - id: 2
      answer: "процес"
      options: ["процес", "синтез", "аналіз", "метод"]
    - id: 3
      answer: "першого"
      options: ["першого", "перше", "перший", "першому"]
    - id: 4
