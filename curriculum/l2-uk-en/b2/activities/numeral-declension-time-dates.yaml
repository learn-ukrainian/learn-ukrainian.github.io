- type: essay-response
  title: "Офіційний лист: Графік поставок"
  prompt: "Уявіть, що ви менеджер з логістики. Напишіть офіційний лист партнерам, у якому повідомте про зміну строків доставки та встановіть нові терміни подачі документів. Використовуйте 24-годинний формат часу, слова 'термін', 'строк', 'процес' та правильно відмінюйте дати. Обсяг: не менше 150 слів."
  min_words: 150
  model_answer: "Шановні партнери! Доводимо до вашого відома, що процес логістики у нашій компанії було оптимізовано. Аналіз попередніх місяців показав необхідність зміни графіків. З першого вересня строк доставки товарів складатиме від двох до чотирьох днів. Вантажівки відправлятимуться зі складу щодня о вісімнадцятій тридцять. Кінцевий термін подачі заявок на відвантаження переноситься на п'ятнадцяту нуль-нуль поточного дня. Просимо врахувати ці зміни у вашому плануванні. Цей метод дозволить нам гарантувати вчасне виконання всіх зобов'язань. Якщо у вас виникнуть запитання щодо нового розкладу, звертайтеся до нашого відділу підтримки. Дякуємо за співпрацю."
  rubric:
    - criteria: "Використання лексики"
      description: "Правильне використання слів 'термін', 'строк', 'процес', 'аналіз', 'метод'."
      points: 5
    - criteria: "Граматика часу і дат"
      description: "Безпомилкове використання 24-годинного формату та родового відмінка для дат (наприклад, 'першого вересня')."
      points: 5