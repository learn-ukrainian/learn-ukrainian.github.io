- type: essay-response
  title: 'Письмова практика: системний аналіз проблеми'
  instruction: Напишіть коротке професійне есе на задану тему.
  prompt: Опишіть складний процес або проект, над яким ви працювали (або уявний проект).
    Використайте щонайменше 3 слова з цільової лексики (процес, метод, термін, дослідження,
    аналіз, синтез), 2 органічні ідіоми та 1 прислів'я. Продемонструйте вміння використовувати
    складнопідрядні речення.
  min_words: 150
  model_answer: 'Під час розробки нового програмного забезпечення наша команда зіткнулася
    з серйозними викликами. Цей інноваційний процес вимагав від нас максимальної концентрації,
    тому ми працювали не покладаючи рук протягом кількох місяців. Оскільки старий
    підхід більше не працював, ми вирішили застосувати новий дедуктивний метод. Наш
    глибокий системний аналіз виявив кілька критичних помилок в архітектурі. Незважаючи
    на те що керівництво вимагало швидких результатів, ми наполягали на додатковому
    часі, адже всі знають: сім раз відмір, а один відріж. Зрештою, ми змогли знайти
    спільну мову з усіма зацікавленими сторонами та здійснили успішний синтез нових
    компонентів. Це дослідження не лише вирішило поточну проблему, але й допомогло
    нам інтегрувати новий важливий термін у наш щоденний професійний словник.'
  rubric:
    - criteria: Лексичне багатство
      description: Правильно використано цільову лексику (абстрактні поняття), ідіоми
        та прислів'я.
      points: 40
    - criteria: Синтаксична складність
      description: Наявні правильно побудовані складнопідрядні речення (умови, причини,
        допусту).
      points: 30
    - criteria: Граматична правильність
      description: Відсутність кальок, правильне узгодження дієприслівникових зворотів.
      points: 30
