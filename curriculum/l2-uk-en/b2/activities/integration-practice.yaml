- type: reading
  title: 'Первинне джерело: Звіт системного аналітика'
  text: У процесі нашого останнього дослідження ми виявили серйозні недоліки в архітектурі
    бази даних. Хоча попередній аналіз показував стабільну роботу, дедуктивний метод
    виявив приховані баги. Нам доведеться працювати не покладаючи рук, щоб здійснити
    необхідний синтез нових компонентів. Якщо ми не знайдемо спільну мову з розробниками,
    цей складний процес може зупинитися. Зрештою, ми маємо чітко визначити кожне поняття,
    щоб уникнути подальшої плутанини.
  tasks:
    - Який метод допоміг виявити приховані баги?
    - Які ідіоми використав автор у своєму звіті?
    - Як автор описує взаємодію з розробниками?
    - Що необхідно зробити, щоб уникнути плутанини?
- type: true-false
  title: Правильно чи неправильно
  instruction: Визначте, чи відповідають твердження правилам системного аналізу мови.
  items:
    - statement: Слово 'пріоритет' можна використовувати разом зі словом 'головний'.
      correct: false
      explanation: Слово 'пріоритет' уже означає найголовніше завдання, тому це плеоназм.
    - statement: В українській мові правильно говорити 'брати участь', а не 'приймати
        участь'.
      correct: true
      explanation: Конструкція 'приймати участь' — це типова російська калька.
    - statement: У дієприслівниковому звороті додаткова і основна дії повинні виконуватися
        різними об'єктами.
      correct: false
      explanation: Дії повинні обов'язково виконуватися одним і тим самим суб'єктом.
    - statement: Синтез — це процес поєднання розрізнених елементів у єдине ціле.
      correct: true
      explanation: Саме так визначається термін 'синтез'.
    - statement: Використання ідіом робить професійний текст абсолютно неприйнятним.
      correct: false
      explanation: Органічні ідіоми додають тексту експресивності та переконливості,
        якщо вжиті доречно.
    - statement: Складнопідрядні речення причини пояснюють, чому відбувається певна
        дія.
      correct: true
      explanation: Такі речення найчастіше використовують сполучники 'бо', 'тому що',
        'оскільки'.
    - statement: Антоніми — це слова, що мають дуже близьке або тотожне лексичне значення.
      correct: false
      explanation: Це визначення синонімів. Антоніми мають протилежне значення.
    - statement: Епітет — це художнє означення, яке підкреслює характерну рису предмета.
      correct: true
      explanation: Епітети надають висловлюванню сильного емоційного забарвлення.
    - statement: Метафора завжди базується виключно на прямому, буквальному значенні
        слів.
      correct: false
      explanation: Метафора — це перенесене значення на основі схожості явищ.
    - statement: Тавтологія виникає, коли поруч вживаються спільнокореневі слова.
      correct: true
      explanation: Наприклад, 'розповісти розповідь' — це класична тавтологія.
- type: quiz
  title: 'Перевірка знань: лексика та синтаксис'
  instruction: Оберіть одну правильну відповідь на кожне запитання.
  items:
    - question: Яке з цих словосполучень є правильною українською формою без кальок?
      options:
        - text: брати участь у дискусії
          correct: true
        - text: приймати участь у дискусії
          correct: false
        - text: одержувати участь у дискусії
          correct: false
        - text: отримувати участь у дискусії
          correct: false
      explanation: Дієслово 'приймати' не вживається зі словом 'участь'.
    - question: Яке слово є правильним синонімом до російської кальки 'в кінці кінців'?
      options:
        - text: зрештою
          correct: true
        - text: у фіналі фіналів
          correct: false
        - text: на кінці кінців
          correct: false
        - text: у результаті результатів
          correct: false
      explanation: Українською правильно говорити 'зрештою' або 'врешті-решт'.
    - question: Що саме означає поширена ідіома 'працювати не покладаючи рук'?
      options:
        - text: працювати дуже інтенсивно та наполегливо
          correct: true
        - text: працювати без використання рук
          correct: false
        - text: працювати повільно та обережно
          correct: false
        - text: працювати з опущеними руками
          correct: false
      explanation: Цей сталий вислів означає важку, безперервну працю.
    - question: Яке з цих речень є класичним прикладом допустового складнопідрядного
        речення?
      options:
        - text: Хоча процес був складним, ми знайшли ефективне рішення.
          correct: true
        - text: Якщо процес буде складним, ми знайдемо інше рішення.
          correct: false
        - text: Ми знайшли рішення, бо процес був не дуже складним.
          correct: false
        - text: Коли ми почали процес, з'явилося багато нових проблем.
          correct: false
      explanation: Сполучник 'хоча' вказує на допустове відношення у реченні.
    - question: У якому реченні допущено типову помилку у вживанні дієприслівникового
        звороту?
      options:
        - text: Проводячи дослідження, команді стало зрозуміло, де помилка.
          correct: true
        - text: Проводячи дослідження, команда знайшла вирішення проблеми.
          correct: false
        - text: Коли команда проводила дослідження, стало зрозуміло, де помилка.
          correct: false
        - text: Досліджуючи це поняття, ми зробили дуже важливе відкриття.
          correct: false
      explanation: Дію у звороті та головному реченні повинен виконувати один і той
        самий підмет.
    - question: Який стилістичний засіб використано у словосполученні 'глибока зима
        в економіці'?
      options:
        - text: метафора
          correct: true
        - text: антонім
          correct: false
        - text: синонім
          correct: false
        - text: тавтологія
          correct: false
      explanation: Це перенесення властивостей пір року на складні економічні процеси.
    - question: Яке з цих понять означає розкладання складного об'єкта на складові
        частини?
      options:
        - text: аналіз
          correct: true
        - text: синтез
          correct: false
        - text: епітет
          correct: false
        - text: плеоназм
          correct: false
      explanation: Аналіз — це процес розкладання цілого на окремі частини для дослідження.
    - question: Яка з наведених пар є типовим прикладом антонімів у науковому тексті?
      options:
        - text: теорія та практика
          correct: true
        - text: дослідження та аналіз
          correct: false
        - text: термін та поняття
          correct: false
        - text: метод та підхід
          correct: false
      explanation: Теорія і практика протиставляються одна одній як антонімічні поняття.
    - question: Як правильно сказати про наступний день українською мовою без вживання
        русизмів?
      options:
        - text: наступний день
          correct: true
        - text: слідуючий день
          correct: false
        - text: ідучий день
          correct: false
        - text: послідовний день
          correct: false
      explanation: Слово 'слідуючий' є прямою калькою з російської мови.
    - question: Яке з цих слів є яскравим епітетом, що додає висловлюванню емоційного
        забарвлення?
      options:
        - text: блискучий
          correct: true
        - text: науковий
          correct: false
        - text: економічний
          correct: false
        - text: структурний
          correct: false
      explanation: '''Блискучий'' містить авторську оцінку і створює яскравий художній
        образ.'
- type: select
  title: 'Множинний вибір: стилістика та граматика'
  instruction: Оберіть усі правильні варіанти для кожного запитання.
  items:
    - question: Які з цих виразів містять плеоназм (надмірність)?
      min_correct: 2
      options:
        - text: у травні місяці
          correct: true
        - text: головний пріоритет
          correct: true
        - text: наукове дослідження
          correct: false
        - text: системний аналіз
          correct: false
      explanation: Місяць і пріоритет уже містять у собі ці зайві уточнення за визначенням.
    - question: Які слова є правильними синонімами до дієслова 'розуміти' в офіційному
        тексті?
      min_correct: 2
      options:
        - text: усвідомлювати
          correct: true
        - text: осягати
          correct: true
        - text: допетрати
          correct: false
        - text: кумекати
          correct: false
      explanation: '''Усвідомлювати'' та ''осягати'' належать до офіційно-ділового
        та наукового стилів.'
    - question: Які з цих сполучників використовуються для складнопідрядних речень
        причини?
      min_correct: 3
      options:
        - text: оскільки
          correct: true
        - text: через те що
          correct: true
        - text: тому що
          correct: true
        - text: незважаючи на те що
          correct: false
      explanation: Останній сполучник вказує на допуст, а не на причину дії.
    - question: Які ідіоми означають 'інтенсивно працювати' або 'докладати великих
        зусиль'?
      min_correct: 2
      options:
        - text: не покладаючи рук
          correct: true
        - text: звернути гори
          correct: true
        - text: товкти воду в ступі
          correct: false
        - text: бити байдики
          correct: false
      explanation: Перші дві ідіоми підкреслюють важку та наполегливу працю команди.
    - question: Які фрази є російськими кальками, яких слід уникати у професійному
        мовленні?
      min_correct: 3
      options:
        - text: приймати участь
          correct: true
        - text: слідуюче питання
          correct: true
        - text: в кінці кінців
          correct: true
        - text: брати участь
          correct: false
        - text: наступного дня
          correct: false
      explanation: Перші три фрази є прямим та помилковим перекладом з російської
        мови.
    - question: Які з цих слів є професійними термінами абстрактної семантики?
      min_correct: 3
      options:
        - text: концепція
          correct: true
        - text: процес
          correct: true
        - text: метод
          correct: true
        - text: стілець
          correct: false
        - text: книга
          correct: false
      explanation: Стілець і книга — це конкретні предмети, а не абстрактні наукові
        терміни.
    - question: Які з цих прислів'їв використовуються для підкреслення цінності наполегливої
        праці та обережного підходу?
      min_correct: 2
      options:
        - text: Сім раз відмір, а один відріж.
          correct: true
        - text: Без труда нема плода.
          correct: true
        - text: Що посієш, те й пожнеш.
          correct: false
        - text: Слово до слова — зложиться мова.
          correct: false
      explanation: Обидва ці прислів'я підкреслюють важливість обережності та важкої
        праці.
    - question: Які з перелічених понять безпосередньо пов'язані зі складнопідрядним
        реченням?
      min_correct: 3
      options:
        - text: головна частина
          correct: true
        - text: підрядна частина
          correct: true
        - text: сполучне слово
          correct: true
        - text: тавтологія
          correct: false
        - text: епітет
          correct: false
      explanation: Складнопідрядне речення складається з головної і підрядної частин,
        з'єднаних сполучниками.
- type: error-correction
  title: 'Лабораторія відлагодження: виправлення багів'
  instruction: Оберіть правильний варіант для заміни помилкового слова або виразу
    у реченні.
  items:
    - sentence: Всі студенти повинні обов'язково приймати участь у цьому масштабному
        дослідженні.
      error: приймати
      answer: брати
      error_type: word
      options:
        - брати
        - робити
        - мати
        - віддавати
      explanation: Правильна нормативна конструкція українською мовою — 'брати участь'.
    - sentence: Ми детально обговоримо цю складну проблему на нашій слідуючій зустрічі.
      error: слідуючій
      answer: наступній
      error_type: word
      options:
        - наступній
        - послідовній
        - ідучій
        - крокуючій
      explanation: Слово 'слідуючий' — це калька, правильно говорити 'наступний'.
    - sentence: В кінці кінців ми знайшли справді правильний метод для цього аналізу.
      error: В кінці кінців
      answer: Зрештою
      error_type: phrase
      options:
        - Зрештою
        - У фіналі
        - Наприкінці
        - Після всього
      explanation: Вислів 'в кінці кінців' є калькою, нормативний варіант — 'зрештою'
        або 'врешті-решт'.
    - sentence: Цей інноваційний проект є наш самий головний пріоритет на сьогодні.
      error: самий головний
      answer: найголовніший
      error_type: phrase
      options:
        - найголовніший
        - дуже головний
        - більш головний
        - абсолютно головний
      explanation: В українській мові найвищий ступінь порівняння утворюється за допомогою
        префікса 'най-'.
    - sentence: Уважно читаючи цікаву статтю, мені несподівано спала на думку нова
        ідея.
      error: мені несподівано спала на думку нова ідея
      answer: я несподівано придумав нову ідею
      error_type: construction
      options:
        - я несподівано придумав нову ідею
        - мене відвідала нова ідея
        - для мене з'явилася ідея
        - ідея прийшла до мене
      explanation: Дію в дієприслівниковому звороті та головному реченні повинен виконувати
        один підмет ('я читав' і 'я придумав').
    - sentence: Команда розробила новий метод, котрий дозволить значно оптимізувати
        процес.
      error: котрий
      answer: який
      error_type: word
      options:
        - який
        - що
        - чий
        - куди
      explanation: У такому контексті стилістично краще і природніше вживати сполучне
        слово 'який'.
    - sentence: Охорона оточуючого середовища є надзвичайно важливою глобальною проблемою.
      error: оточуючого середовища
      answer: довкілля
      error_type: phrase
      options:
        - довкілля
        - природного кола
        - навколишніх людей
        - зовнішнього світу
      explanation: Термін 'оточуюче середовище' — це калька, український відповідник
        — 'довкілля'.
    - sentence: Директор негайно прийняв міри для того, щоб вирішити цю гостру кризу.
      error: прийняв міри
      answer: вжив заходів
      error_type: phrase
      options:
        - вжив заходів
        - взяв мірки
        - зробив кроки
        - ухвалив дії
      explanation: Правильний сталий діловий вираз українською — 'вживати заходів'.
- type: unjumble
  title: Синтаксичний синтез
  instruction: Складіть слова в правильному порядку, щоб утворити складнопідрядні
    речення.
  items:
    - words:
        - цей
        - процес
        - вимагає
        - часу
        - оскільки
        - наш
        - метод
        - абсолютно
        - новий
      answer: Цей процес вимагає часу оскільки наш метод абсолютно новий
    - words:
        - якщо
        - ми
        - здійснимо
        - системний
        - аналіз
        - результат
        - перевершить
        - наші
        - очікування
      answer: Якщо ми здійснимо системний аналіз результат перевершить наші очікування
    - words:
        - хоча
        - базове
        - поняття
        - складне
        - ми
        - швидко
        - знайшли
        - спільну
        - мову
      answer: Хоча базове поняття складне ми швидко знайшли спільну мову
    - words:
        - дослідження
        - доводить
        - що
        - цей
        - термін
        - використовується
        - дуже
        - часто
      answer: Дослідження доводить що цей термін використовується дуже часто
    - words:
        - команда
        - працювала
        - не
        - покладаючи
        - рук
        - щоб
        - успішно
        - завершити
        - проект
      answer: Команда працювала не покладаючи рук щоб успішно завершити проект
    - words:
        - коли
        - команда
        - зрозуміла
        - суть
        - проблеми
        - вдалося
        - здійснити
        - синтез
        - даних
      answer: Коли команда зрозуміла суть проблеми вдалося здійснити синтез даних
    - words:
        - хоча
        - наш
        - шлях
        - був
        - складним
        - ми
        - не
        - опускали
        - рук
      answer: Хоча наш шлях був складним ми не опускали рук
    - words:
        - аналітики
        - добре
        - усвідомлюють
        - наскільки
        - важливо
        - визначити
        - поняття
        - перед
        - роботою
      answer: Аналітики добре усвідомлюють наскільки важливо визначити поняття перед
        роботою
- type: fill-in
  title: Заповніть пропуски відповідною лексикою
  instruction: Оберіть слово, яке найкраще доповнює зміст речення.
  items:
    - sentence: Кожен науковий _ має бути чітко визначеним перед початком дискусії.
      answer: термін
      options:
        - термін
        - процес
        - метод
        - аналіз
      explanation: Термін потребує чіткого визначення в науковому або професійному
        дискурсі.
    - sentence: Він здійснив блискучий _ розрізнених теорій та запропонував нове рішення.
      answer: синтез
      options:
        - синтез
        - метод
        - процес
        - поняття
      explanation: Синтез — це об'єднання розрізнених ідей чи частин у єдине ціле.
    - sentence: Наша професійна команда вирішила брати активну _ у цьому важливому
        проекті.
      answer: участь
      options:
        - участь
        - роботу
        - працю
        - дію
      explanation: Правильний український сталий вираз звучить як 'брати участь'.
    - sentence: Цей вкрай складний _ вимагає багато часу та неабиякого терпіння від
        усіх учасників.
      answer: процес
      options:
        - процес
        - термін
        - епітет
        - баг
      explanation: Процес має значну тривалість і може бути складним для виконання.
    - sentence: Щоб швидко знайти першопричину цієї помилки, ми успішно застосували
        дедуктивний _.
      answer: метод
      options:
        - метод
        - процес
        - синтез
        - плеоназм
      explanation: Дедуктивний метод — це відомий спосіб логічного дослідження.
    - sentence: Вони працювали не покладаючи _, щоб завершити своє завдання вчасно.
      answer: рук
      options:
        - рук
        - ніг
        - голів
        - очей
      explanation: Ідіома 'не покладаючи рук' означає надзвичайно інтенсивну працю.
    - sentence: Наше глибоке _ переконливо доводить, що попередні висновки були абсолютно
        хибними.
      answer: дослідження
      options:
        - дослідження
        - поняття
        - тавтологія
        - метафора
      explanation: Дослідження систематично використовується для пошуку доказів і
        фактів.
    - sentence: Це цікаве філософське _ дуже важко одразу пояснити простими словами.
      answer: поняття
      options:
        - поняття
        - дослідження
        - відлагодження
        - участь
      explanation: Поняття — це складна абстрактна ідея, яку потрібно детально пояснювати.
    - sentence: Використання кальок та русизмів — це серйозний лексичний _ у вашому
        професійному мовленні.
      answer: баг
      options:
        - баг
        - метод
        - синтез
        - термін
      explanation: Слово 'баг' тут вдало використовується як метафора для мовної помилки.
    - sentence: Ми успішно завершили _ всіх складних систем і тепер повністю готові
        до запуску.
      answer: відлагодження
      options:
        - відлагодження
        - поняття
        - кальку
        - метафору
      explanation: Відлагодження — це кропіткий процес усунення помилок у системі.
