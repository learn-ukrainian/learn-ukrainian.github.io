- type: reading
  id: reading-1
  title: 'Первинне джерело: Філософія здоров`я Миколи Амосова'
  source: 'Микола Амосов, Роздуми про здоров`я'
  text: |
    Лікарі лікують хвороби, а здоров'я треба здобувати самому. Здобувати шляхом тренування. Тому що здоров'я — це резервні потужності органів, усієї нашої фізіології. Медицина може врятувати вас лише у критичний момент. Талановитий хірург може філігранно вирізати небезпечну пухлину, а хімічна таблетка може тимчасово збити критично високу температуру. Але жоден лікар не зробить вас по-справжньому здоровою людиною, якщо ви ведете пасивний спосіб життя і постійно переїдаєте. Система обмежень і навантажень — це єдиний шлях до міцного організму.
  tasks:
    - 'У чому полягає головна відмінність між роллю лікаря та роллю пацієнта за Амосовим?'
    - 'Що саме видатний хірург розуміє під словом «здоров`я»?'
    - 'Які два головні інструменти (системи) пропонує Амосов для збереження здоров`я?'

- type: reading
  id: reading-2
  title: 'Інструкція до препарату: антибіотик широкого спектру дії'
  source: 'Типова фармацевтична анотація'
  text: |
    Амоксицилін — антибіотик групи пеніцилінів. Показання до застосування: інфекції дихальних шляхів, інфекції сечовивідних шляхів, інфекції шкіри. Спосіб застосування: приймати всередину, незалежно від прийому їжі. Добова доза для дорослих становить 750 мг — 1500 мг, розподілена на три рівні прийоми кожні вісім годин. Курс лікування зазвичай складає від п'яти до десяти днів. Не припиняйте прийом препарату достроково, навіть якщо симптоми зникли. Побічні ефекти: можливі алергічні реакції (висип, свербіж), нудота, діарея. При появі тяжких побічних ефектів негайно зверніться до лікаря. Протипоказання: алергія на пеніциліни та цефалоспорини. Зберігати при температурі не вище 25 °C. Зберігати у місцях, недоступних для дітей. Рецептурний препарат.
  tasks:
    - 'Яка максимальна добова доза цього антибіотика для дорослих?'
    - 'Чому не можна припиняти прийом антибіотика, навіть коли симптоми зникли?'
    - 'Які побічні ефекти може спричинити цей препарат?'

- type: reading
  id: reading-3
  title: 'Повідомлення з системи Helsi.me: запис на прийом'
  source: 'Інтерфейс медичної інформаційної системи'
  text: |
    Шановний пацієнте! Ваш запис на прийом підтверджено. Сімейний лікар: Коваленко Оксана Петрівна. Дата та час: 15 березня 2026 року, 10:30. Адреса: Київська міська поліклініка № 7, вул. Богдана Хмельницького, 24, кабінет 305. Будь ласка, візьміть із собою паспорт або ID-картку та результати попередніх аналізів (за наявності). Якщо ви не зможете прийти, просимо скасувати запис не пізніше ніж за дві години до призначеного часу. Для скасування відкрийте додаток Helsi та оберіть розділ «Мої візити». Нагадуємо, що ваша електронна декларація з лікарем Коваленко О. П. діє до 31 грудня 2026 року. Бажаємо вам доброго здоров'я!
  tasks:
    - 'Які документи потрібно взяти із собою на прийом до лікаря?'
    - 'Що потрібно зробити, якщо ви не можете прийти на призначений час?'
    - 'Що означає електронна декларація в контексті системи Helsi.me?'

- type: reading
  id: reading-4
  title: 'Медична виписка зі стаціонару'
  source: 'Типовий документ міської клінічної лікарні'
  text: |
    Виписка зі стаціонару. Пацієнт: Бондаренко Андрій Вікторович, 1985 р. н. Відділення: терапевтичне. Дата госпіталізації: 02.03.2026. Дата виписки: 09.03.2026. Діагноз: гостра двостороння пневмонія середнього ступеня тяжкості. Лікування: антибактеріальна терапія (амоксицилін 1500 мг на добу протягом семи днів), муколітичні засоби, постільний режим. Стан при виписці: задовільний, температура тіла нормалізувалася, дані рентгенографії без патологічних змін. Рекомендації: уникати фізичних навантажень протягом двох тижнів, продовжити приймати вітамін C, контрольний огляд у сімейного лікаря через десять днів, повторний загальний аналіз крові через чотирнадцять днів. Лікуючий лікар: Ткаченко М. О.
  tasks:
    - 'Скільки днів тривало стаціонарне лікування пацієнта Бондаренка?'
    - 'Які рекомендації отримав пацієнт щодо фізичної активності після виписки?'
    - 'Який контрольний візит призначено пацієнтові та через скільки днів?'

- type: essay-response
  title: 'Опис симптомів для візиту до лікаря'
  source_reading: 'reading-1'
  prompt: 'Уявіть, що ви записуєтесь до свого сімейного лікаря через додаток Helsi.me. Напишіть розгорнуте повідомлення про ваш стан, детально описавши свої скарги. Використовуйте правильну медичну термінологію для болю (пам`ятайте про чоловічий рід!), чітко вкажіть його характер, точну локалізацію та динаміку. Запитайте про можливі аналізи.'
  min_words: 150
  model_answer: 'Доброго дня, лікарю. Я вирішив записатися до вас на прийом, оскільки мої основні скарги — це сильний головний біль та загальна фізична слабкість, які турбують мене і тривають вже третій день поспіль. Цей біль має яскраво виражений пульсуючий характер, він зосереджений переважно у лівій скроні і завжди значно посилюється пізно ввечері. Я також періодично відчуваю неприємний тупий біль у ділянці шиї. Високої температури у мене зараз немає, але мій артеріальний тиск дещо підвищений порівняно з нормою. Я не приймав жодних серйозних рецептурних ліків самостійно, лише кілька разів пив звичайний парацетамол, але цей препарат зовсім не допомагає зняти гострий біль. Мені б дуже хотілося пройти ваш базовий медичний огляд і, можливо, отримати від вас електронне направлення на загальний аналіз крові, щоб ви могли підтвердити або поставити точний діагноз. Я дуже сподіваюся на вашу професійну консультацію та швидке ефективне лікування.'
  rubric:
    - criteria: 'Лексика'
      description: 'Використання правильної медичної термінології та розширених прикметників для опису болю.'
      points: 40
    - criteria: 'Граматика'
      description: 'Абсолютно правильне використання роду іменника «біль» (лише чоловічий рід).'
      points: 40
    - criteria: 'Обсяг'
      description: 'Текст містить не менше 150 слів та розкриває всі пункти завдання.'
      points: 20

