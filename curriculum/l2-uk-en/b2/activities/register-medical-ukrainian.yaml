- type: quiz
  title: 'Лексика медичного регістру'
  instruction: 'Оберіть одну правильну відповідь на кожне з наведених запитань щодо медичної термінології.'
  items:
    - question: 'Як правильно назвати стан пацієнта, коли він відчуває постійний дискомфорт, що не має чіткої локалізації та не є дуже гострим?'
      options:
        - text: 'тупий біль'
          correct: true
        - text: 'ріжучий біль'
          correct: false
        - text: 'пульсуючий біль'
          correct: false
        - text: 'розпираючий біль'
          correct: false
      explanation: 'Тупий біль — це фоновий дискомфорт без чіткої локалізації.'
    - question: 'Яке дієслово ми обов`язково повинні використовувати, коли говоримо про вживання будь-яких медичних препаратів або таблеток всередину?'
      options:
        - text: 'приймати ліки'
          correct: true
        - text: 'пити ліки'
          correct: false
        - text: 'їсти ліки'
          correct: false
        - text: 'брати ліки'
          correct: false
      explanation: 'В офіційній мові ліки завжди приймають, а не п`ють.'
    - question: 'Який офіційний медичний термін лікарі зазвичай використовують у документах для позначення звичайного сильного нежитю у пацієнта?'
      options:
        - text: 'гострий риніт'
          correct: true
        - text: 'вірусна застуда'
          correct: false
        - text: 'артеріальний тиск'
          correct: false
        - text: 'загальний аналіз'
          correct: false
      explanation: 'Медичний термін для сильного нежитю — це гострий риніт.'
    - question: 'Якщо вам потрібно пройти глибоке, комплексне дослідження організму з використанням спеціальної дорогої апаратури, як це правильно назвати?'
      options:
        - text: 'медичне обстеження'
          correct: true
        - text: 'візуальний огляд'
          correct: false
        - text: 'медичний огляд'
          correct: false
        - text: 'швидкий огляд'
          correct: false
      explanation: 'З апаратурою ми проходимо обстеження, а лікар проводить огляд.'
    - question: 'Який граматичний рід має іменник біль в українській літературній мові та як з ним правильно узгоджувати всі прикметники?'
      options:
        - text: 'виключно чоловічий рід'
          correct: true
        - text: 'виключно жіночий рід'
          correct: false
        - text: 'переважно середній рід'
          correct: false
        - text: 'може бути різним'
          correct: false
      explanation: 'Біль завжди чоловічого роду: сильний біль, мій біль.'
    - question: 'Якщо лікар після огляду вирішує, що вам потрібна вузькоспеціалізована консультація іншого фахівця, який електронний документ він створює?'
      options:
        - text: 'електронне направлення'
          correct: true
        - text: 'електронний рецепт'
          correct: false
        - text: 'лікарняний лист'
          correct: false
        - text: 'медичну виписку'
          correct: false
      explanation: 'До іншого лікаря виписують електронне направлення.'
    - question: 'Яке дієслово є зворотним і означає, що пацієнт сам проходить крізь процес терапії та не впливає на зовнішні об`єкти?'
      options:
        - text: 'лікуватися'
          correct: true
        - text: 'лікувати'
          correct: false
        - text: 'вилікувати'
          correct: false
        - text: 'полікувати'
          correct: false
      explanation: 'Дія повертається на самого суб`єкта через частку ся.'
    - question: 'Як називається офіційний електронний документ, який дає вам законне право не йти на роботу і підтверджує вашу тимчасову хворобу?'
      options:
        - text: 'лікарняний лист'
          correct: true
        - text: 'медична виписка'
          correct: false
        - text: 'історія хвороби'
          correct: false
        - text: 'медична картка'
          correct: false
      explanation: 'Це лікарняний лист або довідка про непрацездатність.'
    - question: 'Яке слово потрібно використовувати для позначення тієї великої частини лікарні, де лежать пацієнти та постійно проводяться медичні процедури?'
      options:
        - text: 'хірургічне відділення'
          correct: true
        - text: 'хірургічний відділ'
          correct: false
        - text: 'хірургічний офіс'
          correct: false
        - text: 'хірургічний кабінет'
          correct: false
      explanation: 'У лікарнях пацієнти перебувають у відділеннях.'
    - question: 'Як називається найголовніший показник вашого здоров`я, який медична сестра часто вимірює за допомогою тонометра під час візиту?'
      options:
        - text: 'артеріальний тиск'
          correct: true
        - text: 'температура тіла'
          correct: false
        - text: 'загальний аналіз'
          correct: false
        - text: 'рівень цукру'
          correct: false
      explanation: 'Тонометром вимірюють артеріальний тиск.'
    - question: 'Що означає медичний термін натщесерце, який часто зустрічається в інструкціях до препаратів?'
      options:
        - text: 'на порожній шлунок, до їжі'
          correct: true
        - text: 'після їжі, на повний шлунок'
          correct: false
        - text: 'разом із їжею під час обіду'
          correct: false
        - text: 'перед сном на ніч'
          correct: false
      explanation: 'Натщесерце означає на порожній шлунок, зазвичай за 30-40 хвилин до сніданку.'
    - question: 'Як правильно називається суворо визначена максимальна кількість препарату, яку безпечно прийняти за 24 години?'
      options:
        - text: 'добова доза'
          correct: true
        - text: 'разова порція'
          correct: false
        - text: 'курс лікування'
          correct: false
        - text: 'побічний ефект'
          correct: false
      explanation: 'Добова доза — це максимум ліків, який можна прийняти протягом однієї доби.'
    - question: 'Як називаються небажані негативні реакції організму на медичний препарат, як-от нудота чи запаморочення?'
      options:
        - text: 'побічні ефекти'
          correct: true
        - text: 'основні скарги'
          correct: false
        - text: 'клінічні показники'
          correct: false
        - text: 'добова доза'
          correct: false
      explanation: 'Побічні ефекти — це всі можливі негативні реакції на хімічний препарат.'
    - question: 'Який медичний термін означає історію захворювання пацієнта, зібрану з його власних слів під час опитування?'
      options:
        - text: 'анамнез'
          correct: true
        - text: 'діагноз'
          correct: false
        - text: 'виписка'
          correct: false
        - text: 'направлення'
          correct: false
      explanation: 'Анамнез — це історія хвороби, розказана словами пацієнта.'
    - question: 'Як називаються свідомі заходи, спрямовані на попередження захворювань та зміцнення здоров`я до появи будь-яких симптомів?'
      options:
        - text: 'профілактика захворювань'
          correct: true
        - text: 'курс лікування'
          correct: false
        - text: 'медичне обстеження'
          correct: false
        - text: 'госпіталізація пацієнта'
          correct: false
      explanation: 'Профілактика — це попередження хвороб через здоровий спосіб життя та вакцинацію.'

- type: fill-in
  title: 'Заповніть пропуски у медичних діалогах'
  instruction: 'Оберіть правильне слово для заповнення пропуску в кожному реченні.'
  items:
    - sentence: 'Доброго дня, лікарю, мої основні _____ — це постійний головний біль та слабкість.'
      answer: 'скарги'
      options:
        - 'скарги'
        - 'хвороби'
        - 'діагнози'
        - 'ліки'
    - sentence: 'Після обіду мене раптово потурбував нестерпний _____ біль у нижній частині живота.'
      answer: 'ріжучий'
      options:
        - 'ріжучий'
        - 'тупий'
        - 'ниючий'
        - 'легкий'
    - sentence: 'Щоб поставити точний _____, вам необхідно спочатку здати загальний аналіз крові.'
      answer: 'діагноз'
      options:
        - 'діагноз'
        - 'рецепт'
        - 'анамнез'
        - 'огляд'
    - sentence: 'Пам`ятайте, що цей антибіотик потрібно приймати виключно _____ рано вранці.'
      answer: 'натщесерце'
      options:
        - 'натщесерце'
        - 'швидко'
        - 'разом'
        - 'ввечері'
    - sentence: 'Після операції пацієнта перевели у хірургічне _____, де він перебуватиме тиждень.'
      answer: 'відділення'
      options:
        - 'відділення'
        - 'відділ'
        - 'кабінет'
        - 'офіс'
    - sentence: 'Лікар має виписати електронний _____, без якого ви не купите ці таблетки в аптеці.'
      answer: 'рецепт'
      options:
        - 'рецепт'
        - 'діагноз'
        - 'направлення'
        - 'лист'
    - sentence: 'Мій брат зараз дуже важко _____ від запалення легенів у міській клінічній лікарні.'
      answer: 'лікується'
      options:
        - 'лікується'
        - 'лікує'
        - 'хворіє'
        - 'видужує'
    - sentence: 'Я завжди намагаюся активно _____ участь у програмах медичної профілактики.'
      answer: 'брати'
      options:
        - 'брати'
        - 'приймати'
        - 'мати'
        - 'робити'
    - sentence: 'Сучасна українська медицина дозволяє швидко записатися на _____ через додаток Helsi.'
      answer: 'прийом'
      options:
        - 'прийом'
        - 'огляд'
        - 'аналіз'
        - 'обстеження'
    - sentence: 'Цей жахливий біль не є постійним, він накочується _____ кілька разів на день.'
      answer: 'нападами'
      options:
        - 'нападами'
        - 'епізодично'
        - 'постійно'
        - 'раптово'
    - sentence: 'Для оформлення оплачуваної відпустки через хворобу вам обов`язково потрібен _____.'
      answer: 'лікарняний лист'
      options:
        - 'лікарняний лист'
        - 'електронний рецепт'
        - 'медичний огляд'
        - 'загальний аналіз'
    - sentence: 'Після завершення стаціонарного лікування пацієнтові видали медичну _____ з рекомендаціями для відновлення вдома.'
      answer: 'виписку'
      options:
        - 'виписку'
        - 'декларацію'
        - 'скаргу'
        - 'картку'

