- type: reading
  title: 'Аналіз філософського тексту'
  instruction: 'Прочитайте текст про філософію Сковороди та дайте відповіді на запитання.'
  text: 'Видатний український мислитель Григорій Сковорода розробив вчення про дві натури — видиму та невидиму. Видима натура — це весь матеріальний світ, усе, що ми можемо виміряти і до чого можемо доторкнутися. Невидима натура — це духовна сутність, глибинний сенс речей. Саме тому в українській мові ми використовуємо дієслова фізичного розташування для матеріального світу, і дієслово існувати — для абстрактного, невидимого виміру ідей та концепцій.'
  tasks:
    - 'Що таке видима натура за Сковородою?'
    - 'Яку натуру представляє духовна сутність речей?'
    - 'Яке дієслово ми використовуємо для опису фізичного розташування?'
    - 'Для якого виміру слід використовувати дієслово існувати?'

- type: true-false
  title: 'Правда чи міф про дієслова буття'
  instruction: 'Визначте, чи є твердження правильним, з огляду на лексичні норми.'
  items:
    - statement: 'Дієслово існувати ідеально підходить для опису розташування ваших ключів у кишені.'
      correct: false
      explanation: 'Існувати використовується для глобальних явищ, а не фізичних предметів.'
    - statement: 'Дієслово перебувати часто поєднується з місцевим відмінком та прийменником у або в.'
      correct: true
      explanation: 'Наприклад, перебувати в стані шоку, перебувати у відпустці.'
    - statement: 'Дієслово становити використовується для надання точного визначення або класифікації явища.'
      correct: true
      explanation: 'Наприклад, становити загрозу, становити більшість.'
    - statement: 'Слово знаходитися є питомо українським і найкраще описує розташування будівель.'
      correct: false
      explanation: 'Це калька; для будівель слід використовувати дієслово розташовуватися.'
    - statement: 'В українській мові дієслово являтися означає появу привида або видіння уві сні.'
      correct: true
      explanation: 'Використовувати його у значенні бути кимось — груба лексична помилка.'
    - statement: 'Дієслово виглядати описує дію ваших власних очей, коли ви спрямовуєте погляд.'
      correct: false
      explanation: 'Це опис зовнішності (мати вигляд). Спрямування погляду — це дивитися.'
    - statement: 'Вираз справляти враження показує активний соціальний вплив на інших людей.'
      correct: true
      explanation: 'Це активна проекція свого образу на суспільство.'
    - statement: 'Дієслово здаватися вимагає використання давального відмінка для особи.'
      correct: true
      explanation: 'Це класична конструкція: мені здається, йому здається.'
    - statement: 'Дієслово виявлятися описує зовнішню, поверхневу, візуальну оцінку об''єкта.'
      correct: false
      explanation: 'Виявлятися — це констатація факту після перевірки. Зовнішня оцінка — виглядати.'
    - statement: 'Словосполучення здавалося б використовується як вставне слово для маркування сумніву.'
      correct: true
      explanation: 'Воно показує контраст між очікуванням і реальністю.'

- type: fill-in
  title: 'Оберіть правильний синонім для контексту'
  instruction: 'Доповніть речення найбільш влучним дієсловом, враховуючи стилістику тексту.'
  items:
    - sentence: 'У сучасному світі ______ проблема глобального потепління.'
      answer: 'існує'
      options: ['є', 'існує', 'знаходиться', 'перебуває']
      explanation: 'Глобальні абстрактні проблеми існують.'
    - sentence: 'Пацієнт після аварії ______ в стані глибокого шоку.'
      answer: 'перебуває'
      options: ['знаходиться', 'є', 'перебуває', 'становить']
      explanation: 'Для опису тимчасового стану людини використовується перебувати.'
    - sentence: 'Експерти вважають, що ця економічна криза ______ серйозну загрозу.'
      answer: 'становить'
      options: ['є', 'становить', 'виявляється', 'робить']
      explanation: 'Становити загрозу — стійкий формальний вираз.'
    - sentence: 'Наш новий офіс ______ в історичному центрі столиці.'
      answer: 'розташований'
      options: ['знаходиться', 'лежить', 'перебуває', 'розташований']
      explanation: 'Будівлі не знаходяться, вони розташовані.'
    - sentence: 'Ця інформація ______ в таємних архівах служби безпеки.'
      answer: 'міститься'
      options: ['знаходиться', 'лежить', 'міститься', 'існує']
      explanation: 'Для вмісту в текстах і документах вживаємо міститися.'
    - sentence: 'Ти сьогодні ______ дуже втомленим після цього довгого перельоту.'
      answer: 'виглядаєш'
      options: ['дивишся', 'виглядаєш', 'здаєшся', 'являєшся']
      explanation: 'Опис зовнішності передається словом виглядати.'
    - sentence: 'Новий співробітник ______ чудове враження на керівництво.'
      answer: 'справив'
      options: ['зробив', 'видав', 'справив', 'здався']
      explanation: 'Справляти враження — усталений вираз.'
    - sentence: 'Після перевірки документів ця компанія ______ фінансовою пірамідою.'
      answer: 'виявилася'
      options: ['виглядала', 'виявилася', 'здалася', 'стала']
      explanation: 'Констатація факту після перевірки.'
    - sentence: 'Вона ______ найкращим лікарем у нашій міській лікарні.'
      answer: 'є'
      options: ['являється', 'становить', 'є', 'існує']
      explanation: 'Кальку являється замінюємо на є (з орудним відмінком).'
    - sentence: '______ б, ми все спланували, але дощ змінив наші наміри.'
      answer: 'Здавалося'
      options: ['Виглядало', 'Здавалося', 'Виявлялося', 'Було']
      explanation: 'Вставне слово здавалося б показує несподівану зміну.'

- type: quiz
  title: 'Лексичні нюанси: перевірте свою професійну інтуїцію'
  instruction: 'Оберіть одну правильну відповідь на кожне запитання.'
  items:
    - question: 'Яке з цих дієслів найкраще підходить для абстрактних філософських концепцій?'
      explanation: 'Дієслово існувати передає абстрактну глобальну наявність.'
      options:
        - text: 'існувати'
          correct: true
        - text: 'знаходитися'
          correct: false
        - text: 'перебувати'
          correct: false
        - text: 'бути'
          correct: false
    - question: 'Як правильно сказати українською мовою про своє офіційне місце роботи?'
      explanation: 'Вона є юристом або Вона — юрист. Являтися — містичне видіння.'
      options:
        - text: 'Вона є головним юристом.'
          correct: true
        - text: 'Вона являється головним юристом.'
          correct: false
        - text: 'Вона становить головного юриста.'
          correct: false
        - text: 'Вона перебуває головним юристом.'
          correct: false
    - question: 'Яке слово слід використати для правильного опису розташування географічних об''єктів?'
      explanation: 'Географічні об''єкти та будівлі розташовуються.'
      options:
        - text: 'розташовуватися'
          correct: true
        - text: 'знаходитися'
          correct: false
        - text: 'міститися'
          correct: false
        - text: 'перебувати'
          correct: false
    - question: 'Що означає дієслово виявлятися у професійному або офіційному контексті спілкування?'
      explanation: 'Виявлятися — це результат, факт, встановлений після спостереження.'
      options:
        - text: 'ставати відомим фактом після перевірки'
          correct: true
        - text: 'мати певний зовнішній вигляд'
          correct: false
        - text: 'фізично перебувати в певному місці'
          correct: false
        - text: 'емоційно сприймати нову реальність'
          correct: false
    - question: 'Який усталений вираз ми використовуємо для вираження м''якого емоційного сумніву?'
      explanation: 'Вираз здавалося б маркує контраст між очікуванням і фактом.'
      options:
        - text: 'здавалося б'
          correct: true
        - text: 'виглядало б'
          correct: false
        - text: 'виявлялося б'
          correct: false
        - text: 'було б'
          correct: false
    - question: 'Яке дієслово є найкращим синонімом до фрази мати зовнішній вигляд?'
      explanation: 'Виглядати стосується виключно зовнішньої оцінки об''єкта.'
      options:
        - text: 'виглядати'
          correct: true
        - text: 'дивитися'
          correct: false
        - text: 'виявлятися'
          correct: false
        - text: 'справляти'
          correct: false
    - question: 'До якої самостійної частини мови належить українське слово значення?'
      explanation: 'Значення відповідає на питання що? і є іменником.'
      options:
        - text: 'іменник'
          correct: true
        - text: 'дієслово'
          correct: false
        - text: 'прикметник'
          correct: false
        - text: 'прислівник'
          correct: false
    - question: 'Яке дієслово часто використовується з формальною синтаксичною конструкцією становить загрозу?'
      explanation: 'Становити використовується для визначень, частки або статусу.'
      options:
        - text: 'становити'
          correct: true
        - text: 'бути'
          correct: false
        - text: 'існувати'
          correct: false
        - text: 'перебувати'
          correct: false
    - question: 'Чому широке використання слова знаходитися є лексичною помилкою для опису стану?'
      explanation: 'Знаходитися означає бути знайденим після того, як щось загубили.'
      options:
        - text: 'Це калька, корінь якої означає пошук загубленого об''єкта.'
          correct: true
        - text: 'Це слово з дуже високого і застарілого наукового стилю.'
          correct: false
        - text: 'Воно використовується тільки для живих людей та тварин.'
          correct: false
        - text: 'Це занадто неформальне слово для академічного спілкування.'
          correct: false
    - question: 'Як найбільш стилістично правильно перекласти фразеологізм to make an impression українською?'
      explanation: 'Справляти враження — це активний соціальний вплив.'
      options:
        - text: 'справляти враження'
          correct: true
        - text: 'робити враження'
          correct: false
        - text: 'видавати враження'
          correct: false
        - text: 'давати враження'
          correct: false

