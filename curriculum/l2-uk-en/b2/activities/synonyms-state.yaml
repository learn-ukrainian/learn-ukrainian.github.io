- type: group-sort
  title: 'Класифікація: Офіційність, Суб''єктивність та Простір'
  instruction: 'Розподіліть дієслова за категоріями їхнього стилістичного та семантичного використання.'
  groups:
    - name: 'Офіційний стан і визначення'
      items: ['перебувати', 'становити', 'існувати']
    - name: 'Суб''єктивне сприйняття і вигляд'
      items: ['здаватися', 'видаватися', 'виглядати']
    - name: 'Просторове розташування'
      items: ['розташовуватися', 'міститися', 'лежати']

- type: unjumble
  title: 'Побудова академічних і ділових речень'
  instruction: 'Складіть слова у правильному порядку, щоб утворити грамотні українські речення.'
  items:
    - words: ['проблема', 'соціальної', 'нерівності', 'існує', 'в', 'сучасному', 'урбанізованому', 'суспільстві']
      answer: 'Проблема соціальної нерівності існує в сучасному урбанізованому суспільстві.'
    - words: ['цей', 'стратегічний', 'об''єкт', 'повинен', 'перебувати', 'під', 'контролем', 'держави']
      answer: 'Цей стратегічний об''єкт повинен перебувати під контролем держави.'
    - words: ['новий', 'амбітний', 'кандидат', 'справив', 'чудове', 'враження', 'на', 'наше', 'керівництво']
      answer: 'Новий амбітний кандидат справив чудове враження на наше керівництво.'
    - words: ['у', 'документі', 'міститься', 'дуже', 'важлива', 'інформація', 'про', 'діяльність', 'компанії']
      answer: 'У документі міститься дуже важлива інформація про діяльність компанії.'
    - words: ['директор', 'нашої', 'міжнародної', 'корпорації', 'зараз', 'перебуває', 'у', 'тривалій', 'відпустці']
      answer: 'Директор нашої міжнародної корпорації зараз перебуває у тривалій відпустці.'
    - words: ['ігнорування', 'екологічних', 'норм', 'може', 'становити', 'загрозу', 'для', 'майбутніх', 'поколінь']
      answer: 'Ігнорування екологічних норм може становити загрозу для майбутніх поколінь.'
    - words: ['ця', 'складна', 'дискусія', 'про', 'політику', 'видається', 'мені', 'абсолютно', 'безглуздою']
      answer: 'Ця складна дискусія про політику видається мені абсолютно безглуздою.'
    - words: ['чутки', 'про', 'банкрутство', 'відомої', 'будівельної', 'компанії', 'виявилися', 'гіркою', 'правдою']
      answer: 'Чутки про банкрутство відомої будівельної компанії виявилися гіркою правдою.'
    - words: ['будівля', 'нашого', 'нового', 'банку', 'розташована', 'в', 'історичному', 'центрі', 'міста']
      answer: 'Будівля нашого нового банку розташована в історичному центрі міста.'
    - words: ['на', 'перший', 'погляд', 'це', 'завдання', 'виглядало', 'простим', 'і', 'зрозумілим']
      answer: 'На перший погляд це завдання виглядало простим і зрозумілим.'

- type: error-correction
  title: 'Рятувальна операція: викорінення лексичних кальок'
  instruction: 'Знайдіть русизм або стилістичну помилку в реченні та оберіть правильний варіант.'
  items:
    - sentence: 'Наш новий центральний офіс знаходиться біля станції метро.'
      error: 'знаходиться'
      answer: 'розташований'
      error_type: 'word'
      options: ['розташований', 'перебуває', 'становить', 'існує']
      explanation: 'Будівлі не можуть знаходитися (шукатися і бути знайденими), вони розташовані.'
    - sentence: 'Він являється найвідомішим лікарем у нашій сучасній клініці.'
      error: 'являється'
      answer: 'є'
      error_type: 'word'
      options: ['є', 'здається', 'видається', 'виглядає']
      explanation: 'Являтися — це про видіння і привидів. Професію позначаємо дієсловом бути.'
    - sentence: 'У цьому таємному звіті знаходиться дуже важлива статистика.'
      error: 'знаходиться'
      answer: 'міститься'
      error_type: 'word'
      options: ['міститься', 'лежить', 'перебуває', 'існує']
      explanation: 'Для вмісту інформації в документах використовується слово міститися.'
    - sentence: 'Сьогодні на конференції ти дивишся дуже втомленим і виснаженим.'
      error: 'дивишся'
      answer: 'виглядаєш'
      error_type: 'word'
      options: ['виглядаєш', 'являєшся', 'виявляєшся', 'здаєшся']
      explanation: 'Дивитися — це активна дія очей. Опис зовнішності — виглядати.'
    - sentence: 'Пацієнт після важкої операції зараз знаходиться в стані сну.'
      error: 'знаходиться'
      answer: 'перебуває'
      error_type: 'word'
      options: ['перебуває', 'розташований', 'лежить', 'становить']
      explanation: 'Офіційний стан живої людини передається дієсловом перебувати.'
    - sentence: 'Цей невідомий комп''ютерний вірус являється серйозною проблемою для системи.'
      error: 'являється'
      answer: 'становить'
      error_type: 'word'
      options: ['становить', 'перебуває', 'видається', 'існує']
      explanation: 'Для ідентифікації загрози або проблеми формального стилю використовуємо становити.'
    - sentence: 'Мої старі ключі від автомобіля знаходяться на кухонному столі.'
      error: 'знаходяться'
      answer: 'лежать'
      error_type: 'word'
