- type: reading
  title: 'Науковий текст: Випробування двигуна'
  text: 'Під час першого етапу тестування нового двигуна було зафіксовано критичне
    підвищення температури в основній камері згоряння. Процес охолодження, контрольований
    автоматичною системою, не забезпечив необхідного зниження теплового навантаження.
    За результатами аналізу встановлено, що причиною збою є дефект у конструкції клапана.
    Для подальших випробувань необхідно замінити пошкоджений елемент та провести додаткове
    вимірювання тиску. Зрештою, цей метод діагностики довів свою ефективність.

    '
  tasks:
  - Яку проблему було зафіксовано під час першого етапу тестування?
  - Що стало причиною критичного підвищення температури?
  - Які дії необхідно виконати для подальших випробувань двигуна?
  - Який висновок зроблено щодо використаного методу діагностики?
- type: true-false
  title: Характеристики науково-технічного стилю
  items:
  - statement: У науково-технічному тексті багатозначність слів та використання художніх
      метафор є ознакою високої майстерності автора.
    correct: false
    explanation: Науково-технічний стиль вимагає максимальної точності та однозначності,
      метафори тут недоречні.
  - statement: Фундамент сучасної української термінології було закладено під час
      "Золотого десятиліття" у 1920-х роках.
    correct: true
    explanation: У цей період Інститут української наукової мови уклав понад 80 спеціалізованих
      словників.
  - statement: Принцип "один термін = одне поняття" означає, що в межах одного документа
      не можна використовувати синоніми для позначення того ж об'єкта.
    correct: true
    explanation: Синонімія в технічних текстах породжує плутанину, тому терміни не
      повинні змінюватися.
  - statement: Слова на "-ння" (наприклад, вимірювання) зазвичай позначають конкретний
      результат дії, а не сам процес.
    correct: false
    explanation: Іменники на "-ння" частіше означають тривалий процес, тоді як результат
      часто має нульове закінчення (вимір).
  - statement: Рід абревіатури в українській мові завжди визначається за першою літерою
      скорочення.
    correct: false
    explanation: Рід абревіатури визначається за головним словом у її повному розшифруванні
      (наприклад, НАН — академія, жіночий рід).
  - statement: Безособові конструкції на -но/-то дозволяють усунути суб'єкта дії та
      сфокусувати увагу на об'єкті та самому факті.
    correct: true
    explanation: Такі конструкції (досліджено, виявлено) ідеально підходять для об'єктивного
      наукового опису.
  - statement: Сучасна тенденція в українській науці забороняє використовувати активний
      стан для опису дій дослідників.
    correct: false
    explanation: Сучасний підхід допускає використання активного стану (ми виявили)
      для більшої прозорості та відповідальності.
  - statement: В інструкціях з експлуатації доцільно використовувати безособові модальні
      слова (необхідно, слід) з інфінітивом.
    correct: true
    explanation: Це створює нейтрально-ввічливий, але чіткий авторитарний тон вказівок.
  - statement: Структура наукового звіту IMRD розшифровується як Вступ, Методи, Результати,
      Дискусія.
    correct: true
    explanation: Це міжнародний стандарт академічного письма, імплементований в Україні.
  - statement: Прийменник "по" є найкращим вибором для опису причинно-наслідкових
      зв'язків у технічному тексті (наприклад, "по результатам").
    correct: false
    explanation: Використання "по" в таких випадках є русизмом; правильно казати "за
      результатами".
  instruction: Визначте, чи твердження правильне.
- type: fill-in
  title: Вставте пропущені слова
  items:
  - sentence: Після тривалого тестування інженери зафіксували остаточний _____.
    answer: вимір
    options:
    - вимірювання
    - вимір
    - виміряти
    - вимірник
    explanation: Тут ідеться про фінальний результат дії, тому потрібен іменник з
      нульовим закінченням.
  - sentence: Цей технологічний _____ вимагає постійного контролю температури.
    answer: процес
    options:
    - процес
    - результат
    - аналіз
    - дослід
    explanation: '"Процес" означає тривалу дію в розвитку.'
  - sentence: Новий співробітник буде _____ у наступному етапі розробки.
    answer: брати участь
    options:
    - приймати участь
    - брати участь
    - робити участь
    - мати участь
    explanation: Правильна українська конструкція — "брати участь".
  - sentence: Всі налаштування були виконані _____ до технічної специфікації.
    answer: відповідно
    options:
    - відповідно
    - згідно
    - залежно
    - спираючись
    explanation: Правильна конструкція — "відповідно до".
  - sentence: Нова комп'ютерна _____ вже встановлена в головній лабораторії.
    answer: оснастка
    options:
    - оснащення
    - оснастка
    - оснастити
    - оснащеність
    explanation: Йдеться про конкретне обладнання (результат), а не процес встановлення.
  - sentence: Кожен науковий _____ у цій статті має бути чітко визначений на початку.
    answer: термін
    options:
    - термін
    - слово
    - звук
    - знак
    explanation: Термін — ключова одиниця наукового стилю.
  - sentence: Експеримент можна продовжувати лише _____ стабільного тиску в системі.
    answer: за умови
    options:
    - за умови
    - при умові
    - на умові
    - з умовою
    explanation: Правильний український відповідник — "за умови".
  - sentence: Детальний _____ зібраних даних підтвердив нашу початкову гіпотезу.
    answer: аналіз
    options:
    - аналіз
    - синтез
    - процес
    - метод
    explanation: Йдеться про розгляд та вивчення даних.
  - sentence: НАН України _____ звіт про досягнення в галузі фізики за минулий рік.
    answer: опублікувала
    options:
    - опублікувала
    - опублікував
    - опублікувало
    - опублікували
    explanation: НАН (Національна академія наук) — жіночий рід, тому дієслово має
      закінчення жіночого роду.
  - sentence: Під час експерименту _____ критичну помилку в роботі алгоритму.
    answer: виявлено
    options:
    - виявлено
    - виявили
    - виявив
    - виявлена
    explanation: Форма на -но ідеально підходить для безособового опису фактів.
  instruction: Оберіть правильне слово для заповнення пропуску.
- type: unjumble
  title: Побудуйте наукові речення
  items:
  - words:
    - дослідниками
    - було
    - зафіксовано
    - критичне
    - підвищення
    - температури
    - в
    - реакторі
    answer: Дослідниками було зафіксовано критичне підвищення температури в реакторі.
  - words:
    - кожен
    - новий
    - термін
    - повинен
    - мати
    - лише
    - одне
    - точне
    - значення
    answer: Кожен новий термін повинен мати лише одне точне значення.
  - words:
    - за
    - результатами
    - проведеного
    - аналізу
    - ми
    - можемо
    - підтвердити
    - цю
    - гіпотезу
    answer: За результатами проведеного аналізу ми можемо підтвердити цю гіпотезу.
  - words:
    - перед
    - початком
    - роботи
    - необхідно
    - перевірити
    - цілісність
    - кабелю
    - живлення
    - пристрою
    answer: Перед початком роботи необхідно перевірити цілісність кабелю живлення
      пристрою.
  - words:
    - цей
    - складний
    - процес
    - контролюється
    - за
    - допомогою
    - новітньої
    - автоматичної
    - системи
    answer: Цей складний процес контролюється за допомогою новітньої автоматичної
      системи.
  - words:
    - відповідно
    - до
    - затвердженого
    - протоколу
    - всі
    - дані
    - зберігаються
    - на
    - захищеному
    - сервері
    answer: Відповідно до затвердженого протоколу всі дані зберігаються на захищеному
      сервері.
  - words:
    - нові
    - механізми
    - будуть
    - інтегровані
    - в
    - систему
    - протягом
    - наступного
    - календарного
    - місяця
    answer: Нові механізми будуть інтегровані в систему протягом наступного календарного
      місяця.
  - words:
    - для
    - вирішення
    - цієї
    - проблеми
    - доцільно
    - застосувати
    - метод
    - математичного
    - моделювання
    answer: Для вирішення цієї проблеми доцільно застосувати метод математичного моделювання.
  instruction: Розташуйте слова у правильному порядку.
- type: error-correction
  title: Виправте кальк та русизми
  items:
  - sentence: Наш університет буде приймати участь у міжнародному науковому симпозіумі.
    error: приймати участь
    answer: брати участь
    error_type: phrase
    options:
    - брати участь
    - робити участь
    - мати участь
    - давати участь
    explanation: В українській мові правильно казати "брати участь".
  - sentence: Цей графік являється прикладом лінійної залежності між двома змінними.
    error: являється
    answer: є
    options:
    - є
    - стає
    - виступає
    - буває
    explanation: Дієслово "являється" у цьому контексті — це русизм, правильно використовувати
      "є".
  - sentence: По результатам останніх випробувань пристрій можна запускати у виробництво.
    error: По результатам
    answer: За результатами
    error_type: phrase
    options:
    - За результатами
    - Із результатами
    - Згідно результатів
    - На результатах
    explanation: Прийменник "по" в таких конструкціях не використовується, правильний
      варіант — "за результатами".
  - sentence: Система автоматично вимикається при умові перегріву головного процесора.
    error: при умові
    answer: за умови
    error_type: phrase
    options:
    - за умови
    - з умовою
    - на умові
    - від умови
    explanation: Український відповідник російського "при условии" — це "за умови".
  - sentence: Вимірювання було виконано при допомозі надточного лазерного датчика.
    error: при допомозі
    answer: за допомогою
    error_type: phrase
    options:
    - за допомогою
    - з допомогою
    - від допомоги
    - під допомогою
    explanation: Замість кальки "при допомозі" слід використовувати конструкцію "за
      допомогою".
  - sentence: Експеримент безперервно тривав на протязі двох тижнів без зупинок.
    error: на протязі
    answer: протягом
    options:
    - протягом
    - упродовж
    - за час
    - на час
    explanation: '"На протязі" означає перебування на потоці повітря (in a draft).
      Для позначення часу використовується "протягом" або "упродовж".'
  - sentence: Всі етапи проекту необхідно виконати в відповідності з графіком.
    error: в відповідності з
    answer: відповідно до
    error_type: phrase
    options:
    - відповідно до
    - згідно до
    - залежно від
    - спільно з
    explanation: Правильна українська конструкція — "відповідно до" або "згідно з".
  - sentence: Наприкінці статті нам потрібно підвести підсумки нашого тривалого дослідження.
    error: підвести
    answer: підбити
    options:
    - підбити
    - зробити
    - написати
    - скласти
    explanation: Правильний вислів в українській мові — "підбивати підсумки".
  instruction: Знайдіть і виправте помилку в реченні.
- type: mark-the-words
  title: Знайдіть безособові дієслівні форми на -но/-то
  instruction: Прочитайте текст та виділіть усі безособові форми на -но та -то, які
    використовуються для об'єктивного опису.
  text: Під час експерименту було використано нові зразки металу. Температуру виміряно
    за допомогою високоточного сенсора. Аналітичні дані зібрано та збережено на захищеному
    сервері. Опір матеріалу знижено на десять відсотків. Усі необхідні параметри встановлено
    за замовчуванням.
  answers:
  - використано
  - виміряно
  - зібрано
  - збережено
  - знижено
  - встановлено
- type: quiz
  title: Теорія науково-технічного перекладу та термінології
  items:
  - question: Яка з наведених інституцій відіграла ключову роль у створенні української
      наукової термінології під час "Золотого десятиліття" у 1920-х роках?
    options:
    - text: Інститут української наукової мови
      correct: true
    - text: Наукове товариство імені Шевченка
      correct: false
    - text: Національна академія наук України
      correct: false
    - text: Міністерство освіти та науки
      correct: false
    explanation: Саме Інститут української наукової мови в Києві уклав понад 80 словників
      у той період.
  - question: Яке головне правило стосовно використання синонімів діє при створенні
      якісної та зрозумілої технічної документації чи інструкцій?
    options:
    - text: Один термін повинен завжди відповідати виключно одному поняттю.
      correct: true
    - text: Слід використовувати якнайбільше синонімів для збагачення тексту.
      correct: false
    - text: Синоніми можна використовувати лише в інструкціях для початківців.
      correct: false
    - text: Заборонено використовувати будь-які запозичені синоніми з інших мов.
      correct: false
    explanation: 'Моносемія (однозначність) — це закон: терміни не можна замінювати
      синонімами, щоб уникнути плутанини.'
  - question: Які суфікси в українській мові найчастіше використовуються для утворення
      віддієслівних іменників, що позначають тривалий незавершений процес?
    options:
    - text: Суфікси -ння та -ття
      correct: true
    - text: Суфікси -ість та -ота
      correct: false
    - text: Суфікси -ник та -ач
      correct: false
    - text: Суфікси -изм та -ізм
      correct: false
    explanation: Слова на -ння та -ття (наприклад, вимірювання, дослідження) зазвичай
      позначають тривалий процес.
  - question: Як правильно визначити граматичний рід складноскороченого слова (абревіатури),
      наприклад, абревіатури ВВП (Валовий внутрішній продукт)?
    options:
    - text: Рід визначається за головним (опорним) словом у її повному розшифруванні.
      correct: true
    - text: Рід визначається за першою літерою самої абревіатури.
      correct: false
    - text: Усі абревіатури за замовчуванням належать до середнього роду.
      correct: false
    - text: Рід визначається за останньою літерою абревіатури.
      correct: false
    explanation: Оскільки головне слово "продукт" — чоловічого роду, то і ВВП — чоловічого
      роду.
  - question: Чому в українських наукових текстах часто використовують слова з класичних
      мов, такі як синтез, аналіз, параметр чи алгоритм?
    options:
    - text: Ці інтернаціоналізми дозволяють вченим з різних країн краще розуміти одне
        одного.
      correct: true
    - text: Тому що в українській мові немає власних слів для опису будь-яких процесів.
      correct: false
    - text: Використання латини є обов'язковою вимогою міжнародних юридичних документів.
      correct: false
    - text: Ці слова звучать красивіше і роблять текст більш емоційним та виразним.
      correct: false
    explanation: Міжнародна термінологія на базі класичних коренів забезпечує універсальність
      наукового апарату.
  - question: Яка синтаксична конструкція є найкращою для відстороненого, об'єктивного
      опису фактів у технічному тексті без згадки виконавця?
    options:
    - text: Безособові предикативні форми на -но/-то.
      correct: true
    - text: Дієслова у формі першої особи однини (я зробив).
      correct: false
