- type: essay-response
  title: 'Есе: Написання технічної інструкції'
  prompt: 'Уявіть, що ви працюєте технічним письменником у компанії, яка розробляє
    програмне забезпечення. Напишіть коротку покрокову інструкцію (мінімум 150 слів)
    щодо того, як користувачеві налаштувати новий обліковий запис у системі та захистити
    його. Використовуйте безособові конструкції (необхідно, слід, доцільно), нумерований
    список та правильну технічну термінологію.

    '
  min_words: 150
  model_answer: "Для безпечного налаштування нового облікового запису в системі необхідно\
    \ виконати такі кроки:\n\n1. Відкрити головну сторінку застосунку та натиснути\
    \ кнопку реєстрації.\n2. Ввести дійсну адресу електронної пошти та створити надійний\
    \ пароль.\n3. Підтвердити реєстрацію, перейшовши за посиланням у листі, який було\
    \ автоматично надіслано на вашу електронну адресу.\n\nПісля успішної авторизації\
    \ в системі слід заповнити профіль користувача. Для забезпечення максимального\
    \ рівня безпеки доцільно активувати двофакторну автентифікацію. Цей процес вимагає\
    \ прив'язки мобільного номера до вашого акаунту. \n\nЗверніть увагу, що всі персональні\
    \ дані зберігаються на захищеному сервері відповідно до міжнародних протоколів\
    \ шифрування. У разі виникнення технічних проблем або системних збоїв необхідно\
    \ звернутися до служби підтримки за допомогою спеціальної форми зворотного зв'язку\
    \ в особистому кабінеті. Зрештою, дотримання цих рекомендацій гарантує стабільне\
    \ та безпечне функціонування вашого облікового запису.\n"
  rubric:
  - criteria: Використання безособових конструкцій
    description: Правильно та доречно вжито конструкції типу "необхідно", "слід",
      "доцільно" з інфінітивом.
    points: 5
  - criteria: Структурування тексту
    description: Текст логічно структурований, містить нумерований алгоритм дій.
    points: 5
  - criteria: Технічний регістр
    description: Витримано об'єктивний, відсторонений тон без емоційної лексики. Використано
      фахову термінологію.
    points: 5
