- type: cloze
  title: 'Заповніть пропуски: шлях типової цивільної справи'
  instruction: Вставте пропущені юридичні терміни в текст, який детально описує ключові
    етапи судового процесу в Україні.
  passage: Будь-який цивільний судовий {{1}} завжди ініціюється формальним документом.
    Особа, яка звертається за захистом своїх прав, офіційно називається {{2}}, а той,
    до кого висуваються фінансові претензії — це {{3}}. Щоб розпочати розгляд справи,
    необхідно грамотно підготувати і подати {{4}} до канцелярії відповідного суду.
    У цьому важливому документі потрібно детально обґрунтувати свої вимоги посиланнями
    на чинний {{5}}. Коли суддя офіційно відкриває провадження, він одразу призначає
    перше підготовче {{6}}. Під час детального розгляду справи обидві рівноправні
    сторони або їхні професійні {{7}} надають суду різні переконливі {{8}} — документальні
    та речові. Також суд має право викликати людей, яким особисто відомі важливі обставини
    конфлікту; кожен такий {{9}} попереджається про відповідальність і зобов'язаний
    говорити лише правду. Після глибокого дослідження всіх наданих матеріалів та емоційних
    судових дебатів, суддя йде до нарадчої кімнати, щоб остаточно ухвалити {{10}}.
    Він може повністю або частково {{11}} позовні вимоги, або, навпаки, повністю {{12}}
    позов через його цілковиту безпідставність. Якщо одна зі сторін вважає цей вердикт
    незаконним чи несправедливим, вона має гарантоване конституційне {{13}} на перегляд
    справи. Для цього досвідчений адвокат повинен підготувати та подати {{14}} скаргу
    до компетентного суду вищої {{15}}. Поки триває цей складний юридичний перегляд,
    примусове виконання первинного вердикту автоматично призупиняється, що гарантує
    об'єктивну {{16}} для всіх учасників цього напруженого процесу.
