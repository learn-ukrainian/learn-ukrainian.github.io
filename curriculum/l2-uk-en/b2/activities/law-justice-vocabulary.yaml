- type: reading
  title: 'Первинне джерело: Магдебурзьке право в Києві'
  text: 'Магдебурзьке право стало важливим етапом у формуванні європейської ідентичності
    українських міст. Київ отримав цей привілей наприкінці п''ятнадцятого століття,
    що дозволило містянам створити власні виборні органи влади — магістрат. Це звільнило
    жителів міста від прямого підпорядкування королівським намісникам і заклало фундамент
    для незалежного суду. Магістрат складався з двох колегій: ради, яка керувала всім
    містом, та лави, яка виконувала виключно судові функції. Такий поділ влади забезпечував
    справедливість і сприяв розвитку вільного класу міщан, які мали гарантовані законом
    права на приватну власність і чесний суд.

    '
  tasks:
  - Коли Київ отримав Магдебурзьке право?
  - З яких двох колегій складався міський магістрат?
  - Які саме функції виконувала судова лава?
  - Чому це право вважається символом європейської політичної інтеграції?
- type: true-false
  title: 'Правда чи неправда: факти про правову систему'
  instruction: Визначте, чи відповідають ці твердження змісту тексту про право та
    юстицію.
  items:
  - statement: Кревна помста була єдиним законним способом вирішення конфліктів у
      Київській державі після прийняття Руської Правди.
    correct: false
    explanation: Руська Правда поступово скасувала кревну помсту, замінивши її системою
      штрафів.
  - statement: Історичний термін віра позначав великий грошовий штраф за вбивство
      вільної людини.
    correct: true
    explanation: Цей штраф виплачувався на користь князя та частково родичам жертви.
  - statement: Будь-яка людина з вищою юридичною освітою має законне право захищати
      підозрюваного в кримінальному суді.
    correct: false
    explanation: Функції захисту в кримінальному суді може виконувати виключно професійний
      адвокат.
  - statement: Адміністративне правопорушення завжди призводить до судимості та довготривалого
      позбавлення волі.
    correct: false
    explanation: Адміністративні правопорушення не завдають значної шкоди, караються
      штрафами, і судимість людина не отримує.
  - statement: Верховний Суд України діє як касаційна інстанція і перевіряє лише правильність
      застосування закону.
    correct: true
    explanation: Верховний Суд не аналізує фактичні обставини справи, а перевіряє
      застосування норм матеріального права.
  - statement: Конституційний Суд України регулярно розглядає звичайні цивільні спори
      між громадянами про спадщину.
    correct: false
    explanation: Конституційний Суд гарантує верховенство Конституції і не розглядає
      кримінальні чи цивільні справи між громадянами.
  - statement: Господарські суди спеціалізуються на вирішенні конфліктів виключно
      у сфері бізнесу та економіки.
    correct: true
    explanation: Їхніми клієнтами є юридичні особи (корпорації, підприємства) та приватні
      підприємці.
  - statement: У професійній юридичній комунікації конструкція по закону вважається
      стилістично правильною.
    correct: false
    explanation: Ця конструкція є калькою з російської. Правильно казати згідно із
      законом або відповідно до закону.
  - statement: У кримінальному судовому процесі державу завжди представляє прокурор,
      який виступає державним обвинувачем.
    correct: true
    explanation: Його основне завдання — довести провину підозрюваного в суді на основі
      зібраних доказів.
  - statement: Апеляційний суд зобов'язаний починати розслідування справи з чистого
      аркуша і викликати всіх нових свідків.
    correct: false
    explanation: Апеляційний суд перевіряє наявні матеріали на предмет помилок суду
      першої інстанції, а не починає нове слідство.
- type: quiz
  title: 'Перевірка знань: юридична термінологія'
  items:
  - question: Який історичний документ став першим писаним збірником законів на теренах
      Східної Європи у Київській державі?
    explanation: Руська Правда, створена за ініціативи Ярослава Мудрого, стала першим
      масштабним писаним кодексом.
    options:
    - text: Конституція Пилипа Орлика
      correct: false
    - text: Магдебурзьке право
      correct: false
    - text: Руська Правда
      correct: true
    - text: Цивільний кодекс
      correct: false
  - question: Яке покарання було ключовим механізмом у збірнику законів Ярослава Мудрого
      за вбивство вільної людини?
    explanation: Віра була спеціальним грошовим штрафом, який офіційно замінив традицію
      кревної помсти.
    options:
    - text: Довічне ув'язнення у в'язниці
      correct: false
    - text: Обов'язкова кревна помста
      correct: false
    - text: Громадські та публічні роботи
      correct: false
    - text: Грошовий штраф або віра
      correct: true
  - question: Як правильно та максимально офіційно потрібно звертатися до судді під
      час відкритого судового засідання?
    explanation: Єдине офіційне та правильне звертання до судді під час процесу —
      Ваша честь.
    options:
    - text: Пане шановний суддя
      correct: false
    - text: Ваша честь
      correct: true
    - text: Шановний голово суду
      correct: false
    - text: Пане головний юристе
      correct: false
  - question: Хто має виключне законне право захищати людину від кримінального обвинувачення
      в українському суді?
    explanation: Лише професійний адвокат, який склав присягу, має право здійснювати
      захист у кримінальному провадженні.
    options:
    - text: Будь-який дипломований юрист
      correct: false
    - text: Місцевий слідчий суддя
      correct: false
    - text: Професійний кваліфікований адвокат
      correct: true
    - text: Державний або приватний нотаріус
      correct: false
  - question: Який граматичний прийменниковий зворот є нормативним українським відповідником
      до розмовної кальки по закону?
    explanation: Правильним юридичним відповідником є вислів згідно із законом або
      відповідно до закону.
    options:
    - text: Згідно із законом
      correct: true
    - text: В суворих межах закону
      correct: false
    - text: Завдяки чинному закону
      correct: false
    - text: Слідуючи букві закону
      correct: false
  - question: Який спеціалізований суд розглядає складні спори щодо виконання мільйонних
      контрактів та процедури банкрутства великих компаній?
    explanation: Господарський суд спеціалізується виключно на вирішенні економічних
      суперечок між юридичними особами.
    options:
    - text: Апеляційний обласний суд
      correct: false
    - text: Конституційний Суд України
      correct: false
    - text: Місцевий районний суд
      correct: false
    - text: Спеціалізований господарський суд
      correct: true
  - question: Яке слово є єдиним нормативним варіантом для позначення важливої інформації,
      яку надає очевидець у суді?
    explanation: Свідок дає свідчення. Слово покази в цьому контексті є помилковим.
    options:
    - text: Достовірні покази
      correct: false
    - text: Правдиві свідчення
      correct: true
    - text: Офіційні доведення
      correct: false
    - text: Детальні пояснення
      correct: false
  - question: Яка найвища інстанція перевіряє виключно те, чи правильно нижчі суди
      застосували конкретні норми закону?
    explanation: Верховний Суд діє як касаційна інстанція і не аналізує жодні фактичні
      обставини чи речові докази.
    options:
    - text: Верховний Суд
      correct: true
    - text: Місцевий суд
      correct: false
    - text: Апеляційний суд
      correct: false
    - text: Конституційний Суд
      correct: false
  - question: Який офіційний документ складає прокурор, щоб публічно звинуватити особу
      у вчиненні серйозного кримінального злочину?
    explanation: Прокурор обов'язково складає та урочисто зачитує в суді підготовлений
      обвинувальний акт.
    options:
    - text: Майновий цивільний позов
      correct: false
    - text: Письмову апеляційну скаргу
      correct: false
    - text: Офіційний обвинувальний акт
      correct: true
    - text: Терміновий адвокатський запит
      correct: false
  - question: Хто здійснює суворий судовий контроль за дотриманням прав людини слідчими
      органами на етапі досудового розслідування?
    explanation: Слідчий суддя видає дозволи на обшуки квартир та суворо контролює
      дотримання конституційних прав під час слідства.
    options:
    - text: Голова місцевого суду
      correct: false
    - text: Незалежний слідчий суддя
      correct: true
    - text: Генеральний державний прокурор
      correct: false
    - text: Кваліфікований приватний адвокат
      correct: false
  instruction: Оберіть правильну відповідь.
- type: fill-in
  title: 'Заповніть пропуски: юридичні дієслова в дії'
  instruction: Оберіть дієслово у правильній граматичній формі для кожного запропонованого
    речення.
  items:
  - sentence: Обурений позивач вирішив негайно подати цивільний позов до суду, щоб
      повністю відшкодувати завдані матеріальні збитки.
    answer: подати
    options:
    - подати
    - відкрити
    - заявити
    - принести
    explanation: Стала колокація в офіційній юридичній мові — подати позов до суду.
  - sentence: Державний прокурор вимагає від суду призначити максимальне тюремне покарання
      для підсудного через надзвичайну тяжкість скоєного злочину.
    answer: призначити
    options:
    - призначити
    - дати
    - створити
    - покласти
    explanation: Суд завжди призначає покарання згідно з нормами Кримінального кодексу.
  - sentence: Слідчий суддя уважно вивчив усі надані матеріали та видав офіційний
      дозвіл на проведення обшуку в головному офісі компанії.
    answer: видав
    options:
    - видав
    - зробив
    - відкрив
    - сказав
    explanation: Суддя офіційно видає дозвіл (або ухвалює рішення про надання дозволу).
  - sentence: Після тривалих і напружених дебатів місцевий суд першої інстанції нарешті
      виніс остаточний виправдувальний вирок у цій гучній справі.
    answer: виніс
    options:
    - виніс
    - прочитав
    - прийняв
    - завершив
    explanation: У кримінальному процесі суд завжди виносить вирок (або ухвалює його).
  - sentence: Головний свідок відмовився давати будь-які свідчення проти своїх близьких
      родичів, законно скориставшись своїм конституційним правом.
    answer: давати
    options:
    - давати
    - робити
    - казати
    - приносити
    explanation: Свідки мають давати свідчення в суді, ця граматична конструкція є
      єдино правильною.
  - sentence: Конституційний Суд України визнав цей суперечливий податковий закон
      неконституційним, після чого він одразу втратив свою юридичну силу.
    answer: втратив
    options:
    - втратив
    - загубив
    - закінчив
    - зупинив
    explanation: Неконституційний закон негайно втрачає чинність або юридичну силу.
  - sentence: Проаналізувавши багатосторінковий контракт, суддя вирішив повністю задовольнити
      позов комерційного банку щодо примусового стягнення боргу.
    answer: задовольнити
    options:
    - задовольнити
    - прийняти
    - виконати
    - дозволити
    explanation: Суд має повноваження задовольнити або відхилити офіційний позов.
  - sentence: Досвідчений адвокат відповідача подав офіційне клопотання, щоб долучити
      нові надзвичайно важливі речові докази до матеріалів кримінальної справи.
    answer: долучити
    options:
    - долучити
    - додати
    - приєднати
    - включити
    explanation: Будь-які нові докази завжди долучаються до матеріалів справи.
  - sentence: Захисники незаконно засудженого бізнесмена публічно заявили, що планують
      негайно оскаржити цей надто суворий вирок в апеляційному суді.
    answer: оскаржити
    options:
    - оскаржити
    - скасувати
    - змінити
    - заперечити
    explanation: Сторона захисту має законне право оскаржити рішення або вирок в апеляції.
  - sentence: Будь-яка державна установа суворо зобов'язана швидко відповісти на офіційний
      адвокатський запит протягом п'яти робочих днів.
    answer: відповісти
    options:
    - відповісти
    - відреагувати
    - написати
    - повідомити
    explanation: Державні органи за законом зобов'язані відповісти на запит адвоката
      у встановлений термін.
- type: select
  title: 'Оберіть правильні відповіді: види правопорушень та судів'
  instruction: Уважно прочитайте кожне запитання та виберіть усі правильні варіанти
