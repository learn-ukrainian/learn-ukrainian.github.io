      correct: false
    - text: Тривалі майнові суперечки між родичами навколо отриманої великої спадщини
      correct: true
    - text: Процедура фінансового банкрутства великого промислового металургійного
        заводу
      correct: false
  - question: Хто з перелічених професійних учасників має офіційне законне право представляти
      сторону обвинувачення в кримінальному суді?
    min_correct: 2
    options:
    - text: Державний призначений прокурор
      correct: true
    - text: Приватний найнятий адвокат
      correct: false
    - text: Офіційний державний обвинувач
      correct: true
    - text: Слідчий суддя відкритого місцевого суду
      correct: false
  - question: Які саме суди структурно входять до триступеневої системи загального
      судоустрою в Україні?
    min_correct: 3
    options:
    - text: Базові місцеві суди першої інстанції
      correct: true
    - text: Апеляційні суди областей та регіонів
      correct: true
    - text: Найвищий касаційний Верховний Суд України
      correct: true
    - text: Міжнародний Європейський суд з прав людини
      correct: false
    - text: Спеціалізований Конституційний Суд України
      correct: false
  - question: Які матеріали за законом вважаються документальними доказами під час
      офіційного судового процесу?
    min_correct: 3
    options:
    - text: Офіційно підписані контракти про комерційну оренду приміщення
      correct: true
    - text: Завірені банківські виписки по корпоративних рахунках
      correct: true
    - text: Фізичні знаряддя скоєного тяжкого кримінального злочину
      correct: false
    - text: Офіційні листи з відповідями від державних органів та установ
      correct: true
    - text: Цифрові відеозаписи з міських вуличних камер спостереження
      correct: false
  - question: Які конкретні рішення має право ухвалити суддя у цивільній справі після
      детального розгляду всіх зібраних доказів?
