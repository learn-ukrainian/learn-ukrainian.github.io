- type: essay-response
  title: 'Письмове завдання: аналіз правової ситуації та консультація клієнта'
  prompt: 'Уявіть, що ви працюєте помічником адвоката у великій юридичній фірмі. Ваш
    новий клієнт, власник малого бізнесу, хоче подати цивільний позов проти корпорації,
    яка не виконала умови підписаного контракту. Напишіть короткий офіційний лист-консультацію
    клієнту (150-250 слів), у якому чітко поясніть: 1) до якого саме суду буде подано
    позов (цивільного чи господарського, обґрунтуйте чому); 2) які конкретно документальні
    докази необхідно терміново зібрати для перемоги; 3) з яких основних етапів складатиметься
    майбутній судовий процес; 4) що юридично означає поняття "апеляція", якщо суд
    першої інстанції не задовольнить ваш спільний позов. Використовуйте виключно офіційно-діловий
    стиль та застосовуйте пасивні конструкції для надання тексту об''єктивності.'
  min_words: 150
  model_answer: 'Шановний клієнте! Відповідно до чинного законодавства України, Ваш
    спір стосується невиконання умов комерційного контракту. Оскільки Ви дієте як
    приватний підприємець, а відповідачем є юридична особа (корпорація), офіційний
    позов буде обов''язково подано до місцевого господарського суду, який спеціалізується
    виключно на економічних та бізнес-конфліктах. Для того щоб Ваш позов було гарантовано
    задоволено, нам необхідно терміново зібрати надійні документальні докази. До матеріалів
    господарської справи мають бути обов''язково долучені: оригінал підписаного обома
    сторонами контракту, банківські виписки про всі здійснені фінансові транзакції
    та офіційне електронне листування з уповноваженими представниками компанії-відповідача.
    Сам судовий процес розпочнеться з проведення підготовчого засідання. Після цього
    відбудеться детальний розгляд справи по суті, під час якого всі зібрані нами докази
    будуть ретельно досліджені головуючим суддею. На фінальному етапі пройдуть судові
    дебати адвокатів обох сторін, після чого судом буде ухвалено відповідне рішення.
    Хочу Вас запевнити: якщо рішення місцевого суду першої інстанції виявиться для
    нас несприятливим і наші законні позовні вимоги буде несподівано відхилено, ми
    маємо беззаперечне конституційне право оскаржити цей вердикт і подати апеляційну
    скаргу. В такому разі примусове виконання фінансового рішення буде автоматично
    призупинено, а наша справа переглядатиметься судом вищої інстанції. З повагою,
    Ваш адвокат.'
  rubric:
  - criteria: Використання професійної юридичної термінології
