- type: select
  title: 'Оберіть правильні варіанти: Канцелярит чи Природність?'
  instruction: 'У кожному завданні оберіть усі природні, небюрократичні фрази.'
  items:
    - question: 'Які з цих фраз є природними і не містять канцеляриту?'
      min_correct: 2
      options:
        - text: 'Ми вирішили підтримати цей проєкт.'
          correct: true
        - text: 'Було прийнято рішення щодо підтримки проєкту.'
          correct: false
        - text: 'Комітет схвалив запропоновані зміни.'
          correct: true
        - text: 'Здійснено забезпечення реалізації змін.'
          correct: false
    - question: 'Які з цих дієприкметників утворені правильно і є органічними для української мови?'
      min_correct: 2
      options:
        - text: 'Прочитаний'
          correct: true
        - text: 'Початкуючий'
          correct: false
        - text: 'Звільнений'
          correct: true
        - text: 'Існуючий'
          correct: false
    - question: 'Оберіть правильні колокації зі словом "аналіз":'
      min_correct: 2
      options:
        - text: 'Системний аналіз'
          correct: true
        - text: 'Робити аналіз'
          correct: false
        - text: 'Глибокий аналіз'
          correct: true
        - text: 'Приймати аналіз'
          correct: false
    - question: 'Які з цих речень використовують правильну безособову форму на -но/-то?'
      min_correct: 2
      options:
        - text: 'Завдання успішно виконано.'
          correct: true
        - text: 'Документ підписано директором.'
          correct: false
        - text: 'Книгу прочитано до кінця.'
          correct: true
        - text: 'Проєкт було затверджено нами.'
          correct: false
    - question: 'Оберіть правильні варіанти заміни слова "відміняти" (русизм у діловому контексті):'
      min_correct: 2
      options:
        - text: 'Скасовувати'
          correct: true
        - text: 'Анулювати'
          correct: true
        - text: 'Зупиняти'
          correct: false
        - text: 'Знімати'
          correct: false
    - question: 'Які слова належать до юридичного домену?'
      min_correct: 2
      options:
        - text: 'Протокол'
          correct: true
        - text: 'Постанова'
          correct: true
        - text: 'Підмет'
          correct: false
        - text: 'Присудок'
          correct: false
    - question: 'Які характеристики властиві сучасному стилю порталу "Дія"?'
      min_correct: 2
      options:
        - text: 'Орієнтованість на користувача'
          correct: true
        - text: 'Складні підрядні речення'
          correct: false
        - text: 'Короткі та зрозумілі інструкції'
          correct: true
        - text: 'Використання пасивних конструкцій'
          correct: false
    - question: 'Оберіть слова, які позначають абстрактні концепції в науковому дискурсі:'
      min_correct: 2
      options:
        - text: 'Поняття'
          correct: true
        - text: 'Синтез'
          correct: true
        - text: 'Договір'
          correct: false
        - text: 'Акт'
          correct: false

