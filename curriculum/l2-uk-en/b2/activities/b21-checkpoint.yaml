- type: reading
  id: reading-b2-checkpoint
  title: 'Уривок з аналітичного звіту'
  text: |
    Здійснений експертною групою системний аналіз показав необхідність реформування законодавчого процесу. Під час дослідження виявлено низку застарілих юридичних термінів, що ускладнюють розуміння документів громадянами. Запропоновано новий метод підготовки актів, який виключає надмірне використання канцеляриту. Проєкт відповідної постанови вже розроблено та передано на розгляд профільного комітету. Очікується, що впроваджені зміни значно пришвидшать обробку заяв та звітів. Фахівці, залучені до роботи, наголошують на важливості прозорості державного дискурсу.
  tasks:
    - 'Яка проблема була виявлена під час дослідження?'
    - 'Що пропонує новий метод підготовки актів?'
    - 'На якому етапі зараз знаходиться проєкт постанови?'
    - 'Який головний аргумент наводять залучені фахівці?'

- type: essay-response
  id: essay-1
  source_reading: reading-b2-checkpoint
  title: 'Есе: Дебюрократизація мови'
  prompt: 'Спираючись на прочитаний уривок, напишіть есе про важливість очищення офіційних документів від канцеляриту. Чому прозорість державного дискурсу є важливою для суспільства? Наведіть власні приклади складних бюрократичних фраз та їхніх зрозумілих відповідників.'
  min_words: 150
  model_answer: |
    Очищення офіційної мови від канцеляриту є критично важливим кроком для побудови відкритого діалогу між державою та громадянами. Застарілі юридичні терміни та важкі пасивні конструкції створюють бар'єр для розуміння. Як зазначено у звіті, новий метод підготовки актів має виключити ці недоліки. Наприклад, замість громіздкої фрази "було прийнято рішення щодо забезпечення реалізації проєкту" краще сказати "ми вирішили реалізувати проєкт". Прозорий дискурс підвищує рівень довіри суспільства до ухвалених постанов та наказів. Коли держава говорить зрозумілою мовою, процеси стають швидшими, а люди відчувають повагу до свого часу.
  rubric:
    - criteria: 'Змістове наповнення'
      description: 'Повне розкриття теми з наведенням власних прикладів.'
      points: 5
    - criteria: 'Стилістика та регістр'
      description: 'Використання академічного або публіцистичного регістру без стилістичних дисонансів.'
      points: 3
    - criteria: 'Лексичне багатство'
      description: 'Правильне використання доменної лексики (процес, метод, аналіз, термін).'
      points: 2

- type: true-false
  title: 'Правильно чи неправильно: Стилістика та Граматика'
  instruction: 'Визначте, чи є ці твердження про стилістику та граматику правильними.'
  items:
    - statement: 'Українська мова тяжіє до пасивних конструкцій більше, ніж до активних.'
      correct: false
      explanation: 'Навпаки, українська мова надає перевагу активним формам та прямій дії.'
    - statement: 'Конструкція "рішення було прийняте" є найкращим вибором для офіційного документа.'
      correct: false
      explanation: 'Це калька. Краще використовувати безособову форму: "рішення прийнято".'
    - statement: 'Дієприкметник позначає ознаку предмета за дією.'
      correct: true
      explanation: 'Так, це правильне визначення дієприкметника.'
    - statement: 'Слова на -учий, -ючий (наприклад, "працюючий") є органічними для української мови.'
      correct: false
      explanation: 'Цих форм радять уникати, замінюючи їх підрядними реченнями ("який працює").'
    - statement: 'Віддієслівний прикметник часто позначає постійну властивість, а не завершену дію.'
      correct: true
      explanation: 'Так, наприклад "нездоланний" — це той, кого в принципі неможливо здолати.'
    - statement: 'Канцелярит вважається ознакою високого стилю та ерудиції.'
      correct: false
      explanation: 'Канцелярит — це хвороба мови, перевантаження абстрактними іменниками та пасивом.'
    - statement: 'Безособові форми на -но, -то не змінюються за родами та числами.'
      correct: true
      explanation: 'Ці форми є незмінними.'
    - statement: 'У зворотному пасиві на -ся (наприклад, "будинок будується") можна додавати виконавця в орудному відмінку ("робітниками").'
      correct: false
      explanation: 'В українській мові додавати агента до таких дієслів є стилістичною помилкою.'
    - statement: 'Термін "аналіз" часто поєднується зі словом "системний".'
      correct: true
      explanation: 'Так, "системний аналіз" — це поширена і правильна колокація.'
    - statement: 'Портал "Дія" використовує максимально складну лексику для підкреслення офіційності.'
      correct: false
      explanation: 'Навпаки, портал використовує орієнтований на користувача, простий і зрозумілий стиль.'

- type: quiz
  title: 'Тест: Граматика і Регістри'
  instruction: 'Оберіть одну правильну відповідь на кожне запитання.'
  items:
    - question: 'Який варіант заміни є найкращим для вислову "захоплююча історія"?'
      explanation: 'Слово "захоплююча" є активним дієприкметником теперішнього часу, який краще замінити прикметником.'
      options:
        - text: 'історія, яку захоплюють'
          correct: false
        - text: 'історія захоплення'
          correct: false
        - text: 'захоплива історія'
          correct: true
        - text: 'захоплена історія'
          correct: false
    - question: 'Як правильно перебудувати речення "Проєкт розробляється талановитими архітекторами"?'
      explanation: 'Додавання виконавця в орудному відмінку до дієслів на -ся є помилкою.'
      options:
        - text: 'Проєкт розроблено архітекторами.'
          correct: false
        - text: 'Талановиті архітектори розробляють проєкт.'
          correct: true
        - text: 'Проєкт був розроблений архітекторами.'
          correct: false
        - text: 'Проєкт є розроблюваний архітекторами.'
          correct: false
    - question: 'Що з наведеного є прикладом правильної безособової форми?'
      explanation: 'Безособові форми закінчуються на -но, -то і є незмінними.'
      options:
        - text: 'Заяву було розглянуто.'
          correct: false
        - text: 'Заява розглянута.'
          correct: false
        - text: 'Заяву розглянуто.'
          correct: true
        - text: 'Заява була розглянута.'
          correct: false
    - question: 'Яка основна мета стилю мікрокопірайтингу, що використовується на державних порталах?'
      explanation: 'Мета — допомогти користувачеві вирішити проблему максимально швидко.'
      options:
        - text: 'Забезпечити юридичну складність тексту.'
          correct: false
        - text: 'Показати високий рівень ерудиції автора.'
          correct: false
        - text: 'Допомогти громадянину швидко вирішити проблему.'
          correct: true
        - text: 'Заховати відповідальність посадових осіб.'
          correct: false
    - question: 'У чому полягає різниця між дієприкметником та віддієслівним прикметником?'
      explanation: 'Дієприкметник позначає дію, а віддієслівний прикметник — постійну властивість.'
      options:
        - text: 'Дієприкметник вказує на постійну ознаку предмета.'
          correct: false
        - text: 'Віддієслівний прикметник позначає ознаку за дією.'
          correct: false
        - text: 'Дієприкметник має наголошений суфікс -енн-.'
          correct: false
        - text: 'Дієприкметник позначає дію, а прикметник — сталу властивість.'
          correct: true
    - question: 'Яке з цих слів ідеально підходить для позначення обробки зібраної інформації?'
      explanation: 'Аналіз передбачає детальний розгляд складових частин.'
      options:
        - text: 'Синтез'
          correct: false
        - text: 'Аналіз'
          correct: true
        - text: 'Поняття'
          correct: false
        - text: 'Договір'
          correct: false
    - question: 'У якому відмінку стоїть іменник після форми на -но, якщо він є прямим додатком?'
      explanation: 'Іменник після форм на -но, -то традиційно стоїть у знахідному відмінку без прийменника.'
      options:
        - text: 'У називному відмінку'
          correct: false
        - text: 'У родовому відмінку'
          correct: false
        - text: 'У знахідному відмінку'
          correct: true
        - text: 'В орудному відмінку'
          correct: false
    - question: 'Яке словосполучення є класичним прикладом радянського канцеляриту?'
      explanation: 'Нагромадження віддієслівних іменників є типовим канцеляритом.'
      options:
        - text: 'Швидке вирішення проблеми'
          correct: false
        - text: 'Процес організації забезпечення виконання'
          correct: true
        - text: 'Ухвалення нового закону'
          correct: false
        - text: 'Розгляд поданої заяви'
          correct: false
    - question: 'Що необхідно зробити зі складним реченням, яке займає більше трьох рядків тексту?'
      explanation: 'Довгі речення важко читати, їх слід розбивати на коротші.'
      options:
        - text: 'Залишити без змін для збереження стилю.'
          correct: false
        - text: 'Додати більше дієприкметникових зворотів.'
          correct: false
        - text: 'Розбити його на два або кілька простих речень.'
          correct: true
        - text: 'Видалити всі дієслова.'
          correct: false
    - question: 'Яка частина мови виконує функцію присудка в активному реченні?'
      explanation: 'В активному реченні дія виражається особовим дієсловом.'
      options:
        - text: 'Дієприкметник'
          correct: false
        - text: 'Особове дієслово'
          correct: true
        - text: 'Іменник'
          correct: false
        - text: 'Прислівник'
          correct: false

- type: fill-in
  title: 'Заповніть пропуски: Доменна лексика'
  instruction: 'Оберіть правильне слово для кожного речення.'
  items:
    - sentence: 'Під час засідання комітет ухвалив важливе _____.'
      answer: 'рішення'
      options: ['рішення', 'поняття', 'дослідження', 'термін']
    - sentence: 'Новий юридичний _____ потрібно додати до глосарію.'
      answer: 'термін'
      options: ['акт', 'договір', 'синтез', 'термін']
    - sentence: 'Документ успішно _____ і відправлено до архіву.'
      answer: 'підписано'
      options: ['підписано', 'підписаний', 'підписав', 'підписується']
    - sentence: 'Судовий _____ тривав кілька місяців через складність справи.'
      answer: 'процес'
      options: ['синтез', 'аналіз', 'процес', 'регістр']
    - sentence: 'Директор має _____ звільнити цього працівника за порушення дисципліни.'
      answer: 'повноваження'
      options: ['зобов''язання', 'повноваження', 'поняття', 'засідання']
    - sentence: 'Вчені використали інноваційний _____ для проведення цього експерименту.'
      answer: 'метод'
      options: ['наказ', 'акт', 'метод', 'канцелярит']
    - sentence: 'Звіт містить детальний _____ поточного стану економіки.'
      answer: 'аналіз'
      options: ['аналіз', 'синтез', 'підмет', 'процес']
    - sentence: 'Сьогодні ми підписали _____ про співпрацю з новою компанією.'
      answer: 'договір'
      options: ['заяву', 'дискурс', 'договір', 'канцелярит']
    - sentence: 'Кожна сторона має виконувати свої _____ вчасно.'
      answer: 'зобов''язання'
      options: ['повноваження', 'дослідження', 'зобов''язання', 'терміни']
    - sentence: 'Офіційний _____ зустрічі буде опубліковано на сайті міністерства.'
      answer: 'протокол'
      options: ['протокол', 'додаток', 'дискурс', 'регістр']

- type: unjumble
  title: 'Складіть речення: Офіційний стиль'
  instruction: 'Розташуйте слова у правильному порядку, щоб утворити граматично правильне речення.'
  items:
    - words: ['дослідники', 'проаналізували', 'всі', 'зібрані', 'дані', 'дуже', 'ретельно']
      answer: 'Дослідники дуже ретельно проаналізували всі зібрані дані.'
    - words: ['комітет', 'ухвалив', 'остаточне', 'рішення', 'після', 'довгих', 'дискусій']
      answer: 'Комітет ухвалив остаточне рішення після довгих дискусій.'
    - words: ['профільне', 'міністерство', 'успішно', 'розробило', 'цей', 'новий', 'закон']
      answer: 'Профільне міністерство успішно розробило цей новий закон.'
    - words: ['ми', 'провели', 'детальний', 'аналіз', 'останніх', 'економічних', 'показників']
      answer: 'Ми провели детальний аналіз останніх економічних показників.'
    - words: ['цей', 'юридичний', 'термін', 'потребує', 'більш', 'точного', 'визначення']
      answer: 'Цей юридичний термін потребує більш точного визначення.'
    - words: ['судовий', 'процес', 'завершився', 'оголошенням', 'вироку', 'для', 'підозрюваного']
      answer: 'Судовий процес завершився оголошенням вироку для підозрюваного.'
    - words: ['автори', 'проєкту', 'запропонували', 'абсолютно', 'новий', 'науковий', 'метод']
      answer: 'Автори проєкту запропонували абсолютно новий науковий метод.'
    - words: ['секретар', 'має', 'опублікувати', 'офіційний', 'протокол', 'засідання', 'завтра']
      answer: 'Секретар має опублікувати офіційний протокол засідання завтра.'

- type: error-correction
  title: 'Виправте стилістичні помилки'
  instruction: 'Знайдіть та виправте русизми, канцелярит або граматичні кальки.'
  items:
    - sentence: 'Проєкт був успішно завершений нашою командою.'
      error: 'був успішно завершений нашою командою'
      answer: 'успішно завершила наша команда'
      error_type: 'construction'
      options: ['успішно завершила наша команда', 'було успішно завершено нашою командою', 'успішно завершився нашою командою', 'завершений нашою командою успішно']
      explanation: 'Краще використовувати активну конструкцію: "Наша команда успішно завершила проєкт".'
    - sentence: 'Наказ було підписано директором учора вранці.'
      error: 'було підписано директором'
      answer: 'підписав директор'
      error_type: 'construction'
      options: ['підписав директор', 'був підписаний директором', 'підписано директором', 'є підписаним директором']
      explanation: 'Безособові форми на -но/-то не вживаються з виконавцем в орудному відмінку. Правильно: "Директор підписав наказ".'
    - sentence: 'Засідання комітету відміняється через хворобу голови.'
      error: 'відміняється'
      answer: 'скасовується'
      error_type: 'word'
      options: ['скасовується', 'відміняють', 'зупиняється', 'переноситься']
      explanation: '"Відміняється" — це русизм у цьому контексті. Заходи "скасовуються".'
    - sentence: 'Ми прийняли рішення почати роботу.'
      error: 'прийняли рішення'
      answer: 'вирішили'
      error_type: 'phrase'
      options: ['вирішили', 'зробили рішення', 'взяли рішення', 'погодилися']
      explanation: 'Канцелярський вираз "прийняти рішення" краще замінювати звичайним дієсловом "вирішити".'
    - sentence: 'Кожен працюючий студент має право на відпустку.'
      error: 'працюючий студент'
      answer: 'студент, який працює,'
      error_type: 'phrase'
      options: ['студент, який працює,', 'студент у роботі', 'робочий студент', 'працюваний студент']
      explanation: 'Активні дієприкметники теперішнього часу є калькою. Слід замінювати їх підрядним реченням.'
    - sentence: 'Я подав заяву на отримання компенсації.'
      error: 'заяву на отримання'
      answer: 'заяву про отримання'
      error_type: 'phrase'
      options: ['заяву про отримання', 'заяву до отримання', 'заяву для отримання', 'заяву щодо отримання']
      explanation: 'Заява подається "про" щось, а не "на" щось.'
    - sentence: 'Ця стаття вміщує багато цікавої інформації.'
      error: 'вміщує'
      answer: 'містить'
      error_type: 'word'
      options: ['містить', 'має', 'включає', 'зберігає']
      explanation: 'Текст, стаття або документ "містить" інформацію, а не "вміщує" (вміщує посудина).'
    - sentence: 'Ми приймаємо участь у новому державному проєкті.'
      error: 'приймаємо'
      answer: 'беремо'
      error_type: 'word'
      options: ['беремо', 'робимо', 'маємо', 'відіграємо']
      explanation: 'Правильна українська колокація — "брати участь".'

- type: match-up
  title: 'Знайдіть пару: Терміни та їхні визначення'
  instruction: 'Поєднайте доменні слова з їхнім правильним значенням.'
  pairs:
    - left: 'Аналіз'
