- type: cloze
  title: 'Заповніть пропуски в тексті: Розвиток мови'
  instruction: 'Оберіть правильні слова, щоб відновити зв''язний текст про сучасний офіційний стиль.'
  passage: 'Сучасна українська офіційна мова переживає стилістичну революцію. Ми поступово відмовляємося від радянського {{1}}, який характеризувався важкими конструкціями. Сьогодні {{2}} стають прозорішими. Замість фрази "рішення було прийняте" ми пишемо "{{3}} прийнято" або використовуємо {{4}} стан: "комітет ухвалив рішення". Такий {{5}} до написання текстів робить комунікацію ефективнішою. Коли державний орган готує новий {{6}}, він має орієнтуватися на читача. Складні {{7}} терміни слід пояснювати простою мовою. Наприклад, на порталі "Дія" ви не знайдете довгих речень, які містять зайві {{8}}. Там використовуються чіткі інструкції та {{9}} дієслова. Водночас {{10}} дискурс зберігає свою специфіку. Тут {{11}} форм на -но та -то є цілком виправданим, оскільки важливим є об''єкт, а не виконавець дії. Проте навіть у наукових статтях дослідники все частіше пишуть "ми провели {{12}}", а не "дослідження було проведено". Розуміння того, який {{13}} застосувати в конкретній ситуації, є ознакою високого рівня володіння мовою. Знання граматичних правил допомагає уникати помилок в узгодженні, коли ви використовуєте {{14}} зворот. Також важливо розрізняти {{15}} і віддієслівний прикметник. Усі ці навички формують вашу професійну {{16}}.'
  blanks:
    - id: 1
      answer: 'канцеляриту'
