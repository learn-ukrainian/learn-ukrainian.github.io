- type: reading
  id: reading-climate-change
  title: 'Первинне джерело: Звіт про кліматичні зміни'
  instruction: 'Прочитайте уривок з наукового звіту для подальшого аналізу.'
  text: |
    Систематичний аналіз метеорологічних даних за останнє десятиліття підтверджує стійку тенденцію до підвищення середньорічної температури. Цей незворотний процес зумовлює необхідність термінової адаптації міської інфраструктури. Очікується збільшення частоти екстремальних атмосферних опадів, що вимагає впровадження інноваційних методів управління водними ресурсами.
  tasks:
    - 'Яка головна тенденція описана у звіті?'
    - 'Який процес називають незворотним?'
    - 'Чому потрібна адаптація міської інфраструктури?'
    - 'Що вимагає впровадження нових методів?'

- type: essay-response
  title: 'Есе: Трансформація звіту'
  source_reading: reading-climate-change
  prompt: 'Перепишіть поданий науковий уривок про кліматичні зміни у розмовному стилі, уявивши, що ви розповідаєте цю новину другові під час зустрічі. Використайте розмовну лексику, прості речення та емоційні вигуки.'
  min_words: 150
  model_answer: 'Ой, слухай, тут такі новини читали про погоду! Кажуть, що з кожним роком стає все тепліше, і це вже ніяк не зупинити. Нашому місту треба терміново щось із цим робити, бо скоро будемо плавати після кожної нормальної зливи. Обіцяють, що дощі будуть ще сильнішими та частішими. Через це доведеться повністю міняти труби і стоки, щоб уся ця вода кудись стікала. Уявляєш, що нас чекає? Це просто якийсь жах, якщо чесно. Треба вже зараз думати, як ми будемо з цим жити далі.'
  rubric:
    - criteria: 'Зміна лексики'
      description: 'Заміна наукових термінів на загальновживані слова.'
      points: 4
    - criteria: 'Синтаксична адаптація'
      description: 'Використання простих речень, еліпсису.'
      points: 3
    - criteria: 'Природність'
      description: 'Текст звучить як справжня емоційна розмова.'
      points: 3

- type: true-false
  title: 'Функціональні стилі: правда чи міф'
  instruction: 'Визначте, чи є твердження правильними.'
  items:
    - statement: 'Науковий стиль допускає використання емоційної лексики для впливу на читача.'
      correct: false
      explanation: 'Науковий стиль вимагає абсолютної об''єктивності та відсутності емоцій.'
    - statement: 'Канцелярит — це штучна, бюрократична мова, якої слід уникати у повсякденному спілкуванні.'
      correct: true
      explanation: 'Сучасна тенденція — відмова від канцеляриту на користь зрозумілої мови.'
    - statement: 'Еліпсис (пропуск слів) є грубою граматичною помилкою у розмовному стилі.'
      correct: false
      explanation: 'Еліпсис є природним синтаксичним механізмом неформального спілкування.'
    - statement: 'Публіцистичний стиль поєднує точне інформування з емоційним впливом.'
      correct: true
      explanation: 'Це ключова особливість текстів засобів масової інформації.'
    - statement: 'Словосполучення «вільна вакансія» є стилістично правильною конструкцією.'
      correct: false
      explanation: 'Це типовий плеоназм, оскільки вакансія вже означає вільну посаду.'
    - statement: 'Номіналізація (утворення віддієслівних іменників) характерна для наукового стилю.'
      correct: true
      explanation: 'Наприклад, «ми дослідили» стає офіційним «було проведено дослідження».'
    - statement: 'Офіційно-діловий стиль допускає двозначність для гнучкості інтерпретації.'
      correct: false
      explanation: 'Цей стиль вимагає абсолютної стандартизації та однозначності.'
    - statement: 'Використання складних пасивних конструкцій у дружньому повідомленні є стилістичним дисонансом.'
      correct: true
      explanation: 'Складна граматика в неформальній розмові виглядає неприродно і комічно.'
    - statement: 'Невідповідний стилістичний регістр може використовуватися в художньому творі для створення комічного ефекту.'
      correct: true
      explanation: 'Яскравий приклад — мова Возного у п''єсі «Наталка Полтавка».'
    - statement: 'В офіційному листуванні вважається правильним писати «згідно наказу».'
      correct: false
      explanation: 'Правильна українська форма керування — «згідно з наказом».'

- type: error-correction
  title: 'Виправлення русизмів та канцеляризмів'
  instruction: 'Знайдіть та виправте стилістичну або лексичну помилку в кожному реченні.'
  items:
    - sentence: 'Ми маємо приймати участь у цьому важливому проєкті.'
      error: 'приймати участь'
      answer: 'брати участь'
      error_type: 'phrase'
      options:
        - 'брати участь'
        - 'робити участь'
        - 'мати участь'
        - 'давати участь'
      explanation: 'Українською правильно говорити «брати участь».'
    - sentence: 'Згідно розпорядження директора, завтра вихідний день.'
      error: 'Згідно розпорядження'
      answer: 'Згідно з розпорядженням'
      error_type: 'phrase'
      options:
        - 'Згідно з розпорядженням'
        - 'Відповідно розпорядження'
        - 'По розпорядженню'
        - 'За розпорядженням'
      explanation: 'Правильне керування: «згідно з чимось» або «відповідно до чогось».'
    - sentence: 'Це самий кращий метод проведення наукового дослідження.'
      error: 'самий кращий'
      answer: 'найкращий'
      error_type: 'phrase'
      options:
        - 'найкращий'
        - 'більш кращий'
        - 'дуже кращий'
        - 'найбільш кращий'
      explanation: 'Ступені порівняння з часткою «самий» є калькою з російської мови.'
    - sentence: 'У травні місяці ми плануємо завершити цей етап роботи.'
      error: 'травні місяці'
      answer: 'травні'
      error_type: 'phrase'
      options:
        - 'травні'
        - 'місяці травні'
        - 'п''ятому місяці'
        - 'травневому місяці'
      explanation: 'Це типовий плеоназм. Слово «травень» вже самостійно позначає місяць.'
    - sentence: 'Для працевлаштування потрібна ваша своя автобіографія.'
      error: 'своя автобіографія'
      answer: 'автобіографія'
      error_type: 'phrase'
      options:
        - 'автобіографія'
        - 'власна автобіографія'
        - 'особиста біографія'
        - 'своя біографія'
      explanation: 'Слово «автобіографія» вже означає опис власного життя.'
    - sentence: 'У нашому відділі з''явилася вільна вакансія менеджера.'
      error: 'вільна вакансія'
      answer: 'вакансія'
      error_type: 'phrase'
      options:
        - 'вакансія'
        - 'відкрита вакансія'
        - 'порожня вакансія'
        - 'нова посада'
      explanation: 'Слово «вакансія» вже містить у собі значення «вільна посада».'
    - sentence: 'Мною було прийнято рішення змінити плани на ці вихідні.'
      error: 'Мною було прийнято рішення'
      answer: 'Я вирішив'
      error_type: 'phrase'
      options:
        - 'Я вирішив'
        - 'Було прийнято'
        - 'Прийнялося рішення'
        - 'Я постановив'
      explanation: 'Пасивні конструкції з «мною» у розмовній мові — це канцелярит, якого слід уникати.'
    - sentence: 'Це складне питання абсолютно не відноситься до нашої теми.'
      error: 'не відноситься'
      answer: 'не стосується'
      error_type: 'phrase'
      options:
        - 'не стосується'
        - 'не належить'
        - 'не прилягає'
        - 'не підходить'
      explanation: 'Значення «мати стосунок до чогось» передається дієсловом «стосуватися».'

- type: quiz
  title: 'Особливості функціональних стилів'
  instruction: 'Оберіть правильну відповідь до кожного запитання.'
  items:
    - question: 'Який стиль покликаний точно передавати об''єктивні знання без зайвих емоцій?'
      options:
        - text: 'Науковий стиль'
          correct: true
        - text: 'Публіцистичний стиль'
          correct: false
        - text: 'Офіційно-діловий стиль'
          correct: false
        - text: 'Розмовний стиль'
          correct: false
      explanation: 'Саме науковий стиль вимагає абсолютної об''єктивності та точності викладу фактів.'
    - question: 'Що таке номіналізація в контексті вивчення мовного стилю?'
      options:
        - text: 'Перетворення дієслів на абстрактні віддієслівні іменники'
          correct: true
        - text: 'Використання великої кількості художніх синонімів'
          correct: false
        - text: 'Пропуск слів, які можна легко відновити з контексту'
          correct: false
        - text: 'Називання всіх предметів їхніми власними іменами'
          correct: false
      explanation: 'Номіналізація — це процес утворення іменників від дієслів (наприклад, досліджувати -> дослідження).'
    - question: 'Яка головна вимога висувається до текстів офіційно-ділового стилю?'
      options:
        - text: 'Абсолютна стандартизація та однозначність тлумачення'
          correct: true
        - text: 'Емоційний вплив на читача та яскрава образність'
          correct: false
        - text: 'Використання складної філософської метафорики'
          correct: false
        - text: 'Спонтанність викладу та максимальна стислість'
          correct: false
      explanation: 'Офіційний документ не повинен допускати подвійного прочитання, щоб уникнути юридичних наслідків.'
    - question: 'Що таке еліпсис як синтаксичне явище у розмовному стилі?'
      options:
        - text: 'Навмисний пропуск очевидних слів для швидкості комунікації'
          correct: true
        - text: 'Використання емоційних зменшувально-пестливих слів'
          correct: false
        - text: 'Стилістична помилка дублювання вже сказаних значень'
          correct: false
        - text: 'Різновид яскравого емоційного вигуку'
          correct: false
      explanation: 'Еліпсис робить розмовне спілкування динамічним, опускаючи очевидні з контексту слова.'
    - question: 'Який мовний інструмент є ключовим для створення естетичного образу в художньому тексті?'
      options:
        - text: 'Метафори та різноманітні епітети'
          correct: true
        - text: 'Стандартизовані бюрократичні кліше'
          correct: false
        - text: 'Чіткі однозначні терміни та поняття'
          correct: false
        - text: 'Складні риторичні запитання'
          correct: false
      explanation: 'Художні тропи (метафори, епітети, порівняння) є основою виразності художнього стилю.'
    - question: 'Як називається стилістична помилка, при якій використовуються зайві слова, що дублюють зміст?'
      options:
        - text: 'Плеоназм'
          correct: true
        - text: 'Номіналізація'
          correct: false
        - text: 'Канцелярит'
          correct: false
        - text: 'Еліпсис'
          correct: false
      explanation: 'Плеоназм — це стилістична надмірність слів, наприклад, у словосполученні «вільна вакансія».'
    - question: 'Для якого функціонального стилю характерний принцип «перевернутої піраміди» (найважливіше на початку)?'
      options:
        - text: 'Публіцистичного стилю'
          correct: true
        - text: 'Наукового стилю'
          correct: false
        - text: 'Художнього стилю'
          correct: false
        - text: 'Офіційно-ділового стилю'
          correct: false
      explanation: 'У журналістиці найголовніша інформація завжди подається в заголовку та вступному ліді.'
    - question: 'Яка синтаксична особливість є найбільш типовою та поширеною для наукових текстів?'
      options:
        - text: 'Пасивні та об''єктивні безособові конструкції'
          correct: true
        - text: 'Короткі неповні розмовні речення'
          correct: false
        - text: 'Велика кількість риторичних запитань'
          correct: false
        - text: 'Пряма мова та активні діалоги'
          correct: false
      explanation: 'Безособові конструкції допомагають створити дистанцію та підкреслити об''єктивний характер інформації.'
    - question: 'Яким словом описують штучну, перевантажену штампами мову, що є спадком радянської бюрократії?'
      options:
        - text: 'Канцелярит'
          correct: true
        - text: 'Публіцистика'
          correct: false
        - text: 'Стилістика'
          correct: false
        - text: 'Термінологія'
          correct: false
      explanation: 'Канцелярит засмічує повсякденну мову складними, штучними та неживими зворотами.'
    - question: 'Який функціональний стиль найбільше залежить від позамовного контексту спілкування (міміки, жестів)?'
      options:
        - text: 'Розмовний стиль'
          correct: true
        - text: 'Художній стиль'
          correct: false
        - text: 'Науковий стиль'
          correct: false
        - text: 'Офіційно-діловий стиль'
          correct: false
      explanation: 'У неформальній розмові багато сенсів передається невербально або вони є очевидними для обох сторін.'

- type: match-up
  title: 'Співвіднесення термінів та визначень'
  instruction: 'Знайдіть логічну пару до кожного поняття.'
  pairs:
    - left: 'Номіналізація'
      right: 'Перетворення дієслів на іменники'
    - left: 'Плеоназм'
      right: 'Стилістична помилка дублювання сенсу'
    - left: 'Еліпсис'
      right: 'Пропуск слів для пришвидшення комунікації'
    - left: 'Канцелярит'
      right: 'Штучна мова бюрократичних штампів'
    - left: 'Термін'
      right: 'Слово, що точно позначає наукове поняття'
    - left: 'Метафора'
      right: 'Перенесення властивостей за логічною схожістю'
    - left: 'Епітет'
      right: 'Художнє означення для яскравості образу'
    - left: 'Лід'
      right: 'Вступний абзац новини, що містить головне'
    - left: 'Кліше'
      right: 'Стандартизована формула в документах'
    - left: 'Дисонанс'
      right: 'Невідповідність мовних засобів ситуації'

- type: fill-in
  title: 'Доречна лексика у реченнях'
  instruction: 'Вставте найбільш доречне слово у кожне речення.'
  items:
    - sentence: 'Для публікації наукової статті нам потрібно глибоко проаналізувати цей складний _________.'
      answer: 'процес'
      options:
        - 'процес'
        - 'метод'
        - 'плеоназм'
        - 'еліпсис'
      explanation: 'Слово процес чудово піддається аналізу, це типова наукова сполучуваність.'
    - sentence: 'Журналіст навмисно обрав дуже емоційний та яскравий _________ для своєї ранкової статті.'
      answer: 'заголовок'
      options:
        - 'заголовок'
        - 'термін'
        - 'канцелярит'
        - 'метод'
      explanation: 'Заголовок є ключовим інструментом залучення уваги публіцистичного тексту.'
    - sentence: 'У цій заяві занадто багато штампів, це класичний радянський _________.'
      answer: 'канцелярит'
      options:
        - 'канцелярит'
        - 'синтез'
        - 'еліпсис'
        - 'епітет'
      explanation: 'Канцелярит — це мова сухих бюрократичних штампів.'
    - sentence: 'Викладач не зміг чітко пояснити нове фундаментальне _________ своїм першокурсникам.'
      answer: 'поняття'
      options:
        - 'поняття'
        - 'кліше'
        - 'дослідження'
        - 'опади'
      explanation: 'Студентам зазвичай пояснюють складні наукові поняття.'
    - sentence: 'У художньому стилі сучасний письменник активно використовує _________, щоб створити настрій.'
      answer: 'метафори'
      options:
        - 'метафори'
        - 'терміни'
        - 'кліше'
        - 'плеоназми'
      explanation: 'Саме метафори створюють глибокі художні образи в літературі.'
    - sentence: 'Цей інноваційний аналітичний _________ дозволяє проводити експерименти значно швидше.'
      answer: 'метод'
      options:
        - 'метод'
        - 'процес'
        - 'термін'
        - 'канцелярит'
      explanation: 'Експерименти завжди проводять за допомогою певних методів.'
    - sentence: 'Поширений вираз «вільна вакансія» — це типовий _________, якого розумним людям слід уникати.'
      answer: 'плеоназм'
      options:
        - 'плеоназм'
        - 'термін'
        - 'еліпсис'
        - 'канцелярит'
      explanation: 'Це словосполучення дублює зміст, тому воно вважається плеоназмом.'
    - sentence: 'Щоб звіт не був надто сухим, редактор змінив офіційну _________ на більш публіцистичну.'
      answer: 'лексику'
      options:
        - 'лексику'
        - 'аудиторію'
