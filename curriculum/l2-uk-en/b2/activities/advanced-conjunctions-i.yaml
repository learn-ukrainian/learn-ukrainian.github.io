    - дякуючи
    - навколо
  - id: 5
    answer: допусту
    options:
    - допусту
    - причини
    - наслідку
    - мети
  - id: 6
    answer: попри
    options:
    - попри
    - незважаючи
    - хоча
    - дарма
  - id: 7
    answer: Оскільки
    options:
    - Оскільки
    - Бо
    - Хоч
    - Тому
  - id: 8
    answer: у зв'язку з
    options:
    - у зв'язку з
