- type: error-correction
  title: 'Лабораторія редагування: викорінення русизмів та помилок'
  instruction: Знайдіть граматичну чи стилістичну помилку у використанні сполучників
    і прийменників та оберіть правильний варіант.
  items:
  - sentence: Проект був призупинений із-за того, що фінансування закінчилося.
    error: із-за того, що
    answer: через те що
    error_type: phrase
    options:
    - через те що
    - завдяки тому що
    - незважаючи на те що
    - томущо
    explanation: '''Із-за'' — грубий русизм. Нормативним варіантом для причини є ''через
      те що''.'
  - sentence: Компанія збанкрутувала дякуючи некомпетентності менеджерів.
    error: дякуючи
    answer: через
    error_type: word
    options:
    - через
    - із-за
    - завдяки
    - попри
    explanation: Для негативних причин не можна використовувати слова з коренем подяки.
  - sentence: Суддя відхилив клопотання, томущо адвокат не надав доказів.
    error: томущо
    answer: тому що
    error_type: word
    options:
    - тому що
    - оскільки
    - бо
    - із-за того що
    explanation: Сполучник 'тому що' завжди пишеться як два слова.
  - sentence: Він досяг великого успіху в бізнесі не дивлячись на юний вік.
    error: не дивлячись на
    answer: незважаючи на
    error_type: phrase
    options:
    - незважаючи на
    - із-за
    - через
    - завдяки
    explanation: '''Не дивлячись на'' — це калька. Правильний допустовий прийменник
      — ''незважаючи на'' або ''попри''.'
  - sentence: Із-за сильного шторму аеропорт скасував усі міжнародні рейси.
    error: Із-за
    answer: Через
    error_type: word
    options:
    - Через
    - Дякуючи
    - Завдяки
    - Попри
    explanation: Знову ж таки, вказуючи на причину, треба використовувати прийменник
      'Через'.
  - sentence: Діти з цікавістю визирали через паркану, спостерігаючи за будівельниками.
    error: через
    answer: з-за
    error_type: word
    options:
    - з-за
    - із-за
    - попри
    - завдяки
    explanation: Для позначення фізичного руху з-поза перешкоди використовується просторовий
      прийменник 'з-за'.
  - sentence: Попри складні обставини, ми змогли підписати цей контракт.
    error: обставини, ми
    answer: обставини ми
    error_type: construction
    options:
    - обставини ми
    - обставин, ми
    - обставини; ми
    - обставинам, ми
    explanation: Коли 'попри' виступає прийменником у простому реченні, кома після
      звороту не ставиться.
  - sentence: Він програв справу тільки томущо суддя проігнорував свідка.
    error: томущо
    answer: тому, що
    error_type: construction
    options:
    - тому, що
    - тому що
    - оскільки
    - бо
    explanation: 'Коли є видільне слово ''тільки'', сполучник треба розірвати комою:
      ''тільки тому, що''.'
- type: select
  title: Аналіз семантики та стилістики
  instruction: Оберіть усі правильні варіанти для кожного запитання.
  items:
