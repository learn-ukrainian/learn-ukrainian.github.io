- type: essay-response
  title: Складання аргументативного параграфа
  instruction: Уявіть себе юридичним аналітиком. Напишіть короткий параграф (від 150
    слів), обґрунтовуючи необхідність подачі апеляції в складній судовій справі. Використайте
    сполучники 'оскільки', 'незважаючи на те що' (або 'попри те що'), 'через' та 'тому
    що'.
  prompt: Напишіть обґрунтування для ради директорів щодо подачі апеляції.
  min_words: 150
  model_answer: Оскільки суд першої інстанції ухвалив рішення, яке відверто суперечить
    чинному національному законодавству та наявній судовій практиці, наша компанія
    зобов'язана негайно подати апеляційну скаргу. Попри те що судовий процес може
    суттєво затягнутися на кілька довгих місяців, вимагаючи залучення додаткових фінансових
    і кадрових ресурсів, ми маємо всі об'єктивні шанси на повний успіх. Протягом останнього
    року ми зазнали значних репутаційних збитків через абсолютно необґрунтовані та
    маніпулятивні звинувачення з боку агресивного позивача. Наша юридична команда
    наполягає на безкомпромісному продовженні правової боротьби саме тому, що в матеріалах
    справи містяться беззаперечні документальні докази нашої абсолютної правоти. Незважаючи
    на безпрецедентний тиск із боку впливових конкурентів та негативний інформаційний
    фон у засобах масової інформації, ми не можемо відступити або погодитися на сумнівну
    мирову угоду, адже цей правовий прецедент матиме вирішальний стратегічний вплив
    на весь галузевий ринок. Тому наша юридична стратегія залишається твердою і незмінною,
    і ми цілком готові аргументовано доводити свою легітимну позицію у вищих судових
    інстанціях, ефективно використовуючи весь наявний правовий інструментарій та експертний
    аналіз.
  rubric:
  - criteria: Використання сполучників
    description: Чи правильно і доречно використані вказані причинові та допустові
      сполучники?
    points: 5
  - criteria: Стилістика
    description: Чи витримано офіційно-діловий та аналітичний регістр (без русизмів
      і просторіч)?
    points: 3
  - criteria: Обсяг
    description: Чи відповідає текст вимозі у 150 слів?
    points: 2
