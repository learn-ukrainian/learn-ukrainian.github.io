- type: reading
  title: Аналіз прецеденту
  instruction: Прочитайте фрагмент аналітичного звіту та дайте відповіді на запитання.
  text: Оскільки макроекономічні показники в регіоні демонструють ознаки стабілізації,
    наша компанія повинна діяти на випередження. Хоча первинні інвестиційні ризики
    залишаються об'єктивно високими, експерти відділу стратегічного планування вважають
    цей напрямок надзвичайно перспективним. Ми не маємо права згортати діяльність
    лише тому, що конкуренти обрали тактику пасивного очікування. Попри відсутність
    ідеальних стартових умов, наша унікальна бізнес-модель дозволить захопити ринок,
    через те що ми пропонуємо інноваційний продукт.
  tasks:
  - Який сполучник використано для встановлення головної причини (передумови) на початку
    тексту?
  - Як автор вводить інформацію про інвестиційні ризики?
  - Чому компанія не повинна згортати свою діяльність?
  - Яка конструкція пояснює фінальний аргумент про захоплення ринку?
- type: true-false
  title: Стилістика та правопис сполучників
  items:
  - statement: Сполучник 'тому що' завжди має емоційне забарвлення і використовується
      лише в розмовному стилі.
    correct: false
    explanation: '''Тому що'' є абсолютно нейтральним і підходить для будь-якого контексту.'
  - statement: Слово 'томущо' в українській мові не існує, цей сполучник завжди пишеться
      окремо.
    correct: true
    explanation: 'Це фундаментальне правило орфографії: ''тому що'' пишеться як два
      слова.'
  - statement: Сполучник 'оскільки' найчастіше ставиться на початку речення для задання
      дедуктивної рамки.
    correct: true
    explanation: Ця позиція допомагає встановити передумову перед тим, як зробити
      висновок.
  - statement: Прийменник 'із-за' є нормативним для вираження причини в діловому мовленні.
    correct: false
    explanation: Використання 'із-за' для причини є грубим русизмом. Правильно використовувати
      'через'.
  - statement: Конструкцію 'дякуючи хворобі' можна вживати в офіційних медичних звітах.
    correct: false
    explanation: 'Слово ''завдяки'' (або калька ''дякуючи'') використовується лише
      для позитивних причин. Правильно: ''через хворобу''.'
  - statement: Сполучник 'бо' є маркером живої, усної та більш емоційної комунікації.
    correct: true
    explanation: Він скорочує дистанцію між мовцем і слухачем.
  - statement: Допустові конструкції виражають дію, яка відбувається всупереч обставинам.
    correct: true
    explanation: Вони описують подолання перешкод, наприклад, за допомогою слова 'хоча'.
  - statement: Конструкція 'незважаючи на те що' використовується переважно в неофіційних
      дружніх розмовах.
    correct: false
    explanation: Це класичний важкий сполучник для юридичного та офіційно-ділового
      стилю.
  - statement: Прийменник 'попри' в сучасному публіцистичному стилі часто замінює
      довге 'незважаючи на'.
    correct: true
    explanation: '''Попри'' є більш коротким, енергійним і динамічним.'
  - statement: Кома перед 'тому що' завжди ставиться лише перед словом 'що'.
    correct: false
    explanation: Кома може ставитися перед усім сполучником ('..., тому що') або розривати
      його ('... тому, що') для логічного акценту на причині.
  instruction: Визначте, чи твердження правильне.
- type: quiz
  title: Вибір правильного сполучника
  items:
  - question: Який сполучник найкраще підходить для формального початку ухвали Верховного
      Суду?
    explanation: '''Оскільки'' задає тон інтелектуальної переваги та офіційності.'
    options:
    - text: оскільки
      correct: true
    - text: бо
      correct: false
    - text: через те що
      correct: false
    - text: хоча
      correct: false
  - question: Який прийменник слід обрати для вираження причини з негативним наслідком
      (наприклад, скасування рейсу)?
    explanation: Для негативних причин використовується лише прийменник 'через'.
    options:
    - text: через
      correct: true
    - text: дякуючи
      correct: false
    - text: завдяки
      correct: false
    - text: із-за
      correct: false
  - question: Як правильно написати складений сполучник, що вказує на причину дії?
    explanation: Сполучник 'тому що' завжди пишеться як два окремих слова.
    options:
    - text: тому що
      correct: true
    - text: томущо
      correct: false
    - text: тому-що
      correct: false
    - text: то-му-що
      correct: false
  - question: Яке з поданих слів має яскраво виражений художньо-публіцистичний та
      емоційний відтінок допусту?
    explanation: '''Дарма що'' додає тексту поблажливої або іронічної інтонації.'
    options:
    - text: дарма що
      correct: true
    - text: незважаючи на
      correct: false
    - text: у зв'язку з тим що
      correct: false
    - text: через те що
      correct: false
  - question: У якому реченні кома розриває сполучник для логічного акценту на самій
      причині?
    explanation: 'Розрив сполучника переносить наголос на причину: не за те, а тільки
      тому, що.'
    options:
    - text: Він отримав догану тільки тому, що намагався приховати факт.
      correct: true
    - text: Він отримав догану, тому що намагався приховати факт.
      correct: false
    - text: Він отримав догану, через те що приховав факт.
      correct: false
    - text: Він отримав догану, бо приховав факт.
      correct: false
  - question: Яка конструкція є найбільш універсальною та стилістично нейтральною
      для вираження допусту?
    explanation: '''Хоча'' є найпоширенішим і найуніверсальнішим засобом для допустових
      відношень.'
    options:
    - text: хоча
      correct: true
    - text: попри те що
      correct: false
    - text: незважаючи на те що
      correct: false
    - text: дарма що
      correct: false
  - question: Який прийменник вказує виключно на фізичне переміщення в просторі з-поза
      перешкоди?
    explanation: '''З-за'' або ''із-за'' використовується тільки для просторових відношень
      (наприклад, з-за рогу).'
    options:
    - text: з-за
      correct: true
    - text: через
      correct: false
    - text: завдяки
      correct: false
    - text: попри
      correct: false
  - question: Який варіант є абсолютно неприпустимим русизмом при позначенні причини
      фінансових збитків?
    explanation: '''Із-за'' у значенні причини — це грубе порушення української літературної
      норми.'
    options:
    - text: із-за помилок
      correct: true
    - text: через помилки
      correct: false
    - text: унаслідок помилок
      correct: false
    - text: з причини помилок
      correct: false
  - question: Який сполучник найкраще підходить для швидкої, емоційної відповіді під
      час перехресного допиту?
    explanation: '''Бо'' надає мовленню швидкості та є типовим для усної комунікації.'
    options:
    - text: бо
      correct: true
    - text: оскільки
      correct: false
    - text: через те що
      correct: false
    - text: у зв'язку з тим що
      correct: false
  - question: Яка конструкція вносить у текст найвищий ступінь канцелярської ваги
      та формальності?
    explanation: '''У зв''язку з тим що'' є складною аналітичною конструкцією ділового
      стилю.'
    options:
    - text: у зв'язку з тим що
      correct: true
    - text: тому що
      correct: false
    - text: бо
      correct: false
    - text: оскільки
      correct: false
  instruction: Оберіть правильну відповідь.
- type: fill-in
  title: Заповніть пропуски відповідними сполучниками
  items:
  - sentence: Ми були змушені терміново перенести дату презентації, _ підрядники не
      встигли вчасно доставити обладнання.
    answer: тому що
    options:
    - тому що
    - томущо
    - завдяки
    - дарма що
    explanation: Нейтральний причиновий сполучник пишеться окремо.
  - sentence: _ закон прямо вимагає письмової згоди сторін, усна домовленість не має
      юридичної сили.
    answer: Оскільки
    options:
    - Оскільки
    - Бо
    - Дарма що
    - Хоча
    explanation: Офіційний аргумент на початку речення формулюється за допомогою 'Оскільки'.
  - sentence: Новий закон про оподаткування був прийнятий парламентом, _ багато експертів
      відкрито критикували його.
    answer: хоча
    options:
    - хоча
    - бо
    - тому що
    - через те що
    explanation: 'Тут виражається допуск: дія відбулася всупереч перешкоді.'
  - sentence: Суд залишив вирок без змін, _ сторона захисту представила нових свідків.
    answer: незважаючи на те що
    options:
    - незважаючи на те що
    - оскільки
    - тому що
    - бо
    explanation: Офіційно-діловий регістр вимагає важкої допустової конструкції.
  - sentence: Український бізнес продовжує працювати, _ умови залишаються екстремально
      складними.
    answer: попри те що
    options:
    - попри те що
    - тому що
    - оскільки
    - завдяки
    explanation: Енергійна допустова конструкція підкреслює опір обставинам.
  - sentence: Цей позов був виграний нами саме _, що ми знайшли унікальний прецедент.
    answer: тому
    options:
    - тому
    - через
    - попри
    - завдяки
    explanation: Логічний акцент на причині створюється розривом сполучника 'тому,
      що'.
  - sentence: Слідство не змогло довести вину підозрюваного _ зібрані докази виявилися
      побічними.
    answer: через те що
    options:
    - через те що
    - із-за того що
    - томущо
    - незважаючи на
    explanation: Офіційний сполучник причини. 'Із-за того що' — калька.
  - sentence: Маленький кіт несподівано вискочив _ рогу старого будинку.
    answer: з-за
    options:
    - з-за
    - через
    - попри
    - завдяки
    explanation: 'Просторова обставина: напрямок руху з-поза предмета.'
  - sentence: _ хронічну лінь він провалив важливий вступний іспит.
    answer: Через
    options:
    - Через
    - Дякуючи
    - Завдяки
    - Незважаючи на
    explanation: Для причини з негативним наслідком нормативним є лише прийменник
      'Через'.
  - sentence: Старий майстер виконував цю роботу з вражаючою точністю, _ його руки
      вже втратили юнацьку спритність.
    answer: дарма що
    options:
    - дарма що
    - тому що
    - бо
    - у зв'язку з тим що
    explanation: Художньо-публіцистичний допуск із легким емоційним відтінком.
  instruction: Оберіть правильне слово для заповнення пропуску.
- type: match-up
  title: 'Стилістичні відповідники: знайдіть пару'
  instruction: З'єднайте сполучник або прийменник із його характеристикою.
  pairs:
  - left: бо
    right: розмовний, швидкий, живий діалог
  - left: тому що
    right: абсолютно нейтральний, універсальний
  - left: оскільки
    right: офіційний, задає дедуктивну рамку на початку речення
  - left: через те що
    right: багатослівна аналітична конструкція, завжди пишеться окремо
  - left: через (прийменник)
    right: використовується для вираження негативної причини
  - left: завдяки (прийменник)
    right: використовується виключно для позитивних наслідків
  - left: хоча
    right: базовий, нейтральний рівень допустового контрасту
  - left: незважаючи на те що
    right: важка канцелярська конструкція для юридичної практики
  - left: попри те що
    right: сучасна, енергійна форма вираження незламності та опору
  - left: дарма що
    right: художній та літературний сполучник із поблажливим відтінком
- type: unjumble
  title: Побудова аналітичних речень
  instruction: Складіть речення, дотримуючись правильного порядку слів.
  items:
  - words:
    - оскільки
    - закон
    - вимагає
    - згоди
    - домовленість
    - не
    - має
    - сили
    answer: Оскільки закон вимагає згоди домовленість не має сили
  - words:
    - адвокат
    - подав
    - апеляцію
    - тому
    - що
    - суд
    - проігнорував
    - докази
    answer: Адвокат подав апеляцію тому що суд проігнорував докази
  - words:
    - проект
    - було
    - зупинено
    - через
    - те
    - що
    - аудит
    - виявив
    - порушення
    answer: Проект було зупинено через те що аудит виявив порушення
  - words:
    - ми
    - перемогли
    - тільки
    - тому
    - що
    - знайшли
    - важливий
    - прецедент
    answer: Ми перемогли тільки тому що знайшли важливий прецедент
  - words:
    - він
    - зазнав
    - збитків
    - через
    - свої
    - абсолютно
    - непродумані
    - рішення
    answer: Він зазнав збитків через свої абсолютно непродумані рішення
  - words:
    - команда
    - вчасно
    - завершила
    - роботу
    - хоча
    - бюджетні
    - обмеження
    - були
    - суворими
    answer: Команда вчасно завершила роботу хоча бюджетні обмеження були суворими
  - words:
    - бізнес
    - продовжує
    - працювати
    - попри
    - те
    - що
    - умови
    - залишаються
    - складними
    answer: Бізнес продовжує працювати попри те що умови залишаються складними
  - words:
    - книга
    - стала
    - національним
    - бестселером
    - дарма
    - що
    - критики
    - ставилися
    - прохолодно
    answer: Книга стала національним бестселером дарма що критики ставилися прохолодно
- type: cloze
  title: Робота з юридичним текстом
  instruction: Заповніть пропуски правильними граматичними конструкціями та термінами.
  passage: Коли юрист готує аналітичний {{1}}, його головна мета — побудувати міцний
    {{2}}. Уникнення русизмів є обов'язковим. Наприклад, замість помилкового «{{3}}
    кризи» завжди слід вживати «{{4}} кризу». Якщо ми хочемо показати, що дія відбулася
    всупереч обставинам, ми використовуємо сполучники {{5}}. Найбільш сучасним і динамічним
    серед них є слово «{{6}}». Коли ж ми формулюємо причину як непохитну передумову
    на початку документа, найкращим вибором буде сполучник «{{7}}». У складних корпоративних
    договорах часто використовується масивна канцелярська конструкція «{{8}} те що».
    Варто пам'ятати, що сполучник «{{9}} що» завжди пишеться {{10}}. Також, пунктуація
    може змінювати логічний {{11}} речення. Якщо кома стоїть перед словом «тому»,
    ми виділяємо {{12}}. Якщо ж кома стоїть перед «що», акцент робиться на самій {{13}}.
    У залі суду, під час емоційних дебатів, адвокат може використати коротке «{{14}}»,
    щоб зробити свій {{15}} більш живим. Проте в офіційних паперах такий стиль є неприйнятним.
    Тільки глибокий стилістичний {{16}} гарантує бездоганність тексту.
