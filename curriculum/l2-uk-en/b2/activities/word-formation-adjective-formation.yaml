        - "правна"

- type: error-correction
  title: "Редактура модного журналу"
  instruction: "Виправте помилки в тексті, пов'язані з неправильним утворенням прикметників."
  items:
    - sentence: "Наш бізнес центр пропонує найкращі умови для дизайнерів."
      error: "бізнес центр"
      answer: "діловий центр"
      error_type: "phrase"
      options:
        - "бізнес центр"
        - "діловий центр"
        - "бізнесовий централ"
        - "центр бізнесів"
      explanation: "Слід уникати англійської кальки Noun-as-Adjective. Правильно 'діловий центр' або 'бізнес-центр'."
    - sentence: "Вона отримала новий студентний квиток на факультеті дизайну."
      error: "студентний"
      answer: "студентський"
      options:
        - "студентний"
        - "студентський"
        - "студентівий"
        - "студентцький"
      explanation: "Для позначення приналежності до соціальної групи (студенти) використовується суфікс -ський."
    - sentence: "Його музикальний інструмент коштує цілий статок."
      error: "музикальний"
      answer: "музичний"
      options:
        - "музикальний"
        - "музичний"
        - "музиковний"
        - "музикувальний"
      explanation: "Для інструментів використовується 'музичний'. 'Музикальний' стосується людських здібностей (наприклад, слуху)."
    - sentence: "Дівчина купила гарний жовто-гарячий светр на осінь."
      error: "жовто-гарячий"
      answer: "жовтогарячий"
      options:
        - "жовто-гарячий"
        - "жовтогарячий"
        - "гарячо-жовтий"
        - "жовто-гарячивий"
      explanation: "Слово 'жовтогарячий' позначає єдиний неподільний колір і пишеться разом."
    - sentence: "Цей козакський кунтуш ми знайшли у вінтажному магазині."
      error: "козакський"
      answer: "козацький"
      options:
        - "козакський"
        - "козацький"
        - "козаський"
        - "козашський"
      explanation: "Відбувається мутація: к + ський = цький."
    - sentence: "Він вивчив складне ткачське мистецтво в Карпатах."
      error: "ткачське"
      answer: "ткацьке"
      options:
        - "ткачське"
        - "ткацьке"
        - "ткацький"
        - "тканське"
      explanation: "Приголосний 'ч' зливається з 'ський' і утворює 'цьк': ткацьке."
    - sentence: "Ми додали до колекції темно червоний елемент."
      error: "темно червоний"
      answer: "темно-червоний"
      error_type: "phrase"
      options:
        - "темно червоний"
        - "темно-червоний"
        - "темночервоний"
        - "темного-червоний"
      explanation: "Складні прикметники, що означають відтінки кольору, пишуться через дефіс."
    - sentence: "Вона приїхала з Праги і привезла прагський кришталь."
      error: "прагський"
      answer: "празький"
      options:
        - "прагський"
        - "празький"
        - "пражський"
        - "працький"
      explanation: "Мутація: г + ський = зький."

- type: quiz
  title: "Перевірка професійних знань"
  instruction: "Оберіть одну правильну відповідь на кожне запитання."
  items:
    - question: "Який суфікс необхідно додати до слова 'Львів', щоб утворити прикметник?"
      explanation: "Додається суфікс -ський, оскільки основа не викликає мутацій к, ч, ц."
      options:
        - text: "суфікс -ний"
          correct: false
        - text: "суфікс -ський"
          correct: true
        - text: "суфікс -цький"
          correct: false
        - text: "суфікс -альний"
          correct: false
    - question: "Як правильно написати прикметник від словосполучення 'п'ять поверхів'?"
      explanation: "Складні слова з числівниковим компонентом пишуться разом."
      options:
        - text: "п'яти-поверховий"
          correct: false
        - text: "п'ятьповерховий"
          correct: false
        - text: "п'ятиповерховий"
          correct: true
        - text: "п'ятий-поверховий"
          correct: false
    - question: "Яке з цих слів позначає не поєднання двох відтінків, а один цілісний колір?"
      explanation: "Жовтогарячий позначає один колір і тому пишеться разом."
      options:
        - text: "чорно-білий"
          correct: false
        - text: "світло-зелений"
          correct: false
        - text: "жовтогарячий"
          correct: true
        - text: "синьо-жовтий"
          correct: false
    - question: "У якому випадку відбувається фонетична мутація 'к' + 'ський' = 'цький'?"
      explanation: "Слово 'юнак' закінчується на 'к', тому утворюється 'юнацький'."
      options:
        - text: "брат → братський"
          correct: false
        - text: "юнак → юнацький"
          correct: true
        - text: "друг → дружній"
          correct: false
        - text: "син → синівський"
          correct: false
    - question: "Який прикметник правильно описує людину з видатним слухом і талантом?"
      explanation: "Слово 'музикальний' стосується людських здібностей."
      options:
        - text: "музичний"
          correct: false
        - text: "музикальний"
          correct: true
        - text: "музиковий"
          correct: false
        - text: "музикантський"
          correct: false
    - question: "Чому словосполучення 'інтернет магазин' є орфографічною помилкою?"
      explanation: "Іменник не може виступати прикметником без змін; необхідний дефіс."
      options:
        - text: "бо треба писати з великої літери"
          correct: false
        - text: "бо це англійська калька, потрібен дефіс"
          correct: true
        - text: "бо бракує суфікса -ний"
          correct: false
        - text: "бо це два прикметники"
          correct: false
    - question: "Що відбувається при утворенні прикметника від слова 'туман'?"
      explanation: "Основа закінчується на 'н', додається суфікс '-ний', відбувається подвоєння."
      options:
