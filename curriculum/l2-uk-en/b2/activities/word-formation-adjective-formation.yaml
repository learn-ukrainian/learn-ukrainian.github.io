- type: reading
  id: "reading-fashion-manifesto"
  title: "Маніфест українського дизайнера"
  instruction: "Прочитайте уривок з маніфесту модного бренду та дайте відповіді на запитання."
  text: |
    Сучасний український дизайн одягу стрімко завойовує світові подіуми. Наша місія — створювати не просто речі, а культурні маркери. Ми використовуємо преміальний львівський льон та волинську вишивку, інтегруючи їх у сучасні урбаністичні силуети. Ця весняна колекція побудована на глибоких синьо-жовтих відтінках та класичних чорно-білих контрастах. Кожна деталь має значення: від складних двоярусних спідниць до ідеального крою ділових костюмів. Справжнє кравецьке мистецтво не терпить компромісів, тому ми ретельно зберігаємо нашу національну ідентичність, адаптуючи її для міського ритму життя.
  tasks:
    - "Які матеріали та техніки використовує дизайнер у своїй колекції?"
    - "Яка кольорова гама є основою весняної колекції бренду?"
    - "Чому для дизайнера важливо поєднувати національну ідентичність із міським ритмом життя?"
    - "Як ви розумієте вислів 'створювати не просто речі, а культурні маркери'?"

- type: essay-response
  title: "Есе: Код нації у моді"
  source_reading: "reading-fashion-manifesto"
  instruction: "Напишіть есе, спираючись на прочитаний текст та власні роздуми."
  prompt: "Проаналізуйте, як використання регіональних назв (наприклад, 'львівський льон', 'волинська вишивка') та традиційних орфографічних моделей (синьо-жовтий) допомагає українським брендам одягу формувати свою ідентичність на світовому ринку. Наведіть власні приклади, якщо можливо."
  min_words: 150
  model_answer: "Використання прикметників, утворених від географічних назв, відіграє ключову роль у позиціонуванні українських брендів на міжнародній арені. Такі словосполучення, як 'львівський льон' або 'волинська вишивка', працюють не просто як опис матеріалу, а як своєрідний знак якості та автентичності. Вони апелюють до багатовікових традицій майстерності конкретного регіону, викликаючи довіру у споживача. Крім того, правильне використання складних прикметників для опису кольорів, наприклад, 'синьо-жовтий' через дефіс, підкреслює національну символіку та рівноправність відтінків, що є важливим елементом патріотичного маркетингу. Це дозволяє брендам не лише продавати одяг, але й транслювати культурні цінності, перетворюючи звичайні речі на носії української ідентичності. Таким чином, грамотна мова та правильне словотворення стають потужним інструментом у сучасному фешн-бізнесі."
  rubric:
    - criteria: "Аргументація та аналіз"
      description: "Глибоке розкриття теми з наведенням релевантних прикладів використання прикметників."
      points: 5
    - criteria: "Граматична правильність"
      description: "Коректне утворення та правопис складних прикметників і прикметників на -ський/-цький."
      points: 3
    - criteria: "Стилістика та лексика"
      description: "Використання професійного реєстру та різноманітної лексики рівня B2."
      points: 2

- type: true-false
  title: "Правила словотворення: правда чи міф?"
  instruction: "Визначте, чи є твердження щодо утворення прикметників правильним."
  items:
    - statement: "Слово 'студентський' утворене за допомогою суфікса -ський і пишеться без змін в основі."
      correct: true
      explanation: "Так, основа закінчується на 'т', тому просто пишеться 'студентський'."
    - statement: "Складний прикметник 'жовтогарячий' пишеться через дефіс, оскільки позначає поєднання двох кольорів."
      correct: false
      explanation: "Слово 'жовтогарячий' позначає єдиний колір (помаранчевий) і пишеться разом."
    - statement: "Прикметник від слова 'ткач' утворюється як 'ткацький', оскільки 'ч' змінюється на 'цьк'."
      correct: true
      explanation: "Це класичний приклад фонетичної мутації: к, ч, ц + ський = цький."
    - statement: "Правильно казати 'студентний квиток', адже суфікс -ний є найбільш універсальним."
      correct: false
      explanation: "Це помилка. Суфікс -ний позначає якість, а для приналежності до соціальної групи використовується -ський: 'студентський квиток'."
    - statement: "Слово 'музикальний' використовується для опису природних здібностей людини."
      correct: true
      explanation: "Так, наприклад, 'музикальний слух' або 'музикальна дитина'. Для інструментів використовуємо 'музичний'."
    - statement: "Якщо основа закінчується на 'н', додавання суфікса '-ний' призводить до подвоєння: 'осінній'."
      correct: true
      explanation: "Осінь + ний = осінній. Відбувається збіг приголосних."
    - statement: "Складний прикметник 'трикутний' пишеться через дефіс."
      correct: false
      explanation: "Слова, першим компонентом яких є числівник (три + кут), пишуться разом."
    - statement: "Слово 'білолиций' належить до м'якої групи відмінювання в називному відмінку."
      correct: false
      explanation: "Це фольклорний епітет. У називному відмінку він має тверде закінчення (-ий), а в непрямих — м'яке (-ього)."
    - statement: "Замість англійської кальки 'бізнес центр' слід писати 'бізнес-центр' або використовувати 'діловий центр'."
      correct: true
      explanation: "Іменник не може бути прикметником без змін; потрібен дефіс або прикметникова форма."
    - statement: "Кольори, що поєднують два рівноправні відтінки, наприклад 'чорно-білий', завжди пишуться разом."
      correct: false
      explanation: "Вони пишуться через дефіс: чорно-білий, світло-рожевий."

- type: unjumble
  title: "Побудова стилістичних образів"
  instruction: "Розташуйте слова в правильному порядку, щоб утворити граматично коректні речення."
  items:
    - words: ["Наша", "студія", "розробила", "новий", "дизайн", "для", "цього", "великого", "міського", "проєкту"]
      answer: "Наша студія розробила новий дизайн для цього великого міського проєкту"
    - words: ["Дизайнер", "використав", "преміальний", "львівський", "льон", "для", "своєї", "нової", "літньої", "колекції"]
      answer: "Дизайнер використав преміальний львівський льон для своєї нової літньої колекції"
    - words: ["Вона", "показала", "студентський", "квиток", "на", "вході", "до", "цього", "національного", "музею"]
      answer: "Вона показала студентський квиток на вході до цього національного музею"
    - words: ["Ця", "неймовірна", "двоярусна", "спідниця", "стала", "головним", "акцентом", "усього", "нашого", "показу"]
      answer: "Ця неймовірна двоярусна спідниця стала головним акцентом усього нашого показу"
    - words: ["Вони", "орендували", "просторе", "приміщення", "на", "третьому", "поверсі", "нового", "ділового", "центру"]
      answer: "Вони орендували просторе приміщення на третьому поверсі нового ділового центру"
    - words: ["Справжнє", "кравецьке", "мистецтво", "вимагає", "високої", "уваги", "до", "найменших", "структурних", "деталей"]
      answer: "Справжнє кравецьке мистецтво вимагає високої уваги до найменших структурних деталей"
    - words: ["Його", "абсолютний", "музикальний", "слух", "допомагає", "вловлювати", "найтонші", "ритми", "сучасного", "життя"]
      answer: "Його абсолютний музикальний слух допомагає вловлювати найтонші ритми сучасного життя"
    - words: ["Традиційна", "волинська", "вишивка", "часто", "використовує", "класичний", "чорно-білий", "або", "червоний", "орнамент"]
      answer: "Традиційна волинська вишивка часто використовує класичний чорно-білий або червоний орнамент"

