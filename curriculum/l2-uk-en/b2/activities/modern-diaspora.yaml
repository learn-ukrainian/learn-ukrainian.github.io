    correct: false
    explanation: М'яка сила діє шляхом переконання та культурної привабливості, а
      не військового тиску.
  - statement: В українському публіцистичному стилі безособові конструкції утворюються
      за допомогою форм на -но та -то.
    correct: true
    explanation: 'Наприклад: рішення ухвалено, кошти зібрано.'
  - statement: Використання орудного відмінка для позначення виконавця у пасивних
      конструкціях є граматично правильним.
    correct: false
    explanation: Це є грубою стилістичною помилкою (калькою); слід використовувати
      активний стан.
  instruction: Визначте, чи твердження правильне.
- type: quiz
  title: 'Перевірка знань: Історія та процеси діаспори'
  items:
  - question: Як сучасні соціологи та громадські лідери найчастіше концептуалізують
      розсіяння українців по різних континентах у наш час?
    options:
    - text: Як тимчасове явище, що зникне після завершення війни
      correct: false
    - text: Як глобальне українство, що функціонує як динамічна інтерактивна мережа
      correct: true
    - text: Як ізольовані групи, що повністю асимілювалися в нових країнах
      correct: false
    - text: Як маргіналізовані спільноти, повністю відірвані від материкової держави
      correct: false
    explanation: Сучасна парадигма розглядає українську діаспору як глобальну інтерактивну
      мережу, де кожен вузол щільно пов'язаний з Україною.
  - question: Яка була головна та найбільш визначальна причина початку першої масової
      хвилі української еміграції наприкінці дев'ятнадцятого століття?
    options:
    - text: Катастрофічне аграрне перенаселення та загальна економічна скрута на західноукраїнських
        землях
      correct: true
    - text: Політичні репресії з боку радянської влади та загроза фізичного знищення
      correct: false
    - text: Бажання здобути вищу освіту в престижних європейських університетах
      correct: false
    - text: Наслідки Другої світової війни та примусове вивезення на роботи
      correct: false
    explanation: 'Перша хвиля була зумовлена економічними причинами: нестачею землі
      та бідністю в Галичині та на Буковині.'
  - question: Хто переважно складав основу третьої масової хвилі української еміграції,
      яка сформувалася безпосередньо після Другої світової війни?
    options:
    - text: Молоді спеціалісти у сфері інформаційних технологій
      correct: false
    - text: Селяни, які шукали вільні землі для ведення сільського господарства
      correct: false
    - text: Тимчасово переміщені особи, колишні остарбайтери та політичні біженці
      correct: true
    - text: Урядовці Української Народної Республіки, які діяли в екзилі
      correct: false
    explanation: Третю хвилю сформували так звані 'Ді-Пі' (Displaced Persons), які
      відмовилися повертатися до СРСР.
  - question: Яким специфічним терміном у сучасній світовій політології називають
      вплив держави через культурну привабливість, а не військовий примус?
    options:
    - text: Глобальне домінування
      correct: false
    - text: Жорстка дипломатія
      correct: false
    - text: М'яка сила
      correct: true
    - text: Інституційна інтеграція
      correct: false
    explanation: Цей термін (soft power) означає досягнення цілей через переконання
      та створення позитивного іміджу.
  - question: Яке видатне історичне досягнення є прямим результатом системної культурної
      дипломатії та політичного лобіювання української діаспори у світі?
    options:
    - text: Створення міжнародної системи військових альянсів
      correct: false
    - text: Офіційне визнання Голодомору актом геноциду багатьма парламентами світу
      correct: true
    - text: Відкриття кордонів для вільної економічної торгівлі з усіма країнами
      correct: false
    - text: Повне скасування всіх візових обмежень для українських студентів
      correct: false
    explanation: Діаспора роками працювала над тим, щоб світ визнав Голодомор геноцидом
      українського народу.
  - question: Яку граматичну форму дієслова найдоречніше та найправильніше використовувати
      в українському діловому стилі для фіксації кінцевого результату дії?
    options:
    - text: Активний дієприкметник теперішнього часу
      correct: false
    - text: Пасивний стан з орудним відмінком діяча
      correct: false
    - text: Безособову незмінну форму на закінчення -но або -то
      correct: true
    - text: Зворотні дієслова із часткою -ся
      correct: false
    explanation: Форми на -но/-то (ухвалено, підписано) є взірцем бездоганного офіційно-ділового
      стилю в українській мові.
  - question: Як слід граматично правильно перекласти українською мовою типову англійську
      пасивну конструкцію 'The document was signed by the president'?
    options:
    - text: Документ був підписаний президентом.
      correct: false
    - text: Президент підписав цей важливий документ.
      correct: true
    - text: Документ є підписаним президентом.
      correct: false
    - text: Документ підписано президентом.
      correct: false
    explanation: Українська мова віддає перевагу активному стану, тому діяч має бути
      підметом у називному відмінку.
  - question: Що означає лінгвістичний феномен збереження архаїзмів у мові представників
      найстаріших хвиль української діаспори за океаном?
    options:
    - text: Швидку та повну втрату рідної мови через масову асиміляцію
      correct: false
    - text: Консервацію мовних норм того історичного періоду, коли вони залишили батьківщину
      correct: true
    - text: Свідоме створення абсолютно нової штучної мови для спілкування
      correct: false
    - text: Повне нерозуміння сучасної граматики через відсутність шкіл
      correct: false
    explanation: Емігранти 'законсервували' мову свого часу через відсутність контакту
      з радянською Україною.
  - question: Який важливий відмінок категорично заборонено використовувати для вказівки
      на безпосереднього виконавця дії поруч із безособовими формами на -но/-то?
    options:
    - text: Родовий відмінок
      correct: false
    - text: Давальний відмінок
      correct: false
    - text: Орудний відмінок
      correct: true
    - text: Місцевий відмінок
      correct: false
    explanation: Вказувати виконавця в орудному відмінку (наприклад, 'підписано директором')
      є грубою помилкою.
  - question: Яку надзвичайно важливу функцію успішно виконують організації Пласт
      та СУМ для українських дітей, які народжуються та зростають за кордоном?
    options:
    - text: Вони допомагають швидко забути українську мову та інтегруватися
      correct: false
    - text: Вони забезпечують глибоке занурення в живе україномовне середовище
      correct: true
    - text: Вони виключно збирають кошти на благодійні гуманітарні цілі
      correct: false
    - text: Вони готують дітей до вступу у вищі іноземні навчальні заклади
      correct: false
    explanation: Пласт і СУМ допомагають зберегти національну ідентичність через тотальне
      занурення в українську мову під час таборів.
  instruction: Оберіть правильну відповідь.
- type: fill-in
  title: 'Заповніть пропуски: Лексика з теми'
  items:
  - sentence: Українська _____ відіграє критично важливу роль у підтримці нашої держави
      на міжнародній арені.
    answer: діаспора
    options:
    - діаспора
    - дезінформація
    - репатріація
    - асиміляція
  - sentence: Вимушений переселенець, який тікає від війни, юридично отримує статус
      _____.
    answer: біженця
    options:
    - емігранта
    - біженця
    - волонтера
    - студента
  - sentence: Світовий Конґрес Українців — це потужна _____, яка координує діяльність
      громад у всьому світі.
    answer: інституція
    options:
    - інституція
    - резолюція
    - ініціатива
    - парадигма
  - sentence: Успішна _____ в нове суспільство передбачає вивчення мови без втрати
      власної ідентичності.
    answer: інтеграція
    options:
    - інтеграція
    - дезінформація
    - репатріація
    - асиміляція
  - sentence: Культурна дипломатія та формування позитивного іміджу — це ефективний
      дієвий _____ м'якої сили.
    answer: метод
    options:
    - термін
    - синтез
    - метод
    - процес
  - sentence: Детальний соціологічний _____ показав, що сучасні переселенці підтримують
      тісний зв'язок з батьківщиною.
    answer: аналіз
    options:
    - синтез
    - термін
    - аналіз
    - фундамент
  - sentence: Багато науковців були змушені працювати в _____, щоб уникнути сталінських
      репресій в Україні.
    answer: екзилі
    options:
    - екзилі
    - процесі
    - синтезі
    - пресрелізі
  - sentence: Після завершення конференції комітет успішно підготував офіційний _____
      для преси.
    answer: пресреліз
    options:
    - термін
    - пресреліз
    - фандрейзинг
    - фундамент
  - sentence: Збір коштів на потреби громадських ініціатив англійською мовою називається
      _____.
    answer: фандрейзинг
    options:
    - лобіювання
    - фандрейзинг
    - екзил
    - синтез
  - sentence: Ворожа _____ має на меті створити негативний імідж нашої держави за
      кордоном.
    answer: дезінформація
    options:
    - дезінформація
    - ініціатива
    - спадкоємність
    - резолюція
