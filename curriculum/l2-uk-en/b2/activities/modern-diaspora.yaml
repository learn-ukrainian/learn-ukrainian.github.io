  instruction: Оберіть правильний переклад.
- type: cloze
  title: 'Заповніть пропуски: Розвиток глобального українства'
  passage: Сьогодні концепція глобального українства кардинально {{1}} нашу парадигму
    сприйняття. Це вже не хаотичне розсіяння людей по різних {{2}}, а надзвичайно
    динамічна {{3}}, де кожен географічний {{4}} щільно пов'язаний з іншими та з самою
    Україною. Завдяки швидкому розвитку сучасних цифрових {{5}}, представники діаспори
    можуть миттєво координувати масштабні волонтерські {{6}}. Цей унікальний {{7}}
    фінансових можливостей та політичних контактів перетворює сучасну діаспору на
    потужного {{8}} на світовій арені. Українці за кордоном активно використовують
    інструменти м'якої {{9}}, щоб формувати позитивний {{10}} нашої держави. Наприклад,
    історичним досягненням їхньої діяльності стало офіційне визнання Голодомору актом
    {{11}} у багатьох парламентах світу. Крім того, українська діаспора створила потужну
    інституційну {{12}}. Такі організації як Світовий {{13}} Українців ефективно здійснюють
    політичне {{14}} на найвищому рівні. Для збереження національної {{15}} серед
    молоді працюють скаутські організації Пласт та {{16}}, які проводять свої заходи
    виключно українською мовою.
