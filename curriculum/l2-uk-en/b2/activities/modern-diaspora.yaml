- type: reading
  id: reading-diaspora
  title: 'Первинне джерело: Роль діаспори'
  text: 'Сьогодні українська діаспора не є просто відокремленим соціокультурним явищем
    чи розсіяною групою емігрантів; вона є невіддільною, активною складовою глобального
    українства. Вивчення історії хвиль еміграції, глибинний аналіз міжнародних організацій
    та усвідомлення специфіки діаспорної мови дозволяє сучасному мовцю краще орієнтуватися
    у складних світових процесах. Завдяки стрімкому розвитку цифрових технологій представники
    діаспори можуть миттєво координувати масштабні волонтерські проєкти. Цей унікальний
    синтез ресурсів перетворює сучасну українську діаспору на впливового гравця на
    світовій арені.

    '
  tasks:
  - Якою є роль української діаспори в сучасному світі згідно з текстом?
  - Що дозволяє глибоке вивчення історії хвиль еміграції?
  - Яким чином цифрові технології вплинули на життя діаспори?
  - На кого перетворює українську діаспору унікальний синтез ресурсів?
- type: essay-response
  title: 'Есе: Вплив діаспори на світові процеси'
  source_reading: reading-diaspora
  prompt: Спираючись на прочитаний текст та власні знання, напишіть есе про те, як
    сучасна українська діаспора впливає на міжнародну політику та культурну дипломатію.
    Наведіть конкретні приклади використання 'м'якої сили' (soft power) для захисту
    національних інтересів України.
  min_words: 150
  model_answer: Сучасна українська діаспора відіграє надзвичайно важливу роль у формуванні
    міжнародної політики та здійсненні ефективної культурної дипломатії. Завдяки концепції
    глобального українства, емігранти більше не є відірваними від своєї батьківщини.
    Навпаки, вони активно використовують 'м'яку силу' (soft power) для просування
    національних інтересів України на світовій арені. Одним із найяскравіших прикладів
    такого лобіювання є багаторічна кампанія з визнання Голодомору геноцидом українського
    народу парламентами різних країн світу. Крім того, після початку повномасштабного
    вторгнення діаспора змогла блискавично мобілізувати колосальні фінансові та гуманітарні
    ресурси. Українці за кордоном проводять масштабні мітинги, організовують культурні
    фестивалі та інформаційні кампанії, що допомагають протидіяти російській дезінформації.
    Таким чином, діаспора діє як справжній амбасадор України, забезпечуючи життєво
    необхідну підтримку з боку міжнародної спільноти та зберігаючи нашу національну
    ідентичність.
  rubric:
  - criteria: Змістовність та аргументація
    description: Есе повною мірою розкриває тему, наводить переконливі приклади використання
      м'якої сили.
    points: 40
  - criteria: Лексичне багатство
    description: 'У тексті доречно використані терміни: діаспора, процес, аналіз,
      синтез, лобіювання.'
    points: 30
  - criteria: Граматична правильність
    description: Відсутність помилок, правильне використання пасивних та безособових
      конструкцій.
    points: 30
- type: true-false
  title: 'Правда чи вигадка: Факти про еміграцію'
