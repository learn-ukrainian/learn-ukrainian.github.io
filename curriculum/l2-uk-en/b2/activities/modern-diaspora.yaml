  - statement: Емігрант — це людина, яка вимушено шукає притулку через безпосередню
      загрозу її життю.
    correct: false
    explanation: Емігрант залишає країну добровільно; людина, яка тікає від загрози,
      є біженцем.
  - statement: Після повномасштабного вторгнення центр міграційної ваги змістився
      до країн Європейського Союзу.
    correct: true
    explanation: Так, мільйони українців перемістилися до Польщі, Німеччини та інших
