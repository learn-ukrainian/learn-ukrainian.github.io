  - statement: Світовий Конґрес Українців був офіційно заснований у Києві у тисяча
      дев'ятсот дев'яносто першому році.
    correct: false
    explanation: Світовий Конґрес Українців був заснований у 1967 році в Нью-Йорку.
  - statement: Пласт і СУМ відіграють ключову роль у збереженні національної ідентичності
      серед молоді в діаспорі.
    correct: true
    explanation: Ці скаутські організації проводять табори та виховують молодь в україномовному
      середовищі.
  - statement: Український Вільний Університет стабільно діяв в екзилі, об'єднуючи
