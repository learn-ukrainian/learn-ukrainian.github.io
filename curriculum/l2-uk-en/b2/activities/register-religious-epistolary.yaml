- type: error-correction
  title: Виправлення стилістичних та граматичних помилок
  instruction: Знайдіть і виправте помилку в кожному реченні.
  items:
  - sentence: Доброго дня, шановний пан Василь!
    error: пан
    answer: пане
    options:
    - пане
    - паном
    - пану
    - пана
    explanation: 'Слово "пан" у звертанні обов''язково ставиться у кличний відмінок:
      "пане".'
  - sentence: Привіт, Андрій, як твої справи сьогодні?
    error: Андрій
    answer: Андрію
    options:
    - Андрію
    - Андріє
    - Андрієм
    - Андрія
    explanation: 'Ім''я Андрій вимагає кличного відмінка із закінченням -ю: "Андрію".'
  - sentence: Шановний пане директору, звертаюся до вас із проханням.
    error: директору
    answer: директоре
    options:
    - директоре
    - директор
    - директором
    - директора
    explanation: 'Іменники твердої групи (директор) у кличному відмінку мають закінчення
      -е: "директоре".'
  - sentence: Шановна пані Олена, ми чекаємо на вашу відповідь.
    error: Олена
    answer: Олено
    options:
    - Олено
    - Олену
    - Олені
    - Оленою
    explanation: Ім'я після слова "пані" має стояти у кличному відмінку.
  - sentence: Я прикріпив потрібний документ у вкладені.
    error: вкладені
