- type: reading
  title: Аналіз ділового листа
  instruction: Прочитайте лист та дайте відповіді на запитання.
  text: 'Шановний пане директоре!

    Добрий день! Звертаємося до вас з приводу спільної організації великої наукової
    конференції, яка має відбутися наступного місяця. У вкладенні надсилаю вам попередній
    графік виступів спікерів та уточнений кошторис нашого проєкту. Заздалегідь дуже
    вдячний за вашу швидку відповідь та щиро сподіваюсь на співпрацю.

    З глибокою повагою,

    Максим Ткаченко.

    '
  tasks:
  - Яку формулу вітання використано в листі?
  - У якому відмінку стоїть звертання пане директоре?
  - Яким словом автор позначає додані до листа файли?
  - Як автор завершує свого листа?
- type: true-false
  title: Правила високого стилю
  instruction: Визначте, чи є ці твердження правильними.
  items:
  - statement: Пересопницьке Євангеліє було перекладено церковнослов'янською мовою.
    correct: false
    explanation: Воно було перекладено простою (староукраїнською) мовою.
  - statement: Слово "воістину" активно використовується у щоденному молодіжному сленгу.
    correct: false
    explanation: Це слово є маркером високого, релігійного стилю.
  - statement: В українській мові кличний відмінок є обов'язковим для прямого звертання
      до людини.
    correct: true
    explanation: Згідно з Державним стандартом, кличний відмінок позначає адресата
      мовлення.
  - statement: Жіночі прізвища, що закінчуються на приголосний, відмінюються у кличному
      відмінку.
    correct: false
    explanation: Жіночі прізвища на приголосний не відмінюються взагалі.
  - statement: Фраза "Доброго дня!" є історично найправильнішим варіантом вітання-констатації.
    correct: false
    explanation: Правильною формою є "Добрий день!" у називному відмінку.
  - statement: В офіційному листуванні термін "вкладення" позначає прикріплений до
      електронного листа файл.
    correct: true
    explanation: Це стандартне цифрове кліше сучасного епістолярного стилю.
  - statement: Письменниці Леся Українка та Ольга Кобилянська використовували слово
      "Хтось" як форму ніжного звертання одна до одної.
    correct: true
    explanation: Вони використовували третю особу для створення витонченої емоційної
      близькості.
  - statement: Іменник "Ігор" у кличному відмінку обов'язково отримує закінчення -е.
    correct: false
    explanation: 'Це слово м''якої групи і має закінчення -ю: "Ігорю".'
  - statement: Жіночі імена на -ія (Марія, Юлія) у кличному відмінку завжди закінчуються
      на -є.
    correct: true
    explanation: Це стале правило для м'якої групи жіночого роду.
  - statement: Сучасна електронна пошта допускає такий самий неформальний тон і відсутність
      привітань, як і швидкі месенджери.
    correct: false
    explanation: Електронна пошта вимагає суворішого дотримання епістолярного етикету
      порівняно з месенджерами.
- type: essay-response
  title: Трансформація регістра
  instruction: Напишіть офіційний лист.
  prompt: Уявіть, що ви працюєте в архіві Лаври і знайшли старий документ, який потрібно
    надіслати сучасному досліднику. Напишіть йому офіційного електронного листа (не
    менше 150 слів), у якому ви повідомляєте про знахідку, пояснюєте її важливість
    та вказуєте, що цифрова копія документа є у вкладенні. Обов'язково використайте
    правильні форми звертання та прощання.
  min_words: 150
  model_answer: 'Шановний пане професоре!

    Добрий день! Звертаюся до вас із надзвичайно радісною звісткою. Під час проведення
    планової інвентаризації у фондах нашого архіву було знайдено унікальний рукопис,
    який, безперечно, має величезне значення для ваших поточних досліджень історії
    нашої парафії.

    Цей документ, воістину, є справжнім скарбом, адже він проливає світло на невідомі
    сторінки духовного життя минулих століть. Я ретельно опрацював матеріал і підготував
    його якісну цифрову копію. У вкладенні надсилаю вам цей файл для детального ознайомлення.

    Щиро сподіваюся, що ці матеріали допоможуть вам у вашій надзвичайно важливій науковій
    роботі. З Божим благословінням та молитвою про успіх ваших досліджень.

    Заздалегідь дуже вдячний за вашу відповідь та експертну оцінку знахідки.

    З глибокою повагою,

    Архіваріус Лаври.

    '
  rubric:
  - criteria: Регістр та стиль
    description: Лист витримано у діловому епістолярному стилі з елементами високого
      регістра.
    points: 4
  - criteria: Кличний відмінок
    description: Звертання граматично правильні (використано кличний відмінок).
    points: 3
  - criteria: Етикетні кліше
    description: Наявні правильні формули вітання, інформування про вкладення та прощання.
    points: 3
- type: quiz
  title: Граматика звертання та лексика
  items:
  - question: Яке закінчення має іменник чоловічого роду твердої групи (наприклад,
      Петро) у кличному відмінку?
    explanation: Більшість іменників чоловічого роду твердої групи мають у кличному
      відмінку закінчення -е.
    options:
    - text: -е
      correct: true
    - text: -ю
      correct: false
    - text: -о
      correct: false
    - text: -у
      correct: false
  - question: Як правильно звернутися до людини на ім'я Андрій?
    explanation: Імена чоловічого роду м'якої групи на -й у кличному відмінку мають
      закінчення -ю.
    options:
    - text: Андрію
      correct: true
    - text: Андрій
      correct: false
    - text: Андріє
      correct: false
    - text: Андрієві
      correct: false
  - question: Як граматично правильно звернутися до чоловіка, використовуючи його
      прізвище (наприклад, Коваль)?
    explanation: У складених звертаннях до чоловіка обидва слова ставляться у кличний
      відмінок.
    options:
    - text: пане Ковалю
      correct: true
    - text: пан Коваль
      correct: false
    - text: пане Коваль
      correct: false
    - text: пан Ковалю
      correct: false
  - question: Яка форма вітання є історично та граматично найбільш правильною та природною
      в українській мові?
    explanation: Традиційне вітання є констатацією факту і вимагає називного відмінка.
    options:
    - text: Добрий день!
      correct: true
    - text: Доброго дня!
      correct: false
    - text: Гарного дня!
      correct: false
    - text: З добрим днем!
      correct: false
  - question: Що означає церковний термін "парафія" у щоденному житті релігійної громади?
    explanation: Парафія — це спільнота вірян, об'єднана навколо місцевого храму.
    options:
    - text: Нижчу церковну адміністративну одиницю навколо храму
      correct: true
    - text: Головний храм міста
      correct: false
    - text: Молитву за здоров'я
      correct: false
    - text: Зібрання всіх єпископів
      correct: false
  - question: Яке з цих слів є маркером піднесеного, урочистого або релігійного стилю
      спілкування?
    explanation: Слово "воістину" традиційно використовується у високому книжному
      та сакральному стилі.
    options:
    - text: воістину
      correct: true
    - text: справді
      correct: false
    - text: дійсно
      correct: false
    - text: точно
      correct: false
  - question: Як правильно утворити форму кличного відмінка від іменника "лікар"?
    explanation: Іменники м'якої групи на -р у кличному відмінку мають закінчення
      -ю.
    options:
    - text: лікарю
      correct: true
    - text: лікаре
      correct: false
    - text: лікар
      correct: false
    - text: лікару
      correct: false
  - question: Що означає специфічне епістолярне слово "вкладення" у сучасній електронній
      переписці?
    explanation: У цифрову добу вкладення (attachment) — це файл, доданий до електронного
      повідомлення.
    options:
    - text: Додатковий файл, прикріплений до електронного листа
      correct: true
    - text: Конверт для паперового листа
      correct: false
    - text: Поштову марку
      correct: false
    - text: Грошовий переказ
      correct: false
  - question: Як правильно утворити кличний відмінок від жіночого імені Марія?
    explanation: Жіночі імена м'якої групи, що закінчуються на -ія, мають закінчення
      -є у кличному відмінку.
    options:
    - text: Маріє
      correct: true
    - text: Марія
      correct: false
    - text: Марію
      correct: false
    - text: Марійо
      correct: false
  - question: Яку функцію виконує кличний відмінок згідно з Державним стандартом української
      мови?
    explanation: Кличний відмінок завжди використовується для безпосереднього звертання
      до адресата.
    options:
    - text: Чітко позначає акцентованого адресата мовлення
      correct: true
    - text: Вказує на суб'єкт дії
      correct: false
    - text: Описує місце події
      correct: false
    - text: Позначає час виконання дії
      correct: false
  instruction: Оберіть правильну відповідь.
- type: match-up
  title: 'Знайдіть відповідники: кличний відмінок'
