- type: fill-in
  title: 'Доповніть речення: ділове листування'
  instruction: Оберіть правильне слово для заповнення пропусків у діловому листі.
  items:
  - sentence: Шановний пане _, звертаємося до вас з приводу нашого проєкту.
    answer: директоре
    options:
    - директоре
    - директор
    - директору
    - директором
    explanation: У звертанні використовується кличний відмінок.
  - sentence: У _ надсилаю вам детальний звіт за минулий квартал.
    answer: вкладенні
    options:
    - вкладенні
    - листі
    - конверті
    - файлі
    explanation: Епістолярне кліше електронної пошти вимагає слова "вкладенні".
  - sentence: Заздалегідь дуже _ за вашу оперативну відповідь.
    answer: вдячний
    options:
    - вдячний
    - радий
    - щасливий
    - добрий
    explanation: Стандартна етикетна формула очікування дій адресата.
  - sentence: З _ повагою, Максим Петренко.
    answer: глибокою
    options:
    - глибокою
    - великою
    - сильною
    - широкою
    explanation: Офіційна формула прощання часто використовує прикметник "глибокою".
  - sentence: Добрий _, шановна громадо!
    answer: день
    options:
    - день
    - дня
    - дню
    - днем
    explanation: Вітання є констатацією факту, тому використовуємо називний відмінок.
  - sentence: _ пані Олено, дозвольте запросити вас на зустріч.
    answer: Шановна
    options:
    - Шановна
    - Шановний
    - Дорога
    - Люба
    explanation: Формальний лист вимагає офіційного звертання "Шановна".
  - sentence: Звертаємося до вас з _ організації наукової конференції.
    answer: приводу
    options:
    - приводу
    - причиною
    - питанням
    - метою
    explanation: Типове кліше початку ділового листа — "з приводу".
  - sentence: _ Ваш, Іван Коваль.
    answer: Щиро
    options:
    - Щиро
    - Вірно
    - Чесно
    - Правдиво
    explanation: '"Щиро Ваш" — традиційна форма завершення листа.'
  - sentence: Ми готові внести всі необхідні корективи відповідно до ваших _.
    answer: зауважень
    options:
    - зауважень
    - критиків
    - слів
    - думок
    explanation: В офіційному листуванні очікують на зауваження та побажання.
  - sentence: Сподіваюся на подальшу плідну _ між нашими установами.
    answer: співпрацю
    options:
    - співпрацю
    - роботу
    - дружбу
    - поміч
    explanation: Формальне кліше — "плідна співпраця".
- type: group-sort
