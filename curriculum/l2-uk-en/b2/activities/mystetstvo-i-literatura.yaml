- type: reading
  title: 'Уривок про петриківський розпис'
  instruction: 'Прочитайте текст та підготуйтеся до обговорення відповідей на запитання.'
  text: |
    Петриківський розпис є одним із найвпізнаваніших символів українського народного мистецтва. Цей стиль виник на Дніпропетровщині й первісно використовувався для прикрашання білих стін сільських хат та печей. Кожен елемент орнаменту має свою глибоку семантику: калина символізує дівочу красу та молодість, а дуб уособлює міцну чоловічу силу. Майстри часто використовують унікальний інструмент — пензлик з котячої шерсті, який дозволяє проводити надзвичайно витончені лінії. Це мистецтво визнане частиною світової спадщини ЮНЕСКО.
  tasks:
    - 'Яке походження петриківського розпису та де його первісно використовували?'
    - 'Що саме символізують калина та дуб у цьому традиційному орнаменті?'
    - 'Який унікальний інструмент допомагає майстрам створювати такі тонкі лінії?'
    - 'Як міжнародна спільнота визнала цінність цього українського мистецтва?'

- type: true-false
  title: 'Культурні факти та міфи'
  instruction: 'Визначте, чи є твердження правдивим чи хибним, спираючись на знання українського культурного контексту.'
  items:
    - statement: 'Український культурний ландшафт формувався виключно під впливом західноєвропейського Ренесансу.'
      correct: false
      explanation: 'Він також зазнав величезного впливу Візантії та традицій Великого Степу.'
    - statement: 'Казимир Малевич мав глибокий ідейний зв''язок з українським народним мистецтвом.'
      correct: true
      explanation: 'Його знаменитий супрематизм має коріння в традиційному українському розписі та орнаментах.'
    - statement: 'Школа бойчукістів намагалася відродити монументальний стиль часів Київської Русі.'
      correct: true
      explanation: 'Цей унікальний напрямок поєднання авангарду та традицій отримав назву неовізантизм.'
    - statement: 'Під час війни сучасне мистецтво в Україні повністю втратило своє колишнє суспільне значення.'
      correct: false
      explanation: 'Навпаки, воно стало потужним інструментом рефлексії, емоційного порятунку та активного спротиву.'
    - statement: 'Народний іконопис українських майстрів суворо дотримувався візантійського канону та аскетизму.'
      correct: false
      explanation: 'Сільські майстри малювали святих дуже теплими: часто у вишиванках і з рум''яними щоками.'
    - statement: 'В українській мові слово митець є синонімом до слова художник, але воно має значно вищий стиль.'
      correct: true
      explanation: 'Митець — це поважний творець у будь-якому виді мистецтва (скульптор, режисер, письменник).'
    - statement: 'Твори Лесі Українки розкривають виключно проблеми важкого життя простих селян.'
      correct: false
      explanation: 'Вона підняла українську літературу на саму вершину європейського інтелектуального театру.'
    - statement: 'Термін живопис професіонали використовують для картин, які намальовані лише олівцем або вугіллям.'
      correct: false
      explanation: 'Живопис використовує фарби, а олівцем працюють у жанрі графіки.'
    - statement: 'Майстрині петриківського розпису завжди ретельно малюють попередній ескіз простим олівцем.'
      correct: false
      explanation: 'Вони відразу працюють фарбою без ескізів, тримаючи весь орнамент у голові.'
    - statement: 'Покоління українських шістдесятників повернуло в поезію щирість, психологізм та національну гідність.'
      correct: true
      explanation: 'Це була нова література надзвичайно високого етичного та морального стандарту.'

- type: quiz
  title: 'Мистецькі концепції та спеціальна лексика'
  instruction: 'Оберіть одну правильну відповідь на кожне запитання про українську культуру.'
  items:
    - question: 'Який художній напрям в українському мистецтві намагався поєднати досягнення європейського модернізму з традиціями візантійської фрески?'
      explanation: 'Цей унікальний напрямок, створений амбітною школою Михайла Бойчука, отримав назву неовізантизм.'
      options:
        - text: 'неовізантизм'
          correct: true
        - text: 'супрематизм'
          correct: false
        - text: 'соціалістичний реалізм'
          correct: false
        - text: 'імпресіонізм'
          correct: false
    - question: 'Яке дієслово слід обов''язково використовувати в українській мові, коли ми описуємо створення картини за допомогою олійних фарб?'
      explanation: 'Справжні професіонали не малюють олійними фарбами, а саме пишуть свої картини.'
      options:
        - text: 'писати'
          correct: true
        - text: 'малювати'
          correct: false
        - text: 'креслити'
          correct: false
        - text: 'зображати'
          correct: false
    - question: 'Що саме символізує така популярна рослина як калина в традиційному українському петриківському розписі?'
      explanation: 'Калина традиційно вважається яскравим символом дівочої краси та молодості в українському народному орнаменті.'
      options:
        - text: 'дівочу красу'
          correct: true
        - text: 'чоловічу силу'
          correct: false
        - text: 'мудрість предків'
          correct: false
        - text: 'військову звитягу'
          correct: false
    - question: 'Яке поняття найточніше описує кольорову гаму будь-якої картини під час її професійного мистецтвознавчого аналізу?'
      explanation: 'Термін колорит використовується для опису гармонійного поєднання різних кольорів на полотні.'
      options:
        - text: 'колорит'
          correct: true
        - text: 'живопис'
          correct: false
        - text: 'композиція'
          correct: false
        - text: 'сюжет'
          correct: false
    - question: 'Яку стилістичну помилку найчастіше роблять глядачі, коли намагаються описати загальну атмосферу або емоційний вплив мистецького твору?'
      explanation: 'Вираз викликає настрій є абсолютною калькою, правильно і стилістично красиво казати навіює сум або радість.'
      options:
        - text: 'викликає настрій'
          correct: true
        - text: 'навіює спокій'
          correct: false
        - text: 'створює атмосферу'
          correct: false
        - text: 'передає відчуття'
          correct: false
    - question: 'Який сучасний літературний напрям активно використовує іронію, мовну гру та деконструкцію відомих класичних національних міфів?'
      explanation: 'Постмодернізм характеризується сильною іронією та переосмисленням традиційних наративів у сучасній прозі.'
      options:
        - text: 'постмодернізм'
          correct: true
        - text: 'романтизм'
          correct: false
        - text: 'реалізм'
          correct: false
        - text: 'неокласицизм'
          correct: false
    - question: 'Яке надзвичайно трагічне явище в історії української культури отримало назву Розстріляне відродження у страшних тридцятих роках?'
      explanation: 'Цей термін стосується масового знищення українських митців та письменників-авангардистів тоталітарним режимом.'
      options:
        - text: 'репресії проти української інтелігенції'
          correct: true
        - text: 'занепад традиційного народного мистецтва'
          correct: false
        - text: 'відмова від європейських культурних впливів'
          correct: false
        - text: 'руйнування давніх церковних споруд'
          correct: false
    - question: 'Яким унікальним інструментом постійно користуються майстрині петриківського розпису для створення найтонших та найвитонченіших орнаментальних ліній?'
      explanation: 'Котячка — це традиційний саморобний пензлик з котячої шерсті, який є головним інструментом у Петриківці.'
      options:
        - text: 'пензликом з котячої шерсті'
          correct: true
        - text: 'тонкою дерев''яною паличкою'
          correct: false
        - text: 'спеціальним вугільним олівцем'
          correct: false
        - text: 'дуже гострим металевим пером'
          correct: false
    - question: 'Яка дуже незвична спільна риса була характерною для народних ікон, які створювали українські сільські богомази?'
      explanation: 'Вони зображували святих як теплих та близьких людей, дуже часто у вишиванках і з рум''яними щоками.'
      options:
        - text: 'святі зображувалися близькими та теплими'
          correct: true
        - text: 'суворе дотримання суворого візантійського канону'
          correct: false
        - text: 'використання виключно темних земляних кольорів'
          correct: false
        - text: 'повна відсутність будь-яких рослинних орнаментів'
          correct: false
    - question: 'Яке слово найкраще підійде як гарний стилістичний синонім до слова зобразити, щоб уникати постійних тавтологій у мистецтвознавчому тексті?'
      explanation: 'Слово відтворити є чудовим і дуже професійним варіантом для уникнення повторів слова зобразити.'
      options:
        - text: 'відтворити'
          correct: true
        - text: 'присутній'
          correct: false
        - text: 'викликати'
          correct: false
        - text: 'відноситися'
          correct: false

