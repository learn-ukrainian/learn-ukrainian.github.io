- type: cloze
  title: 'Відновіть мистецьку рецензію'
  instruction: 'Оберіть правильне і найбільш доречне слово для кожного пропуску в тексті цієї мистецтвознавчої рецензії.'
  passage: 'Нещодавно відкрита {{1}} сучасного українського концептуального живопису стала справжньою культурною подією року. Її головна кураторська {{2}} органічно об''єднує найрізноманітніші роботи багатьох талановитих авторів. Кожен представлений {{3}} блискуче продемонстрував свою унікальну техніку та дуже високу професійну {{4}}. На багатьох масштабних полотнах виразно {{5}} дуже стримані, виключно холодні кольори, що майстерно створює загальний меланхолійний та сумний {{6}}. Однак глибинний філософський {{7}} цих надзвичайних творів зовсім не є песимістичним або депресивним. Сучасні автори намагаються максимально глибоко {{8}} нашу нову складну реальність та кардинальні зміни в суспільстві. Центральним і найголовнішим елементом цієї експозиції є монументальне епічне {{9}}, яке одразу привертає увагу своїм велетенським масштабом. Його розгалужений нелінійний {{10}} розповідає дуже складну історію про важкий пошук власної національної {{11}}. Відомі критики вже написали далеко не одну позитивну {{12}} на цю резонансну подію. Вони відзначають безперечне і радикальне {{13}} молодих авторів, які зовсім не бояться сміливо експериментувати. Емоційний {{14}} цих грандіозних робіт на кожного глядача є надзвичайно сильним. Ця масштабна експозиція — це не лише чисто формальний візуальний {{15}} фарб, але й справжня і дуже глибока філософська {{16}}.'
  blanks:
    - id: 1
      answer: 'виставка'
      options: ['виставка', 'велика книга', 'сучасна п''єса', 'відома скульптура']
