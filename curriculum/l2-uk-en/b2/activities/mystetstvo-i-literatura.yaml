      options: ['композиція', 'складна фабула', 'цікава метафора', 'багата палітра']
    - id: 3
      answer: 'митець'
      options: ['митець', 'уважний глядач', 'суворий критик', 'головний герой']
    - id: 4
      answer: 'майстерність'
      options: ['майстерність', 'тонку лінію', 'велику радість', 'багату спадщину']
    - id: 5
      answer: 'переважають'
      options: ['переважають', 'відтворюють', 'швидко роблять', 'сильно викликають']
    - id: 6
      answer: 'колорит'
      options: ['колорит', 'відомий сюжет', 'старий орнамент', 'новий образ']
    - id: 7
      answer: 'зміст'
      options: ['зміст', 'сильний вплив', 'старий живопис', 'відомий автор']
    - id: 8
      answer: 'аналізувати'
      options: ['аналізувати', 'швидко малювати', 'завжди забувати', 'багато читати']
    - id: 9
      answer: 'полотно'
