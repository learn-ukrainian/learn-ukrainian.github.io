- type: essay-response
  title: 'Написання мистецтвознавчої рецензії'
  instruction: 'Напишіть розгорнуту та глибоку рецензію на ваш улюблений твір мистецтва.'
  min_words: 150
  prompt: 'Уявіть себе професійним куратором галереї. Напишіть критичну мистецтвознавчу рецензію (мінімум 150 слів) на будь-яку відому українську картину, літературний твір або фільм. Використайте класичну структуру рецензії (вступ з контекстом, опис змісту, аналіз форми, висновок). Обов''язково застосуйте не менше п''яти нових мистецтвознавчих термінів з цього модуля (наприклад: колорит, композиція, сюжет, митець, новаторство, відтворювати, навіювати).'
  model_answer: 'Хочу детально поділитися своїми глибокими враженнями від всесвітньо відомої картини Казимира Малевича під назвою "Чорний квадрат". Цей видатний твір є надзвичайно визначним прикладом українського авангарду, який мав просто колосальний вплив на все світове мистецтво двадцятого століття. На перший погляд, композиція цього скандального твору здається надзвичайно простою та мінімалістичною, але її глибокий філософський зміст безумовно потребує дуже вдумливого та уважного аналізу від кожного критика. Створюючи це полотно, неймовірно талановитий митець абсолютно свідомо відмовився від класичного сюжету і будь-якого реалістичного відтворення навколишнього світу. Його справжнє радикальне новаторство полягає саме в тому, що він звів образотворче мистецтво до найпростіших геометричних форм, які, за його власними словами, мають глибоке коріння в українському традиційному народному орнаменті та вишивці. На великому полотні повністю переважає абсолютний чорний колір, який відразу навіює уважному глядачеві відчуття безкінечності, космічної порожнечі та абсолютної тиші. Це зовсім не просто традиційний живопис, це справжня візуальна філософія та дуже смілива деконструкція всіх попередніх мистецьких канонів. Моя особиста рецензія на цей твір однозначно позитивна, адже надзвичайна майстерність Малевича відкрила абсолютно нову сторінку в історії світової культури, показавши, що сучасне мистецтво може бути вільним від реалістичної форми предметів.'
  rubric:
    - criteria: 'Структура рецензії'
      description: 'Текст має чіткий вступ, опис змісту, глибокий аналіз форми та власну аргументовану оцінку.'
      points: 5
    - criteria: 'Використання лексики'
      description: 'Дуже правильно та доречно використано щонайменше п''ять мистецтвознавчих термінів рівня В2.'
      points: 5
    - criteria: 'Граматика та стилістика'
      description: 'Повністю відсутні русизми (наприклад, "присутні кольори", "викликати настрій"), використано складні синтаксичні конструкції.'
      points: 5