- type: fill-in
  title: 'Слова в контексті'
  instruction: 'Оберіть правильне слово для кожного речення.'
  items:
    - sentence: 'Для свого курсового проекту студент підготував надзвичайно детальний _________ сучасної української драми.'
      answer: 'аналіз'
      options: ['аналіз', 'вплив', 'колорит', 'сюжет']
      explanation: 'Аналіз означає детальне дослідження твору.'
    - sentence: 'Талановитому художнику вдалося створити дуже теплий _________ на цьому осінньому пейзажі.'
      answer: 'колорит'
      options: ['колорит', 'образ', 'зміст', 'авангард']
      explanation: 'Колорит описує поєднання кольорів на картині.'
    - sentence: 'Головний режисер театру вирішив повністю змінити _________ класичної п''єси у своїй новій постановці.'
      answer: 'сюжет'
      options: ['сюжет', 'живопис', 'орнамент', 'вплив']
      explanation: 'Сюжет — це лінія подій у творі.'
    - sentence: 'Цей видатний та дуже відомий _________ залишив після себе десятки геніальних скульптур та інсталяцій.'
      answer: 'митець'
      options: ['митець', 'живопис', 'образ', 'зміст']
      explanation: 'Слово митець чудово підходить для скульпторів та авторів просторових інсталяцій.'
    - sentence: 'Нова масштабна _________ в національному музеї повністю присвячена подіям Революції Гідності.'
      answer: 'виставка'
      options: ['виставка', 'композиція', 'фреска', 'рецензія']
      explanation: 'Виставка — це публічний показ творів мистецтва.'
    - sentence: 'У своїх пронизливих віршах молодий поет намагався чесно _________ найглибші почуття свого покоління.'
      answer: 'відтворити'
      options: ['відтворити', 'навіювати', 'переважати', 'викликати']
      explanation: 'Відтворити означає правдиво передати почуття або реальність.'
    - sentence: 'Суворий арт-критик написав абсолютно розгромну _________ на вчорашню театральну прем''єру.'
      answer: 'рецензію'
      options: ['рецензію', 'композицію', 'фреску', 'мозаїку']
      explanation: 'Рецензія — це аналітичний і часто критичний відгук.'
    - sentence: 'На цій абстрактній картині явно _________ холодні відтінки глибокого синього та сірого кольорів.'
      answer: 'переважають'
      options: ['переважають', 'відтворюють', 'втілюють', 'навіюють']
      explanation: 'Дієслово переважати використовується, коли якихось певних кольорів на полотні найбільше.'
    - sentence: 'Справжнє геніальне _________ цього режисера полягає у постійному використанні незвичних візуальних ефектів.'
      answer: 'новаторство'
      options: ['новаторство', 'майстерність', 'полотно', 'сюжет']
      explanation: 'Новаторство означає застосування чогось абсолютно нового та незвичного.'
    - sentence: 'Іван Франко зміг потужно підняти філософський _________ української інтелектуальної прози на європейський рівень.'
      answer: 'зміст'
      options: ['зміст', 'живопис', 'колорит', 'вплив']
      explanation: 'Зміст стосується ідейного та філософського наповнення тексту.'

- type: unjumble
  title: 'Побудова мистецтвознавчих речень'
  instruction: 'Складіть правильні та логічні речення з поданих слів.'
  items:
    - words: ['Цей', 'надзвичайно', 'талановитий', 'митець', 'створив', 'свій', 'найкращий', 'роман', 'минулого', 'року']
      answer: 'Цей надзвичайно талановитий митець створив свій найкращий роман минулого року'
    - words: ['На', 'цій', 'сучасній', 'картині', 'переважають', 'дуже', 'яскраві', 'та', 'насичені', 'кольори']
      answer: 'На цій сучасній картині переважають дуже яскраві та насичені кольори'
    - words: ['Сучасне', 'українське', 'мистецтво', 'стало', 'потужним', 'інструментом', 'емоційного', 'опору', 'ворогу']
      answer: 'Сучасне українське мистецтво стало потужним інструментом емоційного опору ворогу'
    - words: ['Майстрині', 'петриківського', 'розпису', 'ніколи', 'не', 'роблять', 'попередніх', 'ескізів', 'простим', 'олівцем']
      answer: 'Майстрині петриківського розпису ніколи не роблять попередніх ескізів простим олівцем'
    - words: ['Художнику', 'вдалося', 'абсолютно', 'геніально', 'відтворити', 'похмуру', 'атмосферу', 'старого', 'осіннього', 'міста']
      answer: 'Художнику вдалося абсолютно геніально відтворити похмуру атмосферу старого осіннього міста'
    - words: ['Написання', 'хорошої', 'професійної', 'рецензії', 'завжди', 'вимагає', 'розуміння', 'глибокого', 'історичного', 'контексту']
      answer: 'Написання хорошої професійної рецензії завжди вимагає розуміння глибокого історичного контексту'
    - words: ['Бойчукісти', 'намагалися', 'дуже', 'органічно', 'поєднати', 'європейський', 'модернізм', 'із', 'традиційною', 'візантійською', 'мозаїкою']
      answer: 'Бойчукісти намагалися дуже органічно поєднати європейський модернізм із традиційною візантійською мозаїкою'
    - words: ['Видатна', 'Леся', 'Українка', 'підняла', 'нашу', 'національну', 'драматургію', 'на', 'новий', 'інтелектуальний', 'рівень']
      answer: 'Видатна Леся Українка підняла нашу національну драматургію на новий інтелектуальний рівень'

- type: error-correction
  title: 'Виправляємо стилістичні помилки'
  instruction: 'Знайдіть та виправте русизми або лексичні кальки у мистецтвознавчих реченнях.'
  items:
    - sentence: 'На цій чудовій сучасній картині присутні дуже холодні відтінки.'
      error: 'присутні'
      answer: 'переважають'
      error_type: 'word'
      options: ['переважають', 'є', 'знаходяться', 'малюються']
      explanation: 'Вираз присутні кольори є поширеною калькою. Правильно казати, що кольори переважають або їх використано.'
