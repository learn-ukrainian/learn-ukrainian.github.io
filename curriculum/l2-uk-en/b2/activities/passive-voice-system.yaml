- type: quiz
  title: 'Теорія пасивного стану: філософія та вживання'
  instruction: 'Оберіть правильну відповідь на запитання щодо природи та функцій пасивного стану в українській мові.'
  items:
    - question: 'Яка фундаментальна відмінність у фокусі уваги між активним та пасивним станом в українській мові?'
      explanation: 'В активному стані головним є виконавець (агент), а в пасивному — об’єкт, який зазнає змін.'
      options:
        - text: 'Активний стан фокусується на виконавці, а пасивний — на об’єкті дії.'
          correct: true
        - text: 'Активний стан використовується лише в минулому часі, а пасивний — у теперішньому.'
          correct: false
        - text: 'Пасивний стан завжди вказує на відсутність результату дії.'
          correct: false
        - text: 'Немає жодної відмінності, це просто різні граматичні форми.'
          correct: false
    - question: 'Що таке "зсув агентності" (agency shift) у контексті сучасної української мови?'
      explanation: 'Це тенденція до використання активних конструкцій, де суб’єкт бере на себе відповідальність.'
      options:
        - text: 'Відмова від безособових конструкцій на користь активних форм, що підкреслюють відповідальність.'
          correct: true
        - text: 'Заміна всіх українських слів на іншомовні запозичення.'
          correct: false
        - text: 'Використання виключно пасивних конструкцій у всіх стилях мовлення.'
          correct: false
        - text: 'Перенесення наголосу на останній склад у дієсловах.'
          correct: false
    - question: 'У якому випадку використання пасивного стану є найбільш виправданим та доречним?'
      explanation: 'Пасив ідеальний для наукового об’єктивізму або коли виконавець невідомий.'
      options:
        - text: 'Коли виконавець дії невідомий, неважливий або ми хочемо підкреслити об’єктивність факту.'
          correct: true
        - text: 'Коли ми хочемо приховати власну помилку або уникнути відповідальності.'
          correct: false
        - text: 'Коли ми розповідаємо про свої особисті досягнення та плани.'
          correct: false
        - text: 'У будь-якій розмові, щоб звучати більш розумно та офіційно.'
          correct: false
    - question: 'Яка форма пасиву найкраще підходить для фіксації доконаного факту в офіційних документах?'
      explanation: 'Безособові форми на -но/-то констатують факт без емоцій.'
      options:
        - text: 'Безособові форми на -но/-то (наприклад, "закон ухвалено").'
          correct: true
        - text: 'Зворотний пасив із часткою -ся (наприклад, "закон ухвалюється").'
          correct: false
        - text: 'Третя особа множини (наприклад, "закон ухвалили").'
          correct: false
        - text: 'Активні дієприкметники теперішнього часу (наприклад, "ухвалюючий закон").'
          correct: false
    - question: 'Чому не можна використовувати зворотний пасив із часткою -ся для опису завершеної дії?'
      explanation: 'Частка -ся здебільшого вказує на недоконаний вид, тобто процес.'
      options:
        - text: 'Тому що ця форма зазвичай вживається з недоконаним видом і описує тривалий процес.'
          correct: true
        - text: 'Тому що частка -ся заборонена в літературній українській мові.'
          correct: false
        - text: 'Тому що це звучатиме занадто офіційно та бюрократично.'
          correct: false
        - text: 'Тому що така конструкція вимагає обов’язкової наявності підмета.'
          correct: false
    - question: 'Яка синтаксична особливість характерна для безособових речень на -но/-то?'
      explanation: 'У таких реченнях об’єкт стоїть у знахідному відмінку, а підмета немає.'
      options:
        - text: 'Відсутність підмета та об’єкт у знахідному відмінку (кого? що?).'
          correct: true
        - text: 'Обов’язкова наявність підмета в називному відмінку.'
          correct: false
        - text: 'Використання об’єкта в орудному відмінку (ким? чим?).'
          correct: false
        - text: 'Узгодження присудка з об’єктом у роді та числі.'
          correct: false
    - question: 'Який стиль мовлення найчастіше використовує неозначено-особові речення (3-тя особа множини)?'
      explanation: 'Це типово для розмовного стилю та новин, де джерело узагальнене.'
      options:
        - text: 'Розмовний стиль та медійні повідомлення про узагальнені події.'
          correct: true
        - text: 'Суворий юридичний протокол та законодавчі акти.'
          correct: false
        - text: 'Наукові дисертації та технічні інструкції.'
          correct: false
        - text: 'Художні описи природи та пейзажів.'
          correct: false
    - question: 'Як правильно перекласти українською конструкцію "It was decided by us"?'
      explanation: 'Активна форма "Ми вирішили" є найбільш природною.'
      options:
        - text: 'Ми вирішили (активна форма, що підкреслює відповідальність).'
          correct: true
        - text: 'Нами було вирішено (калька з англійської).'
          correct: false
        - text: 'Рішення було прийняте нами (надмірно пасивна конструкція).'
          correct: false
        - text: 'Рішення приймалося нами (неправильний вид дієслова).'
          correct: false
    - question: 'Що таке "активні дієприкметники теперішнього часу" і чому їх слід уникати?'
      explanation: 'Форми типу "читаючий" є кальками і невластиві українській мові.'
      options:
        - text: 'Це штучні форми типу "бажаючий", які є кальками з російської мови.'
          correct: true
        - text: 'Це питомі українські слова, які збагачують наше мовлення.'
          correct: false
        - text: 'Це форми минулого часу, які використовуються для опису майбутнього.'
          correct: false
        - text: 'Це дієслова, які завжди пишуться з великої літери.'
          correct: false
    - question: 'Яку функцію виконують дієприкметники на -ний/-тий у художньому тексті?'
      explanation: 'Вони створюють статичний опис, "мовний натюрморт".'
      options:
        - text: 'Вони створюють статичний опис стану або властивості предмета.'
          correct: true
        - text: 'Вони показують активний розвиток подій та динаміку сюжету.'
          correct: false
        - text: 'Вони використовуються для передачі прямої мови персонажів.'
          correct: false
        - text: 'Вони завжди вказують на майбутній час дії.'
          correct: false

- type: match-up
  title: 'Класифікація форм пасиву'
  instruction: 'Поєднайте тип пасивної конструкції з її характеристикою або прикладом.'
  pairs:
    - left: 'Дієприкметник на -ний/-тий'
      right: 'Описує стан або властивість предмета (Лист написаний)'
    - left: 'Безособова форма на -но/-то'
      right: 'Констатує факт завершеної дії без вказівки на особу (Листа написано)'
    - left: 'Зворотний пасив на -ся'
      right: 'Описує тривалий процес або закономірність (Лист пишеться)'
    - left: 'Третя особа множини'
      right: 'Вказує на дію невизначених осіб (Лист пишуть / написали)'
    - left: 'Активний стан (Agency)'
      right: 'Суб’єкт діє самостійно та відповідально (Я написав лист)'
    - left: 'Офіційно-діловий стиль'
      right: 'Перевага безособових форм для об’єктивності (Наказ підписано)'
    - left: 'Науковий стиль'
      right: 'Використання пасиву на -ся для опису законів (Метал розширюється)'
    - left: 'Розмовний стиль'
      right: 'Перевага неозначено-особових речень (Кажуть, що буде дощ)'
    - left: 'Імпліцитний агент'
      right: 'Виконавець мається на увазі, але не названий (Дороги ремонтують)'
    - left: 'Синтаксичний парадокс'
      right: 'Відсутність підмета при формах на -но/-то (Збудовано міст)'
    - left: 'Калька з російської'
      right: 'Штучні форми типу "читаючий", "бажаючий"'
    - left: 'Пасивний стан у минулому'
      right: 'Використання дієслова "бути" (Будинок був збудований)'

- type: group-sort
  title: 'Сортування речень за типом пасиву'
  instruction: 'Визначте, до якого типу пасивної конструкції (або активу) належить кожне речення.'
  groups:
    - name: 'Дієприкметник (-ний/-тий)'
      items:
        - 'Двері зачинені на замок.'
        - 'Ця картина намальована відомим художником.'
        - 'Робота була виконана вчасно.'
        - 'Всі квитки вже продані.'
    - name: 'Безособова форма (-но/-то)'
      items:
        - 'Вхід суворо заборонено.'
        - 'Рішення ухвалено одноголосно.'
        - 'Поле повністю зорано.'
        - 'Ворога було розбито вщент.'
    - name: 'Зворотний пасив (-ся)'
      items:
        - 'Цей журнал видається щомісяця.'
        - 'Будинок будується дуже повільно.'
        - 'Такі помилки не пробачаються.'
        - 'Кава готується зі свіжих зерен.'
    - name: 'Третя особа множини'
      items:
        - 'Тобі дзвонили з банку.'
        - 'У новинах передавали прогноз погоди.'
        - 'Тут готують смачну піцу.'
        - 'Нам сказали чекати на вулиці.'

- type: fill-in
  title: 'Трансформація: Актив → Дієприкметник'
  instruction: 'Перетворіть активне речення на пасивну конструкцію з дієприкметником (що зроблений?), узгодивши його з новим підметом.'
  items:
    - sentence: 'Архітектор спроєктував цю будівлю.'
      answer: 'проєктована'
      options: ['проєктована', 'проєктовано', 'проєктується', 'проєктували']
      explanation: 'Ця будівля (вона) — спроєктована.'
    - sentence: 'Ми вже виконали це складне завдання.'
      answer: 'виконане'
      options: ['виконане', 'виконано', 'виконується', 'виконали']
      explanation: 'Це завдання (воно) — виконане.'
    - sentence: 'Студенти прочитали всі книги зі списку.'
      answer: 'прочитані'
      options: ['прочитані', 'прочитано', 'читаються', 'прочитали']
      explanation: 'Всі книги (вони) — прочитані.'
    - sentence: 'Компанія підписала важливий договір.'
      answer: 'підписаний'
      options: ['підписаний', 'підписано', 'підписується', 'підписали']
      explanation: 'Договір (він) — підписаний.'
    - sentence: 'Бабуся вишила цей чудовий рушник.'
      answer: 'вишитий'
      options: ['вишитий', 'вишито', 'вишивається', 'вишили']
      explanation: 'Рушник (він) — вишитий.'
    - sentence: 'Робітники помили вікна в офісі.'
      answer: 'помиті'
      options: ['помиті', 'помито', 'миються', 'мили']
      explanation: 'Вікна (вони) — помиті.'
    - sentence: 'Ураган зламав старе дерево.'
      answer: 'зламане'
      options: ['зламане', 'зламано', 'ламається', 'ламали']
      explanation: 'Дерево (воно) — зламане.'
    - sentence: 'Вчені відкрили новий закон фізики.'
      answer: 'відкритий'
      options: ['відкритий', 'відкрито', 'відкривається', 'відкрили']
      explanation: 'Закон (він) — відкритий.'
    - sentence: 'Секретар надрукував офіційний лист.'
      answer: 'надрукований'
      options: ['надрукований', 'надруковано', 'друкується', 'друкували']
      explanation: 'Лист (він) — надрукований.'
    - sentence: 'Музиканти зіграли фінальну мелодію.'
      answer: 'зіграна'
      options: ['зіграна', 'зіграно', 'грається', 'зіграли']
      explanation: 'Мелодія (вона) — зіграна.'

- type: quiz
  title: 'Трансформація: Дієприкметник → Безособова форма'
  instruction: 'Оберіть правильний варіант трансформації речення у безособову форму (на -но/-то). Зверніть увагу на зміну відмінка!'
  items:
    - question: "Трансформуйте: 'Ця робота була зроблена вчасно.'"
      explanation: 'В безособовому реченні об’єкт переходить у знахідний відмінок (кого? що?).'
      options:
        - text: "Цю роботу було зроблено вчасно."
          correct: true
        - text: "Ця робота було зроблено вчасно."
          correct: false
        - text: "Цю роботу була зроблена вчасно."
          correct: false
        - text: "Цієї роботи було зроблено вчасно."
          correct: false
    - question: "Трансформуйте: 'Закон є ухвалений парламентом.'"
      explanation: 'Підмет "Закон" стає прямим додатком "Закон" (знахідний відмінок), присудок - "ухвалено".'
      options:
        - text: "Закон ухвалено."
          correct: true
        - text: "Закон ухвалений."
          correct: false
        - text: "Закону ухвалено."
          correct: false
        - text: "Законом ухвалено."
          correct: false
    - question: "Трансформуйте: 'Ворог був розбитий вщент.'"
      explanation: 'Підмет "Ворог" (істота) у знахідному відмінку - "Ворога".'
      options:
        - text: "Ворога було розбито вщент."
          correct: true
        - text: "Ворог було розбито вщент."
          correct: false
        - text: "Ворогом було розбито вщент."
          correct: false
        - text: "Ворогу було розбито вщент."
          correct: false
    - question: "Трансформуйте: 'Міст був зруйнований вибухом.'"
      explanation: 'Підмет "Міст" (неістота) у знахідному відмінку - "Міст".'
      options:
        - text: "Міст було зруйновано вибухом."
          correct: true
        - text: "Моста було зруйновано вибухом."
          correct: false
        - text: "Мостом було зруйновано вибухом."
          correct: false
        - text: "Міст був зруйновано вибухом."
          correct: false
    - question: "Трансформуйте: 'Квитки були замовлені заздалегідь.'"
      explanation: 'Підмет "Квитки" (множина) у знахідному відмінку - "Квитки".'
      options:
        - text: "Квитки було замовлено заздалегідь."
          correct: true
        - text: "Квитків було замовлено заздалегідь."
          correct: false
        - text: "Квитками було замовлено заздалегідь."
          correct: false
        - text: "Квитки були замовлено заздалегідь."
          correct: false
    - question: "Трансформуйте: 'Цей факт був забутий істориками.'"
      explanation: 'Підмет "факт" у знахідному відмінку - "факт".'
      options:
        - text: "Цей факт було забуто."
          correct: true
        - text: "Цього факту було забуто."
          correct: false
        - text: "Цим фактом було забуто."
          correct: false
        - text: "Цей факт був забуто."
          correct: false
    - question: "Трансформуйте: 'Посіви були знищені градом.'"
      explanation: 'Підмет "Посіви" у знахідному відмінку - "Посіви".'
      options:
        - text: "Посіви було знищено градом."
          correct: true
        - text: "Посівів було знищено градом."
          correct: false
        - text: "Посівами було знищено градом."
          correct: false
        - text: "Посіви були знищено градом."
          correct: false
    - question: "Трансформуйте: 'Двері були зачинені на ключ.'"
      explanation: 'Підмет "Двері" у знахідному відмінку - "Двері".'
      options:
        - text: "Двері було зачинено на ключ."
          correct: true
        - text: "Дверей було зачинено на ключ."
          correct: false
        - text: "Дверима було зачинено на ключ."
          correct: false
        - text: "Двері були зачинено на ключ."
          correct: false
    - question: "Трансформуйте: 'Всі помилки були виправлені.'"
      explanation: 'Підмет "помилки" у знахідному відмінку - "помилки".'
      options:
        - text: "Всі помилки було виправлено."
          correct: true
        - text: "Всіх помилок було виправлено."
          correct: false
        - text: "Всіма помилками було виправлено."
          correct: false
        - text: "Всі помилки були виправлено."
          correct: false
    - question: "Трансформуйте: 'Угода була досягнута після переговорів.'"
      explanation: 'Слово "досягти" вимагає родового відмінка (чого?), тому "Угоди було досягнуто".'
      options:
        - text: "Угоди було досягнуто після переговорів."
          correct: true
        - text: "Угоду було досягнуто після переговорів."
          correct: false
        - text: "Угода було досягнуто після переговорів."
          correct: false
        - text: "Угодою було досягнуто після переговорів."
          correct: false

- type: select
  title: 'Вибір регістру та форми'
  instruction: 'Оберіть найбільш доречний варіант речення для заданої ситуації.'
  items:
    - question: 'Ситуація: Ви пишете офіційний звіт для керівництва про завершення проєкту.'
      options:
        - text: 'Проєкт успішно завершено, всі цілі досягнуто.'
          correct: true
        - text: 'Ми класно завершили проєкт і все зробили.'
          correct: false
        - text: 'Проєкт завершується успішно.'
          correct: false
        - text: 'Кажуть, що проєкт завершили.'
          correct: false
    - question: 'Ситуація: Ви розповідаєте другу плітку про спільного знайомого.'
      options:
        - text: 'Кажуть, його звільнили з роботи.'
          correct: true
        - text: 'Його було звільнено з роботи.'
          correct: false
        - text: 'Він є звільнений з роботи.'
          correct: false
