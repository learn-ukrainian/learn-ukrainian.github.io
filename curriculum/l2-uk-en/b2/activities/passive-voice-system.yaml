- type: essay-response
  title: 'Рерайт: Людяна мова'
  instruction: 'Перепишіть наведений нижче фрагмент офіційного звіту "людською" мовою, використовуючи активні конструкції там, де це доречно, і залишаючи пасив лише для фіксації фактів. Уникайте канцеляриту.'
  prompt: "Текст для редагування: 'Нами було проведено перевірку об'єкта. Було виявлено ряд недоліків, які були допущені підрядником. Керівництвом було прийнято рішення про накладення штрафу. Робота по усуненню недоліків проводиться силами ремонтної бригади. Очікується завершення робіт до кінця місяця.'"
  min_words: 150
  model_answer: "Ми перевірили об'єкт і виявили низку недоліків, яких припустився підрядник. Керівництво вирішило накласти штраф. Ремонтна бригада вже усуває ці недоліки. Ми очікуємо, що роботи завершаться до кінця місяця.\n\nКоментар до змін:\n1. 'Нами було проведено' замінено на 'Ми перевірили' — активна дія суб'єкта.\n2. 'Було виявлено' замінено на 'виявили' (або можна залишити 'Виявлено', якщо це сухий протокол, але в звіті краще актив).\n3. 'Недоліків, які були допущені підрядником' замінено на 'недоліків, яких припустився підрядник' — конкретизація вини.\n4. 'Керівництвом було прийнято рішення' замінено на 'Керівництво вирішило' — керівник є активним діячем.\n5. 'Робота проводиться' замінено на 'Бригада усуває' — процес виконують люди.\n6. 'Очікується завершення' замінено на 'Ми очікуємо' або 'Роботи завершаться' — прогноз на майбутнє."
  rubric:
    - criteria: "Agency Shift"
      description: "Успішна заміна пасивних конструкцій на активні там, де відомий виконавець."
      points: 5
    - criteria: "Стилістика"
      description: "Текст звучить природно, без бюрократичних штампів."
      points: 3
    - criteria: "Граматика"
      description: "Правильне вживання відмінків та дієслівних форм."
      points: 2
