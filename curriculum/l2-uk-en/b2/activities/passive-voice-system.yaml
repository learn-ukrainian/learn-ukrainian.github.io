- type: essay-response
  title: "Анти-канцелярит: редагування тексту"
  instruction: "Перепишіть поданий бюрократичний текст живою, природною українською мовою, використовуючи активні конструкції (Agency Shift). Змініть пасив на актив там, де це доречно."
  prompt: "Перепишіть цей текст: «Мною, інспектором Петренком, було здійснено перевірку приміщення. Під час огляду було виявлено, що вікна були розбиті невідомими особами. Також було зафіксовано відсутність пожежної сигналізації. Нами було складено акт про порушення. Рішення про штраф буде прийнято комісією пізніше.»"
  min_words: 150
  model_answer: "Я, інспектор Петренко, перевірив приміщення. Під час огляду я виявив, що невідомі особи розбили вікна. Також я зафіксував, що пожежної сигналізації немає. Ми склали акт про порушення. Комісія прийме рішення про штраф пізніше. (Цей варіант повертає суб'єктність інспектору та комісії, робить текст чіткішим та відповідальнішим. Замість пасивного «було здійснено» ми вживаємо «я перевірив», замість «було виявлено» — «я виявив». Це демонструє принцип Agency Shift на практиці.)"
  rubric:
    - criteria: "Agency Shift (Зсув агентності)"
      description: "Більшість пасивних конструкцій («було зроблено») успішно замінено на активні («я зробив»)."
      points: 40
    - criteria: "Природність мови"
      description: "Текст звучить як жива мова реальної людини, а не як шаблон документа."
      points: 30
    - criteria: "Граматична правильність"
      description: "Відсутність помилок при перебудові речень."
      points: 30
