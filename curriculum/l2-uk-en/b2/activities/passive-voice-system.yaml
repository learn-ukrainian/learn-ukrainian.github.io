- type: quiz
  title: "Теорія пасиву: розуміння нюансів"
  instruction: "Оберіть правильну відповідь, спираючись на контекст та стилістику."
  items:
    - question: "Яка форма пасиву найкраще підходить для офіційного звіту або наказу, де важливо підкреслити факт завершення дії?"
      explanation: "Безособові форми на -но/-то (наприклад, 'зроблено') є стандартом для офіційно-ділового стилю, оскільки вони констатують факт як 'історичний вирок'."
      options:
        - text: "Безособова форма на -но/-то (наприклад, «наказ підписано»)"
          correct: true
        - text: "Пасивний дієприкметник на -ний/-тий (наприклад, «наказ підписаний»)"
          correct: false
        - text: "Зворотна форма на -ся (наприклад, «наказ підписується»)"
          correct: false
        - text: "3-тя особа множини (наприклад, «наказ підписали»)"
          correct: false
    - question: "Яку форму пасиву доречно використати в дружній розмові, щоб повідомити новину без зайвого офіціозу?"
      explanation: "3-тя особа множини (імпліцитний агент) є найбільш природною для живого спілкування ('Тобі дзвонили', 'Дорогу ремонтують')."
      options:
        - text: "3-тя особа множини (наприклад, «дорогу ремонтують»)"
          correct: true
        - text: "Безособова форма на -но/-то (наприклад, «дорогу відремонтовано»)"
          correct: false
        - text: "Зворотна форма на -ся (наприклад, «дорога ремонтується»)"
          correct: false
        - text: "Пасивний дієприкметник (наприклад, «дорога ремонтована»)"
          correct: false
    - question: "Що означає поняття «Зсув агентності» (Agency Shift) у сучасній українській мові?"
      explanation: "Сучасна мова прагне повернути суб'єктність людині, відмовляючись від бюрократичного пасиву на користь активних конструкцій."
      options:
        - text: "Тенденція замінювати пасивні конструкції активними, повертаючи виконавця"
          correct: true
        - text: "Правило завжди використовувати пасивний стан у наукових текстах"
          correct: false
        - text: "Вимога приховувати виконавця дії в офіційних документах"
          correct: false
        - text: "Граматична зміна закінчень у дієсловах минулого часу"
          correct: false
    - question: "У якому реченні допущено грубу граматичну помилку, типову для калькування з російської мови?"
      explanation: "В українській мові пасивні конструкції на -ся (підручник читається) не можуть мати виконавця в орудному відмінку (учнем)."
      options:
        - text: "Цей підручник читається учнем щодня."
          correct: true
        - text: "Цей підручник читають учні щодня."
          correct: false
        - text: "Цей підручник є рекомендований для учнів."
          correct: false
        - text: "У цьому підручнику описуються цікаві факти."
          correct: false
    - question: "Яка форма пасиву фокусується на ознаці предмета як результаті дії (відповідає на питання «який?»)?"
      explanation: "Пасивні дієприкметники на -ний/-тий (розбитий, вишитий) поводяться як прикметники і описують набуту властивість."
      options:
        - text: "Пасивний дієприкметник на -ний/-тий"
          correct: true
        - text: "Безособова форма на -но/-то"
          correct: false
        - text: "Зворотна форма на -ся"
          correct: false
        - text: "Активний дієприкметник"
          correct: false
    - question: "Коли вживання слова «було» разом із формою на -но/-то є стилістично виправданим?"
      explanation: "Слово 'було' вказує на давність події. Якщо подія є актуальною новиною ('Рішення прийнято'), 'було' є зайвим."
      options:
        - text: "Коли йдеться про подію в далекому минулому, що вже стала історією"
          correct: true
        - text: "Завжди, це обов'язкова граматична зв'язка"
          correct: false
        - text: "Ніколи, це завжди помилка і калька"
          correct: false
        - text: "Коли ми хочемо надати тексту більшої офіційності"
          correct: false
    - question: "Яка форма пасиву є домінуючою в інструкціях, рецептах та описі технологічних процесів?"
      explanation: "Зворотні форми на -ся (змішується, нагрівається) ідеально підходять для опису процесів, що відбуваються за певним алгоритмом."
      options:
        - text: "Зворотна форма на -ся"
          correct: true
        - text: "Безособова форма на -но/-то"
          correct: false
        - text: "3-тя особа множини"
          correct: false
        - text: "Пасивний дієприкметник"
          correct: false
    - question: "Як правильно перебудувати речення «Помилки були допущені нами» на природний активний варіант?"
      explanation: "Найкращий варіант — активна конструкція 'Ми припустилися помилок', де є чіткий суб'єкт."
      options:
        - text: "Ми припустилися помилок."
          correct: true
        - text: "Помилки допустилися нами."
          correct: false
        - text: "Нами допущено помилки."
          correct: false
        - text: "Були ми, хто допустив помилки."
          correct: false
    - question: "Що означає речення «Кажуть, що завтра буде дощ» з точки зору категорії виконавця?"
      explanation: "Це неозначено-особове речення (3-тя особа множини), де виконавцем є узагальнена спільнота ('люди'), а не конкретна особа."
      options:
        - text: "Виконавцем є узагальнена спільнота ('люди', 'громада')"
          correct: true
        - text: "Виконавець невідомий і дія відбувається сама по собі"
          correct: false
        - text: "Це безособове речення, де виконавця не існує"
          correct: false
        - text: "Виконавцем є синоптики, це офіційне повідомлення"
          correct: false
    - question: "Який відмінок вимагає безособова форма на -но/-то від прямого додатка (об'єкта дії)?"
      explanation: "Це унікальна риса українського синтаксису: форми на -но/-то вимагають Знахідного відмінка (написано книгу), а не Називного."
      options:
        - text: "Знахідний (кого? що?)"
          correct: true
        - text: "Називний (хто? що?)"
          correct: false
        - text: "Орудний (ким? чим?)"
          correct: false
        - text: "Родовий (кого? чого?)"
          correct: false

- type: group-sort
  title: "Класифікація пасивних конструкцій"
  instruction: "Розподіліть речення за типом пасивної конструкції, яка в них використана."
  groups:
    - name: "Дієприкметник (-ний/-тий)"
      items:
        - "Ця стаття вже **надрукована**."
        - "Вікно було **розбите** м'ячем."
        - "Всі місця в залі **зайняті**."
        - "Робота **виконана** бездоганно."
        - "Цей лист **написаний** з любов'ю."
    - name: "Безособова (-но/-то)"
      items:
        - "Статтю **надруковано** в журналі."
        - "Вікно **розбито** необережним рухом."
        - "Роботу **виконано** вчасно."
        - "Наказ про звільнення **підписано**."
        - "Злочинця **затримано** на кордоні."
    - name: "Зворотна (-ся)"
      items:
        - "Цей журнал **друкується** щомісяця."
        - "Скло легко **б'ється**."
        - "Хата **будується** вже рік."
        - "Тут **продаються** свіжі овочі."
        - "Проблема **вирішується** автоматично."
    - name: "3-тя особа множини"
      items:
        - "Журнал **надрукували** вчора."
        - "Вікно **розбили** випадково."
        - "Хату **збудували** за одне літо."
        - "Мене **просили** зачекати."
        - "У двері голосно **стукають**."

- type: match-up
  title: "Сфера вживання: стиль і форма"
  instruction: "З'єднайте ситуацію спілкування з найбільш відповідною формою пасиву."
  pairs:
    - left: "Офіційний наказ директора"
      right: "Безособова (-но/-то): «Наказ підписано»"
    - left: "Опис стану старовинної речі"
      right: "Дієприкметник (-ний/-тий): «Скриня розписана»"
    - left: "Інструкція до кавомашини"
      right: "Зворотна (-ся): «Кава готується»"
    - left: "Плітки на лавочці"
      right: "3-тя особа множини: «Сусіда пограбували»"
    - left: "Наукова стаття про фізику"
      right: "Зворотна (-ся): «Енергія виділяється»"
    - left: "Повідомлення в новинах (Breaking News)"
      right: "Безособова (-но/-то): «Рух перекрито»"
    - left: "Розповідь про сімейну вечерю"
      right: "3-тя особа множини: «Борщ з'їли»"
    - left: "Ліричний вірш про природу"
      right: "Дієприкметник (-ний/-тий): «Світ омитий дощем»"
    - left: "Поліцейський протокол"
      right: "Безособова (-но/-то): «Зброю вилучено»"
    - left: "Технологічний рецепт"
      right: "Зворотна (-ся): «Тісто замішується»"
    - left: "Оголошення на вокзалі"
      right: "Безособова (-но/-то): «Посадку оголошено»"
    - left: "Діалог з колегою"
      right: "3-тя особа множини: «Премію виплатили»"
    - left: "Характеристика товару"
      right: "Дієприкметник (-ний/-тий): «Телефон перевірений»"
    - left: "Опис природного явища"
      right: "Зворотна (-ся): «День починається»"

- type: mark-the-words
  title: "Полювання на пасив"
  instruction: "Знайдіть і виділіть усі пасивні конструкції (всіх чотирьох типів) у тексті."
  text: "Учора в нашому місті було відкрито нову бібліотеку. Цю подію довго чекали всі мешканці. Будівля зведена у модерному стилі. Стіни пофарбовані у світлі кольори, що додає простору. Кажуть, що архітектора запросили з-за кордону. Зараз у залах розставляються меблі та сортуються книги. Офіційну частину завершено, і тепер бібліотека відчиняється для читачів щодня. Проєкт фінансується міською радою."
  answers:
    - "було відкрито"
    - "зведена"
    - "пофарбовані"
    - "Кажуть"
    - "запросили"
    - "розставляються"
    - "сортуються"
    - "завершено"
    - "відчиняється"
    - "фінансується"

- type: fill-in
  title: "Оберіть правильну форму"
  instruction: "Доповніть речення, обравши форму, яка найкраще пасує до контексту (стилю)."
  items:
    - sentence: "Увага! Повітряну тривогу ... ! Просимо пройти в укриття."
      answer: "оголошено"
      options: ["оголошено", "оголошується", "оголосили", "оголошена"]
      explanation: "Для офіційних термінових повідомлень використовується безособова форма на -но/-то."
    - sentence: "На базарі кажуть, що ціни на сало знову ... ."
      answer: "підняли"
      options: ["підняли", "піднято", "піднімаються", "підняті"]
      explanation: "Для передачі чуток і розмов ('кажуть') ідеально підходить 3-тя особа множини."
    - sentence: "Ця пісня ... на весіллях вже триста років."
      answer: "співається"
      options: ["співається", "співано", "співають", "співана"]
      explanation: "Для опису традиції, що триває в часі, використовуємо зворотну форму на -ся (процес)."
    - sentence: "Договір був ... ще минулого тижня, але ми досі чекаємо."
      answer: "підписаний"
      options: ["підписаний", "підписано", "підписується", "підписали"]
      explanation: "Тут описується стан документа (який він є?), тому підходить дієприкметник."
    - sentence: "У цьому розділі книги ... основні правила граматики."
      answer: "описуються"
      options: ["описуються", "описано", "описані", "описують"]
      explanation: "Анотація змісту або науковий опис зазвичай використовує зворотну форму (книга описує себе)."
    - sentence: "Злочинця ... на місці події завдяки камерам спостереження."
      answer: "затримано"
      options: ["затримано", "затримався", "затриманий", "затримують"]
      explanation: "Поліцейська хроніка та офіційні звіти вимагають форми на -но/-то."
    - sentence: "Мене ... на роботу в нову компанію!"
      answer: "прийняли"
      options: ["прийняли", "прийнято", "приймаються", "прийнятий"]
      explanation: "Особиста радісна новина в розмові з другом — 3-тя особа множини ('вони прийняли')."
    - sentence: "Вхід до парку ... на час реконструкції."
      answer: "зачинено"
      options: ["зачинено", "зачиняється", "зачинили", "зачинений"]
      explanation: "Напис на табличці або офіційне оголошення — безособова форма."
    - sentence: "Борщ ... , сідайте обідати!"
      answer: "готовий"
      options: ["готовий", "готується", "готували", "готовано"]
      explanation: "У побуті ми часто використовуємо прикметники або прості ствердження стану."
    - sentence: "Всі квитки на концерт вже ... ."
      answer: "продані"
      options: ["продані", "продаються", "продано", "продали"]
      explanation: "Констатація стану речей (квитки мають ознаку 'проданості')."

- type: unjumble
  title: "Синтаксис пасивних конструкцій"
  instruction: "Складіть речення з поданих слів, звертаючи увагу на порядок слів та відмінки."
  items:
    - words: ["було", "збудовано", "цю", "церкву", "у", "давнину"]
      answer: "Цю церкву було збудовано у давнину"
    - words: ["у", "цій", "науковій", "статті", "розглядаються", "складні", "питання", "екології"]
      answer: "У цій науковій статті розглядаються складні питання екології"
    - words: ["у", "народі", "кажуть", "що", "щастя", "любить", "тишу"]
      answer: "У народі кажуть, що щастя любить тишу"
    - words: ["рішення", "про", "ремонт", "ухвалено", "минулого", "тижня"]
      answer: "Рішення про ремонт ухвалено минулого тижня"
    - words: ["ці", "великі", "ворота", "зачиняються", "автоматично", "після", "входу"]
      answer: "Ці великі ворота зачиняються автоматично після входу"
    - words: ["всі", "грубі", "помилки", "були", "швидко", "виправлені", "редактором"]
      answer: "Всі грубі помилки були швидко виправлені редактором"
    - words: ["нас", "запросили", "на", "весілля", "до", "сусідів"]
      answer: "Нас запросили на весілля до сусідів"
    - words: ["цей", "романтичний", "лист", "написаний", "відомим", "українським", "поетом"]
      answer: "Цей романтичний лист написаний відомим українським поетом"

- type: error-correction
  title: "Редактор: виправлення помилок"
  instruction: "Знайдіть і виправте помилки у вживанні пасивного стану. Уникайте канцеляриту та кальок."
  items:
    - sentence: "Ця цікава книга читається студентом дуже швидко."
      error: "читається студентом"
      answer: "студент читає"
      error_type: "construction"
      options: ["студент читає", "читана студентом", "читається через студента", "прочитана студентом"]
      explanation: "Пасивна форма на -ся не може мати виконавця в орудному відмінку. Правильно: активна конструкція."
    - sentence: "Мною було прийнято важливе рішення звільнитися."
      error: "Мною було прийнято"
      answer: "Я прийняв"
      error_type: "register"
      options: ["Я прийняв", "Мною прийнято", "Прийнялося мною", "Мене прийняло"]
      explanation: "Уникайте канцеляриту. Якщо ви говорите про себе, використовуйте активний стан: 'Я прийняв'."
    - sentence: "Всі проблеми вирішуються менеджером протягом години."
      error: "вирішуються менеджером"
      answer: "менеджер вирішує"
      error_type: "construction"
      options: ["менеджер вирішує", "вирішені менеджером", "вирішувані менеджером", "менеджером вирішено"]
      explanation: "Жива людина (менеджер) має бути підметом, а не знаряддям в орудному відмінку."
    - sentence: "Нами було досягнуто значних успіхів у навчанні."
      error: "Нами було досягнуто"
      answer: "Ми досягли"
      error_type: "register"
      options: ["Ми досягли", "Нами досягли", "Досягнулося нами", "Були досягнуті нами"]
      explanation: "Поверніть собі агентність! Замість пасивного 'Нами було...' кажіть активно 'Ми досягли'."
    - sentence: "Будинок будується будівельниками дуже якісно."
      error: "будується будівельниками"
      answer: "будівельники будують"
      error_type: "construction"
      options: ["будівельники будують", "будований будівельниками", "будують будівельниками", "збудовано будівельниками"]
      explanation: "Не використовуйте орудний відмінок діяча з дієсловами на -ся."
    - sentence: "Двері відчиняються охоронцем."
      error: "відчиняються охоронцем"
      answer: "охоронець відчиняє"
      error_type: "construction"
      options: ["охоронець відчиняє", "відчинені охоронцем", "відчиняють охоронцем", "відчинено охоронцем"]
