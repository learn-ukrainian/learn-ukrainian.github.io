version: '1.0'
module: passive-voice-system
level: b2
inline:
- id: group-sort-vs-vs
  type: group-sort
  instruction: Класифікуйте форми пасиву за їхнім значенням та граматичними ознаками
  groups:
  - label: Безособовий результат (-но, -то)
    items:
    - написано
    - виконано
    - погоджено
    - скасовано
    - затверджено
    - зроблено
  - label: Пасивна ознака (-ний, -тий)
    items:
    - написаний
    - виконаний
    - затверджений
    - скасований
    - погоджений
    - зроблений
  - label: Абстрактний процес (-ся)
    items:
    - пишеться
    - здійснюється
    - розробляється
    - впроваджується
    - обговорюється
    - завантажується
  title: Класифікуйте форми пасиву за їхнім значенням та граматичними ознаками
- id: style-choice-active-passive
  type: quiz
  instruction: Оберіть найбільш стилістично доречну конструкцію для кожного контексту
  items:
  - question: 'Офіційний наказ керівництва компанії:'
    options:
    - Нову форму звітності затверджено.
    - Керівництво затвердило нову форму звітності.
    - Нова форма звітності затверджується керівництвом.
    - Нову форму звітності була затверджена.
    correct: 0
  - question: 'Динамічна презентація для інвесторів (живий виступ):'
    options:
    - Наші експерти розробили унікальний продукт.
    - Унікальний продукт було розроблено нашими експертами.
    - Унікальний продукт розробляється нашими експертами.
    - Унікальний продукт розроблений експертами.
    correct: 0
  - question: 'Системне повідомлення на екрані комп''ютера:'
    options:
    - Дані зараз завантажуються.
    - Дані завантажено комп'ютером.
    - Комп'ютер зараз завантажує дані.
    - Дані є завантаженими.
    correct: 0
  - question: 'Дружній і клієнтоорієнтований лист:'
    options:
    - Ми уважно розглядаємо вашу пропозицію.
    - Ваша пропозиція наразі розглядається нами.
    - Ваша пропозиція була розглянута нами.
    - Вашу пропозицію детально розглянуто адміністрацією.
    correct: 0
  - question: 'Сухий юридичний висновок екологічної експертизи:'
    options:
    - Під час перевірки виявлено забруднення довкілля.
    - Експерти виявили сильне забруднення довкілля.
    - Забруднення довкілля було виявлене експертами.
    - Забруднення довкілля виявляється під час цієї перевірки.
    correct: 0
  - question: 'Стислі офіційні новини про глобальні процеси в державі:'
    options:
    - У країні постійно впроваджуються масштабні реформи.
    - Міністри постійно впроваджують масштабні реформи.
    - Масштабні реформи постійно були впроваджені міністрами.
    - Масштабні реформи завжди впроваджені.
    correct: 0
  title: Оберіть найбільш стилістично доречну конструкцію для кожного контексту
- id: reading-passive-ident
  type: quiz
  instruction: Знайти та ідентифікувати всі пасивні конструкції. Оберіть правильну
    характеристику для виділеного слова.
  items:
  - question: 'Прочитайте уривок: «Проєкт закону про захист довкілля зараз **розробляється**
      в комітетах». Яка це форма?'
    options:
    - Зворотне дієслово (абстрактний процес)
    - Безособова форма (завершений результат)
    - Пасивний дієприкметник (постійна ознака)
    - Активний стан (особова форма)
    correct: 0
  - question: «Після тривалого моніторингу нові стандарти звітності було **погоджено**».
      Яка це форма?
    options:
    - Безособова форма на -но (завершений результат)
    - Пасивний дієприкметник (постійна ознака)
    - Зворотне дієслово (абстрактний процес)
    - Активний стан (особова форма)
    correct: 0
  - question: «Це дуже складна **виконана** робота, результат якої вражає». Яка це
      форма?
    options:
    - Пасивний дієприкметник (ознака предмета)
    - Безособова форма (завершений результат)
    - Зворотне дієслово (абстрактний процес)
    - Активний стан (особова форма)
    correct: 0
  - question: «Всі необхідні документи **підписано** керівником». У чому полягає граматична
      помилка?
    options:
    - Неправильно вжито орудний відмінок діяча («керівником»)
    - Неправильно узгоджено форму на -но з іменником
    - Замість «підписано» треба було вжити «підписані»
    - Помилки немає, речення абсолютно правильне
    correct: 0
  - question: «Сервер зараз успішно **оновлюється**». Яка це форма і чи доречна вона
      тут?
    options:
    - Зворотне дієслово на -ся; цілком доречна для алгоритму
    - Безособова форма на -но; недоречна
    - Пасивний дієприкметник; недоречна
    - Активний стан; доречна
    correct: 0
  - question: «Важливі рішення щодо реформи **приймаються** парламентом». У чому стилістична
      проблема?
    options:
    - Надмірний пасив на -ся з діячем в орудному відмінку
    - Неправильне використання безособової форми на -но
    - Відсутність допоміжного дієслова «бути» у реченні
    - Це стилістично правильна і нормативна конструкція
    correct: 0
  title: Знайти та ідентифікувати всі пасивні конструкції. Оберіть правильну характеристи
- id: error-correction-passive
  type: error-correction
  instruction: Виправте ненормативні пасивні конструкції (кальки з англійської та
    російської, неправильний орудний відмінок діяча).
  items:
  - sentence: Цей звіт було підготовлено фінансовим аналітиком.
    error: підготовлено фінансовим аналітиком
    correction: підготував фінансовий аналітик
    error_type: construction
    options:
    - підготував фінансовий аналітик
    - був підготовлений фінансовим аналітиком
    - підготовлявся фінансовим аналітиком
    explanation: Безособова форма на -но не може вживатися з діячем (особою) в орудному
      відмінку. Завжди краще використовувати активний стан.
  - sentence: Я був даний важливий проєкт.
    error: Я був даний
    correction: Мені дали
    error_type: construction
    options:
    - Мені дали
    - Мене дали
    - Я отриманий
    explanation: Це сліпа калька з англійської 'I was given'. В українській мові не
      можна утворювати пасивний підмет від непрямого додатка.
  - sentence: Нова реформа зараз впроваджується міністерством.
    error: впроваджується міністерством
    correction: впроваджує міністерство
    error_type: construction
    options:
    - впроваджує міністерство
    - була впроваджена міністерством
    - впроваджено міністерством
    explanation: Зворотні дієслова на -ся категорично не поєднуються з орудним відмінком
      установи-діяча. Потрібен прозорий активний стан.
  - sentence: Цей закон був прийнятий депутатами вчора.
    error: був прийнятий депутатами
    correction: прийняли депутати
    error_type: construction
    options:
    - прийняли депутати
    - було прийнято депутатами
    - приймався депутатами
    explanation: Пасивні конструкції з орудним відмінком діяча — це калька. Українська
      мова завжди віддає перевагу активним дієсловам.
  - sentence: Ця цікава стаття написана відомим журналістом.
    error: написана відомим журналістом
    correction: написав відомий журналіст
    error_type: construction
    options:
    - написав відомий журналіст
    - написана відомого журналіста
    - написано відомим журналістом
    explanation: 'Діяч в орудному відмінку при пасивному дієприкметнику часто звучить
      неприродно і штучно. Краще змінити на: ''написав відомий журналіст''.'
  - sentence: Договір підписується обома сторонами.
    error: підписується обома сторонами
    correction: підписують обидві сторони
    error_type: construction
    options:
    - підписують обидві сторони
    - був підписаний обома сторонами
    - підписано обома сторонами
    explanation: Яскравий приклад канцеляриту. Зворотне дієслово з діячем в орудному
      відмінку обов'язково слід замінити на активну конструкцію.
  title: Виправте ненормативні пасивні конструкції (кальки з англійської та російської,
    н
