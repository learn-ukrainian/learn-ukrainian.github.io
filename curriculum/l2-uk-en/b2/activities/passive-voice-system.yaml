- type: unjumble
  title: 'Конструювання пасивних речень'
  instruction: 'Складіть слова у правильному порядку, щоб утворити граматично правильне речення.'
  items:
    - words: ['було', 'ухвалено', 'парламентом', 'минулого', 'тижня', 'закон']
      answer: 'Закон було ухвалено парламентом минулого тижня'
    - words: ['питання', 'розглядається', 'це', 'зараз', 'уважно', 'важливе']
      answer: 'Це важливе питання зараз уважно розглядається'
    - words: ['відомим', 'була', 'ця', 'книга', 'написана', 'автором']
      answer: 'Ця книга була написана відомим автором'
    - words: ['закрито', 'ремонт', 'на', 'магазин', 'тимчасово', 'цей']
      answer: 'Цей магазин тимчасово закрито на ремонт'
    - words: ['будується', 'новий', 'центрі', 'у', 'міста', 'театр']
      answer: 'У центрі міста будується новий театр'
    - words: ['всі', 'ці', 'були', 'вчасно', 'виправлені', 'помилки']
      answer: 'Всі ці помилки були вчасно виправлені'
    - words: ['передавали', 'радіо', 'по', 'новини', 'важливі', 'сьогодні']
      answer: 'Сьогодні по радіо передавали важливі новини'
    - words: ['було', 'злочин', 'розкрито', 'жахливий', 'швидко', 'цей']
      answer: 'Цей жахливий злочин було швидко розкрито'

- type: error-correction
  title: 'Редактор: Виправлення помилок'
  instruction: 'Знайдіть та виправте помилку у вживанні пасивного стану або його форм.'
  items:
    - sentence: 'Мною було зроблено домашнє завдання.'
      error: 'Мною було зроблено'
      answer: 'Я зробив'
      options: ['Я зробив', 'Мною зроблено', 'Я був зроблений', 'Зроблено мною']
      explanation: 'Уникайте канцеляриту. Якщо виконавець відомий, вживайте активний стан: "Я зробив".'
    - sentence: 'Ця проблема вирішується директором.'
      error: 'вирішується директором'
      answer: 'вирішує директор'
      options: ['вирішує директор', 'вирішена директором', 'вирішується директора', 'вирішувана директором']
      explanation: 'Уникайте орудного відмінка з пасивом на -ся. Правильно: "Директор вирішує проблему".'
    - sentence: 'Книгу прочитано студентом.'
      error: 'прочитано студентом'
      answer: 'прочитав студент'
      options: ['прочитав студент', 'прочитана студентом', 'прочитано студента', 'студент прочитано']
      explanation: 'Безособові форми на -но/-то не вживаються з виконавцем. Правильно: "Студент прочитав книгу".'
    - sentence: 'Ми обговорюємо слідуюче питання.'
      error: 'слідуюче'
      answer: 'наступне'
      options: ['наступне', 'слідуючи', 'послідовне', 'йдуче']
      explanation: 'Слово "слідуючий" — це калька. Українською правильно "наступний".'
    - sentence: 'Цей закон являється важливим.'
      error: 'являється'
      answer: 'є'
      options: ['є', 'являє', 'буде', 'стає']
      explanation: 'Слово "являється" в значенні "бути" — калька. Правильно казати "є".'
    - sentence: 'Вікно було розбито вітром.'
      error: 'було розбито вітром'
      answer: 'розбив вітер'
      options: ['розбив вітер', 'було розбите вітром', 'розбилося вітром', 'вітер розбито']
      explanation: 'Краще вжити активну конструкцію: "Вітер розбив вікно", хоча "розбите вітром" теж можливо, але не "розбито вітром".'
    - sentence: 'В магазині продаються свіжі овочі.'
      error: 'продаються'
      answer: 'продають'
      options: ['продають', 'продано', 'продані', 'продаватимуть']
      explanation: 'Хоча "продаються" можливо, для опису активності краще "Тут продають (3-тя особа множини) овочі".'
      error_type: 'register'
    - sentence: 'Всі бажаючі можуть прийти.'
      error: 'бажаючі'
      answer: 'охочі'
      options: ['охочі', 'бажають', 'хотять', 'бажані']
      explanation: '"Бажаючий" — це активний дієприкметник, якого немає в українській мові. Правильно "охочі".'

- type: cloze
  title: 'Зсув агентності в дії'
  instruction: 'Заповніть пропуски, обираючи правильну форму слова, щоб текст звучав природно та сучасно.'
  passage: "Сучасна українська мова переживає {{1}} агентності. Це означає, що ми відмовляємося від {{2}} стилю, де відповідальність розмита. Раніше було популярно писати: 'Рішення було {{3}}'. Сьогодні ми кажемо прямо: 'Ми {{4}} рішення'. Активна позиція {{5}} з лідерством та чесністю. Пасивний стан, зокрема форми на {{6}}, варто залишити для {{7}} документів та наукових праць. Там важливо зафіксувати {{8}}, а не виконавця. Наприклад, 'Закон {{9}}' звучить вагомо. Однак у живому спілкуванні краще уникати конструкцій типу 'Мною {{10}} зроблено'. Це звучить {{11}}. Замість цього скажіть: 'Я {{12}}'. Також слід бути обережним зі {{13}} пасивом на -ся. Не кажіть 'Будинок {{14}} робітниками'. Правильно: 'Робітники {{15}} будинок'. Мова — це інструмент, і ми маємо {{16}} ним майстерно."
  blanks:
    - id: 1
      answer: 'зсув'
      options: ['зсув', 'рух', 'зміну', 'поворот']
    - id: 2
      answer: 'бюрократичного'
      options: ['бюрократичного', 'художнього', 'розмовного', 'наукового']
    - id: 3
      answer: 'прийнято'
      options: ['прийнято', 'прийняли', 'приймаємо', 'прийняте']
    - id: 4
      answer: 'прийняли'
      options: ['прийняли', 'прийнято', 'приймалися', 'прийняті']
    - id: 5
      answer: 'асоціюється'
      options: ['асоціюється', 'асоційована', 'асоціюють', 'асоціювати']
    - id: 6
      answer: '-но/-то'
      options: ['-но/-то', '-ся', '-ний/-тий', '-ли']
    - id: 7
      answer: 'офіційних'
      options: ['офіційних', 'домашніх', 'веселих', 'приватних']
    - id: 8
      answer: 'факт'
      options: ['факт', 'емоцію', 'думку', 'мрію']
    - id: 9
      answer: 'ухвалено'
      options: ['ухвалено', 'ухвалили', 'ухвалює', 'ухвалять']
    - id: 10
      answer: 'було'
      options: ['було', 'є', 'буде', 'стало']
    - id: 11
      answer: 'штучно'
      options: ['штучно', 'красиво', 'природно', 'правильно']
    - id: 12
      answer: 'зробив'
      options: ['зробив', 'зроблений', 'робився', 'зроблю']
    - id: 13
      answer: 'зворотним'
      options: ['зворотним', 'прямим', 'активним', 'безособовим']
    - id: 14
      answer: 'будується'
      options: ['будується', 'збудовано', 'будують', 'збудували']
    - id: 15
      answer: 'будують'
      options: ['будують', 'будуються', 'збудовані', 'будували']
