workbook:
- type: fill-in
  instruction: 'Оберіть правильну форму об''єкта. Пам''ятайте золоте правило: після
    форм на -но, -то завжди вживається знахідний відмінок, а не називний.'
  items:
  - sentence: Цю цікаву ____ успішно прочитано.
    answer: книгу
    options:
    - книгу
    - книга
    - книгою
  - sentence: Серйозну ____ остаточно вирішено.
    answer: проблему
    options:
    - проблему
    - проблема
    - проблемою
  - sentence: Нову масштабну ____ вже впроваджено.
    answer: реформу
    options:
    - реформу
    - реформа
    - реформою
  - sentence: Ділову ____ було несподівано скасовано.
    answer: зустріч
    options:
    - зустріч
    - зустріччю
    - зустрічі
  - sentence: Фінансову ____ підготовлено вчасно.
    answer: звітність
    options:
    - звітність
    - звітністю
    - звітності
  - sentence: Важливий ____ було офіційно підписано вчора.
    answer: договір
    options:
    - договір
    - договору
    - договором
  title: 'Оберіть правильну форму об''єкта. Пам''ятайте золоте правило: після форм
    на -но, -'
- type: true-false
  instruction: Чи є ці твердження про український пасивний стан правдивими?
  items:
  - statement: 'Після безособових форм на -но, -то об''єкт дії має стояти в називному
      відмінку (наприклад: ''книга прочитано'').'
    correct: false
    explanation: 'Це дуже груба помилка. Об''єкт дії після -но, -то завжди стоїть
      у знахідному відмінку (наприклад: ''книгу прочитано'').'
  - statement: 'Форми на -но, -то є абсолютно незмінними: вони не мають ні роду, ні
      числа, ні відмінка.'
    correct: true
    explanation: Так, це незмінні монолітні форми, які ніколи не узгоджуються з іншими
      словами.
  - statement: 'В українській мові стилістично нормально і природно сказати: ''Цей
      будинок був збудований кваліфікованими робітниками''.'
    correct: false
    explanation: 'Орудний відмінок діяча (''робітниками'') поруч із пасивом є калькою.
      Набагато краще: ''Цей будинок збудували кваліфіковані робітники''.'
  - statement: Орудний відмінок поруч із формами на -но, -то можна використовувати
      виключно для позначення неживого знаряддя (інструмента).
    correct: true
    explanation: 'Наприклад: ''написано пером'', ''засіяно зерном'' — це абсолютно
      нормативно.'
  - statement: Активний стан є більш природним, зрозумілим і бажаним для української
      мови, ніж громіздкий канцелярський пасив.
    correct: true
    explanation: Українська мова тяжіє до дієвості та чіткості, тому конструкції типу
      'міністри впроваджують' завжди кращі за 'впроваджується міністрами'.
  - statement: Сліпу кальку з англійської 'I was given a chance' українською треба
      перекладати виключно як 'Я був даний шанс'.
    correct: false
    explanation: 'В українській мові не можна робити пасивний підмет із непрямого
      додатка. Правильно: ''Мені дали шанс''.'
  title: Чи є ці твердження про український пасивний стан правдивими?
