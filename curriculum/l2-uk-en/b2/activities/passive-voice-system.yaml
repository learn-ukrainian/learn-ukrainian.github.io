- type: order
  instruction: Розставте речення в логічному порядку, щоб утворити зв'язний текст
    про процес погодження в установі.
  items:
  - Спочатку міністерство розробило новий масштабний проєкт екологічної реформи.
  - Далі цей проєкт відправили на незалежну експертизу.
  - Під час ретельної перевірки було несподівано виявлено загрозу для довкілля.
  - Через це попереднє рішення було скасовано, а проєкт відхилено.
  correct_order:
  - 0
  - 1
  - 2
  - 3
  title: Розставте речення в логічному порядку, щоб утворити зв'язний текст про процес
    по
