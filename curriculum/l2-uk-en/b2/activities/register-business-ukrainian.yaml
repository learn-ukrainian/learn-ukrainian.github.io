- type: essay-response
  id: "essay-response-proposal"
  title: "Написання ділової пропозиції"
  instruction: "Спираючись на правила ділового стилю, виконайте завдання."
  prompt: "Ви працюєте HR-директором у великій компанії. Напишіть офіційний лист керівнику тренінгового центру (пану Дмитру), у якому ви пропонуєте організувати корпоративне навчання для ваших працівників. У листі обов'язково вкажіть тему, використайте правильне звертання, опишіть очікуваний результат і завершіть лист професійним підписом."
  min_words: 150
  model_answer: |
    Тема: [Корпоративне навчання] Запит на проведення тренінгів для команди

    Шановний пане Дмитре, доброго дня!

    Звертаюся до вас від імені нашої компанії з пропозицією щодо співпраці у сфері професійного розвитку персоналу. Ми високо оцінюємо репутацію вашого тренінгового центру та розглядаємо можливість стратегічного партнерства.

    Наша мета — організувати серію практичних воркшопів для менеджерів середньої ланки. Головний очікуваний результат — підвищення ефективності внутрішньої комунікації та навичок ведення переговорів. Загальний бюджет проекту ми готові обговорити під час особистої зустрічі.

    Чи не могли б ви надіслати нам актуальну програму ваших тренінгів та орієнтовні умови співпраці до кінця цього тижня? Ми готові ухвалити фінальне рішення одразу після ознайомлення з вашими матеріалами.

    Сподіваємося на плідну та взаємовигідну співпрацю.

    З повагою,
    Марія Петренко
    HR-директор
  rubric:
    - criteria: "Структура листа"
      description: "Наявність теми, звертання, основної частини та підпису."
      points: 4
    - criteria: "Лексика"
      description: "Використання ділових термінів та уникнення розмовних слів."
      points: 3
    - criteria: "Етикет"
      description: "Правильне звертання у кличному відмінку та ввічливе прохання."
      points: 3

- type: essay-response
  id: "essay-response-decline"
  title: "Ввічлива незгода у листуванні"
  instruction: "Напишіть відповідь, зберігаючи професійний тон."
  prompt: "Ви отримали пропозицію від підрядника щодо закупівлі нового обладнання. Умови є для вас неприйнятними через завищений бюджет. Напишіть лист-відповідь, використовуючи техніку амортизації, щоб відхилити пропозицію, але зберегти хороші стосунки з підрядником на майбутнє."
  min_words: 150
  model_answer: |
    Тема: [Закупівля обладнання] Відповідь на комерційну пропозицію

    Шановна пані Оксано, доброго дня!

    Щиро дякуємо за вашу детальну комерційну пропозицію та готовність до співпраці. Ми уважно ознайомилися з усіма технічними характеристиками запропонованого обладнання і високо оцінюємо його якість.

    Я чудово розумію вашу позицію щодо формування вартості. Водночас змушений повідомити, що на даному етапі ці фінансові умови є для нас неприйнятними, оскільки ми обмежені жорстким бюджетом на поточний квартал. На жаль, зараз ми не можемо укласти угоду на запропонованих умовах.

    Ми зберігаємо ваші контакти та обов'язково повернемося до обговорення можливого партнерства в наступному фінансовому році, коли бюджетні обмеження будуть переглянуті.

    Дякую за ваш час та розуміння.

    З повагою,
    Іван Коваленко
    Керівник відділу закупівель
  rubric:
    - criteria: "Техніка амортизації"
      description: "Використання ввічливої форми незгоди замість прямого ні."
      points: 4
    - criteria: "Професійний тон"
      description: "Збереження поваги до партнера та позитивного настрою."
      points: 3
    - criteria: "Форматування"
      description: "Наявність усіх необхідних атрибутів ділового листа."
      points: 3