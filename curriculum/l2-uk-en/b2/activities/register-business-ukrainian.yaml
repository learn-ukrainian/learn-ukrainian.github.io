- type: quiz
  title: "Перевірте знання ділового етикету"
  instruction: "Оберіть одну правильну відповідь на кожне запитання."
  items:
    - question: "Яке звертання вважається сучасним золотим стандартом в українському діловому листуванні?"
      explanation: "Сучасний стандарт — це використання слова Пане або Пані плюс ім'я або прізвище."
      options:
        - text: "Пане або Пані з іменем"
          correct: true
        - text: "Ім'я та по батькові"
          correct: false
        - text: "Тільки прізвище без імені"
          correct: false
        - text: "Дружнє привіт без імені"
          correct: false
    - question: "Яку функцію виконує так званий фактор кави перед початком жорстких переговорів?"
      explanation: "Фактор кави знімає первинну напругу та налаштовує на співпрацю."
      options:
        - text: "Налаштовує співрозмовників на спільну хвилю"
          correct: true
        - text: "Допомагає зекономити час на обговоренні"
          correct: false
        - text: "Замінює офіційне підписання контракту"
          correct: false
        - text: "Показує вашу фінансову перевагу"
          correct: false
    - question: "Як правильно перекласти англійську фразу to make a decision українською мовою?"
      explanation: "Калька робити рішення є помилковою. Правильно — ухвалювати або приймати рішення."
      options:
        - text: "Ухвалювати або приймати рішення"
          correct: true
        - text: "Робити важливе рішення"
          correct: false
        - text: "Створювати нове рішення"
          correct: false
        - text: "Виконувати потрібне рішення"
          correct: false
    - question: "Що в українській діловій мові означає слово актуальний у професійному контексті?"
      explanation: "Актуальний — це те, що є важливим саме зараз. Це фальшивий друг перекладача."
      options:
        - text: "Той що на часі"
          correct: true
        - text: "Справжній або дійсний"
          correct: false
        - text: "Застарілий та непотрібний"
          correct: false
        - text: "Фінансово вигідний контракт"
          correct: false
    - question: "Чому сучасний український бізнес віддає перевагу використанню активного стану в документах?"
      explanation: "Активний стан робить тексти легшими та підкреслює відповідальність компанії."
      options:
        - text: "Він демонструє лідерство та відповідальність"
          correct: true
        - text: "Він приховує реального виконавця дії"
          correct: false
        - text: "Він робить текст більш бюрократичним"
          correct: false
        - text: "Він дозволяє уникати прямих відповідей"
          correct: false
    - question: "Як найкраще ввічливо висловити незгоду під час складних ділових переговорів?"
      explanation: "Техніка амортизації (спочатку визнати логіку, потім навести контраргументи) допомагає зберегти відносини."
      options:
        - text: "Використати техніку амортизації перед відмовою"
          correct: true
        - text: "Одразу сказати пряме й жорстке ні"
          correct: false
        - text: "Завершити зустріч без жодних пояснень"
          correct: false
        - text: "Почати кричати та вимагати знижку"
          correct: false
    - question: "Яке словосполучення з дієсловом є юридично правильним для опису створення контракту?"
      explanation: "Правильний юридичний термін — укласти угоду, а не зробити угоду."
      options:
        - text: "Укласти угоду з новим партнером"
          correct: true
        - text: "Зробити угоду з новим партнером"
          correct: false
        - text: "Організувати угоду з новим партнером"
          correct: false
        - text: "Побудувати угоду з новим партнером"
          correct: false
    - question: "Що обов'язково повинна містити тема електронного ділового листа для швидкого розуміння?"
      explanation: "Тема має відповідати на питання: про що лист і якого проекту він стосується."
      options:
        - text: "Назву проекту та суть повідомлення"
          correct: true
        - text: "Тільки одне слово наприклад Важливо"
          correct: false
        - text: "Повний текст вашої комерційної пропозиції"
          correct: false
        - text: "Кілька знаків оклику для привернення уваги"
          correct: false
    - question: "Як в українській діловій культурі відбувається перехід на ти між партнерами?"
      explanation: "Перехід на ти можливий лише після згоди, зазвичай ініціативу проявляє старша за посадою людина."
      options:
        - text: "За взаємною згодою з ініціативи старшого"
          correct: true
        - text: "Одразу в першому електронному листі"
          correct: false
        - text: "Автоматично після підписання будь-якого контракту"
          correct: false
        - text: "Тільки після спільного неформального відпочинку"
          correct: false
    - question: "Які подарунки вважаються безпечними та доречними в українському корпоративному діловому етикеті?"
      explanation: "Брендована продукція та кава не створюють відчуття фінансового боргу і є безпечними."
      options:
        - text: "Брендована продукція компанії або якісна кава"
          correct: true
        - text: "Дуже дорогі особисті речі або парфуми"
          correct: false
        - text: "Конверти з готівкою для керівника"
          correct: false
        - text: "Ексклюзивний дизайнерський одяг для співробітників"
          correct: false

- type: true-false
  title: "Правда чи хиба: Правила ділового стилю"
  items:
    - statement: "Словосполучення робити рішення є правильною формою в українській діловій комунікації."
      correct: false
      explanation: "Це калька з англійської. Правильно: ухвалювати рішення."
    - statement: "Офіційно-діловий стиль зовсім не допускає використання емоцій та багатозначних слів."
      correct: true
      explanation: "У цьому стилі слова мають лише пряме значення, емоції відсутні."
    - statement: "Слово актуальний в українській мові перекладається як actual в англійській."
      correct: false
      explanation: "Актуальний означає relevant або timely, а не actual (справжній)."
    - statement: "Звертання на ім'я та по батькові поступово виходить з ужитку в сучасному бізнесі."
      correct: true
      explanation: "Зараз золотим стандартом є використання Пане/Пані плюс ім'я або прізвище."
    - statement: "Після слів З повагою в кінці листа за українським правописом обов'язково ставиться кома."
      correct: false
      explanation: "За правилами кома не ставиться, хоча в бізнесі під впливом англійської це стало поширеним."
    - statement: "Українська бізнес-культура належить до типу Relationship-First, де стосунки дуже важливі."
      correct: true
      explanation: "Довіра між людьми в Україні часто передує офіційним документам."
    - statement: "Використання слова привіт у першому холодному електронному листі є абсолютно нормальним."
      correct: false
      explanation: "Це фамільярність, яка знецінює пропозицію. Потрібно використовувати Доброго дня."
    - statement: "У діловому листуванні краще використовувати активний стан дієслів замість пасивного."
      correct: true
      explanation: "Активний стан демонструє відповідальність та робить текст більш енергійним."
    - statement: "Слово дедлайн є неприпустимим в українській діловій мові, його треба уникати."
      correct: false
      explanation: "Хоча це запозичення, воно стало абсолютною нормою в сучасному бізнесі."
    - statement: "Переговори — це слово, яке в українській мові використовується виключно у формі множини."
      correct: true
      explanation: "Так, це іменник, що має лише форму множини (pluralia tantum)."

- type: fill-in
  title: "Оберіть правильний офіційний варіант"
  instruction: "Доповніть речення нормативними фразами ділового стилю замість розмовних."
  items:
    - sentence: "Керівництво компанії має ________ до кінця цього робочого тижня."
      answer: "ухвалити рішення"
      options:
        - "ухвалити рішення"
        - "зробити рішення"
        - "придумати рішення"
        - "вирішити рішення"
    - sentence: "Ми сподіваємося на ________ з вашою чудовою командою професіоналів."
      answer: "плідну співпрацю"
      options:
        - "плідну співпрацю"
        - "класну роботу"
        - "хорошу взаємодію"
        - "нормальну співпрацю"
    - sentence: "Наша компанія готова ________ на взаємовигідних умовах для обох сторін."
      answer: "укласти угоду"
      options:
        - "укласти угоду"
        - "зробити угоду"
        - "написати угоду"
        - "побудувати угоду"
    - sentence: "Будь ласка, надішліть нам найновіший, ________ варіант цього важливого документа."
      answer: "актуальний"
      options:
        - "актуальний"
        - "справжній"
        - "реальний"
        - "правильний"
    - sentence: "Ми цінуємо ваше партнерство і завжди готові ________ у складних питаннях."
      answer: "піти на компроміс"
      options:
        - "піти на компроміс"
        - "зробити компроміс"
        - "віддати компроміс"
        - "показати компроміс"
    - sentence: "Наш фінансовий відділ повинен ________ на наступний рік до грудня."
      answer: "затвердити бюджет"
      options:
        - "затвердити бюджет"
        - "погодити гроші"
        - "дозволити бюджет"
        - "відкрити фінанси"
    - sentence: "Ми досягли попередньої ________ щодо умов постачання нового обладнання."
      answer: "домовленості"
      options:
        - "домовленості"
        - "згоди"
        - "розмови"
        - "зустрічі"
    - sentence: "Буду щиро вдячний, якщо ви зможете дотриматися встановленого ________."
      answer: "дедлайну"
      options:
        - "дедлайну"
        - "часу"
        - "періоду"
        - "моменту"
    - sentence: "Завтра наша корпорація буде ________ з потенційними іноземними інвесторами."
      answer: "проводити переговори"
      options:
        - "проводити переговори"
        - "робити переговори"
        - "казати переговори"
        - "говорити переговори"
    - sentence: "Кожен співробітник повинен подати детальний фінансовий ________ наприкінці місяця."
      answer: "звіт"
      options:
        - "звіт"
        - "документ"
        - "результат"
        - "запис"

- type: fill-in
  title: "Доповніть діловий лист"
  instruction: "Оберіть правильні формулювання для професійного ділового листа."
  items:
    - sentence: "Шановний ________ Олександре, звертаємося до вас із важливою пропозицією."
      answer: "пане"
      options:
        - "пане"
        - "пан"
        - "добродій"
        - "колега"
    - sentence: "Ми маємо честь запропонувати вам участь у нашому новому ________."
      answer: "проекті"
      options:
        - "проекті"
        - "завданні"
        - "ділі"
        - "бізнесі"
    - sentence: "Чи не ________ б ви надіслати нам додаткову інформацію про ваші послуги?"
      answer: "могли"
      options:
        - "могли"
        - "хотіли"
        - "бажали"
        - "можете"
    - sentence: "Наша команда детально розглянула вашу комерційну ________ вчора вранці."
      answer: "пропозицію"
      options:
        - "пропозицію"
        - "ідею"
        - "думку"
        - "заявку"
    - sentence: "Вважаємо, що наше стратегічне ________ принесе значну вигоду обом сторонам."
      answer: "партнерство"
      options:
        - "партнерство"
        - "знайомство"
        - "товариство"
        - "колегування"
    - sentence: "Змушені повідомити, що ці умови наразі є для нас ________."
      answer: "неприйнятними"
      options:
        - "неприйнятними"
        - "поганими"
        - "жахливими"
        - "нецікавими"
    - sentence: "Сподіваємося на швидку відповідь та подальшу взаємовигідну ________."
      answer: "співпрацю"
      options:
        - "співпрацю"
        - "роботу"
        - "допомогу"
        - "зустріч"
    - sentence: "До листа додаємо наш річний ________ для вашого ознайомлення."
      answer: "звіт"
      options:
        - "звіт"
        - "документ"
        - "план"
        - "результат"
    - sentence: "Очікуємо на ваше остаточне ________ щодо підписання цього контракту."
      answer: "рішення"
      options:
        - "рішення"
        - "слово"
        - "бажання"
        - "думку"
    - sentence: "З ________, директор відділу маркетингу компанії Інновація."
      answer: "повагою"
      options:
        - "повагою"
        - "привітом"
        - "радістю"
        - "любов'ю"

- type: match-up
  title: "Знайдіть відповідники: Ситуація та Фраза"
  instruction: "З'єднайте бізнес-ситуацію з найбільш доречною професійною фразою."
  pairs:
    - left: "Початок першого листа незнайомій людині"
      right: "Шановний пане директоре!"
    - left: "Бажання запропонувати співпрацю"
      right: "Ми маємо честь запропонувати вам..."
    - left: "Ввічливе прохання надати документи"
      right: "Чи не могли б ви надіслати..."
    - left: "Відмова від невигідних умов"
      right: "Боюся, що ці умови для нас неприйнятні."
    - left: "Пропозиція компромісу під час переговорів"
      right: "Давайте знайдемо золоту середину."
    - left: "Завершення ділового листа"
      right: "Очікую на вашу відповідь. З повагою,"
    - left: "Пропозиція перейти на менш формальний стиль"
      right: "Чи не будете ви проти, якщо ми перейдемо на ти?"
    - left: "Вручення невеликого бізнес-подарунка"
      right: "Дозвольте вручити цей сувенір на знак поваги."
    - left: "Повідомлення про підготовку документа"
      right: "Ми підготуємо контракт найближчим часом."
    - left: "Висловлення надії на майбутнє"
      right: "Сподіваємося на плідну та взаємовигідну співпрацю."

- type: error-correction
  title: "Виправте русизми та кальки"
  instruction: "Знайдіть помилку в діловому реченні та оберіть правильний варіант."
  items:
    - sentence: "Ми вирішили прийняти участь у цій міжнародній конференції."
      error: "прийняти участь"
      answer: "брати участь"
      error_type: "phrase"
      options:
        - "брати участь"
        - "взяти долю"
        - "мати участь"
        - "робити участь"
      explanation: "Правильно українською — брати участь, а не приймати участь."
    - sentence: "Директор має зробити рішення до кінця цього робочого дня."
      error: "зробити рішення"
      answer: "ухвалити рішення"
      error_type: "phrase"
      options:
        - "ухвалити рішення"
        - "дати рішення"
        - "видати рішення"
        - "знайти рішення"
      explanation: "Рішення не роблять, їх ухвалюють або приймають."
    - sentence: "Наш відділ завжди готовий зробити угоду з новими надійними клієнтами."
      error: "зробити угоду"
      answer: "укласти угоду"
      error_type: "phrase"
      options:
        - "укласти угоду"
        - "побудувати угоду"
        - "написати угоду"
        - "відкрити угоду"
      explanation: "Юридично правильний термін — укласти угоду."
    - sentence: "Ми пропонуємо вам самі кращі умови для нашої майбутньої співпраці."
      error: "самі кращі"
      answer: "найкращі"
      error_type: "phrase"
      options:
        - "найкращі"
        - "більш кращі"
        - "дуже кращі"
        - "найбільш кращі"
      explanation: "Ступені порівняння прикметників утворюються за допомогою префікса най-."
    - sentence: "Сьогодні ми будемо розбиратися з питанням нового бюджету."
      error: "розбиратися з"
      answer: "обговорювати"
      error_type: "register"
      options:
        - "обговорювати"
        - "вирішувати з"
        - "говорити про"
        - "дивитися на"
      explanation: "У діловому стилі варто уникати розмовного розбиратися з, краще вжити обговорювати."
    - sentence: "Цей проект розробляється нашою командою вже більше місяця."
      error: "розробляється нашою командою"
      answer: "наша команда розробляє"
      error_type: "construction"
      options:
        - "наша команда розробляє"
        - "розробляє наша команда"
        - "був розроблений командою"
        - "команда буде розробляти"
      explanation: "У діловому стилі перевага надається активному стану."
    - sentence: "Шановна пані Олена, надсилаємо вам наш новий фінансовий звіт."
      error: "Олена"
      answer: "Олено"
      error_type: "word"
      options:
        - "Олено"
        - "Олену"
        - "Олені"
        - "Оленої"
