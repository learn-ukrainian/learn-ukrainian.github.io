- type: match-up
  title: "Знайдіть відповідник"
  instruction: "З'єднайте канцелярську дієприкметникову форму з її природним граматичним еквівалентом."
  pairs:
    - left: "працюючий студент"
      right: "студент, який працює"
    - left: "бажаючі учасники"
      right: "учасники, які бажають"
    - left: "плачуча дитина"
      right: "дитина, що плаче"
    - left: "керуюча компанія"
      right: "компанія, яка керує"
    - left: "співаючий птах"
      right: "птах, що співає"
    - left: "хвилююча зустріч"
      right: "зустріч, яка хвилює"
    - left: "наступаючий рік"
      right: "рік, що настає"
    - left: "оточуюче середовище"
      right: "середовище, яке нас оточує"
    - left: "відпочиваючий чоловік"
      right: "чоловік, який відпочиває"
    - left: "захоплююча історія"
      right: "історія, що захоплює"
    - left: "біжучий рядок"
      right: "рядок, що біжить"
    - left: "існуючий закон"
      right: "закон, який існує"

- type: error-correction
  title: "Виправте канцелярит"
  instruction: "Знайдіть і виправте неприродний активний дієприкметник, замінивши його на підрядне речення або влучний іменник/прикметник."
  items:
    - sentence: "На зупинці стояв курящий чоловік і чекав на автобус."
      error: "курящий"
      answer: "який курив"
      options: ["який курив", "куривший", "курний", "який куритиме"]
      explanation: "Слово курящий є суржиком і калькою. Правильно використовувати підрядне речення."
    - sentence: "Усі бажаючі можуть вільно приєднатися до нашого нового проєкту."
      error: "бажаючі"
      answer: "охочі"
      options: ["охочі", "бажаючі", "ті, що бажати", "хочучі"]
      explanation: "Замість штучного дієприкметника краще використати питомий прикметник охочі."
    - sentence: "Він усе життя був глибоко співчуваючою людиною."
      error: "співчуваючою"
      answer: "яка співчувала"
      options: ["яка співчувала", "співчутливою", "співчуваною", "співчувати"]
      explanation: "Слід уникати активних форм на -уч/-юч. Можна сказати яка співчувала або співчутливою."
    - sentence: "Я купив подарунок на наступаючий рік для своєї родини."
      error: "наступаючий"
      answer: "прийдешній"
      options: ["прийдешній", "наступний", "наступавший", "який наступає"]
      explanation: "Форма наступаючий — це калька. Українською правильно казати прийдешній рік або новий рік."
    - sentence: "Ця захоплююча книга розповідає про історію нашого міста."
      error: "захоплююча"
      answer: "захоплива"
      options: ["захоплива", "захопивша", "що захоплювати", "захоплена"]
      explanation: "Замість дієприкметника слід використовувати віддієслівний прикметник захоплива."
    - sentence: "Мене дуже турбує оточуюче нас середовище."
      error: "оточуюче"
      answer: "довкілля"
      options: ["довкілля", "оточивше", "те, що оточує", "околиця"]
      explanation: "Словосполучення оточуюче середовище замінюється одним влучним словом довкілля."
    - sentence: "Він подивився на мене благаючим поглядом."
      error: "благаючим"
      answer: "благальним"
      options: ["благальним", "благавшим", "що благає", "зблаганим"]
      explanation: "Використовуємо прикметник благальним замість калькованого дієприкметника."
    - sentence: "Це був справді хвилюючий момент для всіх присутніх."
      error: "хвилюючий"
      answer: "зворушливий"
      options: ["зворушливий", "хвилювавший", "який хвилювати", "схвильований"]
      explanation: "Хвилюючий є калькою. Краще використати прикметник зворушливий."
    - sentence: "Ми довго дивилися на палаючий вогонь у каміні."
      error: "палаючий"
      answer: "що палав"
      options: ["що палав", "палавший", "спалений", "який палати"]
      explanation: "Для опису активної дії вогню використовуємо підрядне речення."
    - sentence: "Подорожуючі люди часто зупиняються в цьому готелі."
      error: "Подорожуючі"
      answer: "Подорожні"
      options: ["Подорожні", "Подорожувавші", "Мандрівні", "Ті що"]
      explanation: "Активна форма на -юч тут неприродна. Замінюємо на прикметник подорожні."
    - sentence: "Він побачив бігучого собаку на вулиці."
      error: "бігучого"
      answer: "що біг"
      options: ["що біг", "бігшого", "який бігти", "збіглого"]
      explanation: "Замість бігучий треба використовувати підрядне речення."
    - sentence: "Заспокійливі слова матері допомогли плачучій дівчинці."
      error: "плачучій"
      answer: "яка плакала"
      options: ["яка плакала", "плакавшій", "що плакати", "оплаканій"]
      explanation: "Дієприкметник плачучий замінюється розгорнутою формою."
    - sentence: "Летючі птахи високо в небі виглядали дуже красиво."
      error: "Летючі"
      answer: "Птахи, що летіли,"
      error_type: "phrase"
      options: ["Птахи, що летіли,", "Летівші птахи", "Птахи, які літати,", "Злетілі птахи"]
      explanation: "Жива мова описує активну дію через підрядне речення."
    - sentence: "Керуюча компанія не виконала своїх зобов'язань перед мешканцями."
      error: "Керуюча"
      answer: "Компанія, яка керує,"
      error_type: "phrase"
      options: ["Компанія, яка керує,", "Керувавша компанія", "Компанія, що керувати", "Керована компанія"]
      explanation: "Офіційний термін керуюча компанія краще уникати в публіцистиці."

- type: quiz
  title: "Стилістичний вибір"
  instruction: "Оберіть найбільш природний та стилістично правильний варіант для кожного контексту."
  items:
    - question: "Який варіант є найбільш доречним у дружній розмові за кавою?"
      options:
        - text: "Чи бачив ти план, що вони нам вчора запропонували?"
          correct: true
        - text: "Чи бачив ти план, запропонований ними вчора?"
          correct: false
        - text: "Чи ознайомився ти із запропонованим вчора планом?"
          correct: false
        - text: "Чи побачив ти вчорашній запропонований план?"
          correct: false
      explanation: "У розмовній мові підрядне речення зі словом що звучить найбільш природно та легко."
    - question: "Яким українським словом або фразою найкраще перекласти російський вислів 'окружающая среда'?"
      options:
        - text: "довкілля"
          correct: true
        - text: "оточуюче середовище"
          correct: false
        - text: "середовище, що оточує"
          correct: false
        - text: "околиця"
          correct: false
      explanation: "Довкілля є ідеальним лексичним замінником для цієї кальки."
    - question: "Яким чином правильно та стилістично природно запитати про поточний час українською мовою?"
      options:
        - text: "О котрій годині ми зустрічаємося?"
          correct: true
        - text: "О якій годині ми зустрічаємося?"
          correct: false
        - text: "В яку годину ми зустрічаємося?"
          correct: false
        - text: "На котру годину зустріч?"
          correct: false
      explanation: "Для запитань про час використовується виключно слово котрий."
    - question: "Яка з цих наведених фраз є класичним прикладом бюрократичного канцеляриту?"
      options:
        - text: "нижчепідписані особи"
          correct: true
        - text: "люди, які підписали"
          correct: false
        - text: "ті, хто поставив підпис"
          correct: false
        - text: "особи, що підписалися"
          correct: false
      explanation: "Нагромадження дієприкметників (нижчепідписані) створює канцелярит."
    - question: "Який найкращий і найпростіший спосіб уникнути стилістичної помилки, відомої як 'якання', у великому тексті?"
      options:
        - text: "Чергувати сполучне слово який із займенником що."
          correct: true
        - text: "Завжди використовувати слово котрий замість який."
          correct: false
        - text: "Повністю відмовитися від складнопідрядних речень."
          correct: false
        - text: "Використовувати тільки активні дієприкметники."
          correct: false
      explanation: "Чергування зі словом що робить текст легшим і природнішим."
    - question: "Як правильно і без використання кальок перекласти російське словосполучення 'следующий шаг'?"
      options:
        - text: "наступний крок"
          correct: true
        - text: "наступаючий крок"
          correct: false
        - text: "слідуючий крок"
          correct: false
        - text: "крок, що слідує"
          correct: false
      explanation: "Слова слідуючий і наступаючий є кальками. Правильно — наступний."
    - question: "Який із запропонованих варіантів є абсолютно правильним для використання в офіційно-діловому чи суворому юридичному тексті?"
      options:
        - text: "Згідно з чинним законодавством України."
          correct: true
        - text: "Згідно з діючим законодавством України."
          correct: false
        - text: "Згідно з законодавством, яке діє."
          correct: false
        - text: "Згідно з законодавством, що чинить."
          correct: false
      explanation: "Чинне законодавство — це сталий юридичний термін, який не змінюють."
    - question: "Що саме означає важлива концепція 'агентності' в контексті сучасного українського синтаксису?"
      options:
        - text: "Використання активних дієслів замість пасивних конструкцій."
          correct: true
        - text: "Використання виключно офіційно-ділового стилю в документах."
          correct: false
        - text: "Відмова від будь-яких підрядних речень у мовленні."
          correct: false
        - text: "Використання слова який у кожному реченні тексту."
          correct: false
      explanation: "Агентність підкреслює активну роль суб'єкта через живі дієслова."
    - question: "Як стилістично правильно та природно перефразувати неприродне речення 'усі бажаючі можуть вільно приєднатися'?"
      options:
        - text: "Усі охочі можуть приєднатися."
          correct: true
        - text: "Всі, хто бажаючі, можуть приєднатися."
          correct: false
        - text: "Бажаючі учасники можуть приєднатися."
          correct: false
        - text: "Бажані можуть приєднатися."
          correct: false
      explanation: "Прикметник охочі є найкращим замінником кальки бажаючі."
    - question: "В якому відмінку має стояти слово 'який' у фразі: 'Це проєкт, ... ми завершили'?"
      options:
        - text: "У знахідному відмінку (який)."
          correct: true
        - text: "В орудному відмінку (яким)."
          correct: false
        - text: "У давальному відмінку (якому)."
          correct: false
        - text: "У місцевому відмінку (якому)."
          correct: false
      explanation: "Ми завершили (кого/що?) проєкт. Знахідний відмінок для неістот збігається з називним (який)."

- type: essay-response
  title: "Редакторська правка тексту"
  instruction: "Перепишіть цей бюрократичний текст живою, природною мовою, уникаючи канцеляриту."
  prompt: 'Уявіть, що ви працюєте літературним редактором. Відредагуйте цей текст: "Особи, які є бажаючими отримати візу, повинні своєчасно подати повністю заповнену анкету. Документи, подані пізніше встановленого терміну, розглядатися не будуть діючою комісією". Зробіть його легким і зрозумілим, використовуючи активні дієслова.'
  min_words: 150
  model_answer: 'Текст потрібно зробити більш агентним і прозорим. Ось приклад редагування: "Люди, які хочуть отримати візу, мають вчасно подати заповнену анкету. Якщо ви подасте документи пізніше встановленого терміну, комісія їх не розглядатиме". У першому реченні ми замінили громіздку конструкцію "Особи, які є бажаючими" на просте і зрозуміле "Люди, які хочуть". Слово "бажаючими" є типовим проявом суржику та канцеляриту. У другому реченні ми прибрали пасивну конструкцію "розглядатися не будуть діючою комісією". Замість неї ми використали активний стан: "комісія їх не розглядатиме". Слово "діючою" було зайвим і штучним, тому ми його просто видалили. Такий підхід робить мовлення набагато природнішим і легшим для сприйняття, що є головною метою хорошого літературного редактора.'
  rubric:
    - criteria: "Усунення канцеляриту"
      description: "Усі активні дієприкметники та громіздкі пасивні конструкції замінено на природні відповідники."
      points: 40
    - criteria: "Збереження змісту"
      description: "Основний інформаційний зміст повідомлення повністю збережено без викривлень."
      points: 30
    - criteria: "Граматична правильність"
      description: "Текст не містить граматичних помилок, правильно використано сполучні слова."
      points: 30

- type: group-sort
  title: "Сортування конструкцій"
  instruction: "Розподіліть наведені фрази на відповідні стилістичні групи."
  groups:
    - name: "Канцелярський стиль"
      items:
        - "працюючий студент"
        - "керуюча компанія"
        - "бажаючі отримати"
        - "діючий механізм"
        - "захоплююча історія"
        - "оточуюче середовище"
        - "хвилююча мить"
    - name: "Природний стиль"
      items:
        - "студент, який працює"
        - "компанія, що керує"
        - "охочі отримати"
        - "механізм, що діє"
        - "захоплива історія"
        - "довкілля"
        - "зворушлива мить"
    - name: "Сталі терміни"
      items:
        - "чинне законодавство"
        - "діючий вулкан"
        - "керівна посада"

- type: fill-in
  title: "Вставте правильну форму"
  instruction: "Оберіть стилістично найкращий варіант для кожного речення."
  items:
    - sentence: "Державні органи мають вирішити проблему, яку роками створюють хімічні заводи, що постійно {{answer}}."
      answer: "працюють"
      options: ["працюють", "працюючі", "працювавши", "працювані"]
      explanation: "Слід уникати активних дієприкметників і використовувати дієслова."
    - sentence: "Цей закон є {{answer}}, тому ми повинні його дотримуватися."
      answer: "чинним"
      options: ["чинним", "діючим", "роблячим", "працюючим"]
      explanation: "В юридичній мові використовується сталий термін чинний закон."
    - sentence: "Ми побачили {{answer}} вулкан під час нашої подорожі до Ісландії."
      answer: "діючий"
      options: ["діючий", "чинний", "працюючий", "живий"]
      explanation: "Діючий вулкан — це міжнародно визнаний геологічний термін."
    - sentence: "Усі {{answer}} допомогти можуть записатися у волонтери."
      answer: "охочі"
      options: ["охочі", "бажаючі", "хочучі", "бажані"]
      explanation: "Охочі — це найкращий лексичний замінник для кальки бажаючі."
    - sentence: "Книга, {{answer}} я читав учора, була дуже цікавою."
      answer: "яку"
      options: ["яку", "що", "якій", "яка"]
      explanation: "Слово який узгоджується з іменником у головному реченні, але відмінок визначається підрядним (читав кого/що? - знахідний)."
    - sentence: "Той чоловік, {{answer}} стоїть біля вікна, — мій брат."
      answer: "що"
      options: ["що", "яку", "якому", "котрий"]
      explanation: "Слово що додає фразі легкості та природності."
    - sentence: "Я пишаюся проєктом, {{answer}} ми завершили вчора."
      answer: "який"
      options: ["який", "яким", "котрий", "якому"]
      explanation: "Відмінок сполучного слова визначається його роллю в підрядному реченні (завершили кого/що? - який у знахідному відмінку для неістот)."
    - sentence: "О {{answer}} годині ми зустрічаємося завтра?"
      answer: "котрій"
      options: ["котрій", "якій", "що", "якому"]
      explanation: "З часом (годинами) використовується виключно слово котрий."
    - sentence: "Дерево, {{answer}} посадив мій дідусь, виросло дуже високим."
      answer: "що"
      options: ["що", "яке", "якому", "яким"]
      explanation: "Слово що є короткою і стилістично привабливою альтернативою."
    - sentence: "Важливо зберігати {{answer}} навколо нашого міста."
      answer: "довкілля"
      options: ["довкілля", "оточуюче середовище", "навколишнє", "середовище"]
      explanation: "Довкілля є природним українським словом на противагу кальці."
    - sentence: "Це був {{answer}} рік для нашої команди."
