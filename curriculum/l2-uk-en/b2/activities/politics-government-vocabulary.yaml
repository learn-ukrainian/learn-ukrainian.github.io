      correct: false
  - question: Хто має повноваження призначати прем'єр-міністра України за новою процедурою?
    explanation: Прем'єр-міністра призначає парламент (Верховна Рада) за поданням
      президента.
    options:
    - text: Верховна Рада
      correct: true
    - text: Кабінет Міністрів
      correct: false
    - text: Верховний Суд
      correct: false
    - text: Голова громади
      correct: false
  - question: Який термін описує систему стримувань і противаг між урядом і парламентом?
    explanation: Це характерно для парламентсько-президентської республіки.
    options:
    - text: Парламентсько-президентська республіка
      correct: true
    - text: Абсолютна монархія
      correct: false
    - text: Суто президентська республіка
      correct: false
    - text: Федеративна держава
      correct: false
  - question: Що означає політичний термін коаліція у контексті роботи Верховної Ради?
    explanation: Коаліція — це об'єднання кількох депутатських фракцій для формування
      більшості.
    options:
    - text: Об'єднання фракцій у парламентську більшість
      correct: true
    - text: Група партій, що критикують дії уряду
      correct: false
    - text: Зібрання суддів Верховного Суду
      correct: false
    - text: Організація місцевого самоврядування
      correct: false
  - question: Яке слово потрібно використати у реченні про купівлю нового одягу в
      магазині?
    explanation: Для побутового вибору товару використовується дієслово вибирати.
    options:
    - text: Вибирати
      correct: true
    - text: Обирати
      correct: false
    - text: Голосувати
      correct: false
    - text: Балотуватися
      correct: false
  - question: Яке словосполучення є правильним, коли ми говоримо про транспорт для
      всіх?
    explanation: Транспорт, яким користується громада, називається громадським.
    options:
    - text: Громадський транспорт
      correct: true
    - text: Громадянський транспорт
      correct: false
    - text: Державний транспорт
      correct: false
    - text: Політичний транспорт
      correct: false
  - question: Як називається документ, який обмежував владу гетьмана у тисяча сімсот
      десятому році?
    explanation: Це Конституція Пилипа Орлика.
    options:
    - text: Конституція Пилипа Орлика
      correct: true
    - text: Акт проголошення незалежності
      correct: false
    - text: Магдебурзьке право
      correct: false
    - text: Указ Президента
      correct: false
  - question: Що таке об'єднана територіальна громада в контексті реформи місцевого
      самоврядування?
    explanation: ОТГ — це об'єднання кількох сіл чи міст, які спільно керують ресурсами.
    options:
    - text: Об'єднання кількох сіл або міст
      correct: true
    - text: Парламентський комітет
      correct: false
    - text: Міжнародна правозахисна організація
      correct: false
    - text: Група міністрів уряду
      correct: false
  - question: Яку дію може виконати президент, якщо він не згоден з ухваленим законом?
    explanation: Президент може накласти вето на закон.
    options:
    - text: Накласти вето
      correct: true
    - text: Розпустити суд
      correct: false
    - text: Змінити текст закону
      correct: false
    - text: Призначити нові вибори
      correct: false
  - question: Як називається загальнонаціональне голосування громадян з дуже важливого
