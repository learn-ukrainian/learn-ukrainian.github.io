- type: reading
  title: 'Аналіз політичного дискурсу: публіцистичний стиль'
  text: 'Урядовці знову переклали всю відповідальність на плечі місцевих мерів! Замість
    реальної підтримки територіальних громад, Київ пропонує лише порожні обіцянки.
    Чи витримають місцеві бюджети такий шалений тиск у наступному році? Експерти вже
    називають цей проєкт бюджету найгіршим за останні десять років, адже він повністю
    руйнує досягнення реформи децентралізації.

    '
  tasks:
  - Визначте, до якого стилю належить цей текст (офіційно-діловий чи публіцистичний),
    і назвіть дві ознаки цього стилю.
  - Яку головну проблему порушує автор тексту?
  - Як автор оцінює дії уряду щодо територіальних громад?
  - Знайдіть у тексті емоційно забарвлену лексику та риторичні запитання.
- type: essay-response
  title: Роль опозиції в демократичній державі
  instruction: Напишіть розгорнуту відповідь на запропоноване питання.
  prompt: Чому існування сильної парламентської опозиції є критично важливим для розбудови
    демократії? Наведіть аргументи, спираючись на текст модуля та ваші знання про
    політичну систему України.
  min_words: 150
  model_answer: 'У демократичній державі, такій як Україна, яка є парламентсько-президентською
    республікою, наявність сильної парламентської опозиції є фундаментальною вимогою
    для здорового розвитку суспільства. По-перше, опозиція виконує функцію контролю
    за діями правлячої коаліції та уряду. Вона не дозволяє владі зловживати своїми
    повноваженнями і гарантує, що урядові рішення будуть проаналізовані та розкритиковані
    у разі їхньої неефективності. По-друге, опозиція забезпечує репрезентативність:
    вона представляє інтереси тієї частини громадян, яка не голосувала за партії влади,
    тим самим підтримуючи баланс інтересів у суспільстві. По-третє, конструктивна
    опозиція завжди пропонує альтернативні законопроєкти та стратегії, що сприяє кращій
    якості законодавства. Без опозиції будь-яка, навіть найбільш прогресивна влада,
    ризикує перетворитися на авторитарний режим, що ігнорує верховенство закону. Тому
    розбудова крихкої демократії неможлива без поваги до прав опозиційних сил.'
  rubric:
  - criteria: Змістове наповнення
    description: Відповідь повністю розкриває тему, наведено переконливі аргументи.
    points: 5
  - criteria: Використання лексики
    description: 'Доречне та правильне використання термінів: коаліція, опозиція,
      верховенство закону.'
    points: 5
- type: true-false
  title: Перевірка розуміння фактів
  items:
  - statement: Україна, згідно з Конституцією, є суто президентською республікою.
    correct: false
    explanation: Україна є парламентсько-президентською республікою.
  - statement: Законодавча влада в Україні належить Кабінету Міністрів.
    correct: false
    explanation: Законодавча влада належить Верховній Раді, а уряд — це виконавча
      влада.
  - statement: Конституція Пилипа Орлика була створена у 1710 році.
    correct: true
    explanation: Так, це один із перших документів, що обмежував владу правителя.
  - statement: Народні депутати України наразі мають повну та абсолютну недоторканність.
    correct: false
    explanation: Повну депутатську недоторканність було скасовано під тиском громадськості.
  - statement: Президент України має право накладати вето на ухвалені парламентом
      закони.
    correct: true
    explanation: Так, це одне з ключових повноважень президента в системі стримувань
      і противаг.
  - statement: Реформа децентралізації забрала всі кошти з місцевих бюджетів до столиці.
    correct: false
    explanation: Навпаки, децентралізація залишила значну частину податків на місцях
      у громадах.
  - statement: Правлячу коаліцію у Верховній Раді формують партії, які об'єдналися
      в більшість.
    correct: true
    explanation: Коаліція бере на себе відповідальність за формування уряду.
  - statement: В Україні закон дозволяє проводити передвиборчу агітацію в день голосування.
    correct: false
    explanation: Закон суворо забороняє агітацію за день до голосування (день тиші)
      та в сам день виборів.
  - statement: Слово вибирати використовується, коли йдеться про голосування за главу
      держави.
    correct: false
    explanation: Для голосування на посаду використовується дієслово обирати.
  - statement: Референдум є одним із головних інструментів прямої демократії.
    correct: true
    explanation: Референдум дозволяє громадянам ухвалювати рішення безпосередньо голосуванням.
  instruction: Визначте, чи твердження правильне.
- type: quiz
  title: Оберіть правильну відповідь
  instruction: Оберіть один правильний варіант відповіді для кожного запитання.
  items:
  - question: Яка з гілок влади відповідає за реалізацію ухвалених законів на практиці?
    explanation: Виконавча влада (Кабінет Міністрів) реалізовує закони та керує державними
      справами.
    options:
    - text: Виконавча влада
      correct: true
    - text: Законодавча влада
      correct: false
    - text: Судова влада
      correct: false
