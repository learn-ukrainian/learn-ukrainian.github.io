      answer: "У новій кав'ярні ми зустрілися."
    - words: ["Наш", "лічильник", "показує", "витрати", "електроенергії"]
      answer: "Наш лічильник показує витрати електроенергії."
    - words: ["Вчора", "він", "купив", "обігрівач", "сучасний"]
      answer: "Вчора він купив сучасний обігрівач."
    - words: ["На", "нашій", "вулиці", "відкрилася", "пекарня"]
      answer: "На нашій вулиці відкрилася пекарня."
    - words: ["У", "кожній", "машині", "повинен", "бути", "вогнегасник"]
      answer: "У кожній машині повинен бути вогнегасник."
