- type: quiz
  title: "Перевірте знання: утворення слів на позначення місця"
  items:
    - question: "Який суфікс найчастіше утворює назви приміщень та закладів?"
      explanation: "Суфікс -ня часто вказує на місце, наприклад, пекарня, лікарня."
      options:
        - text: "-ня"
          correct: true
        - text: "-ник"
          correct: false
        - text: "-ач"
          correct: false
        - text: "-лка"
          correct: false
    - question: "Як називається місце, де печуть хліб та інші вироби?"
      explanation: "Місце, де печуть хліб, називається пекарнею."
      options:
        - text: "пекарня"
          correct: true
        - text: "пекарник"
          correct: false
        - text: "пекарище"
          correct: false
        - text: "пекар"
          correct: false
    - question: "Який прилад використовується для нагрівання води та приготування чаю?"
      explanation: "Для нагрівання води традиційно використовують чайник."
      options:
        - text: "чайник"
          correct: true
        - text: "кавник"
          correct: false
        - text: "кип'ятильник"
          correct: false
        - text: "обігрівач"
          correct: false
    - question: "Яке слово позначає велике приміщення для зберігання різних речей?"
      explanation: "Слово сховище утворюється за допомогою суфікса -ище."
      options:
        - text: "сховище"
          correct: true
        - text: "сховалка"
          correct: false
        - text: "сховник"
          correct: false
        - text: "сховач"
          correct: false
    - question: "Який суфікс вказує на прилад, що виконує певну дію?"
      explanation: "Суфікс -ач (вимикач, обігрівач) часто вказує на прилад."
      options:
        - text: "-ач"
          correct: true
        - text: "-ня"
          correct: false
        - text: "-ище"
          correct: false
        - text: "-ство"
          correct: false
    - question: "Як називається заклад, де можна випити кави та відпочити?"
      explanation: "Заклад, де п'ють каву, називається кав'ярнею."
      options:
        - text: "кав'ярня"
          correct: true
        - text: "кавник"
          correct: false
        - text: "кавоварка"
          correct: false
        - text: "кавище"
          correct: false
    - question: "Який пристрій використовується для гасіння пожежі у приміщенні або авто?"
      explanation: "Пристрій для гасіння вогню називається вогнегасником."
      options:
        - text: "вогнегасник"
          correct: true
        - text: "вогнегас"
          correct: false
        - text: "вогняр"
          correct: false
        - text: "вогнище"
          correct: false
    - question: "Як правильно назвати прилад, який охолоджує продукти та напої?"
      explanation: "Прилад для охолодження називається холодильником."
      options:
        - text: "холодильник"
          correct: true
        - text: "холодар"
          correct: false
        - text: "холодильня"
          correct: false
        - text: "холодище"
          correct: false

