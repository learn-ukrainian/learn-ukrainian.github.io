- type: reading
  id: reading-word-formation
  title: 'Джерело: Державні будівельні норми'
  text: |
    Під час проєктування сучасних житлових комплексів архітектори зобов'язані враховувати необхідність створення функціональних просторів. Кожна велика будівля повинна мати надійне підземне сховище для мешканців. Крім того, на перших поверхах доцільно розміщувати приміщення для комерційної діяльності: тут може працювати пекарня, простора кав'ярня або сучасна книгарня-кав'ярня. Окремої уваги вимагають санітарно-гігієнічні зони, такі як громадська вбиральня та обладнана пральня для потреб комплексу.
  tasks:
    - 'Які обов'язкові приміщення згадуються в тексті?'
    - 'Які заклади пропонується розміщувати на перших поверхах?'
    - 'До якої категорії належить пральня та вбиральня?'

- type: essay-response
  title: 'Есе: Організація простору'
  source_reading: reading-word-formation
  prompt: 'Проаналізуйте, як просторові назви з тексту відображають людську діяльність. Поясніть логіку їх утворення від дієслів або іменників, спираючись на правила словотворення української мови. Яке значення має наявність таких спеціалізованих зон у сучасному міському середовищі?'
  min_words: 150
  model_answer: 'У наданому тексті просторові назви чітко відображають антропоцентричний підхід до формування міського середовища. Наприклад, слово сховище походить від дієслова ховати і позначає безпечне місце середнього роду. Слово пекарня утворене від професії пекар (від пекти), а кав'ярня — від напою кава, підкреслюючи культурний аспект закладу. Вбиральня (від вбиратися) та пральня (від прати) мають суфікс -ня, який маркує закритий простір, спеціалізований для конкретної побутової функції. Такі чітко визначені просторові зони роблять сучасні житлові комплекси комфортними та автономними, оскільки кожна кімната чи заклад відповідає певній дії, що задовольняє потреби людини.'
  rubric:
    - criteria: 'Аналіз словотворення'
      description: 'Студент правильно визначає твірні основи та суфікси.'
      points: 5
    - criteria: 'Стилістика'
      description: 'Текст відповідає офіційно-діловому або науковому стилю.'
      points: 5

- type: true-false
  title: 'Правильно чи неправильно'
  instruction: 'Визначте, чи є твердження правильним, спираючись на правила утворення назв місць.'
  items:
    - statement: 'Слово лікарня утворено від слова лікувати через ланцюжок: лікувати, потім лікар, потім лікарня.'
      correct: true
      explanation: 'Так, це класичний приклад утворення місця від назви професії.'
    - statement: 'Всі слова із суфіксом -ище завжди належать до середнього роду.'
      correct: false
      explanation: 'Ні, слова на -ище, які є аугментативами (наприклад, вітрище), зберігають рід твірного слова.'
    - statement: 'Слово робільня є правильним українським словом для позначення місця роботи.'
      correct: false
      explanation: 'Це приклад гіпергенералізації. Правильне слово — майстерня.'
    - statement: 'Для утворення назви кімнати від дієслова спати ми використовуємо суфікс -льня.'
      correct: true
      explanation: 'Так, оскільки основа закінчується на голосну А (спа-ти), ми додаємо -льня і виходить спальня.'
    - statement: 'Слово кав'ярня є історичним запозиченням з російської мови.'
      correct: false
      explanation: 'Ні, це питоме українське слово, що виникло у Львові та Відні.'
    - statement: 'Суфікс -ня найчастіше позначає закритий, внутрішній простір у будівлі.'
      correct: true
      explanation: 'Саме так, слова на -ня (їдальня, спальня) описують приміщення з дахом і стінами.'
    - statement: 'Слово пасовище належить до чоловічого роду, бо утворене від дієслова пасти.'
      correct: false
      explanation: 'Слово пасовище позначає територію, тому воно належить до середнього роду.'
    - statement: 'Замість запозиченого слова парикмахерская українська мова використовує питоме слово перукарня.'
      correct: true
      explanation: 'Так, воно утворене від назви професії перукар.'
    - statement: 'Слово кладовище є стилістично нейтральним терміном для позначення місця поховання.'
      correct: true
      explanation: 'Це синонім до слова цвинтар, широко вживаний в офіційному мовленні.'
    - statement: 'Для дієслова їсти правильною назвою місця є форма їдальня, де відбувається чергування приголосних.'
      correct: true
      explanation: 'Так, основа їс-ти змінюється на їд- і додається суфікс -альня.'

- type: quiz
  title: 'Тест: Дериваційна морфологія'
  instruction: 'Оберіть одну правильну відповідь на кожне запитання щодо утворення назв простору.'
  items:
    - question: 'Який суфікс необхідно використати для утворення назви внутрішнього побутового приміщення, призначеного для прання одягу?'
      options:
        - text: '-ище'
          correct: false
        - text: '-арня'
          correct: false
        - text: '-льня'
          correct: true
        - text: '-альня'
          correct: false
      explanation: 'Від дієслова прати (основа на голосну А) утворюється форма пральня за допомогою суфікса -льня.'
    - question: 'Виберіть правильне узгодження прикметника з іменником, який є аугментативом і позначає дуже сильний вітер.'
      options:
        - text: 'сильне вітрище'
          correct: false
        - text: 'сильний вітрище'
          correct: true
        - text: 'сильна вітрище'
          correct: false
        - text: 'сильні вітрище'
          correct: false
      explanation: 'Аугментатив вітрище утворений від іменника чоловічого роду вітер, тому повністю зберігає його рід.'
    - question: 'Яке з наведених слів є результатом гіпергенералізації та ніколи не використовується в сучасній літературній українській мові?'
      options:
        - text: 'крамниця'
          correct: false
        - text: 'майстерня'
          correct: false
        - text: 'торгувальня'
          correct: true
        - text: 'лікарня'
          correct: false
      explanation: 'Слово торгувальня створене штучно; правильно завжди використовувати слова крамниця або магазин.'
    - question: 'Який з наведених іменників позначає велику відкриту територію, де традиційно відбувалося видобування корисних копалин?'
      options:
        - text: 'сховище'
          correct: false
        - text: 'звалище'
          correct: false
        - text: 'родовище'
          correct: true
        - text: 'городище'
          correct: false
      explanation: 'Слово родовище (від дієслова родити) позначає територію, яка є дуже багатою на корисні копалини.'
    - question: 'До якої частини мови та якого граматичного роду належить нормативне слово горище в українській мові?'
      options:
        - text: 'іменник жіночого роду'
          correct: false
        - text: 'іменник чоловічого роду'
          correct: false
        - text: 'іменник середнього роду'
          correct: true
        - text: 'іменник спільного роду'
          correct: false
      explanation: 'Оскільки слово горище позначає місце або фізичний простір безпосередньо під дахом, воно належить до середнього роду.'
    - question: 'Яке дієслово слугує початковою ланкою для утворення назви кімнати, де зазвичай щодня споживають приготовану їжу?'
      options:
        - text: 'їсти'
          correct: true
        - text: 'готувати'
          correct: false
        - text: 'харчуватися'
          correct: false
        - text: 'смакувати'
          correct: false
      explanation: 'Слово їдальня походить від дієслова їсти з додаванням суфікса -альня та відповідним чергуванням звуків.'
    - question: 'Як правильно назвати заклад, у якому працює фаховий майстер, що професійно займається друкуванням книг і періодичних видань?'
      options:
        - text: 'друкувальня'
          correct: false
        - text: 'друкарня'
          correct: true
        - text: 'книгарня'
          correct: false
        - text: 'видавництво'
          correct: false
      explanation: 'Від дієслова друкувати утворюється назва професії друкар, а від неї за правилами утворюється друкарня.'
    - question: 'Який суспільно-культурний заклад в українській історії дев''ятнадцятого століття став центром ліквідації неписьменності та відродження?'
      options:
        - text: 'книгарня-кав''ярня'
          correct: false
        - text: 'хата-читальня'
          correct: true
        - text: 'міська бібліотека'
          correct: false
        - text: 'сільська школа'
          correct: false
      explanation: 'Історичні хати-читальні, масово створені товариством Просвіта, були головними осередками культурного життя нації.'
    - question: 'Який суфікс найкраще підходить для утворення назви спеціалізованого приміщення, де регулярно відбувається процес прасування речей?'
      options:
        - text: '-альня'
          correct: false
        - text: '-ня'
          correct: false
        - text: '-льня'
          correct: true
        - text: '-ище'
          correct: false
      explanation: 'Від дієслова прасувати (основа прасува-) природно утворюється іменник прасувальня із суфіксом -льня.'
    - question: 'Яке слово з наведених не позначає конкретного фізичного закладу або приміщення, а є широким науковим абстрактним поняттям?'
      options:
        - text: 'пекарня'
          correct: false
        - text: 'кав''ярня'
          correct: false
        - text: 'термін'
          correct: true
        - text: 'читальня'
          correct: false
      explanation: 'Слово термін є науковим абстрактним поняттям, тоді як абсолютно всі інші наведені слова позначають фізичні місця.'

- type: fill-in
  title: 'Впишіть правильне слово'
  instruction: 'Вставте у речення назву місця або простору, утворену від відповідного дієслова чи іменника.'
  items:
    - sentence: 'Під час тривоги всі мешканці будинку негайно спустилися в безпечне підземне сховище.'
      answer: 'сховище'
      options: ['сховище', 'звалище', 'городище', 'пасовище']
    - sentence: 'Нова кав''ярня на розі вулиці пропонує чудову альтернативну каву з Ефіопії.'
      answer: 'кав''ярня'
      options: ['кав''ярня', 'пекарня', 'читальня', 'друкарня']
    - sentence: 'Фермер вивів своє велике стадо корів на просторе зелене пасовище.'
      answer: 'пасовище'
      options: ['пасовище', 'стернище', 'родовище', 'кладовище']
    - sentence: 'Після лекції студенти зібралися, щоб зробити детальний аналіз наукового тексту.'
      answer: 'аналіз'
      options: ['аналіз', 'синтез', 'процес', 'метод']
    - sentence: 'Моя бабуся завжди тримає старовинні родинні речі на сухому горищі під дахом.'
      answer: 'горищі'
      options: ['горищі', 'сховищі', 'кладовищі', 'родовищі']
    - sentence: 'Сучасна міська лікарня отримала новітнє обладнання для проведення складних операцій.'
      answer: 'лікарня'
      options: ['лікарня', 'пральня', 'вітальня', 'їдальня']
    - sentence: 'Він використав новий метод деривації для створення цікавих словотвірних ланцюжків.'
      answer: 'метод'
      options: ['метод', 'термін', 'поняття', 'процес']
    - sentence: 'Зранку подув такий сильний вітрище, що поламав кілька старих дерев у парку.'
      answer: 'вітрище'
      options: ['вітрище', 'дощище', 'сніжище', 'сховище']
    - sentence: 'Міська влада відкрила нове звалище побутових відходів далеко за межами міста.'
      answer: 'звалище'
      options: ['звалище', 'родовище', 'городище', 'кладовище']
    - sentence: 'Цей науковий термін чітко описує складний механізм утворення нових слів в українській мові.'
      answer: 'термін'
      options: ['термін', 'синтез', 'аналіз', 'метод']

- type: group-sort
  title: 'Розподіліть за родом і значенням'
  instruction: 'Віднесіть слова до правильної граматичної категорії: назви місць (середній рід) або аугментативи (зберігають рід твірного слова).'
  groups:
    - name: 'Назви місць (середній рід)'
      items:
        - сховище
        - пасовище
        - городище
        - горище
        - кладовище
        - родовище
    - name: 'Аугментативи (чоловічий або жіночий рід)'
      items:
        - вітрище
        - дощище
        - бабище
        - голосище
        - ручище

- type: unjumble
  title: 'Складіть речення'
  instruction: 'Упорядкуйте слова так, щоб утворити правильне речення з офіційно-ділового або наукового стилю.'
  items:
    - words: ['це', 'новий', 'науковий', 'термін', 'який', 'описує', 'морфологічний', 'процес']
      answer: 'Це новий науковий термін який описує морфологічний процес'
    - words: ['вони', 'розпочали', 'масштабне', 'дослідження', 'старого', 'слов''янського', 'городища', 'біля', 'річки']
      answer: 'Вони розпочали масштабне дослідження старого слов''янського городища біля річки'
    - words: ['сучасна', 'читальня', 'в', 'університетській', 'бібліотеці', 'завжди', 'заповнена', 'активними', 'студентами']
      answer: 'Сучасна читальня в університетській бібліотеці завжди заповнена активними студентами'
    - words: ['міська', 'лікарня', 'отримала', 'сучасне', 'обладнання', 'для', 'детального', 'медичного', 'аналізу']
      answer: 'Міська лікарня отримала сучасне обладнання для детального медичного аналізу'
    - words: ['ця', 'популярна', 'книгарня-кав''ярня', 'стала', 'улюбленим', 'місцем', 'відпочинку', 'для', 'творчої', 'молоді']
      answer: 'Ця популярна книгарня-кав''ярня стала улюбленим місцем відпочинку для творчої молоді'
    - words: ['велике', 'газове', 'родовище', 'було', 'виявлене', 'геологами', 'в', 'південному', 'регіоні']
      answer: 'Велике газове родовище було виявлене геологами в південному регіоні'
    - words: ['місцева', 'пекарня', 'кожного', 'ранку', 'пропонує', 'мешканцям', 'району', 'свіжий', 'гарячий', 'хліб']
      answer: 'Місцева пекарня кожного ранку пропонує мешканцям району свіжий гарячий хліб'
    - words: ['українська', 'мова', 'демонструє', 'антропоцентричний', 'метод', 'утворення', 'назв', 'фізичного', 'простору']
      answer: 'Українська мова демонструє антропоцентричний метод утворення назв фізичного простору'

- type: error-correction
  title: 'Виправте лексичні помилки'
  instruction: 'Знайдіть русизм, штучно утворене слово або граматичну помилку в реченні та замініть їх на нормативний український відповідник.'
  items:
    - sentence: 'Він пішов у парикмахерську, щоб зробити нову стильну зачіску.'
      error: 'парикмахерську'
      answer: 'перукарню'
      error_type: 'word'
      options: ['перукарню', 'стригальню', 'голярню', 'перукарську']
      explanation: 'Слово парикмахерская є калькою, правильно використовувати питоме слово перукарня.'
    - sentence: 'Ми вечеряли у великій столовій на першому поверсі готелю.'
      error: 'столовій'
      answer: 'їдальні'
      error_type: 'word'
      options: ['їдальні', 'кухні', 'харчівні', 'споживальні']
      explanation: 'Приміщення для споживання їжі називається їдальня, а не столова.'
    - sentence: 'Я залишив свій верхній одяг у просторій уборній біля входу.'
      error: 'уборній'
      answer: 'вбиральні'
      error_type: 'word'
      options: ['вбиральні', 'роздягальні', 'кімнаті', 'гардеробній']
      explanation: 'Кімната для перевдягання або туалет називається вбиральня, слово уборна є русизмом.'
    - sentence: 'У художника була світла робільня з великими вікнами.'
      error: 'робільня'
      answer: 'майстерня'
      error_type: 'word'
      options: ['майстерня', 'працівня', 'творильня', 'робоча']
      explanation: 'Робільня — це неправильно утворене слово (гіпергенералізація). Правильно — майстерня.'
    - sentence: 'Вранці подуло сильне вітрище, яке зірвало дах із старого сараю.'
      error: 'сильне'
      answer: 'сильний'
      error_type: 'word'
      options: ['сильний', 'сильна', 'сильним', 'сильного']
      explanation: 'Аугментатив вітрище зберігає чоловічий рід свого твірного слова вітер.'
    - sentence: 'Студенти пішли у вчитильню, щоб підготуватися до складного іспиту.'
      error: 'вчитильню'
      answer: 'читальню'
      error_type: 'word'
      options: ['читальню', 'аудиторію', 'клас', 'школу']
