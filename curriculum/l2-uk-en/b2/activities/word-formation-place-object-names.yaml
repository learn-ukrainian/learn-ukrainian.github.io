      items: ["вимикач", "обігрівач", "холодильник", "чайник", "вогнегасник", "лічильник"]

- type: mark-the-words
  title: "Знайдіть назви приладів"
  instruction: "Знайдіть і позначте всі назви приладів та предметів у тексті."
  text: "У нашій новій квартирі є сучасний холодильник та потужний обігрівач. Біля дверей встановлено новий лічильник електроенергії, а на стіні зручний вимикач. Вранці я завжди вмикаю електричний чайник, щоб зробити каву."
  answers: ["холодильник", "обігрівач", "лічильник", "вимикач", "чайник"]

- type: cloze
  title: "Заповніть пропуски в тексті про місто та побут"
  passage: "Моє улюблене місце в місті — це маленька {{1}}, де готують смачну каву. Поруч розташована {{2}}, де завжди пахне свіжим хлібом. Коли я повертаюся додому, я заходжу в під'їзд і натискаю на {{3}}, щоб увімкнути світло. Вдома я відразу йду на кухню, де стоїть великий {{4}} з продуктами. Щоб зігрітися, я вмикаю {{5}} і ставлю {{6}} на плиту. У суботу я несу брудний одяг у місцеву {{7}}, а потім йду читати книги в тиху {{8}}. У нашому будинку є надійне {{9}} на випадок небезпеки. Також у нас є {{10}}, який показує витрати води. Мій брат працює в автосервісі, це велика {{11}} на околиці. Вчора він купив новий {{12}} для роботи з металом. Коли ми їдемо за місто, мій автомобільний {{13}} працює ідеально. У багажнику завжди лежить {{14}} на випадок пожежі."
  blanks:
    - id: 1
      answer: "кав'ярня"
      options: ["кав'ярня", "пекарня", "пральня", "лікарня"]
    - id: 2
      answer: "пекарня"
      options: ["пекарня", "майстерня", "книгарня", "їдальня"]
    - id: 3
      answer: "вимикач"
      options: ["вимикач", "лічильник", "обігрівач", "чайник"]
    - id: 4
      answer: "холодильник"
      options: ["холодильник", "вогнегасник", "двигун", "паяльник"]
    - id: 5
      answer: "обігрівач"
      options: ["обігрівач", "вимикач", "змішувач", "пилосос"]
    - id: 6
      answer: "чайник"
      options: ["чайник", "кавник", "лічильник", "паяльник"]
    - id: 7
      answer: "пральня"
      options: ["пральня", "читальня", "лікарня", "автостоянка"]
    - id: 8
      answer: "читальня"
      options: ["читальня", "їдальня", "перукарня", "кав'ярня"]
    - id: 9
      answer: "сховище"
      options: ["сховище", "родовище", "лісництво", "Київщина"]
    - id: 10
      answer: "лічильник"
      options: ["лічильник", "вимикач", "вогнегасник", "обігрівач"]
    - id: 11
      answer: "майстерня"
      options: ["майстерня", "пральня", "пекарня", "читальня"]
    - id: 12
      answer: "паяльник"
      options: ["паяльник", "кип'ятильник", "пилосос", "холодильник"]
    - id: 13
      answer: "двигун"
      options: ["двигун", "лічильник", "вимикач", "паяльник"]
    - id: 14
      answer: "вогнегасник"
      options: ["вогнегасник", "обігрівач", "чайник", "пилосос"]

- type: error-correction
  title: "Виправте помилки утворення слів"
  items:
