- type: quiz
  title: "Правила давноминулого часу"
  items:
    - question: "Яка функція давноминулого часу в українській мові?"
      explanation: "Давноминулий час позначає дію, що відбулася перед іншою минулою дією."
      options:
        - text: "Дія перед іншою минулою дією"
          correct: true
        - text: "Дія, яка відбувається зараз"
          correct: false
        - text: "Дія, яка відбудеться в майбутньому"
          correct: false
        - text: "Дія без певного часу"
          correct: false
    - question: "З яких частин складається давноминулий час в українській мові?"
      explanation: "Він складається з основного дієслова в минулому часі та допоміжного бути в минулому часі."
      options:
        - text: "Основне дієслово (минулий) + бути (минулий)"
          correct: true
        - text: "Основне дієслово (майбутній) + бути (минулий)"
          correct: false
        - text: "Основне дієслово (теперішній) + бути (майбутній)"
          correct: false
        - text: "Тільки основне дієслово у формі минулого часу"
          correct: false
    - question: "Яке допоміжне дієслово використовується для утворення давноминулого часу?"
      explanation: "Для давноминулого часу використовується дієслово бути."
      options:
        - text: "бути"
          correct: true
        - text: "мати"
          correct: false
        - text: "робити"
          correct: false
        - text: "хотіти"
          correct: false
    - question: "У якій формі стоїть основне дієслово у давноминулому часі?"
      explanation: "Основне дієслово завжди стоїть у формі минулого часу."
      options:
        - text: "У формі минулого часу"
          correct: true
        - text: "У формі теперішнього часу"
          correct: false
        - text: "У формі інфінітива"
          correct: false
        - text: "У формі майбутнього часу"
          correct: false
    - question: "Як правильно утворити давноминулий час від дієслова читати для займенника я (чоловічий рід)?"
      explanation: "Для чоловічого роду використовується форма читав був."
      options:
        - text: "читав був"
          correct: true
        - text: "читала була"
          correct: false
        - text: "читали були"
          correct: false
        - text: "читало було"
          correct: false
    - question: "Як правильно утворити давноминулий час від дієслова робити для займенника вона?"
      explanation: "Для жіночого роду однини правильна форма робила була."
      options:
        - text: "робила була"
          correct: true
        - text: "робив був"
          correct: false
        - text: "робили були"
          correct: false
        - text: "робитимуть"
          correct: false
    - question: "Як правильно утворити давноминулий час від дієслова жити для займенника вони?"
      explanation: "Для множини використовується форма жили були."
      options:
        - text: "жили були"
          correct: true
        - text: "жив був"
          correct: false
        - text: "жила була"
          correct: false
        - text: "жило було"
          correct: false
    - question: "Як правильно утворити давноминулий час від дієслова стати для займенника воно?"
      explanation: "Для середнього роду використовується форма стало було."
      options:
        - text: "стало було"
          correct: true
        - text: "став був"
          correct: false
        - text: "стала була"
          correct: false
        - text: "стали були"
          correct: false
    - question: "Чи змінюється допоміжне дієслово за родами в однині у давноминулому часі?"
      explanation: "Так, дієслово бути має форми був, була, було."
      options:
        - text: "Так, змінюється"
          correct: true
        - text: "Ні, не змінюється"
          correct: false
        - text: "Змінюється тільки у множині"
          correct: false
        - text: "Змінюється тільки в чоловічому роді"
          correct: false
    - question: "Чи використовується давноминулий час у сучасному повсякденному мовленні дуже часто?"
      explanation: "Ні, сьогодні ця форма зустрічається доволі рідко і частіше в літературі."
      options:
        - text: "Ні, він використовується рідко"
          correct: true
        - text: "Так, він використовується щодня"
          correct: false
        - text: "Він використовується тільки в новинах"
          correct: false
        - text: "Він використовується тільки дітьми"
          correct: false
    - question: "В якому стилі мовлення найчастіше можна зустріти давноминулий час?"
      explanation: "Його найчастіше можна побачити у художньому та розмовному стилях."
      options:
        - text: "У художньому та розмовному"
          correct: true
        - text: "В офіційно-діловому"
          correct: false
        - text: "У науковому"
          correct: false
        - text: "У публіцистичному"
          correct: false
    - question: "Що може означати давноминулий час, крім дії, яка передує іншій дії?"
      explanation: "Він також може описувати перервану дію, що не дала очікуваного результату."
      options:
        - text: "Перервану дію або скасований результат"
          correct: true
        - text: "Дію, яка триватиме вічно"
          correct: false
        - text: "Дію, яка відбувається прямо зараз"
          correct: false
        - text: "Дію, про яку ніхто не знає"
          correct: false
    - question: "Знайдіть правильну форму давноминулого часу в запропонованому нижче реченні."
      explanation: "Я пішов був до магазину — це правильна форма чоловічого роду."
      options:
        - text: "Я пішов був до магазину"
          correct: true
        - text: "Він ходить до школи"
          correct: false
        - text: "Ми будемо читати книгу"
          correct: false
        - text: "Вони знають правду"
          correct: false
    - question: "У якому реченні неправильно вжито форму допоміжного дієслова для давноминулого часу?"
      explanation: "Ми — це множина, тому має бути читали були, а не читали була."
      options:
        - text: "Ми читали була цю статтю"
          correct: true
        - text: "Я ходив був на роботу"
          correct: false
        - text: "Вона спала була до обіду"
          correct: false
        - text: "Озеро замерзло було взимку"
          correct: false

