- type: reading
  title: "Аналіз виступу"
  instruction: "Прочитайте уривок пітчу та дайте відповіді на запитання."
  text: |
    Доброго дня, колеги. У 2020 році ми думали, що головним ресурсом нашої компанії є програмне забезпечення. Сьогодні я доведу вам, що наш головний ресурс — це довіра користувачів. Останні три роки наша база клієнтів зростала, але минулого кварталу ми зафіксували раптовий відтік через агресивну стратегію конкурентів. Наша стара маркетингова модель більше не працює. Тому сьогодні я представляю вам план переходу на персоналізовану комунікацію, який не лише поверне нам лідерство, але й зміцнить лояльність клієнтів.
  tasks:
    - "Яку структуру сторітелінгу використовує оратор?"
    - "Який гачок використовується на початку виступу для захоплення уваги?"
    - "Яка головна теза цього пітчу?"
    - "Як оратор застосовує антитезу у своєму виступі?"

- type: true-false
  title: "Оцініть твердження"
  instruction: "Визначте, чи є ці твердження щодо мистецтва презентації правильними."
  items:
    - statement: "На поглибленому рівні головна мета презентації — це виключно інформування аудиторії."
      correct: false
      explanation: "На поглибленому рівні мета — впливати на переконання та рішення."
    - statement: "Для інвесторів найважливішими є технічні деталі та архітектура продукту."
      correct: false
      explanation: "Інвесторів більше цікавить бізнес-модель, прибуток та масштабованість."
    - statement: "Дестиляція сенсу означає очищення складної ідеї від професійного жаргону."
      correct: true
      explanation: "Це дозволяє зробити складні поняття зрозумілими для нетехнічної аудиторії."
    - statement: "Український стиль пітчингу традиційно фокусується на агресивному продажі."
      correct: false
      explanation: "Українська школа пітчингу базується на технічній досконалості та чесності."
    - statement: "Структура SCP розшифровується як Ситуація - Ускладнення - Рішення."
      correct: true
      explanation: "Це класична структура для створення переконливих наративів."
    - statement: "Анафора — це повторення однакових слів на початку кількох речень."
      correct: true
      explanation: "Вона створює емоційний ритм та посилює аргументи."
    - statement: "У діловій комунікації рекомендується якомога частіше використовувати пасивний стан."
      correct: false
      explanation: "Пасивний стан звучить штучно, краще використовувати активну суб'єктність."
    - statement: "Етос відповідає за авторитет та репутацію доповідача."
      correct: true
      explanation: "Це фундамент довіри, на якому будується весь виступ."
    - statement: "Техніка антиципації допомагає уникнути складних запитань від аудиторії."
      correct: false
      explanation: "Вона не уникає запитань, а допомагає заздалегідь підготувати на них відповіді."
    - statement: "Бриджинг — це спосіб елегантно перевести незручне запитання на ключове повідомлення."
      correct: true
      explanation: "Це дозволяє повернути контроль над дискусією."

- type: fill-in
  title: "Доповніть речення"
  instruction: "Оберіть правильне слово для кожного контексту."
  items:
    - sentence: "Сьогодні я маю на меті презентувати наші нові фінансові результати та _______ на ваше рішення щодо бюджету."
      answer: "впливати"
      options: ["впливати", "відповідати", "ігнорувати", "аналізувати"]
    - sentence: "Щоб досягти успіху, ми повинні чітко знати, яка наша цільова _______."
      answer: "аудиторія"
      options: ["аудиторія", "візуалізація", "статистика", "антиципація"]
    - sentence: "Складний технічний _______ краще пояснювати за допомогою простих життєвих аналогій."
      answer: "термін"
      options: ["термін", "запит", "пафос", "логос"]
    - sentence: "Глибоке _______ ринку показало, що наш продукт має унікальні конкурентні переваги."
      answer: "дослідження"
      options: ["дослідження", "виступ", "інтерактив", "переконання"]
    - sentence: "Важливо мати заздалегідь підготовлений _______ на будь-яку критику з боку інвесторів."
      answer: "контраргумент"
      options: ["контраргумент", "бриджинг", "синтез", "оратор"]
    - sentence: "Цей графік — це чудова _______ даних, яка робить цифри зрозумілими."
      answer: "візуалізація"
      options: ["візуалізація", "дестиляція", "суб'єктність", "реакція"]
    - sentence: "Щоб утримати увагу онлайн, варто кожні десять хвилин додавати короткий _______."
      answer: "інтерактив"
      options: ["інтерактив", "монолог", "пасив", "термін"]
    - sentence: "Він виголосив такий блискучий _______, що всі присутні підтримали його ідею."
      answer: "виступ"
      options: ["виступ", "процес", "метод", "інвестор"]
    - sentence: "Логіка ваших доказів — це _______ вашої професійної презентації."
      answer: "логос"
      options: ["логос", "етос", "пафос", "антиципація"]
    - sentence: "Я відповім на кожне ваше _______ під час спеціальної сесії наприкінці доповіді."
      answer: "питання"
      options: ["питання", "рішення", "поняття", "завдання"]

- type: unjumble
  title: "Побудуйте речення"
  instruction: "Відновіть правильний порядок слів у реченнях."
  items:
    - words: ["Щоб", "переконувати", "аудиторію", "необхідно", "вибудовувати", "міцний", "логос", "на", "фундаменті", "бездоганного", "етосу"]
      answer: "Щоб переконувати аудиторію необхідно вибудовувати міцний логос на фундаменті бездоганного етосу"
    - words: ["Кожен", "складний", "технічний", "термін", "має", "супроводжуватися", "зрозумілою", "ілюстрацією", "для", "слухачів"]
      answer: "Кожен складний технічний термін має супроводжуватися зрозумілою ілюстрацією для слухачів"
    - words: ["Якісна", "візуалізація", "даних", "є", "потужним", "інструментом", "впливу", "на", "прийняття", "стратегічних", "рішень"]
      answer: "Якісна візуалізація даних є потужним інструментом впливу на прийняття стратегічних рішень"
    - words: ["Техніка", "антиципації", "допомагає", "заздалегідь", "підготувати", "відповіді", "на", "найбільш", "каверзні", "питання"]
      answer: "Техніка антиципації допомагає заздалегідь підготувати відповіді на найбільш каверзні питання"
    - words: ["Ця", "презентація", "показує", "чому", "наша", "стратегія", "є", "єдиним", "правильним", "рішенням"]
      answer: "Ця презентація показує чому наша стратегія є єдиним правильним рішенням"
    - words: ["Наші", "інвестори", "завжди", "оцінюють", "реальні", "бізнес-показники", "а", "не", "лише", "елегантний", "код"]
      answer: "Наші інвестори завжди оцінюють реальні бізнес-показники а не лише елегантний код"
    - words: ["Використання", "анафори", "допомагає", "структурувати", "складні", "ідеї", "роблячи", "їх", "легкими", "для", "сприйняття"]
      answer: "Використання анафори допомагає структурувати складні ідеї роблячи їх легкими для сприйняття"
    - words: ["Активний", "стан", "демонструє", "впевненість", "лідера", "та", "його", "готовність", "брати", "відповідальність"]
      answer: "Активний стан демонструє впевненість лідера та його готовність брати відповідальність"

- type: error-correction
  title: "Лінгвістична гігієна"
  instruction: "Виправте поширені помилки у діловому мовленні (русизми та канцелярити)."
  items:
    - sentence: "Давайте перейдемо на слідуючий слайд нашої презентації."
      error: "слідуючий"
      answer: "наступний"
      error_type: "word"
      options: ["наступний", "слідувальний", "дальший", "задній"]
      explanation: "Слово слідуючий — це русизм, українською правильно говорити наступний."
    - sentence: "У цьому дослідженні будуть приймати участь три аналітики."
      error: "приймати участь"
      answer: "брати участь"
      error_type: "phrase"
      options: ["брати участь", "робити участь", "мати участь", "вести участь"]
      explanation: "Українською мовою правильно говорити брати участь."
    - sentence: "Це самий кращий метод візуалізації складних даних."
      error: "самий кращий"
      answer: "найкращий"
      error_type: "phrase"
      options: ["найкращий", "самий хороший", "більш кращий", "найбільш кращий"]
      explanation: "Конструкція з самий є калькою, українською вживається префікс най-."
    - sentence: "Як ви відноситеся до цієї нової стратегії?"
      error: "відноситеся"
      answer: "ставитеся"
      error_type: "word"
      options: ["ставитеся", "належите", "відношаєтеся", "сприймаєтеся"]
      explanation: "До людей, ідей чи явищ ми ставимося, а не відносимося."
    - sentence: "Ми получаємо відмінні результати після впровадження цього рішення."
      error: "получаємо"
      answer: "отримуємо"
      error_type: "word"
      options: ["отримуємо", "добуваємо", "здобуваємо", "маємо"]
      explanation: "Слово получаємо є суржиком, літературна норма — отримуємо."
    - sentence: "Нами було розроблено новий алгоритм для цього продукту."
      error: "Нами було розроблено"
      answer: "Ми розробили"
      error_type: "phrase"
      options: ["Ми розробили", "Нами розроблено", "Ми були розробили", "Нами розроблялося"]
      explanation: "Уникайте пасивного стану. Активна конструкція звучить природніше і сильніше."
    - sentence: "Проєкт зараз активно розробляється нашою командою."
      error: "розробляється нашою командою"
      answer: "розробляє наша команда"
      error_type: "phrase"
      options: ["розробляє наша команда", "наша команда розробляється", "є розроблений командою", "буде розроблений нашою командою"]
      explanation: "Краще сказати: Наша команда активно розробляє проєкт."
    - sentence: "Ми плануємо залончити цей продукт наступного місяця."
      error: "залончити"
      answer: "запустити"
      error_type: "word"
      options: ["запустити", "відкрити", "ввімкнути", "розпочати"]
      explanation: "Уникайте зайвих англіцизмів, використовуйте українське слово запустити."

- type: quiz
  title: "Перевірте знання: Риторика та презентації"
  instruction: "Оберіть одну правильну відповідь на кожне запитання."
  items:
    - question: "Який елемент античної риторики відповідає за авторитет і репутацію доповідача?"
      explanation: "Етос формує довіру до оратора з перших хвилин виступу."
      options:
        - text: "Етос"
          correct: true
        - text: "Логос"
          correct: false
        - text: "Пафос"
          correct: false
        - text: "Антиципація"
          correct: false
    - question: "Що є головною метою виступу на поглибленому професійному рівні?"
      explanation: "На цьому рівні важливо не просто передати факти, а вплинути на слухачів."
      options:
        - text: "Впливати на переконання та подальші дії аудиторії"
          correct: true
        - text: "Передати якомога більше статистичних даних"
          correct: false
        - text: "Показати красивий дизайн слайдів"
          correct: false
        - text: "Прочитати написаний текст без помилок"
          correct: false
    - question: "Яка інформація найбільше цікавить інвесторів під час вашої презентації?"
      explanation: "Інвестори зосереджені на бізнес-моделі та поверненні своїх інвестицій."
      options:
        - text: "Масштабованість, ризики та очікуваний прибуток"
          correct: true
        - text: "Елегантність коду та складність алгоритмів"
          correct: false
        - text: "Кількість рядків коду у новому продукті"
          correct: false
        - text: "Детальний опис технічних інструментів"
          correct: false
    - question: "Що означає термін «дестиляція сенсу» в контексті підготовки до виступу?"
      explanation: "Це пояснення складних понять через зрозумілі метафори для широкої аудиторії."
      options:
        - text: "Очищення ідеї від жаргону та пояснення через аналогії"
          correct: true
        - text: "Видалення всіх графіків і таблиць зі слайдів"
          correct: false
        - text: "Спрощення матеріалу до примітивного рівня"
          correct: false
        - text: "Використання виключно англомовних термінів"
          correct: false
    - question: "Яку функцію виконує структура SCP у професійному виступі?"
      explanation: "SCP створює захопливий наратив і пояснює логіку вашого рішення."
      options:
        - text: "Вона перетворює сухий звіт на переконливу історію"
          correct: true
        - text: "Вона допомагає швидше перемикати слайди"
          correct: false
        - text: "Вона замінює сесію питань та відповідей"
          correct: false
        - text: "Вона робить презентацію більш формальною"
          correct: false
    - question: "Яку стилістичну фігуру ви використовуєте, коли повторюєте слова на початку речень?"
      explanation: "Анафора створює емоційний ритм у доповіді."
      options:
        - text: "Анафора"
          correct: true
        - text: "Антитеза"
          correct: false
        - text: "Бриджинг"
          correct: false
        - text: "Метафора"
          correct: false
    - question: "Що таке «бриджинг» під час сесії запитань та відповідей?"
      explanation: "Бриджинг дозволяє елегантно повернути дискусію до ваших головних тез."
      options:
        - text: "Мовна формула для переходу від запитання до ключового повідомлення"
          correct: true
        - text: "Спосіб уникнути відповіді на складне запитання"
          correct: false
        - text: "Технічний термін для налаштування мікрофона"
          correct: false
        - text: "Агресивний контраргумент проти критики"
          correct: false
    - question: "Як слід реагувати на агресивні чи провокаційні запитання аудиторії?"
      explanation: "Пауза і спокійна відповідь допомагають знизити емоційну напругу."
      options:
        - text: "Зробити паузу і відповісти підкреслено спокійно"
          correct: true
        - text: "Відповісти агресією на агресію"
          correct: false
        - text: "Відмовитися відповідати на запитання"
          correct: false
        - text: "Швидко перейти до наступного слайда"
          correct: false
    - question: "Чому пасивний стан вважається небажаним у сучасній українській діловій комунікації?"
      explanation: "Пасивний стан розмиває відповідальність."
      options:
        - text: "Він розмиває відповідальність і звучить штучно"
          correct: true
        - text: "Він занадто емоційний і неформальний"
          correct: false
        - text: "Він робить мовлення занадто швидким"
          correct: false
        - text: "Він є ознакою низького рівня володіння мовою"
          correct: false
    - question: "Що варто зробити, якщо ви не знаєте відповіді на професійне запитання із залу?"
      explanation: "Чесність зберігає довіру, а обіцянка надати інформацію показує відповідальність."
      options:
        - text: "Чесно визнати це і пообіцяти надати інформацію пізніше"
          correct: true
        - text: "Спробувати швидко вигадати правдоподібну відповідь"
          correct: false
        - text: "Змінити тему розмови і проігнорувати запитання"
          correct: false
        - text: "Сказати, що це запитання є недоречним і дурним"
          correct: false

- type: select
  title: "Множинний вибір: Техніки впливу"
  instruction: "Оберіть усі правильні варіанти для кожного запитання."
  items:
    - question: "Які риторичні інструменти допомагають оратору ефективно утримувати увагу своєї аудиторії?"
      min_correct: 3
      explanation: "Ці інструменти допомагають створити діалог та контрасти у мовленні."
      options:
        - text: "Риторичні запитання"
          correct: true
        - text: "Використання антитези"
          correct: true
        - text: "Анафора для емоційного ритму"
          correct: true
        - text: "Читання тексту зі слайдів"
          correct: false
        - text: "Використання складного жаргону"
          correct: false
    - question: "Що входить до базових складових переконливої структури SCP для презентацій?"
      min_correct: 3
