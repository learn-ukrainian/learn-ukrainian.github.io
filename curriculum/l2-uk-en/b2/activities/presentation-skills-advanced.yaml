      answer: "аудиторія"
      options: ["аудиторія", "статистика", "візуалізація", "презентація"]
    - id: 4
      answer: "етос"
      options: ["етос", "логос", "пафос", "синтез"]
    - id: 5
      answer: "логос"
      options: ["логос", "етос", "пафос", "аналіз"]
    - id: 6
      answer: "дестиляцію"
      options: ["дестиляцію", "маніпуляцію", "копіювання", "статистику"]
    - id: 7
      answer: "пасивний"
      options: ["пасивний", "активний", "агресивний", "прямий"]
    - id: 8
      answer: "суб'єктність"
      options: ["суб'єктність", "об'єктивність", "відповідальність", "слабкість"]
    - id: 9
      answer: "візуалізація"
