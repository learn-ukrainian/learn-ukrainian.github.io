- type: essay-response
  title: "Аналіз агресивної сесії Q&A"
  instruction: "Прочитайте ситуацію та напишіть розгорнуту відповідь (мінімум 150 слів)."
  prompt: "Уявіть, що ви Засновник стартапу і презентуєте свою інноваційну архітектуру бази даних перед групою консервативних інвесторів. Після вашого виступу один з інвесторів різко заявляє: Ваша система надто складна, вона потребуватиме багато часу на інтеграцію і паралізує роботу нашого бізнесу на місяці. Напишіть вашу відповідь цьому інвестору, використовуючи техніку 'Так, але...', стратегію зниження емоційного градуса та мовні формули бриджингу. Поясніть, як ви будете зберігати свій етос."
  min_words: 150
  model_answer: |
    Дякую за ваше запитання. Це абсолютно слушне зауваження, і я розумію ваше занепокоєння. Так, ви маєте рацію в тому, що будь-яка системна інтеграція вимагає часу і тимчасово впливає на звичні процеси в компанії. Ми не приховуємо, що перехідний період займе близько двох місяців.

    Але суть полягає в тому, що залишатися на старій архітектурі — це набагато більший ризик для вашого бізнесу. Наші дослідження показують, що поточна система вже зараз працює на межі своїх можливостей, і при зростанні навантаження ще на двадцять відсотків вона почне давати критичні збої. Короткострокові незручності інтеграції є виправданою інвестицією у довгострокову стабільність і безпеку. 
    
    Це чудове запитання, яке підводить нас до ключового аспекту нашої стратегії впровадження. Ми розробили модульний підхід, який дозволяє інтегрувати нашу систему поступово, без повної зупинки ваших поточних процесів. Якщо ви поглянете на план міграції, ви побачите, що ми мінімізували всі операційні ризики. Ми готові взяти на себе відповідальність за безперебійну роботу під час цього переходу.
  rubric:
    - criteria: "Використання техніки: Так, але..."
      description: "Студент успішно погоджується з частиною аргументу інвестора, а потім вводить сильний контраргумент."
      points: 30
    - criteria: "Застосування бриджингу"
      description: "Присутні мовні формули переходу від критики до ключового повідомлення."
      points: 30
    - criteria: "Збереження етосу та тону"
      description: "Відповідь написана спокійно, без агресії, демонструє повагу до інвестора та впевненість у своєму продукті."
      points: 20
    - criteria: "Обсяг та мовна правильність"
      description: "Текст містить не менше 150 слів, використана правильна українська термінологія без кальок."
      points: 20