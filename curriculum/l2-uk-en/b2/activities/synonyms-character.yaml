- type: reading
  title: 'Контекстне використання: Опис персонажів'
  instruction: 'Як кастинг-директор, прочитайте опис кандидата на роль і дайте відповіді на запитання.'
  text: 'Шукаємо актора на роль головного аналітика розвідки. Його інтелект не є емоційним, він суто логічний. Герой надзвичайно розумний, має феноменальну пам''ять на цифри, але абсолютно позбавлений емпатії. Він не чуйний до колег, його дратує будь-який прояв слабкості. Його вдача — холодна, раціональна та безкомпромісна. У критичних ситуаціях він проявляє себе як кмітливий тактик, що вміє використовувати найменші помилки ворога.'
  tasks:
    - 'Яка основна риса характеру аналітика розвідки?'
    - 'Чому аналітика можна назвати кмітливим тактиком?'
    - 'Яке ставлення героя до своїх колег по роботі?'
    - 'Якими словами можна описати вдачу цього персонажа?'

- type: fill-in
  title: 'Практичне застосування: Підбір акторів'
  instruction: 'Доповніть речення правильними характеристиками для психологічного портрета.'
  items:
    - sentence: 'Цей кандидат дуже ___, він швидко знаходить вихід із складних ситуацій.'
      answer: 'кмітливий'
      options: ['кмітливий', 'добрий', 'мудрий', 'старий']
      explanation: 'Винахідливість і швидкість реакції — це ознаки кмітливості.'
    - sentence: 'Для ролі сільського лікаря нам потрібна людина, яка має ___ серце.'
      answer: 'чуйне'
      options: ['чуйне', 'розумне', 'холодне', 'тверде']
      explanation: 'Здатність до емпатії передається словом чуйний.'
    - sentence: 'Режисер шукає актора, який зможе зіграти героя з дуже важкою ___.'
      answer: 'вдачею'
      options: ['вдачею', 'удачею', 'натурою', 'головою']
      explanation: 'Вдача — це внутрішній характер людини.'
    - sentence: 'Дідусь у цій сцені має дати своєму онукові дуже ___ пораду.'
      answer: 'мудру'
      options: ['мудру', 'кмітливу', 'тямущу', 'молоду']
      explanation: 'Порада, що базується на життєвому досвіді, є мудрою.'
    - sentence: 'Вона настільки ___, що завжди готова віддати останнє тим, хто потребує допомоги.'
      answer: 'щедра'
      options: ['щедра', 'розумна', 'лагідна', 'сувора']
      explanation: 'Готовність віддавати і ділитися — це ознака щедрості.'
    - sentence: 'Її ___ голос одразу заспокоював усіх пацієнтів у палаті.'
      answer: 'лагідний'
      options: ['лагідний', 'чуйний', 'милосердний', 'розумний']
      explanation: 'Фізична м''якість і заспокійливість описується словом лагідний.'
    - sentence: 'Цей стажер виявився дуже ___, він зрозумів нове завдання з першого разу.'
      answer: 'тямущим'
      options: ['тямущим', 'мудрим', 'щедрим', 'лагідним']
      explanation: 'Людина, яка швидко вникає в суть, називається тямущою.'
    - sentence: 'Генерал прийняв справді ___ рішення, яке врятувало життя багатьом солдатам.'
      answer: 'милосердне'
      options: ['милосердне', 'лагідне', 'тямуще', 'веселе']
      explanation: 'Високий етичний вимір допомоги і співчуття — це милосердя.'
    - sentence: 'Проти своєї ___ не підеш, він завжди уникав гучних вечірок.'
      answer: 'натури'
      options: ['натури', 'удачі', 'думки', 'справи']
      explanation: 'Натура вказує на біологічний, інстинктивний аспект особистості.'
    - sentence: 'Бажаю тобі ___ на завтрашніх пробах, ти обов''язково отримаєш цю роль!'
      answer: 'удачі'
      options: ['удачі', 'вдачі', 'радості', 'мудрості']
      explanation: 'Сприятливий збіг обставин — це удача.'

- type: true-false
  title: 'Розуміння значень: Аналіз рис характеру'
  instruction: 'Визначте, чи є наведені твердження правильними.'
  items:
    - statement: 'Слово вдача позначає сприятливий збіг обставин або везіння.'
      correct: false
      explanation: 'Вдача — це характер, а везіння — це удача.'
    - statement: 'Словосполучення носити характер є калькою з російської мови.'
      correct: true
      explanation: 'В українській мові правильно казати мати характер.'
    - statement: 'Мудра людина завжди має великий життєвий досвід.'
      correct: true
      explanation: 'Мудрість нерозривно пов''язана з досвідом і виваженістю.'
    - statement: 'Слово тямущий доречно використовувати в офіційних документах та характеристиках.'
      correct: false
      explanation: 'Тямущий — це слово розмовного регістру.'
    - statement: 'Людина з лагідною вдачею зазвичай поводиться агресивно і різко.'
      correct: false
      explanation: 'Лагідна людина поводиться м''яко, спокійно і неагресивно.'
    - statement: 'Чуйність передбачає здатність розуміти емоції та потреби інших людей.'
      correct: true
      explanation: 'Чуйний означає емпатійний, той, хто резонує з чужим болем.'
    - statement: 'Кмітливий розум обов''язково вимагає вищої академічної освіти.'
      correct: false
      explanation: 'Кмітливість — це практичний розум і швидкість реакції, а не формальна освіта.'
    - statement: 'Слово милосердний часто використовується в повсякденних побутових ситуаціях.'
      correct: false
      explanation: 'Милосердний — це книжне слово високого етичного рівня.'
    - statement: 'Щедрість може виявлятися не лише в матеріальних речах, а й у похвалі чи прощенні.'
      correct: true
      explanation: 'Щедрість буває як матеріальною, так і духовною.'
    - statement: 'Правильно казати Ця подія має тимчасовий характер, а не носить тимчасовий характер.'
      correct: true
      explanation: 'Українською мовою ознаки чи характер можна лише мати.'

