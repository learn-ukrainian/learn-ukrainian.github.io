- type: unjumble
  title: 'Складіть речення: Опис персонажів'
  instruction: 'Відновіть правильний порядок слів у реченнях.'
  items:
    - words: ['У', 'нього', 'дуже', 'важка', 'вдача', 'тому', 'колегам', 'важко', 'працювати']
      answer: 'У нього дуже важка вдача тому колегам важко працювати'
    - words: ['Ця', 'жінка', 'має', 'надзвичайно', 'добре', 'серце', 'та', 'завжди', 'допомагає']
      answer: 'Ця жінка має надзвичайно добре серце та завжди допомагає'
    - words: ['Кмітливий', 'хлопець', 'швидко', 'зрозумів', 'як', 'вирішити', 'цю', 'нестандартну', 'проблему']
      answer: 'Кмітливий хлопець швидко зрозумів як вирішити цю нестандартну проблему'
    - words: ['Я', 'бажаю', 'вам', 'великої', 'удачі', 'на', 'завтрашніх', 'кастингах', 'та', 'пробах']
      answer: 'Я бажаю вам великої удачі на завтрашніх кастингах та пробах'
    - words: ['Його', 'мистецька', 'натура', 'вимагала', 'постійних', 'подорожей', 'та', 'абсолютно', 'нових', 'вражень']
      answer: 'Його мистецька натура вимагала постійних подорожей та абсолютно нових вражень'
    - words: ['Лагідний', 'голос', 'головної', 'героїні', 'одразу', 'заспокоював', 'усіх', 'навколо', 'неї']
      answer: 'Лагідний голос головної героїні одразу заспокоював усіх навколо неї'
    - words: ['Ми', 'шукаємо', 'актора', 'на', 'роль', 'мудрого', 'дідуся', 'з', 'великим', 'досвідом']
      answer: 'Ми шукаємо актора на роль мудрого дідуся з великим досвідом'
    - words: ['Ця', 'системна', 'проблема', 'має', 'тимчасовий', 'характер', 'і', 'швидко', 'вирішиться']
      answer: 'Ця системна проблема має тимчасовий характер і швидко вирішиться'

- type: error-correction
  title: 'Виправте помилку: Чистота мовлення'
  instruction: 'Знайдіть і виправте лексичну або стилістичну помилку в кожному реченні.'
  items:
    - sentence: 'Його хвороба носила системний характер і довго лікувалася.'
      error: 'носила'
      answer: 'мала'
      options: ['мала', 'брала', 'вела', 'робила']
      explanation: 'Росіянізм носити характер завжди замінюється на мати характер.'
    - sentence: 'Вона дуже мудре немовля, бо сама швидко збирає пазли.'
      error: 'мудре'
      answer: 'кмітливе'
      options: ['кмітливе', 'досвідчене', 'старе', 'велике']
      explanation: 'Мудрість передбачає великий життєвий досвід, немовля може бути лише кмітливим.'
    - sentence: 'У нього дуже складна удача, з ним просто неможливо домовитися.'
      error: 'удача'
      answer: 'вдача'
      options: ['вдача', 'успішність', 'радість', 'доля']
      explanation: 'Вдача — це характер людини, а удача — це несподіване везіння.'
    - sentence: 'Він виявився дуже милосердним, коли просто позичив мені ручку.'
      error: 'милосердним'
      answer: 'добрим'
      options: ['добрим', 'святим', 'високим', 'вічним']
      explanation: 'Слово милосердний занадто високе і пафосне для простої побутової ситуації.'
    - sentence: 'Наш новий директор має дуже чуйний підхід до вирішення складних фінансових ризиків.'
      error: 'чуйний'
      answer: 'розумний'
      options: ['розумний', 'емоційний', 'лагідний', 'щедрий']
      explanation: 'Фінансові рішення потребують раціонального і розумного підходу, а не емоційної чуйності.'
    - sentence: 'Яка у вас гарна удача, ви завжди так щиро і привітно посміхаєтесь!'
      error: 'удача'
      answer: 'вдача'
      options: ['вдача', 'радість', 'усмішка', 'слава']
      explanation: 'Посмішка та постійний позитив — це риси внутрішньої вдачі (характеру).'
    - sentence: 'Ці надзвичайно швидкі тимчасові зміни носять абсолютно незворотний характер.'
      error: 'носять'
      answer: 'мають'
      options: ['мають', 'несуть', 'роблять', 'будують']
      explanation: 'В українській мові правильно казати мати характер, а не носити.'
    - sentence: 'Цей зовсім молодий стажер був дуже мудрим хлопчиною, який швидко вчився.'
      error: 'мудрим'
      answer: 'тямущим'
      options: ['тямущим', 'старим', 'досвідченим', 'геніальним']
      explanation: 'Молода людина без життєвого досвіду може бути тямущою, але ще не мудрою.'

