module: 111-holodomor-ii-pamiat
level: B2
activities:
  - type: quiz
    title: "Розуміння тексту"
    instruction: "Відповідайте на питання, спираючись виключно на зміст прочитаного тексту."
    items:
      - question: "Згідно зі вступом, що є головним символом акції «Запали свічку пам'яті»?"
        options:
          - text: "Економія ресурсів"
            correct: false
          - text: "Вогник пам'яті про кожного загиблого"
            correct: true
          - text: "Політична демонстрація"
            correct: false
          - text: "Релігійний обряд"
            correct: false
        explanation: "«Вона є символом того, що українці пам'ятають кожного з мільйонів загиблих»."
      - question: "Який евфемізм використовувала радянська преса для приховування голоду?"
        options:
          - text: "«Геноцид»"
            correct: false
          - text: "«Тимчасові продовольчими труднощами»"
            correct: true
          - text: "«Велика трагедія»"
            correct: false
          - text: "«Продовольча реформа»"
            correct: false
        explanation: "У тексті зазначено: «називаючи це «тимчасовими продовольчими труднощами»»."
      - question: "Яку метафору використовує автор для опису повернення правди?"
        options:
          - text: "Світло в кінці тунелю"
            correct: false
          - text: "Правда проростає крізь бетон забуття"
            correct: true
          - text: "Правда — це гостра сокира"
            correct: false
          - text: "Вода камінь точить"
            correct: false
        explanation: "«Правда, навіть через багато років, проростає крізь бетон забуття»."
      - question: "Як у тексті описується роль Волтера Дюранті?"
        options:
          - text: "Як героя журналістики"
            correct: false
          - text: "Як символ журналістської ганьби та продажності"
            correct: true
          - text: "Як об'єктивного спостерігача"
            correct: false
          - text: "Як жертву обставин"
            correct: false
        explanation: "«Дюранті ж залишився в історії як символ журналістської ганьби і продажності»."
      - question: "Що автор називає «найстрашнішою зброєю» після самого голоду?"
        options:
          - text: "Армію"
            correct: false
          - text: "Цинічну брехню"
            correct: true
          - text: "Економічні санкції"
            correct: false
          - text: "Зброю масового знищення"
            correct: false
        explanation: "«Найстрашнішою зброєю після голоду стала цинічна брехня»."
      - question: "Яку концепцію сформулював історик Джеймс Мейс?"
        options:
          - text: "«Постгеноцидне суспільство»"
            correct: true
          - text: "«Інтегральний націоналізм»"
            correct: false
          - text: "«Соціалістичний реалізм»"
            correct: false
          - text: "«Глобальне село»"
            correct: false
        explanation: "«Саме Мейс... сформулював концепцію «постгеноцидного суспільства»»."
      - question: "У чому, згідно з текстом, проявляється «трансгенераційна травма» сьогодні?"
        options:
          - text: "У любові до подорожей"
            correct: false
          - text: "У звичці запасати їжу «на чорний день»"
            correct: true
          - text: "У високій довірі до державних інституцій"
            correct: false
          - text: "У відмові від вивчення історії"
            correct: false
        explanation: "Текст наводить приклад: «Звичка запасати їжу «на чорний день»»."
      - question: "Яке значення має гасло «Ніколи знову» для сучасних українців за текстом?"
        options:
          - text: "Відмова від будь-якої боротьби"
            correct: false
          - text: "Готовність зі зброєю захищати землю і хліб"
            correct: true
          - text: "Очікування на допомогу ООН"
            correct: false
          - text: "Надія на зміну влади в Росії"
            correct: false
        explanation: "«Гасло «Ніколи знову» для нас означає... готовність зі зброєю в руках захищати свою землю»."

  - type: fill-in
    title: "Лексика пам'яті та заперечення"
    instruction: "Вставте правильне слово, враховуючи контекст деколонізації."
    items:
      - sentence: "Радянська влада десятиліттями [___] факт Голодомору, створюючи альтернативну реальність."
        answer: "заперечувала"
        options: ["визнавала", "заперечувала", "оспівувала", "аналізувала"]
      - sentence: "Боротьба за [___] Голодомору геноцидом стала об'єднавчим фактором для нації."
        answer: "визнання"
        options: ["забуття", "визнання", "ігнорування", "приховування"]
      - sentence: "«Потьомкінські села» були інструментом для [___] західних політиків."
        answer: "дезінформації"
        options: ["допомоги", "дезінформації", "розваги", "лікування"]
      - sentence: "Лікарів змушували писати [___] діагнози, щоб приховати слово «голод»."
        answer: "фальшиві"
        options: ["справжні", "фальшиві", "наукові", "складні"]
      - sentence: "Збереження пам'яті в умовах терору було формою тихого [___]."
        answer: "опору"
        options: ["погоди", "опору", "зрадництва", "мовчання"]
      - sentence: "Правда про злочин проросла крізь бетон [___]."
        answer: "забуття"
        options: ["історії", "забуття", "будівництва", "архівів"]
      - sentence: "Концепція «постгеноцидного суспільства» пояснює глибину нашої [___]."
        answer: "травми"
        options: ["радості", "травми", "перемоги", "економіки"]
      - sentence: "Деколонізація пам'яті вимагає [___] імперських міфів."
        answer: "демонтажу"
        options: ["збереження", "демонтажу", "поширення", "підтримки"]

  - type: match-up
    title: "Лексичні пласти: Трагедія vs Резистентність"
    instruction: "З'єднайте поняття з його семантичним контекстом у тексті."
    pairs:
      - left: "Упокорення"
        right: "Мета штучного голоду"
      - left: "Тяглість"
        right: "Безперервність геноцидних намірів"
      - left: "Трансгенераційна"
        right: "Тип травми, що передається поколіннями"
      - left: "Замовчування"
        right: "Радянська стратегія щодо злочину"
      - left: "Свідчення"
        right: "Голос очевидця як доказ"
      - left: "Дегуманізація"
        right: "Перетворення людей на «статистику»"
      - left: "Резистентність"
        right: "Здатність нації чинити опір"
      - left: "Переосмислення"
        right: "Зміна погляду на історії"

  - type: true-false
    title: "Аналіз мовних маніпуляцій"
    instruction: "Визначте, чи є твердження щодо змісту тексту та вжитих термінів правдивим."
    items:
      - statement: "Термін «тимчасові продовольчі труднощі» використовувався для приховування геноциду."
        correct: true
        explanation: "Це був офіційний радянський евфемізм."
      - statement: "Волтер Дюранті писав, що росіяни «голодують і вмирають»."
        correct: false
        explanation: "Він маніпулятивно писав «Starving, But Not Dying» (голодують, але не вмирають)."
      - statement: "Лікарям дозволяли вказувати «голод» як причину смерті лише в приватних документах."
        correct: false
        explanation: "Текст каже, що лікарів змушували писати діагнози на кшталт «серцева недостатність»."
      - statement: "Слово «шкідницький» було використано Сталіним щодо результатів перепису 1937 року."
        correct: true
        explanation: "Він оголосив результати шкідницькими, бо вони показали втрати населення."
      - statement: "Концепція «постгеноцидного суспільства» стосується лише економічних втрат."
        correct: false
        explanation: "Вона стосується глибокої психологічної та соціальної травми народу."
      - statement: "Дієслово «проростати» використовується автором як метафора сили правди."
        correct: true
        explanation: "«Правда... проростає крізь бетон забуття»."
      - statement: "За текстом, сучасна Росія реставрує пам'ятники жертвам Голодомору."
        correct: false
        explanation: "Навпаки, Росія знищує ці пам'ятники на окупованих територіях."
      - statement: "Трансгенераційна травма проявляється через недовіру до влади."
        correct: true
        explanation: "Це один із прикладів, наведених у розділі про травму."

  - type: cloze
    title: "Мова спротиву"
    instruction: "Заповніть пропуски словами, що описують дії героїв модуля."
    passage: |
      Гарет Джонс був журналістом, який {наважився|побоявся|мріяв} розповісти правду. Він {порушив|виконав|проігнорував} офіційну заборону і таємно {проник|приїхав|полетів} до українських сіл. Його репортажі стали {сенсацією|помилкою|жартом}, яка {викрила|заховала|підтримала} радянську брехню.
      
      Олександра Радченко {фіксувала|забувала|приховувала} події у своєму щоденнику, хоча {знала|не знала|сподівалася} про величезний {ризик|нагороду|успіх}. Її записи стали неоціненним {доказом|артефактом|подарунком} злочину. Вона не могла {мовчати|говорити|співати}, коли бачила «безпросвітну біду». Вона {ховала|показувала|продавала} щоденник на горищі, щоб його не {знищили|опублікували|знайшли} агенти НКВС.
      
      Джеймс Мейс {сформулював|заперечив|вигадав} наукове обґрунтування геноциду. Він довів, що Голодомор мав на меті не лише вбити людей, а й {зламати|підтримати|виховати} дух нації. Він {називав|вважав|забував} Україну «постгеноцидним суспільством». Сьогодні ми {трансформуємо|зберігаємо|втрачаємо} цю травму в силу нашого спротиву, який {допомагає|заважає|змушує} нам боротися.

  - type: select
    title: "Лінгвістичний аналіз джерел"
    instruction: "Проаналізуйте мовні засоби в цитатах Олександри Радченко."
    items:
      - question: "Який ефект створює вживання теперішнього часу («співають», «веселяться», «пишуть») у контексті описів смерті?"
        options:
          - text: "Створює відчуття свята"
            correct: false
          - text: "Підкреслює жахливий контраст між брехнею та реальністю"
            correct: true
          - text: "Показує динамічний розвиток країни"
            correct: false
          - text: "Це просто граматична помилка"
            correct: false
      - question: "У фразі «Ми тут як у пастці», який художній засіб використано?"
        options:
          - text: "Гіперболу"
            correct: false
          - text: "Порівняння"
            correct: true
          - text: "Епітет"
            correct: false
          - text: "Оксиморон"
            correct: false
      - question: "Слова «важка», «безпросвітна», «тихий» за текстом створюють атмосферу:"
        options:
          - text: "Спокою"
            correct: false
          - text: "Глибокого розпачу та смерті"
            correct: true
          - text: "Очікування змін"
            correct: false
          - text: "Урочистості"
            correct: false
      - question: "Чому авторка вживає зменшувально-пестливу форму «Андрійко» щодо померлого учня?"
        options:
          - text: "Це офіційний стиль"
            correct: false
          - text: "Щоб підкреслити особисту трагедію та крихкість життя дитини"
            correct: true
          - text: "Через брак інших слів"
            correct: false
          - text: "Так вимагали правила правопису"
            correct: false
      - question: "Що символізує «мовчання Бога» у цитаті за мотивами Василя Барки?"
        options:
          - text: "Відсутність віри"
            correct: false
          - text: "Абсолютну покинутість і масштаб катастрофи"
            correct: true
          - text: "Тишу в бібліотеці"
            correct: false
          - text: "Свято неділі"
            correct: false
      - question: "Яке значення має слово «лицемірство» у контексті газетних репортажів 1933 року?"
        options:
          - text: "Спроба допомогти"
            correct: false
          - text: "Свідома і цинічна невідповідність слів реальності"
            correct: true
          - text: "Веселий настрій"
            correct: false
          - text: "Друкарська помилка"
            correct: false

  - type: group-sort
    title: "Класифікація лексики за регістром"
    instruction: "Розподіліть слова та словосполучення за їхнім стилістичним використанням у модулі."
    groups:
      - name: "Академічний / Історичний аналіз"
        items:
          - "Трансгенераційна травма"
          - "Постгеноцидне суспільство"
          - "Деколонізація пам'яті"
          - "Механізм упокорення"
          - "Демографічні втрати"
          - "Первинні джерела"
          - "Імперський міф"
          - "Тяглість злочину"
      - name: "Радянська пропаганда (Евфемізми)"
        items:
          - "Тимчасові продовольчі труднощі"
          - "Успіхи колективізації"
          - "Шкідницький перепис"
          - "Потьомкінські села"
          - "Саботаж куркулів"
          - "Буржуазна преса"
          - "Перевиконання планів"
          - "Зразковий колгосп"
      - name: "Емоційне свідчення (Регістр щоденника)"
        items:
          - "Безпросвітна біда"
          - "Пухнути від голоду"
          - "Бетон забуття"
          - "Пастка"
          - "Вогник пам'яті"
          - "Крик душі"
          - "Свічка у вікні"
          - "Забуті Богом"

  - type: quiz
    title: "Граматика: Пасивний стан в історичному контексті"
    instruction: "Оберіть речення, де вжито пасивний стан для підкреслення об'єкта дії."
    items:
      - question: "У якому реченні фокус зміщено на результат дії через пасивну форму?"
        options:
          - text: "НКВС засекретив усі архіви."
            correct: false
          - text: "Усі архіви були засекречені радянською владою."
            correct: true
          - text: "Архіви зберігають правду."
            correct: false
          - text: "Ми відкрили архіви."
            correct: false
        explanation: "«Були засекречені» — пасивний стан."
      - question: "Оберіть речення з пасивною конструкцією."
        options:
          - text: "Гарет Джонс опублікував звіт."
            correct: false
          - text: "Звіт був опублікований у Берліні."
            correct: true
          - text: "Світ прочитав звіт."
            correct: false
          - text: "Звіт містить факти."
            correct: false
      - question: "Оберіть речення, що відповідає безособовій формі на -но, -то."
        options:
          - text: "Правду було відновлено."
            correct: true
          - text: "Правда відновилася."
            correct: false
          - text: "Ми відновили правду."
            correct: false
          - text: "Правда перемогла."
            correct: false
        explanation: "«Було відновлено» — типова українська безособова конструкція пасивного значення."
      - question: "Оберіть речення з пасивним станом."
        options:
          - text: "Сталін підписав наказ."
            correct: false
          - text: "Наказ був підписаний у Москві."
            correct: true
          - text: "Наказ приніс смерть."
            correct: false
          - text: "Люди виконували наказ."
            correct: false
      - question: "Яка конструкція є пасивною?"
        options:
          - text: "Меморіал збудували у 2008 році."
            correct: false
          - text: "Меморіал був збудований у 2008 році."
            correct: true
          - text: "Меморіал стоїть на горі."
            correct: false
          - text: "Люди відвідують меморіал."
            correct: false
      - question: "Оберіть речення з пасивною формою дієслова."
        options:
          - text: "Долю нації вирішували в Кремлі."
            correct: false
          - text: "Доля нації була вирішена силою."
            correct: true
          - text: "Нація вирішила боротися."
            correct: false
          - text: "Це рішення змінило все."
            correct: false
      - question: "Оберіть правильну пасивну форму."
        options:
          - text: "Щоденник знайшли під час обшуку."
            correct: false
          - text: "Щоденник був знайдений агентами НКВС."
            correct: true
          - text: "Щоденник лежав на горищі."
            correct: false
          - text: "Вона ховала щоденник."
            correct: false
      - question: "Яке речення вжито в пасивному стані?"
        options:
          - text: "Перепис населення сфальсифікували."
            correct: false
          - text: "Перепис був сфальсифікований режимом."
            correct: true
          - text: "Перепис показав правду."
            correct: false
          - text: "Влада провела новий перепис."
            correct: false

  - type: error-correction
    title: "Культура мовлення та граматика"
    instruction: "Виправте помилки, що заважають точному передаванню історичного змісту."
    items:
      - sentence: "Радянська пропаганда працювала на протязі всього періоду голоду."
        error: "на протязі"
        answer: "протягом"
        options: ["на протязі", "протягом", "удовж", "під час"]
        explanation: "«На протязі» означає струмінь повітря. Для позначення часу вживаємо «протягом»."
      - sentence: "Волтер Дюранті приймав участь у створенні радянської брехні."
