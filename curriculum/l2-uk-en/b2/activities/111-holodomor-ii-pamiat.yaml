        options: ["Найбільш страшнішою", "Найстрашнішою", "Більш страшнішою", "Самою страшною"]
        explanation: "Не можна змішувати дві форми ступенів порівняння. Правильно: «найстрашнішою» або «найбільш страшною»."
      - sentence: "Пам'ять про Голодомор робить нас нацією, що вижив."
