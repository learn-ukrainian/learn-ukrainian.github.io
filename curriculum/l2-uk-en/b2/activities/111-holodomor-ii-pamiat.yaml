        answer: "брав участь"
        options: ["приймав участь", "брав участь", "мав участь", "робив участь"]
        explanation: "В українській мові правильно казати «брати участь»."
      - sentence: "Світ заспокоївся і продовжил торгувати з Сталіним."
        error: "з Сталіним"
        answer: "зі Сталіним"
        options: ["з Сталіним", "зі Сталіним", "із Сталіним", "у Сталіна"]
        explanation: "Збіг приголосних вимагає вживання 'зі' для милозвучності."
      - sentence: "Документи про смертність було засекречена владою."
