  - type: critical-analysis
    title: "Аналіз лінгвістичної стратегії спротиву"
    items:
      - question: "Порівняйте вживання пасивного стану в описах дій влади (напр., 'було засекречено') та активного стану в описах дій Гарета Джонса (напр., 'наважився', 'проник'). Який ефект це створює?"
      - question: "Знайдіть у розділі «Травма і Подолання» приклади слів, що позначають трансформацію від стану жертви до стану суб'єкта дії."
      - question: "Проаналізуйте вживання лапок у тексті. Чому слова «успіхи», «шкідницький», «зразковий» вживаються в лапках?"
      - question: "Випишіть 3-4 речення з тексту, що містять метафори, пов'язані з рослинним світом (напр., 'проростати'). Чому автор обрав саме таку символіку?"
    model_answer: "Пасивний стан підкреслює механічність та безособовість репресивної машини. Активний стан Джонса виділяє індивідуальну волю. Лапки позначають іронію та невідповідність радянських термінів реальності. Рослинна символіка ('проростає', 'паляниця', 'хліб') підкреслює органічність та незнищенність життя."

