  instruction: Заповніть пропуски, обравши правильні слова.
- type: essay-response
  title: 'Есе: Архітектура думки'
  prompt: Напишіть невелике есе (мінімум 150 слів) про важливість вивчення іноземних
    мов у сучасному світі. Використайте у своєму тексті щонайменше одне складносурядне
    речення з протиставним сполучником, одне складнопідрядне означальне речення зі
    словом який, одне речення з однорідним підпорядкуванням та одну вкладену конструкцію.
    Зверніть особливу увагу на правильну пунктуацію.
  min_words: 150
  model_answer: Вивчення іноземних мов є надзвичайно важливим у сучасному світі, оскільки
    воно відкриває перед нами безліч нових можливостей. Багато людей вважають цей
    процес складним, проте регулярна практика дозволяє досягти вражаючих результатів.
    Цей процес, який вимагає величезного терпіння та щоденної концентрації, допомагає
    розвивати пам'ять і загальні когнітивні здібності людини. Ми чітко розуміємо,
    що знання мов розширює наші кар'єрні горизонти і що культурний обмін стає значно
    легшим та приємнішим. Якщо ви хочете зрозуміти справжній менталітет іншої нації,
    ви обов'язково повинні вивчати її мову, тому що саме в ній заховані найглибші
    культурні коди суспільства. Зрештою, кожна нова вивчена мова — це ще одне велике
    вікно у світ, яке дозволяє нам бачити реальність значно ширше, глибше та об'єктивніше,
    уникаючи стереотипів.
  rubric:
  - criteria: Синтаксична складність
    description: Наявність усіх необхідних багатоскладних конструкцій (протиставлення,
      означальні речення, однорідне підпорядкування, вкладена конструкція).
    points: 40
  - criteria: Пунктуація
    description: Правильне використання ком у складних реченнях згідно з правилами
      українського синтаксису.
    points: 30
  - criteria: Стилістика та лексика
    description: Відсутність русизмів, використання академічної лексики та збереження
      професійного регістру.
    points: 30
