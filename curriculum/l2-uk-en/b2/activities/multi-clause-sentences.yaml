- type: quiz
  title: 'Теоретичні аспекти: Багатоскладні речення'
  items:
  - question: Яке з наведених речень є типовим прикладом складносурядного речення
      з протиставним типом зв'язку між частинами?
    explanation: Протиставний зв'язок виражається сполучниками а, але, проте, зате,
      однак.
    options:
    - text: Система працювала стабільно, але раптом стався збій у базі даних.
      correct: true
    - text: Студенти уважно слухали лекцію, і професор пояснював складний матеріал.
      correct: false
    - text: Ми дізналися, що новий закон набуде чинності з наступного місяця.
      correct: false
    - text: Щойно ми перетнули кордон, загальна ситуація кардинально змінилася.
      correct: false
  - question: У якому з варіантів правильно пояснено пунктуаційне правило для однорідного
      підпорядкування, поєднаного одиничним сполучником і?
    explanation: Між двома однорідними підрядними реченнями, з'єднаними сполучником
      і, кома не ставиться.
    options:
    - text: Кома перед єднальним сполучником не ставиться ніколи.
      correct: true
    - text: Кома завжди ставиться перед другим сполучником обов'язково.
      correct: false
    - text: Кома ставиться тільки в тому випадку, якщо речення дуже довгі.
      correct: false
    - text: Кома замінюється на крапку з комою для чіткішого виділення.
      correct: false
  - question: Яка головна стилістична відмінність між сполучниками але та проте в
      академічних текстах української мови?
    explanation: Проте — це сполучник високого формального регістру.
    options:
    - text: Проте використовується для більш формального та академічного висловлювання
        контрасту.
      correct: true
    - text: Але вказує на частковий контраст, а проте — на абсолютне заперечення.
      correct: false
    - text: Ці два сполучники є абсолютними синонімами без стилістичної різниці.
      correct: false
    - text: Але застосовується в документах, а проте виключно в художній літературі.
      correct: false
  - question: Чому використання слова що замість який в означальних підрядних реченнях
      вважається небажаним на рівні B2?
    explanation: Слово що є маркером розмовного стилю, тоді як який — академічного.
    options:
    - text: Це маркер низького стилістичного регістру, який спрощує структуру речення.
      correct: true
    - text: Це груба граматична помилка, яка повністю руйнує зміст висловлювання.
      correct: false
    - text: Слово що завжди вимагає після себе використання дієприкметникового звороту.
      correct: false
    - text: Таке використання є калькою з англійської мови та порушує правила милозвучності.
      correct: false
  - question: Який з цих українських сполучників належить до високого формального
      регістру і використовується для вираження причини?
    explanation: Оскільки є нормативною академічною заміною русизму так як.
    options:
    - text: оскільки
      correct: true
    - text: тому що
      correct: false
    - text: так як
      correct: false
    - text: через те що
      correct: false
  - question: Яка з наведених нижче синтаксичних структур в українській мові називається
      терміном вкладене підрядне речення?
    explanation: Вкладене речення розриває головну частину навпіл.
    options:
    - text: Підрядна частина, яка стоїть безпосередньо всередині головного речення
        і виділяється комами.
      correct: true
    - text: Речення, яке містить вставне слово або словосполучення для вираження модальності.
      correct: false
    - text: Декілька підрядних речень, які послідовно залежать одне від одного в тексті.
      correct: false
    - text: Просте речення, ускладнене дієприкметниковим зворотом або однорідними
        членами.
      correct: false
  - question: Що саме означає граматичне правило зіткнення двох сполучників у правилах
      сучасної української пунктуації?
    explanation: Це правило визначає, чи потрібна кома між двома сполучниками (наприклад,
      що якщо).
    options:
    - text: Ситуація, коли два сполучники стоять поруч, і кома залежить від наявності
        слова то.
      correct: true
    - text: Заборона використовувати два однакових сполучники в одному реченні для
        уникнення тавтології.
      correct: false
    - text: Використання єднального та протиставного сполучників одночасно для емоційного
        ефекту.
      correct: false
    - text: Правило, згідно з яким один із сполучників завжди вилучається з речення.
      correct: false
  - question: Як можна найбільш ефективно уникнути стилістичного нагромадження кількох
      означальних підрядних речень підряд в одному тексті?
    explanation: Трансформація в дієприкметниковий зворот допомагає оптимізувати текст.
    options:
    - text: Трансформувати частину з них у відповідні дієприкметникові звороти.
      correct: true
    - text: Розділити багатоскладне речення на серію дуже коротких простих речень.
      correct: false
    - text: Використовувати сполучник що замість який для полегшення читання.
      correct: false
    - text: Просто видалити всі означальні підрядні речення під час редагування тексту.
      correct: false
  - question: Що конкретно означає термін однорідне підпорядкування в контексті вивчення
      структури складнопідрядних речень української мови?
    explanation: Однорідні підрядні речення залежать від одного слова і відповідають
      на однакове питання.
    options:
    - text: Декілька підрядних речень однакового типу залежать від одного слова в
        головному реченні.
      correct: true
    - text: Перше підрядне речення підпорядковується головному, а друге підпорядковується
        першому.
      correct: false
    - text: Підрядні речення різного типу залежать від одного головного речення.
      correct: false
    - text: Складне речення, у якому всі частини є абсолютно незалежними одна від
        одної.
      correct: false
  - question: Яке з наведених варіантів речень містить класичне послідовне підпорядкування
      двох або більше залежних підрядних частин?
    explanation: У послідовному підпорядкуванні утворюється ланцюг залежностей.
    options:
    - text: Я завжди пам’ятатиму той день, який змінив мою кар'єру, коли мені запропонували
        цю посаду.
      correct: true
    - text: Ми чітко усвідомлювали, що цей шлях буде складним і що багато хто не вірить
        у нас.
      correct: false
    - text: Якщо суспільство ігноруватиме проблеми, наслідки будуть катастрофічними,
        тому що це неминуче.
      correct: false
    - text: Студенти уважно слухали лекцію, і професор детально пояснював дуже складний
        новий матеріал.
      correct: false
  instruction: Оберіть правильну відповідь.
- type: fill-in
  title: 'Практика: Вибір правильного сполучника'
  items:
  - sentence: Ми успішно завершили масштабний проєкт, проте фінансування було тимчасово
      призупинено.
    answer: проте
    options:
    - проте
    - тому що
    - що
    - якщо
    explanation: Використовується формальний протиставний сполучник для контрасту.
  - sentence: Це той видатний фахівець, якого ми запросили на сьогоднішню міжнародну
      конференцію.
    answer: якого
    options:
    - якого
    - що
    - якому
    - чий
    explanation: В академічному стилі використовується відмінюване слово який.
  - sentence: Минуло вже кілька довгих років, та життя в цьому маленькому місті повністю
      змінилося.
    answer: та
    options:
    - та
    - або
    - бо
    - чи
    explanation: Сполучник та вказує на тісний внутрішній зв'язок подій.
  - sentence: Керівництво впроваджує абсолютно нові технології, щоб підвищити загальну
      ефективність нашої роботи.
    answer: щоб
    options:
    - щоб
    - що
    - як
    - коли
    explanation: Сполучник щоб вказує на мету виконання дії.
  - sentence: Дослідники зібрали достатньо даних, однак методологія аналізу потребує
      суттєвого вдосконалення.
    answer: однак
    options:
    - однак
    - тому що
    - оскільки
    - якщо
    explanation: Використовується протиставний сполучник для академічного стилю.
  - sentence: Результати нашого експерименту можуть кардинально відрізнятися залежно
      від початкової температури в лабораторії.
    answer: залежно від
    options:
    - залежно від
    - дивлячись на
    - зважаючи
    - всупереч
    explanation: Залежно від — це єдиний нормативний варіант, на відміну від кальки
      дивлячись на.
  - sentence: Я завжди пам’ятатиму той неймовірний день, який змінив усю мою подальшу
      кар'єру.
    answer: який
    options:
    - який
    - що
    - коли
    - куди
    explanation: Слово який використовується в означальному підрядному реченні.
  - sentence: Ми чітко усвідомлювали, що цей шлях буде складним і що багато хто не
      вірить у наш успіх.
    answer: що
    options:
    - що
    - щоб
    - як
    - ніби
    explanation: Однорідне підпорядкування зі з'ясувальними реченнями.
  - sentence: Команда продовжувала активну роботу, дарма що всі встановлені терміни
      вже давно минули.
    answer: дарма що
    options:
    - дарма що
    - тому що
    - оскільки
    - якби
    explanation: Дарма що — це вишуканий літературний сполучник допусту (синонім до
      хоча).
  - sentence: Сьогодні вранці студенти уважно слухали лекцію і професор детально пояснював
      матеріал.
    answer: і
    options:
    - і
    - але
    - проте
    - тому що
    explanation: Перед і не ставиться кома через спільний обставинний член вранці.
  instruction: Оберіть правильне слово для заповнення пропуску.
- type: match-up
  title: Синтаксичні терміни та їхні визначення
  pairs:
  - left: Складносурядне речення
    right: Складається з незалежних частин, які можуть існувати окремо.
  - left: Складнопідрядне речення
    right: Має головну частину та залежну від неї підрядну частину.
  - left: Означальне речення
    right: Відповідає на питання який? і характеризує іменник у головній частині.
  - left: З'ясувальне речення
    right: Розкриває зміст дієслів мовлення, мислення або почуття.
  - left: Обставинне речення
    right: Вказує на час, місце, причину, умову або мету основної дії.
  - left: Однорідне підпорядкування
    right: Кілька однакових підрядних речень залежать від одного слова в головному.
  - left: Послідовне підпорядкування
    right: Перше підрядне залежить від головного, а друге підрядне — від першого.
  - left: Вкладене речення
    right: Підрядна частина знаходиться всередині головної, розриваючи її навпіл.
  - left: Спільний другорядний член
    right: Елемент на початку речення, який скасовує кому перед єднальним сполучником.
  - left: Зіткнення сполучників
    right: Ситуація, коли два сполучники стоять поруч і вимагають особливої пунктуації.
  - left: Розділовий зв'язок
    right: Вказує на те, що події взаємовиключають одна одну або чергуються.
  - left: Протиставний зв'язок
    right: Виражає контраст або обмеження за допомогою сполучників але, проте, однак.
  instruction: З'єднайте відповідні елементи.
- type: group-sort
  title: Класифікація сполучників та сполучних слів
  groups:
  - name: Єднальні та розділові (сурядність)
    items:
    - і
    - й
    - та
    - або
    - чи
  - name: Протиставні (сурядність)
    items:
    - а
    - але
    - проте
    - зате
    - однак
  - name: Підрядні сполучники та слова
    items:
    - що
    - щоб
    - який
    - оскільки
    - якщо
  instruction: Розподіліть елементи за групами.
- type: unjumble
  title: Сконструюйте багатоскладні речення
  items:
  - words:
    - Синтаксис
    - української
    - мови
    - на
    - рівні
    - вимагає
    - саме
    - такого
    - архітектурного
    - підходу
    answer: Синтаксис української мови на рівні вимагає саме такого архітектурного
      підходу
  - words:
    - Цей
    - інструмент
    - дозволяє
    - нам
    - виражати
    - одночасність
    - послідовність
    - або
    - мету
    - дій
    answer: Цей інструмент дозволяє нам виражати одночасність послідовність або мету
      дій
  - words:
    - Пропуск
    - коми
    - перед
    - підрядною
    - частиною
    - це
    - порушення
    - логічної
    - структури
    - тексту
    answer: Пропуск коми перед підрядною частиною це порушення логічної структури
      тексту
  - words:
    - Ви
    - не
    - можете
    - просто
    - відірвати
    - підрядну
    - частину
    - і
    - використовувати
    - її
    - як
    - самостійне
    - речення
    answer: Ви не можете просто відірвати підрядну частину і використовувати її як
      самостійне речення
  - words:
    - Сполучники
    - підпорядковуються
    - суворим
    - законам
    - милозвучності
    - в
    - сучасній
    - українській
    - мові
    answer: Сполучники підпорядковуються суворим законам милозвучності в сучасній
      українській мові
  - words:
    - Особливої
    - уваги
    - заслуговує
    - сполучник
    - проте
    - який
    - суттєво
    - підвищує
    - регістр
    - вашого
    - висловлювання
    answer: Особливої уваги заслуговує сполучник проте який суттєво підвищує регістр
      вашого висловлювання
  - words:
    - Розділові
    - сполучники
    - завжди
    - вказують
    - на
    - те
    - що
    - події
    - взаємовиключають
    - одна
    - одну
    answer: Розділові сполучники завжди вказують на те що події взаємовиключають одна
      одну
  - words:
    - Кома
    - перед
    - єднальними
    - сполучниками
    - не
    - ставиться
    - якщо
    - речення
    - мають
    - спільний
    - елемент
    answer: Кома перед єднальними сполучниками не ставиться якщо речення мають спільний
      елемент
  instruction: Розташуйте слова у правильному порядку.
- type: true-false
  title: Правила українського синтаксису
  items:
  - statement: Складносурядне речення складається з граматично незалежних частин,
      які можуть функціонувати окремо.
    correct: true
    explanation: Це фундаментальна ознака складносурядного речення.
  - statement: Підрядне речення може використовуватися як самостійне речення без жодної
      втрати сенсу.
    correct: false
    explanation: Підрядна частина залежить від головної і не має самостійного змісту.
  - statement: Пунктуація в українській мові виконує виключно інтонаційну роль, і
      коми можна ставити довільно.
    correct: false
    explanation: Пунктуація виконує насамперед структурну та логічну роль.
  - statement: Сполучник та може використовуватися в значенні і для підкреслення більш
      тісного зв'язку подій.
    correct: true
    explanation: Це стилістична особливість сполучника та.
  - statement: Кома завжди обов'язково ставиться перед сполучником і у складносурядному
      реченні.
    correct: false
    explanation: Існує правило спільного елемента, яке скасовує кому.
  - statement: Слово що є універсальним і найкращим вибором для всіх означальних підрядних
      речень на рівні B2.
    correct: false
    explanation: В академічному стилі домінує слово який, а що вважається розмовним.
  - statement: Сполучник щоб зазвичай вказує на мету, бажання або наказ.
    correct: true
    explanation: Він формує обставинні речення мети та з'ясувальні речення бажання.
  - statement: Конструкція так як є нормативним українським висловом для позначення
      причини в академічних текстах.
    correct: false
    explanation: Це грубий русизм. Нормативним варіантом є оскільки.
