  passage: Складні речення в українській мові фундаментально поділяються на дві великі
    {{1}}. Перша родина — це складносурядне {{2}}. У цій конструкції всі частини є
    абсолютно {{3}}. Ви можете розірвати складносурядне речення на два окремі {{4}}.
    Друга родина — це складнопідрядне {{5}}. Тут діє принцип суворої {{6}}. Є головне
    речення, яке містить основну {{7}}, та є підрядне речення, яке залежить від {{8}}.
    Усі підрядні речення поділяються на означальні, з'ясувальні та {{9}}. Означальні
    підрядні речення виконують функцію {{10}} для цілого висловлювання. З'ясувальні
    підрядні частини відповідають на питання непрямих {{11}}. Обставинні підрядні
    речення створюють {{12}} для головної дії. На рівні B2 ваше завдання — не просто
