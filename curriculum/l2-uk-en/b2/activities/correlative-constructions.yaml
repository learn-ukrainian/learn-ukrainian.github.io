- type: reading
  id: reading-correlatives
  title: 'Первинне джерело: Роль корелятивів у науці'
  instruction: 'Прочитайте академічний текст та дайте відповіді на запитання щодо розуміння змісту.'
  text: |
    Сучасне наукове дослідження вимагає надзвичайної точності у формулюваннях. Той науковець, який ігнорує логічні зв'язки у своєму тексті, ризикує бути неправильно зрозумілим. Ми повинні чітко розрізняти те, що є доведеним фактом, і те, що залишається лише гіпотезою. Аналіз даних має проводитися саме там, де були зібрані первинні матеріали. Крім того, успішний синтез інформації можливий лише тоді, коли дослідник застосовує правильний метод. Настільки, наскільки це можливо, варто уникати емоційних оцінок у тих розділах, які присвячені результатам експерименту. Отже, те поняття, що розглядається в цій роботі, потребує подальшого вивчення доти, поки ми не отримаємо вичерпні відповіді.
  tasks:
    - 'Які ризики несе ігнорування логічних зв''язків?'
    - 'Між чим потрібно чітко розрізняти у науковому тексті?'
    - 'Коли можливий успішний синтез інформації?'
    - 'Чого варто уникати під час опису результатів експерименту?'

- type: essay-response
  title: 'Есе: Важливість точності в академічному письмі'
  source_reading: reading-correlatives
  instruction: 'Напишіть коротке есе, свідомо використовуючи вивчені граматичні конструкції.'
  prompt: 'Спираючись на прочитаний текст, поясніть, чому точність формулювань є критично важливою в науковому дослідженні. Використайте щонайменше чотири різні співвідносні конструкції (наприклад, те... що, той... хто, там... де, тоді... коли).'
  min_words: 150
  model_answer: |
    Точність формулювань в академічному письмі є фундаментом будь-якого якісного дослідження. Той науковець, хто не вміє чітко висловлювати свої думки, не зможе переконати аудиторію у правильності своїх висновків. Важливо розуміти те, що кожне поняття має бути однозначним. Ми маємо використовувати терміни саме там, де вони є доречними, уникаючи двозначності. Справжній науковий синтез відбувається тоді, коли всі дані структуровані логічно. Настільки, наскільки дослідник володіє мовним інструментарієм, він здатний передати складні ідеї просто та зрозуміло. Тому вивчення синтаксису є таким самим важливим методом підготовки фахівця, як і фахові дисципліни.
  rubric:
    - criteria: 'Використання корелятивів'
      description: 'Правильне та доречне використання щонайменше чотирьох різних співвідносних конструкцій.'
      points: 10
    - criteria: 'Логічність та структура'
      description: 'Есе має чітку структуру, думки викладені послідовно та аргументовано.'
      points: 5

- type: true-false
  title: 'Визначте правильність тверджень'
  instruction: 'Оцініть наведені граматичні правила та твердження.'
  items:
    - statement: 'Конструкція "той, хто" використовується виключно для живих істот.'
      correct: true
      explanation: 'Так, ця пара зарезервована для людей та персоніфікованих осіб.'
    - statement: 'В українській мові вказівні слова "той" і "те" ніколи не відмінюються.'
      correct: false
      explanation: 'Вони повноцінно відмінюються і мусять узгоджуватися з головним дієсловом.'
    - statement: 'Фраза "за то, що" є правильною українською граматичною нормою.'
      correct: false
      explanation: 'Це російська калька. Правильно казати "за те, що".'
    - statement: 'Пара "там, де" використовується для позначення напрямку руху.'
      correct: false
      explanation: 'Вона фіксує статику. Для напрямку використовують "туди, куди".'
    - statement: 'Підрядна частина у корелятивних парах завжди відокремлюється комою.'
      correct: true
      explanation: 'Так, кома обов''язково ставиться перед сполучним словом.'
    - statement: 'Пара "доти, поки" встановлює часовий ліміт або кінцеву межу дії.'
      correct: true
      explanation: 'Вона вказує на те, як довго триватиме дія.'
    - statement: 'Конструкція "те, що" застосовується для опису абстрактних ідей та неживих предметів.'
      correct: true
      explanation: 'Ця пара ідеально підходить для наукових концепцій.'
    - statement: 'В усному мовленні вказівне слово іноді може бути пропущене без втрати змісту.'
      correct: true
      explanation: 'Це явище називається еліпсисом, хоча в академічних текстах його уникають.'
    - statement: 'Після вказівного слова не можна ставити іменник, наприклад, "той метод, який".'
      correct: false
      explanation: 'Використання іменника є класичним прийомом наукового стилю.'
    - statement: 'Якщо вказівне слово стоїть у множині, дієслово в підрядному реченні залишається в однині.'
      correct: false
      explanation: 'Дієслово також мусить стояти у множині для граматичного узгодження.'
    - statement: 'Пара "туди, куди" використовується для опису точки походження.'
      correct: false
      explanation: 'Вона позначає напрямок. Для походження використовують "звідти, звідки".'
    - statement: 'Слово "настільки" завжди вимагає після себе сполучного слова "наскільки" в повній корелятивній парі.'
      correct: true
      explanation: 'Так, вони утворюють неподільну пару для вимірювання інтенсивності.'
    - statement: 'Займенник "те" у непрямих відмінках може мати форми "того", "тому", "тим".'
      correct: true
      explanation: 'Це правильні форми родового, давального та орудного відмінків.'
    - statement: 'Українська мова віддає перевагу англійській кальці "той, хто" замість використання конкретного іменника.'
      correct: false
      explanation: 'Навпаки, використання конкретного іменника (наприклад, "переможець") є більш природним.'

- type: quiz
  title: 'Перевірте знання синтаксису'
  instruction: 'Оберіть правильний варіант відповіді для кожного запитання.'
  items:
    - question: 'Яка корелятивна пара найкраще підходить для вказівки на початкову точку руху?'
      explanation: 'Пара "звідти, звідки" позначає походження або точку старту.'
      options:
        - text: 'там, де'
          correct: false
        - text: 'туди, куди'
          correct: false
        - text: 'звідти, звідки'
          correct: true
        - text: 'тоді, коли'
          correct: false
    - question: 'Який відмінок займенника "те" потрібно використати після дієслова "пишатися"?'
      explanation: 'Дієслово "пишатися" вимагає орудного відмінка (ким/чим?), отже "тим, що".'
      options:
        - text: 'про те, що'
          correct: false
        - text: 'тим, що'
          correct: true
        - text: 'того, що'
          correct: false
        - text: 'те, що'
          correct: false
    - question: 'У якому реченні допущено грубу помилку у використанні співвідносної конструкції?'
      explanation: 'Неживий об''єкт (ноутбук) не може поєднуватися з парою "той, хто".'
      options:
        - text: 'Він сказав те, що я хотів почути.'
          correct: false
        - text: 'Ноутбук — це той, хто допомагає мені в роботі.'
          correct: true
        - text: 'Ми зустрілися там, де домовлялися.'
          correct: false
        - text: 'Той, хто шукає, завжди знаходить.'
          correct: false
    - question: 'Яка форма є правильною для вираження вдячності за певну дію?'
      explanation: 'Українська норма вимагає конструкції "за те, що".'
      options:
        - text: 'Дякую за то, що ви прийшли.'
          correct: false
        - text: 'Дякую те, що ви прийшли.'
          correct: false
        - text: 'Дякую за те, що ви прийшли.'
          correct: true
        - text: 'Дякую тому, що ви прийшли.'
          correct: false
    - question: 'Як правильно узгодити в числі таку фразу: "Ті студенти, які..."?'
      explanation: 'Оскільки вказівне слово у множині, дієслово також має бути у множині.'
      options:
        - text: 'постійно читає, успішно складають іспити.'
          correct: false
        - text: 'постійно читають, успішно складає іспити.'
          correct: false
        - text: 'постійно читають, успішно складають іспити.'
          correct: true
        - text: 'постійно читає, успішно складає іспити.'
          correct: false
    - question: 'Для чого в академічному письмі найчастіше використовують пару "стільки, скільки"?'
      explanation: 'Ця кількісна пара слугує для вимірювання та порівняння обсягів або кількості.'
      options:
        - text: 'Для фіксації точної локації експерименту.'
          correct: false
        - text: 'Для опису інтенсивності абстрактних явищ.'
          correct: false
        - text: 'Для синхронізації двох різних подій у часі.'
          correct: false
        - text: 'Для точного вимірювання та пропорційного порівняння обсягів.'
          correct: true
    - question: 'Яке пунктуаційне правило діє для складнопідрядних речень зі співвідносними словами?'
      explanation: 'Кома обов''язково ставиться перед сполучним словом, розриваючи пару.'
      options:
        - text: 'Кома ніколи не ставиться між частинами пари.'
          correct: false
        - text: 'Кома ставиться після сполучного слова в підрядному реченні.'
          correct: false
        - text: 'Кома ставиться безпосередньо перед сполучним словом.'
          correct: true
        - text: 'Кома ставиться тільки у випадку, якщо речення дуже довге.'
          correct: false
    - question: 'Який прийом допомагає уникнути нагромадження займенників типу "той, який"?'
      explanation: 'Заміна займенникових пар на ємні іменники робить текст більш динамічним.'
      options:
        - text: 'Використання влучних іменників замість вказівних пар.'
          correct: true
        - text: 'Використання англійської кальки для спрощення речення.'
          correct: false
        - text: 'Пропуск усіх дієслів у головному та підрядному реченнях.'
          correct: false
        - text: 'Переведення всіх речень виключно в теперішній час.'
          correct: false
    - question: 'Що відбувається, коли ми використовуємо інвертований порядок: спочатку "хто", а потім "той"?'
      explanation: 'Інверсія створює ефект інтриги та часто використовується в публіцистиці.'
      options:
        - text: 'Речення стає абсолютно незрозумілим для носія мови.'
          correct: false
        - text: 'Це вважається грубою граматичною помилкою на рівні В2.'
          correct: false
        - text: 'Такий порядок створює ефект інтриги та афористичного звучання.'
          correct: true
        - text: 'Цей порядок використовується лише в офіційно-ділових документах.'
          correct: false
    - question: 'Як правильно додати іменник до конструкції, що вводить новий термін у тексті?'
      explanation: 'Іменник ставиться між вказівним та сполучним словами, наприклад, "той метод, який".'
      options:
        - text: 'Поставити іменник перед вказівним словом: "метод той, який".'
          correct: false
        - text: 'Розмістити іменник між частинами пари: "той метод, який".'
          correct: true
        - text: 'Замінити сполучне слово іменником: "той метод".'
          correct: false
        - text: 'Додати іменник у самий кінець речення: "той, який метод".'
          correct: false
    - question: 'Яке вказівне слово використовується для вимірювання кількості?'
      explanation: 'Для кількості використовують слово "стільки".'
      options:
        - text: 'стільки'
          correct: true
        - text: 'настільки'
          correct: false
        - text: 'тоді'
          correct: false
        - text: 'туди'
          correct: false
    - question: 'Який відмінок потрібен після дієслова "звертати увагу на"?'
      explanation: 'Це дієслово вимагає знахідного відмінка — "на те".'
      options:
        - text: 'на те'
          correct: true
        - text: 'на того'
          correct: false
        - text: 'на тим'
          correct: false
        - text: 'на тому'
          correct: false
    - question: 'Яка пара найкраще підходить для встановлення часової межі?'
      explanation: 'Для часового ліміту використовується "доти, поки".'
      options:
        - text: 'доти, поки'
          correct: true
        - text: 'тоді, коли'
          correct: false
        - text: 'там, де'
          correct: false
        - text: 'туди, куди'
          correct: false
    - question: 'Чому надмірне використання вказівних пар у тексті вважається стилістичною помилкою?'
      explanation: 'Це робить текст важким для сприйняття.'
      options:
        - text: 'Воно призводить до синтаксичного перевантаження.'
          correct: true
        - text: 'Воно заборонено правилами орфографії.'
          correct: false
        - text: 'Воно робить текст занадто коротким.'
          correct: false
        - text: 'Воно порушує правила пунктуації.'
          correct: false

- type: unjumble
  title: 'Побудуйте співвідносні конструкції'
  instruction: 'Складіть граматично правильні речення з поданих слів, звертаючи увагу на пунктуацію.'
  items:
    - words: ['Дослідження', 'буде', 'тривати', 'доти,', 'поки', 'ми', 'не', 'отримаємо', 'точні', 'результати.']
      answer: 'Дослідження буде тривати доти, поки ми не отримаємо точні результати.'
    - words: ['Переможцем', 'стане', 'лише', 'той,', 'хто', 'запропонує', 'найбільш', 'інноваційний', 'підхід.']
      answer: 'Переможцем стане лише той, хто запропонує найбільш інноваційний підхід.'
    - words: ['Науковець', 'звернув', 'увагу', 'на', 'те,', 'що', 'попередній', 'аналіз', 'був', 'помилковим.']
      answer: 'Науковець звернув увагу на те, що попередній аналіз був помилковим.'
    - words: ['Вони', 'розпочали', 'свій', 'проєкт', 'саме', 'там,', 'де', 'була', 'найбільша', 'потреба.']
      answer: 'Вони розпочали свій проєкт саме там, де була найбільша потреба.'
    - words: ['Компанія', 'інвестує', 'ресурси', 'туди,', 'куди', 'вказують', 'сучасні', 'тенденції', 'ринку.']
      answer: 'Компанія інвестує ресурси туди, куди вказують сучасні тенденції ринку.'
    - words: ['Просимо', 'вас', 'звернути', 'увагу', 'на', 'те', 'поняття,', 'яке', 'є', 'ключовим.']
      answer: 'Просимо вас звернути увагу на те поняття, яке є ключовим.'
    - words: ['Справжній', 'успіх', 'приходить', 'лише', 'тоді,', 'коли', 'ми', 'наполегливо', 'працюємо.']
      answer: 'Справжній успіх приходить лише тоді, коли ми наполегливо працюємо.'
    - words: ['Завдання', 'виявилося', 'настільки', 'складним,', 'наскільки', 'нас', 'про', 'це', 'попереджали', 'експерти.']
      answer: 'Завдання виявилося настільки складним, наскільки нас про це попереджали експерти.'
    - words: ['Синтез', 'даних', 'відбувається', 'тоді,', 'коли', 'ми', 'маємо', 'достатньо', 'інформації.']
      answer: 'Синтез даних відбувається тоді, коли ми маємо достатньо інформації.'
    - words: ['Він', 'працював', 'стільки,', 'скільки', 'було', 'потрібно', 'для', 'завершення', 'проєкту.']
      answer: 'Він працював стільки, скільки було потрібно для завершення проєкту.'
    - words: ['Птахи', 'повертаються', 'звідти,', 'звідки', 'вони', 'полетіли', 'минулої', 'осені.']
      answer: 'Птахи повертаються звідти, звідки вони полетіли минулої осені.'
    - words: ['Найцікавіші', 'відкриття', 'трапляються', 'там,', 'де', 'перетинаються', 'різні', 'наукові', 'дисципліни.']
      answer: 'Найцікавіші відкриття трапляються там, де перетинаються різні наукові дисципліни.'
    - words: ['Ми', 'повинні', 'розрізняти', 'ті', 'фактори,', 'які', 'викликали', 'цю', 'кризу.']
      answer: 'Ми повинні розрізняти ті фактори, які викликали цю кризу.'
    - words: ['Людина,', 'якій', 'доручили', 'цей', 'важливий', 'проєкт,', 'багато', 'працює.']
      answer: 'Людина, якій доручили цей важливий проєкт, багато працює.'

- type: fill-in
  title: 'Вставте правильне слово'
  instruction: 'Доповніть речення правильним вказівним або сполучним словом.'
  items:
    - sentence: 'Ми дуже вдячні вам за _____, що ви підтримали наш проєкт.'
      answer: 'те'
      options: ['те', 'то', 'той', 'там']
      explanation: 'Правильна українська форма — "за те, що".'
    - sentence: 'Студент успішно здасть сесію лише _____, коли буде систематично готуватися.'
      answer: 'тоді'
      options: ['тоді', 'доти', 'там', 'настільки']
      explanation: 'Часова пара — "тоді, коли".'
    - sentence: 'Учені виявили новий вид бактерій саме _____, де умови здавалися непридатними для життя.'
      answer: 'там'
      options: ['там', 'туди', 'звідти', 'доти']
      explanation: 'Для фіксації статичної локації використовується "там, де".'
    - sentence: 'Команда експертів вирушила _____, куди ще не діставалася жодна експедиція.'
      answer: 'туди'
      options: ['там', 'туди', 'звідти', 'те']
      explanation: 'Для позначення напрямку використовують "туди, куди".'
    - sentence: 'Цей метод виявився _____ ефективним, наскільки ми й очікували.'
      answer: 'настільки'
      options: ['настільки', 'стільки', 'тоді', 'доти']
      explanation: 'Для вимірювання інтенсивності використовуємо "настільки, наскільки".'
    - sentence: 'Керівник доручив завдання _____, хто вже мав досвід подібної роботи.'
      answer: 'тому'
      options: ['тому', 'тій', 'тим', 'те']
      explanation: 'Дієслово "доручити" вимагає давального відмінка ("кому?") — "тому, хто".'
    - sentence: 'Ми будемо продовжувати експеримент _____, поки не досягнемо стабільного результату.'
      answer: 'доти'
      options: ['доти', 'тоді', 'настільки', 'стільки']
      explanation: 'Для встановлення часової межі використовують "доти, поки".'
    - sentence: 'У статті детально описано _____ процес, під час якого клітини відновлюються.'
      answer: 'той'
      options: ['той', 'те', 'ті', 'там']
      explanation: 'Слово "процес" чоловічого роду, тому використовуємо "той".'
    - sentence: 'Птахи щовесни повертаються _____, звідки вони полетіли минулої осені.'
      answer: 'звідти'
      options: ['звідти', 'там', 'туди', 'тоді']
      explanation: 'Для позначення початкової точки руху використовують "звідти, звідки".'
    - sentence: 'Будь ласка, зверніть увагу на _____, що дедлайн подачі документів змінився.'
      answer: 'те'
      options: ['те', 'то', 'ті', 'той']
      explanation: 'Дієслово "звертати увагу на" вимагає знахідного відмінка — "на те".'
    - sentence: 'Рішення буде прийнято _____, коли збереться вся комісія.'
      answer: 'тоді'
      options: ['тоді', 'доти', 'там', 'туди']
      explanation: 'Часова синхронізація здійснюється парою "тоді, коли".'
    - sentence: 'Вам потрібно докласти _____ зусиль, скільки вимагає цей проєкт.'
      answer: 'стільки'
      options: ['стільки', 'настільки', 'доти', 'тоді']
      explanation: 'Для кількісного вимірювання застосовуємо "стільки, скільки".'
    - sentence: 'Ми пишаємося _____, що наші студенти перемагають у конкурсах.'
      answer: 'тим'
      options: ['тим', 'те', 'того', 'тому']
      explanation: 'Орудний відмінок від слова "те" — "тим".'
    - sentence: 'Це дослідження цікаве _____, наскільки воно змінює наше розуміння світу.'
      answer: 'настільки'
      options: ['настільки', 'стільки', 'те', 'тим']
      explanation: 'Ступінь якості передається словом "настільки".'

- type: match-up
  title: 'Знайдіть логічну пару'
  instruction: 'З''єднайте початок і кінець складного речення, щоб утворилася правильна співвідносна конструкція.'
  pairs:
    - left: 'Лідер — це той,'
      right: 'хто бере на себе відповідальність за результат.'
    - left: 'Я глибоко переконаний у тому,'
      right: 'що цей метод є найбільш дієвим.'
    - left: 'Ми збудуємо нову лабораторію там,'
      right: 'де є доступ до необхідних ресурсів.'
    - left: 'Рішення буде прийнято тоді,'
      right: 'коли всі експерти висловлять свої думки.'
    - left: 'Ви повинні докласти стільки зусиль,'
      right: 'скільки вимагає цей складний проєкт.'
    - left: 'Сучасні інвестиції прямують туди,'
      right: 'куди вказують глобальні економічні тренди.'
    - left: 'Ця проблема є настільки складною,'
      right: 'наскільки ми можемо собі уявити.'
    - left: 'Експеримент триватиме доти,'
      right: 'поки всі гіпотези не будуть перевірені.'
    - left: 'Ми вдячні нашим партнерам за те,'
      right: 'що вони підтримали нас у кризовий момент.'
    - left: 'Найбільші відкриття приходять звідти,'
      right: 'звідки їх ніхто не очікує.'
    - left: 'Той студент, який багато читає,'
      right: 'завжди отримує високі оцінки.'
    - left: 'Ті студенти, які багато читають,'
      right: 'швидко засвоюють новий матеріал.'
    - left: 'Він вирішив поїхати звідти,'
      right: 'звідки родом його бабуся і дідусь.'
    - left: 'Завдання було виконано настільки швидко,'
      right: 'наскільки це дозволяли обставини.'

- type: error-correction
  title: 'Виправте типові помилки'
  instruction: 'Знайдіть граматичну помилку або кальку у використанні вказівних слів і виберіть правильний варіант.'
  items:
    - sentence: 'Я пишаюся те, що наша команда виконала план.'
      error: 'те'
      answer: 'тим'
      options: ['тим', 'те', 'того', 'тому']
      explanation: 'Дієслово "пишатися" вимагає орудного відмінка (ким/чим?), тому правильно "тим, що".'
    - sentence: 'Ми вдячні вам за то, що ви прийшли.'
      error: 'то'
      answer: 'те'
      options: ['те', 'то', 'тому', 'тим']
      explanation: 'Російська калька "за то" перекладається як "за те".'
    - sentence: 'Ті студенти, які постійно читає, успішно складають іспити.'
      error: 'читає'
      answer: 'читають'
      options: ['читають', 'читає', 'читав', 'читати']
      explanation: 'Слово "студенти" стоїть у множині, тому дієслово також має бути у множині ("читають").'
    - sentence: 'Комп''ютер — це той, хто допомагає мені в роботі.'
      error: 'той, хто'
      answer: 'те, що'
      error_type: 'phrase'
      options: ['те, що', 'той, хто', 'той, який', 'ті, хто']
      explanation: 'Комп''ютер — це неістота, тому використовується пара "те, що" або іменник "той пристрій, який".'
    - sentence: 'Ми розпочнемо аналіз доти, коли зберемо всі дані.'
      error: 'доти'
      answer: 'тоді'
      options: ['тоді', 'доти', 'там', 'туди']
      explanation: 'Для синхронізації у часі використовується конструкція "тоді, коли".'
    - sentence: 'Він поїхав там, куди його направили у відрядження.'
      error: 'там'
      answer: 'туди'
      options: ['туди', 'там', 'звідти', 'те']
      explanation: 'Для позначення напрямку руху потрібно використовувати "туди".'
    - sentence: 'Завдання було стільки складним, наскільки нас і попереджали.'
      error: 'стільки'
      answer: 'настільки'
      options: ['настільки', 'стільки', 'те', 'там']
      explanation: 'Для вимірювання інтенсивності або якості використовується "настільки, наскільки".'
    - sentence: 'Той, що сумнівається у своїх силах, ніколи не досягне успіху.'
      error: 'Той, що'
      answer: 'Той, хто'
      error_type: 'phrase'
      options: ['Той, хто', 'Той, що', 'Те, що', 'Ті, що']
      explanation: 'Для позначення осіб (людей) традиційно використовується займенникова пара "той, хто".'
    - sentence: 'Я вдячний за то, що ми плідно співпрацюємо.'
      error: 'то'
      answer: 'те'
      options: ['те', 'то', 'той', 'тому']
      explanation: 'Калька з російської; українською завжди кажуть "за те, що".'
    - sentence: 'Він сказав те що було потрібно.'
      error: 'те що'
      answer: 'те, що'
      error_type: 'phrase'
      options: ['те, що', 'те що', 'того що', 'тому що']
      explanation: 'Кома обов''язково ставиться перед сполучним словом, розриваючи пару.'
    - sentence: 'Ті, хто знає правду, мовчить.'
      error: 'мовчить'
      answer: 'мовчать'
      options: ['мовчать', 'мовчить', 'мовчати', 'мовчав']
      explanation: 'Оскільки "ті" — множина, присудок також має бути у множині ("мовчать").'
    - sentence: 'Я боюся те, що може статися сьогодні.'
      error: 'те'
      answer: 'того'
      options: ['того', 'те', 'тим', 'тому']
      explanation: 'Дієслово "боятися" вимагає родового відмінка (кого/чого?), тобто "того".'

