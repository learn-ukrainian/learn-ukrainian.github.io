- type: select
  title: 'Оберіть правильні варіанти'
  instruction: 'Для кожного запитання оберіть усі граматично або логічно правильні відповіді.'
  items:
    - question: 'Які з наведених речень містять правильні форми просторових зв''язків?'
      min_correct: 2
      explanation: 'Правильними є "там, де" (статика) та "туди, куди" (напрямок).'
      options:
        - text: 'Ми зупинилися там, де починався ліс.'
          correct: true
        - text: 'Він поїхав там, куди вказав навігатор.'
          correct: false
        - text: 'Птахи летять туди, куди їх веде інстинкт.'
          correct: true
        - text: 'Вона повернулася звідти, де вона пішла.'
          correct: false
    - question: 'Які з цих висловів є російськими кальками, яких слід уникати?'
      min_correct: 2
      explanation: '"За то, що" та "не дивлячись на то, що" є типовими кальками.'
      options:
        - text: 'за то, що'
          correct: true
        - text: 'не дивлячись на то, що'
          correct: true
        - text: 'за те, що'
          correct: false
        - text: 'незважаючи на те, що'
          correct: false
    - question: 'Які форми вказівного слова "те" стоять у непрямих відмінках (не в називному)?'
      min_correct: 3
      explanation: 'Форми "тому", "тим", "того" є непрямими відмінками.'
      options:
        - text: 'тому'
          correct: true
        - text: 'тим'
          correct: true
        - text: 'того'
          correct: true
        - text: 'те'
          correct: false
    - question: 'Які пари використовуються для вимірювання кількості та інтенсивності?'
      min_correct: 2
      explanation: 'Для метрики та градації застосовують "стільки, скільки" та "настільки, наскільки".'
      options:
        - text: 'стільки, скільки'
          correct: true
        - text: 'настільки, наскільки'
          correct: true
        - text: 'тоді, коли'
          correct: false
        - text: 'туди, куди'
          correct: false
    - question: 'Які речення демонструють правильне узгодження в числі?'
      min_correct: 2
      explanation: 'Речення з "ті... які... знають" і "той... який... знає" узгоджені правильно.'
      options:
        - text: 'Ті студенти, які багато читають, отримують високі бали.'
          correct: true
        - text: 'Той студент, який багато читає, отримує високі бали.'
          correct: true
        - text: 'Ті студенти, який багато читає, отримують високі бали.'
          correct: false
        - text: 'Ті студенти, які багато читає, отримують високі бали.'
          correct: false
    - question: 'Які іменники доречно вставити в конструкцію "той ___, який"? (для опису наукової діяльності)'
      min_correct: 3
      explanation: 'Слова "метод", "термін", "процес" чоловічого роду і стосуються науки.'
      options:
        - text: 'метод'
          correct: true
        - text: 'термін'
          correct: true
        - text: 'процес'
          correct: true
        - text: 'поняття'
          correct: false
    - question: 'У яких реченнях пунктуація розставлена абсолютно правильно?'
      min_correct: 2
      explanation: 'Кома має стояти перед підрядною частиною, відокремлюючи вказівне та сполучне слова.'
      options:
        - text: 'Я переконаний у тому, що ми виграємо цей грант.'
          correct: true
        - text: 'Він сказав те що ми хотіли почути.'
          correct: false
        - text: 'Той, хто постійно вчиться, швидко адаптується до змін.'
          correct: true
        - text: 'Той хто багато працює завжди отримує результат.'
          correct: false
    - question: 'Які фрази відповідають академічному стилю для введення об''єкта аналізу?'
      min_correct: 2
      explanation: 'Академічний стиль вітає використання "те поняття, яке" та "ті процеси, що".'
      options:
        - text: 'Ми проаналізуємо те поняття, яке лежить в основі теорії.'
          correct: true
        - text: 'Зараз ми поговоримо про того, що робить клітина.'
          correct: false
        - text: 'Варто звернути увагу на ті процеси, що відбуваються в економіці.'
          correct: true
        - text: 'Подивіться на те, що комп''ютер, який нам допомагає.'
          correct: false
    - question: 'Які речення містять правильні кількісні конструкції?'
      min_correct: 2
      explanation: 'Правильними є "стільки, скільки" та "настільки, наскільки".'
      options:
        - text: 'Він працював стільки, скільки було треба.'
          correct: true
        - text: 'Задача була настільки важка, наскільки ми очікували.'
          correct: true
        - text: 'Він працював стільки, наскільки було треба.'
          correct: false
        - text: 'Він працював так багато, як скільки міг.'
          correct: false
    - question: 'Які слова можуть продовжувати конструкцію "той ___ , який" у науковому тексті?'
      min_correct: 3
      explanation: 'Слова чоловічого роду, які часто використовуються в науці.'
      options:
        - text: 'метод'
          correct: true
        - text: 'аналіз'
          correct: true
        - text: 'синтез'
          correct: true
        - text: 'робота'
          correct: false

- type: translate
  title: 'Переклад з англійської'
  instruction: 'Оберіть найбільш природний та граматично правильний український переклад.'
  items:
    - source: 'The one who controls the information has the most influence.'
