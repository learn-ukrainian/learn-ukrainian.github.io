- type: essay-response
  title: "Опис складного процесу"
  instruction: "Напишіть розгорнуту відповідь на поставлене завдання."
  prompt: "Опишіть довготривалий науковий або суспільний процес (наприклад, деколонізацію, проведення складного експерименту або реформування системи). Використайте щонайменше 5 вторинних недоконаних дієслів для підкреслення дуративності або ітеративності дій. Ваша відповідь має демонструвати глибоке розуміння академічного стилю."
  min_words: 150
  model_answer: "Процес деколонізації публічного простору в Україні виявився набагато складнішим, ніж просто разова зміна табличок. Протягом кількох років громади постійно перейменовували вулиці та площі. Історики регулярно переглядали архівні документи, щоб знаходити автентичні історичні назви. Комісії довго розробляли нові концепції міського простору, а науковці ретельно обґрунтовували кожне прийняте рішення. Місцева влада поступово додавала нові імена до офіційних реєстрів. Ми часто спостерігали, як мешканці місяцями обговорювали доцільність тієї чи іншої назви. Цей процес вимагав величезної кількості часу, оскільки суспільство мало глибоко переосмислювати власну історію та викреслювати імперські наративи зі своєї пам'яті. Журналісти щотижня записували великі інтерв'ю з експертами, намагаючись пояснювати важливість цих культурних змін. У результаті ми отримали не просто новий список поштових адрес, а глибоко пропрацьовану культурну трансформацію, яку продовжуємо впроваджувати й сьогодні в усіх регіонах країни."
  rubric:
    - criteria: "Використання вторинних імперфективів"
      description: "Наявність у тексті щонайменше п'яти правильно утворених вторинних недоконаних дієслів."
      points: 40
    - criteria: "Академічний або публіцистичний стиль"
      description: "Текст написаний формальною українською мовою з активним використанням відповідної лексики (наприклад: процес, метод, термін)."
      points: 30
    - criteria: "Граматична правильність"
      description: "Повна відсутність помилок у чергуванні голосних та виборі суфіксів."
      points: 30