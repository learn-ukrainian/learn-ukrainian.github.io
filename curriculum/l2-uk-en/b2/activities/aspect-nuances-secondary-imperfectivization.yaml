- type: reading
  title: "Первинне джерело: Метафора Палімпсесту"
  instruction: "Прочитайте уривок та дайте відповіді на запитання."
  text: "Щоб глибоко зрозуміти суть вторинної імперфективації в українській мові, нам варто звернутися до концепції палімпсесту. Історично палімпсест — це пергамент, з якого стерли первісний текст, щоб написати новий. Проте старий текст ніколи не зникає повністю; його сліди проступають крізь нові рядки, створюючи багатий, багатошаровий рукопис. Грамматично вторинна імперфективація працює саме як палімпсест. Ми беремо дієслово доконаного виду, яке вже містить у собі префікс, що позначає завершеність. Але замість того, щоб зупинитися на цьому результаті, ми додаємо до нього спеціальний суфікс. Цей суфікс ніби переписує дієслово, повертаючи йому значення тривалості або повторюваності, але зберігаючи відтінок завершеності в корені. Таким чином, дія стає багатошаровою: вона одночасно вказує на досягнення певної мети і на те, що цей процес розгортається в часі знову і знову."
  tasks:
    - "Що означає термін палімпсест в історичному контексті?"
    - "Як граматична вторинна імперфективація повторює механізм створення палімпсесту?"
    - "Яку функцію виконує префікс у доконаному дієслові перед його трансформацією?"
    - "Чому процес утворення таких слів називають багатошаровим?"

- type: quiz
  title: "Теоретичні засади вторинної імперфективації"
  instruction: "Оберіть одну правильну відповідь на кожне теоретичне запитання щодо видових нюансів."
  items:
    - question: "Що саме означає термін ітеративність у контексті вивчення вторинних недоконаних дієслів?"
      explanation: "Ітеративність вказує на регулярне або систематичне повторення певної дії в часі."
      options:
        - text: "регулярне повторення дії"
          correct: true
        - text: "раптове завершення процесу"
          correct: false
        - text: "неможливість завершити дію"
          correct: false
        - text: "одноразовий швидкий результат"
          correct: false
    - question: "Що описує дуративна функція дієслова у складних академічних текстах?"
      explanation: "Дуративність підкреслює, що дія розгортається в часі, є тривалою і безперервною."
      options:
        - text: "тривалий і безперервний процес протікання дії"
          correct: true
        - text: "раптовий початок експерименту"
          correct: false
        - text: "швидкий одноразовий результат"
          correct: false
        - text: "миттєву реакцію на подію"
          correct: false
    - question: "Яка форма є граматично правильною для позначення регулярного процесу від слова переписати?"
      explanation: "Правильна форма утворюється за допомогою суфікса -ува-, без зайвих елементів."
      options:
        - text: "переписувати"
          correct: true
        - text: "переписовувати"
          correct: false
        - text: "переписати"
          correct: false
        - text: "писати"
          correct: false
    - question: "Який суфікс найчастіше використовується для вторинної імперфективації після твердих приголосних?"
      explanation: "Найпродуктивнішим суфіксом у цьому випадку є суфікс -ува-."
      options:
        - text: "-ува-"
          correct: true
        - text: "-ва-"
          correct: false
        - text: "-овува-"
          correct: false
        - text: "-а-"
          correct: false
    - question: "Що відбувається з голосним звуком [о] в корені слова допомогти при утворенні недоконаного виду?"
      explanation: "Голосний [о] розширюється і чергується з [а], утворюючи форму допомагати."
      options:
        - text: "він чергується зі звуком [а]"
          correct: true
        - text: "він чергується зі звуком [і]"
          correct: false
        - text: "він повністю зникає з кореня"
          correct: false
        - text: "він залишається без змін"
          correct: false
    - question: "Яке специфічне чергування голосних відбувається у граматичній парі випекти та випікати?"
      explanation: "У цій парі ми бачимо класичний перехід відкритого [е] в більш закритий [і]."
      options:
        - text: "перехід звука [е] в [і]"
          correct: true
        - text: "перехід звука [о] в [а]"
          correct: false
        - text: "випадіння звука [е]"
          correct: false
        - text: "перехід звука [і] в [и]"
          correct: false
    - question: "Який суфікс варто використати для перетворення результативного слова додати на тривалий процес?"
      explanation: "Після основи, що закінчується на голосний, часто додається суфікс -ва-."
      options:
        - text: "-ва-"
          correct: true
        - text: "-ува-"
          correct: false
        - text: "-овува-"
          correct: false
        - text: "-юва-"
          correct: false
    - question: "На який склад має падати наголос у слові вирізати, якщо ми говоримо про тривалий процес?"
      explanation: "Недоконаний вид (процес) у цій парі отримує розтягнутий наголос на останній склад."
      options:
        - text: "на останній склад"
          correct: true
        - text: "на перший склад"
          correct: false
        - text: "на корінь слова"
          correct: false
        - text: "на префікс"
          correct: false
    - question: "Яке граматичне значення має слово викликати, якщо наголос чітко падає на його перший склад?"
      explanation: "Наголос на префіксі сигналізує про стислість і раптовість дії, тобто доконаний вид."
      options:
        - text: "одноразовий завершений факт"
          correct: true
        - text: "тривалий безперервний процес"
          correct: false
        - text: "регулярну рутинну звичку"
          correct: false
        - text: "дію без логічного кінця"
          correct: false
    - question: "Чому використання форми розказовувати вважається серйозною граматичною помилкою?"
      explanation: "Це приклад пастки надмірної суфіксації та хибної аналогії з іншими дієсловами."
      options:
        - text: "через надуживання суфіксом та хибну аналогію"
          correct: true
        - text: "через неправильне чергування голосних"
          correct: false
        - text: "через помилковий наголос у слові"
          correct: false
        - text: "через відсутність префікса"
          correct: false
    - question: "Яке з наведених дієслів найкраще підходить для детального опису багаторічного створення концепції?"
      explanation: "Слово вибудовували передає ідею повільного, масштабного і тривалого формування чогось нового."
      options:
        - text: "вибудовували"
          correct: true
        - text: "вибудували"
          correct: false
        - text: "збудували"
          correct: false
        - text: "побудували"
          correct: false
    - question: "Що символізує стародавня метафора палімпсесту в контексті вивчення видів українського дієслова?"
      explanation: "Вона ілюструє багатошаровість дії, де нове значення накладається на збережену результативну основу."
      options:
        - text: "багатошаровість дії та збереження основи"
          correct: true
        - text: "повне стирання первинного значення"
          correct: false
        - text: "відсутність будь-яких логічних зв'язків"
          correct: false
        - text: "миттєву результативність процесу"
          correct: false
    - question: "Який із наведених нижче варіантів описує довготривалий науковий процес, а не миттєвий результат?"
      explanation: "Формулювали — це вторинний недоконаний вид, який вказує на розтягнутий у часі процес."
      options:
        - text: "ми довго формулювали поняття"
          correct: true
        - text: "ми швидко сформулювали поняття"
          correct: false
        - text: "ми миттєво записали цей термін"
          correct: false
        - text: "ми успішно розробили новий метод"
          correct: false
    - question: "Яке українське дієслово варто використати для опису постійного, регулярного читання одних і тих самих книг?"
      explanation: "Дієслово перечитувати містить і префікс повторення, і суфікс тривалого процесу."
      options:
        - text: "перечитувати"
          correct: true
        - text: "читати"
          correct: false
        - text: "прочитати"
          correct: false
        - text: "перечитати"
          correct: false

- type: true-false
  title: "Правда чи вигадка: Видові тріади та чергування"
  instruction: "Визначте, чи є наведені твердження щодо українського дієслова істинними або хибними."
  items:
    - statement: "Вторинна імперфективація перетворює вже завершений результат на регулярну або тривалу дію."
      correct: true
      explanation: "Ми беремо результативне дієслово і за допомогою суфікса повертаємо йому тривалість."
    - statement: "Форма переписовувати є граматичною нормою сучасної української академічної мови."
      correct: false
      explanation: "Це помилкова форма, що виникла через гіперкорекцію. Нормативний варіант — переписувати."
    - statement: "Суфікс -ва- найчастіше додається до основ, які закінчуються на голосний звук."
      correct: true
      explanation: "Наприклад, у словах додати — додавати, відкрити — відкривати."
    - statement: "Дієслова доконаного виду завжди ідеально підходять для опису тривалих наукових процесів."
      correct: false
      explanation: "Для опису тривалих наукових процесів використовують вторинні недоконані дієслова."
    - statement: "Чергування голосного [о] з голосним [а] є одним із яскравих маркерів зміни виду дієслова."
      correct: true
      explanation: "Наприклад: допомогти (доконаний) — допомагати (недоконаний)."
    - statement: "Слова вирізати з наголосом на перший склад та вирізати з наголосом на останній мають однакове значення."
      correct: false
      explanation: "Наголос на префіксі означає завершену дію, а наголос на останньому складі — тривалий процес."
    - statement: "Дуративність означає, що дія має миттєвий і дуже несподіваний характер для мовця."
      correct: false
      explanation: "Дуративність (від латинського duratio) означає тривалість і безперервність дії."
    - statement: "Термін палімпсест використовується в цьому модулі як метафора для багатошарової структури українського дієслова."
      correct: true
      explanation: "Старий зміст (доконаний вид) просвічує крізь новий суфікс (недоконаний вид)."
    - statement: "Маркери часу, такі як часто або щодня, вимагають використання дієслів недоконаного виду."
      correct: true
      explanation: "Ці слова є маркерами ітеративності, тобто регулярної повторюваної дії."
    - statement: "Дієслово обґрунтовувати передає ідею постійного накопичення доказів, а не одноразового факту."
      correct: true
      explanation: "Воно підкреслює тривалий пошук аргументів у науковій сфері."
    - statement: "Для дієслів на зразок допомогти правильною формою процесу буде допомогти з додаванням слова завжди."
      correct: false
      explanation: "Правильною формою процесу буде допомагати, де відбувається обов'язкове чергування."
    - statement: "У слові випікати відбувається чергування [е] на [і], що свідчить про недоконаний вид."
      correct: true
      explanation: "Це класичне чергування, яке утворює процес від результативного випекти."
    - statement: "Ітеративність вказує на те, що дія була одноразовою і більше ніколи не повториться."
      correct: false
      explanation: "Ітеративність означає саме багаторазове повторення дії."
    - statement: "Наголос в українській мові може самостійно, без суфіксів, змінювати вид дієслова з доконаного на недоконаний."
      correct: true
      explanation: "Пари на кшталт розсипати — розсипати є прямим доказом цього явища."

