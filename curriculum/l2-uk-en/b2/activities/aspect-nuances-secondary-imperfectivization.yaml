- type: fill-in
  title: "Академічний контекст: вставте правильне дієслово"
  instruction: "Оберіть дієслово вторинного недоконаного виду, яке найкраще підходить для опису процесу."
  items:
    - sentence: "Вона завжди готова щиро _____ своїм друзям у будь-якій складній ситуації."
      answer: "допомагати"
      options: ["допомогти", "допомагати", "допоможе", "допомогла"]
      explanation: "Слово завжди є маркером регулярності, що вимагає недоконаного виду."
    - sentence: "Науковці роками продовжували ретельно _____ цей абсолютно нетрадиційний метод."
      answer: "обґрунтовувати"
      options: ["обґрунтувати", "обґрунтовувати", "сформулювати", "вирішити"]
      explanation: "Слово роками вказує на тривалий процес накопичення доказів."
    - sentence: "Щотижня студенти на семінарах детально _____ нові цікаві статті професора."
      answer: "переглядали"
      options: ["переглянули", "переглядали", "глянули", "додали"]
      explanation: "Щотижня вимагає ітеративної дії."
    - sentence: "Сучасна міжнародна компанія обов'язково _____ нове обладнання кожного кварталу."
      answer: "замовлятиме"
      options: ["замовить", "замовлятиме", "купить", "подарує"]
      explanation: "Кожного кварталу вказує на майбутню регулярну дію."
    - sentence: "У своїй новій статті автор дуже довго _____ це складне філософське поняття."
      answer: "формулює"
      options: ["сформулює", "формулює", "напише", "створить"]
      explanation: "Довго підкреслює дуративність процесу творчого пошуку."
    - sentence: "Під час довгих лекцій студенти постійно _____ всі важливі основні тези."
      answer: "записували"
      options: ["записали", "записували", "вирізали", "написали"]
      explanation: "Постійно є прямим вказівником на ітеративність."
    - sentence: "Дослідники дуже поступово і обережно _____ нові змінні до свого масштабного експерименту."
      answer: "додавали"
      options: ["додали", "додавали", "дали", "вирішили"]
      explanation: "Поступово передає розтягнутість дії в часі."
    - sentence: "Україна продовжує надзвичайно болісно _____ свій публічний міський простір."
      answer: "перейменовувати"
      options: ["перейменувати", "перейменовувати", "переписати", "назвати"]
      explanation: "Дієслово продовжує вимагає інфінітива недоконаного виду."
    - sentence: "Історики регулярно годинами _____ старі затерті тексти, щоб знайти справжню істину."
      answer: "розшифровували"
      options: ["розшифрували", "розшифровували", "прочитали", "перемогли"]
      explanation: "Регулярно годинами вказує на постійне напруження сил."
    - sentence: "Спеціальна комісія прямо зараз ретельно _____ всі надані офіційні документи."
      answer: "перевіряє"
      options: ["перевірить", "перевіряє", "зафіксує", "сформулює"]
      explanation: "Зараз означає, що дія відбувається в момент мовлення як процес."
    - sentence: "Вчені намагаються чітко _____ кожен складний науковий термін у цій новій галузі."
      answer: "диференціювати"
      options: ["здиференціювати", "диференціювати", "записати", "обґрунтувати"]
      explanation: "Дієслово намагаються підкреслює тривалий і не завжди гарантований процес."
    - sentence: "Талановиті архітектори довго _____ візуальну концепцію цього нового міського простору."
      answer: "вибудовували"
      options: ["вибудували", "вибудовували", "записали", "сформулювали"]
      explanation: "Слово довго вимагає використання форми з розтягнутим суфіксом."
    - sentence: "Щоранку я регулярно і старанно _____ десять нових складних англійських слів."
      answer: "вивчаю"
      options: ["вивчу", "вивчаю", "прочитаю", "напишу"]
      explanation: "Щоранку вказує на ітеративну рутину."
