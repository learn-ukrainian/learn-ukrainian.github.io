- type: true-false
  title: "Граматичні та стилістичні правила"
  instruction: "Визначте, чи є ці твердження про норми української мови істинними."
  items:
    - statement: "Слово 'бувший' є нормативним українським літературним словом для діловодства."
      correct: false
      explanation: "Це слово є яскравим русизмом, його не існує в літературній нормі."
    - statement: "Для позначення соціальної ролі або посади в минулому слід вживати прикметник 'колишній'."
      correct: true
      explanation: "Наприклад: колишній президент, колишній вчитель."
    - statement: "Слово 'минулий' використовується виключно для опису хронологічного часу та періодів."
      correct: true
      explanation: "Минулий рік, минулий тиждень, минуле життя."
    - statement: "Активні дієприкметники минулого часу в українській мові утворюються за допомогою суфікса -вш-."
      correct: false
      explanation: "Суфікс -вш- ненормативний, питомі форми утворюються за допомогою суфікса -л-."
    - statement: "Дієприкметник 'пожовтілий' є нормативним, бо він утворений від неперехідного дієслова."
      correct: true
      explanation: "Він означає завершену зміну стану об'єкта."
    - statement: "Фраза 'я буду читатиму' є граматично правильною та прийнятною формою синтетичного майбутнього часу."
      correct: false
      explanation: "Не можна поєднувати допоміжне слово 'буду' з синтетичною формою. Правильно лише 'читатиму'."
    - statement: "Синтетичний майбутній час утворюється додаванням специфічних особових закінчень до інфінітива."
      correct: true
      explanation: "Інфінітив + му, меш, ме, мемо, мете, муть."
    - statement: "Замість використання важких активних дієприкметників українська мова надає перевагу підрядним реченням."
      correct: true
      explanation: "Це робить текст динамічнішим і природнішим."
    - statement: "Слово 'написавший' є правильним літературним перекладом англійської конструкції 'the one who wrote'."
      correct: false
      explanation: "Це калька. Правильно казати: 'той, хто написав'."
    - statement: "Канцелярит — це природний і дуже легкий стиль сучасної української розмовної мови."
      correct: false
      explanation: "Це важкий штучний бюрократичний стиль, з яким варто боротися."
    - statement: "Форма 'працюватимуть' використовується для третьої особи множини (вони)."
      correct: true
      explanation: "Вони працюватимуть, житимуть, аналізуватимуть."
    - statement: "Українська милозвучність гармонійно поєднується з активними формами на -ш- та -щ-."
      correct: false
      explanation: "Саме через милозвучність ці шиплячі форми відкидаються мовою."
    - statement: "Синтетичний майбутній час масово присутній у багатьох інших слов'янських мовах."
      correct: false
      explanation: "Це унікальна питома риса саме української мовотворчої традиції."
    - statement: "Постійне використання конструкції 'той, хто' замість дієприкметників є ознакою високої мовної культури."
      correct: true
      explanation: "Це демонструє розуміння глибоких синтаксичних структур мови."

- type: unjumble
  title: "Побудова правильних речень"
  instruction: "Розташуйте слова у правильному порядку, щоб утворити граматично нормативні речення."
  items:
    - words: ["Наступного", "року", "ми", "активно", "працюватимемо", "над", "створенням", "нової", "стратегії", "нашої", "компанії"]
      answer: "Наступного року ми активно працюватимемо над створенням нової стратегії нашої компанії"
    - words: ["Її", "колишній", "керівник", "завжди", "наголошував", "на", "важливості", "постійного", "навчання", "та", "розвитку"]
      answer: "Її колишній керівник завжди наголошував на важливості постійного навчання та розвитку"
    - words: ["Осінній", "вітер", "підхопив", "пожовтіле", "листя", "та", "швидко", "поніс", "його", "вздовж", "вулиці"]
      answer: "Осінній вітер підхопив пожовтіле листя та швидко поніс його вздовж вулиці"
    - words: ["Компанія", "вирішила", "терміново", "замінити", "застаріле", "обладнання", "на", "нашій", "великій", "сучасній", "фабриці"]
      answer: "Компанія вирішила терміново замінити застаріле обладнання на нашій великій сучасній фабриці"
    - words: ["Той", "хто", "запізнився", "на", "лекцію", "повинен", "тихо", "сісти", "на", "задні", "ряди"]
      answer: "Той хто запізнився на лекцію повинен тихо сісти на задні ряди"
    - words: ["Студент", "який", "успішно", "склав", "усі", "іспити", "отримає", "заслужену", "підвищену", "наукову", "стипендію"]
      answer: "Студент який успішно склав усі іспити отримає заслужену підвищену наукову стипендію"
    - words: ["Наступного", "тижня", "наша", "дослідницька", "команда", "ретельно", "аналізуватиме", "нові", "важливі", "статистичні", "дані"]
      answer: "Наступного тижня наша дослідницька команда ретельно аналізуватиме нові важливі статистичні дані"
    - words: ["У", "своїх", "майбутніх", "амбітних", "проєктах", "ми", "обов'язково", "враховуватимемо", "наш", "попередній", "досвід"]
      answer: "У своїх майбутніх амбітних проєктах ми обов'язково враховуватимемо наш попередній досвід"
    - words: ["Люди", "які", "вижили", "в", "цій", "жахливій", "катастрофі", "зараз", "проходять", "довгу", "реабілітацію"]
      answer: "Люди які вижили в цій жахливій катастрофі зараз проходять довгу реабілітацію"
    - words: ["Після", "серії", "невдач", "у", "нього", "залишилися", "лише", "зів'ялі", "надії", "на", "швидкий", "успіх"]
      answer: "Після серії невдач у нього залишилися лише зів'ялі надії на швидкий успіх"

