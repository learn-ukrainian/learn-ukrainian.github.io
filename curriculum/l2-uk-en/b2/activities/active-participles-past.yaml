- type: quiz
  title: "Розпізнавання нормативних форм"
  instruction: "Оберіть одну правильну відповідь на кожне запитання."
  items:
    - question: "Яке з цих слів є нормативним українським активним дієприкметником?"
      explanation: "Слово 'пожовтілий' утворено від неперехідного дієслова доконаного виду."
      options:
        - text: "пожовтілий"
          correct: true
        - text: "прочитавший"
          correct: false
        - text: "зробивший"
          correct: false
        - text: "написавший"
          correct: false
    - question: "Яке з наведених слів є типовим русизмом і порушує мовну норму?"
      explanation: "Форми з суфіксом -вш- (запізнившийся) не характерні для української мови."
      options:
        - text: "запізнившийся"
          correct: true
        - text: "посивілий"
          correct: false
        - text: "змарнілий"
          correct: false
        - text: "застарілий"
          correct: false
    - question: "Як граматично правильно перекласти словосполучення 'the former president'?"
      explanation: "Слово 'колишній' ідеально описує статуси та ролі людей у минулому."
      options:
        - text: "колишній президент"
          correct: true
        - text: "бувший президент"
          correct: false
        - text: "минулий президент"
          correct: false
        - text: "відпрацьований президент"
          correct: false
    - question: "Який із варіантів є граматично правильною формою синтетичного майбутнього часу?"
      explanation: "Форма утворюється злиттям інфінітива та закінчення -му."
      options:
        - text: "працюватиму"
          correct: true
        - text: "буду працюватиму"
          correct: false
        - text: "маю працював"
          correct: false
        - text: "працювати маю"
          correct: false
    - question: "До якої частини мови належить нормативне слово 'колишній'?"
      explanation: "Це прикметник, що перейшов у цю категорію через лексикалізацію."
      options:
        - text: "прикметник"
          correct: true
        - text: "іменник"
          correct: false
        - text: "дієслово"
          correct: false
        - text: "прислівник"
          correct: false
    - question: "Яке слово слід використати для позначення часу або досвіду, що вже пройшов?"
      explanation: "Хронологічні відрізки та досвід описуються прикметником 'минулий'."
      options:
        - text: "минулий"
          correct: true
        - text: "колишній"
          correct: false
        - text: "бувший"
          correct: false
        - text: "застарілий"
          correct: false
    - question: "Яка форма дієслова історично лежить в основі синтетичного майбутнього часу?"
      explanation: "Для утворення використовується повний інфінітив з суфіксом -ти."
      options:
        - text: "інфінітив"
          correct: true
        - text: "минулий час"
          correct: false
        - text: "теперішній час"
          correct: false
        - text: "наказовий спосіб"
          correct: false
    - question: "Чому українська мова історично уникає форм на кшталт 'перемігший' або 'виживші'?"
      explanation: "Такі шиплячі суфікси руйнують фонетичну гармонію та ритм речення."
      options:
        - text: "вони порушують милозвучність"
          correct: true
        - text: "вони занадто короткі"
          correct: false
        - text: "вони звучать занадто офіційно"
          correct: false
        - text: "це діалектизми заходу"
          correct: false
    - question: "Яке слово найкраще описує старе листя восени українською мовою?"
      explanation: "Це класичний приклад нормативного дієприкметника на -лий."
      options:
        - text: "пожовтіле"
          correct: true
        - text: "пожовтівше"
          correct: false
        - text: "жовтіюче"
          correct: false
        - text: "жовтяве"
          correct: false
    - question: "Що є єдиним правильним відповідником до російського слова 'бывший'?"
      explanation: "Не існує українського слова 'бувший', його замінюють на 'колишній'."
      options:
        - text: "колишній"
          correct: true
        - text: "минулий"
          correct: false
        - text: "бувший"
          correct: false
        - text: "старий"
          correct: false
    - question: "Від яких дієслів можуть утворюватися нормативні активні дієприкметники на -лий?"
      explanation: "Дієслово має не вимагати додатка та описувати завершений стан."
      options:
        - text: "від неперехідних доконаного виду"
          correct: true
        - text: "від перехідних доконаного виду"
          correct: false
        - text: "від неперехідних недоконаного виду"
          correct: false
        - text: "від будь-яких дієслів"
          correct: false
    - question: "Який синтаксичний засіб використовують замість ненормативних дієприкметників?"
      explanation: "Це додає реченню динаміки та граматичної точності."
      options:
        - text: "підрядне означальне речення"
          correct: true
        - text: "вставне слово"
          correct: false
        - text: "дієприслівниковий зворот"
          correct: false
        - text: "однорідні присудки"
          correct: false
    - question: "Який варіант є правильним перекладом англійської фрази 'the one who answered'?"
      explanation: "Замість 'відповівший' використовуємо займенник із підрядним реченням."
      options:
        - text: "той, хто відповів"
          correct: true
        - text: "відповівший"
          correct: false
        - text: "відповідаючий"
          correct: false
        - text: "відповілий"
          correct: false
    - question: "Що означає лінгвістичний термін 'канцелярит' у контексті нашої теми?"
      explanation: "Канцелярит нав'язав нам багато невластивих форм через офіційні документи."
      options:
        - text: "важкий офіційно-діловий стиль"
          correct: true
        - text: "легкий розмовний стиль"
          correct: false
        - text: "поетична мова"
          correct: false
        - text: "стародавня мова"
          correct: false
    - question: "Як граматично правильно сказати про людину, яка запізнилася на зустріч?"
      explanation: "Форма на -вш- тут абсолютно недоречна."
      options:
        - text: "той, хто запізнився"
          correct: true
        - text: "запізнившийся"
          correct: false
        - text: "спізнивший"
          correct: false
        - text: "той що запізнив"
          correct: false

- type: fill-in
  title: "Заміна русизмів на підрядні речення"
  instruction: "Оберіть правильний варіант, щоб замінити калькований дієприкметник природною конструкцією."
  items:
    - sentence: "Чоловік, _____ першим, отримав нагороду."
      answer: "який прийшов"
      options: ["який прийшов", "прийшовший", "який прийшовший", "прийшлим"]
    - sentence: "Студенти, _____ іспит, можуть бути вільні."
      answer: "які склали"
      options: ["які склали", "склавші", "що склавші", "складені"]
    - sentence: "Ми шукаємо фахівця, _____ кілька іноземних мов."
      answer: "який знає"
      options: ["який знає", "знавшого", "який знавший", "знаного"]
    - sentence: "Команда, _____ у турнірі, отримала великий кубок."
      answer: "що перемогла"
      options: ["що перемогла", "перемігша", "перемігшая", "що перемігша"]
    - sentence: "Пасажири, _____ в катастрофі, зараз проходять реабілітацію."
      answer: "які вижили"
      options: ["які вижили", "виживші", "які виживші", "вижиті"]
    - sentence: "Автор, _____ цю статтю, сьогодні виступає на сцені."
      answer: "який написав"
      options: ["який написав", "написавший", "що написавший", "написалий"]
    - sentence: "Працівник, _____ помилку, зобов'язаний її виправити."
      answer: "що зробив"
      options: ["що зробив", "зробивший", "що зробивший", "зроблений"]
    - sentence: "Жінка, _____ аварію на перехресті, викликала поліцію."
      answer: "яка побачила"
      options: ["яка побачила", "побачивша", "що побачивша", "побачена"]
    - sentence: "Учні, _____ складний текст до кінця, підняли руки."
      answer: "що прочитали"
      options: ["що прочитали", "прочитавші", "які прочитавші", "прочитані"]
    - sentence: "Водій, _____ правила дорожнього руху, отримав штраф."
      answer: "який порушив"
      options: ["який порушив", "порушивший", "що порушивший", "порушений"]
    - sentence: "Люди, _____ цей благодійний проєкт, заслуговують на повагу."
      answer: "які створили"
      options: ["які створили", "створивші", "що створивші", "створені"]
    - sentence: "Клієнт, _____ наш новий товар, залишив позитивний відгук."
      answer: "який купив"
      options: ["який купив", "купивший", "що купивший", "куплений"]
    - sentence: "Спортсмен, _____ золоту медаль на змаганнях, дає інтерв'ю."
      answer: "що здобув"
      options: ["що здобув", "здобувший", "який здобувший", "здобутий"]
    - sentence: "Той, _____ на першу лекцію, має сісти на вільне місце ззаду."
      answer: "хто запізнився"
      options: ["хто запізнився", "що запізнився", "хто запізнившийся", "запізнившийся"]

- type: mark-the-words
  title: "Нормативні форми у художньому тексті"
  instruction: "Знайдіть і позначте всі нормативні активні дієприкметники минулого часу на -лий."
  text: "Осінній вітер підхопив пожовтіле листя і поніс його вздовж порожньої вулиці. У скрині на старому горищі вона знайшла застарілий рецепт бабусі. Її посивіле волосся було акуратно зібране на потилиці. На столі у вазі стояли зів'ялі квіти, які ніхто не поспішав викидати."
  answers: 
    - "пожовтіле"
    - "застарілий"
    - "посивіле"
    - "зів'ялі"

- type: fill-in
  title: "Колишній, минулий чи майбутній?"
  instruction: "Оберіть правильний прикметник для контексту."
  items:
    - sentence: "Мій _____ керівник завжди був дуже вимогливим до деталей."
      answer: "колишній"
      options: ["колишній", "минулий", "бувший", "старий"]
    - sentence: "Цей _____ рік приніс нам дуже багато нових викликів."
      answer: "минулий"
      options: ["минулий", "колишній", "застарілий", "бувший"]
    - sentence: "Ми детально обговорили наші _____ плани на наступний квартал."
      answer: "майбутні"
      options: ["майбутні", "минулі", "колишні", "наступні"]
    - sentence: "Її _____ чоловік зараз живе і працює в іншому місті."
      answer: "колишній"
      options: ["колишній", "минулий", "старий", "бувший"]
    - sentence: "На _____ тижні ми успішно завершили цей великий проєкт."
      answer: "минулому"
      options: ["минулому", "колишньому", "застарілому", "старому"]
    - sentence: "Цей _____ завод тепер перетворили на сучасний просторий артпростір."
      answer: "колишній"
      options: ["колишній", "минулий", "вживаний", "бувший"]
    - sentence: "Економічні інвестиції забезпечать стабільність для _____ поколінь."
      answer: "майбутніх"
      options: ["майбутніх", "минулих", "колишніх", "старих"]
    - sentence: "Він дуже не любить згадувати свій _____ досвід роботи."
      answer: "минулий"
      options: ["минулий", "колишній", "застарілий", "бувший"]
    - sentence: "Наша _____ вчителька математики нещодавно вийшла на пенсію."
      answer: "колишня"
      options: ["колишня", "минула", "стара", "бувша"]
    - sentence: "У _____ часі це нестандартне дієслово має зовсім інше закінчення."
      answer: "минулому"
      options: ["минулому", "колишньому", "вживаному", "застарілому"]
    - sentence: "Її _____ професія була безпосередньо пов'язана з медициною."
      answer: "колишня"
      options: ["колишня", "минула", "бувша", "вживана"]
    - sentence: "Батьки щиро сподіваються на краще _____ для своїх дітей."
      answer: "майбутнє"
      options: ["майбутнє", "минуле", "колишнє", "прийдешнє"]
    - sentence: "Ми не можемо змінити наше _____, але завжди робимо правильні висновки."
      answer: "минуле"
      options: ["минуле", "колишнє", "застаріле", "бувше"]
    - sentence: "Мій _____ колега несподівано запропонував мені нову роботу."
      answer: "колишній"
      options: ["колишній", "минулий", "бувший", "вживаний"]

- type: fill-in
  title: "Лаконічний синтетичний майбутній час"
  instruction: "Ущільніть речення: оберіть синтетичну форму замість аналітичної конструкції з 'буду'."
  items:
    - sentence: "Наступного року я _____ в столичному університеті."
      answer: "навчатимуся"
      options: ["навчатимуся", "навчуся", "буду навчатимуся", "навчався"]
    - sentence: "Ми _____ над цим складним проєктом ще кілька місяців."
      answer: "працюватимемо"
      options: ["працюватимемо", "працюємо", "будемо працюватимемо", "працювали"]
    - sentence: "Ти _____ мені кожного вечора після роботи?"
      answer: "телефонуватимеш"
      options: ["телефонуватимеш", "зателефонуєш", "будеш телефонуватимеш", "телефонував"]
    - sentence: "Вона дуже уважно _____ нові дані для цього звіту."
      answer: "аналізуватиме"
      options: ["аналізуватиме", "проаналізує", "буде аналізуватиме", "аналізувала"]
    - sentence: "Вони безкомпромісно _____ свої власні інтереси в суді."
      answer: "захищатимуть"
      options: ["захищатимуть", "захистять", "будуть захищатимуть", "захищали"]
    - sentence: "Ви _____ участь у цій міжнародній науковій конференції?"
      answer: "братимете"
      options: ["братимете", "візьмете", "будете братимете", "брали"]
    - sentence: "Я завжди з вдячністю _____ твою неоціненну підтримку."
      answer: "пам'ятатиму"
      options: ["пам'ятатиму", "запам'ятаю", "буду пам'ятатиму", "пам'ятав"]
    - sentence: "Наш головний керівник _____ останні результати роботи завтра."
      answer: "презентуватиме"
      options: ["презентуватиме", "презентує", "буде презентуватиме", "презентував"]
    - sentence: "Ми своєчасно _____ вам про всі важливі організаційні зміни."
      answer: "повідомлятимемо"
      options: ["повідомлятимемо", "повідомимо", "будемо повідомлятимемо", "повідомляли"]
    - sentence: "Ти й надалі _____ цю складну ситуацію під повним контролем?"
      answer: "триматимеш"
      options: ["триматимеш", "потримаєш", "будеш триматимеш", "тримав"]
    - sentence: "Студенти активно _____ до складних підсумкових іспитів."
      answer: "готуватимуться"
      options: ["готуватимуться", "підготуються", "будуть готуватимуться", "готувалися"]
    - sentence: "Вона ефективно _____ абсолютно нові методи викладання матеріалу."
      answer: "використовуватиме"
      options: ["використовуватиме", "використає", "буде використовуватиме", "використовувала"]
    - sentence: "Я відверто _____ з тобою до самого кінця цього процесу."
      answer: "розмовлятиму"
      options: ["розмовлятиму", "порозмовляю", "буду розмовлятиму", "розмовляв"]
    - sentence: "Вони комплексно _____ інноваційну стратегію розвитку великої компанії."
      answer: "розроблятимуть"
      options: ["розроблятимуть", "розроблять", "будуть розроблятимуть", "розробляли"]

- type: error-correction
  title: "Викорінення русизмів"
  instruction: "Знайдіть і виправте ненормативні форми та канцеляризми."
  items:
    - sentence: "Кожен прийшовший на виставку отримав пам'ятний подарунок."
      error: "прийшовший"
      answer: "хто прийшов"
      options: ["хто прийшов", "що прийшовший", "який прийшовший", "прийшлий"]
      explanation: "Слово 'прийшовший' є русизмом. Використовуйте підрядне речення 'той, хто прийшов'."
    - sentence: "Ми придбали бувший у використанні сімейний автомобіль."
      error: "бувший"
      answer: "вживаний"
      options: ["вживаний", "минулий", "колишній", "старий"]
      explanation: "Щодо речей використовуємо слово 'вживаний', а не кальку 'бувший'."
    - sentence: "Наш бувший директор остаточно переїхав жити за кордон."
      error: "бувший"
      answer: "колишній"
      options: ["колишній", "минулий", "вживаний", "попередній"]
      explanation: "Щодо посади чи статусу в минулому вживаємо слово 'колишній'."
    - sentence: "Перемігша команда отримала свій заслужений головний приз."
      error: "Перемігша команда"
      answer: "Команда, яка перемогла,"
      error_type: "phrase"
      options: ["Команда, яка перемогла,", "Команда-переможець", "Переможена команда", "Команда, що перемігша"]
      explanation: "Замінюємо неприродний зворот на підрядне означальне речення."
    - sentence: "Він завжди був людиною, знавшою всі наші робочі секрети."
      error: "знавшою"
      answer: "яка знала"
      options: ["яка знала", "що знавшою", "знаючою", "знавша"]
