  instruction: Заповніть пропуски, обравши правильні слова.
- type: fill-in
  title: Оберіть правильне слово для кожного речення
  items:
  - sentence: Вдала презентація здатна переконати інвесторів та надихнути всю вашу
      команду на нові звершення.
    answer: презентація
    options:
    - презентація
    - декларація
    - маніпуляція
    - констатація
  - sentence: Фундаментом якісної підготовки є аналіз потреб вашої цільової аудиторії
      перед зустріччю.
    answer: аудиторії
    options:
    - аудиторії
    - території
    - директорії
    - категорії
  - sentence: Головна теза виступу повинна містити вашу власну, чітку професійну позицію.
    answer: теза
    options:
    - теза
    - фраза
    - проза
    - пауза
  - sentence: Правильний висновок має надійно закріпити ідею в довгостроковій пам'яті
      слухачів.
    answer: висновок
    options:
    - висновок
    - вступ
    - текст
    - слайд
  - sentence: На одному екрані має бути не більше шести коротких рядків тексту, щоб
      слайд не був перевантаженим.
    answer: слайд
    options:
    - слайд
    - файл
    - документ
    - аркуш
  - sentence: Слово власне найкраще підходить для коректного перекладу англійської
      конструкції actually.
    answer: власне
    options:
    - власне
    - актуально
    - дійсно
    - сильно
  - sentence: Коротке слово отже є класичним інструментом для переходу до підсумків.
    answer: отже
    options:
    - отже
    - так
    - оскільки
    - проте
  - sentence: Ви повинні впевнено аргументувати свою позицію впродовж усієї основної
      частини.
    answer: аргументувати
    options:
    - аргументувати
    - ігнорувати
    - критикувати
    - блокувати
  - sentence: Важливо підтримувати постійний зоровий контакт із людьми в просторому
      залі.
    answer: контакт
    options:
    - контакт
    - антракт
    - контраст
    - варіант
  - sentence: Підсумовуючи усе сказане, я хочу зробити наголос на наших головних перевагах.
    answer: Підсумовуючи
    options:
    - Підсумовуючи
    - Починаючи
    - Аналізуючи
    - Слухаючи
  instruction: Оберіть правильне слово для заповнення пропуску.
- type: error-correction
  title: Виправте мовні помилки та кальки
  instruction: Знайдіть і виправте типові помилки ділового мовлення.
  items:
  - sentence: Актуально, я не погоджуюся з цим рішенням.
    error: Актуально
    answer: Власне
    options:
    - Власне
    - Справді
    - Зараз
    - Точно
    explanation: Слово актуально означає на часі. Англійське actually слід перекладати
      як власне.
  - sentence: Так, перейдімо нарешті до нашого наступного слайда.
    error: Так
    answer: Отже
    options:
    - Отже
    - Окей
    - Добре
    - Далі
    explanation: Починати речення з так (калька з so) звучить неприродно. Краще використовувати
      отже або тож.
  - sentence: Це питання було розглянуто нашою командою.
    error: було розглянуто
    answer: розглянула
    options:
    - розглянула
    - подивилася
    - вирішила
    - зробила
    error_type: construction
    explanation: 'Сучасний діловий стиль вимагає уникати безособового пасиву на користь
      активного стану: Команда розглянула.'
  - sentence: Ми маємо приймати участь у цій важливій конференції.
    error: приймати участь
    answer: брати участь
    options:
    - брати участь
    - робити участь
    - грати участь
    - мати участь
    explanation: Приймати участь — це калька. Правильний український вислів — брати
      участь.
  - sentence: Цей проєкт є самий кращий у нашому портфоліо.
    error: самий кращий
    answer: найкращий
    options:
    - найкращий
    - більш кращий
    - дуже кращий
    - супер кращий
    explanation: Ступені порівняння прикметників утворюються за допомогою префікса
      най-, а не слова самий.
  - sentence: Вона получає високу зарплату у відділі продажів.
    error: получає
    answer: отримує
    options:
    - отримує
    - заробляє
    - має
    - бере
    explanation: Получати — це русизм. Українською слід казати отримувати або одержувати.
  - sentence: Давайте поговоримо про наші слідуючі кроки.
    error: слідуючі
    answer: наступні
    options:
    - наступні
    - майбутні
    - подальші
    - нові
    explanation: Слово слідуючий є русизмом. Правильно казати наступний.
  - sentence: Ми маємо співпадати з графіком нашої розробки.
    error: співпадати
    answer: збігатися
    options:
    - збігатися
    - відповідати
    - дотримуватися
    - поєднуватися
    explanation: В українській мові думки, події або графіки збігаються, а не співпадають.
  - sentence: Я хочу підняти питання про фінансування проєкту.
    error: підняти питання
    answer: порушити питання
    options:
    - порушити питання
    - сказати питання
    - зробити питання
    - відкрити питання
    explanation: Питання не можна фізично підняти. Правильний вислів — порушити питання.
  - sentence: Ця проблема мішає нам працювати ефективно.
    error: мішає
    answer: заважає
    options:
    - заважає
    - шкодить
    - зупиняє
    - блокує
    explanation: Мішати можна кашу ложкою. А працювати щось — заважає.
- type: mark-the-words
  title: Знайдіть дієслова у тексті
  instruction: Знайдіть і позначте всі дієслова активного стану в наведеному уривку.
  text: Ми уважно проаналізували ці фінансові показники. Наша команда успішно завершила
    складне дослідження ринку. Я особисто гарантую високу якість цього інноваційного
    продукту. Керівництво підтримало нашу нову стратегію розвитку.
  answers:
  - проаналізували
  - завершила
  - гарантую
  - підтримало
- type: select
  title: Оберіть усі правильні варіанти
  items:
  - question: Які з цих слів є правильними українськими відповідниками для англійського
      actually?
    options:
    - text: власне
      correct: true
    - text: насправді
      correct: true
    - text: фактично
      correct: true
    - text: актуально
      correct: false
