      correct: true
    - text: основна частина
      correct: true
    - text: висновок
      correct: true
    - text: кава-брейк
      correct: false
    min_correct: 3
    explanation: Це три фундаментальні блоки будь-якого виступу.
  - question: Які інструменти належать до невербальної комунікації?
