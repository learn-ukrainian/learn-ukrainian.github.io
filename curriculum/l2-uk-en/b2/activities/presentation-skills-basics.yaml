      correct: true
    - text: було розглянуто
      correct: false
    - text: команда провела
      correct: true
    - text: я пропоную
      correct: true
    min_correct: 3
    explanation: Активний стан містить живого суб'єкта дії (ми, команда, я).
  - question: Які правила стосуються візуального мінімалізму слайдів?
    options:
