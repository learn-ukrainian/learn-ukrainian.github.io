      correct: true
    - text: пришвидшення серцебиття
      correct: true
    - text: абсолютна розслабленість м'язів
      correct: false
    - text: повільне та спокійне дихання
      correct: false
    min_correct: 2
    explanation: Стрес спричиняє викид гормонів та пришвидшує ритм серця.
  - question: Які шрифти згадані як сучасні українські гарнітури для бізнесу?
    options:
