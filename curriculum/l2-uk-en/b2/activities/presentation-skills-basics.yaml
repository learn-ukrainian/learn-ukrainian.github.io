- type: reading
  title: 'Аналіз тексту: Сучасна доповідь'
  text: 'Професійна презентація в сучасному бізнес-середовищі — це процес переконання
    та обміну цінностями. Успішна доповідь має чітку мету: змінити думку аудиторії
    або спонукати до дії. Кожна хвилина уваги слухачів є цінним ресурсом, який не
    можна марнувати на загальні фрази. Ваша мета — додавати цінність кожним реченням.
    Сучасний стиль вимагає інтерактивності та відмови від читання з папірця. Ефективна
    комунікація має трискладову архітектуру: вступ, основна частина та висновок.

    '
  tasks:
  - Яка головна мета сучасної професійної презентації?
  - Чому не варто просто читати текст зі слайдів?
  - З яких трьох частин складається класична архітектура виступу?
  - Як ви розумієте необхідність додавати цінність кожним реченням?
- type: true-false
  title: Правильно чи неправильно?
  instruction: Визначте, чи відповідають ці твердження правилам успішної презентації.
  items:
  - statement: Страх перед публічним виступом є неприродною реакцією, якої професіонали
      не відчувають.
    correct: false
    explanation: Страх — це природна реакція, яку потрібно контролювати, а не повністю
      уникати.
  - statement: Квадратне дихання допомагає стабілізувати нервову систему перед виходом
      на сцену.
    correct: true
    explanation: Це дієва фізіологічна практика для подолання хвилювання.
  - statement: Аналіз цільової аудиторії не має впливати на вибір професійної термінології
      під час виступу.
    correct: false
    explanation: Складність термінології залежить саме від рівня обізнаності аудиторії.
  - statement: Радянський стиль доповіді характеризувався монотонним читанням тексту
      з папірця.
    correct: true
    explanation: Так, це був пасивний і відсторонений стиль.
  - statement: Основна частина виступу має займати близько вісімдесяти відсотків відведеного
      часу.
    correct: true
    explanation: Це класична пропорція для розкриття доказової бази.
  - statement: Теза — це просто загальна тема виступу, яка не потребує додаткової
      аргументації.
    correct: false
    explanation: Теза — це конкретна позиція, яку необхідно послідовно захищати.
  - statement: Мовна навігація допомагає слухачам орієнтуватися у структурі презентації.
    correct: true
    explanation: Фрази-зв'язки діють як звукові маяки для аудиторії.
  - statement: В українському діловому мовленні варто активно використовувати бюрократичний
      пасив.
    correct: false
    explanation: Сучасний стандарт вимагає використання активного стану дієслів.
  - statement: Правило шість на шість стосується мінімалізму тексту на одному слайді.
    correct: true
    explanation: Це означає максимум шість рядків по шість слів.
  - statement: Слова-паразити можна замінювати короткою мовчазною паузою.
    correct: true
    explanation: Тиша сприймається як ознака серйозності та інтелектуальної ваги.
- type: quiz
  title: Перевірте свої знання з підготовки до виступу
  items:
  - question: Що радять експерти для зниження рівня стресу безпосередньо перед виходом
      до людей?
    explanation: Квадратне дихання — це відома фізіологічна практика заспокоєння.
    options:
    - text: зробити техніку квадратного дихання
      correct: true
    - text: швидко перечитати весь свій текст
      correct: false
    - text: випити багато міцної кави
      correct: false
    - text: почати говорити якомога швидше
      correct: false
  - question: Яку головну функцію виконує вступ у класичній архітектурі публічного
      виступу?
    explanation: Вступ має захопити увагу слухачів у перші ж хвилини.
    options:
    - text: миттєво захопити увагу аудиторії
      correct: true
    - text: навести всі наявні статистичні дані
      correct: false
    - text: підбити загальні підсумки зустрічі
      correct: false
    - text: попрощатися з присутніми в залі
      correct: false
  - question: Чому правило шість на шість є таким важливим для створення слайдів?
    explanation: Воно забезпечує інформаційний мінімалізм і фокус на головному.
    options:
    - text: воно запобігає перевантаженню слайда текстом
      correct: true
    - text: воно вимагає створення рівно тридцяти шести слайдів
      correct: false
    - text: воно дозволяє розмістити максимальну кількість картинок
      correct: false
    - text: воно гарантує, що виступ триватиме рівно шість хвилин
      correct: false
  - question: Як найкраще пояснити концепцію мовної навігації під час професійної
      презентації?
    explanation: Це використання вербальних вказівників для переходу між думками.
    options:
    - text: система фраз для логічного структурування доповіді
      correct: true
    - text: вміння працювати з картою у конференц-залі
      correct: false
    - text: процес створення красивих візуальних діаграм
      correct: false
    - text: швидке перемикання слайдів за допомогою пульта
      correct: false
  - question: Яке слово варто використовувати українською мовою замість англійської
      кальки актуально?
    explanation: Слово власне найкраще передає значення англійського actually.
    options:
    - text: слово власне або насправді
      correct: true
    - text: слово дійсно або обов'язково
      correct: false
    - text: слово швидко або миттєво
      correct: false
    - text: слово важливо або пріоритетно
      correct: false
  - question: Чому сучасний український діловий стандарт категорично вимагає використання
      активного стану?
    explanation: Активний стан демонструє відповідальність та лідерську позицію.
    options:
    - text: він підкреслює особисту відповідальність спікера
      correct: true
    - text: він звучить набагато більш офіційно та формально
      correct: false
    - text: він дозволяє сховати справжнього суб'єкта дії
      correct: false
    - text: він робить речення значно довшими та складнішими
      correct: false
  - question: Яке слово ідеально підходить для переходу до фінальних висновків вашої
      доповіді?
    explanation: Отже — це класичний маркер переходу до висновків.
    options:
    - text: коротке слово отже
      correct: true
    - text: англійське слово так
      correct: false
    - text: розмовне слово коротше
      correct: false
    - text: вставне слово мабуть
      correct: false
  - question: Що повинна обов'язково містити завершальна частина вашої професійної
      презентації?
    explanation: Висновок має спонукати слухачів до дії.
    options:
    - text: сильний заклик до конкретної дії
      correct: true
    - text: довгий перелік використаної літератури
      correct: false
    - text: вибачення за можливі допущені помилки
      correct: false
    - text: розповідь про ваші особисті хобі
      correct: false
  - question: Як правильна відкрита мова тіла впливає на сприйняття вас слухачами?
    explanation: Відкрита поза транслює авторитет і спокій.
    options:
    - text: вона безперервно транслює ваш авторитет та спокій
      correct: true
    - text: вона показує, що ви сильно хвилюєтеся і боїтеся
      correct: false
    - text: вона змушує аудиторію дивитися тільки на екран
      correct: false
    - text: вона заважає вам правильно дихати і говорити
      correct: false
  - question: У чому полягає різниця між темою виступу та його головною тезою?
    explanation: Тема — це сфера інтересів, а теза — це конкретне твердження, яке
      треба захищати.
    options:
    - text: теза є конкретним аргументом, який потрібно захищати
      correct: true
    - text: теза завжди набагато довша за звичайну тему
      correct: false
    - text: тема стосується фінансів, а теза стосується психології
      correct: false
    - text: між ними немає абсолютно жодної принципової різниці
      correct: false
  instruction: Оберіть правильну відповідь.
- type: match-up
  title: Знайдіть відповідність між терміном та його значенням
  pairs:
  - left: Цільова аудиторія
    right: Люди, чиї потреби треба врахувати під час виступу
  - left: Квадратне дихання
    right: Фізіологічна практика для подолання сильного хвилювання
  - left: Мовна навігація
    right: Система фраз для переходу між логічними блоками
  - left: Правило шість на шість
    right: Принцип візуального мінімалізму на одному слайді
  - left: Активний стан
    right: Форма дієслова, що підкреслює відповідальність спікера
  - left: Слова-паразити
    right: Зайві звуки, яких слід позбутися за допомогою пауз
  - left: Заклик до дії
    right: Фінальний елемент висновку, який спонукає до кроків
  - left: Теза виступу
    right: Головна думка, яку оратор аргументує і захищає
  - left: Бюрократичний пасив
    right: Радянський стиль безособового та монотонного мовлення
  - left: Зоровий контакт
    right: Інструмент невербальної комунікації для зв'язку з залом
  instruction: З'єднайте відповідні елементи.
- type: group-sort
  title: 'Розподіліть фрази на дві групи: Бюрократичний пасив та Активний стан'
  groups:
  - name: Активний стан (Рекомендовано)
    items:
    - Ми детально розглянули ці важливі питання.
    - Я глибоко проаналізую тенденції ринку.
    - Керівництво ухвалило це цікаве рішення вчора.
    - Команда цілком успішно провела дослідження.
    - Ми приділяємо велику увагу оптимізації процесів.
  - name: Бюрократичний пасив (Слід уникати)
    items:
    - Питання було детально розглянуто під час наради.
    - Буде глибоко проаналізовано всі поточні тенденції.
    - Рішення було ухвалено керівництвом ще вчора.
    - Дослідження було проведено експертною командою.
    - Велика увага наразі приділяється оптимізації.
  instruction: Розподіліть елементи за групами.
- type: cloze
  title: Заповніть пропуски у тексті про підготовку до виступу
  passage: Кожна успішна {{1}} починається з глибокого аналізу потреб вашої {{2}}.
    Ви маєте розуміти, що публічний {{3}} — це не просто монотонне читання тексту,
    а активний {{4}} з присутніми. Щоб подолати {{5}} перед виходом на сцену, варто
    застосовувати {{6}} вправи. Під час самого виступу важливо підтримувати постійний
    зоровий {{7}} зі слухачами. Для полегшення сприйняття використовуйте мовну {{8}},
    наприклад, слова-зв'язки. Ваша головна {{9}} має бути чіткою та зрозумілою. Усі
    ваші {{10}} на екрані повинні підпорядковуватися правилу візуального {{11}}. Уникайте
    використання застарілого бюрократичного {{12}}, віддаючи перевагу {{13}} стану.
    Замість англійської кальки актуально використовуйте питоме слово {{14}}. А завершуючи
    доповідь, обов'язково зробіть логічний {{15}} та заклик до {{16}}.
