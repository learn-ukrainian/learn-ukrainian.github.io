      correct: true
    - text: AlfaBravo
      correct: true
    - text: Comic Sans
      correct: false
    min_correct: 3
    explanation: Ці українські шрифти підкреслюють корпоративну ідентичність.
  - question: Що входить до класичної трискладової структури презентації?
    options:
