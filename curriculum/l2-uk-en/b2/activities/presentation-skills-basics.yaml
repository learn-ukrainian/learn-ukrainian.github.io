      correct: true
    - text: широкі жести руками
      correct: true
    - text: пряма постава тіла
      correct: true
    - text: гучність голосу
      correct: false
    min_correct: 3
    explanation: Гучність належить до паралінгвістичних засобів, а не жестів.
