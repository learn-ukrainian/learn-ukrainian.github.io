- type: unjumble
  title: 'Побудуйте речення з ідіомами'
  instruction: 'Розташуйте слова у правильному порядку, щоб утворити граматично коректні та змістовні речення.'
  items:
    - words: ["Ми", "не", "повинні", "виносити", "сміття", "з", "хати", "і", "розповідати", "про", "конфлікт"]
      answer: 'Ми не повинні виносити сміття з хати і розповідати про конфлікт'
    - words: ["Ти", "просто", "народився", "в", "сорочці", "якщо", "зміг", "вижити", "у", "тій", "аварії"]
      answer: 'Ти просто народився в сорочці якщо зміг вижити у тій аварії'
    - words: ["Керівництво", "компанії", "має", "терміново", "вживати", "заходів", "для", "подолання", "цієї", "фінансової", "кризи"]
      answer: 'Керівництво компанії має терміново вживати заходів для подолання цієї фінансової кризи'
    - words: ["Після", "довгої", "лекції", "з", "філософії", "у", "мене", "була", "справжня", "каша", "в", "голові"]
      answer: 'Після довгої лекції з філософії у мене була справжня каша в голові'
    - words: ["Коли", "я", "побачив", "того", "страшного", "собаку", "моя", "душа", "одразу", "втекла", "в", "п'яти"]
      answer: "Коли я побачив того страшного собаку моя душа одразу втекла в п'яти"
    - words: ["Вони", "серйозно", "розбили", "глечик", "і", "тепер", "взагалі", "не", "розмовляють", "один", "із", "одним"]
      answer: 'Вони серйозно розбили глечик і тепер взагалі не розмовляють один із одним'
    - words: ["Ми", "маємо", "побачити", "ці", "неймовірні", "результати", "на", "власні", "очі", "перед", "підписанням", "контракту"]
      answer: 'Ми маємо побачити ці неймовірні результати на власні очі перед підписанням контракту'
    - words: ["Його", "образливі", "слова", "про", "мою", "непрофесійність", "дуже", "сильно", "дістали", "мене", "до", "живого"]
      answer: 'Його образливі слова про мою непрофесійність дуже сильно дістали мене до живого'
    - words: ["Замовляти", "дорогі", "речі", "через", "неперевірені", "сайти", "це", "означає", "купити", "кота", "в", "мішку"]
      answer: 'Замовляти дорогі речі через неперевірені сайти це означає купити кота в мішку'
    - words: ["Наш", "відділ", "аналітики", "вже", "другий", "день", "продовжує", "ламати", "голову", "над", "цією", "задачею"]
      answer: 'Наш відділ аналітики вже другий день продовжує ламати голову над цією задачею'
    - words: ["Він", "постійно", "носиться", "зі", "своєю", "новою", "ідеєю", "як", "із", "дуже", "писаною", "торбою"]
      answer: 'Він постійно носиться зі своєю новою ідеєю як із дуже писаною торбою'
    - words: ["На", "цій", "зустрічі", "програмістів", "я", "почувався", "як", "абсолютно", "зайве", "п'яте", "колесо", "до", "воза"]
      answer: "На цій зустрічі програмістів я почувався як абсолютно зайве п'яте колесо до воза"
    - words: ["Вони", "дуже", "довго", "обговорювали", "цей", "новий", "бюджет", "але", "й", "віз", "нині", "там"]
      answer: 'Вони дуже довго обговорювали цей новий бюджет але й віз нині там'
    - words: ["Ми", "маємо", "розуміти", "що", "жити", "на", "хлібі", "й", "воді", "це", "дуже", "важко"]
      answer: 'Ми маємо розуміти що жити на хлібі й воді це дуже важко'

- type: error-correction
  title: 'Виправте помилки: Боротьба із суржиком'
  instruction: 'Знайдіть русизми або граматичні помилки та оберіть правильний, літературний варіант.'
  items:
    - sentence: 'Ми повинні негайно приймати міри щодо цієї дуже критичної ситуації.'
      error: 'приймати міри'
      answer: 'вживати заходів'
      error_type: 'phrase'
      options:
        - 'робити міри'
        - 'приймати міри'
        - 'вживати заходів'
        - 'брати заходи'
      explanation: 'Вираз приймати міри є російською калькою. Правильно завжди казати вживати заходів.'
    - sentence: 'Ти маєш по крайній мірі щиро вибачитися перед нею за свої слова.'
      error: 'по крайній мірі'
      answer: 'принаймні'
      error_type: 'phrase'
      options:
        - 'в крайньому разі'
        - 'по крайній мірі'
        - 'мінімально'
        - 'принаймні'
      explanation: 'Правильний український літературний відповідник — це гарне слово принаймні.'
    - sentence: 'Коли він нарешті отримав нову престижну роботу, то був просто в сьомому небі від щастя.'
      error: 'в сьомому небі'
      answer: 'на сьомому небі'
      error_type: 'phrase'
      options:
        - 'в сьомому небі'
        - 'на сьомому небі'
        - 'біля сьомого неба'
        - 'під сьомим небом'
      explanation: 'В українській мові з цим просторовим виразом завжди вживається прийменник на.'
    - sentence: 'Левова доля нашого великого прибутку зараз йде на виплату податків.'
      error: 'Левова доля'
      answer: 'Левова частка'
      error_type: 'phrase'
      options:
        - 'Левова доля'
        - 'Левова частка'
        - 'Велика доля'
        - 'Левова частина'
      explanation: 'Доля — це життєвий шлях людини. Коли йдеться про частину чогось матеріального, кажуть частка.'
    - sentence: 'Я ніколи не повірю тобі, поки не побачу всі ці документи своїми очима.'
      error: 'своїми очима'
      answer: 'на власні очі'
      error_type: 'phrase'
      options:
        - 'своїми очима'
        - 'власними очима'
        - 'на власні очі'
        - 'на свої очі'
      explanation: 'Вираз своїми очима є плеоназмом і калькою, нормативно і питомо — бачити на власні очі.'
    - sentence: 'Я дуже щиро дякую тебе за неоціненну допомогу у цьому важкому проекті.'
      error: 'дякую тебе'
      answer: 'дякую тобі'
      error_type: 'phrase'
      options:
        - 'дякую тебе'
        - 'дякую тобі'
        - 'дякую вас'
        - 'подякую тебе'
      explanation: 'Дієслово дякувати в українській мові жорстко вимагає давального відмінка (кому? чому?).'
    - sentence: 'Не варто завжди зверхньо сміятися над ним, коли він робить якісь дрібні помилки.'
      error: 'сміятися над ним'
      answer: 'сміятися з нього'
      error_type: 'phrase'
      options:
        - 'сміятися над ним'
        - 'смішити над ним'
        - 'сміятися з нього'
        - 'сміятися від нього'
      explanation: 'В українській літературній мові правильно казати сміятися з когось або з чогось.'
    - sentence: 'Будь ласка, вибачте мене за те, що я так сильно запізнився на важливу нараду.'
      error: 'вибачте мене'
      answer: 'вибачте мені'
      error_type: 'phrase'
      options:
        - 'вибачте мене'
        - 'вибачайте мене'
        - 'вибачте мені'
        - 'пробачте мене'
      explanation: 'Дієслово вибачати також завжди вимагає після себе давального відмінка (кому?).'
    - sentence: 'Ми обов''язково будемо приймати участь у цій великій міжнародній конференції розробників.'
      error: 'приймати участь'
      answer: 'брати участь'
      error_type: 'phrase'
      options:
        - 'робити участь'
        - 'приймати участь'
        - 'мати участь'
        - 'брати участь'
      explanation: 'Вираз приймати участь — це калька. Українською участь виключно беруть.'
    - sentence: 'Він впевнено сказав, що обов''язково купить цей новий товар в любому випадку.'
      error: 'в любому випадку'
      answer: 'у будь-якому разі'
      error_type: 'phrase'
      options:
        - 'в любому випадку'
        - 'у кожному випадку'
        - 'у будь-якому разі'
        - 'в любий раз'
      explanation: 'Слово любий означає дорогий серцю. Правильний відповідник до any case — у будь-якому разі.'
    - sentence: 'Слідуючий поважний доповідач детально розкаже нам про поточну економічну ситуацію.'
      error: 'Слідуючий'
      answer: 'Наступний'
      error_type: 'word'
      options:
        - 'Слідуючий'
        - 'Наступний'
        - 'Слідувальний'
        - 'Ідучий'
      explanation: 'Слово слідуючий — це грубий росіянізм. Завжди використовуйте слово наступний.'
    - sentence: 'Цей розумний студент завжди був самим кращим у нашій університетській групі.'
      error: 'самим кращим'
      answer: 'найкращим'
      error_type: 'phrase'
      options:
        - 'самим кращим'
        - 'самим ліпшим'
        - 'найкращим'
        - 'найбільш кращим'
      explanation: 'Найвищий ступінь порівняння прикметників утворюється за допомогою префікса най-.'
    - sentence: 'Будь ласка, закрий двері, коли будеш остаточно виходити з нашої кімнати.'
      error: 'закрий'
      answer: 'зачини'
      error_type: 'word'
      options:
        - 'закрий'
        - 'зачини'
        - 'згорни'
        - 'відчини'
      explanation: 'Фізичні об''єкти зі стулками (двері, вікна) ми зачиняємо, а не закриваємо.'
    - sentence: 'Ми змогли нарешті получити довгоочікувану перемогу у цьому дуже складному змаганні.'
      error: 'получити'
      answer: 'здобути'
      error_type: 'word'
      options:
        - 'получити'
        - 'взяти'
        - 'здобути'
        - 'одержати'
      explanation: 'Слово получити — це суржик. Перемогу, досвід або освіту завжди здобувають.'

- type: select
  title: 'Оберіть правильні варіанти'
  instruction: 'Уважно прочитайте запитання і виберіть усі правильні відповіді з наведених.'
  items:
    - question: 'Які з цих фразеологічних виразів описують дуже сильні емоції (позитивні або негативні)?'
