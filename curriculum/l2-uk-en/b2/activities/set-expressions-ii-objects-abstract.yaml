- type: reading
  id: reading-01
  title: 'Первинне джерело: Сила слова та предметів'
  source: 'Адаптований текст про українську ментальність'
  text: |
    В українській культурі хата і предмети побуту завжди мали сакральне значення. 
    Коли хтось каже про необхідність не виносити сміття з хати, він має на увазі не просто прибирання, 
    а збереження таємниць свого роду від сторонніх очей. Цей захисний механізм допомагав українцям 
    виживати у складні часи. Так само і вираз про те, що людина народилася в сорочці, несе в собі 
    глибоку віру в особливий Божий захист і прихильність долі. Натомість коли між людьми виникав конфлікт, 
    говорили, що вони розбили глечик. Глечик символізував цілісність, і його руйнування означало безповоротний 
    розрив дружніх чи родинних зв'язків. Таким чином, предмети перетворювалися на міцні моральні орієнтири.
  tasks:
    - 'Що символізувало сміття у давніх віруваннях і чому його не виносили?'
    - 'Яке значення має вираз про народження в сорочці для розуміння долі?'
    - 'Чому саме глиняний глечик став метафорою людських стосунків?'

- type: essay-response
  title: 'Есе: Предмети як символи'
  source_reading: reading-01
  instruction: 'Напишіть розгорнуту відповідь на запитання.'
  prompt: |
    Проаналізуйте, як предмети побуту (хата, сміття, сорочка, глечик) відображають світогляд українського народу.
    Використайте у своєму есе щонайменше три нові фразеологізми з цього модуля.
  min_words: 150
  model_answer: |
    Українська фразеологія глибоко вкорінена у повсякденний побут наших предків.
    Кожен предмет мав своє особливе, сакральне значення. Наприклад, хата завжди сприймалася як
    безпечний простір, тому правило не виносити сміття з хати означало збереження родинних таємниць.
    Людина, якій вдалося уникнути великої небезпеки, вважалася такою, що народилася в сорочці,
    адже сорочка символізувала Божий захист від злих сил. З іншого боку, людські стосунки асоціювалися
    з крихким посудом: якщо друзі розбили глечик, їхній зв'язок руйнувався назавжди, як і розбита глина.
    Таким чином, матеріальний світ ставав дзеркалом емоцій, моральних переконань та соціальних норм.
  rubric:
    - criteria: 'Змістове наповнення'
      description: 'Есе глибоко розкриває тему світогляду через предмети побуту.'
      points: 40
    - criteria: 'Використання ідіом'
      description: 'Правильно та доречно використано щонайменше три фразеологізми.'
      points: 30
    - criteria: 'Граматична правильність'
      description: 'Текст не містить суттєвих лексичних та граматичних помилок.'
      points: 30

- type: true-false
  title: 'Правда чи хиба: Значення ідіом'
  instruction: 'Визначте, чи є правильним наведене пояснення сталого виразу.'
  items:
    - statement: 'Вираз народитися в сорочці означає мати дуже багатих батьків.'
      correct: false
      explanation: 'Цей вираз означає дивом уникнути небезпеки, бути дуже щасливим.'
    - statement: 'Фразеологізм виносити сміття з хати означає публічно обговорювати сімейні проблеми.'
      correct: true
      explanation: 'Саме тому радять цього не робити, щоб зберегти приватність.'
    - statement: 'Каша в голові описує стан людини, яка дуже хоче їсти.'
      correct: false
      explanation: 'Це означає ментальну плутанину, відсутність чітких думок.'
    - statement: 'Коли хтось має камінь на серці, він відчуває сильну тривогу або провину.'
      correct: true
      explanation: 'Камінь символізує важкий психологічний або емоційний тягар.'
    - statement: 'Вираз бути на сьомому небі використовується для опису сильного страху.'
      correct: false
      explanation: 'Цей вираз означає бути надзвичайно щасливим, відчувати ейфорію.'
    - statement: 'Форма приймати міри є типовою російською калькою.'
      correct: true
      explanation: 'Українською правильно і нормативно казати вживати заходів.'
    - statement: 'Вираз розбити глечик означає знайти новий цікавий проект для роботи.'
      correct: false
      explanation: 'Він означає серйозно посваритися, розірвати близькі стосунки.'
    - statement: 'Дістати до живого означає глибоко образити або зачепити людину.'
      correct: true
      explanation: 'Це метафора нанесення сильного емоційного та психологічного болю.'
    - statement: 'Слово принаймні є правильним українським відповідником до суржикового по крайній мірі.'
      correct: true
      explanation: 'По крайній мірі — це суржик і калька, яку не можна вживати.'
    - statement: "Коли кажуть душа в п'яти, мають на увазі фізичну втому після довгої ходьби."
      correct: false
      explanation: 'Цей вираз дуже влучно описує стан сильного, раптового переляку.'
    - statement: 'Вираз їсти чужий хліб означає таємно красти чужу їжу в офісі.'
      correct: false
      explanation: 'Він означає жити за чужий рахунок, не працювати самостійно.'
    - statement: 'Побити горшки — це абсолютний синонім до виразу розбити глечик.'
      correct: true
      explanation: 'Обидва ці вирази означають сварку і розрив дружніх стосунків.'
    - statement: 'Заварити кашу означає дуже швидко і успішно завершити важливий проект.'
      correct: false
      explanation: 'Це означає розпочати дуже складну, проблемну справу з поганими наслідками.'
    - statement: 'В ложці води втопити — це нашкодити людині через якусь абсолютну дрібницю.'
      correct: true
      explanation: 'Це означає бути дуже мстивим і жорстоким у дріб''язкових ситуаціях.'

- type: quiz
  title: 'Тест: Виберіть правильний фразеологізм'
  instruction: 'Оберіть варіант, який найкраще і найточніше підходить за змістом.'
  items:
    - question: 'Який сталий вираз найкраще описує ситуацію, коли людина дивом вижила в жахливій аварії?'
      options:
        - text: 'народилася в сорочці'
          correct: true
        - text: 'розбила глечик'
          correct: false
        - text: 'сіла в калошу'
          correct: false
        - text: 'заварила кашу'
          correct: false
      explanation: 'Цей вираз історично означає уникнути смертельної небезпеки, бути везучим.'
    - question: 'Як правильно сказати керівнику про необхідність швидко реагувати на критичну ситуацію в компанії?'
      options:
        - text: 'приймати міри'
          correct: false
        - text: 'вживати заходів'
          correct: true
        - text: 'робити дії'
          correct: false
        - text: 'брати участь'
          correct: false
      explanation: 'Правильний та питомий офіційно-діловий вираз — вживати заходів.'
    - question: 'Який фразеологізм вказує на те, що друзі дуже серйозно посварилися і більше ніколи не спілкуються?'
      options:
        - text: 'з''їли пуд солі'
          correct: false
        - text: 'розбили глечик'
          correct: true
        - text: 'розсьорбали кашу'
          correct: false
        - text: 'народилися в сорочці'
          correct: false
      explanation: 'Розбити глечик (або побити горшки) однозначно означає розірвати стосунки.'
    - question: "Що означає яскравий вираз душа в п'яти у щоденному, повсякденному спілкуванні?"
      options:
        - text: 'велика радість'
          correct: false
        - text: 'сильний біль у ногах'
          correct: false
        - text: 'раптовий і сильний переляк'
          correct: true
        - text: 'бажання швидко втекти'
          correct: false
      explanation: 'Цей експресивний вираз використовується для опису дуже сильного страху.'
    - question: 'Якою фразою можна найкраще описати людину, яка є надзвичайно щасливою після перемоги?'
      options:
        - text: 'вона на сьомому небі'
          correct: true
        - text: 'вона в сьомому небі'
          correct: false
        - text: 'у неї камінь на серці'
          correct: false
        - text: 'вона має вітер у голові'
          correct: false
      explanation: 'Правильно і нормативно використовувати прийменник на: на сьомому небі.'
    - question: 'Який вираз ми використовуємо, коли студенту дуже складно зрозуміти якусь нову тему?'
      options:
        - text: 'вітер у голові'
          correct: false
        - text: 'камінь на серці'
          correct: false
        - text: 'каша в голові'
          correct: true
        - text: "душа в п'яти"
          correct: false
      explanation: 'Каша в голові дуже влучно описує відсутність чіткості мислення, ментальну плутанину.'
    - question: 'Яким правильним словосполученням треба назавжди замінити типовий суржиковий вираз по крайній мірі?'
      options:
        - text: 'в крайньому разі'
          correct: false
        - text: 'на крайній випадок'
          correct: false
        - text: 'принаймні'
          correct: true
        - text: 'найменше'
          correct: false
      explanation: 'Єдиний нормативний український відповідник — це красиве слово принаймні.'
    - question: 'Як правильно сказати, коли ви особисто були єдиним свідком якоїсь важливої суспільної події?'
      options:
        - text: 'бачити своїми очима'
          correct: false
        - text: 'бачити на власні очі'
          correct: true
        - text: 'дивитися своїм зором'
          correct: false
        - text: 'спостерігати своїми очима'
          correct: false
      explanation: 'Бачити своїми очима є калькою і плеоназмом, єдино правильно — бачити на власні очі.'
    - question: 'Яка фраза найкраще і найбільш образно описує найбільшу або найкращу частину прибутку компанії?'
      options:
        - text: 'левова доля'
          correct: false
        - text: 'левова частка'
          correct: true
        - text: 'велика доля'
          correct: false
        - text: 'велика частка'
          correct: false
      explanation: 'Слово доля означає долю людини (fate). Коли ми говоримо про частину чогось, це — частка.'
    - question: 'Що означає відомий фразеологізм сісти в калошу в сучасному контексті професійної діяльності?'
      options:
        - text: 'зазнати ганебного провалу'
          correct: true
        - text: 'отримати підвищення'
          correct: false
        - text: 'змінити місце роботи'
          correct: false
        - text: 'почати нову справу'
          correct: false
      explanation: 'Сісти в калошу означає опинитися в дуже незручному, комічному або ганебному становищі перед усіма.'
    - question: 'Який вираз найкраще означає придбати щось дуже дороге без жодної попередньої перевірки якості?'
      options:
        - text: 'купити кота в мішку'
          correct: true
        - text: 'сісти в калошу'
          correct: false
        - text: 'як з писаною торбою'
          correct: false
        - text: 'відбивати хліб'
          correct: false
      explanation: 'Купити кота в мішку — це універсальне застереження від фінансової або життєвої необачності.'
    - question: 'Що саме означає фразеологізм ламати голову в контексті важкої інтелектуальної або наукової праці?'
      options:
        - text: 'напружено думати над проблемою'
          correct: true
        - text: 'отримати серйозну травму'
          correct: false
        - text: 'посваритися з новим колегою'
          correct: false
        - text: 'забути дуже важливу інформацію'
          correct: false
      explanation: 'Ламати голову описує складний процес пошуку рішення або аналізу дуже заплутаних даних.'
    - question: 'Який вираз чітко означає, що доросла і здорова людина живе виключно за чужий фінансовий рахунок?'
      options:
        - text: 'їсти чужий хліб'
          correct: true
        - text: 'жити на хлібі й воді'
          correct: false
        - text: 'відбивати хліб'
          correct: false
        - text: 'пекти чужий хліб'
          correct: false
      explanation: 'Цей вираз використовується для опису безвідповідального утриманця, який не приносить користі.'
    - question: "Що символізує і означає вираз п'яте колесо до воза в контексті злагодженої командної роботи?"
      options:
        - text: 'абсолютно зайву людину або річ'
          correct: true
        - text: 'додатковий запасний план'
          correct: false
        - text: 'своєчасну додаткову допомогу'
          correct: false
        - text: 'найважливішу деталь механізму'
          correct: false
      explanation: 'П''яте колесо ніяк не допомагає возу їхати, тому це символ чогось повністю зайвого і непотрібного.'

- type: fill-in
  title: 'Заповніть пропуски: Фразеологізми в контексті'
  instruction: 'Оберіть правильне слово для логічного завершення речення.'
  items:
    - sentence: 'Після цієї жахливої презентації перед новими інвесторами він відчув, що остаточно сів у _____.'
      answer: 'калошу'
      options:
        - 'калюжу'
        - 'калошу'
        - 'хату'
        - 'торбу'
    - sentence: 'Ми повинні негайно вживати _____, щоб швидко урятувати цей проект від повного банкрутства.'
      answer: 'заходів'
      options:
        - 'мір'
        - 'заходів'
        - 'кроків'
        - 'правил'
    - sentence: 'Не варто виносити _____ з хати і відверто розповідати колегам про наші серйозні сімейні суперечки.'
      answer: 'сміття'
      options:
        - 'речі'
        - 'сміття'
        - 'меблі'
        - 'гроші'
    - sentence: "Коли вантажна машина раптово виїхала на зустрічну смугу, у мене аж душа в _____ втекла."
      answer: "п'яти"
      options:
        - 'ноги'
        - "п'яти"
        - 'землю'
        - 'живіт'
    - sentence: 'Щиро дякую тобі за підтримку; після нашої теплої розмови в мене ніби _____ з плечей впала.'
      answer: 'гора'
      options:
        - 'гора'
        - 'скеля'
        - 'цегла'
        - 'стіна'
    - sentence: 'Цей молодий хлопець абсолютно несерйозний, у нього просто гуляє _____ у голові.'
      answer: 'вітер'
      options:
        - 'повітря'
        - 'каша'
        - 'вітер'
        - 'хліб'
    - sentence: 'Я ніколи не повірю в цю фантастичну історію, поки не побачу всі реальні докази на власні _____.'
      answer: 'очі'
      options:
        - 'очі'
        - 'вуха'
        - 'руки'
        - 'думки'
    - sentence: 'Левова _____ нашого річного бюджету зараз постійно йде на оплату оренди цього занадто дорогого офісу.'
      answer: 'частка'
      options:
        - 'доля'
        - 'частка'
        - 'частина'
        - 'сума'
    - sentence: 'Коли вони нарешті отримали цю довгоочікувану робочу візу, то були просто на сьомому _____ від щастя.'
      answer: 'небі'
      options:
        - 'поверсі'
        - 'хмарці'
        - 'небі'
        - 'місці'
    - sentence: 'Після того, як я щиро зізнався керівнику у своїй старій помилці, мені ніби _____ з серця впав.'
      answer: 'камінь'
      options:
        - 'тягар'
        - 'камінь'
        - 'сніг'
        - 'морок'
    - sentence: 'Коли він необачно купував цей старий вживаний автомобіль через інтернет, то дуже боявся купити _____ в мішку.'
      answer: 'кота'
      options:
        - 'пса'
        - 'кота'
        - 'щура'
        - 'птаха'
    - sentence: 'Це дуже складна і нетривіальна задача, над якою абсолютно весь наш відділ має зараз ламати _____.'
      answer: 'голову'
      options:
        - 'шию'
        - 'спину'
        - 'голову'
        - 'руки'
    - sentence: 'Ми три години емоційно обговорювали цей амбітний проект на нараді, але й _____ нині там.'
      answer: 'віз'
      options:
        - 'човен'
        - 'потяг'
        - 'віз'
        - 'автомобіль'
    - sentence: 'Він настільки зла і підступна людина, що свого успішного конкурента може просто в ложці _____ втопити.'
      answer: 'води'
      options:
        - 'кави'
        - 'супу'
        - 'води'
        - 'чаю'

