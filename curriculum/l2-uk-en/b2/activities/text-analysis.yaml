- type: reading
  title: "Прочитайте текст і дайте відповіді на запитання"
  instruction: "Уважно прочитайте текст про аналіз інформації та виконайте завдання."
  text: |
    ЗМІ часто використовують емоційні епітети, щоб вплинути на сприйняття аудиторії. Наприклад, коли журналісти описують рішення уряду, вони можуть назвати його катастрофічним або геніальним. Це вже не просто інформування, а оціночне судження, яке нав'язує читачеві певну точку зору. Важливо вміти розрізняти, де закінчується факт і починається інтерпретація. Аналіз тексту допомагає нам не піддаватися маніпуляціям свідомістю та зберігати власну об'єктивність в умовах сучасного інфопростору.
  tasks:
    - "Яка головна мета використання емоційних епітетів у ЗМІ?"
    - "Як відрізнити факт від оціночного судження?"
    - "Чому аналіз тексту є важливим в сучасному інфопросторі?"
    - "Які наслідки має некритичне сприйняття новин?"

- type: true-false
  title: "Факт чи міф: Інформаційна гігієна та аналіз"
  instruction: "Визначте, чи є ці твердження правдивими."
  items:
    - statement: "Судження — це об'єктивне твердження, яке можна перевірити."
      correct: false
      explanation: "Це визначення факту. Судження завжди суб'єктивні."
    - statement: "Проєкти StopFake та Детектор медіа допомагають боротися з дезінформацією."
      correct: true
      explanation: "Ці проєкти відіграють ключову роль у формуванні інформаційної гігієни в Україні."
    - statement: "Слово опінія є правильним українським терміном для вираження думки."
      correct: false
      explanation: "Це калька з англійської. Краще використовувати фразу 'на мою думку'."
    - statement: "Риторичне запитання завжди потребує чіткої відповіді від співрозмовника."
      correct: false
      explanation: "Риторичне запитання не потребує відповіді, воно використовується для впливу на аудиторію."
    - statement: "Пафос в українській мові означає урочисту піднесеність, а не жалюгідність."
      correct: true
      explanation: "Це хибний друг перекладача. Український 'пафос' має позитивне значення."
    - statement: "Етос апелює до авторитету та моральних якостей мовця."
      correct: true
      explanation: "Аристотель визначав етос як спосіб переконання через авторитет і довіру."
    - statement: "Аргумент в українській традиції означає сварку або конфлікт."
      correct: false
      explanation: "Аргумент — це доказ або обґрунтування, а не емоційна суперечка."
    - statement: "Маніпулятори часто виривають фрази з контексту, щоб змінити їхній зміст."
      correct: true
      explanation: "Виривання з контексту є однією з найпоширеніших технік інформаційних маніпуляцій."
    - statement: "Наявність точних дат і чисел завжди є ознакою фактичного твердження."
      correct: true
      explanation: "Факти характеризуються точністю і можливістю їхньої перевірки."
    - statement: "Епітети та гіперболи є маркерами об'єктивного журналістського стилю."
      correct: false
      explanation: "Вони є маркерами упередженості та емоційного забарвлення тексту."

- type: quiz
  title: "Тест: Поняття та терміни аналізу тексту"
  instruction: "Оберіть одну правильну відповідь до кожного запитання."
  items:
    - question: "Що з наведеного найкраще описує поняття «інформаційна гігієна»?"
      explanation: "Це комплекс навичок для безпечного споживання інформації."
      options:
        - text: "Комплекс навичок для безпечного споживання інформації."
          correct: true
        - text: "Уміння швидко читати тексти будь-якої складності."
          correct: false
        - text: "Звичка поширювати лише емоційні новини."
          correct: false
        - text: "Використання складних термінів у повсякденному спілкуванні."
          correct: false
    - question: "Яке слово варто використовувати замість неправильної кальки 'опінія'?"
      explanation: "Слово 'думка' є питомим українським словом."
      options:
        - text: "Думка"
          correct: true
        - text: "Факт"
          correct: false
        - text: "Ідея-фікс"
          correct: false
        - text: "Аргументація"
          correct: false
    - question: "Який риторичний прийом передбачає використання однакових слів на початку речень?"
      explanation: "Повторення слів на початку речень називається анафорою."
      options:
        - text: "Анафора"
          correct: true
        - text: "Антитеза"
          correct: false
        - text: "Метафора"
          correct: false
        - text: "Епітет"
          correct: false
    - question: "Як українською мовою правильно назвати логічний доказ або обґрунтування?"
      explanation: "Слово 'аргумент' використовується в значенні логічного доказу."
      options:
        - text: "Аргумент"
          correct: true
        - text: "Суперечка"
          correct: false
        - text: "Конфлікт"
          correct: false
        - text: "Пафос"
          correct: false
    - question: "До якого способу переконання належить апеляція до авторитету мовця?"
      explanation: "Етос відповідає за довіру до мовця та його авторитет."
      options:
        - text: "Етос"
          correct: true
        - text: "Логос"
          correct: false
        - text: "Пафос"
          correct: false
        - text: "Міфос"
          correct: false
    - question: "Який з цих висловів є маркером оціночного судження, а не факту?"
      explanation: "Слова на кшталт 'найкращий' виражають суб'єктивну оцінку."
      options:
        - text: "Це найкращий фільм десятиліття."
          correct: true
        - text: "У фільмі зіграли відомі актори."
          correct: false
        - text: "Бюджет фільму становить десять мільйонів."
          correct: false
        - text: "Прем'єра фільму відбулася вчора."
          correct: false
    - question: "Що означає термін 'вирвати з контексту' в інформаційному просторі?"
      explanation: "Це маніпуляція, коли втрачається первісний зміст фрази через зміну середовища."
      options:
        - text: "Подати фразу без обставин, за яких її було сказано."
          correct: true
        - text: "Перекласти текст з іншої мови з помилками."
          correct: false
        - text: "Написати довгий текст без абзаців."
          correct: false
        - text: "Скласти текст з різних частин інших текстів."
          correct: false
    - question: "Який стилістичний засіб передбачає різке протиставлення понять або ідей?"
      explanation: "Антитеза створює контраст і різке протиставлення."
      options:
        - text: "Антитеза"
          correct: true
        - text: "Гіпербола"
          correct: false
        - text: "Порівняння"
          correct: false
        - text: "Звертання"
          correct: false
    - question: "Яка основна мета використання безособових конструкцій у відгуку?"
      explanation: "Безособові конструкції допомагають уникнути емоційності."
      options:
        - text: "Зберегти об'єктивний та академічний тон."
          correct: true
        - text: "Показати своє особисте ставлення до автора."
          correct: false
        - text: "Зробити текст довшим і складнішим."
          correct: false
        - text: "Спровокувати читача на суперечку."
          correct: false
    - question: "Що ми розуміємо під терміном 'логос' у мистецтві переконання?"
      explanation: "Логос — це раціональна частина тексту, логіка і факти."
      options:
        - text: "Переконання через логіку, аргументи та факти."
          correct: true
        - text: "Здатність викликати сильні емоції у читача."
          correct: false
        - text: "Використання красивих епітетів та метафор."
          correct: false
        - text: "Створення яскравого образу політика чи експерта."
          correct: false

- type: match-up
  title: "Знайдіть відповідники: Терміни та їхні значення"
  instruction: "З'єднайте українські терміни з їхніми визначеннями."
  pairs:
