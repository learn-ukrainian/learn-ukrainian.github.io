- type: fill-in
  title: "Доповніть речення: Риторика та аналіз"
  instruction: "Оберіть правильне слово для заповнення пропуску в реченні."
  items:
    - sentence: "Журналіст висловив своє суб'єктивне _, а не об'єктивний факт."
      answer: "судження"
      options: ["судження", "джерело", "аргумент", "рішення"]
      explanation: "Судження — це особиста оцінка, яка протиставляється фактам."
    - sentence: "Повторення однакових слів на початку абзаців — це стилістична _."
      answer: "анафора"
      options: ["анафора", "антитеза", "гіпербола", "маніпуляція"]
      explanation: "Анафора є ефективною фігурою для створення ритму."
    - sentence: "Сучасний _ перенасичений суперечливою інформацією."
      answer: "інфопростір"
      options: ["інфопростір", "текст", "аргумент", "авторитет"]
      explanation: "Інфопростір означає середовище поширення інформації."
    - sentence: "Словосполучення 'на мою _' є чудовою альтернативою слову 'опінія'."
      answer: "думку"
      options: ["думку", "опінію", "суперечку", "радість"]
      explanation: "Фраза 'на мою думку' — правильна питома конструкція."
    - sentence: "Маніпулятори часто намагаються вирвати фразу з _."
      answer: "контексту"
      options: ["контексту", "журналу", "речення", "факту"]
      explanation: "Виривання з контексту спотворює первісний зміст."
    - sentence: "Переконання через логіку та статистику називається _."
      answer: "логос"
      options: ["логос", "етос", "пафос", "міфос"]
      explanation: "Логос стосується раціональної аргументації."
    - sentence: "Для впливу на емоції читача автор використовує _."
      answer: "пафос"
      options: ["пафос", "логос", "етос", "аналіз"]
      explanation: "Пафос апелює до емоцій та натхнення."
    - sentence: "Слова 'найкращий' або 'жахливий' є типовими емоційними _."
      answer: "епітетами"
      options: ["епітетами", "аргументами", "фактами", "доказами"]
      explanation: "Емоційні епітети нав'язують суб'єктивну оцінку."
    - sentence: "Надійне медіа завжди перевіряє _ перед публікацією новини."
      answer: "першоджерело"
      options: ["першоджерело", "судження", "риторику", "антитезу"]
      explanation: "Перевірка першоджерела є основою інформаційної гігієни."
    - sentence: "Автор наводить вагомий _, щоб переконати аудиторію у своїй правоті."
      answer: "аргумент"
      options: ["аргумент", "конфлікт", "пафос", "контекст"]
      explanation: "Аргумент — це логічний доказ на підтримку тези."

- type: unjumble
  title: "Відновіть порядок слів: Аналіз і критика"
  instruction: "Складіть правильні речення зі слів. Кожне речення містить від шести до вісімнадцяти слів."
  items:
    - words: ["уміння", "критично", "аналізувати", "інформацію", "допомагає", "захиститися", "від", "сучасної", "пропаганди"]
      answer: "Уміння критично аналізувати інформацію допомагає захиститися від сучасної пропаганди."
    - words: ["дуже", "важливо", "завжди", "перевіряти", "факти", "та", "звертатися", "до", "надійного", "першоджерела"]
      answer: "Дуже важливо завжди перевіряти факти та звертатися до надійного першоджерела."
    - words: ["автор", "цієї", "статті", "наводить", "дуже", "переконливий", "аргумент", "на", "захист", "своєї", "позиції"]
      answer: "Автор цієї статті наводить дуже переконливий аргумент на захист своєї позиції."
    - words: ["використання", "забарвленої", "лексики", "свідчить", "про", "очевидну", "упередженість", "та", "необ'єктивність", "відомого", "журналіста"]
      answer: "Використання забарвленої лексики свідчить про очевидну упередженість та необ'єктивність відомого журналіста."
    - words: ["вирвати", "фразу", "з", "контексту", "є", "найпопулярнішим", "прийомом", "для", "створення", "емоційної", "маніпуляції"]
      answer: "Вирвати фразу з контексту є найпопулярнішим прийомом для створення емоційної маніпуляції."
    - words: ["риторичне", "запитання", "на", "початку", "тексту", "одразу", "привертає", "увагу", "всієї", "читацької", "аудиторії"]
      answer: "Риторичне запитання на початку тексту одразу привертає увагу всієї читацької аудиторії."
    - words: ["замість", "кальки", "опінія", "ми", "повинні", "використовувати", "чудовий", "український", "вираз", "на", "мою", "думку"]
      answer: "Замість кальки опінія ми повинні використовувати чудовий український вираз на мою думку."
    - words: ["інформаційна", "гігієна", "передбачає", "свідому", "відмову", "від", "читання", "анонімних", "і", "неперевірених", "новинних", "каналів"]
      answer: "Інформаційна гігієна передбачає свідому відмову від читання анонімних і неперевірених новинних каналів."

- type: error-correction
  title: "Виправте стилістичні та лексичні помилки"
  instruction: "Знайдіть лексичну або граматичну помилку в реченні."
  items:
    - sentence: "Я маю іншу опінію щодо цієї соціальної проблеми."
      error: "опінію"
      answer: "думку"
      options: ["думку", "мрію", "суперечку", "радість"]
      explanation: "Слово 'опінія' є неприродною калькою. Правильно казати 'я маю іншу думку'."
      error_type: "word"
    - sentence: "Між політиками стався серйозний аргумент під час дебатів."
      error: "аргумент"
      answer: "конфлікт"
      options: ["конфлікт", "доказ", "логос", "пафос"]
      explanation: "Англійське 'argument' у значенні суперечки не перекладається як 'аргумент'. Український 'аргумент' — це доказ."
      error_type: "word"
    - sentence: "Цей політик завжди говорить з дуже жалюгідним пафосом."
      error: "жалюгідним пафосом"
      answer: "високим пафосом"
      options: ["високим пафосом", "сумним етосом", "коротким логосом", "гірким доказом"]
      explanation: "В українській мові слово 'пафос' означає піднесеність і натхнення, а не жалюгідність."
      error_type: "phrase"
    - sentence: "Ми маємо приймати участь у боротьбі з дезінформацією."
      error: "приймати участь"
      answer: "брати участь"
      options: ["брати участь", "робити участь", "грати участь", "мати участь"]
      explanation: "Вираз 'приймати участь' — це русизм. Питома українська конструкція — 'брати участь'."
      error_type: "phrase"
    - sentence: "Журналіст навів самий кращий доказ своєї правоти."
      error: "самий кращий"
      answer: "найкращий"
      options: ["найкращий", "самий хороший", "більш кращий", "дуже кращий"]
      explanation: "Утворення вищого ступеня за допомогою слова 'самий' є граматичною помилкою (русизмом)."
      error_type: "phrase"
    - sentence: "Ця стаття відноситься до сфери сучасної медіаграмотності."
      error: "відноситься"
      answer: "стосується"
      options: ["стосується", "належиться", "приносить", "заносить"]
      explanation: "Коли йдеться про приналежність до теми чи сфери, слід використовувати дієслово 'стосується'."
      error_type: "word"
    - sentence: "Експерт сказав слідуюче: інформаційна гігієна є критичною."
      error: "слідуюче"
      answer: "таке"
      options: ["таке", "наступне", "подальше", "завтрашнє"]
