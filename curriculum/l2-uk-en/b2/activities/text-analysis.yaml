- type: essay-response
  title: "Академічний відгук: Аналіз короткого повідомлення"
  instruction: "Проаналізуйте наведений текст і напишіть короткий академічний відгук."
  prompt: "Уявіть, що ви прочитали такий текст: Новий мер міста повністю провалив підготовку до зими. Цей катастрофічний результат свідчить про те, що місцева влада не здатна вирішувати складні проблеми. Напишіть відгук (мінімум 150 слів), використовуючи безособові конструкції та пасивний стан. Проаналізуйте використання емоційних епітетів та упередженості в цьому повідомленні."
  min_words: 150
  model_answer: |
    Проаналізований текст характеризується високим рівнем емоційності та наявністю виразних маркерів упередженості. У повідомленні було виявлено використання забарвленої лексики, зокрема таких емоційних епітетів, як 'провалив' та 'катастрофічний результат'. Ці слова використовуються для того, щоб нав'язати читачеві негативну оцінку діяльності місцевої влади ще до наведення конкретних фактів або статистики.

    Крім того, варто зазначити, що в тексті відсутні будь-які об'єктивні дані чи посилання на офіційні звіти щодо підготовки до зими. Твердження про нездатність влади вирішувати проблеми подається як загальновідомий факт, хоча насправді воно є суб'єктивним оціночним судженням автора. Такий підхід може розглядатися як спроба маніпулювання громадською думкою. 

    Для того щоб текст можна було вважати об'єктивним аналітичним матеріалом, його необхідно було б доповнити конкретними показниками та надати можливість висловити свою позицію представникам місцевої влади. Отже, даний текст не відповідає стандартам інформаційної гігієни та є прикладом політично забарвленої риторики.
  rubric:
    - criteria: "Використання термінології"
      description: "Наявність термінів (упередженість, епітет, маніпуляція, судження)."
      points: 4
    - criteria: "Об'єктивний стиль"
      description: "Використання пасивного стану та безособових конструкцій (було виявлено, варто зазначити)."
      points: 3
    - criteria: "Глибина аналізу"
      description: "Успішне розмежування факту і судження в поданому тексті."
      points: 3