    - left: "Упередженість"
      right: "Схильність надавати перевагу одній позиції чи групі."
    - left: "Анафора"
      right: "Повторення слова або фрази на початку речень."
    - left: "Антитеза"
      right: "Різке протиставлення двох протилежних понять."
    - left: "Етос"
