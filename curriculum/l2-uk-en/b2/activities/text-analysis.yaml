- type: translate
  title: "Переклад термінології та корисних фраз"
  instruction: "Оберіть правильний переклад для кожного речення."
  items:
    - source: "It is important to maintain information hygiene."
      options:
        - text: "Важливо дотримуватися інформаційної гігієни."
          correct: true
        - text: "Важливо підтримувати чисту інформацію."
          correct: false
        - text: "Важливо мити руки перед читанням новин."
          correct: false
      explanation: "Інформаційна гігієна — сталий вислів в українській мові."
    - source: "The author expresses a subjective judgment, not a fact."
      options:
        - text: "Автор висловлює суб'єктивне судження, а не факт."
          correct: true
        - text: "Автор показує суб'єктивну опінію, а не факт."
          correct: false
        - text: "Автор каже своє рішення, а не доказ."
          correct: false
      explanation: "Використовуємо термін «судження» (judgment)."
    - source: "This quote was taken out of context."
      options:
        - text: "Цю цитату було вирвано з контексту."
          correct: true
        - text: "Ця цитата була витягнута з тексту."
          correct: false
        - text: "Цю цитату взяли без контексту."
          correct: false
      explanation: "«Вирвати з контексту» (taken out of context) — ідіоматичний вислів."
    - source: "In my opinion, this media outlet is biased."
      options:
        - text: "На мою думку, це медіа є упередженим."
          correct: true
        - text: "За моєю опінією, це джерело є нечесним."
          correct: false
        - text: "Я думаю, що це медіа має інтереси."
          correct: false
      explanation: "Фраза 'на мою думку' — правильний переклад 'in my opinion'."
    - source: "The politician made a very pathetic excuse."
      options:
        - text: "Політик використав жалюгідне виправдання."
          correct: true
        - text: "Політик зробив дуже пафосне виправдання."
          correct: false
        - text: "Політик сказав сумне виправдання."
          correct: false
      explanation: "В українській мові 'pathetic' перекладається як 'жалюгідний', а не 'пафосний'."
    - source: "We must analyze the logical arguments in the article."
      options:
        - text: "Ми повинні проаналізувати логічні аргументи в статті."
          correct: true
        - text: "Ми мусимо дивитися на логічні конфлікти у статті."
          correct: false
        - text: "Ми маємо аналізувати логічні суперечки."
          correct: false
      explanation: "В українській мові 'аргумент' означає логічний доказ."
    - source: "Media literacy helps us recognize fake news."
      options:
        - text: "Медіаграмотність допомагає нам розпізнавати фейкові новини."
          correct: true
        - text: "Медійна література рятує нас від фальшивок."
          correct: false
        - text: "Читання медіа навчає нас бачити фейки."
          correct: false
      explanation: "Медіаграмотність (media literacy) є важливим сучасним терміном."
    - source: "A rhetorical question does not require an answer."
      options:
        - text: "Риторичне запитання не потребує відповіді."
          correct: true
        - text: "Стилістичне запитання не має відповіді."
          correct: false
        - text: "Риторичне запитання завжди без відповіді."
          correct: false
      explanation: "Термін «риторичне запитання» використовується для стилістичних фігур."

