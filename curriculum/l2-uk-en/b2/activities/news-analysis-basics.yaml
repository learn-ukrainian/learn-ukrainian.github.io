  prompt: 'Проаналізуйте роль Telegram-каналів у сучасному українському суспільстві порівняно з традиційними медіа. Які переваги та загрози вони несуть для медіаграмотності громадян? Наведіть власні приклади того, як ви перевіряєте достовірність новин у соціальних мережах.'
  min_words: 150
  model_answer: 'У сучасному інформаційному просторі Telegram-канали стали основним джерелом новин для багатьох українців. Їхня головна перевага — це блискавична швидкість поширення інформації, що є критично важливим в умовах війни, наприклад, під час повітряних тривог. Однак ця швидкість несе значні загрози, оскільки анонімні канали не мають редакційних стандартів і не несуть репутаційної відповідальності за свої слова. Традиційні якісні медіа, навпаки, витрачають час на перевірку джерел, але гарантують достовірність. Щоб не стати жертвою маніпуляцій чи діпфейків, я використовую практику крос-референції. Якщо я бачу гучний заголовок про катастрофу, я завжди перевіряю, чи підтверджують цю інформацію авторитетні видання або офіційні державні ресурси. Я також звертаю увагу на маркери суб''єктивності та уникаю публікацій, які містять емоційні ярлики або спираються лише на чутки. Медіаграмотність сьогодні — це необхідна навичка, що допомагає розрізняти об''єктивний факт від чиєїсь особистої думки.'
  rubric:
    - criteria: 'Глибина аналізу'
      description: 'Студент чітко пояснює різницю між Telegram-каналами та традиційними медіа.'
      points: 40
    - criteria: 'Використання лексики'
      description: 'Правильне використання тематичної лексики (достовірність, джерело, упередженість).'
      points: 30
    - criteria: 'Граматика та стилістика'
      description: 'Текст не містить пасивних кальок, правильне використання складних речень.'
      points: 30