  title: 'Анатомія статті та фактчекінг'
  instruction: 'Заповніть пропуски у тексті відповідними термінами.'
  passage: 'Коли ви читаєте новини, важливо вміти аналізувати структуру тексту. Найважливіша інформація завжди міститься на самому початку — у першому абзаці, який називається {{1}}. Він має відповідати на шість ключових запитань, серед яких хто, що, де, коли, як і {{2}}. Цей принцип побудови новини відомий як перевернута {{3}}. Якісний текст завжди посилається на надійне {{4}}, а всі цитати мають точну {{5}}, щоб читач знав, кому належать слова. Протилежністю якісної журналістики є створена алгоритмами брехня — так званий {{6}}, який маніпулює нашою свідомістю. Традиційні медіа мають редакторів і публікують офіційне {{7}}, якщо допустили помилку. Водночас анонімні канали часто розповсюджують неперевірені чутки, створюючи {{8}} читачів щодо реального стану речей. Щоб захистити себе, нам необхідна висока {{9}}. Ми повинні відрізняти сухий {{10}} від емоційної {{11}} автора. Журналіст може вести об''єктивний {{12}} з місця подій, а може писати суб''єктивну колонку. Якщо автор вживає слова "ймовірно" або "{{13}}", він маркує низьку {{14}} цієї інформації. Навіть гучний {{15}} статті може бути спробою маніпуляції. Лише глибока {{16}} подій дає нам справжнє розуміння ситуації.'
  blanks:
    - id: 1
