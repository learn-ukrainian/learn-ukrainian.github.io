- type: reading
  title: 'Аналіз новинної статті'
  instruction: 'Прочитайте уривок і дайте відповіді на запитання.'
  text: |
    Вчора міська рада ухвалила рішення про реорганізацію транспортної системи. Згідно з офіційним джерелом, цей крок дозволить зменшити затори в центрі міста на двадцять відсотків. На думку експертів, ініціатива є своєчасною, хоча деякі мешканці висловлюють невдоволення можливим підвищенням тарифів. Журналісти продовжують стежити за ситуацією та готують детальний репортаж.
  source: 'Адаптована новинна замітка'
  tasks:
    - 'Хто є головним суб''єктом цієї новини?'
    - 'На яке джерело посилається автор тексту?'
    - 'Де в тексті факт, а де — чиясь думка?'
    - 'Яке слово вказує на те, що журналіст відділяє свою позицію від думки фахівців?'

- type: true-false
  title: 'Медіаграмотність: факти та міфи'
  instruction: 'Визначте, чи є твердження правдивим, чи хибним.'
  items:
    - statement: 'Telegram-канали завжди несуть юридичну відповідальність за достовірність інформації.'
      correct: false
      explanation: 'Більшість популярних каналів є анонімними і не несуть відповідальності за публікації.'
    - statement: 'Якісні традиційні медіа мають політику перевірки фактів та штатних редакторів.'
      correct: true
      explanation: 'Це ключова відмінність якісних медіа від анонімних джерел.'
    - statement: 'Лід — це останній абзац статті, який містить найменш важливу інформацію.'
      correct: false
      explanation: 'Лід — це перший абзац, який містить найважливішу інформацію (правило 5W1H).'
    - statement: 'Газета Gazette de Leopol друкувалася українською мовою у вісімнадцятому столітті.'
      correct: false
      explanation: 'Вона друкувалася французькою мовою — мовою тогочасної європейської дипломатії.'
    - statement: 'Слова "ймовірно" та "за неофіційними даними" є маркерами достовірності.'
      correct: true
      explanation: 'Ці слова вказують на те, що інформація є припущенням, а не стовідсотковим фактом.'
    - statement: 'Якщо політик говорить "Я вирішу проблему", журналіст у непрямій мові має писати "Він вирішить проблему".'
      correct: true
      explanation: 'При перетворенні прямої мови на непряму займенник першої особи змінюється на третю.'
    - statement: 'Діпфейки зазвичай легко розпізнати завдяки ідеальній мікромоториці та артикуляції.'
      correct: false
      explanation: 'Навпаки, алгоритми часто помиляються саме у відтворенні дрібних деталей.'
    - statement: 'Репортаж та авторська колонка мають однакову мету — безпристрасно інформувати про події.'
      correct: false
      explanation: 'Репортаж інформує про факти, а колонка відкрито висловлює суб''єктивну думку автора.'
    - statement: 'Емоційна реакція на новину може бути ознакою того, що читачем намагаються маніпулювати.'
      correct: true
      explanation: 'Якісна журналістика апелює до розуму, а фейки часто використовують емоції.'
    - statement: 'Крапка завжди ставиться перед закритими лапками в українській мові.'
      correct: false
      explanation: 'В українській типографіці крапка завжди ставиться після закритих лапок.'

- type: match-up
