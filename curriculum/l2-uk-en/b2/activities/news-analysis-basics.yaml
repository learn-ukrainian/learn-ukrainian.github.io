      options: ['піраміда', 'схема', 'таблиця', 'структура']
    - id: 4
      answer: 'джерело'
      options: ['джерело', 'повідомлення', 'правило', 'фото']
    - id: 5
      answer: 'атрибуцію'
      options: ['атрибуцію', 'упередженість', 'еволюцію', 'розповідь']
    - id: 6
      answer: 'діпфейк'
      options: ['діпфейк', 'інсайд', 'аналіз', 'репортаж']
    - id: 7
      answer: 'спростування'
      options: ['спростування', 'підтвердження', 'правило', 'виправдання']
    - id: 8
      answer: 'упередженість'
      options: ['упередженість', 'достовірність', 'навичку', 'відповідальність']
    - id: 9
      answer: 'медіаграмотність'
      options: ['медіаграмотність', 'швидкість', 'паніка', 'емоція']
    - id: 10
      answer: 'факт'
      options: ['факт', 'прогноз', 'текст', 'стиль']
    - id: 11
