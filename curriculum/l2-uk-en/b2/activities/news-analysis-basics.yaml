    - left: 'Цензура'
      right: 'Контроль влади за змістом інформації, що поширюється в суспільстві.'

- type: quiz
  title: 'Перевірте знання: граматика та аналіз тексту'
  instruction: 'Оберіть одну правильну відповідь на кожне запитання.'
  items:
    - question: 'Який сполучник слід використати для перетворення розповідного речення прямої мови на непряму?'
      explanation: 'Для розповідних речень використовується сполучник "що".'
      options:
        - text: 'що'
          correct: true
        - text: 'щоб'
          correct: false
        - text: 'чи'
          correct: false
        - text: 'як'
          correct: false
    - question: 'Що означає концепція формування порядку денного (agenda-setting) у сучасних медіа?'
      explanation: 'Ця концепція пояснює, що ЗМІ не вказують, що саме думати, але визначають, про що думати.'
      options:
        - text: 'Медіа визначають теми, про які суспільство буде думати і говорити.'
          correct: true
        - text: 'Медіа відкрито пропагують позицію уряду та формують закони.'
          correct: false
        - text: 'Журналісти повністю вигадують усі новини, які публікують.'
          correct: false
        - text: 'Читачі самостійно формують перелік новин для публікації.'
          correct: false
    - question: 'Яке з цих слів є чітким маркером суб''єктивності та авторської оцінки в тексті?'
      explanation: 'Слово "неймовірно" передає емоційну оцінку автора, а не сухий факт.'
      options:
        - text: 'неймовірно'
          correct: true
        - text: 'вчора'
          correct: false
        - text: 'температура'
          correct: false
        - text: 'заявив'
          correct: false
    - question: 'Який знак пунктуації ставиться після закритих лапок в українській мові, якщо цитата є звичайним реченням?'
      explanation: 'В українській типографіці крапка ставиться завжди після лапок.'
      options:
        - text: 'крапка'
          correct: true
        - text: 'знак питання'
          correct: false
        - text: 'кома'
          correct: false
        - text: 'знак оклику'
          correct: false
    - question: 'Чому конструкція "Було повідомлено про зміни" вважається стилістично небажаною?'
      explanation: 'Це пасивна калька. Українська мова надає перевагу активному стану: "Повідомили про зміни".'
      options:
        - text: 'Це пасивна калька, краще використовувати активний стан.'
          correct: true
        - text: 'Вона занадто емоційна для новинного стилю.'
          correct: false
        - text: 'Це неправильний переклад з англійської мови.'
          correct: false
        - text: 'Вона містить маркери сумніву та недостовірності.'
          correct: false
    - question: 'Як правильно трансформувати фразу "Ми готові працювати", яку сказав міністр?'
      explanation: 'Займенник "ми" змінюється на "вони", щоб зберегти логіку розповіді від третьої особи.'
      options:
        - text: 'Міністр заявив, що вони готові працювати.'
          correct: true
        - text: 'Міністр заявив, що ми готові працювати.'
          correct: false
        - text: 'Міністр заявив, щоб вони працювали.'
          correct: false
        - text: 'Міністр заявив, чи вони готові працювати.'
          correct: false
    - question: 'Яка ключова відмінність якісної аналітики від звичайної інформаційної замітки?'
      explanation: 'Аналітика пояснює причини, контекст і наслідки, а не лише повідомляє факт.'
      options:
        - text: 'Аналітика пояснює причини та наслідки події.'
          correct: true
        - text: 'Аналітика завжди публікується анонімно.'
          correct: false
        - text: 'Аналітика не містить посилань на жодні офіційні джерела.'
          correct: false
        - text: 'Аналітика складається лише з одного абзацу тексту.'
          correct: false
    - question: 'Яке з цих слів використовується журналістами для маркування інформації з низьким ступенем достовірності?'
      explanation: 'Слово "подейкують" вказує на чутки, а не на перевірені офіційні дані.'
      options:
        - text: 'подейкують'
          correct: true
        - text: 'доведено'
          correct: false
        - text: 'зафіксовано'
          correct: false
        - text: 'безсумнівно'
          correct: false
    - question: 'Що таке крос-референція в контексті медіагігієни та споживання інформації?'
      explanation: 'Це перехресна перевірка одного факту в кількох незалежних та авторитетних джерелах.'
      options:
        - text: 'Перевірка інформації в кількох незалежних медіа.'
          correct: true
        - text: 'Копіювання статті з одного сайту на інший без дозволу.'
          correct: false
        - text: 'Створення гучних заголовків для збільшення переглядів.'
          correct: false
        - text: 'Публікація офіційного спростування помилкової новини.'
          correct: false
    - question: 'Який сполучник ми використовуємо для перетворення запитання прямої мови (без питального слова) на непряму?'
      explanation: 'Якщо немає питального слова (де, хто), використовується частка "чи".'
      options:
        - text: 'чи'
          correct: true
        - text: 'що'
          correct: false
        - text: 'щоб'
          correct: false
        - text: 'який'
          correct: false

- type: fill-in
  title: 'Заповніть пропуски: лексика новин'
  instruction: 'Оберіть правильне слово, щоб доповнити речення.'
  items:
    - sentence: 'Журналіст зобов''язаний перевіряти кожне офіційне ___ перед публікацією.'
      answer: 'джерело'
      options: ['джерело', 'спростування', 'фейк', 'заголовок']
      explanation: 'Інформацію отримують з офіційних джерел.'
    - sentence: 'Редактор вирішив винести цю цитату в головний ___ на першій сторінці.'
      answer: 'заголовок'
      options: ['заголовок', 'лід', 'маркер', 'експерт']
      explanation: 'Заголовок розміщується на початку статті для привернення уваги.'
    - sentence: 'Газета опублікувала ___, оскільки вчорашня новина виявилася помилковою.'
      answer: 'спростування'
      options: ['спростування', 'упередженість', 'маніпуляцію', 'атрибуцію']
      explanation: 'Спростування публікується для виправлення раніше поширеної неправди.'
    - sentence: 'В умовах війни високий рівень ___ є питанням національної безпеки.'
      answer: 'медіаграмотності'
      options: ['медіаграмотності', 'достовірності', 'упередженості', 'цензури']
      explanation: 'Медіаграмотність допомагає суспільству протистояти інформаційним атакам.'
    - sentence: 'Відомий військовий ___ прокоментував ситуацію на фронті для нашого видання.'
      answer: 'експерт'
      options: ['експерт', 'фейк', 'заголовок', 'лід']
      explanation: 'Експерт коментує спеціалізовані теми.'
    - sentence: 'Використання емоційних ярликів у тексті свідчить про ___ автора.'
      answer: 'упередженість'
      options: ['упередженість', 'достовірність', 'верифікацію', 'аналітику']
      explanation: 'Емоційні ярлики порушують нейтральність і створюють упередженість.'
    - sentence: 'Ми підготували великий ___ з місця подій, щоб показати реальну картину.'
      answer: 'репортаж'
      options: ['репортаж', 'фейк', 'маркер', 'заголовок']
      explanation: 'Репортаж ведеться безпосередньо з місця подій.'
    - sentence: 'Точна ___ цитат допомагає читачеві зрозуміти, кому належать слова.'
      answer: 'атрибуція'
      options: ['атрибуція', 'маніпуляція', 'упередженість', 'цензура']
      explanation: 'Атрибуція — це вказівка на авторство цитати.'
    - sentence: 'Технологія створення реалістичних, але підроблених відео називається ___.'
      answer: 'діпфейк'
      options: ['діпфейк', 'інсайд', 'спростування', 'аналітика']
      explanation: 'Діпфейк створюється за допомогою алгоритмів штучного інтелекту.'
    - sentence: 'Читач повинен завжди ставити під сумнів ___ сенсаційних новин у соціальних мережах.'
      answer: 'достовірність'
      options: ['достовірність', 'маніпуляцію', 'упередженість', 'експерта']
      explanation: 'Сенсаційні новини часто є неперевіреними і вимагають підтвердження достовірності.'

- type: unjumble
  title: 'Складіть речення: журналістські стандарти'
  instruction: 'Відновіть правильний порядок слів у реченнях.'
  items:
    - words: ['Журналіст', 'повинен', 'перевіряти', 'кожне', 'надійне', 'джерело', 'перед', 'публікацією']
      answer: 'Журналіст повинен перевіряти кожне надійне джерело перед публікацією'
    - words: ['Відомий', 'експерт', 'заявив', 'що', 'країна', 'готова', 'до', 'важливих', 'змін']
      answer: 'Відомий експерт заявив що країна готова до важливих змін'
    - words: ['Якісні', 'медіа', 'завжди', 'публікують', 'офіційне', 'спростування', 'у', 'разі', 'помилки']
      answer: 'Якісні медіа завжди публікують офіційне спростування у разі помилки'
    - words: ['Емоційний', 'заголовок', 'часто', 'є', 'яскравим', 'маркером', 'маніпуляції', 'та', 'упередженості']
      answer: 'Емоційний заголовок часто є яскравим маркером маніпуляції та упередженості'
    - words: ['Воєнний', 'кореспондент', 'підготував', 'детальний', 'репортаж', 'з', 'самого', 'епіцентру', 'складних', 'подій']
      answer: 'Воєнний кореспондент підготував детальний репортаж з самого епіцентру складних подій'
    - words: ['Точна', 'атрибуція', 'допомагає', 'читачеві', 'відрізнити', 'перевірений', 'факт', 'від', 'чиєїсь', 'думки']
      answer: 'Точна атрибуція допомагає читачеві відрізнити перевірений факт від чиєїсь думки'
    - words: ['Видання', 'повідомило', 'щоб', 'усі', 'громадяни', 'зберігали', 'максимальний', 'спокій', 'сьогодні']
      answer: 'Видання повідомило щоб усі громадяни зберігали максимальний спокій сьогодні'
    - words: ['Сучасна', 'медіаграмотність', 'допомагає', 'нам', 'швидко', 'розпізнавати', 'навіть', 'найскладніший', 'новинний', 'діпфейк']
      answer: 'Сучасна медіаграмотність допомагає нам швидко розпізнавати навіть найскладніший новинний діпфейк'

- type: error-correction
  title: 'Виправте помилки: граматика та стилістика'
  instruction: 'Знайдіть та виправте граматичні або стилістичні помилки в реченнях.'
  items:
    - sentence: 'Експерт зазначив, що я провів детальний аналіз даних.'
      error: 'я'
      answer: 'він'
      error_type: 'word'
      options: ['він', 'ми', 'вони', 'ти']
      explanation: 'У непрямій мові займенник першої особи змінюється на займенник третьої особи.'
    - sentence: 'Журналіст запитав, що чи можемо ми опублікувати цю інформацію.'
      error: 'що чи'
      answer: 'чи'
      error_type: 'construction'
      options: ['чи', 'що', 'щоб', 'як']
      explanation: 'Для загального запитання достатньо використати тільки частку "чи".'
    - sentence: 'Вчора на сайті було повідомлено про нові тарифи для мешканців.'
      error: 'було повідомлено'
      answer: 'повідомили'
      error_type: 'construction'
      options: ['повідомили', 'повідомлено', 'були повідомили', 'є повідомлено']
      explanation: 'Українська мова уникає пасивних кальок, краще використовувати активний стан: "повідомили" або "уряд повідомив".'
    - sentence: 'Медіа відіграють ключову роль у формування порядку денного.'
      error: 'формування'
      answer: 'формуванні'
      error_type: 'word'
      options: ['формуванні', 'формуваннях', 'формуванням', 'формуванню']
      explanation: 'Прийменник "у" вимагає місцевого відмінка: "у формуванні".'
    - sentence: 'Мер міста попросив, що громадяни зберігали спокій у цій ситуації.'
      error: 'що'
      answer: 'щоб'
      error_type: 'word'
      options: ['щоб', 'чи', 'як', 'коли']
      explanation: 'Оскільки це спонукальне речення (прохання), використовується сполучник "щоб".'
    - sentence: 'Депутат підкреслив: «Економіка зростає». звернувши увагу на нові показники.'
      error: '».'
      answer: '»,'
      error_type: 'word'
      options: ['»,', '.»', '».', '!"']
      explanation: 'Якщо пряма мова розривається або продовжується словами автора, потрібна кома після лапок.'
    - sentence: 'Видання опублікувало гучний заголовок, щоб залучити більше читачів.'
      error: 'залучити'
      answer: 'привабити'
      error_type: 'word'
      options: ['привабити', 'витягти', 'забрати', 'знайти']
      explanation: 'Увагу або інтерес "привертають" або "приваблюють".'
    - sentence: 'Спікер бовкнув, що податки будуть знижені наступного місяця.'
      error: 'бовкнув'
      answer: 'заявив'
      error_type: 'register'
      options: ['заявив', 'крикнув', 'прошепотів', 'заплакав']
      explanation: 'У нейтральному новинному тексті не варто використовувати емоційно знижену лексику.'

