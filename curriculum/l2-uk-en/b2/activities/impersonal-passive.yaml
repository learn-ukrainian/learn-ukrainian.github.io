- type: unjumble
  title: 'Складіть речення: мова документів'
  instruction: Розташуйте слова в правильному порядку, щоб утворити офіційні повідомлення.
  items:
  - words:
    - рішення
    - про
    - скасування
    - заходу
    - було
    - прийнято
    - вчора
    answer: Рішення про скасування заходу було прийнято вчора.
  - words:
    - реєстрацію
    - на
    - міжнародну
    - наукову
    - конференцію
    - офіційно
    - відкрито
    answer: Реєстрацію на міжнародну наукову конференцію офіційно відкрито.
  - words:
    - додаткові
    - вихідні
    - дні
    - для
    - співробітників
    - наказом
    - скасовано
    answer: Додаткові вихідні дні для співробітників наказом скасовано.
  - words:
    - усі
    - необхідні
    - ремонтні
    - роботи
    - в
    - приміщенні
    - завершено
    answer: Усі необхідні ремонтні роботи в приміщенні завершено.
  - words:
    - вхід
    - до
    - головної
    - будівлі
    - після
    - шостої
    - суворо
    - заборонено
    answer: Вхід до головної будівлі після шостої суворо заборонено.
  - words:
    - інформацію
    - щодо
    - змін
    - у
    - розкладі
    - вже
    - офіційно
    - підтверджено
    answer: Інформацію щодо змін у розкладі вже офіційно підтверджено.
  - words:
    - новий
    - порядок
    - денний
    - важливого
    - засідання
    - успішно
    - затверджено
    answer: Новий порядок денний важливого засідання успішно затверджено.
  - words:
    - під
    - час
    - ретельної
    - перевірки
    - обладнання
    - встановлено
    - серйозні
    - порушення
    answer: Під час ретельної перевірки обладнання встановлено серйозні порушення.
- type: true-false
  title: 'Правда чи хиба: правила використання'
  instruction: Визначте, чи є ці твердження про безособові форми граматично правильними.
  items:
  - statement: Безособові форми на -но/-то ніколи не узгоджуються з підметом у реченні.
    correct: true
    explanation: Ці форми є повністю закам'янілими і не змінюються за родами чи числами.
  - statement: Об'єкт дії біля таких форм повинен стояти в називному відмінку.
    correct: false
    explanation: Об'єкт дії завжди вимагає знахідного відмінка (Кого? Що?).
  - statement: Можна сказати "Книга написано", і це буде правильно.
    correct: false
    explanation: 'Правильно: "Книгу написано", оскільки слово повинно бути у знахідному
      відмінку.'
  - statement: В українській мові заборонено використовувати орудний відмінок для
      вказівки на виконавця дії (наприклад, "план створено архітектором").
    correct: true
    explanation: Так, це вважається синтаксичною калькою. Потрібно використовувати
      активний стан.
  - statement: Ці форми найчастіше зустрічаються в офіційно-діловому та юридичному
      стилях.
    correct: true
    explanation: Вони ідеально підходять для наказів, звітів та констатації юридичних
      фактів.
  - statement: Безособові речення фокусують увагу на тому, хто саме виконав дію.
    correct: false
    explanation: Навпаки, їхня мета — приховати діяча або показати, що він неважливий,
      зосередившись на результаті.
  - statement: Дієприкметник "розбите" та форма "розбито" означають абсолютно те саме.
    correct: false
    explanation: '"Розбите" — це стан об''єкта (яке?), а "розбито" констатує факт
      дії (що відбулося?).'
  - statement: Форми на -но утворюються від дієприкметників із суфіксами -н- та -ен-.
    correct: true
    explanation: 'Наприклад: прочитаний → прочитано, зроблений → зроблено.'
  - statement: У медіа та новинах безособові конструкції майже не використовуються.
    correct: false
    explanation: Вони надзвичайно поширені в медіа, оскільки дозволяють стисло і швидко
      передавати факти.
  - statement: Для формального звіту краще написати "ми виконали план", ніж "план
      виконано".
    correct: false
    explanation: Офіційно-діловий стиль вимагає безособовості, тому "план виконано"
      підходить набагато краще.
- type: select
  title: Оберіть правильні варіанти
  instruction: У кожному завданні оберіть усі граматично та стилістично правильні
    речення.
  items:
  - question: Які з цих речень є граматично правильними?
    min_correct: 2
    options:
    - text: Цю статтю написано професором.
      correct: false
    - text: Цю статтю опубліковано вчора.
      correct: true
    - text: Ця стаття опубліковано вчора.
      correct: false
    - text: Професор написав цю статтю.
      correct: true
    explanation: Називний відмінок (ця стаття) або орудний діяча (професором) з формами
      на -но/-то є помилкою.
  - question: 'Оберіть речення, що відповідають нормам офіційно-ділового стилю:'
    min_correct: 2
    options:
    - text: Засідання керівної ради оголошено закритим.
      correct: true
    - text: Ми закрили засідання керівної ради.
      correct: false
    - text: Державний бюджет на наступний рік затверджено.
      correct: true
    - text: Нову школу було побудовано будівельниками.
      correct: false
    explanation: В офіційному стилі доречна безособовість без вказівки на діяча.
  - question: У яких реченнях об'єкт правильно стоїть у знахідному відмінку?
    min_correct: 2
    options:
    - text: Важливу проблему вирішено.
      correct: true
    - text: Нова система встановлено.
      correct: false
    - text: Складну ситуацію проаналізовано.
      correct: true
    - text: Чергова помилка виправлено.
      correct: false
    explanation: '"Проблему", "ситуацію" — правильний знахідний відмінок.'
  - question: 'Оберіть правильні форми перетворення пасивних дієприкметників на безособові:'
    min_correct: 3
    options:
    - text: написаний → написано
      correct: true
    - text: розбитий → розбитно
      correct: false
    - text: відкритий → відкрито
      correct: true
    - text: прочитаний → прочитано
      correct: true
    - text: завершений → завершето
      correct: false
    explanation: Суфікс -т- дає форму на -то (відкрито), а суфікси -н-/-ен- дають
      -но (написано).
  - question: Які речення не містять синтаксичних кальок (орудної форми діяча)?
    min_correct: 2
    options:
    - text: Проєкт успішно завершено командою розробників.
      correct: false
    - text: Команда розробників успішно завершила проєкт.
      correct: true
    - text: План евакуації затверджено.
      correct: true
    - text: План евакуації затверджено директором школи.
      correct: false
    explanation: Вказівка діяча в орудному відмінку (ким?) є типовою калькою.
  - question: 'Виберіть речення, які ілюструють форму на -то (від дієприкметників
      на -тий):'
    min_correct: 2
    options:
    - text: Двері щільно закрито на замок.
      correct: true
    - text: Важливі документи вже знайдено.
      correct: false
    - text: Старі образи назавжди забуто.
      correct: true
    - text: Новий маршрут створено вчора.
      correct: false
    explanation: Відкритий → відкрито, закритий → закрито, забутий → забуто.
  - question: 'Оберіть речення з правильним використанням об''єкта (не плутайте називний
      і знахідний):'
    min_correct: 2
    options:
    - text: Гарна книга прочитано за вечір.
      correct: false
    - text: Цікаву книгу прочитано за вечір.
      correct: true
    - text: Лист успішно надіслано адресату.
      correct: true
    - text: Нова машина куплено в салоні.
      correct: false
    explanation: Для слова "машина" має бути "нову машину", для "книга" — "цікаву
      книгу".
  - question: Які з цих заголовків новин звучать природно і не порушують граматичних
      правил?
    min_correct: 2
    options:
    - text: Повітряну тривогу скасовано.
      correct: true
    - text: Рух транспорту перекрито поліцією.
      correct: false
    - text: Будівництво нового мосту завершено.
      correct: true
    - text: Відкриття виставки перенесено мером.
      correct: false
    explanation: Уникнення діяча в орудному відмінку (поліцією, мером) робить заголовки
      правильними.
- type: translate
  title: 'Переклад: офіційні повідомлення'
  instruction: Оберіть найточніший переклад для офіційних і новинних повідомлень.
  items:
  - source: The decision was adopted unanimously.
    options:
    - text: Рішення було прийнято одноголосно.
