    - text: Рішення було прийнятим одноголосно.
      correct: false
    explanation: В офіційному стилі використовується безособова форма "прийнято".
  - source: The meeting is declared closed.
    options:
    - text: Засідання оголошено закритим.
      correct: true
    - text: Засідання оголошене закритим.
      correct: false
    - text: Засідання є закрите.
      correct: false
    explanation: 'Стала офіційна формула: "засідання оголошено закритим".'
  - source: Access to the building is strictly prohibited.
    options:
    - text: Вхід до будівлі суворо заборонено.
      correct: true
    - text: Вхід до будівлі є суворо заборонений.
      correct: false
    - text: Вхід до будівлі суворо заборонений.
      correct: false
    explanation: '"Суворо заборонено" — типова форма для наказів та попереджень.'
  - source: The air raid alert has been cancelled.
    options:
    - text: Повітряну тривогу скасовано.
      correct: true
    - text: Повітряна тривога скасовано.
      correct: false
    - text: Повітряну тривогу скасували.
      correct: false
    explanation: 'Зверніть увагу на знахідний відмінок об''єкта: "повітряну тривогу".'
  - source: The old order was annulled.
    options:
    - text: Старий наказ було скасовано.
      correct: true
    - text: Старий наказ був скасований.
      correct: false
    - text: Старий наказ був скасовано.
      correct: false
