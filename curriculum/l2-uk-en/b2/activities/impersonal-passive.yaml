- type: quiz
  title: 'Перевірте знання: теорія безособовості'
  items:
  - question: Яка головна комунікативна мета використання безособових форм на -но/-то?
    explanation: Ці форми використовуються для того, щоб підкреслити факт або результат
      дії.
    options:
    - text: Змістити фокус виключно на саму дію та її результат
      correct: true
    - text: Підкреслити важливість особи, яка виконала дію
      correct: false
    - text: Описати емоційний стан автора офіційного тексту
      correct: false
    - text: Зробити текст більш поетичним та загадковим
      correct: false
  - question: У якому відмінку завжди повинен стояти об'єкт при безособових формах
      на -но/-то?
    explanation: Об'єкт дії у безособових реченнях завжди стоїть у знахідному відмінку
      (Accusative).
    options:
    - text: У знахідному відмінку
      correct: true
    - text: У називному відмінку
      correct: false
    - text: В орудному відмінку
      correct: false
    - text: У родовому відмінку
      correct: false
  - question: Чому конструкція "Завдання виконано студентами" вважається граматично
      неправильною?
    explanation: Використання орудного відмінка діяча є синтаксичною калькою і порушує
      норму української мови.
    options:
    - text: Через використання орудного відмінка діяча
      correct: true
    - text: Через неправильний наголос у дієслові
      correct: false
    - text: Через відсутність підмета у цьому реченні
      correct: false
    - text: Через використання форми множини
      correct: false
  - question: Як правильно перефразувати речення "Документи перевірено комісією" українською
      мовою?
    explanation: Необхідно повністю змінити речення на активний стан.
    options:
    - text: Комісія ретельно перевірила всі документи
      correct: true
    - text: Документи були перевірені комісією
      correct: false
    - text: Документи перевірила комісією
      correct: false
    - text: Комісію було перевірено документи
      correct: false
  - question: Яку морфологічну особливість мають слова, що закінчуються на суфікси
      -но та -то?
    explanation: Ці форми є повністю закам'янілими і ніколи не узгоджуються з іншими
      словами.
    options:
    - text: Вони є абсолютно незмінними за жодних обставин
      correct: true
    - text: Вони змінюються за родами, але не за числами
      correct: false
    - text: Вони узгоджуються з підметом у називному відмінку
      correct: false
    - text: Вони завжди мають форму середнього роду
      correct: false
  - question: Від якої частини мови утворюються безособові конструкції на -но/-то?
    explanation: Процес утворення завжди базується на пасивному дієприкметнику минулого
      часу.
    options:
    - text: Від пасивного дієприкметника
      correct: true
    - text: Від активного дієприкметника
      correct: false
    - text: Від іменника або прикметника
      correct: false
    - text: Від дієприслівника теперішнього часу
      correct: false
  - question: У якому з наведених стилів найчастіше використовують дієслівні форми
      на -но/-то?
    explanation: Ці форми є будівельним матеріалом канцелярської мови та офіційного
      діловодства.
    options:
    - text: В офіційно-діловому та юридичному стилях
      correct: true
    - text: У художній літературі та поезії
      correct: false
    - text: У розмовному побутовому мовленні
      correct: false
    - text: У публіцистиці та особистих блогах
      correct: false
  - question: Яка з цих фраз найкраще підходить для формального протоколу або офіційного
      звіту?
    explanation: Офіційно-діловий стиль вимагає безособовості для надання тексту максимальної
      нейтральності.
    options:
    - text: Рішення прийнято одноголосно
      correct: true
    - text: Ми всі прийняли рішення одноголосно
      correct: false
    - text: Наше керівництво вирішило це одноголосно
      correct: false
    - text: Я особисто прийняв це рішення
      correct: false
  - question: Що описує змінний пасивний дієприкметник (наприклад, розбите вікно)?
    explanation: Пасивний дієприкметник (середнього роду) описує ознаку предмета,
      стан, у якому перебуває об'єкт.
    options:
    - text: Він описує поточний стан об'єкта
      correct: true
    - text: Він описує факт доконаної дії
      correct: false
    - text: Він описує дію, що триває зараз
      correct: false
    - text: Він описує процес виконання завдання
      correct: false
  - question: Яке з цих речень містить грубу граматичну помилку через неправильний
      відмінок?
    explanation: Слово "програма" у формі називного відмінка жіночого роду не може
      стояти біля форми на -но/-то.
    options:
    - text: Нова програма встановлено на комп'ютер
      correct: true
    - text: Нову програму встановлено на комп'ютер
      correct: false
    - text: Цей проєкт успішно завершено
      correct: false
    - text: Двері до кімнати щільно закрито
      correct: false
  instruction: Оберіть правильну відповідь.
- type: error-correction
  title: 'Виправте помилки: керування знахідним відмінком'
  instruction: 'У кожному реченні є помилка: неправильний відмінок об''єкта (використано
    називний замість знахідного). Знайдіть помилку і виберіть правильний варіант.'
  items:
  - sentence: Ця важлива стаття опубліковано у вчорашньому випуску.
    error: Ця важлива стаття
    answer: Цю важливу статтю
    error_type: phrase
    options:
    - Цю важливу статтю
    - Цій важливій статті
    - Цією важливою статтею
    - Ці важливі статті
    explanation: Об'єкт при безособовій формі має стояти у знахідному відмінку.
  - sentence: Ваша заява розглянуто керівництвом компанії.
    error: Ваша заява
    answer: Вашу заяву
    error_type: phrase
    options:
    - Вашу заяву
    - Вашій заяві
    - Вашою заявою
    - Ваші заяви
    explanation: Знахідний відмінок від "ваша заява" — "вашу заяву".
  - sentence: Нова школа побудовано в нашому районі.
    error: Нова школа
    answer: Нову школу
    error_type: phrase
    options:
    - Нову школу
    - Новій школі
    - Новою школою
    - Нові школи
    explanation: 'Використовуємо знахідний відмінок: Кого? Що? Нову школу.'
  - sentence: Книга написано надзвичайно цікавою мовою.
    error: Книга
    answer: Книгу
    error_type: word
    options:
    - Книгу
    - Книзі
    - Книгою
    - Книг
    explanation: Знахідний відмінок від слова "книга" — "книгу".
  - sentence: Ця проблема вирішено успішно.
    error: Ця проблема
    answer: Цю проблему
    error_type: phrase
    options:
    - Цю проблему
    - Цій проблемі
    - Цією проблемою
    - Ці проблеми
    explanation: 'Проблема вимагає знахідного відмінка: "цю проблему".'
  - sentence: Чергова постанова затверджено на сесії міської ради.
    error: Чергова постанова
    answer: Чергову постанову
    error_type: phrase
    options:
    - Чергову постанову
    - Черговій постанові
    - Черговою постановою
    - Чергові постанови
    explanation: Знахідний відмінок — єдиний можливий для прямого додатка в цьому
      контексті.
  - sentence: Складна робота завершено вчасно.
    error: Складна робота
    answer: Складну роботу
    error_type: phrase
    options:
    - Складну роботу
    - Складній роботі
    - Складною роботою
    - Складні роботи
    explanation: 'Знахідний відмінок: "Складну роботу".'
  - sentence: Наступна зустріч перенесено на вівторок.
    error: Наступна зустріч
    answer: Наступну зустріч
    error_type: phrase
    options:
    - Наступну зустріч
    - Наступній зустрічі
    - Наступною зустріччю
    - Наступні зустрічі
    explanation: 'Об''єкт дії "зустріч" переходить у знахідний відмінок: "наступну
      зустріч".'
- type: error-correction
  title: 'Уникайте кальок: вилучення орудного відмінка'
  instruction: Конструкції з орудним відмінком діяча є неприродними. Оберіть правильний
    варіант перефразування в активний стан.
  items:
  - sentence: Завдання було виконано найкращими студентами нашої групи.
    error: було виконано найкращими студентами
    answer: найкращі студенти виконали
    error_type: construction
    options:
    - найкращі студенти виконали
    - студентами було виконане
    - виконали студентами
    - завдання виконали студенти
    explanation: Орудний відмінок діяча ("студентами") слід замінити на називний ("студенти"),
      перетворивши його на підмет.
  - sentence: Цей важливий документ підписано директором компанії.
    error: підписано директором компанії
    answer: підписав директор компанії
    error_type: construction
    options:
    - підписав директор компанії
    - директором компанії підписано
    - директори підписали
    - підписано від директора
    explanation: 'Замість пасивної конструкції використовуємо активну: "Директор підписав
      цей документ".'
  - sentence: Проєкт успішно завершено нашою командою.
    error: завершено нашою командою
    answer: наша команда завершила
    error_type: construction
    options:
    - наша команда завершила
    - було завершено командою
    - завершила нашою командою
    - команда завершено
    explanation: 'Активна конструкція звучить природніше: "Наша команда успішно завершила
      проєкт".'
  - sentence: Рішення щодо фінансування затверджено міністерством.
    error: затверджено міністерством
    answer: затвердило міністерство
    error_type: construction
    options:
    - затвердило міністерство
    - було затверджено міністерством
    - затвердили міністерством
    - міністерством затвердило
    explanation: Міністерство — це виконавець дії, тому має бути підметом в активному
      реченні.
  - sentence: Нову систему безпеки встановлено технічним відділом.
    error: встановлено технічним відділом
    answer: встановив технічний відділ
    error_type: construction
    options:
    - встановив технічний відділ
    - відділом встановлено
    - технічний відділ встановлено
    - встановлено від відділу
    explanation: Діяч (технічний відділ) має виконувати активну дію.
  - sentence: Свято організовано місцевою владою на високому рівні.
    error: організовано місцевою владою
    answer: місцева влада організувала
    error_type: construction
    options:
    - місцева влада організувала
    - було організовано владою
    - місцевою владою організували
    - організувала владою
    explanation: Місцева влада організувала свято — це правильний активний стан.
  - sentence: Лист було надіслано секретарем вчора вранці.
    error: було надіслано секретарем
    answer: секретар надіслав
    error_type: construction
    options:
    - секретар надіслав
    - секретарем було надіслано
    - надіслали секретарем
    - було надісланий секретарем
    explanation: 'Активний стан: Секретар надіслав лист вчора вранці.'
  - sentence: Книгу написано видатним сучасним автором.
    error: написано видатним сучасним автором
    answer: написав видатний сучасний автор
    error_type: construction
    options:
    - написав видатний сучасний автор
    - видатним автором написано
    - автором написав
    - було написано автором
    explanation: Автор написав книгу — це питомо українська синтаксична структура.
