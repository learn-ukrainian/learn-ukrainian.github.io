    right: скасовано
  - left: новий закон
    right: прийнято
  - left: державний бюджет
    right: затверджено
  - left: особу підозрюваного
    right: встановлено
  - left: будівельні роботи
    right: завершено
  - left: інформацію про подію
    right: підтверджено
  - left: вхід на територію
    right: заборонено
  - left: наукову статтю
    right: написано
  - left: двері до кімнати
