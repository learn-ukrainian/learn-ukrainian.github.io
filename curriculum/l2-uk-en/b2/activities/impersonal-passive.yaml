  - source: A new tax law has been approved.
    options:
    - text: Новий закон про податки затверджено.
      correct: true
    - text: Новий закон про податки затверджений.
      correct: false
    - text: Новий закон про податки був затверджено.
      correct: false
    explanation: '"Затверджено" констатує факт прийняття закону.'
  - source: The information about the event has been confirmed.
    options:
    - text: Інформацію про подію підтверджено.
      correct: true
    - text: Інформація про подію підтверджено.
      correct: false
    - text: Інформацію про подію підтверджена.
      correct: false
    explanation: 'Об''єкт у знахідному відмінку: "інформацію підтверджено".'
- type: essay-response
  title: Напишіть офіційне оголошення
  instruction: Уявіть, що ви — організатор великої конференції. Через технічні причини
    ви змушені змінити місце проведення та скасувати один із виступів. Напишіть офіційне
    оголошення для учасників (мінімум 150 слів).
  prompt: 'Складіть офіційне повідомлення, використовуючи безособові форми на -но/-то
    (наприклад: встановлено, прийнято, скасовано, перенесено, заборонено). Текст повинен
    бути ввічливим, але максимально нейтральним і відповідати стандартам офіційно-ділового
    стилю. Уникайте вказівок на те, хто саме ухвалив рішення (не використовуйте орудний
    відмінок діяча).'
  min_words: 150
  model_answer: Шановні учасники міжнародної наукової конференції! Офіційно повідомляємо
    про зміни в програмі нашого заходу. Під час фінальної перевірки обладнання в головному
    залі було встановлено серйозні технічні несправності системи вентиляції. З огляду
    на ці обставини та з міркувань безпеки, використання цього приміщення тимчасово
    заборонено. Важливе рішення щодо зміни локації було прийнято оперативно. Усі заплановані
    доповіді перенесено до резервного конференц-залу в сусідній будівлі. На жаль,
    через щільний графік та технічні обмеження нового залу, виступ запрошеного гостя
    о 14:00 було скасовано. Усі інші заходи відбудуться відповідно до розкладу. Новий
    розклад та карту проїзду успішно надіслано на ваші електронні адреси. Реєстрацію
    на ранкові секції буде відкрито о 9:00 на новому місці. Усі організаційні питання
    наразі вирішено. Дякуємо за розуміння та перепрошуємо за тимчасові незручності.
  rubric:
  - criteria: Безособовість конструкцій
    description: Використано щонайменше 4-5 форм на -но/-то без підмета і діяча в
      орудному відмінку.
    points: 40
  - criteria: Граматична точність відмінків
    description: Об'єкти при безособових формах правильно стоять у знахідному відмінку.
    points: 30
  - criteria: Стилістична нейтральність
    description: Текст відповідає офіційно-діловому стилю, позбавлений надмірних емоцій.
    points: 20
  - criteria: Обсяг тексту
    description: Текст містить понад 150 слів.
    points: 10
