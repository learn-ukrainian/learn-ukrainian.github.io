      explanation: "Фраза 'за наявних даних' визнає можливість зміни прогнозу при надходженні нової інформації."
      options:
        - text: "наш продукт точно переможе"
          correct: false
        - text: "я гарантую стовідсотковий успіх"
          correct: false
        - text: "конкуренти обов'язково збанкрутують"
          correct: false
        - text: "за наявних даних ми очікуємо зростання"
          correct: true

- type: fill-in
  title: "Заповніть пропуски: Лексика звітів"
  instruction: "Оберіть правильне слово або словосполучення для кожного речення."
  items:
    - sentence: "Для того щоб переконати інвесторів, аналітик повинен подати детальний і структурований ________."
      answer: "звіт"
      options:
        - "звіт"
        - "прогноз"
        - "запит"
        - "відгук"
      explanation: "В корпоративному середовищі результати роботи оформлюють у вигляді звіту."
    - sentence: "Щоб уникнути помилок, фахівець використав метод ________ даних із трьох різних джерел."
      answer: "тріангуляції"
      options:
        - "екстраполяції"
        - "тріангуляції"
        - "номіналізації"
        - "регресії"
      explanation: "Тріангуляція означає перехресну перевірку інформації."
    - sentence: "Наша компанія планує ________ у міжнародній конференції, яка відбудеться в Києві."
      answer: "брати участь"
      options:
        - "приймати участь"
        - "робити участь"
        - "мати участь"
        - "брати участь"
      explanation: "Словосполучення 'приймати участь' є калькою, правильно казати 'брати участь'."
    - sentence: "Зверніть увагу на графік: на осі ________ відображено розподіл продажів за місяцями."
      answer: "абсцис"
      options:
        - "ординат"
        - "абсцис"
        - "екстраполяції"
        - "тенденцій"
      explanation: "Вісь абсцис — це горизонтальна лінія для часових періодів або сталих категорій."
    - sentence: "Падіння трафіку на сайті, ________, вказує на технічні проблеми з останнім оновленням."
      answer: "ймовірно"
      options:
        - "обов'язково"
        - "точно"
        - "безперечно"
        - "ймовірно"
      explanation: "Використання слова 'ймовірно' є прикладом професійного хеджування."
    - sentence: "Регіональний менеджер надав ________ звіт, приховавши дані про падіння продажів у вересні."
      answer: "селективний"
      options:
        - "селективний"
        - "об'єктивний"
        - "репрезентативний"
        - "абсолютний"
      explanation: "Використання селективних (відібраних) даних є маніпулятивною практикою."
    - sentence: "Ми повинні підготувати комплексний звіт ________ фінансової перевірки нашого підприємства."
      answer: "за результатами"
      options:
        - "по результатам"
        - "по результатах"
        - "за результатами"
        - "з результату"
      explanation: "Нормативним варіантом в українській мові є 'звіт за результатами'."
    - sentence: "Для розуміння загальної ситуації нам необхідний глибокий ________ усіх ринкових показників."
      answer: "аналіз"
      options:
        - "аналіз"
        - "синтез"
        - "запит"
        - "наказ"
      explanation: "Аналіз — це процес детального вивчення даних."
    - sentence: "Керівництво відділу продажів демонструвало стабільне зростання прибутку ________ всього року."
      answer: "протягом"
      options:
        - "на протязі"
        - "в продовж"
        - "протягом"
        - "через"
      explanation: "Слово 'протягом' використовується для позначення тривалості часового періоду."
    - sentence: "У розділі 'Обмеження ________' ми чесно вказали на можливу похибку у наших розрахунках."
      answer: "дослідження"
      options:
        - "дослідження"
        - "тенденції"
        - "кореляції"
        - "візуалізації"
      explanation: "Цей розділ необхідний для етичної презентації звіту."

- type: unjumble
  title: "Складіть речення: Аналітичний дискурс"
  instruction: "Упорядкуйте слова так, щоб утворити граматично правильні та логічні речення."
  items:
    - words: ["дослідження", "ринку", "виявило", "потребу", "наших", "клієнтів", "у", "термінових", "змінах"]
      answer: "Дослідження ринку виявило потребу наших клієнтів у термінових змінах."
    - words: ["стрімке", "падіння", "цього", "показника", "ймовірно", "вказує", "на", "технічні", "проблеми"]
      answer: "Стрімке падіння цього показника ймовірно вказує на технічні проблеми."
    - words: ["наша", "компанія", "планує", "брати", "участь", "у", "міжнародному", "інвестиційному", "тендері"]
      answer: "Наша компанія планує брати участь у міжнародному інвестиційному тендері."
    - words: ["протягом", "звітного", "періоду", "ми", "спостерігали", "дуже", "стабільне", "зростання", "продажів"]
      answer: "Протягом звітного періоду ми спостерігали дуже стабільне зростання продажів."
    - words: ["на", "осі", "ординат", "відображено", "обсяг", "чистого", "прибутку", "в", "тисячах", "гривень"]
      answer: "На осі ординат відображено обсяг чистого прибутку в тисячах гривень."
    - words: ["аналітик", "повинен", "зробити", "обґрунтовані", "висновки", "на", "основі", "зібраних", "даних"]
      answer: "Аналітик повинен зробити обґрунтовані висновки на основі зібраних даних."
    - words: ["ця", "маркетингова", "кампанія", "ймовірно", "сприятиме", "значному", "зростанню", "нашого", "корпоративного", "прибутку"]
      answer: "Ця маркетингова кампанія ймовірно сприятиме значному зростанню нашого корпоративного прибутку."
    - words: ["сучасний", "звіт", "має", "не", "лише", "фіксувати", "минуле", "але", "й", "прогнозувати", "майбутнє"]
      answer: "Сучасний звіт має не лише фіксувати минуле але й прогнозувати майбутнє."

- type: error-correction
