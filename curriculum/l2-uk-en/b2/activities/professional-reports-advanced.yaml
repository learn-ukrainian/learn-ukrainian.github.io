- type: reading
  title: "Аналіз тексту: Сучасна звітність"
  instruction: "Прочитайте текст та дайте відповіді на запитання."
  text: |
    Впровадження інструментів штучного інтелекту, таких як StatGPT, докорінно змінює методологію підготовки професійних звітів у державному секторі. Здатність системи миттєво обробляти запити природною мовою та візуалізувати дані у вигляді кривих зростання чи діаграм розсіювання робить макроекономічний аналіз доступним для широкого кола фахівців. Проте, незважаючи на технологічний прогрес, відповідальність за інтерпретацію залишається на аналітику. Лише людина здатна виявити хибну кореляцію або селективні дані, які можуть спотворити загальну картину. Отже, сучасний дата-сайєнтист повинен не просто подати звіт, але й провести його глибокий критичний аналіз, обґрунтовуючи свої висновки.
  tasks:
    - "Як інструменти ШІ змінюють методологію підготовки звітів?"
    - "Які види візуалізації згадуються в тексті?"
    - "Чому відповідальність за інтерпретацію даних досі лежить на аналітику?"
    - "Які дві логічні хиби здатна виявити лише людина, а не алгоритм?"

- type: essay-response
  title: "Практичне застосування: Аналітичний звіт"
  prompt: "Уявіть, що ви працюєте аналітиком у технологічній компанії. Напишіть короткий фрагмент аналітичного звіту (мінімум 150 слів) щодо зниження продажів у минулому кварталі. Використайте метод тріангуляції даних (порівняйте дані з трьох різних відділів), застосуйте професійне хеджування та уникайте тавтологій. Обов'язково зробіть обґрунтовані висновки."
  model_answer: |
    Звіт за результатами аналізу продажів у третьому кварталі.
    
    Протягом звітного періоду ми спостерігали негативну тенденцію: загальний обсяг продажів знизився на п'ятнадцять відсотків. Для глибокого аналізу ситуації було застосовано метод тріангуляції даних. Інформація від маркетингового відділу свідчить про стабільний трафік на сайті. Водночас дані технічної підтримки вказують на зростання кількості скарг щодо процесу оплати. За наявних даних фінансового відділу, кількість незавершених транзакцій зросла вдвічі.
    
    Це може свідчити про наявність серйозної технічної помилки на етапі оформлення замовлення, а не про зниження інтересу клієнтів до продукту. Зробивши екстраполяцію цих даних, ми очікуємо подальше падіння прибутку, якщо проблему не буде вирішено. Обмеження цього дослідження полягають у тому, що ми ще не маємо повних даних за останній тиждень місяця. Однак, на підставі зібраної інформації, можна дійти висновку про необхідність термінового технічного аудиту платіжної системи. Ми плануємо брати участь у тестуванні нового алгоритму вже наступного тижня.
  min_words: 150
  rubric:
    - criteria: "Використання тріангуляції даних"
      description: "Автор порівнює дані з кількох джерел для підтвердження гіпотези."
      points: 5
    - criteria: "Професійне хеджування"
      description: "Наявність модальних слів (ймовірно, може свідчити) для пом'якшення категоричності."
      points: 3
    - criteria: "Граматична коректність"
      description: "Відсутність лексичних помилок та правильне використання віддієслівних іменників."
      points: 2

- type: true-false
  title: "Перевірка розуміння: Аналітичні концепції"
  instruction: "Визначте, чи є твердження істинним (true) чи хибним (false)."
  items:
    - statement: "Основне завдання сучасного дата-сайєнтиста полягає лише у механічному зборі статистики."
      correct: false
      explanation: "Сучасний фахівець повинен інтерпретувати дані та формулювати стратегічні рекомендації."
    - statement: "Федір Щербина є одним із засновників земської бюджетної статистики в Україні."
      correct: true
      explanation: "Він проводив масштабні дослідження і розробляв унікальні методології збору інформації."
    - statement: "Метод тріангуляції даних передбачає використання лише одного надійного джерела інформації."
      correct: false
      explanation: "Тріангуляція означає перехресну перевірку інформації з використанням кількох незалежних джерел."
    - statement: "Вісь абсцис на графіку зазвичай відображає незалежні змінні, наприклад, часові періоди."
      correct: true
      explanation: "Вісь абсцис — це горизонтальна лінія, де найчастіше розміщують час або сталі категорії."
    - statement: "Хибна кореляція виникає, коли зміна двох непов'язаних показників сприймається як причинно-наслідковий зв'язок."
      correct: true
      explanation: "Це логічна хиба, наприклад, пов'язування продажу морозива та нападів акул."
    - statement: "Використання селективних даних вважається етичною та професійною практикою у бізнес-аналітиці."
      correct: false
      explanation: "Це маніпуляція, коли у звіт включають лише вигідні цифри, ігноруючи негативні."
    - statement: "Екстраполяція — це статистичний метод прогнозування майбутніх показників на основі історії."
      correct: true
      explanation: "Аналітики часто використовують екстраполяцію для побудови прогнозів."
    - statement: "Дієслово 'приймати' є єдино правильним у словосполученні 'приймати участь'."
      correct: false
      explanation: "Нормативним варіантом в українській мові є 'брати участь'."
    - statement: "Хеджування у звітах демонструє невпевненість аналітика та його низький професіоналізм."
      correct: false
      explanation: "Хеджування показує наукову обережність і зрілість фахівця."
    - statement: "Словосполучення 'вільна вакансія' є прикладом лексичної тавтології."
      correct: true
      explanation: "Слово 'вакансія' вже означає вільне робоче місце."

- type: quiz
  title: "Лексика та граматика: Офіційно-діловий стиль"
  instruction: "Оберіть одну правильну відповідь на кожне запитання."
  items:
    - question: "Який варіант є нормативним для використання в назві ділового аналітичного документа?"
      explanation: "В українській діловій мові використання фрази з прийменником 'по' є граматичною помилкою."
      options:
        - text: "Звіт за результатами"
          correct: true
        - text: "Звіт по результатам"
