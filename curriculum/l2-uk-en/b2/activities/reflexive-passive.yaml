- type: quiz
  title: 'Тест: Зворотний пасив та його властивості'
  items:
  - question: Який стиль мовлення є найприроднішим для зворотного пасиву?
    options:
    - text: Науковий та офіційно-діловий
      correct: true
    - text: Розмовно-побутовий
      correct: false
    - text: Емоційний художній
      correct: false
    - text: Фольклорний та поетичний
      correct: false
    explanation: Пасив із часткою -ся використовується в текстах, де потрібна об'єктивність
      та безособовість.
  - question: Який вид дієслова використовується для утворення пасиву з -ся?
    options:
    - text: Виключно доконаний вид
      correct: false
    - text: Виключно недоконаний вид
      correct: true
    - text: Обидва види залежно від часу
      correct: false
    - text: Тільки дієслова руху
      correct: false
    explanation: Пасив на -ся описує тривалий процес, тому вимагає тільки недоконаного
      виду.
  - question: У якому відмінку повинен стояти агент (виконавець дії) у пасивному реченні?
    options:
    - text: У називному відмінку
      correct: false
    - text: У знахідному відмінку
      correct: false
    - text: В орудному відмінку без прийменника
      correct: true
    - text: У родовому відмінку з прийменником від
      correct: false
    explanation: Агент дії завжди виражається чистим орудним відмінком.
  - question: Що відбувається з прямим додатком при трансформації активного речення
      в пасивне?
    options:
    - text: Він стає підметом у називному відмінку
      correct: true
    - text: Він залишається у знахідному відмінку
      correct: false
    - text: Він переходить в орудний відмінок
      correct: false
    - text: Він зникає з речення
      correct: false
    explanation: Колишній об'єкт дії переміщується в позицію граматичного підмета.
  - question: Після яких звуків використовується усічена частка -сь?
    options:
    - text: Після будь-яких приголосних
      correct: false
    - text: Після будь-яких голосних
      correct: true
    - text: Тільки після шиплячих
      correct: false
    - text: Тільки після губних
      correct: false
    explanation: 'Для милозвучності після голосних пишемо -сь, наприклад: почалась.'
  - question: Як правильно вимовити закінчення -ться у слові вивчається?
    options:
    - text: Як три окремі звуки т, ь, с
      correct: false
    - text: Як один подовжений м'який звук ц
      correct: true
    - text: Як твердий звук ц
      correct: false
    - text: Як м'який звук т
      correct: false
    explanation: Закінчення -ться завжди вимовляється злито як подовжений м'який свистячий
      звук.
  - question: Чи є граматично правильною конструкція Цей дім скоро збудується?
    options:
    - text: Так, це правильний пасив майбутнього часу
      correct: false
    - text: Ні, доконаний вид із -ся втрачає пасивне значення
      correct: true
    - text: Так, але тільки в розмовній мові
      correct: false
    - text: Ні, бо слово дім не може бути підметом
      correct: false
    explanation: Доконаний вид не поєднується з пасивним -ся, оскільки форма набуває
      значення самостійної дії неживого об'єкта.
  - question: Чому в розмовній мові не варто використовувати фрази типу Вечеря готується
      мамою?
    options:
    - text: Це порушує правила пунктуації
      correct: false
    - text: Це звучить неприродно та бюрократично
      correct: true
    - text: Це занадто складно для вимови
      correct: false
    - text: Слово вечеря не вживається в пасиві
      correct: false
    explanation: У розмовному стилі українська мова надає абсолютну перевагу активним
      конструкціям.
  - question: Як правильно перекласти конструкцію conducted by the scientist?
    options:
    - text: проводиться від вченого
      correct: false
    - text: проводиться через вченого
      correct: false
    - text: проводиться вченим
      correct: true
    - text: проводиться за допомогою вченого
      correct: false
    explanation: Англійський прийменник by для агента перекладається виключно орудним
      відмінком без прийменників.
  - question: Яке дієслово найкраще підходить для опису процесу створення нової програми?
    options:
    - text: аналізується
      correct: false
    - text: розглядається
      correct: false
    - text: розробляється
      correct: true
    - text: досліджується
      correct: false
    explanation: Розробляється ідеально описує технічний процес створення програмного
      забезпечення.
  - question: Що таке еліптування агента в офіційному тексті?
    options:
    - text: Це свідоме опущення інформації про виконавця дії
      correct: true
    - text: Це виділення агента великими літерами
      correct: false
    - text: Це використання двох агентів одночасно
      correct: false
    - text: Це заміна агента на займенник
      correct: false
    explanation: Еліптування означає опущення виконавця, коли він очевидний або нерелевантний.
  - question: Для чого використовується пасивний стан у наукових статтях?
    options:
    - text: Щоб зробити текст більш емоційним
      correct: false
    - text: Щоб приховати відсутність результатів
      correct: false
    - text: Щоб фокусуватися на об'єкті та процесі
      correct: true
    - text: Щоб текст виглядав довшим
      correct: false
    explanation: Пасив допомагає вибудувати максимально об'єктивну та неупереджену
      оповідь.
  - question: Яке з цих слів є дієсловом недоконаного виду?
    options:
    - text: збудувати
      correct: false
    - text: провести
      correct: false
    - text: вивчати
      correct: true
    - text: створити
      correct: false
    explanation: Вивчати відповідає на питання що робити?, тому це недоконаний вид,
      який підходить для пасиву.
  - question: Як правильно сказати про програму, яка інсталюється на комп'ютер?
    options:
    - text: Програма встановлюється
      correct: true
    - text: Програма встановиться
      correct: false
    - text: Програму установлено
      correct: false
    - text: Програма ставиться
      correct: false
    explanation: Встановлюється — це правильна недоконана пасивна форма для цього
      технічного процесу.
