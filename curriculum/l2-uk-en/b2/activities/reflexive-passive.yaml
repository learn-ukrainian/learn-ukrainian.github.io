- type: error-correction
  title: 'Виправте помилки: Агент дії'
  instruction: Виправте граматичні та стилістичні помилки в пасивних конструкціях.
  items:
  - sentence: Експеримент зараз проводиться від науковця.
    error: від науковця
    answer: науковцем
    error_type: phrase
    options:
    - науковцем
    - від науковця
    - через науковця
    - до науковця
    explanation: Агент дії виражається чистим орудним відмінком.
  - sentence: Додаток розробляється через талановитого програміста.
    error: через талановитого програміста
    answer: талановитим програмістом
    error_type: phrase
    options:
    - талановитим програмістом
    - через талановитого програміста
    - від талановитого програміста
    - для талановитого програміста
    explanation: Прийменники не потрібні, використовуйте орудний відмінок.
  - sentence: Цей закон зараз розглядається від парламенту.
    error: від парламенту
    answer: парламентом
    error_type: phrase
    options:
    - парламентом
    - від парламенту
    - через парламент
    - парламенту
    explanation: Використовуйте орудний відмінок для виконавця дії.
  - sentence: Новий дім дуже швидко збудується робітниками.
    error: збудується
    answer: будується
    error_type: word
    options:
    - будується
    - збудується
    - побудувався
    - будуватиметься
    explanation: Пасив вимагає недоконаного виду. Доконаний вид зі зворотним займенником
      не утворює класичний пасив.
  - sentence: Гаряча смачна піца зараз їсться мною.
    error: їсться мною
    answer: я їм
    error_type: register
    options:
    - я їм
    - їсться мною
    - від мене їсться
    - їлася мною
    explanation: У розмовній мові завжди надавайте перевагу активним конструкціям.
  - sentence: Нові дані щодня аналізуються від експертів.
    error: від експертів
    answer: експертами
    error_type: phrase
    options:
    - експертами
    - від експертів
    - експертам
    - через експертів
    explanation: Агент дії в пасиві не приймає прийменник від.
  - sentence: Складна проблема вивчиться нашими кращими студентами.
    error: вивчиться
    answer: вивчається
    error_type: word
    options:
    - вивчається
    - вивчиться
    - вивчується
    - вивчатиметься
    explanation: Недоконаний вид обов'язковий для пасивного процесу.
  - sentence: Кава пилася студентом під час довгої лекції.
    error: пилася студентом
    answer: студент пив
    error_type: register
    options:
    - студент пив
    - пилася студентом
    - пилася від студента
    - була випита студентом
    explanation: Побутові дії краще описувати в активному стані.
  - sentence: Машина конструюється за допомогою інженера.
