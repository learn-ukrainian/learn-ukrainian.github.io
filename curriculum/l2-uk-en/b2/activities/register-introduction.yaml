    explanation: Це калька, яка буквально означає "вибачаю себе". Правильно казати
      "перепрошую" або "вибачте".
  - statement: Комунікативна мета — це намір, який мовець хоче реалізувати через своє
      висловлювання.
    correct: true
    explanation: Саме комунікативна мета визначає, який функціональний регістр обере
      мовець.
  - statement: Змішування регістрів, наприклад використання сленгу в офіційному листуванні,
