- type: reading
  id: reading-style-intro
  title: 'Первинне джерело: Мовні регістри в дії'
  text: 'Кожен стиль має власну внутрішню логіку, свої улюблені слова та свої суворі
    заборони. Високий регістр вимагає дистанції, складної граматики та відсутності
    емоцій, тоді як низький регістр дозволяє скорочення, сленг та пряме вираження
    почуттів. Розуміння цих відмінностей дозволяє мовцю не просто передавати інформацію,
    а робити це соціально адекватно. Ми можемо знати тисячі слів, але якщо ми використаємо
    їх у неправильному стилі, наше повідомлення буде сприйняте з подивом.

    '
  tasks:
  - Чому важливо розуміти відмінності між високим та низьким регістрами?
  - Що може статися, якщо використати слова в неправильному стилі?
- type: quiz
  title: Визначення функціональних стилів
  items:
  - question: Який функціональний стиль української мови найчастіше використовується
      людьми для неофіційного щоденного спілкування та обміну особистими враженнями?
    explanation: Розмовний стиль є найприроднішим для побутових потреб.
    options:
    - text: розмовний
      correct: true
    - text: науковий
      correct: false
    - text: офіційно-діловий
      correct: false
    - text: публіцистичний
      correct: false
  - question: Яка головна комунікативна мета використання художнього стилю письменниками
      під час створення різноманітних літературних творів?
    explanation: Художній стиль має на меті викликати емоції та створити естетичний
      вплив.
    options:
    - text: естетичний вплив
      correct: true
    - text: точне інформування
      correct: false
    - text: регулювання відносин
      correct: false
    - text: встановлення стандартів
      correct: false
  - question: Який стиль вимагає від мовця абсолютної термінологічної точності, логічної
      послідовності викладу та повної відсутності емоційності?
    explanation: Це ключові характеристики наукового академічного мовлення.
    options:
    - text: науковий
      correct: true
    - text: художній
      correct: false
    - text: публіцистичний
      correct: false
    - text: розмовний
      correct: false
  - question: Для якого конкретного функціонального стилю найбільш характерною рисою
      є сувора стандартизованість та регулярне використання мовних кліше?
    explanation: Офіційно-діловий стиль уникає двозначності завдяки стандартам.
    options:
    - text: офіційно-діловий
      correct: true
    - text: науковий
      correct: false
    - text: розмовний
      correct: false
    - text: публіцистичний
      correct: false
  - question: Який стиль мовлення успішно поєднує завдання інформування суспільства
      про події з активним впливом на громадську думку?
    explanation: Публіцистичний стиль прагне не лише повідомити факт, а й дати йому
      оцінку.
    options:
    - text: публіцистичний
      correct: true
    - text: художній
      correct: false
    - text: офіційно-діловий
      correct: false
    - text: науковий
      correct: false
  - question: До якого саме функціонального стилю належить стандартна бюрократична
      фраза "У зв'язку з вкрай несприятливими погодними умовами"?
    explanation: Це типове ділове кліше для складання звітів та документів.
    options:
    - text: офіційно-діловий
      correct: true
    - text: художній
      correct: false
    - text: розмовний
      correct: false
    - text: публіцистичний
      correct: false
  - question: У якому стилі комунікації найчастіше використовується мовне явище еліпсису,
      тобто свідомий пропуск слів задля економії часу?
    explanation: У розмовному стилі еліпсис економить час, бо співрозмовники мають
      спільний контекст.
    options:
    - text: розмовний
      correct: true
    - text: науковий
      correct: false
    - text: офіційно-діловий
      correct: false
    - text: художній
      correct: false
  - question: Який стиль сучасного мовлення відзначається високою образністю та регулярним
      використанням різноманітних мовних тропів, таких як метафори?
    explanation: Образність є центральною категорією художньої літератури.
    options:
    - text: художній
      correct: true
    - text: науковий
      correct: false
    - text: офіційно-діловий
      correct: false
    - text: розмовний
      correct: false
  - question: Для якого функціонального стилю є абсолютно типовими безособові граматичні
      конструкції, наприклад, такі як "було виявлено феномен"?
    explanation: В українській науці безособові форми підкреслюють об'єктивність факту.
    options:
    - text: науковий
      correct: true
    - text: розмовний
      correct: false
    - text: публіцистичний
      correct: false
    - text: художній
      correct: false
  - question: Який функціональний стиль найшвидше реагує на суспільні події та найактивніше
      створює різноманітні неологізми для опису нових явищ?
    explanation: Публіцистичний стиль (новини) є найбільш динамічним регістром мови.
    options:
    - text: публіцистичний
      correct: true
    - text: офіційно-діловий
      correct: false
    - text: науковий
      correct: false
    - text: розмовний
      correct: false
  instruction: Оберіть правильну відповідь.
- type: match-up
  title: Стилі та їхні характеристики
  pairs:
  - left: Розмовний стиль
    right: Невимушеність, емоційність, неповні речення
  - left: Художній стиль
    right: Образність, мовні тропи, естетичний вплив
  - left: Науковий стиль
    right: Точність, термінологія, об'єктивність
  - left: Офіційно-діловий стиль
    right: Стандартизованість, мовні кліше, сувора регламентація
  - left: Публіцистичний стиль
    right: Актуальність, оцінність, вплив на громадську думку
  - left: Еліпсис
    right: Пропуск слів, які легко відновлюються з контексту
  - left: Канцелярит
    right: Штучні бюрократичні штампи у щоденному мовленні
  - left: Метафора
    right: Приховане порівняння на основі подібності предметів
  - left: Епітет
    right: Художнє означення, що підкреслює рису предмета
  - left: Комунікативна мета
    right: Намір, який мовець хоче реалізувати через текст
  - left: Неповні речення
    right: Типова ознака спонтанного щоденного спілкування
  - left: Мовні кліше
    right: Стандартні фрази для забезпечення однозначності документа
  instruction: З'єднайте відповідні елементи.
- type: group-sort
  title: Розподіліть тексти за стилями
  groups:
  - name: Розмовний
    items:
    - Ого, ллє як з відра!
    - Ти сьогодні підеш до університету?
    - Каву, будь ласка. Без цукру.
    - Ну бо я так вирішив!
  - name: Художній
    items:
    - Важкі краплі несамовито барабанили по склу.
    - Дівчина була вродлива, мов весняна квітка.
    - Осінь плаче холодним дощем.
    - Слово, моя ти єдиная зброє...
  - name: Науковий
    items:
    - У регіоні спостерігаються інтенсивні атмосферні опади.
    - Дослідження показують цікаві результати.
    - Було виявлено новий феномен.
    - У пацієнта спостерігається інтенсивний синдром.
  - name: Офіційно-діловий
    items:
    - Проведення заходу переноситься на невизначений термін.
    - Згідно з чинним законодавством України.
    - Беручи до уваги вищезазначене...
    - Доводжу до вашого відома наступне.
  instruction: Розподіліть елементи за групами.
- type: fill-in
  title: Вставте пропущені слова-маркери
  items:
  - sentence: Кожна життєва ситуація вимагає свого мовного оформлення, тому важливо
      знати _____ стилі.
    answer: функціональні
    options:
    - функціональні
    - емоційні
    - розмовні
    - художні
  - sentence: Якщо ви пишете рецензію для академічного журналу, ваша мета — об'єктивно
      проаналізувати текст, і ви використаєте _____ стиль.
    answer: науковий
    options:
    - науковий
    - діловий
    - розмовний
    - вільний
  - sentence: Сукупність умов, у яких відбувається спілкування, називається мовна
      _____.
    answer: ситуація
    options:
    - ситуація
    - кімната
    - зустріч
    - проблема
  - sentence: У побуті ми часто використовуємо _____, тобто пропуск тих слів, які
      легко відновлюються з контексту.
    answer: еліпсис
    options:
    - еліпсис
    - термін
    - канцелярит
    - троп
  - sentence: Замість кальки "вибачаюсь" в українській мові краще використовувати
      слово "_____".
    answer: перепрошую
    options:
    - перепрошую
    - вибачаю
    - прощаю
    - звиняю
  - sentence: Приховане порівняння, побудоване на подібності предметів, називається
      _____.
    answer: метафора
    options:
    - метафора
    - епітет
    - термін
    - кліше
  - sentence: Науковий _____ — це слово або словосполучення, яке називає чітко визначене
      поняття.
    answer: термін
    options:
    - термін
    - неологізм
    - штамп
    - жарт
  - sentence: В українській академічній традиції замість англійської форми "Я знайшов"
      використовується безособова форма "Було _____".
    answer: виявлено
    options:
    - виявлено
    - зроблено
    - сказано
    - подумано
  - sentence: Хвороба мови, коли прості дії описуються складними бюрократичними штампами,
      називається _____.
    answer: канцелярит
    options:
    - канцелярит
    - еліпсис
    - діалект
    - сленг
  - sentence: Головний пульс преси — це _____, адже новини живуть лише один день.
    answer: актуальність
    options:
    - актуальність
    - стандартизованість
    - образність
    - тиша
  - sentence: Щоб уникнути канцеляриту, замість фрази "знаходитися в стані очікування"
      краще сказати просто "_____".
    answer: чекати
    options:
    - чекати
    - очікувати
    - сподіватися
    - терпіти
  - sentence: Звертання "Привіт" в офіційному листуванні вважається порушенням професійної
      _____.
    answer: дистанції
    options:
    - дистанції
    - етики
    - роботи
    - кар'єри
  instruction: Оберіть правильне слово для заповнення пропуску.
- type: error-correction
  title: Виправте помилки змішування стилів і канцелярит
  items:
  - sentence: Я вибачаюсь за те, що запізнився на лекцію.
    error: вибачаюсь
    answer: перепрошую
    error_type: word
    options:
    - перепрошую
    - пробачаю
    - вибачив
    - прощаю
    explanation: Слово "вибачаюсь" має зворотну дію (вибачаю себе), нормативним є
      слово "перепрошую" або "вибачте".
  - sentence: У цій науковій статті я дослідив вплив кліматичних змін.
    error: я дослідив
    answer: було досліджено
    error_type: phrase
    options:
    - було досліджено
    - ми дослідили
    - я виявив
    - я знайшов
    explanation: Український науковий стиль вимагає безособових форм для збереження
      об'єктивності.
  - sentence: Привіт, пане професоре, надішліть мені результати іспиту.
    error: Привіт
    answer: Доброго дня
    error_type: register
    options:
    - Доброго дня
    - Шановний
    - Вітаю
    - Здрастуйте
    explanation: Слово "Привіт" є фамільярним і порушує дистанцію в офіційному листуванні.
  - sentence: На даний момент часу ми знаходимося в стані очікування автобуса.
    error: знаходимося в стані очікування
    answer: чекаємо на
    error_type: phrase
    options:
    - чекаємо на
    - очікуємо
    - є в очікуванні
    - перебуваємо
    explanation: Конструкція "знаходимося в стані очікування" — це типовий канцелярит,
      краще сказати просто "чекаємо".
  - sentence: Клієнт виявив бажання здійснити покупку нового автомобіля.
    error: здійснити покупку
    answer: купити
    error_type: phrase
    options:
    - купити
    - придбати
    - зробити купівлю
    - реалізувати купівлю
    explanation: Вживання розщеплених присудків замість звичайних дієслів робить мову
      штучною та перевантаженою.
  - sentence: Відбулося випадання атмосферних опадів у нашому місті.
    error: Відбулося випадання атмосферних опадів
    answer: Пішов дощ
    error_type: phrase
    options:
    - Пішов дощ
    - Впав дощ
    - Відбувся дощ
    - Пройшли опади
    explanation: У розмовному або публіцистичному стилі використання таких канцелярських
      штампів є недоречним.
  - sentence: Згідно діючого законодавства, ця процедура є обов'язковою.
    error: Згідно діючого
    answer: Згідно з чинним
    error_type: phrase
    options:
    - Згідно з чинним
    - Відповідно діючому
    - По діючому
    - Згідно чинного
    explanation: Правильне ділове кліше — "згідно з чинним законодавством" або "відповідно
      до чинного законодавства".
  - sentence: Ми приймаємо участь у цій міжнародній конференції.
    error: приймаємо участь
    answer: беремо участь
    error_type: phrase
    options:
    - беремо участь
    - маємо участь
    - робимо участь
    - є учасниками
    explanation: '"Приймати участь" — це калька, правильно українською мовою казати
      "брати участь".'
  instruction: Знайдіть і виправте помилку в реченні.
- type: unjumble
  title: Складіть речення наукового та офіційного стилів
  items:
  - words:
    - У
    - центральному
    - регіоні
    - країни
    - спостерігаються
    - інтенсивні
    - атмосферні
    - опади
    - у
    - вигляді
    - дощу
    answer: У центральному регіоні країни спостерігаються інтенсивні атмосферні опади
      у вигляді дощу.
  - words:
    - Проведення
    - запланованого
    - масового
    - заходу
    - переноситься
    - на
    - невизначений
    - термін
    - через
    - погодні
    - умови
    answer: Проведення запланованого масового заходу переноситься на невизначений
      термін через погодні умови.
  - words:
    - Кожна
    - життєва
    - ситуація
    - вимагає
    - свого
    - специфічного
    - мовного
    - оформлення
    - та
    - правильного
    - регістру
    answer: Кожна життєва ситуація вимагає свого специфічного мовного оформлення та
      правильного регістру.
  - words:
    - Науковий
    - стиль
    - переносить
    - нас
    - у
    - світ
    - академічних
    - досліджень
    - дисертацій
    - та
    - підручників
    answer: Науковий стиль переносить нас у світ академічних досліджень, дисертацій
      та підручників.
  - words:
    - Головна
    - характеристика
    - офіційно-ділового
    - стилю
    - полягає
    - у
    - суворій
    - стандартизованості
    - текстів
    - та
    - документів
    answer: Головна характеристика офіційно-ділового стилю полягає у суворій стандартизованості
      текстів та документів.
  - words:
    - Публіцистичний
    - регістр
    - є
    - найбільш
    - відкритим
    - і
    - легко
    - запозичує
    - слова
    - з
    - різних
    - сфер
    answer: Публіцистичний регістр є найбільш відкритим і легко запозичує слова з
      різних сфер.
  - words:
    - Високий
    - регістр
    - завжди
    - вимагає
    - дистанції
    - складної
    - граматики
    - та
    - повної
    - відсутності
    - яскравих
    - емоцій
    answer: Високий регістр завжди вимагає дистанції, складної граматики та повної
      відсутності яскравих емоцій.
  - words:
    - Розуміння
    - цих
    - стилістичних
    - відмінностей
    - дозволяє
    - мовцю
    - робити
    - своє
    - повідомлення
    - максимально
    - соціально
    - адекватним
