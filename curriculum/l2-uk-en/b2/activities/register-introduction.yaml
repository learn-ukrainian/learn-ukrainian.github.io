- type: essay-response
  title: 'Есе: Трансформація інформації'
  source_reading: reading-style-intro
  instruction: Напишіть два короткі тексти про одну подію, використовуючи різні функціональні
    стилі.
  prompt: "Уявіть ситуацію: у вашому місті раптово вимкнули електропостачання на кілька\
    \ годин. \nНапишіть два тексти про цю подію:\n1. Офіційне повідомлення від комунальної\
    \ служби (офіційно-діловий стиль).\n2. Емоційний пост у соціальній мережі від\
    \ імені мешканця міста (розмовний/публіцистичний стиль).\nПродемонструйте свідоме\
    \ використання стильових маркерів кожного регістру.\n"
  min_words: 150
  model_answer: 'Офіційне повідомлення:

    До відома мешканців міста. У зв''язку з аварійною ситуацією на центральній підстанції,
    відбулося тимчасове припинення електропостачання в центральному та південному
    районах. Ремонтні бригади вже здійснюють відновлювальні роботи. Згідно з попередніми
    оцінками, подача електроенергії буде відновлена протягом трьох годин. Просимо
    вибачення за тимчасові незручності.


    Пост у соціальній мережі:

    Оце так сюрприз! Сидимо всі в повній темряві, світло зникло просто посеред робочого
    дня. Комп''ютери вимкнулися, робота стала, навіть кави неможливо зробити. Сподіваюся,
    ці генії з комунальної служби швидко все полагодять, бо мій телефон уже сідає.
    Хто знає, що там сталося на підстанції?

    '
