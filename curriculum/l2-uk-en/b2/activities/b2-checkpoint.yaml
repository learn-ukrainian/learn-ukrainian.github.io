- type: error-correction
  title: "Виправте лексичні кальки"
  instruction: "Знайдіть російську кальку в кожному реченні та оберіть правильний український відповідник."
  items:
    - sentence: "Наш університет планує приймати участь у цьому важливому науковому дослідженні."
      error: "приймати участь"
      answer: "брати участь"
      error_type: "phrase"
      options: ["брати участь", "робити участь", "відігравати участь", "мати участь"]
      explanation: "Вислів 'приймати участь' — це калька. Правильний варіант — 'брати участь'."
    - sentence: "Його багаторічний досвід роботи відіграє величезне значення для нашої компанії."
      error: "відіграє"
      answer: "має"
      error_type: "word"
      options: ["має", "бере", "робить", "показує"]
      explanation: "Значення можна лише 'мати'. Відігравати можна 'роль'."
    - sentence: "Прошу всіх студентів відкрити свої зошити на двадцятій сторінці та почати писати."
      error: "відкрити"
      answer: "розгорнути"
      error_type: "word"
      options: ["розгорнути", "відчинити", "розплющити", "відімкнути"]
      explanation: "Зошити, підручники та книги ми 'розгортаємо'."
    - sentence: "Лектор попросив мене привести приклад використання цього нового історичного терміна."
      error: "привести"
      answer: "навести"
      error_type: "word"
      options: ["навести", "дати", "показати", "сказати"]
      explanation: "Українською мовою ми завжди 'наводимо приклад', а не приводимо."
    - sentence: "Так як ми не маємо достатньо ресурсів, нам доведеться зупинити цей складний процес."
      error: "Так як"
      answer: "Оскільки"
      error_type: "phrase"
      options: ["Оскільки", "Поки", "Відколи", "Якщо"]
      explanation: "Конструкція 'так як' є типовою калькою. Використовуйте 'оскільки'."
    - sentence: "Ця складна філософська проблема вас абсолютно не відноситься, тому не втручайтеся."
      error: "відноситься"
      answer: "стосується"
      error_type: "word"
      options: ["стосується", "належить", "вважається", "перебуває"]
      explanation: "Коли йдеться про причетність до проблеми, ми кажемо 'стосується'."
    - sentence: "Комісія повинна уважно підвести підсумки нашого довгого соціального експерименту."
      error: "підвести"
      answer: "підбити"
      error_type: "word"
      options: ["підбити", "зробити", "навести", "визначити"]
      explanation: "Підсумки завжди 'підбивають', а не підводять."
    - sentence: "Слідуючий доповідач розкаже нам про вплив діаспори на збереження ідентичності."
      error: "Слідуючий"
      answer: "Наступний"
      error_type: "word"
      options: ["Наступний", "Другий", "Інший", "Подальший"]
      explanation: "Слова 'слідуючий' не існує. Правильно казати 'наступний'."

- type: fill-in
  title: "Заповніть пропуски відповідними паронімами"
  instruction: "Оберіть правильний паронім, щоб доповнити зміст академічного речення."
  items:
    - sentence: "Його публічний виступ на конференції був надзвичайно _, хоча і не мав великої наукової цінності."
      answer: "ефектним"
      options: ["ефектним", "ефективним", "громадським", "громадянським"]
      explanation: "Йдеться про зовнішнє враження, тому правильний вибір — 'ефектним'."
    - sentence: "Цей новий метод лікування виявився дуже _ у боротьбі з тяжкими симптомами хвороби."
      answer: "ефективним"
      options: ["ефектним", "ефективним", "дефектним", "афективним"]
      explanation: "Йдеться про практичний результат, тому обираємо 'ефективним'."
    - sentence: "Кожен житель нашої держави має свій святий _ обов'язок захищати її незалежність."
      answer: "громадянський"
      options: ["громадський", "громадянський", "суспільний", "спільний"]
      explanation: "Обов'язок, пов'язаний з державою та громадянством, є громадянським."
    - sentence: "Активна _ діяльність української діаспори допомогла зберегти нашу національну культуру."
      answer: "громадська"
      options: ["громадська", "громадянська", "державна", "публічна"]
      explanation: "Діяльність суспільства та об'єднань людей називається громадською."
    - sentence: "Будь ласка, не забудьте _ вікно в аудиторії перед тим, як піти додому."
      answer: "відчинити"
      options: ["відчинити", "відкрити", "розгорнути", "розплющити"]
      explanation: "Предмети зі стулками (вікна, двері) ми відчиняємо."
    - sentence: "Наступного тижня мер міста має урочисто _ нову міську лікарню."
      answer: "відкрити"
      options: ["відчинити", "відкрити", "розгорнути", "розплющити"]
      explanation: "Установи або абстрактні речі ми відкриваємо."
    - sentence: "Пацієнт обережно _ очі після того, як лікар успішно завершив тривалу операцію."
      answer: "розплющив"
      options: ["розплющив", "відкрив", "відчинив", "розгорнув"]
      explanation: "Очі можна лише розплющувати або заплющувати."
    - sentence: "Студенти уважно слухали лектора і повільно _ свої товсті зошити для конспектів."
      answer: "розгорнули"
      options: ["розгорнули", "відкрили", "відчинили", "розплющили"]
      explanation: "Речі, що складаються зі сторінок (зошити, книги), ми розгортаємо."
    - sentence: "Цей видатний український політик завжди брав активну _ у житті своєї громади."
      answer: "участь"
      options: ["участь", "долю", "роль", "значимість"]
      explanation: "Правильний вислів — 'брати участь'."
    - sentence: "Сучасна наукова термінологія відіграє ключову _ у міжнародному академічному спілкуванні."
      answer: "роль"
      options: ["роль", "значення", "участь", "позицію"]
      explanation: "Правильний вислів — 'відігравати роль' (а не 'мати роль' або 'відігравати значення')."

- type: group-sort
  title: "Розподіліть дієслова за об'єктами"
  instruction: "Згрупуйте об'єкти відповідно до того, яке дієслово з ними використовується."
  groups:
    - name: "Відчиняти / Зачиняти"
      items: ["важкі двері", "старе вікно", "залізні ворота", "маленька кватирка"]
    - name: "Відкривати / Закривати"
      items: ["новий закон", "банківський рахунок", "сучасну лікарню", "невідому територію"]
    - name: "Розгортати / Згортати"
      items: ["шкільний підручник", "студентський зошит", "свіжу газету", "товстий журнал", "офіційний документ", "старовинну книгу"]

- type: quiz
  title: "Синтаксис та синоніміка академічного стилю"
  instruction: "Оберіть правильну відповідь на запитання щодо синтаксису та слововживання."
  items:
    - question: "Який сполучник слід використовувати для вираження причини з позитивним наслідком?"
      explanation: "Сполучник 'завдяки тому, що' використовується тоді, коли причина має позитивний, бажаний результат."
      options:
        - text: "завдяки тому, що"
          correct: true
        - text: "незважаючи на те, що"
          correct: false
        - text: "з огляду на те, що"
          correct: false
        - text: "для того, щоб"
          correct: false
    - question: "Що саме означає багатокомпонентний сполучник 'незважаючи на те, що'?"
      explanation: "Він вказує на об'єктивну обставину, всупереч якій відбувається головна дія."
      options:
        - text: "дію, що відбувається всупереч певній обставині"
          correct: true
        - text: "головну причину певної важливої історичної події"
          correct: false
        - text: "послідовність подій у часі або просторі"
          correct: false
        - text: "наслідок певного складного наукового експерименту"
          correct: false
    - question: "Яке з цих слів є стилістично нейтральним і підходить для наукового стилю?"
      explanation: "Слово 'плакати' є нейтральним, натомість інші мають яскраве експресивне забарвлення."
      options:
        - text: "плакати"
          correct: true
        - text: "ридати"
          correct: false
        - text: "голосити"
          correct: false
        - text: "скиглити"
          correct: false
    - question: "До якої категорії лексики належить слово 'скиглити' в українській мові?"
      explanation: "Це слово має зневажливий відтінок і належить до експресивної лексики."
      options:
        - text: "до експресивної лексики з негативним відтінком"
          correct: true
        - text: "до нейтральної академічної термінології"
          correct: false
        - text: "до застарілої лексики української діаспори"
          correct: false
        - text: "до офіційно-ділового стилю спілкування"
          correct: false
    - question: "Яким правильним українським словом треба завжди замінювати російську кальку 'так як'?"
      explanation: "Російське 'так как' завжди перекладається як 'оскільки', 'тому що' або 'бо'."
      options:
        - text: "оскільки"
          correct: true
        - text: "після того"
          correct: false
        - text: "подібно до"
          correct: false
        - text: "тому що як"
          correct: false
    - question: "Яке з цих понять є фундаментальним для проведення якісного наукового дослідження?"
      explanation: "Робота над дослідженням починається з формування наукової гіпотези."
      options:
        - text: "гіпотеза"
          correct: true
        - text: "діаспора"
          correct: false
        - text: "калька"
          correct: false
        - text: "синонім"
          correct: false
    - question: "Що ми зазвичай робимо з діагнозом згідно з правильною медичною термінологією?"
      explanation: "Лікарі завжди встановлюють правильний діагноз після обстеження."
      options:
        - text: "встановлюємо діагноз"
          correct: true
        - text: "відкриваємо діагноз"
          correct: false
        - text: "робимо діагноз"
          correct: false
        - text: "приймаємо діагноз"
          correct: false
    - question: "Як правильно сказати українською про дію, що підводить риску під чимось?"
      explanation: "Українською мовою ми завжди підбиваємо підсумки певної роботи."
      options:
        - text: "підбивати підсумки"
          correct: true
        - text: "підводити підсумки"
          correct: false
        - text: "зводити підсумки"
          correct: false
        - text: "робити підсумки"
          correct: false
    - question: "Що саме означає складне гуманітарне поняття 'ідентичність' у соціокультурному контексті?"
      explanation: "Ідентичність — це глибоке усвідомлення людиною своєї кревної належності до певної нації або культури."
      options:
        - text: "належність до певної нації або культури"
          correct: true
        - text: "процес переселення людей в іншу країну"
          correct: false
        - text: "об'єднання різних художніх жанрів у творі"
          correct: false
        - text: "фізичне виживання діаспори за кордоном"
          correct: false
    - question: "Яке дієслово найкраще підходить для абстрактного слова 'приклад' у вашому есе?"
      explanation: "В українській мові ми завжди наводимо приклади (навести приклад)."
      options:
        - text: "наводити"
          correct: true
        - text: "приводити"
          correct: false
        - text: "показувати"
          correct: false
        - text: "відкривати"
          correct: false

- type: unjumble
  title: "Побудуйте складнопідрядні речення"
  instruction: "Складіть академічні речення, правильно розташувавши всі слова."
  items:
    - words: ["оскільки", "цей", "метод", "є", "ефективним,", "ми", "будемо", "його", "використовувати", "надалі"]
      answer: "Оскільки цей метод є ефективним, ми будемо його використовувати надалі"
    - words: ["наша", "дослідницька", "група", "планує", "брати", "активну", "участь", "у", "цьому", "важливому", "науковому", "проєкті"]
      answer: "Наша дослідницька група планує брати активну участь у цьому важливому науковому проєкті"
    - words: ["завдяки", "тому", "що", "вчені", "відкрили", "промені,", "медицина", "зробила", "величезний", "крок", "уперед"]
      answer: "Завдяки тому що вчені відкрили промені, медицина зробила величезний крок уперед"
    - words: ["досвідчений", "лікар", "своєчасно", "встановив", "точний", "діагноз", "на", "основі", "усіх", "виявлених", "симптомів"]
      answer: "Досвідчений лікар своєчасно встановив точний діагноз на основі усіх виявлених симптомів"
    - words: ["незважаючи", "на", "те", "що", "експеримент", "був", "складним,", "він", "завершився", "дуже", "успішно"]
      answer: "Незважаючи на те що експеримент був складним, він завершився дуже успішно"
    - words: ["цей", "відомий", "громадський", "діяч", "завжди", "відігравав", "ключову", "роль", "у", "житті", "нашої", "діаспори"]
      answer: "Цей відомий громадський діяч завжди відігравав ключову роль у житті нашої діаспори"
    - words: ["кожен", "свідомий", "житель", "цієї", "держави", "має", "свій", "невід'ємний", "громадянський", "обов'язок"]
      answer: "Кожен свідомий житель цієї держави має свій невід'ємний громадянський обов'язок"
    - words: ["студенти", "повільно", "розгорнули", "свої", "підручники", "та", "уважно", "почали", "читати", "складний", "текст"]
      answer: "Студенти повільно розгорнули свої підручники та уважно почали читати складний текст"

- type: select
  title: "Множинний вибір: Академічна термінологія"
  instruction: "Оберіть усі правильні відповіді до кожного запитання."
  items:
    - question: "Які з цих слів належать до абстрактних гуманітарних або наукових понять?"
      min_correct: 3
      explanation: "Діаспора, гіпотеза та синтез є абстрактними поняттями, тоді як скелет — конкретний об'єкт."
      options:
        - text: "діаспора"
          correct: true
        - text: "гіпотеза"
          correct: true
        - text: "синтез"
          correct: true
        - text: "скелет"
          correct: false
    - question: "Які з наведених виразів є правильними українськими конструкціями?"
      min_correct: 2
      explanation: "Правильні вирази — 'брати участь' і 'відігравати роль'."
      options:
        - text: "брати участь"
          correct: true
        - text: "приймати участь"
          correct: false
        - text: "відігравати роль"
          correct: true
        - text: "мати роль"
          correct: false
    - question: "Які з цих дієслів використовуються для опису абстрактних понять або установ?"
      min_correct: 2
      explanation: "Ми відкриваємо лікарні, закони та рахунки."
      options:
        - text: "відкривати рахунок"
          correct: true
        - text: "відчиняти двері"
          correct: false
        - text: "відкривати лікарню"
          correct: true
        - text: "розплющувати очі"
          correct: false
    - question: "Які з цих слів є нормативними синонімами до російського 'так як'?"
      min_correct: 3
      explanation: "Оскільки, бо, тому що — це правильні українські відповідники."
      options:
        - text: "оскільки"
          correct: true
        - text: "бо"
          correct: true
        - text: "тому що"
          correct: true
        - text: "так як"
          correct: false
    - question: "Які з цих термінів безпосередньо стосуються процесу наукового дослідження?"
      min_correct: 3
      explanation: "Експеримент, гіпотеза та аналіз є частинами дослідницького процесу."
      options:
        - text: "експеримент"
          correct: true
        - text: "гіпотеза"
          correct: true
        - text: "аналіз"
          correct: true
        - text: "симптом"
          correct: false
    - question: "Які з цих слів належать до медичної термінології?"
      min_correct: 2
      explanation: "Діагноз та симптом — базові медичні терміни."
      options:
        - text: "діагноз"
          correct: true
        - text: "симптом"
          correct: true
        - text: "жанр"
          correct: false
        - text: "калька"
          correct: false
    - question: "Які з цих дієслів є експресивно забарвленими синонімами до слова 'плакати'?"
      min_correct: 3
      explanation: "Ридати, голосити і скиглити несуть сильне емоційне забарвлення."
      options:
        - text: "ридати"
          correct: true
        - text: "голосити"
          correct: true
        - text: "скиглити"
          correct: true
        - text: "заплющувати"
          correct: false
    - question: "Які з цих висловів є типовими лексичними помилками (кальками)?"
      min_correct: 2
      explanation: "'Підводити підсумки' та 'приводити приклад' є русизмами."
      options:
        - text: "підводити підсумки"
          correct: true
        - text: "підбивати підсумки"
          correct: false
        - text: "приводити приклад"
          correct: true
        - text: "наводити приклад"
          correct: false

- type: mark-the-words
  title: "Знайдіть наукові терміни"
  instruction: "Знайдіть і позначте всі медичні та наукові абстрактні поняття у цьому тексті."
  text: "Ця гіпотеза була сміливою, але експеримент довів її правильність. Після того як аналіз був завершений, лікар встановив діагноз і описав кожен симптом. Наш метод виявився інноваційним."
  answers: ["гіпотеза", "експеримент", "аналіз", "діагноз", "симптом", "метод"]

