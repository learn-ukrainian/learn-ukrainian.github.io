- type: reading
  title: "Первинне джерело: Звіт про експеримент"
  instruction: "Прочитайте уривок і дайте відповіді на запитання."
  text: |
    З огляду на отримані під час експерименту дані, наша наукова група змогла успішно встановити точний діагноз. Завдяки тому, що застосований нами інноваційний метод виявився надзвичайно ефективним, ми змогли підтвердити початкову гіпотезу щодо природи цього незвичного симптому. Незважаючи на те, що дослідження тривало понад рік, його результати відіграють ключову роль у подальшому розвитку нашого медичного закладу. Оскільки цей процес вимагає залучення широкого кола фахівців, ми плануємо запросити європейських колег брати активну участь у наступному етапі аналізу.
  tasks:
    - "Яка головна мета описаного в тексті дослідження і як воно вплинуло на діагноз?"
    - "Які синтаксичні конструкції використовує автор для пояснення причин та умов успіху?"
    - "Яку роль у цьому процесі відіграла початкова наукова гіпотеза дослідників?"
    - "Як саме європейські колеги будуть залучені до наступного етапу аналізу?"

- type: true-false
  title: "Перевірка розуміння тексту"
  instruction: "Визначте, чи є ці твердження правильними."
  items:
    - statement: "Слово 'ефектний' стосується практичного результату та корисної дії певного об'єкта."
      correct: false
      explanation: "Слово 'ефектний' стосується зовнішнього враження, а практичного результату стосується 'ефективний'."
    - statement: "Вислів 'приймати участь' є правильною українською конструкцією в академічному стилі."
      correct: false
      explanation: "Це російська калька, правильно казати 'брати участь'."
    - statement: "Дієслово 'відчиняти' використовується виключно для предметів, що мають стулки або створюють отвір, наприклад дверей чи вікон."
      correct: true
      explanation: "Саме так, ми відчиняємо вікна або двері."
    - statement: "Гіпотеза в науці — це чітко доведений факт, який не потребує жодної практичної перевірки."
      correct: false
      explanation: "Гіпотеза — це припущення, яке обов'язково вимагає перевірки через експеримент."
    - statement: "Сполучник 'так як' є нормативним для української мови і широко використовується в діловому стилі."
      correct: false
      explanation: "Це калька з російського 'так как', правильно використовувати 'оскільки' або 'тому що'."
    - statement: "Слово 'громадянський' пов'язане з юридичним поняттям громадянства та обов'язками перед державою."
      correct: true
      explanation: "Це слово стосується статусу громадянина."
    - statement: "Українська діаспора зберегла свою ідентичність завдяки активній громадській діяльності."
      correct: true
      explanation: "Громадська самоорганізація стала фундаментом виживання діаспори."
    - statement: "Дієслово 'заплющувати' в українській мові використовується для опису закриття банківського рахунку."
      correct: false
      explanation: "'Заплющувати' використовується виключно для очей. Рахунок у банку можна закрити."
    - statement: "Сполучник 'завдяки тому, що' завжди передає причинові відношення з позитивним відтінком."
      correct: true
      explanation: "Він вживається тоді, коли причина сприяє хорошому результату."
    - statement: "Поняття та термін — це абсолютні синоніми, які завжди можна вільно взаємозамінювати у науковому тексті."
      correct: false
      explanation: "Це різні поняття; термін має суворе спеціалізоване значення у певній галузі знань."

