- type: essay-response
  title: "Академічне есе: Роль діаспори та ідентичність"
  instruction: "Напишіть розгорнуте есе, дотримуючись академічного стилю та використовуючи складний синтаксис."
  prompt: "Проаналізуйте феномен української діаспори та її вплив на збереження національної ідентичності. У своєму есе обов'язково використайте складні сполучники (оскільки, незважаючи на те що, завдяки тому що), абстрактні гуманітарні терміни (процес, ідентичність, діаспора, громадський) та уникайте лексичних кальок. Наведіть конкретні приклади."
  min_words: 150
  model_answer: |
    Феномен української діаспори є унікальним історичним процесом, який відіграє критично важливу роль у збереженні нашої національної культури. Оскільки мільйони українців були змушені залишити свої рідні землі через жорстокі політичні переслідування, вони стикнулися з серйозною загрозою повної асиміляції. Незважаючи на те, що ці люди опинилися в абсолютно іншомовному та іншокультурному середовищі, вони змогли зберегти свою глибоку внутрішню ідентичність. 

    Це стало можливим насамперед завдяки тому, що новоприбулі емігранти відразу почали брати активну участь у громадському житті своїх спільнот. Вони спільним коштом будували церкви, відкривали недільні школи та засновували різноманітні молодіжні організації. Кожен свідомий українець за кордоном розумів свій громадянський обов'язок перед поневоленою батьківщиною і намагався всіляко підтримувати розвиток національного мистецтва та науки. Щоб навести яскравий приклад, достатньо згадати діяльність Нью-Йоркської групи поетів, які створили абсолютно новий літературний жанр в еміграції. Отже, активна громадська позиція діаспори має величезне значення для збереження нашого культурного та генетичного коду у вільному світі.
  rubric:
    - criteria: "Синтаксична складність"
      description: "Використання складнопідрядних речень з відповідними сполучниками (оскільки, незважаючи на те що)."
      points: 30
    - criteria: "Лексична точність"
      description: "Відсутність кальок, правильне використання паронімів та абстрактної термінології."
      points: 30
    - criteria: "Логіка та аргументація"
      description: "Чітка структура тексту, наявність вступу, основної частини з прикладами та висновку."
      points: 20
    - criteria: "Обсяг та розкриття теми"
      description: "Текст містить не менше 150 слів та глибоко розкриває феномен діаспори."
      points: 20
