- type: reading
  id: reading-one-member
  title: 'Первинне джерело: Науковий звіт'
  instruction: 'Уважно прочитайте звіт і зверніть увагу на типи речень.'
  text: |
    У лабораторії проведено успішний експеримент. Зразки нагрівали до критичної температури протягом двох годин.
    Було цікаво спостерігати за трансформацією матеріалу. Реєструємо результати та готуємо фінальний висновок.
    Пізній вечір. Тиша. Роботу завершено.
  tasks:
    - 'Які дії були виконані зі зразками?'
    - 'Як описана загальна атмосфера після експерименту?'
    - 'Чому автор звіту не використовує займенник «ми» перед дієсловами?'

- type: essay-response
  title: 'Есе: Опис робочого процесу'
  source_reading: reading-one-member
  prompt: 'Напишіть власний розлогий опис процесу дослідження, підготовки до іспиту або створення проєкту (мінімум 150 слів). Використайте всі чотири типи односкладних речень (означено-особові, неозначено-особові, безособові та номінативні), уникаючи надмірного використання займенників (Subject Redundancy).'
  min_words: 150
  model_answer: 'Сьогоднішній день був надзвичайно напруженим. Ранок. Гаряча кава. Налаштовуюсь на продуктивну роботу. Зібрано всі необхідні матеріали для глибокого аналізу. У відділі обговорюють останні новини проєкту, тому працювати трохи складно. Проте швидко концентруюся на своєму завданні. Мені цікаво досліджувати цю тему. Написано першу частину звіту, перевірено всі статистичні дані. Відчуваю приємну втому від зробленого. Попереду ще багато роботи, але головний етап завершено. Сподіваюся на успішний захист проєкту наступного тижня.'
  rubric:
    - criteria: 'Використання означено-особових речень'
      description: 'Правильне вживання дієслів 1-ї або 2-ї особи без займенників'
      points: 2
    - criteria: 'Використання неозначено-особових речень'
      description: 'Акцент на процесі чи дії, без вказівки на конкретних осіб'
      points: 2
    - criteria: 'Використання безособових речень'
      description: 'Наявність форм на -но/-то або конструкцій стану'
      points: 2
    - criteria: 'Використання номінативних речень'
      description: 'Створення атмосферних описів без дієслів-присудків'
      points: 2
    - criteria: 'Лексична різноманітність'
      description: 'Використання академічної та професійної лексики'
      points: 2

- type: true-false
  title: 'Правильно чи неправильно?'
  instruction: 'Визначте, чи є ці твердження про односкладні речення правильними.'
  items:
    - statement: 'Односкладні речення є граматично неповними, оскільки їм завжди бракує підмета або присудка.'
      correct: false
      explanation: 'Вони є структурно повними і не потребують відновлення «пропущених» слів.'
    - statement: 'Англомовні студенти часто припускаються помилки, додаючи займенники перед кожним дієсловом.'
      correct: true
      explanation: 'Ця помилка називається надмірністю підмета (Subject Redundancy).'
    - statement: 'Означено-особові речення часто використовуються в поезії для створення ефекту інтимності.'
      correct: true
      explanation: 'Відсутність займенника знімає дистанцію між мовцем і слухачем.'
    - statement: 'Неозначено-особові речення вимагають точного зазначення імені виконавця дії.'
      correct: false
      explanation: 'Їхній фокус — на самій дії або її результаті, виконавець залишається невідомим.'
    - statement: 'Узагальнено-особові речення є основою багатьох українських прислів’їв та приказок.'
      correct: true
      explanation: 'Вони виражають абстрактне універсальне правило або закон життя.'
    - statement: 'Форми на -но та -то ідеально підходять для емоційного художнього стилю.'
      correct: false
      explanation: 'Вони позбавляють текст емоцій і використовуються в академічному та діловому стилях.'
    - statement: 'В українській мові нормативним є безособове речення «Мені холодно», а не «Я холодно».'
      correct: true
      explanation: 'Стан сприймається як щось зовнішнє, тому особа ставиться в давальний відмінок.'
    - statement: 'Номінативні речення містять тільки підмет і можуть мати обставину місця.'
      correct: false
      explanation: 'Якщо є обставина місця, речення стає двоскладним еліптичним з пропущеним дієсловом.'
    - statement: 'Сучасний копірайтинг активно використовує номінативні конструкції для рекламних текстів.'
      correct: true
      explanation: 'Вони працюють як гачки, створюючи ефект миттєвого занурення.'
    - statement: 'У реченні «Завтра ранок» пропущено дієслово, тому воно не є номінативним.'
      correct: true
      explanation: 'Наявність обставини часу вимагає наявності дії, тому це еліптичне двоскладне речення.'

- type: quiz
  title: 'Тест: Типи речень та їхні функції'
  instruction: 'Оберіть правильний варіант відповіді для кожного запитання.'
  items:
    - question: 'Який тип односкладного речення містить дієслово першої або другої особи?'
      explanation: 'Означено-особове речення має присудок у формі 1-ї або 2-ї особи.'
      options:
        - text: 'Означено-особове речення'
          correct: true
        - text: 'Неозначено-особове речення'
          correct: false
        - text: 'Безособове речення'
          correct: false
        - text: 'Номінативне речення'
          correct: false
    - question: 'У якому реченні фокус перенесено з виконавця на саму дію?'
      explanation: 'Неозначено-особові речення концентруються на дії, а не на тому, хто її робить.'
      options:
        - text: 'У неозначено-особовому реченні'
          correct: true
        - text: 'В означено-особовому реченні'
          correct: false
        - text: 'У номінативному реченні'
          correct: false
        - text: 'В еліптичному реченні'
          correct: false
    - question: 'Який відмінок використовується для вираження фізичного або психологічного стану особи?'
      explanation: 'Особа, яка відчуває стан, ставиться в давальний відмінок (кому?).'
      options:
        - text: 'Давальний відмінок'
          correct: true
        - text: 'Називний відмінок'
          correct: false
        - text: 'Знахідний відмінок'
          correct: false
        - text: 'Орудний відмінок'
          correct: false
    - question: 'Яка з цих форм дієслова характерна для об’єктивних безособових речень?'
      explanation: 'Форми на -но, -то (зроблено, написано) використовуються в безособових реченнях.'
      options:
        - text: 'Незмінювана форма на -но, -то'
          correct: true
        - text: 'Форма першої особи множини'
          correct: false
        - text: 'Форма наказового способу'
          correct: false
        - text: 'Дієприслівник недоконаного виду'
          correct: false
    - question: 'Яке з наведених речень є класичним прикладом узагальнено-особової фольклорної конструкції?'
      explanation: 'Прислів’я «Вік живи — вік учись» є узагальнено-особовим реченням.'
      options:
        - text: 'Вік живи — вік учись.'
          correct: true
        - text: 'У двері подзвонили.'
          correct: false
        - text: 'Йому було дуже сумно.'
          correct: false
        - text: 'Зимовий ранок.'
          correct: false
    - question: 'Чому наявність обставини місця руйнує базову структуру типового номінативного речення?'
      explanation: 'Обставина вимагає дієслова (навіть пропущеного), що робить речення двоскладним.'
      options:
        - text: 'Бо обставина вимагає наявності дії.'
          correct: true
        - text: 'Бо обставина ставиться в називному відмінку.'
          correct: false
        - text: 'Бо іменник стає додатком.'
          correct: false
        - text: 'Бо речення стає безсполучниковим.'
          correct: false
    - question: 'Яка головна стилістична функція коротких номінативних речень у сучасних рекламних текстах?'
      explanation: 'Вони відсікають зайве і створюють ефект миттєвого занурення або гачка.'
      options:
        - text: 'Створення ефекту миттєвого занурення.'
          correct: true
        - text: 'Детальний опис складних процесів.'
          correct: false
        - text: 'Передача послідовності історичних подій.'
          correct: false
        - text: 'Усунення суб’єктивності в документах.'
          correct: false
    - question: 'Що означає термін Subject Redundancy у контексті вивчення сучасної української мови?'
      explanation: 'Це надмірне, непотрібне використання займенників-підметів (я, ти, ми).'
      options:
        - text: 'Надмірне вживання займенників-підметів.'
          correct: true
        - text: 'Пропуск важливих іменників у тексті.'
          correct: false
        - text: 'Неправильне узгодження дієслова з підметом.'
          correct: false
        - text: 'Вживання пасивного стану замість активного.'
          correct: false
    - question: 'Який тип односкладного речення найкраще підходить для формального академічного наукового звіту?'
      explanation: 'Безособове речення констатує об’єктивний результат без зайвих емоцій.'
      options:
        - text: 'Безособове речення з формою на -но.'
          correct: true
        - text: 'Означено-особове речення з часткою ми.'
          correct: false
        - text: 'Еліптичне розмовне речення.'
          correct: false
        - text: 'Узагальнено-особове речення-прислів’я.'
          correct: false
    - question: 'Як найприродніше правильно перекласти українською мовою англійське безособове речення I am cold?'
      explanation: 'Стан особи виражається давальним відмінком займенника і безособовим прислівником.'
      options:
        - text: 'Мені холодно.'
          correct: true
        - text: 'Я є холодний.'
          correct: false
        - text: 'Я холодно.'
          correct: false
        - text: 'Мене холодно.'
          correct: false

- type: unjumble
  title: 'Складіть речення'
  instruction: 'Утворіть граматично правильні односкладні речення з поданих слів.'
  items:
    - words: ['дослідження', 'було', 'проведено', 'в', 'сучасній', 'університетській', 'лабораторії']
      answer: 'Дослідження було проведено в сучасній університетській лабораторії'
    - words: ['мені', 'завжди', 'цікаво', 'читати', 'нові', 'статті', 'про', 'технології']
      answer: 'Мені завжди цікаво читати нові статті про технології'
    - words: ['сьогодні', 'по', 'радіо', 'повідомили', 'про', 'важливий', 'науковий', 'процес']
      answer: 'Сьогодні по радіо повідомили про важливий науковий процес'
    - words: ['сподіваємося', 'на', 'швидке', 'та', 'ефективне', 'впровадження', 'цього', 'алгоритму']
      answer: 'Сподіваємося на швидке та ефективне впровадження цього алгоритму'
    - words: ['надворі', 'швидко', 'сутеніє', 'тому', 'варто', 'повертатися', 'додому']
      answer: 'Надворі швидко сутеніє тому варто повертатися додому'
    - words: ['у', 'коридорах', 'університету', 'активно', 'обговорюють', 'результати', 'складного', 'іспиту']
      answer: 'У коридорах університету активно обговорюють результати складного іспиту'
    - words: ['пізній', 'вечір', 'і', 'абсолютна', 'тиша', 'в', 'порожній', 'аудиторії']
      answer: 'Пізній вечір і абсолютна тиша в порожній аудиторії'
    - words: ['усі', 'необхідні', 'матеріали', 'для', 'нашого', 'проєкту', 'вже', 'затверджено']
      answer: 'Усі необхідні матеріали для нашого проєкту вже затверджено'

- type: error-correction
  title: 'Виправте граматичні та стилістичні помилки'
  instruction: 'Знайдіть помилку в реченні та оберіть правильний варіант.'
  items:
    - sentence: 'Я цікаво слухати лекцію про новітні технології.'
      error: 'Я'
      answer: 'Мені'
      error_type: 'word'
      options: ['Я', 'Мені', 'Мене', 'Мною']
      explanation: 'Прислівник стану «цікаво» вимагає використання давального відмінка для особи.'
    - sentence: 'Ми провели глибокий аналіз і ми зробили важливі висновки.'
      error: 'ми зробили'
      answer: 'зробили'
      error_type: 'phrase'
      options: ['ми зробили', 'зробили', 'нас зробили', 'були зроблені']
      explanation: 'Повторення займенника «ми» створює надмірність (Subject Redundancy).'
    - sentence: 'Новий бюджет був затверджений фінансовою комісією вчора.'
      error: 'був затверджений'
      answer: 'затверджено'
      error_type: 'phrase'
      options: ['був затверджений', 'затверджено', 'затвердила', 'є затверджений']
      explanation: 'В офіційно-діловому стилі краще використовувати безособову форму на -но.'
    - sentence: 'Документи успішно перевірені та підписані керівником відділу.'
      error: 'перевірені та підписані'
      answer: 'перевірено та підписано'
      error_type: 'phrase'
      options: ['перевірені та підписані', 'перевірено та підписано', 'перевірили та підписали', 'були перевірені та підписані']
      explanation: 'В офіційному тексті перевага надається безособовим дієслівним формам на -но.'
    - sentence: 'Ти обов’язково прочитай цю статтю до завтрашнього семінару.'
      error: 'Ти обов’язково'
      answer: 'Обов’язково'
      error_type: 'phrase'
      options: ['Ти обов’язково', 'Обов’язково', 'Тебе обов’язково', 'Тобі обов’язково']
      explanation: 'Дієслово наказового способу самостійно вказує на особу, займенник зайвий.'
    - sentence: 'Він сумно дивитися на результати свого дослідження.'
      error: 'Він'
      answer: 'Йому'
      error_type: 'word'
      options: ['Він', 'Йому', 'Його', 'Ним']
      explanation: 'Конструкція стану вимагає давального відмінка для виконавця (кому?).'
    - sentence: 'Завтра ранок — це номінативне речення, що описує природу.'
      error: 'номінативне'
      answer: 'еліптичне двоскладне'
      error_type: 'phrase'
      options: ['номінативне', 'еліптичне двоскладне', 'безособове', 'означено-особове']
      explanation: 'Обставина часу (завтра) передбачає наявність дієслова, тому речення двоскладне.'
    - sentence: 'По радіо вони сказали, що завтра буде сильний снігопад.'
      error: 'вони сказали'
      answer: 'сказали'
      error_type: 'phrase'
      options: ['вони сказали', 'сказали', 'воно сказало', 'сказано']
      explanation: 'У неозначено-особовому реченні вказівка на невідомого виконавця («вони») є зайвою калькою.'

- type: fill-in
  title: 'Заповніть пропуски'
  instruction: 'Оберіть правильну форму для завершення речень.'
  items:
    - sentence: 'Під час експерименту нові зразки матеріалів успішно _____.'
      answer: 'протестовано'
      options: ['протестували', 'протестовано', 'були протестовані', 'протестують']
      explanation: 'Безособова форма на -но є оптимальною для звіту.'
    - sentence: 'Для досягнення мети _____ не зупинятися на половині шляху.'
      answer: 'важливо'
      options: ['важливий', 'важливо', 'важлива', 'важливі']
      explanation: 'Безособовий прислівник стану.'
    - sentence: 'З самого ранку надворі _____ і віє холодний вітер.'
      answer: 'дощить'
      options: ['дощ', 'дощить', 'іде дощ', 'дощовий']
      explanation: 'Безособове дієслово, що описує стан природи.'
    - sentence: '_____ вчора нову цікаву статтю про штучний інтелект.'
      answer: 'Прочитав'
      options: ['Я прочитав', 'Прочитав', 'Прочитано', 'Прочитали']
      explanation: 'Означено-особове речення є більш лаконічним без займенника я.'
    - sentence: 'Кажуть, що цей науковий _____ змінить наше уявлення про фізику.'
      answer: 'метод'
      options: ['метод', 'методу', 'методом', 'методі']
      explanation: 'Іменник у називному відмінку виконує функцію підмета.'
    - sentence: 'Сьогодні на лекції професор пояснював нове теоретичне _____.'
      answer: 'поняття'
      options: ['поняття', 'поняттям', 'поняттю', 'понятій']
      explanation: 'Іменник у знахідному відмінку (прямий додаток).'
    - sentence: 'Студентам було дуже _____ слухати розповідь про космічні дослідження.'
      answer: 'цікаво'
      options: ['цікавий', 'цікаво', 'цікавість', 'цікаві']
      explanation: 'Прислівник стану поєднується з давальним відмінком особи (студентам).'
    - sentence: 'Ранкова кава. Свіжі новини. Типове _____ речення в рекламі.'
      answer: 'номінативне'
      options: ['номінативне', 'безособове', 'еліптичне', 'неозначено-особове']
      explanation: 'Речення, що складається лише з підмета-іменника, називається номінативним.'
    - sentence: 'Нам _____ обговорити результати нашого останнього експерименту.'
      answer: 'потрібно'
