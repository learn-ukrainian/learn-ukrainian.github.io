- type: reading
  title: "Аналіз стилістичного тексту"
  instruction: "Прочитайте уривок та дайте відповіді на запитання для аналізу."
  text: |
    Кожен функціональний стиль української мови має свої специфічні маркери. В офіційно-діловому стилі вимагається максимальна стандартизація та використання кліше, як-от "чинне законодавство" або "згідно із законом". Натомість публіцистичний стиль прагне емоційно впливати на аудиторію, тому активно застосовує оцінну лексику, наприклад "рушійна сила" чи "консолідація суспільства". У науковому стилі найголовнішою є абсолютна об'єктивність, тому автори часто використовують безособові конструкції, а висновки формулюють виключно "на підставі отриманих даних".
  tasks:
    - "Які специфічні кліше характерні для офіційно-ділового стилю?"
    - "Яка головна мета публіцистичного стилю згідно з цим текстом?"
    - "Наведіть приклади емоційної лексики, що використовується в медіа."
    - "Чому в науковому стилі автори надають перевагу безособовим конструкціям?"

- type: true-false
  title: "Правда чи брехня: Регістри спілкування"
  instruction: "Визначте, чи є ці твердження про стилі мовлення правильними."
  items:
    - statement: "Офіційно-діловий стиль в українській мові не має історичного коріння і сформувався нещодавно."
      correct: false
      explanation: "Українська юридична термінологія має тисячолітню традицію ще від часів Руської Правди."
    - statement: "Документ Руська Правда є доказом давньої традиції формування української юридичної термінології."
      correct: true
      explanation: "Це справді перша писемна збірка правових норм одинадцятого століття."
    - statement: "Вираз діюче законодавство є правильним варіантом в українській літературній мові."
      correct: false
      explanation: "Правильний юридичний термін — чинне законодавство."
    - statement: "Прийменник згідно завжди вимагає після себе слова з та іменника в орудному відмінку."
      correct: true
      explanation: "Тому правильно говорити: згідно з інструкцією."
    - statement: "Словосполучення пам'ятний сувенір є правильним, оскільки підкреслює важливість подарунка."
      correct: false
      explanation: "Це плеоназм, адже сувенір — це вже річ на згадку."
    - statement: "Термін плеоназм означає стилістичну помилку, пов'язану з дублюванням змісту в тексті."
      correct: true
      explanation: "Це ситуація, коли два слова означають одне й те саме."
    - statement: "У науковому стилі заохочується використання емоційних епітетів та художніх метафор."
      correct: false
      explanation: "Науковий стиль вимагає абсолютної об'єктивності та відсутності емоцій."
    - statement: "Безособові конструкції часто використовуються в академічних текстах для акценту на процесі."
      correct: true
      explanation: "Вони допомагають приховати автора дослідження."
    - statement: "Фраза приймати міри є російською калькою, яку слід завжди замінювати на вживати заходів."
      correct: true
      explanation: "Українською мовою міри можна лише вимірювати."
    - statement: "Публіцистичний стиль прагне до максимальної сухості та відсутності будь-яких емоцій у повідомленнях."
      correct: false
      explanation: "Навпаки, він живе емоціями для впливу на суспільство."
    - statement: "Іван Вишенський є одним із найвидатніших письменників-полемістів в історії української літератури."
      correct: true
      explanation: "Його твори стали фундаментом для сучасної публіцистики."
    - statement: "Риторичні питання вимагають обов'язкової прямої відповіді від співрозмовника під час розмови."
      correct: false
      explanation: "Це запитання, яке не потребує відповіді, а лише змушує замислитися."
    - statement: "Вираз на підставі отриманих даних є стандартним кліше для висновків у науковому стилі."
      correct: true
      explanation: "Він підкреслює об'єктивність результатів дослідження."
    - statement: "Перемикання кодів означає здатність використовувати один стиль спілкування в усіх можливих життєвих ситуаціях."
      correct: false
      explanation: "Перемикання кодів — це вміння адаптувати свій регістр під різні ситуації."

- type: quiz
  title: "Перевірка знань: Стилістичні норми"
  instruction: "Оберіть одну правильну відповідь на кожне запитання."
  items:
    - question: "Яке з цих словосполучень є абсолютним маркером офіційно-ділового стилю в документах?"
      options:
        - text: "чинне законодавство"
          correct: true
        - text: "діюче законодавство"
          correct: false
        - text: "сучасний закон"
          correct: false
        - text: "дійсний наказ"
          correct: false
      explanation: "Словосполучення чинне законодавство є єдино правильним маркером для офіційних документів."
    - question: "Як правильно сформулювати українською мовою заклик до вирішення проблеми чи небезпеки?"
      options:
        - text: "вживати заходів"
          correct: true
        - text: "приймати міри"
          correct: false
        - text: "робити міри"
          correct: false
        - text: "застосовувати рішення"
          correct: false
      explanation: "Вираз приймати міри є калькою, правильно казати вживати заходів."
    - question: "Яка стилістична помилка полягає у дублюванні однакового змісту двома суміжними словами?"
      options:
        - text: "плеоназм"
          correct: true
        - text: "метафора"
          correct: false
        - text: "інтерференція"
          correct: false
        - text: "калька"
          correct: false
      explanation: "Плеоназм — це стилістична надмірність, наприклад, вільна вакансія."
    - question: "Який історичний документ є доказом давньої традиції української юридичної термінології та права?"
      options:
        - text: "Руська Правда"
          correct: true
        - text: "Слово о полку Ігоревім"
          correct: false
        - text: "Повість минулих літ"
          correct: false
        - text: "Конституція Пилипа Орлика"
          correct: false
      explanation: "Руська Правда зафіксувала юридичну термінологію ще в одинадцятому столітті."
    - question: "Якого відмінка вимагає відіменниковий прийменник відповідно до в сучасному діловому стилі?"
      options:
        - text: "родового відмінка"
          correct: true
        - text: "орудного відмінка"
          correct: false
        - text: "давального відмінка"
          correct: false
        - text: "знахідного відмінка"
          correct: false
      explanation: "Правильно казати: відповідно до наказу (родовий відмінок)."
    - question: "Який прийменник обов'язково повинен стояти після слова згідно в офіційних документах?"
      options:
        - text: "з (або із, зі)"
          correct: true
        - text: "до"
          correct: false
        - text: "від"
          correct: false
        - text: "за"
          correct: false
      explanation: "Українською мовою правильно казати згідно з інструкцією."
    - question: "Як правильно українською мовою сказати про свою участь у певному публічному заході?"
      options:
        - text: "брати участь"
          correct: true
        - text: "приймати участь"
          correct: false
        - text: "робити участь"
          correct: false
        - text: "здійснювати участь"
          correct: false
      explanation: "Фраза приймати участь є калькою, правильно — брати участь."
    - question: "Який жанр літератури є історичним фундаментом для сучасного українського публіцистичного стилю?"
      options:
        - text: "полеміка"
          correct: true
        - text: "комедія"
          correct: false
        - text: "трагедія"
          correct: false
        - text: "лірика"
          correct: false
      explanation: "Полемічна література шістнадцятого століття заклала основи публіцистики."
    - question: "Який лексичний маркер часто використовується в медіа для позначення об'єднання людей?"
      options:
        - text: "консолідація суспільства"
          correct: true
        - text: "прозорість влади"
          correct: false
        - text: "чинне законодавство"
          correct: false
        - text: "науковий аналіз"
          correct: false
      explanation: "Консолідація суспільства означає об'єднання навколо спільної мети."
    - question: "Що є головною і найважливішою ознакою правильного тексту сучасного наукового стилю?"
      options:
        - text: "абсолютна об'єктивність"
          correct: true
        - text: "емоційна забарвленість"
          correct: false
        - text: "наявність метафор"
          correct: false
        - text: "короткі речення"
          correct: false
      explanation: "Науковий стиль вимагає логічності, точності та абсолютної об'єктивності."
    - question: "Як правильно сказати про прийняття певного вердикту в офіційному контексті чи на зборах?"
      options:
        - text: "ухвалювати рішення"
          correct: true
        - text: "приймати рішення"
          correct: false
        - text: "робити рішення"
          correct: false
        - text: "виконувати рішення"
          correct: false
      explanation: "Рішення можна ухвалювати, а вираз приймати рішення є помилковим."
    - question: "Яка синтаксична конструкція найчастіше використовується для формулювання серйозних наукових висновків?"
      options:
        - text: "на підставі отриманих даних"
          correct: true
        - text: "на мою власну думку"
          correct: false
        - text: "як мені здається"
          correct: false
        - text: "через особисті переконання"
          correct: false
      explanation: "Наукові висновки формулюються виключно на підставі отриманих даних."
    - question: "Яка граматична форма домінує в академічних текстах для підкреслення об'єктивності наукового процесу?"
      options:
        - text: "безособова конструкція"
          correct: true
        - text: "особове дієслово"
          correct: false
        - text: "окличне речення"
          correct: false
        - text: "емоційний епітет"
          correct: false
      explanation: "Безособові конструкції (наприклад, було досліджено) приховують автора."
    - question: "Яке словосполучення є яскравим прикладом поширеного плеоназму, якого слід уникати під час спілкування?"
      options:
        - text: "вільна вакансія"
          correct: true
        - text: "чинне законодавство"
          correct: false
        - text: "прозорість влади"
          correct: false
        - text: "наукова робота"
          correct: false
      explanation: "Слово вакансія вже означає вільну посаду, тому слово вільна є зайвим."

- type: fill-in
  title: "Заповніть пропуски: Регістри в дії"
  instruction: "Оберіть правильне слово або фразу для кожного речення."
  items:
    - sentence: "Ми завжди працюємо суворо відповідно до вимог, які встановлює чинне ... нашої країни."
      answer: "законодавство"
      options:
        - "законодавство"
        - "правило"
        - "рішення"
        - "бажання"
    - sentence: "Під час перевірки комісія діяла виключно згідно ... розробленою інструкцією."
      answer: "з"
      options:
        - "з"
        - "до"
        - "по"
        - "від"
    - sentence: "Директор підприємства наказав негайно вживати ... для усунення цієї серйозної проблеми."
      answer: "заходів"
      options:
        - "заходів"
        - "міри"
        - "кроки"
        - "покарання"
    - sentence: "Ми просимо всіх небайдужих громадян брати активну ... у цьому важливому проєкті."
      answer: "участь"
      options:
        - "участь"
        - "допомогу"
        - "роботу"
        - "позицію"
    - sentence: "Для забезпечення повноцінного розвитку демократії критично важливою є ... сучасної влади."
      answer: "прозорість"
      options:
        - "прозорість"
        - "таємність"
        - "емоційність"
        - "швидкість"
    - sentence: "Головна стратегічна мета цієї великої інформаційної кампанії — максимальна ... розрізненого суспільства."
      answer: "консолідація"
      options:
        - "консолідація"
        - "критика"
        - "історія"
        - "байдужість"
    - sentence: "Усі кінцеві висновки цього наукового дослідження зроблені виключно на підставі отриманих ...."
      answer: "даних"
      options:
        - "даних"
        - "емоцій"
        - "чуток"
        - "бажань"
    - sentence: "Після тривалої професійної дискусії керівний комітет нарешті зміг ... єдине правильне рішення."
      answer: "ухвалити"
      options:
        - "ухвалити"
        - "прийняти"
        - "зробити"
        - "створити"
    - sentence: "У серйозних наукових текстах часто використовується ... граматична конструкція для об'єктивності."
      answer: "безособова"
      options:
        - "безособова"
        - "емоційна"
        - "особова"
        - "художня"
    - sentence: "Вираз пам'ятний сувенір — це типовий ..., адже слово сувенір вже містить пам'ять."
      answer: "плеоназм"
      options:
        - "плеоназм"
        - "термін"
        - "архаїзм"
        - "діалектизм"
    - sentence: "Найпершим відомим писемним збірником правових норм Київської держави була Руська ...."
      answer: "Правда"
      options:
        - "Правда"
        - "Історія"
        - "Конституція"
        - "Літопис"
    - sentence: "У суворому діловому листуванні керівництво дуже часто використовує формулу: вирішено довести до ...."
      answer: "відома"
      options:
        - "відома"
        - "знання"
        - "розуміння"
        - "уваги"
    - sentence: "Укладаючи цей важливий договір, обидві сторони беруть на себе певні ... щодо виконання."
      answer: "зобов'язання"
      options:
        - "зобов'язання"
        - "бажання"
        - "обіцянки"
        - "мрії"
    - sentence: "Талановиті журналісти часто використовують ... питання, які змушують читачів глибоко задуматися."
      answer: "риторичні"
      options:
        - "риторичні"
        - "прямі"
        - "наукові"
        - "короткі"

- type: error-correction
  title: "Виправте помилку: Суржик та кальки"
  instruction: "Знайдіть і виправте стилістичну або граматичну помилку в кожному реченні."
  items:
    - sentence: "Він довго шукав роботу, оскільки на новому підприємстві з'явилася дуже вигідна вільна вакансія."
      error: "вільна вакансія"
      answer: "вакансія"
      error_type: "register"
      options:
        - "вакансія"
        - "вільна посада"
        - "вільне місце"
        - "робоче місце"
      explanation: "Слово вакансія означає вільну посаду, додавати прикметник вільна є плеоназмом."
    - sentence: "Дирекція нашої міської школи вирішила негайно приймати міри щодо термінового ремонту старого даху."
      error: "приймати міри"
      answer: "вживати заходів"
      error_type: "phrase"
      options:
        - "вживати заходів"
        - "робити кроки"
        - "виконувати міри"
        - "брати заходи"
      explanation: "Міри можна лише вимірювати. Правильний варіант — вживати заходів."
    - sentence: "Ці досвідчені будівельники виконували роботу чітко згідно затвердженого архітектурного плану нашого проекту."
      error: "згідно затвердженого"
      answer: "згідно із затвердженим"
      error_type: "construction"
      options:
        - "згідно із затвердженим"
        - "згідно до затвердженого"
        - "по затвердженому"
        - "відповідно затвердженого"
      explanation: "Прийменник згідно завжди вимагає з (або із) та орудного відмінка."
    - sentence: "За результатами тривалого публічного обговорення міська рада вирішила приймати рішення про збільшення фінансування."
      error: "приймати рішення"
      answer: "ухвалювати рішення"
      error_type: "phrase"
      options:
        - "ухвалювати рішення"
        - "виносити рішення"
        - "робити рішення"
        - "брати рішення"
      explanation: "В українській мові рішення ухвалюють, а не приймають."
    - sentence: "Абсолютно всі студенти нашого факультету повинні обов'язково приймати участь у цій великій науковій конференції."
      error: "приймати участь"
      answer: "брати участь"
      error_type: "phrase"
      options:
        - "брати участь"
        - "мати участь"
        - "робити участь"
        - "здійснювати участь"
      explanation: "Фраза приймати участь є поширеною російською калькою, правильно — брати участь."
    - sentence: "Верховний суддя повністю погодився приймати до уваги всі надані відомим адвокатом нові беззаперечні докази."
      error: "приймати до уваги"
