- type: reading
  title: "Читання: Офіційний лист-запит"
  instruction: "Прочитайте зразок ділового листа та дайте відповіді на запитання."
  text: |
    Шановний пане Директоре! Звертаємося до Вас у межах підготовки до щорічного фінансового аудиту. Згідно з умовами нашої співпраці, просимо Вас надати копії актів виконаних робіт за другий квартал поточного року. Ці документи необхідні нам для завершення детального аналізу та оптимізації робочого процесу. Будемо вдячні за оперативну відповідь та сприяння у вирішенні цього питання. Чи не могли б Ви надіслати матеріали до кінця цього тижня? З повагою, Іван Петренко, Головний аналітик.
  tasks:
    - "Яка головна мета цього електронного листа?"
    - "Які саме документи просить надати автор листа?"
    - "Яку ввічливу конструкцію використано для формулювання запиту?"
    - "До якого терміну автор просить надіслати необхідні матеріали?"

- type: true-false
  title: "Правильно чи неправильно: Етикет листування"
  instruction: "Визначте, чи є твердження правильними згідно з правилами українського ділового листування."
  items:
    - statement: "Електронний лист в українському бізнесі завжди має бути менш формальним, ніж повідомлення у месенджері."
      correct: false
      explanation: "Електронна пошта виступає основним майданчиком для офіційних домовленостей і вимагає вищого рівня формальності."
    - statement: "Займенник 'Ви' при зверненні до однієї особи в офіційному листі завжди пишеться з великої літери."
      correct: true
      explanation: "Це є обов'язковим маркером професійної поваги при зверненні до однієї особи."
    - statement: "Фраза 'Доброго дня!' є нормативним та найкращим варіантом для початку ділового листа."
      correct: false
      explanation: "Родовий відмінок традиційно використовується для побажань при прощанні. Правильно писати 'Добрий день!'."
    - statement: "Канцелярит характеризується використанням активних дієслів та емоційною відкритістю."
      correct: false
      explanation: "Канцелярит — це бюрократичний стиль із надмірним використанням пасивних конструкцій та штучних словосполучень."
    - statement: "Тема листа (Subject Line) має бути максимально конкретною, наприклад 'Запит щодо контракту №123'."
      correct: true
      explanation: "Абстрактні теми на кшталт 'Питання' або 'Важливо' є ознакою непрофесіоналізму."
    - statement: "В українській мові для звертання традиційно та обов'язково використовується кличний відмінок."
      correct: true
      explanation: "Використання називного відмінка у звертаннях є грубою граматичною помилкою."
    - statement: "Звертання 'Шановний пан Петро' є граматично правильним в офіційному стилі."
      correct: false
      explanation: "Правильна форма у кличному відмінку: 'Шановний пане Петре!'."
    - statement: "Формула 'З повагою,' є найбільш універсальним та безпечним варіантом завершення ділового листа."
      correct: true
      explanation: "Вона підходить для спілкування з клієнтами, керівниками та незнайомими людьми."
    - statement: "Номіналізація означає перетворення іменників на дієслова для збереження динаміки тексту."
      correct: false
      explanation: "Номіналізація — це зворотний процес перетворення дієслів на іменники (вирішити -> вирішення)."
    - statement: "Вислів 'приймати участь' є правильною українською конструкцією для офіційних документів."
      correct: false
      explanation: "Це калька з російської мови. Нормативна українська форма — 'брати участь'."

- type: essay-response
  title: "Письмове завдання: Лист-нагадування"
  instruction: "Напишіть професійний лист-нагадування партнеру щодо затримки важливих документів."
  prompt: "Ви працюєте менеджером проєктів. Ваш партнер (Олег) мав надіслати вам фінансовий звіт ще три дні тому. Без цього звіту ви не можете продовжити детальний аналіз проєкту. Напишіть йому електронного листа (мінімум 150 слів), у якому ви: 1) ввічливо нагадаєте про дедлайн, 2) поясните, чому цей звіт критично важливий для робочого процесу, 3) використаєте позитивне формулювання без агресивних звинувачень, 4) дотримаєтесь правильної структури листа (тема, звертання, контекст, заклик до дії, прощання)."
  min_words: 150
  model_answer: |
    Тема: Нагадування: Фінансовий звіт за попередній місяць для завершення аналізу проєкту
    
    Шановний пане Олегу!
    
    Звертаюся до Вас у межах нашої співпраці над поточним проєктом модернізації. Хочу переконатися, що Ви успішно отримали мій попередній запит щодо фінансової документації.
    
    Наразі наша команда проводить детальний аналіз витрат, і для успішного синтезу даних нам необхідний Ваш фінансовий звіт за минулий місяць. Оскільки ми маємо жорсткий внутрішній графік, відсутність цієї інформації може вплинути на загальний термін дії затвердженого плану. 
    
    Ми розуміємо Вашу високу завантаженість, проте будемо надзвичайно вдячні, якщо Ви знайдете можливість надіслати матеріали до кінця сьогоднішнього робочого дня. Це дозволить нам оптимізувати процес та вчасно підготувати фінальну презентацію для керівництва. Якщо Вам потрібна будь-яка допомога чи додаткові роз'яснення з нашого боку, будь ласка, повідомте мені.
    
    Наперед щиро дякую за розуміння, оперативність та сприяння у вирішенні цього питання.
    
    З повагою,
    Менеджер проєктів
    Компанія "Альфа"
  rubric:
    - criteria: "Структура листа"
      description: "Наявні всі елементи ділового листа: чітка тема, правильне звертання (кличний відмінок), логічна основна частина та коректне прощання."
      points: 4
    - criteria: "Тон та позитивне формулювання"
      description: "Лист написаний ввічливо, без агресії. Використані конструкції модальності та пом'якшення ('Хочу переконатися', 'Будемо вдячні')."
      points: 3
    - criteria: "Лексика та граматика"
      description: "Використано офіційно-діловий регістр, відсутні суржик та кальки. Обсяг тексту відповідає вимогам (мінімум 150 слів)."
      points: 3

- type: quiz
  title: "Перевірка знань: Граматика та лексика ділового листування"
  instruction: "Оберіть одну правильну відповідь на кожне запитання."
  items:
    - question: "Яке з наведених привітань є абсолютно нормативним для української мови?"
      explanation: "Називний відмінок є єдиним правильним для привітань ('Добрий день!')."
      options:
        - text: "Добрий день!"
          correct: true
        - text: "Доброго дня!"
          correct: false
        - text: "Доброго часу доби!"
          correct: false
        - text: "Привіт усім!"
          correct: false
    - question: "Як правильно звернутися до чоловіка на ім'я Олександр у кличному відмінку?"
      explanation: "Чоловічі імена на твердий приголосний в кличному відмінку мають закінчення -е."
      options:
        - text: "Шановний пане Олександре!"
          correct: true
        - text: "Шановний пан Олександр!"
          correct: false
        - text: "Шановний пане Олександру!"
          correct: false
        - text: "Шановний Олександр!"
          correct: false
    - question: "Як правильно звернутися до жінки на ім'я Світлана у кличному відмінку?"
      explanation: "Жіночі імена на -а змінюються на -о у кличному відмінку."
      options:
        - text: "Шановна пані Світлано!"
          correct: true
        - text: "Шановна пані Світлана!"
          correct: false
        - text: "Шановна пані Світлане!"
          correct: false
        - text: "Шановна Світлані!"
          correct: false
    - question: "Який варіант є правильною українською заміною кальки 'приймати участь'?"
      explanation: "Нормативний український вислів — 'брати участь'."
      options:
        - text: "брати участь"
          correct: true
        - text: "мати участь"
          correct: false
        - text: "робити участь"
          correct: false
        - text: "ділити участь"
          correct: false
    - question: "Яке слово слід використовувати замість неправильного вислову 'на протязі року'?"
      explanation: "Для позначення часу використовується слово 'протягом' або 'упродовж'."
      options:
        - text: "протягом року"
          correct: true
        - text: "під час року"
          correct: false
        - text: "на часі року"
          correct: false
        - text: "впродовж від року"
          correct: false
    - question: "Який прийменник чи відмінок вимагає після себе конструкція 'згідно з'?"
      explanation: "Прийменник 'згідно з' вимагає використання орудного відмінка (ким/чим)."
      options:
        - text: "орудного відмінка"
          correct: true
        - text: "родового відмінка"
          correct: false
        - text: "називного відмінка"
          correct: false
        - text: "давального відмінка"
          correct: false
    - question: "Що означає термін номіналізація в контексті офіційно-ділового стилю мови?"
      explanation: "Номіналізація — це процес перетворення дієслів на іменники (вирішити -> вирішення)."
      options:
        - text: "перетворення дієслів на іменники"
          correct: true
        - text: "заміна іменників на займенники"
          correct: false
        - text: "надання реченню емоційного забарвлення"
          correct: false
        - text: "використання тільки коротких слів"
          correct: false
    - question: "Яка тема листа є найкращою та найбільш професійною серед запропонованих?"
      explanation: "Професійна тема має містити дію, назву документа та ключову деталь."
      options:
        - text: "Запит щодо контракту №123 від 10.05"
          correct: true
        - text: "Дуже важливе питання!"
          correct: false
        - text: "Документи на підпис"
          correct: false
        - text: "Терміново прочитайте"
          correct: false
    - question: "Як правильно виправити російську кальку 'приймати міри' в українському тексті?"
      explanation: "Українською мовою правильно казати 'вживати заходів'."
      options:
        - text: "вживати заходів"
          correct: true
        - text: "робити міри"
          correct: false
        - text: "брати заходи"
          correct: false
        - text: "діяти за мірою"
          correct: false
    - question: "Яка з цих ввідних фраз є найкращою для початку листа-відповіді?"
      explanation: "Фраза 'У відповідь на Ваш лист...' є класичним та найбільш коректним варіантом."
      options:
        - text: "У відповідь на Ваш лист..."
          correct: true
        - text: "Пишу вам тому що..."
          correct: false
        - text: "Відповідаючи на питання..."
          correct: false
        - text: "Як я вже казав раніше..."
          correct: false

