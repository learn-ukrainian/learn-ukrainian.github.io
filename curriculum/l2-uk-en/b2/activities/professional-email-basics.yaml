      options: ["листа", "документа", "тексту", "роману"]
    - id: 2
      answer: "тему"
      options: ["тему", "назву", "шапку", "структуру"]
    - id: 3
      answer: "конкретною"
      options: ["конкретною", "розмитою", "довгою", "веселою"]
    - id: 4
      answer: "непрофесіоналізму"
      options: ["непрофесіоналізму", "досвіду", "креативності", "поваги"]
    - id: 5
      answer: "звертання"
      options: ["звертання", "привітання", "вимоги", "прохання"]
    - id: 6
      answer: "кличний"
      options: ["кличний", "називний", "родовий", "давальний"]
    - id: 7
      answer: "пане"
      options: ["пане", "пан", "паном", "пану"]
    - id: 8
      answer: "контекст"
      options: ["контекст", "сюжет", "інтригу", "емоцію"]
    - id: 9
      answer: "заклик"
      options: ["заклик", "наказ", "прохання", "вимогу"]
    - id: 10
      answer: "лексику"
      options: ["лексику", "граматику", "стилістику", "фонетику"]
    - id: 11
