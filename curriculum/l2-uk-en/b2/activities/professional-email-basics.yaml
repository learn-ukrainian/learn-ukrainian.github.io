- type: fill-in
  title: "Заповніть пропуски: Професійна лексика"
  instruction: "Оберіть правильне слово для заповнення пропуску в діловому реченні."
  items:
    - sentence: "Ми гарантуємо виконання всіх зобов'язань у визначений ____."
      answer: "термін"
      options: ["термін", "час", "період", "день"]
      explanation: "Слово 'термін' є професійним маркером дедлайну в діловій мові."
    - sentence: "Для успішного запуску проєкту нам потрібно провести детальний ____ ринку."
      answer: "аналіз"
      options: ["аналіз", "синтез", "огляд", "розрахунок"]
      explanation: "Вираз 'детальний аналіз' є сталим словосполученням."
    - sentence: "Нова комп'ютерна програма забезпечить значну оптимізацію робочого ____."
      answer: "процесу"
      options: ["процесу", "часу", "методу", "поняття"]
      explanation: "Оптимізація завжди стосується робочого процесу."
    - sentence: "Наша компанія рада запросити Вас ____ участь у щорічній конференції."
      answer: "брати"
      options: ["брати", "приймати", "робити", "мати"]
      explanation: "Правильна форма — 'брати участь'."
    - sentence: "Договір про співпрацю залишається чинним ____ наступного року."
      answer: "протягом"
      options: ["протягом", "на протязі", "за час", "під час"]
      explanation: "Для позначення тривалості вживається прийменник 'протягом'."
    - sentence: "Просимо Вас невідкладно ____ заходів щодо усунення цих недоліків."
      answer: "вжити"
      options: ["вжити", "прийняти", "зробити", "виконати"]
      explanation: "Правильне дієслівне керування: 'вживати заходів'."
    - sentence: "Шановний ____ Директоре, звертаємося до Вас із важливим проханням."
      answer: "пане"
      options: ["пане", "пан", "пану", "паном"]
      explanation: "Звертання вимагає кличного відмінка: 'пане'."
    - sentence: "____ з підписаним контрактом, ми маємо право на компенсацію."
      answer: "Згідно"
      options: ["Згідно", "Відповідно", "Зважаючи", "Спираючись"]
      explanation: "Конструкція 'Згідно з...' вимагає після себе орудного відмінка."
    - sentence: "Швидке ____ цієї складної проблеми стало можливим завдяки командній роботі."
      answer: "вирішення"
      options: ["вирішення", "вирішити", "вирішуючи", "рішення"]
      explanation: "Тут застосовано номіналізацію (перетворення дієслова вирішити на іменник)."
    - sentence: "Ми пропонуємо впровадити новий, більш ефективний ____ розрахунку витрат."
      answer: "метод"
      options: ["метод", "процес", "синтез", "термін"]
      explanation: "Для оптимізації застосовуються нові методи."

- type: unjumble
  title: "Побудуйте речення: Структура ділового стилю"
  instruction: "Розташуйте слова у правильному порядку, щоб утворити грамотне речення офіційно-ділового стилю."
  items:
    - words: ["Ми", "гарантуємо", "виконання", "всіх", "зобов'язань", "у", "визначений", "термін"]
      answer: "Ми гарантуємо виконання всіх зобов'язань у визначений термін"
    - words: ["Наша", "команда", "успішно", "провела", "детальний", "аналіз", "нового", "ринку"]
      answer: "Наша команда успішно провела детальний аналіз нового ринку"
    - words: ["Просимо", "Вас", "надіслати", "документи", "до", "кінця", "цього", "тижня"]
      answer: "Просимо Вас надіслати документи до кінця цього тижня"
    - words: ["Будемо", "щиро", "вдячні", "за", "Ваше", "сприяння", "у", "цьому", "питанні"]
      answer: "Будемо щиро вдячні за Ваше сприяння у цьому питанні"
    - words: ["Запрошуємо", "Вас", "взяти", "активну", "участь", "у", "нашому", "міжнародному", "семінарі"]
      answer: "Запрошуємо Вас взяти активну участь у нашому міжнародному семінарі"
    - words: ["Згідно", "з", "умовами", "контракту", "оплата", "має", "надійти", "вчасно"]
      answer: "Згідно з умовами контракту оплата має надійти вчасно"
    - words: ["Керівництво", "вирішило", "вжити", "невідкладних", "заходів", "для", "вирішення", "цієї", "проблеми"]
      answer: "Керівництво вирішило вжити невідкладних заходів для вирішення цієї проблеми"
    - words: ["У", "відповідь", "на", "Ваш", "запит", "надсилаємо", "оновлену", "комерційну", "пропозицію"]
      answer: "У відповідь на Ваш запит надсилаємо оновлену комерційну пропозицію"

- type: error-correction
  title: "Виправте помилку: Суржик та невідповідний регістр"
  instruction: "Знайдіть і виправте одну помилку (стилістичну або граматичну) в кожному реченні."
  items:
    - sentence: "Ми готові приймати участь у цьому цікавому тендері."
      error: "приймати"
      answer: "брати"
      error_type: "word"
      options: ["брати", "мати", "зробити", "надати"]
      explanation: "Правильна українська норма — 'брати участь'."
    - sentence: "Договір залишається чинним на протязі одного календарного року."
      error: "на протязі"
      answer: "протягом"
      error_type: "phrase"
      options: ["протягом", "за час", "в часі", "у термін"]
      explanation: "Прийменник 'на протязі' вживається лише стосовно потоку повітря (draft). Час позначається словом 'протягом'."
    - sentence: "Директор наказав негайно прийняти міри для покращення продажів."
      error: "прийняти міри"
      answer: "вжити заходів"
      error_type: "phrase"
      options: ["вжити заходів", "зробити кроки", "взяти заходи", "дати міри"]
      explanation: "Калька з російської 'принимать меры'. Українською правильно 'вживати заходів'."
    - sentence: "Шановний пан Андрій, надсилаємо Вам оновлений звіт."
      error: "пан Андрій"
      answer: "пане Андрію"
      error_type: "construction"
      options: ["пане Андрію", "пан Андрію", "пане Андрій", "паном Андрієм"]
      explanation: "Звертання в діловому листі завжди вимагає кличного відмінка."
    - sentence: "Доброго дня, колеги! Прошу звернути увагу на нові правила."
      error: "Доброго дня"
      answer: "Добрий день"
      error_type: "phrase"
      options: ["Добрий день", "Доброго ранку", "Доброго вечора", "Гарного дня"]
      explanation: "Привітання українською мовою завжди має форму називного відмінка."
    - sentence: "Згідно наказу директора ми змінюємо робочий розклад."
      error: "Згідно наказу"
      answer: "Згідно з наказом"
      error_type: "phrase"
      options: ["Згідно з наказом", "Відповідно наказу", "По наказу", "Згідно наказом"]
      explanation: "Прийменник 'згідно з' обов'язково вимагає після себе орудного відмінка."
    - sentence: "Доброго часу доби, пане Максиме! Я хотів би обговорити контракт."
      error: "Доброго часу доби"
      answer: "Вітаю"
      error_type: "phrase"
      options: ["Вітаю", "Привіт", "Добрий вечір", "Доброго ранку"]
      explanation: "Фраза 'Доброго часу доби' є інтернет-сленгом і неприпустима в діловому стилі."
    - sentence: "Ви не надіслали матеріали, тому ми призупиняємо роботу."
      error: "Ви не надіслали"
      answer: "Очікуємо на Ваші"
      error_type: "register"
      options: ["Очікуємо на Ваші", "Ви забули дати", "Чому ви не дали", "Де ваші"]
      explanation: "Необхідно застосовувати позитивне формулювання замість прямих звинувачень."

- type: select
  title: "Множинний вибір: Ознаки ділового стилю"
  instruction: "Оберіть усі правильні варіанти для кожного запитання. Зверніть увагу: правильних відповідей може бути декілька."
  items:
    - question: "Які слова та фрази є типовими для офіційно-ділового стилю комунікації?"
      min_correct: 3
      explanation: "Терміни, номіналізації та ввічливі штампи є основою ділового регістру."
      options:
        - text: "робочий процес"
          correct: true
        - text: "крута ідея"
          correct: false
        - text: "детальний аналіз"
          correct: true
        - text: "згідно з контрактом"
          correct: true
        - text: "закинути файли"
          correct: false
    - question: "Які з цих варіантів прощання є професійними та доречними в листі?"
      min_correct: 2
      explanation: "'З повагою' та 'З найкращими побажаннями' — це стандарти ділового етикету."
      options:
        - text: "З повагою,"
          correct: true
        - text: "Цілую,"
          correct: false
        - text: "З найкращими побажаннями,"
          correct: true
        - text: "Бувай,"
          correct: false
    - question: "Які з цих імен стоять у правильній формі кличного відмінка?"
      min_correct: 3
      explanation: "Олександре, Маріє, Іване — це правильні форми кличного відмінка."
      options:
        - text: "Олександре"
          correct: true
        - text: "Петро"
          correct: false
        - text: "Маріє"
          correct: true
        - text: "Іване"
          correct: true
        - text: "Світлана"
          correct: false
    - question: "Що з переліченого є прикладом позитивного формулювання запиту?"
      min_correct: 2
      explanation: "Позитивне формулювання зосереджене на дії та результаті, а не на звинуваченні."
      options:
        - text: "Очікуємо на Ваші матеріали."
          correct: true
        - text: "Ви знову забули надіслати звіт."
          correct: false
        - text: "Чи не могли б Ви надати ці дані?"
          correct: true
        - text: "Ви зірвали всі терміни."
          correct: false
    - question: "Які фрази є російськими кальками, яких слід уникати?"
      min_correct: 3
      explanation: "'Приймати участь', 'на протязі' та 'приймати міри' — це поширені кальки."
      options:
        - text: "приймати участь"
          correct: true
        - text: "брати участь"
          correct: false
        - text: "на протязі року"
          correct: true
        - text: "вживати заходів"
          correct: false
        - text: "приймати міри"
          correct: true
    - question: "Які з наведених дієслів перетворено на іменники (номіналізація)?"
      min_correct: 3
      explanation: "Вирішення, дослідження та постачання утворені від дієслів за допомогою суфіксів -ення, -ання."
      options:
        - text: "вирішення"
          correct: true
        - text: "стіл"
          correct: false
        - text: "дослідження"
          correct: true
        - text: "постачання"
          correct: true
        - text: "красиво"
          correct: false
    - question: "Які елементи є обов'язковими для стандартної архітектури листа?"
      min_correct: 4
      explanation: "Тема, звертання, основна частина та підпис є невід'ємними компонентами ділового листа."
      options:
        - text: "Тема листа"
          correct: true
        - text: "Смайлик"
          correct: false
        - text: "Офіційне звертання"
          correct: true
        - text: "Основна частина"
          correct: true
        - text: "Підпис"
          correct: true
    - question: "Які з цих привітань є абсолютно правильними в українській мові?"
      min_correct: 2
      explanation: "'Добрий день!' та 'Вітаю!' — нормативні привітання називного відмінка."
      options:
        - text: "Добрий день!"
          correct: true
        - text: "Доброго дня!"
          correct: false
        - text: "Доброго ранку!"
          correct: false
        - text: "Вітаю!"
          correct: true

