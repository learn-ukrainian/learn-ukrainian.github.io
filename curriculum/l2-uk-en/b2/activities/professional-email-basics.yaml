  passage: "Написання ділового {{1}} вимагає дотримання чітких правил етикету. Перш за все, слід звернути увагу на {{2}} листа, яка має бути максимально {{3}}. Використання абстрактних назв є ознакою {{4}}. Лист завжди починається з офіційного {{5}}, в якому обов'язково застосовується {{6}} відмінок. Наприклад, правильно писати «Шановний {{7}} Іване!». Сама архітектура повідомлення містить {{8}}, основну частину та {{9}} до дії. Щоб ваш текст звучав професійно, використовуйте відповідну {{10}}, таку як терміни, а також явище {{11}} для опису процесів. Намагайтеся уникати популярних {{12}} з російської мови. Замість 'приймати участь' пишіть '{{13}} участь', а словосполучення 'на протязі' замінюйте нормативним словом '{{14}}'. Особливу увагу приділіть формулюванню проблем: воно має бути {{15}}, без прямих звинувачень. Наприкінці листа завжди залишайте ввічливу формулу прощання, таку як 'З {{16}},'."
  blanks:
    - id: 1
