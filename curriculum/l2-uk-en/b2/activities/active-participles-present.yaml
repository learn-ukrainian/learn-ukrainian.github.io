  instruction: 'Заповніть усі пропуски в цьому теоретичному тексті правильними лінгвістичними термінами та граматичними формами.'
  passage: 'Активний дієприкметник {{1}} часу — це специфічна форма, що має суфікси -уч-/-юч- або -ач-/-яч-. Українська мова прагне активно уникати цих форм, оскільки вони звучать дуже неприродно і діють як справжній {{2}}. Цей стилістичний ефект відомий професор Олександр Пономарів дуже влучно назвав терміном {{3}}. Замість штучного вислову «працююча людина», абсолютно природно буде сказати «людина, {{4}} працює». Ця красива та динамічна конструкція називається {{5}} реченням. В українській класичній літературі ці форми іноді використовувалися письменниками свідомо, щоб створити піднесений, урочистий або {{6}} стиль. Деякі з дієприкметників назавжди втратили своє значення дії та стали звичайними прикметниками, наприклад, слово {{7}}. Таке мовне явище в сучасній лінгвістиці називається {{8}}. Дуже важливо розрізняти слова пароніми: те, що має законну чи нормативну силу, називається {{9}}, наприклад, {{10}} закон України. А те, що фізично працює чи діє, називається {{11}}, наприклад, справжній {{12}} вулкан. Також кожному мовцю варто назавжди позбутися імперських штампів: замість жахливого «оточуюче середовище» треба говорити {{13}}, а замість безглуздої кальки «слідуюча зупинка» використовувати єдино правильний український варіант — {{14}} зупинка. Якщо ви говорите про ресурси чи проблеми, набагато краще сказати {{15}} проблеми, а не використовувати громіздкий канцеляризм {{16}}.'
