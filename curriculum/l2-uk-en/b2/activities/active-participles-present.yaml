    - question: 'Які з наведених активних дієприкметників утворені від дієслів другої дієвідміни (за допомогою специфічних суфіксів -ач-/-яч-)?'
      min_correct: 2
      options:
        - text: 'сплячий'
          correct: true
        - text: 'говорячий'
          correct: true
        - text: 'працюючий'
          correct: false
        - text: 'квітнучий'
          correct: false
      explanation: 'Дієслова «сплять» та «говорять» належать саме до другої дієвідміни, тому вони отримують суфікси -яч-.'
    - question: 'Які з наведених словосполучень зі словом «чинний» побудовані абсолютно правильно і повністю відповідають строгій літературній нормі?'
      min_correct: 3
      options:
        - text: 'чинне законодавство'
          correct: true
        - text: 'чинний договір'
          correct: true
        - text: 'чинний розклад руху'
          correct: true
        - text: 'чинний вулкан'
          correct: false
      explanation: 'Слово «чинний» чудово описує те, що має нормативну чи юридичну силу (закон, угода, транспортний розклад).'
    - question: 'Які конкретні мовні форми використовуються для розгортання неприродних зомбі-дієприкметників у гарні підрядні речення?'
      min_correct: 2
      options:
        - text: 'відносний займенник (наприклад, який)'
          correct: true
        - text: 'особове дієслово (наприклад, працює)'
          correct: true
        - text: 'дієприслівник (наприклад, зробивши)'
          correct: false
        - text: 'пасивний дієприкметник (наприклад, прочитаний)'
          correct: false
      explanation: 'Золоте граматичне правило: відносний займенник «який» плюс активне дієслово (наприклад, який зараз читає).'
    - question: 'Які іменники є найкращими, найсучаснішими та абсолютно природними українськими відповідниками до лексикалізованого «керуючого»?'
      min_correct: 2
      options:
        - text: 'керівник'
          correct: true
        - text: 'очільник'
          correct: true
        - text: 'завідувач'
          correct: false
        - text: 'керівничий'
          correct: false
      explanation: 'У сучасній професійній мові безумовна перевага завжди надається чистим іменникам: керівник або очільник.'

- type: translate
  title: 'Переклад з українською ідіоматикою'
  instruction: 'Оберіть найбільш природний та граматично бездоганний український переклад, ретельно уникаючи кальок та штучних дієприкметників.'
  items:
    - source: 'The student reading a book is my younger brother.'
      options:
        - text: 'Студент, який читає книгу, — мій молодший брат.'
          correct: true
        - text: 'Читаючий книгу студент — мій молодший брат.'
          correct: false
        - text: 'Студент, що читаючий книгу, — мій молодший брат.'
          correct: false
      explanation: 'Англійський активний participle "reading" завжди слід перекладати повноцінним підрядним реченням "який читає".'
    - source: 'We urgently need to analyze all existing problems in our company.'
      options:
        - text: 'Ми маємо терміново проаналізувати всі наявні проблеми в компанії.'
          correct: true
        - text: 'Ми маємо терміново проаналізувати всі існуючі проблеми в компанії.'
          correct: false
        - text: 'Ми маємо терміново проаналізувати всі живучі проблеми в компанії.'
          correct: false
      explanation: 'Англійський канцеляризм "existing" найкраще та найприродніше перекладати українським словом "наявний".'
    - source: 'The acting law strictly prohibits this dangerous activity.'
      options:
        - text: 'Чинний закон суворо забороняє цю небезпечну діяльність.'
          correct: true
        - text: 'Діючий закон суворо забороняє цю небезпечну діяльність.'
          correct: false
        - text: 'Працюючий закон суворо забороняє цю небезпечну діяльність.'
          correct: false
      explanation: 'Будь-який закон має юридичну силу, тому він є виключно "чинним", а зовсім не "діючим".'
    - source: 'It is critically important to protect the natural environment.'
      options:
        - text: 'Критично важливо захищати наше природне довкілля.'
          correct: true
        - text: 'Критично важливо захищати наше оточуюче середовище.'
          correct: false
        - text: 'Критично важливо захищати наше навкружне середовище.'
          correct: false
      explanation: 'Питоме та глибоке українське слово "довкілля" є ідеальним перекладом для англійського "environment".'
    - source: 'Please pay attention, the next stop is the central railway station.'
      options:
        - text: 'Увага, наступна зупинка — центральний залізничний вокзал.'
          correct: true
        - text: 'Увага, слідуюча зупинка — центральний залізничний вокзал.'
          correct: false
        - text: 'Увага, ідуча слідом зупинка — центральний залізничний вокзал.'
          correct: false
      explanation: 'Слово "слідуючий" є грубою граматичною калькою. Єдино правильний варіант перекладу — "наступний".'
    - source: 'Tourists resting high in the mountains should be extremely careful.'
      options:
        - text: 'Туристи, які відпочивають високо в горах, мають бути вкрай обережними.'
          correct: true
        - text: 'Відпочиваючі високо в горах туристи мають бути вкрай обережними.'
          correct: false
        - text: 'Туристи, відпочиваючі високо в горах, мають бути вкрай обережними.'
          correct: false
      explanation: 'Уникайте важкої форми "відпочиваючі", завжди використовуйте динамічну конструкцію "які відпочивають".'
    - source: 'There is a real active volcano on this distant tropical island.'
      options:
        - text: 'На цьому далекому тропічному острові є справжній діючий вулкан.'
          correct: true
        - text: 'На цьому далекому тропічному острові є справжній чинний вулкан.'
          correct: false
        - text: 'На цьому далекому тропічному острові є справжній працюючий вулкан.'
          correct: false
      explanation: 'Справжній вулкан виконує реальну фізичну дію, тому використання слова "діючий" тут цілком легітимне.'
    - source: 'The mineral water from this cold mountain spring is very medicinal.'
      options:
        - text: 'Мінеральна вода з цього холодного гірського джерела є дуже цілющою.'
          correct: true
        - text: 'Мінеральна вода з цього холодного гірського джерела є дуже лікуючою.'
          correct: false
        - text: 'Мінеральна вода з цього холодного гірського джерела є дуже зцілюючою.'
          correct: false
      explanation: 'Слово "цілющий" — це лексикалізована норма, прекрасний український прикметник, що позначає постійну якість.'