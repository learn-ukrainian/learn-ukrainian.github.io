- type: mark-the-words
  title: 'Полювання на канцеляризми'
  instruction: 'Уважно прочитайте текст. Знайдіть і позначте кліком усі активні дієприкметники теперішнього часу, які звучать неприродно і потребують негайної заміни на підрядні речення.'
  text: 'Наш новий керуючий відділом зібрав усіх співробітників на нараду. Він суворо сказав, що кожна працююча людина має чітко розуміти свою відповідальність. Потім він попросив принести фінансовий звіт, що містить детальний аналіз наявних проблем. Один читаючий документи менеджер взагалі не звернув на це ніякої уваги. Згодом якийсь швидко біжучий кур’єр приніс нову важливу пошту. Усім стало абсолютно зрозуміло, що поточна ситуація вимагає негайних дій. Навіть тихо спляча в темному кутку собака прокинулася від несподіваного шуму. Зрештою, кожен мислячий спеціаліст зробив свої власні висновки. З вулиці було добре чутно голос голосно плачучої дитини. За великим вікном виднівся яскраво квітнучий сад. Неподалік стояв великий міський автобус, чекаючий на своїх постійних пасажирів.'
  answers: ['працююча', 'читаючий', 'біжучий', 'спляча', 'мислячий', 'плачучої', 'квітнучий', 'чекаючий']

