      right: 'зорі, які виблискують'

- type: fill-in
  title: 'Лексикалізовані норми'
  instruction: 'Доповніть речення лексикалізованими словами, які втратили ознаку дії і стали звичайними прикметниками або іменниками постійної якості.'
  items:
    - sentence: 'Мінеральна вода з цього карпатського джерела є дуже _____, вона допомагає при багатьох хворобах шлунка.'
      answer: 'цілюща'
      options: ['цілюща', 'зцілююча', 'лікувальна', 'лікуюча']
      explanation: 'Слово «цілющий» — це чудовий лексикалізований прикметник, який позначає постійну властивість зцілювати.'
    - sentence: 'Україна завжди славилася своїми чорноземами, це надзвичайно _____ земля для вирощування золотої пшениці.'
      answer: 'родюча'
      options: ['родюча', 'родяча', 'урожайна', 'врожайна']
      explanation: '«Родюча» означає землю, яка має постійну здатність давати хороший урожай.'
    - sentence: 'На вчорашніх зборах виступив _____ кафедрою філософії і запропонував нову програму для студентів.'
      answer: 'завідуючий'
      options: ['завідуючий', 'завідаючий', 'керувач', 'завідач']
      explanation: 'Хоча краще казати «завідувач», форма «завідуючий» є офіційно визнаним лексикалізованим іменником.'
    - sentence: 'Він подивився на ранкове сонце і відразу закрив очі долонею, бо світло було просто _____.'
      answer: 'сліпуче'
      options: ['сліпуче', 'засліплююче', 'осліплююче', 'сліпляче']
      explanation: '«Сліпуче світло» — це стійкий вислів із лексикалізованим прикметником.'
    - sentence: 'Головний _____ банку відмовився давати будь-які коментарі журналістам щодо цієї складної фінансової ситуації.'
      answer: 'керуючий'
      options: ['керуючий', 'керувач', 'керівничий', 'керуючи']
      explanation: 'Як і «завідуючий», це слово перетворилося на іменник на позначення посади.'
    - sentence: 'Майже кожна _____ особа в цій сучасній театральній п’єсі має свій прихований мотив та історію.'
      answer: 'діюча'
      options: ['діюча', 'чинна', 'діюща', 'робляча']
      explanation: 'У театрі та літературі ми завжди використовуємо термін «діюча особа».'
    - sentence: 'Лікар уважно перевірив, яка саме _____ речовина входить до складу цих нових імпортних ліків.'
      answer: 'діюча'
      options: ['діюча', 'чинна', 'активна', 'існуюча']
      explanation: 'У фармакології речовина здійснює прямий біохімічний вплив, тому вона «діюча».'
    - sentence: 'Туристи піднялися на високу гору, щоб побачити справжній _____ вулкан на власні очі.'
      answer: 'діючий'
      options: ['діючий', 'чинний', 'існуючий', 'робочий']
      explanation: 'Вулкан виконує фізичну дію (виверження), тому використання цього слова тут абсолютно правильне.'
