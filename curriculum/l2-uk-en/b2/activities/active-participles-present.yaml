      right: 'папуга, який говорить'
    - left: 'біжучий хлопець'
      right: 'хлопець, який біжить'
    - left: 'плачуча дитина'
      right: 'дитина, яка плаче'
    - left: 'існуюча проблема'
      right: 'проблема, яка існує'
    - left: 'співаюча дівчина'
      right: 'дівчина, яка співає'
