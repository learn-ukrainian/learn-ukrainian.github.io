- type: fill-in
  title: 'Замініть дієприкметник підрядним реченням'
  instruction: 'Доповніть речення правильним дієсловом або відносним займенником, щоб уникнути канцелярського стилю.'
  items:
    - sentence: 'Замість штучного «працююча людина» завжди краще сказати «людина, _____ працює».'
      answer: 'яка'
      options: ['яка', 'яку', 'якій', 'якою']
    - sentence: 'Замість фрази «сплячий кіт» набагато природніше звучить варіант «кіт, який _____».'
      answer: 'спить'
      options: ['спить', 'сплять', 'спав', 'спатиме']
    - sentence: 'Замість вислову «читаючий студент» правильним вибором буде сказати «студент, який _____».'
      answer: 'читає'
      options: ['читає', 'читають', 'читати', 'читав']
    - sentence: 'Замість громіздкого «відпочиваючі туристи» ми говоримо «туристи, _____ відпочивають».'
      answer: 'які'
      options: ['які', 'який', 'яка', 'яких']
    - sentence: 'Замість поетичного, але книжного «квітнучий сад» скажіть «сад, який _____».'
      answer: 'квітне'
      options: ['квітне', 'квітнуть', 'квітнув', 'квітнути']
    - sentence: 'Замість важкого для вимови «плачуча дитина» слід казати «дитина, _____ плаче».'
      answer: 'яка'
      options: ['яка', 'яке', 'який', 'які']
    - sentence: 'Замість калькованого «біжучий хлопець» треба казати «хлопець, який _____».'
      answer: 'біжить'
      options: ['біжить', 'біжать', 'біг', 'бігати']
    - sentence: 'Замість незграбного «співаюча дівчина» найкращим варіантом є «дівчина, _____ співає».'
      answer: 'яка'
      options: ['яка', 'яку', 'який', 'які']
    - sentence: 'Замість філософського «мисляча істота» краще використати конструкцію «істота, яка _____».'
      answer: 'мислить'
      options: ['мислить', 'мислять', 'мислив', 'мислити']
    - sentence: 'Замість популярного канцеляризму «існуюча проблема» скажіть «проблема, _____ існує» або «наявна проблема».'
      answer: 'яка'
      options: ['яка', 'яку', 'який', 'які']
    - sentence: 'Замість архаїчного «виблискуючі зорі» в сучасній мові кажуть «зорі, які _____».'
      answer: 'виблискують'
      options: ['виблискують', 'виблискує', 'виблискував', 'виблискувати']
    - sentence: 'Замість смішного «говорячий папуга» ми обов’язково скажемо «папуга, _____ говорить».'
      answer: 'який'
      options: ['який', 'яка', 'яке', 'які']
    - sentence: 'Замість терміна «лежачий пацієнт» гуманніше та правильніше сказати «пацієнт, який _____».'
      answer: 'лежить'
      options: ['лежить', 'лежать', 'лежав', 'лежати']
    - sentence: 'Замість святкового штампу «наступаюче свято» ми вітаємо одне одного зі святом, _____ наближається.'
      answer: 'яке'
      options: ['яке', 'яка', 'який', 'які']

- type: quiz
  title: 'Теоретичні засади ідіоматичности'
  instruction: 'Оберіть одну правильну відповідь на кожне теоретичне запитання щодо природи активних дієприкметників.'
  items:
    - question: 'Чому українські мовознавці часто називають активні дієприкметники теперішнього часу зомбі-дієприкметниками у своїх працях?'
      options:
        - text: 'Вони мають правильну форму, але позбавлені живої мовної динаміки.'
          correct: true
        - text: 'Вони прийшли в українську мову з іноземних фільмів жахів.'
          correct: false
        - text: 'Вони використовуються виключно в містичній або фантастичній художній літературі.'
          correct: false
        - text: 'Вони є абсолютно мертвими і ніколи не відмінюються за відмінками.'
          correct: false
      explanation: 'Ці форми мають зовнішні ознаки українського слова, але є мертвими всередині, оскільки не відповідають духу мови.'
    - question: 'Який алгоритм найкраще підходить для перетворення канцелярського вислову «працююча людина» на природну українську фразу?'
      options:
        - text: 'Використання конструкції з відносним займенником «яка» та дієсловом «працює».'
          correct: true
        - text: 'Заміна дієприкметника на звичайний прикметник «працьовита», щоб зберегти форму.'
          correct: false
        - text: 'Видалення дієприкметника з речення, щоб зробити його максимально коротким.'
          correct: false
        - text: 'Використання пасивного дієприкметника минулого часу для кращого стилістичного звучання.'
          correct: false
      explanation: 'Золоте правило ідіоматичности вимагає системної заміни штучного дієприкметника на підрядне речення.'
    - question: 'У якій з наведених сфер легітимно та абсолютно правильно використовувати слово «діючий» замість «чинний»?'
      options:
        - text: 'Для опису вулкана, що вивергається, або активної бойової армії.'
          correct: true
        - text: 'Для характеристики закону, який був щойно прийнятий парламентом країни.'
          correct: false
        - text: 'Для опису міжнародного договору, що має юридичну силу сьогодні.'
          correct: false
        - text: 'Для позначення розкладу руху пасажирських поїздів, який є актуальним зараз.'
          correct: false
      explanation: 'Слово «діючий» стосується лише обєктів, що виконують реальну фізичну чи рольову дію.'
    - question: 'Яка з наведених українських фраз є правильним, деколонізованим відповідником до російського штампу «окружающая среда»?'
      options:
        - text: 'Надійний захист та збереження нашого унікального українського довкілля.'
          correct: true
        - text: 'Регулярне очищення всього місцевого оточуючого середовища від сміття.'
          correct: false
        - text: 'Піклування про обступаюче середовище в різних регіонах нашої держави.'
          correct: false
        - text: 'Охорона існуючого природного середовища для майбутніх поколінь громадян.'
          correct: false
      explanation: 'Слово «довкілля» є питомим українським терміном на противагу калькованому «оточуюче середовище».'
    - question: 'Як найкраще виправити типову мовну помилку в оголошенні: «Обережно, двері зачиняються, слідуюча зупинка — метро»?'
      options:
        - text: 'Обережно, двері зачиняються, наступна зупинка — станція метро.'
          correct: true
        - text: 'Обережно, двері зачиняються, ідуча слідом зупинка — станція метро.'
          correct: false
        - text: 'Обережно, двері зачиняються, подальша зупинка — станція метро.'
          correct: false
        - text: 'Обережно, двері зачиняються, чергова зупинка — станція метро.'
          correct: false
      explanation: 'Слово «наступний» є єдино правильним замінником для логічно абсурдного калькування «слідуючий».'
    - question: 'Чому в творах видатних класиків української літератури дев’ятнадцятого століття ми іноді зустрічаємо активні дієприкметники теперішнього часу?'
      options:
        - text: 'Це був свідомий стилістичний прийом для створення урочистого, піднесеного колориту.'
          correct: true
        - text: 'Письменники того часу просто не знали правил сучасної української граматики.'
          correct: false
        - text: 'Це була єдина можлива форма для вираження тривалої дії в минулому.'
          correct: false
        - text: 'Такі слова були абсолютно типовими для щоденної розмовної мови звичайних селян.'
          correct: false
      explanation: 'Класики використовували ці форми для стилізації, надання тексту архаїчної чи біблійної величі.'
    - question: 'Що саме означає лінгвістичний термін «лексикалізований дієприкметник» у контексті вивчення сучасної граматики української літературної мови?'
      options:
        - text: 'Це форма, яка повністю втратила зв’язок із часом дії і стала звичайним прикметником чи іменником.'
          correct: true
        - text: 'Це специфічне дієслово, яке ніколи не може бути перекладене на інші іноземні мови.'
          correct: false
        - text: 'Це канцелярський штамп, який потрібно негайно та безжально видалити з будь-якого офіційного документа.'
          correct: false
        - text: 'Це старе слово, яке використовується тільки в найстаріших академічних словниках української мови.'
          correct: false
      explanation: 'Лексикалізація означає перехід дієприкметника в розряд постійних прикметників (цілющий) або іменників (завідувач).'
    - question: 'Який із запропонованих варіантів є найкращою та найприроднішою стратегією для перекладу англійської фрази «we need to analyze existing problems»?'
      options:
        - text: 'Ми маємо детально проаналізувати всі наявні проблеми в цій сфері.'
          correct: true
        - text: 'Ми маємо детально проаналізувати всі існуючі проблеми в цій сфері.'
          correct: false
        - text: 'Ми маємо детально проаналізувати всі буваючі проблеми в цій сфері.'
          correct: false
        - text: 'Ми маємо детально проаналізувати всі живучі проблеми в цій сфері.'
          correct: false
      explanation: 'Слово «наявний» є найбільш елегантним та точним замінником для канцелярського штампа «існуючий».'
    - question: 'За допомогою якого специфічного суфікса утворюється активний дієприкметник теперішнього часу від дієслова «працювати» першої дієвідміни?'
      options:
        - text: 'Для цієї форми використовується характерний суфікс -юч- (працюючий).'
          correct: true
        - text: 'Для цієї форми використовується характерний суфікс -яч- (працюячий).'
          correct: false
        - text: 'Для цієї форми використовується характерний суфікс -ач- (працюачий).'
          correct: false
        - text: 'Для цієї форми використовується характерний суфікс -уч- (працюучий).'
          correct: false
      explanation: 'Дієслова першої дієвідміни (працюють) приймають суфікси -уч- або -юч-.'
    - question: 'Яке з цих словосполучень зі словом «чинний» побудовано абсолютно правильно і повністю відповідає нормам українського ділового стилю?'
      options:
        - text: 'Зверніть увагу на чинний розклад руху пасажирських поїздів на станції.'
          correct: true
        - text: 'В лабораторії детально досліджували чинний вулкан на далекому тропічному острові.'
          correct: false
        - text: 'Талановитий режисер представив нову чинну особу у своїй сучасній театральній п’єсі.'
          correct: false
        - text: 'Сучасні медики уважно вивчали вплив чинної речовини на організм хворої людини.'
          correct: false
      explanation: 'Слово «чинний» вживається лише тоді, коли ми говоримо про нормативну або юридичну силу (розклад, закон, угода).'
    - question: 'Чому фонетична природа української мови так активно відштовхує слова на кшталт «плачучий» або «співаючий» у щоденному розмовному мовленні?'
      options:
        - text: 'Накопичення шиплячих звуків руйнує гармонійну милозвучність та суттєво ускладнює артикуляцію фраз.'
          correct: true
        - text: 'Такі слова зовсім не мають наголосу, тому їх дуже важко і незручно вимовляти.'
          correct: false
        - text: 'Ці форми містять виключно глухі приголосні звуки, що звучить неприємно для носіїв мови.'
          correct: false
        - text: 'У них завжди неправильно ставиться закінчення чоловічого та жіночого роду під час розмови.'
          correct: false
      explanation: 'Українська мова прагне до мелодійності, а суфікси -уч-/-юч- створюють неприродний, важкий шиплячий ефект.'
    - question: 'Яке слово є правильним та питомим українським іменником для позначення фахівця, що є керівником певного відділу чи установи?'
      options:
        - text: 'Слово завідувач є найкращим сучасним вибором замість лексикалізованого дієприкметника завідуючий.'
          correct: true
        - text: 'Слово керуючий є єдино правильним сучасним вибором для всіх офіційних ділових документів.'
          correct: false
        - text: 'Слово керівничий є найкращим сучасним вибором замість лексикалізованого дієприкметника керуючий.'
          correct: false
        - text: 'Слово завідуючий є єдино правильним сучасним вибором для всіх офіційних ділових документів.'
          correct: false
      explanation: 'Сучасна мовна стилістика надає абсолютну перевагу чистим, питомим іменникам: завідувач, керівник.'

- type: match-up
  title: 'Трансформація: від кальки до ідіоми'
  instruction: 'З’єднайте штучну дієприкметникову конструкцію (ліворуч) з її правильним, природним українським відповідником (праворуч).'
  pairs:
    - left: 'сплячий кіт'
      right: 'кіт, який спить'
    - left: 'працююча людина'
      right: 'людина, яка працює'
    - left: 'читаючий студент'
      right: 'студент, який читає'
    - left: 'квітнучий сад'
      right: 'сад, який квітне'
    - left: 'відпочиваючі туристи'
      right: 'туристи, які відпочивають'
