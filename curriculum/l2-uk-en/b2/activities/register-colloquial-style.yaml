- type: reading
  id: reading-01
  title: 'Стендап-монолог: Життя без інтернету'
  instruction: 'Прочитайте монолог та дайте відповіді на запитання.'
  text: |
    Ви коли-небудь пробували вижити цілий день без інтернету? Це ж просто повна жесть! Коротше, прокидаєшся ти зранку, тягнешся до телефону, а там — нуль. Типу, взагалі нічого. І ти такий: «Отакої! А як же тепер жити?» Бачиш, ми ж усі звикли, що інфа приходить миттєво. А тут доводиться, власне кажучи, з людьми вживу розмовляти. Я вийшов на вуличку, дивлюся — люди ходять, пташки співають. Я ж навіть не знав, що в нас біля дому дерева є! Коротше кажучи, зловив такий крінж від власної безпорадності, що просто капець. Але таки вижив.
  tasks:
    - 'Яке головне відчуття описує автор монологу?'
    - 'Які слова-наповнювачі використовує герой?'
    - 'Як герой відреагував на відсутність інтернету?'
    - 'Що нового він помітив на вулиці?'

- type: true-false
  title: 'Теорія: Книжна мова чи сленг?'
  instruction: 'Визначте, чи є ці твердження правильними.'
  items:
    - statement: 'Розмовний стиль використовує винятково повні граматичні конструкції.'
      correct: false
      explanation: 'Розмовний стиль часто використовує еліпсис — пропуск слів для динаміки.'
    - statement: 'Сленг — це потужний інструмент для формування соціальних зв''язків.'
      correct: true
      explanation: 'Сленг допомагає показати належність до певної групи людей.'
    - statement: 'Слово «бавовна» у воєнний час набуло іронічного значення вибуху.'
      correct: true
      explanation: 'Це реакція на російську пропаганду, що називала вибухи словом «хлопок».'
    - statement: 'Використання часток «ж» і «б» вимагає написання через дефіс.'
      correct: false
      explanation: 'Ці дві частки завжди пишуться окремо.'
    - statement: 'Частка «бо» пишеться через дефіс після дієслів у наказовому способі.'
      correct: true
      explanation: 'Наприклад, правильним є написання «ідіть-бо», «скажи-бо».'
    - statement: 'Наповнювачі пауз, такі як «типу» і «коротше», псують українську мову.'
      correct: false
      explanation: 'Вони роблять мовлення більш плавним і є природними замінниками суржику.'
    - statement: 'Еліпсис часто використовується у сталих виразах, наприклад, «Смачного!»'
      correct: true
      explanation: 'Це результат історичного пропуску слів «Я бажаю вам».'
    - statement: 'У розмовному стилі порядок слів ніколи не змінюється.'
      correct: false
      explanation: 'Порядок слів вільно змінюється для правильного емоційного акцентування.'
    - statement: 'Слово «мопед» в українському сленгу означає іранський дрон-камікадзе.'
      correct: true
      explanation: 'Ця назва виникла в народі через специфічний звук двигуна дрона.'
    - statement: 'Слова «крінж» і «краш» є застарілими історичними архаїзмами.'
      correct: false
      explanation: 'Це популярний сучасний молодіжний та інтернет-сленг.'

- type: quiz
  title: 'Перевірка: Лексика та граматика розмови'
  instruction: 'Оберіть одну правильну відповідь для кожного запитання.'
  items:
    - question: 'Яке з цих слів є найпоширенішим природним українським наповнювачем, що замінює суржикове «тіпа»?'
      explanation: 'Слово «типу» є органічним наповнювачем для порівняння або заповнення незручної паузи.'
      options:
        - text: 'типу'
          correct: true
        - text: 'короче'
          correct: false
        - text: 'значить'
          correct: false
        - text: 'взагалі'
          correct: false
    - question: 'Яке популярне сленгове слово означає почуття сильного сорому або ніяковості за чиїсь чужі дії?'
      explanation: 'Слово «крінж» описує сильний сором за дії або слова іншої людини.'
      options:
        - text: 'жесть'
          correct: false
        - text: 'краш'
          correct: false
        - text: 'крінж'
          correct: true
        - text: 'шок'
          correct: false
    - question: 'Яку емфатичну частку найкраще використати для лагідного, дружнього прохання або запрошення до спільної дії?'
      explanation: 'Частка «-но» (наприклад, у слові «скажи-но») ефективно пом''якшує пряме прохання.'
      options:
        - text: 'ж'
          correct: false
        - text: '-но'
          correct: true
        - text: 'таки'
          correct: false
        - text: 'б'
          correct: false
    - question: 'Як правильно написати вислів, який містить дієслово з підсилювальною часткою «бо»?'
      explanation: 'Емфатична частка «бо» після дієслова завжди обов''язково пишеться через дефіс.'
      options:
        - text: 'Іди бо туди'
          correct: false
        - text: 'Ідибо туди'
          correct: false
        - text: 'Іди-бо туди'
          correct: true
        - text: 'Іди, бо туди'
          correct: false
    - question: 'Яке вставне слово ідеально підходить для того, щоб підбити фінальний підсумок довгої емоційної розповіді?'
      explanation: 'Слово «отже» традиційно використовується для підбиття логічного висновку з почутого.'
      options:
        - text: 'по-перше'
          correct: false
        - text: 'напевно'
          correct: false
        - text: 'отже'
          correct: true
        - text: 'можливо'
          correct: false
    - question: 'Який приклад найкраще ілюструє синтаксичне явище еліпсису в швидкому повсякденному діалозі?'
      explanation: 'Еліпсис — це усвідомлений пропуск зрозумілих слів, наприклад, «У магазин» замість повної розгорнутої відповіді.'
      options:
        - text: 'Я зараз іду в продуктовий магазин.'
          correct: false
        - text: 'У магазин.'
          correct: true
        - text: 'Я дуже хочу піти в магазин.'
          correct: false
        - text: 'Він сказав, що йде додому.'
          correct: false
    - question: 'Яке скорочення найчастіше використовують сучасні українці замість довгого офіційного слова «інформація»?'
      explanation: 'Слово «інфа» є найпоширенішим і найзручнішим скороченням у повсякденному розмовному стилі.'
      options:
        - text: 'інфо'
          correct: false
        - text: 'інфа'
          correct: true
        - text: 'форма'
          correct: false
        - text: 'інф'
          correct: false
    - question: 'Як правильно написати речення з підсилювальною часткою, якщо вона стоїть окремо від дієслова?'
      explanation: 'Якщо між основним дієсловом і часткою є інше стороннє слово, вони завжди пишуться окремо.'
      options:
        - text: 'Він таки-зробив це завдання.'
          correct: false
        - text: 'Він таки успішно зробив це.'
          correct: true
        - text: 'Він успішно-таки зробив це.'
          correct: false
        - text: 'Він-таки зробив це завдання.'
          correct: false
    - question: 'Яка конструкція є абсолютно правильною і природною в українській мові для висловлення великої вдячності?'
      explanation: 'Дієслово «дякувати» завжди керує виключно давальним відмінком («дякую тобі», «дякую вам»).'
      options:
        - text: 'Я дуже дякую тебе за допомогу.'
          correct: false
        - text: 'Велике дякую вас за допомогу.'
          correct: false
        - text: 'Я щиро дякую вам за допомогу.'
          correct: true
        - text: 'Дякую тебе за все.'
          correct: false
    - question: 'Який термін використовується для позначення об''єкта вашої таємної романтичної або платонічної симпатії?'
      explanation: 'Слово «краш» — це сучасний молодіжний сленг для позначення об''єкта палкого захоплення.'
      options:
        - text: 'крінж'
          correct: false
        - text: 'бавовна'
          correct: false
        - text: 'жесть'
          correct: false
        - text: 'краш'
          correct: true

- type: error-correction
  title: 'Виправте розмовні помилки'
  instruction: 'Знайдіть та виправте русизми або орфографічні помилки у неформальному спілкуванні.'
  items:
    - sentence: 'Слухай, я тебе дуже дякую за цю важливу інфу.'
      error: 'тебе'
      answer: 'тобі'
      options:
        - 'тобі'
        - 'вам'
        - 'вас'
        - 'ти'
      explanation: 'В українській мові правильно казати «дякую тобі» або «дякую вам» (давальний відмінок).'
    - sentence: 'Він зробив таки цей складний проєкт вчасно.'
      error: 'зробив таки'
      answer: 'зробив-таки'
      error_type: 'phrase'
      options:
        - 'зробив-таки'
        - 'зробив таки'
        - 'таки зробив'
        - 'зробив би'
      explanation: 'Частка «таки» після дієслова пишеться через дефіс.'
    - sentence: 'Короче, ми вчора круто погуляли в центрі міста.'
      error: 'Короче'
      answer: 'Коротше'
      options:
        - 'Коротше'
        - 'Значить'
        - 'Тіпа'
        - 'Взагалі'
      explanation: 'Суржикове «короче» потрібно замінювати на питомо українське «коротше».'
    - sentence: 'Що-ж ми будемо сьогодні робити ввечері?'
      error: 'Що-ж'
      answer: 'Що ж'
      error_type: 'phrase'
      options:
        - 'Що ж'
        - 'Що-ж'
        - 'Щось'
        - 'Що би'
      explanation: 'Емфатична частка «ж» завжди пишеться окремо.'
    - sentence: 'Він тіпа не знав, що ми сьогодні зустрічаємося.'
      error: 'тіпа'
      answer: 'типу'
      options:
        - 'типу'
        - 'взагалі'
        - 'ніби'
        - 'якби'
      explanation: 'Український природний аналог наповнювача — це слово «типу».'
    - sentence: 'Слухай, давай якось в общєм зберемося на каву.'
      error: 'в общєм'
      answer: 'загалом'
      error_type: 'phrase'
      options:
        - 'загалом'
        - 'назагал'
        - 'взагалі'
        - 'разом'
      explanation: 'Поширений русизм «в общєм» слід завжди замінювати на літературне слово «загалом».'
    - sentence: 'Ти вже бачила того нового актора? Він просто мій кращі!'
      error: 'кращі'
      answer: 'краш'
      options:
        - 'краш'
        - 'красун'
        - 'кращий'
        - 'хлопець'
      explanation: 'Об''єкт захоплення або симпатії молодіжним сленгом називається «краш».'
    - sentence: 'Скажи но мені, де ти купив цю дивовижну каву?'
      error: 'Скажи но'
      answer: 'Скажи-но'
      error_type: 'phrase'
      options:
        - 'Скажи-но'
        - 'Скажи но'
        - 'Скажибо'
        - 'Сказав би'
      explanation: 'Частка «-но» після дієслів наказового способу пишеться через дефіс.'

