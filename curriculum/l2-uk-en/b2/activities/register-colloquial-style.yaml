- type: essay-response
  title: 'Творче завдання: Стендап-монолог'
  source_reading: 'reading-01'
  prompt: 'Уявіть, що ви виступаєте на сцені «Підпільного стендапу». Напишіть короткий монолог (150-250 слів) про смішну або незручну ситуацію з вашого життя. Обов''язково використовуйте розмовний стиль, сучасний сленг (наприклад, крінж, жесть), наповнювачі пауз (типу, коротше) та емфатичні частки (ж, бо, таки).'
  min_words: 150
  model_answer: 'Усім привіт! Коротше кажучи, сталася зі мною вчора одна історія, це просто повна жесть. Я типу йду собі спокійно вулицею, нікого не чіпаю. І тут бачу — назустріч іде людина, дуже схожа на мого старого знайомого, справжній краш моїх студентських років. Я ж, звісно, радісно махаю рукою, кричу на всю вуличку: «Привіт! Як ти?» Людина зупиняється, дивиться на мене такими великими очима і каже: «Вибачте, ви взагалі хто?» Отакої! Я просто зловив такий крінж, що хотілося під землю провалитися. Власне кажучи, я швиденько розвернувся і побіг у протилежний бік. Отак-от воно буває. Ідіть-бо ви всі зі своїми раптовими зустрічами, краще я буду завжди вдома сидіти.'
  rubric:
    - criteria: 'Використання розмовної лексики'
      description: 'Правильно та доречно використано сучасні сленгові слова та скорочення.'
      points: 4
    - criteria: 'Наповнювачі та частки'
      description: 'У тексті присутні органічні наповнювачі пауз та підсилювальні частки.'
      points: 3
    - criteria: 'Природність і синтаксис'
      description: 'Речення побудовані максимально динамічно, активно використано еліпсис.'
      points: 3