- type: fill-in
  title: 'Заповніть пропуски в діалогах'
  instruction: 'Виберіть найбільш доречне сленгове або розмовне слово для кожного речення.'
  items:
    - sentence: 'Я сьогодні просто без сил, це якась повна _____ на роботі.'
      answer: 'жесть'
      options:
        - 'жесть'
        - 'бавовна'
        - 'інфа'
        - 'краш'
    - sentence: 'Ти бачила новий фільм? Головний герой — це мій абсолютний _____!'
      answer: 'краш'
      options:
        - 'краш'
        - 'крінж'
        - 'мопед'
        - 'універ'
    - sentence: 'Мій дідусь намагається танцювати трендові танці, і я просто ловлю _____.'
      answer: 'крінж'
      options:
        - 'крінж'
        - 'жесть'
        - 'краш'
        - 'шок'
    - sentence: 'Учора вночі на ворожій базі сталася дуже яскрава _____, все горіло.'
      answer: 'бавовна'
      options:
        - 'бавовна'
        - 'жесть'
        - 'інфа'
        - 'крінж'
    - sentence: 'Скинь мені, будь ласка, всю _____ по цьому проєкту в месенджер.'
      answer: 'інфу'
      options:
        - 'інфу'
        - 'жесть'
        - 'бавовну'
        - 'краш'
    - sentence: 'Ця нова програма — це _____ як наш старий додаток, але швидша.'
      answer: 'типу'
      options:
        - 'типу'
        - 'коротше'
        - 'власне'
        - 'значить'
    - sentence: '_____, мій план такий: зустрічаємося рівно о сьомій біля метро.'
      answer: 'Коротше'
      options:
        - 'Коротше'
        - 'Типу'
        - 'Власне'
        - 'Отже'
    - sentence: '_____, я прийшов сюди не просто так, а запропонувати ідею.'
      answer: 'Власне'
      options:
        - 'Власне'
        - 'Коротше'
        - 'Типу'
        - 'Значить'
    - sentence: 'Піди-_____ сюди, я хочу тобі щось дуже цікаве розповісти.'
      answer: 'бо'
      options:
        - 'бо'
        - 'но'
        - 'ж'
        - 'таки'
    - sentence: 'Поглянь-_____ на цю стару фотографію, хіба це не краса?'
      answer: 'но'
      options:
        - 'но'
        - 'бо'
        - 'ж'
        - 'таки'

