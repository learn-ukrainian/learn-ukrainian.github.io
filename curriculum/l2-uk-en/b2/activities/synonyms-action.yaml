- type: error-correction
  title: Виправте лексичні помилки (кальки)
  items:
  - sentence: Він намагався робити тиск на своїх політичних опонентів.
    error: робити
    answer: чинити
    options:
    - чинити
    - діяти
    - здійснювати
    - виконувати
    explanation: Тиск не можна робити, його можна лише чинити.
  - sentence: Співачка змогла здійснити цю складну пісню без жодної помилки.
    error: здійснити
    answer: виконати
    options:
    - виконати
    - зробити
    - вчинити
    - діяти
    explanation: Мистецькі твори не здійснюють, а виконують.
  - sentence: Кожного ранку я беру автобус до університету.
    error: беру
    answer: сідаю на
    options:
    - сідаю на
    - роблю
    - чиню
    - отримую
    explanation: Це калька з англійської. В українській мові на автобус сідають.
  - sentence: Під час лекції нам потрібно взяти коротку перерву.
    error: взяти
    answer: зробити
    options:
    - зробити
    - чинити
    - діяти
    - здобути
    explanation: Перерву роблять, а не беруть.
  - sentence: Я дуже люблю брати фотографії природи під час подорожей.
    error: брати
    answer: робити
    options:
    - робити
    - чинити
    - виконувати
    - здобувати
    explanation: Фотографії роблять або фотографують.
  - sentence: Цей старий закон вже давно не робить на території нашої держави.
    error: робить
    answer: діє
    options:
    - діє
    - чинить
    - виконує
    - отримує
    explanation: Закони, системи та механізми діють.
  - sentence: Наш клас вирішив приймати участь у цьому конкурсі.
    error: приймати
    answer: брати
    options:
    - брати
    - робити
    - чинити
    - здобувати
    explanation: Участь можна лише брати, фраза приймати участь — це русизм.
  - sentence: Суддя пообіцяв зробити правосуддя чесно та відкрито.
    error: зробити
    answer: чинити
    options:
    - чинити
    - діяти
    - виконувати
    - здобувати
    explanation: Правосуддя — це серйозний морально-юридичний акт, його чинять.
  instruction: Знайдіть і виправте помилку в реченні.
- type: mark-the-words
  title: Знайдіть дієслова дії та перетворення
  instruction: Знайдіть і позначте всі цільові дієслова дії в тексті.
  text: Ми вирішили діяти швидко. Вони почали чинити шалений опір. Вона змогла здійснити
    свою давню мрію. Він обіцяв виконувати всі інструкції. Нам вдалося здобувати перемогу
    щоразу. Хлопець почав вихоплювати речі з валізи.
