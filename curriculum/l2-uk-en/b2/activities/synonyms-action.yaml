- type: reading
  id: reading-synonyms
  title: 'Первинне джерело: Роль дієслова в тексті'
  text: 'В українській мові вибір дієслова дії визначає весь стилістичний тон тексту.

    Коли політик каже, що він здобуває перемогу, він підкреслює свої зусилля

    та важку боротьбу. Якщо ж він просто отримує перемогу, це звучить так,

    ніби перемога дісталася йому випадково або без жодних зусиль з його боку.

    Саме тому журналісти часто звертають увагу на те, як публічні особи описують

    свою діяльність: чи вони виконують обов''язки формально, чи здійснюють

    масштабні плани.

    '
  tasks:
  - Як дієслово здобувати характеризує дії політика?
  - Яке враження створює слово отримувати в контексті перемоги?
  - На що звертають увагу журналісти під час аналізу промов?
  - Яка різниця між виконанням обов'язків та здійсненням планів?
- type: true-false
  title: 'Правда чи хиба: значення дієслів'
  items:
  - statement: Дієслово робити є найбільш нейтральним і універсальним синонімом у
      цій групі.
    correct: true
    explanation: Так, це найширше слово без додаткового морального пафосу.
  - statement: В українській мові правильно говорити робити тиск на конкурентів.
    correct: false
    explanation: Правильно казати чинити тиск.
  - statement: Слово чинити часто використовується в юридичній та моральній термінології.
    correct: true
    explanation: Воно описує дії з серйозними наслідками, наприклад чинити злочин.
  - statement: Дієслово діяти може стосуватися лише живих людей.
    correct: false
    explanation: Воно може стосуватися законів, систем та ліків.
  - statement: Актори та музиканти виконують свої ролі або твори.
    correct: true
    explanation: Мистецький акт описується словом виконувати.
  - statement: Фраза здійснити пісню є стилістично правильною в українській мові.
    correct: false
    explanation: Пісню неможливо здійснити, її можна лише виконати.
  - statement: Дієслово здобувати підкреслює активну позицію та боротьбу за результат.
    correct: true
    explanation: Це слово передбачає докладання значних зусиль.
  - statement: Слово отримувати описує процес, який вимагає великих зусиль.
    correct: false
    explanation: Воно описує пасивний процес.
  - statement: Дієслово хапати додає тексту динаміки та раптовості.
    correct: true
    explanation: Воно означає швидку, миттєву дію.
  - statement: Дослівний переклад англійського take a bus звучить як брати автобус
      і є правильним.
    correct: false
    explanation: Це калька. Правильно казати сідати на автобус.
  instruction: Визначте, чи твердження правильне.
- type: fill-in
