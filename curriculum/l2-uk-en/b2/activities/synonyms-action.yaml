- type: essay-response
  title: 'Творче завдання: Синоніми в дії'
  instruction: Напишіть невеликий есе (100-150 слів) про подію, яка змінила ваше життя.
    Використайте щонайменше 5 дієслів із цього модуля.
  model_answer: У житті кожної людини бувають моменти, коли доводиться робити складний
    вибір. Коли я закінчував школу, мені потрібно було здійснити свою заповітну мрію
    — вступити до університету. Я вирішив діяти рішуче і почав посилено готуватися.
    Спочатку було складно, доводилося чинити опір ліні та виконувати безліч завдань.
    Але я не здавався, бо хотів здобувати знання і здобути професію своєї мрії. Зрештою
    я зміг здійснити свій план.
