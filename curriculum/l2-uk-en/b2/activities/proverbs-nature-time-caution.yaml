- type: reading
  title: 'Аналіз тексту: Природа та час'
  instruction: 'Прочитайте уважно текст та дайте відповіді на запитання нижче.'
  text: |
    В українській філософії природа завжди була більше ніж просто тлом для людського життя. Вона виступала могутнім партнером і суворим учителем. Наші предки уважно спостерігали за змінами в довкіллі, і цей досвід поступово трансформувався у влучні вислови. Наприклад, прислів'я про час вчать нас правильно планувати свої дії: фраза готуй сани влітку означає, що до будь-якої складної справи треба готуватися заздалегідь, щоб уникнути несподіваних проблем у майбутньому. Сучасний бізнес також активно використовує цю народну мудрість, адже стратегічне планування є основою стабільності.
  tasks:
    - 'Яку роль відігравала природа в житті давніх українців згідно з текстом?'
    - 'Як саме перекладається метафора про сани на сучасний корпоративний світ?'
    - 'Чому уважність до природних явищ була життєво необхідною для наших предків?'

- type: true-false
  title: 'Перевірка розуміння: Правда чи вигадка?'
  instruction: 'Визначте, чи відповідає твердження українській народній філософії.'
  items:
    - statement: 'Прислів''я Ліс рубають — тріски летять завжди має позитивне забарвлення.'
      correct: false
      explanation: 'Цей вислів часто має цинічне забарвлення, оскільки виправдовує втрати.'
    - statement: 'Верба в українській культурі символізує здатність до відновлення.'
      correct: true
      explanation: 'Саме так, верба є символом надзвичайної життєстійкості.'
    - statement: 'Вислів Де вода, там і верба вказує на відсутність логіки.'
      correct: false
      explanation: 'Навпаки, він вказує на закономірний зв''язок двох явищ.'
    - statement: 'Природа в українському світогляді вважається пасивним тлом.'
      correct: false
      explanation: 'Природа є активним партнером та суворим суддею.'
    - statement: 'Метафора про бузину та дядька в Києві описує відсутність логічного зв''язку.'
      correct: true
      explanation: 'Це класичний приклад алогізму (non sequitur).'
    - statement: 'Осінь у прислів''ях часто асоціюється з підбиттям підсумків та результатами.'
      correct: true
      explanation: 'Осінь красна плодами, що символізує результати праці.'
    - statement: 'Фраза Куй залізо, поки гаряче заохочує до повільних роздумів.'
      correct: false
      explanation: 'Вона закликає до швидких та рішучих дій у сприятливий момент.'
    - statement: 'Згаяний час можна легко повернути, якщо дуже постаратися.'
      correct: false
      explanation: 'Згаяного часу і конем не доженеш — він втрачений назавжди.'
    - statement: 'Журавель у небі символізує велику, але дуже ризиковану мрію.'
      correct: true
      explanation: 'Журавель — це щось бажане, але важкодосяжне і примарне.'
    - statement: 'Словосполучення відігравати значення є абсолютно правильним.'
      correct: false
      explanation: 'Це поширена помилка (контамінація), правильно — мати значення.'

- type: quiz
  title: 'Знавці фразеології: Оберіть правильний варіант'
  instruction: 'Уважно прочитайте запитання та виберіть єдину правильну відповідь із запропонованих варіантів.'
  items:
    - question: 'Що саме символізує відома фраза про дядька в Києві та бузину?'
      explanation: 'Цей вислів є класичним прикладом повної відсутності логічного зв''язку у твердженні.'
      options:
        - text: 'Повну відсутність логіки у словах'
          correct: true
        - text: 'Родинні зв''язки між містом і селом'
          correct: false
        - text: 'Важливість сільського господарства'
          correct: false
        - text: 'Географічну віддаленість столиці'
          correct: false
    - question: 'Який сенс несе в собі український вислів про підготовку саней влітку?'
      explanation: 'Це прислів''я вчить нас стратегічному плануванню та своєчасній підготовці до подій.'
      options:
        - text: 'Необхідність довгострокового планування'
          correct: true
        - text: 'Важливість зимового відпочинку'
          correct: false
        - text: 'Правила ремонту транспорту'
          correct: false
        - text: 'Непередбачуваність кліматичних змін'
          correct: false
    - question: 'У якій ситуації доречно використати фразу про матір і мачуху?'
      explanation: 'Цей вислів підкреслює нерівні життєві умови або жорстокість зовнішніх обставин.'
      options:
        - text: 'Коли обговорюють соціальну несправедливість'
          correct: true
        - text: 'Під час святкування дня сім''ї'
          correct: false
        - text: 'Коли хвалять чиюсь турботу'
          correct: false
        - text: 'При обговоренні шкільної освіти'
          correct: false
    - question: 'Як правильно перекласти англійську ідіому про котів та собак українською?'
      explanation: 'Дослівний переклад є калькою, правильно використовувати автентичний вислів про відро.'
      options:
        - text: 'Ллє як з відра'
          correct: true
        - text: 'Дощить котами і собаками'
          correct: false
        - text: 'Падають тварини з неба'
          correct: false
        - text: 'Ллє дуже сильно дощем'
          correct: false
    - question: 'Чому не можна казати, що певний фактор відіграє якесь значення?'
      explanation: 'Це мовна контамінація: значення можна мати, а роль — відігравати.'
      options:
        - text: 'Бо це помилкове поєднання двох висловів'
          correct: true
        - text: 'Бо фактори не можуть нічого робити'
          correct: false
        - text: 'Бо це застарілий вираз'
          correct: false
        - text: 'Бо слово значення тут зайве'
          correct: false
    - question: 'Який птах у відомому прислів''ї символізує надійний, гарантований, хоч і малий здобуток?'
      explanation: 'Синиця в руках — це метафора малого, але абсолютно реального і гарантованого результату.'
      options:
        - text: 'Синиця'
          correct: true
        - text: 'Журавель'
          correct: false
        - text: 'Лелека'
          correct: false
        - text: 'Горобець'
          correct: false
    - question: 'Про яку річ чи явище кажуть, що її і конем не доженеш?'
      explanation: 'Йдеться про змарнований, втрачений час, який неможливо повернути жодними зусиллями.'
      options:
        - text: 'Про змарнований час'
          correct: true
        - text: 'Про швидкого птаха'
          correct: false
        - text: 'Про молодого лошака'
          correct: false
        - text: 'Про погану погоду'
          correct: false
    - question: 'Яке дієслово слід використовувати замість русизму кушати в українській літературній мові?'
      explanation: 'В українській мові використовується питоме дієслово їсти.'
      options:
        - text: 'Їсти'
          correct: true
        - text: 'Снідати'
          correct: false
        - text: 'Споживати'
          correct: false
        - text: 'Коштувати'
          correct: false
    - question: 'Що означає приказка Ранок вечора мудріший у контексті ділових переговорів?'
      explanation: 'Вона радить відкласти прийняття складного емоційного рішення до наступного дня.'
      options:
        - text: 'Варто відкласти рішення до ранку'
          correct: true
        - text: 'Вранці люди завжди розумніші'
          correct: false
        - text: 'Переговори краще проводити ввечері'
          correct: false
        - text: 'Треба працювати всю ніч без сну'
          correct: false
    - question: 'Як правильно звучить український відповідник до вислову Тише едешь — дальше будешь?'
      explanation: 'Автентичний вислів базується на метафорі вимішування тіста або будівельної глини.'
      options:
        - text: 'Хто тихо ходить, той густо місить'
          correct: true
        - text: 'Тихіше їдеш, далі будеш'
          correct: false
        - text: 'Хто повільно йде, той дійде'
          correct: false
        - text: 'Краще помалу, ніж ніяк'
          correct: false

- type: match-up
  title: 'Знайдіть пару: Початок і кінець прислів''я'
  instruction: 'З''єднайте першу частину відомого вислову з його правильним логічним закінченням.'
  pairs:
    - left: 'Де вода,'
      right: 'там і верба.'
    - left: 'Природа одному мати,'
      right: 'другому — мачуха.'
    - left: 'На городі бузина,'
      right: 'а в Києві дядько.'
    - left: 'Весна красна квітами,'
      right: 'а осінь — плодами.'
    - left: 'Ліс рубають —'
      right: 'тріски летять.'
    - left: 'Куй залізо,'
      right: 'поки гаряче.'
    - left: 'Згаяного часу'
      right: 'і конем не доженеш.'
    - left: 'Готуй сани влітку,'
      right: 'а воза — взимку.'
    - left: 'Не знаючи броду,'
      right: 'не лізь у воду.'
    - left: 'Краще синиця в руках,'
      right: 'ніж журавель у небі.'

- type: fill-in
  title: 'Заповніть пропуски: Відновіть правильне слово'
  instruction: 'Оберіть правильне слово, щоб граматично та лексично доповнити речення.'
  items:
    - sentence: 'Наш новий директор ___ ключову роль у реорганізації компанії.'
      answer: 'відіграє'
      options:
        - 'має'
        - 'відіграє'
        - 'робить'
        - 'несе'
      explanation: 'Роль можна тільки відігравати.'
    - sentence: 'Справжній лідер завжди розуміє, що кожне рішення має величезне ___.'
      answer: 'значення'
      options:
        - 'вплив'
        - 'значення'
        - 'роль'
        - 'наслідок'
      explanation: 'Значення можна мати, це стійкий вислів.'
    - sentence: 'Ми повинні діяти швидко і рішуче, тобто кувати ___, поки воно гаряче.'
      answer: 'залізо'
      options:
        - 'щастя'
        - 'мідь'
        - 'залізо'
        - 'золото'
      explanation: 'Класичне прислів''я ковалів.'
    - sentence: 'Не варто поспішати з висновками, адже ___ вечора мудріший.'
      answer: 'ранок'
      options:
        - 'день'
        - 'ранок'
        - 'час'
        - 'сон'
      explanation: 'Рішення краще приймати після нічного відпочинку.'
    - sentence: 'Замість англійської кальки ми кажемо, що надворі ллє як з ___.'
      answer: 'відра'
      options:
        - 'хмари'
        - 'відра'
        - 'неба'
        - 'душу'
      explanation: 'Автентична метафора сильної зливи.'
    - sentence: 'Цей жадібний клієнт знову втратив гроші, бо ___ платить двічі.'
      answer: 'скупий'
      options:
        - 'бідний'
        - 'скупий'
        - 'дурний'
        - 'хитрий'
      explanation: 'Скупість призводить до подвійних витрат.'
    - sentence: 'Краще надійна ___ в руках, ніж примарний успіх у майбутньому.'
      answer: 'синиця'
      options:
        - 'пташка'
        - 'синиця'
        - 'курка'
        - 'ластівка'
      explanation: 'Символ малого, але гарантованого результату.'
    - sentence: 'Коли відбувається масштабна реформа, іноді кажуть, що ліс рубають — ___ летять.'
      answer: 'тріски'
      options:
        - 'гілки'
        - 'тріски'
        - 'листя'
        - 'дерева'
      explanation: 'Тріски символізують побічні втрати.'
    - sentence: 'Завжди ретельно перевіряй документи, бо ___ Бог береже.'
      answer: 'береженого'
      options:
        - 'розумного'
        - 'береженого'
        - 'обережного'
        - 'хитрого'
      explanation: 'Правильна форма — береженого, а не обережного.'
    - sentence: 'Не вкладай гроші в цей невідомий проект, бо не знаючи ___, не лізь у воду.'
      answer: 'броду'
      options:
        - 'дна'
        - 'броду'
        - 'річки'
        - 'шляху'
      explanation: 'Брід — безпечне місце для переходу річки.'

