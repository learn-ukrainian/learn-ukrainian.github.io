      options:
        - 'ллє як з відра'
        - 'падає вода'
        - 'сильний дощ іде'
        - 'дощить тваринами'
      explanation: 'Це дослівна калька з англійської, яка не властива українській мові.'
    - sentence: 'Тихіше їдеш, далі будеш у своєму новому бізнесі.'
      error: 'Тихіше їдеш, далі будеш'
      answer: 'Хто тихо ходить, той густо місить'
      error_type: 'phrase'
      options:
        - 'Хто тихо ходить, той густо місить'
        - 'Повільно їдеш, добре будеш'
        - 'Не поспішай і переможеш'
        - 'Їдь повільно і далеко'
      explanation: 'Використання калькованої російської приказки є суржиком.'
    - sentence: 'Завжди будь пильним, бо обережного Бог береже.'
      error: 'обережного'
      answer: 'береженого'
