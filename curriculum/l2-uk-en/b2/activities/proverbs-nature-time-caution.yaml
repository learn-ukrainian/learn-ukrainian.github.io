  text: 'Український світогляд формувався століттями. Природа була не просто тлом, а справжнім учителем. Кожен процес вимагав уваги. Якщо людина хотіла успіху, вона шукала правильний метод. Час ніколи не повертався, тому кожна хвилина мала велике значення. Звичайна верба біля річки чи мілкий брід через воду ставали символами життєвого досвіду.'
  answers:
