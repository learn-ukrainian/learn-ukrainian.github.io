- type: essay-response
  title: 'Творче завдання: Аргументоване есе'
  instruction: 'Напишіть есе обсягом приблизно 250 слів на тему управління фінансовими ризиками.'
  prompt: 'Ваш найкращий друг хоче інвестувати всі свої заощадження у вкрай сумнівний криптовалютний проект, який обіцяє надшвидке збагачення без зусиль. Напишіть йому аргументовану пораду. У своєму тексті обов''язково використайте щонайменше три українські прислів''я (наприклад, про синицю і журавля, про невідомий брід чи про сани влітку). Чітко структуруйте текст: вступна порада, аргументація ризиків, альтернативний безпечний план.'
  min_words: 200
  model_answer: 'Привіт, мій дорогий друже! Я дуже уважно вислухав твою ідею щодо нових інвестицій, і хочу поділитися своїми думками. Як твій друг, я маю бути відвертим: ця пропозиція виглядає надзвичайно небезпечною. Пам''ятай мудре застереження: не знаючи броду, не лізь у воду. Ти збираєшся вкласти гроші у сферу, в якій ми обоє зовсім не є експертами. Криптовалютний ринок зараз вкрай нестабільний. Я розумію твоє бажання швидко розбагатіти, але краще синиця в руках, ніж журавель у небі. Твої заощадження — це гарантія безпеки твоєї родини, і ризикувати ними заради примарної мрії є необачним. Окрім того, якщо цей проект збанкрутує, твого згаяного часу і конем не доженеш, доведеться починати все з нуля. Замість цього ризику я пропоную тобі довгострокове і безпечне планування. Давай краще інвестуємо частину коштів у державні облігації або освіту. Готуй сани влітку: якщо ми почнемо поступово і безпечно відкладати гроші під стабільний відсоток уже сьогодні, через кілька років ти матимеш надійний капітал без жодного стресу. Ранок вечора мудріший — просто добре виспись, обміркуй усе це завтра на свіжу голову, і ти зрозумієш, що я правий.'
  rubric:
    - criteria: 'Використання фразеології'
      description: 'У тексті доречно та правильно використано щонайменше три фразеологізми.'
      points: 4
    - criteria: 'Аргументованість'
      description: 'Ризики чітко пояснені, запропоновано логічну альтернативу.'
      points: 3
    - criteria: 'Граматика та чистота мови'
      description: 'Відсутність кальок, суржику та стилістичних помилок.'
      points: 3