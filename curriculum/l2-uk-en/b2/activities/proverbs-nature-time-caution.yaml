- type: error-correction
  title: 'Виправте помилку: Пошук русизмів та кальок'
  instruction: 'Знайдіть у реченні помилкове слово і виберіть правильний український відповідник.'
  items:
    - sentence: 'Цей важливий проект відіграє величезне значення для нашого міста.'
      error: 'відіграє'
      answer: 'має'
      error_type: 'phrase'
      options:
        - 'має'
        - 'робить'
        - 'носить'
        - 'виконує'
      explanation: 'Словосполучення відігравати значення — це помилкова контамінація.'
    - sentence: 'Сьогодні на вулиці дуже дощить котами і собаками.'
      error: 'дощить котами і собаками'
