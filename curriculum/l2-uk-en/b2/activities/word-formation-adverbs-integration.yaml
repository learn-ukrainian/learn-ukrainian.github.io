- type: essay-response
  title: "Академічне письмо"
  instruction: "Напишіть короткий текст у науковому стилі."
  prompt: "Уявіть, що ви науковець. Напишіть короткий абстракт (не менше 150 слів) про результати вашого нового соціологічного дослідження. Обов'язково використайте академічні терміни (дослідження, аналіз, синтез, метод, процес) та щонайменше три прислівники, утворені від прикметників (наприклад, систематично, об'єктивно, успішно)."
  min_words: 150
  model_answer: "Дане комплексне соціологічне дослідження було успішно та вчасно проведено нашою провідною групою міжнародних експертів протягом останнього академічного року. Головною і беззаперечною метою нашої складної наукової роботи було глибоке вивчення сучасних соціальних тенденцій у суспільстві. Ми вперше в історії застосували абсолютно новий дедуктивний метод масового збору первинної інформації серед місцевого населення. Це інноваційне рішення дозволило нам повністю безперешкодно та максимально об'єктивно здійснити дуже глибокий, критичний та порівняльний аналіз усіх зібраних масштабних статистичних даних. Подальший детальний і багатомісячний синтез отриманих та ретельно оброблених результатів надійно, чітко і переконливо доводить, що це ключове абстрактне соціальне поняття сьогодні функціонує в живому реальному суспільстві зовсім інакше, ніж це роками помилково вважалося раніше в традиційній світовій науці. Цей надзвичайно складний, повністю незворотний процес культурної та психологічної трансформації населення нині розвивається надзвичайно динамічно, невпинно, швидко та дуже стрімко. Підсумовуючи всю нашу величезну багаторічну теоретичну та емпіричну роботу, надзвичайно важливо саме зараз відкрито і відповідально зазначити для всієї широкої зацікавленої наукової спільноти, що наш масштабний національний експеримент врешті-решт завершився успішно, блискуче, результативно та безперечно дуже ефективно. Отримані унікальні та безцінні емпіричні дані будуть постійно, систематично та максимально регулярно використовуватися для подальшого швидкого вдосконалення всього сучасного навчального процесу у провідних державних університетах нашої країни."
  rubric:
    - criteria: "Обсяг тексту"
      description: "Текст містить не менше 150 слів."
      points: 2
    - criteria: "Використання термінології"
      description: "Правильно використано академічні терміни та колокації (аналіз, метод, тощо)."
      points: 4
    - criteria: "Словотворення"
      description: "Прислівники утворені правильно та вжиті доречно у контексті."
      points: 4