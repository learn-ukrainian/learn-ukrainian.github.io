- type: fill-in
  title: "Оберіть правильну форму"
  instruction: "Доповніть речення граматично правильною формою слова."
  items:
    - sentence: "Мені вчора ввечері було дуже ___ на вулиці."
      answer: "холодно"
      options: ["холодний", "холодна", "холодно", "холодне"]
      explanation: "Безособова конструкція вимагає прислівника на -о."
    - sentence: "Ця відповідальна дівчина завжди прибирає у квартирі неймовірно ___."
      answer: "чисто"
      options: ["чистий", "чисто", "чиста", "чисту"]
      explanation: "Прислівник 'чисто' описує спосіб виконання дії."
    - sentence: "Літнє сонце сьогодні безжально і ___ світило з самого ранку."
      answer: "гаряче"
      options: ["гарячо", "гаряче", "гарячий", "гаряча"]
      explanation: "Після шиплячого [ч] використовується суфікс -е."
    - sentence: "Цей складний процес буде набагато краще описати ___."
      answer: "по-науковому"
      options: ["науковий", "науково", "по-науковому", "по науковому"]
      explanation: "Префіксально-суфіксальна модель завжди пишеться через дефіс."
    - sentence: "Для всіх нас було дуже ___ це нарешті дізнатися."
      answer: "цікаво"
      options: ["цікавий", "цікаво", "цікаве", "цікава"]
      explanation: "Безособове речення з інфінітивом вимагає прислівника."
    - sentence: "Він зовсім не говорить ___, хоча живе тут довго."
      answer: "по-українськи"
      options: ["український", "по українськи", "по-українськи", "по-українська"]
      explanation: "Прислівник культурної належності пишеться через дефіс."
    - sentence: "Молода вчителька ___ пояснювала цей надзвичайно складний матеріал."
      answer: "терпляче"
      options: ["терплячо", "терпляче", "терплячий", "терпляча"]
      explanation: "Після шиплячого [ч] використовується м'який суфікс -е."
    - sentence: "Ми розробили абсолютно новий науковий ___ для цієї складної проблеми."
      answer: "метод"
      options: ["метод", "процес", "аналіз", "синтез"]
      explanation: "Слово 'метод' найкраще поєднується з дієсловом 'розробили'."
    - sentence: "За вікном цілу ніч гучно завивав страшний холодний ___."
      answer: "вітрище"
      options: ["вітер", "вітерець", "вітрище", "вітрюган"]
      explanation: "Збільшувальний суфікс -ище передає масштаб стихії."
    - sentence: "Мій старший ___ завжди допомагає мені робити уроки."
      answer: "братик"
      options: ["брат", "братик", "братище", "братський"]
      explanation: "Зменшувально-пестливий суфікс -ик передає теплу родинну любов."

- type: unjumble
  title: "Побудуйте речення"
  instruction: "Складіть граматично правильні українські речення з поданих слів."
  items:
    - words: ["цей", "складний", "процес", "буде", "краще", "описати", "по-науковому"]
      answer: "Цей складний процес буде краще описати по-науковому."
    - words: ["для", "всіх", "нас", "було", "дуже", "цікаво", "це", "дізнатися"]
      answer: "Для всіх нас було дуже цікаво це дізнатися."
    - words: ["наша", "група", "науковців", "успішно", "здійснила", "глибокий", "порівняльний", "аналіз"]
      answer: "Наша група науковців успішно здійснила глибокий порівняльний аналіз."
    - words: ["ми", "розробили", "абсолютно", "новий", "науковий", "метод", "дослідження"]
      answer: "Ми розробили абсолютно новий науковий метод дослідження."
    - words: ["мені", "вчора", "ввечері", "було", "дуже", "холодно", "на", "вулиці"]
      answer: "Мені вчора ввечері було дуже холодно на вулиці."
    - words: ["ця", "дівчина", "завжди", "прибирає", "у", "квартирі", "неймовірно", "чисто"]
      answer: "Ця дівчина завжди прибирає у квартирі неймовірно чисто."
    - words: ["він", "ідеально", "та", "вільно", "говорить", "сьогодні", "по-українськи"]
      answer: "Він ідеально та вільно говорить сьогодні по-українськи."
    - words: ["літнє", "південне", "сонце", "безжально", "і", "гаряче", "світило", "вранці"]
      answer: "Літнє південне сонце безжально і гаряче світило вранці."

- type: error-correction
  title: "Виправте граматичні помилки"
  instruction: "Знайдіть і виправте одну помилку в кожному реченні."
  items:
    - sentence: "Це є дуже важливий розуміти цю граматику."
      error: "важливий"
      answer: "важливо"
      options: ["важливо", "важлива", "важливе", "важливість"]
      explanation: "Безособова конструкція вимагає прислівника."
    - sentence: "Сьогодні на вулиці дуже холодно і гарячо."
      error: "гарячо"
      answer: "гаряче"
      options: ["гаряче", "гарячий", "гаряча", "гарячі"]
      explanation: "Після шиплячих обов'язково вживається суфікс -е."
    - sentence: "Він завжди вирішує свої проблеми по дружньому."
      error: "по дружньому"
      answer: "по-дружньому"
      options: ["по-дружньому", "по дружній", "подружньому", "по-дружній"]
      explanation: "Префіксально-суфіксальні прислівники завжди пишуться через дефіс."
    - sentence: "Ми вчора робили велике дослідження в університеті."
      error: "робили"
      answer: "проводили"
      options: ["проводили", "виконували", "малювали", "писали"]
      explanation: "У науковому стилі дослідження 'проводять' або 'здійснюють'."
    - sentence: "Усі ці маленькі діти гралися у дворі дуже веселий."
      error: "веселий"
      answer: "весело"
      options: ["весело", "весела", "веселі", "веселе"]
      explanation: "Дієслово 'гралися' вимагає обставини (прислівника способу дії)."
    - sentence: "Вчителька терплячо пояснювала новий складний матеріал."
      error: "терплячо"
      answer: "терпляче"
      options: ["терпляче", "терпляча", "терплячий", "терплячі"]
      explanation: "Після шиплячого [ч] використовується пом'якшувальний суфікс -е."
    - sentence: "Мій старший братище допомагає мені з математикою."
      error: "братище"
      answer: "братик"
      options: ["братик", "братський", "брата", "братом"]
      explanation: "Для вираження теплоти використовується зменшувально-пестливий суфікс -ик."
    - sentence: "Наш університет успішно завершив широкий аналіз даних."
      error: "широкий"
      answer: "глибокий"
      options: ["глибокий", "сильний", "великий", "довгий"]
      explanation: "Академічна колокація вимагає прикметника 'глибокий', 'порівняльний' або 'критичний'."

