- type: reading
  title: "Первинне джерело: Текст про словотворення"
  instruction: "Прочитайте уривок і дайте відповіді на запитання."
  text: |
    Словотвірна система сучасної української мови функціонує як потужний, єдиний концептуальний механізм. Жодні частини мови ніколи не існують у ній ізольовано один від одного; вони завжди утворюють лексичну родину навколо спільного базового кореня. Інтеграція дозволяє будувати як надскладний науковий термін, так і просте, емоційно забарвлене розмовне слово для повсякденного вжитку. Зменшувально-пестливі мовні форми можуть виражати ніжність, співчуття, любов, або ж іронію та сарказм.
  tasks:
    - "Яка головна ідея цього уривку?"
    - "Як функціонують частини мови в українському словотворенні?"
    - "Які емоції можуть передавати зменшувально-пестливі форми?"
    - "Чому важливо розуміти спільний корінь слова?"

- type: true-false
  title: "Правда чи хиба?"
  instruction: "Визначте, чи є твердження правильними."
  items:
    - statement: "Суфікс -о є найпоширенішим способом утворення прислівників від якісних прикметників."
      correct: true
      explanation: "Так, це фундаментальне базове граматичне правило для абсолютної більшості українських прикметників."
    - statement: "Після шиплячих приголосних завжди використовується суфікс -о."
      correct: false
      explanation: "Ні, після шиплячих завжди обов'язково використовується суфікс -е."
    - statement: "Прикметник 'швидки́й' утворює прислівник 'шви́дко' без зміни наголосу."
      correct: false
      explanation: "Наголос кардинально переміщується з останнього складу на перший."
    - statement: "Прислівники типу 'по-українськи' та 'по-українському' завжди пишуться через дефіс."
      correct: true
      explanation: "Так, це непорушне граматичне правило українського правопису."
    - statement: "У серйозному науковому тексті можна вільно використовувати зменшувально-пестливі суфікси."
      correct: false
      explanation: "Це абсолютно категорично неприпустимо за жодних умов в офіційно-діловому чи науковому стилях."
    - statement: "Слово 'вороженьки' демонструє використання зменшувально-пестливої форми для вираження іронії та зменшення загрози."
      correct: true
      explanation: "Так, це традиційний український ментальний метод виживання та культурного опору."
    - statement: "В українських безособових конструкціях замість прислівника використовується прикметник."
      correct: false
      explanation: "Українська мова строго вимагає використання прислівника способу чи міри дії."
    - statement: "Збільшувальний суфікс -ище часто переводить слово у середній рід."
      correct: true
      explanation: "Слова на -ище граматично майже завжди належать до середнього роду."
    - statement: "Форма 'гарячо' є літературно правильною."
      correct: false
      explanation: "Це груба помилка; правильно казати 'гаряче', бо основа закінчується на шиплячий звук."
    - statement: "Ідіома 'мати зелене поняття' означає бути експертом у якійсь галузі."
      correct: false
      explanation: "Вона дослівно означає абсолютно нічого не знати про предмет розмови."

- type: quiz
  title: "Перевірте свої знання: Словотворення та інтеграція"
  instruction: "Оберіть одну правильну відповідь на кожне запитання."
  items:
    - question: "Який саме суфікс традиційно використовується для утворення прислівника від якісного прикметника 'гарячий' згідно з чинним стандартом?"
      explanation: "Основа прикметника закінчується на шиплячий звук, тому використовується суфікс -е."
      options:
        - text: "суфікс -о"
          correct: false
        - text: "суфікс -е"
          correct: true
        - text: "суфікс -и"
          correct: false
        - text: "суфікс -у"
          correct: false
    - question: "Що несподівано і кардинально відбувається з фонетичним наголосом при утворенні обставинного прислівника 'весело' від прикметника 'веселий'?"
      explanation: "При перетворенні наголос раптово переміщується з другого складу на перший склад."
      options:
        - text: "Наголос переміщується на перший склад."
          correct: true
        - text: "Наголос залишається на другому складі."
          correct: false
        - text: "Наголос переміщується на останній склад."
          correct: false
        - text: "Слово втрачає свій наголос повністю."
          correct: false
    - question: "Яке з наведених нижче слів є класичним, абсолютно неприпустимим в українській мові русизмом, якого слід уникати?"
      explanation: "Форма 'хорошо' є класичним русизмом. Правильно казати 'добре' або 'гарно'."
      options:
        - text: "добре"
          correct: false
        - text: "хорошо"
          correct: true
        - text: "гарно"
          correct: false
        - text: "чудово"
          correct: false
    - question: "Який специфічний чоловічий суфікс найчастіше використовується для миттєвого створення дуже приємної аури симпатії та дружньої теплої близькості?"
      explanation: "Короткий суфікс -ик миттєво створює приємну ауру симпатії."
      options:
        - text: "суфікс -ище"
          correct: false
        - text: "суфікс -ечк"
          correct: false
        - text: "суфікс -ик"
          correct: true
        - text: "суфікс -очк"
          correct: false
    - question: "У якому саме стилі сучасного українського мовлення будь-які емоційні чи пестливі слова є абсолютно і категорично неприпустимими?"
      explanation: "У суворому науковому тексті зовсім немає місця для особистих людських емоцій чи пестливих слів."
      options:
        - text: "у розмовному стилі"
          correct: false
        - text: "у художньому стилі"
          correct: false
        - text: "у науковому стилі"
          correct: true
        - text: "у публіцистичному стилі"
          correct: false
    - question: "Яке ключове дієслово зазвичай використовується в офіційній науковій парадигмі разом із фундаментальним іменником 'дослідження'?"
      explanation: "У науці ми завжди проводимо або здійснюємо дослідження, але ніколи їх не робимо."
      options:
        - text: "проводити"
          correct: true
        - text: "робити"
          correct: false
        - text: "створювати"
          correct: false
        - text: "малювати"
          correct: false
    - question: "Як граматично і синтаксично правильно та цілком природно перекласти класичну англійську конструкцію 'It is very important'?"
      explanation: "В українських безособових реченнях строго вимагається використання прислівника способу дії."
      options:
        - text: "Це є дуже важливий."
          correct: false
        - text: "Це надзвичайно важливий."
          correct: false
        - text: "Це дуже важливо."
          correct: true
        - text: "Це дуже важлива."
          correct: false
    - question: "Який префікс разом із суфіксами -ськи або -ому використовується для точного утворення специфічних прислівників культурної належності?"
      explanation: "Комбінована префіксально-суфіксальна модель використовує префікс по-."
      options:
        - text: "префікс за-"
          correct: false
        - text: "префікс по-"
          correct: true
        - text: "префікс на-"
          correct: false
        - text: "префікс від-"
          correct: false
    - question: "До якого саме граматичного роду дуже часто переходять іменники після додавання могутнього збільшувального суфікса -ище?"
      explanation: "Вони граматично майже завжди починають належати виключно до середнього роду."
      options:
        - text: "до чоловічого роду"
          correct: false
        - text: "до жіночого роду"
          correct: false
        - text: "до середнього роду"
          correct: true
        - text: "до спільного роду"
          correct: false
    - question: "Яке з наведених словосполучень вважається правильною, усталеною академічною колокацією для іменника 'аналіз'?"
      explanation: "Усталеною мовною нормою є проведення глибокого, порівняльного або критичного аналізу."
      options:
        - text: "великий аналіз"
          correct: false
        - text: "глибокий аналіз"
          correct: true
        - text: "сильний аналіз"
          correct: false
        - text: "широкий аналіз"
          correct: false

