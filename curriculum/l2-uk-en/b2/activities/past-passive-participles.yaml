- instruction: Перевірте своє розуміння природи дієприкметників та їхньої ролі в мові.
  items:
  - explanation: Це гібридна форма, що поєднує ознаки дієслова (час, вид) та прикметника
      (рід, число, відмінок).
    options:
    - correct: true
      text: Гібридна форма дієслова та прикметника
    - correct: false
      text: Особлива форма прислівника
    - correct: false
      text: Частина мови, що вказує лише на дію
    - correct: false
      text: Змінювана форма іменника
    question: Що таке пасивний дієприкметник минулого часу з точки зору граматики?
  - explanation: Він описує стан предмета, який виник внаслідок дії, що вже завершилася.
    options:
    - correct: true
      text: Описує стан предмета після завершення дії
    - correct: false
      text: Називає особу, яка виконує дію
    - correct: false
      text: Вказує на процес, що триває зараз
    - correct: false
      text: Виражає наказ або прохання
    question: Яку головну функцію виконує пасивний дієприкметник у реченні?
  - explanation: Як і прикметник, він повністю узгоджується в роді, числі та відмінку.
    options:
    - correct: true
      text: У роді, числі та відмінку
    - correct: false
      text: Лише в роді та числі
    - correct: false
      text: Лише у відмінку
    - correct: false
      text: Він не змінюється
    question: Як дієприкметник узгоджується з іменником?
  - explanation: Суфікс -ний є найпродуктивнішим, особливо для основ на -а-/-я- (писати
      — написаний).
    options:
    - correct: true
      text: -ний
    - correct: false
      text: -тий
    - correct: false
      text: -лий
    - correct: false
      text: -чий
    question: Який суфікс використовується для більшості дієслів з основою на голосний?
  - explanation: Суфікс -тий вживається переважно з односкладовими основами (ми-ти
      — митий, би-ти — битий).
    options:
    - correct: true
      text: З односкладовими основами
    - correct: false
      text: З дієсловами руху
    - correct: false
      text: З дієсловами на -увати
    - correct: false
      text: Зі словами іншомовного походження
    question: Коли ми зазвичай вживаємо суфікс -тий?
  - explanation: Відбувається чергування приголосних (д // дж, т // ч, с // ш тощо).
    options:
    - correct: true
      text: Відбувається чергування приголосних
    - correct: false
      text: Приголосний зникає
    - correct: false
      text: Приголосний подвоюється
    - correct: false
      text: Змін не відбувається
    question: Що відбувається з приголосним в основі дієслів на -ити (наприклад, садити)?
  - explanation: Українська мова надає перевагу активу («Я прочитав»), якщо виконавець
      відомий, замість пасиву («Книга була прочитана мною»).
    options:
    - correct: true
      text: Я прочитав цю цікаву книгу.
    - correct: false
      text: Ця книга була прочитана мною.
    - correct: false
      text: Книга читалася мною з інтересом.
    - correct: false
      text: Мною була прочитана цікава книга.
    question: Яке речення ілюструє «Правило Агентності» (уникнення пасиву, коли є
      виконавець)?
  - explanation: Це означає, що питання вирішене і більше не обговорюється (переносне
      значення).
    options:
    - correct: true
      text: Питання, яке більше не обговорюється
    - correct: false
      text: Тема, яку заборонено вивчати
    - correct: false
      text: Книга, яка лежить закритою
    - correct: false
      text: Приміщення, в яке не можна зайти
    question: Що означає словосполучення «закрита тема»?
  - explanation: В офіційно-діловому та науковому стилях пасив додає об'єктивності
      та ваги.
    options:
    - correct: true
      text: В офіційно-діловому та науковому
    - correct: false
      text: У побутовій розмові з друзями
    - correct: false
      text: У дитячих казках
    - correct: false
      text: У фольклорних піснях
    question: У якому стилі мовлення пасивні конструкції є найбільш доречними?
  - explanation: «Зачинений» — це стан (результат), а «зачиняється» — це процес, що
      триває.
    options:
    - correct: true
      text: Перше — це стан, друге — процес
    - correct: false
      text: Це повні синоніми
    - correct: false
      text: Перше — процес, друге — стан
    - correct: false
      text: Різниці немає, це одне й те саме
    question: Яка різниця між «магазин зачинений» і «магазин зачиняється»?
