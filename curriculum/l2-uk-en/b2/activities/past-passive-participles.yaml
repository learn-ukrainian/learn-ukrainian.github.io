- instruction: Напишіть коротке есе, використовуючи пасивні дієприкметники.
  min_words: 150
  model_answer: На мою думку, старовинна ікона повинна бути збережена з максимальною
    повагою до її історії. Якщо вона була пошкоджена часом або подіями, ці сліди є
    частиною її біографії. Звісно, ікона має бути очищена від бруду та пилу, а руйнівні
    процеси — зупинені. Проте я вважаю, що повне «омолодження» є неправильним. Втрачений
    фрагмент не повинен бути домальований так, наче він новий. Він може бути лише
    тонований, щоб не відволікати увагу. Рішення про реставрацію має бути прийняте
    виважено. Адже ідеально відновлений предмет часто втрачає свою душу. Для мене
    найважливіше — щоб автентичність була збережена для нащадків. Сліди, залишені
    історією, роблять артефакт живим свідком минулого.
  prompt: 'Уявіть, що ви — куратор музею. Ви отримали пошкоджену старовинну ікону.
    Вирішіть: відновити її до ідеального стану чи залишити сліди історії? Використайте
    слова: відновлений, збережений, втрачений, пошкоджений, залишений.'
