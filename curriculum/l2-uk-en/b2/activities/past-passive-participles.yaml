  text: Сьогодні до музею надійшла унікальна колекція. Центральним експонатом є знайдена
    в землі скіфська ваза. Вона трохи пошкоджена часом, але її орнамент добре збережений.
    Поруч лежить розбитий глек, який ще потребує відновлення. Також у ящику був старовинний
    вишитий рушник, дбайливо загорнутий у папір. Ця колекція, зібрана ентузіастами,
    стане перлиною нашої експозиції.
