  passage: Софія Київська — це велична пам'ятка, яка {{1}} до наших днів. Собор був
    {{2}} в ХІ столітті. За століття він пережив багато подій. Його стіни були {{3}}
    війнами, але згодом {{4}} дбайливими руками майстрів. У часи бароко зовнішній
    вигляд собору був {{5}}. Старі куполи були {{6}} на нові, позолочені. Проте всередині
    унікальні фрески залишилися {{7}}. Сьогодні Софія — це музей, {{8}} для відвідувачів
    з усього світу. Кожен {{9}} камінь тут дихає історією. Ця святиня, {{10}} в серці
    Києва, є символом нашої духовності. Вона {{11}} під охорону ЮНЕСКО. Ми пишаємося
    нашою {{12}} спадщиною. Кожен українець має бути {{13}} з історією цього місця.
    Адже народ, який пам'ятає своє минуле, має {{14}} майбутнє. Адже історія, яка {{15}} у пам'яті, робить нас сильнішими. Кожна сторінка минулого має бути {{16}} з повагою.
  title: Історія Софії Київської
