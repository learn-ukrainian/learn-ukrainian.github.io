- type: essay-response
  title: "Написання резюме аналітичного звіту"
  instruction: "Уважно прочитайте завдання та напишіть розгорнуту відповідь, дотримуючись професійного стилю."
  prompt: "Уявіть, що ви молодший аналітик, який щойно завершив глибоке дослідження щодо впровадження нової системи комунікації у вашій компанії. Дослідження тривало три місяці, охопило 500 співробітників, і його головний висновок — нова система збільшує ефективність на 15%, але вимагає додаткового навчання персоналу. Напишіть коротке Резюме (Executive Summary) вашого звіту (мінімум 150 слів). Використовуйте безособові конструкції, віддієслівні іменники, нейтральну лексику для опису тенденцій та уникайте будь-яких оціночних суджень і російських кальок."
  min_words: 150
  model_answer: "Це Резюме містить концентрований виклад ключових результатів дослідження щодо оптимізації внутрішньої корпоративної комунікації. Було проведено масштабне анкетування п'ятисот співробітників компанії протягом трьох останніх місяців. Аналіз отриманих даних демонструє стабільне зростання показників продуктивності. Встановлено, що впровадження нової комунікаційної платформи забезпечує підвищення загальної операційної ефективності на п'ятнадцять відсотків порівняно з попереднім кварталом. Згідно з результатами опитування, більшість працівників позитивно оцінюють швидкість передачі інформації. Водночас виявлено необхідність додаткового інвестування ресурсів. Синтез усіх даних показує, що для досягнення максимальних показників доцільно було б організувати серію спеціалізованих тренінгів для персоналу. З огляду на вищезазначене, ми рекомендуємо керівництву повністю затвердити план переходу на нову систему та виділити відповідний бюджет на навчання. Забезпечення плавної інтеграції програмного продукту дозволить суттєво мінімізувати потенційні ризики та гарантуватиме довгострокову стабілізацію всіх робочих процесів. Такий підхід є необхідним для подальшого успішного розвитку департаменту."
  rubric:
    - criteria: "Структура та обсяг"
      description: "Текст має формат Резюме та містить щонайменше 150 слів."
      points: 10
    - criteria: "Об'єктивність"
      description: "Відсутність емоційних суджень; факти подані абсолютно нейтрально."
      points: 10
    - criteria: "Безособовість"
      description: "Використання пасивних та безособових конструкцій (встановлено, проведено)."
      points: 10
    - criteria: "Граматична чистота"
      description: "Відсутність російських кальок, правильне використання 'згідно з'."
      points: 10