- type: reading
  title: "Аналіз тексту: Фрагмент звіту"
  instruction: "Уважно прочитайте фрагмент аналітичного звіту та дайте відповіді на запитання."
  text: |
    Вступ
    Цей звіт підготовлено на виконання розпорядження генерального директора від п'ятнадцятого жовтня поточного року. Головною метою документа є глибокий аналіз поточного стану корпоративної культури та оцінка рівня задоволеності персоналу загальними умовами праці. Актуальність дослідження безпосередньо зумовлена нещодавнім стрімким зростанням плинності кадрів у технологічному департаменті компанії. 
    
    Методологія
    Під час проведення цього структурного аналізу було застосовано комплексний підхід. Згідно з затвердженим планом, основним методом збору первинної інформації стало повністю анонімне масштабне опитування. Опитування успішно охопило вісімдесят відсотків усіх діючих співробітників центрального офісу. Додатково було проведено десять глибинних інтерв'ю з керівниками ключових відділів. Головним об'єктивним обмеженням даного дослідження є те, що воно не враховує думку працівників віддалених регіональних філій компанії. Детальні таблиці з сирими статистичними результатами опитування наведені у Додатку 2 до цього фінансового звіту.
  tasks:
    - "Яку конкретну проблему компанії має остаточно вирішити це аналітичне дослідження?"
    - "Який саме основний метод збору інформації було використано аналітиками під час проєкту?"
    - "З якої причини автори дослідження абсолютно чесно вказують на те, що опитування не охопило регіональні філії компанії?"
    - "Де саме зацікавлений читач може без проблем знайти повні таблиці з невідредагованими цифрами та результатами проведеного опитування?"

- type: true-false
  title: "Перевірка розуміння концепцій"
  instruction: "Визначте, чи є наведені твердження правильними (true) або помилковими (false)."
  items:
    - statement: "Сучасний український діловий стиль вітає використання складних бюрократичних конструкцій та радянських канцеляризмів для надання тексту особливої солідності."
      correct: false
      explanation: "Сучасний діловий стиль повністю відмовляється від канцеляризму на користь кришталевої лаконічності та прозорості."
    - statement: "Резюме (Executive Summary) традиційно розміщують на самому початку аналітичного звіту, хоча пишуть його виключно на фінальному етапі роботи."
      correct: true
      explanation: "Резюме містить фінальні підсумки всього довгого документа, тому його фізично неможливо написати першим."
    - statement: "У професійному аналітичному звіті фахівцям дозволяється використовувати яскраві художні метафори та особисті емоційні оцінки для кращого впливу на аудиторію."
      correct: false
      explanation: "Аналітичний звіт вимагає абсолютної об'єктивності та повної відмови від суб'єктивних емоційних суджень."
    - statement: "Величезні детальні таблиці та сирі невідредаговані статистичні дані значно краще розміщувати в кінцевих додатках, щоб не перевантажувати основний текст документа."
      correct: true
      explanation: "Додатки створені саме для зберігання великих масивів інформації, які заважають швидкому читанню основного тексту."
    - statement: "Український офіційно-діловий стиль комунікації має своє глибоке історичне коріння, яке сягає часів Генеральної військової канцелярії славетної Гетьманщини."
      correct: true
      explanation: "Сучасні стандарти ділового мовлення є прямим історичним продовженням давніх державотворчих традицій козацької епохи."
    - statement: "Регулярне використання виразу 'приймати участь' є абсолютно нормальною та граматично правильною практикою в сучасному українському корпоративному середовищі."
      correct: false
      explanation: "Вираз 'приймати участь' є грубою російською калькою, правильно завжди казати 'брати участь'."
    - statement: "Важливий прийменник 'згідно' практично завжди вимагає після себе використання додаткового прийменника 'з' та наступного іменника в орудному відмінку."
      correct: true
      explanation: "Конструкція 'згідно з чимось' є єдиною правильною літературною нормою для українського офіційно-ділового стилю."
    - statement: "Словосполучення 'вільна вакансія' є правильним та точним терміном, який обов'язково треба постійно використовувати в офіційних оголошеннях про пошук роботи."
      correct: false
      explanation: "Слово 'вакансія' вже означає вільне місце, тому додавання слова 'вільна' утворює стилістичну помилку — плеоназм."
    - statement: "Специфічні безособові конструкції ефективно допомагають перенести весь акцент уваги з особи конкретного працівника безпосередньо на доконаний факт виконання роботи."
      correct: true
      explanation: "Безособовість є головним інструментом для досягнення ідеальної формальності та фокусуванні на загальних результатах."
    - statement: "Досвідчені кваліфіковані аналітики свідомо використовують дуже прямі та категоричні жорсткі накази у своїх рекомендаціях керівництву, щоб продемонструвати професійну впевненість."
      correct: false
      explanation: "Категоричність у звітах пом'якшується дипломатичними модальними словами (наприклад, 'доцільно було б розглянути можливість...')."

- type: quiz
  title: "Теорія професійного звітування"
  instruction: "Оберіть одну правильну відповідь на кожне запитання."
  items:
    - question: "Який саме важливий розділ аналітичного звіту традиційно пишеться на самому останньому етапі роботи, але завжди розміщується одразу після титульної сторінки?"
      options:
        - text: "Резюме (Executive Summary)"
          correct: true
        - text: "Вступ та контекст дослідження"
          correct: false
        - text: "Методологія та методи аналізу"
          correct: false
        - text: "Додатки з великими таблицями"
          correct: false
      explanation: "Резюме містить концентрований підсумок усього звіту, тому його неможливо остаточно написати до успішного завершення всієї основної роботи."
    - question: "Яка історична державна установа часів Гетьманщини об'єктивно вважається першоджерелом та надійним фундаментом формування сучасного українського офіційно-ділового стилю комунікації?"
      options:
        - text: "Генеральна військова канцелярія"
          correct: true
        - text: "Головний штаб козацтва"
          correct: false
        - text: "Центральна торговельна палата"
          correct: false
        - text: "Державний архів республіки"
          correct: false
      explanation: "Саме Генеральна військова канцелярія встановила перші потужні стандарти українського адміністративного звітування ще у сімнадцятому столітті."
    - question: "Чому використання великої кількості різноманітних художніх синонімів для позначення одного терміна вважається абсолютно неприпустимою помилкою у строгих текстах корпоративних звітів?"
      options:
        - text: "Однозначність документа завжди важливіша за різноманітність"
          correct: true
        - text: "Синоніми роблять звіт занадто коротким"
          correct: false
        - text: "Читач може втомитися від красивих слів"
          correct: false
        - text: "Керівництво не розуміє складних синонімів"
          correct: false
      explanation: "В офіційно-діловому стилі термін повинен зберігати своє єдине значення протягом усього документа, щоб уникнути небезпечної двозначності."
    - question: "Які специфічні граматичні конструкції найчастіше використовуються в офіційно-діловому стилі для того, щоб максимально змістити увагу читача з виконавця на сам результат дії?"
      options:
        - text: "Безособові конструкції та пасивний стан"
          correct: true
        - text: "Активні дієслова минулого часу"
          correct: false
        - text: "Пряма мова та особисті займенники"
          correct: false
        - text: "Складносурядні емоційні речення"
          correct: false
      explanation: "Такі конструкції знімають особисту відповідальність з працівника і підкреслюють факт виконання певного корпоративного завдання."
    - question: "Яким чином кваліфікований аналітик повинен правильно лінгвістично інтегрувати великі складні графіки та об'ємні статистичні таблиці у свій основний текст документа?"
      options:
        - text: "Зробити чітке посилання в тексті з поясненням"
          correct: true
        - text: "Просто розмістити картинку між абзацами мовчки"
          correct: false
        - text: "Сховати всі графіки у виноски сторінки"
          correct: false
        - text: "Видалити текст і залишити лише красиві таблиці"
          correct: false
      explanation: "Будь-яка візуалізація повинна мати пояснення у тексті та надійну лінгвістичну прив'язку (наприклад, 'як показано на графіку')."
    - question: "З якою головною практичною метою професійні аналітики свідомо переносять величезні масиви сирих статистичних даних у спеціальні об'ємні додатки наприкінці свого звіту?"
      options:
        - text: "Щоб не перевантажувати основний аналітичний текст"
          correct: true
        - text: "Щоб приховати помилки у своїх розрахунках"
          correct: false
        - text: "Щоб зробити документ візуально товщим"
          correct: false
        - text: "Щоб керівництво ніколи не читало ці цифри"
          correct: false
      explanation: "Основний текст завжди має залишатися легким для читання, а детальна інформація зберігається у додатках."
    - question: "Що саме означає стилістична помилка під назвою 'плеоназм', якої сучасні фахівці повинні абсолютно безжалісно уникати у своєму повсякденному корпоративному діловому листуванні?"
      options:
        - text: "Використання зайвих слів з однаковим значенням"
          correct: true
        - text: "Використання іноземних слів без перекладу"
          correct: false
        - text: "Пропуск важливих ком у складному реченні"
          correct: false
        - text: "Написання слів з великої літери посеред речення"
          correct: false
      explanation: "Плеоназм (наприклад, 'вільна вакансія' або 'власна автобіографія') засмічує текст зайвим дублюванням тієї самої інформації."
    - question: "Які нейтральні та об'єктивні слова найбільш доречно використовувати досвідченому професійному аналітику для точного опису загальної динаміки ринкових показників без жодного емоційного забарвлення?"
      options:
        - text: "Зростання, зниження, стабілізація"
          correct: true
        - text: "Жах, катастрофа, диво"
          correct: false
        - text: "Трішки більше, дуже мало, нормально"
          correct: false
        - text: "Неймовірно, фантастично, сумно"
          correct: false
      explanation: "Словник тенденцій аналітика складається виключно з точних, сухих іменників, які є абсолютно позбавленими суб'єктивних емоцій."
    - question: "Яким саме чином досвідчені фахівці згладжують загальну гостру категоричність своїх ділових пропозицій та сміливих рекомендацій для найвищого керівництва великої корпорації?"
      options:
        - text: "Використовують дипломатичні модальні слова"
          correct: true
        - text: "Пишуть свої поради дрібним невидимим шрифтом"
          correct: false
        - text: "Зовсім не дають жодних порад у своїх звітах"
          correct: false
        - text: "Використовують наказовий спосіб дієслів завжди"
          correct: false
      explanation: "Модальність (наприклад, 'доцільно розглянути') дозволяє дати пораду без порушення корпоративної етики та жорсткої субординації."
    - question: "Чому наявність об'єктивних обмежень у проведенні дослідження зовсім не послаблює фінальний звіт, а навпаки робить його значно більш професійнішим та надійнішим?"
      options:
        - text: "Це демонструє високу професійну зрілість автора"
          correct: true
        - text: "Це дозволяє вимагати більшу зарплату за роботу"
          correct: false
        - text: "Це змушує конкурентів відмовитися від боротьби"
          correct: false
        - text: "Це звільняє відділ від будь-якої відповідальності"
          correct: false
      explanation: "Публічне визнання обмежень методології свідчить про абсолютну академічну чесність та прозорість підходу фахівця."

- type: fill-in
  title: "Практика використання термінів"
  instruction: "Оберіть правильне слово для заповнення пропусків у ділових реченнях."
  items:
    - sentence: "Ми наполегливо рекомендуємо всім співробітникам ___ активну участь у благодійних корпоративних ініціативах."
      answer: "брати"
      options:
        - "брати"
        - "приймати"
        - "робити"
        - "мати"
      explanation: "Завжди 'брати участь', словосполучення 'приймати участь' є калькою."
    - sentence: "Шановні колеги, настав час нарешті ___ підсумки нашої плідної роботи за перший квартал."
      answer: "підбити"
      options:
        - "підбити"
        - "підвести"
        - "зробити"
        - "написати"
      explanation: "Українською мовою підсумки 'підбивають', а не 'підводять'."
    - sentence: "Офіційний документ було складено суворо ___ чинним законодавством нашої держави."
      answer: "згідно з"
      options:
        - "згідно з"
        - "відповідно"
        - "згідно"
        - "по"
      explanation: "Правильна форма завжди містить прийменник 'з' та орудний відмінок."
    - sentence: "На титульній сторінці обов'язково зазначається точний ___ виконання цього складного проєкту."
      answer: "термін"
      options:
        - "термін"
        - "час"
        - "період"
        - "момент"
      explanation: "У контексті часу виконання офіційних завдань використовується поняття 'термін'."
    - sentence: "Отримані результати глибокого ___ повністю підтверджують нашу ризиковану початкову гіпотезу."
      answer: "дослідження"
      options:
        - "дослідження"
        - "досліду"
        - "аналітики"
        - "спостереження"
      explanation: "Віддієслівний іменник на -нн-, що позначає процес системного наукового пошуку."
    - sentence: "Бездоганне програмне ___ є абсолютною гарантією стабільної роботи наших серверів."
      answer: "забезпечення"
      options:
        - "забезпечення"
        - "виконання"
        - "зростання"
        - "зниження"
      explanation: "Стандартний офіційний термін для 'software' (програмне забезпечення)."
    - sentence: "Для зручності читача всі громіздкі статистичні таблиці були завбачливо перенесені у фінальні ___."
      answer: "додатки"
      options:
        - "додатки"
        - "вступи"
        - "резюме"
        - "тексти"
      explanation: "Додатки (Appendices) використовуються для розміщення сирих масивів даних."
    - sentence: "Відсутність суб'єктивних особистих емоцій гарантує ідеальну ___ вашого фінансового звіту."
      answer: "об'єктивність"
      options:
        - "об'єктивність"
        - "категоричність"
        - "суб'єктивність"
        - "емоційність"
      explanation: "Об'єктивність є фундаментальною вимогою до будь-якої професійної аналітики."
    - sentence: "Ця специфічна мовна ___ була механічно запозичена з сусідньої мови і є стилістично помилковою."
      answer: "калька"
      options:
        - "калька"
        - "норма"
        - "форма"
        - "ідея"
      explanation: "Калькою називають дослівний та механічний переклад іншомовних виразів."
    - sentence: "Після тривалого періоду фінансового падіння нарешті відбулася довгоочікувана ___ ситуації на локальному ринку."
      answer: "стабілізація"
      options:
        - "стабілізація"
        - "катастрофа"
        - "візуалізація"
        - "кореляція"
      explanation: "Нейтральний термін для опису припинення падіння та закріплення показників."

- type: unjumble
