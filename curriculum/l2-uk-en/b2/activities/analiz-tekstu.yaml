- type: mark-the-words
  title: "Знайдіть ключові терміни в текстах"
  instruction: "Знайдіть і позначте всі фахові терміни (літературознавчі, лінгвістичні та логічні) у цих трьох абзацах."
  text: "Сьогодні на лекції ми детально розібрали, чим відрізняється об'єктивна тема від суб'єктивної ідеї у класичному романі. Професор також попросив нас уважно знайти яскравий епітет та розгорнуту метафору на другій сторінці.\n\nКожен хороший публіцистичний текст має міцну структуру. Автор спочатку висуває чітку тезу, потім наводить надійні аргументи та врешті-решт робить логічний висновок.\n\nЩоб елегантно обійти цензуру, українські письменники часто використовували тонку іронію та надзвичайно глибокий підтекст. Відкритий сарказм зустрічався значно рідше, але кожна історична алюзія була паролем для освічених читачів."
  answers: ["тема", "ідеї", "епітет", "метафору", "тезу", "аргументи", "висновок", "іронію", "підтекст", "сарказм", "алюзія"]

