- type: match-up
  title: 'Знайдіть пару: термін та його значення'
  items:
    - prompt: "Головне повідомлення, меседж автора"
      answer: "ідея"
    - prompt: "Фундамент тексту, його предметна основа"
      answer: "тема"
    - prompt: "Художнє означення, яке підкреслює характерну рису"
      answer: "епітет"
    - prompt: "Приховане порівняння на основі подібності"
      answer: "метафора"
    - prompt: "Слово з протилежним лексичним значенням"
      answer: "антонім"
    - prompt: "Навмисний пропуск слова в реченні"
      answer: "еліпсис"
    - prompt: "Ядро висловлювання, нова інформація"
      answer: "рема"
    - prompt: "Вихідна точка, відома інформація"
      answer: "тема речення"
    - prompt: "Головне твердження, яке автор збирається довести"
      answer: "теза"
    - prompt: "Синтез інформації, який логічно випливає з доказів"
      answer: "висновок"

- type: quiz
  title: 'Перевірте знання: Основи аналізу тексту'
  items:
    - question: "Що з наведеного є прикладом теми, а не ідеї твору?"
      explanation: "Тема — це предметна основа, об'єктивна територія подій."
      options:
        - text: "Життя в українському селі у дев'ятнадцятому столітті"
          correct: true
        - text: "Трагізм конфлікту між людиною і прагматичною реальністю"
          correct: false
        - text: "Соціальна несправедливість здатна знищити людську душу"
          correct: false
        - text: "Необхідність збереження національної ідентичності"
          correct: false
    - question: "Який етап методології глибокого читання є найпершим?"
      explanation: "Первинне сприйняття допомагає відчути загальний тон тексту перед детальним аналізом."
      options:
        - text: "Первинне сприйняття тексту"
          correct: true
        - text: "Лексико-синтаксичний мікроаналіз"
          correct: false
        - text: "Структурний розтин твору"
          correct: false
        - text: "Контекстуалізація епохи"
          correct: false
    - question: "Яку функцію найчастіше виконує синтаксичний еліпсис у художньому тексті?"
      explanation: "Еліпсис імітує живе, спонтанне мовлення та значно прискорює дію."
      options:
        - text: "Створює ефект стрімкої дії або живого мовлення"
          correct: true
        - text: "Уповільнює розповідь для глибокого філософського роздуму"
          correct: false
        - text: "Детально описує зовнішність головного героя роману"
          correct: false
        - text: "Підкреслює цілковиту об'єктивність та науковість тексту"
          correct: false
    - question: "Яке місце в типовому українському реченні є позицією максимальної сили (ремою)?"
      explanation: "В українській мові найважливіша, нова інформація завжди ставиться в кінці речення."
      options:
        - text: "Самий кінець речення"
          correct: true
        - text: "Абсолютний початок речення"
          correct: false
        - text: "Рівно середина речення"
          correct: false
        - text: "Місце після першого дієслова"
          correct: false
    - question: "Що означає термін Езопова мова у контексті української класичної літератури?"
      explanation: "Це складна система підтекстів та алегорій, створена для обходу імперської цензури."
      options:
        - text: "Система алегорій для прихованого вираження думок"
          correct: true
        - text: "Мова давньогрецьких філософів та видатних ораторів"
          correct: false
        - text: "Надзвичайно складна академічна та наукова термінологія"
          correct: false
        - text: "Спеціальний стиль написання дитячих казок про тварин"
          correct: false
    - question: "Яка стилістична ознака чітко відрізняє сарказм від звичайної іронії?"
      explanation: "Сарказм є значно агресивнішою формою іронії, що відкрито знущається з об'єкта."
      options:
        - text: "Сарказм відкрито знущається та є значно агресивнішим"
          correct: true
        - text: "Сарказм завжди використовується виключно в сучасній поезії"
          correct: false
        - text: "Сарказм обов'язково має глибоко позитивний підтекст"
          correct: false
        - text: "Сарказм ніколи не застосовується в серйозній публіцистиці"
          correct: false
    - question: "Чому не можна дослівно перекладати українські стійкі фразеологізми іншими мовами?"
      explanation: "Фразеологізм є неподільною одиницею, його загальне значення не дорівнює сумі окремих слів."
      options:
        - text: "Їхнє справжнє значення не дорівнює сумі значень окремих слів"
          correct: true
        - text: "Вони містять занадто багато застарілих і незрозумілих слів"
          correct: false
        - text: "Усі українські фразеологізми були запозичені з європейських мов"
          correct: false
        - text: "Вони свідомо порушують усі базові правила української граматики"
          correct: false
    - question: "Що таке хибна дихотомія у контексті сучасних медіа-маніпуляцій?"
      explanation: "Це маніпулятивне створення ілюзії, що існує лише два полярні варіанти вибору."
      options:
        - text: "Штучне створення вибору лише між двома крайніми варіантами"
          correct: true
        - text: "Надмірне використання складних термінів для заплутування читача"
          correct: false
        - text: "Пряма агресивна атака на зовнішність або характер політичного опонента"
          correct: false
        - text: "Емоційно заряджена лексика, що свідомо викликає паніку в суспільстві"
          correct: false

- type: select
  title: 'Оберіть правильні відповіді: Аналітичні концепції'
  items:
    - question: "Які з наведених характеристик безпосередньо стосуються глибокого аналізу тексту?"
      min_correct: 2
      options:
        - text: "Розкриття авторського задуму"
          correct: true
        - text: "Аналіз стилістичних засобів та контексту"
          correct: true
        - text: "Здатність просто переказати сюжет своїми словами"
          correct: false
        - text: "Швидкий пошук базових фактів у тексті"
          correct: false
    - question: "Які слова є класичними прикладами вставних слів, що структурують логіку тексту?"
      min_correct: 3
      options:
        - text: "безперечно"
          correct: true
        - text: "по-перше"
          correct: true
        - text: "отже"
          correct: true
        - text: "читати"
          correct: false
        - text: "швидко"
          correct: false
    - question: "Які характеристики притаманні стилю Тараса Шевченка згідно з текстом?"
      min_correct: 3
      options:
        - text: "високий пафос та надривна емоційність"
          correct: true
        - text: "постійні прямі риторичні звертання"
          correct: true
        - text: "глибокий фокус на національній історичній пам'яті"
          correct: true
        - text: "виключно холодний аналітичний раціоналізм"
          correct: false
        - text: "раціональний заклик до кропіткої наукової праці"
          correct: false
    - question: "Які агресивні маніпулятивні тактики найчастіше зустрічаються у медіа-текстах?"
      min_correct: 3
      options:
        - text: "пряма атака на особу опонента"
          correct: true
        - text: "штучна хибна дихотомія"
          correct: true
        - text: "емоційно заряджена лексика"
          correct: true
        - text: "об'єктивне наведення економічної статистики"
          correct: false
        - text: "послідовний та спокійний логічний синтез"
          correct: false
    - question: "Які з наведених літературних прикладів є розгорнутими метафорами?"
      min_correct: 2
      options:
        - text: "час лікує всі глибокі рани"
          correct: true
        - text: "він повністю потонув у морі проблем"
          correct: true
        - text: "це був надзвичайно золотий теплий день"
          correct: false
        - text: "вона мала дуже холодний крижаний погляд"
          correct: false
        - text: "у кімнаті стояв високий дерев'яний стіл"
          correct: false
    - question: "Які ключові елементи обов'язково складають класичну архітектуру логічного аргументу?"
      min_correct: 3
      options:
        - text: "чітка теза"
          correct: true
        - text: "надійні докази"
          correct: true
        - text: "логічний висновок"
          correct: true
        - text: "емоційний еліпсис"
          correct: false
        - text: "поетична метафора"
          correct: false

- type: group-sort
  title: "Розподіліть слова та фрази за стилістичним регістром"
  groups:
    - name: "Академічний стиль"
      items: ["об'єкт дослідження", "логічна хиба", "автор стверджує", "метод дедукції", "аналіз тексту"]
    - name: "Розмовний стиль"
      items: ["автор круто придумав", "це повна маячня", "герой сильно злиться", "він пише як бог", "читати між рядків"]
    - name: "Художні засоби"
      items: ["свинцеві хмари", "море проблем", "сліпа ненависть", "золотий день", "крижаний погляд"]

- type: fill-in
  title: "Вставте пропущене слово"
  items:
    - sentence: "Комплексний філологічний підхід вимагає від читача стати дослідником, а не пасивним споживачем {blank}."
      answer: "інформації"
      options: ["інформації", "їжі", "емоцій", "метафор"]
    - sentence: "Щоб уникнути двозначностей в науковому тексті, ми постійно використовуємо точний {blank}."
      answer: "термін"
      options: ["термін", "епітет", "жарт", "еліпсис"]
    - sentence: "Розкладання цілого на частини називається {blank}, а логічне об'єднання — синтезом."
      answer: "аналізом"
      options: ["аналізом", "процесом", "методом", "контекстом"]
    - sentence: "Коли геніальний автор каже золотий день замість теплий день, він майстерно використовує {blank}."
      answer: "епітет"
      options: ["епітет", "антонім", "термін", "аргумент"]
    - sentence: "Навмисний пропуск слова в реченні для художньої динамізації тексту — це {blank}."
      answer: "еліпсис"
      options: ["еліпсис", "метафора", "сарказм", "висновок"]
    - sentence: "Найважливіша інформація, або {blank}, зазвичай ставиться в самому кінці українського речення."
      answer: "рема"
      options: ["рема", "тема", "теза", "іронія"]
    - sentence: "Система складних підтекстів, створена для обходу жорстокої цензури, називається {blank} мовою."
      answer: "Езоповою"
      options: ["Езоповою", "Франковою", "Шевченковою", "Академічною"]
    - sentence: "У класичній архітектурі сильного аргументу завжди є теза, докази та логічний {blank}."
      answer: "висновок"
      options: ["висновок", "початок", "конфлікт", "підтекст"]
    - sentence: "Коли вираз пекти раків перекладають буквально, це руйнує його справжній зміст, адже це {blank}."
      answer: "фразеологізм"
      options: ["фразеологізм", "неологізм", "термін", "епітет"]
    - sentence: "Здатність тексту активно спілкуватися з іншими відомими творами називається {blank}."
      answer: "інтертекстуальністю"
      options: ["інтертекстуальністю", "модальністю", "маніпуляцією", "дихотомією"]

- type: unjumble
  title: "Складіть речення з поданих слів"
  items:
    - words: ["тема", "це", "просто", "територія", "де", "розгортаються", "події"]
      answer: "Тема це просто територія де розгортаються події"
    - words: ["ідея", "завжди", "відображає", "суб'єктивний", "світогляд", "самого", "автора"]
      answer: "Ідея завжди відображає суб'єктивний світогляд самого автора"
    - words: ["метафора", "робить", "абстрактне", "поняття", "дуже", "яскравим", "і", "конкретним"]
      answer: "Метафора робить абстрактне поняття дуже яскравим і конкретним"
    - words: ["вставні", "слова", "чітко", "показують", "ставлення", "до", "інформації"]
      answer: "Вставні слова чітко показують ставлення до інформації"
    - words: ["українська", "мова", "має", "досить", "гнучкий", "порядок", "слів"]
      answer: "Українська мова має досить гнучкий порядок слів"
    - words: ["найважливіша", "інформація", "зазвичай", "ставиться", "в", "кінці", "речення"]
      answer: "Найважливіша інформація зазвичай ставиться в кінці речення"
    - words: ["письменник", "свідомо", "керує", "емоціями", "та", "увагою", "свого", "читача"]
      answer: "Письменник свідомо керує емоціями та увагою свого читача"
    - words: ["аналіз", "допомагає", "нам", "швидко", "виявляти", "приховані", "маніпуляції"]
      answer: "Аналіз допомагає нам швидко виявляти приховані маніпуляції"

- type: error-correction
  title: "Виправте лексичні та стилістичні помилки"
  items:
    - sentence: "У цьому новому тексті автор піднімає дуже важливу тему."
      error: "піднімає"
      answer: "порушує"
      options: ["порушує", "робить", "ставить", "тримає"]
      explanation: "В українській мові тему або проблему порушують, а не піднімають."
    - sentence: "Цей молодий письменник приймав участь у багатьох політичних дискусіях."
      error: "приймав"
      answer: "брав"
      options: ["брав", "робив", "мав", "давав"]
      explanation: "Правильний український вислів — брати участь."
    - sentence: "Він являється найвідомішим дослідником цієї складної історичної епохи."
      error: "являється"
      answer: "є"
      options: ["є", "буде", "стає", "має"]
      explanation: "Слово являється вживається переважно у значенні з'являтися уві сні. У значенні дієслова-зв'язки використовуємо є."
    - sentence: "Сьогодні ми нарешті получимо результати цього глибокого дослідження."
      error: "получимо"
      answer: "отримаємо"
      options: ["отримаємо", "візьмемо", "знайдемо", "заберемо"]
      explanation: "Получати — це калька, правильно казати отримувати."
    - sentence: "Ця стаття має саме краще пояснення сучасної економічної кризи."
      error: "саме краще"
      answer: "найкраще"
      options: ["найкраще", "дуже добре", "найбільш краще", "гарніше"]
      explanation: "В українській мові ступені порівняння творяться за допомогою префікса най-, конструкція зі словом самий є помилковою."
    - sentence: "Даний метод дозволяє нам провести дуже глибокий аналіз."
      error: "Даний"
      answer: "Цей"
      options: ["Цей", "Такий", "Наш", "Який"]
      explanation: "Слово даний у значенні вказівного займенника — це канцелярська калька, краще вживати цей."
    - sentence: "Ми маємо серйозно віднестися до цієї інформації під час читання."
      error: "віднестися"
      answer: "поставитися"
      options: ["поставитися", "подивитися", "звернутися", "підійти"]
      explanation: "До людей або інформації ми ставимося, а віднести можна річ кудись."
    - sentence: "Герой повісті завжди поступав згідно своїх моральних принципів."
      error: "згідно"
      answer: "згідно з"
      options: ["згідно з", "відповідно", "за", "по"]
      explanation: "В українській мові правильне керування — згідно з (чим?) або відповідно до (чого?)."

- type: cloze
  title: 'Заповніть пропуски: Процес аналізу'
  passage: "Під час професійного аналізу текст стає об'єктом наукового {{1}}. Ми повинні чітко розрізняти {{2}} твору, яка показує предметну основу, та його {{3}}, яка є головним повідомленням автора. Вивчаючи лексику, ми шукаємо {{4}}, які роблять опис емоційним, та {{5}}, що будуються на прихованому порівнянні. Синтаксис також грає роль: наприклад, {{6}} створює ефект швидкого темпу через пропуск слів. В українському реченні нова інформація, або {{7}}, зазвичай стоїть у кінці. Щоб зрозуміти прихований зміст в умовах цензури, письменники часто використовували {{8}} мову. Сучасні автори також можуть застосовувати {{9}} для критики, кажучи протилежне тому, що мають на увазі. Якщо критика стає відкритою та агресивною, це вже {{10}}. Досліджуючи {{11}} епохи, ми краще розуміємо цільову аудиторію тексту. Кожен текст має логічну структуру, яка починається з головного твердження — {{12}}, підкріплюється фактами, тобто {{13}}, і завершується логічним {{14}}."
  blanks:
    - id: 1
      answer: "дослідження"
