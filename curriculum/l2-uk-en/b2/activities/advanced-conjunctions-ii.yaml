- type: reading
  id: reading-conjunctions
  title: 'Офіційний протокол та аналіз умов'
  text: |
    Щойно новий регламент безпеки набув чинності, експертна комісія розпочала перевірку всіх технічних об'єктів. Відколи компанія перейшла на цю систему, кількість інцидентів суттєво зменшилася. Перш ніж інженери отримають допуск до головного сервера, вони повинні пройти багаторівневу автентифікацію. У разі, якщо під час перевірки буде виявлено будь-які відхилення, тестування негайно зупиняється. Роботи не будуть відновлені доти, доки технічний відділ повністю не усуне всі виявлені недоліки. Комісія продовжить свій моніторинг, за умови що керівництво забезпечить повний доступ до внутрішньої документації. Якби минулого року ми впровадили ці стандарти раніше, ми б уникнули багатьох фінансових втрат.
  tasks:
    - 'Яка дія передує допуску інженерів до головного сервера?'
    - 'Що відбувається у разі виявлення відхилень під час перевірки?'
    - 'Яка умова відновлення робіт після зупинки?'
    - 'Про що жалкує автор тексту стосовно минулого року?'

- type: essay-response
  title: 'Есе: Аналіз гіпотетичних сценаріїв'
  source_reading: reading-conjunctions
  instruction: 'Напишіть розгорнуту відповідь на основі прочитаного тексту.'
  prompt: |
    Проаналізуйте, як використання сполучників часу та умови організує логіку офіційного протоколу в наведеному тексті. Зверніть увагу на те, як автор розмежовує жорсткі вимоги ('доки не', 'перш ніж') та гіпотетичні жалкування ('якби').
  min_words: 150
  model_answer: |
    У наведеному тексті сполучники часу та умови відіграють ключову роль у структуруванні інформації та встановленні строгих причинно-наслідкових зв'язків, що є критично важливим для офіційного протоколу. Сполучники швидкої зміни подій, такі як 'щойно', демонструють миттєву реакцію на нові обставини. Водночас часові межі чітко окреслені за допомогою конструкцій 'перш ніж' та 'доти, доки не', які не залишають простору для двозначності й встановлюють жорстку послідовність дій.

    Окрім того, автор успішно використовує умовні конструкції для різних цілей. Сполучник реальної умови в питомо українській формі 'у разі, якщо' описує стандартний план реагування на проблему. Натомість завершується протокол рефлексією: за допомогою ірреальної умови 'якби... ми б уникнули' автор аналізує минулі помилки. Таким чином, граматичні засоби не лише організують текст, але й формують його суворий, професійний та аналітичний тон.
  rubric:
    - criteria: 'Аналіз сполучників часу'
      description: 'Студент успішно визначає та аналізує роль часових сполучників у тексті.'
      points: 5
    - criteria: 'Аналіз умовних конструкцій'
      description: 'Студент розрізняє реальну та гіпотетичну умови, наводячи приклади.'
      points: 5

- type: true-false
  title: 'Правильно чи неправильно: Час і умова'
  instruction: 'Визначте, чи є наведені твердження правильними щодо використання складних сполучників.'
  items:
    - statement: "Сполучник 'якщо' використовується переважно для позначення реальної умови, яка може здійснитися."
      correct: true
      explanation: "Так, 'якщо' вводить реальну умову в теперішньому або майбутньому часі."
    - statement: "В ірреальних умовних реченнях зі сполучником 'якби' дієслово завжди стоїть у формі минулого часу."
      correct: true
      explanation: "Це обов'язкова вимога граматики для вираження гіпотетичної дії."
    - statement: "Використання виразу 'у випадку якщо' є найкращим вибором для офіційно-ділового стилю."
      correct: false
      explanation: "Це калька з російської мови. Правильно казати 'у разі, якщо' або 'за умови що'."
    - statement: "Частка 'б' або 'би' є необов'язковою в головній частині речення з ірреальною умовою."
      correct: false
      explanation: "Ця частка є обов'язковим маркером умовного способу."
    - statement: "Сполучник 'щойно' вказує на те, що подія відбулася дуже давно."
      correct: false
      explanation: "'Щойно' означає, що дія відбулася безпосередньо перед іншою подією або щойно зараз."
    - statement: "Сполучники 'поки' та 'доки' є абсолютними синонімами і можуть завжди замінювати одне одного."
      correct: false
      explanation: "'Поки' частіше позначає тривалість, а 'доки' — часову межу, хоча в розмовній мові вони зближуються."
    - statement: "Слово 'якби' пишеться разом, коли воно є сполучником ірреальної умови."
      correct: true
      explanation: "Як сполучник воно завжди пишеться разом."
    - statement: "У реченні 'Я думав, як би це зробити' слово 'як би' потрібно писати разом."
      correct: false
      explanation: "Тут 'як' — це прислівник, а 'би' — частка, тому вони пишуться окремо."
    - statement: "Сполучник 'тільки-но' є питомим українським замінником кальки 'тільки що'."
      correct: true
      explanation: "Саме так, 'тільки-но' і 'щойно' — правильні літературні варіанти."
    - statement: "Конструкція 'за умови що' використовується для встановлення жорстких вимог у документах."
      correct: true
      explanation: "Це маркер високого офіційного стилю."
    - statement: "У розмовному стилі замість 'якщо' часто можна почути сполучник 'коли'."
      correct: true
      explanation: "Так, наприклад: 'Коли хочеш, я тобі допоможу'."
    - statement: "Частка 'б' пишеться після слів, що закінчуються на приголосний звук."
      correct: false
      explanation: "Після приголосних пишеться 'би', а після голосних — 'б'."
    - statement: "Вираз 'відколи' використовується для маркування початкової точки тривалої дії."
      correct: true
      explanation: "Він вказує на час, з якого почався і триває певний стан."
    - statement: "Заміна слова 'кушати' на 'їсти' є важливою частиною мовної гігієни."
      correct: true
      explanation: "Слово 'кушати' є русизмом, українська літературна норма — 'їсти'."

- type: error-correction
  title: 'Редагування: Боротьба з русизмами та помилками'
  instruction: 'Знайдіть і виправте одну помилку в кожному реченні.'
  items:
    - sentence: 'У випадку якщо виникнуть додаткові запитання, звертайтеся до нашого менеджера.'
      error: 'У випадку якщо'
      answer: 'У разі, якщо'
      error_type: 'phrase'
      options: ['У разі, якщо', 'Коли', 'Якби', 'Відколи']
      explanation: "'У випадку якщо' — це калька з російської. Український стандарт — 'у разі, якщо'."
    - sentence: 'Ми тільки що завершили обговорення нового контракту з нашими партнерами.'
      error: 'тільки що'
      answer: 'щойно'
      error_type: 'phrase'
      options: ['щойно', 'відколи', 'поки', 'доти']
      explanation: "'Тільки що' — це поширений русизм, його слід замінювати на 'щойно' або 'тільки-но'."
    - sentence: "Якби я знав про цю проблему раніше, я обов'язково вирішив її ще вчора."
      error: 'вирішив'
      answer: 'вирішив б'
      error_type: 'word'
      options: ['вирішив б', 'вирішував', 'вирішую', 'вирішу']
      explanation: "В ірреальній умові головна частина обов'язково повинна містити частку б/би."
    - sentence: 'Почекай мене біля входу, поки я не закінчу розмову з клієнтом.'
      error: 'поки'
      answer: 'доки'
      error_type: 'word'
      options: ['доки', 'якби', 'відколи', 'щойно']
      explanation: "Для позначення досягнення часової межі (результату) краще використовувати 'доки не'."
    - sentence: 'Цей проект буде успішним, за умови що всі учасники прийматимуть у ньому активну участь.'
      error: 'прийматимуть'
      answer: 'братимуть'
      error_type: 'word'
      options: ['братимуть', 'здобуватимуть', 'робитимуть', 'матимуть']
      explanation: "В українській мові правильно казати 'брати участь', а не 'приймати участь'."
    - sentence: 'Він довго міркував над тим, якби краще організувати цю важливу конференцію.'
      error: 'якби'
      answer: 'як би'
      error_type: 'word'
      options: ['як би', 'щойно', 'відколи', 'якщо']
      explanation: "Тут 'як' — прислівник, а 'би' — частка, що означає спосіб дії. Пишеться окремо."
    - sentence: 'Якби ж то я міг передбачити такі події, я зупинив цей процес одразу.'
      error: 'зупинив'
      answer: 'зупинив би'
      error_type: 'word'
      options: ['зупинив би', 'зупиняв', 'зупиняю', 'зупинятиму']
      explanation: "Пропущена частка 'би' в головній частині гіпотетичного речення."
    - sentence: 'Ми негайно почнемо роботу, тільки но керівник дасть нам дозвіл.'
      error: 'тільки но'
      answer: 'тільки-но'
      error_type: 'word'
      options: ['тільки-но', 'щойно но', 'тількищо', 'тільки']
      explanation: "Сполучник 'тільки-но' пишеться через дефіс."
    - sentence: 'Він постійно кушає солодощі під час перегляду вечірніх новин.'
      error: 'кушає'
      answer: 'їсть'
      error_type: 'word'
      options: ['їсть', 'харчує', 'живиться', 'смакує']
      explanation: "Слово 'кушати' є русизмом, літературна норма — 'їсти'."
    - sentence: 'Ми обов’язково зв’яжемося з вами, коли зміниться дата нашої зустрічі.'
      error: 'коли'
      answer: 'якщо'
      error_type: 'word'
      options: ['якщо', 'відколи', 'поки', 'доки']
      explanation: "В офіційному стилі для вираження умови використовується 'якщо', а не 'коли'."
    - sentence: 'Від коли він став директором, продажі компанії значно зросли.'
      error: 'Від коли'
      answer: 'Відколи'
      error_type: 'word'
      options: ['Відколи', 'З коли', 'Поки', 'Доки']
      explanation: "Сполучник 'відколи' пишеться разом."
    - sentence: 'Ми розглянемо вашу кандидатуру, у випадку якщо звільниться відповідна вакансія.'
      error: 'у випадку якщо'
      answer: 'у разі, якщо'
      error_type: 'phrase'
      options: ['у разі, якщо', 'навіть якщо', 'відколи', 'доки']
      explanation: "Канцеляризм 'у випадку якщо' варто замінювати на 'у разі, якщо'."
    - sentence: 'Він сказав б усю правду, якби його про це відверто запитали.'
      error: 'сказав б'
      answer: 'сказав би'
      error_type: 'word'
      options: ['сказав би', 'каже', 'казатиме', 'сказав']
      explanation: "Після слова, що закінчується на приголосний, пишеться частка 'би', а не 'б'."
    - sentence: 'Цей варіант самий кращий з усіх, які ми розглядали сьогодні.'
      error: 'самий кращий'
      answer: 'найкращий'
      error_type: 'phrase'
      options: ['найкращий', 'більш кращий', 'кращий самий', 'найбільш кращий']
      explanation: "Конструкція 'самий + прикметник' є русизмом. Правильно утворювати найвищий ступінь за допомогою префікса 'най-'."

- type: fill-in
  title: 'Заповніть пропуски: Час і умова'
  instruction: 'Оберіть правильний сполучник для кожного речення.'
  items:
    - sentence: '_____ ми почали працювати над проектом, продуктивність нашого відділу значно зросла.'
      answer: 'Відколи'
      options: ['Відколи', 'Поки', 'Якщо', 'Якби']
      explanation: "'Відколи' позначає початкову точку в минулому, з якої триває певний стан."
    - sentence: '_____ інвестор підпише угоду, ми негайно розпочнемо фінансування будівництва.'
      answer: 'Щойно'
      options: ['Щойно', 'Поки', 'Відколи', 'Доки']
      explanation: "'Щойно' вказує на швидку зміну подій і миттєву реакцію."
    - sentence: '_____ б я мав можливість повернутися в минуле, я б усе змінив.'
      answer: 'Якби'
      options: ['Якби', 'Якщо', 'Коли', 'Щойно']
      explanation: "Для гіпотетичної умови використовується сполучник 'якби' з часткою 'б' у головному реченні."
    - sentence: 'Ми почекаємо в залі для переговорів, _____ ви не закінчите свою нараду.'
      answer: 'доки'
      options: ['доки', 'відколи', 'якщо', 'якби']
      explanation: "'Доки не' вказує на часову межу, до якої триває очікування."
    - sentence: 'Усі співробітники отримають премію, _____ компанія виконає річний план продажів.'
      answer: 'якщо'
      options: ['якщо', 'відколи', 'поки', 'якби']
      explanation: "'Якщо' вводить реальну умову."
    - sentence: 'Ми надамо вам додаткову знижку _____ ви замовите велику партію товару.'
      answer: 'за умови що'
      options: ['за умови що', 'відколи', 'поки', 'тільки-но']
      explanation: "'За умови що' встановлює жорсткі вимоги в діловому стилі."
    - sentence: '_____ студенти писали тест, викладач уважно перевіряв їхні попередні есе.'
      answer: 'Поки'
      options: ['Поки', 'Доки', 'Відколи', 'Якби']
      explanation: "'Поки' вказує на два процеси, що відбуваються паралельно."
    - sentence: '_____ сонце сховається за горизонт, температура повітря різко знизиться.'
      answer: 'Тільки-но'
      options: ['Тільки-но', 'Поки', 'Відколи', 'Доки']
      explanation: "'Тільки-но' позначає безпосереднє слідування однієї події за іншою."
    - sentence: 'Він довго думав, _____ б йому краще вирішити це складне питання.'
      answer: 'як'
      options: ['як', 'якщо', 'якби', 'поки']
      explanation: "Тут 'як' — прислівник способу дії, що пишеться окремо від частки 'би'."
    - sentence: 'Ми будемо боротися за свої права доти, _____ не досягнемо справедливості.'
      answer: 'доки'
      options: ['доки', 'поки', 'якщо', 'відколи']
      explanation: "Конструкція 'доки... доти' окреслює межу та тривалість процесу."
    - sentence: '_____ керівник відділу був тут зараз, він би допоміг нам розібратися.'
      answer: 'Якби'
      options: ['Якби', 'Якщо', 'Коли', 'Доки']
      explanation: "Неможлива ситуація в теперішньому часі вимагає сполучника 'якби'."
    - sentence: '_____ виникнення аварійної ситуації негайно натисніть червону кнопку.'
      answer: 'У разі'
      options: ['У разі', 'У випадку', 'Поки', 'Доки']
      explanation: "Правильна стилістична форма — 'у разі', а не 'у випадку'."
    - sentence: 'Я б із радістю приєднався до вашої команди, _____ мав відповідний досвід.'
      answer: 'якби'
      options: ['якби', 'якщо', 'відколи', 'поки']
      explanation: "Ірреальна умова щодо минулого чи теперішнього позначається сполучником 'якби'."
    - sentence: 'Ми скасуємо замовлення, _____ товар не буде доставлений до завтрашнього ранку.'
      answer: 'якщо'
      options: ['якщо', 'якби', 'поки', 'відколи']
      explanation: "Реальна умова вимагає використання сполучника 'якщо'."

- type: unjumble
  title: 'Побудова складних речень'
  instruction: 'Складіть правильні речення з наведених слів, звертаючи увагу на сполучники.'
  items:
    - words: ['якщо', 'завтра', 'буде', 'гарна', 'погода', 'ми', 'підемо', 'в', 'гори']
      answer: 'Якщо завтра буде гарна погода ми підемо в гори'
    - words: ['якби', 'ми', 'мали', 'більше', 'часу', 'ми', 'б', 'завершили', 'проект', 'вчасно']
      answer: 'Якби ми мали більше часу ми б завершили проект вчасно'
    - words: ['відколи', 'він', 'очолив', 'відділ', 'продуктивність', 'усієї', 'команди', 'значно', 'зросла']
      answer: 'Відколи він очолив відділ продуктивність усієї команди значно зросла'
    - words: ['доки', 'ми', 'не', 'отримаємо', 'підтвердження', 'ми', 'не', 'почнемо', 'діяти']
      answer: 'Доки ми не отримаємо підтвердження ми не почнемо діяти'
    - words: ['щойно', 'директор', 'увійшов', 'до', 'залу', 'всі', 'припинили', 'свої', 'розмови']
      answer: 'Щойно директор увійшов до залу всі припинили свої розмови'
    - words: ['у', 'разі', 'поломки', 'обладнання', 'негайно', 'зверніться', 'до', 'технічної', 'підтримки']
      answer: 'У разі поломки обладнання негайно зверніться до технічної підтримки'
    - words: ['поки', 'студенти', 'писали', 'складний', 'тест', 'викладач', 'уважно', 'перевіряв', 'есе']
