          correct: false
        - text: 'якби'
          correct: false
    - question: "У якому стилі мовлення слово 'коли' найчастіше замінює умовний сполучник 'якщо'?"
      explanation: "Ця заміна є дуже поширеною в розмовному стилі та фольклорі."
      options:
        - text: 'у розмовному'
