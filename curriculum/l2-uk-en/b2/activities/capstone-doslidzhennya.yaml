- type: reading
  id: reading-capstone
  title: 'Уривок для аналізу: Важливість академічної доброчесності'
  instruction: Прочитайте текст від вашого грантового менеджера та дайте відповіді
    на запитання.
  text: 'Шановні дослідники, як ваш грантовий менеджер, хочу наголосити на важливості
    правильного оформлення ваших проєктів. Ваше дослідження — це не лише збір даних,
    але й їх коректна репрезентація. На етапі написання плану-проспекту ви вже сформулювали
    проблему та мету. Тепер необхідно ретельно працювати з джерелами. Першоджерела
    є основою будь-якого критичного аналізу. Використовуйте коректне цитування та
    уникайте плагіату. Пам''ятайте про мовну агентивність: уникайте канцеляриту та
    пасивних форм. Кожен висновок має бути логічним результатом вашого аналізу. Зрештою,
    ваше дослідження має демонструвати глибоке розуміння актуальності обраної теми
    та її перспектив.

    '
  tasks:
  - Яка основна мета цього звернення грантового менеджера?
  - Чому першоджерела вважаються основою аналізу?
  - Чому важливо уникати канцеляриту та пасивних форм у тексті?
- type: true-false
  title: 'Перевірка розуміння: Академічне письмо'
  instruction: Визначте, чи є твердження правильним, чи хибним.
  items:
  - statement: План-проспект є фінальною стадією написання дослідницької роботи.
    correct: false
    explanation: План-проспект — це скелет вашого дослідження, з якого починається
      написання тексту.
  - statement: Обґрунтування доказу пояснює, як саме цей доказ підтверджує вашу тезу.
    correct: true
    explanation: Без обґрунтування доказ є просто ізольованим фактом.
  - statement: Іван Пулюй вчасно опублікував свої результати і отримав світове визнання.
    correct: false
    explanation: Він зволікав із публікацією, через що втратив першість у відкритті
      рентгенівських променів.
  - statement: Актуальність дослідження має пояснювати, чому тема важлива саме зараз.
    correct: true
    explanation: Актуальність відповідає на питання, чому читач має про це знати сьогодні.
  - statement: Теза роботи має бути загальновідомим фактом, з яким усі погоджуються.
    correct: false
    explanation: Сильна теза є дискусійною, це позиція, яку ви маєте доводити.
  - statement: Парафраз означає точне відтворення слів автора в лапках.
    correct: false
    explanation: Точне відтворення — це пряме цитування. Парафраз — переказ думки
      своїми словами.
  - statement: Канцелярит робить академічний текст більш професійним і вагомим.
    correct: false
    explanation: Канцелярит робить текст мертвим, складним для сприйняття і знеособленим.
  - statement: Безособові форми на -но/-то вимагають використання об'єкта у знахідному
      відмінку.
    correct: true
    explanation: 'Наприклад: ''проаналізовано тенденції'' (знахідний відмінок).'
  - statement: Вислів 'прийти до висновку' є правильною українською формою.
    correct: false
    explanation: 'Це калька з російської. Правильно: ''дійти висновку'' або ''зробити
      висновок''.'
  - statement: Плеоназм — це дублювання змісту в одному словосполученні.
    correct: true
    explanation: Наприклад, 'головний пріоритет' є типовим плеоназмом.
- type: comparative-study
  title: 'Порівняльний аналіз: Канцелярит та жива мова'
  instruction: 'Проаналізуйте два стилі академічного мовлення: бюрократичний та сучасний
    український.'
  source_reading: reading-capstone
  items_to_compare:
  - Варіант А
  - Варіант Б
  criteria:
  - Стилістика
  - Агентивність
  prompt: Порівняйте вплив конструкцій 'було досліджено' та 'ми дослідили' на мовну
    агентивність. Чому перший варіант вважається колоніальною спадщиною?
  model_answer: '> [!model-answer] Модель відповіді

    > Конструкція ''було досліджено'' належить до пасивного стану і знеособлює автора
    дослідження, що є типовою рисою російського канцеляриту, насадженого в українську
    науку за радянських часів. Натомість ''ми дослідили'' використовує активний стан
    (авторське ''ми''), що повертає досліднику відповідальність за його роботу і є
    природним для української академічної традиції.

    '
