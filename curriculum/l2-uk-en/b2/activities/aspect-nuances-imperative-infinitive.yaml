- type: reading
  title: 'Первинне джерело: Офіційний наказ'
  instruction: 'Прочитайте уривок офіційного наказу та дайте відповіді на запитання.'
  text: "Наказ № 45/2-В. 1. Негайно проведіть повний аудит фінансової звітності. 2. Ретельно аналізуйте всі підозрілі транзакції. 3. Не допускайте розголошення конфіденційної інформації. 4. У разі виявлення порушень, повідомте керівництво. Не намагайтеся вирішити проблему самостійно, оскільки без повного доступу це не можна зробити."
  tasks:
    - "Які дієслова доконаного виду використані для термінових завдань?"
    - "Яке завдання вимагає постійного, тривалого процесу?"
    - "Яка сувора заборона встановлена в тексті наказу?"
    - "Що сказано про фізичну неможливість самостійного вирішення проблеми?"

- type: true-false
  title: 'Правильно чи неправильно: Аналіз відтінків виду'
  instruction: 'Визначте, чи є ці твердження про використання виду дієслова правильними.'
  items:
    - statement: "В українській культурі для щирого запрошення гостей завжди використовується доконаний вид дієслова."
      correct: false
      explanation: "Для гостинних запрошень використовується виключно недоконаний вид (наприклад, 'Сідайте')."
    - statement: "Граматична форма 'Сядь!' у побуті часто звучить як жорсткий військовий наказ."
      correct: true
      explanation: "Доконаний вид миттєво створює відчуття категоричності та обов'язку."
    - statement: "Недоконаний вид завжди акцентує увагу співрозмовника на кінцевому результаті дії."
      correct: false
      explanation: "Недоконаний вид фокусується на процесі, а доконаний — на фінальному результаті."
    - statement: "У військових інструкціях та наказах переважає використання доконаного виду."
      correct: true
      explanation: "Такі накази вимагають негайного та чіткого результату ('Викопайте!', 'Підготуйте!')."
    - statement: "Дієслівна форма 'робі́мо' є питомим українським закликом до спільної дії."
      correct: true
      explanation: "Синтетична форма на -мо є найбільш природною для української мови."
    - statement: "Конструкція 'давайте працювати' вважається ідеальним та найкращим стилістичним варіантом."
      correct: false
      explanation: "Це синтаксична калька. Правильно та елегантно казати 'працюймо'."
    - statement: "Для застереження від раптової, випадкової дії (наприклад, падіння) використовують доконаний вид."
      correct: true
      explanation: "Наприклад, 'Обережно, не впади!' попереджає про миттєвий небажаний результат."
    - statement: "Суворі адміністративні заборони (наприклад, 'Не бігай!') утворюються за допомогою доконаного виду."
      correct: false
      explanation: "Заборони вимагають недоконаного виду, щоб повністю зупинити сам процес виконання."
    - statement: "Конструкція 'не можна + недоконаний вид інфінітива' завжди означає фізичну неможливість дії."
      correct: false
      explanation: "Вона означає соціальну або етичну заборону, порушення правил (наприклад, 'Не можна курити')."
    - statement: "Якщо старе вікно не відчиняється через іржу, правильно сказати 'Його не можна відчинити'."
      correct: true
      explanation: "Доконаний вид інфінітива вказує на об'єктивну фізичну неможливість досягти результату."

- type: quiz
  title: 'Перевірка розуміння: Граматичні нюанси та етикет'
  instruction: 'Оберіть єдиний правильний варіант відповіді для кожної описаної комунікативної ситуації.'
  items:
    - question: "Яку граматичну форму ви оберете, щоб дуже ввічливо запросити колегу сісти у вашому кабінеті?"
      explanation: "Для щирого, теплого запрошення необхідно використовувати недоконаний вид."
      options:
        - text: "Сідайте, будь ласка."
          correct: true
        - text: "Сядьте, будь ласка."
          correct: false
        - text: "Сядь негайно."
          correct: false
        - text: "Не сідайте."
          correct: false
    - question: "Яке з цих поданих дієслів утворює форму наказового способу за допомогою закінчення '-й'?"
      explanation: "Дієслова з чистою основою на голосний (чита-ють) утворюють наказ на -й (читай)."
      options:
        - text: "читати"
          correct: true
        - text: "робити"
          correct: false
        - text: "ходити"
          correct: false
        - text: "сісти"
          correct: false
    - question: "Як граматично правильно утворити наказ для дієслова 'сісти' (доконаний вид) у другій особі однини?"
      explanation: "Основа 'сяд-', наголос падає на корінь, тому використовуємо нульове закінчення з пом'якшенням."
      options:
        - text: "сядь"
          correct: true
        - text: "сяди"
          correct: false
        - text: "сядай"
          correct: false
        - text: "сядьмо"
          correct: false
    - question: "Яка саме допоміжна частка використовується для передачі чіткого наказу чи прохання третій особі?"
      explanation: "Частки 'хай' або 'нехай' вживаються виключно для спонукання третьої особи (він, вона, вони)."
      options:
        - text: "хай"
          correct: true
        - text: "би"
          correct: false
        - text: "щоб"
          correct: false
        - text: "давай"
          correct: false
    - question: "Який вид дієслова слід обов'язково використати для суворої інструкції 'Не розголошувати інформацію'?"
      explanation: "Для загальних і суворих табу та заборон завжди використовується недоконаний вид."
      options:
        - text: "недоконаний"
          correct: true
        - text: "доконаний"
          correct: false
        - text: "обидва підходять"
          correct: false
        - text: "жоден не підходить"
          correct: false
    - question: "Що буквально означає сувора фраза 'У цій кімнаті не можна відкривати вікна'?"
      explanation: "Конструкція з інфінітивом недоконаного виду означає порушення правил безпеки або соціальну заборону."
      options:
        - text: "Це суворо заборонено правилами пожежної безпеки."
          correct: true
        - text: "Вікна фізично зламані і їх неможливо зрушити."
          correct: false
        - text: "У вас немає фізичної сили їх відчинити."
          correct: false
        - text: "Відкривати вікна дуже важко для вас."
          correct: false
    - question: "Яку дієслівну форму ви використаєте, щоб швидко попередити дитину про дуже слизьку підлогу?"
      explanation: "Для миттєвого застереження від випадкового болісного результату використовується доконаний вид."
      options:
        - text: "Обережно, не впади!"
          correct: true
        - text: "Обережно, не падай!"
          correct: false
        - text: "Обережно, не падайте!"
          correct: false
        - text: "Обережно, не впадімо!"
          correct: false
    - question: "Яке дієслово найкраще підходить для формального наказу з чітко встановленим дедлайном?"
      explanation: "Доконаний вид завжди акцентує увагу на завершенні дії до певного критичного моменту."
      options:
        - text: "Підготуйте"
          correct: true
        - text: "Підготовлюйте"
          correct: false
        - text: "Готуйте"
          correct: false
        - text: "Готуймо"
          correct: false
    - question: "Що саме висловлює відомий український народний забобон 'Не виноси сміття ввечері'?"
      explanation: "Народні забобони формулюються як містичні, суворі табу за допомогою недоконаного виду."
      options:
        - text: "Категоричну містичну заборону на процес винесення сміття."
          correct: true
        - text: "Попередження, що сміття може раптово впасти."
          correct: false
        - text: "Фізичну неможливість винести сміття зараз."
          correct: false
        - text: "М'яке прохання відкласти процес прибирання."
          correct: false
    - question: "Який граматичний варіант є найкращим та найввічливішим для ділового листування з новими партнерами?"
      explanation: "Етикетні формули з проханням звучать значно більш дипломатично та зберігають обличчя партнера."
      options:
        - text: "Будь ласка, надішліть нам звіт сьогодні."
          correct: true
        - text: "Надсилайте ваш детальний звіт негайно."
          correct: false
        - text: "Пришліть мені фінансовий звіт зараз же."
          correct: false
        - text: "Давайте надсилайте свій звіт."
          correct: false

- type: fill-in
  title: 'Заповніть пропуски: Оберіть правильну форму'
  instruction: 'Уважно прочитайте речення та оберіть найбільш відповідне дієслово для кожної ситуації.'
  items:
    - sentence: "Заходьте, будь ласка, і _______ за цей стіл."
      answer: "сідайте"
      options: ["сідайте", "сядьте", "сядь", "сідай"]
      explanation: "Для гостинного запрошення ми завжди використовуємо недоконаний вид."
    - sentence: "Командир різко наказав солдату: Негайно _______ зброю до бою!"
      answer: "підготуй"
      options: ["готуй", "підготуй", "готуйте", "підготуйте"]
      explanation: "Для термінового військового наказу необхідний доконаний вид."
    - sentence: "Обережно, сходи дуже слизькі, не _______!"
      answer: "впади"
      options: ["падай", "впади", "падайте", "впадіть"]
      explanation: "Для турботливого застереження від випадкової дії — доконаний вид."
    - sentence: "Директоре, будь ласка, _______ цей фінансовий звіт до завтра."
      answer: "затвердьте"
      options: ["затверджуйте", "затвердьте", "затверджуй", "затвердь"]
      explanation: "Дія, що має чіткий дедлайн, потребує доконаного виду."
    - sentence: "У цьому музейному приміщенні не можна _______, це порушення етикету."
      answer: "курити"
      options: ["курити", "покурити", "викурити", "закурити"]
      explanation: "Для встановлення суворої соціальної заборони потрібен недоконаний інфінітив."
    - sentence: "Цей старий замок повністю зламаний, двері ніяк не можна _______."
      answer: "відчинити"
      options: ["відчиняти", "відчинити", "відкривати", "відкрити"]
      explanation: "Доконаний інфінітив вказує на абсолютну фізичну неможливість дії."
    - sentence: "Ніколи більше не _______ чужі речі без дозволу керівництва!"
      answer: "бери"
      options: ["бери", "візьми", "беріть", "візьміть"]
      explanation: "Для довготривалої адміністративної заборони використовують недоконаний вид."
    - sentence: "Будь ласка, _______ нам ваші нові цінові пропозиції сьогодні."
      answer: "надішліть"
      options: ["надсилайте", "надішліть", "надсилай", "надішли"]
      explanation: "Для ділового прохання з отриманням конкретного результату — доконаний вид."
    - sentence: "Разом _______ наш новий великий стратегічний проєкт!"
      answer: "розпочнімо"
      options: ["починаємо", "розпочнімо", "давайте почнемо", "почніть"]
      explanation: "Синтетична форма на -мо (розпочнімо) є найвищим стандартом."
    - sentence: "Під час роботи над звітом дуже уважно і довго _______ всі дані."
      answer: "аналізуйте"
      options: ["проаналізуйте", "аналізуйте", "аналізуй", "проаналізуй"]
      explanation: "Для опису тривалого та постійного процесу роботи — недоконаний вид."

- type: unjumble
  title: 'Побудуйте правильні речення: Синтаксис наказів'
  instruction: 'Розташуйте подані слова в правильному порядку, щоб утворити граматично коректні речення.'
  items:
    - words: ["Цей", "складний", "процес", "вимагає", "багато", "уваги"]
      answer: "Цей складний процес вимагає багато уваги"
    - words: ["Не", "можна", "порушувати", "правила", "техніки", "безпеки"]
      answer: "Не можна порушувати правила техніки безпеки"
    - words: ["Командир", "віддав", "наказ", "зайняти", "нові", "бойові", "позиції"]
      answer: "Командир віддав наказ зайняти нові бойові позиції"
    - words: ["Науковий", "метод", "дозволяє", "провести", "глибокий", "аналіз", "даних"]
      answer: "Науковий метод дозволяє провести глибокий аналіз даних"
    - words: ["Будь", "ласка", "сідайте", "за", "цей", "великий", "стіл"]
      answer: "Будь ласка сідайте за цей великий стіл"
    - words: ["Результати", "нового", "дослідження", "будуть", "опубліковані", "наступного", "тижня"]
      answer: "Результати нового дослідження будуть опубліковані наступного тижня"
    - words: ["Ніколи", "не", "забувай", "свої", "важливі", "обіцянки", "колегам"]
      answer: "Ніколи не забувай свої важливі обіцянки колегам"
    - words: ["Офіційний", "наказ", "має", "чіткий", "термін", "виконання", "завдання"]
      answer: "Офіційний наказ має чіткий термін виконання завдання"

- type: error-correction
  title: 'Знайдіть і виправте помилки: Стилістика та вид'
  instruction: 'У кожному реченні є одна груба граматична або стилістична помилка. Знайдіть її та оберіть правильний варіант.'
  items:
    - sentence: "Давайте працювати разом над цим надзвичайно складним проєктом."
      error: "Давайте працювати"
      answer: "Працюймо"
      error_type: "construction"
      options: ["Працюймо", "Працюємо", "Будемо працювати", "Працюйте"]
      explanation: "Синтетична форма на -мо (працюймо) є більш природною та літературною."
    - sentence: "Сядьте, будь ласка, за наш стіл і почувайтеся як удома."
      error: "Сядьте"
      answer: "Сідайте"
      error_type: "register"
      options: ["Сідайте", "Сядь", "Сідай", "Сядемо"]
      explanation: "Для теплого українського запрошення необхідно використовувати недоконаний вид (сідайте)."
    - sentence: "Директоре, затверджуйте цей новий річний бюджет до п'ятниці."
      error: "затверджуйте"
      answer: "затвердьте"
      error_type: "word"
      options: ["затвердьте", "затвердити", "затвердив", "затверджуєте"]
      explanation: "Для дії з чітким дедлайном (до п'ятниці) потрібен результативний доконаний вид."
    - sentence: "Ніколи не розбий цей красивий старовинний кришталевий посуд!"
      error: "не розбий"
      answer: "не розбивай"
      error_type: "word"
      options: ["не розбивай", "не розбийте", "не бий", "не розбивав"]
      explanation: "Для загальної і постійної заборони ('ніколи') потрібен виключно недоконаний вид."
    - sentence: "Гляди, не забувай свої оригінальні паспорти на столі!"
      error: "не забувай"
      answer: "не забудь"
      error_type: "word"
      options: ["не забудь", "не забудьте", "не забув", "не забути"]
      explanation: "Для попередження від випадкової дії миттєво використовується доконаний вид."
    - sentence: "У цьому сучасному парку не можна вигуляти великих собак."
      error: "вигуляти"
      answer: "вигулювати"
      error_type: "word"
      options: ["вигулювати", "гуляти", "гуляючи", "погуляти"]
      explanation: "Соціальна адміністративна заборона вимагає недоконаного виду інфінітива."
    - sentence: "Цей математичний метод ніяк не можна застосовувати без комп'ютера."
      error: "застосовувати"
      answer: "застосувати"
      error_type: "word"
      options: ["застосувати", "застосуємо", "застосовуючи", "застосував"]
      explanation: "Об'єктивна фізична або технічна неможливість вимагає доконаного виду."
    - sentence: "Хай вони підготовлюють цей фінансовий звіт якомога швидше."
      error: "підготовлюють"
      answer: "підготують"
      error_type: "word"
      options: ["підготують", "готують", "готувати", "підготувати"]
      explanation: "Для швидкого, повністю закінченого результату використовується доконаний вид."

- type: match-up
  title: 'Знайдіть пару: Теорія та практика'
  instruction: 'З''єднайте теоретичні поняття з їхнім правильним визначенням або контекстом використання.'
  pairs:
    - left: "Недоконаний вид у запрошенні"
      right: "Створює атмосферу гостинності та приємної процесуальності"
    - left: "Доконаний вид у спонуканні"
      right: "Фокусує увагу на швидкому результаті або дедлайні"
    - left: "Сувора заборона (Не бігай!)"
      right: "Вимагає жорсткого використання недоконаного виду"
    - left: "Емоційне застереження (Не впади!)"
      right: "Попереджає про раптовий випадковий негативний наслідок"
    - left: "Синтетична форма (Працюймо!)"
