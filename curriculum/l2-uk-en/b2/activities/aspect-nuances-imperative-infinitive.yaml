- type: essay-response
  title: 'Складання формальної інструкції: Управлінський рівень'
  instruction: 'Напишіть коротку офіційну інструкцію або наказ, продемонструвавши ваше володіння дієслівним видом.'
  prompt: "Уявіть себе старшим керівником відділу. Напишіть детальний наказ (мінімум 150 слів) для ваших підлеглих щодо надзвичайно важливого нового проєкту. Ви повинні обов'язково використати: 1) дієслова доконаного виду для встановлення жорсткого дедлайну, 2) дієслова недоконаного виду для опису постійного, щоденного процесу роботи, 3) сувору заборону (конструкція 'не' + недоконаний вид) щодо розголошення конфіденційних даних."
  min_words: 150
  model_answer: "Офіційний наказ по відділу маркетингу та стратегічного планування.\n\nЗ метою максимально успішного запуску нового інноваційного продукту на європейський ринок, наказую наступне:\n\n1. Негайно підготуйте детальний, глибокий аналіз усіх ключових конкурентів та обов'язково надішліть мені фінальний, повністю перевірений звіт до 15:00 цієї п'ятниці. Це надзвичайно пріоритетне завдання нашого підрозділу, тому, будь ласка, виконайте його максимально якісно та професійно.\n\n2. Протягом усього наступного місяця щодня дуже ретельно контролюйте всі показники нашої рекламної кампанії в популярних соціальних мережах. Постійно збирайте цінний зворотний зв'язок від найперших клієнтів та системно аналізуйте їхні відгуки і коментарі.\n\n3. Категорично забороняю передавати абсолютно будь-яку внутрішню чи конфіденційну інформацію про цей новий проєкт третім особам або представникам медіа. Ніколи не обговорюйте жодні фінансові деталі з працівниками інших структурних відділів і в жодному разі не залишайте важливі робочі документи на відкритих столах у загальних приміщеннях.\n\n4. Якщо ви раптом випадково виявите якісь критичні помилки в роботі комп'ютерної системи, негайно повідомте про це нашу цілодобову технічну підтримку. Навіть не намагайтеся виправити ці серйозні серверні збої самостійно, оскільки без повного доступу головного адміністратора бази даних це технічно абсолютно не можна зробити.\n\nПрацюймо командно, віддано та максимально ефективно заради нашого спільного результату!"
  rubric:
    - criteria: "Використання доконаного виду для результату"
      description: "Ваш наказ містить дієслова доконаного виду для всіх термінових дій (наприклад, підготуйте, надішліть)."
      points: 5
    - criteria: "Використання недоконаного виду для процесу"
      description: "Ви правильно описали постійний робочий процес дієсловами недоконаного виду (контролюйте, аналізуйте)."
      points: 5
    - criteria: "Правильно сформульована заборона"
      description: "Ваша заборона сформульована граматично бездоганно (не + недоконаний вид, наприклад: не залишайте)."
      points: 5