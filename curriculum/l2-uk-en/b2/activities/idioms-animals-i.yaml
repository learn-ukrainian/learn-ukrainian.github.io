    - prompt: "собаче життя"
      answer: "дуже важке існування"
    - prompt: "дивитися вовком"
      answer: "проявляти відкриту ворожість"
    - prompt: "вовка ноги годують"
      answer: "треба активно діяти для результату"
    - prompt: "кінь ще не валявся"
      answer: "робота ще навіть не починалася"
    - prompt: "як собака на сіні"
