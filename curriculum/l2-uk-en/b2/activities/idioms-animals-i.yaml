  blanks:
    - id: 1
      answer: "код"
      options: ["код", "вид", "тип", "стиль"]
    - id: 2
      answer: "переносне"
      options: ["переносне", "пряме", "буквальне", "точне"]
    - id: 3
      answer: "вовк"
      options: ["вовк", "лис", "собака", "кіт"]
    - id: 4
      answer: "вовком"
      options: ["вовком", "собакою", "конем", "птахом"]
    - id: 5
      answer: "конячка"
      options: ["конячка", "собака", "машина", "людина"]
    - id: 6
      answer: "кінь"
      options: ["кінь", "пес", "кіт", "віл"]
    - id: 7
      answer: "собаку"
      options: ["собаку", "кашу", "хліб", "кота"]
    - id: 8
      answer: "собаче"
      options: ["собаче", "вовче", "котяче", "кінське"]
    - id: 9
      answer: "собака"
      options: ["собака", "вовк", "кінь", "сусід"]
    - id: 10
      answer: "коні"
      options: ["коні", "возі", "машині", "роботі"]
    - id: 11
      answer: "долі"
      options: ["долі", "роботи", "проблеми", "зустрічі"]
