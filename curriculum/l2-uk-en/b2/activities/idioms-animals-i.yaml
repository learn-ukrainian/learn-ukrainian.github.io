  instruction: Розташуйте слова у правильному порядку.
- type: true-false
  title: Правда чи брехня?
  items:
  - statement: Фразеологізм 'собаку з'їсти' означає, що людина відчуває сильний голод
      після важкої фізичної праці.
    correct: false
    explanation: Цей вираз означає бути великим майстром і мати багатий професійний
      досвід у певній справі.
  - statement: Вираз 'вовка ноги годують' використовується для опису ситуацій, коли
      людина мусить активно діяти, щоб заробити на життя.
    correct: true
    explanation: Це метафора активної життєвої позиції, необхідної для виживання та
      успіху.
  - statement: У козацькій традиції кінь сприймався виключно як робоча худоба та тяглова
      сила.
    correct: false
    explanation: Для козаків кінь був побратимом, бойовим товаришем та символом свободи.
  - statement: Вираз 'кінь ще не валявся' є ідеальним для використання в офіційних
      ділових звітах.
    correct: false
    explanation: Це суто розмовний колоквіалізм, його не можна використовувати в офіційно-діловому
      стилі.
  - statement: В українській мові англійську ідіому 'raining cats and dogs' найкраще
      перекладати як 'ллє як з відра'.
    correct: true
    explanation: Дослівний переклад фразеологізмів породжує смішні кальки, треба шукати
      автентичні відповідники.
  - statement: Метафора 'вовк в овечій шкурі' має глибоке біблійне походження і описує
      лицемірство.
    correct: true
    explanation: Цей вираз походить з Євангелія і використовується у книжному стилі
      для опису прихованої небезпеки.
  - statement: Фраза 'собака гавкає — вітер несе' є закликом до активної боротьби
      з плітками та критикою.
    correct: false
    explanation: Навпаки, це мудра порада ігнорувати пусті слова недоброзичливців
      і спокійно робити свою справу.
  - statement: '''Робочою конячкою'' часто називають дуже амбітну людину, яка прагне
      швидкої кар''єри та гучної слави.'
    correct: false
    explanation: Так називають працьовиту, скромну людину, яка виконує основну важку
      роботу без амбіцій на лідерство.
  - statement: Вислів 'дивитися вовком' передає відчуття сильної ворожості або підозри.
    correct: true
    explanation: Цей фразеологізм дуже точно описує похмурий і непривітний погляд.
  - statement: Фразеологізм 'як собака на сіні' описує людину, яка сама не користується
      благами і не дозволяє іншим.
    correct: true
    explanation: Метафора походить від собаки, яка лежить на сіні, не їсть його, але
      й худобі не віддає.
