- type: unjumble
  title: "Складіть речення з фразеологізмами"
  items:
    - words: ["цей", "звіт", "мені", "потрібний", "як", "собаці", "п'ята", "нога"]
      answer: "Цей звіт мені потрібний як собаці п'ята нога"
    - words: ["у", "моєму", "дипломному", "проєкті", "ще", "кінь", "не", "валявся"]
      answer: "У моєму дипломному проєкті ще кінь не валявся"
    - words: ["після", "довгої", "хвороби", "він", "знову", "почувається", "на", "коні"]
      answer: "Після довгої хвороби він знову почувається на коні"
    - words: ["наш", "новий", "директор", "це", "справжній", "вовк", "в", "овечій", "шкурі"]
      answer: "Наш новий директор це справжній вовк в овечій шкурі"
    - words: ["ти", "дуже", "багато", "знаєш", "бо", "собаку", "з'їв", "на", "цьому"]
      answer: "Ти дуже багато знаєш бо собаку з'їв на цьому"
    - words: ["він", "постійно", "дивиться", "вовком", "на", "своїх", "нових", "колег"]
      answer: "Він постійно дивиться вовком на своїх нових колег"

- type: error-correction
  title: "Виправте помилки дослівного перекладу та русизми"
  items:
    - sentence: "Сьогодні на вулиці дуже погана погода, дощить котами і собаками."
      error: "дощить котами і собаками"
      answer: "ллє як з відра"
      options: ["ллє як з відра", "падають собаки", "сильно капає", "йде водою"]
      explanation: "Англійська ідіома 'raining cats and dogs' перекладається українською 'ллє як з відра'."
    - sentence: "Він справжній майстер своєї справи, він на цьому кота з'їв."
      error: "кота з'їв"
      answer: "собаку з'їв"
      options: ["собаку з'їв", "вовка з'їв", "коня з'їв", "хліб з'їв"]
      explanation: "Правильний український фразеологізм — 'собаку з'їв' (бути майстром, знавцем)."
    - sentence: "Я кушаю свій обід з великим вовчим апетитом після тренування."
      error: "кушаю"
      answer: "їм"
      options: ["їм", "харчуюсь", "ковтаю", "смакую"]
      explanation: "Слово 'кушати' є русизмом, правильно українською казати 'їсти'."
    - sentence: "Наша команда багато працює як собака, щоб встигнути до дедлайну."
      error: "працює як собака"
      answer: "працює як віл"
      options: ["працює як віл", "робить як кінь", "працює як машина", "робить як птах"]
      explanation: "Англійське 'work like a dog' краще і природніше перекладати як 'працювати як віл'."
    - sentence: "Коли ми приїхали на місце роботи, там ще кіт не валявся."
      error: "кіт не валявся"
      answer: "кінь не валявся"
      options: ["кінь не валявся", "пес не валявся", "вовк не валявся", "віл не валявся"]
      explanation: "Правильний фразеологізм про нерозпочату роботу — 'кінь ще не валявся'."
    - sentence: "Він такий жадібний, поводиться з нами як вовк на сіні."
      error: "вовк на сіні"
      answer: "собака на сіні"
      options: ["собака на сіні", "кінь на сіні", "лисиця на сіні", "ведмідь на сіні"]
      explanation: "Правильний вираз — 'як собака на сіні' (і сам не користується, і іншим не дає)."

