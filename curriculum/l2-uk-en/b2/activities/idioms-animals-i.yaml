- type: reading
  title: "Первинне джерело: Тваринний код"
  text: |
    Кожне переносне значення, закладене у тваринній метафорі, спирається на дуже тривалі спостереження за поведінкою звірів, які згодом перетворилися на стійкі формули. Наприклад, коли ми сьогодні говоримо про небезпечну хитрість, ми автоматично згадуємо лисицю, а коли йдеться про впертість — вола або віслюка. Розуміння цих багатошарових метафор є абсолютно ключовим для правильного декодування текстів.
  tasks:
    - "Які тварини традиційно асоціюються з хитрістю та впертістю в українській культурі?"
    - "Як саме виникають переносні значення тваринних метафор?"

- type: quiz
  title: "Перевірте розуміння фразеологізмів"
  items:
    - question: "Що означає вираз 'дивитися вовком' у повсякденній розмові?"
      explanation: "Цей вираз означає дивитися вороже, з неприхованою злістю або неприязню."
      options:
        - text: "дивитися з великим здивуванням"
          correct: false
        - text: "дивитися дуже пильно і довго"
          correct: false
        - text: "дивитися вороже і неприязно"
          correct: true
        - text: "дивитися з великою любов'ю"
          correct: false
    - question: "Яке значення має вислів 'собаку з'їсти' в українській мові?"
      explanation: "Вислів означає набути великого досвіду або стати майстром у якійсь справі."
      options:
        - text: "бути дуже голодним після роботи"
          correct: false
        - text: "мати великий досвід у справі"
          correct: true
        - text: "зробити жахливу життєву помилку"
          correct: false
        - text: "бути надзвичайно жорстокою людиною"
          correct: false
    - question: "Коли українці використовують вираз 'кінь ще не валявся'?"
      explanation: "Так кажуть, коли робота або справа ще навіть не була розпочата."
      options:
        - text: "коли робота ще навіть не розпочалася"
          correct: true
        - text: "коли робота вже успішно завершена"
          correct: false
        - text: "коли хтось дуже втомився від праці"
          correct: false
        - text: "коли потрібно зробити невелику перерву"
          correct: false
    - question: "Що символізує вираз 'робоча конячка' в сучасному контексті?"
      explanation: "Це метафора для дуже працьовитої та надійної людини або безвідмовної техніки."
      options:
        - text: "дуже ледачу і безвідповідальну людину"
          correct: false
        - text: "начальника, який кричить на підлеглих"
          correct: false
        - text: "надзвичайно працьовиту і надійну людину"
          correct: true
        - text: "людину, яка постійно скаржиться на долю"
          correct: false
    - question: "В якій ситуації доречно сказати 'вовк в овечій шкурі'?"
      explanation: "Цей вираз описує лицеміра, який приховує свої злі наміри за доброю зовнішністю."
      options:
        - text: "коли людина приховує підступність за добротою"
          correct: true
        - text: "коли людина є надзвичайно сміливою і чесною"
          correct: false
        - text: "коли хтось просто одягнув негарний одяг"
          correct: false
        - text: "коли хтось відчуває сильний страх перед тваринами"
          correct: false
    - question: "Що мають на увазі, коли кажуть про 'собаче життя'?"
      explanation: "Так описують дуже важке, повне щоденних злиднів і великих проблем життя."
      options:
        - text: "дуже важке і нестерпне людське життя"
          correct: true
        - text: "безтурботне і радісне щоденне існування"
          correct: false
        - text: "життя, присвячене захисту домашніх тварин"
          correct: false
        - text: "успішну кар'єру в галузі сучасної ветеринарії"
          correct: false
    - question: "Яке значення має стародавня приказка 'вовка ноги годують'?"
      explanation: "Щоб мати якийсь успіх і прибуток, потрібно бути активним і постійно діяти."
      options:
        - text: "щоб мати хороший результат, треба активно діяти"
          correct: true
        - text: "вовки дуже швидко бігають у темному лісі"
          correct: false
        - text: "ніколи не треба поспішати з важливим рішенням"
          correct: false
        - text: "важка фізична праця дуже шкодить здоров'ю людини"
          correct: false
    - question: "Як найкраще перекласти англійську ідіому 'It is raining cats and dogs'?"
      explanation: "Дослівний переклад є смішною калькою, тому українською ми завжди кажемо 'ллє як з відра'."
      options:
        - text: "сьогодні на вулиці падають коти і собаки"
          correct: false
        - text: "на вулиці дуже сильно ллє як з відра"
          correct: true
        - text: "сьогодні дощить маленькими котами і собаками"
          correct: false
        - text: "на вулиці почався дуже сильний і холодний вітер"
          correct: false

- type: fill-in
  title: "Вставте пропущений фразеологізм"
  items:
    - sentence: "Я б із радістю пішов на цю цікаву вечірку, але в мене ще стільки роботи, що там і {кінь ще не валявся}."
      answer: "кінь ще не валявся"
      options:
        - "кінь ще не валявся"
        - "собаку з'їв"
        - "вовка ноги годують"
        - "робоча конячка"
    - sentence: "Його новий сусід видається дуже приємним, але всі ми знаємо, що він справжній {вовк в овечій шкурі}."
      answer: "вовк в овечій шкурі"
      options:
        - "собака на сіні"
        - "вовк в овечій шкурі"
        - "робоча конячка"
        - "вірний як собака"
    - sentence: "Цей програміст є справжньою {робоча конячка} нашого великого відділу, він робить усю найважчу справу."
      answer: "робоча конячка"
      options:
        - "робоча конячка"
        - "вовчий апетит"
        - "побратим"
        - "хижак"
    - sentence: "Він постійно критикує мої ідеї, але я не звертаю на це уваги, бо {собака гавкає — вітер несе}."
      answer: "собака гавкає — вітер несе"
      options:
        - "долі й конем не об'їдеш"
        - "вовка ноги годують"
        - "собака гавкає — вітер несе"
        - "ллє як з відра"
    - sentence: "Після вдалих інвестицій він знову відчув себе вільно і зараз перебуває {на коні}."
      answer: "на коні"
      options:
        - "на коні"
        - "як собака на сіні"
        - "з вовчим апетитом"
        - "під конем"
    - sentence: "Ця стара бухгалтерська програма мені {потрібна як собаці п'ята нога}, я давно використовую нову."
      answer: "потрібна як собаці п'ята нога"
      options:
        - "потрібна як собаці п'ята нога"
        - "кінь ще не валявся"
        - "собаче життя"
        - "дарований кінь"
    - sentence: "Не треба сперечатися з директором про податки, він на цьому вже давно {собаку з'їв}."
      answer: "собаку з'їв"
      options:
        - "собаку з'їв"
        - "ллє як з відра"
        - "собака гавкає"
        - "кінь не валявся"
    - sentence: "Після довгої прогулянки в лісі в нас з'явився справжній {вовчий апетит}."
      answer: "вовчий апетит"
      options:
        - "вовчий апетит"
        - "собаче життя"
        - "переносне значення"
        - "новий світогляд"

- type: match-up
  title: "Знайдіть пару: фразеологізм та значення"
  items:
    - prompt: "собаку з'їсти"
      answer: "бути великим фахівцем"
    - prompt: "бути на коні"
