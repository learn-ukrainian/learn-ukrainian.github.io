- type: reading
  title: 'Аналіз тексту: Культурний код'
  text: 'Українська фразеологія містить багатий тваринний код, який розкриває глибокі
    вірування народу. Вовк, собака та кінь є одними з найважливіших персонажів цього
    коду. Якщо кінь традиційно виступає побратимом козака та символом свободи, то
    собака найчастіше уособлює або неймовірну відданість, або важке, злиденне життя.
    Вовк же поєднує в собі страх перед хижаком і повагу до його сили та здатності
    виживати. Розуміння цих нюансів допомагає іноземцям не лише уникати смішних кальок
    під час перекладу, а й глибоко відчувати емоційний стан своїх співрозмовників
    у різних життєвих ситуаціях.

    '
  tasks:
  - Яку роль відіграє кінь у традиційному українському світогляді?
  - Чому вовк має подвійну природу в українській культурі?
  - Які два протилежні значення найчастіше пов'язані з образом собаки?
  - Чому іноземцям важливо розуміти тваринний код української мови?
- type: fill-in
  title: Вставте правильні фразеологізми
  items:
  - sentence: Ми довго думали, як вирішити цю проблему, але наш керівник у таких справах
      давно собаку з'їв, тому він швидко знайшов вихід.
    answer: собаку з'їв
    options:
    - собаку з'їв
    - був на коні
    - дивився вовком
    - ще не валявся
  - sentence: Після довгої прогулянки зимовим лісом у дітей з'явився справжній вовчий
      апетит.
    answer: вовчий апетит
    options:
    - вовчий апетит
    - собаче життя
    - лицемірний сміх
    - тваринний код
  - sentence: Наш сусід сидить зі своїми інструментами як собака на сіні — сам не
      користується і нікому не дає.
    answer: як собака на сіні
    options:
    - як собака на сіні
    - вірний як собака
    - вовк в овечій шкурі
    - як з відра
  - sentence: Я йому вчора дуже ввічливо відмовила, а він тепер цілий день дивиться
      вовком.
    answer: дивиться вовком
    options:
    - дивиться вовком
    - працює як віл
    - собаку з'їв
    - був на коні
  - sentence: Не треба звертати увагу на ці безпідставні плітки колег, адже собака
      гавкає — вітер несе.
    answer: собака гавкає — вітер несе
    options:
    - собака гавкає — вітер несе
    - вовка ноги годують
    - долі й конем не об'їдеш
    - дарованому коневі в зуби не заглядають
  - sentence: Він намагався уникнути цієї складної розмови, але долі й конем не об'їдеш,
      тому вони все одно зустрілися.
    answer: долі й конем не об'їдеш
    options:
    - долі й конем не об'їдеш
    - собака гавкає — вітер несе
    - вовка ноги годують
    - кінь ще не валявся
  - sentence: Для фрилансера дуже важливо бути ініціативним, бо в цій професії вовка
      ноги годують.
    answer: вовка ноги годують
    options:
    - вовка ноги годують
    - кінь ще не валявся
    - собака гавкає — вітер несе
    - долі й конем не об'їдеш
  - sentence: Ми маємо здати цей проєкт через два дні, а в нас там ще кінь не валявся.
    answer: кінь не валявся
    options:
    - кінь не валявся
    - вовк в овечій шкурі
    - вовчий апетит
    - колоквіалізм
  - sentence: Після перемоги на міжнародному конкурсі цей молодий науковець зараз
      перебуває на коні.
    answer: на коні
    options:
    - на коні
    - як на сіні
    - в овечій шкурі
    - як у відрі
  - sentence: Вона подарувала мені дуже дивний капелюх, але дарованому коневі в зуби
      не заглядають, тому я подякував.
    answer: дарованому коневі в зуби не заглядають
    options:
    - дарованому коневі в зуби не заглядають
    - долі й конем не об'їдеш
    - собака гавкає — вітер несе
    - вовка ноги годують
