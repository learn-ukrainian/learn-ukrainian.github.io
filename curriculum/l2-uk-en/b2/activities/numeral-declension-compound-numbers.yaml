- type: reading
  title: Офіційний звіт бухгалтера
  text: У дві тисячі двадцять третьому році загальний прибуток нашої компанії зріс
    на двадцять п'ять відсотків. Ми успішно реалізували понад шістсот сорок нових
    проєктів та залучили до співпраці близько семисот п'ятдесяти тисяч нових клієнтів.
    Згідно з фінансовим звітом, на рахунках нашої корпорації наразі зберігається близько
    дев'ятисот мільйонів гривень чистого активу. У цьому процесі брали участь майже
    сто вісімдесят висококваліфікованих спеціалістів, серед яких шістдесят провідних
    аналітиків. Цей метод фінансового планування довів свою ефективність.
  tasks:
  - Прочитайте звіт уголос, чітко вимовляючи закінчення великих складених числівників.
  - Випишіть усі кількісні складені числівники та поясніть їхні відмінкові закінчення.
  - Проаналізуйте використання слів-обмежувачів (близько, понад, майже) та відмінки
    іменників після них.
- type: true-false
  title: 'Граматичні факти: складені числівники'
  items:
  - statement: У складених кількісних числівниках (наприклад, триста сорок п'ять)
      під час відмінювання змінюється лише останнє слово.
    correct: false
    explanation: У складених кількісних числівниках змінюється кожне слово.
  - statement: У порядкових числівниках (наприклад, дві тисячі двадцять перший) відмінюється
      виключно останній компонент.
    correct: true
    explanation: Так, у порядкових числівниках усі слова, крім останнього, залишаються
      незмінними.
  - statement: Форма "двісот" є абсолютно правильною в українській діловій мові.
    correct: false
    explanation: 'Такої форми не існує. Правильно казати: двохсот.'
  - statement: Слова "п'ятдесят", "шістдесят", "сімдесят" змінюють лише другу частину
      під час відмінювання.
    correct: true
    explanation: Перша частина (п'ят-, шіст-, сім-) завжди залишається незмінною.
  - statement: Після прийменника "понад" числівник завжди стоїть у родовому відмінку.
    correct: true
    explanation: 'Наприклад: понад двісті мільйонів.'
  - statement: Дробові числівники вимагають після себе іменника у називному відмінку
      множини.
    correct: false
    explanation: Дробові числівники вимагають іменника в родовому відмінку однини
      (дві цілі і чотири десяті відсотка).
  - statement: Форми орудного відмінка "п'ятьма" та "п'ятьома" є рівноправними та
      нормативними.
    correct: true
    explanation: Це варіантні нормативні форми, затверджені Державним стандартом.
  - statement: Вираз "у тисячі дев'ятсот дев'яностому році" є граматично правильним.
    correct: false
    explanation: 'Правильно: "у тисяча дев''ятсот...", адже перша частина порядкового
      числівника не змінюється.'
  - statement: Слово "відсоток" є питомо українським синонімом до запозиченого слова
      "процент".
    correct: true
    explanation: Обидва слова активно використовуються в сучасному діловому стилі.
  - statement: При відмінюванні числа "п'ятсот" змінюється лише його друга частина.
    correct: false
    explanation: 'Сотні мають внутрішню флексію: відмінюються обидві частини (наприклад,
      п''ятисот).'
  instruction: Визначте, чи твердження правильне.
- type: essay-response
  title: Фінансовий прогноз компанії
  prompt: Уявіть себе головним бухгалтером. Напишіть короткий фінансовий звіт (щонайменше
    150 слів) для керівництва компанії. Використовуйте складені кількісні та порядкові
    числівники (роки, бюджети, відсотки, кількість співробітників). Продемонструйте
    вміння відмінювати великі числа.
  min_words: 150
  model_answer: Шановне керівництво компанії! Маю честь представити вам фінансовий
    звіт за результатами нашої діяльності. У дві тисячі двадцять третьому році ми
    досягли значних успіхів. Загальний дохід склав понад вісімсот сорок п'ять мільйонів
    гривень, що на п'ятнадцять цілих і вісім десятих відсотка перевищує минулорічні
    показники. Ми розширили наш штат до чотирьохсот сімдесяти трьох співробітників,
    відкривши три нові філії в різних регіонах. У наступному, дві тисячі двадцять
    п'ятому році, ми плануємо інвестувати близько ста п'ятдесяти двох мільйонів гривень
    у розробку нових технологій. Завдяки оптимізації процесів наші витрати скоротилися
    щонайменше на шістнадцять відсотків. Я пишаюся нашими двомастами шістдесятьма
    п'ятьма успішно реалізованими проєктами, які зміцнили наші позиції на ринку. З
    огляду на ці показники, прогнозую стабільне зростання наших активів та збільшення
    долі ринку.
  rubric:
  - criteria: Кількісні числівники
    description: Правильне відмінювання всіх компонентів складених кількісних числівників.
    points: 4
  - criteria: Порядкові числівники
    description: Правильне відмінювання дат і років (зміна лише останнього слова).
    points: 3
  - criteria: Професійна лексика
    description: Використання економічної та статистичної лексики (відсотки, бюджет,
      компанія).
    points: 3
- type: quiz
  title: Оберіть правильну форму числівника
  items:
  - question: Як правильно сказати про відсутність суми в 450 гривень?
    explanation: У кількісних числівниках змінюються обидва слова. 400 у родовому
      відмінку — чотирьохсот.
    options:
    - text: чотирьохсот п'ятдесяти гривень
      correct: true
    - text: чотирьохста п'ятдесяти гривень
      correct: false
    - text: чотирьохсот п'ятдесят гривень
      correct: false
    - text: чотири сотні п'ятдесяти гривень
      correct: false
  - question: До якої форми відмінка належить словосполучення "шістдесятьома мільйонами"?
    explanation: Закінчення -ма та -ома (шістдесятьма/шістдесятьома) є маркерами орудного
      відмінка.
    options:
    - text: орудний відмінок
      correct: true
    - text: давальний відмінок
      correct: false
    - text: місцевий відмінок
      correct: false
    - text: родовий відмінок
      correct: false
  - question: Який варіант правильно позначає рік у реченні про народження?
    explanation: 'У порядкових числівниках відмінюється лише останнє слово: восьмому.'
    options:
    - text: у тисяча дев'ятсот дев'яносто восьмому році
      correct: true
    - text: у тисячі дев'ятсот дев'яносто восьмому році
      correct: false
    - text: у тисяча дев'ятсот дев'яносто вісім році
      correct: false
    - text: в тисячному дев'ятсот дев'яносто восьмому році
      correct: false
  - question: Як правильно прочитати дробове число 12,5 відсотка?
    explanation: 'Дробові числівники вимагають родового відмінка однини іменника:
      відсотка.'
    options:
    - text: дванадцять цілих і п'ять десятих відсотка
      correct: true
    - text: дванадцять і п'ять десятих відсотків
      correct: false
    - text: дванадцять цілих і п'ять десяті відсотка
      correct: false
    - text: дванадцять з половиною відсотків
      correct: false
  - question: Який прийменник вимагає після себе обов'язково родового відмінка?
    explanation: Слово-обмежувач "понад" вимагає родового відмінка (понад ста тисяч).
    options:
    - text: понад
      correct: true
    - text: майже
      correct: false
    - text: щонайменше
      correct: false
    - text: приблизно
      correct: false
  - question: З якою формою числівника іменник "гривня" ставиться в родовий відмінок
      множини?
    explanation: 'Після чисел 5-9 та 0 використовується родовий відмінок множини:
      сорок дев''ять гривень.'
    options:
    - text: сорок дев'ять
      correct: true
    - text: сорок вісім
      correct: false
    - text: сорок два
      correct: false
    - text: сорок один
      correct: false
  - question: Яка форма давального відмінка є правильною для числа 500?
    explanation: 'У сотнях у давальному відмінку правильне закінчення -стам: п''ятистам.'
    options:
    - text: п'ятистам
      correct: true
    - text: п'ятиста
      correct: false
    - text: п'ятьомстам
      correct: false
    - text: п'ятсот
      correct: false
  - question: Як правильно перекласти українською "almost 200 participants"?
    explanation: Слово "майже" не змінює відмінок, тому залишається знахідний або
      називний (двісті).
    options:
    - text: майже двісті учасників
      correct: true
    - text: майже двохсот учасників
      correct: false
    - text: близько двісті учасників
      correct: false
    - text: біля двохсот учасники
      correct: false
  - question: Як правильно відміняти число 40 у всіх непрямих відмінках?
    explanation: Числівник 40 в усіх непрямих відмінках має лише одну форму — сорока.
    options:
    - text: сорока
      correct: true
    - text: сорокам
      correct: false
    - text: сорокома
      correct: false
    - text: сороках
      correct: false
  - question: У якому реченні допущено грубу граматичну помилку під час відмінювання?
    explanation: 'Форми "вісімстот" не існує. Правильно: вісімсот.'
    options:
    - text: Витрати оцінюються у вісімстот тисяч гривень.
      correct: true
    - text: Звіт базується на ста сімдесяти двох сторінках.
      correct: false
    - text: Процес тривав понад п'ятдесят годин.
      correct: false
    - text: Ми поспілкувалися з трьомастами клієнтами.
      correct: false
  instruction: Оберіть правильну відповідь.
- type: fill-in
  title: Вставте правильну форму числівника
  items:
  - sentence: Бюджет компанії поповнився {answer} новими інвестиціями.
    answer: чотирмастами
    options:
    - чотирмастами
    - чотириста
    - чотирьохсот
    - чотирьохстам
    explanation: 'Орудний відмінок: (ким? чим?) чотирмастами.'
  - sentence: Конференція відбудеться у {answer} п'ятому році.
    answer: дві тисячі
    options:
    - дві тисячі
    - двох тисячах
    - двох тисяч
    - двом тисячам
    explanation: 'У порядкових числівниках перші слова не змінюються: дві тисячі.'
  - sentence: Компанія звітує про {answer} вісім мільйонів чистого прибутку.
    answer: шістдесят
    options:
    - шістдесят
    - шістдесяти
    - шістдесятьох
    - шістдесятьма
    explanation: 'Знахідний відмінок неодуховленого числа дорівнює називному: шістдесят.'
  - sentence: Дослідження проводилося серед {answer} сорока респондентів.
    answer: п'ятисот
    options:
    - п'ятисот
    - п'ятсот
    - п'ятистам
    - п'ятьмастами
    explanation: 'Після прийменника "серед" потрібен родовий відмінок: п''ятисот.'
  - sentence: Рівень інфляції зріс на двадцять цілих і три {answer} відсотка.
    answer: десяті
    options:
    - десяті
    - десятих
    - десята
    - десяту
    explanation: 'Знаменник дробу відмінюється як порядковий числівник жіночого роду
      в множині: три десяті.'
  - sentence: Ми задоволені {answer} п'ятьма новими контрактами.
    answer: вісімдесятьма
    options:
    - вісімдесятьма
    - вісімдесяти
    - вісімдесят
    - вісімдесятьох
    explanation: 'Орудний відмінок вимагає зміни обох компонентів складеного числа:
      вісімдесятьма п''ятьма.'
  - sentence: Документ знайдено на {answer} тридцять сьомій сторінці звіту.
    answer: двісті
    options:
    - двісті
    - двохсот
    - двомстам
    - двохстах
    explanation: Це складений порядковий числівник, тому "двісті" залишається в називному
      відмінку.
  - sentence: Протяжність нової траси становить близько ста {answer} кілометрів.
    answer: сорока
    options:
    - сорока
    - сорок
    - сорокам
    - сороках
    explanation: Слово "близько" вимагає родового відмінка, "сорок" змінюється на
      "сорока".
  - sentence: Цей економічний показник зріс {answer} ніж на двадцять відсотків.
    answer: більш
    options:
    - більш
    - понад
    - близько
    - майже
    explanation: Вираз "більш ніж на" поширений у статистиці для позначення зростання.
  - sentence: Відсутність {answer} тисяч гривень призвела до замороження проєкту.
    answer: семисот
    options:
    - семисот
    - сімсот
    - сімохсот
    - сімста
    explanation: Родовий відмінок числівника "сімсот" має форму семисот.
  instruction: Оберіть правильне слово для заповнення пропуску.
- type: unjumble
  title: Складіть речення з числівниками
  items:
  - words:
    - бюджет
    - цього
    - року
    - збільшився
    - на
    - сімдесят
    - п'ять
    - відсотків
    answer: Бюджет цього року збільшився на сімдесят п'ять відсотків
  - words:
    - у
    - дві
    - тисячі
    - двадцять
    - другому
    - році
    - наша
    - компанія
    - отримала
    - рекордний
    - прибуток
    answer: У дві тисячі двадцять другому році наша компанія отримала рекордний прибуток
  - words:
    - ми
    - пишаємося
    - трьомастами
    - вісімдесятьма
    - п'ятьма
    - успішно
    - завершеними
    - проєктами
    answer: Ми пишаємося трьомастами вісімдесятьма п'ятьма успішно завершеними проєктами
  - words:
    - населення
    - країни
    - становить
    - близько
    - сорока
    - мільйонів
    - громадян
    answer: Населення країни становить близько сорока мільйонів громадян
  - words:
    - новий
    - метод
    - аналізу
    - описаний
    - на
    - ста
    - сорока
    - восьми
    - сторінках
    - звіту
    answer: Новий метод аналізу описаний на ста сорока восьми сторінках звіту
  - words:
    - дослідження
    - охопило
    - понад
    - дев'ятсот
    - п'ятдесят
    - висококваліфікованих
    - фахівців
    - галузі
    answer: Дослідження охопило понад дев'ятсот п'ятдесят висококваліфікованих фахівців
      галузі
  - words:
    - вартість
    - будівництва
    - нового
    - заводу
    - оцінюється
    - у
    - вісімсот
    - мільйонів
    - гривень
    answer: Вартість будівництва нового заводу оцінюється у вісімсот мільйонів гривень
  - words:
    - головний
    - бухгалтер
    - представив
    - звіт
    - з
    - двадцятьма
    - п'ятьма
    - важливими
    - показниками
    answer: Головний бухгалтер представив звіт з двадцятьма п'ятьма важливими показниками
  - words:
    - наша
    - корпорація
    - співпрацює
    - з
    - п'ятьмастами
    - шістдесятьма
    - міжнародними
    - інвесторами
    answer: Наша корпорація співпрацює з п'ятьмастами шістдесятьма міжнародними інвесторами
  - words:
    - відстань
    - між
    - цими
    - двома
    - містами
    - дорівнює
    - чотирьомстам
    - двадцяти
    - кілометрам
    answer: Відстань між цими двома містами дорівнює чотирьомстам двадцяти кілометрам
  instruction: Розташуйте слова у правильному порядку.
- type: error-correction
  title: Виправте граматичні помилки у звітах
  items:
  - sentence: Компанія втратила понад триста п'ятдесят тисяч гривень.
    error: триста п'ятдесят
    answer: трьохсот п'ятдесяти
    options:
    - трьохсот п'ятдесяти
    - трьохста п'ятдесяти
    - триста п'ятдесяти
    - трьохсот п'ятдесят
    explanation: Після "понад" завжди вживається родовий відмінок.
  - sentence: У двох тисячах десятому році був підписаний важливий контракт.
    error: двох тисячах
    answer: дві тисячі
    options:
    - дві тисячі
    - двом тисячам
