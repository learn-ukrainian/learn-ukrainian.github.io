- type: fill-in
  title: 'Заповніть пропуски: Сталі вирази в контексті'
  instruction: 'Оберіть правильне слово для завершення фразеологізму.'
  items:
    - sentence: 'Я вже тричі пояснив тобі правила, годі морочити мені _____ і просто прочитай інструкцію.'
      answer: 'голову'
      options:
        - 'голову'
        - 'мозок'
        - 'думку'
        - 'пам''ять'
      explanation: 'Правильний соматизм — морочити голову.'
    - sentence: 'Він пообіцяв тримати _____ за зубами і нікому не розповідати про наш новий проєкт.'
      answer: 'язик'
      options:
        - 'слово'
        - 'язик'
        - 'секрет'
        - 'рот'
      explanation: 'Фізичне утримання язика метафорично означає мовчання.'
    - sentence: 'Коли почалася злива, нам довелося брати _____ в руки і бігти до найближчого укриття.'
      answer: 'ноги'
      options:
        - 'речі'
        - 'сумки'
        - 'ноги'
        - 'руки'
      explanation: 'Вираз "брати ноги в руки" означає швидко тікати.'
    - sentence: 'Після численних невдач на співбесідах він просто _____ рукою на пошук роботи в цій сфері.'
      answer: 'махнув'
      options:
        - 'вдарив'
        - 'кинув'
        - 'махнув'
        - 'підняв'
      explanation: 'Жест відмахування символізує відмову від наміру.'
    - sentence: 'Цей юрист на складанні міжнародних контрактів справжню _____ з''їв, йому можна довіряти.'
      answer: 'собаку'
      options:
        - 'кашу'
        - 'собаку'
        - 'кістку'
        - 'рибу'
      explanation: 'Зооморфізм "собаку з''їв" означає найвищий ступінь експертності.'
    - sentence: 'Не варто робити з _____ слона, це лише дрібна технічна помилка, яку ми швидко виправимо.'
      answer: 'мухи'
      options:
        - 'комара'
        - 'миші'
        - 'мухи'
        - 'пташки'
      explanation: 'Контраст між мухою і слоном створює ефект гіперболи.'
    - sentence: 'Нам треба більше фінансування, бо тих грошей, що виділили, вистачить як _____ наплакав.'
      answer: 'кіт'
      options:
        - 'пес'
        - 'кіт'
        - 'миша'
        - 'заєць'
      explanation: 'Сльози кота символізують нульову або мізерну кількість.'
    - sentence: 'Купувати вживане авто без перевірки на станції — це як купувати _____ в мішку.'
      answer: 'кота'
      options:
        - 'кота'
        - 'зайця'
        - 'мишу'
        - 'собаку'
      explanation: 'Цей вираз походить з ярмаркового шахрайства.'
    - sentence: 'Він сидів як _____ під віником, поки директор сварив керівників відділів за погані результати.'
      answer: 'миша'
      options:
        - 'миша'
        - 'кіт'
        - 'собака'
        - 'муха'
      explanation: 'Цей образ передає страх і бажання бути непомітним.'
    - sentence: 'Замість того, щоб працювати над звітом, він цілий день ходив офісом і продавав _____.'
      answer: 'витрішки'
      options:
        - 'усмішки'
        - 'витрішки'
        - 'погляди'
        - 'розмови'
      explanation: 'Цей колоквіалізм означає гавити час, безцільно споглядати.'

- type: unjumble
  title: 'Складіть речення: Відновіть правильний порядок'
  instruction: 'Розташуйте слова так, щоб утворити граматично правильні речення з ідіомами.'
  items:
    - words: ['досить', 'постійно', 'морочити', 'мені', 'голову', 'своїми', 'безглуздими', 'проблемами']
      answer: 'Досить постійно морочити мені голову своїми безглуздими проблемами'
    - words: ['на', 'переговорах', 'було', 'дуже', 'важливо', 'тримати', 'свій', 'язик', 'за', 'зубами']
      answer: 'На переговорах було дуже важливо тримати свій язик за зубами'
    - words: ['наш', 'новий', 'керівник', 'абсолютно', 'не', 'бачить', 'далі', 'свого', 'власного', 'носа']
      answer: 'Наш новий керівник абсолютно не бачить далі свого власного носа'
    - words: ['довелося', 'швидко', 'брати', 'ноги', 'в', 'руки', 'і', 'бігти', 'до', 'найближчого', 'укриття']
      answer: 'Довелося швидко брати ноги в руки і бігти до найближчого укриття'
    - words: ['він', 'на', 'цьому', 'складному', 'технічному', 'процесі', 'вже', 'справжню', 'собаку', 'з''їв']
      answer: 'Він на цьому складному технічному процесі вже справжню собаку з''їв'
    - words: ['журналісти', 'часто', 'люблять', 'робити', 'з', 'маленької', 'мухи', 'величезного', 'слона']
      answer: 'Журналісти часто люблять робити з маленької мухи величезного слона'
    - words: ['часу', 'на', 'виконання', 'цього', 'масштабного', 'проєкту', 'залишилося', 'як', 'кіт', 'наплакав']
      answer: 'Часу на виконання цього масштабного проєкту залишилося як кіт наплакав'
    - words: ['купувати', 'цей', 'старий', 'будинок', 'без', 'огляду', 'це', 'брати', 'кота', 'в', 'мішку']
      answer: 'Купувати цей старий будинок без огляду це брати кота в мішку'

- type: error-correction
  title: 'Виправте помилки: Інтерференція та суржик'
  instruction: 'Знайдіть помилку в реченні та оберіть правильний варіант, який відповідає українській нормі.'
  items:
    - sentence: 'Ми залишилися вдома, бо надворі дощ падає котами і собаками.'
      error: 'дощ падає котами і собаками'
      answer: 'ллє як з відра'
      error_type: 'phrase'
      options:
        - 'дощ падає котами і собаками'
        - 'ллє як з відра'
        - 'йде сильний дощ тваринами'
        - 'дощ дуже сильний котами'
      explanation: 'Англійська ідіома не перекладається дослівно. В українській мові використовується вираз "ллє як з відра".'
    - sentence: 'Студенти замість навчання цілий день ходили містом і продавали усмішки.'
      error: 'усмішки'
      answer: 'витрішки'
      options:
        - 'усмішки'
        - 'витрішки'
        - 'погляди'
        - 'очі'
      explanation: 'Правильний фразеологізм — "продавати витрішки" (гавити час).'
    - sentence: 'Ваша експертна думка грає величезне значення для нашої команди.'
      error: 'грає'
      answer: 'має'
      options:
        - 'грає'
        - 'має'
        - 'робить'
        - 'бере'
      explanation: 'Це помилка контамінації. Значення можна лише "мати" (мати значення), а роль — "відігравати".'
    - sentence: 'Цей інноваційний метод має ключову роль у нашому дослідженні.'
      error: 'має'
      answer: 'відіграє'
      options:
        - 'має'
        - 'відіграє'
        - 'робить'
        - 'грає'
      explanation: 'Роль можна лише "відігравати" (відігравати роль).'
    - sentence: 'Мій колега любить постійно тягнути мене за ногу своїми жартами.'
      error: 'тягнути мене за ногу'
      answer: 'морочити мені голову'
      error_type: 'phrase'
      options:
        - 'тягнути мене за ногу'
        - 'морочити мені голову'
        - 'тягнути мою руку'
        - 'бити мене по нозі'
      explanation: 'Калькування з англійської "pulling my leg". Український відповідник для заплутування — "морочити голову".'
    - sentence: 'Цей програміст на написанні коду справжню кішку з''їв.'
      error: 'кішку'
      answer: 'собаку'
      options:
        - 'кішку'
        - 'собаку'
        - 'мишу'
        - 'муху'
      explanation: 'Експертність виражається ідіомою "собаку з''їв".'
    - sentence: 'Він такий наївний, що не бачить далі своїх вух.'
      error: 'вух'
      answer: 'носа'
      options:
        - 'вух'
        - 'носа'
        - 'очей'
        - 'рук'
      explanation: 'Світоглядна обмеженість передається соматизмом "не бачити далі свого носа".'
    - sentence: 'Не хвилюйся, ти просто робиш з комара слона.'
      error: 'комара'
      answer: 'мухи'
      options:
        - 'комара'
        - 'мухи'
        - 'пташки'
        - 'миші'
      explanation: 'Гіпербола в українській мові будується на контрасті мухи та слона.'

- type: select
  title: 'Оберіть правильні відповіді: Аналіз контекстів'
  instruction: 'Уважно прочитайте запитання та оберіть УСІ правильні варіанти.'
  items:
    - question: 'Які з цих фразеологізмів описують поведінку людини в стресовій або конфліктній ситуації?'
      min_correct: 2
      options:
        - text: 'сидіти як миша під віником'
          correct: true
        - text: 'продавати витрішки'
          correct: false
        - text: 'брати ноги в руки'
          correct: true
        - text: 'собаку з''їв'
          correct: false
    - question: 'Які вирази належать до групи соматизмів (містять назви частин тіла)?'
      min_correct: 3
      options:
        - text: 'морочити голову'
          correct: true
        - text: 'махнути рукою'
          correct: true
        - text: 'як кіт наплакав'
          correct: false
        - text: 'тримати язик за зубами'
          correct: true
    - question: 'Оберіть фразеологізми, які мають яскраво виражений неофіційний, розмовний регістр.'
      min_correct: 3
      options:
        - text: 'відігравати роль'
          correct: false
        - text: 'собаку з''їв'
          correct: true
        - text: 'морочити голову'
          correct: true
        - text: 'як кіт наплакав'
          correct: true
    - question: 'Які дієслова можуть поєднуватися зі словом "значення" в українській мові?'
      min_correct: 2
      options:
        - text: 'мати'
          correct: true
        - text: 'набувати'
          correct: true
        - text: 'відігравати'
          correct: false
        - text: 'грати'
          correct: false
    - question: 'Оберіть ідіоми, що виникли на основі спостережень за тваринами.'
      min_correct: 3
      options:
        - text: 'купувати кота в мішку'
          correct: true
        - text: 'робити з мухи слона'
          correct: true
        - text: 'на чужий коровай очей не поривай'
          correct: false
        - text: 'собаку з''їв'
          correct: true
    - question: 'Які з цих ситуацій можна описати виразом "махнути рукою"?'
      min_correct: 2
      options:
        - text: 'Студент перестав готуватися до іспиту після трьох невдалих спроб.'
          correct: true
        - text: 'Вчитель відмовився від ідеї навчити учня, який постійно ігнорує завдання.'
          correct: true
        - text: 'Водій швидко поїхав на зелене світло світлофора.'
          correct: false
        - text: 'Клієнт уважно вивчає кожну деталь контракту.'
          correct: false
    - question: 'Які з цих слів є правильними компонентами виразу "на чужий коровай..."?'
      min_correct: 2
      options:
        - text: 'очей'
          correct: true
        - text: 'не поривай'
          correct: true
        - text: 'рук'
          correct: false
        - text: 'не дивися'
          correct: false
    - question: 'Які вирази вказують на малу кількість або відсутність чогось?'
      min_correct: 2
      options:
        - text: 'як кіт наплакав'
          correct: true
        - text: 'не бачити далі свого носа'
          correct: false
        - text: 'досвіду катма'
          correct: true
        - text: 'ллє як з відра'
          correct: false

- type: translate
  title: 'Переклад: Знайдіть функціональний еквівалент'
  instruction: 'Оберіть правильний український переклад, який передає сенс, а не буквальне значення англійського виразу.'
  items:
    - source: 'Stop bothering me with these silly questions!'
      options:
        - text: 'Досить морочити мені голову цими запитаннями!'
          correct: true
        - text: 'Зупинись турбувати мене цими запитаннями!'
          correct: false
        - text: 'Не тягни мене за ногу цими запитаннями!'
          correct: false
        - text: 'Не бач далі носа з цими запитаннями!'
          correct: false
    - source: 'He knows this software inside out; he is a real expert.'
      options:
        - text: 'Він знає цю програму всередині і ззовні; він експерт.'
          correct: false
        - text: 'Він на цій програмі собаку з''їв.'
          correct: true
        - text: 'Він на цій програмі зробив слона з мухи.'
          correct: false
        - text: 'Він має значення для цієї програми.'
          correct: false
    - source: 'We have very little time left before the deadline.'
      options:
        - text: 'У нас залишилося часу як кіт наплакав до дедлайну.'
          correct: true
        - text: 'Ми маємо дуже маленький час до дедлайну.'
          correct: false
        - text: 'У нас часу як миша під віником.'
          correct: false
        - text: 'Час відіграє роль до дедлайну.'
          correct: false
    - source: 'You are just exaggerating the problem.'
      options:
        - text: 'Ти просто перебільшуєш проблему.'
          correct: false
        - text: 'Ти просто робиш з мухи слона.'
          correct: true
        - text: 'Ти робиш велику проблему.'
          correct: false
        - text: 'Ти купуєш кота в мішку.'
          correct: false
      explanation: 'Ідіоматичний еквівалент — робити з мухи слона.'
    - source: 'You must keep this a secret.'
      options:
        - text: 'Ти мусиш тримати язик за зубами.'
          correct: true
        - text: 'Ти мусиш зберігати цей секрет.'
          correct: false
        - text: 'Ти мусиш ховати інформацію.'
          correct: false
        - text: 'Ти мусиш сидіти під віником.'
          correct: false
    - source: 'It is raining cats and dogs outside.'
      options:
        - text: 'Надворі падає дощ котами і собаками.'
          correct: false
        - text: 'Надворі ллє як з відра.'
          correct: true
        - text: 'Надворі дуже сильний дощ тварин.'
          correct: false
        - text: 'Надворі сильна погода.'
          correct: false
    - source: 'He gave up on trying to fix the old car.'
      options:
        - text: 'Він махнув рукою на спроби полагодити стару машину.'
          correct: true
        - text: 'Він відмовився пробувати фіксувати машину.'
          correct: false
        - text: 'Він кинув руку на машину.'
          correct: false
        - text: 'Він узяв ноги в руки через машину.'
          correct: false
    - source: 'Don''t buy a pig in a poke.'
      options:
        - text: 'Не купуй свиню в мішку.'
          correct: false
        - text: 'Не купуй кота в мішку.'
          correct: true
        - text: 'Не бери речі всліпу.'
          correct: false
        - text: 'Не дивись на чужий коровай.'
          correct: false

- type: cloze
  title: 'Заповніть пропуски: Розповідь Казкаря'
  instruction: 'Оберіть правильні слова для відновлення тексту.'
  passage: |
    Вчора зустрів свого знайомого. Він довго розповідав мені про свої проблеми і так почав {{1}} голову, що я ледь не {{2}} рукою на нашу розмову. Він скаржився, що його бізнес іде погано, прибутків як {{3}} наплакав, а податкова {{4}} величезну роль у його невдачах. Я йому кажу: "Слухай, не треба робити з {{5}} слона. Ти просто купив {{6}} в мішку, коли підписав той контракт. Треба було спитати юриста, який на цьому {{7}} з'їв." А він лише ображається. Такі люди часто не бачать далі свого {{8}} і вважають себе найрозумнішими. Я вирішив тримати {{9}} за зубами і більше нічого не радити. Хай сам вирішує. Іноді краще сидіти як {{10}} під віником, ніж доводити щось людині, яка не хоче слухати. Головне пам'ятати: на чужий {{11}} очей не поривай, а своє роби якісно. Тоді не доведеться брати {{12}} в руки і тікати від кредиторів. Сучасний {{13}} вимагає постійного {{14}} ризиків. Треба розуміти кожне {{15}} у контракті, а не просто продавати {{16}} в офісі.
  blanks:
    - id: 1
      answer: 'морочити'
      options: ['морочити', 'крутити', 'ламати', 'сушити']
    - id: 2
      answer: 'махнув'
      options: ['вдарив', 'махнув', 'кинув', 'підняв']
    - id: 3
      answer: 'кіт'
      options: ['кіт', 'пес', 'миша', 'пташка']
    - id: 4
      answer: 'відіграє'
      options: ['грає', 'відіграє', 'має', 'робить']
    - id: 5
      answer: 'мухи'
      options: ['комара', 'мухи', 'бджоли', 'миші']
    - id: 6
      answer: 'кота'
      options: ['собаку', 'кота', 'свиню', 'зайця']
    - id: 7
      answer: 'собаку'
      options: ['собаку', 'кішку', 'мишу', 'кашу']
    - id: 8
      answer: 'носа'
      options: ['носа', 'вуха', 'ока', 'рота']
    - id: 9
      answer: 'язик'
      options: ['рот', 'зуби', 'язик', 'слова']
    - id: 10
      answer: 'миша'
      options: ['миша', 'кішка', 'муха', 'собака']
    - id: 11
      answer: 'коровай'
      options: ['хліб', 'пиріг', 'коровай', 'торт']
    - id: 12
      answer: 'ноги'
      options: ['речі', 'руки', 'ноги', 'гроші']
    - id: 13
      answer: 'процес'
      options: ['процес', 'термін', 'метод', 'синтез']
    - id: 14
      answer: 'аналізу'
      options: ['синтезу', 'аналізу', 'методу', 'поняття']
    - id: 15
      answer: 'поняття'
      options: ['термін', 'поняття', 'процес', 'метод']
    - id: 16
      answer: 'витрішки'
      options: ['усмішки', 'витрішки', 'товари', 'очі']

- type: group-sort
  title: 'Розподіліть за групами: Соматизми та Зооморфізми'
  instruction: 'Класифікуйте сталі вирази за їхнім походженням (частини тіла чи тварини).'
  groups:
    - name: 'Соматизми (частини тіла)'
      items:
        - 'морочити голову'
        - 'тримати язик за зубами'
        - 'не бачити далі свого носа'
        - 'брати ноги в руки'
        - 'махнути рукою'
    - name: 'Зооморфізми (тварини)'
      items:
        - 'собаку з''їв'
        - 'робити з мухи слона'
        - 'як кіт наплакав'
        - 'купувати кота в мішку'
        - 'сидіти як миша під віником'