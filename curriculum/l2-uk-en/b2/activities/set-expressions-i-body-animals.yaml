- type: reading
  id: reading-kazkar
  title: 'Джерело: Розповідь Казкаря про бізнес'
  instruction: 'Прочитайте уривок та дайте відповіді на запитання.'
  text: |
    Знаєте, молодь зараз дуже поспішає жити. От мій сусід, Василь, вирішив відкрити власну кав'ярню. Він, чесно кажучи, у бізнесі новачок, досвіду в нього як кіт наплакав, але амбіцій — хоч відбавляй. Я йому одразу сказав: Василю, не варто купувати кота в мішку, спочатку розберися з документами, бо податкова потім буде тобі морочити голову так, що світу білого не побачиш. А він що? Лише махнув рукою і сказав, що я просто не бачу далі свого носа і нічого не розумію в сучасних трендах.
    Пройшов місяць. Приходжу я до нього, а він сидить у порожньому залі і ледь не плаче. Виявилося, що постачальники його підвели, обладнання не працює. Я міг би йому сказати: А я ж попереджав!, міг би робити з мухи слона, розповідаючи, який це провал. Але я вирішив тримати язик за зубами, бо хлопцю і так непереливки. Замість цього я подзвонив своєму старому другу, який на ресторанному бізнесі собаку з'їв. Той приїхав, подивився на все це, сказав Василю брати ноги в руки і їхати за новими договорами. І знаєте що? Справи пішли вгору. А Василь нарешті зрозумів старе правило: на чужий коровай очей не поривай, а свій бізнес будуй з розумом і повагою до досвіду.
  tasks:
    - 'Чому Казкар спочатку радив Василю не поспішати з відкриттям бізнесу?'
    - 'Як відреагував Василь на перші поради свого сусіда?'
    - 'Чому оповідач вирішив не критикувати Василя після його першої невдачі?'
    - 'Який головний урок виніс молодий підприємець із цієї ситуації?'

- type: essay-response
  title: 'Есе: Досвід та амбіції'
  instruction: 'Напишіть розгорнуту відповідь, використовуючи фразеологізми.'
  source_reading: reading-kazkar
  prompt: 'Проаналізуйте поведінку Василя з розповіді Казкаря. Чому молоді підприємці часто ігнорують поради досвідчених людей? Використайте у своєму есе щонайменше три фразеологізми з тексту.'
  min_words: 150
  model_answer: 'Поведінка Василя є типовою для багатьох молодих підприємців, які мають великі амбіції, але їхній реальний досвід — як кіт наплакав. Вони часто вважають, що старше покоління не бачить далі свого носа і не розуміє сучасних реалій. Проте, ігноруючи поради, новачки ризикують купити кота в мішку. Коли стається криза, замість того, щоб панікувати і робити з мухи слона, краще звернутися до людини, яка на цій справі собаку з''їла. Василь вчасно зрозумів свою помилку, перестав морочити голову собі та іншим, і почав діяти раціонально.'
  rubric:
    - criteria: 'Використання фразеології'
      description: 'Правильно та доречно вжито щонайменше три вирази з тексту'
      points: 5
    - criteria: 'Аналіз ситуації'
      description: 'Логічно розкрито причини поведінки молодих підприємців'
      points: 5

- type: true-false
  title: 'Правда чи хиба: Значення ідіом'
  instruction: 'Визначте, чи правильним є тлумачення фразеологізму.'
  items:
    - statement: 'Вираз "морочити голову" означає думати про щось дуже холодне.'
      correct: false
      explanation: 'Цей вираз означає плутати когось, набридати безглуздими розмовами.'
    - statement: 'Людина, яка "тримає язик за зубами", вміє зберігати таємниці.'
      correct: true
      explanation: 'Це метафора утримання від розголошення інформації.'
    - statement: 'Ідіома "не бачити далі свого носа" описує людину з поганим зором.'
      correct: false
      explanation: 'Це переносна характеристика людини з обмеженим світоглядом або егоїста.'
    - statement: 'Якщо ви "махнули рукою" на справу, ви відмовилися від неї.'
      correct: true
      explanation: 'Цей жест символізує зневіру та припинення зусиль.'
    - statement: 'Вираз "брати ноги в руки" означає займатися спортивною гімнастикою.'
      correct: false
      explanation: 'Він означає необхідність діяти дуже швидко, поспішати або тікати.'
    - statement: 'Людина, яка "собаку з''їла" на чомусь, є великим експертом у цій сфері.'
      correct: true
      explanation: 'Цей вираз описує набуття величезного досвіду через подолання перешкод.'
    - statement: 'Фразеологізм "робити з мухи слона" означає перебільшувати масштаб проблеми.'
      correct: true
      explanation: 'Це класичний приклад гіперболізації в українській мові.'
    - statement: 'Коли грошей "як кіт наплакав", це означає, що їх дуже багато.'
      correct: false
      explanation: 'Коти не плачуть, тому ця ідіома означає критично малу кількість чогось.'
    - statement: 'Англійський вираз "it is raining cats and dogs" перекладається як "ллє як з відра".'
      correct: true
      explanation: 'Це правильний український функціональний відповідник для сильної зливи.'
    - statement: 'Правильно говорити "грати велике значення" замість "мати велике значення".'
      correct: false
      explanation: 'Це помилка контамінації. Правильно: "відігравати роль" або "мати значення".'

