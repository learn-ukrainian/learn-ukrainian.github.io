    збору даних дослідники часто {{6}} аналізу великі масиви інформації. Дуже важливо
    не порушувати {{7}} та уникати такого явища, як {{8}}. Коли {{9}} дослідження
    готові, автор має здійснити теоретичний {{10}} і лише після цього {{11}} висновку.
    Статтю з результатами відправляють у журнал, де відбувається процес {{12}}. Якщо
    {{13}} дасть позитивний відгук, роботу буде опубліковано. Важливо пам''ятати,
    що науковий {{14}} відрізняється від розмовного: тут кожне нове {{15}} вимагає
    чіткого {{16}}.

    '
