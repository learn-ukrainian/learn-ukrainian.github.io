- type: reading
  id: reading-01
  title: 'Текст: Роль науки в суспільстві'
  instruction: Прочитайте уривок та дайте відповіді на запитання.
  text: 'Сучасна наука давно вийшла за межі ізольованих академічних інститутів. Сьогодні
    результати досліджень безпосередньо впливають на рівень життя, національну безпеку
    та економічний розвиток держави. В умовах глобальних криз та військових конфліктів
    роль науковця стає ще більш значущою, оскільки саме інтелектуальний потенціал
    дозволяє знаходити швидкі та інноваційні рішення для захисту суспільства.

    '
  tasks:
  - Про що йдеться в цьому тексті?
  - Як сучасна наука впливає на суспільство?
  - Чому роль науковця зростає під час криз?
- type: essay-response
  title: 'Есе: Українська наука в умовах війни'
  source_reading: reading-01
  instruction: Напишіть есе на задану тему, спираючись на прочитаний текст.
  prompt: Проаналізуйте, як повномасштабна війна вплинула на розвиток української
    науки та пріоритети дослідників. Наведіть конкретні приклади.
  min_words: 150
  model_answer: В умовах повномасштабної війни українська наука зіткнулася з безпрецедентними
    викликами, але водночас продемонструвала дивовижну стійкість та здатність до адаптації.
    Багато науково-дослідних інститутів, особливо на сході та півдні України, зазнали
    значних руйнувань внаслідок бойових дій. Унікальні лабораторії, колекції та надсучасне
    обладнання довелося терміново евакуювати у безпечніші регіони. Незважаючи на постійні
    повітряні тривоги та проблеми з електропостачанням, процес дослідження не зупинився.
    Пріоритети багатьох вчених радикально змінилися. Замість чисто теоретичних пошуків,
    дослідники зосередилися на розв'язанні нагальних практичних завдань, які рятують
    життя. Інженери проектують нові розвідувальні дрони, програмісти створюють захищені
    системи зв'язку на основі штучного інтелекту, а медики вдосконалюють технології
    польової хірургії та турнікетів. Таким чином, результати дослідження сьогодні
    — це прямий внесок у виживання держави. Українські науковці доводять, що навіть
    у найтемніші часи інтелект залишається потужною зброєю, яка допомагає боротися
    за свободу та незалежність, продовжуючи кращі традиції таких видатних постатей,
    як Вернадський чи Патон.
  rubric:
  - criteria: Зміст
    description: Тема розкрита повністю, наведені релевантні приклади щодо пріоритетів
      науки під час війни.
    points: 10
- type: true-false
  title: 'Правда чи хиба: Наукова етика та термінологія'
  items:
  - statement: Національна академія наук України була заснована у тисяча дев'ятсот
      вісімнадцятому році.
    correct: true
    explanation: Так, НАН України заснували за часів гетьмана Павла Скоропадського
      у 1918 році.
  - statement: Володимир Вернадський був першим президентом Української академії наук.
    correct: true
    explanation: Вернадський став першим президентом Академії та ввів поняття Ноосфери.
  - statement: Слово 'науковець' має пасивний відтінок порівняно зі словом 'вчений'.
    correct: false
    explanation: Навпаки, 'науковець' підкреслює активну діяльність, тоді як 'вчений'
      має більш пасивний відтінок.
  - statement: Структура IMRAD розшифровується як Introduction, Methods, Results,
      and Discussion.
    correct: true
    explanation: Це універсальний міжнародний стандарт для структурування наукових
      статей.
  - statement: В українській мові правильно казати 'в якості науковця'.
    correct: false
    explanation: Правильно казати 'як науковець'. 'В якості' є калькою з російської
      мови.
  - statement: Об'єкт дослідження — це вузька специфічна частина ширшого явища, яку
      вивчає науковець.
    correct: false
    explanation: Вузька частина — це предмет дослідження, а об'єкт — це ширше явище
      або процес.
  - statement: Сліпе рецензування означає, що рецензенти не знають імені автора, а
      автор — імен рецензентів.
    correct: true
    explanation: Це гарантує об'єктивність оцінювання наукової статті.
  - statement: Академічний стиль вітає використання дієслів пасивного стану замість
      активного.
    correct: false
    explanation: Сучасний академічний стиль надає перевагу активному стану для більшої
      чіткості.
  - statement: Дієслово 'зустрічатися' є стилістично правильним для фрази 'у тексті
      зустрічаються помилки'.
    correct: false
    explanation: Для неживих предметів та явищ слід використовувати дієслово 'траплятися'
      ('трапляються помилки').
  - statement: Словосполучення 'дисертаційне дослідження' є плеоназмом, якого варто
      уникати.
    correct: true
    explanation: Слово 'дисертація' вже містить у собі поняття дослідження, тому додавати
      це слово зайве.
  instruction: Визначте, чи твердження правильне.
- type: quiz
  title: 'Перевірка знань: Академічний стиль та наука'
  items:
  - question: Який видатний український вчений є автором концепції про перехід біосфери
      у ноосферу?
    options:
    - text: Володимир Вернадський
      correct: true
    - text: Борис Патон
      correct: false
    - text: Ігор Сікорський
      correct: false
    - text: Віктор Глушков
      correct: false
    explanation: Володимир Вернадський розробив вчення про біосферу та її перехід
      у сферу розуму — ноосферу.
  - question: Що означає процес теоретичного синтезу під час проведення наукового
      дослідження?
    options:
    - text: Об'єднання розрізнених елементів та властивостей в єдине ціле для розуміння
        картини.
      correct: true
    - text: Уявне або фактичне розкладання цілого об'єкта на окремі складові частини.
      correct: false
    - text: Формулювання гіпотези до початку проведення лабораторного експерименту.
      correct: false
    - text: Детальне документування кожного кроку під час збору емпіричних даних.
      correct: false
    explanation: Синтез — це процес, зворотний до аналізу, коли розрізнені елементи
      об'єднуються в єдине ціле.
  - question: Яке з наведених дієслів найкраще підходить для заміни неправильного
      вживання слова 'зустрічатися' щодо помилок?
    options:
    - text: траплятися
      correct: true
    - text: бачитися
      correct: false
    - text: перетинатися
      correct: false
    - text: знаходитися
      correct: false
    explanation: Правильно казати 'помилки трапляються', адже неживі предмети не можуть
      зустрічатися.
  - question: У якому розділі наукової статті за форматом IMRAD відбувається детальне
      обговорення отриманих результатів?
    options:
    - text: Discussion (Обговорення)
      correct: true
    - text: Introduction (Вступ)
      correct: false
    - text: Methods (Методи)
      correct: false
    - text: Results (Результати)
      correct: false
    explanation: Обговорення (Discussion) — це розділ, де автор пояснює значення отриманих
      цифр та співвідносить їх із гіпотезою.
  - question: Як правильно сказати українською мовою, коли ви берете участь у проєкті
      в певній ролі?
    options:
    - text: Як експерт
      correct: true
    - text: В якості експерта
      correct: false
    - text: Будучи експертом
      correct: false
    - text: У ролі експерта
      correct: false
    explanation: Українська мова вимагає використання сполучника 'як', конструкція
      'в якості' є калькою.
  - question: Який вищий науковий ступінь можна отримати після того, як науковець
      зробив новаторський внесок у науку?
    options:
    - text: Доктор наук
      correct: true
    - text: Бакалавр
      correct: false
    - text: Магістр
      correct: false
    - text: Доктор філософії
      correct: false
    explanation: Доктор наук — це вищий науковий ступінь, що вимагає вагомого внеску
      в галузь.
  - question: Що таке об'єкт дослідження під час написання короткої інформативної
      анотації до статті?
    options:
    - text: Широка сфера, процес або явище реальності, на які спрямована загальна
        увага дослідника.
      correct: true
    - text: Очікуваний кінцевий результат роботи, якого науковець планує досягти.
      correct: false
    - text: Вузька, специфічна частина або властивість явища, яку автор безпосередньо
        вивчає.
      correct: false
    - text: Вигадана теоретична концепція, що існує лише в уяві автора наукової праці.
      correct: false
    explanation: Об'єкт дослідження — це загальне явище або процес, що існує незалежно
      від науковця.
  - question: Яким словом-хеджером найдоречніше скористатися, щоб обережно висловити
      власне припущення в дискусії?
    options:
    - text: Ймовірно
      correct: true
    - text: Беззаперечно
      correct: false
    - text: Точно
      correct: false
    - text: Обов'язково
      correct: false
    explanation: Слово 'ймовірно' пом'якшує твердження, що є ознакою професійного
      академічного спілкування.
  - question: Чому використання виразу 'спільна співпраця' вважається стилістичною
      та лексичною помилкою?
    options:
    - text: Це типовий плеоназм, адже слово співпраця вже означає спільну діяльність.
      correct: true
    - text: Цей вираз є грубим запозиченням з російської мови та порушує норми граматики.
      correct: false
    - text: Слово співпраця стосується лише бізнесу, а не наукового середовища.
      correct: false
    - text: Така конструкція порушує правила побудови речень у пасивному стані.
      correct: false
    explanation: Плеоназм — це надлишкове використання слів (як 'масляне масло').
      Співпраця не може бути не спільною.
  - question: Яка інституція вважається найвищою державною науковою організацією в
      сучасній Україні?
    options:
    - text: Національна академія наук України
      correct: true
    - text: Міністерство освіти і науки
      correct: false
    - text: Київський національний університет
      correct: false
    - text: Інститут електрозварювання
      correct: false
    explanation: НАН України є головною науково-дослідною установою, що об'єднує інститути
      по всій країні.
