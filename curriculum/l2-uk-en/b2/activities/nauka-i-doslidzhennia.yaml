  instruction: Заповніть пропуски, обравши правильні слова.
- type: error-correction
  title: Виправте стилістичні та лексичні помилки
  items:
  - sentence: Він працює в інституті в якості старшого дослідника.
    error: в якості
    answer: як
    error_type: word
    options:
    - як
    - в ролі
    - ніби
    - у вигляді
    explanation: Конструкція 'в якості' є калькою з російської мови. Правильно казати
      'як'.
  - sentence: У його дисертаційному дослідженні зустрічаються серйозні недоліки.
    error: зустрічаються
    answer: трапляються
    error_type: word
    options:
    - трапляються
    - бачаться
    - знаходяться
    - появляються
    explanation: Неживі предмети (недоліки) не можуть 'зустрічатися'. Вони 'трапляються'.
  - sentence: Нами було проведено глибокий аналіз цього історичного явища.
    error: Нами було проведено
    answer: Ми провели
    error_type: phrase
    options:
    - Ми провели
    - Було проведене нами
    - Проведено нами було
    - Аналіз проведено
    explanation: Академічний стиль вітає використання дієслів активного стану ('ми
      провели') замість пасивного.
  - sentence: Наступним етапом буде спільна співпраця між університетами.
    error: спільна співпраця
    answer: співпраця
    error_type: phrase
    options:
    - співпраця
    - разом співпраця
    - спільна робота
    - спільний труд
    explanation: Це типовий плеоназм ('масляне масло'). Співпраця вже означає спільну
      діяльність.
  - sentence: Автор зміг успішно доказати свою першу гіпотезу.
    error: доказати
    answer: довести
    error_type: word
    options:
    - довести
    - показати
    - сказати
    - вказати
    explanation: В українській мові теореми та гіпотези 'доводять', а не 'доказують'.
  - sentence: Для цього нам треба приміняти новий експериментальний метод.
    error: приміняти
    answer: застосувати
    error_type: word
    options:
    - застосувати
    - прийняти
    - взяти
    - використати
    explanation: Слово 'приміняти' є калькою. Правильно — 'застосувати метод'.
  - sentence: Тема мого дисертаційного дослідження стосується новітньої історії.
    error: дисертаційного дослідження
    answer: дисертації
    error_type: phrase
    options:
    - дисертації
    - дисертаційного твору
    - наукової дисертації
    - дослідницької дисертації
    explanation: Слово 'дисертація' вже означає наукову працю, тому додавати 'дослідження'
      зайве.
  - sentence: Вчені завжди приходять до висновку після експерименту.
    error: приходять до
    answer: доходять
    error_type: phrase
    options:
    - доходять
    - доходять до
    - роблять до
    - складають
    explanation: Правильна академічна колокація в українській мові — 'дійти висновку'
      (або 'доходити висновку').
  instruction: Знайдіть і виправте помилку в реченні.
- type: select
  title: Оберіть усі правильні варіанти
  items:
  - question: Які слова є синонімами або пов'язані з процесом створення нових знань?
    options:
    - text: Дослідження
      correct: true
    - text: Відпочинок
      correct: false
    - text: Експеримент
      correct: true
    - text: Аналіз
      correct: true
    - text: Розвага
      correct: false
    min_correct: 3
    explanation: Дослідження, експеримент та аналіз — базові процеси наукової діяльності.
  - question: Оберіть розділи, що входять до стандартної міжнародної структури IMRAD.
    options:
    - text: Методи (Methods)
      correct: true
    - text: Емоції (Emotions)
      correct: false
    - text: Вступ (Introduction)
      correct: true
    - text: Обговорення (Discussion)
      correct: true
    - text: Біографія (Biography)
      correct: false
    min_correct: 3
    explanation: Структура IMRAD складається із Вступу, Методів, Результатів та Обговорення.
  - question: Які з цих термінів є правильними науковими ступенями та вченими званнями
      в Україні?
    options:
    - text: Доктор філософії
      correct: true
    - text: Головний мислитель
      correct: false
    - text: Доцент
      correct: true
    - text: Професор
      correct: true
    - text: Старший учень
      correct: false
    min_correct: 3
    explanation: Доктор філософії — науковий ступінь; доцент і професор — вчені звання.
  - question: Які фрази підходять для обережного висловлення припущень (hedging)?
    options:
    - text: Цілком імовірно, що...
      correct: true
    - text: Це абсолютна брехня, що...
      correct: false
    - text: Можна припустити, що...
      correct: true
    - text: Я на сто відсотків впевнений, що...
      correct: false
    - text: За нашими даними...
      correct: true
    min_correct: 3
    explanation: Hedging вимагає пом'якшення ('ймовірно', 'припустити', 'за даними'),
      а не абсолютної категоричності.
  - question: Що вважається грубим порушенням академічної доброчесності?
    options:
    - text: Плагіат
      correct: true
    - text: Цитування колег
      correct: false
    - text: Фальсифікація даних
      correct: true
    - text: Сліпе рецензування
      correct: false
    - text: Самоплагіат
      correct: true
    min_correct: 3
    explanation: Плагіат, фальсифікація та використання власних старих робіт (самоплагіат)
      є серйозними порушеннями.
  - question: Які з цих дієслів часто вживаються зі словом 'гіпотеза'?
    options:
    - text: Висунути
      correct: true
    - text: Спростувати
      correct: true
    - text: З'їсти
      correct: false
    - text: Підтвердити
      correct: true
    - text: Намалювати
      correct: false
    min_correct: 3
    explanation: Гіпотезу можна висунути, а потім, у ході дослідження, підтвердити
      або спростувати.
  - question: Оберіть ознаки, що характеризують саме академічний стиль.
    options:
    - text: Емоційна забарвленість
      correct: false
    - text: Об'єктивність
      correct: true
    - text: Точність термінології
      correct: true
    - text: Логічна послідовність
      correct: true
    - text: Використання сленгу
      correct: false
    min_correct: 3
    explanation: Академічний текст завжди об'єктивний, логічний і використовує точну
      термінологію.
  - question: Кого з цих видатних осіб згадують як фундаторів та лідерів української
      науки?
    options:
    - text: Володимир Вернадський
      correct: true
    - text: Борис Патон
      correct: true
    - text: Ігор Сікорський
      correct: true
    - text: Тарас Шевченко
      correct: false
    - text: Леся Українка
      correct: false
    min_correct: 3
    explanation: Вернадський, Патон та Сікорський згадуються у модулі як титани науки
      та інженерії.
  instruction: Оберіть усі правильні відповіді.
