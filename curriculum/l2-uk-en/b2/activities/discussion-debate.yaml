- type: reading
  title: 'Аналіз тексту: Правила дебатів'
  instruction: 'Прочитайте текст та дайте відповіді на запитання.'
  text: 'У сучасному демократичному суспільстві вміння вести конструктивний діалог є ключовою навичкою. Коли політики виходять на дебати, вони мають пам''ятати про етикет незгоди. По-перше, категоричні фрази на кшталт "я не згоден" варто замінювати на "дозвольте не погодитися". По-друге, замість емоційної суперечки учасники повинні будувати залізні аргументи: від чіткої тези через надійні докази до логічного висновку. Модератор уважно стежить за тим, щоб ніхто не порушував регламент і не перебивав співрозмовника. Отже, плідна дискусія можлива лише за умови взаємної поваги та глибокого аналізу.'
  tasks:
    - 'Чому категоричну фразу "я не згоден" рекомендують уникати у формальних дебатах?'
    - 'З яких трьох елементів складається ідеальний аргумент?'
    - 'Яку головну функцію виконує модератор під час політичної дискусії?'
    - 'Що є необхідною умовою для того, щоб дискусія була плідною та конструктивною?'

- type: quiz
  title: 'Перевірте знання: Формати комунікації та лексика'
  instruction: 'Оберіть одну правильну відповідь на кожне запитання.'
  items:
    - question: 'Який формат спілкування має змагальний характер і суворі правила?'
      explanation: 'Дебати завжди мають чітко виражений змагальний характер та регламент.'
      options:
        - text: 'дебати'
          correct: true
        - text: 'суперечка'
          correct: false
        - text: 'дискусія'
          correct: false
        - text: 'діалог'
          correct: false
    - question: 'Як правильно висловити власну позицію українською мовою?'
      explanation: 'Дієслово "вважати" використовується для висловлення думки, а "рахувати" — для цифр.'
      options:
        - text: 'я вважаю, що'
          correct: true
        - text: 'я рахую, що'
          correct: false
        - text: 'я думаю про те'
          correct: false
        - text: 'я суджу, що'
          correct: false
    - question: 'Яке дієслово слід використовувати для опису продуктивного обміну аргументами?'
      explanation: 'Нормативне літературне дієслово — "сперечатися".'
      options:
        - text: 'сперечатися'
          correct: true
        - text: 'спорити'
          correct: false
        - text: 'сваритися'
          correct: false
        - text: 'доказувати'
          correct: false
    - question: 'Який маркер вказує на найвищий рівень вашої впевненості?'
      explanation: 'Слово "безперечно" означає, що факт не підлягає сумніву.'
      options:
        - text: 'безперечно'
          correct: true
        - text: 'ймовірно'
          correct: false
        - text: 'можливо'
          correct: false
        - text: 'припускаю'
          correct: false
    - question: 'Яка фраза є найбільш дипломатичною для висловлення незгоди?'
      explanation: 'Формула "дозвольте не погодитися" є маркером високого професійного етикету.'
      options:
        - text: 'дозвольте не погодитися'
          correct: true
        - text: 'я не згоден'
          correct: false
        - text: 'ви не маєте рації'
          correct: false
        - text: 'це повна нісенітниця'
          correct: false
    - question: 'Як правильно сказати про свою залученість до певного заходу?'
      explanation: 'Єдино правильний нормативний вираз — "брати участь".'
      options:
        - text: 'брати участь'
          correct: true
        - text: 'приймати участь'
          correct: false
        - text: 'робити участь'
          correct: false
        - text: 'мати участь'
          correct: false
    - question: 'З якого елемента обов''язково починається побудова залізного аргументу?'
      explanation: 'Будь-який аргумент завжди починається з чіткого формулювання тези.'
      options:
        - text: 'теза'
          correct: true
        - text: 'висновок'
          correct: false
        - text: 'доказ'
          correct: false
        - text: 'статистика'
          correct: false
    - question: 'Як називається остання фаза формальних дебатів, де спростовують критику?'
      explanation: 'Ця вирішальна фаза взаємного спростування називається ребатлом.'
      options:
        - text: 'ребатл'
          correct: true
        - text: 'афірмація'
          correct: false
        - text: 'негація'
          correct: false
        - text: 'диспут'
          correct: false
    - question: 'Який сполучник найкраще підходить для формального обґрунтування причини?'
      explanation: 'Сполучник "оскільки" надає вашій мові академічного звучання.'
      options:
        - text: 'оскільки'
          correct: true
        - text: 'тому що'
          correct: false
        - text: 'через те'
          correct: false
        - text: 'бо'
          correct: false
    - question: 'Як називається людина, яка слідкує за дотриманням регламенту під час обговорення?'
      explanation: 'Модератор забезпечує дотримання правил і контролює час виступів.'
      options:
        - text: 'модератор'
          correct: true
        - text: 'опонент'
          correct: false
        - text: 'спікер'
          correct: false
        - text: 'суддя'
          correct: false

- type: true-false
  title: 'Правда чи хиба: Культура дебатування'
  instruction: 'Визначте, чи є наведені твердження правильними.'
  items:
    - statement: 'Дискусія завжди має на меті перемогти опонента за будь-яку ціну.'
      correct: false
      explanation: 'Дискусія — це спільний пошук істини, де немає переможців чи переможених.'
    - statement: 'Дієслово "рахувати" можна використовувати для висловлення власної думки щодо політики.'
      correct: false
      explanation: 'Це груба калька з російської; українською треба використовувати дієслово "вважати".'
    - statement: 'Барокові диспути були популярними в Києво-Могилянській академії у сімнадцятому столітті.'
      correct: true
      explanation: 'Диспути були важливим інструментом інтелектуального розвитку студентів академії.'
    - statement: 'У формальних дебатах дозволяється перебивати опонента, якщо він наводить неправдиві дані.'
      correct: false
      explanation: 'Перебивати опонента — моветон; варто дочекатися своєї черги для ребатлу.'
    - statement: 'Стратегія часткової згоди допомагає знизити рівень конфронтації між учасниками розмови.'
      correct: true
      explanation: 'Ця стратегія дозволяє побудувати міст до співрозмовника перед контраргументацією.'
    - statement: 'Слово "спорити" є найкращим вибором для наукової публікації або офіційного звіту.'
      correct: false
      explanation: 'Слово "спорити" є просторічним; у формальному стилі використовують "сперечатися".'
    - statement: 'Будь-який залізний аргумент має складатися з тези, доказів та логічного висновку.'
      correct: true
      explanation: 'Це класична та найефективніша трикомпонентна анатомія сильного аргументу.'
    - statement: 'Слово "безперечно" є лексичним маркером дуже низького рівня впевненості.'
      correct: false
      explanation: 'Це маркер найвищої впевненості, який свідчить про безсумнівність факту.'
    - statement: 'Афірмація — це перша фаза дебатів, де команда представляє свою стверджувальну позицію.'
      correct: true
      explanation: 'Саме на цьому етапі формулюється проблема та пропонуються рішення.'
    - statement: 'Конструкція "З одного боку..., але водночас..." демонструє нездатність ухвалити рішення.'
      correct: false
      explanation: 'Вона демонструє вміння глибоко і збалансовано аналізувати складну ситуацію.'

