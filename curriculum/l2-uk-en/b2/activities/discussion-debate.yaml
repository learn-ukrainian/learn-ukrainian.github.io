- type: essay-response
  title: 'Письмове завдання: Афірмаційна промова'
  prompt: 'Уявіть, що ви берете участь у формальних політичних дебатах. Тема дебатів: "Чи варто заборонити використання пластикових пакетів у супермаркетах?". Ви виступаєте на боці афірмації (підтримуєте заборону). Напишіть коротку вступну промову (150-200 слів). Ваша промова повинна містити чітку тезу, два залізні аргументи (докази) та логічний висновок. Використовуйте маркери впевненості (безперечно, ймовірно), структурні слова (по-перше, отже) та уникайте русизмів.'
  min_words: 150
  model_answer: 'Шановні колеги та шановний опоненте! Дозвольте розпочати нашу дискусію. Я глибоко переконаний і вважаю, що повна заборона пластикових пакетів у вітчизняних супермаркетах є не просто бажаною ініціативою, а життєво необхідним кроком для збереження нашої екології. Це наша головна теза на сьогодні.

  На підтримку цієї позиції хочу навести два вагомі аргументи. По-перше, зважаючи на офіційні дослідження екологів, пластиковий пакет розкладається понад чотириста років, отруюючи ґрунти та воду мікропластиком. По-друге, з огляду на досвід європейських країн, введення такої заборони або значних податків на пластик стимулює громадян переходити на багаторазові екоторбинки, що безперечно зменшує загальний обсяг сміття у містах щонайменше на тридцять відсотків.

  Можна заперечити, що це створить тимчасові незручності для покупців. Це слушна думка, проте екологічна безпека майбутніх поколінь є набагато важливішою за одномоментний комфорт.

  Отже, враховуючи ці переконливі докази, ми маємо всі підстави стверджувати: відмова від пластикових пакетів — це єдиний правильний вибір для сучасної та відповідальної держави. Дякую за увагу.'
  rubric:
    - criteria: 'Структура аргументації'
      description: 'Наявність чіткої тези, доказів та логічного висновку.'
      points: 40
    - criteria: 'Лексичне багатство'
      description: 'Використання маркерів впевненості та формальних сполучників (оскільки, зважаючи на, отже).'
      points: 30
    - criteria: 'Грамотність та стиль'
      description: 'Відсутність кальок (рахую, приймати участь) та дотримання публіцистичного стилю.'
      points: 30