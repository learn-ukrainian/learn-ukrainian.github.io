- type: fill-in
  title: 'Заповніть пропуски: Риторичні конструкції'
  instruction: 'Оберіть правильне слово для кожного речення.'
  items:
    - sentence: 'Я глибоко переконаний і _____ вважаю, що цей закон вкрай необхідний.'
      answer: 'безперечно'
      options: ['безперечно', 'можливо', 'ймовірно', 'сумнівно']
      explanation: 'Фраза "глибоко переконаний" вимагає маркера високої впевненості.'
    - sentence: 'Шановний колего, дозвольте не _____ з вашим останнім твердженням.'
      answer: 'погодитися'
      options: ['погодитися', 'сперечатися', 'змиритися', 'сваритися']
      explanation: 'Це стандартна дипломатична формула етикету незгоди.'
    - sentence: 'Наша парламентська фракція відмовляється брати _____ у цьому сумнівному голосуванні.'
      answer: 'участь'
      options: ['участь', 'увагу', 'роль', 'справу']
      explanation: 'Єдина правильна форма — "брати участь".'
    - sentence: 'Ми маємо змінити стратегію, _____ попередній план виявився абсолютно неефективним.'
      answer: 'оскільки'
      options: ['оскільки', 'отже', 'проте', 'незважаючи']
      explanation: 'Тут потрібен формальний сполучник причини.'
    - sentence: 'Це дуже цікава та слушна _____, проте ми мусимо врахувати фінансові ризики.'
      answer: 'думка'
      options: ['думка', 'справа', 'теза', 'суперечка']
      explanation: 'Конструкція часткової згоди: "Слушна думка, проте...".'
    - sentence: 'Замість російської кальки "я рахую", завжди говоріть "я _____, що...".'
      answer: 'вважаю'
      options: ['вважаю', 'думаю', 'бачу', 'розумію']
      explanation: 'Дієслово "вважати" є нормативним для висловлення позиції.'
    - sentence: '_____ на останні соціологічні дані, рівень підтримки реформи продовжує зростати.'
      answer: 'Зважаючи'
      options: ['Зважаючи', 'Дивлячись', 'Опираючись', 'Аналізуючи']
      explanation: 'Правильна формальна конструкція — "зважаючи на".'
    - sentence: '_____ з цих складних переговорів логічно випливає, що консенсус поки неможливий.'
      answer: 'Отже'
      options: ['Отже', 'Тому', 'Оскільки', 'Хоча']
      explanation: 'Слово "Отже" ідеально підходить для початку підсумкового висновку.'
    - sentence: 'Команда захисту навела дуже вагомий _____, який повністю зруйнував нашу стратегію.'
      answer: 'аргумент'
      options: ['аргумент', 'термін', 'процес', 'ребатл']
      explanation: 'Слово "вагомий" найчастіше поєднується зі словом "аргумент".'
    - sentence: '_____ ми знайдемо компроміс завтра, але сьогодні ситуація залишається дуже напруженою.'
      answer: 'Можливо'
      options: ['Можливо', 'Безперечно', 'Безумовно', 'Звісно']
      explanation: 'Контекст невизначеності вимагає маркера низької впевненості.'

- type: group-sort
  title: 'Розподіліть за групами: Рівні впевненості'
  instruction: 'Розподіліть вступні слова та маркери за рівнем їхньої категоричності.'
  groups:
    - name: 'Висока впевненість'
      items: ['безперечно', 'безумовно', 'звісно', 'незаперечно']
    - name: 'Середня впевненість'
      items: ['ймовірно', 'напевно', 'очевидно', 'схоже']
    - name: 'Низька впевненість'
      items: ['можливо', 'припускаю', 'здається', 'допускаю']

- type: error-correction
  title: 'Виправте помилку: Типові кальки та русизми'
  instruction: 'Знайдіть неправильне або нестилістичне слово і виберіть літературний варіант.'
  items:
    - sentence: 'Я рахую, що нам потрібно негайно переглянути цей закон про освіту.'
      error: 'рахую'
      answer: 'вважаю'
      error_type: 'word'
      options: ['вважаю', 'думаю', 'бачу', 'помічаю']
      explanation: 'Дієслово "рахувати" використовується для чисел. Правильно — "я вважаю".'
    - sentence: 'Завтра студенти будуть приймати участь у великих телевізійних дебатах.'
      error: 'приймати'
      answer: 'брати'
      error_type: 'word'
      options: ['брати', 'мати', 'робити', 'грати']
      explanation: 'Єдино правильна нормативна фраза — "брати участь".'
    - sentence: 'Нам не варто так голосно спорити через такі дрібні технічні питання.'
      error: 'спорити'
      answer: 'сперечатися'
      error_type: 'word'
      options: ['сперечатися', 'сваритися', 'доказувати', 'кричати']
      explanation: 'Слово "спорити" є розмовним русизмом; нормативний варіант — "сперечатися".'
    - sentence: 'Я зовсім не згоден з позицією шановного опонента щодо податків.'
      error: 'не згоден'
      answer: 'не погоджуюся'
      error_type: 'phrase'
      options: ['не погоджуюся', 'відмовляю', 'не сприймаю', 'заперечую']
      explanation: 'У формальному мовленні краще сказати "дозвольте не погодитися" або "не погоджуюся".'
    - sentence: 'Оратор привів дуже переконливий статистичний доказ на свій захист.'
      error: 'привів'
      answer: 'навів'
      error_type: 'word'
      options: ['навів', 'показав', 'дав', 'зробив']
      explanation: 'Докази та аргументи ми "наводимо", а не "приводимо".'
    - sentence: 'Слушна мисль, проте ми маємо звернути увагу на інфляцію.'
      error: 'мисль'
      answer: 'думка'
      error_type: 'word'
      options: ['думка', 'ідея', 'теза', 'річ']
      explanation: 'Слово "мисль" є русизмом; українською мовою треба казати "думка".'
    - sentence: 'Цей процес, безспірно, принесе величезну користь нашій економіці.'
      error: 'безспірно'
      answer: 'безперечно'
      error_type: 'word'
      options: ['безперечно', 'безумовно', 'звісно', 'точно']
      explanation: 'Слово "безспірно" — це калька. Правильний маркер впевненості — "безперечно".'
    - sentence: 'Він сказав дуже вірні слова про нашу нову політичну стратегію.'
      error: 'вірні'
      answer: 'правильні'
      error_type: 'word'
      options: ['правильні', 'слушні', 'точні', 'чесні']
      explanation: 'Слова можуть бути "правильними" або "слушними", а "вірним" може бути друг.'

- type: unjumble
  title: 'Складіть речення: Риторичні конструкції'
  instruction: 'Відновіть правильний порядок слів у формальних реченнях.'
  items:
    - words: ['що', 'вважаю,', 'містить', 'Я', 'економіки.', 'для', 'закон', 'ризики', 'серйозні', 'цей']
      answer: 'Я вважаю, що цей закон містить серйозні ризики для економіки.'
    - words: ['дозвольте', 'Шановний', 'останнім', 'твердженням.', 'опоненте,', 'з', 'погодитися', 'не', 'вашим']
      answer: 'Шановний опоненте, дозвольте не погодитися з вашим останнім твердженням.'
    - words: ['показує', 'офіційна', 'ваших', 'слів,', 'картину.', 'іншу', 'переконливість', 'Попри', 'зовсім', 'статистика']
      answer: 'Попри переконливість ваших слів, офіційна статистика показує зовсім іншу картину.'
    - words: ['технологія', 'боку,', 'ефективна.', 'З', 'вона', 'надзвичайно', 'але', 'одного', 'дорога,', 'водночас']
      answer: 'З одного боку, технологія дорога, але водночас вона надзвичайно ефективна.'
    - words: ['діалог', 'вміння', 'навичкою.', 'є', 'ключовою', 'суспільстві', 'вести', 'конструктивний', 'сучасному', 'У']
      answer: 'У сучасному суспільстві вміння вести конструктивний діалог є ключовою навичкою.'
    - words: ['потребує', 'що', 'афірмації', 'змін.', 'твердо', 'транспортна', 'вважає,', 'система', 'Команда', 'негайних']
      answer: 'Команда афірмації твердо вважає, що транспортна система потребує негайних змін.'
    - words: ['дуже', 'діяти', 'ситуації,', 'обережно.', 'складність', 'ми', 'на', 'маємо', 'Зважаючи']
