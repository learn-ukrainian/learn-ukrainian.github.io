        - text: 'статистичні дані'
          correct: true
        - text: 'шкільні підручники'
          correct: false
        - text: 'статті у Вікіпедії'
          correct: false
      explanation: 'Першоджерела — це не інтерпретовані матеріали, отримані безпосередньо з дослідження або епохи.'
    - question: 'Які поняття тісно пов’язані з порушенням академічної доброчесності?'
      min_correct: 2
