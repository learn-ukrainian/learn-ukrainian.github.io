        - text: 'з одного боку'
          correct: true
        - text: 'підсумовуючи'
          correct: false
      explanation: 'Слова "по-перше", "по-друге" та "з одного боку" вводять нові аргументи в певній послідовності.'
    - question: 'Які дієслова підходять для об’єктивних безособових конструкцій?'
