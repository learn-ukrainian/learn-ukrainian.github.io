- type: reading
  id: reading-vernadsky
  title: 'Текст для аналізу: Науковий підхід'
  instruction: 'Прочитайте текст та дайте відповіді на запитання.'
  text: |
    Володимир Вернадський був переконаний, що справжнє дослідження не може існувати ізольовано від інших галузей знань. Його концепція системного підходу досі залишається актуальною для молодих науковців, які пишуть свої перші академічні тексти. Кожне дослідження вимагає не лише збору фактів, але й глибокого аналізу, синтезу та дотримання принципів академічної доброчесності. Важливо розуміти, що плагіат є грубим порушенням цих принципів і руйнує довіру до наукової спільноти.
  tasks:
    - 'Що є основою справжнього дослідження за Вернадським?'
    - 'Чому системний підхід є важливим для молодих науковців?'
    - 'Які процеси, крім збору фактів, необхідні для дослідження?'
    - 'Чому плагіат вважається настільки серйозним порушенням у науці?'

- type: essay-response
  title: 'Есе: Обґрунтування теми'
  source_reading: reading-vernadsky
  instruction: 'Напишіть короткий план-проспект вашого майбутнього дослідження.'
  prompt: 'Оберіть будь-яку актуальну тему з вашої професійної галузі. Сформулюйте дослідницьке питання, напишіть головну тезу та обґрунтуйте її актуальність. Використовуйте безособові конструкції та вставні слова.'
  min_words: 150
  model_answer: 'Актуальність обраної теми полягає в необхідності детального вивчення впливу штучного інтелекту на вивчення іноземних мов. Незважаючи на значну кількість публікацій, це питання залишається недостатньо дослідженим у контексті української мови. Предметом нашого дослідження є зміни в підходах студентів до виконання письмових завдань. Головна теза полягає в тому, що використання нейромереж вимагає впровадження нових критеріїв оцінювання академічної доброчесності. Вважається, що традиційні методи перевірки на плагіат більше не є ефективними. Таким чином, мета цієї роботи — проаналізувати нові виклики та запропонувати адаптовану методологію.'
  rubric:
    - criteria: 'Логіка та структура'
      description: 'Наявність чіткої тези, дослідницького питання та обґрунтування.'
      points: 5
    - criteria: 'Академічний стиль'
      description: 'Використання вставних слів, безособових конструкцій, відсутність кальок.'
      points: 5

- type: true-false
  title: 'Правда чи хибність: Академічний текст'
  instruction: 'Визначте, чи є твердження правильним у контексті написання підсумкового проєкту.'
  items:
    - statement: 'Ключова теза завжди є загальновідомим фактом, який не потребує додаткового доведення.'
      correct: false
      explanation: 'Сильна теза ніколи не є загальновідомим фактом; вона містить позицію, яка потребує обґрунтування.'
    - statement: 'Третинні ресурси, такі як енциклопедії, є основою для будь-якого глибокого аналізу.'
      correct: false
      explanation: 'Основою аналізу є первинні та вторинні джерела, третинні використовують для уточнення термінології.'
    - statement: 'Використання дієприкметникових зворотів допомагає зробити академічний текст більш компактним.'
      correct: true
      explanation: 'Дієприкметники дозволяють зробити речення більш інформативно насиченим.'
    - statement: 'Академічна доброчесність передбачає чесність у проведенні досліджень та повагу до інтелектуальної власності.'
      correct: true
      explanation: 'Це ключовий принцип сучасної освіти.'
    - statement: 'Прямий переклад фрази "I believe" як "я вірю" є доречним у науковому українському тексті.'
      correct: false
      explanation: 'Це мовна калька; у науковому стилі краще вживати "на нашу думку" або "ми вважаємо".'
    - statement: 'В українському академічному стилі для цитат традиційно використовують прямі англійські лапки.'
      correct: false
      explanation: 'Традиційно використовуються кутові лапки (ялинки).'
    - statement: 'Термін "дослід" стосується практичного експерименту в контрольованих умовах.'
      correct: true
      explanation: 'Дослід — це експеримент, а дослідження — це широкий процес вивчення.'
    - statement: 'Написання чернетки варто розпочинати тільки після того, як зібрані абсолютно всі існуючі джерела.'
      correct: false
      explanation: 'Варто створити графік роботи і писати поступово, розподіливши інформацію за розділами.'
    - statement: 'Безособові конструкції допомагають зосередити увагу на фактах і процесах, а не на особі автора.'
      correct: true
      explanation: 'Вони роблять текст об’єктивним та відстороненим.'
    - statement: 'Вдала тема для дослідження не обов’язково повинна мати практичну цінність.'
      correct: false
      explanation: 'Практична цінність є одним із трьох основних критеріїв вдалої теми.'

- type: quiz
  title: 'Перевірка знань: Академічний стиль та лексика'
  instruction: 'Оберіть одну правильну відповідь на кожне з наведених запитань про науковий стиль.'
  items:
    - question: 'Яка з наведених конструкцій є найбільш доречною для обґрунтування актуальності обраної теми у вступі до наукової роботи?'
      options:
        - text: 'Я дуже хочу вам розказати про цю цікаву проблему.'
          correct: false
        - text: 'Актуальність обраної теми полягає в необхідності детального вивчення явища.'
          correct: true
        - text: 'Ця тема є супер важливою для всіх нас сьогодні.'
          correct: false
        - text: 'Я вірю, що це питання потребує нашої негайної уваги.'
          correct: false
      explanation: 'У формальному стилі слід використовувати академічні кліше та уникати надмірної емоційності або кальок.'
    - question: 'Як правильно пояснити різницю між українськими словами "дослід" та "дослідження" у контексті наукової діяльності?'
      options:
        - text: 'Дослід — це аналітична робота в бібліотеці, а дослідження — це практичний експеримент.'
          correct: false
        - text: 'Ці два слова є абсолютними синонімами і можуть вільно взаємозамінюватися.'
          correct: false
        - text: 'Дослід — це практичний експеримент, тоді як дослідження — це системний аналітичний процес вивчення.'
          correct: true
        - text: 'Дослідження завжди проводиться в лабораторії, а дослід — тільки за комп’ютером.'
          correct: false
      explanation: 'Дослід — це експеримент (наприклад, хімічний), а дослідження — це пошук нових знань.'
    - question: 'Що з наведеного вважається найгрубішим порушенням принципів академічної доброчесності під час написання студентського проєкту?'
      options:
        - text: 'Надмірне використання складних граматичних конструкцій.'
          correct: false
        - text: 'Привласнення чужих ідей та текстів без належного покликання на автора.'
          correct: true
        - text: 'Написання занадто довгого та детального вступу до роботи.'
          correct: false
        - text: 'Використання виключно вторинних інформаційних джерел.'
          correct: false
      explanation: 'Плагіат є найтяжчим порушенням, оскільки він порушує права інтелектуальної власності.'
    - question: 'Який розділ наукового тексту має містити узагальнення сказаного та підтвердження початкової дослідницької тези?'
      options:
        - text: 'Загальний вступ'
          correct: false
        - text: 'Основна частина'
          correct: false
        - text: 'Огляд літератури'
          correct: false
        - text: 'Логічні висновки'
          correct: true
      explanation: 'Висновки підсумовують аргументацію та остаточно стверджують головну тезу.'
    - question: 'Яка з наведених синтаксичних форм найкраще допомагає зберегти об’єктивний тон та уникнути зайвої суб’єктивності?'
      options:
        - text: 'Активні конструкції з постійним повторенням займенника "я".'
          correct: false
        - text: 'Емоційно забарвлені окличні речення наприкінці кожного абзацу.'
          correct: false
        - text: 'Безособові речення та конструкції з використанням пасивного стану.'
          correct: true
        - text: 'Прямі розмовні звертання до читача у формі запитань.'
          correct: false
      explanation: 'Безособові конструкції зміщують фокус з автора на сам факт або процес.'
    - question: 'Для чого в українському академічному тексті найчастіше використовуються спеціальні вставні слова та словосполучення?'
      options:
        - text: 'Вони діють як дорожні знаки для забезпечення логічної зв’язності.'
          correct: true
        - text: 'Вони необхідні виключно для штучного збільшення загального обсягу тексту.'
          correct: false
        - text: 'Вони допомагають приховати відсутність реальних аргументів у дослідженні.'
          correct: false
        - text: 'Вони використовуються лише в неофіційному спілкуванні, а не в науці.'
          correct: false
      explanation: 'Вставні слова (по-перше, отже) структурують текст і забезпечують його когезію.'
    - question: 'Яку функцію виконує правильно сформульована ключова теза у вашому підсумковому академічному дослідженні?'
      options:
        - text: 'Це просто гарна назва для вашого майбутнього виступу.'
          correct: false
        - text: 'Це серце тексту, стисле вираження головної ідеї, яку ви доводите.'
          correct: true
        - text: 'Це детальний перелік усіх інформаційних джерел, які ви знайшли.'
          correct: false
        - text: 'Це загальновідомий факт, з яким погоджуються абсолютно всі науковці.'
          correct: false
      explanation: 'Теза — це основне твердження, яке автор обґрунтовує протягом усієї роботи.'
    - question: 'Яким чином дієприслівникові звороти збагачують текст підсумкового проєкту на рівні володіння мовою B2?'
      options:
        - text: 'Вони роблять текст коротшим, замінюючи всі існуючі іменники.'
          correct: false
        - text: 'Вони додають аналітичної глибини, пояснюючи обставини або причинно-наслідкові зв’язки.'
          correct: true
        - text: 'Вони використовуються виключно для переказу прямої мови інших авторів.'
          correct: false
        - text: 'Вони дозволяють повністю уникнути використання будь-яких розділових знаків.'
          correct: false
      explanation: 'Дієприслівники вказують на додаткову дію, що пояснює контекст основної дії.'
    - question: 'Що таке мистецтво парафразу і чому воно є надзвичайно важливим під час написання наукової чернетки?'
      options:
        - text: 'Це дослівне копіювання чужого тексту без використання жодних лапок.'
          correct: false
        - text: 'Це використання виключно іноземних термінів без їхнього перекладу.'
          correct: false
        - text: 'Це переказ чужої думки власними словами без втрати оригінального змісту.'
          correct: true
        - text: 'Це емоційна критика робіт інших студентів під час публічного захисту.'
          correct: false
      explanation: 'Парафраз дозволяє інтегрувати ідеї з джерел у свій текст, зберігаючи авторський голос.'
    - question: 'Які типи джерел вважаються оригінальними документами та основою для будь-якого серйозного академічного аналізу?'
      options:
        - text: 'Первинні джерела (першоджерела)'
          correct: true
        - text: 'Третинні ресурси (довідники)'
          correct: false
        - text: 'Художня література'
          correct: false
        - text: 'Популярні блоги'
          correct: false
      explanation: 'Першоджерела (листи, статистичні дані) є фундаментом наукового дослідження.'

- type: fill-in
  title: 'Заповніть пропуски: Лексика'
  instruction: 'Оберіть правильне слово для кожного речення.'
  items:
    - sentence: 'Для написання роботи потрібно використати надійне _____.'
      answer: 'джерело'
      options: ['джерело', 'правило', 'рішення', 'питання']
    - sentence: 'Студент має висунути чітку _____ у вступній частині.'
      answer: 'тезу'
      options: ['тезу', 'книгу', 'лекцію', 'мову']
    - sentence: 'Головна мета — провести глибоке наукове _____.'
      answer: 'дослідження'
      options: ['дослідження', 'знання', 'враження', 'спілкування']
    - sentence: 'Кожен науковий _____ вимагає точного визначення.'
      answer: 'термін'
      options: ['термін', 'текст', 'стиль', 'закон']
    - sentence: 'Необхідно навести вагомий _____ на захист своєї позиції.'
      answer: 'аргумент'
      options: ['аргумент', 'результат', 'досвід', 'документ']
    - sentence: 'Академічний _____ передбачає розкладання цілого на складові частини.'
      answer: 'аналіз'
      options: ['аналіз', 'синтез', 'огляд', 'розвиток']
    - sentence: 'Об’єднання різних елементів у єдине ціле називається _____.'
      answer: 'синтезом'
      options: ['синтезом', 'аналізом', 'дослідом', 'методом']
    - sentence: 'Важливо зробити логічний _____ наприкінці вашої роботи.'
      answer: 'висновок'
      options: ['висновок', 'вступ', 'проєкт', 'план']
    - sentence: 'Будь-яке запозичення потребує точного _____ на автора.'
      answer: 'покликання'
      options: ['покликання', 'написання', 'створення', 'читання']
    - sentence: 'Використання чужих ідей без дозволу визначається як _____.'
      answer: 'плагіат'
      options: ['плагіат', 'парафраз', 'цитування', 'редагування']

- type: unjumble
  title: 'Побудова речень: Академічний синтаксис'
  instruction: 'Складіть слова в правильному порядку, щоб утворити речення формального стилю.'
  items:
    - words: ['актуальність', 'обраної', 'теми', 'полягає', 'в', 'необхідності', 'детального', 'вивчення', 'проблеми']
      answer: 'Актуальність обраної теми полягає в необхідності детального вивчення проблеми'
    - words: ['незважаючи', 'на', 'значну', 'кількість', 'публікацій', 'це', 'питання', 'залишається', 'недостатньо', 'дослідженим']
      answer: 'Незважаючи на значну кількість публікацій це питання залишається недостатньо дослідженим'
    - words: ['мета', 'цієї', 'роботи', 'проаналізувати', 'вплив', 'соціальних', 'мереж', 'на', 'сучасну', 'молодь']
      answer: 'Мета цієї роботи проаналізувати вплив соціальних мереж на сучасну молодь'
    - words: ['предметом', 'нашого', 'дослідження', 'є', 'складні', 'процеси', 'урбанізації', 'в', 'західних', 'регіонах']
      answer: 'Предметом нашого дослідження є складні процеси урбанізації в західних регіонах'
    - words: ['важливо', 'зазначити', 'що', 'отримані', 'результати', 'повністю', 'підтверджують', 'нашу', 'початкову', 'гіпотезу']
      answer: 'Важливо зазначити що отримані результати повністю підтверджують нашу початкову гіпотезу'
    - words: ['спираючись', 'на', 'статистичні', 'дані', 'ми', 'можемо', 'прогнозувати', 'подальше', 'зростання', 'економіки']
      answer: 'Спираючись на статистичні дані ми можемо прогнозувати подальше зростання економіки'
    - words: ['кожна', 'використана', 'цитата', 'має', 'обов’язково', 'супроводжуватися', 'точним', 'покликанням', 'на', 'джерело']
      answer: 'Кожна використана цитата має обов’язково супроводжуватися точним покликанням на джерело'
    - words: ['вважається', 'що', 'цей', 'інноваційний', 'метод', 'відкриває', 'абсолютно', 'нові', 'перспективи', 'для', 'науки']
      answer: 'Вважається що цей інноваційний метод відкриває абсолютно нові перспективи для науки'

- type: error-correction
  title: 'Редагування: Виправте помилки стилю'
  instruction: 'Знайдіть та виправте кальки або русизми в наведених реченнях.'
  items:
    - sentence: 'Я вірю, що ця глобальна тенденція скоро суттєво зміниться.'
      error: 'Я вірю'
      answer: 'Ми вважаємо'
      error_type: 'register'
      options: ['Ми вважаємо', 'Я думаю', 'Мені здається', 'Я вірю']
      explanation: 'В академічному тексті "я вірю" є калькою з англійської ("I believe"). Використовуйте "ми вважаємо" або "на нашу думку".'
    - sentence: 'Цей науковий папір дивиться на проблеми сучасної світової економіки.'
      error: 'дивиться на'
      answer: 'розглядає'
      error_type: 'phrase'
      options: ['розглядає', 'дивиться на', 'бачить', 'спостерігає']
      explanation: 'Калька з "looks at". Правильно казати: "стаття розглядає" або "аналізує".'
    - sentence: 'Кожен студент має приймати участь у фінальній науковій дискусії.'
      error: 'приймати участь'
      answer: 'брати участь'
      error_type: 'phrase'
      options: ['брати участь', 'приймати участь', 'мати участь', 'робити участь']
      explanation: 'Словосполучення "приймати участь" є типовим русизмом. Українською мовою правильно — "брати участь".'
    - sentence: 'Хімік провів нове небезпечне дослідження зі складними токсичними реагентами.'
      error: 'дослідження'
      answer: 'дослід'
      error_type: 'word'
      options: ['дослід', 'дослідження', 'аналіз', 'тест']
