        - text: 'якісний парафраз'
          correct: false
        - text: 'використання лапок'
          correct: false
      explanation: 'Плагіат та привласнення думок без посилання є порушеннями.'
    - question: 'Які критерії визначають вдалу тему для підсумкового проєкту?'
      min_correct: 3
      options:
        - text: 'висока актуальність'
          correct: true
        - text: 'практична цінність'
          correct: true
        - text: 'доступність україномовних джерел'
