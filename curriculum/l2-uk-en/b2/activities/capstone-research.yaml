- type: translate
  title: 'Переклад: Академічна термінологія'
  instruction: 'Оберіть правильний український переклад для англійських наукових термінів.'
  items:
    - source: 'The researcher presented a new hypothesis.'
      options:
        - text: 'Дослідник висунув нову гіпотезу.'
          correct: true
        - text: 'Дослід показав нову гіпотезу.'
          correct: false
        - text: 'Дослідник взяв нову тезу.'
          correct: false
      explanation: '"Researcher" — це дослідник, а "to present a hypothesis" — висунути гіпотезу.'
    - source: 'This study requires reliable sources.'
      options:
        - text: 'Це дослідження вимагає надійних джерел.'
          correct: true
        - text: 'Цей дослід вимагає хороших ресурсів.'
          correct: false
        - text: 'Це дослідження хоче правильні книги.'
          correct: false
      explanation: '"Study" перекладається як дослідження, а "reliable sources" — надійні джерела.'
    - source: 'The conclusion confirms our initial thesis.'
      options:
        - text: 'Висновок підтверджує нашу початкову тезу.'
          correct: true
        - text: 'Кінець доводить нашу першу думку.'
          correct: false
        - text: 'Рішення показує нашу тезу.'
          correct: false
      explanation: '"Conclusion" — висновок, "confirms" — підтверджує.'
    - source: 'Plagiarism is a serious violation of academic integrity.'
      options:
        - text: 'Плагіат є серйозним порушенням академічної доброчесності.'
          correct: true
        - text: 'Плагіат — це велика проблема в науці.'
          correct: false
        - text: 'Копіювання є серйозною помилкою академічної чесності.'
          correct: false
      explanation: '"Academic integrity" — академічна доброчесність.'
    - source: 'We need to conduct a thorough analysis of the data.'
      options:
        - text: 'Нам потрібно провести глибокий аналіз даних.'
          correct: true
        - text: 'Нам треба зробити великий аналіз інформації.'
          correct: false
        - text: 'Ми маємо зробити сильний аналіз результатів.'
          correct: false
      explanation: '"Conduct an analysis" — провести аналіз.'
    - source: 'The author provides strong arguments in this article.'
      options:
        - text: 'Автор наводить вагомі аргументи в цій статті.'
          correct: true
        - text: 'Письменник дає сильні докази в цьому тексті.'
          correct: false
        - text: 'Автор показує великі аргументи в роботі.'
          correct: false
      explanation: '"Provides strong arguments" перекладається як "наводить вагомі аргументи".'
    - source: 'It is considered that this process is irreversible.'
      options:
        - text: 'Вважається, що цей процес є незворотним.'
          correct: true
        - text: 'Я вірю, що цей процес не можна змінити.'
          correct: false
        - text: 'Всі думають, що цей рух є постійним.'
          correct: false
      explanation: 'Безособова конструкція "It is considered" перекладається як "вважається".'
    - source: 'Every citation must include a proper reference.'
      options:
        - text: 'Кожна цитата повинна містити належне покликання.'
          correct: true
        - text: 'Кожні лапки мусять мати правильний лінк.'
          correct: false
        - text: 'Усі тексти повинні мати хороше посилання.'
          correct: false
      explanation: '"Citation" — цитата, "proper reference" — належне покликання.'

