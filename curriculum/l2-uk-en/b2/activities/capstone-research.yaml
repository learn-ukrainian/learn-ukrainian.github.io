        - text: 'зазначено'
          correct: true
        - text: 'доведено'
          correct: true
        - text: 'я вірю'
          correct: false
        - text: 'ми хочемо'
          correct: false
      explanation: 'Форми на -но, -то та зворотні дієслова допомагають уникнути прямої вказівки на особу.'
    - question: 'Які елементи є обов’язковими для правильно оформленої цитати?'
      min_correct: 2
      options:
        - text: 'кутові лапки'
          correct: true
        - text: 'покликання на автора'
          correct: true
        - text: 'емоційний коментар студента'
          correct: false
        - text: 'використання виключно англійської мови'
          correct: false
      explanation: 'Цитата вимагає лапок та чіткого покликання на джерело.'
    - question: 'Що належить до первинних джерел інформації?'
      min_correct: 3
      options:
        - text: 'результати експериментів'
