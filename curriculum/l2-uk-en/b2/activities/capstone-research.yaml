    - sentence: 'Мій підсумковий проєкт — це масштабний соціологічний дослід.'
      error: 'дослід'
      answer: 'дослідження'
      error_type: 'word'
      options: ['дослідження', 'дослід', 'проєкт', 'план']
      explanation: 'Широкий аналітичний процес збору та аналізу даних називається дослідженням.'
    - sentence: 'Він сказав, що ця цікава книжка являється найкращим джерелом.'
      error: 'являється'
      answer: 'є'
      error_type: 'word'
      options: ['є', 'являється', 'стає', 'буде']
      explanation: 'Слово "являтися" в значенні "бути кимось/чимось" — це калька з російської. Правильно: книжка є джерелом.'
    - sentence: 'Я дуже сильно хочу зазначити одну важливу деталь.'
      error: 'Я дуже сильно хочу зазначити'
      answer: 'Варто зазначити'
      error_type: 'register'
      options: ['Варто зазначити', 'Я дуже сильно хочу зазначити', 'Мені хочеться сказати', 'Я скажу вам']
      explanation: 'В академічному стилі слід уникати суб’єктивності та емоційності. "Варто зазначити" — об’єктивна конструкція.'
    - sentence: 'Самі кращі студенти отримують можливість навчатися за кордоном.'
      error: 'Самі кращі'
      answer: 'Найкращі'
      error_type: 'phrase'
      options: ['Найкращі', 'Самі кращі', 'Найбільш кращі', 'Більш кращі']
      explanation: 'Утворення найвищого ступеня порівняння за допомогою слова "самий" — русизм. Використовуйте префікс "най-".'

