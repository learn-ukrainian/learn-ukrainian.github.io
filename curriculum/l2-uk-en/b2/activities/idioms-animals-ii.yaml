- type: reading
  title: "Первинне джерело: Роль метафор"
  instruction: "Прочитайте текст та дайте відповіді на запитання."
  text: |
    Фразеологізми віддзеркалюють національний спосіб мислення, давні традиції та систему цінностей народу. Доречне використання таких мовних зворотів робить спілкування живим, переконливим та автентичним. У цьому модулі ми детально розглянули фразеологізми, які базуються на назвах птахів, риб та комах. Цей пласт лексики сформувався завдяки тому, що життя українців історично було нерозривно пов'язане із сільським господарством та постійним спостереженням за довкіллям. Здатність вільно оперувати цими метафорами є безперечним свідченням високого рівня володіння українською мовою.
  tasks:
    - "Що віддзеркалюють фразеологізми в українській мові?"
    - "Які сфери життя найбільше вплинули на формування цих виразів?"
    - "Про що свідчить вміння вільно оперувати метафорами?"

- type: true-false
  title: "Правда чи хиба: Значення фразеологізмів"
  instruction: "Визначте, чи відповідає твердження істинному значенню фразеологізму."
  items:
    - statement: "Вираз 'синиця в руках' означає, що людина має великі амбіції та мріє про неможливе."
      correct: false
      explanation: "Цей вираз означає задовольнятися малим, але реальним, а не мріяти про неможливе (журавля)."
    - statement: "Фразеологізм 'стріляний горобець' описує дуже досвідчену людину, яку складно обдурити."
      correct: true
      explanation: "Так, це метафора досвідченої людини, яка пройшла через багато випробувань."
    - statement: "'Біла ворона' завжди вживається в жіночому роді, навіть якщо мова йде про чоловіка."
      correct: true
      explanation: "Це граматичне правило: форма завжди залишається жіночого роду (білою вороною)."
    - statement: "Людина, яка 'мовчить як риба', зазвичай дуже говірка та любить розповідати секрети."
      correct: false
      explanation: "Цей вираз означає абсолютне мовчання та здатність зберігати таємницю."
    - statement: "Якщо хтось 'робить з мухи слона', він сильно перебільшує проблему."
      correct: true
      explanation: "Це класична метафора гіперболізації та перебільшення."
    - statement: "'Працювати як бджола' є символом надзвичайної працелюбності та невтомності."
      correct: true
      explanation: "Бджола в українській культурі завжди була еталоном важкої колективної праці."
    - statement: "Вираз 'рання пташка' повністю відповідає англійському early bird і використовується для тих, хто прийшов першим."
      correct: false
      explanation: "В українській мові це означає лише людину, яка прокидається рано, а не ту, яка прийшла кудись першою."
    - statement: "Конструкція 'грати значення' є правильною українською літературною нормою."
      correct: false
      explanation: "Це лексична калька. Правильно казати 'мати значення' або 'відігравати роль'."
    - statement: "Відчуття, коли 'мурашки по спині бігають', може виникати як від страху, так і від захоплення."
      correct: true
      explanation: "Так, ця фраза передає сильне емоційне збудження або фізіологічну реакцію на холод."
    - statement: "Лелека в українській традиції є символом горя та нещастя."
      correct: false
      explanation: "Лелека є сакральним символом родинного затишку, щастя та злагоди."

- type: quiz
  title: "Перевірте знання: Птахи, риби, комахи"
  instruction: "Оберіть правильний варіант відповіді для кожного запитання."
  items:
    - question: "Який фразеологізм найкраще описує людину, яка не має чіткої життєвої позиції?"
      explanation: "Вираз 'ні риба ні м'ясо' описує слабку людину без власної думки."
      options:
        - text: "ні риба ні м'ясо"
          correct: true
        - text: "ворона в павичевому пір'ї"
          correct: false
        - text: "стріляний горобець"
          correct: false
        - text: "біла ворона"
          correct: false
    - question: "Як правильно сказати про колегу чоловічої статі, який дуже відрізняється від інших?"
      explanation: "Фразеологізм 'біла ворона' завжди зберігає жіночий рід, навіть якщо йдеться про чоловіка."
      options:
        - text: "Він завжди був білою вороною в нашому колективі."
          correct: true
        - text: "Він завжди був білим вороном в нашому колективі."
          correct: false
        - text: "Він завжди був білим птахом в нашому колективі."
          correct: false
        - text: "Він завжди був білим лелекою в нашому колективі."
          correct: false
    - question: "Яка пташка в українській культурі є головним сакральним символом сімейного затишку?"
      explanation: "Лелека є потужним оберегом родинного вогнища та символом миру."
      options:
        - text: "лелека"
          correct: true
        - text: "синиця"
          correct: false
        - text: "ворона"
          correct: false
        - text: "горобець"
          correct: false
    - question: "Що має на увазі керівник, коли просить своїх співробітників не 'робити з мухи слона'?"
      explanation: "Він просить не перебільшувати значення незначної або дрібної події."
      options:
        - text: "Він просить не перебільшувати значення проблеми."
          correct: true
        - text: "Він просить не звертати увагу на тварин."
          correct: false
        - text: "Він просить працювати швидше та ефективніше."
          correct: false
        - text: "Він просить зберігати тишу в офісному приміщенні."
          correct: false
    - question: "Який вираз варто використати, якщо людина постійно і нав'язливо відволікає вас від справ?"
      explanation: "Вираз 'лізти межи очі як муха' означає бути надзвичайно нав'язливим і набридливим."
      options:
        - text: "лізе межи очі як муха"
          correct: true
        - text: "мовчить як риба"
          correct: false
        - text: "працює як бджола"
          correct: false
        - text: "тримає синицю в руках"
          correct: false
    - question: "Що ми найчастіше протиставляємо 'журавлю в небі' в українському народному прислів'ї?"
      explanation: "Досяжна 'синиця в руках' протиставляється далекому і ризикованому 'журавлю в небі'."
      options:
        - text: "синицю в руках"
          correct: true
        - text: "горобця на даху"
          correct: false
        - text: "лелеку в гнізді"
          correct: false
        - text: "ворону на дереві"
          correct: false
    - question: "Яка комаха є абсолютним еталоном невтомності та великої працелюбності в українській мові?"
      explanation: "Бджола традиційно уособлює невтомну колективну працю та відданість справі."
      options:
        - text: "бджола"
          correct: true
        - text: "муха"
          correct: false
        - text: "мурашка"
          correct: false
        - text: "комар"
          correct: false
    - question: "Як правильно закінчити відоме українське прислів'я про пташку та людину?"
      explanation: "Повне прислів'я звучить так: 'Гарна пташка своїм пір'ям, а людина знанням'."
      options:
        - text: "а людина знанням"
          correct: true
        - text: "а людина розумом"
          correct: false
        - text: "а людина словами"
          correct: false
        - text: "а людина вчинками"
          correct: false
    - question: "Яке з цих словосполучень вважається грубою лексичною калькою і є стилістичною помилкою?"
      explanation: "Конструкція 'грати значення' — це калька, правильно казати 'мати значення'."
      options:
        - text: "грати значення"
          correct: true
        - text: "відігравати роль"
          correct: false
        - text: "мати значення"
          correct: false
        - text: "робити висновки"
          correct: false
    - question: "Про що говорить відчуття, коли у вас раптово 'мурашки по спині бігають'?"
      explanation: "Цей фразеологізм описує сильне емоційне збудження, страх або відчуття холоду."
      options:
        - text: "про сильне емоційне збудження або сильний страх"
          correct: true
        - text: "про бажання швидко закінчити складну роботу"
          correct: false
        - text: "про надзвичайну фізичну втому після довгого дня"
          correct: false
        - text: "про небажання спілкуватися з набридливими людьми"
          correct: false

