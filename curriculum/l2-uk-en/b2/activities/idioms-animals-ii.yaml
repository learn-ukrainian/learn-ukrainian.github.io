- type: fill-in
  title: "Заповніть пропуски: Робочі ситуації"
  instruction: "Оберіть правильний варіант для кожного пропуску, зважаючи на контекст речення."
  items:
    - sentence: "Директор сказав, що краще мати синицю в руках, ніж чекати на того далекого і ризикованого _."
      answer: "журавля"
      options: ["журавля", "лелеку", "горобця", "павича"]
      explanation: "Фразеологізм вимагає слова «журавель» у знахідному відмінку (журавля)."
    - sentence: "Коли нас запитали про причини затримки проекту, весь наш відділ вирішив _ як риба."
      answer: "мовчати"
      options: ["мовчати", "кричати", "співати", "говорити"]
      explanation: "Стійкий вираз «мовчати як риба»."
    - sentence: "Наш головний юрист — це старий стріляний _, його дуже важко обдурити на переговорах."
      answer: "горобець"
      options: ["горобець", "ворон", "орел", "лебідь"]
      explanation: "Стійка метафора досвідченої людини — «стріляний горобець»."
    - sentence: "Щоб встигнути завершити звіт до п'ятниці, уся команда змушена працювати як _."
      answer: "бджоли"
      options: ["бджоли", "мухи", "пташки", "риби"]
      explanation: "Бджола є символом колективної, невтомної праці."
    - sentence: "Новий менеджер постійно метушився і ліз межи очі як _, заважаючи всім зосередитися."
      answer: "муха"
      options: ["муха", "бджола", "комар", "мурашка"]
      explanation: "Символом нав'язливості є муха («лізти межи очі як муха»)."
    - sentence: "Олена була справжньою білою _ серед своїх колег, бо цікавилася не грошима, а мистецтвом."
      answer: "вороною"
      options: ["вороною", "пташкою", "рибою", "комахою"]
      explanation: "Вираз «біла ворона» завжди використовується в жіночому роді."
    - sentence: "Не потрібно робити з _ слона; це всього лише маленька помилка в документах."
      answer: "мухи"
      options: ["мухи", "миші", "комахи", "бджоли"]
      explanation: "Класичний вираз перебільшення: «робити з мухи слона»."
    - sentence: "Замість того щоб ухвалювати складні рішення, він поводиться як ні _ ні м'ясо."
      answer: "риба"
      options: ["риба", "курка", "качка", "вода"]
      explanation: "Невиразна людина описується фразою «ні риба ні м'ясо»."
    - sentence: "Від її високого та потужного співу в усього залу побігли _ по спині."
      answer: "мурашки"
      options: ["мурашки", "комахи", "мухи", "бджоли"]
      explanation: "Фізичне відчуття від емоцій передається виразом «мурашки по спині бігають»."
    - sentence: "Пам'ятайте, що гарна пташка своїм _, а людина завжди цінується за свої знання."
      answer: "пір'ям"
      options: ["пір'ям", "дзьобом", "крилами", "голосом"]
      explanation: "Завершення прислів'я «Гарна пташка своїм пір'ям»."

- type: unjumble
  title: "Складіть речення: Відгуки керівництва"
  instruction: "Розташуйте слова у правильному порядку, щоб утворити граматично правильне речення."
  items:
    - words: ["наш", "новий", "співробітник", "виявився", "справжньою", "білою", "вороною", "у", "відділі"]
      answer: "Наш новий співробітник виявився справжньою білою вороною у відділі"
    - words: ["він", "був", "старим", "стріляним", "горобцем", "якого", "неможливо", "було", "обдурити"]
      answer: "Він був старим стріляним горобцем якого неможливо було обдурити"
    - words: ["менеджер", "попросив", "нас", "не", "робити", "з", "мухи", "величезного", "слона"]
      answer: "Менеджер попросив нас не робити з мухи величезного слона"
    - words: ["кожен", "учасник", "нашого", "проекту", "повинен", "працювати", "як", "невтомна", "бджола"]
      answer: "Кожен учасник нашого проекту повинен працювати як невтомна бджола"
    - words: ["на", "допиті", "всі", "свідки", "вирішили", "мовчати", "як", "німі", "риби"]
      answer: "На допиті всі свідки вирішили мовчати як німі риби"
    - words: ["інвестор", "сказав", "що", "краще", "тримати", "маленьку", "синицю", "в", "руках"]
      answer: "Інвестор сказав що краще тримати маленьку синицю в руках"
    - words: ["від", "цього", "страшного", "фільму", "у", "мене", "бігали", "мурашки", "по", "спині"]
      answer: "Від цього страшного фільму у мене бігали мурашки по спині"
    - words: ["новий", "керівник", "не", "мав", "власної", "думки", "і", "був", "ні", "риба", "ні", "м'ясо"]
      answer: "Новий керівник не мав власної думки і був ні риба ні м'ясо"

- type: error-correction
  title: "Виправте помилку: Граматика та лексика"
  instruction: "Знайдіть і виправте лексичну або граматичну помилку в кожному реченні (кальки, неправильний рід тощо)."
  items:
    - sentence: "Його слова не грають жодного значення для нашого колективу."
      error: "грають"
      answer: "мають"
      error_type: "word"
      options: ["мають", "роблять", "несуть", "кажуть"]
      explanation: "Конструкція 'грати значення' — це лексична калька. Правильно казати 'мати значення'."
    - sentence: "Мій брат був справжнім білим вороном у своїй школі."
      error: "білим вороном"
      answer: "білою вороною"
      error_type: "phrase"
      options: ["білою вороною", "білим птахом", "білим горобцем", "білою пташкою"]
      explanation: "Фразеологізм 'біла ворона' завжди має жіночий рід, незалежно від статі людини."
    - sentence: "Не потрібно робити з комара слона, ситуація не така вже й погана."
      error: "комара"
      answer: "мухи"
      error_type: "word"
      options: ["мухи", "миші", "бджоли", "пташки"]
      explanation: "Стійкий фразеологізм в українській мові звучить як 'робити з мухи слона'."
    - sentence: "Він щодня бігає о п'ятій ранку, бо він справжній ранній птах."
      error: "ранній птах"
      answer: "рання пташка"
      error_type: "phrase"
      options: ["рання пташка", "ранішня пташка", "ранній горобець", "ранній лелека"]
      explanation: "Правильна форма цього фразеологізму — 'рання пташка' (зменшувальна форма жіночого роду)."
    - sentence: "Наш новий бухгалтер виявився ні риба ні курка, він нічого не може вирішити."
      error: "курка"
      answer: "м'ясо"
      error_type: "word"
      options: ["м'ясо", "овоч", "молоко", "птах"]
      explanation: "Правильна форма фразеологізму: 'ні риба ні м'ясо'."
    - sentence: "Коли його запитали про гроші, він почав мовчати як камінь."
      error: "камінь"
      answer: "риба"
      error_type: "word"
      options: ["риба", "стіна", "дерево", "могила"]
      explanation: "В українській мові мовчать 'як риба'."
    - sentence: "Ця жінка дуже багато працює, вона працює як оса."
      error: "оса"
