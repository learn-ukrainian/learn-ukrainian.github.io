- type: reading
  title: "Первинне джерело: Звіт археолога"
  instruction: "Прочитайте уривок із щоденника археолога та дайте відповіді на запитання."
  text: "Колись давно на цьому місці стояло велике місто. Нині ми бачимо лише руїни, але наші розкопки дозволяють зазирнути в минуле. Щойно наша команда знайшла унікальний артефакт, який датується десятим століттям. Наразі ми очищаємо його від пилу, щоб передати до лабораторії. Тепер ми точно знаємо, що ця територія була заселена значно раніше, ніж вважалося. Зараз я записую ці спостереження, відчуваючи глибокий зв'язок епох."
  tasks:
    - "Яке слово автор використовує для опису сьогоднішнього стану руїн?"
    - "Що команда археологів знайшла буквально мить тому?"
    - "Яким словом описано тимчасовий процес очищення артефакту?"
    - "Як археолог відчуває зв'язок між минулим і сучасним?"

- type: fill-in
  title: "Заповніть пропуски відповідними синонімами"
  instruction: "Оберіть найбільш влучний часовий маркер для кожного речення."
  items:
    - sentence: "Ми ... отримали результати експертизи, вони ще зовсім свіжі."
      answer: "щойно"
      options: ["щойно", "колись", "нині", "наразі"]
      explanation: "Слово 'щойно' використовується для дій, які відбулися мить тому."
    - sentence: "... триває підготовка до міжнародної конференції археологів."
      answer: "наразі"
      options: ["наразі", "щойно", "колись", "зараз"]
      explanation: "Слово 'наразі' підкреслює тимчасовість процесу в офіційному стилі."
    - sentence: "На місці цього музею ... було давнє поселення."
      answer: "колись"
      options: ["колись", "тепер", "зараз", "нині"]
      explanation: "Слово 'колись' вказує на минуле без точної дати."
    - sentence: "Я ... пишу звіт і не можу відповісти на ваш дзвінок."
      answer: "зараз"
      options: ["зараз", "тепер", "нині", "колись"]
      explanation: "Слово 'зараз' позначає дію, що відбувається саме в момент мовлення."
    - sentence: "... технології дозволяють датувати знахідки з великою точністю."
      answer: "тепер"
      options: ["тепер", "щойно", "наразі", "зараз"]
      explanation: "Слово 'тепер' вказує на нову реальність порівняно з минулим."
    - sentence: "Станом на ... ми не маємо достатнього фінансування для розкопок."
      answer: "нині"
      options: ["нині", "зараз", "щойно", "колись"]
      explanation: "Фраза 'станом на нині' є усталеною в публіцистичному та офіційному стилях."
    - sentence: "Уряд підписав указ, і ... ці землі охороняються державою."
      answer: "відтепер"
      options: ["відтепер", "щойно", "зараз", "наразі"]
      explanation: "Слово 'відтепер' позначає точку, з якої починається нова епоха або діють нові правила."
    - sentence: "Вона змінила професію і ... працює в науковому інституті."
      answer: "тепер"
      options: ["тепер", "зараз", "щойно", "колись"]
      explanation: "Слово 'тепер' використовується для опису тривалого стану або нового етапу."
    - sentence: "Ці артефакти ... вивчаються в лабораторії, результати будуть завтра."
      answer: "наразі"
      options: ["наразі", "щойно", "колись", "відтепер"]
      explanation: "Слово 'наразі' підходить для опису процесу, який ще не завершено."
    - sentence: "... суспільство стикається з абсолютно новими викликами."
      answer: "нині"
      options: ["нині", "зараз", "щойно", "колись"]
      explanation: "Слово 'нині' додає публіцистичного звучання опису глобальних процесів."

- type: true-false
  title: "Правильно чи неправильно"
  instruction: "Визначте, чи є коректним вживання виділених слів у реченнях."
  items:
    - statement: "Фраза 'Зараз я живу в Києві' є стилістично бездоганною."
      correct: false
      explanation: "Проживання у місті - це тривалий стан, тому правильно сказати 'Тепер я живу в Києві'."
    - statement: "Слово 'наразі' належить переважно до офіційно-ділового та наукового стилів."
      correct: true
      explanation: "Так, слово 'наразі' підкреслює тимчасовість і є ознакою високої мовної культури."
    - statement: "Конструкція 'в даний момент' є питомо українською і рекомендованою до вживання."
      correct: false
      explanation: "Це калька з російської мови. Її слід замінювати на 'зараз', 'тепер' або 'наразі'."
    - statement: "Слово 'щойно' позначає подію, яка відбулася в дуже далекому минулому."
      correct: false
      explanation: "Слово 'щойно' означає дію, яка завершилася буквально кілька хвилин або годин тому."
    - statement: "Прислівник 'нині' має виразний урочистий, публіцистичний характер."
      correct: true
      explanation: "Так, слово 'нині' часто використовується для підкреслення історичної масштабності."
    - statement: "Вираз 'колись-то' має сильний емоційний, фольклорний відтінок."
      correct: true
      explanation: "Частка '-то' додає слову 'колись' ностальгійного або казкового звучання."
    - statement: "Слово 'зараз' ідеально підходить для опису глобальних змін клімату на планеті."
      correct: false
      explanation: "Для глобальних тривалих змін краще використовувати 'тепер' або 'нині'."
    - statement: "Слово 'відтепер' вказує на початок нового періоду або дію нових правил."
      correct: true
      explanation: "Слово 'відтепер' чітко розмежовує минуле і нову реальність."
    - statement: "Ми можемо використати слово 'колись' як для опису минулого, так і майбутнього."
      correct: true
      explanation: "Так, 'колись' може означати як давнє минуле, так і невизначений момент у майбутньому."
    - statement: "Фраза 'Наразі ми обідаємо' звучить абсолютно природно в домашній обстановці."
      correct: false
      explanation: "Слово 'наразі' - це офіційно-ділове слово, воно звучить штучно в побутовій розмові."

- type: quiz
  title: "Перевірте свої знання про часові синоніми"
  instruction: "Оберіть одну правильну відповідь на кожне запитання."
  items:
    - question: "Яке слово найкраще підходить для позначення дії, що відбувається безпосередньо в секунду вашого мовлення?"
      explanation: "Слово 'зараз' фокусує увагу на точці на часовій осі, яка збігається з моментом мовлення."
      options:
        - text: "зараз"
          correct: true
        - text: "тепер"
          correct: false
        - text: "наразі"
          correct: false
        - text: "нині"
          correct: false
