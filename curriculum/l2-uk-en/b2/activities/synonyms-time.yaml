          correct: false
    - question: "Яким словом ви повідомите колегам, що лист від важливого клієнта прийшов буквально хвилину тому?"
      explanation: "Слово 'щойно' вказує на події, які відбулися у негайному минулому, дуже близько до моменту мовлення."
      options:
        - text: "щойно"
          correct: true
        - text: "зараз"
          correct: false
        - text: "тепер"
          correct: false
        - text: "колись"
          correct: false
    - question: "Яка лексична помилка виникає, коли студенти дослівно перекладають англійське 'now' словом 'зараз' у всіх випадках?"
      explanation: "Це призводить до ігнорування слова 'тепер' і втрати стилістичної різниці між миттю та епохою."
      options:
        - text: "нерозуміння різниці масштабів між миттєвою дією та тривалим періодом"
          correct: true
        - text: "неправильне використання відмінків іменників"
          correct: false
        - text: "порушення порядку слів у складному реченні"
          correct: false
        - text: "використання застарілої лексики"
          correct: false
    - question: "Як найкраще пояснити іноземцю різницю між прислівниками 'тепер' і 'зараз' в українській мові?"
      explanation: "Слово 'зараз' позначає мить, тоді як слово 'тепер' позначає тривалу ситуацію."
      options:
        - text: "зараз вказує на поточну мить, а тепер описує ширшу життєву реальність"
          correct: true
        - text: "зараз вживається лише в минулому часі, а тепер у майбутньому"
          correct: false
        - text: "між цими словами немає жодної стилістичної чи лексичної різниці"
          correct: false
        - text: "зараз використовується в офіційних текстах, а тепер - у розмовних"
          correct: false

- type: unjumble
  title: "Відновіть порядок слів у реченнях"
  instruction: "Розташуйте слова так, щоб утворилося граматично правильне речення."
  items:
    - words: ["ми", "зараз", "активно", "обговорюємо", "цей", "дуже", "складний", "археологічний", "проєкт"]
      answer: "Ми зараз активно обговорюємо цей дуже складний археологічний проєкт"
    - words: ["після", "переїзду", "до", "столиці", "вона", "тепер", "працює", "в", "великому", "музеї"]
      answer: "Після переїзду до столиці вона тепер працює в великому музеї"
    - words: ["уряд", "повідомив", "що", "наразі", "немає", "жодних", "підстав", "для", "зупинки", "досліджень"]
      answer: "Уряд повідомив що наразі немає жодних підстав для зупинки досліджень"
    - words: ["наша", "команда", "дослідників", "щойно", "завершила", "розкопки", "стародавнього", "поселення"]
      answer: "Наша команда дослідників щойно завершила розкопки стародавнього поселення"
    - words: ["відтепер", "всі", "важливі", "наукові", "звіти", "будуть", "публікуватися", "у", "відкритому", "доступі"]
      answer: "Відтепер всі важливі наукові звіти будуть публікуватися у відкритому доступі"
    - words: ["нині", "українські", "археологи", "відіграють", "надзвичайно", "важливу", "роль", "у", "світовій", "науці"]
      answer: "Нині українські археологи відіграють надзвичайно важливу роль у світовій науці"
    - words: ["на", "місці", "цього", "сучасного", "міста", "колись", "давном-давно", "існувала", "велика", "фортеця"]
      answer: "На місці цього сучасного міста колись давном-давно існувала велика фортеця"
    - words: ["я", "зараз", "уважно", "читаю", "цю", "цікаву", "статтю", "про", "минуле", "України"]
      answer: "Я зараз уважно читаю цю цікаву статтю про минуле України"

