        - text: "наразі"
          correct: true
        - text: "тепер"
          correct: true
        - text: "колись"
          correct: false
        - text: "відтепер"
          correct: false
    - question: "У яких реченнях доречно використати слово 'зараз'?"
      min_correct: 2
      explanation: "Слово 'зараз' позначає миттєву дію: розмову, читання, тощо."
      options:
        - text: "Я зараз п'ю каву."
          correct: true
        - text: "Ми зараз обговорюємо ваш проєкт."
          correct: true
        - text: "Я зараз працюю лікарем у лікарні вже п'ять років."
          correct: false
        - text: "Зараз вона живе в Італії."
          correct: false
    - question: "Які слова підходять для офіційного звіту керівництву?"
      min_correct: 2
      explanation: "Слова 'наразі' та 'нині' належать до офіційного та публіцистичного стилів."
      options:
        - text: "наразі"
          correct: true
        - text: "нині"
          correct: true
        - text: "колись-то"
          correct: false
        - text: "в даний момент"
          correct: false
    - question: "Як можна описати подію, що сталася дуже давно?"
      min_correct: 2
      explanation: "Вирази 'колись давно' і 'у давнину' - чудові наративні маркери."
      options:
        - text: "колись давно"
          correct: true
        - text: "у давнину"
          correct: true
        - text: "щойно"
          correct: false
        - text: "наразі"
          correct: false
    - question: "Які фрази підкреслюють початок нового життєвого етапу?"
      min_correct: 2
