        - text: "відтепер я буду вчити мову"
          correct: true
        - text: "щойно я вирішив"
          correct: false
        - text: "наразі ми працюємо"
          correct: false
    - question: "Які слова мають емоційне або урочисте забарвлення?"
      min_correct: 2
      explanation: "Слово 'нині' звучить урочисто, а вираз 'колись-то' - емоційно та фольклорно."
      options:
