      explanation: "Слово 'наразі' є ідеальним для офіційно-ділового стилю і сигналізує, що ситуація тимчасова."
      options:
        - text: "наразі"
          correct: true
        - text: "зараз"
          correct: false
        - text: "щойно"
          correct: false
        - text: "колись"
          correct: false
