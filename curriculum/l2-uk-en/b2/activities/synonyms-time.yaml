      explanation: "Слово 'відтепер' позначає чітку межу, з якої починає діяти нова реальність або нові правила."
      options:
        - text: "відтепер"
          correct: true
        - text: "щойно"
          correct: false
        - text: "зараз"
          correct: false
        - text: "наразі"
          correct: false
    - question: "Що рекомендують мовознавці робити з виразом 'в даний момент', який часто зустрічається в документах?"
      explanation: "Цей вираз є калькою і його потрібно замінювати на природні українські слова залежно від контексту."
      options:
        - text: "уникати його та замінювати на автентичні синоніми"
          correct: true
        - text: "використовувати його лише в усній розмові"
          correct: false
        - text: "вживати його в усіх офіційних документах"
          correct: false
        - text: "писати його через дефіс для кращого звучання"
          correct: false
    - question: "Яке з наведених слів додасть вашій публіцистичній статті найбільш урочистого та піднесеного історичного звучання?"
      explanation: "Слово 'нині' має виразний публіцистичний та епічний характер порівняно з іншими синонімами."
      options:
        - text: "нині"
          correct: true
        - text: "зараз"
          correct: false
        - text: "тепер"
          correct: false
        - text: "сьогодні"
          correct: false
    - question: "Якщо археолог розповідає про події Київської Русі без прив'язки до точного року, яке слово буде найдоречнішим?"
      explanation: "Слово 'колись' є універсальним інструментом для розповіді про минуле, точна дата якого невідома."
      options:
        - text: "колись"
          correct: true
        - text: "щойно"
          correct: false
        - text: "наразі"
          correct: false
        - text: "зараз"
          correct: false
    - question: "Чому фраза 'Нині я піду в магазин за хлібом' викликатиме посмішку в носіїв мови?"
      explanation: "Слово 'нині' має високий публіцистичний стиль, що створює комічний дисонанс із побутовою ситуацією."
      options:
        - text: "через невідповідність високого стилю та побутового змісту"
