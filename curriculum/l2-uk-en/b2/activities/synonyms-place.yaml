- type: reading
  title: "Первинне джерело: Записки урбаніста"
  instruction: "Прочитайте короткий текст та дайте відповіді на запитання."
  text: |
    Коли я проєктую новий громадський простір, я завжди звертаю увагу на те, як люди використовують слова 'тут' і 'там'. Для мешканців їхній двір — це завжди безпечне 'тут', а галаслива вулиця за парканом — це вже невідоме 'там'. Якщо ми хочемо, щоб люди відчували себе комфортно, ми повинні розширити межі їхнього 'тут'. Це означає, що поріг між приватним і публічним простором має бути непомітним. Наприклад, ми часто використовуємо прозорі двері та широкі тротуари. Коли людина йде сюди, до парку, вона має відчувати гостинність середовища. І навпаки, коли вона прямує туди, у бік великого проспекту, вона має інтуїтивно розуміти, як змінити свій маршрут для безпеки.
  tasks:
    - "Що для мешканців означає двір, а що — галаслива вулиця?"
    - "Як архітектори намагаються розширити межі безпечного простору?"
    - "Які архітектурні елементи допомагають зробити поріг непомітним?"
    - "Як має відчувати себе людина, яка йде до парку?"

- type: fill-in
  title: "Практичне застосування: Вставте пропущене слово"
  instruction: "Оберіть правильний просторовий прислівник для кожного речення."
  items:
    - sentence: "Ми домовилися зустрітися ____ біля головного входу до театру."
      answer: "тут"
      options: ["тут", "сюди", "туди", "там"]
      explanation: "Статичне розташування місця зустрічі."
    - sentence: "Негайно підійдіть ____, мені потрібно показати вам креслення."
      answer: "сюди"
      options: ["тут", "сюди", "туди", "там"]
      explanation: "Напрямок руху до мовця."
    - sentence: "Мої батьки вже багато років живуть ____, у чудовому місті Львові."
      answer: "там"
      options: ["тут", "сюди", "туди", "там"]
      explanation: "Віддалене статичне розташування."
    - sentence: "Наступного літа ми твердо плануємо поїхати ____, у Карпати."
      answer: "туди"
      options: ["тут", "сюди", "туди", "там"]
      explanation: "Напрямок руху від мовця до віддаленої точки."
    - sentence: "Дивіться ____, за тим пагорбом видніються куполи монастиря!"
      answer: "онде"
      options: ["онде", "туди", "сюди", "тутечки"]
      explanation: "Вказування на віддалений, але видимий об'єкт."
    - sentence: "Мій дідусь народився і виріс у цьому селі, він ____ житель."
      answer: "тутешній"
      options: ["тутешній", "тамтешній", "місце", "простір"]
      explanation: "Прикметник, що означає приналежність до певної місцевості."
    - sentence: "Сідай ____ біля теплої печі, я наллю тобі гарячого чаю."
      answer: "тутечки"
      options: ["тутечки", "тамтечки", "онде", "на цьому місці"]
      explanation: "Емоційно забарвлене зменшувально-пестливе слово для опису близького місця."
    - sentence: "Я так давно не був у нашому старому дворі, ми ____ часто грали у футбол."
      answer: "тамтечки"
      options: ["тамтечки", "тутечки", "онде", "сюди"]
      explanation: "Ностальгійне зменшувально-пестливе слово для віддаленого в часі і просторі місця."
    - sentence: "Поставте свій підпис рівно ____, у правому нижньому куті документа."
      answer: "ось тут"
      options: ["ось тут", "тут", "онде", "на цьому місці"]
      explanation: "Емфатичне вказування на точну локацію."
    - sentence: "Згідно з архівами, у минулому столітті ____ височіла велична ратуша."
      answer: "на цьому місці"
      options: ["на цьому місці", "ось тут", "тутечки", "там"]
      explanation: "Офіційний протокольний вираз для фіксації локації."
    - sentence: "Українці вважають, що не можна вітатися через ____, бо це призведе до сварки."
      answer: "поріг"
      options: ["поріг", "двері", "вікно", "коридор"]
      explanation: "Сакральна межа між домом і зовнішнім світом."
    - sentence: "Новий комерційний центр буде побудований саме ____, біля станції метро."
      answer: "ось тут"
      options: ["ось тут", "сюди", "туди", "онде"]
      explanation: "Точна фіксація розташування на плані чи мапі."
    - sentence: "Перенесіть ці важкі коробки ____ у куток, щоб вони нікому не заважали."
      answer: "сюди"
      options: ["сюди", "тут", "там", "онде"]
      explanation: "Динамічний напрямок до мовця або визначеного ним місця поблизу."
    - sentence: "Не йдіть ____ через внутрішній двір, там зараз ведуться ремонтні роботи."
      answer: "туди"
      options: ["туди", "там", "сюди", "тут"]
      explanation: "Заборона руху у віддаленому напрямку."

- type: true-false
  title: "Розуміння значень: Статика чи динаміка?"
  instruction: "Визначте, чи є твердження правильним, опираючись на лексичні правила."
  items:
    - statement: "Прислівник 'тут' використовується виключно для позначення динамічного напрямку руху."
      correct: false
      explanation: "Прислівник 'тут' позначає статичне місцеперебування."
    - statement: "Фраза 'йди тут' є граматично правильною, якщо ви хочете покликати людину до себе."
      correct: false
      explanation: "Правильно казати 'йди сюди', оскільки дієслово руху вимагає прислівника напрямку."
    - statement: "Слово 'сюди' відповідає на питання 'куди?' і завжди пов'язане з переміщенням."
      correct: true
      explanation: "Так, 'сюди' — це динамічний вектор у бік мовця."
    - statement: "Слово 'тутешній' має більш емоційне та культурне забарвлення, ніж нейтральне 'локальний'."
      correct: true
      explanation: "Воно символізує органічну приналежність до спільноти."
    - statement: "Прислівник 'онде' використовується для опису об'єктів, яких мовець не може побачити."
      correct: false
      explanation: "'Онде' використовується для вказування на віддалені, але видимі об'єкти."
    - statement: "Конструкція 'на цьому місці' характерна для офіційного, протокольного або наукового стилю."
      correct: true
      explanation: "Вона додає тексту академічної солідності та поважності."
    - statement: "Слово 'тутечки' належить до суворого ділового стилю спілкування."
      correct: false
      explanation: "'Тутечки' — це розмовне, зменшувально-пестливе слово."
    - statement: "Прислівник 'тамтечки' викликає асоціації з ностальгією за далеким, але рідним місцем."
      correct: true
      explanation: "Це слово часто використовують для теплих спогадів про минуле."
    - statement: "Вираз 'ось тут' допомагає точно і беззаперечно вказати на конкретну точку на мапі чи в документі."
      correct: true
      explanation: "Вказівна частка 'ось' діє як лінгвістична указка."
    - statement: "В українській традиції вважається доброю прикметою передавати речі через поріг."
      correct: false
      explanation: "Це суворе табу: передавати речі через поріг заборонено."
    - statement: "Дієслова руху (йти, їхати, бігти) завжди поєднуються зі словами 'сюди' або 'туди', а не 'тут' чи 'там'."
      correct: true
      explanation: "Рух вимагає динамічних векторів."
    - statement: "Фразеологізм 'сюди-туди' означає абсолютний спокій та нерухомість."
      correct: false
      explanation: "Він означає безперервний, часто хаотичний рух в обох напрямках."
    - statement: "Прислівник 'там' позначає статичну локацію, яка перебуває далеко від мовця."
      correct: true
      explanation: "Так, це констатація факту перебування об'єкта на відстані."
    - statement: "Слово 'поріг' в українській культурі завжди було просто звичайною архітектурною деталлю без додаткових значень."
      correct: false
      explanation: "Поріг — це потужна сакральна межа між безпечним домом і зовнішнім світом."

- type: unjumble
  title: "Складіть речення: Простір міста"
  instruction: "Відновіть правильний порядок слів у реченнях про міську навігацію."
  items:
    - words: ["ми", "зустрінемося", "тут", "о", "шостій", "годині", "вечора"]
      answer: "Ми зустрінемося тут о шостій годині вечора"
    - words: ["швидко", "підійдіть", "сюди", "до", "мого", "робочого", "столу"]
      answer: "Швидко підійдіть сюди до мого робочого столу"
    - words: ["тутешні", "мешканці", "завжди", "збираються", "на", "цій", "площі"]
      answer: "Тутешні мешканці завжди збираються на цій площі"
    - words: ["новий", "комерційний", "центр", "побудують", "саме", "ось", "тут"]
      answer: "Новий комерційний центр побудують саме ось тут"
    - words: ["ми", "залишили", "нашу", "машину", "там", "на", "великому", "паркінгу"]
      answer: "Ми залишили нашу машину там на великому паркінгу"
    - words: ["наступного", "літа", "ми", "плануємо", "поїхати", "туди", "в", "гори"]
      answer: "Наступного літа ми плануємо поїхати туди в гори"
    - words: ["дивіться", "онде", "за", "тим", "пагорбом", "видніється", "старий", "монастир"]
      answer: "Дивіться онде за тим пагорбом видніється старий монастир"
    - words: ["згідно", "з", "документами", "на", "цьому", "місці", "стояла", "ратуша"]
      answer: "Згідно з документами на цьому місці стояла ратуша"
    - words: ["мій", "керівник", "цілу", "годину", "ходив", "кабінетом", "сюди-туди"]
      answer: "Мій керівник цілу годину ходив кабінетом сюди-туди"
    - words: ["в", "україні", "не", "заведено", "вітатися", "через", "поріг", "дверей"]
      answer: "В Україні не заведено вітатися через поріг дверей"

- type: error-correction
  title: "Виправте помилку: Навігація та рух"
  instruction: "Знайдіть і виправте лексичну або граматичну помилку в кожному реченні."
  items:
    - sentence: "Хлопчику, йди тут до мене, я маю для тебе подарунок."
      error: "тут"
      answer: "сюди"
      error_type: "word"
      options: ["сюди", "онде", "там", "туди"]
      explanation: "Дієслово руху 'йти' вимагає динамічного прислівника напрямку 'сюди', а не статичного 'тут'."
    - sentence: "Ми домовилися зустрітися сюди о шостій годині вечора."
      error: "сюди"
      answer: "тут"
      error_type: "word"
      options: ["тут", "туди", "онде", "тамтечки"]
      explanation: "Зустріч в конкретному місці передбачає статику, тому використовуємо 'тут'."
    - sentence: "Я хочу поїхати там наступного літа, щоб побачити гори."
      error: "там"
      answer: "туди"
      error_type: "word"
      options: ["туди", "сюди", "онде", "тут"]
      explanation: "Для напрямку руху геть від мовця потрібно використовувати 'туди'."
    - sentence: "Він залишив свій рюкзак туди на зупинці."
      error: "туди"
      answer: "там"
      error_type: "word"
      options: ["там", "сюди", "онде", "тутечки"]
      explanation: "Рюкзак лежить нерухомо далеко від нас, це статичне положення 'там'."
    - sentence: "Локальні мешканці добре знають історію цього району."
      error: "Локальні"
      answer: "Тутешні"
      error_type: "word"
      options: ["Тутешні", "Тамтешні", "Онде", "Тутечки"]
      explanation: "Слово 'тутешні' краще передає глибокий зв'язок людей зі своєю громадою та землею."
    - sentence: "Поставте свій підпис рівно на цьому місці, у правому куті."
      error: "на цьому місці"
      answer: "ось тут"
      error_type: "phrase"
      options: ["ось тут", "тамтечки", "сюди-туди", "он там"]
      explanation: "Для точного вказування на документі використовується емфатичне 'ось тут'."
    - sentence: "Він нервував і ходив по кімнаті там-сям."
      error: "там-сям"
      answer: "сюди-туди"
      error_type: "phrase"
      options: ["сюди-туди", "тут-там", "онде-ось", "тутечки-тамтечки"]
      explanation: "Стійкий вираз для позначення хаотичного руху — 'сюди-туди'."
    - sentence: "Я так люблю бувати в нашому селі, ми онде проводили літо."
      error: "онде"
      answer: "тамтечки"
      error_type: "word"
      options: ["тамтечки", "сюди", "на цьому місці", "ось тут"]
      explanation: "Для емоційного опису віддаленого в минулому і просторі місця використовується 'тамтечки'."
    - sentence: "Дивіться сюди, за тим пагорбом летить великий птах!"
      error: "сюди"
      answer: "онде"
      error_type: "word"
      options: ["онде", "тут", "тутечки", "тамтечки"]
      explanation: "Щоб візуально вказати на віддалений видимий об'єкт, використовуємо 'онде' або 'он там'."
    - sentence: "Просто киньте ці речі через двері, і я їх заберу."
      error: "через двері"
      answer: "через поріг"
      error_type: "phrase"
      options: ["через поріг", "через вікно", "на цьому місці", "сюди-туди"]
      explanation: "Українське культурне табу стосується саме передавання речей 'через поріг'."

