- type: reading
  title: 'Первинне джерело: Ескалація щодо проєкту Альфа'
  instruction: Прочитайте наведений діловий лист та дайте відповіді на запитання,
    щоб перевірити розуміння.
  text: 'Шановний пане Дмитре! Звертаюся до вас щодо етапу міграції даних у проєкті
    «Альфа». Згідно з нашим договором від 12 травня, цей етап мав бути завершений
    до кінця поточного тижня. Проте з вашого вчорашнього звіту випливає, що роботи
    виконані лише на шістдесят відсотків. Ми змушені висунути офіційну претензію щодо
    недотримання графіка. Ця затримка створює критичні ризики для фінального релізу.
    Просимо вас до 15:00 сьогоднішнього дня надати оновлений план дій та інформацію
    щодо залучення додаткових ресурсів для розв''язання проблеми. Сподіваємося на
    ваше розуміння ситуації та оперативну реакцію.

    '
  tasks:
  - Яка основна мета написання цього електронного листа?
  - Який факт змусив відправника висунути офіційну претензію?
  - Чому затримка на поточному етапі є критичною для всього проєкту?
  - Яких саме дій вимагає автор листа від компанії-підрядника до кінця дня?
- type: true-false
  title: 'Правила та етикет: Правда чи міф?'
  instruction: Визначте, які твердження про ділове листування є правильними.
  items:
  - statement: Відкрита копія (CC) використовується для того, щоб усі учасники обов'язково
      відповіли на лист.
    correct: false
    explanation: Люди в копії читають лист лише для інформації і не зобов'язані відповідати.
  - statement: Прихована копія (BCC) часто застосовується для масових розсилок, щоб
      зберегти конфіденційність адрес.
    correct: true
    explanation: Це головна функція BCC — захист персональних даних одержувачів.
  - statement: Використання кнопки Відповісти всім є обов'язковим стандартом для будь-якої
      відповіді.
    correct: false
    explanation: Її слід використовувати лише тоді, коли інформація критично важлива
      для кожного учасника.
  - statement: Метод сендвіча передбачає розміщення конструктивної критики між двома
      позитивними повідомленнями.
    correct: true
    explanation: Такий підхід знижує захисні бар'єри та допомагає зберегти партнерські
      стосунки.
  - statement: Займенник Ви з великої літери слід вживати щоразу, коли ви звертаєтеся
      до групи колег.
    correct: false
    explanation: З великої літери Ви пишеться лише при поважному звертанні до однієї
      конкретної особи.
  - statement: Правило 24 годин означає, що відповідь на діловий лист має бути надіслана
      протягом однієї робочої доби.
    correct: true
    explanation: Це загальноприйнятий стандарт швидкості опрацювання кореспонденції
      в бізнесі.
  - statement: Якщо питання складне, достатньо просто ігнорувати лист, поки не буде
      готове остаточне рішення.
    correct: false
    explanation: Необхідно надіслати лист-підтвердження про отримання і вказати очікуваний
      час відповіді.
  - statement: Тема листа повинна бути максимально короткою та інтригуючою, наприклад
      Важливо або Прочитати.
    correct: false
    explanation: Тема має бути конкретною та інформативною, щоб легко знайти лист
      у майбутньому.
  - statement: Використання пасивного стану робить діловий лист більш професійним
      та переконливим.
    correct: false
    explanation: Сучасна ділова мова тяжіє до активних дієслів, які показують відповідальність
      та дію.
  - statement: Фраза приймати участь є калькою, яку слід завжди замінювати на брати
      участь.
    correct: true
    explanation: Українською мовою участь беруть, а не приймають.
- type: quiz
  title: Оберіть правильний варіант
  instruction: Виберіть найкращий варіант відповіді для кожної із запропонованих ситуацій.
  items:
  - question: Який інструмент слід обрати, якщо ви надсилаєте запрошення на вебінар
      сотні клієнтів?
    explanation: Прихована копія гарантує збереження конфіденційності адрес клієнтів.
    options:
    - text: прихована копія
      correct: true
    - text: відкрита копія
      correct: false
    - text: пряме повідомлення кожному
      correct: false
    - text: кнопка відповісти всім
      correct: false
  - question: Як правильно звернутися до колег на початку ділового листа, використовуючи
      займенник?
    explanation: При зверненні до кількох осіб займенник завжди пишеться з малої літери.
    options:
    - text: Шановні колеги, запрошуємо вас...
      correct: true
    - text: Шановні колеги, запрошуємо Вас...
      correct: false
    - text: Шановні Колеги, просимо Вас...
      correct: false
    - text: Колеги, запрошуємо Вашу команду...
      correct: false
  - question: Яка конструкція є найкращою для ввічливого пом'якшення відмови у спілкуванні?
    explanation: Ця фраза поєднує ввічливість та твердість, посилаючись на об'єктивні
      обставини.
    options:
    - text: Змушені констатувати, що ми не можемо...
      correct: true
    - text: Ми категорично не згодні з тим, що...
      correct: false
    - text: Ваша пропозиція нас взагалі не влаштовує...
      correct: false
    - text: Ми відмовляємося приймати ваші умови...
      correct: false
  - question: Який варіант є правильним перекладом російської кальки згідно договору?
    explanation: Прийменник згідно завжди вимагає конструкції з орудним відмінком.
    options:
    - text: згідно з договором
      correct: true
    - text: згідно до договору
      correct: false
    - text: відповідно з договором
      correct: false
    - text: по договору
      correct: false
  - question: Як граматично правильно утворити кличний відмінок від чоловічого імені
      Максим?
    explanation: Чоловічі імена, що закінчуються на твердий приголосний, у кличному
      відмінку мають закінчення -е.
    options:
    - text: пане Максиме
      correct: true
    - text: пане Максим
      correct: false
    - text: пане Максиму
      correct: false
    - text: пану Максиму
      correct: false
  - question: Що слід зробити, якщо ви не можете відповісти на складний запит протягом
      доби?
    explanation: Це ключове правило етикету для керування очікуваннями вашого партнера.
    options:
    - text: Надіслати лист-підтвердження про отримання та вказати термін відповіді.
      correct: true
    - text: Зачекати три дні і надіслати одразу розгорнуту відповідь.
      correct: false
    - text: Переслати лист керівнику без попередження самого клієнта.
      correct: false
    - text: Зателефонувати клієнту і попросити більше не писати на цю тему.
      correct: false
  - question: Яке з цих слів є плеоназмом у словосполученні спільне співробітництво?
    explanation: Слово співробітництво вже за своєю природою містить поняття спільності
      дій.
    options:
    - text: спільне
      correct: true
    - text: співробітництво
      correct: false
    - text: обидва слова
      correct: false
    - text: жодне зі слів
      correct: false
  - question: Яка головна професійна мета використання листа-претензії у бізнес-середовищі?
    explanation: Претензія має на меті відновити справедливість та вимагати виконання
      умов.
    options:
    - text: Офіційно вимагати усунення порушень та виконання домовленостей.
      correct: true
    - text: Висловити особисте емоційне розчарування діями свого партнера.
      correct: false
    - text: Повідомити про розірвання будь-яких ділових стосунків назавжди.
      correct: false
    - text: Попросити вибачення за технічні помилки власної команди.
      correct: false
  - question: Що саме означає українське дієслово узгодити в контексті ділового листування?
    explanation: Процес узгодження передбачає детальне обговорення та досягнення спільної
      згоди.
    options:
    - text: Обговорити проблему та дійти спільної згоди щодо деталей.
      correct: true
    - text: Повністю відмовитися від подальшої співпраці з партнером.
      correct: false
    - text: Написати скаргу на дуже неякісне та повільне обслуговування.
      correct: false
    - text: Успішно перекласти відповідальність на працівників іншого відділу.
      correct: false
  - question: Яку тему ділового листа найкраще обрати для надсилання нових графіків
      постачання?
    explanation: Професійна тема має бути конкретною та одразу відображати суть повідомлення.
    options:
    - text: Оновлений графік постачання на листопад поточного року
      correct: true
    - text: Дуже важливо! Графіки, які потрібно терміново переглянути!
      correct: false
    - text: Документи для ознайомлення від нашого логістичного відділу
      correct: false
    - text: Щодо нашої вчорашньої короткої розмови про логістику
      correct: false
- type: match-up
  title: 'Знайдіть пару: Калька та правильний варіант'
  instruction: З'єднайте неправильний вислів (кальку або плеоназм) із правильною українською
    формою.
  pairs:
  - left: приймати участь
    right: брати участь
  - left: вірна відповідь
    right: правильна відповідь
  - left: спільне співробітництво
    right: співробітництво
  - left: вільна вакансія
    right: вакансія
  - left: головний лейтмотив
    right: лейтмотив
  - left: згідно договору
    right: згідно з договором
  - left: відповідно з законом
    right: відповідно до закону
  - left: слідуючий тиждень
    right: наступний тиждень
  - left: любе питання
    right: будь-яке питання
  - left: відноситися до справи
    right: стосуватися справи
- type: fill-in
  title: Вставте пропущені слова
  instruction: Оберіть правильне слово або професійний термін для завершення кожного
    речення.
  items:
  - sentence: Прошу уважно перевірити всі документи, які знаходяться у ___ до цього
      електронного листа.
    answer: вкладенні
    options:
    - вкладенні
    - скарзі
    - копії
    - темі
    explanation: Електронні документи зазвичай додаються як вкладення до листа.
  - sentence: Якщо ви не встигаєте відповісти по суті, надішліть хоча б короткий ___.
    answer: лист-підтвердження
    options:
    - лист-підтвердження
    - лист-претензію
    - договір
    - звіт
    explanation: Лист-підтвердження показує, що ви отримали повідомлення і працюєте
      над ним.
  - sentence: Ми змушені висунути офіційну ___, оскільки ваша компанія порушила терміни
      постачання.
    answer: претензію
    options:
    - претензію
    - подяку
    - пропозицію
    - вакансію
    explanation: У разі серйозного порушення умов договору офіційно висувається претензія.
  - sentence: Нам необхідно детально ___ всі технічні нюанси перед остаточним підписанням
      контракту.
    answer: узгодити
    options:
    - узгодити
    - приховати
    - порушити
    - ескалювати
    explanation: Важливі деталі проєкту перед початком робіт обов'язково узгоджуються
      між сторонами.
  - sentence: Цей проєкт вимагає дуже глибокого розуміння такого ___, як інформаційна
      безпека.
    answer: поняття
    options:
    - поняття
    - вкладення
    - графіка
    - терміну
    explanation: Інформаційна безпека — це складне технічне поняття.
  - sentence: Наша компанія завжди готова активно ___ у важливих щорічних галузевих
      конференціях.
    answer: брати участь
    options:
    - брати участь
    - приймати участь
    - робити участь
    - мати участь
    explanation: Правильна нормативна українська форма — брати участь.
  - sentence: Щира ___ за ваше терпіння та розуміння ситуації з затримкою фінансування.
    answer: подяка
    options:
    - подяка
    - скарга
    - копія
    - відмова
    explanation: Подяка допомагає згладити напругу у дуже складних комунікаційних
      ситуаціях.
  - sentence: Ми завжди сподіваємося на довгострокове та плідне ___ між нашими корпораціями.
    answer: співробітництво
    options:
    - співробітництво
    - конфліктування
    - запізнення
    - непорозуміння
    explanation: Усі компанії зазвичай прагнуть до взаємовигідного співробітництва.
  - sentence: На жаль, підрядник не зміг завершити етап розробки у визначений договором
      ___.
    answer: термін
    options:
    - термін
    - мотив
    - прейскурант
    - договір
    explanation: Часові межі виконання робіт в бізнесі називаються терміном.
  - sentence: Клієнт вирішив офіційно подати ___, оскільки якість наданих послуг не
      відповідала заявленим стандартам.
    answer: скаргу
    options:
    - скаргу
    - подяку
    - премію
    - пропозицію
    explanation: Невідповідність якості стандартам є прямою підставою для подання
      скарги.
- type: error-correction
  title: Знайдіть та виправте русизми і стилістичні помилки
  instruction: Виберіть слово чи фразу, що містить помилку, та вкажіть правильний
    варіант.
  items:
  - sentence: Ми раді запропонувати вам спільне співробітництво у сфері новітніх технологій.
    error: спільне співробітництво
    answer: співробітництво
    error_type: phrase
    options:
    - співробітництво
    - спільне товариство
    - спільну роботу
    - спільне відношення
    explanation: Слово співробітництво вже означає спільну дію, тому додавати спільне
      — це плеоназм.
  - sentence: Сподіваємося, що клієнт дасть вірну відповідь на всі поставлені запитання
      нашої анкети.
    error: вірну
    answer: правильну
    error_type: word
    options:
    - правильну
    - точну
    - чітку
    - справедливу
    explanation: Вірним може бути собака або друг, а відповідь — лише правильною.
  - sentence: Щиро просимо вас прийняти участь у важливому обговоренні нашого нового
      проєкту.
    error: прийняти
    answer: брати
    error_type: word
    options:
    - брати
    - взяти
    - робити
    - мати
    explanation: Українською мовою участь тільки беруть, а не приймають.
  - sentence: Згідно договору оренди, ми маємо повне право на компенсацію непередбачуваних
      збитків.
    error: Згідно договору
    answer: Згідно з договором
    error_type: phrase
    options:
    - Згідно з договором
    - Відповідно з договором
    - По договору
    - Для договору
    explanation: Прийменник згідно завжди вимагає конструкції з орудним відмінком
      (з ким? з чим?).
  - sentence: Повідомляємо, що у нас з'явилася одна вільна вакансія у фінансовому
      відділі компанії.
    error: вільна вакансія
    answer: вакансія
    error_type: phrase
    options:
    - вакансія
    - вільна посада
    - вільне місце
    - нова посада
    explanation: Слово вакансія у перекладі вже означає вільну посаду, тому це типовий
      плеоназм.
  - sentence: Шановний пане Дмитро, ми вже отримали ваш терміновий запит і зараз працюємо
      над ним.
    error: Дмитро
    answer: Дмитре
    error_type: word
    options:
    - Дмитре
    - Дмитром
    - Дмитрі
    - Дмитру
    explanation: 'У шанобливому звертанні до людини необхідно використовувати форму
      кличного відмінка: пане Дмитре.'
  - sentence: Цей пункт взагалі ніяк не відноситься до теми нашої сьогоднішньої професійної
      дискусії.
    error: відноситься
    answer: стосується
    error_type: word
    options:
    - стосується
    - належить
    - застосовується
    - приєднується
    explanation: Калька відноситься у значенні мати відношення завжди перекладається
      українською як стосуватися.
  - sentence: Ми змушені перенести нашу важливу зустріч на слідуючий робочий вівторок.
    error: слідуючий
    answer: наступний
    error_type: word
    options:
    - наступний
    - другий
    - новий
    - подальший
    explanation: Слідуючий — це груба калька, правильно казати наступний день чи тиждень.
