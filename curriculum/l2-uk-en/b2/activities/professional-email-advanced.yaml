  title: 'Практичне завдання: Написання претензії'
  prompt: 'Уявіть, що компанія-підрядник порушила ключовий термін здачі проєкту на
    два тижні. Напишіть офіційний лист-претензію обсягом не менше 150 слів. Використайте
    "Метод сендвіча" (почніть з подяки за минуле співробітництво), чітко вкажіть на
    порушення договору, вимагайте надати оновлений графік дій і завершіть висловленням
    надії на оперативне розв''язання проблеми. Обов''язково використайте слова: термін,
    претензія, узгодити, брати участь.'
  min_words: 150
  model_answer: 'Шановний пане Олеже!


    Щиро дякуємо вашій команді за те, що ви продовжуєте брати участь у розробці нашого
    спільного продукту. Ми високо цінуємо ваше попереднє плідне співробітництво та
    великий професіоналізм, який ви продемонстрували на перших етапах роботи.


    Водночас ми змушені звернутися до вас щодо поточного етапу тестування. Згідно
    з нашим договором, цей етап мав бути повністю завершений до 15 жовтня. Проте на
    сьогодні ми фіксуємо затримку на понад два тижні. Цей термін є абсолютно критичним
    для загального графіка фінального релізу нашої програми. У зв''язку з цим ми змушені
    висунути офіційну претензію щодо недотримання попередніх домовленостей.


    Просимо вас до кінця завтрашнього робочого дня надати офіційні письмові пояснення
    щодо об''єктивних причин затримки та надіслати оновлений план дій. Нам необхідно
    терміново узгодити нові дати, щоб уникнути подальших фінансових втрат для обох
    сторін.


    Ми впевнені, що ваш багаторічний досвід дозволить швидко виправити цю ситуацію.
    Сподіваємося на ваше розуміння та чекаємо на вашу оперативну відповідь.


    З повагою,

    Максим Петренко

