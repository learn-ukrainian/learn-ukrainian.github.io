- type: fill-in
  title: "Вибір правильної форми"
  instruction: "Вставте пропущене слово, спираючись на контекст і вимоги до регістру."
  items:
    - sentence: "Коли ви пишете офіційний звіт і не хочете називати виконавця, краще сказати, що роботу _____."
      answer: "виконано"
      options:
        - "виконано"
        - "виконали"
        - "виконана"
        - "виконала"
      explanation: "Для офіційного звіту ідеально підходить безособова форма на -но."
    - sentence: "У розмові з друзями про нову дорогу природніше звучатиме фраза: У місті _____ нову дорогу."
      answer: "побудували"
      options:
        - "побудували"
        - "побудовано"
        - "була побудована"
        - "побудувалася"
      explanation: "Розмовний стиль тяжіє до неозначено-особових форм (3-я особа множини)."
    - sentence: "Документ набуває чинності після того, як його _____ керівництвом апарату? Ні, це калька! Правильно: керівник підписав."
      answer: "підписано"
      options:
        - "підписано"
        - "підписаний"
        - "підписали"
        - "підписав"
      explanation: "Форма підписано керівництвом є неправильною, бо містить діяча в орудному відмінку."
    - sentence: "У науковій статті процес часто об'єктивується: У цій монографії _____ складна соціальна проблема."
      answer: "розглядається"
      options:
        - "розглядається"
        - "розглядають"
        - "розглянуто"
        - "розглядає"
      explanation: "Дієслова на -ся доречні для опису процесів дослідження в академічному стилі."
    - sentence: "Замість того, щоб казати Я вибачаюся, вихована людина скаже _____."
      answer: "Перепрошую"
      options:
        - "Перепрошую"
        - "Вибачаюся"
        - "Прощаю"
        - "Каюся"
      explanation: "Перепрошую — це стилістично та логічно правильна форма прохання про пробачення."
    - sentence: "Стратегія активної _____ передбачає використання форм на кшталт Ми ухвалили рішення."
      answer: "суб'єктності"
      options:
        - "суб'єктності"
        - "об'єктності"
        - "пасивності"
        - "нейтральності"
      explanation: "Активна суб'єктність (Agency Pass) означає взяття відповідальності за дії."
    - sentence: "Слово даний у виразі даний документ варто замінити на вказівний займенник _____."
      answer: "цей"
      options:
        - "цей"
        - "такий"
        - "отой"
        - "самий"
      explanation: "Даний у значенні цей — це типовий прояв канцеляриту."
    - sentence: "Канцелярит перетворює живих людей на абстрактні об'єкти і робить текст _____."
      answer: "неприродним"
      options:
        - "неприродним"
        - "динамічним"
        - "легким"
        - "лаконічним"
      explanation: "Бюрократичний стиль позбавляє текст енергії та природності."
    - sentence: "Дієприкметникові звороти, як-от дані, _____ під час експерименту, допомагають зробити науковий текст лаконічнішим."
      answer: "отримані"
      options:
        - "отримані"
        - "отримали"
        - "отримуючи"
        - "отримавши"
      explanation: "Пасивний дієприкметник утворює зворот, що замінює ціле підрядне речення."
    - sentence: "Форми на -но та -то ніколи не змінюються за родами, числами чи _____."
      answer: "відмінками"
      options:
        - "відмінками"
        - "особами"
        - "часами"
        - "видами"
      explanation: "Вони є незмінними предикативними формами, які констатують результат дії."

- type: group-sort
  title: "Розподіл за регістрами"
  instruction: "Віднесіть кожне речення до того стилю або регістру, де воно звучить найбільш доречно (або до категорії помилок)."
  groups:
    - name: "Офіційно-діловий (доречно)"
      items:
        - "Дію ліцензії тимчасово призупинено."
        - "Проєкт бюджету успішно затверджено."
        - "Угоду розірвано через порушення умов."
    - name: "Розмовний та медіа (доречно)"
      items:
        - "Мені вчора відремонтували телефон."
        - "Кажуть, завтра цілий день буде дощ."
        - "У місті нарешті будують нову лікарню."
        - "Ми з командою ухвалили важливе рішення."
    - name: "Канцелярит та помилки (недоречно)"
      items:
        - "Заяву на відпустку написано керівником."
        - "Я дуже сильно перед вами вибачаюся."
        - "Даний факт пояснюється дослідниками."

- type: true-false
  title: "Факти про синтаксис та стилістику"
  instruction: "Визначте, чи є наведені твердження про використання пасиву правдивими."
  items:
    - statement: "Українська мова віддає стилістичну перевагу пасивним конструкціям над активними."
      correct: false
      explanation: "Навпаки, українська є динамічною мовою дії і віддає стилістичну перевагу активному стану."
    - statement: "Використання орудного відмінка діяча разом із формами на -но та -то є правильною граматичною нормою."
      correct: false
      explanation: "Це груба синтаксична помилка. З безособовими формами на -но/-то діяча вказувати не можна."
    - statement: "У розмовному стилі замість пасиву часто використовують дієслова у формі третьої особи множини."
      correct: true
      explanation: "Неозначено-особові речення (наприклад, кажуть, принесли) є дуже природними для повсякденної комунікації."
    - statement: "Слово вибачаюся є літературною нормою і означає щире прохання про пробачення."
      correct: false
      explanation: "Воно буквально означає вибачаю себе, що є нелогічним і зверхнім. Правильно: перепрошую, вибачте."
    - statement: "Зворотно-пасивні дієслова на -ся часто використовуються в науковому стилі."
      correct: true
      explanation: "Вони допомагають об'єктивувати опис процесів і властивостей (наприклад, досліджується, вимірюється)."
    - statement: "Канцелярит — це стиль мовлення, що характеризується живістю, емоційністю та багатством метафор."
      correct: false
      explanation: "Канцелярит — це суха, бюрократична, неприродна мова, переобтяжена пасивними конструкціями."
    - statement: "Фраза Закон прийнято парламентом є калькою з англійської мови."
      correct: true
      explanation: "Так, це калька The law was passed by the parliament. Українською слід казати Парламент ухвалив закон."
    - statement: "Безособові форми на -но та -то ніколи не змінюють своїх закінчень залежно від роду чи числа."
      correct: true
      explanation: "Вони є абсолютно незмінними предикативними формами."
    - statement: "Стратегія активної суб'єктності полягає в тому, щоб приховувати виконавця дії за допомогою пасиву."
      correct: false
      explanation: "Навпаки, вона передбачає взяття відповідальності і використання активних форм (Ми вирішили, Ми зробили)."
    - statement: "Слово даний у виразі даний документ краще замінювати на вказівний займенник цей."
      correct: true
      explanation: "Використання слова даний у такому значенні — це поширений канцеляризм, якого слід уникати."

- type: select
  title: "Аналіз мовних трансформацій"
  instruction: "Оберіть усі правильні відповіді для кожного запитання."
  items:
    - question: "Оберіть усі фрази, які написані правильною, природною українською мовою (без канцеляриту та кальок):"
      options:
        - text: "Аудитори підготували звіт вчасно."
          correct: true
        - text: "Звіт було підготовлено аудиторами."
          correct: false
        - text: "Мер урочисто відкрив нову школу."
          correct: true
        - text: "Нова школа була відкрита мером."
          correct: false
      min_correct: 2
      explanation: "Правильні фрази використовують активний стан, коли виконавець дії відомий."
    - question: "Які з наведених виразів є доречними формами для прохання про вибачення?"
      options:
        - text: "Перепрошую"
          correct: true
        - text: "Я вибачаюся"
          correct: false
        - text: "Вибачте мені"
          correct: true
        - text: "Пробачте"
          correct: true
      min_correct: 3
      explanation: "Слово вибачаюся є некоректним, усі інші форми відповідають нормам етикету."
    - question: "Оберіть усі речення, де форма на -но/-то використана без помилок:"
      options:
        - text: "Проєкт успішно затверджено."
          correct: true
        - text: "Документ підписано директором."
          correct: false
        - text: "Заяву від громадян розглянуто вчасно."
          correct: true
        - text: "Угоду розірвано судом."
          correct: false
      min_correct: 2
      explanation: "Безособова форма правильна лише тоді, коли відсутній діяч в орудному відмінку."
    - question: "Які з цих характеристик відповідають терміну канцелярит?"
      options:
        - text: "Надмірне використання пасивних конструкцій"
          correct: true
        - text: "Емоційність та поетична образність"
          correct: false
        - text: "Суха, бюрократична та шаблонна лексика"
          correct: true
        - text: "Нагромадження віддієслівних іменників"
          correct: true
      min_correct: 3
      explanation: "Канцелярит позбавляє мову енергії через пасив і складні бюрократичні звороти."
    - question: "Які речення ідеально підходять для неофіційної розмови з друзями?"
      options:
        - text: "Кажуть, завтра повністю перекриють дорогу."
          correct: true
        - text: "Буде здійснено перекриття дорожнього руху."
          correct: false
        - text: "Мені дуже швидко відремонтували авто."
          correct: true
        - text: "Моє авто було відремонтовано механіком."
          correct: false
      min_correct: 2
      explanation: "У розмові найприродніше звучить 3-я особа множини (кажуть, відремонтували)."
    - question: "Оберіть усі правильні твердження про науковий стиль української мови:"
      options:
        - text: "Він часто використовує дієслова на -ся для об'єктивного опису процесів."
          correct: true
        - text: "У ньому доречно використовувати розмовний сленг."
          correct: false
        - text: "Дієприкметникові звороти допомагають зробити такий текст лаконічним."
          correct: true
        - text: "Він свідомо уникає емоційно забарвленої суб'єктивної лексики."
          correct: true
      min_correct: 3
      explanation: "Науковий стиль тяжіє до об'єктивності, точності та лаконічності."
    - question: "Які варіанти є кращою альтернативою до русизму дане рішення?"
      options:
        - text: "Це рішення"
          correct: true
        - text: "Оце рішення"
          correct: true
        - text: "Таке рішення"
          correct: false
        - text: "Теперішнє рішення"
          correct: false
      min_correct: 2
      explanation: "Даний у ролі вказівного займенника слід замінювати на цей або оцей."
    - question: "Які з цих конструкцій є проявом стратегії активної суб'єктності?"
      options:
        - text: "Ми ухвалили складне, але необхідне рішення."
          correct: true
        - text: "Наша команда розробила абсолютно новий продукт."
          correct: true
        - text: "Керівництвом було вирішено підняти ціни."
          correct: false
        - text: "Нові зміни були впроваджені непомітно."
          correct: false
      min_correct: 2
      explanation: "Активна суб'єктність проявляється через підмет (діяча) і дієслово в активному стані."

- type: translate
  title: "Переклад без кальок"
  instruction: "Оберіть найкращий, найбільш природний український переклад, що відповідає вказаному стилю."
  items:
    - source: "The document was signed by the manager."
      options:
        - text: "Менеджер підписав документ."
          correct: true
        - text: "Документ був підписаний менеджером."
          correct: false
        - text: "Документ підписано менеджером."
          correct: false
        - text: "Документ підписався менеджером."
          correct: false
      explanation: "Оскільки діяч відомий, використовуємо виключно активний стан."
    - source: "A new hospital is being built in the city. (Розмовний стиль)"
      options:
        - text: "У місті будують нову лікарню."
          correct: true
        - text: "Нова лікарня будується в місті."
          correct: false
        - text: "Нову лікарню побудовано в місті."
          correct: false
        - text: "Лікарня будується будівельниками."
          correct: false
      explanation: "У розмові найкраще використовувати 3-ю особу множини (неозначено-особове речення)."
    - source: "I apologize for the delay."
      options:
        - text: "Перепрошую за запізнення."
          correct: true
        - text: "Я вибачаюся за запізнення."
          correct: false
        - text: "Я вибачаю себе за затримку."
          correct: false
        - text: "Вибачаюся за мою затримку."
          correct: false
      explanation: "Перепрошую — правильна форма, тоді як вибачаюся є стилістичною помилкою."
    - source: "The data obtained during the test is impressive. (Науковий стиль)"
      options:
        - text: "Дані, отримані під час тесту, вражають."
          correct: true
        - text: "Дані, що отримувалися під час тесту, вражають."
          correct: false
        - text: "Отримані тестом дані є вражаючими."
          correct: false
        - text: "Дані, які були отримані тестом, вражають."
          correct: false
      explanation: "Дієприкметниковий зворот ідеально підходить для наукового стилю."
    - source: "The problem is currently being investigated by scientists."
      options:
        - text: "Науковці зараз детально досліджують цю проблему."
          correct: true
        - text: "Проблема зараз досліджується науковцями."
          correct: false
        - text: "Цю проблему досліджено науковцями."
          correct: false
        - text: "Ця проблема є досліджуваною науковцями."
          correct: false
      explanation: "Знову калька агенса. Якщо є діяч (scientists), речення стає активним."
    - source: "They say it will rain tomorrow. (Розмовний стиль)"
      options:
        - text: "Кажуть, завтра буде дощ."
          correct: true
        - text: "Кажеться, завтра буде дощ."
          correct: false
        - text: "Говориться, що завтра дощитиме."
          correct: false
        - text: "Повідомляється про дощ на завтра."
          correct: false
      explanation: "Кажуть — ідеальна неозначено-особова форма для передачі чуток чи новин."
    - source: "The decision to raise taxes was approved. (Офіційний звіт)"
      options:
        - text: "Рішення про підвищення податків затверджено."
          correct: true
        - text: "Рішення підвищити податки було затверджене."
          correct: false
        - text: "Рішення про податки затвердилося."
          correct: false
        - text: "Рішення щодо податків є затвердженим."
          correct: false
      explanation: "Для офіційної констатації факту найкраще підходить форма на -но."
    - source: "We made a difficult decision."
      options:
        - text: "Ми ухвалили складне рішення."
          correct: true
        - text: "Нами було ухвалене складне рішення."
          correct: false
        - text: "Складне рішення ухвалилося нами."
          correct: false
        - text: "Складне рішення було ухвалено нами."
          correct: false
      explanation: "Активна форма демонструє відповідальність і звучить природно."

- type: mark-the-words
  title: "Пошук форм результату (-но, -то)"
  instruction: "Знайдіть і позначте у тексті всі безособові дієслівні форми на -но/-то, які ідеально підходять для констатації офіційного результату."
  text: "Сьогодні вранці відбулася важлива нарада. Проєкт бюджету нарешті погоджено з усіма департаментами. Звітні матеріали перевірено та відправлено до архіву. Учасники наради залишилися задоволені результатами."
  answers:
    - "погоджено"
    - "перевірено"
    - "відправлено"