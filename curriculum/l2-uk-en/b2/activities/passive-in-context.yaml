- type: match-up
  title: "Терміни та їхні значення"
  instruction: "З'єднайте стилістичний термін із його визначенням або характеристикою."
  pairs:
    - left: "офіційний регістр"
      right: "високий рівень формальності для звітів та документів"
    - left: "розмовний стиль"
      right: "невимушене спілкування з друзями або родиною"
    - left: "канцелярит"
      right: "надмірне використання пасиву та складних бюрократичних слів"
    - left: "активна суб'єктність"
      right: "взяття відповідальності за свої дії через використання активного стану"
    - left: "безособова форма"
      right: "констатація факту без вказівки на діяча"
    - left: "калька агенса"
      right: "помилкове використання орудного відмінка діяча в українській мові"
    - left: "мовленнєва компетенція"
      right: "здатність обирати доречні форми залежно від ситуації"
    - left: "зворотно-пасивне дієслово"
      right: "форма на -ся для опису регулярних процесів та методології"
    - left: "юридична сила"
      right: "здатність документа створювати офіційні наслідки"
    - left: "стилістичний нюанс"
      right: "тонка відмінність у вживанні граматичної форми чи слова"

- type: quiz
  title: "Правила вибору регістру"
  instruction: "Оберіть одну правильну відповідь на кожне запитання."
  items:
    - question: "У якій ситуації використання безособових форм на -но та -то є найбільш стилістично доречним?"
      explanation: "Ці форми ідеально підходять для констатації факту виконання дії в офіційно-діловому стилі."
      options:
        - text: "у дружній розмові"
          correct: false
        - text: "в емоційному художньому описі"
          correct: false
        - text: "в офіційному звіті або юридичному акті"
          correct: true
        - text: "у вітальному листі"
          correct: false
    - question: "Чому конструкція Закон прийнято парламентом вважається синтаксичною помилкою?"
      explanation: "Безособові форми не допускають вживання орудного відмінка діяча. Правильно: Парламент ухвалив закон."
      options:
        - text: "вона містить орудний відмінок діяча"
          correct: true
        - text: "у ній неправильно визначено час події"
          correct: false
        - text: "у ній порушено порядок слів"
          correct: false
        - text: "це не є помилкою"
          correct: false
    - question: "Яке слово слід використовувати замість граматично хибного та зверхнього вибачаюся?"
      explanation: "Слово вибачаюся буквально означає вибачаю себе. Слід казати перепрошую або вибачте."
      options:
        - text: "перепрошую"
          correct: true
        - text: "шкодую"
          correct: false
        - text: "каюся"
          correct: false
        - text: "жалію"
          correct: false
    - question: "Яка граматична форма найкраще підходить для об'єктивного опису експерименту в науковій статті?"
      explanation: "Для наукових текстів Державним стандартом рекомендовані зворотно-пасивні дієслова."
      options:
        - text: "наказовий спосіб дієслів"
          correct: false
        - text: "дієслова першої особи однини"
          correct: false
        - text: "неозначено-особова форма"
          correct: false
        - text: "зворотно-пасивна форма на -ся"
          correct: true
    - question: "Як найкраще перекласти новину A new hospital was built in the city для розмовного стилю?"
      explanation: "У розмовному стилі та медіа перевага віддається активним неозначено-особовим конструкціям."
      options:
        - text: "Нова лікарня була побудована в місті"
          correct: false
        - text: "У місті побудували нову лікарню"
          correct: true
        - text: "Лікарню побудовано в місті"
          correct: false
        - text: "Нова лікарня будується містом"
          correct: false
    - question: "Яка головна функція форм на -но та -то в офіційно-діловому стилі?"
      explanation: "Вони забезпечують Action Focus — фокус суто на результаті дії, коли діяч не важливий."
      options:
        - text: "опис тривалого процесу"
          correct: false
        - text: "вираження сильних емоцій"
          correct: false
        - text: "фіксація доконаного результату"
          correct: true
        - text: "заклик до колективної дії"
          correct: false
    - question: "Чим відрізняється повідомлення Ми ухвалили рішення від Рішення було ухвалено?"
      explanation: "Активна конструкція Ми ухвалили бере відповідальність на себе (активна суб'єктність)."
      options:
        - text: "демонстрацією відповідальності та прямої дії"
          correct: true
        - text: "часом, у якому відбулася подія"
          correct: false
        - text: "доречністю лише для наукового тексту"
          correct: false
        - text: "нічим, це абсолютні синоніми"
          correct: false
    - question: "Що означає термін канцелярит у контексті сучасної української мови?"
      explanation: "Канцелярит — це суха, бюрократична, неприродна мова, переобтяжена пасивом."
      options:
        - text: "вишуканий художній стиль"
          correct: false
        - text: "сучасний молодіжний сленг"
          correct: false
        - text: "бюрократична неприродна мова"
          correct: true
        - text: "правильна термінологія юристів"
          correct: false
    - question: "Яке речення демонструє правильне використання дієприкметникового звороту для лаконічності?"
      explanation: "Дієприкметниковий зворот отримані під час тесту дозволяє скоротити речення."
      options:
        - text: "Дані, отримані під час тесту, вражають"
          correct: true
        - text: "Дані, які ми вчора отримали, є дуже хорошими"
          correct: false
        - text: "Отримані нами дані були записані в зошит"
          correct: false
        - text: "Дані постійно отримуються нами зараз"
          correct: false
    - question: "Чому слово даний у виразі даний документ є маркером поганого стилю?"
      explanation: "Це поширений канцеляризм та русизм, який слід замінювати вказівним займенником цей."
      options:
        - text: "воно занадто коротке для офіційного стилю"
          correct: false
        - text: "це типовий русизм замість слова цей"
          correct: true
        - text: "воно означає подарунок, а не вказівку"
          correct: false
        - text: "це дуже застаріле архаїчне слово"
          correct: false

- type: error-correction
  title: "Виправлення стилістичних помилок та канцеляриту"
  instruction: "Знайдіть і виправте кальки агенса, русизми та недоречний пасив."
  items:
    - sentence: "Звіт про результати було підготовлено аудиторами у встановлені терміни."
      error: "було підготовлено аудиторами"
      answer: "аудитори підготували"
      error_type: "phrase"
      options:
        - "аудитори підготували"
        - "підготували аудиторами"
        - "було підготовлене аудиторами"
        - "аудитори підготовлено"
      explanation: "Якщо діяч вказаний в орудному відмінку (аудиторами), речення потрібно перебудувати на активний стан."
    - sentence: "Запропоновані зміни до закону були одноголосно прийняті депутатами на сесії."
      error: "були одноголосно прийняті депутатами"
      answer: "депутати одноголосно ухвалили"
      error_type: "phrase"
      options:
        - "депутати одноголосно ухвалили"
        - "одноголосно прийнято депутатами"
        - "депутатами прийнялися одноголосно"
        - "депутати прийняли одноголосно"
      explanation: "Слід уникати складеного пасиву з орудним відмінком, а стосовно законів використовується дієслово ухвалити."
    - sentence: "Я дуже сильно вибачаюся за те, що не зміг вчасно надіслати вам звіт."
      error: "вибачаюся"
      answer: "перепрошую"
      error_type: "word"
      options:
        - "перепрошую"
        - "вибачаю себе"
        - "вибачатимусь"
        - "прошуся"
      explanation: "Слово вибачаюся стилістично некоректне. Для прохання про пробачення слід вживати перепрошую або вибачте."
    - sentence: "Даний наказ набуває чинності з моменту його офіційного опублікування на сайті."
      error: "Даний"
      answer: "Цей"
      error_type: "word"
      options:
        - "Цей"
        - "Такий"
        - "Вказаний"
        - "Оцей"
      explanation: "Слово даний у значенні вказівного займенника є канцеляризмом. Українською мовою правильно казати цей."
    - sentence: "Мій зламаний телефон був швидко відремонтований майстром у сервісному центрі."
      error: "був швидко відремонтований майстром"
      answer: "майстер швидко відремонтував"
      error_type: "phrase"
      options:
        - "майстер швидко відремонтував"
        - "відремонтував швидко майстром"
        - "швидко відремонтовано майстром"
        - "майстер швидко відремонтувався"
      explanation: "У розмовному стилі складений пасив з орудним відмінком звучить неприродно. Використовуйте актив."
    - sentence: "По телевізору було повідомлено про різке погіршення погодних умов на завтра."
      error: "було повідомлено"
      answer: "повідомили"
      error_type: "phrase"
      options:
        - "повідомили"
        - "повідомилося"
        - "повідомляють"
        - "повідомило"
      explanation: "Замість важкого пасиву у медіа стилі варто використовувати активне неозначено-особове речення (3-я особа множини)."
    - sentence: "Ця стаття зараз перекладається мною для публікації у відомому міжнародному журналі."
      error: "перекладається мною"
      answer: "я перекладаю"
      error_type: "phrase"
      options:
        - "я перекладаю"
        - "перекладаю мною"
        - "перекладено мною"
        - "перекладатиму мною"
      explanation: "Зворотно-пасивні дієслова на -ся не можуть використовуватися разом із діячем в орудному відмінку (мною)."
    - sentence: "Всі необхідні документи були зібрані юридичним відділом вчора ввечері."
      error: "були зібрані юридичним відділом"
      answer: "юридичний відділ зібрав"
      error_type: "phrase"
      options:
        - "юридичний відділ зібрав"
        - "були зібрані від відділу"
        - "зібралися юридичним відділом"
        - "юридичний відділ зібрані"
      explanation: "Заміна кальки англійського пасиву на питому активну конструкцію робить текст живим і професійним."

