  title: 'Заповніть пропуски: загальнонаукова лексика'
  instruction: Оберіть найбільш правильне слово для кожного речення, щоб зберегти
    науковий стиль.
  items:
  - sentence: У першому розділі ми маємо обґрунтувати актуальність обраної надскладної
      теми дослідження.
    answer: актуальність
    options:
    - актуальність
    - об'єктивність
    - посилання
    - анотацію
  - sentence: Наша група планує провести ґрунтовне дослідження швидких глобальних
      кліматичних змін.
    answer: дослідження
    options:
    - дослідження
    - довкілля
    - хеджування
    - посилання
  - sentence: На підставі отриманих даних експерти змогли дійти парадоксального висновку
      щодо природи вірусу.
    answer: висновку
    options:
    - висновку
    - вступу
    - об'єкта
    - суб'єкта
  - sentence: Молоді автори висунули нову сміливу гіпотезу, яка потребує експериментальної
      перевірки.
    answer: гіпотезу
    options:
    - гіпотезу
    - анотацію
    - монографію
    - студію
  - sentence: Глибокий порівняльний аналіз літературних джерел розкрив нові грані
      таланту.
    answer: аналіз
    options:
    - аналіз
    - висновок
    - термін
    - чинник
  - sentence: У цій роботі ми зосередимося на вивченні такого складного процесу, як
      мовна асиміляція.
    answer: асиміляція
    options:
    - асиміляція
    - актуальність
    - анотація
    - етика
  - sentence: Важливо чітко визначити об'єкт нашого тривалого багаторічного дослідження.
    answer: об'єкт
    options:
    - об'єкт
    - висновок
    - термін
    - заголовок
  - sentence: Кожна серйозна стаття повинна мати коротку анотацію на самому початку.
    answer: анотацію
    options:
    - анотацію
    - гіпотезу
    - монографію
    - розвідку
  - sentence: У завершальній частині автор має логічно підбити підсумки всієї роботи.
    answer: підсумки
    options:
    - підсумки
    - посилання
    - висновки
    - результати
  - sentence: Як зазначає автор, ця концепція стала справжнім проривом у сучасній
      методології.
    answer: методології
    options:
    - методології
    - гіпотезі
    - анотації
    - термінології
  - sentence: Дуже важливо робити коректні посилання на авторитетні джерела інформації.
    answer: посилання
    options:
    - посилання
    - висновки
    - дослідження
    - студії
  - sentence: Це явище є абсолютно базовою умовою для протікання процесу фотосинтезу.
    answer: умовою
    options:
    - умовою
    - гіпотезою
    - методологією
    - анотацією
  - sentence: Отримані результати яскраво демонструють стрімке економічне зростання
      в регіоні.
    answer: зростання
    options:
    - зростання
    - дослідження
    - хеджування
    - цитування
  - sentence: Ця наукова праця була успішно опублікована як окрема фундаментальна
      монографія.
    answer: монографія
    options:
    - монографія
    - анотація
    - гіпотеза
    - методологія
- type: unjumble
  title: Синтаксис наукового стилю
  instruction: Складіть слова в правильному порядку, щоб утворити граматично коректні
