- type: reading
  title: Аналіз академічного тексту
  instruction: Прочитайте короткий фрагмент академічного тексту та виконайте завдання.
  text: Як зазначає дослідник Іваненко у своїй недавній статті, стрімкий глобальний
    розвиток цифрових технологій міг суттєво вплинути на зниження загального рівня
    читацької активності серед сучасної молоді. На наш погляд, висловлена автором
    гіпотеза є надзвичайно актуальною в сучасних умовах. Головна мета цього невеликого
    дослідження полягає в тому, щоб на підставі проведеного нами соціологічного опитування
    комплексно проаналізувати реальний вплив соціальних мереж на культурні звички
    нашого суспільства.
  tasks:
  - Знайдіть і випишіть усі маркери мовного хеджування в цьому тексті.
  - Визначте, за допомогою якої формули автор етично цитує іншого дослідника.
  - Знайдіть у тексті речення, де чітко формулюється мета дослідження, та випишіть
    з нього загальнонаукову лексику.
- type: essay-response
  title: Написання наукової анотації
  prompt: Уявіть, що ви написали дослідження про вплив соціальних мереж на вивчення
    іноземних мов. Напишіть коротку наукову анотацію (150-200 слів) до вашої уявної
    статті. Обов'язково використовуйте загальнонаукову лексику, пасивні або безособові
    конструкції там, де це доречно, правильні формули цитування та маркери мовного
    хеджування. Уникайте будь-яких русизмів чи емоційно забарвлених слів.
  min_words: 150
  model_answer: Представлене дослідження присвячене надзвичайно актуальній проблемі
    впливу сучасних соціальних мереж на ефективність вивчення іноземних мов студентами
    університетів. Об'єктом нашої наукової розвідки є процес засвоєння нової лексики
    за допомогою цифрових платформ. Головна мета роботи полягає в тому, щоб на підставі
    зібраних статистичних даних комплексно проаналізувати як позитивні, так і негативні
    чинники цього явища. Під час проведення експерименту було успішно залучено понад
    двісті респондентів. Згідно з отриманими результатами, ми можемо обережно припустити,
    що регулярне використання спеціалізованих навчальних додатків у соціальних мережах,
    ймовірно, сприяє значному підвищенню мотивації. Натомість, як зазначають інші
    європейські автори, неконтрольоване споживання розважального контенту видається
    фактором, що знижує концентрацію уваги. З нашої точки зору, висунута робоча гіпотеза
    була успішно підтверджена. У висновках підбито підсумки роботи та окреслено перспективи
    для подальших наукових студій у цій галузі.
  rubric:
  - criteria: Використання академічної лексики
    description: 'Наявність слів типу: дослідження, мета, аналіз, результати, актуальність.'
    points: 30
  - criteria: Мовне хеджування
    description: 'Наявність обережних тверджень типу: ймовірно, припускаємо, видається.'
    points: 30
  - criteria: Етика та цитування
    description: 'Правильне використання вступних фраз: згідно з, як зазначають автори.'
    points: 20
  - criteria: Граматична правильність
    description: Відсутність русизмів (наприклад, приймати участь) та правильне використання
      безособових форм.
    points: 20
