- type: error-correction
  title: 'Виправте помилку: боротьба з русизмами та кальками'
  instruction: Знайдіть і виправте лексичну або граматичну помилку в кожному академічному
    реченні.
  items:
  - sentence: Ми вирішили приймати участь у цьому новому європейському проєкті.
    error: приймати участь
    answer: брати участь
    error_type: phrase
    options:
    - брати участь
    - мати участь
    - робити участь
    - грати участь
    explanation: Правильна українська конструкція — 'брати участь'. Слово 'приймати'
      використовується для ліків чи гостей.
  - sentence: В кінці року лабораторія буде підводити підсумки своєї складної роботи.
    error: підводити підсумки
    answer: підбивати підсумки
    error_type: phrase
    options:
    - підбивати підсумки
    - робити підсумки
    - вести підсумки
    - давати підсумки
    explanation: Українською мовою правильно 'підбивати підсумки', а не 'підводити'.
  - sentence: Слідуючий приклад дуже наочно ілюструє цю складну наукову гіпотезу.
    error: Слідуючий
    answer: Наступний
    error_type: word
    options:
    - Наступний
    - Другий
    - Інший
    - Задній
    explanation: Слово 'слідуючий' — це російська калька. Українською треба казати
      'наступний'.
  - sentence: Ця стаття безпосередньо відноситься до теми нашого комплексного дослідження.
    error: відноситься до
    answer: стосується
    error_type: phrase
    options:
    - стосується
    - належить до
    - торкається до
    - звертається до
    explanation: Правильно казати 'стосується теми', оскільки 'відноситися' можна
      лише математично або емоційно.
  - sentence: Вчені швидко получають нові достовірні дані з перевірених міжнародних
      джерел.
    error: получають
    answer: отримують
    error_type: word
    options:
    - отримують
    - беруть
    - дістають
    - набувають
    explanation: Слово 'получати' — це типовий русизм. Питоме слово — 'отримувати'.
  - sentence: Домінуючий фактор швидкого економічного зростання полягає в постійних
      інноваціях.
    error: Домінуючий фактор
    answer: Панівний чинник
    error_type: phrase
    options:
    - Панівний чинник
    - Головний фактор
    - Перший чинник
    - Сильний чинник
    explanation: Активні дієприкметники не властиві українській мові. Краще використовувати
      'панівний чинник'.
  - sentence: Ми вважаємо, що це самий кращий аналітичний метод для нашої проблеми.
    error: самий кращий
    answer: найкращий
    error_type: phrase
    options:
    - найкращий
    - більш кращий
    - дуже кращий
    - кращий за всіх
    explanation: Ступені порівняння з часткою 'самий' є граматичною калькою. Правильно
      — 'найкращий'.
  - sentence: Оточуюче середовище зазнає негативного впливу від стрімкої міської індустріалізації.
    error: Оточуюче середовище
    answer: Довкілля
    error_type: phrase
    options:
    - Довкілля
    - Природне коло
    - Зовнішній світ
    - Околиця
    explanation: Замість незграбного 'оточуюче середовище' слід вживати природне слово
      'довкілля'.
  - sentence: Усі бажаючі можуть вільно приєднатися до нашого наукового студентського
      семінару.
    error: бажаючі
    answer: охочі
    error_type: word
    options:
    - охочі
    - бажані
    - хочучі
    - прагнучі
    explanation: Слово 'бажаючі' — це ненормативний дієприкметник. Правильно казати
      'охочі' або 'ті, хто бажає'.
  - sentence: Цей складний фізичний експеримент був успішно проведений нашою молодою
      командою.
    error: був успішно проведений
    answer: успішно провела
    error_type: construction
    options:
    - успішно провела
    - успішно зробила
    - була провела
    - мала провести
    explanation: 'В українській науковій мові слід віддавати перевагу активному стану:
      ''команда провела експеримент''.'
  - sentence: Нова ефективна комп'ютерна програма була розроблена нашим міністерством
      освіти.
    error: була розроблена
    answer: розробило
    error_type: construction
    options:
    - розробило
    - була зроблена
    - є розроблена
    - має розробити
    explanation: 'Краще використати активний стан: ''наше міністерство розробило програму''.'
  - sentence: Хвилююче питання походження людства становить об'єкт комплексних світових
      досліджень.
    error: Хвилююче питання
    answer: Питання, що хвилює
    error_type: phrase
    options:
    - Питання, що хвилює
    - Хвильоване питання
    - Питання хвилювання
    - Схвильоване питання
    explanation: Дієприкметник 'хвилююче' слід замінити на описову конструкцію 'питання,
      що хвилює'.
  - sentence: Керуючий орган університету терміново видав новий наказ щодо студентської
      практики.
    error: Керуючий орган
    answer: Керівний орган
    error_type: phrase
    options:
    - Керівний орган
    - Орган керування
    - Керований орган
    - Керувальний орган
    explanation: Правильний український відповідник — 'керівний орган'.
  - sentence: Моя теорія стовідсотково доводить цю остаточну істину для всього наукового
      світу.
    error: стовідсотково доводить
    answer: ймовірно підтверджує
    error_type: register
    options:
    - ймовірно підтверджує
    - точно показує
    - абсолютно доводить
    - завжди каже
    explanation: Агресивна категоричність є шкідливою в академічній етиці. Слід використовувати
      мовне хеджування.
- type: true-false
  title: 'Правда чи хибність: основи наукового стилю'
  instruction: Визначте, чи є наведені твердження правдивими щодо українського академічного
    регістру.
  items:
  - statement: Науковий стиль вимагає обов'язкового використання емоційно забарвлених
      слів для впливу на читача.
    correct: false
    explanation: Науковий стиль базується на абсолютній об'єктивності та відмові від
      емоційності.
  - statement: Доказовість означає, що кожне твердження спирається на перевірені факти
      або авторитетні джерела.
    correct: true
    explanation: Це один із чотирьох базових принципів справжнього наукового тексту.
  - statement: Інститут української наукової мови був створений у 1920-х роках для
      розробки питомої термінології.
    correct: true
    explanation: Установа активно працювала над стандартизацією термінів з опорою
      на українські словотвірні моделі.
  - statement: Використання пасивного стану робить український текст більш професійним
      та престижним.
    correct: false
    explanation: Це поширений міф; сучасна українська наука віддає абсолютну перевагу
      активним конструкціям.
  - statement: Безособові форми на -но, -то дозволяють фокусувати увагу на результаті
      дії, а не на її виконавцеві.
    correct: true
    explanation: Наприклад, конструкція 'роботу успішно завершено' є чудовою альтернативою
      пасивному стану.
  - statement: Слова 'слідуючий', 'домінуючий', 'бажаючі' є правильними та дуже бажаними
      в академічному письмі.
    correct: false
    explanation: 'Це активні дієприкметники, які є російськими кальками. Правильно:
      наступний, панівний, охочі.'
  - statement: Ланцюжок родових відмінків використовується для максимального стиснення
      великих обсягів інформації.
    correct: true
    explanation: Він дуже ефективно дозволяє уникати довгих та заплутаних підрядних
      речень.
  - statement: Загальнонаукова лексика складається з термінів, які використовуються
      виключно в одній вузькій дисципліні.
    correct: false
    explanation: Загальнонаукова лексика є універсальною і активно використовується
      в усіх дисциплінах.
  - statement: Якщо в тексті вперше використовується дуже рідкісний термін, автор
      зобов'язаний дати йому визначення.
    correct: true
    explanation: Це правило наочно демонструє високу професійну етику відповідального
      дослідника.
  - statement: Мовне хеджування — це агресивна стратегія жорсткого доведення власної
      правоти перед колегами.
    correct: false
    explanation: Хеджування навпаки дипломатично пом'якшує твердження, залишаючи безпечний
      простір для наукової дискусії.
  - statement: Вставні слова 'можливо', 'ймовірно', 'очевидно' є дуже популярними
      маркерами мовного хеджування.
    correct: true
    explanation: Вони чітко виражають певний ступінь імовірності і значно знижують
      категоричність тексту.
  - statement: Академічна етика дозволяє агресивну критику опонентів, якщо ви абсолютно
      впевнені у своїй правоті.
    correct: false
    explanation: Етика завжди категорично вимагає толерантного та максимально шанобливого
      ставлення до інших дослідників.
  - statement: Анотація завжди містить детальне і довге пояснення кожного етапу проведеного
      експерименту.
    correct: false
    explanation: Анотація — це надзвичайно стислий опис роботи, а деталі завжди подаються
      в основній частині.
  - statement: Фрази 'згідно з', 'на підставі', 'як зазначає автор' є стандартними
      формулами етичного цитування.
    correct: true
    explanation: Вони допомагають дуже коректно та безпечно інтегрувати чужу дослідницьку
      думку у власний текст.
- type: quiz
  title: 'Перевірте знання: академічний регістр'
  instruction: Оберіть одну правильну відповідь на кожне запитання.
  items:
  - question: Яка фундаментальна мета є найголовнішою для будь-якого тексту, написаного
      в класичному науковому стилі української мови?
    explanation: Головна мета наукового стилю — точна фіксація результатів досліджень
      та обмін знаннями.
    options:
    - text: Ефективний обмін об'єктивними професійними знаннями та фактами
      correct: true
    - text: Емоційний вплив на підсвідомість широкої читацької аудиторії
      correct: false
    - text: Розважальний опис дуже складних щоденних побутових проблем
      correct: false
    - text: Популяризація художньої літератури серед молодих студентів
      correct: false
  - question: Який видатний український фізик кінця ХІХ століття був також одним із
      творців першої української наукової термінології?
    explanation: Іван Пулюй блискуче проводив експерименти з рентгенівськими променями
      і водночас створював фізичну термінологію.
    options:
    - text: Іван Пулюй
      correct: true
    - text: Агатангел Кримський
      correct: false
    - text: Пантелеймон Куліш
      correct: false
    - text: Михайло Грушевський
      correct: false
  - question: Як у сучасній українській науковій мові правильно перекласти або адаптувати
      незграбну канцелярську конструкцію 'робота була зроблена'?
    explanation: Українська мова надає перевагу активному стану або безособовим формам
      на -но, -то.
    options:
    - text: Роботу успішно виконано
      correct: true
    - text: Робота була швидко закінчена
      correct: false
    - text: Роботу являється зробленою
      correct: false
    - text: Робота була виконана авторами
      correct: false
  - question: Яке з наведених нижче словосполучень є типовою і дуже поширеною граматичною
      калькою, яку заборонено використовувати в академічному тексті?
    explanation: Словосполучення 'приймати участь' є русизмом. Питомий варіант — 'брати
      участь'.
    options:
    - text: Приймати активну участь
      correct: true
    - text: Брати активну участь
      correct: false
    - text: Здійснювати глибокий аналіз
      correct: false
    - text: Підбивати остаточні підсумки
      correct: false
  - question: Що саме означає термін 'мовне хеджування' в контексті сучасної європейської
      філософії науки та академічної комунікації?
    explanation: Хеджування — це свідоме пом'якшення категоричних тверджень для уникнення
      зайвої безапеляційності.
    options:
    - text: Свідоме пом'якшення своїх категоричних тверджень у тексті
      correct: true
    - text: Жорсткий та агресивний захист своєї наукової теорії
      correct: false
    - text: Використання виключно іноземної термінології у статті
      correct: false
    - text: Повна відмова від будь-якого цитування інших авторів
      correct: false
  - question: Яке дієслово з наведених нижче є класичним і дуже ефективним маркером
      дипломатичного мовного хеджування в українській академічній традиції?
    explanation: Дієслово 'припускаємо' є ідеальним інструментом для обережного ствердження.
    options:
    - text: Обережно припускаємо
      correct: true
    - text: Стовідсотково доводимо
      correct: false
    - text: Абсолютно гарантуємо
      correct: false
    - text: Категорично заявляємо
      correct: false
  - question: В якому обов'язковому розділі стандартної міжнародної наукової статті
      автор має детально та переконливо обґрунтувати актуальність обраної теми?
    explanation: Актуальність теми традиційно обґрунтовується на самому початку, у
      Вступі.
    options:
    - text: У розгорнутому Вступі
      correct: true
    - text: У короткій Анотації
      correct: false
    - text: В Основній частині тексту
      correct: false
    - text: У фінальних Висновках
      correct: false
  - question: Який правильний український відповідник слід використовувати замість
      потворного, штучного активного дієприкметника теперішнього часу 'домінуючий'?
    explanation: Активні дієприкметники замінюються питомими прикметниками, наприклад
      'панівний'.
    options:
    - text: Панівний або провідний
      correct: true
    - text: Той, що домінує зараз
      correct: false
    - text: Найбільш головний
      correct: false
    - text: Домінуючий завжди
      correct: false
  - question: Що таке 'загальнонаукова лексика' і яку фундаментальну роль вона відіграє
      в побудові якісного професійного академічного тексту?
    explanation: Ця лексика є універсальною для всіх галузей науки (дослідження, метод,
      висновок).
    options:
    - text: Це універсальні слова, які використовуються в будь-якій науковій галузі
      correct: true
    - text: Це дуже рідкісні слова, зрозумілі лише вузькому колу фахівців
      correct: false
    - text: Це розмовні щоденні слова, які роблять статтю набагато цікавішою
      correct: false
    - text: Це виключно іншомовні запозичення без українських відповідників
      correct: false
  - question: Як правильно та етично ввести думку іншого шанованого дослідника у свій
      власний текст без порушення академічних стандартів?
    explanation: Слід використовувати стандартні формули цитування, наприклад 'як
      зазначає автор'.
    options:
    - text: Використати вступну фразу 'як справедливо зазначає автор'
      correct: true
    - text: Просто переписати чужий текст без жодних лапок і посилань
      correct: false
    - text: Написати, що всі попередні вчені кардинально помилялися
      correct: false
    - text: Використати дуже емоційну та агресивну критичну лексику
      correct: false
  - question: Яке з наведених словосполучень яскраво ілюструє унікальне граматичне
      явище під назвою 'ланцюжок родових відмінків' в українському синтаксисі?
    explanation: Ланцюжок родових відмінків — це довга послідовність іменників у формі
      родового відмінка.
    options:
    - text: Аналіз методів розв'язання складних проблем
      correct: true
    - text: Ми ретельно аналізуємо нові складні проблеми
      correct: false
    - text: Експеримент був успішно проведений молодою командою
      correct: false
    - text: Швидко працювати над цим дуже великим проєктом
      correct: false
  - question: Чому українські мовознавці дуже наполегливо радять безжально уникати
      слова 'получати' в будь-якому професійному або офіційному контексті?
    explanation: Слово 'получати' є класичним русизмом, правильно використовувати
      дієслово 'отримувати'.
    options:
    - text: Бо це типовий русизм, замість якого слід вживати 'отримувати'
      correct: true
    - text: Бо це застаріле архаїчне слово з вісімнадцятого століття
      correct: false
    - text: Бо воно занадто складне для швидкого написання у статті
      correct: false
    - text: Бо це вузькоспеціальний термін з галузі вищої математики
      correct: false
  - question: Яку історичну установу було спеціально створено при Всеукраїнській академії
      наук у двадцятих роках для масштабної розробки національної термінології?
    explanation: Інститут української наукової мови займався систематизацією термінології
      в 1920-х роках.
    options:
    - text: Інститут української наукової мови
      correct: true
    - text: Міністерство вищої державної освіти
      correct: false
    - text: Комітет захисту національної культури
      correct: false
    - text: Спілка молодих перспективних письменників
      correct: false
  - question: Яке з наведених слів є найкращим, питомим українським замінником для
      дуже поширеної незграбної канцелярської кальки 'оточуюче середовище'?
    explanation: Слово 'довкілля' є природним та органічним замінником цієї потворної
      кальки.
    options:
    - text: Довкілля
      correct: true
    - text: Околиця
      correct: false
    - text: Природа
      correct: false
    - text: Світ
      correct: false
- type: mark-the-words
  title: Знайдіть маркери хеджування
  instruction: Знайдіть і позначте всі слова, які є маркерами мовного хеджування (невпевненості)
    в цьому тексті.
  text: Отримані результати ймовірно свідчать про зміну клімату. Ця подія очевидно
    мала глибше коріння. Новий метод можливо стане справжнім проривом. Ця теза видається
    нам дуже дискусійною. Ми припускаємо наявність додаткових факторів. Механізм працює
    певною мірою неефективно. Здається, що автор помиляється. Орієнтовно це відбулося
    влітку. Теоретично такий підхід може спрацювати. Гіпотетично ми маємо рацію. Очікувано
    експеримент завершився успішно. Вірогідно ситуація покращиться. Імовірно це найкраще
    рішення. Загалом тенденція є позитивною.
