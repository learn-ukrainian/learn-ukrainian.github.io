- type: reading
  title: 'Професійна комунікація'
  instruction: 'Прочитайте текст та дайте відповіді на запитання.'
  text: |
    Нещодавно я отримав листа від клієнта з оцінкою нашої роботи. Він написав, що наш новий додаток має дуже гарний дизайн, але його функціональність залишається кепською. Наша команда була трохи розчарована, адже ми витратили багато часу на розробку. Головний інженер сказав, що це жахливий результат для першого релізу. Ми зібрали нараду, щоб обговорити ці проблеми. Після двох тижнів тестування ми виправили всі помилки. Тепер додаток працює як ідеальний механізм. Новий звіт показав, що у нас відмінний рівень оптимізації. Клієнт надіслав ще одного листа, де зазначив, що тепер це дуже хороший продукт.
  tasks:
    - 'Що клієнт написав про дизайн додатку?'
    - 'Як головний інженер оцінив перший реліз?'
    - 'Скільки часу тривало тестування після наради?'
    - 'Яким словом клієнт оцінив продукт у другому листі?'

- type: true-false
  title: 'Правильно чи неправильно'
  instruction: 'Визначте, чи відповідає твердження правилам української мови.'
  items:
    - statement: 'Слово хороший використовується для опису візуальної краси людини.'
      correct: false
      explanation: 'Хороший описує компетенцію або функціональність. Для краси використовують гарний.'
    - statement: 'Ми можемо сказати добрий день як форму привітання.'
      correct: true
      explanation: 'Це стандартна етикетна формула.'
    - statement: 'Слово злий підходить для опису поганої погоди.'
      correct: false
      explanation: 'Злий характеризує емоційний стан живої істоти. Погода буває поганою.'
    - statement: 'Кепський є розмовним синонімом до слова поганий.'
      correct: true
      explanation: 'Це слово додає емоційного та неформального колориту.'
    - statement: 'Огидний означає найвищий ступінь якості.'
      correct: false
      explanation: 'Огидний пов''язаний із відразою та є сильно негативним.'
    - statement: 'Слово старовинний підкреслює історичну цінність предмета.'
      correct: true
      explanation: 'Воно використовується для артефактів, замків та монет.'
    - statement: 'Хороший фахівець означає, що спеціаліст має приємну зовнішність.'
      correct: false
      explanation: 'Це означає, що він компетентний у своїй справі.'
    - statement: 'Слово архаїчний має науковий або офіційний відтінок.'
      correct: true
      explanation: 'Воно підкреслює безнадійну застарілість.'
    - statement: 'Добра людина означає людину з чистими намірами.'
      correct: true
      explanation: 'Це слово історично стосується людської душі та етики.'
    - statement: 'Слово жахливий походить від слова жах і означає сильний страх.'
      correct: true
      explanation: 'Воно використовується для руйнівних або дуже поганих ситуацій.'
    - statement: 'Ми можемо сказати красивий будинок в ідеальній українській мові.'
      correct: false
      explanation: 'Це калька, краще сказати гарний будинок.'
    - statement: 'Слово чудовий є універсальним для вираження сильного позитиву.'
      correct: true
      explanation: 'Воно підходить для похвали в будь-якій сфері.'
    - statement: 'Бездоганний використовується для речей із багатьма недоліками.'
      correct: false
      explanation: 'Бездоганний означає відсутність вад, найвищий рівень.'
    - statement: 'Хороший телефон означає, що він надійно працює.'
      correct: true
      explanation: 'Це оцінка технічних характеристик та функціональності.'

- type: fill-in
