    - sentence: 'Це був _____ жарт, він мене дуже образив.'
      answer: 'злий'
      options: ['поганий', 'злий', 'кепський', 'огидний']
      explanation: 'Жарт із поганими намірами називається злим.'
    - sentence: 'Ми мали _____ урожай пшениці цього року.'
      answer: 'добрий'
      options: ['хороший', 'добрий', 'гарний', 'давній']
      explanation: 'Традиційний вислів для багатого врожаю.'
    - sentence: 'Такий підхід до управління є занадто _____ для сучасної компанії.'
      answer: 'архаїчним'
      options: ['давнім', 'архаїчним', 'старовинним', 'поганим']
      explanation: 'Підкреслює безнадійну застарілість методу.'

