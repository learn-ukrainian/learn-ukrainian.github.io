- type: quiz
  title: "Перевірте свої знання про офіційно-діловий стиль"
  instruction: "Оберіть правильну відповідь на кожне запитання про особливості стилю."
  items:
    - question: "Яке з наведених тверджень найкраще описує головне завдання офіційно-ділового стилю в сучасній українській мові?"
      explanation: "Головне завдання полягає в об'єктивній, точній та стандартизованій передачі інформації."
      options:
        - text: "Об'єктивна, точна та стандартизована передача інформації."
          correct: true
        - text: "Емоційний вплив на співрозмовника за допомогою метафор."
          correct: false
        - text: "Створення яскравих художніх образів для читача."
          correct: false
        - text: "Використання розмовної лексики для зближення з аудиторією."
          correct: false
    - question: "До якого саме підстилю офіційного мовлення належать такі документи, як заяви, накази та протоколи?"
      explanation: "Ці документи належать до адміністративно-канцелярського підстилю, який обслуговує повсякденну діяльність."
      options:
        - text: "До адміністративно-канцелярського підстилю."
          correct: true
        - text: "До законодавчого підстилю."
          correct: false
        - text: "До дипломатичного підстилю."
          correct: false
        - text: "До науково-публіцистичного підстилю."
          correct: false
    - question: "Що означає термін стандартизація та клішування в контексті створення офіційних державних документів?"
      explanation: "Документи створюються за єдиними стандартами з використанням стійких словесних формул (кліше)."
      options:
        - text: "Використання стійких словесних формул та єдиних затверджених форм."
          correct: true
        - text: "Відмова від будь-яких правил для вільного вираження думок."
          correct: false
        - text: "Використання виключно іноземних слів у тексті документа."
          correct: false
        - text: "Додавання особистих емоційних оцінок автора до документа."
          correct: false
    - question: "Яка синтаксична конструкція найчастіше використовується в діловому стилі для зміщення фокусу з виконавця на саму дію?"
      explanation: "Для цього активно використовуються номіналізація та віддієслівні іменники на -ння, -ення."
      options:
        - text: "Віддієслівні іменники на -ння, -ення."
          correct: true
        - text: "Риторичні запитання та вигуки."
          correct: false
        - text: "Зменшувально-пестливі суфікси."
          correct: false
        - text: "Дієслова у формі наказового способу множини."
          correct: false
    - question: "З яким відмінком обов'язково повинен використовуватися стандартизований прийменниковий зворот 'згідно з'?"
      explanation: "Цей прийменниковий зворот вимагає після себе виключно Орудного відмінка."
      options:
        - text: "Тільки з Орудним відмінком."
          correct: true
        - text: "Тільки з Родовим відмінком."
          correct: false
        - text: "Тільки з Давальним відмінком."
          correct: false
        - text: "Тільки зі Знахідним відмінком."
          correct: false
    - question: "Яке з наведених словосполучень є правильним українським відповідником до російської кальки 'приймати участь'?"
      explanation: "Правильним українським варіантом є 'брати участь'."
      options:
        - text: "Брати участь."
          correct: true
        - text: "Робити участь."
          correct: false
        - text: "Мати участь."
          correct: false
        - text: "Давати участь."
          correct: false
    - question: "Як правильно вказати особу, яка подає документ, у шапці офіційної заяви без використання зайвих прийменників?"
      explanation: "Особа вказується у Родовому відмінку без прийменника 'від'."
      options:
        - text: "Заява менеджера відділу продажу Петренка Івана."
          correct: true
        - text: "Заява від менеджера відділу продажу Петренка Івана."
          correct: false
        - text: "Заява менеджеру відділу продажу Петренку Івану."
          correct: false
        - text: "Заява менеджер відділу продажу Петренко Іван."
          correct: false
    - question: "Як називається документ, у якому детально фіксується хід обговорення питань і ухвалення рішень на зборах?"
      explanation: "Такий документ називається протоколом."
      options:
        - text: "Протокол."
          correct: true
        - text: "Наказ."
          correct: false
        - text: "Акт."
          correct: false
        - text: "Розпорядження."
          correct: false
    - question: "Яку історичну назву мали гетьманські маніфести та законодавчі акти за часів існування Генеральної військової канцелярії?"
      explanation: "Вони мали назву універсали."
      options:
        - text: "Універсали."
          correct: true
        - text: "Конституції."
          correct: false
        - text: "Декрети."
          correct: false
        - text: "Статути."
          correct: false
    - question: "Яке слово правильно використовувати для позначення тривалості дії в офіційному тексті замість помилкового 'на протязі'?"
      explanation: "Для тривалості дії використовують слова 'протягом' або 'упродовж'."
      options:
        - text: "Протягом."
          correct: true
        - text: "На часі."
          correct: false
        - text: "В процесі."
          correct: false
        - text: "Поки що."
          correct: false

- type: fill-in
  title: "Доповніть офіційні речення відповідними словами"
  instruction: "Виберіть правильне слово для заповнення пропуску в діловому контексті."
  items:
    - sentence: "Директор вирішив негайно видати новий наказ, який набирає _____ з понеділка."
      answer: "чинності"
      options: ["чинності", "сили", "дії", "ваги"]
    - sentence: "Усі будівельні роботи на об'єкті ведуться суворо _____ з графіком."
      answer: "згідно"
      options: ["згідно", "відповідно", "разом", "згідним"]
    - sentence: "Керівництво компанії вирішило вжити суворих _____ щодо порушників дисципліни."
      answer: "заходів"
      options: ["заходів", "мір", "кроків", "рішень"]
    - sentence: "Просимо вас брати активну _____ в обговоренні цього важливого проекту."
      answer: "участь"
      options: ["участь", "долю", "справу", "роль"]
    - sentence: "Рішення комісії було ухвалено виключно _____ до чинного законодавства."
      answer: "відповідно"
      options: ["відповідно", "згідно", "належно", "подібно"]
    - sentence: "Цей трудовий договір буде діяти _____ одного календарного року."
      answer: "протягом"
      options: ["протягом", "на протязі", "за час", "впродовж"]
    - sentence: "Для підтвердження повноважень вам необхідно надати офіційний _____ з протоколу."
      answer: "витяг"
      options: ["витяг", "шматок", "уривок", "фрагмент"]
    - sentence: "Першим і найголовнішим питанням _____ денного було затвердження фінансового звіту."
      answer: "порядку"
      options: ["порядку", "плану", "розкладу", "графіку"]
    - sentence: "Комісія підписала офіційний _____ прийому-передачі приміщення новому орендарю."
      answer: "акт"
      options: ["акт", "закон", "протокол", "наказ"]
    - sentence: "У проекті закону успішно _____ всі запропоновані технічні правки."
      answer: "схвалено"
      options: ["схвалено", "схвалені", "схвалять", "схвалювати"]

- type: fill-in
  title: "Замініть розмовні фрази на офіційні кліше"
  instruction: "Перетворіть неформальні речення на відповідні формулювання офіційно-ділового стилю."
  items:
    - sentence: "Він відмовився _____ участь у цій важливій конференції."
      answer: "брати"
      options: ["брати", "приймати", "робити", "мати"]
    - sentence: "Суд постановив _____ наказ про звільнення цього співробітника."
      answer: "скасувати"
      options: ["скасувати", "відмінити", "забрати", "видалити"]
    - sentence: "Ми не змогли виконати завдання _____ обставини, що від нас не залежали."
      answer: "через"
      options: ["через", "в силу", "із-за", "від"]
    - sentence: "Сторони нарешті домовилися _____ угоду про довгострокову співпрацю."
      answer: "укласти"
      options: ["укласти", "заключити", "підписати", "зробити"]
    - sentence: "Доповідач вирішив _____ приклад успішної реалізації проекту."
      answer: "навести"
      options: ["навести", "привести", "дати", "показати"]
    - sentence: "Адміністрація повинна _____ заходів щодо покращення умов праці."
      answer: "вжити"
      options: ["вжити", "прийняти", "взяти", "зробити"]
    - sentence: "Документ було успішно підписано _____ з чинним статутом."
      answer: "згідно"
      options: ["згідно", "відповідно", "разом", "поруч"]
    - sentence: "Обов'язковим _____ кожного документа є правильна дата та підпис."
      answer: "реквізитом"
      options: ["реквізитом", "деталлю", "шматком", "фактом"]
    - sentence: "Цей нормативний акт втрачає _____ на початку наступного місяця."
      answer: "чинність"
      options: ["чинність", "силу", "дію", "вагу"]
    - sentence: "Співробітники повинні написати _____ про надання відпустки."
      answer: "заяву"
      options: ["заяву", "прохання", "лист", "папір"]

- type: match-up
  title: "Знайдіть відповідність між терміном та його значенням"
  instruction: "З'єднайте юридичний чи діловий термін з його правильним визначенням."
  pairs:
    - left: "Заява"
      right: "Документ з проханням або пропозицією до керівництва."
    - left: "Наказ"
      right: "Розпорядчий документ, обов'язковий для виконання співробітниками."
    - left: "Протокол"
      right: "Документ, що фіксує хід обговорення на зборах чи нарадах."
    - left: "Акт"
      right: "Документ комісії для підтвердження встановлених фактів."
    - left: "Реквізит"
      right: "Обов'язковий елемент, без якого документ не має юридичної сили."
    - left: "Універсал"
      right: "Гетьманський маніфест або законодавчий акт доби Гетьманщини."
    - left: "Преамбула"
      right: "Вступна частина закону, що пояснює його мету."
    - left: "Юрисдикція"
      right: "Межі компетенції органу влади чи суду."
    - left: "Канцеляризм"
      right: "Специфічне слово або стійкий вираз офіційно-ділового стилю."
    - left: "Номіналізація"
      right: "Процес перетворення дієслів на іменники для об'єктивності."

- type: error-correction
  title: "Виправте граматичні та стилістичні помилки"
  instruction: "Знайдіть кальку або неправильне слововживання та виберіть правильний варіант."
  items:
    - sentence: "Директор наказав прийняти міри щодо порушників дисципліни на підприємстві."
      error: "прийняти міри"
      answer: "вжити заходів"
      options: ["вжити заходів", "взяти міри", "зробити заходи", "виконати міри"]
      explanation: "Калька з російської 'принимать меры' українською перекладається як 'вживати заходів'."
      error_type: "phrase"
    - sentence: "Компанія вирішила не приймати участь у цьому міжнародному тендері."
      error: "приймати участь"
      answer: "брати участь"
      options: ["брати участь", "робити участь", "мати участь", "давати участь"]
      explanation: "Правильний український вираз — 'брати участь', а не калька 'приймати участь'."
      error_type: "phrase"
    - sentence: "Цей договір буде діяти на протязі наступних п'яти років."
      error: "на протязі"
      answer: "протягом"
      options: ["протягом", "впродовж", "на часі", "під час"]
      explanation: "Для позначення тривалості часу використовують прийменники 'протягом' або 'упродовж'."
      error_type: "word"
    - sentence: "Згідно наказу директора, завтра оголошено додатковий вихідний день."
      error: "Згідно наказу"
      answer: "Згідно з наказом"
      options: ["Згідно з наказом", "Відповідно наказу", "Згідно до наказу", "По наказу"]
      explanation: "Прийменниковий зворот 'згідно з' обов'язково вимагає Орудного відмінка та прийменника 'з'."
      error_type: "phrase"
    - sentence: "Відповідно з новим законом, податки для підприємців будуть зменшені."
      error: "Відповідно з"
      answer: "Відповідно до"
      options: ["Відповідно до", "Відповідно з", "Згідно до", "По закону"]
      explanation: "Прийменниковий зворот 'відповідно до' вимагає Родового відмінка."
      error_type: "phrase"
    - sentence: "Шапка документа починається словами: Заява від менеджера відділу продажу."
      error: "від менеджера"
      answer: "менеджера"
      options: ["менеджера", "менеджеру", "менеджером", "до менеджера"]
      explanation: "У шапці заяви особа, яка її подає, вказується у Родовому відмінку без прийменника 'від'."
      error_type: "phrase"
    - sentence: "Ми були змушені заключити договір з іншим надійним постачальником."
      error: "заключити"
      answer: "укласти"
      options: ["укласти", "підписати", "зробити", "оформити"]
      explanation: "Договори та угоди українською мовою 'укладають', а не 'заключають'."
      error_type: "word"
    - sentence: "Керівник вирішив відмінити наказ через суттєві зміни в законодавстві."
      error: "відмінити"
      answer: "скасувати"
      options: ["скасувати", "забрати", "видалити", "знищити"]
      explanation: "Накази та інші правові документи правильно 'скасовувати', а не 'відміняти'."
      error_type: "word"

- type: unjumble
  title: "Побудуйте речення в офіційно-діловому стилі"
  instruction: "Розташуйте слова у правильному порядку, щоб утворити граматично коректне речення."
  items:
    - words: ["цей", "договір", "набирає", "чинності", "з", "моменту", "його", "офіційного", "підписання"]
      answer: "Цей договір набирає чинності з моменту його офіційного підписання."
    - words: ["усі", "виплати", "було", "здійснено", "згідно", "з", "договором", "оренди", "приміщення"]
      answer: "Усі виплати було здійснено згідно з договором оренди приміщення."
    - words: ["комісія", "уважно", "перевірила", "документи", "та", "склала", "відповідний", "акт"]
      answer: "Комісія уважно перевірила документи та склала відповідний акт."
    - words: ["рішення", "було", "ухвалено", "відповідно", "до", "статті", "конституції", "держави"]
      answer: "Рішення було ухвалено відповідно до статті конституції держави."
    - words: ["керівництво", "зобов'язане", "вжити", "необхідних", "заходів", "щодо", "порушників", "дисципліни"]
      answer: "Керівництво зобов'язане вжити необхідних заходів щодо порушників дисципліни."
    - words: ["звільнення", "працівника", "відбулося", "з", "ініціативи", "його", "безпосереднього", "роботодавця"]
      answer: "Звільнення працівника відбулося з ініціативи його безпосереднього роботодавця."
    - words: ["секретар", "повинен", "уважно", "вести", "протокол", "під", "час", "засідання", "ради"]
      answer: "Секретар повинен уважно вести протокол під час засідання ради."
    - words: ["прошу", "надати", "мені", "щорічну", "оплачувану", "відпустку", "терміном", "на", "два", "тижні"]
      answer: "Прошу надати мені щорічну оплачувану відпустку терміном на два тижні."

- type: select
  title: "Оберіть ознаки ділового стилю"
  instruction: "У кожному завданні виберіть усі правильні варіанти, які відповідають вимогам офіційно-ділового стилю."
  items:
    - question: "Які з цих словосполучень є правильними для офіційного документа? Оберіть усі правильні."
      min_correct: 2
      options:
        - text: "вжити заходів"
          correct: true
        - text: "прийняти міри"
          correct: false
        - text: "брати участь"
          correct: true
        - text: "приймати участь"
          correct: false
        - text: "на протязі року"
          correct: false
      explanation: "Правильні варіанти: вжити заходів, брати участь. Інші є кальками з російської мови."
    - question: "Які з цих іменників є типовими віддієслівними утвореннями, характерними для документів? Оберіть усі правильні."
      min_correct: 3
      options:
        - text: "затвердження"
          correct: true
        - text: "виконання"
          correct: true
        - text: "сонце"
          correct: false
        - text: "звільнення"
          correct: true
        - text: "краса"
