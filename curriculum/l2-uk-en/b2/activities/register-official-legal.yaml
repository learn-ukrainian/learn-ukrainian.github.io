- type: cloze
  title: "Історія та структура ділового стилю"
  passage: "Офіційно-діловий стиль обслуговує сферу юридичних та державних відносин. Його головна ознака — це абсолютна {{1}} та використання стійких словесних формул, які називаються {{2}}. У документах часто застосовується {{3}}, коли дієслова перетворюються на віддієслівні {{4}} (наприклад, виконання, забезпечення). Для створення дистанції використовуються {{5}} конструкції на -но/-то. \n\nІсторія українського діловодства сягає глибокої давнини. Найвищим адміністративним органом часів Гетьманщини була Генеральна військова {{6}}. Вона видавала {{7}} — гетьманські маніфести. Ще раніше на українських землях діяли Литовські {{8}}, написані руською (староукраїнською) мовою.\n\nСучасні закони також мають сувору структуру: кожен нормативно-правовий {{9}} поділяється на розділи та {{10}}. Документ повинен набрати {{11}}, щоб стати обов'язковим до виконання. Серед повсякденних документів найчастіше зустрічається {{12}}, яка містить прохання до керівництва, та {{13}}, у якому фіксується хід зборів (зокрема {{14}} денний). Грамотний фахівець завжди уникатиме кальок: він не буде приймати {{15}}, а обов'язково вживе {{16}}."
