- type: reading
  id: "reading-universal"
  title: "Історичне джерело: Мова козацької канцелярії"
  instruction: "Прочитайте інформацію про старовинний офіційний документ та дайте відповіді на запитання."
  text: "Універсал Богдана Хмельницького (1648 рік) є яскравим прикладом ділового стилю козацької доби. Документ починається традиційною преамбулою: 'Богдан Хмельницький, гетьман з Військом Його Королівської Милості Запорозьким...'. Далі йде чітке формулювання наказу або розпорядження щодо захисту прав міщан, забезпечення безпеки або збору податків. Універсали завжди скріплювалися підписом гетьмана та великою військовою печаткою, що було їхніми обов'язковими реквізитами. Мова цих документів була тогочасною українською книжною, вона демонструє високий рівень правової культури та використання чіткої термінології, яка уникала двозначності навіть кілька століть тому."
  tasks:
    - "Які обов'язкові реквізити робили універсал легітимним документом?"
    - "З яких слів починалася преамбула цього документа?"
    - "Якою мовою складалися гетьманські універсали у 17 столітті?"
    - "Які основні питання зазвичай регулювалися в розпорядчій частині універсалу?"

- type: essay-response
  id: "essay-application"
  title: "Письмове завдання: Оформлення заяви"
  prompt: "Уявіть, що ви працюєте менеджером відділу маркетингу в ТОВ 'Глобал'. Напишіть офіційну заяву на ім'я директора компанії (Коваленка Олександра Івановича) з проханням надати вам щорічну оплачувану відпустку терміном на 14 календарних днів з 1 числа наступного місяця. Зверніть особливу увагу на правильне оформлення шапки документа (відмінки) та розташування всіх обов'язкових реквізитів."
  model_answer: "Директору ТОВ 'Глобал'\nКоваленку О. І.\nменеджера відділу маркетингу\n[Ваше прізвище та ініціали]\n\nЗаява\n\nПрошу надати мені щорічну оплачувану відпустку терміном на 14 календарних днів з 01 червня 2024 року.\n\n25.05.2024                                       (підпис)"
  rubric:
    - criteria: "Оформлення шапки"
      description: "Адресат вказаний у Давальному відмінку, адресант — у Родовому без прийменника 'від'."
      points: 4
    - criteria: "Структура та реквізити"
      description: "Наявні назва документа, чіткий текст, дата та місце для підпису."
      points: 3
    - criteria: "Стилістика тексту"
      description: "Використано стандартні кліше ('Прошу надати'), відсутні емоційні чи неформальні вирази."
      points: 3