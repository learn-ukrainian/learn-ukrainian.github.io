  instruction: Оберіть правильний переклад.
- type: essay-response
  title: 'Стилістична трансформація: Від факту до образу'
  prompt: 'Напишіть короткий текст (150-200 слів), у якому ви перетворюєте сухий опис
    повсякденної події на художній твір. Оберіть будь-яку тему: ранкова кава, поїздка
    в метро, дощ за вікном тощо. Використайте щонайменше одну метафору, один епітет,
    одну персоніфікацію та одну стилістичну інверсію. Уникайте канцеляризмів та кальок.'
  min_words: 150
  model_answer: Сьогоднішній ранок не обіцяв нічого особливого, але несподівано перетворився
    на маленьке диво. За вікном плакав осінній дощ, вистукуючи свій сумний монолог
    по склу. Його холодні сльози розмивали сірі обриси міста. Я сидів на кухні, а
    переді мною парувала гаряча кава. Гіркий аромат пробуджував мої сонні думки. Раптом,
    крізь важкі свинцеві хмари пробився перший сонячний промінь. Вдарив він золотим
    мечем по калюжах, перетворивши звичайну воду на блискуче дзеркало. Усміхнулося
    небо, і відступив німий розпач негоди. Я зробив перший ковток, і відчув, як тепло
    розливається по тілу. Саме в такі миті розумієш справжню цінність спокою. Непомітно
    прийшов новий день, принісши з собою свіжі надії та обіцянки. Життя продовжувало
    свій вічний рух, незважаючи на дрібні негаразди.
  rubric:
    - criteria: Використання тропів
      description: Текст містить епітети, метафору та персоніфікацію, що створюють
        яскравий художній образ.
      points: 5
    - criteria: Синтаксична різноманітність
      description: Присутня стилістична інверсія, яка надає тексту необхідного ритму
        та динаміки.
      points: 3
    - criteria: Чистота стилю
      description: У тексті відсутні канцеляризми, російські кальки та стилістичний
        дисонанс.
      points: 2
