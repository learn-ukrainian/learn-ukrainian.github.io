        - синтез
        - аналіз
        - метод
    - sentence: Кожне слово має своє пряме значення, а також додаткову стилістичну
        або емоційну _____.
      answer: конотацію
      options:
        - конотацію
        - абстракцію
        - кальку
        - інверсію
  instruction: Оберіть правильне слово для заповнення пропуску.
