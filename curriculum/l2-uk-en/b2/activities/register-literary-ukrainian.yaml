- type: reading
  title: Аналіз літературного уривка
  text: 'Настала морозна зима. Непомітно підкралася сива зима, вкривши землю важкими
    білими килимами. Одягнули пухнасті шапки поснулі дерева, похиливши гілля під вагою
    снігу. Ні звуку не долинало з лісу; лише мороз малював свої химерні візерунки,
    і тиша дзвеніла в кришталевому повітрі.

    '
  tasks:
    - Які метафори використовує автор для опису снігу та повітря?
    - Знайдіть приклади персоніфікації природи у цьому тексті.
    - Як епітети "сива", "химерні", "кришталевому" допомагають створити настрій?
    - Перетворіть цей художній опис на нейтральне інформаційне повідомлення.
- type: true-false
  title: 'Перевірка розуміння: Літературний стиль'
  items:
    - statement: Головна мета художнього стилю — максимально точно та об'єктивно передати
        фактичну інформацію.
      correct: false
      explanation: Мета художнього стилю — естетичний вплив та створення емоційної
        образності.
    - statement: Канцелярит у художньому тексті вважається серйозною стилістичною
        помилкою.
      correct: true
      explanation: Канцелярит руйнує образність тексту і робить його штучним.
    - statement: Авторська індивідуальність є найвищою цінністю в офіційно-діловому
        стилі.
      correct: false
      explanation: В офіційно-діловому стилі цінується жорстка стандартизація, а в
        художньому — індивідуальність.
    - statement: Іван Котляревський у поемі "Енеїда" поєднав високий античний сюжет
        із живою народною мовою.
      correct: true
      explanation: Він використав жанр бурлеску, що стало революційним кроком у літературі.
    - statement: Кличний відмінок в українській мові використовується виключно для
        звертання до живих людей.
      correct: false
      explanation: У художній літературі він також застосовується для персоніфікації
        неживих об'єктів.
    - statement: Архаїзми — це слова, які вийшли з активного вжитку, але мають сучасні
        синоніми.
      correct: true
      explanation: Наприклад, "чоло" замість "лоб", "десниця" замість "права рука".
    - statement: Метонімія — це приховане порівняння, засноване на зовнішній подібності
        двох предметів.
      correct: false
      explanation: Це визначення метафори. Метонімія заснована на логічному зв'язку
        (наприклад, "читати Франка").
    - statement: Літота використовується авторами для навмисного применшення властивостей
        предмета чи явища.
      correct: true
      explanation: Класичний приклад літоти — "хлопчик-мізинчик".
    - statement: В українській мові прямий порядок слів (підмет, присудок, додаток)
        є єдиним граматично правильним.
      correct: false
      explanation: Порядок слів відносно вільний, а його зміна називається стилістичною
        інверсією.
    - statement: Вираз "приймати участь" є поширеною російською калькою, яку слід
        замінювати на "брати участь".
      correct: true
      explanation: Це сталий фразеологізм, який вимагає дієслова "брати".
  instruction: Визначте, чи твердження правильне.
- type: quiz
  title: Засоби виразності та словник
  items:
    - question: Який художній засіб передбачає перенесення властивостей живих істот
        на неживі предмети?
      explanation: Персоніфікація наділяє неживі предмети людськими якостями (ліс
        шепоче).
      options:
        - text: персоніфікація
          correct: true
        - text: гіпербола
          correct: false
        - text: метонімія
          correct: false
        - text: літота
          correct: false
    - question: До якої групи лексики належать слова "десниця", "чоло", "мовив"?
      explanation: Це архаїзми — застарілі слова, що мають сучасні синоніми.
      options:
        - text: архаїзми
          correct: true
        - text: історизми
          correct: false
        - text: діалектизми
          correct: false
        - text: неологізми
          correct: false
    - question: Який термін означає зміну прямого порядку слів у реченні для створення
        логічного акценту?
      explanation: Стилістична інверсія використовується для зміни інтонації та ритму.
      options:
        - text: інверсія
          correct: true
        - text: анафора
          correct: false
        - text: епітет
          correct: false
        - text: метафора
          correct: false
    - question: Що з наведеного нижче є прикладом використання метафори у художньому
        тексті?
      explanation: '"Серце каменіє" — це метафора, перенесення ознаки за подібністю.'
      options:
        - text: серце каменіє
          correct: true
        - text: читати Франка
          correct: false
        - text: срібний місяць
          correct: false
        - text: хлопчик-мізинчик
          correct: false
    - question: Як правильно звернутися до персоніфікованої абстракції "весна" у літературному
        стилі?
      explanation: Потрібно використовувати форму кличного відмінка — "О, весно!".
      options:
        - text: О, весно!
          correct: true
        - text: О, весна!
          correct: false
        - text: О, весною!
          correct: false
        - text: О, весни!
          correct: false
    - question: Яка з цих конструкцій є грубою мовною калькою і потребує негайного
        виправлення?
      explanation: Фраза "приймати участь" є калькою, правильно казати "брати участь".
      options:
        - text: приймати участь
          correct: true
        - text: брати участь
          correct: false
        - text: мати рацію
          correct: false
        - text: робити висновки
          correct: false
    - question: Як називається повторення однакових слів на початку кількох суміжних
        речень або віршованих рядків?
      explanation: Анафора допомагає створити певний ритм або наголосити на ключовій
        думці.
      options:
        - text: анафора
          correct: true
        - text: літота
          correct: false
        - text: гіпербола
          correct: false
        - text: метонімія
          correct: false
    - question: Який стилістичний ефект створює навмисне, надмірне перебільшення властивостей
        явища або предмета?
      explanation: Гіпербола використовується для перебільшення масштабів або сили.
      options:
        - text: гіпербола
          correct: true
        - text: літота
          correct: false
        - text: інверсія
          correct: false
        - text: метафора
          correct: false
    - question: Що таке діалектизми і для чого письменники використовують їх у своїх
        творах?
      explanation: Діалектизми передають особливості мови певного регіону для надання
        автентичності.
      options:
        - text: слова певного регіону
          correct: true
        - text: слова офіційного стилю
          correct: false
        - text: старовинні назви зброї
          correct: false
        - text: наукові або технічні терміни
          correct: false
    - question: Хто з українських письменників увів живу народну мову у велику літературу
        за допомогою бурлеску?
      explanation: Іван Котляревський здійснив революцію своєю поемою "Енеїда".
      options:
        - text: Іван Котляревський
          correct: true
        - text: Тарас Шевченко
          correct: false
        - text: Леся Українка
          correct: false
        - text: Михайло Коцюбинський
          correct: false
  instruction: Оберіть правильну відповідь.
