      answer: процес
      options:
        - процес
        - дослідження
        - синтез
        - метод
    - sentence: Художній _____ Панаса Мирного характеризується психологізмом та увагою
        до найменших деталей.
      answer: метод
      options:
        - метод
        - синтез
        - процес
        - епітет
    - sentence: Ми проводимо глибокий стилістичний _____, розглядаючи лексику, синтаксис
        та систему образів.
      answer: аналіз
      options:
        - аналіз
        - термін
        - поняття
        - процес
    - sentence: За розбором тексту обов'язково має йти _____ — поєднання розрізнених
        елементів у цілісний образ.
      answer: синтез
      options:
        - синтез
        - аналіз
        - метод
        - дослідження
    - sentence: Цей науковий текст вимагає тривалого _____ перед тим, як ми зможемо
        зробити обґрунтовані висновки.
      answer: дослідження
      options:
        - дослідження
        - синтезу
        - терміна
        - поняття
    - sentence: Автор використовує у тексті місцевий _____, щоб надати розповіді більшої
        історичної автентичності.
      answer: колорит
      options:
        - колорит
        - пафос
        - дисонанс
        - термін
    - sentence: Неприродне змішування слів з різних, несумісних регістрів називається
        стилістичний _____.
      answer: дисонанс
      options:
