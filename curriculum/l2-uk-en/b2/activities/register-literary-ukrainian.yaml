- type: fill-in
  title: Вставте правильні терміни
  items:
    - sentence: Літературознавчий _____ — це слово або словосполучення, яке має чітке
        визначення у певній галузі знань.
      answer: термін
      options:
        - термін
        - аналіз
        - синтез
        - процес
    - sentence: Абстрактне _____, таке як свобода чи національна ідентичність, розкривається
