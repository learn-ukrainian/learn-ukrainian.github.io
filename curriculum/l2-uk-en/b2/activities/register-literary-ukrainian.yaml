  instruction: У наведеному тексті позначте слова, які виступають у ролі епітетів
    (яскравих художніх означень).
  text: Настала морозна зима. Непомітно підкралася сива зима, вкривши землю важкими
    білими килимами. Одягнули пухнасті шапки поснулі дерева. Було дуже холодно і надзвичайно
