- type: reading
  id: reading-1
  title: Уривок із поезії Ліни Костенко
  source: Ліна Костенко
  text: 'Вечірнє сонце, дякую за день!

    Вечірнє сонце, дякую за втому.

    За тих лісів просвітлений Едем

    і за волошку в житі золотому.

    '
  tasks:
  - Які синтаксичні засоби використано в цій поезії?
  - Як відсутність дієслів впливає на загальне сприйняття цих рядків?
  - Яку функцію тут виконує номінативний характер тексту?
- type: essay-response
  title: 'Есе: Аналіз поетичного синтаксису'
  source_reading: reading-1
  prompt: Проаналізуйте наведений уривок поезії. Як свідомий пропуск дієслів (еліпсис)
    допомагає авторці сконцентрувати увагу на емоціях та образах природи? Напишіть
    коротке есе, використовуючи вивчені лінгвістичні терміни.
  min_words: 150
  model_answer: 'У наведеному поетичному уривку Ліни Костенко ми спостерігаємо яскравий
    приклад еліпсису. Авторка свідомо уникає використання дієслів у перших рядках,
    створюючи особливий емоційний настрій. Відсутність дієслова-зв''язки або дієслів
    стану робить конструкцію максимально лаконічною та динамічною. Увага читача миттєво
    фокусується на ключових іменниках: сонце, день, втома, Едем, волошка. Такий номінативний
    характер тексту посилює відчуття абсолютного спокою, глибокої рефлексії та щирої
    вдячності ліричного героя. Стилістична економія дозволяє уникнути зайвої описовості
    і перетворює кожне слово на потужний, емоційно насичений художній образ, що характерно
    для високої поезії.'
  rubric:
  - criteria: Розуміння еліпсису
    description: Студент правильно визначає еліпсис в уривку та його функцію.
    points: 5
  - criteria: Використання термінів
    description: У тексті доречно використано лексику уроку (еліпсис, номінативний,
      лаконічність).
    points: 5
- type: true-false
  title: 'Теорія: Правда чи брехня?'
  items:
  - statement: Еліпсис — це випадковий пропуск слова через неуважність письменника.
    correct: false
    explanation: Еліпсис є абсолютно свідомим художнім прийомом автора.
  - statement: Парцеляція розриває речення на частини за допомогою крапки.
    correct: true
    explanation: Саме крапка створює потрібну паузу та інтонаційний розрив.
  - statement: Номінативні речення містять лише підмет і не мають дієслова.
    correct: true
    explanation: Такі речення просто фіксують факт існування певного явища.
  - statement: В офіційно-діловому стилі парцеляція є дуже бажаним явищем.
    correct: false
    explanation: Парцеляція суворо заборонена в усіх офіційних документах.
  - statement: Кома може успішно замінити крапку при створенні парцеляції.
    correct: false
    explanation: Кома не створює глибокого інтонаційного розриву і руйнує ефект.
  - statement: У щоденному діалозі неповні речення виникають заради економії зусиль.
    correct: true
    explanation: Це звичайна побутова неповнота, а не складний стилістичний прийом.
  - statement: Шістдесятники активно використовували еліпсис для акцентування образів.
    correct: true
    explanation: Пропуск дієслова-зв'язки фокусував увагу на унікальності прикметника.
  - statement: Парцеляція робить розірвані речення логічно незалежними одне від одного.
    correct: false
    explanation: Парцеляти завжди залишаються частинами одного логічного речення.
  - statement: Відокремлення обставини часу крапкою може створювати ілюзію тривалості.
    correct: true
    explanation: Це уповільнює розповідь і привертає до обставини максимум уваги.
  - statement: Зворотне відновлення пропущених слів доводить доцільність еліпсису.
    correct: true
    explanation: Критерій відновлюваності допомагає перевірити прозорість конструкції.
  instruction: Визначте, чи твердження правильне.
