  prompt: "Напишіть новину (мінімум 150 слів) про рішення міської ради заборонити пластикові пакети у всіх супермаркетах міста. Ваша новина повинна містити: 1) динамічний лід (вступний абзац), 2) коментарі експертів (із використанням наукових термінів), 3) очікувані наслідки для економіки (із використанням доменної лексики). Обов'язкова умова: уникайте канцеляризмів, пасивних конструкцій з виконавцем в орудному відмінку та активних дієприкметників на -учий/-ючий. Використовуйте безособові форми на -но, -то для констатації фактів."
  min_words: 150
  model_answer: "Міська рада сьогодні офіційно заборонила використання одноразових пластикових пакетів у всіх супермаркетах нашого міста. Нове суворе правило почне діяти вже з першого числа наступного місяця. Місцеві екологи давно вимагали ухвалення такого рішення, адже забруднення навколишнього середовища пластиком досягло справді критичного рівня. Як зазначив керівний склад департаменту екології, цей рішучий крок є абсолютно необхідним для нашого майбутнього. Депутатами ухвалено комплексний план поступового переходу на безпечні екологічні альтернативи. Провідні науковці міста провели ґрунтовне багаторічне дослідження і переконливо довели, що довготривалий процес розкладання пластику безповоротно отруює підземні води. Термін 'мікропластик' тепер стосується здоров'я кожного з нас. Завдяки впровадженню інноваційного методу швидкої переробки органічних відходів, місто зможе дуже суттєво зменшити щоденне навантаження на переповнені сміттєзвалища. Власники та представники великого місцевого бізнесу вже відкрито підтримали цю корисну ініціативу. На обґрунтовану думку фінансових аналітиків та економістів, цільові інвестиції у масштабне виробництво міцних паперових паковань значно зростуть найближчим часом, що гарантовано створить нові робочі місця для населення. Актуальний попит на безпечну екологічну тару вже зараз значно перевищує наявну пропозицію на ринку. Звичайні покупці, які щоденно відвідують продуктові магазини, зможуть легко придбати стильні багаторазові торбинки за цілком доступними цінами. Свідоме та відповідальне ставлення до рідної природи поступово стає новим невід'ємним стандартом комфортного міського життя."
