- type: reading
  title: "Аналіз публіцистичного стилю"
  instruction: "Прочитайте уривок із новини та дайте відповіді на запитання."
  text: |
    Сотні екологічних активістів вийшли вчора ввечері на мітинг у центрі міста. Вони вимагають негайно зупинити незаконну забудову історичного парку. За словами міського голови, ситуація перебуває під контролем, і відповідне рішення вже готується до ухвалення. Протестувальники заявляють, що не залишать площу до повного скасування дозволів на будівництво.
  tasks:
    - "Які ознаки публіцистичного стилю ви бачите в цьому короткому тексті?"
    - "Як автор використовує активні дієслова для створення інформаційної динаміки?"
    - "Знайдіть яскравий приклад доменної політичної лексики в цьому уривку."
    - "Чому перше речення є гарним та правильним прикладом новинного ліду?"

- type: true-false
  title: "Перевірка розуміння стилістики"
  instruction: "Визначте, чи є ці твердження про стилістику української мови правильними."
  items:
    - statement: "В українській мові орудний відмінок часто і природно використовується для позначення виконавця дії."
      correct: false
      explanation: "Орудний відмінок позначає інструмент, а використання його для людини є калькою."
    - statement: "Слово 'тяма' було штучно замінено на слово 'поняття' у тридцятих роках минулого століття."
      correct: true
      explanation: "Це сталося під час політики лінгвоциду та штучного наближення мови до російської."
    - statement: "Офіційно-діловий стиль зазвичай уникає використання емоційної лексики та будь-яких художніх метафор."
      correct: true
      explanation: "Головна мета цього стилю — точна і однозначна передача інформації."
    - statement: "Безособова форма на -но та -то є найкращим способом яскраво показати виконавця дії в тексті."
      correct: false
      explanation: "Ці форми навпаки використовуються для того, щоб приховати виконавця і змістити акцент на результат."
    - statement: "Активні дієприкметники на -учий та -ючий вважаються цілком органічними для сучасної української мови."
      correct: false
      explanation: "Більшість із них є штучними кальками, яких варто уникати."
    - statement: "Інститут української наукової мови активно створював термінологію на основі живої народної мови."
      correct: true
      explanation: "Вони не просто копіювали іноземні слова, а шукали питомі відповідники."
    - statement: "Номіналізація — це процес перетворення іменника на дієслово для стилістичного полегшення тексту."
      correct: false
      explanation: "Номіналізація — це перетворення дієслова на абстрактний іменник, що робить текст важчим."
    - statement: "Розмовний стиль комунікації досить часто використовує стилістичний еліпсис для значного скорочення речень."
      correct: true
      explanation: "Пропуск слів, які зрозумілі з контексту, робить розмову більш динамічною."
    - statement: "Якісний заголовок новини повинен бути максимально довгим, щоб передати абсолютно всю суть події."
      correct: false
      explanation: "Заголовок має миттєво захопити увагу, тому він зазвичай короткий."
    - statement: "Науковий стиль вимагає абсолютної об'єктивності, тому автори дуже часто використовують безособові конструкції."
      correct: true
      explanation: "Це робиться для того, щоб показати істинність факту незалежно від дослідника."

- type: quiz
  title: "Термінологія та стилістичні правила"
  instruction: "Оберіть одну правильну відповідь на кожне запитання."
  items:
    - question: "Який відмінок слід використовувати для позначення інструмента, яким безпосередньо виконується певна фізична дія?"
      explanation: "Орудний відмінок відповідає на питання 'ким? чим?' і слугує для позначення знаряддя праці."
      options:
        - text: "орудний"
          correct: true
        - text: "називний"
          correct: false
        - text: "знахідний"
          correct: false
        - text: "місцевий"
          correct: false
    - question: "Що означає термін 'лінгвоцид', який дуже часто згадується в історичному контексті розвитку української мови?"
      explanation: "Цей термін походить від слів 'мова' та 'вбивство' і означає політику свідомого знищення мови."
      options:
        - text: "свідоме знищення мови"
          correct: true
        - text: "штучне створення нових слів"
          correct: false
        - text: "вивчення діалектів"
          correct: false
        - text: "переклад іншомовних книг"
          correct: false
    - question: "Яка форма пасивного стану вважається найбільш природною та органічною для українських офіційних звітів та щоденних новин?"
      explanation: "Ця форма зміщує фокус на результат дії, зберігаючи природний український синтаксис."
      options:
        - text: "безособова на -но, -то"
          correct: true
        - text: "з агенсом в орудному відмінку"
          correct: false
        - text: "активний стан дієслова"
          correct: false
        - text: "дієприкметниковий зворот"
          correct: false
    - question: "Як найкраще замінити неприродний активний дієприкметник 'працюючий' у сучасному грамотному та якісному публіцистичному тексті?"
      explanation: "Використання підрядного речення є найефективнішим способом уникнути кальок."
      options:
        - text: "використати підрядне речення з 'який'"
          correct: true
        - text: "залишити слово без жодних змін"
          correct: false
        - text: "додати до нього вставне слово"
          correct: false
        - text: "перетворити його на абстрактний іменник"
          correct: false
    - question: "Чим саме характеризується граматичний процес номіналізації, який дуже часто зустрічається в різноманітних текстах наукового стилю?"
      explanation: "Наука фокусується на діях як на об'єктах, тому дієслова перетворюються на іменники."
      options:
        - text: "перетворенням дієслова на абстрактний іменник"
          correct: true
        - text: "використанням великої кількості емоційних метафор"
          correct: false
        - text: "пропуском важливих членів речення для динаміки"
          correct: false
        - text: "повною заміною всіх дієслів на прикметники"
          correct: false
    - question: "Яке з цих широко вживаних та загальновідомих слів є яскравим прикладом доменної лексики у важливій сфері права?"
      explanation: "Це слово означає людину, яка звертається до суду з позовом."
      options:
        - text: "позивач"
          correct: true
        - text: "інфляція"
          correct: false
        - text: "коаліція"
          correct: false
        - text: "термін"
          correct: false
    - question: "Що є головною та першочерговою метою використання стилістичного еліпсису в заголовках сучасних українських щоденних новин?"
      explanation: "Журналісти економлять місце і час, роблячи заголовок більш читабельним."
      options:
        - text: "динамічно і дуже коротко передати інформацію"
          correct: true
        - text: "додати тексту максимальної наукової об'єктивності"
          correct: false
        - text: "ускладнити розуміння змісту статті для читача"
          correct: false
        - text: "виконати всі суворі граматичні правила мови"
          correct: false
    - question: "Яке питоме українське слово було успішно запропоновано науковцями замість відомого та поширеного міжнародного слова 'перпендикуляр'?"
      explanation: "Слово має прозору внутрішню форму і базується на зрозумілих коренях."
      options:
        - text: "прямовис"
          correct: true
        - text: "тяма"
          correct: false
        - text: "метод"
          correct: false
        - text: "процес"
          correct: false
    - question: "Чому використання орудного відмінка для позначення живої людини вважається дуже серйозною та поширеною стилістичною помилкою?"
      explanation: "Граматично орудний відмінок перетворює людину на предмет або бездушний інструмент."
      options:
        - text: "бо це граматично перетворює людину на інструмент"
          correct: true
        - text: "бо цей відмінок повністю вийшов із загального вжитку"
          correct: false
        - text: "бо це порушує складні правила пунктуації"
          correct: false
        - text: "бо так зазвичай говорять лише маленькі діти"
          correct: false
    - question: "Що саме означає процес 'демістифікації' стосовно дуже складного академічного чи надзвичайно вузькоспеціалізованого наукового тексту?"
      explanation: "Це навичка перекладати з академічної мови на зрозумілу людську."
      options:
        - text: "пояснення складної інформації максимально простою мовою"
          correct: true
        - text: "переклад тексту на кілька різних іноземних мов"
          correct: false
        - text: "додавання нових складних термінів до загального словника"
          correct: false
        - text: "повне перетворення розмовного тексту на офіційний звіт"
          correct: false

- type: error-correction
  title: "Корекція стилістичних помилок"
  instruction: "Знайдіть і виправте штучні дієприкметники та канцеляризми в реченнях."
  items:
    - sentence: "Всі бажаючі можуть сьогодні приєднатися до нашої нової екологічної ініціативи."
      error: "бажаючі"
      answer: "охочі"
      error_type: "word"
      options:
        - "охочі"
        - "бажані"
        - "хочучі"
        - "бажальні"
      explanation: "Активні дієприкметники на -учий/-ючий є кальками. Краще використовувати слово 'охочі'."
    - sentence: "Ми звернулися до керуючого органу з офіційним письмовим запитом щодо фінансування."
      error: "керуючого"
      answer: "керівного"
      error_type: "word"
      options:
        - "керівного"
        - "керованого"
        - "керувального"
        - "керівника"
      explanation: "Слово 'керуючий' є типовим канцеляризмом. Правильно — 'керівний орган'."
    - sentence: "На автобусній зупинці стояли подорожуючі люди з дуже великими валізами."
      error: "подорожуючі"
      answer: "подорожні"
      error_type: "word"
      options:
        - "подорожні"
        - "подорожувані"
        - "дорогові"
        - "дорожні"
      explanation: "Замість незграбного дієприкметника використовуйте іменник 'подорожні' або 'мандрівники'."
    - sentence: "Проблема, існуюча в нашому суспільстві, потребує негайного та ефективного вирішення."
      error: "існуюча"
      answer: "наявна"
      error_type: "word"
      options:
        - "наявна"
        - "існувана"
        - "буттєва"
        - "сутня"
      explanation: "Замість 'існуючий' краще вживати прикметник 'наявний' або підрядне речення 'яка існує'."
    - sentence: "Оточуюче середовище постійно страждає від значного рівня пластикового забруднення."
      error: "Оточуюче"
      answer: "Навколишнє"
      error_type: "word"
      options:
        - "Навколишнє"
        - "Оточене"
        - "Кругове"
        - "Обхідне"
      explanation: "Словосполучення 'оточуюче середовище' є калькою. Правильно — 'навколишнє середовище' або 'довкілля'."
    - sentence: "Нові студенти, не маючі жодного досвіду, можуть успішно пройти наше стажування."
      error: "не маючі"
      answer: "без"
      error_type: "phrase"
      options:
        - "без"
        - "не маючи"
        - "немані"
        - "відсутні"
      explanation: "Дієприкметники теперішнього часу на -ачий/-ячий є помилкою. Краще використати прийменник 'без'."
    - sentence: "Він прийняв активну участь у великій міжнародній конференції з питань деколонізації."
      error: "прийняв"
      answer: "взяв"
      error_type: "phrase"
      options:
        - "взяв"
        - "зробив"
        - "отримав"
        - "здобув"
      explanation: "Вислів 'приймати участь' — російська калька. Українською правильно казати 'брати участь'."
    - sentence: "Ця аналітична стаття цілком відноситься до сучасного публіцистичного стилю."
      error: "відноситься"
      answer: "належить"
      error_type: "word"
      options:
        - "належить"
        - "стосується"
        - "віддається"
        - "переноситься"
      explanation: "Предмети та явища 'належать' до категорій, а не 'відносяться' (це калька з російського 'относится')."

