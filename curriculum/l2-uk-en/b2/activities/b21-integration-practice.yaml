  passage: "Сучасна українська мова має кілька функціональних стилів. Офіційно-діловий стиль часто використовує специфічні слова, які називаються {{1}}. Цей стиль також відрізняється використанням безособових форм на {{2}} та {{3}}. Науковий стиль, з іншого боку, базується на точній {{4}}. Кожне слово в науці має чітке значення і називається {{5}}. Для опису динаміки вчені використовують слово {{6}}, а шлях дослідження називають {{7}}. Дуже часто науковці використовують {{8}} — перетворення дієслів на абстрактні іменники. Публіцистичний стиль, який ми бачимо в новинах, має бути динамічним. Головна його мета — вплинути на суспільну думку. Перший абзац новини, який містить найважливішу інформацію, називається {{9}}. Журналісти часто пропускають слова для стислості, і це явище має назву {{10}}. Вони також уникають штучних слів, таких як активні {{11}} теперішнього часу на зразок 'бажаючий' або 'працюючий'. Натомість використовують природні відповідники: замість 'бажаючий' кажуть {{12}}, а замість 'керуючий' — {{13}}. Коли ми читаємо новини, ми часто зустрічаємо доменну лексику. Наприклад, в економіці говорять про {{14}} та {{15}}, а в політиці — про ухвалення законів та право на {{16}}."
