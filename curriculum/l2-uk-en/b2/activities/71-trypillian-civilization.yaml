module: 71-trypillian-civilization
level: B2
activities:
  - type: quiz
    title: "Розуміння тексту та авторської візії"
    instruction: "Відповідайте на питання, спираючись на лінгвістичні та смислові акценти тексту."
    items:
      - question: "Яку головну тезу намагається довести автор через опис Трипільської цивілізації?"
        options:
          - text: "Україна була ізольованим регіоном"
            correct: false
          - text: "Українська земля має глибоке історичне коріння та культурну тяглість"
            correct: true
          - text: "Трипільці були предками слов'ян"
            correct: false
          - text: "Археологія є найважливішою наукою"
            correct: false
        explanation: "Текст наголошує, що Трипілля доводить глибоке історичне коріння та спростовує міф про «молоду націю»."
      - question: "Як автор характеризує відкриття Вікентія Хвойки в контексті європейської історії?"
        options:
          - text: "Як локальну подію"
            correct: false
          - text: "Як відкриття, що змінило розуміння європейської передісторії"
            correct: true
          - text: "Як помилкову теорію"
            correct: false
          - text: "Як копіювання західних досліджень"
            correct: false
        explanation: "У тексті сказано, що відкриття «змінило наше розуміння європейської передісторії»."
      - question: "Яку метафору використовує автор для пояснення значення трипільських орнаментів?"
        options:
          - text: "Дзеркало душі"
            correct: false
          - text: "Візитівка культури та зображення космосу"
            correct: true
          - text: "Карта місцевості"
            correct: false
          - text: "Книга рекордів"
            correct: false
        explanation: "Текст називає кераміку «візитівкою культури» та каже, що орнаменти зображували космос."
      - question: "Чому автор наголошує на тому, що Хвойка не був «офіційним» російським археологом?"
        options:
          - text: "Щоб показати його бідність"
            correct: false
          - text: "Щоб підкреслити його свободу від імперських упереджень"
            correct: true
          - text: "Щоб заперечити його професіоналізм"
            correct: false
          - text: "Щоб виправдати брак фінансування"
            correct: false
        explanation: "«Можливо, саме тому він був вільний від імперських упереджень і міг об'єктивно оцінити значення своїх знахідок»."
      - question: "Згідно з текстом, яке порівняння використовується для планування трипільських поселень?"
        options:
          - text: "Порівняння з сучасними мікрорайонами"
            correct: true
          - text: "Порівняння з лісом"
            correct: false
          - text: "Порівняння з шахівницею"
            correct: false
          - text: "Порівняння з античними храмами"
            correct: false
        explanation: "«Це нагадує сучасні мікрорайони з їхнім радіальним плануванням!»"
      - question: "Яким терміном Михайло Відейко характеризує великі трипільські поселення?"
        options:
          - text: "Мегаполіси"
            correct: false
          - text: "Протоміста"
            correct: true
          - text: "Тимчасові табори"
            correct: false
          - text: "Сільські громади"
            correct: false
        explanation: "Відейко стверджує: «Трипільці створили перші в Європі протоміста»."
      - question: "Яку рису раціону трипільців підкреслює автор у розділі про сучасні дослідження?"
        options:
          - text: "Він був бідним на вітаміни"
            correct: false
          - text: "Він був різноманітним і здоровим"
            correct: true
          - text: "Він складався лише з хліба"
            correct: false
          - text: "Він був ідентичний раціону вікінгів"
            correct: false
        explanation: "«Їхній раціон був різноманітним і здоровим — можливо, кращим за раціон середньовічних європейців!»"
      - question: "Яке значення має трипільська спадщина для деколонізації української свідомості?"
        options:
          - text: "Вона допомагає вчити іноземні мови"
            correct: false
          - text: "Вона спростовує наратив про Україну як «штучне утворення» без історії"
            correct: true
          - text: "Вона підтверджує радянські підручники"
            correct: false
          - text: "Вона дозволяє претендувати на території інших держав"
            correct: false
        explanation: "Знання про Трипілля «особливо важливе в контексті сучасної війни з Росією... спростовує наратив про молоду націю»."

  - type: match-up
    title: "Історична термінологія та контекст"
    instruction: "З'єднайте термін із його функціональним значенням у тексті."
    pairs:
      - left: "Тяглість"
        right: "Безперервне існування цивілізації на землі"
      - left: "Протомісто"
        right: "Поселення, що передує появі класичних міст"
      - left: "Орнамент"
        right: "Символічне зображення космосу та життя"
      - left: "Артефакт"
        right: "Матеріальний предмет із минулого"
      - left: "Деколонізація"
        right: "Звільнення історії від імперських наративів"
      - left: "Хліборобство"
        right: "Основа господарського життя трипільців"
      - left: "Мідноливарство"
        right: "Одна з ранніх технологій обробки металу"
      - left: "Концентричний"
        right: "Спосіб планування будинків колами"

  - type: cloze
    title: "Траєкторія розвитку цивілізації"
    instruction: "Заповніть пропуски словами, що характеризують розвиток та спадщину Трипілля."
    passage: |
      Трипільська культура була однією з {найрозвиненіших|найбідніших|наймолодших} цивілізацій Європи. Трипільці {будували|руйнували|ігнорували} величезні поселення, які за площею {перевершували|поступалися|відповідали} тогочасні міста Месопотамії. 
      
      Їхня кераміка, прикрашена {спіральним|прямим|хаотичним} орнаментом, свідчить про {складну|примітивну|відсутню} систему світогляду. Символи на посуді мали {сакральний|випадковий|побутовий} зміст, пов'язаний із культом {родючості|смерті|війни}.
      
      Відкриття Вікентія Хвойки було {зухвалим|непомітним|випадковим} викликом тодішнім уявленням про Східну Європу як {периферію|центр|острів}. Сьогодні трипільська спадщина є частиною українського культурного {коду|права|боргу}, що доводить нашу {суб'єктність|залежність|молодість} в історії. 
      
      Українські дизайнери {відроджують|забувають|приховують} давні мотиви, перетворюючи історію на {модний|застарілий|секретний} тренд сучасності. Трипілля — це доказ того, що українська земля завжди була {джерелом|кінцем|бар'єром} інновацій.

  - type: true-false
    title: "Концептуальний аналіз тексту"
    instruction: "Визначте, чи відповідає твердження авторській позиції в тексті."
    items:
      - statement: "Автор порівнює планування Трипільських поселень із сучасними мікрорайонами."
        correct: true
        explanation: "Так, у тексті вжито саме таке порівняння для наочності."
      - statement: "Російська імперська наука активно допомагала Хвойці фінансувати розкопки."
        correct: false
        explanation: "Навпаки, Хвойка фінансував розкопки з власних коштів, а імперія не була зацікавлена в них."
      - statement: "Текст стверджує, що трипільці вирощували картоплю."
        correct: false
        explanation: "Картоплю згадано лише як приклад глобальних змін у майбутньому (в інших модулях), а трипільці вирощували пшеницю, ячмінь та просо."
      - statement: "Трипільська спіраль є офіційним символом сучасного Українського культурного фонду."
        correct: true
        explanation: "Це наведено в тексті як приклад використання символіки сьогодні."
      - statement: "Поняття «культурна тяглість» означає прямий біологічний зв'язок між народами."
        correct: false
        explanation: "Автор уточнює, що це означає безперервне існування цивілізації на землі, а не прямий етнічний зв'язок."
      - statement: "Радянська наука намагалася привласнити Трипілля як частину «загальноруської» спадщини."
        correct: true
        explanation: "Так, автор критикує це як типовий приклад привласнення чужої історії."
      - statement: "Згідно з текстом, трипільці мали звичай спалювати свої поселення кожні 60-80 років."
        correct: true
        explanation: "Це згадується як одна із загадок і характерних звичаїв цієї культури."
      - statement: "Україна вже включила Трипілля до Списку ЮНЕСКО."
        correct: false
        explanation: "Україна лише *пропонує* це зробити, процес триває."

  - type: error-correction
    title: "Граматика в історичному наративі"
    instruction: "Виправте помилки в реченнях, що описують історію Трипілля."
    items:
      - sentence: "Трипільська культура існувало протягом майже трьох тисячоліть."
        error: "існувало"
        answer: "існувала"
        options: ["існувало", "існувала", "існували", "існує"]
        explanation: "Культура — жіночий рід."
      - sentence: "Хвойка проводив розкопки біля село Трипілля на Київщині."
        error: "біля село"
        answer: "біля села"
        options: ["біля село", "біля села", "біля селу", "біля селом"]
        explanation: "Прийменник 'біля' потребує родового відмінка."
      - sentence: "Трипільці створювали вишукану кераміку з унікальний орнаментом."
        error: "унікальний"
        answer: "унікальним"
        options: ["унікальний", "унікальним", "унікального", "унікальна"]
        explanation: "Орудний відмінок прикметника."
      - sentence: "Відкриття мало величезний значення для європейської науки."
        error: "величезний"
        answer: "величезне"
        options: ["величезний", "величезне", "величезна", "величезним"]
        explanation: "Значення — середній рід."
      - sentence: "Поселення були розташовані концентричними колами навколо площа."
        error: "навколо площа"
        answer: "навколо площі"
        options: ["навколо площа", "навколо площі", "навколо площою", "навколо площею"]
        explanation: "Навколо чого? (Родовий відмінок)."
      - sentence: "Україна спадкоємиця однієї з найдавніший культур Європи."
        error: "найдавніший"
        answer: "найдавніших"
        options: ["найдавніший", "найдавніших", "найдавнішою", "найдавнішої"]
        explanation: "Родовий відмінок множини."

  - type: group-sort
    title: "Регістри та лексичні групи"
    instruction: "Розподіліть слова за їхнім смисловим навантаженням у тексті."
    groups:
      - name: "Спадщина та Ідентичність"
        items:
          - "Культурний код"
          - "Національна ідентичність"
          - "Спадкоємиця"
          - "Тяглість"
          - "Символ"
          - "Самобутність"
      - name: "Археологія та Технології"
        items:
          - "Радіовуглецевий аналіз"
          - "Артефакт"
          - "Мідноливарство"
          - "Випалювання кераміки"
          - "Аерофотозйомка"
          - "Первинне джерело"
      - name: "Побут та Господарство"
        items:
          - "Землеробство"
          - "Скотарство"
          - "Протомісто"
          - "Двоповерховий будинок"
          - "Орнамент"
          - "Раціон"
      - name: "Колоніальний тиск"
        items:
          - "Привласнення історії"
          - "Імперські упередження"
          - "Міф про молоду націю"
          - "Колоніальний стереотип"
          - "Ігнорування"
          - "Викривлення"

  - type: mark-the-words
    title: "Аналіз деколонізаційного тексту"
    instruction: "Натисніть на слова, що позначають інструменти привласнення історії або протидії йому."
    text: "Російська імперська *історіографія* часто применшувала значення Трипілля. Це типовий приклад *привласнення* чужої історії. Проте сучасна *деколонізація* вимагає спростування *міфів* про «молоду націю». Глибоке *коріння* цивілізації доводить культурну *тяглість* та утверджує нашу *суб'єктність* у світі."

  - type: select
    title: "Сучасне Трипілля: Резонанс"
    instruction: "Оберіть усі правильні твердження про те, як трипільська спадщина живе в сучасній Україні за текстом."
    items:
      - question: "Які прояви трипільської культури можна зустріти в сучасній Україні?"
        options:
          - text: "Логотипи компаній та Українського культурного фонду"
            correct: true
          - text: "Використання орнаментів на формі олімпійської збірної"
            correct: true
          - text: "Пропозиція включення до Списку ЮНЕСКО"
            correct: true
          - text: "Заборона археологічних досліджень"
            correct: false
          - text: "Відродження трипільської кухні в ресторанах"
            correct: true
          - text: "Привласнення спадщини іншими імперіями"
            correct: false
      - question: "Де можна побачити найбільші колекції трипільських артефактів за текстом?"
        options:
          - text: "У Національному музеї історії України в Києві"
            correct: true
          - text: "У Британському музеї"
            correct: false
          - text: "У Музеї Трипільської культури в Легедзиному"
            correct: true
          - text: "В Одеському археологічному музеї"
            correct: true
          - text: "Тільки в приватних колекціях за кордоном"
            correct: false
      - question: "Що можна зробити в музеї в Легедзиному згідно з текстом?"
        options:
          - text: "Побачити реконструкцію трипільського будинку"
            correct: true
          - text: "Взяти участь у розкопках без дозволу"
            correct: false
          - text: "Відвідати музей просто неба"
            correct: true
          - text: "Купити справжні артефакти"
            correct: false
      - question: "Які страви пропонують ресторани, що відроджують трипільську кухню?"
        options:
          - text: "Каші з давніх зернових"
            correct: true
          - text: "Випічку з полби"
            correct: true
          - text: "Напої з меду"
            correct: true
          - text: "Страви з картоплі та рису"
            correct: false
      - question: "Які трипільські мотиви використовують сучасні дизайнери?"
        options:
          - text: "Спіральні орнаменти на сукнях"
            correct: true
          - text: "Зображення богині-матері"
            correct: true
          - text: "Портрети єгипетських фараонів"
            correct: false
          - text: "Геометричні візерунки на футболках"
            correct: true
      - question: "Яке значення має монета НБУ «Трипільська культура»?"
        options:
          - text: "Символ визнання спадщини на державному рівні"
            correct: true
          - text: "Приклад використання трипільської символіки сьогодні"
            correct: true
          - text: "Основна валюта трипільців"
            correct: false
          - text: "Засіб деколонізації культурного простору"
            correct: true

  - type: translate
    title: "Ключові поняття деколонізації"
    instruction: "Оберіть правильний український відповідник для термінів деколонізаційного дискурсу."
    items:
      - source: "Cultural continuity on the land"
        options:
          - text: "Культурна тяглість на землі"
            correct: true
          - text: "Культурна новизна"
          - text: "Культурна криза"
      - source: "Appropriation of someone else's history"
        options:
          - text: "Привласнення чужої історії"
            correct: true
          - text: "Вивчення давньої історії"
          - text: "Знищення історичних документів"
      - source: "To debunk colonial myths"
        options:
          - text: "Спростовувати колоніальні міфи"
            correct: true
          - text: "Вірити в колоніальні казки"
          - text: "Створювати нові міфи"
      - source: "Establishment of national agency"
        options:
          - text: "Утвердження національної суб'єктності"
            correct: true
          - text: "Втрата державної влади"
          - text: "Отримання іноземної допомоги"
      - source: "Imperial bias in research"
        options:
          - text: "Імперське упередження в дослідженнях"
            correct: true
          - text: "Об'єктивний науковий підхід"
          - text: "Повне фінансування науки"
      - source: "Distortion of historical facts"
        options:
          - text: "Викривлення історичних фактів"
            correct: true
          - text: "Підтвердження правди"
          - text: "Запис нових подій"

  - type: essay-response
    id: b2-71-essay-trypillia
    title: "Трипілля як фундамент ідентичності"
    instruction: "Напишіть коротке есе (300+ слів) на тему: «Чому Трипільська цивілізація є критично важливою для сучасної деколонізації української історії?»"
    items:
      - prompt: "Використайте у тексті поняття: культурна тяглість, протомісто, суб'єктність, привласнення історії. Опишіть, як давнє минуле резонує з подіями 2022-2024 років."
    rubric:
      - criterion: "Використання термінології"
        weight: 30
        description: "Точне вживання специфічної історичної лексики."
      - criterion: "Аргументація"
        weight: 40
        description: "Здатність логічно пов'язати Трипілля з сучасним деколонізаційним дискурсом."
      - criterion: "Мовна якість"
        weight: 30
        description: "Дотримання публіцистичного стилю та граматичних норм B2."
    model_answer: "Трипільська цивілізація — це не просто археологічна пам'ятка, а потужний інструмент деколонізації. Вона спростовує імперські міфи про Україну як «молоду націю» без коріння. Доведення існування величезних протоміст за тисячі років до слов'ян утверджує нашу історичну суб'єктність. Привласнення історії, яким займалася Російська імперія та СРСР, має бути подолане через усвідомлення культурної тяглості. Сьогодні, в умовах війни, трипільські символи на олімпійській формі чи монетах НБУ є актом опору та утвердженням того, що ми є спадкоємцями однієї з найдавніших культур Європи."
