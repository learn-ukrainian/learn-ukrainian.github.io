  - type: essay-response
    id: direct-indirect-production
    title: "Письмо: точне передавання чужого мовлення"
    instruction: "Напиши зв'язний B2-текст українською."
    prompt: >
      Напиши 180-220 слів про ситуацію, у якій треба передати чужу думку точно. Використай: одну пряму мову, два приклади непрямої мови, одне реферування джерела й одне речення, яке могло б бути невласне прямою мовою в художньому тексті. Поясни, чому цитату не можна виривати з контексту.
    min_words: 180
    model_answer: >
      На редакційній зустрічі координатор сказав: «Не скорочуйте цитату без перевірки джерела». Після цього авторка пояснила, що вже знайшла повний текст виступу, але ще не перевірила дату. Рецензент запитав, чи збережено контекст фрази, бо короткий уривок міг змінити тон виступу. У звіті також зазначено, що переказ чужої думки має бути стислим, але не довільним. Авторка перечитала абзац. Знову ці три слова в лапках. Невже вони справді передають позицію спікера? Саме тому вона повернула в текст застереження, яке стояло після цитати. Без нього читач подумав би, що спікер підтримував підхід без обмежень. Насправді він говорив лише про короткі повідомлення, а для юридичних текстів радив повні формулювання. Точне цитування в цій ситуації захищає і джерело, і читача.
    rubric:
      - criteria: "Способи передачі"
        description: "Є пряма мова, непряма мова, реферування й фрагмент невласне прямої мови."
