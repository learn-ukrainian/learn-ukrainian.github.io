  - type: essay-response
    id: wb-essay-quote-paraphrase-comment
    title: "Письмо: цитата, переказ, коментар"
    instruction: "Напишіть короткий абзац із трьома шарами чужого мовлення."
    prompt: "Візьміть вигадану фразу джерела: «Повернення коштів можливе після перевірки стану товару». Напишіть 150-180 слів: введіть коротку цитату, перефразуйте її непрямою мовою, а потім додайте власний коментар без спотворення змісту."
    min_words: 150
    rubric:
      - criteria: "Цитата"
        description: "Є джерело цитати й коректна пунктуація прямої мови."
        points: 4
      - criteria: "Переказ"
        description: "Є непряма мова або парафраза без спотворення змісту."
        points: 3
      - criteria: "Коментар"
        description: "Власний коментар зберігає умову після перевірки."
        points: 3
    model_answer: |-
      > [!model-answer]
      > В умовах повернення магазин зазначає: «Повернення коштів можливе після перевірки стану товару».
      > Іншими словами, магазин повідомляє, що спершу перевірить стан товару, а вже потім ухвалить
      > рішення про повернення коштів. Це не означає, що покупець автоматично втрачає право на
      > повернення; однак сервіс має пояснити, хто проводить перевірку, скільки вона триває і як
      > клієнт отримає результат. Такий переказ зберігає умову джерела й не перетворює її на відмову.
