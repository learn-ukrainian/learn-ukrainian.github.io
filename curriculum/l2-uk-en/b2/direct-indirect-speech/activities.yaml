version: '1.0'
module: direct-indirect-speech
level: b2
inline:
  - type: select
    title: "Пунктуація прямої мови"
    instruction: "Виберіть правильно оформлені речення."
    items:
      - question: "Слова автора стоять перед прямою мовою. Який варіант правильний?"
        options:
          - text: "Редакторка сказала: «Почнімо з джерела»."
            correct: true
          - text: "Редакторка сказала «Почнімо з джерела»."
            correct: false
          - text: "Редакторка сказала, «Почнімо з джерела»."
            correct: false
          - text: "Редакторка сказала - «Почнімо з джерела»."
            correct: false
        explanation: "Після слів автора перед прямою мовою ставимо двокрапку."
      - question: "Слова автора стоять після репліки. Який варіант правильний?"
        options:
          - text: "«Почнімо з джерела», - сказала редакторка."
            correct: true
          - text: "«Почнімо з джерела.» сказала редакторка."
            correct: false
          - text: "«Почнімо з джерела»: сказала редакторка."
            correct: false
          - text: "«Почнімо з джерела» сказала редакторка."
            correct: false
        explanation: "Після розповідної репліки перед словами автора ставимо кому й тире."
      - question: "Які варіанти правильно оформлюють питання?"
        min_correct: 2
        options:
          - text: "«Де джерело?» - запитав редактор."
            correct: true
          - text: "Редактор запитав: «Де джерело?»"
            correct: true
          - text: "«Де джерело», - запитав редактор?"
            correct: false
          - text: "Редактор запитав, «Де джерело?»"
            correct: false
        explanation: "Знак питання належить репліці; після слів автора перед прямою мовою потрібна двокрапка."
      - question: "Слова автора розривають одне речення прямої мови. Який варіант правильний?"
        options:
          - text: "«Це не просто помилка, - сказала редакторка, - це зміна змісту»."
            correct: true
          - text: "«Це не просто помилка. - сказала редакторка, - це зміна змісту»."
            correct: false
          - text: "«Це не просто помилка», сказала редакторка «це зміна змісту»."
            correct: false
          - text: "«Це не просто помилка» - сказала редакторка - «це зміна змісту»."
            correct: false
        explanation: "Коли те саме речення триває, слова автора виділяємо комами й тире."
      - question: "Після слів автора починається нове речення прямої мови. Який варіант правильний?"
        options:
          - text: "«Це не просто помилка, - сказала редакторка. - Треба повернути контекст»."
            correct: true
          - text: "«Це не просто помилка, - сказала редакторка, - Треба повернути контекст»."
            correct: false
          - text: "«Це не просто помилка» сказала редакторка. «Треба повернути контекст»."
            correct: false
          - text: "«Це не просто помилка»: сказала редакторка: «Треба повернути контекст»."
            correct: false
        explanation: "Нове речення після слів автора починається після крапки й тире."
      - question: "Яке діалогове оформлення правильне?"
        options:
          - text: "- Де джерело цитати? - запитала редакторка."
            correct: true
          - text: "- Де джерело цитати, запитала редакторка."
            correct: false
          - text: "Де джерело цитати? - запитала редакторка."
            correct: false
          - text: "- Де джерело цитати?: запитала редакторка."
            correct: false
        explanation: "Діалогова репліка починається з тире, слова автора відділяються тире."
      - question: "Який варіант правильно передає окличну репліку?"
        options:
          - text: "«Не виривайте фразу з контексту!» - попередила викладачка."
            correct: true
          - text: "«Не виривайте фразу з контексту», - попередила викладачка!"
            correct: false
          - text: "«Не виривайте фразу з контексту». - попередила викладачка."
            correct: false
          - text: "«Не виривайте фразу з контексту»: попередила викладачка."
            correct: false
        explanation: "Знак оклику належить репліці."
      - question: "Що треба зробити перед перевіркою пунктуації прямої мови?"
        min_correct: 2
        options:
          - text: "знайти слова автора"
            correct: true
          - text: "відокремити дослівну репліку"
            correct: true
          - text: "прибрати всі лапки"
            correct: false
          - text: "замінити питання на твердження"
            correct: false
        explanation: "Спочатку треба побачити межі голосів."
  - type: fill-in
    title: "Займенники і дейксис"
    instruction: "Заповніть пропуск у непрямій мові."
    items:
      - sentence: "Автор сказав: «Я перевірю цитату». -> Автор сказав, що ____ цитату."
        answer: "перевірить"
        options: ["перевірить", "я перевірю", "перевірив би", "перевір"]
        explanation: "Форма узгоджується з автором як третьою особою."
      - sentence: "Студентка запитала: «Де мій чек?» -> Студентка запитала, де ____ чек."
        answer: "її"
        options: ["її", "мій", "твій", "наш"]
        explanation: "Мій змінюється на її, бо переказує інша особа."
      - sentence: "Менеджер уточнив: «Чи готовий акт?» -> Менеджер уточнив, ____ готовий акт."
        answer: "чи"
        options: ["чи", "що", "щоб", "ніби"]
        explanation: "Загальне питання в непрямій мові вводить чи."
      - sentence: "Викладачка попросила: «Прочитайте уривок». -> Викладачка попросила, ____ студенти прочитали уривок."
        answer: "щоб"
        options: ["щоб", "що", "чи", "де"]
        explanation: "Прохання або наказ часто передається конструкцією зі щоб."
      - sentence: "Клієнт сказав учора: «Я прийду завтра». -> Клієнт сказав, що прийде ____ дня."
        answer: "наступного"
        options: ["наступного", "сьогодні", "вчорашнього", "цього"]
        explanation: "Завтра змінюється відповідно до точки переказу."
      - sentence: "Вона сказала: «Ми готові». -> Вона сказала, що ____ готові."
        answer: "вони"
        options: ["вони", "ми", "я", "ти"]
        explanation: "Ми змінюється відповідно до мовця в переказі."
      - sentence: "Він запитав: «Коли буде відповідь?» -> Він запитав, ____ буде відповідь."
        answer: "коли"
        options: ["коли", "що", "щоб", "ніби"]
        explanation: "Спеціальне питання зберігає питальне слово."
      - sentence: "Менеджер сказав: «Тут треба підпис». -> Менеджер сказав, що ____ треба підпис."
        answer: "там"
        options: ["там", "тут", "я", "вчора"]
        explanation: "Тут може змінитися на там, якщо переказ відбувається в іншому місці."
      - sentence: "Автор сказав: «Цю тезу треба скоротити». -> Автор сказав, що ____ тезу треба скоротити."
        answer: "цю"
        options: ["цю", "мій", "вчора", "де"]
        explanation: "Вказівне слово може зберігатися, якщо об'єкт лишається спільно відомим."
      - sentence: "Клієнт попросив: «Надішліть чек». -> Клієнт попросив ____ чек надіслали."
        answer: "щоб"
        options: ["щоб", "чи", "що", "де"]
        explanation: "Прохання передається через щоб."
  - type: error-correction
    title: "Дієслово повідомлення і точність"
    instruction: "Виправте переказ так, щоб він не змінював позицію джерела."
    items:
      - sentence: "Автор довів, що сервіс корисний, хоча в джерелі написано: «Сервіс може бути корисним за умови прозорої гарантії»."
        error: "довів"
        answer: "Автор зазначив, що сервіс може бути корисним, якщо гарантія прозора."
        options:
          - "Автор зазначив, що сервіс може бути корисним, якщо гарантія прозора."
          - "Автор довів, що сервіс завжди корисний."
          - "Автор зізнався, що сервіс корисний."
          - "Автор сказав, що умови не мають значення."
        explanation: "Переказ має зберегти модальність може і умову прозорої гарантії."
      - sentence: "Компанія зізналася, що оновила правила повернення."
        error: "зізналася"
        answer: "Компанія повідомила, що оновила правила повернення."
        options:
          - "Компанія повідомила, що оновила правила повернення."
          - "Компанія зізналася у всьому."
          - "Компанія поскаржилася, що оновила правила."
          - "Компанія довела, що правила винні."
        explanation: "Зізнатися додає провину, якої може не бути в джерелі."
      - sentence: "Рецензент стверджує, чи цитата точна."
        error: "стверджує, чи"
        answer: "Рецензент запитує, чи цитата точна."
        options:
          - "Рецензент запитує, чи цитата точна."
          - "Рецензент стверджує, чи цитата точна."
          - "Рецензент просить, що цитата точна."
          - "Рецензент доводить, чи цитата точна."
        explanation: "Чи вводить питання, тому потрібне дієслово запитує або уточнює."
      - sentence: "Викладач попросив, що студенти прочитали уривок."
        error: "що"
        answer: "Викладач попросив, щоб студенти прочитали уривок."
        options:
          - "Викладач попросив, щоб студенти прочитали уривок."
          - "Викладач попросив, що студенти прочитали уривок."
          - "Викладач запитав, що студенти прочитали уривок."
          - "Викладач заявив, чи студенти прочитали уривок."
        explanation: "Прохання або наказ передаємо через щоб."
      - sentence: "Депутатка сказала, що громада готова, хоча вона запитала: «Чи готова громада?»"
        error: "сказала, що"
        answer: "Депутатка запитала, чи громада готова."
        options:
          - "Депутатка запитала, чи громада готова."
          - "Депутатка сказала, що громада готова."
          - "Депутатка довела, що громада готова."
          - "Депутатка попросила, щоб громада готова."
        explanation: "Питання не можна перетворювати на твердження."
      - sentence: "Клієнт сказав, що все пропало, хоча він написав: «Є ризик затримки»."
        error: "все пропало"
        answer: "Клієнт попередив про ризик затримки."
        options:
          - "Клієнт попередив про ризик затримки."
          - "Клієнт сказав, що все пропало."
          - "Клієнт зізнався, що все зникло."
          - "Клієнт довів катастрофу."
        explanation: "Переказ має зберегти рівень упевненості."
      - sentence: "Автори довели, що інструкції завжди кращі, хоча джерело говорить про тестову групу."
        error: "завжди"
        answer: "Автори повідомляють, що коротші інструкції допомогли в тестовій групі."
        options:
          - "Автори повідомляють, що коротші інструкції допомогли в тестовій групі."
          - "Автори довели, що інструкції завжди кращі."
          - "Автори зізналися, що всі помилялися."
          - "Автори запитали, чи інструкції завжди кращі."
        explanation: "Переказ має зберегти межу висновку."
      - sentence: "Сервіс пообіцяв компенсацію, хоча написав: «перевіримо, чи можлива компенсація»."
        error: "пообіцяв компенсацію"
        answer: "Сервіс повідомив, що перевірить можливість компенсації."
        options:
          - "Сервіс повідомив, що перевірить можливість компенсації."
          - "Сервіс пообіцяв компенсацію."
          - "Сервіс зізнався в компенсації."
          - "Сервіс довів компенсацію."
        explanation: "Можливість компенсації не дорівнює обіцянці."
  - type: match-up
    title: "Цитування і реферування"
    instruction: "Поєднайте поняття з функцією."
    pairs:
      - left: "цитата"
        right: "дослівний фрагмент чужого мовлення або тексту"
      - left: "реферування"
        right: "стислий переказ чужої думки своїми словами"
      - left: "джерело"
        right: "той, кому належить думка або формулювання"
      - left: "контекст"
        right: "умови, без яких цитата може змінити зміст"
      - left: "трикрапка"
        right: "може позначати скорочення цитати"
      - left: "парафраза"
        right: "переказ зі зміненою структурою, але збереженим змістом"
      - left: "академічна доброчесність"
        right: "чесне розмежування власної й чужої думки"
      - left: "лапки"
        right: "позначають межі дослівного чужого тексту"
      - left: "слова автора"
        right: "вводять або коментують репліку"
      - left: "частка чи"
        right: "вводить непряме загальне питання"
  - type: group-sort
    title: "Спосіб передачі мовлення"
    instruction: "Розподіліть приклади за типом."
    groups:
      - name: "Пряма мова"
        items:
          - "Редакторка сказала: «Факт треба перевірити»."
          - "«Де джерело?» - запитав рецензент."
          - "Викладачка попередила: «Не виривайте фразу з контексту»."
      - name: "Непряма мова"
        items:
          - "Редакторка сказала, що факт треба перевірити."
          - "Рецензент запитав, де джерело."
          - "Викладачка попередила, щоб фразу не виривали з контексту."
      - name: "Невласне пряма мова"
        items:
          - "Знову затримка. І жодного пояснення."
          - "Вона не повинна мовчати. Не тепер."
          - "Факт треба перевірити. Негайно."
      - name: "Реферування"
        items:
          - "Автор пов'язує користь сервісу з прозорою гарантією."
          - "Дослідниця стисло пояснює ризик цитат без контексту."
          - "Стаття узагальнює кілька підходів до публічного мовлення."
workbook:
  - type: reading
    id: wb-reading-reported-voice
    title: "Читання: чужий голос у статті"
    instruction: "Прочитайте уривок і визначте способи передачі мовлення."
    source: "Навчальний текст для модуля B2."
    text: >
      Редакторка відкрила чернетку й сказала: «Почнімо з джерела». Автор відповів, що джерело
      перевірено, але точну сторінку ще треба додати. У коментарі рецензент запитав, чи збережено
      контекст цитати. Далі він зазначив, що короткий переказ не повинен змінювати позицію дослідниці.
      Марко перечитав абзац. Знову ці лапки. Знову сумнів: де цитата, де його власний висновок?
    tasks:
      - "Випишіть приклад прямої мови."
      - "Знайдіть два приклади непрямої мови."
      - "Поясніть, чому в реченні про рецензента потрібна частка чи."
      - "Знайдіть фрагмент, який може бути невласне прямою мовою."
      - "Поясніть, яку етичну проблему порушує уривок."
  - type: translate
    title: "Переклад: reporting verbs"
    instruction: "Виберіть найприродніший український переказ."
    items:
      - source: "The reviewer asked whether the quote was accurate."
        options:
          - text: "Рецензент запитав, чи цитата точна."
            correct: true
          - text: "Рецензент сказав, чи цитата точна."
            correct: false
          - text: "Рецензент попросив, що цитата точна."
            correct: false
        explanation: "Whether у непрямому питанні відповідає чи."
      - source: "The editor emphasized that the context matters."
        options:
          - text: "Редакторка наголосила, що контекст важливий."
            correct: true
          - text: "Редакторка запитала, що контекст важливий."
            correct: false
          - text: "Редакторка зізналася, що контекст важливий."
            correct: false
        explanation: "Emphasized передає наголосила."
      - source: "The client asked them to send the receipt again."
        options:
          - text: "Клієнт попросив, щоб чек надіслали повторно."
            correct: true
          - text: "Клієнт запитав, що чек надіслали повторно."
            correct: false
          - text: "Клієнт заявив, чи чек надіслали повторно."
            correct: false
        explanation: "Прохання природно передаємо конструкцією зі щоб."
      - source: "The manager clarified whether the act was ready."
        options:
          - text: "Менеджер уточнив, чи акт готовий."
            correct: true
          - text: "Менеджер уточнив, що акт готовий."
            correct: false
          - text: "Менеджер попросив, щоб акт готовий."
            correct: false
        explanation: "Whether передаємо часткою чи."
      - source: "The company reported that the rules had changed."
        options:
          - text: "Компанія повідомила, що правила змінилися."
            correct: true
          - text: "Компанія зізналася, чи правила змінилися."
            correct: false
          - text: "Компанія запитала, що правила змінилися."
            correct: false
        explanation: "Reported нейтрально передається як повідомила."
      - source: "The author suggested that the delay might be temporary."
        options:
          - text: "Автор припустив, що затримка може бути тимчасовою."
            correct: true
          - text: "Автор довів, що затримка тимчасова."
            correct: false
          - text: "Автор наказав, щоб затримка тимчасова."
            correct: false
        explanation: "Suggested that у цьому контексті передає обережне припущення."
      - source: "The lecturer warned them not to quote without context."
        options:
          - text: "Викладачка застерегла, щоб вони не цитували без контексту."
            correct: true
          - text: "Викладачка запитала, чи вони цитували без контексту."
            correct: false
          - text: "Викладачка повідомила, що контекст цитував їх."
            correct: false
        explanation: "Warned them not to можна передати через застерегла, щоб не."
      - source: "The reviewer denied changing the source's position."
