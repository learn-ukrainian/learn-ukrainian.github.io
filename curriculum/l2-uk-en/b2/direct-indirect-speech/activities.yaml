version: '1.0'
module: direct-indirect-speech
level: b2
inline: []
workbook:
  - type: reading
    id: direct-indirect-reading
    title: "Читання: чужий голос у статті"
    instruction: "Прочитай уривок і визнач, як передано чуже мовлення."
    source: "Навчальний текст для модуля B2."
    text: >
      Редакторка відкрила чернетку й сказала: «Почнімо з джерела». Автор відповів, що джерело перевірено, але точну сторінку ще треба додати. У коментарі до тексту рецензент запитав, чи збережено контекст цитати. Далі він зазначив, що короткий переказ не повинен змінювати позицію дослідниці. Марко перечитав абзац. Знову ці лапки. Знову сумнів: де цитата, а де його власний висновок?
    tasks:
      - "Випиши приклад прямої мови."
      - "Знайди два приклади непрямої мови."
      - "Поясни, чому в реченні про рецензента потрібна частка чи."
      - "Знайди фрагмент, який може бути невласне прямою мовою."
      - "Поясни, яку етичну проблему порушує уривок."
  - type: critical-analysis
    id: quote-refer-analysis
    title: "Аналіз: цитата, переказ і коментар"
    instruction: "Проаналізуй уривок і поясни, де збережено чужий голос, а де з'являється авторський коментар."
    target_text: >
      Дослідниця пише: «Переказ не скасовує відповідальності за зміст». Автор статті переказує цю думку так: дослідниця наголошує, що той, хто реферує чужу позицію, відповідає за точність змісту. Далі автор додає: це особливо важливо в навчальних текстах, де коротка цитата може змінити тон джерела.
    questions:
      - "Яка частина є дослівною цитатою?"
      - "Яка частина є реферуванням?"
      - "Де починається авторський коментар?"
      - "Чому скорочена цитата може бути небезпечною?"
    model_answers:
      - "Дослівна цитата стоїть у лапках: «Переказ не скасовує відповідальності за зміст»."
      - "Речення про те, що той, хто реферує чужу позицію, відповідає за точність змісту, є переказом."
      - "Авторський коментар починається зі слів «це особливо важливо...», бо далі автор уже пояснює значення прикладу."
      - "Скорочення небезпечне тоді, коли прибирає обмеження або змінює тон джерела."
    focus_points:
      - "межа цитати й переказу"
      - "джерело думки"
      - "етика контексту"

  - type: match-up
    title: "Поєднай термін і дію"
    instruction: "Зістав поняття з правильною дією або ознакою."
    pairs:
      - left: "пряма мова"
        right: "дослівно відтворює чуже висловлення"
      - left: "непряма мова"
        right: "передає зміст чужих слів у підрядній частині"
      - left: "слова автора"
        right: "називають мовця або дію мовлення"
      - left: "репліка"
        right: "окреме висловлення учасника діалогу"
      - left: "цитата"
        right: "точний фрагмент чужого тексту в лапках"
      - left: "реферування"
        right: "стислий переказ чужої думки своїми словами"
      - left: "частка чи"
        right: "вводить непряме загальне питання"
      - left: "сполучник що"
        right: "часто вводить непряме розповідне висловлення"
      - left: "конструкція зі щоб"
        right: "передає прохання або наказ у непрямій мові"
      - left: "невласне пряма мова"
        right: "передає внутрішній голос без лапок"
      - left: "джерело"
        right: "вказує, кому належить думка"
      - left: "контекст"
        right: "захищає цитату від спотворення"

  - type: group-sort
    title: "Розподіли приклади чужого мовлення"
    instruction: "Визнач тип кожного прикладу."
    groups:
      - name: "Пряма мова"
        items:
          - "Редактор сказав: «Перевірте джерело»."
          - "«Коли буде відповідь?» — запитала студентка."
          - "«Не скорочуйте цитату без контексту!» — попередив викладач."
          - "Автор додав: «Це лише перший варіант»."
      - name: "Непряма мова"
        items:
          - "Редактор сказав, що джерело треба перевірити."
          - "Студентка запитала, коли буде відповідь."
          - "Викладач попросив, щоб цитату не скорочували без контексту."
          - "Автор додав, що це лише перший варіант."
      - name: "Реферування"
        items:
          - "Дослідниця наголошує на відповідальності за точність переказу."
          - "У звіті зазначено, що цитату подано в ширшому контексті."
          - "Автор статті коротко переказує позицію редакторки."
          - "Доповідачка підсумовує аргумент без дослівного цитування."
      - name: "Невласне пряма мова"
        items:
          - "Він перечитав листа. Знову обіцянки. Знову жодної дати."
          - "Олена зупинилася. Невже вони не перевірили джерело?"
          - "Марко мовчав. Хіба можна так цитувати?"
          - "Вона відкрила чернетку. Нарешті хоч один точний приклад."

  - type: fill-in
    title: "Заповни трансформацію"
    instruction: "Вибери слово або форму, потрібну для непрямої мови."
    items:
      - sentence: "Автор сказав, ____ перевірить цитату."
        answer: "що"
        options: ["що", "чи", "якщо", "щоб"]
        explanation: "Розповідне висловлення вводиться сполучником що."
      - sentence: "Редакторка запитала, ____ збережено контекст."
        answer: "чи"
        options: ["чи", "що", "якщо", "щоб"]
        explanation: "Загальне непряме питання вводиться часткою чи."
      - sentence: "Викладач попросив, ____ студенти прочитали уривок."
        answer: "щоб"
        options: ["щоб", "чи", "що", "де"]
        explanation: "Прохання передається конструкцією зі щоб."
      - sentence: "Студентка запитала, ____ знайти джерело."
        answer: "де"
        options: ["де", "чи", "що", "щоб"]
        explanation: "Питальне слово зберігається в непрямому питанні."
      - sentence: "У реченні «Почнімо з джерела», — сказала редакторка слова автора стоять ____ прямої мови."
        answer: "після"
        options: ["після", "перед", "замість", "усередині"]
        explanation: "Слова автора розташовані після репліки."
      - sentence: "Якщо слова автора стоять перед прямою мовою, після них ставимо ____."
        answer: "двокрапку"
        options: ["двокрапку", "крапку з комою", "трикрапку", "кому"]
        explanation: "Перед прямою мовою після слів автора потрібна двокрапка."
      - sentence: "Дослівний фрагмент чужого тексту називається ____."
        answer: "цитатою"
        options: ["цитатою", "переказом", "коментарем", "висновком"]
        explanation: "Цитата зберігає точні слова джерела."
      - sentence: "Стислий переказ чужої думки своїми словами - це ____."
        answer: "реферування"
        options: ["реферування", "репліка", "лапки", "діалог"]
        explanation: "Реферування передає думку без дослівної форми."
      - sentence: "Невласне пряма мова зазвичай не береться в ____."
        answer: "лапки"
        options: ["лапки", "коми", "абзаци", "дужки"]
        explanation: "Її межі визначаються стилістично, не звичайним цитатним оформленням."
      - sentence: "Фраза «запитав, якщо прийде» помилкова, бо якщо вводить ____."
        answer: "умову"
        options: ["умову", "цитату", "репліку", "джерело"]
        explanation: "Для непрямого питання потрібне чи, а не якщо."
      - sentence: "У переказі наказу часто використовуємо сполучник ____."
        answer: "щоб"
        options: ["щоб", "чи", "ніби", "коли"]
        explanation: "Наприклад: попросив, щоб команда підготувала звіт."
      - sentence: "Авторський висновок після цитати треба відділяти від ____ думки."
        answer: "чужої"
        options: ["чужої", "власної", "короткої", "усної"]
        explanation: "Читач має бачити межу між джерелом і коментарем."

  - type: select
    title: "Вибери точні твердження"
    instruction: "Познач усі правильні варіанти."
    items:
      - question: "Що правильно описує пряму мову?"
        min_correct: 3
        options:
          - text: "Вона дослівно відтворює чуже висловлення."
            correct: true
          - text: "Вона завжди подається без лапок."
            correct: false
          - text: "Вона може мати слова автора перед реплікою."
            correct: true
          - text: "Вона може мати слова автора після репліки."
            correct: true
          - text: "Вона не потребує розділових знаків."
            correct: false
        explanation: "Пряма мова має точну форму й видимі межі."
      - question: "Які твердження правильні для непрямої мови?"
        min_correct: 3
        options:
          - text: "Лапки зазвичай зникають."
            correct: true
          - text: "Займенники можуть змінюватися."
            correct: true
          - text: "Загальне питання вводиться часткою чи."
            correct: true
          - text: "Усі питання вводяться словом якщо."
            correct: false
          - text: "Дослівна форма завжди зберігається."
            correct: false
        explanation: "Непряма мова передає зміст, а не форму цитати."
      - question: "Де потрібна частка чи?"
        min_correct: 3
        options:
          - text: "Вона запитала, чи готовий звіт."
            correct: true
          - text: "Редактор уточнив, чи збережено контекст."
            correct: true
          - text: "Автор пояснив, чи він перевірив джерело."
            correct: false
          - text: "Координатор спитав, чи всі отримали файл."
            correct: true
          - text: "Він сказав, чи прийде завтра."
            correct: false
        explanation: "Чи вводить непряме питання, а не розповідне повідомлення."
      - question: "Що допомагає уникнути спотворення цитати?"
        min_correct: 3
        options:
          - text: "зберегти точні слова в лапках"
            correct: true
          - text: "назвати джерело"
            correct: true
          - text: "не приховувати важливі обмеження"
            correct: true
          - text: "прибрати незручний контекст"
            correct: false
          - text: "замінити цитату власним висновком без позначки"
            correct: false
        explanation: "Цитата потребує точності й контексту."
      - question: "Які ознаки може мати невласне пряма мова?"
        min_correct: 3
        options:
          - text: "третя особа в авторській розповіді"
            correct: true
          - text: "лексика персонажа"
            correct: true
          - text: "питальна або оклична інтонація"
            correct: true
          - text: "обов'язкові лапки"
            correct: false
          - text: "чітке бібліографічне посилання"
            correct: false
        explanation: "Це стилістичний прийом художнього мовлення, а не звичайна цитата."
      - question: "Які дієслова точно передають джерело думки?"
        min_correct: 3
        options:
          - text: "зазначає"
            correct: true
          - text: "підкреслює"
            correct: true
          - text: "заперечує"
            correct: true
          - text: "лапкує"
            correct: false
          - text: "контекстить"
            correct: false
        explanation: "Дієслово введення має бути нормативним і змістово точним."
      - question: "Де пунктуація прямої мови правильна?"
        min_correct: 3
        options:
          - text: "Редактор сказав: «Перевірте джерело»."
            correct: true
          - text: "«Перевірте джерело», — сказав редактор."
            correct: true
          - text: "«Коли відповідь?» — запитала Марина."
            correct: true
          - text: "Редактор сказав «Перевірте джерело»."
            correct: false
          - text: "«Перевірте джерело.» — сказав редактор."
            correct: false
        explanation: "Межа між словами автора й реплікою має бути оформлена."
      - question: "Коли краще реферувати, а не цитувати?"
        min_correct: 3
        options:
          - text: "коли важливий зміст, а не точна форма"
            correct: true
          - text: "коли цитата надто довга"
            correct: true
          - text: "коли треба стисло передати позицію"
            correct: true
          - text: "коли хочеться приховати автора"
            correct: false
          - text: "коли треба змінити позицію джерела"
            correct: false
        explanation: "Реферування стискає думку, але не приховує джерело."

  - type: error-correction
    title: "Виправ пунктуацію й трансформацію"
    instruction: "Знайди помилку та вибери нормативну редакцію."
    items:
      - sentence: "Редактор сказав «Перевірте джерело»."
        error: "сказав «Перевірте"
        answer: "Редактор сказав: «Перевірте джерело»."
        options:
          - "Редактор сказав: «Перевірте джерело»."
          - "Редактор сказав «Перевірте джерело»."
          - "Редактор сказав, «Перевірте джерело»."
          - "Редактор сказав - «Перевірте джерело»."
        explanation: "Після слів автора перед прямою мовою потрібна двокрапка."
      - sentence: "«Перевірте джерело.» — сказав редактор."
        error: "джерело.»"
        answer: "«Перевірте джерело», — сказав редактор."
        options:
          - "«Перевірте джерело», — сказав редактор."
          - "«Перевірте джерело.» — сказав редактор."
          - "«Перевірте джерело» сказав редактор."
          - "«Перевірте джерело»: сказав редактор."
        explanation: "Перед словами автора після розповідної репліки ставимо кому й тире."
      - sentence: "Журналіст запитав, якщо вони підтверджують дані."
        error: "якщо"
        answer: "Журналіст запитав, чи вони підтверджують дані."
        options: ["Журналіст запитав, чи вони підтверджують дані.", "Журналіст запитав, якщо вони підтверджують дані.", "Журналіст запитав, що вони підтверджують дані.", "Журналіст запитав, щоб вони підтвердили дані."]
        explanation: "Загальне непряме питання вводиться часткою чи."
      - sentence: "Вона запитала, що хто підготував довідку."
        error: "що хто"
        answer: "Вона запитала, хто підготував довідку."
        options: ["Вона запитала, хто підготував довідку.", "Вона запитала, що хто підготував довідку.", "Вона запитала, чи хто підготував довідку.", "Вона запитала, щоб хто підготував довідку."]
        explanation: "Питальне слово саме з'єднує підрядну частину з головною."
      - sentence: "Координатор сказав, що підготуйте звіт."
        error: "що підготуйте"
        answer: "Координатор попросив, щоб підготували звіт."
        options:
          - "Координатор попросив, щоб підготували звіт."
          - "Координатор сказав, що підготуйте звіт."
          - "Координатор запитав, чи підготуйте звіт."
          - "Координатор сказав: щоб підготуйте звіт."
        explanation: "Наказ або прохання передається не формою наказового способу після що."
      - sentence: "Дослідниця довела, що це лише припущення."
        error: "довела"
        answer: "Дослідниця припустила, що це можливе пояснення."
        options: ["Дослідниця припустила, що це можливе пояснення.", "Дослідниця довела, що це лише припущення.", "Дослідниця наказала, що це можливе пояснення.", "Дослідниця процитувала, що можливо."]
        explanation: "Дієслово введення має відповідати силі джерела."
      - sentence: "Автор пише, «Переказ не скасовує відповідальності»."
        error: "пише,"
        answer: "Автор пише: «Переказ не скасовує відповідальності»."
        options:
          - "Автор пише: «Переказ не скасовує відповідальності»."
          - "Автор пише, «Переказ не скасовує відповідальності»."
          - "Автор пише «Переказ не скасовує відповідальності»."
          - "Автор пише — «Переказ не скасовує відповідальності»."
        explanation: "Слова автора перед прямою мовою потребують двокрапки."
      - sentence: "Вона сказала, що я підготую огляд."
        error: "я"
        answer: "Вона сказала, що підготує огляд."
        options:
          - "Вона сказала, що підготує огляд."
          - "Вона сказала, що я підготую огляд."
          - "Вона сказала: що підготує огляд."
          - "Вона сказала, якщо підготує огляд."
        explanation: "Під час переказу форма першої особи змінюється відповідно до мовця."
      - sentence: "«Де джерело?», — запитала редакторка."
        error: "джерело?»,"
        answer: "«Де джерело?» — запитала редакторка."
        options: ["«Де джерело?» — запитала редакторка.", "«Де джерело?», — запитала редакторка.", "«Де джерело», — запитала редакторка.", "«Де джерело?» запитала редакторка."]
        explanation: "Після знака питання перед словами автора кома не ставиться."
      - sentence: "Джерело зазначає, що «переказ точний», хоча в оригіналі є застереження."
        error: "«переказ точний»"
        answer: "Джерело зазначає, що переказ може бути точним лише за умови збереження контексту."
