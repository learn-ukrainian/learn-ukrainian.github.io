version: '1.0'
module: active-participles-past
level: b2
inline: []
workbook:
- type: quiz
  title: Нормативна форма чи калька
  instruction: Оберіть нормативний варіант для контексту.
  items:
  - question: Як природно описати листя після осінньої зміни кольору?
    options:
    - text: пожовкле листя
      correct: true
    - text: пожовтівше листя
      correct: false
    - text: пожовтіле кимось листя
      correct: false
    - text: пожовтений листя
      correct: false
    explanation: Неперехідна завершена зміна дає форму на -л-.
  - question: Який варіант замінює кальку про студента і книжку?
    options:
    - text: студент, який прочитав книжку
      correct: true
    - text: прочитавший книжку студент
      correct: false
    - text: прочитавша книжку студентка
      correct: false
    - text: прочитавле книжку студент
      correct: false
    explanation: Перехідне дієслово з додатком краще розгорнути в підрядне речення.
  - question: Яка форма правильно передає стан після охолодження?
    options:
    - text: охолола рідина
      correct: true
    - text: охолодивша рідина
      correct: false
    - text: охолоджена сама рідина
      correct: false
    - text: охолонувша рідина
      correct: false
    explanation: Охолонути/охололи описує неперехідну зміну стану.
  - question: Що доречно для саду, який давно не доглядають?
    options:
    - text: здичавілий сад
      correct: true
    - text: здичавший сад
      correct: false
    - text: здичавлений сад
      correct: false
    - text: сад, здичавлений часом
      correct: false
    explanation: Форма здичавілий усталена для результату природної зміни.
  - question: Який варіант нейтрально описує документ у службовому стилі?
    options:
    - text: застарілий документ
      correct: true
    - text: застарівший документ
      correct: false
    - text: застаріваючий документ
      correct: false
    - text: документ, застарівший після наказу
      correct: false
    explanation: Застарілий є нормативним прикметниковим уживанням.
  - question: Як краще сформулювати речення про заяву?
    options:
    - text: особа, яка подала заяву
      correct: true
    - text: подавша заяву особа
      correct: false
    - text: подалий заяву заявник
      correct: false
    - text: заявлена заяву особа
      correct: false
    explanation: Подати є перехідним дієсловом, тому потрібне підрядне речення або інша синтаксична модель.
  - question: Яке словосполучення природне в художньому описі після бурі?
    options:
    - text: почорніле небо
      correct: true
    - text: почорнівше небо
      correct: false
    - text: почорнене саме небо
      correct: false
    - text: почорняюче небо
      correct: false
    explanation: Почорніле називає стан після зміни.
  - question: Який варіант правильно показує стан після змарніння?
    options:
    - text: змарнілий мандрівник
      correct: true
    - text: змарнівший мандрівник
      correct: false
    - text: змарнований мандрівник
      correct: false
    - text: мандрівник, змарнювавший у дорозі
      correct: false
    explanation: Змарнілий утворено від неперехідного доконаного дієслова.
  - question: Який варіант нормативно описує афішу після тривалого сонця?
    options:
    - text: вицвіла афіша
      correct: true
    - text: вицвівша афіша
      correct: false
    - text: вицвітаюча афіша вчора
      correct: false
    - text: афіша, вицвічена сама
      correct: false
    explanation: Вицвіла називає стан після зміни кольору.
  - question: Де найкраще використати підрядне означальне речення?
    options:
    - text: редактор, який погодив рукопис
      correct: true
    - text: погодивший рукопис редактор
      correct: false
    - text: погоділий рукопис редактор
      correct: false
    - text: рукопис, погодивлий редактора
      correct: false
    explanation: Погодити рукопис має прямий додаток.
- type: fill-in
  title: Утвори форму на -л-
  instruction: Заповніть пропуск нормативною формою.
  items:
  - sentence: На узбіччі лежало ____ листя.
    answer: опале
    options:
    - опале
    - опавше
    - опадане
    - опадаюче
  - sentence: У склянці стояла ____ кава.
    answer: охолола
    options:
    - охолола
    - охоловша
    - охолоджена сама
    - охолоджуюча
  - sentence: У саду висіли ____ яблука.
    answer: дозрілі
    options:
    - дозрілі
    - дозріваючі вже
    - дозрівші
    - дозрітні
  - sentence: На стіні висіла ____ афіша.
    answer: вицвіла
    options:
    - вицвіла
    - вицвівша
    - вицвічена
    - вицвітаюча
  - sentence: Після хвороби він мав ____ вигляд.
    answer: змарнілий
    options:
    - змарнілий
    - змарнівший
    - змарнований
    - змарнюючий
  - sentence: У дворі стояв ____ кущ.
    answer: засохлий
    options:
    - засохлий
    - засохнутий
    - засихаючий уже
    - засушений сам
  - sentence: Біля берега рухався ____ лід.
    answer: скреслий
    options:
    - скреслий
    - скреснувший
    - скреснутий
    - скресаючий
  - sentence: Після морозу виднівся ____ двір.
    answer: побілілий
    options:
    - побілілий
    - побілівший
    - побілений сам
    - білючий
  - sentence: Після ночі в кімнаті стояло ____ повітря.
    answer: охололе
    options:
    - охололе
    - охоловше
    - охолоджене саме
    - охолоджуюче
  - sentence: Біля станції лежали ____ газети.
    answer: промоклі
    options:
    - промоклі
    - промокнувші
    - промокнені
    - мокнучі вже
- type: error-correction
  title: Прибери форму на -вш-
  instruction: Знайдіть помилкову форму й запропонуйте нормативну заміну.
  items:
  - sentence: Посинівший від холоду хлопець зайшов до аптеки.
    error: Посинівший
    correction: Посинілий
    explanation: Неперехідна зміна стану дає форму посинілий.
  - sentence: Заснувший у кріслі пасажир пропустив зупинку.
    error: Заснувший
    correction: пасажир, який заснув
    explanation: Для заснути природніше підрядне речення або інша перебудова.
  - sentence: Прочитавша звіт експертка поставила уточнення.
    error: Прочитавша
    correction: експертка, яка прочитала звіт
    explanation: Прочитати має прямий додаток, тому не творимо активного дієприкметника.
  - sentence: Зівʼянуте саме листя вкривало доріжку.
    error: Зівʼянуте
    correction: Зівʼяле
    explanation: Для активного стану після зівʼянення потрібна форма на -л-.
  - sentence: Застарівший підхід знову зʼявився в інструкції.
    error: Застарівший
    correction: Застарілий
    explanation: Нормативна прикметникова форма - застарілий.
  - sentence: Охоловша страва стояла на плиті.
    error: Охоловша
    correction: Охолола
    explanation: Охолола страва описує стан після неперехідної зміни.
  - sentence: Подавший заяву працівник чекає відповіді.
    error: Подавший
    correction: працівник, який подав заяву
    explanation: Подати заяву має додаток, тому потрібне підрядне речення.
  - sentence: Розквітнувший парк став місцем зустрічей.
    error: Розквітнувший
    correction: Розквітлий
    explanation: Випадає -ну-, нормативна форма - розквітлий.
- type: match-up
  title: Калька і нормативна заміна
  instruction: Поєднайте ненормативний або невдалий варіант із природною заміною.
  pairs:
  - left: пожовтівше листя
    right: пожовкле листя
  - left: прочитавший книжку студент
    right: студент, який прочитав книжку
  - left: привівша брата дівчина
    right: дівчина, яка привела брата
  - left: засохнутий шматок хліба
    right: засохлий шматок хліба
  - left: охоловша страва
    right: охолола страва
  - left: застарівший підхід
    right: застарілий підхід
  - left: достигавше яблуко
    right: дозріле яблуко
  - left: змарнівший мандрівник
    right: змарнілий мандрівник
  - left: посинівший від холоду хлопець
    right: посинілий від холоду хлопець
  - left: поданий заяву працівник
    right: працівник, який подав заяву
  - left: зівʼянуте листя
    right: зівʼяле листя
  - left: розквітнувший сад
    right: розквітлий сад
  - left: вицвівша афіша
    right: вицвіла афіша
  - left: постарівший майстер
    right: постарілий майстер
- type: group-sort
  title: Вибір конструкції
  instruction: Розподіліть вислови за найкращим синтаксичним рішенням.
  groups:
  - items:
    - пожовкле листя
    - зблідле обличчя
    - охолола рідина
    - дозрілий колос
    - вицвіла афіша
    name: форма на -л-
  - items:
    - студент, який прочитав статтю
    - експертка, яка подала висновок
    - волонтер, який привів групу
    - команда, що погодила план
    - заявник, який підписав форму
    name: підрядне означальне речення
  - items:
    - стиглий плід
    - застарілий підхід
    - сталий вислів
    - опалий лист
    - притихлий двір
    name: прикметникове або лексикалізоване читання
- type: true-false
  title: Норма і межа вживання
  instruction: Позначте, чи правильне твердження.
  items:
  - statement: Активний дієприкметник минулого часу найчастіше повʼязаний із неперехідним доконаним дієсловом.
    correct: true
    explanation: Саме ця умова пояснює форми на -л-.
  - statement: Форми на -вш- є нейтральним способом творення українських активних дієприкметників минулого часу.
    correct: false
    explanation: У сучасній нормі це калькований або ненормативний шаблон.
  - statement: Якщо дієслово має прямий додаток, часто краще використати підрядне означальне речення.
    correct: true
    explanation: Так зберігаємо дію і додаток без чужої суфіксації.
  - statement: Слово застарілий може функціонувати як прикметник із послабленим відчуттям дії.
    correct: true
    explanation: Це приклад адʼєктивації.
  - statement: У формі розквітлий потрібно зберегти суфікс -ну-.
    correct: false
    explanation: У багатьох таких формах -ну- випадає.
  - statement: Пожовкле листя і листя, яке пожовкло можуть бути стилістичними варіантами.
    correct: true
    explanation: Перше компактніше, друге розгортає дію.
  - statement: Прочитавший книгу студент звучить природно в науковому стилі.
    correct: false
    explanation: Потрібно студент, який прочитав книгу.
  - statement: Форма на -л- завжди краща за підрядне речення незалежно від реєстру.
    correct: false
    explanation: Реєстр і синтаксична прозорість визначають вибір.
  - statement: Засохлий і засохнутий завжди взаємозамінні в описі природного стану.
    correct: false
    explanation: Для активного стану після природної зміни потрібне засохлий.
  - statement: Підрядне речення може бути нормативною заміною там, де активний дієприкметник не твориться.
    correct: true
    explanation: Це основна стратегія для перехідних дієслів.
- type: quiz
  title: Реєстр і фокус
  instruction: Оберіть конструкцію, що найкраще відповідає комунікативному фокусу.
  items:
  - question: У науковому звіті треба стисло назвати стан речовини після охолодження.
    options:
    - text: охолола речовина
      correct: true
    - text: речовина, охоловша після досліду
      correct: false
    - text: охолоджуюча себе речовина
      correct: false
    - text: речовина, прочитавша дані
      correct: false
    explanation: Стан після неперехідної зміни доречно передати формою на -л-.
  - question: У протоколі потрібно назвати особу, що підписала акт.
    options:
    - text: особа, яка підписала акт
      correct: true
    - text: підписавша акт особа
      correct: false
    - text: підписана акт особа
      correct: false
    - text: підписале акт обличчя
      correct: false
    explanation: Підписати акт - перехідна дія з додатком.
  - question: У художньому описі доречно підкреслити зміну кольору неба після пожежі.
    options:
    - text: почорніле небо
      correct: true
    - text: почорнівше небо
      correct: false
    - text: почорнююче небо
      correct: false
    - text: почорнене саме собою небо
      correct: false
    explanation: Почорніле компактно називає стан.
  - question: У службовому листі треба уникнути форми на -вш-.
    options:
    - text: заявник, який подав документи
      correct: true
    - text: подавший документи заявник
      correct: false
    - text: подалий документи заявник
      correct: false
    - text: подавша документи заявник
      correct: false
    explanation: Підрядне речення дає нормативну форму.
  - question: Який варіант найменше перевантажує опис природи?
    options:
    - text: промоклий ліс
      correct: true
    - text: ліс, який промок від дощу, що падав увечері
      correct: false
    - text: промокнувший ліс
      correct: false
    - text: промочений собою ліс
      correct: false
    explanation: Коли деталі не потрібні, форма на -л- економна.
  - question: Який варіант показує адʼєктивацію?
    options:
    - text: застарілий вислів
      correct: true
    - text: прочитавший вислів
      correct: false
    - text: підписавша норма
      correct: false
    - text: застарюючий вислів
      correct: false
    explanation: Застарілий часто сприймається як прикметник якості.
  - question: Де варто розгорнути дію в підрядне речення?
    options:
    - text: журналістка, яка перевірила факти
      correct: true
    - text: зблідла журналістка
      correct: false
    - text: охолола кава
      correct: false
    - text: опале листя
      correct: false
    explanation: Перевірити факти має прямий додаток.
  - question: Яка пара правильно відрізняє активний і пасивний результат?
    options:
    - text: почорнілий камінь / пофарбований камінь
      correct: true
    - text: прочитавший текст / текст прочитав
      correct: false
    - text: засохнутий хліб / засохший хліб
      correct: false
    - text: подана заяву / подавший заяву
      correct: false
    explanation: Почорнілий - стан предмета; пофарбований - результат дії над предметом.
  - question: Який варіант нормативно описує афішу після тривалого сонця?
    options:
    - text: вицвіла афіша
      correct: true
    - text: вицвівша афіша
      correct: false
    - text: вицвітаюча афіша вчора
      correct: false
    - text: афіша, вицвічена сама
      correct: false
    explanation: Вицвіла називає стан після зміни кольору.
  - question: Де найкраще використати підрядне означальне речення?
    options:
    - text: редактор, який погодив рукопис
      correct: true
    - text: погодивший рукопис редактор
      correct: false
    - text: погоділий рукопис редактор
      correct: false
    - text: рукопис, погодивлий редактора
      correct: false
    explanation: Погодити рукопис має прямий додаток.
- type: fill-in
  title: Вибери синтаксичну модель
  instruction: Заповніть пропуск формою на -л- або підрядним реченням.
  items:
  - sentence: Фахівець, ____, представив висновок.
    answer: який перевірив дані
    options:
    - який перевірив дані
    - перевіривший дані
    - перевірілий дані
    - перевірений дані
  - sentence: На підвіконні стояла ____ рослина.
    answer: зівʼяла
    options:
    - зівʼяла
    - зівʼянута сама
    - зівʼявша
    - зівʼялююча
  - sentence: У полі виднівся ____ колос.
    answer: дозрілий
    options:
    - дозрілий
    - дозрівший
    - дозріваючий вже
    - дозрітий
  - sentence: Команда, ____, отримала листа.
    answer: яка погодила план
    options:
    - яка погодила план
    - погодивша план
    - погоділа план
    - погоджена план
  - sentence: У коридорі лежала ____ газета.
    answer: вицвіла
    options:
    - вицвіла
    - вицвівша
    - вицвітаюча вже
    - вицвічена собою
  - sentence: Після спеки ставок був ____.
    answer: змілілий
    options:
    - змілілий
    - змілівший
    - змілений
    - мілкуючий
  - sentence: Працівник, ____, пояснив процедуру.
    answer: який подав звіт
    options:
    - який подав звіт
    - подавший звіт
    - поданий звіт
    - подавле звіт
  - sentence: На подвірʼї стояв ____ від дощу велосипед.
    answer: промоклий
    options:
    - промоклий
    - промокнувший
    - промокнутий сам
    - мокнучий вже
  - sentence: Після ночі в кімнаті стояло ____ повітря.
    answer: охололе
    options:
    - охололе
