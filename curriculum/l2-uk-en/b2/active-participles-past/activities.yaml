- id: essay-active-past-editorial-note
  type: essay-response
  title: Редакторська нотатка про форму на -л-
  instruction: Напишіть аргументований текст українською.
  prompt: Поясніть авторові, коли активний дієприкметник минулого часу на -л- доречний, а коли потрібне підрядне означальне
    речення. Наведіть щонайменше чотири приклади з різних реєстрів.
  min_words: 180
  model_answer: 'Активний дієприкметник минулого часу доречний тоді, коли предмет сам пережив завершену зміну і ми хочемо
    стисло назвати його стан: пожовкле листя, охолола рідина, змарнілий голос, вицвіла афіша. У художньому описі така форма
    допомагає створити компактний образ, а в науковому тексті може точно зафіксувати результат процесу. Якщо ж дієслово має
    прямий додаток або важливо назвати дію виконавця, краще використати підрядне означальне речення: студент, який прочитав
    статтю; фахівець, який підготував висновок; працівник, який подав заяву. Форми на -вш- у сучасному нейтральному тексті
    треба замінювати, бо вони калькують чужу модель і послаблюють українську синтаксичну логіку. Добрий редактор не забороняє
    форму на -л- автоматично, а перевіряє перехідність, вид, реєстр і комунікативний фокус.'
  rubric:
  - criteria: Норма
    description: Правильно відрізняє форми на -л- від кальок на -вш-.
    points: 4
  - criteria: Синтаксис
    description: Пояснює роль підрядного означального речення для перехідних дієслів.
    points: 3
  - criteria: Реєстр
    description: Наводить приклади з художнього, наукового або службового контексту.
    points: 3
