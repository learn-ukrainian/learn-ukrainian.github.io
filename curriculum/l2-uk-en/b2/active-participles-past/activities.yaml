version: '1.0'
module: active-participles-past
level: b2
inline:
  - id: act-1
    type: critical-analysis
    title: "Сам змінився чи виконав дію"
    instruction: "Проаналізуйте п'ять коротких ситуацій і виберіть природну українську модель."
    target_text: >-
      Листя пожовкло. Студент прочитав статтю. Квітка зів'яла від спеки.
      Комісія перевірила довідку. Сад здичавів без догляду.
    questions:
      - "Де предмет сам перейшов у новий стан?"
      - "Де дія має прямий додаток і потребує підрядного речення?"
      - "Які дві ситуації найкраще показують межу між формою на -л- і підрядною моделлю?"
    model_answers:
      - "Листя пожовкло, квітка зів'яла, сад здичавів."
      - "Студент прочитав статтю; комісія перевірила довідку."
      - "Пожовкле листя проти студент, який прочитав статтю; здичавілий сад проти довідка, яку перевірила комісія."

  - id: act-2
    type: comparative-study
    title: "Морфемний маршрут"
    instruction: "Порівняйте форми й поясніть, де видно основу, суфікс -л- і прикметникове закінчення."
    items_to_compare:
      - "пожовкнути -> пожовклий"
      - "збліднути -> зблідлий"
      - "зів'янути -> зів'ялий"
      - "засохнути -> засохлий"
      - "дозріти -> дозрілий"
      - "промокнути -> промоклий"
    criteria:
      - "основа дієслова"
      - "суфікс -л-"
      - "випадання -ну-"
      - "узгодження з іменником"
    prompt: "Які форми показують випадання -ну-, а які лише додають результативне -л-?"
    model_answer: "Зів'янути, засохнути й промокнути показують скорочення основи або зникнення -ну-. Пожовклий, зблідлий і дозрілий демонструють результативну ознаку з прикметниковим закінченням. У всіх випадках форма узгоджується з іменником."

  - id: act-3
    type: critical-analysis
    title: "Прикметник чи жива дія"
    instruction: "Визначте, де форма ще відчувається як результат дії, а де вже стала звичайною якістю."
    target_text: >-
      Стиглий фрукт лежить на столі. Дозрілий на сонці плід має інший смак.
      Сталий вираз увійшов до словника. Зів'яле від спеки листя опало.
    questions:
      - "Де залежні слова повертають відчуття дії?"
      - "Де форма ближча до звичайного прикметника?"
      - "Чому ад'єктивація не скасовує потреби перевіряти реєстр?"
    model_answers:
      - "Дозрілий на сонці плід і зів'яле від спеки листя."
      - "Стиглий фрукт і сталий вираз."
      - "Навіть лексикалізована форма може бути недоречною в офіційному або медичному стилі."

  - id: act-4
    type: critical-analysis
    title: "Редагування форм на -вш-"
    instruction: "Знайдіть кальковані форми й запропонуйте українську правку."
    target_text: >-
      Прочитавший інструкцію пацієнт поставив запитання. Привівша дитину
      жінка чекала в коридорі. Подавша заявку особа отримає відповідь.
      Пожовклі документи лежали на столі.
    questions:
      - "Які три фрагменти треба замінити підрядним реченням?"
      - "Який фрагмент можна залишити як природну форму на -л-?"
      - "Чому стислість не виправдовує форми на -вш-?"
    model_answers:
      - "Пацієнт, який прочитав інструкцію; жінка, яка привела дитину; особа, яка подала заявку."
      - "Пожовклі документи."
      - "Форма на -вш- не є нормативною українською моделлю, навіть якщо вона коротша."

  - id: act-5
    type: comparative-study
    title: "Реєстр і тон"
    instruction: "Порівняйте варіанти й поясніть, де граматика можлива, але тон небажаний."
    items_to_compare:
      - "змарнілий пацієнт"
      - "пацієнт має виснажений вигляд"
      - "пожовклі світлини"
      - "особа, яка подала заяву"
      - "подавша заяву особа"
      - "чинні правила"
    criteria:
      - "нормативність"
      - "етичний тон"
      - "офіційний реєстр"
      - "образність"
    prompt: "Які два варіанти потребують правки в нейтральному або офіційному тексті?"
    model_answer: "Змарнілий пацієнт може звучати оцінно, тому краще пацієнт має виснажений вигляд. Подавша заяву особа є ненормативною; треба особа, яка подала заяву. Пожовклі світлини й чинні правила доречні у своїх жанрах."

workbook:
  - id: wb-1
    type: critical-analysis
    title: "Контроль нормативної форми"
    instruction: "Поясніть кожну правку через дію, додаток і реєстр."
    target_text: >-
      Пожовтівші оголошення висіли на стіні. Подавші документи учасники
      чекали біля входу. Діючі правила пояснила координаторка. Засохлий кущ
      прибрали у дворі.
    questions:
      - "Де потрібна форма на -л-?"
      - "Де потрібне підрядне речення?"
      - "Де потрібна лексична заміна?"
    model_answers:
      - "Пожовклі оголошення; засохлий кущ можна залишити."
      - "Учасники, які подали документи."
      - "Діючі правила -> чинні правила."

  - id: wb-2
    type: comparative-study
    title: "Узгодження і жанр"
    instruction: "Порівняйте словосполучення й визначте, які можна використати в художньому, офіційному або науковому тексті."
    items_to_compare:
      - "зів'яла квітка"
      - "зів'ялі квіти"
      - "охолола суміш"
      - "пожовклий документ"
      - "особа, яка подала заяву"
      - "пацієнт має виснажений вигляд"
    criteria:
      - "узгодження"
      - "жанр"
      - "етичність"
      - "точність"
    prompt: "Розподіліть приклади за жанрами й поясніть один ризик."
    model_answer: "Зів'яла квітка й зів'ялі квіти показують узгодження. Охолола суміш пасує до наукового опису, пожовклий документ - до опису стану, особа, яка подала заяву - до офіційного стилю, а пацієнт має виснажений вигляд - до нейтрального медичного контексту."

  - id: wb-3
    type: authorial-intent
    title: "Редакторський абзац"
    instruction: "Перепишіть уривок і поясніть три рішення."
    text_excerpt: >-
      Повернувшіся додому мешканці принесли пожовтівші документи. Охоловша
      суміш була готова до перевірки. Змарнілого пацієнта попросили описати
      симптоми.
    prompt: "Поясніть авторський намір кожної правки: норму, форму на -л- і тон медичного опису."
    techniques_to_identify:
      - "підрядне речення для діяча"
      - "форма на -л- для результату стану"
      - "нейтральний опис людини"
    model_answer: "Мешканці, які повернулися додому, зберігає активну дію людей і прибирає форму на -вш-. Пожовклі документи та охолола суміш є природними результативними формами на -л-. Змарнілого пацієнта краще замінити на пацієнта з виснаженим виглядом або пацієнта, який скаржився на слабкість, бо медичний контекст потребує нейтрального тону."

  - id: wb-4
    type: comparative-study
    title: "Три моделі редагування"
    instruction: "Порівняйте редакції й визначте, яка стратегія спрацювала."
    items_to_compare:
      - "прочитавший інструкцію пацієнт -> пацієнт, який прочитав інструкцію"
      - "діючі правила -> чинні правила"
      - "пожовтівші сторінки -> пожовклі сторінки"
      - "змарнілий пацієнт -> пацієнт має виснажений вигляд"
    criteria:
      - "підрядне речення"
      - "лексична заміна"
      - "форма на -л-"
      - "етичний опис"
    prompt: "Назвіть стратегію для кожної правки."
    model_answer: "Перший приклад потребує підрядного речення. Другий - лексичної заміни. Третій - нормативної форми на -л-. Четвертий - нейтральнішого й етичнішого опису стану."

  - id: wb-5
    type: essay-response
    title: "Міні-редакція"
    instruction: "Перепишіть абзац, обираючи форму на -л-, підрядне речення або лексичну заміну."
    prompt: >-
      Відредагуйте абзац: "Подавші документи учасники чекали біля входу.
      Пожовтівші оголошення висіли на стіні. Діючі правила пояснила
      координаторка". Поясніть кожну зміну.
    min_words: 150
    model_answer: >-
      Учасники, які подали документи, чекали біля входу. На стіні висіли
      пожовклі оголошення. Координаторка пояснила чинні правила. Перша правка
      потрібна, бо подати має додаток документи, а форма на -вш- не є
      нормативною. Друга правка природна, бо оголошення саме змінило стан:
      воно пожовкло від часу або сонця. Третя правка є лексичною, бо в
      службовому реєстрі правила не діючі, а чинні. Так абзац стає не просто
      коротшим, а нормативним, точним і стилістично доречним для офіційного
      повідомлення.
    rubric:
      - criteria: "Норма"
        description: "Форми на -вш- прибрано."
        points: 4
      - criteria: "Вибір моделі"
        description: "Пояснено форму на -л-, підрядне речення і лексичну заміну."
        points: 4
      - criteria: "Реєстр"
        description: "Офіційний тон збережено без кальки."
        points: 4
