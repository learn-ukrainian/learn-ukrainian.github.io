  - id: workbook-4
    type: essay-response
    title: "Короткий процесний звіт"
    instruction: "Напишіть 150-180 слів."
    prompt: >-
      Опишіть робочий тиждень команди, використавши щонайменше шість форм:
      опрацьовувати, виправляти, налагоджувати, забирати, вимітати, обґрунтовувати.
      Додайте два завершені результати в доконаному виді й поясніть різницю.
    min_words: 150
    model_answer: >-
      > [!model-answer]
      > У понеділок команда опрацьовувала нові звернення й виправляла неточності
      > в шаблонах відповідей. Щоранку координатор забирав пошту, а технік
      > налагоджував систему сповіщень, бо вона надсилала дублікати. Працівник
      > також вимітав коридор перед прийомом відвідувачів. У середу юристка
      > обґрунтовувала зміну процедури на нараді. До п'ятниці команда опрацювала
      > старі звернення й налагодила новий фільтр. Форми опрацьовувала,
      > виправляла, налагоджував, забирав, вимітав і обґрунтовувала показують
      > процес або регулярність. Форми опрацювала й налагодила називають
      > завершені результати.
    rubric:
      - criteria: "Обов'язкові форми"
        description: "Ужито всі шість заданих вторинних недоконаних форм."
        points: 4
      - criteria: "Контраст виду"
        description: "Додано й пояснено два доконані результати."
        points: 4
      - criteria: "Зв'язність"
        description: "Текст має зрозумілу послідовність робочого тижня."
        points: 2
