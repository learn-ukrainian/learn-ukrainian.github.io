- type: reading
  id: aspect-secondary-imperfectivization-reading
  title: "Читання: редакційний тиждень"
  instruction: "Прочитайте уривок і визначте, які дієслова називають результат, а які - процес або повторення."
  source: "Навчальний уривок для модуля B2."
  text: >-
    У понеділок редакція опрацювала першу групу заявок і підписала довідки для учасників. У вівторок команда вже опрацьовувала нові матеріали: перевіряла посилання, виправляла неточності, переписувала короткі описи й налагоджувала спільну таблицю. Кожного ранку координатор забирав пошту з канцелярії, а ввечері повертався до того самого списку, щоб не пропустити жодного звернення. Коли технік налагодив систему сповіщень, редактори почали оновлювати інструкцію щотижня. Вони не обіцяли завершити все одразу, але пояснювали заявникам, що звернення опрацьовуватимуть за чергою.
  tasks:
    - "Випишіть три доконані дієслова, які називають завершений результат."
    - "Випишіть чотири вторинні недоконані форми."
    - "Поясніть, чому після «почали» вжито «оновлювати», а не «оновити»."
    - "Знайдіть речення, де недоконаний вид передає регулярну процедуру."
    - "Перепишіть одне речення так, щоб воно обіцяло завершений результат."

- type: quiz
  title: "Вид і контекст"
  instruction: "Оберіть форму, яка найточніше відповідає контексту."
  items:
    - question: "Яке речення описує тривалий процес роботи зі звітом?"
      options:
        - text: "Команда опрацьовувала звіт увесь тиждень."
          correct: true
        - text: "Команда опрацювала звіт увесь тиждень."
          correct: false
        - text: "Команда опрацює звіт учора."
          correct: false
        - text: "Команда опрацював звіт."
          correct: false
      explanation: "Маркер «увесь тиждень» відкриває процес, тому потрібне опрацьовувала."
    - question: "Де правильно вжито вторинну недоконану форму після фазового дієслова?"
      options:
        - text: "Ми почали переписувати вступ."
          correct: true
        - text: "Ми почали переписати вступ."
          correct: false
        - text: "Ми почали переписав вступ."
          correct: false
        - text: "Ми почали переписаний вступ."
          correct: false
      explanation: "Почати відкриває процес, тому потрібен недоконаний інфінітив."
    - question: "Яка пара показує вторинну імперфективацію?"
      options:
        - text: "опрацювати - опрацьовувати"
          correct: true
        - text: "читати - прочитати"
          correct: false
        - text: "іти - прийти"
          correct: false
        - text: "бути - є"
          correct: false
      explanation: "Опрацьовувати зберігає префіксальний зміст доконаного опрацювати, але повертає недоконаний вид."
    - question: "Яка форма природна з маркером «щоп'ятниці»?"
      options:
        - text: "Секретар подавав звіти щоп'ятниці."
          correct: true
        - text: "Секретар подав звіти щоп'ятниці."
          correct: false
        - text: "Секретар подати звіти щоп'ятниці."
          correct: false
        - text: "Секретар поданий звіти щоп'ятниці."
          correct: false
      explanation: "Повторювана дія потребує недоконаного виду."
    - question: "Який варіант правильно передає повторювану дію?"
      options:
        - text: "Охорона щодня забирала пляшки перед входом."
          correct: true
        - text: "Охорона щодня забрала пляшки перед входом."
          correct: false
        - text: "Охорона щодня заберала пляшки перед входом."
          correct: false
        - text: "Охорона щодня забраний пляшки перед входом."
          correct: false
      explanation: "Забирала передає повторення; форма заберала ненормативна."
    - question: "Де форма «опрацюємо» найдоречніша?"
      options:
        - text: "Ваше звернення опрацюємо до п'ятниці."
          correct: true
        - text: "Ваше звернення опрацюємо щотижня."
          correct: false
        - text: "Ваше звернення опрацюємо зараз протягом години."
          correct: false
        - text: "Ваше звернення опрацюємо вчора."
          correct: false
      explanation: "Опрацюємо обіцяє завершений майбутній результат."
    - question: "Яка форма природна для процесу налагодження?"
      options:
        - text: "Технік налагоджував систему, поки команда чекала."
          correct: true
        - text: "Технік налагодив систему, поки команда чекала."
          correct: false
        - text: "Технік налагодити систему, поки команда чекала."
          correct: false
        - text: "Технік налагоджений систему, поки команда чекала."
          correct: false
      explanation: "Поки створює процесуальне тло, тому потрібне налагоджував."
    - question: "Яке речення правильно розрізняє результат і процедуру?"
      options:
        - text: "Заявку опрацювали вчора, а нові заявки опрацьовують за чергою."
          correct: true
        - text: "Заявку опрацьовують вчора, а нові заявки опрацювали за чергою."
          correct: false
        - text: "Заявку опрацювати вчора, а нові заявки опрацьований за чергою."
          correct: false
        - text: "Заявку опрацьована вчора, а нові заявки опрацювати за чергою."
          correct: false
      explanation: "Перша частина закриває результат, друга описує регулярну процедуру."
    - question: "Яка форма відповідає парі «витерти» у повторюваному контексті?"
      options:
        - text: "витирати"
          correct: true
        - text: "витерати"
          correct: false
        - text: "витерти"
          correct: false
        - text: "витертати"
          correct: false
      explanation: "У недоконаній формі відбувається чергування: витерти - витирати."
    - question: "Який варіант описує звичку?"
      options:
        - text: "Він виписує довідки щоранку."
          correct: true
        - text: "Він виписав довідки щоранку."
          correct: false
        - text: "Він виписати довідки щоранку."
          correct: false
        - text: "Він виписаний довідки щоранку."
          correct: false
      explanation: "Щоранку вимагає недоконаної форми виписує."
    - question: "Де правильно вжито майбутній недоконаний вид?"
      options:
        - text: "Ми опрацьовуватимемо звернення щочетверга."
          correct: true
        - text: "Ми опрацюємо звернення щочетверга."
          correct: false
        - text: "Ми опрацьований звернення щочетверга."
          correct: false
        - text: "Ми опрацювали звернення щочетверга завтра."
          correct: false
      explanation: "Регулярна майбутня процедура потребує опрацьовуватимемо."
    - question: "Яке твердження найточніше?"
      options:
        - text: "Вторинна недоконана форма зберігає префіксальний зміст, але відкриває його для процесу."
          correct: true
        - text: "Вторинна недоконана форма завжди означає завершений результат."
          correct: false
        - text: "Вторинна імперфективація не має суфіксів."
          correct: false
        - text: "Будь-яке дієслово можна без перевірки перетворити на -увати."
          correct: false
      explanation: "Головна функція - говорити про складний результативний зміст як про процес або повторення."

- type: match-up
  title: "Пари і значення"
  instruction: "Поєднайте доконану форму з природною недоконаною відповідністю."
  pairs:
    - left: "опрацювати"
      right: "опрацьовувати"
    - left: "переписати"
      right: "переписувати"
    - left: "виписати"
      right: "виписувати"
    - left: "обґрунтувати"
      right: "обґрунтовувати"
    - left: "налагодити"
      right: "налагоджувати"
    - left: "виправити"
      right: "виправляти"
    - left: "обробити"
      right: "обробляти"
    - left: "подати"
      right: "подавати"
    - left: "видати"
      right: "видавати"
    - left: "забрати"
      right: "забирати"
    - left: "витерти"
      right: "витирати"
    - left: "сплести"
      right: "сплітати"

- type: fill-in
  title: "Доберіть видовий варіант"
  instruction: "Заповніть пропуск формою, яка відповідає часовому або стилістичному контексту."
  items:
    - sentence: "Комісія ____ звернення протягом двох тижнів, але рішення ще не ухвалила."
      answer: "опрацьовувала"
      options: ["опрацьовувала", "опрацювала", "опрацювати", "опрацьована"]
      explanation: "Процес без завершеного рішення потребує недоконаного виду."
    - sentence: "Комісія ____ звернення й надіслала відповідь учора."
      answer: "опрацювала"
      options: ["опрацювала", "опрацьовувала", "опрацьовує", "опрацьовуватиме"]
      explanation: "Відповідь уже надіслано, тому результат завершений."
    - sentence: "Редактор почав ____ вступ після обговорення."
      answer: "переписувати"
      options: ["переписувати", "переписати", "переписав", "переписаний"]
      explanation: "Після почав потрібен недоконаний інфінітив."
    - sentence: "Технік ____ систему, коли надійшов новий запит."
      answer: "налагоджував"
      options: ["налагоджував", "налагодив", "налагодити", "налагоджений"]
      explanation: "Коли тут відкриває фоновий процес."
    - sentence: "Технік ____ систему до початку зустрічі."
      answer: "налагодив"
      options: ["налагодив", "налагоджував", "налагоджує", "налагоджуватиме"]
      explanation: "До початку зустрічі позначає завершений результат."
    - sentence: "Охорона щодня ____ перепустки біля входу."
      answer: "забирала"
      options: ["забирала", "забрала", "заберала", "забрати"]
      explanation: "Щодня вимагає недоконаного виду; нормативна форма - забирала."
    - sentence: "Волонтери ____ інструкцію після кожного польового виїзду."
      answer: "виправляли"
      options: ["виправляли", "виправили", "виправити", "виправлений"]
      explanation: "Після кожного виїзду означає повторювану дію."
    - sentence: "Секретар ____ довідку й передав її заявникові."
      answer: "виписав"
      options: ["виписав", "виписував", "виписувати", "виписуватиме"]
      explanation: "Передав довідку - результат уже завершено."
    - sentence: "Секретар ____ довідки щопонеділка."
      answer: "виписує"
      options: ["виписує", "виписав", "виписати", "виписаний"]
      explanation: "Щопонеділка описує регулярну процедуру."
    - sentence: "Ми ____ заявки за чергою наступного місяця."
      answer: "опрацьовуватимемо"
      options: ["опрацьовуватимемо", "опрацюємо", "опрацювали", "опрацювати"]
      explanation: "За чергою наступного місяця описує майбутню процедуру."
    - sentence: "Вона ____ дошку після кожного заняття."
      answer: "витирала"
      options: ["витирала", "витерла", "витерала", "витерти"]
      explanation: "Після кожного заняття вимагає повторюваної недоконаної форми."
    - sentence: "Майстриня ____ вінок для свята й поклала його на стіл."
      answer: "сплела"
      options: ["сплела", "сплітала", "сплітати", "сплетена"]
      explanation: "Вінок готовий і покладений на стіл, тому потрібен доконаний вид."

- type: group-sort
  title: "Розподіліть форми за моделлю"
  instruction: "Перетягніть дієслова до групи за головним способом творення недоконаної форми."
  groups:
    - name: "суфікс -ува- / -юва-"
      items:
        - "виписувати"
        - "переписувати"
        - "обґрунтовувати"
        - "перетворювати"
    - name: "суфікс -ва-"
      items:
        - "давати"
        - "подавати"
        - "видавати"
        - "продавати"
    - name: "чергується голосний у корені"
      items:
        - "забирати"
        - "витирати"
        - "завмирати"
        - "сплітати"
    - name: "зміна основи або приголосного"
      items:
        - "обробляти"
        - "виправляти"
        - "встановлювати"
        - "здійснювати"

- type: error-correction
  title: "Виправте видові помилки"
  instruction: "Знайдіть помилку й виберіть нормативну форму або конструкцію."
  items:
    - sentence: "Ми почали опрацювати архів після обіду."
      error: "опрацювати"
      correction: "опрацьовувати"
      options: ["опрацьовувати", "опрацювали", "опрацьований", "опрацює"]
      explanation: "Після почали потрібен недоконаний інфінітив."
    - sentence: "Охорона щодня заберала пластикові пляшки."
      error: "заберала"
      correction: "забирала"
      options: ["забирала", "забрала", "забрати", "забраний"]
      explanation: "Нормативна недоконана форма: забирати."
    - sentence: "Редактор часто переписав перший абзац."
      error: "переписав"
      correction: "переписував"
      options: ["переписував", "переписав", "перепише", "переписаний"]
      explanation: "Часто описує повторення, тому потрібен недоконаний вид."
    - sentence: "Вона завжди витерла дошку після заняття."
      error: "витерла"
      correction: "витирала"
      options: ["витирала", "витерла", "витерала", "витерти"]
      explanation: "Завжди вимагає повторюваної форми."
    - sentence: "Команда буде опрацювати заявки щотижня."
      error: "буде опрацювати"
      correction: "опрацьовуватиме"
      options: ["опрацьовуватиме", "опрацює", "опрацювала", "опрацьована"]
      explanation: "Регулярна майбутня дія потребує недоконаного майбутнього."
    - sentence: "Діти часто скочили через калюжі."
      error: "скочили"
      correction: "скакали"
      options: ["скакали", "скочили", "скочити", "скочений"]
      explanation: "Часто називає багаторазову дію."
    - sentence: "Кожного вечора вона сплела маленький вінок."
      error: "сплела"
      correction: "сплітала"
      options: ["сплітала", "сплела", "сплети", "сплетений"]
      explanation: "Кожного вечора означає повторення."
    - sentence: "Він продовжив виправити таблицю."
      error: "виправити"
      correction: "виправляти"
      options: ["виправляти", "виправив", "виправити", "виправлений"]
      explanation: "Продовжив відкриває процес."
    - sentence: "Ми подали звіти щомісяця за старою процедурою."
      error: "подали"
      correction: "подавали"
      options: ["подавали", "подали", "подамо", "подані"]
      explanation: "Щомісяця потребує повторюваної форми."
    - sentence: "Технік налагодив систему, коли команда ще чекала, і процес тривав дві години."
      error: "налагодив"
      correction: "налагоджував"
      options: ["налагоджував", "налагодив", "налагодить", "налагоджений"]
      explanation: "Дві години і фоновий процес потребують недоконаного виду."
    - sentence: "Секретар виписав довідки щоранку."
      error: "виписав"
      correction: "виписував"
      options: ["виписував", "виписав", "випише", "виписаний"]
      explanation: "Щоранку описує регулярну дію."
    - sentence: "Вони намагалися підписати документи протягом години, але ще не завершили."
      error: "підписати"
      correction: "підписувати"
      options: ["підписувати", "підписати", "підписали", "підписаний"]
      explanation: "Незавершений процес краще передає підписувати."

- type: select
  title: "Оберіть усі правильні пояснення"
  instruction: "Позначте твердження, які відповідають реченню."
  items:
    - question: "Речення: «Ми опрацьовуватимемо звернення за чергою»."
      min_correct: 2
      options:
        - text: "Форма описує майбутню регулярну процедуру."
          correct: true
        - text: "Дієслово зберігає зміст доконаного «опрацювати», але має недоконаний вид."
          correct: true
        - text: "Форма обіцяє завершити одне звернення до конкретної дати."
          correct: false
        - text: "Це форма наказового способу."
          correct: false
      explanation: "Опрацьовуватимемо - майбутній недоконаний вид, доречний для процедури."
    - question: "Речення: «Команда опрацювала звіт і надіслала його вчора»."
      min_correct: 2
      options:
        - text: "Дія подана як завершений результат."
          correct: true
        - text: "Форма доконаного виду природна з «надіслала його вчора»."
          correct: true
        - text: "Речення описує повторювану звичку."
          correct: false
        - text: "Після цієї форми обов'язково потрібне «продовжувала»."
          correct: false
      explanation: "Опрацювала закриває результат."
    - question: "Речення: «Редактор почав переписувати вступ»."
      min_correct: 2
      options:
        - text: "Почав є фазовим дієсловом."
          correct: true
        - text: "Переписувати - недоконаний інфінітив."
          correct: true
        - text: "Треба замінити на «почав переписати»."
          correct: false
        - text: "Форма переписувати не має префіксального змісту."
          correct: false
      explanation: "Фазове дієслово відкриває процес."
    - question: "Речення: «Охорона щодня забирала пляшки»."
      min_correct: 2
      options:
        - text: "Щодня позначає повторюваність."
          correct: true
        - text: "Забирала є нормативною недоконаною формою."
          correct: true
        - text: "Треба писати «заберала»."
          correct: false
        - text: "Доконана форма «забрала» краще передає звичку."
          correct: false
      explanation: "Забирала відповідає регулярному контексту."
    - question: "Речення: «Ми плануємо опрацювати архів до кінця місяця»."
      min_correct: 2
      options:
        - text: "Доконаний інфінітив може позначати запланований результат."
          correct: true
        - text: "До кінця місяця створює межу результату."
          correct: true
        - text: "Після плануємо завжди заборонено вживати доконаний вид."
          correct: false
        - text: "Фраза описує щоденну звичку."
          correct: false
      explanation: "На відміну від «почати», планувати може спрямовуватися на результат."
    - question: "Речення: «Команда налагоджувала сервіс, поки користувачі чекали»."
      min_correct: 2
      options:
        - text: "Налагоджувала створює процесуальне тло."
          correct: true
        - text: "Поки підтримує недоконаний вид."
          correct: true
        - text: "Налагоджувала означає, що результат точно був завершений."
          correct: false
        - text: "Форма не може вживатися з технічним іменником."
          correct: false
      explanation: "Речення описує процес, а не обов'язково завершений результат."
    - question: "Речення: «Вони довго виправляли інструкцію, але не виправили її остаточно»."
      min_correct: 2
      options:
        - text: "Недоконана форма називає процес редагування."
          correct: true
        - text: "Доконана форма в другій частині показує, що результату не досягнуто."
          correct: true
        - text: "Обидві форми означають той самий завершений результат."
          correct: false
        - text: "Речення треба замінити тільки формою «робили»."
          correct: false
      explanation: "Речення розрізняє процес і недосягнутий результат."
    - question: "Речення: «Сервіс оновили вчора, але дані оновлюють щодня»."
      min_correct: 2
      options:
        - text: "Оновили називає завершену подію."
          correct: true
        - text: "Оновлюють щодня називає регулярну процедуру."
          correct: true
        - text: "Форма оновлюють тут наказова."
          correct: false
        - text: "Слово щодня просить доконаний вид."
          correct: false
      explanation: "В одному реченні природно співіснують результат і регулярність."

