- type: true-false
  title: "Швидка перевірка правила"
  instruction: "Визначте, чи твердження правильне."
  items:
    - statement: "Вторинна імперфективація дає недоконану форму від доконаного або результативного дієслова."
      correct: true
      explanation: "Наприклад: опрацювати - опрацьовувати."
    - statement: "Форма «переписувати» повністю тотожна формі «писати»."
      correct: false
      explanation: "Переписувати зберігає префіксальний зміст повторного або зміненого писання."
    - statement: "Після «продовжували» звичайно потрібен недоконаний інфінітив."
      correct: true
      explanation: "Продовжували опрацьовувати, продовжували виправляти."
    - statement: "Маркери «щодня» і «часто» часто вимагають недоконаного виду."
      correct: true
      explanation: "Вони позначають повторюваність."
    - statement: "Форма «заберати» є нормативною відповідністю до «забрати»."
      correct: false
      explanation: "Нормативно: забирати."
    - statement: "У реченні «ми опрацюємо заявку до п'ятниці» доконаний вид обіцяє результат."
      correct: true
      explanation: "Форма опрацюємо закриває майбутню дію результатом."
    - statement: "Будь-яке дієслово можна без перевірки зробити недоконаним через -увати."
      correct: false
      explanation: "Є чергування, суплетивні пари, двовидові дієслова і стилістичні обмеження."
    - statement: "У парі «витерти - витирати» є чергування голосного."
      correct: true
      explanation: "Е переходить в и в недоконаній формі."
    - statement: "«Опрацьовуватимемо» підходить для регулярної майбутньої процедури."
      correct: true
      explanation: "Це майбутній недоконаний вид."
    - statement: "«Почали опрацювати» завжди краще за «почали опрацьовувати»."
      correct: false
      explanation: "Після почали природно вжити недоконаний інфінітив."
    - statement: "Суплетивну пару «узяти - брати» краще вивчати як окрему пару."
      correct: true
      explanation: "Вона не виводиться простим додаванням суфікса."
    - statement: "Двовидові дієслова треба аналізувати за контекстом."
      correct: true
      explanation: "Одна форма може отримувати різне видове прочитання."

- type: essay-response
  id: aspect-secondary-imperfectivization-essay
  title: "Мікротекст із видовою перспективою"
  instruction: "Напишіть зв'язний робочий звіт про команду, яка вже завершила одну частину роботи, але регулярно виконує іншу."
  prompt: >-
    Використайте щонайменше шість дієслів із модуля: опрацювати, опрацьовувати, переписувати, виправляти, налагоджувати, забирати, виписувати, подавати, оновлювати. Покажіть різницю між завершеним результатом, тривалим процесом і регулярною процедурою.
  min_words: 180
  model_answer: >-
    Минулого тижня наша команда опрацювала першу групу звернень і підписала довідки для учасників. Після цього ми почали опрацьовувати нові заявки за чергою, бо їх стало більше. Секретар щоранку забирав пошту з канцелярії, редактор переписував короткі пояснення для сайту, а юрист виправляв неточні формулювання в інструкції. Технік налагоджував систему сповіщень, поки координатор виписував довідки для тих, хто вже отримав рішення. Наступного місяця ми оновлюватимемо правила щочетверга й подаватимемо зведений звіт наприкінці кожного тижня.
  rubric:
    - criteria: "Видова точність"
      description: "Доконані форми називають завершений результат, недоконані - процес або повторення."
      points: 4
    - criteria: "Вторинні недоконані форми"
      description: "Є щонайменше шість природних форм на зразок опрацьовувати, переписувати, налагоджувати."
      points: 3
    - criteria: "Контекст"
      description: "Є маркери часу або повторюваності, які пояснюють вибір виду."
      points: 2
    - criteria: "Стиль"
      description: "Текст звучить як цілісний B2-звіт, а не як список окремих речень."
      points: 1
