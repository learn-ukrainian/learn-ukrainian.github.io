version: '1.0'
module: aspect-nuances-secondary-imperfectivization
level: b2
inline:
  - id: act-1
    type: reading
    title: "Процес чи результат у редакції"
    instruction: "Прочитайте уривок і знайдіть доконані та вторинні недоконані форми."
    source: "Навчальний B2-фрагмент."
    text: >-
      У понеділок редакція опрацювала першу групу заявок і підписала довідки для учасників.
      У вівторок команда вже опрацьовувала нові матеріали: перевіряла посилання,
      виправляла неточності, переписувала короткі описи й налагоджувала спільну таблицю.
      Щоранку координатор забирав пошту з канцелярії. Коли технік налагодив систему
      сповіщень, редактори почали оновлювати інструкцію щотижня.
    tasks:
      - "Випишіть три доконані дієслова, які називають завершений результат."
      - "Випишіть чотири вторинні недоконані форми."
      - "Поясніть, чому почали оновлювати природніше за почали оновити."
      - "Замініть одне речення так, щоб воно описувало регулярну процедуру."

  - type: fill-in
    title: "Утворіть вторинну недоконану форму"
    instruction: "Виберіть форму, яка передає процес або повторюваність."
    items:
      - sentence: "Секретар щодня ____ учасників у журналі."
        answer: "записував"
        options: ["записував", "записав", "запише", "писав"]
        explanation: "Щодня позначає повторювану дію: записував."
      - sentence: "Редактор протягом години ____ помилки в довідці."
        answer: "виправляв"
        options: ["виправляв", "виправив", "правився", "виправити"]
        explanation: "Протягом години відкриває процес, тому потрібен недоконаний вид."
      - sentence: "Комісія зараз ____ ваше звернення."
        answer: "опрацьовує"
        options: ["опрацьовує", "опрацювала", "працює", "опрацювати"]
        explanation: "Зараз указує на процес; опрацьовує зберігає значення розгляду матеріалу."
      - sentence: "Технік поступово ____ нову систему доступу."
        answer: "налагоджував"
        options: ["налагоджував", "налагодив", "лагодився", "наладив"]
        explanation: "Поступово потребує недоконаної форми налагоджував."
      - sentence: "Після кожної наради команда ____ план роботи."
        answer: "переробляла"
        options: ["переробляла", "переробила", "робила", "переробити"]
        explanation: "Після кожної наради створює повторення; переробляла зберігає значення повторної зміни."
      - sentence: "Волонтери взимку ____ родинам із документами."
        answer: "допомагали"
        options: ["допомагали", "допомогли", "допомогували", "помагли"]
        explanation: "Для тривалого періоду потрібна форма допомагали з чергуванням о/а."
      - sentence: "Працівник щоранку ____ коридор перед відкриттям."
        answer: "вимітав"
        options: ["вимітав", "вимів", "виместував", "мів"]
        explanation: "Щоранку вимагає повторюваної дії: вимітав."
      - sentence: "Асистент після лекції ____ дошку."
        answer: "витирав"
        options: ["витирав", "витер", "витерував", "тернув"]
        explanation: "Після лекції як регулярний контекст потребує витирав."
      - sentence: "Майстриня щосуботи ____ стрічки в один візерунок."
        answer: "сплітала"
        options: ["сплітала", "сплела", "сплестувала", "плелася"]
        explanation: "Регулярна дія потребує форми сплітала."
      - sentence: "Доповідач під час дискусії ____ свою позицію."
        answer: "обґрунтовував"
        options: ["обґрунтовував", "обґрунтував", "ґрунтувався", "обґрунтувати"]
        explanation: "Під час дискусії показує процес аргументації."

  - type: match-up
    title: "Пари й моделі"
    instruction: "Поєднайте доконане дієслово з правильною вторинною недоконаною формою."
    pairs:
      - left: "записати"
        right: "записувати"
      - left: "опрацювати"
        right: "опрацьовувати"
      - left: "дати"
        right: "давати"
      - left: "подати"
        right: "подавати"
      - left: "вирішити"
        right: "вирішувати"
      - left: "обробити"
        right: "обробляти"
      - left: "допомогти"
        right: "допомагати"
      - left: "витерти"
        right: "витирати"
      - left: "вимести"
        right: "вимітати"
      - left: "сплести"
        right: "сплітати"

  - type: select
    title: "Оберіть вид за контекстом"
    instruction: "Позначте форму, яка найкраще відповідає часовій межі речення."
    items:
      - question: "До п'ятниці відділ ____ усі заявки."
        options:
          - text: "опрацює"
            correct: true
          - text: "опрацьовує"
            correct: false
          - text: "опрацьовував"
            correct: false
          - text: "працює"
            correct: false
        explanation: "До п'ятниці створює межу й очікуваний результат."
      - question: "Відділ щоп'ятниці ____ нові заявки."
        options:
          - text: "опрацьовує"
            correct: true
          - text: "опрацює"
            correct: false
          - text: "опрацював"
            correct: false
          - text: "попрацює"
            correct: false
        explanation: "Щоп'ятниці означає повторювану процедуру."
      - question: "Коли зайшов керівник, технік ____ систему."
        options:
          - text: "налагоджував"
            correct: true
          - text: "налагодив"
            correct: false
          - text: "налагодить"
            correct: false
          - text: "лагодити"
            correct: false
        explanation: "Підрядна подія входить у фон процесу."
      - question: "Після тесту технік ____ систему й передав її команді."
        options:
          - text: "налагодив"
            correct: true
          - text: "налагоджував"
            correct: false
          - text: "налагоджує"
            correct: false
          - text: "лагодився"
            correct: false
        explanation: "Передав її команді показує завершений результат."
      - question: "Не кажіть, що ми вже завершили: ми ще ____ вступ."
        options:
          - text: "переробляємо"
            correct: true
          - text: "переробили"
            correct: false
          - text: "робимо"
            correct: false
          - text: "переробити"
            correct: false
        explanation: "Ще вказує на незавершений процес."
      - question: "Після зауважень редактор ____ вступ і зберіг нову версію."
        options:
          - text: "переробив"
            correct: true
          - text: "переробляв"
            correct: false
          - text: "робив"
            correct: false
          - text: "переробляє"
            correct: false
        explanation: "Зберіг нову версію завершує дію."
      - question: "Щоранку координатор ____ листи з канцелярії."
        options:
          - text: "забирав"
            correct: true
          - text: "забрав"
            correct: false
          - text: "заберував"
            correct: false
          - text: "забрати"
            correct: false
        explanation: "Щоранку потребує повторюваної форми."
      - question: "Координатор ____ листи й поклав їх на стіл."
        options:
          - text: "забрав"
            correct: true
          - text: "забирав"
            correct: false
          - text: "заберував"
            correct: false
          - text: "забирає"
            correct: false
        explanation: "Поклав їх на стіл показує завершений крок."
      - question: "Ми почали ____ типові помилки в шаблонах."
        options:
          - text: "виправляти"
            correct: true
          - text: "виправити"
            correct: false
          - text: "виправили"
            correct: false
          - text: "виправимо"
            correct: false
        explanation: "Почали вимагає відкритого процесу."
      - question: "Ми вирішили ____ типові помилки до релізу."
        options:
          - text: "виправити"
            correct: true
          - text: "виправляти"
            correct: false
          - text: "виправляли"
            correct: false
          - text: "виправляємо"
            correct: false
        explanation: "Вирішили з дедлайном спрямоване на результат."

  - type: quiz
    title: "Морфологічна діагностика"
    instruction: "Виберіть правильне пояснення форми."
    items:
      - question: "Чому в реченні «ми опрацьовуємо заяву» не досить форми «працюємо»?"
        options:
          - text: "Опрацьовуємо зберігає префіксальне значення розгляду матеріалу до результату."
            correct: true
          - text: "Працюємо завжди є доконаним видом."
            correct: false
          - text: "Опрацьовуємо означає тільки майбутній час."
            correct: false
          - text: "Працюємо не може мати додатка."
            correct: false
        explanation: "Вторинна форма точніше називає тип роботи з матеріалом."
      - question: "Яка пара показує чергування о/а?"
        options:
          - text: "допомогти - допомагати"
            correct: true
          - text: "записати - записувати"
            correct: false
          - text: "дати - давати"
            correct: false
          - text: "організувати - організовувати"
            correct: false
        explanation: "У допомогти - допомагати змінюється голосний кореня."
      - question: "Яка форма природна після фазового дієслова «почати»?"
        options:
          - text: "почати виправляти"
            correct: true
          - text: "почати виправити"
            correct: false
          - text: "почати виправив"
            correct: false
          - text: "почати виправить"
            correct: false
        explanation: "Фазове дієслово відкриває процес, тому потрібен недоконаний інфінітив."
      - question: "Що означає «система надсилала сповіщення щогодини»?"
        options:
          - text: "Повторювану дію."
            correct: true
          - text: "Один завершений сигнал."
            correct: false
          - text: "Неможливість дії."
            correct: false
          - text: "Пасивну конструкцію."
            correct: false
        explanation: "Щогодини створює повторюваність."
      - question: "Яка форма є неприродною для літературної норми?"
        options:
          - text: "виместувати"
            correct: true
          - text: "вимітати"
            correct: false
          - text: "витирати"
            correct: false
          - text: "забирати"
            correct: false
        explanation: "Виместувати є механічно вигаданою формою; усталена форма - вимітати."
      - question: "У якому реченні доконаний вид доречний?"
        options:
          - text: "Юрист опрацював скаргу й надіслав відповідь."
            correct: true
          - text: "Юрист опрацював скаргу протягом двох годин, коли йому подзвонили."
            correct: false
          - text: "Юрист щодня опрацював скарги."
            correct: false
          - text: "Юрист почав опрацювати скарги."
            correct: false
        explanation: "Надіслав відповідь підтверджує завершений результат."
      - question: "Яка пара належить до продуктивної моделі -ува-/-юва-?"
        options:
          - text: "організувати - організовувати"
            correct: true
          - text: "вимести - вимітати"
            correct: false
          - text: "сплести - сплітати"
            correct: false
          - text: "допомогти - допомагати"
            correct: false
        explanation: "Організовувати має продуктивний суфікс -овува-."
      - question: "Що перевіряємо першим у видовому рішенні?"
        options:
          - text: "Контекст: результат, процес чи повторення."
            correct: true
          - text: "Довжину дієслова."
            correct: false
          - text: "Наявність англійського continuous."
            correct: false
          - text: "Чи форма має два префікси."
            correct: false
        explanation: "Вид обирається за часовою межею й значенням речення."
      - question: "Чому «поставляти коробку на стіл» не є доброю заміною для «ставити коробку на стіл»?"
        options:
          - text: "Поставляти означає постачати, а не розміщувати предмет."
            correct: true
          - text: "Поставляти є тільки минулим часом."
            correct: false
          - text: "Ставити завжди доконане."
            correct: false
          - text: "Коробка не може бути додатком."
            correct: false
        explanation: "Не всі механічні вторинні форми зберігають потрібне значення."
      - question: "Яке речення найточніше передає офіційну процедуру?"
        options:
          - text: "Відділ опрацьовує звернення в порядку черги."
            correct: true
          - text: "Відділ працює звернення в порядку черги."
            correct: false
          - text: "Відділ опрацював звернення щоп'ятниці."
            correct: false
          - text: "Відділ опрацювати звернення в порядку черги."
            correct: false
        explanation: "Опрацьовує точно називає регулярний адміністративний процес."

  - id: act-6
    type: essay-response
    title: "Мініредагування службового тексту"
    instruction: "Напишіть 150-180 слів українською."
    prompt: >-
      Перепишіть коротке повідомлення так, щоб воно розрізняло завершені результати,
      поточний процес і регулярну процедуру: "Ми опрацювали всі звернення. Нові звернення
      опрацюємо щоп'ятниці. Якщо система не працює, технік налагодив її протягом дня."
      Поясніть три видові рішення.
    min_words: 150
    model_answer: >-
      > [!model-answer]
      > Ми вже опрацювали звернення, які надійшли до понеділка, тому за ними можна
      > готувати відповіді. Нові звернення відділ опрацьовуватиме щоп'ятниці в порядку
      > черги. Якщо система сповіщень дає збій, технік спершу налагоджує доступ,
      > перевіряє журнали й лише після тесту повідомляє, що систему налагоджено.
      > Я залишив доконаний вид у формі опрацювали, бо йдеться про готовий результат.
      > Для щоп'ятниці потрібен недоконаний вид опрацьовуватиме, бо це регулярна
      > процедура. У технічному реченні налагоджує описує процес, а налагоджено
      > закриває результат.
    rubric:
      - criteria: "Видові рішення"
        description: "Чітко розмежовано результат, процес і повторюваність."
        points: 4
      - criteria: "Морфологія"
        description: "Форми вторинної імперфективації природні й нормативні."
        points: 3
      - criteria: "Регістр"
        description: "Текст звучить як службове повідомлення."
        points: 3
    peer_review_guidelines: "Перевірте, чи не обіцяє текст результат там, де описано процес. Позначте одну форму з суфіксом і одну форму з чергуванням."

workbook:
  - type: group-sort
    title: "Відсортуйте моделі"
    instruction: "Розкладіть форми за основною моделлю творення."
    groups:
      - name: "-ува- / -юва-"
        items:
          - "записувати"
          - "опрацьовувати"
          - "обґрунтовувати"
          - "організовувати"
      - name: "-ва-"
        items:
          - "давати"
          - "подавати"
          - "передавати"
      - name: "чергування + -а-/-я-"
        items:
          - "витирати"
          - "вимітати"
          - "сплітати"
          - "допомагати"

  - type: error-correction
    title: "Виправте видові й морфологічні помилки"
    instruction: "Оберіть нормативну форму й поясніть рішення."
    items:
      - sentence: "Команда почала опрацювати заявки."
        error: "опрацювати"
        answer: "опрацьовувати"
        options: ["опрацьовувати", "опрацювала", "працювати", "опрацьована"]
        explanation: "Після почала потрібен недоконаний інфінітив."
      - sentence: "Волонтери допомогли родинам протягом усієї зими."
        error: "допомогли"
        answer: "допомагали"
        options: ["допомагали", "допомогли", "допомогували", "помогали"]
        explanation: "Протягом усієї зими відкриває процес або тривалу повторювану дію."
      - sentence: "Працівник щодня виместував коридор."
        error: "виместував"
        answer: "вимітав"
        options: ["вимітав", "вимів", "местив", "виместував"]
        explanation: "Усталена форма недоконаного виду - вимітати."
      - sentence: "Редактор виправив помилки, коли автор зайшов до кабінету."
        error: "виправив"
        answer: "виправляв"
        options: ["виправляв", "виправив", "правився", "виправити"]
        explanation: "Коли автор зайшов створює фоновий процес."
      - sentence: "Координатор забрав пошту щоранку."
        error: "забрав"
        answer: "забирав"
        options: ["забирав", "забрав", "заберував", "забрати"]
        explanation: "Щоранку потребує недоконаного виду."
      - sentence: "Майстриня щосуботи сплела стрічки."
        error: "сплела"
        answer: "сплітала"
        options: ["сплітала", "сплела", "сплестувала", "плітала"]
        explanation: "Регулярний контекст вимагає сплітала."
      - sentence: "Технік налагодив систему, коли ми ще чекали на доступ."
        error: "налагодив"
        answer: "налагоджував"
        options: ["налагоджував", "налагодив", "налагодити", "лагодився"]
        explanation: "Ще чекали на доступ робить налагодження процесом."
      - sentence: "Відділ працює звернення громадян."
        error: "працює"
        answer: "опрацьовує"
        options: ["опрацьовує", "працює", "опрацює", "працювати"]
        explanation: "Опрацьовує потрібне для адміністративної роботи з матеріалом."
      - sentence: "Асистент витер дошку після кожної вправи."
        error: "витер"
        answer: "витирав"
        options: ["витирав", "витер", "витерував", "тернув"]
        explanation: "Після кожної вправи означає повторення."
