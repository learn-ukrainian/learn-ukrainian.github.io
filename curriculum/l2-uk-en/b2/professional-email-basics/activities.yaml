  - type: fill-in
    title: "Закріплення: точна дія"
    instruction: Виберіть слово, яке робить лист конкретним.
    items:
      - sentence: "Просимо ____ номер договору в темі відповіді."
        answer: "зазначити"
        options:
          - зазначити
          - зазначення
          - значитися
          - означати
        explanation: Потрібне дієслово дії.
      - sentence: "Після отримання відповіді ми ____ бюджет зустрічі."
        answer: "оновимо"
        options:
          - оновимо
          - оновлення
          - новітньо
          - освіжність
        explanation: Дієслово прямо називає наступний крок.
      - sentence: "Посилання на зустріч ____ нижче."
        answer: "додаємо"
        options:
          - додаємо
          - кидаємо
          - робимо
          - ставимося
        explanation: '"Додаємо" пасує до ділового регістру.'
      - sentence: "Просимо відповісти ____ цей лист, щоб зберегти історію листування."
        answer: "на"
        options:
          - на
          - при
          - по
          - через
        explanation: Природна конструкція - "відповісти на лист".
      - sentence: "Якщо дата не підходить, запропонуйте, будь ласка, ____ варіант."
        answer: "інший"
        options:
          - інший
          - інакшість
          - інше
          - інакшування
        explanation: Варіант має бути названий просто і ясно.
      - sentence: "Дякуємо за ____ відповідь."
