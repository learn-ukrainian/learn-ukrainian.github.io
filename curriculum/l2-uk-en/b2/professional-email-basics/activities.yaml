        explanation: Тут потрібний іменник після прийменника "за".
      - sentence: "У темі листа ____ номер договору."
        answer: "зазначте"
        options:
          - зазначте
          - зазначення
          - значиться
          - значення
        explanation: Наказова форма тут прямо називає дію для адресата.
      - sentence: "Пані Олено, ____ отримання оновленого файлу."
        answer: "підтверджую"
        options:
          - підтверджую
          - підтвердження
          - тверджуся
          - затвердженість
        explanation: Дієслово "підтверджую" фіксує факт отримання.

  - id: wb-essay-email
    type: essay-response
    title: Напишіть лист-запит
    instruction: Створіть короткий професійний імейл за ситуацією.
    prompt: "Ви представляєте організацію, яка шукає партнера для навчального вебінару. Напишіть лист-запит до потенційного партнера: представте себе, попросіть інформацію про умови співпраці, назвіть строк відповіді і коректно завершіть лист."
    min_words: 150
    model_answer: |-
      > [!model-answer]
      > Тема: Запит щодо умов співпраці для навчального вебінару
      >
      > Шановна пані Олено,
      >
      > звертаюся від імені громадської організації "Освітній простір". Ми плануємо провести навчальний вебінар для викладачів української мови і розглядаємо можливість співпраці з вашим центром.
      >
      > Просимо надіслати інформацію про доступні формати вебінарів, орієнтовну вартість, технічні вимоги і можливі дати у серпні. Нас також цікавить, чи можете ви запропонувати коротку консультацію перед подією, щоб узгодити цілі вебінару, кількість учасників і формат матеріалів.
      >
      > Якщо у вас є короткий опис послуг, приклад договору або перелік даних, які потрібні для підготовки пропозиції, додайте його, будь ласка, до відповіді. Після отримання інформації ми підготуємо внутрішній бюджет і повернемося з уточненням щодо можливого формату співпраці.
      >
      > За потреби готові надіслати короткий опис нашої аудиторії, очікувану кількість учасників і попередній календар підготовки. Це допоможе вашій команді оцінити обсяг роботи і запропонувати реалістичний формат вебінару.
      >
      > Будемо вдячні за відповідь до 19 липня, щоб встигнути підготувати бюджет і погодити календар.
      >
      > З повагою,
      > Марко Дяченко
    rubric:
      - criteria: Структура
        description: Є тема, звертання, вступ, запит, строк і підпис.
        points: 4
      - criteria: Тон
        description: Дотримано нейтрально-ввічливого ділового регістру.
        points: 3
      - criteria: Конкретність
        description: Запит містить предмет, формат відповіді і причину строку.
        points: 3
