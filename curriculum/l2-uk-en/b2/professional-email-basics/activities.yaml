version: '1.0'
module: professional-email-basics
level: b2
inline:
  - type: match-up
    title: Частина листа і функція
    instruction: Поєднайте частину професійного імейлу з її реальною комунікативною функцією.
    pairs:
      - left: тема листа
        right: допомагає адресатові впізнати предмет і дію до відкриття повідомлення
      - left: звертання
        right: задає дистанцію між автором і адресатом
      - left: вступ
        right: коротко пояснює, хто пише і чому
      - left: основна частина
        right: формулює запит, підтвердження або запрошення
      - left: заклик до дії
        right: називає строк, формат відповіді або наступний крок
      - left: підпис
        right: показує роль автора і канал для подальшого контакту
      - left: вкладення
        right: додає документ або матеріал, який треба явно назвати в тексті
      - left: копія листа
        right: включає людину в процес і потребує зрозумілої ролі
      - left: строк відповіді
        right: показує, коли дія потрібна для подальшого процесу
      - left: вступний контекст
        right: пояснює, чому автор звертається саме зараз
      - left: список пунктів
        right: допомагає адресатові відповісти на кілька конкретних питань
      - left: наступний крок
        right: показує, що станеться після відповіді адресата

  - type: fill-in
    title: Формули ввічливості
    instruction: Заповніть пропуски природними діловими формулами.
    items:
      - sentence: "____ пані Олено, прошу надіслати оновлений графік зустрічей."
        answer: "Шановна"
        options:
          - Шановна
          - Привітна
          - Дорога
          - Будь-яка
        explanation: Для першого або офіційного контакту природне звертання "Шановна пані...".
      - sentence: "Буду ____ за відповідь до четверга."
        answer: "вдячна"
        options:
          - вдячна
          - винна
          - вимушена
          - випадкова
        explanation: Формула поєднує ввічливість і чіткий строк.
      - sentence: "До листа ____ проєкт договору і таблицю з бюджетом."
        answer: "додаю"
        options:
          - додаю
          - підкидаю
          - роблю
          - ставлю
        explanation: '"Додаю" нейтрально називає вкладення.'
      - sentence: "Просимо ____ участь у зустрічі до 16 липня."
        answer: "підтвердити"
        options:
          - підтвердити
          - підтвердження
          - підтвердно
          - піднести
        explanation: Потрібне дієслово дії.
      - sentence: "____ повагою, Ірина Коваль."
        answer: "З"
        options:
          - З
          - За
          - При
          - Над
        explanation: Стандартне завершення листа - "З повагою".
      - sentence: "Ставлю в ____ Оксану Мельник, яка координує календар."
        answer: "копію"
        options:
          - копію
          - тему
          - вкладення
          - підпис
        explanation: Роль людини в копії треба назвати явно.
      - sentence: "Просимо ____ нову дату зустрічі з вашою командою."
        answer: "погодити"
        options:
          - погодити
          - погодженість
          - погоджувально
          - погодний
        explanation: Дієслово "погодити" називає домовленість про дату.
      - sentence: "У відповідь ____ ваш лист від 10 липня надсилаємо оновлений файл."
        answer: "на"
        options:
          - на
          - при
          - по
          - через
        explanation: Формула "у відповідь на ваш лист" природно прив'язує повідомлення до попереднього контакту.
      - sentence: "____ надати відповідь у зручному для вас форматі."
        answer: "Просимо"
        options:
          - Просимо
          - Просьба
          - Прохально
          - Попрос
        explanation: На початку запиту потрібна ввічлива дієслівна форма.
      - sentence: "Після погодження дати ____ посилання на зустріч."
        answer: "надішлемо"
        options:
          - надішлемо
          - надіслання
          - шлемо
          - посилково
        explanation: Дієслово прямо називає майбутню дію автора.

  - type: error-correction
    title: Редагування тону і канцеляризмів
    instruction: Виправте фразу так, щоб вона звучала природно в діловому листі.
    items:
      - sentence: "Було здійснено направлення матеріалів для ознайомлення."
        error: "здійснено направлення"
        correction: "надсилаємо"
        error_type: construction
        options:
          - надсилаємо
          - направляємо направлення
          - робимо пересилкування
          - здійснюємо здійснення
        explanation: Проста дія краще передається дієсловом "надсилаємо".
      - sentence: "Просимо відповісти у найкоротші терміни."
        error: "у найкоротші терміни"
        correction: "до 16:00 12 липня"
        error_type: phrase
        options:
          - до 16:00 12 липня
          - колись швидко
          - дуже терміново
          - максимально в момент
        explanation: Конкретний строк зменшує непорозуміння.
      - sentence: "По даному питанню просимо дати інформацію."
        error: "По даному питанню"
        correction: "Щодо цього питання"
        error_type: phrase
        options:
          - Щодо цього питання
          - По даній справі
          - За цим моментом
          - У питаннєвому полі
        explanation: '"Щодо цього питання" природніше й нормативніше.'
      - sentence: "Скиньте нам документи, бо ми не встигаємо."
        error: "Скиньте"
        correction: "Просимо надіслати"
        error_type: register
        options:
          - Просимо надіслати
          - Киньте
          - Перекиньте швидко
          - Закиньте
        explanation: У першому контакті потрібен нейтрально-діловий дієслівний вибір.
      - sentence: "Заздалегідь дякуємо за розуміння, зустріч перенесено без обговорення."
        error: "заздалегідь дякуємо за розуміння"
        correction: "дякуємо за розуміння і готові обговорити інші варіанти"
        error_type: phrase
        options:
          - дякуємо за розуміння і готові обговорити інші варіанти
          - просто зрозумійте
          - без варіантів дякуємо
          - дякуємо за згоду, якої ще немає
        explanation: Формула не має перетворюватися на прихований тиск.
      - sentence: "Хочемо зрозуміти, чи потягнемо співпрацю."
        error: "чи потягнемо"
        correction: "чи зможемо запланувати співпрацю в бюджеті"
        error_type: register
        options:
          - чи зможемо запланувати співпрацю в бюджеті
          - чи витягнемо цю штуку
          - чи піднімемо тему грошима
          - чи якось воно буде
        explanation: Діловий лист потребує точнішого пояснення фінансової мети.
      - sentence: "Ми закинули файл у вкладення, гляньте."
        error: "закинули файл"
        correction: "додаємо файл"
        error_type: register
        options:
          - додаємо файл
          - закинули файл
          - кинули штуку
          - файлик прилетів
        explanation: У діловому листі краще нейтрально назвати вкладення.
      - sentence: "Будь ласка, порішайте це питання до вечора."
        error: "порішайте це питання"
        correction: "підтвердьте дату зустрічі"
        error_type: register
        options:
          - підтвердьте дату зустрічі
          - порішайте питання
          - закрийте момент
          - зробіть якось
        explanation: Потрібна конкретна дія замість розмовної загальної формули.

  - type: select
    title: Оберіть професійне рішення
    instruction: Виберіть варіант, який найкраще відповідає базовому діловому імейлу.
    items:
      - question: Яка тема листа найінформативніша?
        options:
          - text: Запит щодо умов співпраці на серпень
            correct: true
          - text: Важливо
            correct: false
          - text: Питання
            correct: false
          - text: Привіт, є справа
            correct: false
        explanation: Добра тема називає предмет і часову рамку.
      - question: Яке речення найкраще формулює запит?
        options:
          - text: Просимо надіслати прайс-лист і доступні дати зустрічі до п'ятниці.
            correct: true
          - text: Було б добре якось отримати щось про ціни.
            correct: false
          - text: Скиньте все, що маєте.
            correct: false
          - text: Чекаємо на швидку реакцію.
            correct: false
        explanation: Є дія, предмет і строк.
      - question: Коли варто пояснювати людину в копії?
        options:
          - text: Коли адресат має зрозуміти її роль у процесі.
            correct: true
          - text: Ніколи, копія завжди зрозуміла сама собою.
            correct: false
          - text: Лише тоді, коли лист не має теми.
            correct: false
          - text: Коли треба приховати справжнього адресата.
            correct: false
        explanation: Копія без ролі створює невизначеність.
      - question: Яка відмова зберігає професійний тон?
        options:
          - text: На жаль, не можемо виконати запит до середи, але можемо запропонувати строк 22 липня.
            correct: true
          - text: Це неможливо, не пишіть нам про це.
            correct: false
          - text: Ми не винні, що у вас такий графік.
            correct: false
          - text: Відмова. Крапка.
            correct: false
        explanation: Професійна відмова називає межу і, якщо можливо, альтернативу.
      - question: Яке речення найкраще підтверджує отримання?
        options:
          - text: Підтверджую отримання підписаного договору і передаю його до бухгалтерії.
            correct: true
          - text: Ок.
            correct: false
          - text: Щось прийшло, подивлюся колись.
            correct: false
          - text: Ваш файл десь є.
            correct: false
        explanation: Підтвердження має фіксувати факт і наступний крок.
      - question: Який варіант найкраще пояснює вкладення?
        options:
          - text: До листа додаю проєкт договору і таблицю бюджету для попереднього перегляду.
            correct: true
          - text: Там щось у файлах, подивіться.
            correct: false
          - text: Вкладення є, але не скажу яке.
            correct: false
          - text: Файли самі все пояснять.
            correct: false
        explanation: Вкладення треба назвати і пояснити його роль.
      - question: Який варіант найкраще підходить для першого контакту з установою?
        options:
          - text: Шановні представники відділу підтримки, прошу уточнити статус запиту.
            correct: true
          - text: Привіт усім, що там із моїм питанням?
            correct: false
          - text: Народ, відгукніться щодо заявки.
            correct: false
          - text: Друзі, киньте відповідь.
            correct: false
        explanation: Перший контакт потребує нейтральної дистанції.
      - question: Який варіант найкраще пояснює строк?
        options:
          - text: Просимо відповісти до 12 липня, оскільки цього дня завершуємо бюджет.
            correct: true
          - text: Просимо відповісти дуже швидко.
            correct: false
          - text: Відповідайте негайно без пояснень.
            correct: false
          - text: Колись дайте знати.
            correct: false
        explanation: Пояснений строк звучить твердо, але професійно.

  - type: unjumble
    title: Зберіть речення листа
    instruction: Розташуйте слова в природному порядку для професійного імейлу.
    items:
      - words:
          - просимо
          - вас
          - надіслати
          - актуальний
          - прайс-лист
          - до
          - п'ятниці
        answer: "просимо вас надіслати актуальний прайс-лист до п'ятниці"
      - words:
          - просимо
          - підтвердити
          - вашу
          - участь
          - до
          - середи
          - цього
          - тижня
        answer: "просимо підтвердити вашу участь до середи цього тижня"
      - words:
          - до
          - листа
          - додаю
          - проєкт
          - договору
          - для
          - перегляду
        answer: "до листа додаю проєкт договору для перегляду"
      - words:
          - будемо
          - вдячні
          - за
          - відповідь
          - до
          - п'ятниці
          - включно
        answer: "будемо вдячні за відповідь до п'ятниці включно"
      - words:
          - ставлю
          - в
          - копію
          - координаторку
          - цього
          - проєкту
        answer: "ставлю в копію координаторку цього проєкту"
      - words:
          - просимо
          - уточнити
          - реквізити
          - компанії
          - до
          - понеділка
        answer: "просимо уточнити реквізити компанії до понеділка"
      - words:
          - дякую
          - за
          - оперативну
          - відповідь
          - щодо
          - графіка
        answer: "дякую за оперативну відповідь щодо графіка"
      - words:
          - після
          - перевірки
          - ми
          - надішлемо
          - короткий
          - висновок
        answer: "після перевірки ми надішлемо короткий висновок"

workbook:
  - type: true-false
    title: Етикет і структура
    instruction: Визначте, чи твердження відповідає базовій логіці професійного імейлу.
    items:
      - statement: Тема "Важливо" зазвичай слабша за тему "Погодження договору N 18/24".
        correct: true
        explanation: Друга тема називає предмет і процес.
      - statement: Людину в копії ніколи не треба пояснювати, бо адресат сам здогадається.
        correct: false
        explanation: Роль людини в копії краще назвати явно.
      - statement: Ввічлива відмова може містити альтернативний строк або інший варіант.
        correct: true
        explanation: Альтернатива допомагає зберегти співпрацю.
      - statement: У першому листі до незнайомого партнера жаргон робить текст професійнішим.
        correct: false
        explanation: Жаргон може знизити регістр і створити неправильну дистанцію.
      - statement: Підтвердження отримання може також називати наступний крок.
        correct: true
        explanation: Це зменшує потребу в додатковому листі.
      - statement: Конкретний строк часто корисніший за формулу "якнайшвидше".
        correct: true
        explanation: Конкретика допомагає планувати дію.
      - statement: У листі-запиті можна пояснити, для чого потрібна відповідь.
        correct: true
        explanation: Це допомагає адресатові зрозуміти контекст і пріоритет.
      - statement: Вкладення краще не називати, якщо файл прикріплено.
        correct: false
        explanation: Назва вкладення зменшує ризик непорозуміння.
      - statement: Коротке підтвердження може містити наступний крок.
        correct: true
        explanation: Наприклад, "передаю документ до бухгалтерії".
      - statement: У діловому листі завжди треба писати максимально довгі речення.
        correct: false
        explanation: Лаконічність часто робить лист професійнішим.

  - id: wb-reading-request
    type: reading
    title: "Читання: кодекс електронної комунікації"
    instruction: Прочитайте фрагмент корпоративного кодексу і визначте технічні та етичні правила листування.
    text: >-
      У корпоративному листуванні тема має коротко називати предмет і потрібну дію.
      На робочі листи відповідаємо протягом одного робочого дня; якщо повна відповідь
      потребує більше часу, надсилаємо коротке підтвердження з новим строком.
      Корпоративний підпис має містити ім'я, посаду, організацію і робочий контакт.
      Поле CC використовуємо для колег, які мають бути поінформовані, але не виконують
      головну дію; роль людини в копії бажано пояснити в тексті. BCC не використовуємо
      для прихованого тиску або обговорення конфліктів. Вкладення потрібно називати
      в основній частині листа, зазначаючи, що адресат має з ними зробити.
    source: Навчальний фрагмент корпоративного кодексу електронної комунікації.
    tasks:
      - Яке правило стосується тайм-менеджменту у відповідях?
      - Що має містити корпоративний підпис?
      - Чим відрізняється доречне використання CC від проблемного використання BCC?
      - Як у кодексі пояснено роботу з вкладеннями?

  - type: translate
    title: "Переклад: базові ділові формули"
    instruction: Оберіть найприродніший український варіант.
    items:
      - source: "Please confirm your participation by Friday."
        options:
          - text: "Просимо підтвердити участь до п'ятниці."
            correct: true
          - text: "Підтвердіть участь, бо так треба."
            correct: false
          - text: "Будьте участь п'ятницею."
            correct: false
        explanation: Є ввічлива формула, дія і строк.
      - source: "I am attaching the draft agreement."
        options:
          - text: "До листа додаю проєкт договору."
            correct: true
          - text: "Я прикладаю угоду фізично."
            correct: false
          - text: "Я роблю аттач договору."
            correct: false
        explanation: '"До листа додаю" є природною формулою для вкладення.'
      - source: "Could you clarify the invoice number?"
        options:
          - text: "Чи могли б ви уточнити номер рахунку?"
            correct: true
          - text: "Чи можете ви зробити ясність номера?"
            correct: false
          - text: "Уточніть, бо незрозуміло."
            correct: false
        explanation: Питальна форма пом'якшує запит.
      - source: "Thank you for your prompt response."
        options:
          - text: "Дякую за оперативну відповідь."
            correct: true
