- type: reading
  id: pluperfect-memory-reading
  title: "Читання: давніший шар спогаду"
  instruction: "Прочитайте уривок і визначте, чому в ньому з'являється давньоминулий час."
  source: "Навчальний уривок для модуля B2."
  text: >-
    Коли Марта повернулася до старого будинку, у коридорі вже стояла була
    шафа, яку дід переніс сюди ще перед ремонтом. Вона хотіла була відразу
    відчинити дверцята, та помітила на підлозі пожовклий конверт. Листа
    написала була її бабуся, але так і не надіслала. Марта перечитала кілька
    рядків і зрозуміла, що історія родини почалася значно раніше, ніж їй
    розповідали.
  tasks:
    - "Випишіть три форми давньоминулого часу."
    - "Поясніть, яка дія передує іншій минулій дії."
    - "Знайдіть приклад перерваного або скасованого наміру."

- type: fill-in
  title: "Утворіть давньоминулий час"
  instruction: "Оберіть форму, яка правильно узгоджується з підметом."
  items:
