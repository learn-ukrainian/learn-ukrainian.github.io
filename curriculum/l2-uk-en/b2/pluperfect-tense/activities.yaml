- type: essay-response
  id: pluperfect-tense-essay
  title: "Мініесе: спогад із часовими пластами"
  instruction: "Напишіть короткий спогад, у якому одна дія передує іншій минулій дії."
  prompt: "Використайте щонайменше чотири форми давньоминулого часу, один приклад перерваного наміру, один приклад скасованого результату та два часові сполучники."
  min_words: 180
  model_answer: |-
    > [!model-answer]
    > Коли я повернувся до нашої старої школи, у коридорі вже змінили були
    > підлогу, але біля бібліотеки ще висіла стара дошка оголошень. Я хотів
    > був одразу зайти до класу, та почув голос учительки й зупинився. До того
    > як почалася зустріч випускників, ми підготували були кілька запитань про
    > архів, але директор переніс розмову на кінець вечора. Олена написала була
    > короткий спогад для стенда, проте перечитала його й вирішила скоротити.
    > Так давніші події відкрили окремий шар пам'яті.
  rubric:
    - criteria: "Узгодження"
      description: "Форми давньоминулого часу узгоджені за родом і числом."
      points: 4
    - criteria: "Часова ієрархія"
      description: "Є зрозумілий зв'язок між давнішою дією та опорною минулою подією."
      points: 3
    - criteria: "Смислові функції"
      description: "Перерваний намір і скасований результат мають окремі приклади."
      points: 2
    - criteria: "Стиль"
      description: "Текст не перевантажений зайвими складеними формами."
      points: 1
