version: '1.0'
module: pluperfect-tense
level: b2
inline:
  - id: act-1
    type: reading
    title: "Спогад про змінений план"
    instruction: "Прочитайте уривок і визначте, які форми створюють давніший шар минулого."
    source: "Навчальний B2-фрагмент."
    text: >-
      Я знав був цю станцію зовсім іншою: біля входу стояла стара каса, а на стіні
      висів пожовклий розклад. Ми домовилися були зустрітися там після лекції, але
      раптовий дощ змінив плани. Марта хотіла була подзвонити, та телефон розрядився.
      Коли ми нарешті прийшли, будівельники вже зняли вивіску, яку я пам'ятав із дитинства.
    tasks:
      - "Випишіть три форми давньоминулого часу."
      - "Поясніть, яка дія була скасована або перервана."
      - "Знайдіть одне речення зі звичайним минулим часом."
      - "Поясніть, чому не кожна минула дія в уривку має форму з був/була."

  - type: fill-in
    title: "Утворіть давньоминулий час"
    instruction: "Виберіть форму, що узгоджується з підметом."
    items:
      - sentence: "Він ____ ____ листа, але не надіслав його."
        answer: "написав був"
        options: ["написав був", "написала була", "був написати", "написали були"]
        explanation: "Він вимагає чоловічої форми: написав був."
      - sentence: "Вона ____ ____ відповідь, та передумала."
        answer: "підготувала була"
        options: ["підготувала була", "підготував був", "була підготувати", "підготували були"]
        explanation: "Вона вимагає жіночого роду в обох компонентах."
      - sentence: "Ми ____ ____ зустрітися біля вокзалу."
        answer: "домовилися були"
        options: ["домовилися були", "домовився був", "були домовитися", "домовилася була"]
        explanation: "Множина: домовилися були."
      - sentence: "Я (жінка) ____ ____ пояснити причину."
        answer: "хотіла була"
        options: ["хотіла була", "хотів був", "була хотіти", "хотіли були"]
        explanation: "Форма я узгоджується з родом мовця."
      - sentence: "Я (чоловік) ____ ____ подзвонити раніше."
        answer: "хотів був"
        options: ["хотів був", "хотіла була", "був хотіти", "хотіли були"]
        explanation: "Чоловічий рід: хотів був."
      - sentence: "Воно ____ ____ ще до ранку."
        answer: "почалося було"
        options: ["почалося було", "почалася була", "почалися були", "було початися"]
        explanation: "Середній рід: почалося було."
      - sentence: "Вони ____ ____ цей будинок раніше."
        answer: "бачили були"
        options: ["бачили були", "бачив був", "бачила була", "були бачити"]
        explanation: "Множина: бачили були."
      - sentence: "Ти (жінка) ____ ____ ключі на столі."
        answer: "залишила була"
        options: ["залишила була", "залишив був", "був залишити", "залишили були"]
        explanation: "Ти з жіночою референцією вимагає залишила була."
      - sentence: "Ти (чоловік) ____ ____ документи в машині."
        answer: "залишив був"
        options: ["залишив був", "залишила була", "був залишити", "залишили були"]
        explanation: "Ти з чоловічою референцією вимагає залишив був."
      - sentence: "Діти ____ ____ до зали, але їх попросили чекати."
        answer: "зайшли були"
        options: ["зайшли були", "зайшов був", "зайшла була", "були зайти"]
        explanation: "Діти - множина: зайшли були."

  - type: match-up
    title: "Форма й функція"
    instruction: "Поєднайте форму з найточнішою функцією."
    pairs:
      - left: "хотів був сказати"
        right: "нереалізований намір"
      - left: "поклав був документи"
        right: "скасований результат"
      - left: "знала була цю вулицю"
        right: "ретроспективний шар пам'яті"
      - left: "домовилися були зустрітися"
        right: "попередній план, який змінився"
      - left: "читала була лист"
        right: "давніша дія в минулому"
      - left: "почалося було"
        right: "середній рід у складеній формі"
      - left: "бачили були"
        right: "множина в обох компонентах"
      - left: "прийшов був"
        right: "чоловічий рід однини"
      - left: "зібралася була виходити"
        right: "перервана підготовка"
      - left: "комісія підтримала була підхід"
        right: "давніша позиція, пізніше змінена"

  - type: error-correction
    title: "Виправте форму"
    instruction: "Виберіть нормативний давньоминулий варіант."
    items:
      - sentence: "Він був написати відповідь, але не надіслав її."
        error: "був написати"
        answer: "написав був"
        options: ["написав був", "був написати", "написала була", "написаний був"]
        explanation: "Давньоминулий час має дві минулі форми, не інфінітив."
      - sentence: "Вона читав була цю книжку раніше."
        error: "читав була"
        answer: "читала була"
        options: ["читала була", "читав була", "читати була", "читали були"]
        explanation: "Обидва компоненти узгоджуються з жіночим родом."
      - sentence: "Ми були домовитися зустрітися."
        error: "були домовитися"
        answer: "домовилися були"
        options: ["домовилися були", "були домовитися", "домовився був", "домовлена була"]
        explanation: "Потрібна минула форма основного дієслова."
      - sentence: "Я (жінка) хотів був відповісти."
        error: "хотів був"
        answer: "хотіла була"
        options: ["хотіла була", "хотів був", "хотіли були", "була хотіти"]
        explanation: "Форма я узгоджується з родом мовця."
      - sentence: "Вони прийшов був раніше."
        error: "прийшов був"
        answer: "прийшли були"
        options: ["прийшли були", "прийшов був", "прийшла була", "були прийти"]
        explanation: "Вони вимагає множини."
      - sentence: "Воно почалася була до світанку."
        error: "почалася була"
        answer: "почалося було"
        options: ["почалося було", "почалася була", "почалися були", "був початися"]
        explanation: "Воно вимагає середнього роду."
      - sentence: "Я прочитаний був цей лист."
        error: "прочитаний був"
        answer: "прочитав був"
        options: ["прочитав був", "прочитаний був", "був прочитати", "прочитала була"]
        explanation: "Не потрібна пасивна форма; треба минулий час активного дієслова."
      - sentence: "Вона була хотіла пояснити, та промовчала."
        error: "була хотіла"
        answer: "хотіла була"
        options: ["хотіла була", "була хотіла", "хотів був", "була хотіти"]
        explanation: "Для навчальної продукції безпечний порядок: основне дієслово + була."
      - sentence: "Ми читали був старий звіт."
        error: "був"
        answer: "були"
        options: ["були", "був", "була", "було"]
        explanation: "Ми - множина, тому читали були."
      - sentence: "Ти (чоловік) залишила була нотатки."
        error: "залишила була"
        answer: "залишив був"
        options: ["залишив був", "залишила була", "залишили були", "був залишити"]
        explanation: "Для чоловічої референції потрібна форма залишив був."

  - type: translate
    title: "Перекладіть значення, не кальку"
    instruction: "Оберіть український варіант, який природно передає давніший шар минулого."
    items:
      - source: "He had wanted to ask, but stayed silent."
        options:
          - text: "Він хотів був запитати, але промовчав."
            correct: true
          - text: "Він був хотіти запитати, але промовчав."
            correct: false
          - text: "Він хотів запитати завжди."
            correct: false
        explanation: "Хотів був передає нереалізований намір."
      - source: "She had prepared an answer, but did not send it."
        options:
          - text: "Вона підготувала була відповідь, але не надіслала її."
            correct: true
          - text: "Вона була підготувати відповідь, але не надіслала її."
            correct: false
          - text: "Вона підготовлена була відповідь."
            correct: false
        explanation: "Потрібні дві минулі форми: підготувала була."
      - source: "We had agreed to meet, but the plan changed."
        options:
          - text: "Ми домовилися були зустрітися, але план змінився."
            correct: true
          - text: "Ми були домовитися зустрітися, але план змінився."
            correct: false
          - text: "Ми домовлялися будемо зустрітися."
            correct: false
        explanation: "Домовилися були відсуває домовленість у давніший шар."
      - source: "I had known this street differently."
        options:
          - text: "Я знав був цю вулицю іншою."
            correct: true
          - text: "Я був знати цю вулицю іншою."
            correct: false
          - text: "Я знаю був цю вулицю іншою."
            correct: false
        explanation: "Знав був передає ретроспективний шар пам'яті."
      - source: "They had entered the hall, but were asked to wait."
        options:
          - text: "Вони зайшли були до зали, але їх попросили чекати."
            correct: true
          - text: "Вони були зайти до зали, але їх попросили чекати."
            correct: false
          - text: "Вони зайшов був до зали."
            correct: false
        explanation: "Вони вимагає множини: зайшли були."
      - source: "She had been about to leave, but it started raining."
        options:
          - text: "Вона зібралася була виходити, але почався дощ."
            correct: true
          - text: "Вона була зібратися виходити, але почався дощ."
            correct: false
          - text: "Вона зібрався був виходити."
            correct: false
        explanation: "Зібралася була показує перервану підготовку."
      - source: "I had put the documents on the table, then moved them."
        options:
          - text: "Я поклав був документи на стіл, а потім переніс їх."
            correct: true
          - text: "Я був покласти документи на стіл, а потім переніс їх."
            correct: false
          - text: "Я покладений був документи."
            correct: false
        explanation: "Поклав був передає скасований результат."
      - source: "She had believed in a quick return."
        options:
          - text: "Вона вірила була у швидке повернення."
            correct: true
          - text: "Вона був вірити у швидке повернення."
            correct: false
          - text: "Вона вірили були у швидке повернення."
            correct: false
        explanation: "Жіночий рід: вірила була."
      - source: "The meeting had started before dawn."
        options:
          - text: "Засідання почалося було до світанку."
            correct: true
          - text: "Засідання почалася була до світанку."
            correct: false
          - text: "Засідання було початися до світанку."
            correct: false
        explanation: "Засідання - середній рід: почалося було."
      - source: "The commission had supported the approach, but later changed its mind."
        options:
          - text: "Комісія підтримала була цей підхід, але згодом змінила думку."
            correct: true
          - text: "Комісія була підтримати цей підхід, але змінила думку."
            correct: false
          - text: "Комісія підтримали були цей підхід."
            correct: false
        explanation: "Підтримала була показує давнішу позицію, яку змінили."

  - id: act-6
    type: essay-response
    title: "Коротка ретроспекція"
    instruction: "Напишіть 150-180 слів українською."
    prompt: >-
      Напишіть короткий спогад про план, який змінився. Використайте щонайменше
      три форми давньоминулого часу: одну з був, одну з була, одну з були.
      Поясніть, чому кожна форма доречна.
    min_words: 150
    model_answer: >-
      > [!model-answer]
      > Я знав був цю бібліотеку тихою, але після ремонту вона стала відкритим
      > простором для лекцій. Олена підготувала була короткий виступ, та організатори
      > змінили формат зустрічі. Ми домовилися були прийти раніше, але транспорт
      > затримався. Форми знав був, підготувала була й домовилися були потрібні не
      > просто для минулого часу. Вони показують давніший план або уявлення, яке
      > пізніше змінилося. Звичайний минулий час лише назвав би події, а давньоминулий
      > створює ретроспективний шар і пояснює, чому теперішня оцінка інша.
    rubric:
      - criteria: "Форми"
        description: "Є щонайменше три коректні форми давньоминулого часу."
        points: 4
      - criteria: "Функція"
        description: "Форми справді показують передминулість, перерваність або зміну плану."
        points: 4
      - criteria: "Пояснення"
        description: "Автор пояснює вибір форм."
        points: 2

workbook:
  - type: group-sort
    title: "Рід і число"
    instruction: "Розсортуйте форми за узгодженням."
    groups:
      - name: "чоловічий рід"
        items:
          - "читав був"
          - "хотів був"
          - "прийшов був"
      - name: "жіночий рід"
        items:
          - "читала була"
          - "хотіла була"
          - "прийшла була"
      - name: "множина"
        items:
          - "читали були"
          - "домовилися були"
          - "бачили були"

  - type: select
    title: "Чи потрібен давньоминулий час?"
    instruction: "Оберіть усі доречні пояснення."
    items:
      - question: "У реченні «Я хотів був відповісти, але промовчав» форма доречна, бо:"
        min_correct: 2
        options:
          - text: "намір був нереалізований"
            correct: true
          - text: "пізніша дія змінила результат"
            correct: true
          - text: "будь-яке минуле потребує був"
            correct: false
          - text: "це майбутній час"
            correct: false
        explanation: "Форма підкреслює нереалізований намір."
      - question: "У реченні «Учора я купив хліб» давньоминулий час не потрібен, бо:"
        min_correct: 2
        options:
          - text: "немає другої минулої події, що переоцінює першу"
            correct: true
          - text: "немає перерваного наміру"
            correct: true
          - text: "слово учора забороняє минулий час"
            correct: false
          - text: "купив не має минулої форми"
            correct: false
        explanation: "Просте повідомлення не потребує спеціального ретроспективного шару."
      - question: "Форма «ми були читати» неправильна як давньоминулий час, бо:"
        min_correct: 2
        options:
          - text: "основне дієслово стоїть в інфінітиві"
            correct: true
          - text: "потрібна форма читали були"
            correct: true
          - text: "бути не може бути допоміжним дієсловом"
            correct: false
          - text: "множина не має давньоминулого часу"
            correct: false
        explanation: "Давньоминулий час складається з двох минулих форм."
      - question: "У формі «вона читала була» правильні пояснення такі:"
        min_correct: 2
        options:
          - text: "обидва компоненти мають жіночий рід"
            correct: true
          - text: "це складена форма минулого часу"
            correct: true
          - text: "була є інфінітивом"
            correct: false
          - text: "форма має множину"
            correct: false
        explanation: "Читала й була узгоджені з жіночим родом."
      - question: "У формі «вони бачили були» правильні пояснення такі:"
        min_correct: 2
        options:
          - text: "форма має множину"
            correct: true
          - text: "обидва компоненти стоять у минулому часі"
            correct: true
          - text: "це наказовий спосіб"
            correct: false
          - text: "потрібно замінити були на був"
            correct: false
        explanation: "Вони вимагає множини: бачили були."
      - question: "Форма «хотів був сказати» доречна, коли:"
        min_correct: 2
        options:
          - text: "намір був близький до здійснення"
            correct: true
          - text: "мовець підкреслює, що дія не відбулася"
            correct: true
          - text: "йдеться про регулярну звичку"
            correct: false
          - text: "потрібен майбутній час"
            correct: false
        explanation: "Це типовий контекст нереалізованого наміру."
      - question: "У реченні «Я поклав був документи, а потім переніс їх» форма потрібна, бо:"
        min_correct: 2
        options:
          - text: "перший результат було скасовано"
            correct: true
          - text: "пізніша дія змінила стан речей"
            correct: true
          - text: "будь-яке дієслово покласти завжди потребує був"
            correct: false
          - text: "це форма теперішнього часу"
            correct: false
        explanation: "Давньоминулий час підкреслює скасований результат."
      - question: "Зворотний порядок «був читав» у навчальній продукції:"
        min_correct: 2
        options:
          - text: "може бути стилістично маркованим"
            correct: true
          - text: "не має бути базовим шаблоном для B2"
            correct: true
          - text: "завжди є єдино правильною нормою"
            correct: false
          - text: "скасовує потребу в узгодженні"
            correct: false
        explanation: "Базовий навчальний порядок: читав був."

  - type: match-up
    title: "Ретроспективний уривок"
    instruction: "Поєднайте фрагмент із правильною формою."
    pairs:
      - left: "Я ___ цю кав'ярню іншою."
        right: "знав був"
