- type: select
  title: "Оберіть усі правильні пояснення"
  instruction: "Позначте всі твердження, які відповідають реченню."
  items:
    - question: "Речення: «Вона хотіла була запитати, та промовчала»."
      min_correct: 2
      options:
        - text: "Є нереалізований намір."
          correct: true
        - text: "Форма узгоджена з жіночим підметом."
          correct: true
        - text: "Йдеться про майбутній план."
          correct: false
        - text: "Треба замінити на інфінітив після була."
          correct: false
      explanation: "Хотіла була передає намір, який не став дією."
    - question: "Речення: «Вони прийшли були раніше»."
      min_correct: 2
      options:
        - text: "Форма множини узгоджена правильно."
          correct: true
        - text: "Речення може позначати давнішу минулу дію."
          correct: true
        - text: "Форма чоловічого роду обов'язкова."
          correct: false
        - text: "Це теперішній час."
          correct: false
      explanation: "Прийшли були узгоджується з вони."
    - question: "Речення: «Ми були читати лист»."
      min_correct: 2
      options:
        - text: "Це не нормативна форма давньоминулого часу."
          correct: true
        - text: "Треба минула форма основного дієслова."
          correct: true
        - text: "Інфінітив після були правильний."
          correct: false
        - text: "Речення вже має правильне узгодження."
          correct: false
      explanation: "Правильно: читали були, якщо форма справді потрібна."
    - question: "Речення: «До того як прийшли гості, вечеря стояла була на столі»."
      min_correct: 2
      options:
        - text: "Сполучник підтримує передминулість."
          correct: true
        - text: "Стояла була створює давніший часовий пласт."
          correct: true
        - text: "Речення описує дію після приходу гостей."
          correct: false
        - text: "Форма має бути тільки майбутньою."
          correct: false
      explanation: "Вечеря стояла до приходу гостей."
    - question: "Речення: «Я купив був хліб учора» без ширшого контексту."
      min_correct: 2
      options:
        - text: "Форма може бути стилістично зайвою."
          correct: true
        - text: "Звичайне купив часто природніше."
          correct: true
        - text: "Давньоминулий час тут завжди обов'язковий."
          correct: false
        - text: "Речення має підмет жіночого роду."
          correct: false
      explanation: "Без передминулості або скасування форма перевантажує текст."
    - question: "Речення: «Лист лежав був на столі, коли зайшла секретарка»."
      min_correct: 2
      options:
        - text: "Форма може показувати давніше тло."
          correct: true
        - text: "Лежав був узгоджено з чоловічим підметом."
          correct: true
        - text: "Речення має майбутній час."
          correct: false
        - text: "Потрібна форма лежали були, бо лист один."
          correct: false
      explanation: "Лист чоловічого роду; дія лежав був передує входу секретарки."
    - question: "Речення: «Скринька відкрилася була, але ключ зламався»."
      min_correct: 2
      options:
        - text: "Форма узгоджена з жіночим підметом."
          correct: true
        - text: "Є скасований або зупинений результат."
          correct: true
        - text: "Потрібна форма відкрився був."
          correct: false
        - text: "Речення описує майбутню дію."
          correct: false
      explanation: "Скринька відкрилася була, але подальша подія змінила результат."
    - question: "Речення: «До відкриття виставки куратор підготував був каталог»."
      min_correct: 2
      options:
        - text: "Дія підготовки передує відкриттю."
          correct: true
        - text: "Підготував був узгоджено з чоловічим підметом."
          correct: true
        - text: "Форма означає теперішню дію."
          correct: false
        - text: "У реченні обов'язково потрібна множина."
          correct: false
      explanation: "Каталог підготували раніше за опорну минулу подію."
    - question: "Речення: «Марія писала була спогад, але скоротила його»."
      min_correct: 2
      options:
        - text: "Писала була може показувати попередній процес."
          correct: true
        - text: "Жіночий підмет узгоджено з була."
          correct: true
        - text: "Правильна форма тільки писав був."
          correct: false
        - text: "Речення не має минулих дій."
          correct: false
      explanation: "Процес письма належить до давнішого шару."
    - question: "Речення: «Студенти підготували були тези до семінару»."
      min_correct: 2
      options:
        - text: "Форма множини правильна."
          correct: true
        - text: "Речення може бути частиною ретроспективної оповіді."
          correct: true
        - text: "Потрібно підготував був."
          correct: false
        - text: "Це наказовий спосіб."
          correct: false
      explanation: "Підготували були узгоджується з множиною."
    - question: "Речення: «Не кажи гоп, поки не перескочиш»."
      min_correct: 2
      options:
        - text: "Це прислів'я корисне як контраст до скасованого результату."
          correct: true
        - text: "У ньому немає давньоминулого часу."
          correct: true
        - text: "Форма перескочиш є давньоминулим часом."
          correct: false
        - text: "Прислів'я вимагає форми перескочив був."
          correct: false
      explanation: "Прислів'я показує ідею передчасного висновку без складеної форми."
    - question: "Речення: «Ми вже читали цей звіт раніше»."
      min_correct: 2
      options:
        - text: "Це нейтральна описова альтернатива."
          correct: true
        - text: "Давньоминулий час не завжди потрібен."
          correct: true
        - text: "Речення містить форму читали були."
          correct: false
        - text: "Речення граматично майбутнє."
          correct: false
      explanation: "Часові слова можуть передати порядок подій без складеної форми."

