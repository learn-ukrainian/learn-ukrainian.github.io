  - id: workbook-4
    type: essay-response
    title: "Редакторська примітка"
    instruction: "Напишіть 150-180 слів."
    prompt: >-
      Поясніть автору, чому в реченні «Ми були читати звіт» треба написати
      «Ми читали були звіт», і коли така форма справді доречна.
    min_words: 150
    model_answer: >-
      > [!model-answer]
      > Форма «ми були читати» не є давньоминулим часом, бо після були стоїть
      > інфінітив. Українська давньоминула форма складається з двох минулих форм:
      > основного дієслова й допоміжного бути. Тому граматично правильно: «ми
      > читали були звіт». Але цю форму варто вживати лише тоді, коли звіт належить
      > до давнішого шару минулого або коли пізніша подія змінила ситуацію:
      > «Ми читали були звіт, але після аудиту дані оновили». Якщо треба просто
      > сказати, що ми читали звіт учора, достатньо звичайного минулого часу.
    rubric:
      - criteria: "Граматика"
        description: "Пояснено дві минулі форми."
        points: 4
      - criteria: "Уживання"
        description: "Пояснено, коли форма доречна або зайва."
        points: 4
      - criteria: "Приклад"
        description: "Є природний приклад."
        points: 2
