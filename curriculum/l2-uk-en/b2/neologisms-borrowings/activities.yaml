version: '1.0'
module: neologisms-borrowings
level: b2
inline:
- type: match-up
  title: Тип мовного оновлення
  instruction: Поєднайте слово або модель із типом лексичного оновлення.
  pairs:
  - left: застосунок
    right: питомий словотвірний відповідник
  - left: дрон
    right: адаптоване запозичення
  - left: лайкати
    right: іншомовна основа з українським дієслівним суфіксом
  - left: хмара в ІТ
    right: нове термінологічне значення старого слова
  - left: дорожня карта
    right: калькована модель плану дій
  - left: стартап
    right: фахове запозичення бізнесової сфери
  - left: фідбек
    right: розмовно-професійне запозичення
  - left: кінцевий термін
    right: прозорий український відповідник до дедлайну
  - left: онлайн-спільнота
    right: нейтральна заміна для ком'юніті
  - left: загуглити
    right: цифровий розмовний неологізм
- type: fill-in
  title: Адаптація й відповідник
  instruction: Заповніть пропуски найточнішими словами.
  items:
  - sentence: "Слово ____ відмінюється: дрона, дроном, дрони."
    answer: дрон
    options:
    - дрон
    - селфі
    - онлайн
    - ноу-хау
    explanation: '"Дрон" адаптувався як відмінюваний іменник.'
  - sentence: "Дієслово ____ має український суфікс -ати."
    answer: лайкати
    options:
    - лайкати
    - фідбек
    - тренд
    - дедлайн
    explanation: '"Лайкати" поєднує іншомовну основу з українською дієслівною моделлю.'
  - sentence: "Буквальний переклад чужої моделі називають ____."
    answer: калькою
    options:
    - калькою
    - оказіоналізмом
    - архаїзмом
    - наголосом
    explanation: Калька відтворює структуру іншої мови українськими засобами.
  - sentence: "Слово, створене автором для одного художнього ефекту, часто є ____."
    answer: оказіоналізмом
    options:
    - оказіоналізмом
    - терміном
    - суржиком
    - цитатою
    explanation: Оказіоналізм може бути разовим авторським новотвором.
  - sentence: "Про входження нового слова до активного словника говорить ____."
    answer: лексикалізація
    options:
    - лексикалізація
    - пунктуація
    - рима
    - випадковість
    explanation: Лексикалізація означає закріплення одиниці в ужитку.
  - sentence: "У широкій інструкції слово івент часто краще замінити на ____."
    answer: захід
    options:
    - захід
    - лайк
    - бан
    - хештег
    explanation: '"Захід" прозоріше для різних читачів.'
  - sentence: "Мовна ____ не дорівнює забороні всіх запозичень."
    answer: стійкість
    options:
    - стійкість
    - випадковість
    - пауза
    - зниженість
    explanation: Стійкість підтримує усвідомлений вибір мовних засобів.
  - sentence: "Пуризм прагне замінювати надмірні іншомовні слова ____ відповідниками."
    answer: питомими
    options:
    - питомими
    - випадковими
    - чужими
    - цифровими
    explanation: Питомий відповідник спирається на власні ресурси мови.
  - sentence: "Непрозоре запозичення потребує ____ або заміни."
    answer: пояснення
    options:
    - пояснення
    - мовчання
    - наголосу
    - вигуку
    explanation: Аудиторія має розуміти термін.
  - sentence: "Редакторський вибір залежить від жанру, аудиторії та ____."
    answer: мети
    options:
    - мети
    - рими
    - тиші
    - погоди
    explanation: Мета визначає, залишити запозичення чи замінити.
- type: select
  title: Залишити чи замінити
  instruction: Позначте всі доречні рішення для ситуації.
  items:
  - question: Які слова доречні у внутрішньому чаті IT-команди?
    options:
    - text: дедлайн
      correct: true
    - text: реліз
      correct: true
    - text: кінцевий термін
      correct: true
    - text: високоповажне зібрання
      correct: false
    explanation: У командному чаті можливі і терміни, і прозорі відповідники; канцелярит недоречний.
  - question: Що варто змінити в офіційній інструкції для батьків?
    options:
    - text: замінити івент на захід
      correct: true
    - text: пояснити онбординг, якщо слово лишається
      correct: true
    - text: додати більше англіцизмів для престижу
      correct: false
    - text: обрати спільнота замість ком'юніті
      correct: true
    explanation: Для широкої аудиторії важлива прозорість.
  - question: Які ознаки показують, що запозичення адаптоване?
    options:
    - text: воно відмінюється
      correct: true
    - text: має українські словотвірні форми
      correct: true
    - text: ніколи не змінює форму
      correct: false
    - text: уживається у природних синтаксичних зв'язках
      correct: true
    explanation: Адаптація охоплює форму, граматику й уживання.
  - question: Що допомагає оцінити прозорість слова?
    options:
    - text: аудиторія тексту
      correct: true
    - text: наявність пояснення
      correct: true
    - text: кількість латинських літер у слові
      correct: false
    - text: сфера вживання
      correct: true
    explanation: Прозорість залежить від читача й контексту.
  - question: Які твердження про пуризм збалансовані?
    options:
    - text: він може підтримувати ясність
      correct: true
    - text: він завжди має забороняти всі запозичення
      correct: false
    - text: він може ігнорувати фахову точність у крайній формі
      correct: true
    - text: він пов'язаний із мовною стійкістю
      correct: true
    explanation: Пуризм корисний як інструмент, але небезпечний як автоматична заборона.
  - question: Коли слово стартап краще залишити?
    options:
    - text: коли йдеться про інноваційний бізнес
      correct: true
    - text: коли воно точніше за загальне нове підприємство
      correct: true
    - text: коли аудиторія не знає слова і пояснення немає
      correct: false
    - text: коли текст належить бізнесовому або технологічному середовищу
      correct: true
    explanation: Запозичення може бути найточнішим терміном у фаховій сфері.
  - question: Що відрізняє цифровий сленг від помилки?
    options:
    - text: він має групову функцію
      correct: true
    - text: він доречний у певному регістрі
      correct: true
    - text: він автоматично підходить до договору
      correct: false
    - text: його можна нейтралізувати для офіційного тексту
      correct: true
    explanation: Сленг є стилістичним ресурсом, а не універсальною нормою.
  - question: Які рішення підтримують мовну екологію?
    options:
    - text: добирати зрозумілий відповідник
      correct: true
    - text: пояснювати непрозорий термін
      correct: true
    - text: копіювати кожен англіцизм без потреби
      correct: false
    - text: перевіряти регістр і мету тексту
      correct: true
    explanation: Мовна екологія потребує точності, зрозумілості й доречності.
- type: error-correction
  title: Регістр і точність
  instruction: Виправте невдале запозичення або кальковану модель.
  items:
  - sentence: "У заяві просимо зашерити документ до вечора."
    error: зашерити
    answer: надіслати
    error_type: register
    options:
    - надіслати
    - лайкнути
    - забанити
    - запітчити
    explanation: Офіційна заява потребує нейтрального дієслова.
  - sentence: "У договорі написано: дедлайн по задачі - завтра."
    error: дедлайн по задачі
    answer: кінцевий термін виконання завдання
    error_type: register
    options:
    - кінцевий термін виконання завдання
    - сторис завдання
    - івент завдання
    - лайк завдання
    explanation: Договір потребує точного формулювання без професійного жаргону.
  - sentence: "Організатори анонсували ком'юніті івент для мешканців будинку."
    error: ком'юніті івент
    answer: зустріч спільноти
    error_type: register
    options:
    - зустріч спільноти
    - бан спільноти
    - пітч спільноти
    - стартап спільноти
    explanation: Для мешканців прозоріше написати "зустріч спільноти".
  - sentence: "У звіті команда зробила апдейт результатів."
    error: зробила апдейт
    answer: оновила
    error_type: register
    options:
    - оновила
    - залайкала
    - загуглила
    - затрендила
    explanation: У звіті природніше дієслово "оновила".
  - sentence: "Міністерство імплементувало нову форму заяви для всіх громадян."
    error: імплементувало
    answer: впровадило
    error_type: register
    options:
    - впровадило
    - запостило
    - забанило
    - заскролило
    explanation: Для широкої публіки "впровадило" зрозуміліше.
  - sentence: "У статті автор зробив висновок, що новий сервіс є мастхевом."
    error: мастхевом
    answer: необхідним інструментом
    error_type: register
    options:
    - необхідним інструментом
    - випадковим лайком
    - ком'юніті подією
    - сторисом
    explanation: Аналітична стаття потребує нейтрального відповідника.
  - sentence: "У документації написано: користувачі повинні залогінитися."
    error: залогінитися
    answer: увійти в обліковий запис
    error_type: register
    options:
    - увійти в обліковий запис
    - зробити мем
    - запітчити пароль
    - лайкнути форму
    explanation: У документації важлива прозора дія.
  - sentence: "Редактор пропонує запустити дорожню мапу змін."
    error: дорожню мапу
    answer: план змін
    error_type: phrase
    options:
    - план змін
    - список лайків
    - хмару змісту
    - бан змін
    explanation: У широкому тексті "план змін" зрозуміліший за кальковану модель.
- id: act-5
  type: essay-response
  title: Редакторський вибір
  prompt: >-
    Напишіть 150-180 слів про те, як редактор має працювати з новим словом:
    визначте тип слова, його адаптацію, прозорість, регістр, можливий
    відповідник і фінальне рішення для конкретного тексту.
  min_words: 150
  model_answer: |
    > [!model-answer]
    > Редактор не повинен автоматично вилучати або залишати нове слово. Спочатку треба визначити, що це: неологізм, запозичення, калька чи цифровий сленг. Наприклад, "дрон" уже адаптувався до української граматики, тому в технічному або медійному тексті його можна залишити. Натомість "ком'юніті івент" у повідомленні для мешканців краще замінити на "зустріч спільноти", бо аудиторія ширша, а мета тексту - швидко пояснити дію. Другий крок - перевірити прозорість: чи зрозуміє читач слово без додаткового пояснення. Третій - оцінити регістр. У командному чаті "дедлайн" природний, але в договорі точніше "кінцевий термін виконання завдання". Отже, відповідальне рішення поєднує мовну стійкість із комунікативною точністю.
  rubric:
  - criteria: Тип слова
    description: Визначено неологізм, запозичення, кальку або сленг.
    points: 3
  - criteria: Регістр
    description: Пояснено жанр, аудиторію і доречність.
    points: 3
  - criteria: Рішення
    description: Запропоновано залишити, пояснити або замінити слово.
    points: 3
  - criteria: Мова
    description: Текст зв'язний, аргументований і природний.
    points: 1
workbook:
- type: match-up
  title: Сфера і відповідник
  instruction: Поєднайте запозичення або модель із доречним нейтральним рішенням.
  pairs:
  - left: фідбек у шкільному листі
    right: відгук або зворотний зв'язок
  - left: івент у міській афіші
    right: захід
  - left: ком'юніті для мешканців
    right: спільнота
  - left: апдейт у звіті
    right: оновлення
  - left: юзер в інструкції
    right: користувач
  - left: таска в плані уроку
    right: завдання
  - left: мітинг у розкладі відділу
    right: нарада
  - left: воркшоп для широкої аудиторії
    right: майстерня або практикум
  - left: сторителінг у програмі курсу
    right: оповідна майстерність або розповідь
  - left: імплементувати у наказі
    right: впровадити
- type: fill-in
  title: Термінологічна майстерня
  instruction: Доберіть слово, яке найкраще завершує речення.
  items:
  - sentence: "Слово ____ доречне, коли йдеться про коротку презентацію ідеї."
    answer: пітч
    options:
    - пітч
    - бан
    - лайк
    - хмара
    explanation: Пітч є фаховим словом бізнесової комунікації.
  - sentence: "У тексті для широкої аудиторії онбординг потребує ____."
    answer: пояснення
    options:
    - пояснення
    - замовчування
    - рими
    - паузи
    explanation: Непрозорий термін не можна залишати без опори для читача.
  - sentence: "Слово ____ є прозорим відповідником до community."
    answer: спільнота
    options:
    - спільнота
    - лайк
    - сторис
    - тренд
    explanation: '"Спільнота" зрозуміла поза професійним жаргоном.'
  - sentence: "Слово ____ у значенні cloud є термінологічним переосмисленням."
    answer: хмара
    options:
    - хмара
    - калина
    - вікно
    - ключ
    explanation: Старе слово отримало спеціальне цифрове значення.
  - sentence: "Надмірне копіювання чужих моделей може створювати ____."
    answer: інтерференцію
    options:
    - інтерференцію
    - автентичність
    - виразність
    - пунктуацію
    explanation: Інтерференція виникає під впливом іншої мовної системи.
  - sentence: "Авторський разовий новотвір називають ____."
    answer: оказіоналізмом
    options:
    - оказіоналізмом
    - відповідником
    - договором
    - наголосом
    explanation: Оказіоналізм часто прив'язаний до конкретного тексту.
  - sentence: "Процес засвоєння іншомовного слова називають ____."
    answer: адаптацією
    options:
    - адаптацією
    - скороченням
    - замовчуванням
    - стилізацією
    explanation: Адаптація охоплює форму, вимову, граматику і стиль.
  - sentence: "Власні ресурси мови підтримують ____ відповідники."
    answer: питомі
    options:
    - питомі
    - випадкові
    - чужі
    - таємні
    explanation: Питомий відповідник створений українськими засобами.
  - sentence: "У соціальних мережах слово репостити має ____ регістр."
    answer: розмовно-цифровий
    options:
    - розмовно-цифровий
    - урочистий
    - архаїчний
    - канцелярський
    explanation: Це природне слово для цифрового повсякденного спілкування.
  - sentence: "У наказі краще писати не імплементувати, а ____."
    answer: впровадити
    options:
    - впровадити
    - залайкати
    - запостити
    - заскролити
    explanation: '"Впровадити" є прозорим адміністративним дієсловом.'
- type: select
  title: Редакторські критерії
  instruction: Оберіть усі критерії, які справді потрібні редакторові.
  items:
  - question: Що перевіряємо перед уживанням запозичення в новині?
    options:
    - text: зрозумілість для читача
      correct: true
    - text: точність терміна
      correct: true
    - text: бажання звучати модно
      correct: false
    - text: відповідність темі
      correct: true
    explanation: Новина має бути точною і доступною.
  - question: Коли цифровий сленг доречний у навчальному матеріалі?
    options:
    - text: коли він є предметом аналізу
      correct: true
    - text: коли подано нейтральний відповідник
      correct: true
    - text: коли він замінює всі пояснення
      correct: false
    - text: коли аудиторія його розуміє
      correct: true
    explanation: Сленг можна вивчати, але ним не слід закривати зміст.
  - question: Які слова краще для офіційного повідомлення школи?
    options:
    - text: кінцевий термін
      correct: true
    - text: захід
      correct: true
    - text: зашерити
      correct: false
    - text: надіслати
      correct: true
    explanation: Офіційний стиль потребує нейтральних і прозорих слів.
  - question: Що може бути перевагою питомого відповідника?
    options:
    - text: прозорість
      correct: true
    - text: відповідність нормі
      correct: true
    - text: автоматична фахова точність
      correct: false
    - text: краща зрозумілість для широкої аудиторії
      correct: true
