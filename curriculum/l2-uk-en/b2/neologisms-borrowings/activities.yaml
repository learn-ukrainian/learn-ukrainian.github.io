- id: wb-critical-borrowing
  type: critical-analysis
  title: Баланс у редакторській примітці
  target_text: >-
    У програмі курсу написано: "На воркшопі учасники запітчать ідею,
    отримають фідбек і зроблять апдейт плану". Текст призначений для
    старшокласників і батьків, частина яких не працює в IT або бізнесі.
  questions:
  - Які слова можуть бути непрозорими для цієї аудиторії?
  - Які відповідники збережуть зміст без зайвої модності?
  - Яке одне запозичення можна залишити, якщо його пояснити?
  model_answers:
  - Непрозорими можуть бути "воркшоп", "запітчать", "фідбек" і "апдейт".
  - Можна написати "на практикумі учасники коротко представлять ідею, отримають відгук і оновлять план".
  - '"Воркшоп" можна залишити як назву формату, якщо поряд подати "практична майстерня".'
  focus_points:
  - аудиторія
  - регістр
  - прозорість
  - точність відповідника
- id: wb-essay-borrowing
  type: essay-response
  title: Мовна стійкість без автоматичних заборон
  prompt: >-
    Напишіть 150-180 слів про те, як поєднати мовну стійкість із відкритістю
    до корисних запозичень. Використайте два приклади слів і поясніть
    редакторське рішення.
  min_words: 150
  model_answer: |
    > [!model-answer]
    > Мовна стійкість не означає закритість до всіх запозичень. Вона означає здатність обирати слово свідомо. Наприклад, "стартап" варто залишити в тексті про інноваційний бізнес, бо воно називає не просто нове підприємство, а специфічний тип проєкту з ризиком, масштабуванням і пошуком інвестицій. Якщо його замінити лише на "нове підприємство", зміст збідніє. Інша ситуація - "ком'юніті івент" у повідомленні для мешканців будинку. Тут доречніше "зустріч спільноти", бо текст має бути прозорим для всіх адресатів. Отже, редактор спочатку визначає сферу, аудиторію й мету, а потім вирішує: залишити термін, пояснити його або замінити питомим відповідником. Такий підхід підтримує і сучасність, і зрозумілість української мови.
  rubric:
  - criteria: Позиція
    description: Пояснено, що стійкість не дорівнює забороні.
    points: 3
  - criteria: Приклади
    description: Наведено щонайменше два слова з різними рішеннями.
    points: 3
  - criteria: Редакторський критерій
    description: Є аудиторія, мета, регістр або прозорість.
    points: 3
  - criteria: Мова
    description: Текст зв'язний і відповідає B2-рівню.
    points: 1
