version: '1.0'
module: kharchuvannia-i-kukhnia
level: b2
inline:
- type: select
  title: Інгредієнт і функція
  instruction: Виберіть речення, де інгредієнти описані не як список, а через роль у страві.
  items:
  - question: Де названо функцію інгредієнта?
    min_correct: 2
    options:
    - text: Квасоля додає страві поживності.
      correct: true
    - text: Кислинка врівноважує солодкість буряка.
      correct: true
    - text: У страві є квасоля, буряк, олія.
      correct: false
    - text: 'Продукти: буряк, квасоля, олія.'
      correct: false
    explanation: Функція пояснює, навіщо інгредієнт у страві.
  - question: Де правильно використано родовий після міри?
    min_correct: 2
    options:
    - text: пів склянки води
      correct: true
    - text: жменя зелені
      correct: true
    - text: двісті грам сир
      correct: false
    - text: ложка мед
      correct: false
    explanation: Після міри потрібний родовий відмінок.
  - question: Де орудний називає засіб дії?
    min_correct: 2
    options:
    - text: залити окропом
      correct: true
    - text: приправити перцем
      correct: true
    - text: салат із капусти
      correct: false
    - text: каша з пшона
      correct: false
    explanation: Орудний без прийменника часто називає інструмент або засіб.
  - question: Де речення має B2-уточнення?
    min_correct: 2
    options:
    - text: Додайте зелень, яку краще дрібно посікти перед подачею.
      correct: true
    - text: Замініть масло олією, якщо страва має бути пісною.
      correct: true
    - text: Додайте зелень.
      correct: false
    - text: Масло, олія, сіль.
      correct: false
    explanation: Підрядні частини додають умову або уточнення.
  - question: Де опис звучить гостинно й конкретно?
    min_correct: 2
    options:
    - text: У соусі є горіхи; можу подати його окремо.
      correct: true
    - text: Якщо ви не їсте молочного, замінимо сметану олією.
      correct: true
    - text: Та їжте, там майже немає горіхів.
      correct: false
    - text: У нас усі це їдять.
      correct: false
    explanation: Гостинність потребує точної інформації й вибору.
  - question: Де правильно обговорено кулінарну традицію?
    min_correct: 2
    options:
    - text: У моїй родині борщ готують із квасолею.
      correct: true
    - text: У різних регіонах начинка вареників може відрізнятися.
      correct: true
    - text: Справжній борщ буває тільки один.
      correct: false
    - text: Усі українці готують однаково.
      correct: false
    explanation: B2-розмова визнає власний досвід і варіативність.
  - question: Де процес описано послідовно?
    min_correct: 2
    options:
    - text: Коли вода закипить, додайте крупу.
      correct: true
    - text: Поки соус густіє, підготуйте зелень.
      correct: true
    - text: Додайте крупу вода закипить.
      correct: false
    - text: Соус, зелень, густіє, поки.
      correct: false
    explanation: Підрядні часу керують послідовністю дій.
  - question: Де реєстр точний для технологічної карти?
    min_correct: 2
    options:
    - text: 2 грами солі
      correct: true
    - text: 200 грамів борошна
      correct: true
    - text: щіпка того-сого
      correct: false
    - text: трошки на око
      correct: false
    explanation: Формальна інструкція потребує точних мір.
- type: group-sort
  title: Кухонні слова за функцією
  instruction: Розподіліть слова й фрази за комунікативною функцією.
  groups:
  - name: Інгредієнти
    items:
    - буряк
    - квасоля
    - сметана
    - пшоно
  - name: Міри
    items:
    - жменя
    - щіпка
    - склянка
    - грамів
  - name: Процеси
    items:
    - тушкувати
    - запікати
    - помішувати
    - приправити
  - name: Дієтичні потреби
    items:
    - алергія
    - непереносимість
    - пісна страва
    - без молочних продуктів
  - name: Культурне обговорення
    items:
    - регіональна традиція
    - родинний рецепт
    - святкова страва
    - варіативність
- type: fill-in
  title: Міра, процес, умова
  instruction: Заповніть пропуск граматично й змістово природним словом.
  items:
  - sentence: Додайте 200 грамів ____.
    answer: борошна
    options:
    - борошна
    - борошно
    - борошном
    - борошні
    explanation: Після кількості потрібний родовий відмінок.
  - sentence: Додайте жменю ____ перед подачею.
    answer: зелені
    options:
    - зелені
    - зелень
    - зеленню
    - зелений
    explanation: Після «жменю» потрібний родовий.
  - sentence: Залийте чайні листочки ____.
    answer: окропом
    options:
    - окропом
    - окропу
    - з окропом
    - окріп
    explanation: Орудний називає засіб дії.
  - sentence: Якщо страва має бути пісною, замініть масло ____.
    answer: олією
    options:
    - олією
    - олія
    - олії
    - з олією
    explanation: 'Модель: замінити що чим.'
  - sentence: ____ овочі, розігрійте пательню.
    answer: Нарізавши
    options:
    - Нарізавши
    - Нарізати
    - Нарізаний
    - Нарізають
    explanation: Дієприслівник доконаного виду показує попередню дію.
  - sentence: ____ соус, поступово додавайте молоко.
    answer: Помішуючи
    options:
    - Помішуючи
    - Помішати
    - Помішаний
    - Помішують
    explanation: Дієприслівник недоконаного виду показує супровідну дію.
  - sentence: Коли вода ____, додайте крупу.
    answer: закипить
    options:
    - закипить
    - закипіти
    - киплячи
    - кипіння
    explanation: Підрядна часу потребує дієслівної форми.
  - sentence: У мене алергія ____ горіхи.
    answer: на
    options:
    - на
    - у
    - з
    - для
    explanation: 'Українською природно: алергія на щось.'
  - sentence: Соус подайте окремо, ____ гості могли самі визначити гостроту.
    answer: щоб
    options:
    - щоб
    - бо
    - коли
    - який
    explanation: Підрядна мети вводиться «щоб».
  - sentence: Українська кухня - це не лише борщ, ____ сезонні й регіональні страви.
    answer: а й
    options:
    - а й
    - бо
    - коли
    - який
    explanation: Модель «не лише..., а й...» додає ширший погляд.
- type: error-correction
  title: Редагування рецепта
  instruction: Виправте граматичну або стилістичну помилку.
  items:
  - sentence: Додайте двісті грам сир.
    error: двісті грам сир
    correction: Додайте двісті грамів сиру.
    error_type: construction
    options:
    - Додайте двісті грамів сиру.
    - Додайте двісті грам сир.
    - Додайте двісті грамом сиру.
    - Додайте двісті сиру грам.
    explanation: Після кількості потрібна нормативна форма міри й родовий.
  - sentence: Залийте листочки з окропом.
    error: з окропом
    correction: Залийте листочки окропом.
    error_type: construction
    options:
    - Залийте листочки окропом.
    - Залийте листочки з окропом.
    - Залийте листочки в окропом.
    - Залийте листочки окропу.
    explanation: Окроп є засобом дії, тому потрібний орудний.
  - sentence: Нарізавши овочі, пательня має бути гарячою.
    error: пательня має
    correction: Нарізавши овочі, розігрійте пательню.
    error_type: construction
    options:
    - Нарізавши овочі, розігрійте пательню.
    - Нарізавши овочі, пательня має бути гарячою.
    - Овочі нарізавши, пательня гаряча.
    - Пательня, нарізавши овочі, має бути гарячою.
    explanation: Виконавець дієприслівникової й основної дії має збігатися.
  - sentence: Я не їм молочне, зробіть нормально.
    error: зробіть нормально
    correction: Я не їм молочних продуктів. Чи можна приготувати без сметани?
    error_type: register
    options:
    - Я не їм молочних продуктів. Чи можна приготувати без сметани?
    - Я не їм молочне, зробіть нормально.
    - Молочне погане, заберіть усе.
    - Дайте щось там без цього.
    explanation: Ввічливе прохання називає обмеження й конкретну дію.
  - sentence: У мене алергія з горіхами.
    error: з горіхами
    correction: У мене алергія на горіхи.
    error_type: construction
    options:
    - У мене алергія на горіхи.
    - У мене алергія з горіхами.
    - У мене алергія для горіхів.
    - У мене алергія горіхами.
    explanation: 'Нормативна модель: алергія на щось.'
  - sentence: Коли вода закипить додайте крупу.
    error: закипить додайте
    correction: Коли вода закипить, додайте крупу.
    error_type: construction
    options:
    - Коли вода закипить, додайте крупу.
    - Коли вода, закипить додайте крупу.
    - Коли вода закипить додайте, крупу.
    - Коли вода закипить додайте крупу.
    explanation: Підрядну часу перед головною відділяємо комою.
  - sentence: Справжній борщ буває тільки один.
    error: тільки один
    correction: У різних родинах борщ готують по-різному.
    error_type: register
    options:
    - У різних родинах борщ готують по-різному.
    - Справжній борщ буває тільки один.
    - Усі інші борщі неправильні.
    - Нормальний борщ лише мій.
    explanation: Культурну розмову краще будувати без категоричного стереотипу.
  - sentence: Соус подайте окремо бо гості могли самі визначити гостроту.
    error: бо гості могли
    correction: Соус подайте окремо, щоб гості могли самі визначити гостроту.
    error_type: construction
    options:
    - Соус подайте окремо, щоб гості могли самі визначити гостроту.
    - Соус подайте окремо бо гості могли самі визначити гостроту.
    - Соус подайте окремо, який гості могли самі визначити гостроту.
    - Соус подайте окремо коли гості могли самі визначити гостроту.
    explanation: Тут потрібна підрядна мети зі «щоб».
- type: select
  title: Ситуація і формулювання
  instruction: Виберіть природне речення для кожної кулінарної ситуації.
  items:
  - question: Потрібна точна міра для технологічної карти. Яке формулювання доречне?
    min_correct: 2
    options:
    - text: Додайте 2 грами солі.
      correct: true
    - text: Додайте 200 грамів борошна.
      correct: true
    - text: Киньте трошки чогось солоного.
      correct: false
    - text: Сіль якось додати.
      correct: false
    explanation: Формальна інструкція потребує точної міри.
  - question: Гість має алергію. Яке речення точне й безпечне?
    min_correct: 2
    options:
    - text: У мене алергія на горіхи.
      correct: true
    - text: Я не можу їсти страви з горіхами.
      correct: true
    - text: Горіхи мені не зовсім.
      correct: false
    - text: Та можна трохи горіхів.
      correct: false
    explanation: Дієтичне обмеження треба назвати прямо, без розмитих натяків.
  - question: Господар пропонує безмолочний варіант. Що звучить гостинно?
    min_correct: 2
    options:
    - text: Ми можемо замінити сметану олією.
      correct: true
    - text: Соус подамо окремо, щоб ви могли обрати варіант.
      correct: true
    - text: Без сметани це не страва.
      correct: false
    - text: Не знаю, їжте як є.
      correct: false
    explanation: Гостинність на B2 означає конкретну альтернативу.
  - question: Потрібна підрядна мети в рецепті. Який варіант правильний?
    min_correct: 2
    options:
    - text: Подайте соус окремо, щоб гості могли обрати гостроту.
      correct: true
    - text: Приготуйте мʼякший варіант, щоб страва підійшла дітям.
      correct: true
    - text: Подайте соус окремо, який гості могли обрати гостроту.
      correct: false
    - text: Подайте соус окремо гості обрати гостроту.
      correct: false
    explanation: Мета дії вводиться сполучником «щоб».
  - question: Потрібно уникнути категоричного стереотипу про кухню. Яке речення краще?
    min_correct: 2
    options:
    - text: У моїй родині цю страву готують саме так.
      correct: true
    - text: У різних регіонах начинка може відрізнятися.
      correct: true
    - text: Усі українці готують однаково.
      correct: false
    - text: Інші рецепти неправильні.
      correct: false
    explanation: Культурну розмову краще будувати через власний досвід і варіативність.
  - question: Потрібна підрядна часу в рецепті. Які речення правильні?
    min_correct: 2
    options:
    - text: Коли вода закипить, додайте крупу.
      correct: true
    - text: Поки соус густіє, підготуйте зелень.
      correct: true
    - text: Додайте крупу вода закипить.
      correct: false
    - text: Соус густіє поки зелень.
      correct: false
    explanation: Підрядні часу керують послідовністю дій.
  - question: Потрібно назвати засіб дії. Які формулювання природні?
    min_correct: 2
    options:
    - text: Залийте листочки окропом.
      correct: true
    - text: Приправте страву перцем.
      correct: true
    - text: Залийте листочки з окропом.
      correct: false
    - text: Приправте страву із перцем як засіб.
      correct: false
    explanation: Орудний без прийменника часто називає інструмент або засіб.
  - question: Потрібно назвати склад страви. Які фрази правильні?
    min_correct: 2
    options:
    - text: салат із капусти, яблук і горіхів
      correct: true
    - text: каша з пшона
      correct: true
    - text: салат з капуста
      correct: false
    - text: каша пшоно без форми
      correct: false
    explanation: Склад страви часто виражається родовим після прийменника.
workbook:
- id: workbook-reading-food-blog
  type: reading
  title: 'Читання: рецепт із коментарем'
  instruction: Прочитайте уривок і визначте, як лексика їжі працює із синтаксисом.
  source: Навчальний текст для модуля B2.
  text: 'Для салату, який добре смакує взимку, запечіть буряк, відваріть квасолю й підготуйте кисло-солодку
    заправку з олії, гірчиці та яблучного оцту. Коли буряк охолоне, наріжте його кубиками, додайте квасолю
    й зелень, а соус подайте окремо, щоб гості могли самі визначити інтенсивність смаку. Якщо хтось не
    їсть гірчиці, замініть її лимонним соком.

    '
  tasks:
  - Знайдіть підрядну означальну частину.
  - Випишіть дві форми родового відмінка після прийменника або міри.
  - Поясніть, чому «щоб гості могли...» є підрядною мети.
  - Знайдіть умову для заміни інгредієнта.
  - Перепишіть одну інструкцію у формальнішому стилі.
- type: error-correction
  title: Кухонний редактор
  instruction: Виправте помилки в рецепті або гостинній ситуації.
  items:
  - sentence: Додайте пів склянка молоко.
    error: пів склянка молоко
    correction: Додайте пів склянки молока.
    error_type: construction
    options:
    - Додайте пів склянки молока.
    - Додайте пів склянка молоко.
    - Додайте пів склянкою молока.
    - Додайте пів молоко склянки.
    explanation: Міра вимагає родового відмінка.
  - sentence: Приправте суп з перцем.
    error: з перцем
    correction: Приправте суп перцем.
    error_type: construction
    options:
    - Приправте суп перцем.
    - Приправте суп з перцем.
    - Приправте суп для перцю.
    - Приправте суп перцю.
    explanation: Спеція як засіб дії стоїть в орудному.
  - sentence: Помішуючи соус, молоко додається поступово.
    error: молоко додається
    correction: Помішуючи соус, поступово додавайте молоко.
    error_type: construction
    options:
    - Помішуючи соус, поступово додавайте молоко.
    - Помішуючи соус, молоко додається поступово.
    - Соус помішуючи, молоко додається.
    - Молоко, помішуючи соус, додається.
    explanation: Виконавець додаткової й основної дії має збігатися.
  - sentence: Якщо ви не їсте м'ясо ми приготуємо з грибами.
    error: м'ясо ми
    correction: Якщо ви не їсте м'яса, ми приготуємо з грибами.
    error_type: construction
    options:
    - Якщо ви не їсте м'яса, ми приготуємо з грибами.
    - Якщо ви не їсте м'ясо ми приготуємо з грибами.
    - Якщо ви, не їсте м'яса ми приготуємо з грибами.
    - Якщо ви не їсте м'яса ми, приготуємо з грибами.
