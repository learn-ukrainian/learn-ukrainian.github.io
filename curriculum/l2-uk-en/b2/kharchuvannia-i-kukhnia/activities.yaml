version: '1.0'
module: kharchuvannia-i-kukhnia
level: b2
inline: []
workbook:
  - type: critical-analysis
    id: kitchen-reading-brief
    title: "Аналіз тексту: родинний рецепт"
    instruction: Прочитай текст і проаналізуй граматику кулінарного опису.
    target_text: "У нашій родині борщ варять повільно: спершу готують бурякову основу, потім додають капусту, квасолю й картоплю, а наприкінці, коли страва вже має глибокий колір, кладуть зелень і дають їй настоятися. Нарізавши цибулю, бабуся обсмажує її на олії, заливає овочі окропом і пояснює, що поспіх псує смак. Якщо гості не їдять м'яса, вона варить пісний варіант із квасолі й сушених грибів; якщо потрібна ситніша страва, додає трохи м'яса й подає борщ зі сметаною."
    questions:
      - Випиши два приклади родового відмінка, які називають склад страви.
      - Знайди орудний відмінок, що називає засіб дії.
      - Поясни, чому дієприслівник нарізавши ужито правильно.
      - Визнач підрядну частину часу.
      - Поясни, як текст поєднує рецепт і культурний спогад.
    model_answers:
      - "Приклади складу: із квасолі, із сушених грибів; також можна взяти борщ зі сметаною як поєднання страви з додатком."
      - "Орудний відмінок засобу: окропом у фразі заливає овочі окропом."
      - "Нарізавши ужито правильно, бо та сама особа нарізає цибулю й обсмажує її."
      - "Підрядна часу: коли страва вже має глибокий колір."
      - "Текст називає конкретні кроки приготування, але водночас показує родинну пам'ять через бабусин спосіб пояснювати смак."
    focus_points:
      - родовий матеріалу
      - орудний засобу
      - дієприслівниковий зворот
      - культурний контекст

  - type: select
    title: "Вибір граматичної моделі"
    instruction: Обери всі правильні варіанти.
    items:
      - question: Які фрази правильно описують склад страви?
        min_correct: 3
        options:
          - text: "пиріг із вишень"
            correct: true
          - text: "соус із печених томатів"
            correct: true
          - text: "каша з гречка"
            correct: false
          - text: "салат із молодої капусти"
            correct: true
      - question: Де орудний відмінок називає засіб дії?
        min_correct: 3
        options:
          - text: "залити окропом"
            correct: true
          - text: "перемішати вінчиком"
            correct: true
          - text: "пиріг із сиром"
            correct: false
          - text: "накрити кришкою"
            correct: true
      - question: Які форми кількості нормативні для нейтрального письма?
        min_correct: 3
        options:
          - text: "двісті грамів сиру"
            correct: true
          - text: "п'ять грамів кориці"
            correct: true
          - text: "триста грам борошна"
            correct: false
          - text: "жменя зелені"
            correct: true
      - question: Де дієприслівниковий зворот має спільного виконавця?
        min_correct: 3
        options:
          - text: "Нарізавши зелень, додайте її наприкінці."
            correct: true
          - text: "Стежачи за температурою, пекарка спекла пиріг."
            correct: true
          - text: "Почистивши картоплю, вода має закипіти."
            correct: false
          - text: "Змішавши соус, подавайте страву теплою."
            correct: true
      - question: Які формули звучать як відповідальна порада про раціон?
        min_correct: 3
        options:
          - text: "варто обмежити кількість цукру"
            correct: true
          - text: "краще замінити частину олії легшим соусом"
            correct: true
          - text: "ця страва лікує всі хвороби"
            correct: false
          - text: "якщо є медичні обмеження, порадьтеся з фахівцем"
            correct: true
      - question: Де правильно узгоджено прикметник у родовому відмінку?
        min_correct: 3
        options:
          - text: "із молодої капусти"
            correct: true
          - text: "з печених томатів"
            correct: true
          - text: "із свіжі огірки"
            correct: false
          - text: "без білого цукру"
            correct: true
      - question: Які вислови уникають колоніального спрощення кухні?
        min_correct: 3
        options:
          - text: "борщ має родинні й регіональні варіанти"
            correct: true
          - text: "українська кухня - це тільки борщ і вареники"
            correct: false
          - text: "регіональний опис має називати продукт і спосіб приготування"
            correct: true
          - text: "сезонність впливає на вибір продуктів"
            correct: true
      - question: Які фрази природні для рецепта?
        min_correct: 3
        options:
          - text: "додайте сіль за смаком"
            correct: true
          - text: "цибуля нарізається кубиками"
            correct: false
          - text: "тушкуйте на повільному вогні"
            correct: true
          - text: "посипте зеленню"
            correct: true

  - type: fill-in
    title: "Відмінки інгредієнтів"
    instruction: Заповни пропуск правильною формою.
    items:
      - sentence: "Пиріг із ____ подають теплим."
        answer: вишень
        options: [вишень, вишні, вишнями, вишня]
        explanation: Після із для складу потрібний родовий відмінок.
      - sentence: "Додайте двісті ____ кисломолочного сиру."
        answer: грамів
        options: [грамів, грам, грамами, грами]
        explanation: У нейтральному письмі нормативна форма грамів.
      - sentence: "Салат зі ____ огірків має свіжий смак."
        answer: свіжих
        options: [свіжих, свіжі, свіжими, свіжа]
        explanation: Прикметник узгоджується з іменником у родовому множини.
      - sentence: "Чайні листочки заливають ____."
        answer: окропом
        options: [окропом, з окропом, окропу, окріп]
        explanation: Засіб дії передає орудний без прийменника.
      - sentence: "Тушкуйте овочі, постійно ____."
        answer: помішуючи
        options: [помішуючи, помішавши, помішали, помішаний]
        explanation: Одночасну фонову дію передає дієприслівник недоконаного виду.
      - sentence: "____ цибулю, обсмажте її на олії."
        answer: Нарізавши
        options: [Нарізавши, Нарізаючи, Нарізаний, Нарізка]
        explanation: Попередню завершену дію передає дієприслівник доконаного виду.
      - sentence: "Каструлю накрийте ____."
        answer: кришкою
        options: [кришкою, з кришкою, кришка, кришки]
        explanation: Інструмент або засіб дії стоїть в орудному.
      - sentence: "У страві мало ____ і багато зелені."
        answer: солі
        options: [солі, сіль, сіллю, солями]
        explanation: Після мало потрібний родовий відмінок.
      - sentence: "Якщо страва вже містить багато олії, соус краще зробити ____."
        answer: легшим
        options: [легшим, легший, легкого, легко]
        explanation: Орудний у складеному присудку передає ознаку результату.
      - sentence: "Кутю готують із пшениці, маку, ____ й горіхів."
        answer: меду
        options: [меду, мед, медом, меди]
        explanation: Перелік після із тримає родовий відмінок.
      - sentence: "Збалансований раціон має містити джерело ____."
        answer: білка
        options: [білка, білок, білком, білки]
        explanation: Після джерело потрібний родовий відмінок.
      - sentence: "Додайте ____ зелені перед подаванням."
        answer: жменю
        options: [жменю, жменя, жменею, жмені]
        explanation: Додаємо що? жменю; після міри зелень стоїть у родовому.

  - type: error-correction
    title: "Редагування кулінарних речень"
    instruction: Знайди помилковий фрагмент і вибери природний варіант.
    items:
      - sentence: "Залийте чайні листочки з окропом."
        error: "з окропом"
        correction: "окропом"
        error_type: phrase
        options:
          - "окропом"
          - "до окропу"
          - "на окропі"
          - "окріп"
        explanation: Засіб дії передає орудний без прийменника.
      - sentence: "Додайте двісті грам сиру."
        error: "двісті грам"
        correction: "двісті грамів"
        error_type: phrase
        options:
          - "двісті грамів"
          - "двісті грамами"
          - "двісті грама"
          - "двісті грамом"
        explanation: Нормативна форма родового множини - грамів.
      - sentence: "Стежачи за температурою, пиріг добре спікся."
        error: "пиріг добре спікся"
        correction: "пекарка добре спекла пиріг"
        error_type: construction
        options:
          - "пекарка добре спекла пиріг"
          - "пиріг добре стежив"
          - "пиріг добре спечений температурою"
          - "температура спекла пиріг"
        explanation: Дієприслівниковий зворот потребує спільного виконавця.
      - sentence: "Соус із свіжі огірки подають холодним."
        error: "із свіжі огірки"
        correction: "зі свіжих огірків"
        error_type: phrase
        options:
          - "зі свіжих огірків"
          - "із свіжими огірки"
          - "із свіжі огірків"
          - "зі свіжими огірків"
        explanation: Після з/із потрібний родовий відмінок усього словосполучення.
      - sentence: "Цибуля нарізається кубиками й додається до соусу."
        error: "нарізається кубиками й додається"
        correction: "наріжте кубиками й додайте"
        error_type: register
        options:
          - "наріжте кубиками й додайте"
          - "нарізується кубиками й додаватиметься"
          - "була нарізувана кубиками й додавана"
          - "є нарізана й є додана"
        explanation: Для рецепта природніші активні інструкції.
      - sentence: "Після смаження додайте зелень і сметана."
        error: "сметана"
        correction: "сметану"
        error_type: word
        options:
          - "сметану"
          - "сметаною"
          - "сметани"
          - "сметані"
        explanation: Додайте що? сметану.
      - sentence: "Салат має багато клітковина."
        error: "клітковина"
        correction: "клітковини"
        error_type: word
        options:
          - "клітковини"
          - "клітковиною"
          - "клітковину"
          - "клітковині"
        explanation: Після багато потрібний родовий відмінок.
      - sentence: "Почистивши картоплю, вода має закипіти."
        error: "вода має закипіти"
        correction: "покладіть її в холодну воду"
        error_type: construction
        options:
          - "покладіть її в холодну воду"
          - "вода почистить картоплю"
          - "картопля має воду"
          - "закипіла вода почистивши"
        explanation: Треба зберегти спільного виконавця дії.
      - sentence: "Кутя з пшениця, мак і мед."
        error: "пшениця, мак і мед"
        correction: "пшениці, маку й меду"
        error_type: phrase
        options:
          - "пшениці, маку й меду"
          - "пшеницею, маком і медом"
          - "пшениця, маку й мед"
          - "пшениці, мак і меду"
        explanation: Після з усі компоненти складу переходять у родовий.
      - sentence: "Ця каша лікує всі проблеми зі здоров'ям."
        error: "лікує всі проблеми"
        correction: "може бути частиною збалансованого раціону"
        error_type: register
        options:
          - "може бути частиною збалансованого раціону"
          - "гарантує ідеальне здоров'я"
          - "скасовує потребу в лікарях"
          - "є єдиним способом лікування"
        explanation: Поради щодо харчування не мають обіцяти універсального лікування.

  - type: match-up
    title: "Функція і мовна форма"
    instruction: Зістав мовну функцію з природним прикладом.
    pairs:
      - left: "Склад страви"
        right: "пиріг із вишень"
      - left: "Засіб дії"
        right: "залити окропом"
      - left: "Інструмент"
        right: "перемішати вінчиком"
      - left: "Попередня дія"
        right: "нарізавши цибулю"
      - left: "Одночасна дія"
        right: "постійно помішуючи"
      - left: "Міра"
        right: "жменя зелені"
      - left: "Нормативна вага"
        right: "двісті грамів сиру"
      - left: "Відповідальна порада"
        right: "варто обмежити кількість цукру"
      - left: "Культурна конкретика"
        right: "кутя з пшениці, маку й меду"
      - left: "Регістр рецепта"
        right: "додайте сіль за смаком"
      - left: "Підрядна мети"
        right: "щоб смак став виразнішим"
      - left: "Часова межа"
        right: "доки квасоля не стане м'якою"

  - type: true-false
    title: "Норма й стиль у рецептах"
    instruction: Визнач, чи твердження правильне.
    items:
      - statement: "У фразі залити окропом слово окропом стоїть в орудному відмінку."
        correct: true
        explanation: Це засіб дії.
      - statement: "Після слів багато й мало іменник зазвичай стоїть у називному відмінку."
        correct: false
        explanation: "Потрібний родовий відмінок: багато зелені, мало солі."
      - statement: "Дієприслівниковий зворот має стосуватися того самого виконавця, що й головна дія."
        correct: true
        explanation: Інакше виникає граматична двозначність або помилка.
      - statement: "Форма двісті грамів є нормативною для нейтрального письма."
        correct: true
        explanation: Саме така форма відповідає літературній нормі.
      - statement: "Рецепт звучить природніше, якщо всюди писати цибуля нарізається, соус додається."
        correct: false
        explanation: Це калькована пасивність; краще активні інструкції.
      - statement: "Культурний опис кухні має право називати регіональні варіанти страв."
        correct: true
        explanation: Регіональність робить опис точнішим.
      - statement: "У здоровому харчуванні безпечно обіцяти, що одна страва лікує всі хвороби."
        correct: false
        explanation: Це перебільшення, а не відповідальна порада.
      - statement: "У фразі салат зі свіжих огірків прикметник узгоджений правильно."
        correct: true
        explanation: Свіжих огірків - родовий множини.
      - statement: "Двоє ножиць можливе, бо ножиці мають тільки форму множини."
        correct: true
        explanation: Це один із контекстів для збірного числівника.
      - statement: "Слово узвар у тексті українською краще замінити описом напій із сухофруктів і не вживати назву."
        correct: false
        explanation: Назву варто зберегти й за потреби пояснити склад.

  - type: fill-in
    title: "Послідовність рецепта"
    instruction: Добери форму, яка найкраще передає порядок або межу дії.
    items:
      - sentence: "____ духовку, поставте форму на середній рівень."
        answer: Розігрівши
        options: [Розігрівши, Розігріваючи, Розігріта, Розігрів]
        explanation: Спочатку завершена дія, потім наступна дія.
      - sentence: "Варіть квасолю, ____ вона не стане м'якою."
        answer: доки
        options: [доки, щоб, хоч, бо]
        explanation: Доки вводить часову межу.
      - sentence: "Додайте лимонний сік, ____ смак став виразнішим."
        answer: щоб
        options: [щоб, коли, хоч, де]
        explanation: Щоб називає мету.
      - sentence: "Обсмажуйте цибулю, ____ дерев'яною ложкою."
        answer: помішуючи
        options: [помішуючи, помішавши, помішаний, помішали]
        explanation: Дії відбуваються одночасно.
      - sentence: "____ соус загусне, зніміть пательню з вогню."
        answer: Коли
        options: [Коли, Хоч, Щоб, Бо]
        explanation: Коли вводить часову умову.
      - sentence: "____ тісто, залиште його на двадцять хвилин."
        answer: Замісивши
        options: [Замісивши, Замішуючи, Замішаний, Заміс]
        explanation: Завершена дія передує наступній.
      - sentence: "Додайте трохи води, ____ соус не пригорів."
        answer: щоб
        options: [щоб, хоча, коли, де]
        explanation: Тут мета - уникнути пригорання.
      - sentence: "Подавайте страву, ____ зелень лишається свіжою."
        answer: доки
        options: [доки, бо, хоча, немов]
        explanation: Доки задає часову межу якості.
      - sentence: "____ овочі на олії, не пересмажуйте цибулю."
        answer: Обсмажуючи
        options: [Обсмажуючи, Обсмаживши, Обсмажений, Обсмажили]
        explanation: Йдеться про одночасне контролювання процесу.
      - sentence: "____ гриби, додайте їх до квасолі."
        answer: Відваривши
        options: [Відваривши, Відварюючи, Відварений, Відвар]
        explanation: Спочатку гриби відварили, потім додали.

  - type: select
    title: "Культурний і здоровий регістр"
    instruction: Обери всі точні й відповідальні формулювання.
    items:
      - question: Які речення доречно писати в тексті про українську кухню?
