- id: workbook-essay-food-culture
  type: essay-response
  title: Опис страви й ситуації гостинності
  instruction: Напишіть 180-220 слів про страву, рецепт або вечерю з гостями.
  prompt: Опишіть інгредієнти, два кроки приготування, одну можливу дієтичну потребу й короткий культурний
    коментар. Використайте підрядну часу, підрядну умови й підрядну мети.
  min_words: 180
  model_answer: Сильна відповідь не є списком продуктів. Вона пояснює функцію інгредієнтів, граматично
    правильно називає кількість і склад, показує послідовність дій через підрядні часу або дієприслівникові
    звороти, а також формулює гостинну пропозицію для людини з дієтичним обмеженням. Культурний коментар
    має визнавати варіативність рецептів і не стверджувати, що існує лише один правильний спосіб приготування.
  peer_review_guidelines: Перевірте родовий після мір, орудний для інструмента або засобу, природність
    прохання щодо обмежень і наявність трьох підрядних моделей.
