  - type: essay-response
    id: kitchen-culture-essay
    title: "Письмо: рецепт як культурний текст"
    instruction: Напиши розгорнутий текст українською.
    prompt: "Опиши страву або харчову звичку як B2-текст: назви склад, процес приготування, культурний контекст і одну відповідальну пораду щодо раціону. Обов'язково використай родовий відмінок для інгредієнтів, орудний для інструмента або засобу, два дієприслівникові звороти й одну підрядну частину часу або мети."
    min_words: 180
    model_answer: "У моїй родині часто готують пісний борщ із квасолі, буряка, капусти й сушених грибів. Нарізавши овочі, ми обсмажуємо цибулю на олії, заливаємо основу окропом і варимо її, доки буряк не дасть глибокого кольору. Потім додаємо квасолю, трохи грибів і жменю зелені. Подаючи борщ, не варто казати, що існує лише один правильний рецепт: у кожній родині є свій порядок дій, своя міра кислоти й свій спосіб подавання. Така страва добре показує зв'язок кухні з пам'яттю, але в сучасному раціоні важливо звертати увагу й на баланс. Якщо обід уже ситний, сметани можна додати менше, а поруч подати більше овочів або цільнозерновий хліб. Так текст про їжу стає не рекламою дива, а відповідальною розмовою про смак, звичку й здоров'я."
    rubric:
      - criteria: "Граматика"
        description: "Є правильний родовий для інгредієнтів, орудний для засобу або інструмента, дієприслівникові звороти зі спільним виконавцем."
        points: 4
      - criteria: "Зміст"
        description: "Текст пояснює склад, процес, культурний контекст і пораду щодо раціону."
        points: 3
      - criteria: "Стиль"
        description: "Регістр відповідальний, без перебільшень і калькованої пасивності."
        points: 3
