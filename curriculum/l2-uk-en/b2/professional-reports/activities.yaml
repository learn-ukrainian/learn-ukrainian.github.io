version: '1.0'
module: professional-reports
level: b2
inline:
  - type: match-up
    title: Тип звіту і функція
    instruction: Поєднайте елемент звіту з його функцією.
    pairs:
      - left: інформаційний звіт
        right: фіксує факти, події й виконані дії
      - left: аналітичний звіт
        right: пояснює причини, наслідки і значення даних
      - left: стратегічний звіт
        right: пов'язує дані з майбутніми рішеннями
      - left: Executive Summary
        right: стискає ключові висновки для швидкого читання
      - left: вступ
        right: пояснює мету, період і джерела даних
      - left: висновок
        right: узагальнює значення проаналізованих фактів
      - left: рекомендація
        right: пропонує дію на основі доказів
      - left: показник
        right: вимірювана величина для аналізу
      - left: методологія
        right: пояснює, як зібрано або обчислено дані
      - left: цільова аудиторія
        right: визначає глибину і порядок подачі матеріалу

  - type: fill-in
    title: Дані і тренди
    instruction: Заповніть пропуски словами для опису графічних даних.
    items:
      - sentence: "Кількість заявок ____ з 120 до 156."
        answer: "зросла"
        options: [зросла, занепала, застигла, зникла]
        explanation: З 120 до 156 - це збільшення.
      - sentence: "Частка повторних клієнтів ____ на 4 процентні пункти."
        answer: "зменшилася"
        options: [зменшилася, збільшилася, розчинилася, подвоїлася]
        explanation: Процентні пункти описують зміну частки.
      - sentence: "Показник залишався ____ у межах 10-11 одиниць."
        answer: "стабільним"
        options: [стабільним, випадковим, прихованим, зайвим]
        explanation: Малі коливання можна описати як стабільність.
      - sentence: "Витрати на доставку ____ на 18 відсотків."
        answer: "зросли"
        options: [зросли, зникли, застигли, заплуталися]
        explanation: Витрати стали більшими.
      - sentence: "Кількість скарг ____ після оновлення інструкції."
        answer: "скоротилася"
        options: [скоротилася, розширилася, подорожчала, описалася]
        explanation: Менша кількість скарг - скорочення.
      - sentence: "____ даних потребує пояснення методології."
        answer: "Інтерпретація"
        options: [Інтерпретація, Випадковість, Привітання, Запрошення]
        explanation: Інтерпретація пояснює, що означають дані.
      - sentence: "Рекомендація має ____ на попередній аналіз."
        answer: "спиратися"
        options: [спиратися, падати, ховатися, звучати]
        explanation: Рішення має мати доказову основу.
      - sentence: "У звіті важливо розрізняти відсотки і ____ пункти."
        answer: "процентні"
        options: [процентні, пунктуаційні, приватні, приблизні]
        explanation: Зміна частки вимірюється процентними пунктами.
      - sentence: "Таблиця показує ____ продажів за квартал."
        answer: "динаміку"
        options: [динаміку, декоративність, думку, дистанцію]
        explanation: Динаміка описує зміну показника в часі.
      - sentence: "Після опису тренду треба подати ____ або обережний висновок."
        answer: "інтерпретацію"
        options: [інтерпретацію, привітання, вкладення, підпис]
        explanation: Опис даних сам по собі ще не пояснює значення.

  - id: act-3
    type: critical-analysis
    title: SWOT і рішення
    instruction: Проаналізуйте фрагмент стратегічного звіту.
    target_text: "Проєкт має сильну команду викладачів і стабільний попит від корпоративних клієнтів. Водночас технічна підтримка обмежена, а фінансування залежить від одного грантового джерела. Рекомендовано підготувати пакет для компаній і закласти резервний технічний супровід."
    questions:
      - Які сильні сторони названо у фрагменті?
      - Яку слабку сторону треба контролювати процедурно?
      - Яка загроза пов'язана з фінансуванням?
      - Яка рекомендація відповідає можливості на ринку?
      - Чому ця рекомендація не є просто побажанням?
    model_answers:
      - Сильні сторони - досвідчена команда викладачів і стабільний попит.
      - Слабка сторона - обмежена технічна підтримка.
      - Загроза - залежність від одного грантового джерела.
      - Можливості відповідає пакет для корпоративних клієнтів.
      - Рекомендація спирається на конкретний попит і називає дію.

  - type: select
    title: Аудиторія і подача
    instruction: Оберіть найкраще рішення для звіту.
    items:
      - question: Який варіант найкраще підходить для ради директорів?
        options:
          - text: Маржа знизилася на 3 процентні пункти; рекомендовано переглянути логістику.
            correct: true
          - text: Було багато цікавих чисел про доставку.
            correct: false
          - text: Людям не сподобалася ситуація.
            correct: false
          - text: Усе складно і потребує уваги.
            correct: false
        explanation: Керівна аудиторія потребує впливу і рішення.
      - question: Який варіант найкраще відділяє опис від інтерпретації?
        options:
          - text: Продажі зросли на 12%; це може свідчити про посилення попиту.
            correct: true
          - text: Попит точно вибухнув, бо продажі кращі.
            correct: false
          - text: Продажі були приємні.
            correct: false
          - text: Діаграма доводить усе.
            correct: false
        explanation: Опис і обережна інтерпретація розділені.
      - question: Що має містити рекомендація?
        options:
          - text: Дані, причину і дію.
            correct: true
          - text: Лише загальне побажання.
            correct: false
          - text: Тільки емоційну оцінку.
            correct: false
          - text: Список усіх чисел без висновку.
            correct: false
        explanation: Рекомендація має бути доказовою.
      - question: Який блок належить до PESTEL?
        options:
          - text: Правові вимоги до персональних даних.
            correct: true
          - text: Досвідчена команда викладачів.
            correct: false
          - text: Нестача технічного спеціаліста.
            correct: false
          - text: Внутрішній календар зустрічей.
            correct: false
        explanation: Правові вимоги є зовнішнім макрофактором.
      - question: Яке формулювання найкраще для громадськості?
        options:
          - text: Компанія отримала більше замовлень, але витрати на доставку зросли.
            correct: true
          - text: Операційна маржинальність просіла у квартальному зрізі.
            correct: false
          - text: EBITDA-ефект логістики деталізовано в таблиці.
            correct: false
          - text: Дивіться додаток без пояснень.
            correct: false
        explanation: Публічний текст потребує зрозумілої мови.
      - question: Що показує матриця ризиків?
        options:
          - text: Імовірність і вплив ризику.
            correct: true
          - text: Лише список побоювань.
            correct: false
          - text: Тільки фінальний бюджет.
            correct: false
          - text: Авторські емоції.
            correct: false
        explanation: Ризик оцінюють через імовірність і вплив.
      - question: Який варіант є Executive Summary?
        options:
          - text: Продажі зросли, але маржа знизилася; рекомендовано переглянути логістику.
            correct: true
          - text: У цьому звіті є кілька розділів.
            correct: false
          - text: Нижче буде багато даних.
            correct: false
          - text: Тема звіту цікава для команди.
            correct: false
        explanation: Резюме дає головний висновок і рішення.
      - question: Чому не треба переписувати всі числа з таблиці?
        options:
          - text: Звіт має виділити головні зміни, винятки або ризики.
            correct: true
          - text: Числа у звітах завжди зайві.
            correct: false
          - text: Таблиці не можна коментувати.
            correct: false
          - text: Читач має сам усе вгадати.
            correct: false
        explanation: Коментар має спрямувати увагу читача.

  - id: act-5
    type: essay-response
    title: Напишіть executive-style summary
    instruction: Стисніть дані у короткий управлінський висновок.
    prompt: "Напишіть 150-180 слів українською: продажі зросли на 12%, маржа знизилася на 3 процентні пункти через подорожчання доставки, кількість скарг скоротилася після оновлення інструкції, але технічна підтримка лишається обмеженою. Дайте дві рекомендації."
    min_words: 150
    model_answer: |-
      > [!model-answer]
      > У другому кварталі продажі зросли на 12%, що свідчить про посилення попиту на послугу. Водночас маржа знизилася на 3 процентні пункти через подорожчання доставки, тому зростання доходу не повністю перетворилося на фінансовий результат. Позитивною зміною є скорочення кількості скарг після оновлення інструкції для клієнтів: це показує, що сервісна проблема частково врегульована. Основним операційним ризиком лишається обмежена технічна підтримка, яка може вплинути на запуск нових груп.
      >
      > Рекомендовано переглянути логістичний контракт або протестувати альтернативного постачальника доставки до кінця кварталу. Також доцільно додати резервний технічний супровід на період запуску нових груп, щоб зменшити ризик затримок і повторних звернень. Пріоритетом має бути не лише подальше зростання продажів, а й відновлення прибутковості та стабільності сервісу. Для контролю результату варто через місяць порівняти маржу, кількість скарг і середній час реакції підтримки з поточними показниками. Якщо ці показники покращаться одночасно, керівництво зможе масштабувати продажі без додаткового репутаційного ризику. Це також дасть фінансовій команді підставу оцінити, чи повертається маржа до планового рівня.
    rubric:
      - criteria: Дані
        description: У summary використано всі ключові показники.
        points: 4
      - criteria: Інтерпретація
        description: Пояснено значення показників, а не просто переписано числа.
        points: 3
      - criteria: Рекомендації
        description: Подано дві конкретні дії.
        points: 3

workbook:
  - id: wb-reading-report
    type: reading
    title: "Читання: квартальний фрагмент"
    instruction: Прочитайте фрагмент і визначте, як дані переходять у рекомендацію.
    text: >-
      У другому кварталі кількість консультацій зросла з 48 до 63, а середній час
      відповіді скоротився з 36 до 24 годин. Водночас частка повторних звернень
      залишилася високою - 31%. Аналіз тем звернень показує, що більшість повторів
      стосується реєстрації та доступу до матеріалів. Рекомендовано оновити інструкцію
      після реєстрації і додати автоматичне повідомлення з посиланням на матеріали.
    source: Навчальний фрагмент звіту для модуля B2.
    tasks:
      - Які два показники покращилися?
      - Який ризик лишається?
      - На які дані спирається рекомендація?

  - type: translate
    title: Переклад звітних формул
    instruction: Оберіть найприродніший український варіант.
    items:
      - source: "Sales increased by twelve percent."
        options:
          - text: "Продажі зросли на дванадцять відсотків."
            correct: true
          - text: "Продажі інкриснулися."
            correct: false
          - text: "Продажі стали процентними."
            correct: false
        explanation: Тренд передаємо дієсловом "зросли".
      - source: "The indicator remained stable."
        options:
          - text: "Показник залишався стабільним."
            correct: true
          - text: "Індикатор стояв стабільністю."
            correct: false
          - text: "Показник стабілізував звіт."
            correct: false
        explanation: Це нейтральний опис тренду.
      - source: "The report recommends revising the schedule."
        options:
          - text: "У звіті рекомендовано переглянути графік."
            correct: true
          - text: "Звіт рекомендує графічний перегляд."
            correct: false
          - text: "Репорт радить рескейджул."
            correct: false
        explanation: Безособова конструкція доречна у звіті.
      - source: "The risk has a high impact."
        options:
          - text: "Ризик має високий вплив."
            correct: true
          - text: "Ризик високовпливовий у всьому."
            correct: false
          - text: "Ризик імпактує високо."
            correct: false
        explanation: Формула природно описує матрицю ризиків.
      - source: "The data show a decline in complaints."
        options:
          - text: "Дані показують спад кількості скарг."
            correct: true
          - text: "Дані шоують скарговий спад."
            correct: false
          - text: "Скарги стали даними."
            correct: false
        explanation: '"Спад кількості" передає тенденцію.'
      - source: "The board needs a concise summary."
        options:
          - text: "Раді директорів потрібне лаконічне резюме."
            correct: true
          - text: "Борду треба короткий самарі."
            correct: false
          - text: "Директори потребують стислості без змісту."
            correct: false
        explanation: '"Лаконічне резюме" відповідає професійному регістру.'
      - source: "The methodology is described in the appendix."
        options:
          - text: "Методологію описано в додатку."
            correct: true
          - text: "Методологія описується апендиксом."
            correct: false
          - text: "У додатку є методологічність."
            correct: false
        explanation: Безособова конструкція природна для звіту.
      - source: "The recommendation is based on quarterly data."
        options:
          - text: "Рекомендація спирається на квартальні дані."
            correct: true
          - text: "Рекомендація базується квартальною датою."
            correct: false
          - text: "Порада стоїть на числах сезону."
            correct: false
        explanation: '"Спирається на дані" - природна аналітична формула.'

  - type: error-correction
    title: Редагування звітного стилю
    instruction: Виправте фразу для нейтрального професійного звіту.
    items:
      - sentence: "Продажі були прикольні в цьому кварталі."
        error: "були прикольні в цьому кварталі"
        correction: "зросли на 12% у цьому кварталі"
        error_type: register
        options: [зросли на 12% у цьому кварталі, прикольні, симпатичні, веселі]
        explanation: Звіт потребує показника, а не розмовної оцінки.
      - sentence: "Команда трохи завалила план."
        error: "трохи завалила план"
        correction: "не виконала план у повному обсязі"
        error_type: register
        options: [не виконала план у повному обсязі, завалила, провалила все, накосячила]
        explanation: Нейтральний звіт описує відхилення.
      - sentence: "Було зроблено покращення комунікації."
        error: "Було зроблено покращення комунікації."
        correction: "Комунікацію покращено."
        error_type: construction
        options: [Комунікацію покращено., зроблено покращення, покращення робилося, комунікаційність стала]
        explanation: Коротша конструкція звучить природніше.
      - sentence: "По даним видно спад."
        error: "По даним"
        correction: "За даними"
        error_type: phrase
        options: [За даними, По даним, На даних, Даними по]
        explanation: Нормативна формула - "за даними".
      - sentence: "Ризик дуже страшний."
        error: "дуже страшний"
        correction: "має високий вплив"
        error_type: register
        options: [має високий вплив, дуже страшний, лякає всіх, кошмарний]
        explanation: Матриця ризиків потребує нейтральної оцінки.
      - sentence: "Треба щось зробити з доставкою."
        error: "щось зробити"
        correction: "переглянути логістичний контракт"
        error_type: phrase
        options: [переглянути логістичний контракт, щось зробити, якось порухати, зайнятися моментом]
        explanation: Рекомендація має називати дію.
      - sentence: "Графік плавав туди-сюди."
        error: "плавав туди-сюди"
        correction: "мав нестабільну динаміку"
        error_type: register
        options: [мав нестабільну динаміку, плавав туди-сюди, ходив хвилями, хитався як міг]
        explanation: У звіті потрібна нейтральна трендова лексика.
      - sentence: "У нас супер команда, тому все буде добре."
        error: "У нас супер команда, тому все буде добре."
        correction: "Досвідчена команда є сильною стороною проєкту."
        error_type: register
        options: [Досвідчена команда є сильною стороною проєкту., супер команда, класні люди, усе буде добре]
        explanation: SWOT потребує конкретної категорії і доказового тону.

  - id: wb-comparative-audience
    type: comparative-study
    title: Один факт, три аудиторії
    instruction: Порівняйте три версії того самого висновку.
    items_to_compare:
      - "Маржа знизилася на 3 процентні пункти через подорожчання доставки; рекомендовано переглянути логістичний контракт."
      - "Маржу обчислено як співвідношення операційного прибутку до доходу; транспортний компонент собівартості мав найбільший вплив."
      - "Компанія отримала більше замовлень, але витрати на доставку зросли, тому частина прибутку зменшилася."
    criteria:
      - адресат
