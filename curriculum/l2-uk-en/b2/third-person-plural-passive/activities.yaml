version: '1.0'
module: third-person-plural-passive
level: b2
inline:
  - id: act-1
    type: comparative-study
    title: Подія без підмета
    instruction: Порівняйте чотири речення й визначте фокус.
    items_to_compare:
      - "Команда відкрила пункт підтримки."
      - "Пункт підтримки відкрито."
      - "Пункт підтримки відкрили в центрі."
      - "Пункт підтримки відкривається командою."
    criteria:
      - активний діяч
      - результат
      - неозначено-особова дія
      - калькований пасив
    prompt: "Який варіант найприродніший для короткої новини без названої команди?"
    model_answer: >-
      **Пункт підтримки відкрили в центрі** природно повідомляє подію без
      названого виконавця. **Відкрито** фіксує статус, а **команда відкрила**
      називає відповідальних. **Відкривається командою** треба перебудувати.
  - id: act-2
    type: critical-analysis
    title: Форма присудка
    instruction: Визначте час і форму неозначено-особового присудка.
    target_text: >-
      У дворі ремонтують лавки. Проєкт доопрацюють після консультацій. Заявки
      розглядатимуть до п'ятниці. Після слухань внесли правки. За прозорої
      процедури рішення пояснили б швидше.
    questions:
      - "Де теперішній час?"
      - "Де майбутній час доконаного й недоконаного виду?"
      - "Де минулий або умовний спосіб?"
    model_answers:
      - "Теперішній час: ремонтують."
      - "Майбутній доконаний: доопрацюють; майбутній недоконаний: розглядатимуть."
      - "Минулий час: внесли; умовний спосіб: пояснили б."
  - id: act-3
    type: comparative-study
    title: Актив, результат чи неозначена особа
    instruction: Оберіть модель для різних потреб.
    items_to_compare:
      - "Експерти перевірили дані."
      - "Дані перевірено."
      - "Дані перевірили перед публікацією."
      - "Дані перевіряються перед публікацією."
      - "Перевірені дані додали до звіту."
    criteria:
      - відповідальність
      - статус
      - дія без названого виконавця
      - процедура
      - ознака предмета
    prompt: "Яка форма найкраща для новинного повідомлення, якщо виконавець неважливий?"
    model_answer: >-
      Для новинної події без важливого виконавця природне **дані перевірили
      перед публікацією**. Якщо треба підкреслити статус, краще **дані
      перевірено**; якщо важливі експерти, потрібен актив.
  - id: act-4
    type: critical-analysis
    title: Жанр і джерело
    instruction: Визначте, де неозначено-особове речення потребує уточнення джерела.
    target_text: >-
      Кажуть, ціни зростуть. У міській раді повідомили, що слухання перенесуть.
      Заяви подають через електронний кабінет. У звіті порівняли кілька груп
      даних.
    questions:
      - "Де інформація схожа на чутку?"
      - "Де джерело частково назване?"
      - "Де модель описує інструкцію або звіт?"
    model_answers:
      - "Чутка: кажуть, ціни зростуть."
      - "Джерело частково назване: у міській раді повідомили."
      - "Інструкція: заяви подають; звіт: у звіті порівняли."
  - id: act-5
    type: critical-analysis
    title: Приберіть штучний пасив
    instruction: Перепишіть фрагмент природною українською.
    target_text: >-
      Проєкт був представлений експертами. Потім він був обговорений учасниками.
      Вони сказали, що пропозиції будуть враховані робочою групою.
    questions:
      - "Де діячі мають стати підметами?"
      - "Де можна використати неозначено-особову модель?"
      - "Що не так із займенником вони?"
    model_answers:
      - "Експерти представили проєкт; учасники його обговорили."
      - "Частину пропозицій врахують у фінальній версії."
      - "Вони нечітке без попереднього референта; краще назвати групу або прибрати займенник."
workbook:
  - id: wb-1
    type: critical-analysis
    title: Поставте дієслово у множині
    instruction: Поясніть форми неозначено-особового присудка.
    target_text: >-
      У дворі завтра ремонтуватимуть лавки. Після слухань внесли кілька правок.
      Заявки розглянуть до кінця тижня. У таких випадках часто вживають форму
      множини. За прозорої процедури рішення пояснили б швидше.
    questions:
      - "Де майбутній час, а де минулий?"
      - "Де теперішній час?"
      - "Де умовний спосіб?"
    model_answers:
      - "Майбутній: ремонтуватимуть, розглянуть; минулий: внесли."
      - "Теперішній час: вживають."
      - "Умовний спосіб: пояснили б."
  - id: wb-2
    type: critical-analysis
    title: Зайве вони і калькований пасив
    instruction: Виправте речення й поясніть фокус.
    target_text: >-
      Вони кажуть, що маршрут змінять. Дорога ремонтується робітниками. Було
      запрошено мною кількох учасників. Звіт готується аналітиками. Пропозиції
      були підтримані громадою.
    questions:
      - "Де треба прибрати зайве вони?"
      - "Де названий діяч має стати підметом?"
      - "Де можливе неозначено-особове речення?"
    model_answers:
      - "Кажуть, що маршрут змінять."
      - "Робітники ремонтують дорогу; я запросив кількох учасників; аналітики готують звіт; громада підтримала пропозиції."
      - "Дорогу ремонтують, звіт готують, пропозиції підтримали."
  - type: group-sort
    title: Моделі пасивної синонімії
    instruction: Розподіліть приклади за моделями.
    groups:
      - name: "Актив"
        items:
          - "експерти перевірили"
          - "рада ухвалила"
          - "волонтери підготували"
      - name: "Результат на -но, -то"
        items:
          - "дані перевірено"
          - "рішення ухвалено"
          - "звіт підготовлено"
      - name: "Неозначено-особове"
        items:
          - "дані перевірили"
          - "рішення ухвалили"
          - "звіт підготували"
  - id: wb-4
    type: critical-analysis
    title: Оберіть природну новинну фразу
    instruction: Доберіть природну фразу для кожного фокусу.
    target_text: >-
      Виконавець не важливий, головна подія. Треба зафіксувати статус документа.
      Треба назвати відповідальну групу.
    questions:
      - "Яке речення найкраще передає подію без названого виконавця?"
      - "Яке речення найкраще фіксує статус?"
      - "Яке речення найкраще називає відповідальних?"
    model_answers:
      - "У центрі відкрили пункт підтримки."
      - "Рішення ухвалено."
      - "Робоча група підготувала довідку."
  - id: wb-5
    type: critical-analysis
    title: Три версії одного рішення
    instruction: Перепишіть речення в активній, результативній і неозначено-особовій моделях.
    target_text: "Рішення було ухвалене радою після обговорення."
    questions:
      - "Як звучить активний варіант?"
      - "Як звучить результативний варіант на -но, -то?"
      - "Як звучить неозначено-особовий варіант?"
    model_answers:
      - "Актив: рада ухвалила рішення після обговорення."
      - "Результат: рішення ухвалено після обговорення."
      - "Неозначено-особове: рішення ухвалили після обговорення."
