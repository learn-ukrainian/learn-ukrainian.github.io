  - type: reading
    id: "passive-rewrite-reading"
    title: "Редакторське читання короткої новини"
    instruction: "Прочитайте уривок і визначте, де треба актив, де третя особа множини, а де результат."
    text: "Під час громадського обговорення законопроєкт був розкритикований учасниками. Частину пропозицій було передано комітету. Після цього текст доопрацьовувався експертною групою. У повідомленні зазначається, що нову версію оприлюднять наступного тижня."
    source: "навчальний редакторський уривок"
    tasks:
      - "Знайдіть два місця, де названого діяча треба зробити підметом."
      - "Знайдіть одне місце, де результат можна передати формою на -но, -то."
      - "Перепишіть останнє речення так, щоб неозначено-особова модель звучала природно."
      - "Поясніть, чому не всі пасивні форми треба замінювати однаково."
  - type: essay-response
    id: "passive-strategy-editorial-note"
    title: "Редакторська записка про вибір конструкції"
    instruction: "Напишіть коротку редакторську записку українською мовою."
    prompt: "Поясніть, як ви редагували б абзац із пасивними конструкціями про громадське обговорення: коли обрали б актив, коли неозначено-особове речення, а коли форму на -но, -то."
    min_words: 180
    model_answer: "У такому абзаці я спершу визначив би, де діяч названий і важливий для читача. Якщо в реченні є комісія, експерти, учасники слухань або пресслужба, я зробив би цю групу підметом: експерти розкритикували законопроєкт, комісія внесла правки, пресслужба оприлюднила графік. Якщо діяч неважливий або не названий, але треба показати саму дію, я використав би неозначено-особову модель: законопроєкт доопрацювали, пропозиції обговорюють, результати оприлюднять завтра. Якщо текст має зафіксувати службовий результат, доречною була б форма на -но, -то: пропозиції враховано, заявку перевірено, рішення ухвалено. Я не залишав би речень на зразок пропозиції обговорювалися учасниками, бо вони ховають названого діяча в орудному відмінку. Також я прибрав би зайве вони там, де немає попереднього референта. Добре редагування не просто замінює пасив однією формою, а розподіляє відповідальність, процес і результат між різними українськими конструкціями."
    rubric:
      - criteria: "Розрізнення фокусу"
        description: "Відповідь чітко пояснює різницю між діячем, процесом і результатом."
        points: 4
      - criteria: "Нормативні перебудови"
        description: "Автор уникає орудного діяча, зайвого вони та калькованих форм на -ся."
        points: 4
      - criteria: "Приклади"
        description: "У відповіді є природні приклади активу, неозначено-особової моделі та форми на -но, -то."
        points: 4
