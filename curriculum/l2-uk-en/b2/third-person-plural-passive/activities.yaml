version: '1.0'
module: third-person-plural-passive
level: b2
inline: []
workbook:
  - type: quiz
    title: "Вибір природної конструкції"
    instruction: "Оберіть варіант, який найточніше передає фокус речення."
    items:
      - question: "Який варіант природно повідомляє про дію без названого виконавця?"
        options:
          - text: "У місті ремонтують дорогу."
            correct: true
          - text: "Дорога ремонтується робітниками."
            correct: false
          - text: "Вони ремонтують дорогу, хоча діяч не названий."
            correct: false
          - text: "Дорога була ремонтована."
            correct: false
        explanation: "Форма ремонтують без підмета створює неозначено-особову конструкцію."
      - question: "Яке речення найкраще називає відповідального діяча?"
        options:
          - text: "Комітет доопрацював законопроєкт."
            correct: true
          - text: "Законопроєкт доопрацьовано комітетом."
            correct: false
          - text: "Законопроєкт доопрацьовувався комітетом."
            correct: false
          - text: "Законопроєкт доопрацювали комітетом."
            correct: false
        explanation: "Названий діяч має бути підметом активного речення."
      - question: "Який варіант найкраще фіксує службовий результат без виконавця?"
        options:
          - text: "Заявку перевірено."
            correct: true
          - text: "Заявка перевіряється спеціалістом."
            correct: false
          - text: "Спеціалістом перевірили заявку."
            correct: false
          - text: "Вони перевірили заявку без попереднього референта."
            correct: false
        explanation: "Форма на -но, -то стисло передає результат без названого діяча."
      - question: "Коли займенник вони доречний у подібному реченні?"
        options:
          - text: "Коли він відсилає до вже названої групи людей."
            correct: true
          - text: "Коли треба перекласти будь-який пасив."
            correct: false
          - text: "Коли діяч навмисно невідомий."
            correct: false
          - text: "Коли речення має звучати офіційніше."
            correct: false
        explanation: "Без попереднього референта вони руйнує неозначено-особовий фокус."
      - question: "Який варіант найкраще редагує речення Пропозиції обговорювалися учасниками?"
        options:
          - text: "Учасники обговорили пропозиції."
            correct: true
          - text: "Пропозиції обговорили учасниками."
            correct: false
          - text: "Пропозиції були обговорені учасниками."
            correct: false
          - text: "Вони обговорювалися учасниками."
            correct: false
        explanation: "Якщо учасники важливі, їх треба зробити підметом."
      - question: "Яке речення має правильну форму минулого часу для невизначеного діяча?"
        options:
          - text: "Після слухань внесли кілька правок."
            correct: true
          - text: "Після слухань внесла кілька правок."
            correct: false
          - text: "Після слухань внесено кілька правок депутатами."
            correct: false
          - text: "Після слухань правки були внесені учасниками."
            correct: false
        explanation: "У минулому часі неозначено-особовий присудок має форму множини."
      - question: "Який варіант природний для повідомлення про чутку без джерела?"
        options:
          - text: "Кажуть, маршрут змінять у липні."
            correct: true
          - text: "Вони кажуть, маршрут змінять у липні."
            correct: false
          - text: "Маршрут кажеться зміненим у липні."
            correct: false
          - text: "Маршрут буде змінений кимось у липні."
            correct: false
        explanation: "Кажуть без підмета передає невизначене джерело інформації."
      - question: "Яке речення краще підходить для інструкції про типову процедуру?"
        options:
          - text: "Заяви подають через електронний кабінет."
            correct: true
          - text: "Заяви подаються користувачами через електронний кабінет."
            correct: false
          - text: "Користувачами подано заяви як правило."
            correct: false
          - text: "Вони подають заяви, хоча користувачі не названі."
            correct: false
        explanation: "Інструкція часто використовує третю особу множини без підмета."
      - question: "Який варіант найточніше передає процес, а не лише результат?"
        options:
          - text: "Законопроєкт зараз обговорюють у комітеті."
            correct: true
          - text: "Законопроєкт обговорено в комітеті."
            correct: false
          - text: "Комітетом обговорено законопроєкт зараз."
            correct: false
          - text: "Законопроєкт є обговореним у комітеті."
            correct: false
        explanation: "Форма обговорюють показує поточний процес."
      - question: "Яке речення найкраще виправляє зайвий формальний підмет?"
        options:
          - text: "Повідомили, що засідання перенесли."
            correct: true
          - text: "Вони повідомили, що засідання перенесли."
            correct: false
          - text: "Засідання було повідомлене як перенесене."
            correct: false
          - text: "Повідомило, що засідання перенесли."
            correct: false
        explanation: "Без конкретної групи підмет вони не потрібен."
  - type: fill-in
    title: "Доберіть форму множини"
    instruction: "Заповніть пропуск формою, яка відповідає неозначено-особовій або результативній моделі."
    items:
      - sentence: "У повідомленні ___, що громадське обговорення продовжать."
        answer: "зазначають"
        options: ["зазначають", "зазначає", "зазначено комісією", "зазначений"]
        explanation: "Форма множини без підмета передає неназване джерело повідомлення."
      - sentence: "Після консультацій законопроєкт ___ до другого читання."
        answer: "доопрацювали"
        options: ["доопрацювали", "доопрацював", "доопрацьовується експертами", "доопрацьований"]
        explanation: "Минулий час неозначено-особового речення потребує множини."
      - sentence: "Заявки ___ до кінця робочого дня."
        answer: "прийматимуть"
        options: ["прийматимуть", "прийматиме", "прийматиметься заявниками", "прийнято заявниками"]
        explanation: "Майбутня недоконана форма множини описує процедуру."
      - sentence: "Якби процедуру спростили, документи ___ швидше."
        answer: "перевірили б"
        options: ["перевірили б", "перевірив би", "перевірено б фахівцями", "перевірялася б"]
        explanation: "Умовний спосіб у цій моделі теж має форму множини."
      - sentence: "У центрі міста зараз ___ старий тротуар."
        answer: "ремонтують"
        options: ["ремонтують", "ремонтує", "ремонтується робітниками", "відремонтовано робітниками"]
        explanation: "Ремонтують показує процес без названого виконавця."
      - sentence: "Новий порядок ___ на сайті установи."
        answer: "оприлюднили"
        options: ["оприлюднили", "оприлюднила", "оприлюднений пресслужбою", "оприлюднюється пресслужбою"]
        explanation: "Минула множина природно замінює важкий пасив."
      - sentence: "У правилах ___, що посвідчення треба показати на вході."
        answer: "пояснюють"
        options: ["пояснюють", "пояснює", "пояснено автором", "пояснений"]
        explanation: "Пояснюють без підмета описує зміст правил."
      - sentence: "Після перевірки учасникам ___ коротке підтвердження."
        answer: "надішлють"
        options: ["надішлють", "надішле", "буде надісланий кимось", "надіслано учасниками"]
        explanation: "Майбутня форма множини тримає невизначеного виконавця."
      - sentence: "У новинах ___ про зміну графіка руху."
        answer: "повідомили"
        options: ["повідомили", "повідомив", "повідомлено журналістами", "повідомлений"]
        explanation: "Повідомили фокусує факт повідомлення, а не автора."
      - sentence: "Якщо діяча треба назвати, речення ___ на актив."
        answer: "перебудовують"
        options: ["перебудовують", "перебудовується діячем", "перебудовано автором", "перебудовує"]
        explanation: "У загальному правилі доречна форма множини без підмета."
  - type: match-up
    title: "Фокус і конструкція"
    instruction: "Поєднайте комунікативний фокус із природним реченням."
    pairs:
      - left: "названий відповідальний діяч"
        right: "Комісія підтримала пропозицію."
      - left: "результат без названого виконавця"
        right: "Пропозицію підтримано."
      - left: "процес без названого виконавця"
        right: "Пропозицію зараз обговорюють."
      - left: "чутка без перевіреного джерела"
        right: "Кажуть, маршрут змінять."
      - left: "типова службова процедура"
        right: "Заяви подають через кабінет."
      - left: "майбутня дія невизначених виконавців"
        right: "Результати оприлюднять у п'ятницю."
      - left: "минула дія невизначених виконавців"
        right: "Після слухань внесли правки."
      - left: "умовний сценарій без діяча"
        right: "За прозорої процедури пояснили б швидше."
      - left: "ознака предмета після дії"
        right: "Підготовлений звіт передали секретареві."
      - left: "редагування зайвого займенника"
        right: "Повідомили, що зустріч перенесли."
      - left: "калькований орудний діяча"
        right: "Директорка підписала документ."
      - left: "об'єкт на початку речення"
        right: "Дорогу ремонтують біля школи."
  - type: group-sort
    title: "Розподіліть за синтаксичною роллю"
    instruction: "Розсортуйте речення за тим, яку модель вони реалізують."
    groups:
      - name: "Неозначено-особова дія"
        items:
          - "У громаді відкрили консультаційний центр."
          - "У звіті пояснюють причини затримки."
          - "Заявки розглядатимуть до п'ятниці."
          - "Після перевірки додали кілька уточнень."
      - name: "Актив із названим діячем"
        items:
          - "Команда підготувала довідку."
          - "Експерти розкритикували законопроєкт."
          - "Пресслужба оприлюднила графік."
          - "Мешканці підтримали пропозицію."
      - name: "Результат на -но, -то"
        items:
          - "Довідку підготовлено."
          - "Графік оприлюднено."
          - "Пропозиції враховано частково."
          - "Звернення розглянуто повторно."
      - name: "Калькований або важкий пасив"
        items:
          - "Довідка була підготовлена командою."
          - "Графік оприлюднюється пресслужбою."
          - "Пропозиції були підтримані мешканцями."
          - "Звернення розглядається відділом."
  - type: unjumble
    title: "Складіть природне речення"
    instruction: "Упорядкуйте слова так, щоб утворити неозначено-особову або активну конструкцію."
    items:
      - words: ["У", "повідомленні", "зазначають,", "що", "зустріч", "перенесли."]
        answer: "У повідомленні зазначають, що зустріч перенесли."
      - words: ["Після", "слухань", "законопроєкт", "доопрацювали", "до", "другого", "читання."]
        answer: "Після слухань законопроєкт доопрацювали до другого читання."
      - words: ["Якщо", "експерти", "важливі,", "назвіть", "їх", "підметом."]
        answer: "Якщо експерти важливі, назвіть їх підметом."
      - words: ["У", "місті", "зараз", "ремонтують", "дорогу", "біля", "школи."]
        answer: "У місті зараз ремонтують дорогу біля школи."
      - words: ["Кажуть,", "новий", "маршрут", "відкриють", "наступного", "місяця."]
        answer: "Кажуть, новий маршрут відкриють наступного місяця."
      - words: ["Заяви", "подають", "через", "електронний", "кабінет", "установи."]
        answer: "Заяви подають через електронний кабінет установи."
      - words: ["Комісія", "підтримала", "пропозицію", "після", "короткого", "обговорення."]
        answer: "Комісія підтримала пропозицію після короткого обговорення."
      - words: ["Пропозицію", "підтримали", "після", "короткого", "громадського", "обговорення."]
        answer: "Пропозицію підтримали після короткого громадського обговорення."
  - type: true-false
    title: "Перевірте граматичні межі"
    instruction: "Визначте, чи твердження правильно описує неозначено-особові речення."
    items:
      - statement: "У неозначено-особовому реченні формального підмета немає."
        correct: true
        explanation: "Підмет відсутній, а діяч лишається невизначеним."
      - statement: "Займенник вони треба ставити перед кожним дієсловом третьої особи множини."
        correct: false
        explanation: "Займенник потрібен лише тоді, коли має конкретний референт."
      - statement: "У минулому часі неозначено-особовий присудок має форму множини."
        correct: true
        explanation: "Пишемо перевірили, запросили, повідомили."
      - statement: "Форма третьої особи однини без підмета завжди створює неозначено-особову модель."
        correct: false
        explanation: "Однина без підмета зазвичай потребує іншого контексту або перебудови."
      - statement: "Названого діяча в орудному відмінку краще замінити активним підметом."
        correct: true
        explanation: "Директоркою підписано документ треба перебудувати на директорка підписала документ."
      - statement: "Кажуть може передавати чутку без названого джерела."
        correct: true
        explanation: "Це типова неозначено-особова формула розмовного й публіцистичного мовлення."
      - statement: "Форма на -но, -то і третя особа множини завжди мають однаковий тон."
        correct: false
        explanation: "Форма на -но, -то частіше фіксує результат, а множина показує дію або процес."
      - statement: "В інструкціях конструкція заяви подають може бути природною."
        correct: true
        explanation: "Так описують типову процедуру без названого виконавця."
      - statement: "Речення дорога ремонтується робітниками є найкращою українською нейтральною нормою."
        correct: false
        explanation: "Природніше робітники ремонтують дорогу або дорогу ремонтують."
      - statement: "Активне речення може бути офіційним і точним."
        correct: true
        explanation: "Комісія ухвалила рішення цілком відповідає офіційному регістру."
  - type: cloze
    title: "Відновіть редакторський коментар"
    instruction: "Заповніть пропуски словами, які відтворюють логіку редагування пасивних конструкцій."
    passage: >-
      Коли діяч відомий і важливий, його роблять {1}. Якщо діяч невідомий або неважливий, можна використати форму {2} особи множини без підмета. У минулому часі така форма теж має бути {3}. Речення з зайвим словом {4} звучить так, ніби групу людей уже названо. Якщо треба підкреслити завершений результат, доречна форма на {5}. Якщо треба показати процес, краще написати: документ {6}, дорогу {7}, пропозиції {8}. У публіцистичному тексті часто пишуть: у місті {9} центр, на сайті {10} результати, після обговорення {11} правки. У службовому звіті актив теж можливий: відділ {12} довідку, експерти {13} дані, комісія {14} рішення. Кальковану модель з орудним діяча треба {15}. Головне правило: форма має служити {16}, а не механічно копіювати чужий пасив.
    blanks:
      - id: 1
        answer: "підметом"
        options: ["підметом", "додатком", "обставиною", "означенням"]
      - id: 2
        answer: "третьої"
        options: ["третьої", "першої", "другої", "нульової"]
      - id: 3
        answer: "множинною"
        options: ["множинною", "однинною", "інфінітивною", "іменниковою"]
      - id: 4
        answer: "вони"
        options: ["вони", "тут", "вже", "саме"]
      - id: 5
        answer: "-но, -то"
        options: ["-но, -то", "-ся", "-вш-", "-учи"]
      - id: 6
        answer: "перевіряють"
        options: ["перевіряють", "перевіряється фахівцем", "перевірений кимось", "перевірило"]
      - id: 7
        answer: "ремонтують"
        options: ["ремонтують", "ремонтується робітниками", "ремонтує", "ремонтований"]
      - id: 8
        answer: "обговорюють"
        options: ["обговорюють", "обговорюються учасниками", "обговорює", "обговорені учасниками"]
      - id: 9
        answer: "відкрили"
        options: ["відкрили", "відкрив", "було відкритим", "відкритий кимось"]
      - id: 10
        answer: "оприлюднили"
        options: ["оприлюднили", "оприлюднила", "оприлюднюється пресслужбою", "оприлюднений"]
      - id: 11
        answer: "внесли"
        options: ["внесли", "внесла", "внесено депутатами", "внесений"]
      - id: 12
        answer: "підготував"
        options: ["підготував", "підготовлено відділом", "підготовлений", "готувалося"]
      - id: 13
        answer: "перевірили"
        options: ["перевірили", "перевірено експертами", "перевірялися", "перевірені кимось"]
      - id: 14
        answer: "ухвалила"
