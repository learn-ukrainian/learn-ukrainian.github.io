- id: workbook-5
  type: essay-response
  title: Перепишіть абзац із фокусом
  instruction: 'Напишіть дві версії короткого повідомлення: нейтральну і емфатичну.'
  prompt: 'Ситуація: команда подала звіт, редакторка перевірила чернетку, додатки надішлють завтра, а кінцевий термін - п''ятниця.
    Напишіть 150-180 слів: спершу нейтральну службову версію, потім версію для аналітичної новини з двома мотивованими інверсіями
    й однією часткою. Після тексту коротко поясніть, що стало темою й ремою в двох реченнях.'
  min_words: 150
  model_answer: 'Нейтрально: Команда подала звіт до секретаріату. Редакторка перевірила чернетку й повернула кілька уточнень.
    Додатки надішлють завтра, а повний пакет документів треба подати до п''ятниці. Емфатично: Звіт команда подала вчасно,
    але додатки надішле лише завтра. Чернетку перевірила редакторка, тому остаточні уточнення вже можна внести до п''ятниці.
    У першому емфатичному реченні темою є звіт, бо саме про нього йдеться в повідомленні; ремою стає факт своєчасного подання
    і обмеження щодо додатків. У другому реченні темою є чернетка, а ремою - виконавиця перевірки. Частка лише обмежує час
    надсилання додатків, а не всю роботу команди.'
  peer_review_guidelines: Перевірте, чи кожна інверсія має контекстову причину. Позначте частку й слово, яке вона підсилює
    або обмежує. Порівняйте, чи нейтральна версія справді прозоріша для службового жанру.
  rubric:
  - criteria: Фокус
    description: Тема й рема визначені переконливо.
    points: 4
  - criteria: Регістр
    description: Нейтральна й емфатична версії відповідають різним жанрам.
    points: 3
  - criteria: Безпека
    description: Інверсія не створює двозначності й не розриває залежні групи.
    points: 3
