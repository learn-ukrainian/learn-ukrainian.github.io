version: '1.0'
module: emphasis-and-inversion
level: b2
inline: []
workbook:
  - type: critical-analysis
    id: emphasis-reading-brief
    title: "Аналіз тексту: фокус у громадському повідомленні"
    instruction: Прочитай текст і проаналізуй порядок слів, частки та логічний наголос.
    target_text: "Після відкритої зустрічі мешканці будинку запропонували новий графік чергування. Графік підтримала більшість сусідів, але саме волонтерська група пояснила, чому старий порядок не працював. У чаті з'явилося повідомлення: документи треба подати до п'ятниці, а додатки редакторка перевірить у понеділок. Навіть ті, хто спершу сумнівався, погодилися обговорити зміни ще раз. Рішення таки ухвалили після короткої, але уважної перевірки."
    questions:
      - Яке речення висуває вперед часову рамку?
      - Де частка саме виділяє виконавця?
      - Яке речення має підмет після присудка?
      - Де частка навіть створює ефект несподіваності?
      - Яку роль виконує таки в останньому реченні?
    model_answers:
      - Перше речення починається з обставини часу «Після відкритої зустрічі».
      - У другому реченні «саме волонтерська група» виділяє виконавця пояснення.
      - «У чаті з'явилося повідомлення» має присудок перед підметом.
      - «Навіть ті, хто спершу сумнівався...» показує несподівану підтримку.
      - «Таки» підтверджує результат після сумнівів або затримки.
    focus_points:
      - тема і рема
      - місце частки
      - кінцева позиція
      - стилістична доречність

  - type: match-up
    title: "Засіб і комунікативна функція"
    instruction: Зістав засіб наголошування з його основною функцією.
    pairs:
      - left: "саме"
        right: "точне виділення одного елемента"
      - left: "лише перед підметом"
        right: "обмеження виконавця"
      - left: "лише перед присудком"
        right: "обмеження дії"
      - left: "навіть"
        right: "несподіваність або сильний аргумент"
      - left: "ж"
        right: "нагадування про спільне знання"
      - left: "таки"
        right: "підтвердження після сумніву"
      - left: "додаток на початку"
        right: "топікалізація відомого об'єкта"
      - left: "підмет після присудка"
        right: "сценічне введення учасника"
      - left: "постпозиція означення"
        right: "художній або стилізований ритм"
      - left: "фінальна позиція"
        right: "сильна позиція для реми"
      - left: "рамка висловлення"
        right: "початкова умова для читання речення"
      - left: "приховане питання"
        right: "орієнтир для вибору теми й реми"

  - type: select
    title: "Обери доречний фокус"
    instruction: Обери всі речення, у яких логічний наголос відповідає зазначеній ситуації.
    items:
      - question: "Питання: хто перевірив звіт?"
        options:
          - text: "Звіт перевірила редакторка."
            correct: true
          - text: "Редакторка перевірила звіт."
            correct: false
          - text: "Саме редакторка перевірила звіт."
            correct: true
          - text: "Редакторка саме перевірила звіт."
            correct: false
        min_correct: 2
        explanation: Виконавицю виділяє кінцева позиція або частка саме перед підметом.
      - question: "Питання: що саме перевірила редакторка?"
        options:
          - text: "Редакторка перевірила саме звіт."
            correct: true
          - text: "Саме редакторка перевірила звіт."
            correct: false
          - text: "Саме звіт перевірила редакторка."
            correct: true
          - text: "Редакторка лише перевірила звіт."
            correct: false
        min_correct: 2
        explanation: Фокус має падати на об'єкт, а не на виконавицю чи дію.
      - question: "Потрібна природна сценічна рамка місця."
        options:
          - text: "У чаті з'явилося повідомлення."
            correct: true
          - text: "Повідомлення у чаті з'явилося офіційний."
            correct: false
          - text: "На площу вийшли волонтери."
            correct: true
          - text: "Волонтери на площу вийшли важливий."
            correct: false
        min_correct: 2
        explanation: Початкова обставина місця задає сцену, але форма слів має лишатися правильною.
      - question: "Потрібно обмежити дію, а не виконавця."
        options:
          - text: "Комісія лише підписала протокол."
            correct: true
          - text: "Лише комісія підписала протокол."
            correct: false
          - text: "Редакторка тільки переглянула додатки."
            correct: true
          - text: "Тільки редакторка переглянула додатки."
            correct: false
        min_correct: 2
        explanation: Частка перед присудком обмежує дію.
      - question: "Потрібно показати несподівану підтримку."
        options:
          - text: "Навіть критики підтримали рішення."
            correct: true
          - text: "Критики підтримали рішення."
            correct: false
          - text: "Пропозицію підтримали навіть опоненти."
            correct: true
          - text: "Опоненти лише підтримали пропозицію."
            correct: false
        min_correct: 2
        explanation: Навіть позначає, що підтримка була неочікуваною.
      - question: "Потрібна нейтральна службова інструкція."
        options:
          - text: "До заяви потрібно додати копію документа."
            correct: true
          - text: "Копію документа потрібно додати до заяви."
            correct: true
          - text: "Додати потрібно до заяви копію документа урочисту."
            correct: false
          - text: "До заяви копію документа додати потрібно саме."
            correct: false
        min_correct: 2
        explanation: Службовий текст потребує прозорого порядку без зайвої патетики.
      - question: "Потрібно уникнути чужорідної видільної конструкції."
        options:
          - text: "Саме Марія підготувала презентацію."
            correct: true
          - text: "Презентацію підготувала Марія."
            correct: true
          - text: "Це була Марія, хто підготувала презентацію."
            correct: false
          - text: "Марія, а не Олег, підготувала презентацію."
            correct: true
        min_correct: 3
        explanation: Українські варіанти використовують інверсію, саме або явне протиставлення.
      - question: "Потрібна художня стилізація, а не офіційний стиль."
        options:
          - text: "Стояла тиша густа над ранковою вулицею."
            correct: true
          - text: "У заяві тиша густа додатки має."
            correct: false
          - text: "Вулиця стара вела до площі."
            correct: true
          - text: "Стара вулиця веде до площі."
            correct: false
        min_correct: 2
        explanation: Постпозиція означення стилізує опис; нейтральний варіант правильний граматично, але не відповідає цьому завданню.

  - type: fill-in
    title: "Постав частку або фокусне слово"
    instruction: Заповни пропуск так, щоб речення відповідало поясненому фокусу.
    items:
      - sentence: "____ редакторка помітила помилку, а не менеджер."
        answer: "Саме"
        options: ["Саме", "Навіть", "Лише", "Таки"]
        explanation: Саме виділяє точного виконавця.
      - sentence: "Редакторка ____ підписала звіт, але не редагувала його."
        answer: "лише"
        options: ["лише", "навіть", "саме", "таки"]
        explanation: Частка перед присудком обмежує дію.
      - sentence: "____ критики підтримали пропозицію після пояснень."
        answer: "Навіть"
        options: ["Навіть", "Лише", "Саме", "Ж"]
        explanation: Навіть показує несподівану підтримку.
      - sentence: "Команда ____ подала звіт після трьох переносів."
        answer: "таки"
        options: ["таки", "лише", "саме", "навіть"]
        explanation: Таки підтверджує результат після сумнівів.
      - sentence: "Ми ____ домовлялися перевіряти джерела до публікації."
        answer: "ж"
        options: ["ж", "саме", "лише", "навіть"]
        explanation: Ж нагадує про спільне знання.
      - sentence: "Звіт перевірили ____ у понеділок, а не у вівторок."
        answer: "саме"
        options: ["саме", "лише", "таки", "ж"]
        explanation: Саме виділяє точний час.
      - sentence: "____ протокол комісія підписала вчора, а додатки залишила на сьогодні."
        answer: "Лише"
        options: ["Лише", "Навіть", "Таки", "Ж"]
        explanation: Лише перед додатком обмежує об'єкт.
      - sentence: "Після консультацій форму заявки ____ змінили."
        answer: "таки"
        options: ["таки", "лише", "саме", "ж"]
        explanation: Таки підкреслює, що зміна врешті відбулася.
      - sentence: "У чаті ____ з'явилося повідомлення про новий графік."
        answer: "саме"
        options: ["саме", "лише", "навіть", "ж"]
        explanation: Саме виділяє місце появи повідомлення.
      - sentence: "Команда подала ____ короткий звіт, без додатків і таблиць."
        answer: "лише"
        options: ["лише", "таки", "навіть", "ж"]
        explanation: Лише перед об'єктом обмежує обсяг поданого.

  - type: error-correction
    title: "Виправ невдалу інверсію"
    instruction: Знайди проблемну частину речення й обери природну редакцію.
    items:
      - sentence: "Це був координатор, хто змінив графік."
        error: "хто змінив"
        correction: "який змінив"
        error_type: "construction"
        options: ["який змінив", "хто змінив", "де змінив", "що змінив"]
        explanation: Після назви особи в такій конструкції потрібне який або краще перебудувати речення.
      - sentence: "Графік змінив саме координатор, не був це секретар."
        error: "не був це секретар"
        correction: "а не секретар"
        error_type: "construction"
        options: ["а не секретар", "не був це секретар", "це не є секретар", "хто не секретар"]
        explanation: Протиставлення оформлюємо природною конструкцією а не.
      - sentence: "Редакторка лише звіт перевірила не."
        error: "лише звіт перевірила не"
        correction: "лише перевірила звіт"
        error_type: "construction"
        options: ["лише перевірила звіт", "лише звіт перевірила не", "звіт лише не", "перевірила не лише"]
        explanation: Частка має стояти біля обмежуваної дії, а заперечення тут зайве.
      - sentence: "На площу волонтери вийшли офіційний."
        error: "офіційний"
        correction: "офіційно"
        error_type: "word"
        options: ["офіційно", "офіційний", "офіційна", "офіційного"]
        explanation: Потрібен прислівник способу дії.
      - sentence: "Команда підтримала група після обговорення."
        error: "група"
        correction: "групу"
        error_type: "word"
        options: ["групу", "група", "групою", "групі"]
        explanation: Об'єкт дії має стояти у знахідному відмінку.
      - sentence: "До заяви додати потрібно копію документа урочисту."
        error: "додати потрібно копію документа урочисту"
        correction: "потрібно додати копію документа"
        error_type: "register"
        options: ["потрібно додати копію документа", "копію документа урочисту", "додати урочисту", "потрібно урочисту"]
        explanation: Службова інструкція не потребує художньої постпозиції.
      - sentence: "Це була Марія, хто підготувала презентацію."
        error: "хто підготувала"
        correction: "яка підготувала"
        error_type: "construction"
        options: ["яка підготувала", "хто підготувала", "де підготувала", "це хто підготувала"]
        explanation: У межах цього речення потрібне сполучне слово яка; для сильнішого фокусу краще перебудувати все речення.
      - sentence: "Звіт редакторка підписав у понеділок."
        error: "підписав"
        correction: "підписала"
        error_type: "word"
        options: ["підписала", "підписав", "підписало", "підписали"]
        explanation: Присудок узгоджується з підметом редакторка.

  - type: group-sort
    title: "Розподіли приклади за типом фокусу"
    instruction: Розподіли речення за головним засобом наголошування.
    groups:
      - name: "Інверсія"
        items:
          - "Звіт перевірила редакторка."
          - "До зали зайшли учасники."
          - "Після консультацій форму заявки змінили."
          - "Рішення підтримали мешканці."
          - "У чаті з'явилося повідомлення."
      - name: "Частка"
        items:
          - "Саме редакторка перевірила звіт."
          - "Навіть критики підтримали рішення."
          - "Команда таки подала звіт."
          - "Ми ж домовлялися про перевірку."
      - name: "Нейтральний порядок"
        items:
          - "Комісія розгляне заяву завтра."
          - "Редакторка перевірила звіт учора."
          - "Студенти підготували презентацію."
          - "Менеджер надіслав додатки."
          - "Команда подала звіт у понеділок."

  - type: true-false
    title: "Перевір твердження про інверсію"
    instruction: Познач, чи правильне твердження.
    items:
      - statement: "Тема речення завжди збігається з підметом."
        correct: false
        explanation: Тема залежить від контексту, а не лише від граматичної ролі.
      - statement: "Фінальна позиція часто є сильною для реми."
        correct: true
        explanation: Кінець речення часто сприймається як смисловий центр.
      - statement: "Частка лише завжди виділяє виконавця незалежно від позиції."
        correct: false
        explanation: Значення залежить від того, біля якого слова стоїть частка.
      - statement: "Постпозиція означення може створювати художній відтінок."
        correct: true
        explanation: Порядок на кшталт "дорога далека" стилістично маркований.
      - statement: "У службовому тексті інверсія має бути особливо прозорою."
        correct: true
        explanation: Адресат має швидко зрозуміти процедуру або відповідальність.
      - statement: "Речення «Це був мій брат, хто купив квитки» є найприроднішим українським варіантом."
        correct: false
        explanation: Краще «Квитки купив мій брат» або «Саме мій брат купив квитки».
      - statement: "Навіть може створювати риторичний ефект несподіваності."
        correct: true
        explanation: Частка показує, що факт порушує очікування.
      - statement: "Інверсія без контексту ніколи не змінює сприйняття речення."
        correct: false
        explanation: Порядок слів завжди впливає на фокус і ритм.
      - statement: "Таки часто підтверджує результат після сумніву або перешкоди."
        correct: true
        explanation: Саме такий відтінок має "команда таки подала звіт".
      - statement: "Двозначність неважлива, якщо речення звучить урочисто."
        correct: false
        explanation: Ясність важливіша за декоративний ефект.

  - type: unjumble
    title: "Склади речення з потрібним наголосом"
    instruction: Склади природне речення з поданих слів.
    items:
      - words: ["Звіт", "уважно", "перевірила", "редакторка", "після", "засідання."]
        answer: "Звіт уважно перевірила редакторка після засідання."
      - words: ["Саме", "мешканці", "запропонували", "новий", "графік", "чергування."]
        answer: "Саме мешканці запропонували новий графік чергування."
      - words: ["У", "чаті", "з'явилося", "повідомлення", "про", "зустріч."]
        answer: "У чаті з'явилося повідомлення про зустріч."
      - words: ["Комісія", "лише", "підписала", "протокол", "без", "додатків."]
        answer: "Комісія лише підписала протокол без додатків."
      - words: ["Навіть", "критики", "підтримали", "остаточну", "редакцію", "документа."]
        answer: "Навіть критики підтримали остаточну редакцію документа."
      - words: ["Після", "перерви", "виступила", "модераторка", "громадської", "зустрічі."]
        answer: "Після перерви виступила модераторка громадської зустрічі."
      - words: ["Презентацію", "підготувала", "саме", "редакторка", "до", "зустрічі."]
        answer: "Презентацію підготувала саме редакторка до зустрічі."
      - words: ["Команда", "таки", "подала", "заявку", "до", "п'ятниці."]
        answer: "Команда таки подала заявку до п'ятниці."

  - type: mark-the-words
    title: "Познач засоби наголошування"
    instruction: Познач слова, які створюють логічний наголос у тексті.
    text: "Саме волонтери запропонували новий графік. Звіт перевірила редакторка, а додатки команда лише підготувала. Навіть сусіди, які спершу сумнівалися, таки підтримали зміни."
    answers:
      - "Саме"
      - "волонтери"
      - "Звіт"
      - "редакторка"
      - "лише"
      - "Навіть"
      - "таки"

  - type: essay-response
    id: emphasis-style-rewrite
    title: "Редакторське есе: зміна фокусу"
    instruction: Напиши коротке есе українською, використовуючи інверсію та частки доречно, без калькованих конструкцій.
    prompt: "Перепиши нейтральний абзац так, щоб у першій версії фокус був на виконавцях, а в другій - на часі або умові. Поясни, які засоби наголошування ти використав і чому вони доречні для публіцистичного або службового стилю."
    min_words: 150
    model_answer: "Нейтральний варіант: комісія розглянула звернення після консультацій і передала висновок секретаріату. Якщо фокус потрібний на виконавцях, можна написати: Звернення після консультацій розглянула комісія, а висновок секретаріату передала редакторська група. Кінцева позиція виділяє відповідальних осіб. Якщо фокус потрібний на умові, краще: Після консультацій комісія розглянула звернення, а після повторної перевірки редакторська група передала висновок секретаріату. Тут початкові обставини організують послідовність. У службовому стилі я не додаю зайвих часток, бо головна мета - прозорість. У публіцистичному коментарі можна підсилити контраст: Саме комісія розглянула звернення, хоча попередньо рішення очікували від робочої групи."
    rubric:
      - criteria: "Фокус"
        description: "Тема й рема змінені свідомо, а не випадково."
        points: 3
      - criteria: "Доречність"
        description: "Інверсія та частки відповідають обраному стилю."
        points: 3
      - criteria: "Природність"
        description: "Немає кальок на кшталт чужорідних видільних конструкцій."
        points: 2
      - criteria: "Пояснення"
        description: "Автор пояснює, які засоби використано і який ефект вони мають."
        points: 2

  - type: critical-analysis
    id: emphasis-register-check
    title: "Редакторська перевірка: стиль і двозначність"
    instruction: Проаналізуй пари речень і визнач, де інверсія допомагає, а де заважає.
    target_text: "1. Комісія розгляне заяву після отримання додатків. 2. Заяву після отримання додатків розгляне комісія. 3. До заяви додати потрібно копію документа урочисту. 4. До заяви потрібно додати копію документа. 5. Рішення підтримали навіть опоненти. 6. Навіть рішення підтримали опоненти."
    questions:
      - Яке речення найкраще підходить для нейтральної інструкції?
      - Де інверсія природно виділяє виконавця?
      - Яке речення має стилістично невдалу постпозицію означення?
      - Де частка навіть змінює фокус із виконавця на об'єкт?
    model_answers:
      - Речення 4 найпрозоріше для інструкції.
      - Речення 2 може виділяти комісію як відповідального виконавця.
      - Речення 3 невдале, бо "документа урочисту" руйнує службовий стиль.
      - У реченні 6 "навіть" виділяє рішення, а не опонентів.
    focus_points:
      - службовий стиль
      - постпозиція означення
      - місце частки
      - двозначність
