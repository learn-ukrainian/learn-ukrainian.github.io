version: '1.0'
module: emphasis-and-inversion
level: b2
inline:
- type: select
  title: Де рема?
  instruction: Виберіть правильний опис фокусу в реченні.
  items:
  - question: 'Контекст: Команда готувала публічний звіт. Чернетку перевірила редакторка. Що у фокусі другого речення?'
    options:
    - text: виконавиця перевірки
      correct: true
    - text: сам факт існування чернетки
      correct: false
    - text: місце перевірки
      correct: false
    - text: причина перевірки
      correct: false
    explanation: Об'єкт уже відомий, а новим є те, хто саме перевірив.
  - question: 'Яке речення найкраще відповідає на питання: коли подали звіт?'
    options:
    - text: Звіт команда подала учора.
      correct: true
    - text: Команда подала звіт.
      correct: false
    - text: Учора звіт подала команда.
      correct: false
    - text: Звіт подала команда.
      correct: false
    explanation: Фінальна позиція 'учора' підтримує часовий фокус.
  - question: Де порядок найспокійніший для довідки без спеціального наголосу?
    options:
    - text: Комісія розглянула звернення на ранковому засіданні.
      correct: true
    - text: Звернення на ранковому засіданні розглянула комісія.
      correct: false
    - text: На ранковому засіданні звернення розглянула комісія.
      correct: false
    - text: Розглянула комісія звернення на ранковому засіданні.
      correct: false
    explanation: Нейтральний порядок не створює прихованого протиставлення.
  - question: Де початковий об'єкт мотивований контрастом?
    min_correct: 2
    options:
    - text: Заявку ми подали вчасно, а додатки надішлемо завтра.
      correct: true
    - text: Факти комісія перевірила, оцінки залишила авторам.
      correct: true
    - text: Додатки менеджер надіслав електронною поштою.
      correct: false
    - text: Файл автор відкрив на комп'ютері.
      correct: false
    explanation: У перших двох реченнях початкові об'єкти організують порівняння.
  - question: Де інверсія створює новий фокус на виконавцеві?
    min_correct: 2
    options:
    - text: Рішення підтримали депутати трьох фракцій.
      correct: true
    - text: Звіт перевірила редакторка.
      correct: true
    - text: Депутати трьох фракцій підтримали рішення.
      correct: false
    - text: Редакторка перевірила звіт.
      correct: false
    explanation: Фінальна позиція виконавця відповідає на питання 'хто саме?'.
  - question: 'Яке речення відповідає на питання: хто саме долучився?'
    options:
    - text: До обговорення долучилися представники перевізника.
      correct: false
    - text: До обговорення долучилися саме представники перевізника.
      correct: true
    - text: Представники перевізника долучилися до обговорення.
      correct: false
    - text: Обговорення відбулося після обіду.
      correct: false
    explanation: Саме виділяє виконавців.
  - question: Де початкова рамка місця звучить природно?
    options:
    - text: У чаті з’явилося повідомлення.
      correct: true
    - text: На екрані з’явилися результати.
      correct: true
    - text: Повідомлення у чаті з’явилося, якщо треба простий порядок.
      correct: false
    - text: Результати на екрані з’явилися важливі.
      correct: false
    explanation: Початкова рамка створює сцену.
  - question: Де нейтральна правка найпрозоріша?
    options:
    - text: Команда вчасно подала важливий звіт.
      correct: true
    - text: Документи можна подати повторно до п’ятниці.
      correct: true
    - text: Звіт важливий подала команда вчасно.
      correct: false
    - text: До п’ятниці документи подати повторно можна.
      correct: false
    explanation: Нейтральний порядок зменшує напруження.
- type: match-up
  title: Механізм фокусу
  instruction: Зіставте речення з механізмом, який створює фокус.
  pairs:
  - left: Після перерви виступила модераторка.
    right: часова рамка на початку
  - left: Заявку ми подали, а додатки надішлемо завтра.
    right: контрастне винесення додатка
  - left: Звіт перевірила редакторка.
    right: фінальний фокус на виконавцеві
  - left: Саме звіт команда подала учора.
    right: частка біля об'єкта
  - left: Документи можна подати повторно до п'ятниці.
    right: нейтральний порядок для інструкції
  - left: Документи можна подати повторно до п’ятниці.
    right: нейтральна службова довідка
  - left: Саме редакторка перевірила звіт.
    right: лексичне виділення виконавиці
  - left: Менеджер перевірив лише додатки.
    right: обмеження об’єкта
  - left: Рішення таки ухвалили.
    right: підтверджений результат
  - left: Навіть досвідчені редактори помиляються.
    right: підсилення несподіваності
- type: fill-in
  title: Поставте частку біля фокусу
  instruction: Заповніть пропуск часткою або фокусним словом.
  items:
  - sentence: ____ редакторка перевірила звіт, а не автор.
    answer: Саме
    options:
    - Саме
    - Лише
    - Там
    - Тому
    explanation: '''Саме'' точно виділяє виконавицю.'
  - sentence: Редакторка перевірила ____ звіт, а довідку залишила на завтра.
    answer: саме
    options:
    - саме
    - таки
    - ж
    - навіть
    explanation: Частка має стояти біля об'єкта, який протиставляється.
  - sentence: Менеджер перевірив ____ додатки, а основний файл ще ні.
    answer: лише
    options:
    - лише
    - таки
    - де
    - чим
    explanation: '''Лише'' обмежує обсяг перевірки.'
  - sentence: ____ досвідчені редактори іноді пропускають неясний фокус.
    answer: Навіть
    options:
    - Навіть
    - Тоді
    - Туди
    - Скільки
    explanation: '''Навіть'' підсилює несподіваність.'
  - sentence: Команда ____ встигла оновити форму до запуску.
    answer: таки
    options:
    - таки
    - саме
    - лише
    - де
    explanation: '''Таки'' підкреслює підтверджений результат.'
  - sentence: Звіт ____ перевірила редакторка, а не автор.
    answer: саме
    options:
    - саме
    - лише
    - таки
    - де
    explanation: Фокус на виконавиці можна показати часткою саме.
  - sentence: Команда подала звіт ____ вчора, а не сьогодні.
    answer: саме
    options:
    - саме
    - лише
    - ж
    - навіть
    explanation: Частка стоїть біля часу.
  - sentence: ____ команда встигла подати звіт після трьох правок.
    answer: Навіть
    options:
    - Навіть
    - Туди
    - Тоді
    - Скільки
    explanation: Навіть показує несподіваність.
  - sentence: Документи ____ треба подати сьогодні, якщо дедлайн не змінився.
    answer: ж
    options:
    - ж
    - саме
    - лише
    - куди
    explanation: Ж повертає увагу до вже відомого обов’язку.
  - sentence: Редакторка перевірила ____ чернетку, а не всі додатки.
    answer: лише
    options:
    - лише
    - таки
    - навіть
    - тоді
    explanation: Лише обмежує об’єкт.
- type: group-sort
  title: Регістр і фокус
  instruction: Розподіліть речення за жанром, де такий порядок найдоречніший.
  groups:
  - name: Службова інструкція
    items:
    - Документи можна подати повторно до п'ятниці.
    - Комісія розгляне заяву на наступному засіданні.
    - Заявник додає копію квитанції до основного файлу.
  - name: Новина або аналітика
    items:
    - Після перерви виступила модераторка.
    - Рішення підтримали депутати трьох фракцій.
    - На екрані з'явилися результати опитування.
  - name: Контрастний аргумент
    items:
    - Факти комісія перевірила, оцінки залишила авторам.
    - Заявку ми подали, а додатки надішлемо завтра.
    - Оплату сервіс підтвердив, повернення ще не оформив.
  - name: Розмовний або публіцистичний тон
    items:
    - Звіт же треба подати сьогодні.
    - Команда таки встигла.
    - Саме цього рішення чекали учасники.
- type: error-correction
  title: Безпечна нейтралізація
  instruction: Виберіть правку, яка прибирає невдалу інверсію або двозначність.
  items:
  - sentence: До обговорення завтра долучаться представники перевізника.
    error: До обговорення завтра
    correction: Представники перевізника долучаться до завтрашнього обговорення.
    options:
    - Представники перевізника долучаться до завтрашнього обговорення.
    - До обговорення завтра долучаться представники перевізника.
    - До завтра обговорення долучаться представники перевізника.
    - Представники до обговорення перевізника завтра долучаться.
    explanation: Правка знімає двозначність між датою події й датою дії.
  - sentence: Звіт важливий подала команда вчасно.
    error: Звіт важливий подала
    correction: Команда вчасно подала важливий звіт.
    options:
    - Команда вчасно подала важливий звіт.
    - Звіт важливий подала команда вчасно.
    - Вчасно важливий подала звіт команда.
    - Подала важливий команда звіт вчасно.
    explanation: Означення має стояти біля іменника, а дія має читатися без пошуку зв'язків.
  - sentence: Менеджер лише перевірив додатки, а основний файл залишився без уваги.
    error: лише перевірив
    correction: Менеджер перевірив лише додатки, а основний файл залишився без уваги.
    options:
    - Менеджер перевірив лише додатки, а основний файл залишився без уваги.
    - Менеджер лише перевірив додатки, а основний файл залишився без уваги.
    - Лише менеджер перевірив додатки, а основний файл залишився без уваги.
    - Менеджер перевірив додатки лише, а основний файл залишився без уваги.
    explanation: Частка має обмежувати об'єкт 'додатки', а не дію 'перевірив'.
  - sentence: Ті після консультації пропозиції комісія залишила, які мали фінансування.
    error: Ті після консультації пропозиції
    correction: Після консультації комісія залишила ті пропозиції, які мали фінансування.
    options:
    - Після консультації комісія залишила ті пропозиції, які мали фінансування.
    - Ті після консультації пропозиції комісія залишила, які мали фінансування.
    - Комісія ті після консультації залишила пропозиції, які мали фінансування.
    - Після ті консультації пропозиції комісія залишила, які мали фінансування.
    explanation: Корелят і іменник не треба розривати.
  - sentence: До п'ятниці документи подати повторно можна.
    error: подати повторно можна
    correction: Документи можна подати повторно до п'ятниці.
    options:
    - Документи можна подати повторно до п'ятниці.
    - До п'ятниці документи подати повторно можна.
    - Документи до п'ятниці повторно можна подати, якщо.
    - Можна документи до п'ятниці повторно, подати.
    explanation: Для нейтральної інструкції прозоріший порядок із модальним словом перед інфінітивом.
  - sentence: Команда саме подала звіт, хоча треба виділити об’єкт.
    error: саме подала
    correction: Команда подала саме звіт.
    options:
    - Команда подала саме звіт.
    - Команда саме подала звіт.
    - Саме команда подала звіт.
    - Команда подала звіт саме.
    explanation: Саме має стояти біля слова у фокусі.
  - sentence: Після обіду, виступила модераторка.
    error: обіду, виступила
    correction: Після обіду виступила модераторка.
    options:
    - Після обіду виступила модераторка.
    - Після обіду, виступила модераторка.
    - Після, обіду виступила модераторка.
    - Після обіду виступила, модераторка.
    explanation: Коротка початкова обставина не потребує коми.
  - sentence: Заявку ми подали, а завтра додатки надішлемо, хоча треба паралельний контраст.
    error: завтра додатки
    correction: Заявку ми подали, а додатки надішлемо завтра.
    options:
    - Заявку ми подали, а додатки надішлемо завтра.
    - Заявку ми подали, а завтра додатки надішлемо.
    - Ми заявку подали, а завтра додатки.
    - Подали заявку ми, а додатки завтра надішлемо.
    explanation: Паралельність додатків робить контраст видимим.
workbook:
- type: select
  title: Виберіть доречний порядок
  instruction: Визначте, де порядок слів відповідає контексту.
  items:
  - question: 'Контекст: У попередньому реченні йшлося про звернення. Яка відповідь найкраща?'
    options:
    - text: Звернення комісія розгляне на наступному засіданні.
      correct: true
    - text: Комісія розгляне звернення на наступному засіданні.
      correct: false
    - text: Розгляне звернення комісія на наступному засіданні.
      correct: false
    - text: На наступному комісія звернення засіданні розгляне.
      correct: false
    explanation: Відомий об'єкт може вийти на початок.
  - question: 'Контекст: Треба спокійно повідомити дедлайн у довідці.'
    options:
    - text: Документи можна подати повторно до п'ятниці.
      correct: true
    - text: До п'ятниці документи подати повторно можна.
      correct: false
    - text: Подати документи повторно до п'ятниці можна, документи.
      correct: false
    - text: До п'ятниці можна документи повторно, подати.
      correct: false
    explanation: Нейтральний порядок краще пасує до довідки.
  - question: Де частка стоїть біля правильного фокусу?
    min_correct: 2
    options:
    - text: Команда перевірила саме додатки.
      correct: true
    - text: Саме команда перевірила додатки.
      correct: true
    - text: Команда саме перевірила додатки, хоча треба сказати про об'єкт.
      correct: false
    - text: Команда перевірила додатки саме, хоча треба виділити виконавця.
      correct: false
    explanation: Позиція частки визначає, що саме підсилено.
  - question: Де інверсія може бути публіцистичною, але не найкращою для інструкції?
    min_correct: 2
    options:
    - text: На екрані з'явилися результати опитування.
      correct: true
    - text: Рішення чекало все місто.
      correct: true
    - text: Заявник додає копію паспорта.
      correct: false
    - text: Форма містить три обов'язкові поля.
      correct: false
    explanation: Перші два речення мають описовий або публіцистичний рух.
  - question: Де варто повернутися до нейтрального порядку?
    min_correct: 2
    options:
    - text: Звіт важливий подала команда вчасно.
      correct: true
    - text: До обговорення завтра долучаться представники перевізника.
      correct: true
    - text: Заявку ми подали, а додатки надішлемо завтра.
      correct: false
    - text: Після перерви виступила модераторка.
      correct: false
    explanation: Перші два речення мають непрозорі зв'язки або двозначність.
  - question: Де частка не зміщує фокус випадково?
    options:
    - text: Менеджер перевірив лише додатки.
      correct: true
    - text: Саме команда подала звіт.
      correct: true
    - text: Менеджер лише перевірив додатки, якщо треба сказати про об’єкт.
      correct: false
    - text: Команда подала звіт саме, якщо треба виділити виконавця.
      correct: false
    explanation: Частка має стояти біля потрібного слова.
  - question: Де інверсія мотивована попередньою темою?
    options:
    - text: Заявку ми подали вчасно, а додатки надішлемо завтра.
      correct: true
    - text: Факти комісія перевірила, оцінки лишила авторам.
      correct: true
    - text: Файл автор відкрив уранці без попереднього контексту.
      correct: false
    - text: Звіт важливий подала команда.
      correct: false
    explanation: Відомий або контрастний об’єкт може стояти на початку.
  - question: Де кома пояснюється реальною межею, а не самою інверсією?
    options:
    - text: Після перерви, коли учасники повернулися, виступила модераторка.
      correct: true
    - text: Звіт, який перевірила редакторка, повернули авторові.
      correct: true
    - text: Після перерви, виступила модераторка.
      correct: false
    - text: Звіт перевірила, редакторка.
      correct: false
    explanation: Коми позначають підрядну частину, а не будь-яку перестановку.
- type: fill-in
  title: Нейтральна чи емфатична версія
  instruction: Доберіть слово або частку, щоб речення відповідало заданому фокусу.
  items:
  - sentence: 'Фокус на виконавцеві: Звіт перевірила ____.'
    answer: редакторка
    options:
    - редакторка
    - учора
    - саме
    - лише
    explanation: Фінальна позиція називає нового виконавця.
  - sentence: 'Фокус на об''єкті: Команда подала ____ звіт, а не довідку.'
    answer: саме
    options:
    - саме
    - таки
    - ж
    - навіть
    explanation: Частка 'саме' стоїть біля об'єкта.
