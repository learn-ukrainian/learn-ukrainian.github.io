version: '1.0'
module: stylistic-connectors
level: b2
inline: []
workbook:
  - type: critical-analysis
    id: connectors-reading-brief
    title: "Аналіз тексту: сервісне повідомлення"
    instruction: "Прочитай текст і проаналізуй засоби зв'язку між реченнями."
    target_text: "Сервіс доставки працює швидко, однак правила повернення залишаються складними. Клієнт отримує товар за день, водночас не завжди розуміє, які документи потрібні для компенсації. Саме тому підтримка отримує багато повторних запитань. Якщо інструкцію скоротити й додати приклади, покупець швидше знайде відповідь; отже, працівники зможуть розв'язувати складніші випадки."
    questions:
      - "Який конектор вводить протиставлення між швидкою доставкою й складним поверненням?"
      - "Де слово водночас показує паралельні оцінки сервісу?"
      - "Яке речення містить наслідок попередньої причини?"
      - "Чому отже тут є висновком, а не черговим фактом?"
      - "Яку анафоричну роль виконує слово інструкцію?"
    model_answers:
      - "Протиставлення вводить конектор **однак**: він показує напругу між швидкою доставкою й складними правилами повернення."
      - "Слово **водночас** стоїть у другому реченні й поєднує дві паралельні оцінки: клієнт швидко отримує товар, але не завжди розуміє порядок компенсації."
      - "Наслідок попередньої причини містить речення із **саме тому**: складні правила спричиняють повторні запитання до підтримки."
      - "**Отже** є висновком, бо перед ним названо умову: якщо інструкцію скоротити й додати приклади, покупець швидше знайде відповідь."
      - "Слово **інструкцію** повертає читача до правил повернення й уточнює, що саме треба скоротити та пояснити прикладами."
    focus_points:
      - "контраст"
      - "паралельна оцінка"
      - "причина й наслідок"
      - "висновок"
      - "анафоричний зв'язок"

  - type: match-up
    title: "Конектор і функція"
    instruction: "Поєднай конектор із його типовою функцією."
    pairs:
      - left: "однак"
        right: "книжніше протиставлення"
      - left: "водночас"
        right: "паралельна оцінка або обмеження"
      - left: "натомість"
        right: "альтернатива або заміна"
      - left: "зокрема"
        right: "уточнення через приклад"
      - left: "саме тому"
        right: "підсилений наслідок названої причини"
      - left: "оскільки"
        right: "книжніша причина"
      - left: "ба більше"
        right: "риторичне нарощення аргументу"
      - left: "отже"
        right: "висновок після доказів"
      - left: "попри це"
        right: "дія всупереч перешкоді"
      - left: "після цього"
        right: "послідовність дій"
      - left: "тобто"
        right: "пояснення або переформулювання"
      - left: "наприклад"
        right: "конкретний приклад до загальної думки"

  - type: group-sort
    title: "Сортування за логічним зв'язком"
    instruction: "Розподіли засоби зв'язку за основною функцією."
    groups:
      - name: "Додавання"
        items: ["також", "крім того", "до того ж", "ба більше"]
      - name: "Протиставлення"
        items: ["однак", "проте", "водночас", "натомість"]
      - name: "Причина"
        items: ["бо", "оскільки", "адже", "з огляду на"]
      - name: "Наслідок і висновок"
        items: ["тому", "отже", "саме тому", "у такий спосіб"]
      - name: "Приклад і уточнення"
        items: ["зокрема", "наприклад", "тобто", "скажімо"]

  - type: fill-in
    title: "Добери конектор"
    instruction: "Заповни пропуск так, щоб логічний зв'язок був точним."
    items:
      - sentence: "Сервіс працює швидко, ____ правила повернення складні."
        answer: "однак"
        options: ["однак", "зокрема", "тому", "наприклад"]
        explanation: "Потрібне протиставлення між перевагою й проблемою."
      - sentence: "Клієнт не отримав чек, ____ не зміг оформити повернення."
        answer: "тому"
        options: ["тому", "натомість", "зокрема", "утім"]
        explanation: "Друге речення називає наслідок першого."
      - sentence: "Інструкцію варто скоротити, ____ клієнти читають її з телефона."
        answer: "оскільки"
        options: ["оскільки", "натомість", "отже", "наприклад"]
        explanation: "Потрібна причина."
      - sentence: "Магазин приймає оплату карткою; ____ можна сплатити після доставки."
        answer: "також"
        options: ["також", "проте", "саме тому", "попри це"]
        explanation: "Друга можливість додається до першої."
      - sentence: "Один майстер бере передплату, ____ інший працює після огляду."
        answer: "натомість"
        options: ["натомість", "адже", "отже", "зокрема"]
        explanation: "Порівнюються дві альтернативні моделі."
      - sentence: "Правила стали коротшими; ____ клієнти швидше знаходять потрібний пункт."
        answer: "саме тому"
        options: ["саме тому", "скажімо", "утім", "водночас"]
        explanation: "Конектор підсилює наслідок попередньої причини."
      - sentence: "Є кілька потрібних документів, ____ чек і номер замовлення."
        answer: "зокрема"
        options: ["зокрема", "однак", "тож", "попри це"]
        explanation: "Потрібне уточнення через приклади."
      - sentence: "Заявку можна подати онлайн. ____, система іноді не зберігає чернетку."
        answer: "Утім"
        options: ["Утім", "Наприклад", "Отже", "До того ж"]
        explanation: "Друге речення м'яко обмежує попередню перевагу."
      - sentence: "Кур'єр не мав підтвердженої адреси; ____ доставка затрималася."
        answer: "через це"
        options: ["через це", "зокрема", "натомість", "скажімо"]
        explanation: "Потрібен наслідок конкретної причини."
      - sentence: "Ми перевірили оплату, доставку й повернення. ____, головна проблема - нечітка інструкція."
        answer: "Отже"
        options: ["Отже", "Бо", "Натомість", "Крім того"]
        explanation: "Після переліку доказів іде висновок."

  - type: select
    title: "Точний вибір"
    instruction: "Обери всі речення, де засіб зв'язку використано доречно."
    items:
      - question: "Де конектор справді передає протиставлення?"
        min_correct: 2
        options:
          - text: "Сервіс зручний, однак інструкція потребує редагування."
            correct: true
          - text: "Клієнт отримав чек, однак чек підтверджує оплату."
            correct: false
          - text: "Майстер працює швидко, проте не пояснює вартість деталей."
            correct: true
          - text: "Замовлення створено, проте його номер 4182."
            correct: false
          - text: "Квитанцію знайдено, проте проблема вже розв'язана."
            correct: false
        explanation: "Протиставлення має показувати реальну напругу між двома думками."
      - question: "Де натомість ужито як альтернативу?"
        min_correct: 2
        options:
          - text: "Один сервіс бере передплату, натомість інший дає змогу оплатити після доставки."
            correct: true
          - text: "Магазин працює до восьмої, натомість касир усміхнувся."
            correct: false
          - text: "Покупець не хоче обміну, натомість просить повернути кошти."
            correct: true
          - text: "Кур'єр приїхав вчасно, натомість товар був у коробці."
            correct: false
          - text: "Покупець зберіг чек, натомість чек підтвердив оплату."
            correct: false
        explanation: "Натомість порівнює альтернативні дії, умови або бажання."
      - question: "Де отже вводить висновок?"
        min_correct: 2
        options:
          - text: "Ми перевірили три скарги й побачили ту саму помилку. Отже, форму треба змінити."
            correct: true
          - text: "Клієнт купив товар. Отже, товар був синій."
            correct: false
          - text: "Правила довгі, прикладів мало, а терміни не пояснено. Отже, інструкція не працює."
            correct: true
          - text: "Оплату прийнято. Отже, каса стоїть біля входу."
            correct: false
          - text: "Клієнт написав відгук. Отже, двері відчинилися."
            correct: false
        explanation: "Отже має спиратися на попередні докази або спостереження."
      - question: "Де займенник не створює двозначності?"
        min_correct: 2
        options:
          - text: "Клієнт оформив замовлення. Він отримав підтвердження за хвилину."
            correct: true
          - text: "Продавець поговорив із клієнтом після дзвінка кур'єра. Він попросив зачекати."
            correct: false
          - text: "Інструкція має три кроки. Вона пояснює оплату, доставку й повернення."
            correct: true
          - text: "Майстер передав менеджеру заявку клієнта. Він її загубив."
            correct: false
          - text: "Кур'єр зателефонував майстрові після розмови з клієнтом. Він запізнився."
            correct: false
        explanation: "Займенник безпечний лише тоді, коли попередник очевидний."
      - question: "Де регістр відповідає ситуації?"
        min_correct: 2
        options:
          - text: "У повідомленні клієнтові: Оплату не підтверджено, тому просимо повторити платіж."
            correct: true
          - text: "У чаті з покупцем: З огляду на невиконання платіжної операції повідомляємо про неможливість відправлення."
            correct: false
          - text: "У протоколі: З огляду на відсутність підтвердження оплату перевірять повторно."
            correct: true
          - text: "В офіційному рішенні: Ну бо оплата не пройшла, чекаємо."
            correct: false
          - text: "У службовій записці: Та ми просто не бачимо грошей, тому нічого не шлемо."
            correct: false
        explanation: "Клієнтський, службовий і розмовний регістри потребують різних формул."
      - question: "Де зокрема вводить приклад?"
        min_correct: 2
        options:
          - text: "Сервіс має кілька переваг, зокрема швидку доставку й прозору оплату."
            correct: true
          - text: "Сервіс працює до восьмої, зокрема касир зачинив двері."
            correct: false
          - text: "Для повернення потрібні документи, зокрема чек або номер замовлення."
            correct: true
          - text: "Кур'єр запізнився, зокрема клієнт залишив відгук."
            correct: false
          - text: "Оплату підтверджено, зокрема магазин працює завтра."
            correct: false
        explanation: "Зокрема має конкретизувати загальну думку, а не з'єднувати випадкові факти."
      - question: "Де тому називає наслідок?"
        min_correct: 2
        options:
          - text: "Квитанції немає, тому повернення перевірять за номером замовлення."
            correct: true
          - text: "Квитанції немає, тому магазин має синю вивіску."
            correct: false
          - text: "Оплату не підтверджено, тому товар поки не відправляють."
            correct: true
          - text: "Кур'єр приїхав рано, тому в коробці лежить інструкція."
            correct: false
          - text: "Сервіс працює швидко, тому слово сервіс має шість літер."
            correct: false
        explanation: "Тому має вводити наслідок попередньої причини."
      - question: "Де водночас передає паралельну оцінку?"
        min_correct: 2
        options:
          - text: "Послуга зручна, водночас правила оплати треба уточнити."
            correct: true
          - text: "Каса стоїть праворуч, водночас номер замовлення починається з чотирьох."
            correct: false
          - text: "Майстер працює швидко, водночас уважно пояснює вартість деталей."
            correct: true
          - text: "Покупець зайшов у магазин, водночас товар був у пакеті."
            correct: false
          - text: "Доставка триває день, водночас слово день має один склад."
            correct: false
        explanation: "Водночас має поєднувати дві релевантні оцінки або характеристики."

  - type: error-correction
    title: "Редагування засобів зв'язку"
    instruction: "Знайди невдалий засіб зв'язку й заміни його точнішим."
    items:
      - sentence: "Сервіс зручний, при цьому інструкція складна."
        error: "при цьому"
        correction: "однак"
        error_type: "register"
        options: ["однак", "зокрема", "тому", "наприклад"]
        explanation: "У навчальному письмі природніше використати однак, проте або утім."
      - sentence: "Клієнт не отримав чек. Отже, касир не надрукував його."
        error: "Отже"
        correction: "бо"
        error_type: "construction"
        options: ["бо", "зокрема", "натомість", "до того ж"]
        explanation: "Друге речення називає причину, а не висновок."
      - sentence: "Майстер працює швидко, натомість пояснює кожен етап."
        error: "натомість"
        correction: "водночас"
        error_type: "construction"
        options: ["водночас", "оскільки", "саме тому", "наприклад"]
        explanation: "Пояснення не замінює швидкість, а існує паралельно з нею."
      - sentence: "Через факт наявності помилки, заявку відхилено."
        error: "Через факт наявності помилки"
        correction: "Оскільки в заявці була помилка"
        error_type: "register"
        options: ["Оскільки в заявці була помилка", "Отже мала місце заявка", "Натомість була помилка", "Зокрема відхилено"]
        explanation: "Канцелярську конструкцію краще скоротити."
      - sentence: "Продавець поговорив із клієнтом після дзвінка майстра. Він попросив повернути товар."
        error: "Він"
        correction: "Клієнт"
        error_type: "construction"
        options: ["Клієнт", "Тому", "Зокрема", "Такий"]
        explanation: "Потрібно назвати учасника, щоб прибрати двозначність."
      - sentence: "Правила довгі. Крім того, клієнти не читають їх до оплати."
        error: "Крім того"
        correction: "Тому"
        error_type: "construction"
        options: ["Тому", "Натомість", "Зокрема", "Проте"]
        explanation: "Друге речення є наслідком першого."
      - sentence: "Один сервіс бере передплату, водночас інший дає змогу оплатити після доставки."
        error: "водночас"
        correction: "натомість"
        error_type: "construction"
        options: ["натомість", "адже", "саме тому", "зокрема"]
        explanation: "Порівнюються альтернативні умови двох сервісів."
      - sentence: "Ми перевірили оплату, доставку й повернення. Бо інструкцію треба переписати."
        error: "Бо"
        correction: "Отже"
        error_type: "construction"
        options: ["Отже", "Але", "Наприклад", "Адже"]
        explanation: "Після перевірки кількох фактів потрібен висновок."

  - type: comparative-study
    id: connectors-register-comparison
    title: "Порівняння регістру"
    instruction: "Порівняй пари речень і поясни, який варіант доречніший у заданій ситуації."
    items_to_compare:
      - "Повідомлення клієнтові: Оплату не підтверджено, тому просимо повторити платіж. / З огляду на непідтвердження платіжної операції повідомляємо про неможливість відправлення."
      - "Аналітична записка: Оскільки правила повернення нечіткі, підтримка отримує повторні запитання. / Бо правила повернення нечіткі, підтримка отримує повторні запитання."
      - "Публічний допис: Ми переписали правила. Бо старі були довгі. Бо люди губилися. / Ми переписали правила, через факт надмірної довжини старих правил і наявності труднощів користувачів."
      - "Інструкція: Спочатку перевірте номер замовлення. Після цього відкрийте розділ повернення. / Насамперед варто звернутися до розгляду питання ідентифікації замовлення."
    criteria:
      - "відповідність жанру"
      - "точність логічного зв'язку"
      - "стислість без втрати змісту"
      - "природність українського формулювання"
    prompt: "Для кожної пари назви доречніший варіант і поясни, який конектор або формула робить його кращим."
    model_answer: "У першій парі для повідомлення клієнтові доречніший короткий варіант із **тому**: він прямо називає наслідок і не перевантажує читача. У другій парі для аналітичної записки краще **оскільки**, бо воно звучить стриманіше за **бо**. У третій парі для публічного допису мотивований повтор **бо** створює ритм; канцелярська формула робить текст важким. У четвертій парі інструкція потребує простих кроків **спочатку** й **після цього**, а не абстрактного вступу."

  - type: essay-response
    id: connectors-genre-transform
    title: "Жанрова трансформація"
    instruction: "Перепиши той самий зміст у двох жанрах."
    prompt: "Є зміст: **оплату не підтверджено; товар не можна відправити; клієнт може повторити платіж або надіслати квитанцію; після підтвердження склад передасть товар кур'єру**. Напиши два варіанти: коротке повідомлення клієнтові й фрагмент службової записки. У кожному використай щонайменше три засоби зв'язку й після текстів поясни різницю регістру."
    min_words: 170
    model_answer: "Повідомлення клієнтові: Оплату поки не підтверджено, тому ми не можемо відправити товар. Будь ласка, повторіть платіж або надішліть квитанцію. Після підтвердження склад одразу передасть замовлення кур'єру. Службова записка: Оскільки оплату за замовлення не підтверджено, відправлення товару тимчасово призупинено. Клієнтові запропоновано повторити платіж або надіслати квитанцію; після отримання підтвердження склад передасть товар кур'єру. У першому варіанті я використовую простіші конектори **тому** й **після**, бо клієнтові потрібна дія. У другому варіанті доречніші **оскільки** й крапка з комою, бо службова записка має бути стриманішою."
    rubric:
      - criteria: "Два жанри"
        description: "Є окремий клієнтський і службовий варіант."
        points: 3
      - criteria: "Засоби зв'язку"
        description: "У кожному варіанті використано щонайменше три доречні засоби зв'язку."
        points: 4
      - criteria: "Пояснення регістру"
        description: "Автор пояснює, чому конектори змінюються залежно від жанру."
        points: 3

  - type: essay-response
    id: connectors-paragraph-build
    title: "Побудова аналітичного абзацу"
    instruction: "Напиши зв'язний аналітичний абзац українською."
    prompt: "Побудуй абзац із п'яти речень про те, чому сервісу потрібна зрозуміла політика повернення. Обов'язково використай засоби зв'язку для додавання, протиставлення, причини, наслідку й висновку. Після абзацу познач кожен використаний засіб і назви його функцію."
    min_words: 150
    model_answer: "Зрозуміла політика повернення зменшує кількість конфліктів між магазином і покупцем. Крім того, вона економить час підтримки, бо клієнт одразу бачить, які документи потрібні. Водночас інструкція не має бути надто юридичною, інакше людина знову звертатиметься по пояснення. Саме тому правила варто писати короткими кроками й додавати приклади типових ситуацій. Отже, добра політика повернення працює як правовий текст і як сервісна інструкція. **Крім того** додає аргумент, **бо** називає причину, **водночас** вводить обмеження, **саме тому** показує наслідок, **отже** формулює висновок."
    rubric:
      - criteria: "Функції конекторів"
        description: "Використано всі п'ять потрібних функцій."
        points: 5
      - criteria: "Абзацова цілісність"
        description: "Речення підтримують одну тезу й не розпадаються на список."
        points: 3
      - criteria: "Коментар"
        description: "Пояснено функцію кожного засобу зв'язку."
        points: 2

  - type: essay-response
    id: connectors-editing-note
    title: "Редакторська записка"
    instruction: "Напиши коротку редакторську записку українською."
    prompt: "Перепиши уривок так, щоб логічні зв'язки стали точними: **Магазин швидко відправляє товари. Крім того, повернення складне. Натомість клієнти не читають правила. Через надмірну довжину правил вони ставлять багато запитань. Отже, треба зробити правила.** Після редакції поясни щонайменше три рішення щодо конекторів, анафори або регістру."
    min_words: 160
    model_answer: "Магазин швидко відправляє товари, однак повернення залишається складним. Клієнти не завжди читають довгі правила, тому ставлять багато повторних запитань. Саме тому розділ про повернення треба переписати коротше: окремо пояснити строки, документи й порядок компенсації. У першому реченні **однак** показує контраст між швидкою доставкою й проблемним поверненням. Слово **тому** передає наслідок: довгі правила спричиняють повторні запитання. Канцелярську причинову формулу я замінив простішим причиновим зв'язком, бо це повідомлення має бути зрозумілим клієнтові. У висновку **саме тому** підсилює зв'язок між проблемою й редакторською дією."
    rubric:
      - criteria: "Логічні зв'язки"
        description: "Редакція точно передає контраст, причину, наслідок і висновок."
        points: 4
      - criteria: "Регістр"
        description: "Текст звучить природно для сервісного або службового повідомлення."
        points: 3
      - criteria: "Пояснення"
        description: "Пояснено щонайменше три редакторські рішення."
        points: 3
