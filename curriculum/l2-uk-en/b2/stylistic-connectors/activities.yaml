- id: workbook-5
  type: essay-response
  title: Відредагуйте зв'язність абзацу
  instruction: Напишіть відредаговану версію абзацу й поясніть три рішення.
  prompt: 'Відредагуйте текст на 150-180 слів: ''По-перше, сервіс оновили. Також він працює швидше. З іншого боку, форма стала
    коротшою. Крім того, клієнти менше помиляються. Отже, інструкцію треба переписати. У зв''язку з цим у зв''язку з цим підтримка
    отримує менше питань.'' Збережіть зміст, але приберіть механічні конектори. Використайте щонайменше один наслідковий конектор,
    один контрастний або обмежувальний конектор і одну анафоричну заміну.'
  min_words: 150
  model_answer: 'Сервіс оновили: він працює швидше, а форма стала коротшою. Через це клієнти менше помиляються під час реєстрації
    й рідше звертаються до підтримки з однаковими питаннями. Водночас інструкція досі описує стару версію форми, тому її треба
    переписати до наступного запуску. У цій правці двокрапка замінює механічне ''по-перше'', бо далі йде пояснення. Конектор
    ''через це'' показує наслідок оновлення, а ''водночас'' вводить обмеження: сервіс уже кращий, але документація відстала.
    Займенник ''він'' відсилає до сервісу й не створює двозначності, бо поруч немає іншого можливого опорного іменника чоловічого
    роду.'
  peer_review_guidelines: Перевірте, чи збережено всі факти початкового абзацу. Позначте один наслідковий і один обмежувальний
    перехід. Переконайтеся, що займенниковий зв'язок має одну зрозумілу опору.
  rubric:
  - criteria: Логіка
    description: Конектори відповідають реальним зв'язкам між реченнями.
    points: 4
  - criteria: Регістр
    description: Стиль природний для професійного пояснення.
    points: 3
  - criteria: Редагування
    description: Механічні зв'язки замінено синтаксисом, анафорою або точнішими переходами.
    points: 3
