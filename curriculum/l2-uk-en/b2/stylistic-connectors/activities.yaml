version: '1.0'
module: stylistic-connectors
level: b2
inline:
- type: select
  title: Який зв'язок?
  instruction: Виберіть конектори, що відповідають логічному зв'язку між реченнями.
  items:
  - question: Сервіс швидко підтверджує замовлення. Клієнт одразу отримує номер посилки. Який зв'язок?
    min_correct: 2
    options:
    - text: тому
      correct: true
    - text: унаслідок цього
      correct: true
    - text: натомість
      correct: false
    - text: попри це
      correct: false
    explanation: Друге речення називає наслідок першого.
  - question: Правила повернення написані складно. Підтримка відповідає на ті самі питання щодня. Який зв'язок?
    min_correct: 2
    options:
    - text: через це
      correct: true
    - text: саме тому
      correct: true
    - text: зокрема
      correct: false
    - text: натомість
      correct: false
    explanation: Складність правил пояснює повторні питання.
  - question: Магазин не повертає гроші без чека. Він може оформити обмін. Який конектор показує альтернативу?
    options:
    - text: натомість
      correct: true
    - text: зокрема
      correct: false
    - text: отже
      correct: false
    - text: по-перше
      correct: false
    explanation: '''Натомість'' показує заміну одного варіанта іншим.'
  - question: Дані ще не перевірено. Комісія перенесла голосування. Який зв'язок у версії з початковою причиною?
    min_correct: 2
    options:
    - text: тому
      correct: true
    - text: через це
      correct: true
    - text: також
      correct: false
    - text: утім
      correct: false
    explanation: Неперевірені дані спричинили перенесення.
  - question: Чек загублено. Магазин може перевірити покупку за номером замовлення. Який зв'язок підкреслює перешкоду?
    min_correct: 2
    options:
    - text: попри це
      correct: true
    - text: незважаючи на це
      correct: true
    - text: зокрема
      correct: false
    - text: по-друге
      correct: false
    explanation: Поступка показує, що перешкода не скасувала дії.
  - question: Інструкція описує стару форму. Форму вже оновили. Який зв’язок?
    min_correct: 2
    options:
    - text: водночас
      correct: true
    - text: утім
      correct: true
    - text: зокрема
      correct: false
    - text: саме тому
      correct: false
    explanation: Друге речення обмежує або протиставляє перше.
  - question: Форма має три обов’язкові додатки. Копія паспорта є одним із них. Який конектор?
    min_correct: 2
    options:
    - text: зокрема
      correct: true
    - text: у тому числі
      correct: true
    - text: натомість
      correct: false
    - text: отже
      correct: false
    explanation: Далі подано приклад із ширшої групи.
  - question: Чек загублено. Покупку все одно можна знайти за номером. Який зв’язок?
    min_correct: 2
    options:
    - text: попри це
      correct: true
    - text: утім
      correct: true
    - text: саме тому
      correct: false
    - text: по-перше
      correct: false
    explanation: Другий факт діє всупереч перешкоді.
- type: group-sort
  title: Функції конекторів
  instruction: Розподіліть конектори за головною функцією.
  groups:
  - name: Додавання або уточнення
    items:
    - також
    - крім того
    - зокрема
    - до того ж
  - name: Контраст або альтернатива
    items:
    - однак
    - проте
    - натомість
    - водночас
  - name: Причина або пояснення
    items:
    - бо
    - оскільки
    - адже
    - через те що
  - name: Наслідок або висновок
    items:
    - тому
    - отже
    - саме тому
    - унаслідок цього
  - name: Поступка
    items:
    - хоча
    - попри це
    - незважаючи на це
    - утім
- type: fill-in
  title: Регістр і точність
  instruction: Вставте конектор, який найкраще відповідає зв'язку й регістру.
  items:
  - sentence: Ми отримали заявку, ____ в ній бракує підпису.
    answer: однак
    options:
    - однак
    - отже
    - зокрема
    - по-перше
    explanation: Є обмеження до попереднього факту.
  - sentence: Правила повернення складні, ____ підтримка щодня відповідає на ті самі питання.
    answer: тому
    options:
    - тому
    - натомість
    - зокрема
    - хоча
    explanation: Друге речення називає наслідок.
  - sentence: Сервіс має кілька переваг, ____ швидке підтвердження замовлення.
    answer: зокрема
    options:
    - зокрема
    - натомість
    - отже
    - попри це
    explanation: Далі подано приклад із ширшої групи переваг.
  - sentence: Чек загублено; ____ магазин може перевірити покупку за номером замовлення.
    answer: попри це
    options:
    - попри це
    - також
    - по-перше
    - саме тому
    explanation: Перешкода не скасувала можливості.
  - sentence: Ми перевірили умови оплати, доставки й повернення. ____ сервіс потребує прозорішої інструкції.
    answer: Отже
    options:
    - Отже
    - Бо
    - Натомість
    - Зокрема
    explanation: '''Отже'' вводить висновок після підстав.'
  - sentence: Форму оновили, ____ інструкція досі описує стару версію.
    answer: однак
    options:
    - однак
    - тому
    - зокрема
    - по-перше
    explanation: Є контраст між оновленням і старою інструкцією.
  - sentence: Заявка має кілька додатків, ____ копію квитанції.
    answer: зокрема
    options:
    - зокрема
    - попри це
    - отже
    - натомість
    explanation: Додаток є прикладом.
  - sentence: Дані неповні; ____ опитування треба повторити.
    answer: отже
    options:
    - отже
    - натомість
    - зокрема
    - хоча
    explanation: Після підстав іде висновок.
  - sentence: Паперову форму скасували; ____ користувачі подають онлайн-заявку.
    answer: натомість
    options:
    - натомість
    - зокрема
    - адже
    - по-друге
    explanation: Онлайн-заявка замінює паперову.
  - sentence: Підпису немає, ____ заяву не можна зареєструвати.
    answer: тому
    options:
    - тому
    - також
    - натомість
    - зокрема
    explanation: Відсутність підпису є причиною.
- type: match-up
  title: Анафора і катафора
  instruction: Зіставте приклад із типом текстового зв'язку.
  pairs:
  - left: Форма має три поля. Вони обов'язкові.
    right: займенникова анафора
  - left: 'Є одна проблема: підпису немає.'
    right: катафора
  - left: Квитанція, підпис, дата - ці дані потрібні для реєстрації.
    right: узагальнювальна анафора
  - left: 'Сервіс оновили: він показує попередження до надсилання.'
    right: двокрапка плюс займенниковий зв'язок
  - left: Файл був неповний, тому його повернули авторові.
    right: наслідковий конектор і займенник
  - left: Клієнт отримав код. Цей код потрібен для входу.
    right: повтор з указівним словом
  - left: Форма коротка. Вона має лише три поля.
    right: займенникова анафора
  - left: 'Проблема така: клієнт не бачить попередження.'
    right: катафора з двокрапкою
  - left: Підпис, дата, квитанція - усе це треба додати.
    right: узагальнення попереднього переліку
  - left: Інструкцію оновили; після цього кількість помилок зменшилася.
    right: послідовний часовий зв’язок
- type: error-correction
  title: Забагато або не той конектор
  instruction: Виберіть правку, де конектор відповідає змісту.
  items:
  - sentence: Сервіс оновили. З іншого боку, він працює швидше.
    error: З іншого боку
    correction: Сервіс оновили. До того ж він працює швидше.
    options:
    - Сервіс оновили. До того ж він працює швидше.
    - Сервіс оновили. З іншого боку, він працює швидше.
    - Сервіс оновили. Попри це він працює швидше.
    - Сервіс оновили. Отже він працює швидше, наприклад.
    explanation: Друге речення додає позитивний факт, а не протиставляє.
  - sentence: Ми розглянули умови оплати. Отже, доставка триває два дні.
    error: Отже
    correction: 'Ми розглянули умови оплати. Далі розглянемо доставку: вона триває два дні.'
    options:
    - 'Ми розглянули умови оплати. Далі розглянемо доставку: вона триває два дні.'
    - Ми розглянули умови оплати. Отже, доставка триває два дні.
    - Ми розглянули умови оплати. Попри це доставка триває два дні.
    - Ми розглянули умови оплати. Адже доставка триває два дні.
    explanation: '''Отже'' не вводить нову тему без висновку.'
  - sentence: Клієнт надіслав менеджеру файл після дзвінка, але він був неповний.
    error: він
    correction: Після дзвінка клієнт надіслав менеджеру файл, але у файлі бракувало підпису.
    options:
    - Після дзвінка клієнт надіслав менеджеру файл, але у файлі бракувало підпису.
    - Клієнт надіслав менеджеру файл після дзвінка, але він був неповний.
    - Клієнт він надіслав менеджеру файл після дзвінка, але був неповний.
    - Після дзвінка файл надіслав клієнта, але він менеджер був неповний.
    explanation: Повтор іменника знімає нечітку анафору.
  - sentence: По-перше, форму оновили. Також, по-перше, інструкція стара.
    error: Також, по-перше
    correction: Форму оновили, але інструкція досі описує стару версію.
    options:
    - Форму оновили, але інструкція досі описує стару версію.
    - По-перше, форму оновили. Також, по-перше, інструкція стара.
    - Форму оновили, отже, по-перше, інструкція стара.
    - Форму оновили, зокрема інструкція стара.
    explanation: Тут потрібен контраст між новою формою й старою інструкцією.
  - sentence: У зв'язку з цим форму оновили. У зв'язку з цим клієнти менше помиляються.
    error: У зв'язку з цим
    correction: Форму оновили, тому клієнти менше помиляються.
    options:
    - Форму оновили, тому клієнти менше помиляються.
    - У зв'язку з цим форму оновили. У зв'язку з цим клієнти менше помиляються.
    - Форму оновили, натомість клієнти менше помиляються.
    - Форму оновили, зокрема клієнти менше помиляються.
    explanation: Короткий наслідковий конектор точніший за повтор важкої формули.
  - sentence: Дані неповні, зокрема опитування треба повторити.
    error: зокрема
    correction: Дані неповні, тому опитування треба повторити.
    options:
    - Дані неповні, тому опитування треба повторити.
    - Дані неповні, зокрема опитування треба повторити.
    - Дані неповні, натомість опитування треба повторити.
    - Дані неповні, по-перше опитування треба повторити.
    explanation: Повторення є наслідком, а не прикладом.
  - sentence: Форму оновили, отже інструкція досі стара.
    error: отже
    correction: Форму оновили, однак інструкція досі стара.
    options:
    - Форму оновили, однак інструкція досі стара.
    - Форму оновили, отже інструкція досі стара.
    - Форму оновили, зокрема інструкція стара.
    - Форму оновили, по-друге інструкція стара.
    explanation: Це контраст, не висновок.
  - sentence: Клієнт отримав код. Він треба для входу.
    error: Він треба
    correction: Клієнт отримав код. Він потрібен для входу.
    options:
    - Клієнт отримав код. Він потрібен для входу.
    - Клієнт отримав код. Він треба для входу.
    - Клієнт отримав код. Вона потрібна для входу.
    - Клієнт отримав код. Це потрібні для входу.
    explanation: Займенник і присудкова форма мають узгоджуватися з код.
workbook:
- type: select
  title: Конектор у контексті
  instruction: Виберіть варіанти, де конектор відповідає змісту.
  items:
  - question: Де 'отже' вводить справжній висновок?
    min_correct: 2
    options:
    - text: Ми перевірили оплату, доставку й повернення. Отже, інструкцію треба оновити.
      correct: true
    - text: Дані неповні, а частина відповідей дублюється. Отже, опитування треба повторити.
      correct: true
    - text: Ми перевірили оплату. Отже, доставка триває два дні.
      correct: false
    - text: Сервіс має новий дизайн. Отже, мені подобається синій колір.
      correct: false
    explanation: Перед висновком мають бути підстави.
  - question: Де 'натомість' показує альтернативу?
    min_correct: 2
    options:
    - text: Гроші без чека не повертають, натомість можуть оформити обмін.
      correct: true
    - text: Паперову форму скасували, натомість відкрили онлайн-заявку.
      correct: true
    - text: Форму оновили, натомість вона стала коротшою.
      correct: false
    - text: Клієнт отримав номер, натомість може відстежити посилку.
      correct: false
    explanation: '''Натомість'' доречне, коли другий варіант замінює перший.'
  - question: Де анафора зрозуміла?
    min_correct: 2
    options:
    - text: Форма має три поля. Вони обов'язкові.
      correct: true
    - text: Квитанція, підпис і дата - ці дані потрібні для реєстрації.
      correct: true
    - text: Клієнт надіслав менеджеру файл, але він був неповний.
      correct: false
    - text: Команда показала сервісу форму, і вона була незадоволена.
      correct: false
    explanation: Займенник має мати одну очевидну опору.
  - question: Де регістр найкраще пасує до короткого професійного листа?
    min_correct: 2
    options:
    - text: Ми отримали заявку, однак у ній бракує підпису.
      correct: true
    - text: Документ можна подати повторно до п'ятниці.
      correct: true
    - text: Беручи до уваги вищевикладене, повідомляємо про брак підпису.
      correct: false
    - text: До речі, підпису немає, тож якось додайте.
      correct: false
    explanation: Короткий лист потребує ясного, не надто важкого регістру.
  - question: Де конектор зайвий або механічний?
    min_correct: 2
    options:
    - text: По-перше, форму оновили. По-перше, інструкція стара.
      correct: true
    - text: Сервіс оновили. З іншого боку, він працює швидше.
      correct: true
    - text: Форму оновили, тому клієнти менше помиляються.
      correct: false
    - text: Правила складні, через це підтримка отримує повторні питання.
      correct: false
    explanation: Перші два варіанти використовують зв'язки без відповідного змісту.
  - question: Де конектор показує поступку?
    min_correct: 2
    options:
    - text: Чек загублено; попри це покупку можна знайти.
      correct: true
    - text: Чек загублено; утім покупку можна знайти за номером.
      correct: true
    - text: Чек загублено; зокрема покупку можна знайти.
      correct: false
    - text: Чек загублено; отже покупку можна знайти, хоча це не наслідок.
      correct: false
    explanation: Поступка показує дію всупереч перешкоді.
  - question: Де приклад введено точно?
    min_correct: 2
    options:
    - text: Форма має кілька полів, зокрема поле для підпису.
      correct: true
    - text: До заявки додають документи, у тому числі квитанцію.
      correct: true
    - text: Форма має кілька полів, натомість поле для підпису.
      correct: false
    - text: До заявки додають документи, отже квитанцію.
      correct: false
    explanation: Зокрема й у тому числі вводять елемент ширшої групи.
  - question: Де важку формулу варто скоротити?
    min_correct: 2
    options:
    - text: У зв’язку з цим у зв’язку з цим клієнти отримують лист.
      correct: true
    - text: Беручи до уваги вищевикладене, повідомляємо в короткому чаті.
      correct: true
    - text: Тому клієнти отримують лист.
      correct: false
    - text: Ми отримали заявку, однак у ній бракує підпису.
      correct: false
    explanation: Повтор або надмірна офіційність шкодить простому повідомленню.
- type: fill-in
  title: Доберіть точний перехід
  instruction: Вставте конектор, який найкраще завершує логіку речення.
  items:
  - sentence: Паперову форму скасували, ____ відкрили онлайн-заявку.
    answer: натомість
    options:
    - натомість
    - зокрема
    - отже
    - попри це
    explanation: Онлайн-заявка замінює паперову форму.
  - sentence: У формі бракує підказок, ____ користувачі часто помиляються.
    answer: тому
    options:
    - тому
    - однак
    - по-перше
    - зокрема
    explanation: Помилки є наслідком браку підказок.
  - sentence: Заявка має три обов'язкові додатки, ____ копію паспорта.
    answer: зокрема
