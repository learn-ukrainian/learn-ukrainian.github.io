- type: essay-response
  id: editing-notice
  title: Редакторська правка оголошення
  instruction: Напишіть редакторський коментар українською.
  prompt: 'Відредагуйте коротке оголошення: «Запрошуємо всіх бажаючих на презентацію хвилюючої історії громади. Діючі правила участі та список працюючих груп опубліковано в наступаючому бюлетені. Учасники отримають миючі засоби для акції». У відповіді виконайте п''ять кроків: 1) подайте нормативну версію оголошення; 2) поясніть заміну бажаючі; 3) поясніть заміну хвилюючої історії; 4) поясніть заміну діючі або працюючі; 5) назвіть один випадок, коли форма на -учий може бути нормативною як прикметник.'
  min_words: 150
  model_answer: Запрошуємо всіх охочих на зустріч про довкілля. Чинні правила участі та список робочих груп опубліковано в найближчому бюлетені. Учасники отримають мийні засоби для акції. Форма бажаючі є калькованою; в оголошенні природніше слово охочі. Оточуюче середовище варто замінити словом довкілля, бо воно стисло й нормативно називає природне середовище. Діючі правила в юридичному або організаційному контексті краще редагувати як чинні правила, а працюючі групи - залежно від змісту як робочі групи або групи, які працюють над завданням. Нормативною може бути форма родючий у словосполученні родючий ґрунт, бо вона називає сталу властивість, а не тимчасову дію.
  rubric:
  - criteria: Нормативність замін
    description: Кальковані форми замінено природними українськими відповідниками.
    points: 4
  - criteria: Пояснення стратегії
    description: Автор пояснює, чи використано іменник, підрядне речення, прикметник призначення або лексичний відповідник.
    points: 3
  - criteria: Розрізнення винятків
    description: Відповідь не забороняє всі форми на -учий, а відрізняє лексикалізовані прикметники.
    points: 2
  - criteria: Мовна якість
    description: Текст написано природною українською без нових кальок.
    points: 1
  peer_review_guidelines: Перевірте, чи немає у відповіді форм на -учий/-ючий для тимчасової дії людини. Позначте місця, де автор міг би використати коротший нормативний відповідник.
