version: '1.0'
module: active-participles-present
level: b2
inline: []
workbook:
- type: quiz
  title: Розпізнайте редакторське рішення
  instruction: Оберіть варіант, який найкраще відповідає сучасній українській нормі.
  items:
  - question: Як найприродніше подати оголошення про реєстрацію учасників?
    options:
    - text: Усі охочі можуть зареєструватися до п'ятниці.
      correct: true
    - text: Усі бажаючі можуть зареєструватися до п'ятниці.
      correct: false
    - text: Усі бажаючіся можуть зареєструватися до п'ятниці.
      correct: false
    - text: Усі реєструючіся можуть прийти до п'ятниці.
      correct: false
    explanation: Для оголошення нормативне слово охочі звучить стисло й природно.
  - question: Який варіант найточніше замінює кальковане словосполучення про закон?
    options:
    - text: чинний закон
      correct: true
    - text: діючий закон
      correct: false
    - text: працюючий закон
      correct: false
    - text: закон, існуючий нині
      correct: false
    explanation: Юридичну силу закону природно передає прикметник чинний.
  - question: Яке речення правильно передає тимчасову дію людини?
    options:
    - text: Людина, яка стоїть біля дверей, чекає на зустріч.
      correct: true
    - text: Стояча біля дверей людина чекає на зустріч.
      correct: false
    - text: Людина стояча біля дверей чекає на зустріч.
      correct: false
    - text: Стоячий відвідувач біля дверей чекає на зустріч.
      correct: false
    explanation: Тимчасову дію людини краще передати підрядним реченням.
  - question: Який варіант нормативний для предмета, призначеного для миття?
    options:
    - text: мийний засіб
      correct: true
    - text: миючий засіб
      correct: false
    - text: засіб, миючий поверхню
      correct: false
    - text: миттєво діючий засіб
      correct: false
    explanation: Призначення предмета передає прикметник мийний.
  - question: Яка заміна найкраща для словосполучення хвилююча історія?
    options:
    - text: зворушлива історія
      correct: true
    - text: історія, що хвилює
      correct: false
    - text: хвилююча історія
      correct: false
    - text: емоціональна історія
      correct: false
    explanation: У значенні емоційного впливу природно сказати зворушлива історія.
  - question: Яке словосполучення природне для емоційно сильного спогаду?
    options:
    - text: зворушливий спогад
      correct: true
    - text: хвилюючий спогад
      correct: false
    - text: спогад, хвилюючий слухача
      correct: false
    - text: діючий на емоції спогад
      correct: false
    explanation: У значенні емоційного впливу нормативним відповідником є зворушливий.
  - question: Яке слово природне для людини, що користується сервісом?
    options:
    - text: користувач сервісу
      correct: true
    - text: користуючийся сервісом
      correct: false
    - text: сервісний користуючийся
      correct: false
    - text: людина користуючася сервісом
      correct: false
    explanation: Від зворотного дієслова не утворюємо активного дієприкметника.
  - question: Який варіант найкраще передає порядок у тексті?
    options:
    - text: наступний розділ
      correct: true
    - text: наступаючий розділ
      correct: false
    - text: розділ, наступаючий після вступу
      correct: false
    - text: діючий далі розділ
      correct: false
    explanation: Наступний доречний, коли йдеться про порядок у послідовності.
  - question: Який варіант найкраще називає людину, що керує кафедрою?
    options:
    - text: завідувач кафедри
      correct: true
    - text: завідуючий кафедрою
      correct: false
    - text: керуючийся кафедрою
      correct: false
    - text: кафедрально діючий
      correct: false
    explanation: Посаду природно називає іменник завідувач.
  - question: Який варіант найточніше передає перевагу певного підходу?
    options:
    - text: панівний підхід
      correct: true
    - text: пануючий підхід
      correct: false
    - text: діючий підхід
      correct: false
    - text: працюючий підхід
      correct: false
    explanation: Панівний природно означає той, що переважає або домінує.
- type: match-up
  title: Калька і нормативний відповідник
  instruction: Зіставте кальковану форму з природним українським варіантом.
  pairs:
  - left: бажаючі долучитися
    right: охочі долучитися
  - left: хвилююча історія
    right: зворушлива історія
  - left: діючий закон
    right: чинний закон
  - left: хвилююча історія
    right: зворушлива історія
  - left: миючий засіб
    right: мийний засіб
  - left: зволожуючий крем
    right: зволожувальний крем
  - left: знеболюючі ліки
    right: знеболювальні ліки
  - left: користуючіся послугою
    right: користувачі послуги
  - left: початкуючий автор
    right: автор-початківець
  - left: протестуючі студенти
    right: протестувальники
  - left: сидячі місця
    right: місця для сидіння
  - left: наступаючі свята
    right: прийдешні свята
  - left: пануюча думка
    right: панівна думка
  - left: прилягаюча територія
    right: прилегла територія
- type: select
  title: Позначте нормативні варіанти
  instruction: У кожному пункті виберіть усі варіанти, які звучать природно.
  items:
  - question: Які форми природні для сталої властивості, а не тимчасової дії?
    min_correct: 3
    options:
    - text: родючий ґрунт
      correct: true
    - text: співучий голос
      correct: true
    - text: терпляча людина
      correct: true
    - text: стояча біля входу людина
      correct: false
    - text: читаючі в аудиторії студенти
      correct: false
    explanation: Родючий, співучий і терплячий називають сталі якості.
  - question: Які варіанти правильно редагують опис людей через дію?
    min_correct: 2
    options:
    - text: люди, які працюють у центрі
      correct: true
    - text: працівники центру
      correct: true
    - text: працюючі у центрі люди
      correct: false
    - text: люди працюючі в центрі
      correct: false
    - text: працюючіся люди центру
      correct: false
    explanation: Для людей доречні підрядні речення або іменники ролі.
  - question: Які словосполучення правильно називають функцію предмета?
    min_correct: 3
    options:
    - text: зволожувальний крем
      correct: true
    - text: знеболювальні ліки
      correct: true
    - text: мийний засіб
      correct: true
    - text: зволожуючий крем
      correct: false
    - text: знеболюючі ліки
      correct: false
    explanation: Призначення предметів передають віддієслівні прикметники, не кальковані активні форми.
  - question: Які варіанти доречні в офіційному листі про документи?
    min_correct: 3
    options:
    - text: чинний договір
      correct: true
    - text: наступний етап
      correct: true
    - text: прилегла територія
      correct: true
    - text: діючий договір
      correct: false
    - text: прилягаюча територія
      correct: false
    explanation: Чинний, наступний і прилеглий є нормативними прикметниками для цих контекстів.
  - question: Які варіанти правильно замінюють кальки зі зворотних дієслів?
    min_correct: 2
    options:
    - text: користувачі застосунку
      correct: true
    - text: ті, хто навчається дистанційно
      correct: true
    - text: користуючіся застосунком
      correct: false
    - text: навчаючіся дистанційно
      correct: false
    - text: цікавлячіся темою
      correct: false
    explanation: Від дієслів на -ся такі дієприкметники не творяться.
  - question: Які варіанти природно передають майбутню або послідовну подію?
    min_correct: 3
    options:
    - text: наступна зустріч у графіку
      correct: true
    - text: прийдешні свята
      correct: true
    - text: найближчий вебінар
      correct: true
    - text: наступаючі свята
      correct: false
    - text: наступаючий вебінар
      correct: false
    explanation: Наступний доречний для порядку, а прийдешній або найближчий - для майбутньої події.
  - question: Які варіанти правильно замінюють кальки в освітньому тексті?
    min_correct: 3
    options:
    - text: навчальна програма
      correct: true
    - text: узагальнювальна таблиця
      correct: true
    - text: перевірний тест
      correct: true
    - text: навчаюча програма
      correct: false
    - text: перевіряючий тест
      correct: false
    explanation: Освітні тексти часто потребують прикметників призначення або точних відповідників.
  - question: Які варіанти природні для публічного повідомлення про громаду?
    min_correct: 3
    options:
    - text: мешканці довколишніх будинків
      correct: true
    - text: наявні можливості співпраці
      correct: true
    - text: партнери підтримали громаду
      correct: true
    - text: навколишні мешканці
      correct: false
    - text: існуючі можливості
      correct: false
    explanation: Природне речення називає роль, простір або дію без калькованого суфікса.
- type: error-correction
  title: Виправте кальковану форму
  instruction: Знайдіть неприродну форму і виберіть нормативне редагування.
  items:
  - sentence: Усі бажаючі пройти співбесіду мають подати заяву до середи.
    error: бажаючі
    answer: охочі
    error_type: word
    options:
    - охочі
    - бажальні
    - бажаючіся
    - бажані
    explanation: 'В оголошеннях природно: усі охочі.'
  - sentence: Авторка написала хвилюючу історію про волонтерів.
    error: хвилюючу історію
    answer: зворушливу історію
    error_type: phrase
    options:
    - зворушливу історію
    - історію, що хвилює
    - хвилюючої історії
    - емоціональну історію
    explanation: У значенні емоційного впливу потрібен прикметник зворушливий.
  - sentence: Згідно з діючим законом, заяву можна подати онлайн.
    error: діючим
    answer: чинним
    error_type: register
    options:
    - чинним
    - діяльним
    - працюючим
    - існуючим
    explanation: Юридичний регістр потребує прикметника чинний.
  - sentence: Ми купили нові миючі засоби для лабораторії.
    error: миючі
    answer: мийні
    error_type: word
    options:
    - мийні
    - миючіся
    - миттєві
    - помиті
    explanation: Засіб призначений для миття, тому потрібне мийні.
  - sentence: Хвилюючий виступ волонтерки запам'ятався всім присутнім.
    error: Хвилюючий
    answer: Зворушливий
    error_type: word
    options:
    - Зворушливий
    - Хвильовий
    - Хвилюваний
    - Діючий
    explanation: Емоційний вплив передає прикметник зворушливий.
  - sentence: Користуючіся сервісом отримають повідомлення про оновлення.
    error: Користуючіся
    answer: Користувачі
    error_type: construction
    options:
    - Користувачі
    - Користуючі
    - Користувальні
    - Користовані
    explanation: Від зворотного дієслова не творимо активний дієприкметник.
  - sentence: На сайті вже опубліковано графік наступаючих свят.
    error: наступаючих
    answer: прийдешніх
    error_type: word
    options:
    - прийдешніх
    - наступаючихся
    - діючих
    - стоячих
    explanation: 'Для майбутніх свят природно: прийдешніх або найближчих.'
  - sentence: Протестуючі студенти вимагали відкритої розмови з адміністрацією.
    error: Протестуючі
    answer: Протестувальники
    error_type: word
    options:
    - Протестувальники
    - Протестні
    - Протестуючіся
    - Протестовані
    explanation: Осіб за роллю природно називає іменник протестувальники.
- type: fill-in
  title: Доберіть нормативне слово
  instruction: Заповніть пропуск словом, яке природно замінює кальку.
  items:
  - sentence: До обговорення можуть долучитися всі ____ мешканці громади.
    answer: охочі
    options:
    - охочі
    - бажаючі
    - бажані
    - діючі
    explanation: Охочі природно замінює кальковане бажаючі.
  - sentence: У звіті йдеться про вплив виробництва на ____.
    answer: зворушлива історія
    options:
    - зворушлива історія
    - хвилююча історія
    - оточування
    - діюче середовище
    explanation: Довкілля є нормативним словом для природного середовища.
  - sentence: Рішення ухвалено відповідно до ____ законодавства.
    answer: чинного
    options:
    - чинного
    - діючого
    - працюючого
    - існуючого
    explanation: У юридичному контексті вживаємо чинний.
  - sentence: Для догляду за шкірою вона обрала ____ крем.
    answer: зволожувальний
    options:
    - зволожувальний
    - зволожуючий
    - зволожений
    - зволоживший
    explanation: Крем має призначення, тому потрібен прикметник зволожувальний.
  - sentence: Після лекції почалася ____ дискусія про мовну норму.
    answer: змістовна
    options:
    - змістовна
    - дискутуюча
    - дискутована
    - діюча
    explanation: Коли немає потреби називати дію, краще вибрати точний прикметник.
  - sentence: У договорі окремо описано ____ територію біля будівлі.
    answer: прилеглу
    options:
    - прилеглу
    - прилягаючу
    - лежачу
    - діючу
    explanation: Нормативне слово для території поряд - прилегла.
  - sentence: У ____ розділі автор пояснює редакторський алгоритм.
    answer: наступному
    options:
    - наступному
    - наступаючому
    - діючому
    - працюючому
    explanation: Для порядку в тексті доречне слово наступний.
  - sentence: У статті описано ____ підхід до редагування офіційних текстів.
    answer: панівний
    options:
    - панівний
    - пануючий
    - панований
    - діючий
    explanation: Панівний природно передає значення переваги в системі.
  - sentence: Для учасників підготували ____ матеріали з прикладами редагування.
    answer: навчальні
    options:
    - навчальні
    - навчаючі
    - навчені
    - навчавші
    explanation: Матеріали мають освітнє призначення, тому потрібне навчальні.
  - sentence: У звіті згадано ____ можливості співпраці між громадами.
    answer: наявні
    options:
    - наявні
    - існуючі
    - існувавші
    - діючі
    explanation: Наявні можливості звучить точніше й природніше, ніж існуючі.
- type: cloze
  title: Редакторський коментар
  instruction: Заповніть пропуски словами, які підтримують нормативне редагування.
  passage: 'Коли редактор бачить форму на -учий або -ючий, він спершу перевіряє значення, а не сам суфікс. Якщо слово називає тимчасову дію людини, найчастіше потрібне підрядне речення. Якщо йдеться про особу як роль, доречним може бути іменник. Для предмета з певною функцією українська часто використовує прикметник призначення. Кальковане хвилююча історія краще замінити словосполученням зворушлива історія. У юридичному тексті діючий закон треба редагувати як чинний закон. Форми від зворотних дієслів потребують особливої уваги: користуючийся має стати користувачем або підрядною конструкцією. Редагування завершується перевіркою доречності, регістру і мовної стійкості.'
  blanks:
  - id: 1
    answer: значення
    options:
    - значення
    - наголос
    - рід
    - число
  - id: 2
    answer: суфікс
    options:
    - суфікс
    - прийменник
    - наголос
    - відмінок
  - id: 3
    answer: тимчасову
    options:
    - тимчасову
    - власну
    - родову
    - числову
  - id: 4
    answer: підрядне
    options:
    - підрядне
    - пасивне
    - числівникове
    - вигукове
  - id: 5
    answer: іменник
    options:
    - іменник
    - вигук
    - прийменник
    - частку
  - id: 6
    answer: роль
    options:
    - роль
    - кому
    - риску
    - крапку
  - id: 7
    answer: призначення
    options:
    - призначення
    - минулого часу
    - заперечення
    - кличного відмінка
  - id: 8
    answer: кальковане
    options:
    - кальковане
    - наголошене
    - відмінене
    - запозичене
  - id: 9
    answer: довкілля
    options:
    - довкілля
    - оточування
    - діяння
    - числення
  - id: 10
    answer: чинний
    options:
    - чинний
    - діючий
    - стоячий
    - лежачий
  - id: 11
    answer: зворотних
    options:
    - зворотних
