version: '1.0'
module: active-participles-present
level: b2
inline:
  - id: act-1
    type: comparative-study
    title: "Калька чи природна заміна"
    instruction: "Порівняйте речення й визначте редакторську стратегію."
    items_to_compare:
      - "Усі бажаючі можуть подати заявку."
      - "Усі охочі можуть подати заявку."
      - "Фахівці, які працюють у проєкті, отримають доступ."
      - "Діючий договір доступний у кабінеті."
      - "Чинний договір доступний у кабінеті."
    criteria:
      - "калькована форма"
      - "лексичний відповідник"
      - "підрядне речення"
      - "точний прикметник"
    model_answer: "Бажаючі й діючий у цих контекстах звучать кальковано. Охочі, підрядне речення і чинний договір є природними рішеннями."
  - id: act-2
    type: comparative-study
    title: "Механічна форма і природний варіант"
    items_to_compare:
      - "бажаючі"
      - "працюючі студенти"
      - "діючий закон"
      - "оточуюче середовище"
      - "миючий засіб"
      - "користуючіся послугою"
      - "сидячі місця"
      - "прилягаюча територія"
    criteria:
      - "охочі"
      - "студенти, які працюють"
      - "чинний закон"
      - "довкілля"
      - "мийний засіб"
      - "користувачі послуги"
      - "місця для сидіння"
      - "прилегла територія"
    model_answer: "Кожна механічна форма потребує не суфіксальної заміни, а вибору стратегії: іменник, підрядне речення, точний прикметник або сполука призначення."
  - id: act-3
    type: critical-analysis
    title: "Що можна залишити"
    target_text: >-
      Родючий ґрунт, співучий голос, цілюща вода й терпляча людина називають
      сталі якості. Читаюча біля вікна людина й стоячі в коридорі студенти
      описують тимчасову дію.
    questions:
      - "Які чотири сполуки можна залишити як лексикалізовані?"
      - "Які дві сполуки треба переписати підрядним реченням?"
      - "Який критерій відрізняє ці групи?"
    model_answers:
      - "Родючий ґрунт, співучий голос, цілюща вода, терпляча людина."
      - "Людина, яка читає біля вікна; студенти, які стоять у коридорі."
      - "Стала властивість проти тимчасової дії."
  - id: act-4
    type: comparative-study
    title: "Оберіть стратегію заміни"
    items_to_compare:
      - "Усі охочі можуть зареєструватися."
      - "Це чинний закон."
      - "Потрібно берегти довкілля."
      - "Для аудиторії треба додати місця для сидіння."
    criteria:
      - "іменник для групи людей"
      - "точний прикметник"
      - "лексичний відповідник"
      - "сполука призначення"
    model_answer: "Охочі замінює групу людей; чинний є точним прикметником; довкілля замінює кальку; місця для сидіння передають призначення."
  - id: act-5
    type: critical-analysis
    title: "Виправте активні дієприкметники"
    target_text: >-
      Користуючіся застосунком мають оновити пароль. Працюючі в офісі фахівці
      підписали чинний договір. Ми купили зволожуючий крем і миючі засоби.
    questions:
      - "Де потрібен іменник?"
      - "Де потрібне підрядне означальне речення?"
      - "Де потрібні прикметники призначення?"
    model_answers:
      - "Користувачі застосунку мають оновити пароль."
      - "Фахівці, які працюють в офісі, підписали чинний договір."
      - "Зволожувальний крем і мийні засоби."
workbook:
  - id: wb-1
    type: comparative-study
    title: "Нормативна заміна"
    items_to_compare:
      - "охочі"
      - "чинний закон"
      - "зворушлива історія"
      - "бажаючі"
      - "діючий закон"
      - "хвилююча історія"
    criteria:
      - "природно"
      - "кальковано"
      - "юридична сила"
      - "емоційний вплив"
    model_answer: "Охочі, чинний закон і зворушлива історія природні; бажаючі, діючий закон і хвилююча історія в цих значеннях потребують редагування."
  - id: wb-2
    type: comparative-study
    title: "Стратегія редагування"
    items_to_compare:
      - "люди, які чекають"
      - "користувачі застосунку"
      - "чинний договір"
      - "мийний засіб"
      - "місця для сидіння"
    criteria:
      - "підрядне речення"
      - "іменник"
      - "точний прикметник"
      - "призначення"
    model_answer: "Ці приклади показують чотири основні стратегії: підрядне речення, іменник, точний прикметник і сполука або прикметник призначення."
  - id: wb-3
    type: critical-analysis
    title: "Редакторський контроль"
    target_text: >-
      Довкілля, навколишнє середовище, чинний договір і зволожувальний крем
      звучать природно. Оточуюче середовище, діючий договір і користуючіся
      застосунком у цих контекстах треба редагувати.
    questions:
      - "Які варіанти природні?"
      - "Які варіанти кальковані?"
      - "Які стратегії заміни потрібні?"
    model_answers:
      - "Довкілля, навколишнє середовище, чинний договір, зволожувальний крем."
      - "Оточуюче середовище, діючий договір, користуючіся застосунком."
      - "Лексичний відповідник, точний прикметник, іменник користувачі."
  - id: wb-4
    type: critical-analysis
    title: "Відредагуйте оголошення"
    target_text: >-
      Бажаючі взяти участь у прибиранні мають заповнити слідуючу форму.
      Працюючі на локації волонтери отримають миючі засоби. Просимо берегти
      оточуюче середовище.
    questions:
      - "Які слова треба замінити лексичними відповідниками?"
      - "Де потрібне підрядне речення?"
      - "Де потрібний прикметник призначення?"
    model_answers:
      - "Бажаючі -> охочі; слідуючу -> наступну; оточуюче середовище -> довкілля."
      - "Працюючі на локації волонтери -> волонтери, які працюватимуть на локації."
      - "Миючі засоби -> мийні засоби."
  - id: wb-5
    type: essay-response
    title: "Мініпояснення для редактора"
    instruction: "Напишіть 150-180 слів."
    prompt: "Поясніть, чому активні дієприкметники теперішнього часу не треба механічно використовувати як відповідник англійського -ing."
    min_words: 150
    model_answer: >-
      Англійське -ing має багато функцій, а українська передає їх різними
      засобами. Для тимчасової дії людини краще сказати людина, яка читає.
      Для групи потрібен іменник: охочі, користувачі, протестувальники.
      Для юридичної сили кажемо чинний закон, а для екологічної теми - довкілля.
    rubric:
      - criteria: "Приклади"
        description: "Є природні заміни."
        points: 4
