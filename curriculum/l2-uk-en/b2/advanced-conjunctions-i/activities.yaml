version: '1.0'
module: advanced-conjunctions-i
level: b2
inline:
- type: group-sort
  title: "Сурядний зв'язок за функцією"
  instruction: "Розсортуйте сполучники й конструкції за тим, яку логіку вони створюють."
  groups:
  - name: "Єднання або додавання"
    items: ["і", "й", "та (= і)", "і... і", "не тільки..., а й"]
  - name: "Зіставлення без прямого конфлікту"
    items: ["а", "тим часом", "водночас", "з одного боку..., з іншого боку"]
  - name: "Протиставлення або обмеження"
    items: ["але", "проте", "однак", "та (= але)", "зате"]
  - name: "Вибір, сумнів або чергування"
    items: ["або", "чи", "або... або", "чи то... чи то", "то... то"]

- type: select
  title: "Який зв'язок створює сполучник?"
  instruction: "Позначте всі правильні твердження."
  items:
  - question: "«Проєкт невеликий, але складний»."
    min_correct: 2
    options:
    - text: "Але вводить обмеження або перешкоду."
      correct: true
    - text: "Кома перед але потрібна."
      correct: true
    - text: "Але тут означає простий перелік."
      correct: false
    - text: "Сполучник треба замінити на або."
      correct: false
    explanation: "Але змінює напрям очікування."
  - question: "«Одні учасники збирали дані, а інші перевіряли бюджет»."
    min_correct: 2
    options:
    - text: "А зіставляє дві ролі."
      correct: true
    - text: "Речення не обов'язково створює конфлікт."
      correct: true
    - text: "А завжди означає різку суперечність."
      correct: false
    - text: "Кома тут зайва, бо є тільки два елементи."
      correct: false
    explanation: "А часто розподіляє ролі або зіставляє факти."
  - question: "«Старт був пізній, зате команда мала більше даних»."
    min_correct: 2
    options:
    - text: "Зате вводить компенсацію."
      correct: true
    - text: "Друга частина урівноважує мінус першої."
      correct: true
    - text: "Зате є розділовим сполучником вибору."
      correct: false
    - text: "Кома перед зате не потрібна."
      correct: false
    explanation: "Зате показує позитивний баланс після обмеження."
  - question: "«Учасники або працюватимуть у групах, або виконають самостійне завдання»."
    min_correct: 2
    options:
    - text: "Або... або оформлює альтернативу."
      correct: true
    - text: "Кома перед другим або потрібна."
      correct: true
    - text: "Це градаційна конструкція не тільки..., а й."
      correct: false
    - text: "Другий або треба вилучити в усіх випадках."
      correct: false
    explanation: "Повторюваний розділовий сполучник має видиму межу."
  - question: "«Чи то дощ почався, чи то вітер здійняв пил»."
    min_correct: 2
    options:
    - text: "Чи то... чи то передає непевність."
      correct: true
    - text: "Кома перед другим компонентом потрібна."
      correct: true
    - text: "Конструкція означає точний причинний зв'язок."
      correct: false
    - text: "Це підрядний сполучник мети."
      correct: false
    explanation: "Конструкція передає сумнів або невизначене чергування."
  - question: "«Команда не тільки зібрала дані, а й пояснила ризики»."
    min_correct: 2
    options:
    - text: "Не тільки..., а й створює градацію."
      correct: true
    - text: "Друга частина має бути граматично симетричною першій."
      correct: true
    - text: "Природна форма - не тільки..., але також у всіх стилях."
      correct: false
    - text: "Це розділовий сполучник вибору."
      correct: false
    explanation: "Українська градаційна пара вимагає симетрії."
  - question: "«Студенти та викладачі обговорили критерії»."
    min_correct: 2
    options:
    - text: "Та тут дорівнює і."
      correct: true
    - text: "Між двома однорідними підметами кома не потрібна."
      correct: true
    - text: "Та тут означає але."
      correct: false
    - text: "Кома перед та обов'язкова завжди."
      correct: false
    explanation: "Та може бути єднальним або протиставним; тут єднальне."
  - question: "«Студенти підтримали критерії, та просили простіших прикладів»."
    min_correct: 2
    options:
    - text: "Та тут близьке до але."
      correct: true
    - text: "Кома показує протиставне обмеження."
      correct: true
    - text: "Та тут означає просте додавання без паузи."
      correct: false
    - text: "Речення треба писати без коми."
      correct: false
    explanation: "У протиставному значенні та потребує коми."

- type: fill-in
  title: "Оберіть сполучник за смислом"
  instruction: "Заповніть пропуск природним сурядним засобом."
  items:
  - sentence: "План короткий, ____ переконливий."
    answer: "але"
    options: ["але", "або", "і", "чи то"]
    explanation: "Друга ознака обмежує очікування."
  - sentence: "Проєкт стартував пізніше, ____ отримав ширшу підтримку."
    answer: "зате"
    options: ["зате", "або", "і", "чи"]
    explanation: "Зате вводить компенсацію."
  - sentence: "Учасники ____ працюватимуть у групах, ____ виконають завдання самостійно."
    answer: "або... або"
    options: ["або... або", "не тільки... а й", "а... але", "і... проте"]
    explanation: "Йдеться про альтернативу."
  - sentence: "Команда ____ зібрала дані, ____ пояснила ризики."
    answer: "не тільки... а й"
    options: ["не тільки... а й", "або... або", "чи то... чи то", "то... то"]
    explanation: "Конструкція додає другий сильніший компонент."
  - sentence: "Одні перевіряли бюджет, ____ інші готували презентацію."
    answer: "а"
    options: ["а", "або", "зате", "ні"]
    explanation: "А зіставляє ролі."
  - sentence: "Немає ____ часу, ____ додаткових ресурсів."
    answer: "ні... ні"
    options: ["ні... ні", "або... або", "не тільки... а й", "чи то... чи то"]
    explanation: "Ні... ні заперечує обидва елементи."
  - sentence: "То команда працювала швидко, ____ зупинялася через нові правки."
    answer: "то"
    options: ["то", "але", "зате", "або"]
    explanation: "То... то передає чергування станів."
  - sentence: "Питання складне, ____ його можна розв'язати поетапно."
    answer: "проте"
    options: ["проте", "або", "чи", "ні"]
    explanation: "Проте звучить книжно й аналітично."
  - sentence: "Маршрут довший, ____ безпечніший."
    answer: "зате"
    options: ["зате", "чи", "і", "ні"]
    explanation: "Друга ознака компенсує першу."
  - sentence: "Ми можемо перенести зустріч ____ скоротити порядок денний."
    answer: "або"
    options: ["або", "але", "зате", "ні"]
    explanation: "Потрібна альтернатива між двома діями."

- type: error-correction
  title: "Пунктуація і кальки сурядності"
  instruction: "Виправте сполучник або пунктуацію."
  items:
  - sentence: "Це рішення не тільки корисне, але також необхідне."
    error: "не тільки корисне, але також необхідне"
    correction: "не тільки корисне, а й необхідне"
    options: ["не тільки корисне, а й необхідне", "не тільки корисне, але також необхідне", "або корисне, або необхідне", "корисне проте необхідне"]
    explanation: "Українська градаційна пара природно має а й."
  - sentence: "Команда зібрала дані і вона підготувала звіт."
    error: "зібрала дані і вона"
    correction: "зібрала дані, і вона"
    options: ["зібрала дані, і вона", "зібрала дані і вона", "зібрала дані і, вона", "зібрала дані; і вона"]
    explanation: "І поєднує дві граматичні основи, тому потрібна кома."
  - sentence: "Проєкт малий але складний."
    error: "малий але"
    correction: "малий, але"
    options: ["малий, але", "малий але", "малий; але", "малий - але"]
    explanation: "Перед але ставимо кому."
  - sentence: "Студенти та викладачі, обговорили критерії."
    error: "викладачі, обговорили"
    correction: "викладачі обговорили"
    options: ["викладачі обговорили", "викладачі, обговорили", "викладачі; обговорили", "викладачі - обговорили"]
    explanation: "Кома між підметом і присудком не потрібна."
  - sentence: "Учасники або працюватимуть у групах або самостійно."
    error: "групах або"
    correction: "групах, або"
    options: ["групах, або", "групах або", "групах; або", "групах - або"]
    explanation: "Перед другим компонентом повторюваного або ставимо кому."
  - sentence: "Я не знаю або зустріч буде очною."
    error: "або"
    correction: "чи"
    options: ["чи", "або", "зате", "проте"]
    explanation: "У непрямому питанні природний сполучник чи."
  - sentence: "Він хотів приїхати про те не зміг."
    error: "про те"
    correction: "проте"
    options: ["проте", "про те", "при тому", "або"]
    explanation: "Проте - протиставний сполучник; про те - прийменник із займенником."
  - sentence: "Ми вибираємо між швидким запуском або якісною перевіркою."
    error: "між швидким запуском або якісною перевіркою"
    correction: "між швидким запуском і якісною перевіркою"
    options: ["між швидким запуском і якісною перевіркою", "між швидким запуском або якісною перевіркою", "або між запуском і перевіркою", "між запуском проте перевіркою"]
    explanation: "Після між природна пара між... і."

- type: match-up
  title: "Розділовий знак і причина"
  instruction: "Поєднайте пунктуаційний вибір із поясненням."
  pairs:
  - left: "кома перед але"
    right: "протиставний сполучник вводить обмеження"
  - left: "кома перед другим або"
    right: "повторюваний розділовий сполучник"
  - left: "без коми в студенти та викладачі"
    right: "однорідні підмети з єднальним та"
  - left: "кома між двома основами з і"
    right: "складносурядне речення"
  - left: "крапка з комою"
    right: "довгі частини мають внутрішні коми"
  - left: "тире"
    right: "різкий наслідок або інтонаційний злам"
  - left: "а без конфлікту"
    right: "зіставлення двох ролей"
  - left: "зате"
    right: "компенсація після мінуса"
  - left: "чи у питанні"
    right: "сумнів або непряме питання"
  - left: "не тільки..., а й"
    right: "градаційна симетрія"

workbook:
- id: coordinating-reading
  type: reading
  title: "Читання: як сполучники тримають аргумент"
  instruction: "Прочитайте уривок і визначте функції сурядних сполучників."
  source: "Навчальний аналітичний уривок для модуля B2."
  text: >-
    Місто хоче оновити транспортну схему, і мешканці чекають швидких
    змін, а перевізники просять більше часу. Бюджет обмежений, проте
    команда може зберегти головні маршрути. Новий графік не тільки
    скоротить очікування, а й зробить пересадки зрозумілішими. Частину
    рейсів доведеться перенести або на ранок, або на пізній вечір, зате
    у години пік автобуси ходитимуть частіше.
  tasks:
  - "Випишіть єднальні, протиставні та розділові засоби."
  - "Поясніть, де а зіставляє, а де проте обмежує."
  - "Знайдіть градаційну конструкцію і перевірте симетрію її частин."
  - "Поясніть пунктуацію в повторюваній конструкції або... або."

- type: group-sort
  title: "Сурядність у редагуванні абзацу"
  instruction: "Розсортуйте приклади за редакторською дією."
  groups:
  - name: "Залишити як є"
    items: ["проєкт малий, але реалістичний", "студенти та викладачі обговорили критерії", "або перенесемо зустріч, або скоротимо порядок денний"]
  - name: "Додати кому"
    items: ["план короткий але переконливий", "команда зібрала дані і вона підготувала звіт", "учасники або працюватимуть у групах або самостійно"]
  - name: "Замінити кальку"
    items: ["не тільки корисне, але також необхідне", "між запуском або перевіркою", "думав про те не встиг"]
  - name: "Уточнити сполучник"
    items: ["я не знаю або він прийде", "пізно але з ширшою підтримкою", "а замість але для простого розподілу ролей"]

- type: fill-in
  title: "Пунктуаційний тренажер"
  instruction: "Оберіть варіант із правильною пунктуацією."
  items:
  - sentence: "____"
    answer: "Команда працювала швидко, але обережно."
    options: ["Команда працювала швидко, але обережно.", "Команда працювала швидко але обережно.", "Команда працювала швидко, або обережно.", "Команда працювала швидко; але обережно."]
    explanation: "Перед але потрібна кома."
  - sentence: "____"
    answer: "Студенти й викладачі підготували критерії."
    options: ["Студенти й викладачі підготували критерії.", "Студенти й викладачі, підготували критерії.", "Студенти, й викладачі підготували критерії.", "Студенти; й викладачі підготували критерії."]
    explanation: "Між двома однорідними підметами з й коми немає."
  - sentence: "____"
    answer: "Проєкт малий, зате добре спланований."
    options: ["Проєкт малий, зате добре спланований.", "Проєкт малий зате добре спланований.", "Проєкт малий, або добре спланований.", "Проєкт малий; зате добре спланований."]
    explanation: "Зате вводить компенсацію."
  - sentence: "____"
    answer: "Або ми скоротимо маршрут, або перенесемо запуск."
    options: ["Або ми скоротимо маршрут, або перенесемо запуск.", "Або ми скоротимо маршрут або перенесемо запуск.", "Або ми скоротимо маршрут; або перенесемо запуск.", "Або ми скоротимо маршрут, проте перенесемо запуск."]
    explanation: "Кома стоїть перед другим або."
  - sentence: "____"
    answer: "Не тільки команда, а й партнери підтримали рішення."
    options: ["Не тільки команда, а й партнери підтримали рішення.", "Не тільки команда, але також партнери підтримали рішення.", "Не тільки команда або партнери підтримали рішення.", "Не тільки команда а й партнери підтримали рішення."]
    explanation: "Градаційна пара має кому перед а й."
  - sentence: "____"
    answer: "Одні учасники писали звіт, а інші перевіряли цифри."
    options: ["Одні учасники писали звіт, а інші перевіряли цифри.", "Одні учасники писали звіт а інші перевіряли цифри.", "Одні учасники писали звіт, або інші перевіряли цифри.", "Одні учасники писали звіт; а інші перевіряли цифри."]
    explanation: "А зіставляє дві ролі."
  - sentence: "____"
    answer: "Чи то бракує даних, чи то команда ще не узгодила критерії."
    options: ["Чи то бракує даних, чи то команда ще не узгодила критерії.", "Чи то бракує даних чи то команда ще не узгодила критерії.", "Чи то бракує даних, або команда ще не узгодила критерії.", "Чи то бракує даних; чи то команда ще не узгодила критерії."]
    explanation: "Повторювана конструкція має кому."
  - sentence: "____"
    answer: "Він думав про те завдання, проте не встиг його виконати."
    options: ["Він думав про те завдання, проте не встиг його виконати.", "Він думав проте завдання, про те не встиг його виконати.", "Він думав про те завдання проте не встиг його виконати.", "Він думав про те завдання, або не встиг його виконати."]
    explanation: "Про те і проте мають різні функції."
  - sentence: "____"
    answer: "Маршрут довший, зате безпечніший."
    options: ["Маршрут довший, зате безпечніший.", "Маршрут довший зате безпечніший.", "Маршрут довший, або безпечніший.", "Маршрут довший; зате безпечніший."]
    explanation: "Компенсаційне зате потребує коми."
  - sentence: "____"
    answer: "Ми або перенесемо зустріч, або скоротимо її."
    options: ["Ми або перенесемо зустріч, або скоротимо її.", "Ми або перенесемо зустріч або скоротимо її.", "Ми але перенесемо зустріч, але скоротимо її.", "Ми не тільки перенесемо зустріч або скоротимо її."]
    explanation: "Другий компонент або відокремлюється комою."

- type: error-correction
  title: "Сурядність у довгому реченні"
  instruction: "Виправте фрагмент так, щоб сполучник і пунктуація відповідали логіці."
  items:
  - sentence: "Навчальний центр відкрив програму і вона має допомогти дорослим."
    error: "програму і вона"
    correction: "програму, і вона"
    options: ["програму, і вона", "програму і вона", "програму; і вона", "програму, або вона"]
