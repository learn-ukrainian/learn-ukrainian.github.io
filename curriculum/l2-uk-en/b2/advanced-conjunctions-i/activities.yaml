version: '1.0'
module: advanced-conjunctions-i
level: b2
inline: []
workbook:
  - type: reading
    id: coordinating-reading
    title: "Читання: сурядність у громадській ініціативі"
    instruction: "Прочитайте аналітичний уривок і визначте роль сурядних сполучників."
    source: "Навчальний уривок для модуля B2."
    text: >-
      Міська рада оголосила конкурс малих проєктів, і громадські організації
      швидко підготували перші заявки. Одні команди пропонували культурні
      маршрути, а інші зосередилися на безбар'єрному доступі до бібліотек.
      Частина ідей була недорога, проте вимагала складної координації.
      Організатори мали або скоротити кількість етапів, або залучити
      додаткових консультантів. Ні добрий намір, ні публічна підтримка не
      замінювали точного календаря.
    tasks:
      - "Випишіть єднальний сполучник і поясніть, що саме він додає."
      - "Знайдіть протиставний сполучник, який зіставляє дві групи."
      - "Визначте, де сполучник вводить обмеження до попередньої думки."
      - "Поясніть, як працюють конструкції або... або та ні... ні."

  - type: quiz
    title: "Діагностика: кома і тип зв'язку"
    instruction: "Оберіть правильний варіант або пояснення."
    items:
      - question: "У якому реченні кома перед і потрібна?"
        options:
          - text: "Команда підготувала бюджет, і партнери перевірили календар."
            correct: true
          - text: "Команда підготувала бюджет і календар."
            correct: false
          - text: "У звіті є бюджет і календар."
            correct: false
          - text: "Ми обговорили бюджет і календар запуску."
            correct: false
        explanation: "Кома потрібна, бо і поєднує дві граматичні основи."
      - question: "Де та має протиставне значення?"
        options:
          - text: "Учасники підтримали ідею, та просили більше прикладів."
            correct: true
          - text: "Учасники та викладачі підтримали ідею."
            correct: false
          - text: "Потрібні час та ресурси."
            correct: false
          - text: "Команда перевірила форму та інструкцію."
            correct: false
        explanation: "У першому реченні та можна замінити на але."
      - question: "Яке речення правильно оформлює повторюваний сполучник?"
        options:
          - text: "Або команда скоротить програму, або перенесе запуск."
            correct: true
          - text: "Або команда скоротить програму або перенесе запуск."
            correct: false
          - text: "Команда або скоротить, програму або перенесе запуск."
            correct: false
          - text: "Команда скоротить програму або, перенесе запуск."
            correct: false
        explanation: "Кома ставиться перед другим компонентом повторюваної пари."
      - question: "Яке пояснення найточніше для сполучника зате?"
        options:
          - text: "Він часто вводить компенсацію або позитивний наслідок попри мінус."
            correct: true
          - text: "Він завжди замінює питальне чи."
            correct: false
          - text: "Він поєднує тільки однорідні підмети."
            correct: false
          - text: "Він не потребує коми в складному реченні."
            correct: false
        explanation: "Зате показує, що друга частина урівноважує попередній недолік."
      - question: "Де крапка з комою найдоречніша?"
        options:
          - text: "У першій заявці описали бюджет, ризики й календар; а в другій пояснили партнерів, дедлайни й критерії."
            correct: true
          - text: "Команда написала звіт; і бюджет."
            correct: false
          - text: "Студенти; та викладачі прийшли."
            correct: false
          - text: "Ми або перенесемо; або скоротимо курс."
            correct: false
        explanation: "Крапка з комою допомагає розділити довгі частини з внутрішніми переліками."
      - question: "Який варіант показує нейтральне додавання двох дій одного підмета?"
        options:
          - text: "Команда зібрала дані й підготувала звіт."
            correct: true
          - text: "Команда зібрала дані, але підготувала звіт."
            correct: false
          - text: "Команда або зібрала дані."
            correct: false
          - text: "Команда ні зібрала дані."
            correct: false
        explanation: "Й поєднує однорідні присудки при одному підметі."
      - question: "Де сполучник чи найприродніший?"
        options:
          - text: "Потрібно з'ясувати, чи готова команда до запуску."
            correct: true
          - text: "Команда чи скоротить програму, чи перенесе запуск."
            correct: false
          - text: "Проєкт якісний, чи дорогий."
            correct: false
          - text: "У звіті є бюджет чи календар, і обидва готові."
            correct: false
        explanation: "Чи природне у вкладеному питанні або сумніві."
      - question: "Яка конструкція найкраще передає рівне включення двох компонентів?"
        options:
          - text: "як точність, так і доречність"
            correct: true
          - text: "або точність, але доречність"
            correct: false
          - text: "ні точність, а й доречність"
            correct: false
          - text: "зате точність і доречність"
            correct: false
        explanation: "Як... так і спокійно включає два рівноправні компоненти."
      - question: "У якому реченні а не створює конфлікту?"
        options:
          - text: "Одні учасники читали текст, а інші виправляли пунктуацію."
            correct: true
          - text: "Текст готовий, а джерела не перевірені."
            correct: false
          - text: "План короткий, але складний."
            correct: false
          - text: "Команда або читає, або редагує."
            correct: false
        explanation: "У першому реченні а зіставляє розподіл ролей."
      - question: "Яка редакція найкраще прибирає кальку але також?"
        options:
          - text: "Курс не тільки пояснює правила, а й тренує редагування."
            correct: true
          - text: "Курс пояснює правила, але також тренує редагування."
            correct: false
          - text: "Курс або пояснює правила, а також редагування."
            correct: false
          - text: "Курс ні пояснює правила, ні тренує редагування."
            correct: false
        explanation: "Не тільки... а й природно передає градаційне додавання."
      - question: "Де правильно розрізнено а і але?"
        options:
          - text: "Бібліотека дає простір, а університет проводить заняття."
            correct: true
          - text: "Бібліотека дає простір, але університет проводить заняття."
            correct: false
          - text: "Простір готовий, а ключі ще не видали."
            correct: false
          - text: "Простір готовий і але ключі не видали."
            correct: false
        explanation: "У першому реченні а зіставляє ролі, а не вводить перешкоду."
      - question: "Яке речення найкраще показує компенсацію?"
        options:
          - text: "Зустріч перенесли на вечір, зате прийшло більше учасників."
            correct: true
          - text: "Зустріч перенесли на вечір, і зате прийшло більше учасників."
            correct: false
          - text: "Зустріч була корисна, зате змістовна."
            correct: false
          - text: "Зустріч або була корисна, зате змістовна."
            correct: false
        explanation: "Зате доречне, коли друга частина врівноважує мінус."

  - type: fill-in
    title: "Доберіть сурядний засіб"
    instruction: "Заповніть пропуск доречним сполучником або парною конструкцією."
    items:
      - sentence: "Проєкт ____ пояснює правила, ____ навчає редагувати реальні тексти."
        answer: "не тільки / а й"
        options: ["не тільки / а й", "ні / ні", "чи то / чи то", "або / або"]
        explanation: "Друга частина нарощує першу, тому потрібна градаційна пара."
      - sentence: "____ мешканці, ____ волонтери мають бачити календар робіт."
        answer: "і / і"
        options: ["і / і", "але / проте", "або / чи", "та / зате"]
        explanation: "Пара і... і включає обидві групи."
      - sentence: "Команда має ____ скоротити маршрут, ____ перенести запуск."
        answer: "або / або"
        options: ["або / або", "ні / ні", "а / але", "як / що"]
        explanation: "Йдеться про вибір між двома рішеннями."
      - sentence: "____ швидкість, ____ технічна зручність не виправдовують непрозорого рішення."
        answer: "ні / ні"
        options: ["ні / ні", "чи / чи", "і / й", "проте / зате"]
        explanation: "Пара ні... ні заперечує два аргументи."
      - sentence: "Одні учасники аналізували бюджет, ____ інші перевіряли юридичні ризики."
        answer: "а"
        options: ["а", "або", "ні", "зате"]
        explanation: "А зіставляє дві ролі без обов'язкового конфлікту."
      - sentence: "Маршрут довший, ____ безпечніший."
        answer: "зате"
        options: ["зате", "чи", "ні", "і"]
        explanation: "Зате показує компенсацію після мінуса."
      - sentence: "Потрібно з'ясувати, ____ команда готова до запуску."
        answer: "чи"
        options: ["чи", "або", "зате", "ні"]
        explanation: "Чи вводить вкладене питання."
      - sentence: "Методика враховує ____ кількісні, ____ якісні показники."
        answer: "як / так і"
        options: ["як / так і", "або / але", "ні / а", "чи / зате"]
        explanation: "Як... так і включає два рівноправні компоненти."
      - sentence: "Правила ухвалено, ____ громади ще не отримали інструкцій."
        answer: "але"
        options: ["але", "і", "чи", "ні"]
        explanation: "Але вводить обмеження до попередньої думки."
      - sentence: "Команда зібрала дані ____ підготувала короткий звіт."
        answer: "й"
        options: ["й", "але", "зате", "або"]
        explanation: "Й поєднує дві дії одного підмета."
      - sentence: "Курс ____ корисний, ____ потребує більше прикладів."
        answer: "корисний / але"
        options: ["корисний / але", "корисний / або", "корисний / ні", "корисний / й"]
        explanation: "Але вводить обмеження до позитивної оцінки."
      - sentence: "____ через втому, ____ через поспіх команда пропустила кому."
        answer: "чи то / чи то"
        options: ["чи то / чи то", "і / і", "ні / ні", "зате / але"]
        explanation: "Чи то... чи то передає непевність щодо причини."

  - type: error-correction
    title: "Редагування: сурядність і пунктуація"
    instruction: "Виправте помилки у сполучниках, симетрії та розділових знаках."
    items:
      - sentence: "Місто хоче оновити транспорт і мешканці чекають змін."
        error: "транспорт і"
        correction: "Місто хоче оновити транспорт, і мешканці чекають змін."
        explanation: "І поєднує дві граматичні основи."
      - sentence: "Команда або скоротить програму або перенесе запуск."
        error: "програму або"
        correction: "Команда або скоротить програму, або перенесе запуск."
        explanation: "У повторюваній конструкції кома ставиться перед другим компонентом."
      - sentence: "Проєкт не тільки зібрав дані, а й відкритість стала більшою."
        error: "а й відкритість стала більшою"
        correction: "Проєкт не тільки зібрав дані, а й зробив процедуру відкритішою."
        explanation: "Обидві частини мають бути побудовані як дієслівні присудки."
      - sentence: "Ми повинні вибрати між швидким запуском або якісною перевіркою."
        error: "між швидким запуском або"
        correction: "Ми повинні вибрати між швидким запуском і якісною перевіркою."
        error_type: "construction"
        explanation: "Після між природна пара між... і."
      - sentence: "Учасники та підтримали курс, просили більше прикладів."
        error: "Учасники та підтримали"
        correction: "Учасники підтримали курс, та просили більше прикладів."
        error_type: "construction"
        explanation: "У значенні але сполучник та стоїть між двома частинами."
      - sentence: "Програма коротша, але має більше практики."
        error: "але має"
        correction: "Програма коротша, зате має більше практики."
        error_type: "construction"
        explanation: "Зате точніше показує, що друга частина компенсує мінус."
      - sentence: "Курс пояснює правила, але також тренує редагування."
        error: "але також"
        correction: "Курс не тільки пояснює правила, а й тренує редагування."
        error_type: "phrase"
        explanation: "Українська градаційна пара звучить природніше."
      - sentence: "Ні поспіх ні страх не допоможуть."
        error: "поспіх ні"
        correction: "Ні поспіх, ні страх не допоможуть."
        error_type: "construction"
        explanation: "Повторюваний сполучник потребує межі перед другим компонентом."
      - sentence: "Бібліотека дає простір, але університет проводить заняття."
        error: "але університет"
        correction: "Бібліотека дає простір, а університет проводить заняття."
        error_type: "construction"
        explanation: "Тут потрібно зіставити ролі, а не створити протиставлення."
      - sentence: "Потрібно вирішити, або запускати курс зараз."
        error: "або запускати"
        correction: "Потрібно вирішити, чи запускати курс зараз."
        error_type: "construction"
        explanation: "У вкладеному питанні природне чи."
      - sentence: "Зустріч почалася пізно, але всі отримали матеріали."
        error: "але всі"
        correction: "Зустріч почалася пізно, зате всі отримали матеріали."
        error_type: "construction"
        explanation: "Друга частина компенсує попередній мінус."
      - sentence: "Методика враховує як точність, і доречність."
        error: "як точність, і"
        correction: "Методика враховує як точність, так і доречність."
        error_type: "construction"
        explanation: "Парна конструкція має закриватися компонентом так і."

  - type: match-up
    title: "Сполучник і функція"
    instruction: "Поєднайте сполучник або конструкцію з типовою функцією."
    pairs:
      - left: "і"
        right: "додавання або нейтральне єднання"
      - left: "а"
        right: "зіставлення двох ролей або фактів"
      - left: "але"
        right: "обмеження, перешкода або контраргумент"
      - left: "зате"
        right: "компенсація після мінуса"
      - left: "або... або"
        right: "вибір між альтернативами"
      - left: "ні... ні"
        right: "подвійне заперечення"
      - left: "не тільки... а й"
        right: "градаційне наростання"
      - left: "як... так і"
        right: "рівноправне включення двох компонентів"
      - left: "чи то... чи то"
        right: "непевність між можливими причинами або назвами"
      - left: "та (= але)"
        right: "протиставлення з нейтральним українським сполучником"
      - left: "крапка з комою"
        right: "межа між довгими частинами з внутрішніми комами"
      - left: "полісиндетон"
        right: "навмисне повторення сполучників для ритму"

  - type: true-false
    title: "Правда чи ні: сурядна пунктуація"
    instruction: "Позначте твердження як правильні або неправильні."
    items:
      - statement: "Одиничне і між двома однорідними додатками зазвичай не потребує коми."
        correct: true
        explanation: "Наприклад: бюджет і календар."
      - statement: "Перед але кома ніколи не ставиться, якщо речення коротке."
        correct: false
        explanation: "Перед але кома зазвичай потрібна навіть у короткому протиставленні."
      - statement: "У конструкції або... або кома ставиться перед другим або."
        correct: true
        explanation: "Це повторюваний сполучник."
      - statement: "А завжди означає конфлікт."
        correct: false
        explanation: "А часто просто зіставляє дві ролі або факти."
      - statement: "Крапка з комою може розділяти довгі частини складносурядного речення з внутрішніми комами."
        correct: true
        explanation: "Такий знак робить межу між частинами видимою."
      - statement: "Не тільки... а й не вимагає граматичної симетрії."
        correct: false
        explanation: "Без симетрії градаційна конструкція звучить незграбно."
      - statement: "Зате часто вказує, що друга частина компенсує попередній мінус."
        correct: true
        explanation: "Наприклад: пізніше, зате якісніше."
      - statement: "Чи природне у вкладених питаннях і контекстах сумніву."
        correct: true
        explanation: "Наприклад: з'ясувати, чи потрібна друга зустріч."
      - statement: "Або... або завжди позначає просте додавання."
        correct: false
        explanation: "Ця пара оформлює вибір або альтернативу."
      - statement: "Кожне речення з і автоматично потребує коми."
        correct: false
        explanation: "Кома залежить від того, чи поєднані граматичні основи."

  - type: critical-analysis
    id: coordination-critical
    title: "Критичний аналіз: який сполучник точніший?"
    instruction: "Порівняйте варіанти і поясніть, який краще відповідає змісту."
    target_text: >-
      1. Держава встановлює правила, але громади адаптують їх до місцевих умов.
      2. Держава встановлює правила, а громади адаптують їх до місцевих умов.
      3. Правила ухвалено, а громади ще не отримали інструкцій.
      4. Правила ухвалено, але громади ще не отримали інструкцій.
    questions:
      - "Чому у другому реченні а точніше за але?"
      - "Чому в четвертому реченні але точніше за а?"
      - "Яке речення показує розподіл функцій, а яке - обмеження?"
      - "Як змінився б тон, якби всюди використати проте?"
    model_answers:
      - "У другому реченні а лише зіставляє ролі держави і громад, тому конфлікту немає."
      - "У четвертому реченні але показує обмеження: правила вже ухвалено, але інструкцій немає."
      - "Друге речення показує розподіл функцій, а четверте - перешкоду або незавершеність процесу."
      - "Проте звучало б книжніше й сильніше, тому його варто берегти для справжнього контраргументу."

