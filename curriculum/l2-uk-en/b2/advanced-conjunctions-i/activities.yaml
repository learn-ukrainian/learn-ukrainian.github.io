  - type: essay-response
    id: coordination-essay
    title: "Письмо: аргумент із сурядними зв'язками"
    instruction: >-
      Напишіть аналітичний абзац про освітній або громадський проєкт.
    prompt: >-
      Напишіть аналітичний абзац про освітній або громадський проєкт. Використайте
      щонайменше один єднальний, один протиставний і один розділовий сполучник,
      а також одну парну конструкцію. Після абзацу коротко поясніть, яку функцію
      виконує кожен сполучник.
    min_words: 170
    model_answer: |-
      > [!model-answer]
      > Університет відкрив короткий курс для волонтерів, і місцева бібліотека
      > надала простір для зустрічей. Одні учасники вже мали досвід перекладу, а
      > інші вперше працювали з офіційними текстами. Програма була компактна,
      > проте вимагала регулярної домашньої роботи. Команда мала або скоротити
      > кількість тем, або збільшити тривалість занять. Курс не тільки пояснював
      > мовні правила, а й учив перевіряти джерела. У цьому абзаці і додає другу
      > подію, а зіставляє дві групи учасників, проте вводить обмеження, або...
      > або оформлює вибір, а не тільки... а й показує градаційне наростання.

