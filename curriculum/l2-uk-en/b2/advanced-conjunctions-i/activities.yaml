- id: coordination-essay
  type: essay-response
  title: "Письмо: аргумент із сурядними зв'язками"
  instruction: "Напишіть 170-220 слів про рішення у громадському, освітньому або культурному проєкті."
  prompt: >-
    Використайте щонайменше один єднальний, один протиставний, один
    розділовий і одну парну або повторювану конструкцію. Після абзацу
    коротко поясніть два пунктуаційні рішення.
  min_words: 170
  model_answer: |-
    > [!model-answer]
    > Міська бібліотека хоче оновити програму мовних зустрічей, і команда
    > вже зібрала відгуки учасників. Одні слухачі просять більше розмовної
    > практики, а інші хочуть коротких граматичних пояснень. Бюджет
    > обмежений, проте організатори можуть змінити розклад без додаткових
    > витрат. Вони або поділять групу за рівнем, або залишать спільну
    > зустріч і додадуть окремий письмовий блок. Новий формат не тільки
    > збереже атмосферу клубу, а й зробить результати вимірюваними. Кома
    > перед і потрібна там, де з'єднано дві граматичні основи: команда
    > зібрала, учасники отримають. Кома перед другим або потрібна, бо це
    > повторювана розділова конструкція.
  rubric:
  - criteria: "Семантична точність"
    description: "Сполучники відповідають реальним відношенням між частинами."
    points: 2
  - criteria: "Пунктуація"
    description: "Коми при протиставленні, повторі та складносурядності обґрунтовані."
    points: 2
  - criteria: "Регістр"
    description: "Текст звучить аналітично, без калькованого але також."
    points: 1
