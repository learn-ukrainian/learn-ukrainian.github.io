version: '1.0'
module: news-analysis
level: b2

inline:
  - id: act-1
    type: reading
    title: Структура новини
    instruction: Прочитайте коротку новину й визначте її частини.
    text: >-
      У Києві 12 серпня відкрили центр психологічної підтримки для ветеранів
      і членів їхніх родин. Про це повідомила міська адміністрація. Центр
      працюватиме щодня, а консультації проводитимуть психологи й соціальні
      працівники. За словами координаторки проєкту, перші групові зустрічі
      заплановано на наступний тиждень.
    source: Навчальна новинна замітка.
    tasks:
      - Який факт стоїть у ліді?
      - Яке джерело названо?
      - Яка цитована позиція додана в корпусі?
      - Чого бракує для ширшого контексту?
      - Чому це радше замітка, а не аналітична стаття?

  - id: act-2
    type: critical-analysis
    title: Фрейм заголовка
    target_text: "Уряд знову пообіцяв допомогу підприємцям після хвилі критики."
    questions:
      - Який факт можна припустити з заголовка?
      - Які слова створюють скептичний фрейм?
      - Як переписати заголовок нейтральніше?
    model_answers:
      - "Можна припустити, що уряд повідомив про допомогу підприємцям."
      - "Скептичний фрейм створюють 'знову', 'пообіцяв', 'після хвилі критики'."
      - "Нейтральніше: 'Уряд оголосив програму допомоги підприємцям'."

  - id: act-3
    type: critical-analysis
    title: Фактчекінг фото
    target_text: >-
      У соцмережі поширили фото нібито з сьогоднішньої події, але це саме фото
      вже було в архіві дворічної давнини.
    questions:
      - Що саме треба перевірити в такій новині?
      - Чому старе фото не доводить сьогоднішню подію?
      - Як сформулювати коротке спростування?
    model_answers:
      - "Треба перевірити дату, місце і найранішу появу фото."
      - "Фото може бути справжнім, але не з цієї події, тому воно не підтверджує новий факт."
      - "Спростування: 'Це фото вже публікували два роки тому, тому воно не може бути доказом сьогоднішньої події'."

  - id: act-4
    type: critical-analysis
    title: Етика цитування
    target_text: "Матеріал виносить образливу цитату в заголовок, але в тексті не пояснює, навіщо її відтворено."
    questions:
      - Чому така подача може бути етично проблемною?
      - Як журналіст може подати цитату відповідальніше?
      - Яка різниця між цитуванням і поширенням шкоди?
    model_answers:
      - "Заголовок може поширити мову ворожнечі ширше, ніж потрібно для розуміння події."
      - "Цитату можна скоротити, контекстуалізувати і не виносити в заголовок."
      - "Цитування пояснює факт, а поширення шкоди повторює образливу мову без потреби."

  - id: act-5
    type: critical-analysis
    title: Порівняння двох рамок
    target_text: >-
      Перше медіа пише: "Місто інвестує в громадський транспорт". Друге:
      "Місто витратить мільйони на чергову транспортну реформу".
    questions:
      - Яку рамку створює перший заголовок?
      - Яку рамку створює другий заголовок?
      - Яких даних бракує для оцінки обох матеріалів?
    model_answers:
      - "Перший заголовок рамкує подію як розвиток і інвестицію."
      - "Другий заголовок рамкує подію як ризик витрат і повторну реформу."
      - "Потрібні дані про бюджет, потребу, джерела фінансування і очікуваний результат."

workbook:
  - type: fill-in
    title: Медіалексика
    instruction: Заповніть пропуски словами з модуля.
    items:
      - sentence: "Перший абзац новини називають ____."
        answer: "лідом"
        options: [лідом, фіналом, рекламою, підписом]
        explanation: Лід стисло подає головну інформацію.
      - sentence: "Подання події під певним кутом - це ____."
        answer: "фреймінг"
        options: [фреймінг, орфографія, копія, дата]
        explanation: Фреймінг визначає рамку сприйняття.
      - sentence: "Свідоме поширення неправдивої інформації - це ____."
        answer: "дезінформація"
        options: [дезінформація, замітка, лаконічність, цитата]
        explanation: Намір відрізняє дезінформацію від помилки.
      - sentence: "Прихована реклама в медіа називається ____."
        answer: "джинса"
        options: [джинса, лід, джерело, жанр]
        explanation: Джинса маскує оплачений матеріал під журналістику.
      - sentence: "Перевірку тверджень у новині називають ____."
        answer: "фактчекінгом"
        options: [фактчекінгом, клікбейтом, монтажем, заголовком]
        explanation: Фактчекінг перевіряє конкретні дані.
      - sentence: "Заголовок, який перебільшує обіцянку тексту, є ____."
        answer: "клікбейтом"
        options: [клікбейтом, джерелом, абревіатурою, бекграундом]
        explanation: Клікбейт привертає увагу ціною точності.
      - sentence: "Ширшу історію, яку повторює медіа, називають ____."
        answer: "наративом"
        options: [наративом, датою, літерою, схемою]
        explanation: Наратив об'єднує окремі повідомлення в повторювану історію.
      - sentence: "Пом'якшувальне слово на кшталт 'оптимізація' є ____."
        answer: "евфемізмом"
        options: [евфемізмом, джерелом, заголовком, репортажем]
        explanation: Евфемізм може пом'якшувати неприємну реальність.
      - sentence: "Різке загострювальне слово є ____."
        answer: "дисфемізмом"
        options: [дисфемізмом, лідом, архівом, таблицею]
        explanation: Дисфемізм посилює негативне сприйняття.
      - sentence: "Попередня інформація про тему новини - це ____."
        answer: "бекграунд"
        options: [бекграунд, клікбейт, фейк, рубрика]
        explanation: Бекграунд допомагає зрозуміти контекст.

  - type: select
    title: Перед поширенням новини
    instruction: Оберіть відповідальну дію читача.
    items:
      - question: Новина має емоційний заголовок і не містить посилання на документ. Що зробити?
        options:
          - text: Знайти першоджерело або утриматися від поширення.
            correct: true
          - text: Поширити негайно, бо заголовок важливий.
            correct: false
          - text: Додати власне припущення.
            correct: false
          - text: Поширити без дати й джерела.
            correct: false
        explanation: Без джерела неможливо відповідально підтвердити твердження.
      - question: Фото вже публікували два роки тому. Який висновок найточніший?
        options:
          - text: Фото не може підтверджувати сьогоднішню подію без пояснення.
            correct: true
          - text: Усі інші факти автоматично неправдиві.
            correct: false
          - text: Дата фото не має значення.
            correct: false
          - text: Фото автоматично доводить усю новину.
            correct: false
        explanation: Старе фото може бути справжнім, але не доказом нової події.
      - question: Матеріал позначено як колонку. Як його читати?
        options:
          - text: Як авторську позицію, відділяючи факти від оцінок.
            correct: true
          - text: Як нейтральну новинну замітку.
            correct: false
          - text: Як офіційний документ.
            correct: false
          - text: Як рекламний банер без автора.
            correct: false
        explanation: Колонка має право на позицію, але факти все одно перевіряються.
      - question: Анонімне джерело може бути виправданим, якщо...
        options:
          - text: редакція пояснює причину анонімності й перевірку інформації.
            correct: true
          - text: джерело звучить переконливо.
            correct: false
          - text: новина швидко поширюється.
            correct: false
          - text: заголовок звучить емоційно.
            correct: false
        explanation: Анонімність потребує редакційної відповідальності.
      - question: Що показує фреймінг?
        options:
          - text: Під яким кутом медіа подає подію.
            correct: true
          - text: Лише кількість абзаців у новині.
            correct: false
          - text: Технічний формат сайту.
            correct: false
          - text: Кількість коментарів під матеріалом.
            correct: false
        explanation: Фреймінг визначає рамку сприйняття.
      - question: Що є ознакою клікбейту?
        options:
          - text: Заголовок обіцяє сенсацію, якої немає в тексті.
            correct: true
          - text: Матеріал має посилання на документ.
            correct: false
          - text: Новина містить дату і джерело.
            correct: false
          - text: Редакція виправляє помилку.
            correct: false
        explanation: Клікбейт перебільшує заради уваги.
      - question: Що відрізняє дезінформацію від місінформації?
        options:
          - text: Свідомий намір поширити неправду.
            correct: true
          - text: Довжина новини.
            correct: false
          - text: Наявність фото.
            correct: false
          - text: Кількість абзаців.
            correct: false
        explanation: Намір є ключовою відмінністю.
      - question: Який висновок доречний після порівняння джерел?
        options:
          - text: Назвати різний фреймінг і межі доступних доказів.
            correct: true
          - text: Автоматично довіряти емоційнішому тексту.
            correct: false
          - text: Ігнорувати порядок джерел.
            correct: false
          - text: Оцінити тільки дизайн сайту.
            correct: false
        explanation: Порівняння має завершуватися доказовим висновком.

  - id: wb-reading
    type: reading
    title: Перевірка локального повідомлення
    text: >-
      У локальному чаті поширили повідомлення, що всі школи міста завтра
      закриють через аварію. Посилання веде на стару новину дворічної давнини,
      але кілька людей уже репостять повідомлення без дати.
    tasks:
      - Яке конкретне твердження треба перевірити?
      - Чому дата є ключовою?
      - Чи можна одразу говорити про дезінформацію?
      - Яке офіційне джерело варто перевірити?

  - id: wb-critical
    type: critical-analysis
    title: Наратив видання
    target_text: >-
      У трьох матеріалах видання місцева влада завжди "обіцяє", активісти
      "вимагають", а мешканці "скаржаться". Жоден матеріал не пояснює, які
      рішення вже ухвалено або які ресурси потрібні.
    questions:
      - Який образ влади створює добір дієслів?
      - Чого бракує для повнішого висвітлення?
      - Чому це може бути наративом, а не випадковістю?
    model_answers:
      - "Влада виглядає пасивною або ненадійною, бо постійно 'обіцяє'."
      - "Бракує інформації про ухвалені рішення, ресурси, строки і відповідальних."
      - "Повтор тих самих ролей у кількох матеріалах може свідчити про сталішу редакційну рамку."

  - id: wb-critical-source
    type: critical-analysis
    title: Редакційне рішення
    target_text: "Редактор має фото, цитату очевидця і непідтверджену цифру постраждалих."
    questions:
      - Що можна публікувати негайно?
      - Що потребує перевірки перед публікацією?
      - Як сформулювати межу знання?
    model_answers:
      - "Можна повідомити підтверджені елементи з чітким джерелом."
      - "Цифра постраждалих потребує офіційного або незалежного підтвердження."
      - "Наприклад: 'На момент публікації кількість постраждалих офіційно не підтверджена'."
