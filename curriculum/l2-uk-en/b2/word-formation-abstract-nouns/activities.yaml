version: '1.0'
module: word-formation-abstract-nouns
level: b2
inline:
  - type: fill-in
    title: "Утворіть іменник на -ість"
    instruction: "Виберіть природний абстрактний іменник, який називає якість або стан."
    items:
      - sentence: "Чесний підхід -> ____ підходу."
        answer: "чесність"
        options: ["чесність", "чеснотація", "чеснування", "чесний"]
        explanation: "Чесний -> чесність: назва моральної якості."
      - sentence: "Прозоре рішення -> ____ рішення."
        answer: "прозорість"
        options: ["прозорість", "прозорування", "прозорство", "прозор"]
        explanation: "Прозорість називає відкритість процедури."
      - sentence: "Відповідальна команда -> ____ команди."
        answer: "відповідальність"
        options: ["відповідальність", "відповідання", "відповідство", "відповідний"]
        explanation: "Відповідальність - абстрактна якість або обов'язок."
      - sentence: "Незалежна держава -> ____ держави."
        answer: "незалежність"
        options: ["незалежність", "незалежування", "незалежство", "незалежа"]
        explanation: "Незалежність називає політичний або особистий стан."
      - sentence: "Складне завдання -> ____ завдання."
        answer: "складність"
        options: ["складність", "складання", "складство", "складний"]
        explanation: "Складність - властивість завдання."
      - sentence: "Точне формулювання -> ____ формулювання."
        answer: "точність"
        options: ["точність", "точнування", "точество", "точення"]
        explanation: "Точність називає якість формулювання."
      - sentence: "Гідна позиція -> ____ позиції."
        answer: "гідність"
        options: ["гідність", "гіднування", "гідство", "гідний"]
        explanation: "Гідність - назва цінності або якості."
      - sentence: "Важлива деталь -> ____ деталі."
        answer: "важливість"
        options: ["важливість", "важення", "важливство", "важлива"]
        explanation: "Важливість називає ступінь значущості."
      - sentence: "Щира відповідь -> ____ відповіді."
        answer: "щирість"
        options: ["щирість", "щирування", "щирство", "щирий"]
        explanation: "Щирість називає якість відповіді."
      - sentence: "Ефективна комунікація -> ____ комунікації."
        answer: "ефективність"
        options: ["ефективність", "ефектування", "ефективство", "ефект"]
        explanation: "Ефективність називає якість процесу або дії."

  - type: group-sort
    title: "Що називає абстрактний іменник?"
    instruction: "Розподіліть слова за головним словотвірним значенням."
    groups:
      - name: "Якість або стан"
        items: ["щирість", "гідність", "прозорість", "незалежність"]
      - name: "Збірність або сфера"
        items: ["людство", "козацтво", "виробництво", "підприємництво"]
      - name: "Процес або результат дії"
        items: ["дослідження", "читання", "відкриття", "навчання"]
      - name: "Напрям або ідеологія"
        items: ["реалізм", "модернізм", "плюралізм", "фемінізм"]

  - type: match-up
    title: "Дія, процес чи результат"
    instruction: "Поєднайте дієслово з іменником і поясненням його найтиповішого значення."
    pairs:
      - left: "читати -> читання"
        right: "процес або заняття"
      - left: "досліджувати -> дослідження"
        right: "процес і результат наукової роботи"
      - left: "жити -> життя"
        right: "стан існування або досвід"
      - left: "відкрити -> відкриття"
        right: "подія або результат"
      - left: "розглядати -> розгляд"
        right: "офіційна процедура"
      - left: "записувати -> запис"
        right: "результат дії"
      - left: "оцінювати -> оцінювання"
        right: "процес виставлення оцінки"
      - left: "оцінити -> оцінка"
        right: "результат або судження"
      - left: "планувати -> планування"
        right: "процес підготовки"
      - left: "планувати -> план"
        right: "документ або задум"

  - type: select
    title: "Абстрактний іменник без кальки"
    instruction: "Позначте варіанти, які звучать природно й не перевантажують речення."
    items:
      - question: "Як краще передати «здійснення аналізу причин»?"
        min_correct: 2
        options:
          - text: "аналіз причин"
            correct: true
          - text: "проаналізувати причини"
            correct: true
          - text: "здійснити здійснення аналізу"
            correct: false
          - text: "робити аналізацію причин"
            correct: false
        explanation: "Порожнє дієслово здійснювати часто можна прибрати."
      - question: "Які варіанти природні для офіційного повідомлення?"
        min_correct: 2
        options:
          - text: "Комісія розглянула заяву."
            correct: true
          - text: "Розгляд заяви тривав годину."
            correct: true
          - text: "Було проведено здійснення розгляду."
            correct: false
          - text: "Комісія зробила розглядання заяви."
            correct: false
        explanation: "Дія або процедура має бути названа без зайвого іменникового ланцюга."
      - question: "Які речення пояснюють абстрактний термін конкретно?"
        min_correct: 2
        options:
          - text: "Прозорість бюджету означає відкриті джерела доходів і статті витрат."
            correct: true
          - text: "Відповідальність команди видно в тому, що вона публікує звіт."
            correct: true
          - text: "Прозорість є важливістю значущості процесу."
            correct: false
          - text: "Відповідальність відповідає відповідальному відповідству."
            correct: false
        explanation: "Абстракція сильніша, коли поруч є конкретний приклад."
      - question: "Як уживати слова на -ізм у нейтральному аналізі?"
        min_correct: 2
        options:
          - text: "Пояснити ознаки явища, а не тільки поставити ярлик."
            correct: true
          - text: "Уточнити, про який напрям або ідеологію йдеться."
            correct: true
          - text: "Замінити будь-який аргумент словом «популізм»."
            correct: false
          - text: "Додавати -ізм до кожного прикметника без перевірки."
            correct: false
        explanation: "Назва напряму має спиратися на аналіз ознак."
      - question: "Коли форма на -ість доречна?"
        min_correct: 2
        options:
          - text: "Коли якість є темою речення."
            correct: true
          - text: "Коли поруч можна дати конкретний приклад."
            correct: true
          - text: "Коли треба приховати дію."
            correct: false
          - text: "Коли слово не має значення в контексті."
            correct: false
        explanation: "Абстрактна якість має працювати в аргументі."
      - question: "Як розрізнити процес і результат?"
        min_correct: 2
        options:
          - text: "Оцінювання може тривати."
            correct: true
          - text: "Оцінка може бути результатом."
            correct: true
          - text: "Планування і план завжди синоніми."
            correct: false
          - text: "Процес не потребує контексту."
            correct: false
        explanation: "Віддієслівні іменники часто змінюють значення за контекстом."
      - question: "Які варіанти краще за кальку?"
        min_correct: 2
        options:
          - text: "ухвалити рішення"
            correct: true
          - text: "підтримати студентів"
            correct: true
          - text: "робити прийняття рішення"
            correct: false
          - text: "здійснювати реалізацію підтримки"
            correct: false
        explanation: "Природні дієслова часто кращі за порожні номіналізації."
      - question: "Як зробити термін зрозумілим?"
        min_correct: 2
        options:
          - text: "Дати визначення."
            correct: true
          - text: "Додати приклад."
            correct: true
          - text: "Повторити термін п'ять разів."
            correct: false
          - text: "Не називати контекст."
            correct: false
        explanation: "Термін потребує рамки, прикладу або контрасту."

  - type: error-correction
    title: "Скоротіть важку номіналізацію"
    instruction: "Виправте канцелярську або кальковану конструкцію."
    items:
      - sentence: "Комісія здійснила проведення перевірки документів."
        error: "здійснила проведення перевірки"
        correction: "перевірила"
        options: ["перевірила", "здійснила проведення перевірки", "зробила перевірювання", "провела здійснення"]
        explanation: "Коли важлива дія, дієслово робить речення ясним."
      - sentence: "Відбулося ухвалення рішення радою."
        error: "Відбулося ухвалення рішення радою"
        correction: "Рада ухвалила рішення"
        options: ["Рада ухвалила рішення", "Відбулося ухвалення рішення радою", "Рішення мало ухвалення", "Радою було зроблено ухвалення"]
        explanation: "Активна конструкція повертає виконавця дії."
      - sentence: "Маємо питання покращення прозорості бюджету."
        error: "питання покращення прозорості"
        correction: "як підвищити прозорість"
        options: ["як підвищити прозорість", "питання покращення прозорості", "проблематика здійснення прозорості", "покращальність прозорості"]
        explanation: "Заміна на питання з дієсловом зменшує абстрактний ланцюг."
      - sentence: "Проєкт робить реалізацію підтримки студентів."
        error: "робить реалізацію підтримки"
        correction: "підтримує"
        options: ["підтримує", "робить реалізацію підтримки", "підтримувальність реалізує", "здійснює підтримування підтримки"]
        explanation: "Дієслово підтримує передає зміст без кальки."
      - sentence: "Важливість здійснення аналізу є очевидною."
        error: "Важливість здійснення аналізу"
        correction: "Важливо проаналізувати"
        options: ["Важливо проаналізувати", "Важливість здійснення аналізу", "Аналізаційна важливість", "Здійснюваність аналізування"]
        explanation: "Прикметниково-дієслівна конструкція часто читабельніша."
      - sentence: "Прозорість є значущою цінністю прозорого процесу прозорості."
        error: "прозорого процесу прозорості"
        correction: "відкритої процедури"
        options: ["відкритої процедури", "прозорого процесу прозорості", "прозорізаційного процесу", "прозорості прозорої прозорості"]
        explanation: "Повтор абстракції треба замінити конкретним означенням."
      - sentence: "Було здійснено реалізацію інформування учасників."
        error: "здійснено реалізацію інформування"
        correction: "поінформовано"
        options: ["поінформовано", "здійснено реалізацію інформування", "реалізовано інформативність", "проведено інформування інформування"]
        explanation: "Коротша форма не втрачає офіційності й повертає дію."
      - sentence: "Команда мала наявність прагнення до покращення якості."
        error: "мала наявність прагнення до покращення"
        correction: "прагнула поліпшити"
        options: ["прагнула поліпшити", "мала наявність прагнення до покращення", "наявнісно прагнула покращальності", "здійснила прагнення"]
        explanation: "Дієслово робить вислів яснішим."

workbook:
  - type: fill-in
    title: "Доберіть суфіксальну модель"
    instruction: "Виберіть іменник, який найкраще відповідає значенню."
    items:
      - sentence: "Сфера створення товарів і послуг - це ____."
        answer: "виробництво"
        options: ["виробництво", "виробність", "виробленнямізм", "виробник"]
        explanation: "Виробництво називає сферу або процес."
      - sentence: "Усі люди як спільнота - це ____."
        answer: "людство"
        options: ["людство", "людяність", "людування", "людина"]
        explanation: "Людство - збірне поняття."
      - sentence: "Процес навчати або навчатися - ____."
        answer: "навчання"
        options: ["навчання", "навчальність", "навчизм", "навчство"]
        explanation: "Навчання - віддієслівний іменник на -ння."
      - sentence: "Подія, коли щось відкрили, - ____."
        answer: "відкриття"
        options: ["відкриття", "відкритість", "відкривство", "відкриваннямізм"]
        explanation: "Відкриття може називати подію або результат."
      - sentence: "Множинність позицій у політичному житті - ____."
        answer: "плюралізм"
        options: ["плюралізм", "плюральність", "плюрування", "плюрство"]
        explanation: "Плюралізм називає принцип або напрям суспільного мислення."
      - sentence: "Якість відкритої процедури - ____."
        answer: "прозорість"
        options: ["прозорість", "прозорування", "прозоризм", "прозорство"]
        explanation: "Прозорість - іменник на -ість."
      - sentence: "Процес перевірки за критеріями - ____."
        answer: "оцінювання"
        options: ["оцінювання", "оцінність", "оцінство", "оцінізм"]
        explanation: "Оцінювання називає процес."
      - sentence: "Результат планування - ____."
        answer: "план"
        options: ["план", "планування", "планізм", "планство"]
        explanation: "План - результат або документ, а планування - процес."
      - sentence: "Стан або якість бути відповідальним - ____."
        answer: "відповідальність"
        options: ["відповідальність", "відповідання", "відповідство", "відповідизм"]
        explanation: "Відповідальність - абстрактний іменник на -ість."
      - sentence: "Оновлення системи або практики - ____."
        answer: "модернізація"
        options: ["модернізація", "модерність", "модерство", "модернник"]
        explanation: "Модернізація називає процес оновлення."

  - type: group-sort
    title: "Процес чи результат?"
    instruction: "Розподіліть слова за тим, що вони найчастіше називають у контексті."
    groups:
      - name: "Процес"
        items: ["читання", "планування", "оцінювання", "обговорення"]
      - name: "Результат або документ"
        items: ["запис", "план", "оцінка", "звіт"]
      - name: "Може бути і процесом, і результатом"
        items: ["дослідження", "відкриття", "розроблення", "переклад"]

  - type: match-up
    title: "Абстракція і конкретизація"
    instruction: "Поєднайте абстрактний термін із конкретним поясненням."
    pairs:
      - left: "прозорість бюджету"
        right: "відкриті доходи, витрати й рішення"
      - left: "відповідальність команди"
        right: "звітність і готовність пояснити дії"
      - left: "гідність"
        right: "цінність людини й повага до неї"
      - left: "незалежність"
        right: "можливість діяти без зовнішнього примусу"
      - left: "солідарність"
        right: "підтримка інших у спільній справі"
      - left: "легітимність"
        right: "визнана правомірність рішення або влади"
      - left: "ефективність комунікації"
        right: "швидка відповідь і зрозуміла інструкція"
      - left: "оцінювання результатів"
        right: "процес перевірки за критеріями"
      - left: "плюралізм"
        right: "співіснування різних позицій"
      - left: "модернізація"
        right: "оновлення системи або практики"

  - id: workbook-4
    type: essay-response
    title: "Редагування абстрактного абзацу"
    min_words: 150
    prompt: >-
      Напишіть 150-180 слів як короткий коментар до громадського звіту. Використайте
      щонайменше шість абстрактних іменників: два на -ість, один на -ство/-цтво,
      два віддієслівні іменники й один термін на -ізм або інший книжний абстрактний
      іменник. Одне перевантажене речення свідомо спростіть.
    model_answer: |-
      > [!model-answer]
      Прозорість бюджету важлива не як гасло, а як доступ до конкретних даних: джерел доходів, витрат і підстав для рішень. Відповідальність команди видно в тому, що вона публікує звіт і пояснює зміни в плані. У першій чернетці було речення «відбулося здійснення аналізу можливості реалізації заходів». Я б написав простіше: «команда проаналізувала, чи можна реалізувати ці заходи». Так зберігається офіційний стиль, але дія не ховається за іменниками. Для суспільства важливі не тільки звіти, а й довіра до процесу ухвалення рішень. Якщо в тексті згадується плюралізм думок, треба показати, які позиції справді були почуті.
    rubric:
      - criteria: "Суфіксальні моделі"
        description: "Є потрібні типи абстрактних іменників."
        points: 2
      - criteria: "Редагування"
        description: "Хоч одне перевантажене речення спрощено без втрати стилю."
        points: 2
      - criteria: "Конкретність"
