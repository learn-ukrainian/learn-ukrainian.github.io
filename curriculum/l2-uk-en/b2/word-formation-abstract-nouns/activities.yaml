version: '1.0'
module: word-formation-abstract-nouns
level: b2
inline: []
workbook:
  - type: reading
    id: abstract-nouns-reading
    title: "Читання: цінності в культурному есе"
    instruction: "Прочитайте уривок і визначте, як абстрактні іменники будують аргументацію."
    source: "Навчальний уривок для модуля B2."
    text: >-
      У дискусії про мистецтво й ремісництво важливо не зводити все до ціни предмета або популярності автора. Мистецтво потребує творчості, але творчість не заперечує майстерності. Ремісництво спирається на вправність, повторення й вдосконалення техніки, проте саме ця досконалість іноді відкриває простір для нової ідеї. Суспільство цінує незалежність митця, але також очікує відповідальності перед спільнотою. Тому межа між мистецтвом і ремісництвом проходить не там, де закінчується праця руками, а там, де починається свідоме визначення цінності.
    tasks:
      - "Випишіть п'ять абстрактних іменників на -ість."
      - "Знайдіть два слова на -ств(о) або -цтв(о)."
      - "Поясніть, як слово «визначення» працює в останньому реченні."
      - "Сформулюйте головну думку уривка одним реченням."
  - type: essay-response
    id: abstract-nouns-essay
    title: "Власне висловлення: мистецтво чи ремісництво"
    instruction: "Напишіть щонайменше 250 слів із чіткою логічною структурою."
    prompt: "Напишіть текст на тему: «Мистецтво чи ремісництво: де проходить межа?» Використовуйте щонайменше 15 абстрактних іменників, утворених за допомогою різних суфіксів (-ість, -ство, -ння). Зверніть увагу на термінологію мистецтвознавства й правильне вживання закінчень у непрямих відмінках."
    min_words: 250
    model_answer: "Межа між мистецтвом і ремісництвом не проходить між натхненням і працею, бо творчість потребує майстерності, а майстерність часто народжується через повторення, терпіння й вдосконалення. Ремісництво дає формі точність, досконалість, витривалість і відповідальність перед матеріалом. Мистецтво додає до цієї вправності інтерпретацію, свободу, цінність, гідність авторського бачення й здатність змінювати свідомість глядача. Якщо предмет зроблено бездумно, навіть висока техніка не створює глибокого переживання. Але якщо твір нехтує якістю виконання, його незалежність може перетворитися на випадковість. Тому справжнє мистецтво не заперечує ремісництва, а підносить його. У цьому процесі важливі дослідження традиції, визначення мети, прагнення до новизни, зобов'язання перед спільнотою, розуміння контексту й постійне вдосконалення мови форми. Суспільство часто шукає просту відповідь, проте культурна цінність виникає саме в напруженні між технікою і свободою. Отже, ремісництво є основою, а мистецтво — свідомим перетворенням майстерності на значення."
    rubric:
      - criteria: "Абстрактна лексика"
        description: "Використано щонайменше 15 абстрактних іменників із різними суфіксами."
        points: 2
      - criteria: "Логічна структура"
        description: "Є теза, аргументи, приклади й висновок."
        points: 2
      - criteria: "Мовна точність"
        description: "Правильно вжито відмінкові форми абстрактних іменників."
        points: 1
  - type: critical-analysis
    id: abstract-nouns-critical
    title: "Критичний аналіз: номіналізація і стиль"
    instruction: "Проаналізуйте, як абстрактні іменники змінюють стиль тексту."
    target_text: "Ми дослідили матеріал і визначили головні критерії. Після дослідження матеріалу й визначення критеріїв автори перейшли до вдосконалення методики."
    questions:
      - "Яка версія звучить розмовніше, а яка формальніше?"
      - "Які абстрактні іменники замінили дієслова?"
      - "Коли така номіналізація корисна, а коли вона обтяжує текст?"
    model_answers:
      - "Перша версія розмовніша й динамічніша, друга формальніша й ближча до наукового стилю."
      - "Дослідження, визначення й вдосконалення замінили дії дослідити, визначити, вдосконалити."
      - "Номіналізація корисна для логіки й стислості, але надмірні ланцюги іменників роблять текст канцелярським."
    focus_points:
      - "номіналізація"
      - "науковий стиль"
      - "редагування надмірної абстракції"
  - type: quiz
    title: "Розпізнайте модель"
    instruction: "Оберіть правильну відповідь."
    items:
      - question: "Від якого прикметника утворено іменник «гідність»?"
        options:
          - text: "гідний"
            correct: true
          - text: "гідно"
            correct: false
          - text: "гід"
            correct: false
          - text: "гіднувати"
            correct: false
        explanation: "Суфікс -ість творить назву якості від прикметника."
      - question: "Яке слово належить до третьої відміни?"
        options:
          - text: "свідомість"
            correct: true
          - text: "мистецтво"
            correct: false
          - text: "дослідження"
            correct: false
          - text: "розгляд"
            correct: false
        explanation: "Іменники на -ість мають жіночий рід і третю відміну."
      - question: "Який варіант правильно називає процес поліпшення?"
        options:
          - text: "вдосконалення"
            correct: true
          - text: "вдосконалість"
            correct: false
          - text: "вдосконало"
            correct: false
          - text: "вдосконалий"
            correct: false
        explanation: "Вдосконалення походить від дієслова вдосконалювати."
      - question: "У якому слові видно модель -цтв(о)?"
        options:
          - text: "козацтво"
            correct: true
          - text: "козак"
            correct: false
          - text: "козацький"
            correct: false
          - text: "козакувати"
            correct: false
        explanation: "Козацтво є збірним абстрактним іменником."
      - question: "Яке слово є безсуфіксною формою від дії?"
        options:
          - text: "розгляд"
            correct: true
          - text: "розглядання"
            correct: false
          - text: "розглядовий"
            correct: false
          - text: "розглядність"
            correct: false
        explanation: "Розгляд - компактна офіційна номінація."
      - question: "Який правопис нормативний?"
        options:
          - text: "патріотизм"
            correct: true
          - text: "патріотізм"
            correct: false
          - text: "патріотісм"
            correct: false
          - text: "патріотізьм"
            correct: false
        explanation: "Після т у цій позиції пишемо -изм."
      - question: "Яке слово називає готову формулу або процес формулювання?"
        options:
          - text: "визначення"
            correct: true
          - text: "визначність"
            correct: false
          - text: "визначно"
            correct: false
          - text: "визначний"
            correct: false
        explanation: "Визначення може означати процес або результат."
      - question: "Яке слово найкраще відповідає поняттю society?"
        options:
          - text: "суспільство"
            correct: true
          - text: "суспільний"
            correct: false
          - text: "суспільно"
            correct: false
          - text: "суспільність"
            correct: false
        explanation: "Суспільство - збірне абстрактне поняття."
      - question: "Яке слово утворено від дієслова «жити»?"
        options:
          - text: "життя"
            correct: true
          - text: "живість"
            correct: false
          - text: "житловість"
            correct: false
          - text: "живлення"
            correct: false
        explanation: "Життя має суфіксальну модель на -ття."
      - question: "Яке слово називає художній напрям?"
        options:
          - text: "реалізм"
            correct: true
          - text: "реальний"
            correct: false
          - text: "реально"
            correct: false
          - text: "реальність"
            correct: false
        explanation: "Реалізм може називати художній метод."
      - question: "Яка форма правильно вжита після прийменника «до»?"
        options:
          - text: "до гідності"
            correct: true
          - text: "до гідність"
            correct: false
          - text: "до гідністю"
            correct: false
          - text: "до гідностю"
            correct: false
        explanation: "До керує родовим відмінком."
      - question: "Який варіант найменш канцелярський?"
        options:
          - text: "після аналізу результатів"
            correct: true
          - text: "після завершення проведення аналізу результатів"
            correct: false
          - text: "після здійснення проведення аналізування результатів"
            correct: false
          - text: "після виконання проведення аналітичності результатів"
            correct: false
        explanation: "Надмірна номіналізація обтяжує стиль."
  - type: match-up
    title: "Модель і приклад"
    instruction: "Поєднайте слово з його словотвірною моделлю."
    pairs:
      - left: "гідність"
        right: "-ість від прикметника"
      - left: "незалежність"
        right: "назва якості або цінності"
      - left: "мистецтво"
        right: "-ств(о), сфера творчості"
      - left: "ремісництво"
        right: "-цтв(о), діяльність"
      - left: "суспільство"
        right: "збірне поняття"
      - left: "дослідження"
        right: "віддієслівний іменник на -ення"
      - left: "прагнення"
        right: "віддієслівний іменник на -ння"
      - left: "життя"
        right: "іменник на -ття"
      - left: "патріотизм"
        right: "назва ідеологічної цінності на -изм"
      - left: "реалізм"
        right: "назва художнього напряму на -ізм"
      - left: "розгляд"
        right: "безсуфіксна номіналізація"
      - left: "запис"
        right: "дія або результат без видимого суфікса"
  - type: fill-in
    title: "Доберіть абстрактний іменник"
    instruction: "Заповніть пропуск нормативною формою."
    items:
      - sentence: "____ людини не можна зводити до посади."
        answer: "Гідність"
        options: ["Гідність", "Гідний", "Гідно", "Гіднування"]
        explanation: "Потрібна назва якості."
      - sentence: "Ми пишаємося ____ держави."
        answer: "незалежністю"
        options: ["незалежністю", "незалежність", "незалежності", "незалежний"]
        explanation: "Пишаємося керує орудним відмінком."
      - sentence: "____ методики триває весь семестр."
        answer: "Вдосконалення"
        options: ["Вдосконалення", "Вдосконалість", "Вдосконало", "Вдосконалий"]
        explanation: "Йдеться про процес поліпшення."
      - sentence: "____ пропозиції відбудеться після консультацій."
        answer: "Розгляд"
        options: ["Розгляд", "Розглядання", "Розглядність", "Розглядово"]
        explanation: "Офіційний стиль часто використовує розгляд."
      - sentence: "____ школи завершиться восени."
        answer: "Будівництво"
        options: ["Будівництво", "Будування", "Будівельність", "Будівельно"]
        explanation: "Будівництво називає організований процес або об'єкт."
      - sentence: "____ у літературі має історичні межі."
        answer: "Реалізм"
        options: ["Реалізм", "Реальність", "Реально", "Реальний"]
        explanation: "Реалізм - назва напряму."
      - sentence: "____ поняття подано в першому абзаці."
        answer: "Визначення"
        options: ["Визначення", "Визначність", "Визначно", "Визначний"]
        explanation: "Визначення може бути готовою формулою."
      - sentence: "____ до свободи стало темою виступу."
        answer: "Прагнення"
        options: ["Прагнення", "Прагненість", "Прагнено", "Праглий"]
        explanation: "Прагнення походить від дієслова прагнути."
      - sentence: "____ сторін записані в угоді."
        answer: "Зобов'язання"
        options: ["Зобов'язання", "Зобов'язаність", "Зобов'язано", "Зобов'язальний"]
        explanation: "Зобов'язання має правовий відтінок."
      - sentence: "____ не виключає творчості."
        answer: "Ремісництво"
        options: ["Ремісництво", "Ремісник", "Ремісничо", "Ремісничий"]
        explanation: "Ремісництво називає діяльність."
      - sentence: "У ____ суспільства змінився образ мови."
        answer: "свідомості"
        options: ["свідомості", "свідомість", "свідомістю", "свідомий"]
        explanation: "Після у потрібен місцевий відмінок."
      - sentence: "____ зустрічі збережено в архіві."
        answer: "Запис"
        options: ["Запис", "Записування", "Записність", "Записно"]
        explanation: "Запис може означати готовий результат."
  - type: cloze
    title: "Абстракції в аргументації"
    instruction: "Заповніть пропуски словами з банку."
    passage: >-
      У дискусії про {1} й {2} важливі не тільки смак і ціна. {3} форми потребує технічної вправності, але {4} виникає тоді, коли майстерність отримує нове значення. {5} автора не заперечує {6} перед спільнотою. Після {7} традиції й {8} критеріїв можна говорити про {9} методу. Якщо текст аналізує {10}, йому потрібне точне {11}. У культурній статті слова {12}, {13}, {14} і {15} допомагають описати систему поглядів. А короткий {16} матеріалів часто звучить природніше, ніж довге розглядання.
    blanks:
      - id: 1
        answer: "мистецтво"
        options: ["мистецтво", "мистецький", "мистецько", "митець"]
      - id: 2
        answer: "ремісництво"
        options: ["ремісництво", "ремісник", "ремісничо", "ремісничий"]
      - id: 3
        answer: "досконалість"
        options: ["досконалість", "досконалий", "досконало", "досконалення"]
      - id: 4
        answer: "творчість"
        options: ["творчість", "творити", "творчо", "творець"]
      - id: 5
        answer: "незалежність"
        options: ["незалежність", "незалежний", "незалежно", "незалежнення"]
      - id: 6
        answer: "відповідальності"
        options: ["відповідальності", "відповідальність", "відповідальністю", "відповідальний"]
      - id: 7
        answer: "дослідження"
        options: ["дослідження", "дослідність", "дослідно", "дослідний"]
      - id: 8
        answer: "визначення"
        options: ["визначення", "визначність", "визначно", "визначний"]
      - id: 9
        answer: "вдосконалення"
        options: ["вдосконалення", "вдосконалість", "вдосконало", "вдосконалий"]
      - id: 10
        answer: "ідеологію"
        options: ["ідеологію", "ідеологічно", "ідеологічний", "ідеологізм"]
      - id: 11
        answer: "визначення"
        options: ["визначення", "визначність", "визначно", "визначний"]
      - id: 12
        answer: "гуманізм"
        options: ["гуманізм", "гуманність", "гуманно", "гуманний"]
      - id: 13
        answer: "реалізм"
        options: ["реалізм", "реальність", "реально", "реальний"]
      - id: 14
        answer: "патріотизм"
        options: ["патріотизм", "патріотізм", "патріотично", "патріотичний"]
      - id: 15
        answer: "модернізм"
        options: ["модернізм", "модерність", "модерно", "модерний"]
      - id: 16
        answer: "розгляд"
        options: ["розгляд", "розглядання", "розглядність", "розглядово"]
  - type: error-correction
    title: "Виправте словотвір і відмінок"
    instruction: "Знайдіть помилку й запропонуйте нормативну форму."
    items:
      - sentence: "Ми пишаємося незалежність держави."
        error: "незалежність"
        correction: "незалежністю"
        explanation: "Пишаємося керує орудним відмінком."
      - sentence: "У нашій країні високий патріотізм."
        error: "патріотізм"
        correction: "патріотизм"
        explanation: "У цьому слові пишемо -изм."
      - sentence: "Він показав глибоку розуміність проблеми."
        error: "розуміність"
        correction: "розуміння"
        explanation: "Від дієслова розуміти творимо розуміння."
      - sentence: "До гідність людини треба ставитися серйозно."
        error: "гідність"
        correction: "гідності"
        explanation: "До керує родовим відмінком."
      - sentence: "Будування школи завершиться восени."
        error: "Будування"
        correction: "Будівництво"
        explanation: "Для організованого проєкту природніше будівництво."
      - sentence: "Після наше повернення почалася гроза."
        error: "наше"
        correction: "нашого"
        explanation: "Після іменника повернення потрібен родовий залежного слова."
      - sentence: "Досконалення форми не завжди створює мистецтво."
        error: "Досконалення"
        correction: "Досконалість"
        explanation: "Йдеться про якість, а не процес поліпшення."
      - sentence: "Розглядність пропозиції тривала тиждень."
        error: "Розглядність"
