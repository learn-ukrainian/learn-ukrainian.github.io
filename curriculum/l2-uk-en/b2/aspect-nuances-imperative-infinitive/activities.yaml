- type: reading
  id: aspect-imperative-infinitive-reading
  title: "Читання: інструктаж у громадському центрі"
  instruction: "Прочитайте уривок і визначте, як вид змінює наказ, заборону й дозвіл."
  source: "Навчальний уривок для модуля B2."
  text: >-
    Перед початком зустрічі адміністраторка сказала: «Заходьте до зали, сідайте ближче до проходу й читайте інструкцію на екрані. Після реєстрації підпишіть форму й перевірте адресу електронної пошти. Не відкривайте службові шафи без дозволу, не залишайте речі в коридорі й не забудьте забрати перепустку після заняття. Якщо маєте питання, звертайтеся до координатора. Документи подавати до канцелярії до 17:00».
  tasks:
    - "Випишіть три недоконані імперативи, які звучать як запрошення або правило."
    - "Випишіть два доконані імперативи, які вимагають результату."
    - "Поясніть різницю між «не відкривайте» і «не забудьте»."
    - "Знайдіть інфінітив, який виконує функцію офіційного припису."

- type: quiz
  title: "Наказ, прохання і вид"
  instruction: "Оберіть форму, яка найточніше відповідає ситуації."
  items:
    - question: "Яке речення просить завершити конкретну дію?"
      options:
        - text: "Прочитайте інструкцію до кінця."
          correct: true
        - text: "Читайте інструкції уважно."
          correct: false
        - text: "Читати інструкції цікаво."
          correct: false
        - text: "Читали інструкцію вчора."
          correct: false
      explanation: "Доконане прочитайте вимагає завершеного результату."
    - question: "Яка форма природна як ввічливе запрошення сісти?"
      options:
        - text: "Сідайте, будь ласка."
          correct: true
        - text: "Сядьте назавжди."
          correct: false
        - text: "Сісти будь ласка."
          correct: false
        - text: "Сиділи будь ласка."
          correct: false
      explanation: "Сідайте відкриває м'яке запрошення до дії."
    - question: "Де правильно передано спільне спонукання?"
      options:
        - text: "Поговорімо про приклади."
          correct: true
        - text: "Давай поговорим у протоколі."
          correct: false
        - text: "Поговорімте про приклади."
          correct: false
        - text: "Поговорити про приклади."
          correct: false
      explanation: "Поговорімо є нормативною синтетичною формою."
    - question: "Яке речення забороняє тип дії?"
      options:
        - text: "Не відкривайте підозрілі посилання."
          correct: true
        - text: "Не відкрийте не той файл."
          correct: false
        - text: "Відкрийте посилання."
          correct: false
        - text: "Відкрити посилання."
          correct: false
      explanation: "Недоконане не відкривайте забороняє поведінку."
    - question: "Яке речення є застереженням від небажаного результату?"
      options:
        - text: "Не забудьте перепустку."
          correct: true
        - text: "Не забувайте правила щодня."
          correct: false
        - text: "Забудьте перепустку."
          correct: false
        - text: "Забували перепустку."
          correct: false
      explanation: "Не забудьте попереджає про небажаний результат."
    - question: "Після якого дієслова природно вжити недоконаний інфінітив?"
      options:
        - text: "почали перевіряти"
          correct: true
        - text: "почали перевірити"
          correct: false
        - text: "почали перевірений"
          correct: false
        - text: "почали перевірка"
          correct: false
      explanation: "Почати відкриває процес."
    - question: "Що означає «можна заходити без запису»?"
      options:
        - text: "загальний дозвіл або правило"
          correct: true
        - text: "одна завершена дія зараз"
          correct: false
        - text: "заборона заходити"
          correct: false
        - text: "минулий результат"
          correct: false
      explanation: "Недоконаний інфінітив передає загальне правило."
    - question: "Яка форма краще підходить для службового дедлайну?"
      options:
        - text: "Документи подати до 17:00."
          correct: true
        - text: "Документи подавайте випадково."
          correct: false
        - text: "Документи поданий до 17:00."
          correct: false
        - text: "Документи подавали завтра."
          correct: false
      explanation: "Інфінітив може стисло передавати офіційний припис."
    - question: "Де вид правильно передає правило?"
      options:
        - text: "Перевіряйте адресу перед надсиланням."
          correct: true
        - text: "Перевірте адресу перед кожним надсиланням."
          correct: false
        - text: "Перевірений адресу перед надсиланням."
          correct: false
        - text: "Перевірити адресу вчора."
          correct: false
      explanation: "Перед кожним надсиланням потрібен недоконаний вид."
    - question: "Яка форма не є нормативною українською спільною командою?"
      options:
        - text: "підемоте"
          correct: true
        - text: "ходімо"
          correct: false
        - text: "працюймо"
          correct: false
        - text: "розгляньмо"
          correct: false
      explanation: "Форми на -мо не потребують додаткового -те."
    - question: "Яке речення просить один результат?"
      options:
        - text: "Збережіть файл перед виходом."
          correct: true
        - text: "Зберігайте файли щодня."
          correct: false
        - text: "Зберігати файли корисно."
          correct: false
        - text: "Збережений файл перед виходом."
          correct: false
      explanation: "Збережіть означає досягти результату."
    - question: "Яке речення звучить як правило установи?"
      options:
        - text: "Не курити біля входу."
          correct: true
        - text: "Куріть біля входу."
          correct: false
        - text: "Курили біля входу."
          correct: false
        - text: "Закуріть біля входу."
          correct: false
      explanation: "Інфінітивний припис має офіційно-категоричний стиль."

- type: match-up
  title: "Ситуація і форма"
  instruction: "Поєднайте ситуацію з найприроднішою формою."
  pairs:
    - left: "один документ треба завершити"
      right: "підпишіть"
    - left: "правило для всіх документів"
      right: "підписуйте"
    - left: "гостинне запрошення"
      right: "заходьте"
    - left: "коротке прохання увійти"
      right: "зайдіть"
    - left: "заборона поведінки"
      right: "не відкривайте"
    - left: "застереження від помилки"
      right: "не відкрийте"
    - left: "спільна дія"
      right: "поговорімо"
    - left: "початок процесу"
      right: "почали читати"
    - left: "запланований результат"
      right: "плануємо прочитати"
    - left: "загальний дозвіл"
      right: "можна заходити"
    - left: "одна дія зараз"
      right: "можна зайти"
    - left: "офіційний припис"
      right: "документи подавати"

- type: fill-in
  title: "Доберіть вид"
  instruction: "Заповніть пропуск формою, яка відповідає прагматиці речення."
  items:
    - sentence: "____ інструкцію до кінця перед запуском."
      answer: "Прочитайте"
      options: ["Прочитайте", "Читайте", "Читати", "Читали"]
      explanation: "Потрібен завершений результат."
    - sentence: "____ інструкції перед кожним запуском."
      answer: "Читайте"
      options: ["Читайте", "Прочитайте", "Прочитати", "Прочитаний"]
      explanation: "Перед кожним запуском означає правило."
    - sentence: "____, будь ласка, ближче до проходу."
      answer: "Сідайте"
      options: ["Сідайте", "Сядьте", "Сісти", "Сиділи"]
      explanation: "Сідайте звучить як ввічливе запрошення."
    - sentence: "____ форму внизу сторінки."
      answer: "Підпишіть"
      options: ["Підпишіть", "Підписуйте", "Підписати", "Підписаний"]
      explanation: "Йдеться про один документ і результат."
    - sentence: "____ форми тільки після перевірки даних."
      answer: "Підписуйте"
      options: ["Підписуйте", "Підпишіть", "Підписати", "Підписаний"]
      explanation: "Йдеться про правило."
    - sentence: "____ підозрілі посилання."
      answer: "Не відкривайте"
      options: ["Не відкривайте", "Не відкрийте", "Відкрийте", "Відкривати"]
      explanation: "Це заборона типу дії."
    - sentence: "____ не той файл під час демонстрації."
      answer: "Не відкрийте"
      options: ["Не відкрийте", "Не відкривайте", "Відкривайте", "Відкритий"]
      explanation: "Це застереження від випадкового результату."
    - sentence: "____ документи до канцелярії до 17:00."
      answer: "Подати"
      options: ["Подати", "Подавати", "Подайте", "Поданий"]
      explanation: "Стислий офіційний припис може мати інфінітив."
    - sentence: "Ми почали ____ новий розділ."
      answer: "читати"
      options: ["читати", "прочитати", "прочитаний", "прочитав"]
      explanation: "Почали відкриває процес."
    - sentence: "Ми вирішили ____ новий розділ до кінця тижня."
      answer: "прочитати"
      options: ["прочитати", "читати", "прочитаний", "читали"]
      explanation: "Вирішили може спрямовуватися на результат."
    - sentence: "____ адресу перед надсиланням."
      answer: "Перевіряйте"
      options: ["Перевіряйте", "Перевірте", "Перевірити", "Перевірений"]
      explanation: "Перед надсиланням як правило потребує недоконаного виду."
    - sentence: "____ адресу зараз, бо лист уже готовий."
      answer: "Перевірте"
      options: ["Перевірте", "Перевіряйте", "Перевіряти", "Перевірений"]
      explanation: "Потрібен один результат зараз."

- type: group-sort
  title: "Розподіліть за прагматикою"
  instruction: "Перетягніть форми до груп за значенням."
  groups:
    - name: "результат"
      items:
        - "прочитайте"
        - "підпишіть"
        - "збережіть"
        - "перевірте"
    - name: "процес або правило"
      items:
        - "читайте"
        - "підписуйте"
        - "звертайтеся"
        - "перевіряйте"
    - name: "заборона дії"
      items:
        - "не відкривайте"
        - "не торкайтеся"
        - "не перебивайте"
        - "не залишайте"
    - name: "застереження від результату"
      items:
        - "не забудьте"
        - "не впадіть"
        - "не переплутайте"
        - "не пропустіть"

- type: error-correction
  title: "Виправте вид і форму"
  instruction: "Знайдіть помилку й виберіть нормативний варіант."
  items:
    - sentence: "Давай розглянемо це в офіційному протоколі."
      error: "Давай розглянемо"
      correction: "Розгляньмо"
      options: ["Розгляньмо", "Розглянемоте", "Розглядали", "Розглянутий"]
      explanation: "У нормативному спільному спонуканні потрібна синтетична форма."
    - sentence: "Почніть прочитати текст уголос."
      error: "прочитати"
      correction: "читати"
      options: ["читати", "прочитати", "прочитаний", "прочитав"]
      explanation: "Почніть відкриває процес."
    - sentence: "Не відкрийте підозрілі посилання як правило безпеки."
      error: "Не відкрийте"
      correction: "Не відкривайте"
      options: ["Не відкривайте", "Не відкрийте", "Відкрийте", "Відкривати"]
      explanation: "Правило безпеки забороняє тип дії."
    - sentence: "Не забувайте паспорт сьогодні перед виїздом."
      error: "Не забувайте"
      correction: "Не забудьте"
      options: ["Не забудьте", "Не забувайте", "Забудьте", "Забутий"]
      explanation: "Йдеться про небажаний результат."
    - sentence: "Візьмімте цей приклад для обговорення."
      error: "Візьмімте"
      correction: "Візьмімо"
      options: ["Візьмімо", "Візьмімте", "Взяти", "Взяті"]
      explanation: "Форма на -мо не потребує -те."
    - sentence: "Можна зайти до читальні без запису щодня?"
      error: "зайти"
      correction: "заходити"
      options: ["заходити", "зайти", "зайшов", "зайдений"]
      explanation: "Питаємо про загальне правило, тому потрібен недоконаний інфінітив."
    - sentence: "Треба підписувати цю одну форму зараз."
      error: "підписувати"
      correction: "підписати"
      options: ["підписати", "підписувати", "підписаний", "підписував"]
      explanation: "Одна форма зараз потребує результату."
    - sentence: "Не куріть у службовому написі на дверях."
      error: "Не куріть"
      correction: "Не курити"
      options: ["Не курити", "Не куріть", "Курити", "Закуріть"]
      explanation: "Для знеособленого напису природний інфінітивний припис."
    - sentence: "Перевірте адресу перед кожним надсиланням."
      error: "Перевірте"
      correction: "Перевіряйте"
      options: ["Перевіряйте", "Перевірте", "Перевірити", "Перевірений"]
      explanation: "Перед кожним надсиланням означає правило."
    - sentence: "Підемоте до наступного прикладу."
      error: "Підемоте"
      correction: "Перейдімо"
      options: ["Перейдімо", "Підемоте", "Пішли", "Перейти"]
      explanation: "Українська не додає -те до форми спільного спонукання."
    - sentence: "Продовжуйте надіслати відповіді."
      error: "надіслати"
      correction: "надсилати"
      options: ["надсилати", "надіслати", "надісланий", "надіслав"]
      explanation: "Продовжуйте потребує недоконаного інфінітива."
    - sentence: "Сядьте, будь ласка, як гостинне запрошення на лекції."
      error: "Сядьте"
      correction: "Сідайте"
      options: ["Сідайте", "Сядьте", "Сидіти", "Сиділи"]
      explanation: "Для м'якого запрошення природніше сідайте."

- type: select
  title: "Оберіть усі правильні пояснення"
  instruction: "Позначте твердження, які відповідають реченню."
  items:
    - question: "Речення: «Прочитайте повідомлення до кінця»."
      min_correct: 2
      options:
        - text: "Форма вимагає завершеного результату."
          correct: true
        - text: "Доконаний вид тут природний."
          correct: true
        - text: "Речення описує регулярну звичку."
          correct: false
        - text: "Треба замінити на «читайте» в будь-якому контексті."
          correct: false
      explanation: "Прочитайте спрямоване на результат."
    - question: "Речення: «Читайте повідомлення уважно»."
      min_correct: 2
      options:
        - text: "Форма відкриває процес або правило."
          correct: true
        - text: "Недоконаний вид доречний для інструкції-звички."
          correct: true
        - text: "Форма означає один завершений результат."
          correct: false
        - text: "Це форма минулого часу."
          correct: false
      explanation: "Читайте не закриває дію результатом."
    - question: "Речення: «Не забудьте перепустку»."
      min_correct: 2
      options:
        - text: "Це застереження від небажаного результату."
          correct: true
        - text: "Доконаний вид природний."
          correct: true
        - text: "Це заборона забувати як звичку."
          correct: false
        - text: "Форма має бути лише недоконаною."
          correct: false
      explanation: "Не забудьте попереджає про результат."
    - question: "Речення: «Не відкривайте службові шафи»."
      min_correct: 2
      options:
        - text: "Це заборона типу дії."
          correct: true
        - text: "Недоконаний вид природний у правилі поведінки."
          correct: true
        - text: "Це застереження від випадкового відкриття не того файла."
          correct: false
        - text: "Форма наказує відкрити шафи."
          correct: false
      explanation: "Не відкривайте забороняє поведінку."
    - question: "Речення: «Можна заходити без запису?»."
      min_correct: 2
      options:
        - text: "Питаємо про загальний дозвіл."
          correct: true
        - text: "Недоконаний інфінітив передає правило."
          correct: true
        - text: "Питаємо про одну завершену дію."
          correct: false
        - text: "Речення є забороною."
          correct: false
      explanation: "Заходити передає дозвіл як норму."
    - question: "Речення: «Можна зайти після дзвінка?»."
      min_correct: 2
      options:
        - text: "Питаємо про одну дію."
          correct: true
        - text: "Доконаний інфінітив може бути природним."
          correct: true
        - text: "Речення встановлює щоденне правило."
          correct: false
        - text: "Треба обов'язково замінити на заходити."
          correct: false
      explanation: "Зайти спрямоване на один результат."
    - question: "Речення: «Почали перевіряти дані»."
      min_correct: 2
      options:
        - text: "Почали є фазовим дієсловом."
          correct: true
        - text: "Перевіряти має недоконаний вид."
          correct: true
        - text: "Треба замінити на перевірити."
          correct: false
        - text: "Речення описує завершений результат."
          correct: false
      explanation: "Фаза відкриває процес."
    - question: "Речення: «Документи подавати до 17:00»."
      min_correct: 2
      options:
        - text: "Інфінітив виконує функцію припису."
          correct: true
        - text: "Стиль знеособлений і офіційний."
          correct: true
        - text: "Це дружнє приватне прохання."
          correct: false
        - text: "Форма має особове закінчення."
          correct: false
