version: '1.0'
module: aspect-nuances-imperative-infinitive
level: b2
inline:
  - id: act-1
    type: reading
    title: "Інструкція для навчальної платформи"
    instruction: "Прочитайте уривок і визначте, де вид означає результат, правило, заборону або застереження."
    source: "Навчальна інструкція B2."
    text: >-
      Перед тестом ознайомтеся з правилами й перевірте мікрофон. Не відкривайте
      сторонніх вкладок під час виконання завдання. Якщо система просить оновити
      сторінку, натисніть кнопку лише один раз і не закрийте випадково вікно тесту.
      Викладачі радять читати інструкції перед кожним модулем і надсилати питання
      через форму підтримки. Після завершення треба завантажити файл і дочекатися
      підтвердження.
    tasks:
      - "Випишіть два накази доконаного виду."
      - "Випишіть два правила з недоконаним видом."
      - "Поясніть різницю між не відкривайте і не закрийте."
      - "Знайдіть один модальний інфінітив і поясніть вибір виду."

  - type: select
    title: "Наказ чи правило"
    instruction: "Оберіть форму, яка відповідає ситуації."
    items:
      - question: "Один крок у формі: ____ заяву внизу сторінки."
        options:
          - text: "Підпишіть"
            correct: true
          - text: "Підписуйте"
            correct: false
          - text: "Підписати"
            correct: false
          - text: "Підписаний"
            correct: false
        explanation: "Один крок із результатом потребує доконаного наказу."
      - question: "Постійне правило: ____ заяви тільки після перевірки даних."
        options:
          - text: "Підписуйте"
            correct: true
          - text: "Підпишіть"
            correct: false
          - text: "Підписати"
            correct: false
          - text: "Підписавши"
            correct: false
        explanation: "Постійне правило потребує недоконаного виду."
      - question: "Ввічливе запрошення в аудиторії: ____ ближче до дошки."
        options:
          - text: "Сідайте"
            correct: true
          - text: "Сядьте"
            correct: false
          - text: "Сісти"
            correct: false
          - text: "Сидьте"
            correct: false
        explanation: "Сідайте відкриває простір для дії й часто звучить як запрошення."
      - question: "Точна медична інструкція: ____ прямо й не рухайтеся."
        options:
          - text: "Сядьте"
            correct: true
          - text: "Сідайте"
            correct: false
          - text: "Сидіти"
            correct: false
          - text: "Сідаючи"
            correct: false
        explanation: "Лікареві потрібен конкретний результат положення тіла."
      - question: "Разове прохання: ____ мені файл до 17:00."
        options:
          - text: "Надішліть"
            correct: true
          - text: "Надсилайте"
            correct: false
          - text: "Надсилати"
            correct: false
          - text: "Надісланий"
            correct: false
        explanation: "Дедлайн і один файл створюють результативну межу."
      - question: "Процедура: ____ файли через портал."
        options:
          - text: "Надсилайте"
            correct: true
          - text: "Надішліть"
            correct: false
          - text: "Надіслали"
            correct: false
          - text: "Надіслати"
            correct: false
        explanation: "Процедура потребує недоконаного виду."
      - question: "Покрокова інструкція: ____ кнопку запуску."
        options:
          - text: "Натисніть"
            correct: true
          - text: "Натискайте"
            correct: false
          - text: "Натискати"
            correct: false
          - text: "Натиснений"
            correct: false
        explanation: "Покрокова інструкція просить один завершений крок."
      - question: "Загальна безпека: ____ кнопку аварійного вимкнення лише за потреби."
        options:
          - text: "Натискайте"
            correct: true
          - text: "Натисніть"
            correct: false
          - text: "Натиснули"
            correct: false
          - text: "Натиснути"
            correct: false
        explanation: "Правило поведінки потребує недоконаного виду."
      - question: "Запланований візит: ____ до кабінету о третій."
        options:
          - text: "Зайдіть"
            correct: true
          - text: "Заходьте"
            correct: false
          - text: "Входити"
            correct: false
          - text: "Зайшовши"
            correct: false
        explanation: "О третій позначає один конкретний крок."
      - question: "Гостинне запрошення: ____ , ми вже вас чекаємо."
        options:
          - text: "Заходьте"
            correct: true
          - text: "Зайдіть"
            correct: false
          - text: "Увійти"
            correct: false
          - text: "Зайшли"
            correct: false
        explanation: "Заходьте часто звучить як відкрите запрошення."

  - type: error-correction
    title: "Заборона чи застереження"
    instruction: "Виправте вид у заперечному наказі."
    items:
      - sentence: "Не відкрийте підозрілих посилань у листах."
        error: "відкрийте"
        answer: "відкривайте"
        options: ["відкривайте", "відкрийте", "відкрити", "відкрили"]
        explanation: "Це загальна заборона поведінки, тому потрібен недоконаний вид."
      - sentence: "Не відкривайте випадково старий файл замість нового."
        error: "відкривайте"
        answer: "відкрийте"
        options: ["відкрийте", "відкривайте", "відкрити", "відкритий"]
        explanation: "Випадково створює застереження від небажаного результату."
      - sentence: "Не забудьте відповідати незнайомим адресатам без перевірки."
        error: "забудьте"
        answer: "відповідайте"
        options: ["відповідайте", "відповісти", "відповіли", "забудьте"]
        explanation: "Йдеться про заборону типу поведінки: не відповідайте."
      - sentence: "Не забувайте ключі на рецепції сьогодні."
        error: "забувайте"
        answer: "забудьте"
        options: ["забудьте", "забувайте", "забути", "забули"]
        explanation: "Сьогодні й ключі створюють конкретне застереження."
      - sentence: "Не переходьте випадково потрібний поворот."
        error: "переходьте"
        answer: "пропустіть"
        options: ["пропустіть", "переходьте", "пропускайте", "перейдіть"]
        explanation: "Тут потрібно попередити про небажаний результат: не пропустіть поворот."
      - sentence: "Не пропустіть дорогу на червоне світло."
        error: "пропустіть"
        answer: "переходьте"
        options: ["переходьте", "пропустіть", "перейдіть", "переходити"]
        explanation: "Правило безпеки: не переходьте дорогу на червоне."
      - sentence: "Не купіть ліків без консультації лікаря."
        error: "купіть"
        answer: "купуйте"
        options: ["купуйте", "купіть", "купити", "купили"]
        explanation: "Це заборона поведінки, а не випадковий результат."
      - sentence: "Не купуйте не той квиток: рейси дуже схожі."
        error: "купуйте"
        answer: "купіть"
        options: ["купіть", "купуйте", "купити", "куплений"]
        explanation: "Мовець попереджає про конкретну помилку."
      - sentence: "Не залиште речі без нагляду в громадських місцях."
        error: "залиште"
        answer: "залишайте"
        options: ["залишайте", "залиште", "залишити", "залишили"]
        explanation: "Це загальне правило безпеки."
      - sentence: "Не залишайте парасольку в таксі, коли виходите."
        error: "залишайте"
        answer: "залиште"
        options: ["залиште", "залишайте", "залишити", "залишена"]
        explanation: "Це застереження про один небажаний результат."

  - type: fill-in
    title: "Фазові й модальні інфінітиви"
    instruction: "Виберіть інфінітив потрібного виду."
    items:
      - sentence: "Ми почали ____ інструкцію з першого розділу."
        answer: "читати"
        options: ["читати", "прочитати", "прочитали", "читаний"]
        explanation: "Почали вимагає недоконаного інфінітива."
      - sentence: "Треба ____ інструкцію до кінця до понеділка."
        answer: "прочитати"
        options: ["прочитати", "читати", "прочитаний", "читали"]
        explanation: "До кінця й до понеділка створюють результат."
      - sentence: "Працівники продовжують ____ звернення."
        answer: "опрацьовувати"
        options: ["опрацьовувати", "опрацювати", "опрацювали", "опрацьований"]
        explanation: "Продовжують потребує процесу."
      - sentence: "Працівники мають ____ це звернення до вечора."
        answer: "опрацювати"
        options: ["опрацювати", "опрацьовувати", "працювати", "опрацював"]
        explanation: "До вечора означає очікуваний результат."
      - sentence: "Студенти стали ____ питання після презентації."
        answer: "ставити"
        options: ["ставити", "поставити", "поставили", "поставлений"]
        explanation: "Стали відкриває процес."
      - sentence: "Студент може ____ одне питання після презентації."
        answer: "поставити"
        options: ["поставити", "ставити", "ставив", "ставлений"]
        explanation: "Одне питання - конкретний результат."
      - sentence: "Потрібно ____ правила перед кожним модулем."
        answer: "повторювати"
        options: ["повторювати", "повторити", "повторений", "повторив"]
        explanation: "Перед кожним модулем створює повторення."
      - sentence: "Потрібно ____ правило ще раз перед тестом."
        answer: "повторити"
        options: ["повторити", "повторювати", "повторював", "повторений"]
        explanation: "Ще раз просить один результат."
      - sentence: "Команда закінчила ____ звіт о сьомій."
        answer: "редагувати"
        options: ["редагувати", "відредагувати", "відредагований", "редагувала"]
        explanation: "Закінчила називає кінець процесу редагування."
      - sentence: "Команда мусить ____ звіт до ранку."
        answer: "відредагувати"
        options: ["відредагувати", "редагувати", "редагувала", "редагований"]
        explanation: "До ранку створює вимогу результату."

  - type: match-up
    title: "Ситуація й вид"
    instruction: "Поєднайте ситуацію з природною формою."
    pairs:
      - left: "разове прохання про файл"
        right: "надішліть файл"
      - left: "постійна процедура надсилання"
        right: "надсилайте файли через портал"
      - left: "заборона поведінки"
        right: "не відкривайте сторонніх вкладок"
      - left: "застереження від помилки"
        right: "не відкрийте стару версію"
      - left: "фаза початку"
        right: "почати перевіряти"
      - left: "модальна потреба результату"
        right: "треба перевірити"
      - left: "табличка на дверях"
        right: "стороннім не входити"
      - left: "пряме звертання до людини"
        right: "не входьте без дозволу"
      - left: "ввічливе запрошення"
        right: "заходьте, будь ласка"
      - left: "конкретний крок у розкладі"
        right: "зайдіть о третій"

  - id: act-6
    type: essay-response
    title: "Перепишіть правила безпеки"
    instruction: "Напишіть 150-180 слів українською."
    prompt: >-
      Перепишіть мініінструкцію для навчальної аудиторії. Має бути два конкретні
      результативні накази, дві загальні заборони, одне застереження від випадкової
      помилки та два інфінітиви після модальних або фазових дієслів. Поясніть вибір виду.
    min_words: 150
    model_answer: >-
      > [!model-answer]
      > Перед початком роботи перевірте мікрофон і відкрийте файл із завданням.
      > Не відкривайте сторонніх вкладок і не надсилайте відповіді через приватні
      > повідомлення. Коли зберігаєте текст, не закрийте випадково вікно тесту.
      > Якщо виникла помилка, треба зробити знімок екрана й продовжувати виконувати
      > завдання після дозволу викладача. Форми перевірте й відкрийте мають доконаний
      > вид, бо це конкретні кроки. Не відкривайте й не надсилайте формулюють загальні
      > заборони. Не закрийте попереджає про небажаний результат. Треба зробити
      > спрямоване на результат, а продовжувати виконувати описує фазу процесу.
    rubric:
      - criteria: "Типи спонукання"
        description: "Є накази, заборони, застереження та інфінітивні конструкції."
        points: 4
      - criteria: "Вибір виду"
        description: "Доконаний і недоконаний вид відповідають контексту."
        points: 4
      - criteria: "Пояснення"
        description: "Автор коротко пояснює щонайменше чотири рішення."
        points: 2

workbook:
  - type: group-sort
    title: "Розкладіть спонукання"
    instruction: "Розсортуйте форми за функцією."
    groups:
      - name: "Разовий результат"
        items:
          - "прочитайте статтю"
          - "натисніть кнопку"
          - "завантажте файл"
      - name: "Правило або процедура"
        items:
          - "читайте інструкції"
          - "надсилайте файли через портал"
          - "дотримуйтеся правил"
      - name: "Застереження"
        items:
          - "не забудьте ключі"
          - "не відкрийте стару версію"
          - "не переплутайте кабінети"

  - type: match-up
    title: "Модальний інфінітив у контексті"
    instruction: "Поєднайте контекст із природним інфінітивом."
    pairs:
      - left: "треба довести читання до кінця"
        right: "прочитати інструкцію"
      - left: "треба робити це перед кожним модулем"
        right: "читати інструкції"
      - left: "викладач почав фазу пояснення"
        right: "почав пояснювати"
      - left: "після пояснення дозволено один результат"
        right: "можна поставити питання"
      - left: "дозвіл на тип дії"
        right: "можна відкривати файли"
      - left: "обов'язок завершити аудит"
        right: "мусимо завершити аудит"
      - left: "постійна норма поведінки"
        right: "мусимо дотримуватися процедури"
      - left: "старт процесу перевірки"
        right: "почати перевіряти"
      - left: "покроковий результат у формі"
        right: "заповніть заяву"
      - left: "регулярна дія в курсі"
        right: "заповнюйте журнал щотижня"

  - id: workbook-3
    type: essay-response
    title: "Тон інструкції"
    instruction: "Напишіть 150-180 слів."
    prompt: >-
      Порівняйте пари Сядьте / Сідайте, Не відкривайте / Не відкрийте,
      треба прочитати / треба читати. Для кожної пари поясніть різницю ситуації.
    min_words: 150
    model_answer: >-
      > [!model-answer]
      > Сядьте природне, коли потрібен конкретний результат, наприклад під час огляду
      > в лікаря. Сідайте часто звучить як запрошення, бо мовець відкриває простір
      > для дії. Не відкривайте формулює правило або заборону поведінки: не відкривайте
      > сторонніх вкладок. Не відкрийте попереджає про випадкову помилку: не відкрийте
      > стару версію файлу. Треба прочитати означає довести читання до результату,
      > наприклад перед тестом. Треба читати описує повторювану практику або звичку.
    rubric:
      - criteria: "Контрасти"
        description: "Пояснено всі три пари."
        points: 6
      - criteria: "Приклади"
        description: "Кожне пояснення має природний контекст."
        points: 4

  - type: true-false
    title: "Швидка перевірка правил"
    instruction: "Позначте, чи правильне твердження."
    items:
      - statement: "Після почати зазвичай потрібен недоконаний інфінітив."
        correct: true
        explanation: "Фазове дієслово відкриває процес: почати читати."
      - statement: "Не відкривайте завжди означає застереження від випадкової помилки."
        correct: false
        explanation: "Зазвичай це заборона або правило поведінки."
      - statement: "Не відкрийте може попереджати про небажаний результат."
        correct: true
        explanation: "Наприклад: не відкрийте стару версію файлу."
      - statement: "Після треба вид інфінітива залежить від результату або процесу."
        correct: true
        explanation: "Треба прочитати - результат; треба читати щодня - повторення."
      - statement: "Безособове Не входити звучить так само, як пряме не входьте."
        correct: false
        explanation: "Не входити типове для табличок; не входьте звернене до адресата."
      - statement: "Надішліть файл до 17:00 просить конкретний результат."
        correct: true
        explanation: "Дедлайн і один файл підтримують доконаний вид."
      - statement: "Надсилайте файли через портал описує процедуру."
        correct: true
        explanation: "Недоконаний вид підходить для регулярного правила."
      - statement: "Можна відкривати файли з цього сервера питає про дозвіл на тип дії."
        correct: true
        explanation: "Недоконаний інфінітив називає клас дозволених дій."
      - statement: "Треба підписувати цю заяву до 17:00 завжди краще за треба підписати."
        correct: false
        explanation: "Одна заява й дедлайн зазвичай потребують підписати."
      - statement: "Почав прочитати статтю є базовою нейтральною фазовою конструкцією."
        correct: false
        explanation: "Після почав потрібне читати, бо це фаза процесу."
