- type: true-false
  title: "Норма і прагматика"
  instruction: "Визначте, чи твердження правильне."
  items:
    - statement: "Доконаний імператив часто просить завершений результат."
      correct: true
      explanation: "Наприклад: прочитайте, підпишіть, збережіть."
    - statement: "Недоконаний імператив може звучати як запрошення або правило."
      correct: true
      explanation: "Наприклад: заходьте, сідайте, читайте."
    - statement: "Форма «підемоте» є нормативною для B2 офіційного мовлення."
      correct: false
      explanation: "Нормативно: ходімо, перейдімо, візьмімо."
    - statement: "Після «почали» звичайно потрібен недоконаний інфінітив."
      correct: true
      explanation: "Почали читати, почали перевіряти."
    - statement: "«Не відкривайте» зазвичай забороняє тип дії."
      correct: true
      explanation: "Це недоконана заборона поведінки."
    - statement: "«Не забудьте» зазвичай застерігає від небажаного результату."
      correct: true
      explanation: "Доконаний вид попереджає про результат."
    - statement: "«Можна зайти?» і «можна заходити?» завжди означають те саме."
      correct: false
      explanation: "Зайти - одна дія, заходити - загальний дозвіл."
    - statement: "Інфінітив може виконувати функцію офіційного наказу."
      correct: true
      explanation: "Наприклад: Не курити, Документи подавати до 17:00."
    - statement: "«Сідайте» часто м'якше за «сядьте» в гостинному запрошенні."
      correct: true
      explanation: "Недоконаний вид відкриває процес без різкого результату."
    - statement: "Після «треба» завжди можливий лише доконаний інфінітив."
      correct: false
      explanation: "Треба підписати форму, але треба підписувати форми після перевірки."
    - statement: "«Працюймо» є формою спільного спонукання."
      correct: true
      explanation: "Це синтетична форма 1-ї особи множини."
    - statement: "Вибір виду в наказі не впливає на тон."
      correct: false
      explanation: "Вид змінює ввічливість, категоричність і прагматику."

- type: essay-response
  id: aspect-imperative-infinitive-essay
  title: "Мініесе: інструкція без кальок"
  instruction: "Напишіть коротку інструкцію для навчального простору."
  prompt: >-
    Використайте щонайменше вісім форм із модуля: доконаний імператив для результату, недоконаний імператив для правила або запрошення, заперечення-заборону, застереження від результату, фазову конструкцію та один інфінітивний припис.
  min_words: 180
  model_answer: |
    > [!model-answer]
    > Перед початком заняття заходьте до зали спокійно й сідайте ближче до проходу. Прочитайте інструкцію на екрані та підпишіть реєстраційну форму. Не відкривайте службові шафи без дозволу й не залишайте речі в коридорі. Перед виходом не забудьте забрати перепустку. Якщо працюєте з новим текстом, почніть читати його з прикладів і продовжуйте перевіряти вид дієслів у кожному реченні. Документи подавати до канцелярії до 17:00. Якщо виникнуть питання, звертайтеся до координатора.
  rubric:
    - criteria: "Видова точність"
      description: "Доконаний і недоконаний вид відповідають результату, процесу, правилу або застереженню."
      points: 4
    - criteria: "Прагматика"
      description: "Текст розрізняє наказ, прохання, запрошення, заборону й офіційний припис."
      points: 3
    - criteria: "Норма"
      description: "Немає кальок на зразок давай у формальному спонуканні або форм типу підемоте."
      points: 2
    - criteria: "Стиль"
      description: "Інструкція звучить природно для B2 навчального простору."
      points: 1
