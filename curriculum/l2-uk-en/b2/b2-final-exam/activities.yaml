- type: true-false
  title: "Правда чи неправда: фінальна самооцінка"
  instruction: Визначте, чи твердження відповідає B2-підходу до фінального іспиту.
  items:
  - statement: Карту помилок після іспиту варто ділити за причинами, а не тільки за балами.
    correct: true
    explanation: Причина помилки показує, яку вправу треба обрати.
  - statement: Якщо варіант відповіді повторює слово з аудіо, він автоматично правильний.
    correct: false
    explanation: Дистрактор може повторювати слово, але змінювати логіку.
  - statement: У B2-есе приклад має пояснювати аргумент, а не замінювати його.
    correct: true
    explanation: Приклад потребує речення, яке пояснює його роль.
  - statement: В усному іспиті пауза завжди означає провал комунікації.
    correct: false
    explanation: Керована пауза з опорною фразою може підтримати структуру.
  - statement: Об'єктивна оцінка потребує критеріїв, процедури і прозорості.
    correct: true
    explanation: Саме критерії відрізняють оцінювання від враження.
  - statement: Після B2 достатньо записати загальну ціль "більше практикувати".
    correct: false
    explanation: План має називати конкретну мовну дію і строк.
  - statement: Письмовий висновок може бути обережним і водночас переконливим.
    correct: true
    explanation: Обережність показує контроль над силою твердження.
  - statement: Говоріння B2 оцінює тільки швидкість мовлення.
    correct: false
    explanation: Важливі флюентність, структура, реакція і регістр.
  - statement: Нотатки під час аудіювання можуть бути короткими позначками структури.
    correct: true
    explanation: Вони зберігають маршрут виступу без повного запису речень.
  - statement: Сертифікат замінює мовне досьє і робить самоаналіз непотрібним.
    correct: false
    explanation: Сертифікат засвідчує результат, але не дає плану розвитку.
  - statement: У читанні B2 важливо розуміти, чи автор робить прогноз, умову або остаточний висновок.
    correct: true
    explanation: Модальні слова й застереження змінюють силу твердження.
  - statement: Письмовий план має складатися тільки з тем без позиції.
    correct: false
    explanation: План має містити тезу, аргументи, межу і висновок.
