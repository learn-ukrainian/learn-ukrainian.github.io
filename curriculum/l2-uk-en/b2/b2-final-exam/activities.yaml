version: '1.0'
module: b2-final-exam
level: b2
inline:
- id: reading-1
  type: reading
  title: Карта складного тексту
  text: 'Міська програма відкритих заявок має підвищити прозорість культурних проєктів, але її результат залежатиме від двох умов: зрозумілого календаря і відкритого реєстру рішень. Без календаря заявники не бачать строків, а без реєстру громада не розуміє, за якими критеріями обрано переможців.'
  source: Навчальний екзаменаційний текст.
  tasks:
  - Яка головна теза фрагмента?
  - Які дві умови названо?
  - Чому слово "має" не гарантує автоматичного успіху?
  - Який критерій прозорості згадано?
  - Яке застереження треба врахувати у відповіді?
- id: reading-2
  type: reading
  title: Слухання як структура
  text: Я не вважаю, що онлайн-освіта автоматично замінює аудиторну роботу. Вона може розширити доступ до матеріалів, особливо для студентів з інших міст. Проте без чітких завдань і регулярного зворотного зв'язку платформа стає лише архівом файлів, а не навчальним середовищем.
  source: Навчальна стенограма для B2.
  tasks:
  - Яка позиція мовця щодо онлайн-освіти?
  - Яку перевагу він визнає?
  - Який ризик називає?
  - Яке слово показує протиставлення?
  - Чому відповідь "онлайн-освіта не потрібна" була б неточною?
- id: reading-3
  type: reading
  title: Аргумент з межею
  text: Цифрові інструменти можуть допомагати в освіті, якщо вони підтримують самостійну роботу, а не замінюють педагогічний контакт. Наприклад, спільний документ дає змогу швидко коментувати чернетку, але якість навчання залежить від змістовності коментарів. Отже, технологія корисна тоді, коли вона включена в продуману методику.
  source: Навчальний модельний абзац.
  tasks:
  - Знайдіть тезу абзацу.
  - Який механізм пояснює автор?
  - Який приклад наведено?
  - Де видно межу твердження?
  - Як можна розширити цей абзац в есе?
- id: reading-4
  type: reading
  title: Перефразування в дебатах
  text: Як я розумію, ви вважаєте, що додаткова перевірка уповільнить рішення. Це справді важливий ризик. Водночас без прозорої процедури швидке рішення може втратити довіру, тому я пропоную короткий строк перевірки і відкритий протокол.
  source: Навчальний фрагмент усної відповіді.
  tasks:
  - Як мовець перефразовує позицію опонента?
  - Яку частину заперечення він визнає?
  - Який контраргумент пропонує?
  - Яке рішення балансує швидкість і прозорість?
  - Чому така відповідь не атакує людину?
- id: reading-5
  type: reading
  title: Мовне досьє після іспиту
  text: У читанні я стабільно знаходжу факти, але іноді пропускаю застереження автора. У письмі я формулюю тезу, проте висновок буває надто широким. Протягом місяця після кожної статті робитиму карту "теза - доказ - межа", а після кожного есе додаватиму речення, яке обмежує узагальнення.
  source: Навчальний фрагмент самооцінки.
  tasks:
  - Який сильний компонент названо?
  - Який ризик у читанні?
  - Який ризик у письмі?
  - Які дві вправи заплановано?
  - Чому це кращий план, ніж "більше практикувати"?
workbook:
- type: select
  title: Критерії фінального іспиту
  instruction: Виберіть відповідь, яка найточніше відповідає B2-оцінюванню.
  items:
  - question: Що найкраще описує комплексний іспит B2?
    options:
    - text: перевірка читання, аудіювання, письма і говоріння в реальних жанрах
      correct: true
    - text: лише список граматичних термінів без контексту
      correct: false
    - text: випадкове повторення слів з попередніх уроків
      correct: false
    - text: переклад усіх речень дослівно
      correct: false
    explanation: Фінальний іспит є інтегрованою перевіркою мовних дій.
  - question: Яка відповідь показує розуміння імпліцитного змісту?
    options:
    - text: Автор прямо не називає висновок, але він випливає з умов і застережень.
      correct: true
    - text: Відповідь має повторити тільки перше речення.
      correct: false
    - text: Незнайоме слово завжди робить текст незрозумілим.
      correct: false
    - text: Імпліцитне означає вигадане.
      correct: false
    explanation: Імпліцитний зміст виводиться з логіки тексту.
  - question: Яка фраза найкраще обмежує письмовий висновок?
    options:
    - text: У межах наведених прикладів можна зробити обережний висновок.
      correct: true
    - text: Цей приклад доводить усе без винятків.
      correct: false
    - text: Будь-яка інша позиція неправильна.
      correct: false
    - text: Докази не потрібні, якщо думка сильна.
      correct: false
    explanation: B2-письмо показує межу твердження.
  - question: Що треба зробити перед відповіддю на складне усне питання?
    options:
    - text: перевірити розуміння питання коротким перефразуванням
      correct: true
    - text: відповісти на перше знайоме слово
      correct: false
    - text: говорити швидше, щоб приховати паузу
      correct: false
    - text: змінити тему без пояснення
      correct: false
    explanation: Перефразування зменшує ризик відповіді не на те питання.
  - question: Яка самооцінка є найкориснішою після фінального іспиту?
    options:
    - text: Я називаю сильний компонент, типовий ризик і вправу на чотири тижні.
      correct: true
    - text: Я просто пишу, що треба більше практикувати.
      correct: false
    - text: Я не аналізую помилки, якщо бал достатній.
      correct: false
    - text: Я оцінюю тільки граматику, не комунікацію.
      correct: false
    explanation: План має бути конкретним і перевірним.
  - question: Що в аудіюванні найчастіше відрізняє правильну відповідь від дистрактора?
    options:
    - text: логіка ставлення мовця, а не лише почуте ключове слово
      correct: true
    - text: наявність одного знайомого іменника
      correct: false
    - text: найдовший варіант відповіді
      correct: false
    - text: варіант з найсильнішою емоцією
      correct: false
    explanation: Дистрактори часто повторюють слова, але змінюють зміст.
  - question: Який критерій найкраще перевіряє когерентність есе?
    options:
    - text: читач може простежити шлях від тези до висновку
      correct: true
    - text: текст містить якомога більше складних слів
      correct: false
    - text: кожне речення починається однаково
      correct: false
    - text: висновок не пов'язаний із аргументами
      correct: false
    explanation: Когерентність є видимою логікою тексту.
  - question: Яка стратегія компенсації доречна, якщо бракує слова?
    options:
    - text: описати поняття іншими українськими словами
      correct: true
    - text: мовчати до кінця відповіді
      correct: false
    - text: вигадати іноземне слово з українським закінченням
      correct: false
    - text: припинити відповідь
      correct: false
    explanation: Компенсація підтримує комунікацію українською.
  - question: Який варіант найкраще показує B2-стратегію читання?
    options:
    - text: спершу визначити тезу, доказ і межу авторського твердження
      correct: true
    - text: перекладати кожне слово до першого завдання
      correct: false
    - text: вибирати відповідь за першим знайомим словом
      correct: false
    - text: ігнорувати сполучники та модальні слова
      correct: false
    explanation: B2-читання перевіряє структуру й силу твердження.
  - question: Що найкраще показує готовність до C1 після іспиту?
    options:
    - text: конкретний план із мовною дією, строком і способом перевірки
      correct: true
    - text: загальна обіцянка більше практикувати все
      correct: false
    - text: відмова аналізувати сильні компоненти
      correct: false
    - text: фокус тільки на сертифікаті без самооцінки
      correct: false
    explanation: Перехід до C1 потребує керованого плану.
  - question: Яка усна відповідь найкраще працює із запереченням?
    options:
    - text: визнати ризик, уточнити рамку і повернутися до своєї позиції
      correct: true
    - text: заперечити питання без пояснення
      correct: false
    - text: змінити тему на зручнішу
      correct: false
    - text: повторити заготовлений монолог
      correct: false
    explanation: B2-інтеракція оцінює реакцію на співрозмовника.
  - question: Що робить приклад у сильному письмовому аргументі?
    options:
    - text: конкретизує механізм і підтримує тезу
      correct: true
    - text: замінює тезу й висновок
      correct: false
    - text: дозволяє уникнути застереження
      correct: false
    - text: робить доказ непотрібним
      correct: false
    explanation: Приклад має пояснювати, а не замінювати аргумент.
- type: fill-in
  title: Підсумкова лексика іспиту
  instruction: Уставте доречне слово з екзаменаційної лексики.
  items:
  - sentence: Фінальний ____ складається з чотирьох компонентів.
    answer: іспит
    options:
    - іспит
    - регістр
    - нюанс
    - доказ
    explanation: Іспит є формою підсумкового оцінювання.
  - sentence: ____ має бути прозорою і спиратися на критерії.
    answer: оцінка
    options:
    - оцінка
    - флюентність
    - дедукція
    - реакція
    explanation: Оцінка є результатом оцінювання.
  - sentence: Кожне ____ перевіряє конкретну мовну дію.
    answer: завдання
    options:
    - завдання
    - сертифікат
    - синтез
    - контекст
    explanation: Завдання є одиницею тесту.
  - sentence: ____ підтверджує результат, але не замінює мовне портфоліо.
    answer: сертифікат
    options:
    - сертифікат
    - когезія
    - нюанс
    - інтеракція
    explanation: Сертифікат засвідчує рівень.
  - sentence: ____ володіння мовою видно у різних жанрах.
    answer: комплексне
    options:
    - комплексне
    - імпліцитне
    - флюентне
    - обмежене
    explanation: Комплексне означає таке, що охоплює кілька компонентів.
  - sentence: ____ допомагає оцінити, чи аргумент достатній.
    answer: критерій
    options:
    - критерій
    - тест
    - результат
    - темп
    explanation: Критерій є підставою для оцінювання.
  - sentence: ____ зміст прямо названо в тексті.
    answer: експліцитний
    options:
    - експліцитний
    - імпліцитний
    - підсумковий
    - успішний
    explanation: Експліцитний зміст подано прямо.
  - sentence: ____ зміст треба вивести з логіки і контексту.
    answer: імпліцитний
    options:
    - імпліцитний
    - об'єктивний
    - кваліфікаційний
    - комплексний
    explanation: Імпліцитне випливає з тексту, але не завжди назване прямо.
  - sentence: У письмі важлива ____ між реченнями й абзацами.
    answer: когезія
    options:
    - когезія
    - реакція
    - дедукція
    - оцінка
    explanation: Когезія створює зв'язність тексту.
  - sentence: В усному іспиті ____ на питання важливіша за довгу промову не по темі.
    answer: реакція
    options:
    - реакція
    - сертифікат
    - тест
    - інтерпретація
    explanation: Реакція показує інтерактивну компетенцію.
  - sentence: Після аудіювання корисно скласти ____ виступу з тези, доказу й застереження.
    answer: скелет
    options:
    - скелет
    - сертифікат
    - регістр
    - оцінку
    explanation: Скелет виступу зберігає структуру почутого.
  - sentence: У мовному досьє треба назвати сильний компонент, ризик і ____ на чотири тижні.
    answer: план
    options:
    - план
    - дистрактор
    - протокол
    - темп
    explanation: План перетворює результат іспиту на наступну дію.
- id: essay-final-technology
  type: essay-response
  title: 'Есе 1: Технології та освіта'
  instruction: Напишіть 300-350 слів з тезою, двома аргументами, прикладом, застереженням і висновком.
  prompt: Чи допомагають цифрові технології освіті, якщо вони частково замінюють аудиторну взаємодію? Обґрунтуйте позицію і назвіть умову, без якої технологія не дає очікуваного результату.
  min_words: 300
  model_answer: Сильна відповідь має чітку тезу, два аргументи з механізмом, конкретний приклад, застереження і висновок, який не перебільшує доказ. Вона пояснює, коли технологія допомагає навчанню, а коли лише створює архів матеріалів без педагогічної взаємодії.
  rubric:
  - criteria: Теза
    description: Позиція чітка і пов'язана з темою.
    points: 5
  - criteria: Аргументація
    description: Аргументи мають механізм, приклад і межу.
    points: 10
  - criteria: Мова
    description: Форми, лексика, когезія і регістр не заважають змісту.
    points: 10
  - criteria: Висновок
    description: Підсумок узагальнює, але не перебільшує.
    points: 5
  peer_review_guidelines: Перевірте, чи теза прямо відповідає на питання. Позначте один аргумент, один приклад і одне застереження. Знайдіть речення, де автор обмежує силу висновку. Перевірте, чи регістр відповідає фінальному іспиту. Запропонуйте одну конкретну правку, а не загальну пораду.
- id: essay-final-media
  type: essay-response
  title: 'Есе 2: Медіаграмотність'
  instruction: Напишіть 300-350 слів і відділіть факт від оцінки.
  prompt: Чому медіаграмотність є важливою для сучасного суспільства? Поясніть, як людина може перевіряти інформацію і чому емоційний заголовок не є достатнім доказом.
  min_words: 300
  model_answer: Сильне есе пояснює механізм перевірки джерела, наводить приклад маніпулятивної рамки і формулює обережний висновок. Автор має показати, що емоційний заголовок може привернути увагу, але не замінює дату, документ, джерело і контекст.
  rubric:
  - criteria: Факт і оцінка
    description: Автор чітко розрізняє дані, інтерпретацію і емоцію.
    points: 10
  - criteria: Приклад
    description: Наведено конкретну ситуацію перевірки інформації.
    points: 10
  - criteria: Мова
    description: Регістр стриманий, а висновок не перебільшений.
    points: 10
  peer_review_guidelines: Позначте речення, де автор називає факт. Перевірте, чи оцінка відділена від доказу. Запропонуйте одну формулу обережності.
- id: essay-final-heritage
  type: essay-response
  title: 'Есе 3: Культурна спадщина'
  instruction: Напишіть 300-350 слів з прикладом і межою узагальнення.
  prompt: Яке значення має культурна спадщина для сучасної громади? Поясніть, чому спадщина не повинна бути лише декоративним символом.
  min_words: 300
  model_answer: Сильна відповідь поєднує культурний, освітній і громадський виміри, але не стверджує, що всі люди переживають спадщину однаково. Вона називає конкретний приклад спадщини і пояснює, як він підтримує пам'ять, освіту або відповідальну громадську дію.
  rubric:
  - criteria: Теза
    description: Позиція пов'язує спадщину із сучасною дією.
    points: 10
  - criteria: Нюанс
    description: Автор визнає різні способи ставлення до спадщини.
    points: 10
  - criteria: Когезія
    description: Абзаци логічно пов'язані.
    points: 10
  peer_review_guidelines: Перевірте, чи автор не говорить від імені всіх. Знайдіть конкретний приклад спадщини. Перевірте, чи висновок повертається до громади.
- id: essay-final-remote-work
  type: essay-response
  title: 'Есе 4: Дистанційна робота'
  instruction: Напишіть 300-350 слів і збалансуйте переваги та ризики.
  prompt: Чи є дистанційна робота стійкою моделлю для професійного життя? Обговоріть переваги, ризики і критерії, за якими її варто оцінювати.
  min_words: 300
  model_answer: 'Сильний текст не обирає просту крайність, а пояснює, для яких завдань дистанційна модель працює, а де потрібна жива координація. У відповіді мають бути критерії оцінки: результат, доступність, якість комунікації, межі відповідальності і ризик ізоляції.'
  rubric:
  - criteria: Баланс
    description: Переваги і ризики розглянуто без крайнощів.
    points: 10
  - criteria: Критерії
    description: Автор називає підстави для оцінки моделі.
    points: 10
  - criteria: Висновок
    description: Підсумок пов'язаний з аргументами.
    points: 10
  peer_review_guidelines: Позначте два критерії оцінювання. Знайдіть одне речення про ризик. Перевірте, чи висновок не є надто категоричним.
- id: essay-final-globalization
  type: essay-response
  title: 'Есе 5: Глобалізація і мови'
  instruction: Напишіть 300-350 слів з прикладами з культури, освіти або професійного життя.
  prompt: Як глобалізація впливає на національні мови? Поясніть, чому контакт мов може бути і ресурсом, і ризиком для мовної спільноти.
  min_words: 300
  model_answer: Сильне есе визнає користь міжнародного обміну, але пояснює, чому підтримка власної мови потребує освіти, культури і публічного простору. Автор має показати контакт мов як ресурс для обміну і як ризик, якщо престиж, школа та професійна комунікація переходять тільки на іншу мову.
  rubric:
  - criteria: Синтез
    description: Автор поєднує культурний, освітній і комунікативний аспекти.
    points: 10
  - criteria: Аргументація
    description: Позиція має механізм і приклад.
    points: 10
  - criteria: Регістр
    description: Тон коректний і не гасловий.
    points: 10
  peer_review_guidelines: Перевірте, чи автор бачить не лише загрозу, а й ресурс. Знайдіть приклад конкретної мовної сфери. Позначте речення з обмеженням висновку.
- id: critical-final-analysis
  type: critical-analysis
  title: Аналіз слабкої відповіді
  target_text: Онлайн-освіта завжди краща за звичайну, бо вона сучасна. Усі студенти хочуть навчатися тільки онлайн, тому аудиторні заняття більше не потрібні.
  questions:
  - Які два перебільшення є в цьому фрагменті?
  - Чому аргумент "бо вона сучасна" слабкий?
  - Яке застереження треба додати?
  - Як переписати тезу у B2-регістрі?
  - Який приклад міг би зробити аргумент конкретнішим?
  model_answers:
  - Слова 'завжди' і 'усі' створюють необґрунтоване узагальнення.
  - Сучасність не пояснює механізму користі.
  - Потрібно врахувати якість завдань, зворотний зв'язок і доступ до викладача.
  - Онлайн-освіта може бути ефективною, якщо доповнює педагогічну взаємодію.
  - Наприклад, спільний документ допомагає коментувати чернетки між заняттями.
