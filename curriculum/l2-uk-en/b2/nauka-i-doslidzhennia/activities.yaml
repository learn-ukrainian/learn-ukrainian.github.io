version: '1.0'
module: nauka-i-doslidzhennia
level: b2

inline:
  - id: act-1
    type: reading
    title: Ролі в академічному середовищі
    instruction: Прочитайте фрагмент і визначте ролі учасників наукової комунікації.
    text: >-
      Дослідниця підготувала статтю про студентські мовні практики. Науковий
      керівник порадив уточнити метод, рецензент попросив обмежити висновок
      межами матеріалу, а редакція журналу перевірила оформлення посилань.
    source: Навчальний фрагмент для модуля B2.
    tasks:
      - Хто є автором дослідження?
      - Яку функцію виконує науковий керівник?
      - Чого вимагав рецензент?
      - За що відповідає редакція журналу?
      - Яка частина академічної доброчесності згадана у фрагменті?

  - id: act-2
    type: critical-analysis
    title: Гіпотеза і межа висновку
    instruction: Проаналізуйте, чому друге формулювання придатніше для дослідження.
    target_text: >-
      Молодь мало читає. Студенти технічних спеціальностей частіше залишають
      англомовні терміни в чатах про програмування, ніж у чатах про побутові
      справи.
    questions:
      - Яке формулювання занадто загальне?
      - У якому реченні є група, сфера і порівняння?
      - Які дані треба зібрати для перевірки?
      - Який обережний висновок можна зробити після невеликого опитування?
    model_answers:
      - Перше формулювання не має чіткої групи й критерію.
      - Друге речення задає групу студентів, сферу спілкування і порівняння.
      - Потрібні повідомлення або відповіді студентів у різних типах чатів.
      - У межах вибірки можна описати тенденцію, але не всю молодь.

  - id: act-3
    type: critical-analysis
    title: Анотація без зайвого вступу
    instruction: Визначте, чи є у фрагменті тема, мета, матеріал і результат.
    target_text: >-
      У статті розглянуто способи вживання англіцизмів у студентських технічних
      чатах. Мета дослідження - визначити, у яких ситуаціях користувачі
      залишають англійський термін. Матеріалом стали анонімізовані повідомлення
      трьох навчальних груп. Аналіз показує, що англіцизми частіше зберігаються
      для назв інструментів.
    questions:
      - Яка тема дослідження?
      - Де сформульовано мету?
      - Який матеріал використано?
      - Чому висновок не є надмірним узагальненням?
    model_answers:
      - Тема - англіцизми у студентських технічних чатах.
      - Мета названа в другому реченні.
      - Матеріалом є анонімізовані повідомлення трьох груп.
      - Висновок обмежений аналізованим матеріалом і не говорить про всіх студентів.

  - id: act-4
    type: critical-analysis
    title: Грантова логіка
    instruction: Визначте, чому конкретний результат переконливіший за загальну обіцянку.
    target_text: >-
      Проєкт покращить науку в Україні. Проєкт створить відкритий набір
      анонімізованих навчальних матеріалів, методичні рекомендації для
      викладачів і статтю з аналізом результатів пілотного курсу.
    questions:
      - Яке речення є надто загальним?
      - Які конкретні результати названо?
      - Як ці результати можна перевірити наприкінці проєкту?
      - Який етичний ризик треба врахувати для навчальних матеріалів?
    model_answers:
      - Перше речення не називає механізму.
      - Набір матеріалів, рекомендації і стаття.
      - Можна перевірити наявність файлів, публікацій і опису пілотного курсу.
      - Треба анонімізувати матеріали й отримати дозвіл на використання.

workbook:
  - type: match-up
    title: Академічні поняття
    instruction: Поєднайте поняття з визначенням.
    pairs:
      - left: гіпотеза
        right: перевірне припущення, яке дослідження може підтвердити або спростувати
      - left: методологія
        right: опис способу, яким дослідник отримує й аналізує дані
      - left: рецензування
        right: фахова оцінка роботи перед публікацією або захистом
      - left: анотація
        right: короткий виклад теми, мети, методу і результатів
      - left: доброчесність
        right: чесне використання джерел, даних і власного внеску
      - left: валідність
        right: відповідність методу дослідницькому питанню
      - left: кореляція
        right: зв'язок між явищами без автоматичного доведення причинності
      - left: апробація
        right: професійне обговорення або перевірка проміжних результатів
      - left: грант
        right: фінансова або організаційна підтримка дослідницького проєкту
      - left: регламент
        right: правила часу, порядку і формату наукової комунікації

  - type: fill-in
    title: Метод і висновок
    instruction: Уставте потрібний термін.
    items:
      - sentence: "Перевірне припущення дослідника - це ____."
        answer: "гіпотеза"
        options: [гіпотеза, бібліографія, грант, регламент]
        explanation: Гіпотеза має бути придатною для перевірки.
      - sentence: "Список використаних джерел називають ____."
        answer: "бібліографією"
        options: [бібліографією, апробацією, кореляцією, валідністю]
        explanation: Бібліографія показує джерельну базу роботи.
      - sentence: "Зв'язок між двома явищами без доведеної причинності - це ____."
        answer: "кореляція"
        options: [кореляція, дисертація, цитування, рецензія]
        explanation: Кореляція не доводить причину сама по собі.
      - sentence: "Фахова перевірка статті перед публікацією - це ____."
        answer: "рецензування"
        options: [рецензування, опитування, фінансування, інтерв'ю]
        explanation: Рецензування оцінює якість аргументу й методу.
      - sentence: "Кошти або підтримка для дослідницького проєкту - це ____."
        answer: "грант"
        options: [грант, об'єкт, висновок, теза]
        explanation: Грантова заявка пояснює, навіщо підтримувати майбутню роботу.
      - sentence: "Ступінь відповідності методу дослідницькому питанню - це ____."
        answer: "валідність"
        options: [валідність, афіша, монтаж, приватність]
        explanation: Валідність показує, чи метод справді вимірює потрібне явище.
      - sentence: "Публічне представлення проміжних результатів називають ____."
        answer: "апробацією"
        options: [апробацією, композицією, діпфейком, сюжетом]
        explanation: Апробація допомагає перевірити роботу в професійній спільноті.
      - sentence: "Формальні правила конференційного виступу задає ____."
        answer: "регламент"
        options: [регламент, інтерфейс, канон, експозиція]
        explanation: Регламент визначає час, порядок і формат участі.
      - sentence: "Процес збирання відповідей від учасників через анкету - це ____."
        answer: "опитування"
        options: [опитування, грант, рецензія, реставрація]
        explanation: Опитування є методом збору емпіричних даних.
      - sentence: "Чітке посилання на використане джерело називають ____."
        answer: "цитуванням"
        options: [цитуванням, прогнозуванням, декорацією, автоматизацією]
        explanation: Цитування підтримує академічну доброчесність.

  - type: error-correction
    title: Академічний стиль без перебільшення
    instruction: Виберіть редакцію, яка робить речення точнішим.
    items:
      - sentence: "Це опитування доводить, що всі студенти країни думають однаково."
        error: "всі студенти країни"
        correction: "студенти в цій вибірці"
        error_type: phrase
        options:
          - "студенти в цій вибірці"
          - "абсолютно всі молоді люди"
          - "ніхто не має іншої думки"
          - "усе суспільство без винятків"
        explanation: Невелика вибірка не дозволяє необмеженого узагальнення.
      - sentence: "Було здійснено проведення аналізу відповідей."
        error: "було здійснено проведення аналізу"
        correction: "проаналізовано відповіді"
        error_type: construction
        options:
          - "проаналізовано відповіді"
          - "мала місце реалізація аналізування"
          - "відповіді самі здійснили аналіз"
          - "здійснено аналізування проведення"
        explanation: Коротша форма точніше називає дію.
      - sentence: "Кореляція автоматично означає причину."
        error: "автоматично означає причину"
        correction: "не доводить причинності сама по собі"
        error_type: phrase
        options:
          - "не доводить причинності сама по собі"
          - "завжди пояснює всі причини"
          - "скасовує потребу в методі"
          - "не потребує перевірки даних"
        explanation: Зв'язок між явищами потребує додаткового пояснення.
      - sentence: "Автор украв ідею, але це неважливо для науки."
        error: "неважливо для науки"
        correction: "порушує академічну доброчесність"
        error_type: phrase
        options:
          - "порушує академічну доброчесність"
          - "робить текст науковішим"
          - "не потребує посилання"
          - "є нормальною практикою цитування"
        explanation: Чужу ідею треба позначати джерелом.
      - sentence: "Дані відкриті, тому приватність учасників не має значення."
        error: "приватність учасників не має значення"
        correction: "контекст і приватність учасників усе одно треба враховувати"
        error_type: phrase
        options:
          - "контекст і приватність учасників усе одно треба враховувати"
          - "можна публікувати будь-які деталі"
          - "етика стосується лише закритих даних"
          - "учасники автоматично втрачають права"
        explanation: Відкритість доступу не скасовує етичної відповідальності.
      - sentence: "У статті розглянуто багато цікавого про науку."
        error: "багато цікавого"
        correction: "три способи перевірки валідності опитування"
        error_type: phrase
        options:
          - "три способи перевірки валідності опитування"
          - "різні речі загального значення"
          - "деякі питання без уточнення"
          - "усе важливе про сучасність"
        explanation: Академічний стиль потребує конкретного предмета аналізу.
      - sentence: "Рецензент поставив питання, тому дослідження треба приховати."
        error: "треба приховати"
        correction: "треба уточнити й аргументовано відповісти"
        error_type: phrase
        options:
          - "треба уточнити й аргументовано відповісти"
          - "слід видалити всі дані"
          - "варто образитися на рецензента"
          - "можна не змінювати нічого"
        explanation: Рецензія допомагає перевірити аргумент і структуру.
      - sentence: "Графік доводить причину, бо виглядає переконливо."
        error: "бо виглядає переконливо"
        correction: "лише якщо це підтверджує метод і дизайн дослідження"
        error_type: phrase
        options:
          - "лише якщо це підтверджує метод і дизайн дослідження"
          - "тому що має яскраві кольори"
          - "без пояснення вибірки"
          - "коли автор цього хоче"
        explanation: Візуальна переконливість не замінює методичного доказу.

  - type: select
    title: Наукова обережність
    instruction: Виберіть найточніше академічне формулювання.
    items:
      - question: Яке речення коректно обмежує висновок?
        options:
          - text: У межах цієї вибірки видно тенденцію, яка потребує ширшої перевірки.
            correct: true
          - text: Один приклад доводить правило для всіх.
            correct: false
          - text: Дані не потрібні, бо тема актуальна.
            correct: false
          - text: Автор може приховати обсяг матеріалу.
            correct: false
      - question: Що має містити анотація?
        options:
          - text: тему, мету, метод, матеріал і основний результат
            correct: true
          - text: лише довгий вступ про важливість науки
            correct: false
          - text: емоційний відгук без джерел
            correct: false
          - text: список усіх прочитаних книжок без висновку
            correct: false
      - question: Яка реакція на критичне питання є професійною?
        options:
          - text: Визнати межу матеріалу і пояснити, що ще треба перевірити.
            correct: true
          - text: Сказати, що рецензент нічого не розуміє.
            correct: false
          - text: Приховати слабке місце методу.
            correct: false
          - text: Змінити тему замість відповіді.
            correct: false
      - question: Що таке академічна доброчесність?
        options:
          - text: чесне використання джерел, даних і власного внеску
            correct: true
          - text: складні слова без посилань
            correct: false
          - text: заборона ставити питання авторові
            correct: false
          - text: використання чужої ідеї без позначення
            correct: false
      - question: Який результат грантової заявки найперевірніший?
        options:
          - text: відкритий набір матеріалів і методичні рекомендації
            correct: true
          - text: загальна обіцянка змінити все
            correct: false
          - text: нечіткий намір працювати краще
            correct: false
          - text: красивий лозунг без календаря і продукту
            correct: false
      - question: Яке речення коректно описує інформовану згоду?
        options:
          - text: Учасник знає мету дослідження і може відмовитися.
            correct: true
          - text: Учасник не повинен знати, як використають дані.
            correct: false
          - text: Згоду можна замінити мовчанням.
            correct: false
          - text: Дослідник має приховати ризики.
            correct: false
      - question: Що робить візуалізацію даних чесною?
        options:
          - text: Вона показує масштаб даних і не перебільшує різницю.
            correct: true
          - text: Вона обрізає вісь, щоб результат виглядав сильнішим.
            correct: false
          - text: Вона приховує кількість відповідей.
            correct: false
          - text: Вона замінює аналіз красивою картинкою.
            correct: false
      - question: Яка тема найкраще обмежена для невеликого дослідження?
        options:
          - text: Мовні практики в публічних чатах однієї студентської групи.
            correct: true
          - text: Уся історія науки в Європі.
            correct: false
          - text: Мова всіх людей в інтернеті.
            correct: false
          - text: Культура без меж і методів.
            correct: false

  - type: true-false
    title: Межі наукового висновку
    instruction: Визначте, чи коректне твердження.
    items:
      - statement: "Кореляція сама по собі не доводить причинності."
        correct: true
        explanation: Потрібен додатковий аналіз механізму або дизайн дослідження.
      - statement: "Анотація має приховувати метод, щоб читач зацікавився."
        correct: false
        explanation: Анотація коротко називає метод і матеріал.
      - statement: "Обмеження вибірки треба вказувати у висновках."
        correct: true
        explanation: Межа матеріалу захищає висновок від перебільшення.
      - statement: "Рецензент має оцінювати лише особистість автора."
        correct: false
        explanation: Рецензування стосується аргументу, методу, доказів і структури.
      - statement: "Грантова заявка має назвати очікуваний результат."
        correct: true
        explanation: Перевірний результат робить заявку реалістичною.
      - statement: "Інформована згода пояснює учасникові мету і умови дослідження."
        correct: true
        explanation: Учасник має розуміти, на що погоджується.
      - statement: "Малий розмір вибірки дає право робити висновки про все суспільство."
        correct: false
        explanation: Невелика вибірка обмежує силу узагальнення.
      - statement: "Дослідницький журнал допомагає відновити логіку методичних рішень."
        correct: true
        explanation: Він фіксує зміни питання, матеріалу й категорій.
      - statement: "Популяризація науки має приховувати межі результату заради уваги."
        correct: false
        explanation: Відповідальна популяризація називає і знання, і невідоме.
      - statement: "Візуалізація даних повинна відповідати дослідницькому питанню."
        correct: true
        explanation: Графік або таблиця мають бути частиною аргументу.

  - type: essay-response
    id: act-10
    title: Анотація власного дослідження
    instruction: Напишіть академічну анотацію за структурою модуля.
    prompt: >-
      Уявіть невелике дослідження про використання української мови в цифровому
      спілкуванні студентів. Напишіть анотацію на 160-200 слів: тема, мета,
      матеріал, метод, результат і межа висновку.
    min_words: 160
    model_answer: >-
      Сильна анотація називає не лише актуальність, а й конкретний матеріал,
      метод і межу висновку. Наприклад, автор може пояснити, що проаналізував
      анонімізовані повідомлення або анкети студентів, використав тематичне
      кодування, виявив кілька повторюваних мовних практик, але не поширює
      результат на всіх студентів України через обмежений розмір вибірки.
    rubric:
      - criteria: Структура анотації
        description: Є тема, мета, матеріал, метод, результат і межа висновку.
        points: 2
      - criteria: Обережність результату
        description: Результат сформульовано без надмірного узагальнення.
        points: 2
      - criteria: Академічний регістр
        description: Академічні кліше використано природно й доречно.
        points: 2
