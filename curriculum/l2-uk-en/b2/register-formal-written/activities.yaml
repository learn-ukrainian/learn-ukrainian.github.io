version: '1.0'
module: register-formal-written
level: b2
inline:
  - type: select
    title: "Що робить текст формальним?"
    instruction: "Позначте варіанти, які справді додають точності, а не лише офіційного звучання."
    items:
      - question: "Потрібно відповісти на скаргу клієнта."
        min_correct: 2
        options:
          - text: "Ваше звернення зареєстровано 12 липня."
            correct: true
          - text: "Ми дуже засмучені, що так вийшло."
            correct: false
          - text: "Рішення буде надіслано до 18 липня."
            correct: true
          - text: "Ситуація якось вирішиться найближчим часом."
            correct: false
        explanation: "Формальний текст називає статус і строк."
      - question: "Потрібно показати підставу відмови."
        min_correct: 2
        options:
          - text: "Не можемо погодити умову, оскільки вона суперечить пункту 4 договору."
            correct: true
          - text: "Нам це просто не підходить."
            correct: false
          - text: "Підставою є відсутність обов'язкових реквізитів."
            correct: true
          - text: "Такі речі не робляться."
            correct: false
        explanation: "Підстава має бути перевірною, а не емоційною."
      - question: "У службовому листі треба назвати виконавця."
        min_correct: 2
        options:
          - text: "Юридичний відділ підготує висновок до п'ятниці."
            correct: true
          - text: "Питання якось буде вивчено."
            correct: false
          - text: "Комісія розгляне заяву після отримання документів."
            correct: true
          - text: "Хтось із наших подивиться."
            correct: false
        explanation: "Коли від виконавця залежить наступний крок, його треба назвати."
      - question: "Потрібно замінити оцінку фактом."
        min_correct: 2
        options:
          - text: "У проєкті відсутній порядок оплати."
            correct: true
          - text: "Проєкт поганий і незручний."
            correct: false
          - text: "У звіті не зазначено період аналізу."
            correct: true
          - text: "Звіт виглядає слабко."
            correct: false
        explanation: "Факт можна перевірити, а гола оцінка не пояснює проблему."
      - question: "Потрібно сформулювати строк."
        min_correct: 2
        options:
          - text: "Протягом трьох робочих днів."
            correct: true
          - text: "За першої нагоди."
            correct: false
          - text: "До 15:00 20 липня."
            correct: true
          - text: "Якнайшвидше, коли буде можливість."
            correct: false
        explanation: "Формальний строк має межу або умову."
      - question: "Потрібно спростити формальний текст без втрати змісту."
        min_correct: 2
        options:
          - text: "Поділити довге речення на умову й наслідок."
            correct: true
          - text: "Прибрати всі терміни, навіть якщо вони потрібні юридично."
            correct: false
          - text: "Дати коротке визначення складного терміна."
            correct: true
          - text: "Замінити підставу словом якось."
            correct: false
        explanation: "Безпечне спрощення зберігає терміни й логіку."
      - question: "Потрібно написати науковий висновок обережно."
        min_correct: 2
        options:
          - text: "Отримані дані свідчать про тенденцію."
            correct: true
          - text: "Це остаточно доводить усе про всіх студентів."
            correct: false
          - text: "У межах цього дослідження можна припустити..."
            correct: true
          - text: "Очевидно, що інших пояснень не існує."
            correct: false
        explanation: "Науковий стиль не перебільшує силу даних."
      - question: "Потрібно вибрати тему листа."
        min_correct: 2
        options:
          - text: "Претензія щодо поставки за договором від 3 липня."
            correct: true
          - text: "Дуже важливо!!!"
            correct: false
          - text: "Уточнення реквізитів для договору."
            correct: true
          - text: "Проблема."
            correct: false
        explanation: "Тема формального листа має називати предмет."
  - type: match-up
    title: "Наукова функція і формула"
    instruction: "Поєднайте функцію в науковому абзаці з відповідною формулою."
    pairs:
      - left: "мета"
        right: "Метою статті є з'ясувати..."
      - left: "матеріал"
        right: "Матеріалом аналізу стали 120 відповідей."
      - left: "метод"
        right: "Для аналізу використано порівняльний підхід."
      - left: "результат"
        right: "Аналіз показав, що..."
      - left: "обмеження"
        right: "У межах цього дослідження не розглядаємо..."
      - left: "приклад"
        right: "Зокрема, у сервісних листах часто вживають..."
      - left: "висновок"
        right: "Отже, отримані дані свідчать про..."
      - left: "контраст"
        right: "Водночас друга група прикладів показує..."
      - left: "причина"
        right: "Це зумовлено тим, що..."
      - left: "термінологічна межа"
        right: "У цьому модулі під формальним письмом розуміємо..."
  - type: fill-in
    title: "Формули підстави"
    instruction: "Вставте формулу, яка пасує до офіційного або юридичного речення."
    items:
      - sentence: "____ договором, товар має бути доставлено до 10 липня."
        answer: "Згідно з"
        options: ["Згідно з", "Згідно до", "По", "Про"]
        explanation: "Нормативна формула: згідно з договором."
      - sentence: "____ до чинного законодавства, заяву можна подати онлайн."
        answer: "Відповідно"
        options: ["Відповідно", "Згідно", "По", "Біля"]
        explanation: "Відповідно до + родовий відмінок."
      - sentence: "____ рішення комісії просимо оновити графік."
        answer: "На підставі"
        options: ["На підставі", "При підставі", "З приводу", "По основі"]
        explanation: "На підставі рішення - стала офіційна формула."
      - sentence: "____ зміною графіка просимо перенести зустріч."
        answer: "У зв'язку зі"
        options: ["У зв'язку зі", "По причині", "Відносно", "Згідно"]
        explanation: "У зв'язку зі зміною - нормативна конструкція."
      - sentence: "____ на обставини пропонуємо продовжити строк."
        answer: "З огляду"
        options: ["З огляду", "По виду", "Згідно", "На рахунок"]
        explanation: "З огляду на обставини вводить причину або рамку."
      - sentence: "Документ має містити обов'язкові ____ сторін."
        answer: "реквізити"
        options: ["реквізити", "симпатії", "враження", "прикметники"]
        explanation: "Реквізити - обов'язкові дані документа."
      - sentence: "Метою ____ є з'ясувати, як формули впливають на ясність."
        answer: "дослідження"
        options: ["дослідження", "скарги", "позову", "реквізиту"]
        explanation: "Метою дослідження - типова наукова рамка."
      - sentence: "Ваше звернення ____ 12 липня."
        answer: "зареєстровано"
        options: ["зареєстровано", "класне", "емоційне", "забуте"]
        explanation: "Безособова форма фіксує статус звернення."
      - sentence: "Просимо ____ номер договору та дату поставки."
        answer: "уточнити"
        options: ["уточнити", "прикрасити", "засмутити", "вигадати"]
        explanation: "Уточнити означає зробити дані точнішими."
      - sentence: "Отримані дані ____ про тенденцію до спрощення сервісних листів."
        answer: "свідчать"
        options: ["свідчать", "жартують", "мовчать", "нарікають"]
        explanation: "Дані свідчать про - обережна наукова формула."
  - type: error-correction
    title: "Номіналізація без шуму"
    instruction: "Виправте надмірну або нечітку офіційну конструкцію."
    items:
      - sentence: "Просимо здійснити проведення оплати рахунку до 15 липня."
        error: "здійснити проведення оплати рахунку"
        correction: "оплатити рахунок"
        explanation: "Просте дієслово точніше за ланцюг іменників."
      - sentence: "Відділом буде здійснено проведення аналізу звернень."
        error: "здійснено проведення аналізу"
        correction: "проаналізовано"
        explanation: "Можна сказати: Відділом буде проаналізовано звернення."
      - sentence: "Ми зробили розгляд вашої заяви."
        error: "зробили розгляд"
        correction: "розглянули"
        explanation: "Дієслово розглянули природне й формальне."
      - sentence: "У зв'язку по зміні графіка зустріч перенесено."
        error: "по зміні"
        correction: "зі зміною"
        explanation: "Нормативно: у зв'язку зі зміною графіка."
      - sentence: "Згідно до пункту 5 договору просимо надати документи."
        error: "Згідно до"
        correction: "Згідно з"
        explanation: "Згідно з пунктом; відповідно до пункту."
      - sentence: "Ваше питання буде якось розглянуто найближчим часом."
        error: "якось розглянуто найближчим часом"
        correction: "розглянуто протягом трьох робочих днів"
        explanation: "Формальний текст потребує чіткого строку."
      - sentence: "Матеріалом аналізу стали багато листів за якийсь період."
        error: "багато листів за якийсь період"
        correction: "120 листів за період із 1 до 30 червня"
        explanation: "Науковий стиль потребує контрольованої міри."
      - sentence: "На підставі того що нам так здається, просимо повернути кошти."
        error: "того що нам так здається"
        correction: "пункту 4.1 договору"
        explanation: "У претензії підстава має бути документальною або фактичною."
  - type: group-sort
    title: "Наукове, юридичне, сервісне"
    instruction: "Розподіліть формули за регістром, де вони найчастіше працюють."
    groups:
      - name: "Науковий стиль"
        items:
          - "метою дослідження є"
          - "матеріалом аналізу стали"
          - "отримані дані свідчать"
          - "у межах цієї статті"
      - name: "Юридичний / офіційно-діловий стиль"
        items:
          - "відповідно до закону"
          - "на підставі рішення"
          - "сторони договору"
          - "у межах повноважень"
      - name: "Сервісне формальне листування"
        items:
          - "ваше звернення зареєстровано"
          - "відповідь буде надіслано"
          - "просимо уточнити дані"
          - "дякуємо за надану інформацію"
workbook:
  - type: reading
    id: formal-written-reading
    title: "Читання: анотація, претензія, сервісна відповідь"
    instruction: "Прочитайте три уривки й визначте, які мовні засоби роблять їх формальними."
    source: "Навчальні уривки для модуля B2."
    text: >-
      1. У статті проаналізовано 85 сервісних відповідей українських університетів. Метою дослідження є з'ясувати, які формули допомагають адресатові зрозуміти статус звернення. Аналіз показав, що найефективніші тексти поєднують підтвердження отримання, строк відповіді та вказівку на відповідальний підрозділ.

      2. На підставі пункту 4.1 договору просимо усунути недоліки товару протягом десяти робочих днів. До листа додаємо копії звернень клієнтів від 12 та 14 липня. У разі неможливості виконання вимоги просимо надати письмове пояснення причин.

      3. Ваше звернення зареєстровано 12 липня. Юридичний відділ перевіряє дані договору та супровідні документи. Відповідь буде надіслано до 18 липня на електронну адресу, зазначену у зверненні.
    tasks:
      - "Визначте, який уривок є науковим, який юридично-претензійним, а який сервісним."
      - "Випишіть по дві формули підстави, строку або результату."
      - "Поясніть, де безособова конструкція доречна, а де краще назвати виконавця."
  - type: true-false
    title: "Правда чи неправда: формальне письмо"
    instruction: "Оцініть твердження."
    items:
      - statement: "Формальний текст завжди має бути максимально довгим."
        correct: false
        explanation: "Формальність залежить від точності, а не від довжини."
      - statement: "У науковому абзаці висновок має спиратися на приклад або доказ."
        correct: true
        explanation: "Інакше це лише думка без опори."
      - statement: "Згідно з договором і відповідно до закону - нормативні формули."
        correct: true
        explanation: "Важливо не змішувати прийменники."
      - statement: "Безособові конструкції завжди приховують відповідальність і тому заборонені."
        correct: false
        explanation: "Вони доречні для статусу, але не мають замінювати потрібного виконавця."
      - statement: "Номіналізація корисна для назв процедур, але може перевантажити речення."
        correct: true
        explanation: "Потрібен баланс між іменником і дієсловом."
      - statement: "Тема листа Питання завжди достатньо інформативна."
        correct: false
        explanation: "Тема має називати предмет: договір, заяву, строк, реквізити."
      - statement: "Науковий текст може використовувати формули У межах цього дослідження та отримані дані свідчать."
        correct: true
        explanation: "Ці формули допомагають обмежити висновок."
      - statement: "Сервісне повідомлення може бути ввічливим і водночас точним."
        correct: true
        explanation: "Емпатія працює краще, коли є конкретний наступний крок."
      - statement: "У претензії емоційні звинувачення сильніші за факти."
        correct: false
        explanation: "Факти, підстава й вимога роблять претензію сильнішою."
      - statement: "Безпечне спрощення може поділити довге речення на два."
        correct: true
        explanation: "Головне - не втратити умову, наслідок і підставу."
  - type: critical-analysis
    id: formal-written-analysis
    title: "Аналіз абзацу"
    target_text: "У зв'язку з необхідністю здійснення проведення покращення якості сервісу буде виконано опрацювання звернень у найближчий час."
    questions:
      - "Які слова створюють канцелярський шум?"
      - "Якої інформації бракує адресатові?"
      - "Запропонуйте коротший формальний варіант із виконавцем або безособовою конструкцією."
    model_answers:
      - "Шум створюють ланцюги здійснення проведення покращення та виконано опрацювання."
      - "Бракує конкретного строку, а також неясно, хто опрацьовує звернення."
      - "Можливий варіант: Щоб поліпшити якість сервісу, команда підтримки опрацює звернення до 18 липня. Якщо виконавець не важливий: Звернення буде опрацьовано до 18 липня."
  - type: fill-in
    title: "Конектори і логіка"
    instruction: "Оберіть конектор, який відповідає логічному зв'язку."
    items:
      - sentence: "Дані підтверджують першу гіпотезу. ____, друга гіпотеза потребує додаткової перевірки."
        answer: "Водночас"
        options: ["Водночас", "Зокрема", "Отже", "Наприклад"]
        explanation: "Водночас вводить зіставлення."
      - sentence: "У звіті не зазначено період аналізу. ____, висновки не можна перевірити."
        answer: "Отже"
        options: ["Отже", "Зокрема", "Однак", "Крім того"]
        explanation: "Отже вводить наслідок."
      - sentence: "Формальний текст потребує точних строків, ____, дати або кількості робочих днів."
        answer: "зокрема"
        options: ["зокрема", "проте", "натомість", "отже"]
        explanation: "Зокрема відкриває приклад."
      - sentence: "Заявку зареєстровано. ____, для розгляду бракує копії договору."
        answer: "Проте"
        options: ["Проте", "Отже", "Наприклад", "Саме тому"]
        explanation: "Проте вводить перешкоду або контраст."
      - sentence: "____ до рішення комісії, строк подання продовжено."
        answer: "Відповідно"
        options: ["Відповідно", "На рахунок", "З приводу", "Коло"]
        explanation: "Відповідно до рішення комісії - нормативна офіційна формула."
      - sentence: "____ те, що документи подано не повністю, розгляд заяви призупинено."
        answer: "З огляду на"
        options: ["З огляду на", "По поводу", "Коло", "На рахунок"]
        explanation: "З огляду на вводить причину або обставину."
      - sentence: "____ до пункту 2 договору, оплата здійснюється протягом п'яти днів."
        answer: "Відповідно"
        options: ["Відповідно", "Згідно", "Біля", "Через"]
        explanation: "Відповідно до пункту - нормативна формула."
      - sentence: "____ з договором, сторони погоджують зміни письмово."
        answer: "Згідно"
        options: ["Згідно", "Відносно", "Коло", "При"]
        explanation: "Згідно з договором, але відповідно до договору."
      - sentence: "У межах цього дослідження не ____ питання усного мовлення."
        answer: "розглядаємо"
        options: ["розглядаємо", "скаржимо", "позиваємо", "підпис"]
        explanation: "Так автор обмежує предмет аналізу."
      - sentence: "Після ____ перевірки надішлемо остаточну відповідь."
        answer: "завершення"
        options: ["завершення", "емоції", "обурення", "краси"]
        explanation: "Завершення перевірки називає умову наступної дії."
  - type: essay-response
