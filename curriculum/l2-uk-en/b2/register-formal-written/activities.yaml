  - type: essay-response
    id: formal-written-essay
    title: "Письмо: анотація або претензія"
    instruction: "Напишіть формальний текст українською, дотримуючись обраного регістру."
    prompt: >-
      Оберіть одне завдання. Варіант 1: напишіть академічну анотацію на 180-220 слів до навчального дослідження про дистанційне навчання. Обов'язково назвіть актуальність, метод, результат і висновок. Варіант 2: напишіть претензію на 180-220 слів щодо порушення строку надання послуги. Обов'язково назвіть договір, пункт, факт порушення, вимогу й строк відповіді.
    min_words: 180
    model_answer: >-
      У статті проаналізовано вплив регулярного зворотного зв'язку на мотивацію студентів дистанційних курсів. Актуальність теми зумовлена зростанням кількості онлайн-програм і потребою в прозорих критеріях оцінювання. Матеріалом дослідження стали результати опитування 120 студентів, які навчалися на курсах різної тривалості. Застосовано кількісний аналіз відповідей і порівняння показників виконання довгострокових завдань. Встановлено, що систематичні коментарі викладача підвищують готовність студентів завершувати складні письмові роботи. Водночас результати показали, що загальні оцінки без конкретних рекомендацій не мають такого самого ефекту. Отже, планування дистанційного курсу має передбачати регулярний зворотний зв'язок, чіткі критерії оцінювання та можливість уточнення вимог.
    rubric:
      - criteria: "Регістр"
        description: "Текст послідовно зберігає науковий або офіційно-діловий стиль."
        points: 4
      - criteria: "Структура"
        description: "Є всі потрібні елементи: для анотації тема, метод, результат; для претензії підстава, факт, вимога, строк."
        points: 4
      - criteria: "Мовні засоби"
        description: "Використано доречні терміни, безособові форми й формальні конектори."
        points: 4
