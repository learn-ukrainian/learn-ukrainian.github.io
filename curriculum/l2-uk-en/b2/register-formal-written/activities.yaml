version: '1.0'
module: register-formal-written
level: b2
inline: []
workbook:
  - type: reading
    id: formal-register-reading
    title: "Читання: анотація і претензія"
    instruction: "Прочитайте два навчальні уривки й визначте, який регістр використано."
    source: "Навчальні уривки для модуля B2."
    text: >-
      Уривок А. У статті проаналізовано вплив регулярного зворотного зв'язку на мотивацію студентів дистанційних курсів. Матеріалом дослідження стали результати опитування 120 респондентів. Застосовано кількісний аналіз і порівняння відповідей за курсами навчання. Встановлено, що систематичні коментарі викладача підвищують готовність студентів виконувати довгострокові завдання. Уривок Б. Згідно з пунктом 4 договору послуга мала бути надана до 10 липня. Станом на 15 липня послугу не надано, про зміну строку нас не повідомлено. На підставі зазначеного просимо надати письмове пояснення та виконати зобов'язання до 20 липня.
    tasks:
      - "Визначте, який уривок є науковим, а який офіційно-діловим."
      - "Випишіть дві безособові форми з уривка А."
      - "Випишіть дві юридичні формули з уривка Б."
      - "Поясніть, чому в уривку А немає особистого «я»."
      - "Сформулюйте одну відмінність між підставою в науковому й юридичному тексті."
  - type: match-up
    title: "Стиль і функція"
    instruction: "Поєднайте мовний засіб із його функцією у формальному письмі."
    pairs:
      - left: "встановлено"
        right: "називає результат без особистого автора"
      - left: "згідно з договором"
        right: "називає юридичну підставу"
      - left: "актуальність теми"
        right: "пояснює, чому дослідження потрібне"
      - left: "методологія"
        right: "описує спосіб отримання результату"
      - left: "реквізит"
        right: "обов'язковий елемент документа"
      - left: "у встановлений строк"
        right: "фіксує часову межу виконання"
      - left: "посилання"
        right: "показує джерело інформації"
      - left: "претензія"
        right: "формально фіксує порушення й вимогу"
      - left: "чинний закон"
        right: "закон, що має правову силу"
      - left: "отже"
        right: "позначає висновок"
      - left: "парафраз"
        right: "передає думку джерела іншими словами"
      - left: "повноваження"
        right: "право органу або особи діяти"

  - type: fill-in
    title: "Формальні конектори"
    instruction: "Виберіть доречне слово або формулу для формального тексту."
    items:
      - sentence: "____ з умовами договору оплата здійснюється після підписання акта."
        answer: "Згідно"
        options: ["Згідно", "Типу", "Наче", "Прикинь"]
        explanation: "Згідно з називає юридичну підставу."
      - sentence: "____ до чинного законодавства заяву розглядають протягом місяця."
        answer: "Відповідно"
        options: ["Відповідно", "Круто", "Десь", "Раптом"]
        explanation: "Відповідно до - стандартна офіційна формула."
      - sentence: "____ заяви підготовлено наказ."
        answer: "На підставі"
        options: ["На підставі", "На настрої", "На приколі", "На щастя"]
        explanation: "На підставі називає документ або факт, що дає право на дію."
      - sentence: "У статті ____ вплив дистанційного навчання на мотивацію."
        answer: "проаналізовано"
        options: ["проаналізовано", "зачеплено", "помічено якось", "розкручено"]
        explanation: "Проаналізовано - безособова форма наукового стилю."
      - sentence: "____, отримані результати підтверджують гіпотезу."
        answer: "Отже"
        options: ["Отже", "Ну от", "Коротше", "Зате"]
        explanation: "Отже позначає висновок."
      - sentence: "____ ці дані потребують додаткової перевірки."
        answer: "Водночас"
        options: ["Водночас", "Кайфово", "Нарешті", "Мабуть-то"]
        explanation: "Водночас вводить обмеження або зіставлення."
      - sentence: "Зобов'язання виконано у встановлений ____."
        answer: "строк"
        options: ["строк", "настрій", "жарт", "коментар"]
        explanation: "Строк - часова межа виконання."
      - sentence: "Анотація має коротко назвати тему, метод і ____."
        answer: "результат"
        options: ["результат", "образу", "емоцію", "плітку"]
        explanation: "Анотація стисло подає результат дослідження."
      - sentence: "Офіційний документ має обов'язкові ____."
        answer: "реквізити"
        options: ["реквізити", "компліменти", "меми", "враження"]
        explanation: "Реквізити - потрібні елементи документа."
      - sentence: "____ закону визначає права й обов'язки сторін."
        answer: "Норма"
        options: ["Норма", "Настрій", "Історія", "Реклама"]
        explanation: "Норма закону формулює правило."

  - type: select
    title: "Оберіть формальний варіант"
    instruction: "Виберіть речення, доречні для наукового або офіційно-ділового регістру."
    items:
      - question: "Наукова анотація."
        min_correct: 2
        options:
          - text: "У статті проаналізовано три чинники академічної мотивації."
            correct: true
          - text: "Ця тема просто неймовірно цікава для всіх."
            correct: false
          - text: "Матеріалом дослідження стали результати опитування."
            correct: true
          - text: "Автор дуже хоче всім показати важливу штуку."
            correct: false
        explanation: "Наукова анотація називає тему, матеріал, метод і результат без реклами."
      - question: "Юридична претензія."
        min_correct: 2
        options:
          - text: "Згідно з пунктом 4 договору послуга мала бути надана до 10 липня."
            correct: true
          - text: "Ви нас дуже підвели й маєте соромитися."
            correct: false
          - text: "Просимо виконати зобов'язання до 20 липня."
            correct: true
          - text: "Ми страшенно обурені вашою поведінкою."
            correct: false
        explanation: "Претензія називає підставу, факт порушення, вимогу й строк."
      - question: "Безособова форма."
        min_correct: 2
        options:
          - text: "Встановлено, що результати підтверджують гіпотезу."
            correct: true
          - text: "Я зрозумів, що воно точно працює."
            correct: false
          - text: "Рішення ухвалено після розгляду заяви."
            correct: true
          - text: "Ми такі молодці, що швидко все зробили."
            correct: false
        explanation: "Безособова форма фокусує увагу на дії або результаті."
      - question: "Точна юридична лексика."
        min_correct: 2
        options:
          - text: "Чинний закон визначає порядок подання скарги."
            correct: true
          - text: "Працюючий закон все пояснює."
            correct: false
          - text: "Сторона зобов'язана надати документи у встановлений строк."
            correct: true
          - text: "Сторона, мабуть, якось дасть папери."
            correct: false
        explanation: "Юридичний стиль потребує точних модальних і правових формул."
      - question: "Академічна доброчесність."
        min_correct: 2
        options:
          - text: "У праці авторка доводить, що термін потребує уточнення."
            correct: true
          - text: "Усі й так знають, звідки ця думка."
            correct: false
          - text: "Після парафразу потрібно зазначити джерело."
            correct: true
          - text: "Чужий висновок можна подати як власний."
            correct: false
        explanation: "Посилання, цитування й парафраз мають показувати джерело."
      - question: "Документні реквізити."
        min_correct: 2
        options:
          - text: "Заява має містити адресата, прохання, дату й підпис."
            correct: true
          - text: "Підпис у заяві не має значення."
            correct: false
          - text: "Протокол фіксує рішення, відповідальних і строки."
            correct: true
          - text: "Офіційний документ краще писати без конкретних дат."
            correct: false
        explanation: "Реквізити роблять документ придатним для офіційного використання."
      - question: "Наукова незгода."
        min_correct: 2
        options:
          - text: "Це твердження потребує додаткової перевірки."
            correct: true
          - text: "Автор нічого не розуміє."
            correct: false
          - text: "Наведені приклади не є достатніми для узагальнення."
            correct: true
          - text: "Аргумент просто поганий і крапка."
            correct: false
        explanation: "Академічна критика оцінює аргумент, а не людину."
      - question: "Редагування розмовного речення."
        min_correct: 2
        options:
          - text: "Проблему усунуто, про що складено відповідний звіт."
            correct: true
          - text: "Ми все пофіксили, тому норм."
            correct: false
          - text: "У процесі дослідження запропоновано спосіб розв'язання проблеми."
            correct: true
          - text: "Воно вже працює, не партеся."
            correct: false
        explanation: "Формальне редагування прибирає жаргон і називає дію точно."

  - type: true-false
    title: "Правда чи неправда: формальне письмо"
    instruction: "Визначте, чи твердження правильне."
    items:
      - statement: "Науковий текст спирається на метод, дані й висновок."
        correct: true
        explanation: "Це базова логіка наукового регістру."
      - statement: "Юридична претензія має насамперед передати емоційне обурення."
        correct: false
        explanation: "Претензія фіксує підставу, порушення, вимогу й строк."
      - statement: "Форми на -но/-то можуть переносити фокус на результат дії."
        correct: true
        explanation: "Наприклад: встановлено, розглянуто, ухвалено."
      - statement: "У формальному тексті корисно випадково чергувати терміни, щоб уникнути повторів."
        correct: false
        explanation: "Терміни мають бути послідовними."
      - statement: "Слово «чинний» доречне, коли йдеться про правову силу закону."
        correct: true
        explanation: "Чинний закон - нормативна формула."
      - statement: "Анотація має переказувати всю статтю в деталях."
        correct: false
        explanation: "Анотація стисло називає тему, метод, результат і висновок."
      - statement: "Реквізити допомагають офіційному документу виконати свою функцію."
        correct: true
        explanation: "Адресат, дата, підпис і підстава важливі для документа."
      - statement: "Фраза «на підставі» може називати юридичну підставу дії."
        correct: true
        explanation: "На підставі заяви, договору або статті."
      - statement: "У науковій критиці краще атакувати автора, а не аргумент."
        correct: false
        explanation: "Академічна незгода має бути змістовною."
      - statement: "Формальність не повинна перетворювати текст на порожній канцелярит."
        correct: true
        explanation: "Точність і лаконічність важливіші за штучну складність."

  - type: error-correction
    title: "Виправте регістр"
    instruction: "Знайдіть недоречну форму й замініть її формальним українським варіантом."
    items:
      - sentence: "У цій роботі я хочу показати, що тема дуже цікава."
        error: "я хочу показати"
        correction: "мета дослідження - визначити"
        explanation: "Науковий текст краще формулювати без особистого «я»."
      - sentence: "Ви нас підвели, тому негайно все виправте."
        error: "Ви нас підвели"
        correction: "зобов'язання не виконано у встановлений строк"
        explanation: "Претензія має назвати факт порушення."
      - sentence: "Цей працюючий закон усе регулює."
        error: "працюючий закон"
        correction: "чинний закон"
        explanation: "У правовому контексті доречне слово чинний."
      - sentence: "У дослідженні є купа важливих штуковин."
        error: "купа важливих штуковин"
        correction: "кілька важливих чинників"
        explanation: "Науковий стиль уникає розмовної лексики."
      - sentence: "Згідно договору послугу мали надати до 10 липня."
        error: "Згідно договору"
        correction: "Згідно з договором"
        explanation: "Нормативна формула: згідно з + орудний відмінок."
      - sentence: "Науковці доказали актуальність теми."
        error: "доказали"
        correction: "довели"
        explanation: "У літературній українській мові доречне довели."
      - sentence: "Дальший пункт описує порядок подання скарги."
        error: "Дальший"
        correction: "Наступний"
        explanation: "У значенні «наступний» краще вживати форму наступний."
      - sentence: "Автор просто не правий."
        error: "просто не правий"
        correction: "позиція автора потребує уточнення"
        explanation: "Академічна критика має оцінювати аргумент."
      - sentence: "Документ розглянули колись потім."
        error: "колись потім"
        correction: "у встановлений строк"
        explanation: "Офіційний текст потребує конкретного строку."
      - sentence: "Дитина має право на її захист."
        error: "на її захист"
        correction: "на захист"
        explanation: "Український офіційний стиль часто опускає зайвий присвійний займенник."

  - type: match-up
    title: "Науковий чи юридичний термін"
    instruction: "Поєднайте термін із найтиповішим контекстом."
    pairs:
      - left: "гіпотеза"
        right: "наукове припущення, яке перевіряють"
      - left: "методологія"
        right: "опис способу дослідження"
      - left: "цитування"
        right: "точне використання чужого тексту"
      - left: "парафраз"
        right: "переказ думки джерела своїми словами"
      - left: "постанова"
        right: "офіційне рішення органу або суду"
      - left: "скарга"
        right: "звернення щодо порушення права"
      - left: "позов"
        right: "вимога, подана до суду"
      - left: "зобов'язання"
        right: "обов'язок сторони виконати дію"
      - left: "актуальність"
        right: "обґрунтування важливості теми"
      - left: "підстава"
        right: "факт або норма, що дає право на дію"
      - left: "реквізит"
        right: "обов'язковий елемент документа"
      - left: "доказовість"
        right: "опора на дані й аргументи"

  - type: select
    title: "Точність регістру"
    instruction: "Виберіть варіанти, які не змішують науковий і юридичний регістри без потреби."
    items:
      - question: "Вступ до наукової роботи."
        min_correct: 2
        options:
          - text: "Актуальність теми зумовлена зростанням кількості дистанційних курсів."
            correct: true
          - text: "На підставі вищезазначеного прошу зарахувати тему до розділу."
            correct: false
          - text: "Мета дослідження - визначити чинники мотивації."
            correct: true
          - text: "Зобов'язуюся довести гіпотезу до п'ятниці."
            correct: false
        explanation: "Науковий вступ не потребує формул заяви або розписки."
      - question: "Заява."
        min_correct: 2
        options:
          - text: "Прошу надати довідку про навчання."
            correct: true
          - text: "У цьому документі проаналізовано феномен довідки."
            correct: false
          - text: "До заяви додаю копію паспорта."
            correct: true
          - text: "Методологія прохання передбачає три етапи."
            correct: false
        explanation: "Заява коротко формулює прохання й додатки."
      - question: "Протокол."
        min_correct: 2
        options:
          - text: "Рішення: підготувати звіт до 15 вересня."
            correct: true
          - text: "Усі поговорили й наче домовилися."
            correct: false
          - text: "Відповідальна особа: секретар комісії."
            correct: true
          - text: "Було цікаво, але трохи хаотично."
            correct: false
        explanation: "Протокол фіксує рішення, відповідальних і строки."
      - question: "Академічна незгода."
        min_correct: 2
        options:
          - text: "Наведені дані не дають підстав для такого висновку."
            correct: true
          - text: "Автор перебільшує, бо йому так хочеться."
            correct: false
          - text: "Цей аргумент не враховує результати другого експерименту."
            correct: true
          - text: "Текст виглядає якось дивно."
            correct: false
        explanation: "Незгода має бути конкретною й доказовою."
      - question: "Претензія щодо договору."
        min_correct: 2
        options:
          - text: "Послугу не надано у строк, визначений пунктом 4 договору."
            correct: true
          - text: "Ми дуже засмутилися, бо все зіпсовано."
            correct: false
          - text: "Просимо надати письмове пояснення до 20 липня."
            correct: true
          - text: "У статті буде розглянуто нашу образу."
            correct: false
        explanation: "Претензія потребує підстави, факту, вимоги й строку."
      - question: "Формула результату."
        min_correct: 2
        options:
          - text: "Встановлено залежність між змінними."
            correct: true
          - text: "Ми прям реально все побачили."
            correct: false
          - text: "Підтверджено практичне значення висновків."
            correct: true
          - text: "Воно, здається, якось сходиться."
            correct: false
        explanation: "Формальний результат має бути перевірним."
      - question: "Точність терміна."
