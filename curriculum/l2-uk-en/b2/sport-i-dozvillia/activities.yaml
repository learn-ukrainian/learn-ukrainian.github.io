version: '1.0'
module: sport-i-dozvillia
level: b2
inline:
  - type: select
    title: Вид, формат і мета
    instruction: Оберіть фрази, які звучать як точний B2-опис активності, а не як плоска назва теми.
    items:
      - question: Де є вид активності, регулярність і мета?
        min_correct: 2
        options:
          - text: Я займаюся спортом.
            correct: false
          - text: Двічі на тиждень ходжу на плавання, щоб підтримувати спину.
            correct: true
          - text: У вихідні бігаю вздовж набережної й поступово збільшую дистанцію.
            correct: true
          - text: Мені подобається відпочинок.
            correct: false
        explanation: B2-опис додає регулярність, місце, мету або зміну, а не лише назву теми.
      - question: Яка модель керування нормативна для командного виду спорту?
        min_correct: 2
        options:
          - text: грати у футбол
            correct: true
          - text: грати футбол
            correct: false
          - text: грати в хокей
            correct: true
          - text: займатися футбол
            correct: false
        explanation: З більшістю назв ігор природна модель грати у/в.
      - question: Де правильно показано підготовку до події?
        min_correct: 2
        options:
          - text: готуватися до змагання
            correct: true
          - text: працювати над технікою
            correct: true
          - text: робити змагання
            correct: false
          - text: тренуватися над матчем
            correct: false
        explanation: Готуємося до події, але працюємо над умінням або технікою.
      - question: Які фрази доречні для аматорської активності без перебільшення?
        min_correct: 2
        options:
          - text: ходжу на тренування для задоволення
            correct: true
          - text: веду професійний тренувальний процес у дворі
            correct: false
          - text: поступово збільшую навантаження
            correct: true
          - text: здійснюю спортивне звершення щосереди
            correct: false
        explanation: Аматорський опис має бути точним, але не пафосним.
      - question: Де названо межу навантаження?
        min_correct: 2
        options:
          - text: Після довгої дистанції залишаю день для відновлення.
            correct: true
          - text: Бігаю щодня без перерви, навіть коли болить коліно.
            correct: false
          - text: Поступово збільшую навантаження після розминки.
            correct: true
          - text: Тренуюся до виснаження, бо так швидше буде результат.
            correct: false
        explanation: Межа показує відповідальне ставлення до активності.
      - question: Де дозвілля описано конкретно?
        min_correct: 2
        options:
          - text: Я добре відпочиваю.
            correct: false
          - text: У середу ходжу на кераміку й після заняття відчуваю спокій.
            correct: true
          - text: Дозвілля є дозвілля.
            correct: false
          - text: Після роботи слухаю подкаст під час прогулянки.
            correct: true
        explanation: Конкретний опис має дію, час або результат.
      - question: Де правильно показано глядацьку роль?
        min_correct: 2
        options:
          - text: Наша команда виграла, а я підтримував її на стадіоні.
            correct: true
          - text: Ми забили, хоча я дивився матч удома.
            correct: false
          - text: Я стежив за рахунком і коментував заміни.
            correct: true
          - text: Я сидів на трибуні, тому ми змінили тактику.
            correct: false
        explanation: Глядач підтримує й аналізує, але не привласнює дію команди.
      - question: Де рефлексія має причину?
        min_correct: 2
        options:
          - text: Було нормально.
            correct: false
          - text: Мені сподобалося, бо ми поєднали рух і розмову.
            correct: true
          - text: Вистава вдалася, бо актори тримали напругу.
            correct: true
          - text: Я був там, і все.
            correct: false
        explanation: Рефлексія B2-рівня пояснює враження.
  - type: match-up
    title: Роль мовця
    instruction: Поєднайте роль із природною фразою.
    pairs:
      - left: учасник матчу
        right: Я вийшов у другому таймі й працював у захисті.
      - left: уболівальник
        right: Ми підтримували команду до фінального свистка.
      - left: коментатор
        right: У другому таймі суперник частіше втрачав м'яч у центрі поля.
      - left: тренер
        right: Після перерви ми змінили темп і додали пресинг.
      - left: глядач трансляції
        right: Я дивився гру в записі й зупиняв ключові епізоди.
      - left: організатор події
        right: Я перевірив квитки, час зустрічі й запасний маршрут.
      - left: аналітичний глядач
        right: Я помітив, як команда втратила темп після перерви.
      - left: учасник тренування
        right: Я зробив розминку й поступово збільшив навантаження.
      - left: автор відгуку
        right: Я пояснив, чому матч справив на мене сильне враження.
      - left: учасник планування
        right: Я запропонував альтернативу на випадок дощу.
  - type: error-correction
    title: Етичний і точний спортивний коментар
    instruction: Знайдіть неточний або неприродний фрагмент і виберіть кращий варіант.
    items:
      - sentence: Усик просто переміг, і це круто для всіх.
        error: просто переміг, і це круто
        correction: переміг завдяки витримці, підготовці й точній роботі в рингу
        options:
          - переміг завдяки витримці, підготовці й точній роботі в рингу
          - переміг по причині крутого настрою
          - зробив перемогу спортивним спортом
          - переміг із-за того що переміг
        explanation: Коментар має називати причини, а не лише емоцію.
      - sentence: Спорт вилікував ветеранів після поранень.
        error: вилікував ветеранів
        correction: може бути частиною реабілітації ветеранів
        options:
          - може бути частиною реабілітації ветеранів
          - зробив ветеранів здоровими повністю
          - закрив усі проблеми після поранень
          - відмінив потребу у відновленні
        explanation: Реабілітація складна; спорт може підтримувати процес, але не замінює його.
      - sentence: Магучіх має рекорд, тому вона хороша.
        error: хороша
        correction: її техніка й концентрація стали прикладом стабільності
        options:
          - її техніка й концентрація стали прикладом стабільності
          - вона сама краща по рекорду
          - рекорд робить її нормальною
          - вона має хороший спорт
        explanation: Назвіть конкретну якість, яку показує рекорд.
      - sentence: Нейтральний прапор все вирішує, бо спорт без політики.
        error: все вирішує
        correction: не завжди знімає питання публічної відповідальності
        options:
          - не завжди знімає питання публічної відповідальності
          - автоматично прибирає будь-який контекст
          - робить тему пустою
          - закриває всі питання назавжди
        explanation: B2-дискусія потребує аргументу й точного формулювання позиції.
      - sentence: Ми домовилися за прогулянку після матчу.
        error: за прогулянку
        correction: про прогулянку
        options:
          - про прогулянку
          - над прогулянкою
          - крізь прогулянку
          - від прогулянки
        explanation: Домовлятися треба про подію або умови.
      - sentence: Я роблю спорт, щоб бути нормальним.
        error: роблю спорт
        correction: займаюся спортом
        options:
          - займаюся спортом
          - роблю спортивність
          - маю спорт по життю
          - виконую спорт
        explanation: Природна модель — займатися спортом.
      - sentence: Після роботи я сиджу в телефоні для здорового дозвілля.
        error: сиджу в телефоні
        correction: дивлюся одну лекцію в записі й вимикаю сповіщення
        options:
          - дивлюся одну лекцію в записі й вимикаю сповіщення
          - сиджу телефоном до ночі
          - роблю цифровий спорт
          - здорово телефоную дозвілля
        explanation: Цифрове дозвілля потребує конкретної дії й межі.
      - sentence: Команда тренується над змаганням.
        error: над змаганням
        correction: до змагання
        options:
          - до змагання
          - про змагання
          - крізь змагання
          - від змаганням
        explanation: Готуватися або тренуватися можна до змагання.
  - type: group-sort
    title: Типи дозвілля
    instruction: Розподіліть приклади за типами дозвілля.
    groups:
      - name: активний відпочинок
        items:
          - похід у гори
          - велопрогулянка вздовж річки
          - каякінг на вихідних
      - name: культурне дозвілля
        items:
          - вистава в малому театрі
          - музейна експозиція про спорт
          - книжковий клуб на Подолі
      - name: домашнє хобі
        items:
          - рукоділля після роботи
          - садівництво на балконі
          - приготування борщу для родини
      - name: цифрове дозвілля
        items:
          - подкаст під час прогулянки
          - одна серія перед сном
          - командна онлайн-гра з друзями
  - type: fill-in
    title: Запрошення, компроміс, рефлексія
    instruction: Доповніть фрази так, щоб вони звучали природно в плануванні дозвілля.
    items:
      - sentence: Маєш бажання піти ____ матч у суботу, якщо знайдемо квитки?
        answer: на
        options: [на, у, по, через]
        explanation: На матч, на виставу, на тренування.
      - sentence: Якщо погода зіпсується, можемо подивитися ____ вдома.
        answer: трансляцію
        options: [трансляцію, рахунок, розминку, навантаження]
        explanation: Дивляться трансляцію, а не рахунок як подію.
      - sentence: Цього разу не зможу, але із задоволенням ____ наступного тижня.
        answer: приєднаюся
        options: [приєднаюся, заперечу, заб'ю, пропущу]
        explanation: М'яка відмова часто містить альтернативу.
      - sentence: Мені сподобалося, бо ми поєднали рух, розмову й ____ спільного часу.
        answer: відчуття
        options: [відчуття, рахунок, суперника, стадіон]
        explanation: Рефлексія називає не лише подію, а й особистий результат.
      - sentence: Після гри частина групи хотіла в кафе, тож ми домовилися ____ коротку прогулянку.
        answer: про
        options: [про, за, від, крізь]
        explanation: Домовитися про що? — про прогулянку, час, маршрут.
      - sentence: Після матчу ми поділилися ____ з друзями.
        answer: враженнями
        options: [враженнями, рахунок, розминкою, суперником]
        explanation: Ділитися чим? — враженнями.
      - sentence: Перед забігом варто почати ____ розминки.
        answer: з
        options: [з, на, про, через]
        explanation: Почати з чого? — з розминки.
      - sentence: Якщо квитки дорогі, можемо домовитися ____ трансляцію вдома.
        answer: про
        options: [про, за, над, крізь]
        explanation: Домовитися про альтернативу.
      - sentence: Команда готується ____ міського турніру.
        answer: до
        options: [до, за, над, від]
        explanation: Готуватися до події.
      - sentence: Після травми спортсмен працює ____ відновленням.
        answer: над
        options: [над, у, за, крізь]
        explanation: Працювати над процесом або навичкою.
workbook:
  - id: workbook-1
    type: reading
    title: Активні вихідні без хаосу
    instruction: Прочитайте короткий план групи друзів і визначте, як вони поєднали спорт, культуру та компроміс.
    text: >
      У суботу друзі хотіли піти на футбольний матч, але частина групи не
      могла довго стояти на стадіоні після робочого тижня. Вони домовилися
      зранку зробити коротку пробіжку в парку, після обіду відвідати виставку
      про історію київського спорту, а ввечері подивитися трансляцію вдома.
      Такий план поєднав рух, культурне дозвілля й можливість підтримати
      команду без поспіху.
    tasks:
      - Назвіть три типи дозвілля в тексті.
      - Знайдіть фразу, яка показує компроміс.
      - Поясніть, чому план звучить реалістично.
      - Перепишіть останнє речення, додавши одну рефлексію про спільний час.
  - id: workbook-2
    type: essay-response
    title: Моє дозвілля як відновлення
    instruction: Напишіть 120-150 слів про спортивне або культурне дозвілля, яке допомагає вам відновлюватися.
    prompt: Згадайте конкретну дію, регулярність, мету, межі й результат. Використайте щонайменше один однорідний ряд.
    min_words: 150
    model_answer: >
      Щосереди я ходжу на плавання, а у вихідні гуляю вздовж річки або
      зустрічаюся з друзями на настільні ігри. Плавання допомагає мені
      підтримувати спину й спокійно завершувати робочий день. Настільні ігри
      дають інший результат: ми домовляємося про правила, жартуємо й вчимося
      програвати без образ. Я намагаюся не перетворювати цифрове дозвілля на
      втому, тому після десятої вечора вимикаю сповіщення.
    rubric:
      - criteria: зміст
        description: Є дія, регулярність, мета й результат.
      - criteria: лексика
        description: Використано лексику спорту або дозвілля природно.
      - criteria: синтаксис
        description: Є однорідний ряд або складне речення без перевантаження.
  - id: workbook-3
    type: reading
    title: Редагування розповіді про вихідні
    instruction: Прочитайте чернетку й поясніть, які три фрази треба відредагувати.
    text: >
      У неділю ми грали футбол і робили відпочинок. Потім я сидів у телефоні
      весь вечір, тому моє дозвілля було здорове. Наступного тижня ми
      домовилися за зустріч біля стадіону й вирішили подивитися матч разом.
    tasks:
      - Замініть фразу грали футбол природною моделлю керування.
      - Перепишіть речення про телефон так, щоб з'явилася межа цифрового дозвілля.
      - Виправте керування в домовилися за зустріч.
      - Додайте один підсумковий висновок про відпочинок.
  - id: workbook-4
    type: reading
    title: Подія, враження й оцінка
    instruction: Прочитайте нотатку після матчу й розділіть факт, враження та оцінку.
    text: >
      Рахунок був два-один, але найсильніше враження залишив не результат, а
      те, як команда повернула темп після перерви. Уболівальники підтримували
      її до фінального свистка, а тренер після гри пояснив, що заміни дали
      команді більше простору на флангах.
    tasks:
      - Випишіть один факт із тексту.
      - Випишіть одне враження.
      - Знайдіть оцінку з причиною.
      - Перепишіть нотатку від імені глядача трансляції.
  - id: workbook-5
    type: reading
    title: Межі цифрового дозвілля
    instruction: Прочитайте коротку ситуацію й поясніть, чому дозвілля не виснажує.
    text: >
      Після роботи Марко дивиться одну серію спортивного документального
      фільму, але перед сном вимикає сповіщення. У суботу він грає з друзями
      онлайн, проте група заздалегідь домовляється про час завершення. Таке
      цифрове дозвілля підтримує інтерес і спілкування, але не забирає сон.
    tasks:
      - Назвіть дві межі цифрового дозвілля.
      - Поясніть, чому онлайн-гра тут не замінює відпочинок.
      - Додайте одну альтернативу без екрана.
      - Сформулюйте висновок одним B2-реченням.
