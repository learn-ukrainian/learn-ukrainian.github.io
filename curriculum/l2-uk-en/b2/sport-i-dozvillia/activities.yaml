- type: essay-response
  id: sport-weekend-plan
  title: "Письмо: план активних вихідних"
  instruction: Напиши зв'язний текст українською.
  prompt: Опиши план вихідних, який поєднує спорт і дозвілля. Використай щонайменше три однорідні члени, одну обставину умови й одну ввічливу формулу запрошення.
  min_words: 170
  model_answer: 'У суботу я пропоную поєднати рух, культуру й спокійний вечір. Зранку можемо пробігти короткий маршрут у парку, зробити розминку й випити каву біля озера. Якщо буде дощ, замість пробіжки підемо до спортзалу або зробимо домашнє тренування. Після обіду я хочу зайти на виставку про міський спорт, бо мені цікаво, як змінювалися стадіони, секції й аматорські клуби. Увечері можемо подивитися футбольний матч у кав’ярні або вдома. Маєш бажання приєднатися? Якщо матимеш інші плани, можемо перенести зустріч на неділю. Такий день не буде перевантаженим: він дасть фізичну активність, нові враження й час для розмови.'
  rubric:
  - criteria: Лексика спорту й дозвілля
    description: Текст містить точні слова про активність, відпочинок і планування.
    points: 4
  - criteria: Синтаксис
    description: Є однорідні члени, умова й природне запрошення.
    points: 4
  - criteria: Природність
    description: Українські формули звучать ввічливо й без калькованого керування.
    points: 4
- type: critical-analysis
  id: sport-leisure-balance-analysis
  title: "Аналіз: спорт, відпочинок і межі"
  instruction: Проаналізуй уривок і дай відповіді.
  target_text: 'Після роботи Андрій тричі на тиждень тренується в залі, але щонеділі залишає вечір без спорту: читає, готує вечерю й не відкриває робочі чати. Він каже, що відпочинок має відновлювати, а не доводити силу волі.'
  questions:
  - Які види дозвілля поєднує Андрій?
  - Чому останнє речення важливе для балансу?
  - Які однорідні члени є в уривку?
  model_answers:
  - Андрій поєднує регулярні тренування, читання, кулінарію й цифрові межі.
  - Речення показує, що дозвілля не має перетворюватися на ще один обов'язок.
  - "Однорідні присудки: читає, готує, не відкриває."
  focus_points:
  - баланс активності й відновлення
  - однорідні члени
  - цифрові межі
