workbook:
- type: reading
  id: sport-leisure-reading
  title: "Текст для читання: активні вихідні"
  instruction: Прочитай текст і виконай завдання.
  text: 'У суботу наша група планувала піти на міський матч, але через дощ частина друзів запропонувала музей. Ми домовилися так: зранку йдемо на коротку пробіжку в парку, після обіду дивимося виставку про історію спорту, а ввечері, якщо погода поліпшиться, зустрічаємося біля стадіону. Такий план поєднав активний відпочинок, культурне дозвілля й можливість підтримати команду.'
  tasks:
  - Назви три види дозвілля, які поєднала група.
  - Знайди обставину причини й обставину умови.
  - Поясни, чому план звучить як компроміс.
- type: match-up
  title: Активність і природна фраза
  instruction: Зістав вид активності з природною українською формулою.
  pairs:
  - left: футбол
    right: грати у футбол
  - left: хокей
    right: грати в хокей
  - left: фітнес
    right: займатися фітнесом
  - left: ворота
    right: бити по воротах
  - left: розминка
    right: почати з розминки
  - left: витривалість
    right: працювати над витривалістю
  - left: похід
    right: іти в похід
  - left: велосипед
    right: кататися на велосипеді
  - left: виставка
    right: піти на виставку
  - left: запрошення
    right: прийняти запрошення
  - left: домовленість
    right: підтвердити домовленість
  - left: враження
    right: поділитися враженнями
- type: fill-in
  title: Спортивне керування
  instruction: Обери форму або прийменник, який робить фразу природною.
  items:
  - sentence: У неділю ми граємо ____ футбол.
    answer: у
    options: [у, про, за, над]
  - sentence: Нападник ударив ____ воротах.
    answer: по
    options: [по, в, над, через]
  - sentence: Після травми спортсмен працює ____ відновленням.
    answer: над
    options: [над, через, попри, без]
  - sentence: Я займаюся ____ двічі на тиждень.
    answer: фітнесом
    options: [фітнесом, фітнес, фітнесу, фітнесі]
  - sentence: Команда готується ____ турніру.
    answer: до
    options: [до, за, від, між]
  - sentence: Вболівальники підтримували ____ до фінального свистка.
    answer: команду
    options: [команду, команді, командою, команди]
  - sentence: Ми поділилися ____ після виставки.
    answer: враженнями
    options: [враженнями, враження, враженнях, враженню]
  - sentence: Організатори домовилися ____ час зустрічі.
    answer: про
    options: [про, за, від, під]
  - sentence: У разі дощу ми підемо ____ музей.
    answer: до
    options: [до, на, при, крізь]
  - sentence: Спорт допомагає ____ впевненість після травми.
    answer: відновити
    options: [відновити, відновлення, відновлений, відновлюючи]
- type: error-correction
  title: Виправ спортивні й дозвіллєві фрази
  instruction: Знайди помилковий фрагмент і обери природний варіант.
  items:
  - sentence: Ми граємо футбол щосуботи.
    error: граємо футбол
    correction: граємо у футбол
    options: [граємо у футбол, граємо про футбол, граємо футболом, граємо на футбол]
    explanation: Природна модель — грати у футбол.
  - sentence: Нападник бив в ворота з гострого кута.
    error: в ворота
    correction: по воротах
    options: [по воротах, у ворітьми, за ворота, над воріт]
    explanation: У спортивній фразі природно бити по воротах.
  - sentence: Я займаюся фітнес після роботи.
    error: фітнес
    correction: фітнесом
    options: [фітнесом, фітнесу, фітнесі, фітнеса]
    explanation: Займатися чим? — фітнесом.
  - sentence: Тримаючи темп, дистанція завершилася швидко.
    error: дистанція завершилася
    correction: бігун завершив дистанцію
    error_type: construction
    options: [бігун завершив дистанцію, дистанцію завершено, темп завершив дистанцію, була завершена дистанція]
    explanation: Дієприслівник потребує спільного виконавця.
  - sentence: Ми підемо в музей, якщо буде дощ, а також на матч.
    error: а також
    correction: або
    options: [або, тому що, попри, від]
    explanation: Тут потрібен вибір між варіантами.
  - sentence: Вона є відома фехтувальниця.
    error: є відома
    correction: відома
    options: [відома, є відомою, відому, відомо]
    explanation: У теперішньому часі зв'язка часто не потрібна.
  - sentence: Я маю бажання піти на виставку, но не маю часу.
    error: но
    correction: але
    options: [але, і, або, бо]
    explanation: Нормативний сполучник — але.
  - sentence: Ми домовилися за зустріч біля стадіону.
    error: за зустріч
    correction: про зустріч
    options: [про зустріч, зустріччю, від зустрічі, до зустріч]
    explanation: Домовитися про що? — про зустріч.
- type: select
  title: Нормативні формули про спорт
  instruction: Познач усі природні речення.
  items:
  - question: Де правильно описано командну гру?
    min_correct: 2
    options:
    - text: Ми граємо у футбол після роботи.
      correct: true
    - text: Ми граємо футбол після роботи.
      correct: false
    - text: Команда била по воротах частіше.
      correct: true
    - text: Команда била в ворота частіше.
      correct: false
    - text: Вони грали над волейболом.
      correct: false
  - question: Де правильно описано тренування?
    min_correct: 2
    options:
    - text: Я займаюся фітнесом у спортзалі.
      correct: true
    - text: Я займаюся фітнес у спортзалі.
      correct: false
    - text: Ми працюємо над витривалістю.
      correct: true
    - text: Ми працюємо через витривалість.
      correct: false
    - text: Розминка починає нами вправи.
      correct: false
  - question: Де є природне запрошення?
    min_correct: 2
    options:
    - text: Маєш бажання піти на матч у суботу?
      correct: true
    - text: Ти мусиш прийти на матч, бо я сказав.
      correct: false
    - text: Якщо матимеш час, ходімо на виставку.
      correct: true
    - text: Приходь, інакше образиш мене.
      correct: false
    - text: Запрошення на тебе тисне.
      correct: false
  - question: Де правильно описано дозвілля?
    min_correct: 2
    options:
    - text: Я поділився враженнями після виставки.
      correct: true
    - text: Я поділився враження після виставки.
      correct: false
    - text: Активний відпочинок допомагає відновитися.
      correct: true
    - text: Дозвілля мене робить відпочитим автоматично.
      correct: false
    - text: Я відпочиваю в інтернеті без меж.
      correct: false
  - question: Де правильно використано обставину допусту?
    min_correct: 2
    options:
    - text: Попри втому команда продовжила гру.
      correct: true
    - text: Через втому команда продовжила гру попри.
      correct: false
    - text: Незважаючи на дощ, ми пішли на стадіон.
      correct: true
    - text: Дощем ми пішли на стадіон.
      correct: false
    - text: Втома продовжила команду.
      correct: false
  - question: Де правильно передано вибір?
    min_correct: 2
    options:
    - text: Або йдемо на матч, або дивимося трансляцію вдома.
      correct: true
    - text: Як йдемо на матч, а також дивимося вдома.
      correct: false
    - text: Можемо як пройтися парком, так і зайти на виставку.
      correct: true
    - text: Можемо як пройтися парком, або зайти на виставку.
      correct: false
    - text: Чи матч і чи музей разом тому.
      correct: false
  - question: Де природно описано реабілітацію?
    min_correct: 2
    options:
    - text: Спорт допомагає відновити впевненість після травми.
      correct: true
    - text: Спорт робить реабілітацію автоматичною для всіх.
      correct: false
    - text: Ветеран тренується для відновлення рухливості.
      correct: true
    - text: Реабілітація грає в ветерана.
      correct: false
    - text: Травма тренується спортсменом.
      correct: false
  - question: Де доречно використано однорідні члени?
    min_correct: 2
    options:
    - text: Ми купили квитки, зустрілися біля стадіону й підтримували команду.
      correct: true
    - text: Маршрут був короткий, безпечний і мальовничий.
      correct: true
    - text: Ми купили квитки, зустріч і підтримка.
      correct: false
    - text: Маршрут був короткий, безпека і мальовничо.
      correct: false
    - text: Команда швидко, атака й перемогти.
      correct: false
- type: fill-in
  title: Плани й запрошення
  instruction: Заповни пропуск доречним словом або формою.
  items:
  - sentence: ____ бажання піти на матч у суботу?
    answer: Маєш
    options: [Маєш, Береш, Робиш, Стаєш]
  - sentence: Якщо буде дощ, ____ підемо в музей.
    answer: краще
    options: [краще, важче, нижче, гірше]
  - sentence: Дякую за запрошення, але цього разу не ____.
    answer: зможу
    options: [зможу, змога, змігши, зможливий]
  - sentence: Можемо ____ піти на матч, ____ подивитися трансляцію вдома.
    answer: або
    options: [або, тому, попри, після]
  - sentence: Я поділюся ____ після концерту.
    answer: враженнями
    options: [враженнями, враження, враженню, враженнях]
  - sentence: Домовмося ____ час зустрічі.
    answer: про
    options: [про, за, між, без]
  - sentence: У суботу я хочу ____ в похід.
    answer: піти
    options: [піти, похід, пішовши, ходіння]
  - sentence: Якщо квитки подорожчають, ____ план.
    answer: змінимо
    options: [змінимо, зміна, змінений, змінюючи]
  - sentence: Після матчу зайдемо ____ кав'ярні.
    answer: до
    options: [до, у, над, від]
  - sentence: Буду радий, якщо ____.
    answer: приєднаєшся
    options: [приєднаєшся, приєднання, приєднаний, приєднавши]
- type: mark-the-words
  title: Познач обставини
  instruction: Клацни всі обставини в уривку.
  text: У суботу після розминки команда тренувалася на стадіоні, щоб підготуватися до турніру. Попри втому гравці працювали спокійно й по черзі відпрацьовували передачі.
  answers:
  - У суботу
  - після розминки
  - на стадіоні
  - щоб підготуватися до турніру
  - Попри втому
  - спокійно
  - по черзі
