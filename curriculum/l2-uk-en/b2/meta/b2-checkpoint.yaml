slug: b2-checkpoint
title: Контрольна точка B2.2
word_target: 4000
content_outline:
  - section: Вступ та організація (Introduction and Organization)
    words: 400
    points:
      - 'Огляд мети контрольної точки: перевірка засвоєння тем M41-M69 (фразеологія,
        синоніміка, складний синтаксис) згідно з Держстандартом (§4.4.3, §4.3.4)'
      - 'Структура оцінювання: аналіз тексту, лексико-граматичні вправи та творче
        завдання; критерії оцінювання та прохідний бал'
  - section: Лексична точність та стилістика (Lexical Precision and Stylistics)
    words: 900
    points:
      - 'Робота з синонімічним багатством та стилістично забарвленою лексикою: розрізнення
        нейтральних та експресивних засобів (§4.4.3)'
      - 'Виправлення типових помилок: калькування фразеологізмів (відігравати роль
        vs мати значення) та помилки з дієсловами (брати участь vs приймати участь,
        відчиняти двері)'
      - 'Тестування паронімів: розрізнення ''ефектний'' (вражаючий зовнішньо) vs ''ефективний''
        (дієвий) та ''громадський'' vs ''громадянський'' у професійному контексті'
  - section: 'Наука та медицина: кейс Івана Пулюя (Science and Medicine: Ivan Puliui
      Case)'
    words: 1100
    points:
      - 'Аналіз тексту про Івана Пулюя: інтеграція наукової (гіпотеза, експеримент)
        та медичної (X-промені, діагноз, скелет) термінології'
      - 'Складний синтаксис у науковому мовленні: вживання сполучників з''ясувальних
        та обставинних відношень (завдяки тому, що; незважаючи на те, що)'
      - 'Іван Пулюй як постать деколонізаційного наративу: висвітлення його внеску
        в науку (лампи Пулюя) та культуру (переклад Біблії українською)'
  - section: 'Суспільство та культура: Українська діаспора (Society and Culture: Ukrainian
      Diaspora)'
    words: 900
    points:
      - 'Тематичний блок про українську діаспору: аналіз лексики на позначення ідентичності,
        збереження традицій та громадської активності'
      - Перевірка вміння будувати складнопідрядні речення з різними типами підрядності
        для опису історичних та соціокультурних процесів
      - Вживання абстрактних понять та термінології гуманітарного спрямування (поняття,
        процес, метод) у контексті світового українства
  - section: Підсумок та рефлексія (Summary and Reflection)
    words: 700
    points:
      - 'Самоаналіз результатів: виявлення сильних сторін та зон для розвитку (інтерпретація
        результатів тесту)'
      - Рекомендації для повторення матеріалу M41-M69 та підготовка до фази B2.3 (доменна
        лексика та академічне письмо)
      - 'Підсумковий огляд шляху B2.1 + B2.2: перехід до поглибленої комунікації та
        спеціалізованих професійних тем'
