slug: b2-checkpoint
title: Контрольна точка B2.2
word_target: 4000
content_outline:
- section: Вступ та організація
  words: 400
  points:
  - 'Офіційне привітання екзаменатора та огляд мети контрольної точки: перевірка засвоєння
    фразеології, синоніміки та складного синтаксису з тем M41-M69.'
  - 'Структура оцінювання: аналіз наукового тексту, лексико-граматичні вправи та творче
    завдання; критерії оцінювання та прохідний бал.'
  - 'Увага: 100% занурення. Інструкції та пояснення подаються виключно українською
    мовою; англійське риштування не використовується (zero English scaffolding).'
- section: Лексична точність та стилістика
  words: 900
  points:
  - 'Теоретичний огляд синонімічного багатства та стилістично забарвленої лексики:
    розрізнення нейтральних та експресивних засобів.'
  - Аналіз типових лексичних кальок та їх виправлення (брати участь, а не приймати
    участь; відігравати роль vs мати значення; відчиняти двері).
  - 'Чітке розмежування та тестування паронімів у контексті: ефектний (вражаючий зовнішньо)
    vs ефективний (дієвий), громадський (суспільний) vs громадянський (пов''язаний
    з громадянством).'
- section: 'Наука та медицина: кейс Івана Пулюя'
  words: 1100
  points:
  - Читання та аналіз тексту про Івана Пулюя з інтеграцією наукової (гіпотеза, експеримент)
    та медичної (X-промені, діагноз, скелет) термінології.
  - 'Деколонізаційний наратив: висвітлення його внеску в науку (лампи Пулюя) та культуру
    (переклад Біблії українською) як самостійного діяча.'
  - 'Складний синтаксис у науковому мовленні: вживання складнопідрядних речень зі
    з''ясувальними та обставинними відношеннями (завдяки тому, що; незважаючи на те,
    що; оскільки).'
- section: 'Суспільство та культура: Українська діаспора'
  words: 900
  points:
  - 'Тематичний блок про світове українство: аналіз лексики на позначення ідентичності,
    збереження традицій та громадської активності.'
  - Вживання абстрактних понять та термінології гуманітарного спрямування (поняття,
    процес, метод) у контексті діаспори.
  - Перевірка вміння будувати складнопідрядні речення з різними типами підрядності
    для опису історичних та соціокультурних процесів.
- section: Підсумок та рефлексія
  words: 700
  points:
  - 'Самоаналіз результатів: виявлення сильних сторін та зон для розвитку після проходження
    контрольної точки.'
  - Рекомендації для повторення матеріалу M41-M69 для усунення прогалин.
  - Підсумковий огляд шляху B2.1 + B2.2 та перехід до фази B2.3 (поглиблена комунікація,
    доменна лексика та спеціалізовані професійні теми).
