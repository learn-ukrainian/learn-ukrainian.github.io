slug: stylistic-connectors
title: Стилістичні сполучники
word_target: 4000
content_outline:
- section: 'Вступ: Зв''язність та історичне коріння'
  words: 500
  points:
  - Пояснити роль сполучників у забезпеченні зв'язності (cohesion) тексту на рівні
    B2 згідно зі Стандартом §4.4.1.3 (елементи структурування тексту).
  - 'Навести історичний гачок: сполучник «бо» як один із найдавніших елементів спадщини,
    який активно функціонує в сучасній мові.'
  - Підкреслити багатство синонімів (проте, однак, натомість) як важливий інструмент
    уникнення тавтологій та досягнення точності висловлювання.
- section: Сполучники протиставлення та компенсації
  words: 1000
  points:
  - Розмежувати нейтрально-книжні «проте» та «однак» як точні синоніми до «але», навівши
    приклади їх використання для зв'язку речень.
  - Пояснити розмовний сполучник «зате» з його унікальним відтінком компенсації (аналог
    'but on the bright side').
  - 'Детально проаналізувати «натомість»: вказати на його функцію заміщення однієї
    дії іншою або вираження різкого контрасту, застерігши від використання як простого
    синоніма до «але».'
  - Розглянути стилістичні відтінки «втім» для вираження сумніву або введення додаткових
    зауважень у розмовному та нейтральному стилях.
- section: Приєднання та наслідок у різних реєстрах
  words: 900
  points:
  - 'Пояснити додавання деталей через сполучник «причому»: наголосити на написанні
    разом та його ролі у введенні важливих уточнень (напр., ''швидко, причому без
    помилок'').'
  - 'Проаналізувати логіку наслідку: розмежувати універсальні «тому / тож / отже»
    та офіційно-наукове «відтак» (яке позначає логічний наслідок або послідовність
    у часі).'
  - 'Продемонструвати стилістичний дисонанс: пояснити, чому офіційні сполучники на
    зразок «відтак» або «внаслідок чого» є недоречними в побутових діалогах.'
  - 'Описати спектр приєднання: використання конструкцій «до того ж», «крім того»,
    «тим більше» для логічного підсилення аргументації.'
- section: Допустові відношення та пунктуаційні пастки
  words: 800
  points:
  - Ввести складнопідрядні речення з допустовими відношеннями за Стандартом §4.3.4
    (використання «хоча», «незважаючи на те що», «попри те що»).
  - 'Розрізнити регістри допусту: від офіційного «попри те що» до питомо розмовного
    «дарма що».'
  - 'Пояснити пунктуаційні правила: обов''язкова кома перед сполучниками підрядності.'
  - 'Окремо розібрати синтаксичну різницю: коли «проте / однак» виступають як сполучники
    на початку речення (кома після них не ставиться), а коли — як вставні слова всередині
    (виділяються комами).'
- section: Типові помилки та стилістична елегантність
  words: 800
  points:
  - 'Детально розібрати орфографічний контроль: розрізнення сполучника «проте» (дорівнює
    «але») та сполуки займенника з прийменником «про те» (відповідає на питання «про
    що?»).'
  - Пояснити правильне написання та використання конструкції «незважаючи на» (завжди
    пишеться окремо, вимагає знахідного відмінка).
  - 'Продемонструвати ''Agency Pass'': використання складних сполучників для пояснення
    мотивації суб''єкта в активному стані («Ми вирішили діяти, проте...» замість пасивних
    конструкцій).'
  - 'Підсумувати модуль тренуванням регістрової відповідності: як заміна простих сполучників
    сурядності на складні стилістичні варіанти підвищує якість мовлення до рівня B2.'
