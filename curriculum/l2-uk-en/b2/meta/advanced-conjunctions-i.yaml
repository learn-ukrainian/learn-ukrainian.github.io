slug: advanced-conjunctions-i
title: 'Складні Сполучники I: Причина та Допуск'
word_target: 4000
content_outline:
- section: Вступ та причинові зв'язки в мовленні
  words: 600
  points:
  - 'Представити тему через роль юридичного аналітика: як вибір сполучника впливає
    на переконливість аргументів у суді та звітах.'
  - 'Створити детальну таблицю стилістичних відтінків базових сполучників: «бо» (розмовний,
    усна комунікація), «тому що» (нейтральний, стандартний), «оскільки» (офіційний,
    для логічного обґрунтування).'
  - Навести міні-діалоги та фрагменти аналітичних текстів для демонстрації публіцистичного
    регістру.
- section: Поглиблений аналіз причинових сполучників
  words: 950
  points:
  - 'Розглянути складні аналітичні конструкції: «через те що», «у зв''язку з тим що».
    Наголосити на їхньому роздільному правописі та офіційно-діловому характері.'
  - Пояснити семантику «через» як єдиного правильного варіанту для негативних причин
    (повна заборона вживання кальки «дякуючи хворобі» — правильно «через хворобу»).
  - Деталізувати розрізнення просторового «з-за» (з-за хмар, з-за рогу) та причинового
    «через» (через дощ, через затори). Надати приклади-порівняння.
  - 'Проаналізувати синтаксичну гнучкість «оскільки»: позицію на початку речення для
    задання причинового контексту.'
- section: Допустові конструкції та культурний код
  words: 950
  points:
  - 'Ввести поняття допусту (згідно зі Стандартом §4.3.4.6) через сполучники: «хоча»,
    «незважаючи на те що», «попри те що», «дарма що».'
  - 'Створити культурний якір: розбір рядків із «Каменярів» І. Франка («Хоч не одного
    там калічили ті скали...») як ілюстрації незламності та граматики допусту.'
  - 'Порівняти стилістику: важкий класичний «незважаючи на» та короткий, енергійний
    сучасний «попри».'
  - Пояснити нюанси використання літературного «дарма що» для створення яскравого
    стилістичного контрасту в тексті.
- section: Юридична логіка та пунктуація
  words: 750
  points:
  - 'Розібрати пунктуаційну пастку з «тому що»: зміна логічного акценту через позицію
    коми («Ми виграли справу, тому що...» vs «Ми виграли справу тому, що...»).'
  - Показати, як будувати складні багаторівневі аргументи, поєднуючи причину і допуск
    в одному великому складному реченні.
  - 'Пояснити пунктуацію зі словом «попри»: випадки, коли це прийменник і кома не
    ставиться («попри всі складнощі...»).'
- section: Практикум та синтез
  words: 750
  points:
  - Надати зразки для написання аргументативного параграфа (напр., «Незважаючи на
    труднощі...», «Оскільки...») з використанням академічної лексики.
  - Створити текст із типовими помилками («із-за того що», «дякуючи кризі», «томущо»)
    для вправи на редагування та стилістичне покращення.
  - 'Підбити підсумки у вигляді короткого алгоритму: як правильно обрати сполучник
    залежно від контексту та мети висловлювання.'
