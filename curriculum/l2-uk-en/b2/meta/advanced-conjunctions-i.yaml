slug: advanced-conjunctions-i
title: 'Складні Сполучники I: Причина та Допуск'
word_target: 4000
content_outline:
  - section: Вступ та причинові зв'язки в мовленні (Introduction and Causal Connections
      in Speech)
    words: 600
    points:
      - 'Огляд причинових сполучників через призму юридичного аналітика: розмежування
        письмового звіту та усного виступу в суді'
      - Стилістичні відтінки 'бо' (розмовний/усний), 'тому що' (нейтральний) та 'оскільки'
        (офіційний/аналітичний)
      - 'Культурний контекст: як вибір сполучника змінює сприйняття аргументації в
        публіцистичному стилі'
  - section: Поглиблений аналіз причинових сполучників (Deep Analysis of Causal Conjunctions)
    words: 950
    points:
      - 'Аналіз складних конструкцій: ''через те що'', ''у зв''язку з тим що'' — правила
        написання (завжди окремо, без російського впливу ''томущо'')'
      - 'Корекція типових помилок: заборона вживання ''дякуючи'' (thanks to) для негативних
        причин та заміна на ''через'''
      - 'Викорінення русизму ''із-за'': розрізнення просторового ''з-за'' та причинового
        ''через'' (Standard §4.3.4.4)'
      - 'Специфіка ''оскільки'': використання сполучника на початку речення для обґрунтування
        тези (Since X, then Y)'
  - section: Допустові конструкції та культурний код (Concessive Constructions and
      Cultural Code)
    words: 950
    points:
      - 'Презентація сполучників допусту: ''хоча'', ''незважаючи на те що'', ''попри
        те що'', ''дарма що'' (Standard §4.3.4.6)'
      - 'Літературний якір: Аналіз поезії Івана Франка ''Каменярі'' (''Хоч не одного
        там калічили ті скали...'') як символу української витривалості'
      - 'Стилістична диференціація: сучасний енергійний ''попри'' vs класичний важкий
        ''незважаючи на'''
      - Нюанси вживання 'дарма що' в художньо-публіцистичних текстах для підсилення
        контрасту
  - section: Юридична логіка та пунктуація (Legal Logic and Punctuation)
    words: 750
    points:
      - 'Пунктуаційна пастка: позиція коми в ''тому що'' (нейтральна ''..., тому що''
        vs смислове виділення причини ''..., тому, що'')'
      - 'Логічна побудова аргументу юридичного аналітика: поєднання допусту та причини
        в одному складному реченні'
      - 'Пунктуація при сполучнику ''попри'': випадки, коли кома не ставиться (прийменниковий
        вжиток)'
  - section: Практикум та синтез (Practicum and Synthesis)
    words: 750
    points:
      - Написання аргументативного параграфа 'Незважаючи на труднощі...' з використанням
        вивчених сполучників та академічних понять
      - 'Вправа на редагування: заміна просторічних сполучників на офіційні аналогії
        в юридичному тексті'
      - Фінальна перевірка на типові помилки (правопис 'тому що', 'через те що' та
        вживання 'через' замість 'із-за')
