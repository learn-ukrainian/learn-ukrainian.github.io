slug: register-media-journalistic
title: Медійний та журналістський регістр
word_target: 4000
content_outline:
- section: 'Вступ: Публіцистичний стиль та свобода слова'
  words: 600
  points:
  - Визначення публіцистичного стилю та огляд його сфер застосування (газети, ТБ,
    онлайн-медіа).
  - 'Опис головної мети медійного стилю: поєднання оперативного інформування з впливом
    на аудиторію.'
  - 'Культурний контекст: знайомство з постаттю Георгія Гонгадзе та виданням «Українська
    правда» як символами розвитку свободи слова в Україні.'
  - 'Особливості сучасного інформаційного простору: розгляд телемарафону «Єдині новини»
    як прикладу інформаційного спротиву.'
- section: 'Структура новинного тексту: принцип перевернутої піраміди'
  words: 900
  points:
  - 'Пояснення концепції «перевернутої піраміди» (Inverted Pyramid): чому найважливіша
    інформація подається на початку, а деталі — згодом.'
  - 'Детальний структурний розбір ліду (першого абзацу) за правилом п''яти питань
    (5W: хто, що, де, коли, чому).'
  - Аналіз прикладів вдалих та перевантажених лідів з реальних новинних стрічок.
  - Практична інструкція для формування власного інформативного та лаконічного новинного
    повідомлення.
- section: Мова заголовків та стилістичні засоби
  words: 800
  points:
  - 'Синтаксичні особливості новинних заголовків: телеграфний стиль та функція еліпсиса
    (навмисний пропуск дієслів).'
  - Використання теперішнього часу (praesens historicum) для надання динаміки подіям,
    що вже відбулися (наприклад, «Президент підписує закон»).
  - Роль лексичних метафор та експресивної лексики для привернення уваги читача.
  - 'Специфіка пунктуації в заголовках: використання двокрапки для атрибуції («Експерт:
    криза триватиме») та знака питання для непідтвердженої інформації.'
- section: Цитати, атрибуція та подолання типових помилок
  words: 900
  points:
  - Граматичні правила трансформації прямої мови в непряму за допомогою сполучників
    (що, щоб) та частки (чи).
  - 'Пунктуаційне оформлення цитування: суворе правило використання українських лапок-ялинок
    («») та двокрапки замість коми.'
  - 'Аналіз дієслів цитування: правильне вживання дієслів «вважати», «стверджувати»
    та усунення помилкового вживання слова «рахувати».'
  - 'Подолання поширених мовних кальок: закріплення правильних конструкцій медіа-регістру
    («вживати заходів», «згідно із законом»).'
- section: 'Медіа-етика: джерела, факти та маркери упередженості'
  words: 800
  points:
  - 'Стандарти роботи з джерелами інформації: правила коректного посилання на «достовірне
    джерело» чи «офіційне повідомлення».'
  - Мовні інструменти розмежування об'єктивних фактів та суб'єктивних суджень у тексті.
  - 'Ідентифікація маркерів упередженості: аналіз вставних слів («ймовірно», «на думку»)
    та емоційно забарвленої лексики.'
  - 'Процедура роботи з дезінформацією: правильні контексти вживання термінів «спростування»
    та «опублікувати офіційне спростування».'
