slug: idioms-nature
title: 'Фразеологізми: Природа (Вода, Вогонь, Земля, Вітер)'
word_target: 4000
content_outline:
  - section: 'Вступ: Чотири стихії в українському світогляді (Introduction: Four elements
      in the Ukrainian worldview)'
    words: 600
    points:
      - 'Standard §4.4.1.2: Introduction to the metaphorical reimagining of nature
        (rains go, sun sets) as a base for idiomatic thinking.'
      - 'Cultural Hook: Elements as spiritual entities; the sacredness of Earth (''Земля-годувальниця'')
        and the cleansing vs destructive power of Water.'
      - 'Myth-buster: Discussing ''Не плюй у криницю'' (Don''t spit in the well) as
        a cultural anchor for respect towards natural elements.'
  - section: 'Вода та вогонь: Випробування та терпіння (Water and Fire: Trials and
      patience)'
    words: 900
    points:
      - 'Analyzing ''Пройти вогонь і воду'' (and ''і мідні труби''): The tactile image
        of complete initiation and life experience.'
      - 'Visual imagery of ''Вода камінь точить'' (Standard §2.2): Practical use of
        idioms to express persistence and long-term effort.'
      - 'Learner error drill: Instrumental case in ''Гратися з вогнем'' vs Accusative
        in ''Підливати масла у вогонь'' to prevent case confusion after nature verbs.'
      - 'Tactile comparison: ''Носити воду решетом'' (carrying water in a sieve) vs
        ''Товкти воду в ступі'' as visual metaphors for futility.'
  - section: 'Земля та вітер: Сором, дух та відповідальність (Earth and Wind: Shame,
      spirit, and responsibility)'
    words: 900
    points:
      - 'Learner error: Distinguishing between Perfective ''провалитися крізь землю''
        (the resultative wish to disappear) and Imperfective ''провалюватися'' (process).'
      - 'Register shift: Introducing ''Як земля носить'' as a high-frequency emotional
        expression for indignation (alternative to the literal ''Земля тримає'').'
      - 'Moral metaphors: ''Вітер у голові'' (character trait) vs ''Кидати слова на
        вітер'' (lack of responsibility in communication).'
      - 'Cultural Hook: Wind as the carrier of spirits; explaining ''Звідки вітер
        віє'' as a tool for identifying the source of hidden trouble or influence.'
  - section: Лінгвістичний аналіз та типові пастки (Linguistic analysis and typical
      traps)
    words: 800
    points:
      - 'Translation trap: Comparison of ''To beat the air'' (Eng) vs ''Носити воду
        решетом'' (Ukr) to highlight specific cultural imagery.'
      - 'Stylistic analysis (Standard §4.4.1.2): Identifying why these idioms fit
        conversational and publicistic styles but are avoided in official-business
        register.'
      - 'Structural variations: Discussing how ''Підливати масла у вогонь'' can vary
        (у багаття) while maintaining its core semantic impact.'
  - section: 'Практика: Карпатський провідник та публіцистика (Practice: Carpathian
      Guide and publicism)'
    words: 800
    points:
      - 'Production task (Persona): Writing a narrative as a ''Carpathian Guide''
        using elements to describe a difficult journey through life.'
      - 'Standard §2.2: Simulating a social or political critique using ''кидати слова
        на вітер'' to demonstrate idiomatic competence in public speaking.'
      - 'Cross-reference: Connecting element-based idioms to M45-46 (Proverbs) to
        see how folk wisdom shapes modern figurative language.'
