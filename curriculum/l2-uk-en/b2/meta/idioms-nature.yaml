slug: idioms-nature
title: 'Фразеологізми: Природа (Вода, Вогонь, Земля, Вітер)'
word_target: 4000
content_outline:
- section: 'Вступ: Чотири стихії в українському світогляді'
  words: 600
  points:
  - Explain elements as spiritual entities in Ukrainian folklore with 2+ examples,
    highlighting 'Земля-годувальниця'.
  - Provide a myth-buster box on 'Не плюй у криницю' to explain the cultural reverence
    for water.
  - Quote Standard §4.4.1.2 on stylistic lexical devices (metaphors like 'ідуть дощі',
    'сонце сідає') as the foundation for B2 idioms.
- section: 'Вода та вогонь: Випробування та терпіння'
  words: 900
  points:
  - Define 'Пройти вогонь і воду' with 3+ examples demonstrating its use in publicistic
    and conversational contexts.
  - Examine the visual imagery of 'Вода камінь точить' with 2+ contextual examples
    of persistence.
  - Create a grammar callout contrasting the Instrumental case in 'гратися з вогнем'
    with the Accusative case in 'підливати масла у вогонь'.
  - Compare 'Носити воду решетом' and 'Товкти воду в ступі' as tactile metaphors for
    futility, providing 2+ examples each.
- section: 'Земля та вітер: Сором, дух та відповідальність'
  words: 900
  points:
  - Add an aspectual rule box contrasting the perfective 'провалитися крізь землю'
    (sudden shame) with the imperfective process 'провалюватися'.
  - Define 'Як земля носить' with 2+ examples showing its use for emotional indignation.
  - Contrast 'Вітер у голові' (state of mind/character trait) vs. 'Кидати слова на
    вітер' (action/irresponsibility) with 3+ examples.
  - Explain 'Звідки вітер віє' with a cultural note on the wind as a carrier of news
    and hidden influences.
- section: Лінгвістичний аналіз та типові пастки
  words: 800
  points:
  - Provide a translation trap callout showing why literal translation of foreign
    idioms fails compared to Ukrainian structural imagery.
  - Analyze register constraints based on Standard §4.4.1.2, explaining why these
    idioms belong to conversational/publicistic but not official-business style.
  - List 2-3 acceptable structural variations for idioms, such as 'підливати масла
    у вогонь/багаття'.
- section: 'Практика: Карпатський провідник та публіцистика'
  words: 800
  points:
  - Draft a 300-word immersive narrative from the perspective of a Carpathian Guide
    using 5+ nature idioms in context.
  - Provide a 200-word sample of political or social critique demonstrating 'кидати
    слова на вітер' in a publicistic setting.
  - Include a bridge paragraph connecting these specific nature idioms to the broader
    folk wisdom covered in M45-46.
