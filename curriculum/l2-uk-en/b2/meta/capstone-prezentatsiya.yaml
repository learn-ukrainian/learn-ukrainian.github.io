slug: capstone-prezentatsiya
title: 'Capstone: Презентація'
word_target: 4000
content_outline:
- section: Риторична спадщина та сучасність
  words: 600
  points:
  - 'Історичний фундамент: Окремий H3 про «Слово про закон і благодать» (1049) як
    перший зразок українського ораторського мистецтва'
  - 'Традиції Києво-Могилянської академії: Окремий H3 про «барокове красномовство»
    та мистецтво переконування XVII-XVIII ст.'
  - 'Сучасний контекст: Окремий H3 про феномен TEDxKyiv як майданчик для новітньої
    української риторики (на прикладах виступів Я. Грицака та М. Хромих)'
- section: Структура та логіка виступу
  words: 800
  points:
  - 'Вимоги до презентацій: Окремий H3 про стандарт виголошення довгих презентацій
    та конференційних виступів (§1.1.2.1.3)'
  - 'Впевнений старт: Окремий H3 про подолання помилки «вибачення на початку» (заміна
    «Я трохи хвилююся» на гачок: факти чи запитання)'
  - 'Логічне структурування: Окремий H3 про тріаду «Вступ — Основна частина — Висновок»
    та її функціональне наповнення'
  - 'Мовні маркери: Окремий H3 про використання вставних слів для структурування тексту
    (§4.4.1.3: по-перше, по-друге, отже, на мою думку)'
- section: Візуалізація та дизайн слайдів
  words: 700
  points:
  - 'Принципи ефективних слайдів: Окремий H3 про мінімізацію тексту та візуалізацію
    як опору, а не сценарій'
  - 'Зоровий контакт: Окремий H3 про корекцію помилки «читання зі слайдів» і відпрацювання
    контакту з аудиторією (не повертатися спиною до залу)'
  - 'Розмежування контенту: Окремий H3 про баланс між тим, що на слайді (графіки,
    тези), і тим, що проговорюється усно (історії, деталі)'
- section: Майстерність публічного виступу
  words: 800
  points:
  - 'Голос і мова тіла: Окремий H3 про роботу з темпом, паузами та жестикуляцією для
    утримання уваги аудиторії'
  - 'Слова-паразити: Окремий H3 про усвідомлену паузу як альтернативу звукам «е-е-е»,
    «ну», «якби» (filler words)'
  - 'Психологічна стійкість: Окремий H3 про управління хвилюванням та перетворення
    стресу на енергію виступу'
- section: Взаємодія та Q&A сесія
  words: 700
  points:
  - 'Стратегії відповідей: Окремий H3 про кліше для відповідей на запитання («Це чудове
    запитання», «Якщо я правильно зрозумів...»)'
  - 'Складна аудиторія: Окремий H3 про нейтралізацію критики та визнання меж компетенції
    без втрати авторитету'
  - 'Завершення виступу: Окремий H3 про сильний фінальний висновок та ефективний заклик
    до дії (call to action)'
- section: Репетиція та фінальний проєкт
  words: 400
  points:
  - 'Peer review сесія: Окремий H3 про надання та отримання конструктивного зворотного
    зв''язку за критеріями оцінювання'
  - 'Контрольний список (checklist): Окремий H3 про технічну перевірку обладнання,
    таймінгу та фінальну репетицію'
