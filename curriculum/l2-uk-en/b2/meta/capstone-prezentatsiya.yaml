slug: capstone-prezentatsiya
title: 'Capstone: Презентація'
word_target: 4000
content_outline:
  - section: Риторична спадщина та сучасність (Rhetorical Heritage and Modernity)
    words: 600
    points:
      - 'Історичний фундамент: аналіз ''Слова про закон і благодать'' (1049) як першого
        зразка українського ораторського мистецтва'
      - 'Традиції Києво-Могилянської академії: вивчення ''барокового красномовства''
        та мистецтва переконування XVII-XVIII ст.'
      - 'Сучасний контекст: феномен TEDxKyiv як майданчик для новітньої української
        риторики (приклади Я. Грицака та М. Хромих)'
  - section: Структура та логіка виступу (Presentation Structure and Logic)
    words: 800
    points:
      - 'Реалізація стандарту §1.1.2.1.3: вимоги до виголошення довгих презентацій
        та виступів на конференціях'
      - 'Впевнений старт: подолання помилки ''вибачення на початку'' — заміна фрази
        ''Я трохи хвилююся'' на гачок (факти чи запитання)'
      - 'Логічне структурування: тріада ''Вступ — Основна частина — Висновок'' та
        її функціональне наповнення'
      - 'Мовні маркери (§4.4.1.3): використання вставних слів для signposting (по-перше,
        по-друге, отже, на мою думку)'
  - section: Візуалізація та дизайн слайдів (Visuals and Slide Design)
    words: 700
    points:
      - 'Принципи ефективних слайдів: мінімізація тексту та використання візуалізації
        як опори, а не сценарію'
      - 'Корекція помилки ''читання зі слайдів'': відпрацювання зорового контакту
        з аудиторією замість повертання спиною до залу'
      - 'Розмежування контенту: що відображається на слайді (графіки, тези) vs. що
        проговорюється усно (історії, деталізація)'
  - section: Майстерність публічного виступу (Public Speaking Mastery)
    words: 800
    points:
      - 'Техніка голосу та мова тіла: робота з темпом, паузами та жестикуляцією для
        утримання уваги аудиторії'
      - 'Боротьба зі словами-паразитами: усвідомлена пауза як альтернатива звукам
        ''е-е-е'', ''ну'', ''якби'' (filler words)'
      - 'Психологічна стійкість: методи управління хвилюванням та перетворення стресу
        на енергію виступу'
  - section: Взаємодія та Q&A сесія (Interaction and Q&A Session)
    words: 700
    points:
      - 'Стратегії відповідей на запитання: кліше ''Це чудове запитання'', ''Якщо
        я правильно зрозумів ваше питання'' для ввічливості'
      - 'Робота зі складною аудиторією: нейтралізація критики та визнання меж своєї
        компетенції без втрати авторитету'
      - 'Завершення виступу: сильний фінальний висновок та заклик до дії (call to
        action)'
  - section: Репетиція та фінальний проєкт (Rehearsal and Final Project)
    words: 400
    points:
      - 'Peer review сесія: надання та отримання конструктивного зворотного зв''язку
        за критеріями оцінювання'
      - 'Контрольний список (checklist): технічна перевірка обладнання, таймінгу та
        фінальна репетиція виступу'
