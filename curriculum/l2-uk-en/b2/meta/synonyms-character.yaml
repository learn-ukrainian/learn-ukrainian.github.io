slug: synonyms-character
title: 'Синоніми: Характер та Особистість'
word_target: 4000
content_outline:
- section: 'Вступ: Психологія та мова'
  words: 600
  points:
  - Визначення понять «вдача» та «натура» як ключових для українського світосприйняття;
    розрізнення «вдача» (характер) та «удача» (везіння).
  - Роль синонімів та епітетів у створенні психологічної глибини персонажа згідно
    зі стандартом B2 (§4.4.1.2).
  - 'Зазначення 100% українськомовного формату модуля: нюанси значень вивчатимуться
    через контекст та літературні приклади.'
- section: 'Інтелект: Від кмітливості до мудрості'
  words: 1000
  points:
  - 'Семантичний розбір синонімів інтелекту: «розумний» (інтелект, логіка), «мудрий»
    (досвід, виваженість), «кмітливий» (практичність, швидкість реакції).'
  - 'Культурний контекст: архетип «кмітливості» в українській традиції та фольклорі.'
  - 'Регістри: використання слова «тямущий» у розмовному стилі (опис учня або новачка)
    та «геніальний» у високому стилі.'
  - 'Аналіз колокацій: «розумне рішення», «мудра порада», «кмітливий хід» з текстовими
    прикладами.'
- section: 'Доброта та емпатія: Відтінки серця'
  words: 1000
  points:
  - 'Спектр доброти: базове «добрий» порівняно з «щедрий» (матеріальна та духовна
    щедрість, напр., «щедрий на похвалу»).'
  - 'Диференціація проявів: «чуйний» (здатність до емпатії, реакція на чуже горе)
    vs «лагідний» (м''якість поведінки, погляду, голосу).'
  - «Милосердя» як високий етичний та книжковий концепт.
  - 'Вправи в тексті на розрізнення сполучуваності: «добра душа», «лагідна вдача»,
    «чуйне серце».'
- section: 'Лабораторія помилок: Чистота мовлення'
  words: 700
  points:
  - 'Деколонізація лексики: чому українською неправильно казати «носити характер»,
    та чим замінити цей росіянізм («мати характер», «бути...»).'
  - Детальний розбір типових помилок при використанні паронімів «вдача» і «удача»
    з наведенням правильних та неправильних речень.
  - 'Стилістичні неточності: обговорення ситуацій, коли вибір синоніма порушує логіку
    (напр., «мудре немовля» замість «кмітливе»).'
- section: 'Практикум: Психологічний портрет'
  words: 700
  points:
  - 'Аналіз двох стилістично різних описів: офіційної характеристики (резюме) з використанням
    «тямущий», «кмітливий» та особистого листа з використанням «чуйний», «лагідний».'
  - 'Ситуативне завдання «Кастинг-директор»: читання опису персонажа та підбір відповідних
    синонімів характеру для акторів.'
  - 'Творче завдання: створення власного психологічного портрета (із наданням Model
    Answer) з використанням щонайменше 10 нових синонімів.'
