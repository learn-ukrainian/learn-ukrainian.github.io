slug: synonyms-communication
title: 'Синоніми: Комунікація та Мовлення'
word_target: 4000
content_outline:
- section: 'Вступ: Вага слова'
  words: 500
  points:
  - 'Представлення теми через призму Перемовника: чому точність у виборі дієслів мовлення
    є критичною для професійної довіри.'
  - 'Культурний контекст: висококонтекстна комунікація в Україні та прислів''я «Слово
    — срібло, а мовчання — золото».'
  - Огляд того, як регістр та інтенсивність слова впливають на сприйняття співрозмовником.
- section: 'Мистецтво вибору: Дієслова «Say»'
  words: 950
  points:
  - 'Спектр говоріння: розмежування нейтральних «казати/говорити», офіційного «повідомляти»
    та формального «заявляти» (відповідно до §4.4.1.2).'
  - 'Типові помилки: плутанина видів дієслова (процес «говорити» проти результату
    «сказати»). Розбір помилки «Я хотів сказати з тобою».'
  - 'Частотність та сталі вирази: практика з парами «казати правду», «повідомляти
    новини», «заявляти про права».'
- section: 'Градація запиту: Дієслова «Ask»'
  words: 950
  points:
  - 'Шкала інтенсивності: від ввічливого «цікавитися» до нейтрального «питати/запитувати»
    та агресивного «допитувати».'
  - 'Етикет звертання: дистанція влади у мові (використання «запитувати» з керівництвом
    та «питати» з колегами).'
  - 'Пастка перекладу: чітке розмежування «питати» (пошук інформації) та «просити»
    (прохання про дію/допомогу).'
- section: 'Граматичний двигун: Пряма та непряма мова'
  words: 850
  points:
  - 'Синтаксичні трансформації: перетворення прямої мови за допомогою сполучників
    «що», «щоб» та частки «чи» (§4.3.5).'
  - 'Практика перемовника: передача слів свідка чи партнера з використанням синонімів
    різного ступеня впевненості («заявив, що» проти «розповідав, що»).'
  - Правила узгодження часів та займенників при переході до непрямої мови.
- section: 'Практика та синтез: Переговори'
  words: 750
  points:
  - 'Наративна симуляція: складні переговори, де студент обирає дієслова залежно від
    зміни регістру (від ввічливого запиту до офіційної заяви).'
  - 'Вправа на невідповідність регістрів: пошук та виправлення неформальних дієслів
    у професійному звіті.'
  - 'Підсумок: стилістичне забарвлення дієслів мовлення та їхній вплив на результат
    комунікації.'
