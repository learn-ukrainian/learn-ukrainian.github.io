slug: news-analysis-basics
title: 'Аналіз новин: Основи'
word_target: 4000
content_outline:
- section: 'Вступ: Влада інформації'
  words: 600
  points:
  - Створити окремий H3 для пояснення ролі новин та концепції agenda-setting (формування
    порядку денного) у сучасному суспільстві.
  - 'Створити окремий H3 для історичного контексту: розповісти про ''Gazette de Leopol''
    (1776) як доказ європейської традиції української преси.'
  - 'Створити окремий H3 для огляду сучасного медіаландшафту (стандарт §3.18): порівняти
    традиційні медіа, соцмережі та Telegram-канали.'
  - Наголосити на медіаграмотності як екзистенційній навичці під час інформаційної
    війни.
- section: 'Імерсивна розповідь: Анатомія новин'
  words: 1000
  points:
  - 'Створити окремий H3 для анатомії новинної статті: розібрати структуру ''перевернутої
    піраміди'' та правило 5W1H з наочними прикладами ліда.'
  - 'Створити окремий H3 про боротьбу за свободу слова: навести історію Георгія Гонгадзе
    та ''Української правди'' як символ розвитку української журналістики.'
  - 'Створити окремий H3 для розрізнення фактів та думок: порівняти нейтральну лексику
    з маркерами суб''єктивності.'
  - 'Створити окремий H3 про упередженість: проаналізувати використання емоційних
    ''ярликів'' замість об''єктивної атрибуції.'
- section: Аналіз та критичне мислення
  words: 1000
  points:
  - 'Створити окремий H3 для типології медіаматеріалів: дати чіткі визначення репортажу,
    аналітики, колонки та журналістського розслідування.'
  - Створити окремий H3 про воєнних кореспондентів (А. Цаплієнко, М. Ткач) та еволюцію
    українського репортажу з 2014 року.
  - 'Створити окремий H3 з правилами медіагігієни: надати покрокову інструкцію з крос-референції
    джерел та розпізнавання діпфейків.'
  - 'Створити окремий H3 про публіцистичний регістр: розібрати баланс між фактажем
    та емоційним впливом на аудиторію.'
- section: Граматика та стилістика
  words: 1000
  points:
  - 'Створити окремий H3 для трансформації цитат (§4.3.5): надати правила переходу
    від прямої до непрямої мови зі сполучниками ''що'', ''щоб'', ''чи'' та таблицею
    прикладів.'
  - 'Створити окремий H3 для подолання типових помилок: показати, як уникати збереження
    займенників 1-ї особи в непрямій мові та як уникати пасивних кальок (''Було повідомлено''
    -> ''Повідомили'').'
  - 'Створити окремий H3 для пунктуації при цитуванні: акцентувати на постановці крапки
    після закритих лапок.'
  - 'Створити окремий H3 для засобів вираження модальності: навести словник маркерів
    достовірності (''ймовірно'', ''за неофіційними даними'') з прикладами їх використання.'
- section: Підсумок та синтез
  words: 400
  points:
  - Узагальнити головні принципи аналізу новинної структури та виявлення прихованої
    упередженості.
  - 'Створити маркований ''Чек-лист фактчекера'' (роль: Фактчекер) для практичної
    перевірки автора, джерел та тону тексту.'
  - Завершити логічним містком до наступного модуля (B2-90), анонсуючи глибший аналіз
    риторичних стратегій.
