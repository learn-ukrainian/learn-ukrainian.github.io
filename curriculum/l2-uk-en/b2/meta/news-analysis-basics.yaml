slug: news-analysis-basics
title: 'Аналіз новин: Основи'
word_target: 4000
content_outline:
  - section: 'Вступ (Introduction: The Power of Information)'
    words: 600
    points:
      - 'Роль новин у сучасному суспільстві: від інформування до формування порядку
        денного (agenda-setting)'
      - 'Історичний контекст (Cultural Hook): Gazette de Leopol (1776) як перше періодичне
        видання у Львові, що засвідчує європейську тяглість українського медіапростору'
      - 'Сучасний ландшафт (State Standard §3.18): Традиційні медіа vs Telegram-канали
        та соціальні мережі як неперевірені джерела'
      - 'Медіаграмотність як екзистенційна навичка: відмінність між якісною журналістикою
        та інфотейнментом в умовах інформаційної війни'
  - section: 'Імерсивна розповідь (Immersive Narrative: The Anatomy of News)'
    words: 1000
    points:
      - 'Анатомія статті: структура ''перевернутої піраміди'', правило 5W1H (хто,
        що, де, коли, чому, як) та роль ліда (першого абзацу)'
      - 'Символ свободи слова (Cultural Hook): Історія Георгія Гонгадзе та заснування
        ''Української правди'' як поворотний момент у боротьбі за чесну журналістику'
      - 'Факт проти думки: маркери суб''єктивності (''на мою думку'', ''ймовірно'')
        та нейтральна лексика фактчекінгу'
      - 'Упередженість та забарвлена мова: аналіз емоційних маніпуляцій та використання
        ''ярликів'' замість об''єктивної атрибуції'
  - section: Аналіз та критичне мислення (Analysis and Critical Thinking)
    words: 1000
    points:
      - 'Типологія матеріалів: репортаж (факти), аналітика (контекст), колонка (позиція)
        та журналістське розслідування'
      - 'Стандарти в екстремальних умовах (Cultural Hook): Робота воєнних кореспондентів
        (А. Цаплієнко, М. Ткач) та еволюція українського репортажу з 2014 року'
      - 'Практика медіагігієни: крос-референція джерел, розпізнавання діпфейків та
        перевірка фінансування медіаструктур'
      - 'Публіцистичний регістр: баланс між інформативністю та впливом на аудиторію,
        використання специфічної термінології'
  - section: Граматика та стилістика (Grammar and Stylistics)
    words: 1000
    points:
      - 'Трансформація цитат (State Standard §4.3.5): Правила переходу від прямої
        до непрямої мови за допомогою сполучників ''що'', ''щоб'' та частки ''чи'''
      - 'Подолання помилок (Learner Error 1): Усунення збереження займенників 1-ї
        особи в непрямій мові (заміна ''Я'' на ''Він/Вона'')'
      - 'Пунктуаційна точність (Learner Error 2): Правильне оформлення лапок та крапки
        (крапка ставиться ПІСЛЯ закритих лапок)'
      - 'Уникнення кальок (Learner Error 3): Заміна пасивних конструкцій (''Було повідомлено'')
        активними формами (''Повідомили'', ''ЗМІ повідомляють'')'
      - 'Модальність та ймовірність: Використання слів ''ймовірно'', ''за неофіційними
        даними'', ''джерела припускають'' для маркування ступеня достовірності'
  - section: Підсумок та синтез (Summary and Synthesis)
    words: 400
    points:
      - 'Синтез навичок: від розуміння структури до виявлення прихованої упередженості'
      - 'Чек-лист фактчекера (Persona: Fact-Checker): Перевірка автора, джерел, дати
        та емоційного забарвлення тексту'
      - 'Підготовка до наступного етапу (Connects to B2-90): Перехід до аналізу риторичних
        стратегій та методів маніпуляції'
