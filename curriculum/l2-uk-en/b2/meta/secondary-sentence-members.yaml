slug: secondary-sentence-members
title: Другорядні члени речення
word_target: 4000
content_outline:
- section: 'Вступ: Другорядні члени та їхня роль у реченні'
  words: 500
  points:
  - Diagnostic test (Діагностика) to evaluate the learner's existing intuition on
    identifying sentence components.
  - 'H3: Definition and Function. Explain secondary members (додаток, означення, обставина)
    focusing on their role to clarify, expand, and supplement the main members.'
  - 'H3: Syntactic Links. Connect back to ''керування, узгодження, прилягання'' as
    the grammatical mechanisms that attach secondary members to the core sentence.'
- section: 'Додаток: прямий і непрямий'
  words: 900
  points:
  - 'H3: Прямий додаток (Direct Object). Define and provide 3+ examples (Accusative
    without a preposition). Detail the Genitive of negation rule with clear contrasts.'
  - 'H3: Непрямий додаток (Indirect Object). Show objects expressed in Genitive, Dative,
    Instrumental, and Locative cases.'
  - 'H3: Автентичне керування. Highlight uniquely Ukrainian government (дякувати кому,
    хворіти на, насміхатися з, зраджувати кого) with a dedicated table. Frame positively
    as authentic syntax.'
  - 'H3: Інфінітив як додаток. Contrast infinitives functioning as objects (e.g.,
    ''навчив плавати'') with compound verbal predicates.'
- section: Означення та прикладка
  words: 900
  points:
  - 'H3: Узгоджене означення (Agreed Attribute). Explain adjectives, pronouns, and
    participles that agree in gender, number, and case with the head word.'
  - 'H3: Неузгоджене означення (Non-Agreed Attribute). Explain nouns with prepositions,
    adverbs, and infinitives functioning as attributes (e.g., ''кава по-віденськи'',
    ''бажання жити'').'
  - 'H3: Прикладка (Apposition). Define as a noun-attribute that gives a second name
    to an object.'
  - 'H3: Правопис прикладок. Explain hyphenation rules with a decision tree or clear
    bulleted list (e.g., ''місто Київ'' vs ''Київ-місто'', ''лікар-хірург'').'
- section: 'Обставини: вісім типів'
  words: 1000
  points:
  - 'H3: Роль обставин. Introduce adverbials and their function in providing the context
    of an action.'
  - 'H3: Базові типи: Місце, Час, Спосіб дії. Provide rich, culturally grounded examples
    for adverbials of place, time, and manner.'
  - 'H3: Розширені типи: Причина, Мета, Умова. Use sophisticated B2 vocabulary to
    demonstrate cause, purpose, and condition adverbials.'
  - 'H3: Типи: Допуст, Міра і ступінь. Explain concession (допуст) and degree, using
    examples from formal and literary registers.'
- section: Комплексний аналіз та практика
  words: 600
  points:
  - 'H3: Алгоритм аналізу. Provide a step-by-step guide from finding the subject/predicate
    to identifying the exact questions for secondary members.'
  - 'H3: Проблемні випадки. Teach how to resolve syntactic ambiguities using context
    (e.g., distinguishing an object from a non-agreed attribute: ''зошит брата'' vs
    ''зустріч брата'').'
  - 'H3: Стилістика. Briefly discuss how the choice and density of secondary members
    impact sentence tone (scientific precision vs. artistic descriptiveness).'
  - 'H3: Підсумок. Summary checklist and conceptual bridge to the upcoming module
    on one-member sentences.'
