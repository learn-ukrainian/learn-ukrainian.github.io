slug: reflexive-passive
title: Зворотний пасив із -ся
word_target: 4000
content_outline:
- section: 'Вступ: Поняття зворотності та пасиву'
  words: 600
  points:
  - 'Аналіз вимог §4.1.3.1 Державного стандарту: функціонування дієслів недоконаного
    виду із часткою -ся як морфологічної бази пасивних конструкцій.'
  - Роль частки -ся як граматичного маркера пасивного стану, що перетворює логічний
    об'єкт на граматичний підмет.
  - 'Стилістичні межі: чітке позиціювання цієї конструкції як атрибута наукового,
    офіційно-ділового та публіцистичного стилів.'
- section: Морфологія та правила утворення
  words: 800
  points:
  - 'Орфографічні та фонетичні закономірності: чергування часток -ся (після приголосних)
    та -сь (після голосних).'
  - 'Видові обмеження: жорстка вимога використовувати виключно недоконаний вид для
    передачі тривалості дії.'
  - 'Алгоритм синтаксичної трансформації: переведення активного речення в пасивне
    зі зміною прямого додатка (знахідний відмінок) на підмет (називний відмінок).'
- section: Семантика процесу та роль Агента
  words: 900
  points:
  - 'Семантичне зіставлення: тривалий процес (дієслова на -ся) проти завершеного результату
    (форми на -но/-то).'
  - 'Правила вираження агента дії: обов''язкове використання орудного відмінка (Instrumental
    Case) без прийменників.'
  - 'Еліптування агента: аналіз контекстів технічної та офіційної документації, де
    виконавець дії свідомо опускається.'
- section: 'Культура: Українські винаходи крізь призму пасиву'
  words: 1000
  points:
  - 'Науковий дискурс: опис пріоритету Івана Пулюя в дослідженні X-променів («промені
    досліджуються видатним фізиком»).'
  - 'Інформаційні технології: Катерина Ющенко та перша мова програмування («адресна
    мова розробляється українською математикинею»).'
  - 'Авіабудування: Ігор Сікорський і розробка гелікоптерів («техніка конструюється
    київським винахідником»).'
  - Огляд типової технічної термінології в пасиві («застосовується», «встановлюється»,
    «тестується»).
- section: Стилістика та запобігання помилкам
  words: 700
  points:
  - 'Корекція типової помилки англомовних студентів: заміна помилкових конструкцій
    з прийменником «від» на чистий орудний відмінок.'
  - 'Протидія зловживанню пасивом (Passive Overuse): стилістичні причини, чому в розмовній
    мові слід надавати перевагу активному стану.'
  - 'Пояснення граматичної несумісності: чому конструкція «дім збудується» (доконаний
    вид + ся) змінює значення і не є класичним пасивом.'
  - 'Підсумковий місток до наступного матеріалу: перехід до альтернативних пасивних
    конструкцій третьої особи множини (модуль 05).'
