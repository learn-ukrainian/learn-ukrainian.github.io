slug: capstone-research
title: 'Підсумковий проєкт: Дослідження'
word_target: 4000
content_outline:
- section: Огляд — Capstone проєкт
  words: 400
  points:
  - 'Визначення мети підсумкового проєкту: демонстрація мовної компетентності рівня
    B2 через дослідження.'
  - 'Структура проєкту: від вибору теми до фінальної презентації (M82).'
  - 'Критерії успіху: глибина аналізу, якість мови, структура, академічна доброчесність.'
  - 'Роль дослідника: перехід від пасивного вивчення мови до активного створення нового
    знання.'
- section: Вибір теми дослідження
  words: 600
  points:
  - 'Стратегії пошуку теми: ''три кола'' (інтерес, актуальність, ресурси).'
  - 'Формулювання дослідницького питання (Research Question): як перетворити цікавість
    на наукову проблему.'
  - 'Звуження теми: від ''Історія України'' до ''Вплив шістдесятників на сучасну літературу''.'
  - 'Обґрунтування вибору: чому це важливо саме зараз? (Використання кліше: ''Актуальність
    теми полягає в...'').'
- section: Пошук та оцінка джерел
  words: 800
  points:
  - 'Типологія джерел: первинні (документи, інтерв''ю) та вторинні (статті, монографії).'
  - 'Навігація в українському інформаційному просторі: бібліотеки (NBUV), репозитарії,
    е-ресурси.'
  - 'Критична оцінка джерел: метод CRAAP (Currency, Relevance, Authority, Accuracy,
    Purpose) в українському контексті.'
  - 'Етика цитування та академічна доброчесність: як уникнути плагіату, оформлення
    покликань.'
- section: Складання плану-проспекту
  words: 700
  points:
  - 'Структура наукової роботи: Вступ, Основна частина (розділи), Висновки.'
  - 'Написання тезової заяви (Thesis Statement): ''хребет'' вашого дослідження.'
  - 'Логіка викладу: хронологічна, тематична або проблемна структури.'
  - 'Створення робочого плану: тайм-менеджмент дослідника.'
- section: Написання чернетки
  words: 900
  points:
  - 'Від плану до тексту: техніки розгортання думок (elaborating).'
  - 'Інтеграція чужих думок: мистецтво парафразу та введення цитат (''Як зазначає...'',
    ''На думку...'').'
  - 'Мовні засоби зв''язку (Cohesion): перехідні слова для логічності викладу (по-перше,
    з іншого боку, отже).'
  - 'Баланс голосів: як не загубити власну думку серед цитат.'
- section: Підсумок та завдання
  words: 600
  points:
  - Чек-ліст готовності до наступного етапу (презентації).
  - 'Саморефлексія: що було найскладнішим у процесі дослідження?'
  - 'Практичне завдання: оформлення та подання плану-проспекту (Research Proposal).'
  - 'Анонс наступного кроку: підготовка усного захисту (публічного виступу).'
