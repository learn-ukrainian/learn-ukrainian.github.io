slug: capstone-research
title: 'Підсумковий проєкт: Дослідження'
word_target: 4000
content_outline:
- section: 'Вступ: Огляд Capstone проєкту'
  words: 387
  points:
  - 'Розкрити мету підсумкового проєкту: застосування граматичних та синтаксичних
    навичок B2 для створення власного академічного тексту.'
  - 'Навести культурний контекст: Мала академія наук України (МАН) як інституція,
    що заохочує науковий пошук молоді.'
  - 'Окреслити формат роботи (від дослідження до презентації) та критерії оцінювання:
    логіка, використання пасивного стану, академічний словник.'
- section: Вибір теми та науковий підхід
  words: 517
  points:
  - 'Сформулювати критерії вдалої теми: висока актуальність, практична цінність, наявність
    доступних україномовних джерел.'
  - 'Надихнути прикладом Володимира Вернадського: застосування системного мислення
    в науковому методі.'
  - 'Надати покрокову інструкцію: як звузити широку область до конкретного дослідницького
    питання та ключової тези.'
  - Продемонструвати академічні кліше для обґрунтування вибору (наприклад, «Актуальність
    обраної теми полягає в...»).
- section: Робота з джерелами та академічна доброчесність
  words: 449
  points:
  - 'Розрізнити типи джерел: першоджерела, рецензовані наукові публікації, довідкові
    матеріали.'
  - 'Наголосити на важливості академічної доброчесності в Україні: пояснити, як і
    чому слід уникати плагіату.'
  - 'Пояснити техніку цитування: обов''язкове використання українських кутових лапок
    (« ») та правила оформлення покликань.'
  - 'Розглянути мистецтво парафразу: перетворення прямої мови на непряму для збереження
    авторського голосу.'
- section: Планування та структура плану-проспекту
  words: 437
  points:
  - 'Розібрати архітектуру наукового тексту: логічний зв''язок між вступом, основною
    аргументацією та висновками.'
  - Показати використання вставних слів (по-перше, отже, таким чином) для структурування
    аргументів.
  - Проілюструвати використання безособових конструкцій («Вважається», «Варто зазначити»)
    для підтримки об'єктивного тону.
  - Описати алгоритм розподілу зібраного матеріалу та складання графіка роботи над
    текстом.
- section: Написання чернетки та подолання мовних помилок
  words: 682
  points:
  - 'Розібрати хибні друзі перекладача: чітке розрізнення термінів «дослід» (experiment)
    та «дослідження» (study).'
  - 'Пояснити, як уникати кальок з англійської: заміна «Я вірю» на більш прийнятні
    «На нашу думку» чи «Як показують результати».'
  - 'Сфокусувати увагу на граматиці B2: використання дієприкметників, дієприслівникових
    зворотів та складних підрядних речень.'
  - 'Надати поради щодо редагування: як зберегти баланс між запозиченими фактами та
    власною аналітикою.'
- section: Підсумок та підготовка до презентації
  words: 242
  points:
  - 'Сформувати контрольний список (чек-ліст) готовності: перевірка тези, джерел,
    структури та мовного стилю.'
  - 'Окреслити практичне завдання: завершення плану-проспекту та його подання для
    отримання зворотного зв''язку.'
  - 'Зробити анонс наступного кроку (модуль М82): як перетворити текст на ефективну
    візуальну презентацію.'
focus: capstone
