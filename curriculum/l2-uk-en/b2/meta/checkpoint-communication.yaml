slug: checkpoint-communication
title: 'Контрольна точка: комунікативні навички'
word_target: 4000
content_outline:
- section: Огляд професійного письма
  words: 1000
  points:
  - 'H3: Ділове листування: структура та етикет (аналіз зразка складного листа-відповіді
    на скаргу).'
  - 'H3: Редагування тексту: вправа на виявлення та усунення лексико-граматичних і
    стилістичних помилок у діловому листі.'
  - 'H3: Науковий стиль і безособові конструкції: трансформація активних речень у
    безособові для професійного звіту.'
  - 'H3: Критерії самооцінювання: чекліст для перевірки власного ділового тексту на
    відповідність B2.'
- section: Завдання з аналізу медіатекстів
  words: 1000
  points:
  - 'H3: Виявлення упередженості: читання новинного фрагмента та маркування суб''єктивних
    прикметників і лексики.'
  - 'H3: Риторичні прийоми та маніпуляції: розбір клікбейту, емоційного забарвлення
    та вирваних з контексту цитат.'
  - 'H3: Порівняльний аналіз: зіставлення двох коротких публікацій на одну тему з
    різних джерел.'
  - 'H3: Аналітична записка: структура стислого узагальнення фактів та відділення
    їх від авторських суджень.'
- section: Оцінювання презентації та дебатів
  words: 1000
  points:
  - 'H3: Логічна побудова виступу: теза, наведення аргументів (не ''робити'', а ''наводити''),
    висновок.'
  - 'H3: Дискурсивні маркери: правильне використання ''по-перше'', ''з іншого боку'',
    ''отже'' для структурування мовлення.'
  - 'H3: Етикет незгоди: моделювання фраз для ввічливого заперечення (''Слушна думка,
    проте...'', ''Дозвольте не погодитися'').'
  - 'H3: Прагматична компетенція: аналіз міні-діалогів на доречність мовленнєвих актів
    (відмова, пропозиція, вибачення).'
- section: Комплексне комунікативне портфоліо
  words: 1000
  points:
  - 'H3: Інтегрований комунікативний сценарій: розбір кейсу (прочитати звіт → підготувати
    тези → провести обговорення).'
  - 'H3: Регістрова гнучкість: трансформація повідомлення від офіційного електронного
    листа до розмови з колегою.'
  - 'H3: Глобальна рефлексія: аналіз типових помилок та власного прогресу за комунікативний
    блок (модулі 69-75).'
  - 'H3: План розвитку: рекомендації щодо розширення словникового запасу та покращення
    стилістичної вправності.'
