slug: b21c-checkpoint
title: 'Контрольна точка B2.1c: Числівники, словотвір та синтаксис'
word_target: 4000
content_outline:
- section: 'Вступ та огляд: Контрольна точка B2.1c'
  words: 400
  points:
  - 'Set the context: This is a 100% immersion checkpoint evaluating M31-M39 (numerals,
    word formation, one-member sentences).'
  - 'Introduce the thematic anchor: Mykhailo Kravchuk, the brilliant mathematician
    who fought for and standardized Ukrainian scientific terminology.'
  - 'Outline the checkpoint structure: diagnostics, analysis of Kravchuk''s legacy,
    and practical synthesis.'
- section: 'Skill 1: Числівники та математична спадщина'
  words: 1000
  points:
  - Provide a narrative text about Kravchuk's life (1892–1942) heavily utilizing complex
    numerals (dates, quantities, volumes of work).
  - Review and test declension rules for 50-80, explicitly contrasting the correct
    Ukrainian form (п'ятдесяти) with common errors.
  - Demonstrate and test correct time-telling structures (о сьомій годині, за десять
    восьма) in the context of Kravchuk's university lectures.
  - Include a table or summary of ordinal numeral declension used for historical dates.
- section: 'Skill 2: Словотвір та наукова термінологія'
  words: 900
  points:
  - Analyze how Kravchuk built mathematical terms using Ukrainian suffixes, emphasizing
    independent development, not borrowing.
  - 'Review deverbal nouns (-нн-, -енн-, -інн-): обчислення, доведення, дослідження.'
  - 'Review adjective formation for terminology: матричний, термінологічний.'
  - Provide practice sentences requiring learners to transform verbs into abstract
    scientific nouns.
- section: 'Skill 3: Синтаксис односкладних речень'
  words: 900
  points:
  - Explain the stylistic necessity of one-member sentences in the scientific and
    biographical registers.
  - Contrast generalized-personal (означено/неозначено-особові) sentences for academic
    facts with impersonal (безособові) sentences for historical events (e.g., словник
    було видано).
  - Use nominative sentences to describe the atmosphere of the 1920s scientific renaissance.
  - Include a task where learners rewrite standard SVO sentences into appropriate
    one-member scientific statements.
- section: 'Skill 4: Практикум: Аналіз помилок та регістрів'
  words: 800
  points:
  - 'Conduct a rigorous error analysis workshop: test noun-numeral agreement (''2,
    3, 4'' vs ''5+'').'
  - 'Provide a register transformation task: rewrite an informal letter about Kravchuk
    into a formal academic encyclopedia entry.'
  - Summarize learner readiness, congratulate them on mastering the B2.1 phase, and
    introduce the upcoming focus on B2.2 Phraseology.
