slug: checkpoint-syntax
title: 'Контрольна точка: синтаксис'
word_target: 4000
content_outline:
- section: Діагностичний огляд синтаксичної системи
  words: 800
  points:
  - 'Вступне оцінювання знань із синтаксису (модулі b2-11 — b2-23): від базових словосполучень
    до прямої та непрямої мови.'
  - 'Окремі підрозділи (H3) для контрастного аналізу ключових понять: словосполучення,
    типи присудків, відокремлені конструкції, вставні слова.'
  - 'Самодіагностика за методикою TTT (Test-Teach-Test): виявлення типових пунктуаційних
    прогалин.'
  - Явне зіставлення критеріїв успішності з Державним стандартом 2024 (§4.3.2 – §4.3.5).
- section: Завдання на аналіз речень
  words: 1000
  points:
  - 'Підрозділ (H3) про комплексний синтаксичний розбір: ідентифікація головних та
    другорядних членів у сучасних автентичних текстах.'
  - Керована практика з розпізнавання відокремлених означень, обставин та прикладок.
  - 'Структурна класифікація: чіткий алгоритм розрізнення простих, складносурядних,
    складнопідрядних та безсполучникових речень.'
  - Аналіз засобів зв'язку (сполучники, сполучні слова) та їхнього впливу на ритміку
    складної синтаксичної структури.
- section: Трансформаційні вправи
  words: 1200
  points:
  - 'Підрозділ (H3) з перетворення прямої мови на непряму: повний цикл граматичних
    змін (займенники, дієслівні форми, сполучники).'
  - 'Трансформація типів присудків: перехід від простого до складеного дієслівного/іменного
    для зміни стилістичного ефекту.'
  - 'Синтаксичні маніпуляції: включення та виключення дієприкметникових і дієприслівникових
    зворотів для ущільнення тексту.'
  - 'Стилістична трансформація: переведення тексту з розмовного регістру в науковий
    із використанням складних синтаксичних конструкцій.'
- section: Комплексне оцінювання
  words: 1000
  points:
  - 'Формат пунктуаційного диктанту: інтегрований текст, що вимагає застосування всіх
    вивчених правил коми (однорідні члени, вставні слова, пряма мова).'
  - 'Клініка редагування: виправлення синтаксичних та пунктуаційних помилок (наприклад,
    неправильно побудованих дієприслівникових зворотів) в автентичному тексті.'
  - 'Продуктивне завдання: написання структурованого аналітичного есе з обов''язковим
    використанням різноманітних синтаксичних структур.'
  - 'Рефлексія: підведення підсумків оцінювання та побудова містка до наступної фази
    B2.3 (Register & Communication).'
