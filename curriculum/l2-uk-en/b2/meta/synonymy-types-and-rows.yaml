slug: synonymy-types-and-rows
title: 'Синонімія: типи та синонімічні ряди'
word_target: 4000
content_outline:
- section: Вступ — що таке синонімія? (Introduction — What Is Synonymy?)
  words: 600
  points:
  - Provide a clear H3 definition of synonymy as a core lexical phenomenon that enriches
    speech, referencing State Standard §4.4.1.2.
  - Create distinct H3s to contrast synonyms against paronyms and antonyms, explicitly
    highlighting the common learner error of confusing them (e.g., 'адрес' vs 'адреса').
  - 'Establish the B2 motivation: precise synonym selection is the foundation for
    mastering functional styles, elevating both oral fluency and academic writing.'
- section: Абсолютні та семантичні синоніми (Absolute and Semantic Synonyms)
  words: 800
  points:
  - Dedicate an H3 to absolute synonyms (мовознавство — лінгвістика), explaining their
    rarity and origin (often native terms paired with borrowed equivalents).
  - Dedicate an H3 to semantic (ideographic) synonyms, illustrating how they grade
    intensity and meaning (e.g., сміливий — відважний — безстрашний).
  - Walk through a practical 'semantic component analysis' to help learners identify
    the core meaning and differing nuances between closely related verbs (іти — крокувати
    — мчати).
  - Include a warning block against using absolute synonyms interchangeably without
    checking the stylistic context of the sentence.
- section: Контекстуальні синоніми (Contextual Synonyms)
  words: 800
  points:
  - 'Define contextual synonyms in an H3: words that only become synonymous within
    a specific phrase (e.g., ''золотий'' acting as ''чудовий'' in ''золотий характер'').'
  - Explain the mechanisms of metaphorization and semantic shift that create these
    synonyms, providing authentic literary examples.
  - Showcase authorial synonyms using excerpts from classic Ukrainian writers (like
    Kotsiubynsky or Stefanyk) to illustrate the creative, independent power of the
    language.
  - Provide an analytical breakdown of why standard dictionaries cannot list all contextual
    synonyms, requiring active learner reading skills and contextual deduction.
- section: Стилістичні синоніми та регістр (Stylistic Synonyms and Register)
  words: 800
  points:
  - Break down stylistic synonyms in an H3, demonstrating how the core meaning stays
    the same while the register changes (обличчя — лице — пика).
  - Analyze the difference between neutral and marked synonyms (bookish, conversational,
    official), and teach how to read dictionary register tags.
  - Discuss emotionally evaluative synonyms (positive vs. negative connotation, e.g.,
    економний vs. скупий) and their psychological impact on text perception.
  - Explicitly bridge this knowledge to functional styles, preparing the learner for
    the upcoming B2-55 module on registers.
- section: Синонімічні ряди та домінанта (Synonymic Rows and Dominant Word)
  words: 1000
  points:
  - Define the 'synonymic row' structure in an H3, explaining the spectrum from the
    core to the periphery.
  - Dedicate an H3 to the 'dominant word' (домінанта) — the stylistically neutral
    anchor of the row (e.g., 'говорити').
  - Include a cultural hook H3 about the richness of Ukrainian rows, mentioning the
    record 45 synonyms for 'бити' and the 17,000+ rows in the national dictionary.
  - Provide a step-by-step guide on how to systematically build and rank synonymic
    rows by intensity and style, encouraging active dictionary usage.
  - 'Conclude with an actionable synthesis task: how learners can audit their own
    writing to eliminate repetitive words and elevate stylistic variety.'
