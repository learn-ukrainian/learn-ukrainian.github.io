slug: checkpoint-lexicology
title: 'Контрольна точка: лексикологія'
word_target: 4000
content_outline:
- section: Вступ та організація
  words: 400
  points:
  - 'Огляд мети контрольної точки: перевірка лексичної точності (синоніміка, фразеологія,
    пароніми) та навичок конструювання складного синтаксису.'
  - 'Пояснення формату роботи: аналіз науково-популярних і публіцистичних текстів,
    виявлення лексичних помилок, побудова аргументованих відповідей.'
  - Встановлення академічного регістру та налаштування на повністю українськомовний
    простір (100% занурення).
- section: Лексична точність та стилістика
  words: 900
  points:
  - 'Аналіз типових лексичних помилок і кальок: відпрацювання правильної сполучуваності
    (брати участь, відігравати роль, мати значення, відчиняти двері).'
  - 'Тестування розрізнення паронімів у професійних контекстах: ефектний vs ефективний,
    громадський vs громадянський.'
  - 'Робота з синонімічними рядами: вибір між стилістично нейтральною та експресивною
    лексикою залежно від комунікативної мети.'
- section: 'Наука та медицина: кейс Івана Пулюя'
  words: 1200
  points:
  - Опрацювання насиченого тексту про діяльність Івана Пулюя, інтеграція наукової
    та медичної термінології (гіпотеза, експеримент, метод, діагноз, симптом).
  - 'Деколонізаційний аспект: обговорення внеску українського вченого у світову науку
    та культуру (від ламп Пулюя до перекладу Біблії), відновлення історичної справедливості.'
  - 'Практика складного синтаксису: аналіз та побудова складнопідрядних речень з обставинними
    і з''ясувальними сполучниками (оскільки, завдяки тому що, незважаючи на те що)
    в науковому стилі.'
- section: 'Суспільство та культура: Українська діаспора'
  words: 1000
  points:
  - Аналіз тексту про феномен української діаспори, активне використання абстрактних
    понять гуманітарного спектра (ідентичність, процес, розвиток, поняття).
  - Конструювання складнопідрядних речень різних типів для опису тривалих соціокультурних
    та історичних процесів.
  - Застосування лексики на позначення громадської активності, збереження спадщини
    та культурного синтезу.
- section: Підсумок та рефлексія
  words: 500
  points:
  - 'Інтерпретація результатів самоперевірки: виявлення зон для покращення лексичної
    грамотності та синтаксичної гнучкості.'
  - Систематизація знань щодо уникнення впливу російської мови на українське мовлення
    (боротьба з кальками).
  - 'Окреслення подальшого шляху в курсі B2: перехід до поглибленої професійної комунікації
    та створення спеціалізованих текстів.'
