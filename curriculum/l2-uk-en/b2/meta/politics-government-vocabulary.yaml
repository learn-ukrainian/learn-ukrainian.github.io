slug: politics-government-vocabulary
title: Політика та державне управління
word_target: 4000
content_outline:
- section: 'Вступ: Політична система та історичне коріння'
  words: 700
  points:
  - Представити Україну як парламентсько-президентську республіку, пояснити концепцію
    розподілу влади (законодавча, виконавча, судова) згідно з Державним стандартом
    §3.7.
  - 'Інтегрувати культурно-історичний гачок: Конституція Пилипа Орлика (1710) як доказ
    давньої української демократичної традиції та обмеження абсолютної влади.'
  - Окреслити важливість громадянського суспільства та політичної грамотності для
    сучасного українця.
- section: Державні інституції та органи влади
  words: 900
  points:
  - 'Верховна Рада: пояснити роль єдиного законодавчого органу, статус народного депутата
    та поняття ''депутатська недоторканність''.'
  - 'Кабінет Міністрів: описати структуру виконавчої влади, роботу міністерств та
    реалізацію державної політики.'
  - 'Президент України: визначити повноваження глави держави, право вето та механізм
    видання указів.'
  - 'Децентралізація: детально розібрати реформу місцевого самоврядування та роль
    об''єднаних територіальних громад (ОТГ).'
- section: Виборчий процес та демократичні механізми
  words: 800
  points:
  - 'Описати життєвий цикл виборів (президентські, парламентські, місцеві): від реєстрації
    кандидатів до підрахунку голосів.'
  - 'Пояснити функціонування репрезентативної демократії: правляча коаліція проти
    парламентської опозиції.'
  - 'Розглянути інструменти прямої демократії: референдум та плебісцит.'
  - 'Ввести лексичне розрізнення: ''обирати'' (на посаду) проти ''вибирати'' (предмет).'
- section: Лексичні тонкощі та типові помилки
  words: 800
  points:
  - 'Детальний розбір помилки: ''громадський'' (належить громаді/суспільству: транспорт,
    думка) проти ''громадянський'' (стосується статусу громадянина: суспільство, права).'
  - 'Слововживання терміна ''політика'': розрізнення боротьби за владу (politics)
    та стратегії дій (policy, як-от ''внутрішня політика'').'
  - 'Пояснити стійкі словосполучення: ''крихка демократія'', ''розбудова демократії'',
    ''верховенство закону''.'
  - Описати етапи законотворчого процесу (законопроєкт, читання, ухвалення закону).
- section: 'Практика: Медіа та політичний дискурс'
  words: 800
  points:
  - 'Аналіз тексту (Держстандарт §3.18): порівняти уривок офіційно-ділового документа
    та емоційного публіцистичного репортажу.'
  - Надати інструкції щодо складання офіційного звернення до народного депутата чи
    голови територіальної громади.
  - Сформулювати дискусійні питання для висловлення власної позиції щодо політичних
    подій, використовуючи модальні конструкції B2.
