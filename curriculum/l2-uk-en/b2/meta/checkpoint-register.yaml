slug: checkpoint-register
title: 'Контрольна точка: регістри'
word_target: 4000
content_outline:
- section: Вступ та огляд
  words: 400
  points:
  - 'Знайомство від імені Професійного мовного коуча: метафора вибору мовного стилю
    як підбору ''відповідного костюма для події''.'
  - 'Представлення семи стилів за Державним стандартом (§4.4.1.1) із фокусом на три
    ключові для цього аудиту: офіційно-діловий, науковий та публіцистичний.'
  - Пояснення важливості володіння регістрами для досягнення впевненого рівня B2 та
    вільного перемикання кодів спілкування.
- section: 'Офіційно-діловий стиль: Від «Руської Правди» до сьогодні'
  words: 800
  points:
  - 'Історичний контекст: згадка «Руської Правди» як доказу давньої традиції українського
    державотворення та юридичної термінології.'
  - 'Аналіз лексичних та синтаксичних маркерів: висока стандартизація, кліше (''чинне
    законодавство''), чітке керування (''відповідно до'' + Родовий відм.).'
  - 'Розбір і виправлення типових помилок-суржиків: ''вживати заходів'' (не ''приймати
    міри''), ''згідно з інструкцією'' (не ''згідно інструкції'').'
- section: 'Публіцистичний стиль: Сила переконання'
  words: 800
  points:
  - 'Історичний гачок: полемічна література XVI–XVII ст. (на прикладі Івана Вишенського)
    як зародження української публіцистики та зброя в інформаційній боротьбі.'
  - 'Особливості медіатексту: використання емоційно-забарвленої лексики (''консолідація
    суспільства'', ''прозорість влади''), метафоричність.'
  - 'Аналіз впливу на аудиторію: використання риторичних питань та засобів залучення
    уваги у сучасному суспільному дискурсі.'
- section: 'Науковий стиль: Об''єктивність та аналіз'
  words: 800
  points:
  - 'Ключові характеристики: стовідсоткова об''єктивність, термінологічна точність,
    логічна послідовність (''на підставі отриманих даних''), суха подача фактів.'
  - 'Синтаксичні особливості: часте використання безособових конструкцій та пасивного
    стану для акценту на самому процесі чи результаті, а не на досліднику.'
  - 'Коротка практика: розпізнавання та усунення стилістичного дисонансу або емоційності
    в уривках наукових текстів.'
- section: 'Синтез та трансформація: Практичний аудит'
  words: 800
  points:
  - 'Вправа на трансформацію: передача одного базового факту (наприклад, про дощ)
    у трьох різних регістрах: офіційному (''атмосферні опади''), публіцистичному та
    науковому.'
  - 'Робота з плеоназмами: виявлення та редагування стилістичної надлишковості (''вільна
    вакансія'', ''пам''ятний сувенір'').'
  - 'Ситуативний аналіз: моделювання життєвих ситуацій, де вимагається швидке та доречне
    перемикання стилістичних регістрів.'
- section: Підсумок та результати
  words: 400
  points:
  - 'Підбиття підсумків стилістичного аудиту: оцінка чутливості студента до мовних
    нюансів.'
  - Рекомендації для самостійного поглиблення знань (використання ресурсу litopys.org.ua)
    та підготовка до наступного комунікаційного блоку (М85-93).
  - Короткий чек-лист самоконтролю для уникнення типових стилістичних помилок на рівні
    B2.
