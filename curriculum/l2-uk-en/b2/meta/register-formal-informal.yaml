slug: register-formal-informal
title: Формальне та неформальне спілкування
word_target: 4000
content_outline:
- section: Вступ — Формальність у спілкуванні
  words: 500
  points:
  - 'Визначення соціолінгвістичної компетенції на рівні B2: як аналізувати контекст,
    статус та вік співрозмовника для вибору стилю.'
  - 'Історичний і культурний контекст: ренесанс форми «пан/пані» як відновлення української
    ідентичності та гідності вільної людини (на противагу радянському «товариш»).'
  - 'Огляд Державного стандарту (§4.4.1.3): стилістичні засоби синтаксису та елементи
    структурування тексту (по-перше, водночас) для чіткого розрізнення регістрів.'
- section: Займенники та граматичне узгодження
  words: 800
  points:
  - 'Типологія вживання «ти» та «Ви»: етикетна градація від сімейного кола до офіційного
    ділового прийому.'
  - 'Культурна пастка і граматика: узгодження дієслів з ввічливим «Ви» вимагає винятково
    множини (наприклад, «Ви знали?», а не «Ви знав?»).'
  - 'Синтаксичні нюанси: узгодження прикметників-предикатів у вигуках («Яка Ви красива!»)
    порівняно зі звичайними ствердженнями («Ви сьогодні дуже заклопотані»).'
  - 'Типова помилка гіперкорекції: правило написання «Ви» з великої літери винятково
    в індивідуальному офіційному листуванні, та неприпустимість цього в чатах чи публічних
    коментарях.'
- section: Етикетні форми звертання
  words: 900
  points:
  - 'Система звертань за Державним стандартом: обов''язкове використання кличного
    відмінка (Вікторе, Олено Петрівно, пане Директоре).'
  - Сучасна модель звертання «Пан / Пані + ім’я» (Пане Андрію) як еталонний стандарт
    на противагу консервативному «Ім’я + по батькові».
  - 'Стилістичне табу: чому конструкція «Пан + по батькові» є надлишковою («Pan mismatch»)
    і як уникати цієї поширеної помилки.'
  - 'Застарілі та грубі форми: чому неприпустимо звертатися «жіночко» чи «чоловіче»
    до незнайомців, і використання нейтральних формул (наприклад, «Перепрошую...»).'
  - 'Градація офіційності: випадки застосування формул від «Шановний пане» до «Вельмишановний»
    в суворому дипломатичному чи академічному протоколі.'
- section: Формальна та неформальна лексика
  words: 700
  points:
  - 'Лексична синонімія: глибокий контекстний аналіз синонімічних рядів (наприклад,
    «друг — приятель — товариш — колега»).'
  - 'Еліпсис у неформальному мовленні за Держстандартом: синтаксичний розбір типових
    прикладів («Смачного! – Дякую, і тобі», «Привіт! – Навзаєм!»).'
  - 'Трансформація регістру: практичні алгоритми перетворення розмовних виразів та
    фразеологізмів на стандартизовані книжні конструкції без втрати змісту.'
- section: Соціальні сценарії та перехід між регістрами
  words: 700
  points:
  - 'Робоче середовище: баланс між колегіальністю та субординацією при комунікації
    з керівництвом і колегами.'
  - 'Етикет переходу з «Ви» на «ти»: соціокультурні норми ініціювання зміни регістру
    в українському середовищі (хто має право першим пропонувати).'
  - 'Університетський і офіційний протокол: правильне звертання до викладачів, лікарів
    та посадових осіб із зазначенням їхньої ролі («Пане професоре», «Пані лікарко»).'
- section: Практика, корекція та підсумок
  words: 400
  points:
  - 'Аналіз кейсів (Adversarial Error Correction): виявлення та виправлення свідомо
    закладених стилістичних і граматичних помилок в узгодженні та формах звертання.'
  - 'Рольова гра: подання одного і того ж прохання у двох варіантах — офіційно (у
    форматі електронного листа) та неофіційно (у месенджері).'
  - 'Лексичний підсумок і логічний перехід: підготовка до спеціалізованої термінології
    ділової української мови (Модуль 17).'
