slug: professional-email-advanced
title: 'Ділова пошта: Поглиблено'
word_target: 5000
content_outline:
- section: Вступ
  words: 500
  points:
  - 'Представити контекст складної професійної кореспонденції: ескалація проблем,
    координація багатосторонніх проєктів.'
  - Зв'язати з Державним стандартом §1.3.1.1 (написання скарг, претензій, надання
    пояснень).
  - Окреслити перехід від базових імейлів (M85) до стратегічного управління конфліктами
    в діловому середовищі.
- section: Імерсивна розповідь
  words: 1500
  points:
  - 'Створити реалістичний сценарій: Менеджер по роботі з клієнтами змушений реагувати
    на порушення термінів (термін) та висунути обґрунтовану претензію (претензія).'
  - Продемонструвати на прикладах правильне використання копії та прихованої
    копії для збереження конфіденційності.
  - 'Інтегрувати приклад ''Методу сендвіча'': як грамотно вписати конструктивну критику
    між позитивними стейтментами, щоб зберегти партнерство.'
  - Показати шаблон листа-підтвердження (лист-підтвердження) як інструмента керування
    очікуваннями при затримці відповіді.
- section: Аналіз та культурний контекст
  words: 1000
  points:
  - Пояснити правило 'Ви' (з великої літери) для поваги до однієї особи та 'ви' для
    групи, уникаючи надмірного пафосу.
  - 'Обговорити часові стандарти українського бізнесу: 24 години на відповідь, правило
    3 днів для складних питань із обов''язковим проміжним підтвердженням.'
  - Підкреслити важливість точних та інформативних тем листа, які
    одразу розкривають суть (напр. 'Щодо проєкту Х'), замість загальних фраз.
  - Згадати тенденцію відходу від радянського бюрократичного стилю до сучасної, прямої
    української ділової мови.
- section: Граматика та стилістика
  words: 1250
  points:
  - 'Пояснити синтаксис формального регістру: використання складнопідрядних речень
    для аргументації та дієприкметників.'
  - 'Провести роботу над помилками (плеоназми): усунення ''спільне співробітництво''
    та ''вільна вакансія''.'
  - 'Опрацювати типові кальки: заміна ''приймати участь'' на ''брати участь'', ''вірна
    відповідь'' на ''правильна відповідь'', ''згідно інструкції'' на ''згідно з інструкцією''.'
  - Продемонструвати модальні конструкції для ввічливої твердості ('Будемо вдячні,
    якщо...', 'Змушені повідомити...').
  - Наголосити на обов'язковому використанні кличного відмінка у звертаннях (Пане
    Андрію, Пані Олено).
- section: Практика та підсумок
  words: 750
  points:
  - 'Надати алгоритм зведення складної комунікації в один ланцюжок: від визначення
    поняття (поняття) до фінальної згоди (узгодити деталі).'
  - Запропонувати чекліст перевірки листа перед відправкою (вкладення, тема, тон,
    кличний відмінок).
  - Зробити підсумок модуля, підкресливши, що етикет — це інструмент досягнення бізнес-цілей.
  - Перекинути місток до наступних модулів (М87-88), де навички будуть використані
    для написання звітів та пропозицій.
