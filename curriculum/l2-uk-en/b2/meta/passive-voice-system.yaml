slug: passive-voice-system
title: 'Пасивний стан: повна система'
word_target: 4000
content_outline:
- section: Вступ — Що таке пасивний стан?
  words: 400
  points:
  - 'Визначення пасивного стану: фокус на об''єкті, а не на суб''єкті'
  - Порівняння активної (Хто? Що робить?) та пасивної (Що? Зроблене ким?) конструкцій
  - 'Сфери вживання: чому науковий та офіційний стилі люблять пасив'
  - 'Огляд чотирьох форм: дієприкметники, -но/-то, -ся, 3-тя особа множини'
- section: Форма 1 — Дієприкметники на -ний/-тий
  words: 700
  points:
  - 'Механізм утворення: суфікси -н- (писаний) та -т- (митий)'
  - 'Узгодження з іменником: рід, число, відмінок (як прикметник)'
  - Вживання з дієсловом-зв'язкою 'бути' (був написаний, буде відкритий)
  - 'Стан vs Процес: фокус на результаті дії'
- section: Форма 2 — Безособові конструкції на -но/-то
  words: 700
  points:
  - 'Головна особливість: незмінність форми (закінчення -о)'
  - 'Синтаксис: вимагає об''єкта в знахідному відмінку (Книгу написано), а не називного'
  - 'Заборона агента: чому не можна сказати ''мною зроблено'''
  - 'Сфера вживання: офіційні документи, новини, констатація фактів'
- section: Форма 3 — Зворотний пасив із -ся
  words: 600
  points:
  - Трансформація активу в пасив через частку -ся (миється, будується)
  - 'Обмеження вживання: недоконаний вид та неживі об''єкти'
  - 'Ризик двозначності: ''дитина миється'' (сама) vs ''посуд миється'' (кимсь)'
  - 'Інструкції та технічні процеси: ''деталь обробляється...'''
- section: Форма 4 — Третя особа множини
  words: 500
  points:
  - 'Неозначено-особові речення: ''Кажуть'', ''Передають'', ''Вважають'''
  - 'Прихований суб''єкт: коли ми не знаємо або не хочемо називати виконавця'
  - Вживання в медіа та розмовній мові ('Мені дзвонили')
  - 'Відмінність від інших форм: збереження активної граматики при пасивному значенні'
- section: Вибір форми пасиву за контекстом
  words: 600
  points:
  - 'Матриця вибору: Стиль (Офіційний/Науковий/Розмовний) → Форма'
  - 'Пастка кальк: чому ''було + дієприкметник'' часто є помилкою стилю'
  - 'Принцип агентності: коли краще повернутися до активного стану'
  - 'Аналіз помилок: ''Закон прийнято депутатами'' vs ''Закон прийнято'''
- section: Підсумок і практика
  words: 500
  points:
  - Зведена таблиця всіх 4 форм
  - 'Алгоритм рішення: яку форму обрати?'
  - 'Фінальний чекліст: чи доречний пасив у цьому реченні?'
  - 'Місток до наступної теми: детальніше про дієприкметники'
