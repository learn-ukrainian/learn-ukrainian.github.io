content_outline:
- section: Вступ — Що таке пасивний стан?
  words: 526
  points:
  - Фундаментальна різниця між активним (суб'єкт діє) та пасивним (об'єкт зазнає дії)
    станом
  - 'Культурний аспект: ''Зсув агентності'' (Agency Shift) — чому сучасна українська
    надає перевагу активу над радянським ''канцеляритом'''
  - Чому пасив необхідний для наукового об'єктивізму та офіційного стилю (уникнення
    персоналізації)
  - 'Огляд чотирьох форм пасиву в українській мові: архітектура системи'
  - 'Термінологічна точність: розмежування ''пасивного стану'' та ''безособових речень'''
- section: Форма 1 — Дієприкметники на -ний/-тий
  words: 737
  points:
  - Алгоритм утворення від перехідних дієслів доконаного виду (написати → написаний)
  - Граматичне узгодження з іменником (рід, число, відмінок) — роль прикметника
  - Вживання з дієсловом-зв'язкою 'бути' у різних часах
  - 'Типова помилка: калька активних дієприкметників теперішнього часу (уникнення
    форм типу ''читаємий'')'
  - 'Сфера вживання: літературний опис станів та властивостей об''єкта'
- section: Форма 2 — Безособові конструкції на -но/-то
  words: 737
  points:
  - 'Унікальна українська форма: трансформація з дієприкметника (написаний → написано)'
  - 'Синтаксична особливість: об''єкт у знахідному відмінку (Книгу написано), а не
    називному'
  - 'Культурний код ''-НО/-ТО'': відтінок абсолютної завершеності та факту (військові
    накази, історичні хроніки)'
  - 'Розрізнення ''Стан vs Дія'': ''Завдання виконане'' (властивість) проти ''Завдання
    виконано'' (подія)'
  - 'Регістр: офіційно-діловий, юридичний, фіксація результату без виконавця'
- section: Форма 3 — Зворотний пасив із -ся
  words: 632
  points:
  - Утворення пасивного значення за допомогою частки -ся (будуватися, писатися)
  - Фокус на тривалому процесі, а не на результаті (недоконаний вид)
  - 'Обмеження вживання: неприродність конструкцій з агентом в орудному відмінку (''Дім
    будується робітниками'' → ПОМИЛКА)'
  - 'Регістр: науковий, технічний опис процесів, інструкції'
- section: Форма 4 — Третя особа множини
  words: 632
  points:
  - 'Неозначено-особові речення: конструкція без явного підмета (Мені сказали, Двері
    відчинили)'
  - 'Імпліцитний агент: невизначені ''вони'' або колективна дія'
  - 'Синтаксична структура: об''єкт часто виступає в ролі теми повідомлення'
  - 'Регістр: розмовний стиль, плітки, новини, ситуації з невідомим виконавцем'
- section: Вибір форми пасиву за контекстом
  words: 526
  points:
  - 'Алгоритм вибору (Decision Tree): ''Чи важливий виконавець?'' → ''Чи це процес
    чи результат?'''
  - 'Стилістичні помилки: змішування ''живої'' мови та бюрократичних штампів'
  - 'Коли пасив — це зло: уникнення відповідальності (''Рішення було прийнято'' замість
    ''Ми вирішили'')'
  - 'Зведена таблиця регістрів: від розмовного ''вкрали'' до офіційного ''викрадено'''
- section: Підсумок і практика
  words: 210
  points:
  - 'Ключові принципи ''вільної мови'': активність суб''єкта як норма'
  - 'Фінальний чекліст: 4 форми та їхні маркери'
  - 'Місток до наступних модулів: деталізація кожної форми окремо'
