slug: parenthetical-expressions
title: Вставні слова та вирази
word_target: 4000
content_outline:
- section: 'Вступ: Природа вставних конструкцій'
  words: 600
  points:
  - 'Визначити поняття вставних слів згідно з Державним стандартом §4.3.2: просте
    речення зі вставними словами та їхня роль у синтаксичній побудові тексту.'
  - 'Створити візуалізацію «Decision Tree»: Як відрізнити вставне слово від члена
    речення (критерій можливості вилучення з контексту без руйнування граматичної
    структури).'
  - 'Надати загальну класифікацію семантичних груп: впевненість, емоційне ставлення,
    джерело інформації, організація висловлювання.'
- section: Впевненість та емоційне ставлення
  words: 1000
  points:
  - 'Проаналізувати градацію впевненості у вигляді таблиці: від безумовної («безперечно»,
    «звісно», «безумовно») до припущеної («здається», «очевидно», «мабуть»).'
  - 'Ввести Cultural Hook «Polite Uncertainty»: використання «мабуть» або «напевно»
    навіть за наявності впевненості для пом''якшення тверджень та уникнення категоричності.'
  - 'Пояснити вираження емоційної оцінки подій: вираження полегшення («на щастя»,
    «на радість») та жалю («на жаль», «на біду»).'
  - 'Додати Learner error warning: правопис «на жаль» (завжди окремо) та «мабуть»
    (стандартне написання з «т» на кінці).'
- section: Джерела інформації та логіка викладу
  words: 1000
  points:
  - 'Ввести Cultural Hook «Collective Wisdom»: вставне слово «кажуть» як специфічний
    маркер спільного знання або чуток, що апелює до авторитету спільноти.'
  - 'Проаналізувати посилання на джерело: диференціація конструкцій «на мою думку»,
    «за словами...», «як відомо...» залежно від офіційності ситуації.'
  - 'Розглянути маркери організації дискурсу: послідовність думок («по-перше», «по-друге»,
    «нарешті») та логічні висновки («отже», «взагалі», «таким чином»).'
  - 'Пояснити Topic switching: використання «до речі» для перемикання теми; наголосити
    на правописі слів типу «по-перше» (обов''язковий дефіс).'
- section: Пунктуація та пастки гомонімії
  words: 800
  points:
  - Сформулювати правила виділення комами залежно від позиції у реченні (препозиція,
    інтерпозиція, постпозиція) з прикладами.
  - 'Пояснити Homonymy Trap: диференціація дієслова та вставного слова на прикладі
    «Він може прийти» (модальне дієслово) vs «Він, може, прийде» (вставне слово).'
  - 'Створити Warning Box «False Parentheticals»: навести перелік слів («навіть»,
    «майже», «адже», «принаймні»), які ніколи не є вставними і не виділяються комами.'
- section: Практика в ролі ведучого ток-шоу
  words: 600
  points:
  - 'Інтегрувати Persona (Talk Show Host): продемонструвати застосування вставних
    конструкцій для керування динамікою розмови, висловлення модальності та реакції
    на репліки гостей.'
  - 'Проаналізувати стилістичні ефекти: порівняння «сухих» фактів та речень, збагачених
    модальністю, для досягнення переконливості.'
  - Надати підсумковий дріл-діалог на розрізнення функцій вставних слів та підготувати
    ґрунт до Модуля 13 (Інверсія та емфаза).
