slug: b2-final-exam
title: B2 Підсумковий іспит
word_target: 4000
content_outline:
- section: Огляд — Фінальний іспит B2
  words: 600
  points:
  - 'Сформулювати вступне слово від Голови комісії щодо мети іспиту B2: перевірка
    глибокого розуміння системних зв''язків та готовності до професійного спілкування.'
  - 'Пояснити критерії оцінювання: лексичне багатство (використання синонімічних рядів)
    та граматична точність.'
  - Продемонструвати на прикладах баланс між українською милозвучністю (правила чергування
    у/в, і/й) та суворою термінологічною точністю в офіційних ситуаціях.
- section: 'Частина 1: Читання та академічна ідентичність'
  words: 1000
  points:
  - 'Розробити завдання на основі публіцистичного тексту: навчити аналізувати медійні
    нюанси та розпізнавати приховану думку автора.'
  - 'Інтегрувати культурний маркер «Фактор Ґ»: пояснити історію літери (репресія та
    відновлення) і навести приклади її нормативного вживання (ґрунт, ґанок, ґудзик)
    як ознаки української ідентичності.'
  - Створити фрагмент науково-популярного тексту з ключовими словами ('термін', 'поняття',
    'дослідження') для перевірки розуміння наукових концепцій.
  - Подати зразок ділового тексту (звіт або офіційний лист) для тренування навички
    пошуку ключової інформації для прийняття рішень.
- section: 'Частина 2: Письмо та стилістична вправність'
  words: 800
  points:
  - 'Надати чіткі інструкції до написання ділового email: вибір правильного офіційного
    регістру (формальне ''вітаю'' замість неформального ''привіт'').'
  - 'Пояснити вимоги до структури аргументативного есе: логіка викладу, використання
    конекторів (з одного боку, водночас).'
  - Проаналізувати типові лексичні кальки, чітко вказавши на нормативність вислову
    'брати участь' замість помилкового 'приймати участь'.
  - 'Описати загальні критерії оцінювання письма: організація тексту, багатство словникового
    запасу та граматична коректність.'
- section: 'Частина 3: Слухання та лексична точність'
  words: 800
  points:
  - 'Змоделювати завдання на основі аудіо новинного сюжету: навчити виокремлювати
    головну тезу в швидкому темпі мовлення.'
  - Створити транскрипт фрагмента інтерв'ю для тренування навички розрізнення думок
    та емоційного забарвлення.
  - 'Розібрати типову граматичну помилку в усному мовленні: використання калькованих
    активних дієприкметників (''слідуюча'') замість нормативних прикметників (''наступна'').'
  - Сформулювати поради щодо конспектування лекції та розпізнавання ключових пунктів
    в академічному контексті.
- section: 'Частина 4: Говоріння та підсумок рівня'
  words: 800
  points:
  - 'Окреслити сценарій професійного інтерв''ю: демонстрація впевненого володіння
    мовою та правильного використання ''ви''-регістру.'
  - 'Навести приклад монологу з акцентом на лексичну точність (використання специфічних
    синонімів, наприклад: обрій, небокрай, видноколо).'
  - 'Надати стратегії для дискусії з екзаменатором: аргументація власної позиції,
    використання модальних маркерів (ймовірно, можливо).'
  - 'Підбити загальний підсумок рівня: надати рекомендації для успішного переходу
    до академічного чи професійного треку рівня C1.'
