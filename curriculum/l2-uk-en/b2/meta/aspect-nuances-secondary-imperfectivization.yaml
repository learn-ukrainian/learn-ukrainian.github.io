slug: aspect-nuances-secondary-imperfectivization
title: 'Видові нюанси I: Вторинна імперфективація'
word_target: 4000
content_outline:
- section: 'Вступ: Метафора Палімпсесту'
  words: 600
  points:
  - 'Розкриття концепції палімпсесту як культурної метафори: від завершеного тексту
    до процесу переписування на прикладі творчості Василя Стуса.'
  - 'Аналіз видової тріади: писати (базовий процес) → написати (завершений результат)
    → записувати (вторинний процес/звичка).'
  - Визначення функціональної ролі вторинної імперфективації для ітеративної (повторюваної)
    та дуративної (тривалої) дії.
- section: 'Механіка творення: Суфікси та чергування'
  words: 1000
  points:
  - Детальний розбір механізму дії продуктивних суфіксів -ува-/-юва- (напр., записати
    → записувати) з таблицями прикладів.
  - Аналіз типової помилки надуживання суфіксом (уникнення ненормативного «переписовувати»
    на користь «переписувати»).
  - 'Пояснення чергування голосних у корені як ключового маркера: перехід [о/а] та
    [е/і] (допомогти — допомагати, випекти — випікати).'
  - Огляд функціонування суфікса -ва- (додати → додавати) та його відмінностей від
    первинних дієслів.
- section: Наголос як змістовий маркер
  words: 700
  points:
  - Розбір видових пар, що розрізняються виключно фонетично (ви́різати (ДВ) vs виріза́ти
    (НДВ)).
  - Фонетичні дрилі та правила акцентуації для уникнення змішування видів.
  - Демонстрація того, як помилковий наголос повністю змінює семантику речення (процес
    замість результату).
- section: 'Контексти вживання: Деколонізація та процеси'
  words: 1000
  points:
  - 'Кейс-стаді: суспільний процес перейменування топонімів як тривала дія (перейменовувати)
    на противагу одноразовому факту (перейменувати).'
  - Інтеграція академічної лексики (процес, метод, поняття, термін) у контекст опису
    наукових та соціальних процесів.
  - Чітке розмежування ітеративного значення (регулярність у минулому) та дуративного
    значення (поступовий розвиток дії).
- section: Практика та закріплення
  words: 700
  points:
  - 'Вправа на корекцію типових морфологічних помилок: ідентифікація правильних суфіксів
    та наголосів.'
  - 'Завдання з трансформації тексту: переведення академічного тексту з описів результатів
    у площину процесів.'
  - Аналітичне читання уривка про палімпсести з фокусом на визначення вторинних недоконаних
    дієслів та їхньої ролі.
