slug: active-participles-present
title: Активні дієприкметники теперішнього часу (-учий/-ючий)
word_target: 4000
content_outline:
- section: 'Вступ: Спадщина та статус «зомбі»'
  words: 600
  points:
  - Представлення концепції активного дієприкметника теперішнього часу як граматичної
    форми, що номінально існує, але має вкрай маргінальний статус у сучасному живому
    мовленні.
  - 'Введення культурного контексту: використання метафори видатного мовознавця Олександра
    Пономаріва про «зомбі-дієприкметники». Пояснення, чому форми на -учий/-ючий позбавляють
    українську фразу природної дієслівної динаміки.'
  - 'Формулювання головної стратегії для рівня B2: розвиток навичок пасивного розпізнавання
    цих форм (для читання класики та офіційних документів) за умови свідомого їх уникнення
    у власному продуктивному мовленні.'
- section: Морфологічне творення та розпізнавання
  words: 800
  points:
  - 'Детальний розбір алгоритму деривації: утворення від основи дієслова 3-ї особи
    множини теперішнього часу (напр., вони читають, вони пишуть) із додаванням суфіксів
    -уч- (-юч-) для І дієвідміни та -ач- (-яч-) для ІІ дієвідміни, плюс прикметникове
    закінчення.'
  - 'Демонстрація морфологічних моделей на конкретних прикладах: працюють → працюючий,
    говорять → говорячий, мислять → мислячий, квітнуть → квітнучий.'
  - Пояснення фонетичних особливостей та традиційних чергувань приголосних, які супроводжують
    ці форми, як маркерів книжного, штучного чи канцелярського стилю.
- section: 'Сила дієслова: Трансформація в підрядні речення'
  words: 900
  points:
  - 'Формулювання золотого правила української ідіоматики: системна заміна штучного
    дієприкметника на енергійну конструкцію з підрядним означальним реченням («який/яка/яке/які
    + дієслово»).'
  - 'Аналіз стилістичного контрасту на яскравих парах: порівняння штучних конструкцій
    («сплячий кіт», «працююча людина») з природними («кіт, який спить», «людина, яка
    працює»), підкреслюючи любов української мови до динаміки дії.'
  - Дослідження обмеженого функціонування дієприкметникових зворотів в українській
    літературі XIX-XX століть, де такі форми застосовувалися як свідомий стилістичний
    прийом для створення урочистого або архаїчного звучання.
- section: 'Лакмусовий папірець грамотности: чинний vs діючий'
  words: 800
  points:
  - 'Чітке семантичне розмежування паронімів: «чинний» як єдиний правильний термін
    для позначення юридичної чи нормативної сили (чинний закон, чинна угода) на противагу
    «діючий».'
  - Аналіз типової помилки «діючий закон» як суржикового калькування (від рос. «действующий
    закон») та маркера недостатнього рівня професійної мовної компетентності.
  - 'Визначення легітимних сфер застосування слова «діючий», де воно означає безпосередню
    фізичну, хімічну або рольову активність: «діюча особа» (в театрі), «діюча речовина»
    (у фармакології), «діючий вулкан».'
- section: Лексикалізовані форми та подолання кальок
  words: 900
  points:
  - 'Огляд лексикалізованих одиниць, які історично втратили дієслівні ознаки і закріпилися
    як повноцінні іменники чи прикметники: завідуючий (посада), керуючий (звання),
    цілющий (постійна властивість), родючий (якість).'
  - 'Надання ефективних стратегій і словника замінників для типових канцелярських
    кальок: використання слова «наявний» (про ресурси, проблеми) або «теперішній»
    замість «існуючий».'
  - 'Практичний аспект деколонізації словникового запасу: обов''язкове викорінення
    імперських штампів «оточуюче середовище» (заміна на «довкілля» / «навколишнє середовище»)
    та «слідуюча зупинка» (заміна на єдино правильне «наступна зупинка»).'
