slug: multi-clause-sentences
title: Багатоскладні речення
word_target: 4000
content_outline:
- section: 'Вступ: Багатоскладні речення'
  words: 500
  points:
  - Визначення багатоскладних (складних) речень та їхня роль у вираженні складних
    думок на рівні B2 (відповідно до вимог Держстандарту §4.3.4).
  - Аналіз української пунктуації як «інтонації на папері» з використанням класичного
    прикладу «Стратити не можна помилувати» для демонстрації сили структурної коми.
  - 'Огляд основних типів зв''язку: сурядного та підрядного, як бази для академічного
    та художнього стилів, з наголосом на українській синтаксичній незалежності.'
  - 'Увага: 100% українськомовне занурення, англійська мова використовується лише
    в таблиці словника.'
- section: Складносурядні речення та їхні нюанси
  words: 700
  points:
  - 'Детальний розбір сполучників сурядності: єднальних (і, й, та), протиставних (а,
    але, проте, зате) та розділових (або, чи) у форматі окремих H3.'
  - Стилістична різниця між нейтральним «і» та сполучником «та», а також між нейтральним
    «але» та формальним/літературним «проте».
  - 'Правила пунктуації: обов''язкова кома перед сполучниками та критичний виняток
    для речень зі спільним другорядним членом, де кома перед «і» не ставиться.'
  - Наведення 5+ прикладів з активною позицією українців як суб'єктів дії.
- section: Складнопідрядні речення та «пастка який»
  words: 800
  points:
  - 'Класифікація підрядних речень (означальні, з’ясувальні, обставинні: часу, причини,
    умови, допусту) з окремим H3 для кожної категорії та таблицею прикладів.'
  - Аналіз функціональної різниці між сполучниками та сполучними словами (що, щоб,
    як, який, котрий).
  - 'Розбір «The Which Trap»: пояснення, чому в означальних підрядних реченнях академічного
    стилю домінує «який», а не розмовне «що».'
  - 'Регістрова заміна та деколонізація: пояснення використання «оскільки» замість
    русизму «так як», та «дарма що» як питомо українського літературного замінника
    «хоча».'
- section: Багатоскладні речення з кількома підрядними
  words: 800
  points:
  - 'Пояснення архітектури складних ієрархічних структур: послідовне, однорідне та
    неоднорідне підпорядкування (окремі H3 для кожного типу).'
  - 'Культурний гачок: аналіз «багатоповерхових» речень в українській прозі (наприклад,
    стилістика Михайла Стельмаха) як доказ автентичної плинності (flow) оповіді.'
  - 'Критичне правило пунктуації: детальний розбір відсутності коми перед «і», коли
    сполучник з''єднує дві однорідні підрядні частини, що стосуються одного головного
    речення (з наочними схемами).'
  - Практичні поради щодо збереження ясності при конструюванні довгих речень.
- section: Вкладені конструкції та стилістична майстерність
  words: 700
  points:
  - Структура вкладених речень (підрядне всередині іншої частини) та методи уникнення
    перевантажених «речень-потягів».
  - Стилістичний аналіз синтаксису в українській літературі (наприклад, динамічний
    синтаксис Лесі Українки) для передачі емоційної напруги.
  - 'Трансформаційні техніки: як замінити громіздкі підрядні частини дієприкметниковими
    або дієприслівниковими зворотами (зв''язок із темами b2-01—b2-10).'
  - Наведення порівняльних таблиць «До» (складне підрядне) та «Після» (зворот).
- section: Пунктуація, типові помилки та підсумок
  words: 500
  points:
  - 'Виправлення типових кальок: категорична заміна «дивлячись на» на нормативне «залежно
    від» у складних конструкціях.'
  - 'Комплексний пунктуаційний практикум: розбір складних випадків з двома сполучниками
    поруч (наприклад, «що якщо»).'
  - Підсумкова блок-схема (Mermaid flowchart) для визначення типу речення та вибору
    правильного сполучника.
  - Короткий анонс переходу до вставних слів та модальності (b2-12).
