slug: news-analysis-advanced
title: 'Аналіз новин: Поглиблено'
word_target: 4000
content_outline:
- section: Розминка та критичний вступ
  words: 800
  points:
  - Перехід від вивчення структури новин (М89) до глибокого деконструктивного аналізу
    змісту в умовах інформаційної війни
  - 'Українські медіа в глобальному контексті: Реформа Суспільного (НСТУ) 2017 року
    як крок до незалежної журналістики та роль наглядової ради'
  - 'Обговорення новин та відгуків про них згідно зі стандартом B2 (§3.18, §1.1.2.2.2):
    фокус на інтенції аргументованої дискусії'
- section: Упередженість та редакційна політика
  words: 900
  points:
  - 'Аналіз типів упередженості: вибіркове висвітлення (selection bias), фреймінг
    (framing) та замовчування фактів (omission)'
  - 'Український медіа-феномен «джинса»: розпізнавання прихованої реклами та політичного
    замовлення під виглядом новин'
  - 'Порівняльний аналіз редакційної політики: як власники медіа-холдингів впливають
    на інтерпретацію подій'
  - Розмежування понять «факт» та «судження» (fact vs opinion) у новинному тексті
    з прикладами
- section: Пропаганда та емоційні маніпуляції
  words: 900
  points:
  - 'Техніки пропаганди: демонізація опонента, whataboutism як спосіб відвернення
    уваги та гіперболізація загроз'
  - 'Емоційна лексика як маркер маніпуляції: апеляція до страху, гніву та штучного
    патріотизму для зниження критичного порогу'
  - 'Механіка дезінформації: аналіз методів створення фейків на прикладі російської
    пропаганди про Україну (без ретрансляції самих фейків)'
- section: Верифікація та фактчекінг
  words: 800
  points:
  - 'Методологія верифікації: застосування CRAAP-тесту (Currency, Relevance, Authority,
    Accuracy, Purpose) для оцінки надійності медіа'
  - 'Феномен StopFake (2014): історія проєкту Могилянської школи журналістики та його
    світове значення у боротьбі з дезінформацією'
  - 'Практичні інструменти: ресурси VoxCheck, зворотний пошук зображень та правило
    перехресної перевірки (мінімум три незалежні джерела)'
- section: Мовний аналіз та типові помилки
  words: 600
  points:
  - 'Фреймінг через граматику: активний vs пасивний стан для приховування або підкреслення
    відповідальності суб''єкта дії'
  - 'Корекція типових лексичних помилок: калькування «гарячі новини» (вживати: свіжі/останні
    новини) та «зробити інтерв''ю» (вживати: взяти/дати інтерв''ю)'
  - 'Стилістичні нюанси: розмежування понять «опублікувати» (для преси) та «оприлюднити»
    (для документів/даних); різниця між «трансляцією» та «передачею»'
  - 'Робота з прийменниками у медіа-контексті: правильне вживання «в ефірі» (не «на
    ефірі») та «дивитися по телевізору»'
