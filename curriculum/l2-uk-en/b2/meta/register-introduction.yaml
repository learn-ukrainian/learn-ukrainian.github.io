slug: register-introduction
title: Функціональні стилі мови
word_target: 4000
content_outline:
- section: 'Вступ: Що таке функціональний регістр?'
  words: 600
  points:
  - Дати визначення функціонального стилю (регістру) як системи мовних засобів, що
    обслуговують певну сферу суспільного життя.
  - Представити порівняльну таблицю «Одна думка у 5 стилях» на прикладі повідомлення
    про дощ (від розмовного «Ого, ллє як з відра!» до наукового «Спостерігаються інтенсивні
    опади»).
  - Пояснити, як комунікативна мета та мовна ситуація диктують вибір засобів.
- section: Розмовна та художня сфери
  words: 1000
  points:
  - 'Описати особливості розмовної мови: емоційність, невимушеність, еліпсис (неповні
    речення) у побуті.'
  - 'Додати Cultural hook: «Стиль-рятівник» — як фольклор та література зберегли українську
    ідентичність в умовах імперських заборон (Валуєвський циркуляр, Емський указ).'
  - 'Розібрати Learner error: чому «вибачаюсь» є помилкою, і як правильно вживати
    «перепрошую».'
  - 'Розглянути художній напрям: образність, виразність, використання метафор та епітетів
    з прикладами з класичної літератури.'
- section: Науковий виклад
  words: 800
  points:
  - 'Пояснити ключові риси академічного мовлення: термінологічна точність, логічна
    послідовність та об''єктивність.'
  - 'Проаналізувати Learner error: калькування англійських особових конструкцій («I
    found») та перехід до українських безособових форм («виявлено», «встановлено»,
    «досліджено»).'
  - 'Продемонструвати специфіку наукової аргументації: формулювання тез та наведення
    доказів.'
- section: Офіційно-ділова комунікація
  words: 800
  points:
  - Описати сувору регламентацію, стандартизованість та використання мовних кліше
    в документах (заяви, протоколи).
  - 'Додати Cultural hook: явище «канцеляриту» та його стигматизація в сучасному мовленні
    (порівняння бюрократичних штампів типу «здійснити покупку» із живим «купити»).'
  - 'Розібрати Learner error: ризики використання сленгу або фамільярних вітань в
    офіційних листах.'
- section: Публіцистика та порівняльний аналіз
  words: 800
  points:
  - 'Охарактеризувати публіцистику (ЗМІ): поєднання інформативності, актуальності
    та соціальної оцінності.'
  - Проаналізувати вплив мови новин на формування громадської думки.
  - 'Створити міні-практикум для розпізнавання стильових маркерів: критерії визначення
    регістру у змішаних або автентичних текстах.'
