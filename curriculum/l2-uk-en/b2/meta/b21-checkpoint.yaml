slug: b21-checkpoint
title: 'Контрольна точка: B2.1 Завершення'
word_target: 4000
content_outline:
- section: Огляд та вступ
  words: 400
  points:
  - 'Чітке пояснення мети контрольної точки: перевірка засвоєння пасивних конструкцій,
    дієприкметників та стилістичних регістрів (B2.1).'
  - Огляд очікуваних результатів та структури оцінювання для переходу до наступної
    фази.
- section: 'Навичка 1: Пасивний стан'
  words: 800
  points:
  - Детальний розбір помилкового вживання «було + дієприкметник» (калька) та тренування
    правильних безособових форм на -но/-то.
  - Трансформація неприродного зворотного пасиву на -ся (з орудним відмінком агента)
    в активні конструкції, демонструючи український фокус на дії.
  - 'Вибір пасиву для різних регістрів: науковий опис процесів проти ділового протоколу.'
- section: 'Навичка 2: Дієприкметники'
  words: 800
  points:
  - Перевірка розрізнення активних та пасивних дієприкметників та їх точне узгодження
    з іменниками у складних реченнях.
  - Практика використання дієприкметникових зворотів як маркера академічного та офіційного
    стилів тексту.
  - 'Контрастний аналіз: віддієслівний прикметник (як постійна ознака) проти дієприкметника
    (як результат завершеної дії).'
- section: 'Навичка 3: Регістри та Стилі'
  words: 1000
  points:
  - Аналіз еволюції українського офіційного стилю від важкого бюрократичного тексту
    до сучасного лаконічного стилю цифрової держави (на прикладі 'Дія').
  - 'Практичні вправи на стилістичну трансформацію: переклад складних канцелярських
    структур у зрозумілий (user-centric) активний стиль.'
  - Ідентифікація стилістичних маркерів у текстах політичного та юридичного спрямування
    (зокрема історичних, як Конституція Пилипа Орлика).
- section: 'Навичка 4: Доменна лексика'
  words: 600
  points:
  - 'Робота з типовими частотними колокаціями доменних слів: ''юридичний термін'',
    ''законодавчий процес'', ''системний аналіз''.'
  - 'Групування лексики за функціональними доменами: правосуддя, державне управління,
    економіка.'
  - Інтеграція понять 'метод', 'синтез' та 'дослідження' у контексті підготовки офіційних
    аналітичних звітів.
- section: Підсумок та результати
  words: 400
  points:
  - Критерії успішного проходження контрольної точки та самостійна інтерпретація результатів
    тестування.
  - Настанови для подальшого вивчення фразеології, синонімії та ідіоматики на майбутньому
    етапі B2.2.
