slug: emphasis-and-inversion
title: Емфаза та інверсія
word_target: 4000
content_outline:
- section: 'Вступ: Порядок слів в українській мові'
  words: 500
  points:
  - Спростувати міф про 'повну хаотичність' вільного порядку слів; пояснити роль граматичного
    узгодження та керування утриманні структури.
  - 'Визначити прагматичний вплив: пояснити, як зміна місця слова змінює логічний
    центр повідомлення.'
  - Чітко розмежувати нейтральний (об'єктивний) та емфатичний (суб'єктивний) порядок
    слів згідно з §4.3.1.1 Держстандарту.
  - 'Культурний гачок (H3): Проаналізувати ритмомелодику поетичної інверсії у Т. Шевченка
    ''Садок вишневий коло хати'' (прикметник після іменника).'
- section: 'Актуальне членування речення: Тема та Рема'
  words: 700
  points:
  - Надати чіткі визначення Теми (відома інформація) та Реми (нова інформація, ядро
    повідомлення) з використанням H3 для кожного концепту.
  - 'Продемонструвати нейтральний порядок: рух від Теми до Реми за допомогою таблиць
    або схем.'
  - 'Сформулювати правило ''Рема в кінці'': пояснити, чому найважливіше слово замикає
    нейтральне речення (на відміну від англійського наголосу).'
  - 'Показати контекстуальний вплив: навести міні-діалоги, де одне речення змінює
    структуру залежно від поставленого питання.'
- section: Емфатичний порядок та логічний наголос
  words: 800
  points:
  - 'Пояснити механізм емфази (H3): винесення Реми на початок речення для сильного
    емоційного виділення (інверсія Теми і Реми).'
  - Навести детальну порівняльну таблицю виділення підмета, додатка та обставини ('Я
    прочитав цю книгу' проти 'Цю книгу я прочитав').
  - 'Описати фонетичні засоби: логічний та емфатичний наголос у мовленні (без використання
    англійських транслітерацій, тільки IPA).'
  - 'Літературний приклад (H3): Розібрати емоційну емфазу у В. Сосюри ''Так ніхто
    не кохав'' (препозиція прислівника ''так'').'
- section: Інверсія та стилістичні ефекти
  words: 700
  points:
  - 'Класифікувати типи інверсії (H3): повна та часткова, синтаксична та стилістична.'
  - 'Проаналізувати використання інверсії в художньому стилі: створення піднесеності,
    урочистості або інтимності (з автентичними прикладами).'
  - Показати роль інверсії у публіцистичному та розмовному регістрах (залучення уваги,
    передача спонтанних емоцій).
  - 'Розібрати типову помилку (H3): англомовний ''SVO-flatness'' та як надмірне дотримання
    прямого порядку вбиває емоційність тексту.'
- section: Лексичні та граматичні засоби виділення
  words: 700
  points:
  - Детально пояснити використання підсилювальних часток 'саме', 'якраз', 'навіть',
    'тільки' з прикладами вживання.
  - Навчити конструкції 'це... що/який' (аналог cleft sentences) для ідентифікації
    суб'єкта.
  - Продемонструвати лексичну анафору та синтаксичний паралелізм як засоби підсилення.
  - 'Ввести поняття парцеляції (H3): пояснити, як штучні паузи (крапки) створюють
    драматичний ефект у текстах B2+.'
- section: 'Практика: Корекція та Синтез'
  words: 600
  points:
  - 'Включити секцію ''Робота над помилками'': виправлення ''суржикової'' синтаксичної
    структури (калькування російського офіціозу).'
  - 'Надати покрокову інструкцію для трансформації: як перетворити нейтральний абзац
    на емфатичний текст певного регістру.'
  - Провести керований аналіз короткого медіа-тексту на наявність засобів актуального
    членування.
  - Зробити плавний перехід (підсумок) до модуля B2-14, наголосивши на ролі порядку
    слів у логічній зв'язності.
