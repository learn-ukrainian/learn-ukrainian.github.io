slug: nauka-i-doslidzhennia
title: Наука і дослідження
word_target: 4000
content_outline:
  - section: 'Вступ: Українська наука та видатні вчені (Introduction: Ukrainian Science
      and Distinguished Scientists)'
    words: 600
    points:
      - Introduction to the National Academy of Sciences (NAS) of Ukraine and universities
        as central hubs for research and innovation.
      - 'Cultural Hook: Volodymyr Vernadsky (1863–1945) — his refusal of Russian citizenship,
        the concept of the Noosphere, and his legacy as the founder of the Ukrainian
        Academy of Sciences.'
      - 'Cultural Hook: Borys Paton — pioneering electric welding in space and the
        development of bloodless surgery through soft tissue welding.'
      - 'Cultural Hook: Ihor Sikorsky — his early Kyiv-based inventions, including
        the first helicopter (1910) and the ''Ilya Muromets'' aircraft.'
  - section: Структура наукового дослідження та академічна етика (Structure of Scientific
      Research and Academic Ethics)
    words: 700
    points:
      - 'Stages of research: from formulating a hypothesis (висунути гіпотезу) and
        choosing methodology to conducting experiments and reaching conclusions (дійти
        висновку).'
      - Defining the standard IMRAD structure (Introduction, Methods, Results, and
        Discussion) for organizing academic content and reading efficiency.
      - 'Scientific ethics: understanding academic integrity (доброчесність) and the
        peer review process (рецензування), including blind review (сліпе рецензування).'
      - 'Terminology nuance: distinguishing between the generic ''вчений'' (scientist)
        and the more active/professional ''науковець'' (researcher/scholar).'
  - section: Наукова термінологія та академічний регістр (Scientific Terminology and
      Academic Register)
    words: 700
    points:
      - 'Bridging the stylistics gap: differentiating between the Academic Register
        (Академічний стиль) and Conversational Register (Розмовний стиль).'
      - 'General scientific vocabulary across disciplines: analysis, synthesis, correlation,
        and conducting research (проводити ґрунтовне дослідження).'
      - 'Learner Error: Correcting the common Russianism ''В якості науковця...''
        to the idiomatic Ukrainian ''Як науковець...''.'
      - 'Grammar in Science: Prioritizing the active voice (''Ми проаналізували'')
        over the clunky passive calques (''Нами було проведено аналіз'') common in
        learner output.'
  - section: Критичне читання наукових текстів (Critical Reading of Scientific Texts)
    words: 700
    points:
      - 'Analysis of abstracts and introductions: identifying the object, subject,
        and goals of a study within the text.'
      - 'Decoding visual information: understanding graphs and tables and describing
        data trends using academic vocabulary.'
      - 'Naturalness Check: Avoiding the collocation error ''Зустрічаються помилки''
        (meeting people) in favor of the correct ''Трапляються помилки'' (occurring
        errors).'
      - 'Stylistic precision: identifying and removing pleonasms like ''дисертаційне
        дослідження'' in favor of the concise ''дисертація''.'
  - section: Обговорення наукових тем та представлення результатів (Discussing Scientific
      Topics and Presenting Results)
    words: 700
    points:
      - Formulating research questions and expressing degrees of certainty or hedging
        (можливо, ймовірно, за нашими даними) during academic discussion.
      - 'State Standard §3.17: Discussing scientific discoveries and inventions that
        changed the world (комп’ютеризація, телекомунікація).'
      - 'Science under pressure: a thematic discussion on the challenges and adaptation
        of Ukrainian science during the war.'
  - section: Підсумок та практика (Summary and Practice)
    words: 600
    points:
      - 'Practical task: Analyzing a popular science article vs. an academic abstract
        to identify register shifts.'
      - 'Production: Delivering a short oral presentation on a scientific topic or
        a planned research project (§3.10: academic titles and degrees).'
      - Final review of key scientific collocations and preparatory notes for the
        B2 Capstone project.
