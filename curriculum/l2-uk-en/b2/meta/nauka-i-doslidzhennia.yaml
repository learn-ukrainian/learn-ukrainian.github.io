slug: nauka-i-doslidzhennia
title: Наука і дослідження
word_target: 4000
content_outline:
- section: 'Вступ: Українська наука та видатні вчені'
  words: 600
  points:
  - Introduce the National Academy of Sciences of Ukraine (НАН України) and universities
    as central hubs for research.
  - Highlight Volodymyr Vernadsky's role in founding the Ukrainian Academy of Sciences
    in 1918 and his Noosphere concept.
  - Discuss Borys Paton's groundbreaking contributions to electric welding in space
    and soft tissue welding.
  - Detail Ihor Sikorsky's early Kyiv period, including his 1910 helicopter prototype
    and the 'Ilya Muromets'.
- section: Структура наукового дослідження та академічна етика
  words: 700
  points:
  - 'Detail the research stages: formulating a hypothesis (висунути гіпотезу), selecting
    methodology, conducting experiments, and concluding (дійти висновку).'
  - Explain the standard IMRAD structure (Вступ, Методи, Результати, Обговорення)
    in the context of Ukrainian academic writing.
  - 'Define core scientific ethics concepts: академічна доброчесність, рецензування,
    and сліпе рецензування.'
  - Differentiate the stylistic usage of 'вчений' (generic scientist) versus 'науковець'
    (active researcher).
- section: Наукова термінологія та академічний регістр
  words: 700
  points:
  - Contrast Академічний стиль with Розмовний стиль, providing clear comparative examples.
  - 'Introduce essential academic verbs and nouns: аналіз, синтез, проводити ґрунтовне
    дослідження.'
  - Explicitly correct the common learner error 'В якості науковця...' to the idiomatic
    'Як науковець...'.
  - Demonstrate the preference for the active voice ('Ми проаналізували') over clunky
    passive calques ('Нами було проведено аналіз').
- section: Критичне читання наукових текстів
  words: 700
  points:
  - Guide learners on identifying the 'об'єкт', 'предмет', and 'мета' within an academic
    abstract.
  - Provide vocabulary for decoding visual data (graphs, tables) and describing trends.
  - 'Perform a naturalness check: correct the collocation ''Зустрічаються помилки''
    to ''Трапляються помилки''.'
  - Show how to improve stylistic precision by eliminating pleonasms (e.g., using
    'дисертація' instead of 'дисертаційне дослідження').
- section: Обговорення наукових тем та представлення результатів
  words: 700
  points:
  - 'Teach hedging phrases crucial for academic discourse: можливо, ймовірно, за нашими
    даними.'
  - Discuss major scientific discoveries related to computerization and telecommunications,
    satisfying §3.17.
  - Provide a thematic narrative on how Ukrainian science operates, adapts, and survives
    during wartime.
- section: Підсумок та практика
  words: 600
  points:
  - 'Practical reading task: Compare an excerpt from a popular science article with
    an academic abstract to spot register shifts.'
  - 'Production task: Outline an oral presentation on a scientific topic using proper
    academic titles and degrees (§3.10).'
  - Final review of key scientific collocations to prepare learners for the upcoming
    B2 Capstone project.
