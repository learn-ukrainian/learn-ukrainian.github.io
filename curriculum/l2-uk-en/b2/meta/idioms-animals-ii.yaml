slug: idioms-animals-ii
title: 'Фразеологізми: Тварини II (Птахи, Риби, Комахи)'
word_target: 4000
content_outline:
- section: 'Вступ: Метафоричний світ природи'
  words: 600
  points:
  - Introduction to animal metaphors in Ukrainian lexical stylistics (§4.4.1.2), focusing
    on expressive enrichment at the B2 level without reliance on English scaffolding.
  - 'General associations and decolonized framing: Discussing Birds (freedom/dreams),
    Fish (silence/coldness), and Insects (diligence/annoyance) as independent Ukrainian
    cultural concepts.'
  - 'Cultural Hook: The Stork (Лелека) as a sacred bird in Ukraine, symbol of family
    happiness and loyalty, nesting on houses as a sign of luck.'
- section: 'Птахи: Від досвіду до винятковості'
  words: 1000
  points:
  - Analysis of the high-frequency proverb «Гарна пташка своїм пір'ям, а людина знанням»
    — shifting focus from appearance to substance.
  - 'The dichotomy of certainty: «Синиця в руках краще, ніж журавель у небі» — providing
    authentic Ukrainian usage patterns and collocations like «тримати синицю».'
  - 'Experienced personas: «Стріляний горобець» vs «Рання пташка» (highlighting how
    Ukrainian contrasts literal translations of English ''Early bird'' with its own
    native concepts).'
  - 'Social dynamics: «Біла ворона» (outcast/unique) and «Ворона в павичевому пір''ї»
    (pretense). Explicitly teach the feminine gender requirement for «Біла ворона»
    regardless of the person''s gender to prevent common learner errors.'
- section: 'Риби та комахи: Символи мовчання та праці'
  words: 950
  points:
  - 'Communication metaphors: «Мовчати як риба» (and the variation «німий як риба»)
    vs the indecisive «ні риба ні м’ясо».'
  - 'The virtue of labor: «Працювати як бджола» and its deep cultural link to Ukrainian
    beekeeping history (highlighting Petro Prokopovych and the 1814 frame beehive
    invention).'
  - 'Hyperbole and annoyance: «Робити з мухи слона» (very high frequency) and «Лізти
    межи очі як муха».'
  - 'Physical idioms: «Мурашки по спині бігають» — describing sensations of fear,
    cold, or excitement, ensuring authentic insect-related vocabulary and avoiding
    Russian calques.'
- section: 'Практикум: Стилістичні відтінки'
  words: 750
  points:
  - 'Categorization exercise: Sorting idioms by register (colloquial vs literary)
    and semantic theme (Diligence, Silence, Ambition).'
  - 'Error Correction (Anti-Surzhyk focus): Identifying and fixing gender mismatches
    (e.g., correcting «Він був білим вороном» to «Він був білою вороною») and avoiding
    Russian calques like «грати значення».'
  - 'Translation workshop: Comparing Ukrainian bird metaphors with English counterparts
    (e.g., ''Early bird'' vs «Рання пташка» vs «Хто рано встає...»), promoting 100%
    Ukrainian immersion.'
- section: Творче застосування та підсумок
  words: 700
  points:
  - 'Guided production: Writing a descriptive character profile of a «біла ворона»
    or a «бджілка» in a professional or social context.'
  - 'Reflection on metaphorical motivation: Why does Ukrainian culture organically
    link silence to fish and ambition to insects?'
  - 'Final summary: Integrating animal idioms into broader B2.2 goals of synonymy,
    stylistic flexibility, and decolonized vocabulary usage.'
