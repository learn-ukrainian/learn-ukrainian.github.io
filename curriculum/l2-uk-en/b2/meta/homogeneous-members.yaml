slug: homogeneous-members
title: Однорідні члени речення
word_target: 4000
content_outline:
- section: 'Вступ: Однорідність як синтаксичне явище'
  words: 600
  points:
  - Чітке визначення однорідних членів речення згідно з Держстандартом (§4.3.2), з
    наголосом на їхній рівноправності та залежності від одного слова.
  - 'Вказати ознаки однорідності: однакова синтаксична функція, відповідь на одне
    питання, інтонація перелічування.'
  - 'Створити H3 для стилістичної ролі: показати на прикладах з класичної та сучасної
    літератури ефекти деталізації, ритмічності та динаміки (нагнітання).'
- section: Однорідні підмети та присудки
  words: 800
  points:
  - 'Створити H3 для однорідних підметів: надати правила узгодження присудка (коли
    вживається однина, а коли множина).'
  - 'Створити H3 для однорідних присудків: проілюструвати передачу одночасності та
    послідовності дій за допомогою активних дієслів.'
  - 'Створити H3 для розрізнення: показати різницю між простим реченням з однорідними
    присудками та складним реченням (типова помилка).'
  - Ввести класифікацію сполучників (єднальні, протиставні, розділові) на конкретних
    прикладах.
- section: Однорідні другорядні члени
  words: 800
  points:
  - Створити H3 для однорідних додатків та обставин із використанням лексики рівня
    B2.
  - 'Створити H3 для однорідних означень: пояснити, що вони характеризують предмет
    з одного боку або в переносному значенні.'
  - 'Створити H3 для неоднорідних означень (складна тема): надати чіткий алгоритм
    або таблицю для розпізнавання різних ознак (напр., розмір + матеріал), між якими
    не ставиться кома.'
- section: Узагальнюючі слова при однорідних членах
  words: 900
  points:
  - Створити H3 для позиції узагальнюючого слова перед однорідними членами (правило
    використання двокрапки).
  - Створити H3 для позиції узагальнюючого слова після однорідних членів (правило
    використання тире).
  - Створити H3 для конструкції з продовженням речення (узагальнююче слово, потім
    двокрапка, перелік, потім тире і продовження).
  - Навести список типових узагальнюючих займенників і прислівників (усе, всі, ніхто,
    скрізь, завжди).
- section: Пунктуація та практика
  words: 900
  points:
  - Створити зведену таблицю правил пунктуації (коми, відсутність коми перед одиничними
    'і'/'та', крапка з комою між поширеними членами).
  - Детально розібрати вживання коми перед другою частиною парних сполучників (не
    тільки... а й, як... так і).
  - Додати міні-діалоги або короткий наративний текст для демонстрації однорідних
    членів у природному контексті (практика аналізу).
  - 'Створити H2 ''Підсумок'': коротко резюмувати матеріал та логічно підвести до
    наступної теми — вставних слів і конструкцій.'
