slug: numeral-declension-time-dates
title: 'Відмінювання числівників І: Час і дати'
word_target: 4000
content_outline:
- section: 'Вступ: Культурний код і циклічність часу'
  words: 600
  points:
  - 'Аналіз сучасного ритму: контраст між традиційним сприйняттям (''Всякому овочеві
    свій час'') та урбаністичним розкладом поїздів, що вимагає точності.'
  - Етимологія місяців як мнемонічний прийом (січень, лютий, березень) та їхня мовна
    автономія від латинських запозичень.
  - 'Огляд викликів: складність відмінювання складених числівників у повсякденному
    сучасному житті (новини, розклади).'
- section: 'Час: від теорії до живого мовлення'
  words: 1000
  points:
  - Розрізнення питання 'Котра година?' (точка в часі, порядкове поняття) та 'Скільки
    годин / скільки часу?' (тривалість), подолання російської кальки.
  - 'Прийменникові конструкції за Стандартом: вживання ''пів на першу'', ''двадцять
    по вісімнадцятій'', ''за п''ятнадцять четверта''.'
  - 'Виправлення русизмів: заміна ''без десяти сім'' на ''за десять сьома'' або ''десять
    до сьомої''.'
  - Відмінювання порядкових числівників у часових виразах ('о другій', 'після дванадцятої')
    з використанням таблиць.
- section: 'Датування: точність у днях та роках'
  words: 900
  points:
  - 'Граматика дати: називний відмінок для простої констатації (''Сьогодні перше січня'')
    та обов''язковий родовий для відповіді на ''коли?'' (''першого вересня'').'
  - 'Корекція типових помилок: відпрацювання правильної форми у родовому відмінку
    (уникнення помилкової форми ''народився перше травня'').'
  - 'Часові межі: використання прийменників з датами (з, по, до, після) та правила
    відмінювання складених числівників у роках (''у дві тисячі двадцять шостому році'').'
- section: 'Офіційно-діловий контекст: терміни та строки'
  words: 900
  points:
  - 'Професійна лексика: розмежування понять ''термін'' (deadline / кінцева точка)
    та ''строк'' (duration / проміжок часу) в офіційних документах.'
  - 'Регістр мовлення: перехід від розмовного формату (''пів на третю'') до офіційного
    24-годинного (''чотирнадцята тридцять'') у новинах і протоколах.'
  - 'Стандарти документації: правильне відмінювання числівників під час запису складних
    термінів виконання (''протягом двадцяти трьох днів'').'
- section: Практичний практикум та синтез
  words: 600
  points:
  - 'Інтерактивний аналіз: порівняння правильних і помилкових конструкцій у повсякденних
    діалогах.'
  - 'Симуляція роботи логіста: створення сучасних графіків з використанням академічної
    лексики (''процес'', ''метод'', ''аналіз'').'
  - 'Синтез навичок: розбір текстів (новин, оголошень) на предмет правильного вживання
    дат і часу.'
