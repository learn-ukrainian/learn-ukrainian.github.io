slug: word-formation-person-suffixes
title: 'Словотворення: суфікси на позначення осіб'
word_target: 4000
content_outline:
- section: 'Вступ: Словотвір як інструмент концептуалізації'
  words: 600
  points:
  - 'Введення від персони (Professional Language Coach): словотворення як потужна
    аналітична система (перехід від зазубрювання окремих слів до генерації лексики
    на рівні B2).'
  - 'Цитування Державного стандарту §4.2.5: як утворюються назви осіб за видом діяльності.'
  - 'Культурний гачок: коротка згадка про Івана Франка («Каменярі») для демонстрації
    того, як суфікс може перетворити звичайну професію на національний концепт.'
- section: 'Суфікс -ар/-яр: Від професії до національного символу'
  words: 1000
  points:
  - Механізм утворення від іменників та дієслів (бібліотека → бібліотекар, лікувати
    → лікар, вівця → вівчар).
  - 'Чітке фонологічне правило з наочними прикладами: твердий/м''який приголосний
    перед суфіксом диктує вибір між -ар та -яр (камінь → каменяр).'
  - 'Запобігання помилкам: вичерпне пояснення відсутності м''якого знака після ''р''
    у називному відмінку (лікар, секретар).'
  - 'Поглиблений культурний контекст: кобзарство як духовний охоронець історії; каменяр
    як проактивний творець майбутнього.'
- section: 'Суфікс -ач: Виконавець дії та активний діяч'
  words: 800
  points:
  - Виведення іменників від дієслівних основ (викладати → викладач, читати → читач,
    слухати → слухач).
  - 'Підкреслення семантики ''активного суб''єкта'': аналіз відмінностей від пасивних
    моделей; використання фемінітивів у діловому/академічному стилі (викладач / викладачка).'
  - 'Діагностика типових помилок: розбір неіснуючих форм (наприклад, чому «викладач»,
    а не помилковий «викладник»).'
- section: 'Суфікс -ник: Рід занять, ролі та соціальні групи'
  words: 800
  points:
  - Базові правила утворення від іменників та прикметників (робота → робітник, письмо
    → письменник, художній → художник).
  - 'Глибока прагматична диференціація: порівняльний аналіз лексем «робітник» (кваліфікована
    фізична праця) та «працівник» (найманий працівник загалом) з прикладами контекстного
    використання.'
  - 'Розгляд іменників, що позначають роль у соціальній групі: учасник, спільник,
    союзник.'
  - Mermaid-діаграма або узагальнювальна таблиця для системного порівняння функцій
    суфіксів -ар, -ач та -ник.
- section: 'Практика та синтез: Рекрутинг та аналіз текстів'
  words: 800
  points:
  - 'Введення контексту «Рекрутер»: розбір фрагмента професійної посадової інструкції
    (job advert) із насиченим використанням назв осіб.'
  - 'Вправа на розпізнавання: визначення словотвірних ланцюжків (твірна основа + суфікс)
    у заданому автентичному тексті.'
  - Аналіз стилістичного забарвлення утворених слів (науковий vs розмовний регістр).
  - Короткий бліц для самоперевірки (вибір правильного суфікса для нової основи).
