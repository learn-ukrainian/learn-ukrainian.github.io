slug: synonymy-practice-precision
title: Точність слововживання
word_target: 4000
content_outline:
- section: Вступ — чому точність має значення
  words: 600
  points:
  - 'Окремий підрозділ (H3) для визначення лексичної точності на рівні B2: перехід
    від базового словникового запасу до філігранного вибору слів.'
  - 'Культурний гачок: згадка про словник Святослава Караванського, укладений у радянських
    таборах, як боротьбу за збереження питомої української лексики.'
  - 'Практичні наслідки неточного вибору: наведення прикладів, як неправильний синонім
    (напр., «економний» vs «скупий») змінює тональність розмови.'
- section: Типові помилки синонімії та русизми
  words: 800
  points:
  - 'Окремий підрозділ (H3) для розмежування схожих за значенням слів: «рахувати»
    (математична дія) vs «вважати» (власна думка).'
  - 'Детальний розбір лексичних кальок (H3): етимологія та системна заміна виразів
    («приймати міри» → «вживати заходів», «приймати участь» → «брати участь»).'
  - 'Аналіз хибних друзів перекладача (H3): огляд слів, які виглядають подібно у слов''янських
    мовах, але мають різне значення («неділя» vs «тиждень»).'
  - Використання порівняльної таблиці для чіткого протиставлення найпоширеніших русизмів
    та автентичних українських відповідників.
- section: Плеоназм і тавтологія
  words: 700
  points:
  - 'Визначення плеоназму (H3) із розбором класичних помилок дублювання сенсу: «вільна
    вакансія», «спільна співпраця», «моя особиста думка».'
  - Визначення тавтології (H3) як невиправданого повтору спільнокореневих слів («працювати
    на роботі»).
  - 'Окремий підрозділ про правило лаконічності: надання речень до та після стилістичного
    редагування з вилученням зайвих елементів.'
- section: Контекстний вибір синонімів — вправи
  words: 900
  points:
  - 'Розбір лексичної сполучуваності (H3): пояснення обмежень на прикладах (чому очі
    «карі», а не «коричневі»; чому друзі «щирі», а вороги «затяті»).'
  - 'Градація за інтенсивністю (H3): побудова синонімічних шкал (тихий → спокійний
    → мовчазний → мовчкуватий) для визначення точного відтінку.'
  - 'Вплив оцінної конотації (H3): порівняння нейтральних слів із позитивно чи негативно
    забарвленими синонімами (розумний vs хитрий vs підступний).'
- section: Редагування для точності — просунута практика
  words: 1000
  points:
  - 'Покроковий алгоритм саморедагування тексту (H3): 1. Пошук повторів, 2. Перевірка
    конотації, 3. Усунення плеоназмів, 4. Заміна русизмів.'
  - 'Порівняльний аналіз тексту (H3): детальний розбір абзацу до та після редагування
    з обґрунтуванням кожної заміни.'
  - Стратегія побудови персонального «синонімічного словника» (H3) для систематизації
    та впровадження нових точних відповідників у щоденне мовлення.
