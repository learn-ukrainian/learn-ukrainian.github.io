slug: checkpoint-passive-voice
title: Контрольний модуль B2.1a — Система пасивного стану
word_target: 4000
content_outline:
- section: Вступ — Що ми вивчили
  words: 400
  points:
  - 'Огляд модулів B2.1a (01-09): консолідація знань про пасивні конструкції та активні
    дієприкметники.'
  - 'Принцип «Агентності» в українській мові: чому ми віддаємо перевагу активним формам
    («Ми вирішили») над пасивними («Було вирішено») у повсякденні.'
  - Критерії оцінювання за Державним стандартом 2024 (§4.3.3.1 щодо безособових речень)
    та дескрипторами CEFR B2.
- section: 'Навичка 1: Чотири форми пасиву'
  words: 800
  points:
  - 'Пасивні дієприкметники на -ний/-тий: правила узгодження, творення та семантичні
    нюанси.'
  - 'Безособові конструкції на -но/-то: використання для вираження результативності
    («Там усе правильно записано»).'
  - 'Зворотний пасив на -ся: аналіз помилки «самодіяльних об''єктів» (наприклад, «дім
    будується» замість «дім будують»).'
  - Третя особа множини як найприродніший український еквівалент пасиву (неозначено-особові
    речення).
  - 'Проблема агенса в орудному відмінку: чому конструкції типу «робота написана студентом»
    звучать неорганічно.'
- section: 'Навичка 2: Вибір форми за регістром'
  words: 800
  points:
  - 'Офіційно-діловий регістр: панування безособових форм на -но/-то як ознаки «бюрократичної
    об’єктивності» та державного авторитету.'
  - 'Науковий стиль: функціонування пасивних дієприкметників для точного опису процесів
    та станів.'
  - 'Літературний та публіцистичний стилі: стилістична гнучкість, свідомий вибір між
    пасивом та активом для зміщення фокусу.'
  - 'Розмовний регістр: повне домінування активних конструкцій, уникнення канцеляризмів
    і штучного пасиву.'
- section: 'Навичка 3: Активні дієприкметники та русизми'
  words: 800
  points:
  - 'Деконструкція «активної пастки»: чому форми на -учий/-ючий суперечать духу і
    милозвучності української мови.'
  - 'Трансформація типових русизмів: заміна («бажаючі» → «охочі», «виступаючий» →
    «доповідач», «працюючий» → «той, що працює»).'
  - 'Дієприкметники минулого часу на -лий: лексикалізовані природні форми (пожовклий,
    зів’ялий).'
  - 'Практика стилістичного редагування: заміна непитомих дієприкметників підрядними
    означальними реченнями.'
- section: Діагностичні завдання
  words: 400
  points:
  - 'Комплексний тест на ідентифікацію: розпізнавання чотирьох типів пасиву в автентичних
    текстах різного стилю.'
  - 'Вправи на трансформацію: перетворення активу в пасив відповідного регістру (наприклад,
    перетворення новини на офіційний звіт) та навпаки.'
  - 'Редагування «канцеляризмів» та русизмів: виправлення невдалого вживання пасиву
    і форм на -учий/-ючий у розмовному контексті.'
- section: Самооцінка і план
  words: 400
  points:
  - 'Діагностика знань: самостійне виявлення прогалин у вживанні форм на -но/-то та
    відмінюванні дієприкметників.'
  - 'Чек-лист умінь: перевірка компетенції «Я можу змінити регістр повідомлення, використовуючи
    різні форми пасиву».'
  - 'План переходу до фази B2.1b: зв''язок вивченого матеріалу зі складними реченнями
    та подальшим поглибленням у стилістику.'
- section: Підсумок
  words: 400
  points:
  - 'Систематизація вивченого: пасив як потужний інструмент стилістики, а не лише
    суха граматична конструкція.'
  - Рефлексія над «голосом держави» (форми на -но/-то) та «голосом людини» (активні
    конструкції).
