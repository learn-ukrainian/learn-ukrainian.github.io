slug: register-religious-epistolary
title: Регістр — Релігійний та епістолярний стилі
word_target: 4000
content_outline:
- section: Вступ — Регістри високого стилю
  words: 600
  points:
  - 'Представити концепцію регістру: як мова змінюється залежно від контексту та адресата.
    Визначити релігійний та епістолярний стилі як частину ''високої'' культури мовлення.'
  - 'Культурний хук: розповісти про Пересопницьке Євангеліє як символ злиття сакрального
    (церковного) та народного (розмовного) стилів, на якому присягають Президенти.'
  - 'Пояснити, що об''єднує ці два стилі: повага до адресата, піднесеність інтонації
    та специфічний етикет.'
  - Зазначити, що цей модуль має 100% занурення в українську мову без англійського
    скафолдингу.
- section: Релігійний стиль — Мова духовності
  words: 900
  points:
  - 'Охарактеризувати лексичний пласт релігійного стилю: специфічні терміни (Господь,
    парафія, священник) та слова з піднесеним значенням (воістину, благословіння).'
  - Навести таблицю сталих формул і повсякденних висловів релігійного походження,
    які увійшли в загальний вжиток («Слава Богу!», «Христос воскрес!»).
  - 'Здійснити стилістичний аналіз короткого сакрального/молитовного тексту: звернути
    увагу на метафоричність, архаїчні форми слів та врочисту тональність.'
  - Пояснити, що багато церковних термінів в українській мові зберегли автентичне
    звучання, що є частиною національної ідентичності.
- section: Епістолярний стиль — Від класики до цифрової доби
  words: 900
  points:
  - 'Зробити історичний екскурс: листування українських класиків (Лесі Українки та
    Ольги Кобилянської) як зразок інтимно-епістолярного стилю, експерименти зі звертаннями
    («Хтось»).'
  - 'Проаналізувати сучасну ділову переписку (email): як класичні формули адаптувалися
    до цифрового середовища.'
  - 'Створити довідкову таблицю-шаблон сучасного ділового листа: етикетні кліше для
    початку («Шановний пане/пані»), середини («У вкладенні надсилаю...») та завершення
    («З повагою, ...», «Щиро Ваш...»).'
  - Показати різницю між офіційним листуванням та неформальним повідомленням у месенджерах.
- section: Граматика — Мистецтво звертання
  words: 800
  points:
  - 'Детально розібрати кличний відмінок (Vocative case): пояснити, що українська
    мова вимагає його для будь-якого звертання (акцентований адресат мовлення за Державним
    стандартом).'
  - 'Навести парадигму творення кличного відмінка з особливим акцентом на складні
    випадки: іменники м''якої групи на -р (Ігор → Ігорю, лікар → лікарю).'
  - Розібрати конструкцію «пан/пані + прізвище або ім'я» та її відмінювання (пане
    Ковалю, пане Максиме).
  - 'Проаналізувати та спростувати поширені помилки: чому треба казати «Привіт, Андрію!»
    (не Андрій) та чому правильне вітання — «Добрий день!» (не Доброго дня, яке є
    калькою і доречне лише у побажаннях).'
- section: Практика та трансформація
  words: 800
  points:
  - 'Надати зразки (міні-кейси) двох листів: один формальний (скарга або запит) та
    один неформальний (другові), демонструючи правильне використання кличного відмінка
    та регістрів.'
  - 'Запропонувати аналітичну вправу-приклад: взяти нейтральне коротке повідомлення
    і трансформувати його спочатку в урочистий (або релігійний) стиль, а потім — у
    формальний діловий.'
  - Розібрати типові помилки (learner errors) на реальних прикладах неправильних звертань
    з інтернету та пояснити логіку виправлення.
  - Зробити загальний підсумок модуля, наголосивши на важливості вибору правильного
    регістру для успішної комунікації.
