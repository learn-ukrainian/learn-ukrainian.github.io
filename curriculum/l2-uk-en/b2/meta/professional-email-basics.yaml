slug: professional-email-basics
title: 'Ділова пошта: Основи'
word_target: 4000
content_outline:
- section: 'Вступ: Етика та культура ділового листування'
  words: 600
  points:
  - Розкрити роль електронної пошти як головного інструменту в українському бізнесі
    з акцентом на традиційно високий рівень початкової формальності.
  - Пояснити правило використання займенника «Ви» з великої літери при зверненні до
    однієї особи як обов'язковий маркер професійної поваги.
  - Спростувати використання «Доброго дня!» (родовий відмінок) як типову граматичну
    помилку; пояснити, чому нормативним є називний відмінок «Добрий день!» або дієслівне
    «Вітаю!».
  - Обговорити різницю між застарілим бюрократичним стилем (канцеляритом) та сучасним,
    ввічливим і конструктивним діловим тоном.
- section: Структура та оформлення листа
  words: 800
  points:
  - Сформулювати правила створення чітких тем листа (Subject Line), порівнюючи абстрактні
    варіанти («Питання») з конкретними («Запит щодо контракту №123»).
  - 'Розібрати стандартну архітектуру листа: Тема → Звертання → Контекст → Основна
    частина → Заклик до дії (Call to Action) → Завершення.'
  - Деталізувати використання кличного відмінка для імен та по батькові у звертаннях
    («Шановний пане Олександре!», «Вельмишановна пані Олено!»).
  - Надати вичерпний перелік формул прощання («З повагою», «З найкращими побажаннями»,
    «Щиро Ваш/а») та критерії їх вибору залежно від дистанції.
- section: Мовні особливості та професійна лексика
  words: 1000
  points:
  - Ввести ключову професійну лексику рівня B2 (термін дії, ключове поняття, робочий
    процес, детальний аналіз) з прикладами контекстного вживання.
  - Пояснити явище номіналізації (§4.2.6 Державного стандарту) — перетворення дієслів
    на іменники з суфіксами -ння/-ення («ми вирішили» → «прийняття рішення») для підвищення
    регістру.
  - Навчити формулювати ввічливі запити за допомогою умовного способу та модальних
    дієслів («Чи не могли б Ви...», «Будемо вдячні за...»).
  - 'Продемонструвати техніку позитивного перефразування: як перетворити звинувачення
    («Ви не надіслали») на орієнтований на результат запит («Очікуємо на Ваші матеріали...»).'
- section: Робота над помилками та типові кальки
  words: 800
  points:
  - 'Проаналізувати та виправити типові кальки з російської мови, відновлюючи питомо
    українське керування: «брати участь» замість штучного «приймати участь».'
  - 'Розглянути помилки у використанні прийменників та фразеологізмів: нормативне
    «протягом» (замість «на протязі»), «вживати заходів» (замість «приймати міри»),
    правильне керування «згідно з» + орудний відмінок.'
  - Пояснити недоречність напівформальних та калькованих вітань («Доброго часу доби»,
    «Привіт») у першому професійному контакті.
  - 'Надати наочний приклад: проаналізувати та відредагувати текст листа, написаного
    суржиком, перетворивши його на взірцеве ділове повідомлення.'
- section: Типологія та практичне застосування
  words: 800
  points:
  - Навчити структурувати лист-запит та лист-подяку відповідно до вимог Державного
    стандарту (§1.3.1.1).
  - Розібрати структуру листа-відповіді та листа-пояснення, звертаючи увагу на ввідну
    конструкцію «У відповідь на Ваш лист...».
  - Надати мовні інструменти для делікатного листа-нагадування, щоб ефективно контролювати
    терміни без зайвої категоричності.
  - 'Завершити підсумковим практичним кейсом: моделювання повного ділового листа для
    вирішення комплексної робочої ситуації.'
