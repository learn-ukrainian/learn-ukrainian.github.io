slug: checkpoint-morphology
title: 'Контрольна точка: морфологія'
word_target: 4000
content_outline:
- section: 'Вступ та огляд: Контрольна точка B2.1c'
  words: 400
  points:
  - 'Огляд цілей контрольної точки: перевірка засвоєння складних числівників, віддієслівних
    іменників та односкладних речень.'
  - 'Презентація тематичного фокуса: життя та спадщина Михайла Кравчука, репресованого
    українського генія математики.'
  - Опис контексту створення української наукової термінології у 1920-х роках.
- section: Числівники та математична спадщина
  words: 1000
  points:
  - Огляд відмінювання кількісних числівників (5-20, 30, 40, 50-80, 90, 100) на матеріалі
    біографії вченого (роки, кількість наукових праць).
  - 'Окрема таблиця-нагадування: відмінювання десятків (50-80) з акцентом на незмінності
    першої частини кореня (п''ятдесяти, шістдесятьом).'
  - 'Правила узгодження: різниця між ''2, 3, 4'' (Н.в. множини) та ''5+'' (Р.в. множини).'
  - 'Позначення часу в офіційному стилі: конструкції з прийменниками ''о'', ''по'',
    ''за'' (о сьомій годині, за десять восьма).'
- section: Словотвір та наукова термінологія
  words: 900
  points:
  - 'Моделі творення віддієслівних іменників на позначення процесів та абстрактних
    понять (суфікси -нн-, -енн-, -інн-: обчислення, доведення, дослідження).'
  - Творення прикметників від іменників для наукових термінів (матричний, поліноміальний).
  - Контекстуальне використання видових пар дієслів (доводити/довести) та префіксальних
    дієслів руху, що описують наукову діяльність.
- section: Синтаксис односкладних речень
  words: 900
  points:
  - 'Аналіз означено-особових та неозначено-особових речень: їхня роль у наукових
    інструкціях та викладі фактів.'
  - 'Безособові конструкції: передача станів, констатація історичних фактів (було
    видано, заарештовано) у біографічних текстах.'
  - 'Номінативні речення: специфіка використання у заголовках наукових праць, словників
    та математичних описах.'
- section: 'Практикум: Аналіз помилок та регістрів'
  words: 800
  points:
  - 'Завдання на виявлення типових помилок: відмінювання десятків та узгодження числівників
    з іменниками.'
  - 'Аналіз трансформації стилю: порівняння сухого наукового викладу (словникова стаття)
    з епістолярним стилем (особисті листи Кравчука).'
  - Підсумковий чекліст для самооцінки студента перед переходом до вивчення фразеології
    у фазі B2.2.
