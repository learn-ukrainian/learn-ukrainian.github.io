slug: integration-practice
title: Практика інтеграції B2.2
word_target: 4000
content_outline:
- section: 'Вступ: Мова як цілісна система'
  words: 600
  points:
  - 'Оголошення 100% українськомовного формату: роль Системного аналітика у процесі
    інтеграції компонентів B2.2.'
  - Аналіз культурного гасла «Слово до слова — зложиться мова» як методології накопичення
    знань.
  - 'Огляд вивченого (через H3): зв''язок між прислів''ями (M45-46), ідіомами (M47-54)
    та синонімами (M55-66).'
  - 'Визначення цілей модуля: перехід від ізольованих мовних одиниць до синтезу складних
    повідомлень.'
- section: Стилістичні засоби лексики за стандартом §4.4.1.2
  words: 900
  points:
  - Кожен стилістичний засіб (синоніми, антоніми, епітети, метафори) розглядається
    в окремому H3 з визначенням та таблицею прикладів.
  - Практичне застосування синонімічних рядів для адаптації тексту до різних стилів.
  - 'Інтеграція ідіом у художній та публіцистичний тексти: аналіз впливу на експресивність.'
  - Вживання прислів'їв як інструменту аргументації та підкріплення тези (Mastery
    §4.4.1.2).
  - 'Вбудована вправа на вибір оптимального синоніма: перетворення нейтрального повідомлення
    на професійне (на основі цільової лексики).'
- section: Синтаксичний синтез та складні речення §4.3.4
  words: 1000
  points:
  - Поєднання фразеології зі складними сполучниками (M67-68) у складнопідрядних реченнях
    (різні типи підрядності виділені в H3).
  - 'Побудова речень зі з’ясувальною та обставинною частинами (умови, допусту, причини)
    із включенням слів: термін, поняття, процес.'
  - 'Синтез §4.3.4 та §4.4.1.2: використання метафор та епітетів у структурах зі складним
    підпорядкуванням (мінімум 4 приклади).'
  - 'Трансформація тексту (покроковий приклад): поєднання коротких простих речень
    у складні синтаксичні конструкції без втрати фразеологізмів.'
- section: 'Лабораторія відлагодження: Типові помилки'
  words: 800
  points:
  - Кожна категорія помилок подається в окремому H3 з таблицею 'Баг → Алгоритм → Фікс'.
  - 'Відлагодження дієприслівникових зворотів: виправлення конструкцій типу «Читаючи
    книгу, мені стало цікаво» з поясненням узгодження суб''єкта.'
  - 'Ідентифікація та усунення кальок: «брати участь» (а не приймати), «зрештою» (а
    не в кінці кінців).'
  - 'Оптимізація стилю: боротьба з плеоназмами та тавтологією («у квітні місяці»,
    «головний пріоритет»).'
  - Деколонізаційна ремарка щодо питомої синтаксичної структури української мови.
- section: Комплексне застосування та підготовка до M70
  words: 700
  points:
  - Зразкове есе Системного аналітика на професійну тематику з використанням 3+ прислів'їв
    та 5+ ідіом (оформлене в callout).
  - 'Аналіз тексту есе: пошук засобів лексичної стилістики та пояснення їхньої функції.'
  - Підсумок рівня B2.2 через призму приказки «Птицю пізнати по пір'ю, а людину по
    мові».
  - Чекліст самооцінки (H3) для перевірки готовності до контрольної точки M70 та переходу
    до фази B2.3 (доменна лексика).
