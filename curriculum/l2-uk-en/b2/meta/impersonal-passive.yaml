slug: impersonal-passive
title: Безособові конструкції на -но/-то
word_target: 4000
content_outline:
- section: 'Вступ: Поняття безособовості'
  words: 500
  points:
  - 'Сформулювати концепцію безособовості: фокус виключно на результаті дії та констатації
    факту, а не на виконавцеві.'
  - 'Пояснити культурний контекст: контраст між філософським фаталізмом у літературі
    («Так судилося») та сухою сучасною діловою мовою («Оголошено тривогу»).'
  - Навести вимогу Державного стандарту (§4.3.3.1) щодо використання безособових речень
    як інструменту об'єктивного опису дійсності.
- section: Творення та граматичні особливості
  words: 800
  points:
  - Детально описати трансформацію пасивного дієприкметника на -ний/-тий у незмінну
    безособову форму на -но/-то (написаний → написано, відкритий → відкрито).
  - Створити наочну таблицю правил вибору суфікса (-но чи -то) залежно від основи
    дієслова, звернувши увагу на наголошування та можливі чергування.
  - Чітко розмежувати стан об'єкта («Вікно розбите») і саму дію/факт («Вікно розбито»),
    надавши парні приклади для порівняння значень.
  - 'Пояснити морфологічну незмінність форми: чому вона візуально нагадує середній
    рід, але ніколи не узгоджується з іншими словами.'
- section: Синтаксис та керування об'єктом
  words: 900
  points:
  - 'Сформулювати ключове синтаксисне правило: об''єкт завжди стоїть у знахідному
    відмінку (Accusative), а не в називному («Книгу написано», «Проєкт завершено»).'
  - 'Пояснити сувору заборону на використання орудного відмінка для позначення діяча:
    чому конструкція «Книгу написано автором» є граматичною помилкою.'
  - Провести детальний синтаксичний розбір типового речення на -но/-то, підкресливши
    принципову відсутність підмета.
  - Надати порівняльну таблицю з іншими типами безособових конструкцій (наприклад,
    з безособовими дієсловами на -ло) для чіткого розмежування їхніх синтаксичних
    функцій.
- section: Офіційно-діловий та юридичний стиль
  words: 1000
  points:
  - 'Проаналізувати високу частотність форм на -но/-то в офіційних документах: наказах,
    протоколах, постановах («Засідання оголошено закритим»).'
  - Навести розбір реальних прикладів використання юридичної лексики для надання тексту
    нейтральності («Рішення прийнято», «Закон затверджено»).
  - 'Проілюструвати адміністративний та технічний контексти застосування: «Встановлено
    порушення», «Строк визначено», «Умови погоджено».'
  - 'Показати специфіку вживання у сучасних українських медіа та новинах: «Новину
    підтверджено», «Оголошено повітряну тривогу», «Атаку відбито».'
- section: Практика та запобігання помилкам
  words: 800
  points:
  - Розібрати типову помилку №1 (називний замість знахідного) та надати блок інтенсивного
    тренування на заміну відмінків («Двері відчинено», «Статтю опубліковано»).
  - Розібрати типову помилку №2 (діяч в орудному відмінку) та надати чіткий алгоритм
    перефразування помилкових речень у природний активний стан.
  - Включити стилістичні вправи на трансформацію звичайних активних речень у безособові
    форми для написання офіційних звітів.
  - Зробити лаконічний підсумок про роль конструкцій на -но/-то у формуванні професійної
    мовної компетенції рівня B2 та підготовку до складніших текстів.
