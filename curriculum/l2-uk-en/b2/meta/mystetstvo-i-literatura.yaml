slug: mystetstvo-i-literatura
title: Мистецтво і література
word_target: 4000
content_outline:
  - section: 'Розминка та вступ: Культурний ландшафт України (Warm-up & Introduction:
      Cultural Landscape of Ukraine)'
    words: 500
    points:
      - 'Україна як перехрестя культур: Вплив Візантії, Західної Європи та Великого
        Степу на формування ідентичності.'
      - 'Державний стандарт (§3.4): Огляд культурного дозвілля — відвідування музеїв,
        картинних галерей та філармоній як шлях до розуміння коду нації.'
      - 'Роль сучасного мистецтва в умовах війни: Мистецтво як засіб рефлексії, спротиву
        та збереження колективної пам''яті.'
  - section: 'Мистецька спадщина та авангард: Від Малевича до Бойчука (Artistic Heritage
      & Avant-Garde: From Malevich to Boichuk)'
    words: 800
    points:
      - 'Казимир Малевич: Київське походження митця та зв''язок супрематизму з українським
        народним мистецтвом (розпис печей, орнаменти вишивки).'
      - 'Михайло Бойчук та школа бойчукістів: Концепція неовізантизму як спроба відродження
        монументального стилю Київської Русі.'
      - 'Трагедія Розстріляного відродження: Втрачені шедеври та вплив ідеологічного
        тиску на розвиток українського модернізму.'
  - section: 'Народне мистецтво: Символіка та традиції (Folk Art: Symbolism & Traditions)'
    words: 700
    points:
      - 'Петриківський розпис (ЮНЕСКО): Техніка роботи пензлем з котячої шерсті («котячка»)
        та семантика символів (калина — дівоча краса, дуб — сила).'
      - 'Народний іконопис: Поєднання канонічної традиції з народною естетикою та
        колористикою.'
      - 'Термінологічна чистота: Розрізнення понять «живопис» та «картина», використання
        слова «митець» замість загального «художник».'
  - section: 'Літературні обрії: Від класики до сучасності (Literary Horizons: From
      Classics to Modernity)'
    words: 800
    points:
      - 'Золотий фонд класики: Глибинні образи у творчості Тараса Шевченка, Івана
        Франка та Лесі Українки.'
      - 'Еволюція жанрів: Від шістдесятників-дисидентів до постмодернізму та сучасної
        інтелектуальної прози (Забужко, Андрухович, Жадан).'
      - 'Взаємозв''язок слова та образу: Як література впливає на візуальне мистецтво
        та кінематограф.'
  - section: 'Мистецька критика: Лексика та стилістика (Art Criticism: Vocabulary
      & Stylistics)'
    words: 700
    points:
      - 'Стилістичні засоби (§4.4.1.2): Практика використання епітетів та метафор
        (глибокий зміст, теплий колорит, сюжетна лінія) для аналізу творів.'
      - 'Типові помилки: Усунення кальки «присутні кольори» (вживаємо «переважають/використано»)
        та правильний вибір дієслів для настрою («навіювати», «створювати» замість
        «викликати»).'
      - 'Уникнення тавтології: Як не писати «художник зобразив зображення», використовуючи
        синоніми «відтворив», «змалював», «показав».'
  - section: 'Практика та підсумок: Рецензія як жанр (Practice & Summary: Review as
      a Genre)'
    words: 500
    points:
      - 'Аналіз форми та змісту: Складання плану мистецького розбору літературного
        уривку або полотна.'
      - 'Написання міні-рецензії: Використання оціночної лексики (новаторський, майстерний,
        цілісний) для висловлення власної інтерпретації.'
      - 'Кураторський підсумок: Обговорення майбутнього української культури в глобальному
        контексті.'
