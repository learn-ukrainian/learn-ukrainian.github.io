slug: mystetstvo-i-literatura
title: Мистецтво і література
word_target: 5000
content_outline:
- section: 'Розминка та вступ: Культурний ландшафт України'
  words: 700
  points:
  - Пояснити концепцію України як 'перехрестя культур', фокусуючись на синтезі європейських,
    візантійських та степових традицій.
  - Описати відвідування музеїв, галерей та філармоній як частину культурного дозвілля
    згідно зі стандартом (§3.4).
  - Проаналізувати роль мистецтва під час війни як інструменту збереження колективної
    пам'яті та ідентичності.
- section: 'Мистецька спадщина та авангард: Від Малевича до Бойчука'
  words: 1000
  points:
  - 'Деколонізувати образ Малевича: розкрити вплив українського народного розпису
    та київського коріння на супрематизм.'
  - Описати школу 'бойчукістів' та спробу відродити монументалізм (фрески) часів Київської
    Русі (неовізантизм).
  - Висвітлити явище 'Розстріляного відродження', фокусуючись на новаторстві митців
    та трагедії втрачених шедеврів.
- section: 'Народне мистецтво: Символіка та традиції'
  words: 800
  points:
  - Розповісти про петриківський розпис (спадщина ЮНЕСКО), використання пензля 'котячки'
    та значення основних символів.
  - Показати специфіку народного іконопису, який поєднує строгий релігійний канон
    з місцевою народною естетикою.
  - 'Пояснити термінологічні нюанси: ''живопис'' проти ''картина'', та використання
    слова ''митець'' як стилістично вищого за ''художник''.'
- section: 'Літературні обрії: Від класики до сучасності'
  words: 1000
  points:
  - Проаналізувати глибину образів у творчості Шевченка, Франка та Лесі Українки,
    уникаючи спрощених стереотипів.
  - Зробити огляд еволюції від шістдесятників до сучасної постмодерної прози (Забужко,
    Андрухович, Жадан).
  - 'Показати взаємодію різних видів мистецтва: як сучасна українська література впливає
    на кінематограф і театр.'
- section: 'Мистецька критика: Лексика та стилістика'
  words: 700
  points:
  - 'Ввести стилістичні засоби згідно з §4.4.1.2: використання метафор та епітетів
    (''теплий колорит'', ''глибокий зміст'') в аналізі.'
  - 'Розібрати типові лексичні помилки: заміна кальки ''присутні кольори'' на ''переважають''
    та правильне використання ''навіювати настрій''.'
  - Надати лексичні інструменти для уникнення тавтологій ('художник зобразив зображення'
    -> 'митець відтворив/змалював').
- section: 'Практика та підсумок: Рецензія як жанр'
  words: 800
  points:
  - Надати структуру написання короткої рецензії або аналітичного відгуку на мистецький
    твір.
  - Продемонструвати використання оцінної лексики ('новаторський', 'цілісний', 'майстерний')
    на конкретному прикладі.
  - Зробити підсумок щодо розвитку українського мистецтва у глобальному світовому
    контексті.
