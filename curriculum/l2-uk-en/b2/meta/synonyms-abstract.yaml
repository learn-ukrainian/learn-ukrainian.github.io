slug: synonyms-abstract
title: 'Синоніми: Абстрактні Поняття та Ідеї'
word_target: 4000
content_outline:
- section: 'Вступ: Світ абстракцій'
  words: 600
  points:
  - Establish the thematic domain of 'Science and Technology' and introduce the Sociologist
    persona to guide the exploration of intellectual vocabulary.
  - 'Define the module''s core goal: mastering stylistic lexical means and synonymy
    as mandated by State Standard §4.4.1.2.'
  - 'Cultural Hook: Integrate Hryhoriy Skovoroda’s ''Philosophy of the Heart'', explaining
    how ''думка'' historically represents a spiritual, internal essence rather than
    just cold logic.'
- section: 'Одиниці мислення: Думка, ідея, погляд'
  words: 1000
  points:
  - Analyze 'думка' as a high-frequency, general unit of thinking, providing collocations
    like 'громадська думка' and 'заглибитися в думки'.
  - Contrast 'думка' with 'ідея' (a core project concept) and 'погляд' (a fixed worldview/stance).
  - 'Grammar deep-dive: Explain why ''Мій погляд на...'' cannot directly introduce
    a ''що'' clause, unlike ''Я вважаю, що...''.'
  - 'Cultural Hook: Introduce Lesya Ukrainka’s metaphor of ''твердая криця'', illustrating
    how an abstract ''ідея'' becomes a materialized weapon.'
- section: 'Системне знання: Концепція, теорія, гіпотеза'
  words: 1000
  points:
  - 'Outline the academic hierarchy of abstraction: progressing from a tentative ''робоча
    гіпотеза'' to a proven ''теорія'' and a foundational ''авторська концепція''.'
  - 'Narrative Frame: ''Щоденник науковця'' (The Scientist''s Diary) — an immersive
    reading passage demonstrating the transition from ''висунути гіпотезу'' to ''підтвердити
    теорію''.'
  - Model B2-level modal hedging («ймовірно», «можна припустити») when discussing
    unproven hypotheses in the narrative.
- section: 'Культура мовлення: Регістри та помилки'
  words: 800
  points:
  - 'Error correction: Address the common calque ''З моєї думки'', drilling the correct
    forms ''На мою думку'' and ''На мій погляд''.'
  - 'Register mismatch: Contrast casual usage (''я маю ідею'', ''моє припущення'')
    with formal academic proposals (''у мене є пропозиція'', ''теоретична база'').'
  - Explain the difference between 'переконання' (a deep, stable moral/ideological
    conviction) and 'уявлення' (a mental picture or general impression).
- section: 'Практикум: Академічне письмо'
  words: 600
  points:
  - 'Sociologist''s practical task: Analyze a short research abstract that correctly
    employs ''концепція розвитку'', ''теоретична концепція'', and ''обмінятися поглядами''.'
  - Systematize the synonyms for intellectual activity learned in this module.
  - Summarize how precise, nuanced vocabulary elevates both academic and professional
    discourse in Ukrainian.
