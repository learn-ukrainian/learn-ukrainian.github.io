slug: synonyms-emotion
title: 'Синоніми: Емоції та почуття'
word_target: 4000
content_outline:
  - section: 'Розминка: Психологія та лексика емоцій (Warm-up: Psychology and Emotional
      Lexis)'
    words: 600
    points:
      - Вступне слово психотерапевта про важливість точного іменування почуттів для
        емоційного інтелекту; розрізнення понять 'емоція' (короткочасна) та 'стан'
        (тривалий)
      - 'Аналіз нюансів: чому ''сум'' (нейтральний) і ''журба'' (поетична, екзистенційна)
        — не одне й те саме; інтенсивність та стилістичне забарвлення'
      - 'Зв''язок з фразеологією (M47-54): як ідіоми типу ''на сьомому небі від щастя''
        або ''серце стискає туга'' підсилюють експресивність мовлення'
  - section: Спектр світлих почуттів (The Spectrum of Positive Emotions)
    words: 1000
    points:
      - 'Радість vs Щастя: розрізнення нестримної, але миттєвої радості та глибокого
        стану щастя; сталі сполуки: ''світитися від радості'', ''безмежне щастя'''
      - 'Втіха vs Розвага: аналіз типової помилки учнів (Fun vs Solace); вживання
        ''втіхи'' як розради (єдина втіха, шукати втіхи) порівняно з парком ''розваг'''
      - 'Насолода: акцент на сенсорному та естетичному досвіді (естетична насолода,
        насолода від масажу), на противагу загальній ''радості'''
  - section: Глибини смутку та культурний контекст (Depths of Sadness and Cultural
      Context)
    words: 1100
    points:
      - 'Градація за інтенсивністю та тривалістю: легкий сум → смуток → тяжка журба
        → нестерпна туга → велике горе → розпач (безнадія)'
      - 'Культурний гачок: концепт ''Журба'' в українській душі та літературі (Т.
        Шевченко); персоніфікація журби у фольклорі'
      - 'Мотив ''Туга за краєм'': історичний контекст еміграції та заслання; різниця
        між тугою за минулим та тугою за Батьківщиною'
  - section: 'Практика: Мистецтво вибору точного слова (Practice: The Art of Precise
      Word Choice)'
    words: 800
    points:
      - 'Вправа на регістр: вибір синоніма для офіційного звіту про задоволення потреб
        vs художнього опису душевного болю (страждання, мука)'
      - 'Корекція помилок: розрізнення фізичного та душевного болю; доречність вживання
        слова ''насолода'' замість ''радість'' у контексті відчуттів'
      - 'Творче завдання: написання психологічного портрета персонажа у стані розпачу
        або піднесення, використовуючи специфічні колокації з дослідження'
  - section: Підсумок та рефлексія (Summary and Reflection)
    words: 500
    points:
      - 'Підведення підсумків: як розширення емоційного словника допомагає відповідати
        Стандарту B2 (§4.4.1.2) щодо стилістичного багатства'
      - 'Фінальна порада від психотерапевта: використання модальних маркерів (ймовірно,
        водночас) для опису складних, змішаних почуттів'
