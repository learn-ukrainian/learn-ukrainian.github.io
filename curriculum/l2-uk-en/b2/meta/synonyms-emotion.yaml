slug: synonyms-emotion
title: 'Синоніми: Емоції та почуття'
word_target: 4000
content_outline:
- section: 'Розминка: Психологія та лексика емоцій'
  words: 600
  points:
  - 'Вступне слово інструктора-психотерапевта про зв''язок емоційного інтелекту з
    лінгвістичним багатством: точне називання почуттів допомагає їх усвідомити.'
  - 'Концептуальне розрізнення: ''Емоція'' (короткочасна реакція) проти ''Стан'' (тривале
    почуття) в українській мові з наведенням прикладів.'
  - 'Стилістичне забарвлення: пояснення різниці між нейтральним ''сумом'' та глибокою,
    екзистенційною ''журбою''. Застереження щодо суржику (використовуємо ''смутитися'',
    ''журитися'').'
  - 'Актуалізація фразеології (з M47-54): як ідіоми (''на сьомому небі від щастя'',
    ''серце стискає туга'') допомагають передати інтенсивність.'
- section: Спектр світлих почуттів
  words: 1000
  points:
  - 'Радість проти Щастя: порівняльна характеристика. Радість як раптовий спалах (''нестримна
    радість''), щастя як тривалий глибинний стан (''безмежне щастя'').'
  - 'Втіха проти Розвага: детальний розбір типової помилки англомовних студентів (Fun
    vs Solace). ''Втіха'' як джерело розради (''знайти втіху''), ''розвага'' як активне
    проведення часу.'
  - 'Насолода: фокус на сенсорному та естетичному вимірах (''естетична насолода'',
    ''насолода від музики''). Таблиця з ключовими колокаціями для світлих почуттів.'
- section: Глибини смутку та культурний контекст
  words: 1100
  points:
  - 'Шкала інтенсивності смутку: від найлегшого до найтяжчого (легкий сум → смуток
    → тяжка журба → нестерпна туга → велике горе → розпач) з чіткими правилами вживання.'
  - 'Культурний концепт ''Журба'': місце журби в українській душі та фольклорі. Персоніфікація
    емоції (наприклад, у поезії Т. Шевченка).'
  - 'Історичний мотив ''Туга за краєм'': пояснення терміну через призму української
    історії (еміграція, заслання), розмежування звичайної ностальгії та глибинної
    туги за Батьківщиною.'
- section: 'Практика: Мистецтво вибору точного слова'
  words: 800
  points:
  - 'Стилістичний аналіз: порівняння використання лексики в офіційному контексті (звіт
    психолога) та в художньому тексті (опис страждань, душевних мук).'
  - 'Корекція помилок: розмежування ''фізичного болю'' та ''душевного болю'' / ''муки''.
    Практичні приклади правильного вибору між ''радістю'' і ''насолодою''.'
  - 'Тематичні мікро-тексти: моделювання ситуацій, де персонаж перебуває у стані розпачу
    або піднесення, з використанням досліджуваних колокацій.'
- section: Підсумок та рефлексія
  words: 500
  points:
  - 'Резюме модуля: як володіння синонімічними рядами емоцій допомагає досягти стилістичної
    компетентності згідно зі Стандартом B2 (§4.4.1.2).'
  - 'Порада щодо хеджування: використання модальних маркерів (''ймовірно'', ''водночас'',
    ''з одного боку'') для більш точного опису складних або змішаних психологічних
    станів.'
  - 'Чек-лист засвоєння: перевірка розуміння різниці між нейтральною та експресивною
    лексикою.'
