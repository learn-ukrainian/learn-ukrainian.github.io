slug: synonyms-emotion
title: 'Синоніми: Емоції та почуття'
word_target: 4000
content_outline:
- section: 'Розминка: Психологія та лексика емоцій'
  words: 600
  points:
  - 'Вступне слово психотерапевта: важливість емоційного інтелекту та чітке розрізнення
    короткочасних емоцій (реакцій) і тривалих станів.'
  - 'Чому лексичне багатство є критичним для рівня B2: перехід від базових конструкцій
    (''мені сумно'') до точного іменування переживань.'
  - 'Стилістичне забарвлення: різниця між нейтральними словами (сум) та експресивно-поетичними
    (журба); правило уникнення суржику (використовуємо ''смутитися'', ''журитися'').'
  - 'Фразеологічні підсилювачі: як ідіоми (''на сьомому небі від щастя'', ''серце
    стискає туга'') допомагають передати інтенсивність почуттів.'
- section: Спектр світлих почуттів
  words: 1000
  points:
  - 'Радість проти щастя: H3-підрозділ. Радість як миттєвий нестримний спалах (''світитися
    від радості''), щастя як тривалий глибинний стан (''безмежне щастя'').'
  - 'Втіха проти розваги: H3-підрозділ. Розбір типової помилки англомовних студентів
    (Fun vs Solace). ''Втіха'' як джерело розради в складні часи, ''розвага'' як активне
    дозвілля.'
  - 'Насолода: H3-підрозділ. Фокус на сенсорному та естетичному вимірах (''естетична
    насолода від мистецтва'', ''насолода від масажу'').'
  - 'Контекстуальні моделі: короткі життєві ситуації, де українці є активними суб''єктами
    позитивних емоцій.'
- section: Глибини смутку та культурний контекст
  words: 1100
  points:
  - 'Шкала інтенсивності: H3-підрозділ. Градація від найлегшого до найтяжчого стану
    (легкий сум → смуток → тяжка журба → нестерпна туга → велике горе → розпач) із
    чіткими правилами вживання.'
  - 'Культурний концепт ''Журба'': H3-підрозділ. Унікальне місце журби в українській
    душі, її персоніфікація у фольклорі та класичній поезії.'
  - 'Історичний мотив ''Туга за краєм'': H3-підрозділ. Пояснення специфіки туги за
    Батьківщиною через призму історії еміграції та заслань (відмінність від ностальгії).'
  - 'Деколонізований погляд: багатство лексики смутку як свідчення самобутньої, глибоко
    рефлективної культури, а не фаталізму.'
- section: 'Практика: Мистецтво вибору точного слова'
  words: 800
  points:
  - 'Стилістичний аналіз текстів: H3-підрозділ. Порівняння офіційного звіту психолога
    (нейтральна лексика) та художнього тексту (опис душевних мук).'
  - 'Корекція типових помилок: H3-підрозділ. Розмежування ''фізичного болю'' та ''душевного
    болю'', вправи на доречність вживання слова ''насолода'' замість ''радість''.'
  - 'Моделювання ситуацій: H3-підрозділ. Творчі мікро-тексти для аналізу стану персонажа
    (у стані розпачу або піднесення) з використанням специфічних колокацій.'
- section: Підсумок та рефлексія
  words: 500
  points:
  - 'Резюме: роль синонімічних рядів емоцій у досягненні стилістичної компетентності
    згідно зі Стандартом B2 (§4.4.1.2).'
  - 'Хеджування емоцій: порада від психотерапевта щодо використання модальних маркерів
    (''ймовірно'', ''водночас'') для опису складних, змішаних психологічних станів.'
  - 'Чек-лист засвоєння: запитання для самоперевірки здатності розрізняти нейтральну
    та експресивну емоційну лексику.'
