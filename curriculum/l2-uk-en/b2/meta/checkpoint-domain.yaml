slug: checkpoint-domain
title: 'Контрольна точка: фахова лексика'
word_target: 4000
content_outline:
- section: Огляд та вступ
  words: 500
  points:
  - 'Чітке пояснення цілей контрольної точки: перевірка засвоєння тем M01-M29 (пасив,
    дієприкметники, стилі) відповідно до вимог B2.'
  - Опис структури комплексного оцінювання та критеріїв успішності.
  - 'Презентація культурного контексту: еволюція українського ділового стилю від Конституції
    Пилипа Орлика до сучасної лаконічності ''Дії''.'
- section: 'Навичка 1: Пасивний стан'
  words: 800
  points:
  - 'Створення окремого H3 для форм на -но/-то: пояснення їх безсуб''єктної природи
    та переваг над калькованим ''було + дієприкметник''.'
  - 'Створення окремого H3 для аналізу помилок: трансформація ''канцеляриту'' (з інструментальним
    агентом у -ся дієсловах) у природні активні конструкції.'
  - 'Надання таблиці-порівняння: офіційно-діловий пасив проти розмовно-наукового активу.'
- section: 'Навичка 2: Дієприкметники'
  words: 800
  points:
  - 'Створення H3 для активних дієприкметників: фокус на обмеженому вживанні та морфологічній
    точності (уникнення росіянізмів).'
  - 'Створення H3 для пасивних дієприкметників: правила утворення та суворе узгодження
    з іменниками в тексті.'
  - Практичні приклади вживання дієприкметникових зворотів у складних реченнях академічного
    стилю.
- section: 'Навичка 3: Регістри та Стилі'
  words: 1000
  points:
  - 'Створення H3 для юридичного та офіційно-ділового стилю: лексичні маркери та типовий
    синтаксис.'
  - 'Створення H3 для наукового/академічного стилю: абстрактна лексика, об''єктивність
    та безособовість.'
  - 'Вправи-трансформації у тексті: переклад ''важких'' пасивних структур у зрозумілий,
    орієнтований на користувача (user-centric) активний стиль ''Дії''.'
- section: 'Навичка 4: Доменна лексика'
  words: 600
  points:
  - Групування лексики за функціональними доменами (правосуддя, управління, економіка)
    з наведенням типових колокацій.
  - Аналіз вживання ключових слів ('термін', 'поняття', 'процес', 'метод', 'аналіз',
    'дослідження') у контексті аналітичних звітів.
  - Надання міні-діалогів або уривків звітів, що демонструють правильне вживання цих
    лексем у різних регістрах.
- section: Підсумок та результати
  words: 300
  points:
  - Інтерпретація результатів самоперевірки та чек-лист готовності до наступних етапів
    (відповідність критеріям B2.1).
  - Короткий анонс та підготовка до фази B2.2, що фокусується на глибинному вивченні
    фразеології та ідіоматики.
