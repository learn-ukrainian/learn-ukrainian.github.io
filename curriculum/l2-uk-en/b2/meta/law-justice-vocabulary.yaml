slug: law-justice-vocabulary
title: Право та юстиція
word_target: 4000
content_outline:
- section: 'Вступ: Історія права та Державні стандарти'
  words: 700
  points:
  - 'Введення лексики теми згідно з §3.7 Держстандарту: обговорення прав, обов''язків
    та концепції рівності.'
  - 'Історичний аналіз «Руської Правди» Ярослава Мудрого: пояснення переходу від кровної
    помсти до системи штрафів («віра»).'
  - Етимологічний розбір слова «Правда» як найвищої форми закону та моральної справедливості.
- section: Судова система та європейська традиція
  words: 800
  points:
  - 'Опис ієрархії судів України: розмежування функцій місцевих, апеляційних судів
    та Верховного Суду.'
  - Пояснення виняткової ролі Конституційного Суду України в захисті Основного Закону.
  - 'Інтеграція культурного гачка: детальний розгляд Магдебурзького права (1494 р.)
    як свідчення європейського шляху міського самоврядування.'
- section: Учасники процесу та мовленнєва культура
  words: 800
  points:
  - 'Деталізація ролей у залі суду: суддя (Ваша честь), прокурор (державний обвинувач)
    та адвокат (захисник).'
  - 'Лексична диференціація: детальне пояснення різниці між загальним терміном «юрист»
    та спеціалізованим «адвокат».'
  - 'Корекція типових помилок: відпрацювання нормативної конструкції «давати свідчення»
    замість кальки «давати покази».'
  - 'Граматика прийменників: заміна розмовного «по закону» на офіційно-ділове «згідно
    із законом».'
- section: Класифікація справ та офіційний регістр
  words: 800
  points:
  - 'Юридичне розмежування: різниця між кримінальним злочином та адміністративним
    правопорушенням.'
  - 'Огляд спеціалізації судочинства: цивільні спори, кримінальні та господарські
    справи.'
  - 'Інтеграція граматики: демонстрація офіційного регістру через пасивні конструкції
    («санкцію погоджено», «рішення ухвалено»).'
- section: 'Судочинство: від позову до вироку'
  words: 900
  points:
  - 'Покроковий опис судового процесу: від подання позову до збору доказів і винесення
    вироку.'
  - Пояснення механізму апеляції та процедури оскарження судових рішень.
  - 'Практичний мовний аналіз: розбір фрагмента адаптованого судового рішення із застосуванням
    сталих колокацій («задовольнити позов», «відхилити скаргу»).'
  - Розробка блок-схеми (Mermaid) етапів судового процесу для візуалізації лексики.
