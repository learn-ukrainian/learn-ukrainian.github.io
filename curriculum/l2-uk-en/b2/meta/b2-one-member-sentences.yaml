slug: b2-one-member-sentences
title: Односкладні речення
word_target: 4000
content_outline:
- section: Природа односкладних речень
  words: 800
  points:
  - 'H3: Визначення за Державним стандартом §4.3.3. Пояснення структурної повноти
    без підмета з 3+ прикладами.'
  - 'H3: Стилістична роль уникнення підмета (динамізм, лаконічність). Таблиця порівняння
    двоскладних і односкладних конструкцій.'
  - 'H3: Подолання англомовної інтерференції (відсутність формального підмета ''it'').
    Розбір типової помилки надмірності.'
- section: 'Дієслівні типи: Означено-особові та неозначено-особові речення'
  words: 900
  points:
  - 'H3: Означено-особові речення. Форми дієслова (1, 2 особа). Аналіз інтимізації
    на прикладі рядків Шевченка.'
  - 'H3: Неозначено-особові речення. Використання 3-ї особи множини для фокусування
    на дії, а не на діячі (академічний регістр: ''аналізують'', ''досліджують'').'
  - 'H3: Узагальнено-особові речення у фольклорі. Розбір 3-5 українських прислів''їв
    (''Вік живи — вік учись'').'
- section: Безособові речення та категорія стану
  words: 900
  points:
  - 'H3: Безособові речення з формами на -но, -то. Таблиця трансформації активного
    стану в безособовий результат (виконано дослідження).'
  - 'H3: Конструкції з давальним відмінком (''мені холодно''). Розбір помилки ''я
    холодно'' та пояснення ролі суб''єкта стану.'
  - 'H3: Опис явищ природи та психофізичних станів. Класичний приклад Шевченка ''Смеркалося...
    Розвиднялось...''.'
- section: Номінативні речення та динаміка тексту
  words: 700
  points:
  - 'H3: Структура номінативних речень (головний член — іменник). Використання для
    створення статичних ''картин'' простору.'
  - 'H3: Відмінність номінативних від неповних еліптичних двоскладних. Контекстуальний
    аналіз на 3+ прикладах.'
  - 'H3: Сучасне використання в копірайтингу та рекламі (ефект ''присутності''). Приклади
    сучасних слоганів.'
- section: Практичний синтез та трансформація
  words: 700
  points:
  - 'H3: Алгоритм трансформації двоскладних речень на односкладні для академічного
    стилю. Flowchart вибору типу речення.'
  - 'H3: Аналіз тексту. Уривок академічного тексту (150 слів) з виділеними чотирма
    типами речень для самоперевірки.'
  - 'H3: Творче завдання. Інструкція до написання міні-опису дослідження (використовуючи
    слова: аналіз, синтез, метод) виключно односкладними реченнями.'
