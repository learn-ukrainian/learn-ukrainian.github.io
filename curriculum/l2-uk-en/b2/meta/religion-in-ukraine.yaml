slug: religion-in-ukraine
title: Релігія в Україні
word_target: 4000
content_outline:
- section: 'Розминка: Релігійний ландшафт України'
  words: 600
  points:
  - 'Вступ до конфесійного різноманіття України: подати загальну статистику (понад
    34 000 релігійних організацій) та описати присутність православ''я, греко-католицизму,
    протестантизму, ісламу та юдаїзму.'
  - Інтегрувати культурний гачок про концепцію «Київ — Другий Єрусалим» часів Петра
    Могили та Івана Мазепи, пояснити топографічну імітацію на прикладі Софії Київської.
  - Використати абстрактну лексику (релігія, віра, конфесія) у контексті формування
    української ідентичності як простору плюралізму.
- section: Православ'я та Церква в історичному контексті
  words: 800
  points:
  - Пояснити історичне значення отримання Томосу про автокефалію ПЦУ у 2019 році як
    повернення до канонічної справедливості.
  - 'Описати трансформацію ролі церкви під час повномасштабної війни: волонтерський
    рух, молитви за воїнів та розвиток інституту військового капеланства.'
  - 'Граматичний фокус (Standard §4.3.4.1): надати пояснення та 3-4 приклади використання
    складнопідрядних речень зі з’ясувальною частиною (сполучники що, щоб) для опису
    церковних догматів та історичних рішень.'
- section: Релігійні свята, традиції та мовна норма
  words: 1000
  points:
  - 'Описати традиції найбільших свят: Різдво (пояснення переходу на 25 грудня) та
    Великдень (паска, писанки), а також концепцію прощі до святих місць.'
  - 'Провести лексичний аналіз: чітко розмежувати використання іменника «свято» та
    прикметника «святий» (напр., «Сьогодні свято» vs «Святий вечір») з чіткими прикладами.'
  - 'Сформулювати мовну норму щодо привітань: пояснити структурну помилковість кальки
    «З наступаючим святом!» та закріпити нормативні варіанти «З прийдешнім святом!»
    або «Зі святом!».'
- section: Міжконфесійний діалог та толерантність
  words: 800
  points:
  - Представити Всеукраїнську раду церков і релігійних організацій (ВРЦіРО) як унікальну
    модель мирного співіснування.
  - Розкрити поняття екуменізму та підкреслити релігійну толерантність як фундаментальну
    цінність сучасного українського суспільства.
  - 'Граматичний фокус (Standard §4.3.4.2): пояснити та навести 3-4 приклади побудови
    складнопідрядних речень з означальною частиною (сполучні слова ''який'', ''котрий'',
    ''що'') для характеристики релігійних громад та організацій.'
- section: Підсумок та лексична практика
  words: 800
  points:
  - Синтезувати головні ідеї про вплив релігії та толерантності на національну стійкість.
  - 'Детально розібрати синтаксичне керування дієслова «вірити»: конструкція «вірити
    в» + Зн.в. (віра в Бога, віра в ЗСУ) проти «вірити» + Дав.в. для людей (вірити
    капеланові).'
  - Розрізнити терміни «конфесія» (науковий/публіцистичний стиль) та «релігія» (загальний
    стиль) з контекстуальними прикладами.
  - Сформулювати питання для самоперевірки та дискусії за принципом CBI щодо ролі
    релігії у сучасному суспільстві.
