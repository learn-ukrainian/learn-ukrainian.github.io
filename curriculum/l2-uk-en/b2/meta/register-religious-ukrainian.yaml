slug: register-religious-ukrainian
title: Регістр — Релігійна мова в Україні
word_target: 4000
content_outline:
- section: Вступ — Регістри високого стилю
  words: 600
  points:
  - 'Визначення релігійного та епістолярного стилів відповідно до Державного стандарту
    (§4.4.1.1). Пояснення їхньої спільної бази: високої культури мовлення та глибокої
    поваги до адресата.'
  - 'Культурний контекст: Пересопницьке Євангеліє (1556–1561) як доказ тяглості української
    сакральної та літературної традиції, на якому присягають Президенти України.'
  - Розрізнення архаїчної церковної урочистості та сучасної ділової етики з підкресленням
    спільних точок дотику у вишуканості висловлювань.
- section: Релігійний стиль — Мова духовності
  words: 900
  points:
  - Презентація лексичного пласта з виділенням ключових слів (Господь, благословіння,
    храм, парафія, священник). Пояснення ролі слова 'Господь' як маркера високого
    стилю.
  - Аналіз формульних висловів та сталих конструкцій ('Слава Богу!', 'Христос воскрес!
    – Воістину воскрес!'). Кожна формула супроводжується прикладом контексту використання.
  - 'Аналіз фрагмента сакрального тексту: розпізнавання метафоричності, символізму
    та піднесеної урочистої інтонації як визначальних ознак.'
- section: Епістолярний стиль — Від класики до цифрової доби
  words: 900
  points:
  - 'Історія жанру: листування Лесі Українки та Ольги Кобилянської, унікальний код
    звертання ''Хтось'' як приклад емансипованого українського модернізму та інтимно-епістолярного
    простору.'
  - Короткий огляд ролі листування як самостійного виду мистецтва (згадка бачення
    Василя Стефаника).
  - 'Сучасна ділова переписка: детальний розбір цифрових формул (''У вкладенні надсилаю...'',
    ''Заздалегідь вдячний'') та етикетних кліше (''Шановний пане'', ''З повагою'',
    ''Щиро Ваш'').'
- section: Граматика — Мистецтво звертання
  words: 800
  points:
  - 'Глибокий розбір кличного відмінка за Державним стандартом (§4.1.2.7): звертання
    як суб''єкт дії та адресат ідентифікації.'
  - 'Складні випадки кличного відмінка: іменники м''якої групи на -р (Ігорю, а не
    Ігоре), відмінювання прізвищ у конструкціях з ''пан'' (пане Ковалю).'
  - 'Деколонізація мовлення та спростування помилок: чому ''Добрий день!'' є правильним
    (констатація), а ''Доброго дня!'' — неправильним (калькування побажання).'
- section: Практика та трансформація
  words: 800
  points:
  - Покроковий алгоритм написання формального листа (запит або скарга) та неформального
    листа другові з дотриманням відповідного регістру.
  - 'Завдання на стилістичну трансформацію: перетворення нейтрального або розмовного
    повідомлення на офіційно-епістолярний або піднесено-релігійний текст.'
  - Розбір та виправлення типових учнівських помилок у звертаннях та етикетних формулах
    (на основі реальних кейсів, задокументованих у дослідженні).
