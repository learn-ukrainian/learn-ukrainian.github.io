slug: academic-writing
title: Академічне письмо
word_target: 4000
content_outline:
  - section: 'Вступ: Основи та історія академічного письма (Introduction: Fundamentals
      and History of Academic Writing)'
    words: 600
    points:
      - 'Historical context: The Kyiv-Mohyla Academy tradition (1615) emphasizing
        rhetoric and philosophy vs. the Soviet-era legacy of ''dry'' scientific reporting.'
      - Defining the principles of objectivity, accuracy, and logic as the core of
        the Ukrainian academic register.
      - 'Distinguishing academic texts from publicism: tone, evidence-based claims,
        and target audience expectations.'
  - section: Академічна доброчесність та етика у 2026 році (Academic Integrity and
      Ethics in 2026)
    words: 800
    points:
      - 'Review of the Law ''On Academic Integrity'' (Feb 1, 2026): New requirements
        for disclosing the use of AI tools in research and writing.'
      - The concept of 'доброчесність' (integrity) as a fundamental moral value in
        Ukrainian education, moving beyond simple rule-following.
      - 'Types of academic misconduct: identifying plagiarism, self-plagiarism, and
        the ethical implications of fabrication.'
      - 'Learner error correction: eliminating the pleonasm ''своя власна думка''
        in favor of the correct ''власна думка'' when expressing a position.'
  - section: Структура есе та побудова тези (Essay Structure and Thesis Development)
    words: 800
    points:
      - 'State Standard §1.3.1.1 alignment: Developing a complex thesis statement
        and organizing the text with clear logical hierarchies.'
      - 'The mechanics of the introduction: setting the problem context and formulating
        a ''вагома теза'' (strong thesis).'
      - 'Crafting logic between paragraphs: ensuring each sub-point supports the central
        thesis without thematic drift.'
      - 'Practical focus: Collocations for thesis work — ''сформулювати тезу'', ''обґрунтувати
        тезу'', ''головна теза''.'
  - section: 'Аргументація: докази та контраргументація (Argumentation: Evidence and
      Counter-argumentation)'
    words: 1000
    points:
      - Developing 'за' (pro) and 'проти' (con) evidence for a balanced argumentative
        text as per the 2024 State Standard.
      - 'Types of academic evidence: logical reasoning, empirical data, and authoritative
        citations (авторитетні джерела).'
      - 'Strategic use of statistics and examples: ''наводити приклад'' (correct)
        vs. the common learner error ''приводити приклад''.'
      - 'Addressing counter-arguments: techniques for respectful refutation (''спростування'')
        and acknowledging the complexity of a problem.'
  - section: Стилістика, цитування та покликання (Stylistics, Citations, and References)
    words: 800
    points:
      - 'Language organization: using ''вставні слова'' for listing (по-перше, по-друге),
        clarifying, and hedging (можливо, ймовірно).'
      - Correcting the calque 'при написанні' with the natural 'під час написання'
        or active constructions.
      - 'Shift from passive to active voice: replacing stiff constructions like ''нами
        було досліджено'' with ''ми дослідили'' to show researcher agency.'
      - 'Terminology standardization: strictly using ''покликання'' (citation/reference)
        for bibliography items rather than the generic ''посилання'' (link).'
      - 'Academic integrity drills: paraphrasing vs. direct citation and formatting
        a ''список використаних джерел'' correctly.'
