slug: register-literary-ukrainian
title: Регістр — Літературна українська
word_target: 4000
content_outline:
- section: 'Вступ: Поняття художнього стилю'
  words: 600
  points:
  - 'Define ''художній стиль'' (literary style) and its primary goal: aesthetic impact
    and emotional imagery, providing contrasting examples of neutral vs. literary
    phrasing.'
  - Explain the balance between authorial individuality (авторська індивідуальність)
    and standardization, showing how writers shape perception using specialized terminology
    (термін, поняття, процес, метод).
  - Introduce the importance of stylistic analysis (аналіз) and synthesis (синтез)
    as tools for interpreting a text.
- section: Історичні витоки та зачинателі
  words: 800
  points:
  - Analyze Ivan Kotliarevsky's 'Енеїда' (1798), detailing how its burlesque synthesis
    of high classical themes with living vernacular formed the foundation of the modern
    literary language.
  - Examine Taras Shevchenko's 'Кобзар' and its role in cementing the literary standard
    by organically blending bookish traditions, folklore, and living dialects.
  - Demonstrate Shevchenko's mastery of the vocative case for personifying abstract
    concepts, providing deeply analyzed examples like 'Думи мої!' and 'Україно!'.
- section: Лексичні засоби та конотації
  words: 900
  points:
  - Define and exemplify archaisms and historicisms (отож, воістину, мовив, чоло,
    десниця) and their function in creating historical color and solemnity.
  - 'Analyze poetic vocabulary (поетизми: гай, криниця, обрій, зоря), showing how
    they establish lyricism compared to neutral synonyms.'
  - 'Identify the error of stylistic dissonance: contrast bureaucratic calques (''сонце
    здійснило захід'') with authentic literary expressions (''сонце сіло за обрій'').'
  - Discuss dialectisms as a tool for characterization and authenticity, offering
    specific examples of dialect words used in classical literature.
- section: Тропи, фігури та персоніфікація
  words: 900
  points:
  - Examine metaphor, metonymy, and epithets as the core tools of imagery, providing
    a structured breakdown of phrases like 'серце каменіє', 'срібний місяць', 'перо
    Шевченка'.
  - Address the common error of ignoring the vocative in personification, clearly
    contrasting incorrect nominative forms ('О, ніч!') with correct literary usage
    ('О, ноче!').
  - Explain hyperbole and litotes as methods of emotional scaling, providing examples
    of each and showing how they amplify literary expressiveness.
- section: Синтаксис та запобігання помилкам
  words: 800
  points:
  - 'Define stylistic inversion: changing default word order to create logical emphasis
    and rhythm, illustrated by examples like ''прийшла весна красна''.'
  - Explore rhetorical figures (questions, exclamations) and syntactic repetitions
    (anaphora) and how they dynamically pace a narrative.
  - Correct foreign-influenced calques, specifically targeting the replacement of
    the erroneous 'приймати участь' with the authentic 'брати участь у виставі'.
  - 'Provide a step-by-step practical application guide: transforming a neutral informational
    paragraph into a rich literary description using the discussed tropes and figures.'
