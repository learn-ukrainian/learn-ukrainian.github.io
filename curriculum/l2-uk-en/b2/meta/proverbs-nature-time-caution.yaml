slug: proverbs-nature-time-caution
title: 'Прислів''я II: Природа, час і обережність'
word_target: 4000
content_outline:
- section: 'Вступ: Природа як джерело мудрості'
  words: 600
  points:
  - Ввести тему через сакральний статус верби («Без верби і калини нема України»)
    та практичне спостереження «Де вода, там і верба».
  - 'Пояснити зв''язок аграрного календаря та народної мудрості: чому суворе дотримання
    природних циклів було життєво необхідним для виживання українців.'
  - 'Розкрити роль природи в українському світогляді: хліборобський досвід як основа
    філософії та реалізація стандарту B2.'
- section: Прислів'я про стихії та цикли природи
  words: 1000
  points:
  - 'Проаналізувати дуалізм природи через персоніфікацію: «Природа одному мати, другому
    — мачуха» (щедрість проти непередбачуваної небезпеки).'
  - 'Пояснити логіку алогізму: гумористичне вживання фрази «На городі бузина, а в
    Києві дядько» для позначення повної нісенітниці (non sequitur).'
  - 'Дослідити сезонні образи та їх варіативність: «Весна красна квітами, а осінь
    — плодами» (та менш офіційний варіант «...а осінь пирогами»).'
  - 'Розглянути побутові спостереження: пояснення метафори «Ліс рубають — тріски летять»
    як способу виправдання побічних збитків.'
- section: Час і планування в народній філософії
  words: 800
  points:
  - 'Пояснити цінність моменту та рішучість: аналіз прислів''їв «Куй залізо, поки
    гаряче» та «Ранок вечора мудріший» як стратегій прийняття рішень.'
  - 'Розкрити тему невідворотності втрати часу через колоритний приклад: «Згаяного
    часу і конем не доженеш».'
  - 'Продемонструвати довгострокове планування: «Готуй сани влітку, а воза — взимку»
    (перенесення аграрної дисципліни на сучасний бізнес-контекст).'
- section: Обережність та оцінка ризиків
  words: 800
  points:
  - 'Проаналізувати застереження від необачності: «Не знаючи броду, не лізь у воду»
    (від фізичної небезпеки до метафоричного попередження про ризики).'
  - 'Здійснити порівняльний аналіз пріоритету надійного над можливим: образи «синиця
    в руках» та «журавель у небі».'
  - 'Зробити мовну корекцію: акцент на автентичному, ритмічному варіанті «Береженого
    Бог береже» замість калькованого «Обережного...».'
  - 'Розглянути економічну мудрість: «Скупий платить двічі» (обговорення наслідків
    надмірної економії на якості чи безпеці).'
- section: 'Практика: Уникнення кальок та суржику'
  words: 800
  points:
  - 'Пояснити помилку калькування: детальний розбір заміни англійського «It''s raining
    cats and dogs» на питоме «Ллє як з відра».'
  - 'Ввести анти-суржик фільтр: розпізнавання та заміна російського «Тише едешь —
    дальше будешь» на українське «Хто тихо ходить, той густо місить».'
  - 'Провести тренінг на запобігання контамінації: чітке розрізнення «Мати значення»
    та «Відігравати роль» (викорінення помилки «відігравати значення»).'
  - 'Описати вимоги до творчого завдання (Production): написання аргументованого есе
    про ризик або планування з обов''язковим вживанням 3-4 вивчених ідіом.'
