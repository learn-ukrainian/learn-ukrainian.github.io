slug: word-formation-adverbs-integration
title: 'Словотворення: прислівники та інтеграція'
word_target: 4000
content_outline:
- section: 'Вступ: Світ українського словотворення'
  words: 500
  points:
  - 'Огляд інтеграції словотвірних моделей: як іменник, прикметник і прислівник утворюють
    єдину лексичну систему.'
  - 'Культурний контекст: емоційна палітра української мови через зменшувально-пестливі
    форми («вороженьки», «спатоньки»).'
  - Аналіз приказки «Зробиш спішно — вийде смішно» як вступ до вивчення прислівників.
- section: 'Від прикметника до прислівника: моделі та акцентологія'
  words: 1000
  points:
  - Аналіз суфіксальних (-о, -е) та префіксально-суфіксальних (по-...-ськи, по-...-ому)
    моделей творення.
  - 'Акцентологія: детальний розбір переходу наголосу з закінчення прикметника на
    корінь прислівника (швидки́й → шви́дко).'
  - Граматичне правило вибору суфікса -е після шиплячих основ (ж, ч, ш, щ) на прикладах
    («гаряче», «вороже»).
- section: 'Пестливість та звеличення: прагматика суфіксів'
  words: 900
  points:
  - Зменшувально-пестливі суфікси (-ик, -ечк) та їхня прагматика (емоційна близькість,
    іронія, специфічне ставлення).
  - Збільшувальні суфікси (-ище) та їхні експресивні можливості («вітрище»).
  - 'Контекстуальне використання: різниця між розмовним, інтимним та формальним/науковим
    стилем.'
- section: Словотворення в академічному та науковому контексті
  words: 800
  points:
  - Інтеграція термінології («аналіз», «синтез», «метод») у структуру наукового тексту.
  - Стилістичне використання прислівників у науковому регістрі (від описових конструкцій
    до лаконічних термінів).
  - 'Лексична сполучуваність: робота з базовими академічними колокаціями («глибокий
    аналіз», «базове поняття») та ідіоматикою.'
- section: Практикум та корекція помилок
  words: 800
  points:
  - 'Розбір і корекція помилки англомовних учнів: вживання прикметника замість прислівника
    в безособових конструкціях («Це важливо» vs «Це є важливий»).'
  - 'Практичний словотворчий аналіз тексту: виокремлення твірного слова та суфікса.'
  - Написання невеликого тексту в науковому регістрі із застосуванням вивчених словотвірних
    моделей.
