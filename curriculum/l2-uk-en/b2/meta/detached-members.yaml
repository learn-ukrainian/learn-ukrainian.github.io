slug: detached-members
title: Відокремлені члени речення
word_target: 4000
content_outline:
- section: 'Вступ: Відокремлення як синтаксичне та інтонаційне явище'
  words: 500
  points:
  - 'H3: Сутність відокремлення. Визначення згідно з Держстандартом §4.3.2, смислове
    та інтонаційне виділення другорядних членів.'
  - 'H3: Ознаки відокремлення. Роль розділових знаків (коми, тире) та інтонації (пауза,
    підвищення тону).'
  - 'H3: Стилістична функція. Демонстрація того, як відокремлення увиразнює українське
    мовлення та створює додаткові смислові плани.'
- section: Відокремлені означення
  words: 800
  points:
  - 'H3: Узгоджені означення після означуваного слова. Правила відокремлення двох
    і більше означень із прикладами.'
  - 'H3: Дієприкметникові звороти. Позиція зворотів та пунктуація, з акцентом на відсутність
    коми перед означуваним словом.'
  - 'H3: Відокремлення при займенниках. Обов''язкове відокремлення означень при особових
    займенниках у будь-якій позиції.'
  - 'H3: Означення з обставинним значенням. Аналіз випадків із додатковим значенням
    причини або допусту.'
- section: Відокремлені прикладки та додатки
  words: 800
  points:
  - 'H3: Відокремлені прикладки. Правила використання зі сполучником «як» (якщо має
    відтінок причини) та поширені прикладки.'
  - 'H3: Прикладки при власних назвах і займенниках. Специфіка пунктуації та обов''язкове
    відокремлення.'
  - 'H3: Відокремлені додатки. Використання прийменників «крім», «замість», «за винятком»,
    «на відміну від».'
  - 'H3: Стилістичні особливості. Роль відокремлених додатків і прикладок у науковому
    та публіцистичному стилях.'
- section: Відокремлені обставини
  words: 800
  points:
  - 'H3: Дієприслівникові звороти. Завжди відокремлюються комами незалежно від позиції.
    Розбір типової помилки з неузгодженим підметом.'
  - 'H3: Одиничні дієприслівники. Розрізнення додаткової дії (відокремлюються) та
    обставини способу дії (не відокремлюються).'
  - 'H3: Обставини з прийменниками. Аналіз конструкцій із «незважаючи на», «всупереч»,
    «завдяки» (допустове і причинове значення).'
- section: Уточнюючі члени речення та практика
  words: 1100
  points:
  - 'H3: Уточнюючі обставини й означення. Конкретизація часу («Увечері, о шостій годині...»),
    місця та ознак.'
  - 'H3: Пояснювальні конструкції. Використання слів «тобто», «а саме», «або» (у значенні
    «тобто»).'
  - 'H3: Комплексний практикум. Розстановка розділових знаків у складних текстах із
    різними типами відокремлених членів.'
  - 'H3: Трансформаційні вправи. Завдання на перетворення невідокремлених членів на
    відокремлені для зміни стилістичного ефекту.'
