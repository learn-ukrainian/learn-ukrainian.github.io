slug: text-analysis
title: Аналіз тексту
word_target: 4000
content_outline:
- section: 'Вступ: Навіщо аналізувати тексти'
  words: 500
  points:
  - 'H3: Інформаційна гігієна. Визначення поняття та ключова роль проєктів «StopFake»
    і «Детектор медіа» в сучасному українському суспільстві.'
  - 'H3: Критичне читання. Як виявляти прихований зміст, іронію та натяки, відповідно
    до вимог §1.2.1.1 Стандарту.'
- section: Факт проти думки
  words: 700
  points:
  - 'H3: Ознаки факту. Лексичні маркери об''єктивного викладу («за даними», «відбулося»)
    та джерела перевірки.'
  - 'H3: Ознаки судження. Суб''єктивність, емоційність та аналіз речень зі сполучником
    «тому що» як авторської інтерпретації.'
  - 'H3: Типові помилки. Подолання калькування «опінія» через заміну на питомі українські
    конструкції «на мою думку» / «на мій погляд».'
- section: Виявлення упередженості та маніпуляцій
  words: 800
  points:
  - 'H3: Мовні маркери упередженості. Забарвлена лексика, гіперболи та використання
    емоційних епітетів (§4.4.1.2 Стандарту).'
  - 'H3: Маніпулятивні техніки. Детальний аналіз прийомів перекручування фактів та
    «виривання з контексту».'
  - 'H3: Оцінка джерела. Практичні поради щодо перевірки авторитетності автора та
    репутації медіа-майданчика.'
- section: Риторичні прийоми та стилістичні засоби
  words: 800
  points:
  - 'H3: Етос, пафос, логос. Розрізнення риторичного «пафосу» від хибного друга перекладача
    «pathetic» (жалюгідний).'
  - 'H3: Синтаксичні фігури. Аналіз риторичних запитань, звертань і повторів як засобів
    впливу (§4.4.1.3 Стандарту).'
  - 'H3: Воєнна риторика. Культурний аналіз анафори та антитези у сучасних промовах
    лідерів України.'
- section: Структура та логіка аргументації
  words: 700
  points:
  - 'H3: Архітектура тексту. Методика виділення головної думки та другорядних деталей.'
  - 'H3: Поняття аргументу. Вживання терміна як доказу, а не суперечки, та логічна
    послідовність тверджень.'
  - 'H3: Читання між рядків. Синтез інформації та виявлення прихованих висновків автора
    через контекстуальні підказки.'
- section: 'Підсумок: Практика критичного аналізу'
  words: 500
  points:
  - 'H3: Комплексний розбір. Алгоритм деконструкції публіцистичного тексту від фактчекінгу
    до виявлення маніпуляцій.'
  - 'H3: Написання відгуку. Правила дотримання об''єктивного тону та використання
    пасивного стану (Passive Voice).'
  - 'H3: Наступні кроки. Підготовка навичок для фінального іспиту (M94) та майбутніх
    модулів рівня C1.'
