slug: register-academic-technical
title: Науковий та науково-технічний стилі
word_target: 4000
content_outline:
- section: Вступ — академічний та технічний підстилі
  words: 500
  points:
  - Define scientific style as a functional variety (об'єктивність, логічність, точність)
    fulfilling State Standard requirements.
  - Contrast academic (власне науковий) vs. scientific-technical (науково-технічний)
    substyles with distinct examples.
  - 'Cultural hook: The legacy of Ostroh and Kyiv-Mohyla academies in shaping early
    academic Ukrainian, defying later imperial Russification.'
- section: Академічна лексика та термінологія
  words: 800
  points:
  - 'General scientific vocabulary: high-frequency words (дослідження, аналіз, гіпотеза,
    висновок) and their precise collocations.'
  - 'Specialized terminology: requirements for a term (однозначність, системність).'
  - 'Role of abstract nouns (-ість, -ання, -ення, -ація): derivation and usage for
    generalizations (§4.2.6).'
  - 'Anti-Russianism check: Warning against surzhyk or direct Russian calques in academic
    vocabulary (e.g., ''співпадати'' -> ''збігатися'').'
- section: Технічна термінологія та складені терміни
  words: 800
  points:
  - Technical documents (instructions, patents, specifications) and standardizing
    terms via ДСТУ.
  - Morphology of compound terms (електронно-обчислювальна машина, штучний інтелект)
    and hyphenation rules.
  - 'Abbreviations (ЕОМ, ШІ, ПЗ, НАНУ): formation, inflection, and common usage errors.'
  - 'Cultural hook: Ukraine''s historic role in cybernetics (MESM in Kyiv) and native
    technical term evolution.'
- section: Граматика об'єктивності — безособові конструкції
  words: 800
  points:
  - 'Impersonal and generalized-personal constructions (§4.3.3.1): ''досліджено'',
    ''було встановлено'', ''вважається'' to remove subjectivity.'
  - 'Authorial ''ми'' vs ''я'': Pluralis modestiae convention in Ukrainian academic
    writing.'
  - Participle and gerund phrases (дієприкметникові та дієприслівникові звороти) for
    information compression.
  - Complex sentences with relative pronouns (який, що) and conjunctions (оскільки,
    тому що) for logical linking.
- section: Структура тексту — теза, звіт, технічний документ
  words: 600
  points:
  - 'Standard structure of a scientific article: вступ → огляд літератури → методологія
    → результати → висновки, with clichés for each.'
  - 'Technical document structure: specification and manual requirements for absolute
    clarity.'
  - Citation and referencing rules, distinguishing direct quotes from paraphrase.
  - 'Cohesion devices (когезія): ''таким чином'', ''отже'', ''як зазначалося вище''.'
- section: Практика — академічне та технічне текстотворення
  words: 500
  points:
  - 'Step-by-step writing of an abstract (анотація): meta → method → result → conclusion.'
  - Drafting a technical description with strict terminology.
  - 'Editing practice: removing colloquialisms and ''канцеляризми'' from draft texts.'
  - Comparative analysis of the same content written in academic vs. technical substyles.
