slug: passive-in-context
title: Пасив у контексті — вибір за регістром
word_target: 4000
content_outline:
- section: Вступ — Регістр і пасив
  words: 600
  points:
  - 'Дати чітку дефініцію понять «регістр» та «контекст» для рівня B2: залежність
    синтаксису від рівня офіційності.'
  - 'Розкрити культурний контекст: явище «канцеляриту» як спадщина радянського бюрократичного
    стилю. Наголосити, що українська мова тяжіє до активної дії.'
  - 'Пояснити принцип «Agency Pass» (активної суб''єктності): чому в сучасній комунікації
    активна позиція («Ми ухвалили рішення») завжди є стилістично кращою за пасивну
    («Рішення було ухвалено»).'
- section: Система форм за реєстрами
  words: 800
  points:
  - 'Створити детальну матрицю відповідності: який тип висловлювання доречний для
    юридичного (форми на -но/-то), наукового (безособові конструкції) та розмовного
    (3-я особа множини) регістрів.'
  - 'Деталізувати специфіку форм на -но/-то: фокус виключно на результаті дії (Action
    Focus) без можливості додавання виконавця в орудному відмінку.'
  - 'Інтегрувати положення Державного стандарту §4.3.3.1: показати на прикладах, як
    односкладні безособові речення допомагають досягти об''єктивності.'
- section: Офіційно-діловий та юридичний контексти
  words: 900
  points:
  - 'Проаналізувати мову наказів, законів та постанов: де саме форма на -но/-то є
    стилістично виправданою та надає документові юридичної сили.'
  - 'Розібрати типову помилку «The By-Agent Mistake»: пояснити, чому конструкція на
    зразок «Закон прийнято парламентом» є синтаксичною помилкою (калькою), та показати
    перехід до активу «Парламент ухвалив закон».'
  - Надати приклади з доречною термінологічною базою (юридична особа, офіційна заява,
    юридична сила) без скочування в канцелярит.
- section: Науковий та академічний контексти
  words: 800
  points:
  - 'Пояснити особливості опису методології чи експериментів: як об''єктивувати текст,
    не зловживаючи зворотно-пасивними дієсловами на «-ся».'
  - Проаналізувати роль дієприкметникових зворотів у науковому тексті для досягнення
    лаконічності.
  - 'Практична трансформація: навести приклад сухого наукового звіту, обтяженого канцеляритом,
    і показати його природний український безособовий еквівалент.'
- section: Літературний, журналістичний та розмовний контексти
  words: 600
  points:
  - Проаналізувати поширену помилку копіювання англійського пасиву «was written» (бути
    + дієприкметник) і запропонувати природні українські замінники.
  - 'Показати переваги неозначено-особових речень (3-я особа множини: «кажуть», «передали»)
    у розмовному та журналістичному стилях для уникнення формальності.'
  - 'Розібрати стилістичний нюанс зі словом «вибачаюся»: пояснити, чому це хибне розуміння
    стану і регістру, та навчити використовувати доречні форми «Перепрошую» або «Вибачте».'
- section: Підсумок та інтегрована практика
  words: 300
  points:
  - Створити алгоритм вибору («Decision Tree Flowchart» у форматі тексту чи списку)
    для визначення того, коли використовувати актив, а коли — пасив або безособову
    форму.
  - 'Наочно продемонструвати критерій доречності: як зміна однієї граматичної форми
    кардинально змінює тон висловлювання від дружнього до офіційного.'
  - 'Закріпити головне правило B2: українська мова є мовою дії, тому за замовчуванням
    завжди варто віддавати перевагу активним конструкціям.'
