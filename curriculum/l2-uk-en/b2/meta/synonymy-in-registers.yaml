slug: synonymy-in-registers
title: Синонімія у функціональних стилях
word_target: 4000
content_outline:
- section: Вступ — регістр і вибір слова
  words: 600
  points:
  - Визначення поняття 'функціональний стиль' та його зв'язок із синонімією (Держстандарт
    §4.4.1.2 та введення 5 стилів).
  - 'Презентація п''яти стилів: науковий, офіційно-діловий, публіцистичний, художній,
    розмовний.'
  - 'Метафора «мовний гардероб»: чому в українській мові вибір синоніма дорівнює вибору
    одягу для конкретної соціальної ситуації. Підкреслення важливості свідомого стилістичного
    вибору без англомовних підказок.'
- section: Синоніми наукового та офіційно-ділового стилів
  words: 900
  points:
  - 'Характеристика наукового стилю: необхідність термінологічної точності (напр.,
    ''захворювання'' замість ''хвороба'', ''гіпотеза'' замість ''припущення''). Кожен
    термін має свій H3.'
  - 'Характеристика офіційно-ділового стилю: роль кліше (''особа, що проживає'', ''житловий
    об''єкт'').'
  - 'Деколонізаційний аспект: критика ''канцеляриту'' як спадку радянської бюрократії.
    Розбір типової помилки вживання канцеляризмів у розмовному мовленні (напр., ''здійснювати
    прогулянку'').'
  - 'Контрастивний аналіз тріади: ''працівник'' (нейтральне) – ''співробітник'' (офіційне)
    – ''робітник'' (виробниче).'
- section: Синоніми публіцистичного та художнього стилів
  words: 900
  points:
  - 'Специфіка публіцистичного стилю: емоційний вплив. Аналіз синонімічного ряду ''країна''
    – ''держава'' – ''батьківщина'' з акцентом на сучасне українське розуміння громадянської
    відповідальності.'
  - 'Роль синонімів у ЗМІ: як вибір слова у заголовку (напр., ''конфлікт'' vs ''сутичка''
    vs ''війна'') формує ставлення читача.'
  - 'Художній стиль та індивідуально-авторські синоніми: використання тропів на прикладі
    української літератури (напр., ''земля'' у В. Стефаника).'
- section: Розмовні синоніми та експресивність
  words: 800
  points:
  - Градація лексики від нейтральної до зниженої на щоденних прикладах ('їсти' – 'жерти'
    – 'хомʼячити').
  - 'Як працювати зі словниками: розуміння стилістичних позначок (''розм.'', ''зниж.'',
    ''лайл.'').'
  - 'Емоційна функція: створення іронії або інтимності за допомогою розмовних синонімів.'
  - 'Комічний ефект від змішування стилів: вживання офіціозних слів (''вищезгаданий
    громадянин'') у побутових розмовах.'
- section: Міжстильове порівняння та практика
  words: 800
  points:
  - 'Практична трансформація: зведена таблиця стилістичних відповідників для 5-6 ключових
    понять у кожному стилі.'
  - 'Трансформаційна вправа: переказ одного повідомлення (напр., тема ''дощ'') у п''яти
    функціональних стилях із зміною синонімічного ряду.'
  - 'Виявлення стилістичного дисонансу: аналіз текстів із ''чужими'' синонімами та
    їх редагування.'
  - 'Підсумкова рефлексія: формування індивідуального ''стилістичного компаса'' для
    автоматичного вибору синоніма.'
