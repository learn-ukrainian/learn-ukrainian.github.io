slug: idioms-somatic
title: 'Соматичні фразеологізми: Голова, обличчя, руки, ноги, тіло'
word_target: 4000
content_outline:
- section: 'Вступ: Тіло як дзеркало мови'
  words: 400
  points:
  - 'Пояснити концепцію антропоцентризму: як тіло стає мірилом світу в українській
    картині світу (голова — розум, руки — дія, серце — емоції).'
  - Навести комунікативні вимоги Державного стандарту (§1.4.1.2.1) щодо вміння доречно
    використовувати ідіоми в різних регістрах.
  - 'Задати деколонізовану рамку: українська фразеологія є самобутньою системою, що
    відображає автентичний культурний досвід.'
- section: Голова, обличчя, очі
  words: 900
  points:
  - 'Детально розібрати ідіоми з концептом ''голова'': ''світла голова'' (розум),
    ''гаряча голова'' (імпульсивність), ''морочити голову'' (набридати); подати їх
    у контекстних таблицях.'
  - 'Проаналізувати семантичну групу ''око'' / ''обличчя'': ''впадати в око'' (категорично
    наголосити на помилковості російської кальки ''кидатися в очі''), ''замилювати
    очі''.'
  - 'Зіставити регістри: формальне ''втратити обличчя'' (зганьбитися) проти розмовного
    ''водити за ніс'', додати короткі етимологічні довідки.'
- section: Руки та плечі
  words: 900
  points:
  - 'Розкрити тему працелюбності та майстерності через ''рука'': ''мати золоті руки'',
    ''руки не доходять'' (як вираження браку часу).'
  - 'Пояснити ідіоми солідарності та відповідальності: ''плечем до плеча'', ''мати
    голову на плечах''.'
  - 'Створити граматичний блок про прийменникове керування: чітко пояснити різницю
    між ''взяти в руки'' (Acc), ''тримати в руках'' (Loc) та ''з рук у руки'' (Gen
    → Acc).'
- section: Ноги, серце, спина
  words: 1000
  points:
  - 'Описати рух і життєвий стан через ''ноги'': ''стати на ноги'' (досягти успіху/незалежності),
    ''плутатися під ногами'', ''ноги в руки'' (швидко).'
  - 'Проаналізувати ''серце'' як центр емоцій: ''від щирого серця'', ''брати до серця''
    (перейматися), ''камінь на серці'' (тягар).'
  - 'Розглянути концепт обтяження (''спина'' / ''шия''): ''сісти на шию'', ''за спиною''
    (таємно).'
  - 'Окремо розібрати граматичну корекцію: правильне керування ''сміятися з когось''
    (уникнення російського ''над'').'
- section: 'Практичний синтез: весь корпус соматизмів'
  words: 800
  points:
  - Створити зв'язний міні-наратив (наприклад, лінгвістичний портрет), який органічно
    об'єднує мінімум 8 соматизмів із різних груп.
  - Надати зведену таблицю-класифікацію фразеологізмів за семантичними категоріями
    (інтелект, дія, рух, емоції, стосунки).
  - Запропонувати аналітичні питання для саморефлексії та розрізнення прямого й переносного
    значення висловів.
