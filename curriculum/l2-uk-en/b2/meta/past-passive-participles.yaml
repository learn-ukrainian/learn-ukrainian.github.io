slug: past-passive-participles
title: Дієприкметники минулого часу на -ний/-тий
word_target: 4000
content_outline:
- section: Вступ — Що таке дієприкметник?
  words: 450
  points:
  - 'Визначення дієприкметника як гібридної форми (дієслово + прикметник): дія, що
    стала ознакою.'
  - 'Аналогія з музейною реставрацією: різниця між процесом (реставрувати) і результатом
    (відреставрований).'
  - 'Морфологічна функція: опис стану об''єкта після завершення дії (відкрите вікно,
    написаний лист).'
  - 'Важливість для рівня B2: база для дієприкметникових зворотів та академічного
    мовлення.'
- section: Утворення дієприкметників на -ний
  words: 750
  points:
  - 'Основне правило: інфінітив + -ний (для більшості дієслів на -ати, -яти, -ити).'
  - 'Культурний якір: Золота пектораль — історія ''знайденого'' скарбу (знайти → знайдений).'
  - 'Фонетичні зміни та чергування приголосних (д//дж, т//ч, з//ж): посадити → посаджений,
    вразити → вражений.'
  - 'Таблиця чергувань з прикладами: запросити → запрошений, відродити → відроджений.'
  - 'Типові помилки: утворення форм без чергування (*посадений* — неправильно).'
- section: Утворення дієприкметників на -ний
  words: 750
  points:
  - 'Правило для односкладових основ та основ на -ити, -ути, -ерти: мити → митий,
    бити → битий, терти → тертий.'
  - 'Мнемоніка ''Короткий удар'': короткі слова часто мають різкий суфікс -тий.'
  - 'Винятки та варіативність: колоти → колотий, але молоти → мелений.'
  - 'Аналіз колокацій: закритий клуб, відкрите суспільство, розбите серце.'
  - 'Практичний фокус: опис стану предметів побуту (помитий посуд, шитий одяг).'
- section: Узгодження дієприкметників
  words: 600
  points:
  - 'Принцип прикметника: повна відповідність роду, числа та відмінка іменнику.'
  - 'Парадигма відмінювання (як тверда група прикметників): написаний, написаного,
    написаному.'
  - 'Узгодження в роді: зроблений стіл, зроблена робота, зроблене завдання.'
  - 'Узгодження в числі: відкриті двері, закриті вікна.'
  - 'Поширені помилки: втрата узгодження у непрямих відмінках (*на написаний столі*
    — неправильно).'
- section: Пасив із допоміжним дієсловом бути
  words: 650
  points:
  - 'Побудова пасивного стану: допоміжне дієслово ''бути'' + дієприкметник.'
  - 'Часові форми: минулий (був зроблений), майбутній (буде зроблений) і теперішній
    (нульова зв''язка — є зроблений).'
  - 'Культурний якір: Софія Київська — ''була збудована'' в ХІ ст., ''була перебудована''
    Мазепою.'
  - 'Різниця між станом і дією: ''Вікно відчинене'' (стан) vs ''Вікно було відчинене''
    (подія).'
  - 'Логічний наголос: коли важливий результат, а не виконавець.'
- section: Регістрова специфіка
  words: 400
  points:
  - 'Стилістичне використання: висока частотність в офіційно-діловому та науковому
    стилях.'
  - 'Agency Rule (Правило Агентності): в розмовній мові надаємо перевагу активу (Я
    написав, а не ''Мною написано'').'
  - 'Уникнення канцеляризмів: коли пасив звучить неприродно або бюрократично.'
  - 'Нюанси значень: ''забутий'' (літературне) vs ''загублений'' (побутове).'
- section: Практика і підсумок
  words: 400
  points:
  - Зведена таблиця правил утворення (-ний vs -тий).
  - 'Чек-лист самоперевірки: чи правильно утворено форму? чи узгоджено з іменником?'
  - 'Підготовка до наступної теми: від пасивного дієприкметника до безособових форм
    на -но/-то.'
  - 'Фінальний акцент: дієприкметник — це інструмент точності в описі світу.'
