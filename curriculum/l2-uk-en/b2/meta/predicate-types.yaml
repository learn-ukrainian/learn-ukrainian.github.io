slug: predicate-types
title: Типи присудків
word_target: 4000
content_outline:
- section: 'Вступ: Присудок як організаційний центр речення'
  words: 500
  points:
  - 'Означення присудка згідно з Держстандартом §4.3.2: головний член речення, що
    формує предикативний центр.'
  - Пояснення концепції предикативності (час, спосіб, особа) 100% українською мовою
    з чіткими прикладами.
  - 'Огляд трьох основних типів присудка: простий дієслівний, складений дієслівний,
    складений іменний.'
- section: Простий дієслівний присудок
  words: 800
  points:
  - 'Формула: один дієслівний компонент в особовій формі.'
  - 'Складна форма майбутнього часу (напр., «будемо розвивати»): пояснення, чому це
    простий присудок (граматична неподільність).'
  - Фразеологічні присудки (напр., «має намір», «взяв та й зробив») як єдине ціле.
- section: Складений дієслівний присудок
  words: 800
  points:
  - 'Формула: допоміжне дієслово (фазове або модальне) + інфінітив.'
  - Фазові дієслова (почати, продовжувати, закінчити) та їхня роль у реченні.
  - Модальні дієслова (могти, мусити, хотіти) для вираження ставлення до дії.
  - 'Типова помилка: помилкове виділення лише допоміжного дієслова при синтаксичному
    розборі.'
- section: Складений іменний присудок
  words: 900
  points:
  - 'Формула: дієслово-зв''язка + іменна частина.'
  - 'Нульова зв''язка у теперішньому часі (напр., «Сміливість — це Україна»): синтаксична
    та стилістична специфіка.'
  - Напівзв'язки (стати, залишатися, виявитися) та їхній вплив на відмінок іменної
    частини (орудний відмінок).
  - 'Контрастивний аналіз: відмінність складеного іменного («Він є лікар») від простого
    («Він працює лікарем»).'
- section: Практика та розмежування типів
  words: 1000
  points:
  - Покроковий алгоритм визначення типу присудка.
  - Розмежування складеного дієслівного присудка та простого присудка з обставиною
    мети (напр., «хоче спати» vs «пішов спати»).
  - 'Трансформаційні завдання: стилістичне перетворення простого присудка на складений
    іменний.'
