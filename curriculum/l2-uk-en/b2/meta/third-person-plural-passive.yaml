slug: third-person-plural-passive
title: Пасив третьою особою множини
word_target: 4000
content_outline:
- section: Вступ
  words: 500
  points:
  - Ввести концепцію неозначено-особових речень як природного механізму української
    мови для зміщення фокусу з виконавця на саму дію.
  - Окреслити рольову модель Світського оглядача, який використовує граматичну анонімність
    для створення інтриги та залучення аудиторії.
  - Продемонструвати на автентичних міні-діалогах ситуації, де дія є важливою, а виконавець
    залишається прихованим (невизначені «вони»).
- section: Граматична база та термінологія
  words: 800
  points:
  - 'Детально пояснити механізм утворення: використання дієслова у 3-й особі множини
    теперішнього (кажуть) або минулого (казали) часу без займенника «вони».'
  - 'Проаналізувати керування відмінками за допомогою таблиць: Давальний відмінок
    для адресата (мені сказали) проти Знахідного для об''єкта дії (його звільнили).'
  - Надати контрастний аналіз з англійською мовою (They say vs. Кажуть), наголошуючи
    на обов'язковості відсутності підмета для досягнення пасивного ефекту.
- section: Соціокультурний аспект пліток
  words: 900
  points:
  - Дослідити культурний феномен пліток як «соціального клею» української громади,
    від історичних традицій до сучасного медіапростору.
  - Інтегрувати та проаналізувати ідіому «сорока на хвості принесла» як культурний
    спосіб захисту джерела неофіційної інформації.
  - 'Розширити тематичний словниковий запас: семантичне розрізнення фраз «чутка пішла»,
    «пустити чутку» та «за чутками» з автентичними прикладами.'
- section: Порівняння регістрів та аналіз помилок
  words: 900
  points:
  - 'Проаналізувати типову помилку англомовних студентів: надмірне використання займенника
    «вони» (Вони кажуть), що руйнує неозначеність.'
  - 'Створити таблицю порівняння регістрів: неофіційний розмовний пасив (вкрали гаманець)
    проти офіційного пасиву на -но/-то (гаманець було вкрадено).'
  - Пояснити семантичні наслідки помилкового повторного введення підмета в речення,
    де фокус має залишатися виключно на дії.
- section: Практичне застосування та підсумок
  words: 900
  points:
  - 'Надати розширену наративну практику: переказ світських новин, використовуючи
    конструкції «кажуть, що...», «подейкують», «нам повідомили».'
  - 'Синтезувати систему пасивного стану: алгоритм вибору між формами 3-ї особи множини,
    пасивними дієприкметниками та формами на -но/-то залежно від ситуації.'
  - Підбити підсумок модуля, підкресливши, як використання цього «найрозмовнішого
    пасиву» підвищує природність та автентичність мовлення на рівні B2.
