slug: modern-diaspora
title: Сучасна діаспора
word_target: 4000
content_outline:
  - section: 'Вступ: Глобальне українство (Introduction: Global Ukrainedom)'
    words: 500
    points:
      - Визначення поняття «діаспора» та розрізнення термінів «біженці» (refugees)
        та «емігранти» (emigrants) у контексті подій після 2022 року
      - 'Огляд географії глобального українства: від традиційних центрів (Канада,
        США, Бразилія) до нових європейських осередків інтеграції'
  - section: Історія та чотири хвилі еміграції (History and Four Waves of Emigration)
    words: 900
    points:
      - 'Аналіз чотирьох хвиль: трудова (кінець XIX ст.), політична (УНР), «Ді-Пі»
        (після 1945) та заробітчанська (1990-ті) — зв''язок із темами B1.4 (дієслова
        руху)'
      - 'Характеристика нової хвилі після повномасштабного вторгнення: соціологічний
        портрет та вплив на динаміку існуючих громад за кордоном'
  - section: Організації та інституційна мережа (Organizations and Institutional Network)
    words: 800
    points:
      - Діяльність Світового Конґресу Українців (СКУ) як парасолькової організації,
        що об'єднує громади у понад 60 країнах світу
      - 'Роль освітніх та наукових інституцій: Український Вільний Університет у Мюнхені
        та мережа суботніх шкіл українознавства для молоді'
  - section: М’яка сила та культурна дипломатія (Soft Power and Cultural Diplomacy)
    words: 700
    points:
      - 'Поняття «м''якої сили» (soft power) та лобіювання національних інтересів:
        приклад визнання Голодомору геноцидом у парламентах світу'
      - Використання безособових конструкцій на -но/-то у публіцистичних текстах про
        волонтерство (напр., «допомогу зібрано», «рішення ухвалено», «петицію подано»)
  - section: Мова діаспори та типові помилки (Language of Diaspora and Common Errors)
    words: 700
    points:
      - 'Порівняння діаспорної та материкової української: архаїзми «старої» еміграції
        vs неологізми сучасної інтегрованої молоді'
      - 'Корекція типових помилок: кальки з англійської у пасивному стані (напр.,
        вживання орудного відмінка дійової особи «Книга написана автором» замість
        активного «Автор написав книгу»)'
  - section: 'Практика: Аналіз та рефлексія (Practice: Analysis and Reflection)'
    words: 400
    points:
      - Критичний аналіз статті про сучасну діаспорну ініціативу з використанням публіцистичного
        та офіційно-ділового стилів
      - Підсумкова дискусія про роль діаспори як амбасадорів України та написання
        офіційного звернення до міжнародної організації
