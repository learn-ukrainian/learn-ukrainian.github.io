slug: modern-diaspora
title: Сучасна діаспора
word_target: 4000
content_outline:
- section: 'Вступ: Глобальне українство'
  words: 500
  points:
  - Чітке розмежування термінів «діаспора», «емігранти», «біженці» та «переміщені
    особи» у контексті сучасних подій
  - 'Огляд географії: традиційні осередки (Канада, США) та зміщення центру ваги до
    Європи після 2022 року'
  - Концепція глобального українства як мережі, а не просто географічного розсіяння
- section: Історія та чотири хвилі еміграції
  words: 900
  points:
  - 'Перша хвиля (кінець XIX ст.): трудова міграція до Канади, США, Бразилії, сільськогосподарське
    освоєння земель'
  - 'Друга хвиля (політична): еміграція уряду УНР та інтелігенції після поразки визвольних
    змагань 1917-1921 рр.'
  - 'Третя хвиля (Ді-Пі): переміщені особи після Другої світової війни, табори в Німеччині,
    збереження інституцій'
  - 'Четверта хвиля (заробітчанська, 1990-ті) та сучасна міграція: соціологічний портрет
    нової хвилі та її взаємодія зі старими громадами'
- section: Організації та інституційна мережа
  words: 800
  points:
  - Роль Світового Конґресу Українців (СКУ) як парасолькової координаційної організації
  - 'Пласт, СУМ та мережа суботніх українознавчих шкіл: механізми передачі мови та
    ідентичності новим поколінням'
  - 'Наукові установи в екзилі: Український Вільний Університет (Мюнхен), НТШ, Гарвардський
    інститут українознавства'
- section: М’яка сила та культурна дипломатія
  words: 700
  points:
  - Визначення «м'якої сили» в контексті лобіювання українських інтересів (визнання
    Голодомору, підтримка під час війни)
  - 'Граматика в контексті: використання форм на -но/-то для опису результатів діяльності
    («допомогу зібрано», «резолюцію ухвалено»)'
  - Як уникати калькування англійського/російського пасивного стану в публіцистичних
    звітах (заміна «Книга написана автором» на «Автор написав книгу»)
- section: Мова діаспори та типові помилки
  words: 700
  points:
  - 'Феномен діаспорної мови: збереження архаїзмів, галицизмів (скринька, ровер) та
    правописних норм 1928 року (скрипниківка)'
  - Вплив мов країн проживання (англіцизми, іспанізми) та сучасний процес мовної реінтеграції
    з материковою Україною
  - Граматичний розбір типових синтаксичних та лексичних помилок україномовних за
    кордоном
- section: 'Практика: Аналіз та рефлексія'
  words: 400
  points:
  - 'Практичне завдання: аналіз реального пресрелізу діаспорної організації з пошуком
    форм на -но/-то'
  - 'Дискусійний блок: як інтегруватися в нове суспільство, не втрачаючи української
    ідентичності'
  - 'Письмове завдання: складання короткого офіційного листа/звернення до міжнародної
    інституції'
