slug: phrases-word-combinations
title: 'Словосполучення: типи та зв''язки'
word_target: 4000
content_outline:
- section: 'Вступ: Словосполучення як одиниця синтаксису'
  words: 500
  points:
  - Сформулювати визначення словосполучення як сполуки двох або більше повнозначних
    слів (за допомогою графічних виділень).
  - 'Чітко розмежувати словосполучення та речення: навести порівняльну таблицю з акцентом
    на відсутність предикативності (граматичної основи).'
  - Згадати внесок Олександра Потебні у дослідження українського синтаксису як культурний
    гачок.
- section: Типи словосполучень за головним словом
  words: 900
  points:
  - Створити окремий H3 для 'Іменні словосполучення' з 5+ прикладами (іменник як головне
    слово).
  - Створити окремий H3 для 'Дієслівні словосполучення', підкресливши динамічність
    української мови порівняно з номінативним стилем.
  - Створити окремі H3 для 'Прислівникові' та 'Прикметникові' словосполучення з аналізом
    їхньої стилістичної ролі.
- section: 'Типи зв''язку: узгодження, керування, прилягання'
  words: 900
  points:
  - 'Окремий H3: ''Узгодження'' — продемонструвати зміну залежного слова за родом,
    числом і відмінком за допомогою таблиці-парадигми.'
  - 'Окремий H3: ''Керування'' — пояснити вимогу головного слова до відмінка залежного
    (напр., ''читати книгу'' — Зн.в.).'
  - 'Окремий H3: ''Прилягання'' — навести приклади незмінюваних залежних слів (прислівники,
    інфінітиви, дієприслівники).'
  - 'Додати Mermaid-блок: алгоритм визначення типу синтаксичного зв''язку.'
- section: Розбір словосполучень та аналіз структури
  words: 900
  points:
  - Надати покрокову інструкцію (3 кроки) для синтаксичного розбору з двома детальними
    прикладами.
  - 'Провести контрастивний аналіз: відмінності керування в українській та англійській
    мовах.'
  - 'Створити трансформаційні вправи в тексті: перетворення узгодження на керування
    (напр., ''шовкова сукня'' -> ''сукня з шовку'').'
  - Розмежувати вільні та стійкі (фразеологічні) словосполучення з культурними прикладами.
- section: Практика та виправлення помилок
  words: 800
  points:
  - 'Окремий блок H3 ''Типові помилки'': детально розібрати правильне українське керування,
    що страждає від російського впливу (дякувати кому, навчатися чого, вибачити кому).'
  - Навести комплексний фрагмент тексту (наукового стилю) з виділеними словосполученнями
    для самостійного аналізу читачем.
  - Зробити підсумок (H3 'Підсумок'), який пояснює, як розуміння словосполучень готує
    до аналізу типів присудка (b2-12).
