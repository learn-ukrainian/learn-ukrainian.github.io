slug: professional-reports-basics
title: 'Професійні звіти: Основи'
word_target: 4000
content_outline:
- section: Вступ
  words: 600
  points:
  - Introduce the Ukrainian official-business style (офіційно-діловий стиль), highlighting
    its deep historical roots in the Cossack Hetmanate's General Military Chancellery.
  - Frame the transition from short-form emails (M85-86) to structured reports, emphasizing
    the modern shift toward concise, global standards and away from wordy Soviet 'kantseliaryzm'.
  - Establish the expectation of 100% Ukrainian immersion for professional communication
    at the B2 level.
- section: 'Імерсивна розповідь: Структура та компоненти'
  words: 1000
  points:
  - 'Narrative arc: Follow a junior analyst (молодший аналітик) preparing their first
    major project progress report, balancing technical results with practical recommendations.'
  - 'Break down the structural components within the story: from the Title Page (Титульна
    сторінка) and Methodology (Методологія), to the Appendices (Додатки).'
  - 'Explain the ''Executive Summary'' (Резюме) strategy: why it must be written last
    but placed first to provide immediate clarity for decision-makers.'
- section: Аналіз та візуалізація даних
  words: 1000
  points:
  - 'Detail the logical organization of a report: flowing from general findings to
    specific conclusions with clear header hierarchy and one thought per paragraph.'
  - Provide specific vocabulary for describing data trends (зростання, зниження, стабілізація)
    neutrally, strictly avoiding emotional or subjective evaluations.
  - Demonstrate how to linguistically integrate visualizations using standard formulaic
    expressions (e.g., 'Як показано на графіку...', 'Згідно з даними в таблиці...').
- section: 'Граматика: Безособовість та стиль'
  words: 800
  points:
  - 'State Standard §4.2.6: Teach the formation and use of deverbal nouns with suffixes
    -ння and -ення (виконання, забезпечення) to formalize actions.'
  - 'State Standard §4.3.3.1: Master impersonal constructions and the ''було'' + past
    participle structure (було виявлено, встановлено) to emphasize results over actors.'
  - Provide comparison tables illustrating how to convert conversational active voice
    ('Ми проаналізували') into professional passive voice ('Було проаналізовано').
- section: Підсумок та усунення помилок
  words: 600
  points:
  - 'Drill essential prepositional mastery: explicitly correct the misuse of ''згідно''
    and enforce ''згідно з'' + Instrumental case.'
  - 'Correct major corporate calques: contrast the incorrect ''приймати участь'' /
    ''підводити підсумки'' with the correct ''брати участь'' / ''підбивати підсумки''.'
  - Identify and eliminate common pleonasms ('вільна вакансія', 'своя автобіографія')
    to meet B2 conciseness standards.
  - Synthesize the module's skills to prepare the learner for M88 (Advanced Reports)
    and the B2 Final Exam.
