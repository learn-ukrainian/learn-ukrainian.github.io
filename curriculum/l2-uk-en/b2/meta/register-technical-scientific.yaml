slug: register-technical-scientific
title: 'Регістр: науково-технічний стиль'
word_target: 4000
content_outline:
- section: 'Вступ: Науково-технічний стиль та його історія'
  words: 600
  points:
  - 'Написати загальне введення (H3) з визначенням ключових рис стилю: точність, однозначність,
    об''єктивність.'
  - Створити історичний екскурс (H3) про 'Золоте десятиліття' української термінології
    у 1920-х.
  - Включити окремий підрозділ (H3) про внесок Наукового товариства ім. Шевченка у
    розбудову наукового апарату.
  - Додати культурну врізку [!cultural] про репресії щодо української наукової мови
    в СРСР та сучасне відновлення.
- section: Лексика та термінологія
  words: 1000
  points:
  - Пояснити принцип 'один термін = одне поняття' (H3) з наведенням 3+ прикладів термінів.
  - 'Створити порівняльну таблицю віддієслівних іменників (дія vs. результат: вимірювання
    - вимір, дослідження - дослід).'
  - Описати вживання абревіатур (H3) з наведенням 5+ найпоширеніших скорочень (НАН,
    ВВП, ККД).
  - Продемонструвати адаптацію латинських/грецьких коренів (H3) в українському науковому
    тексті.
  - Використати врізку [!tip] щодо уникнення русизмів-кальок у термінології.
- section: Граматика об'єктивності
  words: 1000
  points:
  - Розписати правила утворення та вживання форм на -но/-то (H3) з 5+ прикладами (досліджено,
    доведено).
  - Пояснити використання дієприкметників та пасивного стану (H3) для акцентування
    на об'єкті.
  - 'Додати таблицю-порівняння: активний стан (сучасна тенденція ''дослідники виявили'')
    проти пасивного (традиційний підхід ''було виявлено'').'
  - Навести приклади імперсональних конструкцій (H3) для інструкцій (необхідно, слід
    + інфінітив).
- section: Типологія та структура технічних текстів
  words: 800
  points:
  - 'Описати структуру IMRD (H3) з детальним поясненням кожного елемента: Вступ, Методи,
    Результати, Дискусія.'
  - Пояснити принципи написання інструкцій (H3), навівши приклад короткої інструкції
    з нумерованим списком.
  - Охарактеризувати патентну лексику (H3) як симбіоз юридичної та технічної мов.
  - Додати врізку [!note] про роль номіналізації у підвищенні щільності наукового
    тексту.
- section: 'Практика: Трансформація та редагування'
  words: 600
  points:
  - Подати список типових кальок (H3) та їх правильних відповідників у вигляді таблиці
    (напр. приймати участь -> брати участь).
  - Розібрати складні прийменникові конструкції (H3) (за результатами, за умови) з
    3+ прикладами.
  - 'Створити міні-кейс: трансформація розмовного тексту на технічний (H3) з покроковим
    поясненням граматичних та лексичних змін.'
