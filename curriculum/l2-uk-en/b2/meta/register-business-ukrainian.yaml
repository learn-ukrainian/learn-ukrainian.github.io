slug: register-business-ukrainian
title: Ділова українська мова
word_target: 4000
content_outline:
- section: 'Вступ: Поняття ділового стилю'
  words: 500
  points:
  - Окреслити межі ділового стилю згідно з Держстандартом §4.4.1 (офіційно-ділове
    та напівофіційне спілкування).
  - 'Пояснити «фактор кави»: як сучасні індустрії (зокрема IT) поєднують неформальний
    small talk з офіційною базою під час перших зустрічей.'
  - 'Представити Relationship-First культуру як основу українського бізнесу: чому
    довіра передує контрактам.'
- section: Ділове та електронне листування
  words: 900
  points:
  - 'Деталізувати структуру ідеального ділового листа: від чіткої теми до професійного
    підпису.'
  - Пояснити використання «Пане/Пані» + ім'я/прізвище як деколонізований стандарт
    звертання (замість по батькові) та правила переходу на «ти».
  - 'Провести візуальне порівняння: лист із русизмами/кальками проти листа зразковою
    українською діловою мовою.'
  - Надати мовні кліше для комерційних пропозицій та ввічливих прохань під час першого
    контакту.
- section: Переговори та укладання угод
  words: 900
  points:
  - 'Ввести лексику переговорів (Держстандарт §3.11): активне вживання фраз «вести
    переговори», «досягти домовленості».'
  - 'Пояснити мистецтво компромісу через мовні конструкції: як ввічливо висловити
    незгоду та «піти на компроміс».'
  - 'Описати етикет ділових подарунків: як символічні жести (кава, брендована продукція)
    будують довіру без перетину етичних меж.'
  - 'Закріпити юридичну термінологію: різницю між «укласти угоду», «підписати контракт»
    та «розірвати угоду».'
- section: Корпоративна комунікація та етика
  words: 700
  points:
  - 'Розмежувати внутрішню та зовнішню комунікацію: специфіка мови для річних/фінансових
    звітів проти мови презентацій.'
  - 'Надати лексику для опису довгострокових відносин: «плідна співпраця», «взаємовигідні
    умови», «стратегічне партнерство».'
  - 'Розібрати корпоративну етику першого контакту: чому «привіт» у холодному листі
    є неприпустимим.'
- section: Типові помилки та мовна норма
  words: 600
  points:
  - Виправити поширену кальку «робити рішення» на нормативне «ухвалювати / приймати
    рішення» з поясненням контексту.
  - Пояснити фальшивого друга перекладача «актуальний» (на часі, relevant), щоб уникнути
    плутанини з англійським «actual».
  - Проаналізувати проблему змішування регістрів (Register Confusion), коли розмовний
    стиль руйнує професійний імідж.
- section: Практика та підсумок модуля
  words: 400
  points:
  - 'Описати рольову ситуацію для моделювання: переговори про партнерство від етапу
    small talk до пропозиції.'
  - Дати інструкції для написання відповіді на складний діловий запит із дотриманням
    ієрархії.
  - Підсумувати ключові правила ділового стилю та етикету в сучасному українському
    бізнес-середовищі.
