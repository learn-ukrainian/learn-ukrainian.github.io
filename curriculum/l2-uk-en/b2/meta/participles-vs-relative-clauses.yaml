slug: participles-vs-relative-clauses
title: Дієприкметники проти підрядних речень
word_target: 4000
content_outline:
- section: 'Вступ: Два способи вираження ознаки за дією'
  words: 500
  points:
  - Чітке визначення дієприкметника як компактної форми та підрядного речення як розгорнутої
    синтаксичної конструкції з власним підметом і присудком (за §4.3.4.2).
  - 'Пояснення концепції стилістичного вибору: чому жива, природна українська мова
    надає перевагу підрядним реченням, а накопичення дієприкметників робить текст
    важким.'
  - Оголошення 100% українськомовної імерсії та ролі 'літературного редактора' для
    цього модуля.
- section: Морфологічний та синтаксичний еквівалент
  words: 800
  points:
  - 'Систематичне порівняння активних форм у таблиці: демонстрація того, чому фраза
    ''працюючий студент'' є калькою, а ''студент, який працює'' — літературною нормою.'
  - 'Аналіз пасивних форм з прикладами: компактна конструкція (''прочитана книга'')
    проти нейтральної розмовної форми (''книга, яку прочитали'').'
  - 'Детальний розбір сполучних слів: правила відмінювання ''який'', стилістична легкість
    займенника ''що'' та специфіка використання слова ''котрий''.'
- section: Стилістичний вибір та культура мовлення
  words: 900
  points:
  - 'Культурний контекст: огляд боротьби з ''канцеляритом'' на основі порад Бориса
    Антоненка-Давидовича щодо ''оживлення'' текстів.'
  - 'Деколонізація синтаксису: пояснення принципу агентності (Agency) та переваги
    активних дієслів над пасивними дієприкметниками.'
  - 'Регістрова карта: розмежування сфер вживання (термінологія на кшталт ''чинний
    закон'', ''діючий вулкан'' в академічному стилі проти розмовної природності).'
- section: Аналіз та виправлення типових помилок
  words: 900
  points:
  - 'Ідентифікація суржику: правила виявлення та викорінення неприродних активних
    дієприкметників на -уч/-юч (*бажаючі* → *охочі*, *оточуюче* → *довкілля*).'
  - 'Розв''язання проблеми ''якання'': стратегії чергування сполучних слів (''який''
    та ''що'') для уникнення монотонності.'
  - Блок-схема та практичні приклади правильного узгодження відмінків для сполучного
    слова 'який' у складних реченнях.
- section: Трансформаційна практика та редагування
  words: 900
  points:
  - 'Покроковий майстер-клас ''Літературний редактор'': демонстрація перетворення
    сухого, перенасиченого дієприкметниками абзацу на живу публіцистику.'
  - Аналіз збереження семантичного значення під час синтаксичних трансформацій (зміна
    форми без втрати змісту).
  - Підсумковий чек-лист критеріїв вибору між дієприкметником і підрядним реченням
    для самостійної перевірки текстів.
