slug: set-expressions-ii-objects-abstract
title: 'Сталі вирази II: Предмети та абстракції'
word_target: 4000
content_outline:
- section: 'Вступ: Предмети як символи та давній світогляд'
  words: 600
  points:
  - Сформулювати концепцію метафори (Держстандарт §4.4.1.2) як перенесення властивостей
    побутових предметів на людські стосунки.
  - 'Ввести культурний гачок: пояснити вірування про спалювання сміття в печі та появу
    ідіоми «виносити сміття з хати» як механізм захисту приватності.'
  - Показати, що хата, стіл і ложка в мові — це збережені коди українського світосприйняття,
    а не просто предмети побуту.
- section: Магія побуту — сталі вирази з предметами
  words: 1000
  points:
  - 'Етимологічний розбір «народитися в сорочці»: пояснити біологічний контекст (навколоплідна
    оболонка) та значення унікального Божого захисту; навести 2 приклади.'
  - 'Символіка посуду: розкрити значення «розбити глечик» та синоніма «побити горшки»
    як руйнування цілісності стосунків; навести міні-діалог.'
  - 'Предмети одягу та їжа: розібрати ідіоми «сісти в калошу» (провал) та «каша в
    голові» (ментальна плутанина); подати приклади вживання в сучасному контексті
    навчання чи роботи.'
  - 'Вразливість: пояснити анатомічно-предметну метафору «дістати до живого» з акцентом
    на глибокий емоційний біль; навести 2 приклади.'
- section: Від серця до неба — абстракції у фразеології
  words: 900
  points:
  - 'Емоційні стани через абстракцію: пояснити вираз «душа в п''яти» як фізичну реакцію
    на сильний раптовий страх; навести контекстні приклади.'
  - 'Тягар та полегшення: протиставити ідіоми «камінь на серці» (постійна провина
    або тривога) та «як гора з плечей» (раптове полегшення).'
  - 'Стан ейфорії: розібрати «на сьомому небі», звернувши особливу увагу на правильний
    прийменник «на» (пряме попередження про помилкове «в»); навести 2 приклади.'
  - 'Опис рис характеру та зовнішності: ввести вирази «вітер у голові» (легковажність)
    та народнопоетичний ідеал краси «кров з молоком» (здоров''я та енергія).'
- section: Робота над помилками — культура мовлення
  words: 800
  points:
  - 'Деконструкція суржику та калькування: детально розібрати заміну кальки «приймати
    міри» на правильне офіційно-ділове «вживати заходів» (дати таблицю-порівняння).'
  - 'Семантична різниця: пояснити різницю між словами «доля» (fate) і «частка» (portion),
    щоб виправити типову помилку в ідіомі «левова частка».'
  - 'Усунення плеоназмів: пояснити, чому «бачити своїми очима» є надлишковою калькою,
    і закріпити нормативне «бачити на власні очі».'
  - 'Граматична правка (керування): закріпити давальний відмінок після дієслова дякувати
    («дякую тобі» замість калькованого знахідного «дякую тебе»).'
  - 'Суржик обставин: пояснити обов''язкову заміну конструкції «по крайній мірі» на
    літературне «принаймні».'
- section: Практика та творче застосування
  words: 700
  points:
  - 'Завдання 1 (Комунікативне): Читання короткого автентичного або адаптованого медіатексту
    (200 слів) з пошуком епітетів та метафор (відповідність Держстандарту §4.4.1.2).'
  - 'Завдання 2 (Продуктивне): Написання короткої історії або есе з обов''язковою
    інтеграцією 5+ нових ідіом у правильному контексті.'
  - 'Завдання 3 (Аналітичне): Порівняння українських предметних метафор з відомими
    англійськими аналогами (наприклад, «каша в голові» vs «muddled head»), підкреслюючи
    унікальність українського образного мислення.'
