slug: synonyms-state
title: 'Синоніми: Стан та Буття'
word_target: 4000
content_outline:
- section: 'Вступ: Філософія буття та стану'
  words: 600
  points:
  - Окреслити перехід на рівні B2 від базового дієслова «бути» до точної синонімії
    для опису професійних та абстрактних станів.
  - Ввести концепцію «двох натур» Григорія Сковороди для ілюстрації різниці між фізичним
    перебуванням та глибинним буттям.
  - 'Пояснити український кордоцентризм: як внутрішні стани описуються через емоційну
    призму, вимагаючи багатої палітри дієслів замість універсальних еквівалентів.'
- section: Бути чи існувати? Тонкощі синонімії
  words: 900
  points:
  - 'Створити H3 для дієслова «існувати»: пояснити його абстрактне та філософське
    застосування («проблема існує», «існують ризики») на противагу загальному «бути».'
  - 'Створити H3 для дієслова «перебувати»: навести маркери офіційно-ділового та наукового
    стилю («перебувати в стані спокою», «перебувати під контролем»), пояснити керування
    відмінками.'
  - 'Створити H3 для дієслова «становити»: розкрити його роль для ідентифікації та
    точних професійних визначень («становити загрозу», «становити виняток»).'
- section: Сприйняття проти реальності
  words: 900
  points:
  - 'Створити H3 для «здаватися» та «видаватися»: пояснити вираження суб''єктивного
    сприйняття та функцію усталеного виразу «здавалося б» як маркера сумніву.'
  - 'Створити H3 для «виглядати» проти «виявлятися»: чітко розмежувати візуальну оцінку
    («виглядати втомленим») та результативний факт («виявлятися правдою / як виявилося»).'
  - Додати таблицю-порівняння (з прикладами) для дієслів «видаватися» і «справляти
    враження» в контексті соціальної взаємодії.
- section: 'Рятувальна операція: виправлення кальок'
  words: 1000
  points:
  - 'Створити H3 для деколонізації «знаходитися»: пояснити, чому це калька, і дати
    чіткий алгоритм заміни («перебувати» — для людей у стані, «розташовуватися» —
    для географії, «міститися» — для тексту/контейнера).'
  - 'Створити H3 для викорінення «являтися»: пояснити помилку (в українській мові
    являється лише привид) і навчити використовувати конструкцію «бути» + орудний
    відмінок або дієслово «становити».'
  - 'Створити H3 для диференціації «виглядати» і «дивитися»: навести контрастні приклади
    для усунення типової лексичної інтерференції.'
- section: Практичне застосування та підсумок
  words: 600
  points:
  - Навести зразки коротких текстів (офіційне повідомлення, філософський роздум, новина),
    що демонструють вибір дієслова залежно від стилістичного регістра.
  - Об'єднати вивчену лексику (виглядати, здаватися, виявлятися, становити) у цілісний
    наратив про опис складного стану справ.
  - Сформулювати фінальний висновок про те, як стилістично марковані синоніми буття
    формують багату українську мовну картину світу.
