slug: idioms-body-head-face
title: 'Соматичні фразеологізми: Голова та обличчя'
word_target: 4000
content_outline:
- section: 'Вступ: Семантичний центр мислення'
  words: 600
  points:
  - 'Представити концепт соматичних фразеологізмів: тіло як інструмент пізнання світу
    в мовній картині.'
  - Описати голову як центр інтелекту («світла голова») та емоцій («гаряча голова»),
    наводячи автентичні приклади.
  - Пояснити роль ідіом у збагаченні мовлення на рівні B2 (відповідно до вимог Державного
    стандарту), наголосивши на 100% україномовному середовищі уроку.
  - Ввести персону Портретиста, який змальовує характери через мовленнєві риси.
- section: Культурний код та етимологія
  words: 850
  points:
  - 'Розкрити історичне тло виразу «опростоволоситися»: описати традиційний український
    очіпок та соціальний сором з''явитися «простоволосою».'
  - Пояснити метафору маніпуляції у виразі «водити за ніс» через ярмаркову традицію
    водіння ведмедя за кільце.
  - Проаналізувати перехід виразу «втратити обличчя» зі східної філософії в сучасний
    український офіційно-діловий та корпоративний стилі з контекстними прикладами.
- section: 'Майстерня фразеології: Голова та очі'
  words: 950
  points:
  - Надати 3-4 контекстні приклади для ідіом «мати голову на плечах» (здоровий глузд)
    та «як сніг на голову» (раптовість).
  - 'Сфокусувати увагу на очах: пояснити значення «замилювати очі» (створювати хибне
    враження, обманювати) з акцентом на публіцистичний регістр.'
  - Детально розібрати питомо український вислів «впадати в око», протиставляючи його
    неправильним калькам та надаючи автентичні текстові ілюстрації.
  - Навести приклади високої інтенсивності з «хоч око виколи» та влучних дій «не в
    бров, а в око».
- section: 'Аналіз помилок: Носи, вуха й прийменники'
  words: 800
  points:
  - Створити міні-діалог для чіткого розрізнення «ламати голову» (когнітивне зусилля)
    та «морочити голову» (створення незручностей іншому).
  - 'Пояснити вушні та носові соматизми: «задирати носа» (пихатість), «нашорошити
    вуха» (уважність), «пропустити повз вуха» (ігнорування).'
  - 'Надати чітке правило нормативного граматичного керування: «сміятися з когось»,
    попереджаючи про поширену граматичну інтерференцію з прийменником «над».'
- section: Практичний синтез і творча продукція
  words: 800
  points:
  - 'Надати завдання на створення «лінгвістичного портрета»: опис особистості з обов''язковим
    використанням 5+ соматизмів з модуля.'
  - Систематизувати ідіоми за регістрами у вигляді таблиці (офіційно-ділові проти
    розмовно-побутових).
  - Зробити змістовий місток до наступного модуля (M50), пояснивши різницю між мисленням
    (голова) та активною дією (руки/ноги) у фразеологічній системі.
