slug: idioms-animals-i
title: 'Фразеологізми: Тварини I (Вовк, Собака, Кінь)'
word_target: 4000
content_outline:
- section: 'Вступ: Тваринний код української культури'
  words: 600
  points:
  - Введення концепту «тваринного коду» як ключа до розуміння українського народного
    світогляду (згідно зі стандартом §4.4.1.2 про стилістичні засоби та метафори).
  - 'Обговорення ролі тварин у фольклорі з позиції Етнографа: тварини як активні суб''єкти,
    провідники між світами та дзеркало людських чеснот.'
  - 'Аналіз дуалізму української фразеології: поєднання небезпеки та сакральності
    без колоніальних спрощень.'
  - 'Встановлення правила 100% занурення: повне використання української мови для
    пояснення складних метафор.'
- section: Вовк — між демоном та захисником
  words: 900
  points:
  - Дослідження дуалізму вовка у поліському фольклорі та його роль як сакрального
    тотема для козаків-характерників.
  - Детальний розбір ідіом «Вовка ноги годують» та «Скільки вовка не годуй...» з прикладами
    їх використання в наративних контекстах.
  - Стилістичний аналіз виразу «Дивитися вовком» як маркера ворожості (із наголосом
    на уникнення русизмів у розмовній практиці).
  - Вивчення біблійної метафори «Вовк в овечій шкурі» в межах української книжної
    традиції лицемірства.
- section: 'Собака: відданість, майстерність та щоденний побут'
  words: 800
  points:
  - Етимологічний розбір виразу «Собаку з'їсти» (бути майстром справи), зняття дослівного
    значення.
  - Аналіз соціальної поведінки через метафори «Як собака на сіні» та «Собака гавкає
    — вітер несе».
  - 'Робота з розмовним регістром: використання колоквіалізмів «собаче життя» та «потрібний
    як собаці п''ята нога».'
  - Створення короткого діалогу-прикладу, де українці виступають активними дійовими
    особами, використовуючи ці вирази у побуті.
- section: Кінь — вірний побратим та символ долі
  words: 900
  points:
  - Розкриття образу коня як «побратима» у козацькій традиції (на прикладі картини
    «Козак Мамай»), підкреслюючи деколонізований, неімперський підхід до природи.
  - Опрацювання суто розмовного виразу «Кінь ще не валявся» та чітке маркування його
    недоречності в формальних текстах.
  - Дослідження концепту долі через вирази «Долі й конем не об'їдеш» та «Дарованому
    коневі в зуби не заглядають».
  - 'Практичне використання сучасних метафор успіху та праці: «бути на коні» та «робоча
    конячка».'
- section: 'Практикум: Труднощі перекладу та тваринні метафори'
  words: 800
  points:
  - 'Порівняльна фразеологія та уникнення кальок: пояснення, чому англійське «raining
    cats and dogs» перекладається як «ллє як з відра».'
  - 'Вправи на вибір правильного регістра: диференціація книжних метафор («вовк в
    овечій шкурі») та грубо-розмовних («собаче життя»).'
  - 'Творче завдання: написання короткої байки в ролі Етнографа («Як кажуть старі
    люди...») з інтеграцією вивчених фразеологізмів.'
  - Перевірка розуміння (самоконтроль) з акцентом на активне використання вивчених
    ідіом у 100% україномовному середовищі.
