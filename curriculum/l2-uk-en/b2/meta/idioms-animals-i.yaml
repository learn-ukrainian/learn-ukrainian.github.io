slug: idioms-animals-i
title: 'Фразеологізми: Тварини I (Вовк, Собака, Кінь)'
word_target: 4000
content_outline:
  - section: 'Вступ: Тваринний код української культури (Introduction: Animal Code
      of Ukrainian Culture)'
    words: 600
    points:
      - Введення поняття «тваринного коду» як ключа до розуміння народного світогляду
        згідно зі стандартом §4.4.1.2 (стилістичні засоби лексики)
      - 'Обговорення ролі тварин у фольклорі через призму етнографа: тварини як провідники
        між світами та символи людських рис'
      - Аналіз подвійної природи образу (вовк як небезпека і сакральна сила, собака
        як відданість і приниження)
  - section: 'Вовк — між демоном та захисником (The Wolf: Between Demon and Protector)'
    words: 900
    points:
      - 'Культурний гачок: дуалізм вовка в Поліському фольклорі (створений дияволом,
        але на службі у Бога) та роль вовка як тотема для козаків-характерників'
      - Детальний розбір фразеологізмів «Вовка ноги годують» та «Скільки вовка не
        годуй, він у ліс дивиться» як описів незмінної природи та потреби в активній
        дії
      - Аналіз виразу «Дивитися вовком» (вороже налаштованим) замість нетипового «Морити
        вовка голодом» для вираження емоційного стану
      - Вивчення образу «Вовк в овечій шкурі» як біблійної метафори лицемірства, поширеної
        в українській книжній традиції
  - section: 'Собака: відданість, майстерність та щоденний побут (The Dog: Loyalty,
      Mastery, and Daily Life)'
    words: 800
    points:
      - 'Розвінчання помилкового тлумачення виразу «Собаку з''їсти»: перехід від буквального
        розуміння до значення «бути великим знавцем/майстром справи»'
      - 'Аналіз соціальних контекстів: «Як собака на сіні» (егоїзм) та «Собака гавкає
        — вітер несе» (ігнорування пустих слів)'
      - 'Робота з частотними колоквіалізмами: «собаче життя» та «потрібний як собаці
        п''ята нога» з акцентом на емоційне забарвлення та розмовний регістр'
  - section: 'Кінь — вірний побратим та символ долі (The Horse: Faithful Brother-in-arms
      and Symbol of Destiny)'
    words: 900
    points:
      - 'Культурний контекст: кінь у козацькій традиції та картинах «Козак Мамай»
        як символ свободи та «побратим»'
      - Опрацювання виразу «Кінь ще не валявся» з попередженням про його суто розмовний
        регістр та недоречність у формальному стилі
      - Аналіз метафори долі через вираз «Долі й конем не об'їдеш» та етикетного правила
        «Дарованому коневі в зуби не заглядають»
      - 'Вивчення частотних образів: «бути на коні» (успіх) та «робоча конячка» (невтомна
        праця)'
  - section: 'Практикум: Труднощі перекладу та тваринні метафори (Practicum: Translation
      Difficulties and Animal Metaphors)'
    words: 800
    points:
      - 'Аналіз та виправлення помилок дослівного перекладу: чому англійське «raining
        cats and dogs» стає українським «ллє як з відра» (порівняльна фразеологія)'
      - 'Вправи на вибір правильного регістра: диференціація книжних метафор (вовк
        в овечій шкурі) та грубо-розмовних виразів (собаче життя)'
      - 'Творче завдання: написання байки в ролі Етнографа («Як кажуть старі люди...»),
        інтегруючи вивчені фразеологізми про вовка, собаку та коня'
