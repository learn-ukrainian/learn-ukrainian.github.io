slug: register-practice-cross-register-rewriting
title: 'Регістрова практика: Перенесення тексту між стилями'
word_target: 3000
content_outline:
- section: 'Огляд: Один зміст — п''ять голосів'
  words: 500
  points:
  - 'Сформулювати мету: навчитися перемикати мовні регістри відповідно до ситуації
    спілкування (науковий, офіційний, публіцистичний, художній, розмовний).'
  - 'Ввести наскрізну метафору: обрати одну просту ситуацію (наприклад, купівля ранкової
    кави або запізнення на зустріч), яка слугуватиме базою для всіх подальших трансформацій.'
  - 'Пояснити загальний принцип адаптації тексту: як зміна мети спілкування вимагає
    зміни лексичних засобів (термінів, синонімів) та синтаксичних конструкцій.'
- section: Трансформація в науковий та офіційний стилі
  words: 900
  points:
  - 'Науковий стиль: пояснити принципи використання номіналізації, безособових конструкцій
    та фахових термінів (процес, метод, поняття). Продемонструвати трансформацію базової
    ситуації.'
  - 'Офіційний стиль: описати чітку структуру документів, доречні формули звертання
    та стандартні кліше. Показати відповідну трансформацію базової ситуації.'
  - 'Аналіз типових помилок (русизмів): пояснити правильне вживання виразів «брати
    участь» (не «приймати участь») та «згідно з наказом / відповідно до наказу» (не
    «згідно наказу»).'
  - 'Боротьба з канцеляритом (деколонізаційний фокус): розрізнити необхідні елементи
    ділового стилю від шкідливого спадку радянської бюрократії у повсякденному спілкуванні.'
- section: Трансформація в публіцистичний та художній стилі
  words: 900
  points:
  - 'Публіцистика: навчити будувати інформативний лід, яскравий заголовок, використовувати
    емоційно-експресивну лексику та атрибуцію цитат. Показати трансформацію базової
    ситуації.'
  - 'Художній стиль: продемонструвати використання епітетів, метафор та порівнянь
    для створення глибокого образу. Показати відповідну трансформацію.'
  - 'Культурний гачок: проаналізувати суржик та недоречне вживання канцеляризмів як
    літературний прийом створення комічного персонажа на прикладі Возного з п''єси
    «Наталка Полтавка».'
- section: Трансформація в розмовний стиль
  words: 800
  points:
  - 'Розмовний стиль: акцентувати увагу на природності мовлення, ролі еліпсису (пропуску
    слів), часток, вигуків та емоційної інтонації. Показати трансформацію у формат
    дружнього діалогу.'
  - 'Невідповідність регістру: навести приклади (Learner error) стилістичного дисонансу
    — вживання смайликів в офіційному листуванні або канцелярських пасивних конструкцій
    («мною було вирішено») у розмові з друзями.'
  - Надати приклади міні-діалогів для демонстрації емоційності та природних скорочень.
- section: 'Практикум: Редагування та плеоназми'
  words: 900
  points:
  - Визначити поняття плеоназму та проаналізувати причини їхньої появи (спроба звучати
    «розумніше»).
  - Виявити та виправити найпоширеніші плеоназми («вільна вакансія», «своя автобіографія»,
    «у травні місяці», «період часу»).
  - 'Інтеграційне завдання: запропонувати нейтральний текст на актуальну тему (наприклад,
    про кліматичні зміни або цифрову безпеку) для самостійної трансформації учнем
    у три різні регістри.'
  - 'Надати чекліст для самооцінки: перевірка доречності використаних лексичних та
    синтаксичних засобів.'
