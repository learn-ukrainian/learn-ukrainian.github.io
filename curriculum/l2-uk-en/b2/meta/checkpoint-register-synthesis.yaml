slug: checkpoint-register-synthesis
title: 'Checkpoint: Register Synthesis (Синтез регістрів)'
word_target: 4000
content_outline:
- section: Вступ та огляд
  words: 400
  points:
  - Створити блок H3 з привітанням від імені Професійного мовного коуча та введенням
    метафори 'стилістичного гардероба' (кожен стиль — це костюм, доречний лише для
    певних подій).
  - Створити блок H3 з переліком 7 стилів української мови (відповідно до §4.4.1.1
    Стандарту) з наголосом на офіційному, науковому та публіцистичному.
  - Створити блок H3 про важливість чистоти регістру на рівні B2 для професійної комунікації
    та запобігання комунікативним провалам.
- section: 'Офіційно-діловий стиль: Від «Руської Правди» до сьогодні'
  words: 800
  points:
  - Створити блок H3 з історичним екскурсом у «Руську Правду» (XI–XII ст.) як доказ
    тисячолітньої традиції українського ділового стилю.
  - Створити таблицю в окремому H3 для аналізу ключових кліше ('чинне законодавство',
    'доводити до відома') та стандартних формул звернення/прохання.
  - Створити блок H3 'Суржикові пастки' з детальним поясненням, чому конструкції 'згідно
    з інструкцією' та 'вживати заходів' є єдино правильними, а їхні кальки ('згідно
    інструкції', 'приймати міри') — помилковими.
- section: 'Публіцистичний стиль: Сила переконання'
  words: 800
  points:
  - Створити блок H3 про українську полемічну літературу (XVI–XVII ст., зокрема Івана
    Вишенського) як історичний фундамент емоційної та переконливої публіцистики.
  - 'Створити маркований список в H3 для розбору лексичних маркерів сучасних медіа:
    емоційна лексика (''консолідація'', ''рушійна сила'') та метафоричність.'
  - 'Створити блок H3 з практичним аналізом суспільного дискурсу: як розпізнавати
    та використовувати риторичні питання для залучення уваги аудиторії.'
- section: 'Науковий стиль: Об''єктивність та аналіз'
  words: 800
  points:
  - Створити блок H3 'Фундамент академічного письма', що пояснює вимоги до абсолютної
    об'єктивності, термінологічної точності та логіки ('на підставі отриманих даних',
    'таким чином').
  - 'Створити блок H3 із синтаксичними правилами наукового тексту: використання безособових
    конструкцій та пасивного стану для акценту на процесі, а не на авторі.'
  - Створити блок H3 'Стилістичне редагування' з прикладами трансформації речень (видалення
    зайвих емоцій) та правильного подання статистичних даних.
- section: 'Синтез та трансформація: Практичний аудит'
  words: 800
  points:
  - 'Створити блок H3 з комплексною вправою ''Трансформація змісту'': порівняльна
    таблиця, що показує один факт (наприклад, явище дощу) у 3 різних регістрах.'
  - Створити блок H3 'Боротьба з плеоназмами' з переліком типових стилістичних надмірностей
    рівня B2 ('вільна вакансія', 'пам'ятний сувенір') та правилами їх усунення.
  - Створити блок H3 із ситуативними кейсами для самоперевірки, де студент повинен
    обрати правильний код спілкування залежно від соціального контексту.
- section: Підсумок та результати
  words: 400
  points:
  - Створити блок H3 з критеріями інтерпретації результатів цього стилістичного аудиту
    та оцінки загальної готовності до комунікаційного блоку.
  - Створити блок H3 з конкретними порадами та ресурсами (наприклад, litopys.org.ua)
    для поглиблення знань з історії української мови та стилістики.
  - Створити блок H3 з фінальним мотиваційним напуттям від мовного коуча перед переходом
    до наступних модулів.
