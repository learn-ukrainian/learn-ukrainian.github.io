slug: word-formation-adjective-formation
title: 'Словотворення: прикметники'
word_target: 4000
content_outline:
- section: 'Вступ: Культурний код прикметника «київський»'
  words: 700
  points:
  - 'Пояснити роль слова ''київський'' як маркера ідентичності: від історичного концепту
    (Київська Русь) до гастрономічного символу (Київський торт).'
  - 'Продемонструвати дизайнерський підхід (через персону дизайнера): як географічні
    назви тканин та регіонів формують професійний словник (львівський льон, волинська
    вишивка).'
  - 'Обговорити стилістичну роль епітетів при описі колекції одягу: як прикметники
    створюють образи.'
- section: 'Суфікси -ський та -цький: приналежність та походження'
  words: 900
  points:
  - Сформулювати правила творення прикметників від географічних назв та типів людей
    (Україна → український, місто → міський).
  - 'Деталізувати фонетичні мутації: покроково пояснити перехід ''к'' → ''цьк'' (козак
    → козацький, студент → студентський) як органічну рису української мови.'
  - Розібрати типову помилку (надмірне використання -ний, наприклад 'студентний')
    та дати інструменти для її уникнення.
  - 'Навести стійкі колокації для повсякденного та офіційного вжитку: студентський
    квиток, міська рада, батьківський комітет.'
- section: 'Суфікси -ний та -альний: якість та професійне відношення'
  words: 800
  points:
  - 'Описати творення прикметників від іменників якості згідно з Держстандартом (§4.2.9):
    осінь → осінній.'
  - 'Пояснити семантичну різницю між паронімами: музичний (інструмент) vs. музикальний
    (слух), професійний vs. фаховий.'
  - Продемонструвати використання суфікса -альн- у термінології та офіційному реєстрі
    (національний університет, персональний стиль).
  - Показати процес адаптації іншомовних основ (процес → процесуальний, структура
    → структурний).
- section: 'Складні прикметники: кольори, числівники та фольклор'
  words: 1000
  points:
  - 'Пояснити орфографію кольорів: правило дефіса для рівноправних компонентів (синьо-жовтий
    прапор) і як граматика відображає символіку.'
  - Розмежувати написання через дефіс та разом (жовто-блакитний vs. жовтогарячий як
    суцільне, нероздільне поняття).
  - 'Розібрати морфологію фольклорних епітетів згідно з §4.1.1.2: особливості відмінювання
    прикметників на -лиций (білолиций, круглолиций).'
  - Пояснити творення та використання складних слів із числівниковим компонентом (двоярусний,
    трикутний, п'ятиповерховий).
- section: 'Практикум: аналіз текстів та запобігання інтерференції'
  words: 600
  points:
  - 'Проаналізувати англійську інтерференцію (Noun-as-Adjective): пояснити, чому ''бізнес
    центр'' є помилкою і як правильно вживати дефіс (бізнес-центр) або прикметникову
    форму (діловий центр).'
  - Побудувати текстове 'дерево рішень' (алгоритм) для вибору правопису складних прикметників.
  - 'Дати творче завдання-приклад: опис модної колекції з використанням усіх вивчених
    типів прикметників (географічні, складні кольори, фольклорні епітети).'
