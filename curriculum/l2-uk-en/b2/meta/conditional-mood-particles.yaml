slug: conditional-mood-particles
title: Умовний спосіб, частки та вигуки
word_target: 4000
content_outline:
- section: Вступ — умовний спосіб у глибину
  words: 850
  points:
  - 'Формування умовного способу: конструкція «якби / коли б + дієслово минулого часу».
    Розмежування реальної (дійсний спосіб) та ірреальної умови.'
  - 'Українська милозвучність: суворі правила чергування «би» (після приголосних)
    та «б» (після голосних). Аналіз типових помилок (напр., «я би» замість «я б»).'
  - 'Правопис: розрізнення умовного сполучника «якби» (разом) та комбінації «як би»
    (окремо, спосіб дії).'
  - 'Незалежність української моделі: пояснення синтаксичної гнучкості частки «б»
    у реченні. Зіставлення з англійськими Conditional II / III для подолання помилок
    перенесення.'
- section: Модальні частки
  words: 850
  points:
  - 'Питально-модальні частки: розмежування відтінків «хіба» (скепсис, сумнів) та
    «невже» (щире здивування). Уникнення їхнього змішування.'
  - 'Вираження ймовірності: частки «навряд чи», «мабуть», «ледве чи». Їхня синтаксична
    позиція та градація впевненості мовця.'
  - 'Частки волевиявлення: «хай / нехай» для формування наказового відтінку та етимологія
    частки «бодай» (від «Бог дай»), її роль у побажаннях і фольклорі.'
- section: Заперечні та підсилювальні частки
  words: 800
  points:
  - 'Заперечення: правопис часток «не», «ні», «ані» (разом та окремо). Подвійне заперечення
    як питома риса української мови, що підсилює сенс (напр., ніхто не знає).'
  - 'Різниця між «не» та «ні»: заперечення дії (не знаю) проти повної відсутності
    або заперечної відповіді (ні). «Ані» як засіб літературного підсилення.'
  - 'Підсилювальні частки: «аж» (міра дії, раптовість), «навіть» (крайній ступінь),
    «таки» (наполегливе підтвердження).'
  - 'Логічний наголос: як зміна позиції часток «же / ж» та «таки» впливає на інтонаційний
    фокус речення.'
- section: 'Вигуки: емоційні та спонукальні'
  words: 700
  points:
  - 'Класифікація вигуків: емоційні (ой, овва, леле), спонукальні (гей, годі, цить)
    та етикетні. Роль вигуків у створенні природного мовлення.'
  - 'Правопис та пунктуація: виділення вигуків комами або знаками оклику, написання
    складних вигуків через дефіс (ой-ой-ой, їй-богу).'
  - 'Звуконаслідування: їхнє місце в системі мови та стилістична маркованість у порівнянні
    з вигуками.'
  - 'Культурний контекст: вигуки як відображення традиційного світогляду у фольклорі
    та класичній літературі (напр., в творах І. Котляревського).'
- section: Практика — спосіб, частки та стиль
  words: 800
  points:
  - 'Комплексні трансформаційні вправи: перетворення дійсного способу в умовний із
    суворим дотриманням правил милозвучності (чергування б/би).'
  - 'Стилістичний аналіз: визначення типу часток та їхньої прагматичної функції в
    автентичних публіцистичних і художніх текстах.'
  - 'Творче письмо: написання діалогу з використанням умовного способу, модальних
    часток («хіба», «невже») та емоційних вигуків.'
  - 'Редагування тексту: пошук і виправлення помилок у вживанні часток (правопис,
    хибна позиція, змішування «не» та «ні»).'
