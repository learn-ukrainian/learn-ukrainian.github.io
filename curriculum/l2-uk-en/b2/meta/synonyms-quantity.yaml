slug: synonyms-quantity
title: 'Синоніми: Кількість та Міра'
word_target: 4000
content_outline:
- section: Розминка та історичний контекст
  words: 700
  points:
  - 'Обговорення сприйняття кількості: перехід від базового «багато» до нюансованого
    «чимало» як ознака мови рівня B2.'
  - 'Введення в історичну метрологію України: пояснення давніх мір «копа» (60 снопів)
    та «пуд» (16,38 кг).'
  - 'Етимологічний розбір фразеологізмів: «не твоя копа молотиться» (не втручайся)
    та «пуд солі з''їсти» (перевірка дружби часом).'
- section: Синоніми великої кількості та міри
  words: 1000
  points:
  - 'Стилістичний аналіз синонімів (за §4.4.1.2 Стандарту): нейтральне «багато» проти
    експресивного «чимало» в публіцистиці.'
  - Використання слова «безліч» для емфази та гіперболізації (напр., безліч варіантів).
  - 'Розмовний регістр: розрізнення емоційного забарвлення слів «купа» (часто обтяжливе:
    купа справ) та «маса» (часто позитивне: маса задоволення).'
  - 'Морфологічна норма (§4.2.2 Стандарту): творення вищого ступеня порівняння через
    суплетивну форму «більше».'
- section: Синоніми малої кількості та обмеженості
  words: 800
  points:
  - 'Семантична опозиція: негативна конотація «мало» (недостатньо) проти позитивної
    конотації «трохи» (наявність хоча б частини).'
  - 'Граматика обчислюваних іменників: вживання «кілька» та формальнішого «декілька».'
  - 'Культура мовлення: виправлення типової помилки з використанням слова «пара» (пара
    хвилин) замість питомо українського «кілька хвилин».'
- section: Стилістичні регістри та культура мовлення
  words: 800
  points:
  - 'Чітке розмежування інтенсивності та кількості: правило вживання «багато» (з дієсловами
    та іменниками) проти «дуже» (з прикметниками та прислівниками).'
  - 'Синтаксичне узгодження: відпрацювання родового відмінка множини (Genitive Plural)
    після слів на позначення міри (чимало грошей, безліч людей).'
  - 'Трансформація тексту: практичні приклади перекладу з розмовного стилю («маю купу
    проблем») на офіційно-діловий («виникла значна кількість питань»).'
- section: 'Практика: Статистика та опис масштабів'
  words: 700
  points:
  - 'Моделювання публіцистичного тексту: використання слів «значна кількість», «обмаль»,
    «переважна більшість» для опису даних.'
  - 'Градаційна вправа: переписування абзацу з поступовим збільшенням масштабів (від
    «трохи» до «безліч»).'
  - 'Інтеграція граматики: поєднання вивчених неозначено-кількісних слів із точними
    числівниками для створення професійних звітів.'
