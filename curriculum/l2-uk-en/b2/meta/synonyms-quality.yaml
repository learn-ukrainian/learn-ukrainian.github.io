slug: synonyms-quality
title: 'Синоніми: Якість та Оцінка'
word_target: 4000
content_outline:
- section: Вступ та сфери оцінювання
  words: 800
  points:
  - 'QA-інженерний підхід до мови: різниця між технічною якістю (хороший) та візуальним
    інтерфейсом (гарний) у 100% україномовному середовищі'
  - 'Аналіз тріади «добрий — хороший — гарний»: розмежування морального, функціонального
    та естетичного аспектів на прикладах'
  - 'Культурний контекст: значення репутації в українській традиції через прислів''я
    «Добре ім''я — найкраще багатство»'
- section: 'Позитивна оцінка: Відтінки досконалості'
  words: 800
  points:
  - 'Функціональність слова «хороший»: характеристика фахівців (хороший інженер) та
    результатів (хороший звіт) з таблицями контекстів'
  - 'Семантична багатогранність «добрий»: від глибокої моралі (добра людина) до утилітарності
    (добрий урожай, добрий борщ)'
  - 'Естетична досконалість «гарний»: правильне використання для зовнішності (гарний
    дизайн) та природи (гарний краєвид)'
  - 'Градація позитиву: перехід від нейтральної оцінки до сильних емоцій (чудовий,
    прекрасний, ідеальний)'
  - 'Фольклорна концепція стриманості: аналіз вислову «Добро не лихо, ходить тихо»
    як філософії скромної якості'
- section: Негативна оцінка та стилістичне забарвлення
  words: 800
  points:
  - 'Базовий негатив: універсальне використання слова «поганий» для настрою, погоди,
    звичок та характеристик'
  - 'Уникнення кальок: чому «злий» (емоція) не підходить для оцінки предметів (розмежування
    «злий собака» та «поганий код»)'
  - 'Експресія в розмовному регістрі: нюанси слова «кепський» (кепські справи, кепський
    настрій) як синоніма до «поганий»'
  - 'Крайні прояви: семантична різниця між страхом або розчаруванням («жахливий»)
    та відразою («огидний»)'
- section: Аналіз типових помилок та стилістика
  words: 800
  points:
  - 'Діагностика інтерференції: відпрацювання різниці між «гарний студент» (зовнішність)
    та «хороший студент» (компетентність)'
  - 'Стилістична персоніфікація: різниця між «хороша книжка» (якість тексту/видання)
    і «добра книжка» (гуманістичний зміст)'
  - 'Історична оцінка (Державний стандарт §4.4.1.2): синонімічний ряд «старий, старовинний,
    давній, древній, архаїчний» та їхні відтінки'
  - 'Принцип взаємності: обговорення морального кодексу через вислів «Хочеш собі добра
    — не роби нікому зла»'
- section: 'Практика: QA-рецензування та оцінка'
  words: 800
  points:
  - 'Рольова гра QA-інженера: створення технічного звіту про «кепську» роботу додатку
    та рецензії на «чудове» оновлення'
  - 'Трансформація тексту: переписування нейтрального опису продукту на емоційно забарвлену
    публіцистичну статтю'
  - 'Вправи на відчуття регістру: вибір правильного оцінного синоніма для офіційної
    рецензії, новини та приватного повідомлення'
