slug: analiz-tekstu
title: Аналіз тексту
word_target: 4000
content_outline:
- section: Вступ та термінологічні засади
  words: 700
  points:
  - 'H3: Комплексний філологічний підхід — explain the transition from basic reading
    to viewing text as a multi-layered system, with a comparison table of basic vs.
    deep reading.'
  - 'H3: Тема vs Ідея — explicitly define and contrast these two concepts with 2+
    clear examples of how an author hides the idea within a simple theme.'
  - 'H3: Методологія глибокого читання — provide a step-by-step flowchart/list for
    analyzing form to uncover hidden meanings and authorial intent.'
  - 'H3: Академічний інструментарій — define key vocabulary (термін, поняття, процес,
    метод) with contextual sentences and collocations.'
- section: Стилістичні засоби та синтаксис
  words: 1000
  points:
  - 'H3: Лексична стилістика — cover State Standard §4.4.1.2: define and provide 3+
    examples each of epithets, metaphors, and antonyms, showing how they shape tone.'
  - 'H3: Синтаксична стилістика — cover State Standard §4.4.1.3: explain the structural
    role of ellipsis, addresses (звертання), and introductory words (вставні слова)
    with contrasting examples.'
  - 'H3: Актуальне членування речення — teach the concept of ''tema/rema'', demonstrating
    with 3+ examples how placing the most important information at the end impacts
    the reader.'
  - 'H3: Логічний наголос — show how changing word order shifts semantic emphasis,
    using a single sentence rearranged 3 times to illustrate different argumentative
    focuses.'
- section: Авторська позиція та культурні архетипи
  words: 800
  points:
  - 'H3: Явна та прихована позиція автора — identify linguistic markers of subjectivity
    and attitude, providing a checklist for uncovering hidden bias.'
  - 'H3: Культурні архетипи: Шевченко vs Франко — contrast the emotional-prophetic
    style of Shevchenko with the analytical rationalism of Franko using 1-2 short
    text excerpts.'
  - 'H3: Езопова мова як опір — explain the historical necessity of ''Aesopian language''
    under Russian imperial censorship, detailing how to decode subtext.'
  - 'H3: Іронія, сарказм та модальність — define these tools and provide 2+ examples
    of how they reconstruct the author''s true worldview.'
- section: Контекстуальний аналіз та деколонізація
  words: 800
  points:
  - 'H3: Історичний та соціальний контекст — outline a method for analyzing the target
    audience and purpose of a text based on its historical creation period.'
  - 'H3: Постколоніальна оптика — provide strategies for finding markers of national
    identity and anti-imperial resistance hidden in the subtext.'
  - 'H3: Інтертекстуальність та алюзії — explain how texts connect to the broader
    Ukrainian and global canon, with an example of an allusion in modern literature.'
  - 'H3: Розшифрування культурного коду — teach how to identify symbols that are obvious
    to native speakers but obscure to foreigners, using 2+ cultural examples.'
- section: Логіка аргументації та запобігання помилкам
  words: 700
  points:
  - 'H3: Структура логічного аргументу — break down the ''thesis-evidence-conclusion''
    structure, evaluating persuasiveness through logical connectors (вставні слова).'
  - 'H3: Пастки дослівного перекладу — warn against translating idioms literally (e.g.,
    «пекти раків») and offer a strategy for recognizing fixed expressions in analysis.'
  - 'H3: Стилістичні помилки та регістр — compare slang vs. terminology to determine
    the tone, with a ''Do''s and Don''ts'' table for academic writing.'
  - 'H3: Маніпуляції в медіа-текстах — provide a checklist for spotting logical fallacies,
    manipulative tactics, and false arguments in contemporary media.'
