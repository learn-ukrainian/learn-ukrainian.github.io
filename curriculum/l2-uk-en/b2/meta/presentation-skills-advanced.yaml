slug: presentation-skills-advanced
title: 'Презентації: Поглиблено'
word_target: 4000
content_outline:
- section: 'Вступ: Від базових навичок до майстерності'
  words: 600
  points:
  - 'Визначити перехід від базової структури до риторичної майстерності: презентація
    як інструмент впливу на рішення.'
  - 'Проаналізувати виступи на TEDxKyiv (Я. Грицак, Є. Глібовицький) як еталон сучасного
    українського дискурсу: гармонія етосу та логосу.'
  - 'Сформулювати цілі виступу згідно зі Стандартом (§1.1.2.1.3): завдання переконувати
    аудиторію під час тривалих виступів на конференціях.'
- section: Аналіз та адаптація до аудиторії
  words: 800
  points:
  - 'Створити матрицю аналізу цільової аудиторії: визначення потреб, очікувань та
    рівня технічних знань слухачів (інвестори проти колег).'
  - 'Описати стратегії дестиляції сенсу: як пояснювати складні терміни та поняття
    нетехнічній аудиторії без втрати глибини.'
  - 'Дослідити культурний контекст: як українські ІТ-компанії (Grammarly, MacPaw)
    адаптують глобальний пітчинг, пріоритезуючи технічну цінність над агресивним продажем.'
  - Пояснити техніки читання невербальних реакцій залу та гнучкої зміни темпу виступу.
- section: Сторітелінг та риторика переконання
  words: 1000
  points:
  - Впровадити структуру SCP (Situation-Complication-Resolution) для створення сильних
    вступів замість банального «Я хочу розповісти про...».
  - 'Продемонструвати застосування стилістичних засобів синтаксису (§4.4.1.3): використання
    повторів, порівнянь, анафори та риторичних питань для емоційного зв''язку.'
  - 'Наголосити на українській суб''єктності: виправлення канцелярського пасиву («нами
    було зроблено») на активний стан («ми зробили»).'
  - Деталізувати взаємодію етосу, пафосу та логосу у професійному публіцистичному
    регістрі.
- section: Мистецтво візуалізації та технічна досконалість
  words: 600
  points:
  - 'Пояснити принципи ефективної візуалізації: перетворення статистики на вагомі
    аргументи та наочні образи.'
  - 'Створити таблицю «лінгвістичної гігієни» слайдів: виправлення типових кальок
    (вживання «наступний слайд» замість «слідуючий», «брати участь» замість «приймати»).'
  - 'Окреслити специфіку віртуальних виступів: робота з освітленням, камерою та цифровим
    інтерактивом.'
  - 'Встановити правила термінологічного контролю: заміна професійного суржику та
    зайвих англіцизмів питомими відповідниками («запустити» замість «залончити»).'
- section: 'Сесія питань та відповідей: Стратегії захисту'
  words: 700
  points:
  - Описати техніку антиципації для підготовки до каверзних питань та критичних зауважень.
  - 'Надати мовні формули «бриджингу»: сталі конструкції для перехоплення ініціативи
    («Це чудове питання, яке підводить нас до...»).'
  - 'Пояснити стратегії управління тиском: як зберігати спокій та професійно визнавати
    межі власної компетенції.'
  - Розібрати мистецтво конструктивної контраргументації без переходу в агресивний
    захист.
- section: Практикум та зворотний зв'язок
  words: 300
  points:
  - Сформулювати завдання для фінального пітчу з інтегрованою сесією Q&A.
  - 'Надати критерії peer review для рівня B2.4: оцінка риторики, логіки та контакту
    з аудиторією.'
  - Зробити логічний перехід до модуля М93 (Дебати), трансформуючи навички монологу
    у підготовку до дискусії.
