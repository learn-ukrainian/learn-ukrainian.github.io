slug: word-formation-abstract-nouns
title: 'Словотворення: абстрактні іменники'
word_target: 4000
content_outline:
- section: 'Вступ: Світ абстракцій'
  words: 600
  points:
  - 'Визначення абстрактних іменників: назви дій, якостей та станів без фізичної форми.'
  - 'Стилістична роль: номіналізація як ключовий інструмент академічного та професійного
    стилю (перехід від дієслів до іменників).'
  - 'Культурний гачок: Концепт «Свідомість» (національна свідомість) як основа ідентичності
    та деколонізаційного дискурсу.'
- section: 'Дія та процес: Утворення на -ння'
  words: 1000
  points:
  - 'Модель утворення: дієслово недоконаного виду + -ння/-ення (читати → читання)
    згідно з §4.2.6 Стандарту.'
  - 'Опрацювання ключової лексики: «значення», «досягнення», «сприйняття», «ставлення»
    з частотними колокаціями (напр., мати значення, змінити ставлення).'
  - 'Відмінність категорій: процес (написання як дія) проти результату (написане як
    об''єкт).'
  - 'Антисуржик: уникнення російських кальок (вживання «розуміння» замість «поніманіє»,
    «ставлення» замість «відношення» у контексті людей).'
- section: 'Якість та властивість: Суфікс -ість'
  words: 900
  points:
  - 'Правила творення: прикметник/дієприкметник + -ість (можливий → можливість, освічений
    → освіченість) для формування професійного лексикону.'
  - 'Культурний гачок: «Гідність» як стрижнева етична цінність в Україні, закріплена
    Революцією Гідності.'
  - 'Аналіз продуктивності: розбір термінів «якість», «діяльність», «стійкість», «ефективність»
    в контексті B2-PRO.'
- section: 'Результат та сфера: Форманти -ок, -ка, -ство'
  words: 800
  points:
  - 'Позначення результату дії: використання -ок (здобуток, внесок) у дискурсі про
    суспільний розвиток та економіку.'
  - 'Конкретизація абстрактного: маркування наслідків через -ка (помилка, оцінка,
    знахідка).'
  - 'Сфери діяльності та статус: творення соціальних термінів за допомогою -ство (суспільство,
    громадянство, керівництво).'
- section: 'Практикум: Культура вживання та запобігання помилкам'
  words: 700
  points:
  - 'Граматичні обмеження (singularia tantum): уникання множини для абстрактних понять
    (напр., лише однина для «щастя»).'
  - 'Стилістичний баланс: розмежування доречної номіналізації в наукових статтях і
    канцеляриту («nominalization overload») у живій розмові.'
  - 'Синтаксична трансформація: практичні стратегії перетворення громіздких підрядних
    речень з дієсловами на лаконічні конструкції з абстрактними іменниками.'
