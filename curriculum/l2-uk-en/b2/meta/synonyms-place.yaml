slug: synonyms-place
title: 'Синоніми: Місце та Простір'
word_target: 4000
content_outline:
- section: 'Вступ: Світ як простір'
  words: 600
  points:
  - 'Ввести персону Урбаніста: розповісти, як мова структурує міське середовище та
    визначає межі громадського простору.'
  - Розкрити культурний та семантичний концепт слова «тутешній» як символу глибокої
    приналежності до спільноти, уникаючи англіцизму «локальний».
  - 'Окреслити мету модуля (відповідно до §3.15 Держстандарту): навчитися точно описувати
    типи місцевості та розташування об’єктів.'
- section: Тут чи сюди? Статика та рух
  words: 900
  points:
  - Чітко розмежувати статичне положення («тут» — де?) та динамічний напрямок («сюди»
    — куди?), використовуючи таблицю-порівняння.
  - Проаналізувати та виправити типову помилку іноземців («Йди тут» замість «Йди сюди»)
    через призму дієслів руху.
  - Навести приклади вживання «тут» в офіційних урбаністичних проєктах («парк буде
    розташований тут») та стійкі вирази динаміки («переїхати сюди», «сюди-туди»).
- section: 'Тутечки та ось тут: Близькість і стиль'
  words: 800
  points:
  - Дослідити стилістичний контраст між офіційним виразом «на цьому місці» та розмовним
    зменшувально-пестливим «тутечки».
  - Пояснити прагматику емфатичного «ось тут» для точного візуального вказування (наприклад,
    під час роботи з картами або документами).
  - 'Реалізувати вимогу §4.4.1.2 Держстандарту: показати, як зменшувальні форми надають
    мовленню емоційного забарвлення та затишку при описі рідних місць.'
- section: 'Там, туди, онде: Далечінь та орієнтири'
  words: 900
  points:
  - 'Пояснити тріаду далекого простору: нейтральна статика («там»), динамічний напрямок
    («туди») та вказівний займенник для видимих об''єктів («онде» / «он там»).'
  - Створити міні-діалоги з описом міських маршрутів та орієнтирів (наприклад, «дивіться
    онде», «не йдіть туди»).
  - Розглянути стилістичні відтінки слова «тамтечки» як розмовного та ностальгійного
    варіанту для опису знайомого віддаленого місця.
- section: 'Поріг як межа: Від магії до урбаністики'
  words: 800
  points:
  - Зробити культурно-антропологічний відступ про «магію порогу» як сакральну межу
    між безпечним домашнім «тут» та зовнішнім «там».
  - Пояснити мовні та поведінкові табу, пов'язані з порогом (заборона вітатися чи
    передавати речі через поріг).
  - 'Підбити підсумки модуля: показати, як сучасний урбаніст поєднує офіційну просторову
    термінологію з глибоким розумінням українських культурних меж.'
