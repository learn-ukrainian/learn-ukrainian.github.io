slug: synonyms-place
title: 'Синоніми: Місце та Простір'
word_target: 4000
content_outline:
  - section: 'Вступ: Світ як простір (Introduction: World as Space)'
    words: 600
    points:
      - 'Вступне слово від імені урбаніста: як мова структурує міське середовище та
        межі громадського простору.'
      - Культурний концепт «тутешній» (local) як символ глибокої приналежності до
        спільноти та землі, на противагу терміну «приїжджій».
      - 'Відповідність Державному стандарту (§3.15): опис типів місцевості та розташування
        об’єктів за допомогою точних просторових прислівників.'
  - section: Тут чи сюди? Статика та рух (Here or Hither? Statics and Movement)
    words: 900
    points:
      - Розмежування статичного положення (тут) та динамічного напрямку (сюди) — подолання
        типової помилки «Йди тут» замість правильного «Йди сюди».
      - Вживання прислівника «тут» у нейтральних контекстах та офіційних виразах урбаністики
        (наприклад, «розташований тут»).
      - 'Стійкі словосполучення для опису динаміки: «давай сюди», «переїхати сюди»,
        «сюди-туди».'
  - section: 'Тутечки та ось тут: Близькість і стиль (Tuitechky and Axis Tut: Proximity
      and Style)'
    words: 800
    points:
      - Стилістичний контраст між зменшувально-пестливим «тутечки» (розмовний стиль,
        затишок) та офіційним «на цьому місці» (публіцистичний/діловий стиль).
      - Використання емфатичного «ось тут» для точного візуального вказування (pointing)
        під час підписання документів або позначення локації на мапі.
      - 'Дослідження §4.4.1.2: роль зменшувальних форм у наданні мовленню емоційного
        забарвлення в описі рідних місць.'
  - section: 'Там, туди, онде: Далечінь та орієнтири (There, Thither, Over There:
      Distance and Landmarks)'
    words: 900
    points:
      - 'Тріада далекого простору: нейтральне «там» (статичне), цілеспрямоване «туди»
        (динамічне) та вказівне «онде/он там» (для видимих об''єктів).'
      - 'Опис маршрутів та міської інфраструктури з використанням орієнтирів: «дивіться
        онде», «не йдіть туди», «він там живе».'
      - Відтінки значення «тамтечки» як розмовного варіанту для опису специфічного,
        але віддаленого місця.
  - section: 'Поріг як межа: Від магії до урбаністики (Threshold as Boundary: From
      Magic to Urbanism)'
    words: 800
    points:
      - 'Культурна антропологія: «Магія порогу» як сакральної межі між безпечним «тут»
        (дім) та невідомим «там» (зовнішній світ).'
      - 'Заборона вітатися через поріг: зв''язок мовних табу з просторовим сприйняттям
        українців.'
      - 'Підсумок: синтез синонімів для професійного опису міських локацій, поєднання
        офіційної термінології урбаніста з культурним контекстом (Ref. M35).'
