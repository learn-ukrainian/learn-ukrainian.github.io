slug: direct-indirect-speech
title: Пряма й непряма мова
word_target: 4000
content_outline:
- section: 'Вступ: Способи передачі чужого мовлення'
  words: 500
  points:
  - 'Визначити пряму та непряму мову згідно з Держстандартом §4.3.5: навести контрастні
    приклади для ілюстрації двох основних способів передачі чужого висловлювання.'
  - 'Ввести третій спосіб — цитування: пояснити його роль як дослівного відтворення
    тексту з посиланням на автора, що є основою наукового та публіцистичного стилів.'
  - 'Проаналізувати стилістичну роль: порівняти емоційний вплив прямої мови (ефект
    живого діалогу) з об''єктивністю непрямої мови (переказ фактів).'
- section: Пряма мова та діалог
  words: 1000
  points:
  - 'Описати структуру прямої мови (слова автора + пряма мова). Використати таблиці
    або схеми для ілюстрації чотирьох позиційних моделей (А: «П» / «П», — а / «П,
    — а, — п» / А: «П», — а).'
  - 'Пояснити правила пунктуації для кожної моделі: використання кутових лапок («ялинок»),
    тире, ком та крапок. Наголосити, що крапка ставиться після лапок.'
  - 'Деталізувати правила оформлення діалогу: тире на початку кожної репліки та відсутність
    лапок. Пояснити інтеграцію слів автора всередині репліки.'
  - 'Розібрати типову помилку: неприпустимість змішування правил (наприклад, використання
    лапок для реплік діалогу або неправильне використання англійських подвійних лапок).'
- section: 'Непряма мова: трансформація'
  words: 1000
  points:
  - 'Пояснити механіку перетворення: заміна прямої мови підрядним з''ясувальним реченням
    за допомогою сполучників «що» (для розповідних), «щоб» (для спонукальних), та
    частки «чи» (для питальних).'
  - 'Проаналізувати зміну особових форм: перехід займенників і дієслів 1-ї та 2-ї
    особи у 3-тю особу. Вказати на трансформацію вказівних слів (цей → той, тут →
    там, зараз → тоді).'
  - 'Пояснити збереження модальності: як наказовий спосіб перетворюється на конструкцію
    «щоб» + дієслово минулого часу (наприклад, «Іди!» → Він сказав, щоб я йшов).'
  - 'Вирішити проблему звертань та вигуків: пояснити, що вони втрачаються при трансформації,
    але їхній зміст може компенсуватися описовими зворотами в словах автора.'
- section: Цитування та оформлення
  words: 800
  points:
  - 'Пояснити повне цитування: дослівне відтворення великого фрагмента тексту в лапках
    із обов''язковим посиланням на джерело. Навести приклади з української літератури.'
  - 'Пояснити часткове цитування: органічне вплетення окремих авторських слів чи фраз
    у структуру речення (наприклад, Франко вважав це «святим обов''язком»).'
  - 'Деталізувати стандарти цитування у науковому стилі: як правильно оформлювати
    виноски та епіграфи (епіграфи пишуться без лапок).'
  - 'Вказати на типові помилки цитування: використання лапок при вільному переказі
    тексту або відсутність чіткої вказівки на авторство.'
- section: Практика та виправлення помилок
  words: 700
  points:
  - 'Створити комплексний практикум: завдання на двосторонню трансформацію (пряма
    мова ↔ непряма) з обов''язковим застосуванням граматичних змін.'
  - 'Розробити пунктуаційний практикум: розстановка пропущених розділових знаків у
    текстах, що містять пряму мову, репліки діалогу та цитати.'
  - 'Запропонувати стилістичний аналіз: порівняння тексту з прямою мовою та його трансформованої
    версії для оцінки риторичного ефекту.'
  - 'Інтегрувати завдання з редагування: виправлення навмисних помилок в оформленні
    прямої мови та діалогу в автентичних публіцистичних текстах як підготовка до контрольної
    точки b2-24.'
