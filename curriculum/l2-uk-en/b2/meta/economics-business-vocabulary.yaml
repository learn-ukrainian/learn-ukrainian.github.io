slug: economics-business-vocabulary
title: 'Економічна лексика: говоримо про бізнес'
word_target: 4000
content_outline:
- section: 'Вступ: Економічний ландшафт України'
  words: 700
  points:
  - 'Аналіз сучасного стану: IT-сектор як ''цифрова фортеця'' та феномен його стійкості
    й зростання під час війни.'
  - 'Аграрна галузь: Україна як світовий лідер експорту зернових, концепція та значення
    ''Зернового коридору''.'
  - Загальний огляд інших ключових галузей економіки, роль міжнародної фінансової
    підтримки та волонтерського руху.
  - Розмежування наукового та публіцистичного регістру при описі економічних явищ
    (фокус B2.1c).
- section: Макроекономічні показники та державна політика
  words: 900
  points:
  - Детальне пояснення термінів ВВП (валовий внутрішній продукт), інфляція, курс валют
    та їхній щоденний вплив на громадян.
  - Аналіз державного бюджету та державного боргу з використанням відповідної термінології.
  - Визначення понять 'споживчий кошик' та 'сімейний бюджет' (реалізація стандарту
    §3.8), планування витрат.
  - 'Соціальні виклики: лексика для обговорення проблеми бідності, малозабезпечених
    груп населення та безробіття.'
- section: Бізнес-структури та цифровізація
  words: 900
  points:
  - 'Пояснення форм власності: різниця між ФОП (фізична особа-підприємець) та ТОВ
    (товариство з обмеженою відповідальністю).'
  - 'Аналіз фінансового результату підприємства: дохід, витрати, чистий та валовий
    прибуток.'
  - 'Феномен цифровізації: огляд платформи ''Дія.Бізнес'' як сучасного інструменту
    для підприємців.'
  - 'Формування словника ''акули бізнесу'': лексика для опису успішних стратегій,
    інновацій та стартапів.'
- section: Фінансові операції та податкова система
  words: 900
  points:
  - 'Банківський сектор: відкриття рахунків (поточний, депозитний), ключові дії (поповнити,
    переказати, заблокувати).'
  - 'Система оподаткування: ПДВ, податок на прибуток, ЄСВ; пояснення поняття ''податкове
    навантаження''.'
  - Страхування, кредитні лінії та процентні ставки для малого і середнього бізнесу.
  - Розвиток фінансових технологій (фінтех) та ринку криптовалют в сучасному українському
    контексті.
- section: Ділова комунікація та корекція помилок
  words: 600
  points:
  - 'Очищення бізнес-реєстру від російських кальок: використання ''укласти угоду''
    замість ненормативного ''заключити''.'
  - 'Засвоєння сталих нормативних конструкцій: ''згідно із законом'' (не ''по закону''),
    ''брати участь'' (не ''приймати'').'
  - Практичні поради щодо аналізу економічних новин, читання фінансових графіків та
    побудови прогнозів українською.
  - Підсумковий блок з розбором типових стилістичних помилок у діловому листуванні.
