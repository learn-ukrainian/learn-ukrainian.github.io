slug: synonyms-action
title: 'Синоніми: Дія та Перетворення'
word_target: 4000
content_outline:
- section: 'Вступ: Природа дії та синонімії'
  words: 600
  points:
  - Створити H3 для зв'язку теми з Державним стандартом (§4.4.1.2), пояснивши перехід
    від простих дієслів фізичної дії (з рівня B1) до стилістичних нюансів.
  - Створити H3 для аналізу прислів'я «Під лежачий камінь вода не тече», демонструючи
    різницю між пасивним станом і концептом активної «дії» в українській культурі.
  - Забезпечити 100% українськомовне середовище, окресливши цілі модуля (розрізнення
    відтінків значення та уникнення англомовних кальок).
- section: Тонкощі «робити», «чинити» та «діяти»
  words: 1000
  points:
  - 'Створити H3 для «робити» (нейтральний універсальний регістр: робити висновки,
    робити помилки, робити ремонт).'
  - 'Створити H3 для «чинити» (моральний або юридичний вимір дії: чинити опір, чинити
    тиск, чинити зло). Окремо виділити типову помилку (кальку «робити тиск»).'
  - 'Створити H3 для «діяти» (абстрактний або офіційний контекст: закон діє, ліки
    діють). Пояснити також зв''язок зі словотворенням іменників-діячів (діяч, діяльність).'
  - Включити порівняльну таблицю або діаграму для швидкого вибору між цими трьома
    синонімами залежно від контексту.
- section: 'Офіційність та творчість: «виконувати» та «здійснювати»'
  words: 900
  points:
  - 'Створити H3 для «виконувати» (формальні завдання та артистичне виконання: виконувати
    наказ, виконувати пісню, виконувати роль). Розглянути помилку «здійснити пісню».'
  - 'Створити H3 для «здійснювати» (масштабна реалізація мрій або злочинів: здійснювати
    мрію, здійснювати напад, здійснювати план).'
  - Створити H3 для культурного концепту «Здійснення мрій» проти сухого бюрократичного
    «виконання плану», підкреслюючи стилістичне забарвлення слів.
- section: Багатогранність «брати», «хапати» та «здобувати»
  words: 1000
  points:
  - 'Створити H3 для глибокого розрізнення «отримувати» (пасивне прийняття: отримувати
    зарплату) та «здобувати» (активна боротьба, зусилля: здобувати незалежність, здобувати
    перемогу, здобувати освіту). Це ключовий культурний концепт суб''єктності.'
  - Створити H3 для експресивного «хапати» (хапати дрижаки, хапати за душу) з акцентом
    на раптовість дії та ідіоматику.
  - Створити H3 для ідіоматики «брати» (брати участь, брати до уваги), пояснюючи,
    що дослівний переклад з англійської тут не працює.
- section: 'Практика: Точність у контексті'
  words: 800
  points:
  - 'Створити H3 «Анти-калька» для виправлення дослівних перекладів з англійського
    дієслова ''take'' (наприклад: сідати на автобус, робити перерву, фотографувати).'
  - 'Створити H3 з продуктивним завданням-прикладом: як переписати нейтральний текст,
    використовуючи експресивні синоніми (наприклад, замінити «взяти» на «хапати» для
    динаміки).'
  - Створити H3 для підсумку через прислів'я «Діло майстра величає», наголошуючи,
    що правильний вибір дієслова дії — це ознака мовної майстерності.
