slug: presentation-skills-basics
title: 'Презентації: Основи'
word_target: 4000
content_outline:
- section: Вступ та психологія
  words: 600
  points:
  - 'Введення в тему публічних виступів: визначення ефективної професійної презентації
    в українському бізнес-контексті.'
  - 'Психологічна підготовка до виступу: практичні методи подолання страху аудиторії
    (дихальні вправи, візуалізація успішного результату).'
  - 'Аналіз цільової аудиторії: як адаптувати лексику, тон та складність презентації
    під потреби конкретних слухачів.'
  - 'Міні-діалог: обговорення страхів перед презентацією та підготовки до неї між
    двома колегами.'
- section: Риторична спадщина та структура
  words: 800
  points:
  - 'Культурний гачок: риторична традиція Києво-Могилянської академії (Феофан Прокопович)
    як європейське коріння українського ораторського мистецтва.'
  - 'Деколонізаційний аспект: протиставлення живої української публічної комунікації
    пасивному радянському номенклатурному читанню з папірця.'
  - 'Класична трискладова структура: Вступ (як привернути увагу), Основна частина
    (доказова база) та Висновок (як запам''ятатися).'
  - 'Формулювання тези: трансформація загальних описових ідей на конкретні, аргументовані
    професійні тези.'
- section: 'Мовна навігація: Дорожні вказівники'
  words: 1000
  points:
  - 'Вступні маркери та оголошення структури: таблиця корисних фраз для старту («Сьогодні
    я розповім про...», «Метою мого виступу є...»).'
  - 'Логічні переходи між слайдами: фрази-зв''язки для керування увагою («Це підводить
    нас до...», «Зупинимося детальніше на...», «Наступний важливий момент...»).'
  - 'Маркери підсумків та закликів до дії: правильне завершення думки («Отже», «Підсумовуючи
    сказане», «Тож я запрошую вас до...»).'
  - 'Граматика в контексті (Agency Pass): використання активного стану для підкреслення
    авторської відповідальності («Ми розглянули», а не «Було розглянуто»).'
- section: Візуальна культура та ідентичність
  words: 800
  points:
  - 'Принципи ефективного дизайну слайдів: правило 6x6, мінімалізм тексту, роль графіків
    та діаграм для візуалізації даних.'
  - 'Культурний елемент: використання сучасних українських шрифтів (наприклад, Mariupol,
    e-Ukraine або AlfaBravo) як засіб професійної самоідентифікації та стилю.'
  - 'Аналіз типових візуальних помилок: перевантаження слайда текстом, дрібний шрифт,
    невідповідність зображень змісту.'
  - 'Лексика для опису візуальних матеріалів: фрази для роботи з графіками («Як видно
    на графіку...», «Ця діаграма ілюструє...»).'
- section: Техніка виступу та робота над помилками
  words: 800
  points:
  - 'Управління паралінгвістичними засобами: контроль гучності, чіткість дикції, темп
    мовлення та стратегічні паузи.'
  - 'Невербальна комунікація: важливість зорового контакту з аудиторією та відкритої
    мови тіла.'
  - 'Боротьба зі словами-паразитами: техніки уникнення зайвих звуків («ну», «е-е-е»,
    «як би») через впевнену артикуляцію.'
  - 'Корекція типових лексичних помилок-кальок: розрізнення «власне / насправді» (замість
    «актуально»), та правильне вживання «отже / тож» (замість «так» у значенні ''so'').'
