slug: proverbs-work-wisdom-character
title: 'Прислів''я I: Праця, мудрість і характер'
word_target: 4000
content_outline:
  - section: 'Вступ: Народна мудрість як алгоритм успіху'
    words: 600
    points:
      - Окреслити роль прислів'їв як «неписаних законів» та дієвих інструментів сучасної
        комунікації (згідно зі стандартом).
      - Ввести персону Старійшини, який розкриває прислів'я не як архаїку, а як перевірені
        алгоритми рішень.
      - Представити концепт «Сродної праці» Г. Сковороди як ідейний стрижень модуля
        (філософія щастя через покликання).
  - section: Філософія праці та «Сродна праця»
    words: 1000
    points:
      - Проаналізувати концепт «праця» та її види (сродна, плідна, наймана) з розгорнутими
        сучасними прикладами.
      - Детально розібрати семантику прислів'їв «Без труда нема плода» та «Хто рано
        встає, тому Бог дає».
      - Пояснити метафорику виразу «Де є бджола, там є мед» з відсиланням до творчості
        Сковороди.
      - Навести 2-3 розгорнуті міні-діалоги, що демонструють дискусію навколо пошуку
        «сродної праці» в реаліях XXI століття.
  - section: 'Мудрість: Відміряй сім разів'
    words: 800
    points:
      - Пояснити стратегії прийняття рішень через паремії «Сім разів відміряй...»
        та «Хто питає, той не блудить».
      - Розкрити іронічний відтінок та контекст вживання виразу «сивина в бороду —
        біс у ребро».
      - Інтегрувати філософію «Вік живи — вік учись» як концепт безперервної освіти
        (підготовка до мислення рівня C1).
      - Провести аналіз критичного мислення через призму прислів'я «Не все те золото,
        що блищить».
  - section: 'Характер та слово: Не горобець'
    words: 800
    points:
      - Розглянути питання спадковості й виховання через «Яке дерево, такий і клин;
        який батько, такий і син».
      - 'Розібрати відповідальність за комунікацію: «Слово — не горобець: вилетить
        — не впіймаєш».'
      - Протиставити вирази «мати характер» (тверда воля) та «важкий характер» (складна
        вдача), навівши контекстні приклади.
      - 'Проаналізувати цінність щирості у стосунках: «Не той друг, хто медом маже,
        а той, хто правду каже».'
  - section: Типові помилки та стилістичний регістр
    words: 800
    points:
      - Пояснити механізм калькування (уникання дослівного перекладу ідіом) та продемонструвати
        українські семантичні еквіваленти.
      - Навести приклади та аналіз контамінації (типової помилки змішування двох прислів'їв).
      - 'Розглянути стилістичний дисонанс: розрізнення ситуацій для вживання народних
        паремій та офіційної термінології (напр., «ефективність праці»).'
      - Нагадати про правильне використання українських голосних (о = [ɔ], е = [ɛ])
        та уникнення русизмів (напр., отримувати замість 'получати') у лексиці модуля.
