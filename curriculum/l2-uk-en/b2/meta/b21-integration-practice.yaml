slug: b21-integration-practice
title: Інтеграційна практика B2.1
word_target: 4000
content_outline:
- section: Огляд та стилістичний контекст
  words: 600
  points:
  - 'Огляд ключових тем: чотири форми пасивного стану, активні та пасивні дієприкметники,
    а також розрізнення функціональних стилів мовлення.'
  - Історична роль Інституту української наукової мови (1921-1930) у розробці термінології
    на основі питомої лексики.
  - 'Наслідки лінгвоциду 1930-х років: репресії мовознавців та штучне насадження російськомовних
    кальок і канцеляризмів.'
  - 'Деколонізація мови: процес відновлення української ідентичності в офіційному
    та науковому стилях через повернення до органічної лексики (наприклад, ''тяма'').'
- section: Офіційний регістр та пасивні конструкції
  words: 900
  points:
  - 'Аналіз типових рис офіційно-ділового стилю: стандартні мовні формули, канцеляризми
    та синтаксичне структурування.'
  - 'Типова помилка: механічне копіювання англомовного чи російського пасиву (''Дім
    був збудований робітниками'').'
  - 'Проблема агенса в орудному відмінку: правила трансформації неприродного пасиву
    в дієві активні та безособові конструкції (на -но, -то).'
  - 'Стилістичний практикум: переклад сухого офіційного повідомлення в розмовний регістр
    із використанням еліпсису та вставних слів.'
- section: Публіцистичний стиль та новини
  words: 800
  points:
  - 'Особливості мови медіа та журналістики: структура новинного заголовка, лаконічність
    і роль дієприкметникових зворотів.'
  - 'Граматичний фокус: правила узгодження дієприкметників із іменниками в роді, числі
    та відмінку для уникнення помилок.'
  - 'Лексичний аналіз: використання доменної лексики (політика, економіка, право)
    та синонімів для підвищення якості тексту.'
  - 'Творче завдання: техніка написання ''ліду'' (вступу) новини за допомогою засобів
    логічного наголосу та активних дієприкметників.'
- section: Науковий опис та термінологія
  words: 900
  points:
  - Аналіз науково-популярного тексту та функціонування базових концептів (термін,
    поняття, процес, метод) для забезпечення точності викладу.
  - 'Граматика наукового стилю: використання номіналізації (опредметнення дії) та
    безособових конструкцій як засобів досягнення об''єктивності.'
  - 'Регістрова гнучкість: порівняння синтаксичних структур наукового та офіційно-ділового
    стилів.'
  - 'Техніка спрощення (демістифікації): як перекласти складне академічне визначення
    в зрозуміле пояснення для розмовного регістру.'
- section: Інтеграційний практикум та самооцінка
  words: 800
  points:
  - 'Комплексна вправа ''Одна подія — три стилі'': опис одного економічного чи соціального
    явища мовою звіту, новини та блогу.'
  - 'Фінальна корекція: розпізнавання та усунення англомовних кальок пасиву, неправильного
    орудного агенса та незграбних зворотів.'
  - 'Самооцінка компетенцій рівня B2: аналіз володіння стилістичними засобами фонетики,
    лексики та синтаксису згідно з Державним стандартом.'
  - Підсумкові рекомендації щодо заповнення лексичних прогалин перед фінальною контрольною
    точкою блоку B2.1.
