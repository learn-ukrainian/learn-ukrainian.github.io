slug: active-participles-past
title: Активні дієприкметники минулого часу (-лий)
word_target: 4000
content_outline:
- section: Вступ та теоретичний контекст
  words: 500
  points:
  - Визначити активні дієприкметники минулого часу (-лий) та їх місце в морфологічній
    системі з посиланням на §4.3.2 Державного стандарту.
  - Пояснити маргінальний статус цих форм порівняно з пасивними дієприкметниками через
    призму української милозвучності.
  - Надати 2-3 приклади того, як важкі прикметникові конструкції природно замінюються
    на елегантні підрядні речення.
- section: Нормативні форми на -лий
  words: 800
  points:
  - Деталізувати правила утворення від основ неперехідних дієслів доконаного виду
    (пожовтіти → пожовтілий) з використанням таблиці-схеми.
  - Проаналізувати частотну літературну лексику для опису природи та стану (пожовтілий,
    зів'ялий, застарілий, посивілий).
  - Чітко відмежувати питомі українські форми від штучних калькованих утворень.
  - Навести 5+ прикладів використання цих форм у художньому стилі для опису статичних
    станів.
- section: Боротьба з русизмами та канцеляритом
  words: 1000
  points:
  - Ввести культурний контекст руху 'Антисуржик' та історію нав'язування форм на -вший
    (вплив російської мови та радянського канцеляриту).
  - Детально розібрати пастку 'Who Did' (використання 'читавший' замість нормативного
    'який читав' або 'той, хто читав').
  - Надати чіткий алгоритм трансформації ненормативних дієприкметникових зворотів
    у складнопідрядні речення з 'який'.
  - Створити порівняльну таблицю 'Русизм / Канцелярит' vs 'Природна українська норма'
    (мінімум 8 пар).
- section: Лексикалізація та статус 'колишнього'
  words: 600
  points:
  - Пояснити процес переходу дієприкметників у прикметники (лексикалізацію).
  - 'Розв''язати типову лексичну плутанину: чому суржикове ''бувший'' слід завжди
    замінювати на ''колишній'' (напр., колишній президент).'
  - Розмежувати семантику слів 'минулий' (стосовно часу) та 'колишній' (стосовно статусу
    чи ролі) з наведенням чітких контекстів.
  - Дати список сталих колокацій зі словами минулий, майбутній, колишній.
- section: Синтетичний майбутній час
  words: 800
  points:
  - Описати утворення синтетичного майбутнього часу (форми типу 'боротимуся', 'питимеш')
    згідно з §4.1.3.1 Державного стандарту.
  - Пояснити стилістичну перевагу та компактність форм на -тиму як ознаку високого
    літературного стилю порівняно з аналітичними ('буду + інфінітив').
  - Створити парадигму дієвідмінювання для синтетичних форм у вигляді зручної таблиці.
  - Навести приклади стилістичної трансформації громіздких речень у лаконічні за допомогою
    синтетичного майбутнього часу.
- section: Підсумок та практичні поради
  words: 300
  points:
  - 'Сформулювати ''золоте правило'' для учнів: шиплячі суфікси (-ш-, -щ-, -вш-) сигналізують
    про русизм і потребують заміни на підрядне речення.'
  - Зробити стислий огляд легітимних форм на -лий для описів змін стану.
  - Забезпечити плавний перехід до наступного модуля (b2-09), анонсуючи поглиблений
    синтаксис дієприкметникових зворотів.
