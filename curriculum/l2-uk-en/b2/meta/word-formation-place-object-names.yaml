slug: word-formation-place-object-names
title: 'Словотворення: назви місць та об''єктів'
word_target: 4000
content_outline:
- section: 'Вступ: Логіка назв місць в українській мові'
  words: 500
  points:
  - 'Сформулювати антропоцентричний підхід до словотворення: як назва фізичного місця
    природно випливає з людської дії (їсти → їдальня, лікувати → лікарня).'
  - 'Пояснити морфологічний зв''язок між агентивами (назвами осіб за професією) та
    установами: як суфікси професій розширюються до простору (пекар → пекарня).'
  - 'Представити правило за Державним стандартом (§4.2.8): дериваційна модель утворення
    іменників на позначення місця від дієслів та інших іменників.'
- section: 'Суфікс -ня: Від кімнати до хати-читальні'
  words: 950
  points:
  - 'Створити репрезентативну таблицю продуктивності суфікса -ня для внутрішніх приміщень:
    спальня, їдальня, вітальня, вбиральня з поясненням їхніх побутових функцій.'
  - 'Розібрати граматичну пастку: надати чіткі правила розрізнення варіантів -льня
    та -альня залежно від характеру дієслівної основи (чита-ти → читальня vs вбир-а-ти
    → вбиральня).'
  - 'Інтегрувати культурний концепт: розповісти про історичний рух «Просвіта» та феномен
    «хат-читалень» як центрів ліквідації неписьменності та національного розвитку.'
  - 'Провести семантичний аналіз: пояснити, чому суфікс -ня концептуально обмежує
    простір, позначаючи саме закрите приміщення для конкретної активності.'
- section: 'Суфікс -ище: Ландшафт, простір та питання роду'
  words: 850
  points:
  - Визначити семантичну специфіку суфікса -ище для позначення відкритих, масштабних
    територій та об'єктів (пасовище, кладовище, родовище, звалище).
  - 'Пояснити критичну граматичну помилку: як чітко розрізнити граматичний рід місць
    на -ище (завжди середній: сховище — воно) та аугментативів (вітрище — чоловічий,
    бо вітер).'
  - 'Показати функціонування цих слів в офіційно-діловому та науковому регістрах (наприклад:
    житлище, бомбосховище) через приклади з сучасного контексту.'
- section: 'Суфікс -арня: Майстерні та культура кавування'
  words: 900
  points:
  - 'Продемонструвати морфологічний ланцюжок утворення назв закладів від професій:
    пекар → пекарня, перукар → перукарня, друкар → друкарня.'
  - Розкрити історію слова «кав'ярня» як питомої назви та потужного урбаністичного
    символу (зв'язок із Юрієм Кульчицьким та Віднем), що маркує український європейський
    простір.
  - Проаналізувати сучасні гібридні формати міського дозвілля, такі як «книгарня-кав'ярня»,
    що об'єднують традиції читальні та інтелектуального спілкування.
- section: Практичний практикум та корекція
  words: 800
  points:
  - 'Проаналізувати межі застосування суфіксів: детально пояснити явище гіпергенералізації
    та чому ми кажемо «майстерня», а не «робільня».'
  - 'Розробити модель творчої вправи: дериваційний ланцюжок «дія → особа → місце»
    (наприклад, лікувати → лікар → лікарня) для системного запам''ятовування.'
  - 'Провести стилістичний аналіз: оцінити доречність використання конкретних суфіксів
    у науковому та офіційному описі інфраструктури міста (відповідно до заданого наукового
    регістру модуля).'
