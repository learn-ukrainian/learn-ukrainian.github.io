slug: b2-pidsumkovyy-ohlyad
title: B2 Підсумковий огляд
word_target: 4000
content_outline:
- section: 'Навичка 1: Ретроспектива B2 та культурний контекст'
  words: 800
  points:
  - 'Вступ до підсумкового огляду: систематизація компетенцій незалежного користувача
    (B2).'
  - 'Історичний екскурс: Києво-Могилянська академія (1632) як осередок української
    інтелектуальної традиції.'
  - 'Інститут української наукової мови (1921–1930): боротьба за питому національну
    термінологію в добу Розстріляного відродження.'
- section: 'Навичка 2: Синтез граматики: Складний синтаксис та пасив'
  words: 1000
  points:
  - 'Огляд системи складнопідрядних речень (§4.3.4): з’ясувальні, означальні, часові,
    причинові, умовні та допустові.'
  - 'Стилістична перевага активного стану над пасивним: як уникати кальок на зразок
    ''будується робітниками''.'
  - 'Особливості безособових дієслівних форм на -но, -то: правило відсутності орудного
    відмінка діяча.'
  - 'Активні та пасивні дієприкметники: їхня доречність в академічному та публіцистичному
    регістрах.'
- section: 'Навичка 3: Лексичний синтез: Термінологія та регістри'
  words: 1000
  points:
  - 'Мистецтво перемикання регістрів: від розмовної мови до офіційно-ділового стилю.'
  - 'Розрізнення омонімів та паронімів: ''термін'' (наукове поняття / дедлайн) і ''строк''
    (тривалість).'
  - 'Точність висловлювання: семантичні відтінки абстрактних понять (''процес'', ''метод'',
    ''дослідження'', ''аналіз'', ''синтез'').'
  - 'Моделювання професійних ситуацій: використання стійких словосполучень у фаховій
    лексиці.'
- section: 'Навичка 4: Академічні навички: Метафора «Захисту дисертації»'
  words: 800
  points:
  - 'Структурування аргументації: логіка побудови академічного есе та критичний аналіз
    джерел.'
  - 'Засоби зв''язності тексту (cohesion): вставні конструкції, модальні слова, дискурсивні
    маркери.'
  - 'Стратегії успішного публічного виступу українською: риторичні прийоми та утримання
    уваги аудиторії.'
- section: 'Навичка 5: Діагностика та перехід до C1'
  words: 800
  points:
  - 'Самодіагностика: перевірка готовності до складніших завдань за критеріями Державного
    стандарту.'
  - 'Подолання ''мовного плато'': стратегії переходу від побутового B2 до професійного
    C1.'
  - 'Мотивація до подальшого розвитку: занурення в українську літературу, історію
    та професійне середовище.'
