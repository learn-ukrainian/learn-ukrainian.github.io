slug: b2-pidsumkovyy-ohlyad
title: B2 Підсумковий огляд
word_target: 4000
content_outline:
  - section: Ретроспектива B2 та культурний контекст (B2 Retrospective and Cultural
      Context)
    words: 600
    points:
      - 'Ретроспектива подорожі від М01 до М82: систематизація ключових компетенцій
        незалежного користувача (Independent User).'
      - 'Культурний гачок: Києво-Могилянська академія (1632) як символ синтезу західноєвропейської
        освіти та української інтелектуальної традиції.'
      - 'Історія стійкості: Інститут української наукової мови (1921–1930) та боротьба
        за національну термінологію в часи Розстріляного відродження.'
  - section: 'Синтез граматики: Складний синтаксис та пасив (Grammar Synthesis: Complex
      Syntax and Passive)'
    words: 1000
    points:
      - 'Система складнопідрядних речень (§4.3.4): з’ясувальні, означальні, часові,
        причинові, умовні та допустові конструкції.'
      - 'Пасивний стан: корекція помилки ''надмірного вживання пасиву'' (калька з
        англійської) — перехід до активних конструкцій та безособових форм на -но/-то.'
      - 'Аналіз типової помилки: вживання орудного відмінка діяча у пасивних конструкціях
        (напр. ''будується робітниками'') та перетворення їх на природні активні структури.'
      - 'Дієприкметники (§4.1.3.1): активні та пасивні форми, їх доречність у різних
        регістрах мовлення.'
  - section: 'Лексичний синтез: Термінологія та регістри (Lexical Synthesis: Terminology
      and Registers)'
    words: 900
    points:
      - 'Мистецтво перемикання регістрів: від розмовних ідіом до офіційно-ділової
        та наукової лексики.'
      - 'Усунення омонімічної плутанини: ''термін'' як часовий проміжок (строк/deadline)
        проти ''термін'' як спеціальне слово — вживання у контексті.'
      - 'Синонімічні ряди та антоніми: відтінки значень для точного вираження абстрактних
        понять (процес, метод, дослідження).'
      - 'Фахова лексика: моделювання ситуацій у сферах IT, медицини та науки з використанням
        стійких словосполук.'
  - section: 'Академічні навички: Метафора ''Захисту дисертації'' (Academic Skills:
      The ''Thesis Defense'' Metaphor)'
    words: 800
    points:
      - 'Наративна арка: підготовка до ''захисту'' рівня B2 — структурування аргументації
        та академічне письмо.'
      - 'Критичний аналіз текстів: виявлення прихованих змістів, оцінка джерел та
        синтез інформації.'
      - 'Публічний виступ: стратегії презентації складних тем, використання модальних
        маркерів та риторичних прийомів.'
  - section: Діагностика та перехід до C1 (Diagnosis and Transition to C1)
    words: 700
    points:
      - 'Діагностичний тест: перевірка відповідності Державному стандарту та виявлення
        індивідуальних прогалин.'
      - 'Стратегії подолання мовного плато: як перейти від ''функціонального'' B2
        до ''професійного'' C1.'
      - 'Мотиваційний блок: зв''язок навичок синтезу з реальними кар''єрними можливостями
        (B2-PRO tracks) та академічним майбутнім.'
