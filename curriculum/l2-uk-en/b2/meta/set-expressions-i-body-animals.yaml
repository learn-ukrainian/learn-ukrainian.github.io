slug: set-expressions-i-body-animals
title: 'Сталі вирази I: Частини тіла та тварини'
word_target: 4000
content_outline:
- section: 'Вступ: Роль фразеологізмів у мовній компетенції'
  words: 500
  points:
  - Навести визначення фразеологічних одиниць згідно з Державним стандартом §1.4.1.2.1
    та підкреслити їх критичну важливість для досягнення рівня B2.
  - 'Розкрити концепцію внутрішньої форми ідіоми: пояснити, чому вираз «золоті руки»
    асоціюється з майстерністю, а не з металом.'
  - Запровадити класифікацію ідіом на соматизми (частини тіла) та зооморфізми (назви
    тварин) як базовий шар української мовної картини світу.
- section: 'Соматизми: Коли тіло стає метафорою'
  words: 1000
  points:
  - Проаналізувати високочастотний вираз «морочити голову» (плутати, набридати), навести
    життєві діалоги з репліками «не мороч мені голову».
  - Дослідити вираз «тримати язик за зубами» як регулятор комунікативної поведінки
    та збереження таємниці.
  - Пояснити семантику фразеологізму «не бачити далі свого носа» для характеристики
    обмеженого світогляду, використовуючи візуальні асоціації.
  - 'Розглянути ідіоми руху: зіставити «брати ноги в руки» (негайно діяти/тікати)
    та «махнути рукою» (відмовитися від наміру).'
- section: Зоофразеологія та культурні коди
  words: 1000
  points:
  - Розповісти культурний гачок про походження ідіоми «собаку з'їв» як символ проходження
    через екстремальні труднощі до статусу експерта.
  - Розкрити сакральну символіку весільного хліба у виразі «На чужий коровай очей
    не поривай» (застереження від заздрості).
  - Проаналізувати механізм гіперболізації у виразі «робити з мухи слона» та навести
    контексти його вживання.
  - Пояснити кількісну оцінку у фразеологізмі «як кіт наплакав» на прикладі типових
    колоквіальних конструкцій («грошей як кіт наплакав»).
  - Описати стратегії поведінки та ризику через вирази «купувати кота в мішку» та
    «сидіти як миша під віником».
- section: Аналіз типових помилок та інтерференції
  words: 800
  points:
  - 'Розібрати помилку калькування: чому англійське ''it''s raining cats and dogs''
    не можна перекладати дослівно, і як працює українське «ллє як з відра».'
  - Пояснити небезпеку лексичної підміни на прикладі плутанини між вигаданим 'продавати
    усмішки' та автентичним «продавати витрішки».
  - Деконструювати суржикову контамінацію «грати значення» та навчити чітко розмежовувати
    «відігравати роль» і «мати значення».
  - Зіставити англійську ідіому 'pulling one's leg' з українською «морочити голову»
    для запобігання міжмовній інтерференції.
- section: Практичне застосування та синтез
  words: 700
  points:
  - 'Провести розмежування стилістичних регістрів: відверто розмовні вирази проти
    нейтральних фразеологізмів.'
  - 'Застосувати методику візуального контрасту: протиставити буквальне значення (слон
    із мухи) переносному для ефективного запам''ятовування.'
  - Створити розгорнутий наратив від імені Казкаря (persona), де природно інтегровано
    щонайменше 6-8 вивчених ідіом.
  - Підбити підсумки модуля, закріпивши навички пошуку семантичних еквівалентів без
    втрати національного колориту.
