slug: register-official-legal
title: 'Офіційно-діловий стиль: документи, закони, заяви'
word_target: 4000
content_outline:
- section: 'Вступ: Офіційно-діловий стиль'
  words: 500
  points:
  - Визначити офіційно-діловий стиль як сферу об'єктивної, точної та нейтральної комунікації
    (закони, інструкції, акти).
  - 'Класифікувати підстилі: законодавчий (закони, укази), адміністративно-канцелярський
    (заяви, накази) та дипломатичний (договори).'
  - 'Описати основні ознаки стилю: стандартизація, відсутність емоційного забарвлення,
    однозначність термінології та строга структура.'
- section: Граматичні та лексичні засоби стилю
  words: 800
  points:
  - Пояснити номіналізацію та віддієслівні іменники на -ння, -ення (читання, навантаження,
    виконання) як основний засіб створення об'єктивного тону.
  - Проаналізувати безособові конструкції на -но/-то ('схвалено', 'підписано') для
    уникнення прямої вказівки на особу виконавця.
  - 'Чітко розмежувати прийменникове керування для стандартизованих зворотів: ''згідно
    з'' (+ Орудний) та ''відповідно до'' (+ Родовий).'
  - 'Навести порівняльну таблицю канцеляризмів та кліше: уникання розмовних слів на
    користь професійних еквівалентів без емоційного забарвлення.'
- section: Типи та структура документів
  words: 900
  points:
  - 'Детально розібрати структуру Заяви (Application): правильне оформлення ''шапки''
    (справа), центрування назви, та обов''язкове використання Родового відмінка без
    ''від'' (''Заява Петренка'').'
  - 'Пояснити Наказ (Order): ключові словосполучення (''видати наказ'', ''наказ набирає
    чинності'', ''скасувати наказ'') та його обов''язкові реквізити.'
  - 'Описати Протокол (Minutes): специфічна наративна структура (''порядок денний'',
    рубрики ''слухали'', ''виступили'', ''ухвалили'') та концепт ''витяг з протоколу''.'
  - 'Розглянути Акт та Розпорядження: лексика для фіксації фактів та надання адміністративних
    вказівок.'
- section: Історичний контекст та мова законів
  words: 800
  points:
  - Розповісти про Генеральну військову канцелярію часів Гетьманщини та Універсали
    гетьманів як приклад високого стилю українського діловодства.
  - Підкреслити використання староукраїнської мови у судочинстві XVI–XVII століть
    (Литовські статути) на територіях Волині, Києва та Брацлавщини.
  - 'Проаналізувати мову сучасних законів: як будуються статті, пункти, посилання
    та як працює юридична термінологія.'
  - 'Розібрати поняття юридичної сили: ''набрати чинності'', ''втратити чинність'',
    ''чинне законодавство''.'
- section: Культура ділового мовлення та помилки
  words: 600
  points:
  - 'Провести антиколоніальний розбір русизмів: заміна калькованих кліше ''приймати
    міри'' на ''вживати заходів'', ''приймати участь'' на ''брати участь''.'
  - 'Виправити типові помилки у часових виразах: пояснити різницю між хибним ''на
    протязі'' (in a draft) та правильними ''протягом'' / ''упродовж''.'
  - 'Надати поради з редагування текстів: як уникати зайвої бюрократизації, залишаючи
    текст чітким, професійним та зрозумілим.'
- section: Практика та підсумок модуля
  words: 400
  points:
  - Запропонувати практичний алгоритм самостійного написання та оформлення заяви за
    всіма правилами.
  - Дати інструкції щодо аналізу автентичних документів на предмет стилістичної однорідності
    та правильного використання кліше.
  - Підсумувати ключові концепції стилю та анонсувати перехід до професійної комунікації
    та медичного реєстру в наступних модулях.
