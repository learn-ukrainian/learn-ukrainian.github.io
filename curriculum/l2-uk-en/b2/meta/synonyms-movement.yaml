slug: synonyms-movement
title: 'Синоніми: Рух і Пересування'
word_target: 4000
content_outline:
- section: 'Вступ: Мистецтво синонімії в русі'
  words: 600
  points:
  - 'Вступ до стилістичної компетентності за стандартом §4.4.1.2: пояснити, чому вибір
    дієслова руху (не просто ''йти'', а ''чимчикувати'' чи ''брести'') визначає рівень
    володіння мовою B2.'
  - 'Аналіз типової помилки: детальний розбір плутанини односпрямованого (лінійного)
    та регулярного (звичного) руху. Корекція конструкції ''Я щодня йду'' на ''Я щодня
    ходжу'' з поясненням логіки української мови.'
  - 'Огляд шкали інтенсивності руху: перехід від нейтрального ''бігти'' до експресивних
    синонімів ''мчати'' та ''нестися''.'
- section: 'Тонкощі ходи: від урочистості до втоми'
  words: 1000
  points:
  - 'Створення окремого підрозділу (H3) для дієслова ''крокувати'': розбір детермінованого
    руху, контексти бадьорості та військової ходи (''крокувати в ногу'').'
  - 'Створення окремого підрозділу (H3) для дієслова ''брести'': фізичний опір та
    втома. Зв''язок із літературним образом Кобзаря (Т. Шевченко) та опором середовищу
    (''брести по снігу'', ''брести навмання'').'
  - 'Створення окремого підрозділу (H3) для дієслова ''тупати'': аудіальний аспект
    руху, використання в розмовному стилі для опису шуму (''гучно тупати'').'
  - 'Створення окремого підрозділу (H3) для дієслова ''чимчикувати'': спростування
    міфу про швидкий рух; пояснення іронічного або ритмічного повільного пересування
    (''чимчикувати пішки''), акцент на питомо українському походженні слова.'
- section: 'Енергія швидкості: біг, мчання та нестримність'
  words: 1000
  points:
  - 'Підрозділ (H3) ''Бігти та бігати'': закріплення бази рівнів А2/B1 через призму
    стилістичного забарвлення B2 (метафоричне ''час біжить'').'
  - 'Підрозділ (H3) ''Мчати'': акцент на інтенсивності та високій швидкості, розбір
    сталих виразів ''мчати стрімголов'' та ''час мчить''.'
  - 'Підрозділ (H3) ''Нестися'': втрата контролю, стихійність, конотація небезпеки
    або нестримності (''нестися як вітер'').'
  - 'Порівняльна таблиця або розбір: як правильно обрати дієслово для опису спортивного
    змагання на противагу аварійній або неконтрольованій ситуації.'
- section: Культурний код та фразеологізми руху
  words: 700
  points:
  - 'Аналіз українського прислів’я ''Багато ходити – довго жити'': пояснення концепту
    здоров''я та активності в українській мовній картині світу.'
  - 'Розбір фразеологізму ''На ходу підметки рве'': опис спритної, меткої та хитрої
    людини через метафору руху, з наведенням контекстних прикладів.'
  - 'Літературна декомпозиція: аналіз використання дієслів ''брести'' та ''блукати''
    українськими авторами для створення атмосфери меланхолії чи образу нещасної долі.'
- section: Практика та стилістичний синтез
  words: 700
  points:
  - 'Надання міні-діалогів для демонстрації: заміна нейтральних дієслів (напр., ''йти'')
    на стилістично марковані (''чимчикувати'', ''крокувати'') для підвищення якості
    тексту.'
  - Створення динамічного опису сцени (наприклад, вокзал або ліс) з використанням
    мінімум 5 різних синонімів руху за моделлю CBI.
  - 'Підсумковий блок для самоперевірки: розрізнення відтінків значень синонімів на
    основі інтенсивності, звуку та емоційного стану суб''єкта.'
