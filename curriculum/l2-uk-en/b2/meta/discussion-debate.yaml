slug: discussion-debate
title: Дискусії та дебати
word_target: 4000
content_outline:
- section: Мистецтво дискусії та історія риторики
  words: 700
  points:
  - Provide clear definitions contrasting «дискусія» (cooperative search for truth),
    «дебати» (structured competitive clash), and «суперечка» (emotional/unstructured
    disagreement).
  - 'Introduce the cultural hook: the rhetorical tradition of the 17th-century Kyiv-Mohyla
    Academy and the historical significance of philosophical «диспути».'
  - Analyze the proverb «У суперечці народжується істина» and its relevance to modern
    Ukrainian civil society and public discourse.
  - Provide a mini-dialogue demonstrating the difference in tone between a formal
    debate and a casual argument.
- section: Висловлення та обґрунтування погляду
  words: 800
  points:
  - Address State Standard §1.4.1.2.1 by providing structures to clearly express personal
    views.
  - Explicitly correct the Russian calc «Я рахую, що...», enforcing the use of «Я
    вважаю, що...» and «На мою думку...».
  - 'Create a reference table of discourse markers for modulating certainty: «безперечно»
    (high), «ймовірно» (medium), and «можливо» (low certainty).'
  - Explain how to structure justifications using formal connectives like «оскільки»,
    «з огляду на», and «зважаючи на».
- section: Етикет незгоди та культура дебатування
  words: 800
  points:
  - Teach polite hedging to correct learner bluntness, replacing «Я не згоден» with
    «Дозвольте не погодитися» or «Маю інший погляд».
  - 'Outline structures for partial agreement to maintain constructive dialogue: «Слушна
    думка, проте...» and «З одного боку..., але водночас...».'
  - Differentiate the verbs «сперечатися» (productive debate) and «спорити» (colloquial
    arguing) with clear contextual examples.
  - Drill the correct collocation «брати участь у дискусії», explaining why «приймати
    участь» is an unacceptable calc.
- section: Аргументація та контраргументація
  words: 900
  points:
  - 'Deconstruct the anatomy of a «залізний аргумент» (iron argument): «теза» (thesis)
    → «докази» (evidence) → «висновок» (conclusion).'
  - Detail the types of evidence expected in the publicistic register (facts, statistics,
    expert opinions) and introduce the formal address «шановний опонент».
  - Provide techniques for politely identifying logical fallacies during a discussion.
  - 'List transition phrases for introducing and refuting counterarguments: «Можна
    заперечити, що...» and «Попри переконливість ваших слів...».'
- section: Формальні дебати та практичне моделювання
  words: 800
  points:
  - Break down the structure of formal debates into «афірмація» (affirmation), «негація»
    (negation), and «ребатл» (rebuttal).
  - Explain the role of the moderator, rules of turn-taking, and time limits, using
    modern Ukrainian political talk shows as context.
  - Synthesize the module's vocabulary with fixed structural anchors («по-перше»,
    «по-друге», «отже») to help learners maintain fluency under pressure.
  - Present a group simulation prompt outlining a mini-debate on a civil society topic,
    applying all learned rhetoric tools.
