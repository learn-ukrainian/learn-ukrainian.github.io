slug: discussion-debate
title: Дискусії та дебати
word_target: 4000
content_outline:
  - section: Мистецтво дискусії та історія риторики (The Art of Discussion and History
      of Rhetoric)
    words: 700
    points:
      - Distinction between дискусія (cooperative search for truth), дебати (structured
        competitive clash), and суперечка (often emotional/unstructured disagreement).
      - 'Cultural hook: The roots of Ukrainian debate in the 17th-century Kyiv-Mohyla
        Academy; Rhetoric as a core subject taught by Theophan Prokopovych.'
      - Analysis of 'disputas' (philosophical disputations) blending Baroque eloquence
        with logic as a precursor to modern public discourse.
      - Linguistic analysis of the proverb «У суперечці народжується істина» (In dispute,
        truth is born) and its reflection in modern civil society.
  - section: Висловлення та обґрунтування погляду (Expressing and Justifying a Viewpoint)
    words: 800
    points:
      - 'Alignment with State Standard §1.4.1.2.1: expressing views clearly and reacting
        correctly to the arguments of other participants.'
      - 'Fixing the common lexical calc (Russian influence): replacing «Я рахую, що...»
        with the correct «Я вважаю, що...» or «На мою думку...».'
      - 'Using discourse markers for degrees of certainty: «безперечно» (certainly),
        «ймовірно» (probably), and «можливо» (possibly) to modulate claims.'
      - 'Structuring justification with formal connectives: «оскільки», «з огляду
        на», «зважаючи на» to provide a solid logical foundation.'
  - section: Етикет незгоди та культура дебатування (Etiquette of Disagreement and
      Debate Culture)
    words: 800
    points:
      - 'Correcting the learner error of bluntness: replacing «Я не згоден» with polite
        formal hedging like «Дозвольте не погодитися» or «Маю інший погляд».'
      - 'Strategies for partial agreement: «Слушна думка, проте...», «З одного боку...,
        але водночас...» to maintain constructive dialogue.'
      - 'Addressing the ''false friend'' verb: using «сперечатися» (productive debate)
        vs avoiding the colloquial/argumentative «спорити».'
      - 'Fixed phrase correction: drilling the collocation «брати участь у дискусії»
        to eliminate the incorrect calc «приймати участь».'
  - section: Аргументація та контраргументація (Argumentation and Counter-argumentation)
    words: 900
    points:
      - 'Structure of a ''iron argument'' (залізний аргумент): from теза (thesis)
        to докази (evidence) and висновок (conclusion).'
      - 'Types of evidence in the publicistic register: using facts, statistics, expert
        opinions (шановний опонент), and illustrative examples.'
      - Techniques for identifying and exposing logical fallacies without losing professional
        decorum.
      - 'Introducing and refuting counterarguments: phrases like «Можна заперечити,
        що...» or «Попри переконливість ваших слів...» to transition between positions.'
  - section: Формальні дебати та практичне моделювання (Formal Debates and Practical
      Modeling)
    words: 800
    points:
      - 'Structure of formal debates: афірмація (affirmation), негація (negation),
        and the ребатл (rebuttal) phase.'
      - The role of the moderator and the importance of turn-taking and time limits
        in modern Ukrainian political talk shows and civil forums.
      - 'Group simulation: mini-debates on a civil society topic, focusing on maintaining
        publicistic register and polite interruption.'
      - 'Synthesis and exam prep: utilizing fixed anchors (по-перше, по-друге, отже)
        to maintain fluency and logic under the pressure of debate.'
