slug: correlative-constructions
title: Співвідносні конструкції
word_target: 4000
content_outline:
- section: Вступ
  words: 500
  points:
  - Визначити співвідносні конструкції як синтаксичні пари (вказівник у головному
    реченні + зв'язка в підрядному).
  - Пояснити роль цих конструкцій у логічному структуруванні думок на рівні B2.
  - 'Навести культурний гачок: аналіз фольклорних паремій (наприклад, «Не все те золото,
    що блищить», «Хто спішить, той людей смішить») як базових прикладів парних конструкцій.'
  - Зазначити відповідність Державному стандарту (§4.3.4.2) щодо складнопідрядних
    речень з означальною частиною.
- section: 'Граматичний фундамент: Основні пари'
  words: 1000
  points:
  - 'Детально проаналізувати пару «той... хто» для позначення осіб: навести 3-4 приклади
    з узгодженням у числі («ті, хто знають» vs «той, хто знає»).'
  - 'Розібрати пару «те... що» для абстрактних понять: акцентувати увагу на відмінюванні
    вказівного слова («про те, що», «з тим, що», «від того, що»).'
  - 'Виділити в окремий блок (H3) проблему російської інтерференції: суворо розмежувати
    нормативне українське «за те, що» (знахідний відмінок) і кальку «за то, що».'
  - Навести порівняльну таблицю відмінювання вказівних слів у складних реченнях.
- section: Просторові, часові та кількісні зв'язки
  words: 800
  points:
  - Розглянути просторові корелятиви («там... де», «туди... куди», «звідти... звідки»)
    з прикладами з географічних та наукових описів.
  - Пояснити часові маркери («тоді... коли», «доти... поки») для встановлення логічної
    послідовності та меж у часі.
  - Описати кількісні корелятиви («стільки... скільки», «настільки... наскільки»)
    як інструменти градації та точного вимірювання ознак.
  - Створити Mermaid-діаграму для вибору правильної пари залежно від типу зв'язку
    (простір, час, кількість).
- section: Стилістика та запобігання калькам
  words: 900
  points:
  - Проаналізувати стилістичну різницю між прямим перекладом з англійської («The one
    who» -> «Той, хто...») та питомими українськими іменниковими конструкціями.
  - 'Пояснити функціональний розподіл: «той, хто» тільки для живих істот / осіб, а
    «те, що» — для неживих предметів та абстракцій.'
  - 'Навести приклади з літературного регістру (тропи про час, незворотність подій:
    «Того, що було, не вернеш»).'
  - Дати поради щодо уникнення надмірного нагромадження вказівних слів у науковому
    та офіційно-діловому стилях.
- section: Практичне застосування та синтез
  words: 800
  points:
  - 'Надати інструкції для трансформаційних вправ: як об''єднати два прості речення
    у складнопідрядне за допомогою корелятивної пари.'
  - Продемонструвати побудову академічного абзацу з використанням термінів («аналіз»,
    «синтез», «дослідження») та вказівних слів.
  - 'Сформулювати чіткі пунктуаційні правила: кома завжди ставиться перед підрядною
    частиною, розриваючи корелятивну пару.'
  - Підбити підсумки у вигляді короткого чек-листа для самоперевірки (вибір пари,
    відмінок, кома).
