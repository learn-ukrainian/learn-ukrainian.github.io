slug: neologisms-borrowings
title: Неологізми та запозичення
word_target: 4000
content_outline:
- section: Вступ — еволюція мови
  words: 600
  points:
  - Create an H3 defining language as a living organism, introducing the concepts
    of active and passive vocabulary within the context of stylistic expansion (Держстандарт
    §4.4.1.2).
  - Create an H3 detailing historical waves of borrowings in Ukrainian (Turkic, Polish,
    Latin, modern English) to demonstrate continuous linguistic vitality.
  - Create an H3 discussing the post-2014 and 2022 explosion of neologisms driven
    by technology, war, and the conscious societal push for de-Russification.
- section: Типи неологізмів
  words: 800
  points:
  - Create an H3 for 'Загальномовні неологізми' providing definitions and 5+ examples
    of highly active new words (смартфон, ґендер, блогер).
  - Create an H3 for 'Авторські оказіоналізми' showcasing individual literary creations
    with examples from writers like Tychyna or Serhiy Zhadan.
  - Create an H3 for 'Потенційні слова' explaining words formed by productive models
    but not yet codified in dictionaries (e.g., заінстаграмити).
  - Create an H3 for 'Семантичні неологізми' exploring the process of semantic expansion
    with examples like «хмара» and «мишка».
- section: Запозичення — адаптація та вимова
  words: 800
  points:
  - Create an H3 on 'Джерела запозичень' identifying the origins (English, German,
    French) based on distinct phonetic and structural markers.
  - Create an H3 on 'Фонетична адаптація' explaining how foreign sounds and stresses
    conform to Ukrainian norms (e.g., мАркетинг, менеджер).
  - Create an H3 on 'Морфологічна адаптація' demonstrating how borrowings acquire
    Ukrainian case endings and affixes (блогер → блогерка, менеджерити).
  - 'Create an H3 on ''Правопис запозичень'' covering key orthographic rules: the
    ''Rule of Nine'' (правило дев''ятки), apostrophe usage, and double consonants.'
- section: Калькування та перекладні позичення
  words: 800
  points:
  - Create an H3 defining 'Калькування' as the literal translation of foreign morphemes
    into native equivalents (e.g., хмарочос).
  - Create an H3 on 'Структурні кальки' analyzing word-formation translation processes
    (e.g., світогляд, самокритика).
  - Create an H3 on 'Семантичні кальки' differentiating them from direct borrowings
    and semantic neologisms.
  - Create an H3 comparing 'Калька vs запозичення', discussing linguistic purism versus
    pragmatism and the debate over terms like 'застосунок' vs 'додаток'.
- section: Сучасне українське словотворення та практика
  words: 1000
  points:
  - Create an H3 on 'Продуктивні словотвірні моделі' highlighting how Ukrainian forms
    new words natively using active prefixes and suffixes (e.g., знеструмити).
  - Create an H3 on 'Мовна дерусифікація' focusing on the conscious replacement of
    Russianisms (русизми) with authentic Ukrainian equivalents.
  - Create an H3 introducing 'Словники нової лексики' such as the 'Словотвір' platform
    and 'Мислово' dictionary as tools for tracking lexical trends.
  - Create an H3 outlining a 'Практика словотворення' task where learners evaluate
    potential new words for integration into active vocabulary.
  - Create an H3 for a 'Підсумковий аналіз' that provides a model text demonstrating
    the natural use of 10+ neologisms and borrowings in a technological context.
