slug: set-expressions-combined
title: 'Сталі вирази: Тіло, тварини, предмети та абстракції'
word_target: 4000
content_outline:
- section: 'Вступ: Роль фразеологізмів у мовній компетенції'
  words: 600
  points:
  - Сформулювати визначення ідіоми як нероздільної одиниці згідно з вимогами §1.4.1.2.1.
  - Пояснити поняття внутрішньої форми фразеологізму на прикладі виразу «золоті руки»
    (метафора майстерності, а не матеріал).
  - Презентувати соматичну та зооморфну класифікацію ідіом як базовий код української
    ментальності та картини світу.
- section: 'Соматизми: Коли тіло стає метафорою'
  words: 1200
  points:
  - Розібрати вираз «морочити голову» з детальною таблицею розмовних конструкцій та
    ситуативних прикладів.
  - 'Проаналізувати комунікативні регулятори: розкрити значення «тримати язик за зубами»
    як соціальної стратегії.'
  - Пояснити концепт обмеженості через ідіому «не бачити далі свого носа», контрастуючи
    буквальне і переносне значення.
  - 'Дослідити фразеологізми руху: порівняти семантичні нюанси «брати ноги в руки»
    (негайна дія) та «махнути рукою» (відмова).'
- section: Зоофразеологія та культурні коди
  words: 1200
  points:
  - Розкрити культурне походження виразу «собаку з'їв» як символу екстремального досвіду
    та абсолютної експертності.
  - Пояснити сакральну символіку хліба у виразі «На чужий коровай очей не поривай»
    (зв'язок із весільними обрядами та долею).
  - Дослідити метафори перебільшення («робити з мухи слона») та кількісної недостатності
    («як кіт наплакав» із наведенням типових колокацій).
  - 'Описати ідіоми ризику та страху: «купувати кота в мішку» та пасивну стратегію
    «сидіти як миша під віником».'
- section: Аналіз типових помилок та інтерференції
  words: 800
  points:
  - 'Продемонструвати помилку буквального перекладу (калькування) на прикладі англійського
    ''raining cats and dogs'' (потрібно: «ллє як з відра»).'
  - 'Розібрати проблему лексичної підміни: пояснити унікальність компонентів на прикладі
    «продавати витрішки» (не «усмішки»).'
  - Проаналізувати явище контамінації (змішування) у помилковому виразі «грати значення»
    з чітким розмежуванням «відігравати роль» та «мати значення».
  - Надати конкретні поради щодо уникнення міжмовної інтерференції під час вивчення
    фразеології.
- section: Практичне застосування та синтез
  words: 600
  points:
  - Диференціювати ідіоми за регістрами мовлення (нейтральні проти розмовних) для
    правильного застосування у діалогах.
  - Застосувати методику візуального контрасту для закріплення образів у пам'яті (буквальна
    абсурдність проти переносного сенсу).
  - Створити синтезуючий наратив від імені Казкаря, у якому щонайменше 6 вивчених
    ідіом використовуються у природному контексті.
