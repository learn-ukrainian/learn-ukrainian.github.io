slug: idioms-body
title: 'Фразеологізми: Душа і Серце'
word_target: 4000
content_outline:
- section: 'Вступ: Кордоцентризм — українська філософія серця'
  words: 700
  points:
  - Пояснити концепцію кордоцентризму (Г. Сковорода, П. Юркевич) як ключову рису української
    ментальності, де серце — це центр духовного життя та пізнання («голова всього
    в людині»).
  - Інтегрувати ідею Сковороди про «сродну працю» — роботу, що «лягає на серце», пов’язавши
    її з фразеологізмом «вкладати душу».
  - Описати роль метафори у фразеології згідно з вимогами стандарту §4.4.1.2 (Стилістичні
    засоби лексики), фокусуючись на описі внутрішнього світу людини без перекладу
    англійською (100% занурення).
- section: Фразеологізми з компонентом «душа»
  words: 1000
  points:
  - Створити окремий H3 для виразу «душа в п'яти тікає/ховається» (сильний страх),
    пояснивши анімованість концепту душі та типові колокації.
  - Створити окремий H3 для фразеологізму «камінь на душі» — емоційний стан важких
    переживань та варіанти «зняти камінь з душі», «ніби камінь з душі впав».
  - Створити окремий H3 для евфемізму «віддати Богу душу», роз'яснивши його вживання
    виключно щодо живих істот у поважному контексті.
  - Створити окремий H3 для «душа болить» (співчуття), інтегрувавши приклади з повсякденного
    життя.
- section: Фразеологізми з компонентом «серце»
  words: 1000
  points:
  - Створити окремий H3 для «серце кров'ю обливається» (глибокий жаль) та синоніма
    «серце крається» у контексті емоційної реакції на чужий біль.
  - 'Створити окремий H3 для виразу «брати за серце» (зворушувати) із зазначенням
    типових суб''єктів: пісня, розповідь, вчинок.'
  - Створити окремий H3 для етичної категорії «від щирого серця» (без задньої думки).
  - Створити окремий H3 для виразів «мати серце» (милосердя) та «положити руку на
    серце» (чесність).
- section: Типові помилки та стилістичні нюанси
  words: 700
  points:
  - 'Дриль для розрізнення: «брати за серце» (щось зовнішнє діє на почуття) vs «брати
    до серця» (людина надмірно переймається) — навести 3 контрастні пари контекстів
    у таблиці.'
  - 'Стилістичне застереження: пояснити комічність вживання «віддати Богу душу» щодо
    техніки, підкреслюючи різницю між живим і неживим.'
  - 'Корекція калькування: пояснити неможливість дослівного перекладу «have a heart»
    як «мати серце» у значенні благання про пощаду, запропонувавши автентичні відповідники
    («майте совість»).'
- section: 'Практика: Емоційні стани та діалоги'
  words: 600
  points:
  - Написання емоційного діалогу (150 слів) з використанням 4-5 нових виразів, дотримуючись
    ролі Поета (серце як «внутрішнє сонце»).
  - Короткий порівняльний аналіз із соматичними виразами з M49-50 (голова, руки, ноги)
    для створення цілісної картини опису людини.
  - Інтерактивні запитання для самоперевірки на доречність використання фразеологізмів
    у різних життєвих ситуаціях.
