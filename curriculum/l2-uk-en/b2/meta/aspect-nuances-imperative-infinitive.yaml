slug: aspect-nuances-imperative-infinitive
title: 'Відтінки виду II: наказовий спосіб та інфінітив'
word_target: 4000
content_outline:
- section: 'Вступ: Культура спонукання та етикет'
  words: 800
  points:
  - 'The ''Polite Ukrainian Host'' concept: explicitly defining why imperfective aspect
    (Сідайте, заходьте, беріть) is essential for hospitality.'
  - 'Analysis of the ''Rude Guest'' error: contrasting how Perfective (Сядь!) sounds
    like a military order versus the welcoming Imperfective (Сідай!).'
  - Introduction to the Military Instructor persona and the spectrum of command vs.
    request in Ukrainian.
- section: Граматика та морфологія наказу
  words: 1000
  points:
  - 'Morphological rules (§4.1.3.2): regular patterns for verbs like ''хотіти'', ''літати'',
    and ''робити'' across all persons (ходи, ходімо, ходіть, хай ходять).'
  - 'Aspectual selection for commands: Perfective for categorical, urgent, single-result
    actions vs Imperfective for ongoing processes or invitations.'
  - 'Military register nuances: use of Perfective in formal ''накази'' (orders) for
    strict outcome clarity.'
- section: Заборони, застереження та забобони
  words: 800
  points:
  - 'The ''Accident Warning'' rule: Perfective aspect for warning against unintentional
    results (Не впади!, Не забудь!).'
  - 'General Prohibitions: Imperfective aspect for forbidding ongoing or repeated
    actions (Не бігай!, Не запізнюйся!).'
  - 'Cultural anchor ''Забобони'' (superstitions): teaching taboos using ''Не можна''
    + Imperfective (e.g., Не можна передавати речі через поріг).'
- section: 'Модальність інфінітива: Правила vs Можливість'
  words: 800
  points:
  - 'Semantic split of ''Не можна'': + Imperfective (It is forbidden / against the
    law) vs + Perfective (It is physically impossible / unachievable).'
  - 'Case study contrast: ''Не можна відчиняти вікно'' (prohibition) vs ''Не можна
    відчинити вікно'' (physical impossibility, it''s stuck).'
  - Integration of B2 academic vocabulary (метод, поняття, дослідження) into modal
    constraints.
- section: 'Професійне застосування: Накази та інструкції'
  words: 600
  points:
  - 'Drafting formal instructions: choosing aspect based on the ''термін виконання''
    (deadline) and process nature.'
  - 'Synthesis task preparation: writing a formal ''наказ'' (order) for a scenario,
    correctly mixing prohibitions and urgent commands.'
  - Summary of common learner errors in official-business style requests versus commands.
