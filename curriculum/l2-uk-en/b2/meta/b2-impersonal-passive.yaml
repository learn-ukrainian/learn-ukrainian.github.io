slug: b2-impersonal-passive
title: Безособові конструкції на -но/-то
word_target: 4000
content_outline:
- section: 'Вступ: Поняття безособовості'
  words: 500
  points:
  - 'H3: Визначення безособовості як фокусу на результаті (Державний стандарт §4.3.3.1).'
  - 'H3: Культурний контекст від фаталізму в літературі («так судилося») до сучасних
    реалій («оголошено тривогу»).'
  - 'Зауваження: 100% українськомовне занурення, англійська не використовується.'
- section: Творення та граматичні особливості
  words: 800
  points:
  - 'H3: Правила трансформації пасивних дієприкметників (-ний/-тий) у незмінні форми
    (-но/-то).'
  - 'H3: Незмінність форми — відсутність узгодження в роді та числі.'
  - 'H3: Порівняльна таблиця: стан (прикметник «вікно розбите») проти дії (результат
    «вікно розбито»).'
- section: Синтаксис та керування об'єктом
  words: 900
  points:
  - 'H3: Головне правило знахідного відмінка (Accusative) для об''єкта (Книгу написано).'
  - 'H3: Деколонізована граматика: сувора заборона на орудний відмінок діяча (чому
    не можна казати «написано мною»).'
  - 'H3: Синтаксичний розбір речення (відсутність підмета).'
- section: Офіційно-діловий та юридичний стиль
  words: 1000
  points:
  - 'H3: Використання в адміністративних документах (накази, постанови: рішення прийнято,
    статут затверджено).'
  - 'H3: Медійна мова та новини (інформацію підтверджено, рух заборонено).'
  - Міні-діалоги або уривки з офіційних звітів, що демонструють високу частотність
    цих форм.
- section: Практика та запобігання помилкам
  words: 800
  points:
  - 'H3: Розбір помилки №1: Плутанина між суб''єктом і об''єктом (називний vs знахідний).'
  - 'H3: Розбір помилки №2: Уникнення калькування (перетворення пасивних конструкцій
    з діячем на активний стан).'
  - Підсумок та підготовка до вивчення зворотного пасиву (модуль b2-04).
