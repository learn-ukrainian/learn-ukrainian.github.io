slug: numeral-declension-compound-numbers
title: 'Відмінювання числівників ІІ: Складені числівники'
word_target: 4000
content_outline:
- section: Вступ та повторення складних числівників
  words: 600
  points:
  - Вступ до 100% україномовного середовища, встановлення професійного тону ролі бухгалтера.
  - Повторення відмінювання складних числівників (50-80, 200-900), звертаючи увагу
    на внутрішню флексію сотень (наприклад, п'ятисот, семисот).
  - 'Культурний контекст: введення літака Ан-225 «Мрія» через його 462 авіаційні рекорди
    та 640 тонн маси для роботи з великими числами.'
  - 'Розминка: виявлення типових помилок (наприклад, «двісот» замість «двохсот») у
    коротких заголовках новин.'
- section: Складені кількісні числівники — Правило повної зміни
  words: 1000
  points:
  - 'Пояснення головного правила: у складених кількісних числівниках обов''язково
    змінюється кожне слово (компонент) у всіх відмінках.'
  - 'Аналіз поширеної помилки: порівняння правильної форми «на ста сорока п''яти»
    з хибною «на сто сорок п''яти», позиціонуючи це як особливість української структурної
    точності.'
  - 'Відповідність Державному стандарту (§4.1.1.3): демонстрація та відпрацювання
    варіантних форм орудного відмінка («шістдесятьома / шістдесятьма»).'
  - 'Практика в контексті фінансів: відмінювання великих сум (сотні, тисячі, мільйони)
    у поєднанні зі словом «гривня».'
- section: Складені порядкові числівники та історичні дати
  words: 900
  points:
  - 'Пояснення правила: у складених порядкових числівниках відмінюється виключно останній
    компонент (наприклад, триста вісімдесят перший/першого).'
  - 'Історичний якір: Конституція Пилипа Орлика (1710 рік) — відпрацювання відмінювання
    року в непрямих відмінках (у тисяча сімсот десятому році).'
  - 'Корекція помилок: розбір змішування правил для років (пояснення, чому форма «у
    тисячі дев''ятсот...» є неправильною).'
  - 'Лексична робота: опис великих проміжків часу та століть (від «тисяча сімсот десятого
    року» до подій «двадцять першого століття»).'
- section: Числівники в статистиці та географії
  words: 900
  points:
  - 'Дробові числівники на практиці: опис станції метро «Арсенальна» та її глибини
    105,5 (сто п''ять цілих і п''ять десятих) метра.'
  - 'Робота з лексикою: використання слів «населення», «відсоток» та «бюджет» для
    опису демографічних показників (близько 40 мільйонів).'
  - 'Граматика: поєднання числівників з обмежувачами (близько, понад, майже, щонайменше)
    і правильний вибір відмінка.'
  - 'Стилістика: офіційно-ділове та наукове використання одиниць виміру (кілометр)
    у статистичних даних.'
- section: Практикум та синтез
  words: 600
  points:
  - 'Диктант для бухгалтера: запис статистичних даних словами для перевірки орфографії
    та морфології складених числівників.'
  - 'Рольова гра «Бухгалтер»: підготовка фінансового звіту, що включає відмінювання
    сум, відсотків та дат.'
  - 'Аналітична вправа: пошук та виправлення граматичних помилок у відмінюванні числівників
    у реальних економічних статтях.'
  - 'Підсумковий тест: чітка диференціація відмінювання кількісних (змінюються всі
    слова) та порядкових (змінюється лише останнє слово) форм.'
