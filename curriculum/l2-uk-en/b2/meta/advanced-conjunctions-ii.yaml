slug: advanced-conjunctions-ii
title: 'Складні Сполучники II: Час та Умова'
word_target: 4000
content_outline:
- section: 'Вступ: Світ умов та часових ланцюжків'
  words: 500
  points:
  - Пояснити базову роль складнопідрядних речень (ДСТУ §4.3.4.3, §4.3.4.5) без надмірної
    академічності, наголосити на логіці часової та умовної залежності.
  - Використати приказку «Якби та аби, та виросли в роті гриби» для переходу до гіпотетичних
    сценаріїв та їх вираження.
  - 'Чітко розмежувати реальну умову (дія можлива: якщо) та ірреальну/бажану умову
    (дія неможлива або гіпотетична: якби, коли б).'
- section: 'Часові сполучники: Від одночасності до межі'
  words: 1000
  points:
  - Зіставити вираження одночасності (поки, коли) та швидкої зміни подій (щойно, тільки-но).
    Кожен сполучник має супроводжуватися таблицею з прикладами.
  - Детально проаналізувати опозицію «поки» (тривалість) vs «доки» (досягнення межі,
    результат), використовуючи українські контексти.
  - Проаналізувати граматичну конструкцію «доки... доти» на прикладі приказки «Доки
    сонце зійде – роса очі виїсть».
  - Пояснити стилістичну різницю між «щойно» та «відколи» при маркуванні точок відліку
    в історичних та особистих розповідях.
- section: 'Умовні сполучники: Реальність, гіпотеза та офіційність'
  words: 1000
  points:
  - Представити конструкції реальної умови зі сполучником «якщо» та розмовний варіант
    «коли» (у значенні умови).
  - Зробити глибокий розбір ірреальної умови на основі приказки «Якби знав, де впаду,
    то й соломки б підстелив» (обов'язковість минулого часу та частки б/би).
  - 'Ввести офіційно-діловий та публіцистичний регістри: порівняти «за умови що» та
    стилістично нейтральне «у разі, якщо».'
  - 'Деколонізувати підхід: критично проаналізувати канцеляризм «у випадку якщо» та
    пояснити, чому він є небажаним.'
- section: Культура мовлення та запобігання типовим помилкам
  words: 800
  points:
  - 'Проаналізувати та виправити типову помилку: заміну умовного «якщо» часовим «коли»
    у контекстах, де важлива саме умова (надати контрастні пари).'
  - 'Розробити орфографічний практикум: правила розрізнення «якби» (сполучник, пишеться
    разом) та «як би» (займенник + частка, окремо) з поясненням контексту.'
  - 'Дати інструкцію з очищення мови від русизмів: вилучення кальки «тільки що» на
    користь «щойно» або «тільки-но» у різних регістрах мовлення.'
  - Сформулювати чітке правило синтаксичної цілісності для часток б/би у складних
    реченнях ірреальної умови.
- section: 'Практика: Синтез і трансформація зв''язків'
  words: 700
  points:
  - 'Надати інструкції для трансформаційних вправ: перетворення речень реальних планів
    (якщо) на ірреальні жалкування (якби) на основі життєвих сценаріїв.'
  - 'Створити контекст для побудови логічних ланцюжків: інструкції або протоколи з
    чіткою послідовністю дій (перш ніж, після того як, щойно).'
  - 'Інтегрувати комплексні завдання на синтез: поєднання часових і умовних частин
    в одному складному реченні.'
