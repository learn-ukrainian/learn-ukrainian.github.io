slug: holodomor-testimony-as-literature
title: "Свідчення Голодомору: Від Усної Пам'яті до Документальної Прози"
word_target: 5000
content_outline:
- section: 'Вступ: I — Голодомор і мова катастрофи'
  words: 500
  points:
  - 'Голодомор 1932–1933 рр.: від 3,5 до 7 мільйонів загиблих, залежно від методики підрахунку — і 60 років замовчування.'
  - 'Проблема мови: як говорити про голод, якщо саме слово «голод» означало злочин проти держави?'
  - 'Усна традиція як архів: що зберегла пам''ять виживших і що записали дослідники починаючи з 1990-х рр.'
- section: 'Вступ: II — Жанрова панорама свідчень'
  words: 500
  points:
  - 'Типи текстів: усні свідчення, зібрані у 1990-і рр., щоденники, листи, доноси як «зворотні» свідчення.'
  - '"Усний проект": як збирали свідчення — де і коли почалась систематична робота, що встигли і що не встигли.'
  - 'Художня проза про Голодомор: де документальне і вигадане зустрічаються в єдиному просторі.'
- section: 'Аналіз: Роман Самчука «Марія» (1934) — перше художнє свідчення'
  words: 700
  points:
  - '"Марія" (1934): перший роман про Голодомор, написаний за гарячими слідами — що це означало для Самчука і для читача.'
  - 'Образ Марії: матір''яна-страдниця між народною традицією і голодом — де агіографія і де репортаж?'
  - 'Самчук в еміграції, Самчук в Укрaїні: дві рецепції одного тексту через різних читачів.'
- section: 'Аналіз: «Жовтий князь» Барки (1963) — поетична проза Голодомору'
  words: 700
  points:
  - '"Жовтий князь" (1963): Василь Барка і трагедія Мирона Катранника — родинна хроніка на фоні геноциду.'
  - '"Жовтий" як символ: голод, хвороба і смерть у кольоровому образі — тіло, що зникає.'
  - 'Стиль Барки: між верлібром і прозою, між метафізичним і щоденним — де бере початок його поетична модальність?'
- section: 'Аналіз: Усні свідчення зібрані Комісією Конгресу (1988) і Фондом Шоа'
  words: 600
  points:
  - 'Комісія Джеймса Мейса (1988): перше офіційне збирання свідчень і його значення для міжнародного визнання.'
  - 'Мова виживших: що відрізняє усну мову свідчення від письмового — інтонація, синтаксис, замовчування.'
  - '"Архів тіла": як голод описується через тілесний досвід — і що це означає для документальної традиції.'
- section: 'Стилістика: Як говорити про невимовне'
  words: 500
  points:
  - '"Мінімалістичне свідчення": де надмір мовчання говорить більше, ніж опис — приклади з текстів виживших.'
  - Офіційні доноси як «контрдокументи»: мова бюрократичного звіту проти мови тіла, що голодує.
  - 'Питання "достовірності": чому документальна проза про Голодомор вимагає верифікації і де вона неможлива.'
- section: 'Деколонізаційна перспектива: Геноцид і мовне знищення'
  words: 500
  points:
  - '"Одночасне знищення": хліб і мова забирали разом — як голод і русифікація відбувалися синхронно.'
  - 'Совєтська фальсифікація: перепис 1939 р. і знищення перепису 1937 р. — де цифри стають зброєю.'
  - 'Міжнародне визнання Голодомору геноцидом і роль документальних свідчень у цьому процесі.'
- section: 'Підсумок: Свідчення у XXI ст.'
  words: 500
  points:
  - 'Нові художні тексти про Голодомор після 2014 і 2022 рр.: що змінилось у прочитанні старих свідчень.'
  - 'Голодомор і сучасний досвід окупованих територій: де паралелі і де принципова різниця.'
  - 'Питання до читача: чи є обов''язок говорити про те, що ти не пережив — і як говорити, не підробляючи чужого болю?'
