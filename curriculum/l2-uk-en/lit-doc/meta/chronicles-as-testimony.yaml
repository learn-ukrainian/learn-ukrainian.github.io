slug: chronicles-as-testimony
title: 'Хроніка як свідчення: Козацькі Літописи як Витоки Документальної Прози'
word_target: 5000
content_outline:
- section: 'Вступ: Феномен документальної прози та козацьке коріння'
  words: 400
  points:
  - Визначення документальної прози (lit-doc) як жанру, де факт стає естетичною категорією.
  - 'Чому козацькі літописи є витоками цього жанру: концепція ''свідка'' та ''документа''.'
  - 'Тріада літописів: Самовидця, Граб''янки, Величка — від мемуарів до барокового
    епосу.'
- section: 'Історичне тло: Потреба у свідченні під час катастрофи'
  words: 400
  points:
  - '1648–1720 роки: Україна як простір екзистенційної війни та політичних трансформацій.'
  - 'Чому козацька старшина почала писати: літопис як легітимізація прав нації.'
  - Руїна як каталізатор потреби зафіксувати пам'ять, що зникає.
- section: 'Автор як «Самовидець»: Революція очевидця'
  words: 400
  points:
  - 'Аналіз анонімності автора: чому ''Самовидець'' — це не просто ім''я, а риторична
    позиція.'
  - 'Роман Ракушка-Романовський: імовірний автор та його життєвий досвід як база для
    літопису.'
  - Відмова від барокової пишності на користь ділової, 'репортажної' мови.
- section: 'Літопис Самовидця: I — Початок війни та динаміка повстання'
  words: 450
  points:
  - 'Опис 1648 року: Самовидець про причини війни — соціальні та національні утиски.'
  - 'Метод ''хронологічної драми'': як сухі дати перетворюються на живий наратив.'
  - 'Аналіз мови: наближення до народної стихії як засіб передачі достовірності.'
- section: 'Літопис Самовидця: II — Чорна рада як соціальний репортаж'
  words: 450
  points:
  - 'Деталізація ніжинських подій 1663 року: натовп, емоції, психологія зради.'
  - 'Свідчення про Руїну: опис спустошеного Правобережжя як гуманітарний документ.'
  - Вплив Самовидця на історичний роман XIX ст. (П. Куліш).
- section: 'Самійло Величко: I — Бароковий епос та робота з архівом'
  words: 450
  points:
  - 'Величко як ''канцелярист-архівіст'': використання реальних універсалів та листів.'
  - 'Масштаб праці: 4 томи історії як спроба осмислити долю України.'
  - Стиль 'високого бароко' проти 'сухості' Самовидця — дві грані документалізму.
- section: 'Самійло Величко: II — Мистецтво документальної реконструкції'
  words: 450
  points:
  - 'Метод ''вкладених промов'': реконструкція голосу Богдана Хмельницького.'
  - 'Величко і ''новий журналізм'': поєднання факту з художнім домислом для передачі
    правди.'
  - 'Знаменита передмова: літопис як засіб національного самопізнання та покаяння.'
- section: 'Жанрова еволюція: Від хроніки до військового щоденника'
  words: 400
  points:
  - 'Трансформація форми: як хроніка стає щоденником (Шевченко) та репортажем.'
  - 'Концепція ''нульового дистанціювання'': автор як учасник подій у XVII та XXI
    століттях.'
  - 'Тяглість традиції: особиста відповідальність за зафіксований факт.'
- section: 'Сучасні самовидці: I — Від Майдану до великої війни'
  words: 400
  points:
  - 'Антології свідчень Майдану (''Майдан. Свідчення''): повернення до методу Самовидця.'
  - Військовий щоденник як найчесніша форма сучасної літератури.
  - 'Аміна Окуєва та Мустафа Найєм: журналістика як продовження літописної традиції.'
- section: 'Сучасні самовидці: II — Вакуленко, Асєєв, Амеліна'
  words: 400
  points:
  - 'Володимир Вакуленко: ''Окупаційний щоденник'' як акт опору та збереження пам''яті.'
  - 'Станіслав Асєєв: ''Світлий Шлях'' — репортаж з пекла ''Ізоляції'' як сучасна
    Руїна.'
  - 'Вікторія Амеліна: література як інструмент фіксації свідчень та боротьби за правду.'
- section: 'Деколонізація пам''яті: Хроніка як протиархів'
  words: 400
  points:
  - Свідоме знищення українських архівів імперією (1775 рік) та роль літописів у їх
    відновленні.
  - Як козацькі літописи спростовують міф про 'відсутність української державності'.
  - Оцифрування та повернення Величка у 2020 році як перемога над забуттям.
- section: 'Підсумок: Документальна традиція як безперервний ланцюг'
  words: 400
  points:
  - Чому українська література завжди повертається до факту в часи випробувань.
  - Документальне письмо як громадянська практика та мандат на майбутнє.
  - 'Заклик до читача: кожен є потенційним літописцем своєї доби.'
