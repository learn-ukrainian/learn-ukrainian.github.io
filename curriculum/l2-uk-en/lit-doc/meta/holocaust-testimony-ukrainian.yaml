slug: holocaust-testimony-ukrainian
title: "Бабин Яр і Голос Виживших: Українські Свідчення Голокосту як Документальна Проза"
word_target: 5000
content_outline:
- section: 'Вступ: I — Голокост в Україні: масштаб і замовчування'
  words: 500
  points:
  - 'Більше мільйона євреїв, знищених на території України між 1941 і 1945 рр. — один з найбільших масових злочинів в історії.'
  - 'Бабин Яр (29–30 вересня 1941): 33 771 людина за два дні — і 50 років замовчування у радянській ретроспективі.'
  - 'Тричасткова проблема: злочин нацистів, співучасть частини місцевого населення, радянське замовчування — кожен рівень вимагає окремого аналізу.'
- section: 'Вступ: II — Хто писав і про що: типологія свідчень'
  words: 500
  points:
  - 'Типи текстів: мемуари виживших, свідчення очевидців, художні реконструкції, ліричні реакції — кожен жанр з власними обмеженнями.'
  - 'Єврейські і неєврейські голоси: де вони перетинаються і де принципово різні.'
  - 'Проблема мови свідчення: що можна сказати і що залишається поза мовою — апофатика катастрофи.'
- section: 'Аналіз: Анатолій Кузнєцов і «Бабин Яр» (1966)'
  words: 700
  points:
  - '"Бабин Яр" (1966, повна версія 1970): документальний роман між цензурою і самоцензурою — текст у тексті.'
  - 'Метод Кузнєцова: особисте свідчення + зібрані свідчення + архівні документи — гібридна форма як відповідь на «неможливість говорити».'
  - 'Цензурна боротьба: як Кузнєцов вивіз рукопис з СРСР і що залишилось у підцензурній версії.'
- section: 'Аналіз: Єврейська проза і поезія про Бабин Яр'
  words: 700
  points:
  - 'Вірш Євтушенка «Бабин Яр» (1961) — полемічний текст і реакція на нього: де художній і де політичний вимір.'
  - 'Єврейська поезія, написана на ідиші і івриті: тексти, що залишилися поза «офіційним» свідченням.'
  - "Листи і щоденники виживших: безпосередній документ між смертю і мовою — що ці тексти можуть і чого не можуть."
- section: 'Аналіз: Сучасне осмислення — Франко Дебельяк і Сашко Дерманський'
  words: 600
  points:
  - 'Сучасна художня проза про Бабин Яр: де молоде покоління знаходить нову мову для старої катастрофи.'
  - 'Пам''ятник і пам''ять: як матеріальний простір Бабиного Яру стає темою для документальних текстів після 2000 р.'
  - 'Проблема «привласнення» пам''яті: хто має право говорити від імені жертв — і як цей конфлікт виглядає в текстах.'
- section: 'Мова свідчення: Що може документальна проза'
  words: 500
  points:
  - '"Нездатність розповісти": Приліп Лаві про обмеженість мови в ситуації крайнього досвіду.'
  - 'Функція деталі: одна смерть проти мільйона — де конкретність допомагає, а де статистика паралізує.'
  - 'Між свідченням і художнім твором: де факт починає говорити «поза собою» і перетворюється на образ.'
- section: 'Деколонізаційна перспектива: Голокост і українська відповідальність'
  words: 500
  points:
  - 'Совєтське замовчування Голокосту як частина колоніальної операції: якщо немає «єврейської» жертви, немає і «нацистської» провини.'
  - 'Деколонізація пам''яті: українські ініціативи з вшанування пам''яті жертв Бабиного Яру після 1991 р. — де прогрес і де ще є заперечення.'
  - 'Голокост і Голодомор: паралелі і відмінності у структурі мовчання і пам''яті — без конкуренції жертв.'
- section: 'Підсумок: Свідчення як зобов''язання'
  words: 500
  points:
  - Документальна проза про Голокост як модель для інших документальних проектів — що Кузнєцов дав Вакуленку і Асєєву.
  - Пам''ять Бабиного Яру після 2022 р.: нові рівні трагедії і нові документальні тексти.
  - Питання до читача: чи є обов'язок пам'ятати, і що означає відповідати на катастрофу, якої ти не бачив?
