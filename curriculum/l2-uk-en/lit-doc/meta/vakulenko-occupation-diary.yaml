slug: vakulenko-occupation-diary
title: "Щоденник Окупації: Останні Записи Вол. Вакуленка-Кришталя"
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: I — Письменник і війна'
    words: 450
    points:
      - Представлення Володимира Вакуленка як дитячого письменника, громадського діяча
        та волонтера Слобожанщини.
      - Рішення залишитися в рідній Капитолівці на початку повномасштабного вторгнення
        через догляд за сином з аутизмом.
      - Усвідомлення небезпеки через відкриту проукраїнську позицію та неминучість
        переслідувань.
  - section: 'Вступ та контекст: II — Окупація Капитолівки та арешт'
    words: 450
    points:
      - Хронологія встановлення російського окупаційного режиму на Ізюмщині (лютий-березень
        2022).
      - 'Атмосфера терору: перші допити, обшуки та інформаційний вакуум.'
      - Рішення заховати рукопис 23 березня під вишнею перед остаточним викраденням.
  - section: 'Аналіз ключових творів: I — Історія порятунку щоденника'
    words: 550
    points:
      - 'Матеріальність тексту: записи на клаптиках і сторінках шкільного зошита,
        деформація рукопису в землі.'
      - Деокупація у вересні 2022 та пошуки щоденника письменницею Вікторією Амеліною
        разом із батьком Володимира.
      - 'Символічний акт порятунку пам''яті: архетип закопаного скарбу/слова, що повертає
        нас до традицій приховування рукописів дисидентами.'
  - section: 'Аналіз ключових творів: II — Документування воєнних злочинів'
    words: 550
    points:
      - 'Детальна фіксація Вакуленком поведінки російських військових: мародерства,
        залякувань, зневаги до цивільних.'
      - Щоденник як безпосереднє свідчення (еґо-документ) епохи терору, що має не
        лише художнє, а й юридичне значення.
      - Фіксація взаємин з місцевими колаборантами та атмосфери тотальної недовіри.
  - section: 'Аналіз ключових творів: III — Психологічний вимір тексту'
    words: 550
    points:
      - 'Динаміка емоційного стану автора: від безпорадності перед збройною силою
        до непохитної віри у визволення.'
      - 'Цитата-мантра: «Усе буде Україна! Я вірю в перемогу!» як опора для збереження
        гідності.'
      - 'Звернення до майбутніх читачів: писання як акт спілкування крізь смерть.'
  - section: 'Стилістика та мова автора: I — Жанрова специфіка щоденника'
    words: 450
    points:
      - Жанр «щоденника окупації» (окупаційної прози/літератури свідчення).
      - Уривчастість, фрагментарність і лаконічність стилю як наслідок умов написання
        в стані постійної загрози.
      - Поєднання побутової фіксації подій з глибокими філософськими роздумами.
  - section: 'Стилістика та мова автора: II — Мова опору та документальна точність'
    words: 450
    points:
      - 'Мова як зброя: використання безкомпромісної лексики щодо окупантів.'
      - Стилістичний контраст між поетичним світосприйняттям письменника та брутальною
        реальністю війни.
      - Автентичність фіксації живої розмовної мови в діалогах.
  - section: 'Деколонізаційна перспектива: I — Руйнування імперських міфів про «визволителів»'
    words: 650
    points:
      - Спростування ключового російського міфу про те, що на Слобожанщині нібито
        чекали на війська РФ.
      - Документування жорстокого викорінення окупантами української ідентичності
        та культурного простору.
      - Безпосереднє свідчення краху ідеї «братніх народів» з епіцентру подій.
  - section: 'Деколонізаційна перспектива: II — Українська суб''єктність в умовах
      терору'
    words: 450
    points:
      - Акт писання українською мовою на окупованій території як свідомий прояв національної
        суб'єктності.
      - 'Інтелектуальний спротив: коли фізичний опір неможливий, слово стає єдиним
        інструментом боротьби.'
      - Відмова коритися агресору навіть перед лицем смерті.
  - section: 'Підсумок та спадщина: I — Трагічна загибель і національна пам''ять'
    words: 450
    points:
      - 'Завершення трагедії: ексгумація та ідентифікація тіла Володимира Вакуленка
        (листопад 2022 року, Ізюмське масове поховання).'
      - Видання книги у 2023 році та включення постаті письменника до національного
        пантеону новітніх героїв.
      - Значення «Щоденника окупації» для української та світової культури як беззаперечного
        доказу незнищенності українського слова.
