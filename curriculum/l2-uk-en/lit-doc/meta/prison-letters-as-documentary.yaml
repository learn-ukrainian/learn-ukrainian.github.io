slug: prison-letters-as-documentary
title: "Тюремний Лист як Жанр: Стус, Світличний, Шумук — Документ на Межі Смерті"
word_target: 5000
content_outline:
- section: 'Вступ: I — Листи крізь залізо'
  words: 500
  points:
  - 'Тюремне і табірне листування 1960–1980-х рр.: корпус текстів між приватним і публічним, між цензурою і обходом цензури.'
  - 'Листи «шістдесятників» із зон: Стус, Світличний, Шумук, Гель, Мариновича — кожен з власним голосом і власною стратегією.'
  - '"Самвидав" і тюремний лист: де ці два потоки перетинаються і де розходяться.'
- section: 'Вступ: II — Жанр тюремного листа: між документом і поезією'
  words: 500
  points:
  - '"Лист" як жанр з давнину до сьогодні — від Цицерона до Ґрамші: що залишається незмінним у формі.'
  - 'Цензура як частина тексту: що не можна сказати прямо — і як кожен «пропуск» говорить власним мовчанням.'
  - 'Адресат і контекст: листи написані батькам, дружинам, дітям — де особисте і де свідоцтво.'
- section: 'Аналіз: Листи Василя Стуса (1970–1985)'
  words: 700
  points:
  - 'Стус як лірик у листах: де межа між поезією і листуванням зникає — листи як розширення поетичного проекту.'
  - '"Листи до Валентини": інтимний текст між коханням і розлукою — приватний простір під наглядом держави.'
  - 'Стус про дозволену літературу: що він читав і як коментував — критика всередині цензурованого тексту.'
- section: 'Аналіз: Листи і мемуари Данила Шумука'
  words: 700
  points:
  - '"За східним обрієм" (1974): спогади, написані у таборі — де пам''ять і де сучасне переплітаються.'
  - 'Шумук і три режими: польська тюрма, НКВС, совєтський ГУЛАГ — документальна хроніка неможливого виживання.'
  - 'Повернення і свобода: що відбулося після звільнення і що залишилось незагоєним.'
- section: 'Аналіз: Листи Івана Світличного і Мирослава Мариновича'
  words: 600
  points:
  - "Іван Світличний (1929–1992): критик, перекладач, поет — і документальна проза листів між вироком і надією."
  - '"Всесвіт за колючим дротом" Мариновича: перший великий мемуар «шістдесятника» — що він написав на відстані і що дозволило цю відстань зайняти.'
  - 'Порівняння тональностей: Стус як трагік, Шумук як хроніст, Світличний як іронік — три різних виживання.'
- section: 'Стилістика: Мова між цензурою і щирістю'
  words: 500
  points:
  - 'Езопова мова у листах: конкретні прийоми обходу цензури — і як КДБ їх розумів.'
  - 'Тілесна присутність у тексті: хвороба, голод, холод — як фізичний стан входить у мову і що це говорить про людину.'
  - 'Іронія і гумор у таборі: де сміх є формою психологічного виживання — і де він стає художнім прийомом.'
- section: 'Деколонізаційна перспектива: Документ як опір'
  words: 500
  points:
  - 'Чому зберегти лист з табору було небезпечно для отримувача: кожен документ = докази проти двох.'
  - '"Хроніка поточних подій": самвидав і його зв''язок з тюремним листом — паралельні системи документування.'
  - 'Значення для сучасності: листи українських військовополонених і полонених 2022–2024 рр. — де традиція продовжується.'
- section: 'Підсумок: Тюремне письмо як спадщина'
  words: 500
  points:
  - Листи Стуса і Мариновича у шкільних програмах — де вони є і де їх варто ввести.
  - '"Архів опору": що стало з листами після звільнення і смерті авторів — і що ще не видано.'
  - 'Питання до читача: що означає писати лист, знаючи, що його читатиме КДБ — і що це говорить про мову і мовчання?'
