slug: affinity-srodna-pratsia
title: Affinity Srodna Pratsia
word_target: 5000
content_outline:
- section: 'Вступ: Екзистенційний імператив'
  words: 400
  points:
  - 'Проблема людського нещастя: чому люди страждають, маючи багатство і владу.'
  - Теза 'Пізнай себе' (Nosce te ipsum) як ключ до вирішення.
  - 'Сковорода як український Сократ: філософія життя, а не кабінету.'
- section: 'Теорія: I — Бог як Натура'
  words: 500
  points:
  - 'Метафізичний фундамент: Бог не десь на небі, Він є ''всесвітнім розумом'' і внутрішньою
    природою речей.'
  - Йти проти своєї природи = йти проти Бога.
  - Поняття 'сродності' (affinitas) як магнетизму душі.
- section: 'Читання: I — ''Алфавіт світу'' (1774)'
  words: 600
  points:
  - 'Контекст написання: діалог як жанр.'
  - 'Аналіз уривка про черепаху та орла: прийняття своєї суті.'
  - 'Барокова риторика: алегорії та символи в тексті.'
- section: 'Теорія: II — Концепція ''Нерівної рівності'''
  words: 500
  points:
  - 'Парадокс: Бог створив усіх різними, але це і є справедливість.'
  - 'Метафора фонтану: різні посудини (таланти) наповнюються рівною мірою (щастям),
    якщо вони повні.'
  - 'Критика ''зрівнялівки'': намагання бути кимось іншим веде до соціального хаосу.'
- section: 'Читання: II — Байка ''Бджола та Шершень'''
  words: 600
  points:
  - 'Текст байки: діалог двох життєвих позицій.'
  - 'Шершень: споживач, який живе заради результату (меду).'
  - 'Бджола: творець, для якого щастя — у самому процесі збору (''солодкість праці'').'
  - 'Мораль: ''сродна праця'' приносить насолоду сама по собі.'
- section: 'Контекст: Античні витоки та синтез'
  words: 450
  points:
  - 'Сковорода і Стоїцизм: поняття ''officium'' (обов''язок) і життя згідно з природою.'
  - 'Сковорода і Епікуреїзм: реабілітація ''насолоди'' (духовної радості).'
  - 'Концепція ''Епікур-Христос'': поєднання античної етики з християнською любов''ю.'
- section: 'Соціальний вимір: Суспільство як Машина'
  words: 450
  points:
  - Що стається, коли 'сродність' ігнорують?
  - Нещаслива людина на високій посаді — небезпека для держави.
  - Соціальна гармонія як результат того, що кожен є 'на своєму місці'.
- section: 'Деколонізація: Руйнування міфів'
  words: 500
  points:
  - 'Міф про ''селянського демократа'': чому Сковорода не боровся за соціальну рівність
    у радянському розумінні.'
  - 'Міф про ''російського філософа'': зв''язок з Києво-Могилянською академією та
    європейським бароко.'
  - Духовний аристократизм Сковороди.
- section: 'Практика: Сродність у XXI столітті'
  words: 500
  points:
  - 'Сучасна інтерпретація: ''сродна праця'' vs ''успішна кар''єра''.'
  - Японське поняття 'Ікіґаї' як паралель до української 'сродності'.
  - Волонтерство та громадянське суспільство як прояв колективної сродності.
- section: 'Підсумок: Світ ловив мене...'
  words: 400
  points:
  - Епітафія як маніфест перемоги над світом спокус.
  - Внутрішня свобода як найвища цінність.
  - Значення вчення Сковороди для формування української ментальності (кордоцентризм).
