slug: intro-to-ruth
title: Intro To Ruth
word_target: 5000
content_outline:
- section: 'Передмова: Вхід у спадщину'
  words: 300
  points:
  - Вітання студента в курсі RUTH (Ruthenian / Middle Ukrainian)
  - Значення періоду XIV-XVIII ст. для формування української нації
  - Поняття 'руська мова' vs 'російська мова' — розмежування
- section: 'Від давньоруської до руської: Великий перехід'
  words: 800
  points:
  - Геополітичні зміни після падіння Києва (1240) та входження до ВКЛ
  - 'Поняття диглосії: церковнослов''янська (сакральна) vs руська (ділова)'
  - Статус руської мови як державної у Великому князівстві Литовському
  - 'Три регістри: книжний, канцелярський, народно-розмовний'
- section: 'Первинний текст: Преамбула Литовського статуту (1529)'
  words: 800
  points:
  - 'Історичний контекст: Перший кодекс законів Східної Європи'
  - 'Аналіз оригінального тексту: ''Мы Жигимонт...'''
  - 'Лексичний розбір: ''панство'', ''вольности'', ''лист'', ''устава'''
  - Порівняння з сучасною українською юридичною термінологією
- section: 'Фонетичні зміни: Від давньоруської до руської'
  words: 800
  points:
  - 'Ікавізм як визначальна риса: перехід ''ять'' (ě) в ''і'' (віра, ліс)'
  - Занепад редукованих (єрів) та виникнення нових закритих складів
  - Закріплення повноголосся (-оро-, -оло-) як маркера ідентичності
  - Твердість приголосних перед 'е' та 'и'
- section: 'Морфологічні зміни: Народження нових форм'
  words: 800
  points:
  - Спрощення системи відмінювання іменників (зменшення типів)
  - 'Занепад двоїни: як ''дві руці'' стали ''дві руки'''
  - 'Розвиток майбутнього часу: від ''писати іму'' до ''писатиму'' і ''буду писати'''
  - Вплив розмовної стихії на дієслівні форми
- section: 'Польські запозичення: Вікно в Європу'
  words: 400
  points:
  - 'Історичні передумови: Кревська та Люблінська унії'
  - 'Лексика влади та права: ''рада'', ''уряд'', ''позов'', ''скарга'''
  - 'Військова та шляхетська термінологія: ''гетьман'', ''жовнір'', ''шабля'''
  - Полонізми як інструмент модернізації словника, а не лише асиміляції
- section: 'Латинські запозичення: Мова освіти'
  words: 400
  points:
  - Роль латини в освіті (Острозька та Києво-Могилянська академії)
  - 'Абстрактна та наукова лексика: ''матерія'', ''форма'', ''нація'''
  - Посередництво польської мови у засвоєнні латинізмів
  - Синтаксичні кальки з латини в барокових текстах
- section: 'Структура курсу: Чотири фази'
  words: 400
  points:
  - 'Фаза I: Канцелярська та правнича мова (Мова закону)'
  - 'Фаза II: Релігійна полеміка (Мова віри та аргументу)'
  - 'Фаза III: Козацькі літописи та документи (Мова держави)'
  - 'Фаза IV: Барокова література (Мова естетики та гри)'
- section: Практичні вправи
  words: 200
  points:
  - 'Огляд типів завдань у модулі: транскрипція, етимологія, аналіз'
  - Важливість роботи з першоджерелами
- section: 'Підсумок: Жива спадщина'
  words: 300
  points:
  - Руська мова як міст між Руссю та модерною Україною
  - Безперервність традиції попри політичні розломи
  - Запрошення до глибшого вивчення у наступних модулях
