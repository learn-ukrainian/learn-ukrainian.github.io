slug: velychko-ruin-baroque-1
title: 'Самійло Величко: I — Архіваріус Руїни — Метод, Джерела і Барокова Архітектура'
word_target: 5000
content_outline:
- section: 'Вступ: I — Біографія та історичний контекст'
  words: 500
  points:
  - 'Самійло Величко (бл. 1670 – після 1728): шлях від впливового канцеляриста Батурина
    до багаторічного ув''язнення.'
  - 'Спростування імперського міфу: чому Величко був свідомим мазепинцем і органічною
    частиною еліти Гетьманщини.'
  - 'Життя після звільнення (1715): осідання в Жуках і Диканьці як переломний момент
    для створення історичного шедевра.'
- section: 'Вступ: II — Архіваріус Руїни та бароковий метод'
  words: 500
  points:
  - 'Створення «Сказанія о войні козацькой...» у 1720-х роках: безпрецедентний за
    масштабом козацький літопис.'
  - 'Фізичний подвиг автора: втрата зору та диктування фундаментальної праці писарям.'
  - 'Загальний огляд барокового методу: чому історія тоді писалася не сухою мовою
    фактів, а як висока риторична поезія.'
- section: 'Основний матеріал: I — Козацький літопис як документальний архів'
  words: 600
  points:
  - 'Архів як зброя пам''яті: використання понад 260 реальних документів (універсали,
    угоди, міжнародні листування).'
  - Співвідношення обсягів (Величко проти Самовидця та Грабянки) і свідома мета створити
    доказову базу для самостійності козацько-руського народу.
  - 'Особливості інтеграції документів у текст: від прямого цитування до адаптації
    польських та латинських джерел.'
- section: 'Основний матеріал: II — Барокова архітектура та вставні промови'
  words: 600
  points:
  - 'Рамкова структура барокового тексту: як працюють пишні передмови, звернення до
    читача та посвяти.'
  - 'Використання genera declamationum (вставних промов): чому промови Хмельницького
    у Величка є літературною реконструкцією, а не стенограмою.'
  - 'Риторична функція цих промов: як Величко висловлював через них власні державотворчі
    ідеї та осмислював долю України.'
- section: 'Основний матеріал: III — Аналіз першоджерел та текстологія'
  words: 600
  points:
  - 'Аналіз знаменитого фрагмента про спустошене Правобережжя: «много костей чоловічеських,
    сухих і нагих».'
  - Роль іноземних хроністів (Пуфендорф) та козацьких щоденників (щоденник Самійла
    Зорки).
  - 'Як Величко працював з джерелами: верифікація інформації, сумніви та авторські
    коментарі на берегах історії.'
- section: 'Основний матеріал: IV — Концепція «Руїни» та ідея державної єдності'
  words: 600
  points:
  - 'Формування концепту «Руїни»: не лише як періоду воєн, а як стану суспільного
    розпаду та «високоумної гордині» старшини.'
  - 'Деколонізаційний аспект: російська наука бачила в Руїні доказ нездатності до
    державності, Величко ж бачив у ній трагічний урок про ціну втрати єдності («самі
    себе звоювали»).'
  - 'Провіденціалізм автора: Божа кара за гріхи розбрату та риторичний жанр «національного
    плачу».'
- section: 'Основний матеріал: V — Мова Величка та граматичний фокус'
  words: 500
  points:
  - 'Книжна українська мова ранньомодерної доби: синкретизм «простої мови», церковнослов''янізмів
    та полонізмів.'
  - Бароковий «великий період» — складний, заплутаний, орнаментований синтаксис як
    ознака високого стилю.
  - 'Граматичні та лексичні особливості текстів Величка: підготовка до мовної практики.'
- section: 'Практика: I — Робота з історичними документами'
  words: 400
  points:
  - Завдання на ідентифікацію барокових стилістичних фігур у цитатах Величка.
  - 'Аналіз уривків з літопису: розрізнення документальної основи та літературного
    вимислу.'
  - Етимологічний аналіз ключових концептів тексту.
- section: 'Практика: II — Граматична лабораторія та стилістика'
  words: 400
  points:
  - 'Порівняльно-стилістичні вправи: переклад барокового синтаксису на сучасну українську
    мову.'
  - Граматичний розбір архаїчних форм та латинізмів/полонізмів, характерних для канцелярського
    стилю Гетьманщини.
- section: 'Підсумок: Спадщина Самійла Величка'
  words: 300
  points:
  - Значення Літопису Величка як наріжного каменю української національної пам'яті
    XVIII–XIX століть.
  - Вплив монументальної праці на Тараса Шевченка та романтичне покоління будівничих
    нації.
  - 'Перекидання містка до наступної теми модуля: подальший розвиток та еволюція Козацького
    Слова.'
