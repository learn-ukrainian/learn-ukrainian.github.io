slug: velychko-ruin-baroque-1
title: "Самійло Величко: I — Архіваріус Руїни — Метод, Джерела і Барокова Архітектура"
word_target: 5000
content_outline:
- section: 'Вступ: Величко — вершина козацького літописання'
  words: 600
  points:
  - 'Самійло Величко (бл. 1670–після 1728): від канцеляриста Кочубея до добровільного вигнанця — людина з архівом у руках.'
  - '"Сказаніє о войні козацькой..." (4 томи, 1720-і рр.): найбільший за обсягом козацький літопис — що означало написати таке в умовах ліквідації Гетьманщини?'
  - 'Порівняння масштабів: Самовидець — 150 сторінок, Грабянка — 300, Величко — понад 2000 — чому таке зростання?'
- section: 'Основний матеріал: I — Джерела Величка: Архів як метод'
  words: 800
  points:
  - '"Архіваріус на службі пам''яті": Величко систематично збирав документи — листи, договори, промови — і вставляв їх у текст.'
  - 'Документальний апарат: що саме цитує Величко (реальні документи чи реконструкції) — і як це перевірити?'
  - "Польськомовні джерела в Величку: де він перекладає польські тексти і де адаптує — білінгвальна практика."
- section: 'Основний матеріал: II — Барокова архітектура тексту'
  words: 900
  points:
  - '"Рамкова структура": що таке вступ, передмова і посвята у Величка — як він будує читацьку установку.'
  - 'Вставні промови (genera declamationum): де Величко вкладає розгорнуті ораторські виступи в уста Хмельницького і Виговського?'
  - "Аналіз синтаксичної складності: один 'Великий абзац' Величка — читаємо, розбираємо, перекладаємо."
- section: 'Основний матеріал: III — Мова Величка: Висока барокова норма'
  words: 900
  points:
  - 'Церковнослов''янізми і «проста мова»: де вони зустрічаються і де конкурують у Величка.'
  - 'Латинські і польські вставки: функція іншомовних цитат у тексті — що вони говорять про автора і його аудиторію.'
  - 'Лексика чиновника і лексика поета: вертикальне розшарування стилю у Величка.'
- section: 'Основний матеріал: IV — Концепція «Руїни» у Величка'
  words: 700
  points:
  - '"Руїна" не лише як термін, а як культурна концепція: де Величко теоретизує про причини занепаду і хто винен?'
  - 'Провіденціалізм Величка: де Божа воля пояснює поразки — і де це риторична позиція, а де — щира віра?'
  - '"Плач" як риторичний жанр: де Величко стає голосом нації, що оплакує себе.'
- section: 'Підсумок'
  words: 300
  points:
  - Архівний метод Величка як передтеча сучасної документальної прози — пряма лінія від "Сказанія" до Вакуленка.
  - Барокова складність як мовна школа — чому читати Величка важко, але важливо для розуміння руської культурної мови.
  - "Зв'язок з наступним модулем: читаємо ключові пасажі разом."
