slug: divine-songs
title: Divine Songs
word_target: 5000
content_outline:
- section: Вступ
  words: 400
  points:
  - 'Григорій Сковорода: мандрівний філософ, поет, музикант'
  - Місце 'Саду божественних пісень' у творчому доробку (Коврайський період)
  - Зв'язок філософії (ratio) та музики (harmonia) у світогляді бароко
- section: 'Основний матеріал: I — ''Сад божественних пісень'': Архітектура барокового
    циклу'
  words: 1400
  points:
  - 'Структура збірки: 30 пісень та їхні біблійні ''зерна'' (епіграфи)'
  - 'Символіка Саду (Vertograd): біблійний Едем vs. філософський прихисток'
  - 'Ключові теми: втеча від ''світу'', ''сродна праця'', душевний мир'
  - 'Пісня 10 (''Всякому городу нрав і права''): сатира на марноту світського життя'
  - 'Барокова стилістика: антитези, емблематика, алегорії'
- section: 'Основний матеріал: II — ''De Libertate'': Поетика свободи та силабо-тонічний
    злам'
  words: 1400
  points:
  - '''De Libertate'' як зразок громадянської лірики (ода)'
  - 'Метрична революція: перехід від силабіки до силабо-тоніки (дактиль/анапест)'
  - 'Аналіз тексту: ''Що є свобода?'' — свобода як абсолютна цінність вища за золото'
  - 'Образ Богдана Хмельницького: ''Вольності отець'' (деколонізаційний погляд на
    роль гетьмана)'
  - 'Порівняння з тогочасними панегіриками: щирість vs. офіціоз'
- section: 'Основний матеріал: III — Музичний вимір: Кант, хорал і кобзарська традиція'
  words: 1200
  points:
  - 'Жанр канту в українському бароко: триголосся, синтез книжного та народнопісенного'
  - 'Сковорода як композитор: втрачені ноти та збережена усна традиція'
  - 'Музичні інструменти Сковороди: флейта, скрипка, бандура'
  - 'Рецепція пісень: перехід у фольклор (сліпі лірники як носії сковородинського
    слова)'
- section: 'Практика: Майстерня барокового аналізу'
  words: 300
  points:
  - 'Крок за кроком: визначаємо віршовий розмір ''De Libertate'' (схема наголосів)'
  - 'Герменевтика тексту: розшифровка алегорій 10-ї пісні'
- section: Підсумок
  words: 300
  points:
  - 'Спадщина ''Саду'': від Івана Котляревського (''Наталка Полтавка'') до сучасності'
  - Сковорода як символ інтелектуальної незалежності та європейського коду України
