slug: chronicle-lab
title: Chronicle Lab
word_target: 5000
content_outline:
- section: 'Вступ: Феномен козацького літописання'
  words: 600
  points:
  - Козацькі літописи як синтез історії та літератури бароко.
  - 'Хто були автори: козацька старшина, канцеляристи, інтелектуали.'
  - 'Відмінність від давньоруських літописів: авторська позиція та світський характер.'
- section: 'Частина I — Літопис Самовидця: Прагматика очевидця'
  words: 800
  points:
  - Роман Ракушка-Романовський — ймовірний автор.
  - 'Стиль: лаконічність, фактографічність, «суха» оповідь.'
  - 'Аналіз уривка «Початок і причина войни»: соціальні та релігійні мотиви.'
  - 'Мова: наближена до народної, але з полонізмами.'
- section: 'Частина II — Літопис Григорія Граб''янки: Героїчний епос'
  words: 800
  points:
  - 'Тема: прославляння Богдана Хмельницького та козацької звитяги.'
  - 'Джерела: використання західних хронік (Пуфендорф, Стрийковський).'
  - 'Стиль: патетика, складний синтаксис, емоційність.'
  - 'Аналіз уривка: опис битв або портрет гетьмана.'
- section: 'Частина III — Літопис Самійла Величка: Барокова монументальність'
  words: 1000
  points:
  - Найвеличніша пам'ятка українського бароко.
  - 'Структура: 4 томи, включення документів, віршів, портретів.'
  - 'Концепція «Руїни»: трагічне сприйняття розбрату.'
  - 'Стилістичний аналіз: нагромадження епітетів, риторичні запитання, біблійні алюзії.'
- section: 'Лабораторія стилю: Деконструкція барокового тексту'
  words: 800
  points:
  - 'Формула літопису: дата («Року Божого...») + подія + моральна оцінка.'
  - 'Риторичні фігури: гіпербола, метафора, антитеза.'
  - 'Топоси: «золота вольність», «лядська неволя», «Божа кара».'
- section: 'Практикум: Літопис сучасності (2022–...)'
  words: 600
  points:
  - 'Завдання: опис оборони Києва або звільнення Херсона бароковим стилем.'
  - 'Словник: адаптація сучасної термінології (танк — «залізна колісниця», дрон —
    «небесний птах»).'
  - 'Провіденціалізм у сучасному контексті: віра в перемогу як Божу волю.'
- section: 'Підсумок: Спадщина козацьких літописів'
  words: 400
  points:
  - Вплив на формування національної ідентичності (Історія Русів, Шевченко).
  - Літописи як доказ тяглості української державності.
  - Значення для сучасної літератури та культури.
