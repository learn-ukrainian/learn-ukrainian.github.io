slug: syntax-complex
title: Syntax Complex
word_target: 5000
content_outline:
- section: 'Вступ: Архітектура барокової думки'
  words: 400
  points:
  - 'Синтаксис як дзеркало мислення епохи Бароко: складність, прикрашеність, ієрархія.'
  - 'Риторика як основа освіти: вміння будувати ''періоди'' як ознака вчености.'
  - 'Огляд джерел: від ''Грамматіки'' Смотрицького до полемічних трактатів.'
- section: 'Основний матеріал: I — Граматичний канон Мелетія Смотрицького'
  words: 800
  points:
  - Значення 'Грамматіки' (1619) для кодифікації синтаксису.
  - 'Визначення синтаксису за Смотрицьким: ''счиненіє'' частин мови.'
  - 'Класифікація речень: прості та складні (''союзи'' як інструмент зв''язку).'
  - Вплив грецьких граматик (Ласкаріс) на термінологію та структуру опису.
- section: 'Основний матеріал: II — Грецький вплив: Гіпотаксис і підрядність'
  words: 800
  points:
  - Домінування гіпотаксису (підрядності) у високому стилі.
  - Роль сполучників причини та наслідку (понеже, ібо, яко, да).
  - Дієприкметникові звороти як засіб конденсації думки (вплив грецьких конструкцій).
  - 'Давальний самостійний: архаїзм чи стилістична фігура?'
- section: 'Основний матеріал: III — Латинський вплив: Риторичний період'
  words: 600
  points:
  - 'Структура риторичного періоду: протасис (напруга) і аподосис (розв''язка).'
  - 'Порядок слів: інверсія та постпозиція присудка (вплив латини/польської).'
  - 'Ритмічна організація прози: ''плел словес'' як естетичний принцип.'
- section: 'Основний матеріал: IV — Жива мова і полемічна пристрасть'
  words: 600
  points:
  - Взаємодія книжних норм і 'простої мови' у полемістів.
  - 'Емоційний синтаксис Івана Вишенського: нагромадження, повтори, риторичні питання.'
  - Порушення книжних норм заради експресії.
- section: 'Основний матеріал: V — Аналіз тексту: Послання до Василя Острозького'
  words: 800
  points:
  - Розбір конкретного уривка з твору Вишенського.
  - Ідентифікація грецьких та латинських впливів у тексті.
  - Аналіз логічної структури складного речення.
- section: 'Практика: I — Синтаксичний аналіз джерел'
  words: 500
  points:
  - 'Вправа: Знайти межі протасису та аподосису в бароковому тексті.'
  - 'Вправа: Визначити тип підрядного зв''язку та сполучники.'
  - 'Вправа: Розпізнати ''дальний самостійний'' та перекласти його сучасною мовою.'
- section: 'Практика: II — Творення і реконструкція'
  words: 500
  points:
  - 'Вправа: Побудувати риторичний період на задану тему (стилізація).'
  - 'Вправа: Перетворити ряд простих речень у складне з підрядністю (за зразком Смотрицького).'
  - 'Вправа: Відредагувати ''просте'' речення, надавши йому барокової пишності.'
- section: 'Підсумок: Синтез традицій'
  words: 400
  points:
  - Український бароковий синтаксис як синтез візантійської та латинської традицій.
  - Спадщина Смотрицького і Вишенського у формуванні літературної мови.
  - 'Зв''язок із сучасним українським синтаксисом: що ми зберегли, а що втратили.'
