slug: berynda-leksykon
title: Berynda Leksykon
word_target: 5000
content_outline:
- section: 'Вступ: Життєвий шлях Памва Беринди'
  words: 600
  points:
  - Світське та чернече життя діяча (бл. 1550 – 1632), походження з Галичини.
  - Робота у друкарнях Стрятина і Крилоса, переїзд до Києво-Печерської лаври у 1616
    році.
  - Статус архітипографа та активна участь у вченому гуртку Єлисея Плетенецького.
- section: 'Вступ: Контекст створення Лексикона'
  words: 600
  points:
  - Прірва між сакральною церковнослов'янською мовою та живою розмовною мовою вірян.
  - Загроза полонізації та окатоличення як головний виклик епохи.
  - Поняття «простої мови» як тогочасної української літературної норми, якою здійснювався
    переклад.
- section: 'Основний матеріал: Структура та методологія словника'
  words: 800
  points:
  - 'Масштаб праці: понад 25 років збору матеріалів, майже 7000 словникових статей.'
  - 'Двочастинна структура: «Лексіконъ» (загальна лексика) та «Имена свойственная»
    (тлумачення власних назв).'
  - 'Інноваційна для XVII ст. методологія укладання гасел: від алфавітного порядку
    до розлогих пояснень.'
- section: 'Основний матеріал: Синонімія та жива лексика'
  words: 800
  points:
  - Багатство українських синонімів для передачі одного церковнослов'янського поняття.
  - Фіксація діалектних розбіжностей та багатства народної мови.
  - 'Спеціалізована лексика: ботанічні («боденец — шипшина»), медичні та побутові
    терміни.'
- section: 'Практика: Аналіз словникових статей'
  words: 700
  points:
  - Розбір конкретних прикладів перекладу зі словника (фіксація слів «фарба», «вдячен»,
    «справа»).
  - Робота з реєстровими словами та способами їх тлумачення.
  - Як Лексикон відображає тогочасну картину світу, побут та менталітет.
- section: 'Практика: Етимологічний слід у сучасності'
  words: 700
  points:
  - Українські слова з Лексикона Беринди, які дійшли до сучасної мови без жодних змін.
  - Втрачені (архаїзовані) лексеми та історичні причини їх зникнення.
  - Простеження мовної тяглості від 1627 року до сучасного етапу розвитку мови.
- section: 'Підсумок: Лексикографічна спадщина'
  words: 400
  points:
  - Фундаментальне значення «Лексикона» для наступних поколінь лексикографів.
  - Вплив праці Беринди на українську, білоруську, румунську та російську традиції
    (видання 1653 р.).
- section: 'Підсумок: Лексикон як портрет мови XVII століття'
  words: 400
  points:
  - Усвідомлення праці як потужного культурного акту збереження національної ідентичності.
  - Значення словника як унікальної «капсули часу» для вивчення історії української
    мови.
