slug: smotrytsky-grammar-intro
title: Smotrytsky Grammar Intro
word_target: 5000
content_outline:
- section: 'Вступ: Граматика як зброя'
  words: 400
  points:
  - 'Історичний контекст 1619 року: полеміка та освітня реформа братств'
  - Мова як інструмент ідентичності у боротьбі з єзуїтською експансією
  - Значення кодифікації для розвитку ранньомодерної нації
- section: 'Основний матеріал: I — Мелетій Смотрицький: шлях вченого'
  words: 800
  points:
  - 'Біографічний нарис: від Острога до Віленського братства'
  - Західна освіта (Лейпциг, Віттенберг) та синтез традицій
  - «Тренос» (1610) як предтеча філологічної праці
  - Роль Смотрицького у Віленському братстві та викладання
- section: 'Основний матеріал: II — Архітектура «Граматики» (1619)'
  words: 800
  points:
  - 'Чотиричастинна структура: Орфографія, Етимологія, Синтаксис, Просодія'
  - Визначення граматики як «художества благо глаголати»
  - 'Орфографічні реформи: легалізація літери Ґ та впорядкування наголосів'
  - 'Вісім частин мови: відмова від артикля та виділення дієприслівника'
- section: 'Основний матеріал: III — Просодія: антична мрія та силабічна реальність'
  words: 800
  points:
  - Спроба впровадження квантитативного (античного) віршування
  - Теорія довгих і коротких складів на слов'янському ґрунті
  - 'Чому антична модель не прижилася: перемога силабіки'
  - Значення просодичних експериментів для барокової поетики
- section: 'Основний матеріал: IV — Синтаксис: мистецтво «словесного сочиненія»'
  words: 800
  points:
  - Перша систематична розробка синтаксису у східних слов'ян
  - 'Правила узгодження та керування: вплив греко-латинських взірців'
  - Пунктуація як засіб логічного членування тексту
  - Синтаксис як інструмент побудови складних барокових смислів
- section: 'Основний матеріал: V — Кодифікація та «словенороська» мова'
  words: 800
  points:
  - Українська редакція церковнослов'янської мови як норма
  - Розмежування «словенської» (церковної) та «руської» (живої) мов
  - Вплив живої української мови на кодифікацію (вимова, лексика)
  - 'Міжнародний резонанс: рецепція у Сербії, Румунії та Московії'
- section: 'Практика: Робота з першоджерелом'
  words: 600
  points:
  - 'Аналіз «Предисловія»: риторичні стратегії автора'
  - Читання фрагментів про літеру Ґ та правила наголошування
  - Порівняння термінології Смотрицького з сучасною українською
- section: 'Підсумок: Фундамент могилянської доби'
  words: 400
  points:
  - «Граматика» як підручник поколінь (150 років використання)
  - Вплив на реформи Никона та парадокс російського засвоєння
  - Мелетій Смотрицький як творець українського наукового дискурсу
