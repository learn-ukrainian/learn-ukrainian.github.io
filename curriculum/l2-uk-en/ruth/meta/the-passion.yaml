slug: the-passion
title: The Passion
word_target: 5000
content_outline:
- section: 'Вступ: Театр Страстей і дух бароко'
  words: 400
  points:
  - 'Бароко як епоха контрастів: земне і небесне, страждання і тріумф.'
  - Роль шкільного театру у вихованні та публічному житті.
  - 'Великодній цикл (Passio) як центральна тема драми: від літургії до сцени.'
  - 'Специфіка українського барокового світовідчуття: емоційна напруга та екзистенційний
    неспокій.'
- section: 'Основний матеріал: I — «Слово о збуреню пекла»'
  words: 1000
  points:
  - 'Анонімний шедевр середини XVII століття: сюжет та композиція.'
  - 'Образи пекельних сил: Люципер та Ад як драматичні персонажі, а не лише символи.'
  - 'Аналіз уривка: Діалог про прихід Христа (страх пекла перед Світлом).'
  - 'Мовні особливості: поєднання церковнослов''янської патетики з живою розмовною
    фразеологією.'
  - Тема 'збурення пекла' (Harrowing of Hell) у європейському контексті.
- section: 'Основний матеріал: II — Йоаникій Волкович і львівська драма'
  words: 900
  points:
  - 'Львівське братство як осередок культури: контекст 1630-х років.'
  - '«Розмышлян[н]є о муцЂ Христа» (1631): структура та алегоризм.'
  - Постаті алегорій (Милість, Істина) та їх роль у розкритті богословського змісту.
  - 'Емоційний стиль (Pathos): як автор змушує глядача співпереживати стражданням.'
  - Вплив західної містерії на українську ґрунті.
- section: 'Основний матеріал: III — Полонізми в діловій мові (Legal Terms)'
  words: 1000
  points:
  - 'Руська мова в адміністративній системі Речі Посполитої: статус і функції.'
  - 'Механізм запозичення: чому польські юридичні терміни витісняли давньоруські.'
  - 'Ключові лексеми: ''справа'' (sprawa), ''вирок'' (wyrok), ''позов'' (pozew).'
  - 'Терміни соціальної структури та спорідненості: ''кревний'', ''обиватель'', ''шляхетний''.'
  - 'Адаптація запозичень: як чужі слова набували українських граматичних ознак.'
- section: 'Основний матеріал: IV — Судовий лексикон у драматичному наративі'
  words: 1000
  points:
  - Суд над Христом як 'юридичний прецедент' у бароковій свідомості.
  - Використання офіційно-ділової лексики для надання достовірності біблійним сюжетам.
  - Аналіз термінів 'слушний', 'певний', 'касувати' у контексті діалогів.
  - Слово 'аліяш' (alias) та ідентифікація особи в документах епохи.
  - Контраст між 'Божим судом' та 'людським судом' через призму лексики.
- section: 'Практика: Аналіз текстів'
  words: 300
  points:
  - Порівняльний аналіз уривка з драми та актового документа того ж періоду.
  - Ідентифікація полонізмів у запропонованому тексті.
  - Завдання на реконструкцію значення архаїчних юридичних термінів.
- section: 'Підсумок: Спадщина шкільної драми'
  words: 400
  points:
  - Значення великодньої драми для розвитку української літературної мови.
  - Інтеграція західних впливів без втрати національної ідентичності.
  - Роль правничої термінології у формуванні модерного словника.
  - 'Перехід від бароко до просвітництва: що залишилося у спадок.'
