slug: baroque-letters
title: Baroque Letters
word_target: 5000
content_outline:
- section: Вступ
  words: 400
  points:
  - 'Листування в добу Бароко: більше ніж передача інформації, це літературний акт'
  - Вплив риторик Києво-Могилянської академії на структуру листа (Salutatio, Narratio,
    Conclusio)
  - Роль канцелярії Війська Запорозького у формуванні літературної мови
- section: 'Основний матеріал: Дипломатія Хмельницького'
  words: 1400
  points:
  - 'Лист до Владислава IV (1648): риторика «вірних підданих» та легітимізація повстання'
  - 'Аналіз аргументації: протиставлення «доброго короля» і «злих старост»'
  - 'Стилістичні особливості: поєднання військової прямоти та дипломатичного етикету'
  - 'Мовний аналіз: канцеляризми («чолом бити») та живі народні звороти («шию зламати»)'
- section: 'Основний матеріал: Листи Мазепи'
  words: 1200
  points:
  - 'Приватне обличчя Гетьмана: листи до Мотрі Кочубеївни як зразок інтимної лірики'
  - 'Естетика Високого Бароко: метафоричність («квіте рожаний»), емоційна експресія'
  - 'Контраст із канцелярією Хмельницького: галантність та куртуазність'
  - Психологічний портрет автора крізь призму тексту
- section: 'Основний матеріал: Риторика і стиль'
  words: 1400
  points:
  - Староукраїнська книжна мова (Ruthenian) як основа епістолярію
  - 'Макаронізми: функція латинських та польських вкраплень у тексті'
  - 'Синтаксис барокового листа: період, ускладнені конструкції, нагромадження епітетів'
  - 'Етикетні формули: як зверталися до рівних, вищих і підлеглих'
- section: Практика
  words: 200
  points:
  - Підготовка до аналізу першоджерел
  - Завдання на порівняння стилів Хмельницького та Мазепи
- section: Підсумок
  words: 400
  points:
  - 'Еволюція жанру: від військової канцелярії до вишуканої літератури'
  - Значення листів для реконструкції живої мови XVII-XVIII ст.
  - Листування як інструмент української суб'єктності в Європі
