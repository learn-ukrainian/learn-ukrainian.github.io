slug: chancery-formulae-dating
title: Chancery Formulae Dating
word_target: 5000
content_outline:
- section: 'Вступ: Час і простір документа'
  words: 500
  points:
  - 'Дипломатика як наука про документ: чому дата і місце — це ''паспорт'' акту.'
  - 'Роль писаря (канцеляриста) у ВКЛ: відповідальність за точність хронології.'
  - Руська мова як інструмент фіксації правової реальності XIV-XVI ст.
- section: 'Анатомія дати: Року Божого...'
  words: 1200
  points:
  - 'Ера ''від Різдва Христового'' (Anno Domini) vs ''від створення світу'': специфіка
    ВКЛ на відміну від Московської держави.'
  - 'Структура формули: ''Року...'', ''Місяця...'', ''Дня...''.'
  - 'Кирилична цифір: як читати букви-числа під титлами (аз=1, і=10, р=100).'
  - 'Назви місяців: співіснування народних (січень, лютий) та латинізованих форм (януарій,
    фебруарій).'
- section: 'Візантійський спадок: Індикт і пасхалії'
  words: 1000
  points:
  - 'Що таке індикт: 15-річний фіскальний цикл, успадкований від Візантії.'
  - 'Математика писаря: як вирахувати рік, маючи лише індикт (формула).'
  - 'Коло Сонця (28 років) і Коло Місяця (19 років): астрономія в канцелярії.'
  - 'Приклад із грамоти Казимира IV: ''индикъта третегонадцять''.'
- section: 'Географія влади: Формула місця ''Писан у...'''
  words: 1000
  points:
  - 'Клаузула місця (Datum/Actum): юридична прив''язка до території.'
  - '''Писан у Вільні'': столиця як головний центр видання грамот.'
  - 'Мандрівна канцелярія: чому документи видавалися в Гродно, Бересті чи Києві.'
  - 'Руська топоніміка в офіційних актах: збереження автентичних назв.'
- section: 'Палеографічний практикум: Читаємо оригінал'
  words: 800
  points:
  - 'Скоропис XVI століття: особливості написання літер і виносних елементів.'
  - Типові скорочення у датах (р. б. = року божого).
  - Вправа на реконструкцію пошкодженої дати (логічний метод).
  - 'Аналіз матеріалу: папір з філігранями як додатковий засіб датування.'
- section: 'Підсумок: Документ як свідок епохи'
  words: 500
  points:
  - Точність як ознака правової культури ВКЛ.
  - 'Виклики кінця XVI ст.: григоріанський календар і конфесійна полеміка.'
  - Датування як мистецтво і наука руських канцеляристів.
