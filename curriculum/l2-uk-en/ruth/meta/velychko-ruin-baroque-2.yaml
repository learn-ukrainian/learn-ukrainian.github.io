slug: velychko-ruin-baroque-2
title: "Самійло Величко: II — Голоси Доби — Читаємо Ключові Пасажі Разом"
word_target: 5000
content_outline:
- section: 'Вступ: Від аналізу — до читання'
  words: 400
  points:
  - "Цей модуль — практичний: ми читаємо оригінальний текст Величка і розбираємо кожну складність крок за кроком."
  - "Три типи завдань: лексичний аналіз, синтаксичний розбір, стилістичне тлумачення."
  - "Принцип повільного читання (close reading): краще прочитати одну сторінку глибоко, ніж двадцять поверхово."
- section: 'Основний матеріал: I — Передмова Величка: Читаємо Авторський Голос'
  words: 800
  points:
  - 'Транскрипція фрагменту передмови: текст мовою оригіналу з мінімальними виносками.'
  - 'Лексичний коментар: 10–15 ключових слів з поясненням і сучасним відповідником.'
  - 'Риторичний аналіз: з якою "позицією" Величко звертається до читача — смирення, впевненість, пафос?'
- section: 'Основний матеріал: II — Опис Берестецької битви (1651)'
  words: 900
  points:
  - "Оригінальний пасаж: батальний опис з Величка — один з найбільш 'кінематографічних' у тексті."
  - 'Синтаксичний розбір: виділяємо головні і другорядні члени речення у бароковому "ланцюжку" залежних клауз.'
  - 'Стилістика: де Величко зупиняється на деталі (зброя, звуки, колір) і що це означає для загального смислу тексту?'
- section: 'Основний матеріал: III — Промова Хмельницького: Вставний жанр'
  words: 900
  points:
  - "«Слово» Хмельницького до козацтва: як виглядає реконструйована промова всередині хронікального тексту."
  - 'Читаємо промову в ролях: де риторика "нагнітання" і де — "заспокоєння" — два тони одного ораторського акту.'
  - 'Питання автентичності: що з цієї промови — справжнє і що — Величкова реконструкція, і чому це не применшує значення?'
- section: 'Основний матеріал: IV — Оплакування Руїни: Ліричний фінал'
  words: 900
  points:
  - "«Плач» Величка над занепадом козацтва: фрагмент близький до риторичної поезії."
  - 'Порівняння з «Словом о полку Ігоревім»: де Величко свідомо апелює до давнішої «плачевної» традиції.'
  - '"Руїна" і "відбудова": де Величко переходить від елегії до надії — де текст закінчується і де читач продовжує.'
- section: 'Основний матеріал: V — Мова у дзеркалі: Порівняння трьох хронік'
  words: 600
  points:
  - 'Таблиця порівняння: Самовидець, Грабянка, Величко про ту саму подію (н-д, Корсунська битва) — три стилі поруч.'
  - 'Виявляємо відмінності: де лексика, де синтаксис, де риторична позиція відрізняються.'
  - 'Висновок: три автори, три читацьких аудиторії, три наративні цілі — як стиль відображає намір.'
- section: 'Підсумок'
  words: 300
  points:
  - 'Що студент здобуває після двох модулів про Величка: здатність читати складний бароковий текст без словника.'
  - Козацьке літописання як живий корпус: де його читають і де він впливає на сучасну культуру.
  - "Зв'язок з LIT-DOC: «chronicles-as-testimony» — де документальна традиція Величка дає початок сучасному жанру."
