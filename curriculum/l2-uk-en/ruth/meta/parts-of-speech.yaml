slug: parts-of-speech
title: Parts Of Speech
word_target: 5000
content_outline:
- section: 'Вступ: Граматика як ключ до мудрості'
  words: 400
  points:
  - Роль граматики в системі 'семи вільних мистецтв' (Trivium) у братських школах.
  - 'Контекст полеміки: необхідність кодифікації мови для захисту ідентичності.'
  - Львівський 'Адельфотес' (1591) як предтеча систематичних граматик.
- section: 'Архітектори слова: Зизаній та Смотрицький'
  words: 600
  points:
  - 'Лаврентій Зизаній (1596): перша спроба, введення орудного відмінка (''орудноє'').'
  - 'Мелетій Смотрицький (1619): наукова вершина, структура ''Синтагми''.'
  - 'Порівняння підходів: від 10 відмін Зизанія до 5 відмін Смотрицького.'
  - Вплив західноєвропейської латинської та грецької традиції (Альвар, Ласкаріс).
- section: 'Частини мови: Класифікація 1619 року'
  words: 600
  points:
  - 'Вісім частин мови за Смотрицьким: Ім''я, Містоимениє, Глагол, Причастиє, Нарічиє,
    Предлог, Союз, Междометиє.'
  - 'Революційний крок: відмова від артикля (''различіє''), невластивого слов''янським
    мовам.'
  - Виділення вигуку як самостійної частини мови.
  - Чітке розмежування змінних (склоняємия) та незмінних (несклоняємия) частин.
- section: 'Ім''я (Nomen): Категорії роду та числа'
  words: 700
  points:
  - 'Визначення Імені: ''часть слова склоняємая, тєло или вєщ... знамєнующая''.'
  - 'Категорія роду (Родъ): мужскій, женскій, средній (і ''общій'' у Зизанія).'
  - 'Категорія числа (Число): єдинственноє, множественноє і двоїна (двойственноє).'
  - Двоїна як жива категорія в староукраїнській мові (дві руці, дві нозі).
- section: 'Система відмін (Склоненія): Парадигма Смотрицького'
  words: 800
  points:
  - П'ять відмін (склоненій) — основа сучасної класифікації.
  - 'Перша відміна: іменники на -а, -я (владика, земля).'
  - 'Друга відміна: іменники на приголосний та -о, -е (домъ, слово).'
  - 'Третя, четверта і п''ята відміни: специфіка розподілу за основами.'
  - 'Синкретизм типів основ: перехід від праслов''янських детермінативів до родових
    закінчень.'
- section: 'Відмінкова система: Тріумф живого слова'
  words: 700
  points:
  - Сім відмінків (падежів), включно з Кличним (зватєлний) та Орудним (творитєлний).
  - 'Давальний відмінок: легітимізація закінчень -ові/-еві (Богові, Духові) — суто
    українська риса.'
  - 'Місцевий відмінок: варіанти закінчень і прийменникова керування.'
  - 'Вплив живої мови на книжну норму: як ''народні'' форми ставали правилом.'
- section: 'Спадщина: Від Вільно до Москви'
  words: 600
  points:
  - 'Рецепція граматики Смотрицького в Московії (видання 1648 р.): адаптація та цензура.'
  - Українська вимова (ікавізм, г проривне) як літургійна норма XVII-XVIII ст.
  - Вплив на граматику Ломоносова та становлення славістики.
  - Іван Ужевич і його 'Grammatica sclavonica' (1643) — альтернативний погляд на 'просту
    мову'.
- section: 'Підсумок: Граматика як фундамент нації'
  words: 400
  points:
  - Значення кодифікації для збереження культурної самостійності.
  - 'Тяглість граматичної термінології: від Зизанія до сучасності.'
  - Смотрицький як творець наукового стилю української мови.
