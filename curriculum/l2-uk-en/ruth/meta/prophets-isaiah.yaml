slug: prophets-isaiah
title: Prophets Isaiah
word_target: 5000
content_outline:
- section: 'Вступ: Пророк-Поет та його книга'
  words: 600
  points:
  - 'Постать Ісаї: аристократ, радник царів, викривач соціального зла.'
  - Структура книги (66 розділів) та її значення як «П'ятого Євангелія».
  - 'Рецепція пророка в руській (давньоукраїнській) культурі: від Київської Русі до
    Острога.'
- section: 'Текстологія: Острозька Біблія (1581)'
  words: 1100
  points:
  - 'Острозький проєкт як цивілізаційна відповідь Заходу: чому обрали Септуагінту
    (LXX).'
  - 'Джерельна база перекладу Ісаї: грецькі манускрипти vs Вульгата.'
  - 'Деколонізаційний аспект: Острозька Біблія як матір «московських» видань (1663,
    1751).'
  - Порівняння з іншими перекладами XVI ст. (Франциск Скорина, Берестейська Біблія).
- section: 'Мовна тканина: Еллінізми та високий стиль'
  words: 1100
  points:
  - 'Феномен «мови слов''янської» Острозької редакції: орієнтація на грецький синтаксис.'
  - Калькування (calques) як метод сакралізації тексту.
  - 'Лексичний аналіз ключових термінів: як перекладали «Месія», «Діва», «Слуга Господній».'
  - 'Проблема зрозумілості: напруга між елітарним текстом і народною мовою.'
- section: 'Риторика: Полемічний меч українського бароко'
  words: 1100
  points:
  - 'Іван Вишенський як «новий Ісая»: запозичення риторичних фігур (інвектива, прокляття).'
  - 'Соціальна критика: використання цитат Ісаї (Іс. 5:8) проти земельної шляхти та
    єпископів.'
  - 'Барокова екзегеза: алегоричне тлумачення пророцтв у полеміці з католиками.'
- section: 'Спадщина: Від бароко до Шевченка'
  words: 1100
  points:
  - Трансформація образу пророка в літературі XVIII ст. (Сковорода).
  - '«Ісаія. Глава 35» Тараса Шевченка: пророцтво про вільну Україну.'
  - 'Повернення до джерел: переклад Рафаїла Турконяка (2006) та сучасна рецепція.'
  - 'Підсумок: Книга Ісаї як наскрізний текст української духовної історії.'
