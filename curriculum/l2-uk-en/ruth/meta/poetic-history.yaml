slug: poetic-history
title: Poetic History
word_target: 5000
content_outline:
- section: 'Вступ: Поезія як історичний документ'
  words: 400
  points:
  - Феномен віршованих вставок у козацьких літописах як ознака високої барокової культури.
  - 'Відмінність від сучасного розуміння історії: історія як ''Teatrum'', де події
    потребують естетичного осмислення.'
  - Роль Києво-Могилянської академії у формуванні поетів-літописців.
- section: 'Основний матеріал: Витоки та ''Вірші'' Саковича'
  words: 600
  points:
  - Касіян Сакович і його 'Вірші на жалісний погреб...' (1622) як прототип віршованої
    історії.
  - Легітимізація козацтва як лицарського стану ('miles') через поетичне слово.
  - 'Аналіз уривка про герб Війська Запорозького: козак з мушкетом як символ вольності.'
  - Поєднання панегірика (похвали) та історіографії (опис походів).
- section: 'Основний матеріал: Епос Граб''янки'
  words: 800
  points:
  - Літопис Григорія Граб'янки (1710-ті) як вершина ідеологічної поезії.
  - 'Аналіз ''Похвали віршами Хмельницькому'': творення образу Гетьмана-Мойсея.'
  - 'Термін ''руський'' у Граб''янки: чітке ототожнення з Україною та протиставлення
    ''Московії''.'
  - 'Вірш ''На герб Малоросійський'': поетична декларація державного суверенітету.'
- section: 'Основний матеріал: Бароковий синтез Величка'
  words: 800
  points:
  - Самійло Величко як архітектор наймонументальнішого літопису (1720).
  - 'Естетична функція поезії: прикрашання сухих фактів, емоційний вплив на читача.'
  - 'Жанрова різноманітність: епітафії (Іскрі, Кочубею), плачі, моралізаторські вірші
    про марноту (''vanitas'').'
  - Використання чужих віршів (Галятовський, Баранович) як авторитетних джерел.
- section: 'Основний матеріал: Барокова поетика і стиль'
  words: 600
  points:
  - 'Особливості силабічного віршування: фіксована кількість складів, цезура, жіночі
    рими.'
  - 'Риторичні фігури: метафора, гіпербола, антитеза (світло/темрява, воля/неволя).'
  - 'Мовне питання: книжна українська мова з полонізмами та церковнослов''янізмами
    як маркер елітарності.'
  - Курйозна поезія (згадка про Івана Величковського) та її вплив на літописний стиль.
- section: 'Основний матеріал: Ідеологія державотворення'
  words: 600
  points:
  - Поезія як інструмент політичної легітимізації Гетьманщини.
  - 'Деколонізаційний аспект: козаки як самостійний суб''єкт історії, а не додаток
    до сусідніх імперій.'
  - 'Концепція ''сарматизму'' в українському вимірі: давність і шляхетність козацького
    роду.'
  - Вплив цих текстів на формування національної свідомості у XVIII-XIX ст. (до 'Історії
    Русів').
- section: 'Практика: Аналіз поетичного тексту'
  words: 600
  points:
  - 'Методика аналізу барокового вірша: на що звертати увагу (символіка, ритм, історичний
    контекст).'
  - Зразок розбору короткого уривка з Граб'янки або Величка.
  - 'Завдання для читача: пошук ''прихованих сенсів'' та барокових кодів.'
- section: 'Підсумок: Спадщина поетичної історії'
  words: 400
  points:
  - Значення віршованих літописів для збереження історичної пам'яті в часи бездержавності.
  - 'Тяглість традиції: від бароко до романтизму (Шевченко як читач літописів).'
  - Спростування імперських міфів про 'культурну вторинність' Гетьманщини.
  - Заклик до вивчення першоджерел мовою оригіналу.
