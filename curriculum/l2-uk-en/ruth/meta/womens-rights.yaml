slug: womens-rights
title: Womens Rights
word_target: 5000
content_outline:
- section: 'Вступ: Статус жінки у ранньомодерній Україні'
  words: 600
  points:
  - Унікальність правового становища руських жінок у Великому князівстві Литовському
    (ВКЛ).
  - Контраст із Московським царством (Домострой) та Західною Європою (coverture).
  - Литовські Статути (1529, 1566, 1588) як гарант прав шляхтянок.
- section: 'Правовий статус: Віно, Материзна та Привінок'
  words: 1000
  points:
  - Визначення поняття «материзна» (bona materna) — майно, успадковане від матері.
  - Інститут «віна» (dos/wiano) — матеріальне забезпечення дружини чоловіком.
  - «Привінок» (counter-dowry) та його роль у захисті вдови.
  - Неможливість відчуження материзни чоловіком без згоди дружини.
- section: 'Жінка як суб''єкт права: Суд та управління'
  words: 800
  points:
  - Право шляхтянки особисто виступати в суді та укладати угоди.
  - Подвійна «головщина» (штраф) за вбивство або образа жінки за Статутом 1588 року.
  - 'Роль вдови-опікунки: управління маєтками та виховання дітей.'
  - Приклади судових справ за участі жінок (за матеріалами гродських книг).
- section: 'Читання I: Феномен Галшки Гулевичівни'
  words: 1000
  points:
  - Біографія Галшки Гулевичівни як приклад соціальної активності.
  - Аналіз тексту Дарчої грамоти 1615 року (фундація Київського братства).
  - 'Мовні особливості документу: руська мова канцелярського стилю.'
  - 'Мотивація меценатства: «з любові до братів моїх — народу руського».'
- section: 'Читання II: Тестаменти та приватне життя'
  words: 1000
  points:
  - Тестамент (заповіт) як его-документ епохи Бароко.
  - 'Структура тестаменту: інвокація, розпорядження тілом, розподіл майна.'
  - 'Турбота про спасіння душі: надання на церкви та монастирі.'
  - Родинні стосунки крізь призму заповітів (за дослідженнями Н. Білоус).
- section: 'Підсумок: Спадщина та втрата прав'
  words: 600
  points:
  - Вплив руської правової традиції на формування ментальності української жінки.
  - Поступове звуження прав жінок у XVIII-XIX ст. під впливом російського законодавства.
  - Зв'язок ранньомодерної традиції з феміністичним рухом кінця XIX ст.
