slug: intermedii-xvii-xviii
title: Intermedii Xvii Xviii
word_target: 5000
content_outline:
- section: 'Вступ: I — Природа жанру та походження'
  words: 400
  points:
  - Інтермедії (від лат. intermedia) виникли як комічні розважальні вставки між актами
    серйозних драм у братських школах та колегіумах.
  - 'Функція психологічного розвантаження: учні та глядачі потребували відпочинку
    від важкої латини чи церковнослов''янської мови, і цей контраст створював комічний
    ефект.'
  - '[!myth-buster] Довгий час вважалося, що давня українська література була виключно
    серйозною та церковною. Інтермедії доводять наявність потужного струменя секулярного,
    народного гумору.'
- section: 'Вступ: II — Театральний контекст та мовний дуалізм'
  words: 400
  points:
  - 'Шкільна драма відображала дуалізм епохи Бароко: книжна мова належала святим та
    героям минулого, тоді як жива українська мова стала голосом сучасного простолюду.'
  - Використання розмовної мови було свідомим літературним прийомом в інтелектуальних
    центрах (наприклад, Києво-Могилянська академія), що стало кроком до її легітимізації.
  - 'Спростування імперського міфу про інтермедії як частину ''загальноросійської''
    ранньої драматургії: це самостійне національне явище.'
- section: 'Основний матеріал: I — Перші пам''ятки та Якуб Ґаватович'
  words: 600
  points:
  - '1619 рік: перша відома постановка україномовних інтермедій на ярмарку в Кам''янці-Струмиловій,
    вставлених у польськомовну трагедію.'
  - 'Твори Якуба Ґаватовича ''Продав кота в мішку'' та ''Найкращий сон'': адаптація
    мандрівних сюжетів до місцевих реалій, де хитрий Климко ошукує простака Стецька.'
  - '[!history-bite] Відомий сьогодні вислів ''купити кота в мішку'' був буквально
    розіграний на сцені українського ярмарку ще на початку XVII століття.'
- section: 'Основний матеріал: II — Соціальна сатира та еволюція жанру'
  words: 600
  points:
  - 'Розвиток жанру у XVIII столітті (творчість Митрофана Довгалевського та Георгія
    Кониського): еволюція від простого побутового анекдоту до гострої сатири.'
  - Драма-мораліте 'Воскресеніє мертвих' (1746) Георгія Кониського використовує сміх
    як зброю для соціальної критики, відкрито висміюючи корупцію та хабарництво суддів.
  - 'Зміна ролі комедії: фіксація суспільних вад і реалій козацької держави.'
- section: 'Основний матеріал: III — Типові персонажі суспільства'
  words: 700
  points:
  - 'Система театральних амплуа: наївний селянин, спритний циган, пихатий лях, москаль,
    міщанин-шахрай, литвин, єврей.'
  - 'Етнографічна мозаїка: персонажі на сцені точно відображали реальний соціально-етнічний
    склад тогочасного суспільства.'
  - '[!culture] Архетипи Баби, Діда, хитрого слуги та наївного простака заклали основу
    не лише для інтермедій, а й для пізнішого українського лялькового вертепу.'
- section: 'Основний матеріал: IV — Народна мова, гумор та фразеологія'
  words: 700
  points:
  - 'Секрет успіху інтермедій — у вербальному комізмі: використання каламбурів, діалектизмів
    та макаронічної мови (суміші латини, польської та української студентами).'
  - '[!quote] Цитати з текстів показують неймовірну життєздатність української лайки,
    дотепів та фразеологізмів (наприклад, ''Іди ж ти собі к бісу з твоєю допитою:
    не берися до мене з твоїм копитом'').'
  - 'Спростування міфу про ''зіпсований'' варіант книжної мови: тексти фіксують багатство
    та самостійність української розмовної мови задовго до ХІХ століття.'
- section: 'Практика: I — Аналіз розмовних маркерів у текстах'
  words: 600
  points:
  - 'Дослідження текстів дозволяє виділити маркери усного мовлення, які автори свідомо
    переносили на папір: специфічний синтаксис та емоційну лексику.'
  - Збереження фонетичних особливостей живої мови навіть попри польську транслітерацію
    у ранніх виданнях.
  - '[!decolonization] Імперська наука маргіналізувала ці тексти як ''низький штиль''
    або провінційне явище, тоді як насправді це був перший прорив української національної
    ідентичності у високу культуру.'
- section: 'Практика: II — Діалектизми та еволюція до сучасної мови'
  words: 500
  points:
  - Аналіз еволюції збережених діалектизмів, слів та виразів з XVII століття до сучасної
    літературної та розмовної української мови.
  - Реєстр живої мови інтермедій як прямий доказ безперервності розвитку української
    мови від ранньомодерної доби до наших днів.
- section: 'Підсумок: I — Інтермедія як голос народу'
  words: 250
  points:
  - Інтермедії зберегли для нас нецензурований, живий голос українців ранньомодерної
    доби — голос площі, ярмарку і шинку.
  - Ці короткі комічні п'єси містять більше автентичної живої розмовної української
    мови, ніж об'ємні офіційні літописи та церковна література.
- section: 'Підсумок: II — Спадщина та перехід до нової літератури'
  words: 250
  points:
  - Традиції барокової комедії (типажі, гумор, мова) стали фундаментом для формування
    вертепу як самостійного народного театру.
  - '[!legacy] Оцінка впливу: без живого сміху та розмовної мови інтермедій XVII-XVIII
    століть неможлива була б поява ''Енеїди'' Івана Котляревського та класичних п''єс
    Григорія Квітки-Основ''яненка.'
