slug: legal-personhood
title: Legal Personhood
word_target: 5000
content_outline:
- section: 'Вступ: Правова культура Русі'
  words: 400
  points:
  - 'Від ''Руської Правди'' до Литовських Статутів: еволюція права.'
  - 'Поняття ''особа'' (persona) в XVI ст.: не універсальні права людини, а станові
    привілеї.'
  - 'Статути як ''Конституція'' старого часу: верховенство писаного закону.'
- section: 'Основний матеріал I: Литовські Статути — фундамент свобод'
  words: 800
  points:
  - Три редакції Статутів (1529, 1566, 1588) — шлях до досконалості.
  - 'Передмова Лева Сапєги: маніфест правової держави (аналіз першоджерела).'
  - 'Обмеження влади монарха: ''Господар пануючий жадної зверхності... заживати не
    може''.'
  - 'Контраст з Московським царством: договір проти сваволі.'
- section: 'Основний матеріал II: Шляхта як ''політичний народ'''
  words: 800
  points:
  - 'Хто така шляхта: ''лицарський люд'', що платить кров''ю.'
  - 'Рівність перед законом: ''шляхтич на загроді рівний воєводі''.'
  - 'Недоторканність особи (Neminem captivabimus): не можна ув''язнити без суду.'
  - 'Право на спротив (Jus resistendi): легальне повстання проти тирана.'
- section: 'Основний матеріал III: Жінка — суб''єкт, а не об''єкт'
  words: 800
  points:
  - Унікальний статус руської жінки порівняно із Західною Європою.
  - 'Майнові права: володіння землею, керування маєтками, спадок.'
  - 'Вдівство як час найбільшої могутності: роль ''матрони''.'
  - 'Судовий захист: жінка в суді як позивачка і відповідачка.'
- section: 'Основний матеріал IV: Міста і ''право німецьке'''
  words: 600
  points:
  - 'Магдебурзьке право: місто як колективна ''правова особа''.'
  - 'Київські привілеї: самоврядування, власний суд, податковий імунітет.'
  - 'Міщанин vs Шляхтич: конфлікт юрисдикцій та прав.'
- section: 'Основний матеріал V: Градації несвободи'
  words: 600
  points:
  - Селяни 'похожі' (вільні) та 'непохожі' (прикріплені).
  - 'Челядь і холопи: ті, хто не є суб''єктами права.'
  - 'Еволюція кріпацтва: як вільні люди втрачали суб''єктність (артикули Статуту 1588).'
- section: 'Основний матеріал VI: Руська мова — мова закону'
  words: 600
  points:
  - 'Статут 1588, Розділ 4: законодавчий захист мови.'
  - 'Чому це важливо: право бути судженим зрозумілою мовою.'
  - 'Канцелярська (актова) мова як феномен: стиль, лексика, вплив на культуру.'
- section: 'Підсумок: Спадщина правової культури'
  words: 400
  points:
  - Статути діяли в Україні до 1840-х років (скасовані царатом).
  - 'Вплив на козацьку державу: Гетьманщина як спадкоємиця руського права.'
  - Ментальна прірва між українським 'правовим' та російським 'самодержавним' світоглядом.
