slug: pysovnyk-lystuvannia
title: Pysovnyk Lystuvannia
word_target: 5000
content_outline:
- section: 'Вступ: I — Що таке письмовник?'
  words: 600
  points:
  - Визначення поняття 'письмовник' (формулярник) як практичного посібника зі зразками
    листів.
  - Зв'язок із загальноєвропейською традицією ars dictandi (мистецтва писання листів).
  - 'Структура класичного листа: від обов''язкової преамбули до формули прощання.'
- section: 'Вступ: II — Контекст і потреби суспільства'
  words: 500
  points:
  - 'Хто використовував письмовники: освічені міщани, козацька старшина, духовенство
    та писарі.'
  - Високий рівень грамотності та активне соціальне, торгове і правове життя як стимул
    для масового листування.
  - Роль братських шкіл та Києво-Могилянської академії у поширенні епістолярної культури.
- section: 'Основний матеріал: I — Формули привітання та звертання'
  words: 700
  points:
  - Аналіз типових титулатур та етикетних звертань ('Ваша милосте', 'Мій вельми милостивий
    пане').
  - Барокова пишномовність і обов'язкові релігійні мотиви ('Зичу від Господа Бога
    доброго здоров'я').
  - Набір специфічної лексики для вираження найвищої поваги та соціальної покірності.
- section: 'Основний матеріал: II — Листи-прохання та скарги'
  words: 700
  points:
  - Внутрішня структура ділового прохання (петиції) та скарги до місцевого суду.
  - 'Правова культура: як українці аргументували свої права та захищали інтереси в
    епістолярному жанрі.'
  - Приклади мовних конструкцій для дипломатичного вираження незадоволення чи вимоги.
- section: 'Основний матеріал: III — Привітання і співчуття'
  words: 700
  points:
  - 'Шаблони для приватного життя: вітання з великими релігійними святами, іменинами,
    весіллям.'
  - 'Формули співчуття при втраті близьких: гармонійне поєднання теології та справжніх
    людських емоцій.'
  - Баланс між жорсткою стандартизованою формулою та можливістю особистого вираження
    почуттів.
- section: 'Основний матеріал: IV — Соціальна ієрархія у листуванні'
  words: 600
  points:
  - Динаміка зміни стилістики та лексики залежно від статусу адресата (до рівного,
    вищого, нижчого).
  - Жорстке станове суспільство Речі Посполитої та Гетьманщини, нерозривно закодоване
    у граматиці звертань.
  - 'Наслідки неправильного титулування: від особистої образи до цілком реальних соціальних
    конфліктів.'
- section: 'Практика: I — Епістолярні формули'
  words: 400
  points:
  - Детальний лінгвістичний розбір найбільш популярних вступних та заключних формул-кліше.
  - Аналіз збережених оригінальних цитат зі староукраїнських листів для розуміння
    живого синтаксису.
  - Пояснення застарілої канцелярської лексики, що нині вийшла з ужитку.
- section: 'Практика: II — Порівняння із сучасним листуванням'
  words: 400
  points:
  - 'Еволюція та трансформація стилю: від багатослівного пишного бароко до сучасного
    інформаційного лаконізму.'
  - Елементи старої традиції, які дожили до сьогодні (базові маркери поваги, чіткий
    поділ на ділове і приватне).
  - Принципові відмінності в оформленні зовнішньої адреси та підпису.
- section: 'Підсумок: I — Дзеркало повсякденного життя'
  words: 400
  points:
  - Значення письмовників як унікального джерела для розуміння побуту та ментальності
    українців минулих століть.
  - Епістолярна традиція як беззаперечний доказ європейського вектору розвитку до
    початку імперської уніфікації.
  - Вагома роль щоденного листування у збереженні мовної ідентичності та фіксації
    живого українського слова.
