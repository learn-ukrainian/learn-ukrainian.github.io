slug: hrabianka-heroic-chronicle
title: 'Григорій Грабянка: Героїчна Хроніка — Козацький Епос між Документом і Легендою'
word_target: 5000
content_outline:
- section: 'Вступ: I — Козацький епос між документом і легендою'
  words: 500
  points:
  - Твір не є класичним літописом, а бароковим історичним оповіданням із власною внутрішньою
    драматургією (повна назва — «Дійствія презільної і от начала поляков крвавшей
    небывалой брани...»).
  - '[!context] Літопис створювався одразу після Полтавської катастрофи (1710 рік),
    маючи на меті законсервувати славу козаків у період імперського наступу.'
  - 'Використання різноманітних джерел: Літопису Самовидця, «Синопсису», документів
    канцелярії та праць польських істориків (Стрийковського, Твардовського).'
- section: 'Вступ: II — Григорій Грабянка та контекст 1710 року'
  words: 500
  points:
  - Григорій Грабянка (бл. 1666–1738) — представник старшини, пізніше гадяцький полковник
    (1730), який загинув у поході.
  - 'Мета автора (зі «Слова до читача»): керуватися спільною користю та «не лишати
    в попелі мовчання схованими дії... Богдана Хмельницького».'
  - 'Елегійна тональність написання: завершення тексту у Гадячі після подій 1709 року
    визначає його як спробу фіксації героїчного минулого.'
- section: 'Основний матеріал: I — Хозарський міф та витоки козацтва'
  words: 500
  points:
  - '[!history-bite] Концепція походження козаків: Грабянка спирається на хозарський
    міф, виводячи їхній родовід від давнього скіфського племені.'
  - 'Мета хозарського міфу: довести давність і легітимність політичних прав козацтва
    на власну землю.'
  - 'Деколонізаційний аспект: конструювання образу окремого «лицарського народу»,
    що спростовує імперські наративи про козаків як про «збіглих селян-бунтарів».'
- section: 'Основний матеріал: II — Хмельниччина як епічна битва'
  words: 600
  points:
  - Центральна подія твору — Національно-визвольна війна (1648–1654) розглядається
    як епічне протистояння добра і зла.
  - '[!decolonization] Війна трактується як боротьба за волю «батьківського дому»
    та автономію, що повністю відкидає імперський наратив про міфічне «возз''єднання»
    з Росією.'
  - Детальні описи баталій, які підкреслюють звитягу та мужність козаків, що боронять
    свою землю і віру.
- section: 'Основний матеріал: III — Риторика та образ гетьмана'
  words: 600
  points:
  - 'Ідеалізований образ Богдана Хмельницького: творення епічного портрета мудрого
    правителя, геніального полководця та будівничого держави.'
  - Активне використання прямої мови, стилізованих діалогів та патетичних промов для
    посилення риторичного ефекту.
  - '[!quote] Пряма мова гетьмана як літературна реконструкція: «Жив бог і козацька
    не вмирала мати! Не все ще Чаплинський у мене забрав...».'
- section: 'Основний матеріал: IV — Барокова мова і стиль хроніки'
  words: 500
  points:
  - Складна книжна українська мова тексту, що поєднує елементи церковнослов'янщини
    та козацького канцеляриту.
  - '[!culture] Включення поетичних вставок: «Вірші на герб Війська Запорозького»
    («Війська Запорозького воїн знаменитий...») як класичний приклад української геральдичної
    поезії бароко.'
  - Вплив латинської та польської риторичних традицій на синтаксичну структуру та
    барокові тропи хроніки.
- section: 'Основний матеріал: V — Від Руїни до Полтави (1657–1709)'
  words: 500
  points:
  - 'Хронологічне завершення твору: зміна тональності від героїки Хмельниччини до
    трагізму подій після смерті гетьмана (1657).'
  - Описи втрати єдності, внутрішніх усобиць та остаточної катастрофи Полтавської
    битви 1709 року.
  - 'Політичний заповіт: літопис звучить як сувора пересторога нащадкам про наслідки
    чвар для державної незалежності.'
- section: 'Практика: I — Читання та етимологічний аналіз'
  words: 500
  points:
  - Розбір неадаптованих уривків літопису, зокрема описів боїв та стилізованих промов
    історичних діячів.
  - 'Етимологічне дослідження специфічної лексики козацької доби: вивчення архаїзмів
    та історизмів.'
  - Аналіз взаємозв'язку між бароковим стилем викладу та ідеологічним навантаженням
    тексту.
- section: 'Практика: II — Лексико-граматичний розбір барокових текстів'
  words: 500
  points:
  - 'Граматична лабораторія: розбір складних синтаксичних структур та впливу латинської
    риторики.'
  - Вивчення елементів козацького канцеляриту та його органічного вплетення у художню
    тканину епосу.
  - Лексико-граматичні вправи на розуміння книжної української мови XVIII століття.
- section: 'Підсумок: Спадщина літопису для національного відродження'
  words: 300
  points:
  - 'Колосальний вплив на збереження національної ідентичності: твір зберігся у понад
    40 списках і активно переписувався.'
  - 'Літопис як місток між бароковою історіографією та відродженням XIX століття:
    ідейне джерело для «Історії Русів» та творчості Т. Шевченка.'
  - '[!myth-buster] Руйнування міфу про провінційність козацької думки: літопис є
    яскравим свідченням політичної суб''єктності українців та маніфестом політичної
    нації.'
