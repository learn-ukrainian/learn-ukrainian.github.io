slug: hrabianka-heroic-chronicle
title: "Григорій Грабянка: Героїчна Хроніка — Козацький Епос між Документом і Легендою"
word_target: 5000
content_outline:
- section: 'Вступ: Грабянка і три козацьких літописці'
  words: 600
  points:
  - "Тріада козацьких хронік: Самовидець, Грабянка, Величко — три різних способи осмислити ті самі події."
  - 'Григорій Грабянка (бл. 1686–1737): гадяцький полковник, козацький старшина — автор, що пише з позиції учасника і носія традиції.'
  - '"Дійствія презільної брані..." (1710): де ця дата ставить хроніку — на межі козацького автономізму і петрівських реформ.'
- section: 'Основний матеріал: I — Жанрова природа Грабянки'
  words: 800
  points:
  - 'Грабянка між літописом і героїчним епосом: де хроніка набуває рис «Іліади» і де лишається документом.'
  - 'Функція "вступного слова": хроніст пояснює свою мету і позицію — що Грабянка вважає важливим зафіксувати і чому?'
  - 'Структура тексту: від Наливайка (1595) до Мазепи (1709) — чому саме ці хронологічні межі?'
- section: 'Основний матеріал: II — Хмельниччина у Грабянки: мова героїки'
  words: 900
  points:
  - 'Опис битв: Жовті Води, Батіг, Берестечко — порівняйте мову Грабянки і Самовидця для тих самих подій.'
  - '"Риторика великодушності": як Грабянка зображує героїв і антагоністів — польська шляхта і кримські союзники.'
  - "Прямі промови у хроніці: де Грабянка 'вкладає' слова в уста героїв і що це означає як риторичний прийом?"
- section: 'Основний матеріал: III — Мова і стиль: бароково-канцелярський синтез'
  words: 900
  points:
  - 'Лексичний аналіз: адміністративна лексика козацького канцелярського стилю у поєднанні з патетичними формулами.'
  - 'Польські впливи у синтаксисі: де Грабянка мимоволі наслідує польські конструкції і де відходить від них.'
  - "Читаємо пасаж уголос: розбираємо структуру складного речення і перекладаємо на сучасну українську."
- section: 'Основний матеріал: IV — Грабянка і Мазепа: загублена незалежність'
  words: 900
  points:
  - 'Кульмінація: Грабянка пише хроніку одразу після Полтави 1709 р. — як це позначається на тональності?'
  - 'Образ Мазепи у Грабянки: де він між «зрадником» (петрівський наратив) і «борцем за права»?'
  - '"Полтавська катастрофа" у тексті: читаємо фінальні розділи — мова поразки і мова надії.'
- section: 'Основний матеріал: V — Рукописна традиція і списки'
  words: 600
  points:
  - 'Грабянка у рукописах: скільки списків збереглось і що між ними відрізняється — методи текстологічної критики.'
  - 'Перший видавець: де і коли "Дійствія" вперше опубліковані — і що це означало для читання тексту.'
  - 'Грабянка у "Русів": де "Історія Русів" запозичує з Грабянки — ланцюжок козацького наративу.'
- section: 'Підсумок'
  words: 300
  points:
  - Значення Грабянки для розуміння переходу від Самовидця до Величка — еволюція жанру.
  - Де "Дійствія" виходять за межі хроніки і стають культурним документом козацького самоусвідомлення.
  - "Зв'язок з наступним модулем: Величко як кульмінація традиції."
