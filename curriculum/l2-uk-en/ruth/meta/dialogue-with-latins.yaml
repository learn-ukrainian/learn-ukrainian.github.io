slug: dialogue-with-latins
title: Dialogue With Latins
word_target: 5000
content_outline:
- section: Вступ
  words: 400
  points:
  - 'Криза православної церкви в Речі Посполитій кінця XVI століття: ''право патронату''
    та внутрішній занепад'
  - 'Наступ Контрреформації: єзуїти та їхня освітня експансія як виклик руській культурі'
  - 'Визначення полемічної літератури: інтелектуальна зброя в боротьбі за ідентичність'
- section: 'Основний матеріал: I — Виклик Петра Скарги та генеза Унії'
  words: 800
  points:
  - 'Петро Скарга та його трактат ''Про єдність Церкви Божої'' (1577): аргументи проти
    ''грецької віри'''
  - Критика церковнослов'янської мови як непридатної для науки та теології
  - 'Мотивація руських єпископів до унії: прагнення рівності в Сенаті та захисту від
    свавілля братств'
  - Таємні переговори з Римом (1590-1595) та роль Іпатія Потія і Кирила Терлецького
- section: 'Основний матеріал: II — Берестейський розкол 1596 року'
  words: 800
  points:
  - 'Два собори в Бересті: уніатський (офіційний) та православний (опозиційний)'
  - Роль князя Костянтина Острозького та протестанта Христофора Радзивілла в православному
    таборі
  - 'Взаємні анафеми та юридичний поділ: поява термінів ''уніати'' та ''дизуніти''
    (схизматики)'
  - 'Початок ''війни Русі з Руссю'': релігійний конфлікт як соціальна драма'
- section: 'Основний матеріал: III — Правничий спротив: «Апокрисис»'
  words: 800
  points:
  - Христофор Філалет та його 'Апокрисис' (1597) — відповідь на книгу Скарги
  - 'Зміна тактики: перехід від догматики до юридичного захисту прав руського народу'
  - 'Аргументація через ''права та вольності'' шляхти: унія як порушення конституції
    Речі Посполитої'
  - Роль Острозького гуртка у формуванні політичної нації через літературу
- section: 'Основний матеріал: IV — Бароковий плач: Мелетій Смотрицький'
  words: 1000
  points:
  - «Тренос» (1610) — вершина високого бароко в українській літературі
  - 'Алегорія Матері-Церкви: образ страждання, сирітства та покинутості'
  - 'Риторика докору: список шляхетських родів, що зріклися батьківської віри (''Де
    дім Острозьких? Де Вишневецькі?'')'
  - 'Стилістика тексту: емоційна напруга, контрасти, біблійні алюзії та мовна гра'
  - 'Вплив твору на сучасників: ''Тренос'' як маніфест втраченої еліти'
- section: 'Основний матеріал: V — Історична легітимність: Захарія Копистенський'
  words: 800
  points:
  - «Палінодія» (1621) як енциклопедія української ідентичності
  - 'Історична аргументація: доведення неперервності київської традиції від апостола
    Андрія'
  - 'Концепція ''Яфетового племені'': вписування русинів у загальноєвропейський контекст'
  - 'Відмежування від Москви: усвідомлення окремішності київського християнства'
- section: Практика
  words: 200
  points:
  - 'Аналіз уривків з ''Треносу'': пошук барокових метафор та риторичних фігур'
  - 'Порівняння аргументів Скарги та Філалета: теологія проти права'
  - 'Робота з лексикою: полонізми, латинізми та церковнослов''янізми в текстах'
- section: Підсумок
  words: 200
  points:
  - Полемічна література як каталізатор національного самоусвідомлення
  - Формування літературної мови та високого стилю в горнилі релігійної боротьби
  - 'Спадщина полемістів: ідея, що за віру і права треба боротися словом і мечем'
  - 'Перехід до доби Могили: від полеміки до розбудови освіти'
