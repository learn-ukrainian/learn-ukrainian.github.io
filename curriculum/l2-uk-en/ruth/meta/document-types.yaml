slug: document-types
title: Document Types
word_target: 5000
content_outline:
- section: 'Вступ: Документальна культура Русі'
  words: 400
  points:
  - 'Роль документа в середньовічному суспільстві: від «слова честі» до «писаного
    права»'
  - 'Матеріальний вимір: пергамент, папір з водяними знаками, вислі печатки'
  - 'Писар як елітна професія: освіта, статус та відповідальність'
- section: 'Привілей: I — Архітектура прав і свобод'
  words: 600
  points:
  - 'Визначення Привілею як «дарованого права»: від великого князя до підданого'
  - 'Види привілеїв: земські (загальнодержавні) та персональні (на маєтки)'
  - Магдебурзьке право як особливий вид привілею для міст
- section: 'Привілей: II — Структура та мовні формули'
  words: 600
  points:
  - 'Аналіз структури: Інвокація (звернення до Бога) та Інтитуляція (титул монарха)'
  - Наррація (обґрунтування) та Диспозиція (суть надання)
  - Санкція (погроза порушникам) та Корроборація (засвідчення печаткою)
  - Порівняння з сучасною структурою державних актів
- section: 'Лист: I — Епістолярний етикет XIV–XVII ст.'
  words: 500
  points:
  - 'Поняття «Лист» у широкому сенсі: не тільки кореспонденція, а й документ'
  - 'Ієрархія звертань: як писати до короля, рівного собі та підлеглого'
  - Титулатура та формули ввічливості («Мого Милостивого Пана...»)
- section: 'Лист: II — Види та функції кореспонденції'
  words: 500
  points:
  - Листи вірчі (дипломатичні акредитиви) та листи наказові
  - Листи духовні (заповіти) — особливий жанр особистого документа
  - 'Приватне листування шляхти: мова емоцій та побуту'
- section: 'Універсал: I — Народження гетьманської канцелярії'
  words: 600
  points:
  - 'Етимологія та генеза терміну: від королівських універсалів до козацьких'
  - Універсал як інструмент державного управління Гетьманщини
  - Роль Генерального писаря у формуванні державної політики
- section: 'Універсал: II — Аналіз тексту 1648 року'
  words: 600
  points:
  - Детальний розбір Універсалу Богдана Хмельницького під Білою Церквою
  - 'Риторика повстання: аргументація «кривд» та заклики до «оборони віри»'
  - 'Стилістичні особливості: поєднання патетики та юридичної точності'
- section: 'Канцелярська мова: I — «Руська мова» як державна'
  words: 500
  points:
  - Статус староукраїнської мови у Великому князівстві Литовському (Статут 1566)
  - Відмінність від церковнослов’янської та народної розмовної мови
  - Вплив латини та польської мови на формування юридичної термінології
- section: 'Канцелярська мова: II — Лексичний та граматичний аналіз'
  words: 400
  points:
  - 'Ключові терміни: «позов», «уряд», «вирок», «скарга», «маєтність»'
  - 'Граматичні конструкції: пасивні звороти та дієприкметникові звороти'
  - 'Еволюція мови від XIV до XVII століття: стандартизація'
- section: 'Підсумок: Спадщина старої канцелярії'
  words: 400
  points:
  - 'Тяглість традиції: що сучасне українське діловодство успадкувало від предків'
  - 'Документ як свідок історії: важливість збереження архівів'
  - Мова закону як маркер національної ідентичності
