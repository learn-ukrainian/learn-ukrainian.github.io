slug: panegyric-style
title: Panegyric Style
word_target: 5000
content_outline:
- section: Феномен українського барокового панегірика
  words: 800
  points:
  - 'Визначення жанру: від античної риторики до київського бароко'
  - 'Соціальна функція: панегірик як інструмент ''публічного піару'' та фандрайзингу'
  - Відмінність української традиції (орієнтація на латинську школу) від московської
  - Роль Києво-Могилянської академії як 'фабрики' панегіристів
- section: 'Риторика слави: Структура та поетика'
  words: 900
  points:
  - 'Композиція класичного панегірика: Exordium, Laudatio, Peroratio'
  - 'Гербові вірші (Stemmata): геральдика як поетичний код'
  - 'Бароковий інструментарій: гіпербола, алегорія, емблема, кончетто'
  - 'Мовна гра: макаронічна мова та ''словесні візерунки'' (курйозний вірш)'
- section: 'Петро Могила: «Євхаристиріон» (1632)'
  words: 1100
  points:
  - 'Історичний контекст: заснування Колегіуму та потреба в легітимації'
  - Софроній Почаський і його 'подяка' (Євхаристиріон) від імені студентів
  - 'Ключовий наратив: освіта як захист національної ідентичності (''роксоланські
    діти'')'
  - 'Аналіз уривків: образ Гелікону на дніпровських схилах'
- section: 'Іван Мазепа: Гетьман-Сонце в літературі'
  words: 1200
  points:
  - 'Мазепинське бароко: апогей панегіричного стилю'
  - Символіка Сонця, Марса та Геркулеса в прославлянні гетьмана
  - 'Синтез мистецтв: віршовані гравюри Івана Мигури'
  - Образ ідеального правителя ('Християнського Принца') в текстах Орлика та Яворського
- section: '«Володимир» Прокоповича: Політична теологія'
  words: 1000
  points:
  - 'Драма як панегірик: новаторство Феофана Прокоповича'
  - 'Історична паралель: Князь Володимир (Хреститель) = Гетьман Мазепа (Меценат)'
  - 'Державницький зміст: ідея спадкоємності Гетьманщини від Київської Русі'
  - 'Трагічна іронія: доля твору та автора після Полтавської катастрофи'
