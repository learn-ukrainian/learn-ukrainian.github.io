slug: skovoroda-language
title: Skovoroda Language
word_target: 5000
content_outline:
- section: 'Вступ: Мовна мозаїка XVIII століття'
  words: 500
  points:
  - 'Мовна ситуація Гетьманщини: співіснування книжної та народної мов'
  - Роль Києво-Могилянської академії у формуванні мовного смаку
  - 'Диглосія: розрив між мовою освіти (латина/словенороська) і побуту'
  - Сковорода як 'людина бароко' у мовному вимірі
- section: Теорія 'Трьох Світів' і 'Трьох Мов'
  words: 600
  points:
  - 'Онтологічна тріада Сковороди: Макрокосм, Мікрокосм, Світ Символів'
  - Символічна мова Біблії як ключ до пізнання істини
  - Концепція 'мови Бога', 'мови праведників' і 'мови грішних'
  - Слово як оболонка (тлінна) і як зміст (вічний)
- section: 'Слов''янороська мова: Високий стиль'
  words: 800
  points:
  - Визначення 'словенороської мови' (Slavenorossian) як київського ізводу
  - Відмінність від російської літературної мови Ломоносова
  - Книжна лексика як маркер елітарності та сакральності тексту
  - 'Граматичні особливості: архаїчні форми дієслів та іменників'
  - Аналіз уривку з філософського трактату (приклад високого стилю)
- section: 'Латина та Грецька: Ключі до мудрості'
  words: 600
  points:
  - Сковорода як блискучий латиніст (Epistolae)
  - Латинський синтаксис у кириличних текстах (інверсії, риторичні фігури)
  - 'Грецька термінологія: ''Біблія'', ''філософія'', ''софія'''
  - Вплив античної літератури на стилістику Сковороди
- section: 'Народна стихія: ''Байки Харківські'''
  words: 800
  points:
  - 'Жанрова специфіка байки: потреба у ''простому стилі'''
  - Наближеність до розмовної мови Слобожанщини
  - Використання народних фразеологізмів та приказок
  - Синтаксична простота порівняно з трактатами
  - 'Аналіз байки ''Бджола та Шершень'': лексичний розбір'
- section: Лексичні особливості та Правопис
  words: 700
  points:
  - Традиційний правопис (етимологічний) vs Жива вимова
  - Фонетичні маркери української мови (и/і, г/ґ, твердість губних)
  - Рими як доказ української вимови (мнѣ — мені)
  - 'Специфічні слова-маркери: ''болванѣти'', ''іста'', ''сродність'''
  - Вплив польської мови (полонізми в лексиці)
- section: 'Деколонізація: Чия мова?'
  words: 700
  points:
  - Спростування імперського міфу про 'російського філософа'
  - Чому Сковорода називав свою мову 'нашим діалектом'?
  - 'Історичний контекст: заборони української мови (Указ 1720 р.)'
  - Мова Сковороди як код спротиву уніфікації
  - Українська ментальність у мовних образах
- section: 'Практика: Аналіз текстів'
  words: 500
  points:
  - 'Порівняльний аналіз: текст листа до Ковалинського vs текст пісні'
  - 'Вправа: знайти українізми в архаїчному тексті'
  - 'Вправа: перекласти ''словенороську'' фразу сучасною українською'
- section: 'Підсумок: Предтеча Котляревського?'
  words: 300
  points:
  - Сковорода — фінальний акорд українського Бароко
  - Чому він не став батьком нової літературної мови?
  - Духовний вплив на Котляревського та Шевченка
  - Значення спадщини Сковороди для сучасної України
