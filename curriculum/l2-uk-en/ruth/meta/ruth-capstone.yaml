slug: ruth-capstone
title: Ruth Capstone
word_target: 5000
content_outline:
- section: 'Вступ: Руська мова як державна'
  words: 400
  points:
  - 'Статус руської мови у Великому князівстві Литовському: lingua ruthena.'
  - Відмежування від церковнослов'янської (мови літургії) та польської (мови двору).
  - Географія поширення та сфери вжитку.
- section: 'Законодавче слово: Литовські Статути'
  words: 600
  points:
  - Статути 1529, 1566, 1588 років як пам'ятки правової думки.
  - 'Аналіз юридичної лексики: терміни, що збереглися донині (злочин, доказ, уряд).'
  - Норма 1588 року про обов'язковість руської мови в діловодстві.
- section: 'Сакральне слово: Пересопницьке Євангеліє'
  words: 500
  points:
  - Феномен Пересопницького Євангелія (1556–1561).
  - 'Глоси та маргіналії: проникнення живої народної мови в сакральний текст.'
  - Роль монастирів у збереженні писемної традиції.
- section: 'Полемічне слово: Острозька академія та Смотрицький'
  words: 500
  points:
  - Вплив Реформації та Контрреформації на мовну ситуацію.
  - «Грамматіка» Мелетія Смотрицького (1619) як кодифікація норм.
  - 'Полемічна література: емоційний стиль Івана Вишенського.'
- section: 'Козацьке слово: Літописи Самовидця та Граб''янки'
  words: 600
  points:
  - Формування специфічного «козацького діалекту» в канцеляріях.
  - 'Стиль козацького бароко: патетика, метафоричність, біблійні алюзії.'
  - 'Аналіз уривків з літописів: опис битв та політичних подій.'
- section: 'Барокове слово: Риторика та поетика Києво-Могилянської академії'
  words: 400
  points:
  - Роль Києво-Могилянської академії як центру освічености.
  - 'Шкільна драма та віршування: курйозна поезія, емблеми.'
  - 'Багатомовність еліти: латина, польська, книжна українська.'
- section: 'Філософське слово: Григорій Сковорода'
  words: 500
  points:
  - 'Мовний світ Сковороди: «словено-роська» мова як інструмент філософії.'
  - Чому Сковорода не писав чистою народною мовою?
  - Аналіз уривків з «Саду божественних пісень».
- section: 'Криза та трансформація: Кінець XVIII століття'
  words: 500
  points:
  - Занепад Гетьманщини та русифікація адміністрації.
  - Заборони українського друку (укази Петра I та Катерини II).
  - Чому стара книжна мова стала «мертвою» для нової літератури.
- section: 'Аналіз джерел: Практикум I (Правничий текст)'
  words: 350
  points:
  - Детальний розбір уривка з Литовського Статуту.
  - Пошук когнатів у сучасній мові.
  - Завдання на реконструкцію значення.
- section: 'Аналіз джерел: Практикум II (Літописний наратив)'
  words: 350
  points:
  - Розбір уривка з Літопису Самовидця (Руїна або Чорна Рада).
  - Виявлення барокових риторичних фігур.
  - Порівняння з сучасним історичним стилем.
- section: 'Підсумок: Спадщина руської мови'
  words: 300
  points:
  - 'Від «Енеїди» Котляревського до сьогодення: що ми зберегли.'
  - Староукраїнська мова як фундамент національної ідентичності.
  - 'Фінальна рефлексія: тяглість традиції попри розриви.'
