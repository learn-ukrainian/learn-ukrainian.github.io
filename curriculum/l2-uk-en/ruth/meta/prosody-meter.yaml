slug: prosody-meter
title: Prosody Meter
word_target: 5000
content_outline:
- section: 'Вступ: Від усної традиції до книжневого вірша'
  words: 600
  points:
  - 'Генеза українського віршування: від народних дум до шкільної лави.'
  - Роль Острозької академії та братських шкіл у формуванні літературного канону.
  - Вплив латинської та польської поетики (Ян Кохановський) на руських книжників.
  - 'Дві стихії: нерівноскладовий речитатив дум vs. строгий ізосилабізм книжної поезії.'
- section: 'Система: Архітектура силабічного вірша'
  words: 1000
  points:
  - 'Залізні правила силабіки: ізосилабізм (рівноскладовість) як основа ритму.'
  - 'Архітектоніка рядка: 13-складник (7+6) та 11-складник (5+6).'
  - 'Роль цезури: обов''язкова пауза, що ділить рядок на піввірші.'
  - 'Рима в бароко: панування жіночої (парокситонної) рими та заборона чоловічої.'
  - 'Конфлікт наголосів: чому силабічна система була природною для староукраїнської
    мови (полонізми) і стала штучною пізніше.'
- section: 'Пам''ятка: "Вірші на жалісний погреб" (1622)'
  words: 1000
  points:
  - Касіян Сакович і колективна творчість спудеїв Київського братства.
  - 'Політичний маніфест у віршах: легітимізація козацтва як нового лицарства.'
  - 'Аналіз тексту: панегірик Сагайдачному, опис герба, військові чесноти.'
  - 'Метрична структура: зразковий 13-складник як еталон високого стилю.'
  - Цитатний аналіз ключових фрагментів (про вольність, про службу вітчизні).
- section: 'Експеримент: Антична метрика Мелетія Смотрицького'
  words: 800
  points:
  - 'Мелетій Смотрицький як теоретик: "Грамматіки Славєнския правилноє Сѵ́нтаґма"
    (1619).'
  - 'Спроба квантитативної реформи: адаптація грецького гекзаметра до слов''янської
    фонетики.'
  - 'Умовна довгота і короткість складів: штучність конструкції.'
  - 'Чому експеримент провалився: перемога динамічного наголосу над часокількістю.'
  - 'Значення спроби: інтеграція руської філології в європейський ренесансний контекст.'
- section: 'Гра: Барокові курйози Івана Величковського'
  words: 1000
  points:
  - 'Поезія як інтелектуальна гра (Poeta doctus): збірка "Млеко" (1691).'
  - 'Візуальна поезія: фігурні вірші (хрест, чаша, яйце, мечеподібні).'
  - Лабіринти, акровірші, раки літеральні (паліндроми).
  - 'Сакральний зміст форми: як візуальний образ доповнював богословську думку.'
  - 'Вплив європейського бароко: концепт "курйозності" (curiositas) та "дотепності"
    (argutia).'
- section: 'Підсумок: Спадщина і перехід до нової ери'
  words: 600
  points:
  - 'Григорій Сковорода: остання велична нота українського бароко.'
  - 'Криза силабіки у XVIII столітті: розрив між живою мовою та книжним віршем.'
  - 'Іван Котляревський та "Енеїда" (1798): революційний перехід до силабо-тоніки
    (ямб).'
  - Вплив силабічної традиції на раннього Шевченка та народну пісню.
  - 'Значення епохи: формування національної літературної ідентичності.'
