slug: printing-vocabulary
title: Printing Vocabulary
word_target: 5000
content_outline:
- section: 'Вступ: Світанок друкарства'
  words: 600
  points:
  - 'Першодруки кирилицею: Швайпольт Фіоль (Краків, 1491) та Франциск Скорина (Прага,
    1517)'
  - Юрій Дрогобич та його 'Iudicium Pronosticon' (1483) як символ ренесансного гуманізму
  - 'Прихід друкарства в Україну: соціально-політичні передумови та роль міщанства'
- section: 'Основний матеріал: I — Матеріальний світ друкарні'
  words: 1200
  points:
  - 'Анатомія верстата: преса, тигель, талер, гвинт'
  - 'Від літери до сторінки: пунсон (штанба), матриця, виливання шрифтів'
  - 'Робота з кастою: процес набору тексту (складання)'
  - 'Папір та філіграні: як ідентифікувати місце та час видання'
- section: 'Основний матеріал: II — Люди і ролі'
  words: 1000
  points:
  - 'Постать Друкаря: Іван Федорович як ремісник-інтелектуал'
  - 'Роль Мецената (накладника): ''коштом і накладом'' князів та братств'
  - 'Команда: складачі, батирщики, коректори (справники)'
  - 'Інтролігатор: мистецтво оправи та збереження книги'
- section: 'Основний матеріал: III — Архітектура книги'
  words: 1200
  points:
  - 'Титульний аркуш та фронтиспіс: візитівка видання'
  - 'Колофон: післямова з технічними та історичними даними'
  - 'Художнє оздоблення: заставки, кінцівки, ініціали, гербові вірші'
  - 'Навігація: кустош, фоліація, сигнатура зошитів'
- section: 'Практика: Робота з джерелами'
  words: 600
  points:
  - Аналіз титульної сторінки Острозької Біблії
  - Розшифровка колофону Львівського Апостола
  - Ідентифікація елементів книги (кустош, заставка)
- section: 'Підсумок: Друкарство як зброя'
  words: 400
  points:
  - Роль книги у полемічній боротьбі та захисті ідентичності
  - Спадщина братських друкарень та перехід центру до Києва
