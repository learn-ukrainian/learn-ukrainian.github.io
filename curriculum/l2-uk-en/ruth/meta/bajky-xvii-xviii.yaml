slug: bajky-xvii-xviii
title: Bajky Xvii Xviii
word_target: 5000
content_outline:
- section: 'Вступ: I — Езопівська традиція та Україна'
  words: 600
  points:
  - Походження жанру від античної (Езоп) та європейської барокової традицій, засвоєння
    через курси поетики Києво-Могилянської академії.
  - Спростування імперського міфу про вторинність української байки та її залежність
    від російської літератури.
- section: 'Вступ: II — Соціальна функція байки'
  words: 500
  points:
  - Байка як «екземплум» у церковних проповідях XVII ст. (трактати Іоаникія Галятовського
    1659 року).
  - Поєднання високого стилю з побутовим гумором для пояснення складних моральних
    істин широким верствам населення.
- section: 'Основний матеріал: I — Читання байок XVII-XVIII ст.'
  words: 700
  points:
  - Огляд збірки Антонія Радивиловського «Огородок Марії Богородиці» (1676) та аналіз
    його байки про болотну кокошку.
  - Емблематична поезія початку XVIII ст. на прикладі популярного видання «Іфіка Ієрополітика»
    (1712).
- section: 'Основний матеріал: II — Тваринні персонажі'
  words: 600
  points:
  - Використання анімалістичних образів (яструби, кокошки) як алегорій соціальних
    станів гетьманської України.
  - Прихована соціальна критика несправедливості та суспільних вад за допомогою маски
    бестіарію.
- section: 'Основний матеріал: III — Мовний аналіз та гумор'
  words: 600
  points:
  - Інтеграція живої народної лексики, колокіалізмів та приказок у староукраїнську
    книжну мову як форма культурного опору.
  - 'Педагогічна роль народного гумору: гумор як інструмент дидактики для кращого
    сприйняття та запам''ятовування.'
- section: 'Основний матеріал: IV — Зв''язок із байками Сковороди'
  words: 800
  points:
  - 'Трансформація жанру у «Байках Харківських» (1774) Григорія Сковороди: перехід
    від церковної моралі до світської філософії.'
  - Екзистенційні ідеї свободи та «сродної праці» на прикладі філософської байки про
    мудру Бджолу.
- section: 'Практика: I — Аналіз мови та колокіалізми'
  words: 500
  points:
  - Практичний розбір ідентифікації ідіоматичних висловів та елементів живої мови
    в текстах Радивиловського та Сковороди.
  - Робота з лексикою тогочасної доби для розуміння барокової орнаментальності та
    народних вкраплень.
- section: 'Практика: II — Трасування лексики'
  words: 400
  points:
  - Простеження еволюції питомої української лексики від барокових екземплумів до
    сучасної норми.
  - Оцінка впливу мовної стилістики байки на створення «Енеїди» Котляревського (1798).
- section: Підсумок
  words: 300
  points:
  - Історичне значення барокової байки як культурного мосту між елітарною книжністю
    та народною творчістю.
  - 'Спадщина жанру: ключова роль у збереженні української мови та формуванні нової
    української літератури.'
