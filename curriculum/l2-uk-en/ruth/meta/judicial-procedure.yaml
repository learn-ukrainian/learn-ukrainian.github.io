slug: judicial-procedure
title: Judicial Procedure
word_target: 5000
content_outline:
- section: 'Судова система Гетьманщини: Інституції'
  words: 800
  points:
  - 'Ієрархія судів: від сотенного до Генерального військового суду'
  - Роль Магдебурзького права в містах
  - Виборність суддів як демократична засада
  - Контраст з московською наказовою системою
- section: 'Початок процесу: Позов і Возний'
  words: 1000
  points:
  - 'Позов як ініціація справи: структура документа'
  - 'Інститут возного: ''око і вухо'' правосуддя'
  - Процедура вручення позову та складання реляції
  - 'Термінологія: ''чолобитник'', ''позваний'', ''протестація'''
- section: 'Читання: Текст Позови (Аналіз)'
  words: 600
  points:
  - Аналіз оригінального тексту (або реконструкції) позови XVII ст.
  - Канцелярські формули та етикет звертання
  - Граматичні особливості ділового стилю
- section: 'Народне правосуддя: Копний суд'
  words: 900
  points:
  - Копа як суд територіальної громади
  - Звичаєве право та його ритуали ('гоніння сліду')
  - Личкування (очна ставка) та присяга
  - Колективна відповідальність та ефективність копи
- section: 'Документація: Актові книги та Декрети'
  words: 900
  points:
  - Актові книги як джерело історії та мови
  - Структура судового декрету (вироку)
  - 'Мовний мікс: руська мова, польські терміни, латина'
  - Приклади справ з актових книг (побутові конфлікти, майнові спори)
- section: Судова реформа Кирила Розумовського
  words: 800
  points:
  - 'Мета реформи: повернення до ''старожитніх прав'' (Литовський статут)'
  - Відновлення земських, гродських та підкоморських судів (1760-1763)
  - Відокремлення судової влади від адміністративної
  - Історичне значення та наслідки ліквідації автономії
