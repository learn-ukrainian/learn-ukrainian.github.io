slug: the-resurrection
title: The Resurrection
word_target: 5000
content_outline:
- section: 'Вступ: Воскресіння як тріумф українського бароко'
  words: 400
  points:
  - Великдень як центральна подія літургійного року та барокового світогляду.
  - 'Оптимізм українського бароко: перемога життя над смертю (vanitas vs. gloria).'
  - 'Особливості святкування: синтез народних традицій та високої богословської думки.'
- section: 'Основний матеріал: I — Кирило Транквіліон-Ставровецький: Слово і Вогонь'
  words: 1000
  points:
  - '«Євангеліє Учительне» (1619): новаторство жанру та мови.'
  - 'Аналіз тексту «Похвала на пресвітлий день Воскресіння»: стилістика та лексика.'
  - 'Рецепція твору: засудження консерваторами та спалення книг у Москві (1627) як
    акт культурної агресії.'
  - Роль Ставровецького у наближенні богослов'я до мирян через «просту мову».
- section: 'Основний матеріал: II — Іоаникій Ґалятовський: Риторика «Ключа розуміння»'
  words: 1200
  points:
  - «Ключ розуміння» (1659) як підручник барокової проповіді.
  - 'Аналіз великодньої проповіді: структура (exordium, narratio, conclusio).'
  - Використання античних та апокрифічних джерел (пророцтва сивіл) — цитата про «Третєго
    дня...».
  - 'Риторичні фігури: метафори, антитези, алегорії у описі Воскресіння.'
- section: 'Основний матеріал: III — Антоній Радивиловський: Сад метафор'
  words: 1000
  points:
  - 'Збірка «Огородок Марії Богородиці» (1676): концепція «духовного саду».'
  - 'Природна символіка Воскресіння: весна, квіти, оновлення землі як алегорія духовного
    відродження.'
  - Порівняння стилю Радивиловського (ліризм) з Ґалятовським (схоластика).
  - 'Гуманістичний пафос: людина як вінець творіння, заради якої відбувається Воскресіння.'
- section: 'Основний матеріал: IV — Драма та візуальність: Театр смерті і життя'
  words: 800
  points:
  - 'Шкільна драма: театралізація догмату (містерії, діалоги, декламації).'
  - Алегоричні персонажі (Смерть, Пекло, Натура людська) у великодніх виставах.
  - 'Візуальна культура: гравюри стародруків (тема «Зходження в пекло»).'
  - 'Великодні вірші-орації спудеїв: зв''язок літератури з народним побутом.'
- section: 'Практика: Риторика та лексика Воскресіння'
  words: 300
  points:
  - 'Аналіз лексики: полонізми, латинізми та церковнослов''янізми у текстах про Воскресіння.'
  - Вправи на реконструкцію риторичних фігур (період, градація).
  - 'Робота з текстом: переклад фрагментів «простої мови» на сучасну українську.'
- section: 'Підсумок: Спадщина Великодньої проповіді'
  words: 300
  points:
  - Вплив барокових авторів на формування сучасної української літературної мови.
  - 'Тяглість традиції: від Могилянської доби до сучасності.'
  - Значення «київської вченості» для всієї Східної Європи.
