slug: genesis-creation
title: Genesis Creation
word_target: 5000
content_outline:
- section: 'Вступ: Книга Буття в українській духовній традиції'
  words: 400
  points:
  - Місце Книги Буття (Genesis) у системі сакральних текстів Київської митрополії.
  - Острозька Біблія 1581 року як еталонний текст церковнослов'янського 'Буття'.
  - Вплив передмов Франциска Скорини на розуміння тексту як джерела 'мудрості та науки'.
- section: 'Текстологія: Острозький канон проти вільного переказу'
  words: 600
  points:
  - Порівняльний аналіз тексту Буття 1:1-5 в Острозькій Біблії та пізніших переказах.
  - Роль Септуагінти у формуванні української редакції церковнослов'янської мови.
  - 'Лексичні пари: ''бездна/безодня'', ''твердь/небосхил'', ''вид/образ''.'
- section: 'Космогонія Шестоднєва: Дні I-III'
  words: 800
  points:
  - 'Розділення стихій: світло, вода, твердь. Архаїчна фізика в богословських текстах.'
  - 'Поняття ''тверді'' (firmamentum) у давньоукраїнській космології: кришталеве небо
    чи межа світів?'
  - Символіка Світла (Day 1) в полемічній літературі (світло істини vs темрява єресі).
- section: 'Космогонія Шестоднєва: Дні IV-VI'
  words: 800
  points:
  - 'Світила небесні: сонце, місяць та зорі як ''знамення'' (астрологія vs астрономія
    в Київській Русі та Гетьманщині).'
  - 'Класифікація тваринного світу: від ''китів великих'' до ''гадів земних''.'
  - Архаїчні назви тварин та їх етимологія в українській мові.
- section: 'Антропологія: Людина як вінець творіння'
  words: 800
  points:
  - 'Створення людини ''за образом і подобою'': гуманістичне прочитання в українському
    бароко.'
  - Концепція свободи волі та розуму як дарів Творця (на прикладі творів Петра Могили).
  - 'Жінка і чоловік: інтерпретації Буття 1:27 vs 2:22 у повчальній літературі.'
- section: 'Апокрифічна космологія: Палея Тлумачна'
  words: 600
  points:
  - Що таке 'Палея' і чому вона була популярнішою за чисту Біблію.
  - 'Легендарні деталі створення світу: боротьба з Сатанаїлом, створення Адама з різних
    стихій.'
  - Вплив народних вірувань на церковний текст.
- section: Відлуння Створення у бароковій поезії
  words: 600
  points:
  - Тема 'світу-театру' та 'світу-книги' у поетів XVII-XVIII ст. (І. Величковський).
  - Панегіричне використання образів Створення (гетьман як 'сонце', церква як 'небо').
  - 'Сковородинська інтерпретація: світ видимий і невидимий.'
- section: 'Підсумок: Спадщина давньої космології'
  words: 400
  points:
  - Тяглість космологічної лексики від Острозької Біблії до сучасних перекладів (Огієнко,
    Хоменко).
  - Значення біблійного міфу для формування української ідентичності ранньомодерного
    часу.
