slug: guardianship-ruth
title: Guardianship Ruth
word_target: 5000
content_outline:
- section: Вступ
  words: 300
  points:
  - 'Опіка як фундаментальний інститут шляхетського права: захист особи vs захист
    майна.'
  - 'Історичний контекст: небезпечне дитинство в ранньомодерну добу.'
  - 'Мета модуля: аналіз правових механізмів захисту сиріт у ВКЛ.'
- section: 'Основний матеріал: I — Правовий фундамент (Литовські Статути)'
  words: 800
  points:
  - Еволюція норм опіки від I до III Литовського Статуту (1529–1588).
  - 'Вікові межі повноліття: 18 років для юнаків (служба) та 15 для дівчат (шлюб).'
  - 'Категорії опікунів: природні (кревні) та призначені (тестаментарні/судові).'
  - 'Відмінність руського права від римського: роль роду.'
- section: 'Основний матеріал: II — Статус і обов''язки опікуна'
  words: 600
  points:
  - 'Вимоги до опікуна: «осілий» шляхтич, добра репутація, майнова спроможність.'
  - 'Обов''язок виховання: «в цнотах і науці» (освіта як вимога часу).'
  - 'Відповідальність: опікун не міг відчужувати нерухоме майно («отчизну»).'
  - 'Винагорода: чи була опіка оплачуваною? (Зазвичай ні, це був обов''язок честі).'
- section: 'Основний матеріал: III — Вдова як опікунка: Міфи та Реальність'
  words: 800
  points:
  - 'Деколонізація погляду на жінку: вдова як повноправний суб''єкт права («пані собі»).'
  - 'Умова збереження опіки: невступ у повторний шлюб.'
  - 'Конфлікт інтересів: вдова vs родина чоловіка (боротьба за контроль над дітьми).'
  - Роль матері у виборі освіти та шлюбних стратегій для дочок.
- section: 'Основний матеріал: IV — Тестаменти: Голос предків'
  words: 800
  points:
  - Тестамент як інструмент «посмертної влади» батька.
  - 'Аналіз формуляру: інвокація, визнання віри, розпорядження тілом, призначення
    опіки.'
  - 'Риторика прохання: звернення до впливових патронів (короля, магнатів) як «над-опікунів».'
  - 'Кейс-стаді: фрагменти тестаментів волинської шляхти (за Н. Старченко).'
- section: 'Основний матеріал: V — Майнові гарантії та Реєстри'
  words: 600
  points:
  - 'Інститут «реєстру» (інвентарю): захист від розкрадання.'
  - 'Що описували: від сіл і замків до ложок і сорочок (джерело історії побуту).'
  - Присутність «возного» та свідків як гарантія законності.
  - Відповідальність опікуна за прибутки («пожитки») з маєтку.
- section: 'Основний матеріал: VI — Судові конфлікти та зловживання'
  words: 600
  points:
  - '«Вовк в овечій шкурі»: коли опікун ставав грабіжником.'
  - 'Механізми судового захисту сиріт: скарги, протестації, «позови про кривду».'
  - Роль «приятелів» (родичів, сусідів) у контролі за опікуном.
  - Гучні справи про зловживання опікою в судах Волині та Київщини.
- section: 'Основний матеріал: VII — Термінологія та Мова документів'
  words: 600
  points:
  - 'Ключові терміни: *опіка, піклування, доживоття, віно, привінок*.'
  - 'Руська юридична мова: як канцеляризми XVI ст. вплинули на сучасну термінологію.'
  - Латинізми та полонізми в мові тестаментів (*куратор, тутор*).
  - 'Порівняння з сучасним Сімейним кодексом України: спадковість традиції.'
- section: Підсумок
  words: 500
  points:
  - Опіка як індикатор високої правової культури Русі-України.
  - Баланс приватного (інтерес роду) і публічного (контроль держави).
  - Значення архівних джерел (тестаментів, книг гродських) для реконструкції історії.
  - 'Фінальна думка: правова традиція ВКЛ як частина європейського простору.'
