slug: diplomatic-language
title: Diplomatic Language
word_target: 5000
content_outline:
- section: 'Вступ: Дипломатія як зброя'
  words: 400
  points:
  - Генеральна військова канцелярія як прообраз МЗС
  - Роль освіченої еліти (вихованці Києво-Могилянської академії)
  - Дипломатія як інструмент легітимізації нової держави
- section: 'Мовна мапа: Латина, Руська, Татарська'
  words: 600
  points:
  - Латина — мова спілкування з Європою (Швеція, Трансільванія)
  - Руська мова (староукраїнська) — мова внутрішнього діловодства та відносин з Москвою
  - Татарська та турецька — дипломатія Півдня
  - Польська мова як елемент шляхетської культури
- section: 'Канцелярська мова: Анатомія документа'
  words: 600
  points:
  - 'Структура дипломатичного акту: інвокація, інтитуляція, салютація'
  - Латинські запозичення в термінології (універсал, інструкція, меморіал)
  - 'Формули ствердження: корроборація та роль печатки'
- section: 'Універсали Хмельницького: Мова влади'
  words: 600
  points:
  - 'Аналіз універсалу 1650 року: стиль, лексика, тон'
  - Термінологія наказу та заборони («суворо розказуєм», «під караням горлом»)
  - 'Внутрішня дипломатія: заспокоєння суспільства та контроль території'
- section: 'Гадяцька угода 1658: Велике Князівство Руське'
  words: 600
  points:
  - Юридичне оформлення триалізму (Річ Посполита Трьох Народів)
  - Поняття «Велике Князівство Руське» та його межі
  - Політична лексика Юрія Немирича та Івана Виговського
- section: 'Дипломатія зі Сходом: Братство і Шерть'
  words: 500
  points:
  - Специфіка етикету у відносинах з Кримським ханством
  - Терміни «брат», «приятель», «союзник» у листуванні з ханами
  - Поняття «шерть» (присяга) та її значення
- section: 'Шведський вектор: Від Раднота до Полтави'
  words: 600
  points:
  - 'Раднотський договір 1656 року: геополітика Хмельницького'
  - 'Союз Мазепи та Карла XII: термінологія «протекції»'
  - Відмінність протекторату від інкорпорації в документах
- section: 'Конституція Пилипа Орлика 1710: Вершина стилю'
  words: 700
  points:
  - 'Преамбула: барокова риторика та історичне обґрунтування прав'
  - 'Юридична термінологія: «pacta et constitutiones»'
  - 'Визначення кордонів та прав станів: точність формулювань'
- section: 'Підсумок: Європейський контекст'
  words: 400
  points:
  - Тяглість української дипломатичної традиції
  - Інтегрованість Гетьманщини в європейський правовий простір
  - Значення збережених документів для сучасної історіографії
