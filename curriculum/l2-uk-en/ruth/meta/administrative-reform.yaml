slug: administrative-reform
title: Administrative Reform
word_target: 5000
content_outline:
- section: Вступ
  words: 400
  points:
  - 'Історичний контекст середини XVI ст.: потреба оборони від Москви та Татар.'
  - Криза старої системи управління ВКЛ та рух за «екзекуцію прав».
  - 'Мета реформ: уніфікація з Польщею задля посилення держави.'
- section: 'Основний матеріал: I — Територіальна реорганізація'
  words: 1000
  points:
  - 'Реформа 1565–1566 рр.: запровадження воєводсько-повітового устрою.'
  - Утворення Київського, Волинського та Брацлавського воєводств.
  - Роль повіту як базової адміністративної одиниці.
  - 'Урядники: воєвода, каштелян, староста — їхні функції та повноваження.'
- section: 'Основний матеріал: II — Судова реформа та сеймики'
  words: 1200
  points:
  - Більський привілей 1564 р. і відокремлення суду від адміністрації.
  - 'Судова тріада: земські (цивільні), гродські (кримінальні), підкоморські (межові)
    суди.'
  - Повітовий сеймик як орган шляхетського самоврядування.
  - 'Політична культура: обрання суддів та послів, написання інструкцій.'
- section: 'Основний матеріал: III — Другий Литовський Статут (1566)'
  words: 1000
  points:
  - Статут як правова основа реформ (т.зв. «Волинський статут»).
  - 'Аналіз мови Статуту: староукраїнська термінологія.'
  - 'Ключові правові норми: презумпція невинуватості шляхтича, майнові права.'
  - Рівність шляхти перед законом («шляхетська демократія»).
- section: 'Основний матеріал: IV — Люблінські гарантії 1569 року'
  words: 1000
  points:
  - Входження українських воєводств до складу Корони Польської.
  - 'Привілеї Сигізмунда II Августа: умови інкорпорації.'
  - 'Мовні гарантії: статус руської мови в діловодстві.'
  - 'Принцип «Indigenatus»: заборона надавати уряди чужинцям.'
- section: Підсумок
  words: 400
  points:
  - Значення реформ для формування політичної нації.
  - Інтеграція у західноєвропейський правовий простір.
  - Баланс між полонізацією еліт та збереженням автономії.
  - 'Спадщина: Литовський Статут діяв на Лівобережжі до XIX ст.'
