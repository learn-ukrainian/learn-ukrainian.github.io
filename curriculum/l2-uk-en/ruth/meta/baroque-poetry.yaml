slug: baroque-poetry
title: Baroque Poetry
word_target: 5000
content_outline:
- section: Вступ
  words: 600
  points:
  - Бароко як доба «гри розуму» та естетики здивування
  - 'Концепція «Liber Mundi» (Світ як Книга): пошук прихованих знаків'
  - 'Мистецтво як інтелектуальна вправа: роль дотепності (concetto)'
- section: 'Основний матеріал: I — Київська школа поетики'
  words: 1000
  points:
  - Києво-Могилянська академія як центр барокової культури
  - 'Курси піїтики: написання віршів як обов''язкова навичка еліти'
  - 'Співіснування мов: церковнослов''янська, латина, книжна українська'
  - Вплив західноєвропейських зразків (латинська та польська поезія)
- section: 'Основний матеріал: II — Іван Величковський і маніфест «Млеко»'
  words: 1200
  points:
  - 'Іван Величковський: пресвітер, поет, теоретик (біографічний нарис)'
  - 'Збірка «Млеко, од овці пастиру належноє» (1691): структура та мета'
  - 'Патріотичний мотив передмови: захист гідності «руської мови»'
  - 'Полеміка з іноземними авторами: українська мова здатна на витонченість'
- section: 'Основний матеріал: III — Візуальні та курйозні форми'
  words: 1400
  points:
  - 'Рак літеральний (паліндром): «Анна ми мати и та ми манна»'
  - 'Фігурні вірші: текст як зображення (хрест, чаша, яйце)'
  - 'Лабіринти та акровірші: читач як активний співавтор'
  - 'Ехо-вірші та хроновірші: звукова та цифрова гра'
  - 'Збірка «Зегар з полузегарком» (1693): тема часу (Vanitas)'
- section: Практика
  words: 400
  points:
  - 'Вправа: Розкодування барокового акровірша'
  - 'Аналіз вірша-рака: пряме та зворотне читання'
  - 'Творче завдання: пошук сучасних аналогів (візуальна поезія)'
- section: Підсумок
  words: 400
  points:
  - 'Спадщина українського бароко: інтелектуалізм та формальна досконалість'
  - 'Культурний експорт: вплив київської школи на східнослов''янський світ'
  - Зв'язок з модерною українською поезією (авангард, нью-йоркська група)
