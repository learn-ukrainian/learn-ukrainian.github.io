slug: fedorovych-bukvar
title: Fedorovych Bukvar
word_target: 5000
content_outline:
- section: 'Вступ: Деколонізація міфу про «першодрукаря»'
  words: 450
  points:
  - Спростування російського/радянського імперського наративу про Федорова як «засновника»
    друкарства на українських землях.
  - 'Історичні докази існування друкарства до 1574 року: діяльність Степана Дропана
    (1460, Львів) та Швайпольта Фіоля (1491, Краків).'
  - 'Аналіз знаменитого напису на надгробку Федоровича: «Друкованіє занедбалоє обновил»
    — як свідчення відродження, а не створення з нуля.'
- section: 'Вступ: Шлях до Львова'
  words: 450
  points:
  - 'Європейський бекграунд майстра: ймовірне навчання в Ягеллонському університеті
    в Кракові під іменем Johannes Theodori.'
  - 'Причини залишення Москви: конфлікт із консервативним середовищем переписувачів,
    які вороже сприймали технологічні інновації.'
  - 'Зміна ідентичності: трансформація з московського маргінального «сина Федора»
    на респектабельного «Івана Федоровича» у Великому князівстві Литовському.'
- section: 'Вступ: Львівський контекст'
  words: 400
  points:
  - 'Прибуття до Львова у 1572 році: вибір ренесансного, багатонаціонального міста
    з високим рівнем толерантності.'
  - 'Нова модель меценатства: підтримка не з боку царя чи монарха, а від локального
    українського міщанства, ремісників та духовенства (монастир св. Онуфрія).'
  - Формування у Львові першої постійно діючої української друкарні.
- section: 'Основний матеріал: Структура першого підручника'
  words: 500
  points:
  - 'Загальна характеристика «Букваря» 1574 року: перший друкований підручник для
    східних слов''ян.'
  - 'Фізичні параметри та верстка: формат вісімки, 80 сторінок (40 аркушів), відсутність
    традиційного титульного аркуша.'
  - 'Педагогічна структура «від простого до складного»: подача кириличної абетки (45
    літер), вправи з дволітерними та трилітерними складами.'
- section: 'Основний матеріал: Від азбуки до граматики'
  words: 500
  points:
  - 'Інноваційність видання: перехід від простого заучування літер до азів граматики
    (наприклад, зразки відмінювання дієслова «бути»).'
  - 'Читанка: тексти для читання, що складаються з молитов, біблійних уривків та моралізаторських
    повчань, типових для XVI століття.'
  - Використання азбучного акровірша як мнемонічного інструменту для легшого запам'ятовування
    літер.
- section: 'Основний матеріал: Післямова як маніфест'
  words: 500
  points:
  - 'Аналіз тексту колофону (післямови): унікальний приклад світської, авторської
    публіцистики ранньомодерної доби.'
  - 'Ключова мета видання, виражена знаменитою цитатою: «…ради скорого младенческаго
    наученія».'
  - Відмова Федоровича від особистої слави на користь демократизації освіти для «руського
    народу».
- section: 'Практика: Естетика ренесансного друку'
  words: 450
  points:
  - 'Візуальне оформлення: використання ренесансних орнаментів, заставок та кінцівок
    із характерним рослинним плетивом.'
  - 'Аналіз шрифту: використання виразного півуставу, ідентичного тому, яким був надрукований
    львівський «Апостол» того ж року.'
  - 'Символізм геральдики: розміщення на останній сторінці герба міста Львова та особистого
    знаку Федоровича (на базі шляхетського герба «Шренява»).'
- section: 'Практика: Лексика друкарства'
  words: 400
  points:
  - 'Формування специфічної української друкарської термінології у XVI столітті: «шрифт»,
    «набір», «верстат», «колофон».'
  - 'Порівняльне читання: візуальні відмінності між літерами з Букваря Федоровича
    та сучасною українською графікою (зниклі літери, лігатури).'
  - Практичне застосування професійної лексики в контексті культурної історії.
- section: 'Практика: Друк як технологія суверенітету'
  words: 450
  points:
  - 'Злам епох: перехід від монополії церкви та еліт на знання (дорогі рукописні фоліанти)
    до масової, доступної освіти (дешевий друкований буквар).'
  - 'Друк як культурна зброя: значення поширення стандартизованих текстів в умовах
    наростаючого тиску полонізації в Речі Посполитій.'
  - Вплив технології на формування ранньої національної та конфесійної свідомості.
- section: 'Підсумок: Спадщина Львівської друкарні'
  words: 450
  points:
  - 'Львівський Буквар як прототип: його вплив на структуру Острозької азбуки (1578)
    та наступних поколінь підручників.'
  - 'Зв''язок із братським рухом: підручник Федоровича став фундаментальною базою
    для шкільної освіти братств по всій Україні.'
  - 'Феномен збереження: унікальна історія єдиного вцілілого примірника Букваря, віднайденого
    в Римі у 1927 році (нині в бібліотеці Гарварду).'
- section: 'Підсумок: Шлях до Острозької Біблії'
  words: 450
  points:
  - 'Наступний етап діяльності: перехід під патронат могутнього князя Костянтина Острозького.'
  - 'Еволюція масштабу: від базового дитячого підручника до створення монументального
    шедевра — Острозької Біблії (1581).'
  - Фінальний акорд життя у Львові (1583) та утвердження його постаті як великого
    реформатора українського книгодрукування.
