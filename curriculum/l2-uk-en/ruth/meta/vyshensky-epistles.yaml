slug: vyshensky-epistles
title: Vyshensky Epistles
word_target: 5000
content_outline:
- section: Вступ
  words: 300
  points:
  - Іван Вишенський — «афонський старць» і голос сумління епохи
  - 'Історичне тло: криза православ''я кінця XVI ст. та Берестейська унія'
  - 'Унікальність постаті: поєднання середньовічного аскетизму та барокової пристрасті'
- section: 'Основний матеріал: I — Біографічний контекст і Афон'
  words: 600
  points:
  - 'Шлях із Галичини на Афон: відмова від світу заради істини'
  - 'Структура «Книжки» (1600): послання як зброя духовного опору'
  - 'Візит в Україну (1604-1606): конфлікт ідеалу з реальністю'
  - Легенда про печерний затвор і смерть подвижника
- section: 'Основний матеріал: II — Мовний дуалізм і сакральність'
  words: 700
  points:
  - 'Мовна концепція Вишенського: церковнослов''янська як «двері до неба»'
  - Критика «простої мови» в сакральних текстах (попри її використання в полеміці)
  - 'Антилатинський пафос: латина як носій єресі та «хитрощів світу цього»'
  - 'Парадокс стилю: творення живої книжної української мови через заперечення її
    статусу'
- section: 'Основний матеріал: III — Послання до єпископів (Соціальна критика)'
  words: 800
  points:
  - 'Контекст появи: зрада пастирів та перехід в унію'
  - 'Риторика контрасту: розкіш владик проти бідності Христа'
  - 'Соціальний вимір: захист «бідних підданих» від феодального гніту церкви'
  - 'Аналіз уривків: метафора «вовків у овечій шкурі»'
- section: 'Основний матеріал: IV — Послання до Домнікії (Аскетичний ідеал)'
  words: 700
  points:
  - Адресат і прихований опонент (Юрій Рогатинець)
  - 'Велика дискусія епохи: особисте спасіння (пустельництво) чи громадське служіння
    (братства)'
  - 'Аргументація Вишенського: світ як пастка, яку неможливо виправити, лише покинути'
  - Роль жінки-адресата в структурі послання
- section: 'Основний матеріал: V — Барокова поетика і риторика'
  words: 700
  points:
  - Стилістика «плетіння словес» та емоційна напруга
  - 'Риторичні фігури: нагромадження, градація, анафора'
  - Сатира та гротеск у змалюванні опонентів
  - Вишенський як предтеча українського літературного Бароко
- section: Спадщина та вплив
  words: 400
  points:
  - 'Вплив на сучасників: авторитет афонського старця'
  - Забуття у XVIII ст. та відродження завдяки Івану Франку
  - Актуальність етичної позиції Вишенського в сучасному світі
- section: Практика
  words: 500
  points:
  - 'Аналіз уривка з «Послання до єпископів»: пошук риторичних фігур'
  - 'Робота з лексикою: ідентифікація полонізмів, слов''янізмів та живої мови'
  - 'Дискусійне питання: хто правий — Вишенський чи Рогатинець?'
- section: Підсумок
  words: 300
  points:
  - Іван Вишенський як символ духовної безкомпромісності
  - Синтез традиції (православ'я) та новаторства (бароковий стиль)
  - Значення для формування української ідентичності ранньомодерного часу
