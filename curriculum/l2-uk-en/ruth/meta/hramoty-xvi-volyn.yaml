slug: hramoty-xvi-volyn
title: Hramoty Xvi Volyn
word_target: 5000
content_outline:
- section: 'Вступ: I — Волинь у XVI столітті'
  words: 400
  points:
  - Геополітичне становище Волині між Великим князівством Литовським та Короною Польською.
  - Вплив Люблінської унії (1569) на адміністративний та мовний статус регіону.
  - Роль волинської шляхти у збережені статусу руської (староукраїнської) мови в судах.
- section: 'Вступ: II — Регіональна ідентичність'
  words: 350
  points:
  - Руська мова як ключовий маркер регіональної автономії та ідентичності.
  - Правова культура Волині, що базувалася на Литовських статутах.
  - Володимирські та луцькі гродські суди як осередки писемної традиції.
- section: 'Основний матеріал: I — Читання волинських грамот'
  words: 500
  points:
  - Аналіз типових формул («визнаваю тим моїм листом») та ділового етикету.
  - Поєднання книжних традицій з елементами народно-розмовної мови.
  - 'Соціальна структура в текстах: згадки про князів, зем''ян, урядників та міщан.'
- section: 'Основний матеріал: II — Галицькі та київські паралелі'
  words: 500
  points:
  - Порівняння волинських документів з галицькими актами (різний ступінь латинсько-польського
    впливу).
  - Співвіднесення з київськими грамотами та специфічними східними діалектними вкрапленнями.
  - Існування поліцентричної канцелярської руської мови.
- section: 'Основний матеріал: III — Польські впливи'
  words: 500
  points:
  - Проникнення полонізмів у термінологію та синтаксис після 1569 року.
  - 'Адаптація запозичень: впливи не руйнували українську основу, а збагачували юридичний
    лексикон.'
  - Спростування міфів про повну полонізацію діловодства у XVI столітті.
- section: 'Основний матеріал: IV — Земельні акти'
  words: 500
  points:
  - 'Специфіка майнових документів: дарчі, купчі, заставні та мінові записи.'
  - Фіксація багатої волинської топоніміки та мікротопоніміки.
  - Соціально-економічні терміни землеволодіння шляхетського стану.
- section: 'Основний матеріал: V — Сімейне право'
  words: 500
  points:
  - Духовниці (заповіти) як джерело не лише правової, а й духовної культури (пожертви).
  - 'Вінові записи: правовий та економічний статус жінки в українському суспільстві.'
  - Розподіл спадщини («дільчі записи») та захист сімейних прав.
- section: 'Практика: I — Волинські діалектні риси'
  words: 450
  points:
  - 'Виявлення специфічних фонетичних рис: повноголосся, рефлекси давніх голосних.'
  - Морфологічні особливості (напр., закінчення давального відмінка -ови/-еви).
  - Віддзеркалення живої розмовної мови в канцелярському тексті.
- section: 'Практика: II — Юридична термінологія'
  words: 450
  points:
  - 'Аналіз староукраїнської термінології: «копа грошей», «віно», «заклад», «тестамент».'
  - Міжрегіональний вимір термінів у межах руського права.
  - Етимологія та значення ключових економічних понять.
- section: 'Практика: III — Автентифікація документів'
  words: 350
  points:
  - 'Механізми надання юридичної сили: печатки, підписи «людей віри гідних».'
  - Процедура внесення актів до гродських і земських книг.
  - 'Особливості палеографії: український скоропис XVI століття.'
- section: 'Підсумок: Українська мовна єдність'
  words: 500
  points:
  - Волинські грамоти як свідчення розвиненої української державної та правової мови.
  - Регіональне розмаїття (діалектні риси) підтверджує природність, а не штучність
    мови.
  - 'Деколонізаційний висновок: спростування імперської концепції «западнорусского
    языка».'
