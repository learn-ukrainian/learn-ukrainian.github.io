slug: the-seim
title: The Seim
word_target: 5000
content_outline:
- section: 'Вступ: Руська шляхта в політичній системі Речі Посполитої'
  words: 400
  points:
  - Вальний сейм як 'політичний театр' барокової доби
  - 'Структура трьох станів: Король, Сенат, Посольська Ізба'
  - Місце руських воєводств (Київське, Волинське, Брацлавське) у цій системі
- section: 'Сеймики: Фундамент шляхетської демократії'
  words: 800
  points:
  - Повітові сеймики та Генеральний сеймик у Вишні
  - Процедура обрання послів (депутатів)
  - 'Імперативний мандат: відповідальність посла перед шляхтою свого повіту'
- section: 'Документ: Сеймова інструкція (Instrukcja)'
  words: 800
  points:
  - 'Структура інструкції: від вітання короля до локальних вимог'
  - Роль інструкцій у формуванні порядку денного Вального сейму
  - Приклад вимог Волинського сеймику (захист православ'я, податки, оборона)
- section: 'Аналіз артефакту I: Промова Лаврентія Древинського (1620)'
  words: 800
  points:
  - 'Контекст: відновлення православної ієрархії та боротьба за визнання'
  - 'Риторичні фігури: персоніфікація Церкви як ''матері у кайданах'''
  - 'Аналіз барокового стилю: емоційність, контрасти, апеляція до сумління'
- section: 'Аналіз артефакту II: Адам Кисіль і риторика компромісу'
  words: 800
  points:
  - Адам Кисіль як останній великий руський сенатор
  - 'Аналіз промови 1641 року: попередження про козацьку силу'
  - Аргументація через 'bonum publicum' (спільне благо) та загрозу громадянської війни
- section: 'Політична культура: Згода і Вето'
  words: 600
  points:
  - Принцип 'Nihil novi' (Нічого нового) як запобіжник тиранії
  - 'Liberum Veto: не як анархія, а як захист прав меншості (руської/православної)'
  - Поняття 'Exorbittancja' (порушення закону) та право на опір
- section: 'Термінологія: Від ''Ляудум'' до ''Ухвали'''
  words: 400
  points:
  - 'Етимологія та вживання термінів: laudum (ухвала сеймику), konstytucja (закон
    сейму)'
  - 'Канцелярська мова: руська (староукраїнська) vs польська в діловодстві'
  - 'Сучасні паралелі: як ці терміни живуть у Верховній Раді України'
- section: 'Підсумок: Спадщина шляхетського парламентаризму'
  words: 400
  points:
  - Вплив сеймової культури на козацьку державність (Гетьманщину)
  - Відмінність української політичної традиції від московського самодержавства
  - 'Урок для сучасності: важливість процедури та захисту прав меншості'
