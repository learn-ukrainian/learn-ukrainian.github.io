slug: criminal-law-murder
title: Criminal Law Murder
word_target: 5000
content_outline:
- section: 'Вступ: Від приватної помсти до публічного покарання'
  words: 400
  points:
  - Evolution from Ruska Pravda's 'blood feud' to Statute law
  - Crime as a violation of 'Gemskyi Myr' (Public Peace)
  - The role of the Grand Duchy of Lithuania in legal codification
- section: 'Термінологія злочину: Мужобойство та Забойство'
  words: 600
  points:
  - 'Philological analysis of terms: ''Мужобойство'', ''Забойство'', ''Вбивство'''
  - 'Linguistic features of legal Ruthenian: ''о горло приправиль'''
  - Distinction between killing (act) and murder (crime)
- section: 'Головщина: Економіка смерті та соціальна ієрархія'
  words: 800
  points:
  - Definition of 'Головщина' (Wergild) as the price of a head
  - 'The Tariff of 1588: 100 kop (noble) vs 24 kop (peasant) vs 12 kop (artisan)'
  - 'Gender aspect: Evaluation of female life in the Statutes'
  - Concept of 'Нав'язка' (additional fine for wounds/insult)
- section: 'Види вбивства: Умисел, Необережність та Оборона'
  words: 800
  points:
  - Legal criteria for 'Умисне вбивство' (Premeditated)
  - '''Необережне вбивство'' (Negligent) and ''Випадкове'' (Accidental)'
  - The burden of proof for Self-Defense ('Оборона')
  - 'Case study: Hunting accidents and legal liability'
- section: 'Процесуальні аспекти: ''На гарячій крові'''
  words: 600
  points:
  - Concept of 'in flagrante delicto' (На гарячій крові)
  - 'Procedural consequences: Immediate arrest and expedited trial'
  - The role of the 'Возний' and 'Свідки' in documenting the crime scene
  - Torture ('Проби') as a method of extracting confession (limitations)
- section: 'Покарання: Між ''Горлом'' та ''Вежею'''
  words: 600
  points:
  - 'Capital punishment (''Карати горлом''): Decapitation vs Hanging (class distinction)'
  - Imprisonment ('Вежа') as a temporary or alternative measure
  - Banishment ('Баніція') and loss of civil rights ('Честь')
  - Property confiscation logic
- section: 'Аналіз першоджерела: Литовський Статут 1588 року (Розділ XI)'
  words: 800
  points:
  - 'Close reading of Article 1: ''О головщинах шляхетских'''
  - Syntactic structures of 16th-century Chancery Ruthenian
  - 'Comparative analysis: Ruthenian legal terms vs Modern Ukrainian'
  - 'Paleographic commentary: How these texts looked physically'
- section: 'Підсумок: Правова культура Гетьманщини як спадкоємиця'
  words: 400
  points:
  - Transition of Statute law into the Cossack Hetmanate (17th-18th c.)
  - The myth of 'lawlessness' vs the reality of strict legalism
  - Legacy of Ruthenian criminal law in modern Ukrainian jurisprudence
