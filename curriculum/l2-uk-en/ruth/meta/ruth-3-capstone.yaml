slug: ruth-3-capstone
title: Ruth 3 Capstone
word_target: 5000
content_outline:
- section: 'Вступ: Світ як театр і поле битви'
  words: 600
  points:
  - 'Бароковий світогляд: концепції Vanitas (марність) та Theatrum Mundi (світ-театр).'
  - 'Людина бароко: між екстазом віри та жахом смерті; постійна напруга протилежностей.'
  - 'Література як інструмент впливу: слово не просто описує, воно змінює реальність
    і спасає душу.'
  - 'Місце українського бароко в європейському контексті: синтез візантійської духовності
    та західної латинської ученості.'
- section: 'Анатомія жанрів: I — Панегірик як зброя легітимності'
  words: 800
  points:
  - 'Визначення та функція панегірика: не лестощі, а утвердження соціального і політичного
    статусу еліти (духовенства, козацької старшини).'
  - 'Геральдична поезія: вірші на герби як специфічний український різновид панегірика;
    розкодування символів влади.'
  - 'Топоси вихваляння: порівняння з античними героями (Ахілл, Гектор) та біблійними
    пророками.'
  - 'Приклад: ''Просфоніма'' (1591) — маніфест культурного відродження та єдності
    навколо Церкви.'
- section: 'Анатомія жанрів: II — Лямент як національний катарсис'
  words: 800
  points:
  - 'Естетика страждання: жанр ляменту (треносу) у давній літературі; від фольклорних
    голосінь до високої поезії.'
  - 'Топос ''Ubi sunt?'' (Де вони є?): філософські роздуми про тлінність слави та
    багатства.'
  - 'Колективна травма: ляменти описують не лише особисте горе, а й трагедії народу
    (війни, руїна, релігійні утиски).'
  - 'Емоційний спектр: від тихого смутку до гнівного звинувачення небес і людей.'
- section: 'Мелетій Смотрицький: Плач, що змінив історію'
  words: 1000
  points:
  - 'Історичний контекст ''Треносу'' (1610): криза після Берестейської унії та боротьба
    за права православної церкви.'
  - 'Образ Матері-Церкви: геніальна персоніфікація, що перетворює богословську суперечку
    на родинну драму (''Горе мені, покинутій...'').'
  - 'Риторична майстерність Смотрицького: використання античних та біблійних алюзій
    для створення ефекту ''високого стилю''.'
  - 'Резонанс твору: чому ''Тренос'' став маніфестом покоління і викликав лють королівської
    влади.'
- section: 'Києво-Могилянська поетика: Лабораторія смислів'
  words: 800
  points:
  - 'Академія як центр словесності: курси поетики та риторики як основа освіти української
    еліти.'
  - 'Теорія ''дотепності'' (acumen): вміння знаходити неочевидні зв''язки між речами
    (кончетизм).'
  - 'Лазар Баранович: архієпископ-поет; монументальність стилю, поєднання політики
    та проповіді (''Труби словес'').'
  - 'Іван Величковський і курйозна поезія: раки, лабіринти, фігурні вірші як пошук
    божественного порядку в хаосі слів.'
- section: 'Майстерня барокового автора: Практикум'
  words: 600
  points:
  - 'Як написати бароковий текст сьогодні: алгоритм створення панегірика або ляменту.'
  - 'Крок 1: Inventio (винахід) — пошук теми та ключової метафори (наприклад, Гетьман
    як Сонце).'
  - 'Крок 2: Dispositio (розташування) — структура: вступ (exordium), виклад (narratio),
    докази (probatio), пафос (peroratio).'
  - 'Крок 3: Elocutio (висловлення) — насичення тексту тропами: гіперболи, оксиморони,
    риторичні запитання.'
- section: 'Підсумок: Спадщина українського бароко'
  words: 400
  points:
  - 'Бароко як ''золота доба'' української культури: формування національної ідентичності
    через слово.'
  - 'Тяглість традиції: вплив барокової риторики на літературу XIX-XX ст. (від Котляревського
    до постмодерністів).'
  - 'Завершення фази: від релігійної полеміки до козацького літописання (місток до
    наступних модулів).'
