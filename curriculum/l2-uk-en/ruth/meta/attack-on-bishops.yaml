slug: attack-on-bishops
title: Attack On Bishops
word_target: 5000
content_outline:
- section: Вступ
  words: 400
  points:
  - 'Історичний фон кінця XVI століття: Річ Посполита після Люблінської унії.'
  - 'Стан Київської митрополії: криза ієрархії та пошук реформ.'
  - 'Два шляхи виходу з кризи: братський рух (знизу) та унія (зверху).'
- section: 'Основний матеріал: I — Криза та передумови унії'
  words: 800
  points:
  - Занепад Константинопольського патріархату та його вплив на Київ.
  - 'Мотиви єпископів (Балабан, Потій, Терлецький): бажання рівноправності з католицьким
    кліром.'
  - Таємні переговори з королем Сигізмундом III та Римом (1590-1595).
  - 'Роль князя Костянтина Острозького: від підтримки до опозиції.'
- section: 'Основний матеріал: II — Берестейський собор 1596 року'
  words: 800
  points:
  - 'Сценарій собору: розкол на два табори (православний та уніатський).'
  - Проголошення унії та взаємні анафеми.
  - 'Юридичні наслідки: оголошення православ''я поза законом.'
  - 'Початок ''Руїни'' в церковному житті: боротьба за храми та кафедри.'
- section: 'Основний матеріал: III — Полемічний вибух: Іван Вишенський'
  words: 1000
  points:
  - Іван Вишенський як голос 'мовчазної' церкви.
  - 'Аналіз ''Послання до єпископів'': метафора ''вовків в овечих шкурах''.'
  - 'Соціальний аспект критики: єпископи-феодали проти бідного люду.'
  - 'Стилістика Вишенського: ''м''язиста'' мова, бароковий емоційний натиск.'
- section: 'Основний матеріал: IV — Уніатська відповідь: Іпатій Потій'
  words: 800
  points:
  - Іпатій Потій — архітектор унії та талановитий полеміст.
  - 'Аргументи ''за'': відновлення єдності Вселенської церкви.'
  - Критика 'хлопського неуцтва' та протестантських впливів у православ'ї.
  - 'Полемічний стиль Потія: логіка, богословська ерудиція, іронія.'
- section: 'Основний матеріал: V — Мовні особливості полемічної літератури'
  words: 800
  points:
  - 'Народження нової літературної мови: синтез церковнослов''янської та руської народної.'
  - 'Риторичні прийоми бароко: invective (лайка), questions, exclamations.'
  - 'Термінологічна війна: хто є істиною ''Руссю''?'
  - Вплив полеміки на розвиток національної самосвідомості.
- section: Практика
  words: 200
  points:
  - Аналіз уривків з Вишенського (ідентифікація риторичних фігур).
  - Порівняння аргументів православних та уніатів.
  - Етимологічний розбір ключових понять (унія, схизма, апостат).
- section: Підсумок
  words: 200
  points:
  - Берестейська унія як каталізатор національно-культурного відродження.
  - Розкол як трагедія і як стимул для розвитку.
  - Спадщина полемічної літератури для сучасної української культури.
