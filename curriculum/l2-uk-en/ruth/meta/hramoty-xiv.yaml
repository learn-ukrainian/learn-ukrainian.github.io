slug: hramoty-xiv
title: Hramoty Xiv
word_target: 5000
content_outline:
- section: 'Вступ: Історичний контекст XIV століття'
  words: 500
  points:
  - Занепад Русі-України та формування нових політичних центрів (Галичина, Волинь,
    Литва, Польща).
  - Статус руської (староукраїнської) мови як мови дипломатії, закону та управління
    на цих територіях.
- section: 'Вступ: Мовна ситуація та поява ділового стилю'
  words: 500
  points:
  - 'Подолання диглосії: відмежування ділової (світської) мови від книжної церковнослов''янської.'
  - Діловий стиль як місток між формальними юридичними формулами та живим народним
    мовленням.
- section: 'Основний матеріал: Грамота князя Любарта (1341 рік)'
  words: 600
  points:
  - 'Найдавніша збережена русько-українська грамота: обставини написання та адресати
    (торунські купці).'
  - 'Аналіз вступу грамоти: «Милостию Божею... я Любартъ Кгедеминовичъ...».'
  - Збереження державно-правової традиції Києва у Волинському князівстві.
- section: 'Основний матеріал: Акти Казимира III та двомовність'
  words: 500
  points:
  - Використання староукраїнської мови польським королем Казимиром III для легітимізації
    влади в Галичині (після 1349).
  - Паралельне функціонування латини та руської мови в королівських канцеляріях.
- section: 'Основний матеріал: Приватні акти (Купча 1359 року)'
  words: 600
  points:
  - Проникнення живої народної мови у приватні документи на прикладі Перемишльської
    купчої Петра Радціовського.
  - 'Деталізація побуту: маєтності, дідицтво, вотнина.'
  - Особливості фіксації угод «при людях» (свідках).
- section: 'Основний матеріал: Фонетичні інновації живого мовлення'
  words: 600
  points:
  - Фіксація занепаду зредукованих [ь] та [ъ] та поява нових закритих складів.
  - Початкові стадії ікавізму (подовження/лабіалізація перед переходом в [і]).
  - Еволюція «ятя» (ѣ) та ствердіння приголосних перед [е], [и].
- section: 'Основний матеріал: Морфологія — становлення українських форм'
  words: 600
  points:
  - 'Яскраві маркери: давальний відмінок на -ові/-еві (князеві, панові).'
  - Орудний відмінок на -ою/-ею (землею, водою) та закріплення кличного відмінка.
  - 'Дієслівні форми: 1-ша особа множини на -мо (даємо), інфінітиви на -ти (писати).'
- section: 'Практика: Палеографія та структура документа'
  words: 500
  points:
  - 'Основи палеографії XIV століття: устав, напівустав, титли.'
  - 'Аналіз традиційної структури грамоти: інвокація, інтитуляція, диспозиція, санкція,
    корроборація.'
- section: 'Практика: Сталість юридичної термінології'
  words: 300
  points:
  - 'Етимологія та значення слів: грамота, свідок, присяга, маєтність.'
  - Порівняння термінології XIV століття із сучасним українським законодавством (тяглість
    права).
- section: 'Підсумок: Безперервність української мовної традиції'
  words: 300
  points:
  - Спростування міфів про відсутність української писемності до 1798 року.
  - Грамоти як фундамент для майбутніх Литовських Статутів та доказ безперервного
    розвитку мови.
