slug: pedagogy-brotherhood
title: Pedagogy Brotherhood
word_target: 5000
content_outline:
- section: 'Вступ: Освіта як поле битви'
  words: 400
  points:
  - 'Контекст XVI ст.: Реформація, Контрреформація та експансія єзуїтських колегіумів.'
  - 'Криза православної освіти: брак кадрів і загроза асиміляції еліти.'
  - Братства як феномен міщанського самоврядування та їхня освітня місія.
  - 'Мета братської школи: дати освіту європейського рівня, але на національній основі.'
- section: Львівська школа і Статут 1586 року
  words: 600
  points:
  - Заснування Львівської братської школи (1586) — першої школи нового типу.
  - 'Аналіз «Порядку шкільного»: унікальна пам''ятка педагогічної думки.'
  - 'Принцип демократизму: рівність учнів незалежно від статків («богатий над убогим
    в школі нічим вишшим не має бити»).'
  - 'Вимоги до дидаскала (вчителя): моральний авторитет і фаховість.'
  - 'Організація навчання: класно-урочна система, іспити, шкільне самоврядування.'
- section: 'Навчальна програма: Сім вільних мистецтв'
  words: 500
  points:
  - Адаптація античної системи «septem artes liberales».
  - 'Тривіум (trivium): граматика (ключ до наук), риторика (мистецтво слова), діалектика
    (мистецтво мислення).'
  - 'Квадривіум (quadrivium): арифметика, геометрія, астрономія, музика.'
  - Особлива роль церковного співу та музичної освіти.
- section: 'Мовне питання: Еволюція трьох мов'
  words: 450
  points:
  - 'Концепція тримовності: грецька (джерела віри), слов''янська (літургія), латина
    (наука/політика).'
  - 'Суперечка про латину: спочатку сприймалася як «єресь», згодом — як необхідна
    зброя («латиною з латинянами боротися»).'
  - Руська мова (vernacular) як допоміжний засіб навчання.
- section: Підручник «Адельфотес» (1591)
  words: 550
  points:
  - «Адельфотес» (Братство) — маніфест філологічної компетентності.
  - 'Структура: паралельний текст грецькою та церковнослов''янською.'
  - 'Чотири частини граматики: орфографія, просодія, етимологія, синтаксис.'
  - 'Значення: утвердження граматичної термінології та рівноправності слов''янської
    мови.'
- section: Граматика Лаврентія Зизанія (1596)
  words: 450
  points:
  - Вільнюська школа і роль братів Зизаніїв.
  - «Грамматіка словенска» — спроба систематизації.
  - «Лексис» — перший друкований церковнослов'янсько-український словник.
  - 'Методика: пояснення складних термінів простою мовою («речення», «кома», «крапка»).'
- section: 'Граматика Мелетія Смотрицького (1619): Кодифікація'
  words: 700
  points:
  - «Грамматіка» Смотрицького як вершина староукраїнської філології.
  - 'Нормативна база: введення літери «ґ», правила наголосу, відмінювання, синтаксису.'
  - Узаконення орудного відмінка (якого не було в грецьких взірцях).
  - Виокремлення дієприслівника як форми дієслова.
  - 'Історичне значення: підручник для всієї Slavia Orthodoxa на 150 років.'
- section: 'Барокова педагогіка: Драма і Риторика'
  words: 500
  points:
  - Риторика як інструмент публічного впливу та полеміки.
  - 'Шкільна драма (шкільний театр): навчання через дію.'
  - 'Жанри: містерії, мораліте, діалоги, панегірики, інтермедії.'
  - Декламації як спосіб вивчення мови та ораторського мистецтва.
- section: 'Київський синтез: Від школи до Академії'
  words: 450
  points:
  - Заснування Київської братської школи (1615) на Подолі.
  - Роль Петра Сагайдачного та Війська Запорозького.
  - 'Реформа Петра Могили (1632): об''єднання з Лаврською школою.'
  - Створення Колегіуму західного зразка (пізніше Академії).
- section: 'Підсумок: Інтелектуальний суверенітет'
  words: 400
  points:
  - Братські школи як фундамент української національної ідентичності.
  - Створення власної інтелектуальної еліти, здатної конкурувати з Заходом.
  - Українська освіта як донор для Східної Європи (експорт кадрів у Московію).
  - 'Спадщина: від Статуту 1586 до Києво-Могилянської академії.'
