slug: poeziia-baroko
title: Poeziia Baroko
word_target: 5000
content_outline:
- section: 'Вступ: I — Бароко як європейський феномен'
  words: 600
  points:
  - 'Контекст епохи бароко в Європі: перехід від ренесансної ясності до складності,
    емблематичності та гри розуму.'
  - Українська література як органічна частина європейського культурного простору.
  - Спростування міфу про «відсталість» чи провінційність української літератури XVII
    століття.
- section: 'Вступ: II — Багатомовність і вибір української'
  words: 500
  points:
  - 'Феномен полілінгвізму: українські автори одночасно творили латиною, польською
    та книжною українською («руською») мовами.'
  - Свідомий вибір української мови для написання високої поезії, що доводить її статус
    як повноцінної літературної мови.
- section: 'Основний матеріал: I — Силабічний вірш і братські школи'
  words: 700
  points:
  - 'Характеристика силабічного віршування: рівна кількість складів (зазвичай 13),
    цезура, парне римування.'
  - Роль братських шкіл (зокрема Київської) як центрів розвитку піїтики.
  - Декламація поезій спудеями як елемент барокової театральності.
  - 'Поширені жанри: епіграми, акровірші, геральдичні вірші (поезія на герб).'
- section: 'Основний матеріал: II — Панегірики та Касіян Сакович'
  words: 800
  points:
  - Аналіз «Віршів на жалісний погреб... Петра Конашевича-Сагайдачного» (1622).
  - Концептуалізація запорозького козацтва як лицарського стану (ordo equestris) європейського
    зразка.
  - Мотив служіння Вітчизні та «золотої вольності», здобутої кров'ю.
- section: 'Основний матеріал: III — Філософська лірика Лазаря Барановича'
  words: 800
  points:
  - Постать Лазаря Барановича як представника зрілого бароко та лідера «Чернігівських
    Атен».
  - Аналіз його творчості («Лютня Аполлонова», «Аполлон християнський»).
  - 'Консептизм у поезії: гра слів, несподівані зіставлення, алегорії.'
  - Тема марноти марнот (Vanitas), скороминущості життя та християнського осмислення
    буття.
- section: 'Практика: I — Аналіз силабічного вірша'
  words: 600
  points:
  - Практичний розбір структури силабічного вірша на прикладі обраного тексту.
  - Ідентифікація кількості складів, пошук цезури та аналіз рими.
- section: 'Практика: II — Мовний регістр і лексика'
  words: 600
  points:
  - Аналіз мовного пласта поезії бароко.
  - Виявлення латинських та польських запозичень, що ілюструють міжкультурний діалог.
  - Виділення питомо української лексики, яка пробивалася крізь високий церковнослов'янський
    стиль.
- section: Підсумок
  words: 400
  points:
  - 'Спадщина епохи: доказ того, що українська мова XVI-XVII ст. мала розвинені поетичні
    форми та високий літературний регістр.'
  - Значення поезії бароко для формування національної ідентичності та інтелектуальної
    традиції.
