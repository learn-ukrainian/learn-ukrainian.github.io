slug: courts-basic
title: Courts Basic
word_target: 5000
content_outline:
- section: 'Вступ: Правова культура Русі'
  words: 400
  points:
  - Спадщина Руської Правди в литовську добу
  - Верховенство права vs воля монарха (порівняння з Московією)
  - Суд як інститут вирішення конфліктів шляхти
- section: Судова реформа 1564-1566 років
  words: 600
  points:
  - 'Більський привілей 1564 року: відокремлення суду від адміністрації'
  - Другий Литовський Статут 1566 року як правова база
  - 'Створення системи станових судів: земський, гродський, підкоморський'
  - Вплив реформи на формування політичної нації
- section: 'Земський суд: Голос шляхти'
  words: 800
  points:
  - 'Компетенція: цивільні справи та майнові спори шляхти'
  - 'Виборність суддів: процедура обрання на сеймиках'
  - 'Сесії суду («роки земські»): тричі на рік'
  - Незалежність від старостинської адміністрації
- section: 'Гродський суд: Меч закону'
  words: 700
  points:
  - 'Компетенція: кримінальні справи («справи кгвалтовні»: наїзд, вбивство, розбій)'
  - Роль старости та підстарости як суддів
  - 'Оперативність: щомісячні сесії та «гарячий слід»'
  - Актові книги гродських судів як історичне джерело
- section: 'Підкоморський суд: Межі та земля'
  words: 600
  points:
  - 'Спеціалізація: земельні та межові суперечки'
  - 'Підкоморій: суддя-арбітр, що виїжджає на місце'
  - Процедура розмежування земель
  - Сакральне значення межі в тогочасній культурі
- section: 'Урядники суду: Суддя, Підсудок, Писар'
  words: 800
  points:
  - 'Суддя: вимоги до кандидата (осілість, знання права, доброчесність)'
  - 'Підсудок: заступник та помічник у веденні процесу'
  - 'Писар: ключова роль у веденні документації (актових книг)'
  - 'Присяга урядників: відповідальність перед законом і Богом'
- section: 'Возний: Очі та вуха правосуддя'
  words: 600
  points:
  - Унікальність інституту возного (відмінність від західних систем)
  - 'Функції: вручення позовів («позвів») та інформування сторін'
  - '«Візія»: огляд місця злочину та фіксація доказів'
  - '«Реляція»: офіційний звіт возного суду'
- section: Мова та процедура судочинства
  words: 500
  points:
  - Закріплення статусу «руської» (староукраїнської) мови в Статуті
  - 'Ключові документи: позов, скарга, виписка, декрет'
  - 'Змагальність процесу: роль сторін та адвокатів («прокураторів»)'
  - 'Апеляція: можливість оскарження до Трибуналу'
