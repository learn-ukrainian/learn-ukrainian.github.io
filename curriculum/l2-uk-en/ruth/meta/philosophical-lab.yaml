slug: philosophical-lab
title: Philosophical Lab
word_target: 5000
content_outline:
- section: 'Вступ: Від «любомудрія» до академічної науки'
  words: 400
  points:
  - 'Трансформація поняття філософії в Україні XVII ст.: від монастирської мудрості
    до університетської дисципліни.'
  - Роль Києво-Могилянської академії (1632) як інтелектуального центру.
  - 'Латина як мова науки: вхід у європейський контекст.'
- section: Києво-Могилянський арістотелізм
  words: 500
  points:
  - 'Специфіка української схоластики: поєднання Арістотеля з платонізмом та патристикою.'
  - 'Структура філософського курсу: логіка, фізика, метафізика, етика.'
  - 'Відкритість до нових знань: як ідеї Коперника та Галілея проникали через схоластичні
    диспути.'
- section: 'Попередники: Громадянський гуманізм Оріховського'
  words: 450
  points:
  - Станіслав Оріховський — «Руський Демосфен».
  - 'Політична філософія: договірна теорія держави vs московське самодержавство.'
  - 'Самоідентифікація: «Gente Ruthenus» (роду руського) як політична позиція.'
- section: 'Григорій Сковорода: Український Сократ'
  words: 500
  points:
  - 'Життєвий шлях: втеча від «світу» як свідомий філософський акт.'
  - 'Сократичний метод: діалог як шлях до істини.'
  - 'Стиль: барокова символіка, емблематичність, мовна гра.'
- section: 'Метафізика: Вчення про дві натури і три світи'
  words: 600
  points:
  - 'Дві натури: видима (матеріальна) і невидима (божественна).'
  - 'Макрокосм: великий світ, природа.'
  - 'Мікрокосм: людина як дзеркало Всесвіту.'
  - 'Символічний світ: Біблія як провідник між людиною і Богом.'
- section: 'Читання I: «Розмова п''яти подорожніх» (Аналіз)'
  words: 700
  points:
  - Сюжет і композиція діалогу.
  - Аналіз уривка про природу щастя.
  - Порівняння мови оригіналу з сучасною українською (лексика, синтаксис).
- section: 'Етика: Концепція «сродної праці»'
  words: 550
  points:
  - 'Визначення «сродності»: праця за покликанням.'
  - 'Соціальний вимір: суспільство щасливе, коли кожен робить своє.'
  - '«Нерівна рівність»: алегорія фонтану і посудин.'
- section: Філософія серця (Кордоцентризм)
  words: 500
  points:
  - Серце як центр духовного життя в українській традиції.
  - Відмінність від західного раціоналізму (Cogito ergo sum).
  - Вплив на філософію XIX-XX ст. (Юркевич, Куліш).
- section: 'Читання II: Філософські курси (Георгій Кониський)'
  words: 500
  points:
  - Аналіз уривка з академічного курсу (в перекладі).
  - Приклад логічної аргументації та силогізму.
  - 'Термінологія: як формувався український філософський словник.'
- section: 'Підсумок: Жива традиція'
  words: 300
  points:
  - Вплив барокової філософії на український романтизм.
  - Чому ідеї Сковороди актуальні сьогодні.
  - 'Зв''язок часів: від Оріховського до сучасності.'
