- section: 'Основний матеріал: I — Литовські Статути як правовий фундамент'
  words: 1000
  points:
  - 'Еволюція Литовських Статутів (1529, 1566, 1588): від звичаєвого права до кодексу'
  - Принцип верховенства права та обмеження влади монарха
  - Роль шляхетської демократії та сеймиків у законотворчості
- section: 'Основний матеріал: II — Міське самоврядування та братський рух'
  words: 1000
  points:
  - 'Магдебурзьке право: міста як автономні правові суб''єкти'
  - Львівське братство (1586) як приклад горизонтального суспільного договору
  - 'Соціальна відповідальність братств: школи, шпиталі, взаємодопомога'
- section: 'Основний матеріал: III — Конституція Пилипа Орлика'
  words: 1100
  points:
  - 'Пакти й Конституції 1710 року: історичний контекст появи'
  - 'Договірна природа влади гетьмана: обмеження Генеральною радою'
  - 'Політична філософія документа: вільний народ укладає угоду з правителем'
- section: 'Основний матеріал: IV — Правовий захист вразливих верств'
  words: 1100
  points:
  - 'Права жінок та вдів у Литовському Статуті: майнова незалежність'
  - 'Інститут опіки над сиротами: захист майнових прав дитини'
  - 'Статті 10-11 Конституції Орлика: звільнення вдів і сиріт від податків'
  - Гуманізм українського права на фоні епохи
- section: Практика
