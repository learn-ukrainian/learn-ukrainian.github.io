slug: legal-profession
title: Legal Profession
word_target: 5000
content_outline:
- section: Вступ
  words: 400
  points:
  - Правова культура українських земель у XIV–XVIII ст.
  - Верховенство права як шляхетська цінність противага самодержавству
  - 'Огляд основних джерел права: Литовські Статути та звичаєве право'
- section: 'Основний матеріал: I — Судова система Великого князівства Литовського'
  words: 900
  points:
  - Судова реформа 1566 року та відокремлення суду від адміністрації
  - 'Гродський суд (замковий): кримінальні справи та юрисдикція старости'
  - 'Земський суд: становий виборний суд для шляхти (цивільні справи)'
  - 'Підкоморський суд: вирішення земельних та межових спорів'
  - Головний Трибунал Великого князівства Литовського як апеляційна інстанція
- section: 'Основний матеріал: II — Уряд Возного: повноваження та обов''язки'
  words: 900
  points:
  - Возний (Woźny) як ключова фігура судового процесу
  - Процедура вручення позову («покладання позви») та її правові наслідки
  - '«Реляція» возного: юридична сила свідчення судового урядовця'
  - 'Функції «візії»: огляд місця злочину, фіксація збитків та побоїв'
- section: 'Основний матеріал: III — Інститут Прокуратора: становлення адвокатури'
  words: 900
  points:
  - 'Поява професійної адвокатури: від «приятелів» до кваліфікованих прокураторів'
  - Вимоги до адвоката (прокуратора) згідно зі Статутами (шляхетство, осілість)
  - 'Поняття «умоцований»: юридичне представництво інтересів клієнта'
  - Етичні норми та відповідальність адвоката перед клієнтом (plenipotentia)
  - Цитата з кодексу 1743 року про визначення адвоката
- section: 'Основний матеріал: IV — Руська мова як мова закону'
  words: 900
  points:
  - Статус руської (староукраїнської) мови як державної у ВКЛ
  - 'Передмова Лева Сапіги до Статуту 1588: «не обчим яким язиком»'
  - 'Особливості «простої мови» судових актів: термінологія та стиль'
  - Вплив латини та польської мови на юридичну лексику (полонізми, латинізми)
- section: 'Основний матеріал: V — Кодифікація права: від Статутів до Прав 1743 року'
  words: 600
  points:
  - Тяглість дії Литовського Статуту в Гетьманщині (до 1840-х років)
  - Спроби кодифікації українського права у XVIII ст. (Комісія 1728 року)
  - Кодекс «Права, за якими судиться малоросійський народ» (1743)
  - Ліквідація українського права Російською імперією як акт колонізації
- section: Практика
  words: 200
  points:
  - Аналіз уривка з актової книги (скарга або позов)
  - Ідентифікація сторін судового процесу в тексті
  - Тлумачення архаїчних юридичних термінів
- section: Підсумок
  words: 400
  points:
  - Роль правничої професії у формуванні громадянської свідомості
  - Відмінність української правової традиції від російської (договір vs наказ)
  - Спадщина Литовських Статутів у сучасній українській правовій культурі
