slug: parable-prodigal-son
title: Parable Prodigal Son
word_target: 5000
content_outline:
- section: 'Вступ: Вічний сюжет повернення'
  words: 400
  points:
  - Притча про блудного сина як архетип європейської культури.
  - 'Специфіка українського прочитання: від барокової драми до шевченківської сатири.'
  - 'Ключова тема модуля: лексика родинних стосунків, покаяння та прощення.'
- section: 'Частина I: Святе Письмо і мова (Євангельський текст)'
  words: 800
  points:
  - 'Аналіз тексту Луки 15:11-32: ключова лексика (спадщина, наймит, перстень).'
  - 'Руська лексика в церковних текстах: ''маєток'' vs ''іменіє''.'
  - 'Правовий аспект: як ділилася ''материзна'' та ''батьківщина'' в Гетьманщині.'
  - Символіка 'свиней' та 'стручків' (ріжків) — найнижча точка падіння шляхтича.
- section: 'Частина II: Театр бароко — ''Комидія притчи о блудном сыне'''
  words: 1000
  points:
  - Шкільна драма як феномен Києво-Могилянської академії.
  - 'Симеон Полоцький і його інтерпретація: ''блудний син'' як спудей, що прагне знань.'
  - 'Аналіз монологу: ''Лучше в странствии умом сбогачуся''.'
  - 'Конфлікт поколінь у бароковій літературі: традиція vs новизна.'
- section: 'Частина III: Візуальне богослов''я — Гравюра і символ'
  words: 800
  points:
  - 'Іконографія ''Повернення'': динаміка батьківських обіймів у лаврських гравюрах.'
  - 'Візуальні атрибути відновлення статусу: найкраща одіж, перстень, сандалі.'
  - 'Символіка ''годованого теляти'': євхаристичний підтекст (бенкет віри).'
  - 'Контраст зі старшим братом: проблема заздрості та формального благочестя.'
- section: 'Частина IV: Філософія мандрів — Григорій Сковорода'
  words: 800
  points:
  - Життя Сковороди як 'святе блукання' (peregrinatio sacra).
  - 'Концепція ''пізнай себе'': повернення до своєї істинної природи як повернення
    до Отця.'
  - 'Відмінність сковородинського ''блудного сина'': він тікає від ''світу'', щоб
    знайти дім у дусі.'
  - 'Мандрівник vs Бродяга: духовний вимір бездомності.'
- section: 'Частина V: Сатира і трагедія — Тарас Шевченко'
  words: 700
  points:
  - 'Серія малюнків 1856-1857 рр.: соціальна критика замість релігійної ідилії.'
  - 'Образ ''блудного сина'' в реаліях Російської імперії: шинок, тюрма, солдатчина.'
  - Чому у Шевченка немає сцени повернення? Трагізм бездержавності.
  - 'Деколонізаційний погляд: імперія як середовище, що продукує ''блудних синів''.'
- section: 'Підсумок: Блудні сини України'
  words: 500
  points:
  - 'Есей Євгена Сверстюка: нація, що повертається до власної історії.'
  - 'Синтез: від біблійного прощення до національного самоусвідомлення.'
  - Заключне слово про тяглість традиції (XIV-XXI ст.).
