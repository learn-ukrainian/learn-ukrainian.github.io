slug: parable-sower
title: Parable Sower
word_target: 5000
content_outline:
- section: 'Вступ: Сіяч у сакральному ландшафті'
  words: 400
  points:
  - Символіка зерна та землі в українській культурі XVII ст.
  - Біблійна притча як основа барокового світогляду
  - Роль проповідника-сіяча в часи Руїни
- section: 'Основний матеріал: I — Текст Пересопницького Євангелія'
  words: 800
  points:
  - Аналіз уривка Лк. 8:5-15 з Пересопницького Євангелія
  - 'Жива народна мова в сакральному тексті: ''сіяч'', ''терня'', ''каміння'''
  - Порівняння з церковнослов'янським текстом Острозької Біблії
- section: 'Основний матеріал: II — Барокова екзегеза (Ґалятовський)'
  words: 900
  points:
  - Іоаникій Ґалятовський та його 'Ключ розуміння' (1659)
  - 'Метод алегоричного тлумачення: чотири види ''землі'' (слухачів)'
  - 'Риторичні прийоми: ампліфікація та ефект присутності'
  - 'Наука складання проповідей: проповідник як ''духовний рільник'''
- section: 'Основний матеріал: III — Лексика землі: ''Ролія'' та ''Рілля'''
  words: 900
  points:
  - Етимологія та вживання терміну 'ролія' (від pol. rola)
  - 'Правничий аспект: ролія як одиниця земельного виміру в Литовських Статутах'
  - 'Семантичний зсув: від ''ораної землі'' до ''людської долі'' та ''ролі'''
  - 'Синонімічний ряд: нива, лан, ґрунт, пашниця'
- section: 'Основний матеріал: IV — Алегорія зерна як Слова'
  words: 800
  points:
  - 'Кирило Транквіліон-Ставровецький: містика ''Перла многоцінного'''
  - Зерно мудрості vs кукіль єресей (полемічний аспект)
  - Книгодрукування як 'засівання' світу знаннями
  - Вплив освіти (Києво-Могилянська колегія) на метафору жнив
- section: 'Практика: Робота з текстом'
  words: 600
  points:
  - Транскрипція уривка скорописом (палеографія)
  - 'Етимологічний розбір: ''терня'', ''коріння'', ''плід'''
  - Пошук полонізмів та латинізмів у тексті Ґалятовського
- section: 'Підсумок: Від ''ролії'' до ''ниви'''
  words: 600
  points:
  - 'Еволюція аграрної лексики: що залишилось у сучасній мові'
  - Спадщина барокової проповіді в українській літературі
  - Синтез духовного і земного в українському бароко
