slug: orthography-letters
title: Orthography Letters
word_target: 5000
content_outline:
- section: 'Вступ: Проблема звука і знака'
  words: 400
  points:
  - 'Фонетична унікальність української мови: наявність [h] та [g].'
  - 'Історична дилема: як записати чужомовний звук кириличними літерами.'
  - Орфографія як поле битви за ідентичність.
- section: 'Основний матеріал: I — Фонетична революція та диграф «КГ»'
  words: 1000
  points:
  - 'Давньоруський спадок: перехід вибухового [g] у фрикативний [h] (XII-XIII ст.).'
  - Потреба у фіксації запозичень (латинізми, германізми) у діловій мові ВКЛ.
  - 'Винахід канцеляристів: використання диграфа «кг» (*кгрунт*, *кгвалт*).'
  - Аналогії з латинською транслітерацією.
- section: 'Основний матеріал: II — Кодифікація Мелетія Смотрицького (1619)'
  words: 1200
  points:
  - «Грамматіки славєнскиѧ правилноє Сѵнтаґма» як науковий прорив.
  - Введення літери Ґ (курсивна гамма) для розрізнення звуків.
  - Цитата Смотрицького про природу літер.
  - Легітимізація української вимови в церковнослов'янському тексті.
- section: 'Основний матеріал: III — Хроніка репресій: від Петра I до Сталіна'
  words: 1200
  points:
  - '1708 рік: Гражданський шрифт Петра I та перше зникнення літери Ґ (через непотрібність
    у російській).'
  - 'XIX ст.: Вживання Ґ в Галичині («Русалка Дністрова», Желехівка) та в підросійській
    Україні (Грінченко).'
  - '1933 рік: Реформа Хвилі та оголошення літери «націоналістичною диверсією».'
  - 'Аргументація радянських мовознавців: штучне зближення з російською мовою.'
- section: 'Основний матеріал: IV — Повернення та сучасний статус'
  words: 800
  points:
  - '1990 рік: Третє видання Українського правопису і реабілітація літери.'
  - 'Сучасна дискусія: Ґ у запозиченнях (міф про «Г» в іншомовних словах).'
  - Список слів з літерою Ґ (ґанок, ґрунт, ґудзик) як культурний код.
- section: 'Практика: Робота з текстами'
  words: 400
  points:
  - Аналіз уривка з «Граматики» Смотрицького.
  - Транслітерація слів з диграфом «кг» на сучасний лад.
  - Розпізнавання слів, що змінили значення або звучання.
- section: 'Підсумок: Літера як символ'
  words: 200
  points:
  - Літера Ґ як маркер української фонетичної системи.
  - Відновлення історичної справедливості.
  - 'Зв''язок поколінь: від канцеляристів ВКЛ до сьогодення.'
