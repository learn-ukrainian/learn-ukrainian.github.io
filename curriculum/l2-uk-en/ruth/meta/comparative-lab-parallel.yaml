slug: comparative-lab-parallel
title: Comparative Lab Parallel
word_target: 5000
content_outline:
- section: 'Вступ: Сакральне слово в культурному коді'
  words: 600
  points:
  - Поняття 'сакральної мови' (lingua sacra) та її роль у формуванні ідентичності.
  - 'Диглосія в Русі-Україні XVI ст.: співіснування церковнослов''янської (високої)
    та руської (простої) мов.'
  - 'Історичний контекст: Реформація в Європі та потреба в зрозумілому Слові Божому.'
  - 'Мета модуля: простежити еволюцію української мови крізь призму одного вірша (Матвій
    5:3).'
- section: 'Основний матеріал: I — Текстові джерела: Від Острога до Пересопниці'
  words: 800
  points:
  - 'Острозька Біблія (1581): перший повний друкований канон церковнослов''янською
    мовою.'
  - 'Пересопницьке Євангеліє (1556-1561): рукописний шедевр та переклад на живу народну
    мову.'
  - 'Особистості перекладачів: архімандрит Григорій та писар Михайло Василевич.'
  - 'Біблія Куліша (1871) та Огієнка (1962): утвердження модерного українського стандарту.'
- section: 'Основний матеріал: II — Фонетичний рівень: Від ''ѣ'' до ''і'''
  words: 800
  points:
  - 'Аналіз тексту Матвія 5:3: порівняння графіки та звучання.'
  - 'Явище ікавізму: як ''тѣх'' перетворюється на ''тих'' (відображення живої вимови).'
  - 'Тверді шиплячі в староукраїнській мові: відмінності від церковнослов''янської
    м''якості.'
  - 'Роль наголосу: зміщення акцентів у народній мові порівняно з книжною традицією.'
- section: 'Основний матеріал: III — Морфологічний рівень: Жива граматика'
  words: 800
  points:
  - 'Іменникові флексії: формування типово українських закінчень давального відмінка
    (-ові/-еві).'
  - 'Дієслівна система: перехід від аористу та імперфекту до аналітичного та синтетичного
    минулого часу.'
  - 'Займенникові форми: ''їхнє'' vs ''тѣхъ'' — розвиток присвійних займенників.'
  - Кличний відмінок як маркер української ідентичності в сакральному тексті.
- section: 'Основний матеріал: IV — Лексичний рівень: ''Нищии'' vs ''Вбогі'''
  words: 800
  points:
  - 'Семантичний зсув: аналіз термінів ''нищии'' (жебрак) та ''вбогий'' (той, хто
    у Бога).'
  - 'Введення побутової лексики в сакральний текст: глоси та маргіналії Пересопницького
    Євангелія.'
  - Полонізми та латинізми як ознака модернізації лексикону XVI-XVII ст.
  - 'Синонімічні ряди: багатство староукраїнської мови у порівнянні з канонічною.'
- section: 'Основний матеріал: V — Синтаксичний рівень: Порядок слів'
  words: 800
  points:
  - 'Порядок слів (SVO vs вільний порядок): вплив живої розмовної практики на переклад.'
  - 'Складні речення: спрощення гіпотаксису (підрядності) в Пересопницькому Євангелії.'
  - 'Сполучники: заміна церковнослов''янського ''яко'' на українське ''бо'' або ''що''.'
  - 'Ритмомелодика тексту: як зміна синтаксису впливає на сприйняття молитви.'
- section: 'Практика: Лабораторія компаративістики'
  words: 400
  points:
  - 'Завдання на порівняння: знайти 5 відмінностей у текстах різних епох.'
  - 'Реконструкція вимови: прочитати уривок Пересопницького Євангелія за правилами
    XVI ст.'
  - 'Етимологічний пошук: простежити історію слова ''Царство'' від Русі до сьогодення.'
- section: 'Підсумок: Від Русі до України'
  words: 400
  points:
  - 'Тяглість традиції: українська мова як спадкоємиця мовної культури Русі.'
  - Пересопницьке Євангеліє як доказ існування окремої української мови вже у XVI
    ст.
  - Сакральний текст як інструмент збереження та розвитку мови в умовах бездержавності.
  - Значення перекладу для сучасної національної свідомості.
