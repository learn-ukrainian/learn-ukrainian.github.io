slug: translators-dedication
title: Translators Dedication
word_target: 5000
content_outline:
- section: Вступ
  words: 400
  points:
  - Пересопницьке Євангеліє — перлина української книжкової культури XVI ст.
  - 'Символ тяглості української традиції: від рукопису до президентської присяги.'
  - 'Унікальність пам''ятки: перший відомий переклад канонічного тексту народною мовою.'
- section: 'Основний матеріал: Історичні обставини та меценатство'
  words: 1000
  points:
  - 'Замовниця: княгиня Анастасія Заславська (Гольшанська) та її роль у проекті.'
  - 'Географія створення: Дворецький монастир (1556-1557) та Пересопниця (1561).'
  - 'Духовний клімат епохи: вплив Реформації та потреба у зрозумілому Святому Письмі.'
  - 'Матеріальний вимір: пергамент, чорнила, 9 кілограмів духовності.'
- section: 'Основний матеріал: Тандем творців — Григорій та Михайло'
  words: 1200
  points:
  - 'Архімандрит Григорій Пересопницький: ідеолог, редактор та духовний наставник.'
  - 'Михайло Василевич, син протопопа із Сянока: писар-перекладач і його «смілива
    рука».'
  - 'Аналіз післямови (Summa): програмна заява про мету перекладу.'
  - 'Біографічні загадки: що ми знаємо про освіту та походження творців.'
- section: 'Основний матеріал: Феномен «простої мови» та глоси'
  words: 1200
  points:
  - 'Ключова формула: «для ліпшого вирозуміння люду християнського посполитого».'
  - 'Мовні рівні: синтез церковнослов''янської височини та народної лексики.'
  - 'Глоси як перший тлумачний словник: як «чресла» ставали «стегнами».'
  - 'Граматичні маркери української мови: дієслівні форми, кличний відмінок, лексичні
    українізми.'
- section: 'Основний матеріал: Значення та рецепція'
  words: 800
  points:
  - 'Мистецький код: ренесансні орнаменти, мініатюри євангелістів та рослинні мотиви.'
  - 'Історична доля книги: дарчий напис Івана Мазепи (1701) та мандри бібліотеками.'
  - 'Сучасний статус: головна книга інавгурації Президента України.'
  - 'Спадщина Пересопниці: доказ окремішності української культури в ранньомодерний
    час.'
- section: Практика
  words: 200
  points:
  - 'Перехід до практичних завдань: аналіз уривків та глос.'
  - Завдання на ідентифікацію архаїзмів та живої лексики.
- section: Підсумок
  words: 400
  points:
  - Пересопницьке Євангеліє як маніфест національної мовної ідентичності.
  - 'Діалог поколінь: від волинських скрипторіїв до сучасної України.'
  - Заклик до вивчення першоджерел.
