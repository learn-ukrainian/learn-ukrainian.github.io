slug: the-heart
title: The Heart
word_target: 5000
content_outline:
- section: 'Вступ: Філософія серця'
  words: 400
  points:
  - Визначення кордоцентризму (від лат. cor) як ключової риси української ментальності.
  - 'Серце як центр мікрокосму: єдність почуттів, волі та інтелекту.'
  - 'Глобальний контекст: від біблійної традиції до Блеза Паскаля.'
- section: 'Основний матеріал: I — Витоки традиції'
  words: 800
  points:
  - 'Києворуська спадщина: «Слово про Закон і Благодать» Іларіона.'
  - 'Полемічна література XVI ст.: Іван Вишенський і заклики до «чистого серця».'
  - Протиставлення внутрішньої віри зовнішній обрядовості.
- section: 'Основний матеріал: II — Бароковий вимір'
  words: 1000
  points:
  - 'Естетика українського бароко: емоційність та динамізм.'
  - 'Кирило Транквіліон-Ставровецький: «Перло многоцінне» і радість серця.'
  - Аналіз уривків з поезії Лазара Барановича («Лютня Аполлонова»).
  - Серце як метафора духовного інструменту.
- section: 'Основний матеріал: III — Григорій Сковорода'
  words: 1200
  points:
  - Сковорода як головний філософ серця.
  - 'Аналіз діалогу «Наркіс»: самопізнання як шлях до Бога.'
  - 'Вчення про «сродну працю»: діяльність, що йде від серця.'
  - 'Цитати: «Всяк єсть тим, чиє серце в нім».'
- section: 'Основний матеріал: IV — Розум і Серце'
  words: 600
  points:
  - Співвідношення ratio (розуму) та cor (серця) у бароковій думці.
  - Серце як джерело етичних рішень та мотивації.
  - Відмінність від західного раціоналізму (Декарт) та просвітництва.
- section: 'Основний матеріал: V — Деколонізаційний погляд'
  words: 600
  points:
  - Український персоналізм vs Російський колективізм.
  - «Серце» як символ індивідуальної свободи та відповідальності.
  - Апропріація українських мислителів імперською історіографією.
  - Зв'язок кордоцентризму з ідеєю національної свободи.
- section: 'Підсумок: Спадщина філософії серця'
  words: 400
  points:
  - Памфіл Юркевич як систематизатор традиції у XIX ст.
  - Вплив на літературу (Куліш, Шевченко, Гоголь).
  - Актуальність кордоцентризму для сучасної української ідентичності.
