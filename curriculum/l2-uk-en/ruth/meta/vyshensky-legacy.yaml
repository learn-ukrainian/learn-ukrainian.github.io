slug: vyshensky-legacy
title: Vyshensky Legacy
word_target: 5000
content_outline:
  - section: Вступ
    words: 300
    points:
      - Іван Вишенський — центральна постать української полемічної літератури.
      - 'Метафора «Голос із пустелі»: вплив афонського ченця на події в Україні.'
      - 'Історичний контекст: криза православ''я кінця XVI ст.'
  - section: 'Основний матеріал: I — Шлях до Афону'
    words: 400
    points:
      - 'Походження: Судова Вишня, Галичина.'
      - 'Острозький слід: зв''язки з гуртком князя Костянтина Острозького.'
      - 'Духовний вибір: відмова від світського життя заради монашого подвигу.'
      - Афон як центр православного фундаменталізму.
  - section: 'Основний матеріал: II — Реакція на Берестейську унію'
    words: 450
    points:
      - 1596 рік як вододіл української історії.
      - 'Позиція Вишенського: безкомпромісне заперечення унії.'
      - 'Листування з князем Острозьким: заклики до опору.'
      - Концепція «останка» — збереження істинної віри меншістю.
  - section: 'Основний матеріал: III — «Книжка» 1600 року'
    words: 500
    points:
      - 'Унікальний авторський збірник: структура та мета.'
      - 'Жанрова палітра: послання, трактати, діалоги.'
      - 'Адресат творів: від єпископів до «всіх в Лядській землі живущих».'
      - Програма духовного очищення суспільства.
  - section: 'Основний матеріал: IV — Анатомія «Послання до єпископів»'
    words: 650
    points:
      - 'Головний полемічний твір: аналіз тексту.'
      - 'Контраст: життя Христа vs життя владик («пастирі чи вовки?»).'
      - Викриття соціальної несправедливості та розкошів кліру.
      - Революційна теза про право мирян судити недостойних пастирів.
  - section: 'Основний матеріал: V — Соціальний вимір та «Порада»'
    words: 450
    points:
      - Захист «бідних підданих» і критика феодального гніту.
      - 'Твір «Порада»: ідеал ранньохристиянської рівності.'
      - 'Демократизм Вишенського: «хлоп» може бути вищим за «пана».'
      - 'Парадокс: консерватор, що використовує реформаційні ідеї.'
  - section: 'Основний матеріал: VI — Мовний стиль бароко'
    words: 500
    points:
      - 'Мова Вишенського: синтез книжної та народної стихій.'
      - 'Риторичні прийоми: нагнітання синонімів, прокльони, сарказм.'
      - 'Естетика бароко: контрасти, динамізм, емоційна напруга.'
      - Значення для становлення української літературної мови.
  - section: 'Основний матеріал: VII — Розчарування та затвір'
    words: 450
    points:
      - 'Візит в Україну (1604–1606): зіткнення ідеалу з реальністю.'
      - Конфлікт з Львівським братством та Іовом Княгиницьким.
      - 'Повернення на Афон: добровільне замурування в печері.'
      - 'Пізні твори: «Позорище мисленне».'
  - section: 'Основний матеріал: VIII — Спадщина і рецепція'
    words: 450
    points:
      - Довге забуття та відродження інтересу в XIX ст.
      - Дослідження Івана Франка та Агатангела Кримського.
      - 'Поема Франка «Іван Вишенський»: художній міф і правда.'
      - Актуальність ідей Вишенського для сучасної України.
  - section: 'Практика: Робота з текстами'
    words: 450
    points:
      - Аналіз уривків з «Послання до єпископів» (переклад та оригінал).
      - Визначення риторичних фігур та полемічних прийомів.
      - Порівняння поглядів Вишенського та Потія.
      - 'Дискусія: роль особистості в історії релігійних конфліктів.'
  - section: Підсумок
    words: 400
    points:
      - 'Узагальнення: Іван Вишенський як символ епохи.'
      - Значення його творчості для збереження національної ідентичності.
      - 'Перехід до наступної теми: розвиток шкільної драми.'
