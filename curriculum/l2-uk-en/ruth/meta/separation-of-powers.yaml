slug: separation-of-powers
title: Separation Of Powers
word_target: 5000
content_outline:
- section: Вступ
  words: 500
  points:
  - 'Історичний контекст 1709-1710 років: поразка під Полтавою, смерть Мазепи, еміграція
    в Бендери.'
  - Обрання Пилипа Орлика гетьманом 5 квітня 1710 року.
  - 'Унікальність ситуації: створення держави в екзилі.'
  - 'Мета Конституції: легітимізація влади та визначення майбутнього устрою України.'
- section: 'Основний матеріал: I — Архітектура «Пактів і Конституцій»'
  words: 1000
  points:
  - Аналіз повної назви документа та його структури (Преамбула, 16 статей, Присяга).
  - 'Преамбула: ідеологія хозарського походження (сарматизм) та обґрунтування права
    на незалежність від Москви.'
  - Поняття «Вільний народ» (Gens libera) та договірна природа влади.
  - Роль шведського короля Карла XII як протектора.
- section: 'Основний матеріал: II — Генеральна рада як парламент'
  words: 1000
  points:
  - 'Законодавча гілка влади: трансформація козацької ради в регулярний парламентський
    орган.'
  - 'Регламент засідань: тричі на рік (Різдво, Великдень, Покрова).'
  - 'Склад Генеральної ради: генеральна старшина, полковники, виборні «генеральні
    радники» від полків.'
  - Роль Запорозької Січі у політичній системі Гетьманщини (Стаття I-III).
- section: 'Основний матеріал: III — Система стримувань і противаг'
  words: 1000
  points:
  - 'Обмеження влади гетьмана: відмова від принципу «як хочу, так і велю».'
  - 'Виконавча влада: Гетьман діє спільно з Генеральною старшиною.'
  - 'Судова влада: виокремлення Генерального суду як незалежної інституції (Стаття
    VII).'
  - 'Фінансовий контроль: розмежування гетьманської та державної скарбниці.'
- section: 'Основний матеріал: IV — Мова та соціальний вимір'
  words: 1000
  points:
  - 'Аналіз староукраїнської мови документа: канцеляризми, латинізми, барокова риторика.'
  - 'Ключові терміни: «вольності», «елекція», «уряд», «права».'
  - 'Соціальні гарантії (Статті IX-XVI): захист козацьких вдів, сиріт та посполитих
    від свавілля адміністрації.'
  - Антикорупційні норми та заборона зловживань на місцях.
- section: Практика
  words: 250
  points:
  - Аналіз уривків тексту Конституції (читання та інтерпретація).
  - Порівняння політичної термінології XVIII ст. із сучасною.
  - Вправи на виявлення латинізмів та полонізмів у тексті.
- section: Підсумок
  words: 250
  points:
  - 'Історичне значення Бендерської конституції: випередження європейської політичної
    думки (Монтеск''є).'
  - Чому Конституція не була реалізована вповні (геополітичні обставини).
  - 'Спадщина Орлика: традиція українського конституціоналізму та боротьба за державність
    в еміграції.'
  - Зв'язок із сучасною Конституцією України.
