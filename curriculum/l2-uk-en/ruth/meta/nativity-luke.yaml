slug: nativity-luke
title: Nativity Luke
word_target: 5000
content_outline:
- section: 'Вступ: Різдвяна містерія'
  words: 400
  points:
  - Євангеліє від Луки як основа різдвяного наративу.
  - 'Українське бароко: поєднання сакрального тексту з театральним дійством.'
  - 'Мета уроку: дослідити, як народжувалося українське Слово через переклад і гру.'
- section: 'Сакральне Слово: Пересопницьке диво'
  words: 1200
  points:
  - Пересопницьке Євангеліє (1556-1561) — пам'ятка перекладу.
  - 'Аналіз тексту Луки 2: проникнення живої мови в канон.'
  - 'Лінгвістичні маркери: ''радість'', ''пастухови'', дієслівні форми на ''-мо''.'
  - 'Порівняння з церковнослов''янським оригіналом: глоси та інтерпретації.'
- section: 'Барокова Поезія: Голос Памва Беринди'
  words: 1200
  points:
  - 'Львів 1616 року: перші друковані вірші на Різдво.'
  - 'Аналіз ''На Рождество Христа...'': силабічний вірш і риторика.'
  - 'Теологічний вимір: ''простота наша'' vs ''невидимий Бог''.'
  - 'Діалогічність тексту: предтеча вертепної драми.'
- section: 'Живий Вертеп: Театр Світобудови'
  words: 1400
  points:
  - Сокиринський вертеп (1770) як вершина жанру.
  - 'Архітектура вертепу: верхній поверх (небо) і нижній (земля).'
  - 'Диглосія сцени: високий стиль ангелів vs низький стиль пастухів.'
  - 'Образ Ірода: трагедія тирана і політична сатира.'
- section: 'Культурний Контекст: Європейський вимір'
  words: 600
  points:
  - Українське Різдво в контексті європейського бароко.
  - Вплив шкільної драми та Києво-Могилянської академії.
  - 'Деколонізація свята: повернення питомих сенсів.'
- section: 'Підсумок: Від тексту до традиції'
  words: 400
  points:
  - 'Спадкоємність традиції: від Пересопниці до сучасного вертепу.'
  - Мова як живий організм, що оновлює сакральні сенси.
  - Значення барокової культури для української ідентичності.
