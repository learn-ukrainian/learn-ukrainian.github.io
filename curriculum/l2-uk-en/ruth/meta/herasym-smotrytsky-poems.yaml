slug: herasym-smotrytsky-poems
title: Herasym Smotrytsky Poems
word_target: 5000
content_outline:
- section: Вступ
  words: 300
  points:
  - Герасим Смотрицький — титан Острозького відродження.
  - 'Історичний контекст кінця XVI ст.: виклик Реформації та католицької експансії.'
  - Роль поета у формуванні нової руської (української) ідентичності.
- section: 'Основний матеріал: I — Острозький контекст та роль ректора'
  words: 500
  points:
  - 'Від писаря до ректора: шлях шляхтича з Поділля.'
  - Співпраця з Іваном Федоровим та грецькими вченими.
  - Острозька академія як 'Волинські Афіни' та форпост освіти.
  - Особиста дружба та ідейний союз з князем Василем-Костянтином.
- section: 'Основний матеріал: II — Геральдична поезія: «Зри сія знаменія»'
  words: 800
  points:
  - Перший друкований вірш в українській літературі (1581).
  - 'Жанр гербового вірша (stemma): структура та мета.'
  - 'Символіка герба Острозьких: Вершник (Святий Юрій) як переможець єресі.'
  - 'Алегорія Місяця та Зорі: світло віри проти темряви невігластва.'
  - 'Політичний підтекст: князь як рівний візантійським імператорам.'
- section: 'Основний матеріал: III — Поетична тяглість: «До чительника»'
  words: 600
  points:
  - Друга віршована передмова до Острозької Біблії.
  - 'Тяглість київської традиції: Володимир Великий — Ярослав Мудрий — Острозький.'
  - Книга як духовна зброя ('броня правди').
  - 'Заклик до читача: активна позиція у вірі.'
- section: 'Основний матеріал: IV — Полемічний шедевр: «Ключ царства небесного»'
  words: 800
  points:
  - 'Контекст появи: відповідь єзуїту Бенедикту Гербесту (1587).'
  - 'Богословська суть: де знаходиться справжній ''ключ'' (віра vs влада Папи).'
  - Критика відступництва та морального занепаду кліру.
  - Сатиричні елементи та жива народна мова у високій полеміці.
- section: 'Основний матеріал: V — Календарна полеміка та сатира'
  words: 600
  points:
  - Трактат «Календар римський новий».
  - Григоріанський календар як інструмент асиміляції.
  - Апокаліптичні мотиви та захист традиційного літочислення.
  - Сатира на папські претензії володіти часом.
- section: 'Основний матеріал: VI — Мовна програма: проста мова проти латини'
  words: 600
  points:
  - Свідомий вибір 'простої мови' (староукраїнської) для полеміки.
  - 'Диглосія: церковнослов''янська для сакрального (Біблія), руська для публіцистики.'
  - Доказ спроможності української мови виражати складні теологічні ідеї.
  - Вплив на подальший розвиток полемічної літератури (Вишенський).
- section: 'Основний матеріал: VII — Епіграма «Плютархус» та барокова естетика'
  words: 500
  points:
  - Звернення до античних авторитетів (Плутарх).
  - 'Ранній бароковий стиль: контрасти, метафоричність, дидактизм.'
  - Естетика 'світу як театру' та 'життя як мандрівки'.
  - Топос 'смиренності автора' ('простак невчений').
- section: 'Основний матеріал: VIII — Спадщина та вплив'
  words: 400
  points:
  - 'Батько і син: вплив Герасима на Мелетія Смотрицького.'
  - Формування покоління 'людей нової культури'.
  - Започаткування жанру української полемічної прози.
  - 'Місце в каноні: від забуття до визнання ''першим богословом''.'
- section: Підсумок
  words: 300
  points:
  - Синтез поета, адміністратора і богослова.
  - Острозька Біблія та 'Ключ' як стовпи української ідентичності XVI ст.
  - 'Зв''язок часів: актуальність полеміки про ідентичність сьогодні.'
