slug: cossack-hierarchy
title: Cossack Hierarchy
word_target: 5000
content_outline:
- section: 'Вступ: Природа влади і структура'
  words: 600
  points:
  - Визначення козацької старшини як військово-адміністративної еліти.
  - Еволюція від виборних ватажків до державної номенклатури.
  - Різниця між владою на Запорозькій Січі та в Гетьманщині.
  - Роль реєстру 1572 року у формуванні офіційної ієрархії.
- section: 'Генеральна старшина: Уряд Гетьманщини'
  words: 1000
  points:
  - 'Гетьман: повноваження монарха (з обмеженнями) та головнокомандувача.'
  - 'Генеральний обозний: друга особа в державі, куратор артилерії та тилу.'
  - 'Генеральний суддя: охоронець закону і Литовських статутів (функції Верховного
    суду).'
  - 'Генеральний писар: канцлер, дипломат і хранитель державної таємниці (кейс Івана
    Виговського).'
  - 'Осавули, хорунжі, бунчужні: ад''ютанти та виконавці спеціальних доручень.'
- section: 'Полкова та сотенна адміністрація: Вертикаль на місцях'
  words: 900
  points:
  - 'Полково-сотенний устрій: поєднання цивільної та військової влади.'
  - 'Полковник: «маленький гетьман» у своєму окрузі (суд, податки, військо).'
  - 'Сотник та його уряд: адміністрація на рівні міст і містечок.'
  - 'Городові отамани: взаємодія козацької адміністрації з міщанським самоврядуванням.'
  - 'Значкове та бунчукове товариство: резерв кадрів для старшини.'
- section: 'Судівництво і канцелярія: Бюрократичний апарат'
  words: 800
  points:
  - Генеральна військова канцелярія як центр державного управління.
  - 'Роль військових канцеляристів: формування офіційної мови та документообігу.'
  - 'Судова система: поєднання звичаєвого козацького права та писаного права (Литовські
    статути).'
  - 'Аналіз документу: структура універсалу (формуляр, титулатура, печатка).'
- section: 'Політична культура: Вибори та Конституція'
  words: 1000
  points:
  - 'Процедура обрання старшини: від вільного голосу до затвердження царем.'
  - 'Чорна рада 1663 року: охлократія та маніпуляції Москви.'
  - 'Конституція Пилипа Орлика 1710 року: спроба правового обмеження влади гетьмана.'
  - 'Аналіз уривку з Конституції: розподіл гілок влади (гетьман, рада, суд).'
- section: 'Підсумок: Спадщина козацької еліти'
  words: 700
  points:
  - Трансформація козацької старшини у дворянство Російської імперії.
  - Роль нащадків старшини у збереженні української культури (Косачі, Тарновські,
    Скоропадські).
  - Вплив козацьких традицій на державне будівництво 1917-1921 років.
  - 'Сучасна оцінка: козацька держава як попередниця модерної України.'
