slug: epistle-to-ostrozky
title: Epistle To Ostrozky
word_target: 5000
content_outline:
- section: 'Вступ: Епоха вибору'
  words: 600
  points:
  - 'Україна кінця XVI століття: між Сходом і Заходом.'
  - Берестейська унія 1596 року як цивілізаційний розлам.
  - Роль Острозького культурного осередку в обороні традиції.
  - 'Постать Івана Вишенського: голос з Афону.'
- section: 'Основний матеріал: I — Аскет і Магнат'
  words: 1100
  points:
  - 'Діалог двох стратегій порятунку: втеча від світу (Вишенський) vs просвіта світу
    (Острозький).'
  - Чому монах повчає князя? Унікальний статус духовного авторитета.
  - 'Історія публікації: «Книжка» 1598 року.'
  - 'Специфіка жанру: послання як публічний маніфест, а не приватний лист.'
- section: 'Основний матеріал: II — Риторика барокового гніву'
  words: 1100
  points:
  - 'Стилістика «плетении словес»: нагромадження епітетів, емоційна напруга.'
  - 'Метафора «мертвого трупа»: як Вишенський зображує занепад західної церкви.'
  - 'Концепція «машкари» (маски): критика театральності та нещирості.'
  - 'Мовна палітра: суміш церковнослов''янської та живої народної мови.'
- section: 'Основний матеріал: III — Анатомія відступництва'
  words: 1100
  points:
  - 'Портрет єпископів-уніатів: жадоба влади та земних благ.'
  - Протиставлення бідної, але істинної церкви vs багатої, але фальшивої.
  - 'Аргумент «страждання»: істинна церква мусить бути гнаною (як Христос).'
  - Духовна небезпека компромісу зі світом.
- section: 'Основний матеріал: IV — Соборність та «простий народ»'
  words: 1100
  points:
  - 'Радикальний егалітаризм Вишенського: всі рівні перед Богом.'
  - Критика шляхетської зверхності над простолюдом.
  - Роль братств та мирян у збереженні віри.
  - 'Деколонізація образу: не «класовий борець», а «християнський максималіст».'
- section: 'Підсумок: Голос, що волає в пустелі'
  words: 600
  points:
  - 'Вплив послання на сучасників: мобілізація православного табору.'
  - 'Парадокс Острозького: чому князь не зміг спинити унію?'
  - Спадщина Вишенського в українській літературі (від Шевченка до Франка).
  - Актуальність етичного максималізму в наш час.
