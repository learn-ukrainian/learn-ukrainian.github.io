slug: art-orthography
title: Art Orthography
word_target: 5000
content_outline:
- section: Вступ
  words: 400
  points:
  - 'Визначення мистецтва правопису: більше ніж просто передача звуків.'
  - Рукописна книга як «фасад барокової кам'яниці».
  - Значення візуальної культури тексту в Рутенську добу.
- section: 'Основний матеріал: I — Еволюція кириличного письма'
  words: 800
  points:
  - 'Устав (Ustav): Геометрія сакрального слова.'
  - 'Півустав (Pivustav): Перехід до прагматики.'
  - 'Народження скоропису: Швидкість, що стала мистецтвом.'
  - 'Технологічний зсув: Від пергаменту до паперу.'
- section: 'Основний матеріал: II — Український скоропис: Феномен бароко'
  words: 1000
  points:
  - 'Естетика руху: Динаміка, асиметрія, ритм.'
  - 'Графічні особливості: Виносні літери та петлі.'
  - 'Західний вплив: Синтез кириличної традиції та латинської каліграфії.'
  - 'Деколонізація: Фундаментальні відмінності від московського письма.'
- section: 'Основний матеріал: III — Канцелярська естетика Гетьманщини'
  words: 900
  points:
  - Генеральна Військова Канцелярія як центр стилю.
  - 'Писар як митець: Статус та майстерність.'
  - 'Аналіз артефакту: Візуальна структура гетьманського універсалу.'
  - 'Психологія розчерку: Свобода в межах канону.'
- section: 'Основний матеріал: IV — В''язь та декоративне оформлення'
  words: 800
  points:
  - 'В''язь: Декоративне письмо заголовків.'
  - 'Ініціали та орнамент: Рослинні мотиви та символізм.'
  - 'Діалог медіа: Вплив рукопису на друкарські шрифти (Острозька Біблія).'
  - 'Колір у тексті: Кіновар (червоний) та чорнило.'
- section: 'Основний матеріал: V — Палеографія як ключ до історії'
  words: 600
  points:
  - Іван Каманін та наукове вивчення українського письма.
  - 'Методи прочитання: Як розшифрувати «пташине письмо».'
  - 'Палеографія як доказ: Атрибуція та датування документів.'
- section: Підсумок
  words: 500
  points:
  - Спадщина барокового скоропису в модерному дизайні (Нарбут).
  - Правопис як маркер культурної ідентичності.
  - 'Завершення модуля: Зв''язок форми та змісту.'
