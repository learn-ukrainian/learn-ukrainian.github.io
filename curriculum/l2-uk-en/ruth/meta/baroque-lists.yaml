slug: baroque-lists
title: Baroque Lists
word_target: 5000
content_outline:
- section: 'Вступ: Естетика надміру'
  words: 600
  points:
  - 'Концепція horror vacui (страх порожнечі) в українському бароко: від іконостасу
    до тексту.'
  - 'Світ як лабіринт речей: енциклопедичне прагнення охопити все суще.'
  - Список як універсальна форма організації хаосу.
- section: 'Теорія нагромадження: Ампліфікація'
  words: 800
  points:
  - 'Риторичні фігури: congeries (нагромадження), enumeratio (перелік), amplificatio
    (поширення).'
  - Copia verborum (багатство слів) як інтелектуальна чеснота могилянської школи.
  - 'Функціональність списку: переконати через приголомшення кількістю аргументів.'
- section: 'Іван Вишенський: Реєстр гріхів'
  words: 1000
  points:
  - 'Агресивна риторика: список як звинувачувальний акт.'
  - 'Аналіз уривка з «Послання до єпископів»: нагромадження видів смерті та страждань.'
  - Асиндетон (безсполучниковість) як засіб створення напруги та динаміки.
  - Сатиричний ефект каталогізації людських вад.
- section: 'Лазар Баранович: Словесна архітектура'
  words: 800
  points:
  - 'Гомілетика (проповідь) як мистецтво симетрії: анафоричні конструкції.'
  - 'Аналіз уривків з «Меча Духовного»: списки біблійних прецедентів.'
  - 'Декоративна функція переліку: текст як орнамент.'
  - Порівняння «негативних каталогів» Вишенського та «позитивних каталогів» Барановича.
- section: 'Світська канцелярія: Реєстри та описи'
  words: 800
  points:
  - 'Документальне бароко: реєстри Війська Запорозького як форма ідентичності.'
  - «Генеральне слідство про маєтності» як приклад адміністративного нагромадження.
  - 'Інвентаризація світу: переліки майна, клейнодів, трофеїв у козацьких літописах.'
  - Вплив канцелярської мови на художню літературу.
- section: Граматика переліку
  words: 800
  points:
  - 'Синтаксис однорідних членів речення: керування та узгодження.'
  - Ланцюжки родових відмінків (genitivus) для позначення приналежності та кількості.
  - Орудний відмінок (instrumentalis) у списках інструментів та засобів.
  - 'Ритміка прози: як довжина елементів списку впливає на темп читання.'
- section: 'Підсумок: Світ як текст'
  words: 600
  points:
  - Спадщина барокового переліку в модерній літературі (від Котляревського до Андруховича).
  - Список як свідчення невичерпності мови та світу.
  - Значення «каталогізації» для збереження культурної пам'яті.
