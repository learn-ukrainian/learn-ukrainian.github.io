slug: revelations
title: Revelations
word_target: 5000
content_outline:
- section: 'Вступ: Есхатологія Русі'
  words: 400
  points:
  - Апокаліптичні настрої в українському суспільстві XVI-XVII ст.
  - Вплив історичних катаклізмів (війни, Унія, Руїна) на світогляд.
  - Очікування 'кінця світу' як культурний феномен.
- section: 'Тексти: Одкровення в Острозькій Біблії'
  words: 800
  points:
  - Острозька Біблія 1581 року як перше повне друковане видання.
  - Текстологічні особливості перекладу Апокаліпсису.
  - Роль Острозького культурного осередку у збереженні тексту.
  - Вплив церковнослов'янської мови на сакральний стиль.
- section: 'Полеміка: Риторика Антихриста'
  words: 1000
  points:
  - 'Іван Вишенський: пророк-аскет і його ''Книжка''.'
  - Образ Антихриста у полемічній літературі (протидія Унії).
  - 'Стилістичні прийоми: нагнітання, риторичні звертання, ''плетіння словес''.'
  - Цитати з творів Вишенського про 'слід антихристів'.
- section: 'Апокрифи: Таємниці Еноха'
  words: 800
  points:
  - Поширення апокрифічної літератури на українських землях.
  - '''Книга тайн Енохових'' (Полтавський список 1679 р.).'
  - Містичні видіння та їх відмінність від канонічного тексту.
  - Інтерес козацької еліти до езотеричних знань.
- section: 'Візуалізація: Страшний Суд у бароко'
  words: 800
  points:
  - Іконографія 'Страшного Суду' в українському мистецтві.
  - 'Соціальна сатира: зображення грішників (суддів, панів, корчмарів).'
  - 'Символіка: ''Змій митарств'', терези правосуддя.'
  - Дидактична роль ікони в притворі храму.
- section: 'Лексика: Мова пророцтв'
  words: 800
  points:
  - 'Ключова лексика: ''прелесть'', ''суд'', ''вінець'', ''печать''.'
  - Семантичний аналіз староукраїнських термінів.
  - Порівняння з сучасною українською мовою.
  - Вплив біблійної фразеології на літературну мову.
- section: 'Висновки: Спадщина'
  words: 400
  points:
  - Вплив апокаліптичної традиції на українську культуру.
  - Збереження ідентичності через релігійні тексти.
  - Актуальність тем 'суду' і 'правди' для сьогодення.
