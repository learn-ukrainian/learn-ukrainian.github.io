slug: szlachta-nobility
title: Szlachta Nobility
word_target: 5000
content_outline:
- section: 'Вступ: Лицарський стан Європи'
  words: 400
  points:
  - 'Визначення шляхти: привілейований стан воїнів-землевласників.'
  - Етимологія та паралелі з європейським дворянством (nobility).
  - Унікальність шляхетської демократії в контексті абсолютистської Європи.
- section: 'Генеза: Від бояр Русі до шляхти Речі Посполитої'
  words: 800
  points:
  - Трансформація давньоруського боярства у шляхетський стан (XIV-XVI ст.).
  - Городельська унія 1413 р. та початок гербового братства.
  - 'Соціальна піраміда: Магнати (князі) — Середня шляхта — Дрібна шляхта (застінкова).'
  - Феномен 'шляхти-голоти' та її роль у війську.
- section: 'Правовий фундамент: Литовські Статути'
  words: 1000
  points:
  - Литовські Статути (1529, 1566, 1588) як 'Конституція' шляхетських прав.
  - Принцип Neminem captivabimus nisi jure victum (недоторканість особи без суду).
  - Майнові права та звільнення від основних податків.
  - 'Робота з першоджерелом: аналіз преамбули ІІІ Статуту (1588).'
- section: 'Політична культура: Золота Вольність'
  words: 900
  points:
  - 'Сейми та сеймики: механізм прямої демократії.'
  - 'Aurea Libertas: право обирати короля та контролювати владу.'
  - 'Liberum Veto: ідея повної згоди (unanimitas) та її наслідки.'
  - 'Рокош: легальне право на збройний опір тиранії монарха.'
- section: 'Ідентичність: Gente Ruthenus, Natione Polonus'
  words: 800
  points:
  - 'Формула ''Руського народу'': політична лояльність vs етнічна приналежність.'
  - 'Мовна боротьба: захист ''руської мови'' в судочинстві (привілеї 1569 р.).'
  - Сарматизм як спільний міф польської та руської еліти.
  - 'Конфесійний поділ: православ''я як маркер ідентичності та причини полонізації.'
- section: Матеріальний світ та Геральдика
  words: 700
  points:
  - 'Сарматський стиль: кунтуш, жупан, зачіска (чуб).'
  - 'Символіка зброї: шабля як символ честі.'
  - 'Руська геральдика: від родових знаків до лицарських гербів (Сас, Корчак).'
  - 'Похоронний ритуал та портрет: увічнення слави роду.'
- section: 'Підсумок: Спадщина шляхетської культури'
  words: 400
  points:
  - Вплив шляхетської культури на козацьку старшину.
  - Литовські Статути як основа Кодексу законів 1743 р.
  - 'Сучасна оцінка: від ''класових ворогів'' до творців державності.'
