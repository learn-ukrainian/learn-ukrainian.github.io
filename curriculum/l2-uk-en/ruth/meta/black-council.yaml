slug: black-council
title: Black Council
word_target: 5000
content_outline:
- section: 'Вступ: Початок Великої Руїни'
  words: 400
  points:
  - 'Політична карта України після Чуднівської кампанії 1660 року: розкол на два береги.'
  - Лівобережна Гетьманщина як арена боротьби між елітарним (державницьким) та охлократичним
    проектами.
  - 'Термін «Чорна рада»: участь не лише козацтва, а й міщан та селян («черні»).'
- section: 'Основний матеріал: I — Кандидати на булаву'
  words: 800
  points:
  - 'Яким Сомко: наказний гетьман, шурин Богдана Хмельницького, представник заможної
    старшини.'
  - 'Політична програма Сомка: сильна гетьманська влада, збереження традиційних прав,
    опора на еліту.'
  - 'Іван Брюховецький («Іванець»): кошовий отаман, майстер соціальної демагогії.'
  - 'Риторика Брюховецького: обіцянки рівності, заклики до погромів старшини, маніпуляція
    біднотою.'
  - 'Василь Золотаренко: амбіції ніжинського полковника та розпорошення сил державників.'
- section: 'Основний матеріал: II — Хроніка ніжинської трагедії'
  words: 1000
  points:
  - 'Підготовка до ради: агітація Брюховецького та пасивність Сомка.'
  - 'Події 17-18 червня 1663 року під Ніжином: хаос, відсутність порядку, озброєна
    юрба.'
  - 'Роль московського фактора: підтримка Брюховецького воєводою Гагіним.'
  - 'Кульмінація ради: фізичне знищення прихильників Сомка, проголошення Брюховецького
    гетьманом.'
  - 'Арешт опонентів: віроломство московського командування, яке гарантувало безпеку.'
- section: 'Основний матеріал: III — Батуринські статті та втрата автономії'
  words: 800
  points:
  - 'Батуринські статті (листопад 1663): плата Брюховецького за підтримку Москви.'
  - 'Ключові пункти: утримання московських залог коштом українського населення.'
  - 'Економічна блокада: заборона продажу хліба на Правобережжя та горілки в Московію.'
  - 'Перепис населення: перший крок до московського оподаткування.'
  - 'Порівняння з Переяславськими статтями 1654 та 1659 років: динаміка звуження прав.'
- section: 'Основний матеріал: IV — Мучеництво державників'
  words: 600
  points:
  - 'Доля переможених: ув''язнення та катування Сомка і Золотаренка.'
  - 'Страта 18 вересня 1663 року в Борзні: опис за літописними джерелами.'
  - 'Реакція суспільства: швидке прозріння «черні» та початок антимосковських настроїв.'
  - 'Моральний вимір: Сомко як символ незламності державного духу.'
- section: 'Практика: Аналіз мови джерел'
  words: 800
  points:
  - 'Аналіз уривка з «Літопису Самовидця» про Чорну раду: лексика, синтаксис, емоційне
    забарвлення.'
  - Порівняння мови літопису з мовою офіційних документів (Батуринські статті).
  - Поняття «староукраїнська книжна мова» на прикладі текстів XVII століття.
  - 'Робота з історичною термінологією: *гетьман наказний*, *кошовий*, *чернь*, *універсал*.'
- section: 'Підсумок: Уроки Чорної ради'
  words: 600
  points:
  - Чорна рада як перемога охлократії над державністю.
  - 'Наслідки для України: поглиблення Руїни, втрата суверенітету, розчарування в
    союзі з Москвою.'
  - 'Історична пам''ять: від літописів до роману Пантелеймона Куліша.'
  - 'Актуальність уроків 1663 року для сучасної України: єдність еліти та небезпека
    популізму.'
