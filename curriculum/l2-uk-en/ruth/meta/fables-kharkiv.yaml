slug: fables-kharkiv
title: Fables Kharkiv
word_target: 5000
content_outline:
- section: 'Вступ: Барокова байка'
  words: 600
  points:
  - Жанр байки в українській літературі XVIII ст.
  - Езопівська мова та алегорія як інструменти філософа
  - Специфіка 'сили' (моралі) у байках Сковороди
- section: 'Основний матеріал: I — ''Байки Харківські'''
  words: 1000
  points:
  - 'Історія створення збірки: Харківський період (1769–1774)'
  - Присвята Опанасу Панкову та дружнє коло Сковороди
  - 'Структура збірки: від простих сюжетів до глибокої філософії'
  - Рукописна традиція та перші видання
- section: 'Основний матеріал: II — ''Бджола та Шершень'''
  words: 1000
  points:
  - 'Аналіз сюжету: діалог двох життєвих філософій'
  - 'Образ Шершня: паразитизм та споживання (''жити, щоб їсти'')'
  - 'Образ Бджоли: радість від процесу праці (''солодкість збору меду'')'
  - 'Робота з оригінальним текстом: ключові цитати'
- section: 'Основний матеріал: III — Філософія ''Сродної праці'''
  words: 1000
  points:
  - Концепція 'сродності' (природженості) як основи щастя
  - 'Божественний промисел: ''потрібне — неважке, важке — непотрібне'''
  - 'Суспільний вимір: нещастя від займатися ''несродним'' ділом'
  - 'Приклади Сковороди: мисливський пес, землероб, воїн'
- section: 'Основний матеріал: IV — Мовний світ Сковороди'
  words: 800
  points:
  - 'Деколонізація: чому мова Сковороди — це не ''російська'''
  - Книжна українська мова (Slov'ianoruska) XVIII століття
  - Синтез церковнослов'янської, латини та живої народної мови
  - Значення збереження автентичного звучання текстів
- section: 'Практика: Аналіз тексту'
  words: 400
  points:
  - Робота з уривками 'Бджоли та Шершня'
  - Визначення архаїзмів та їх сучасних відповідників
  - Інтерпретація алегорій
- section: 'Підсумок: Спадщина'
  words: 200
  points:
  - Вплив 'Байок Харківських' на нову українську літературу
  - Актуальність ідеї 'сродної праці' у XXI столітті
