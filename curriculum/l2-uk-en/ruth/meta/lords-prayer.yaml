slug: lords-prayer
title: Lords Prayer
word_target: 5000
content_outline:
- section: Вступ
  words: 400
  points:
  - Молитва «Отче наш» як фундаментальний текст християнської культури
  - Роль молитви в початковій освіті (Букварі XVI-XVII ст.)
  - 'Диглосія: співіснування сакральної (церковнослов''янської) та «простої» мов'
- section: 'Основний матеріал: I — Острозький канон (1581)'
  words: 1000
  points:
  - Острозька Біблія як спроба стандартизації православного тексту
  - 'Аналіз тексту: архаїчні форми (Отче, даждь, єси)'
  - 'Граматичні особливості: кличний відмінок та імперативи'
  - 'Сакральність незмінності: чому текст не перекладали повністю'
- section: 'Основний матеріал: II — Виклики «простої мови» (XVI ст.)'
  words: 1000
  points:
  - Вплив Реформації та потреба розуміння тексту мирянами
  - 'Пересопницьке Євангеліє: народні глоси та маргіналії'
  - 'Переклад Валентина Негалевського (1581): пошук народних відповідників'
  - Полонізми як інструмент модернізації (кролество, винуватець)
- section: 'Основний матеріал: III — Лексичні глибини та семантика'
  words: 900
  points:
  - 'Проблема перекладу *epiousios*: «насущний», «щоденний» чи «надсутнісний»'
  - '«Борги» (opheilēmata) проти «Гріхів» (hamartia): богословські нюанси'
  - 'Тлумачення Памви Беринди: як розуміли «спокусу» та «лукавого» в XVII ст.'
  - Еволюція значень слів від давнини до сучасності
- section: 'Основний матеріал: IV — Київська вимова як ідентичність'
  words: 900
  points:
  - 'Деколонізація фонетики: Київський ізвод церковнослов''янської мови'
  - 'Особливості читання: ѣ → і, г → h, и → y (тверде)'
  - 'Могилянська доба: утвердження української вимови як канонічної'
  - Відмінності від московської редакції (йотування, вибухове ґ)
- section: 'Практика: Аналіз джерел'
  words: 500
  points:
  - Порівняння тексту Острозької Біблії та сучасного перекладу Огієнка
  - Пошук полонізмів у фрагментах Негалевського
  - Вправа на відтворення київської вимови (транскрипція)
- section: Підсумок
  words: 300
  points:
  - Спадщина перекладів XVI-XVII століть у сучасній українській мові
  - «Отче наш» як символ мовної стійкості та тяглості традиції
  - Значення київського ізводу для української церковної незалежності
