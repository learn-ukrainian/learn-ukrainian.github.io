  - 'Правнича термінологія Статуту: ''вряд'', ''рок судовий'', ''позов'', ''звод'''
  - Відмінність руської правничої мови від польської та церковнослов'янської
- section: 'Основний матеріал: II — Анатомія скарги: Львівський прецедент 1593 року'
