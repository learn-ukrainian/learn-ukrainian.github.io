slug: syntax-agreement
title: Syntax Agreement
word_target: 5000
content_outline:
- section: 'Вступ: Синтаксичний ландшафт руської мови'
  words: 400
  points:
  - Руська мова XVI-XVII ст. як синтез архаїки та модерну.
  - 'Вплив трьох стихій: народнорозмовної, церковнослов’янської та польсько-латинської.'
  - Синтаксис як дзеркало мислення епохи Бароко.
- section: 'Узгодження підмета і присудка: Феномен двоїни'
  words: 800
  points:
  - Категорія двоїни (Dualis) як жива норма, а не релікт.
  - Специфіка узгодження присудка з підметом у двоїні («очі видіста»).
  - Узгодження з колективними іменниками (конструкції за змістом).
  - 'Порівняння з сучасною нормою: що ми втратили.'
- section: 'Таємниці числівників: Рід і відмінок'
  words: 800
  points:
  - Числівник як семантична, а не морфологічна категорія в давнину.
  - Узгодження «два/дві» з іменниками в двоїні («дві літі»).
  - 'Розрізнення роду для числівників 3 і 4: «триє/чотириє» (чол.) vs «три/чотири»
    (жін./сер.).'
  - Вживання числівників у ділових документах (точність vs традиція).
- section: 'Давальний самостійний: Високий стиль'
  words: 800
  points:
  - Суть конструкції Dativus Absolutus (іменник+дієприкметник у давальному).
  - 'Функція: позначення часу або умови (еквівалент «коли...»).'
  - Приклади з Пересопницького Євангелія та актових книг.
  - Занепад конструкції та витіснення підрядними реченнями.
- section: Керування та прийменникові конструкції
  words: 800
  points:
  - 'Еволюція відмінкового керування: від синтетизму до аналітизму.'
  - Роль прийменників «о», «для», «через», «ведлуг».
  - 'Варіативність керування: «сміятися з кого» vs «сміятися кому».'
  - Вплив польських моделей керування на ділову мову.
- section: 'Вплив латини та польської: Гіпотаксис'
  words: 800
  points:
  - Розвиток складнопідрядних речень (гіпотаксису).
  - 'Експансія сполучників: «іж», «же», «аби», «поневаж».'
  - 'Інверсія та порядок слів: риторичні фігури барокового тексту.'
  - 'Пасивні конструкції: «має бути зроблено» vs «ся робить».'
- section: 'Підсумок: Спадщина руського синтаксису'
  words: 400
  points:
  - Які риси староукраїнського синтаксису збереглися в сучасній мові.
  - Роль руської мови як «містка» до європейських синтаксичних моделей.
  - Завершення формування основної структури українського речення.
