slug: treason
title: Treason
word_target: 5000
content_outline:
- section: 'Вступ: Феномен зради у ранньомодерному суспільстві'
  words: 400
  points:
  - 'Визначення ''зради'' (здради) у контексті XVI-XVIII століть: від особистої невірності
    до державного злочину.'
  - Концепція 'Crimen laesae maiestatis' (образа величності) як фундамент правового
    розуміння зради.
  - 'Соціальна небезпека злочину: загроза не лише монарху, а й ''Речі Посполитій''
    (спільному благу).'
- section: 'Законодавче поле: Литовський Статут і ''Образа Маєстату'''
  words: 800
  points:
  - Аналіз Третього Литовського Статуту (1588), Розділ 1, Артикул 3.
  - 'Юридичні складові злочину: змова, замах на життя монарха, перехід на бік ворога.'
  - 'Принцип таліону: відповідальність позивача за недоведене звинувачення (''тим
    караньем сам каран бути має'').'
  - 'Види покарань: ''кара на горло'', кваліфіковані страти, конфіскація майна та
    ''честі''.'
- section: 'Судова практика: Від ''слова і діла'' до вироку'
  words: 800
  points:
  - Процедура розслідування справ про державну зраду ('слово і діло государеве').
  - 'Інквізиційний характер процесу: роль катувань як засобу отримання ''істини''.'
  - 'Специфіка козацького судочинства Гетьманщини: компетенція Генерального військового
    суду.'
  - 'Станова диференціація покарань: можливість викупу (''композиції'') для козацької
    старшини.'
- section: 'Політична зрада як інструмент влади: Справа Виговського'
  words: 900
  points:
  - 'Гадяцька унія 1658 року: геополітичний вибір чи ''зрада'' царю?'
  - Використання риторики 'зради' Москвою для підбурювання опозиції (Пушкар, Барабаш).
  - Громадянська війна (Руїна) як наслідок маніпуляції поняттям вірності.
  - 'Трансформація лояльності: кому служить гетьман — монарху чи Війську Запорозькому?'
- section: 'Анатомія доносу: Казус Кочубея та Іскри'
  words: 1100
  points:
  - 'Конфлікт Генерального судді В. Кочубея та Гетьмана І. Мазепи: особисті та політичні
    мотиви.'
  - 'Текст доносу 1708 року: аналіз звинувачень (сепаратизм, ''лядська'' орієнтація).'
  - 'Реакція Петра I: парадокс довіри до Мазепи та катування донощиків.'
  - Страта Кочубея та Іскри як легітимний акт правосуддя (на той момент) за неправдивий
    донос.
  - 'Імперська міфологізація: перетворення донощиків на ''мучеників за правду'' після
    переходу Мазепи до шведів.'
- section: Спадщина та еволюція поняття
  words: 600
  points:
  - 'Еволюція терміну: від ''образи маєстату'' до сучасної ''державної зради'' (ст.
    111 ККУ).'
  - Вплив 'комплексу Мазепи' на українську політичну культуру.
  - Феномен 'зрадофільства' як наслідок історичної травми бездержавності.
- section: 'Підсумок: Ціна вірності'
  words: 400
  points:
  - 'Узагальнення: зрада як інструмент імперського контролю та руйнування еліт.'
  - Важливість правової визначеності для захисту суверенітету.
  - Зв'язок історичного досвіду Гетьманщини із сучасними викликами колабораціонізму.
