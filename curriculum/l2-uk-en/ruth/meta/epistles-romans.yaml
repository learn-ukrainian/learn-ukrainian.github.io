slug: epistles-romans
title: Epistles Romans
word_target: 5000
content_outline:
- section: 'Історичний контекст: Послання до Римлян у добу Реформації'
  words: 800
  points:
  - Послання до Римлян як 'theologus teologorum' (богослов'я богословів) у XVI ст.
  - 'Вплив європейської Реформації на українські землі: чому питання ''виправдання
    вірою'' стало актуальним.'
  - 'Ситуація з біблійними текстами в Україні середини XVI ст.: рукописна традиція
    vs перші друки.'
  - 'Два шляхи перекладу: сакралізація (Острозька Біблія) та вернакуляризація (переклади
    ''простою мовою'').'
- section: 'Валентин Негалевський: Переклад ''для посполитого читання'' (1581)'
  words: 900
  points:
  - 'Особа перекладача: шляхтич із Волині, секретар унітаріанського збору.'
  - 'Джерело перекладу: польська Біблія Мартина Чеховича (1577) та її вплив на текст.'
  - 'Мовна революція: відмова від церковнослов''янізмів на користь живої розмовної
    мови.'
  - 'Унікальна лексика: ''винуватець'' замість ''грішник'', ''збір'' замість ''церква''.'
  - 'Порівняльний аналіз уривка з Римлян: Негалевський vs сучасний переклад.'
- section: 'Острозька Біблія: Консервативний канон і високий стиль'
  words: 800
  points:
  - 'Стратегія Острозького гуртка: повернення до грецьких джерел через призму церковнослов''янської
    мови.'
  - 'Текстологічна робота над Посланням до Римлян: звірка з багатьма списками.'
  - 'Стилістика: урочистість, архаїчність, збереження складних синтаксичних конструкцій.'
  - Роль Острозької Біблії як 'щита' проти католицької та протестантської експансії.
- section: 'Термінологічний аналіз I: Оправдання (Dikaiosyne)'
  words: 900
  points:
  - Центральне богословське поняття Послання до Римлян (Рим. 3-4).
  - Етимологія терміну 'правда' і 'справедливість' у староукраїнській мові.
  - 'Юридичний аспект терміну: ''оправданіє'' в Литовських Статутах як судовий вирок.'
  - 'Як перекладачі XVI ст. вирішували дилему: стан праведності чи акт виправдання?'
  - 'Порівняння: ''справедливість'' (Негалевський) vs ''правда'' (Острозька Біблія).'
- section: 'Термінологічний аналіз II: Благодать (Charis)'
  words: 800
  points:
  - 'Багатозначність грецького *charis*: дар, прихильність, краса.'
  - Опозиція 'благодать' (церковне) vs 'ласка' (світське/польське).
  - Вживання терміну в полемічній літературі (Іпатій Потій, Клірик Острозький).
  - 'Еволюція поняття: від ''милості сюзерена'' до ''божественної енергії''.'
- section: 'Рецепція та спадщина: Послання в українській культурі'
  words: 800
  points:
  - Використання аргументів з Римлян у міжконфесійній полеміці (питання влади, Рим.
    13).
  - Вплив перекладів XVI ст. на формування української богословської лексики.
  - 'Доля рукописів: чому переклад Негалевського залишився в рукописі, а Острозька
    Біблія стала каноном.'
  - 'Сучасна оцінка: Негалевський як предтеча перекладів Куліша та Огієнка.'
