slug: advanced-property
title: Advanced Property
word_target: 5000
content_outline:
- section: 'Вступ: Природа власності у руському праві'
  words: 400
  points:
  - Концепція 'dominium' (власність) vs 'possessio' (володіння) у Литовських Статутах.
  - Священність права власності ('ніхто не може бути позбавлений майна без суду').
  - 'Роль писаного права: чому руська шляхта так трималася за свої ''привілеї'' та
    ''листи''.'
- section: 'Литовські Статути: Правовий фундамент'
  words: 800
  points:
  - 'Еволюція законодавства: Статути 1529, 1566 та 1588 років як основа майнового
    права.'
  - 'Категорії земель: ''Дідизна'' (спадкові землі) vs ''Вислуга'' (надані за службу,
    тимчасові).'
  - Обмеження на розпорядження 'вислугами' порівняно з повною свободою 'дідизни'.
  - 'Публічність угод: роль ґродських і земських книг (прообраз сучасного реєстру).'
- section: 'Інститут Застави (Mortgage): Антихрез та кредит'
  words: 900
  points:
  - Поняття застави у Статуті 1588 року (Розділ 7).
  - 'Механізм ''антихрезу'': передача землі у володіння кредитору замість сплати відсотків.'
  - 'Ризики для боржника: перехід права власності у разі невикупу протягом 30 років.'
  - Застава як прихована форма купівлі-продажу ('застава вічна').
- section: 'Оренда (Lease): Економічний двигун'
  words: 700
  points:
  - Оренда ('аренда') як головний інструмент управління магнатськими латифундіями.
  - 'Права орендаря: не лише господарювання, а й судочинство над підданими.'
  - 'Типи договорів: короткострокові (на 3 роки) та довгострокові (''до живота'').'
  - 'Соціальна напруга: конфлікти між орендарями та селянами/козаками.'
- section: Козацьке звичаєве право та Займанщина
  words: 800
  points:
  - 'Революція 1648 року: крах магнатського землеволодіння на Гетьманщині.'
  - 'Право ''займанщини'': легітимізація освоєння вільних земель (''хто перший зайняв'').'
  - Гетьманські універсали як нові титули власності (заміна королівських грамот).
  - Співіснування писаного права (Статут) і звичаєвого ('козацькі вольності').
- section: 'Аналіз джерел: Купча та Універсал'
  words: 900
  points:
  - 'Структура купчої грамоти XVII ст.: інвокація, інтитуляція, диспозиція.'
  - 'Ключові формули: ''добровільно і без примусу'', ''на вічні часи'', ''з усіма
    угіддями''.'
  - Аналіз фрагменту Універсалу Богдана Хмельницького (підтвердження прав монастирям
    або старшині).
  - Роль свідків ('возний') та печатки у валідації документу.
- section: 'Підсумок: Від Статуту до Гетьманщини'
  words: 500
  points:
  - 'Тяглість правової традиції: українське право не зникло, а трансформувалося.'
  - 'Порівняння з московською системою: ''приватна власність'' vs ''царська ласка''.'
  - Вплив цих правових норм на формування української ментальності (індивідуалізм
    господаря).
