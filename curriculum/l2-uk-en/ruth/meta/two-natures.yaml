slug: two-natures
title: Two Natures
word_target: 5000
content_outline:
- section: 'Вступ: Бароковий світ і пошук сутності'
  words: 400
  points:
  - 'Бароко як епоха контрастів: земне і небесне, тлінне і вічне'
  - Києво-Могилянська академія як інтелектуальний ґрунт філософії Сковороди
  - 'Мандрівний філософ: життєвий шлях як втілення вчення'
- section: 'Вчення про дві натури: Видиме і Невидиме'
  words: 700
  points:
  - 'Фундаментальний дуалізм: «Весь світ складається з двох натур»'
  - 'Видима натура: «тварь», матерія, зовнішня оболонка, змінність'
  - 'Невидима натура: Бог, Дух, істина, вічність, внутрішня сутність'
  - 'Взаємозв''язок натур: невидиме пронизує і утримує видиме (як дерево і тінь)'
- section: 'Вчення про три світи: Макрокосм (Всесвіт)'
  words: 600
  points:
  - Макрокосм як «великий світ», обитель всього живого
  - Вічність матерії в її духовній першооснові
  - Природа як книга, що потребує прочитання
- section: 'Вчення про три світи: Мікрокосм (Людина)'
  words: 700
  points:
  - Людина як «малий світ», дзеркало Макрокосму
  - Внутрішня людина (дух) і зовнішня людина (тіло)
  - '«Наркіс»: пізнання себе як шлях до пізнання Бога'
  - Серце як осердя духовного життя (кордоцентризм)
- section: 'Вчення про три світи: Символічний світ (Біблія)'
  words: 600
  points:
  - Біблія як третій, символічний світ, що поєднує макро- і мікрокосм
  - 'Алегоричний метод тлумачення Святого Письма: пошук прихованого змісту'
  - 'Емблематика: Змій (земна мудрість) і Голуб (Святий Дух)'
  - Світ символів як міст між видимим і невидимим
- section: 'Етичний вимір: Щастя і сродна праця'
  words: 700
  points:
  - Щастя як внутрішній мир і згода з самим собою (невидимою натурою)
  - 'Концепція «сродної праці»: праця, що відповідає природним схильностям'
  - '«Нерівна рівність»: кожен наповнює свою посудину (натуру) по-різному, але всі
    повні'
  - 'Свобода від світу: «Світ ловив мене, та не спіймав»'
- section: 'Стиль і мова: Барокова риторика'
  words: 600
  points:
  - 'Літературні жанри: діалоги, байки, притчі, пісні («Сад божественних пісень»)'
  - 'Мовна специфіка: синтез книжної української, церковнослов''янської та латини'
  - 'Барокова стилістика: антитези, метафори, риторичні фігури'
  - 'Педагогічний аспект: філософія як практичне навчання життю'
- section: 'Підсумок: Спадщина і сучасність'
  words: 500
  points:
  - Вплив Сковороди на український романтизм (Шевченко, Куліш) і модернізм
  - Кордоцентризм як риса українського національного характеру
  - Актуальність вчення про дві натури в сучасному світі
  - 'Деколонізація образу Сковороди: повернення до автентичного прочитання'
