slug: vernacular-glosses
title: Vernacular Glosses
word_target: 5000
content_outline:
- section: Вступ
  words: 600
  points:
  - Визначення поняття «глоса» (грец. glossa) та його роль у середньовічній книжності.
  - 'Типи глос за розміщенням: інтерлінеарні (міжрядкові) та маргінальні (на полях).'
  - 'Історична необхідність: розрив між церковнослов''янською книжною мовою та живим
    розмовним мовленням XVI ст.'
  - 'Функція глоси: не просто переклад, а «демократизація» сакрального тексту для
    посполитого люду.'
- section: 'Основний матеріал: I — Природа та типи глос'
  words: 1000
  points:
  - 'Структура глоси: слово-реципієнт → сполучник-маркер (то єсть, рекше, або) → вернакулярний
    відповідник.'
  - 'Лексичні глоси: заміна архаїзмів на загальновживані слова (перст → палець, рама
    → плечі).'
  - 'Синонімічні ряди (ампліфікація): наведення кількох відповідників для точності
    (напр., студня → колодязь, криниця).'
  - 'Глоси як індикатор мовної норми: фіксація живої фонетики та морфології всупереч
    канону.'
- section: 'Основний матеріал: II — Пересопницький феномен'
  words: 1200
  points:
  - Пересопницьке Євангеліє (1556–1561) як вершина української глосної традиції.
  - 'Аналіз побутової лексики в глосах: клуня, стодола, гумно — відображення реалій
    українського села XVI ст.'
  - Роль архімандрита Григорія та писаря Михайла у відборі народної лексики.
  - 'Культурний контекст: вплив Реформації та прагнення зробити Святе Письмо зрозумілим
    «для кожного християнина».'
- section: 'Основний матеріал: III — Від маргіналій до словників'
  words: 1000
  points:
  - 'Еволюційний шлях: від розрізнених написів на полях до систематизованих глосаріїв.'
  - «Лексис» Лаврентія Зизанія (1596) як перший друкований результат систематизації
    глос.
  - '«Лексикон» Памва Беринди (1627): завершення процесу кодифікації староукраїнської
    лексики.'
  - Глоси як доказ тяглості української мовної традиції від Русі до Модерну.
- section: Практика
  words: 800
  points:
  - 'Аналіз оригінальних уривків з Пересопницького Євангелія: ідентифікація глос.'
  - 'Робота з синонімічними парами: реконструкція сучасних відповідників до церковнослов''янізмів.'
  - 'Етимологічний розбір: чому слово «студня» стало незрозумілим, а «криниця» перемогла.'
  - Порівняння глос XVI ст. із сучасною літературною мовою.
- section: Підсумок
  words: 400
  points:
  - Глоси як «живий пульс» мови, що пробивається крізь панцир канону.
  - 'Спростування імперського міфу про «спільну мову»: глоси доводять лексичну окремішність
    української мови вже в XVI ст.'
  - Значення рукописної спадщини для формування національної ідентичності.
