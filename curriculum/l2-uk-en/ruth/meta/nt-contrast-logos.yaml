slug: nt-contrast-logos
title: Nt Contrast Logos
word_target: 5000
content_outline:
- section: Вступ
  words: 400
  points:
  - 'Концепція Логосу: сакральність проти зрозумілості'
  - Україна XVI століття як поле битви двох перекладацьких стратегій
  - 'Огляд модуля: шлях від Пересопниці до Острога'
- section: 'Основний матеріал: I — Історичний контекст та виклики XVI століття'
  words: 800
  points:
  - 'Вплив Реформації: Європа перекладає Біблію (Лютер, 1534)'
  - Криза руської ідентичності перед лицем католицької експансії
  - 'Дилема: зберегти сакральну мову (ЦС) чи перейти на живу руську'
  - Роль монастирів та магнатів у збереженні культури
- section: 'Основний матеріал: II — Пересопницьке Євангеліє: Живе слово (1556-1561)'
  words: 900
  points:
  - 'Історія створення: фундація княгині Анастасії Заславської'
  - 'Творці: архімандрит Григорій та писар Михайло Василевич'
  - 'Мовні особливості: фонетика живого мовлення (ікавізм, перехід о/е в і)'
  - 'Художнє оформлення: ренесансні орнаменти та мініатюри'
- section: 'Основний матеріал: III — Острозька Біблія: Канонічна твердиня (1581)'
  words: 900
  points:
  - Острозька академія як 'Волинські Афіни' та інтелектуальний центр
  - 'Місія князя Острозького: об''єднання православного світу через канон'
  - 'Титанічна праця: пошук грецьких та слов''янських першоджерел'
  - 'Роль Івана Федорова: типографська досконалість та післямова'
- section: 'Основний матеріал: IV — Порівняльний аналіз тексту (Пролог Івана)'
  words: 900
  points:
  - 'Текстологічне зіставлення: ''Въ началѣ бѣ Слово'' (Острог) проти вернакулярних
    варіацій'
  - 'Синтаксис: ''дательный самостоятельный'' проти прийменникових конструкцій'
  - 'Лексика: архаїзми високого стилю проти слів ''простої мови'''
  - 'Богословський вимір: як переклад змінює сприйняття сакрального'
- section: 'Основний матеріал: V — Глоси як міст до розуміння'
  words: 800
  points:
  - Феномен глос у Пересопницькому Євангелії
  - 'Візуальна організація: прямокутні рамки та дрібний шрифт'
  - 'Аналіз прикладів: ''чресла/стегна'', ''бдѣти/не спати'', ''стрѣху/дах'''
  - Народження української наукової термінології через тлумачення
- section: Практика
  words: 400
  points:
  - 'Робота з факсиміле: читання давніх шрифтів'
  - 'Вправа: ідентифікація глос у тексті'
  - 'Перекладацький практикум: від ЦС до сучасної української'
- section: Підсумок
  words: 400
  points:
  - 'Два шляхи — одна мета: збереження ідентичності'
  - Пересопниця як символ тяглості (Президентська присяга)
  - Острозька Біблія як доказ інтелектуальної потужності Русі
  - Спадщина XVI століття в сучасній українській культурі
