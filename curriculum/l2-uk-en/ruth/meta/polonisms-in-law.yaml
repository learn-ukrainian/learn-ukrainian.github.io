slug: polonisms-in-law
title: Polonisms In Law
word_target: 5000
content_outline:
- section: Вступ
  words: 300
  points:
  - Роль канцелярської мови у формуванні літературного стандарту XVI-XVII ст.
  - 'Визначення полонізму: прямі запозичення та кальки'
  - 'Історичний контекст: Річ Посполита як простір мовного контакту'
- section: 'Основний матеріал: I — Історичні передумови та Люблінська унія'
  words: 600
  points:
  - Експансія Польського королівства на руські землі (XIV-XVI ст.)
  - 'Люблінська унія 1569 року: адміністративна уніфікація та мовні наслідки'
  - 'Мовна ситуація: руська мова як офіційна у ВКЛ, але під тиском польської'
  - Феномен 'gente Ruthenus, natione Polonus' та двомовність еліти
- section: 'Основний матеріал: II — Соціальна та адміністративна лексика'
  words: 800
  points:
  - 'Адміністративний апарат: воєвода, староста, каштелян, маршалок'
  - 'Станова лексика: шляхта, обиватель, посполите рушення'
  - 'Урбаністична термінологія (Магдебурзьке право): ратуша, ринок, цех, бурмістр'
  - 'Етикетна лексика: пан, ваша милість, вельможний, цнота'
- section: 'Основний матеріал: III — Правнича термінологія та судочинство'
  words: 800
  points:
  - 'Процесуальна лексика: позов, апеляція, декрет, трибунал'
  - 'Термінологія кримінального права: злочин, кара, страта, в''язниця'
  - 'Майнові відносини: власність, дідич, оренда, застава, скарб'
  - 'Роль латини як посередника: артикул, конституція, інстигатор'
- section: 'Основний матеріал: IV — Граматичні кальки та синтаксис'
  words: 600
  points:
  - 'Синтаксичні кальки: конструкції з прийменниками (за дозволом, до речі)'
  - 'Модальні конструкції: ''маю'' + інфінітив (mam pisać)'
  - 'Словотвір: іменники на -унок (рятунок, рахунок, гатунок)'
  - Вплив на дієслівне керування (дякувати кому? -> дякувати кого? - архаїзм)
- section: 'Основний матеріал: V — Аналіз Статуту 1588 року'
  words: 800
  points:
  - Третій Литовський Статут як вершина руської юридичної думки
  - 'Аналіз преамбули: ''обецуемъ и шлюбуемъ'' (лексичний розбір)'
  - Адаптація польських коренів до руської фонетики та морфології
  - Порівняння юридичних формул з сучасними українськими відповідниками
- section: Практика
  words: 600
  points:
  - 'Вправа: Ідентифікація полонізмів у тексті привілею XVI ст.'
  - 'Вправа: Реконструкція значення застарілих юридичних термінів'
  - 'Вправа: ''Переклад'' з канцелярської мови на сучасну українську'
  - 'Вправа: Розрізнення органічних запозичень та пізніших нашарувань'
- section: Підсумок
  words: 400
  points:
  - Спадщина полонізмів у сучасній українській мові (цікавий, перешкода, влада)
  - Роль польської мови як 'вікна в Європу' для староукраїнської культури
  - 'Деколонізаційний висновок: європейська природа української правової традиції'
