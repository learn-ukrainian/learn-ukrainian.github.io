slug: apostasy
title: Apostasy
word_target: 5000
content_outline:
- section: 'Вступ: Дилема руської еліти'
  words: 400
  points:
  - Визначення поняття 'апостазія' (відступництво) в контексті XVII століття.
  - 'Трагедія ''Русі без голови'': загроза втрати політичного проводу.'
  - Релігійна конверсія як шлях до соціального ліфта в Речі Посполитій.
- section: 'Основний матеріал: I — Контекст вибору: Спокуса короною'
  words: 1200
  points:
  - 'Люблінська унія 1569 року: юридична рівність vs політична реальність.'
  - Привабливість 'золотої шляхетської свободи' та польської барокової культури.
  - 'Роль єзуїтської освіти: як колегіуми формували нову свідомість руської молоді.'
  - 'Берестейська унія 1596 року як каталізатор розколу: ''свої'' та ''чужі'' в одному
    роду.'
- section: 'Основний матеріал: II — Хроніка втрачених родів: Плач ''Треносу'''
  words: 1400
  points:
  - 'Аналіз уривка з ''Треносу'' (1610) Мелетія Смотрицького: перелік ''втрачених
    клейнодів''.'
  - 'Рід Острозьких: від ''стовпа православ''я'' (Костянтин Василь) до покатоличених
    нащадків.'
  - 'Казус Яреми Вишневецького: материнський заповіт Раїни Могилянки проти політичних
    амбіцій.'
  - Вишневецький як 'Młot na Kozaków' (Молот на козаків) — наслідки зміни ідентичності.
- section: 'Основний матеріал: III — Криза ідентичності: Gente Ruthenus'
  words: 1200
  points:
  - 'Формула Станіслава Оріховського: ''Gente Ruthenus, natione Polonus'' (Руського
    роду, польської нації).'
  - Чи можливо залишатися русином, будучи католиком? Приклад Адама Киселя.
  - 'Полемічна відповідь: критика Івана Вишенського та ''простих монахів''.'
  - 'Історичний наслідок: вакуум еліти заповнює козацтво, творячи нову національну
    ідею.'
- section: 'Практика: Риторика плачу та звинувачення'
  words: 400
  points:
  - Аналіз барокових риторичних фігур у тексті Смотрицького (метафори, оклики).
  - Порівняння архаїчної лексики (клейноди, оздоба, виродки) з сучасною.
  - 'Вправа: реконструкція аргументів ''за'' і ''проти'' конверсії.'
- section: 'Підсумок: Спадщина ''втраченого покоління'''
  words: 400
  points:
  - 'Оцінка явища апостазії: не лише зрада, а й культурна драма.'
  - Як 'апостати' мимоволі сприяли вестернізації української культури.
  - Перехід історичної ініціативи від князів до гетьманів.
