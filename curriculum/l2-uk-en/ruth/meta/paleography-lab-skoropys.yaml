slug: paleography-lab-skoropys
title: Paleography Lab Skoropys
word_target: 5000
content_outline:
- section: Вступ
  words: 400
  points:
  - 'Палеографія як ключ до історії повсякденності: чому важливо вміти читати оригінали.'
  - 'Скоропис (cursiva) vs Устав (uncial) vs Півустав: функціональні відмінності.'
  - Роль скоропису в адміністративній системі Гетьманщини та Речі Посполитої.
- section: 'Основний матеріал: I — Естетика українського бароко'
  words: 1200
  points:
  - 'Періодизація розвитку: від ''уставного скоропису'' XV ст. до барокового вибуху
    XVII ст.'
  - 'Український vs Московський скоропис: округлість проти кутастості, гармонія проти
    хаосу.'
  - Вплив європейської каліграфії та латинського письма на київську школу.
  - 'Скоропис як візуальний прояв українського бароко: динаміка, ритм, декоративність.'
- section: 'Основний матеріал: II — Графічні особливості та лігатури'
  words: 1400
  points:
  - 'Анатомія літери: основні штрихи, виносні елементи, петлі та закрути.'
  - 'Мистецтво лігатури: злите написання як засіб прискорення та прикрашання.'
  - 'Система скорочень: титла (прості та літерні), слова-ідеограми.'
  - 'Труднощі прочитання: варіативність накреслень (поліморфізм літер).'
- section: 'Основний матеріал: III — Канцелярія Війська Запорозького'
  words: 1200
  points:
  - 'Писарська еліта: освіта в колегіумах та професійні стандарти Генеральної канцелярії.'
  - 'Типологія документів: універсали, квити, тестаменти — як жанр впливав на почерк.'
  - 'Індивідуальні стилі: аналіз автографів Хмельницького, Мазепи, Виговського.'
  - 'Матеріальна культура: папір (філіграні), чорнило, гусячі пера.'
- section: 'Практика: Аналіз пам''яток'
  words: 400
  points:
  - 'Алгоритм палеографічного розбору: від загального до конкретного.'
  - 'Розбір фрагмента універсалу: транслітерація та коментар.'
  - Типові помилки початківців при читанні скоропису.
- section: Підсумок
  words: 400
  points:
  - 'Занепад скоропису у XVIII ст.: перехід до гражданського шрифту.'
  - Значення скоропису для сучасної української ідентичності та графічного дизайну.
  - 'Підготовка до наступного модуля: робота з реальними текстами.'
