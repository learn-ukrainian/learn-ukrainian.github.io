  text: "98\nУ цьому розділі ти прочитаєш твори одного з най­\nдавніших літературних\
    \ жанрів — байки. \nЧитаю байку для науки\nБайка — невеликий, найчастіше віршований\
    \ твір \nповчального змісту. У байках люди зображуються в \nобразах рослин, тварин,\
    \ різних предметів, але їхні вчинки і \nслова нагадують людські.\nБільшість байок\
    \ складається із двох частин: розповідь \nпро якийсь випадок, подію і повчальний\
    \ висновок — \nмораль.\nЗ висновку читачі можуть зрозуміти, що схвалюється, \n\
    а що засуджується у творі, як слід чи"
