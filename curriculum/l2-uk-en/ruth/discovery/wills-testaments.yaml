  text: "Отже, ці докази, які я назвав непричетними, дає не\r\nталант оратора, а пам’ять\
    \ і читання всяких авторів.\n\nЗабуття бога, яке протиставляється молитві, не\
    \ менше,\r\nніж будь-яке інше місце, зможе нам допомогти у підборі матеріалу.\
    \ А коли ми вже\r\nпояснили, які лиха походять від забуття бога, легко буде зрозуміти,\
    \ як дуже треба\r\nрекомендувати молитву, яка звільняє нас від багатьох лих, тому\
    \ що безперервно\r\nпідносить думку до бога. З цього стає зовсім ясно, який великий\
    \ запас доказів\r\nможна шукати у так"
