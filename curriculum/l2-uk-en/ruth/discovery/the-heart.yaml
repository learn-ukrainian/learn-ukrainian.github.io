    \ із наслідків і причин, у нас не було б можливосте говорити про\r\nбезумовну,\
    \ абсолютну причину, про Бога; якраз ми тому зводимо усі кінці і\r\nпочатки усього\
    \ існуючого до Бога, що наша самосвідомість показує нам в нашім\r\nдушевнім житті\
    \ таку першу причину, глибше якої ми вже "
