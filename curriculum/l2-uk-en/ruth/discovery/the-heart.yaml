  text: "«Серце» є той принцип в душевному життю, якого не можна вивести із\r\nбільш\
    \ елементарних, примітивних форм душевного життя: людська душа не тому\r\nодріжняється\
    \ від інших нижчих форм душевного життя, що вона «розвинулась» під\r\nвпливом\
    \ якихсь зовнішніх причин. Ні! Людська душа первісно має цілком\r\nсвоєрідний\
    \ зміст, що подібний до примітивніших форм душевного життя, але є\r\nцілком осібний\
    \ і своєрідний. До найсвоєріднішого в душі належить моральна\r\nособистість людини,\
    \ для якої не знайдемо в душі підстав"
