  text: "«Граматика» Смотрицького призначена була передусім\r\nдля викладачів. Вона\
    \ велика обсягом, насичена визначеннями, прикладами,\r\nпоясненнями винятків із\
    \ правил, увагами. У передмові до неї\r\n(«Учитεлεмь школнымъ...») автор звертається\
    \ й до учнів. Скорочення «Д\r\n: С : и/Т : З : З :» в заголовку передмови можна\
    \ розкрити як «...Авторъ:\r\nД[идаскалωмъ] С[ловεнскимъ] и/Т[щатεлεмъ] З[доровьА]\r\
    \nЗ[ычитъ]». Отже, Смотрицький задумав її як підручник. Звертаючись у передмові\r\
    \nдо вчителів, Смотрицький пише про ве"
