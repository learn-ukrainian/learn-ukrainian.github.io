  text: "У протилежному випадку це не буде мати кращого\r\nнаслідку. Коли ми йдемо\
    \ слідом не тільки за власним розумом, а й просимо поради\r\nв інших і дивимося,\
    \ що може нам протиставлятись і хто може нам протидіяти, то\r\nлегше розбираємося,\
    \ що є прямим і непрямим, а також що є істинним і неістинним\r\nпри їх зіткненні\
    \ між собою. Таким чином, відбувається диспут.\n\nРозділ другий\n\nЩО СЛІД РОБИТИ\
