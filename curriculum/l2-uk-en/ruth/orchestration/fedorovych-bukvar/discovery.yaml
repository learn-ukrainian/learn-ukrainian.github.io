  text: "Того ж 1574 р. Іван Федоров надрукував перший у\r\nСхідній Європі друкований\
    \ підручник — Буквар. Для його укладання використано\r\nвідомі раніше рукописні\
    \ посібники для вивчення грамоти, граматичні статті з\r\nрукописних збірників\
    \ різного походження, в тому числі й білорусько-українських.\r\nТак, після літер\
    \ і складів вміщено добірку найважливіших молитов, пізніше — уривки\r\nз Книги\
    \ притч Соломонових про необхідність навчання, різні моралістичні\r\nсентенції.\
    \ Після цього — звертання до батьків у формі доси"
