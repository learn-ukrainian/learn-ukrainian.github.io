  text: "Року 1574. Видання\r\nІваном Федоровим у Львові першого «Букваря». Складається\
    \ з абетки\r\nцерковнослов'янської мови, яку традиційно подано і у зворотному\
    \ порядку, а\r\nтакож у розподілі на вісім вертикальних стовпчиків. Далі йдуть\
    \ склади з двох і\r\nтрьох літер. Другийрозділ названий «А сія Азбука от книги\
    \ осмочастния, сиріч\r\nграмматикіи». Тут наведено слов'янські назви літер від\
    \ «а» до «щ» та зразки\r\nвимінювання дієслів; написання слів під титлами і відмінювання\
    \ іменників та\r\nпохідних від них прикметн"
