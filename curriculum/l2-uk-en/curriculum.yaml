version: '1.0'
description: 'L2 Ukrainian-English Curriculum Manifest (RFC #410)'
levels:
  a1:
    type: core
    modules:
      # Phase A1.1: Script & First Contact (1-14)
      - the-ukrainian-alphabet       # 1  Full alphabet overview + 10 practice letters (А О У І М Н Т К С Л)
      - vowel-sounds                 # 2  10 vowel letters (А О У Е И І Я Ю Є Ї) + Й + stress
      - consonant-sounds             # 3  22 consonants: sonorants, voiced/voiceless, hard/soft
      - completing-the-alphabet      # 4  Ь, apostrophe, Ц Ч Щ Ф, ДЖ ДЗ → full mastery
      - syllables-and-word-division   # 5  Syllable structure, word division (переніс)
      - stress-and-intonation        # 6  Наголос, intonation patterns
      - the-gender-code              # 7  Masculine/feminine/neuter
      - greetings-and-politeness     # 8  Добрий ранок, Дякую, Ти vs Ви
      - this-is-i-am                 # 9  Це..., Я..., Мене звати...
      - my-world-objects             # 10 Concrete nouns, Що це?
      - describing-things-adjectives # 11 ЯКИЙ?/ЯКА?/ЯКЕ?
      - colors-and-clothing          # 12 Color adjectives, clothing
      - plurals-and-alternation      # 13 Noun/adj plurals, vowel alternation
      - checkpoint-first-contact     # 14 Checkpoint: script, gender, greetings
      # Phase A1.2: Verbs & Sentences (15-24)
      - the-living-verb-i            # 15 Present tense I (-ати)
      - the-living-verb-ii           # 16 Present tense II (-ити)
      - reflexive-verbs              # 17 -ся/-сь verbs
      - questions-and-negation       # 18 Хто?/Що?/Де?/Куди? + Чи + бо
      - likes-and-preferences        # 19 Мені подобається / Я люблю
      - mine-and-yours               # 20 Possessive pronouns: мій/моя/моє
      - demonstratives-this-that     # 21 Цей/ця/це/ці, той/та/те/ті
      - numbers-and-money            # 22 Numbers 1-100, гривня
      - what-time-is-it              # 23 Time, days, months
      - checkpoint-sentences         # 24 Checkpoint: verbs, questions, possessives
      # Phase A1.3: Cases & Navigation (25-34)
      - the-vocative                 # 25 Voc: address forms — Мамо! пане Петре! (easiest case)
      - the-accusative-i-things      # 26 Acc: inanimate direct objects (intro establishes nominative)
      - the-accusative-ii-people     # 27 Acc: animate nouns + pronouns in acc
      - accusative-prepositions      # 28 Acc with в/на (direction), за, через, про
      - the-locative-where-things-are # 29 Loc: в/у + Loc, на + Loc + pronouns in loc
      - around-the-city              # 30 City vocabulary + locative + acc/loc prepositions
      - the-genitive-i-absence       # 31 Gen: немає + Gen, у мене є + pronouns in gen
      - genitive-prepositions        # 32 Gen: біля, без, від, для, до + Gen
      - adjective-case-forms         # 33 Adj agreement in nom/acc/loc (3 cases known)
      - checkpoint-cases             # 34 Checkpoint: 4 required cases (nom/acc/loc/voc) + gen
      # Phase A1.4: Tenses & Daily Life (35-44)
      - direction-and-origin         # 35 Куди? (Acc, до+Gen), Звідки? (з+Gen)
      - yesterday-past-tense         # 36 Past tense: -в/-ла/-ло/-ли
      - tomorrow-future-tense        # 37 Analytical future + perfective preview
      - my-daily-routine             # 38 Daily routine, sequence adverbs
      - food-vocabulary              # 39 Food/drink vocab, Паляниця
      - shopping-and-market          # 40 Скільки коштує?, shopping dialogues
      - at-the-cafe                  # 41 Ordering, menu, payment
      - description-adverbs          # 42 Adverbs of manner
      - weather-and-nature           # 43 Weather, seasons, nature
      - checkpoint-daily-life        # 44 Checkpoint: tenses, daily life
      # Phase A1.5: Modals, Commands & Life (45-54)
      - can-and-know-how             # 45 Могти vs вміти, можна
      - must-and-want                # 46 Треба/потрібно, хотіти
      - imperative-and-requests      # 47 8 verbs: читай, скажи, дай...
      - body-and-health              # 48 Body parts, symptoms
      - my-family                    # 49 Family + appearance vocabulary
      - holidays-and-traditions      # 50 Holidays, birthday, Вітаю!
      - leisure-and-hobbies          # 51 Hobbies, sports
      - travel-and-transport         # 52 Station, airport, transport
      - at-the-restaurant            # 53 Restaurant ordering, Будьмо!
      - checkpoint-communication     # 54 Checkpoint: modals, imperatives
      # Phase A1.6: Real-World Skills (55-64)
      - prohibitions-and-signs       # 55 Не курити! signs, notices
      - buying-tickets               # 56 Tickets for transport/events
      - taking-transport             # 57 Metro, bus, marshrutka
      - phone-basics                 # 58 Phone, SMS, messaging
      - writing-skills               # 59 Postcards, forms, self-description
      - at-the-market                # 60 Market, produce, Gen quantities
      - at-the-store                 # 61 Store, sizes, returns
      - emergencies                  # 62 Emergency 112, Допоможіть!
      - euphony-and-polish           # 63 у/в, і/й, з/із/зі rules
      - a1-final-exam                # 64 Final A1 assessment
