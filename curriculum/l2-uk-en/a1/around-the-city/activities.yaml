inline:
  - id: act-1
    type: fill-in
    title: Direction words
    instruction: Complete each direction line.
    items:
      - sentence: 'Ідіть ___, потім направо.'
        answer: 'прямо'
        options:
          - 'прямо'
          - 'пішки'
          - 'поруч'
        explanation: 'Прямо means straight ahead.'
      - sentence: 'Вибачте, як ___ до музею?'
        answer: 'дістатися'
        options:
          - 'дістатися'
          - 'вдома'
          - 'живу'
        explanation: 'Як дістатися до...? asks how to get to a place.'
      - sentence: "Аптека близько. Ідіть прямо п'ять ___."
        answer: 'хвилин'
        options:
          - 'хвилин'
          - 'район'
          - 'центр'
        explanation: "П'ять хвилин пішки is a route chunk."
      - sentence: 'Потім ідіть ___, школа там.'
        answer: 'направо'
        options:
          - 'направо'
          - 'пішки'
          - 'вдома'
        explanation: 'Направо means to the right.'
      - sentence: 'Йдіть прямо, а потім ___.'
        answer: 'наліво'
        options:
          - 'наліво'
          - 'центр'
          - 'зупинка'
        explanation: 'Наліво means to the left.'
      - sentence: 'Ресторан поруч. Ідіть прямо і ___.'
        answer: 'направо'
        options:
          - 'направо'
          - 'район'
          - 'куди'
        explanation: 'Use a direction word after і.'
  - id: act-2
    type: quiz
    title: Де or куди in context
    instruction: Choose the phrase that fits the sentence.
    items:
      - prompt: 'Я зараз...'
        options:
          - text: 'в парку'
            correct: true
          - text: 'в парк'
            correct: false
          - text: 'до парку'
            correct: false
        explanation: 'Зараз asks де?'
      - prompt: 'Я йду...'
        options:
          - text: 'в магазин'
            correct: true
          - text: 'в магазині'
            correct: false
          - text: 'на магазині'
            correct: false
        explanation: 'Йду asks куди?'
      - prompt: 'Магазин на...'
        options:
          - text: 'вулиці'
            correct: true
          - text: 'вулицю'
            correct: false
          - text: 'вулиця'
            correct: false
        explanation: 'На вулиці answers де?'
      - prompt: 'Потім їду на...'
        options:
          - text: 'роботу'
            correct: true
          - text: 'роботі'
            correct: false
          - text: 'робота'
            correct: false
        explanation: 'Їду на роботу answers куди?'
      - prompt: 'Ми зараз у...'
        options:
          - text: 'центрі'
            correct: true
          - text: 'центр'
            correct: false
          - text: 'центру'
            correct: false
        explanation: 'Зараз у центрі is static.'
      - prompt: 'Вона йде в...'
        options:
          - text: 'офіс'
            correct: true
          - text: 'офісі'
            correct: false
          - text: 'офісу'
            correct: false
        explanation: 'Йде в офіс answers куди?'
  - id: act-3
    type: match-up
    title: City questions
    instruction: Match each question with a useful answer.
    pairs:
      - left: 'Вибачте, як дістатися до бібліотеки?'
        right: 'Ідіть прямо, потім направо.'
      - left: 'Де музей?'
        right: 'Він у центрі.'
      - left: 'Як ти дістаєшся на роботу?'
        right: 'Їду автобусом.'
      - left: 'Школа далеко?'
        right: "Ні, близько. П'ять хвилин пішки."
      - left: 'Куди ви йдете?'
        right: 'У магазин.'
      - left: 'Де ти живеш?'
        right: 'На вулиці Франка.'
  - id: act-4
    type: order
    title: Daily city route
    instruction: Put the route in a natural order.
    is_ukrainian: true
    items:
      - 'Спочатку я йду на зупинку.'
      - 'Потім їду автобусом до центру.'
      - "Після цього йду пішки п'ять хвилин."
      - 'Робота в офісі на площі.'
      - 'Після роботи йду в магазин.'
      - 'Потім повертаюся додому.'
    correct_order: [0, 1, 2, 3, 4, 5]
  - id: act-5
    type: fill-in
    title: Close, far, or on the corner
    instruction: Complete each city location or route line.
    items:
      - sentence: "Аптека ___. П'ять хвилин пішки."
        answer: 'близько'
        options:
          - 'близько'
          - 'далеко'
          - 'наліво'
        explanation: "П'ять хвилин пішки means the place is close."
      - sentence: 'Вокзал ___. Їдьте на метро.'
        answer: 'далеко'
        options:
          - 'далеко'
          - 'поруч'
          - 'прямо'
        explanation: 'If you need metro, the station is far.'
      - sentence: 'Кафе ___. Воно біля дому.'
        answer: 'поруч'
        options:
          - 'поруч'
          - 'їдьте'
          - 'направо'
        explanation: 'Поруч means nearby.'
      - sentence: 'Бібліотека ___ розі.'
        answer: 'на'
        options:
          - 'на'
          - 'до'
          - 'автобусом'
        explanation: 'The chunk is на розі.'
      - sentence: 'Ідіть ___, потім наліво.'
        answer: 'прямо'
        options:
          - 'прямо'
          - 'поруч'
          - 'центр'
        explanation: 'Прямо is a direction word.'
      - sentence: 'Музей ___ центрі.'
        answer: 'у'
        options:
          - 'у'
          - 'до'
          - 'пішки'
        explanation: 'У центрі answers де?'
  - id: act-6
    type: quiz
    title: Which route question?
    instruction: Choose the question each phrase answers.
    items:
      - prompt: 'Я в парку.'
        options:
          - text: 'де?'
            correct: true
          - text: 'куди?'
            correct: false
          - text: 'як? / чим?'
            correct: false
        explanation: 'В парку is a static place.'
      - prompt: 'Я йду в парк.'
        options:
          - text: 'куди?'
            correct: true
          - text: 'де?'
            correct: false
          - text: 'як? / чим?'
            correct: false
        explanation: 'Йду в парк is movement.'
      - prompt: 'Їду автобусом.'
        options:
          - text: 'як? / чим?'
            correct: true
          - text: 'де?'
            correct: false
          - text: 'куди?'
            correct: false
        explanation: 'Автобусом tells how you travel.'
      - prompt: 'Бібліотека на розі.'
        options:
          - text: 'де?'
            correct: true
          - text: 'куди?'
            correct: false
          - text: 'як? / чим?'
            correct: false
        explanation: 'На розі is a static location.'
      - prompt: 'Їдьте на метро.'
        options:
          - text: 'як? / чим?'
            correct: true
          - text: 'де?'
            correct: false
          - text: 'куди?'
            correct: false
        explanation: 'На метро tells the transport method.'
      - prompt: 'Ідіть прямо, потім направо.'
        options:
          - text: 'що робити?'
            correct: true
          - text: 'де?'
            correct: false
          - text: 'звідки?'
            correct: false
        explanation: 'This is a route command.'
workbook:
  - type: group-sort
    title: City route shelves
    instruction: Sort each chunk by its route function.
    groups:
      - name: 'Where now'
        items:
          - 'у парку'
          - 'на площі'
          - 'у центрі'
          - 'на вулиці'
      - name: 'Where to'
        items:
          - 'в парк'
          - 'на роботу'
          - 'до бібліотеки'
          - 'у магазин'
      - name: 'How'
        items:
          - 'пішки'
          - 'автобусом'
          - 'на метро'
          - "п'ять хвилин"
      - name: 'Direction commands'
        items:
          - 'ідіть прямо'
          - 'направо'
          - 'наліво'
          - 'їдьте'
  - type: odd-one-out
    title: Find the city mismatch
    instruction: Choose the phrase that does not fit the pattern.
    items:
      - words:
          - 'в аптеці'
          - 'на площі'
          - 'у центрі'
          - 'в аптеку'
        answer: 'в аптеку'
        explanation: 'В аптеку answers куди?; the others answer де?'
      - words:
          - 'в магазин'
          - 'на роботу'
          - 'до бібліотеки'
          - 'на роботі'
        answer: 'на роботі'
        explanation: 'На роботі is static.'
      - words:
          - 'пішки'
          - 'автобусом'
          - 'на метро'
          - 'у центрі'
        answer: 'у центрі'
        explanation: 'У центрі answers де?; the others answer як? / чим?'
      - words:
          - 'ідіть прямо'
          - 'потім направо'
          - 'потім наліво'
          - 'аптека близько'
        answer: 'аптека близько'
        explanation: 'Аптека близько is a location sentence, not a command.'
  - type: true-false
    title: City route checks
    instruction: Decide whether the statement fits the city-route pattern.
    items:
      - statement: 'Я зараз у центрі answers де?'
        answer: true
        explanation: 'Зараз у центрі is a static place.'
      - statement: 'Я йду в магазині is the best direction sentence.'
        answer: false
        explanation: 'Use Я йду в магазин for куди?'
      - statement: 'Ідіть прямо is a polite route command.'
        answer: true
        explanation: 'It means go straight.'
      - statement: 'Їдьте на метро tells the transport method.'
        answer: true
        explanation: 'На метро is a fixed transport chunk.'
      - statement: 'До міста is the A1 route chunk after до.'
        answer: true
        explanation: 'Use the whole route chunk до міста.'
      - statement: '<!-- bad -->Остановка<!-- /bad --> is the course word for a transport stop.'
        answer: false
        explanation: 'Use зупинка.'
  - type: error-correction
    title: Repair city-route interference
    instruction: Choose the natural Ukrainian city sentence.
    items:
      - sentence: 'Я живу Київ. / Я бути школа.'
        error: 'живу Київ / бути школа'
        correction: 'Я живу в Києві. / Я в школі.'
        options:
          - 'Я живу в Києві. / Я в школі.'
          - 'Я живу Київ. / Я бути школа.'
          - 'Я живу до Києва. / Я школа.'
        explanation: 'Де? needs в/у or на plus the locative.'
      - sentence: 'Я йду в магазині.'
        error: 'в магазині'
        correction: 'Я йду в магазин.'
        options:
          - 'Я йду в магазин.'
          - 'Я йду в магазині.'
          - 'Я йду на магазині.'
        explanation: 'Йду asks куди?, so use the direction form.'
      - sentence: 'Магазин на вулицю.'
        error: 'на вулицю'
        correction: 'Магазин на вулиці.'
        options:
          - 'Магазин на вулиці.'
          - 'Магазин на вулицю.'
          - 'Магазин до вулиці.'
        explanation: 'Магазин is already there, so this answers де?'
      - sentence: 'Я їду автобус до центру.'
        error: 'автобус'
        correction: 'Я їду автобусом до центру.'
        options:
          - 'Я їду автобусом до центру.'
          - 'Я їду автобус до центру.'
          - 'Я їду на автобус до центрі.'
        explanation: 'For means of travel, use автобусом.'
      - sentence: 'Я живу у Одесі.'
        error: 'у Одесі'
        correction: 'Я живу в Одесі.'
        options:
          - 'Я живу в Одесі.'
          - 'Я живу у Одесі.'
          - 'Я живу до Одеси.'
        explanation: 'Use в before a vowel for милозвучність.'
      - sentence: 'Я йду до місті.'
        error: 'до місті'
        correction: 'Я йду до міста.'
        options:
          - 'Я йду до міста.'
          - 'Я йду до місті.'
          - 'Я йду в місті.'
        explanation: 'До takes genitive: міста.'
      - sentence: 'Як дістатися до бібліотека?'
        error: 'до бібліотека'
        correction: 'Як дістатися до бібліотеки?'
        options:
          - 'Як дістатися до бібліотеки?'
          - 'Як дістатися до бібліотека?'
          - 'Як дістатися в бібліотеці?'
        explanation: 'Use the whole A1 route chunk до бібліотеки.'
  - type: match-up
    title: Route question pairs
    instruction: Match each short city question with the answer type it needs.
    pairs:
      - left: 'Де аптека?'
        right: 'Аптека на розі.'
      - left: 'Куди ви йдете?'
        right: 'У парк.'
      - left: 'Як ти їдеш?'
        right: 'Автобусом.'
      - left: 'Як дістатися до музею?'
        right: 'Ідіть прямо.'
      - left: 'Вокзал далеко?'
        right: 'Так, їдьте на метро.'
      - left: 'Де ти живеш?'
        right: 'На вулиці Франка.'
  - type: order
    title: Lviv walk route
    instruction: Put the short walking route in order.
    is_ukrainian: true
    items:
      - 'Ми на площі Ринок.'
      - 'Ідемо прямо до театру.'
      - 'Потім ідемо направо.'
      - 'Парк близько.'
      - 'Музей у центрі.'
      - 'Повертаємося на площу.'
    correct_order: [0, 1, 2, 3, 4, 5]
