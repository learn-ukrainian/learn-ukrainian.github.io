    title: Дні тижня по порядку
    instruction: Обери день, який правильно завершує послідовність.
    items:
      - sentence: 'понеділок, ___, середа'
        answer: вівторок
        options:
          - вівторок
          - субота
          - четвер
        explanation: 'After понеділок comes вівторок.'
      - sentence: 'середа, ___, п''ятниця'
        answer: четвер
        options:
          - четвер
          - п'ятниця
          - неділя
        explanation: 'After середа comes четвер.'
      - sentence: 'п''ятниця, ___, неділя'
        answer: субота
        options:
          - субота
          - вівторок
          - середа
        explanation: 'After п''ятниця comes субота.'
      - sentence: 'неділя, ___, вівторок'
        answer: понеділок
        options:
          - понеділок
          - вівторок
          - четвер
        explanation: 'After неділя comes понеділок.'
      - sentence: 'вівторок, середа, ___'
        answer: четвер
        options:
          - четвер
          - п'ятниця
          - неділя
        explanation: 'The sequence is вівторок, середа, четвер.'
      - sentence: 'четвер, п''ятниця, ___'
        answer: субота
        options:
          - субота
          - понеділок
          - вівторок
        explanation: 'The sequence is четвер, п''ятниця, субота.'
      - sentence: 'субота, ___, понеділок'
        answer: неділя
        options:
          - неділя
          - понеділок
          - п'ятниця
        explanation: 'After субота comes неділя.'
