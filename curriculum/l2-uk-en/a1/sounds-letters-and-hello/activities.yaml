    correct: 2
  - word: молоко
    correct: 3
  - word: день
    correct: 1
  - word: Привіт
    correct: 2
- type: quiz
  title: Коротка перевірка
  instruction: Choose the best answer.
  items:
  - prompt: Що позначає [•] у звуковій моделі?
    options:
    - text: голосний звук
      correct: true
    - text: літера
      correct: false
    - text: апостроф
      correct: false
    explanation: '[•] marks a vowel sound in the model.'
  - prompt: Яка літера не має власного звука?
    options:
    - text: Ь
      correct: true
    - text: А
      correct: false
    - text: М
      correct: false
    explanation: Ь has no sound of its own; it softens the previous consonant.
  - prompt: Як читається Ї?
    options:
    - text: '[йі]'
      correct: true
    - text: '[і]'
      correct: false
    - text: '[йа]'
      correct: false
    explanation: 'Ї always represents two sounds: [йі].'
- type: error-correction
  title: Типові помилки
  instruction: Find the incorrect form, then choose the correction.
  items:
  - sentence: Це голосна літера А.
    error: голосна літера
    correction: літера, що позначає голосний звук
    options:
    - літера, що позначає голосний звук
    - літера без звука
    - голосний знак
    explanation: In Ukrainian terminology, vowel/consonant describes sounds, not letters.
  - sentence: Молоко читається як малако.
    error: малако
    correction: молоко
    options:
    - молоко
    - мама
    - молока
    explanation: Ukrainian [о] stays clear in unstressed position.
  - sentence: М'який знак має власний звук.
    error: має власний звук
    correction: не має власного звука
    options:
    - не має власного звука
    - завжди читається [йі]
    - позначає голосний звук
    explanation: Ь has no sound; it changes the previous consonant.
  - sentence: Ї може пом'якшувати попередній приголосний.
    error: може пом'якшувати
    correction: завжди читається як [йі]
    options:
    - завжди читається як [йі]
    - читається як [і]
    - не має власного звука
    explanation: 'Ї is the strict exception: always [йі].'
  - sentence: Жінка каже «Радий тебе бачити».
    error: Радий
    correction: Рада
    options:
    - Рада
    - Радий
    - Радо
    explanation: Радий is masculine; рада is feminine.
- type: translate
  title: Фрази
  instruction: Choose the English meaning.
  items:
  - source: Привіт!
    options:
    - text: Hi!
      correct: true
    - text: Goodbye!
      correct: false
    - text: Milk
      correct: false
    explanation: Привіт is an informal greeting.
  - source: Добрий день!
    options:
    - text: Good day / Hello!
      correct: true
    - text: How are you?
      correct: false
    - text: Great
      correct: false
    explanation: Добрий день is a neutral formal greeting.
  - source: До побачення!
    options:
    - text: Goodbye!
      correct: true
    - text: Good morning!
      correct: false
    - text: Fine
      correct: false
    explanation: До побачення is the goodbye phrase.
