- id: act-4
  type: quiz
  title: Find the useful letters
  instruction: Choose the letter or sign that matches the clue.
  items:
  - prompt: Which letter is the hard g sound?
    options:
    - text: Ґ
      correct: true
    - text: Г
      correct: false
    - text: Ї
      correct: false
    explanation: Ґ is the hard g sound; Г is the Ukrainian h-like sound.
  - prompt: Which letter is always [йі]?
    options:
    - text: Ї
      correct: true
    - text: І
      correct: false
    - text: И
      correct: false
    explanation: Ї is always [йі]. І is the plain [і] vowel.
  - prompt: Which sign has no sound of its own?
    options:
    - text: Ь
      correct: true
    - text: Й
      correct: false
    - text: Я
      correct: false
    explanation: Ь is the soft sign; it changes the previous consonant.
  - prompt: Which letter is the clean [о] sound in молоко́?
    options:
    - text: О
      correct: true
    - text: А
      correct: false
    - text: У
      correct: false
    explanation: Ukrainian О stays clean in молоко́.
  - prompt: In Приві́т, which two vowel letters are different?
    options:
    - text: И and І
      correct: true
    - text: О and У
      correct: false
    - text: А and Е
      correct: false
    explanation: Приві́т contains both И [и] and І [і].
