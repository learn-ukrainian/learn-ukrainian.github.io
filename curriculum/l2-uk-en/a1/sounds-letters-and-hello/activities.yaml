- id: act-4
  type: fill-in
  title: Привітання
  instruction: Complete the dialogue.
  items:
  - sentence: ____! Як справи?
    answer: Привіт
    options:
    - Привіт
    - молоко
    - літера
  - sentence: ____. А у тебе?
    answer: Добре
    options:
    - Добре
    - звук
    - день
  - sentence: ____ тебе бачити.
    answer: Рада
    options:
    - Рада
    - Мама
    - Літера
  - sentence: До ____!
    answer: побачення
    options:
    - побачення
    - справи
    - голос
- id: act-5
  type: true-false
  title: Підсумкова перевірка
  instruction: Choose true or false.
  items:
  - statement: Звук ти чуєш і вимовляєш.
    correct: true
    explanation: Sound belongs to hearing and pronunciation.
  - statement: Літеру ти бачиш і пишеш.
    correct: true
    explanation: A letter belongs to reading and writing.
  - statement: Українська абетка має 33 літери.
    correct: true
    explanation: The Ukrainian alphabet has 33 letters.
  - statement: Українська мова має 38 звуків.
    correct: true
    explanation: The module uses the standard beginner count of 38 sounds.
  - statement: М'який знак має власний звук.
    correct: false
    explanation: The soft sign has no sound of its own.
  - statement: Ї завжди читається як два звуки.
    correct: true
    explanation: Ї is always [йі].
