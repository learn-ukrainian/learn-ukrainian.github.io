- id: act-1
  type: quiz
  title: Звук чи літера?
  instruction: Choose the correct answer.
  items:
  - prompt: Що ти чуєш і вимовляєш?
    options:
    - text: звук
      correct: true
    - text: літера
      correct: false
    - text: абетка
      correct: false
    explanation: Звук is what you hear and pronounce.
  - prompt: Що ти бачиш і пишеш?
    options:
    - text: звук
      correct: false
    - text: літера
      correct: true
    - text: голос
      correct: false
    explanation: Літера is what you see and write.
  - prompt: Скільки літер в українській абетці?
    options:
    - text: '33'
      correct: true
    - text: '38'
      correct: false
    - text: '6'
      correct: false
    explanation: The Ukrainian alphabet has 33 letters.
