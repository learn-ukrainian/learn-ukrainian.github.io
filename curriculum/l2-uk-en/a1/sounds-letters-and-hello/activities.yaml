    - '[о]'
    - '[у]'
    - '[е]'
    - '[и]'
    - '[і]'
  - label: Consonant sounds
    items:
    - '[п]'
    - '[р]'
    - '[в]'
    - '[т]'
    - '[м]'
    - '[н]'
    - '[к]'
    - '[с]'
