- id: act-3
  type: group-sort
  title: Vowel or consonant?
  instruction: Sort the sounds from Приві́т.
  groups:
  - label: Vowel sounds
    items:
    - '[и]'
    - '[і]'
  - label: Consonant sounds
    items:
    - '[п]'
    - '[р]'
    - '[в]'
    - '[т]'
- id: act-4
  type: fill-in
  title: First conversation
  instruction: Choose the phrase that completes the line.
  items:
  - sentence: ____! Як справи?
    answer: Привіт
    options:
    - Привіт
    - Молоко
    - Літера
  - sentence: ____. А у тебе?
    answer: Добре
    options:
    - Добре
    - День
    - Звук
  - sentence: Як тебе ____?
    answer: звати
    options:
    - звати
    - добре
    - день
  - sentence: Мене звати ____.
    answer: Анна
    options:
    - Анна
    - Привіт
    - звук
- id: act-5
  type: true-false
  title: Exit check
  instruction: Choose true or false.
  items:
  - statement: A sound is something you hear and say.
    correct: true
    explanation: Sound belongs to hearing and speaking.
  - statement: A letter is something you see and write.
    correct: true
    explanation: Letter belongs to reading and writing.
  - statement: Ukrainian has 33 letters.
    correct: true
    explanation: The Ukrainian alphabet has 33 letters.
  - statement: The soft sign ь has its own vowel sound.
    correct: false
    explanation: ь has no sound of its own; it changes the previous consonant.
  - statement: Приві́т has two vowel sounds.
    correct: true
    explanation: The vowel sounds are [и] and [і].
