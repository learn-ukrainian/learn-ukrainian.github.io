- id: act-1
  type: quiz
  title: Звук або літера
  instruction: Вибери правильну відповідь.
  items:
  - question: Що ми **чуємо** і вимовляємо?
    options:
    - Літера
    - Звук
    - Слово
    correct: 1
    explanation: Звук — це те, що чуємо, літера — те, що бачимо.
  - question: Що ми **бачимо** в письмі?
    options:
    - Звук
    - Літера
    - Вимова
    correct: 1
    explanation: Літера — це графічний знак.
  - question: Скільки літер у сучасній українській абетці?
    options:
    - '38'
    - '33'
    - '6'
    correct: 1
    explanation: У стандартній українській абетці 33 літери.
  - question: Чому літер 33, а звуків 38?
    options:
    - Через різну вимову твердих/м'яких звуків
    - Через йотовані літери, поділи за м'якістю та особливі знаки
    - Через діалектні варіанти
    correct: 1
    explanation: Я/Ю/Є/Ї і інші позиційні чергування збільшують кількість звуків.
  - question: Який знак не має власного звуку?
    options:
    - А
    - Ь
    - О
    correct: 1
    explanation: Ь — м'який знак, він коригує попередній приголосний.
  - question: Яке слово має два голосні звуки?
    options:
    - Приві́т
    - Ма́ма
    - Мов
    correct: 1
    explanation: Ма́ма має два звуки [а] + [а].

- id: act-2
  type: count-syllables
  title: Кількість складів
  instruction: Рахуй голосні звуки в слові.
  maxCount: 3
  items:
  - word: ма́ма
    correct: 2
  - word: мо́локо
    correct: 3
  - word: дня́
    correct: 2
  - word: приві́т
    correct: 2
  - word: око́
    correct: 2
  - word: тато́
    correct: 2

- id: act-3
  type: match-up
  title: Звук і літера
  instruction: З'єднай літеру з її звуком або функцією.
  pairs:
  - left: І
    right: "[і]"
  - left: В
    right: "[в]"
  - left: А
    right: "[а]"
  - left: О
    right: "[о]"
  - left: У
    right: "[у]"
  - left: Н
    right: "[н]"
  - left: Ч
    right: "[ч]"
  - left: Ь
    right: м'якість попереднього приголосного
  - left: Я
    right: "[йа] / м'якість переднього приголосного в позиції після твердого"
  - left: Ї
    right: "[йі]"
  - left: Щ
    right: "[шч]"
  - left: Д
    right: "[д]"

