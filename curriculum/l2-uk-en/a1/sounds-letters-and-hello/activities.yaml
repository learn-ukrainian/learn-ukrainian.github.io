    answer: До́бре
    options:
    - До́бре
    - День
    - Звук
  - sentence: Як тебе́ ____?
    answer: зва́ти
    options:
    - зва́ти
    - до́бре
    - день
  - sentence: Ме́не ____ Анна.
    answer: зва́ти
    options:
    - зва́ти
    - спра́ви
    - звук
  - sentence: До ____!
    answer: поба́чення
    options:
    - поба́чення
    - тебе́
    - ма́ма
  - sentence: На все ____!
