- id: act-1
  type: quiz
  title: First word check
  instruction: Choose the correct answer.
  items:
  - prompt: What does Приві́т mean?
    options:
    - text: Hi
      correct: true
    - text: Goodbye
      correct: false
    - text: Milk
      correct: false
    explanation: Приві́т is the informal word for Hi.
  - prompt: In this lesson, when do you use Приві́т?
    options:
    - text: With classmates, friends, family, or someone your age
      correct: true
    - text: Only when leaving
      correct: false
    - text: Only for written homework
      correct: false
    explanation: Приві́т is informal and friendly.
  - prompt: Which part of Приві́т has the stress mark?
    options:
    - text: ві́т
      correct: true
    - text: При
      correct: false
    - text: т
      correct: false
    explanation: The stress mark appears over і in ві́т.
