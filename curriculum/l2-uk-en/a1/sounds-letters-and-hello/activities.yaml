      - sentence: Приві́т! ___ спра́ви?
        answer: Як
        options:
          - Як
          - Що
          - Де
      - sentence: До́бре. ___ у тебе́?
        answer: А
        options:
          - А
          - На
          - У
      - sentence: Як тебе́ зва́ти? Мене́ зва́ти Анна. ___?
        answer: А тебе́
        options:
          - А тебе́
          - А у тебе́
          - А тобі́
      - sentence: "___ тебе́ бачити! (woman speaker)"
        answer: Рада
        options:
          - Рада
          - Радий
          - Раді
      - sentence: "___ тебе́ бачити! (man speaker)"
        answer: Радий
