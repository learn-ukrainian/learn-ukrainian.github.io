- id: act-1
  type: quiz
  title: Sound or letter?
  instruction: Choose the correct answer.
  items:
  - prompt: What is a звук?
    options:
    - text: A sound you hear and say
      correct: true
    - text: A letter you see and write
      correct: false
    - text: A whole sentence
      correct: false
    explanation: A звук belongs to hearing and speaking.
  - prompt: What is a лі́тера?
    options:
    - text: A letter you see and write
      correct: true
    - text: A sound you hear and say
      correct: false
    - text: A greeting
      correct: false
    explanation: A лі́тера belongs to reading and writing.
  - prompt: How many letters are in the Ukrainian alphabet?
    options:
    - text: '33'
      correct: true
    - text: '38'
      correct: false
    - text: '6'
      correct: false
    explanation: Ukrainian has 33 letters.
  - prompt: How many basic Ukrainian vowel sounds are there?
    options:
    - text: '6'
      correct: true
    - text: '10'
      correct: false
    - text: '33'
      correct: false
    explanation: The six basic vowel sounds are [а], [о], [у], [е], [и], [і].
  - prompt: Does ь have its own sound?
    options:
    - text: 'No'
      correct: true
    - text: 'Yes'
      correct: false
    - text: Only in Приві́т
      correct: false
    explanation: The soft sign ь has no sound of its own.
  - prompt: What does Приві́т mean?
    options:
    - text: Hi
      correct: true
    - text: Goodbye
      correct: false
    - text: Milk
      correct: false
    explanation: Приві́т is the informal word for Hi.
- id: act-2
  type: quiz
  title: Meet склади
  instruction: Choose the safer beginner idea.
  items:
  - question: What does склад mean?
    options:
    - syllable
    - letter
    - greeting
    correct: 0
    explanation: Склад means syllable. M02 will teach the counting rule.
  - question: What gives a склад its voice?
    options:
    - a capital letter
    - a vowel sound
    - an English translation
    correct: 1
    explanation: Every Ukrainian склад needs a vowel sound.
  - question: What should you do with ма́ма today?
    options:
    - Memorize every syllable rule.
    - Notice the two clear а sounds.
    - Ignore the vowel sounds.
    correct: 1
    explanation: Today is a sound-first preview. M02 practices syllable counting.
  - question: What should you listen for in молоко́?
    options:
    - a blurred English vowel
    - a silent letter
    - three clean о sounds
    correct: 2
    explanation: Ukrainian о stays clean in молоко́.
