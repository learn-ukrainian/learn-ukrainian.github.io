content_outline:
- points:
  - 'Why Ukrainian uses Cyrillic — cultural hook: named after St. Cyril (9th c.),
    though he likely created Glagolitic; developed by his students in the First Bulgarian
    Empire.'
  - 'Good news: Many letters are familiar — leaning on internationalisms like ''таксі'',
    ''піца'', ''метро'' to build immediate confidence.'
  - 'Strategy: True Friends vs False Friends — pedagogical approach to categorize
    letters by visual/auditory similarity to Latin script.'
  section: Warm-up
- points:
  - 'True Friends (А, Е, І, О, К, М, Т) - look AND sound like English — State Standard
    §4.1.1 alignment: introducing ''Україна'', ''Олена''.'
  - 'False Friends (В, Н, Р, С, У, Х) - look familiar but sound different — learner
    error: ''В'' trap (Vehicle /v/), ''Н'' trap (Hen /n/), ''Р'' trap (Roaring engine
    /r/).'
  - 'New Letters (Б, Д, З, Л, П, Ф) - unique to Cyrillic — visual aids: ''Д'' looks
    like a little house; explicitly clear that ''ё'', ''ы'', ''э'' (Russian-only)
    do NOT exist in Ukrainian.'
  section: Presentation
- points:
  - 'Reading international words (банк, метро, кафе) — collocations: ''національний
    банк'', ''станція метро'', ''ідемо в кафе''.'
  - Mini-dialogues at metro station and café — focusing on 'так, будь ласка' (yes,
    please) and 'так, звісно' (yes, of course).
  section: Practice
- points:
  - 'Why Ukrainian uses Cyrillic (not Russian alphabet) — decolonization angle: Ukrainian
    is unique for retaining ''І/і'' alongside ''И/и'', giving it a more ''European''
    look compared to Russian.'
  - Unique Ukrainian letters (І, Ї, Є, Ґ) — the 'І' identity and its role in distinguishing
    the Ukrainian script from neighbors.
  section: Cultural Insight
- points:
  - Decoding international words — emphasizing that 'це факт' (it's a fact) uses 'Ф'
    (False Friend for some, New Letter for others).
  - Reading practice with IPA — focusing on the 'P' Trap (rolled /r/) and 'B' Trap
    (voiced /v/).
  section: Production
vocabulary_hints:
  recommended:
  - 'парк (park) — usage note: clear internationalism'
  - 'bar (bar) — usage note: clear internationalism'
  - 'факт (fact) — collocation: ''це факт'' (it''s a fact); ''цікавий факт'''
  - 'план (plan) — collocation: ''бізнес-план''; ''маю план'' (I have a plan)'
  required:
  - 'так (yes) — collocation: ''так, будь ласка'' (yes, please); ''так, звісно'' (yes,
    of course)'
  - 'банк (bank) — collocation: ''у банку'' (in the bank); ''національний банк'''
  - 'метро (metro) — collocation: ''станція метро'' (metro station); ''у метро'''
  - 'кафе (café) — collocation: ''у кафе'' (in the cafe); ''ідемо в кафе'''
  - 'такт (tact) — usage note: international cognate'
  - 'кіт (cat) — collocation: ''чорний кіт''; ''мій кіт'''
  - 'мама (mom) — collocation: ''моя мама''; ''люблю маму'''
  - 'тато (dad) — usage note: basic family term'
