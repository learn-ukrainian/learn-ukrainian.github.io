- type: quiz
  title: 'Sound Check: False Friends'
  instruction: 'Select the correct sound for the highlighted letter.'
  items:
    - question: 'What sound does the letter "Р" make in the word "Ресторан"?'
      explanation: "The letter 'Р' in Ukrainian is read as [r] (rolling), not as [p]."
      options:
        - text: '[r] (like in "roar")'
          correct: true
        - text: '[p] (like in "park")'
          correct: false
        - text: '[b] (like in "book")'
          correct: false
        - text: '[n] (like in "no")'
          correct: false
    - question: 'What sound does the letter "Н" make in the word "Ні"?'
      explanation: "The letter 'Н' looks like H, but is read as [n]."
      options:
        - text: '[n] (like in "no")'
          correct: true
        - text: '[h] (like in "hi")'
          correct: false
        - text: '[k] (like in "kite")'
          correct: false
        - text: '[m] (like in "mom")'
          correct: false
    - question: 'What sound does the letter "С" make in the word "Суп"?'
      explanation: "The letter 'С' is always read as [s], never as [k]."
      options:
        - text: '[s] (like in "snake")'
          correct: true
        - text: '[k] (like in "cat")'
          correct: false
        - text: '[c] (like in "center")'
          correct: false
        - text: '[z] (like in "zoo")'
          correct: false
    - question: 'What sound does the letter "В" make in the word "Ваза"?'
      explanation: "The letter 'В' is read as [v] or [w], but not as [b]."
      options:
        - text: '[v] (like in "very")'
          correct: true
        - text: '[b] (like in "bee")'
          correct: false
        - text: '[f] (like in "face")'
          correct: false
        - text: '[w] (like in "we")'
          correct: false
    - question: 'What sound does the letter "Х" make in the word "Хата"?'
      explanation: "The letter 'Х' represents the sound [x], like in Scottish 'Loch'."
      options:
        - text: '[x] (like in "Loch")'
          correct: true
        - text: '[k] (like in "kite")'
          correct: false
        - text: '[h] (like in "hi")'
          correct: false
        - text: '[ks] (like in "box")'
          correct: false
    - question: 'What sound does the letter "У" make in the word "Урок"?'
      explanation: "The letter 'У' looks like Y, but is read as [u]."
      options:
        - text: '[u] (like in "moon")'
          correct: true
        - text: '[y] (like in "yes")'
          correct: false
        - text: '[a] (like in "father")'
          correct: false
        - text: '[i] (like in "meet")'
          correct: false
    - question: 'What sound does the letter "І" make in the word "Кіт"?'
      explanation: "The letter 'І' sounds like [i] in 'machine'."
      options:
        - text: '[i] (like in "machine")'
          correct: true
        - text: '[y] (like in "myth")'
          correct: false
        - text: '[e] (like in "pet")'
          correct: false
        - text: '[a] (like in "father")'
          correct: false
    - question: 'What sound does the letter "Е" make in the word "Метро"?'
      explanation: "The letter 'Е' sounds like [e] in 'pet'."
      options:
        - text: '[e] (like in "pet")'
          correct: true
        - text: '[i] (like in "machine")'
          correct: false
        - text: '[a] (like in "father")'
          correct: false
        - text: '[u] (like in "moon")'
          correct: false

