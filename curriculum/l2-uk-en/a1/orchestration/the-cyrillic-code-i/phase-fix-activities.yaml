- type: true-false
  title: 'Fact or Myth?'
  instruction: 'Determine if the statement is true according to the lesson text.'
  items:
    - statement: 'The Ukrainian alphabet is called Cyrillic.'
      correct: true
      explanation: 'Yes, it is true. It is named after Saint Cyril.'
    - statement: 'Ukrainian has the letter «ё» (yo).'
      correct: false
      explanation: 'No, Ukrainian does not have the letter «ё». We write «йо» or «ьо».'
    - statement: 'The letter «О» in Ukrainian is always read as [o], never as [a].'
      correct: true
      explanation: 'This is the golden rule: «О» is always clear and never turns into «a».'
    - statement: 'The Ukrainian letter «В» is read like English "B" (bee).'
      correct: false
      explanation: 'No, the letter «В» is read as [v] or [w]. The sound [b] is represented by the letter «Б».'
    - statement: 'The letter «І» (with a dot) is a symbol of Ukrainian identity.'
      correct: true
      explanation: 'Yes, it distinguishes the Ukrainian alphabet from Russian, where this letter does not exist.'
    - statement: 'The letter «С» can be read as [k].'
      correct: false
      explanation: 'No, the letter «С» is always read as [s] (like in the word sun).'
    - statement: 'The letter «Х» sounds like English "X" (ex).'
      correct: false
      explanation: 'No, «Х» sounds like [x] in "Loch", not like [ks].'
    - statement: 'True Friends are letters that look and sound the same as in English.'
      correct: true
      explanation: 'Yes, letters like A, E, O, M, T are True Friends.'

- type: fill-in
  title: 'Complete the Sentences'
  instruction: 'Choose the correct word to complete the dialogue.'
  items:
    - sentence: '— Це метро? — Так, це ________.'
      answer: 'метро'
      options: ['метро', 'кафе', 'банк', 'парк']
      explanation: 'Logical answer to the question "Is this metro?" — "Yes, this is metro".'
    - sentence: '— Це суп? — Ні, це ________.'
      answer: 'салат'
      options: ['салат', 'метро', 'план', 'акт']
      explanation: 'In the dialogue from the lesson: "Is this soup? — No, this is salad".'
    - sentence: '— А це какао? — Так, ________.'
      answer: 'какао'
      options: ['какао', 'суп', 'салат', 'банк']
      explanation: 'Confirmation of the question: "Yes, cocoa".'
    - sentence: 'Мама і ________ у кафе.'
      answer: 'тато'
      options: ['тато', 'кіт', 'банк', 'план']
      explanation: 'Mom and dad are a logical pair of people.'
    - sentence: 'Це не дім, це ________.'
      answer: 'банк'
      options: ['банк', 'кіт', 'так', 'ні']
      explanation: 'Bank is a building, like a home, so it fits the context.'
    - sentence: 'Це ________ міста.'
      answer: 'план'
      options: ['план', 'суп', 'кіт', 'рік']
      explanation: 'City plan is a set phrase.'
    - sentence: 'Тут ________ і салат.'
      answer: 'суп'
      options: ['суп', 'план', 'банк', 'метро']
      explanation: 'Soup and salad are both food items.'
    - sentence: 'Це ________ факт.'
      answer: 'мій'
      options: ['мій', 'суп', 'метро', 'кафе']
      explanation: '"My fact" fits grammatically, although contextually simple.'

- type: unjumble
  title: 'Make Sentences'
  instruction: 'Arrange the words in the correct order to form a sentence.'
  items:
    - words: ['Це', 'карта', 'і', 'план']
      answer: 'Це карта і план'
    - words: ['Мама', 'і', 'тато', 'тут']
      answer: 'Мама і тато тут'
    - words: ['Тут', 'кафе', 'і', 'банк']
      answer: 'Тут кафе і банк'
    - words: ['Це', 'мій', 'кіт', 'Том']
      answer: 'Це мій кіт Том'
    - words: ['Так', 'це', 'план', 'метро']
      answer: 'Так, це план метро'
    - words: ['Ні', 'це', 'не', 'суп']
      answer: 'Ні, це не суп'
