- type: group-sort
  title: 'Letter Sorting: Friends and Strangers'
  instruction: 'Sort the letters into three groups: True Friends (like in English), False Friends (look familiar but sound different), and New Shapes (unique forms).'
  groups:
    - name: 'True Friends'
      items: ['А', 'Е', 'І', 'О', 'К', 'М', 'Т']
    - name: 'False Friends'
      items: ['В', 'Н', 'Р', 'С', 'У', 'Х']
    - name: 'New Shapes'
      items: ['Б', 'Д', 'З', 'Л', 'П', 'Ф']

