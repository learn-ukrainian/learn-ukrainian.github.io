IMMERSION_RULE: 'TARGET: 5-15% Ukrainian, 85-95% English. ALL explanatory prose in
  English. ALL grammar explanations in English. ALL callout text in English. Ukrainian
  appears ONLY in: (1) example words/phrases in bold with [IPA] and (English translation),
  (2) vocabulary items. If you write a paragraph, it MUST be in English. Ukrainian
  sentences max 10 words.'
LEVEL_CONSTRAINTS: 'HARD GRAMMAR RULES (audit will reject violations):

  - Max 10 words per Ukrainian sentence (STRICT — count every word)

  - ONLY 1 clause per sentence (no compound sentences)

  - Dative case FORBIDDEN (no мені, тобі, йому, їй, нам, вам, їм, -ові/-еві endings)

  - Instrumental case FORBIDDEN (no з другом, з мамою, -ом/-ою/-ем/-ею endings)

  - NO subordinate clauses: який/яка/яке, що-clause, коли, якщо, тому що, бо, щоб,
  поки are ALL BANNED

  - Only imperfective aspect verbs

  - No participles

  - Allowed cases: Nominative, Accusative, Locative (from M13), Genitive (basics),
  Vocative'
PEDAGOGICAL_CONSTRAINTS: 'DECODABILITY (M1 — 6 known letters: А, М, Л, У, Н, С):

  - Words in reading drills MUST use ONLY these 6 letters (e.g., мама, сума, луна,
  мул, нам)

  - Words with unknown letters (кіт, вода, привіт) may appear ONLY as labelled vocabulary
  with immediate English translation: «Привіт!» (Hello!)

  - Video example words for the letter being taught (ананас for А) are fine — they
  are heard, not read


  GRAMMAR BAN (no verbs exist yet in the student''s knowledge):

  - NO imperative forms: Слухайте, Читайте, Повторюйте, Пишіть, Дивіться — ALL BANNED

  - NO verb conjugation of any kind (present, past, future)

  - Classroom instructions MUST be in English: ''Listen carefully'', ''Read aloud'',
  ''Repeat after the video''

  - Allowed Ukrainian structures: bare nouns only (мама, сума, луна)


  METALANGUAGE:

  - ALL terminology in English first, Ukrainian in parentheses: ''vowels (голосні)'',
  ''consonants (приголосні)''

  - Section headings MUST be bilingual as shown in the content_outline (e.g., ''##
  Голосні — Vowels'')

  - NEVER write Ukrainian-only section headers or explanatory prose — the student
  cannot read it yet'
DECODABLE_VOCABULARY: 'DECODABLE VOCABULARY (M1 — only letters: А, Л, М, Н, С, У):

  Use ONLY these words in activities and reading drills. Any word with a letter

  outside this set will FAIL the decodability audit gate.


  Available words: мама, сума, луна, мул, нам, нас, сам, ум, масла, мала


  If you need a word not on this list, check that ALL its letters are in the

  allowed set above. Words with unknown letters need English translation.'
STRUCTURAL_RULES: '### Rule 1: Every Letter/Concept Gets Its Own Section


  Each new letter or concept MUST get its own `### H3` subsection. Letter modules
  are presentation-heavy (video embeds, stroke order, examples) so depth comes from
  variety of examples, not paragraphs of explanation.


  ### Rule 2: Introduce → Show → Practice


  Each H3 block follows this pattern:

  1. **Introduce** the letter/concept (1-2 sentences)

  2. **Show** it in words and context (examples, video embed)

  3. **Practice tip** (what to listen for, what to try)


  Minimum **30-50 words per H3 block**. Quality over quantity at this stage.


  ### Rule 3: Presentation Consistency


  All letters in a group: SAME format, SAME depth (±30%), SAME example count (±1).


  ### Rule 4: Example Variety


  No minimum format variety requirement for M1-M4 (letter-focused modules). Use whatever
  format best teaches the letter: word lists, audio examples, comparison pairs.'
H3_WORD_RANGE: 30-50
EXPANSION_METHOD: '**Don''t pad — add teaching value.** For EVERY letter you introduce:


  1. **Show it** (uppercase + lowercase, with video embed)

  2. **Give 2-3 example words** the student can decode

  3. **Add a practice tip** (what to listen for, mouth position)

  4. **Connect to something familiar** (English sound comparison)


  **If a section is still under target:** Add more example words, a `[!tip]` with
  pronunciation advice, or a comparison between similar-sounding letters.'
WRITING_TONE_INSTRUCTION: Be concise — students know nothing yet. Short, clear explanations.
  Every H3 gets {H3_WORD_RANGE} words. The activities do the teaching, not the prose.
  Do NOT pad with adjectives, motivational filler, or over-explained phonetics.
