  \ | <7 |\n| 7 | Linguistic Accuracy | 1.5 | <9 |\n\n**Weighted Overall:**\n```\n\
  Overall = (Experience x 1.5 + Language x 1.1 + Pedagogy x 1.2 +\n          Activities\
  \ x 1.3 + Beginner_Safety x 1.3 + LLM x 1.0 +\n          Linguistic_Accuracy x 1.5)\
  \ / 8.9\n```\n\n**Why 7 dimensions?** A1/A2 modules are short and topic-constrained,\
  \ so Coherence, Relevance, Educational, Immersion, Richness, and Factual Accuracy\
