      answer: "моя"
      options: ["моя", "мій", "у", "є"]
    - sentence: "Це ___ тато."
      answer: "мій"
      options: ["мій", "моя", "мене", "добра"]
    - sentence: "У мене ___ брат."
      answer: "є"
      options: ["є", "мій", "моя", "мене"]
    - sentence: "___ мене є дідусь."
      answer: "У"
      options: ["У", "Це", "Мій", "Моя"]
    - sentence: "Це ___ чоловік."
      answer: "мій"
      options: ["мій", "моя", "є", "у"]
    - sentence: "Це ___ бабуся."
      answer: "моя"
      options: ["моя", "мій", "добрий", "старший"]
    - sentence: "У мене є молодший ___."
      answer: "брат"
