- type: quiz
  title: "Family Concepts and Culture"
  instruction: "Choose the correct answer based on the lesson."
  items:
    - question: "Which word refers to your immediate, nuclear family living in the same house?"
      explanation: "Сім'я is the nuclear family, while родина is the extended family."
      options:
        - text: "сім'я"
          correct: true
        - text: "родина"
          correct: false
        - text: "чоловік"
          correct: false
        - text: "брат"
          correct: false
    - question: "Which word refers to your entire extended lineage?"
      explanation: "Родина refers to your extended family."
      options:
        - text: "родина"
          correct: true
        - text: "сім'я"
          correct: false
        - text: "мама"
          correct: false
        - text: "донька"
          correct: false
    - question: "How do you naturally say 'I have a brother' in Ukrainian?"
      explanation: "We use 'У мене є...' to express possession naturally."
      options:
        - text: "У мене є брат."
          correct: true
        - text: "Я маю брат."
          correct: false
        - text: "Це мій брат."
          correct: false
        - text: "Мій брат добрий."
          correct: false
    - question: "Which possessive word do you use with 'дядько' (uncle)?"
      explanation: "Uncle is a male relative, so we use the masculine 'мій'."
      options:
        - text: "мій"
          correct: true
        - text: "моя"
          correct: false
        - text: "мене"
          correct: false
        - text: "є"
          correct: false
    - question: "Which possessive word do you use with 'тітка' (aunt)?"
      explanation: "Aunt is a female relative, so we use the feminine 'моя'."
      options:
        - text: "моя"
          correct: true
        - text: "мій"
          correct: false
        - text: "мене"
          correct: false
        - text: "у"
          correct: false
    - question: "If you want to say 'This is my wife', which word do you use for wife?"
      explanation: "Дружина is the proper, neutral term for a wife."
      options:
        - text: "дружина"
          correct: true
        - text: "чоловік"
          correct: false
        - text: "сестра"
          correct: false
        - text: "тітка"
          correct: false
    - question: "What is the correct form to call out to your grandfather to get his attention?"
      explanation: "The vocative form of дідусь is дідусю."
      options:
        - text: "дідусю"
          correct: true
        - text: "дідусь"
          correct: false
        - text: "бабусю"
          correct: false
        - text: "тату"
          correct: false
    - question: "What does 'молодша сестра' mean?"
      explanation: "Молодша means younger (feminine), and сестра means sister."
      options:
        - text: "younger sister"
          correct: true
        - text: "older sister"
          correct: false
        - text: "older brother"
          correct: false
        - text: "younger brother"
          correct: false

- type: true-false
  title: "True or False?"
  items:
    - statement: "In Ukrainian, 'сім'я' and 'родина' mean exactly the same thing and are used interchangeably."
      correct: false
      explanation: "Сім'я refers to the nuclear family, while родина is the extended family."
    - statement: "When stating you have a relative, you should avoid the direct translation of the English verb 'to have'."
      correct: true
      explanation: "Directly translating 'I have' sounds unnatural. Ukrainians use 'У мене є...' instead."
    - statement: "The possessive word 'моя' is used for male relatives like brothers and uncles."
      correct: false
      explanation: "'Моя' is feminine. You must use 'мій' for male relatives."
    - statement: "The word 'чоловік' can mean both 'husband' and 'man'."
      correct: true
      explanation: "Yes, this dual meaning is very common in Ukrainian."
    - statement: "When you want to get your mother's attention, you say 'Мамо'."
      correct: true
      explanation: "This is the Vocative case, used specifically for calling out to someone."
    - statement: "To say 'This is my kind grandmother', you must use the feminine form of the adjective 'добра'."
      correct: true
      explanation: "Adjectives must match the gender of the person, so 'бабуся' takes 'добра'."
    - statement: "The word 'тату' is used when talking ABOUT your dad to someone else."
      correct: false
      explanation: "'Тату' is the Vocative case, used only when speaking DIRECTLY TO your dad. When talking about him, use 'тато'."
    - statement: "Using the dictionary form (e.g., 'мама') to call someone directly can sound a bit cold or distant."
      correct: true
      explanation: "The Vocative case adds warmth and respect, which is why forms like 'мамо' and 'бабусю' are preferred."

