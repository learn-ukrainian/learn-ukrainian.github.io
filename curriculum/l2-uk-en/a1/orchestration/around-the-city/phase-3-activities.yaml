- type: quiz
  title: "Що це за місце?"
  instruction: "Оберіть правильний переклад для кожного слова."
  items:
    - question: "Як українською буде «pharmacy»?"
      explanation: "Аптека — це місце, де ми купуємо ліки."
      options:
        - text: "аптека"
          correct: true
        - text: "пошта"
          correct: false
        - text: "площа"
          correct: false
        - text: "зупинка"
          correct: false
    - question: "Що таке «зупинка»?"
      explanation: "Зупинка — це місце, де ми чекаємо на автобус."
      options:
        - text: "stop (bus/tram)"
          correct: true
        - text: "station (metro)"
          correct: false
        - text: "street"
          correct: false
        - text: "square"
          correct: false
    - question: "Як перекласти слово «вулиця»?"
      explanation: "Вулиця — це дорога в місті з будинками."
      options:
        - text: "street"
          correct: true
        - text: "park"
          correct: false
        - text: "building"
          correct: false
        - text: "city"
          correct: false
    - question: "Що означає слово «площа»?"
      explanation: "Площа — це велике відкрите місце в центрі міста."
      options:
        - text: "square"
          correct: true
        - text: "market"
          correct: false
        - text: "pharmacy"
          correct: false
        - text: "post office"
          correct: false
    - question: "Де ми відправляємо листи?"
      explanation: "Ми відправляємо листи на пошті."
      options:
        - text: "на пошті"
          correct: true
        - text: "в аптеці"
          correct: false
        - text: "на зупинці"
          correct: false
        - text: "на вулиці"
          correct: false
    - question: "Як українською буде «straight»?"
      explanation: "Прямо означає рух вперед без поворотів."
      options:
        - text: "прямо"
          correct: true
        - text: "наліво"
          correct: false
        - text: "направо"
          correct: false
        - text: "назад"
          correct: false

- type: match-up
  title: "Напрямки та рух"
  instruction: "З'єднайте українське слово з англійським перекладом."
  pairs:
    - left: "наліво"
      right: "to the left"
    - left: "направо"
      right: "to the right"
    - left: "прямо"
      right: "straight ahead"
    - left: "біля"
      right: "near / by"
    - left: "навпроти"
      right: "opposite"
    - left: "назад"
      right: "back"
    - left: "куди?"
      right: "where to?"
    - left: "де?"
      right: "where (location)?"

- type: group-sort
  title: "Де чи Куди?"
  instruction: "Розподіліть фрази на дві групи: ті, що відповідають на питання «Де?» (місце), і ті, що відповідають на питання «Куди?» (напрямок)."
  groups:
    - name: "Де? (Місце)"
      items:
        - "тут"
        - "там"
        - "в аптеці"
        - "на площі"
        - "на зупинці"
        - "біля парку"
    - name: "Куди? (Напрямок)"
      items:
        - "туди"
        - "додому"
        - "наліво"
        - "направо"
        - "прямо"
        - "назад"

- type: fill-in
  title: "Прийменники: В чи На?"
  instruction: "Вставте правильний прийменник «в» (у) або «на». Пам'ятайте: відкриті місця — «на», закриті будівлі — «в»."
  items:
    - sentence: "Я чекаю автобус _____ зупинці."
      answer: "на"
      options:
        - "на"
        - "в"
        - "біля"
        - "під"
      explanation: "Зупинка — це відкрите місце або «поверхня», тому використовуємо «на»."
    - sentence: "Ми купуємо ліки _____ аптеці."
      answer: "в"
      options:
        - "в"
        - "на"
        - "про"
        - "за"
      explanation: "Аптека — це будівля, всередині, тому «в»."
    - sentence: "Пошта знаходиться _____ цій вулиці."
      answer: "на"
      options:
        - "на"
        - "в"
        - "у"
        - "біля"
      explanation: "Вулиця — це відкритий простір, тому «на вулиці»."
    - sentence: "Діти гуляють _____ парку."
      answer: "у"
      options:
        - "у"
        - "на"
        - "за"
        - "під"
      explanation: "Парк — це закритий простір (серед дерев), тому «у» (або «в»)."
    - sentence: "Концерт відбувається _____ площі."
      answer: "на"
      options:
        - "на"
        - "в"
        - "біля"
        - "під"
      explanation: "Площа — це відкрита поверхня, тому «на»."
    - sentence: "Мій друг зараз _____ станції метро."
      answer: "на"
      options:
        - "на"
        - "в"
        - "у"
        - "за"
      explanation: "Станція (як пункт) зазвичай вживається з «на»."

- type: unjumble
  title: "Прості запитання"
  instruction: "Складіть слова у правильному порядку, щоб утворити запитання."
  items:
    - words: ["Де", "тут", "аптека"]
      answer: "Де тут аптека"
    - words: ["Куди", "ми", "йдемо"]
      answer: "Куди ми йдемо"
    - words: ["Де", "твоя", "вулиця"]
      answer: "Де твоя вулиця"
    - words: ["Де", "зупинка", "автобуса"]
      answer: "Де зупинка автобуса"
    - words: ["Як", "справи", "у", "тебе"]
      answer: "Як у тебе справи"
    - words: ["Де", "знаходиться", "пошта"]
      answer: "Де знаходиться пошта"

- type: true-false
  title: "Логіка міста"
  instruction: "Визначте, чи правдиві ці твердження."
  items:
    - statement: "В аптеці ми купуємо хліб і молоко."
      correct: false
      explanation: "Ні, в аптеці ми купуємо ліки. Хліб — у магазині."
    - statement: "На пошті ми можемо відправити лист."
      correct: true
      explanation: "Так, це головна функція пошти."
    - statement: "Зупинка — це місце, де зупиняється таксі."
      correct: false
      explanation: "Зазвичай зупинка — для автобуса, трамвая або тролейбуса. Таксі може зупинитися будь-де."
    - statement: "Вулиця — це місце, де живуть люди і їздять машини."
      correct: true
      explanation: "Так, вулиця має будинки і дорогу."
    - statement: "Площа — це маленька кімната в будинку."
      correct: false
      explanation: "Ні, площа — це великий відкритий простір у місті."
    - statement: "«Прямо» означає поворот наліво."
      correct: false
      explanation: "Ні, «прямо» означає рух вперед."

- type: match-up
  title: "Місця та дії"
  instruction: "Що ми робимо в цих місцях? З'єднайте місце з об'єктом або дією."
  pairs:
    - left: "аптека"
      right: "ліки"
    - left: "пошта"
      right: "лист"
    - left: "зупинка"
      right: "автобус"
    - left: "площа"
      right: "центр міста"
    - left: "парк"
      right: "дерева"
    - left: "станція"
      right: "метро"
    - left: "вулиця"
      right: "дорога"

- type: fill-in
  title: "Дієслова руху"
  instruction: "Оберіть правильне дієслово для інструкції."
  items:
    - sentence: "_____ наліво біля банку."
      answer: "Поверніть"
      options:
        - "Поверніть"
        - "Стійте"
        - "Дивіться"
        - "Читайте"
      explanation: "Для зміни напрямку ми кажемо «поверніть»."
    - sentence: "_____ прямо до парку."
      answer: "Ідіть"
      options:
        - "Ідіть"
        - "Стійте"
        - "Робіть"
        - "Беріть"
      explanation: "Для руху вперед ми кажемо «ідіть»."
    - sentence: "_____ направо на світлофорі."
      answer: "Подивіться"
      options:
        - "Подивіться"
        - "Ідіть"
        - "Слухайте"
        - "Пишіть"
      explanation: "«Подивіться» означає look/check."
    - sentence: "_____ тут, будь ласка."
      answer: "Зупиніться"
      options:
        - "Зупиніться"
        - "Йдіть"
        - "Біжіть"
        - "Летіть"
      explanation: "«Зупиніться» означає stop here."
    - sentence: "Ми _____ додому."
      answer: "йдемо"
      options:
        - "йдемо"
        - "стояти"
        - "жити"
        - "бути"
      explanation: "«Йдемо» означає рух пішки."
    - sentence: "Де _____ аптека?"
      answer: "знаходиться"
      options:
        - "знаходиться"
        - "робить"
        - "гуляє"
        - "читає"
      explanation: "«Знаходиться» означає is located."

- type: quiz
  title: "Граматика: Біля та Навпроти"
  instruction: "Оберіть правильну форму слова після прийменників «біля» та «навпроти» (Родовий відмінок)."
  items:
    - question: "Я чекаю біля..."
      explanation: "Після «біля» використовуємо Родовий відмінок (аптека -> аптеки)."
      options:
        - text: "аптеки"
          correct: true
        - text: "аптека"
          correct: false
        - text: "аптеку"
          correct: false
        - text: "аптекою"
          correct: false
    - question: "Банк знаходиться навпроти..."
      explanation: "Після «навпроти» використовуємо Родовий відмінок (пошта -> пошти)."
      options:
        - text: "пошти"
          correct: true
        - text: "пошта"
          correct: false
        - text: "пошту"
          correct: false
        - text: "пошті"
          correct: false
    - question: "Ми зустрінемось біля..."
      explanation: "Парк (чоловічий рід) у Родовому відмінку -> парку."
      options:
        - text: "парку"
          correct: true
        - text: "парк"
          correct: false
        - text: "парка"
          correct: false
        - text: "парком"
          correct: false
    - question: "Зупинка біля..."
      explanation: "Площа (м'яка група) у Родовому відмінку -> площі."
      options:
        - text: "площі"
          correct: true
        - text: "площа"
          correct: false
        - text: "площу"
          correct: false
        - text: "площею"
          correct: false
    - question: "Це дерево біля..."
      explanation: "Вулиця -> вулиці."
      options:
        - text: "вулиці"
          correct: true
        - text: "вулиця"
          correct: false
        - text: "вулицю"
          correct: false
        - text: "вулицею"
          correct: false
    - question: "Магазин навпроти..."
      explanation: "Станція -> станції."
      options:
        - text: "станції"
          correct: true
        - text: "станція"
          correct: false
        - text: "станцію"
          correct: false
        - text: "станцією"
          correct: false

- type: unjumble
  title: "Складні вказівки"
  instruction: "Складіть слова, щоб утворити повне речення з інструкцією."
  items:
    - words: ["Ідіть", "прямо", "і", "поверніть", "наліво"]
      answer: "Ідіть прямо і поверніть наліво"
    - words: ["Аптека", "біля", "старої", "пошти"]
      answer: "Аптека біля старої пошти"
    - words: ["Зупинка", "знаходиться", "навпроти", "парку"]
      answer: "Зупинка знаходиться навпроти парку"
    - words: ["Де", "тут", "станція", "метро"]
      answer: "Де тут станція метро"
    - words: ["Поверніть", "направо", "біля", "банку"]
      answer: "Поверніть направо біля банку"
    - words: ["Ми", "шукаємо", "центральну", "площу"]
      answer: "Ми шукаємо центральну площу"
