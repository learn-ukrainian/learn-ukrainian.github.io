- type: fill-in
  title: "Counting Practice"
  instruction: "Fill in the missing Ukrainian number in each sentence."
  items:
    - sentence: "1 = ___"
      answer: "один"
      options: ["один", "два", "три", "десять"]
      explanation: "Один means one in Ukrainian."
    - sentence: "3 = ___"
      answer: "три"
      options: ["два", "три", "п'ять", "сім"]
      explanation: "Три means three."
    - sentence: "5 = ___"
      answer: "п'ять"
      options: ["чотири", "шість", "п'ять", "вісім"]
      explanation: "П'ять means five. Notice the apostrophe — pause slightly after the п sound."
    - sentence: "7 = ___"
      answer: "сім"
      options: ["шість", "вісім", "сім", "дев'ять"]
      explanation: "Сім means seven."
    - sentence: "10 = ___"
      answer: "десять"
      options: ["дев'ять", "десять", "сорок", "сто"]
      explanation: "Десять means ten."
    - sentence: "20 = ___"
      answer: "двадцять"
      options: ["дванадцять", "двадцять", "тридцять", "сорок"]
      explanation: "Двадцять means twenty."
    - sentence: "40 = ___"
      answer: "сорок"
      options: ["тридцять", "п'ятдесят", "сорок", "двадцять"]
      explanation: "Сорок means forty — it is an irregular form, not built from чотири."
    - sentence: "100 = ___"
      answer: "сто"
      options: ["дев'яносто", "вісімдесят", "сто", "сімдесят"]
      explanation: "Сто means one hundred."

- type: fill-in
  title: "Complete with the Correct Number Form"
  instruction: "Choose the correct Ukrainian number or currency form to complete each phrase."
  items:
    - sentence: "1 гривня, 2 гривні, 5 ___"
      answer: "гривень"
      options: ["гривня", "гривні", "гривень", "долари"]
      explanation: "After 5, 6, 7, 8, 9, 0 we use the genitive plural form — гривень."
    - sentence: "___ гривня (one hryvnia)"
      answer: "одна"
      options: ["один", "одна", "два", "дві"]
      explanation: "Гривня is feminine, so we use the feminine form одна, not один."
    - sentence: "___ гривні (two hryvnias)"
      answer: "дві"
      options: ["два", "дві", "три", "одна"]
      explanation: "Гривня is feminine, so we use дві (not два) with it."
    - sentence: "50 = п'ят___ (fifty)"
      answer: "п'ятдесят"
      options: ["п'ятдесят", "п'ятьдесят", "п'ятнадцять", "п'ятсот"]
      explanation: "In п'ятдесят, the soft sign from п'ять is dropped."
    - sentence: "Хліб коштує ___ гривень. (Bread costs 20 hryvnias.)"
      answer: "двадцять"
      options: ["двадцять", "дванадцять", "тридцять", "два"]
      explanation: "Двадцять means twenty."
    - sentence: "___ гривні (three hryvnias)"
      answer: "три"
      options: ["три", "п'ять", "одна", "десять"]
      explanation: "After 2, 3, 4 the currency takes the form гривні."
    - sentence: "Кава коштує ___ гривень. (Coffee costs 50 hryvnias.)"
      answer: "п'ятдесят"
      options: ["п'ятдесят", "п'ятнадцять", "п'ять", "сорок"]
      explanation: "П'ятдесят means fifty."
    - sentence: "Молоко коштує ___ гривень. (Milk costs 40 hryvnias.)"
      answer: "сорок"
      options: ["сорок", "чотири", "сто", "двадцять"]
      explanation: "Сорок means forty."

- type: quiz
  title: "Numbers and Money Quiz"
  instruction: "Choose the correct answer for each question."
  items:
    - question: "How do you ask 'How much does it cost?' in Ukrainian?"
      options:
        - text: "Скільки коштує?"
          correct: true
        - text: "Яка вода?"
          correct: false
        - text: "Де гроші?"
          correct: false
        - text: "Хто купує?"
          correct: false
      explanation: "Скільки коштує? is the standard way to ask about price in Ukrainian."
    - question: "What is the correct form after the number 5 — 'п'ять ___'?"
      options:
        - text: "гривень"
          correct: true
        - text: "гривня"
          correct: false
        - text: "гривні"
          correct: false
        - text: "долар"
          correct: false
      explanation: "Numbers 5-20 and round tens require the genitive plural — гривень."
    - question: "Why is it wrong to say 'два гривні'?"
      options:
        - text: "Because гривня is feminine, so we must say дві гривні"
          correct: true
        - text: "Because два is not a real number"
          correct: false
        - text: "Because гривня does not change form"
          correct: false
        - text: "Because два is only used with десять"
          correct: false
      explanation: "Гривня is feminine, so the number two must use the feminine form дві."
    - question: "What does дорого mean?"
      options:
        - text: "expensive"
          correct: true
        - text: "cheap"
          correct: false
        - text: "change"
          correct: false
        - text: "price"
          correct: false
      explanation: "Дорого means expensive. Its opposite is дешево (cheap)."
    - question: "What does здача mean in a shopping context?"
      options:
        - text: "change (money returned)"
          correct: true
        - text: "receipt"
          correct: false
        - text: "price tag"
          correct: false
        - text: "discount"
          correct: false
      explanation: "Здача is the change you receive after paying with a larger bill."
    - question: "Which number is irregular — it does NOT follow the pattern of adding -десят to its base?"
      options:
        - text: "сорок (40)"
          correct: true
        - text: "п'ятдесят (50)"
          correct: false
        - text: "шістдесят (60)"
          correct: false
        - text: "сімдесят (70)"
          correct: false
      explanation: "Сорок (forty) is irregular. The tens from 50-80 follow the pattern base + десят."
    - question: "What is the symbol for the Ukrainian hryvnia?"
      options:
        - text: "₴"
          correct: true
        - text: "€"
          correct: false
        - text: "¥"
          correct: false
        - text: "$"
          correct: false
      explanation: "The hryvnia symbol ₴ is based on the cursive Cyrillic letter г with two horizontal stripes."
    - question: "What is the smaller subunit of the hryvnia called?"
      options:
        - text: "копійка"
          correct: true
        - text: "здача"
          correct: false
        - text: "ціна"
          correct: false
        - text: "гроші"
          correct: false
      explanation: "Копійка (kopeck) is the subunit — 100 копійок = 1 гривня."

- type: fill-in
  title: "Shopping Transactions"
  instruction: "Complete each shopping dialogue with the correct word."
  items:
    - sentence: "___ коштує хліб? (How much does bread cost?)"
      answer: "Скільки"
      options: ["Скільки", "Яка", "Де", "Хто"]
      explanation: "Скільки коштує...? is the standard question for asking about price."
    - sentence: "Кава коштує п'ятдесят гривень, а хліб — тридцять гривень. ___ вісімдесят гривень. (Together eighty hryvnias.)"
      answer: "Разом"
      options: ["Разом", "Правильно", "Дорого", "Дешево"]
      explanation: "Разом means together — used when adding up a total."
    - sentence: "Ось сто гривень. Ваша ___ — двадцять гривень. (Your change is twenty hryvnias.)"
      answer: "здача"
      options: ["здача", "ціна", "кава", "вода"]
      explanation: "Здача means change — the money returned to you."
    - sentence: "Це дуже ___! (This is very expensive!)"
      answer: "дорого"
      options: ["дорого", "дешево", "правильно", "разом"]
      explanation: "Дорого means expensive."
    - sentence: "Яка ___? (What is the price?)"
      answer: "ціна"
      options: ["ціна", "здача", "кава", "гривня"]
      explanation: "Ціна means price. Яка ціна? is another way to ask about cost."
    - sentence: "Сир ___ сто гривень. (Cheese costs one hundred hryvnias.)"
      answer: "коштує"
      options: ["коштує", "купує", "дорого", "дешево"]
      explanation: "Коштує is the present tense form of коштувати (to cost)."

- type: match-up
  title: "Match the Number to Its Ukrainian Word"
  instruction: "Match each numeral with the correct Ukrainian word."
  pairs:
    - left: "1"
      right: "один"
    - left: "5"
      right: "п'ять"
    - left: "10"
      right: "десять"
    - left: "20"
      right: "двадцять"
    - left: "40"
      right: "сорок"
    - left: "50"
      right: "п'ятдесят"
    - left: "80"
      right: "вісімдесят"
    - left: "100"
      right: "сто"

- type: true-false
  title: "True or False? Numbers and Money"
  instruction: "Decide whether each statement is true or false."
  items:
    - statement: "The word п'ятдесят (fifty) keeps the soft sign from п'ять."
      correct: false
      explanation: "The soft sign is dropped in п'ятдесят — this is a common spelling trap."
    - statement: "Сорок (forty) is an irregular number that does not follow the десят pattern."
      correct: true
      explanation: "Correct! Сорок is irregular, unlike п'ятдесят, шістдесят, etc."
    - statement: "After the number 3, the correct currency form is гривні."
      correct: true
      explanation: "Numbers 2, 3, 4 use гривні (nominative plural)."
    - statement: "It is correct to say два гривні because два works with all nouns."
      correct: false
      explanation: "Гривня is feminine, so you must use the feminine form дві гривні."
    - statement: "Скільки коштує? means 'What is the price?'"
      correct: true
      explanation: "Скільки коштує? literally means 'How much does it cost?' — used to ask about price."
    - statement: "The hryvnia symbol ₴ is based on the Latin letter G."
      correct: false
      explanation: "The symbol ₴ is based on the cursive Cyrillic letter г (from гривня), not Latin G."
    - statement: "Копійка is the smaller subunit of the гривня, similar to cents."
      correct: true
      explanation: "Correct! One hundred копійок equals one гривня."
    - statement: "Дев'яносто means eighty in Ukrainian."
      correct: false
      explanation: "Дев'яносто means ninety. Eighty is вісімдесят."

- type: group-sort
  title: "Sort by the 1-2-5 Rule"
  instruction: "Sort these number-currency combinations into the correct group based on which form of гривня they use."
  groups:
    - name: "гривня (rule of 1)"
      items:
        - "одна гривня"
        - "двадцять одна гривня"
    - name: "гривні (rule of 2-4)"
      items:
        - "дві гривні"
        - "три гривні"
        - "чотири гривні"
    - name: "гривень (rule of 5+)"
      items:
        - "п'ять гривень"
        - "десять гривень"
        - "сто гривень"
        - "сорок гривень"
        - "двадцять гривень"

- type: unjumble
  title: "Put the Words in Order"
  instruction: "Arrange the words to form a correct Ukrainian sentence."
  items:
    - words: ["коштує", "Скільки", "хліб"]
      answer: "Скільки коштує хліб"
    - words: ["коштує", "Кава", "гривень", "п'ятдесят"]
      answer: "Кава коштує п'ятдесят гривень"
    - words: ["дорого", "дуже", "Це"]
      answer: "Це дуже дорого"
    - words: ["ціна", "Яка"]
      answer: "Яка ціна"
    - words: ["гривень", "Разом", "вісімдесят"]
      answer: "Разом вісімдесят гривень"
    - words: ["здача", "двадцять", "Ваша", "гривень"]
      answer: "Ваша здача двадцять гривень"