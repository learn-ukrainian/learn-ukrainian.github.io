PREVIOUS_CONTENT_SUMMARY: "### Скільки це коштує?\n### Рахунок та Здача\n### Рольова гра: На ринку\n---\n**Діалог:**\n— Скі́льки кошту́є хліб? (How much does the bread cost?)\n— Хліб кошту́є три́дцять п'ять гри́вень. (The bread costs thirty-five hryvnias.)\n— Добре. А скі́льки кошту́є вода́? (Good. And how much does the water cost?)\n— Вода́ кошту́є два́дцять гри́вень. (The water costs twenty hryvnias.)\n— Скі́льки з ме́не? (How much from me?)\n— П'ятдеся́т п'ять гри́вень. (Fifty-five hryvnias.)\n— Ось сто гри́вень. (Here is one hundred hryvnias.)\n— Ва́ша зда́ча — со́рок п'ять гри́вень. (Your change is forty-five hryvnias.)\n— Дя́кую. До поба́чення! (Thank you. Goodbye!)"
