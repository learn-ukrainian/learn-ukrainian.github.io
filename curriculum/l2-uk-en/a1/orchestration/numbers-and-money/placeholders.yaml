IMMERSION_RULE: 'TARGET: 35-55% Ukrainian, 45-65% English. Write ALL section content
  in Ukrainian first (max 10 words per sentence). Then add English translation paragraphs
  for grammar explanations to bring Ukrainian down to 35-55%. CRITICAL: NEVER mix
  languages within a sentence. Each sentence is 100% Ukrainian OR 100% English. Grammar
  rules still anchored in English. A1 register — simple concrete vocabulary.'
LEVEL_CONSTRAINTS: "HARD GRAMMAR RULES (audit will reject violations):\n- Max 10 words\
  \ per Ukrainian sentence (STRICT — count every word)\n- ONLY 1 clause per sentence\
  \ (no compound sentences)\n- Dative case FORBIDDEN (no мені, тобі, йому, їй, вам,\
  \ їм, -ові/-еві endings)\n  Exception: нам is taught as decodable vocabulary in\
  \ M1 (reading drill word, not grammar)\n- Instrumental case FORBIDDEN (no з другом,\
  \ з мамою, -ом/-ою/-ем/-ею endings)\n- NO subordinate clauses: який/яка/яке, що-clause,\
  \ коли, якщо, тому що, бо, щоб, поки are ALL BANNED\n- Only imperfective aspect\
  \ verbs\n- No participles\n- Allowed cases: Nominative, Accusative, Locative (from\
  \ M13), Genitive (basics), Vocative"
PEDAGOGICAL_CONSTRAINTS: 'SEQUENCE CONSTRAINTS (M15+ — Verbs & Beyond):

  Present tense verbs start at M15. Past tense at M36. Future at M37.


  KEY RESTRICTION: Imperative forms (Слухайте!, Читайте!, Пишіть!) are NOT taught
  until M47 (imperative-and-requests). Before M47, use indirect requests or English
  for instructions.


  The standard A1 LEVEL_CONSTRAINTS (no dative, no instrumental, imperfective only)
  apply in addition to this constraint.'
