STRUCTURAL_RULES: '### Rule 1: Every Concept Gets Dedicated Depth


  Each concept MUST get its own `### H3` subsection. Closely related items MAY share
  one H3 with equal coverage.


  ### Rule 2: Depth Over Compression


  Each H3 concept block MUST contain:

  1. **Definition/explanation** (1-2 sentences)

  2. **How it works** (formation rules, patterns)

  3. **2+ example sentences** in context

  4. **Usage note** — when/why a speaker uses this form


  Minimum **60-80 words per H3 block**.


  ### Rule 3: Presentation Consistency


  All items in a category: SAME format, SAME depth (±20%), SAME example count (±1).


  ### Rule 4: Example Variety


  FORBIDDEN: 5+ consecutive examples in the same format. Use at least **3 different
  formats**: standalone examples, comparison tables, inline examples, mini-dialogues,
  callout boxes.'
H3_WORD_RANGE: 60-80
EXPANSION_METHOD: '**Don''t just write more — write deeper.** For EVERY concept:


  1. **Define it** (1-2 sentences explaining what it is)

  2. **Show how it works** (pattern, rule, formation)

  3. **Give 2+ examples** in full sentences with context

  4. **Add a comparison** (table, before/after, correct vs incorrect)

  5. **Connect to real life** (when would a Ukrainian speaker use this?)


  **If a section is still under target:** Add a `[!warning]` with a common mistake,
  a `[!culture]` connecting to Ukrainian culture, or a mini-dialogue.'
WRITING_TONE_INSTRUCTION: Keep explanations clear and direct. Every H3 gets {H3_WORD_RANGE}
  words. Avoid verbose prose — students are beginners. Focus on practical examples
  over theory.
