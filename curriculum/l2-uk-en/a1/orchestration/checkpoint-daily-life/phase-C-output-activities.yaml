- type: quiz
  title: "Daily Life Situations"
  instruction: "Choose the best phrase for the situation."
  items:
    - question: "You want to say 'I will get up early'. How do you say it?"
      options:
        - text: "Я буду вставати рано"
          correct: true
        - text: "Я встав рано"
          correct: false
        - text: "Вона вставала рано"
          correct: false
        - text: "Я буду спати"
          correct: false
      explanation: "'Буду вставати' is the future tense for 'will get up'."
    - question: "You are in a cafe. The barista asks what you want. What do you say?"
      options:
        - text: "Я буду каву"
          correct: true
        - text: "Скільки коштує?"
          correct: false
        - text: "Я снідав"
          correct: false
        - text: "Було холодно"
          correct: false
      explanation: "'Я буду каву' means 'I will have coffee'."
    - question: "You want to say it was cold yesterday. Which phrase is correct?"
      options:
        - text: "Вчора було холодно"
          correct: true
        - text: "Завтра буде холодно"
          correct: false
        - text: "Сьогодні тепло"
          correct: false
        - text: "Взимку тепло"
          correct: false
      explanation: "'Було' is the past tense form used for weather."
    - question: "How do you ask about a price in a store?"
      options:
        - text: "Скільки коштує?"
          correct: true
        - text: "Де магазин?"
          correct: false
        - text: "Куди він ішов?"
          correct: false
        - text: "Що це?"
          correct: false
      explanation: "Скільки коштує? means 'How much does it cost?'."
    - question: "You want to say 'I had lunch in a cafe'. How do you say it?"
      options:
        - text: "Я обідав у кафе"
          correct: true
        - text: "Я буду обідати у кафе"
          correct: false
        - text: "Я снідав вдома"
          correct: false
        - text: "Я працював у кафе"
          correct: false
      explanation: "'Обідав' is the past tense for having lunch."
    - question: "Your friend says 'Сьогодні тепло'. What does it mean?"
      options:
        - text: "Today is warm"
          correct: true
        - text: "Today is cold"
          correct: false
        - text: "Yesterday was warm"
          correct: false
        - text: "Tomorrow will be warm"
          correct: false
      explanation: "Сьогодні means today, and тепло means warm."
    - question: "Which question do you use to ask someone where they went?"
      options:
        - text: "Куди?"
          correct: true
        - text: "Де?"
          correct: false
        - text: "Як?"
          correct: false
        - text: "Скільки?"
          correct: false
      explanation: "'Куди' asks about the destination of movement."
    - question: "You want to say you read poorly. How do you say it?"
      options:
        - text: "Я читаю погано"
          correct: true
        - text: "Я читаю добре"
          correct: false
        - text: "Я читаю швидко"
          correct: false
        - text: "Я читаю голосно"
          correct: false
      explanation: "'Погано' means poorly or badly."