- type: quiz
  title: "Grammar Check: Past and Future"
  instruction: "Choose the correct answer."
  items:
    - question: "How do you say 'he read' in Ukrainian?"
      options:
        - text: "Він читав"
          correct: true
        - text: "Він читала"
          correct: false
        - text: "Він читало"
          correct: false
        - text: "Він читали"
          correct: false
      explanation: "The past tense for 'he' (він) ends in -в."
    - question: "Which word means 'yesterday'?"
      options:
        - text: "вчора"
          correct: true
        - text: "завтра"
          correct: false
        - text: "сьогодні"
          correct: false
        - text: "ранок"
          correct: false
      explanation: "Вчора means yesterday."
    - question: "How do you say 'we will read'?"
      options:
        - text: "ми будемо читати"
          correct: true
        - text: "я буду читати"
          correct: false
        - text: "ви будете читати"
          correct: false
        - text: "вони будуть читати"
          correct: false
      explanation: "Ми (we) goes with будемо."
    - question: "Which word is used to ask about a static location (where at)?"
      options:
        - text: "Де?"
          correct: true
        - text: "Куди?"
          correct: false
        - text: "Що?"
          correct: false
        - text: "Хто?"
          correct: false
      explanation: "Де? means 'where at?' and Куди? means 'where to?'"
    - question: "How do you say 'she was reading'?"
      options:
        - text: "вона читала"
          correct: true
        - text: "вона читав"
          correct: false
        - text: "вона читало"
          correct: false
        - text: "вона читали"
          correct: false
      explanation: "The past tense for 'she' (вона) ends in -ла."
    - question: "How do you ask 'How much does it cost?'"
      options:
        - text: "Скільки коштує?"
          correct: true
        - text: "Скільки це?"
          correct: false
        - text: "Як коштує?"
          correct: false
        - text: "Що коштує?"
          correct: false
      explanation: "Скільки коштує? is the correct way to ask for a price."
    - question: "Which word means 'tomorrow'?"
      options:
        - text: "завтра"
          correct: true
        - text: "вчора"
          correct: false
        - text: "сьогодні"
          correct: false
        - text: "вечір"
          correct: false
      explanation: "Завтра means tomorrow."
    - question: "How do you say 'they will rest'?"
      options:
        - text: "вони будуть відпочивати"
          correct: true
        - text: "він буде відпочивати"
          correct: false
        - text: "ми будемо відпочивати"
          correct: false
        - text: "ти будеш відпочивати"
          correct: false
      explanation: "Вони (they) goes with будуть."

