- type: fill-in
  title: "Complete the Sentences"
  instruction: "Choose the correct word to complete the sentence."
  items:
    - sentence: "Вчора він ___."
      answer: "читав"
      options: ["читав", "читала", "читало", "читали"]
    - sentence: "Вчора вона ___."
      answer: "працювала"
      options: ["працював", "працювала", "працювало", "працювали"]
    - sentence: "Завтра ми ___ відпочивати."
      answer: "будемо"
      options: ["буду", "будеш", "буде", "будемо"]
    - sentence: "Завтра вони ___ працювати."
      answer: "будуть"
      options: ["будемо", "будете", "будуть", "буде"]
    - sentence: "Взимку дуже ___."
      answer: "холодно"
      options: ["тепло", "холодно", "добре", "погано"]
    - sentence: "Влітку часто ___."
      answer: "тепло"
      options: ["тепло", "холодно", "погано", "швидко"]
    - sentence: "Кава ___ 50 гривень."
      answer: "коштує"
      options: ["коштує", "купує", "працює", "снідає"]
    - sentence: "Я буду ___, будь ласка."
      answer: "каву"
      options: ["каву", "кава", "каві", "кавою"]

- type: true-false
  title: "True or False: Grammar Rules"
  instruction: "Decide if the statement about Ukrainian is true or false."
  items:
    - statement: "The past tense ending for 'вона' (she) is '-ла'."
      correct: true
      explanation: "Yes, 'вона читала', 'вона працювала'."
    - statement: "To make the future tense with 'я' (I), we use 'буду'."
      correct: true
      explanation: "Correct! Я буду читати."
    - statement: "The word 'вчора' means 'tomorrow'."
      correct: false
      explanation: "Вчора means yesterday. Завтра means tomorrow."
    - statement: "When asking 'Where to?' involving motion, you use 'Де?'."
      correct: false
      explanation: "For motion (where to?), you use 'Куди?'. 'Де?' is for static location."
    - statement: "In Ukrainian, you do not need 'to be' to ask for a price, just 'Скільки коштує?'."
      correct: true
      explanation: "Correct, we just ask 'How much does it cost?'."
    - statement: "The past tense ending for 'він' (he) is '-ло'."
      correct: false
      explanation: "The ending for 'він' is '-в'. The '-ло' ending is for 'воно' (it)."
    - statement: "Adverbs like 'добре' and 'швидко' describe how an action is done."
      correct: true
      explanation: "Yes, they answer the question 'Як?' (How?)."
    - statement: "You say 'Він читала' if a man is reading in the past."
      correct: false
      explanation: "The past tense must match the gender. For a man, it is 'Він читав'."

