items:
  - lemma: "де"
    translation: "where"
    pos: "adverb"
    usage: "Location question word, triggers Locative case in the answer"
    example: "Де кафе?"
  - lemma: "куди"
    translation: "where to"
    pos: "adverb"
    usage: "Direction question word, triggers Accusative case in the answer"
    example: "Куди ти йдеш?"
  - lemma: "звідки"
    translation: "from where"
    pos: "adverb"
    usage: "Origin question word, triggers Genitive case in the answer"
    example: "Звідки ти?"
  - lemma: "немає"
    translation: "there is no"
    pos: "verb"
    usage: "Triggers the Genitive case for the absent item"
    example: "Немає кави."
  - lemma: "новий"
    translation: "new"
    pos: "adjective"
    gender: "m"
    notes: "Paradigm adjective for case agreement practice"
    example: "Я бачу нову книгу."
  - lemma: "великий"
    translation: "big"
    pos: "adjective"
    gender: "m"
    notes: "Paradigm adjective for case agreement practice"
    example: "Ми у великому місті."
  - lemma: "мене"
    translation: "me"
    pos: "pronoun"
    notes: "Accusative/Genitive form of я"
    example: "Він бачить мене."
  - lemma: "тебе"
    translation: "you (acc./gen.)"
    pos: "pronoun"
    notes: "Accusative/Genitive form of ти"
    example: "Я знаю тебе."
  - lemma: "його"
    translation: "him, his"
    pos: "pronoun"
    notes: "Becomes нього after prepositions"
    example: "У нього є карта."
  - lemma: "через"
    translation: "through, because of"
    pos: "preposition"
    usage: "Always takes the Accusative case"
    example: "Йду через парк."
  - lemma: "за"
    translation: "for, behind"
    pos: "preposition"
    usage: "Takes the Accusative case"
    example: "Дякую за каву."
  - lemma: "про"
    translation: "about"
    pos: "preposition"
    usage: "Always takes the Accusative case"
    example: "Книга про місто."
  - lemma: "красивий"
    translation: "beautiful"
    pos: "adjective"
    gender: "m"
    notes: "Agreement practice across cases"
    example: "Я бачу красиву вулицю."
  - lemma: "маленький"
    translation: "small"
    pos: "adjective"
    gender: "m"
    notes: "Agreement practice across cases"
    example: "Ми у маленькому кафе."
  - lemma: "парк"
    translation: "park"
    pos: "noun"
    gender: "m"
    example: "Я йду в парк."
  - lemma: "книга"
    translation: "book"
    pos: "noun"
    gender: "f"
    example: "Я бачу нову книгу."
  - lemma: "місто"
    translation: "city, town"
    pos: "noun"
    gender: "n"
    example: "Ми у великому місті."
  - lemma: "кава"
    translation: "coffee"
    pos: "noun"
    gender: "f"
    example: "Немає кави."
  - lemma: "вулиця"
    translation: "street"
    pos: "noun"
    gender: "f"
    example: "Я бачу красиву вулицю."
  - lemma: "стіл"
    translation: "table"
    pos: "noun"
    gender: "m"
    example: "Книга на столі."