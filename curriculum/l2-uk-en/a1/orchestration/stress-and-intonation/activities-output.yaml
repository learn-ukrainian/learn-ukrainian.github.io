- type: true-false
  title: "Stress and Intonation Facts"
  instruction: "Decide whether each statement about Ukrainian stress and intonation is true or false."
  items:
    - statement: "In Ukrainian, stress always falls on the first syllable of a word."
      correct: false
      explanation: "Ukrainian stress is free — it can fall on any syllable. There is no fixed rule."
    - statement: "The words за́мок (castle) and замо́к (lock) are spelled with the same letters but have different stress."
      correct: true
      explanation: "These are stress minimal pairs — same spelling, different stress, different meaning."
    - statement: "When you say a yes/no question in Ukrainian, your pitch rises at the end."
      correct: true
      explanation: "Yes/no questions (without a question word) use rising intonation at the end."
    - statement: "When you ask a question with де (where), your pitch rises at the end of the sentence."
      correct: false
      explanation: "With a question word like де, the pitch rises on the question word and then falls."
    - statement: "Ukrainian stress can move to a different syllable when a word changes form."
      correct: true
      explanation: "This is called mobile stress. For example, рука́ becomes ру́ки in the plural."
    - statement: "In a Ukrainian statement, your pitch rises at the end of the sentence."
      correct: false
      explanation: "In statements, pitch gently falls at the end — like a calm landing."
    - statement: "Unstressed Ukrainian vowels become unclear and mumbled, like in English."
      correct: false
      explanation: "Ukrainian vowels stay clear and pure whether stressed or not — there is no vowel reduction."
    - statement: "You can always predict Ukrainian stress from the spelling of a word."
      correct: false
      explanation: "You cannot predict stress from spelling. Words like кни́га and вода́ both end in -а but have different stress."

- type: fill-in
  title: "Choose the Correct Stress"
  instruction: "Select the word with the stress mark on the correct syllable."
  items:
    - sentence: "The word for 'water' with correct stress is ___."
      answer: "вода́"
      options: ["во́да", "вода́", "вод́а", "вода"]
      explanation: "Вода has stress on the last syllable: вода́."
    - sentence: "The word for 'castle' with correct stress is ___."
      answer: "за́мок"
      options: ["за́мок", "замо́к", "замоќ", "замок"]
      explanation: "Castle is за́мок with stress on the first syllable. Замо́к means lock."
    - sentence: "The word for 'lock' with correct stress is ___."
      answer: "замо́к"
      options: ["за́мок", "замо́к", "замоќ", "замок"]
      explanation: "Lock is замо́к with stress on the last syllable. За́мок means castle."
    - sentence: "The word for 'milk' with correct stress is ___."
      answer: "молоко́"
      options: ["мо́локо", "моло́ко", "молоко́", "молоко"]
      explanation: "Молоко has stress on the last syllable: молоко́."
    - sentence: "The word for 'school' with correct stress is ___."
      answer: "шко́ла"
      options: ["шко́ла", "школа́", "школ́а", "школа"]
      explanation: "Школа has stress on the first syllable: шко́ла."
    - sentence: "The word for 'flour' with correct stress is ___."
      answer: "мука́"
      options: ["му́ка", "мука́", "муќа", "мука"]
      explanation: "Flour is мука́ with stress on the last syllable. Му́ка means torment."
    - sentence: "The word for 'coffee' with correct stress is ___."
      answer: "ка́ва"
      options: ["ка́ва", "кава́", "кав́а", "кава"]
      explanation: "Кава has stress on the first syllable: ка́ва."
    - sentence: "The word for 'good' with correct stress is ___."
      answer: "до́брий"
      options: ["до́брий", "добри́й", "добрий́", "добрий"]
      explanation: "Добрий has stress on the first syllable: до́брий."
    - sentence: "The word for 'far' with correct stress is ___."
      answer: "далеко́"
      options: ["да́леко", "дале́ко", "далеко́", "далеко"]
      explanation: "Далеко has stress on the last syllable: далеко́."
    - sentence: "The word for 'road' with correct stress is ___."
      answer: "доро́га"
      options: ["до́рога", "доро́га", "дорога́", "дорога"]
      explanation: "Дорога has stress on the second syllable: доро́га."

