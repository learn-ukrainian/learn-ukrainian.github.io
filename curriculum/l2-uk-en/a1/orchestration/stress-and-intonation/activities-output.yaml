      right: "hand"
    - left: "руки (stress on РУ-)"
      right: "hands"

- type: true-false
  title: "Intonation and Stress Facts"
  instruction: "Decide whether each statement about Ukrainian stress and intonation is true or false."
  items:
    - statement: "In Ukrainian, stress always falls on the second-to-last syllable, just like in Polish."
      correct: false
      explanation: "Ukrainian stress is free — it can fall on any syllable. Polish has fixed penultimate stress, but Ukrainian does not."
    - statement: "Two Ukrainian words spelled the same way can have different meanings depending on which syllable is stressed."
      correct: true
      explanation: "This is exactly how stress minimal pairs work — for example, замок means castle or lock depending on the stress."
    - statement: "When asking a yes/no question in Ukrainian, your pitch should rise at the very end of the sentence, just like in English."
      correct: false
      explanation: "In Ukrainian yes/no questions, the pitch rises sharply on the stressed syllable of the key word, then falls. It is not a simple terminal rise."
    - statement: "In a Ukrainian statement, the pitch falls at the end of the sentence."
      correct: true
      explanation: "Declarative intonation in Ukrainian uses a falling pitch at the end, signaling that the speaker has finished."
    - statement: "Ukrainian stress can move to a different syllable when a word changes its grammatical form."
      correct: true
      explanation: "This is called mobile stress. For example, рука (stress on -КА) becomes руки (stress on РУ-) in the plural."
    - statement: "The acute accent mark in Ukrainian dictionaries shows which vowel is stressed."
      correct: true
      explanation: "The accent mark (like in вода) is placed over the stressed vowel to help learners identify the correct pronunciation."
    - statement: "When using a question word like Де, the pitch stays flat throughout the entire sentence."
      correct: false
      explanation: "With a question word, the pitch rises on the question word itself and then falls for the rest of the sentence."
    - statement: "The words книжка and вода both end with the letter а, so they must have the same stress pattern."
      correct: false
      explanation: "Having the same ending does not guarantee the same stress. Книжка is stressed on the first syllable, while вода is stressed on the last."

- type: fill-in
  title: "Complete the Stress Rule"
  instruction: "Choose the correct word or phrase to complete each statement about Ukrainian stress and intonation."
  items:
    - sentence: "Ukrainian stress is called ___ — it can fall on any syllable."
      answer: "free"
      options: ["free", "fixed", "final", "penultimate"]
      explanation: "Ukrainian stress is free, meaning there is no single rule for where it falls."
    - sentence: "The word замок means 'castle' when the stress is on the ___ syllable."
      answer: "first"
      options: ["first", "second", "third", "last"]
      explanation: "ЗА-мок (first syllable) = castle; за-МОК (second syllable) = lock."
    - sentence: "The word замок means 'lock' when the stress is on the ___ syllable."
      answer: "second"
      options: ["first", "second", "third", "last"]
      explanation: "За-МОК (second syllable) = lock; ЗА-мок (first syllable) = castle."
    - sentence: "When stress moves between forms of the same word (like рука → руки), this is called ___ stress."
      answer: "mobile"
      options: ["mobile", "fixed", "final", "invisible"]
      explanation: "Mobile stress means the stress shifts to a different syllable when the word changes grammatical form."
    - sentence: "In a Ukrainian statement like 'Це кафе', the pitch ___ at the end."
      answer: "falls"
      options: ["falls", "rises", "stays flat", "disappears"]
      explanation: "Declarative intonation uses a falling pitch at the end of the sentence."
    - sentence: "In a Ukrainian yes/no question, the pitch rises sharply on the ___ of the key word."
      answer: "stressed syllable"
      options: ["stressed syllable", "first syllable", "last syllable", "last word"]
      explanation: "Ukrainian yes/no questions feature a sharp pitch rise on the stressed syllable of the key word, then a fall."
    - sentence: "The word мама has stress on the ___ syllable."
      answer: "first"
      options: ["first", "second", "third", "last"]
      explanation: "МА-ма — stress on the first syllable, common in basic family words."
    - sentence: "The word молоко has stress on the ___ syllable."
      answer: "third"
      options: ["first", "second", "third", "none"]
      explanation: "Мо-ло-КО — stress on the third (last) syllable."
    - sentence: "In Ukrainian dictionaries, stress is marked with a(n) ___ over the stressed vowel."
      answer: "acute accent"
      options: ["acute accent", "circle", "underline", "bold dot"]
      explanation: "The acute accent mark (like the mark in вода) is placed directly over the stressed vowel."
    - sentence: "Words like мама, тато, хата, and кава all share stress on the ___ syllable."
      answer: "first"
      options: ["first", "second", "last", "middle"]
      explanation: "These common family and household words all have first-syllable stress."

