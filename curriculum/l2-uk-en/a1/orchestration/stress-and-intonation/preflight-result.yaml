issues:
- type: CONTRADICTION
  location: 'Section 5: Rule 4 vs. Language Quality Rules'
  problem: Rule 4 explicitly forbids adding stress marks ('Do NOT add stress marks
    (´)... Write plain Ukrainian'), while the 'Language Quality Rules' and 'Hard Constraints'
    (Section 6) require them ('Use lowercase letters with a combining acute accent
    (´)... stress marks (´) only'). This is a direct contradiction that makes it impossible
    to satisfy both requirements.
  suggested_fix: Clarify if the writer should use plain Ukrainian or manually add
    stress marks. If a pipeline adds them later, remove the requirement for manual
    stress marks in the 'Language Quality Rules' and 'Hard Constraints' sections.
  severity: HIGH
- type: CONTRADICTION
  location: 'Section 5: Rule 1 vs. Section 6: Hard Constraints'
  problem: 'Rule 1 states ''Any other structure (including conjugated verbs) is FORBIDDEN,''
    but Section 6 (Hard Constraints) says ''ALLOWED: Simple present tense (я читаю,
    я бачу).'' For a Phase A1.1 [First Contact] module, this creates uncertainty about
    whether verbs like ''писати'' (included in vocabulary) can be conjugated in example
    sentences.'
  suggested_fix: Reconcile the grammar allowlist. If conjugated verbs are allowed
    for A1.1, update Rule 1. If not, remove 'Simple present tense' from the Allowed
    list in Section 6.
  severity: HIGH
- type: PLAN_CONTRADICTION
  location: Vocabulary Hints vs. Grammar Allowlist
  problem: The plan includes the verb 'писати' and mentions its conjugation (пишу,
    пишеш), but the grammar constraints for A1.1 (First Contact) are strictly nominal
    (Це + noun, Noun + тут). Using 'писати' in a sentence would require conjugation,
    violating the primary grammar constraint for this level.
  suggested_fix: Replace 'писати' with a high-frequency noun compatible with A1.1
    structures (e.g., 'книга' or 'клас') or explicitly allow the infinitive 'писати'
    for identifying stress only, forbidding its use in sentences.
  severity: MEDIUM
