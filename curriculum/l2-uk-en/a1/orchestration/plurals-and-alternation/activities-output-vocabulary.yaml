items:
  - lemma: "студент"
    translation: "student"
    pos: "noun"
    gender: "m"
    notes: "Plural: студенти (regular -и ending)"
    usage: "нові студенти, молоді студенти"
  - lemma: "книга"
    translation: "book"
    pos: "noun"
    gender: "f"
    notes: "Plural: книги (-а replaced by -и)"
    usage: "цікаві книги, старі книги"
  - lemma: "місто"
    translation: "city"
    pos: "noun"
    gender: "n"
    notes: "Plural: міста (-о replaced by -а)"
    usage: "великі міста, нові міста"
  - lemma: "кіт"
    translation: "cat"
    pos: "noun"
    gender: "m"
    notes: "Plural: коти (vowel alternation і → о)"
    usage: "гарні коти"
  - lemma: "дитина"
    translation: "child"
    pos: "noun"
    gender: "f"
    notes: "Irregular plural: діти"
    usage: "маленькі діти, наші діти"
  - lemma: "людина"
    translation: "person"
    pos: "noun"
    gender: "f"
    notes: "Irregular plural: люди"
    usage: "добрі люди, молоді люди"
  - lemma: "гроші"
    translation: "money"
    pos: "noun"
    notes: "Plural-only noun (pluralia tantum)"
    usage: "нові гроші, де гроші?"
  - lemma: "двері"
    translation: "door"
    pos: "noun"
    notes: "Plural-only noun, even for a single door"
    usage: "нові двері"
  - lemma: "око"
    translation: "eye"
    pos: "noun"
    gender: "n"
    notes: "Irregular plural: очі"
    usage: "сині очі, великі очі"
  - lemma: "ножиці"
    translation: "scissors"
    pos: "noun"
    notes: "Plural-only noun (pluralia tantum)"
  - lemma: "цукор"
    translation: "sugar"
    pos: "noun"
    gender: "m"
    notes: "Uncountable noun, no plural form"
    usage: "де цукор?"
  - lemma: "молоко"
    translation: "milk"
    pos: "noun"
    gender: "n"
    notes: "Uncountable noun, no plural form"
    usage: "смачне молоко"
  - lemma: "брат"
    translation: "brother"
    pos: "noun"
    gender: "m"
    notes: "Plural: брати (regular -и ending)"
  - lemma: "сестра"
    translation: "sister"
    pos: "noun"
    gender: "f"
    notes: "Plural: сестри (-а replaced by -и, stress shifts)"
  - lemma: "стіл"
    translation: "table"
    pos: "noun"
    gender: "m"
    notes: "Plural: столи (vowel alternation і → о)"
  - lemma: "ніж"
    translation: "knife"
    pos: "noun"
    gender: "m"
    notes: "Plural: ножі (vowel alternation і → о)"
  - lemma: "дім"
    translation: "house"
    pos: "noun"
    gender: "m"
    notes: "Plural: доми (vowel alternation і → о)"
  - lemma: "вікно"
    translation: "window"
    pos: "noun"
    gender: "n"
    notes: "Plural: вікна (-о replaced by -а)"
  - lemma: "море"
    translation: "sea"
    pos: "noun"
    gender: "n"
    notes: "Plural: моря (-е replaced by -я)"
  - lemma: "новий"
    translation: "new"
    pos: "adj"
    notes: "Plural for all genders: нові (single -і ending)"
    usage: "нові книги, нові міста, нові студенти"