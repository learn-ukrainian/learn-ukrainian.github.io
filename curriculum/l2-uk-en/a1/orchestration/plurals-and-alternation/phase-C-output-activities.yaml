- type: fill-in
  title: "Complete with the Plural Form"
  instruction: "Choose the correct plural form to complete the sentence."
  items:
    - sentence: "Це великі ___."
      answer: "міста"
      options: ["місто", "місти", "міста", "місту"]
    - sentence: "Там є гарні ___."
      answer: "пісні"
      options: ["пісня", "пісні", "пісню", "пісьні"]
    - sentence: "Де мої ___?"
      answer: "зошити"
      options: ["зошит", "зошиті", "зошити", "зошита"]
    - sentence: "Це мої ___."
      answer: "брати"
      options: ["брат", "брати", "браті", "брата"]
    - sentence: "Там є ___."
      answer: "столи"
      options: ["стіл", "стіли", "столи", "столі"]
    - sentence: "Це чорні ___."
      answer: "коти"
      options: ["кіт", "кіти", "коти", "коті"]
    - sentence: "Тут є нові ___."
      answer: "словники"
      options: ["словник", "словники", "словникі", "словнику"]
    - sentence: "Це гарні ___."
      answer: "яблука"
      options: ["яблуко", "яблуки", "яблука", "яблукі"]

- type: true-false
  title: "Plural Rules: True or False"
  instruction: "Determine if the statement about plural forms is true or false."
  items:
    - statement: "Feminine nouns ending in -а usually change to -и in the plural."
      correct: true
      explanation: "For example, машина becomes машини."
    - statement: "Neuter nouns ending in -о change to -і in the plural."
      correct: false
      explanation: "Neuter nouns ending in -о change to -а in the plural, like місто becomes міста."
    - statement: "The plural of друг is други."
      correct: false
      explanation: "The noun друг has an irregular plural with a consonant change: it becomes друзі."
    - statement: "The vowel 'і' often changes to 'о' or 'е' when forming the plural, like in кіт which becomes коти."
      correct: true
      explanation: "This is a common vowel alternation in Ukrainian, known as the 'і-о/е' rule."
    - statement: "Masculine nouns ending in a hard consonant usually add -и to form the plural."
      correct: true
      explanation: "For example, студент becomes студенти."
    - statement: "The plural of музей is музеї."
      correct: true
      explanation: "Nouns ending in -й replace it with -ї in the plural."
    - statement: "The plural of слово is слови."
      correct: false
      explanation: "Слово is a neuter noun, so it changes -о to -а: слова."
    - statement: "The noun вікно becomes вікна in the plural."
      correct: true
      explanation: "Вікно is a neuter noun ending in -о, which changes to -а in the plural."

- type: quiz
  title: "Choose the Correct Plural"
  instruction: "Select the correct plural form for each noun."
  items:
    - question: "What is the plural of книга (book)?"
      explanation: "Книга is feminine, ending in a vowel preceded by a hard consonant, so it takes -и."
      options:
        - text: "книги"
          correct: true
        - text: "книгі"
          correct: false
        - text: "книга"
          correct: false
        - text: "книг"
          correct: false
    - question: "What is the plural of сестра (sister)?"
      explanation: "Сестра ends in -а, which changes to -и."
      options:
        - text: "сестри"
          correct: true
        - text: "сестрі"
          correct: false
        - text: "сестра"
          correct: false
        - text: "сестру"
          correct: false
    - question: "What is the plural of хлопець (boy)?"
      explanation: "Хлопець loses the vowel 'е' and takes the soft plural ending -і."
      options:
        - text: "хлопці"
          correct: true
        - text: "хлопеці"
          correct: false
        - text: "хлопцю"
          correct: false
        - text: "хлопци"
          correct: false
    - question: "What is the plural of ніч (night)?"
      explanation: "Ніч undergoes a vowel change (і to о) and takes the soft plural ending -і."
      options:
        - text: "ночі"
          correct: true
        - text: "нічі"
          correct: false
        - text: "ночи"
          correct: false
        - text: "нічи"
          correct: false
    - question: "What is the plural of море (sea)?"
      explanation: "Море is a neuter noun ending in -е, which changes to -я."
      options:
        - text: "моря"
          correct: true
        - text: "морі"
          correct: false
        - text: "мори"
          correct: false
        - text: "морю"
          correct: false
    - question: "What is the plural of ручка (pen)?"
      explanation: "Ручка is feminine ending in -а, so it takes -и."
      options:
        - text: "ручки"
          correct: true
        - text: "ручкі"
          correct: false
        - text: "ручка"
          correct: false
        - text: "ручко"
          correct: false
    - question: "Which of the following has an irregular plural with a consonant change?"
      explanation: "Друг changes г to з to become друзі."
      options:
        - text: "друг"
          correct: true
        - text: "брат"
          correct: false
        - text: "студент"
          correct: false
        - text: "кіт"
          correct: false
    - question: "What is the plural of стіл (table)?"
      explanation: "Стіл undergoes a vowel change (і to о) and adds -и."
      options:
        - text: "столи"
          correct: true
        - text: "стіли"
          correct: false
        - text: "столі"
          correct: false
        - text: "стілі"
          correct: false

