- type: quiz
  title: "Choose the Correct Plural"
  instruction: "Select the correct plural form for each noun."
  items:
    - question: "What is the plural of кіт (cat)?"
      options:
        - text: "коти"
          correct: true
        - text: "кота"
          correct: false
        - text: "котів"
          correct: false
        - text: "коту"
          correct: false
      explanation: "The і in кіт alternates to о when the plural ending -и is added: коти."
    - question: "What is the plural of місто (city)?"
      options:
        - text: "міста"
          correct: true
        - text: "місті"
          correct: false
        - text: "містом"
          correct: false
        - text: "містах"
          correct: false
      explanation: "Neuter nouns ending in -о replace it with -а in the plural: міста."
    - question: "What is the plural of дитина (child)?"
      options:
        - text: "діти"
          correct: true
        - text: "дитини"
          correct: false
        - text: "дитин"
          correct: false
        - text: "дітей"
          correct: false
      explanation: "Діти is an irregular plural. The stem changes completely from дитина."
    - question: "What is the plural of стіл (table)?"
      options:
        - text: "столи"
          correct: true
        - text: "стола"
          correct: false
        - text: "столів"
          correct: false
        - text: "столу"
          correct: false
      explanation: "The і in стіл alternates to о in the plural: столи."
    - question: "What is the plural of книга (book)?"
      options:
        - text: "книги"
          correct: true
        - text: "книга"
          correct: false
        - text: "книгах"
          correct: false
        - text: "книжки"
          correct: false
      explanation: "Feminine nouns ending in -а replace it with -и: книги."
    - question: "What is the plural form of the adjective новий (new)?"
      options:
        - text: "нові"
          correct: true
        - text: "нова"
          correct: false
        - text: "нове"
          correct: false
        - text: "новій"
          correct: false
      explanation: "All adjectives use the single plural ending -і regardless of gender: нові."
    - question: "What is the plural of ніж (knife)?"
      options:
        - text: "ножі"
          correct: true
        - text: "ножа"
          correct: false
        - text: "ножів"
          correct: false
        - text: "ніжа"
          correct: false
      explanation: "The і in ніж alternates to о, and the ending -і is added: ножі."
    - question: "What is the plural of людина (person)?"
      options:
        - text: "люди"
          correct: true
        - text: "людини"
          correct: false
        - text: "людей"
          correct: false
        - text: "людина"
          correct: false
      explanation: "Люди is an irregular plural. The stem changes completely from людина."
    - question: "What is the plural of око (eye)?"
      options:
        - text: "очі"
          correct: true
        - text: "ока"
          correct: false
        - text: "окна"
          correct: false
        - text: "очей"
          correct: false
      explanation: "Очі is an irregular plural from око. The stem changes unexpectedly."
    - question: "What is the plural of сестра (sister)?"
      options:
        - text: "сестри"
          correct: true
        - text: "сестру"
          correct: false
        - text: "сестер"
          correct: false
        - text: "сестрі"
          correct: false
      explanation: "Feminine nouns ending in -а replace it with -и: сестри. Note the stress shifts too."

