- type: fill-in
  title: "Form the Plural"
  instruction: "Choose the correct plural form to complete each sentence."
  items:
    - sentence: "Це нові ___."
      answer: "книги"
      options: ["книга", "книги", "книгах", "книжки"]
      explanation: "Feminine nouns ending in -а replace it with -и in the plural."
    - sentence: "Тут молоді ___."
      answer: "студенти"
      options: ["студент", "студенти", "студента", "студентів"]
      explanation: "Masculine nouns ending in a consonant add -и to form the plural."
    - sentence: "Це великі ___."
      answer: "міста"
      options: ["місто", "міста", "містом", "місті"]
      explanation: "Neuter nouns ending in -о replace it with -а in the plural."
    - sentence: "Де гарні ___?"
      answer: "коти"
      options: ["кіт", "коти", "кота", "котів"]
      explanation: "The vowel і in кіт alternates to о in the plural: коти."
    - sentence: "Це старі ___."
      answer: "столи"
      options: ["стіл", "столи", "стола", "столів"]
      explanation: "The vowel і in стіл alternates to о in the plural: столи."
    - sentence: "Де нові ___?"
      answer: "ножі"
      options: ["ніж", "ножі", "ножа", "ножів"]
      explanation: "The vowel і in ніж alternates to о in the plural: ножі."
    - sentence: "Тут малі ___."
      answer: "діти"
      options: ["дитина", "діти", "дитини", "дітей"]
      explanation: "Діти is an irregular plural from дитина."
    - sentence: "Це добрі ___."
      answer: "люди"
      options: ["людина", "люди", "людини", "людей"]
      explanation: "Люди is an irregular plural from людина."
    - sentence: "Тут великі ___."
      answer: "вікна"
      options: ["вікно", "вікна", "вікні", "вікон"]
      explanation: "Neuter nouns ending in -о replace it with -а in the plural."
    - sentence: "Це нові ___."
      answer: "вулиці"
      options: ["вулиця", "вулиці", "вулицю", "вулиць"]
      explanation: "Feminine nouns ending in -я replace it with -і in the plural."
    - sentence: "Де старі ___?"
      answer: "доми"
      options: ["дім", "доми", "дома", "домів"]
      explanation: "The vowel і in дім alternates to о in the plural: доми."
    - sentence: "Це сині ___."
      answer: "моря"
      options: ["море", "моря", "морі", "морям"]
      explanation: "Neuter nouns ending in -е replace it with -я in the plural."

