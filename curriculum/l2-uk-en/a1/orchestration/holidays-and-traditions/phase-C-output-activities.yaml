- type: true-false
  title: "True or False: Ukrainian Traditions"
  instruction: "Determine if these statements about Ukrainian holidays are true or false."
  items:
    - statement: "On Christmas Eve, there are 12 meatless dishes on the table."
      correct: true
      explanation: "Yes, this is a very important tradition for Svyatvechir."
    - statement: "Kutia is a salty soup with meat."
      correct: false
      explanation: "No, Kutia is a sweet wheat dish with honey and poppy seeds."
    - statement: "The famous song Shchedryk was originally a spring song."
      correct: true
      explanation: "Yes, it was originally sung in the spring to celebrate the new year."
    - statement: "Ukrainians bake Easter bread called paska for Christmas."
      correct: false
      explanation: "Paska is baked for Easter (Velykden), not Christmas."
    - statement: "A traditional birthday custom is gently pulling the birthday persons ears."
      correct: true
      explanation: "Yes, they do it so the person will grow big and healthy."
    - statement: "The music for Shchedryk was written by Mykola Leontovych."
      correct: true
      explanation: "Yes, he composed the music for this famous Ukrainian ritual song."
    - statement: "It is correct to say Happy New Year using the Nominative case (З Новий рік) in Ukrainian."
      correct: false
      explanation: "No, you must change the ending to the Instrumental case (З Новим роком)."
    - statement: "After the verb to wish (бажати), Ukrainians use the Genitive case."
      correct: true
      explanation: "Yes, because you are wishing a quantity of something abstract like health or success."

- type: fill-in
  title: "Complete the Greeting"
  instruction: "Choose the correct ending to complete the holiday greeting with the Instrumental case."
  items:
    - sentence: "Ми вітаємо вас з Новим ___!"
      answer: "роком"
      options: ["рік", "роком", "року", "років"]
    - sentence: "Я вітаю тебе з ___!"
      answer: "Різдвом"
      options: ["Різдво", "Різдва", "Різдвом", "Різдві"]
    - sentence: "Ми вітаємо родину зі ___!"
      answer: "святом"
      options: ["свято", "свята", "святом", "святі"]
    - sentence: "Вчитель вітає студентів зі ___."
      answer: "святом"
      options: ["свято", "святі", "свята", "святом"]
    - sentence: "Вони вітають нас з Новим ___."
      answer: "роком"
      options: ["рік", "роком", "році", "року"]
    - sentence: "Ми вітаємо друзів з ___."
      answer: "Різдвом"
      options: ["Різдвом", "Різдво", "Різдва", "Різдві"]
    - sentence: "Мій друг вітає мене з Новим ___."
      answer: "роком"
      options: ["рік", "роком", "році", "року"]
    - sentence: "Сестра вітає брата зі ___."
      answer: "святом"
      options: ["свято", "святі", "свята", "святом"]

- type: quiz
  title: "Choose the Right Word"
  instruction: "Select the correct word or grammar rule for each situation."
  items:
    - question: "Which verb describes the action of congratulating someone on a holiday?"
      explanation: "We use вітати to congratulate."
      options:
        - text: "вітати"
          correct: true
        - text: "бажати"
          correct: false
        - text: "святкувати"
          correct: false
        - text: "отримувати"
          correct: false
    - question: "Which verb do we use to express a specific wish, like health or happiness?"
      explanation: "We use бажати to wish abstract concepts."
      options:
        - text: "бажати"
          correct: true
        - text: "вітати"
          correct: false
        - text: "дарувати"
          correct: false
        - text: "отримувати"
          correct: false
    - question: "What grammatical case must follow the verb бажати (to wish)?"
      explanation: "You use the Genitive case because you are wishing a quantity of something abstract."
      options:
        - text: "Genitive case"
          correct: true
        - text: "Nominative case"
          correct: false
        - text: "Instrumental case"
          correct: false
        - text: "Accusative case"
          correct: false
    - question: "What preposition is used before the holiday name when saying Happy...?"
      explanation: "We use з or зі with the Instrumental case."
      options:
        - text: "з / зі"
          correct: true
        - text: "в / у"
          correct: false
        - text: "на"
          correct: false
        - text: "до"
          correct: false
    - question: "How do you politely reply mutually or same to you in Ukrainian?"
      explanation: "Взаємно is a very useful word to return a wish quickly."
      options:
        - text: "взаємно"
          correct: true
        - text: "смачно"
          correct: false
        - text: "щиро"
          correct: false
        - text: "дуже"
          correct: false
    - question: "If you want to say I wish success, what is the correct Ukrainian sentence?"
      explanation: "Успіх becomes успіху in the Genitive case."
      options:
        - text: "Бажаю успіху."
          correct: true
        - text: "Бажаю успіх."
          correct: false
        - text: "Вітаю успіху."
          correct: false
        - text: "Вітаю успіх."
          correct: false
    - question: "What sweet treat is typically eaten on a modern birthday?"
      explanation: "People eat a cake (торт) with candles."
      options:
        - text: "торт"
          correct: true
        - text: "Кутя"
          correct: false
        - text: "подарунок"
          correct: false
        - text: "паска"
          correct: false
    - question: "Which spring holiday features painted eggs?"
      explanation: "Easter (Великдень) is known for beautifully painted eggs called pysanky."
      options:
        - text: "Великдень"
          correct: true
        - text: "Різдво"
          correct: false
        - text: "Новий рік"
          correct: false
        - text: "Святвечір"
          correct: false

