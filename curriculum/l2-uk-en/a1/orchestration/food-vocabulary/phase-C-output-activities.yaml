- type: quiz
  title: 'Ordering and Preferences'
  instruction: 'Choose the correct form to complete the sentence.'
  items:
    - question: 'How do you say: I want coffee?'
      explanation: 'Кава is a feminine noun. In the accusative case (after want/love), the ending -а changes to -у.'
      options:
        - text: 'Я хочу каву.'
          correct: true
        - text: 'Я хочу кава.'
          correct: false
        - text: 'Я хочу каві.'
          correct: false
        - text: 'Я хочу кавою.'
          correct: false
    - question: 'How do you say: I want water?'
      explanation: 'Вода is a feminine noun. In the accusative case, the ending -а changes to -у.'
      options:
        - text: 'Я хочу воду.'
          correct: true
        - text: 'Я хочу вода.'
          correct: false
        - text: 'Я хочу воді.'
          correct: false
        - text: 'Я хочу водою.'
          correct: false
    - question: 'How do you say: I want tea?'
      explanation: 'Чай is a masculine noun. Masculine inanimate nouns do not change their ending in the accusative case.'
      options:
        - text: 'Я хочу чай.'
          correct: true
        - text: 'Я хочу чаю.'
          correct: false
        - text: 'Я хочу чая.'
          correct: false
        - text: 'Я хочу чаєм.'
          correct: false
    - question: 'How do you say: I love borscht?'
      explanation: 'Борщ is a masculine inanimate noun and does not change.'
      options:
        - text: 'Я люблю борщ.'
          correct: true
        - text: 'Я люблю борщу.'
          correct: false
        - text: 'Я люблю борща.'
          correct: false
        - text: 'Я люблю борщем.'
          correct: false
    - question: 'How do you say: I do not eat meat?'
      explanation: 'The negative particle не goes before the verb.'
      options:
        - text: 'Я не їм м''ясо.'
          correct: true
        - text: 'Я їм не м''ясо.'
          correct: false
        - text: 'Я не м''ясо їм.'
          correct: false
        - text: 'Не я їм м''ясо.'
          correct: false
    - question: 'How do you say: I do not drink milk?'
      explanation: 'The negative particle не goes before the verb.'
      options:
        - text: 'Я не п''ю молоко.'
          correct: true
        - text: 'Я п''ю не молоко.'
          correct: false
        - text: 'Я не молоко п''ю.'
          correct: false
        - text: 'Не я п''ю молоко.'
          correct: false
    - question: 'How do you say: I have an allergy to nuts?'
      explanation: 'Use the phrase: У мене алергія на...'
      options:
        - text: 'У мене алергія на горіхи.'
          correct: true
        - text: 'Я алергія на горіхи.'
          correct: false
        - text: 'Я не їм горіхи.'
          correct: false
        - text: 'Мій горіхи алергія.'
          correct: false
    - question: 'What does Я люблю рибу mean?'
      explanation: 'Рибу is the accusative form of риба (fish).'
      options:
        - text: 'I love fish.'
          correct: true
        - text: 'I eat fish.'
          correct: false
        - text: 'I do not like fish.'
          correct: false
        - text: 'I want fish.'
          correct: false
    - question: 'How do you say: I want juice?'
      explanation: 'Сік is masculine and does not change.'
      options:
        - text: 'Я хочу сік.'
          correct: true
        - text: 'Я хочу соку.'
          correct: false
        - text: 'Я хочу сока.'
          correct: false
        - text: 'Я хочу сіка.'
          correct: false
    - question: 'How do you say: I eat fresh bread?'
      explanation: 'Хліб is masculine and does not change.'
      options:
        - text: 'Я їм свіжий хліб.'
          correct: true
        - text: 'Я їм свіжу хліб.'
          correct: false
        - text: 'Я їм свіже хліб.'
          correct: false
        - text: 'Я їм свіжі хліб.'
          correct: false

