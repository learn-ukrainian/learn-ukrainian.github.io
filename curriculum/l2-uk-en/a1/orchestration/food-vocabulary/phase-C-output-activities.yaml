          correct: true
        - text: "Я хочу борщ"
          correct: false
        - text: "Я їм борщ"
          correct: false
        - text: "Це смачний борщ"
          correct: false
    - question: "Which word changes its ending when you order it (because it is feminine)?"
      options:
