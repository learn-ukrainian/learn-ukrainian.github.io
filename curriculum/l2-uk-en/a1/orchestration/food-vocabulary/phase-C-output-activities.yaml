- type: fill-in
  title: "Complete the Order"
  instruction: "Fill in the blank with the correct word to make a delicious sentence."
  items:
    - sentence: "Я люблю гарячий ___."
      answer: "борщ"
      options:
        - "борщ"
        - "борща"
        - "борщу"
        - "борщем"
    - sentence: "Я п'ю гарячу ___."
      answer: "каву"
      options:
        - "каву"
        - "кава"
        - "каві"
        - "кавою"
    - sentence: "Вона їсть свіжий ___."
      answer: "хліб"
      options:
        - "хліба"
        - "хліб"
        - "хлібу"
        - "хлібом"
    - sentence: "Дитина п'є свіже ___."
      answer: "молоко"
      options:
        - "молоку"
        - "молоком"
        - "молоко"
        - "молока"
    - sentence: "Я хочу холодну ___."
      answer: "воду"
