        - text: "сік"
          correct: false
        - text: "кава"
          correct: false
        - text: "компот"
          correct: true
        - text: "суп"
          correct: false
    - question: "How do you say 'I want coffee'?"
      explanation: "For feminine words like кава, the ending changes to -у in the Accusative case."
      options:
        - text: "Я хочу кава"
          correct: false
        - text: "Я хочу каву"
          correct: true
        - text: "Я хочу каві"
          correct: false
        - text: "Я хочу кавою"
          correct: false
    - question: "Which bread is a symbol of Ukrainian identity and hospitality?"
      options:
