        - "м'ясу"
        - "м'ясом"

- type: true-false
  title: "Kitchen Facts: True or False?"
  instruction: "Decide if the statement is true or false based on Ukrainian food culture."
  items:
    - statement: "Borscht is a traditional Ukrainian soup."
      correct: true
      explanation: "Borscht is a very popular and traditional soup in Ukraine."
    - statement: "Ukrainians often throw old bread in the trash."
      correct: false
      explanation: "Bread is considered sacred, and throwing it in the trash is disrespectful."
    - statement: "The word for water (вода) is masculine."
      correct: false
      explanation: "Words ending in -а like вода are typically feminine."
    - statement: "You say 'Я п'ю суп' in Ukrainian."
      correct: false
      explanation: "In Ukrainian, you use the verb for eating (їсти) with soup, so it is 'Я їм суп'."
    - statement: "Palianytsia is a traditional round wheat bread."
      correct: true
      explanation: "Palianytsia is a deeply cultural bread and a famous linguistic shibboleth."
    - statement: "The phrase 'Я не їм м'ясо' means you are a vegetarian."
      correct: true
      explanation: "It literally translates to 'I do not eat meat'."
    - statement: "Coffee and tea are categorized as food (їжа)."
      correct: false
      explanation: "Coffee and tea are drinks (напої)."
    - statement: "When you order coffee, 'кава' changes to 'каву'."
      correct: true
      explanation: "Feminine nouns ending in -а change to -у in the Accusative case when ordering."

