- type: true-false
  title: 'True or False?'
  instruction: 'Read the statement and decide if it is true or false.'
  items:
    - statement: 'The word суп (soup) is a masculine noun in Ukrainian.'
      correct: true
      explanation: 'Суп ends in a hard consonant, which means it is masculine.'
    - statement: 'In Ukrainian culture, soup is considered a drink.'
      correct: false
      explanation: 'Soup is thick and hearty, so Ukrainians always say they eat (їсти) soup, not drink it.'
    - statement: 'The phrase Я не їм means I do not eat.'
      correct: true
      explanation: 'The negative particle не is placed directly before the verb.'
    - statement: 'When ordering water, you should say Я хочу вода.'
      correct: false
      explanation: 'Вода is feminine, so you must use the accusative case and say Я хочу воду.'
    - statement: 'Сало is a type of sweet fruit compote.'
      correct: false
      explanation: 'Сало is traditional cured fat. Компот is a fruit drink.'
    - statement: 'When offering bread to a guest, it is traditionally accompanied by salt.'
      correct: true
      explanation: 'Bread and salt (хліб-сіль) is a traditional symbol of hospitality and friendship.'
    - statement: 'The word паляниця is very easy for foreigners to pronounce.'
      correct: false
      explanation: 'Паляниця is famously difficult to pronounce for non-native speakers because of its soft sounds and specific vowels.'
    - statement: 'Я люблю is used to express that you like or love a certain food.'
      correct: true
      explanation: 'This verb is naturally used to describe your favorite meals.'

