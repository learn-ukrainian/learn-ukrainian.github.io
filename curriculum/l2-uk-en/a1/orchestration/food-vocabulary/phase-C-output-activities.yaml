        - "кашу"
        - "каші"
        - "кашею"
        - "каша"
    - sentence: "У ресторані я хочу міцну ___."
      answer: "каву"
      options:
        - "кава"
        - "каві"
        - "кавою"
        - "каву"
    - sentence: "Я не їм ___."
      answer: "м'ясо"
      options:
