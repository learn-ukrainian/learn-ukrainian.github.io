    **Bonus: любити** (to love)

    You may already know this verb from earlier modules. It is actually a Group II
    verb! Notice the familiar consonant shift in the я-form: **б → бл**, just like
    робити → роблю.

    - Я люблю каву. *(I love coffee.)*

    - Ти любиш музику. *(You love music.)*

    - Вони люблять Україну. *(They love Ukraine.)*'
