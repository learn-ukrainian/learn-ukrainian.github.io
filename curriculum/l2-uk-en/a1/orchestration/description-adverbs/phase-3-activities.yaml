  groups:
    - name: "Прикметник (Adjective)"
      items:
        - "гарний"
        - "швидкий"
        - "добрий"
        - "тихий"
        - "голосний"
        - "повільний"
        - "смачна"
        - "цікава"
    - name: "Прислівник (Adverb)"
      items:
