- type: fill-in
  title: "Оберіть правильне слово"
  instruction: "Choose the correct frequency adverb based on the English translation."
  items:
    - sentence: "Я _______ (often) ходжу в парк."
      answer: "часто"
      options:
        - "часто"
        - "завжди"
        - "рідко"
        - "ніколи"
      explanation: "Often = часто."
    - sentence: "Ми _______ (always) п'ємо каву вранці."
      answer: "завжди"
      options:
        - "завжди"
        - "іноді"
        - "рідко"
        - "часто"
      explanation: "Always = завжди."
    - sentence: "Він _______ (never) не їсть м'ясо."
      answer: "ніколи"
      options:
        - "ніколи"
        - "завжди"
        - "часто"
        - "зазвичай"
