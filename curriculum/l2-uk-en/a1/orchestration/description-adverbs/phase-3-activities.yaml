- type: quiz
  title: "Перевірка правил"
  instruction: "Choose the correct answer about Ukrainian adverbs."
  items:
    - question: "На яке питання відповідає прислівник способу дії?"
      explanation: "Adverbs of manner answer the question 'Як?' (How?)."
      options:
        - text: "Як?"
          correct: true
        - text: "Який?"
          correct: false
        - text: "Хто?"
          correct: false
        - text: "Що?"
          correct: false
    - question: "Яке закінчення зазвичай мають прислівники, утворені від прикметників?"
      explanation: "Most adverbs derived from adjectives end in -о (швидкий → швидко)."
      options:
        - text: "-о"
          correct: true
        - text: "-ий"
          correct: false
        - text: "-а"
          correct: false
        - text: "-е"
          correct: false
    - question: "Як утворити прислівник від слова «добрий»?"
      explanation: "This is an exception: добрий → добре."
      options:
        - text: "добре"
          correct: true
        - text: "добро"
          correct: false
        - text: "добрий"
          correct: false
        - text: "добр"
          correct: false
    - question: "Де зазвичай стоїть прислівник способу дії (наприклад, «швидко»)?"
      explanation: "Adverbs of manner usually stand after the verb."
      options:
        - text: "Після дієслова"
          correct: true
        - text: "Перед дієсловом"
          correct: false
        - text: "На початку речення"
          correct: false
        - text: "В кінці речення"
          correct: false
    - question: "Де зазвичай стоїть прислівник часу (наприклад, «часто»)?"
      explanation: "Adverbs of frequency usually stand before the verb."
      options:
        - text: "Перед дієсловом"
          correct: true
        - text: "Після дієслова"
          correct: false
        - text: "Після іменника"
          correct: false
        - text: "Завжди в кінці"
          correct: false
    - question: "Як перекласти «I never sleep» українською?"
      explanation: "Ukrainian requires double negation: ніколи не."
      options:
        - text: "Я ніколи не сплю"
          correct: true
        - text: "Я ніколи сплю"
          correct: false
        - text: "Я не сплю ніколи"
          correct: false
        - text: "Я сплю ніколи"
          correct: false
    - question: "Яке слово означає «very»?"
      explanation: "Дуже means very."
      options:
        - text: "дуже"
          correct: true
        - text: "трохи"
          correct: false
        - text: "надто"
          correct: false
        - text: "завжди"
          correct: false
    - question: "Що означає слово «добре» у діалозі?"
      explanation: "Добре is often used to mean 'OK' or 'Fine'."
      options:
        - text: "OK / Згода"
          correct: true
        - text: "Погано"
          correct: false
        - text: "Швидко"
          correct: false
        - text: "Ні"
          correct: false
    - question: "Який прислівник є антонімом до слова «голосно»?"
      explanation: "Тихо (quietly) is the opposite of голосно (loudly)."
      options:
        - text: "тихо"
          correct: true
        - text: "швидко"
          correct: false
        - text: "добре"
          correct: false
        - text: "гарно"
          correct: false
    - question: "Який прислівник є антонімом до слова «швидко»?"
      explanation: "Повільно (slowly) is the opposite of швидко (quickly)."
      options:
        - text: "повільно"
          correct: true
        - text: "тихо"
          correct: false
        - text: "добре"
          correct: false
        - text: "легко"
          correct: false
    - question: "Як сказати «a little» українською?"
      explanation: "Трохи means a little."
      options:
        - text: "трохи"
          correct: true
        - text: "дуже"
          correct: false
        - text: "надто"
          correct: false
        - text: "завжди"
          correct: false
    - question: "Що означає слово «завжди»?"
      explanation: "Завжди means always."
      options:
        - text: "always"
          correct: true
        - text: "never"
          correct: false
        - text: "often"
          correct: false
        - text: "sometimes"
          correct: false

- type: fill-in
  title: "Утворіть прислівник"
  instruction: "Complete the sentence by changing the adjective in brackets into an adverb."
  items:
    - sentence: "Він бігає (швидкий) _______."
      answer: "швидко"
      options:
        - "швидко"
        - "швидкий"
        - "швидка"
        - "швидке"
      explanation: "Adjective швидкий + -о = швидко."
    - sentence: "Вона говорить (тихий) _______."
      answer: "тихо"
      options:
        - "тихо"
        - "тихий"
        - "тиха"
        - "тихе"
      explanation: "Adjective тихий + -о = тихо."
    - sentence: "Ми живемо (добрий) _______."
      answer: "добре"
      options:
        - "добре"
        - "добрий"
        - "добро"
        - "добра"
      explanation: "Exception: добрий → добре."
    - sentence: "Студент відповідає (гарний) _______."
      answer: "гарно"
      options:
        - "гарно"
        - "гарний"
        - "гарна"
        - "гарне"
      explanation: "Adjective гарний + -о = гарно."
    - sentence: "Музика грає (голосний) _______."
      answer: "голосно"
      options:
        - "голосно"
        - "голосний"
        - "голосна"
        - "голосне"
      explanation: "Adjective голосний + -о = голосно."
    - sentence: "Черепаха повзе (повільний) _______."
      answer: "повільно"
      options:
        - "повільно"
        - "повільний"
        - "повільна"
        - "повільне"
      explanation: "Adjective повільний + -о = повільно."
    - sentence: "Піца пахне (смачний) _______."
      answer: "смачно"
      options:
        - "смачно"
        - "смачний"
        - "смачна"
        - "смачне"
      explanation: "Adjective смачний + -о = смачно."
    - sentence: "Я роблю це (легкий) _______."
      answer: "легко"
      options:
        - "легко"
        - "легкий"
        - "легка"
        - "легке"
      explanation: "Adjective легкий + -о = легко."
    - sentence: "Це завдання (цікавий) _______."
      answer: "цікаво"
      options:
        - "цікаво"
        - "цікавий"
        - "цікава"
        - "цікаве"
      explanation: "Used as a predicate: Це цікаво (It is interesting)."
    - sentence: "Він співає (поганий) _______."
      answer: "погано"
      options:
        - "погано"
        - "поганий"
        - "погана"
        - "погане"
      explanation: "Adjective поганий + -о = погано."
    - sentence: "Ми слухаємо (уважний) _______."
      answer: "уважно"
      options:
        - "уважно"
        - "уважний"
        - "уважна"
        - "уважне"
      explanation: "Adjective уважний + -о = уважно."
    - sentence: "Вона працює (важкий) _______."
      answer: "важко"
      options:
        - "важко"
        - "важкий"
        - "важка"
        - "важке"
      explanation: "Adjective важкий + -о = важко."

