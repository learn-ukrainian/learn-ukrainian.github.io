        - "трохи"
      explanation: "Often = часто."
    - sentence: "Він _______ (always) слухає музику."
      answer: "завжди"
      options:
        - "завжди"
        - "рідко"
        - "іноді"
        - "ніколи"
      explanation: "Always = завжди."
    - sentence: "Вона _______ (never) не спізнюється."
      answer: "ніколи"
      options:
        - "ніколи"
        - "часто"
        - "завжди"
        - "іноді"
      explanation: "Never = ніколи."
    - sentence: "Я _______ (rarely) їм піцу."
