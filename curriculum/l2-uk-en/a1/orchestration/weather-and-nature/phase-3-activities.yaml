- type: match-up
  title: 'Знайдіть пару: Погода'
  instruction: 'Match the Ukrainian weather description to the English translation.'
  pairs:
    - left: 'Холодно'
      right: 'Cold'
    - left: 'Тепло'
      right: 'Warm'
    - left: 'Спекотно'
      right: 'Hot'
    - left: 'Прохолодно'
      right: 'Cool'
    - left: 'Хмарно'
      right: 'Cloudy'
    - left: 'Сонячно'
      right: 'Sunny'
    - left: 'Вітряно'
      right: 'Windy'
    - left: 'Температура'
      right: 'Temperature'

- type: match-up
  title: 'Знайдіть пару: Пори року'
  instruction: 'Match the season or time expression to its meaning.'
  pairs:
    - left: 'Зима'
      right: 'Winter'
    - left: 'Весна'
      right: 'Spring'
    - left: 'Літо'
      right: 'Summer'
    - left: 'Осінь'
      right: 'Autumn'
    - left: 'Взимку'
      right: 'In winter'
    - left: 'Влітку'
      right: 'In summer'
    - left: 'Навесні'
      right: 'In spring'
    - left: 'Восени'
      right: 'In autumn'

- type: group-sort
  title: 'Розподіліть слова за сезонами'
  instruction: 'Drag the words to the correct season: Winter (Зима) or Summer (Літо).'
  groups:
    - name: 'Зима (Winter)'
      items:
        - 'сніг'
        - 'холодно'
        - '-20°C'
        - 'біло'
    - name: 'Літо (Summer)'
      items:
        - 'спекотно'
        - 'сонце'
        - '+30°C'
        - 'зелено'

- type: fill-in
  title: 'Опишіть погоду'
  instruction: 'Choose the correct word to complete the sentence.'
  items:
    - sentence: 'Сьогодні ____ (warm).'
      answer: 'тепло'
      options:
        - 'тепло'
        - 'холодно'
        - 'зима'
        - 'дощ'
    - sentence: 'У Києві зараз ____ (rain implies wet/cloudy, but here context is description).'
      answer: 'хмарно'
      options:
        - 'хмарно'
        - 'сніг'
        - 'сонце'
        - 'температура'
    - sentence: 'На вулиці дуже ____ (cold).'
      answer: 'холодно'
      options:
        - 'холодно'
        - 'спекотно'
        - 'літо'
        - 'вітер'
    - sentence: 'Влітку вдень ____ (hot).'
      answer: 'спекотно'
      options:
        - 'спекотно'
        - 'прохолодно'
        - 'зима'
        - 'сніг'
    - sentence: 'Сьогодні гарна ____.'
      answer: 'погода'
      options:
        - 'погода'
        - 'температура'
        - 'сонце'
        - 'хмара'
    - sentence: 'Завтра буде ____ (windy).'
      answer: 'вітряно'
      options:
        - 'вітряно'
        - 'дощ'
        - 'сніг'
        - 'сонце'

- type: unjumble
  title: 'Складіть речення'
  instruction: 'Arrange the words to form a correct Ukrainian sentence.'
  items:
    - words:
        - 'Сьогодні'
        - 'дуже'
        - 'тепло'
      answer: 'Сьогодні дуже тепло'
    - words:
        - 'Яка'
        - 'сьогодні'
        - 'погода'
      answer: 'Яка сьогодні погода'
    - words:
        - 'Завтра'
        - 'буде'
        - 'дощ'
      answer: 'Завтра буде дощ'
    - words:
        - 'Взимку'
        - 'часто'
        - 'йде'
        - 'сніг'
      answer: 'Взимку часто йде сніг'
    - words:
        - 'Я'
        - 'люблю'
        - 'літо'
      answer: 'Я люблю літо'
    - words:
        - 'На'
        - 'вулиці'
        - 'зараз'
        - 'вітряно'
      answer: 'На вулиці зараз вітряно'

- type: true-false
  title: 'Логіка погоди'
  instruction: 'Read the statement. Is it logically True or False?'
  items:
    - statement: 'Взимку дуже спекотно.'
      correct: false
      explanation: 'Взимку холодно, а спекотно влітку.'
    - statement: 'Влітку часто йде сніг.'
      correct: false
      explanation: 'Сніг йде взимку.'
    - statement: 'Навесні світить сонце і тепло.'
      correct: true
      explanation: 'Весна — це теплий сезон.'
    - statement: 'Восени листя жовте.'
      correct: true
      explanation: 'Це типова ознака осені.'
    - statement: 'Коли йде дощ, на вулиці сухо (dry).'
      correct: false
      explanation: 'Коли йде дощ, на вулиці мокро.'
    - statement: 'Україна має чотири пори року.'
      correct: true
      explanation: 'Зима, весна, літо, осінь.'

- type: anagram
  title: 'Розшифруйте слова про погоду'
  instruction: 'Unscramble the letters to make weather words.'
  items:
    - scrambled: 'О Л Х О Д Н О'
      answer: 'ХОЛОДНО'
      hint: 'Opposite of hot'
    - scrambled: 'Е Т Л П О'
      answer: 'ТЕПЛО'
      hint: 'Opposite of cold'
    - scrambled: 'І В Е Т Р'
      answer: 'ВІТЕР'
      hint: 'Moving air'
    - scrambled: 'М А З И'
      answer: 'ЗИМА'
      hint: 'The coldest season'
    - scrambled: 'Н Е Ц О С'
      answer: 'СОНЦЕ'
      hint: 'It shines in the sky'
    - scrambled: 'Р А М Х А'
      answer: 'ХМАРА'
      hint: 'It covers the sun'

- type: quiz
  title: 'Перевірте свої знання'
  instruction: 'Choose the correct answer based on the lesson.'
  items:
    - question: 'Коли зазвичай найхолодніше?'
      explanation: 'Зима — це найхолодніша пора року.'
      options:
        - text: 'Взимку'
          correct: true
        - text: 'Влітку'
          correct: false
        - text: 'Навесні'
          correct: false
        - text: 'Восени'
          correct: false
    - question: 'Що "йде" з неба?'
      explanation: 'Ми кажемо "йде дощ" або "йде сніг".'
      options:
        - text: 'Дощ'
          correct: true
        - text: 'Сонце'
          correct: false
        - text: 'Вітер'
          correct: false
        - text: 'Хмара'
          correct: false
    - question: 'Яке слово означає "It is hot"?'
      explanation: 'Спекотно — це дуже висока температура.'
      options:
        - text: 'Спекотно'
          correct: true
        - text: 'Тепло'
          correct: false
        - text: 'Прохолодно'
          correct: false
        - text: 'Хмарно'
          correct: false
    - question: 'Як запитати "What is the weather?"'
      explanation: 'Це стандартне питання про погоду.'
      options:
        - text: 'Яка сьогодні погода?'
          correct: true
        - text: 'Де сьогодні погода?'
          correct: false
        - text: 'Хто сьогодні погода?'
          correct: false
        - text: 'Чому сьогодні погода?'
          correct: false
    - question: 'Коли буває "бабине літо"?'
      explanation: 'Це теплий період восени.'
      options:
        - text: 'Восени'
          correct: true
        - text: 'Взимку'
          correct: false
        - text: 'Навесні'
          correct: false
        - text: 'Влітку'
          correct: false
    - question: 'Слово "прохолодно" — це...'
      explanation: 'Це означає "Cool", не дуже холодно, але не тепло.'
      options:
        - text: 'Cool'
          correct: true
        - text: 'Hot'
          correct: false
        - text: 'Warm'
          correct: false
        - text: 'Freezing'
          correct: false

- type: fill-in
  title: 'Що робить природа?'
  instruction: 'Select the correct verb for each weather phenomenon.'
  items:
    - sentence: 'Сьогодні ____ (shines) сонце.'
      answer: 'світить'
      options:
        - 'світить'
        - 'йде'
        - 'робить'
        - 'стоїть'
    - sentence: 'На вулиці ____ (goes) дощ.'
      answer: 'йде'
      options:
        - 'йде'
        - 'світить'
        - 'біжить'
        - 'сидить'
    - sentence: 'Завтра ____ (will be) холодно.'
      answer: 'буде'
      options:
        - 'буде'
        - 'є'
        - 'має'
        - 'робить'
    - sentence: 'У горах часто ____ (goes) сніг.'
      answer: 'йде'
      options:
        - 'йде'
        - 'світить'
        - 'лежить'
        - 'спить'
    - sentence: 'Зараз ____ (is) вітряно.'
      answer: 'зараз'
      options:
        - 'зараз'
        - 'буде'
        - 'вчора'
        - 'завтра'
    - sentence: 'Чи ____ (will) завтра тепло?'
      answer: 'буде'
      options:
        - 'буде'
        - 'йде'
        - 'світить'
        - 'є'

- type: fill-in
  title: 'Діалог: Сусіди говорять'
  instruction: 'Complete the dialogue between two neighbors.'
  items:
    - sentence: '— Привіт! Яка сьогодні ____?'
      answer: 'погода'
      options:
        - 'погода'
        - 'справа'
        - 'робота'
        - 'машина'
    - sentence: '— Привіт! Сьогодні дуже ____ (warm).'
      answer: 'тепло'
      options:
        - 'тепло'
        - 'дощ'
        - 'вітер'
        - 'зима'
    - sentence: '— А чи ____ (goes) дощ?'
      answer: 'йде'
      options:
        - 'йде'
        - 'світить'
        - 'буде'
        - 'є'
    - sentence: '— Ні, зараз ____ (shines) сонце.'
      answer: 'світить'
      options:
        - 'світить'
        - 'йде'
        - 'падає'
        - 'гріє'
    - sentence: '— Це добре. Я люблю ____ (sun).'
      answer: 'сонце'
      options:
        - 'сонце'
        - 'дощ'
        - 'сніг'
        - 'вітер'
    - sentence: '— Я теж. Гарного ____ (day)!'
      answer: 'дня'
      options:
        - 'дня'
        - 'ранку'
        - 'вечора'
        - 'року'
