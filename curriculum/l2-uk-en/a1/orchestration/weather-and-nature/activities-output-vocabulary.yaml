items:
  - lemma: "погода"
    translation: "weather"
    pos: "noun"
    gender: "f"
    usage: "Яка сьогодні погода?"
    notes: "One of the most common conversation starters in Ukrainian"
  - lemma: "дощ"
    translation: "rain"
    pos: "noun"
    gender: "m"
    usage: "Йде дощ"
    notes: "Rain 'goes' (йде) in Ukrainian — never use робити"
  - lemma: "сніг"
    translation: "snow"
    pos: "noun"
    gender: "m"
    usage: "Йде сніг"
    notes: "Same construction as rain — йде сніг"
  - lemma: "сонце"
    translation: "sun"
    pos: "noun"
    gender: "n"
    usage: "Світить сонце"
    notes: "Used with світити (to shine)"
  - lemma: "вітер"
    translation: "wind"
    pos: "noun"
    gender: "m"
    usage: "Сьогодні сильний вітер"
  - lemma: "хмара"
    translation: "cloud"
    pos: "noun"
    gender: "f"
    usage: "Велика хмара"
  - lemma: "тепло"
    translation: "warm (it is warm)"
    pos: "adv"
    usage: "На вулиці тепло"
    notes: "Used without a subject for weather. Not Це тепло!"
  - lemma: "холодно"
    translation: "cold (it is cold)"
    pos: "adv"
    usage: "Сьогодні дуже холодно"
    notes: "Common learner error: Це холодно (wrong — implies touching a cold object)"
  - lemma: "спекотно"
    translation: "hot (it is hot)"
    pos: "adv"
    usage: "Влітку спекотно"
  - lemma: "прохолодно"
    translation: "cool (it is cool)"
    pos: "adv"
    usage: "Восени прохолодно"
  - lemma: "весна"
    translation: "spring"
    pos: "noun"
    gender: "f"
    usage: "Навесні тепло"
  - lemma: "літо"
    translation: "summer"
    pos: "noun"
    gender: "n"
    usage: "Влітку спекотно"
  - lemma: "осінь"
    translation: "autumn"
    pos: "noun"
    gender: "f"
    usage: "Восени прохолодно"
  - lemma: "зима"
    translation: "winter"
    pos: "noun"
    gender: "f"
    usage: "Взимку холодно"
  - lemma: "ліс"
    translation: "forest"
    pos: "noun"
    gender: "m"
    usage: "У лісі гарно"
  - lemma: "озеро"
    translation: "lake"
    pos: "noun"
    gender: "n"
    usage: "Ми їдемо на озеро"
  - lemma: "річка"
    translation: "river"
    pos: "noun"
    gender: "f"
    usage: "Біля річки тепло"
  - lemma: "море"
    translation: "sea"
    pos: "noun"
    gender: "n"
    usage: "На морі спекотно"
  - lemma: "прогноз"
    translation: "forecast"
    pos: "noun"
    gender: "m"
    usage: "Прогноз погоди на завтра"
  - lemma: "природа"
    translation: "nature"
    pos: "noun"
    gender: "f"
    usage: "Восени у лісі гарна природа"