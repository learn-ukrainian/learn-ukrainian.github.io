items:
  - lemma: "читати"
    translation: "to read"
    pos: "verb"
    notes: "Imperative: читай / читайте"
    usage: "Classroom command"
    example: "Читайте слова!"
  - lemma: "писати"
    translation: "to write"
    pos: "verb"
    notes: "Imperative: пиши / пишіть"
    usage: "Classroom command"
    example: "Пишіть слова тут!"
  - lemma: "сказати"
    translation: "to say"
    pos: "verb"
    notes: "Imperative: скажи / скажіть (irregular к→ж mutation)"
    example: "Скажіть це слово, будь ласка."
  - lemma: "дати"
    translation: "to give"
    pos: "verb"
    notes: "Imperative: дай / дайте (irregular short form)"
    example: "Дайте це, будь ласка."
  - lemma: "іти"
    translation: "to go"
    pos: "verb"
    notes: "Imperative: іди / ідіть"
    usage: "Movement command"
    example: "Ідіть до мене!"
  - lemma: "слухати"
    translation: "to listen"
    pos: "verb"
    notes: "Imperative: слухай / слухайте"
    usage: "Classroom command"
    example: "Слухайте уважно!"
  - lemma: "дивитися"
    translation: "to look"
    pos: "verb"
    notes: "Imperative: дивись / дивіться"
    usage: "Classroom command"
    example: "Дивіться сюди!"
  - lemma: "стояти"
    translation: "to stand"
    pos: "verb"
    notes: "Imperative: стій / стійте"
    usage: "Safety command"
    example: "Стійте там!"
  - lemma: "показати"
    translation: "to show"
    pos: "verb"
    notes: "Imperative: покажи / покажіть"
    usage: "Service context"
    example: "Покажіть слово!"
  - lemma: "допомогти"
    translation: "to help"
    pos: "verb"
    notes: "Imperative: допоможи / допоможіть"
    usage: "Emergency or request context"
    example: "Допоможіть мені!"
  - lemma: "взяти"
    translation: "to take"
    pos: "verb"
    notes: "Imperative: візьми / візьміть"
    example: "Візьміть це!"
  - lemma: "чекати"
    translation: "to wait"
    pos: "verb"
    notes: "Imperative: чекай / чекайте"
    usage: "Patience context"
    example: "Чекайте там!"