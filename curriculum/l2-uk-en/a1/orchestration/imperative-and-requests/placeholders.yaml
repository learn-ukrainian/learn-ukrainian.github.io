IMMERSION_RULE: 'TARGET: 35-55% Ukrainian.

  LANGUAGE ROLES:

  - THEORY & EXPLANATION: English prose — MAXIMUM 2 sentences per concept. You must
  explain grammar primarily by demonstrating it. Show, don''t tell.

  - PARADIGM TABLES: Conjugation/declension tables with all cells Ukrainian. This
  is the highest-density immersion tool. Do not explain usage nuances in English prose
  — instead, create dual-column tables (Ukrainian Sentence | English Context/Translation)
  that map out the nuances. Move the teaching logic inside the tables.

  - EXAMPLE LISTS: Ukrainian sentences in bulleted lists (each: Ukrainian — English
  gloss).

  - DIALOGUES: Mini-dialogues in blockquotes with English gloss per line.

  - PATTERN BOXES: Show transformations: `читати → читай → читайте`.

  - INLINE: Ukrainian words/phrases bolded in English prose.

  - IMMERSION BLOCKS: Every major H2 section MUST conclude with a substantial Ukrainian-only
  dialogue or narrative blockquote (>) of at least 80-150 words demonstrating the
  concepts in context. If translations are needed, place them in a separate table
  BELOW the blockquote.

  - STRUCTURAL RULE: Paragraphs are English with inline bold Ukrainian. Full Ukrainian
  sentences go in tables, bulleted lists, dialogues, or pattern boxes — never in flowing
  prose paragraphs. Vary your containers — never use the same type twice in a row.

  Ukrainian sentences max 10 words.'
LEVEL_CONSTRAINTS: "HARD GRAMMAR RULES (audit will reject violations):\n- Max 10 words\
  \ per Ukrainian sentence (STRICT — count every word)\n- ONLY 1 clause per sentence\
  \ (no compound sentences)\n- Dative case FORBIDDEN (no мені, тобі, йому, їй, вам,\
  \ їм, -ові/-еві endings)\n  Exception: нам is taught as decodable vocabulary in\
  \ M1 (reading drill word, not grammar)\n  Exception (M19 likes-and-preferences):\
  \ Dative forms мені/тобі/йому/їй/нам/вам/їм allowed\n    ONLY in the fixed construction\
  \ «Мені подобається + noun/infinitive». Teach as a memorized\n    chunk — do NOT\
  \ explain dative case rules or paradigms.\n- Instrumental case FORBIDDEN (no з другом,\
  \ з мамою, -ом/-ою/-ем/-ею endings)\n- NO subordinate clauses: який/яка/яке, що-clause,\
  \ коли, якщо, тому що, бо, щоб, поки are ALL BANNED\n- Only imperfective aspect\
  \ verbs\n- No participles\n- Allowed cases: Nominative, Accusative, Locative (from\
  \ M13), Genitive (basics), Vocative\n\nPLAN-AWARE EXEMPTIONS: The following bans\
  \ are RELAXED for this module because the plan explicitly teaches these constructs:\
  \ Perfective aspect (plan teaches perfective verbs). Exception: If a grammar construct\
  \ appears in this module's plan grammar list or objectives, it is ALLOWED for this\
  \ module."
PEDAGOGICAL_CONSTRAINTS: 'SEQUENCE CONSTRAINTS (M47 — Imperative Mood):

  This module TEACHES the imperative mood. Imperative forms are ALLOWED and REQUIRED.

  Use imperative forms freely: читай/читайте, пиши/пишіть, скажи/скажіть, дай/дайте,
  іди/ідіть, дивись/дивіться, стій/стійте, слухай/слухайте.


  Both imperfective AND perfective verbs are allowed for imperatives.

  Past tense and future tense are available (taught at M36/M37).


  The standard A1 LEVEL_CONSTRAINTS (no dative, no instrumental) apply, EXCEPT: perfective
  aspect is ALLOWED for imperative forms.'
