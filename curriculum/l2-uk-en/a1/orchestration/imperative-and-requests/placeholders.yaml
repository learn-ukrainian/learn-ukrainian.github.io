SHARED_CONTENT_RULES: '## Language Quality Rules (All Tiers)


  ### Russianisms (HARD FAIL if found)


  Scan your ENTIRE output for these. They cause automatic audit failure:


  | Russicism | Correct Ukrainian |

  |-----------|-------------------|

  | кушати | їсти |

  | приймати участь | брати участь |

  | получати | отримувати |

  | самий кращий | найкращий |

  | відноситися | стосуватися |

  | слідуючий | наступний |

  | любий (= будь-який) | будь-який |

  | на то, що | на те, що |

  | красивий | гарний |

  | прекрасне / прекрасний | чудовий / чудове |


  Also scan for Russian characters: **ы, э, ё, ъ** — these must NEVER appear in Ukrainian
  text.


  ### English Calque Checklist


  As an English-dominant model, you may produce English-to-Ukrainian calques. Check
  and avoid:


  | English Pattern | WRONG Ukrainian | CORRECT Ukrainian |

  |---|---|---|

  | "will have" | буду мати | матиму |

  | "do work" | робити роботу | працювати |

  | "save money" | зберегти гроші | заощадити гроші |

  | "make a decision" | зробити рішення | прийняти рішення |

  | "take a photo" | брати фото | фотографувати / робити фото |

  | "have attention" | мати увагу | звертати увагу |

  | "give an answer" | давати відповідь | відповідати |

  | "make sense" | робити сенс | мати сенс |


  ### Euphony / Милозвучність (WARNING if violated)


  Ukrainian prose must follow euphony rules:


  | Rule | Avoid (Bad) | Use (Good) |

  |------|-------------|------------|

  | і → й between vowels | вона і Олена | вона й Олена |

  | й → і after consonant | він й Олена | він і Олена |

  | у → в before vowel | у Одесі | в Одесі |

  | в → у before в, ф | в вікні | у вікні |

  | в → у before consonant cluster | в зграї | у зграї |

  | з → із/зі before з, с, ш, ч | з зброєю | із зброєю (або зі) |

  | Vary conjunctions | він і вона і Іван | він і вона та Іван |


  Key: й can ONLY follow a vowel. After a consonant, always use і — even before a
  vowel.


  ### Stress Mark Typography


  Use lowercase letters with a combining acute accent (´) on the stressed vowel:

  - Correct: ма́ма, анана́с, оса́, сосна́

  - Wrong: мА́ма, ананА́с, осА́, соснА́ (do NOT capitalize the stressed vowel)


  ### Non-Decodable Ukrainian in Beginner Modules (M1-M6)


  In Cyrillic primer modules, the learner can only read letters taught so far. Any
  Ukrainian phrase using letters outside the cumulative charset MUST include an English
  translation in parentheses immediately after. No exceptions — the learner literally
  cannot read it otherwise.


  - Correct: "Все буде добре (Everything will be fine)."

  - Wrong: "Все буде добре." (no translation — learner cannot read Б or Д at M2)


  ### IPA and Latin Transliteration (BANNED at ALL levels)


  Never include IPA symbols (ɑ, ɛ, ʃ, etc.) or bracketed pronunciation guides like
  `[ma-ma]`, `[a-na-nas]`, `[ˈmɑmɑ]`. The ONLY pronunciation aid is the stress mark
  (´) on the vowel.


  Latin transliterations are BANNED: never use kh, sh, ch, zh, ts, ya, yu, ye, shch.


  ```markdown

  ❌ WRONG: "мама [ˈmɑmɑ]" or "хліб (khlib)"

  ✅ RIGHT: "**ма́ма** (mom)" or "**Х**, like the «ch» in Scottish «loch»"

  ```


  ### Typography


  - **ALWAYS** use Ukrainian angular quotes: «...» (never straight quotes "...")

  - Use ONLY vocabulary from the plan''s `vocabulary_hints` — do NOT invent new terms


  ### No Word Salad (HARD FAIL)


  Every paragraph must have ONE clear point and logical flow between sentences. Do
  NOT string together unrelated observations.


  ### LLM Writing Patterns to Avoid


  1. **"Це не просто X, а Y"** — max ONE in entire module

  2. **Grandiose openers** — don''t inflate every topic

  3. **Purple prose** — no "багатогранний діамант", "хірургічного аналізу"

  4. **Duplicate greetings** — "Ласкаво просимо" ONCE (intro only)

  5. **Stacked identical callouts** — same title max twice, vary types

  6. **"In this lesson, we will..."** — ALWAYS banned (formulaic opener)

  7. **Repetitive transitions** — "It''s worth noting...", «Варто зазначити...», «Давайте
  розглянемо...» flagged at 2+ occurrences


  ### Anti-Robotic Writing


  - No 3+ sentences starting with the same phrase

  - Vary sentence openers across sections

  - No mechanical transitions («Далі ми побачимо...», «Тепер розглянемо...»)

  - Each section should have its own narrative arc


  ### Active Voice Preference


  Ukrainian strongly prefers active constructions. Use passive only when the agent
  is truly unknown.


  Avoid: «Це може бути використано...», «Правило застосовується...»

  Prefer: «Ви можете використати...», «Ми застосовуємо правило...»

  '
SHARED_ACTIVITY_RULES: "## YAML Formatting Rules (HARD FAIL if violated)\n\n**Do NOT\
  \ use Ukrainian angular quotes `«»` in YAML values.** They break YAML parsing when\
  \ combined with colons.\n\n```yaml\n❌ WRONG (guillemets + colon = YAML parse error):\n\
  \  title: «Знайдіть пару: термін та його значення»\n  explanation: Термін «доконати»\
  \ означає: завершити дію.\n\n✅ RIGHT (plain strings, quote with single quotes if\
  \ value contains colon):\n  title: 'Знайдіть пару: термін та його значення'\n  explanation:\
  \ Термін доконати означає завершити дію.\n```\n\n**Rules:**\n1. **Never use `«»`\
  \ in YAML** — use plain text or single/double quotes\n2. **Quote any value containing\
  \ `:`** with single quotes: `'text: with colon'`\n3. **Double-check** every `title`,\
  \ `question`, `sentence`, `explanation`, and `text` field\n\n## Language Quality\
  \ (applies to ALL Ukrainian text in activities)\n\n- **No Russianisms**: кушати→їсти,\
  \ приймати участь→брати участь, получати→отримувати, самий кращий→найкращий, красивий→гарний,\
  \ красива→гарна, прекрасний→чудовий, відноситися→стосуватися, слідуючий→наступний\n\
  - **No Russian characters**: ы, э, ё, ъ must NEVER appear\n- **No IPA**: NEVER include\
  \ IPA symbols or `ipa` fields\n- **No Latin transliteration**: Reference Ukrainian\
  \ words in Cyrillic, not Latin (ZhYty → Жити)\n\n## Vocabulary YAML Rules\n\n1.\
  \ **Object with `items:` wrapper** — NOT a bare list\n2. **Follow plan's vocabulary_hints**\
  \ — include all required items\n3. **Each entry needs**: `lemma` (NOT `term`), `translation`,\
  \ `pos`\n4. **Optional fields**: `gender` (for nouns: m/f/n), `aspect` (for verbs),\
  \ `notes`, `usage`, `example`\n5. **NO `ipa` field**\n6. **Count target**: {VOCAB_COUNT_TARGET}\
  \ items\n\n## Output Delimiters\n\n> **Content outside delimiters is automatically\
  \ discarded by the extraction pipeline.**\n\nActivities block (BARE LIST — no wrapper):\n\
  ```\n===ACTIVITIES_START===\n- type: quiz\n  title: \"...\"\n  items:\n    ...\n\
  ===ACTIVITIES_END===\n```\n\nVocabulary block (OBJECT with `items:` wrapper):\n\
  ```\n===VOCABULARY_START===\nitems:\n  - lemma: \"слово\"\n    translation: \"word\"\
  \n    pos: \"noun\"\n===VOCABULARY_END===\n```\n\n## Friction Report (MANDATORY)\n\
  \n```\n===FRICTION_START===\n**Phase**: Phase 3: Activities + Vocabulary\n**Step**:\
  \ {what you were doing when friction occurred, or \"Full YAML generation\"}\n**Friction\
  \ Type**: NONE | YAML_SCHEMA_VIOLATION | TOKEN_LIMIT_TRUNCATION | ...\n**Raw Error**:\
  \ {actual error or \"None\"}\n**Self-Correction**: {what you changed, or \"N/A\"\
  }\n**Proposed Tooling Fix**: {if a script/design issue, or \"N/A\"}\n===FRICTION_END===\n\
  ```\n\n## Boundaries\n\n- Do NOT modify lesson content — only generate activities\
  \ and vocabulary\n- Do NOT add fields not in the schema (check schema carefully!)\n\
  - Do NOT wrap in `activities:` or `vocabulary:` dictionary keys\n- Do NOT request\
