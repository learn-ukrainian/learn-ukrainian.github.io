- type: quiz
  title: "Check Your Knowledge"
  instruction: "Choose the correct imperative form in context."
  items:
    - question: "How do you say 'Read!' to a group?"
      explanation: "Use the plural 'ви' form."
      options:
        - text: "Читайте!"
          correct: true
        - text: "Читай!"
          correct: false
        - text: "Читати!"
          correct: false
        - text: "Читаю!"
          correct: false
    - question: "How do you say 'Listen!' to a friend?"
      explanation: "Use the informal 'ти' form."
      options:
        - text: "Слухай!"
          correct: true
        - text: "Слухайте!"
          correct: false
        - text: "Слухати!"
          correct: false
        - text: "Слухаю!"
          correct: false
    - question: "How do you politely ask for something?"
      explanation: "Add 'будь ласка' to soften the request."
      options:
        - text: "Дайте, будь ласка."
          correct: true
        - text: "Дай!"
          correct: false
        - text: "Дати."
          correct: false
        - text: "Дамо."
          correct: false
    - question: "How do you tell someone NOT to look?"
      explanation: "Add 'не' before the command."
      options:
        - text: "Не дивись!"
          correct: true
        - text: "Не читати!"
          correct: false
        - text: "Дивись!"
          correct: false
        - text: "Не пиши!"
          correct: false
    - question: "What is the correct informal command for 'to write'?"
      explanation: "Drop the infinitive ending and add the suffix."
      options:
        - text: "пиши"
          correct: true
        - text: "писати"
          correct: false
        - text: "пишіть"
          correct: false
        - text: "пишу"
          correct: false
    - question: "What is the correct formal command for 'to give'?"
      explanation: "This is an irregular short stem."
      options:
        - text: "дайте"
          correct: true
        - text: "дай"
          correct: false
        - text: "дати"
          correct: false
        - text: "дам"
          correct: false
    - question: "How do you say 'Stand here!' formally?"
      explanation: "Use the 'ви' form for the irregular verb."
      options:
        - text: "Стійте тут!"
          correct: true
        - text: "Стій тут!"
          correct: false
        - text: "Стояти тут!"
          correct: false
        - text: "Стою тут!"
          correct: false
    - question: "How do you tell a friend 'Do not go!'?"
      explanation: "Use the 'не' particle with the informal command."
      options:
        - text: "Не іди!"
          correct: true
        - text: "Не ідіть!"
          correct: false
        - text: "Не ідемо!"
          correct: false
        - text: "Не іду!"
          correct: false
    - question: "What is the correct informal command for 'to say'?"
      explanation: "This verb has a consonant mutation."
      options:
        - text: "скажи"
          correct: true
        - text: "сказати"
          correct: false
        - text: "скажіть"
          correct: false
        - text: "скажу"
          correct: false
    - question: "How do you ask a friend to help?"
      explanation: "Use the 'ти' form of the verb."
      options:
        - text: "Допоможи!"
          correct: true
        - text: "Допоможіть!"
          correct: false
        - text: "Допоможемо!"
          correct: false
        - text: "Допоможу!"
          correct: false

- type: fill-in
  title: "Complete the Sentence"
  instruction: "Choose the correct imperative form to complete the dialogue."
  items:
    - sentence: "Ти ___ це слово!"
      answer: "читай"
      options: ["читай", "читайте", "читати", "читаю"]
    - sentence: "Ви ___ ці слова!"
      answer: "читайте"
      options: ["читай", "читайте", "читати", "читаю"]
    - sentence: "___, будь ласка, де люди?"
      answer: "Скажіть"
      options: ["Скажіть", "Скажи", "Сказати", "Скажу"]
    - sentence: "___, будь ласка, те!"
      answer: "Покажіть"
      options: ["Покажіть", "Покажи", "Показати", "Покажу"]
    - sentence: "Ти не ___ там!"
      answer: "стій"
      options: ["стій", "стійте", "стояти", "стою"]
    - sentence: "Ви не ___ там!"
      answer: "ідіть"
      options: ["ідіть", "іди", "ідемо", "іду"]
    - sentence: "Ти ___ мене!"
      answer: "слухай"
      options: ["слухай", "слухайте", "слухати", "слухаю"]
    - sentence: "Ви ___ це!"
      answer: "пишіть"
      options: ["пишіть", "пиши", "писати", "пишу"]

- type: true-false
  title: "True or False?"
  instruction: "Evaluate the correctness of these statements about the imperative mood."
  items:
    - statement: "To form a command, you always use the infinitive form of the verb."
      correct: false
      explanation: "You must drop the infinitive ending and add a specific suffix."
    - statement: "The command form of 'дати' (to give) is 'дай' or 'дайте'."
      correct: true
      explanation: "It has an irregular short stem."
    - statement: "You use the 'ти' form when speaking politely to a stranger."
      correct: false
      explanation: "You use the 'ви' form for formal situations."
    - statement: "Adding 'не' before the command makes it a prohibition."
      correct: true
      explanation: "For example, 'Не дивись!' means 'Do not look!'."
    - statement: "The verb 'сказати' changes its consonant to 'ж' in the command form."
      correct: true
      explanation: "The form becomes 'скажи' or 'скажіть'."
    - statement: "You should use 'будь ласка' to soften direct commands."
      correct: true
      explanation: "It transforms an order into a polite request."
    - statement: "The command 'стій' is used when addressing multiple people."
      correct: false
      explanation: "'Стій' is the singular informal form. Plural is 'стійте'."
    - statement: "The formal command for 'to go' is 'ідіть'."
      correct: true
      explanation: "This is the correct 'ви' form."