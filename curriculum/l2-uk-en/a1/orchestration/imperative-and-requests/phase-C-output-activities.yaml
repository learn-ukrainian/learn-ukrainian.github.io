- type: unjumble
  title: 'Put the Words in Order'
  instruction: 'Arrange the words to form a correct Ukrainian sentence.'
  items:
    - words: ['Дайте', 'будь', 'ласка']
      answer: 'Дайте будь ласка'
    - words: ['Слухайте', 'мене', 'уважно']
      answer: 'Слухайте мене уважно'
    - words: ['Дивіться', 'на', 'дошку']
      answer: 'Дивіться на дошку'
    - words: ['Пишіть', 'у', 'зошиті']
      answer: 'Пишіть у зошиті'
    - words: ['Прошу', 'вас', 'чекати']
      answer: 'Прошу вас чекати'
    - words: ['Не', 'стійте', 'там']
      answer: 'Не стійте там'

- type: quiz
  title: 'Prohibitions and Polite Phrases'
  instruction: 'Choose the correct phrase for each situation.'
  items:
    - question: 'How do you tell someone NOT to read?'
      explanation: 'Add the word не before the command.'
      options:
        - text: 'Не читай'
          correct: true
        - text: 'Ні читай'
          correct: false
        - text: 'Не читати'
          correct: false
        - text: 'Ні читати'
          correct: false
    - question: 'What is the most polite way to ask for something from the options below?'
      explanation: 'Using the conditional phrase is the most polite option.'
      options:
        - text: 'Чи не могли б ви дати?'
          correct: true
        - text: 'Дай'
          correct: false
        - text: 'Дати'
          correct: false
        - text: 'Прошу дати'
          correct: false
    - question: 'How do you tell a group NOT to stand here?'
      explanation: 'Use the formal command with не.'
      options:
        - text: 'Не стійте тут'
          correct: true
        - text: 'Не стій тут'
          correct: false
        - text: 'Ні стійте тут'
          correct: false
        - text: 'Ні стій тут'
          correct: false
    - question: 'What does the phrase Зачекайте хвилинку mean?'
      explanation: 'It means wait a minute.'
      options:
        - text: 'Wait a minute'
          correct: true
        - text: 'Help me'
          correct: false
        - text: 'Take this'
          correct: false
        - text: 'Show this'
          correct: false
    - question: 'How do you ask for help in an emergency?'
      explanation: 'The verb is допомогти, the command is допоможіть.'
      options:
        - text: 'Допоможіть!'
          correct: true
        - text: 'Покажіть!'
          correct: false
        - text: 'Візьміть!'
          correct: false
        - text: 'Зачекайте!'
          correct: false
    - question: 'How do you tell someone to take something?'
      explanation: 'The verb is взяти, the formal command is візьміть.'
      options:
        - text: 'Візьміть це'
          correct: true
        - text: 'Покажіть це'
          correct: false
        - text: 'Допоможіть це'
          correct: false
        - text: 'Зачекайте це'
          correct: false
    - question: 'How do you tell your friend NOT to look?'
      explanation: 'Use the informal command with не.'
      options:
        - text: 'Не дивись'
          correct: true
        - text: 'Не дивіться'
          correct: false
        - text: 'Ні дивись'
          correct: false
        - text: 'Ні дивіться'
          correct: false
    - question: 'What does Покажіть, будь ласка mean?'
      explanation: 'Покажіть comes from the verb показати, which means to show.'
      options:
        - text: 'Please show'
          correct: true
        - text: 'Please give'
          correct: false
        - text: 'Please tell'
          correct: false
        - text: 'Please wait'
          correct: false