- type: match-up
  title: "Match the infinitive to its informal command"
  pairs:
    - left: "читати"
      right: "читай"
    - left: "писати"
      right: "пиши"
    - left: "слухати"
      right: "слухай"
    - left: "чекати"
      right: "чекай"
    - left: "дати"
      right: "дай"
    - left: "сказати"
      right: "скажи"
    - left: "стояти"
      right: "стій"
    - left: "дивитися"
      right: "дивись"

- type: quiz
  title: "Choose the Correct Form"
  instruction: "Select the correct command form."
  items:
    - question: "You are talking to a group of friends. How do you tell them to read?"
      explanation: "For multiple people, you must use the formal/plural form (читайте)."
      options:
        - text: "читайте"
          correct: true
        - text: "читай"
          correct: false
        - text: "читати"
          correct: false
        - text: "читає"
          correct: false
    - question: "You are asking your best friend to give you something. What do you say?"
      explanation: "For a close friend, use the informal singular form (дай)."
      options:
        - text: "дай"
          correct: true
        - text: "дайте"
          correct: false
        - text: "дати"
          correct: false
        - text: "даю"
          correct: false
    - question: "You are at a store and want the clerk to show you an item."
      explanation: "Always use the formal form (покажіть) with strangers and service workers."
      options:
        - text: "покажіть"
          correct: true
        - text: "покажи"
          correct: false
        - text: "показати"
          correct: false
        - text: "покажу"
          correct: false
    - question: "How do you tell a child not to run?"
      explanation: "Place the word 'не' before the informal command."
      options:
        - text: "не іди"
          correct: true
        - text: "не ідіть"
          correct: false
        - text: "не іти"
          correct: false
        - text: "іди не"
          correct: false
    - question: "What is the polite way to ask someone to listen?"
      explanation: "Add the word 'будь ласка' to the command."
      options:
        - text: "слухайте, будь ласка"
          correct: true
        - text: "слухайте"
          correct: false
        - text: "не слухайте"
          correct: false
        - text: "слухати, будь ласка"
          correct: false
    - question: "Which phrase means 'I ask you' for formal requests?"
      explanation: "Прошу вас is a formal way to introduce a request."
      options:
        - text: "прошу вас"
          correct: true
        - text: "будь ласка"
          correct: false
        - text: "не могли б ви"
          correct: false
        - text: "дякую"
          correct: false
    - question: "How do you tell someone to wait?"
      explanation: "The informal command for чекати is чекай."
      options:
        - text: "чекай"
          correct: true
        - text: "чекати"
          correct: false
        - text: "чекає"
          correct: false
        - text: "чекаю"
          correct: false
    - question: "Which of these is the correct command for 'stand'?"
      explanation: "Стояти changes its vowel to become стій."
      options:
        - text: "стій"
          correct: true
        - text: "стояти"
          correct: false
        - text: "стою"
          correct: false
        - text: "стояй"
          correct: false

- type: fill-in
  title: "Complete the Sentences"
  items:
    - sentence: "___ слова, будь ласка."
      answer: "Читайте"
      options: ["Читайте", "Читай", "Читати", "Читаю"]
    - sentence: "___ тут."
      answer: "Стій"
      options: ["Стій", "Стояти", "Стою", "Стійте"]
    - sentence: "___ це слово."
      answer: "Скажіть"
      options: ["Скажіть", "Сказати", "Скажу", "Скажи"]
    - sentence: "___ там."
      answer: "Ідіть"
      options: ["Ідіть", "Іти", "Іду", "Іди"]
    - sentence: "___ це."
      answer: "Візьми"
      options: ["Візьми", "Взяти", "Візьміть", "Взяла"]
    - sentence: "___ мені."
      answer: "Допоможіть"
      options: ["Допоможіть", "Допомогти", "Допоможи", "Допоможу"]
    - sentence: "___ мене."
      answer: "Слухай"
      options: ["Слухай", "Слухати", "Слухайте", "Слухаю"]
    - sentence: "___ сюди."
      answer: "Дивись"
      options: ["Дивись", "Дивитися", "Дивіться", "Дивлюсь"]

- type: true-false
  title: "True or False?"
  items:
    - statement: "You can use the infinitive form of a verb to give a direct, personal command."
      correct: false
      explanation: "The infinitive is not used for personal commands; you must use the specific imperative forms."
    - statement: "The formal command form is created by adding '-те' to the informal command form."
      correct: true
      explanation: "Yes, 'читай' becomes 'читайте'."
    - statement: "The informal command for 'дати' (to give) is 'дайти'."
      correct: false
      explanation: "The correct form is 'дай'. It has an irregular stem."
    - statement: "To make a command negative, you place 'не' after the verb."
      correct: false
      explanation: "The word 'не' is placed directly before the verb."
    - statement: "'Будь ласка' can be placed at the beginning, middle, or end of a sentence."
      correct: true
      explanation: "Yes, its placement is very flexible."
    - statement: "You should always use the formal 'ви' form when addressing strangers."
      correct: true
      explanation: "This is a key part of Ukrainian politeness."
    - statement: "'Прошу вас' is used to make a very formal request."
      correct: true
      explanation: "It translates to 'I ask you' and is common in official settings."
    - statement: "The informal command for 'стояти' (to stand) is 'стояй'."
      correct: false
      explanation: "The correct form is 'стій'."

- type: group-sort
  title: "Sort into Informal vs Formal"
  groups:
    - name: "Informal (ти)"
      items: ["читай", "пиши", "дай", "скажи", "стій", "дивись"]
    - name: "Formal (ви)"
      items: ["читайте", "пишіть", "дайте", "скажіть", "стійте", "дивіться"]