- type: quiz
  title: 'Choose the Correct Command'
  instruction: 'Select the right form of the verb for each situation.'
  items:
    - question: 'You are asking your friend to read a text.'
      explanation: 'Use the informal "ти" form for a friend.'
      options:
        - text: 'читай'
          correct: true
        - text: 'читайте'
          correct: false
        - text: 'читати'
          correct: false
        - text: 'читаю'
          correct: false
    - question: 'You are asking a group of people to write.'
      explanation: 'Use the formal or plural "ви" form for a group.'
      options:
        - text: 'пишіть'
          correct: true
        - text: 'пиши'
          correct: false
        - text: 'писати'
          correct: false
        - text: 'пишуть'
          correct: false
    - question: 'You want to tell your friend to stop.'
      explanation: 'The informal command for to stand or stop is стій.'
      options:
        - text: 'стій'
          correct: true
        - text: 'стійте'
          correct: false
        - text: 'стояти'
          correct: false
        - text: 'стою'
          correct: false
    - question: 'A teacher is asking the class to listen carefully.'
      explanation: 'The teacher addresses the whole class with the "ви" form.'
      options:
        - text: 'слухайте'
          correct: true
        - text: 'слухай'
          correct: false
        - text: 'слухати'
          correct: false
        - text: 'слухаю'
          correct: false
    - question: 'You are asking your friend to give you something.'
      explanation: 'The irregular informal command for to give is дай.'
      options:
        - text: 'дай'
          correct: true
        - text: 'дайте'
          correct: false
        - text: 'дати'
          correct: false
        - text: 'даю'
          correct: false
    - question: 'You are asking a stranger to look at something.'
      explanation: 'Use the formal "ви" form for a stranger.'
      options:
        - text: 'дивіться'
          correct: true
        - text: 'дивись'
          correct: false
        - text: 'дивитися'
          correct: false
        - text: 'дивлюсь'
          correct: false
    - question: 'You are asking a friend to go here.'
      explanation: 'The informal command for to go is іди.'
      options:
        - text: 'іди'
          correct: true
        - text: 'ідіть'
          correct: false
        - text: 'іти'
          correct: false
        - text: 'іду'
          correct: false
    - question: 'You are asking a teacher to tell you a rule.'
      explanation: 'Use the formal "ви" form for a teacher. The verb has a consonant change.'
      options:
        - text: 'скажіть'
          correct: true
        - text: 'скажи'
          correct: false
        - text: 'сказати'
          correct: false
        - text: 'кажу'
          correct: false

- type: true-false
  title: 'Rules of the Imperative Mood'
  instruction: 'Decide if the statements are true or false.'
  items:
    - statement: 'You should use the infinitive like читати when giving a direct command to a friend.'
      correct: false
      explanation: 'The infinitive is mostly used on public signs, not for direct communication. You should use the active command читай.'
    - statement: 'The politeness word будь ласка can be placed at the beginning or end of a sentence.'
      correct: true
      explanation: 'It is very flexible and can go in different places within the sentence.'
    - statement: 'To make the formal "ви" command, you add the ending -те or -іть to the "ти" form.'
      correct: true
      explanation: 'For example, читай becomes читайте.'
    - statement: 'To tell someone not to do something, you add the word ні before the verb.'
      correct: false
      explanation: 'You add the word не. For example, Не читай.'
    - statement: 'The informal command for дати to give is a regular form дайи.'
      correct: false
      explanation: 'It is a short, irregular form: дай.'
    - statement: 'When forming the command for сказати, the letter к changes to ж.'
      correct: true
      explanation: 'The correct forms are скажи and скажіть.'
    - statement: 'The phrase Прошу вас is used for informal, casual requests between friends.'
      correct: false
      explanation: 'It is used in formal situations and official contexts.'
    - statement: 'A public sign usually says Не торкатися! while a parent would say Не чіпай!.'
      correct: true
      explanation: 'Public signs use the infinitive for general rules, while direct commands use the imperative.'

- type: fill-in
  title: 'Complete the Sentences'
  instruction: 'Choose the correct word to complete each sentence.'
  items:
    - sentence: '___ текст, будь ласка.'
      answer: 'Читайте'
      options: ['Читайте', 'Читати', 'Читаю', 'Читай']
    - sentence: 'Мамо, ___ мені воду.'
      answer: 'дай'
      options: ['дай', 'дайте', 'дати', 'даю']
    - sentence: '___ тут, це ваше місце.'
      answer: 'Стійте'
      options: ['Стійте', 'Стій', 'Стояти', 'Стою']
    - sentence: '___ правду!'
      answer: 'Скажи'
      options: ['Скажи', 'Скажіть', 'Сказати', 'Кажу']
    - sentence: '___ на дошку, діти.'
      answer: 'Дивіться'
      options: ['Дивіться', 'Дивись', 'Дивитися', 'Дивлюсь']
    - sentence: '___ сюди, мій друже.'
      answer: 'Іди'
      options: ['Іди', 'Ідіть', 'Іти', 'Іду']
    - sentence: '___ у зошиті.'
      answer: 'Пишіть'
      options: ['Пишіть', 'Пиши', 'Писати', 'Пишу']
    - sentence: '___ мене уважно.'
      answer: 'Слухай'
      options: ['Слухай', 'Слухайте', 'Слухати', 'Слухаю']

