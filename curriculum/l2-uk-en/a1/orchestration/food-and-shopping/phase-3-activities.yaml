- type: unjumble
  title: "Складіть речення"
  instruction: "Розставте слова у правильному порядку, щоб утворити речення."
  items:
    - words: ["Я", "купую", "свіжий", "хліб"]
      answer: "Я купую свіжий хліб"
    - words: ["Вона", "п'є", "чорну", "каву"]
      answer: "Вона п'є чорну каву"
    - words: ["Скільки", "коштує", "це", "молоко"]
      answer: "Скільки коштує це молоко"
    - words: ["Дайте", "будь", "ласка", "воду"]
      answer: "Дайте будь ласка воду"
    - words: ["Ми", "любимо", "український", "борщ"]
      answer: "Ми любимо український борщ"
    - words: ["Я", "їм", "смачне", "яблуко"]
      answer: "Я їм смачне яблуко"
    - words: ["Ти", "хочеш", "пити", "чай"]
      answer: "Ти хочеш пити чай"
    - words: ["Він", "купує", "один", "кілограм", "картоплі"]
      answer: "Він купує один кілограм картоплі"
    - words: ["Мама", "готує", "смачну", "вечерю"]
      answer: "Мама готує смачну вечерю"
    - words: ["У", "магазині", "є", "свіжа", "риба"]
      answer: "У магазині є свіжа риба"
    - words: ["Я", "маю", "список", "покупок"]
      answer: "Я маю список покупок"
    - words: ["Це", "дуже", "добра", "ціна"]
      answer: "Це дуже добра ціна"

- type: quiz
  title: "У магазині"
  instruction: "Оберіть правильну відповідь на запитання про покупки."
  items:
    - question: "Як ввічливо попросити щось у магазині?"
      explanation: "Фраза «Дайте, будь ласка» є стандартною ввічливою формою прохання."
      options:
        - text: "Дайте, будь ласка..."
          correct: true
        - text: "Я хочу..."
          correct: false
        - text: "Дай мені..."
          correct: false
        - text: "Хочу це..."
          correct: false
    - question: "Як запитати про вартість товару?"
      explanation: "«Скільки коштує?» — це найпоширеніший спосіб запитати ціну."
      options:
        - text: "Скільки коштує?"
          correct: true
        - text: "Скільки грошей?"
          correct: false
        - text: "Яка цифра?"
          correct: false
        - text: "Де ціна?"
          correct: false
    - question: "Що таке «хліб-сіль»?"
      explanation: "Хліб і сіль — це традиційний символ української гостинності."
      options:
        - text: "Символ гостинності"
          correct: true
        - text: "Назва супу"
          correct: false
        - text: "Вид десерту"
          correct: false
        - text: "Ранковий сніданок"
          correct: false
    - question: "Що ми зазвичай купуємо в «пакетах»?"
      explanation: "Молоко та сік часто продаються в пакетах (cartons)."
      options:
        - text: "Молоко"
          correct: true
        - text: "Хліб"
          correct: false
        - text: "Картоплю"
          correct: false
        - text: "М'ясо"
          correct: false
    - question: "Якого роду слово «кава»?"
      explanation: "Слово «кава» закінчується на -а і є жіночого роду."
      options:
        - text: "Жіночого"
          correct: true
        - text: "Чоловічого"
          correct: false
        - text: "Середнього"
          correct: false
        - text: "Множина"
          correct: false
    - question: "Якого роду слово «хліб»?"
      explanation: "Слово «хліб» є іменником чоловічого роду."
      options:
        - text: "Чоловічого"
          correct: true
        - text: "Жіночого"
          correct: false
        - text: "Середнього"
          correct: false
        - text: "Множина"
          correct: false
    - question: "Як сказати «I drink coffee» українською?"
      explanation: "Правильна форма: Я п'ю (дієслово) каву (Знахідний відмінок)."
      options:
        - text: "Я п'ю каву"
          correct: true
        - text: "Я пити кава"
          correct: false
        - text: "Я п'єш кави"
          correct: false
        - text: "Я п'ю кава"
          correct: false
    - question: "Що таке «список покупок»?"
      explanation: "Це перелік речей, які ви плануєте купити в магазині."
      options:
        - text: "Shopping list"
          correct: true
        - text: "Price list"
          correct: false
        - text: "Menu"
          correct: false
        - text: "Receipt"
          correct: false

