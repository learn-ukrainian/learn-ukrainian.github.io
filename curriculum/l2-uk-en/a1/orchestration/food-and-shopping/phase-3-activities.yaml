- type: quiz
  title: "Дієслова: їсти, пити, купувати"
  instruction: "Оберіть правильну форму дієслова для кожного речення."
  items:
    - question: "Я _____ смачний борщ."
      explanation: "Для «Я» (I) дієслово «їсти» має форму «їм»."
      options:
        - text: "їм"
          correct: true
        - text: "їси"
          correct: false
        - text: "їсть"
          correct: false
        - text: "їмо"
          correct: false
    - question: "Ти _____ гарячу каву."
      explanation: "Для «Ти» (You) дієслово «пити» має форму «п'єш»."
      options:
        - text: "п'єш"
          correct: true
        - text: "п'ю"
          correct: false
        - text: "п'є"
          correct: false
        - text: "пити"
          correct: false
    - question: "Ми _____ свіжі продукти."
      explanation: "Для «Ми» (We) дієслово «купувати» має форму «купуємо»."
      options:
        - text: "купуємо"
          correct: true
        - text: "купую"
          correct: false
        - text: "купуєш"
          correct: false
        - text: "купують"
          correct: false
    - question: "Вона _____ зелений чай."
      explanation: "Для «Вона» (She) дієслово «пити» має форму «п'є»."
      options:
        - text: "п'є"
          correct: true
        - text: "п'ю"
          correct: false
        - text: "п'ють"
          correct: false
        - text: "пила"
          correct: false
    - question: "Вони _____ піцу."
      explanation: "Для «Вони» (They) дієслово «їсти» має форму «їдять»."
      options:
        - text: "їдять"
          correct: true
        - text: "їмо"
          correct: false
        - text: "їсте"
          correct: false
        - text: "їси"
          correct: false
    - question: "Ви _____ хліб?"
      explanation: "Для «Ви» (You plural/formal) дієслово «їсти» має форму «їсте»."
      options:
        - text: "їсте"
          correct: true
        - text: "їмо"
          correct: false
        - text: "їм"
          correct: false
        - text: "їсть"
          correct: false
    - question: "Я _____ воду."
      explanation: "Для «Я» (I) дієслово «пити» має форму «п'ю»."
      options:
        - text: "п'ю"
          correct: true
        - text: "п'єш"
          correct: false
        - text: "пити"
          correct: false
        - text: "пив"
          correct: false
    - question: "Він _____ картоплю."
      explanation: "Для «Він» (He) дієслово «купувати» має форму «купує»."
      options:
        - text: "купує"
          correct: true
        - text: "купую"
          correct: false
        - text: "купуємо"
          correct: false
        - text: "купують"
          correct: false

