- type: group-sort
  title: "Їжа чи Напій?"
  instruction: "Розподіліть слова на дві категорії: те, що ми їмо, і те, що ми п'ємо."
  groups:
    - name: "Їжа"
      items: ["борщ", "піца", "хліб", "яблуко", "банан", "м'ясо", "курка", "риба", "сир", "масло", "картопля", "морква"]
    - name: "Напої"
      items: ["вода", "сік", "чай", "кава", "молоко", "йогурт", "лимонад", "какао"]

