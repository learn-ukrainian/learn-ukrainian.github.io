- type: fill-in
  title: "Знайдіть закінчення (Find the Ending)"
  instruction: "Choose the correct form of the word in the Locative case. Remember the -і ending!"
  items:
    - sentence: "Книга лежить на ..."
      answer: "столі"
      options: ["столі", "столу", "стіл", "стола"]
      explanation: "Masculine nouns like 'стіл' usually take the ending -і."
    - sentence: "Мама зараз у ..."
      answer: "кімнаті"
      options: ["кімнаті", "кімнату", "кімната", "кімнати"]
      explanation: "Feminine nouns ending in -а change to -і."
    - sentence: "Гроші лежать у ..."
      answer: "банку"
      options: ["банку", "банкі", "банк", "банка"]
      explanation: "'Банк' is an exception and takes the ending -у."
    - sentence: "Діти зараз у ..."
      answer: "школі"
      options: ["школі", "школу", "школа", "школи"]
      explanation: "The noun 'школа' changes its ending to -і in the Locative case."
    - sentence: "Я купую хліб у ..."
      answer: "магазині"
      options: ["магазині", "магазину", "магазин", "магазина"]
      explanation: "The word 'магазин' takes the standard -і ending."
    - sentence: "Телефон лежить у ..."
      answer: "рюкзаку"
      options: ["рюкзаку", "рюкзакі", "рюкзак", "рюкзака"]
      explanation: "'Рюкзак' ends in -к and takes the exception ending -у."
    - sentence: "Кава налита у ..."
      answer: "чашці"
      options: ["чашці", "чашкі", "чашка", "чашки"]
      explanation: "The sound К changes to Ц before the ending -і."
    - sentence: "Кіт спить на ..."
      answer: "дивані"
      options: ["дивані", "дивану", "диван", "дивана"]
      explanation: "'Диван' takes the standard -і ending."
    - sentence: "Ми гуляємо у ..."
      answer: "центрі"
      options: ["центрі", "центру", "центр", "центра"]
      explanation: "The location 'центр' takes the -і ending."
    - sentence: "Ваша віза у ..."
      answer: "паспорті"
      options: ["паспорті", "паспорту", "паспорт", "паспорта"]
      explanation: "The word 'паспорт' takes the standard -і ending."
    - sentence: "Ви зараз у ..."
      answer: "Києві"
      options: ["Києві", "Київ", "Києва", "Києву"]
      explanation: "City names like 'Київ' often end in -і."
    - sentence: "Ваше фото у ..."
      answer: "телефоні"
      options: ["телефоні", "телефону", "телефон", "телефона"]
      explanation: "The word 'телефон' takes the standard -і ending."

- type: fill-in
  title: "В/У чи НА? (In or On?)"
  instruction: "Choose the correct preposition based on whether it is a container or a surface/activity."
  items:
    - sentence: "Я зараз ... магазині."
      answer: "в"
      options: ["в", "на", "у", "із"]
      explanation: "We use 'в' between vowels for euphony when talking about being inside a building."
    - sentence: "Ця книга лежить ... столі."
      answer: "на"
      options: ["на", "у", "в", "під"]
      explanation: "Use 'на' for surfaces like a table."
    - sentence: "Мій тато зараз ... роботі."
      answer: "на"
      options: ["на", "в", "у", "до"]
      explanation: "Activities and processes like 'work' take the preposition 'на'."
    - sentence: "Ми відпочиваємо ... парку."
      answer: "у"
      options: ["у", "на", "із", "до"]
      explanation: "A park is considered a defined space, so we use 'у'."
    - sentence: "Всі діти ... школі."
      answer: "у"
      options: ["у", "на", "біля", "за"]
      explanation: "Students are inside the school building, so use 'у'."
    - sentence: "Собака бігає ... вулиці."
      answer: "на"
      options: ["на", "в", "у", "за"]
      explanation: "The street is an open space, so it always takes 'на'."
    - sentence: "Твоє фото ... телефоні."
      answer: "у"
      options: ["у", "на", "з", "до"]
      explanation: "Digital content is 'inside' the device."
    - sentence: "Моя мама ... кухні."
      answer: "на"
      options: ["на", "в", "у", "із"]
      explanation: "By tradition, the kitchen takes the preposition 'на'."
    - sentence: "Він працює ... офісі."
      answer: "в"
      options: ["в", "на", "у", "біля"]
      explanation: "An office is a room/container, use 'в' for euphony after a vowel."
    - sentence: "Кіт сидить ... кріслі."
      answer: "на"
      options: ["на", "у", "в", "із"]
      explanation: "Furniture you sit on usually takes 'на'."
    - sentence: "Студент сидить ... уроці."
      answer: "на"
      options: ["на", "в", "у", "із"]
      explanation: "A lesson is an event or process, so we use 'на'."
    - sentence: "Ми їдемо ... автобусі."
      answer: "в"
      options: ["в", "на", "у", "із"]
      explanation: "Being inside a vehicle typically uses 'в' or 'у'."

- type: quiz
  title: "Перевірка теорії (Theory Check)"
  instruction: "Let's see how well you remember our rules, neighbor!"
  items:
    - question: "Яке слово ми використовуємо, щоб запитати про місце?"
      explanation: "The word 'Де' is the standard way to ask 'Where?' in Ukrainian."
      options:
        - text: "Де"
          correct: true
        - text: "Хто"
          correct: false
        - text: "Що"
          correct: false
        - text: "Як"
          correct: false
    - question: "Яке закінчення є найпопулярнішим для місцевого відмінка іменників?"
      explanation: "The ending -і is the most common for both masculine and feminine nouns in this case."
      options:
        - text: "-і"
          correct: true
        - text: "-а"
          correct: false
        - text: "-у"
          correct: false
        - text: "-ом"
          correct: false
    - question: "Коли ми використовуємо прийменник НА в українській мові?"
      explanation: "We use 'на' for surfaces, open spaces, and events/activities."
      options:
        - text: "Для поверхонь та процесів"
          correct: true
        - text: "Тільки для закритих кімнат"
          correct: false
        - text: "Тільки для назв міст"
          correct: false
        - text: "Для позначення часу"
          correct: false
    - question: "Коли ми зазвичай використовуємо прийменник У або В?"
      explanation: "These prepositions indicate that something is inside boundaries or a container."
      options:
        - text: "Для закритих просторів та контейнерів"
          correct: true
        - text: "Тільки для відкритих площ"
          correct: false
        - text: "Для позначення днів тижня"
          correct: false
        - text: "Для опису подій та свят"
          correct: false
    - question: "Як змінюється звук К у слові аптека в місцевому відмінку?"
      explanation: "The consonant К changes to Ц before the ending -і (аптека -> аптеці)."
      options:
        - text: "К змінюється на Ц"
          correct: true
        - text: "К змінюється на З"
          correct: false
        - text: "К змінюється на С"
          correct: false
        - text: "Звук не змінюється"
          correct: false
    - question: "Як змінюється звук Г у слові книга в місцевому відмінку?"
      explanation: "The consonant Г changes to З before the ending -і (книга -> книзі)."
      options:
        - text: "Г змінюється на З"
          correct: true
        - text: "Г змінюється на Ц"
          correct: false
        - text: "Г змінюється на С"
          correct: false
        - text: "Г змінюється на Ж"
          correct: false
    - question: "Який прийменник ми завжди використовуємо зі словом робота?"
      explanation: "We say 'на роботі' because work is viewed as an activity."
      options:
        - text: "на"
          correct: true
        - text: "у"
          correct: false
        - text: "в"
          correct: false
        - text: "біля"
          correct: false
    - question: "Який прийменник ми завжди використовуємо зі словом вулиця?"
      explanation: "The street is an open surface, so we say 'на вулиці'."
      options:
        - text: "на"
          correct: true
        - text: "у"
          correct: false
        - text: "в"
          correct: false
        - text: "за"
          correct: false
    - question: "Який звук з'являється замість Х у слові поверх?"
      explanation: "The consonant Х changes to С before the ending -і (поверх -> поверсі)."
      options:
        - text: "с"
          correct: true
        - text: "ц"
          correct: false
        - text: "з"
          correct: false
        - text: "ш"
          correct: false
    - question: "Який прийменник вказує, що предмет знаходиться всередині контейнера?"
      explanation: "Prepositions 'у' or 'в' show that something is inside."
      options:
        - text: "у або в"
          correct: true
        - text: "на"
          correct: false
        - text: "біля"
          correct: false
        - text: "під"
          correct: false
    - question: "Яке закінчення ми зазвичай використовуємо для слів на -ій?"
      explanation: "Words ending in -ій or -ія use the ending -ї in the Locative case."
      options:
        - text: "-ї"
          correct: true
        - text: "-і"
          correct: false
        - text: "-я"
          correct: false
        - text: "-е"
          correct: false
    - question: "Де зазвичай знаходяться гості в традиційному українському домі?"
      explanation: "Cultural note: hospitality is central, and guests are welcomed inside the home."
      options:
        - text: "у домі"
          correct: true
        - text: "на вулиці"
          correct: false
        - text: "у магазині"
          correct: false
        - text: "на вокзалі"
          correct: false

- type: unjumble
  title: "Де мої речі? (Where are my things?)"
  instruction: "Rearrange the words to build correct sentences about locations."
  items:
    - words: ["де", "мій", "паспорт"]
      answer: "Де мій паспорт?"
    - words: ["паспорт", "у", "сумці"]
      answer: "Паспорт у сумці"
    - words: ["де", "наш", "кіт"]
      answer: "Де наш кіт?"
    - words: ["він", "на", "дивані"]
      answer: "Він на дивані"
    - words: ["студент", "зараз", "у", "школі"]
      answer: "Студент зараз у школі"
    - words: ["мама", "на", "роботі"]
      answer: "Мама на роботі"
    - words: ["книга", "лежить", "на", "столі"]
      answer: "Книга лежить на столі"
    - words: ["тато", "працює", "у", "банку"]
      answer: "Тато працює у банку"
    - words: ["ми", "гуляємо", "у", "парку"]
      answer: "Ми гуляємо у парку"
    - words: ["вони", "зараз", "вдома"]
      answer: "Вони зараз вдома"
    - words: ["рюкзак", "лежить", "на", "підлозі"]
      answer: "Рюкзак лежить на підлозі"
    - words: ["фото", "є", "у", "телефоні"]
      answer: "Фото є у телефоні"

