- type: fill-in
  title: "Магічні зміни звуків (Magic Sound Changes)"
  instruction: "Remember the rules: K-C, G-Z, H-S. Type the correct form of the word."
  items:
    - sentence: "Я купую ліки в ..."
      answer: "аптеці"
      options: ["аптеці", "аптекі", "аптека", "аптеку"]
      explanation: "The sound К changes to Ц in the Locative case."
    - sentence: "Ця історія є у ..."
      answer: "книзі"
      options: ["книзі", "книгі", "книга", "книги"]
      explanation: "The sound Г changes to З in the Locative case."
    - sentence: "Ми живемо на першому ..."
      answer: "поверсі"
      options: ["поверсі", "поверхі", "поверх", "поверху"]
      explanation: "The sound Х changes to С in the Locative case."
    - sentence: "Машина стоїть на ..."
      answer: "дорозі"
      options: ["дорозі", "дорогі", "дорога", "дороги"]
      explanation: "The sound Г changes to З in the word 'дорога'."
    - sentence: "Студент сидить у ..."
      answer: "бібліотеці"
      options: ["бібліотеці", "бібліотекі", "бібліотека", "бібліотеки"]
      explanation: "The sound К changes to Ц in the word 'бібліотека'."
    - sentence: "Ручка лежить у ..."
      answer: "руці"
      options: ["руці", "рукі", "рука", "руки"]
      explanation: "The sound К changes to Ц in the word 'рука'."
    - sentence: "Кіт сидить на ..."
      answer: "нозі"
      options: ["нозі", "ногі", "нога", "ноги"]
      explanation: "The sound Г changes to З in the word 'нога'."
    - sentence: "Маленька муха на ..."
      answer: "мусі"
      options: ["мусі", "мухі", "муха", "мухи"]
      explanation: "The sound Х changes to С in the word 'муха'."
    - sentence: "Ключі в маленькій ..."
      answer: "аптечці"
      options: ["аптечці", "аптечкі", "аптечка", "аптечки"]
      explanation: "The sound К changes to Ц even in diminutive forms like 'аптечка'."
    - sentence: "Мама працює на ..."
      answer: "фабриці"
      options: ["фабриці", "фабрикі", "фабрика", "фабрики"]
      explanation: "The sound К changes to Ц in 'фабрика'."
    - sentence: "Я чекаю на ..."
      answer: "пошті"
      options: ["пошті", "пошту", "пошта", "пошти"]
      explanation: "Some words like 'пошта' just take the standard ending -і without sound changes."
    - sentence: "Твоє фото у ..."
      answer: "подрузі"
      options: ["подрузі", "подругі", "подруга", "подруги"]
      explanation: "The sound Г changes to З in the word 'подруга'."

- type: true-false
  title: "Правда чи неправда? (True or False?)"
  instruction: "Test your knowledge of Ukrainian grammar and culture."
  items:
    - statement: "Слово дім у місцевому відмінку має форму у домі."
      correct: true
      explanation: "Yes, 'дім' changes to 'у домі' (or 'вдома' as an adverb)."
    - statement: "Зараз правильно казати на Україні, а не в Україні."
      correct: false
      explanation: "Modern Ukrainian standard is 'в Україні' for an independent state."
    - statement: "Прийменник НА використовується для опису подій та процесів."
      correct: true
      explanation: "We use 'на' for things like work, lessons, or concerts."
    - statement: "Слово парк у місцевому відмінку має форму у паркі."
      correct: false
      explanation: "Exception: 'парк' takes the ending -у, so it is 'у парку'."
    - statement: "В українських будинках гості часто носять капці."
      correct: true
      explanation: "This is a common cultural tradition in Ukraine."
    - statement: "Між голосними звуками ми зазвичай використовуємо прийменник У."
      correct: false
      explanation: "Between vowels, we use 'в' for better flow (euphony)."
    - statement: "Перед словами, що починаються на В або Ф, ми використовуємо У."
      correct: true
      explanation: "This helps avoid clusters of difficult sounds like 'в в'."
    - statement: "Слово де змінює форму, коли ми ставимо запитання."
      correct: false
      explanation: "The word 'Де' remains the same in the question."
    - statement: "Слово аптека в місцевому відмінку — це в аптеці."
      correct: true
      explanation: "Correct, the K changes to C before the ending -і."
    - statement: "Для слова вулиця ми використовуємо прийменник в."
      correct: false
      explanation: "False, we always say 'на вулиці' because it is an open space."
    - statement: "Слово кухня зазвичай вживається з прийменником на."
      correct: true
      explanation: "Yes, by tradition we say 'на кухні'."
    - statement: "Слово банк у місцевому відмінку — це у банку."
      correct: true
      explanation: "Correct, 'банк' is one of the exceptions with the -у ending."

