- type: quiz
  title: "Перевірка знань (Knowledge Check)"
  instruction: "Choose the correct answer."
  items:
    - question: "Як сказати 'In the room'?"
      options:
        - text: "у кімнаті"
          correct: true
        - text: "на кімнаті"
          correct: false
        - text: "у кімната"
          correct: false
        - text: "у кімнати"
          correct: false
    - question: "Як сказати 'On the table'?"
      options:
        - text: "на столі"
          correct: true
        - text: "у столі"
          correct: false
        - text: "на стіл"
          correct: false
        - text: "на столу"
          correct: false
    - question: "Де ви зараз перебуваєте? (At work)"
      options:
        - text: "Я на роботі."
          correct: true
        - text: "Я у роботі."
          correct: false
        - text: "Я на робота."
          correct: false
        - text: "Я на роботи."
          correct: false
    - question: "Яке закінчення у слові 'парк' у місцевому відмінку?"
      options:
        - text: "-у (у парку)"
          correct: true
        - text: "-і (у паркі)"
          correct: false
        - text: "-а (у парка)"
          correct: false
        - text: "-е (у парке)"
          correct: false
    - question: "Правильно: 'в аптеці' чи 'у аптеці'?"
      options:
        - text: "в аптеці (після голосної)"
          correct: true
        - text: "у аптеці"
          correct: false
        - text: "на аптеці"
          correct: false
        - text: "до аптеці"
          correct: false
    - question: "Де саме зараз лежить паспорт?"
      options:
        - text: "у сумці"
          correct: true
        - text: "на сумці"
          correct: false
        - text: "у сумка"
          correct: false
        - text: "у сумки"
          correct: false
    - question: "Як сказати 'In the city'?"
      options:
        - text: "у місті"
          correct: true
        - text: "на місті"
          correct: false
        - text: "у місто"
          correct: false
        - text: "у міста"
          correct: false
    - question: "Де знаходяться діти? (At the lesson)"
      options:
        - text: "на уроці"
          correct: true
        - text: "у уроці"
          correct: false
        - text: "на урок"
          correct: false
        - text: "на уроку"
          correct: false

- type: unjumble
  title: "Складіть речення (Make a Sentence)"
  instruction: "Put the words in the correct order."
  items:
    - words: ["столі", "Книга", "на"]
      answer: "Книга на столі"
    - words: ["школі", "у", "Студент"]
      answer: "Студент у школі"
    - words: ["роботі", "Тато", "на"]
      answer: "Тато на роботі"
    - words: ["кімнаті", "Кіт", "у"]
      answer: "Кіт у кімнаті"
    - words: ["в", "Гроші", "банку"]
      answer: "Гроші в банку"
    - words: ["на", "Діти", "вулиці"]
      answer: "Діти на вулиці"
