items:
  - lemma: "великий"
    translation: "big, large"
    pos: "adjective"
    notes: "Masc. -ий, fem. -а, neut. -е. Review from M11."
    usage: "великий стіл, велика книга, велике місто"
  - lemma: "новий"
    translation: "new"
    pos: "adjective"
    notes: "Masc. -ий, fem. -а, neut. -е. Review from M11."
    usage: "новий дім, нова книга, нове кафе"
  - lemma: "гарний"
    translation: "beautiful, nice"
    pos: "adjective"
    notes: "Masc. -ий, fem. -а, neut. -е. Review from M11."
    usage: "гарний дім, гарна сукня, гарне місто"
  - lemma: "червоний"
    translation: "red"
    pos: "adjective"
    notes: "Color adjective. Review from M12."
    usage: "червона сукня, червоний светр"
  - lemma: "синій"
    translation: "blue"
    pos: "adjective"
    notes: "Color adjective. Plural form: сині. Review from M12."
    usage: "сині штани, синій светр"
  - lemma: "білий"
    translation: "white"
    pos: "adjective"
    notes: "Color adjective. Review from M12."
    usage: "білий светр, біла сорочка"
  - lemma: "чорний"
    translation: "black"
    pos: "adjective"
    notes: "Color adjective. Used in cafe context."
    usage: "чорна кава"
  - lemma: "маленький"
    translation: "small, little"
    pos: "adjective"
    notes: "Opposite of великий. Review from M11."
    usage: "маленький кіт, маленька книга"
  - lemma: "хто"
    translation: "who"
    pos: "pronoun"
    notes: "Interrogative pronoun for people."
    usage: "Хто це?"
  - lemma: "що"
    translation: "what"
    pos: "pronoun"
    notes: "Interrogative pronoun for things."
    usage: "Що це?"
  - lemma: "де"
    translation: "where"
    pos: "adverb"
    notes: "Interrogative adverb for location."
    usage: "Де кафе?"
  - lemma: "так"
    translation: "yes"
    pos: "particle"
    notes: "Affirmative answer."
    usage: "Так, це кіт."
  - lemma: "ні"
    translation: "no"
    pos: "particle"
    notes: "Negative answer."
    usage: "Ні, це великий кіт!"
  - lemma: "кава"
    translation: "coffee"
    pos: "noun"
    gender: "f"
    notes: "Feminine (ends in -а). Cultural hook: Lviv coffee tradition."
    usage: "Це чорна кава."
  - lemma: "стіл"
    translation: "table"
    pos: "noun"
    gender: "m"
    notes: "Masculine (ends in consonant). Plural: столи (vowel alternation і→о)."
  - lemma: "книга"
    translation: "book"
    pos: "noun"
    gender: "f"
    notes: "Feminine (ends in -а). Plural: книги."
  - lemma: "місто"
    translation: "city"
    pos: "noun"
    gender: "n"
    notes: "Neuter (ends in -о). Plural: міста."
  - lemma: "кіт"
    translation: "cat"
    pos: "noun"
    gender: "m"
    notes: "Masculine. Minimal pair: кит (whale) vs кіт (cat)."
  - lemma: "кафе"
    translation: "cafe"
    pos: "noun"
    gender: "n"
    notes: "Neuter (ends in -е). Indeclinable."
  - lemma: "торт"
    translation: "cake"
    pos: "noun"
    gender: "m"
    notes: "Masculine (ends in consonant). Cafe context vocabulary."