    To test yourself, try these real-life scenarios out loud:

    - You need to get to work tomorrow morning. How do you travel? (Я їду на роботу
    **автобусом** / **на метро**.)

    - You are at the Kyiv railway station. Buy a round-trip ticket to Lviv. (Один
    **квиток** до Львова, **туди й назад**, будь ласка.)

    - You are lost in the city center. Ask someone how to get to the park. (Вибачте,
    **як дістатися до** парку?)'
