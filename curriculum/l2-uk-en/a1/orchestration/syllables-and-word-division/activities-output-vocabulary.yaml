items:
  - lemma: "склад"
    translation: "syllable"
    pos: "noun"
    gender: "m"
    notes: "Metalinguistic term. Every голосний creates one склад."
    usage: "Скільки складів у слові молоко? — Три."
  - lemma: "голосний"
    translation: "vowel"
    pos: "adj"
    notes: "Metalinguistic term used as a noun (голосний звук). Ukrainian vowels: а, е, є, и, і, ї, о, у, ю, я."
  - lemma: "приголосний"
    translation: "consonant"
    pos: "adj"
    notes: "Metalinguistic term used as a noun (приголосний звук). й is a consonant, not a vowel."
  - lemma: "перенесення"
    translation: "word division; hyphenation"
    pos: "noun"
    gender: "n"
    notes: "The process of splitting words at the end of a line in writing."
  - lemma: "молоко"
    translation: "milk"
    pos: "noun"
    gender: "n"
    usage: "мо-ло-ко — 3 open syllables."
  - lemma: "Україна"
    translation: "Ukraine"
    pos: "noun"
    gender: "f"
    usage: "У-кра-ї-на — 4 syllables."
  - lemma: "сестра"
    translation: "sister"
    pos: "noun"
    gender: "f"
    usage: "се-стра — consonant cluster pushes to the next syllable."
  - lemma: "дерево"
    translation: "tree"
    pos: "noun"
    gender: "n"
    usage: "де-ре-во — 3 open syllables."
  - lemma: "вулиця"
    translation: "street"
    pos: "noun"
    gender: "f"
    usage: "ву-ли-ця — 3 open syllables."
  - lemma: "автобус"
    translation: "bus"
    pos: "noun"
    gender: "m"
    usage: "ав-то-бус — closed final syllable."
  - lemma: "бібліотека"
    translation: "library"
    pos: "noun"
    gender: "f"
    usage: "бі-блі-о-те-ка — 5 syllables, many valid division points."
  - lemma: "університет"
    translation: "university"
    pos: "noun"
    gender: "m"
    usage: "у-ні-вер-си-тет — cannot write У-ніверситет (single letter alone)."
  - lemma: "кіт"
    translation: "cat"
    pos: "noun"
    gender: "m"
    usage: "кіт — 1 vowel, 1 closed syllable."
  - lemma: "мама"
    translation: "mom"
    pos: "noun"
    gender: "f"
    usage: "ма-ма — 2 open syllables."
  - lemma: "місто"
    translation: "city"
    pos: "noun"
    gender: "n"
    usage: "мі-сто — consonant cluster ст moves to the second syllable."
  - lemma: "яблуко"
    translation: "apple"
    pos: "noun"
    gender: "n"
    usage: "яб-лу-ко — 3 syllables."
  - lemma: "чайка"
    translation: "seagull"
    pos: "noun"
    gender: "f"
    notes: "чай-ка — the sonorant й closes the first syllable."
  - lemma: "край"
    translation: "edge; land"
    pos: "noun"
    gender: "m"
    notes: "1 syllable only — й is a consonant, not a vowel."
  - lemma: "там"
    translation: "there"
    pos: "adv"
    usage: "Молоко там. — The milk is there."
  - lemma: "тут"
    translation: "here"
    pos: "adv"
    usage: "Мама тут. — Mom is here."