# Module Friction Log: M05 syllables-and-word-division

frictions:
  - id: m05-001
    status: active
    type: linguistic
    description: >
      FALSE RULE: Module claims сес-тра is wrong (❌ ~~сес-тра~~). This is
      INCORRECT. Per Правопис 2019 §49, сес-тра is a valid word division
      for line breaks. Phonetic syllabification (се-стра) differs from
      typographic word division (сес-тра) — both are correct. Remove the
      false error marking. See global-friction gf-001.
    source: "M05 review pass 2 (5.8/10)"
    date_added: "2026-03-17"

  - id: m05-002
    status: active
    type: structural
    description: >
      Fill-in activities create impossible vowelless syllable fragments:
      "се-ст___" (answer: ра) implies се-ст-ра with ськ/ст having no
      vowel. Fix blanks to respect syllable boundaries: "се-___" (стра).
    source: "M05 review pass 2"
    date_added: "2026-03-17"

  - id: m05-003
    status: active
    type: pedagogical
    description: >
      Contradictory consonant split rules: teaches "push consonants forward"
      (се-стра) then immediately shows ав-то-бус without explaining why в
      closes the syllable. Add explanation about sonorant consonants.
    source: "M05 review pass 2"
    date_added: "2026-03-17"

  - id: m05-004
    status: active
    type: linguistic
    description: >
      Missing required vocabulary word "дерево" — entirely absent from prose
      and activities. Required by plan.
    source: "M05 review pass 1 — vocabulary coverage"
    date_added: "2026-03-17"

  - id: m05-005
    status: active
    type: linguistic
    description: >
      Missing plan point: "о-стрів" example for consonant clusters and
      maximal onset principle.
    source: "M05 review pass 1 — plan adherence"
    date_added: "2026-03-17"
