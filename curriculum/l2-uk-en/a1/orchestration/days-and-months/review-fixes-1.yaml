    *   **восени** (in autumn)


    You also practiced one more important skill in the dialogues: saying a specific
    date. When someone asks «Якого числа?» (What date?), you answer with an ordinal
    number in the genitive case. At this stage, memorize these as chunks:


    *   **першого січня** (on the first of January)

    *   **п''ятнадцятого березня** (on the fifteenth of March)

    *   **двадцять п''ятого грудня** (on the twenty-fifth of December)


    The pattern is always the same: ordinal number + month in genitive. You already
    saw this in the dialogue when Bogdan said «П''ятнадцятого березня». As you learn
    more numbers, you will be able to say any date.


    Now test yourself. Try to answer each question out loud in Ukrainian:


    *   Який сьогодні день тижня? *(What day of the week is it today?)*

    *   Який зараз місяць? *(What month is it now?)*

    *   Яка зараз пора року? *(What season is it now?)*

    *   Коли у тебе день народження? Якого числа? *(When is your birthday? What date?)*

    *   Що ти робиш у понеділок? А в суботу? *(What do you do on Monday? And on Saturday?)*


    If you can answer all five questions, you have mastered the Ukrainian calendar.
    You are ready to plan your week, talk about your birthday, and describe the seasons
    like a native speaker.'
