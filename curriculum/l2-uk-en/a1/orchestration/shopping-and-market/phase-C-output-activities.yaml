- type: true-false
  title: "Shopping and Grammar Rules"
  instruction: "Determine if the statement is true or false."
  items:
    - statement: "To ask a vendor for an item, use the phrase 'Дайте, будь ласка'."
      correct: true
      explanation: "This is the polite and standard way to say 'Give me, please'."
    - statement: "You should use the verb 'мати' (to have) when asking if a store carries an item, like 'Ви маєте хліб?'."
      correct: false
      explanation: "Native speakers use the existence structure 'У вас є...?' instead."
    - statement: "The word 'гривня' changes its ending depending on the number before it."
      correct: true
      explanation: "Yes, for example: одна гривня, дві гривні, п'ять гривень."
    - statement: "For quantities of five and above, we use 'гривні', like 'п'ять гривні'."
      correct: false
      explanation: "For five and above, or numbers ending in zero, we use 'гривень', for example 'п'ять гривень'."
    - statement: "The verb form 'коштує' is used for a single item, and 'коштують' is for multiple items."
      correct: true
      explanation: "Yes! 'Вода коштує' (singular) and 'Яблука коштують' (plural)."
    - statement: "When you buy apples at an outdoor market, they are typically sold by the 'літр'."
      correct: false
      explanation: "Apples are sold by weight, so you use 'кілограм'."
    - statement: "The word 'шампунь' (shampoo) is a masculine noun in Ukrainian."
      correct: true
      explanation: "Yes, it is masculine, so we say 'Мій шампунь' or 'Мені потрібен шампунь'."
    - statement: "A pharmacy in Ukrainian is called 'магазин'."
      correct: false
      explanation: "A pharmacy is 'аптека'. 'Магазин' is a regular store."

