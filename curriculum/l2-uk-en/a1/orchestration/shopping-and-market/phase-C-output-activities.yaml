- type: quiz
  title: "Essential Shopping Phrases"
  instruction: "Choose the correct Ukrainian phrase."
  items:
    - question: "How do you ask for the price?"
      options:
        - text: "Скільки це коштує?"
          correct: true
        - text: "У вас є вода?"
          correct: false
        - text: "Дайте, будь ласка."
          correct: false
        - text: "Я хочу купити."
          correct: false
      explanation: "Скільки коштує is the standard phrase for 'How much does it cost'."
    - question: "How do you politely ask a vendor for an item?"
      options:
        - text: "Дайте, будь ласка."
          correct: true
        - text: "Скільки це коштує?"
          correct: false
        - text: "Де тут магазин?"
          correct: false
        - text: "Ваша решта."
          correct: false
      explanation: "Дайте, будь ласка (Give me, please) is the polite and standard way to request an item."
    - question: "How do you say 'I want to buy...'?"
      options:
        - text: "Я хочу купити..."
          correct: true
        - text: "Дайте, будь ласка..."
          correct: false
        - text: "У вас є..."
          correct: false
        - text: "Скільки коштують..."
          correct: false
      explanation: "Я хочу means 'I want' and купити means 'to buy'."
    - question: "How do you ask if a store has water?"
      options:
        - text: "У вас є вода?"
          correct: true
        - text: "Скільки коштує вода?"
          correct: false
        - text: "Дайте воду, будь ласка."
          correct: false
        - text: "Я хочу воду."
          correct: false
      explanation: "Always use 'У вас є...?' to ask if a store carries an item."
    - question: "What do you say when handing something over (e.g., money or an item)?"
      options:
        - text: "Ось, будь ласка."
          correct: true
        - text: "Ваша решта."
          correct: false
        - text: "Дайте, будь ласка."
          correct: false
        - text: "Я хочу купити."
          correct: false
      explanation: "Ось translates to 'here is' when handing something to someone."
    - question: "How do you say 'your change'?"
      options:
        - text: "Ваша решта."
          correct: true
        - text: "Ваша картка."
          correct: false
        - text: "Ось, будь ласка."
          correct: false
        - text: "Де тут аптека."
          correct: false
      explanation: "Решта means change (money returned)."
    - question: "Where do you typically go to buy fresh produce by the kilogram?"
      options:
        - text: "На ринок"
          correct: true
        - text: "В аптеку"
          correct: false
        - text: "Ваша решта"
          correct: false
        - text: "У вас є"
          correct: false
      explanation: "Ринок is an outdoor market where produce is usually weighed."
    - question: "How do you ask 'Where is the pharmacy here?'"
      options:
        - text: "Де тут аптека?"
          correct: true
        - text: "У вас є аптека?"
          correct: false
        - text: "Скільки коштує аптека?"
          correct: false
        - text: "Я хочу купити аптеку."
          correct: false
      explanation: "Де means 'where', тут means 'here', and аптека is 'pharmacy'."

- type: fill-in
  title: "Complete the Dialogue"
  instruction: "Complete the sentences with the correct words."
  items:
    - sentence: "Добрий день! У вас ___ кава?"
      answer: "є"
      options:
        - "є"
        - "бути"
        - "хочу"
        - "дайте"
    - sentence: "Так, є. Скільки вона ___?"
      answer: "коштує"
      options:
        - "коштує"
        - "коштують"
        - "є"
        - "хочу"
    - sentence: "Кава коштує сорок ___."
      answer: "гривень"
      options:
        - "гривень"
        - "гривня"
        - "гривні"
        - "гривню"
    - sentence: "Дайте, ___ ласка."
      answer: "будь"
      options:
        - "будь"
        - "хочу"
        - "ось"
        - "решта"
    - sentence: "___, будь ласка. Ваша решта."
      answer: "Ось"
      options:
        - "Ось"
        - "Так"
        - "Де"
        - "Скільки"
    - sentence: "Дякую! До ___!"
      answer: "побачення"
      options:
        - "побачення"
        - "день"
        - "ласка"
        - "решта"
    - sentence: "Я ___ купити хліб."
      answer: "хочу"
      options:
        - "хочу"
        - "є"
        - "ось"
        - "решта"
    - sentence: "Де тут ___? Мені потрібне мило."
      answer: "аптека"
      options:
        - "аптека"
        - "решта"
        - "картка"
        - "пляшка"
    - sentence: "Дайте два ___ помідорів."
      answer: "кілограми"
      options:
        - "кілограми"
        - "кілограм"
        - "кілограмів"
        - "літри"
    - sentence: "Я хочу три ___ води."
      answer: "літри"
      options:
        - "літри"
        - "літр"
        - "літрів"
        - "штуки"

