- find: 'The beauty of reflexive verbs is that they do not require you to learn a
    completely new conjugation system. The reflexive suffix attaches to the very end
    of the already conjugated form. For **я** and **ти**, you add **-ся**. For **він/вона**,
    the suffix takes the form **-ться**. You take a normal verb, conjugate it as you
    normally would, and then add the reflexive suffix at the end.


    Let''s conjugate the verb **вмиватися** (to wash up). It follows the standard
    Group I pattern, and then we just stick **-ся** on the end.


    *   Я вмиваю + **ся** = **я вмиваюся** (I wash up)

    *   Ти вмиваєш + **ся** = **ти вмиваєшся** (You wash up)

    *   Він/вона вмиває + **ться** = **він/вона вмивається** (He/she washes up)'
  replace: 'The beauty of reflexive verbs is that they do not require you to learn
    a completely new conjugation system. You take the verb stem and add special reflexive
    endings. These endings combine the standard conjugation pattern with **-ся** built
    right in.


    Let''s conjugate the verb **вмиватися** (to wash up). The stem is **вмива-**,
    and the reflexive endings are:


    *   **я** вмива + **юся** = **я вмиваюся** (I wash up)

    *   **ти** вмива + **єшся** = **ти вмиваєшся** (You wash up)

    *   **він/вона** вмива + **ється** = **він/вона вмивається** (He/she washes up)


    Notice: for **я** and **ти**, you can think of it as adding **-ся** to the regular
    form (вмиваю + ся, вмиваєш + ся). But for **він/вона**, the ending is **-ється**
    as a whole unit — do not try to add **-ся** to вмиває, because that would give
    you the wrong form.'
