- find: '*(Me too. I wake up late, lie down, look at the phone.)*'
  replace: '*(Me too. I wake up late, lie in bed, look at the phone.)*'
- find: The **-ся** simply attaches to the very end of the already conjugated form.
    You take a normal verb, conjugate it exactly as you normally would for **я**,
    **ти**, **він/вона**, and then add **-ся** at the end.
  replace: The reflexive suffix attaches to the very end of the already conjugated
    form. For **я** and **ти**, you add **-ся**. For **він/вона**, the suffix takes
    the form **-ться**. You take a normal verb, conjugate it as you normally would,
    and then add the reflexive suffix at the end.
- find: '*   Він/вона вмиваєть + **ся** = **він/вона вмивається** (He/she washes up)'
  replace: '*   Він/вона вмиває + **ться** = **він/вона вмивається** (He/she washes
    up)'
