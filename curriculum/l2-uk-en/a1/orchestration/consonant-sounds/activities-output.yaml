- type: match-up
  title: "Match Voiced to Voiceless Partner"
  instruction: "Each voiced consonant has a voiceless partner. Match them — same mouth position, different voicing."
  pairs:
    - left: "Б (voiced)"
      right: "П (voiceless)"
    - left: "Д (voiced)"
      right: "Т (voiceless)"
    - left: "З (voiced)"
      right: "С (voiceless)"
    - left: "Ж (voiced)"
      right: "Ш (voiceless)"
    - left: "Г (voiced)"
      right: "Х (voiceless)"
    - left: "Ґ (voiced)"
      right: "К (voiceless)"

- type: quiz
  title: "Consonant Knowledge Check"
  instruction: "Choose the correct answer for each question about Ukrainian consonants."
  items:
    - question: "Which of these consonants is VOICED?"
      options:
        - text: "Б"
          correct: true
        - text: "П"
          correct: false
        - text: "С"
          correct: false
        - text: "Ш"
          correct: false
      explanation: "Б is voiced — your throat vibrates when you say it. П, С, and Ш are all voiceless."
    - question: "What is the voiceless partner of Б?"
      options:
        - text: "П"
          correct: true
        - text: "Т"
          correct: false
        - text: "С"
          correct: false
        - text: "К"
          correct: false
      explanation: "Б and П are a voiced/voiceless pair — same lip position, different voicing."
    - question: "What is the voiced partner of Т?"
      options:
        - text: "Д"
          correct: true
        - text: "Б"
          correct: false
        - text: "З"
          correct: false
        - text: "Ж"
          correct: false
      explanation: "Д and Т are a pair — tongue touches the same spot behind upper teeth."
    - question: "What is the voiceless partner of З?"
      options:
        - text: "С"
          correct: true
        - text: "Ш"
          correct: false
        - text: "Х"
          correct: false
        - text: "П"
          correct: false
      explanation: "З and С are a voiced/voiceless pair."
    - question: "What is the voiced partner of Ш?"
      options:
        - text: "Ж"
          correct: true
        - text: "З"
          correct: false
        - text: "Г"
          correct: false
        - text: "Д"
          correct: false
      explanation: "Ж and Ш are a sibilant pair — Ж buzzes, Ш hisses."
    - question: "Which letter represents the hard G sound (like English 'go')?"
      options:
        - text: "Ґ"
          correct: true
        - text: "Г"
          correct: false
        - text: "К"
          correct: false
        - text: "Х"
          correct: false
      explanation: "Ґ is the rare letter for the hard G sound. Г is a soft throaty sound, not a hard G."
    - question: "In the word зуб (tooth), how is the final Б pronounced?"
      options:
        - text: "As voiced [б]"
          correct: true
        - text: "As voiceless [п]"
          correct: false
        - text: "It is silent"
          correct: false
        - text: "As [в]"
          correct: false
      explanation: "Ukrainian voiced consonants do NOT devoice at word end. зуб is зу[б], not зу[п]."
    - question: "How is Ukrainian В pronounced?"
      options:
        - text: "Closer to English W — lips rounded, no teeth"
          correct: true
        - text: "Like English V — upper teeth on lower lip"
          correct: false
        - text: "Like English F"
          correct: false
        - text: "Like English B"
          correct: false
      explanation: "Ukrainian В is a sonorant — lips round gently, closer to W than V."
    - question: "How is Ukrainian Г pronounced?"
      options:
        - text: "A soft throaty sound (voiced glottal fricative)"
          correct: true
        - text: "A hard G like English 'go'"
          correct: false
        - text: "Like English H"
          correct: false
        - text: "Like English K"
          correct: false
      explanation: "Г is a gentle, breathy sound with voice — not a hard G. The hard G is the rare Ґ."
    - question: "Which consonants are ALWAYS hard, even before І?"
      options:
        - text: "Ж and Ш"
          correct: true
        - text: "Б and П"
          correct: false
        - text: "Д and Т"
          correct: false
        - text: "Л and Н"
          correct: false
      explanation: "Ж and Ш are always hard. Most other consonants become soft before І, Я, Ю, Є."

- type: classify
  title: "Hard or Soft Consonant?"
  instruction: "In each word below, the first consonant is either hard or soft. Sort the words by the quality of their first consonant. Remember: consonants before І, Я, Ю, Є are soft."
  categories:
    - label: "Hard consonant"
      symbol_hint: "hard"
      items: ["лук", "суп", "зуб", "вовк", "дим"]
    - label: "Soft consonant"
      symbol_hint: "soft"
      items: ["люк", "сіль", "день", "ліс", "дім"]

- type: true-false
  title: "True or False?"
  instruction: "Decide whether each statement about Ukrainian consonants is true or false."
  items:
    - statement: "Ukrainian Р sounds like English P."
      correct: false
      explanation: "Р looks like English P but is a rolled/trilled R sound — completely different."
    - statement: "Ukrainian В is pronounced closer to English W than English V."
      correct: true
      explanation: "В is a sonorant in Ukrainian — lips round gently, no teeth touch the lip."
    - statement: "Ukrainian Г sounds like the G in English 'go'."
      correct: false
      explanation: "Г is a soft throaty sound (voiced glottal fricative). The hard G is the rare letter Ґ."
    - statement: "Voiced consonants in Ukrainian become voiceless at the end of a word."
      correct: false
      explanation: "Ukrainian voiced consonants stay voiced at word end. зуб = зу[б], not зу[п]."
    - statement: "Ж and Ш are always hard consonants."
      correct: true
      explanation: "Ж and Ш never soften, even before І. They are always hard."
    - statement: "Б and П are a voiced/voiceless pair."
      correct: true
      explanation: "Б is voiced, П is voiceless. Same lip position, different voicing."
    - statement: "Ґ is the most common letter in the Ukrainian alphabet."
      correct: false
      explanation: "Ґ is the rarest letter — only about 400 native Ukrainian words use it."
    - statement: "A consonant before the vowel І becomes soft."
      correct: true
      explanation: "Consonants soften before І, Я, Ю, Є. For example, ліс has a soft Л."

