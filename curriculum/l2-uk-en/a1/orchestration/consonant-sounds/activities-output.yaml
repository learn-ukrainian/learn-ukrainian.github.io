- type: classify
  title: "Sort the Consonants"
  instruction: "Drag each consonant letter into the correct group. Sonorants are the musical ones (voice dominates). Voiced consonants make your throat vibrate. Voiceless consonants use only air."
  categories:
    - label: "Sonorants"
      symbol_hint: "sonorant"
      items: ["Л", "М", "Н", "Р", "В"]
    - label: "Voiced"
      symbol_hint: "voiced"
      items: ["Б", "Д", "З", "Ж", "Ґ"]
    - label: "Voiceless"
      symbol_hint: "voiceless"
      items: ["П", "Т", "С", "Ш", "Х"]

