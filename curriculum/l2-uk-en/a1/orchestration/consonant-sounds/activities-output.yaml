- type: match-up
  title: "Match Voiced to Voiceless Partners"
  instruction: "Each voiced consonant has a voiceless partner. They share the same mouth position — only the throat vibration changes. Match each pair."
  pairs:
    - left: "Б (voiced)"
      right: "П (voiceless)"
    - left: "Д (voiced)"
      right: "Т (voiceless)"
    - left: "З (voiced)"
      right: "С (voiceless)"
    - left: "Ж (voiced)"
      right: "Ш (voiceless)"
    - left: "Г (voiced)"
      right: "Х (voiceless)"
    - left: "Ґ (voiced)"
      right: "К (voiceless)"

- type: quiz
  title: "Voiced or Voiceless?"
  instruction: "Place your hand on your throat. For each consonant, decide if it is voiced (throat vibrates) or voiceless (only air)."
  items:
    - question: "Is the letter Б voiced or voiceless?"
      options:
        - text: "Voiced"
          correct: true
        - text: "Voiceless"
          correct: false
        - text: "Sonorant"
          correct: false
        - text: "Always soft"
          correct: false
      explanation: "Б is voiced — your throat vibrates when you say it. Its voiceless partner is П."
    - question: "Is the letter Ш voiced or voiceless?"
      options:
        - text: "Voiced"
          correct: false
        - text: "Voiceless"
          correct: true
        - text: "Sonorant"
          correct: false
        - text: "Always soft"
          correct: false
      explanation: "Ш is voiceless — only air, no throat vibration. Its voiced partner is Ж."
    - question: "Is the letter З voiced or voiceless?"
      options:
        - text: "Voiced"
          correct: true
        - text: "Voiceless"
          correct: false
        - text: "Sonorant"
          correct: false
        - text: "Always hard"
          correct: false
      explanation: "З is voiced — feel the buzz when you say ZZZZ. Its voiceless partner is С."
    - question: "Is the letter Г voiced or voiceless?"
      options:
        - text: "Voiced"
          correct: true
        - text: "Voiceless"
          correct: false
        - text: "Sonorant"
          correct: false
        - text: "Neither"
          correct: false
      explanation: "Г is voiced — a soft, throaty sound. Its voiceless partner is Х."
    - question: "Is the letter Т voiced or voiceless?"
      options:
        - text: "Voiced"
          correct: false
        - text: "Voiceless"
          correct: true
        - text: "Sonorant"
          correct: false
        - text: "Always soft"
          correct: false
      explanation: "Т is voiceless — no throat vibration. Its voiced partner is Д."
    - question: "Is the letter Ж voiced or voiceless?"
      options:
        - text: "Voiced"
          correct: true
        - text: "Voiceless"
          correct: false
        - text: "Sonorant"
          correct: false
        - text: "Neither"
          correct: false
      explanation: "Ж is voiced — like the S in English measure. Its voiceless partner is Ш."
    - question: "Which group does the letter Р belong to?"
      options:
        - text: "Sonorant"
          correct: true
        - text: "Voiced (paired)"
          correct: false
        - text: "Voiceless"
          correct: false
        - text: "Always hard"
          correct: false
      explanation: "Р is a sonorant — voice dominates over noise. It has no voiceless partner."
    - question: "Which group does the letter М belong to?"
      options:
        - text: "Sonorant"
          correct: true
        - text: "Voiced (paired)"
          correct: false
        - text: "Voiceless"
          correct: false
        - text: "Always soft"
          correct: false
      explanation: "М is a sonorant — one of the five musical consonants (Л, М, Н, Р, В)."
    - question: "Is the letter П voiced or voiceless?"
      options:
        - text: "Voiced"
          correct: false
        - text: "Voiceless"
          correct: true
        - text: "Sonorant"
          correct: false
        - text: "Always soft"
          correct: false
      explanation: "П is voiceless — same lip position as Б, but no throat vibration."
    - question: "Is the letter Д voiced or voiceless?"
      options:
        - text: "Voiced"
          correct: true
        - text: "Voiceless"
          correct: false
        - text: "Sonorant"
          correct: false
        - text: "Neither"
          correct: false
      explanation: "Д is voiced — your throat vibrates. Its voiceless partner is Т."

- type: classify
  title: "Hard or Soft Consonant?"
  instruction: "Look at the bold consonant in each word. Is it hard or soft? Remember: consonants become soft before І, Я, Ю, Є. Ж and Ш are always hard."
  categories:
    - label: "Hard consonant"
      symbol_hint: "hard"
      items: ["Л in лук", "Д in дим", "Ж in жук", "Ш in шапка"]
    - label: "Soft consonant"
      symbol_hint: "soft"
      items: ["Л in ліс", "Д in дім", "С in сіль", "Л in люди"]

- type: true-false
  title: "True or False? Consonant Rules"
  instruction: "Decide if each statement about Ukrainian consonants is true or false."
  items:
    - statement: "Ukrainian has five sonorant consonants: Л, М, Н, Р, В."
      correct: true
      explanation: "These five are the sonorants — voice dominates over noise when you say them."
    - statement: "In Ukrainian, voiced consonants become voiceless at the end of a word, just like in Russian or German."
      correct: false
      explanation: "Ukrainian does NOT devoice final consonants. The word зуб keeps its voiced Б at the end."
    - statement: "The letter Г sounds like the G in English go."
      correct: false
      explanation: "Ukrainian Г is a soft, throaty sound (voiced fricative). The hard G sound is the rare letter Ґ."
    - statement: "The letters Ж and Ш are always hard — they never become soft."
      correct: true
      explanation: "Ж and Ш are always hard, no matter what vowel follows them."
    - statement: "The letter В in Ukrainian sounds like English V, with teeth touching your lower lip."
      correct: false
      explanation: "Ukrainian В is closer to English W — lips rounded, no teeth on the lower lip."
    - statement: "A consonant becomes soft when it appears before the vowels І, Я, Ю, or Є."
      correct: true
      explanation: "These vowels trigger palatalization (softening) of the consonant before them."
    - statement: "The letter Ґ is the rarest letter in Ukrainian, appearing in only about 400 native words."
      correct: true
      explanation: "Ґ was removed from the alphabet in 1933 and restored in 1990. It makes the hard G sound."
    - statement: "The letter Й is always hard."
      correct: false
      explanation: "Й is always soft — the opposite. It makes a short Y sound like in English yes."

