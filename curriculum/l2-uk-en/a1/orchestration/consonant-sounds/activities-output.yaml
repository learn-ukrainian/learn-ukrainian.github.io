- type: match-up
  title: "Match Voiced to Voiceless Partner"
  instruction: "Each voiced consonant has a voiceless partner. Match them up — they use the same mouth position, but one vibrates and the other doesn't."
  pairs:
    - left: "Б (voiced)"
      right: "П (voiceless)"
    - left: "Д (voiced)"
      right: "Т (voiceless)"
    - left: "З (voiced)"
      right: "С (voiceless)"
    - left: "Ж (voiced)"
      right: "Ш (voiceless)"
    - left: "Г (voiced)"
      right: "Х (voiceless)"
    - left: "Ґ (voiced)"
      right: "К (voiceless)"

- type: quiz
  title: "Consonant Knowledge Check"
  instruction: "Choose the correct answer for each question."
  items:
    - question: "Place your hand on your throat and say Б. What do you feel?"
      options:
        - text: "Vibration — Б is voiced"
          correct: true
        - text: "Nothing — Б is voiceless"
          correct: false
        - text: "Vibration — Б is voiceless"
          correct: false
        - text: "Nothing — Б is a sonorant"
          correct: false
      explanation: "Б is a voiced consonant. Your vocal cords vibrate when you say it."
    - question: "What is the voiceless partner of Д?"
      options:
        - text: "Т"
          correct: true
        - text: "П"
          correct: false
        - text: "С"
          correct: false
        - text: "К"
          correct: false
      explanation: "Д and Т are a voiced/voiceless pair. Both use the same tongue position on the ridge behind your upper teeth."
    - question: "The Ukrainian letter Г sounds like..."
      options:
        - text: "A soft, breathy throat sound (voiced fricative)"
          correct: true
        - text: "A hard g like in English go"
          correct: false
        - text: "The English letter H"
          correct: false
        - text: "The ch in English cheese"
          correct: false
      explanation: "Г is a voiced glottal fricative — soft and throaty. The hard g sound belongs to the rare letter Ґ."
    - question: "What happens to voiced consonants at the end of a Ukrainian word?"
      options:
        - text: "They stay voiced"
          correct: true
        - text: "They become voiceless"
          correct: false
        - text: "They disappear"
          correct: false
        - text: "They become soft"
          correct: false
      explanation: "Unlike English, Russian, or German, Ukrainian keeps voiced consonants voiced at word end. Зуб is зу[б], not зу[п]."
    - question: "Which of these is a sonorant consonant?"
      options:
        - text: "Р"
          correct: true
        - text: "Б"
          correct: false
        - text: "Ж"
          correct: false
        - text: "К"
          correct: false
      explanation: "The 5 sonorants are Л, М, Н, Р, В. They are the musical consonants where voice dominates over noise."
    - question: "The letter Р looks like English P but sounds like..."
      options:
        - text: "A rolled, trilled R"
          correct: true
        - text: "The English P sound"
          correct: false
        - text: "The English B sound"
          correct: false
        - text: "A soft H sound"
          correct: false
      explanation: "Р is a visual trap — it looks like P but is a rolled R. Your tongue tip vibrates against the ridge behind your upper teeth."
    - question: "Which consonant pair shows the same mouth position but different voicing?"
      options:
        - text: "З and С"
          correct: true
        - text: "Л and Р"
          correct: false
        - text: "М and В"
          correct: false
        - text: "Н and Й"
          correct: false
      explanation: "З (voiced) and С (voiceless) are a true pair — identical mouth position, only the throat vibration differs."
    - question: "Why is В called a sonorant in Ukrainian?"
      options:
        - text: "Voice dominates — it sounds closer to English W than V"
          correct: true
        - text: "It is always voiceless"
          correct: false
        - text: "It has a voiceless partner"
          correct: false
        - text: "It is always hard"
          correct: false
      explanation: "Ukrainian В is a sonorant — your lips round together (like W), and voice carries through. It has no voiceless partner."
    - question: "Which letter represents the hard g sound (like English go)?"
      options:
        - text: "Ґ"
          correct: true
        - text: "Г"
          correct: false
        - text: "К"
          correct: false
        - text: "Х"
          correct: false
      explanation: "Ґ is the rare letter for the hard g sound. It was removed in 1933 and restored in 1990. Г is a soft, throaty sound instead."
    - question: "Which pair of words can you use to practice the З/С voicing difference?"
      options:
        - text: "зуб / суп"
          correct: true
        - text: "жук / шапка"
          correct: false
        - text: "дім / кіт"
          correct: false
        - text: "небо / вода"
          correct: false
      explanation: "Зуб and суп have the same short structure. The first consonant is voiced (З) in зуб and voiceless (С) in суп."

- type: classify
  title: "Hard or Soft?"
  instruction: "Look at each word and decide whether the highlighted consonant is hard or soft. Remember: consonants soften before І, Я, Ю, Є."
  categories:
    - label: "Hard consonant"
      symbol_hint: "hard"
      items: ["лук (Л before У)", "дим (Д before И)", "зуб (З before У)", "суп (С before У)"]
    - label: "Soft consonant"
      symbol_hint: "soft"
      items: ["ліс (Л before І)", "дім (Д before І)", "сіль (С before І)", "люди (Л before Ю)"]

- type: true-false
  title: "True or False?"
  instruction: "Decide whether each statement about Ukrainian consonants is true or false."
  items:
    - statement: "The Ukrainian letter Н makes the same sound as English H."
      correct: false
      explanation: "Н looks like H but sounds like N — it is a visual trap for English speakers."
    - statement: "Ukrainian has 5 sonorant consonants."
      correct: true
      explanation: "The 5 sonorants are Л, М, Н, Р, В — the musical consonants."
    - statement: "In Ukrainian, voiced consonants become voiceless at the end of a word."
      correct: false
      explanation: "Ukrainian keeps voiced consonants voiced at word end. Зуб is зу[б], not зу[п]. This is different from English, Russian, and German."
    - statement: "Б and П use the same mouth position — the only difference is throat vibration."
      correct: true
      explanation: "Both are made by pressing your lips together. Б is voiced (throat vibrates), П is voiceless (no vibration)."
    - statement: "The letter Ґ was removed from the Ukrainian alphabet in 1933 and restored in 1990."
      correct: true
      explanation: "Ґ represents the hard g sound (like English go) and is found in only about 400 native Ukrainian words."
    - statement: "Ukrainian В sounds just like English V — teeth touch the lower lip."
      correct: false
      explanation: "Ukrainian В is a sonorant, closer to English W. Your lips round together; your teeth do NOT touch your lower lip."
    - statement: "Ж and Ш are always hard — they never soften."
      correct: true
      explanation: "No matter what vowel follows, Ж and Ш stay hard. Й, on the other hand, is always soft."
    - statement: "The word дім has a soft Д because it comes before І."
      correct: true
      explanation: "Consonants soften before І, Я, Ю, Є. In дім, the Д before І is soft. Compare with дим (hard Д before И)."

