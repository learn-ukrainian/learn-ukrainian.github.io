- type: classify
  title: "Sort the Consonants"
  instruction: "Drag each consonant letter into the correct category. Sonorants are the musical consonants. Voiced consonants make your throat vibrate. Voiceless consonants use only air."
  categories:
    - label: "Sonorants"
      symbol_hint: "sonorant"
      items: ["Л", "М", "Н", "Р", "В"]
    - label: "Voiced"
      symbol_hint: "voiced"
      items: ["Б", "Д", "З", "Ж", "Г"]
    - label: "Voiceless"
      symbol_hint: "voiceless"
      items: ["П", "Т", "С", "Ш", "Х"]

