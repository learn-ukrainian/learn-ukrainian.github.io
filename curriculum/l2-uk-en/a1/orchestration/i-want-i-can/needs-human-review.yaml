  - `quiz` and `fill-in` come after `## Могти і мусити (Can and Must)`, where all
  three modals are available for contrast.

  - The final `quiz` comes after `## Підсумок — Summary`.


  Issue found:

  - The marker IDs are not unique. `<!-- INJECT_ACTIVITY: fill-in -->` appears twice
  and `<!-- INJECT_ACTIVITY: quiz -->` appears twice. The plan has four distinct activity
  obligations, so these generic duplicate IDs do not map cleanly one-to-one to distinct
  exercise prompts.


