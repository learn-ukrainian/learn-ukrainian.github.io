    integrated into the prose and examples.
- dimension: 5
  name: Exercise quality
  score: 9
  evidence: All markers are present and match the plan, but `quiz-verb-patterns` is
    placed before the learner sees the contrast between the irregular `–º–æ–≥—Ç–∏` and
