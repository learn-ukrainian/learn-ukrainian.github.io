- dimension: 6
  name: Engagement & tone
  score: 10
  evidence: The tone is professional, encouraging, and clear. Phrases like "Breaking
    down the key phrases..." and "Observe how beautifully they work together" guide
    the learner without feeling patronizing.
- dimension: 7
  name: Structural integrity
  score: 10
  evidence: All sections are present and properly formatted. Word count is 1577 (well
