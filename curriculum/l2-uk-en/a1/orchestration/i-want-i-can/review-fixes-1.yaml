  replace: 'The real magic happens when you combine them to describe realistic situations.
    Life is often a conflict between what we desire and what we are obligated to do.
    You can express this conflict beautifully in a single sentence:


    *   Я **хочу** гуляти, але не **можу** — **мушу** працювати. — I want to walk,
    but I cannot — I must work.


    This sentence uses all three modal concepts to tell a complete, relatable story
    in just one line.


    Let us put all three verbs side by side for a final comparison.


    | Modal | Meaning | Pattern | Example |

    |-------|---------|---------|----------|

    | **Хотіти** | Want (desire) | Хочу + infinitive / noun | Я **хочу** читати. Я
    **хочу** каву. |

    | **Могти** | Can (ability) | Можу + infinitive | Я **можу** допомогти. |

    | **Мусити** | Must (obligation) | Мушу + infinitive | Я **мушу** працювати. |


    Notice that **хотіти** is the only modal that can take a noun directly (**хочу
    каву**). With **могти** and **мусити**, you always need an infinitive after the
    conjugated form.


    Here are more combined examples to show how these verbs work together in everyday
    life:


    *   Він **хоче** спати, але **мусить** працювати. — He wants to sleep, but he
    must work.

    *   Ми **хочемо** допомогти, але не **можемо**. — We want to help, but we cannot.

    *   Вони не **хочуть** вчити слова, але **мусять**. — They do not want to study
    words, but they must.

    *   Ти **можеш** читати, якщо **хочеш**. — You can read, if you want.


    ### Self-Check


    Now it is your turn. Try to answer these questions out loud in Ukrainian, using
    the modal verbs from this module.


    1.  Що ти **хочеш** робити сьогодні? — What do you want to do today? *(Example:
    Я хочу гуляти.)*

    2.  Що ти **можеш** робити українською? — What can you do in Ukrainian? *(Example:
    Я можу читати.)*

    3.  Що ти **мусиш** робити завтра? — What must you do tomorrow? *(Example: Я мушу
    працювати.)*


    If you can answer all three, you have the tools to express desire, ability, and
    obligation — the three pillars of everyday communication.'
