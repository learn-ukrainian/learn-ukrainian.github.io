        - 'вмиватися'
        - 'одягатися'
        - 'дивитися'
        - 'сміятися'
    - name: 'Звичайні (без -ся)'
      items:
        - 'снідати'
        - 'обідати'
        - 'вечеряти'
        - 'працювати'
        - 'гуляти'

- type: quiz
  title: 'Граматика: Правильна форма'
  instruction: 'Оберіть правильну форму дієслова для кожного речення.'
  items:
    - question: 'Я ... о сьомій годині ранку.'
      explanation: 'Для займенника "Я" ми використовуємо закінчення -юсь.'
      options:
        - text: 'прокидаюсь'
          correct: true
        - text: 'прокидаєшся'
          correct: false
        - text: 'прокидається'
          correct: false
        - text: 'прокидаємось'
          correct: false
    - question: 'Ти швидко ... вранці?'
      explanation: 'Для займенника "Ти" ми використовуємо закінчення -єшся.'
      options:
        - text: 'одягаєшся'
          correct: true
        - text: 'одягаюсь'
          correct: false
        - text: 'одягається'
          correct: false
        - text: 'одягаєтесь'
          correct: false
    - question: 'Ми ... смачний сніданок.'
      explanation: 'Дієслово "снідати" не має частки -ся. Для "Ми" закінчення -ємо.'
      options:
        - text: 'снідаємо'
          correct: true
        - text: 'снідаємось'
          correct: false
        - text: 'снідаєш'
          correct: false
        - text: 'снідають'
          correct: false
    - question: 'Вона ... холодною водою.'
      explanation: 'Для займенника "Вона" (Він/Вона) ми використовуємо закінчення -ється.'
      options:
        - text: 'вмивається'
          correct: true
        - text: 'вмиваюся'
          correct: false
        - text: 'вмиваються'
          correct: false
        - text: 'вмиваєтесь'
          correct: false
    - question: 'Вони ... телевізор увечері.'
      explanation: 'Для займенника "Вони" ми використовуємо закінчення -ються (або -яться для другої дієвідміни).'
      options:
        - text: 'дивляться'
          correct: true
        - text: 'дивиться'
          correct: false
        - text: 'дивлюся'
          correct: false
        - text: 'дивимося'
          correct: false
    - question: 'Ви ... спати пізно?'
      explanation: 'Для займенника "Ви" ми використовуємо закінчення -єте.'
      options:
        - text: 'лягаєте'
          correct: true
        - text: 'лягаєш'
          correct: false
        - text: 'лягаю'
          correct: false
        - text: 'лягають'
          correct: false

- type: fill-in
  title: 'Логіка: Порядок дій'
  instruction: 'Доповніть речення правильними словами, щоб створити логічну розповідь.'
  items:
    - sentence: '... я прокидаюся і встаю з ліжка.'
      answer: 'Спочатку'
      options:
        - 'Спочатку'
        - 'Потім'
        - 'Нарешті'
        - 'Рідко'
      explanation: 'Ми починаємо розповідь зі слова "Спочатку".'
    - sentence: '... я йду у ванну і вмиваюся.'
      answer: 'Потім'
      options:
        - 'Потім'
        - 'Спочатку'
        - 'Вчора'
        - 'Завжди'
      explanation: 'Для наступної дії ми використовуємо "Потім".'
    - sentence: '... цього я снідаю на кухні.'
      answer: 'Після'
      options:
        - 'Після'
        - 'До'
        - 'Під'
        - 'Над'
      explanation: 'Фраза "Після цього" означає "After this".'
    - sentence: '... я одягаюся і йду на роботу.'
      answer: 'Нарешті'
      options:
        - 'Нарешті'
        - 'Спочатку'
        - 'Іноді'
        - 'Ніколи'
      explanation: 'Ми завершуємо перелік дій словом "Нарешті".'
    - sentence: 'Я ... не запізнююсь на роботу.'
      answer: 'ніколи'
      options:
        - 'ніколи'
        - 'завжди'
        - 'часто'
        - 'спочатку'
      explanation: 'Подвійне заперечення "ніколи не" означає "never".'
    - sentence: 'Ми ... вечеряємо вдома разом.'
      answer: 'зазвичай'
      options:
        - 'зазвичай'
        - 'ніколи'
        - 'вчора'
        - 'завтра'
      explanation: '"Зазвичай" означає "usually".'

- type: unjumble
  title: 'Будуємо речення'
  instruction: 'Складіть слова у правильному порядку, щоб утворити речення.'
  items:
    - words:
        - 'Я'
        - 'прокидаюсь'
        - 'о'
        - 'сьомій'
      answer: 'Я прокидаюсь о сьомій'
    - words:
        - 'Ми'
        - 'швидко'
        - 'снідаємо'
        - 'вдома'
      answer: 'Ми швидко снідаємо вдома'
    - words:
        - 'Ти'
        - 'зазвичай'
        - 'обідаєш'
        - 'тут'
      answer: 'Ти зазвичай обідаєш тут'
    - words:
        - 'Він'
        - 'ніколи'
        - 'не'
        - 'запізнюється'
      answer: 'Він ніколи не запізнюється'
    - words:
        - 'У'
        - 'неділю'
        - 'ми'
        - 'відпочиваємо'
      answer: 'У неділю ми відпочиваємо'
    - words:
        - 'Діти'
        - 'лягають'
        - 'спати'
        - 'о'
        - 'дев''ятій'
      answer: 'Діти лягають спати о дев''ятій'

- type: true-false
  title: 'Культура та слова'
  instruction: 'Визначте, чи є ці твердження правильними.'
  items:
    - statement: 'Слово "снідати" означає "to wash oneself".'
      correct: false
      explanation: '"Снідати" означає "to have breakfast". "To wash oneself" — це "вмиватися".'
    - statement: 'Дієслово "обідати" не має частки -ся.'
      correct: true
      explanation: 'Так, ми кажем "я обідаю", а не "я обідаюся".'
    - statement: 'Фраза "я миюся руки" є граматично правильною.'
      correct: false
      explanation: 'Це помилка. Правильно: "я мию руки" (тому що є об''єкт — руки).'
    - statement: 'Українці зазвичай мають великий обід.'
      correct: true
      explanation: 'Так, традиційно обід є основною їжею дня.'
    - statement: '"Лягати спати" складається з двох слів.'
      correct: true
      explanation: 'Так, це фраза. Ми змінюємо "лягати", а "спати" залишається інфінітивом.'
    - statement: 'Слово "вечеряти" використовується вранці.'
      correct: false
      explanation: '"Вечеряти" (to have dinner) ми використовуємо ввечері.'

