- type: fill-in
  title: 'Як часто?'
  instruction: 'Вставте пропущене слово, яке відповідає контексту.'
  items:
    - sentence: 'Це мій режим, я роблю це 100% часу. Я ... прокидаюсь о сьомій.'
      answer: 'завжди'
      options:
        - 'завжди'
        - 'ніколи'
        - 'рідко'
        - 'іноді'
      explanation: '"Завжди" означає 100% часу.'
    - sentence: 'Я не люблю молоко, тому я ... не п''ю його.'
      answer: 'ніколи'
      options:
        - 'ніколи'
        - 'завжди'
        - 'часто'
        - 'зазвичай'
      explanation: '"Ніколи" означає 0% часу.'
    - sentence: 'Це трапляється дуже рідко, лише 10% часу. Я ... запізнююсь.'
      answer: 'рідко'
      options:
        - 'рідко'
        - 'завжди'
        - 'часто'
        - 'щодня'
      explanation: '"Рідко" означає малу частоту дій.'
    - sentence: 'Це моя звичка (90%). Я ... снідаю вдома.'
      answer: 'зазвичай'
      options:
        - 'зазвичай'
        - 'ніколи'
        - 'рідко'
        - 'вчора'
      explanation: '"Зазвичай" найкраще підходить для опису звичок.'
    - sentence: '50 на 50. ... я гуляю в парку, а ... ні.'
      answer: 'Іноді'
      options:
        - 'Іноді'
        - 'Завжди'
        - 'Ніколи'
        - 'Щодня'
      explanation: '"Іноді" означає "sometimes".'
    - sentence: 'Він ... не вмивається теплою водою.'
      answer: 'ніколи'
      options:
        - 'ніколи'
        - 'завжди'
        - 'часто'
        - 'іноді'
      explanation: 'Тут є частка "не", тому нам потрібне слово "ніколи" для подвійного заперечення.'

