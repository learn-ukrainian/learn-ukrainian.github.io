- type: match-up
  title: "Personal Pronouns"
  instruction: "Match the English pronoun to its Ukrainian equivalent."
  pairs:
    - left: "I"
      right: "Я"
    - left: "You (singular, informal)"
      right: "Ти"
    - left: "He"
      right: "Він"
    - left: "She"
      right: "Вона"
    - left: "It"
      right: "Воно"
    - left: "We"
      right: "Ми"
    - left: "You (plural or formal)"
      right: "Ви"
    - left: "They"
      right: "Вони"

- type: group-sort
  title: "He, She, or It?"
  instruction: "Sort the words into the correct gender category based on the pronoun you would use to replace them."
  groups:
    - name: "Він (He)"
      items: ["студент", "Іван", "стіл", "тато", "лікар"]
    - name: "Вона (She)"
      items: ["вчителька", "мама", "Ольга", "Марія", "лампа"]
    - name: "Воно (It)"
      items: ["місто", "вікно", "сонце", "тіло"]

- type: quiz
  title: "Grammar Concepts"
  instruction: "Choose the correct answer about Ukrainian grammar rules."
  items:
    - question: "How do you say 'I am a student' in Ukrainian?"
      explanation: "In the present tense, the verb 'to be' is omitted (Zero Copula). 'Я є студент' is unnatural."
      options:
        - text: "Я — студент."
          correct: true
        - text: "Я є студент."
          correct: false
        - text: "Я бути студент."
          correct: false
        - text: "Я студент є."
          correct: false
    - question: "Which word acts as a universal pointer meaning 'This is'?"
      explanation: "'Це' is used to introduce or identify people and objects."
      options:
        - text: "Це"
          correct: true
        - text: "Він"
          correct: false
        - text: "Тут"
          correct: false
        - text: "Що"
          correct: false
    - question: "When should you use the pronoun 'Ви'?"
      explanation: "'Ви' is used for plural groups AND for formal address (strangers, elders, superiors)."
      options:
        - text: "With strangers, elders, or groups."
          correct: true
        - text: "Only with groups of people."
          correct: false
        - text: "Only with close friends."
          correct: false
        - text: "With children and animals."
          correct: false
    - question: "If you see a table (стіл - masculine), which pronoun replaces it?"
      explanation: "In Ukrainian, objects have gender. A table is masculine, so it is 'Він' (He)."
      options:
        - text: "Він"
          correct: true
        - text: "Воно"
          correct: false
        - text: "Вона"
          correct: false
        - text: "Це"
          correct: false
    - question: "What is the 'Zero Copula'?"
      explanation: "It refers to the absence of the verb 'to be' (am/is/are) in simple present tense sentences."
      options:
        - text: "The absence of 'am/is/are' in the present tense."
          correct: true
        - text: "A missing subject in the sentence."
          correct: false
        - text: "A special type of pronoun."
          correct: false
        - text: "The negative particle 'не'."
          correct: false
    - question: "How do you ask 'Who is this?' for a person?"
      explanation: "'Хто' (Who) is for people. 'Що' (What) is for things."
      options:
        - text: "Хто це?"
          correct: true
        - text: "Що це?"
          correct: false
        - text: "Де це?"
          correct: false
        - text: "Це хто?"
          correct: false

- type: fill-in
  title: "Transformation: Noun to Pronoun"
  instruction: "Replace the name or object with the correct personal pronoun."
  items:
    - sentence: "{{Ivan}} is a student."
      answer: "Він"
      explanation: "Ivan is male, so we use 'Він'."
      options: ["Він", "Вона", "Воно", "Ми"]
    - sentence: "{{Maria}} is a teacher."
      answer: "Вона"
      explanation: "Maria is female, so we use 'Вона'."
      options: ["Вона", "Він", "Вони", "Ви"]
    - sentence: "{{Ivan and Maria}} are here."
      answer: "Вони"
      explanation: "Multiple people (plural) become 'Вони' (They)."
      options: ["Вони", "Ми", "Ви", "Він"]
    - sentence: "{{You and I}} are friends."
      answer: "Ми"
      explanation: "'You and I' is 'We', which is 'Ми'."
      options: ["Ми", "Вони", "Ви", "Я"]
    - sentence: "{{The window}} is here."
      answer: "Воно"
      explanation: "Window (вікно) is neuter, so we use 'Воно'."
      options: ["Воно", "Він", "Вона", "Це"]
    - sentence: "{{The lamp}} is new."
      answer: "Вона"
      explanation: "Lamp (лампа) is feminine, so we use 'Вона'."
      options: ["Вона", "Він", "Воно", "Це"]

- type: true-false
  title: "Culture Check: Ти vs Ви"
  instruction: "Decide if the statement about social etiquette is True or False."
  items:
    - statement: "You should always use 'Ви' with a police officer."
      correct: true
      explanation: "Police officers are figures of authority and strangers, so 'Ви' is required."
    - statement: "You use 'Ти' with your boss to show you are friendly."
      correct: false
      explanation: "Using 'Ти' with a boss without permission is rude. Use 'Ви'."
    - statement: "It is safe to use 'Ви' with a stranger on the street."
      correct: true
      explanation: "'Ви' is the 'Safety Net'. You can never be too polite."
    - statement: "You use 'Ти' with children and pets."
      correct: true
      explanation: "'Ти' is used for close relationships or when addressing those younger/lower in hierarchy (like children/pets)."
    - statement: "If you switch from 'Ви' to 'Ти', it usually means you are becoming closer friends."
      correct: true
      explanation: "This transition marks a shift from formal to close/private relationship."
    - statement: "Young people never use 'Ви'."
      correct: false
      explanation: "While youth are more informal, they still use 'Ви' with service staff or elders."

- type: unjumble
  title: "Build the Sentence"
  instruction: "Rearrange the words to form a correct Ukrainian sentence."
  items:
    - words: ["Я", "студент", "—"]
      answer: "Я — студент"
    - words: ["вчитель", "Він", "—"]
      answer: "Він — вчитель"
    - words: ["Ми", "тут", "—"]
      answer: "Ми — тут"
    - words: ["Вона", "не", "вдома"]
      answer: "Вона не вдома"
    - words: ["Це", "Київ", "—"]
      answer: "Це — Київ"
    - words: ["Ви", "хто", "?"]
      answer: "Хто Ви?"

- type: anagram
  title: "Vocabulary Scramble"
  instruction: "Unscramble the letters to find the correct word."
  items:
    - scrambled: "с т у д е н т"
      answer: "студент"
      hint: "Someone who studies."
    - scrambled: "в ч и т е л ь"
      answer: "вчитель"
      hint: "Someone who teaches."
    - scrambled: "л і к а р"
      answer: "лікар"
      hint: "Someone who treats patients."
    - scrambled: "м і с т о"
      answer: "місто"
      hint: "A large place where people live (like Kyiv)."
    - scrambled: "У к р а ї н а"
      answer: "Україна"
      hint: "The country where this language is spoken."
    - scrambled: "д и з а й н е р"
      answer: "дизайнер"
      hint: "A creative profession."

- type: fill-in
  title: "Complete the Dialogue"
  instruction: "Choose the correct word to complete the conversation."
  items:
    - sentence: "— Хто {{this}}? — Це Іван."
      answer: "це"
      explanation: "The question 'Who is this?' is 'Хто це?'"
      options: ["це", "він", "вона", "тут"]
    - sentence: "— Це Анна. {{She}} — вчителька."
      answer: "Вона"
      explanation: "Anna is female, so 'She' is 'Вона'."
      options: ["Вона", "Він", "Воно", "Це"]
    - sentence: "— Де ти? — Я {{here}}."
      answer: "тут"
      explanation: "'Here' is 'тут'."
      options: ["тут", "там", "де", "це"]
    - sentence: "— Ви турист? — Так, я {{tourist}}."
      answer: "турист"
      explanation: "You confirm your identity using the same noun."
      options: ["турист", "студент", "лікар", "мама"]
    - sentence: "— {{What}} це? — Це телефон."
      answer: "Що"
      explanation: "For objects (phone), use 'Що' (What)."
      options: ["Що", "Хто", "Де", "Як"]
    - sentence: "— Я — Том. Я — {{student}}."
      answer: "студент"
      explanation: "Tom identifies himself as a student."
      options: ["студент", "студенти", "вчителька", "місто"]

- type: match-up
  title: "Questions and Answers"
  instruction: "Match the question to the most logical answer."
  pairs:
    - left: "Хто це?"
      right: "Це Андрій."
    - left: "Де ти?"
      right: "Я тут."
    - left: "Ти студент?"
      right: "Так, я студент."
    - left: "Що це?"
      right: "Це телефон."
    - left: "Хто там?"
      right: "Свій."
    - left: "Ви хто?"
      right: "Я — Алекс."

- type: quiz
  title: "Translation Challenge"
  instruction: "Select the correct translation for the English phrase."
  items:
    - question: "How do you say 'He is not a teacher'?"
      explanation: "Use the particle 'не' before the predicate."
      options:
        - text: "Він — не вчитель."
          correct: true
        - text: "Він ні вчитель."
          correct: false
        - text: "Він немає вчитель."
          correct: false
        - text: "Він — вчитель ні."
          correct: false
    - question: "Translate 'She is here'."
      explanation: "She = Вона, Here = тут. Zero copula means no verb needed."
      options:
        - text: "Вона тут."
          correct: true
        - text: "Вона є тут."
          correct: false
        - text: "Вона це тут."
          correct: false
        - text: "Тут вона."
          correct: false
    - question: "Translate 'We are friends'."
      explanation: "We = Ми, Friends = друзі."
      options:
        - text: "Ми — друзі."
          correct: true
        - text: "Ми є друзі."
          correct: false
        - text: "Ви — друзі."
          correct: false
        - text: "Вони — друзі."
          correct: false
    - question: "Translate 'This is mom'."
      explanation: "This is = Це, Mom = мама."
      options:
        - text: "Це мама."
          correct: true
        - text: "Вона мама."
          correct: false
        - text: "Це є мама."
          correct: false
        - text: "Що мама."
          correct: false
    - question: "Translate 'Where are you?' (to a group)."
      explanation: "To a group, 'you' is 'Ви'."
      options:
        - text: "Ви де?"
          correct: true
        - text: "Ти де?"
          correct: false
        - text: "Де він?"
          correct: false
        - text: "Де ми?"
          correct: false
    - question: "Translate 'It is here' (referring to a window/вікно)."
      explanation: "Window is neuter, so 'It' = 'Воно'."
      options:
        - text: "Воно тут."
          correct: true
        - text: "Він тут."
          correct: false
        - text: "Вона тут."
          correct: false
        - text: "Це тут."
          correct: false
