items:
  - lemma: "це"
    translation: "this is"
    pos: "particle"
    usage: "Це книга. Хто це? Що це?"
  - lemma: "я"
    translation: "I"
    pos: "pronoun"
    usage: "Я студент. Я тут."
  - lemma: "ти"
    translation: "you (informal)"
    pos: "pronoun"
    usage: "Ти хто? Ти де?"
  - lemma: "він"
    translation: "he"
    pos: "pronoun"
    notes: "Also replaces masculine nouns"
    usage: "Він студент. Він там."
  - lemma: "вона"
    translation: "she"
    pos: "pronoun"
    notes: "Also replaces feminine nouns"
    usage: "Вона вчителька. Вона тут."
  - lemma: "воно"
    translation: "it"
    pos: "pronoun"
    notes: "Only for neuter nouns — never for people"
    usage: "Це молоко. Воно тут."
  - lemma: "ми"
    translation: "we"
    pos: "pronoun"
    usage: "Ми друзі. Ми тут."
  - lemma: "ви"
    translation: "you (formal/plural)"
    pos: "pronoun"
    notes: "Mandatory default for strangers and elders"
    usage: "Хто ви? Ви вчителька?"
  - lemma: "вони"
    translation: "they"
    pos: "pronoun"
    usage: "Вони тут. Вони друзі."
  - lemma: "хто"
    translation: "who"
    pos: "pronoun"
    usage: "Хто це? Хто ви?"
  - lemma: "що"
    translation: "what"
    pos: "pronoun"
    usage: "Що це? Що там?"
  - lemma: "студент"
    translation: "student (male)"
    pos: "noun"
    gender: "m"
    usage: "Я студент. Він студент."
  - lemma: "студентка"
    translation: "student (female)"
    pos: "noun"
    gender: "f"
    usage: "Я студентка. Вона студентка."
  - lemma: "українець"
    translation: "Ukrainian (male)"
    pos: "noun"
    gender: "m"
    usage: "Я українець. Він українець."
  - lemma: "українка"
    translation: "Ukrainian (female)"
    pos: "noun"
    gender: "f"
    usage: "Я українка. Вона українка."
  - lemma: "вчитель"
    translation: "teacher (male)"
    pos: "noun"
    gender: "m"
    usage: "Він вчитель."
  - lemma: "вчителька"
    translation: "teacher (female)"
    pos: "noun"
    gender: "f"
    usage: "Вона вчителька."
  - lemma: "звати"
    translation: "to call, to name"
    pos: "verb"
    aspect: "imperfective"
    usage: "Мене звати Оксана."
  - lemma: "ось"
    translation: "here, look"
    pos: "particle"
    usage: "Ось Тарас. Ось книга."
  - lemma: "друзі"
    translation: "friends"
    pos: "noun"
    gender: "m"
    notes: "Plural of друг"
    usage: "Ми друзі. Вони друзі."