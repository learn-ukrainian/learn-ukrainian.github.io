content_outline:
  - section: "Теорія: Істоти та знахідний відмінок"
    words: 414
    points:
      - "Warm-up: Visual contrast 'Heart Words' (Animate) vs 'Stone Words' (Inanimate)"
      - "Definition: Introduce 'Істота' (Animate noun) concept - people and animals"
      - "Core Rule (Masculine): Animate Masculine nouns take Genitive endings (-а/-я) (брат → брата, тато → тата)"
      - "The 'Inanimate Trap': Explicit warning not to use Nominative for people (Я бачу брат = ERROR)"
      - "Core Rule (Feminine): Animate Feminine nouns take -у/-ю, just like inanimate ones (сестра → сестру)"
      - "Edge Case: Animals are grammatically animate (кіт → кота, пес → пса)"
      - "Scaffolding: English explanation of the logic 'Object of action who is alive'"
  - section: "Практика"
    words: 260
    points:
      - "Discrimination Drill: Sort words into Animate (Who?) vs Inanimate (What?)"
      - "Transformation Drill: Change Nominative subjects into Accusative objects (Це лікар → Я чекаю лікаря)"
      - "Verb Application: Practice with 'бачити', 'знати', 'любити', 'чекати'"
      - "Pronoun Check: Correct usage of 'його/її' for people (not він/вона)"
      - "Sentence Building: Construct simple sentences with family members as objects"
  - section: "Використання"
    words: 438
    points:
      - "Narrative: Describing family relationships using 'любити' (Я люблю маму, тата, брата)"
      - "Dialogue Simulation: Asking 'Do you know...?' (Ти знаєш Андрія?)"
      - "Syntactic Roles: Identifying the Object (Додаток) in sentences about people"
      - "Contextual Scenario: Waiting at the doctor's or teacher's (чекати лікаря/вчителя)"
      - "Review Integration: Mixing Animate and Inanimate objects in one story"
  - section: "Культурний погляд"
    words: 262
    points:
      - "Cultural Insight: 'Друг' (Close Friend) vs 'Знайомий' (Acquaintance) - nuance and weight"
      - "The Name Game: Introduction to diminutives (Олександр → Сашко, Катерина → Катя)"
      - "Grammar in Culture: Declining names in Accusative (Я знаю Сашка, я бачу Катю)"
      - "Politeness: How to ask about people respectfully"
