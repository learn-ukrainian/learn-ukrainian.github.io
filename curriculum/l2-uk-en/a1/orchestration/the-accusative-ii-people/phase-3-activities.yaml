- type: fill-in
  title: "Я бачу..."
  instruction: "Заповніть пропуски правильною формою слова в Знахідному відмінку."
  items:
    - sentence: "Я бачу ___."
      answer: "брата"
      options: ["брат", "брата", "брату", "братові"]
      explanation: "Брат — чоловічий рід, істота. У Знахідному відмінку додаємо закінчення -а."
    - sentence: "Ми бачимо ___."
      answer: "сестру"
      options: ["сестра", "сестри", "сестру", "сестрі"]
      explanation: "Сестра — жіночий рід. Закінчення -а змінюється на -у."
    - sentence: "Ти знаєш ___?"
      answer: "лікаря"
      options: ["лікар", "лікаря", "лікарю", "лікарем"]
      explanation: "Лікар — чоловічий рід, істота. Оскільки слово закінчується на м'який звук, додаємо -я."
    - sentence: "Вона любить ___."
      answer: "кота"
      options: ["кіт", "коту", "кота", "котом"]
      explanation: "Кіт — тварина (істота). Чоловічий рід вимагає закінчення -а."
    - sentence: "Студент чекає ___."
      answer: "вчителя"
      options: ["вчитель", "вчителю", "вчителя", "вчителем"]
      explanation: "Вчитель — людина, чоловічий рід. У Знахідному відмінку маємо закінчення -я."
    - sentence: "Ви бачите ___?"
      answer: "сусіда"
      options: ["сусід", "сусіду", "сусіда", "сусідом"]
      explanation: "Сусід — людина. Додаємо закінчення -а."
    - sentence: "Він знає ___."
      answer: "подругу"
      options: ["подруга", "подругу", "подрузі", "подругою"]
      explanation: "Подруга — жіночий рід. Закінчення -а змінюється на -у."
    - sentence: "Ми чекаємо ___."
      answer: "тата"
      options: ["тато", "тату", "тата", "татові"]
      explanation: "Тато — чоловічий рід, істота. Має закінчення -а."

- type: unjumble
  title: "Складіть речення"
  instruction: "Поставте слова у правильному порядку, щоб утворити речення."
  items:
    - words: ["Я", "бачу", "брата"]
      answer: "Я бачу брата"
    - words: ["Ми", "знаємо", "вчителя"]
      answer: "Ми знаємо вчителя"
    - words: ["Вона", "любить", "сестру"]
      answer: "Вона любить сестру"
    - words: ["Ти", "чекаєш", "подругу"]
      answer: "Ти чекаєш подругу"
    - words: ["Він", "має", "кота"]
      answer: "Він має кота"
    - words: ["Ви", "знаєте", "лікаря"]
      answer: "Ви знаєте лікаря"
    - words: ["Студент", "бачить", "сусіда"]
      answer: "Студент бачить сусіда"
    - words: ["Мама", "любить", "дитину"]
      answer: "Мама любить дитину"

- type: true-false
  title: "Правда чи неправда?"
  instruction: "Визначте, чи правильно вжито форму Знахідного відмінка."
  items:
    - statement: "Я бачу брат."
      correct: false
      explanation: "Брат — істота, тому правильно сказати: Я бачу брата."
    - statement: "Ми знаємо сестру."
      correct: true
      explanation: "Сестра (жіночий рід) змінюється на сестру. Це правильно."
    - statement: "Він бачить стіл."
      correct: true
      explanation: "Стіл — неістота чоловічого роду, тому форма не змінюється."
    - statement: "Ти знаєш лікар?"
      correct: false
      explanation: "Лікар — людина, правильно сказати: Ти знаєш лікаря."
    - statement: "Вона чекає подругу."
      correct: true
      explanation: "Подруга змінюється на подругу. Правильно."
    - statement: "Ми маємо кіт."
      correct: false
      explanation: "Кіт — тварина (істота), тому правильно: Ми маємо кота."
    - statement: "Я знаю Андрія."
      correct: true
      explanation: "Імена теж змінюються: Андрій стає Андрія."
    - statement: "Ви бачите тато."
      correct: false
      explanation: "Тато — людина, правильно: Ви бачите тата."

- type: quiz
  title: "Перевірка знань про істот"
  instruction: "Оберіть правильну відповідь на запитання про Знахідний відмінок."
  items:
    - question: "Яке запитання ми ставимо до слова 'істота'?"
      explanation: "Ми запитуємо 'Хто?', коли говоримо про людей або тварин."
      options:
        - text: "Хто?"
          correct: true
        - text: "Що?"
          correct: false
        - text: "Де?"
          correct: false
        - text: "Як?"
          correct: false
    - question: "Яке закінчення має чоловіче слово 'друг' у реченні 'Я бачу...'?"
      explanation: "Друг — істота чоловічого роду, тому додаємо закінчення -а."
      options:
        - text: "-а (друга)"
          correct: true
        - text: "-у (другу)"
          correct: false
        - text: "-о (друго)"
          correct: false
        - text: "-и (други)"
          correct: false
    - question: "Чи змінюється жіноче слово 'сестра' у Знахідному відмінку?"
      explanation: "Так, жіночий рід завжди змінює -а на -у (сестру)."
      options:
        - text: "Так, на -у"
          correct: true
        - text: "Ні, не змінюється"
          correct: false
        - text: "Так, на -а"
          correct: false
        - text: "Так, на -я"
          correct: false
    - question: "До якої групи належить слово 'пес' (dog)?"
      explanation: "Тварини в українській мові — це істоти (Heart Words)."
      options:
        - text: "Істота"
          correct: true
        - text: "Неістота"
          correct: false
        - text: "Дієслово"
          correct: false
        - text: "Прикметник"
          correct: false
    - question: "Як правильно сказати: 'Я чекаю...' (I am waiting for a teacher)?"
      explanation: "У Знахідному відмінку вчитель стає вчителя."
      options:
        - text: "вчителя"
          correct: true
        - text: "вчитель"
          correct: false
        - text: "вчителю"
          correct: false
        - text: "вчителем"
          correct: false
    - question: "Яке речення граматично правильне для істоти?"
      explanation: "Лікар — істота, тому потрібне закінчення -я."
      options:
        - text: "Я бачу лікаря."
          correct: true
        - text: "Я бачу лікар."
          correct: false
        - text: "Я бачу лікарю."
          correct: false
        - text: "Я бачу лікарем."
          correct: false
    - question: "Що таке 'додаток' у структурі речення?"
      explanation: "Додаток (object) — це те, на що спрямована дія."
      options:
        - text: "Об'єкт дії"
          correct: true
        - text: "Суб'єкт дії"
          correct: false
        - text: "Сама дія"
          correct: false
        - text: "Місце дії"
          correct: false
    - question: "Яка форма імені 'Сашко' у Знахідному відмінку?"
      explanation: "Імена чоловічого роду на -о змінюються на -а."
      options:
        - text: "Сашка"
          correct: true
        - text: "Сашку"
          correct: false
        - text: "Сашком"
          correct: false
        - text: "Сашкові"
          correct: false

