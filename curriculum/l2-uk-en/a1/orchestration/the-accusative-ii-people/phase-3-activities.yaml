- type: group-sort
  title: "Хто це чи що це?"
  instruction: "Розподіліть слова на дві групи: істоти (люди та тварини) та неістоти (предмети)."
  groups:
    - name: "Хто це? (Істоти)"
      items: ["брат", "мама", "лікар", "кіт", "сусід", "пес", "вчитель", "дитина"]
    - name: "Що це? (Неістоти)"
      items: ["стіл", "дім", "книга", "вікно", "парк", "школа", "машина", "телефон"]

