- type: quiz
  title: 'Перевірка правил'
  instruction: 'Оберіть правильну відповідь на питання про граматику.'
  items:
    - question: "Яке закінчення мають іменники-істоти чоловічого роду (тверда група) у знахідному відмінку?"
      explanation: "Іменники-істоти чоловічого роду твердої групи отримують закінчення -а (брат -> брата)."
      options:
        - text: "-а"
          correct: true
        - text: "-у"
          correct: false
        - text: "-ом"
          correct: false
        - text: "-і"
          correct: false
    - question: "Яке закінчення мають іменники-істоти чоловічого роду (м'яка група) у знахідному відмінку?"
      explanation: "Іменники-істоти чоловічого роду м'якої групи отримують закінчення -я (вчитель -> вчителя)."
      options:
        - text: "-я"
          correct: true
        - text: "-ю"
          correct: false
        - text: "-ем"
          correct: false
        - text: "-ї"
          correct: false
    - question: "Як змінюються іменники жіночого роду на -а у знахідному відмінку?"
      explanation: "Іменники жіночого роду на -а змінюють закінчення на -у (сестра -> сестру)."
      options:
        - text: "-а змінюється на -у"
          correct: true
        - text: "-а змінюється на -о"
          correct: false
        - text: "-а змінюється на -и"
          correct: false
        - text: "не змінюються"
          correct: false
    - question: "Як змінюються іменники жіночого роду на -я у знахідному відмінку?"
      explanation: "Іменники жіночого роду на -я змінюють закінчення на -ю (Марія -> Марію)."
      options:
        - text: "-я змінюється на -ю"
          correct: true
        - text: "-я змінюється на -у"
          correct: false
        - text: "-я змінюється на -і"
          correct: false
        - text: "не змінюються"
          correct: false
    - question: "Чи змінюються іменники-неістоти чоловічого роду у знахідному відмінку?"
      explanation: "Іменники-неістоти чоловічого роду не змінюються (Я бачу стіл)."
      options:
        - text: "Ні, не змінюються"
          correct: true
        - text: "Так, додають -а"
          correct: false
        - text: "Так, додають -у"
          correct: false
        - text: "Так, додають -и"
          correct: false
    - question: "Яке питання ми ставимо до іменників-істот у знахідному відмінку?"
      explanation: "До істот ми ставимо питання Кого? (Whom?)."
      options:
        - text: "Кого?"
          correct: true
        - text: "Що?"
          correct: false
        - text: "Де?"
          correct: false
        - text: "Коли?"
          correct: false
    - question: "Як змінюється слово 'кіт' у знахідному відмінку?"
      explanation: "У слові кіт відбувається чергування і -> о (кота)."
      options:
        - text: "кота"
          correct: true
        - text: "кіта"
          correct: false
        - text: "коту"
          correct: false
        - text: "кітом"
          correct: false
    - question: "Як змінюється слово 'пес' у знахідному відмінку?"
      explanation: "У слові пес випадає літера е (пса)."
      options:
        - text: "пса"
          correct: true
        - text: "песа"
          correct: false
        - text: "песу"
          correct: false
        - text: "псом"
          correct: false
    - question: "Як змінюється слово 'вчитель' у знахідному відмінку?"
      explanation: "М'який знак змінюється на -я (вчителя)."
      options:
        - text: "вчителя"
          correct: true
        - text: "вчитела"
          correct: false
        - text: "вчителю"
          correct: false
        - text: "вчителем"
          correct: false
    - question: "Як змінюється слово 'лікар' у знахідному відмінку?"
      explanation: "Лікар додає закінчення -я (лікаря)."
      options:
        - text: "лікаря"
          correct: true
        - text: "лікара"
          correct: false
        - text: "лікару"
          correct: false
        - text: "лікарем"
          correct: false
    - question: "Чи є слово 'стіл' істотою граматично?"
      explanation: "Стіл - це неістота (неживий предмет)."
      options:
        - text: "Ні"
          correct: true
        - text: "Так"
          correct: false
        - text: "Тільки в казках"
          correct: false
        - text: "Залежить від контексту"
          correct: false
    - question: "Чи є слово 'кіт' істотою граматично?"
      explanation: "Так, тварини в українській мові є істотами."
      options:
        - text: "Так"
          correct: true
        - text: "Ні"
          correct: false
        - text: "Тільки дикі коти"
          correct: false
        - text: "Тільки домашні коти"
          correct: false

