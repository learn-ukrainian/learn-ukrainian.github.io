issues:
- type: CONTRADICTION
  location: Module Constraints (BANNED) vs. REQUIRED H2 Sections (Навичка 2)
  problem: 'Audit gates specify ''Max clauses: 1'' and Constraints explicitly BAN
    ''Complex subordinate clauses''. However, ''Навичка 2'' requires ''Побудова складнопідрядних
    речень причини'' (complex subordinate clauses of reason) using ''тому що'' / ''бо''.
    This will trigger a GRAMMAR constraint violation.'
  suggested_fix: 'Remove the requirement to build complex subordinate clauses in ''Навичка
    2'' and remove ''тому що''/''бо'' from recommended vocabulary, OR update the audit
    gate to allow max clauses: 2 for simple causal combinations.'
  severity: HIGH
- type: CONTRADICTION
  location: REQUIRED H2 Sections vs Output Format
  problem: The 'REQUIRED H2 Sections' list mandates '## Підсумок' as an H2 heading,
    but the 'Output Format' template provides it as '# Підсумок' (an H1 heading).
    This structural mismatch will likely cause the section extraction or outline compliance
    audit gate to fail.
  suggested_fix: Change '# Підсумок' to '## Підсумок' in the Output Format template
    to match the required H2 sections list.
  severity: HIGH
