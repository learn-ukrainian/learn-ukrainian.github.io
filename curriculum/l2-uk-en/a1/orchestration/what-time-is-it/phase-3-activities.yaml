- type: quiz
  title: 'Перевірка знань: Час і календар'
  items:
    - question: 'Що означає питання «Котра година?»?'
      explanation: '«Котра година?» means "What time is it?".'
      options:
        - text: 'What time is it?'
          correct: true
        - text: 'At what time?'
          correct: false
        - text: 'Which day is it?'
          correct: false
        - text: 'Where is the clock?'
          correct: false
    - question: 'Що означає питання «О котрій годині?»?'
      explanation: '«О котрій годині?» means "At what time?".'
      options:
        - text: 'At what time?'
          correct: true
        - text: 'What time is it?'
          correct: false
        - text: 'How much time?'
          correct: false
        - text: 'Is it time?'
          correct: false
    - question: 'Якого роду слово «година»?'
      explanation: 'Слово «година» (hour) is feminine, so we say «перша», «друга».'
      options:
        - text: 'Жіночого (Feminine)'
          correct: true
        - text: 'Чоловічого (Masculine)'
          correct: false
        - text: 'Середнього (Neuter)'
          correct: false
        - text: 'Воно не має роду'
          correct: false
    - question: 'Як ми пишемо дні тижня в українській мові?'
      explanation: 'In Ukrainian, days of the week are written with a lowercase letter.'
      options:
        - text: 'З маленької літери'
          correct: true
        - text: 'З великої літери'
          correct: false
        - text: 'Всіма великими літерами'
          correct: false
        - text: 'Курсивом'
          correct: false
    - question: 'Який прийменник ми вживаємо для точного часу (at 5:00)?'
      explanation: 'We use «о» for precise time: «о п’ятій».'
      options:
        - text: 'о'
          correct: true
        - text: 'у'
          correct: false
        - text: 'на'
          correct: false
        - text: 'з'
          correct: false
    - question: 'Який прийменник ми вживаємо з днями тижня (on Monday)?'
      explanation: 'We use «у» (or «в») with days: «у понеділок».'
      options:
        - text: 'у'
          correct: true
        - text: 'о'
          correct: false
        - text: 'на'
          correct: false
        - text: 'з'
          correct: false
    - question: 'Який прийменник ми вживаємо з місяцями (in January)?'
      explanation: 'We use «у» (or «в») with months: «у січні».'
      options:
        - text: 'у'
          correct: true
        - text: 'о'
          correct: false
        - text: 'на'
          correct: false
        - text: 'з'
          correct: false
    - question: 'Що означає слово «тиждень»?'
      explanation: '«Тиждень» means "Week".'
      options:
        - text: 'Week'
          correct: true
        - text: 'Month'
          correct: false
        - text: 'Year'
          correct: false
        - text: 'Day'
          correct: false
    - question: 'Що означає слово «зараз»?'
      explanation: '«Зараз» means "Now".'
      options:
        - text: 'Now'
          correct: true
        - text: 'Later'
          correct: false
        - text: 'Tomorrow'
          correct: false
        - text: 'Yesterday'
          correct: false
    - question: 'Що означає слово «вільний»?'
      explanation: '«Вільний» means "Free".'
      options:
        - text: 'Free'
          correct: true
        - text: 'Busy'
          correct: false
        - text: 'Happy'
          correct: false
        - text: 'Late'
          correct: false
    - question: 'Що означає слово «зайнятий»?'
      explanation: '«Зайнятий» means "Busy".'
      options:
        - text: 'Busy'
          correct: true
        - text: 'Free'
          correct: false
        - text: 'Open'
          correct: false
        - text: 'Ready'
          correct: false
    - question: 'Що означає слово «ранок»?'
      explanation: '«Ранок» means "Morning".'
      options:
        - text: 'Morning'
          correct: true
        - text: 'Evening'
          correct: false
        - text: 'Afternoon'
          correct: false
        - text: 'Night'
          correct: false

