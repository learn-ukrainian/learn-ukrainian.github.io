- insert_after: The soft sign is not decoration — it is meaningful.
  replace: '


    When you pronounce a hard consonant, your tongue is relaxed. When you pronounce
    a softened consonant, the middle of your tongue raises toward the roof of your
    mouth, pressing slightly against the palate. This creates a subtle ''y'' flavor
    right at the end of the consonant, melting it. It takes practice to hear it, but
    native speakers listen for this difference constantly.'
- insert_after: The apostrophe is your signal to keep the consonant firm and give
    the vowel its full sound.
  replace: '


    Think of the apostrophe as a tiny speed bump. You drive up to the consonant, stop
    for a microsecond, and then say the vowel as if it were at the beginning of a
    new word. Try saying "п... ять" and then slowly bring them closer together without
    blending the sounds. That crisp separation is the heart of the Ukrainian apostrophe.'
- insert_after: Voiced and voiceless are not interchangeable.
  replace: '


    This rule of keeping final consonants voiced gives spoken Ukrainian a very strong,
    resonant, and musical quality. When a Ukrainian says **хліб** (bread) or **дід**
    (grandfather), the final vibration rings out clearly. Practice over-emphasizing
    that final buzz or hum until it feels natural. If you master this one rule, your
    accent will immediately sound more authentically Ukrainian.'
