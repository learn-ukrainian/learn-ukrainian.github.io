# Module Friction Log: M02 vowel-sounds

frictions:
  - id: m02-001
    status: active
    type: linguistic
    description: >
      Hallucinated word "сір" claimed as Ukrainian for "grey". The correct
      word is "сірий". Replace the сир/сір minimal pair with a verified
      pair like кит/кіт in both prose and quiz activity.
    source: "M02 review pass 2 (6.5/10)"
    date_added: "2026-03-17"

  - id: m02-002
    status: active
    type: linguistic
    description: >
      Reversed stress marks: яйце́ (singular, final stress) and я́йця
      (plural, initial stress). Module had them backwards.
    source: "M02 review pass 2"
    date_added: "2026-03-17"

  - id: m02-003
    status: active
    type: pedagogical
    description: >
      image-to-letter activity asks "What vowel does it start with?" but
      4/8 items have consonant answers (Р, М, С). Change title to "What
      letter does it start with?" or replace items with vowel-initial words.
    source: "M02 review pass 2"
    date_added: "2026-03-17"

  - id: m02-004
    status: active
    type: linguistic
    description: >
      Wrong stress: ї́жак should be їжа́к.
    source: "Stress verification tool"
    date_added: "2026-03-17"

  - id: m02-005
    status: active
    type: pedagogical
    description: >
      Syllable counting explanation for Ї is nonsensical: "Ї counts as one
      syllable because the Й part is a consonant". Correct: Ї forms a
      syllable because it contains the vowel І.
    source: "M02 review pass 2"
    date_added: "2026-03-17"
