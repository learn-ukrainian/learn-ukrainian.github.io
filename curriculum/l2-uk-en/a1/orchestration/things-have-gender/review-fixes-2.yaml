    about "I have a pen"? **У мене є ручка.** And "I have a photo"? **У мене є фото.**
    Whether masculine, feminine, or neuter — the structure stays the same, and the
    gender of the object determines which possessive to use if you need one.


    You can now identify the gender of any common Ukrainian noun by looking at its
    ending, confirm it with the pronoun test, select the correct possessive, and combine
    all of this with **У мене є** to describe what you have.'
