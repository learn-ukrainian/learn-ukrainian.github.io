- type: quiz
  title: "Check Your Knowledge"
  instruction: "Choose the correct answer based on what you have learned."
  items:
    - question: "Which two transport words are frozen and never change their endings?"
      explanation: "Метро and таксі are borrowed words ending in vowels that never change."
      options:
        - text: "метро, таксі"
          correct: true
        - text: "автобус, трамвай"
          correct: false
        - text: "машина, валіза"
          correct: false
        - text: "вокзал, аеропорт"
          correct: false
    - question: "What is the specific Ukrainian word used for the action of traveling by a vehicle?"
      explanation: "Їхати means to ride or go by a vehicle. It is not used for walking."
      options:
        - text: "їхати"
          correct: true
        - text: "прямо"
          correct: false
        - text: "далеко"
          correct: false
        - text: "туди"
          correct: false
    - question: "Which specific word asks Where to? indicating a destination?"
      explanation: "Куди is used specifically to ask about a destination."
      options:
        - text: "куди"
          correct: true
        - text: "де"
          correct: false
        - text: "що"
          correct: false
        - text: "хто"
          correct: false
    - question: "What does the word прямо mean?"
      explanation: "Прямо means straight ahead."
      options:
        - text: "straight"
          correct: true
        - text: "right"
          correct: false
        - text: "left"
          correct: false
        - text: "back"
          correct: false
    - question: "Where do you wait for a local city bus?"
      explanation: "Зупинка is a local stop for buses or trams."
      options:
        - text: "зупинка"
          correct: true
        - text: "вокзал"
          correct: false
        - text: "аеропорт"
          correct: false
        - text: "валіза"
          correct: false
    - question: "What do you always need to ride public transport?"
      explanation: "A квиток (ticket) is required to ride public transport."
      options:
        - text: "квиток"
          correct: true
        - text: "валіза"
          correct: false
        - text: "пасажир"
          correct: false
        - text: "дорога"
          correct: false

- type: true-false
  title: "True or False?"
  instruction: "Decide if the statement is true or false."
  items:
    - statement: "The word прямо means to turn right."
      correct: false
      explanation: "Прямо means straight ahead. Направо means to the right."
    - statement: "A вокзал is a large central train station."
      correct: true
      explanation: "Вокзал is the bustling heart of intercity train travel."
    - statement: "You use the word зупинка when talking about a large airport."
      correct: false
      explanation: "Зупинка means a small stop for a local city bus or tram."
    - statement: "The word таксі changes its ending depending on how it is used in a sentence."
      correct: false
      explanation: "Таксі is a frozen word and never changes its ending."
    - statement: "The question word куди specifically means where to."
      correct: true
      explanation: "Куди is used to ask about the destination of movement."
    - statement: "Укрзалізниця is the name of the Ukrainian railway system."
      correct: true
      explanation: "Ukrainian Railways are famous for keeping people connected across vast distances."

- type: fill-in
  title: "Complete the Sentence"
  instruction: "Choose the correct word to complete the sentence."
  items:
    - sentence: "Антон їде на ___."
      answer: "вокзал"
      options:
        - "вокзал"
        - "метро"
        - "машина"
        - "валіза"
    - sentence: "Машина їде ___, а потім наліво."
      answer: "прямо"
      options:
        - "прямо"
        - "квиток"
        - "зупинка"
        - "аеропорт"
    - sentence: "Де моя ___?"
      answer: "валіза"
      options:
        - "валіза"
        - "поїзд"
        - "вокзал"
        - "автобус"
    - sentence: "Ми маємо ___."
      answer: "квиток"
      options:
        - "квиток"
        - "швидко"
        - "направо"
        - "далеко"
    - sentence: "___ їде поїзд?"
      answer: "Куди"
      options:
        - "Куди"
        - "Швидко"
        - "Прямо"
        - "Далеко"
    - sentence: "Це гарна ___."
      answer: "подорож"
      options:
        - "подорож"
        - "поїзд"
        - "трамвай"
        - "тролейбус"

- type: unjumble
  title: "Build the Sentence"
  instruction: "Put the words in the correct order to form a sentence."
  items:
    - words:
        - "Автобус"
        - "їде"
        - "прямо."
      answer: "Автобус їде прямо."
    - words:
        - "Я"
        - "їду"
        - "на"
        - "вокзал."
      answer: "Я їду на вокзал."
    - words:
        - "Вона"
        - "їде"
        - "в"
        - "аеропорт."
      answer: "Вона їде в аеропорт."
    - words:
        - "Антон"
        - "бачить"
        - "великий"
        - "поїзд."
      answer: "Антон бачить великий поїзд."

- type: quiz
  title: "Story Comprehension"
  instruction: "Answer the questions based on Anton's journey."
  items:
    - question: "Where is Anton going?"
      explanation: "The text says Anton is going to the train station."
      options:
        - text: "to the train station"
          correct: true
        - text: "to the airport"
          correct: false
        - text: "to the bus stop"
          correct: false
        - text: "to his car"
          correct: false
    - question: "How is Anton traveling to the station?"
      explanation: "The story states that he is going by taxi."
      options:
        - text: "by taxi"
          correct: true
        - text: "by metro"
          correct: false
        - text: "by tram"
          correct: false
        - text: "on foot"
          correct: false
    - question: "Which directions does the taxi take?"
      explanation: "The text says the car goes straight, and then to the left."
      options:
        - text: "straight, then left"
          correct: true
        - text: "straight, then right"
          correct: false
        - text: "right, then left"
          correct: false
        - text: "right, then straight"
          correct: false
    - question: "What does Anton see at the station?"
      explanation: "He sees a large train."
      options:
        - text: "a large train"
          correct: true
        - text: "a fast bus"
          correct: false
        - text: "a slow tram"
          correct: false
        - text: "his suitcase"
          correct: false
    - question: "Where is the train going?"
      explanation: "The train is going to Odesa."
      options:
        - text: "to Odesa"
          correct: true
        - text: "to Kyiv"
          correct: false
        - text: "to Lviv"
          correct: false
        - text: "to the airport"
          correct: false
    - question: "Does the text mention that the journey to Odesa is near or far?"
      explanation: "The text says it is far (Це далеко)."
      options:
        - text: "it is far"
          correct: true
        - text: "it is near"
          correct: false
        - text: "it is short"
          correct: false
        - text: "it is fast"
          correct: false