- find: '**Group II verbs** often drop the infinitive ending **-ти** and replace it
    with **-и** or sometimes just leave a soft consonant.

    *   **говорити** (to speak) → **говори** (speak!)

    *   **ходити** (to walk/go) → **ходи** (walk!)

    *   **дивитися** (to look/watch) → **дивись** (look!) — notice the **-ся** becomes
    **-сь**.

    *   **писати** (to write) → **пиши** (write!) — notice the consonant changes from
    **с** to **ш**.'
