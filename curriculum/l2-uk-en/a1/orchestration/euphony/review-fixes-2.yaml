- find: 'Use **у** between two consonants. If the previous word ends in a consonant,
    and the next word starts with a consonant, saying **в** would force you to pronounce
    three consonants in a row. Ukrainian uses **у** to break them up.

    *   Тарас **у** Львові. *(Taras is in Lviv.)*

    *   Максим **у** банку. *(Maksym is in the bank.)*

    *   Він працює **у** школі. *(He works in a school.)*'
  replace: 'Use **у** between two consonants. If the previous word ends in a consonant,
    and the next word starts with a consonant, saying **в** would force you to pronounce
    three consonants in a row. Ukrainian uses **у** to break them up.

    *   Тарас **у** Львові. *(Taras is in Lviv.)*

    *   Максим **у** банку. *(Maksym is in the bank.)*

    *   Брат **у** школі. *(The brother is at school.)*


    Before a vowel, **в** is used regardless of what comes before:

    *   Він працює **в** офісі. *(He works in an office.)*

    *   Потім **в** університет. *(Then to the university.)*'
- find: Use **й** after a vowel. This provides a soft, gliding consonant sound that
    smooths the transition to the next word.
  replace: Use **й** after a vowel, especially before another vowel. This provides
    a soft, gliding consonant sound that smooths the transition to the next word.
