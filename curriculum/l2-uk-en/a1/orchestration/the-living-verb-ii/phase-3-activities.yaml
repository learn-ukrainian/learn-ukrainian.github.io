- type: group-sort
  title: 'Тип 1 чи Тип 2?'
  instruction: 'Розподіліть дієслова за групами відповідно до їхнього закінчення в інфінітиві (-ати чи -ити).'
  groups:
    - name: 'Перша дієвідміна (-ати)'
      items:
        - 'читати'
        - 'слухати'
        - 'думати'
        - 'знати'
        - 'мати'
    - name: 'Друга дієвідміна (-ити)'
      items:
        - 'говорити'
        - 'робити'
        - 'любити'
        - 'ходити'
        - 'бачити'
        - 'вчити'

- type: match-up
  title: 'Я і моя дія'
  instruction: 'З’єднайте інфінітив з правильною формою "Я" (I).'
  pairs:
    - left: 'говорити'
      right: 'я говорю'
    - left: 'робити'
      right: 'я роблю'
    - left: 'любити'
      right: 'я люблю'
    - left: 'сидіти'
      right: 'я сиджу'
    - left: 'ходити'
      right: 'я ходжу'
    - left: 'платити'
      right: 'я плачу'

- type: quiz
  title: 'Правила другої дієвідміни'
  instruction: 'Оберіть правильну відповідь на запитання про граматику.'
  items:
    - question: 'Яка літера є маркерем другої дієвідміни у закінченнях?'
      explanation: 'Друга дієвідміна використовує літеру "и" (або "і/ї"), наприклад: робиш, робить.'
      options:
        - text: 'и'
          correct: true
        - text: 'е'
          correct: false
        - text: 'є'
          correct: false
        - text: 'у'
          correct: false
    - question: 'Яке закінчення мають дієслова другої дієвідміни для займенника "вони"?'
      explanation: 'У другій дієвідміні "вони" мають закінчення -ять (або -ать), на відміну від -ють у першій.'
      options:
        - text: '-ять'
          correct: true
        - text: '-ють'
          correct: false
        - text: '-емо'
          correct: false
        - text: '-йте'
          correct: false
    - question: 'Чому у слові "роблю" з’являється літера "л"?'
      explanation: 'Літера "л" додається для милозвучності після губних приголосних (б, п, в, м, ф).'
      options:
        - text: 'Для зручної вимови'
          correct: true
        - text: 'Це помилка'
          correct: false
        - text: 'Так історично склалося'
          correct: false
        - text: 'Це випадковість'
          correct: false
    - question: 'Як змінюється приголосний у слові "ходити" для форми "я"?'
      explanation: 'Дієслово "ходити" має чергування д → дж у формі "я": ходжу.'
      options:
        - text: 'д змінюється на дж'
          correct: true
        - text: 'д змінюється на ж'
          correct: false
        - text: 'д не змінюється'
          correct: false
        - text: 'д зникає'
          correct: false
    - question: 'До якої дієвідміни належить слово "їсти"?'
      explanation: 'Слово "їсти" є архаїчним і має унікальні закінчення, воно не належить до типових груп.'
      options:
        - text: 'Це виняток з унікальними закінченнями'
          correct: true
        - text: 'До першої (-ати)'
          correct: false
        - text: 'До другої (-ити)'
          correct: false
        - text: 'Це не дієслово'
          correct: false
    - question: 'Яке з цих слів належить до другої дієвідміни?'
      explanation: 'Бачити закінчується на -ити і належить до другої дієвідміни.'
      options:
        - text: 'бачити'
          correct: true
        - text: 'читати'
          correct: false
        - text: 'співати'
          correct: false
        - text: 'мати'
          correct: false

- type: fill-in
  title: 'Правильні закінчення'
  instruction: 'Оберіть правильну форму дієслова для кожного речення.'
  items:
    - sentence: 'Ти ___ дуже добре і швидко.'
      answer: 'говориш'
      explanation: 'Для "ти" у другій дієвідміні закінчення -иш.'
      options:
        - 'говориш'
        - 'говорить'
        - 'говорю'
        - 'говорять'
    - sentence: 'Ми ___ домашнє завдання разом.'
      answer: 'робимо'
      explanation: 'Для "ми" закінчення -имо.'
      options:
        - 'робимо'
        - 'робить'
        - 'робите'
        - 'роблю'
    - sentence: 'Вони ___ красиву картину в музеї.'
      answer: 'бачать'
      explanation: 'Для "вони" закінчення -ять (або -ать після шиплячих).'
      options:
        - 'бачать'
        - 'бачить'
        - 'бачимо'
        - 'бачиш'
    - sentence: 'Ви часто ___ в цей парк?'
      answer: 'ходите'
      explanation: 'Для "ви" закінчення -ите.'
      options:
        - 'ходите'
        - 'ходиш'
        - 'ходимо'
        - 'ходить'
    - sentence: 'Він ___ читати цікаві книги.'
      answer: 'любить'
      explanation: 'Для "він" закінчення -ить.'
      options:
        - 'любить'
        - 'люблю'
        - 'люблять'
        - 'любиш'
    - sentence: 'Я ___ українською мовою.'
      answer: 'говорю'
      explanation: 'Для "я" закінчення -ю.'
      options:
        - 'говорю'
        - 'говорить'
        - 'говориш'
        - 'говорять'

- type: match-up
  title: 'Знайди пару: Я роблю...'
  instruction: 'З’єднайте інфінітив з його формою для "я" (зверніть увагу на зміни звуків).'
  pairs:
    - left: 'робити'
      right: 'роблю'
    - left: 'любити'
      right: 'люблю'
    - left: 'спати'
      right: 'сплю'
    - left: 'сидіти'
      right: 'сиджу'
    - left: 'ходити'
      right: 'ходжу'
    - left: 'бачити'
      right: 'бачу'

- type: fill-in
  title: 'Їсти чи Пити?'
  instruction: 'Оберіть правильну форму дієслів "їсти" або "пити".'
  items:
    - sentence: 'Зранку я завжди ___ чорну каву.'
      answer: "п'ю"
      explanation: 'Форма "я" для "пити" — п’ю.'
      options:
        - "п'ю"
        - "п'єш"
        - "п'є"
        - "п'ють"
    - sentence: 'Ти ___ смачне червоне яблуко.'
      answer: 'їси'
      explanation: 'Унікальна форма "ти" для "їсти" — їси.'
      options:
        - 'їси'
        - 'їм'
        - 'їсть'
        - 'їдять'
    - sentence: 'Ми ___ гарячий чай з лимоном.'
      answer: "п'ємо"
      explanation: 'Форма "ми" для "пити" — п’ємо.'
      options:
        - "п'ємо"
        - "п'єте"
        - "п'ють"
        - "п'є"
    - sentence: 'Вони ___ смачну італійську піцу.'
      answer: 'їдять'
      explanation: 'Форма "вони" для "їсти" — їдять.'
      options:
        - 'їдять'
        - 'їмо'
        - 'їсте'
        - 'їсть'
    - sentence: 'Він ___ холодну воду.'
      answer: "п'є"
      explanation: 'Форма "він" для "пити" — п’є.'
      options:
        - "п'є"
        - "п'єш"
        - "п'ють"
        - "п'ю"
    - sentence: 'Я ___ суп на обід.'
      answer: 'їм'
      explanation: 'Коротка форма "я" для "їсти" — їм.'
      options:
        - 'їм'
        - 'їси'
        - 'їсть'
        - 'їдять'

- type: unjumble
  title: 'Складіть речення'
  instruction: 'Розставте слова у правильному порядку, щоб утворити речення.'
  items:
    - words:
        - 'Я'
        - 'люблю'
        - 'каву'
      answer: 'Я люблю каву'
    - words:
        - 'Ми'
        - 'говоримо'
        - 'українською'
      answer: 'Ми говоримо українською'
    - words:
        - 'Він'
        - 'робить'
        - 'помилки'
      answer: 'Він робить помилки'
    - words:
        - 'Ти'
        - 'бачиш'
        - 'парк'
      answer: 'Ти бачиш парк'
    - words:
        - 'Вони'
        - 'хочуть'
        - 'їсти'
      answer: 'Вони хочуть їсти'
    - words:
        - 'Ви'
        - "п'єте"
        - 'чай'
      answer: "Ви п'єте чай"

- type: true-false
  title: 'Правда чи ні?'
  instruction: 'Визначте, чи є твердження граматично правильним.'
  items:
    - statement: 'Дієслово "читати" належить до другої дієвідміни (-ити).'
      correct: false
      explanation: '"Читати" — це перша дієвідміна (-ати).'
    - statement: 'Форма "я роблю" має літеру "л" для милозвучності.'
      correct: true
      explanation: 'Так, це явище називається "губний л".'
    - statement: 'Правильно казати "ти робеш".'
      correct: false
      explanation: 'Неправильно. У другій дієвідміні пишемо -иш: "ти робиш".'
    - statement: 'Дієслово "їсти" має форму "я їм".'
      correct: true
      explanation: 'Це правильна архаїчна форма.'
    - statement: 'Форма "вони" для слова "говорити" — "говорють".'
      correct: false
      explanation: 'Неправильно. Правильна форма — "говорять".'
    - statement: 'Дієслово "бачити" належить до другої дієвідміни.'
      correct: true
      explanation: 'Так, бо інфінітив закінчується на -ити.'

- type: anagram
  title: 'Нові слова'
  instruction: 'Розшифруйте дієслова з уроку.'
  items:
    - scrambled: 'г о в о р и т и'
      answer: 'говорити'
      hint: 'to speak'
    - scrambled: 'р о б и т и'
      answer: 'робити'
      hint: 'to do'
    - scrambled: 'б а ч и т и'
      answer: 'бачити'
      hint: 'to see'
    - scrambled: 'л ю б и т и'
      answer: 'любити'
      hint: 'to love'
    - scrambled: 'х о д и т и'
      answer: 'ходити'
      hint: 'to walk'
    - scrambled: 'с и д і т и'
      answer: 'сидіти'
      hint: 'to sit'

- type: fill-in
  title: 'Контекст: Що ми робимо?'
  instruction: 'Оберіть правильне слово для контексту.'
  items:
    - sentence: 'Я ___ зарядку кожного ранку.'
      answer: 'роблю'
      explanation: 'Робити зарядку — to do exercises.'
      options:
        - 'роблю'
        - 'робиш'
        - 'робить'
        - 'роблять'
    - sentence: 'Ми ___ з другом про фільм.'
      answer: 'говоримо'
      explanation: 'Говорити про фільм — to speak about a movie.'
      options:
        - 'говоримо'
        - 'говорите'
        - 'говорять'
        - 'говорить'
    - sentence: 'Ти ___ мене?'
      answer: 'бачиш'
      explanation: 'Бачити когось — to see someone.'
      options:
        - 'бачиш'
        - 'бачать'
        - 'бачить'
        - 'бачу'
    - sentence: 'Вони ___ у парку.'
      answer: 'ходять'
      explanation: 'Ходити в парку — to walk in the park.'
      options:
        - 'ходять'
        - 'ходиш'
        - 'ходить'
        - 'ходимо'
    - sentence: 'Ви ___ українську музику?'
      answer: 'любите'
      explanation: 'Любити музику — to love music.'
      options:
        - 'любите'
        - 'любиш'
        - 'люблять'
        - 'любимо'
    - sentence: 'Він ___ на стільці.'
      answer: 'сидить'
      explanation: 'Сидіти на стільці — to sit on a chair.'
      options:
        - 'сидить'
        - 'сиджу'
        - 'сидять'
        - 'сидиш'
