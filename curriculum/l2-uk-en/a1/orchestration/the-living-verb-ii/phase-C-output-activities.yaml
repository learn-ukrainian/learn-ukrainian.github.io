- type: true-false
  title: True or False?
  instruction: Decide if the verb form correctly matches the subject.
  items:
    - statement: 'The correct form for "I do" is "я робю".'
      correct: false
      explanation: False. Due to the labial mutation, we add an л, so it is "я роблю".
    - statement: 'The correct form for "you speak" is "ти говориш".'
      correct: true
      explanation: True. Class II verbs use -иш for the "ти" form.
    - statement: 'The correct form for "he pays" is "він плаче".'
      correct: false
      explanation: 'False. The "він" form takes -ить (він платить). The mutation only happens in the "я" form (я плачу).'
    - statement: 'The irregular verb "to eat" has the form "я їм".'
      correct: true
      explanation: 'True. The verb "їсти" is irregular and its "я" form is "їм".'
    - statement: 'The correct form for "we eat" is "ми їмо".'
      correct: true
      explanation: 'True. The form for "ми" is "їмо".'
    - statement: 'The correct form for "I walk" is "я ходю".'
      correct: false
      explanation: 'False. The consonant д mutates to дж, making it "я ходжу".'
    - statement: 'The correct form for "they love" is "вони люблять".'
      correct: true
      explanation: 'True. The "вони" form is "люблять".'
    - statement: 'The correct form for "I sit" is "я сиджу".'
      correct: true
      explanation: 'True. The consonant д mutates to дж in the "я" form.'

