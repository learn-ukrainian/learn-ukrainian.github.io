- type: quiz
  title: Check Your Understanding
  instruction: Choose the correct answer.
  items:
    - question: Which vowel sound is characteristic of Class II verb endings?
      options:
        - text: 'Е or Є'
          correct: false
        - text: 'И or І'
          correct: true
        - text: 'А or Я'
          correct: false
        - text: 'У or Ю'
          correct: false
      explanation: Class II verbs rely on the и or і sounds in most forms.
    - question: 'How do you say "I speak" in Ukrainian?'
      options:
        - text: я говориш
          correct: false
        - text: я говорю
          correct: true
        - text: я говоримо
          correct: false
        - text: я говорить
          correct: false
      explanation: The pronoun я takes the -ю ending.
    - question: 'Which form represents "he speaks"?'
      options:
        - text: він говорить
          correct: true
        - text: він говорять
          correct: false
        - text: він говорите
          correct: false
        - text: він говоримо
          correct: false
      explanation: 'For він (he), the ending is -ить.'
    - question: 'What is the "я" (I) form of the verb робити (to do)?'
      options:
        - text: я роблю
          correct: true
        - text: я робю
          correct: false
        - text: я роблу
          correct: false
        - text: я робу
          correct: false
      explanation: This verb has a labial mutation adding an л (я роблю).
    - question: 'What is the "я" (I) form of the verb ходити (to walk)?'
      options:
        - text: я ходжу
          correct: true
        - text: я ходю
          correct: false
        - text: я хожу
          correct: false
        - text: я ходу
          correct: false
      explanation: The consonant д changes to дж in the я form.
    - question: 'Which verb is highly irregular and means "to eat"?'
      options:
        - text: пити
          correct: false
        - text: їсти
          correct: true
        - text: бачити
          correct: false
        - text: любити
          correct: false
      explanation: The verb їсти is irregular and essential for the Triad of Hospitality.
    - question: 'How do you say "we eat" in Ukrainian?'
      options:
        - text: ми їмо
          correct: true
        - text: ми їдять
          correct: false
        - text: ми їсте
          correct: false
        - text: ми їм
          correct: false
      explanation: The form for ми (we) is їмо.
    - question: 'Which verb do you use to describe the physical ability to see?'
      options:
        - text: дивитися
          correct: false
        - text: бачити
          correct: true
        - text: говорити
          correct: false
        - text: сидіти
          correct: false
      explanation: Бачити means to see (the result of sight), while дивитися means to watch.

