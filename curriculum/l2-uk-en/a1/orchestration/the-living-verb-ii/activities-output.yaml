          correct: true
        - text: "ти робиш"
          correct: false
        - text: "він робить"
          correct: false
        - text: "ми робимо"
          correct: false
      explanation: "Робити is Second Conjugation, so ти-form is робиш (not робеш with First Conjugation ending)."
    - question: "Which form is INCORRECT?"
      options:
        - text: "вони ходють"
          correct: true
        - text: "вони ходять"
          correct: false
        - text: "ти ходиш"
          correct: false
        - text: "він ходить"
          correct: false
      explanation: "Second Conjugation вони-form is -ять: вони ходять (not ходють)."
    - question: "Which form is INCORRECT?"
      options:
        - text: "я ходю"
          correct: true
        - text: "я ходжу"
          correct: false
        - text: "ти ходиш"
          correct: false
        - text: "ми ходимо"
          correct: false
      explanation: "Mutation д → дж in the я-form: я ходжу (not ходю)."
    - question: "Which form is INCORRECT?"
      options:
        - text: "я робю"
          correct: true
        - text: "я роблю"
          correct: false
        - text: "він робить"
          correct: false
        - text: "вони роблять"
          correct: false
      explanation: "Labial б needs л before ю: я роблю (not робю)."
    - question: "Which form is INCORRECT?"
      options:
        - text: "він любе"
          correct: true
        - text: "він любить"
          correct: false
        - text: "я люблю"
          correct: false
        - text: "ти любиш"
          correct: false
      explanation: "Любити is Second Conjugation: він любить (not любе with First Conjugation ending)."
    - question: "Which form is INCORRECT?"
      options:
        - text: "я їджу"
          correct: true
        - text: "я їм"
          correct: false
        - text: "ти їси"
          correct: false
