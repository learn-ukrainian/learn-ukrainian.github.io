- type: true-false
  title: "True or False?"
  instruction: "Decide whether each statement about the Ukrainian alphabet is true or false."
  items:
    - statement: "The Ukrainian alphabet has 33 letters."
      correct: true
      explanation: "True! Ukrainian has 33 letters — 10 vowels, 22 consonants, and 1 modifier (Ь)."
    - statement: "The Ukrainian letter Н makes the same sound as English H."
      correct: false
      explanation: "False! Н looks like H but sounds like N. This is the most common trap for English speakers."
    - statement: "Ukrainian has 10 vowel letters."
      correct: true
      explanation: "True! There are 6 base vowels (А О У Е И І) and 4 iotated vowels (Я Ю Є Ї)."
    - statement: "The letter С in Ukrainian sounds like the English K sound."
      correct: false
      explanation: "False! С looks like English C but always makes the S sound — never K."
    - statement: "Every Ukrainian syllable contains exactly one vowel."
      correct: true
      explanation: "True! Count the vowels in a word to know how many syllables it has."
    - statement: "The soft sign Ь makes its own sound."
      correct: false
      explanation: "False! Ь has no sound of its own — it modifies the consonant before it."
    - statement: "Ukrainian spelling is highly phonetic — each letter usually maps to one sound."
      correct: true
      explanation: "True! Unlike English, you can read almost any Ukrainian word aloud just by knowing the letters."
    - statement: "The letter У in Ukrainian sounds like English Y."
      correct: false
      explanation: "False! У looks a bit like Y but sounds like 'oo' as in 'moon'."

- type: group-sort
