  instruction: "Choose the correct answer for each question."
  items:
    - question: "Which Ukrainian word means 'mom'?"
      options:
        - text: "мама"
          correct: true
        - text: "масло"
          correct: false
        - text: "місто"
          correct: false
        - text: "молоко"
          correct: false
      explanation: "Мама means mom — it was likely your first Ukrainian word!"
    - question: "Which Ukrainian word means 'cat'?"
      options:
        - text: "мак"
          correct: false
        - text: "кіт"
          correct: true
        - text: "кіно"
          correct: false
        - text: "ліс"
          correct: false
      explanation: "Кіт means cat — К + І + Т."
    - question: "Which letter looks like English H but sounds like N?"
      options:
        - text: "Н"
          correct: true
        - text: "М"
          correct: false
        - text: "С"
          correct: false
        - text: "Т"
          correct: false
      explanation: "Н is the biggest visual trap — it looks like H but always sounds like N."
    - question: "Which Ukrainian word means 'milk'?"
      options:
        - text: "масло"
          correct: false
        - text: "місто"
          correct: false
        - text: "молоко"
          correct: true
        - text: "мало"
          correct: false
      explanation: "Молоко means milk — М + О + Л + О + К + О, three syllables."
    - question: "How many letters are in the Ukrainian alphabet?"
      options:
        - text: "26"
          correct: false
        - text: "33"
          correct: true
        - text: "28"
          correct: false
        - text: "36"
          correct: false
