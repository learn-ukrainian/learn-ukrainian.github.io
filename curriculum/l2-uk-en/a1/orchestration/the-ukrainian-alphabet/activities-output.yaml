- type: true-false
  title: "Letter Facts"
  instruction: "Are these statements true or false?"
  items:
    - statement: "The letter Н sounds like the English H."
      correct: false
      explanation: "Н looks like an English H, but it sounds like N."
    - statement: "The letter С makes an S sound."
      correct: true
      explanation: "С looks like C but always sounds like S."
    - statement: "The letter О is a vowel (голосні)."
      correct: true
      explanation: "О is a vowel."
    - statement: "The letter М is a consonant (приголосні)."
      correct: true
      explanation: "М is a consonant."
    - statement: "The Ukrainian alphabet has exactly 33 letters."
      correct: true
      explanation: "There are 33 letters in the alphabet."
    - statement: "Letters (букви) and sounds (звуки) are the exact same thing."
      correct: false
      explanation: "Letters are what you write; sounds are what you hear."

- type: anagram
  title: "Word Scramble"
  instruction: "Rearrange the letters to form words."
  items:
    - scrambled: "А М А М"
      answer: "мама"
    - scrambled: "А Т О Т"
      answer: "тато"
    - scrambled: "О К А Л О М"
      answer: "молоко"
    - scrambled: "С О Л М А"
      answer: "масло"
    - scrambled: "О К О"
      answer: "око"
    - scrambled: "І М С О Т"
      answer: "місто"
    - scrambled: "І К Т"
      answer: "кіт"
    - scrambled: "У Л К"
      answer: "лук"

- type: match-up
  title: "Letter Sounds"
  instruction: "Match the Cyrillic letter to its sound."
  pairs:
    - left: "Н"
      right: "N sound"
    - left: "С"
      right: "S sound"
    - left: "У"
      right: "OO sound"
    - left: "М"
      right: "M sound"
    - left: "А"
      right: "A sound"
    - left: "І"
      right: "EE sound"

- type: fill-in
  title: "Complete the Word"
  instruction: "Choose the correct missing letter."
  items:
    - sentence: "м _ м а (mom)"
      answer: "а"
      options:
        - "а"
        - "о"
        - "у"
        - "і"
    - sentence: "т _ т о (dad)"
      answer: "а"
      options:
        - "а"
        - "о"
        - "у"
        - "і"
    - sentence: "к _ т (cat)"
      answer: "і"
      options:
        - "і"
        - "а"
        - "о"
        - "у"
    - sentence: "м _ с т о (city)"
      answer: "і"
      options:
        - "і"
        - "а"
        - "о"
        - "у"
    - sentence: "л _ с (forest)"
      answer: "і"
      options:
        - "і"
        - "а"
        - "о"
        - "у"
    - sentence: "с _ к (juice)"
      answer: "і"
      options:
        - "і"
        - "а"
        - "о"
        - "у"

