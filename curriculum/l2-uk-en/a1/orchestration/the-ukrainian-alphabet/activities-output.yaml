- type: image-to-letter
  title: 'Match Picture to Starting Letter'
  instruction: 'Look at the emoji and select the letter the Ukrainian word starts with.'
  items:
    - emoji: '👩'
      answer: 'М'
      distractors: ['Н', 'Т', 'К']
      note: 'мама (mom)'
    - emoji: '🐈'
      answer: 'К'
      distractors: ['М', 'С', 'Л']
      note: 'кіт (cat)'
    - emoji: '🥛'
      answer: 'М'
      distractors: ['О', 'С', 'Н']
      note: 'молоко (milk)'
    - emoji: '👁️'
      answer: 'О'
      distractors: ['А', 'У', 'І']
      note: 'око (eye)'
    - emoji: '🌲'
      answer: 'Л'
      distractors: ['Т', 'С', 'М']
      note: 'ліс (forest)'
    - emoji: '🏙️'
      answer: 'М'
      distractors: ['Н', 'Л', 'С']
      note: 'місто (city)'
    - emoji: '👨'
      answer: 'Т'
      distractors: ['К', 'С', 'М']
      note: 'тато (dad)'
    - emoji: '💤'
      answer: 'С'
      distractors: ['О', 'М', 'Н']
      note: 'сон (dream)'

- type: classify
  title: 'Vowels vs Consonants'
  instruction: 'Sort the 10 practice letters into vowels (голосні) and consonants (приголосні).'
  categories:
    - label: 'Голосні (Vowels)'
      symbol_hint: 'vowel'
      items: ['А', 'О', 'У', 'І']
    - label: 'Приголосні (Consonants)'
      symbol_hint: 'consonant'
      items: ['М', 'Н', 'Т', 'К', 'С', 'Л']

- type: match-up
  title: 'Match Letter to Sound'
  instruction: 'Match each Ukrainian letter to its correct sound description.'
  pairs:
    - left: 'А'
      right: 'open "a" sound'
    - left: 'О'
      right: 'rounded "o" sound'
    - left: 'У'
      right: '"oo" sound'
    - left: 'І'
      right: '"ee" sound'
    - left: 'М'
      right: '"m" sound'
    - left: 'Н'
      right: '"n" sound (not H!)'
    - left: 'Т'
      right: '"t" sound'
    - left: 'К'
      right: '"k" sound'
    - left: 'С'
      right: '"s" sound (not C!)'
    - left: 'Л'
      right: '"l" sound'

- type: fill-in
  title: 'Build Syllables and Words'
  instruction: 'Choose the correct syllable or word built from the letters.'
  items:
    - sentence: 'М + А = ___'
      answer: 'МА'
      options: ['МА', 'АМ', 'МО', 'ОМ']
    - sentence: 'МА + МА = ___'
      answer: 'мама'
      options: ['мама', 'тато', 'масло', 'сало']
    - sentence: 'Т + А = ___'
      answer: 'ТА'
      options: ['ТА', 'АТ', 'ТО', 'ОТ']
    - sentence: 'ТА + ТО = ___'
      answer: 'тато'
      options: ['тато', 'мама', 'місто', 'молоко']
    - sentence: 'К + І = ___'
      answer: 'КІ'
      options: ['КІ', 'ІК', 'КО', 'ОК']
    - sentence: 'КІ + Т = ___'
      answer: 'кіт'
      options: ['кіт', 'сон', 'ліс', 'ніс']
    - sentence: 'С + О = ___'
      answer: 'СО'
      options: ['СО', 'СА', 'СУ', 'СІ']
    - sentence: 'СО + М = ___'
      answer: 'сом'
      options: ['сом', 'сон', 'мак', 'сік']

- type: quiz
  title: 'Read and Identify'
  instruction: 'Read the Ukrainian word and choose the correct meaning.'
  items:
    - question: 'What does the word "мама" mean?'
      options:
        - text: 'mom'
          correct: true
        - text: 'dad'
          correct: false
        - text: 'cat'
          correct: false
        - text: 'milk'
          correct: false
      explanation: 'МАМА means mom in Ukrainian.'
    - question: 'What does the word "кіт" mean?'
      options:
        - text: 'cat'
          correct: true
        - text: 'dog'
          correct: false
        - text: 'eye'
          correct: false
        - text: 'nose'
          correct: false
      explanation: 'КІТ means cat in Ukrainian.'
    - question: 'What does the word "молоко" mean?'
      options:
        - text: 'milk'
          correct: true
        - text: 'butter'
          correct: false
        - text: 'juice'
          correct: false
        - text: 'water'
          correct: false
      explanation: 'МОЛОКО means milk in Ukrainian.'
    - question: 'What does the word "місто" mean?'
      options:
        - text: 'city'
          correct: true
        - text: 'forest'
          correct: false
        - text: 'table'
          correct: false
        - text: 'cinema'
          correct: false
      explanation: 'МІСТО means city in Ukrainian.'
    - question: 'What does the word "ліс" mean?'
      options:
        - text: 'forest'
          correct: true
        - text: 'city'
          correct: false
        - text: 'table'
          correct: false
        - text: 'lard'
          correct: false
      explanation: 'ЛІС means forest in Ukrainian.'
    - question: 'What does the word "око" mean?'
      options:
        - text: 'eye'
          correct: true
        - text: 'nose'
          correct: false
        - text: 'dream'
          correct: false
        - text: 'dad'
          correct: false
      explanation: 'ОКО means eye in Ukrainian.'
    - question: 'What does the word "ніс" mean?'
      options:
        - text: 'nose'
          correct: true
        - text: 'eye'
          correct: false
        - text: 'cat'
          correct: false
        - text: 'yes'
          correct: false
      explanation: 'НІС means nose in Ukrainian.'
    - question: 'What does the word "тато" mean?'
      options:
        - text: 'dad'
          correct: true
        - text: 'mom'
          correct: false
        - text: 'dream'
          correct: false
        - text: 'there'
          correct: false
      explanation: 'ТАТО means dad in Ukrainian.'