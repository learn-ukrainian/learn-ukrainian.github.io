scores:
- dimension: 1
  name: Plan adherence
  score: 7
  evidence: The four planned sections are present, but the practice point in the plan
    asked for explicit core-verb paradigms and the module stops at `The verb **говорити**
    (to speak) follows the exact same logic.
- dimension: 2
  name: Linguistic accuracy
  score: 6
  evidence: The Ukrainian example sentences are fine, but the grammar explanation
    says `You simply remove this **-ти** ending...` and `Every verb follows the same
    predictable pattern...`, which is false for commo
- dimension: 3
  name: Pedagogical quality
  score: 6
  evidence: The module has a PPP shape, but it teaches an overgeneralized rule as
    fact and then introduces irregular `**провів вихідні**` later with no warning,
    which undermines the learner model it just taught.
- dimension: 4
  name: Vocabulary coverage
  score: 10
  evidence: 'All required vocabulary appears naturally in prose or inflected form:
    `учора`, `робив/робила`, `читав`, `працювала`, `гуляв`, `готувала`, `дивився`,
    `говорили`; recommended items like `вихідні`, `субо'
- dimension: 5
  name: Exercise quality
  score: 9
  evidence: 'All 3 expected markers are present and aligned to the plan: `matching-pronoun-ending`,
    `fill-in-core-verbs`, `fill-in-choose-gender`. Their placement follows the teaching
    sequence.'
- dimension: 6
  name: Engagement & tone
  score: 9
  evidence: The office/weekend scenario and named speakers keep the module teacherly
    and concrete, and the examples stay focused on the target grammar.
- dimension: 7
  name: Structural integrity
  score: 10
  evidence: '`## Dialogues`, `## Минулий час (Past Tense)`, `## Практика (Practice)`,
    and `## Summary` are all present and ordered correctly. The pipeline word count
    is 1626, so the module is safely above target.'
- dimension: 8
  name: Cultural accuracy
  score: 10
  evidence: The module presents Ukrainian on its own terms, with no Russian-centered
