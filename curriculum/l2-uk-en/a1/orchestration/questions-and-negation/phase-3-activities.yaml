- type: quiz
  title: "Основи запитань"
  instruction: "Перевірте своє розуміння того, як ставити запитання та заперечувати в українській мові."
  items:
    - question: "Яке слово ми додаємо на початок речення, щоб створити формальне запитання?"
      explanation: "Частка «чи» перетворює ствердження на ввічливе або формальне запитання."
      options:
        - text: "чи"
          correct: true
        - text: "не"
          correct: false
        - text: "так"
          correct: false
        - text: "ні"
          correct: false
    - question: "Як поставити запитання без слова «чи»?"
      explanation: "В українській мові можна створити запитання, просто змінивши інтонацію на висхідну."
      options:
        - text: "змінити інтонацію"
          correct: true
        - text: "додати «не»"
          correct: false
        - text: "змінити порядок слів"
          correct: false
        - text: "додати слово «do»"
          correct: false
    - question: "Де стоїть частка «не» у реченні?"
      explanation: "Частка «не» завжди стоїть безпосередньо перед словом, яке вона заперечує (зазвичай перед дієсловом)."
      options:
        - text: "перед дієсловом"
          correct: true
        - text: "після дієслова"
          correct: false
        - text: "на початку речення"
          correct: false
        - text: "в кінці речення"
          correct: false
    - question: "Чи потрібно перекладати англійське слово «do» у запитаннях?"
      explanation: "В українській мові ми не перекладаємо допоміжні дієслова (do/does) для створення запитань. Ми просто використовуємо головне дієслово."
      options:
        - text: "ні"
          correct: true
        - text: "так"
          correct: false
        - text: "іноді"
          correct: false
        - text: "завжди"
          correct: false
    - question: "Яке слово означає згоду?"
      explanation: "Слово «так» є стандартною відповіддю для вираження згоди."
      options:
        - text: "так"
          correct: true
        - text: "ні"
          correct: false
        - text: "не"
          correct: false
        - text: "чи"
          correct: false
    - question: "Яке слово ми використовуємо, щоб відповісти «No»?"
      explanation: "Слово «ні» використовується як відповідь на запитання."
      options:
        - text: "ні"
          correct: true
        - text: "не"
          correct: false
        - text: "чи"
          correct: false
        - text: "так"
          correct: false
    - question: "Яке питальне слово ми використовуємо для людей?"
      explanation: "Для людей та живих істот ми використовуємо питальне слово «Хто»."
      options:
        - text: "хто"
          correct: true
        - text: "що"
          correct: false
        - text: "де"
          correct: false
        - text: "коли"
          correct: false
    - question: "Яке питальне слово ми використовуємо для речей?"
      explanation: "Для неживих предметів та понять ми використовуємо питальне слово «Що»."
      options:
        - text: "що"
          correct: true
        - text: "хто"
          correct: false
        - text: "як"
          correct: false
        - text: "чому"
          correct: false

- type: match-up
  title: "Питальні слова"
  instruction: "З'єднайте українське питальне слово з його англійським перекладом."
  pairs:
    - left: "Хто?"
      right: "Who?"
    - left: "Що?"
      right: "What?"
    - left: "Де?"
      right: "Where?"
    - left: "Коли?"
      right: "When?"
    - left: "Чому?"
      right: "Why?"
    - left: "Як?"
      right: "How?"
    - left: "Скільки?"
      right: "How much?"
    - left: "Куди?"
      right: "Where to?"

- type: group-sort
  title: "Хто чи Що?"
  instruction: "Розподіліть слова на дві групи: ті, що відповідають на питання «Хто?» (істоти), і ті, що відповідають на питання «Що?» (неістоти)."
  groups:
    - name: "Хто? (Who?)"
      items: ["мама", "брат", "лікар", "студент", "кіт", "собака"]
    - name: "Що? (What?)"
      items: ["стіл", "книга", "кава", "телефон", "любов", "ідея"]

- type: fill-in
  title: "Оберіть правильне слово"
  instruction: "Доповніть речення правильним питальним словом відповідно до контексту."
  items:
    - sentence: "___ це? — Це мій тато."
      answer: "Хто"
      explanation: "Ми питаємо про людину (тато), тому використовуємо «Хто»."
      options: ["Хто", "Що", "Де", "Коли"]
    - sentence: "___ це? — Це смачна кава."
      answer: "Що"
      explanation: "Ми питаємо про неживий предмет (кава), тому використовуємо «Що»."
      options: ["Що", "Хто", "Де", "Як"]
    - sentence: "___ ти живеш? — Я живу тут."
      answer: "Де"
      explanation: "Ми питаємо про місцезнаходження, тому використовуємо «Де»."
      options: ["Де", "Куди", "Хто", "Що"]
    - sentence: "___ ми снідаємо? — Вранці."
      answer: "Коли"
      explanation: "Ми питаємо про час, тому використовуємо «Коли»."
      options: ["Коли", "Де", "Хто", "Що"]
    - sentence: "___ справи? — Чудово."
      answer: "Як"
      explanation: "Стандартне запитання про стан справ — «Як справи?»."
      options: ["Як", "Де", "Хто", "Що"]
    - sentence: "___ ти не спиш? — Бо я читаю."
      answer: "Чому"
      explanation: "Ми питаємо про причину, тому використовуємо «Чому»."
      options: ["Чому", "Де", "Хто", "Коли"]

- type: unjumble
  title: "Складіть запитання"
  instruction: "Розставте слова у правильному порядку, щоб утворити речення."
  items:
    - words: ["Чи", "ти", "знаєш"]
      answer: "Чи ти знаєш"
    - words: ["Де", "ти", "працюєш"]
      answer: "Де ти працюєш"
    - words: ["Що", "це", "таке"]
      answer: "Що це таке"
    - words: ["Коли", "ми", "йдемо"]
      answer: "Коли ми йдемо"
    - words: ["Чому", "ти", "мовчиш"]
      answer: "Чому ти мовчиш"
    - words: ["Чи", "це", "правда"]
      answer: "Чи це правда"

- type: fill-in
  title: "Скажіть «ні»"
  instruction: "Зробіть речення заперечним, додавши частку «не»."
  items:
    - sentence: "Я ___ знаю."
      answer: "не"
      explanation: "Заперечна частка «не» ставиться перед дієсловом."
      options: ["не", "ні", "так", "чи"]
    - sentence: "Він ___ розуміє."
      answer: "не"
      explanation: "Заперечна частка «не» ставиться перед дієсловом."
      options: ["не", "ні", "так", "чи"]
    - sentence: "Ми ___ хочемо."
      answer: "не"
      explanation: "Заперечна частка «не» ставиться перед дієсловом."
      options: ["не", "ні", "так", "чи"]
    - sentence: "Ти ___ читаєш."
      answer: "не"
      explanation: "Заперечна частка «не» ставиться перед дієсловом."
      options: ["не", "ні", "так", "чи"]
    - sentence: "Вона ___ тут."
      answer: "не"
      explanation: "Заперечна частка «не» ставиться перед словом, яке заперечує стан."
      options: ["не", "ні", "так", "чи"]
    - sentence: "Це ___ добре."
      answer: "не"
      explanation: "Заперечна частка «не» ставиться перед прислівником."
      options: ["не", "ні", "так", "чи"]

- type: match-up
  title: "Запитання та відповіді"
  instruction: "Знайдіть найбільш логічну відповідь для кожного запитання."
  pairs:
    - left: "Як справи?"
      right: "Добре, дякую."
    - left: "Хто це?"
      right: "Це мій друг."
    - left: "Що ти робиш?"
      right: "Я читаю."
    - left: "Де ти?"
      right: "Я вдома."
    - left: "Чи ти хочеш кави?"
      right: "Так, хочу."
    - left: "Чи це кіт?"
      right: "Ні, це собака."

- type: anagram
  title: "Розшифруйте слова"
  instruction: "Складіть правильні слова з перемішаних літер."
  items:
    - scrambled: "д е"
      answer: "де"
    - scrambled: "х т о"
      answer: "хто"
    - scrambled: "к а в а"
      answer: "кава"
    - scrambled: "с л о в о"
      answer: "слово"
    - scrambled: "ч о м у"
      answer: "чому"
    - scrambled: "к о л и"
      answer: "коли"

- type: unjumble
  title: "Складіть заперечення"
  instruction: "Розставте слова у правильному порядку, щоб утворити заперечні речення."
  items:
    - words: ["Я", "не", "розумію"]
      answer: "Я не розумію"
    - words: ["Він", "не", "знає"]
      answer: "Він не знає"
    - words: ["Ми", "не", "спимо"]
      answer: "Ми не спимо"
    - words: ["Це", "не", "важливо"]
      answer: "Це не важливо"
    - words: ["Вона", "не", "читає"]
      answer: "Вона не читає"
    - words: ["Ти", "не", "слухаєш"]
      answer: "Ти не слухаєш"

- type: fill-in
  title: "Ввічливі запитання"
  instruction: "Доповніть ввічливі запитання, додавши частку «Чи»."
  items:
    - sentence: "___ ви лікар?"
      answer: "Чи"
      explanation: "Ввічливе запитання часто починається з частки «Чи»."
      options: ["Чи", "Не", "Ні", "Так"]
    - sentence: "___ це ваш телефон?"
      answer: "Чи"
      explanation: "Ввічливе запитання часто починається з частки «Чи»."
      options: ["Чи", "Не", "Ні", "Так"]
    - sentence: "___ ми можемо увійти?"
      answer: "Чи"
      explanation: "Ввічливе запитання часто починається з частки «Чи»."
      options: ["Чи", "Не", "Ні", "Так"]
    - sentence: "___ ти любиш каву?"
      answer: "Чи"
      explanation: "Ввічливе запитання часто починається з частки «Чи»."
      options: ["Чи", "Не", "Ні", "Так"]
    - sentence: "___ це далеко?"
      answer: "Чи"
      explanation: "Ввічливе запитання часто починається з частки «Чи»."
      options: ["Чи", "Не", "Ні", "Так"]
    - sentence: "___ ви розумієте?"
      answer: "Чи"
      explanation: "Ввічливе запитання часто починається з частки «Чи»."
      options: ["Чи", "Не", "Ні", "Так"]
