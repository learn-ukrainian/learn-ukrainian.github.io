    - sentence: "На перше я буду ___."
      answer: "борщ"
      options: ["борщ", "борщу", "борщем", "борщі"]
    - sentence: "Він буде ___."
      answer: "піцу"
      options: ["піца", "піцу", "піці", "піцею"]
    - sentence: "На друге я буду ___."
      answer: "рибу"
      options: ["риба", "рибу", "рибі", "рибою"]
    - sentence: "Ти будеш ___?"
      answer: "воду"
      options: ["вода", "воду", "воді", "водою"]
    - sentence: "Вона буде ___."
      answer: "салат"
      options: ["салат", "салату", "салатом", "салаті"]
    - sentence: "Я буду замовляти ___."
      answer: "десерт"
      options: ["десерт", "десерту", "десертом", "десерті"]
    - sentence: "Я буду національну ___."
      answer: "страву"
      options: ["страва", "страву", "страві", "стравою"]

