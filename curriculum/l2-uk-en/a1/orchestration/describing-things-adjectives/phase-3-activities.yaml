- type: group-sort
  title: "Сортування за родом"
  instruction: "Розподіліть прикметники за родом (Look at the endings!)."
  groups:
    - name: "Він (Masculine)"
      items:
        - "новий"
        - "старий"
        - "гарний"
        - "синій"
    - name: "Вона (Feminine)"
      items:
        - "нова"
        - "стара"
        - "гарна"
        - "синя"
    - name: "Воно (Neuter)"
      items:
        - "нове"
        - "старе"
        - "гарне"
        - "синє"
    - name: "Вони (Plural)"
      items:
        - "нові"
        - "старі"
        - "гарні"
        - "сині"

- type: match-up
  title: "Знайдіть пару (Антоніми)"
  instruction: "Match the word with its opposite."
  pairs:
    - left: "великий"
      right: "малий"
    - left: "новий"
      right: "старий"
    - left: "добрий"
      right: "поганий"
    - left: "дорогий"
      right: "дешевий"
    - left: "гарний"
      right: "негарний"
    - left: "цікавий"
      right: "нудний"

- type: quiz
  title: "Граматична перевірка"
  instruction: "Оберіть правильну відповідь."
  items:
    - question: "Яке закінчення має слово «новий» (Masculine)?"
      options:
        - text: "-ий"
          correct: true
        - text: "-а"
          correct: false
        - text: "-е"
          correct: false
        - text: "-і"
          correct: false
      explanation: "Чоловічий рід твердої групи має закінчення -ий."
    - question: "Яке слово належить до «м'якої групи»?"
      options:
        - text: "синій"
          correct: true
        - text: "новий"
          correct: false
        - text: "гарний"
          correct: false
        - text: "старий"
          correct: false
      explanation: "Синій має закінчення -ій, тому це м'яка група."
    - question: "Яке питання ми ставимо до слова «книга» (вона)?"
      options:
        - text: "Яка?"
          correct: true
        - text: "Який?"
          correct: false
        - text: "Яке?"
          correct: false
        - text: "Які?"
          correct: false
      explanation: "Книга — жіночий рід, тому питання «Яка?»."
    - question: "Як правильно сказати «new window»?"
      options:
        - text: "нове вікно"
          correct: true
        - text: "новий вікно"
          correct: false
        - text: "нова вікно"
          correct: false
        - text: "нові вікно"
          correct: false
      explanation: "Вікно — середній рід (воно), тому «нове»."
    - question: "Яке питання ми ставимо до слова «дім» (він)?"
      options:
        - text: "Який?"
          correct: true
        - text: "Яка?"
          correct: false
        - text: "Яке?"
          correct: false
        - text: "Які?"
          correct: false
      explanation: "Дім — чоловічий рід, тому питання «Який?»."
    - question: "Де зазвичай стоїть прикметник в українській мові?"
      options:
        - text: "перед іменником"
          correct: true
        - text: "після іменника"
          correct: false
        - text: "в кінці речення"
          correct: false
        - text: "після дієслова"
          correct: false
      explanation: "Зазвичай прикметник стоїть перед іменником (новий дім)."
    - question: "Яке закінчення має слово «синя»?"
      options:
        - text: "-я"
          correct: true
        - text: "-а"
          correct: false
        - text: "-е"
          correct: false
        - text: "-і"
          correct: false
      explanation: "Синя — жіночий рід м'якої групи, закінчення -я."
    - question: "Яке слово означає «expensive»?"
      options:
        - text: "дорогий"
          correct: true
        - text: "дешевий"
          correct: false
        - text: "добрий"
          correct: false
        - text: "старий"
          correct: false
      explanation: "Дорогий means expensive."

- type: fill-in
  title: "Узгодження прикметників"
  instruction: "Оберіть правильну форму прикметника."
  items:
    - sentence: "Це ____ школа."
      answer: "нова"
      options:
        - "нова"
        - "новий"
        - "нове"
        - "нові"
      explanation: "Школа (вона) -> нова."
    - sentence: "Це ____ вікно."
      answer: "старе"
      options:
        - "старе"
        - "старий"
        - "стара"
        - "старі"
      explanation: "Вікно (воно) -> старе."
    - sentence: "Цей студент ____."
      answer: "добрий"
      options:
        - "добрий"
        - "добра"
        - "добре"
        - "добрі"
      explanation: "Студент (він) -> добрий."
    - sentence: "Ця дівчина ____."
      answer: "гарна"
      options:
        - "гарна"
        - "гарний"
        - "гарне"
        - "гарні"
      explanation: "Дівчина (вона) -> гарна."
    - sentence: "Це ____ місто."
      answer: "велике"
      options:
        - "велике"
        - "великий"
        - "велика"
        - "великі"
      explanation: "Місто (воно) -> велике."
    - sentence: "Це ____ ручка."
      answer: "синя"
      options:
        - "синя"
        - "синій"
        - "синє"
        - "сині"
      explanation: "Ручка (вона) -> синя."
    - sentence: "Це ____ книга."
      answer: "цікава"
      options:
        - "цікава"
        - "цікавий"
        - "цікаве"
        - "цікаві"
      explanation: "Книга (вона) -> цікава."
    - sentence: "Це ____ телефон."
      answer: "дорогий"
      options:
        - "дорогий"
        - "дорога"
        - "дороге"
        - "дорогі"
      explanation: "Телефон (він) -> дорогий."

- type: unjumble
  title: "Складіть речення"
  instruction: "Put the words in the correct order."
  items:
    - words: ["новий", "Це", "дім"]
      answer: "Це новий дім"
    - words: ["книга", "стара", "Це"]
      answer: "Це стара книга"
    - words: ["вікно", "велике", "Тут"]
      answer: "Тут велике вікно"
    - words: ["студент", "добрий", "Він"]
      answer: "Він добрий студент"
    - words: ["Цей", "дорогий", "телефон"]
      answer: "Цей телефон дорогий"
    - words: ["мала", "квартира", "Ця"]
      answer: "Ця квартира мала"

- type: match-up
  title: "Підберіть пару"
  instruction: "Match the noun with a logical adjective (watch the gender!)."
  pairs:
    - left: "квартира (вона)"
      right: "нова"
    - left: "дім (він)"
      right: "старий"
    - left: "вікно (воно)"
      right: "велике"
    - left: "зошит (він)"
      right: "синій"
    - left: "кімната (вона)"
      right: "гарна"
    - left: "студент (він)"
      right: "добрий"
    - left: "книга (вона)"
      right: "цікава"
    - left: "квиток (він)"
      right: "дешевий"

- type: fill-in
  title: "Опишіть ситуацію"
  instruction: "Оберіть слово, яке найкраще пасує за змістом."
  items:
    - sentence: "Цей телефон коштує 1000 доларів. Він ____."
      answer: "дорогий"
      options:
        - "дорогий"
        - "дешевий"
        - "старий"
        - "малий"
      explanation: "1000 доларів — це багато, тому дорогий."
    - sentence: "Ця ручка коштує 1 гривню. Вона ____."
      answer: "дешева"
      options:
        - "дешева"
        - "дорога"
        - "велика"
        - "синя"
      explanation: "1 гривня — це мало, тому дешева."
    - sentence: "Мій друг — студент. Він не старий, він ____."
      answer: "молодий"
      options:
        - "молодий"
        - "старий"
        - "поганий"
        - "новий"
      explanation: "Антонім до слова «старий» для людей — «молодий»."
    - sentence: "Цей фільм не нудний, він дуже ____."
      answer: "цікавий"
      options:
        - "цікавий"
        - "поганий"
        - "дешевий"
        - "малий"
      explanation: "Антонім до слова «нудний» — «цікавий»."
    - sentence: "Це не поганий день, це ____ день."
      answer: "гарний"
      options:
        - "гарний"
        - "поганий"
        - "старий"
        - "синій"
      explanation: "Антонім до слова «поганий» — «гарний»."
    - sentence: "Слон ____, а миша мала."
      answer: "великий"
      options:
        - "великий"
        - "малий"
        - "новий"
        - "дешевий"
      explanation: "Антонім до слова «малий» — «великий»."
    - sentence: "Ця машина тільки з магазину, вона ____."
      answer: "нова"
      options:
        - "нова"
        - "стара"
        - "погана"
        - "дешева"
      explanation: "Тільки з магазину означає «нова»."
    - sentence: "Небо має колір моря. Воно ____."
      answer: "синє"
      options:
        - "синє"
        - "зелене"
        - "червоне"
        - "жовте"
      explanation: "Колір неба — синій (середній рід — синє)."

- type: anagram
  title: "Розшифруйте слова"
  instruction: "Rearrange the letters to form the correct adjective."
  items:
    - scrambled: "о н в и й"
      answer: "новий"
      hint: "New"
    - scrambled: "р а с т и й"
      answer: "старий"
      hint: "Old"
    - scrambled: "а р г н и й"
      answer: "гарний"
      hint: "Beautiful/Nice"
    - scrambled: "е в л и к и й"
      answer: "великий"
      hint: "Big"
    - scrambled: "а м л и й"
      answer: "малий"
      hint: "Small"
    - scrambled: "к а в и й ц і"
      answer: "цікавий"
      hint: "Interesting"
    - scrambled: "о р и й г д"
      answer: "дорогий"
      hint: "Expensive"
    - scrambled: "ш е в и й д е"
      answer: "дешевий"
      hint: "Cheap"

- type: true-false
  title: "Правильно чи ні?"
  instruction: "Визначте, чи твердження правильне."
  items:
    - statement: "Слово «великий» — це антонім до слова «малий»."
      correct: true
      explanation: "Так, це протилежні за значенням слова."
    - statement: "Слово «книга» має рід «він» (masculine)."
      correct: false
      explanation: "Ні, книга — це «вона» (feminine), бо закінчується на -а."
    - statement: "Ми кажемо «новий вікно»."
      correct: false
      explanation: "Ні, вікно — це «воно», тому «нове вікно»."
    - statement: "Слово «синій» належить до м'якої групи."
      correct: true
      explanation: "Так, воно має м'яке закінчення -ій."
    - statement: "«Старий» — це синонім до слова «новий»."
      correct: false
      explanation: "Ні, це антоніми."
    - statement: "Слово «гарний» описує якість (quality)."
      correct: true
      explanation: "Так, це якісна характеристика."
    - statement: "Слово «дорогий» означає «cheap»."
      correct: false
      explanation: "Ні, «дорогий» означає «expensive»."
    - statement: "Питання для слова «дім» — «Яка?»."
      correct: false
      explanation: "Ні, дім — це чоловічий рід, тому «Який?»."

- type: quiz
  title: "Ситуації (Real Estate)"
  instruction: "Що ви скажете в цій ситуації?"
  items:
    - question: "Клієнт хоче велику квартиру. Що ви показуєте?"
      options:
        - text: "велику квартиру"
          correct: true
        - text: "малу квартиру"
          correct: false
        - text: "стару квартиру"
          correct: false
        - text: "погану квартиру"
          correct: false
      explanation: "Клієнт просив велику."
    - question: "Ви бачите дім, якому 100 років. Як ви його опишете?"
      options:
        - text: "Це старий дім."
          correct: true
        - text: "Це новий дім."
          correct: false
        - text: "Це молодий дім."
          correct: false
        - text: "Це малий дім."
          correct: false
      explanation: "100 років — це багато, тому старий."
    - question: "Студент завжди вчить уроки. Який він?"
      options:
        - text: "Він добрий студент."
          correct: true
        - text: "Він поганий студент."
          correct: false
        - text: "Він старий студент."
          correct: false
        - text: "Він дешевий студент."
          correct: false
      explanation: "Це позитивна характеристика."
    - question: "Ви хочете купити хліб, але у вас мало грошей. Який хліб ви шукаєте?"
      options:
        - text: "дешевий"
          correct: true
        - text: "дорогий"
          correct: false
        - text: "великий"
          correct: false
        - text: "цікавий"
          correct: false
      explanation: "Мало грошей -> дешевий."
    - question: "На вулиці сонце і тепло. Яка погода?"
      options:
        - text: "гарна"
          correct: true
        - text: "погана"
          correct: false
        - text: "стара"
          correct: false
        - text: "дешева"
          correct: false
      explanation: "Сонце і тепло — це гарна погода."
    - question: "Цей телефон — остання модель цього року. Він..."
      options:
        - text: "новий"
          correct: true
        - text: "старий"
          correct: false
        - text: "дешевий"
          correct: false
        - text: "поганий"
          correct: false
      explanation: "Остання модель -> новий."
    - question: "Стіл зламаний і брудний. Ви не хочете цей стіл. Ви хочете..."
      options:
        - text: "новий стіл"
          correct: true
        - text: "старий стіл"
          correct: false
        - text: "поганий стіл"
          correct: false
        - text: "малий стіл"
          correct: false
      explanation: "Ви хочете заміну на краще (новий)."
    - question: "Небо кольору моря. Яке воно?"
      options:
        - text: "синє"
          correct: true
        - text: "зелене"
          correct: false
        - text: "червоне"
          correct: false
        - text: "жовте"
          correct: false
      explanation: "Колір неба — синій."
