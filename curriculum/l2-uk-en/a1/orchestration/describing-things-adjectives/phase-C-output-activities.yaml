- type: true-false
  title: 'Grammar Facts'
  instruction: 'Decide if the statement about describing words is true or false.'
  items:
    - statement: 'The word «нове» is used to describe feminine words like «книга».'
      correct: false
      explanation: '«нове» is for neuter words like «вікно». For «книга», we use «нова».'
    - statement: 'To describe a masculine word like «телефон», we use the ending «-ий», for example: «новий».'
      correct: true
      explanation: '«-ий» is the standard ending for masculine descriptive words.'
    - statement: 'In Ukrainian, plural words always use the «-і» ending for descriptive words, no matter their original gender.'
      correct: true
      explanation: 'Plurals are easy! All descriptive words take the «-і» ending.'
    - statement: 'The correct spelling for the blue color (masculine) is «синий».'
      correct: false
      explanation: 'It is a visual trap. The correct spelling is «синій» with a dotted i.'
    - statement: 'The question word «Які?» is used to ask about a single masculine object.'
      correct: false
      explanation: '«Які?» is used for plurals. For a single masculine object, we use «Який?».'
    - statement: '«Цікавий» means interesting.'
      correct: true
      explanation: 'Yes, «цікавий» means interesting.'
    - statement: '«Поганий» and «добрий» have the exact same meaning.'
      correct: false
      explanation: 'They are opposites. «Поганий» means bad, and «добрий» means good.'
    - statement: '«Мавка» is a feminine character, so we describe her as «молода» and «гарна».'
      correct: true
      explanation: 'Feminine words take the «-а» ending.'

