- type: true-false
  title: 'True or False?'
  instruction: 'Decide if the grammar statement is true or false.'
  items:
    - statement: 'The word "машина" is feminine, so we say "нова машина".'
      correct: true
      explanation: 'Correct! The word "машина" ends in -а, making it feminine.'
    - statement: 'The masculine form of the color blue is "синий".'
      correct: false
      explanation: 'Watch out! Blue is a soft stem adjective, so it is spelled "синій".'
    - statement: 'For plural nouns, adjectives take different endings depending on gender.'
      correct: false
      explanation: 'The plural ending is always -і for all genders.'
    - statement: 'The phrase "велике місто" means "a big city".'
      correct: true
      explanation: 'Yes, "великий" means big, and "місто" is neuter.'
    - statement: 'The question word for a feminine noun is "Яке?".'
      correct: false
      explanation: 'The question word for feminine is "Яка?". "Яке?" is for neuter.'
    - statement: 'An adjective must have the same gender as the noun it describes.'
      correct: true
      explanation: 'This is the fundamental rule of adjective agreement in Ukrainian.'
    - statement: 'The word "старий" means new.'
      correct: false
      explanation: '"Старий" means old. "Новий" means new.'
    - statement: 'The plural of "новий день" is "нові дні".'
      correct: true
      explanation: 'Yes, both the adjective and the noun take their plural forms.'

- type: quiz
  title: 'Check Your Knowledge'
  instruction: 'Choose the correct answer.'
  items:
    - question: 'How do you ask "Which?" for a masculine noun like "дім"?'
      explanation: '"Який?" is the masculine form of the question word.'
      options:
        - text: 'Яка?'
          correct: false
        - text: 'Який?'
          correct: true
        - text: 'Яке?'
          correct: false
        - text: 'Які?'
          correct: false
    - question: 'What does "цікава книга" mean?'
      explanation: '"Цікава" means interesting, and "книга" means book.'
      options:
        - text: 'interesting book'
          correct: true
        - text: 'good book'
          correct: false
        - text: 'old book'
          correct: false
        - text: 'new book'
          correct: false
    - question: 'Which of these is the correct neuter form of "добрий"?'
      explanation: 'The neuter ending is -е.'
      options:
        - text: 'добре'
          correct: true
        - text: 'добра'
          correct: false
        - text: 'добрі'
          correct: false
        - text: 'добрий'
          correct: false
    - question: 'How would you say "beautiful flowers" (plural)?'
      explanation: 'The plural ending is -і for all genders.'
      options:
        - text: 'гарна квіти'
          correct: false
        - text: 'гарне квіти'
          correct: false
        - text: 'гарні квіти'
          correct: true
        - text: 'гарний квіти'
          correct: false
    - question: 'What is the soft ending for a feminine adjective like "синій"?'
      explanation: 'Soft stem adjectives take the -я ending for feminine.'
      options:
        - text: '-а'
          correct: false
        - text: '-я'
          correct: true
        - text: '-е'
          correct: false
        - text: '-є'
          correct: false
    - question: 'Which phrase describes a "cheap pen"?'
      explanation: '"Дешева" means cheap. It matches the feminine noun "ручка".'
      options:
        - text: 'дорога ручка'
          correct: false
        - text: 'дешева ручка'
          correct: true
        - text: 'нова ручка'
          correct: false
        - text: 'стара ручка'
          correct: false
    - question: 'In the phrase "зелена сукня", what gender is the noun?'
      explanation: 'The ending -а in "зелена" shows that "сукня" (dress) is feminine.'
      options:
        - text: 'Feminine'
          correct: true
        - text: 'Masculine'
          correct: false
        - text: 'Neuter'
          correct: false
        - text: 'Plural'
          correct: false
    - question: 'Which word means "tasty" in Ukrainian?'
      explanation: '"Смачний" is used to describe food that tastes good.'
      options:
        - text: 'смачний'
          correct: true
        - text: 'червоний'
          correct: false
        - text: 'молодий'
          correct: false
        - text: 'цікавий'
          correct: false

