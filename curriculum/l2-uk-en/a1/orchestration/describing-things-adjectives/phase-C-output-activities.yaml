- type: true-false
  title: "Check the Agreement"
  instruction: "As your tutor, I must make sure you are accurate. Are these descriptions grammatically correct? True or false?"
  items:
    - statement: "Це нова день."
      correct: false
      explanation: "False. 'день' is masculine, so it should be 'новий'."
    - statement: "Це нове слово."
      correct: true
      explanation: "Correct! 'слово' is neuter, and 'нове' matches it perfectly."
    - statement: "Вона добра людина."
      correct: true
      explanation: "Correct! 'людина' is feminine, taking the 'добра' ending."
    - statement: "Він гарне."
      correct: false
      explanation: "False. 'Він' is masculine, but 'гарне' is the neuter form."
    - statement: "Цей час великий."
      correct: true
      explanation: "Correct! Both words use masculine endings."
    - statement: "Це синій мова."
      correct: false
      explanation: "False. 'мова' is feminine, so it must be 'синя'."
    - statement: "Воно дуже мале."
      correct: true
      explanation: "Correct! 'Воно' is neuter, taking the neuter form 'мале'."
    - statement: "Ці слова цікаві."
      correct: true
      explanation: "Correct! Plural words always take the '-і' ending."

