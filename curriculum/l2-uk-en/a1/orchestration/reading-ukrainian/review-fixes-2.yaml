    ### Звуковий запис (Sound Notation)


    In many Ukrainian textbooks, such as Захарійчук''s Grade 1 *буквар*, you will
    see a special visual notation used to analyze sounds. A vowel sound is always
    marked with a solid dot **[•]**. A hard consonant is marked with a single dash
    **[–]**, and a soft consonant with a double dash **[=]**. For example, the word
    **дім** (house) would be diagrammed as **[= • –]**, showing a soft consonant (**д**
    is softened by **і**), a vowel (**і**), and a hard consonant (**м**). This visual
    system helps young learners map sounds in their head before they fully master
    reading letters.'
