    Why is this open-syllable principle so important? Because it gives spoken Ukrainian
    its characteristic flowing, melodic rhythm. When consonants attach to the following
    vowel rather than the preceding one, words string together smoothly. A word like
    **добре** (good) is split **до-бре**, not **доб-ре**. A word like **сестра** (sister)
    is **се-стра**. By practicing this division now, you are training your brain to
    produce a native-sounding rhythm right from your very first words.'
