- type: group-sort
  title: "Змінюється чи ні?"
  instruction: "Drag the words into the correct category: 'Changes in Accusative' (Feminine -а/-я) or 'Does Not Change' (Masculine/Neuter)."
  groups:
    - name: "Змінюється (Changes)"
      items: ["книга", "вода", "кава", "піца", "газета", "карта", "музика", "машина"]
    - name: "Не змінюється (No Change)"
      items: ["стіл", "вікно", "парк", "телефон", "місто", "паспорт", "квиток", "чай"]

- type: match-up
  title: "Знайдіть пару"
  instruction: "Match the dictionary form (Nominative) with its Accusative form."
  pairs:
    - left: "книга"
      right: "книгу"
    - left: "вода"
      right: "воду"
    - left: "стіл"
      right: "стіл"
    - left: "вікно"
      right: "вікно"
    - left: "вулиця"
      right: "вулицю"
    - left: "місто"
      right: "місто"
    - left: "газета"
      right: "газету"
    - left: "чай"
      right: "чай"

- type: quiz
  title: "Оберіть правильне закінчення"
  instruction: "Choose the correct Accusative form for the sentence."
  items:
    - question: "Я бачу ____________ (machine/car)."
      explanation: "Машина is feminine (-а), so it changes to машину."
      options:
        - text: "машину"
          correct: true
        - text: "машина"
          correct: false
        - text: "машини"
          correct: false
        - text: "машині"
          correct: false
    - question: "Я маю ____________ (phone)."
      explanation: "Телефон is masculine inanimate, so it does not change."
      options:
        - text: "телефон"
          correct: true
        - text: "телефона"
          correct: false
        - text: "телефону"
          correct: false
        - text: "телефоні"
          correct: false
    - question: "Я хочу ____________ (water)."
      explanation: "Вода is feminine (-а), so it changes to воду."
      options:
        - text: "воду"
          correct: true
        - text: "вода"
          correct: false
        - text: "води"
          correct: false
        - text: "воді"
          correct: false
    - question: "Я купую ____________ (bread)."
      explanation: "Хліб is masculine inanimate, so it does not change."
      options:
        - text: "хліб"
          correct: true
        - text: "хліба"
          correct: false
        - text: "хлібу"
          correct: false
        - text: "хліби"
          correct: false
    - question: "Я чую ____________ (music)."
      explanation: "Музика is feminine (-а), so it changes to музику."
      options:
        - text: "музику"
          correct: true
        - text: "музика"
          correct: false
        - text: "музики"
          correct: false
        - text: "музиці"
          correct: false
    - question: "Я бачу ____________ (window)."
      explanation: "Вікно is neuter, so it does not change."
      options:
        - text: "вікно"
          correct: true
        - text: "вікна"
          correct: false
        - text: "вікну"
          correct: false
        - text: "вікні"
          correct: false

- type: fill-in
  title: "Заповніть пропуски"
  instruction: "Type the correct Accusative form of the word in brackets."
  items:
    - sentence: "Я читаю (книга) ____________."
      answer: "книгу"
      options: ["книгу", "книга", "книги", "книзі"]
      explanation: "Книга -> Книгу (Feminine)"
    - sentence: "Я п'ю (кава) ____________."
      answer: "каву"
      options: ["каву", "кава", "кави", "каві"]
      explanation: "Кава -> Каву (Feminine)"
    - sentence: "Я бачу (вікно) ____________."
      answer: "вікно"
      options: ["вікно", "вікна", "вікну", "вікні"]
      explanation: "Вікно -> Вікно (Neuter - No change)"
    - sentence: "Я маю (план) ____________."
      answer: "план"
      options: ["план", "плана", "плану", "плани"]
      explanation: "План -> План (Masculine - No change)"
    - sentence: "Я хочу (піца) ____________."
      answer: "піцу"
      options: ["піцу", "піца", "піци", "піці"]
      explanation: "Піца -> Піцу (Feminine)"
    - sentence: "Я купую (машина) ____________."
      answer: "машину"
      options: ["машину", "машина", "машини", "машині"]
      explanation: "Машина -> Машину (Feminine)"
    - sentence: "Я чую (звук) ____________."
      answer: "звук"
      options: ["звук", "звука", "звуку", "звуки"]
      explanation: "Звук -> Звук (Masculine - No change)"
    - sentence: "Я беру (ручка) ____________."
      answer: "ручку"
      options: ["ручку", "ручка", "ручки", "ручці"]
      explanation: "Ручка -> Ручку (Feminine)"

