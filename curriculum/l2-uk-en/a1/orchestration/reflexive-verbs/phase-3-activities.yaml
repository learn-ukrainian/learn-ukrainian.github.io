- type: quiz
  title: "Вибір суфікса: -ся чи -сь?"
  instruction: "Choose the correct reflexive suffix based on the sound that comes before it. Remember: Vowels like -сь, Consonants like -ся."
  items:
    - question: "Яке закінчення ви додасте до слова «вмиваю...»?"
      explanation: "Після голосного звука 'ю' ми використовуємо короткий суфікс -сь."
      options:
        - text: "-сь"
          correct: true
        - text: "-ся"
          correct: false
        - text: "-ть"
          correct: false
        - text: "-ш"
          correct: false
    - question: "Як правильно написати слово «ти вмиваєш...»?"
      explanation: "Після приголосного звука 'ш' ми завжди використовуємо суфікс -ся."
      options:
        - text: "-ся"
          correct: true
        - text: "-сь"
          correct: false
        - text: "-ть"
          correct: false
        - text: "-мо"
          correct: false
    - question: "Оберіть правильну форму для слова «ми вчимо...»."
      explanation: "Закінчення 'мо' має голосний звук, тому ми додаємо -сь."
      options:
        - text: "-сь"
          correct: true
        - text: "-ся"
          correct: false
        - text: "-ти"
          correct: false
        - text: "-те"
          correct: false
    - question: "Який суфікс потрібен у слові «вони вчаться»?"
      explanation: "Буква 'я' у суфіксі -ся використовується після приголосного звука 'ть'."
      options:
        - text: "-ся"
          correct: true
        - text: "-сь"
          correct: false
        - text: "-ю"
          correct: false
        - text: "-є"
          correct: false
    - question: "Яку форму має дієслово «ви одягаєте...»?"
      explanation: "Після голосного 'е' у закінченні 'те' ми використовуємо -сь."
      options:
        - text: "-сь"
          correct: true
        - text: "-ся"
          correct: false
        - text: "-ть"
          correct: false
        - text: "-мо"
          correct: false
    - question: "Як ви скажете «він одягається» українською мовою?"
      explanation: "Форма 'ється' закінчується на приголосний, тому ми використовуємо -ся."
      options:
        - text: "одягається"
          correct: true
        - text: "одягаєсь"
          correct: false
        - text: "одягає"
          correct: false
        - text: "одягають"
          correct: false
    - question: "Яке закінчення має форма «я смію...»?"
      explanation: "Після голосного 'ю' у першій особі ми додаємо -сь."
      options:
        - text: "-сь"
          correct: true
        - text: "-ся"
          correct: false
        - text: "-ть"
          correct: false
        - text: "-ш"
          correct: false
    - question: "Як звучить правильна форма «ти смієш...»?"
      explanation: "Після шиплячого приголосного 'ш' ми додаємо повний суфікс -ся."
      options:
        - text: "-ся"
          correct: true
        - text: "-сь"
          correct: false
        - text: "-ть"
          correct: false
        - text: "-мо"
          correct: false
    - question: "Оберіть правильний варіант: «Ми повертаємо...»."
      explanation: "Голосний звук наприкінці вимагає використання короткого суфікса -сь."
      options:
        - text: "повертаємось"
          correct: true
        - text: "повертаємося"
          correct: false
        - text: "повертаєм"
          correct: false
        - text: "повертають"
          correct: false
    - question: "Який суфікс ми додаємо до слова «вони дивлять...»?"
      explanation: "Після приголосного 'ть' ми завжди використовуємо суфікс -ся."
      options:
        - text: "-ся"
          correct: true
        - text: "-сь"
          correct: false
        - text: "-ть"
          correct: false
        - text: "-мо"
          correct: false
    - question: "Як ви напишете фразу «я називаю...»?"
      explanation: "Після голосного звука ми обираємо короткий варіант суфікса -сь."
      options:
        - text: "називаюсь"
          correct: true
        - text: "називаюся"
          correct: false
        - text: "називають"
          correct: false
        - text: "називаєте"
          correct: false
    - question: "Яка форма правильна для слова «ти вчиш...»?"
      explanation: "Приголосний звук 'ш' вимагає приєднання повного суфікса -ся."
      options:
        - text: "вчишся"
          correct: true
        - text: "вчишсь"
          correct: false
        - text: "вчимо"
          correct: false
        - text: "вчите"
          correct: false

- type: match-up
  title: "Дія на себе чи на іншого?"
  instruction: "Match the base verb (action on something else) with its reflexive counterpart (action on oneself)."
  pairs:
    - left: "мити (wash)"
      right: "митися (wash oneself)"
    - left: "одягати (dress)"
      right: "одягатися (dress oneself)"
    - left: "вчити (teach)"
      right: "вчитися (learn/study)"
    - left: "називати (name/call)"
      right: "називатися (be called)"
    - left: "знайомити (introduce)"
      right: "знайомитися (get acquainted)"
    - left: "вітати (congratulate)"
      right: "вітатися (greet each other)"
    - left: "голити (shave someone)"
      right: "голитися (shave oneself)"
    - left: "зупиняти (stop something)"
      right: "зупинятися (stop oneself)"
    - left: "повертати (turn something)"
      right: "повертатися (return/come back)"
    - left: "чесати (comb/scratch)"
      right: "чесатися (comb oneself)"
    - left: "бавити (amuse someone)"
      right: "бавитися (play/amuse oneself)"
    - left: "гріти (warm something)"
      right: "грітися (warm oneself)"

- type: fill-in
  title: "Знайдіть свій ритм: -ся чи -сь"
  instruction: "Complete the sentences by adding the correct reflexive suffix (-ся or -сь). Pay attention to the last letter of the verb form."
  items:
    - sentence: "Я вмиваю____ холодною водою зранку."
      answer: "сь"
      options: ["сь", "ся", "ть", "ш"]
      explanation: "Вмиваю ends in a vowel, so we add -сь."
    - sentence: "Ти одягаєш____ дуже повільно сьогодні."
      answer: "ся"
      options: ["ся", "сь", "мо", "те"]
      explanation: "Одягаєш ends in a consonant, so we add -ся."
    - sentence: "Він завжди сміє____ над жартами."
      answer: "ться"
      options: ["ться", "ться", "сь", "мо"]
      explanation: "Note: The full form is сміється (ends in -ться)."
    - sentence: "Ми вчимо____ розмовляти українською мовою."
      answer: "сь"
      options: ["сь", "ся", "ть", "ш"]
      explanation: "Вчимо ends in a vowel, so we add -сь."
    - sentence: "Вони знайомлять____ у новому класі."
      answer: "ся"
      options: ["ся", "сь", "мо", "те"]
      explanation: "Знайомлять ends in a consonant, so we add -ся."
    - sentence: "Ви повертаєте____ додому пізно ввечері."
      answer: "сь"
      options: ["сь", "ся", "ть", "ш"]
      explanation: "Повертаєте ends in a vowel, so we add -сь."
    - sentence: "Я часто дивлю____ цікаві фільми."
      answer: "сь"
      options: ["сь", "ся", "ть", "ш"]
      explanation: "Дивлю ends in a vowel, so we add -сь."
    - sentence: "Як називає____ це маленьке місто?"
      answer: "ться"
      options: ["ться", "ться", "сь", "мо"]
      explanation: "Називається is the correct 3rd person singular form."
    - sentence: "Ти часто вітаєш____ з сусідами."
      answer: "ся"
      options: ["ся", "сь", "мо", "те"]
      explanation: "Вітаєш ends in a consonant, so we add -ся."
    - sentence: "Ми зупиняємо____ біля старого парку."
      answer: "сь"
      options: ["сь", "ся", "ть", "ш"]
      explanation: "Зупиняємо ends in a vowel, so we add -сь."
    - sentence: "Діти бавлять____ на спортивному майданчику."
      answer: "ся"
      options: ["ся", "сь", "мо", "те"]
      explanation: "Бавлять ends in a consonant, so we add -ся."
    - sentence: "Я голю____ кожний ранок перед роботою."
      answer: "сь"
      options: ["сь", "ся", "ть", "ш"]
      explanation: "Голю ends in a vowel, so we add -сь."

- type: unjumble
  title: "Ранкові вправи: Складіть речення"
  instruction: "Put the words in the correct order to describe a typical daily routine using reflexive verbs."
  items:
    - words: ["Я", "вмиваюся", "холодною", "водою"]
      answer: "Я вмиваюся холодною водою"
    - words: ["Він", "одягається", "дуже", "швидко"]
      answer: "Він одягається дуже швидко"
    - words: ["Ми", "вчимося", "у", "школі"]
      answer: "Ми вчимося у школі"
    - words: ["Ти", "дивишся", "цікаве", "кіно"]
      answer: "Ти дивишся цікаве кіно"
    - words: ["Вони", "повертаються", "пізно", "додому"]
      answer: "Вони повертаються пізно додому"
    - words: ["Ви", "займаєтеся", "спортом", "зранку"]
      answer: "Ви займаєтеся спортом зранку"
    - words: ["Вона", "завжди", "сміється", "голосно"]
      answer: "Вона завжди сміється голосно"
    - words: ["Я", "знайомлюся", "з", "сусідом"]
      answer: "Я знайомлюся з сусідом"
    - words: ["Місто", "називається", "красивий", "Київ"]
      answer: "Місто називається красивий Київ"
    - words: ["Ми", "вітаємося", "кожен", "день"]
      answer: "Ми вітаємося кожен день"
    - words: ["Ти", "вмиваєшся", "милом", "зараз"]
      answer: "Ти вмиваєшся милом зараз"
    - words: ["Вони", "вчаться", "читати", "швидко"]
      answer: "Вони вчаться читати швидко"

- type: group-sort
  title: "Класифікація дієслів"
  instruction: "Group the reflexive verbs based on their meaning: action on oneself, action on each other, or always reflexive (lexicalized)."
  groups:
    - name: "Дія на себе (True Reflexive)"
      items: ["вмиватися", "одягатися", "голитися", "взуватися"]
    - name: "Дія один на одного (Reciprocal)"
      items: ["вітатися", "знайомитися", "цілуватися", "зустрічатися"]
    - name: "Завжди зворотні (Lexicalized)"
      items: ["сміятися", "дивитися", "сподіватися", "намагатися"]

- type: quiz
  title: "Мистецтво вимови: -ться та -шся"
  instruction: "Test your knowledge of Ukrainian pronunciation for reflexive endings. Remember the 'long buzz' rules!"
  items:
    - question: "Як правильно вимовляється закінчення у слові «вмивається»?"
      explanation: "Букви -ться вимовляються як один довгий м'який звук [ц:а]."
      options:
        - text: "як довгий м'який [ц:а]"
          correct: true
        - text: "як окремі букви т і с"
          correct: false
        - text: "як твердий звук т"
          correct: false
        - text: "як англійський звук th"
          correct: false
    - question: "Який звук ми чуємо в кінці слова «вчишся»?"
      explanation: "У розмовній мові закінчення -шся вимовляється як довгий м'який звук [с:а]."
      options:
        - text: "як довгий м'який [с:а]"
          correct: true
        - text: "як окремі букви ш і с"
          correct: false
        - text: "як твердий звук ш"
          correct: false
        - text: "як англійський звук sh"
          correct: false
    - question: "Оберіть правильну транскрипцію для слова «сміється»."
      explanation: "У транскрипції -ться передається як [ц'ːа]."
      options:
        - text: "[сʲмʲiˈjɛtsʲ:a]"
          correct: true
        - text: "[сʲмʲiˈjɛt-sʲa]"
          correct: false
        - text: "[сʲмʲiˈjɛtʲsʲa]"
          correct: false
        - text: "[сʲмʲiˈjɛtsa]"
          correct: false
    - question: "Як звучить дієслово «одягаєшся» в швидкій мові?"
      explanation: "Закінчення -шся перетворюється на довгий м'який звук [с:а]."
      options:
        - text: "[odʲaˈɦajɛsʲ:a]"
          correct: true
        - text: "[odʲaˈɦajɛʃsʲa]"
          correct: false
        - text: "[odʲaˈɦajɛsʲa]"
          correct: false
        - text: "[odʲaˈɦajɛt͡sʲa]"
          correct: false
    - question: "У якій особі ми зустрічаємо закінчення -ться?"
      explanation: "Закінчення -ться характерне для 3-ї особи (він, вона, воно, вони)."
      options:
        - text: "у третій особі"
          correct: true
        - text: "у першій особі"
          correct: false
        - text: "у другій особі"
          correct: false
        - text: "тільки у множині"
          correct: false
    - question: "У якій особі ми вимовляємо звук [с:а] для -шся?"
      explanation: "Закінчення -шся належить до 2-ї особи однини (ти)."
      options:
        - text: "у другій особі однини"
          correct: true
        - text: "у третій особі множини"
          correct: false
        - text: "у першій особі однини"
          correct: false
        - text: "тільки у ввічливій формі"
          correct: false
    - question: "Яка головна мета цих фонетичних змін у мові?"
      explanation: "Ці зміни роблять мову більш співучою та легкою для вимови."
      options:
        - text: "зробити мову співучою"
          correct: true
        - text: "зробити мову складнішою"
          correct: false
        - text: "заплутати іноземців"
          correct: false
        - text: "змінити значення слова"
          correct: false
    - question: "Чи вимовляємо ми окремо букву Т у -ться?"
      explanation: "Ні, звук Т повністю зливається з С у довгий м'який звук [ц:]."
      options:
        - text: "ні, вони зливаються"
          correct: true
        - text: "так, дуже чітко"
          correct: false
        - text: "тільки в офіційній мові"
          correct: false
        - text: "тільки перед голосним"
          correct: false
    - question: "Як звучить кінець слова «вони вчаться»?"
      explanation: "Це 3-тя особа множини, тому вимовляється довгий м'який [ц:а]."
      options:
        - text: "[ʋoˈnɪ ˈʋtʃatsʲ:a]"
          correct: true
        - text: "[ʋoˈnɪ ˈʋtʃatʲsʲa]"
          correct: false
        - text: "[ʋoˈnɪ ˈʋtʃat-sʲa]"
          correct: false
        - text: "[ʋoˈnɪ ˈʋtʃat͡sa]"
          correct: false
    - question: "Як звучить дієслово «ти смієшся» у діалозі?"
      explanation: "Друга особа однини має закінчення -шся, що вимовляється як [с:а]."
      options:
        - text: "[tɪ sʲmʲiˈjɛsʲ:a]"
          correct: true
        - text: "[tɪ sʲmʲiˈjɛʃsʲa]"
          correct: false
        - text: "[tɪ sʲmʲiˈjɛsʲa]"
          correct: false
        - text: "[tɪ sʲmʲiˈjɛt͡sʲ:a]"
          correct: false
    - question: "Що означає символ двокрапки у транскрипції [ц'ː]?"
      explanation: "Двокрапка позначає довгий звук (подовження приголосного)."
      options:
        - text: "довгий звук"
          correct: true
        - text: "короткий звук"
          correct: false
        - text: "м'який звук"
          correct: false
        - text: "наголошений звук"
          correct: false
    - question: "Чи змінюється вимова, якщо ми пишемо -ться?"
      explanation: "Так, письмове -ться завжди вимовляється як довгий м'який звук [ц:а]."
      options:
        - text: "так, завжди змінюється"
          correct: true
        - text: "ні, ніколи не змінюється"
          correct: false
        - text: "тільки в деяких словах"
          correct: false
        - text: "тільки в піснях"
          correct: false

- type: fill-in
  title: "Практика відмінювання: Дієслово «вчитися»"
  instruction: "Complete the forms of the verb 'вчитися' (to study/learn) for different people. Watch the suffix choice!"
  items:
    - sentence: "Я вчу____ в університеті."
      answer: "сь"
      options: ["сь", "ся", "мо", "те"]
      explanation: "Vowel ending -ю requires -сь."
    - sentence: "Ти вчиш____ кожний вечір."
      answer: "ся"
      options: ["ся", "сь", "мо", "те"]
      explanation: "Consonant ending -ш requires -ся."
    - sentence: "Він вчить____ грати на гітарі."
      answer: "ся"
      options: ["ся", "сь", "мо", "те"]
      explanation: "Consonant ending -ть requires -ся (writes -ться)."
    - sentence: "Ми вчимо____ розмовляти вільно."
      answer: "сь"
      options: ["сь", "ся", "мо", "те"]
      explanation: "Vowel ending -о requires -сь."
    - sentence: "Ви вчите____ писати гарно."
      answer: "сь"
      options: ["сь", "ся", "мо", "те"]
      explanation: "Vowel ending -е requires -сь."
    - sentence: "Вони вчать____ нові слова."
      answer: "ся"
      options: ["ся", "сь", "мо", "те"]
      explanation: "Consonant ending -ть requires -ся (writes -ться)."
    - sentence: "Дівчина вчить____ у коледжі."
      answer: "ся"
      options: ["ся", "сь", "мо", "те"]
      explanation: "Singular 3rd person requires -ся (writes -ться)."
    - sentence: "Студенти вчать____ дуже старанно."
      answer: "ся"
      options: ["ся", "сь", "мо", "те"]
      explanation: "Plural 3rd person requires -ся (writes -ться)."
    - sentence: "Я вчу____ грати у футбол."
      answer: "сь"
      options: ["сь", "ся", "мо", "те"]
      explanation: "First person ends in -ю, so use -сь."
    - sentence: "Ти вчиш____ готувати борщ."
      answer: "ся"
      options: ["ся", "сь", "мо", "те"]
      explanation: "Second person ends in -ш, so use -ся."
    - sentence: "Ми вчимо____ танцювати гопак."
      answer: "сь"
      options: ["сь", "ся", "мо", "те"]
      explanation: "First person plural ends in -о, so use -сь."
    - sentence: "Вони вчать____ малювати портрети."
      answer: "ся"
      options: ["ся", "сь", "мо", "те"]
      explanation: "Third person plural ends in -ть, so use -ся."

