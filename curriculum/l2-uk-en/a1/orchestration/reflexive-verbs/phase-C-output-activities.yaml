- type: quiz
  title: "Understanding Mirror Verbs"
  instruction: "Let us check what you remember about mirror verbs!"
  items:
    - question: "What does the mirror ending -ся do to an action?"
      explanation: "It returns the action back to the subject."
      options:
        - text: "Returns it to the subject"
          correct: true
        - text: "Makes it happen in the past"
          correct: false
        - text: "Directs it to another person"
          correct: false
        - text: "Makes the action faster"
          correct: false
    - question: "Historically, the ending -ся comes from which separate word?"
      explanation: "It comes from the word себе, meaning oneself."
      options:
        - text: "себе"
          correct: true
        - text: "мене"
          correct: false
        - text: "тебе"
          correct: false
        - text: "нас"
          correct: false
    - question: "Which of these words means 'to wash oneself'?"
      explanation: "Митися is the mirror verb for washing yourself."
      options:
        - text: "митися"
          correct: true
        - text: "мити"
          correct: false
        - text: "вмивати"
          correct: false
        - text: "дивитися"
          correct: false
    - question: "How does the literal translation 'Я мию себе' (I wash myself) sound in Ukrainian?"
      explanation: "It sounds very unnatural. You should use the mirror verb instead."
      options:
        - text: "Unnatural and strange"
          correct: true
        - text: "Perfectly polite"
          correct: false
        - text: "Beautiful and poetic"
          correct: false
        - text: "Formal and strict"
          correct: false
    - question: "Which form of the mirror ending do we use after a consonant?"
      explanation: "After a consonant, you must use -ся to keep the sound smooth."
      options:
        - text: "-ся"
          correct: true
        - text: "-сь"
          correct: false
        - text: "-ться"
          correct: false
        - text: "-сясь"
          correct: false
    - question: "Which form of the mirror ending do we use after a vowel?"
      explanation: "After a vowel, you must use -сь."
      options:
        - text: "-сь"
          correct: true
        - text: "-ся"
          correct: false
        - text: "-ться"
          correct: false
        - text: "-сясь"
          correct: false
    - question: "How is the ending -ться (in words like дивиться) pronounced?"
      explanation: "It sounds like a long, soft ц followed by а."
      options:
        - text: "Like long soft ц and а"
          correct: true
        - text: "Exactly as written, T then S"
          correct: false
        - text: "Like a hard English T"
          correct: false
        - text: "Like a soft English S"
          correct: false
    - question: "Why is it polite to say 'Вибачте' instead of 'Вибачаюсь'?"
      explanation: "Вибачаюсь literally means 'I excuse myself', which is self-centered."
      options:
        - text: "Вибачаюсь means 'I excuse myself'"
          correct: true
        - text: "Вибачте is a much older word"
          correct: false
        - text: "Вибачаюсь is too difficult to say"
          correct: false
        - text: "Вибачте is a mirror verb"
          correct: false

- type: fill-in
  title: "Conjugating Verbs in Context"
  instruction: "Complete the sentences with the correct form of the mirror verb."
  items:
    - sentence: "Я ___ новий телевізор."
      answer: "дивлюсь"
      options: ["дивлюсь", "дивишся", "дивиться", "дивляться"]
    - sentence: "Ти ___ у велике вікно."
      answer: "дивишся"
      options: ["дивлюсь", "дивишся", "дивиться", "дивляться"]
    - sentence: "Він уважно ___ на мене."
      answer: "дивиться"
      options: ["дивлюсь", "дивишся", "дивиться", "дивляться"]
    - sentence: "Ми ___ грати на гітарі."
      answer: "вчимось"
      options: ["вчимось", "вчишся", "вчиться", "вчаться"]
    - sentence: "Він добре ___ у школі."
      answer: "вчиться"
      options: ["вчиться", "вчимось", "вчишся", "вчусь"]
    - sentence: "Вони завжди ___ добре."
      answer: "вчаться"
      options: ["вчаться", "вчиться", "вчимось", "вчусь"]
    - sentence: "Вони голосно ___ на вулиці."
      answer: "сміються"
      options: ["сміються", "сміється", "смієшся", "сміємось"]
    - sentence: "Ми радісно ___ кожного дня."
      answer: "вітаємось"
      options: ["вітаємось", "вітається", "вітаєшся", "вітаються"]

- type: match-up
  title: "Transitive vs Reflexive Pairs"
  instruction: "Match the normal verb with its mirror verb partner."
  pairs:
    - left: "мити (to wash something)"
      right: "митися (to wash oneself)"
    - left: "називати (to name something)"
      right: "називатися (to be called)"
    - left: "голити (to shave someone)"
      right: "голитися (to shave oneself)"
    - left: "одягати (to dress someone)"
      right: "одягатися (to dress oneself)"
    - left: "зупиняти (to stop something)"
      right: "зупинятися (to stop oneself)"
    - left: "зустрічати (to meet someone)"
      right: "зустрічатися (to meet each other)"
    - left: "вчити (to teach someone)"
      right: "вчитися (to study)"
    - left: "вітати (to greet someone)"
      right: "вітатися (to greet each other)"

- type: true-false
  title: "True or False: Rules of Mirror Verbs"
  instruction: "Decide if these statements about mirror verbs are correct."
  items:
    - statement: "You must use the ending -сь after a vowel."
      correct: true
      explanation: "Yes, after a vowel, we use -сь to keep the word flowing smoothly."
    - statement: "You must use the ending -ся after a vowel."
      correct: false
      explanation: "No, after a vowel you use -сь. The ending -ся is used after a consonant."
    - statement: "The ending -ться is pronounced exactly as a T followed by an S."
      correct: false
      explanation: "It is a phonetic marker and sounds like a long, soft ц followed by an а."
    - statement: "The word 'вчиться' uses the ending -ся because it comes after the consonant т."
      correct: true
      explanation: "Yes, the base verb ends in a consonant, so we attach -ся."
    - statement: "Він одягається is the correct form for 'He dresses himself'."
      correct: true
      explanation: "Yes, this is the correct third-person singular mirror verb."
    - statement: "Ми дивляться is the correct form for 'We watch'."
      correct: false
      explanation: "No, 'дивляться' is for 'they'. The correct form for 'we' is 'дивимось'."
    - statement: "Вони зустрічаються is the correct form for 'They meet each other'."
      correct: true
      explanation: "Yes, this is the correct third-person plural form for this reciprocal action."
    - statement: "Ти миємось is the correct form for 'You wash'."
      correct: false
      explanation: "No, 'миємось' is the 'we' form. The correct form for 'you' is 'миєшся'."

- type: fill-in
  title: "Choosing the Correct Subject"
  instruction: "Choose the correct ending to complete the daily routine."
  items:
    - sentence: "Я щоранку ___."
      answer: "вмиваюсь"
      options: ["вмиваюсь", "вмиваєшся", "вмивається", "вмиваємось"]
    - sentence: "Він дуже швидко ___."
      answer: "одягається"
      options: ["одягається", "одягаюсь", "одягаєшся", "одягаються"]
    - sentence: "Ми завжди ___ тепло."
      answer: "одягаємось"
      options: ["одягаємось", "одягаються", "одягається", "одягаєшся"]
    - sentence: "Вони часто ___ у великому місті."
      answer: "зустрічаються"
      options: ["зустрічаються", "зустрічається", "зустрічаємось", "зустрічаєшся"]
    - sentence: "Я із задоволенням ___ спортом."
      answer: "займаюсь"
      options: ["займаюсь", "займаєшся", "займається", "займаємось"]
    - sentence: "Вона дуже успішно ___ бізнесом."
      answer: "займається"
      options: ["займається", "займаюсь", "займаєшся", "займаємось"]
    - sentence: "Ми ___ додому пізно ввечері."
      answer: "повертаємось"
      options: ["повертаємось", "повертається", "повертаюсь", "повертаєшся"]
    - sentence: "Я щиро ___ кожного дня."
      answer: "сміюсь"
      options: ["сміюсь", "сміється", "смієшся", "сміємось"]

- type: group-sort
  title: "Sort the Actions"
  instruction: "Sort these mirror verbs into their correct semantic groups based on their meaning."
  groups:
    - name: "True Reflexive (Doing to yourself)"
      items: ["вмиватися", "одягатися", "митися"]
    - name: "Reciprocal (Doing to each other)"
      items: ["зустрічатися", "вітатися", "знайомитися"]
    - name: "Lexicalized (Special meaning)"
      items: ["сміятися", "називатися", "повертатися"]

