- type: quiz
  title: "Grammar Contexts"
  instruction: "Choose the best verb or word to complete the thought."
  items:
    - question: "When you clean a plate, you use the verb:"
      explanation: "You use the normal transitive verb when washing an object."
      options:
        - text: "мити"
          correct: true
        - text: "митися"
          correct: false
        - text: "сміятися"
          correct: false
        - text: "вмиватися"
          correct: false
    - question: "When you wash yourself in the shower, you use:"
      explanation: "You use the mirror verb for washing yourself."
      options:
        - text: "митися"
          correct: true
        - text: "мити"
          correct: false
        - text: "називати"
          correct: false
        - text: "називатися"
          correct: false
    - question: "When two people say hello to each other, they:"
      explanation: "This is a reciprocal action, so you use the mirror verb."
      options:
        - text: "вітаються"
          correct: true
        - text: "вітає"
          correct: false
        - text: "вмиваються"
          correct: false
        - text: "вмиває"
          correct: false
    - question: "When a beautiful city has a name, it:"
      explanation: "Objects identifying themselves use the reflexive verb."
      options:
        - text: "називається"
          correct: true
        - text: "називає"
          correct: false
        - text: "сміється"
          correct: false
        - text: "дивиться"
          correct: false
    - question: "To introduce yourself, which phrase is correct and natural?"
      explanation: "Using a reflexive verb for your own name sounds unnatural."
      options:
        - text: "Мене звати..."
          correct: true
        - text: "Я називаюсь..."
          correct: false
        - text: "Моє ім'я є..."
          correct: false
        - text: "Я називаю себе..."
          correct: false
    - question: "If someone tells a funny joke, you will naturally:"
      explanation: "Сміятися is the correct lexicalized mirror verb for laughing."
      options:
        - text: "сміятися"
          correct: true
        - text: "повертатися"
          correct: false
        - text: "одягатися"
          correct: false
        - text: "вмиватися"
          correct: false
    - question: "What is the correct preposition to use with 'сміятися' when you laugh at a joke?"
      explanation: "Standard Ukrainian uses 'з' when laughing at something."
      options:
        - text: "з"
          correct: true
        - text: "на"
          correct: false
        - text: "у"
          correct: false
        - text: "до"
          correct: false
    - question: "To apologize politely, instead of 'Вибачаюсь', you should say:"
      explanation: "Вибачте means 'Excuse me', which correctly directs the request to the other person."
      options:
        - text: "Вибачте"
          correct: true
        - text: "Вибачаю"
          correct: false
        - text: "Вибачаємось"
          correct: false
        - text: "Вибачаєшся"
          correct: false