- type: quiz
  title: Past Tense and Gender
  instruction: Choose the correct answer based on the grammar rules.
  items:
    - question: Which ending is used for a man in the past tense?
      options:
        - text: -в
          correct: true
        - text: -ла
          correct: false
        - text: -ло
          correct: false
        - text: -ли
          correct: false
    - question: Which ending is used for a woman in the past tense?
      options:
        - text: -ла
          correct: true
        - text: -в
          correct: false
        - text: -ло
          correct: false
        - text: -ли
          correct: false
    - question: Which ending is used for plural subjects?
      options:
        - text: -ли
          correct: true
        - text: -в
          correct: false
        - text: -ла
          correct: false
        - text: -ло
          correct: false
    - question: 'How do you say I was working if you are a woman?'
      options:
        - text: Я працювала
          correct: true
        - text: Я працював
          correct: false
        - text: Я була працювала
          correct: false
        - text: Я був працював
          correct: false
    - question: 'How do you say I was working if you are a man?'
      options:
        - text: Я працював
          correct: true
        - text: Я працювала
          correct: false
        - text: Я був працював
          correct: false
        - text: Я була працювала
          correct: false
    - question: 'Translate yesterday:'
      options:
        - text: вчора
          correct: true
        - text: сьогодні
          correct: false
        - text: минулого
          correct: false
        - text: раніше
          correct: false
    - question: 'What is the past tense of бути for воно?'
      options:
        - text: було
          correct: true
        - text: був
          correct: false
        - text: була
          correct: false
        - text: були
          correct: false
    - question: 'Translate earlier:'
      options:
        - text: раніше
          correct: true
        - text: вчора
          correct: false
        - text: минулого
          correct: false
        - text: сьогодні
          correct: false

