- type: true-false
  title: Past Tense Rules
  instruction: Decide if the statement is true or false.
  items:
    - statement: In Ukrainian, the past tense ending depends on the gender of the person.
      correct: true
    - statement: A man and a woman use the same past tense ending for the word I.
      correct: false
      explanation: 'A man says я робив, a woman says я робила.'
    - statement: 'You must use the preposition в before минулого.'
      correct: false
      explanation: 'Never use в or у before минулого.'
    - statement: 'The past tense of the verb бути is completely regular.'
      correct: true
      explanation: 'Yes, it follows the standard pattern: був, була, було, були.'
    - statement: 'The feminine form of the verb їсти in the past tense is їла.'
      correct: true
    - statement: 'To translate I was reading, you must use the verb бути.'
      correct: false
      explanation: 'You simply say Я читав or Я читала.'
    - statement: 'The word вчора means tomorrow.'
      correct: false
      explanation: Вчора means yesterday.
    - statement: 'The past tense form of йти for a man is ішов.'
      correct: true

