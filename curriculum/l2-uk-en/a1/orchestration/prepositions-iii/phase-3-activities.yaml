- type: group-sort
  title: "Де, Куди чи Звідки?"
  instruction: "Sort the phrases into the correct category based on the question they answer."
  groups:
    - name: "Де? (Location)"
      items: ["в парку", "на столі", "вдома", "на концерті", "у школі"]
    - name: "Куди? (Direction)"
      items: ["в парк", "на стіл", "додому", "на концерт", "у школу"]
    - name: "Звідки? (Origin)"
      items: ["з парку", "зі столу", "з дому", "з концерту", "зі школи"]

- type: quiz
  title: "Оберіть правильне питання"
  instruction: "Choose the correct question word for the situation."
  items:
    - question: "___ ти йдеш? — Я йду в магазин."
      options:
        - text: "Куди"
          correct: true
        - text: "Де"
          correct: false
        - text: "Звідки"
          correct: false
        - text: "Хто"
          correct: false
      explanation: "Movement to a place requires 'Куди?' (Where to?)."
    - question: "___ ти живеш? — Я живу в Києві."
      options:
        - text: "Де"
          correct: true
        - text: "Куди"
          correct: false
        - text: "Звідки"
          correct: false
        - text: "Що"
          correct: false
      explanation: "Living is a static state, so we ask 'Де?' (Where?)."
    - question: "___ ви приїхали? — Ми зі Львова."
      options:
        - text: "Звідки"
          correct: true
        - text: "Куди"
          correct: false
        - text: "Де"
          correct: false
        - text: "Коли"
          correct: false
      explanation: "Origin requires 'Звідки?' (Where from?)."
    - question: "___ твій телефон? — Він на столі."
      options:
        - text: "Де"
          correct: true
        - text: "Куди"
          correct: false
        - text: "Звідки"
          correct: false
        - text: "Чому"
          correct: false
      explanation: "Location of an object requires 'Де?'."
    - question: "___ їде цей автобус? — У центр."
      options:
        - text: "Куди"
          correct: true
        - text: "Де"
          correct: false
        - text: "Звідки"
          correct: false
        - text: "Як"
          correct: false
      explanation: "Bus route direction requires 'Куди?'."
    - question: "___ ви? — Я з України."
      options:
        - text: "Звідки"
          correct: true
        - text: "Де"
          correct: false
        - text: "Куди"
          correct: false
        - text: "Хто"
          correct: false
      explanation: "Origin/Nationality requires 'Звідки?'."

- type: match-up
  title: "Туди і Назад"
  instruction: "Match the destination with the return trip (Entrance -> Exit)."
  pairs:
    - left: "В магазин"
      right: "З магазину"
    - left: "На роботу"
      right: "З роботи"
    - left: "В школу"
      right: "Зі школи"
    - left: "На концерт"
      right: "З концерту"
    - left: "Додому"
      right: "З дому"
    - left: "В Україну"
      right: "З України"

- type: fill-in
  title: "Прийменники руху (Куди?)"
  instruction: "Choose the correct preposition for the destination."
  items:
    - sentence: "Я йду ___ парк."
      answer: "в"
      options: ["в", "на", "з", "біля"]
      explanation: "Park is a container (enclosed space), so we use 'в'."
    - sentence: "Ми їдемо ___ роботу."
      answer: "на"
      options: ["на", "в", "з", "у"]
      explanation: "Work is an activity/function, so we use 'на'."
    - sentence: "Студент йде ___ університет."
      answer: "в"
      options: ["в", "на", "з", "під"]
      explanation: "University is a building/institution, 'в' is standard."
    - sentence: "Вона йде ___ мами."
      answer: "до"
      options: ["до", "в", "на", "з"]
      explanation: "Movement towards a person always uses 'до' + Genitive."
    - sentence: "Автобус їде ___ площу."
      answer: "на"
      options: ["на", "в", "з", "біля"]
      explanation: "Square (площа) is an open surface, so we use 'на'."
    - sentence: "Я йду ___ школи."
      answer: "до"
      options: ["до", "в", "на", "з"]
      explanation: "Use 'до' when emphasizing direction towards the institution (Genitive form 'школи')."

- type: fill-in
  title: "Прийменники місця (Де?)"
  instruction: "Choose the correct preposition for the location."
  items:
    - sentence: "Книга лежить ___ столі."
      answer: "на"
      options: ["на", "в", "до", "з"]
      explanation: "Table is a surface, so we use 'на'."
    - sentence: "Ми сидимо ___ кімнаті."
      answer: "у"
      options: ["у", "на", "до", "з"]
      explanation: "Room is a container, so we use 'у' (variant of 'в')."
    - sentence: "Діти грають ___ майданчику."
      answer: "на"
      options: ["на", "в", "до", "з"]
      explanation: "Playground (майданчик) is an open surface, so we use 'на'."
    - sentence: "Телефон ___ сумці."
      answer: "у"
      options: ["у", "на", "до", "з"]
      explanation: "Bag is a container, so we use 'у'."
    - sentence: "Олеся зараз ___ Львові."
      answer: "у"
      options: ["у", "на", "до", "з"]
      explanation: "Cities usually take 'у/в'."
    - sentence: "Андрій ___ концерті."
      answer: "на"
      options: ["на", "в", "до", "з"]
      explanation: "Concert is an event, so we use 'на'."

- type: fill-in
  title: "Прийменники походження (Звідки?)"
  instruction: "Choose the correct preposition for origin."
  items:
    - sentence: "Я йду ___ роботи."
      answer: "з"
      options: ["з", "в", "на", "до"]
      explanation: "Returning from an activity (на роботі) uses 'з'."
    - sentence: "Ми їдемо ___ Києва."
      answer: "з"
      options: ["з", "в", "на", "до"]
      explanation: "Coming from a city uses 'з'."
    - sentence: "Він йде ___ школи."
      answer: "зі"
      options: ["зі", "на", "в", "до"]
      explanation: "We use 'зі' before 'ш' for euphony (easier pronunciation)."
    - sentence: "Вона вийшла ___ кімнати."
      answer: "з"
      options: ["з", "в", "на", "до"]
      explanation: "Exiting a room uses 'з'."
    - sentence: "Потяг прибув ___ Одеси."
      answer: "з"
      options: ["з", "в", "на", "до"]
      explanation: "Arriving from a city uses 'з'."
    - sentence: "Я повертаюся ___ магазину."
      answer: "з"
      options: ["з", "в", "на", "до"]
      explanation: "Returning from a shop uses 'з'."

- type: unjumble
  title: "Складіть речення про рух"
  instruction: "Assemble the sentences correctly."
  items:
    - words: ["Я", "йду", "в", "парк"]
      answer: "Я йду в парк"
    - words: ["Ми", "їдемо", "на", "роботу"]
      answer: "Ми їдемо на роботу"
    - words: ["Вона", "повертається", "додому"]
      answer: "Вона повертається додому"
    - words: ["Автобус", "їде", "в", "центр"]
      answer: "Автобус їде в центр"
    - words: ["Звідки", "ти", "йдеш"]
      answer: "Звідки ти йдеш"
    - words: ["Я", "з", "України"]
      answer: "Я з України"

- type: true-false
  title: "Логіка руху"
  instruction: "Decide if the statement is logically correct."
  items:
    - statement: "Я йду в Києві."
      correct: false
      explanation: "Incorrect. Movement (йду) requires 'Куди?' -> в Київ (Accusative), not 'в Києві' (Locative)."
    - statement: "Я їду на роботу."
      correct: true
      explanation: "Correct. 'Їду' implies transport/motion, 'на роботу' is correct destination."
    - statement: "Ми вдома."
      correct: true
      explanation: "Correct. Static location 'at home'."
    - statement: "Він йде до школа."
      correct: false
      explanation: "Incorrect. 'До' requires Genitive case: до школи."
    - statement: "Я йду з магазину."
      correct: true
      explanation: "Correct. Origin/return from 'магазин' uses 'з' + Genitive."
    - statement: "Автобус йде пішки."
      correct: false
      explanation: "Incorrect. A bus 'їде' (drives/goes by transport), it cannot walk (йти)."

- type: fill-in
  title: "Змініть ситуацію"
  instruction: "Transform the sentence from static location to active motion."
  items:
    - sentence: "Я в парку. -> Я йду ___."
      answer: "в парк"
      options: ["в парк", "в парку", "з парку", "на парк"]
      explanation: "Motion to 'парк' uses Accusative (no change for masculine inanimate)."
    - sentence: "Ти в школі. -> Ти йдеш ___."
      answer: "у школу"
      options: ["у школу", "у школі", "зі школи", "на школу"]
      explanation: "Motion to 'школа' changes 'a' to 'у' (Accusative)."
    - sentence: "Він на роботі. -> Він йде ___."
      answer: "на роботу"
      options: ["на роботу", "на роботі", "з роботи", "в роботу"]
      explanation: "Motion to 'робота' uses 'на' + 'у' ending."
    - sentence: "Ми в магазині. -> Ми йдемо ___."
      answer: "в магазин"
      options: ["в магазин", "в магазині", "з магазину", "на магазин"]
      explanation: "Motion to 'магазин' uses 'в' + Accusative."
    - sentence: "Вони на концерті. -> Вони йдуть ___."
      answer: "на концерт"
      options: ["на концерт", "на концерті", "з концерту", "в концерт"]
      explanation: "Motion to 'концерт' uses 'на' + Accusative."
    - sentence: "Книга на столі. -> Я кладу книгу ___."
      answer: "на стіл"
      options: ["на стіл", "на столі", "зі столу", "в стіл"]
      explanation: "Action directed onto 'стіл' uses 'на' + Accusative."

- type: quiz
  title: "Культурний контекст"
  instruction: "Choose the correct answer based on Ukrainian cultural context."
  items:
    - question: "Ви зайшли в дім до друга. Що ви робите першим?"
      options:
        - text: "Знімаю взуття"
          correct: true
        - text: "Йду на кухню"
          correct: false
        - text: "Лягаю на диван"
          correct: false
        - text: "Співаю пісню"
          correct: false
      explanation: "In Ukraine, 'Slipper Culture' means you always take off shoes when entering a home."
    - question: "Ви у потязі. Провідник приносить чай. Де він?"
      options:
        - text: "У підстаканнику"
          correct: true
        - text: "У каструлі"
          correct: false
        - text: "На тарілці"
          correct: false
        - text: "У шафі"
          correct: false
      explanation: "Tea in Ukrainian trains is traditionally served in a glass with a metal holder (підстаканник)."
    - question: "Ви зустріли друга на вулиці. Ви хочете знати його напрямок. Що ви питаєте?"
      options:
        - text: "Куди ти йдеш?"
          correct: true
        - text: "Де ти?"
          correct: false
        - text: "Звідки ти?"
          correct: false
        - text: "Хто ти?"
          correct: false
      explanation: "To ask about destination/direction, use 'Куди?'."
    - question: "Ви познайомилися з людиною. Ви хочете знати її рідне місто. Що ви питаєте?"
      options:
        - text: "Звідки ви?"
          correct: true
        - text: "Куди ви?"
          correct: false
        - text: "Де ви?"
          correct: false
        - text: "Коли ви?"
          correct: false
      explanation: "To ask about origin/hometown, use 'Звідки?'."
    - question: "Ви хочете спитати дорогу до метро. Що ви скажете?"
      options:
        - text: "Вибачте, де метро?"
          correct: true
        - text: "Метро тут."
          correct: false
        - text: "Я йду в метро."
          correct: false
        - text: "Метро працює."
          correct: false
      explanation: "'Вибачте, де...?' is the polite way to ask for location."
    - question: "Транспорт 'ходить' чи 'їздить'?"
      options:
        - text: "Їздить (їхати)"
          correct: true
        - text: "Ходить (йти)"
          correct: false
        - text: "Стоїть"
          correct: false
        - text: "Лежить"
          correct: false
      explanation: "Transport moves by wheels, so we use 'їхати'."
