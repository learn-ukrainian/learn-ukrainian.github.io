PREVIOUS_CONTENT_SUMMARY: "### Building Your First Sentences\n### The Art of Knowing\n### Asking and Working\n### The Dropped Pronoun\n---\n*   **Він працює тут.** [win prɑˈtsʲujɛ tut] — He works here.\n*   **Ми працюємо вдома.** [mɪ prɑˈtsʲujɛmɔ ˈwdɔmɑ] — We work at home.\n*   **Вони працюють багато.** [wɔˈnɪ prɑˈtsʲujutʲ bɑˈɦɑtɔ] — They work a lot.\n\n### The Dropped Pronoun\n\nYou will often hear Ukrainians speak without the words \"I\", \"you\", or \"we\". This is not lazy. It is efficient. Because the ending of the verb **already tells you** who is doing the action, the pronoun is extra information.\n\nIf I say **«Читаю»**, the ending **-ю** screams \"I am doing it!\". We do not need **Я**.\n\n*   **Знаю це.** [ˈznɑju tsɛ] — (I) know this.\n*   **Слухаємо радіо.** [ˈsluxɑjɛmɔ ˈrɑdʲijo] — (We) listen to the radio.\n*   **Чекаєш маму?** [tʃeˈkɑjɛʃ ˈmɑmu] — (Are you) waiting for mom?\n\nThis sounds very natural. It shows you are comfortable with the language. You are focusing on the *action*, not on yourself."
