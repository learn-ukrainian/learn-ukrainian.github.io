- type: group-sort
  title: 'Однина чи Множина?'
  instruction: 'Розподіліть фрази на дві групи: однина (одна особа) та множина (багато осіб).'
  groups:
    - name: 'Однина (Singular)'
      items:
        - 'я читаю'
        - 'ти пишеш'
        - 'він знає'
        - 'вона слухає'
        - 'я працюю'
        - 'ти питаєш'
    - name: 'Множина (Plural)'
      items:
        - 'ми читаємо'
        - 'ви пишете'
        - 'вони знають'
        - 'ми слухаємо'
        - 'ви працюєте'
        - 'вони питають'

- type: quiz
  title: 'Переклад дії'
  instruction: 'Оберіть правильний переклад для української фрази.'
  items:
    - question: 'Що означає фраза «Я читаю»?'
      explanation: 'Закінчення -ю вказує на «Я» (I).'
      options:
        - text: 'I read'
          correct: true
        - text: 'You read'
          correct: false
        - text: 'We read'
          correct: false
        - text: 'They read'
          correct: false
    - question: 'Що означає фраза «Ти знаєш»?'
      explanation: 'Закінчення -єш вказує на «Ти» (You, singular).'
      options:
        - text: 'You know'
          correct: true
        - text: 'I know'
          correct: false
        - text: 'He knows'
          correct: false
        - text: 'We know'
          correct: false
    - question: 'Що означає фраза «Він працює»?'
      explanation: 'Закінчення -є вказує на «Він» (He).'
      options:
        - text: 'He works'
          correct: true
        - text: 'She works'
          correct: false
        - text: 'You work'
          correct: false
        - text: 'They work'
          correct: false
    - question: 'Що означає фраза «Ми слухаємо»?'
      explanation: 'Закінчення -ємо вказує на «Ми» (We).'
      options:
        - text: 'We listen'
          correct: true
        - text: 'You listen'
          correct: false
        - text: 'They listen'
          correct: false
        - text: 'I listen'
          correct: false
    - question: 'Що означає фраза «Ви питаєте»?'
      explanation: 'Закінчення -єте вказує на «Ви» (You, plural/formal).'
      options:
        - text: 'You ask'
          correct: true
        - text: 'We ask'
          correct: false
        - text: 'They ask'
          correct: false
        - text: 'She asks'
          correct: false
    - question: 'Що означає фраза «Вони грають»?'
      explanation: 'Закінчення -ють вказує на «Вони» (They).'
      options:
        - text: 'They play'
          correct: true
        - text: 'We play'
          correct: false
        - text: 'You play'
          correct: false
        - text: 'He plays'
          correct: false
    - question: 'Що означає фраза «Я пишу»?'
      explanation: 'Закінчення -у (після ш) вказує на «Я» (I).'
      options:
        - text: 'I write'
          correct: true
        - text: 'You write'
          correct: false
        - text: 'He writes'
          correct: false
        - text: 'We write'
          correct: false
    - question: 'Що означає фраза «Вона чекає»?'
      explanation: 'Закінчення -є вказує на «Вона» (She).'
      options:
        - text: 'She waits'
          correct: true
        - text: 'He waits'
          correct: false
        - text: 'It waits'
          correct: false
        - text: 'You wait'
          correct: false

