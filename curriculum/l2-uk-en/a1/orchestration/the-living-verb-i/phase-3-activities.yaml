- type: match-up
  title: 'Хто це робить?'
  instruction: 'З’єднайте займенник з правильною формою дієслова «читати».'
  pairs:
    - left: 'Я'
      right: 'читаю'
    - left: 'Ти'
      right: 'читаєш'
    - left: 'Він / Вона'
      right: 'читає'
    - left: 'Ми'
      right: 'читаємо'
    - left: 'Ви'
      right: 'читаєте'
    - left: 'Вони'
      right: 'читають'

