- type: unjumble
  title: 'Побудуйте речення'
  instruction: 'Розставте слова у правильному порядку, щоб утворити речення.'
  items:
    - words:
        - 'Я'
        - 'читаю'
        - 'журнал'
      answer: 'Я читаю журнал'
    - words:
        - 'Ти'
        - 'пишеш'
        - 'лист'
      answer: 'Ти пишеш лист'
    - words:
        - 'Ми'
        - 'слухаємо'
        - 'радіо'
      answer: 'Ми слухаємо радіо'
    - words:
        - 'Вони'
        - 'знають'
        - 'все'
      answer: 'Вони знають все'
    - words:
        - 'Він'
