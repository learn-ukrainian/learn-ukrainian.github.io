        - 'на'
        - 'автобус'
      answer: 'Вона чекає на автобус'

- type: fill-in
  title: 'Оберіть форму дієслова'
  instruction: 'Оберіть правильну форму дієслова для кожного речення.'
  items:
    - sentence: 'Я _____ журнал.'
      answer: 'читаю'
      options:
        - 'читаю'
        - 'читаєш'
        - 'читає'
        - 'читаємо'
      explanation: 'Для «Я» (I) закінчення завжди -ю.'
    - sentence: 'Ти _____ лист.'
      answer: 'пишеш'
      options:
        - 'пишеш'
        - 'пишу'
        - 'пише'
        - 'пишуть'
      explanation: 'Для «Ти» (You, singular) закінчення завжди -еш/-єш.'
    - sentence: 'Ми _____ все.'
      answer: 'знаємо'
      options:
        - 'знаємо'
        - 'знають'
        - 'знає'
        - 'знаєте'
      explanation: 'Для «Ми» (We) закінчення завжди -емо/-ємо.'
    - sentence: 'Вони _____ радіо.'
      answer: 'слухають'
      options:
        - 'слухають'
        - 'слухає'
        - 'слухаємо'
        - 'слухаєш'
      explanation: 'Для «Вони» (They) закінчення завжди -уть/-ють.'
    - sentence: 'Ви _____ тут.'
      answer: 'працюєте'
      options:
        - 'працюєте'
        - 'працюємо'
        - 'працюють'
        - 'працює'
      explanation: 'Для «Ви» (You, plural/formal) закінчення завжди -ете/-єте.'
    - sentence: 'Вона _____ про це.'
      answer: 'питає'
      options:
        - 'питає'
        - 'питають'
        - 'питаєш'
        - 'питаю'
      explanation: 'Для «Вона» (She) закінчення завжди -е/-є.'
    - sentence: 'Він _____ в ігри.'
      answer: 'грає'
      options:
        - 'грає'
        - 'грають'
        - 'граєш'
        - 'граємо'
      explanation: 'Для «Він» (He) закінчення завжди -е/-є.'
    - sentence: 'Я _____ про це.'
      answer: 'думаю'
      options:
        - 'думаю'
        - 'думаєш'
        - 'думає'
        - 'думаємо'
      explanation: 'Для «Я» (I) закінчення завжди -ю.'

- type: true-false
  title: 'Граматична правда'
  instruction: 'Визначте, чи є твердження правильним.'
  items:
    - statement: 'Слово «читати» означає «I read».'
      correct: false
      explanation: 'Ні, «читати» — це інфінітив (to read). «I read» — це «Я читаю».'
    - statement: 'Закінчення «-ю» використовується зі словом «Я».'
      correct: true
      explanation: 'Так, це правильна форма: Я читаю, Я знаю.'
    - statement: 'Слово «вони» означає «we».'
      correct: false
      explanation: 'Ні, «вони» означає «they». «We» — це «ми».'
    - statement: '«Я читаю» і «Я читати» — це одне й те саме.'
      correct: false
      explanation: 'Ні, «Я читати» — це помилка (I to read). Правильно: «Я читаю».'
    - statement: 'Закінчення «-ють» використовується для множини «вони».'
      correct: true
      explanation: 'Так, Вони читають, Вони знають.'
    - statement: 'Українські дієслова змінюють форму залежно від особи.'
      correct: true
      explanation: 'Так, це називається відмінюванням (conjugation).'

- type: fill-in
  title: 'Хто це?'
  instruction: 'Вставте правильний займенник, дивлячись на закінчення дієслова.'
  items:
    - sentence: '_____ читаю журнал.'
      answer: 'Я'
      options:
        - 'Я'
        - 'Ти'
        - 'Ми'
        - 'Вони'
      explanation: 'Закінчення -ю вказує на «Я».'
    - sentence: '_____ знаєш правду.'
      answer: 'Ти'
      options:
        - 'Ти'
        - 'Я'
        - 'Він'
        - 'Ви'
      explanation: 'Закінчення -єш вказує на «Ти».'
    - sentence: '_____ слухає музику.'
      answer: 'Вона'
      options:
        - 'Вона'
        - 'Я'
        - 'Ти'
        - 'Ми'
      explanation: 'Закінчення -є вказує на «Він» або «Вона».'
    - sentence: '_____ працюємо вдома.'
      answer: 'Ми'
      options:
        - 'Ми'
        - 'Ви'
        - 'Вони'
        - 'Він'
      explanation: 'Закінчення -ємо вказує на «Ми».'
    - sentence: '_____ пишете лист.'
      answer: 'Ви'
      options:
        - 'Ви'
        - 'Ми'
        - 'Вони'
        - 'Ти'
      explanation: 'Закінчення -єте вказує на «Ви».'
    - sentence: '_____ чекають на автобус.'
      answer: 'Вони'
      options:
        - 'Вони'
        - 'Ми'
        - 'Ви'
        - 'Він'
      explanation: 'Закінчення -ють вказує на «Вони».'
    - sentence: '_____ граю в ігри.'
      answer: 'Я'
      options:
        - 'Я'
        - 'Ти'
        - 'Вона'
        - 'Ми'
      explanation: 'Закінчення -ю вказує на «Я».'
    - sentence: '_____ питає про тебе.'
      answer: 'Він'
      options:
        - 'Він'
        - 'Я'
        - 'Ти'
        - 'Ми'
      explanation: 'Закінчення -є вказує на «Він» або «Вона».'

