    - scrambled: 'з н а т и'
      answer: 'знати'
      hint: 'To know'
    - scrambled: 'с л у х а т и'
      answer: 'слухати'
      hint: 'To listen'
    - scrambled: 'п р а ц ю в а т и'
      answer: 'працювати'
      hint: 'To work'
    - scrambled: 'п и т а т и'
      answer: 'питати'
      hint: 'To ask'
    - scrambled: 'г р а т и'
      answer: 'грати'
      hint: 'To play'
    - scrambled: 'ч е к а т и'
