- type: "true-false"
  title: "True or False?"
  instruction: "Determine if these statements about Ukrainian action words are true or false."
  items:
    - statement: "You must always say 'Я' (I) when talking about yourself in Ukrainian."
      correct: false
      explanation: "You can often drop the pronoun 'Я' because the verb ending already shows who is acting."
    - statement: "The ending '-ю' shows that 'I' am doing the action."
      correct: true
      explanation: "The ending '-ю' is the specific personal ending for 'Я' (I)."
    - statement: "The dictionary form of an action word (like 'читати') can be used directly in a sentence like 'Я читати'."
      correct: false
      explanation: "You must always drop the '-ти' and add the correct personal ending, like 'Я читаю'."
    - statement: "The word 'читає' means 'He/She/It reads'."
      correct: true
      explanation: "The ending '-є' is used for Він, Вона, and Воно."
    - statement: "When you drop the pronoun, the sentence becomes unclear."
      correct: false
      explanation: "The sentence remains perfectly clear because the ending tells us exactly who is doing the action."
    - statement: "The word 'працюють' tells us that 'They' are working."
      correct: true
      explanation: "The ending '-ють' is used for Вони (They)."
    - statement: "These action words describe things happening right now or things you do regularly."
      correct: true
      explanation: "This is called the imperfective aspect, focusing on an ongoing process or routine."
    - statement: "The ending '-ємо' is used for the pronoun 'Ви' (You plural/formal)."
      correct: false
      explanation: "The ending '-ємо' is for 'Ми' (We). For 'Ви', the ending is '-єте'."

- type: "match-up"
  title: "Match the Ending"
  instruction: "Match the Ukrainian pronoun to the correct action word ending."
  pairs:
    - left: "Я (I)"
      right: "-ю"
    - left: "Ти (You, informal)"
      right: "-єш"
    - left: "Він / Вона (He / She)"
      right: "-є"
    - left: "Ми (We)"
      right: "-ємо"
    - left: "Ви (You, formal/plural)"
      right: "-єте"
    - left: "Вони (They)"
      right: "-ють"
    - left: "Dictionary ending (to do something)"
      right: "-ти"
    - left: "Stem for 'to read'"
      right: "чита-"

- type: "fill-in"
  title: "Complete the Sentence"
  instruction: "Choose the correct action word to complete each sentence."
  items:
    - sentence: "Я ___ книгу."
      answer: "читаю"
      options: ["читаю", "читати", "читаєш", "читає"]
    - sentence: "Ми ___ радіо."
      answer: "слухаємо"
      options: ["слухати", "слухає", "слухаєте", "слухаємо"]
    - sentence: "Він ___ вдома."
      answer: "працює"
      options: ["працюю", "працюємо", "працює", "працюють"]
    - sentence: "Вони ___ правду."
      answer: "знають"
      options: ["знає", "знаємо", "знають", "знаю"]
    - sentence: "Ти ___ усе."
      answer: "розумієш"
      options: ["розуміти", "розумієш", "розуміє", "розумію"]
    - sentence: "Ви ___ на автобус."
      answer: "чекаєте"
      options: ["чекаєте", "чекаємо", "чекають", "чекаю"]
    - sentence: "Я ___ лист."
      answer: "пишу"
      options: ["пишу", "пишеш", "пише", "писати"]
    - sentence: "Ми ___ вдома."
      answer: "відпочиваємо"
      options: ["відпочиваю", "відпочиваємо", "відпочиває", "відпочивають"]

- type: "quiz"
  title: "Check Your Understanding"
  instruction: "Choose the correct translation or concept."
  items:
    - question: "How do you correctly say 'I read' in Ukrainian?"
      options:
        - text: "Я читаю"
          correct: true
        - text: "Я читати"
          correct: false
        - text: "Ти читаєш"
          correct: false
        - text: "Ми читаємо"
          correct: false
    - question: "What does 'Працюю багато' mean?"
      options:
        - text: "I work a lot"
          correct: true
        - text: "He works a lot"
          correct: false
        - text: "We work a lot"
          correct: false
        - text: "To work a lot"
          correct: false
    - question: "Which word means 'We understand'?"
      options:
        - text: "розуміємо"
          correct: true
        - text: "розуміє"
          correct: false
        - text: "розуміють"
          correct: false
        - text: "розумію"
          correct: false
    - question: "If you want to say 'They listen', which ending do you use?"
      options:
        - text: "-ють"
          correct: true
        - text: "-ємо"
          correct: false
        - text: "-є"
          correct: false
        - text: "-ю"
          correct: false
    - question: "Why do native Ukrainian speakers often drop the word 'Я' (I)?"
      options:
        - text: "Because the ending already shows who is acting"
          correct: true
        - text: "Because it is impolite to say 'I'"
          correct: false
        - text: "Because 'Я' is hard to pronounce"
          correct: false
        - text: "Because 'Я' is only used in writing"
          correct: false
    - question: "What does the dictionary ending '-ти' tell us?"
      options:
        - text: "It is the base form of the word"
          correct: true
        - text: "It means 'I am doing' the action"
          correct: false
        - text: "It means the action is in the past"
          correct: false
        - text: "It means 'They are doing' the action"
          correct: false
    - question: "Translate to Ukrainian: 'She knows everything'."
      options:
        - text: "Вона знає усе"
          correct: true
        - text: "Вона знають усе"
          correct: false
        - text: "Вона знаю усе"
          correct: false
        - text: "Вона знати усе"
          correct: false
    - question: "What is the stem of the word 'думати' (to think)?"
      options:
        - text: "дума-"
          correct: true
        - text: "дум-"
          correct: false
        - text: "думати-"
          correct: false
        - text: "ду-"
          correct: false

- type: "group-sort"
  title: "Sort by Person"
  instruction: "Sort the action words into the correct groups based on who is doing the action."
  groups:
    - name: "I (Я) - ends in -ю or -у"
      items: ["читаю", "працюю", "знаю", "слухаю", "пишу"]
    - name: "He / She (Він / Вона) - ends in -є or -е"
      items: ["читає", "працює", "знає", "слухає", "пише"]
    - name: "We (Ми) - ends in -ємо or -емо"
      items: ["читаємо", "працюємо", "знаємо", "слухаємо", "пишемо"]

- type: "unjumble"
  title: "Build the Sentence"
  instruction: "Put the words in the correct order to form a natural Ukrainian sentence."
  items:
    - words: ["Я", "читаю", "журнал"]
      answer: "Я читаю журнал"
    - words: ["Він", "працює", "вдома"]
      answer: "Він працює вдома"
    - words: ["Ми", "слухаємо", "радіо"]
      answer: "Ми слухаємо радіо"
    - words: ["Вони", "знають", "усе"]
      answer: "Вони знають усе"
    - words: ["Я", "пишу", "лист"]
      answer: "Я пишу лист"
    - words: ["Ви", "чекаєте", "на", "автобус"]
      answer: "Ви чекаєте на автобус"

