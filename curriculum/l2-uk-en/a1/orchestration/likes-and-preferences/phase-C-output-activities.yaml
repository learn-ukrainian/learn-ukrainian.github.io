- type: match-up
  title: "Match the Meaning"
  instruction: "Connect the Ukrainian phrase with its English equivalent."
  pairs:
    - left: "Мені подобається кава."
      right: "I like coffee."
    - left: "Я люблю каву."
      right: "I love coffee."
    - left: "Я хочу каву."
      right: "I want coffee."
    - left: "Тобі подобається музика?"
      right: "Do you like music?"
    - left: "Ти любиш читати?"
      right: "Do you love to read?"
    - left: "Ми хочемо піти."
      right: "We want to go."
    - left: "Він любить смачний борщ."
      right: "He loves tasty borscht."
    - left: "Мені подобаються квіти."
      right: "I like flowers."

- type: unjumble
  title: "Build the Sentence"
  instruction: "Put the words in the correct order to form a sentence."
  items:
    - words:
        - "Мені"
        - "подобається"
        - "цікава"
        - "книга."
      answer: "Мені подобається цікава книга."
    - words:
        - "Я"
        - "люблю"
        - "смачний"
        - "борщ."
      answer: "Я люблю смачний борщ."
    - words:
        - "Ми"
        - "хочемо"
        - "читати"
        - "книгу."
      answer: "Ми хочемо читати книгу."
    - words:
        - "Тобі"
        - "подобається"
        - "нудна"
        - "лекція?"
      answer: "Тобі подобається нудна лекція?"
    - words:
        - "Він"
        - "хоче"
        - "їсти"
        - "борщ."
      answer: "Він хоче їсти борщ."
    - words:
        - "Я"
        - "люблю"
        - "каву,"
        - "а"
        - "ти?"
      answer: "Я люблю каву, а ти?"

- type: true-false
  title: "Grammar Check: True or False?"
  instruction: "Read the statements about Ukrainian grammar and decide if they are true or false."
  items:
    - statement: "To say 'I like', you use the word 'Я' as the subject."
      correct: false
      explanation: "You use the word 'Мені' (to me) and the thing you like is the subject."
    - statement: "The verb 'подобається' literally means 'appeals to'."
      correct: true
      explanation: "That is why we say 'Мені подобається' (it appeals to me)."
    - statement: "If you like multiple things, 'подобається' changes to 'подобаються'."
      correct: true
      explanation: "The verb must match the plural subject (e.g., квіти)."
    - statement: "When using 'Я люблю', a feminine noun ending in -а changes to -у."
      correct: true
      explanation: "This is the Accusative case for direct objects (e.g., кава -> каву)."
    - statement: "You can combine 'Мені подобається' directly with an action word (infinitive)."
      correct: true
      explanation: "For example, 'Мені подобається читати' is perfectly correct."
    - statement: "Saying 'Я хочу' in Ukrainian is considered rude and demanding."
      correct: false
      explanation: "In Ukrainian culture, stating 'Я хочу' is standard and polite."
    - statement: "The verb 'хотіти' (to want) follows completely regular conjugation rules."
      correct: false
      explanation: "It is an irregular verb with unique forms like 'хочу', 'хочеш', etc."
    - statement: "When using 'Я хочу' with an object, feminine words do not change their endings."
      correct: false
      explanation: "Just like with 'люблю', feminine words ending in -а change to -у."

