- type: quiz
  title: "Choose the Correct Phrase"
  instruction: "Select the most appropriate expression for each situation."
  items:
    - question: "How do you say 'I like coffee' using the 'appeals to me' structure?"
      explanation: "You use 'Мені подобається' to say something appeals to you."
      options:
        - text: "Мені подобається кава."
          correct: true
        - text: "Я подобаюсь кава."
          correct: false
        - text: "Мені люблю кава."
          correct: false
        - text: "Я подобається кава."
          correct: false
    - question: "Which phrase implies a strong, passionate love for something?"
      explanation: "Use 'Я люблю' for deep passion or active enjoyment."
      options:
        - text: "Я люблю"
          correct: true
        - text: "Мені подобається"
          correct: false
        - text: "Я хочу"
          correct: false
        - text: "Я подобаюсь"
          correct: false
    - question: "How do you correctly say 'I want to eat'?"
      explanation: "Combine 'Я хочу' with the infinitive 'їсти'."
      options:
        - text: "Я хочу їсти."
          correct: true
        - text: "Мені хочеться їсти."
          correct: false
        - text: "Я люблю їсти."
          correct: false
        - text: "Я хочу їстити."
          correct: false
    - question: "If you want to say 'You like music' to a friend, what do you say?"
      explanation: "'Тобі' means 'to you', paired with 'подобається'."
      options:
        - text: "Тобі подобається музика."
          correct: true
        - text: "Ти подобається музика."
          correct: false
        - text: "Вам подобається музика."
          correct: false
        - text: "Тобі любиш музику."
          correct: false
    - question: "Which verb changes the ending of feminine nouns ending in -а to -у?"
      explanation: "Both 'любити' and 'хотіти' require the Accusative case (-у for feminine objects)."
      options:
        - text: "Both люблю and хочу"
          correct: true
        - text: "Only подобається"
          correct: false
        - text: "Only хочу"
          correct: false
        - text: "Only люблю"
          correct: false
    - question: "How do you say 'I love music'?"
      explanation: "You are doing the action, so use 'Я люблю' and change 'музика' to 'музику'."
      options:
        - text: "Я люблю музику."
          correct: true
        - text: "Я люблю музика."
          correct: false
        - text: "Мені люблю музику."
          correct: false
        - text: "Я подобається музику."
          correct: false
    - question: "How do you politely ask 'And you?' after stating your preference?"
      explanation: "Use 'А ти?' to smoothly turn the question back to the other person."
      options:
        - text: "А ти?"
          correct: true
        - text: "І ти?"
          correct: false
        - text: "Та ти?"
          correct: false
        - text: "Чи ти?"
          correct: false
    - question: "If the things you like are plural (e.g., flowers), how does 'подобається' change?"
      explanation: "It changes to 'подобаються' (adds a -ю-)."
      options:
        - text: "It becomes подобаються."
          correct: true
        - text: "It stays подобається."
          correct: false
        - text: "It becomes подобають."
          correct: false
        - text: "It becomes подобаєте."
          correct: false

