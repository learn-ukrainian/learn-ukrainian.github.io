items:
  - lemma: "білий"
    translation: "white"
    pos: "adjective"
    notes: "Hard-stem adjective. Symbol of purity in Ukrainian culture."
    example: "біла сорочка"
  - lemma: "чорний"
    translation: "black"
    pos: "adjective"
    notes: "Hard-stem adjective. Symbol of fertile earth and wisdom."
    example: "чорний хліб"
  - lemma: "червоний"
    translation: "red"
    pos: "adjective"
    notes: "Hard-stem adjective. Symbol of life, love, and energy."
    example: "червона калина"
  - lemma: "синій"
    translation: "blue"
    pos: "adjective"
    notes: "Soft-stem adjective (-ій/-я/-є/-і). Different endings from other colors."
    example: "синє небо"
  - lemma: "зелений"
    translation: "green"
    pos: "adjective"
    example: "зелена трава"
  - lemma: "жовтий"
    translation: "yellow"
    pos: "adjective"
    example: "жовте поле"
  - lemma: "сорочка"
    translation: "shirt"
    pos: "noun"
    gender: "f"
    notes: "Also the base word for вишиванка (вишита сорочка)."
    example: "біла сорочка"
  - lemma: "штани"
    translation: "pants"
    pos: "noun"
    notes: "Pluralia tantum — always plural. Use одні штани for 'one pair'."
    example: "чорні штани"
  - lemma: "сукня"
    translation: "dress"
    pos: "noun"
    gender: "f"
    notes: "More elegant/literary synonym of плаття."
    example: "червона сукня"
  - lemma: "куртка"
    translation: "jacket"
    pos: "noun"
    gender: "f"
    example: "тепла куртка"
  - lemma: "светр"
    translation: "sweater"
    pos: "noun"
    gender: "m"
    example: "синій светр"
  - lemma: "плаття"
    translation: "dress"
    pos: "noun"
    gender: "n"
    notes: "Everyday/conversational word for dress. Neuter gender unlike сукня (feminine)."
    example: "червоне плаття"
  - lemma: "джинси"
    translation: "jeans"
    pos: "noun"
    notes: "Pluralia tantum — always plural."
    example: "сині джинси"
  - lemma: "окуляри"
    translation: "glasses"
    pos: "noun"
    notes: "Pluralia tantum — always plural."
    example: "чорні окуляри"
  - lemma: "вишиванка"
    translation: "vyshyvanka (embroidered shirt)"
    pos: "noun"
    gender: "f"
    notes: "Traditional Ukrainian embroidered shirt, a cultural symbol."
    example: "Це вишиванка."
  - lemma: "колір"
    translation: "color"
    pos: "noun"
    gender: "m"
    example: "Який колір?"
  - lemma: "одяг"
    translation: "clothing"
    pos: "noun"
    gender: "m"
    example: "Цей одяг — новий."
  - lemma: "прапор"
    translation: "flag"
    pos: "noun"
    gender: "m"
    notes: "The Ukrainian flag has two colors: синій and жовтий."
    example: "синій і жовтий прапор"
  - lemma: "бордо"
    translation: "burgundy"
    pos: "adjective"
    notes: "Invariable loan color — never changes form regardless of gender."
    usage: "сукня бордо, светр бордо"
  - lemma: "одні"
    translation: "one pair of"
    pos: "pronoun"
    notes: "Used with pluralia tantum nouns instead of один/одна/одне."
    example: "одні штани"