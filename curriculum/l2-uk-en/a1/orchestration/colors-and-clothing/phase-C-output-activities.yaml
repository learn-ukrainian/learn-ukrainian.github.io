- type: quiz
  title: Choose the Correct Form
  instruction: Match the color adjective to the gender of the noun.
  items:
    - question: 'Which word correctly completes: Це ___ светр.'
      explanation: Светр is a masculine noun, so it takes the -ий ending.
      options:
        - text: червоний
          correct: true
        - text: червона
          correct: false
        - text: червоне
          correct: false
        - text: червоні
          correct: false
    - question: 'Which word correctly completes: Це ___ сорочка.'
      explanation: Сорочка is a feminine noun, so it takes the -а ending.
      options:
        - text: біла
          correct: true
        - text: білий
          correct: false
        - text: біле
          correct: false
        - text: білі
          correct: false
    - question: 'Which word correctly completes: Це ___ плаття.'
      explanation: Плаття is a neuter noun, so it takes the -е ending.
      options:
        - text: зелене
          correct: true
        - text: зелений
          correct: false
        - text: зелена
          correct: false
        - text: зелені
          correct: false
    - question: 'Which word correctly completes: Ось ___ джинси.'
      explanation: Джинси is plural, so it takes the -і ending.
      options:
        - text: сині
          correct: true
        - text: синій
          correct: false
        - text: синя
          correct: false
        - text: синє
          correct: false
    - question: 'Choose the right ending for black jacket: ___ куртка.'
      explanation: Куртка is a feminine noun, so it requires чорна.
      options:
        - text: чорна
          correct: true
        - text: чорний
          correct: false
        - text: чорне
          correct: false
        - text: чорні
          correct: false
    - question: Which color never changes its ending?
      explanation: Бордо is a borrowed word and never changes its ending.
      options:
        - text: бордо
          correct: true
        - text: білий
          correct: false
        - text: синій
          correct: false
        - text: жовтий
          correct: false
    - question: 'Which word correctly completes: Це мій новий ___ светр.'
      explanation: Светр is masculine, so it requires the soft masculine ending -ій.
      options:
        - text: синій
          correct: true
        - text: синя
          correct: false
        - text: синє
          correct: false
        - text: сині
          correct: false
    - question: 'Which word correctly completes: Ось гарна червона ___.'
      explanation: Червона is feminine, so it must describe a feminine noun like сукня.
      options:
        - text: сукня
          correct: true
        - text: светр
          correct: false
        - text: джинси
          correct: false
        - text: плаття
          correct: false

