    ### Quick Self-Test


    Before you move on, try forming the locative for these places from memory. Cover
    the table above and say each one aloud:


    - Where is school? → **в школі**

    - Where is the post office? → **на пошті**

    - Where is the park? → **в парку**

    - Where is the hospital? → **в лікарні**

    - Where is the café? → **в кафе**


    If you got all five, you are ready. If not, review the table once more — these
    are the places you will use every day.


    Now ask yourself'
