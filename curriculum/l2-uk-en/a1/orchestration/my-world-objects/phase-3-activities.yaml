- type: unjumble
  title: 'Складіть речення'
  instruction: "Put the words in the correct order to form a sentence."
  items:
    - words: ["Той", "стіл", "старий"]
      answer: "Той стіл старий"
    - words: ["Ця", "шафа", "нова"]
      answer: "Ця шафа nova"
    - words: ["Це", "крісло", "зручне"]
      answer: "Це крісло зручне"
    - words: ["Це", "твоя", "книга", "?"]
      answer: "Це твоя книга?"
    - words: ["Де", "ця", "кімната", "?"]
      answer: "Де ця кімната?"

- type: fill-in
  title: 'Вставте пропущене слово'
  instruction: "Fill in the blank with the correct demonstrative pronoun (Цей, Ця, Це, Той, Та, Те)."
  items:
    - sentence: "___ (This) стіл великий."
      answer: "Цей"
      options: ["Цей", "Ця", "Це", "Той"]
      explanation: "Стіл is masculine and near."
    - sentence: "___ (That) вікно чисте."
      answer: "Те"
      options: ["Те", "Той", "Та", "Це"]
      explanation: "Вікно is neuter and far."
    - sentence: "___ (This) лампа нова."
      answer: "Ця"
      options: ["Ця", "Цей", "Це", "Та"]
      explanation: "Лампа is feminine and near."
    - sentence: "___ (That) книга стара."
      answer: "Та"
      options: ["Та", "Той", "Те", "Ця"]
      explanation: "Книга is feminine and far."
    - sentence: "___ (This) ліжко зручне."
      answer: "Це"
      options: ["Це", "Те", "Ця", "Цей"]
      explanation: "Ліжко is neuter and near."
    - sentence: "___ (That) телефон мій."
      answer: "Той"
      options: ["Той", "Та", "Те", "Цей"]
      explanation: "Телефон is masculine and far."

- type: anagram
  title: 'Розшифруйте слова'
  instruction: "Rearrange the letters to find the furniture word."
  items:
    - scrambled: "с т і л"
      answer: "стіл"
      hint: "Table"
    - scrambled: "ш а ф а"
      answer: "шафа"
      hint: "Wardrobe"
    - scrambled: "в і к н о"
      answer: "вікно"
      hint: "Window"
    - scrambled: "к н и г а"
      answer: "книга"
      hint: "Book"
    - scrambled: "л а м п а"
      answer: "лампа"
      hint: "Lamp"
    - scrambled: "д и в а н"
      answer: "диван"
      hint: "Sofa"

- type: group-sort
  title: 'Сортування: Близько чи Далеко?'
  instruction: "Sort the phrases into 'Near' (This) or 'Far' (That)."
  groups:
    - name: "Близько (Near)"
      items:
        - "цей стіл"
        - "ця книга"
        - "це вікно"
        - "ці двері"
    - name: "Далеко (Far)"
      items:
        - "той стіл"
        - "та книга"
        - "те вікно"
        - "ті двері"

- type: match-up
  title: 'Переклад фраз'
  instruction: "Match the Ukrainian phrases with their English meanings."
  pairs:
    - left: "Цей стілець"
      right: "This chair"
    - left: "Той стілець"
      right: "That chair"
    - left: "Ця лампа"
      right: "This lamp"
    - left: "Та лампа"
      right: "That lamp"
    - left: "Це вікно"
      right: "This window"
    - left: "Те вікно"
      right: "That window"

- type: fill-in
  title: 'Ідентифікація чи Специфікація?'
  instruction: "Choose the correct form of 'This' based on the context (Is it 'This is a...' or 'This specific...')."
  items:
    - sentence: "___ (This is) стіл."
      answer: "Це"
      options: ["Це", "Цей", "Ця", "Той"]
      explanation: "Identification: 'This is a table' always uses Це."
    - sentence: "___ (This) стіл новий."
      answer: "Цей"
      options: ["Цей", "Це", "Ця", "Той"]
      explanation: "Specification: 'This table' requires agreement (masculine)."
    - sentence: "___ (This is) книга."
      answer: "Це"
      options: ["Це", "Ця", "Цей", "Та"]
      explanation: "Identification: 'This is a book' always uses Це."
    - sentence: "___ (This) книга цікава."
      answer: "Ця"
      options: ["Ця", "Це", "Цей", "Та"]
      explanation: "Specification: 'This book' requires agreement (feminine)."
    - sentence: "___ (This is) вікно."
      answer: "Це"
      options: ["Це", "Цей", "Ця", "Те"]
      explanation: "Identification: 'This is a window' uses Це."
    - sentence: "___ (This) вікно велике."
      answer: "Це"
      options: ["Це", "Цей", "Ця", "Те"]
      explanation: "Specification: 'This window' (neuter) also uses Це."
