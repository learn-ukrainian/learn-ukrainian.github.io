        - text: "Цей"
          correct: true
        - text: "Ця"
          correct: false
        - text: "Це"
          correct: false
        - text: "Ці"
          correct: false
      explanation: "Стіл is masculine (він), so we use Цей."
    - question: "___ книга"
      options:
        - text: "Ця"
          correct: true
        - text: "Цей"
          correct: false
        - text: "Це"
          correct: false
        - text: "Ці"
          correct: false
      explanation: "Книга is feminine (вона), so we use Ця."
    - question: "___ вікно"
