- type: group-sort
  title: 'Сортування: Чоловічий, Жіночий, Середній'
  instruction: "Sort the words into the correct gender category (Він, Вона, Воно)."
  groups:
    - name: "Він (Masculine)"
      items:
        - "стіл"
        - "стілець"
        - "диван"
        - "телефон"
    - name: "Вона (Feminine)"
      items:
        - "шафа"
        - "книга"
        - "кімната"
        - "лампа"
    - name: "Воно (Neuter)"
      items:
        - "вікно"
        - "ліжко"
        - "крісло"

- type: match-up
  title: 'Словниковий запас: Меблі'
  instruction: "Match the Ukrainian words with their English translations."
  pairs:
    - left: "стіл"
      right: "table"
    - left: "стілець"
      right: "chair"
    - left: "крісло"
      right: "armchair"
    - left: "ліжко"
      right: "bed"
    - left: "шафа"
      right: "wardrobe"
    - left: "вікно"
      right: "window"
    - left: "кімната"
      right: "room"
    - left: "диван"
      right: "sofa"

