findings:
- dimension: LINGUISTIC ACCURACY
  severity: critical
  location: '`## Діалоги` — `Ось короткий Діалог.`'
  issue: Unmotivated capitalization of the common noun `діалог`.
  fix: 'Change `Діалог` to lowercase: `діалог`.'
- dimension: PLAN ADHERENCE
  severity: major
  location: '`## Кольори` — `To describe the visual world, we start with twelve базових
    кольорів... Six essential hard group colors are...`'
  issue: The section promises twelve base colors but explicitly teaches only six hard-group
    colors plus `синій`; contracted items are deferred to the next section instead
    of being rolled out here.
  fix: Rewrite `Кольори` so Section 2 actually introduces the contracted color inventory
    and the hard/soft split within the section, while staying inside the 270–330-word
    budget.
- dimension: PLAN ADHERENCE
  severity: major
  location: '`## Діалоги` and `## Синій ≠ блакитний`'
  issue: Both sections are materially over the contract max because they spend too
    many words on English framing and glosses rather than contracted teaching beats.
  fix: Rewrite those sections to fit the 270–330-word budgets and keep only the contracted
    teaching content.
- dimension: EXERCISE QUALITY
  severity: major
  location: '`## Синій ≠ блакитний` — `<!-- INJECT_ACTIVITY: match-up-appearance -->`
    placed before `When describing a person''s physical appearance in Ukrainian...`'
  issue: The appearance match-up marker is injected before the learner sees the target
    collocations `карі очі`, `русяве волосся`, `сиве волосся`.
  fix: 'Move `<!-- INJECT_ACTIVITY: match-up-appearance -->` to after the appearance-collocation
    paragraph.'
- dimension: PEDAGOGICAL QUALITY
  severity: major
  location: '`## Кольори`, `## Синій ≠ блакитний`, `## Підсумок` — `To describe the
    visual world...`, `One crucial exception exists...`, `You have learned how to
    describe the world around you...`'
  issue: English-heavy lecture prose overwhelms the Ukrainian examples and weakens
    the teach-then-practice flow required for A1.
  fix: Rewrite these sections in concise, Ukrainian-first pedagogy with examples leading
    the explanation, not the other way around.
- dimension: ENGAGEMENT & TONE
  severity: major
  location: '`## Підсумок` — `You have learned...` and `Now it is time to put your
    new knowledge into practice...`'
  issue: Formulaic meta narration and filler replace concrete teacher guidance.
  fix: Rewrite the summary as a direct, example-driven recap and self-check in a teacher
    voice, without generic lesson narration.
- dimension: DIALOGUE & CONVERSATION QUALITY
  severity: major
  location: '`## Діалоги` — `Meanwhile, Dmytro and Liza are preparing for a social
    event...` and `Я думаю, цей білий светр і коричневі черевики.`'
  issue: The second scene is narrated in English instead of unfolding through dialogue,
