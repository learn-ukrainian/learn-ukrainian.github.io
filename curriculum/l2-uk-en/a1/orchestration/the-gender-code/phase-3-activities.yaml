- type: fill-in
  title: 'Класифікація та граматичні роди'
  instruction: 'Complete the classification of these nouns and their families.'
  items:
    - sentence: 'Слово книга належить до ... роду.'
      answer: 'жіночого'
      options: ['жіночого', 'чоловічого', 'середнього', 'спільного']
      explanation: 'Слово книга закінчується на -а.'
    - sentence: 'Слово дім — це представник ... відміни.'
      answer: 'другої'
      options: ['другої', 'першої', 'третьої', 'четвертої']
      explanation: 'Чоловічий рід на приголосний — це друга відміна.'
    - sentence: 'Слово сестра належить до ... відміни.'
      answer: 'першої'
      options: ['першої', 'другої', 'третьої', 'четвертої']
      explanation: 'Жіночий рід на -а — це перша відміна.'
    - sentence: 'Слово вікно — це ... рід.'
      answer: 'середній'
      options: ['середній', 'чоловічий', 'жіночий', 'особливий']
      explanation: 'Закінчення -о вказує на середній рід.'
    - sentence: 'Слово ніч належить до ... відміни.'
      answer: 'третьої'
      options: ['третьої', 'першої', 'другої', 'четвертої']
      explanation: 'Жіночий рід на приголосний — це третя відміна.'
    - sentence: 'Слово ім’я належить до ... роду.'
      answer: 'середнього'
      options: ['середнього', 'жіночого', 'чоловічого', 'спільного']
      explanation: 'Це виняток середнього роду.'
    - sentence: 'Слово сонце має ... рід.'
      answer: 'середній'
      options: ['середній', 'чоловічий', 'жіночий', 'активний']
      explanation: 'Сонце закінчується на -е.'
    - sentence: 'Слово Микола належить до ... відміни.'
      answer: 'першої'
      options: ['першої', 'другої', 'третьої', 'четвертої']
      explanation: 'Микола має закінчення -а, як і жіночі слова першої відміни.'
