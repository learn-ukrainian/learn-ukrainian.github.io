  pairs:
    - left: 'мама (-а)'
      right: '1 відміна (Family 1)'
    - left: 'земля (-я)'
      right: '1 відміна (Family 1)'
    - left: 'дім (consonant)'
      right: '2 відміна (Family 2)'
    - left: 'місто (-о)'
      right: '2 відміна (Family 2)'
    - left: 'вікно (-о)'
      right: '2 відміна (Family 2)'
    - left: 'брат (consonant)'
      right: '2 відміна (Family 2)'
    - left: 'ніч (F-consonant)'
      right: '3 відміна (Family 3)'
    - left: 'любов (F-consonant)'
      right: '3 відміна (Family 3)'
    - left: 'ім’я (-я, N)'
      right: '4 відміна (Family 4)'
    - left: 'сестра (-а)'
      right: '1 відміна (Family 1)'
    - left: 'стіл (consonant)'
      right: '2 відміна (Family 2)'
    - left: 'серце (-е)'
      right: '2 відміна (Family 2)'

