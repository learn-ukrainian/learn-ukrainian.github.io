- type: group-sort
  title: 'Розподіліть слова за закінченнями'
  instruction: 'Sort these nouns into groups based on their grammatical ending patterns.'
  groups:
    - name: 'Закінчення на приголосний'
      items: ['дім', 'брат', 'стіл', 'хліб', 'день']
    - name: 'Закінчення на -а або -я'
      items: ['мама', 'сестра', 'книга', 'земля', 'зона']
    - name: 'Закінчення на -о або -е'
      items: ['вікно', 'місто', 'серце', 'сонце', 'море']

- type: quiz
  title: 'Перевірка знань про роди'
  instruction: 'Choose the correct answer based on the Ukrainian gender rules we learned.'
  items:
    - question: 'Який рід зазвичай мають іменники, що закінчуються на приголосний?'
      explanation: 'Іменники, що закінчуються на приголосний, зазвичай належать до чоловічого роду.'
      options:
        - text: 'чоловічий'
          correct: true
        - text: 'жіночий'
          correct: false
        - text: 'середній'
          correct: false
        - text: 'спільний'
          correct: false
    - question: 'Яке закінчення зазвичай вказує на те, що слово жіночого роду?'
      explanation: 'Закінчення -а або -я є основною ознакою жіночого роду в українській мові.'
      options:
        - text: 'закінчення -а або -я'
          correct: true
        - text: 'закінчення -о або -е'
          correct: false
        - text: 'нульове закінчення'
          correct: false
        - text: 'закінчення на приголосний'
          correct: false
    - question: 'До якого роду належать слова, що закінчуються на -о або -е?'
      explanation: 'Слова з закінченням -о або -е (як вікно чи сонце) належать до середнього роду.'
      options:
        - text: 'середній рід'
          correct: true
        - text: 'чоловічий рід'
          correct: false
        - text: 'жіночий рід'
          correct: false
        - text: 'біологічний рід'
          correct: false
    - question: 'Чому слово тато вважається словом чоловічого роду?'
      explanation: 'Біологічна стать завжди перемагає граматичне закінчення. Тато — це чоловік.'
      options:
        - text: 'через біологічну стать'
          correct: true
        - text: 'через закінчення -о'
          correct: false
        - text: 'через закінчення на приголосний'
          correct: false
        - text: 'через правило м’якого знака'
          correct: false
    - question: 'Який займенник ми використовуємо для слів чоловічого роду?'
      explanation: 'Для слів чоловічого роду ми використовуємо присвійний займенник мій.'
      options:
        - text: 'мій'
          correct: true
        - text: 'моя'
          correct: false
        - text: 'моє'
          correct: false
        - text: 'мої'
          correct: false
    - question: 'Яке закінчення має слово середнього роду сонце?'
      explanation: 'Слово сонце закінчується на -е, що є ознакою середнього роду.'
      options:
        - text: 'закінчення -е'
          correct: true
        - text: 'закінчення -о'
          correct: false
        - text: 'закінчення -а'
          correct: false
        - text: 'приголосний'
          correct: false
    - question: 'До якого роду належить слово ніч з м’яким знаком?'
      explanation: 'Слово ніч закінчується на приголосний, але за правилом є словом жіночого роду.'
      options:
        - text: 'жіночий рід'
          correct: true
        - text: 'чоловічий рід'
          correct: false
        - text: 'середній рід'
          correct: false
        - text: 'немає роду'
          correct: false
    - question: 'Як ми називаємо середній рід українською мовою?'
      explanation: 'Середній рід українською мовою звучить як середній рід.'
      options:
        - text: 'середній рід'
          correct: true
        - text: 'чоловічий рід'
          correct: false
        - text: 'жіночий рід'
          correct: false
        - text: 'нульовий рід'
          correct: false

- type: fill-in
  title: 'Мій, моя чи моє?'
  instruction: 'Choose the correct possessive pronoun (мій, моя, or моє) to match the noun gender.'
  items:
    - sentence: 'Це ... брат.'
      answer: 'мій'
      options: ['мій', 'моя', 'моє', 'мій']
      explanation: 'Брат закінчується на приголосний, тому це чоловічий рід — мій.'
    - sentence: 'Це ... сестра.'
      answer: 'моя'
      options: ['моя', 'мій', 'моє', 'моя']
      explanation: 'Сестра закінчується на -а, тому це жіночий рід — моя.'
    - sentence: 'Це ... вікно.'
      answer: 'моє'
      options: ['моє', 'мій', 'моя', 'моє']
      explanation: 'Вікно закінчується на -о, тому це середній рід — моє.'
    - sentence: 'Ось ... дім.'
      answer: 'мій'
      options: ['мій', 'моя', 'моє', 'мій']
      explanation: 'Дім закінчується на приголосний — чоловічий рід.'
    - sentence: 'Там ... місто.'
      answer: 'моє'
      options: ['моє', 'мій', 'моя', 'моє']
      explanation: 'Місто має закінчення -о, тому воно середнього роду.'
    - sentence: 'Це ... книга.'
      answer: 'моя'
      options: ['моя', 'мій', 'моє', 'моя']
      explanation: 'Книга закінчується на -а — жіночий рід.'
    - sentence: 'Це ... мама.'
      answer: 'моя'
      options: ['моя', 'мій', 'моє', 'моя']
      explanation: 'Мама — жіночий рід (закінчення -а).'
    - sentence: 'Це ... тато.'
      answer: 'мій'
      options: ['мій', 'моя', 'моє', 'мій']
      explanation: 'Хоча тато закінчується на -о, це чоловічий рід (біологічна стать).'
    - sentence: 'Це ... серце.'
      answer: 'моє'
      options: ['моє', 'мій', 'моя', 'моє']
      explanation: 'Серце закінчується на -е — середній рід.'
    - sentence: 'Це ... сонце.'
      answer: 'моє'
      options: ['моє', 'мій', 'моя', 'моє']
      explanation: 'Сонце має закінчення -е, тому це середній рід.'
    - sentence: 'Це ... хліб.'
      answer: 'мій'
      options: ['мій', 'моя', 'моє', 'мій']
      explanation: 'Хліб закінчується на приголосний — чоловічий рід.'
    - sentence: 'Це ... ім’я.'
      answer: 'моє'
      options: ['моє', 'мій', 'моя', 'моє']
      explanation: 'Слово ім’я — це виняток середнього роду (четверта відміна).'

- type: anagram
  title: 'Розшифруйте слова за родами'
  instruction: 'Unscramble the letters to find the names of our neighbors and objects.'
  items:
