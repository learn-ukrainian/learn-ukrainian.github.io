- type: unjumble
  title: 'Складіть прості речення'
  instruction: 'Put the words in the correct order to form basic sentences about gender agreement.'
  items:
    - words: ['мій', 'це', 'дім']
      answer: 'Це мій дім'
    - words: ['моя', 'це', 'мама']
      answer: 'Це моя мама'
    - words: ['моє', 'це', 'вікно']
      answer: 'Це моє вікно'
    - words: ['мій', 'це', 'брат']
      answer: 'Це мій брат'
    - words: ['моя', 'книга', 'це']
      answer: 'Це моя книга'
    - words: ['це', 'моє', 'місто']
      answer: 'Це моє місто'

- type: true-false
  title: 'Правда чи неправда?'
  instruction: 'Check if these statements about the Ukrainian gender code are correct.'
  items:
    - statement: 'В українській мові є чотири роди іменників.'
      correct: false
      explanation: 'В українській мові є три основні роди: чоловічий, жіночий та середній.'
    - statement: 'Слово тато належить до чоловічого роду.'
      correct: true
      explanation: 'Так, тато — це чоловік, тому це чоловічий рід.'
    - statement: 'Більшість слів на приголосний є чоловічого роду.'
      correct: true
      explanation: 'Це правило Хард-Стоп: приголосний в кінці — ознака чоловічого роду.'
    - statement: 'Слово сонце є словом жіночого роду.'
      correct: false
      explanation: 'Сонце закінчується на -е, тому це середній рід.'
    - statement: 'Слово ніч є винятком і належить до жіночого роду.'
      correct: true
      explanation: 'Так, слово ніч належить до жіночого роду (третя відміна).'
    - statement: 'Слово ім’я належить до середнього роду.'
      correct: true
      explanation: 'Це пастка четвертої відміни: ім’я — це воно (середній рід).'
    - statement: 'Ми використовуємо мій для слів жіночого роду.'
      correct: false
      explanation: 'Для жіночого роду ми використовуємо слово моя.'
    - statement: 'В українській мові кожне слово має свій рід.'
      correct: true
      explanation: 'Так, кожен іменник в українській мові належить до певної родинної групи за родом.'

- type: match-up
  title: 'З’єднайте слово та відміну (родину)'
