- type: group-sort
  title: "Сортування за родом"
  instruction: "Розподіліть слова за їхнім граматичним родом (Він, Вона, Воно)."
  groups:
    - name: "Чоловічий (Він)"
      items: ["стіл", "брат", "дім", "тато", "собака", "день"]
    - name: "Жіночий (Вона)"
      items: ["мама", "сестра", "книга", "земля", "ніч", "квартира"]
    - name: "Середній (Воно)"
      items: ["вікно", "місто", "море", "серце", "ім'я", "сонце"]

- type: match-up
  title: "Мій, Моя чи Моє?"
  instruction: "З'єднайте іменник з правильним займенником (Match the noun with the correct possessive pronoun)."
  pairs:
    - left: "брат"
      right: "мій"
    - left: "сестра"
      right: "моя"
    - left: "вікно"
      right: "моє"
    - left: "тато"
      right: "мій"
    - left: "мама"
      right: "моя"
    - left: "ім'я"
      right: "моє"
    - left: "дім"
      right: "мій"
    - left: "книга"
      right: "моя"
    - left: "море"
      right: "моє"
    - left: "день"
      right: "мій"
    - left: "ніч"
      right: "моя"
    - left: "собака"
      right: "мій"

- type: quiz
  title: "Теорія роду"
  instruction: "Оберіть правильну відповідь на питання про граматичний рід."
  items:
    - question: "Якого роду слово «стіл»?"
      explanation: "Слово закінчується на приголосний, тому це чоловічий рід."
      options:
        - text: "Чоловічий"
          correct: true
        - text: "Жіночий"
          correct: false
        - text: "Середній"
          correct: false
        - text: "Не має роду"
          correct: false
    - question: "Якого роду слово «книга»?"
      explanation: "Слово закінчується на -а, тому це жіночий рід."
      options:
        - text: "Жіночий"
          correct: true
        - text: "Чоловічий"
          correct: false
        - text: "Середній"
          correct: false
        - text: "Множина"
          correct: false
    - question: "Якого роду слово «вікно»?"
      explanation: "Слово закінчується на -о, тому це середній рід."
      options:
        - text: "Середній"
          correct: true
        - text: "Чоловічий"
          correct: false
        - text: "Жіночий"
          correct: false
        - text: "Універсальний"
          correct: false
    - question: "Слово «тато» закінчується на -о. Якого воно роду?"
      explanation: "Тато — це чоловік, тому біологічна стать переважає закінчення. Це чоловічий рід."
      options:
        - text: "Чоловічий"
          correct: true
        - text: "Середній"
          correct: false
        - text: "Жіночий"
          correct: false
        - text: "Спільний"
          correct: false
    - question: "Якого роду слово «ім'я»?"
      explanation: "Це слово-виняток (Сім'я 4), воно належить до середнього роду."
      options:
        - text: "Середній"
          correct: true
        - text: "Жіночий"
          correct: false
        - text: "Чоловічий"
          correct: false
        - text: "Невідомий"
          correct: false
    - question: "Слово «ніч» закінчується на приголосний. Якого воно роду?"
      explanation: "Це виняток. Слова жіночого роду можуть закінчуватися на м'який знак або шиплячий."
      options:
        - text: "Жіночий"
          correct: true
        - text: "Чоловічий"
          correct: false
        - text: "Середній"
          correct: false
        - text: "Змішаний"
          correct: false
    - question: "Яке закінчення зазвичай має чоловічий рід?"
      explanation: "Чоловічий рід зазвичай має нульове закінчення (закінчується на приголосний)."
      options:
        - text: "Приголосний"
          correct: true
        - text: "-а / -я"
          correct: false
        - text: "-о / -е"
          correct: false
        - text: "-и / -і"
          correct: false
    - question: "Яке закінчення зазвичай має середній рід?"
      explanation: "Середній рід типово закінчується на -о або -е."
      options:
        - text: "-о / -е"
          correct: true
        - text: "-а / -я"
          correct: false
        - text: "Приголосний"
          correct: false
        - text: "-у / -ю"
          correct: false

- type: fill-in
  title: "Правильний займенник"
  instruction: "Оберіть правильну форму займенника «мій» (Choose the correct form of 'my')."
  items:
    - sentence: "Це ... мама."
      answer: "моя"
      options: ["моя", "мій", "моє", "мої"]
      explanation: "Мама — жіночий рід (вона)."
    - sentence: "Це ... тато."
      answer: "мій"
      options: ["мій", "моя", "моє", "мої"]
      explanation: "Тато — чоловічий рід (він), незважаючи на закінчення -о."
    - sentence: "Де ... вікно?"
      answer: "моє"
      options: ["моє", "мій", "моя", "мої"]
      explanation: "Вікно — середній рід (воно)."
    - sentence: "Це ... брат."
      answer: "мій"
      options: ["мій", "моя", "моє", "мої"]
      explanation: "Брат — чоловічий рід (він)."
    - sentence: "Це ... сестра."
      answer: "моя"
      options: ["моя", "мій", "моє", "мої"]
      explanation: "Сестра — жіночий рід (вона)."
    - sentence: "Як ... ім'я?"
      answer: "моє"
      options: ["моє", "мій", "моя", "мої"]
      explanation: "Ім'я — середній рід (воно)."
    - sentence: "Тут ... дім."
      answer: "мій"
      options: ["мій", "моя", "моє", "мої"]
      explanation: "Дім — чоловічий рід (він)."
    - sentence: "Це ... книга."
      answer: "моя"
      options: ["моя", "мій", "моє", "мої"]
      explanation: "Книга — жіночий рід (вона)."
    - sentence: "Це ... місто."
      answer: "моє"
      options: ["моє", "мій", "моя", "мої"]
      explanation: "Місто — середній рід (воно)."
    - sentence: "Це ... собака."
      answer: "мій"
      options: ["мій", "моя", "моє", "мої"]
      explanation: "Собака — чоловічий рід (він) в українській мові."

- type: anagram
  title: "Знайдіть слово"
  instruction: "Розшифруйте слова (Rearrange the letters to form the correct Ukrainian word)."
  items:
    - scrambled: "б р а т"
      answer: "брат"
      hint: "Male sibling"
    - scrambled: "с е с т р а"
      answer: "сестра"
      hint: "Female sibling"
    - scrambled: "м а м а"
      answer: "мама"
      hint: "Mother"
    - scrambled: "т а т о"
      answer: "тато"
      hint: "Father"
    - scrambled: "в і к н о"
      answer: "вікно"
      hint: "Window"
    - scrambled: "м і с т о"
      answer: "місто"
      hint: "City"
    - scrambled: "с е р ц е"
      answer: "серце"
      hint: "Heart"
    - scrambled: "с о б а к а"
      answer: "собака"
      hint: "Dog"

- type: unjumble
  title: "Складіть речення"
  instruction: "Розставте слова у правильному порядку (Put the words in the correct order)."
  items:
    - words: ["Це", "мій", "брат"]
      answer: "Це мій брат"
    - words: ["Це", "моя", "мама"]
      answer: "Це моя мама"
    - words: ["Це", "моє", "вікно"]
      answer: "Це моє вікно"
    - words: ["Де", "мій", "дім"]
      answer: "Де мій дім"
    - words: ["Тут", "моє", "місто"]
      answer: "Тут моє місто"
    - words: ["Моє", "ім'я", "Андрій"]
      answer: "Моє ім'я Андрій"

- type: true-false
  title: "Правда чи ні?"
  instruction: "Визначте, чи правильне твердження (Decide if the statement is true or false)."
  items:
    - statement: "Слово «вікно» належить до середнього роду."
      correct: true
      explanation: "Закінчення -о вказує на середній рід."
    - statement: "Слово «тато» належить до середнього роду."
      correct: false
      explanation: "Тато — чоловічий рід, бо це чоловік."
    - statement: "Слово «мама» належить до жіночого роду."
      correct: true
      explanation: "Закінчення -а вказує на жіночий рід."
    - statement: "Слово «стіл» належить до жіночого роду."
      correct: false
      explanation: "Стіл закінчується на приголосний, це чоловічий рід."
    - statement: "Слово «ім'я» належить до жіночого роду."
      correct: false
      explanation: "Ім'я — це виняток, воно середнього роду."
    - statement: "Слово «собака» належить до чоловічого роду."
      correct: true
      explanation: "Собака в українській мові — він."
    - statement: "Слово «ніч» належить до чоловічого роду."
      correct: false
      explanation: "Ніч — це виняток, воно жіночого роду."
    - statement: "Слово «день» належить до чоловічого роду."
      correct: true
      explanation: "День — він, закінчується на м'який знак, але це чоловічий рід."

- type: group-sort
  title: "Сортування за закінченням"
  instruction: "Розподіліть слова за їхнім закінченням (Sort words by their ending)."
  groups:
    - name: "Закінчення на приголосний"
      items: ["дім", "стіл", "брат", "день"]
    - name: "Закінчення на -А / -Я"
      items: ["мама", "сестра", "книга", "земля"]
    - name: "Закінчення на -О / -Е"
      items: ["вікно", "місто", "море", "серце"]

- type: fill-in
  title: "Оберіть іменник"
  instruction: "Оберіть слово, яке підходить за родом (Choose the word that matches the gender)."
  items:
    - sentence: "Це мій ..."
      answer: "брат"
      options: ["брат", "сестра", "вікно", "книга"]
      explanation: "Потрібен іменник чоловічого роду."
    - sentence: "Це моя ..."
      answer: "сестра"
      options: ["сестра", "брат", "місто", "тато"]
      explanation: "Потрібен іменник жіночого роду."
    - sentence: "Це моє ..."
      answer: "місто"
      options: ["місто", "дім", "мама", "собака"]
      explanation: "Потрібен іменник середнього роду."
    - sentence: "Де мій ..."
      answer: "тато"
      options: ["тато", "мама", "вікно", "земля"]
      explanation: "Тато — чоловічий рід (мій)."
    - sentence: "Тут моя ..."
      answer: "земля"
      options: ["земля", "дім", "сонце", "день"]
      explanation: "Земля — жіночий рід (моя)."
    - sentence: "Це моє ..."
      answer: "ім'я"
      options: ["ім'я", "стіл", "ніч", "день"]
      explanation: "Ім'я — середній рід (моє)."

