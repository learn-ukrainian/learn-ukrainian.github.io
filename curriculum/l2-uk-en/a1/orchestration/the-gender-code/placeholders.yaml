  These are real exercises from Ukrainian 1st-grade primers. Use them as **inspiration\
  \ for style and difficulty level** — notice how they use simple syllable combinations,\
  \ short words, and build progressively. Do NOT copy them verbatim, but match their\
  \ pedagogical approach and simplicity.\n\n**Grade 1, zaharijchuk** — Сторінка 6:\n\
  ```\nЮю\nАа\nОо\nУу\nИи\nМм\nМм\nІі\nНн\nНн\nВв\nВв\nЛл\nСс\nКк\nПп\nРр\nТт\nЕе\n\
