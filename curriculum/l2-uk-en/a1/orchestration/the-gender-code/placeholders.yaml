LEVEL_CONSTRAINTS: "HARD GRAMMAR RULES (audit will reject violations):\n- Max 10 words\
  \ per Ukrainian sentence (STRICT — count every word)\n- ONLY 1 clause per sentence\
  \ (no compound sentences)\n- Dative case FORBIDDEN (no мені, тобі, йому, їй, вам,\
  \ їм, -ові/-еві endings)\n  Exception: нам is taught as decodable vocabulary in\
  \ M1 (reading drill word, not grammar)\n  Exception (M19 likes-and-preferences):\
  \ Dative forms мені/тобі/йому/їй/нам/вам/їм allowed\n    ONLY in the fixed construction\
  \ «Мені подобається + noun/infinitive». Teach as a memorized\n    chunk — do NOT\
  \ explain dative case rules or paradigms.\n- Instrumental case FORBIDDEN (no з другом,\
  \ з мамою, -ом/-ою/-ем/-ею endings)\n- NO subordinate clauses: який/яка/яке, що-clause,\
  \ коли, якщо, тому що, бо, щоб, поки are ALL BANNED\n- Only imperfective aspect\
  \ verbs\n- No participles\n- Allowed cases: Nominative, Accusative, Locative (from\
  \ M13), Genitive (basics), Vocative"
PEDAGOGICAL_CONSTRAINTS: "SEQUENCE CONSTRAINTS (M5-10 — Phonology & First Grammar):\n\
  Full alphabet known. Modules teach: syllables (M5), stress (M6), gender (M7), greetings\
  \ (M8), Це/Я/Мене звати (M9), Що це? (M10).\n\nGRAMMAR STATUS:\n- AVAILABLE: bare\
  \ nouns, gender classification, Це + noun, Я + noun, memorized politeness phrases\
  \ (Дякую, Будь ласка, Вибачте from M8)\n- FORBIDDEN: verb conjugation, imperatives,\
  \ adjective agreement, plurals, all cases except nominative\n  Exception (M6 stress):\
  \ Conjugated verb forms allowed ONLY as stress pattern examples (e.g., писа́ти →\
  \ пишу́ → пи́шеш to show stress mobility). Do not teach conjugation rules.\n  Exception\
  \ (M7 gender): Adjective agreement examples allowed to demonstrate what gender does\
  \ (e.g., великий стіл, нова книга, чисте вікно). Do not teach agreement rules.\n\
  \  Exception (M8 greetings): Memorized conversational phrases with conjugated verbs\
  \ allowed as fixed chunks (e.g., 'Як справи?', 'Що ти робиш?'). Present as whole\
  \ phrases, not conjugation patterns.\n- BANNED Ukrainian phrases: Подивімось, Поговорімо,\
  \ Повторімо, Давайте розглянемо, Розглянемо, Скажіть — always use English equivalents\
  \ (Let us look at, Let's talk about, Let's review, Please tell me)\n- BANNED IMPERATIVE\
  \ FORMS (non-exhaustive): Запам'ятайте, Уявіть, Порівняйте, Зверніть увагу, Спробуйте,\
  \ Подивіться, Послухайте, Прочитайте, Повторіть, Напишіть, Скажіть, Виберіть, Подивімось,\
  \ Поговорімо, Повторімо, Давайте розглянемо, Розглянемо.\n  INSTEAD OF → USE:\n\
  \  - Запам'ятайте → \"Remember that...\" (English)\n  - Порівняйте → \"Compare...\"\
  \ (English)\n  - Зверніть увагу → \"Notice that...\" (English)\n  - Подивіться →\
  \ \"Look at...\" (English)\n  - Спробуйте → \"Try to...\" (English)\n  - Прочитайте\
  \ → \"Read...\" (English)\n  - Повторіть → \"Repeat...\" (English)\n- Use English\
  \ for all classroom instructions\n\nVERB-FREE UKRAINIAN PATTERN BANK (use these\
  \ for immersion WITHOUT verbs):\n- Це + noun: «Це кіт», «Це стіл»\n- Question particles:\
  \ «Хто це?», «Що це?»\n- Noun listings with gender: «стіл (він), книга (вона), вікно\
  \ (воно)»\n- Contextual labels: «Наприклад — For example», «А тепер — And now»\n\
  DO NOT use: conjugated verbs, imperatives, infinitives.\nEvery Ukrainian phrase\
  \ must be VERB-FREE. Use English for any sentence requiring a verb.\n\nMETALANGUAGE:\
  \ English-first, Ukrainian term in parentheses on first use"
