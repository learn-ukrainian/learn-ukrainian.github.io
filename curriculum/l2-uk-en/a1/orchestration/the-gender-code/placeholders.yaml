STRUCTURAL_RULES: '### Rule 1: Every Concept Gets Dedicated Depth


  Each concept MUST get its own `### H3` subsection with dedicated depth. Closely
  related items (e.g., masculine/feminine/neuter endings) MAY share one H3.


  ### Rule 2: Introduce → Examples → Practice Tip


  Each H3 concept block MUST contain:

  1. **Introduction/explanation** (1-2 sentences)

  2. **2+ example words or phrases** in context

  3. **Practice tip** — how to remember or use this


  Minimum **40-60 words per H3 block**.


  ### Rule 3: Presentation Consistency


  All items in a category: SAME format, SAME depth (±25%), SAME example count (±1).


  ### Rule 4: Example Variety


  Use at least **3 different formats** across the module: word lists, tables, inline
  examples, callout boxes.'
H3_WORD_RANGE: 40-60
EXPANSION_METHOD: '**Don''t just write more — write deeper.** For EVERY concept:


  1. **Introduce it** (1-2 sentences)

  2. **Give 2+ examples** with English translations

  3. **Add a practice tip** or memory aid

  4. **Connect to real life** (when would a learner encounter this?)


  **If a section is still under target:** Add a `[!tip]` with a common mistake, a
  comparison table, or more example words with translations.'
WRITING_TONE_INSTRUCTION: Keep explanations clear and direct. Every H3 gets {H3_WORD_RANGE}
  words. Avoid verbose prose — students are beginners. Focus on practical examples
  over theory.
