D1_OUTPUT_FORMAT: "## Output Format\n\n> **DELIMITER ENFORCEMENT**: Content outside\
  \ delimiters is automatically discarded by the extraction pipeline.\n\n### Output\
  \ Block 0: Citation Bank (BEFORE the review)\n\n**MANDATORY** — Build this FIRST\
