D1_OUTPUT_FORMAT: "## Output Format\n\n> **DELIMITER ENFORCEMENT**: Content outside\
  \ delimiters is automatically discarded by the extraction pipeline.\n\n### Output\
  \ Block 0: Citation Bank (BEFORE the review)\n\n**MANDATORY** — Build this FIRST\
  \ by reading files with Read tool and copy-pasting exact quotes.\nEach citation\
  \ must be verified with Grep before adding to the bank.\nUse `「...」` (CJK corner\
  \ brackets) for ALL Ukrainian citations — NOT `«»` (those appear inside Ukrainian\
  \ text and cause parsing collisions).\n\n```\n===CITATION_BANK_START===\n1. Line\
  \ {N}: 「{exact Ukrainian text copy-pasted from Read output}」\n2. Line {N}: 「{exact\
  \ Ukrainian text copy-pasted from Read output}」\n3. Line {N}: 「{exact Ukrainian\
  \ text copy-pasted from Read output}」\n...\n===CITATION_BANK_END===\n```\n\n**Rules:**\n\
  - Every entry MUST be copy-pasted verbatim from Read tool output — zero rewording\n\
  - Verify each with Grep before adding: `Grep pattern=\"first 5 words\" path=\"{CONTENT_PATH}\"\
  `\n- If Grep returns no match, you paraphrased — delete and re-copy\n- Minimum 8\
  \ citations for modules >2000 words\n- In the review body below, you may ONLY use\
  \ `「」` citations that appear in this bank\n\n### Output Block 1: Review\n\n```\n\
  ===REVIEW_START===\n# Рецензія: {TOPIC_TITLE}\n\n**Level:** {LEVEL} | **Module:**\
  \ {MODULE_NUM}\n**Overall Score:** {X.X}/10\n**Status:** PASS / FAIL\n**Reviewed:**\
