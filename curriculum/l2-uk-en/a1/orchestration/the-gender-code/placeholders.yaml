  ## Beginner Safety Audit\n\n\"Would I Continue?\" Test: X/5\n- Overwhelmed? [Pass/Fail]\n\
  - Instructions clear? [Pass/Fail]\n- Quick wins? [Pass/Fail]\n- Ukrainian scary?\
