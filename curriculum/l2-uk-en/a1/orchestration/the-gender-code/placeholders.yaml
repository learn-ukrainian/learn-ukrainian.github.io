TEXTBOOK_EXAMPLES: "## Textbook Reference Examples (from real Ukrainian буквар)\n\n\
  These are real exercises from Ukrainian 1st-grade primers. Use them as **inspiration\
  \ for style and difficulty level** — notice how they use simple syllable combinations,\
  \ short words, and build progressively. Do NOT copy them verbatim, but match their\
  \ pedagogical approach and simplicity.\n\n**Grade 1, zaharijchuk** — Сторінка 6:\n\
  ```\nЮю\nАа\nОо\nУу\nИи\nМм\nМм\nІі\nНн\nНн\nВв\nВв\nЛл\nСс\nКк\nПп\nРр\nТт\nЕе\n\
  Дд\nЗз\nь\nБб\nАа\n```\n\n**Grade 1, zaharijchuk** — Сторінка 92:\n```\n90\nЕ е\n\
  Бачу Е, е. Чую [е].\nО-ле-сик  і  та-то  по-ві-си-ли на  гіл-\nку  кле-на \n. \n\
  \ У \n на-си-па-ли \n, \n і \n .\nПри-ле-ті-ли \n, \n, \n.\nле- \n         ле-\n\
  \      \n    ве- \n     ек-\nле- \n         ле-\n      \n    ве- \n     ек-\n* е\
  \ р е * а\nк л е н\n [ –•  |  –• |  – •]\nм\nн\nс\nл\nр\nЕ\nем\nен\nес\nел\nер\n\
  м\nн\nс\nл\nр\nме\nне\nсе\nле\nре\nЕ\nе * е л * в\nс\n*\nе\n [ –  –•  – ]\n```"
