- type: true-false
  title: "True or False: Word Genders"
  items:
    - statement: "The word брат is Masculine."
      correct: true
      explanation: "Брат ends in a firm consonant and refers to a male."
    - statement: "The word сестра is Neuter."
      correct: false
      explanation: "Сестра ends in -а, making it Feminine."
    - statement: "The word море is Neuter."
      correct: true
      explanation: "Море ends in -е, which is a round vowel indicating Neuter gender."
    - statement: "The word собака is Masculine grammatically."
      correct: false
      explanation: "Собака grammatically is treated as Feminine because it ends in -а."
    - statement: "The word артефакт is Feminine."
      correct: false
      explanation: "Артефакт ends in a firm consonant, so it is definitively Masculine."
    - statement: "The word зона is Feminine."
      correct: true
      explanation: "Зона ends in the open vowel -а, making it definitively Feminine."
    - statement: "The word укриття is Neuter."
      correct: true
      explanation: "Укриття is a Neuter noun that ends in -я due to a specific stem change."
    - statement: "The word мама is Neuter."
      correct: false
      explanation: "Мама ends in -а and refers to a female, making it Feminine."