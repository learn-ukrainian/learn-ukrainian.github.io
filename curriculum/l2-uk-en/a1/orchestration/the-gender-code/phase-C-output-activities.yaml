- type: anagram
  title: "Unscramble the Nouns"
  instruction: "Rearrange the letters to form the correct Ukrainian word."
  items:
    - scrambled: "о т а т"
      answer: "тато"
    - scrambled: "а м а м"
      answer: "мама"
    - scrambled: "м і д"
      answer: "дім"
    - scrambled: "о н і в к"
      answer: "вікно"
    - scrambled: "а и г к н"
      answer: "книга"
    - scrambled: "о м і т с"
      answer: "місто"
    - scrambled: "л і с т"
      answer: "стіл"
    - scrambled: "т а р б"
      answer: "брат"
