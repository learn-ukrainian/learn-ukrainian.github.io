- type: group-sort
  title: "Sort by Gender"
  groups:
    - name: "Masculine (він)"
      items: ["брат", "дім", "стіл", "тато"]
    - name: "Feminine (вона)"
      items: ["сестра", "мама", "книга", "зона"]
    - name: "Neuter (воно)"
      items: ["вікно", "місто", "море", "сонце"]
- type: quiz
  title: "Identify Gender by Ending"
  instruction: "Choose the correct answer."
  items:
    - question: "Which gender does a noun ending in a firm consonant usually belong to?"
      explanation: "Masculine words almost always end in a consonant."
      options:
        - text: "Masculine"
          correct: true
        - text: "Feminine"
          correct: false
        - text: "Neuter"
          correct: false
        - text: "Plural"
          correct: false
    - question: "What gender is the word книга?"
      explanation: "Words ending in -а or -я are usually Feminine."
      options:
        - text: "Feminine"
          correct: true
        - text: "Masculine"
          correct: false
        - text: "Neuter"
          correct: false
        - text: "Plural"
          correct: false
    - question: "What gender is the word вікно?"
      explanation: "Words ending in -о or -е are usually Neuter."
      options:
        - text: "Neuter"
          correct: true
        - text: "Masculine"
          correct: false
        - text: "Feminine"
          correct: false
        - text: "Plural"
          correct: false
    - question: "Why is the word тато (father) Masculine despite ending in -о?"
      explanation: "Biological sex always overrides the grammatical ending."
      options:
        - text: "Biological sex overrides the ending"
          correct: true
        - text: "It is a soft sign exception"
          correct: false
        - text: "It is a loanword"
          correct: false
        - text: "It belongs to Declension Family 4"
          correct: false
    - question: "What gender is the word місто?"
      explanation: "Words ending in -о or -е are usually Neuter."
      options:
        - text: "Neuter"
          correct: true
        - text: "Masculine"
          correct: false
        - text: "Feminine"
          correct: false
        - text: "Plural"
          correct: false
    - question: "Which possessive pronoun correctly matches the word мама?"
      explanation: "Мама is Feminine, so you must use моя."
      options:
        - text: "моя"
          correct: true
        - text: "мій"
          correct: false
        - text: "моє"
          correct: false
        - text: "мої"
          correct: false
    - question: "Which possessive pronoun correctly matches the word брат?"
      explanation: "Брат is Masculine, so you must use мій."
      options:
        - text: "мій"
          correct: true
        - text: "моя"
          correct: false
        - text: "моє"
          correct: false
        - text: "мої"
          correct: false
    - question: "What gender is the word ім'я?"
      explanation: "Ім'я is a special historical exception (Family 4) and is Neuter."
      options:
        - text: "Neuter"
          correct: true
        - text: "Masculine"
          correct: false
        - text: "Feminine"
          correct: false
        - text: "Plural"
          correct: false
- type: true-false
  title: "Exceptions and Rules"
  items:
    - statement: "All words ending in -о are Neuter, including the word тато."
      correct: false
      explanation: "Biological sex overrides the grammatical ending. Тато (father) is strictly Masculine."
    - statement: "The word сонце is Neuter in Ukrainian because it ends in -е."
      correct: true
      explanation: "Neuter words typically end in the round vowels -о or -е."
    - statement: "The word ім'я is Feminine because it ends in -я."
      correct: false
      explanation: "Ім'я is a special historical exception. It belongs to Declension Family 4 and is actually Neuter."
    - statement: "Masculine words almost always end in a consonant."
      correct: true
      explanation: "Masculine words have a hard, firm ending sound."
    - statement: "The word дім is a Masculine noun."
      correct: true
      explanation: "It ends in a firm consonant, so it is definitively Masculine."
    - statement: "English 'it' directly translates to Neuter 'воно' for all inanimate objects in Ukrainian."
      correct: false
      explanation: "This is the 'It' Trap. Inanimate objects can be Masculine (стіл) or Feminine (книга) depending on their ending."
    - statement: "Words ending in a soft sign (-ь) can be either Masculine or Feminine."
      correct: true
      explanation: "The soft sign is ambiguous. For example, день is Masculine, but ніч is Feminine."
    - statement: "The word стіл is Neuter because it is an inanimate object."
      correct: false
      explanation: "Стіл ends in a consonant, so it is Masculine (він). Inanimate objects have gender in Ukrainian."
