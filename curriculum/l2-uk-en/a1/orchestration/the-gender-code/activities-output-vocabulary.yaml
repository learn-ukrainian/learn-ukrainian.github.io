  - lemma: "ім'я"
    translation: "name"
    pos: "noun"
    gender: "n"
    notes: "Neuter exception (Family 4) despite the -я ending."
    example: "Це моє ім'я."
  - lemma: "артефакт"
    translation: "artifact"
    pos: "noun"
    gender: "m"
    notes: "S.T.A.L.K.E.R. cultural hook — consonant ending, Masculine."
