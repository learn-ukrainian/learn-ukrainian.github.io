items:
  - lemma: "брат"
    translation: "brother"
    pos: "noun"
    gender: "m"
    usage: "старший брат (older brother)"
    example: "Це мій брат."
  - lemma: "сестра"
    translation: "sister"
    pos: "noun"
    gender: "f"
    usage: "молодша сестра (younger sister)"
