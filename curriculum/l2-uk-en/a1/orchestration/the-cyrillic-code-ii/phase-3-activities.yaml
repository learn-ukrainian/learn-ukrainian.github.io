- type: unjumble
  title: "Sentence Builder"
  instruction: "Arrange the words to form correct sentences."
  items:
    - words: ["Добрий", "день"]
      answer: "Добрий день"
    - words: ["Гарна", "школа"]
      answer: "Гарна школа"
    - words: ["Я", "хочу", "чай"]
      answer: "Я хочу чай"
    - words: ["Київ", "центр"]
      answer: "Київ центр"
    - words: ["Ми", "любимо", "літо"]
      answer: "Ми любимо літо"
    - words: ["Це", "смачне", "яблуко"]
      answer: "Це смачне яблуко"

- type: true-false
  title: "Alphabet Facts"
  instruction: "Decide if the statement about the Ukrainian alphabet is true or false."
  items:
    - statement: "The letter Ґ represents the hard 'g' sound as in 'go'."
      correct: true
      explanation: "Correct. Ґ is hard [g], while Г is soft [ɦ]."
    - statement: "The letter Ї is unique because it always has two dots and makes the 'yi' sound."
      correct: true
      explanation: "Correct. Ї is a distinct letter symbolising 'yi'."
    - statement: "The letter Ь is pronounced like a hard 'b'."
      correct: false
      explanation: "Incorrect. Ь (soft sign) has no sound; it modifies the previous consonant."
    - statement: "Kyiv is spelled with 'ie' in Ukrainian."
      correct: false
      explanation: "Incorrect. It is spelled Київ (Kyiv), not Kiev."
    - statement: "To say the letter І, you should smile."
      correct: true
      explanation: "Correct. І requires a wide smile position."
    - statement: "The letter Ш sounds like 'ch' in 'chair'."
      correct: false
      explanation: "Incorrect. Ш is 'sh' (shoe). Ч is 'ch' (chair)."

- type: group-sort
  title: "Hard vs Soft Vowels"
  instruction: "Sort the vowels into Hard (creating hard consonants) or Soft (creating soft consonants)."
  groups:
    - name: "Hard (Тверді)"
      items: ["А", "Е", "У", "О", "И"]
    - name: "Soft/Iotated (М'які)"
      items: ["Я", "Є", "Ю", "І", "Ї"]

