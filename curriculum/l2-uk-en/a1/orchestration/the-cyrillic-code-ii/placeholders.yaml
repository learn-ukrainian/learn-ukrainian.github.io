LEVEL_CONSTRAINTS: 'HARD GRAMMAR RULES (audit will reject violations):

  - Max 10 words per Ukrainian sentence (STRICT — count every word)

  - ONLY 1 clause per sentence (no compound sentences)

  - Dative case FORBIDDEN (no мені, тобі, йому, їй, нам, вам, їм, -ові/-еві endings)

  - Instrumental case FORBIDDEN (no з другом, з мамою, -ом/-ою/-ем/-ею endings)

  - NO subordinate clauses: який/яка/яке, що-clause, коли, якщо, тому що, бо, щоб,
  поки are ALL BANNED

  - Only imperfective aspect verbs

  - No participles

  - Allowed cases: Nominative, Accusative, Locative (from M13), Genitive (basics),
  Vocative'
