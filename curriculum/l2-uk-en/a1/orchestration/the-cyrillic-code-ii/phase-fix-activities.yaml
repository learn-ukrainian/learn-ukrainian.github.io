- type: quiz
  title: 'Hard or Soft?'
  instruction: 'Determine if the vowel sound in the word is hard (И) or soft (І).'
  items:
    - question: 'Which vowel sound is heard in "жити" (zhyty - to live)?'
      options:
        - text: 'Hard И'
          correct: true
        - text: 'Soft І'
          correct: false
        - text: 'Soft Ь'
          correct: false
        - text: 'Iotated Ї'
          correct: false
      explanation: 'ZhYty uses the hard, deep И sound.'
    - question: 'Which vowel sound is heard in "діти" (dity - children)?'
      options:
        - text: 'Soft І'
          correct: true
        - text: 'Hard И'
          correct: false
        - text: 'Hard Y'
          correct: false
        - text: 'Hard E'
          correct: false
      explanation: 'Dity uses the soft, smiling І sound.'
    - question: 'Which vowel sound is heard in "ніч" (nich - night)?'
      options:
        - text: 'Soft І'
          correct: true
        - text: 'Hard И'
          correct: false
        - text: 'Hard O'
          correct: false
        - text: 'Soft Ь'
          correct: false
      explanation: 'Nich uses the soft І.'
    - question: 'Which vowel sound is heard in "ми" (my - we)?'
      options:
        - text: 'Hard И'
          correct: true
        - text: 'Soft І'
          correct: false
        - text: 'Soft Я'
          correct: false
        - text: 'Soft Є'
          correct: false
      explanation: 'My uses the hard И.'
    - question: 'Which vowel sound is heard in "сік" (sik - juice)?'
      options:
        - text: 'Soft І'
          correct: true
        - text: 'Hard И'
          correct: false
        - text: 'Hard A'
          correct: false
        - text: 'Soft Ю'
          correct: false
      explanation: 'Sik uses the soft І.'
    - question: 'Which vowel sound is heard in "ти" (ty - you)?'
      options:
        - text: 'Hard И'
          correct: true
        - text: 'Soft І'
          correct: false
        - text: 'Soft Є'
          correct: false
        - text: 'Soft Ї'
          correct: false
      explanation: 'Ty uses the hard И.'
    - question: 'Which vowel sound is heard in "жінка" (zhinka - woman)?'
      options:
        - text: 'Soft І'
          correct: true
        - text: 'Hard И'
          correct: false
        - text: 'Soft Є'
          correct: false
        - text: 'Hard Y'
          correct: false
      explanation: 'Zhinka uses the soft І.'
    - question: 'Which vowel sound is heard in "Київ" (Kyiv - in the syllable "Ky")?'
      options:
        - text: 'Hard И'
          correct: true
        - text: 'Soft І'
          correct: false
        - text: 'Soft Ь'
          correct: false
        - text: 'Soft Я'
          correct: false
      explanation: 'The first vowel in Kyiv is hard И (Ky-yiv).'
