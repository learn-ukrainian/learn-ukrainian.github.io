- type: anagram
  title: 'Розшифруйте слова'
  instruction: 'Переставте літери, щоб утворити слова з уроку.'
  items:
    - scrambled: 'н е м а є'
      answer: 'немає'
      hint: 'Слово, що означає відсутність (there is no).'
    - scrambled: 'ц у к о р'
      answer: 'цукор'
      hint: 'Солодка речовина, яку ми кладемо в каву.'
    - scrambled: 'г р о ш і'
      answer: 'гроші'
      hint: 'Те, чим ми платимо в магазині.'
    - scrambled: 'к в и т о к'
      answer: 'квиток'
      hint: 'Документ для проїзду в транспорті.'
    - scrambled: 'ч а с'
      answer: 'час'
      hint: 'Те, чого нам завжди не вистачає (time).'
    - scrambled: 'в о д а'
      answer: 'вода'
      hint: 'Рідина, яку ми п’ємо.'
