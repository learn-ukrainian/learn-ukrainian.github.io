- type: group-sort
  title: 'Закінчення: -а чи -у?'
  instruction: 'Розподіліть слова за закінченням, яке вони отримують після «немає» (Genitive Case).'
  groups:
    - name: 'Закінчення -а (Конкретні)'
      items:
        - 'квиток'
        - 'паспорт'
        - 'телефон'
        - 'брат'
        - 'студент'
    - name: 'Закінчення -у (Абстрактні/Речовини)'
      items:
        - 'час'
        - 'цукор'
        - 'чай'
        - 'обід'
        - 'спокій'

- type: match-up
  title: 'Знайдіть пару'
  instruction: 'З’єднайте українські фрази з їх перекладом.'
  pairs:
    - left: 'немає часу'
      right: 'no time'
    - left: 'без цукру'
      right: 'without sugar'
    - left: 'немає грошей'
      right: 'no money'
    - left: 'без молока'
      right: 'without milk'
    - left: 'немає води'
      right: 'no water'
    - left: 'без квитка'
      right: 'without a ticket'

- type: fill-in
  title: 'Допишіть закінчення'
  instruction: 'Оберіть правильну форму слова в Родовому відмінку.'
  items:
    - sentence: 'У мене немає ... (час).'
      answer: 'часу'
      options: ['часу', 'час', 'часом', 'часи']
      explanation: 'Абстрактні поняття чоловічого роду (час) зазвичай мають закінчення -у.'
    - sentence: 'Я п’ю каву без ... (цукор).'
      answer: 'цукру'
      options: ['цукру', 'цукор', 'цукра', 'цукром']
      explanation: 'Речовини чоловічого роду (цукор) мають закінчення -у. Також тут випадає літера "о".'
    - sentence: 'Тут немає ... (вода).'
      answer: 'води'
      options: ['води', 'вода', 'воду', 'водою']
      explanation: 'Жіночий рід на -а (вода) змінюється на -и.'
    - sentence: 'У туриста немає ... (квиток).'
      answer: 'квитка'
      options: ['квитка', 'квиток', 'квитку', 'квитком']
      explanation: 'Конкретні предмети чоловічого роду (квиток) мають закінчення -а.'
    - sentence: 'У студента немає ... (телефон).'
      answer: 'телефона'
      options: ['телефона', 'телефон', 'телефону', 'телефоном']
      explanation: 'Конкретні предмети чоловічого роду (телефон) мають закінчення -а.'
    - sentence: 'У мене немає ... (паспорт).'
      answer: 'паспорта'
      options: ['паспорта', 'паспорт', 'паспорту', 'паспортом']
      explanation: 'Конкретні предмети чоловічого роду (паспорт) мають закінчення -а.'

- type: unjumble
  title: 'Складіть речення'
  instruction: 'Розташуйте слова у правильному порядку, щоб утворити речення.'
  items:
    - words: ['У', 'мене', 'немає', 'часу']
      answer: 'У мене немає часу'
    - words: ['Тут', 'немає', 'інтернету']
      answer: 'Тут немає інтернету'
    - words: ['Кава', 'без', 'цукру', 'будь ласка']
      answer: 'Кава без цукру будь ласка'
    - words: ['Сьогодні', 'немає', 'концерту']
      answer: 'Сьогодні немає концерту'
    - words: ['У', 'нас', 'немає', 'молока']
      answer: 'У нас немає молока'
    - words: ['Вибачте', 'у', 'мене', 'немає', 'грошей']
      answer: 'Вибачте у мене немає грошей'

- type: quiz
  title: 'Перевірка знань'
  instruction: 'Оберіть правильну відповідь на питання про граматику.'
  items:
    - question: 'Який відмінок ми завжди використовуємо після слова «немає»?'
      explanation: 'Слова «немає» та «без» завжди вимагають Родовий відмінок (Genitive Case).'
      options:
        - text: 'Родовий (Genitive)'
          correct: true
        - text: 'Називний (Nominative)'
          correct: false
        - text: 'Орудний (Instrumental)'
          correct: false
        - text: 'Кличний (Vocative)'
          correct: false
    - question: 'Як змінюється слово «квиток» після «немає»?'
      explanation: 'Слово «квиток» втрачає літеру «о» і отримує закінчення -а: немає квитка.'
      options:
        - text: 'немає квитка'
          correct: true
        - text: 'немає квиток'
          correct: false
        - text: 'немає квитку'
          correct: false
        - text: 'немає квитока'
          correct: false
    - question: 'Яке закінчення зазвичай мають абстрактні поняття (як «час») у Родовому відмінку?'
      explanation: 'Абстрактні іменники чоловічого роду зазвичай мають закінчення -у.'
      options:
        - text: '-у'
          correct: true
        - text: '-а'
          correct: false
        - text: '-и'
          correct: false
        - text: '-е'
          correct: false
    - question: 'Що означає слово «без»?'
      explanation: '«Без» означає «without» і використовується з Родовим відмінком.'
      options:
        - text: 'without'
          correct: true
        - text: 'with'
          correct: false
        - text: 'near'
          correct: false
        - text: 'under'
          correct: false
    - question: 'Як правильно сказати "no money"?'
      explanation: 'Слово «гроші» — це множина, у Родовому відмінку буде «грошей».'
      options:
        - text: 'немає грошей'
          correct: true
        - text: 'немає гроші'
          correct: false
        - text: 'немає грошам'
          correct: false
        - text: 'немає грошів'
          correct: false
    - question: 'Фраза «Немає проблем» — це ввічливо чи грубо?'
      explanation: 'Це дуже ввічлива і поширена фраза, що означає "No problem".'
      options:
        - text: 'Ввічливі (Polite)'
          correct: true
        - text: 'Грубо (Rude)'
          correct: false
        - text: 'Офіційно (Formal)'
          correct: false
        - text: 'Неправильно (Incorrect)'
          correct: false

- type: match-up
  title: 'Є чи немає?'
  instruction: 'З’єднайте стверджувальні речення з відповідними заперечними.'
  pairs:
    - left: 'Тут є вода'
      right: 'Тут немає води'
    - left: 'У мене є час'
      right: 'У мене немає часу'
    - left: 'У тебе є квиток'
      right: 'У тебе немає квитка'
    - left: 'Це цукор'
      right: 'Тут немає цукру'
    - left: 'У нас є гроші'
      right: 'У нас немає грошей'
    - left: 'Це паспорт'
      right: 'Тут немає паспорта'

- type: fill-in
  title: 'Заповніть діалоги'
  instruction: 'Оберіть правильне слово, щоб доповнити діалог.'
  items:
    - sentence: '— У вас є хліб? — Вибачте, ... (хліб) немає.'
      answer: 'хліба'
      options: ['хліба', 'хліб', 'хлібу', 'хлібом']
      explanation: 'Після «немає» використовуємо Родовий відмінок: хліб → хліба.'
    - sentence: '— У тебе є ключ? — Ні, у мене немає ... (ключ).'
      answer: 'ключа'
      options: ['ключа', 'ключ', 'ключу', 'ключі']
      explanation: 'Ключ — конкретний предмет, закінчення -а.'
    - sentence: '— Ви бажаєте чай з молоком? — Ні, я люблю ... (без молоко).'
      answer: 'без молока'
      options: ['без молока', 'без молоко', 'з молоком', 'молоко']
      explanation: 'Прийменник «без» вимагає Родового відмінка: молоко → молока.'
    - sentence: '— У нас є проблема? — Ні, ... (немає проблема).'
      answer: 'немає проблем'
      options: ['немає проблем', 'немає проблема', 'немає проблеми', 'є проблема']
      explanation: 'Стала фраза «немає проблем» (множина).'
    - sentence: '— У вас є квиток? — На жаль, ... (немає квиток).'
      answer: 'немає квитка'
      options: ['немає квитка', 'немає квиток', 'є квиток', 'без квитка']
      explanation: 'Квиток → квитка (випадає «о», закінчення -а).'
    - sentence: '— Це вода? — Тут ... (немає вода).'
      answer: 'немає води'
      options: ['немає води', 'немає вода', 'води немає', 'без води']
      explanation: 'Вода → води (закінчення -и).'

