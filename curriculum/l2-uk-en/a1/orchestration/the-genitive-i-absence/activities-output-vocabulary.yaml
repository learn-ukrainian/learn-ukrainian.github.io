items:
  - lemma: "немає"
    translation: "there is no, there are no"
    pos: "particle"
    notes: "Core word for expressing absence. Always requires genitive case."
    usage: "Немає часу."
  - lemma: "без"
    translation: "without"
    pos: "preposition"
    notes: "Always followed by genitive case."
    usage: "Кава без цукру."
  - lemma: "час"
    translation: "time"
    pos: "noun"
    gender: "m"
    notes: "Gen: часу (abstract → -у ending)."
    usage: "У мене немає часу."
  - lemma: "гроші"
    translation: "money"
    pos: "noun"
    notes: "Plural only. Gen pl: грошей (irregular)."
    usage: "Немає грошей."
  - lemma: "молоко"
    translation: "milk"
    pos: "noun"
    gender: "n"
    notes: "Gen: молока (neuter -о → -а)."
    usage: "Кава без молока."
  - lemma: "цукор"
    translation: "sugar"
    pos: "noun"
    gender: "m"
    notes: "Gen: цукру (substance → -у ending)."
    usage: "Чай без цукру."
  - lemma: "вода"
    translation: "water"
    pos: "noun"
    gender: "f"
    notes: "Gen: води (feminine -а → -и)."
    usage: "Води немає."
  - lemma: "хліб"
    translation: "bread"
    pos: "noun"
    gender: "m"
    notes: "Gen: хліба (concrete → -а ending)."
    usage: "Немає хліба."
  - lemma: "проблема"
    translation: "problem"
    pos: "noun"
    gender: "f"
    notes: "Gen pl: проблем. Used in the phrase Немає проблем!"
    usage: "Немає проблем!"
  - lemma: "квиток"
    translation: "ticket"
    pos: "noun"
    gender: "m"
    notes: "Gen: квитка (concrete → -а ending)."
    usage: "Їхати без квитка."
  - lemma: "ключ"
    translation: "key"
    pos: "noun"
    gender: "m"
    notes: "Gen: ключа (concrete → -а ending)."
    usage: "Немає ключа."
  - lemma: "телефон"
    translation: "phone"
    pos: "noun"
    gender: "m"
    notes: "Gen: телефона (device, concrete) or телефону (number, abstract)."
    usage: "У мене немає телефона."
  - lemma: "газ"
    translation: "gas, sparkling"
    pos: "noun"
    gender: "m"
    notes: "Gen: газу (substance → -у ending). Used in вода без газу (still water)."
    usage: "Вода без газу."
  - lemma: "кава"
    translation: "coffee"
    pos: "noun"
    gender: "f"
    notes: "Gen: кави (feminine -а → -и)."
    usage: "Кави немає."
  - lemma: "чай"
    translation: "tea"
    pos: "noun"
    gender: "m"
    notes: "Gen: чаю (substance → -ю ending)."
    usage: "Чай без цукру."
  - lemma: "дим"
    translation: "smoke"
    pos: "noun"
    gender: "m"
    notes: "Gen: диму (substance → -у ending). Used in the proverb."
    usage: "Немає диму без вогню."
  - lemma: "вогонь"
    translation: "fire"
    pos: "noun"
    gender: "m"
    notes: "Gen: вогню (substance → -ю ending)."
    usage: "Без вогню."
  - lemma: "для"
    translation: "for"
    pos: "preposition"
    notes: "Requires genitive case, like без."
    usage: "Для мене."
  - lemma: "від"
    translation: "from"
    pos: "preposition"
    notes: "Requires genitive case. Від тебе (from you)."
    usage: "Від тебе."
  - lemma: "є"
    translation: "there is, there are; (I/you/etc.) have"
    pos: "verb"
    notes: "Opposite of немає. Used to confirm existence or possession."
    usage: "Є квиток?"