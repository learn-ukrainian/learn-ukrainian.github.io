- type: fill-in
  title: "Invariable and Third-Person Possessives"
  instruction: "Choose the correct pronoun to complete the sentence."
  items:
    - sentence: "Це Іван. Це ___ телефон."
      answer: "його"
      options: ["його", "її", "їхній", "мій"]
    - sentence: "Це Анна. Це ___ сумка."
      answer: "її"
      options: ["її", "його", "їхня", "твій"]
    - sentence: "Це Іван і Анна. Це ___ дім."
      answer: "їхній"
      options: ["їхній", "їхня", "його", "її"]
    - sentence: "Де ___ паспорт? (his)"
      answer: "його"
      options: ["його", "її", "їхній", "ваш"]
    - sentence: "Де ___ кімната? (her)"
      answer: "її"
      options: ["її", "його", "їхня", "наша"]
    - sentence: "Де ___ сім'я? (their)"
      answer: "їхня"
      options: ["їхня", "їхній", "їхнє", "його"]
    - sentence: "Це ___ рішення. (their)"
      answer: "їхнє"
      options: ["їхнє", "їхній", "їхня", "її"]
    - sentence: "Це ___ дім. (his)"
      answer: "його"
      options: ["його", "її", "їхній", "моя"]