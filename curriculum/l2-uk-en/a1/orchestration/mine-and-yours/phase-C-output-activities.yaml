- type: quiz
  title: "Using Свій vs. Його/Її"
  instruction: "Choose the correct sentence. Remember that 'свій' means 'one's own'."
  items:
    - question: "How do you say 'Ivan loves his own job'?"
      options:
        - text: "Іван любить свою роботу."
          correct: true
        - text: "Іван любить його роботу."
          correct: false
        - text: "Іван любить її роботу."
          correct: false
        - text: "Іван любить мою роботу."
          correct: false
      explanation: "We use 'свою' (a form of свій) because Ivan is the subject and he owns the job."
    - question: "How do you say 'She reads her own book'?"
      options:
        - text: "Вона читає свою книгу."
          correct: true
        - text: "Вона читає її книгу."
          correct: false
        - text: "Вона читає його книгу."
          correct: false
        - text: "Вона читає мою книгу."
          correct: false
      explanation: "Use 'свою' to show that the book belongs to the subject ('she')."
    - question: "What does 'Він бере його паспорт' mean?"
      options:
        - text: "He takes someone else's (his) passport."
          correct: true
        - text: "He takes his own passport."
          correct: false
        - text: "He takes her passport."
          correct: false
        - text: "He takes my passport."
          correct: false
      explanation: "Because it says 'його' instead of 'свій', the passport belongs to a different male person."
    - question: "What does 'Я маю свій телефон' mean?"
      options:
        - text: "I have my own phone."
          correct: true
        - text: "I have his phone."
          correct: false
        - text: "I have her phone."
          correct: false
        - text: "I have your phone."
          correct: false
    - question: "If Maria takes another woman's bag, how do we say 'She takes her bag'?"
      options:
        - text: "Вона бере її сумку."
          correct: true
        - text: "Вона бере свою сумку."
          correct: false
        - text: "Вона бере його сумку."
          correct: false
        - text: "Вона бере мою сумку."
          correct: false
      explanation: "We use 'її' because the bag belongs to a different woman, not Maria herself."
    - question: "Which pronoun is a special 'reflexive' pronoun meaning 'one's own'?"
      options:
        - text: "свій"
          correct: true
        - text: "мій"
          correct: false
        - text: "його"
          correct: false
        - text: "їхній"
          correct: false
    - question: "Does 'свій' change its ending to match the gender of the noun?"
      options:
        - text: "Yes, it changes just like мій and твій."
          correct: true
        - text: "No, it is invariable like його."
          correct: false
        - text: "It only changes for plural nouns."
          correct: false
        - text: "It only changes for neuter nouns."
          correct: false
    - question: "How do you say 'He loves his (own) house'?"
      options:
        - text: "Він любить свій дім."
          correct: true
        - text: "Він любить його дім."
          correct: false
        - text: "Він любить її дім."
          correct: false
        - text: "Він любить твій дім."
          correct: false

- type: true-false
  title: "Rules of Possession and Culture"
  instruction: "Decide if the statement is true or false."
  items:
    - statement: "The Ukrainian word for 'my' always matches the gender of the speaker, not the object."
      correct: false
      explanation: "False! The pronoun must always match the gender of the object being owned."
    - statement: "If the noun is feminine, the possessive pronoun must also be feminine."
      correct: true
      explanation: "Correct. For example, 'мама' (mom) is feminine, so you say 'моя мама'."
    - statement: "The pronouns його (his) and її (her) never change their endings."
      correct: true
      explanation: "Correct. They are invariable and stay the same regardless of the object's gender."
    - statement: "It is polite to use the informal 'твій' when speaking to a doctor or a teacher for the first time."
      correct: false
      explanation: "False. You should use the formal 'ваш' to show respect to professionals and elders."
    - statement: "The formal pronoun 'ваш' is also used when you are speaking to two or more people."
      correct: true
      explanation: "Correct. 'Ваш' acts as both the formal singular 'your' and the plural 'your'."
    - statement: "The standard, proper word for 'their' in Ukrainian is 'їх'."
      correct: false
      explanation: "False. The proper literary word is 'їхній' (їхня, їхнє). Using 'їх' as a possessive is a Russianism."
    - statement: "The word 'свій' means 'one's own' and helps clarify exactly who owns an object."
      correct: true
      explanation: "Correct. It is used when the subject of the sentence owns the object."
    - statement: "The phrase 'перехід на ти' refers to the social milestone of switching from formal to informal address."
      correct: true
      explanation: "Correct. It is an important step in Ukrainian relationships."

