- type: quiz
  title: 'Adjectives and Details'
  instruction: 'Choose the correct answer for modifying your drink order.'
  items:
    - question: 'How do you ask for a large coffee?'
      options:
        - text: 'велику каву'
          correct: true
        - text: 'малу каву'
          correct: false
        - text: 'гарячу каву'
          correct: false
        - text: 'холодну каву'
          correct: false
      explanation: 'Великий means large. With кава, it becomes велику каву.'
    - question: 'If you want still water (without gas), what do you say?'
      options:
        - text: 'без газу'
          correct: true
        - text: 'з газом'
          correct: false
        - text: 'без цукру'
          correct: false
        - text: 'з молоком'
          correct: false
      explanation: 'Без газу means without gas (still).'
    - question: 'What does гарячий mean?'
      options:
        - text: 'hot'
          correct: true
        - text: 'cold'
          correct: false
        - text: 'small'
          correct: false
        - text: 'large'
          correct: false
      explanation: 'Гарячий means hot.'
    - question: 'What does холодний mean?'
      options:
        - text: 'cold'
          correct: true
        - text: 'hot'
          correct: false
        - text: 'sparkling'
          correct: false
        - text: 'sweet'
          correct: false
      explanation: 'Холодний means cold.'
    - question: 'If the waiter asks Великий чи малий?, what do you answer if you want a small drink?'
      options:
        - text: 'Малий.'
          correct: true
        - text: 'Великий.'
          correct: false
        - text: 'Гарячий.'
          correct: false
        - text: 'Холодний.'
          correct: false
      explanation: 'Малий means small.'
    - question: 'How do you ask for a chocolate pastry?'
      options:
        - text: 'шоколадне тістечко'
          correct: true
        - text: 'велике меню'
          correct: false
        - text: 'гарячу каву'
          correct: false
        - text: 'холодний чай'
          correct: false
      explanation: 'Шоколадне тістечко means chocolate pastry.'
    - question: 'What is the phrase for leaving a tip?'
      options:
        - text: 'залишити чайові'
          correct: true
        - text: 'оплатити рахунок'
          correct: false
        - text: 'замовити меню'
          correct: false
        - text: 'заплатити готівкою'
          correct: false
      explanation: 'Чайові is the tip. Залишити чайові is to leave a tip.'
    - question: 'How do you ask if you can pay by card?'
      options:
        - text: 'Можна карткою?'
          correct: true
        - text: 'Можна меню?'
          correct: false
        - text: 'Можна готівкою?'
          correct: false
        - text: 'Можна рахунок?'
          correct: false
      explanation: 'Можна карткою? asks if it is possible to pay by card.'