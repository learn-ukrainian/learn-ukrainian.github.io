- type: unjumble
  title: "Put the Words in Order"
  instruction: "Arrange the words to form a correct Ukrainian sentence."
  items:
    - words: ["Я", "буду", "каву"]
      answer: "Я буду каву"
    - words: ["Можна", "рахунок", "будь", "ласка"]
      answer: "Можна рахунок будь ласка"
    - words: ["Я", "буду", "воду"]
      answer: "Я буду воду"
    - words: ["Каву", "з", "молоком"]
      answer: "Каву з молоком"
    - words: ["Чай", "без", "цукру"]
      answer: "Чай без цукру"
    - words: ["Оплата", "карткою", "чи", "готівкою"]
      answer: "Оплата карткою чи готівкою"
