  instruction: "Select the correct word to complete the sentence."
  items:
    - sentence: "Добрий день! Що ___?"
      answer: "бажаєте"
      options: ["бажаєте", "бажає", "бажають", "бажати"]
    - sentence: "Я ___ чай."
      answer: "буду"
      options: ["буду", "буде", "будемо", "будуть"]
    - sentence: "Який чай? Чорний чи ___?"
      answer: "зелений"
      options: ["зелений", "зеленого", "зеленому", "зеленим"]
    - sentence: "Чорний чай і шоколадне ___."
      answer: "тістечко"
      options: ["тістечко", "тістечка", "тістечку", "тістечком"]
    - sentence: "Можна ___, будь ласка?"
      answer: "рахунок"
      options: ["рахунок", "чек", "меню", "картку"]
    - sentence: "Офіціант приносить ___."
      answer: "чай"
