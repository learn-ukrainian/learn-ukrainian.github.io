- type: true-false
  title: "Cafe Etiquette and Vocabulary"
  instruction: "Decide if each statement is true or false."
  items:
    - statement: "The word рахунок is what you ask for when you are ready to pay."
      correct: true
    - statement: "You should ask the waiter for a чек before you pay."
      correct: false
      explanation: "You should ask for a рахунок (bill). The чек (receipt) comes after you pay."
    - statement: "Я хочу is the most polite way to order coffee in Ukraine."
      correct: false
      explanation: "Я буду is much more polite and common than Я хочу."
    - statement: "When ordering water, the word вода changes to воду."
      correct: true
    - statement: "When ordering juice, the word сік changes to сіку."
      correct: false
      explanation: "Masculine words like сік do not change their ending when ordering."
    - statement: "The phrase з молоком means without milk."
      correct: false
      explanation: "It means with milk."
    - statement: "The word карткою means you want to pay in cash."
      correct: false
      explanation: "Карткою means by card. Готівкою means in cash."
    - statement: "In Ukrainian cafes, it is polite to use the Ви form with the waiter."
      correct: true
    - statement: "The phrase без цукру means without sugar."
      correct: true

- type: quiz
  title: "Ordering Rules in a Cafe"
  instruction: "Choose the correct answer for each question."
  items:
    - question: "How do you politely say 'I will have coffee'?"
      options:
        - text: "Я буду каву."
          correct: true
        - text: "Я хочу кава."
          correct: false
        - text: "Я буду кава."
          correct: false
        - text: "Я хочу каву."
          correct: false
    - question: "What should you ask for when you want to pay?"
      options:
        - text: "Можна рахунок, будь ласка?"
          correct: true
        - text: "Можна чек, будь ласка?"
          correct: false
        - text: "Можна меню, будь ласка?"
          correct: false
        - text: "Можна воду, будь ласка?"
          correct: false
    - question: "Which phrase means 'with milk'?"
      options:
        - text: "з молоком"
          correct: true
        - text: "без молока"
          correct: false
        - text: "з цукром"
          correct: false
        - text: "без цукру"
          correct: false
    - question: "Which word does NOT change its ending when you order it?"
      options:
        - text: "сік"
          correct: true
        - text: "вода"
          correct: false
        - text: "кава"
          correct: false
        - text: "піца"
          correct: false
    - question: "How do you ask for water?"
      options:
        - text: "Я буду воду."
          correct: true
        - text: "Я буду вода."
          correct: false
        - text: "Я хочу вода."
          correct: false
        - text: "Мені вода."
          correct: false
    - question: "What does 'оплата карткою' mean?"
      options:
        - text: "payment by card"
          correct: true
        - text: "payment in cash"
          correct: false
        - text: "no payment"
          correct: false
        - text: "tip is included"
          correct: false
    - question: "What is 'тістечко'?"
      options:
        - text: "pastry"
          correct: true
        - text: "tea"
          correct: false
        - text: "sugar"
          correct: false
        - text: "waiter"
          correct: false
    - question: "Which phrase means 'without sugar'?"
      options:
        - text: "без цукру"
          correct: true
        - text: "з цукром"
          correct: false
        - text: "з молоком"
          correct: false
        - text: "без молока"
          correct: false

- type: fill-in
  title: "Complete the Cafe Order"
  instruction: "Select the correct word to complete the sentence."
  items:
    - sentence: "Добрий день! Що ___?"
      answer: "замовите"
      options: ["замовите", "замовити", "замовляю", "замовляє"]
    - sentence: "Я буду ___, будь ласка."
      answer: "каву"
      options: ["кава", "каву", "каві", "кавою"]
    - sentence: "Я буду ___."
      answer: "воду"
      options: ["вода", "воду", "воді", "водою"]
    - sentence: "Чай без ___, будь ласка."
      answer: "цукру"
      options: ["цукор", "цукру", "цукром", "цукрі"]
    - sentence: "Можна ___, будь ласка?"
      answer: "меню"
      options: ["меню", "рахунок", "чек", "офіціант"]
    - sentence: "Оплата ___."
      answer: "карткою"
      options: ["картка", "карткою", "картку", "картці"]
    - sentence: "Я заплачу ___."
      answer: "готівкою"
      options: ["готівка", "готівкою", "готівку", "готівці"]
    - sentence: "Кава з ___."
      answer: "молоком"
      options: ["молоко", "молоком", "молока", "молоку"]

- type: fill-in
