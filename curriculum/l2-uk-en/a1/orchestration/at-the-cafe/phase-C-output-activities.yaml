- type: true-false
  title: 'Café Etiquette and Vocabulary'
  instruction: 'Decide if the statement is true or false.'
  items:
    - statement: 'In Ukraine, it is polite to use the formal Ви with a waiter.'
      correct: true
      explanation: 'Always use formal Ви with service staff.'
    - statement: 'To ask for the bill, you should ask the waiter for a чек.'
      correct: false
      explanation: 'Чек is the receipt you get after paying. Ask for a рахунок to get the bill.'
    - statement: 'The word вода changes to воду when you order it.'
      correct: true
      explanation: 'Feminine nouns ending in -а change to -у when they are the direct object (Accusative case).'
    - statement: 'The word чай changes to чаю when you order it as a direct object.'
      correct: false
      explanation: 'Inanimate masculine nouns like чай do not change their form when ordering.'
    - statement: 'Я хочу is the most polite way to order coffee.'
      correct: false
      explanation: 'Я хочу sounds demanding. It is better to use Мені, будь ласка or Я буду.'
    - statement: 'Кава з молоком means coffee without sugar.'
      correct: false
      explanation: 'Кава з молоком means coffee with milk. Without sugar is без цукру.'
    - statement: 'If you want sparkling water, you ask for воду з газом.'
      correct: true
      explanation: 'З газом means sparkling or with gas.'
    - statement: 'You use Можна instead of giving commands to ask for things politely.'
      correct: true
      explanation: 'Можна (is it possible / may I) is the safest, most natural way to request an item.'

