- type: quiz
  title: 'Understand Café Dialogue'
  instruction: 'Choose the correct answer based on café etiquette and vocabulary.'
  items:
    - question: 'What does the waiter say to greet you?'
      options:
        - text: 'Добрий день! Що бажаєте?'
          correct: true
        - text: 'Я буду чай.'
          correct: false
        - text: 'Можна рахунок?'
          correct: false
        - text: 'Я заплачу карткою.'
          correct: false
      explanation: 'Waiters usually greet you and ask what you desire (Що бажаєте?).'
    - question: 'How do you politely ask for the menu?'
      options:
        - text: 'Можна меню, будь ласка?'
          correct: true
        - text: 'Я хочу меню!'
          correct: false
        - text: 'Дайте меню!'
          correct: false
        - text: 'Мені меню.'
          correct: false
      explanation: 'Using «Можна» is the most polite and natural way to ask for something.'
    - question: 'If you want water, what is the best phrase to use?'
      options:
        - text: 'Мені, будь ласка, воду.'
          correct: true
        - text: 'Мені, будь ласка, вода.'
          correct: false
        - text: 'Я хочу вода.'
          correct: false
        - text: 'Вода.'
          correct: false
      explanation: 'You must use the Accusative case (воду) and polite phrasing.'
    - question: 'What is the correct phrase for coffee with milk?'
      options:
        - text: 'кава з молоком'
          correct: true
        - text: 'кава без цукру'
          correct: false
        - text: 'чай з молоком'
          correct: false
        - text: 'кава з газом'
          correct: false
      explanation: '«З молоком» means with milk.'
    - question: 'What should you ask for when you are ready to pay?'
      options:
        - text: 'рахунок'
          correct: true
        - text: 'чек'
          correct: false
        - text: 'меню'
          correct: false
        - text: 'тістечко'
          correct: false
      explanation: '«Рахунок» is the bill you ask for before paying. A «чек» is the final receipt.'
    - question: 'How do you say I will pay by card?'
      options:
        - text: 'Я заплачу карткою.'
          correct: true
        - text: 'Я заплачу готівкою.'
          correct: false
        - text: 'Я залишу чайові.'
          correct: false
        - text: 'Я буду каву.'
          correct: false
      explanation: '«Карткою» means by card.'
    - question: 'Which word means waiter?'
      options:
        - text: 'офіціант'
          correct: true
        - text: 'бариста'
          correct: false
        - text: 'меню'
          correct: false
        - text: 'рахунок'
          correct: false
      explanation: '«Офіціант» is the word for waiter.'
    - question: 'If the barista asks Яку каву?, what are they asking?'
      options:
        - text: 'Which coffee?'
          correct: true
        - text: 'Where is the coffee?'
          correct: false
        - text: 'Who wants coffee?'
          correct: false
        - text: 'How much is the coffee?'
          correct: false
      explanation: '«Яку каву?» asks you to specify your order (large/small, hot/cold).'

