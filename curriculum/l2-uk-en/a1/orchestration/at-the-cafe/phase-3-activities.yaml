- type: fill-in
  title: "Замовлення напоїв та страв"
  instruction: "Допоможіть сусідові замовити смачний напій, обравши правильне слово."
  items:
    - sentence: "Для ме́не, будь ла́ска, ___."
      answer: "кава"
      options: ["кава", "стіл", "меню", "кав'ярня"]
      explanation: "Ми замовляємо каву, а не меблі чи будівлю."
    - sentence: "Я ___ чо́рний чай."
      answer: "візьму́"
      options: ["візьму́", "сіда́ю", "па́хне", "прино́сить"]
      explanation: "Я візьму — це ввічливий спосіб зробити замовлення."
    - sentence: "Мо́жна ___, будь ла́ска?"
      answer: "меню́"
      options: ["меню́", "офіція́нт", "за́тишок", "му́зика"]
      explanation: "Перед замовленням ми просимо меню."
    - sentence: "Я хо́чу ка́ву з ___."
      answer: "молоко́м"
      options: ["молоко́м", "офіція́нтом", "меню́", "піско́м"]
      explanation: "Багато людей люблять пити каву з молоком."
    - sentence: "Цей ___ ду́же смачни́й."
      answer: "круаса́н"
      options: ["круаса́н", "терміна́л", "раху́нок", "чек"]
      explanation: "Круасан — це смачна випічка до кави."
    - sentence: "Тут є соло́дке ___."
      answer: "ті́стечко"
      options: ["ті́стечко", "меню́", "мі́сто", "кафе́"]
      explanation: "Тістечко — це солодкий десерт."
    - sentence: "Ми вже хо́чемо ___."
      answer: "замовля́ти"
      options: ["замовля́ти", "па́хнути", "сіда́ти", "чека́ти"]
      explanation: "Коли ми готові, ми починаємо замовляти."
    - sentence: "Я замовля́ю вели́кий ___."
      answer: "круаса́н"
      options: ["круаса́н", "офіція́нт", "за́тишок", "час"]
      explanation: "Круасан може бути великим або маленьким."
    - sentence: "Офіція́нт прино́сить ___."
      answer: "замо́влення"
      options: ["замо́влення", "терміна́л", "чайові́", "леге́нду"]
      explanation: "Офіціант приносить те, що ви замовили."
    - sentence: "Тут є міцне́ ___."
      answer: "еспре́со"
      options: ["еспре́со", "ті́стечко", "меню́", "мі́сто"]
      explanation: "Еспресо — це міцний кавовий напій."
    - sentence: "Ви хо́чете соло́дкий ___?"
      answer: "круаса́н"
      options: ["круаса́н", "офіція́нт", "раху́нок", "час"]
      explanation: "Круасани часто бувають солодкими."
    - sentence: "Я візьму́ чай з ___."
      answer: "цу́кром"
      options: ["цу́кром", "ка́вою", "меню́", "піско́м"]
      explanation: "Багато людей додають цукор у чай."

- type: quiz
  title: "Розуміння діалогу в кафе"
  instruction: "Перевірте, як добре ви розумієте ввічливий діалог у кав'ярні."
  items:
    - question: "Як вві́чливо привіта́тися з офіція́нтом?"
      explanation: "Добрий день — це універсальне ввічливе вітання."
      options:
        - text: "Добри́й день!"
          correct: true
        - text: "Будь ла́ска"
          correct: false
        - text: "Дя́кую"
          correct: false
        - text: "Скі́льки?"
          correct: false
    - question: "Яку́ фо́рму зверта́ння ми використову́ємо для офіція́нта?"
      explanation: "Ви — це форма поваги до персоналу."
      options:
        - text: "Ви"
          correct: true
        - text: "ти"
          correct: false
        - text: "мій"
          correct: false
        - text: "хто"
          correct: false
    - question: "Що прино́сить офіція́нт на по́чатку?"
      explanation: "Меню потрібно, щоб обрати напої та страви."
      options:
        - text: "меню́"
          correct: true
        - text: "раху́нок"
          correct: false
        - text: "чек"
          correct: false
        - text: "цу́кор"
          correct: false
    - question: "Яку́ фра́зу кра́ще сказа́ти для замовлення?"
      explanation: "Для мене... — це дуже ввічлива конструкція."
      options:
        - text: "Для ме́не, будь ла́ска..."
          correct: true
        - text: "Я хочу негайно..."
          correct: false
        - text: "Дайте мені..."
          correct: false
        - text: "Де кава?"
          correct: false
    - question: "Що зазвичай ка́же офіція́нт, коли підхо́дить?"
      explanation: "Офіціант питає про ваші побажання."
      options:
        - text: "Що бажа́єте?"
          correct: true
        - text: "Хто ви?"
          correct: false
        - text: "Де меню?"
          correct: false
        - text: "Я офіціант."
          correct: false
    - question: "Як ви можете попроси́ти раху́нок?"
      explanation: "Ми використовуємо слово можна для ввічливого прохання."
      options:
        - text: "Мо́жна раху́нок?"
          correct: true
        - text: "Дайте гроші"
          correct: false
        - text: "Де офіціант?"
          correct: false
        - text: "Я плачу"
          correct: false
    - question: "Що озна́чає фра́за Скі́льки з ме́не?"
      explanation: "Це питання про загальну суму оплати."
      options:
        - text: "How much from me?"
          correct: true
        - text: "Who am I?"
          correct: false
        - text: "Where is the bill?"
          correct: false
        - text: "What is this?"
          correct: false
    - question: "Де Украї́нці зазвича́й сидя́ть ду́же до́вго?"
      explanation: "Кафе в Україні — це місце для відпочинку та спілкування."
      options:
        - text: "в кафе́"
          correct: true
        - text: "в магазині"
          correct: false
        - text: "на ринку"
          correct: false
        - text: "в аптеці"
          correct: false
    - question: "Як ви мо́жете вві́чливо поклика́ти офіція́нта?"
      explanation: "В Україні прийнято просто підняти руку."
      options:
        - text: "підня́ти ру́ку"
          correct: true
        - text: "голосно кричати"
          correct: false
        - text: "стукати по столу"
          correct: false
        - text: "йти на кухню"
          correct: false
    - question: "Яки́й напо́й зазвича́й п'ють з молоко́м?"
      explanation: "Кава з молоком — це класичний вибір."
      options:
        - text: "ка́ва"
          correct: true
        - text: "вода"
          correct: false
        - text: "сік"
          correct: false
        - text: "горілка"
          correct: false
    - question: "Як ми ка́жемо please украї́нською мо́вою?"
      explanation: "Будь ласка — незамінне слово для ввічливості."
      options:
        - text: "будь ла́ска"
          correct: true
        - text: "дякую"
          correct: false
        - text: "прошу"
          correct: false
        - text: "перепрошую"
          correct: false
    - question: "Яки́й відмі́нок ми використову́ємо для слова ме́не?"
      explanation: "Після прийменника з використовується родовий відмінок."
      options:
        - text: "родовий"
          correct: true
        - text: "називний"
          correct: false
        - text: "знахідний"
          correct: false
        - text: "місцевий"
          correct: false

