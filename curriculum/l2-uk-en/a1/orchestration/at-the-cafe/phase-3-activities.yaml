- type: unjumble
  title: "Цікаві факти про каву"
  instruction: "Розставте слова, щоб розповісти про багаті кавові традиції Львова."
  items:
    - words: ["Львів", "це", "ка́вова", "столи́ця", "Украї́ни"]
      answer: "Львів це ка́вова столи́ця Украї́ни"
    - words: ["Ю́рій", "Кульчи́цький", "це", "відо́ма", "леге́нда"]
      answer: "Ю́рій Кульчи́цький це відо́ма леге́нда"
    - words: ["Він", "відкрива́в", "пе́ршу", "кав'я́рню", "у", "Ві́дні"]
      answer: "Він відкрива́в пе́ршу кав'я́рню у Ві́дні"
    - words: ["Ми", "готу́ємо", "ка́ву", "на", "гаря́чому", "піску́"]
      answer: "Ми готу́ємо ка́ву на гаря́чому піску́"
    - words: ["Дже́зва", "це", "мале́нька", "кастру́ля", "для", "ка́ви"]
      answer: "Дже́зва це мале́нька кастру́ля для ка́ви"
    - words: ["Ка́ва", "на", "піску́", "ство́рює", "густу́", "пі́ну"]
      answer: "Ка́ва на піску́ ство́рює густу́ пі́ну"
    - words: ["Украї́на", "це", "ду́же", "цифрова́", "сучасна́", "краї́на"]
      answer: "Україна це дуже цифрова сучасна країна"
    - words: ["Лю́ди", "залиша́ють", "чайові́", "у", "ко́жному", "кафе́"]
      answer: "Лю́ди залиша́ють чайові́ у ко́жному кафе́"
    - words: ["Бари́ста", "ува́жно", "диви́ться", "на", "гаря́чу", "ка́ву"]
      answer: "Бари́ста ува́жно диви́ться на гаря́чу ка́ву"
    - words: ["Мі́сто", "Львів", "ма́є", "ду́же", "старі́", "тради́ції"]
      answer: "Мі́сто Львів ма́є ду́же старі́ тради́ції"
    - words: ["Ю́рій", "Кульчи́цький", "знав", "важку́", "туре́цьку", "мо́ву"]
      answer: "Ю́рій Кульчи́цький знав важку́ туре́цьку мо́ву"
    - words: ["Ми", "лю́бимо", "цю", "смачну́", "льві́вську", "ка́ву"]
      answer: "Ми лю́бимо цю смачну́ льві́вську ка́ву"

- type: match-up
  title: "Запитання та прохання"
  instruction: "Поєднайте запитання з відповідними ситуаціями."
  pairs:
    - left: "Мо́жна меню́?"
      right: "Can I have the menu?"
    - left: "Що ви бажа́єте?"
      right: "What do you wish?"
    - left: "Що ви пора́дите?"
      right: "What do you recommend?"
    - left: "Скі́льки з ме́не?"
      right: "How much from me?"
    - left: "Мо́жна раху́нок?"
      right: "Can I have the bill?"
    - left: "У вас є терміна́л?"
      right: "Do you have a terminal?"
    - left: "Ка́ва з молоко́м?"
      right: "Coffee with milk?"
    - left: "Вели́кий чи мале́нький?"
      right: "Large or small?"
    - left: "Цу́кор чи без цу́кру?"
      right: "Sugar or without sugar?"
    - left: "Готі́вкою чи ка́рткою?"
      right: "Cash or card?"
    - left: "Для ме́не, будь ла́ска."
      right: "For me, please."
    - left: "Я візьму́ чай."
      right: "I will take tea."

- type: quiz
  title: "Загальний огляд теми Кафе"
  instruction: "Давайте повторимо все, що ми вивчили про відвідування кав'ярні."
  items:
    - question: "Що таке́ дже́зва в каво́вій тради́ції?"
      explanation: "Джезва — це традиційний по́суд для приготування кави."
      options:
        - text: "по́суд для ка́ви"
          correct: true
        - text: "десерт"
          correct: false
        - text: "офіціант"
          correct: false
        - text: "рахунок"
          correct: false
    - question: "Яки́й відмі́нок у слові раху́нок в ре́ченні Я ма́ю раху́нок?"
      explanation: "Чоловічі іменники в знахідному відмінку часто збігаються з називним."
      options:
        - text: "знахідний"
          correct: true
        - text: "називний"
          correct: false
        - text: "родовий"
          correct: false
        - text: "місцевий"
          correct: false
    - question: "Що зазвича́й прино́сять у спеціа́льній па́пці?"
      explanation: "Рахунок приносять наприкінці візиту в папці."
      options:
        - text: "раху́нок"
          correct: true
        - text: "меню"
          correct: false
        - text: "каву"
          correct: false
        - text: "круасан"
          correct: false
    - question: "Яка́ фра́за є вві́чливим проха́нням украї́нською?"
      explanation: "Будь ласка — основа ввічливої мови."
      options:
        - text: "будь ла́ска"
          correct: true
        - text: "де меню"
          correct: false
        - text: "я хочу"
          correct: false
        - text: "дай мені"
          correct: false
    - question: "Хто такий офіція́нт у за́кладі?"
      explanation: "Офіціант — це працівник закладу, який приймає замовлення."
      options:
        - text: "людина, яка обслуговує"
          correct: true
        - text: "кухар"
          correct: false
        - text: "директор"
          correct: false
        - text: "гість"
          correct: false
    - question: "Що озна́чає украї́нське сло́во замовля́ти?"
      explanation: "Замовляти — це просити приготувати страву або напій."
      options:
        - text: "to order"
          correct: true
        - text: "to pay"
          correct: false
        - text: "to wait"
          correct: false
        - text: "to sleep"
          correct: false
    - question: "Яки́й напо́й зазвича́й бува́є міцни́й?"
      explanation: "Кава відома своїм міцним смаком."
      options:
        - text: "ка́ва"
          correct: true
        - text: "молоко"
          correct: false
        - text: "вода"
          correct: false
        - text: "сік"
          correct: false
    - question: "Як ми ка́жемо thank you офіція́нту?"
      explanation: "Дякую — найкращий спосіб висловити вдячність."
      options:
        - text: "дя́кую"
          correct: true
        - text: "будь ласка"
          correct: false
        - text: "прошу"
          correct: false
        - text: "привіт"
          correct: false
    - question: "Де мо́жна поба́чити список страв та ці́ни?"
      explanation: "Меню містить всю необхідну інформацію про асортимент."
      options:
        - text: "у меню́"
          correct: true
        - text: "у вікні"
          correct: false
        - text: "на стіні"
          correct: false
        - text: "на вулиці"
          correct: false
    - question: "Яки́й напо́й готу́ють з листя?"
      explanation: "Чай заварюють з чайного листя."
      options:
        - text: "чай"
          correct: true
        - text: "кава"
          correct: false
        - text: "еспресо"
          correct: false
        - text: "капучіно"
          correct: false
    - question: "Як назива́ється папе́рова опла́та?"
      explanation: "Готівка — це фізичні гроші, банкноти."
      options:
        - text: "готі́вка"
          correct: true
        - text: "картка"
          correct: false
        - text: "рахунок"
          correct: false
        - text: "чек"
          correct: false
    - question: "Що таке́ ті́стечко у меню́?"
      explanation: "Тістечко — це маленький десерт, солодкість."
      options:
        - text: "соло́дкий десе́рт"
          correct: true
        - text: "м'ясо"
          correct: false
        - text: "риба"
          correct: false
        - text: "суп"
          correct: false
