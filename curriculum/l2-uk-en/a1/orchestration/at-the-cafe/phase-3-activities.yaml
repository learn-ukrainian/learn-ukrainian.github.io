- type: fill-in
  title: "Ввічливість та обслуговування"
  instruction: "Доповніть речення про оплату та сервіс у кав'ярні."
  items:
    - sentence: "Вибачте, ви ма́єте ___?"
      answer: "терміна́л"
      options: ["терміна́л", "офіція́нта", "за́тишок", "пісо́к"]
      explanation: "Термінал потрібен для оплати карткою."
    - sentence: "Ми залиша́ємо ___ для офіція́нта."
      answer: "чайові́"
      options: ["чайові́", "меню́", "ка́ву", "ті́стечко"]
      explanation: "Чайові — це подяка за гарне обслуговування."
    - sentence: "Я пла́чу ___."
      answer: "готі́вкою"
      options: ["готі́вкою", "меню́", "за́тишком", "ча́сом"]
      explanation: "Готівка — це паперові гроші."
    - sentence: "___ — це офіці́йний докуме́нт."
      answer: "чек"
      options: ["чек", "меню́", "ка́ва", "за́тишок"]
      explanation: "Чек підтверджує вашу оплату."
    - sentence: "Скі́льки з ___?"
      answer: "ме́не"
      options: ["ме́не", "офіція́нта", "меню́", "круаса́на"]
      explanation: "Ми питаємо про суму, яку повинні заплатити."
    - sentence: "Принесі́ть, будь ла́ска, ___."
      answer: "раху́нок"
      options: ["раху́нок", "офиція́нта", "за́тишок", "тради́цію"]
      explanation: "Ми просимо рахунок, коли хочемо заплатити."
    - sentence: "Дя́кую за ___!"
      answer: "се́рвіс"
      options: ["се́рвіс", "офіція́нта", "меню́", "терміна́л"]
      explanation: "Ми дякуємо за якісне обслуговування (сервіс)."
    - sentence: "Я ма́ю ___, мо́жна плати́ти?"
      answer: "ка́ртку"
      options: ["ка́ртку", "офіція́нта", "меню́", "пісо́к"]
      explanation: "Банківська картка — зручний спосіб оплати."
    - sentence: "Офіція́нт ду́же ___."
      answer: "вві́чливий"
      options: ["вві́чливий", "соло́дкий", "вели́кий", "гаря́чий"]
      explanation: "Ввічливий офіціант завжди приємний клієнтам."
    - sentence: "Ви хочете́ ___?"
      answer: "цу́кор"
      options: ["цу́кор", "меню́", "офіція́нта", "за́тишок"]
      explanation: "Цукор робить каву або чай солодкими."
    - sentence: "Я візьму́ ка́ву ___ цу́кру."
      answer: "без"
      options: ["без", "з", "для", "на"]
      explanation: "Без цукру — якщо ви не любите солодке."
    - sentence: "Це ва́ше ___."
      answer: "замо́влення"
      options: ["замо́влення", "офіція́нт", "меню́", "чайові́"]
      explanation: "Офіціант приносить ваше готове замовлення."

- type: quiz
