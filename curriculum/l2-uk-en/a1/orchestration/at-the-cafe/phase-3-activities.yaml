- type: unjumble
  title: "Складіть фрази для замовлення"
  instruction: "Поставте слова у правильному порядку, щоб утворити ввічливе речення."
  items:
    - words: ["Для", "ме́не", "будь", "ла́ска", "ка́ва"]
      answer: "Для ме́не будь ла́ска ка́ва"
    - words: ["Я", "візьму́", "чо́рний", "чай"]
      answer: "Я візьму́ чо́рний чай"
    - words: ["Мо́жна", "раху́нок", "будь", "ла́ска"]
      answer: "Мо́жна раху́нок будь ла́ска"
    - words: ["Офіція́нт", "прино́сить", "смачне́", "ті́стечко"]
      answer: "Офіція́нт прино́сить смачне́ ті́стечко"
    - words: ["Я", "хо́чу", "ка́ву", "з", "молоко́м"]
      answer: "Я хо́чу ка́ву з молоко́м"
    - words: ["Ви", "хо́чете", "вели́кий", "круаса́н"]
      answer: "Ви хо́чете вели́кий круаса́н"
    - words: ["Тут", "є", "ду́же", "смачни́й", "чай"]
      answer: "Тут є ду́же смачни́й чай"
    - words: ["Ми", "сіда́ємо", "за", "цей", "сто́лик"]
      answer: "Ми сіда́ємо за цей сто́лик"
    - words: ["Скі́льки", "з", "ме́не", "за", "замовлення"]
      answer: "Скі́льки з ме́не за замовлення"
    - words: ["Я", "пла́чу", "за", "ка́ву", "ка́рткою"]
      answer: "Я пла́чу за ка́ву ка́рткою"
    - words: ["Принесі́ть", "будь", "ла́ска", "міцне́", "еспре́со"]
      answer: "Принесі́ть будь ла́ска міцне́ еспре́со"
    - words: ["Львів", "це", "відо́ма", "столи́ця", "ка́ви"]
      answer: "Львів це відо́ма столи́ця ка́ви"

