- type: quiz
  title: "Letter Knowledge Check"
  instruction: "Choose the correct answer based on what you learned."
  items:
    - question: "Which letter sounds like the English B?"
      explanation: "Б is the voiced partner of П."
      options:
        - text: "Б"
          correct: true
        - text: "П"
          correct: false
        - text: "В"
          correct: false
        - text: "Г"
          correct: false
    - question: "Which letter looks like a platform and sounds like the English P (unaspirated)?"
      explanation: "П is voiceless and has no puff of air."
      options:
        - text: "П"
          correct: true
        - text: "Л"
          correct: false
        - text: "Р"
          correct: false
        - text: "Д"
          correct: false
    - question: "Which letter represents a soft, throaty sound, not a hard G?"
      explanation: "Г is a voiced glottal fricative."
      options:
        - text: "Г"
          correct: true
        - text: "Х"
          correct: false
        - text: "З"
          correct: false
        - text: "Ж"
          correct: false
    - question: "Which letter buzzes like a bee, acting as the voiced partner to С?"
      explanation: "З sounds like the English Z."
      options:
        - text: "З"
          correct: true
        - text: "Е"
          correct: false
        - text: "В"
          correct: false
        - text: "Б"
          correct: false
    - question: "Which letter represents the sh sound as in ship?"
      explanation: "Ш is the voiceless partner of Ж."
      options:
        - text: "Ш"
          correct: true
        - text: "Ж"
          correct: false
        - text: "Ч"
          correct: false
        - text: "Щ"
          correct: false
    - question: "What does the word хліб mean?"
      explanation: "Хліб is a cultural staple meaning bread."
      options:
        - text: "bread"
          correct: true
        - text: "milk"
          correct: false
        - text: "water"
          correct: false
        - text: "house"
          correct: false
    - question: "Which word means school?"
      explanation: "Школа uses the letter Ш."
      options:
        - text: "школа"
          correct: true
        - text: "парк"
          correct: false
        - text: "пошта"
          correct: false
        - text: "банк"
          correct: false
    - question: "Which of these consonants is voiceless?"
      explanation: "Place your hand on your throat. Х does not vibrate."
      options:
        - text: "Х"
          correct: true
        - text: "Г"
          correct: false
        - text: "Б"
          correct: false
        - text: "З"
          correct: false

- type: true-false
  title: "True or False?"
  instruction: "Decide if these statements about the new letters are true or false."
  items:
    - statement: "The Ukrainian letter Д is pronounced exactly like the English D, without touching your teeth."
      correct: false
      explanation: "In Ukrainian, Д requires dental articulation. Place your tongue against the back of your top teeth."
    - statement: "The letter П produces a strong puff of air when spoken, just like in English."
      correct: false
      explanation: "Ukrainian П is completely unaspirated. There is no puff of air."
    - statement: "The letter Х is pronounced like the ks sound in English."
      correct: false
      explanation: "Х is a gentle friction in the back of your mouth, like ch in Scottish loch."
    - statement: "When a consonant is voiced, you can feel your throat vibrate."
      correct: true
      explanation: "Voiced sounds involve vibration in your vocal cords."
    - statement: "The letter Ж looks like a little bug and sounds like the s in measure."
      correct: true
      explanation: "The keyword is жук (beetle/bug), which helps remember its shape and sound."
    - statement: "The letter Г makes a hard, crisp g sound."
      correct: false
      explanation: "Г makes a soft, throaty sound. The hard g is represented by a different letter."
    - statement: "З is the voiced partner of the voiceless letter С."
      correct: true
      explanation: "З (voiced) and С (voiceless) form a pair."
    - statement: "The word зуб starts with a voiceless consonant."
      correct: false
      explanation: "Зуб starts with З, which is a voiced consonant."

