- type: fill-in
  title: "Complete the Phrase"
  instruction: "Select the correct word to match the English translation."
  items:
    - sentence: "Це ___. (This is bread.)"
      answer: "хліб"
      options: ["хліб", "парк", "місто", "зуб"]
    - sentence: "Там ___. (There is a park.)"
      answer: "парк"
      options: ["парк", "брат", "молоко", "жук"]
    - sentence: "Тут ___. (Here is a school.)"
      answer: "школа"
      options: ["школа", "дім", "кіт", "банк"]
    - sentence: "Там великий ___. (There is a large building.)"
      answer: "будинок"
      options: ["будинок", "суп", "час", "чай"]
    - sentence: "Це ___. (This is a beetle.)"
      answer: "жук"
      options: ["жук", "транспорт", "газета", "дерево"]
    - sentence: "Тут ___. (Here is a hat.)"
      answer: "шапка"
      options: ["шапка", "гора", "студент", "сестра"]
    - sentence: "Там ___. (There is a brother.)"
      answer: "брат"
      options: ["брат", "зебра", "баба", "пошта"]
    - sentence: "Це ___. (This is a tree.)"
      answer: "дерево"
      options: ["дерево", "павук", "собака", "доктор"]

