activity_obligations:
- order: 1
  id: ''
  type: quiz
  focus: 'Розрізняй звуки та літери. Приклади питань: Що ми чуємо і вимовляємо? →
    звуки | Що ми бачимо і пишемо? → літери | Скільки літер в абетці? → 33 | Скільки
    звуків в українській мові? → 38 | Чи можна говорити «голосна літера»? → Ні, голосний
    — це звук, не літера.'
- order: 2
  id: ''
  type: match-up
  focus: 'З''єднай українські літери зі звуками, які вони позначають — за схемою Захарійчук
    «Бачу... Чую...». Пари: А ↔ [а], О ↔ [о], У ↔ [у], М ↔ [м], К ↔ [к], Н ↔ [н].
    Саме так вчаться українські першокласники: бачать літеру (бачу), чують звук (чую).'
- order: 3
  id: ''
  type: fill-in
  focus: 'Доповни базовий діалог-привітання. — {Привіт}! Як {справи}? / — {Добре}.
    А у {тебе}? / — {Чудово}. Варіанти: Привіт / справи / Добре / тебе / Чудово /
    Нормально.'
- order: 4
  id: ''
  type: group-sort
  focus: 'Розподіли українські звуки на Голосні та Приголосні. Голосні: [а], [о],
    [у], [е], [и], [і]. Приголосні: [к], [м], [т], [в], [н], [р], [с], [х].'
- order: 5
  id: ''
  type: letter-grid
  focus: 'Інтерактивна таблиця абетки, що показує всі 33 українські літери. Кожна
    картка: велика/мала літера, ключове слово з емодзі, кольорове розрізнення голосних/приголосних.
    Голосні літери виділені іншим кольором, ніж приголосні. Ь позначено як особливий
    (без звуку).'
- order: 6
  id: ''
  type: watch-and-repeat
  focus: 'Практика вимови з відео Анни Огойко. Голосні: А (hvB3VpcR3ZE), У (VB1O6PmtYRU),
    Е (KFlsroBW0dk), И (W-1rCu0indE), І (Z9TH0H4ShGo). Приголосні: М (Ez95H4ibuJo),
    Н (vNUfiKHPYaU), С (7UsFBgSL91E), К (J7sGEI4-xJo), Л (v6-3Xg52Buk), Р (fMGsQ5KPQgg).
    Кожен пункт: відео YouTube + літера + ключове слово + позначення звука.'
