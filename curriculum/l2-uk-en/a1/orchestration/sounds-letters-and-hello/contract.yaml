dialogue_acts:
- setting: Перший урок української мови — вчитель вітає учнів, учні відповідають і
    практикують базовий обмін фразами Привіт/Добрий день
  speakers:
  - Вчитель
  - Учні
  function: 'Практика вітальних фраз: Привіт! Добрий день! Як справи? Добре.'
- setting: 'Двоє нових однокласників зустрічаються в коридорі перед першим уроком
    української мови та знайомляться. ОБОВ''ЯЗКОВО використовувати імена для реплік
    (Марко: ..., Софія: ...), обмінятися іменами та використати взаємне «А у тебе?».'
  speakers:
  - Марко
  - Софія
  function: Привіт! Як тебе звати? Мене звати... А у тебе? — перше соціальне використання
    вивчених звуків
vocab_grammar_targets:
  must_introduce:
  - звук (sound)
  - літера (letter)
  - голосний (vowel sound)
  - приголосний (consonant sound)
  - привіт (hi, informal)
  - як справи (how are you)
  - добре (fine, good)
  - чудово (great, wonderful)
  - мама (mother)
  - молоко (milk)
  scope_lock:
  - Звуки проти літер — 33 літери, 38 звуків. 'Звуки ми чуємо й вимовляємо, а букви
    бачимо й пишемо.'
  - Голосні (6 звуків, 10 літер) — лише голос, немає перешкод, можна співати
  - Приголосні (32 звуки, 22 літери) — голос + шум або лише шум, є перешкода
  - 'Чому 38 > 33: йотовані голосні (Я, Ю, Є, Ї), тверді/м''які пари, Ь (без звуку)'
  - Звуковий аналіз — визначення голосних і приголосних у слові
  - Привітання "Привіт" як перші кроки в розмовній українській
