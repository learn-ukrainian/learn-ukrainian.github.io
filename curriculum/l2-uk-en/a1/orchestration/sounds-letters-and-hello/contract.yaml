  - order: 4
    name: Привіт!
    word_budget: &id014
      target: 250
      min: 225
      max: 275
    teaching_beats:
    - 'Ваша перша розмова українською. На основі епізоду 1 ULP Анни Огойко. Привіт!
      (неформально, для друзів, родини, однолітків). Як справи? Відповіді: Добре.
      Чудово. Нормально. А у тебе?'
    - Рада тебе бачити! (каже жінка) / Радий тебе бачити! (каже чоловік) — Радий/рада
      зустрічі! В українській мові є родові форми — жінки кажуть «рада», чоловіки
      — «радий». Це ваше перше знайомство з граматичним родом. Це стане великою темою,
      починаючи з M08.
    - 'Прочитаймо «Привіт» по літерах — ваш перший звуковий аналіз: П [п] приголосний
      + р [р] приголосний + и [и] голосний + в [в] приголосний + і [і] голосний +
      т [т] приголосний. Два голосні, чотири приголосні. Кожен тип звука, який ви
      вивчили в цьому модулі, з''являється в цьому єдиному слові.'
    required_terms:
    - Ваша
    - перша
    - розмова
    - українською
    - основі
    - епізоду
    - Анни
    - Огойко
    factual_anchors:
    - &id007
      section: Привіт!
      claim: '# Педагогіка A1: Checkpoint First Contact ## Методичний підхід Перший
        контакт учня з українською мовою має бути одночасно комунікативним і структурно
        обґрунтованим.'
      citation: 'pedagogy/a1/checkpoint-first-contact.md :: Overview'
      matched_terms:
      - бачити
      - відповіді
      - голоснии
      - голосні
    - &id008
      section: Привіт!
      claim: '# Педагогіка A1: How Many ## Методичний підхід В українській педагогічній
        практиці вивчення чисел починається з розмежування двох фундаментальних питань:
        **«скільки?»** для позначення кількості та **«котрий?»** для позначення порядку
        [S1].'
      citation: 'pedagogy/a1/how-many.md :: Overview'
      matched_terms:
      - аналіз
      - великою
      - відповіді
      - два
    activity_types_after_section:
    - quiz
    - match-up
    - fill-in
    - group-sort
    - letter-grid
    - watch-and-repeat
  - order: 5
    name: Підсумок
    word_budget: &id015
      target: 150
      min: 135
      max: 165
    teaching_beats:
    - 'Запитання для самоперевірки: Скільки літер в українській абетці? (33) Скільки
      звуків? (38) Чому вони відрізняються? Що таке голосні? Що таке приголосні? Чи
      можна сказати «голосна літера»? (Ні — голосні бувають звуки, а не літери!) Що
      означає «Привіт»? Як ви відповісте на «Як справи?»'
    required_terms:
    - Запитання
    - для
    - самоперевірки
    - Скільки
    - літер
    - українській
    - абетці
    - звуків
    factual_anchors:
