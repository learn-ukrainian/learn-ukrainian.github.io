  - Підсумок
  sections:
  - order: 1
    name: Звуки і літери
    word_budget: &id011
      target: 300
      min: 270
      max: 330
    teaching_beats:
    - 'Золоте правило з підручника Заболотного, 5 клас, стор. 83: «Звуки ми чуємо
      й вимовляємо, а букви бачимо й пишемо». Ми чуємо і вимовляємо звуки. Ми бачимо
      і пишемо літери (букви). Це НЕ одне й те саме. Літера — це символ на папері.
      Звук — це те, що вимовляє рот. Це розрізнення є основою української фонетики
      — українські вчителі відпрацьовують його з 1 класу.'
    - 'В українській мові 33 літери, але 38 звуків. Чому так? Деякі літери позначають
      два звуки (Я, Ю, Є, Ї в певних позиціях). Одна літера (Ь) взагалі не позначає
      звуку — вона лише пом''якшує попередній приголосний. Літвінова, 5 клас, стор.
      130 запитує: Чи можна говорити «голосна літера»? Відповідь: ні! Звуки бувають
      голосні або приголосні, а не літери. Літери лише позначають звуки.'
    - 'Український алфавіт (абетка): усі 33 літери по порядку. Кожна літера має свою
      назву. На відміну від англійської, український правопис переважно фонетичний
      — те, що ви бачите, те (здебільшого) і чуєте. Жодних "німих" літер, жодних несподіваних
      вимов. Щойно ви вивчите звуки, ви зможете прочитати будь-яке слово.'
    required_terms:
    - Золоте
    - правило
    - підручника
    - Заболотного
    - клас
    - стор
    - Звуки
    - чуємо
    factual_anchors:
    - &id001
      section: Звуки і літери
      claim: '# Педагогіка A1: Checkpoint First Contact ## Методичний підхід Перший
        контакт учня з українською мовою має бути одночасно комунікативним і структурно
        обґрунтованим.'
      citation: 'pedagogy/a1/checkpoint-first-contact.md :: Overview'
      matched_terms:
      - алфавіт
      - будь
      - від
      - відміну
    - &id002
      section: Звуки і літери
      claim: '# Педагогіка A1: Sounds Letters And Hello ## Методичний підхід В основі
        навчання української фонетики на початковому рівні лежить принцип "від звука
        до букви".'
      citation: 'pedagogy/a1/sounds-letters-and-hello.md :: Overview'
      matched_terms:
      - англіиськоі
      - букви
      - від
      - відміну
    activity_types_after_section:
    - quiz
    - match-up
    - fill-in
    - group-sort
    - letter-grid
    - watch-and-repeat
  - order: 2
    name: Голосні звуки
    word_budget: &id012
      target: 250
      min: 225
      max: 275
    teaching_beats:
    - 'Большакова, 1 клас, стор. 24 навчає голосним через вірш: «Голосні почуєш в
      пісні, і у темному у лісі, і коли дивуєшся, і коли милуєшся. Легко вимовляються,
      весело співаються!» Голосні звуки утворюються лише за допомогою голосу — повітря
      вільно проходить через рот без жодних перешкод. Ви можете їх проспівати. Їх
      можна прокричати через поле.'
    - '6 голосних звуків: [а], [о], [у], [е], [и], [і]. Але 10 голосних літер: А,
      О, У, Е, И, І, Я, Ю, Є, Ї. Інші чотири (Я, Ю, Є, Ї) є йотованими — вони можуть
      позначати два звуки. Усі деталі — в M02. Наразі: кожне українське слово має
      хоча б один голосний звук. Голосні — це серце кожного складу.'
    - 'Позначення Захарійчук, 1 клас, стор. 13: голосні звуки позначаються [•] у звукових
      моделях. Практика сприйняття голосних: мА-мА (два [а]), мО-лО-кО (три [о]),
      У-ля (одне [у]). Відео Анни Огойко для кожної голосної літери — дивіться, слухайте,
      повторюйте.'
    required_terms:
    - Большакова
    - клас
    - стор
    - навчає
    - голосним
    - через
    - вірш
    - Голосні
    factual_anchors:
    - &id003
      section: Голосні звуки
      claim: '# Педагогіка A1: Sounds Letters And Hello ## Методичний підхід В основі
        навчання української фонетики на початковому рівні лежить принцип "від звука
        до букви".'
      citation: 'pedagogy/a1/sounds-letters-and-hello.md :: Overview'
      matched_terms:
      - вимовляються
      - голосних
      - голосні
      - два
    - &id004
      section: Голосні звуки
      claim: '# Педагогіка A1: Checkpoint First Contact ## Методичний підхід Перший
        контакт учня з українською мовою має бути одночасно комунікативним і структурно
        обґрунтованим.'
      citation: 'pedagogy/a1/checkpoint-first-contact.md :: Overview'
      matched_terms:
      - без
      - голоснии
      - голосні
      - два
    activity_types_after_section:
