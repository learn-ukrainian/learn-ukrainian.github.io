  - order: 3
    name: Приголосні звуки
    word_budget: &id013
      target: 250
      min: 225
      max: 275
    teaching_beats:
    - 'Большакова, 1 клас, стор. 24: «Приголосні деренчать і тихенько шелестять, голосно
      свистять і шиплять». Приголосні звуки утворюються за допомогою голосу і шуму
      або лише шуму. Ваші губи, зуби або язик створюють перешкоду. Неможливо проспівати
      чистий приголосний — спробуйте проспівати [к] або [п].'
    - '32 приголосних звуки з 22 приголосних літер. Деякі приголосні утворюють пари:
      тверді і м''які. Захарійчук, 1 клас, стор. 15: тверді звуки позначаються [–],
      м''які позначаються [=]. Цього поділу на тверді та м''які немає в англійській
      мові — це суто слов''янська особливість.'
    - 'Приголосні літери для вивчення через відео Анни Огойко: М, Н, С, К, Л, Р, Б,
      В, Д, П, Т, Г, Ґ, З, Ж, Ш, Х, Й, Ч, Щ, Ц, Ф. Кожне відео показує літеру, демонструє
      звук і наводить приклади слів. Особливість: літера Ґ позначає твердий звук [g],
      тоді як Г — це фарингальний [ɦ]. Щ завжди дорівнює двом звукам [шч]. Ь (м''який
      знак) не має звуку — він пом''якшує попередній приголосний.'
    required_terms:
    - Большакова
    - клас
    - стор
    - Приголосні
    - деренчать
    - тихенько
    - шелестять
    - голосно
    factual_anchors:
    - &id005
      section: Приголосні звуки
      claim: '# Педагогіка A1: Sounds Letters And Hello ## Методичний підхід В основі
        навчання української фонетики на початковому рівні лежить принцип "від звука
        до букви".'
      citation: 'pedagogy/a1/sounds-letters-and-hello.md :: Overview'
      matched_terms:
      - англіиськіи
      - він
      - завжди
      - звук
    - &id006
      section: Приголосні звуки
      claim: '# Педагогіка A1: Checkpoint First Contact ## Методичний підхід Перший
        контакт учня з українською мовою має бути одночасно комунікативним і структурно
        обґрунтованим.'
      citation: 'pedagogy/a1/checkpoint-first-contact.md :: Overview'
      matched_terms:
      - англіиськіи
      - вивчення
      - він
      - завжди
    activity_types_after_section:
