findings:
- dimension: EXERCISE QUALITY
  severity: MAJOR
  location: 'Читаємо section — "<!-- INJECT_ACTIVITY: quiz-reading-practice -->"'
  issue: Activity placeholder was not converted to a real exercise. The Читаємо section
    teaches environmental reading, city names, and Це/Що це/Хто це — but has no practice
    activity. This leaves a gap in the PPP cycle for this section.
  fix: 'Replace the placeholder with an actual quiz activity testing reading of signs
    and city names.


    [DIALOGUE QUALITY] [MAJOR]

    Location: Second dialogue in Привіт! section — "Андрій: О, Марія! Привіт! Рада
    тебе бачити!" and Марія''s correction "Радий... Андрію, я — жінка."

    Issue: Марія''s correction line starts with "Радий..." which is confusing for
    A1 learners — she appears to be using the masculine form herself before explaining.
    The quoting intent is unclear without quotation marks or an explicit "Ти кажеш
    «рада», але..." framing.

    Fix: Rewrite Марія''s line to make the correction explicit and clear for beginners.


