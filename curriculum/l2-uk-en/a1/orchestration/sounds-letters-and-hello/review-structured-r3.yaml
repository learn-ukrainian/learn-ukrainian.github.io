findings:
- dimension: LINGUISTIC ACCURACY
  severity: critical
  location: '`A consonant sound can be **тверді** (hard), marked with a single dash
    [–] in sound models, or **м''які** (soft), marked with a double dash [=]. This
    fundamental distinction between hard and soft sounds does not exist in English.
    It is a uniquely Slavic characteristic that gives the language its flowing rhythm.`'
  issue: '`[=]` is not a “double dash”; it is the equals-sign notation used here for
    soft consonants. The sentence also overstates the linguistics: this contrast is
    important in Ukrainian and common across Slavic languages, not “uniquely Slavic.”'
  fix: Change `double dash [=]` to `equals sign [=]` and narrow the final claim to
    `It is a major feature of Ukrainian and other Slavic languages.`
- dimension: PLAN ADHERENCE
  severity: major
  location: '`There are a few special consonant letters to recognize. The letter **Ґ**
    represents the hard [g] sound, exactly like the "g" in "go." However, the much
    more common letter **Г** represents a deep, pharyngeal [h] sound. Another unique
    letter is **Щ**, which always represents two distinct sounds spoken together:
    [шч].`'
  issue: The contract’s third consonant teaching beat requires the Anna Ohoiko consonant
    inventory and the “see the letter / hear the sound / example words” framing. The
    prose only highlights Ґ, Г, and Щ, so that beat is undercovered.
  fix: Add one sentence naming the contracted consonant set and stating that the videos
    show the letter, the sound, and example words.
- dimension: STRUCTURAL INTEGRITY
  severity: major
  location: '`PIPELINE NOTE — Word count: 1165 words`'
  issue: The module misses the 1200-word minimum.
  fix: Add at least 35 words of contracted content; the consonant-video insert below
    is sufficient if applied.
