blocking_issues:
- type: PRAGMATIC_FORMULA_MISMATCH
  severity: major
  location: Привіт! (Hello!), Марко–Софія dialogue
  evidence: Two new classmates meet for the first time, but they close with «Радий
    тебе бачити! / Рада тебе бачити!», which fits reunion/seeing someone again better
    than first introduction.
  fix: Rewrite the closing as a first-meeting formula such as «Радий/рада знайомству»
    or «Дуже приємно познайомитися», and keep «Рада/радий тебе бачити» for a reunion
    scene only.
- type: REGISTER_SCENE_MISMATCH
  severity: major
  location: Привіт! (Hello!), opening classroom dialogue
  evidence: The teacher says «Добрий день! Як справи?», the class answers «Добрий
    день! Добре.», then Maksym repeats «Добрий день! Добре.»; the adjacency pairs
    are unnatural and mix greeting with small-talk in a stiff way.
  fix: 'Rewrite as a natural formal classroom exchange: greeting first («Добрий день!»
    / «Добрий день!»), then, if needed, a separate one-to-one «Як справи? — Добре,
    дякую» rather than a choral response.'
- type: META_PEDAGOGICAL_NARRATION
  severity: critical
  location: Привіт! (Hello!), prose between the two dialogues
  evidence: Sentences like «Here Добрий день and Добре form a simple classroom exchange.
    Keep Привіт for the classmate dialogue below.» and «The pair Як тебе звати? /
    Мене звати ... covers the basic name exchange.» narrate the lesson architecture
    instead of speaking in a stable module voice.
  fix: Replace meta-commentary with direct explanation of usage and register, without
    referring to 'the dialogue below', 'the pair', or what the exercise is doing.
tool_evidence:
- tool: search_textbooks
  query: '{''мене'',''звати''}'
  result: Grade 5 textbook material for first introductions gives «Радий / рада знайомству»
    and «Дуже приємно познайомитися», supporting a rewrite of the first-meeting dialogue.
- tool: search_textbooks
  query: '{''рада'',''бачити''}'
  result: Grade 6 textbook scenario explicitly frames «Рада тебе бачити!» as meeting
    a friend you have not seen for a while, not as the default formula for first contact.
- tool: search_textbooks
  query: '{''добрий'',''день''}'
  result: School dialogue examples show clean formal exchanges like «Добрий день,
    Мирославо Михайлівно! — Добрий день, Петре!», which is more natural for the teacher-student
    setting than the current mixed greeting/small-talk pattern.
summary: 'The main phonetics prose is acceptable, but section 4 does not pass a native-speech
  review yet: the first-meeting dialogue uses a reunion formula, the classroom exchange
  is pragmatically stiff, and the section contains auto-fail meta-pedagogical narration.'
