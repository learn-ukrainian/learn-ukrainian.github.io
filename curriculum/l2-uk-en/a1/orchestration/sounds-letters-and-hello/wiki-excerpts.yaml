    score: 35
    excerpt: '# Педагогіка A1: Sounds Letters And Hello ## Методичний підхід В основі
      навчання української фонетики на початковому рівні лежить принцип "від звука
      до букви". Учень спочатку вчиться чути, розрізняти й правильно вимовляти звуки,
      і лише потім асоціює їх із графічними символами — літерами [S4]. Українські
      методисти наголошують, що звук є "живою плоттю і кров''ю" мови, її найменшою
      одиницею [S1, S4]. Тому перші уроки мають бути зосереджені на слуханні та імітації
      звуків довкілля (шум дощу, скрип дверей), поступово...'
