    excerpt: '# Педагогіка A1: How Many ## Методичний підхід В українській педагогічній
      практиці вивчення чисел починається з розмежування двох фундаментальних питань:
      **«скільки?»** для позначення кількості та **«котрий?»** для позначення порядку
      [S1]. Цей підхід, закладений у підручниках для 1–2 класів, є основою для подальшого
      розуміння кількісних та порядкових числівників [S3]. На рівні А1 головна мета
      — не глибокий граматичний аналіз, а функціональне використання чисел у простих
      комунікативних ситуаціях: назвати вік, ціну...'
