    score: 35
    excerpt: '# Педагогіка A1: Checkpoint First Contact ## Методичний підхід Перший
      контакт учня з українською мовою має бути одночасно комунікативним і структурно
      обґрунтованим. Українська педагогічна традиція, навіть у 1-2 класах, одразу
      розрізняє мову як систему (мова) та мовлення як її використання (мовлення),
      а також його усну та писемну форми [S5]. На відміну від суто імерсивних підходів,
      українські підручники змалечку вводять базові аналітичні категорії, що стає
      фундаментом для свідомого засвоєння граматики. Ключовий...'
