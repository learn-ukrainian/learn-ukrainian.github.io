    запам''ята́ти.` and similarly expanded paragraphs across all core sections'
  issue: The module massively exceeds the word budget; the prose keeps restating already-covered
    beats instead of staying at A1 teaching density.
  fix: Compress each explanatory paragraph back to the contract beat, keeping one
    clear explanation plus 1-2 examples.
- dimension: LINGUISTIC ACCURACY
  severity: major
  location: '`Усі дета́лі — в M02.` / `На осно́ві епізо́ду 1 ULP Анни Огойко.` / `почина́ючи
    з M08.`'
  issue: Latin-script meta labels inside Ukrainian prose violate the canonical Ukrainian-only
    register required by this review mode.
  fix: Replace them with plain Ukrainian references such as `у наступному модулі`,
    `у першому епізоді`, `у наступних модулях`.
