  location: '`## Звуки і літери (Sounds and Letters)` / `## Привіт! (Hello!)` — for
    example, “The most important distinction in Ukrainian phonetics is the difference
    between a sound and a letter.” and “Following Anna Ohoiko from the Ukrainian Lessons
    Podcast Episode 1, you can build your first conversation.”'
  issue: Two sections are over their contracted budgets. File-body counts are 351
    words for `Звуки і літери` (max 330) and 288 words for `Привіт!` (max 275).
  fix: Trim redundant explanatory sentences in those two sections without removing
    any contracted beats or required vocabulary.
- dimension: Exercise quality
  severity: major
  location: '`<!-- INJECT_ACTIVITY: group-sort-vowels-consonants -->`, `<!-- INJECT_ACTIVITY:
    letter-grid-alphabet -->`, `<!-- INJECT_ACTIVITY: fill-in-greetings -->`'
  issue: Marker order violates the contracted `activity_obligations`. The third required
    type is `fill-in`, but the module places `group-sort` and `letter-grid` before
    it.
  fix: Move `group-sort` and `letter-grid` so the prose marker sequence becomes `quiz
    -> match-up -> fill-in -> group-sort -> letter-grid -> watch-and-repeat`.
