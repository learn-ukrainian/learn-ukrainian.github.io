findings:
- dimension: Linguistic accuracy
  severity: major
  location: '`На відміну від англіиськоі мови`, `Кожен голоснии звук`, `в англіиськіи
    мові`'
  issue: OCR/Generation typos confusing 'й/и' and 'ї/і'.
  fix: 'Replace with correct forms: `англійської`, `голосний`, `англійській`.'
- dimension: Linguistic accuracy
  severity: minor
  location: '`Справа в тому, що деякі літери...`'
  issue: '"Справа в тому" is a Russianism (дело в том).'
  fix: Replace with "Річ у тім".
- dimension: Linguistic accuracy
  severity: minor
  location: '`Давайте спробуємо зробити`, `Давайте подивимося`, `Давайте зробимо`'
  issue: Use of "Давайте" + verb is a calque. The Ukrainian imperative form should
    be used.
  fix: Change to `Спробуймо зробити`, `Погляньмо`, `Зробімо`.
- dimension: Pedagogical quality
  severity: major
  location: '`Порівняйте: «мило» ( soap ) та «міло» ( swept ).`'
  issue: Contains English translations in prose (violates rule) and uses "міло", which
    is not a valid Ukrainian word (swept is "мело").
  fix: 'Replace with a valid minimal pair without English translations, e.g., `Порівняйте:
    «лис» та «ліс».`'
- dimension: Pedagogical quality
  severity: major
  location: '`«стан» ( condition ) та «стань» ( stand up! )`, `«Добре» ( fine ), «Чудово»
    ( great ) або «Нормально» ( okay ).`, `схожий на англійське «garden»`, `(як «k»
    у слові «know»)`'
  issue: English scaffolding inside Ukrainian prose.
  fix: Remove the English words and parentheses entirely.
- dimension: Exercise quality
  severity: minor
  location: Activity markers
  issue: Markers do not match the exact names from `activity_obligations` and one
    is duplicated.
  fix: Rename to exact types (`quiz`, `watch-and-repeat`, `fill-in`) and remove the
    duplicate `fill-in` from the "Голосні звуки" section.
