round: 2
scores:
- dimension: 1
  name: Plan adherence
  score: 6
  evidence: 'All four planned H2 sections are present and the module cites **Вашуленко
    Grade 3, p.131** and **Пономарова Grade 3, p.98**, but the plan grammar includes
    `який/яка/яке/які` and `які` appears 0 times '
- dimension: 2
  name: Linguistic accuracy
  score: 8
  evidence: The Ukrainian examples themselves are morphologically correct, but the
    caution box gives a factually wrong rule for `а` vs `але`.
- dimension: 3
  name: Pedagogical quality
  score: 7
  evidence: The module has a usable present-explain-practice flow and many examples,
    but it under-teaches the planned paradigm by omitting `які`, and it gives learners
    an incorrect contrast rule.
- dimension: 4
  name: Vocabulary coverage
  score: 9
  evidence: Required vocabulary appears in prose (`великий, маленький, новий, старий,
    гарний, чистий, дорогий, дешевий`), and recommended vocabulary also appears (`поганий,
    брудний, світлий, темний, а, але`).
- dimension: 5
  name: Exercise quality
  score: 9
  evidence: Four markers are present for four planned activities, and each marker
    sits after the relevant teaching section.
- dimension: 6
  name: Engagement & tone
  score: 9
  evidence: The tone is teacherly and concrete, with usable examples like `Моя кімната
    велика і світла.` and `Вікно велике і чисте.`; it avoids gamified/corporate framing.
- dimension: 7
  name: Structural integrity
  score: 5
  evidence: Headings are clean and ordered correctly, but the pipeline word count
    is **1029**, below the **1200** target.
- dimension: 8
  name: Cultural accuracy
  score: 10
  evidence: The module presents Ukrainian on its own terms and uses Ukrainian school-textbook
    references without Russia-centric framing.
- dimension: 9
  name: Dialogue & conversation quality
  score: 6
  evidence: The dialogues have named speakers and clear turns, but dialogue 2 is thin
    and misses the plan’s specified weekend book-fair situation.
