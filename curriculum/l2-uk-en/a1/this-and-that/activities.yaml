---
inline:
  - id: act-1
    type: quiz
    title: Цей, ця чи це?
    instruction: Choose the near pointing word for the noun.
    items:
      - prompt: стіл
        options:
          - text: цей стіл
            correct: true
          - text: ця стіл
            correct: false
          - text: це стіл
            correct: false
        explanation: Стіл is masculine, so use цей.
      - prompt: книга
        options:
          - text: ця книга
            correct: true
          - text: цей книга
            correct: false
          - text: це книга
            correct: false
        explanation: Книга is feminine, so use ця.
      - prompt: вікно
        options:
          - text: це вікно
            correct: true
          - text: цей вікно
            correct: false
          - text: ця вікно
            correct: false
        explanation: Вікно is neuter, so use це.
      - prompt: радіо
        options:
          - text: це радіо
            correct: true
          - text: цей радіо
            correct: false
          - text: ця радіо
            correct: false
        explanation: Радіо works like a neuter noun here, so use це.
      - prompt: телефон
        options:
          - text: цей телефон
            correct: true
          - text: ця телефон
            correct: false
          - text: це телефон
            correct: false
        explanation: Телефон is masculine, so use цей.
      - prompt: сумка
        options:
          - text: ця сумка
            correct: true
          - text: цей сумка
            correct: false
          - text: це сумка
            correct: false
        explanation: Сумка is feminine, so use ця.
      - prompt: рюкзак
        options:
          - text: цей рюкзак
            correct: true
          - text: ця рюкзак
            correct: false
          - text: це рюкзак
            correct: false
        explanation: Рюкзак is masculine, so use цей.
      - prompt: дерево
        options:
          - text: це дерево
            correct: true
          - text: цей дерево
            correct: false
          - text: ця дерево
            correct: false
        explanation: Дерево is neuter, so use це.
  - id: act-2
    type: fill-in
    title: Ця чи та?
    instruction: Choose the pointing word that completes the contrast.
    items:
      - sentence: ___ книга нова, а та — стара.
        answer: Ця
        options:
          - Ця
          - Цей
          - Це
        explanation: Книга is feminine and near, so use ця.
      - sentence: Ця книга нова, а ___ — стара.
        answer: та
        options:
          - та
          - той
          - те
        explanation: Та points to a farther feminine noun.
      - sentence: ___ сумка червона, а та — синя.
        answer: Ця
        options:
          - Ця
          - Цей
          - Це
        explanation: Сумка is feminine and near.
      - sentence: Ця сумка червона, а ___ — синя.
        answer: та
        options:
          - та
          - той
          - те
        explanation: Та is the far feminine form.
      - sentence: ___ стіл новий, а той — старий.
        answer: Цей
        options:
          - Цей
          - Ця
          - Це
        explanation: Стіл is masculine and near.
      - sentence: Цей стіл новий, а ___ — старий.
        answer: той
        options:
          - той
          - та
          - те
        explanation: Той is the far masculine form.
      - sentence: ___ вікно велике, а те — маленьке.
        answer: Це
        options:
          - Це
          - Цей
          - Ця
        explanation: Вікно is neuter and near.
      - sentence: Це вікно велике, а ___ — маленьке.
        answer: те
        options:
          - те
          - той
          - та
        explanation: Те is the far neuter form.
  - id: act-3
    type: match-up
    title: Однаковий рід
    instruction: Match the pointing phrase with the familiar matching pattern.
    pairs:
      - left: цей стіл
        right: мій стіл / який стіл?
      - left: ця книга
        right: моя книга / яка книга?
      - left: це вікно
        right: моє вікно / яке вікно?
      - left: ці ручки
        right: мої ручки / які ручки?
      - left: цей телефон
        right: мій телефон / який телефон?
      - left: ця сумка
        right: моя сумка / яка сумка?
  - id: act-4
    type: quiz
    title: Той, та, те чи ті?
    instruction: Choose the far pointing phrase.
    items:
      - prompt: that table over there
        options:
          - text: той стіл
            correct: true
          - text: цей стіл
            correct: false
          - text: та стіл
            correct: false
        explanation: Стіл is masculine, and far gives той.
      - prompt: that book over there
        options:
          - text: та книга
            correct: true
          - text: той книга
            correct: false
          - text: ця книга
            correct: false
        explanation: Книга is feminine, and far gives та.
      - prompt: that window over there
        options:
          - text: те вікно
            correct: true
          - text: той вікно
            correct: false
          - text: це вікно
            correct: false
        explanation: Вікно is neuter, and far gives те.
      - prompt: those pens over there
        options:
          - text: ті ручки
            correct: true
          - text: та ручки
            correct: false
          - text: ці ручки
            correct: false
        explanation: Plural far things use ті.
      - prompt: that phone over there
        options:
          - text: той телефон
            correct: true
          - text: та телефон
            correct: false
          - text: цей телефон
            correct: false
        explanation: Телефон is masculine, and far gives той.
      - prompt: that bag over there
        options:
          - text: та сумка
            correct: true
          - text: той сумка
            correct: false
          - text: ця сумка
            correct: false
        explanation: Сумка is feminine, and far gives та.
  - id: act-5
    type: quiz
    title: L2-пастки
    instruction: Choose the repaired Ukrainian sentence or the clearer variant.
    items:
      - prompt: 'Fix the sentence: Це є цікава книга.'
        options:
          - text: Це цікава книга.
            correct: true
          - text: Це є цікава книга.
            correct: false
          - text: Цей цікава книга.
            correct: false
        explanation: In this present-tense sentence, drop є.
      - prompt: 'Fix the sentence: Я хочу купити цей сумку.'
        options:
          - text: Я хочу купити цю сумку.
            correct: true
          - text: Я хочу купити цей сумку.
            correct: false
          - text: Я хочу купити це сумку.
            correct: false
        explanation: Treat цю сумку as the safe buying chunk.
      - prompt: 'Fix the sentence: Ця біль у спині сильна.'
        options:
          - text: Цей біль у спині сильний.
            correct: true
          - text: Ця біль у спині сильна.
            correct: false
          - text: Це біль у спині сильне.
            correct: false
        explanation: Біль is masculine, so use цей and сильний.
      - prompt: 'Fix the code-switching: Что это? — Это стіл.'
        options:
          - text: Що це? — Це стіл.
            correct: true
          - text: Что это? — Это стіл.
            correct: false
          - text: Що этот? — Этот стіл.
            correct: false
        explanation: Keep the whole question and answer in Ukrainian.
      - prompt: Choose the unambiguous variant.
        options:
          - text: У кімнаті є та книга і ручка.
            correct: true
          - text: У кімнаті є та книга та ручка.
            correct: false
          - text: У кімнаті є ця книга ця ручка.
            correct: false
        explanation: Use і for the list when та already means that.
workbook:
  - type: quiz
    title: Чіткий вибір із «чи»
    instruction: Choose the clear question or answer.
    items:
      - prompt: Which table, this one or that one?
        options:
          - text: Який стіл — цей чи той?
            correct: true
          - text: Яка стіл — ця чи та?
            correct: false
          - text: Яке стіл — це чи те?
            correct: false
        explanation: Стіл is masculine, so use який, цей, той.
      - prompt: Which bag, this red one or that blue one?
        options:
          - text: Яка сумка — ця червона чи та синя?
            correct: true
          - text: Який сумка — цей червоний чи той синій?
            correct: false
          - text: Яке сумка — це червоне чи те синє?
            correct: false
        explanation: Сумка is feminine, so use яка, ця, та.
      - prompt: Which window, this big one or that small one?
        options:
          - text: Яке вікно — це велике чи те маленьке?
            correct: true
          - text: Яка вікно — ця велика чи та маленька?
            correct: false
          - text: Який вікно — цей великий чи той маленький?
            correct: false
        explanation: Вікно is neuter, so use яке, це, те.
      - prompt: Which pens, these blue ones or those green ones?
        options:
          - text: Які ручки — ці сині чи ті зелені?
            correct: true
          - text: Яка ручки — ця синя чи та зелена?
            correct: false
          - text: Який ручки — цей синій чи той зелений?
            correct: false
        explanation: Ручки is plural, so use які, ці, ті.
      - prompt: Make the list clearer.
        options:
          - text: У кімнаті є та книга і ручка.
            correct: true
          - text: У кімнаті є та книга та ручка.
            correct: false
          - text: У кімнаті є ця книга ця ручка.
            correct: false
        explanation: Use і for the list when та already means that.
      - prompt: Which phone, this one or that one?
        options:
          - text: Який телефон — цей чи той?
            correct: true
          - text: Яка телефон — ця чи та?
            correct: false
          - text: Яке телефон — це чи те?
            correct: false
        explanation: Телефон is masculine.
  - type: fill-in
    title: Корисні фрази
    instruction: Choose the safe A1 chunk.
    items:
      - sentence: Я хочу ___ книгу.
        answer: цю
        options:
          - цю
          - цей
          - це
        explanation: Treat цю книгу as a buying chunk for now.
      - sentence: Я хочу ___ сумку.
        answer: цю
        options:
          - цю
          - цей
          - це
        explanation: Сумка is feminine, so the buying chunk uses цю.
      - sentence: ___ книга цікава.
        answer: Ця
        options:
          - Ця
          - Це
          - Цей
        explanation: Before a feminine noun, use ця.
      - sentence: ___ мій стіл.
        answer: Це
        options:
          - Це
          - Це є
          - Цей є
        explanation: Це мій стіл is the natural sentence.
      - sentence: ___ ця книга тут.
        answer: Ось
        options:
          - Ось
          - Там
          - Ті
        explanation: Ось points to something here.
      - sentence: Той стіл ___.
        answer: там
        options:
          - там
          - ця
          - ці
        explanation: Там means there.
      - sentence: ___ ручки сині.
        answer: Ці
        options:
          - Ці
          - Цей
          - Ця
        explanation: Plural near things use ці.
      - sentence: ___ телефони чорні.
        answer: Ті
        options:
          - Ті
          - Той
          - Та
        explanation: Plural far things use ті.
  - type: error-correction
    title: Виправ демонстративні пастки
    instruction: Read the learner trap and choose the repaired Ukrainian chunk.
    items:
      - sentence: Це є цікава книга
        error: Це є цікава книга
        answer: Це цікава книга
        options:
          - Це цікава книга
          - Цей цікава книга
          - Це є цікава книга
        explanation: Drop є in this present-tense sentence.
      - sentence: Я хочу купити цей сумку
        error: Я хочу купити цей сумку
        answer: Я хочу купити цю сумку
        options:
          - Я хочу купити цю сумку
          - Я хочу купити цей сумку
          - Я хочу купити це сумку
        explanation: Use the safe chunk цю сумку.
      - sentence: Ця біль у спині сильна
        error: Ця біль у спині сильна
        answer: Цей біль у спині сильний
        options:
          - Цей біль у спині сильний
          - Ця біль у спині сильна
          - Це біль у спині сильне
        explanation: Біль is masculine.
      - sentence: Что это? — Это стіл
        error: Что это? — Это стіл
        answer: Що це? — Це стіл
        options:
          - Що це? — Це стіл
          - Что это? — Это стіл
          - Що этот? — Этот стіл
        explanation: Keep the whole sentence in Ukrainian.
      - sentence: У кімнаті є та книга та ручка
        error: У кімнаті є та книга та ручка
        answer: У кімнаті є та книга і ручка
        options:
          - У кімнаті є та книга і ручка
          - У кімнаті є та книга та ручка
          - У кімнаті є ця книга ця ручка
        explanation: This is a style repair for clarity, not a grammar ban.
