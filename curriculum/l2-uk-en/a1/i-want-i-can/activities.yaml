---
inline:
  - id: act-1
    type: fill-in
    title: Форми хотіти
    instruction: Choose the form of хотіти that fits the person.
    items:
      - sentence: Я ___ читати.
        answer: хочу
        options:
          - хочу
          - хочеш
          - хоче
        explanation: Я хочу.
      - sentence: Ти ___ гуляти?
        answer: хочеш
        options:
          - хочеш
          - хочу
          - хочемо
        explanation: Ти хочеш.
      - sentence: Вона ___ каву.
        answer: хоче
        options:
          - хоче
          - хочуть
          - хочете
        explanation: Вона хоче.
      - sentence: Ми ___ піти.
        answer: хочемо
        options:
          - хочемо
          - хочете
          - хочуть
        explanation: Ми хочемо.
      - sentence: Ви ___ каву?
        answer: хочете
        options:
          - хочете
          - хочемо
          - хоче
        explanation: Ви хочете.
      - sentence: Вони ___ працювати.
        answer: хочуть
        options:
          - хочуть
          - хоче
          - хочеш
        explanation: Вони хочуть.
      - sentence: Оля і Денис ___ піти в кіно.
        answer: хочуть
        options:
          - хочуть
          - хочете
          - хочеш
        explanation: Two people are вони, so use хочуть.
      - sentence: Я не ___ їсти.
        answer: хочу
        options:
          - хочу
          - хоче
          - хочуть
        explanation: Negation does not change the я form.
      - sentence: Денисе, ти ___ каву?
        answer: хочеш
        options:
          - хочеш
          - хочете
          - хочемо
        explanation: Денисе is one person addressed as ти, so use хочеш.
  - id: act-2
    type: quiz
    title: Хочу, можу чи мушу?
    instruction: Choose the line that fits the situation.
    items:
      - prompt: You want to read.
        options:
          - text: Я хочу читати.
            correct: true
          - text: Я можу читати.
            correct: false
          - text: Я мушу читати.
            correct: false
        explanation: Desire uses хочу.
      - prompt: You are able to help.
        options:
          - text: Я можу допомогти.
            correct: true
          - text: Я хочу допомогти.
            correct: false
          - text: Я мушу допомогти.
            correct: false
        explanation: Ability uses можу.
      - prompt: You have to work.
        options:
          - text: Я мушу працювати.
            correct: true
          - text: Я хочу працювати.
            correct: false
          - text: Я можу працювати.
            correct: false
        explanation: Obligation uses мушу.
      - prompt: You cannot go today.
        options:
          - text: Сьогодні я не можу піти.
            correct: true
          - text: Сьогодні я не хочу піти.
            correct: false
          - text: Сьогодні я мушу піти.
            correct: false
        explanation: A practical block uses не можу.
      - prompt: Ask one friend if they want to go to the cinema.
        options:
          - text: Ти хочеш піти в кіно?
            correct: true
          - text: Ти можеш піти в кіно?
            correct: false
          - text: Ти мусиш піти в кіно?
            correct: false
        explanation: The question asks about desire.
      - prompt: Ask politely what the server can recommend.
        options:
          - text: Що можете порадити?
            correct: true
          - text: Що хочете порадити?
            correct: false
          - text: Що мусите порадити?
            correct: false
        explanation: Polite possibility uses можете.
      - prompt: The menu word is кава. With friends, you want coffee.
        options:
          - text: Я хочу каву.
            correct: true
          - text: Я можу каву.
            correct: false
          - text: Я мушу каву.
            correct: false
        explanation: Wanting a thing uses хочу plus the object.
      - prompt: You have to study new words.
        options:
          - text: Я мушу вчити нові слова.
            correct: true
          - text: Я можу вчити нові слова.
            correct: false
          - text: Я хочу вчити нові слова.
            correct: false
        explanation: Obligation uses мушу.
  - id: act-3
    type: fill-in
    title: Доповни речення
    instruction: Choose хочу, можу, or мушу in the right form.
    items:
      - sentence: Я ___ гуляти, але не можу сьогодні.
        answer: хочу
        options:
          - хочу
          - можу
          - мушу
        explanation: The first part gives desire.
      - sentence: Я хочу піти, але не ___.
        answer: можу
        options:
          - можу
          - хочу
          - мушу
        explanation: Але не можу gives the practical block.
      - sentence: "Я не можу: я ___ працювати."
        answer: мушу
        options:
          - мушу
          - можу
          - хочу
        explanation: The reason is an obligation.
      - sentence: Оля ___ гуляти, але не може сьогодні.
        answer: хоче
        options:
          - хоче
          - може
          - мусить
        explanation: The first part gives her desire.
      - sentence: "Денис не ___ піти: він мусить працювати."
        answer: може
        options:
          - може
          - хоче
          - мусить
        explanation: Не може gives the practical block.
      - sentence: Вони хочуть гуляти, але ___ працювати.
        answer: мусять
        options:
          - мусять
          - можуть
          - хочуть
        explanation: Але marks the obligation that blocks the plan.
  - id: act-4
    type: quiz
    title: Правильне чи особливе дієслово?
    instruction: Choose the correct conjugation note.
    items:
      - prompt: хотіти
        options:
          - text: І дієвідміна, особливі форми хочу, хочеш
            correct: true
          - text: ІІ дієвідміна, як говорити
            correct: false
          - text: No present-tense forms
            correct: false
        explanation: Хотіти is treated as І дієвідміна but has special phrases.
      - prompt: могти
        options:
          - text: І дієвідміна, особливі форми можу, можеш
            correct: true
          - text: ІІ дієвідміна, як робити
            correct: false
          - text: Only an infinitive
            correct: false
        explanation: Могти changes to мож- in the active forms.
      - prompt: мусити
        options:
          - text: ІІ дієвідміна; learn я мушу
            correct: true
          - text: І дієвідміна; я мусю
            correct: false
          - text: It has no ти form
            correct: false
        explanation: Мусити follows ІІ endings, with я мушу as the key phrase.
      - prompt: читати
        options:
          - text: І дієвідміна, regular review verb
            correct: true
          - text: ІІ дієвідміна, like говорити
            correct: false
          - text: Irregular like хотіти
            correct: false
        explanation: Читати is a regular Group One review verb.
      - prompt: говорити
        options:
          - text: ІІ дієвідміна, regular review verb
            correct: true
          - text: І дієвідміна, like читати
            correct: false
          - text: Irregular like могти
            correct: false
        explanation: Говорити is a Group Two review verb from the previous module.
      - prompt: допомогти
        options:
          - text: Infinitive after можу in this lesson
            correct: true
          - text: A present-tense helper form
            correct: false
          - text: A noun object like каву
            correct: false
        explanation: In Я можу допомогти, допомогти stays in the infinitive.
