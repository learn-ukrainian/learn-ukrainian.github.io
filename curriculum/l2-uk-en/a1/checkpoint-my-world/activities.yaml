---
inline:
  - id: act-1
    type: quiz
    title: Рід і узгодження
    instruction: Choose the phrase where the adjective matches the noun.
    items:
      - prompt: стіл
        options:
          - text: великий стіл
            correct: true
          - text: велика стіл
            correct: false
          - text: велике стіл
            correct: false
        explanation: Стіл is masculine, so use великий.
      - prompt: книга
        options:
          - text: нова книга
            correct: true
          - text: новий книга
            correct: false
          - text: нове книга
            correct: false
        explanation: Книга is feminine, so use нова.
      - prompt: вікно
        options:
          - text: чисте вікно
            correct: true
          - text: чистий вікно
            correct: false
          - text: чиста вікно
            correct: false
        explanation: Вікно is neuter, so use чисте.
      - prompt: лампа
        options:
          - text: біла лампа
            correct: true
          - text: білий лампа
            correct: false
          - text: біле лампа
            correct: false
        explanation: Лампа is feminine, so use біла.
      - prompt: зошит
        options:
          - text: синій зошит
            correct: true
          - text: синя зошит
            correct: false
          - text: синє зошит
            correct: false
        explanation: Зошит is masculine, so use синій.
      - prompt: сумка
        options:
          - text: чорна сумка
            correct: true
          - text: чорний сумка
            correct: false
          - text: чорне сумка
            correct: false
        explanation: Сумка is feminine, so use чорна.
      - prompt: крісло
        options:
          - text: нове крісло
            correct: true
          - text: новий крісло
            correct: false
          - text: нова крісло
            correct: false
        explanation: Крісло is neuter, so use нове.
      - prompt: книги
        options:
          - text: нові книги
            correct: true
          - text: нова книги
            correct: false
          - text: новий книги
            correct: false
        explanation: Plural adjectives use -і.
      - prompt: ручки
        options:
          - text: червоні ручки
            correct: true
          - text: червона ручки
            correct: false
          - text: червоний ручки
            correct: false
        explanation: Ручки is plural, so use червоні.
      - prompt: вікна
        options:
          - text: чисті вікна
            correct: true
          - text: чисте вікна
            correct: false
          - text: чистий вікна
            correct: false
        explanation: Вікна is plural, so use чисті.
  - id: act-2
    type: fill-in
    title: Діалог на ринку
    instruction: Complete the shopping lines with the correct checkpoint word.
    items:
      - sentence: ___ вишиванка біла.
        answer: Ця
        options:
          - Ця
          - Цей
          - Це
        explanation: Вишиванка is feminine in this checkpoint scene.
      - sentence: ___ глечик старий.
        answer: Той
        options:
          - Той
          - Та
          - Те
        explanation: Глечик is masculine, so use той.
      - sentence: ___ намисто коштує сто гривень.
        answer: Це
        options:
          - Це
          - Ця
          - Цей
        explanation: Намисто is neuter, and це also works as "this is."
      - sentence: ___ писанки червоні.
        answer: Ці
        options:
          - Ці
          - Ця
          - Це
        explanation: Писанки is plural, so use ці.
      - sentence: Ця сумка ___.
        answer: червона
        options:
          - червона
          - червоний
          - червоне
        explanation: Сумка is feminine, so use червона.
      - sentence: Той зошит ___ двадцять гривень.
        answer: коштує
        options:
          - коштує
          - звати
          - чисте
        explanation: Коштує is the price word.
      - sentence: ___ гривень.
        answer: Двісті
        options:
          - Двісті
          - Синій
          - Моє
        explanation: Двісті гривень is the price chunk from the dialogue.
      - sentence: Один зошит коштує ___ гривень.
        answer: двадцять
        options:
          - двадцять
          - блакитний
          - моя
        explanation: The plan dialogue uses двадцять гривень for one notebook.
  - id: act-3
    type: group-sort
    title: Категорії A1.2
    instruction: Sort the recycled words into objects, colors, and numbers/prices.
    groups:
      - name: Objects
        items:
          - стіл
          - книга
          - вікно
          - лампа
      - name: Colors
        items:
          - червоний
          - синій
          - блакитний
          - жовтий
      - name: Numbers and prices
        items:
          - три
          - двадцять
          - сто
          - гривень
  - id: act-4
    type: quiz
    title: Однина чи множина
    instruction: Choose the correct plural version of the sentence.
    items:
      - prompt: Ця книга нова.
        options:
          - text: Ці книги нові.
            correct: true
          - text: Ці книга нова.
            correct: false
          - text: Ця книги нові.
            correct: false
        explanation: Книга becomes книги, and нова becomes нові.
      - prompt: Цей стіл великий.
        options:
          - text: Ці столи великі.
            correct: true
          - text: Цей столи великий.
            correct: false
          - text: Ці стіл великий.
            correct: false
        explanation: Стіл becomes столи, and великий becomes великі.
      - prompt: Це вікно чисте.
        options:
          - text: Ці вікна чисті.
            correct: true
          - text: Це вікна чисте.
            correct: false
          - text: Ці вікно чисті.
            correct: false
        explanation: Вікно becomes вікна, and чисте becomes чисті.
      - prompt: Ця ручка синя.
        options:
          - text: Ці ручки сині.
            correct: true
          - text: Ці ручка синя.
            correct: false
          - text: Ця ручки сині.
            correct: false
        explanation: Ручка becomes ручки, and синя becomes сині.
      - prompt: Та сумка чорна.
        options:
          - text: Ті сумки чорні.
            correct: true
          - text: Та сумки чорна.
            correct: false
          - text: Ті сумка чорні.
            correct: false
        explanation: Сумка becomes сумки, and чорна becomes чорні.
      - prompt: Той стілець старий.
        options:
          - text: Ті стільці старі.
            correct: true
          - text: Той стільці старий.
            correct: false
          - text: Ті стілець старі.
            correct: false
        explanation: Стілець becomes стільці, and старий becomes старі.
      - prompt: Мій зошит синій.
        options:
          - text: Мої зошити сині.
            correct: true
          - text: Мій зошити синій.
            correct: false
          - text: Мої зошит сині.
            correct: false
        explanation: Зошит becomes зошити, and синій becomes сині.
      - prompt: Яка ручка?
        options:
          - text: Які ручки?
            correct: true
          - text: Яка ручки?
            correct: false
          - text: Яке ручки?
            correct: false
        explanation: Plural descriptions use які.
workbook:
  - type: quiz
    title: Мій, моя, моє, мої
    instruction: Choose the possessive that matches the noun.
    items:
      - prompt: ___ стіл
        options:
          - text: мій стіл
            correct: true
          - text: моя стіл
            correct: false
          - text: моє стіл
            correct: false
        explanation: Стіл is masculine.
      - prompt: ___ лампа
        options:
          - text: моя лампа
            correct: true
          - text: мій лампа
            correct: false
          - text: моє лампа
            correct: false
        explanation: Лампа is feminine.
      - prompt: ___ вікно
        options:
          - text: моє вікно
            correct: true
          - text: мій вікно
            correct: false
          - text: моя вікно
            correct: false
        explanation: Вікно is neuter.
      - prompt: ___ книги
        options:
          - text: мої книги
            correct: true
          - text: моя книги
            correct: false
          - text: мій книги
            correct: false
        explanation: Книги is plural.
  - type: fill-in
    title: Опис кімнати
    instruction: Complete the room description with familiar A1.2 forms.
    items:
      - sentence: Це ___ кімната.
        answer: моя
        options:
          - моя
          - мій
          - моє
        explanation: Кімната is feminine.
      - sentence: Мій стіл ___.
        answer: великий
        options:
          - великий
          - велика
          - велике
        explanation: Стіл is masculine.
      - sentence: Моє вікно ___.
        answer: чисте
        options:
          - чисте
          - чиста
          - чистий
        explanation: Вікно is neuter.
      - sentence: Ці книги ___.
        answer: нові
        options:
          - нові
          - нова
          - новий
        explanation: Книги is plural.
      - sentence: Та сумка ___.
        answer: синя
        options:
          - синя
          - синій
          - синє
        explanation: Сумка is feminine.
      - sentence: Один зошит коштує двадцять ___.
        answer: гривень
        options:
          - гривень
          - гривня
          - книги
        explanation: Двадцять гривень is a price chunk.
  - type: group-sort
    title: Pointing words
    instruction: Sort the pointing words by number and distance.
    groups:
      - name: This / these
        items:
          - цей
          - ця
          - це
          - ці
      - name: That / those
        items:
          - той
          - та
          - те
          - ті
  - type: quiz
    title: Виправ пастки
    instruction: Choose the corrected checkpoint phrase.
    items:
      - prompt: Мій книга.
        options:
          - text: Моя книга.
            correct: true
          - text: Мій книга.
            correct: false
          - text: Моє книга.
            correct: false
        explanation: Книга is feminine.
      - prompt: Цей лампа.
        options:
          - text: Ця лампа.
            correct: true
          - text: Цей лампа.
            correct: false
          - text: Це лампа.
            correct: false
        explanation: Лампа is feminine, so use ця.
      - prompt: Великий вікно.
        options:
          - text: Велике вікно.
            correct: true
          - text: Великий вікно.
            correct: false
          - text: Велика вікно.
            correct: false
        explanation: Вікно is neuter, so use велике.
      - prompt: Ці книга.
        options:
          - text: Ці книги.
            correct: true
          - text: Ці книга.
            correct: false
          - text: Ця книги.
            correct: false
        explanation: Ці needs a plural noun.
      - prompt: Ті зошит.
        options:
          - text: Ті зошити.
            correct: true
          - text: Ті зошит.
            correct: false
          - text: Той зошити.
            correct: false
        explanation: Ті needs a plural noun.
      - prompt: Двадцять гривня.
        options:
          - text: Двадцять гривень.
            correct: true
          - text: Двадцять гривня.
            correct: false
          - text: Двадцять книги.
            correct: false
        explanation: Use the learned price chunk гривень.
