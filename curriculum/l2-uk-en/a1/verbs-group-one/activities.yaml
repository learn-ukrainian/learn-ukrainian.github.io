---
inline:
  - id: act-1
    type: fill-in
    title: Провідміняй читати
    instruction: Choose the ending that completes each Group One form.
    items:
      - sentence: Я чита__ текст.
        answer: ю
        options:
          - ю
          - єш
          - є
        explanation: Я uses читаю.
      - sentence: Ти чита__ книгу?
        answer: єш
        options:
          - єш
          - ю
          - є
        explanation: Ти uses читаєш.
      - sentence: Він чита__ текст.
        answer: є
        options:
          - є
          - ю
          - єте
        explanation: Він uses читає.
      - sentence: Вона слуха__ музику.
        answer: є
        options:
          - є
          - ю
          - ємо
        explanation: Вона uses слухає.
      - sentence: Ми чита__ текст.
        answer: ємо
        options:
          - ємо
          - єте
          - ють
        explanation: Ми uses читаємо.
      - sentence: Ви чита__?
        answer: єте
        options:
          - єте
          - ємо
          - ють
        explanation: Ви uses читаєте.
      - sentence: Вони чита__.
        answer: ють
        options:
          - ють
          - є
          - ю
        explanation: Вони uses читають.
      - sentence: Я зна__ це слово.
        answer: ю
        options:
          - ю
          - єш
          - є
        explanation: Я uses знаю.
      - sentence: Ти зна__ це слово?
        answer: єш
        options:
          - єш
          - ю
          - ємо
        explanation: Ти uses знаєш.
      - sentence: Ми зна__ текст.
        answer: ємо
        options:
          - ємо
          - єте
          - ють
        explanation: Ми uses знаємо.
  - id: act-2
    type: quiz
    title: Обери правильну форму
    instruction: Choose the verb form that fits the person.
    items:
      - prompt: Вона ___ книгу.
        options:
          - text: читає
            correct: true
          - text: читаю
            correct: false
          - text: читаєш
            correct: false
        explanation: Вона uses читає.
      - prompt: Я ___ музику.
        options:
          - text: слухаю
            correct: true
          - text: слухаєш
            correct: false
          - text: слухає
            correct: false
        explanation: Я uses слухаю.
      - prompt: Ти ___ вечерю?
        options:
          - text: готуєш
            correct: true
          - text: готую
            correct: false
          - text: готує
            correct: false
        explanation: Ти uses готуєш.
      - prompt: Ми ___ в офісі.
        options:
          - text: працюємо
            correct: true
          - text: працюєте
            correct: false
          - text: працюють
            correct: false
        explanation: Ми uses працюємо.
      - prompt: Ви ___ українську?
        options:
          - text: вивчаєте
            correct: true
          - text: вивчаємо
            correct: false
          - text: вивчають
            correct: false
        explanation: Ви uses вивчаєте.
      - prompt: Вони ___ в парку.
        options:
          - text: гуляють
            correct: true
          - text: гуляє
            correct: false
          - text: гуляю
            correct: false
        explanation: Вони uses гуляють.
      - prompt: Сашко ___ українську.
        options:
          - text: знає
            correct: true
          - text: знаю
            correct: false
          - text: знаєш
            correct: false
        explanation: Сашко is він, so use знає.
      - prompt: Я ___ вдома.
        options:
          - text: працюю
            correct: true
          - text: працюєш
            correct: false
          - text: працює
            correct: false
        explanation: Я uses працюю.
  - id: act-3
    type: match-up
    title: Особа й форма
    instruction: Match the person with the form of читати.
    pairs:
      - left: я
        right: читаю
      - left: ти
        right: читаєш
      - left: він / вона
        right: читає
      - left: ми
        right: читаємо
      - left: ви
        right: читаєте
      - left: вони
        right: читають
  - id: act-4
    type: fill-in
    title: Що ти робиш?
    instruction: Complete the short dialogue with the safe form.
    items:
      - sentence: Що ти ___?
        answer: робиш
        options:
          - робиш
          - роблю
          - робить
        explanation: Use Що ти робиш? as a ready question.
      - sentence: Я ___ музику.
        answer: слухаю
        options:
          - слухаю
          - слухаєш
          - слухає
        explanation: Я uses слухаю.
      - sentence: Вона ___ вечерю.
        answer: готує
        options:
          - готує
          - готую
          - готуєш
        explanation: Вона uses готує.
      - sentence: Де ти ___?
        answer: працюєш
        options:
          - працюєш
          - працюю
          - працює
        explanation: Ти uses працюєш.
      - sentence: Я ___ в офісі.
        answer: працюю
        options:
          - працюю
          - працюєш
          - працює
        explanation: Я uses працюю.
      - sentence: Ти ___ українську?
        answer: вивчаєш
        options:
          - вивчаєш
          - вивчаю
          - вивчає
        explanation: Ти uses вивчаєш.
