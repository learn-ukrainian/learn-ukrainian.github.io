inline:
  - id: act-1
    type: quiz
    title: В/у чи на?
    instruction: Choose the preposition that completes each static place sentence.
    items:
      - prompt: 'Олена ___ школі.'
        options:
          - text: 'в'
            correct: true
          - text: 'на'
            correct: false
          - text: 'до'
            correct: false
        explanation: В школі answers Де?
      - prompt: 'Мама ___ роботі.'
        options:
          - text: 'на'
            correct: true
          - text: 'в'
            correct: false
          - text: 'до'
            correct: false
        explanation: The common chunk is на роботі.
      - prompt: 'Максим ___ банку.'
        options:
          - text: 'у'
            correct: true
          - text: 'на'
            correct: false
          - text: 'до'
            correct: false
        explanation: Bank as a contained institution uses у банку.
      - prompt: 'Я ___ магазині.'
        options:
          - text: 'в'
            correct: true
          - text: 'на'
            correct: false
          - text: 'до'
            correct: false
        explanation: В магазині is a static place answer.
      - prompt: 'Аптека ___ вулиці.'
        options:
          - text: 'на'
            correct: true
          - text: 'в'
            correct: false
          - text: 'до'
            correct: false
        explanation: Street location uses на вулиці.
      - prompt: 'Пошта ___ площі.'
        options:
          - text: 'на'
            correct: true
          - text: 'в'
            correct: false
          - text: 'до'
            correct: false
        explanation: Square location uses на площі.
      - prompt: 'Тато ___ вокзалі.'
        options:
          - text: 'на'
            correct: true
          - text: 'в'
            correct: false
          - text: 'до'
            correct: false
        explanation: The traditional chunk is на вокзалі.
      - prompt: 'Марко ___ лікарні.'
        options:
          - text: 'у'
            correct: true
          - text: 'на'
            correct: false
          - text: 'до'
            correct: false
        explanation: 'Лікарня is treated as a contained place: у лікарні.'
      - prompt: 'Ми ___ кафе.'
        options:
          - text: 'в'
            correct: true
          - text: 'на'
            correct: false
          - text: 'до'
            correct: false
        explanation: Кафе does not change form; use the whole chunk в кафе.
      - prompt: 'Друг ___ Одесі.'
        options:
          - text: 'в'
            correct: true
          - text: 'на'
            correct: false
          - text: 'до'
            correct: false
        explanation: 'Cities use в/у plus the locative form: в Одесі.'
  - id: act-2
    type: fill-in
    title: Де?
    instruction: Choose the correct place phrase for each sentence.
    items:
      - sentence: 'Олена ___ (школа).'
        answer: 'в школі'
        explanation: Школа changes to школі after в.
      - sentence: 'Тарас ___ (робота).'
        answer: 'на роботі'
        explanation: The common chunk is на роботі.
      - sentence: 'Максим ___ (банк).'
        answer: 'у банку'
        explanation: Bank as a contained institution uses у банку.
      - sentence: 'Я ___ (магазин).'
        answer: 'в магазині'
        explanation: Static location uses the locative form магазині.
      - sentence: 'Аптека ___ (вулиця).'
        answer: 'на вулиці'
        explanation: Street location uses на вулиці.
      - sentence: 'Ми ___ (місто).'
        answer: 'у місті'
        explanation: Static city/town location is у місті.
      - sentence: 'Софія ___ (лікарня).'
        answer: 'у лікарні'
        explanation: Лікарня changes to лікарні after у.
      - sentence: 'Я живу ___ (Київ).'
        answer: 'у Києві'
        explanation: 'Cities use в/у plus locative: у Києві.'
  - id: act-3
    type: match-up
    title: Називний -> місцевий
    instruction: Match each dictionary form with the A1 place phrase.
    pairs:
      - left: 'школа'
        right: 'в школі'
      - left: 'робота'
        right: 'на роботі'
      - left: 'банк'
        right: 'у банку'
      - left: 'магазин'
        right: 'у магазині'
      - left: 'вулиця'
        right: 'на вулиці'
      - left: 'місто'
        right: 'у місті'
      - left: 'пошта'
        right: 'на пошті'
      - left: 'Київ'
        right: 'у Києві'
  - id: act-4
    type: quiz
    title: Де це?
    instruction: Choose the correct locative place answer.
    items:
      - prompt: 'Де Олена?'
        options:
          - text: 'Вона в школі.'
            correct: true
          - text: 'Вона в школу.'
            correct: false
          - text: 'Вона на школа.'
            correct: false
        explanation: В школі answers Де?
      - prompt: 'Де Тарас?'
        options:
          - text: 'Він на роботі.'
            correct: true
          - text: 'Він на роботу.'
            correct: false
          - text: 'Він в робота.'
            correct: false
        explanation: На роботі is the static place chunk.
      - prompt: 'Де Максим?'
        options:
          - text: 'Він у банку.'
            correct: true
          - text: 'Він у банк.'
            correct: false
          - text: 'Він на банку.'
            correct: false
        explanation: У банку answers Де?
      - prompt: 'Де книга?'
        options:
          - text: 'Книга на столі.'
            correct: true
          - text: 'Книга на стіл.'
            correct: false
          - text: 'Книга столі.'
            correct: false
        explanation: Ukrainian locative place phrases normally need a preposition.
      - prompt: 'Де Марко живе?'
        options:
          - text: 'Він живе у Києві.'
            correct: true
          - text: 'Він живе в Київ.'
            correct: false
          - text: 'Він живе у Київ.'
            correct: false
        explanation: Static city location uses у Києві.
      - prompt: 'Де пошта?'
        options:
          - text: 'Пошта на площі.'
            correct: true
          - text: 'Пошта в площу.'
            correct: false
          - text: 'Пошта на площа.'
            correct: false
        explanation: Площа changes to площі after на.
workbook:
  - type: order
    title: Build the neighbor note
    instruction: Put the note in an order that moves from greeting to places to personal context.
    is_ukrainian: true
    items:
      - 'Добрий день! Де банк?'
      - 'Банк у центрі, біля пошти.'
      - 'Пошта на площі.'
      - 'Я працюю в офісі.'
      - 'Моя сестра вчиться в школі.'
      - 'Ми живемо в Україні, у Києві.'
    correct_order: [0, 1, 2, 3, 4, 5]
  - type: odd-one-out
    title: Which question fits?
    instruction: Choose the line that does not match the question pattern.
    items:
      - words:
          - 'Мама на роботі.'
          - 'Оксана гуляє у парку.'
          - 'Банк у центрі.'
          - 'Він іде в школу.'
        answer: 'Він іде в школу.'
        explanation: The first three answer Де?; іде в школу answers Куди?
      - words:
          - 'Я їду в місто.'
          - 'Він іде в школу.'
          - 'Ми йдемо на пошту.'
          - 'Книга на столі.'
        answer: 'Книга на столі.'
        explanation: The first three show direction; на столі is static location.
      - words:
          - 'у Києві'
          - 'у Львові'
          - 'в Одесі'
          - 'у Київ'
        answer: 'у Київ'
        explanation: У Київ is direction; static city location is у Києві.
  - type: true-false
    title: Locative guardrails
    instruction: Decide whether the statement matches this lesson.
    items:
      - statement: 'Місцевий відмінок usually answers Де?'
        answer: true
        explanation: This module uses locative for static place.
      - statement: 'The helper questions are на/у кому? на/у чому?'
        answer: true
        explanation: These are the A1 helper questions for the locative case.
      - statement: 'Static city location can use direction forms such as у Київ.'
        answer: false
        explanation: 'Use в/у plus locative with cities: у Києві, у Львові.'
      - statement: 'The respectful country phrase is в Україні.'
        answer: true
        explanation: Use в Україні for Ukraine.
      - statement: 'Я живу в Київ is a finished A1 locative sentence.'
        answer: false
        explanation: 'The place form is Києві: Я живу в Києві.'
      - statement: 'На пошті is a common traditional chunk.'
        answer: true
        explanation: Learn пошта together with на пошті.
  - type: error-correction
    title: Repair locative forms
    instruction: Choose the natural Ukrainian repair for each learner sentence.
    items:
      - sentence: 'Я живу в Київ.'
        error: 'в Київ'
        correction: 'Я живу в Києві.'
        options:
          - 'Я живу в Києві.'
          - 'Я живу в Київ.'
          - 'Я живу у Київ.'
        explanation: Static city location needs the locative form Києві.
      - sentence: 'Книга столі.'
        error: 'столі'
        correction: 'Книга на столі.'
        options:
          - 'Книга на столі.'
          - 'Книга столі.'
          - 'Книга в стіл.'
        explanation: Ukrainian locative place phrases normally need a preposition.
      - sentence: 'Я в пошті.'
        error: 'в пошті'
        correction: 'Я на пошті.'
        options:
          - 'Я на пошті.'
          - 'Я в пошті.'
          - 'Я у пошта.'
        explanation: The common institution chunk is на пошті.
      - sentence: 'Він іде в школі.'
        error: 'в школі'
        correction: 'Він іде в школу.'
        options:
          - 'Він іде в школу.'
          - 'Він іде в школі.'
          - 'Він є в школі.'
        explanation: Іде asks Куди?, so this is direction, not static Де?
