---
inline:
  - id: act-1
    type: quiz
    title: Обери час на годиннику
    instruction: Обери безпечну відповідь на запитання "Котра година?"
    items:
      - prompt: '1:00'
        options:
          - text: Перша.
            correct: true
          - text: Один година.
            correct: false
          - text: О першій.
            correct: false
        explanation: 'Котра година? asks for the clock label: перша.'
      - prompt: '2:00'
        options:
          - text: Друга.
            correct: true
          - text: Два година.
            correct: false
          - text: О другій.
            correct: false
        explanation: 'Друга is the full-hour clock answer.'
      - prompt: '3:00'
        options:
          - text: Третя.
            correct: true
          - text: Три години.
            correct: false
          - text: О третій.
            correct: false
        explanation: 'Use the feminine ordinal form for the hour.'
      - prompt: '5:00'
        options:
          - text: П'ята.
            correct: true
          - text: П'ять годин.
            correct: false
          - text: О п'ятій.
            correct: false
        explanation: "П'ята is the point on the clock; п'ять годин is duration."
      - prompt: '7:00'
        options:
          - text: Сьома.
            correct: true
          - text: Сім годин.
            correct: false
          - text: О сьомій.
            correct: false
        explanation: 'Сьома answers what time it is now.'
      - prompt: '8:00'
        options:
          - text: Восьма.
            correct: true
          - text: Вісім годин.
            correct: false
          - text: У восьмій.
            correct: false
        explanation: 'Use the feminine ordinal form for the hour.'
      - prompt: '10:00'
        options:
          - text: Десята.
            correct: true
          - text: Десять годин.
            correct: false
          - text: О десятій.
            correct: false
        explanation: 'Десята is the clock label.'
      - prompt: '11:00'
        options:
          - text: Одинадцята.
            correct: true
          - text: Об одинадцятій.
            correct: false
          - text: Одинадцять годин.
            correct: false
        explanation: 'Одинадцята answers what time it is now.'
  - id: act-2
    type: fill-in
    title: О котрій?
    instruction: Доповни речення формою часу для розкладу.
    items:
      - sentence: 'Я прокидаюся о ___.'
        answer: сьомій
        options:
          - сьомій
          - сьома
          - сім
        explanation: 'A scheduled action uses о сьомій.'
      - sentence: 'Я снідаю о ___.'
        answer: восьмій
        options:
          - восьмій
          - восьма
          - вісім
        explanation: 'О восьмій means at eight.'
      - sentence: 'Я працюю о ___.'
        answer: дев'ятій
        options:
          - дев'ятій
          - дев'ята
          - дев'ять
        explanation: "Use о дев'ятій for a schedule."
      - sentence: 'Обід о ___.'
        answer: першій
        options:
          - першій
          - перша
          - один
        explanation: 'О першій means at one.'
      - sentence: 'Зустріч о ___.'
        answer: другій
        options:
          - другій
          - друга
          - два
        explanation: 'Meetings happen о другій.'
      - sentence: 'Кава о ___.'
        answer: третій
        options:
          - третій
          - третя
          - три
        explanation: 'Use о третій for at three.'
      - sentence: 'Урок о ___.'
        answer: четвертій
        options:
          - четвертій
          - четверта
          - чотири
        explanation: 'Use о четвертій for at four.'
      - sentence: 'Фільм об ___.'
        answer: одинадцятій
        options:
          - одинадцятій
          - одинадцята
          - одинадцять
        explanation: 'Before одинадцятій, use об.'
  - id: act-3
    type: match-up
    title: Цифри й слова
    instruction: Зістав цифровий час із українським словом.
    pairs:
      - left: '1:00'
        right: перша
      - left: '3:00'
        right: третя
      - left: '7:00'
        right: сьома
      - left: '8:00'
        right: восьма
      - left: '9:00'
        right: дев'ята
      - left: '12:00'
        right: дванадцята
  - id: act-4
    type: quiz
    title: Ранку, дня чи вечора?
    instruction: Обери частину доби для речення.
    items:
      - prompt: 'Я прокидаюся о сьомій ___.'
        options:
          - text: ранку
            correct: true
          - text: дня
            correct: false
          - text: вечора
            correct: false
        explanation: 'Waking up at seven is usually о сьомій ранку.'
      - prompt: 'Я снідаю о восьмій ___.'
        options:
          - text: ранку
            correct: true
          - text: дня
            correct: false
          - text: ночі
            correct: false
        explanation: 'Breakfast is normally о восьмій ранку.'
      - prompt: 'Я обідаю о першій ___.'
        options:
          - text: дня
            correct: true
          - text: ранку
            correct: false
          - text: ночі
            correct: false
        explanation: 'О першій дня means at one in the afternoon.'
      - prompt: 'Зустріч о третій ___.'
        options:
          - text: дня
            correct: true
          - text: ранку
            correct: false
          - text: ночі
            correct: false
        explanation: 'О третій дня is a simple afternoon meeting time.'
      - prompt: 'Я вечеряю о сьомій ___.'
        options:
          - text: вечора
            correct: true
          - text: ранку
            correct: false
          - text: дня
            correct: false
        explanation: 'Dinner is normally о сьомій вечора.'
      - prompt: 'Фільм об одинадцятій ___.'
        options:
          - text: вечора
            correct: true
          - text: ранку
            correct: false
          - text: дня
            correct: false
        explanation: 'A late film can be об одинадцятій вечора.'
