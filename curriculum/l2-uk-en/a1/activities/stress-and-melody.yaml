- type: true-false
  instruction: True or false? Read each statement about Ukrainian stress and intonation.
  items:
  - statement: Ukrainian stress always falls on the first syllable.
    correct: false
    explanation: 'Ukrainian has free stress — it can fall on any syllable. Compare:
      МАма (first), воДА (last), стоЛИця (middle).'
  - statement: The words замок (castle) and замок (lock) are spelled the same but
      stressed differently.
    correct: true
    explanation: ЗАмок means castle (stress on 1st syllable), замОК means lock (stress
      on 2nd syllable). Stress changes meaning.
  - statement: Yes/no questions in Ukrainian have rising intonation ↗.
    correct: true
    explanation: Це кава? ↗ — the voice rises because you can answer так or ні.
  - statement: The question Де метро? has rising intonation ↗.
    correct: false
    explanation: Де is a question word, so the intonation falls ↘. Only yes/no questions
      (without question words) rise.
  - statement: Stress in Ukrainian can move between different forms of the same word.
    correct: true
    explanation: рукА (hand) becomes РУки (hands) — the stress shifts from the last
      syllable to the first.
