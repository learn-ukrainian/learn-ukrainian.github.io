- id: tf-melody-rules
  type: true-false
  instruction: Are these statements about Ukrainian stress and melody true or false?
  items:
  - statement: Ukrainian stress always falls on the last syllable.
    correct: false
    explanation: Ukrainian stress is free and can fall on any syllable.
  - statement: Changing the stress can completely change the meaning of a word.
    correct: true
    explanation: For example, за́мок (castle) and замо́к (lock).
  - statement: Yes/no questions use a rising intonation (↗).
    correct: true
    explanation: Your voice must rise sharply on the key word.
  - statement: Questions starting with 'що' or 'де' always use a rising intonation.
    correct: false
    explanation: They use a falling intonation (↘) because the question word does
      the grammatical work.
  - statement: Exclamatory sentences use a strong falling intonation (↘↘).
    correct: true
    explanation: This pattern applies to enthusiastic greetings and expressions of
      strong feeling.
  - statement: In Ukrainian, an unstressed 'О' is still pronounced clearly as 'О'.
    correct: true
    explanation: Ukrainian vowels keep their core phonetic shape even when unstressed.
  title: Are these statements about Ukrainian stress and melody true or false?
