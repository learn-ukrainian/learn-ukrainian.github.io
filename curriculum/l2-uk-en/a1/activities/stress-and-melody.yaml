- id: true-false-stress
  type: true-false
  instruction: True or False?
  items:
  - statement: Ukrainian stress is always fixed on the first syllable.
    correct: false
    explanation: Ukrainian stress is free and mobile; it can fall on any syllable.
  - statement: Stress can completely change the meaning of a word in Ukrainian.
    correct: true
    explanation: Yes, for example, замок (castle) and замок (lock) mean completely
      different things.
  - statement: A question with 'що' (what) or 'де' (where) uses a rising intonation
      at the end.
    correct: false
    explanation: Questions with question words actually use a falling intonation.
  - statement: A yes/no question without a question word uses a rising intonation.
    correct: true
    explanation: Yes, like 'Це кава?' (Is this coffee?). The pitch goes up.
  - statement: Stress marks (') are always printed in everyday Ukrainian texts, menus,
      and signs.
    correct: false
    explanation: Stress marks are only used in textbooks and dictionaries for learners.
  - statement: When a word changes form (like from singular to plural), the stress
      can move to a different syllable.
    correct: true
    explanation: 'Yes, Ukrainian stress is mobile. For example: нога -> ноги.'
  title: True or False?
