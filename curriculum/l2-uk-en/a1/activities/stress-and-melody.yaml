- type: observe
  examples:
  - рукА → рУки (stress moves from last to first)
  - водА → вОди (stress moves from last to first)
  - зимА → зИми (stress moves from last to first)
  prompt: What pattern do you notice? When these words change form, where does the
    stress move?
