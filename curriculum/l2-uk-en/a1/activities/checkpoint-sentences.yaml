- type: match-up
  title: Match Preference Constructions
  instruction: Match each Ukrainian preference expression with its English meaning.
  pairs:
  - left: Мені подобається чай
    right: I like tea (it pleases me)
  - left: Я люблю чай
    right: I love tea
  - left: Я хочу чай
    right: I want tea
  - left: Їй подобається цей торт
    right: She likes this cake
  - left: Він не хоче чай
    right: He doesn't want tea
  - left: Тобі подобається моя книга?
    right: Do you like my book?
- type: quiz
  title: Integrated Dialogue Comprehension
  instruction: Read the dialogue situation and choose the correct response or missing
    line.
  items:
  - question: Someone asks you 'Звідки ти?' What are they asking?
    options:
    - text: Where are you going?
      correct: false
    - text: Where are you from?
      correct: true
    - text: Where are you?
      correct: false
    - text: Who are you?
      correct: false
    explanation: Звідки asks about origin (from where). Де asks about location. Куди
      asks about direction.
  - question: You're at a cafe and want to say 'I don't want a cake, I want tea.'
      Which is correct?
    options:
    - text: Я не хочу торт. Я хочу чай.
      correct: true
    - text: Мені не хочу торт. Мені хочу чай.
      correct: false
    - text: Я не хотіти торт. Я хотіти чай.
      correct: false
    - text: Я не хоче торт. Я хоче чай.
      correct: false
    explanation: Хотіти in 1st person singular is хочу. Negation uses не before the
      verb.
  - question: Your friend says 'Він не йде, бо він пише лист.' What does бо mean here?
    options:
    - text: but
      correct: false
    - text: and
      correct: false
    - text: because
      correct: true
    - text: or
      correct: false
    explanation: Бо means 'because' — it connects the reason. Тому що also means 'because'
      but is more formal.
  - question: Which sentence correctly introduces your female friend?
    options:
    - text: Це мій подруга
      correct: false
    - text: Це моя подруга
      correct: true
    - text: Це моє подруга
      correct: false
    - text: Це мої подруга
      correct: false
    explanation: Подруга is feminine, so the possessive must be моя (not мій, which
      is masculine).
  - question: How do you ask a yes/no question 'Are you reading?' using the particle
      чи?
    options:
    - text: Чи ти читаєш?
      correct: true
    - text: Ти чи читаєш?
      correct: false
    - text: Читаєш ти чи?
      correct: false
    - text: Що ти читаєш?
      correct: false
    explanation: The particle чи goes at the beginning of the sentence to form a yes/no
      question.
  - question: Someone points to a cake and says 'Цей торт смачний!' What gender is
      торт?
    options:
    - text: Feminine
      correct: false
    - text: Neuter
      correct: false
    - text: Masculine
      correct: true
    - text: Plural
      correct: false
    explanation: The demonstrative цей is used with masculine nouns. Торт ends in
      a consonant, which is the typical masculine pattern.
- type: fill-in
  title: Negation and Reasons
  instruction: Complete each sentence with the correct word to form negation or give
    a reason.
  items:
  - sentence: Я ___ говорю англійською.
    answer: не
    options:
    - не
    - ні
    - бо
    - чи
    explanation: Не goes directly before the verb to negate it.
  - sentence: Він не йде, ___ він пише лист.
    answer: бо
    options:
    - бо
    - де
    - що
    - чи
    explanation: Бо (because) connects the reason clause.
  - sentence: Вона ___ хоче чай.
    answer: не
    options:
    - не
    - ні
    - бо
    - де
    explanation: Не before the verb хоче creates negation.
  - sentence: Я не читаю, ___ я пишу.
    answer: тому що
    options:
    - тому що
    - куди
    - звідки
    - хто
    explanation: Тому що (because) gives the reason, same as бо but more formal.
  - sentence: ___ ти хочеш їсти?
    answer: Чи
    options:
    - Чи
    - Де
    - Що
    - Бо
    explanation: Чи at the start forms a yes/no question (Do you want to eat?).
  - sentence: Я йду в кафе, бо хочу ___.
    answer: їсти
    options:
    - їсти
    - йти
    - писати
    - читати
    explanation: Їсти (to eat) completes the reason — I'm going to the cafe because
      I want to eat.
