- type: quiz
  title: 'Possessives and Demonstratives'
  instruction: 'Choose the correct pronoun.'
  items:
    - question: 'Яке слово означає "my" (чоловічий рід)?'
      options:
        - text: 'моя'
          correct: false
        - text: 'мій'
          correct: true
        - text: 'моє'
          correct: false
        - text: 'мої'
          correct: false
      explanation: '"Мій" is the masculine form.'
    - question: 'Яке слово означає "this" (чоловічий рід)?'
      options:
        - text: 'цей'
          correct: true
        - text: 'ця'
          correct: false
        - text: 'це'
          correct: false
        - text: 'ці'
          correct: false
      explanation: '"Цей" is the masculine form.'
    - question: 'Яке слово означає "your" (чоловічий рід)?'
      options:
        - text: 'твій'
          correct: true
        - text: 'твоя'
          correct: false
        - text: 'твоє'
          correct: false
        - text: 'твої'
          correct: false
      explanation: '"Твій" is the masculine form.'
    - question: 'Яке слово означає "that" (чоловічий рід)?'
      options:
        - text: 'той'
          correct: true
        - text: 'та'
          correct: false
        - text: 'те'
          correct: false
        - text: 'ті'
          correct: false
      explanation: '"Той" is the masculine form.'
    - question: 'Як сказати "Who is this?"'
      options:
        - text: 'Що це?'
          correct: false
        - text: 'Хто це?'
          correct: true
        - text: 'Де це?'
          correct: false
        - text: 'Коли це?'
          correct: false
      explanation: '"Хто" means who.'
    - question: 'Як сказати "What is this?"'
      options:
        - text: 'Що це?'
          correct: true
        - text: 'Хто це?'
          correct: false
        - text: 'Як це?'
          correct: false
        - text: 'Чому це?'
          correct: false
      explanation: '"Що" means what.'
    - question: 'Яке українське слово означає займенник "he"?'
      options:
        - text: 'вона'
          correct: false
        - text: 'воно'
          correct: false
        - text: 'ми'
          correct: false
        - text: 'він'
          correct: true
      explanation: '"Він" means he.'
    - question: 'Яке українське слово означає займенник "they"?'
      options:
        - text: 'ми'
          correct: false
        - text: 'ви'
          correct: false
        - text: 'вони'
          correct: true
        - text: 'ти'
          correct: false
      explanation: '"Вони" means they.'

