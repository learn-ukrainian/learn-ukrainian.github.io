- type: quiz
  title: Дієвідмінювання дієслів I та II дієвідміни
  instruction: Оберіть правильну форму дієслова для кожного займенника.
  items:
    - question: Яку форму має дієслово читати для займенника першої особи я?
      explanation: Дієслово читати належить до першої дієвідміни, тому використовуємо закінчення -ю.
      options:
        - text: читаю
          correct: true
        - text: читаєш
          correct: false
        - text: читає
          correct: false
        - text: читають
          correct: false
    - question: Яке правильне закінчення має дієслово говорити для займенника вони?
      explanation: Дієслова другої дієвідміни у множині мають закінчення -ать або -ять.
      options:
        - text: говорять
          correct: true
        - text: говоруть
          correct: false
        - text: говоріть
          correct: false
        - text: говоримо
          correct: false
    - question: Яку форму має дієслово писати для займенника множини ми?
      explanation: Для займенника ми використовуємо закінчення -емо або -ємо.
      options:
        - text: пишемо
          correct: true
        - text: пишете
          correct: false
        - text: пишуть
          correct: false
        - text: пишу
          correct: false
    - question: Як правильно перекласти фразу англійською He reads на українську мову?
      explanation: Займенник він вимагає закінчення третьої особи однини -є.
      options:
        - text: Він читає
          correct: true
        - text: Він читаю
          correct: false
        - text: Він читають
          correct: false
        - text: Він читаєш
          correct: false
    - question: Яке правильне закінчення має дієслово працювати для займенника ви?
      explanation: Займенник ви завжди вимагає закінчення -ете або -єте.
      options:
        - text: працюєте
          correct: true
        - text: працюємо
          correct: false
        - text: працюють
          correct: false
        - text: працюєш
          correct: false
    - question: Який правильний переклад для короткої фрази They speak українською мовою?
      explanation: Для займенника вони дієслово говорити має форму говорять.
      options:
        - text: Вони говорять
          correct: true
        - text: Вони говоруть
          correct: false
        - text: Вони говорите
          correct: false
        - text: Вони говоримо
          correct: false
    - question: Яку форму має дієслово розуміти для займенника другої особи ти?
      explanation: Для займенника ти ми завжди використовуємо закінчення -ш.
      options:
        - text: розумієш
          correct: true
        - text: розуміє
          correct: false
        - text: розумію
          correct: false
        - text: розуміють
          correct: false
    - question: Як правильно перекласти коротке речення I write українською мовою?
      explanation: Займенник я вимагає закінчення першої особи однини -у або -ю.
      options:
        - text: Я пишу
          correct: true
        - text: Я пишеш
          correct: false
        - text: Я пише
          correct: false
        - text: Я пишемо
          correct: false

- type: fill-in
  title: Використання зворотних дієслів
  instruction: Оберіть правильну частку для зворотного дієслова.
  items:
    - sentence: Я смію____ дуже голосно щодня.
      answer: сь
      options:
        - сь
        - ся
        - ти
        - мо
      explanation: Після голосного звука завжди пишемо -сь.
    - sentence: Ти часто смієш____ на уроці української мови?
      answer: ся
      options:
        - ся
        - сь
        - те
        - ть
      explanation: Після приголосного звука завжди пишемо -ся.
    - sentence: Вона завжди смієть____ під час перегляду комедій.
      answer: ся
      options:
        - ся
        - сь
        - мо
        - ю
      explanation: Після приголосного звука ми додаємо -ся.
    - sentence: Ми часто зустрічаємо____ в кафе біля університету.
      answer: сь
      options:
        - сь
        - ся
        - те
        - ть
      explanation: Після голосного звука ми додаємо -сь.
    - sentence: Ви зустрічаєте____ з друзями кожні вихідні чи ні?
      answer: сь
      options:
        - сь
        - ся
        - мо
        - ю
      explanation: Після голосного звука ми додаємо -сь.
    - sentence: Вони зустрічають____ в центральному парку після довгої роботи.
      answer: ся
      options:
        - ся
        - сь
        - ти
        - мо
      explanation: Після приголосного звука ми додаємо -ся.

- type: match-up
  title: Питальні слова та переклад
  instruction: З'єднайте українське питання з англійським перекладом.
  pairs:
