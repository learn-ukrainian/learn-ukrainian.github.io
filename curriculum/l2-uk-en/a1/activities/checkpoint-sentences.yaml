- type: quiz
  title: 'Choose the Correct Verb Form'
  instruction: 'Select the correct ending for each pronoun.'
  items:
    - question: 'Як сказати "I read" українською?'
      options:
        - text: 'я читає'
          correct: false
        - text: 'я читаю'
          correct: true
        - text: 'я читаємо'
          correct: false
        - text: 'я читають'
          correct: false
    - question: 'Як сказати "you (informal) work"?'
      options:
        - text: 'ти працюєш'
          correct: true
        - text: 'ти працює'
          correct: false
        - text: 'ти працюю'
          correct: false
        - text: 'ти працюють'
          correct: false
    - question: 'Як правильно сказати "we speak" українською мовою?'
      options:
        - text: 'ми говориш'
          correct: false
        - text: 'ми говорить'
          correct: false
        - text: 'ми говоримо'
          correct: true
        - text: 'ми говорять'
          correct: false
    - question: 'Як правильно сказати "they know" українською мовою?'
      options:
        - text: 'вони знає'
          correct: false
        - text: 'вони знаємо'
          correct: false
        - text: 'вони знають'
          correct: true
        - text: 'вони знаю'
          correct: false
    - question: 'Як правильно сказати "she lives" українською мовою?'
      options:
        - text: 'вона живеш'
          correct: false
        - text: 'вона живуть'
          correct: false
        - text: 'вона живу'
          correct: false
        - text: 'вона живе'
          correct: true
    - question: 'Як правильно сказати "he understands" українською мовою?'
      options:
        - text: 'він розуміє'
          correct: true
        - text: 'він розуміють'
          correct: false
        - text: 'він розумію'
          correct: false
        - text: 'він розумієш'
          correct: false
    - question: 'Як сказати "you (plural/formal) write"?'
      options:
        - text: 'ви пишете'
          correct: true
        - text: 'ви пишемо'
          correct: false
        - text: 'ви пишуть'
          correct: false
        - text: 'ви пишу'
          correct: false
    - question: 'Як правильно сказати "I have" українською мовою?'
      options:
        - text: 'я має'
          correct: false
        - text: 'я маєш'
          correct: false
        - text: 'я маю'
          correct: true
        - text: 'я мають'
          correct: false

- type: match-up
  title: 'Match the Question Words'
  instruction: 'Connect the Ukrainian question words with their English meanings.'
  pairs:
    - left: 'хто'
      right: 'who'
    - left: 'що'
      right: 'what'
    - left: 'де'
      right: 'where'
    - left: 'куди'
      right: 'where to'
    - left: 'звідки'
      right: 'from where'
    - left: 'чому'
      right: 'why'
    - left: 'коли'
      right: 'when'
    - left: 'як'
      right: 'how'

- type: fill-in
  title: 'Complete the Sentences'
  instruction: 'Choose the correct pronoun to complete the sentence.'
  items:
    - sentence: '_____ читаю цікаву книгу.'
      answer: 'я'
      options:
        - 'я'
        - 'ти'
        - 'він'
        - 'ми'
    - sentence: '_____ добре знаєш це слово.'
      answer: 'ти'
      options:
        - 'я'
        - 'ти'
        - 'вона'
        - 'ви'
    - sentence: '_____ працює вдома сьогодні.'
      answer: 'він'
      options:
        - 'я'
        - 'ти'
        - 'він'
        - 'ми'
    - sentence: '_____ часто читаємо разом.'
      answer: 'ми'
      options:
        - 'я'
        - 'він'
        - 'ми'
        - 'вони'
    - sentence: '_____ розумієте ці слова.'
      answer: 'ви'
      options:
        - 'ти'
        - 'він'
        - 'ми'
        - 'ви'
    - sentence: '_____ працюють прямо зараз.'
      answer: 'вони'
      options:
        - 'я'
        - 'він'
        - 'ми'
        - 'вони'
    - sentence: 'Вона зараз не _____.'
      answer: 'працює'
      options:
        - 'працюю'
        - 'працюєш'
        - 'працює'
        - 'працюємо'
    - sentence: 'Ми зовсім не _____ часу.'
      answer: 'маємо'
      options:
        - 'маю'
        - 'маєш'
        - 'має'
        - 'маємо'

- type: true-false
  title: 'Grammar Check: Correct or Incorrect?'
  instruction: 'Decide if the Ukrainian sentences are grammatically correct.'
  items:
    - statement: 'Я не працюю сьогодні.'
      correct: true
      explanation: 'Correct. The negative particle "не" is used correctly.'
    - statement: 'Вони читаю нову книгу.'
      correct: false
      explanation: 'False. The correct form for "they" is "вони читають".'
    - statement: 'Ми працюють разом.'
      correct: false
      explanation: 'False. The correct form for "we" is "ми працюємо".'
    - statement: 'Де ти живеш?'
      correct: true
      explanation: 'Correct. The question word and verb form are correct.'
    - statement: 'Він не розумію вас.'
      correct: false
      explanation: 'False. The correct form for "he" is "він не розуміє".'
    - statement: 'Мені подобається кава.'
      correct: true
      explanation: 'Correct. The dative construction is used correctly.'
    - statement: 'Це мій сестра.'
      correct: false
      explanation: 'False. "Сестра" is feminine, so it should be "моя сестра".'
    - statement: 'Хто це? Це мій брат.'
      correct: true
      explanation: 'Correct. "Хто" is used correctly for people.'

- type: unjumble
  title: 'Build the Sentence'
  instruction: 'Put the words in the correct order.'
  items:
