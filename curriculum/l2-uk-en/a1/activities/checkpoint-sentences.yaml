      right: Where are you going?
    - left: Звідки ти?
      right: Where are you from?
    - left: Чи ти читаєш?
      right: Are you reading?

- type: quiz
  title: Вираження власних вподобань
  instruction: Оберіть правильний варіант для вираження вподобань або бажань.
  items:
    - question: Яке дієслово найкраще підходить для вираження сильної емоційної прив'язаності?
      explanation: Дієслово люблю використовується для сильних почуттів або довготривалих хобі.
      options:
        - text: Я люблю
          correct: true
        - text: Мені подобається
          correct: false
        - text: Я хочу
          correct: false
        - text: Я читаю
          correct: false
    - question: Як правильно сказати українською мовою фразу I like coffee?
      explanation: Для загальних вподобань використовуємо конструкцію Мені подобається.
      options:
        - text: Мені подобається кава
          correct: true
        - text: Я подобаю каву
          correct: false
        - text: Мені подобає каву
          correct: false
        - text: Кава любить мене
          correct: false
    - question: Яку конструкцію ми використовуємо для вираження швидкого або негайного бажання?
      explanation: Дієслово хочу ідеально підходить для безпосередніх потреб.
      options:
        - text: Я хочу
          correct: true
        - text: Я люблю
          correct: false
        - text: Мені подобається
          correct: false
        - text: Я говорю
          correct: false
    - question: Як правильно перекласти просте речення He wants to eat українською мовою?
      explanation: Дієслово хочу часто використовується разом з інфінітивом іншого дієслова.
      options:
        - text: Він хоче їсти
          correct: true
        - text: Йому подобається їсти
          correct: false
        - text: Він любить їсти
          correct: false
        - text: Йому хочеться їсти
          correct: false
    - question: Яку форму має займенник я у конструкції зі словом подобається?
      explanation: Конструкція подобається завжди вимагає використання давального відмінка займенника.
      options:
        - text: Мені
          correct: true
        - text: Я
          correct: false
        - text: Мене
          correct: false
        - text: Мною
          correct: false
    - question: Як правильно сказати українською мовою англійську фразу She loves to read?
      explanation: Для сильної прив'язаності до дії ми використовуємо дієслово любити.
      options:
        - text: Вона любить читати
          correct: true
        - text: Їй подобається читати
          correct: false
        - text: Вона хоче читати
          correct: false
        - text: Їй любить читати
          correct: false

- type: group-sort
