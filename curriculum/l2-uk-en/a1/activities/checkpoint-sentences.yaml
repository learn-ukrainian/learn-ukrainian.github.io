    - left: Вона хоче їсти
      right: бо вона дуже голодна

- type: quiz
  title: Підсумкова перевірка граматики
  instruction: Оберіть правильну відповідь на кожне граматичне запитання.
  items:
    - question: Яке питальне слово ми використовуємо, щоб запитати про напрямок руху?
      explanation: Слово куди використовується виключно для вказівки на напрямок.
      options:
        - text: куди
          correct: true
        - text: де
          correct: false
        - text: звідки
          correct: false
        - text: що
          correct: false
    - question: Як правильно утворити заперечне речення з дієсловом в українській мові?
      explanation: Частка не завжди ставиться безпосередньо перед дієсловом.
      options:
        - text: Додати частку не перед дієсловом
          correct: true
        - text: Додати частку ні після дієслова
          correct: false
        - text: Змінити закінчення дієслова
          correct: false
        - text: Додати слово немає в кінці
          correct: false
    - question: Який займенник потрібно використати для слова робота?
      explanation: Для іменників жіночого роду ми використовуємо форму моя.
      options:
        - text: моя
          correct: true
        - text: мій
          correct: false
        - text: моє
          correct: false
        - text: мої
          correct: false
    - question: Як ми перекладаємо на українську мову англійське питальне слово where?
      explanation: Англійське where як місцезнаходження перекладається як де.
      options:
        - text: де
          correct: true
        - text: куди
          correct: false
        - text: звідки
          correct: false
        - text: хто
          correct: false
    - question: Яке закінчення має дієслово писати для займенника вони?
      explanation: Дієслово писати належить до першої дієвідміни, тому у множині має закінчення уть.
      options:
        - text: пишуть
          correct: true
        - text: писать
          correct: false
        - text: пишете
          correct: false
        - text: пишемо
          correct: false
    - question: Яке з цих коротких слів ми використовуємо для пояснення причини в розмовній мові?
      explanation: Слово бо є розмовним синонімом до фрази тому що.
      options:
        - text: бо
          correct: true
        - text: але
          correct: false
        - text: і
          correct: false
        - text: та
          correct: false

