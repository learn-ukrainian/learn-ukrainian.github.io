        - мої друзі
        - те вікно

- type: unjumble
  title: Побудова правильних речень
  instruction: Розташуйте слова у правильному порядку, щоб утворити речення.
  items:
    - words:
        - Я
        - не
        - хочу
        - пити
        - каву
      answer: Я не хочу пити каву
    - words:
        - Де
        - знаходиться
        - це
        - нове
        - кафе
      answer: Де знаходиться це нове кафе
    - words:
        - Чи
        - вони
        - працюють
        - тут
        - зараз
      answer: Чи вони працюють тут зараз
    - words:
        - Мені
        - подобається
        - ця
        - цікава
        - книга
      answer: Мені подобається ця цікава книга
    - words:
        - Ми
        - не
        - говоримо
        - про
        - це
      answer: Ми не говоримо про це
    - words:
        - Твоя
        - нова
        - книга
        - лежить
        - там
      answer: Твоя нова книга лежить там

- type: fill-in
  title: Використання вказівних займенників
  instruction: Оберіть правильний вказівний займенник, який узгоджується з іменником.
  items:
    - sentence: Мені дуже подобається ________ вулиця.
      answer: ця
      options:
        - ця
        - цей
        - це
        - ці
      explanation: Слово вулиця жіночого роду, тому потрібен займенник ця.
    - sentence: Я думаю, що ________ стілець дуже зручний для роботи.
      answer: цей
      options:
        - цей
        - ця
        - це
        - ці
      explanation: Слово стілець чоловічого роду, тому використовуємо цей.
    - sentence: Я хочу купити ________ смачний шоколадний торт.
      answer: цей
      options:
        - цей
        - ця
        - це
        - ці
      explanation: Слово торт чоловічого роду, тому потрібен займенник цей.
    - sentence: ________ студенти зараз читають нову цікаву книгу.
      answer: ці
      options:
        - ці
        - цей
        - ця
        - це
      explanation: Слово студенти стоїть у множині, тому використовуємо ці.
    - sentence: А ________ місто дуже велике і неймовірно красиве.
      answer: це
      options:
        - це
        - цей
        - ця
        - ці
      explanation: Слово місто середнього роду, тому потрібен займенник це.
    - sentence: ________ кава вже холодна, я хочу замовити гарячу.
      answer: ця
      options:
        - ця
        - цей
        - це
        - ці
      explanation: Слово кава жіночого роду, тому використовуємо ця.

- type: match-up
  title: Логічні зв'язки у реченнях
  instruction: З'єднайте початок речення з відповідним закінченням, щоб пояснити причину.
  pairs:
