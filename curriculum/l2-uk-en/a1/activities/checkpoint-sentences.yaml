- type: quiz
  title: A1.2 Verb Conjugation Review
  instruction: Choose the correct verb form. Each question combines conjugation with
    other A1.2 skills.
  items:
  - question: How do you say 'They speak quietly'?
    options:
    - text: Вони говоримо тихо
      correct: false
    - text: Вони говорять тихо
      correct: true
    - text: Вони говорить тихо
      correct: false
    - text: Вони говориш тихо
      correct: false
    explanation: Говорити is II conjugation, so the 3rd person plural ending is -ять.
  - question: Which sentence correctly says 'I am writing a letter'?
    options:
    - text: Я писати лист
      correct: false
    - text: Я пишу лист
      correct: true
    - text: Я писає лист
      correct: false
    - text: Я пише лист
      correct: false
    explanation: Писати has a stem change (с → ш) in conjugated forms. The 1st person
      singular is пишу.
  - question: Your friend asks 'Що ти хочеш?' How do you answer 'I want tea'?
    options:
    - text: Я хочу чай
      correct: true
    - text: Мені хочу чай
      correct: false
    - text: Я хотіти чай
      correct: false
    - text: Я хоче чай
      correct: false
    explanation: Хотіти is irregular. The 1st person singular is хочу.
  - question: Which is the correct reflexive verb form for 'My name is Oleh'?
    options:
    - text: Я називається Олег
      correct: false
    - text: Я називаюся Олег
      correct: true
    - text: Я називаюсь Олег
      correct: false
    - text: Я називає Олег
      correct: false
    explanation: Називатися in 1st person singular is називаюся — the -ся attaches
      after the consonant ending.
  - question: 'Complete the sentence: ''Вона ___ текст.'' (She is reading a text.)'
    options:
    - text: читають
      correct: false
    - text: читаю
      correct: false
    - text: читає
      correct: true
    - text: читаєш
      correct: false
    explanation: Читати is I conjugation. 3rd person singular (вона) takes the ending
      -є.
  - question: Which sentence uses the correct 3rd person plural form?
    options:
    - text: Вони читає і пише
      correct: false
    - text: Вони читають і пишуть
      correct: true
    - text: Вони читаємо і пишемо
      correct: false
    - text: Вони читаєш і пишеш
      correct: false
    explanation: Both читати and писати are I conjugation. 3rd person plural takes
      -ють/-уть endings.
  - question: How do you say 'She likes this cake' using подобатися?
    options:
    - text: Вона подобається цей торт
      correct: false
    - text: Їй подобається цей торт
      correct: true
    - text: Вона подобає цей торт
      correct: false
    - text: Її подобається цей торт
      correct: false
    explanation: With подобатися, the person who likes changes form (їй), and the
      thing liked (торт) is the subject.
  - question: Which pair shows correct II conjugation endings?
    options:
    - text: ти говориш / вони говорять
      correct: true
    - text: ти говорите / вони говорять
      correct: false
    - text: ти говоримо / вони говорить
      correct: false
    - text: ти говорить / вони говориш
      correct: false
    explanation: II conjugation uses -иш for ти and -ять for вони.
- type: fill-in
  title: Question Words in Context
  instruction: Choose the correct question word. Think about whether the question
    asks about location, direction, origin, or something else.
  items:
  - sentence: ___ ти йдеш?
    answer: Куди
    options:
    - Де
    - Куди
    - Звідки
    - Що
    explanation: Куди asks about direction of movement (where to), not static location.
  - sentence: ___ твій друг?
    answer: Де
    options:
    - Де
    - Куди
    - Хто
    - Звідки
    explanation: Де asks about a static location (where is your friend?).
  - sentence: ___ вона?
    answer: Звідки
    options:
    - Де
    - Куди
    - Звідки
    - Що
    explanation: Звідки asks about origin (where is she from?).
  - sentence: ___ це?
    answer: Хто
    options:
    - Хто
    - Де
    - Куди
    - Звідки
    explanation: Хто asks about a person (who is that?).
  - sentence: ___ ти хочеш?
    answer: Що
    options:
    - Хто
    - Що
    - Де
    - Куди
    explanation: Що asks about a thing (what do you want?).
  - sentence: ___ ти читаєш?
    answer: Чи
    options:
    - Чи
    - Що
    - Де
    - Хто
    explanation: Чи forms a yes/no question (are you reading?).
- type: group-sort
  title: Sort Verbs by Conjugation Pattern
  instruction: Sort these verb forms into their conjugation group. Remember the key
    difference in 3rd person plural endings.
  groups:
  - name: I conjugation (-ють/-уть)
    items:
    - читають
    - пишуть
    - називаються
    - хочуть
    - йдуть
  - name: II conjugation (-ять/-ать)
    items:
    - говорять
    - подобаються
    - люблять
    - робить
    - просять
- type: true-false
  title: A1.2 Grammar Check
  instruction: Decide whether each statement about Ukrainian grammar is true or false.
  items:
  - statement: In Ukrainian, 'де' asks about direction of movement.
    correct: false
    explanation: Де asks about static location. Куди asks about direction of movement.
  - statement: The word 'не' goes directly before the verb to make a sentence negative.
    correct: true
    explanation: Correct. For example, 'Я не читаю' — не always goes right before
      the verb.
  - statement: With подобатися, the person who likes something is the grammatical
      subject of the sentence.
    correct: false
    explanation: With подобатися, the thing liked is the subject. The person changes
      form (мені, тобі, їй).
  - statement: Possessive pronouns like мій and твій must agree with the noun in gender.
    correct: true
    explanation: Correct. Мій телефон (masculine), моя книга (feminine), моє молоко
      (neuter).
  - statement: Both 'бо' and 'тому що' mean 'because' in Ukrainian.
    correct: true
    explanation: Correct. Бо is more colloquial, тому що is slightly more formal.
      Both connect a reason clause.
  - statement: The demonstrative pronoun for a feminine noun is 'цей'.
    correct: false
    explanation: Цей is masculine. The feminine demonstrative is ця (ця книга, ця
      кава).
  - statement: Писати has a stem change where с becomes ш in conjugated forms.
    correct: true
    explanation: Correct. Писати → я пишу, ти пишеш, він пише. The infinitive keeps
      с, conjugated forms use ш.
  - statement: You can form a yes/no question in Ukrainian using rising intonation
      alone, without чи.
    correct: true
    explanation: Correct. Both 'Чи ти читаєш?' and 'Ти читаєш?' (with rising intonation)
      are valid yes/no questions.
- type: fill-in
  title: Possessives and Demonstratives
  instruction: Choose the correct possessive or demonstrative pronoun that agrees
    with the noun in gender.
  items:
  - sentence: Це ___ телефон.
    answer: мій
    options:
    - мій
    - моя
    - моє
    - мої
    explanation: Телефон is masculine, so the possessive is мій.
  - sentence: Мені подобається ___ текст.
    answer: твій
    options:
    - твій
    - твоя
    - твоє
    - твої
    explanation: Текст is masculine, so the possessive is твій.
  - sentence: ___ торт смачний!
    answer: Цей
    options:
    - Цей
    - Ця
    - Це
    - Ці
    explanation: Торт is masculine, so the demonstrative is цей.
  - sentence: ___ будинок великий.
    answer: Той
    options:
    - Той
    - Та
    - Те
    - Ті
    explanation: Будинок is masculine, so the demonstrative is той.
  - sentence: Де ___ молоко?
    answer: моє
    options:
    - мій
    - моя
    - моє
    - мої
    explanation: Молоко is neuter, so the possessive is моє.
  - sentence: ___ вулиця довга.
    answer: Та
    options:
    - Той
    - Та
    - Те
    - Ті
    explanation: Вулиця is feminine, so the demonstrative is та.
