- type: quiz
  title: "Polite Requests Quiz"
  instruction: "Choose the most polite option."
  items:
    - question: "How do you politely ask a stranger to help?"
      explanation: "Use 'будь ласка' with the formal command."
      options:
        - text: "Допоможіть, будь ласка."
          correct: true
        - text: "Допоможи!"
          correct: false
        - text: "Допоможіть!"
          correct: false
        - text: "Допомогти."
          correct: false
    - question: "Which is the indirect, highly polite way to ask for something?"
      explanation: "Use 'Чи не могли б ви' + infinitive."
      options:
        - text: "Чи не могли б ви дати це?"
          correct: true
        - text: "Дайте це."
          correct: false
        - text: "Дайте, будь ласка, це."
          correct: false
        - text: "Дай це."
          correct: false
    - question: "How do you ask a friend nicely to wait?"
      explanation: "Use informal command + 'будь ласка'."
      options:
        - text: "Чекай, будь ласка."
          correct: true
        - text: "Чекайте, будь ласка."
          correct: false
        - text: "Чекати."
          correct: false
        - text: "Не чекай."
          correct: false
    - question: "How do you formally say 'Please show'?"
      explanation: "Use 'Прошу вас' + formal command or just formal command + 'будь ласка'."
      options:
        - text: "Покажіть, будь ласка."
          correct: true
        - text: "Покажи."
          correct: false
        - text: "Не покажіть."
          correct: false
        - text: "Показати."
          correct: false
    - question: "Which form is considered rude to use with café staff?"
      explanation: "Direct informal commands are rude."
      options:
        - text: "Дай каву!"
          correct: true
        - text: "Дайте, будь ласка, каву."
          correct: false
        - text: "Чи не могли б ви дати каву?"
          correct: false
        - text: "Прошу вас, дайте каву."
          correct: false
    - question: "If you want to be extremely formal, you can start with..."
      explanation: "'Прошу вас' elevates the politeness."
      options:
        - text: "Прошу вас..."
          correct: true
        - text: "Ти..."
          correct: false
        - text: "Будь ласка..."
          correct: false
        - text: "Не..."
          correct: false
    - question: "How do you politely tell a group to read?"
      explanation: "Use the plural 'ви' form with 'будь ласка'."
      options:
        - text: "Читайте, будь ласка."
          correct: true
        - text: "Читай, будь ласка."
          correct: false
        - text: "Читати, будь ласка."
          correct: false
        - text: "Читаю, будь ласка."
          correct: false
    - question: "How do you ask a friend politely to look?"
      explanation: "Use the informal 'ти' form with 'будь ласка'."
      options:
        - text: "Дивись, будь ласка."
          correct: true
        - text: "Дивіться, будь ласка."
          correct: false
        - text: "Дивитися, будь ласка."
          correct: false
        - text: "Дивлюсь, будь ласка."
          correct: false

