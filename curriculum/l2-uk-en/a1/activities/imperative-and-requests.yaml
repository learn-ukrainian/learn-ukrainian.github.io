- type: group-sort
  title: 'Sort by Form: Informal vs. Formal'
  instruction: 'Group the commands into informal (ти) and formal/plural (ви).'
  groups:
    - name: 'Informal (ти)'
      items: ['читай', 'пиши', 'скажи', 'дай', 'стій']
    - name: 'Formal/Plural (ви)'
      items: ['читайте', 'пишіть', 'скажіть', 'дайте', 'стійте']
- type: quiz
  title: 'Choose the Right Command'
  instruction: 'Select the correct imperative form for the situation.'
  items:
    - question: 'You are talking to your close friend. How do you say "Give!"?'
      explanation: 'For a close friend, we use the short "ти" form: дай.'
      options:
        - text: 'дай'
          correct: true
        - text: 'дайте'
          correct: false
        - text: 'давати'
          correct: false
        - text: 'даю'
          correct: false
    - question: 'Your teacher is speaking to the whole class. What will they say to mean "Listen!"?'
      explanation: 'For a group of people, we use the "ви" form: слухайте.'
      options:
        - text: 'слухайте'
          correct: true
        - text: 'слухай'
          correct: false
        - text: 'слухати'
          correct: false
        - text: 'слухають'
          correct: false
    - question: 'You want to tell someone formally to wait. What is the correct form?'
      explanation: 'The formal command is чекайте.'
      options:
        - text: 'чекайте'
          correct: true
        - text: 'чекай'
          correct: false
        - text: 'чекати'
          correct: false
        - text: 'чекає'
          correct: false
    - question: 'Which is the correct informal command (ти) for "to write" (писати)?'
      explanation: 'The stem changes slightly: пиши.'
      options:
        - text: 'пиши'
          correct: true
        - text: 'пишіть'
          correct: false
        - text: 'писати'
          correct: false
        - text: 'пишу'
          correct: false
    - question: 'How do you say "Say!" to a group of people?'
      explanation: 'The verb сказати changes the consonant to ж, and for "ви" we add -іть: скажіть.'
      options:
        - text: 'скажіть'
          correct: true
        - text: 'скажи'
          correct: false
        - text: 'сказати'
          correct: false
        - text: 'кажу'
          correct: false
    - question: 'You need help immediately. What do you yell to the people around you?'
      explanation: 'For a general plea to multiple people, use the plural: допоможіть.'
      options:
        - text: 'допоможіть'
          correct: true
        - text: 'допоможи'
          correct: false
        - text: 'допомогти'
          correct: false
        - text: 'допомога'
          correct: false
    - question: 'You want to tell someone to write. How do you say "Write!" to a friend?'
      explanation: 'For a friend, we use the "ти" form: пиши.'
      options:
        - text: 'пиши'
          correct: true
        - text: 'пишіть'
          correct: false
        - text: 'писати'
          correct: false
        - text: 'пишу'
          correct: false
    - question: 'The teacher says "Look at the board!". What is the formal command for "Look!"?'
      explanation: 'For a group of students, we use the formal "ви" command: дивіться.'
      options:
        - text: 'дивіться'
          correct: true
        - text: 'дивись'
          correct: false
        - text: 'дивитися'
          correct: false
        - text: 'дивлюсь'
          correct: false
- type: true-false
  title: 'True or False: Rules of Commands'
  instruction: 'Decide if the statement about the imperative mood is correct.'
  items:
    - statement: 'To make a command, you just use the infinitive form, like "Читати!".'
      correct: false
      explanation: 'In live conversation, we do not use the infinitive. We remove the -ти ending and use imperative forms like "Читай!".'
    - statement: 'The phrase "будь ласка" can be placed at the beginning, middle, or end of a sentence.'
      correct: true
      explanation: 'Yes, it is very flexible and works as a universal softener anywhere in the sentence.'
    - statement: 'If you want to tell your friend not to look, you say "Не дивись!".'
      correct: true
      explanation: 'We form the negative command by simply putting "не" before the regular imperative form.'
    - statement: 'The most polite way to ask for something is a direct command like "Дайте!".'
      correct: false
      explanation: 'The most polite way is an indirect question like "Чи не могли б ви дати?".'
    - statement: 'For the verb "стояти" (to stand), the informal command is "стій".'
      correct: true
      explanation: 'This is an irregular form that you need to memorize.'
    - statement: 'The construction "Прошу вас" is a very informal way to ask a friend for a favor.'
      correct: false
      explanation: '"Прошу вас" is a formal phrase often used in banks or service centers.'
    - statement: 'When you see "Не торкатися!" on a sign, it means the same thing as "Не чіпай!", but it is a formal rule.'
      correct: true
      explanation: 'Signs often use the infinitive for public rules, while "Не чіпай!" is for personal conversation.'
    - statement: 'To make a "ви" command from "читати", you add "-йте" to get "читайте".'
      correct: true
      explanation: 'This is the standard rule for verbs like читати.'
- type: fill-in
  title: 'Complete the Classroom Commands'
  instruction: 'Choose the missing word to complete the sentence.'
  items:
    - sentence: 'Студенти, ___ текст, будь ласка.'
      answer: 'читайте'
      options: ['читайте', 'читай', 'читати', 'читає']
    - sentence: 'Діти, ___ на дошку!'
      answer: 'дивіться'
      options: ['дивіться', 'дивись', 'дивитися', 'дивляться']
    - sentence: 'Будь ласка, ___ у зошиті.'
      answer: 'пишіть'
      options: ['пишіть', 'пиши', 'писати', 'пише']
    - sentence: '___ уважно, це важливо!'
      answer: 'слухайте'
      options: ['слухайте', 'слухай', 'слухати', 'слухає']
    - sentence: 'Павло, ___ сюди, будь ласка.'
      answer: 'іди'
      options: ['іди', 'ідіть', 'іти', 'іде']
    - sentence: 'Максиме, не ___ !'
      answer: 'біжи'
      options: ['біжи', 'біжіть', 'бігти', 'біжить']
    - sentence: 'Олено, ___ хвилинку, я зараз допоможу.'
      answer: 'зачекай'
      options: ['зачекай', 'зачекайте', 'чекати', 'чекає']
    - sentence: 'Анно, ___ , будь ласка, де банк?'
      answer: 'скажи'
      options: ['скажи', 'скажіть', 'сказати', 'каже']
