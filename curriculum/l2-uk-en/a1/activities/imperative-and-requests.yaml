  instruction: "Match each infinitive verb to its correct imperative (ти) form."
  pairs:
    - left: "читати"
      right: "читай"
    - left: "писати"
      right: "пиши"
    - left: "сказати"
      right: "скажи"
    - left: "дати"
      right: "дай"
    - left: "іти"
      right: "іди"
    - left: "слухати"
      right: "слухай"
    - left: "дивитися"
      right: "дивись"
    - left: "стояти"
      right: "стій"
    - left: "показати"
