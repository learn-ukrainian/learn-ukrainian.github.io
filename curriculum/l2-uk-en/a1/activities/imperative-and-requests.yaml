- type: quiz
  title: 'Negative Commands and Polite Requests'
  instruction: 'Select the best phrase for the situation.'
  items:
    - question: 'How do you tell a child not to touch something?'
      explanation: 'Use the negative "не" plus the "ти" command.'
      options:
        - text: 'не чіпай'
          correct: true
        - text: 'не чіпайте'
          correct: false
        - text: 'не торкатися'
          correct: false
        - text: 'не чіпати'
          correct: false
