  instruction: Оберіть правильне слово для заповнення пропуску.
- type: true-false
  title: Evaluate imperative usage correctness
  items:
  - statement: The word 'читати' is the imperative form.
    correct: false
    explanation: Читати is the infinitive form. The imperative is читай or читайте.
  - statement: You add '-те' to make a command formal or plural.
    correct: true
    explanation: Yes, 'читай' becomes 'читайте'.
  - statement: '''Пиши'' is an informal command.'
    correct: true
    explanation: Yes, it is the 'ти' form of 'писати'.
  - statement: '''Будь ласка'' makes a command more polite.'
    correct: true
    explanation: It translates to 'please' and softens the request.
  - statement: To tell someone NOT to do something, use 'ні'.
    correct: false
    explanation: Use 'не' before the verb (e.g., Не читай).
  - statement: The formal command for 'give' is 'дайте'.
    correct: true
    explanation: Yes, 'дайте' is the formal/plural form of 'дати'.
  - statement: The verb 'дивитися' becomes 'дивись' in the formal imperative.
    correct: false
    explanation: '''Дивись'' is informal. The formal is ''дивіться''.'
  - statement: '''Слухайте'' is used when speaking to multiple people.'
    correct: true
    explanation: Yes, it is the plural form.
  instruction: Визначте, чи твердження правильне.
