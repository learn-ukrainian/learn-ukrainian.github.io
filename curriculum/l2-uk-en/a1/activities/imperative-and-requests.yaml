- type: quiz
  title: "Choose the Correct Imperative"
  instruction: "Select the correct imperative form for each situation."
  items:
    - question: "Your teacher tells the whole class to read the text. Which form does she use?"
      options:
        - text: "читай"
          correct: false
        - text: "читайте"
          correct: true
        - text: "читати"
          correct: false
        - text: "читаєш"
          correct: false
      explanation: "The teacher addresses the class formally/as a group, so she uses the ви form: читайте."
    - question: "You want to tell a close friend to listen. Which form do you use?"
      options:
        - text: "слухайте"
          correct: false
        - text: "слухати"
          correct: false
        - text: "слухай"
          correct: true
        - text: "слухаєш"
          correct: false
      explanation: "A close friend gets the informal ти form: слухай."
    - question: "Which verb has an irregular imperative where к changes to ж?"
      options:
        - text: "читати"
          correct: false
        - text: "сказати"
          correct: true
        - text: "слухати"
          correct: false
        - text: "дати"
          correct: false
      explanation: "Сказати has a consonant mutation: к → ж, giving скажи."
    - question: "How do you say 'Do not smoke!' in Ukrainian?"
      options:
        - text: "Не кури!"
          correct: true
        - text: "Кури не!"
          correct: false
        - text: "Не курити!"
          correct: false
        - text: "Не кур!"
          correct: false
      explanation: "Negative imperative is не + imperative form: Не кури! Не курити! would be a public sign style."
    - question: "What is the most common position for будь ласка in a polite request?"
      options:
        - text: "At the very beginning"
          correct: false
        - text: "At the very end"
          correct: false
        - text: "Directly after the verb"
          correct: true
        - text: "Before the verb"
          correct: false
      explanation: "Будь ласка is most naturally placed directly after the verb: Дайте, будь ласка."
    - question: "A museum sign says 'Не торкатися!' What form of the verb is this?"
      options:
        - text: "Imperative (ти form)"
          correct: false
        - text: "Imperative (ви form)"
          correct: false
        - text: "Infinitive"
          correct: true
        - text: "Past tense"
          correct: false
      explanation: "Public signs use the infinitive form (торкатися), not the personal imperative (не чіпай)."
    - question: "You need a taxi driver to stop immediately. What do you say?"
      options:
        - text: "Стій!"
          correct: false
        - text: "Стійте!"
          correct: true
        - text: "Стояти!"
          correct: false
        - text: "Стоїте!"
          correct: false
      explanation: "A taxi driver should be addressed formally with the ви form: Стійте!"
    - question: "Which phrase is the MOST polite way to make a request?"
      options:
        - text: "Дай!"
          correct: false
        - text: "Дайте, будь ласка."
          correct: false
        - text: "Чи не могли б ви дати?"
          correct: true
        - text: "Прошу дати."
          correct: false
      explanation: "Чи не могли б ви...? (Could you...?) is the most polite indirect request pattern."
    - question: "What happens to the -ся ending of дивитися in the ти imperative?"
      options:
        - text: "It stays as -ся"
          correct: false
        - text: "It changes to -сь"
          correct: true
        - text: "It disappears completely"
          correct: false
        - text: "It moves to the beginning"
          correct: false
      explanation: "The reflexive ending shortens from -ся to -сь in the imperative: дивись."
    - question: "Your friend asks you to write in your notebook. What does she say?"
      options:
        - text: "Пиши у зошиті."
          correct: true
        - text: "Пишіть у зошиті."
          correct: false
        - text: "Писати у зошиті."
          correct: false
        - text: "Пишете у зошиті."
          correct: false
      explanation: "A friend uses the informal ти form: Пиши у зошиті."

- type: fill-in
  title: "Complete the Command"
  instruction: "Choose the correct imperative form to complete each sentence."
  items:
    - sentence: "___ текст уважно."
      answer: "Читайте"
      options: ["Читайте", "Читати", "Читаєте", "Читай"]
      explanation: "A teacher addressing a class uses the formal/plural form: Читайте."
    - sentence: "___, будь ласка, де метро."
      answer: "Скажіть"
      options: ["Скажіть", "Сказати", "Скажи", "Скажете"]
      explanation: "Speaking to a stranger requires the formal ви form: Скажіть, будь ласка."
    - sentence: "___ на дошку!"
      answer: "Дивіться"
      options: ["Дивіться", "Дивитися", "Дивись", "Дивитеся"]
      explanation: "A teacher addressing students uses the formal/plural form: Дивіться."
    - sentence: "___ мені цю книгу, будь ласка."
      answer: "Дайте"
      options: ["Дайте", "Дати", "Дай", "Даєте"]
      explanation: "A polite request to someone formal uses: Дайте, будь ласка."
    - sentence: "Не ___! Тут небезпечно."
      answer: "біжи"
      options: ["біжи", "бігти", "біжіть", "біжать"]
      explanation: "A personal prohibition to a friend (ти): Не біжи!"
    - sentence: "___ сюди, будь ласка."
      answer: "Ідіть"
      options: ["Ідіть", "Іти", "Іди", "Ідете"]
      explanation: "A polite request to come here uses the formal form: Ідіть."
    - sentence: "___ у зошиті."
      answer: "Пишіть"
      options: ["Пишіть", "Писати", "Пиши", "Пишете"]
      explanation: "A classroom instruction uses the formal/plural form: Пишіть."
    - sentence: "___ хвилинку, будь ласка."
      answer: "Зачекайте"
      options: ["Зачекайте", "Чекати", "Чекай", "Зачекай"]
      explanation: "A polite request to wait uses the formal form: Зачекайте."

- type: true-false
  title: "True or False?"
  instruction: "Decide whether each statement about Ukrainian imperatives is true or false."
  items:
    - statement: "To form a negative command, you place не before the imperative form."
      correct: true
      explanation: "Correct! Не + imperative: Не кури! Не біжи! Не чіпай!"
    - statement: "Читати! is the normal way to tell a friend to read something."
      correct: false
      explanation: "Читати! is the infinitive form used on public signs. To tell a friend, say Читай!"
    - statement: "The ви imperative form is used for both formal address and groups."
      correct: true
      explanation: "Correct! Читайте works for a group and for polite address to one person."
    - statement: "The imperative of сказати is скази."
      correct: false
      explanation: "False! The к changes to ж: сказати → скажи (consonant mutation)."
    - statement: "Будь ласка can appear at the beginning, middle, or end of a sentence."
      correct: true
      explanation: "Correct! Its position is flexible, though after the verb is most common."
    - statement: "The imperative of стояти is стояй."
      correct: false
      explanation: "False! Стояти has an irregular imperative: стій (stem vowel change)."
    - statement: "Прошу вас сісти is more formal than Сядьте, будь ласка."
      correct: true
      explanation: "Correct! Прошу вас + infinitive is a more formal request pattern."
    - statement: "The reflexive ending -ся becomes -сь in the imperative: дивись."
      correct: true
      explanation: "Correct! Дивитися → дивись (ти) / дивіться (ви)."

- type: unjumble
  title: "Build the Command"
  instruction: "Arrange the words to form a correct Ukrainian command or request."
  items:
    - words: ["текст", "Читайте"]
      answer: "Читайте текст"
    - words: ["уважно", "Слухайте"]
      answer: "Слухайте уважно"
    - words: ["будь", "Дайте,", "ласка"]
      answer: "Дайте, будь ласка"
    - words: ["у", "Пишіть", "зошиті"]
      answer: "Пишіть у зошиті"
    - words: ["дошку", "на", "Дивіться"]
      answer: "Дивіться на дошку"
    - words: ["будь", "Покажіть,", "ласка"]
      answer: "Покажіть, будь ласка"
    - words: ["хвилинку", "Зачекайте"]
      answer: "Зачекайте хвилинку"
    - words: ["сюди", "Ідіть"]
      answer: "Ідіть сюди"

- type: group-sort
  title: "Sort by Form"
  instruction: 'Sort these imperative forms into informal (ти) and formal/plural (ви) groups.'
  groups:
    - name: "Informal (ти)"
      items: ["читай", "пиши", "скажи", "дай", "іди", "дивись"]
    - name: "Formal/Plural (ви)"
      items: ["читайте", "пишіть", "скажіть", "дайте", "ідіть", "дивіться"]