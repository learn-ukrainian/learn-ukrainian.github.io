  instruction: З'єднайте відповідні елементи.
- type: quiz
  title: Choose correct imperative form in context
  items:
  - question: How do you politely ask a stranger to show you something?
    explanation: Use the formal 'ви' form + будь ласка.
    options:
    - text: Покажіть, будь ласка.
      correct: true
    - text: Покажи, будь ласка.
      correct: false
    - text: Покажіть.
      correct: false
    - text: Показати.
      correct: false
  - question: You are talking to your friend. How do you tell them to read?
    explanation: Use the informal 'ти' form (читай).
    options:
    - text: Читай.
      correct: true
    - text: Читайте.
      correct: false
    - text: Читати.
      correct: false
    - text: Читають.
      correct: false
  - question: A teacher tells the whole class to write.
    explanation: Use the plural/formal 'ви' form (пишіть).
    options:
    - text: Пишіть.
      correct: true
    - text: Пиши.
      correct: false
    - text: Писати.
      correct: false
    - text: Пишемо.
      correct: false
  - question: How do you ask for help in an emergency?
    explanation: Use the imperative form of допомогти.
    options:
    - text: Допоможіть!
      correct: true
    - text: Допомогти!
      correct: false
    - text: Допомагаю!
      correct: false
    - text: Допоможе!
      correct: false
  - question: Which of these is a negative command to a group?
    explanation: Add 'не' before the formal imperative verb.
    options:
    - text: Не дивіться.
      correct: true
    - text: Не дивись.
      correct: false
    - text: Не дивитися.
      correct: false
    - text: Не дивиться.
      correct: false
  - question: Which is the correct command for 'to take' (informal)?
    explanation: The informal command for взяти is візьми.
    options:
    - text: Візьми.
      correct: true
    - text: Взяти.
      correct: false
    - text: Візьміть.
      correct: false
    - text: Взяв.
      correct: false
  - question: Which word means 'Wait here!' (informal)?
    explanation: Use the informal чекай + тут.
    options:
    - text: Чекай тут!
      correct: true
    - text: Чекайте тут!
      correct: false
    - text: Чекати тут!
      correct: false
    - text: Чекаю тут!
      correct: false
  - question: How do you formally ask someone to give you time?
    explanation: Use the formal дайте.
    options:
    - text: Дайте час.
      correct: true
    - text: Дай час.
      correct: false
    - text: Дати час.
      correct: false
    - text: Дамо час.
      correct: false
  - question: What does the informal command 'Стій!' mean?
    explanation: It is the informal command for 'stop' or 'stand'.
    options:
    - text: Stop!
      correct: true
    - text: Go!
      correct: false
    - text: Look!
      correct: false
    - text: Wait!
      correct: false
  - question: Which command is formed by adding -й?
    explanation: Verbs ending in a vowel in their stem take -й.
    options:
    - text: Читай.
      correct: true
    - text: Пиши.
      correct: false
    - text: Скажи.
      correct: false
    - text: Іди.
      correct: false
  instruction: Оберіть правильну відповідь.
