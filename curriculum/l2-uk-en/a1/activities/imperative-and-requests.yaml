- type: true-false
  title: 'True or False: Verb stem rules'
  items:
  - statement: Verbs ending in a vowel sound before the command ending take '-й'.
    correct: true
    explanation: Yes, 'читати' becomes 'читай'.
  - statement: Verbs ending in a consonant sound before the command ending take '-й'.
    correct: false
    explanation: They take '-и' (e.g., писати -> пиши).
  - statement: '''Іди'' is the informal imperative of ''іти''.'
    correct: true
    explanation: Yes, 'іди' is correct.
  - statement: The formal command for 'взяти' is 'взяйте'.
    correct: false
    explanation: 'It is an irregular verb: ''візьміть''.'
  - statement: You add '-те' directly to the infinitive to make a formal command.
    correct: false
    explanation: You add it to the informal imperative (читай -> читайте).
  - statement: Negative commands do not change the imperative ending.
    correct: true
    explanation: You just add 'не' before it (не читай).
  - statement: '''Покажи'' ends with ''-и'' because the stem before it ends in a consonant.'
    correct: true
    explanation: Yes, this follows the phonetic rule.
  - statement: The command form of 'стояти' is 'стояй'.
    correct: false
    explanation: 'It is an irregular verb: ''стій''.'
  instruction: Визначте, чи твердження правильне.
