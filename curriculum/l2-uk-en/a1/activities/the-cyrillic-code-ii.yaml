- type: quiz
  title: "Letter Sounds and Traps"
  instruction: "Choose the correct answer based on the lesson."
  items:
    - question: "Which letter looks like English P but makes a rolled /r/ sound?"
      explanation: "The Cyrillic letter Р is a visual trap."
      options:
        - text: "Р"
          correct: true
        - text: "В"
          correct: false
        - text: "Т"
          correct: false
        - text: "К"
          correct: false
    - question: "Which letter looks like English B but makes a /v/ sound?"
      explanation: "The Cyrillic letter В is a visual trap."
      options:
        - text: "В"
          correct: true
        - text: "Р"
          correct: false
        - text: "Е"
          correct: false
        - text: "И"
          correct: false
    - question: "Which vowel represents a low, relaxed sound that does not exist in English?"
      explanation: "И is uniquely Ukrainian and requires a relaxed jaw."
      options:
        - text: "И"
          correct: true
        - text: "І"
          correct: false
        - text: "Е"
          correct: false
        - text: "О"
          correct: false
    - question: "Which vowel sounds high and bright, like the 'ee' in 'see'?"
      explanation: "І requires stretching your lips wide like a smile."
      options:
        - text: "І"
          correct: true
        - text: "И"
          correct: false
        - text: "Е"
          correct: false
        - text: "У"
          correct: false
    - question: "Which of these consonants sounds exactly like its English visual equivalent?"
      explanation: "К makes a /k/ sound, just like in English."
      options:
        - text: "К"
          correct: true
        - text: "Р"
          correct: false
        - text: "В"
          correct: false
        - text: "Н"
          correct: false
    - question: "What does the word 'кіт' mean?"
      explanation: "The word 'кіт' means cat."
      options:
        - text: "cat"
          correct: true
        - text: "dad"
          correct: false
        - text: "sea"
          correct: false
        - text: "city"
          correct: false
    - question: "How do you pronounce the vowel 'Е'?"
      explanation: "It sounds crisp and short, like the 'e' in 'set'."
      options:
        - text: "Like 'e' in 'set'"
          correct: true
        - text: "Like 'ee' in 'meet'"
          correct: false
        - text: "Like 'a' in 'cat'"
          correct: false
        - text: "Like 'u' in 'put'"
          correct: false
    - question: "Which word means 'city' in Ukrainian?"
      explanation: "'Місто' is the Ukrainian word for city."
      options:
        - text: "місто"
          correct: true
        - text: "море"
          correct: false
        - text: "метро"
          correct: false
        - text: "масло"
          correct: false

