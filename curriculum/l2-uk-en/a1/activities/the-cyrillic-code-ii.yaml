- type: true-false
  title: "True or False: Letters and Sounds"
  instruction: "Decide if the statement is true or false."
  items:
    - statement: "The letter Р sounds like the English letter P."
      correct: false
      explanation: "False. Р is a rolled /r/ sound."
    - statement: "The letter В makes a /v/ sound."
      correct: true
      explanation: "True. It looks like B but sounds like V."
    - statement: "И and І make exactly the same sound."
      correct: false
      explanation: "False. И is low and relaxed, while І is high and bright."
    - statement: "The letter Т sounds the same as the English letter T."
      correct: true
      explanation: "True. It is a friendly letter that shares the same look and sound."
    - statement: "The letter Е represents a gliding combination of sounds."
      correct: false
      explanation: "False. Е is a single, crisp, and short sound."
    - statement: "The word 'море' means sea."
      correct: true
      explanation: "True. 'Море' uses the newly learned letters Р and Е."
    - statement: "The letter К is considered a visual trap."
      correct: false
      explanation: "False. К looks and sounds exactly like its English equivalent."
    - statement: "With 14 letters, you can read real Ukrainian words."
      correct: true
      explanation: "True. You have enough letters to read words like молоко and місто."

- type: anagram
  title: "Word Scramble"
  instruction: "Rearrange the letters to form Ukrainian words you just learned."
  items:
    - scrambled: "і к т"
      answer: "кіт"
    - scrambled: "о р м е"
      answer: "море"
    - scrambled: "и с р"
      answer: "сир"
    - scrambled: "а т о т"
      answer: "тато"
    - scrambled: "і м т с о"
      answer: "місто"
    - scrambled: "к і в о н"
      answer: "вікно"
    - scrambled: "о л о м к о"
      answer: "молоко"
    - scrambled: "і с л"
      answer: "ліс"
    - scrambled: "о в о л с"
      answer: "слово"

- type: group-sort
  title: "True Friends vs. Visual Traps"
