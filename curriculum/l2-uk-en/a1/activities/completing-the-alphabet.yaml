- type: classify
  title: "Find the Soft Sign"
  instruction: "Sort these words by which consonant the soft sign (Ь) softens. Words without Ь go in the last group."
  categories:
    - label: "Soft Н (Н + Ь)"
      items: ["день", "кінь", "осінь"]
    - label: "Soft Л (Л + Ь)"
      items: ["сіль", "Львів"]
    - label: "No soft sign"
      items: ["час", "цукор", "м'ясо"]

