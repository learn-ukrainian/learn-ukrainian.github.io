version: '1.0'
module: what-time
level: a1
inline:
- id: match-up-times
  type: match-up
  instruction: З'єднайте час і слово (Match the time to the Ukrainian word)
  pairs:
  - left: '1:00'
    right: перша
  - left: '2:00'
    right: друга
  - left: '5:00'
    right: п'ята
  - left: '7:00'
    right: сьома
  - left: '9:00'
    right: дев'ята
  - left: '10:00'
    right: десята
  - left: '11:00'
    right: одинадцята
  - left: '12:00'
    right: дванадцята
- id: quiz-clock-faces
  type: quiz
  instruction: Котра година? Оберіть правильну відповідь (What time is it? Choose
    the correct answer)
  items:
  - question: Котра година? [4:00]
    options:
    - третя
    - четверта
    - п'ята
    - шоста
    correct: 1
  - question: Котра година? [6:00]
    options:
    - п'ята
    - шоста
    - сьома
    - восьма
    correct: 1
  - question: Котра година? [9:00]
    options:
    - восьма
    - дев'ята
    - десята
    - одинадцята
    correct: 1
  - question: Котра година? [11:00]
    options:
    - десята
    - одинадцята
    - дванадцята
    - перша
    correct: 1
  - question: Котра година? [3:00]
    options:
    - друга
    - третя
    - четверта
    - п'ята
    correct: 1
  - question: Котра година? [12:00]
    options:
    - одинадцята
    - дванадцята
    - перша
    - друга
    correct: 1
  - question: Котра година? [2:30]
    options:
    - пів на другу
    - пів на третю
    - пів на першу
    - пів на четверту
    correct: 1
  - question: Котра година? [7:30]
    options:
    - пів на сьому
    - пів на восьму
    - пів на шосту
    - пів на дев'яту
    correct: 1
- id: fill-in-o-kotrij
  type: fill-in
  instruction: Вставте правильну форму (Fill in the correct form — answer 'О котрій?')
  items:
  - sentence: Я снідаю о ____. (8:00)
    answer: восьмій
    options:
    - восьма
    - восьмій
    - восьму
    - восьмою
  - sentence: Марина працює о ____. (10:00)
    answer: десятій
    options:
    - десята
    - десятій
    - десяту
    - десятою
  - sentence: Ми зустрінемося о ____. (1:00)
    answer: першій
    options:
    - перша
    - першій
    - першу
    - першою
  - sentence: Олексій вечеряє о ____. (9:00)
    answer: дев'ятій
    options:
    - дев'ята
    - дев'ятій
    - дев'яту
    - дев'ятою
  - sentence: Я прокидаюся о ____. (7:00)
    answer: сьомій
    options:
    - сьома
    - сьомій
    - сьому
    - сьомою
  - sentence: Урок починається ___ одинадцятій. (11:00)
    answer: об
    options:
    - о
    - об
    - в
    - на
  - sentence: Вона обідає о ____. (3:00)
    answer: третій
    options:
    - третя
    - третій
    - третю
    - третьою
  - sentence: Я лягаю спати о ____. (12:00)
    answer: дванадцятій
    options:
    - дванадцята
    - дванадцятій
    - дванадцяту
    - дванадцятою
- id: quiz-time-of-day
  type: quiz
  instruction: Ранку, дня, вечора чи ночі? (Morning, afternoon, evening, or night?)
  items:
  - question: О сьомій ____ — 7 AM
    options:
    - ранку
    - дня
    - вечора
    - ночі
    correct: 0
  - question: О третій ____ — 3 PM
    options:
    - ранку
    - дня
    - вечора
    - ночі
    correct: 1
  - question: О десятій ____ — 10 PM
    options:
    - ранку
    - дня
    - вечора
    - ночі
    correct: 2
  - question: О другій ____ — 2 AM
    options:
    - ранку
    - дня
    - вечора
    - ночі
    correct: 3
  - question: О восьмій ____ — Марина снідає вранці
    options:
    - ранку
    - дня
    - вечора
    - ночі
    correct: 0
  - question: О першій ____ — Марина обідає вдень
    options:
    - ранку
    - дня
    - вечора
    - ночі
    correct: 1
workbook:
- type: match-up
  instruction: З'єднайте дві форми однієї години (Match each 'Котра?' form with its
    'О котрій?' form)
  pairs:
  - left: перша
    right: о першій
  - left: третя
    right: о третій
  - left: п'ята
    right: о п'ятій
  - left: шоста
    right: о шостій
  - left: дев'ята
    right: о дев'ятій
  - left: одинадцята
    right: об одинадцятій
  - left: дванадцята
    right: о дванадцятій
  - left: восьма
    right: о восьмій
- type: fill-in
  instruction: Складіть розклад дня Марини (Complete Marina's daily schedule)
  items:
  - sentence: Марина прокидається о ____ ранку. (7:00)
    answer: сьомій
  - sentence: Вона снідає о ____ ранку. (8:00)
    answer: восьмій
  - sentence: Марина починає працювати о ____ ранку. (10:00)
    answer: десятій
  - sentence: Вона обідає о ____ дня. (1:00)
    answer: першій
  - sentence: Марина зустрічається з Олексієм о ____ дня. (3:00)
    answer: третій
  - sentence: Вона вечеряє о ____ вечора. (7:00)
    answer: сьомій
  - sentence: Марина лягає спати о ____ вечора. (11:00)
    answer: одинадцятій
  - sentence: Інколи вона читає до ____ ночі. (2:00)
    answer: другої
- type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: 'На питання ''Котра година?'' відповідаємо: ''О десятій.'''
    correct: false
    explanation: 'На питання ''Котра година?'' відповідаємо без прийменника: ''Десята.''
      Форма ''о десятій'' — для питання ''О котрій?'''
  - statement: 'На питання ''О котрій?'' відповідаємо: ''О першій.'''
    correct: true
    explanation: 'Правильно! На питання ''О котрій?'' відповідаємо з прийменником
      ''о'': ''О першій.'''
  - statement: '''Пів на восьму'' означає 7:30.'
    correct: true
    explanation: 'Правильно! ''Пів на восьму'' — половина до восьмої, тобто 7:30.
      Логіка: ми вже наполовину дійшли до восьмої.'
  - statement: Перед 'одинадцятій' вживаємо 'о', а не 'об'.
    correct: false
    explanation: 'Неправильно! Перед словом, що починається на голосний, вживаємо
      ''об'': ''об одинадцятій''.'
  - statement: '''Опівдні'' вживається з прийменником ''о'': ''о опівдні''.'
    correct: false
    explanation: 'Неправильно! ''Опівдні'' вживається без прийменника: ''Зустрінемося
      опівдні.'''
  - statement: '7 AM по-українськи: ''О сьомій ранку''.'
    correct: true
    explanation: Правильно! Слово 'ранку' додається після години, щоб позначити, що
      це ранок, а не вечір.
- type: group-sort
  instruction: Розподіліть відповіді за питанням (Sort the answers — which question
    does each answer belong to?)
  groups:
  - label: Котра година?
    items:
    - Десята.
    - Сьома.
    - Пів на третю.
    - Перша.
    - Дев'ята.
    - Дванадцята.
  - label: О котрій?
    items:
    - О десятій.
    - О сьомій.
    - О пів на третю.
    - О першій.
    - О дев'ятій.
    - О дванадцятій.
- type: error-correction
  instruction: Виправте помилку (Find and correct the error in each sentence)
  items:
  - sentence: Котра година? — О десятій.
    error: О десятій
    correction: Десята
    error_type: word
    options:
    - О десятій
    - Десята
    - Десяту
    - Десятою
    explanation: 'На питання ''Котра година?'' відповідаємо без прийменника: ''Десята.''
      Форма з ''о'' — тільки для ''О котрій?'''
  - sentence: О котрій ти снідаєш? — Восьма.
    error: Восьма
    correction: О восьмій
    error_type: word
    options:
    - Восьма
    - О восьмій
    - Восьму
    - Восьмою
    explanation: 'На питання ''О котрій?'' відповідаємо з прийменником ''о'': ''О
      восьмій.'''
  - sentence: Я прокидаюся о одинадцятій ранку.
    error: о
    correction: об
    error_type: word
    options:
    - о
    - об
    - в
    - на
    explanation: Перед словом 'одинадцятій', яке починається на голосний звук, вживаємо
      'об', а не 'о'.
  - sentence: Зараз пів на восьма.
    error: восьма
    correction: восьму
    error_type: word
    options:
    - восьма
    - восьму
    - восьмій
    - восьмою
    explanation: 'У конструкції ''пів на...'' вживаємо знахідний відмінок: ''пів на
      восьму'' (не ''восьма'').'
  - sentence: О котрій ти вечеряєш? — Сьома вечора.
    error: Сьома
    correction: О сьомій
    error_type: word
    options:
    - Сьома
    - О сьомій
    - Сьому
    - Сьомою
    explanation: 'На питання ''О котрій?'' відповідаємо з прийменником ''о'': ''О
      сьомій вечора.'''
  - sentence: Вона лягає спати о десята.
    error: десята
    correction: десятій
    error_type: word
    options:
    - десята
    - десятій
    - десяту
    - десятою
    explanation: 'Після прийменника ''о'' в часових виразах вживаємо форму на ''-ій'':
      ''о десятій''.'
- type: observe
  examples:
  - Котра година? — Перша. / О котрій? — О першій.
  - Котра година? — Дев'ята. / О котрій? — О дев'ятій.
  - Котра година? — Десята. / О котрій? — О десятій.
  - Котра година? — Одинадцята. / О котрій? — Об одинадцятій.
  - Котра година? — Дванадцята. / О котрій? — О дванадцятій.
  prompt: Which ending changes when you add 'о'? And what happens before 'одинадцята'?
    What pattern do you notice?
