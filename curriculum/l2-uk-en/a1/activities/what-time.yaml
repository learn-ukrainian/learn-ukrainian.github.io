version: '1.0'
module: what-time
level: a1
inline:
- id: quiz-clock-matching
  type: quiz
  instruction: Оберіть правильний час (Choose the correct time)
  items:
  - question: '10:00'
    options:
    - десята година
    - десять годин
    - перша година
    - о десятій
    correct: 0
  - question: '2:00'
    options:
    - друга година
    - два години
    - третя година
    - о другій
    correct: 0
  - question: '5:00'
    options:
    - п'ята година
    - п'ять годин
    - шоста година
    - о п'ятій
    correct: 0
  - question: '11:00'
    options:
    - одинадцята година
    - одинадцять годин
    - десята година
    - об одинадцятій
    correct: 0
  - question: '1:30'
    options:
    - пів на другу
    - пів першої
    - пів на першу
    - о пів на другу
    correct: 0
  - question: '6:30'
    options:
    - пів на сьому
    - пів шостої
    - пів на шосту
    - о пів на сьому
    correct: 0
  - question: '2:15'
    options:
    - чверть на третю
    - чверть другої
    - чверть на другу
    - за чверть третя
    correct: 0
  - question: '2:45'
    options:
    - за чверть третя
    - без чверті три
    - чверть на третю
    - за чверть друга
    correct: 0
- id: match-up-digits
  type: match-up
  instruction: З'єднайте час і слова (Match the time and words)
  pairs:
  - left: '1:00'
    right: перша
  - left: '3:00'
    right: третя
  - left: '4:00'
    right: четверта
  - left: '7:00'
    right: сьома
  - left: '8:00'
    right: восьма
  - left: '9:00'
    right: дев'ята
  - left: '12:00'
    right: дванадцята
- id: fill-in-o-kotrii
  type: fill-in
  instruction: Вставте правильний час (Insert the correct time)
  items:
  - sentence: Я снідаю _____.
    answer: о восьмій
    options:
    - о восьмій
    - восьма
    - о вісім
  - sentence: Він працює _____.
    answer: о десятій
    options:
    - о десятій
    - десята
    - о десять
  - sentence: Ми обідаємо _____.
    answer: о першій
    options:
    - о першій
    - перша
    - в першій
  - sentence: Вона вечеряє _____.
    answer: о сьомій
    options:
    - о сьомій
    - сьома
    - в сьомій
  - sentence: Вони відпочивають _____.
    answer: о дев'ятій
    options:
    - о дев'ятій
    - дев'ята
    - о дев'ять
  - sentence: Ти прокидаєшся _____?
    answer: об одинадцятій
    options:
    - об одинадцятій
    - о одинадцятій
    - одинадцята
- id: quiz-time-of-day
  type: quiz
  instruction: Оберіть правильну частину доби (Choose the correct time of day)
  items:
  - question: 7:00 AM
    options:
    - о сьомій ранку
    - о сьомій дня
    - о сьомій вечора
    - о сьомій ночі
    correct: 0
  - question: 3:00 PM
    options:
    - о третій дня
    - о третій ранку
    - о третій вечора
    - о третій ночі
    correct: 0
  - question: 10:00 PM
    options:
    - о десятій вечора
    - о десятій ранку
    - о десятій дня
    - о десятій ночі
    correct: 0
  - question: 1:00 PM
    options:
    - о першій дня
    - о першій ночі
    - о першій ранку
    - о першій вечора
    correct: 0
  - question: 8:00 AM
    options:
    - о восьмій ранку
    - о восьмій вечора
    - о восьмій дня
    - о восьмій ночі
    correct: 0
  - question: 12:00 PM
    options:
    - опівдні
    - опівночі
    - о дванадцятій ночі
    - о дванадцятій ранку
    correct: 0
workbook:
- type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: На запитання «Котра година?» ми відповідаємо «О п'ятій».
    correct: false
    explanation: Ми відповідаємо просто «П'ята». «О п'ятій» — це відповідь на запитання
      «О котрій?».
  - statement: 12:00 вдень — це опівдні.
    correct: true
    explanation: Так, опівдні — це 12:00 дня.
  - statement: 8:30 — це пів на дев'яту.
    correct: true
    explanation: Правильно, пів на наступну годину (дев'яту).
  - statement: Ми кажемо «в десятій» замість «о десятій».
    correct: false
    explanation: Українською правильно казати «о десятій» або «об одинадцятій».
  - statement: 'Для часу ми використовуємо слова: перша, друга, третя.'
    correct: true
    explanation: Так, для годин використовуються жіночі порядкові числівники.
  - statement: 11:00 — це «о одинадцятій».
    correct: false
    explanation: 'Перед голосними ми використовуємо «об»: «об одинадцятій».'
- type: group-sort
  instruction: 'Розподіліть фрази: час зараз чи розклад? (Sort phrases: current time
    or schedule?)'
  groups:
  - label: Котра година? (What time is it?)
    items:
    - П'ята година
    - Пів на другу
    - Зараз третя
    - Чверть на шосту
  - label: О котрій годині? (At what time?)
    items:
    - О першій
    - Об одинадцятій
    - О сьомій ранку
    - Опівдні
- type: unjumble
  instruction: Складіть правильне речення зі слів (Put the words in the correct order)
  items:
  - words:
    - година?
    - Котра
    - зараз
    correct_order:
    - Котра
    - зараз
    - година?
  - words:
    - снідаю
    - о
    - Я
    - ранку.
    - восьмій
    correct_order:
    - Я
    - снідаю
    - о
    - восьмій
    - ранку.
  - words:
    - котрій
    - О
    - обідаєш?
    - ти
    correct_order:
    - О
    - котрій
    - ти
    - обідаєш?
  - words:
    - вечеряємо
    - Ми
    - о
    - сьомій
    - вечора.
    correct_order:
    - Ми
    - вечеряємо
    - о
    - сьомій
    - вечора.
  - words:
    - на
    - Пів
    - другу.
    - зараз
    correct_order:
    - Пів
    - на
    - другу.
    - зараз
  - words:
    - працює
    - о
    - Він
    - десятій.
    correct_order:
    - Він
    - працює
    - о
    - десятій.
- type: error-correction
  instruction: Знайдіть і виправте помилку (Find and fix the mistake)
  items:
  - sentence: Скільки зараз годин?
    error: Скільки зараз годин
    correction: Котра зараз година
    error_type: phrase
    options:
    - Який зараз час
    - Котра зараз година
    - Яка година
    explanation: Українською ми запитуємо «Котра година?» (Which hour?).
  - sentence: Я обідаю в першій.
    error: в
    correction: о
    error_type: word
    options:
    - о
    - об
    - на
    explanation: З годинами ми використовуємо прийменник «о» (о першій).
  - sentence: Зараз п'ять годин.
    error: п'ять годин
    correction: п'ята година
    error_type: phrase
    options:
    - п'ята година
    - п'ять
    - п'ятий
    explanation: Для часу використовуємо порядкові числівники жіночого роду (п'ята).
  - sentence: Я прокидаюся о одинадцятій.
    error: о
    correction: об
    error_type: word
    options:
    - об
    - в
    - у
    explanation: Перед голосними використовуємо «об» для кращого звучання (об одинадцятій).
  - sentence: Зараз пів другої.
    error: пів другої
    correction: пів на другу
    error_type: phrase
    options:
    - пів на другу
    - половина другої
    - о пів на другу
    explanation: 'Українською ми кажемо «пів на» + наступна година (знахідний відмінок:
      другу).'
  - sentence: Зараз без чверті три.
    error: без чверті три
    correction: за чверть третя
    error_type: phrase
    options:
    - за чверть третя
    - чверть до трьох
    - без п'ятнадцяти три
    explanation: 'Слово «без» для часу — це русизм. Правильно: «за чверть третя».'
- type: translate
  instruction: Оберіть правильний переклад (Choose the correct translation)
  items:
  - source: What time is it?
    options:
    - text: Котра година?
      correct: true
    - text: О котрій годині?
      correct: false
    - text: Скільки годин?
      correct: false
  - source: At what time?
    options:
    - text: О котрій годині?
      correct: true
    - text: Котра година?
      correct: false
    - text: Коли година?
      correct: false
  - source: I work at ten in the morning.
    options:
    - text: Я працюю о десятій ранку.
      correct: true
    - text: Я працюю десята ранку.
      correct: false
    - text: Я працюю в десятій ранку.
      correct: false
  - source: It is half past one.
    options:
    - text: Пів на другу.
      correct: true
    - text: Пів на першу.
      correct: false
    - text: Пів першої.
      correct: false
  - source: We rest at noon.
    options:
    - text: Ми відпочиваємо опівдні.
      correct: true
    - text: Ми відпочиваємо опівночі.
      correct: false
    - text: Ми відпочиваємо о дванадцять.
      correct: false
  - source: They eat dinner at seven in the evening.
    options:
    - text: Вони вечеряють о сьомій вечора.
      correct: true
    - text: Вони вечеряють о сьомій дня.
      correct: false
    - text: Вони вечеряють сьома вечора.
      correct: false
- type: order
  instruction: Розставте репліки діалогу по порядку (Put the dialogue in order)
  items:
  - — Привіт, Олексію! Котра година?
  - — Привіт! Десята.
  - — О котрій ти працюєш?
  - — О дев'ятій. А ти?
  - — Я працюю о десятій.
  - — Добре, тоді о першій?
  - — Так!
  correct_order:
  - 0
  - 1
  - 2
  - 3
  - 4
  - 5
  - 6
