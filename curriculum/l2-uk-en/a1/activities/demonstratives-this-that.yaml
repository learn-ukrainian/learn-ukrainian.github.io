- type: true-false
  title: "True or False?"
  instruction: "Decide if the statement about demonstrative words is true or false."
  items:
    - statement: "The word ця is used with masculine nouns."
      correct: false
      explanation: "Ця is for feminine nouns. For masculine nouns, we use цей."
    - statement: "The word це acts as both a connector meaning 'This is' and a neuter pointing word."
      correct: true
      explanation: "Це is a very common word because it does both jobs depending on the sentence."
    - statement: "In Ukrainian, there is a different plural word for 'these' depending on the gender."
      correct: false
      explanation: "There is only one universal plural word for 'these', which is ці."
    - statement: "The word той means 'that' and is used for masculine nouns."
      correct: true
      explanation: "Той points to distant masculine objects."
    - statement: "You must always say Ці люди to mean 'these people', because it is plural."
      correct: true
      explanation: "Since люди is plural, it requires the plural demonstrative ці."
    - statement: "The word та can only ever mean 'that' and nothing else."
      correct: false
      explanation: "Та can mean the feminine 'that' or it can act as the conjunction 'and'."
    - statement: "To point to a distant neuter object, you use the word те."
      correct: true
      explanation: "Те is the neuter form for objects that are far away."
    - statement: "We use цей when an object is very far away."
      correct: false
      explanation: "Цей is used for objects that are close. For distant objects, we use той."

- type: unjumble
  title: "Make a Sentence"
  instruction: "Put the words in the correct order."
  items:
    - words: ["Цей", "стілець", "новий."]
      answer: "Цей стілець новий."
    - words: ["Той", "будинок", "старий."]
      answer: "Той будинок старий."
    - words: ["Я", "хочу", "цей", "торт."]
      answer: "Я хочу цей торт."
    - words: ["Ця", "книга", "дуже", "цікава."]
      answer: "Ця книга дуже цікава."
    - words: ["Ті", "люди", "дуже", "веселі."]
      answer: "Ті люди дуже веселі."
    - words: ["Ці", "студенти", "читають", "текст."]
      answer: "Ці студенти читають текст."

