    - text: той вулиця
      correct: false
    - text: те вулиця
      correct: false
  - question: Як сказати those people українською мовою?
    explanation: Люди - множина, далеко - ті.
    options:
    - text: ті люди
      correct: true
    - text: ці люди
      correct: false
    - text: той люди
      correct: false
    - text: та люди
      correct: false
  - question: Який займенник використовуємо для слова озеро далеко?
    explanation: Озеро середнього роду, далеко - те.
    options:
    - text: те
      correct: true
    - text: це
      correct: false
    - text: той
      correct: false
    - text: та
      correct: false
  - question: Як сказати that chair українською мовою?
    explanation: Стілець чоловічого роду, далеко - той.
    options:
    - text: той стілець
      correct: true
    - text: цей стілець
      correct: false
    - text: та стілець
