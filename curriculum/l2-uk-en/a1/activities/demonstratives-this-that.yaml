    - text: те стілець
      correct: false
  - question: Який займенник показує множину для віддалених об'єктів?
    explanation: Для всіх родів у множині далеко використовується ті.
    options:
    - text: ті
      correct: true
    - text: ці
      correct: false
    - text: той
      correct: false
    - text: та
      correct: false
  - question: Як сказати that girl українською мовою?
    explanation: Дівчина жіночого роду, далеко - та.
    options:
    - text: та дівчина
      correct: true
    - text: ця дівчина
      correct: false
    - text: той дівчина
      correct: false
    - text: те дівчина
      correct: false
  - question: Який займенник потрібен для слова слово (that word)?
    explanation: Слово середнього роду, далеко - те.
    options:
    - text: те
      correct: true
    - text: це
      correct: false
    - text: той
      correct: false
    - text: та
      correct: false
