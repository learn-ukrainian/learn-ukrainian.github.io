- type: quiz
  title: "Is it a Modifier or a Copula?"
  instruction: "Determine if 'це' is acting as a demonstrative modifier ('this') or an identity marker ('this is')."
  items:
    - question: "In the sentence 'Це кафе дуже гарне', what is 'це'?"
      options:
        - text: "Demonstrative modifier (this)"
          correct: true
        - text: "Identity marker (this is)"
          correct: false
        - text: "Conjunction (and)"
          correct: false
        - text: "Feminine pronoun"
          correct: false
      explanation: "Here, it directly modifies the noun 'кафе'."
    - question: "In the sentence 'Це кафе', what is 'це'?"
      options:
        - text: "Identity marker (this is)"
          correct: true
        - text: "Demonstrative modifier (this)"
          correct: false
        - text: "Plural pronoun"
          correct: false
        - text: "Masculine pronoun"
          correct: false
      explanation: "Here, it introduces what something is ('This is a cafe')."
    - question: "In the sentence 'Це озеро холодне', what does 'це' mean?"
      options:
        - text: "This (modifier)"
          correct: true
        - text: "This is (copula)"
          correct: false
        - text: "That (distant modifier)"
          correct: false
        - text: "These (plural)"
          correct: false
      explanation: "It modifies the neuter noun 'озеро'."
    - question: "In the sentence 'Це будинок', what does 'це' mean?"
      options:
        - text: "This is (copula)"
          correct: true
        - text: "This (modifier)"
          correct: false
        - text: "That (modifier)"
          correct: false
        - text: "These are"
          correct: false
      explanation: "It cannot be a modifier here because 'будинок' is masculine. It means 'This is a building'."
    - question: "Which sentence is grammatically INCORRECT?"
      options:
        - text: "Це будинок старий."
          correct: true
        - text: "Цей будинок старий."
          correct: false
        - text: "Це озеро старе."
          correct: false
        - text: "Це будинок."
          correct: false
      explanation: "'це' cannot modify the masculine noun 'будинок'. You must use 'цей будинок'."
    - question: "Which sentence correctly translates 'These people'?"
      options:
        - text: "Ці люди."
          correct: true
        - text: "Це люди."
          correct: false
        - text: "Ця люди."
          correct: false
        - text: "Цей люди."
          correct: false
      explanation: "For plural nouns, you must use the plural form 'ці'."
    - question: "In the sentence 'Це місто старе', what does 'це' mean?"
      options:
        - text: "This (modifier)"
          correct: true
        - text: "This is (copula)"
          correct: false
        - text: "That (modifier)"
          correct: false
        - text: "These (plural)"
          correct: false
      explanation: "It directly modifies the neuter noun 'місто'."
    - question: "In the sentence 'Це місто', what does 'це' mean?"
      options:
        - text: "This is (copula)"
          correct: true
        - text: "This (modifier)"
          correct: false
        - text: "That (modifier)"
          correct: false
        - text: "These (plural)"
          correct: false
      explanation: "It introduces what something is ('This is a city')."