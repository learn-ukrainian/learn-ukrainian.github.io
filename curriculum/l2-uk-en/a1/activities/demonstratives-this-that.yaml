- type: match-up
  title: Знайдіть відповідність до функцій слів
  pairs:
  - left: Це велике місто
    right: Invariable copula (This is a)
  - left: Це місто велике
    right: Demonstrative pronoun (This city)
  - left: Та дівчина читає
    right: Distant demonstrative (That girl)
  - left: Дівчина та хлопець
    right: Conjunction (and)
  - left: Ці книги нові
    right: Plural demonstrative (These books)
  - left: Ті люди чекають
    right: Plural distant demonstrative (Those people)
  - left: Цей чоловік чекає
    right: Masculine demonstrative (This man)
  - left: Той чоловік стоїть
    right: Distant masculine demonstrative (That man)
  instruction: З'єднайте відповідні елементи.
- type: quiz
  title: Перевірте знання контексту
  items:
  - question: Ви в магазині і хочете торт прямо перед вами. Що ви скажете?
    explanation: Для предметів поруч використовуємо цей.
    options:
    - text: Дайте мені цей торт
      correct: true
    - text: Дайте мені той торт
      correct: false
    - text: Дайте мені це торт
      correct: false
    - text: Дайте мені та торт
      correct: false
  - question: Ви хочете торт на дальній полиці. Що ви скажете?
    explanation: Для віддалених предметів використовуємо той.
    options:
    - text: Дайте мені той торт
      correct: true
    - text: Дайте мені цей торт
      correct: false
    - text: Дайте мені те торт
      correct: false
    - text: Дайте мені та торт
      correct: false
  - question: Як перекладається слово та у реченні Дівчина та хлопець?
    explanation: Тут слово та є сполучником і перекладається як and.
    options:
    - text: and
      correct: true
    - text: that
      correct: false
    - text: this
      correct: false
    - text: those
      correct: false
  - question: Який займенник використовуємо для подій, що відбуваються зараз?
    explanation: Для теперішніх подій використовуємо близькі форми.
    options:
    - text: цей день
      correct: true
    - text: той день
      correct: false
    - text: та день
      correct: false
    - text: те день
      correct: false
  - question: Який займенник використовуємо для подій у минулому?
    explanation: Для минулих подій використовуємо віддалені форми.
    options:
    - text: той день
      correct: true
    - text: цей день
      correct: false
    - text: ця день
      correct: false
    - text: це день
      correct: false
  - question: Як сказати This is a chair українською (як зв'язка)?
    explanation: Слово Це використовується як незмінна зв'язка.
    options:
    - text: Це стілець
      correct: true
    - text: Цей стілець
      correct: false
    - text: Той стілець
      correct: false
    - text: Ця стілець
      correct: false
  - question: Як сказати That is a building українською (як зв'язка)?
    explanation: Незмінна зв'язка Це перекладається і як this is, і як that is в простих
      реченнях.
    options:
    - text: Це будинок
      correct: true
    - text: Той будинок
      correct: false
    - text: Цей будинок
      correct: false
    - text: Та будинок
      correct: false
  - question: Що означає фраза Цей стілець мій?
    explanation: Слово цей вказує на конкретний стілець поруч.
    options:
    - text: This chair is mine
      correct: true
    - text: That chair is mine
      correct: false
    - text: This is my chair
      correct: false
    - text: That is my chair
      correct: false
  instruction: Оберіть правильну відповідь.
