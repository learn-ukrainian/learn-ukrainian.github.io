- type: quiz
  title: Оберіть правильний вказівний займенник (близько)
  items:
  - question: Який займенник потрібно використати зі словом хлопець?
    explanation: Слово хлопець чоловічого роду.
    options:
    - text: цей
      correct: true
    - text: ця
      correct: false
    - text: це
      correct: false
    - text: ці
      correct: false
  - question: Який займенник потрібно використати зі словом дівчина?
    explanation: Слово дівчина жіночого роду.
    options:
    - text: ця
      correct: true
    - text: цей
      correct: false
    - text: це
      correct: false
    - text: ці
      correct: false
  - question: Як правильно сказати this city українською мовою?
    explanation: Слово місто середнього роду.
    options:
    - text: це місто
      correct: true
    - text: цей місто
      correct: false
    - text: ця місто
      correct: false
    - text: ці місто
      correct: false
  - question: Який займенник використовується для множини (студенти)?
    explanation: Для всіх родів у множині використовується ці.
    options:
    - text: ці
      correct: true
    - text: цей
      correct: false
    - text: ця
      correct: false
    - text: це
      correct: false
  - question: Як правильно сказати this street українською мовою?
    explanation: Слово вулиця жіночого роду.
    options:
    - text: ця вулиця
      correct: true
    - text: цей вулиця
      correct: false
    - text: це вулиця
      correct: false
    - text: ці вулиця
      correct: false
  - question: Як правильно сказати this building українською мовою?
    explanation: Слово будинок чоловічого роду.
    options:
    - text: цей будинок
      correct: true
    - text: ця будинок
      correct: false
    - text: це будинок
      correct: false
    - text: ці будинок
      correct: false
  - question: Як правильно сказати these lakes українською мовою?
    explanation: Озера - це множина, тому використовуємо ці.
    options:
    - text: ці озера
      correct: true
    - text: цей озера
      correct: false
    - text: ця озера
      correct: false
    - text: це озера
      correct: false
  - question: Який займенник потрібен для слова кава (this coffee)?
    explanation: Слово кава жіночого роду.
    options:
    - text: ця
      correct: true
    - text: цей
      correct: false
    - text: це
      correct: false
    - text: ці
      correct: false
  instruction: Оберіть правильну відповідь.
- type: fill-in
  title: Заповніть пропуски (цей, ця, це, ці)
  items:
  - sentence: Я бачу _____ високий будинок.
    answer: цей
    options:
    - цей
    - ця
    - це
    - ці
  - sentence: Мені дуже подобається _____ книга.
    answer: ця
    options:
    - ця
    - цей
    - це
    - ці
  - sentence: _____ велике озеро дуже гарне.
    answer: це
    options:
    - це
    - цей
    - ця
    - ці
  - sentence: _____ нові студенти читають текст.
    answer: ці
    options:
    - ці
    - цей
    - ця
    - це
  - sentence: _____ стілець дуже зручний для роботи.
    answer: цей
    options:
    - цей
    - ця
    - це
    - ці
  - sentence: _____ тиха вулиця знаходиться в центрі.
    answer: ця
    options:
    - ця
    - цей
    - це
    - ці
  - sentence: _____ старі міста мають багату історію.
    answer: ці
    options:
    - ці
    - цей
    - ця
    - це
  - sentence: Я знаю _____ нове слово українською.
    answer: це
    options:
    - це
    - цей
    - ця
    - ці
  instruction: Оберіть правильне слово для заповнення пропуску.
- type: match-up
  title: Знайдіть переклад слів
  pairs:
  - left: цей будинок
    right: this building
  - left: та вулиця
    right: that street
  - left: ці студенти
    right: these students
  - left: те озеро
    right: that lake
  - left: той стілець
    right: that chair
  - left: ця дівчина
    right: this girl
  - left: ті люди
    right: those people
  - left: це місто
    right: this city
  instruction: З'єднайте відповідні елементи.
- type: group-sort
  title: Розподіліть іменники за групами (близько)
  groups:
  - name: Цей (Чоловічий рід)
    items:
    - будинок
    - стілець
    - чоловік
    - хлопець
  - name: Ця (Жіночий рід)
    items:
    - вулиця
    - дівчина
    - кава
    - книга
  - name: Це (Середній рід)
    items:
    - озеро
    - місто
    - слово
    - кафе
  - name: Ці (Множина)
    items:
    - будинки
    - міста
    - студенти
    - люди
  instruction: Розподіліть елементи за групами.
- type: quiz
  title: Оберіть правильний вказівний займенник (далеко)
  items:
  - question: Який займенник використовуємо для слова будинок далеко?
    explanation: Будинок чоловічого роду, далеко - той.
    options:
    - text: той
