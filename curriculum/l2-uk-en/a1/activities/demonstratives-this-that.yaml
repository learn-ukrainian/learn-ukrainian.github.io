- type: match-up
  title: "Match the Demonstrative to its Meaning"
  instruction: "Match the Ukrainian pronoun with its exact English equivalent based on gender and distance."
  pairs:
    - left: "цей"
      right: "this (masculine)"
    - left: "ця"
      right: "this (feminine)"
    - left: "це"
      right: "this (neuter)"
    - left: "ці"
      right: "these (plural)"
    - left: "той"
      right: "that (masculine)"
    - left: "та"
      right: "that (feminine)"
    - left: "те"
      right: "that (neuter)"
    - left: "ті"
      right: "those (plural)"

- type: group-sort
  title: "Sort the Nouns"
  instruction: "Sort the nouns into the correct group based on which 'this' pronoun they require."
  groups:
    - name: "Цей (Masculine)"
      items:
        - "будинок"
        - "стілець"
        - "хлопець"
    - name: "Ця (Feminine)"
      items:
        - "вулиця"
        - "дівчина"
        - "книга"
        - "сестра"
    - name: "Це (Neuter)"
      items:
        - "озеро"
        - "місто"
        - "кафе"
    - name: "Ці (Plural)"
      items:
        - "студенти"
        - "люди"
        - "міста"

- type: quiz
  title: "Choose the Correct Pronoun"
  instruction: "Select the correct demonstrative pronoun to match the noun."
  items:
    - question: "Which pronoun correctly goes with 'будинок' (building) if it is close to you?"
      options:
        - text: "цей"
          correct: true
        - text: "ця"
          correct: false
        - text: "це"
          correct: false
        - text: "ці"
          correct: false
      explanation: "'будинок' is a masculine noun."
    - question: "Which pronoun correctly goes with 'вулиця' (street) if it is close to you?"
      options:
        - text: "цей"
          correct: false
        - text: "ця"
          correct: true
        - text: "це"
          correct: false
        - text: "ці"
          correct: false
      explanation: "'вулиця' is a feminine noun."
    - question: "Which pronoun correctly goes with 'озеро' (lake) if it is close to you?"
      options:
        - text: "цей"
          correct: false
        - text: "ця"
          correct: false
        - text: "це"
          correct: true
        - text: "ці"
          correct: false
      explanation: "'озеро' is a neuter noun."
    - question: "Which pronoun correctly goes with 'студенти' (students) if they are close to you?"
      options:
        - text: "цей"
          correct: false
        - text: "ця"
          correct: false
        - text: "це"
          correct: false
        - text: "ці"
          correct: true
      explanation: "'студенти' is a plural noun."
    - question: "Which distant pronoun goes with 'стілець' (chair)?"
      options:
        - text: "той"
          correct: true
        - text: "та"
          correct: false
        - text: "те"
          correct: false
        - text: "ті"
          correct: false
      explanation: "'стілець' is a masculine noun, so we use 'той' for 'that'."
    - question: "Which distant pronoun goes with 'дівчина' (girl)?"
      options:
        - text: "той"
          correct: false
        - text: "та"
          correct: true
        - text: "те"
          correct: false
        - text: "ті"
          correct: false
      explanation: "'дівчина' is a feminine noun, so we use 'та' for 'that'."
    - question: "Which distant pronoun goes with 'місто' (city)?"
      options:
        - text: "той"
          correct: false
        - text: "та"
          correct: false
        - text: "те"
          correct: true
        - text: "ті"
          correct: false
      explanation: "'місто' is a neuter noun, so we use 'те' for 'that'."
    - question: "Which distant pronoun goes with 'книги' (books)?"
      options:
        - text: "той"
          correct: false
        - text: "та"
          correct: false
        - text: "те"
          correct: false
        - text: "ті"
          correct: true
      explanation: "'книги' is a plural noun, so we use 'ті' for 'those'."

- type: true-false
  title: "True or False: Demonstratives"
  instruction: "Decide if the statements about Ukrainian demonstratives are true or false."
  items:
    - statement: "The word 'ці' is used for plural nouns of all genders."
      correct: true
      explanation: "Yes, in the plural, gender distinction disappears completely."
    - statement: "The word 'та' only means 'that' and has no other meanings."
      correct: false
      explanation: "'та' can mean 'that' (feminine) or act as the conjunction 'and'."
    - statement: "When pointing to a distant masculine object, you use 'той'."
      correct: true
      explanation: "'той' is the masculine form for distant objects."
    - statement: "You can use 'це' as a universal word for 'this' with any singular noun."
      correct: false
      explanation: "'це' as a modifier is only used with neuter nouns."
    - statement: "The demonstrative pronoun must agree with the noun in gender and number."
      correct: true
      explanation: "This is a core rule of Ukrainian grammar."
    - statement: "To say 'those people' (distant plural), you use 'ці люди'."
      correct: false
      explanation: "'ці' means 'these' (close). For 'those' (distant), you use 'ті люди'."
    - statement: "'Це озеро' translates to 'this lake'."
      correct: true
      explanation: "'Озеро' is neuter, so 'це' is the correct demonstrative modifier."
    - statement: "'Цей хлопець' translates to 'that boy'."
      correct: false
      explanation: "'Цей' means 'this' (close). 'That boy' would be 'той хлопець'."

- type: fill-in
  title: "Fill in the Blanks: This and These"
  instruction: "Choose the correct close demonstrative (this/these) for each sentence."
  items:
    - sentence: "_____ будинок дуже великий."
      answer: "Цей"
      options:
        - "Цей"
        - "Ця"
        - "Це"
        - "Ці"
      explanation: "'будинок' is masculine."
    - sentence: "_____ вулиця дуже красива."
      answer: "Ця"
      options:
        - "Цей"
        - "Ця"
        - "Це"
        - "Ці"
      explanation: "'вулиця' is feminine."
    - sentence: "Я люблю _____ місто."
      answer: "це"
      options:
        - "цей"
        - "ця"
        - "це"
        - "ці"
      explanation: "'місто' is neuter."
    - sentence: "_____ студенти дуже розумні."
      answer: "Ці"
      options:
        - "Цей"
        - "Ця"
        - "Це"
        - "Ці"
      explanation: "'студенти' is plural."
    - sentence: "Я бачу _____ стілець."
      answer: "цей"
      options:
        - "цей"
        - "ця"
        - "це"
        - "ці"
      explanation: "'стілець' is masculine."
    - sentence: "_____ книга цікава."
      answer: "Ця"
      options:
        - "Цей"
        - "Ця"
        - "Це"
        - "Ці"
      explanation: "'книга' is feminine."
    - sentence: "Я хочу _____ торт."
      answer: "цей"
      options:
        - "цей"
        - "ця"
        - "це"
        - "ці"
      explanation: "'торт' is masculine."
    - sentence: "_____ міста великі."
      answer: "Ці"
      options:
        - "Цей"
        - "Ця"
        - "Це"
        - "Ці"
      explanation: "'міста' is plural."

