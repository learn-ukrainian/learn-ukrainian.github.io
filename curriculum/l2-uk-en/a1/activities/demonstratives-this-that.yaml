- type: quiz
  title: "Identify the Correct Demonstrative"
  instruction: "Choose the correct word based on gender and distance."
  items:
    - question: "What is the correct 'this' form for a masculine noun like будинок?"
      options:
        - text: "цей"
          correct: true
        - text: "ця"
          correct: false
        - text: "це"
          correct: false
        - text: "ці"
          correct: false
    - question: "Choose the form of 'this' used with a feminine noun like вулиця:"
      options:
        - text: "ця"
          correct: true
        - text: "цей"
          correct: false
        - text: "це"
          correct: false
        - text: "ці"
          correct: false
    - question: "Identify the neuter form of 'this' for a noun like місто:"
      options:
        - text: "це"
          correct: true
        - text: "цей"
          correct: false
        - text: "ця"
          correct: false
        - text: "ці"
          correct: false
    - question: "How do we say 'these' for all plural nouns?"
      options:
        - text: "ці"
          correct: true
        - text: "цей"
          correct: false
        - text: "ця"
          correct: false
        - text: "це"
          correct: false
    - question: "Select the word for 'that' when pointing to a masculine noun like стілець:"
      options:
        - text: "той"
          correct: true
        - text: "та"
          correct: false
        - text: "те"
          correct: false
        - text: "ті"
          correct: false
    - question: "If you want to say 'that' for a feminine noun like дівчина, use:"
      options:
        - text: "та"
          correct: true
        - text: "той"
          correct: false
        - text: "те"
          correct: false
        - text: "ті"
          correct: false
    - question: "For a neuter noun like озеро, 'that' is:"
      options:
        - text: "те"
          correct: true
        - text: "той"
          correct: false
        - text: "та"
          correct: false
        - text: "ті"
          correct: false
    - question: "What is the universal plural form for 'those'?"
      options:
        - text: "ті"
          correct: true
        - text: "той"
          correct: false
        - text: "та"
          correct: false
        - text: "те"
          correct: false

- type: fill-in
  title: "Complete the Sentence (This/These)"
  instruction: "Select the correct word to mean 'this' or 'these'."
  items:
    - sentence: "Я хочу ___ торт."
      answer: "цей"
      options: ["цей", "ця", "це", "ці"]
    - sentence: "___ вулиця дуже довга."
      answer: "Ця"
      options: ["Цей", "Ця", "Це", "Ці"]
    - sentence: "___ озеро чисте."
      answer: "Це"
      options: ["Цей", "Ця", "Це", "Ці"]
    - sentence: "___ люди цікаві."
      answer: "Ці"
      options: ["Цей", "Ця", "Це", "Ці"]
    - sentence: "___ хлопець розумний."
      answer: "Цей"
      options: ["Цей", "Ця", "Це", "Ці"]
    - sentence: "___ книга нова."
      answer: "Ця"
      options: ["Цей", "Ця", "Це", "Ці"]
    - sentence: "___ місто велике."
      answer: "Це"
      options: ["Цей", "Ця", "Це", "Ці"]
    - sentence: "___ студенти читають."
      answer: "Ці"
      options: ["Цей", "Ця", "Це", "Ці"]

