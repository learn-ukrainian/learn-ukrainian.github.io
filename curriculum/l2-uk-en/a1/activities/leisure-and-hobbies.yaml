- type: true-false
  title: "True or False?"
  instruction: "Read the statements and decide if they are true or false."
  items:
    - statement: "The word кіно changes its ending depending on where it is in the sentence."
      correct: false
      explanation: "The word for cinema is indeclinable and never changes."
    - statement: "In Ukrainian, you must use a preposition like в when saying you play a team sport like basketball."
      correct: true
      explanation: "Unlike English, Ukrainian requires a preposition for ball games."
    - statement: "Ходити в гості means to go to a restaurant with friends."
      correct: false
      explanation: "It means to visit someone's home, which is a big part of Ukrainian culture."
    - statement: "Із задоволенням is a polite way to decline an invitation."
      correct: false
      explanation: "It means with pleasure and is an enthusiastic way to say yes."
    - statement: "If you say Я йду в басейн, it means the pool is your destination."
      correct: true
      explanation: "We use the destination form when moving towards a place."
    - statement: "Як ти відпочиваєш у вихідні? asks about your weekend plans."
      correct: true
      explanation: "Вихідні means weekend."
    - statement: "You can say грати плавати to mean to play swimming."
      correct: false
      explanation: "Swimming is an individual sport and does not use the word to play."
    - statement: "Я люблю малювати means I like to draw."
      correct: true
      explanation: "It is a simple and popular structure."

- type: unjumble
  title: "Build the Sentences"
  instruction: "Put the words in the correct order to form a sentence."
  items:
    - words: ["Моє", "хобі", "—", "це", "спорт."]
      answer: "Моє хобі — це спорт."
    - words: ["Я", "плаваю", "кожного", "ранку."]
      answer: "Я плаваю кожного ранку."
    - words: ["Ми", "любимо", "зустрічатися", "з", "друзями."]
      answer: "Ми любимо зустрічатися з друзями."
    - words: ["Як", "ти", "відпочиваєш", "у", "вихідні?"]
      answer: "Як ти відпочиваєш у вихідні?"
    - words: ["У", "неділю", "я", "ходжу", "в", "гості."]
      answer: "У неділю я ходжу в гості."
    - words: ["Я", "люблю", "малювати."]
      answer: "Я люблю малювати."

