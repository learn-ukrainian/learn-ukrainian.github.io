- type: quiz
  title: Перевірка розуміння слів
  items:
  - question: Що ми зазвичай робимо у великому парку?
    explanation: У парку ми найчастіше гуляємо.
    options:
    - text: гуляти
      correct: true
    - text: читати
      correct: false
    - text: готувати
      correct: false
    - text: малювати
      correct: false
  - question: Яке слово означає улюблене заняття людини для душі?
    explanation: Улюблене заняття для душі називається хобі.
    options:
    - text: хобі
      correct: true
    - text: робота
      correct: false
    - text: школа
      correct: false
    - text: спорт
      correct: false
  - question: Що ми зазвичай робимо, коли вмикаємо цікавий фільм?
    explanation: Фільми ми зазвичай дивимося.
    options:
    - text: дивитися
      correct: true
    - text: співати
      correct: false
    - text: танцювати
      correct: false
    - text: плавати
      correct: false
  - question: Яке дієслово ми використовуємо разом зі словом книга?
    explanation: Книгу ми зазвичай читаємо.
    options:
    - text: читати
      correct: true
    - text: писати
      correct: false
    - text: слухати
      correct: false
    - text: робити
      correct: false
  - question: Куди ми йдемо, щоб подивитися новий цікавий фільм?
    explanation: Нові фільми ми дивимося у кіно.
    options:
    - text: у кіно
      correct: true
    - text: у парк
      correct: false
    - text: на роботу
      correct: false
    - text: у ліс
      correct: false
  - question: Яке слово означає фізичну активність або різні ігри?
    explanation: Фізична активність називається спорт.
    options:
    - text: спорт
      correct: true
    - text: музика
      correct: false
    - text: кіно
      correct: false
    - text: книга
      correct: false
  - question: Що ми робимо на кухні у наш вільний час?
    explanation: На кухні ми готуємо їжу.
    options:
    - text: готувати
      correct: true
    - text: гуляти
      correct: false
    - text: малювати
      correct: false
    - text: читати
      correct: false
  - question: Яке дієслово ми використовуємо, коли створюємо красиву картину?
    explanation: Картину ми зазвичай малюємо.
    options:
    - text: малювати
      correct: true
    - text: співати
      correct: false
    - text: слухати
      correct: false
    - text: грати
      correct: false
  instruction: Оберіть правильну відповідь.
- type: quiz
  title: Що вони роблять?
  items:
  - question: Що робить людина, яка має гітару або піаніно?
    explanation: На гітарі або піаніно ми граємо.
    options:
    - text: грати
      correct: true
    - text: гуляти
      correct: false
    - text: малювати
      correct: false
    - text: плавати
      correct: false
  - question: Що ми зазвичай робимо, коли чуємо ритмічну музику?
    explanation: Коли грає музика, ми танцюємо.
    options:
    - text: танцювати
      correct: true
    - text: читати
      correct: false
    - text: спати
      correct: false
    - text: писати
      correct: false
  - question: Що означає словосполучення вільний час українською мовою сьогодні?
    explanation: Це час для відпочинку та хобі.
    options:
    - text: час для хобі
      correct: true
    - text: час для роботи
      correct: false
    - text: час для школи
      correct: false
    - text: час для стресу
      correct: false
  - question: Що ми беремо з собою, коли йдемо фотографувати?
    explanation: Щоб фотографувати, потрібен фотоапарат або телефон.
    options:
    - text: камеру
      correct: true
    - text: книгу
      correct: false
    - text: м'яч
      correct: false
    - text: гітару
      correct: false
  - question: Що ми зазвичай робимо у басейні або у морі?
    explanation: У басейні або морі ми плаваємо.
    options:
    - text: плавати
      correct: true
    - text: літати
      correct: false
    - text: бігати
      correct: false
    - text: стрибати
      correct: false
  - question: Як ми називаємо період, коли ми не працюємо взагалі?
    explanation: Час без роботи - це відпочинок.
    options:
    - text: відпочинок
      correct: true
    - text: робота
      correct: false
    - text: навчання
      correct: false
    - text: спорт
      correct: false
  - question: Яке дієслово означає їхати в інші міста або країни?
    explanation: Подорожувати означає їздити у нові місця.
    options:
    - text: подорожувати
      correct: true
    - text: малювати
      correct: false
    - text: готувати
      correct: false
    - text: гуляти
      correct: false
  - question: Що ми використовуємо, щоб слухати улюблену сучасну музику?
    explanation: Музику слухають у навушниках.
    options:
    - text: навушники
      correct: true
    - text: окуляри
      correct: false
    - text: книги
      correct: false
    - text: каструлі
      correct: false
  instruction: Оберіть правильну відповідь.
