- type: anagram
  title: Розшифруйте дієслова
  instruction: Rearrange the letters to form action verbs.
  items:
  - scrambled: а г т р и
    answer: грати
  - scrambled: и ч а т и т
    answer: читати
  - scrambled: я г у л и т
    answer: гуляти
  - scrambled: с п в і а и т
    answer: співати
  - scrambled: в а л п т и а
    answer: плавати
  - scrambled: м ю в а л т и а
    answer: малювати
  - scrambled: и и в д и с т я
    answer: дивитися
  - scrambled: ц ю т а н в т и а
    answer: танцювати
