- type: fill-in
  title: "Complete the Sentences"
  instruction: "Choose the correct word to complete each sentence."
  items:
    - sentence: "Ми любимо грати в ___."
      answer: "футбол"
      options: ["футбол", "футболу", "футболі", "футболом"]
    - sentence: "Вона грає в ___."
      answer: "теніс"
      options: ["теніс", "тенісом", "тенісу", "тенісі"]
    - sentence: "Мій брат грає в ___."
      answer: "шахи"
      options: ["шахи", "шахах", "шахів", "шахами"]
    - sentence: "Я йду в ___."
      answer: "басейн"
      options: ["басейн", "басейні", "басейну", "басейном"]
      explanation: "Use the destination form for where you are going."
    - sentence: "Я плаваю в ___."
      answer: "басейні"
      options: ["басейні", "басейн", "басейну", "басейном"]
      explanation: "Use the location form for where you are."
    - sentence: "Ми йдемо на ___."
      answer: "стадіон"
      options: ["стадіон", "стадіоні", "стадіону", "стадіоном"]
      explanation: "Use the destination form for where you are going."
    - sentence: "Я бігаю на ___."
      answer: "стадіоні"
      options: ["стадіоні", "стадіон", "стадіону", "стадіоном"]
      explanation: "Use the location form for where you are."
    - sentence: "Мама любить ходити в ___."
      answer: "кіно"
      options: ["кіно", "кіні", "кіна", "кіном"]
      explanation: "The word for cinema never changes its ending."

