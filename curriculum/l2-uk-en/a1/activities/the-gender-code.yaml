- type: group-sort
  title: "Sort the Words by Group"
  instruction: "Categorize each word into its correct pronoun group: He, She, or It."
  groups:
    - name: "He"
      items:
        - "стіл"
        - "дім"
        - "брат"
    - name: "She"
      items:
        - "книга"
        - "мова"
        - "ніч"
    - name: "It"
      items:
        - "вікно"
        - "слово"
        - "місто"

- type: true-false
  title: "True or False: Word Groups"
  instruction: "Decide if the statement about the word's group is true or false."
  items:
    - statement: "The word книга belongs to the She group."
      correct: true
      explanation: "книга ends in -а, so it is feminine (She)."
    - statement: "The word дім belongs to the It group."
      correct: false
      explanation: "дім ends in a consonant, so it is masculine (He)."
    - statement: "The word вікно belongs to the It group."
      correct: true
      explanation: "вікно ends in -о, so it is neuter (It)."
    - statement: "The word сестра belongs to the He group."
      correct: false
      explanation: "сестра ends in -а, so it is feminine (She)."
    - statement: "The word брат belongs to the He group."
      correct: true
      explanation: "брат ends in a consonant, so it is masculine (He)."
    - statement: "The word слово belongs to the She group."
      correct: false
      explanation: "слово ends in -о, so it is neuter (It)."
    - statement: "The word місто belongs to the It group."
      correct: true
      explanation: "місто ends in -о, so it is neuter (It)."
    - statement: "The word стіл belongs to the She group."
      correct: false
      explanation: "стіл ends in a consonant, so it is masculine (He)."

- type: match-up
  title: "Match the Word to its Translation"
  instruction: "Match each Ukrainian word on the left with its English meaning on the right."
  pairs:
    - left: "дім"
      right: "house"
    - left: "місто"
      right: "city"
    - left: "книга"
      right: "book"
    - left: "слово"
      right: "word"
    - left: "час"
      right: "time"
    - left: "стіл"
      right: "table"
    - left: "вікно"
      right: "window"
    - left: "мова"
      right: "language"

- type: anagram
  title: "Unscramble the Words"
  instruction: "Rearrange the letters to form the correct Ukrainian word."
  items:
    - scrambled: "о в о л с"
      answer: "слово"
    - scrambled: "а г и н к"
      answer: "книга"
    - scrambled: "о н к і в"
      answer: "вікно"
    - scrambled: "о т с і м"
      answer: "місто"
    - scrambled: "а м а м"
      answer: "мама"
    - scrambled: "о т а т"
      answer: "тато"
    - scrambled: "л і т с"
      answer: "стіл"
    - scrambled: "а в о м"
      answer: "мова"

