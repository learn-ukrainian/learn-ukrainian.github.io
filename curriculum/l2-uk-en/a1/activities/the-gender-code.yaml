- type: quiz
  title: 'Identify the Gender: The Ending Rule'
  items:
    - question: "Masculine words end in a...?"
      explanation: "Masculine words end in a consonant, which we call the Hard/Stop rule."
      options:
        - text: "Consonant (Чоловічий рід)"
          correct: true
        - text: "Vowel -а or -я"
          correct: false
        - text: "Vowel -о or -е"
          correct: false
        - text: "Natural gender"
          correct: false
    - question: "Which ending is the signature of the Feminine (Жіночий рід) family?"
      explanation: "Feminine words usually end in the open sounds -а or -я."
      options:
        - text: "-а or -я"
          correct: true
        - text: "-о or -е"
          correct: false
        - text: "a consonant"
          correct: false
        - text: "the letter -у"
          correct: false
    - question: "To which gender family does the word місто (city) belong?"
      explanation: "Words ending in -о or -е are Neuter (Середній рід), following the Round/Circle rule."
      options:
        - text: "Neuter (Середній рід)"
          correct: true
        - text: "Masculine (Чоловічий рід)"
          correct: false
        - text: "Feminine (Жіночий рід)"
          correct: false
        - text: "Natural gender"
          correct: false
    - question: "Why is the word тато (father) considered Masculine despite the -о ending?"
      explanation: "Biological sex is the only rule that overrides the ending rule; a father is male."
      options:
        - text: "Biological sex overrides the ending rule"
          correct: true
        - text: "The letter -о is actually masculine here"
          correct: false
        - text: "It is an accidental mistake in the language"
          correct: false
        - text: "All family words are masculine"
          correct: false
    - question: "What possessive pronoun do we use for the word книга (book)?"
      explanation: "Книга is feminine, so we use the feminine pronoun моя."
      options:
        - text: "моя"
          correct: true
        - text: "мій"
          correct: false
        - text: "моє"
          correct: false
        - text: "мій або моє"
          correct: false
    - question: "What is the gender of the word сонце (sun) in Ukrainian?"
      explanation: "Сонце ends in -е, so it belongs to the Neuter family."
      options:
        - text: "Neuter (Середній рід)"
          correct: true
        - text: "Masculine (Чоловічий рід)"
          correct: false
        - text: "Feminine (Жіночий рід)"
          correct: false
        - text: "It changes every day"
          correct: false
    - question: "Which of these words is a Hidden Feminine word from Family 3?"
      explanation: "Ніч ends in a consonant but is grammatically feminine."
      options:
        - text: "ніч (night)"
          correct: true
        - text: "дім (house)"
          correct: false
        - text: "брат (brother)"
          correct: false
        - text: "місто (city)"
          correct: false
    - question: "Which pronoun matches the masculine word дім (house)?"
      explanation: "For masculine nouns, we use the pronoun мій."
      options:
        - text: "мій"
          correct: true
        - text: "моя"
          correct: false
        - text: "моє"
          correct: false
        - text: "мій або моя"
          correct: false

