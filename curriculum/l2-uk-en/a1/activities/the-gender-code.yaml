- type: "quiz"
  title: "Spot the Gender Exceptions"
  instruction: "Choose the correct answer about these special words."
  items:
    - question: "Why is the word тато (dad) considered Masculine?"
      explanation: "Even though тато ends in -о (usually Neuter), the biological reality of a dad being male makes it Masculine."
      options:
        - text: "Biological sex overrides the ending."
          correct: true
        - text: "It ends in a consonant."
          correct: false
        - text: "All family members are Masculine."
          correct: false
        - text: "It ends in a soft sign."
          correct: false
    - question: "Which of the following words is a Neuter exception, despite ending in -я?"
      explanation: "The word ім'я belongs to an ancient group of Neuter words and does not follow the normal Feminine pattern for -я."
      options:
        - text: "ім'я (name)"
          correct: true
        - text: "земля (earth)"
          correct: false
        - text: "мама (mom)"
          correct: false
        - text: "книга (book)"
          correct: false
    - question: "What is the gender of the word день (day)?"
      explanation: "День ends in a soft sign (-ь). You must simply memorize that it is Masculine."
      options:
        - text: "Masculine"
          correct: true
        - text: "Feminine"
          correct: false
        - text: "Neuter"
          correct: false
        - text: "Not applicable"
          correct: false
    - question: "What is the gender of the word ніч (night)?"
      explanation: "Ніч ends in a soft sign (-ь). You must simply memorize that it is Feminine."
      options:
        - text: "Feminine"
          correct: true
        - text: "Masculine"
          correct: false
        - text: "Neuter"
          correct: false
        - text: "Not applicable"
          correct: false
    - question: "Which pronoun replaces the Masculine object стіл (table)?"
      explanation: "Since стіл is Masculine, you use він (he), not воно (it)."
      options:
        - text: "він (he)"
          correct: true
        - text: "вона (she)"
          correct: false
        - text: "воно (it)"
          correct: false
        - text: "я (I)"
          correct: false
    - question: "Which pronoun replaces the Feminine object книга (book)?"
      explanation: "Since книга is Feminine, you use вона (she)."
      options:
        - text: "вона (she)"
          correct: true
        - text: "він (he)"
          correct: false
        - text: "воно (it)"
          correct: false
        - text: "я (I)"
          correct: false
    - question: "Which pronoun perfectly matches the Neuter word сонце (sun)?"
      explanation: "Сонце ends in -е and is a Neuter word, so we use воно."
      options:
        - text: "воно (it)"
          correct: true
        - text: "він (he)"
          correct: false
        - text: "вона (she)"
          correct: false
        - text: "я (I)"
          correct: false
    - question: "How do you correctly say 'my dad'?"
      explanation: "Since тато is a biological male, it is Masculine. Therefore, we use the masculine form мій."
      options:
        - text: "мій тато"
          correct: true
        - text: "моє тато"
          correct: false
        - text: "моя тато"
          correct: false
        - text: "я тато"
          correct: false

