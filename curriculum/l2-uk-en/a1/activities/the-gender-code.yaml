- type: quiz
  title: 'Final Gender Review'
  instruction: 'One last check on your gender pattern recognition.'
  items:
    - question: "How do you say 'My name' in Ukrainian?"
      options:
        - text: "Моє ім'я"
          correct: true
        - text: "Моя ім'я"
          correct: false
        - text: "Мій ім'я"
          correct: false
        - text: "Моє ім'я — це"
          correct: false
      explanation: "Ім'я is neuter, so it takes моє."
    - question: 'What is the gender of "день" (day)?'
      options:
        - text: 'Masculine'
          correct: true
        - text: 'Feminine'
          correct: false
        - text: 'Neuter'
          correct: false
        - text: 'Plural'
          correct: false
      explanation: "Even with a soft sign, день is masculine."
    - question: 'Which ending is most common for feminine nouns?'
      options:
        - text: '-а'
          correct: true
        - text: '-о'
          correct: false
        - text: '-е'
          correct: false
        - text: '-consonant'
          correct: false
      explanation: "The letter -а is the standard feminine marker."
    - question: 'Which ending is most common for neuter nouns?'
      options:
        - text: '-о'
          correct: true
        - text: '-а'
          correct: false
        - text: '-consonant'
          correct: false
        - text: '-я'
          correct: false
      explanation: "The round -о is the most common neuter ending."
    - question: 'How do you say "My house"?'
      options:
        - text: 'Мій дім'
          correct: true
        - text: 'Моя дім'
          correct: false
        - text: 'Моє дім'
          correct: false
        - text: 'Мій дома'
          correct: false
      explanation: "Дім is masculine, so it takes мій."
    - question: 'Which of these nouns is feminine?'
      options:
        - text: 'сіль'
          correct: true
        - text: 'стіл'
          correct: false
        - text: 'тато'
          correct: false
        - text: 'сонце'
          correct: false
      explanation: "Сіль is a feminine noun."
    - question: 'What is the gender of **Микола**?'
      options:
        - text: 'Masculine'
          correct: true
        - text: 'Feminine'
          correct: false
        - text: 'Neuter'
          correct: false
        - text: 'None'
          correct: false
      explanation: 'Biological male name.'
    - question: 'What is the gender of **земля**?'
      options:
        - text: 'Feminine'
          correct: true
        - text: 'Masculine'
          correct: false
        - text: 'Neuter'
          correct: false
        - text: 'Both'
          correct: false
      explanation: 'Ends in -я.'
