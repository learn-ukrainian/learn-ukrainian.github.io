      items: ["брат", "дім", "стіл", "хліб", "тато", "день"]
    - name: "Feminine (Вона)"
      items: ["сестра", "мама", "книга", "земля", "ніч", "зона"]
    - name: "Neuter (Воно)"
      items: ["вікно", "місто", "серце", "море", "сонце", "імʼя"]

