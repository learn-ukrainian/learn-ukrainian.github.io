- type: quiz
  title: 'Test Your Gender Intuition'
  items:
    - question: "You see the word артефакт (artifact) on a sign. What is its gender?"
      explanation: "It ends in a consonant, so it follows the Masculine pattern."
      options:
        - text: "Masculine"
          correct: true
        - text: "Feminine"
          correct: false
        - text: "Neuter"
          correct: false
        - text: "Unknown"
          correct: false
    - question: "You see the word зона (zone) on a map. What is its gender?"
      explanation: "It ends in -а, so it belongs to the Feminine family."
      options:
        - text: "Feminine"
          correct: true
        - text: "Masculine"
          correct: false
        - text: "Neuter"
          correct: false
        - text: "Both masculine and feminine"
          correct: false
    - question: "You see the word укриття (shelter) in a game. What is its gender?"
      explanation: "Words ending in -я can be feminine, but укриття specifically follows the neuter pattern of Family 2 or 4."
      options:
        - text: "Neuter"
          correct: true
        - text: "Masculine"
          correct: false
        - text: "Feminine"
          correct: false
        - text: "It is a plural word"
          correct: false
    - question: "How do you say 'My name' using the word імʼя?"
      explanation: "Імʼя is neuter, so we use the pronoun моє."
      options:
        - text: "моє імʼя"
          correct: true
        - text: "мій імʼя"
          correct: false
        - text: "моя імʼя"
          correct: false
        - text: "мій або моя імʼя"
          correct: false
    - question: "Which of these words ends the same way as сонце (sun)?"
      explanation: "Сонце and серце both end in -е and are neuter."
      options:
        - text: "серце"
          correct: true
        - text: "місто"
          correct: false
        - text: "дім"
          correct: false
        - text: "книга"
          correct: false
    - question: "What is the common ending for Neuter (Середній рід) words?"
      explanation: "The Circle rule states that -о or -е are the neuter endings."
      options:
        - text: "-о or -е"
          correct: true
        - text: "a consonant"
          correct: false
        - text: "-а or -я"
          correct: false
        - text: "the soft sign -ь"
          correct: false
    - question: "Which word represents a 'He' (він) in Ukrainian grammar?"
      explanation: "Дім is masculine, so it is referred to as 'he'."
      options:
        - text: "дім"
          correct: true
        - text: "мама"
          correct: false
        - text: "вікно"
          correct: false
        - text: "місто"
          correct: false
    - question: "Which word represents a 'She' (вона) in Ukrainian grammar?"
      explanation: "Книга is feminine, so it is referred to as 'she'."
      options:
        - text: "книга"
          correct: true
        - text: "брат"
          correct: false
        - text: "серце"
          correct: false
        - text: "стіл"
          correct: false

