- type: "group-sort"
  title: "Sort the Nouns by Gender"
  instruction: "Drag and drop the nouns into the correct gender buckets based on their endings."
  groups:
    - name: "Masculine (Consonant)"
      items:
        - "стіл"
        - "дім"
        - "брат"
        - "артефакт"
    - name: "Feminine (-а / -я)"
      items:
        - "книга"
        - "сестра"
        - "зона"
        - "земля"
    - name: "Neuter (-о / -е)"
      items:
        - "вікно"
        - "місто"
        - "море"
        - "сонце"

