      answer: "чоловіча"
      options: ["чоловіча", "жіноча", "середня", "приголосна"]
    - sentence: "Ніч — це ___ рід."
      answer: "жіночий"
      options: ["чоловічий", "жіночий", "середній", "приголосний"]

