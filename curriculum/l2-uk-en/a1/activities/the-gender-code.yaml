- type: "true-false"
  title: "True or False: Gender Rules and Exceptions"
  instruction: "Determine if the following statements about Ukrainian noun genders are true or false."
  items:
    - statement: "The word тато (dad) is Neuter because it ends in the letter -о."
      correct: false
      explanation: "Biological sex overrides the ending. Because a dad is male, тато is Masculine."
    - statement: "In Ukrainian, inanimate objects like a table or a book can be Masculine or Feminine."
      correct: true
      explanation: "Grammatical gender applies to all nouns, not just people or animals. A table is Masculine and a book is Feminine."
    - statement: "The word ім'я (name) is Feminine because it ends in -я."
      correct: false
      explanation: "The word ім'я is a special exception. It is always Neuter despite ending in -я."
    - statement: "Words ending in the soft sign (-ь) can be either Masculine or Feminine, so their gender must be memorized."
      correct: true
      explanation: "The soft sign does not give a clear gender pattern. For example, день is Masculine but ніч is Feminine."
    - statement: "To test if a word is Feminine, you can try saying моя in front of it."
      correct: true
      explanation: "The word моя is the feminine word for my, and using it is a great diagnostic test for feminine nouns."
    - statement: "The word місто (city) belongs in the Neuter category because it ends in -о."
      correct: true
      explanation: "Words ending in the round vowels -о or -е are typically Neuter."
    - statement: "You should always use the word воно (it) when referring to inanimate objects."
      correct: false
      explanation: "You must use the pronoun that matches the grammatical gender of the object: він (he), вона (she), or воно (it)."
    - statement: "The word собака (dog) is grammatically Feminine, even though it ends in -а."
      correct: true
      explanation: "The word собака ends in -а, and it is grammatically classified as a Feminine word."

- type: "match-up"
  title: "The 'My' Test"
  instruction: "Match each noun with the correct form of the word my."
  pairs:
    - left: "брат (brother)"
      right: "мій брат"
    - left: "сестра (sister)"
      right: "моя сестра"
    - left: "місто (city)"
      right: "моє місто"
    - left: "дім (house)"
      right: "мій дім"
    - left: "книга (book)"
      right: "моя книга"
    - left: "вікно (window)"
      right: "моє вікно"
    - left: "тато (dad)"
      right: "мій тато"
    - left: "ім'я (name)"
      right: "моє ім'я"

