- type: quiz
  title: Граматичний тест
  instruction: Дайте відповідь на граматичні запитання.
  items:
  - question: У реченні «Я йду в парк», який відмінок ми використовуємо для напрямку?
    explanation: Це напрямок (Куди?), тому ми використовуємо Знахідний відмінок (Accusative).
    options:
    - text: Знахідний (Accusative)
      correct: true
    - text: Місцевий (Locative)
      correct: false
    - text: Називний (Nominative)
      correct: false
    - text: Родовий (Genitive)
      correct: false
  - question: У реченні «Книга на столі», який відмінок ми використовуємо для місця?
    explanation: Це місце (Де?), тому ми використовуємо Місцевий відмінок (Locative).
    options:
    - text: Місцевий (Locative)
      correct: true
    - text: Знахідний (Accusative)
      correct: false
    - text: Називний (Nominative)
      correct: false
    - text: Родовий (Genitive)
      correct: false
  - question: 'Визначте граматичний рід іменника «вікно» (закінчення -о):'
    explanation: Слова, що закінчуються на -о або -е, зазвичай середнього роду.
    options:
    - text: Середній (Воно)
      correct: true
    - text: Чоловічий (Він)
      correct: false
    - text: Жіночий (Вона)
      correct: false
    - text: Множина
      correct: false
  - question: 'Визначте граматичний рід іменника «день» (з м''яким знаком):'
    explanation: Слова на м'який знак можуть бути чоловічого або жіночого роду. День
      — це він.
    options:
    - text: Чоловічий (Він)
      correct: true
    - text: Жіночий (Вона)
      correct: false
    - text: Середній (Воно)
      correct: false
    - text: Множина
      correct: false
  - question: Який граматичний час у реченні «Ми були вдома»?
    explanation: Слово «були» вказує на минулий час.
    options:
    - text: Минулий
      correct: true
    - text: Теперішній
      correct: false
    - text: Майбутній
      correct: false
    - text: Інфінітив
      correct: false
  - question: Який граматичний час у реченні «Я буду читати»?
    explanation: Конструкція «буду + інфінітив» вказує на майбутній час.
    options:
    - text: Майбутній
      correct: true
    - text: Теперішній
      correct: false
    - text: Минулий
      correct: false
    - text: Інфінітив
      correct: false
  - question: Який відмінок потрібен після слова «немає» (заперечення)?
    explanation: Для заперечення (відсутності) ми використовуємо Родовий відмінок
      (Genitive).
    options:
    - text: Родовий (Genitive)
      correct: true
    - text: Називний (Nominative)
      correct: false
    - text: Знахідний (Accusative)
      correct: false
    - text: Місцевий (Locative)
      correct: false
  - question: Як правильно перекласти фразу «I have» українською мовою?
    explanation: Українською ми кажемо «У мене є».
    options:
    - text: У мене є
      correct: true
    - text: Я маю є
      correct: false
    - text: Я є
      correct: false
    - text: У мене
      correct: false
