version: '1.0'
module: checkpoint-my-world
level: a1
inline:
- id: group-sort-categories
  type: group-sort
  instruction: Розподіліть слова за категоріями (Sort the words into categories)
  groups:
  - label: Речі (Objects)
    items:
    - стіл
    - вікно
    - лампа
    - ручка
  - label: Кольори (Colors)
    items:
    - жовтий
    - синій
    - зелений
    - білий
  - label: Числа (Numbers)
    items:
    - десять
    - сто
    - два
    - три
- id: transform-plural-sentences
  type: quiz
  instruction: Оберіть правильну форму множини (Choose the correct plural form)
  items:
  - question: Цей великий стіл.
    options:
    - Ці великі столи.
    - Цей великі стіл.
    - Ці великі стіли.
    correct: 0
  - question: Ця синя книга.
    options:
    - Ці сині книги.
    - Ці синя книги.
    - Ця сині книги.
    correct: 0
  - question: Це нове вікно.
    options:
    - Ці нові вікна.
    - Це нові вікна.
    - Ці нове вікна.
    correct: 0
  - question: Ця стара лампа.
    options:
    - Ці старі лампи.
    - Ті старі лампи.
    - Ці старий лампи.
    correct: 0
  - question: Той гарний день.
    options:
    - Ті гарні дні.
    - Ті гарний дні.
    - Той гарні дні.
    correct: 0
  - question: Цей зручний стілець.
    options:
    - Ці зручні стільці.
    - Ці зручний стільці.
    - Цей зручні стільці.
    correct: 0
  - question: Це мале дзеркало.
    options:
    - Ці малі дзеркала.
    - Ці мале дзеркала.
    - Це малі дзеркала.
    correct: 0
  - question: Та біла стіна.
    options:
    - Ті білі стіни.
    - Та білі стіни.
    - Ті біла стіни.
    correct: 0
- id: quiz-agreement-pairs
  type: quiz
  instruction: Оберіть правильну форму прикметника (Choose the correct adjective form)
  items:
  - question: _____ стіл
    options:
    - великий
    - велика
    - велике
    correct: 0
  - question: _____ ручка
    options:
    - новий
    - нова
    - нове
    correct: 1
  - question: _____ вікно
    options:
    - чистий
    - чиста
    - чисте
    correct: 2
  - question: _____ дзеркало
    options:
    - старий
    - стара
    - старе
    correct: 2
  - question: _____ день
    options:
    - гарний
    - гарна
    - гарне
    correct: 0
  - question: _____ пісня
    options:
    - красивий
    - красива
    - красиве
    correct: 1
  - question: _____ фото
    options:
    - новий
    - нова
    - нове
    correct: 2
  - question: _____ кімната
    options:
    - великий
    - велика
    - велике
    correct: 1
  - question: _____ одяг
    options:
    - новий
    - нова
    - нове
    correct: 0
  - question: _____ вишиванка
    options:
    - білий
    - біла
    - біле
    correct: 1
- id: fill-in-market-dialogue
  type: fill-in
  instruction: Заповніть пропуски в діалозі (Complete the dialogue)
  items:
  - sentence: Подивись! Це ____ вишиванка?
    answer: гарна
    options:
    - гарна
    - гарний
    - гарне
  - sentence: А ____ синя?
    answer: та
    options:
    - той
    - та
    - те
  - sentence: Той ____ теж гарний.
    answer: одяг
    options:
    - одяг
    - кімната
    - вікно
  - sentence: А ось ____ писанки — дуже красиві!
    answer: ці
    options:
    - цей
    - ця
    - ці
  - sentence: Скільки ____ цей глечик?
    answer: коштує
    options:
    - коштує
    - є
    - стіл
  - sentence: Він коштує ____ гривень.
    answer: сто
    options:
    - один
    - два
    - сто
  - sentence: А ____ намиста?
    answer: ці
    options:
    - цей
    - ця
    - ці
  - sentence: У мене є ____ гривень. Купуємо!
    answer: триста
    options:
    - три
    - один
    - триста
workbook:
- id: wb-match-up-pronouns
  type: match-up
  instruction: З'єднайте іменник із займенником (Match the noun to the pronoun)
  pairs:
  - left: стіл
    right: він
  - left: лампа
    right: вона
  - left: вікно
    right: воно
  - left: стільці
    right: вони
  - left: дзеркало
    right: воно
  - left: ручка
    right: вона
  - left: одяг
    right: він
  - left: книги
    right: вони
- id: wb-group-sort-gender
  type: group-sort
  instruction: Розподіліть слова за родами (Sort the words by gender)
  groups:
  - label: Він (Masculine)
    items:
    - одяг
    - глечик
    - стіл
    - день
  - label: Вона (Feminine)
    items:
    - вишиванка
    - кімната
    - стіна
    - ручка
  - label: Воно (Neuter)
    items:
    - дзеркало
    - намисто
    - фото
    - вікно
- id: wb-true-false-agreement
  type: true-false
  instruction: Чи правильно узгоджені слова? (Are the words agreed correctly?)
  items:
  - statement: гарна стіл
    correct: false
    explanation: Стіл is masculine (він), so it should be гарний стіл.
  - statement: велике вікно
    correct: true
    explanation: Вікно is neuter (воно), and велике is the correct neuter adjective.
  - statement: старий ручка
    correct: false
    explanation: Ручка is feminine (вона), so it should be стара ручка.
  - statement: нові книги
    correct: true
    explanation: Книги is plural (вони), and нові is the correct plural adjective.
  - statement: ця дзеркало
    correct: false
    explanation: Дзеркало is neuter (воно), so it should be це дзеркало.
  - statement: той день
    correct: true
    explanation: День is masculine (він), and той is the correct masculine demonstrative.
- id: wb-error-correction
  type: error-correction
  instruction: Знайдіть і виправте помилку (Find and fix the error)
  items:
  - sentence: У мене є два стілець.
    error: стілець
    correction: стільці
    error_type: word
    options:
    - стільці
    - стілеці
    - стільця
    explanation: Після 'два' потрібна форма множини.
  - sentence: Скільки коштує ця глечик?
    error: ця
    correction: цей
    error_type: word
    options:
    - цей
    - це
    - ці
    explanation: Глечик is masculine (він), so use цей.
  - sentence: Це гарний вишиванка.
    error: гарний
    correction: гарна
    error_type: word
    options:
    - гарна
    - гарне
    - гарні
    explanation: Вишиванка is feminine (вона), so use гарна.
  - sentence: Там є три синій книги.
    error: синій
    correction: сині
    error_type: word
    options:
    - сині
    - синя
    - синє
    explanation: Книги is plural (вони), so use сині.
  - sentence: Той намисто коштує сто гривень.
    error: Той
    correction: Те
    error_type: word
    options:
    - Те
    - Та
    - Ті
    explanation: Намисто is neuter (воно), so use те.
  - sentence: Ця вікно дуже велике.
    error: Ця
    correction: Це
    error_type: word
    options:
    - Це
    - Цей
    - Ці
    explanation: Вікно is neuter (воно), so use це.
- id: wb-translate
  type: translate
  instruction: Оберіть правильний переклад (Choose the correct translation)
  items:
  - source: This is my room.
    options:
    - text: Це моя кімната.
      correct: true
    - text: Це мій кімната.
      correct: false
    - text: Це моє кімната.
      correct: false
  - source: How much does this cost?
    options:
    - text: Скільки це коштує?
      correct: true
    - text: Скільки це є?
      correct: false
    - text: Де це коштує?
      correct: false
  - source: I have one hundred hryvnias.
    options:
    - text: У мене є сто гривень.
      correct: true
    - text: У мене є одна гривня.
      correct: false
    - text: Я маю сто гривня.
      correct: false
  - source: This window is big.
    options:
    - text: Це вікно велике.
      correct: true
    - text: Ця вікно велика.
      correct: false
    - text: Цей вікно великий.
      correct: false
  - source: These are beautiful shirts.
    options:
    - text: Ці вишиванки гарні.
      correct: true
    - text: Ця вишиванка гарна.
      correct: false
    - text: Ці вишиванки гарний.
      correct: false
  - source: Here is my table.
    options:
    - text: Ось мій стіл.
      correct: true
    - text: Тут моя стіл.
      correct: false
    - text: Ось моє стіл.
      correct: false
- id: wb-unjumble
  type: unjumble
  instruction: Складіть правильне речення (Build the correct sentence)
  items:
  - words:
    - велика
    - і
    - Вона
    - світла.
    correct_order:
    - Вона
    - велика
    - і
    - світла.
  - words:
    - стіл.
    - мій
    - Ось
    correct_order:
    - Ось
    - мій
    - стіл.
  - words:
    - є
    - сто
    - мене
    - У
    - гривень.
    correct_order:
    - У
    - мене
    - є
    - сто
    - гривень.
  - words:
    - цей
    - коштує
    - Скільки
    - глечик?
    correct_order:
    - Скільки
    - коштує
    - цей
    - глечик?
  - words:
    - красиві!
    - А
    - ці
    - дуже
    - писанки
    correct_order:
    - А
    - ці
    - писанки
    - дуже
    - красиві!
  - words:
    - є
    - два
    - У
    - мене
    - стільці.
    correct_order:
    - У
    - мене
    - є
    - два
    - стільці.
