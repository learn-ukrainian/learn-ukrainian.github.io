- id: fill-in-shopping-dialogue
  type: fill-in
  instruction: Complete the shopping dialogue. Choose the correct word for each blank
  items:
  - sentence: — _____ вишиванка синя й червона. (This one, near me — feminine)
    answer: Ця
    options:
    - Ця
    - Цей
    - Це
    - Та
  - sentence: — _____ глечик великий. (That one, far away — masculine)
    answer: Той
    options:
    - Той
    - Та
    - Те
    - Цей
  - sentence: — _____ намисто червоне. (This one, near me — neuter)
    answer: Це
    options:
    - Це
    - Цей
    - Ця
    - Те
  - sentence: — Скільки коштує _____ синя вишиванка?
    answer: ця
    options:
    - ця
    - цей
    - це
    - той
  - sentence: — Вона коштує _____ гривень. (400)
    answer: чотириста
    options:
    - чотириста
    - сорок
    - чотири
    - сімдесят
  - sentence: — Маленький глечик коштує _____ гривень. (150)
    answer: сто п'ятдесят
    options:
    - сто п'ятдесят
    - п'ятдесят
    - двісті
    - сто двадцять
  - sentence: — _____ писанки, будь ласка! (Three)
    answer: Три
    options:
    - Три
    - Один
    - Два
    - Десять
  - sentence: — Одна писанка коштує двадцять _____ гривень.
    answer: п'ять
    options:
    - п'ять
    - п'ятдесят
    - двадцять
    - десять
workbook:
- id: match-up-noun-gender
  type: match-up
  instruction: 'Match each noun to the correct **займенник** (pronoun): **він**, **вона**,
    or **воно**'
  pairs:
  - left: стіл
    right: він
  - left: книга
    right: вона
  - left: вікно
    right: воно
  - left: глечик
    right: він
  - left: лампа
    right: вона
  - left: намисто
    right: воно
  - left: вишиванка
    right: вона
  - left: зошит
    right: він
- id: true-false-reading
  type: true-false
  instruction: Read the room description again. True or false?
  items:
  - statement: The table in the room is big and brown.
    correct: true
    explanation: 'The text says: «Мій стіл великий і коричневий.»'
  - statement: The white lamp is in the corner.
    correct: false
    explanation: 'The yellow lamp is in the corner: «А та лампа жовта — вона стоїть
      у кутку.»'
  - statement: There are three books in the room.
    correct: true
    explanation: 'The text says: «У мене є три книги.»'
  - statement: The painting on the wall is red and green.
    correct: false
    explanation: 'The painting is blue and green: «Картина синя й зелена.»'
  - statement: The window is big and the door is small.
    correct: true
    explanation: 'The text says: «Вікно велике, а двері маленькі.»'
  - statement: The books are new and interesting.
    correct: true
    explanation: 'The text says: «Ці книги нові й цікаві.»'
- id: error-correction-agreement
  type: error-correction
  instruction: Find and correct the agreement error in each sentence
  items:
  - sentence: Це великий книга.
    error: великий
    correction: велика
    error_type: word
    options:
    - велика
    - велике
    - великі
    explanation: 'Книга is feminine (вона), so the adjective must end in -а: велика.'
  - sentence: Мій лампа біла.
    error: Мій
    correction: Моя
    error_type: word
    options:
    - Моя
    - Моє
    - Мої
    explanation: Лампа is feminine (вона), so the possessive must be моя.
  - sentence: Це червона намисто.
    error: червона
    correction: червоне
    error_type: word
    options:
    - червоне
    - червоний
    - червоні
    explanation: 'Намисто is neuter (воно), so the adjective must end in -е: червоне.'
  - sentence: Цей вишиванка синя.
    error: Цей
    correction: Ця
    error_type: word
    options:
    - Ця
    - Це
    - Ці
    explanation: Вишиванка is feminine (вона), so the demonstrative must be ця.
  - sentence: Новий книги цікаві.
    error: Новий
    correction: Нові
    error_type: word
    options:
    - Нові
    - Нова
    - Нове
    explanation: 'Книги is plural. The adjective plural ending is always -і: нові
      книги.'
  - sentence: Той намисто гарне.
    error: Той
    correction: Те
    error_type: word
    options:
    - Те
    - Та
    - Це
    explanation: Намисто is neuter (воно), so the far demonstrative must be те.
- id: match-up-singular-plural
  type: match-up
  instruction: Match each noun to its correct **plural** (множина) form
  pairs:
  - left: стіл
    right: столи
  - left: книга
    right: книги
  - left: вікно
    right: вікна
  - left: лампа
    right: лампи
  - left: вишиванка
    right: вишиванки
  - left: глечик
    right: глечики
  - left: намисто
    right: намиста
  - left: картина
    right: картини
- id: quiz-demonstratives
  type: quiz
  instruction: 'Choose the correct demonstrative: **цей/ця/це** (this, nearby) or
    **той/та/те** (that, far away)'
  items:
  - question: _____ глечик (this one, near me — masculine)
    options:
    - Цей
    - Ця
    - Це
    - Той
    correct: 0
  - question: _____ вишиванка (this one, near me — feminine)
    options:
    - Цей
    - Ця
    - Це
    - Та
    correct: 1
  - question: _____ намисто (this one, near me — neuter)
    options:
    - Цей
    - Ця
    - Це
    - Те
    correct: 2
  - question: _____ стіл (that one, far away — masculine)
    options:
    - Цей
    - Той
    - Та
    - Те
    correct: 1
  - question: _____ лампа (that one, far away — feminine)
    options:
    - Ця
    - Той
    - Та
    - Те
    correct: 2
  - question: _____ вікно (that one, far away — neuter)
    options:
    - Це
    - Той
    - Та
    - Те
    correct: 3
  - question: _____ книги (these — plural)
    options:
    - Цей
    - Ця
    - Ці
    - Ті
    correct: 2
  - question: 'Катя is holding a necklace and says: «_____ намисто червоне.»'
    options:
    - Те
    - Той
    - Це
    - Та
    correct: 2
