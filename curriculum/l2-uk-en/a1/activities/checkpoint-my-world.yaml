version: '1.0'
module: checkpoint-my-world
level: a1
inline:
- id: group-sort-vocab-categories
  type: group-sort
  instruction: 'Sort these words into the correct category: **Предмети** (Objects),
    **Кольори** (Colors), or **Числа** (Numbers)'
  groups:
  - label: Предмети (Objects)
    items:
    - стіл
    - книга
    - лампа
    - вишиванка
    - глечик
  - label: Кольори (Colors)
    items:
    - синій
    - червоний
    - білий
    - жовтий
  - label: Числа (Numbers)
    items:
    - один
    - десять
    - п'ятдесят
    - двісті
- id: quiz-gender-agreement
  type: quiz
  instruction: Choose the correct adjective form to match the **рід** (gender) of
    the noun
  items:
  - question: _____ стіл (big)
    options:
    - великий
    - велика
    - велике
    correct: 0
  - question: _____ книга (big)
    options:
    - великий
    - велика
    - велике
    correct: 1
  - question: _____ вікно (big)
    options:
    - великий
    - велика
    - велике
    correct: 2
  - question: _____ лампа (white)
    options:
    - білий
    - біла
    - біле
    correct: 1
  - question: _____ намисто (red)
    options:
    - червоний
    - червона
    - червоне
    correct: 2
  - question: _____ глечик (small)
    options:
    - маленький
    - маленька
    - маленьке
    correct: 0
  - question: _____ вишиванка (new)
    options:
    - новий
    - нова
    - нове
    correct: 1
  - question: _____ вікно (interesting)
    options:
    - цікавий
    - цікава
    - цікаве
    correct: 2
  - question: _____ стіл (brown)
    options:
    - коричневий
    - коричнева
    - коричневе
    correct: 0
  - question: _____ картина (beautiful)
    options:
    - гарний
    - гарна
    - гарне
    correct: 1
