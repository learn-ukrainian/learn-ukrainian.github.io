version: "1.0"
module: checkpoint-my-world
level: a1

inline:
  - id: group-sort-vocab-categories
    type: group-sort
    instruction: "Sort these words into three categories: objects, colors, and numbers"
    groups:
      - label: "Objects (Об'єкти)"
        items: ["стіл", "книга", "глечик", "вишиванка"]
      - label: "Colors (Кольори)"
        items: ["синій", "червоний", "білий", "жовтий"]
      - label: "Numbers (Числа)"
        items: ["один", "два", "сто", "двадцять"]

  - id: quiz-gender-agreement
    type: quiz
    instruction: "Choose the correct form of the adjective to match the **gender** of the noun"
    items:
      - question: "_____ **стіл** (table, він)"
        options: ["великий", "велика", "велике"]
        correct: 0
      - question: "_____ **лампа** (lamp, вона)"
        options: ["білий", "біле", "біла"]
        correct: 2
      - question: "_____ **вікно** (window, воно)"
        options: ["маленький", "маленьке", "маленька"]
        correct: 1
      - question: "_____ **книга** (book, вона)"
        options: ["нове", "нова", "новий"]
        correct: 1
      - question: "_____ **глечик** (clay jug, він)"
        options: ["жовта", "жовте", "жовтий"]
        correct: 2
      - question: "_____ **намисто** (necklace, воно)"
        options: ["червоний", "червоне", "червона"]
        correct: 1
      - question: "_____ **вишиванка** (embroidered shirt, вона)"
        options: ["синій", "синя", "синє"]
        correct: 1
      - question: "_____ **зошит** (notebook, він)"
        options: ["нова", "нове", "новий"]
        correct: 2
      - question: "_____ **картина** (painting, вона)"
        options: ["гарний", "гарне", "гарна"]
        correct: 2
      - question: "_____ **писанка** (decorated egg, вона)"
        options: ["коричневий", "коричнева", "коричневе"]
        correct: 1

  - id: quiz-singular-plural
    type: quiz
    instruction: "Choose the correct **plural** (множина) form of the noun"
    items:
      - question: "**стіл** → ?"
        options: ["стола", "столи", "столу"]
        correct: 1
      - question: "**книга** → ?"
        options: ["книгу", "книго", "книги"]
        correct: 2
      - question: "**вікно** → ?"
        options: ["вікні", "вікна", "вікно"]
        correct: 1
      - question: "**лампа** → ?"
        options: ["лампу", "лампо", "лампи"]
        correct: 2
      - question: "**глечик** → ?"
        options: ["глечику", "глечики", "глечика"]
        correct: 1
      - question: "**вишиванка** → ?"
        options: ["вишиванко", "вишиванку", "вишиванки"]
        correct: 2
      - question: "**намисто** → ?"
        options: ["намисто", "намисті", "намиста"]
        correct: 2
      - question: "**картина** → ?"
        options: ["картино", "картини", "картину"]
        correct: 1

  - id: fill-in-shopping-dialogue
    type: fill-in
    instruction: "Complete the market dialogue. Choose the correct **demonstrative** or **adjective** form"
    items:
      - sentence: "Це _____ вишиванка. Гарна, правда?"
        answer: "ця"
        options: ["цей", "ця", "це"]
      - sentence: "_____ вишиванка біла."
        answer: "та"
        options: ["ця", "та", "те"]
      - sentence: "Скільки коштує _____ синя вишиванка?"
        answer: "ця"
        options: ["цей", "ця", "це"]
      - sentence: "_____ глечик великий."
        answer: "той"
        options: ["цей", "той", "те"]
      - sentence: "_____ глечик маленький."
        answer: "цей"
        options: ["цей", "той", "це"]
      - sentence: "Це _____ намисто. Гарне, правда?"
        answer: "червоне"
        options: ["червоний", "червона", "червоне"]
      - sentence: "Один глечик коштує _____ гривень."
        answer: "сто п'ятдесят"
        options: ["сто п'ятдесят", "двадцять п'ять", "двісті"]
      - sentence: "Так, _____ писанки, будь ласка!"
        answer: "три"
        options: ["один", "два", "три"]

workbook:
  - id: match-noun-gender
    type: match-up
    instruction: "Match each noun to its pronoun: **він** (m), **вона** (f), or **воно** (n)"
    pairs:
      - left: "стіл"
        right: "він"
      - left: "книга"
        right: "вона"
      - left: "вікно"
        right: "воно"
      - left: "глечик"
        right: "він"
      - left: "вишиванка"
        right: "вона"
      - left: "намисто"
        right: "воно"
      - left: "лампа"
        right: "вона"
      - left: "зошит"
        right: "він"

  - id: fill-in-possessive
    type: fill-in
    instruction: "Choose the correct possessive: **мій** (m), **моя** (f), or **моє** (n)"
    items:
      - sentence: "_____ стіл великий."
        answer: "мій"
        options: ["мій", "моя", "моє"]
      - sentence: "_____ книга нова."
        answer: "моя"
        options: ["мій", "моя", "моє"]
      - sentence: "_____ вікно велике."
        answer: "моє"
        options: ["мій", "моя", "моє"]
      - sentence: "_____ лампа біла."
        answer: "моя"
        options: ["мій", "моя", "моє"]
      - sentence: "_____ глечик жовтий."
        answer: "мій"
        options: ["мій", "моя", "моє"]
      - sentence: "_____ намисто червоне."
        answer: "моє"
        options: ["мій", "моя", "моє"]
      - sentence: "_____ вишиванка синя."
        answer: "моя"
        options: ["мій", "моя", "моє"]
      - sentence: "_____ зошит новий."
        answer: "мій"
        options: ["мій", "моя", "моє"]

  - id: match-singular-plural
    type: match-up
    instruction: "Match each noun to its plural form (однина → множина)"
    pairs:
      - left: "стіл"
        right: "столи"
      - left: "книга"
        right: "книги"
      - left: "вікно"
        right: "вікна"
      - left: "глечик"
        right: "глечики"
      - left: "вишиванка"
        right: "вишиванки"
      - left: "намисто"
        right: "намиста"
      - left: "лампа"
        right: "лампи"
      - left: "картина"
        right: "картини"

  - id: error-correction-agreement
    type: error-correction
    instruction: "Find and fix the **gender agreement** error in each sentence"
    items:
      - sentence: "Це великий лампа."
        error: "великий"
        correction: "велика"
        error_type: "word"
        options: ["велика", "велике", "великі"]
        explanation: "**Лампа** is feminine (вона), so the adjective needs the feminine ending **-а**: велика."
      - sentence: "Це нове стіл."
        error: "нове"
        correction: "новий"
        error_type: "word"
        options: ["новий", "нова", "нові"]
        explanation: "**Стіл** is masculine (він), so the adjective needs the masculine ending **-ий**: новий."
      - sentence: "Це синя намисто."
        error: "синя"
        correction: "синє"
        error_type: "word"
        options: ["синє", "синій", "сині"]
        explanation: "**Намисто** is neuter (воно), so the adjective needs the neuter ending **-є**: синє."
      - sentence: "Ця глечик великий."
        error: "Ця"
        correction: "Цей"
        error_type: "word"
        options: ["Цей", "Це", "Ці"]
        explanation: "**Глечик** is masculine (він), so the demonstrative must be masculine: **цей**."
      - sentence: "Той вишиванка синя."
        error: "Той"
        correction: "Та"
        error_type: "word"
        options: ["Та", "Те", "Ті"]
        explanation: "**Вишиванка** is feminine (вона), so the demonstrative must be feminine: **та**."
      - sentence: "Ці книга нова."
        error: "Ці"
        correction: "Ця"
        error_type: "word"
        options: ["Ця", "Цей", "Це"]
        explanation: "**Книга** is singular feminine. For a single nearby feminine noun, use **ця**, not plural **ці**."

  - id: true-false-reading
    type: true-false
    instruction: "Read the Читання passage again and decide: true or false?"
    items:
      - statement: "The table in the room is big and brown."
        correct: true
        explanation: "**Мій стіл великий і коричневий.** ✓"
      - statement: "The lamp on the table is yellow."
        correct: false
        explanation: "The lamp on the table is white (**ця лампа біла**). The yellow lamp stands in the corner."
      - statement: "There are two books in the room."
        correct: false
        explanation: "**У мене є три книги** — there are three books, not two."
      - statement: "The books are new and interesting."
        correct: true
        explanation: "**Ці книги нові й цікаві.** ✓"
      - statement: "The painting on the wall is red and blue."
        correct: false
        explanation: "**Картина синя й зелена** — it is blue and green, not red and blue."
      - statement: "The window in the room is big."
        correct: true
        explanation: "**Вікно велике.** ✓"
      - statement: "The door is small."
        correct: true
        explanation: "**Двері маленькі.** ✓"

  - id: quiz-numbers-prices
    type: quiz
    instruction: "Choose the correct Ukrainian expression for each price"
    items:
      - question: "400 UAH"
        options: ["чотириста гривень", "сорок гривень", "чотири гривні"]
        correct: 0
      - question: "150 UAH"
        options: ["двісті гривень", "сто п'ятдесят гривень", "п'ятдесят гривень"]
        correct: 1
      - question: "25 UAH"
        options: ["двадцять гривень", "п'ять гривень", "двадцять п'ять гривень"]
        correct: 2
      - question: "200 UAH"
        options: ["два гривні", "двісті гривень", "двадцять гривень"]
        correct: 1
      - question: "100 UAH"
        options: ["один гривень", "десять гривень", "сто гривень"]
        correct: 2
      - question: "20 UAH"
        options: ["два гривні", "двадцять гривень", "двісті гривень"]
        correct: 1

  - id: observe-adjective-endings
    type: observe
    examples:
      - "**великий** стіл — він (masculine: ends in **-ий**)"
      - "**велика** книга — вона (feminine: ends in **-а**)"
      - "**велике** вікно — воно (neuter: ends in **-е**)"
      - "**великі** столи / книги / вікна — plural: always ends in **-і**"
    prompt: "What pattern connects the adjective ending to the noun gender? And what single ending do ALL plural adjectives share, regardless of the noun's original gender?"
