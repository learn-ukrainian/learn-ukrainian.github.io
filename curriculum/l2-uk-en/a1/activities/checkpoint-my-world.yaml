    options:
    - великий
    - велика
    - велике
    correct: 0
  - question: _____ книга
    options:
    - великий
    - велика
    - велике
    correct: 1
  - question: _____ вікно
    options:
    - великий
    - велика
    - велике
    correct: 2
  - question: _____ лампа
    options:
    - маленький
    - маленька
    - маленьке
    correct: 1
  - question: _____ глечик
    options:
    - коричневий
    - коричнева
    - коричневе
    correct: 0
  - question: _____ намисто
    options:
    - синій
    - синя
    - синє
    correct: 2
  - question: _____ вишиванка
    options:
    - гарний
    - гарна
    - гарне
    correct: 1
  - question: _____ зошит
    options:
    - новий
    - нова
    - нове
    correct: 0
  - question: _____ сумка
    options:
    - червоний
