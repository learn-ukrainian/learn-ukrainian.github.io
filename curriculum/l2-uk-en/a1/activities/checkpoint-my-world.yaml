- id: true-false-grammar-rules
  type: true-false
  instruction: Are these statements about Ukrainian grammar true or false?
  items:
  - statement: The word «стіл» (table) is feminine.
    correct: false
    explanation: «Стіл» ends in a consonant, so it is masculine.
  - statement: The word «книга» (book) is feminine.
    correct: true
    explanation: Nouns ending in -а are typically feminine.
  - statement: The word «вікно» (window) is neuter.
    correct: true
    explanation: Nouns ending in -о or -е are neuter.
  - statement: «Великий» is the feminine form of the adjective.
    correct: false
    explanation: «Великий» is the masculine form. The feminine form is «велика».
  - statement: To say 'these tables' in Ukrainian, you say «ці столи».
    correct: true
    explanation: «Ці» is the plural form of 'this/these', and «столи» is plural.
  - statement: Adjectives always end in -і in the plural form.
    correct: true
    explanation: Yes, plural adjectives take the -і ending, like «нові» or «великі».
  - statement: «Той» is used for feminine objects.
    correct: false
    explanation: «Той» is masculine. The feminine form is «та».
  - statement: «Синій» means light blue.
    correct: false
    explanation: «Синій» means dark blue. Light blue is «блакитний».
  - statement: «Двісті» means two hundred.
    correct: true
    explanation: Yes, «двісті» is 200.
  - statement: The plural of «книга» is «книго».
    correct: false
    explanation: The plural of «книга» is «книги».
