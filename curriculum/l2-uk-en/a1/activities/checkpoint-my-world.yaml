workbook:
- type: match-up
  instruction: 'Match each noun to its gender pronoun (**він**, **вона**, or **воно**).
    Use the ending rule: consonant → він, **-а/-я** → вона, **-о/-е** → воно.'
  pairs:
  - left: стіл
    right: він
  - left: книга
    right: вона
  - left: вікно
    right: воно
  - left: лампа
    right: вона
  - left: глечик
    right: він
  - left: намисто
    right: воно
  - left: вишиванка
    right: вона
  - left: зошит
    right: він
- type: error-correction
  instruction: Each sentence has ONE wrong word — the adjective or demonstrative does
    not agree with the noun. Find the error and choose the correct form.
  items:
  - sentence: Великий книга на столі.
    error: Великий
    correction: Велика
    error_type: word
    options:
    - Великий
    - Велика
    - Велике
    explanation: 'книга is feminine (ends in -а), so the adjective must be feminine:
      Велика.'
  - sentence: Нове стіл коричневий.
    error: Нове
    correction: Новий
    error_type: word
    options:
    - Новий
    - Нова
    - Нове
    explanation: 'стіл is masculine (ends in a consonant), so the adjective must be
      masculine: Новий.'
  - sentence: Синя вікно велике.
    error: Синя
    correction: Синє
    error_type: word
    options:
    - Синій
    - Синя
    - Синє
    explanation: вікно is neuter (ends in -о), and синій is a soft-stem adjective,
      so the neuter form is Синє.
  - sentence: Ця глечик маленький.
    error: Ця
    correction: Цей
    error_type: word
    options:
    - Цей
    - Ця
    - Це
    explanation: 'глечик is masculine (ends in a consonant), so the demonstrative
      must be masculine: Цей.'
  - sentence: Це лампа жовта.
    error: Це
    correction: Ця
    error_type: word
    options:
    - Цей
    - Ця
    - Це
    explanation: 'лампа is feminine (ends in -а), so the demonstrative must be feminine:
      Ця.'
  - sentence: Той вишиванка гарна.
    error: Той
    correction: Та
    error_type: word
    options:
    - Той
    - Та
    - Те
    explanation: 'вишиванка is feminine, so the distal demonstrative must also be
      feminine: Та.'
- type: true-false
  instruction: 'Read each statement about the reading passage and decide: **правда**
    (true) or **ні** (false).'
  items:
  - statement: Стіл великий і коричневий.
    correct: true
    explanation: 'The text says: «Мій стіл великий і коричневий.»'
  - statement: На столі є п'ять книг.
    correct: false
    explanation: 'The text says: «На столі є три книги.» — three books, not five.'
  - statement: Маленька лампа біла.
    correct: true
    explanation: 'The text says: «Моя лампа маленька і біла.»'
  - statement: Та лампа синя.
    correct: false
    explanation: 'The text says: «А та лампа жовта.» — that lamp is yellow, not blue.'
  - statement: Олівці жовті й сині.
    correct: true
    explanation: 'The text says: «Олівці жовті й сині.»'
  - statement: За вікном є парк.
    correct: true
    explanation: 'The text says: «За вікном є парк.»'
  - statement: Стіни жовті.
    correct: false
    explanation: 'The text says: «Мої стіни білі.» — the walls are white, not yellow.'
- type: fill-in
  instruction: 'Fill in the correct demonstrative: **цей** (m), **ця** (f), **це**
