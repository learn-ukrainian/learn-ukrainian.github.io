- id: group-sort-function
  type: group-sort
  instruction: Питання чи зв'язка? (Question or conjunction?)
  groups:
  - label: Питання (Question)
    items:
    - Що це?
    - Де мій брат?
    - Коли ти прийдеш?
    - Де нове кафе?
  - label: Зв'язка (Conjunction)
    items:
    - Я знаю, що він тут.
    - Скажи, коли закінчиш.
    - Ми бачимо, де парк.
    - Я думаю, що це правда.
- id: true-false-grammar
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Перед словом «що» у складному реченні завжди потрібна кома.
    correct: true
    explanation: У складному реченні перед «що» завжди ставимо кому.
  - statement: Перед словом «де» у складному реченні завжди потрібна кома.
    correct: true
    explanation: Кома розділяє частини складного речення.
  - statement: Перед словом «коли» у складному реченні завжди потрібна кома.
    correct: true
    explanation: Перед «коли» в середині складного речення завжди є кома.
  - statement: Слово «де» може бути тільки питанням.
    correct: false
    explanation: Воно може бути і питанням, і зв'язкою.
  - statement: «Я знаю що він тут.» — це правильне речення.
    correct: false
    explanation: 'Потрібна кома: «Я знаю, що він тут.»'
  - statement: «Де мій телефон?» — це питання.
    correct: true
    explanation: Слово «де» стоїть на початку, це питання.
