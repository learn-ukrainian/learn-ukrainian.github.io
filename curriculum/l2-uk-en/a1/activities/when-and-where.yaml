- type: error-correction
  instruction: Знайдіть і виправте помилку у з'єднанні (Find and fix the connection
    mistake)
  items:
  - sentence: Я не знаю, що мій телефон.
    error: що
    correction: де
    error_type: word
    options:
    - де
    - коли
    - хто
    explanation: Телефон — це предмет, ми шукаємо місце (де).
  - sentence: Скажи мені, де ти прийдеш додому.
    error: де
    correction: коли
    error_type: word
    options:
    - коли
    - що
    - який
    explanation: Питаємо про час (коли).
  - sentence: Він думає, де це правильно.
    error: де
    correction: що
    error_type: word
    options:
    - що
    - коли
    - хто
    explanation: Він висловлює думку, тому з'єднуємо словом 'що'.
  - sentence: Ми бачимо, коли це новий парк.
    error: коли
    correction: що
    error_type: word
    options:
    - що
    - де
    - хто
    explanation: З дієсловом 'бачити' часто використовуємо 'що' для констатації факту.
  - sentence: Я розумію, де треба йти працювати.
    error: де
    correction: коли
    error_type: word
    options:
    - коли
    - що
    - хто
    explanation: Час іти (коли).
  - sentence: Я знаю, що мій брат. Він у школі.
    error: що
    correction: де
    error_type: word
    options:
    - де
    - коли
    - хто
    explanation: Брат знаходиться в певному місці (де).
- type: translate
  instruction: Оберіть правильний переклад (Choose the correct translation)
  items:
  - source: I know that he is here.
    options:
    - text: Я знаю, що він тут.
      correct: true
    - text: Я знаю, де він тут.
      correct: false
    - text: Я знаю що він тут.
      correct: false
  - source: Tell me when you are ready.
    options:
    - text: Скажи мені, коли ти будеш готовий.
      correct: true
    - text: Скажи мені коли ти будеш готовий.
      correct: false
    - text: Скажи мені, що ти будеш готовий.
      correct: false
  - source: He does not know where the store is.
    options:
    - text: Він не знає, де магазин.
      correct: true
    - text: Він не знає, що магазин.
      correct: false
    - text: Він не знає де магазин.
      correct: false
  - source: I think that this is correct.
    options:
    - text: Я думаю, що це правильно.
      correct: true
    - text: Я думаю що це правильно.
      correct: false
    - text: Я думаю, де це правильно.
      correct: false
  - source: Do you hear where the music is playing?
    options:
    - text: Ти чуєш, де грає музика?
      correct: true
    - text: Ти чуєш, що грає музика?
      correct: false
    - text: Ти чуєш де грає музика?
      correct: false
  - source: When I am at home, I rest.
    options:
    - text: Коли я вдома, я відпочиваю.
      correct: true
    - text: Коли я вдома я відпочиваю.
      correct: false
    - text: Що я вдома, я відпочиваю.
      correct: false
- type: true-false
  instruction: Правда чи ні? (True or False?)
  items:
  - statement: Складне речення має головне слово і залежну частину.
    correct: true
    explanation: Так, головне (main) дієслово з'єднується із залежною частиною.
  - statement: Перед словами 'що', 'де', 'коли' кома не потрібна.
    correct: false
    explanation: В українській мові перед 'що', 'де', 'коли' завжди потрібна кома.
  - statement: Слово 'що' може бути запитанням і з'єднанням.
    correct: true
    explanation: Так, 'Що це?' — запитання, 'Я знаю, що це' — з'єднання.
  - statement: В англійській мові завжди потрібна кома перед 'that', як і в українській
      перед 'що'.
    correct: false
    explanation: В англійській мові кома перед 'that' зазвичай не ставиться, але в
      українській перед 'що' вона обов'язкова.
  - statement: Речення 'Коли я вдома, я відпочиваю' — це складне речення.
    correct: true
    explanation: Так, воно має дві частини, з'єднані словом 'коли'.
  - statement: У реченні 'Я знаю, де ти' головне дієслово — 'де'.
    correct: false
    explanation: Головне дієслово тут — 'знаю', а 'де' з'єднує частини.
