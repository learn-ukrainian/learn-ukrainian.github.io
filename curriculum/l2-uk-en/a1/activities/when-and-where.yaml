- id: quiz-comma-placement
  type: quiz
  instruction: Оберіть речення з правильною пунктуацією (Choose the sentence with
    correct punctuation)
  items:
  - question: 'Оберіть правильний варіант:'
    options:
    - Я думаю, що це так.
    - Я думаю що це так.
    - Я, думаю що це так.
    - Я думаю що, це так.
    correct: 0
  - question: 'Оберіть правильний варіант:'
    options:
    - Він знає де мій телефон.
    - Він знає, де мій телефон.
    - Він знає де, мій телефон.
    - Він, знає де мій телефон.
    correct: 1
  - question: 'Оберіть правильний варіант:'
    options:
    - Скажи коли ти будеш готовий.
    - Скажи коли, ти будеш готовий.
    - Скажи, коли ти будеш готовий.
    - Скажи, коли, ти будеш готовий.
    correct: 2
  - question: 'Оберіть правильний варіант:'
    options:
    - Я бачу що ти працюєш.
    - Я бачу що, ти працюєш.
    - Я, бачу що ти працюєш.
    - Я бачу, що ти працюєш.
    correct: 3
  - question: 'Оберіть правильний варіант:'
    options:
    - Коли я вдома, я відпочиваю.
    - Коли я вдома я відпочиваю.
    - Коли, я вдома я відпочиваю.
    - Коли я, вдома я відпочиваю.
    correct: 0
  - question: 'Оберіть правильний варіант:'
    options:
    - Ти знаєш що Олена в Києві?
    - Ти знаєш, що Олена в Києві?
    - Ти, знаєш що Олена в Києві?
    - Ти знаєш що, Олена в Києві?
    correct: 1
  - question: 'Оберіть правильний варіант:'
    options:
    - Я не знаю де саме цей парк.
    - Я не знаю, де саме цей парк.
    - Я не знаю де саме, цей парк.
    - Я не, знаю де саме цей парк.
    correct: 1
  - question: 'Оберіть правильний варіант:'
    options:
    - Коли ми працюємо ми не говоримо.
    - Коли, ми працюємо ми не говоримо.
    - Коли ми працюємо, ми не говоримо.
    - Коли ми працюємо ми, не говоримо.
    correct: 2
- id: quiz-function-id
  type: quiz
  instruction: Яка роль виділеного слова? (What is the role of the highlighted word?)
  items:
  - question: Яка роль слова 'де' у реченні 'Де ти зараз живеш?'
    options:
    - Запитує про місце (Asks about a place)
    - Запитує про час (Asks about time)
    - Запитує про предмет/дію (Asks about an object/action)
    - З'єднує дві частини речення (Connects two parts)
    correct: 0
  - question: Яка роль слова 'де' у реченні 'Я знаю, де він працює.'
    options:
    - Запитує про місце (Asks about a place)
    - Запитує про час (Asks about time)
    - Запитує про предмет/дію (Asks about an object/action)
    - З'єднує дві частини речення (Connects two parts)
    correct: 3
  - question: Яка роль слова 'що' у реченні 'Що це на столі?'
    options:
    - Запитує про місце (Asks about a place)
    - Запитує про час (Asks about time)
    - Запитує про предмет/дію (Asks about an object/action)
    - З'єднує дві частини речення (Connects two parts)
    correct: 2
  - question: Яка роль слова 'що' у реченні 'Я думаю, що це гарне місце.'
    options:
    - Запитує про місце (Asks about a place)
    - Запитує про час (Asks about time)
    - Запитує про предмет/дію (Asks about an object/action)
    - З'єднує дві частини речення (Connects two parts)
    correct: 3
  - question: Яка роль слова 'коли' у реченні 'Коли ти прийдеш додому?'
    options:
    - Запитує про місце (Asks about a place)
    - Запитує про час (Asks about time)
    - Запитує про предмет/дію (Asks about an object/action)
    - З'єднує дві частини речення (Connects two parts)
    correct: 1
  - question: Яка роль слова 'коли' у реченні 'Скажи, коли ти будеш готовий.'
    options:
    - Запитує про місце (Asks about a place)
    - Запитує про час (Asks about time)
    - Запитує про предмет/дію (Asks about an object/action)
    - З'єднує дві частини речення (Connects two parts)
    correct: 3
  - question: Яка роль слова 'де' у реченні 'Я не знаю, де мій телефон.'
    options:
    - Запитує про місце (Asks about a place)
    - Запитує про час (Asks about time)
    - Запитує про предмет/дію (Asks about an object/action)
    - З'єднує дві частини речення (Connects two parts)
    correct: 3
  - question: Яка роль слова 'що' у реченні 'Що він робить там?'
    options:
    - Запитує про місце (Asks about a place)
    - Запитує про час (Asks about time)
    - Запитує про предмет/дію (Asks about an object/action)
    - З'єднує дві частини речення (Connects two parts)
    correct: 2
- id: fill-in-sentence-builder
  type: fill-in
  instruction: Доповніть складне речення (Complete the complex sentence)
  items:
  - sentence: Я думаю, що _____
    answer: це гарне місце
    options:
    - це гарне місце
    - де мій телефон
    - коли він прийде
  - sentence: Він не знає, де _____
    answer: мій телефон
    options:
    - мій телефон
    - що це
    - коли він вдома
  - sentence: Скажи мені, коли _____
    answer: ти будеш готовий
    options:
    - ти будеш готовий
    - де кафе
    - що він робить
  - sentence: Вона каже, що _____
    answer: вона вдома
    options:
    - вона вдома
    - де парк
    - коли ми працюємо
  - sentence: Я бачу, що _____
    answer: ти працюєш
    options:
    - ти працюєш
    - де мій брат
    - коли я прийду
  - sentence: Ти знаєш, де _____
    answer: нове кафе
    options:
    - нове кафе
    - що це
    - коли він там
workbook:
- type: match-up
  instruction: З'єднайте частини складного речення (Match the parts of the complex
    sentence)
  pairs:
  - left: Я думаю, що
    right: це правильно.
  - left: Він не знає, де
    right: нове кафе.
  - left: Скажи, коли
    right: ти будеш готовий.
  - left: Я бачу, що
    right: ти працюєш.
  - left: Ми чуємо, де
    right: грає музика.
  - left: Вона розуміє, що
    right: це важливо.
