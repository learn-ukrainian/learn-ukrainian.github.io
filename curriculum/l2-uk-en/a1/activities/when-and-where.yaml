    options:
    - Я знаю що він тут.
    - Я знаю, що він тут.
    - Я, знаю що він тут.
    correct: 1
  - question: I don't know where she lives.
    options:
    - Я не знаю де вона живе.
    - Я не знаю де, вона живе.
    - Я не знаю, де вона живе.
    correct: 2
  - question: Tell me when you'll come.
    options:
    - Скажи мені коли ти прийдеш.
