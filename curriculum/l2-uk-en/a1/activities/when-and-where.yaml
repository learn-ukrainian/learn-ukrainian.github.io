workbook:
- type: match-up
  instruction: З'єднайте головне речення з правильним сполучником (Match each main
    clause with the correct conjunction)
  pairs:
  - left: Я знаю, ___ він тут.
    right: що
  - left: Я не знаю, ___ вона живе.
    right: де
  - left: Скажи мені, ___ ти прийдеш.
    right: коли
  - left: Він думає, ___ це правильно.
    right: що
  - left: Я не знаю, ___ магазин.
    right: де
  - left: Зателефонуй, ___ прийдеш.
    right: коли
  - left: Вона каже, ___ він вільний.
    right: що
  - left: Ти знаєш, ___ починається фільм?
    right: коли
- type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: У реченні 'Я знаю, що він тут' кома стоїть правильно.
    correct: true
    explanation: Так. Перед сполучником 'що' завжди ставиться кома.
  - statement: У реченні 'Він не знає де магазин' кома не потрібна.
    correct: false
    explanation: 'Ні. Перед ''де'' як сполучником завжди ставиться кома: ''Він не
      знає, де магазин.'''
  - statement: Слово 'де' у реченні 'Де ти?' є сполучником.
    correct: false
    explanation: Ні. 'Де ти?' — питальне речення з одним підметом. 'Де' тут — питальне
      слово, не сполучник.
  - statement: Слово 'що' у реченні 'Я думаю, що це добре' є підрядним сполучником.
    correct: true
    explanation: Так. 'Що' з'єднує головне речення 'Я думаю' з підрядним 'це добре'.
  - statement: Речення 'Що він хоче?' — складне речення зі сполучником.
    correct: false
    explanation: Ні. Це просте питальне речення. 'Що' тут — питальне слово, не сполучник.
  - statement: 'Дієслово ''знати'' може вживатися з усіма трьома сполучниками: що,
      де, коли.'
    correct: true
    explanation: Так. 'Я знаю, що...' / 'Я знаю, де...' / 'Я знаю, коли...' — всі
      три форми правильні.
  - statement: У реченні 'Скажи, коли ти прийдеш' підрядне речення — це 'Скажи'.
    correct: false
    explanation: Ні. 'Скажи' — головне речення. 'Коли ти прийдеш' — підрядне речення.
  - statement: Дієслово 'думати' найчастіше вживається зі сполучником 'що'.
    correct: true
    explanation: Так. 'Я думаю, що...' — найтиповіший зразок для вираження думки.
- type: error-correction
  instruction: Знайдіть і виправте неправильний сполучник (Find and correct the wrong
    conjunction)
  items:
  - sentence: Він думає, де це правильно.
    error: де
    correction: що
    error_type: word
    options:
    - що
    - де
    - коли
    explanation: Після 'думати' вживається сполучник 'що' (that), а не 'де' (where).
  - sentence: Я не знаю, що вона живе.
    error: що
    correction: де
    error_type: word
    options:
    - де
    - що
    - коли
    explanation: Щоб сказати 'where she lives', вживається 'де' (where), а не 'що'
      (that).
  - sentence: Скажи мені, де ти прийдеш.
    error: де
    correction: коли
    error_type: word
    options:
    - коли
    - де
    - що
    explanation: Щоб сказати 'when you'll come', вживається 'коли' (when), а не 'де'
      (where).
  - sentence: Вона каже, коли він тут.
    error: коли
    correction: що
    error_type: word
    options:
    - що
    - де
    - коли
    explanation: 'Після ''казати'' для змісту повідомлення вживається ''що'': ''Вона
      каже, що він тут.'''
  - sentence: Я знаю, що починається фільм.
    error: що
    correction: коли
    error_type: word
    options:
    - коли
    - де
    - що
    explanation: Щоб сказати 'when the film starts', вживається 'коли' (when), а не
      'що' (that).
  - sentence: Ти знаєш, коли він живе?
    error: коли
    correction: де
    error_type: word
    options:
    - де
    - що
    - коли
    explanation: Щоб сказати 'where he lives', вживається 'де' (where), а не 'коли'
      (when).
- type: group-sort
  instruction: Розподіліть речення за категоріями (Sort the sentences by category)
  groups:
  - label: Питальне слово (Question word)
    items:
    - Де ти живеш?
    - Що він хоче?
    - Коли починається фільм?
    - Де магазин?
    - Що це?
    - Коли ти вільний?
  - label: Підрядний сполучник (Subordinating conjunction)
    items:
    - Я знаю, де ти живеш.
    - Я думаю, що він хоче чаю.
    - Скажи, коли починається фільм.
    - Він не знає, де магазин.
    - Я знаю, що це книжка.
    - Я не знаю, коли ти вільний.
