- instruction: Визначте, чи є твердження правильним.
  items:
  - correct: false
    explanation: Ні, «читати» — це інфінітив (to read). «I read» — це «Я читаю».
    statement: Слово «читати» означає «I read».
  - correct: true
    explanation: 'Так, це правильна форма: Я читаю, Я знаю.'
    statement: Закінчення «-ю» використовується зі словом «Я».
  - correct: false
    explanation: Ні, «вони» означає «they». «We» — це «ми».
    statement: Слово «вони» означає «we».
  - correct: false
    explanation: 'Ні, «Я читати» — це помилка (I to read). Правильно: «Я читаю».'
    statement: «Я читаю» і «Я читати» — це одне й те саме.
  - correct: true
    explanation: Так, Вони читають, Вони знають.
    statement: Закінчення «-ють» використовується для множини «вони».
  - correct: true
    explanation: Так, це називається відмінюванням (conjugation).
    statement: Українські дієслова змінюють форму залежно від особи.
  - correct: false
    explanation: Ні, правильно «Ми читаємо». «Читає» — це для «Він/Вона».
    statement: «Ми читає журнал» — це правильне речення.
  - correct: true
    explanation: Так, закінчення -ю використовується для «Я».
    statement: «Я знаю це» — це граматично правильно.
  title: Граматична правда
  type: true-false
