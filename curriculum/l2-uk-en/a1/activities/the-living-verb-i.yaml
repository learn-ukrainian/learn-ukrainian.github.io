- type: true-false
  title: 'True or False: Verb Rules'
  items:
  - statement: Most Ukrainian dictionary verbs end in -ти.
    correct: true
    explanation: The dictionary form (infinitive) almost always ends in -ти, like
      читати.
  - statement: The ending -ють is used for ми (we).
    correct: false
    explanation: The ending for ми is -ємо. The ending -ють is for вони (they).
  - statement: In Ukrainian, you must always use a pronoun like я or ти before a verb.
    correct: false
    explanation: Because the verb ending clearly shows who is acting, Ukrainians often
      drop the pronoun.
  - statement: The letter є in verb endings sounds like the English word ye.
    correct: true
    explanation: Yes, є sounds like ye in yellow, and is a common part of endings
      like -єш and -є.
  - statement: You must chop off the -ти before adding personal endings to a verb.
    correct: true
    explanation: You always chop off the -ти first to get the stem, then add the new
      ending.
  - statement: If you are speaking to a group of friends, you should use the -єш ending.
    correct: false
    explanation: For any plural group, you use the ви ending, which is -єте.
  - statement: The ending -ю means that я (I) is doing the action.
    correct: true
    explanation: The -ю ending is specific to the pronoun я in the present tense.
  - statement: Verbs ending in -ати like знати and думати have completely different
      conjugation rules.
    correct: false
    explanation: They follow the exact same regular -ати pattern.
  instruction: Determine if the statement is true.
- type: quiz
  title: 'Check Your Knowledge: Verb Endings'
  items:
  - question: What is the correct ending for я (I)?
    explanation: For the pronoun я, the ending is -ю.
    options:
    - text: -ю
      correct: true
    - text: -єш
      correct: false
    - text: -є
      correct: false
    - text: -ємо
      correct: false
  - question: What is the correct ending for вони (they)?
    explanation: For the pronoun вони, the ending is -ють.
    options:
    - text: -ють
      correct: true
    - text: -єте
      correct: false
    - text: -ємо
      correct: false
    - text: -є
      correct: false
  - question: Which form correctly means He asks?
    explanation: The stem of питати is пита-. The ending for він is -є. So it is питає.
    options:
    - text: Він питає
      correct: true
    - text: Він питаю
      correct: false
    - text: Він питати
      correct: false
    - text: Він питаєш
      correct: false
  - question: How do you say We listen?
    explanation: The stem of слухати is слуха-. The ending for ми is -ємо. So it is
      слухаємо.
    options:
    - text: Ми слухаємо
      correct: true
    - text: Ми слухаєте
      correct: false
    - text: Ми слухає
      correct: false
    - text: Ми слухають
      correct: false
  - question: If someone says Знаю, who is doing the action?
    explanation: The -ю ending indicates that Я (I) is doing the action.
    options:
    - text: I (я)
      correct: true
    - text: You (ти)
      correct: false
    - text: He (він)
      correct: false
    - text: They (вони)
      correct: false
  - question: Which form should you use for a stranger or a professor?
    explanation: For strangers or professors, you use the formal ви, which takes the
      -єте ending.
    options:
    - text: Ви читаєте
      correct: true
    - text: Ти читаєш
      correct: false
    - text: Він читає
      correct: false
    - text: Вони читають
      correct: false
  - question: How do you say You (informal) read?
    explanation: The informal you is ти, and the ending is -єш.
    options:
    - text: Ти читаєш
      correct: true
    - text: Ти читаєте
      correct: false
    - text: Ти читає
      correct: false
    - text: Ти читаю
      correct: false
  - question: What is the dictionary form (infinitive) of розумію?
    explanation: The dictionary form almost always ends in -ти, so it is розуміти.
    options:
    - text: розуміти
      correct: true
    - text: розуміємо
      correct: false
    - text: розуміють
      correct: false
    - text: розуміє
      correct: false
  instruction: Choose the correct answer.
