- type: anagram
  title: 'Розшифруйте дієслова'
  instruction: 'Rearrange the letters to reveal the verbs we learned today.'
  items:
    - scrambled: 'т а ч и т и'
      answer: 'читати'
    - scrambled: 'т и н а з'
      answer: 'знати'
    - scrambled: 'т а р и г'
      answer: 'грати'
    - scrambled: 'х а т с и л у'
      answer: 'слухати'
    - scrambled: 'а т и п т и'
      answer: 'питати'
    - scrambled: 'к а т е ч и'
      answer: 'чекати'
    - scrambled: 'м у т а д и'
      answer: 'думати'
    - scrambled: 'ч а т и в в и'
      answer: 'вивчати'
    - scrambled: 'ц ю т а в р а п и'
      answer: 'працювати'
    - scrambled: 'п о ч и т а в і д в и'
      answer: 'відпочивати'

- type: match-up
  title: 'Знайдіть пару: Особа та Закінчення'
  instruction: 'Match the person (pronoun) with the correct verb ending.'
  pairs:
    - left: 'Я (I)'
      right: '-ю'
    - left: 'Ти (You)'
      right: '-єш'
    - left: 'Він/Вона (He/She)'
      right: '-є'
    - left: 'Ми (We)'
      right: '-ємо'
    - left: 'Ви (You pl.)'
      right: '-єте'
    - left: 'Вони (They)'
      right: '-ють'
    - left: 'Студент (He)'
      right: '-є'
    - left: 'Дівчата (They)'
      right: '-ють'

- type: group-sort
  title: 'Хто це робить?'
  instruction: 'Sort the verb forms into the correct group based on who is doing the action.'
  groups:
    - name: 'Я (I)'
      items:
        - 'читаю'
        - 'знаю'
        - 'слухаю'
        - 'працюю'
    - name: 'Ти (You)'
      items:
        - 'читаєш'
        - 'знаєш'
        - 'слухаєш'
        - 'працюєш'
    - name: 'Ми (We)'
      items:
        - 'читаємо'
        - 'знаємо'
        - 'слухаємо'
        - 'працюємо'
    - name: 'Вони (They)'
      items:
        - 'читають'
        - 'знають'
        - 'слухають'
        - 'працюють'

- type: fill-in
  title: 'Оберіть правильну форму'
  instruction: 'Choose the correct form of the verb to complete the sentence.'
  items:
    - sentence: 'Я _____ радіо щоранку.'
      answer: 'слухаю'
      options: ['слухаю', 'слухаєш', 'слухає', 'слухати']
      explanation: 'For "Я" (I), the ending is always -ю.'
    - sentence: 'Ти _____ це місто?'
      answer: 'знаєш'
      options: ['знаєш', 'знаю', 'знає', 'знають']
      explanation: 'For "Ти" (You), the ending is -єш.'
    - sentence: 'Ми _____ текст.'
      answer: 'читаємо'
      options: ['читаємо', 'читаю', 'читаєте', 'читають']
      explanation: 'For "Ми" (We), the ending is -ємо.'
    - sentence: 'Вона _____ вдома.'
      answer: 'працює'
      options: ['працює', 'працюєш', 'працюю', 'працюють']
      explanation: 'For "Вона" (She), the ending is -є.'
    - sentence: 'Ви _____ все про це?'
      answer: 'знаєте'
      options: ['знаєте', 'знаємо', 'знають', 'знаєш']
      explanation: 'For "Ви" (You plural/formal), the ending is -єте.'
    - sentence: 'Вони _____ у парку.'
      answer: 'грають'
      options: ['грають', 'граємо', 'грає', 'граєш']
      explanation: 'For "Вони" (They), the ending is -ють.'
    - sentence: 'Я _____ про погоду.'
      answer: 'питаю'
      options: ['питаю', 'питаєш', 'питає', 'питаємо']
      explanation: 'For "Я" (I), the ending is -ю.'
    - sentence: 'Він _____ тут.'
      answer: 'відпочиває'
      options: ['відпочиває', 'відпочивають', 'відпочиваєш', 'відпочиваю']
      explanation: 'For "Він" (He), the ending is -є.'

- type: true-false
  title: 'Правда чи ні?'
  instruction: 'Read the statement and decide if it is true or false.'
  items:
    - statement: 'To say "I read", you can say "Я читаю" or simply "Читаю".'
      correct: true
      explanation: 'True! In Ukrainian, the verb ending shows who is acting, so "Я" is optional.'
    - statement: 'The word "читати" means "I read".'
      correct: false
      explanation: '"Читати" is the infinitive (to read). "I read" is "Я читаю".'
    - statement: 'For "Ми" (We), the verb ending is always "-єш".'
      correct: false
      explanation: 'No, for "Ми" the ending is "-ємо". "-єш" is for "Ти".'
    - statement: 'Verbs like "слухати" and "знати" follow the same pattern as "читати".'
      correct: true
      explanation: 'Yes, they are all Type 1 verbs ending in -ати.'
    - statement: '"Він працює" means "He works".'
      correct: true
      explanation: 'Correct. "Працювати" conjugates like "читати".'
    - statement: 'It is correct to say "Я знати".'
      correct: false
      explanation: 'Incorrect. You must conjugate the verb: "Я знаю".'
    - statement: '"Вона" (She) and "Він" (He) use the same verb ending.'
      correct: true
      explanation: 'Yes, both use the ending -є.'
    - statement: 'The word "дієслово" means "noun".'
      correct: false
      explanation: 'False. "Дієслово" means "verb".'

- type: quiz
  title: 'Перевірка знань'
  instruction: 'Answer the questions to test your understanding of Ukrainian verbs.'
  items:
    - question: 'What is the "Master Key" pattern we learned today?'
      explanation: 'We focused on verbs ending in -ати (Type 1).'
      options:
        - text: 'Verbs ending in -ати'
          correct: true
        - text: 'Verbs ending in -ити'
          correct: false
        - text: 'Verbs ending in -ути'
          correct: false
        - text: 'Irregular verbs'
          correct: false
    - question: 'Which word corresponds to the pronoun "Вони" (They)?'
      explanation: '"Вони" takes the ending -ють, so "читають" is correct.'
      options:
        - text: 'читають'
          correct: true
        - text: 'читаємо'
          correct: false
        - text: 'читаєте'
          correct: false
        - text: 'читає'
          correct: false
    - question: 'How do you translate "You know" (informal singular)?'
      explanation: '"Ти" (You) requires the ending -єш.'
      options:
        - text: 'Ти знаєш'
          correct: true
        - text: 'Ти знає'
          correct: false
        - text: 'Ти знаю'
          correct: false
        - text: 'Ти знать'
          correct: false
    - question: 'What does "Ми слухаємо радіо" mean?'
      explanation: '"Ми" is We, "слухаємо" is listen.'
      options:
        - text: 'We listen to the radio'
          correct: true
        - text: 'I listen to the radio'
          correct: false
        - text: 'They listen to the radio'
          correct: false
        - text: 'You listen to the radio'
          correct: false
    - question: 'Which ending matches "Ви" (You formal/plural)?'
      explanation: '"Ви" always goes with -єте.'
      options:
        - text: '-єте'
          correct: true
        - text: '-ємо'
          correct: false
        - text: '-єш'
          correct: false
        - text: '-ють'
          correct: false
    - question: 'Choose the correct form: Вона _____.'
      explanation: '"Вона" (She) takes the ending -є.'
      options:
        - text: 'чекає'
          correct: true
        - text: 'чекають'
          correct: false
        - text: 'чекаємо'
          correct: false
        - text: 'чекаєш'
          correct: false
    - question: 'How do you say "We are resting"?'
      explanation: '"Ми" (We) + "відпочивати" (rest) = "відпочиваємо".'
      options:
        - text: 'Ми відпочиваємо'
          correct: true
        - text: 'Ми відпочиває'
          correct: false
        - text: 'Ми відпочиваю'
          correct: false
        - text: 'Ми відпочивати'
          correct: false
    - question: 'What is the stem of "грати"?'
      explanation: 'Remove -ти from "грати" to get "гра-".'
      options:
        - text: 'гра-'
          correct: true
        - text: 'грати-'
          correct: false
        - text: 'грат-'
          correct: false
        - text: 'г-'
          correct: false

- type: quiz
  title: 'Контекст: Де ми?'
  instruction: 'Choose the sentence that best fits the situation described.'
  items:
    - question: 'Situation: You are in a library. Someone asks what you are doing.'
      explanation: 'In a library, you usually read (читати).'
      options:
        - text: 'Я читаю.'
          correct: true
        - text: 'Я граю.'
          correct: false
        - text: 'Я слухаю музику.'
          correct: false
        - text: 'Я питаю.'
          correct: false
    - question: 'Situation: You are listening to music at a concert.'
      explanation: 'At a concert, we listen to music.'
      options:
        - text: 'Ми слухаємо музику.'
          correct: true
        - text: 'Ми читаємо журнал.'
          correct: false
        - text: 'Ми працюємо.'
          correct: false
        - text: 'Ми питаємо про погоду.'
          correct: false
    - question: 'Situation: You are waiting for a bus.'
      explanation: 'Waiting is "чекати".'
      options:
        - text: 'Я чекаю автобус.'
          correct: true
        - text: 'Я знаю автобус.'
          correct: false
        - text: 'Я граю автобус.'
          correct: false
        - text: 'Я вивчаю автобус.'
          correct: false
    - question: 'Situation: Someone asks if you work here.'
      explanation: 'You answer "Yes, I work here".'
      options:
        - text: 'Так, я працюю тут.'
          correct: true
        - text: 'Так, я граю тут.'
          correct: false
        - text: 'Так, я читаю тут.'
          correct: false
        - text: 'Так, я слухаю тут.'
          correct: false
    - question: 'Situation: Your friend knows everything about the city.'
      explanation: 'You say "You know the city".'
      options:
        - text: 'Ти знаєш місто.'
          correct: true
        - text: 'Ти читаєш місто.'
          correct: false
        - text: 'Ти слухаєш місто.'
          correct: false
        - text: 'Ти чекаєш місто.'
          correct: false
    - question: 'Situation: Students are in class.'
      explanation: 'They are studying (вивчати) or asking (питати).'
      options:
        - text: 'Вони вивчають алфавіт.'
          correct: true
        - text: 'Вони грають у футбол.'
          correct: false
        - text: 'Вони відпочивають вдома.'
          correct: false
        - text: 'Вони працюють на заводі.'
          correct: false
    - question: 'Situation: It is Sunday. You are relaxing.'
      explanation: 'Relaxing/resting is "відпочивати".'
      options:
        - text: 'Я відпочиваю.'
          correct: true
        - text: 'Я працюю.'
          correct: false
        - text: 'Я питаю.'
          correct: false
        - text: 'Я знаю.'
          correct: false
    - question: 'Situation: Someone is playing the guitar.'
      explanation: 'Playing is "грати".'
      options:
        - text: 'Він грає музику.'
          correct: true
        - text: 'Він читає музику.'
          correct: false
        - text: 'Він питає музику.'
          correct: false
        - text: 'Він працює музику.'
          correct: false

