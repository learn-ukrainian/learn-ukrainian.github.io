- type: fill-in
  title: "Оберіть правильний прикметник"
  instruction: "Choose the correct adjective ending to match the noun's gender."
  items:
    - sentence: "___ хліб лежить на столі."
      answer: "Свіжий"
      options: ["Свіжий", "Свіжа", "Свіже", "Свіжі"]
    - sentence: "Я люблю ___ каву."
      answer: "гарячу"
      options: ["гарячу", "гарячий", "гаряче", "гарячі"]
    - sentence: "Це дуже ___ борщ."
      answer: "смачний"
      options: ["смачний", "смачна", "смачне", "смачні"]
    - sentence: "___ вода дуже освіжає влітку."
      answer: "Холодна"
      options: ["Холодна", "Холодний", "Холодне", "Холодні"]
    - sentence: "Я хочу купити ___ м'ясо."
      answer: "свіже"
      options: ["свіже", "свіжий", "свіжа", "свіжі"]
    - sentence: "Діти їдять ___ фрукти."
      answer: "солодкі"
      options: ["солодкі", "солодкий", "солодка", "солодке"]
    - sentence: "Ми п'ємо ___ чай з лимоном."
      answer: "зелений"
      options: ["зелений", "зелена", "зелене", "зелені"]
    - sentence: "На обід у нас ___ каша."
      answer: "смачна"
      options: ["смачна", "смачний", "смачне", "смачні"]

- type: quiz
  title: "Правила замовлення та споживання"
  instruction: "Choose the grammatically correct option based on what you learned in the module."
  items:
    - question: "Яку форму має слово вода, коли ви її замовляєте?"
      explanation: "У Знахідному відмінку жіночий рід на -а змінюється на -у."
      options:
        - text: "воду"
          correct: true
        - text: "вода"
          correct: false
        - text: "воді"
          correct: false
        - text: "водою"
          correct: false
    - question: "Яке дієслово правильно використовувати для споживання супу чи борщу?"
      explanation: "Суп в українській культурі — це їжа, тому ми його їмо."
      options:
        - text: "їсти"
          correct: true
        - text: "пити"
          correct: false
        - text: "читати"
          correct: false
        - text: "писати"
          correct: false
    - question: "Як правильно сказати англійську фразу I want coffee українською мовою?"
      explanation: "Слово кава змінюється на каву як прямий додаток (Знахідний відмінок)."
      options:
        - text: "Я хочу каву"
          correct: true
        - text: "Я хочу кава"
          correct: false
        - text: "Я хочу каві"
          correct: false
        - text: "Я хочу кавою"
          correct: false
    - question: "Як правильно сказати українською, що ви не вживаєте м'ясо?"
      explanation: "Для загальної відмови від їжі ми використовуємо фразу 'Я не їм'."
      options:
        - text: "Я не їм м'ясо"
          correct: true
        - text: "Мені не подобається м'яса"
          correct: false
        - text: "Я не п'ю м'ясо"
          correct: false
        - text: "Я не люблю м'ясі"
          correct: false
    - question: "Яку форму має слово сік у Знахідному відмінку прямого додатка?"
      explanation: "Чоловічий рід для неістот не змінюється у Знахідному відмінку."
      options:
        - text: "сік"
          correct: true
        - text: "соку"
          correct: false
        - text: "сока"
          correct: false
        - text: "соком"
          correct: false
    - question: "Яка з цих фраз про вподобання їжі є граматично правильною?"
      explanation: "З дієсловом подобається їжа залишається в Називному відмінку як підмет."
      options:
        - text: "Мені подобається борщ"
          correct: true
        - text: "Мені подобається борщу"
          correct: false
        - text: "Я люблю борщу"
          correct: false
        - text: "Мені подобається борщем"
          correct: false
    - question: "Як правильно висловити свою медичну проблему чи обмеження щодо горіхів?"
      explanation: "Фраза 'У мене алергія на...' використовується для медичних обмежень."
      options:
        - text: "У мене алергія на горіхи"
          correct: true
        - text: "Я не люблю горіхи"
          correct: false
        - text: "Горіхи це дуже погано"
          correct: false
        - text: "Я не хочу горіхи"
          correct: false
    - question: "Як перекладається та що означає прислів'я Хліб — усьому голова?"
      explanation: "Хліб історично вважається основою життя та головним елементом на столі."
      options:
        - text: "Хліб — найважливіша їжа"
          correct: true
        - text: "Хліб має форму людської голови"
          correct: false
        - text: "Хліб завжди їдять з головою"
          correct: false
        - text: "Хліб ніколи не можна їсти"
          correct: false

- type: unjumble
  title: "Що ми полюбляємо?"
  instruction: "Rearrange the words to form correct sentences expressing food preferences."
  items:
    - words: ["Мені", "дуже", "подобається", "борщ"]
      answer: "Мені дуже подобається борщ"
    - words: ["Я", "не", "їм", "м'ясо"]
      answer: "Я не їм м'ясо"
    - words: ["Я", "хочу", "гарячу", "каву"]
      answer: "Я хочу гарячу каву"
    - words: ["Ми", "п'ємо", "зелений", "чай"]
      answer: "Ми п'ємо зелений чай"
    - words: ["Я", "люблю", "смачний", "суп"]
      answer: "Я люблю смачний суп"
    - words: ["У", "мене", "алергія", "на", "сир"]
      answer: "У мене алергія на сир"
    - words: ["Мені", "подобаються", "свіжі", "фрукти"]
      answer: "Мені подобаються свіжі фрукти"
    - words: ["Вона", "замовляє", "яблучний", "сік"]
      answer: "Вона замовляє яблучний сік"

- type: fill-in
  title: "Дієслова їсти та пити"
  instruction: "Choose the correct form of the verbs to eat (їсти) and to drink (пити)."
  items:
    - sentence: "Вранці я завжди ___ кашу."
      answer: "їм"
      options: ["їм", "п'ю", "їдять", "п'ють"]
    - sentence: "Ми ___ гарячий чай з лимоном."
      answer: "п'ємо"
      options: ["п'ємо", "їмо", "п'ю", "їм"]
    - sentence: "Українці дуже часто ___ борщ."
      answer: "їдять"
      options: ["їдять", "п'ють", "їмо", "п'ємо"]
    - sentence: "Ти ___ свіже молоко?"
      answer: "п'єш"
      options: ["п'єш", "їси", "п'є", "їсть"]
    - sentence: "Він ніколи не ___ рибу."
      answer: "їсть"
      options: ["їсть", "п'є", "їдять", "п'ють"]
    - sentence: "Я хочу ___ смачний суп."
      answer: "їсти"
      options: ["їсти", "пити", "читати", "спати"]
    - sentence: "Ти ___ свіжий яблучний сік?"
      answer: "п'єш"
      options: ["п'єш", "їси", "п'є", "їсть"]
    - sentence: "Вони із задоволенням ___ солодкі фрукти."
      answer: "їдять"
      options: ["їдять", "п'ють", "їмо", "п'ємо"]

- type: match-up
  title: "Корисні фрази в ресторані"
  instruction: "Match the useful conversational phrases to their English equivalents."
  pairs:
    - left: "Мені подобається"
      right: "I like"
    - left: "Я люблю"
      right: "I love"
    - left: "Я не їм"
      right: "I do not eat"
