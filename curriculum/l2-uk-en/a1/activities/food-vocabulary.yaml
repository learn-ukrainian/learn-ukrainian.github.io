      right: "I want"
    - left: "Що ви бажаєте?"
      right: "What would you like?"
    - left: "Яка твоя улюблена їжа?"
      right: "What is your favorite food?"

- type: quiz
  title: "Культура їжі в Україні"
  instruction: "Test your knowledge of the cultural significance of food and drinks in Ukraine."
  items:
    - question: "Згідно з текстом, чому хліб ніколи не можна було викидати?"
      explanation: "Хліб має глибокий сакральний статус і повагу в українській культурі."
      options:
        - text: "Це сакральний символ поваги"
          correct: true
        - text: "Він дуже дорого коштував"
          correct: false
        - text: "Його важко було готувати"
          correct: false
        - text: "Він міг бути дуже отруєним"
          correct: false
    - question: "Яку важливу лінгвістичну функцію виконувало слово паляниця під час війни?"
      explanation: "Російськомовним людям дуже важко правильно вимовити м'які звуки у цьому слові."
      options:
        - text: "Це був пароль для перевірки вимови"
          correct: true
        - text: "Це була назва секретної зброї"
          correct: false
        - text: "Це була секретна команда"
          correct: false
        - text: "Це був спеціальний код для радіо"
          correct: false
    - question: "Згідно з текстом модуля, які традиційні напої є популярними в Україні?"
      explanation: "В Україні співіснують сильні традиції чаю з лимоном та кави."
      options:
        - text: "Чай з лимоном та кава"
          correct: true
        - text: "Сік та солодка газована вода"
          correct: false
        - text: "Фруктовий компот та холодне молоко"
          correct: false
        - text: "Гарячий шоколад та зелений чай"
          correct: false
    - question: "Який традиційний і дуже типовий український сніданок згадується у тексті?"
      explanation: "Гаряча каша, зокрема гречана, є класичним ранковим сніданком."
      options:
        - text: "Гаряча гречана каша"
          correct: true
        - text: "Смажене м'ясо з картоплею"
          correct: false
        - text: "Солодкий компот з фруктами"
          correct: false
        - text: "Традиційний борщ зі сметаною"
          correct: false
    - question: "Згідно з текстом, який звук у слові паляниця найбільше видає іноземців?"
      explanation: "Природно м'який звук ц є специфічною і складною рисою української фонетики."
      options:
        - text: "М'який звук ц"
          correct: true
        - text: "Твердий звук п"
          correct: false
        - text: "Голосний звук а"
          correct: false
        - text: "Твердий звук л"
          correct: false
    - question: "Яку традиційну страву завжди використовують для зустрічі дуже важливих гостей?"
      explanation: "Традиція хліб-сіль на вишитому рушнику — це символ глибокої поваги."
      options:
        - text: "Хліб із сіллю"
          correct: true
        - text: "Борщ із м'ясом"
          correct: false
        - text: "Солодкі літні фрукти"
          correct: false
        - text: "Міцну каву з молоком"
          correct: false
    - question: "Згідно з текстом, який гарячий напій традиційно пропонують гостям вдома?"
      explanation: "Чай є стандартним напоєм гостинності в українських домах."
      options:
        - text: "Чай з лимоном"
          correct: true
        - text: "Каву по-львівськи"
          correct: false
        - text: "Холодну мінеральну воду"
          correct: false
        - text: "Свіжий яблучний сік"
          correct: false
    - question: "Який рід має слово м'ясо і як це впливає на прикметник?"
      explanation: "М'ясо — це середній рід, тому ми кажемо свіже м'ясо."
      options:
        - text: "Середній рід, прикметник закінчується на -е"
          correct: true
        - text: "Чоловічий рід, прикметник закінчується на -ий"
          correct: false
        - text: "Жіночий рід, прикметник закінчується на -а"
          correct: false
        - text: "Множина, прикметник закінчується на -і"
          correct: false

- type: unjumble
  title: "Замовлення в ресторані"
  instruction: "Rearrange the words to form correct sentences when ordering food."
  items:
    - words: ["Я", "хочу", "смачний", "борщ"]
      answer: "Я хочу смачний борщ"
    - words: ["Вона", "замовляє", "гарячу", "каву"]
      answer: "Вона замовляє гарячу каву"
    - words: ["Ми", "хочемо", "мінеральну", "воду"]
      answer: "Ми хочемо мінеральну воду"
    - words: ["Він", "купує", "свіжий", "хліб"]
      answer: "Він купує свіжий хліб"
    - words: ["Мама", "готує", "смачну", "рибу"]
      answer: "Мама готує смачну рибу"
    - words: ["Я", "люблю", "апельсиновий", "сік"]
      answer: "Я люблю апельсиновий сік"
    - words: ["Вони", "їдять", "свіжі", "овочі"]
      answer: "Вони їдять свіжі овочі"
    - words: ["Я", "не", "п'ю", "молоко"]
      answer: "Я не п'ю молоко"