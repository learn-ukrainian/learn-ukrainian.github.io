- type: fill-in
  title: Трансформація в родовий відмінок
  instruction: 'Змініть іменник у дужках на форму родового відмінка (відсутність).'
  items:
  - sentence: У мене немає (телефон) ____.
    answer: телефона
    options: [телефона, телефону, телефоном, телефоні]
  - sentence: У нього немає (ключ) ____.
    answer: ключа
    options: [ключа, ключу, ключем, ключі]
  - sentence: У неї немає (вода) ____.
    answer: води
    options: [води, воду, воді, водою]
  - sentence: У нас немає (час) ____.
    answer: часу
    options: [часу, часа, часом, часі]
  - sentence: У вас немає (квиток) ____.
    answer: квитка
    options: [квитка, квитку, квитком, квитку]
  - sentence: У них немає (гроші) ____.
    answer: грошей
    options: [грошей, гроші, грошам, грошима]
  - sentence: Тут немає (хліб) ____.
    answer: хліба
    options: [хліба, хлібу, хлібом, хлібі]
  - sentence: Там немає (цукор) ____.
    answer: цукру
    options: [цукру, цукра, цукром, цукрі]

- type: fill-in
  title: Речення з «немає»
  instruction: 'Доповніть речення, використовуючи правильну форму слова.'
  items:
  - sentence: 'Я шукаю ключ. Тут немає ____.'
    answer: ключа
    options: [ключа, ключ, ключу, ключем]
  - sentence: 'Я хочу пити. У мене немає ____.'
    answer: води
    options: [води, воду, вода, воді]
  - sentence: 'Я поспішаю. У мене немає ____.'
    answer: часу
    options: [часу, часа, час, часі]
  - sentence: 'Де мій телефон? Тут немає ____.'
    answer: телефона
    options: [телефона, телефон, телефону, телефоном]
  - sentence: 'Я хочу каву. У мене немає ____.'
    answer: молока
    options: [молока, молоко, молоку, молоком]
  - sentence: 'Де квиток? У сумці немає ____.'
    answer: квитка
    options: [квитка, квитку, квиток, квитком]
  - sentence: 'У ресторані сьогодні немає ____.'
    answer: хліба
    options: [хліба, хлібу, хліб, хлібом]
  - sentence: 'На жаль, у мене немає ____.'
    answer: квитка
    options: [квитка, квиток, квитку, квитком]

- type: quiz
  title: Вибір правильної форми
  instruction: Оберіть правильну форму іменника для вираження відсутності.
  items:
  - question: 'Скажіть, будь ласка, у вас немає ____?'
    options:
    - text: квитка
      correct: true
    - text: квиток
      correct: false
    - text: квитки
      correct: false
    - text: квитком
      correct: false
  - question: 'Я дуже поспішаю, у мене немає ____.'
    options:
    - text: часу
      correct: true
    - text: час
      correct: false
    - text: часом
      correct: false
    - text: часі
      correct: false
  - question: 'Тут дуже жарко, але немає ____.'
    options:
    - text: води
      correct: true
    - text: вода
      correct: false
    - text: воду
      correct: false
    - text: воді
      correct: false
  - question: 'Вибачте, але у мене немає ____.'
    options:
    - text: грошей
      correct: true
    - text: гроші
      correct: false
    - text: грошам
      correct: false
    - text: грошима
      correct: false
  - question: 'Я п''ю цей смачний чай без ____.'
    options:
    - text: молока
      correct: true
    - text: молоко
      correct: false
    - text: молоку
      correct: false
    - text: молоком
      correct: false
  - question: 'Ця кава дуже добра навіть без ____.'
    options:
    - text: цукру
      correct: true
    - text: цукор
      correct: false
    - text: цукром
      correct: false
    - text: цукра
      correct: false
  - question: 'У мене в сумці немає ____.'
    options:
    - text: ключа
      correct: true
    - text: ключ
      correct: false
    - text: ключі
      correct: false
    - text: ключем
      correct: false
  - question: 'Тут на столі немає вашого ____.'
    options:
    - text: телефона
      correct: true
    - text: телефон
      correct: false
    - text: телефону
      correct: false
    - text: телефоні
      correct: false

- type: match-up
  title: Знайдіть пару
  instruction: Знайдіть відповідну форму родового відмінка для кожного слова.
  pairs:
  - left: телефон (phone)
    right: телефона
  - left: ключ (key)
    right: ключа
  - left: вода (water)
    right: води
  - left: час (time)
    right: часу
  - left: квиток (ticket)
    right: квитка
  - left: гроші (money)
    right: грошей
  - left: цукор (sugar)
    right: цукру
  - left: хліб (bread)
    right: хліба

- type: true-false
  title: Правила відсутності
  instruction: Визначте, чи правильне твердження щодо вживання родового відмінка.
  items:
  - statement: Після слова «немає» завжди використовується називний відмінок.
    correct: false
  - statement: Прийменник «без» вимагає родового відмінка.
    correct: true
  - statement: Слово «хліб» у родовому відмінку має закінчення -а (хліба).
    correct: true
  - statement: Слово «вода» у родовому відмінку має закінчення -и (води).
    correct: true
  - statement: Слово «час» у родовому відмінку має закінчення -а (часа).
    correct: false
  - statement: Слово «гроші» у родовому відмінку має форму «грошей».
    correct: true
  - statement: Конкретні іменники чоловічого роду зазвичай мають закінчення -а.
    correct: true
  - statement: Абстрактні іменники чоловічого роду зазвичай мають закінчення -у.
    correct: true

- type: unjumble
  title: Складіть речення
  instruction: Перетягніть слова у правильному порядку, щоб утворити заперечне речення.
  items:
  - words: [У, мене, немає, телефона]
    answer: У мене немає телефона.
  - words: [Тут, немає, води]
    answer: Тут немає води.
  - words: [У, нього, немає, квитка]
    answer: У нього немає квитка.
  - words: [На, жаль, немає, часу]
    answer: На жаль немає часу.
  - words: [Він, п''є, чай, без, цукру]
    answer: Він п''є чай без цукру.
  - words: [Я, хочу, каву, без, молока]
    answer: Я хочу каву без молока.

- type: group-sort
  title: Категорії закінчень
  instruction: Розподіліть слова за їхнім закінченням у родовому відмінку (відсутність).
  groups:
  - name: Закінчення -а/-я (Конкретні речі)
    items: [телефона, ключа, квитка, хліба, паспорта, олівця]
  - name: Закінчення -у/-ю (Абстрактні/маси)
    items: [часу, цукру, газу, чаю, снігу, вітру]

- type: quiz
  title: Практика з «немає»
  instruction: Оберіть правильну відповідь для завершення діалогу.
  items:
  - question: '— У тебе є ключ? — Ні, ...'
    options:
    - text: немає ключа
      correct: true
    - text: немає ключ
      correct: false
    - text: немає ключу
      correct: false
    - text: є ключ
      correct: false
  - question: '— Ви хочете цукор? — Ні, я п''ю чай ...'
    options:
    - text: без цукру
      correct: true
    - text: без цукор
      correct: false
    - text: немає цукру
      correct: false
    - text: без цукром
      correct: false
  - question: '— Де твій паспорт? — На жаль, у мене ...'
