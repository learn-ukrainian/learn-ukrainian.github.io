- groups:
  - items:
    - квиток
    - паспорт
    - брат
    - студент
    - автобус
    - стіл
    name: Закінчення -а (Конкретні)
  - items:
    - час
    - цукор
    - чай
    - обід
    - спокій
    - телефон
    - сир
    name: Закінчення -у (Абстрактні/Речовини/Іншомовні)
  instruction: Розподіліть слова за закінченням, яке вони отримують після «немає»
    (Genitive Case).
  title: 'Закінчення: -а чи -у?'
  type: group-sort
- instruction: З’єднайте українські фрази з їх перекладом.
  pairs:
  - left: немає часу
    right: no time
  - left: без цукру
    right: without sugar
  - left: немає грошей
    right: no money
  - left: без молока
    right: without milk
  - left: немає води
    right: no water
  - left: без квитка
    right: without a ticket
  - left: без хліба
    right: without bread
  - left: немає світла
    right: no light
  title: Знайдіть пару
  type: match-up
- instruction: Оберіть правильну форму слова в Родовому відмінку.
  items:
  - answer: часу
    explanation: Абстрактні поняття чоловічого роду (час) зазвичай мають закінчення
      -у.
    options:
    - часу
    - час
    - часом
    - часи
    sentence: У мене немає ... (час).
  - answer: цукру
    explanation: Речовини чоловічого роду (цукор) мають закінчення -у. Також тут випадає
      літера "о".
    options:
    - цукру
    - цукор
    - цукра
    - цукром
    sentence: Я п’ю каву без ... (цукор).
  - answer: води
    explanation: Жіночий рід на -а (вода) змінюється на -и.
    options:
    - води
    - вода
    - воду
    - водою
    sentence: Тут немає ... (вода).
  - answer: квитка
    explanation: Конкретні предмети чоловічого роду (квиток) мають закінчення -а.
    options:
    - квитка
    - квиток
    - квитку
    - квитком
    sentence: У туриста немає ... (квиток).
  - answer: телефону
    explanation: Телефон — іншомовне слово, тому в Родовому відмінку має закінчення -у.
    options:
    - телефону
    - телефон
    - телефона
    - телефоном
    sentence: У студента немає ... (телефон).
  - answer: паспорта
    explanation: Конкретні предмети чоловічого роду (паспорт) мають закінчення -а.
    options:
    - паспорта
    - паспорт
    - паспорту
    - паспортом
    sentence: У мене немає ... (паспорт).
  - answer: сиру
    explanation: Сир (cheese) - це речовина, тому закінчення -у.
    options:
    - сиру
    - сира
    - сир
    - сиром
    sentence: Ми їмо піцу без ... (сир).
  - answer: стола
    explanation: Стіл - конкретний предмет, тому закінчення -а. Випадає літера "і".
    options:
    - стола
    - столу
    - стіл
    - столом
    sentence: У кімнаті немає ... (стіл).
  title: Допишіть закінчення
  type: fill-in
- instruction: Розташуйте слова у правильному порядку, щоб утворити речення.
  items:
  - answer: У мене немає часу
    words:
    - У
    - мене
    - немає
    - часу
  - answer: Тут немає інтернету
    words:
    - Тут
    - немає
    - інтернету
  - answer: Кава без цукру будь ласка
    words:
    - Кава
    - без
    - цукру
    - будь ласка
  - answer: Сьогодні немає концерту
    words:
    - Сьогодні
    - немає
    - концерту
  - answer: У нас немає молока
    words:
    - У
    - нас
    - немає
    - молока
  - answer: Вибачте у мене немає грошей
    words:
    - Вибачте
    - у
    - мене
    - немає
    - грошей
  title: Складіть речення
  type: unjumble
- instruction: Оберіть правильну відповідь на питання про граматику.
  items:
  - explanation: Слова «немає» та «без» завжди вимагають Родовий відмінок (Genitive
      Case).
    options:
    - correct: true
      text: Родовий (Genitive)
    - correct: false
      text: Називний (Nominative)
    - correct: false
      text: Орудний (Instrumental)
    - correct: false
      text: Кличний (Vocative)
    question: Який відмінок ми завжди використовуємо після слова «немає»?
  - explanation: 'Слово «квиток» втрачає літеру «о» і отримує закінчення -а: немає
      квитка.'
    options:
    - correct: true
      text: немає квитка
    - correct: false
      text: немає квиток
    - correct: false
      text: немає квитку
    - correct: false
      text: немає квитока
    question: Як змінюється слово «квиток» після «немає»?
  - explanation: Абстрактні іменники чоловічого роду зазвичай мають закінчення -у.
    options:
    - correct: true
      text: -у
    - correct: false
      text: -а
    - correct: false
      text: -и
    - correct: false
      text: -е
    question: Яке закінчення зазвичай мають абстрактні поняття (як «час») у Родовому
      відмінку?
  - explanation: «Без» означає «without» і використовується з Родовим відмінком.
    options:
    - correct: true
      text: without
    - correct: false
      text: with
    - correct: false
      text: near
    - correct: false
      text: under
    question: Що означає українське слово «без» англійською мовою?
  - explanation: Слово «гроші» — це множина, у Родовому відмінку буде «грошей».
    options:
    - correct: true
      text: немає грошей
    - correct: false
      text: немає гроші
    - correct: false
      text: немає грошам
    - correct: false
      text: немає грошів
    question: Як правильно сказати "no money"?
  - explanation: Це дуже ввічлива і поширена фраза, що означає "No problem".
    options:
    - correct: true
      text: Ввічливі (Polite)
    - correct: false
      text: Грубо (Rude)
    - correct: false
      text: Офіційно (Formal)
    - correct: false
      text: Неправильно (Incorrect)
    question: Фраза «Немає проблем» — це ввічливо чи грубо?
  - explanation: Фраза «На жаль» (Unfortunately) додає ввічливості при відмові.
    options:
    - correct: true
      text: На жаль
    - correct: false
      text: Будь ласка
    - correct: false
      text: Привіт
    - correct: false
      text: Супер
    question: Яка фраза робить відмову більш ввічливою?
  - explanation: «Немає проблем» — це родовий відмінок множини від слова «проблема». Запам'ятайте цю фразу цілком.
    options:
    - correct: true
      text: немає проблем
    - correct: false
      text: немає проблема
    - correct: false
      text: немає проблему
    - correct: false
      text: без проблема
    question: Як правильно сказати "no problems" українською?
  title: Перевірка знань
  type: quiz
- instruction: З’єднайте стверджувальні речення з відповідними заперечними.
  pairs:
  - left: Тут є вода
    right: Тут немає води
  - left: У мене є час
    right: У мене немає часу
  - left: У тебе є квиток
    right: У тебе немає квитка
  - left: Тут є цукор
    right: Тут немає цукру
  - left: У нас є гроші
    right: У нас немає грошей
  - left: Тут є паспорт
    right: Тут немає паспорта
  - left: Тут є чай
    right: Тут немає чаю
  - left: Тут є борщ
    right: Тут немає борщу
  title: Є чи немає?
  type: match-up
- instruction: Оберіть правильне слово, щоб доповнити діалог.
  items:
  - answer: хліба
    explanation: 'Після «немає» використовуємо Родовий відмінок: хліб → хліба.'
    options:
    - хліба
    - хліб
    - хлібу
    - хлібом
    sentence: — У вас є хліб? — Вибачте, ... (хліб) немає.
  - answer: ключа
    explanation: Ключ — конкретний предмет, закінчення -а.
    options:
    - ключа
    - ключ
    - ключу
    - ключі
    sentence: — У тебе є ключ? — Ні, у мене немає ... (ключ).
  - answer: без молока
    explanation: 'Прийменник «без» вимагає Родового відмінка: молоко → молока.'
    options:
    - без молока
    - без молоко
    - з молоком
    - молоко
    sentence: — Ви бажаєте чай з молоком? — Ні, я люблю ... (без молоко).
  - answer: немає проблем
    explanation: Стала фраза «немає проблем» (множина).
    options:
    - немає проблем
    - немає проблема
    - немає проблеми
    - є проблема
    sentence: — У нас є проблема? — Ні, ... (немає проблема).
  - answer: немає квитка
    explanation: Квиток → квитка (випадає «о», закінчення -а).
    options:
    - немає квитка
    - немає квиток
    - є квиток
    - без квитка
    sentence: — У вас є квиток? — На жаль, ... (немає квиток).
  - answer: немає води
    explanation: Вода → води (закінчення -и).
    options:
    - немає води
    - немає вода
    - води немає
    - без води
    sentence: — Це вода? — Тут ... (немає вода).
  - answer: часу
    explanation: Час - абстрактне поняття, закінчення -у.
    options:
    - часу
    - час
    - часа
    - часом
    sentence: — Ти йдеш у кіно? — Ні, у мене немає ... (час).
  - answer: концерту
    explanation: "Концерт - подія/абстрактне, часто закінчення -у (хоча іноді -а, але тут -у як подія). В уроку: 'немає концерту'."
    options:
    - концерту
    - концерт
    - концерта
    - концерти
    sentence: — Сьогодні буде концерт? — Ні, сьогодні немає ... (концерт).
  title: Заповніть діалоги
  type: fill-in
