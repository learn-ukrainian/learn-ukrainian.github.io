- type: quiz
  title: "Перевірка розуміння: «немає» та «без»"
  instruction: "Оберіть правильну форму слова."
  items:
    - question: "Як правильно сказати «I don't have milk»?"
      options:
        - text: "У мене немає молоко"
          correct: false
        - text: "У мене немає молока"
          correct: true
        - text: "У мене немає молокам"
          correct: false
        - text: "У мене немає молоку"
          correct: false
    - question: "Яке закінчення має слово «хліб» після «немає»?"
      options:
        - text: "-у"
          correct: false
        - text: "-а"
          correct: true
        - text: "-и"
          correct: false
        - text: "-о"
          correct: false
    - question: "Як правильно сказати «without sugar»?"
      options:
        - text: "без цукру"
          correct: true
        - text: "без цукора"
          correct: false
        - text: "без цукри"
          correct: false
        - text: "без цукор"
          correct: false
    - question: "Яке закінчення має жіночий рід (наприклад, «вода») у родовому відмінку?"
      options:
        - text: "-а"
          correct: false
        - text: "-и"
          correct: true
        - text: "-і"
          correct: false
        - text: "-у"
          correct: false
    - question: "Як ви зазвичай кажете слово «unfortunately»?"
      options:
        - text: "будь ласка"
          correct: false
        - text: "на жаль"
          correct: true
        - text: "вибачте"
          correct: false
        - text: "добрий день"
          correct: false
    - question: "Яка форма слова «гроші» після «немає»?"
      options:
        - text: "гроші"
          correct: false
        - text: "грошей"
          correct: true
        - text: "гроша"
          correct: false
        - text: "грошу"
          correct: false
    - question: "Яке закінчення має слово «кава» після «без»?"
      options:
        - text: "-и"
          correct: true
        - text: "-а"
          correct: false
        - text: "-е"
          correct: false
        - text: "-у"
          correct: false
    - question: "Яке закінчення має слово «час» у запереченні?"
      options:
        - text: "-а"
          correct: false
        - text: "-у"
          correct: true
        - text: "-и"
          correct: false
        - text: "-е"
          correct: false
    - question: "Як правильно і ввічливо сказати «without water»?"
      options:
        - text: "без води"
          correct: true
        - text: "без вода"
          correct: false
        - text: "без воду"
          correct: false
        - text: "без водою"
          correct: false
    - question: "Що саме означає українське слово «немає»?"
      options:
        - text: "I have"
          correct: false
        - text: "there is no"
          correct: true
        - text: "I want"
          correct: false
        - text: "please"
          correct: false
    - question: "Яке закінчення має слово «машина» після «немає»?"
      options:
        - text: "-и"
          correct: true
        - text: "-а"
          correct: false
        - text: "-у"
          correct: false
        - text: "-о"
          correct: false
    - question: "Яке закінчення має слово «цукор» після «без»?"
      options:
        - text: "-у"
          correct: true
        - text: "-а"
          correct: false
        - text: "-и"
          correct: false
        - text: "-ом"
          correct: false

- type: match-up
  title: "Ствердження та заперечення"
  instruction: "Знайдіть пару: що є і чого немає."
  pairs:
    - left: "Є телефон."
      right: "Немає телефона."
    - left: "Є вода."
      right: "Немає води."
    - left: "Є час."
      right: "Немає часу."
    - left: "Є квиток."
      right: "Немає квитка."
    - left: "Є кава."
      right: "Немає кави."
    - left: "Є цукор."
      right: "Немає цукру."
    - left: "Є ключ."
      right: "Немає ключа."
    - left: "Є гроші."
      right: "Немає грошей."
    - left: "Є машина."
      right: "Немає машини."
    - left: "Є молоко."
      right: "Немає молока."

- type: fill-in
  title: "Заповніть пропуски"
  instruction: "Оберіть правильне закінчення для слова."
  items:
    - sentence: "У мене немає ключ... ."
      answer: "ключа"
      options: ["ключа", "ключу", "ключи", "ключ"]
    - sentence: "Тут немає вод... ."
      answer: "води"
      options: ["води", "вода", "воду", "воде"]
    - sentence: "Я хочу каву без цукр... ."
      answer: "цукру"
      options: ["цукру", "цукра", "цукри", "цукром"]
    - sentence: "Сьогодні немає час... ."
      answer: "часу"
      options: ["часу", "часа", "часи", "часом"]
    - sentence: "У нас немає грош... ."
      answer: "грошей"
      options: ["грошей", "гроші", "гроша", "грошу"]
    - sentence: "Він п'є чай без молок... ."
      answer: "молока"
      options: ["молока", "молоко", "молоку", "молоки"]
    - sentence: "Де мій квиток? Тут немає квитк... ."
      answer: "квитка"
      options: ["квитка", "квитку", "квитки", "квитком"]
    - sentence: "У мене немає телефон... ."
      answer: "телефона"
      options: ["телефона", "телефону", "телефони", "телефон"]
    - sentence: "Тут немає кав... ."
      answer: "кави"
      options: ["кави", "кава", "каву", "каве"]
    - sentence: "Будь ласка, вода без газ... ."
      answer: "газу"
      options: ["газу", "газа", "газом", "гази"]
    - sentence: "Я п'ю чай без цукр... ."
      answer: "цукру"
      options: ["цукру", "цукра", "цукром", "цукри"]
    - sentence: "У нас немає проблем... ."
      answer: "проблеми"
      options: ["проблеми", "проблема", "проблему", "проблеме"]

- type: true-false
  title: "Правда чи неправда?"
  instruction: "Визначте, чи правильне речення."
  items:
    - statement: "Після слова «немає» ми використовуємо Родовий відмінок."
      correct: true
    - statement: "Слово «гроші» після «немає» стає «гроша»."
      correct: false
    - statement: "Прийменник «без» вимагає Родового відмінка."
      correct: true
    - statement: "Мас-іменники (цукор, час) часто мають закінчення -у."
      correct: true
    - statement: "«На жаль» означає «You are welcome»."
      correct: false
    - statement: "Слово «квиток» у родовому відмінку — «квитка»."
      correct: true
    - statement: "Слово «вода» у родовому відмінку має закінчення -и."
      correct: true
    - statement: "Слово «хліб» після «немає» має закінчення -у."
      correct: false
    - statement: "Слово «немає» означає відсутність чогось."
      correct: true
    - statement: "Ми кажемо «кава без молоко»."
      correct: false
    - statement: "У запереченні чоловічий рід (конкретні назви) має закінчення -а."
      correct: true
    - statement: "Слово «час» має закінчення -у після «немає»."
      correct: true

- type: unjumble
  title: "Складіть речення"
  instruction: "Розставте слова в правильному порядку."
  items:
    - words: ["немає", "У", "мене", "ключа"]
      answer: "У мене немає ключа"
    - words: ["води", "немає", "Тут"]
      answer: "Тут немає води"
    - words: ["без", "каву", "Я", "цукру", "хочу"]
      answer: "Я хочу каву без цукру"
    - words: ["немає", "часу", "жаль", "На"]
      answer: "На жаль немає часу"
    - words: ["молока", "без", "Чай", "ласка", "будь"]
      answer: "Чай без молока будь ласка"
    - words: ["телефона", "У", "немає", "нього"]
      answer: "У нього немає телефона"
    - words: ["грошей", "немає", "Сьогодні"]
      answer: "Сьогодні немає грошей"
    - words: ["квитка", "немає", "Вас", "у"]
      answer: "У вас немає квитка"
    - words: ["без", "Вода", "газу"]
      answer: "Вода без газу"
    - words: ["хліба", "Тут", "немає"]
      answer: "Тут немає хліба"
    - words: ["проблеми", "немає", "Це"]
      answer: "Це немає проблеми"
    - words: ["без", "їм", "хліб", "Я", "води"]
      answer: "Я їм хліб без води"

