      correct: true
    - text: немає паспорт
      correct: false
    - text: немає паспорту
      correct: false
    - text: є паспорт
      correct: false
  - question: '— У вас є гроші? — Ні, у нас ...'
    options:
    - text: немає грошей
      correct: true
    - text: немає гроші
      correct: false
    - text: немає грошам
      correct: false
    - text: немає грошима
      correct: false
  - question: '— Ви хочете каву з молоком? — Ні, я хочу каву ...'
    options:
    - text: без молока
      correct: true
    - text: без молоко
      correct: false
    - text: немає молока
      correct: false
    - text: без молоком
      correct: false
  - question: '— Тут є вода? — Ні, тут ...'
    options:
    - text: немає води
      correct: true
    - text: немає вода
      correct: false
    - text: немає воду
      correct: false
    - text: немає воді
      correct: false
  - question: '— Ви поспішаєте? — Так, у мене ...'
    options:
    - text: немає часу
      correct: true
    - text: немає час
      correct: false
    - text: немає часа
      correct: false
    - text: є час
      correct: false
  - question: '— У вас є хліб? — Вибачте, у магазині ...'
    options:
    - text: немає хліба
      correct: true
