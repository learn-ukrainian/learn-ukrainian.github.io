- type: fill-in
  title: "Complete the Conversation"
  instruction: "Select the correct word to complete these basic exchanges."
  items:
    - sentence: "- Добрий день! - Добрий ___!"
      answer: "день"
      options:
        - "день"
        - "ранок"
        - "вечір"
        - "привіт"
    - sentence: "- Як справи? - Дякую, ___!"
      answer: "добре"
      options:
        - "добре"
        - "так"
        - "ні"
        - "привіт"
    - sentence: "- Кава, ___ ласка."
      answer: "будь"
      options:
        - "будь"
        - "день"
        - "як"
        - "дякую"
    - sentence: "- ___, де метро?"
      answer: "Вибачте"
      options:
        - "Вибачте"
        - "Дякую"
        - "Добре"
        - "Привіт"
    - sentence: "- Смачного! - ___!"
      answer: "Дякую"
      options:
        - "Дякую"
        - "Погано"
        - "Так"
        - "Ні"
    - sentence: "- До ___!"
      answer: "побачення"
      options:
        - "побачення"
        - "ранок"
        - "вечір"
        - "день"
    - sentence: "- Привіт! Як ___?"
      answer: "справи"
      options:
        - "справи"
        - "день"
        - "ранок"
        - "вечір"
    - sentence: "- Ти студент? - ___, я студент."
      answer: "Так"
      options:
        - "Так"
        - "Ні"
        - "Добре"
        - "Погано"

- type: match-up
  title: "Match to the Situation"
  instruction: "Match the situation on the left with the correct Ukrainian response on the right."
  pairs:
    - left: "You accidentally step on someone's foot"
      right: "Вибачте"
    - left: "You receive a gift"
      right: "Дякую"
    - left: "You hand a coffee to your friend"
