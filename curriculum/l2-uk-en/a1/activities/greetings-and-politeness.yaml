    - left: "You meet a close friend"
      right: "Привіт"
    - left: "You are leaving a cafe"
      right: "До побачення"
    - left: "You want to say 'yes'"
      right: "Так"
    - left: "You want to say 'no'"
      right: "Ні"
    - left: "Someone asks how you are doing"
      right: "Добре"

- type: true-false
  title: "Culture and Meaning"
  instruction: "Read the statements about Ukrainian phrases and decide if they are true or false."
  items:
    - statement: "'Привіт' is primarily used with friends and family."
      correct: true
      explanation: "It is an informal greeting, similar to 'Hi' in English."
    - statement: "'Добраніч' is the greeting you use when arriving at a party at night."
      correct: false
      explanation: "Добраніч means 'Good night' and is only used when parting or going to sleep."
    - statement: "'Будь ласка' can mean both 'Please' and 'You're welcome'."
      correct: true
      explanation: "It is a very versatile politeness phrase in Ukrainian."
    - statement: "'Добрий день' literally translates to 'Good day'."
      correct: true
      explanation: "It is the most common daytime greeting."
    - statement: "You say 'Смачного' to someone before they start eating."
      correct: true
      explanation: "It is the Ukrainian equivalent of 'Bon appetit'."
    - statement: "'Па-па' means exactly the same thing as 'Добрий день'."
      correct: false
      explanation: "Па-па is 'Bye-bye', while Добрий день is 'Good day' (hello)."
    - statement: "'Так' and 'Ні' are the Ukrainian words for 'Yes' and 'No'."
      correct: true
      explanation: "These are the essential words for agreeing or disagreeing."
    - statement: "'Перепрошую' is another polite way to say excuse me."
      correct: true
      explanation: "It is often used to politely get someone's attention or pass by them."