- type: quiz
  title: "Basic Greetings & Politeness"
  instruction: "Choose the correct Ukrainian word or phrase for the given English meaning."
  items:
    - question: "How do you say 'Thank you'?"
      explanation: "Дякую is the standard way to say thank you."
      options:
        - text: "Дякую"
          correct: true
        - text: "Будь ласка"
          correct: false
        - text: "Вибачте"
          correct: false
        - text: "Так"
          correct: false
    - question: "How do you say 'Please' or 'You're welcome'?"
      explanation: "Будь ласка serves as both please and you're welcome."
      options:
        - text: "Будь ласка"
          correct: true
        - text: "Добре"
          correct: false
        - text: "Ні"
          correct: false
        - text: "Привіт"
          correct: false
    - question: "What is the formal way to say 'Hello' during the day?"
      explanation: "Добрий день is used during the daytime to say hello."
      options:
        - text: "Добрий день"
          correct: true
        - text: "Добрий вечір"
          correct: false
        - text: "Добрий ранок"
          correct: false
        - text: "Добраніч"
          correct: false
    - question: "How do you apologize (say 'Sorry')?"
      explanation: "Вибачте is used to apologize or get someone's attention."
      options:
        - text: "Вибачте"
          correct: true
        - text: "Па-па"
          correct: false
        - text: "Чудово"
          correct: false
        - text: "Нормально"
          correct: false
    - question: "How do you say 'Yes'?"
      explanation: "Так means yes."
      options:
        - text: "Так"
          correct: true
        - text: "Ні"
          correct: false
        - text: "Добре"
          correct: false
        - text: "Погано"
          correct: false
    - question: "How do you say 'No'?"
      explanation: "Ні means no."
      options:
        - text: "Ні"
          correct: true
        - text: "Так"
          correct: false
        - text: "Дякую"
          correct: false
        - text: "Вибачте"
          correct: false
    - question: "What is the informal way to say 'Hello' to a friend?"
      explanation: "Привіт is an informal greeting used with friends and family."
      options:
        - text: "Привіт"
          correct: true
        - text: "Добрий день"
          correct: false
        - text: "До побачення"
          correct: false
        - text: "Перепрошую"
          correct: false
    - question: "How do you say 'Goodbye'?"
      explanation: "До побачення is the standard formal way to say goodbye."
      options:
        - text: "До побачення"
          correct: true
        - text: "Па-па"
          correct: false
        - text: "Смачного"
          correct: false
        - text: "Як справи?"
          correct: false

- type: match-up
  title: "English to Ukrainian Match"
  instruction: "Match the English phrases to their Ukrainian translations."
  pairs:
    - left: "Good morning"
      right: "Добрий ранок"
    - left: "Good evening"
      right: "Добрий вечір"
    - left: "How are you?"
      right: "Як справи?"
    - left: "Good / Fine"
      right: "Добре"
    - left: "Bad"
      right: "Погано"
    - left: "Excuse me"
      right: "Перепрошую"
    - left: "Bye-bye"
      right: "Па-па"
    - left: "Good night"
      right: "Добраніч"

- type: true-false
  title: "Situations: True or False"
  instruction: "Decide if the statement about how to use these phrases is true or false."
  items:
    - statement: "You say 'Привіт' to your boss at a formal meeting."
      correct: false
      explanation: "Привіт is informal. You should use Добрий день with a boss."
    - statement: "'Добрий ранок' is used in the morning."
      correct: true
      explanation: "Добрий ранок literally means Good morning."
    - statement: "'Па-па' is a formal way to say goodbye."
      correct: false
      explanation: "Па-па is very informal, like bye-bye in English."
    - statement: "You can say 'Будь ласка' when handing someone a cup of coffee."
      correct: true
      explanation: "Будь ласка can mean Here you go when offering something."
    - statement: "'Дякую' means 'Sorry'."
      correct: false
      explanation: "Дякую means Thank you. Sorry is Вибачте."
    - statement: "'Добре' is a positive answer to 'Як справи?'."
      correct: true
      explanation: "Добре means good or fine, which is a great response."
    - statement: "'Вибачте' is used when you accidentally step on someone's foot."
      correct: true
      explanation: "Вибачте is the standard way to apologize."
    - statement: "'Добрий вечір' is used when going to sleep."
      correct: false
      explanation: "Добрий вечір is Good evening. Good night is Добраніч."

- type: anagram
  title: "Spelling Check"
  instruction: "Unscramble the letters to form common Ukrainian words."
  items:
    - scrambled: "Д Я К У Ю"
      answer: "ДЯКУЮ"
    - scrambled: "П Р И В І Т"
      answer: "ПРИВІТ"
    - scrambled: "В И Б А Ч Т Е"
      answer: "ВИБАЧТЕ"
    - scrambled: "Д О Б Р Е"
      answer: "ДОБРЕ"
    - scrambled: "П О Г А Н О"
      answer: "ПОГАНО"
    - scrambled: "Р А Н О К"
      answer: "РАНОК"
    - scrambled: "В Е Ч І Р"
      answer: "ВЕЧІР"
    - scrambled: "Д Е Н Ь"
      answer: "ДЕНЬ"

- type: group-sort
  title: "Sort the Phrases"
  instruction: "Categorize the phrases into Greetings, Farewells, and Politeness."
  groups:
    - name: "Greetings"
      items:
        - "Привіт"
        - "Добрий день"
        - "Добрий ранок"
    - name: "Farewells"
