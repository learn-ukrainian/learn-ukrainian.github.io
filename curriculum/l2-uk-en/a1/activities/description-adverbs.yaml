- instruction: Read the statement and decide if it is grammatically correct or true.
  items:
  - correct: false
    explanation: Ні, «швидко» відповідає на питання «Як?» (How?).
    statement: Слово «швидко» відповідає на питання «Який?».
  - correct: true
    explanation: 'Так, це виняток: добрий → добре.'
    statement: Слово «добрий» змінюється на «добре».
  - correct: false
    explanation: 'Помилка! Потрібне подвійне заперечення: «Я ніколи НЕ сплю».'
    statement: У реченні «Я ніколи сплю» немає помилки.
  - correct: true
    explanation: Так, це прислівник (loudly).
    statement: Слово «голосно» — це прислівник.
  - correct: false
    explanation: Ні, «часто» зазвичай стоїть ПЕРЕД дієсловом.
    statement: Прислівник часу «часто» зазвичай стоїть після дієслова.
  - correct: true
    explanation: Так, «гарний» (beautiful/good) — це прикметник.
    statement: Слово «гарний» — це прикметник.
  - correct: false
    explanation: 'Ні, правильно: «Він бігає швидко».'
    statement: «Він бігає швидкий» — це правильне речення.
  - correct: true
    explanation: Так, дуже = very.
    statement: Слово «дуже» означає «very».
  - correct: false
    explanation: Ні, «завжди» = always. «Ніколи» = never.
    statement: Слово «завжди» означає «never».
  - correct: true
    explanation: Так, це стандартна позиція (Він читає швидко).
    statement: Прислівник способу дії зазвичай стоїть після дієслова.
  - correct: false
    explanation: Ні, «трохи» = a little. «Надто» = too.
    statement: «Трохи» означає «too».
  - correct: true
    explanation: Так, смачний + -о = смачно.
    statement: Слово «смачно» утворене від слова «смачний».
