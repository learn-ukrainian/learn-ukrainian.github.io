- instruction: Choose the correct answer about Ukrainian adverbs.
  items:
  - explanation: Adverbs of manner answer the question 'Як?' (How?).
    options:
    - correct: true
      text: Як?
    - correct: false
      text: Який?
    - correct: false
      text: Хто?
    - correct: false
      text: Що?
    question: На яке питання відповідає прислівник способу дії?
  - explanation: Most adverbs derived from adjectives end in -о (швидкий → швидко).
    options:
    - correct: true
      text: -о
    - correct: false
      text: -ий
    - correct: false
      text: -а
    - correct: false
      text: -е
    question: Яке закінчення зазвичай мають прислівники, утворені від прикметників?
  - explanation: 'This is an exception: добрий → добре.'
    options:
    - correct: true
      text: добре
    - correct: false
      text: добро
    - correct: false
      text: добрий
    - correct: false
      text: добр
    question: Як утворити прислівник від слова «добрий»?
  - explanation: Adverbs of manner usually stand after the verb.
    options:
    - correct: true
      text: Після дієслова
    - correct: false
      text: Перед дієсловом
    - correct: false
      text: На початку речення
    - correct: false
      text: В кінці речення
    question: Де зазвичай стоїть прислівник способу дії (наприклад, «швидко»)?
  - explanation: Adverbs of frequency usually stand before the verb.
    options:
    - correct: true
      text: Перед дієсловом
    - correct: false
      text: Після дієслова
    - correct: false
      text: Після іменника
    - correct: false
      text: Завжди в кінці
    question: Де зазвичай стоїть прислівник часу (наприклад, «часто»)?
  - explanation: 'Ukrainian requires double negation: ніколи не.'
    options:
    - correct: true
      text: Я ніколи не сплю
    - correct: false
      text: Я ніколи сплю
    - correct: false
      text: Я не сплю ніколи
    - correct: false
      text: Я сплю ніколи
    question: Як перекласти «I never sleep» українською?
  - explanation: Дуже means very.
    options:
    - correct: true
      text: дуже
    - correct: false
      text: трохи
    - correct: false
      text: надто
    - correct: false
      text: завжди
    question: Як перекласти слово «very» українською мовою?
  - explanation: Добре is often used to mean 'OK' or 'Fine'.
    options:
    - correct: true
      text: OK / Згода
    - correct: false
      text: Погано
    - correct: false
      text: Швидко
    - correct: false
      text: Ні
    question: Що означає слово «добре» у діалозі?
  - explanation: Тихо (quietly) is the opposite of голосно (loudly).
    options:
    - correct: true
      text: тихо
    - correct: false
      text: швидко
    - correct: false
      text: добре
    - correct: false
      text: гарно
    question: Який прислівник є антонімом до слова «голосно»?
  - explanation: Повільно (slowly) is the opposite of швидко (quickly).
    options:
    - correct: true
      text: повільно
    - correct: false
      text: тихо
    - correct: false
      text: добре
    - correct: false
      text: легко
    question: Який прислівник є антонімом до слова «швидко»?
  - explanation: Трохи means a little.
    options:
    - correct: true
      text: трохи
    - correct: false
      text: дуже
    - correct: false
      text: надто
    - correct: false
      text: завжди
    question: Як перекласти вираз «a little» українською мовою?
  - explanation: Завжди means always.
    options:
    - correct: true
      text: always
    - correct: false
      text: never
    - correct: false
      text: often
    - correct: false
      text: sometimes
    question: Що означає українське слово «завжди» англійською?
