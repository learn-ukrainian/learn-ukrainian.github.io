workbook:
- id: match-up-animate-forms
  type: match-up
  instruction: З'єднайте початкову форму з формою знахідного відмінка (Match the base
    form with the Accusative form)
  pairs:
  - left: лікар (doctor)
    right: лікаря
  - left: друг (friend)
    right: друга
  - left: сусід (neighbor)
    right: сусіда
  - left: продавець (seller)
    right: продавця
  - left: викладач (lecturer)
    right: викладача
  - left: колега (colleague)
    right: колегу
  - left: покупець (buyer)
    right: покупця
- id: error-correction-animate
  type: error-correction
  instruction: Знайдіть і виправте помилку (Find and correct the error)
  items:
  - sentence: Я чекаю мій брат.
    error: брат
    correction: брата
    error_type: word
    options:
    - брата
    - брату
    - братом
    explanation: Брат (brother) is animate and masculine, so it changes to брата.
  - sentence: Ти знаєш лікар?
    error: лікар
    correction: лікаря
    error_type: word
    options:
    - лікаря
    - лікарю
    - лікарем
    explanation: Лікар (doctor) is animate and masculine, so it takes the -я ending.
  - sentence: Ми любимо тато.
    error: тато
    correction: тата
    error_type: word
    options:
    - тата
    - тату
    - татом
    explanation: Тато (dad) is animate and masculine, so -о changes to -а.
  - sentence: Вона шукає сусід.
    error: сусід
    correction: сусіда
    error_type: word
    options:
    - сусіда
    - сусіду
    - сусідом
    explanation: Сусід (neighbor) is animate and masculine, so it takes the -а ending.
  - sentence: Я бачу новий продавець.
    error: продавець
    correction: продавця
    error_type: word
    options:
    - продавця
    - продавцю
    - продавцем
    explanation: Продавець (seller) is animate and masculine, so it changes to продавця.
  - sentence: Ви знаєте ця колега?
    error: колега
    correction: колегу
    error_type: word
    options:
    - колегу
    - колеги
    - колегою
    explanation: Колега (colleague) ends in -а, so it changes to -у in the Accusative
      case.
- id: unjumble-animate-sentences
  type: unjumble
  instruction: Складіть правильне речення зі слів (Put the words in the correct order
    to make a sentence)
  items:
  - words:
    - друга.
    - Я
    - мого
    - чекаю
    correct_order:
    - Я
    - чекаю
    - мого
    - друга.
  - words:
    - Ти
    - лікаря?
    - знаєш
    - цього
    correct_order:
    - Ти
    - знаєш
    - цього
    - лікаря?
  - words:
    - шукає
    - брата.
    - Олена
    - свого
    correct_order:
    - Олена
    - шукає
    - свого
    - брата.
  - words:
    - сусіда.
    - бачу
    - нашого
    - Я
    correct_order:
    - Я
    - бачу
    - нашого
    - сусіда.
  - words:
    - любиш
    - Кого
    - ти?
    correct_order:
    - Кого
    - ти
    - любиш?
  - words:
    - покупця.
    - продавець
    - бачить
    - Новий
    correct_order:
    - Новий
    - продавець
    - бачить
    - покупця.
- id: order-wedding-dialogue
  type: order
  instruction: Розставте репліки діалогу в правильному порядку (Put the dialogue lines
    in the correct order)
  items:
  - — Кого ти бачиш?
  - — Я бачу маму і тата. А це мій брат.
  - — Ти знаєш мого брата?
  - — Ні, я не знаю твого брата.
  - — Ходімо! Я тебе познайомлю!
  correct_order:
  - 0
  - 1
  - 2
  - 3
  - 4
- id: translate-accusative-animate
  type: translate
  instruction: Оберіть правильний переклад (Choose the correct translation)
  items:
