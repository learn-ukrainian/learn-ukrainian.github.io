- id: group-sort-gender-acc
  type: group-sort
  instruction: Розподіліть слова за родами (Sort words by gender)
  groups:
  - label: Чоловічий рід (Masculine)
    items:
    - брата
    - друга
    - лікаря
    - сусіда
    - вчителя
    - тата
  - label: Жіночий рід (Feminine)
    items:
    - маму
    - сестру
    - Олену
    - подругу
    - колегу
    - вчительку
- id: true-false-animate
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: «Я бачу брат» — це правильне речення.
    correct: false
    explanation: Брат — це жива істота (animate). Треба казати «Я бачу брата».
  - statement: Для живих істот (людей) ми використовуємо питання «Кого?».
    correct: true
    explanation: Так, питання «Кого?» використовується для людей і тварин.
  - statement: «Я їм хліба» — це правильне речення.
    correct: false
    explanation: Хліб — це неживий предмет (inanimate). Треба казати «Я їм хліб».
  - statement: Слово «мама» у знахідному відмінку (Accusative) змінюється на «маму».
    correct: true
    explanation: Жіночий рід змінює закінчення -а на -у.
  - statement: Чоловічі неживі іменники у знахідному відмінку не змінюють закінчення.
    correct: true
    explanation: Вони відповідають на питання «Що?» і залишаються як у словнику.
  - statement: Слово «лікар» у знахідному відмінку буде «лікар».
    correct: false
    explanation: Лікар — це людина. Треба казати «лікаря».
