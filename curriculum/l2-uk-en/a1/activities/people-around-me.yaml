- type: observe
  examples:
  - Я бачу хліб. (хліб → хліб — no change)
  - Я бачу брата. (брат → брата — changes!)
  - Я п'ю чай. (чай → чай — no change)
  - Я знаю друга. (друг → друга — changes!)
