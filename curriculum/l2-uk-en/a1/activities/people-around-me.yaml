version: '1.0'
module: people-around-me
level: a1
inline:
- id: sort-animate-inanimate
  type: group-sort
  instruction: 'Розподіліть слова: істоти та неістоти (Sort the words: animate vs
    inanimate)'
  groups:
  - label: Кого? (Animate)
    items:
    - брата
    - маму
    - друга
    - лікаря
    - Олену
  - label: Що? (Inanimate)
    items:
    - хліб
    - каву
    - воду
    - чай
    - борщ
