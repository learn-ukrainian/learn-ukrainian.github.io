workbook:
- type: match-up
  instruction: З'єднайте слово з формою знахідного відмінка (Match each noun to its
    accusative form)
  pairs:
  - left: мама
    right: маму
  - left: тато
    right: тата
  - left: брат
    right: брата
  - left: друг
    right: друга
  - left: лікар
    right: лікаря
  - left: вчитель
    right: вчителя
  - left: подруга
    right: подругу
  - left: сусід
    right: сусіда
- type: error-correction
  instruction: Знайдіть і виправте помилку (Find and correct the error in each sentence)
  items:
  - sentence: Я бачу брат.
    error: брат
    correction: брата
    error_type: word
    options:
    - брата
    - братом
    - братові
    explanation: 'Animate masculine accusative = genitive: брат → брата (кого?)'
  - sentence: Я знаю Олена.
    error: Олена
    correction: Олену
    error_type: word
    options:
    - Олену
    - Олени
    - Оленою
    explanation: 'Feminine animate accusative: -а → -у: Олена → Олену'
  - sentence: Я чекаю лікар.
    error: лікар
    correction: лікаря
    error_type: word
    options:
    - лікаря
    - лікарем
    - лікарю
    explanation: 'Animate masculine accusative = genitive: лікар → лікаря (кого?)'
  - sentence: Я люблю подруга.
    error: подруга
    correction: подругу
    error_type: word
    options:
    - подругу
    - подруги
    - подрузі
    explanation: 'Feminine animate accusative: -а → -у: подруга → подругу'
  - sentence: Я шукаю вчитель.
    error: вчитель
    correction: вчителя
    error_type: word
    options:
    - вчителя
    - вчителем
    - вчителю
    explanation: 'Animate masculine accusative = genitive: вчитель → вчителя (кого?)'
  - sentence: Я бачу сусід.
    error: сусід
    correction: сусіда
    error_type: word
    options:
    - сусіда
    - сусідом
    - сусіду
    explanation: 'Animate masculine accusative = genitive: сусід → сусіда (кого?)'
- type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: '''маму'' is the correct accusative form of ''мама''.'
    correct: true
    explanation: 'Yes — feminine accusative: -а → -у. Мама → маму.'
  - statement: '''брат'' is the correct accusative form of ''брат'' in ''Я знаю брат''.'
    correct: false
    explanation: 'No — animate masculine accusative = genitive: брат → брата. Correct:
      Я знаю брата.'
  - statement: '''хліб'' is the correct accusative form of ''хліб'' in ''Я бачу хліб''.'
    correct: true
    explanation: 'Yes — inanimate masculine accusative = nominative: хліб stays хліб
      (що?).'
  - statement: '''лікар'' is correct in ''Я чекаю лікар''.'
    correct: false
    explanation: 'No — animate masculine accusative = genitive: лікар → лікаря. Correct:
      Я чекаю лікаря.'
  - statement: '''Олену'' is the correct accusative form of ''Олена''.'
    correct: true
    explanation: 'Yes — feminine accusative: -а → -у. Олена → Олену.'
  - statement: '''стіл'' is the correct accusative form of ''стіл'' in ''Я бачу стіл''.'
    correct: true
    explanation: 'Yes — inanimate masculine accusative = nominative: стіл stays стіл
      (що?).'
  - statement: '''друг'' is the correct accusative form in ''Я знаю друг''.'
    correct: false
    explanation: 'No — animate masculine accusative = genitive: друг → друга. Correct:
      Я знаю друга.'
  - statement: The accusative of a masculine animate noun has the same form as the
      genitive.
    correct: true
    explanation: 'Yes — this is the key rule: Знахідний відмінок чоловічого роду живих
      істот = родовий.'
