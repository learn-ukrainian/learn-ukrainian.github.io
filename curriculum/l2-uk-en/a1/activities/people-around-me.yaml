workbook:
- id: match-up-animate
  type: match-up
  instruction: З'єднайте словникову форму з формою знахідного відмінка (Match the
    dictionary form with the accusative form)
  pairs:
  - left: брат
    right: брата
  - left: лікар
    right: лікаря
  - left: друг
    right: друга
  - left: сусід
    right: сусіда
  - left: вчитель
    right: вчителя
  - left: викладач
    right: викладача
  - left: продавець
    right: продавця
- id: unjumble-sentences
  type: unjumble
  instruction: Складіть правильне речення зі слів (Put the words in the correct order)
  items:
  - words:
    - брата.
    - бачу
    - Я
    correct_order:
    - Я
    - бачу
    - брата.
  - words:
    - лікаря.
    - чекаю
    - Я
    correct_order:
    - Я
    - чекаю
    - лікаря.
  - words:
    - знаєш
    - сусіда?
    - Ти
    correct_order:
    - Ти
    - знаєш
    - сусіда?
  - words:
    - подругу.
    - Вона
    - шукає
    correct_order:
    - Вона
    - шукає
    - подругу.
  - words:
    - маму.
    - Я
    - люблю
    - дуже
    correct_order:
    - Я
    - дуже
    - люблю
    - маму.
  - words:
    - знає
    - вчителя.
    - Він
    correct_order:
    - Він
    - знає
    - вчителя.
