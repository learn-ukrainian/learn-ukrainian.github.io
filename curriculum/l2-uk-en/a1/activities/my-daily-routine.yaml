- type: match-up
  title: 'Знайдіть пару: дія та переклад'
  pairs:
  - left: прокидатися
    right: to wake up
  - left: вмиватися
    right: to wash oneself
  - left: одягатися
    right: to get dressed
  - left: снідати
    right: to have breakfast
  - left: обідати
    right: to have lunch
  - left: вечеряти
    right: to have dinner
  - left: повертатися
    right: to return
  - left: відпочивати
    right: to rest
  instruction: З'єднайте відповідні елементи.
- type: group-sort
  title: Розподіліть дії за часом доби
  groups:
  - name: Ранок
    items:
    - прокидатися
    - вмиватися
    - чистити зуби
    - снідати
    - пити каву
  - name: День
    items:
    - працювати
    - обідати
    - йти на роботу
    - читати
  - name: Вечір
    items:
    - вечеряти
    - дивитися телевізор
    - лягати спати
    - читати книгу
  instruction: Розподіліть елементи за групами.
- type: quiz
  title: Оберіть правильну форму дієслова
  items:
  - question: Я ___ о сьомій годині кожного ранку.
    explanation: Займенник «я» вимагає закінчення -юся для зворотних дієслів.
    options:
    - text: прокидаюся
      correct: true
    - text: прокидаєшся
      correct: false
    - text: прокидається
      correct: false
    - text: прокидаємося
      correct: false
  - question: Ти ___ зуби кожного ранку?
    explanation: Займенник «ти» вимагає закінчення -еш/-єш.
    options:
    - text: чистиш
      correct: true
    - text: чищу
      correct: false
    - text: чистить
      correct: false
    - text: чистять
      correct: false
  - question: Ми зазвичай ___ вдома разом з сім'єю.
    explanation: Займенник «ми» вимагає закінчення -ємо.
    options:
    - text: снідаємо
      correct: true
    - text: снідаю
      correct: false
    - text: снідають
      correct: false
    - text: снідаєш
      correct: false
  - question: Вона часто ___ цікавий фільм увечері.
    explanation: Дієслово «дивитися» належить до II групи, тому закінчення -ить.
    options:
    - text: дивиться
      correct: true
    - text: дивишся
      correct: false
    - text: дивлюся
      correct: false
    - text: дивляться
      correct: false
  - question: Ви сьогодні ___ додому дуже пізно?
    explanation: Займенник «ви» вимагає закінчення -єтеся.
    options:
    - text: повертаєтеся
      correct: true
    - text: повертаємося
      correct: false
    - text: повертаються
      correct: false
    - text: повертається
      correct: false
  - question: Він зазвичай ___ о першій годині.
    explanation: Займенник «він» вимагає закінчення -є.
    options:
    - text: обідає
      correct: true
    - text: обідаєш
      correct: false
    - text: обідаю
      correct: false
    - text: обідають
      correct: false
  - question: Вони швидко ___ на роботу.
    explanation: Займенник «вони» вимагає закінчення -уть/-ють.
    options:
    - text: йдуть
      correct: true
    - text: йде
      correct: false
    - text: йду
      correct: false
    - text: йдемо
      correct: false
  - question: Я завжди ___ зуби кожного вечора.
    explanation: Займенник «я» вимагає закінчення -у/-ю.
    options:
    - text: чищу
      correct: true
    - text: чистиш
      correct: false
    - text: чистить
      correct: false
    - text: чистять
      correct: false
  instruction: Оберіть правильну відповідь.
- type: fill-in
  title: Вставте пропущене слово
  items:
  - sentence: Я ___ холодною водою щоранку.
    answer: вмиваюся
    options:
    - вмиваюся
    - вмиваєшся
    - вмивається
    - вмиваємося
  - sentence: Ти швидко ___?
    answer: одягаєшся
    options:
    - одягаєшся
    - одягаюся
    - одягаються
    - одягаєтеся
  - sentence: Ми зазвичай ___ о дев'ятій.
    answer: снідаємо
    options:
    - снідаємо
    - снідаю
    - снідають
    - снідаєш
  - sentence: Він ___ зуби двічі на день.
    answer: чистить
    options:
    - чистить
    - чищу
    - чистять
    - чистиш
  - sentence: Вони ___ цікавий фільм.
    answer: дивляться
    options:
    - дивляться
    - дивиться
    - дивимося
    - дивлюся
  - sentence: Ви ___ спати рано?
    answer: лягаєте
    options:
    - лягаєте
    - лягаю
    - лягаємо
    - лягають
  - sentence: Вони завжди ___ разом.
    answer: вечеряють
    options:
    - вечеряють
    - вечеряє
    - вечеряю
    - вечеряємо
  - sentence: Я ___ додому о шостій.
    answer: повертаюся
    options:
    - повертаюся
    - повертається
    - повертаються
    - повертаєшся
  instruction: Оберіть правильне слово для заповнення пропуску.
- type: unjumble
  title: Складіть речення
  items:
  - words:
    - Я
    - встаю
    - о
    - сьомій
    answer: Я встаю о сьомій
  - words:
    - Спочатку
    - я
    - вмиваюся
    answer: Спочатку я вмиваюся
  - words:
    - Потім
    - я
    - снідаю
    answer: Потім я снідаю
  - words:
    - Ми
    - йдемо
    - на
    - роботу
    answer: Ми йдемо на роботу
  - words:
    - Увечері
    - я
    - відпочиваю
    answer: Увечері я відпочиваю
  - words:
    - Нарешті
    - я
    - лягаю
    - спати
    answer: Нарешті я лягаю спати
  instruction: Розташуйте слова у правильному порядку.
- type: match-up
  title: Знайдіть переклад слів-маркерів
  pairs:
  - left: спочатку
    right: first / at first
  - left: потім
    right: then
  - left: після цього
    right: after that
  - left: нарешті
    right: finally
  - left: завжди
    right: always
  - left: ніколи
    right: never
  - left: зазвичай
    right: usually
  - left: рідко
    right: rarely
  instruction: З'єднайте відповідні елементи.
- type: quiz
  title: Перевірка розуміння
  items:
  - question: Що означає слово «обід» в українській культурі?
    explanation: Обід — це основний прийом їжі, який зазвичай складається з першої
      та другої страв.
    options:
    - text: Основний прийом їжі вдень
      correct: true
    - text: Легкий перекус
      correct: false
    - text: Пізня вечеря
      correct: false
    - text: Ранкова кава
      correct: false
  - question: Яке дієслово ми використовуємо для фрази «to wash hands»?
    explanation: Для миття рук ми використовуємо перехідне дієслово «мити», а не зворотне
      «вмиватися».
    options:
    - text: мити
      correct: true
    - text: вмиватися
      correct: false
    - text: купатися
      correct: false
    - text: чистити
      correct: false
  - question: Що українці роблять першим, коли повертаються додому?
    explanation: В українській культурі прийнято переодягатися в домашній одяг.
    options:
    - text: Переодягаються в домашній одяг
      correct: true
    - text: Обідають
      correct: false
    - text: Лягають спати
      correct: false
    - text: Йдуть на роботу
      correct: false
  - question: Як перекласти «I never sleep»? (Зверніть увагу на подвійне заперечення)
    explanation: В українській мові слово «ніколи» вимагає частки «не» перед дієсловом.
    options:
    - text: Я ніколи не сплю
      correct: true
    - text: Я ніколи сплю
      correct: false
    - text: Я не сплю ніколи
      correct: false
    - text: Я завжди не сплю
      correct: false
  - question: Що ми зазвичай робимо кожного ранку?
    explanation: Вранці ми вмиваємося після сну.
    options:
    - text: Вмиваємося
      correct: true
    - text: Лягаємо спати
      correct: false
    - text: Вечеряємо
      correct: false
    - text: Працюємо
      correct: false
  - question: Коли саме ми зазвичай обідаємо?
    explanation: Обід — це денний прийом їжі.
    options:
    - text: Вдень
      correct: true
    - text: Вночі
      correct: false
    - text: Вранці
      correct: false
    - text: Ніколи
      correct: false
  - question: Що саме означає українське слово «снідати»?
    explanation: Снідати — це їсти зранку.
    options:
    - text: To have breakfast
      correct: true
    - text: To have lunch
      correct: false
    - text: To have dinner
      correct: false
    - text: To sleep
      correct: false
  - question: Яке слово є антонімом до «ранок»?
    explanation: Ранок — це початок дня, вечір — кінець.
    options:
    - text: Вечір
      correct: true
    - text: День
      correct: false
    - text: Ніч
      correct: false
    - text: Обід
      correct: false
  instruction: Оберіть правильну відповідь.
- type: fill-in
  title: Вставте правильний прислівник
  items:
  - sentence: Я ___ снідаю вдома, я люблю свою кухню.
    answer: завжди
    options:
    - завжди
    - ніколи
    - рідко
    - іноді
  - sentence: Він ___ не запізнюється, він дуже пунктуальний.
    answer: ніколи
    options:
    - ніколи
    - завжди
    - іноді
    - рідко
  - sentence: Ми ___ дивимося телевізор, бо у нас немає часу.
    answer: рідко
    options:
    - рідко
    - завжди
    - зазвичай
    - ніколи
  - sentence: Я ___ встаю о сьомій, але у вихідні сплю довше.
    answer: зазвичай
    options:
    - зазвичай
    - ніколи
    - завжди
    - іноді
  - sentence: ___ я не хочу йти на роботу.
    answer: Іноді
    options:
    - Іноді
    - Завжди
    - Ніколи
    - Рідко
  - sentence: Я ___ не спізнююся, бо я не люблю чекати.
    answer: ніколи
    options:
    - ніколи
    - завжди
    - іноді
    - рідко
  - sentence: Ми ___ відпочиваємо вдома у вихідні.
    answer: зазвичай
    options:
    - зазвичай
    - ніколи
    - рідко
    - іноді
  - sentence: Ти ___ п'єш каву зранку?
    answer: завжди
    options:
    - завжди
    - ніколи
    - рідко
    - іноді
  instruction: Оберіть правильне слово для заповнення пропуску.
- type: unjumble
  title: Складіть складніші речення
  items:
  - words:
    - Я
    - ніколи
    - не
    - снідаю
    - вдома
    answer: Я ніколи не снідаю вдома
  - words:
    - Ми
    - зазвичай
    - вечеряємо
    - разом
