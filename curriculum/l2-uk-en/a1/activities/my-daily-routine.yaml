  - words:
    - Спочатку
    - я
    - вмиваюся,
    - а
    - потім
    - одягаюся
    answer: Спочатку я вмиваюся, а потім одягаюся
  - words:
    - У
    - суботу
    - я
    - встаю
    - пізно
    answer: У суботу я встаю пізно
  - words:
    - Я
    - працюю
    - до
    - п'ятої
    - години
    answer: Я працюю до п'ятої години
  - words:
    - Увечері
    - я
    - дивлюся
    - цікавий
    - фільм
