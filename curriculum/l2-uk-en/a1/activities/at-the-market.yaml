- type: fill-in
  title: "Розмова з продавцем"
  instruction: "Complete the dialogue between the buyer and the seller."
  items:
    - sentence: "— Добрий _____! По скільки помідори?"
      answer: "день"
      options: ["день", "ранок", "вечір", "ніч"]
      explanation: "Standard greeting: «Добрий день»."
    - sentence: "— Добрий день! По _____ помідори?"
      answer: "скільки"
      options: ["скільки", "яка", "що", "коли"]
      explanation: "«По скільки?» is the common question for price."
    - sentence: "— Двадцять гривень. Вони дуже _____."
      answer: "свіжі"
      options: ["свіжі", "старі", "погані", "дорогі"]
      explanation: "The seller praises the goods: fresh (свіжі)."
    - sentence: "— Дайте, будь _____, два кілограми."
      answer: "ласка"
      options: ["ласка", "прошу", "дякую", "добре"]
      explanation: "«Будь ласка» means please."
    - sentence: "— Ось. _____ ще?"
      answer: "Що"
      options: ["Що", "Хто", "Як", "Де"]
      explanation: "«Що ще?» means 'What else?'."
    - sentence: "— Ні, дякую. Скільки з _____?"
      answer: "мене"
      options: ["мене", "вас", "нас", "тебе"]
      explanation: "«Скільки з мене?» means 'How much do I owe?'."
    - sentence: "— З _____ сорок гривень."
      answer: "вас"
      options: ["вас", "мене", "нас", "тебе"]
      explanation: "The seller says «З вас...» (From you...)."
    - sentence: "— Дякую! До _____!"
      answer: "побачення"
      options: ["побачення", "зустрічі", "завтра", "вечора"]
      explanation: "Standard farewell: «До побачення»."

- type: true-false
  title: "Міфи та факти"
  instruction: "Decide if the statement about Ukrainian markets is true or false."
  items:
    - statement: "На ринку можна торгуватися (to bargain)."
      correct: true
      explanation: "Bargaining is common at markets, especially if there are no price tags."
    - statement: "«Бессарабка» — це дешевий ринок."
      correct: false
      explanation: "Bessarabskyi market is known for being expensive and premium."
    - statement: "У супермаркеті продукти завжди свіжіші, ніж на ринку."
      correct: false
      explanation: "Markets are valued specifically for the freshness of their products."
    - statement: "Продавець може сказати «Спробуйте!»."
      correct: true
      explanation: "Tasting products is a big part of the market culture."
    - statement: "На ринку можна платити тільки карткою."
      correct: false
      explanation: "Cash (готівка) is still king at the market, though transfers are becoming common."
    - statement: "«Привоз» знаходиться у Львові."
      correct: false
      explanation: "Pryvoz is the famous market of Odesa."
    - statement: "На ринку завжди брудно."
      correct: false
      explanation: "Modern Ukrainian markets are usually clean and organized."
    - statement: "На ринку можна купити домашнє молоко."
      correct: true
      explanation: "Markets are the best place to find homemade dairy products."

