- type: quiz
  title: "Ситуації на ринку"
  instruction: "Choose the best phrase for each situation."
  items:
    - question: "You want to know if the milk was produced today. You ask:"
      explanation: "«Свіже» implies it was made recently/today."
      options:
        - text: "Це свіже молоко?"
          correct: true
        - text: "Це старе молоко?"
          correct: false
        - text: "Це дороге молоко?"
          correct: false
        - text: "Це моє молоко?"
          correct: false
    - question: "The seller gives you change. You say:"
      explanation: "Always say thank you."
      options:
        - text: "Дякую"
          correct: true
        - text: "Будь ласка"
          correct: false
        - text: "Добрий день"
          correct: false
        - text: "До побачення"
          correct: false
    - question: "You see beautiful apples and want 2 kilos. You say:"
      explanation: "Use the standard polite request formula."
      options:
        - text: "Дайте, будь ласка, два кілограми яблук"
          correct: true
        - text: "Я хочу два яблука"
          correct: false
        - text: "Скільки яблук?"
          correct: false
        - text: "Яблука гарні"
          correct: false
    - question: "You want to know the total price for everything. You ask:"
      explanation: "«Скільки з мене?» is the idiomatic way to ask for the total."
      options:
        - text: "Скільки з мене?"
          correct: true
        - text: "Скільки це?"
          correct: false
        - text: "Яка ціна?"
          correct: false
        - text: "Де гроші?"
          correct: false
    - question: "The seller offers you to taste some cheese. You accept politely:"
      explanation: "«Дякую» is polite acceptance (often implied 'yes, thank you')."
      options:
        - text: "Дякую, спробую"
          correct: true
        - text: "Ні, не хочу"
          correct: false
        - text: "Це поганий сир"
          correct: false
        - text: "Я не голодний"
          correct: false
    - question: "You think the price is too high. You jokingly ask:"
      explanation: "This is a standard soft bargaining phrase."
      options:
        - text: "А дешевше можна?"
          correct: true
        - text: "Чому так дорого?"
          correct: false
        - text: "Ви багатий?"
          correct: false
        - text: "Я піду додому"
          correct: false
    - question: "You want to leave politely. You say:"
      explanation: "Standard polite farewell."
      options:
        - text: "Дякую, до побачення"
          correct: true
        - text: "Я йду"
          correct: false
        - text: "Па-па"
          correct: false
        - text: "Пока"
          correct: false
    - question: "You ask if they have potatoes. You say:"
      explanation: "Asking for availability."
      options:
        - text: "У вас є картопля?"
          correct: true
        - text: "Ви картопля?"
          correct: false
        - text: "Де картопля?"
          correct: false
        - text: "Картопля тут?"
          correct: false
