- type: quiz
  title: "Культура українського ринку"
  instruction: "Choose the correct answer about Ukrainian market etiquette."
  items:
    - question: "Якщо продавець каже «Спробуйте!», що це означає?"
      explanation: "It is a polite offer to taste the product before buying."
      options:
        - text: "Він пропонує скуштувати товар"
          correct: true
        - text: "Він хоче грошей"
          correct: false
        - text: "Він свариться"
          correct: false
        - text: "Він не хоче продавати"
          correct: false
    - question: "Як правильно і ввічливо попросити товар у продавця?"
      explanation: "«Дайте, будь ласка» is the standard polite request."
      options:
        - text: "Дайте, будь ласка..."
          correct: true
        - text: "Я хочу..."
          correct: false
        - text: "Мені треба..."
          correct: false
        - text: "Швидко дай..."
          correct: false
    - question: "Що таке знаменитий історичний «Привоз»?"
      explanation: "Pryvoz is a famous historical market in Odesa."
      options:
        - text: "Відомий ринок в Одесі"
          correct: true
        - text: "Супермаркет у Києві"
          correct: false
        - text: "Назва сиру"
          correct: false
        - text: "Станція метро"
          correct: false
    - question: "Що означає питання «По скільки?»"
      explanation: "«По скільки?» is colloquial for 'What is the price per item/kilo?'."
      options:
        - text: "Яка ціна?"
          correct: true
        - text: "Скільки годин?"
          correct: false
        - text: "Скільки кілограмів?"
          correct: false
        - text: "Хто це?"
          correct: false
    - question: "Де саме знаходиться знаменитий Бессарабський ринок?"
      explanation: "Bessarabskyi rynok is located in the center of Kyiv."
      options:
        - text: "У Києві"
          correct: true
        - text: "У Львові"
          correct: false
        - text: "В Одесі"
          correct: false
        - text: "У Харкові"
          correct: false
    - question: "Що краще купувати на ринку, а не в супермаркеті?"
      explanation: "Ukrainians value markets for fresh, homemade products."
      options:
        - text: "Домашній сир і свіжі овочі"
          correct: true
        - text: "Зубну пасту"
          correct: false
        - text: "Батарейки"
          correct: false
        - text: "Телефон"
          correct: false
    - question: "Чому українці люблять ходити на базар?"
      explanation: "Markets offer both fresh food and social interaction."
      options:
        - text: "Заради спілкування і свіжих продуктів"
          correct: true
        - text: "Бо там тихо"
          correct: false
        - text: "Бо там немає людей"
          correct: false
        - text: "Бо там холодно"
          correct: false
    - question: "Що означає українське слово «домашнє»?"
      explanation: "«Домашнє» implies it was made at home or grown in a private garden, not a factory."
      options:
        - text: "Зроблено вдома або вирощено на городі"
          correct: true
        - text: "Куплено в супермаркеті"
          correct: false
        - text: "Зроблено на заводі"
          correct: false
        - text: "Імпортний товар"
          correct: false

- type: fill-in
  title: "Кілограм чого?"
  instruction: "Complete the phrases using the correct form of the word (Genitive case pattern)."
  items:
    - sentence: "Дайте, будь ласка, кілограм _____."
      answer: "картоплі"
      options: ["картоплі", "картопля", "картоплю", "картоплею"]
      explanation: "After 'кілограм', we use the Genitive case: картопля -> картоплі."
    - sentence: "Зважте кілограм _____."
      answer: "моркви"
      options: ["моркви", "морква", "моркву", "морквою"]
      explanation: "Морква -> моркви (Genitive)."
    - sentence: "Я хочу кілограм _____."
      answer: "цибулі"
      options: ["цибулі", "цибуля", "цибулю", "цибулею"]
      explanation: "Цибуля -> цибулі (Genitive)."
    - sentence: "Скільки коштує кілограм _____?"
      answer: "яблук"
      options: ["яблук", "яблука", "яблуко", "яблуком"]
      explanation: "Яблука -> яблук (Genitive Plural)."
    - sentence: "Дайте кілограм _____."
      answer: "помідорів"
      options: ["помідорів", "помідори", "помідор", "помідором"]
      explanation: "Помідори -> помідорів (Genitive Plural)."
    - sentence: "Мені потрібно пів кілограма _____."
      answer: "огірків"
      options: ["огірків", "огірки", "огірок", "огірком"]
      explanation: "Огірки -> огірків (Genitive Plural)."
    - sentence: "Скільки коштує кілограм _____?"
      answer: "капусти"
      options: ["капусти", "капуста", "капусту", "капустою"]
      explanation: "Капуста -> капусти (Genitive)."
    - sentence: "Дайте, будь ласка, кілограм _____."
      answer: "груш"
      options: ["груш", "груші", "груша", "грушею"]
      explanation: "Груші -> груш (Genitive Plural)."

