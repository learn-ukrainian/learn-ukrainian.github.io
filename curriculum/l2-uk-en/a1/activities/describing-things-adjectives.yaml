- type: true-false
  title: "Grammar Rules for Descriptions"
  instruction: "Decide if these grammar statements are true or false."
  items:
    - statement: "The adjective ending for plural words is always -і."
      correct: true
    - statement: "The word машина is feminine, so we say новий машина."
      correct: false
      explanation: "We must say нова машина because the adjective must copy the feminine gender."
    - statement: "Синій is a soft stem adjective, so its feminine form is синя."
      correct: true
    - statement: "The question word for a masculine word is Який?."
      correct: true
    - statement: "Mavka is a famous figure from Ukrainian folklore, described as лісова дівчина."
      correct: true
    - statement: "In Ukrainian, adjectives usually come after the noun, like in Spanish."
      correct: false
      explanation: "Adjectives usually go right before the noun, exactly like in English."
    - statement: "If you look up an adjective in a dictionary, it will be in the masculine form."
      correct: true
    - statement: "The question word for a neuter word is Яка?."
      correct: false
      explanation: "The question word for a neuter word is Яке?. Яка? is for feminine words."

