- type: true-false
  title: True or False?
  instruction: Decide if the statement about adjectives is true or false.
  items:
    - statement: The word новий is used for masculine words.
      correct: true
      explanation: Yes, -ий is the masculine ending for hard stem adjectives.
    - statement: The word стара is used for neuter words.
      correct: false
      explanation: No, стара is feminine. The neuter form is старе.
    - statement: Plural adjectives consistently end in -і.
      correct: true
      explanation: Yes, plural adjectives always take the -і ending regardless of gender.
    - statement: The word великий means small.
      correct: false
      explanation: No, великий means big. The word for small is малий.
    - statement: The word синій is an example of a soft stem adjective.
      correct: true
      explanation: Yes, it takes the soft endings -ій, -я, -є, -і.
    - statement: Adjectives in Ukrainian never change their endings.
      correct: false
      explanation: False! They must always agree with the word's gender and number.
    - statement: The word гарні is a plural form.
      correct: true
      explanation: Yes, the -і ending indicates it is plural.
    - statement: The word смачний is used to describe good weather.
      correct: false
      explanation: No, смачний means tasty and is used for food.

