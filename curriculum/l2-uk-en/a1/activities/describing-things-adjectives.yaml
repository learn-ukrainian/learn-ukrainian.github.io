- type: fill-in
  title: "Діалог: У пошуках квартири"
  instruction: "Доповніть діалог правильними словами."
  items:
    - sentence: "Це наша ... (новий) квартира."
      answer: "нова"
      options: ["нова", "новий", "нове", "нові"]
      explanation: "Квартира — вона."
    - sentence: "Вона дуже ... (великий)."
      answer: "велика"
      options: ["велика", "великий", "велике", "великі"]
      explanation: "Вона (квартира) — велика."
    - sentence: "Тут є ... (великий) вікно."
      answer: "велике"
      options: ["велике", "великий", "велика", "великі"]
      explanation: "Вікно — воно."
    - sentence: "А кухня ... (малий), але зручна."
      answer: "мала"
      options: ["мала", "малий", "мале", "малі"]
      explanation: "Кухня — вона."
    - sentence: "Ціна теж ... (гарний)."
      answer: "гарна"
      options: ["гарна", "гарний", "гарне", "гарні"]
      explanation: "Ціна — вона."
    - sentence: "Це ... (добрий) варіант."
      answer: "добрий"
      options: ["добрий", "добра", "добре", "добрі"]
      explanation: "Варіант (він) — добрий."
    - sentence: "А район ... (старий)?"
      answer: "старий"
      options: ["старий", "стара", "старе", "старі"]
      explanation: "Район (він) — старий."
    - sentence: "Він дуже ... (чистий)."
      answer: "чистий"
      options: ["чистий", "чиста", "чисте", "чисті"]
      explanation: "Район (він) — чистий."
