- type: unjumble
  title: "Real Estate Descriptions"
  instruction: "Arrange the words to form a correct Ukrainian description."
  items:
    - words: ["великий", "Це", "будинок"]
      answer: "Це великий будинок"
    - words: ["нова", "Це", "квартира"]
      answer: "Це нова квартира"
    - words: ["дорогий", "Це", "район"]
      answer: "Це дорогий район"
    - words: ["велике", "вікно", "Це"]
      answer: "Це велике вікно"
    - words: ["погода", "добра", "Тут"]
      answer: "Тут добра погода"
    - words: ["велика", "Тут", "кімната"]
      answer: "Тут велика кімната"
    - words: ["гарне", "вікно", "Це"]
      answer: "Це гарне вікно"
    - words: ["старе", "місто", "Це"]
      answer: "Це старе місто"

- type: true-false
  title: "True or False"
  instruction: "Decide if the statement about Ukrainian adjectives is true or false."
  items:
    - statement: "The dictionary form of a Ukrainian adjective is always the masculine form."
      correct: true
      explanation: "Yes, dictionaries list the masculine form, like новий."
    - statement: "You can use the masculine form 'новий' for a feminine noun like 'машина'."
      correct: false
      explanation: "No, you must change the ending to match the feminine noun, like нова машина."
    - statement: "The feminine ending for hard-stem adjectives is -а."
      correct: true
      explanation: "Yes, like нова, гарна, велика."
    - statement: "Plural adjectives have different endings depending on the gender of the noun."
      correct: false
      explanation: "No, all plural adjectives end in -і, regardless of the original gender."
    - statement: "The word 'синій' is an example of a hard-stem adjective."
      correct: false
      explanation: "No, 'синій' is a soft-stem adjective."
    - statement: "The question word 'Яка?' is used to ask 'what kind' about feminine nouns."
      correct: true
      explanation: "Yes, 'Яка?' matches the feminine -а ending."
    - statement: "To say 'The weather is good', you must use a connecting verb like 'is' in Ukrainian."
      correct: false
      explanation: "No, you can simply say 'Погода — добра' without a verb."
    - statement: "The neuter ending for hard-stem adjectives is -е."
      correct: true
      explanation: "Yes, like нове, велике, гарне."

