- type: quiz
  title: "Understand Adjective Endings"
  instruction: "Choose the correct answer based on the rules of adjective agreement."
  items:
    - question: "Which ending is used for masculine hard-stem adjectives?"
      options:
        - text: "-ий"
          correct: true
        - text: "-а"
          correct: false
        - text: "-е"
          correct: false
        - text: "-і"
          correct: false
      explanation: "Masculine hard-stem adjectives end in -ий, like новий."
    - question: "Which ending is used for feminine hard-stem adjectives?"
      options:
        - text: "-а"
          correct: true
        - text: "-ий"
          correct: false
        - text: "-е"
          correct: false
        - text: "-і"
          correct: false
      explanation: "Feminine hard-stem adjectives end in -а, like нова."
    - question: "Which ending is used for plural adjectives?"
      options:
        - text: "-і"
          correct: true
        - text: "-ий"
          correct: false
        - text: "-а"
          correct: false
        - text: "-е"
          correct: false
      explanation: "All plural adjectives end in -і, regardless of gender."
    - question: "What is the correct form of 'new' for the feminine noun книга?"
      options:
        - text: "нова"
          correct: true
        - text: "новий"
          correct: false
        - text: "нове"
          correct: false
        - text: "нові"
          correct: false
      explanation: "Книга is feminine, so it takes the -а ending, like нова."
    - question: "What is the correct question word for a neuter noun like місто?"
      options:
        - text: "Яке?"
          correct: true
        - text: "Який?"
          correct: false
        - text: "Яка?"
          correct: false
        - text: "Які?"
          correct: false
      explanation: "Яке? is used to ask 'what kind' about neuter nouns."
    - question: "Which ending is used for masculine soft-stem adjectives like синій?"
      options:
        - text: "-ій"
          correct: true
        - text: "-ий"
          correct: false
        - text: "-я"
          correct: false
        - text: "-є"
          correct: false
      explanation: "Masculine soft-stem adjectives end in -ій."
    - question: "What is the correct form of 'blue' for the plural noun квіти?"
      options:
        - text: "сині"
          correct: true
        - text: "синій"
          correct: false
        - text: "синя"
          correct: false
        - text: "синє"
          correct: false
      explanation: "Plural soft-stem adjectives end in -і."
    - question: "What is the correct form of 'big' for the neuter noun вікно?"
      options:
        - text: "велике"
          correct: true
        - text: "великий"
          correct: false
        - text: "велика"
          correct: false
        - text: "великі"
          correct: false
      explanation: "Вікно is neuter, so it takes the -е ending, like велике."

