- type: quiz
  title: Choose the Correct Adjective
  instruction: Select the adjective that matches the noun's gender.
  items:
    - question: Який це будинок?
      explanation: Будинок is masculine, so the adjective must end in -ий.
      options:
        - text: новий
          correct: true
        - text: нова
          correct: false
        - text: нове
          correct: false
        - text: нові
          correct: false
    - question: Яка це книга?
      explanation: Книга is feminine, so the adjective must end in -а.
      options:
        - text: цікава
          correct: true
        - text: цікавий
          correct: false
        - text: цікаве
          correct: false
        - text: цікаві
          correct: false
    - question: Яке це вікно?
      explanation: Вікно is neuter, so the adjective must end in -е.
      options:
        - text: мале
          correct: true
        - text: малий
          correct: false
        - text: мала
          correct: false
        - text: малі
          correct: false
    - question: Які це олівці?
      explanation: Олівці is plural, so the adjective must end in -і.
      options:
        - text: сині
          correct: true
        - text: синій
          correct: false
        - text: синя
          correct: false
        - text: синє
          correct: false
    - question: Це ___ погода.
      explanation: Погода is feminine.
      options:
        - text: гарна
          correct: true
        - text: гарний
          correct: false
        - text: гарне
          correct: false
        - text: гарні
          correct: false
    - question: Це ___ борщ.
      explanation: Борщ is masculine.
      options:
        - text: смачний
          correct: true
        - text: смачна
          correct: false
        - text: смачне
          correct: false
        - text: смачні
          correct: false
    - question: Це ___ лінія.
      explanation: Лінія is feminine, and синя is a soft stem adjective.
      options:
        - text: синя
          correct: true
        - text: синій
          correct: false
        - text: синє
          correct: false
        - text: сині
          correct: false
    - question: Це ___ собор.
      explanation: Собор is masculine.
      options:
        - text: старий
          correct: true
        - text: стара
          correct: false
        - text: старе
          correct: false
        - text: старі
          correct: false

