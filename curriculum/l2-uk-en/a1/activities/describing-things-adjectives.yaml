          correct: true
        - text: "великий"
          correct: false
        - text: "цікавий"
          correct: false
        - text: "новий"
          correct: false
    - question: "What is the opposite of 'великий' (big)?"
      options:
        - text: "малий"
          correct: true
        - text: "старий"
          correct: false
        - text: "добрий"
          correct: false
        - text: "синій"
          correct: false
    - question: "What is the opposite of 'поганий' (bad)?"
      options:
        - text: "добрий"
          correct: true
        - text: "молодий"
          correct: false
        - text: "дешевий"
          correct: false
        - text: "цікавий"
          correct: false
    - question: "Which of the following words means 'young'?"
      options:
        - text: "молодий"
          correct: true
        - text: "дорогий"
          correct: false
        - text: "старий"
          correct: false
        - text: "новий"
          correct: false
    - question: "Which of the following words means 'old' or 'ancient'?"
      options:
        - text: "старий"
          correct: true
        - text: "новий"
          correct: false
        - text: "малий"
          correct: false
        - text: "зелений"
