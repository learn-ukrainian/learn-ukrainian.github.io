- type: group-sort
  title: "Рід іменників: Він, Вона чи Воно?"
  instruction: "Розподіліть іменники за родами, щоб підготуватися до узгодження прикметників."
  groups:
    - name: "Він (Чоловічий)"
      items: ["стіл", "телефон", "дім", "парк", "чоловік"]
    - name: "Вона (Жіночий)"
      items: ["книга", "кімната", "ручка", "кухня", "квартира"]
    - name: "Воно (Середній)"
      items: ["вікно", "море", "місто", "авто", "крісло"]

- type: match-up
  title: "Антоніми: знайдіть протилежне"
  instruction: "З'єднайте слова з протилежним значенням."
  pairs:
    - left: "великий"
      right: "малий"
    - left: "новий"
      right: "старий"
    - left: "добрий"
      right: "поганий"
    - left: "дорогий"
      right: "дешевий"
    - left: "чорний"
      right: "білий"
    - left: "день"
      right: "ніч"
    - left: "світлий"
      right: "темний"
    - left: "чистий"
      right: "брудний"
    - left: "цікавий"
      right: "нудний"

- type: quiz
  title: "Питання: Який, Яка, Яке, Які?"
  instruction: "Оберіть правильне питальне слово для кожного іменника."
  items:
    - question: "Скажіть, будь ласка, ... це будинок?"
      explanation: "Будинок — це «він» (чоловічий рід), тому «Який?»."
      options:
        - text: "Який"
          correct: true
        - text: "Яка"
          correct: false
        - text: "Яке"
          correct: false
        - text: "Які"
          correct: false
    - question: "Подивіться на фото. ... це кімната?"
      explanation: "Кімната — це «вона» (жіночий рід), тому «Яка?»."
      options:
        - text: "Яка"
          correct: true
        - text: "Який"
          correct: false
        - text: "Яке"
          correct: false
        - text: "Які"
          correct: false
    - question: "Як ви думаєте, ... це вікно?"
      explanation: "Вікно — це «воно» (середній рід), тому «Яке?»."
      options:
        - text: "Яке"
          correct: true
        - text: "Який"
          correct: false
        - text: "Яка"
          correct: false
        - text: "Які"
          correct: false
    - question: "Це мої нові друзі. ... вони?"
      explanation: "Друзі — це «вони» (множина), тому «Які?»."
      options:
        - text: "Які"
          correct: true
        - text: "Який"
          correct: false
        - text: "Яка"
          correct: false
        - text: "Яке"
          correct: false
    - question: "Це наше місто. Скажіть, ... воно?"
      explanation: "Місто — це «воно» (середній рід)."
      options:
        - text: "Яке"
          correct: true
        - text: "Який"
          correct: false
        - text: "Яка"
          correct: false
        - text: "Які"
          correct: false
    - question: "Це ваша школа. Скажіть, ... вона?"
      explanation: "Школа — це «вона» (жіночий рід)."
      options:
        - text: "Яка"
          correct: true
        - text: "Який"
          correct: false
        - text: "Яке"
          correct: false
        - text: "Які"
          correct: false
    - question: "Це новий студент. Скажіть, ... він?"
      explanation: "Студент — це «він» (чоловічий рід)."
      options:
        - text: "Який"
          correct: true
        - text: "Яка"
          correct: false
        - text: "Яке"
          correct: false
        - text: "Які"
          correct: false
    - question: "Це цікаві книги. Скажіть, ... вони?"
      explanation: "Книги — це «вони» (множина)."
      options:
        - text: "Які"
          correct: true
        - text: "Який"
          correct: false
        - text: "Яка"
          correct: false
        - text: "Яке"
          correct: false

- type: group-sort
  title: "Закінчення прикметників"
  instruction: "Розподіліть прикметники за групами (рід та число)."
  groups:
    - name: "Він (-ий/-ій)"
      items: ["новий", "старий", "синій", "гарний", "великий"]
    - name: "Вона (-а/-я)"
      items: ["нова", "стара", "синя", "гарна", "велика"]
    - name: "Воно (-е/-є)"
      items: ["нове", "старе", "синє", "гарне", "велике"]
    - name: "Вони (-і)"
      items: ["нові", "старі", "сині", "гарні", "великі"]

- type: fill-in
  title: "Узгодження: Тверда група"
  instruction: "Оберіть правильну форму прикметника."
  items:
    - sentence: "Це ... (новий) ресторан."
      answer: "новий"
      options: ["новий", "нова", "нове", "нові"]
      explanation: "Ресторан (він) — новий."
    - sentence: "Це ... (новий) школа."
      answer: "нова"
      options: ["нова", "новий", "нове", "нові"]
      explanation: "Школа (вона) — нова."
    - sentence: "Це ... (новий) авто."
      answer: "нове"
      options: ["нове", "новий", "нова", "нові"]
      explanation: "Авто (воно) — нове."
    - sentence: "Це ... (гарний) дівчина."
      answer: "гарна"
      options: ["гарна", "гарний", "гарне", "гарні"]
      explanation: "Дівчина (вона) — гарна."
    - sentence: "Це ... (гарний) день."
      answer: "гарний"
      options: ["гарний", "гарна", "гарне", "гарні"]
      explanation: "День (він) — гарний."
    - sentence: "Це ... (старий) місто."
      answer: "старе"
      options: ["старе", "старий", "стара", "старі"]
      explanation: "Місто (воно) — старе."
    - sentence: "Це ... (великий) кімната."
      answer: "велика"
      options: ["велика", "великий", "велике", "великі"]
      explanation: "Кімната (вона) — велика."
    - sentence: "Це ... (малий) дім."
      answer: "малий"
      options: ["малий", "мала", "мале", "малі"]
      explanation: "Дім (він) — малий."

- type: fill-in
  title: "Узгодження: М'яка група (синій)"
  instruction: "Оберіть правильну форму прикметника «синій»."
  items:
    - sentence: "Це ... (синій) олівець."
      answer: "синій"
      options: ["синій", "синя", "синє", "сині"]
      explanation: "Олівець (він) — синій."
    - sentence: "Це ... (синій) ручка."
      answer: "синя"
      options: ["синя", "синій", "синє", "сині"]
      explanation: "Ручка (вона) — синя."
    - sentence: "Це ... (синій) море."
      answer: "синє"
      options: ["синє", "синій", "синя", "сині"]
      explanation: "Море (воно) — синє."
    - sentence: "Це ... (синій) квіти."
      answer: "сині"
      options: ["сині", "синій", "синя", "синє"]
      explanation: "Квіти (вони) — сині."
    - sentence: "Це ... (синій) небо."
      answer: "синє"
      options: ["синє", "синій", "синя", "сині"]
      explanation: "Небо (воно) — синє."
    - sentence: "Це ... (синій) автобус."
      answer: "синій"
      options: ["синій", "синя", "синє", "сині"]
      explanation: "Автобус (він) — синій."
    - sentence: "Це ... (вечірній) сонце."
      answer: "вечірнє"
      options: ["вечірнє", "вечірня", "вечірній", "вечірні"]
      explanation: "Сонце (воно) — вечірнє."
    - sentence: "Це ... (давній) місто."
      answer: "давнє"
      options: ["давнє", "давня", "давній", "давні"]
      explanation: "Місто (воно) — давнє."

- type: unjumble
  title: "Складіть речення: Опис (Стандартна позиція)"
  instruction: "Складіть речення, де прикметник стоїть перед іменником."
  items:
    - words: ["Це", "новий", "телефон"]
      answer: "Це новий телефон"
    - words: ["Вона", "гарна", "дівчина"]
      answer: "Вона гарна дівчина"
    - words: ["Тут", "велике", "вікно"]
      answer: "Тут велике вікно"
    - words: ["Це", "цікава", "книга"]
      answer: "Це цікава книга"
    - words: ["Ми", "добрі", "люди"]
      answer: "Ми добрі люди"
    - words: ["Там", "старий", "дім"]
      answer: "Там старий дім"

- type: unjumble
  title: "Складіть речення: Характеристика (Позиція після)"
  instruction: "Складіть речення, де прикметник стоїть після іменника (описує якість)."
  items:
    - words: ["Цей", "телефон", "новий"]
      answer: "Цей телефон новий"
    - words: ["Ця", "квартира", "велика"]
      answer: "Ця квартира велика"
    - words: ["Цей", "фільм", "цікавий"]
      answer: "Цей фільм цікавий"
    - words: ["Ця", "книга", "стара"]
      answer: "Ця книга стара"
    - words: ["Погода", "сьогодні", "погана"]
      answer: "Погода сьогодні погана"
    - words: ["Цей", "ресторан", "дорогий"]
      answer: "Цей ресторан дорогий"

- type: match-up
  title: "Словниковий запас: Переклад"
