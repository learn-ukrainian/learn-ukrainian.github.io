- type: quiz
  title: "Essential Adjectives for Descriptions"
  instruction: "Choose the correct meaning for these descriptive words."
  items:
    - question: "Which of the following words means 'new'?"
      options:
        - text: "новий"
          correct: true
        - text: "старий"
          correct: false
        - text: "гарний"
          correct: false
        - text: "малий"
          correct: false
    - question: "Which of the following words means 'expensive'?"
      options:
        - text: "дорогий"
          correct: true
        - text: "дешевий"
          correct: false
        - text: "добрий"
          correct: false
        - text: "поганий"
          correct: false
    - question: "Which of the following words means 'beautiful' or 'nice'?"
      options:
        - text: "гарний"
          correct: true
        - text: "синій"
          correct: false
        - text: "зелений"
          correct: false
        - text: "старий"
          correct: false
