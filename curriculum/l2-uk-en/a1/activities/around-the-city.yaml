- id: match-up-navigation-responses
  type: match-up
  instruction: З'єднайте запитання з відповіддю (Match the question with the response)
  pairs:
  - left: Вибачте, як дістатися до бібліотеки?
    right: Ідіть прямо, потім направо.
  - left: Де музей?
    right: Він у центрі.
  - left: Як ти дістаєшся на роботу?
    right: Їду автобусом.
  - left: Школа далеко?
    right: Ні, близько. П'ять хвилин пішки.
  - left: Куди ви йдете?
    right: У магазин.
  - left: Де ти живеш?
    right: На вулиці Франка.
workbook:
- id: group-sort-location-direction
  type: group-sort
  instruction: Розподіліть фрази за категоріями (Sort phrases by categories)
  groups:
  - label: Де? (Where?)
    items:
    - в парку
    - на вулиці
    - в офісі
    - у центрі
  - label: Куди? (Where to?)
    items:
    - в парк
    - на вулицю
    - в офіс
    - у центр
- id: true-false-navigation
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Ми кажемо «на пішки».
    correct: false
    explanation: Пішки — це прислівник. Ми кажемо просто «пішки».
  - statement: Питання «Де?» вимагає місцевого відмінка (locative).
    correct: true
    explanation: Де? (Where?) is used for static location with the locative case.
  - statement: Ми кажемо «їду автобусом».
    correct: true
    explanation: Автобусом is in the instrumental case to describe transport.
  - statement: 'Слово «метро» змінюється: метро, метром, на метрі.'
    correct: false
    explanation: Метро is a borrowed word and does not decline.
  - statement: Слово «направо» відповідає на питання «Куди?».
    correct: true
    explanation: Направо indicates direction.
  - statement: Фраза «на розі» — це виняток.
    correct: true
    explanation: Ріг changes to розі in the locative case.
