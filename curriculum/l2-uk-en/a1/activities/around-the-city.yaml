- type: unjumble
  title: "Giving Directions"
  instruction: "Reorder the words to form correct instructions."
  items:
    - answer: "Спочатку ідіть прямо."
      words: ["ідіть", "Спочатку", "прямо."]
    - answer: "Потім повертайте наліво."
      words: ["наліво.", "повертайте", "Потім"]
    - answer: "Де тут аптека?"
      words: ["тут", "аптека?", "Де"]
    - answer: "Магазин біля парку."
      words: ["біля", "Магазин", "парку."]
    - answer: "Зупинка навпроти пошти."
      words: ["пошти.", "навпроти", "Зупинка"]
    - answer: "Я йду в банк."
      words: ["банк.", "в", "Я", "йду"]

- type: true-false
  title: "City Knowledge"
  instruction: "Decide if the statement is True or False based on the module."
  items:
    - statement: "Площа — це центр міста."
      correct: true
      explanation: "Squares are often central hubs in Ukrainian cities."
    - statement: "Маршрутка зупиняється автоматично."
      correct: false
      explanation: "You must ask the driver to stop."
    - statement: "Ми використовуємо 'Де?' для руху."
      correct: false
      explanation: "'Де?' is for static location. 'Куди?' is for motion."
    - statement: "Світлофор — це транспорт."
      correct: false
      explanation: "Traffic light is infrastructure, not transport."
    - statement: "Ми кажем 'на вулиці'."
      correct: true
      explanation: "Street is an open space, so we use 'на'."
    - statement: "Аптека — це місце, де ми купуємо ліки."
      correct: true
      explanation: "Pharmacy is for medicine."
    - statement: "В Україні немає площ."
      correct: false
      explanation: "Every city has a square."
    - statement: "Щоб запитати дорогу, скажіть 'Вибачте'."
      correct: true
      explanation: "It is polite to start with 'Excuse me'."

- type: fill-in
  title: "Question Words: Де vs Куди"
  instruction: "Choose the correct question word: **Де** (Where - location) or **Куди** (Where to - motion)."
  items:
    - sentence: "___ ти живеш?"
      answer: "Де"
      options: ["Де", "Куди", "Що", "Хто"]
      explanation: "Static location (live)."
    - sentence: "___ ти йдеш?"
      answer: "Куди"
      options: ["Де", "Куди", "Що", "Хто"]
      explanation: "Motion (go)."
    - sentence: "___ знаходиться банк?"
      answer: "Де"
      options: ["Де", "Куди", "Що", "Хто"]
      explanation: "Static location (is located)."
    - sentence: "___ їде автобус?"
      answer: "Куди"
      options: ["Де", "Куди", "Що", "Хто"]
      explanation: "Motion (bus goes)."
    - sentence: "___ ми зараз?"
      answer: "Де"
      options: ["Де", "Куди", "Що", "Хто"]
      explanation: "Static location (are now)."
    - sentence: "___ йдуть туристи?"
      answer: "Куди"
      options: ["Де", "Куди", "Що", "Хто"]
      explanation: "Motion (tourists go)."
    - sentence: "___ стоїть машина?"
      answer: "Де"
      options: ["Де", "Куди", "Що", "Хто"]
      explanation: "Static location (car stands)."
    - sentence: "___ ми повертаємо?"
      answer: "Куди"
      options: ["Де", "Куди", "Що", "Хто"]
      explanation: "Motion (we turn)."

