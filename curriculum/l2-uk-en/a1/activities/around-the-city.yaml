- type: quiz
  title: "Understanding Directions"
  instruction: "Choose the best answer."
  items:
    - question: "You want to go to the pharmacy. What do you ask?"
      options:
        - text: "Де тут аптека?"
          correct: true
        - text: "Я аптека."
          correct: false
        - text: "Де я?"
          correct: false
        - text: "Це ліки."
          correct: false
      explanation: "'Де тут аптека?' means 'Where is the pharmacy here?'"
    - question: "A local says 'Ідіть прямо'. What do you do?"
      options:
        - text: "Go straight."
          correct: true
        - text: "Turn left."
          correct: false
        - text: "Turn right."
          correct: false
        - text: "Go back."
          correct: false
      explanation: "'Прямо' means straight."
    - question: "You are 'на площі'. Where are you?"
      options:
        - text: "In the square."
          correct: true
        - text: "In the bank."
          correct: false
        - text: "In the shop."
          correct: false
        - text: "In the park."
          correct: false
      explanation: "'Площа' means square."
    - question: "Look at the street. What is a 'світлофор'?"
      options:
        - text: "Traffic light."
          correct: true
        - text: "Street light."
          correct: false
        - text: "Car."
          correct: false
        - text: "Bus stop."
          correct: false
      explanation: "'Світлофор' is a traffic light."
    - question: "When do we use 'Куди'?"
      options:
        - text: "For motion (where to)."
          correct: true
        - text: "For static location (where)."
          correct: false
        - text: "For time (when)."
          correct: false
        - text: "For people (who)."
          correct: false
      explanation: "'Куди' implies movement."
    - question: "The pharmacy is 'біля банку'. Where is it?"
      options:
        - text: "Near the bank."
          correct: true
        - text: "Opposite the bank."
          correct: false
        - text: "In the bank."
          correct: false
        - text: "Behind the bank."
          correct: false
      explanation: "'Біля' means near."
    - question: "You are 'на вокзалі'. What are you doing?"
      options:
        - text: "Waiting for a train."
          correct: true
        - text: "Buying bread."
          correct: false
        - text: "Sleeping."
          correct: false
        - text: "Swimming."
          correct: false
      explanation: "'Вокзал' is a train station."
    - question: "A friend says 'Це серце міста'. What is it?"
      options:
        - text: "The square."
          correct: true
        - text: "The pharmacy."
          correct: false
        - text: "The supermarket."
          correct: false
        - text: "The taxi."
          correct: false
      explanation: "The square is often called the heart of the city."
