    - на
    - з
  - sentence: Магазин ____ вулиці Франка.
    answer: на
    options:
    - в
    - на
    - з
  - sentence: Ми йдемо ____ театр.
    answer: в
    options:
    - в
    - на
    - до
  - sentence: Він їде ____ роботу.
    answer: на
    options:
    - в
    - на
    - біля
  - sentence: Моя школа ____ центрі.
    answer: у
    options:
