- type: fill-in
  title: "Prepositions: В vs На"
  instruction: "Choose the correct preposition: **в** (in) or **на** (on/at)."
  items:
    - sentence: "Я ___ вулиці."
      answer: "на"
      options: ["на", "в", "біля", "про"]
      explanation: "Street is an open space."
    - sentence: "Ми ___ аптеці."
      answer: "в"
      options: ["на", "в", "біля", "про"]
      explanation: "Pharmacy is a building."
    - sentence: "Автобус ___ зупинці."
      answer: "на"
      options: ["на", "в", "біля", "про"]
      explanation: "Stop is an open location."
    - sentence: "Студент ___ площі."
      answer: "на"
      options: ["на", "в", "біля", "про"]
      explanation: "Square is an open space."
    - sentence: "Вона ___ пошті."
      answer: "на"
      options: ["на", "в", "біля", "про"]
      explanation: "Post office is an exception (function)."
    - sentence: "Він ___ магазині."
      answer: "в"
      options: ["на", "в", "біля", "про"]
      explanation: "Shop is a building."
    - sentence: "Ми ___ вокзалі."
      answer: "на"
      options: ["на", "в", "біля", "про"]
      explanation: "Station is an exception (function)."
    - sentence: "Ти ___ парку."
      answer: "в"
      options: ["на", "в", "біля", "про"]
      explanation: "Park is a contained space (trees around)."
    - sentence: "Я йду ___ вулицю."
      answer: "на"
      options: ["на", "в", "біля", "про"]
      explanation: "Motion onto the street."
    - sentence: "Він йде ___ аптеку."
      answer: "в"
      options: ["на", "в", "біля", "про"]
      explanation: "Motion into the building."
    - sentence: "Ми йдемо ___ площу."
      answer: "на"
      options: ["на", "в", "біля", "про"]
      explanation: "Motion onto the square."
    - sentence: "Вона йде ___ пошту."
      answer: "на"
      options: ["на", "в", "біля", "про"]
      explanation: "Motion to the post office."

