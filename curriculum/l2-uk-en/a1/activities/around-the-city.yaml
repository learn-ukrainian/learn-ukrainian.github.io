- id: odd-one-out-transport
  type: odd-one-out
  instruction: Знайдіть зайве слово (Find the odd one out)
  items:
  - words:
    - автобус
    - метро
    - пішки
    correct: 2
    explanation: Пішки (on foot) is not a vehicle.
  - words:
    - прямо
    - направо
    - музей
    correct: 2
    explanation: Музей (museum) is a place, while прямо and направо are directions.
  - words:
    - далеко
    - вулиця
    - близько
    correct: 1
    explanation: Вулиця (street) is a noun, others describe distance.
  - words:
    - в парку
    - в офісі
    - на площу
    correct: 2
    explanation: На площу (onto the square) is accusative (direction), others are
      locative (static).
  - words:
    - ідіть
    - їдьте
    - центр
    correct: 2
    explanation: Центр (center) is a noun, others are imperative verbs.
  - words:
    - Де
    - Куди
    - Звідки
    - Метро
    correct: 3
    explanation: Метро (metro) is a noun, others are question words.
