  - question: Мені ____ ця книга.
    options:
    - люблю
    - любиш
    - подобається
    correct: 2
  - question: Ти ____ готувати борщ?
    options:
    - люблю
    - любиш
    - подобається
    correct: 1
  - question: Мені ____ Київ.
    options:
    - люблю
    - любиш
    - подобається
    correct: 2
  - question: Я ____ слухати музику.
    options:
    - люблю
    - любиш
    - подобається
    correct: 0
  - question: Тобі ____ цей фільм?
    options:
    - люблю
    - любиш
    - подобається
    correct: 2
- id: fill-in-negative
