workbook:
- id: group-sort-activities-things
  type: group-sort
  instruction: Sort the words into actions (**дії**) and things (**речі**).
  groups:
  - label: Actions (Дії)
    items:
    - читати
    - готувати
    - гуляти
    - малювати
    - співати
  - label: Things (Речі)
    items:
    - книга
    - фільм
    - музика
    - Київ
    - борщ
- id: true-false-rules
  type: true-false
  instruction: Read the rules for expressing likes. Is the statement true or false?
  items:
  - statement: We use 'я люблю' with actions like 'читати'.
    correct: true
    explanation: Я люблю is used with infinitive verbs for actions.
  - statement: We use 'мені подобається' with things like 'книга'.
    correct: true
    explanation: Мені подобається is used with nouns for things we like.
  - statement: We use 'мені подобається' with actions ending in -ти.
    correct: false
    explanation: Actions use 'я люблю'. Things use 'мені подобається'.
  - statement: The word 'не' is placed directly before the verb to make it negative.
    correct: true
    explanation: 'For example: я не люблю, мені не подобається.'
  - statement: The infinitive verb always ends in -ти.
    correct: true
    explanation: This is the dictionary form of the verb, like читати or гуляти.
  - statement: To ask a friend what they like doing, we use 'Ти любиш...?'
    correct: true
    explanation: Ти любиш is the form for 'you like' (informal).
- id: unjumble-likes
  type: unjumble
  instruction: Put the words in the correct order to form a sentence.
  items:
  - words:
    - люблю
    - Я
    - читати.
    correct_order:
    - Я
    - люблю
    - читати.
  - words:
    - подобається
    - музика.
    - Мені
    correct_order:
    - Мені
    - подобається
    - музика.
  - words:
    - не
    - Я
    - малювати.
    - люблю
    correct_order:
    - Я
    - не
    - люблю
    - малювати.
  - words:
    - подобається
    - цей
    - Тобі
    - фільм?
    correct_order:
    - Тобі
    - подобається
    - цей
    - фільм?
  - words:
    - готувати
    - Ти
    - борщ?
    - любиш
    correct_order:
    - Ти
    - любиш
    - готувати
    - борщ?
  - words:
    - не
    - ця
    - Мені
    - книга.
    - подобається
    correct_order:
    - Мені
    - не
    - подобається
    - ця
    - книга.
- id: odd-one-out-categories
  type: odd-one-out
  instruction: Find the word that does not belong.
  items:
  - words:
    - читати
    - малювати
    - книга
    correct: 2
    explanation: «Книга» is a thing (noun). The others are actions (verbs).
  - words:
    - музика
    - фільм
    - гуляти
    correct: 2
    explanation: «Гуляти» is an action (verb). The others are things (nouns).
  - words:
    - Київ
    - борщ
    - співати
    correct: 2
    explanation: «Співати» is an action (verb). The others are things (nouns).
  - words:
    - грати
    - дивитися
    - чай
    correct: 2
    explanation: «Чай» is a thing (noun). The others are actions (verbs).
  - words:
    - Віктор
    - Анна
    - подорожувати
    correct: 2
    explanation: «Подорожувати» is an action (verb). The others are names.
  - words:
    - слухати
    - готувати
    - фільм
    correct: 2
    explanation: «Фільм» is a thing (noun). The others are actions (verbs).
- id: divide-words-syllables
  type: divide-words
  instruction: Divide the words into syllables.
  items:
  - word: читати
    answer: чи-та-ти
  - word: гуляти
    answer: гу-ля-ти
  - word: грати
    answer: гра-ти
  - word: любити
    answer: лю-би-ти
  - word: музика
    answer: му-зи-ка
  - word: книга
    answer: кни-га
  - word: співати
    answer: спі-ва-ти
