version: '1.0'
module: what-i-like
level: a1
inline:
- id: match-up-infinitives
  type: match-up
  instruction: Match the Ukrainian verbs to their English meanings
  pairs:
  - left: читати
    right: to read
  - left: малювати
    right: to draw
  - left: подорожувати
    right: to travel
  - left: співати
    right: to sing
  - left: гуляти
    right: to walk
  - left: готувати
    right: to cook
  - left: слухати
    right: to listen
  - left: дивитися
    right: to watch
- id: fill-in-hobbies
  type: fill-in
  instruction: Choose the correct verb to complete the sentence
  items:
  - sentence: Я люблю ____ музику.
    answer: слухати
    options:
    - читати
    - слухати
    - малювати
  - sentence: Я люблю ____ борщ.
    answer: готувати
    options:
    - співати
    - готувати
    - дивитися
  - sentence: Я люблю ____ у футбол.
    answer: грати
    options:
    - грати
    - подорожувати
    - гуляти
  - sentence: Я люблю ____ книгу.
    answer: читати
    options:
    - читати
    - малювати
    - слухати
  - sentence: Я люблю ____ фільм.
    answer: дивитися
    options:
    - гуляти
    - співати
    - дивитися
  - sentence: Я люблю ____ на гітарі.
    answer: грати
    options:
    - грати
    - готувати
    - подорожувати
- id: quiz-like-choice
  type: quiz
  instruction: Choose **люблю** for actions or **мені подобається** for things
  items:
  - question: Я ____ малювати.
    options:
    - люблю
    - мені подобається
    - любити
    correct: 0
  - question: ____ ця музика.
    options:
    - Я люблю
    - Мені подобається
    - Люблю
    correct: 1
  - question: Я ____ читати.
    options:
    - люблю
    - подобається
    - мені подобається
    correct: 0
  - question: ____ Київ.
    options:
    - Я люблю
    - Мені подобається
    - Люблю
    correct: 1
  - question: Я ____ подорожувати.
    options:
    - подобається
    - люблю
    - мені подобається
    correct: 1
  - question: ____ цей фільм.
    options:
    - Я люблю
    - Мені подобається
    - Люблю
    correct: 1
- id: fill-in-negatives
  type: fill-in
  instruction: Make the sentence negative by choosing the correct word
  items:
  - sentence: Я ____ люблю співати.
    answer: не
    options:
    - не
    - ні
    - нет
  - sentence: Мені ____ подобається цей фільм.
    answer: не
    options:
    - не
    - ні
    - нет
  - sentence: Я ____ люблю готувати борщ.
    answer: не
    options:
    - не
    - ні
    - нет
  - sentence: Мені ____ подобається ця книга.
    answer: не
    options:
    - не
    - ні
    - нет
  - sentence: Я ____ люблю грати у футбол.
    answer: не
    options:
    - не
    - ні
    - нет
  - sentence: Мені ____ подобається музика.
    answer: не
    options:
    - не
    - ні
    - нет
workbook:
- id: wb-pronoun-match
  type: match-up
  instruction: Match the pronoun to the correct phrase
  pairs:
  - left: Я
    right: люблю читати
  - left: Мені
    right: подобається фільм
  - left: Ти
    right: любиш малювати
  - left: Тобі
    right: подобається музика
  - left: Я не
    right: люблю готувати
  - left: Мені не
    right: подобається Київ
- id: wb-sort-like
  type: group-sort
  instruction: Sort the words based on which phrase you should use with them
  groups:
  - label: Я люблю...
    items:
    - читати
    - малювати
    - гуляти
    - співати
    - готувати
  - label: Мені подобається...
    items:
    - музика
    - фільм
    - Київ
    - книга
    - борщ
- id: wb-true-false-meaning
  type: true-false
  instruction: Are these sentences grammatically correct? (True = Correct, False =
    Incorrect)
  items:
  - statement: Я люблю музика.
    correct: false
    explanation: Use 'Мені подобається' with things like 'музика'.
  - statement: Мені подобається читати.
    correct: false
    explanation: Use 'Я люблю' with action verbs like 'читати'.
  - statement: Я люблю грати на гітарі.
    correct: true
    explanation: Correct! 'Я люблю' is used with infinitive verbs.
  - statement: Я подобаюся футбол.
    correct: false
    explanation: Incorrect literal translation. Say 'Мені подобається футбол'.
  - statement: Тобі подобається цей фільм?
    correct: true
    explanation: Correct! 'Тобі подобається' is used to ask if you like a thing.
  - statement: Я не люблю готувати.
    correct: true
    explanation: Correct! 'не' goes before 'люблю'.
- id: wb-unjumble-sentences
  type: unjumble
  instruction: Unjumble the words to make correct sentences
  items:
  - words:
    - люблю
    - Я
    - читати.
    correct_order:
    - Я
    - люблю
    - читати.
  - words:
    - подобається
    - музика.
    - Мені
    correct_order:
    - Мені
    - подобається
    - музика.
  - words:
    - не
    - Я
    - малювати.
    - люблю
    correct_order:
    - Я
    - не
    - люблю
    - малювати.
  - words:
    - цей
    - подобається
    - Тобі
    - фільм?
    correct_order:
    - Тобі
    - подобається
    - цей
    - фільм?
  - words:
    - любиш
    - Ти
    - гуляти?
    correct_order:
    - Ти
    - любиш
    - гуляти?
  - words:
    - грати
    - люблю
    - у
    - Я
    - футбол.
    correct_order:
    - Я
    - люблю
    - грати
    - у
    - футбол.
- id: wb-order-dialogue
  type: order
  instruction: Put the dialogue in the correct order
  items:
  - — Привіт! Що ти любиш робити?
  - — Привіт! Я люблю читати.
  - — Цікаво! Тобі подобається ця книга?
  - — Так, мені подобається.
  correct_order:
  - 0
  - 1
  - 2
  - 3
- id: wb-translate-phrases
  type: translate
  instruction: Choose the correct Ukrainian translation
  items:
  - source: I like to travel.
    options:
    - text: Я люблю подорожувати.
      correct: true
    - text: Мені подобається подорожувати.
      correct: false
  - source: I do not like to cook.
    options:
    - text: Я не люблю готувати.
      correct: true
    - text: Я люблю не готувати.
      correct: false
  - source: Do you like this film?
    options:
    - text: Тобі подобається цей фільм?
      correct: true
    - text: Ти любиш цей фільм?
      correct: false
  - source: I like music.
    options:
    - text: Мені подобається музика.
      correct: true
    - text: Я люблю музика.
      correct: false
  - source: Do you like to walk?
    options:
    - text: Ти любиш гуляти?
      correct: true
    - text: Тобі подобається гуляти?
      correct: false
  - source: I don't like this book.
    options:
    - text: Мені не подобається ця книга.
      correct: true
    - text: Я не люблю ця книга.
      correct: false
- id: wb-error-correction
  type: error-correction
  instruction: Find and correct the mistake in the sentence
  items:
  - sentence: Мені подобається малювати.
    error: подобається
    correction: люблю
    error_type: word
    options:
    - люблю
    - любиш
    - любити
    explanation: Use 'Я люблю' for action verbs.
  - sentence: Я люблю музика.
    error: люблю
    correction: Мені подобається
    error_type: phrase
    options:
    - Мені подобається
    - Я подобаюся
    - Тобі подобається
    explanation: Use 'Мені подобається' for objects and things.
  - sentence: Я не любити готувати.
    error: любити
    correction: люблю
    error_type: word
    options:
    - люблю
    - любиш
    - подобається
    explanation: The verb must be conjugated for 'Я' (люблю).
  - sentence: Я подобаюся футбол.
    error: Я подобаюся
    correction: Мені подобається
    error_type: phrase
    options:
    - Мені подобається
    - Я люблю
    - Тобі подобається
    explanation: Literal translation mistake. Use 'Мені подобається'.
  - sentence: Мені ні подобається Київ.
    error: ні
    correction: не
    error_type: word
    options:
    - не
    - нет
    - без
    explanation: Use 'не' to make verbs negative.
  - sentence: Тобі любиш читати?
    error: Тобі
    correction: Ти
    error_type: word
    options:
    - Ти
    - Я
    - Ви
    explanation: Use 'Ти' with 'любиш'.
