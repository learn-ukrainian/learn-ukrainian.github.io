version: '1.0'
module: what-i-like
level: a1
inline:
- id: match-infinitives
  type: match-up
  instruction: Match the Ukrainian verbs to their English meaning.
  pairs:
  - left: читати
    right: to read
  - left: гуляти
    right: to walk
  - left: готувати
    right: to cook
  - left: слухати
    right: to listen
  - left: дивитися
    right: to watch
  - left: грати
    right: to play
  - left: малювати
    right: to draw
  - left: подорожувати
    right: to travel
  - left: співати
    right: to sing
- id: fill-in-activities
  type: fill-in
  instruction: Complete the sentence with the correct verb for the activity.
  items:
  - sentence: Я люблю ____ борщ.
    answer: готувати
    options:
    - готувати
    - подорожувати
    - малювати
  - sentence: Я люблю ____.
    answer: подорожувати
    options:
    - подорожувати
    - читати
    - готувати
  - sentence: Я люблю ____ музику.
    answer: слухати
    options:
    - слухати
    - малювати
    - гуляти
  - sentence: Я люблю ____.
    answer: малювати
    options:
    - малювати
    - готувати
    - читати
  - sentence: Я люблю ____.
    answer: співати
    options:
    - співати
    - слухати
    - гуляти
  - sentence: Я люблю ____.
    answer: гуляти
    options:
    - гуляти
    - малювати
    - готувати
