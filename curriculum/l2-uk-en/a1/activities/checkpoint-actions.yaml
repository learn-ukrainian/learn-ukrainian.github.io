- id: fill-in-dialogue-completion
  type: fill-in
  instruction: Complete the dialogue with the correct words.
  items:
  - sentence: — Привіт! _____ ти робиш?
    answer: Що
    options:
    - Що
    - Хто
    - Де
  - sentence: — Я зараз _____, але хочу каву.
    answer: працюю
    options:
    - працюю
    - працювати
    - працює
  - sentence: — Ти _____ гуляти зараз?
    answer: можеш
    options:
    - можеш
    - можу
    - можуть
  - sentence: — Не _____, мушу працювати.
    answer: можу
    options:
    - можу
    - можеш
    - може
  - sentence: — _____ ти вільний?
    answer: Коли
