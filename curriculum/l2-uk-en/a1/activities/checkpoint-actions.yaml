    - Хто
  - sentence: — У центрі. Я вже _____ зустрітися!
    answer: хочу
    options:
    - хочу
    - хотіти
    - хочеш
  - sentence: — Добре! До _____!
    answer: зустрічі
    options:
    - зустрічі
    - працюю
    - каву
workbook:
- type: true-false
  instruction: Read the statements about Ukrainian grammar. Are they **правда** (true)
    or **неправда** (false)?
  items:
  - statement: The suffix -ся indicates a reflexive verb (like прокидатися).
    correct: true
    explanation: Reflexive verbs describe actions you perform on yourself, adding
      the suffix -ся.
  - statement: The verb 'говорити' belongs to Group I.
    correct: false
    explanation: Verbs ending in -ити or -іти usually belong to Group II.
  - statement: You should say 'я мусити йти'.
    correct: false
    explanation: 'You must conjugate the modal verb: ''я мушу йти''.'
  - statement: The word 'куди' asks about direction (where to).
    correct: true
    explanation: Use 'куди' for direction and 'де' for a static location.
  - statement: After a vowel, the suffix '-ся' can change to '-сь' (e.g., вмиваюсь).
    correct: true
    explanation: This is a common phonetic rule in Ukrainian.
  - statement: In the sentence 'Я нічого не знаю', you only need one negative word.
    correct: false
    explanation: 'Ukrainian uses double negation: ''нічого'' and ''не'' must both
      be used.'
- type: match-up
  instruction: Match the question to the logical answer.
  pairs:
  - left: Що ти робиш?
    right: Я читаю книгу.
  - left: Де ми зустрічаємося?
    right: У центрі.
  - left: Коли ти працюєш?
    right: О дев'ятій.
  - left: Чому ти спиш?
    right: Бо я хочу спати.
  - left: Ти можеш допомогти?
    right: Не можу.
  - left: Хто він?
    right: Він дизайнер.
- type: order
  instruction: Put the dialogue lines in the correct order.
  items:
  - — Привіт! Що ти робиш?
  - — Я працюю, але дуже хочу каву.
  - — Ти можеш гуляти зараз?
  - — Не можу, мушу працювати. Коли ти вільний?
  - — Я вільний о шостій. Де ми зустрічаємося?
  - — У центрі. До зустрічі!
  correct_order:
  - 0
  - 1
  - 2
  - 3
  - 4
  - 5
- type: error-correction
  instruction: Find the mistake in the sentence and choose the correct word.
  items:
  - sentence: Вона хочу каву.
    error: хочу
    correction: хоче
    error_type: word
    options:
    - хоче
    - хочеш
    - хочуть
    explanation: The pronoun 'вона' (she) requires the third-person singular ending
      '-е'.
  - sentence: Я багато працюють.
    error: працюють
    correction: працюю
    error_type: word
    options:
    - працюю
    - працюєш
    - працює
    explanation: The pronoun 'я' (I) requires the first-person singular ending '-ю'.
  - sentence: Ти бачу новий парк?
    error: бачу
    correction: бачиш
    error_type: word
    options:
    - бачиш
    - бачить
    - бачать
    explanation: The pronoun 'ти' (you) requires the second-person singular ending
      '-иш'.
  - sentence: Ми мусимо працює.
    error: працює
    correction: працювати
    error_type: word
    options:
    - працювати
    - працюю
    - працюємо
    explanation: After a modal verb like 'мусити', the next verb must be in the infinitive.
  - sentence: Я нічого знаю.
    error: знаю
    correction: не знаю
    error_type: phrase
    options:
    - не знаю
    - знати не
    - знає не
    explanation: 'Ukrainian requires double negation: ''нічого'' must be used with
      ''не''.'
  - sentence: Куди офіс?
    error: Куди
    correction: Де
    error_type: word
    options:
    - Де
    - Що
    - Хто
    explanation: '''Куди'' means ''where to'' (direction). ''Де'' means ''where''
      (location).'
- type: translate
  instruction: Choose the correct Ukrainian translation.
  items:
  - source: I want to sleep.
    options:
    - text: Я хочу спати.
      correct: true
    - text: Я мушу спати.
      correct: false
    - text: Я можу спати.
      correct: false
  - source: Where are we meeting?
    options:
    - text: Де ми зустрічаємося?
      correct: true
    - text: Куди ми зустрічаємося?
      correct: false
    - text: Коли ми зустрічаємося?
      correct: false
  - source: First I wash my face, then I eat breakfast.
    options:
    - text: Спочатку я вмиваюся, а потім снідаю.
      correct: true
    - text: Зараз я вмиваюся, а тоді снідаю.
      correct: false
    - text: Спочатку я снідаю, а потім вмиваюся.
      correct: false
  - source: They work in the office.
    options:
    - text: Вони працюють в офісі.
      correct: true
    - text: Він працює в офісі.
      correct: false
    - text: Ми працюємо в офісі.
      correct: false
  - source: I really love coffee.
    options:
    - text: Я дуже люблю каву.
      correct: true
    - text: Я хочу каву.
      correct: false
    - text: Я мушу каву.
      correct: false
  - source: He can help.
    options:
    - text: Він може допомогти.
      correct: true
    - text: Вона може допомогти.
      correct: false
    - text: Він мусить допомогти.
      correct: false
