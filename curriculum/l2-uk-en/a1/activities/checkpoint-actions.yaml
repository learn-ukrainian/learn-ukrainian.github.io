version: '1.0'
module: checkpoint-actions
level: a1
inline:
- id: fill-in-describe-day
  type: fill-in
  instruction: Describe your day. Choose the correct **дієслово** (verb).
  items:
  - sentence: Я _____ о сьомій ранку.
    answer: прокидаюся
    options:
    - прокидаюся
    - вмиваюся
    - снідаю
  - sentence: Спочатку я _____, а потім снідаю.
    answer: вмиваюся
    options:
    - вмиваюся
    - сплю
    - працюю
  - sentence: Я дуже _____ каву.
    answer: люблю
    options:
    - люблю
    - працюю
    - гуляю
  - sentence: О дев'ятій я вже _____.
    answer: працюю
    options:
    - сплю
    - працюю
    - прокидаюся
  - sentence: Удень я можу _____ в парку.
    answer: гуляти
    options:
    - гуляти
    - гуляю
    - гуляєш
  - sentence: Увечері я _____ спати.
    answer: хочу
    options:
    - хочу
    - люблю
    - сплю
- id: group-sort-verbs
  type: group-sort
  instruction: 'Sort the verbs by their conjugation group: **Група I**, **Група II**,
    or **Зворотні** (reflexive).'
  groups:
  - label: Група I (-ати/-яти)
    items:
    - знати
    - думати
    - працювати
    - малювати
  - label: Група II (-ити/-іти)
    items:
    - говорити
    - бачити
    - робити
    - любити
  - label: Зворотні (-ся/-сь)
    items:
    - прокидатися
    - вмиватися
    - одягатися
    - зустрічатися
