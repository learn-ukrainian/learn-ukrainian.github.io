  - коза (goat) — коса (braid)
  - бик (bull) — бік (side)
  - дим (smoke) — дім (house)
  prompt: What is the only difference in pronunciation between the words in each pair,
    and how does it affect the meaning?
- type: true-false
  instruction: Are these statements about the soft sign and apostrophe true or false?
  items:
  - statement: The letter Й never needs a soft sign because it is inherently soft.
    correct: true
    explanation: Й is already a soft sound, so it never takes a soft sign.
  - statement: The soft sign is only used at the very end of a word.
    correct: false
    explanation: It can also be used in the middle of a word, like in 'батько'.
  - statement: The apostrophe is placed after labial consonants like Б, П, В, М, Ф.
    correct: true
    explanation: This is the core rule for using the apostrophe.
  - statement: The apostrophe makes the preceding consonant soft.
    correct: false
    explanation: The apostrophe acts as a wall, keeping the preceding consonant hard.
  - statement: A hard consonant and its soft counterpart are considered the exact
      same sound in Ukrainian.
    correct: false
    explanation: They are completely different sounds and distinguish meaning, like
      in 'брат' vs 'брать'.
  - statement: The soft sign (Ь) represents a specific vowel sound.
    correct: false
    explanation: The soft sign has no sound of its own; it only modifies the preceding
      consonant.
  title: Are these statements about the soft sign and apostrophe true or false?
