- type: true-false
  instruction: True or false? Read each statement about the Ukrainian soft sign (Ь).
  items:
  - statement: The soft sign (Ь) has its own pronunciation — it makes a short 'y'
      sound.
    correct: false
    explanation: FALSE — Ь has NO sound at all. Zero. Its only job is to soften the
      consonant before it. It is silent.
  - statement: You can write Ь after Ж in standard Ukrainian spelling.
    correct: false
    explanation: FALSE — Ж is a hushing consonant. Ь never follows Ж, Ш, Ч, or ДЖ
      — ever.
  - statement: The word «учитель» ends with a soft Л because of the Ь.
    correct: true
    explanation: TRUE — Ь after Л at the end signals softness. The Ь has no sound,
      but it marks that Л is pronounced soft.
  - statement: The letter Й is inherently soft and never needs Ь.
    correct: true
    explanation: TRUE — Й is always soft by nature. That is why «м'який» has an apostrophe
      but NO soft sign — Й softens itself automatically.
  - statement: Ь can appear after labial consonants Б, П, В, М, Ф in Ukrainian.
    correct: false
    explanation: FALSE — Labials never take Ь. They can only be partially softened
      by following soft vowels (і, я, ю, є). Ь after a labial is always wrong.
  - statement: The words «сіль» and «день» both contain Ь.
    correct: true
    explanation: TRUE — сіль has Ь after Л; день has Ь after Н. Both consonants (Л
      and Н) are in the group of 8 that take Ь.
