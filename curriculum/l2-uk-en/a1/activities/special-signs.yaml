- id: true-false-devoicing
  type: true-false
  instruction: Are these statements about Ukrainian pronunciation true or false?
  items:
  - statement: Voiced consonants mostly stay voiced at the end of a word in Ukrainian.
    correct: true
    explanation: Ukrainian strictly forbids devoicing at the end of words.
  - statement: The word 'легко' is pronounced with a hard, deep 'г' sound.
    correct: false
    explanation: It is an exception and is pronounced as 'лехко'.
  - statement: The letter Г makes a deep, breathy sound, while Ґ makes a hard 'g'
      sound.
    correct: true
    explanation: This is the core difference between the two letters.
  - statement: The words 'балка' and 'палка' sound exactly the same.
    correct: false
    explanation: They sound different because 'б' is voiced and 'п' is voiceless.
  - statement: If you say the letter Б while covering your ears, your vocal cords
      should vibrate.
    correct: true
    explanation: Б is a voiced consonant, so you will hear a vibration.
  - statement: The word 'мороз' loses its vibration at the end and sounds like an
      'с'.
    correct: false
    explanation: The 'з' must vibrate clearly at the end of the word.
  title: Are these statements about Ukrainian pronunciation true or false?
