- type: true-false
  instruction: Are these statements about Ukrainian pronunciation true or false?
  items:
  - statement: The soft sign (Ь) has no sound of its own; it only softens the consonant
      before it.
    correct: true
    explanation: The soft sign is purely a phonetic modifier and makes no sound by
      itself.
  - statement: The apostrophe in Ukrainian is used to show possession, just like in
      English.
    correct: false
    explanation: The apostrophe creates a hard stop between a consonant and a vowel,
      keeping the consonant hard.
  - statement: Voiced consonants at the end of Ukrainian words lose their voice and
      become whispery.
    correct: false
    explanation: Ukrainian firmly rejects devoicing. A final 'Б' in 'дуб' must stay
      vibrating, never turning into a 'П'.
  - statement: The letter 'И' sounds exactly like the English 'ee' in 'see'.
    correct: false
    explanation: The letter 'И' is a lower, deeper sound. 'І' is the letter that sounds
      like 'ee'.
  - statement: The soft sign (Ь) never appears at the very beginning of a word.
    correct: true
    explanation: Because its only job is to soften the consonant before it, it cannot
      start a word.
  - statement: The letter 'Ґ' is pronounced like a hard 'g', as in 'gate'.
    correct: true
    explanation: Yes, 'Ґ' with the hook is the hard plosive, while 'Г' without the
      hook is the breathy sound.
