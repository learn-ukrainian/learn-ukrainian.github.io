- id: true-false-voicing
  type: true-false
  instruction: Are these statements about voiced and voiceless sounds true or false?
  items:
  - statement: In Ukrainian, a voiced consonant at the end of a word (like Б in 'дуб')
      becomes voiceless (like П).
    correct: false
    explanation: Ukrainian preserves voicing at the end of words. A final Б remains
      a clear Б.
  - statement: The consonants З and С are a voiced-voiceless pair.
    correct: true
    explanation: Yes, З uses vocal cords (voiced), and С does not (voiceless).
  - statement: If you cover your ears and say a voiceless consonant, you will feel
      a vibration.
    correct: false
    explanation: You will only feel a vibration when saying a voiced consonant.
  - statement: The word 'мороз' is pronounced with a clear [з] at the end.
    correct: true
    explanation: Voicing is preserved at the end of words in Ukrainian.
  - statement: The word 'легко' is a rare exception and is pronounced with an [х]
      sound.
    correct: true
    explanation: This is one of the rare exceptions where devoicing occurs.
  - statement: The consonants Б and П are both voiceless.
    correct: false
    explanation: Б is voiced, while П is its voiceless pair.
  title: Are these statements about voiced and voiceless sounds true or false?
