- id: match-voiced-voiceless
  type: match-up
  instruction: Match each voiced consonant (left) to its voiceless partner (right).
    There are 8 pairs in Ukrainian.
  pairs:
  - left: Б
    right: П
  - left: Д
    right: Т
  - left: Г
    right: Х
  - left: Ґ
    right: К
  - left: З
    right: С
  - left: Ж
    right: Ш
  - left: ДЗ
    right: Ц
  - left: ДЖ
    right: Ч
- id: true-false-voicing
  type: true-false
  instruction: True or false? Read each statement about Ukrainian voiced and voiceless
    consonants.
  items:
  - statement: Ukrainian «дуб» (oak) sounds like [дуп] at the end — the final Б loses
      its voice.
    correct: false
    explanation: FALSE — Ukrainian does NOT devoice final consonants. «дуб» is pronounced
      [дуб], not [дуп]. This is a defining feature of Ukrainian pronunciation.
  - statement: «Г» and «Х» are a voiced-voiceless pair.
    correct: true
    explanation: TRUE — Г is voiced (fricative), Х is its voiceless partner. Say Х,
      then add voice — that is Г.
  - statement: The consonants В, Л, М, Н, Й, Р (сонорні) each have a voiceless partner.
    correct: false
    explanation: FALSE — Сонорні consonants have no voiceless partners. They sit completely
      outside the 8 voiced/voiceless pairs.
  - statement: «Ж» is the voiced partner of «Ш».
    correct: true
    explanation: 'TRUE — Ж (voiced) and Ш (voiceless) are one of the 8 pairs. Compare:
      жабка vs шапка.'
  - statement: Ukrainian «мороз» (frost) sounds like [морос] at the word end.
    correct: false
    explanation: FALSE — Ukrainian keeps voiced consonants voiced at word end. «мороз»
      is pronounced [мороз], not [морос]. Same rule as «дуб».
  - statement: «Ґ» and «К» form a voiced-voiceless pair.
    correct: true
    explanation: TRUE — Ґ (voiced stop) and К (voiceless stop) are partners. Say К,
      add voice → Ґ. Both Г and Ґ are native Ukrainian sounds.
