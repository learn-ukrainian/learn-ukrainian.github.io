- type: true-false
  instruction: Read each statement about Ukrainian sounds and signs. Is it TRUE or
    FALSE?
  items:
  - statement: The soft sign (Ь) is a vowel — it adds a short sound after the consonant.
    correct: false
    explanation: Ь has NO sound of its own. It only softens the consonant before it.
  - statement: The apostrophe (') appears after Б, П, В, М, Ф, Р when followed by
      Я, Ю, Є, Ї.
    correct: true
    explanation: This is the exact rule from Захарійчук's Grade 1 textbook. The apostrophe
      keeps the consonant hard.
  - statement: In Ukrainian, the word дуб (oak) is pronounced [дуп] — the final Б
      becomes voiceless.
    correct: false
    explanation: Ukrainian keeps consonants fully voiced at the end of a word. дуб
      is pronounced [дуб] — the Б stays voiced.
  - statement: Г and Ґ are two different Ukrainian letters representing two different
      sounds.
    correct: true
    explanation: Г is a voiced fricative (гарно, гора); Ґ is a hard stop (ґудзик,
      ґанок). They are completely distinct.
  - statement: The word м'який has BOTH an apostrophe and a soft sign.
    correct: true
    explanation: The apostrophe keeps М hard before Я; the Ь at the end softens the
      Й. Two different signs, two different jobs.
  - statement: The letters И and І represent the same sound in Ukrainian.
    correct: false
    explanation: И and І are different letters with different sounds. Compare бик
      (bull) vs бік (side), дим (smoke) vs дім (house).
