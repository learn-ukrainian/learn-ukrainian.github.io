version: '1.0'
module: special-signs
level: a1
inline:
- id: odd-one-out
  type: odd-one-out
  instruction: 'Which letter CANNOT be followed by Ь (soft sign)? Only 8 consonants
    take Ь: Д, Т, З, С, Ц, Л, Н, ДЗ. Find the odd one out.'
  items:
  - words:
    - Д
    - Т
    - Ж
    - Л
    correct: 2
    explanation: Ж is a hushing consonant — Ь never follows Ж, Ш, Ч, or ДЖ. Д, Т,
      and Л are all in the group of 8 that take Ь.
  - words:
    - Н
    - Б
    - С
    - Ц
    correct: 1
    explanation: Б is a labial consonant — Ь never follows Б, П, В, М, or Ф. Н, С,
      and Ц are all in the group of 8 that take Ь.
  - words:
    - Л
    - М
    - Т
    - З
    correct: 1
    explanation: М is a labial consonant — Ь never follows it. Л, Т, and З are all
      in the group of 8 that take Ь.
  - words:
    - Ц
    - Х
    - Д
    - Н
    correct: 1
    explanation: Х is a back-tongue consonant — Ь never follows Х, К, Ґ, or Г. Ц,
      Д, and Н are all in the group of 8 that take Ь.
  - words:
    - С
    - Ш
    - Л
    - Н
    correct: 1
    explanation: Ш is a hushing consonant — Ь never follows it. С, Л, and Н are all
      in the group of 8 that take Ь.
  - words:
    - З
    - Т
    - К
    - Ц
    correct: 2
    explanation: К is a back-tongue consonant — Ь never follows it. З, Т, and Ц are
      all in the group of 8 that take Ь.
