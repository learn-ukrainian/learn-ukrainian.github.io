- id: fill-in-special-signs
  type: fill-in
  instruction: Complete the word with the missing sign (Ь or ').
  items:
  - sentence: Це наша сім_я.
    answer: сім'я
    options:
    - сім'я
    - сімья
    - сімя
  - sentence: Тут є м_ясо.
    answer: м'ясо
    options:
    - м'ясо
    - мьясо
    - мясо
  - sentence: Це мій комп_ютер.
    answer: комп'ютер
    options:
    - комп'ютер
    - компьютер
    - компутер
  - sentence: Це батьк_о.
    answer: батько
    options:
    - батько
    - бат'ко
    - батко
  - sentence: Там учител_.
    answer: учитель
    options:
    - учитель
    - учител'
    - учител
  - sentence: Я маю п_ять.
    answer: п'ять
    options:
    - п'ять
    - пьять
    - пять
  title: Complete the word with the missing sign (Ь or ').
