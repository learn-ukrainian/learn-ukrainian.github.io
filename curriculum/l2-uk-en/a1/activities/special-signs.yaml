- type: group-sort
  instruction: 'Sort these words into three groups: words with a soft sign (Ь), words
    with an apostrophe (''), and words with neither sign.'
  groups:
  - label: Soft sign (Ь)
    items:
    - день
    - сіль
    - батько
    - учитель
  - label: Apostrophe (')
    items:
    - сім'я
    - м'ясо
    - п'ять
    - дев'ять
  - label: Neither
    items:
    - гарно
    - риба
    - рис
    - зима
- type: true-false
  instruction: 'Read each statement and decide: true or false?'
  items:
  - statement: The soft sign (Ь) softens the consonant before it.
    correct: true
    explanation: Correct — Ь has no sound of its own. It only softens the preceding
      consonant, as in день and сіль.
  - statement: The apostrophe appears before the vowels А, О, У, Е.
    correct: false
    explanation: The apostrophe appears only before Я, Ю, Є, Ї — not before А, О,
      У, Е.
  - statement: In Ukrainian, voiced consonants stay voiced at the end of a word.
    correct: true
    explanation: Correct — unlike Russian, Ukrainian keeps consonants voiced at word
      end. Дуб is [дуб], not *[дуп].
  - statement: Г and Ґ make the same sound in Ukrainian.
    correct: false
    explanation: Г is a breathy voiced [ɦ] (like voiced H), while Ґ is a hard [g]
      (like English G in 'go'). They are different sounds.
- type: quiz
  instruction: Choose the correct answer about Ukrainian special signs and sounds.
  items:
  - question: After which consonants can the apostrophe appear?
    options:
    - Б, П, В, М, Ф, Р
    - Д, Т, Н, Л, З, С
    - Any consonant
    - Only Г and Ґ
    correct: 0
  - question: What is the difference between рис and рись?
    options:
    - рис means 'rice' and рись means 'lynx' — the soft sign changes the meaning
    - They mean the same thing
    - рись is the plural of рис
    - рис is feminine and рись is masculine
    correct: 0
  - question: How many voiced-voiceless consonant pairs does Ukrainian have?
    options:
    - Four
    - Six
    - Eight
    - Ten
    correct: 2
  - question: What happens to the vowel after an apostrophe?
    options:
    - It disappears
    - It keeps its full two-sound value (e.g., Я = [й] + [а])
    - It becomes silent
    - It changes to a different vowel
    correct: 1
