version: '1.0'
module: this-and-that
level: a1
inline:
- id: quiz-this-gender
  type: quiz
  instruction: Choose the correct demonstrative pronoun (**цей**, **ця**, **це**).
  items:
  - question: ____ стіл
    options:
    - цей
    - ця
    - це
    correct: 0
  - question: ____ книга
    options:
    - цей
    - ця
    - це
    correct: 1
  - question: ____ вікно
    options:
    - цей
    - ця
    - це
    correct: 2
  - question: ____ сумка
    options:
    - цей
    - ця
    - це
    correct: 1
  - question: ____ рюкзак
    options:
    - цей
    - ця
    - це
    correct: 0
  - question: ____ ліжко
    options:
    - цей
    - ця
    - це
    correct: 2
- id: quiz-that-gender
  type: quiz
  instruction: Choose the correct demonstrative pronoun (**той**, **та**, **те**)
    for the far object.
  items:
  - question: ____ будинок
    options:
    - той
    - та
    - те
    correct: 0
  - question: ____ машина
    options:
    - той
    - та
    - те
    correct: 1
  - question: ____ крісло
    options:
    - той
    - та
    - те
    correct: 2
  - question: ____ стілець
    options:
    - той
    - та
    - те
    correct: 0
  - question: ____ ручка
    options:
    - той
    - та
    - те
    correct: 1
  - question: ____ ліжко
    options:
    - той
    - та
    - те
    correct: 2
- id: fill-in-this-vs-that
  type: fill-in
  instruction: Complete the sentence contrasting near and far objects with **той**,
    **та**, or **те**.
  items:
  - sentence: Цей стілець новий, а ____ — старий.
    answer: той
    options:
    - той
    - та
    - те
  - sentence: Ця книга нова, а ____ — стара.
    answer: та
    options:
    - той
    - та
    - те
  - sentence: ____ стіл тут, а той стіл там.
    answer: Цей
    options:
    - Цей
    - Ця
    - Це
  - sentence: Це вікно велике, а ____ маленьке.
    answer: те
    options:
    - той
    - та
    - те
  - sentence: ____ сумка червона, а та — синя.
    answer: Ця
    options:
    - Цей
    - Ця
    - Це
  - sentence: Цей рюкзак мій, а ____ — твій.
    answer: той
    options:
    - той
    - та
    - те
- id: match-up-gender-patterns
  type: match-up
  instruction: Match the pronouns that share the same gender.
  pairs:
  - left: мій
    right: цей
  - left: моя
    right: ця
  - left: моє
    right: це
  - left: який
    right: той
  - left: яка
    right: та
  - left: яке
    right: те
workbook:
- id: group-sort-gender
  type: group-sort
  instruction: Sort the nouns into the correct gender category based on whether they
    take **цей**, **ця**, or **це**.
  groups:
  - label: Цей (Masculine)
    items:
    - стіл
    - рюкзак
    - стілець
    - будинок
  - label: Ця (Feminine)
    items:
    - сумка
    - книга
    - ручка
    - машина
  - label: Це (Neuter)
    items:
    - вікно
    - ліжко
    - крісло
- id: fill-in-chi
  type: fill-in
  instruction: Fill in the blanks with the correct pointing word or **чи** (or).
  items:
  - sentence: Який стіл? — Цей ____ той?
    answer: чи
    options:
    - чи
    - та
    - і
  - sentence: Яка сумка? — Ця червона ____ та синя?
    answer: чи
    options:
    - чи
    - та
    - і
  - sentence: Яке вікно? — Це велике ____ те маленьке?
    answer: чи
    options:
    - чи
    - та
    - і
  - sentence: ____ стіл тут.
    answer: Цей
    options:
    - Цей
    - Той
    - Ця
  - sentence: ____ стіл там.
    answer: Той
    options:
    - Цей
    - Той
    - Ця
  - sentence: Ось моя книга. А де ____ книга?
    answer: та
    options:
    - та
    - ця
    - те
- id: true-false-demonstratives
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: «Цей книга» — це правильно.
    correct: false
    explanation: Книга — жіночий рід, тому правильно «ця книга».
  - statement: «Та машина» — це правильно.
    correct: true
    explanation: Машина — жіночий рід, тому «та» — правильна форма.
  - statement: «Це крісло» — це правильно.
    correct: true
    explanation: Крісло — середній рід, тому «це» — правильна форма.
  - statement: «Той сумка» — це правильно.
    correct: false
    explanation: Сумка — жіночий рід, тому правильно «та сумка».
  - statement: «Ця ручка» — це правильно.
    correct: true
    explanation: Ручка — жіночий рід, тому «ця» — правильна форма.
  - statement: «Те стіл» — це правильно.
    correct: false
    explanation: Стіл — чоловічий рід, тому правильно «той стіл».
- id: anagram-vocabulary
  type: anagram
  instruction: Складіть слово з літер (Make a word from the letters).
  items:
  - letters:
    - ц
    - е
    - й
    answer: цей
  - letters:
    - т
    - о
    - й
    answer: той
  - letters:
    - о
    - с
    - ь
    answer: ось
  - letters:
    - т
    - у
    - т
    answer: тут
  - letters:
    - т
    - а
    - м
    answer: там
  - letters:
    - я
    - к
    - и
    - й
    answer: який
- id: unjumble-sentences
  type: unjumble
  instruction: Складіть правильне речення зі слів (Put the words in the correct order).
  items:
  - words:
    - сумка?
    - коштує
    - Скільки
    - ця
    correct_order:
    - Скільки
    - коштує
    - ця
    - сумка?
  - words:
    - червона?
    - Ця
    - Яка?
    correct_order:
    - Яка?
    - Ця
    - червона?
  - words:
    - синя.
    - Ні,
    - та
    correct_order:
    - Ні,
    - та
    - синя.
  - words:
    - новий.
    - стілець
    - Цей
    correct_order:
    - Цей
    - стілець
    - новий.
  - words:
    - старий.
    - той
    - —
    - А
    correct_order:
    - А
    - той
    - —
    - старий.
  - words:
    - мій
    - Це
    - стіл.
    correct_order:
    - Це
    - мій
    - стіл.
- id: odd-one-out-gender
  type: odd-one-out
  instruction: Знайдіть зайве слово (Find the odd one out).
  items:
  - words:
    - стіл
    - рюкзак
    - книга
    correct: 2
    explanation: Книга — жіночий рід (ця), інші — чоловічий рід (цей).
  - words:
    - сумка
    - вікно
    - ручка
    correct: 1
    explanation: Вікно — середній рід (це), інші — жіночий рід (ця).
  - words:
    - ліжко
    - крісло
    - стілець
    correct: 2
    explanation: Стілець — чоловічий рід (цей), інші — середній рід (це).
  - words:
    - цей
    - той
    - яка
    correct: 2
    explanation: Яка — жіночий рід, інші — чоловічий рід.
  - words:
    - ця
    - моя
    - те
    correct: 2
    explanation: Те — середній рід, інші — жіночий рід.
  - words:
    - це
    - моє
    - мій
    correct: 2
    explanation: Мій — чоловічий рід, інші — середній рід.
