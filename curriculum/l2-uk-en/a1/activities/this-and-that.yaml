version: '1.0'
module: this-and-that
level: a1
inline:
- id: quiz-this-gender
  type: quiz
  instruction: 'Choose the correct form: **цей**, **ця**, or **це**.'
  items:
  - question: _____ стіл
    options:
    - цей
    - ця
    - це
    correct: 0
  - question: _____ книга
    options:
    - цей
    - ця
    - це
    correct: 1
  - question: _____ вікно
    options:
    - цей
    - ця
    - це
    correct: 2
  - question: _____ телефон
    options:
    - цей
    - ця
    - це
    correct: 0
  - question: _____ сумка
    options:
    - цей
    - ця
    - це
    correct: 1
  - question: _____ поле
    options:
    - цей
    - ця
    - це
    correct: 2
  - question: _____ рюкзак
    options:
    - цей
    - ця
    - це
    correct: 0
  - question: _____ кімната
    options:
    - цей
    - ця
    - це
    correct: 1
- id: match-up-this-possessive
  type: match-up
  instruction: Match the words that have the same gender.
  pairs:
  - left: цей рюкзак
    right: мій рюкзак
  - left: ця шафа
    right: моя шафа
  - left: це крісло
    right: моє крісло
  - left: який телефон?
    right: цей телефон
  - left: яка кімната?
    right: ця кімната
  - left: яке поле?
    right: це поле
- id: fill-in-near-far
  type: fill-in
  instruction: Fill in the blanks with **цей** / **той**, **ця** / **та**, or **це**
    / **те**.
  items:
  - sentence: Цей стіл новий, а ____ — старий.
    answer: той
    options:
    - цей
    - той
    - та
  - sentence: ____ шафа нова, а та — стара.
    answer: ця
    options:
    - ця
    - та
    - це
  - sentence: Ця сумка синя, а ____ — червона.
    answer: та
    options:
    - ця
    - та
    - те
  - sentence: Це вікно велике, а ____ — маленьке.
    answer: те
    options:
    - це
    - те
    - та
  - sentence: ____ телефон новий, а той смартфон старий.
    answer: цей
    options:
    - цей
    - ця
    - це
  - sentence: Ця кімната велика, а ____ — маленька.
    answer: та
    options:
    - та
    - те
    - той
  - sentence: ____ крісло нове, а те — старе.
    answer: це
    options:
    - це
    - те
    - цей
  - sentence: Цей рюкзак синій, а ____ — червоний.
    answer: той
    options:
    - той
    - та
    - те
