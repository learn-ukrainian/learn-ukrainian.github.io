workbook:
- id: group-gender
  type: group-sort
  instruction: Sort the nouns by the word you use to point at them.
  groups:
  - label: Цей / Той (masculine)
    items:
    - стіл
    - телефон
    - рюкзак
    - олівець
    - смартфон
    - стілець
  - label: Ця / Та (feminine)
    items:
    - книга
    - сумка
    - кімната
    - шафа
    - полиця
    - жінка
  - label: Це / Те (neuter)
    items:
    - вікно
    - поле
    - крісло
- id: fill-in-adjectives
  type: fill-in
  instruction: Fill in the blanks with the correct adjective form.
  items:
  - sentence: Ця сумка ____.
    answer: нова
    options:
    - новий
    - нова
    - нове
  - sentence: Цей рюкзак ____.
    answer: синій
    options:
    - синій
    - синя
    - синє
  - sentence: Це крісло ____.
    answer: старе
    options:
    - старий
    - стара
    - старе
  - sentence: Та книга дуже ____.
    answer: цікава
    options:
    - цікавий
    - цікава
    - цікаве
  - sentence: Той стіл ____.
    answer: великий
    options:
    - великий
    - велика
    - велике
  - sentence: Те вікно ____.
    answer: маленьке
    options:
    - маленький
    - маленька
    - маленьке
- id: error-correction-agreement
  type: error-correction
  instruction: Find and correct the mistake in gender agreement.
  items:
  - sentence: Цей книга дуже цікава.
    error: Цей
    correction: Ця
    error_type: word
    options:
    - Ця
    - Це
    - Та
    explanation: Книга is feminine, so use ця.
  - sentence: Це шафа нова, а та стара.
    error: Це
    correction: Ця
    error_type: word
    options:
    - Ця
    - Цей
    - Те
    explanation: Шафа is feminine, so use ця.
  - sentence: Той крісло дуже старе.
    error: Той
    correction: Те
    error_type: word
    options:
    - Те
    - Та
    - Це
    explanation: Крісло is neuter, so use те.
  - sentence: Ця рюкзак мій.
    error: Ця
    correction: Цей
    error_type: word
    options:
    - Цей
    - Це
    - Той
    explanation: Рюкзак is masculine, so use цей.
  - sentence: Яка гарна кімната! Цей кімната велика.
    error: Цей
    correction: Ця
    error_type: word
    options:
    - Ця
    - Це
    - Та
    explanation: Кімната is feminine, so use ця.
  - sentence: Моє вікно нове, а та вікно старе.
    error: та
    correction: те
    error_type: word
    options:
    - те
    - той
    - це
    explanation: Вікно is neuter, so use те.
- id: translate-this-that
  type: translate
  instruction: Choose the correct Ukrainian translation for the English phrase.
  items:
  - source: This table or that table?
    options:
    - text: Цей стіл чи той стіл?
      correct: true
    - text: Ця стіл чи та стіл?
      correct: false
    - text: Це стіл чи те стіл?
      correct: false
  - source: That blue bag
    options:
    - text: Та синя сумка
      correct: true
    - text: Ця синя сумка
      correct: false
    - text: Той синій сумка
      correct: false
  - source: This is my new room.
    options:
    - text: Це моя нова кімната.
      correct: true
    - text: Ця моя нова кімната.
      correct: false
    - text: Цей мій новий кімната.
      correct: false
  - source: This window is big, and that one is small.
    options:
    - text: Це вікно велике, а те — маленьке.
      correct: true
    - text: Ця вікно велика, а та — маленька.
      correct: false
    - text: Це вікно велике, а те — маленьке є.
      correct: false
  - source: Which backpack? This red one?
    options:
    - text: Який рюкзак? Цей червоний?
      correct: true
    - text: Яка сумка? Ця червона?
      correct: false
    - text: Що це? Це рюкзак?
      correct: false
  - source: Look! Here is that old chair.
    options:
    - text: Ось! Тут той старий стілець.
      correct: true
    - text: Там! Ось цей новий стілець.
      correct: false
    - text: Ось! Тут та стара шафа.
      correct: false
- id: reading-true-false
  type: true-false
  instruction: True or False? Read the dialogue again to check.
  items:
  - statement: Та синя сумка коштує двісті гривень.
    correct: true
    explanation: 'The assistant says: «Та сумка коштує двісті гривень».'
  - statement: Цей рюкзак коштує сто гривень.
    correct: false
    explanation: 'He says it costs 150: «Цей — сто п''ятдесят».'
  - statement: 'Ірина каже: «Це новий смартфон».'
    correct: false
    explanation: The assistant (консультант) says it.
  - statement: Вдома в Ірини є новий стілець.
    correct: true
    explanation: 'She says: «Цей стілець новий».'
  - statement: Та книжкова полиця нова.
    correct: false
    explanation: 'She says: «та книжкова полиця стара».'
  - statement: Вдома в Ірини є стіл і крісло.
    correct: true
    explanation: 'She points to them: «Це мій стіл... Те — крісло».'
- id: unjumble-sentences
  type: unjumble
  instruction: Put the words in the correct order to make a sentence.
  items:
  - words:
    - коштує
    - Скільки
    - сумка?
    - ця
    correct_order:
    - Скільки
    - коштує
    - ця
    - сумка?
  - words:
    - смартфон.
    - новий
    - Це
    correct_order:
    - Це
    - новий
    - смартфон.
  - words:
    - маленький.
    - Цей
    - а
    - стіл
    - —
    - великий,
    - той
    correct_order:
    - Цей
    - стіл
    - великий,
    - а
    - той
    - —
    - маленький.
  - words:
    - маленьке?
    - Це
    - велике
    - чи
    - те
    correct_order:
    - Це
    - велике
    - чи
    - те
    - маленьке?
  - words:
    - стара.
    - шафа
    - а
    - нова,
    - Ця
    - —
    - та
    correct_order:
    - Ця
    - шафа
    - нова,
    - а
    - та
    - —
    - стара.
  - words:
    - той
    - олівець
    - мій,
    - —
    - а
    - Цей
    - твій.
    correct_order:
    - Цей
    - олівець
    - мій,
    - а
    - той
    - —
    - твій.
