- type: true-false
  title: Grammar and Culture Check
  instruction: Determine if the statements are true or false based on the lesson.
  items:
    - statement: In Ukrainian, you must use a linking verb to say I am a student.
      correct: false
      explanation: Ukrainian uses the zero copula. You simply say Я студент.
    - statement: The word Ви is used when speaking to strangers, teachers, or elders.
      correct: true
      explanation: Ви is the formal safe mode and should always be your default with strangers.
    - statement: The question word хто is used for inanimate objects like tables and textbooks.
      correct: false
      explanation: The word хто is strictly for living beings. The word що is used for objects.
    - statement: If a noun is a non-living object, you always refer to it as воно.
      correct: false
      explanation: Objects use він or вона depending on their grammatical gender. The word воно is only for neuter nouns.
    - statement: The phrase Мене звати is the standard way to say My name is.
      correct: true
      explanation: This is the most common and polite way to introduce yourself.
    - statement: You can use the word це to point out both people and inanimate objects.
      correct: true
      explanation: The word це is versatile and works for both Who is this and What is this.
    - statement: You should use 'ти' when speaking to a new doctor you just met.
      correct: false
      explanation: You should use 'Ви' with doctors and other professionals you don't know well.
    - statement: The literal translation of "Мене звати" is "They call me".
      correct: true
      explanation: Yes, "Мене звати" literally means "They call me," though it translates as "My name is."

