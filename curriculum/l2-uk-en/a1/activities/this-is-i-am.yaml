- type: quiz
  title: "Grammar Basics"
  instruction: "Choose the correct answer to check your understanding."
  items:
    - question: "Which verb do we usually skip in Ukrainian present tense sentences?"
      options:
        - text: "є (is/are)"
          correct: true
        - text: "робити (to do)"
          correct: false
        - text: "мати (to have)"
          correct: false
        - text: "хотіти (to want)"
          correct: false
      explanation: "In Ukrainian, the linking verb «є» is usually omitted."
    - question: "Which pronoun is used for polite address?"
      options:
        - text: "Ви"
          correct: true
        - text: "Ти"
          correct: false
        - text: "Ми"
          correct: false
        - text: "Вони"
          correct: false
      explanation: "«Ви» is used for formal communication and addressing elders."
    - question: "What gender is the word «вікно» (ends in -о)?"
      options:
        - text: "Neuter (Воно)"
          correct: true
        - text: "Masculine (Він)"
          correct: false
        - text: "Feminine (Вона)"
          correct: false
        - text: "No gender"
          correct: false
      explanation: "Words ending in -о are usually neuter."
    - question: "How do you say 'This is a passport' in Ukrainian?"
      options:
        - text: "Це паспорт."
          correct: true
        - text: "Він паспорт."
          correct: false
        - text: "Я паспорт."
          correct: false
        - text: "Це є паспорт."
          correct: false
      explanation: "We use the universal word «Це» and omit the verb."
    - question: "Where is the particle «не» placed in a negative sentence?"
      options:
        - text: "Before the word it negates"
          correct: true
        - text: "After the word it negates"
          correct: false
        - text: "At the end of the sentence"
          correct: false
        - text: "At the beginning of the sentence"
          correct: false
      explanation: "The particle «не» always stands before the word it negates."
    - question: "Which pronoun corresponds to «кава» (ends in -а)?"
      options:
        - text: "Вона"
          correct: true
        - text: "Він"
          correct: false
        - text: "Воно"
          correct: false
        - text: "Ми"
          correct: false
      explanation: "Words ending in -а are usually feminine, so «Вона»."
    - question: "What is the translation of 'I am a student'?"
      options:
        - text: "Я студент."
          correct: true
        - text: "Я є студент."
          correct: false
        - text: "Це студент."
          correct: false
        - text: "Він студент."
          correct: false
      explanation: "We simply say 'Subject + Predicate': Я студент."
    - question: "Which word is the 'Universal Pointer'?"
      options:
        - text: "Це"
          correct: true
        - text: "Він"
          correct: false
        - text: "Тут"
          correct: false
        - text: "Там"
          correct: false
      explanation: "«Це» corresponds to 'This is', 'It is', 'These are'."

- type: match-up
  title: "Match the Pronouns"
  instruction: "Connect the Ukrainian pronoun with its English translation."
  pairs:
    - left: "Я"
      right: "I"
    - left: "Ти"
      right: "You (informal)"
    - left: "Ми"
      right: "We"
    - left: "Ви"
      right: "You (formal/plural)"
    - left: "Вони"
      right: "They"
    - left: "Він"
      right: "He"
    - left: "Вона"
      right: "She"
    - left: "Воно"
      right: "It"

- type: group-sort
  title: "He, She, or It?"
  instruction: "Sort the words by gender based on their endings."
  groups:
