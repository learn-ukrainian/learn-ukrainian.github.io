- type: fill-in
  title: "Introduce Yourself"
  instruction: "Complete each self-introduction sentence by choosing the correct word."
  items:
    - sentence: "Мене ___ Оксана."
      answer: "звати"
      options: ["звати", "це", "тут", "там"]
      explanation: "Мене звати... means My name is..."
    - sentence: "Я ___."
      answer: "студентка"
      options: ["студентка", "студент", "вчитель", "українець"]
      explanation: "A female speaker says Я студентка."
    - sentence: "Я ___."
      answer: "українець"
      options: ["українець", "українка", "студентка", "вчителька"]
      explanation: "A male speaker says Я українець."
    - sentence: "Мене ___ Тарас."
      answer: "звати"
      options: ["звати", "хто", "що", "ось"]
      explanation: "Мене звати Тарас means My name is Taras."
    - sentence: "Я ___."
      answer: "вчителька"
      options: ["вчителька", "вчитель", "студент", "українець"]
      explanation: "A female teacher says Я вчителька."
    - sentence: "Я ___."
      answer: "студент"
      options: ["студент", "студентка", "українка", "вчителька"]
      explanation: "A male speaker says Я студент."

- type: fill-in
  title: "Complete with Pronouns"
  instruction: "Choose the correct pronoun to complete each sentence."
  items:
    - sentence: "___ студент."
      answer: "Я"
      options: ["Я", "Це", "Він", "Вона"]
      explanation: "Я студент means I am a student."
    - sentence: "___ вчителька."
      answer: "Вона"
      options: ["Вона", "Він", "Воно", "Ми"]
      explanation: "Вчителька is feminine, so use вона."
    - sentence: "___ українець."
      answer: "Він"
      options: ["Він", "Вона", "Воно", "Ви"]
      explanation: "Українець is masculine, so use він."
    - sentence: "___ друзі."
      answer: "Ми"
      options: ["Ми", "Я", "Він", "Вона"]
      explanation: "Ми друзі means We are friends."
    - sentence: "___ тут."
      answer: "Вони"
      options: ["Вони", "Він", "Вона", "Воно"]
      explanation: "Вони тут means They are here."
    - sentence: "___ студентка."
      answer: "Вона"
      options: ["Вона", "Він", "Воно", "Вони"]
      explanation: "Студентка is feminine, so use вона."
    - sentence: "___ вчитель."
      answer: "Він"
      options: ["Він", "Вона", "Ми", "Ви"]
      explanation: "Вчитель is masculine, so use він."
    - sentence: "___ там."
      answer: "Воно"
      options: ["Воно", "Він", "Вона", "Ми"]
      explanation: "Воно can refer to a neuter noun that is there."
    - sentence: "___ українка."
      answer: "Я"
      options: ["Я", "Він", "Воно", "Вони"]
      explanation: "A female speaker says Я українка."
    - sentence: "___ студент?"
      answer: "Ти"
      options: ["Ти", "Я", "Ми", "Вони"]
      explanation: "Ти студент? means Are you a student? (informal)"
    - sentence: "___ вчителька?"
      answer: "Ви"
      options: ["Ви", "Я", "Він", "Воно"]
      explanation: "Ви вчителька? means Are you a teacher? (formal)"
    - sentence: "Це книга. ___ тут."
      answer: "Вона"
      options: ["Вона", "Він", "Воно", "Вони"]
      explanation: "Книга is feminine, so the pronoun is вона."
    - sentence: "Це стіл. ___ там."
      answer: "Він"
      options: ["Він", "Вона", "Воно", "Вони"]
      explanation: "Стіл is masculine, so the pronoun is він."
    - sentence: "Це молоко. ___ тут."
      answer: "Воно"
      options: ["Воно", "Він", "Вона", "Вони"]
      explanation: "Молоко is neuter, so the pronoun is воно."
    - sentence: "Це хліб. ___ там."
      answer: "Він"
      options: ["Він", "Вона", "Воно", "Ми"]
      explanation: "Хліб is masculine, so the pronoun is він."

- type: fill-in
  title: "Meeting Someone New"
  instruction: "Complete the dialogue by choosing the correct word."
  items:
    - sentence: "— Добрий день! Мене ___ Сара."
      answer: "звати"
      options: ["звати", "це", "хто", "що"]
      explanation: "Мене звати... is the standard introduction."
    - sentence: "— ___ приємно!"
      answer: "Дуже"
      options: ["Дуже", "Там", "Тут", "Ось"]
      explanation: "Дуже приємно means Nice to meet you."
    - sentence: "— ___ ви?"
      answer: "Хто"
      options: ["Хто", "Що", "Де", "Як"]
      explanation: "Хто ви? means Who are you? (formal)"
    - sentence: "— Я Тарас. Я ___."
      answer: "студент"
      options: ["студент", "студентка", "українка", "вчителька"]
      explanation: "Тарас is male, so he says Я студент."
    - sentence: "— А ви ___?"
      answer: "вчителька"
      options: ["вчителька", "вчитель", "студент", "українець"]
      explanation: "Addressing a female teacher formally with ви."
    - sentence: "— Так, я ___."
      answer: "вчителька"
      options: ["вчителька", "вчитель", "студент", "українець"]
      explanation: "A female teacher confirms with Я вчителька."

- type: quiz
  title: "Zero Copula and Pronouns"
  instruction: "Choose the correct answer."
  items:
    - question: "How do you say 'I am a student' in Ukrainian?"
      options:
        - text: "Я студент"
          correct: true
        - text: "Я є студент"
          correct: false
        - text: "Це студент"
          correct: false
        - text: "Він студент"
          correct: false
      explanation: "Ukrainian drops 'to be' in identity sentences. Я студент is correct."
    - question: "Which pronoun replaces a feminine noun like книга (book)?"
      options:
        - text: "вона"
          correct: true
        - text: "він"
          correct: false
        - text: "воно"
          correct: false
        - text: "вони"
          correct: false
      explanation: "Книга is feminine, so the pronoun is вона."
    - question: "What does Мене звати Оксана mean?"
      options:
        - text: "My name is Oksana"
          correct: true
        - text: "This is Oksana"
          correct: false
        - text: "She is Oksana"
          correct: false
        - text: "Where is Oksana?"
          correct: false
      explanation: "Мене звати... is the standard way to say My name is..."
    - question: "Which word do you use to ask about a person's identity?"
      options:
        - text: "хто"
          correct: true
        - text: "що"
          correct: false
        - text: "це"
          correct: false
        - text: "ось"
          correct: false
      explanation: "Хто means who — use it for people. Що means what — use it for objects."
    - question: "A male Ukrainian speaker says:"
      options:
        - text: "Я українець"
          correct: true
        - text: "Я українка"
          correct: false
        - text: "Я є українець"
          correct: false
        - text: "Він українець"
          correct: false
      explanation: "Українець is the masculine form. Українка is feminine."
    - question: "Which pronoun should you use when meeting a stranger?"
      options:
        - text: "ви"
          correct: true
        - text: "ти"
          correct: false
        - text: "вони"
          correct: false
        - text: "він"
          correct: false
      explanation: "Always use ви (formal you) with strangers — the Ви Safety Net."

- type: match-up
  title: "Pronouns and Their Meanings"
  instruction: "Match each Ukrainian pronoun to its English translation."
  pairs:
    - left: "я"
      right: "I"
    - left: "ти"
      right: "you (informal)"
    - left: "він"
      right: "he"
    - left: "вона"
      right: "she"
    - left: "воно"
      right: "it (neuter only)"
    - left: "ми"
      right: "we"
    - left: "ви"
      right: "you (formal/plural)"
    - left: "вони"
      right: "they"

- type: true-false
  title: "True or False? Zero Copula and Pronouns"
  items:
    - statement: "In Ukrainian, you need the word є to say 'I am a student.'"
      correct: false
      explanation: "Ukrainian drops 'to be' in identity sentences. Say Я студент, not Я є студент."
    - statement: "Це книга is a complete sentence in Ukrainian."
      correct: true
      explanation: "Це + noun is a complete identification sentence. No verb needed."
    - statement: "The pronoun воно can replace any object, like a table or a book."
      correct: false
      explanation: "Воно is only for neuter nouns. Стіл (table) is masculine (він), книга (book) is feminine (вона)."
    - statement: "Хто це? is used to ask about people."
      correct: true
      explanation: "Хто means who — use it for people and animals."
    - statement: "You should use ти when speaking to a teacher you just met."
      correct: false
      explanation: "Use ви (formal) with strangers and elders. Ти is for friends and peers."
    - statement: "A female student says Я студентка."
      correct: true
      explanation: "Студентка is the feminine form. A male student says Я студент."
    - statement: "Що це? means 'Who is this?'"
      correct: false
      explanation: "Що means what. Хто means who. Що це? means What is this?"
    - statement: "Мене звати means 'My name is.'"
      correct: true
      explanation: "Мене звати... is the standard self-introduction formula."

- type: group-sort
  title: "Which Pronoun Replaces It?"
  instruction: "Sort each noun under the pronoun that replaces it."
  groups:
