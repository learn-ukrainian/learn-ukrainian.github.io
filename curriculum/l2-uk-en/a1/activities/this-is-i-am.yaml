    - name: "вона (feminine)"
      items: ["книга", "сіль", "студентка", "вчителька"]
    - name: "воно (neuter)"
      items: ["молоко", "місто"]

- type: unjumble
  title: "Put the Words in Order"
  instruction: "Arrange the words to form a correct Ukrainian sentence."
  items:
    - words: ["студент", "Я"]
      answer: "Я студент"
    - words: ["книга", "Це"]
      answer: "Це книга"
    - words: ["вчителька", "Вона"]
      answer: "Вона вчителька"
    - words: ["українець", "Він"]
      answer: "Він українець"
    - words: ["друзі", "Ми"]
      answer: "Ми друзі"
    - words: ["Оксана", "звати", "Мене"]
      answer: "Мене звати Оксана"

