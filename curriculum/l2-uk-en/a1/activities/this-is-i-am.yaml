- type: quiz
  title: 'The It Trap'
  instruction: Choose the correct pronoun for the object mentioned.
  items:
    - question: The word стіл (table) ends in a consonant. Which pronoun replaces it?
      explanation: The word стіл is masculine, so it is replaced by він.
      options:
        - text: він
          correct: true
        - text: вона
          correct: false
        - text: воно
          correct: false
        - text: вони
          correct: false
    - question: The word книга (book) ends in -а. Which pronoun replaces it?
      explanation: The word книга is feminine, so it is replaced by вона.
      options:
        - text: вона
          correct: true
        - text: він
          correct: false
        - text: воно
          correct: false
        - text: ви
          correct: false
    - question: The word яблуко (apple) ends in -о. Which pronoun replaces it?
      explanation: The word яблуко is neuter, so it is replaced by воно.
      options:
        - text: воно
          correct: true
        - text: він
          correct: false
        - text: вона
          correct: false
        - text: я
          correct: false
    - question: The word паспорт (passport) ends in a consonant. Which pronoun replaces it?
      explanation: The word паспорт is masculine, so it is replaced by він.
      options:
        - text: він
          correct: true
        - text: вона
          correct: false
        - text: воно
          correct: false
        - text: ми
          correct: false
    - question: The word вікно (window) ends in -о. Which pronoun replaces it?
      explanation: The word вікно is neuter, so it is replaced by воно.
      options:
        - text: воно
          correct: true
        - text: він
          correct: false
        - text: вона
          correct: false
        - text: ти
          correct: false
    - question: Анна is a woman's name. Which pronoun replaces it?
      explanation: Анна is feminine, so she is replaced by вона.
      options:
        - text: вона
          correct: true
        - text: він
          correct: false
        - text: воно
          correct: false
        - text: ви
          correct: false
    - question: The word телефон (telephone) ends in a consonant. Which pronoun replaces it?
      explanation: The word телефон is masculine, so it is replaced by він.
      options:
        - text: він
          correct: true
        - text: вона
          correct: false
        - text: воно
          correct: false
        - text: ти
          correct: false
    - question: The word сім'я (family) ends in -я. Which pronoun replaces it?
      explanation: The word сім'я is feminine, so it is replaced by вона.
      options:
        - text: вона
          correct: true
        - text: він
          correct: false
        - text: воно
          correct: false
        - text: ви
          correct: false

