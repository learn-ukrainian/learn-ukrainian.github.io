- instruction: Match the English pronoun to its Ukrainian equivalent.
  pairs:
  - left: I
    right: Я
  - left: You (singular, informal)
    right: Ти
  - left: He
    right: Він
  - left: She
    right: Вона
  - left: It
    right: Воно
  - left: We
    right: Ми
  - left: You (plural or formal)
    right: Ви
  - left: They
    right: Вони
  title: Personal Pronouns
  type: match-up
- groups:
  - items:
    - студент
    - Іван
    - стіл
    - тато
    - лікар
    name: Він (He)
  - items:
    - вчителька
    - мама
    - Ольга
    - Марія
    - лампа
    name: Вона (She)
  - items:
    - місто
    - вікно
    - сонце
    - тіло
    name: Воно (It)
  instruction: Sort the words into the correct gender category based on the pronoun
    you would use to replace them.
  title: He, She, or It?
  type: group-sort
- instruction: Choose the correct answer about Ukrainian grammar rules.
  items:
  - explanation: In the present tense, the verb 'to be' is omitted (Zero Copula).
      'Я є студент' is unnatural.
    options:
    - correct: true
      text: Я — студент.
    - correct: false
      text: Я є студент.
    - correct: false
      text: Я бути студент.
    - correct: false
      text: Я студент є.
    question: How do you say 'I am a student' in Ukrainian?
  - explanation: '''Це'' is used to introduce or identify people and objects.'
    options:
    - correct: true
      text: Це
    - correct: false
      text: Він
    - correct: false
      text: Тут
    - correct: false
      text: Що
    question: Which word acts as a universal pointer meaning 'This is'?
  - explanation: '''Ви'' is used for plural groups AND for formal address (strangers,
      elders, superiors).'
    options:
    - correct: true
      text: With strangers, elders, or groups.
    - correct: false
      text: Only with groups of people.
    - correct: false
      text: Only with close friends.
    - correct: false
      text: With children and animals.
    question: When should you use the pronoun 'Ви'?
  - explanation: In Ukrainian, objects have gender. A table is masculine, so it is
      'Він' (He).
    options:
    - correct: true
      text: Він
    - correct: false
      text: Воно
    - correct: false
      text: Вона
    - correct: false
      text: Це
    question: If you see a table (стіл - masculine), which pronoun replaces it?
  - explanation: It refers to the absence of the verb 'to be' (am/is/are) in simple
      present tense sentences.
    options:
    - correct: true
      text: The absence of 'am/is/are' in the present tense.
    - correct: false
      text: A missing subject in the sentence.
    - correct: false
      text: A special type of pronoun.
    - correct: false
      text: The negative particle 'не'.
    question: What is the 'Zero Copula'?
  - explanation: '''Хто'' (Who) is for people. ''Що'' (What) is for things.'
    options:
    - correct: true
      text: Хто це?
    - correct: false
      text: Що це?
    - correct: false
      text: Де це?
    - correct: false
      text: Це хто?
    question: How do you ask 'Who is this?' for a person?
  - explanation: '''Так'' is the Ukrainian word for ''Yes''.'
    options:
    - correct: true
      text: Так
    - correct: false
      text: Ні
    - correct: false
      text: Не
    - correct: false
      text: Тут
    question: How do you say 'Yes' in Ukrainian?
  - explanation: '''Ні'' is the Ukrainian word for ''No''.'
    options:
    - correct: true
      text: Ні
    - correct: false
      text: Так
    - correct: false
      text: Це
    - correct: false
      text: Ми
    question: How do you say 'No' in Ukrainian?
  title: Grammar Concepts
  type: quiz
- instruction: Replace the name or object with the correct personal pronoun.
  items:
  - answer: Він
    explanation: Ivan is male, so we use 'Він'.
    options:
    - Він
    - Вона
    - Воно
    - Ми
    sentence: '{{Ivan}} is a student.'
  - answer: Вона
    explanation: Maria is female, so we use 'Вона'.
    options:
    - Вона
    - Він
    - Вони
    - Ви
    sentence: '{{Maria}} is a teacher.'
  - answer: Вони
    explanation: Multiple people (plural) become 'Вони' (They).
    options:
    - Вони
    - Ми
    - Ви
    - Він
    sentence: '{{Ivan and Maria}} are here.'
  - answer: Ми
    explanation: '''You and I'' is ''We'', which is ''Ми''.'
    options:
    - Ми
    - Вони
    - Ви
    - Я
    sentence: '{{You and I}} are friends.'
  - answer: Воно
    explanation: Window (вікно) is neuter, so we use 'Воно'.
    options:
    - Воно
    - Він
    - Вона
    - Це
    sentence: '{{The window}} is here.'
  - answer: Вона
    explanation: Lamp (лампа) is feminine, so we use 'Вона'.
    options:
    - Вона
    - Він
    - Воно
    - Це
    sentence: '{{The lamp}} is new.'
  - answer: Вона
    explanation: Teacher (female) is 'вчителька', which is feminine.
    options:
    - Вона
    - Він
    - Вони
    - Це
    sentence: '{{The teacher (female)}} is there.'
  - answer: Воно
    explanation: City (місто) is neuter.
    options:
    - Воно
    - Він
    - Вона
    - Ми
    sentence: '{{The city}} is beautiful.'
  title: 'Transformation: Noun to Pronoun'
  type: fill-in
- instruction: Decide if the statement about social etiquette is True or False.
  items:
  - correct: true
    explanation: Police officers are figures of authority and strangers, so 'Ви' is
      required.
    statement: You should always use 'Ви' with a police officer.
  - correct: false
    explanation: Using 'Ти' with a boss without permission is rude. Use 'Ви'.
    statement: You use 'Ти' with your boss to show you are friendly.
  - correct: true
    explanation: '''Ви'' is the ''Safety Net''. You can never be too polite.'
    statement: It is safe to use 'Ви' with a stranger on the street.
  - correct: true
    explanation: '''Ти'' is used for close relationships or when addressing those
      younger/lower in hierarchy (like children/pets).'
    statement: You use 'Ти' with children and pets.
  - correct: true
    explanation: This transition marks a shift from formal to close/private relationship.
    statement: If you switch from 'Ви' to 'Ти', it usually means you are becoming
      closer friends.
  - correct: false
    explanation: While youth are more informal, they still use 'Ви' with service staff
      or elders.
    statement: Young people never use 'Ви'.
  - correct: false
    explanation: In a professional setting, you should start with 'Ви'.
    statement: In a business meeting, you should always start with 'Ти'.
  - correct: true
    explanation: Using 'Ви' is a sign of respect and politeness.
    statement: Using 'Ви' shows respect.
  title: 'Culture Check: Ти vs Ви'
  type: true-false
