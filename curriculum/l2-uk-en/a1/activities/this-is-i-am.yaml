- instruction: Select the correct translation for the English phrase.
  items:
  - explanation: Use the particle 'не' before the predicate.
    options:
    - correct: true
      text: Він — не вчитель.
    - correct: false
      text: Він ні вчитель.
    - correct: false
      text: Він немає вчитель.
    - correct: false
      text: Він — вчитель ні.
    question: How do you say 'He is not a teacher'?
  - explanation: She = Вона, Here = тут. Zero copula means no verb needed.
    options:
    - correct: true
      text: Вона тут.
    - correct: false
      text: Вона є тут.
    - correct: false
      text: Вона це тут.
    - correct: false
      text: Тут вона.
    question: Translate 'She is here'.
  - explanation: We = Ми, Friends = друзі.
    options:
    - correct: true
      text: Ми — друзі.
    - correct: false
      text: Ми є друзі.
    - correct: false
      text: Ви — друзі.
    - correct: false
      text: Вони — друзі.
    question: Translate 'We are friends'.
  - explanation: This is = Це, Mom = мама.
    options:
    - correct: true
      text: Це мама.
    - correct: false
      text: Вона мама.
    - correct: false
      text: Це є мама.
    - correct: false
      text: Що мама.
    question: Translate 'This is mom'.
  - explanation: To a group, 'you' is 'Ви'.
    options:
    - correct: true
      text: Ви де?
    - correct: false
      text: Ти де?
    - correct: false
      text: Де він?
    - correct: false
      text: Де ми?
    question: Translate 'Where are you?' (to a group).
  - explanation: Window is neuter, so 'It' = 'Воно'.
    options:
    - correct: true
      text: Воно тут.
    - correct: false
      text: Він тут.
    - correct: false
      text: Вона тут.
    - correct: false
      text: Це тут.
    question: Translate 'It is here' (referring to a window/вікно).
  - explanation: He = Він, Student = студент.
    options:
    - correct: true
      text: Він — студент.
    - correct: false
      text: Вона — студент.
    - correct: false
      text: Я — студент.
    - correct: false
      text: Ти — студент.
    question: Translate 'He is a student'.
  - explanation: No = Ні, not = не.
    options:
    - correct: true
      text: Ні, вона не тут.
    - correct: false
      text: Так, вона тут.
    - correct: false
      text: Ні, вона тут.
    - correct: false
      text: Вона не тут.
    question: Translate 'No, she is not here'.
  title: Translation Challenge
  type: quiz
