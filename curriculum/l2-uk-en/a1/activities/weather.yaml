version: '1.0'
module: weather
level: a1
inline:
- id: fill-in-weather-dialogue
  type: fill-in
  instruction: Доповніть діалог про погоду (Complete the dialogue about the weather)
  items:
  - sentence: — Яка сьогодні _____? — Сьогодні тепло.
    answer: погода
    options:
    - погода
    - сонце
    - дощ
  - sentence: — Завтра _____ сонячно. — Добре, гуляємо!
    answer: буде
    options:
    - буде
    - є
    - був
  - sentence: — Яка пора року тобі _____? — Літо.
    answer: подобається
    options:
    - подобається
    - любить
    - робить
  - sentence: — Чому ти любиш літо? — Тому що влітку _____.
    answer: сонячно
    options:
    - сонячно
    - холодно
    - хмарно
  - sentence: — _____ сьогодні йде дощ? — Так, і дуже холодно.
    answer: Чи
    options:
    - Чи
    - Що
    - Яка
  - sentence: — Тобі подобається осінь? — Так, восени _____.
    answer: красиво
    options:
    - красиво
    - спекотно
    - сніг
- id: match-up-weather-season
  type: match-up
  instruction: З'єднайте фразу про погоду з логічним контекстом або сезоном (Match
    the weather phrase to its logical context or season)
  pairs:
  - left: іде дощ
    right: холодно і мокро
  - left: іде сніг
    right: зима
  - left: світить сонце
    right: сонячно
  - left: дме вітер
    right: прохолодно
  - left: мінус десять
    right: холодно
  - left: плюс тридцять
    right: спекотно
  - left: плюс двадцять
    right: тепло
  - left: хмарно
    right: сонце не світить
- id: fill-in-season-weather
  type: fill-in
  instruction: Оберіть логічну погоду для сезону (Choose the logical weather for the
    season)
  items:
  - sentence: Взимку часто _____.
    answer: іде сніг
    options:
    - іде сніг
    - іде дощ
    - світить сонце
  - sentence: Влітку дуже _____.
    answer: спекотно
    options:
    - спекотно
    - холодно
    - хмарно
  - sentence: Восени часто _____.
    answer: іде дощ
    options:
    - іде дощ
    - іде сніг
    - сонячно
  - sentence: Навесні _____ і красиво.
    answer: тепло
    options:
    - тепло
    - холодно
    - спекотно
  - sentence: Сьогодні мінус п'ять, дуже _____.
    answer: холодно
    options:
    - холодно
    - тепло
    - спекотно
  - sentence: Сьогодні плюс двадцять п'ять, _____.
    answer: тепло
    options:
    - тепло
    - прохолодно
    - холодно
workbook:
- type: true-false
  id: true-false-weather-facts
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Взимку спекотно і світить сонце.
    correct: false
    explanation: Взимку холодно і йде сніг.
  - statement: Коли плюс тридцять градусів, дуже спекотно.
    correct: true
    explanation: Плюс тридцять — це літо, дуже спекотно.
  - statement: Восени часто йде дощ і прохолодно.
    correct: true
    explanation: Осінь — прохолодна пора року, часто буває дощ.
  - statement: Слово 'погода' — це чоловічий рід.
    correct: false
    explanation: Погода — жіночий рід (вона).
  - statement: Ми кажемо 'іде дощ', коли бачимо дощ.
    correct: true
    explanation: В українській мові ми використовуємо дієслово 'іти' для дощу та снігу.
  - statement: Мінус десять градусів — це тепло.
    correct: false
    explanation: Мінус десять — це дуже холодно, типова зима.
- type: unjumble
  id: unjumble-weather-sentences
  instruction: Складіть правильне речення зі слів (Put the words in the correct order)
  items:
  - words:
    - Сьогодні
    - іде
    - холодно
    - дощ.
    - і
    correct_order:
    - Сьогодні
    - холодно
    - і
    - іде
    - дощ.
  - words:
    - погода?
    - Яка
    - сьогодні
    correct_order:
    - Яка
    - сьогодні
    - погода?
  - words:
    - тепло
    - сонячно.
    - Завтра
    - і
    - буде
    correct_order:
    - Завтра
    - буде
    - тепло
    - і
    - сонячно.
  - words:
    - року
    - пора
    - подобається?
    - Яка
    - тобі
    correct_order:
    - Яка
    - пора
    - року
    - тобі
    - подобається?
  - words:
    - Тому
    - тепло.
    - влітку
    - що
    correct_order:
    - Тому
    - що
    - влітку
    - тепло.
  - words:
    - мінус
    - Зараз
    - градусів.
    - п'ять
    correct_order:
    - Зараз
    - мінус
    - п'ять
    - градусів.
- type: error-correction
  id: error-correction-weather
  instruction: Знайдіть і виправте помилку (Find and fix the mistake)
  items:
  - sentence: Це є тепло.
    error: Це є
    correction: Сьогодні
    error_type: construction
    options:
    - Сьогодні
    - Я
    - Ти
    explanation: In Ukrainian, we drop the subject and verb for weather. Just say
      'Сьогодні тепло' or 'Тепло'.
  - sentence: Воно є сонячно.
    error: Воно є
    correction: Сьогодні
    error_type: construction
    options:
    - Сьогодні
    - Ми
    - Ви
    explanation: Never use 'воно є' for weather. Use the bare adverb.
  - sentence: Вчора був холодно.
    error: був
    correction: було
    error_type: word
    options:
    - було
    - була
    - були
    explanation: For weather adverbs in the past tense, use the neuter verb 'було'.
  - sentence: Завтра є тепло і сонячно.
    error: є
    correction: буде
    error_type: word
    options:
    - буде
    - був
    - було
    explanation: Use 'буде' for the future tense.
  - sentence: Сьогодні йде вітер.
    error: йде
    correction: дме
    error_type: word
    options:
    - дме
    - робить
    - грає
    explanation: We say 'іде дощ' or 'іде сніг', but for wind we say 'дме вітер' (the
      wind is blowing).
  - sentence: На вулиці холодно, потрібен сонце.
    error: потрібен
    correction: потрібне
    error_type: word
    options:
    - потрібне
    - потрібна
    - потрібні
    explanation: Сонце is neuter (воно), so we use the neuter adjective 'потрібне'.
- type: group-sort
  id: group-sort-weather-adjectives
  instruction: Розподіліть слова за категоріями (Sort words by category)
  groups:
  - label: Погода (Weather states)
    items:
    - спекотно
    - холодно
    - тепло
    - прохолодно
    - сонячно
    - хмарно
  - label: Сезони (Seasons)
    items:
    - взимку
    - влітку
    - восени
    - навесні
  - label: Час (Time)
    items:
    - сьогодні
    - завтра
    - вчора
    - зараз
