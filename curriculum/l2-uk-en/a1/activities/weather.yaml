workbook:
- type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Взимку холодно і йде сніг.
    correct: true
    explanation: Yes — взимку холодно. Іде сніг. Все біле.
  - statement: Навесні холодно і йде сніг.
    correct: false
    explanation: No — навесні тепло і іде дощ. Все зелене.
  - statement: Влітку спекотно і світить сонце.
    correct: true
    explanation: Yes — влітку спекотно. Світить сонце. Все квітне.
  - statement: Восени тепло і сонячно.
    correct: false
    explanation: No — восени прохолодно. Дме вітер. Листя жовте.
  - statement: Плюс тридцять — це дуже спекотно.
    correct: true
    explanation: Yes — плюс тридцять = спекотно. It's the hottest temperature adverb.
  - statement: Мінус десять — це тепло.
    correct: false
    explanation: No — мінус десять = дуже холодно. Negative temperatures are always
      cold.
