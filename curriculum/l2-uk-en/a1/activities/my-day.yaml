version: '1.0'
module: my-day
level: a1
inline:
- id: match-activity-time
  type: match-up
  instruction: З'єднайте дію та час дня (Match the action to the time of day)
  pairs:
  - left: я прокидаюся
    right: вранці
  - left: я снідаю
    right: вранці
  - left: я працюю
    right: вдень
  - left: я обідаю
    right: вдень
  - left: я вечеряю
    right: ввечері
  - left: я дивлюся фільм
    right: ввечері
  - left: я лягаю спати
    right: вночі
  - left: я сплю
    right: вночі
- id: fill-in-sequence
  type: fill-in
  instruction: Вставте правильне слово (Insert the correct word)
  items:
  - sentence: _____ я прокидаюся і вмиваюся.
    answer: Спочатку
    options:
    - Спочатку
    - Потім
    - Нарешті
  - sentence: Після того я _____.
    answer: снідаю
    options:
    - снідаю
    - вечеряю
    - лягаю спати
  - sentence: Вдень я _____ в офісі.
    answer: працюю
    options:
    - працюю
    - прокидаюся
    - снідаю
  - sentence: О першій годині я _____.
    answer: обідаю
    options:
    - обідаю
    - вечеряю
    - прокидаюся
  - sentence: _____ я читаю книгу або дивлюся фільм.
    answer: Потім
    options:
    - Потім
    - Спочатку
    - Вранці
  - sentence: _____ я лягаю спати о дванадцятій.
    answer: Нарешті
    options:
    - Нарешті
    - Спочатку
    - Вдень
- id: fill-in-parts-of-day
  type: fill-in
  instruction: Оберіть правильну частину дня (Choose the correct part of the day)
  items:
  - sentence: Я п'ю каву _____.
    answer: вранці
    options:
    - вранці
    - вночі
    - ввечері
  - sentence: Ми вечеряємо _____.
    answer: ввечері
    options:
    - ввечері
    - вранці
    - вдень
  - sentence: Вона працює з дев'ятої до п'ятої _____.
    answer: вдень
    options:
    - вдень
    - вночі
    - вранці
  - sentence: Вони гуляють у парку _____.
    answer: після обіду
    options:
    - після обіду
    - вночі
    - вранці
  - sentence: Я сплю _____.
    answer: вночі
    options:
    - вночі
    - вдень
    - вранці
  - sentence: Я обідаю о першій годині _____.
    answer: вдень
    options:
    - вдень
    - ввечері
    - вночі
workbook:
- id: true-false-reading
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Андрій працює вранці.
    correct: true
    explanation: 'У діалозі Андрій каже: «Вранці я працював».'
  - statement: Андрій обідає о дев'ятій.
    correct: false
    explanation: Андрій обідає о першій годині, а не о дев'ятій.
  - statement: Тарас буде вивчати українську мову після обіду.
    correct: true
    explanation: 'Він каже: «Буду вивчати українську» після обіду.'
  - statement: Спочатку я обідаю, а потім снідаю.
    correct: false
    explanation: Логічно спочатку снідати вранці, а потім обідати вдень.
  - statement: Ввечері я дивлюся фільм.
    correct: true
    explanation: Перегляд фільму — це типова дія для вечора.
  - statement: Я лягаю спати вранці.
    correct: false
    explanation: Зазвичай люди лягають спати вночі або пізно ввечері.
- id: unjumble-sentences
  type: unjumble
  instruction: Складіть правильне речення зі слів (Put the words in the correct order)
  items:
  - words:
    - о
    - прокидаюся
    - Я
    - сьомій.
    correct_order:
    - Я
    - прокидаюся
    - о
    - сьомій.
  - words:
    - Спочатку
    - одягаюся.
    - вмиваюся
    - я
    - і
    correct_order:
    - Спочатку
    - я
    - вмиваюся
    - і
    - одягаюся.
  - words:
    - я
    - Після
    - працюю.
    - обіду
    correct_order:
    - Після
    - обіду
    - я
    - працюю.
  - words:
    - я
    - вечерю.
    - Ввечері
    - готую
    correct_order:
    - Ввечері
    - я
    - готую
    - вечерю.
  - words:
    - о
    - одинадцятій.
    - лягаю
    - спати
    - Я
    correct_order:
    - Я
    - лягаю
    - спати
    - о
    - одинадцятій.
  - words:
    - у
    - гуляють
    - Вони
    - парку.
    correct_order:
    - Вони
    - гуляють
    - у
    - парку.
- id: order-timeline
  type: order
  instruction: Розставте речення в правильному порядку (Put the sentences in the correct
    order from morning to night)
  items:
  - Спочатку я прокидаюся і вмиваюся.
  - Потім я снідаю.
  - Вдень я працюю і обідаю.
  - Після обіду я також працюю.
  - Ввечері я відпочиваю і читаю книгу.
  - Нарешті я лягаю спати.
  correct_order:
  - 0
  - 1
  - 2
  - 3
  - 4
  - 5
- id: quiz-general
  type: quiz
  instruction: Оберіть правильний варіант (Choose the correct option)
  items:
  - question: Що ви робите вранці?
    options:
    - Я прокидаюся.
    - Я вечеряю.
    - Я лягаю спати.
    - Я сплю.
    correct: 0
  - question: Коли ви обідаєте?
    options:
    - Вдень
    - Вранці
    - Вночі
    - Перед сніданком
    correct: 0
  - question: Яке слово означає 'first'?
    options:
    - Спочатку
    - Потім
    - Також
    - Нарешті
    correct: 0
  - question: Яке слово означає 'finally'?
    options:
    - Нарешті
    - Потім
    - Після того
    - Спочатку
    correct: 0
  - question: Що ви робите вночі?
    options:
    - Я сплю.
    - Я снідаю.
    - Я працюю в офісі.
    - Я гуляю в парку.
    correct: 0
  - question: Як сказати 'I will work' українською?
    options:
    - Буду працювати
    - Буду відпочивати
    - Я працював
    - Я працюю
    correct: 0
  - question: Яке слово означає 'typical'?
    options:
    - Типовий
    - Вільний
    - Також
    - Після
    correct: 0
  - question: Яке слово означає 'free'?
    options:
    - Вільний
    - Типовий
    - Також
    - Після
    correct: 0
- id: error-correction-common
  type: error-correction
  instruction: Виправте помилку (Correct the error)
  items:
  - sentence: Вранці я вечеряю.
    error: вечеряю
    correction: снідаю
    error_type: word
    options:
    - снідаю
    - обідаю
    - сплю
    explanation: Вранці ви їсте сніданок (снідаєте), а вечеряєте ввечері.
  - sentence: Я маю сніданок о восьмій.
    error: маю сніданок
    correction: снідаю
    error_type: phrase
    options:
    - снідаю
    - роблю сніданок
    - сніданок є
    explanation: В українській мові ми не кажемо 'have breakfast', ми використовуємо
      дієслово 'снідати'.
  - sentence: В вранці я п'ю каву.
    error: В вранці
    correction: Вранці
    error_type: word
    options:
    - Вранці
    - У вранці
    - Вранку
    explanation: Слово 'вранці' вже включає прийменник, тому не потрібно додавати
      ще один 'в'.
  - sentence: Я спати о одинадцятій.
    error: спати
    correction: лягаю спати
    error_type: phrase
    options:
    - лягаю спати
    - роблю спати
    - буду спати
    explanation: Коли день закінчується, ми використовуємо фразу 'лягати спати' (to
      go to bed).
  - sentence: Спочатку я вмиваю, а потім одягаю.
    error: вмиваю
    correction: вмиваюся
    error_type: word
    options:
    - вмиваюся
    - вмиває
    - вмиваємо
    explanation: 'Для дій, які ви робите на собі, використовуйте зворотні дієслова
      з часткою ''-ся'': вмиваюся, одягаюся.'
  - sentence: Після обід я відпочиваю.
    error: обід
    correction: обіду
    error_type: word
    options:
    - обіду
    - обідаю
    - обідати
    explanation: Фраза 'after lunch' перекладається як 'після обіду'.
