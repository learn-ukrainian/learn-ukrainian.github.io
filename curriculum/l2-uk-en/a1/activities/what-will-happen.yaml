version: '1.0'
module: what-will-happen
level: a1
inline:
- id: match-pronoun-to-buty
  type: match-up
  instruction: З'єднайте займенник із правильною формою дієслова «бути» (Match the
    pronoun with the correct form of 'бути')
  pairs:
  - left: я
    right: буду
  - left: ти
    right: будеш
  - left: він / вона
    right: буде
  - left: ми
    right: будемо
  - left: ви
    right: будете
  - left: вони
    right: будуть
- id: fill-in-analytic-future
  type: fill-in
  instruction: Вставте правильну форму дієслова «бути» (Fill in the correct form of
    'бути')
  items:
  - sentence: Завтра я ____ працювати.
    answer: буду
    options:
    - буду
    - буде
    - будемо
  - sentence: Що ти ____ робити ввечері?
    answer: будеш
    options:
    - будеш
    - буду
    - будете
  - sentence: Вона ____ читати книжку.
    answer: буде
    options:
    - буде
    - будуть
    - будемо
  - sentence: Ми ____ дивитися футбол.
    answer: будемо
    options:
    - будемо
    - буде
    - буду
  - sentence: Ви ____ гуляти в парку?
    answer: будете
    options:
    - будете
    - будеш
    - будуть
  - sentence: Вони ____ відпочивати.
    answer: будуть
    options:
    - будуть
    - будемо
    - буде
- id: fill-in-tense-distinction
  type: fill-in
  instruction: Оберіть правильний час дієслова (Choose the correct verb tense)
  items:
  - sentence: Зараз я ____.
    answer: читаю
    options:
    - читаю
    - читав
    - буду читати
  - sentence: Учора він ____ у парку.
    answer: гуляв
    options:
    - гуляв
    - гуляє
    - буде гуляти
  - sentence: Завтра ми ____ фільм.
    answer: будемо дивитися
    options:
    - будемо дивитися
    - дивилися
    - дивимося
  - sentence: Минулого тижня вона ____.
    answer: працювала
    options:
    - працювала
    - працює
    - буде працювати
  - sentence: Сьогодні я ____ вечерю.
    answer: готую
    options:
    - готую
    - готував
    - буду готувати
  - sentence: У суботу вони ____.
    answer: будуть відпочивати
    options:
    - будуть відпочивати
    - відпочивали
    - відпочивають
- id: vocab-future-verbs
  type: match-up
  instruction: З'єднайте українські слова з їхнім значенням (Match the Ukrainian words
    with their meaning)
  pairs:
  - left: працювати
    right: to work
