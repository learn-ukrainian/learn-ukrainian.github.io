- id: match-up-time
  type: match-up
  instruction: З'єднайте українські фрази з англійським перекладом (Match Ukrainian
    phrases with English translation)
  pairs:
  - left: завтра
    right: tomorrow
  - left: наступного тижня
    right: next week
  - left: ввечері
    right: in the evening
  - left: у суботу
    right: on Saturday
  - left: у неділю
    right: on Sunday
  - left: на вихідних
    right: on the weekend
- id: true-false-future-grammar
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: «Я будеш працювати» — це правильне речення.
    correct: false
    explanation: 'Правильно: «Я буду працювати». Форма «будеш» використовується з
      «ти».'
  - statement: У складеному майбутньому часі основне дієслово не змінюється (завжди
      інфінітив).
    correct: true
    explanation: Так, основне дієслово завжди має форму інфінітива (наприклад, читати,
      робити).
  - statement: «Ми будемо відпочивати» означає «We will rest».
    correct: true
    explanation: «Ми» = we, «будемо відпочивати» = will rest.
  - statement: Слово «завтра» вказує на минулий час.
    correct: false
    explanation: Слово «завтра» (tomorrow) вказує на майбутній час.
  - statement: «Вона буде готувати» — це майбутній час.
    correct: true
    explanation: «Буде готувати» — це форма майбутнього часу для «вона».
  - statement: Зі словом «вони» ми використовуємо форму «будете».
    correct: false
    explanation: Зі словом «вони» використовується форма «будуть». «Будете» — для
      «ви».
