version: '1.0'
module: what-will-happen
level: a1
inline:
- id: matching-pronoun-to-be
  type: match-up
  instruction: З'єднайте займенник із формою дієслова 'бути' (Match the pronoun with
    the form of the verb 'to be')
  pairs:
  - left: я
    right: буду
  - left: ти
    right: будеш
  - left: він / вона
    right: буде
  - left: ми
    right: будемо
  - left: ви
    right: будете
  - left: вони
    right: будуть
- id: fill-in-future-formation
  type: fill-in
  instruction: Вставте правильну форму 'бути' (Insert the correct form of 'to be')
  items:
  - sentence: Завтра я {буду} працювати.
    answer: буду
    options:
    - буду
    - буде
    - будемо
  - sentence: Що ти {будеш} робити ввечері?
    answer: будеш
    options:
    - будеш
    - буду
    - будете
  - sentence: Вона {буде} читати книжку.
    answer: буде
    options:
    - буде
    - будуть
    - будемо
  - sentence: Ми {будемо} дивитися футбол.
    answer: будемо
    options:
    - будемо
    - буде
    - буду
  - sentence: Ви {будете} гуляти в парку?
    answer: будете
    options:
    - будете
    - будеш
    - будуть
  - sentence: Вони {будуть} відпочивати.
    answer: будуть
    options:
    - будуть
    - будемо
    - буде
- id: fill-in-tense-distinction
  type: fill-in
  instruction: Оберіть правильний час (Choose the correct tense)
  items:
  - sentence: Зараз я {читаю}.
    answer: читаю
    options:
    - читаю
    - читав
    - буду читати
  - sentence: Учора він {гуляв} у парку.
    answer: гуляв
    options:
    - гуляв
    - гуляє
    - буде гуляти
  - sentence: Завтра ми {будемо дивитися} фільм.
    answer: будемо дивитися
    options:
    - будемо дивитися
    - дивилися
    - дивимося
  - sentence: Минулого тижня вона {працювала}.
    answer: працювала
    options:
    - працювала
    - працює
    - буде працювати
  - sentence: Наступного тижня вони {будуть відпочивати}.
    answer: будуть відпочивати
    options:
    - будуть відпочивати
    - відпочивали
    - відпочивають
  - sentence: Зараз я {готую} вечерю.
    answer: готую
    options:
    - готую
    - готував
    - буду готувати
workbook:
- id: group-sort-tenses
  type: group-sort
  instruction: Розподіліть слова за часом (Sort the words by tense)
  groups:
  - label: Минулий час (Past)
    items:
    - учора
    - минулого тижня
  - label: Теперішній час (Present)
    items:
    - зараз
  - label: Майбутній час (Future)
    items:
    - завтра
    - наступного тижня
    - скоро
- id: error-correction-future
  type: error-correction
  instruction: Знайдіть і виправте помилку (Find and fix the error)
  items:
  - sentence: Завтра я буду читаю.
    error: читаю
    correction: читати
    error_type: word
    options:
    - читати
    - читав
    - читає
    explanation: After 'буду', the main verb must be in the infinitive (читати).
  - sentence: Що ти буде робити?
    error: буде
    correction: будеш
    error_type: word
    options:
    - будеш
    - буду
    - будете
    explanation: The pronoun is 'ти', so the correct form of 'бути' is 'будеш'.
  - sentence: Ми будемо гуляли в парку.
    error: гуляли
    correction: гуляти
    error_type: word
    options:
    - гуляти
    - гуляємо
    - гуляю
    explanation: The future tense requires the infinitive 'гуляти', not the past tense
      form 'гуляли'.
  - sentence: Вона будуть працювати.
    error: будуть
    correction: буде
    error_type: word
    options:
    - буде
    - будемо
    - буду
    explanation: For 'вона' (she), use 'буде'.
  - sentence: Ви буде відпочивати?
    error: буде
    correction: будете
    error_type: word
    options:
    - будете
    - будеш
    - будуть
    explanation: For 'ви' (you formal/plural), use 'будете'.
  - sentence: Вранці я буду снідаю.
    error: снідаю
    correction: снідати
    error_type: word
    options:
    - снідати
    - снідав
    - снідаємо
    explanation: Always use the infinitive after 'буду'.
- id: order-dialogue
  type: order
  instruction: Розставте репліки діалогу в правильному порядку (Put the dialogue lines
    in the correct order)
  items:
  - — Що ти будеш робити завтра?
  - — Завтра я буду працювати. А ти?
  - — Я буду відпочивати і дивитися фільм.
  - — Звучить добре! А ввечері ми будемо гуляти?
  - — Так, ми будемо гуляти в парку.
  correct_order:
  - 0
  - 1
  - 2
  - 3
  - 4
- id: unjumble-plans
  type: unjumble
  instruction: Складіть правильне речення зі слів (Make a correct sentence from the
    words)
  items:
  - words:
    - робити
    - будеш
    - ти
    - Що
    - завтра?
    correct_order:
    - Що
    - ти
    - будеш
    - робити
    - завтра?
  - words:
    - працювати.
    - я
    - буду
    - Завтра
    correct_order:
    - Завтра
    - я
    - буду
    - працювати.
  - words:
    - вони
    - вечерю.
    - будуть
    - готувати
    - Ввечері
    correct_order:
    - Ввечері
    - вони
    - будуть
    - готувати
    - вечерю.
  - words:
    - гуляти.
    - ми
    - будемо
    - У
    - неділю
    correct_order:
    - У
    - неділю
    - ми
    - будемо
    - гуляти.
  - words:
    - дивитися
    - Я
    - футбол.
    - буду
    correct_order:
    - Я
    - буду
    - дивитися
    - футбол.
  - words:
    - буде
    - робити
    - Олена?
    - що
    - А
    correct_order:
    - А
    - що
    - буде
    - робити
    - Олена?
- id: quiz-dialogue-comprehension
  type: quiz
  instruction: Оберіть правильний варіант за діалогами (Choose the correct option
    based on the dialogues)
  items:
  - question: 'Максим питає Олега: Що _____ робити завтра?'
    options:
    - ти будеш
    - ви будете
    - він буде
    - вони будуть
    correct: 0
  - question: 'Максим питає Олега та Олену: А _____ гуляти?'
    options:
    - ви будете
    - ти будеш
    - ми будемо
    - вони будуть
    correct: 0
  - question: 'Ігор говорить про себе: У неділю я _____ готувати.'
    options:
    - буду
    - буде
    - будеш
    - будемо
    correct: 0
  - question: 'Ігор говорить про чоловіка: Чоловік _____ гуляти з дітьми.'
    options:
    - буде
    - буду
    - будуть
    - будемо
    correct: 0
  - question: 'Анна каже про себе: Я _____ дивитися футбол.'
    options:
    - буду
    - буде
    - будуть
    - будеш
    correct: 0
  - question: 'Ворожка каже клієнту: Ти _____ багато подорожувати.'
    options:
    - будеш
    - будете
    - буде
    - буду
    correct: 0
- id: true-false-grammar
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: 'У майбутньому часі дієслово не змінюється (наприклад: ''читати'',
      ''гуляти'').'
    correct: true
    explanation: The main verb is always in the infinitive.
  - statement: 'Ми кажемо: ''Я буде працювати''.'
    correct: false
    explanation: Для 'я' ми кажемо 'я буду'.
  - statement: Слово 'завтра' часто використовується з майбутнім часом.
    correct: true
    explanation: '''Завтра'' means ''tomorrow'', indicating the future tense.'
  - statement: Форма 'будемо' використовується для займенника 'вони'.
    correct: false
    explanation: Форма 'будемо' — для 'ми'. Для 'вони' — 'будуть'.
  - statement: '''Що ти будеш робити?'' — це запитання про майбутнє.'
    correct: true
    explanation: This is the standard way to ask 'What will you do?'
  - statement: Для 'він' і 'вона' форма 'бути' різна.
    correct: false
    explanation: Для 'він', 'вона', і 'воно' форма однакова — 'буде'.
