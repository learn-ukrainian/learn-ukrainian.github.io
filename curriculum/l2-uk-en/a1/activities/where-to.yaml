- type: group-sort
  instruction: 'Розподіліть фрази: Де? (місцевий відмінок) чи Куди? (знахідний відмінок)
    — Sort phrases: locative or accusative?'
  groups:
  - label: Де? — locative (already there)
    items:
    - у школі
    - в банку
    - у ресторані
    - на роботі
    - у бібліотеці
    - у магазині
    - в аптеці
    - у парку
    - на пошті
    - у місті
  - label: Куди? — accusative (going there)
    items:
    - у школу
    - в банк
    - у ресторан
    - на роботу
    - у бібліотеку
    - у магазин
    - в аптеку
    - у парк
    - на пошту
    - у місто
- type: error-correction
  instruction: Знайдіть помилку і виправте (Find the error and correct it)
  items:
  - sentence: Я йду у школі.
    error: школі
    correction: школу
    error_type: word
    options:
    - школу
    - школа
    - школою
    explanation: 'Куди? needs accusative: школа → школу (feminine -а → -у)'
  - sentence: Він зараз у банк.
    error: банк
    correction: банку
    error_type: word
    options:
    - банку
    - банком
    - банків
    explanation: 'Де? needs locative: банк → банку (masculine noun)'
  - sentence: Вона їде у Одеса.
    error: Одеса
    correction: Одесу
    error_type: word
    options:
    - Одесу
    - Одесі
    - Одесою
    explanation: 'Куди? needs accusative: Одеса → Одесу (feminine -а → -у)'
  - sentence: Ми йдемо у бібліотеці.
    error: бібліотеці
    correction: бібліотеку
    error_type: word
    options:
    - бібліотеку
    - бібліотека
    - бібліотекою
    explanation: 'Куди? needs accusative: бібліотека → бібліотеку (feminine -а → -у)'
  - sentence: Вони зараз на роботу.
    error: роботу
    correction: роботі
    error_type: word
    options:
    - роботі
    - робота
    - роботою
    explanation: 'Де? (зараз = right now, static position) needs locative: робота
      → роботі'
  - sentence: Він іде у магазині.
    error: магазині
    correction: магазин
    error_type: word
    options:
    - магазин
    - магазином
    - магазина
    explanation: 'Куди? needs accusative: магазин → магазин (masculine inanimate —
      no change)'
- type: match-up
  instruction: З'єднайте форму Де? з формою Куди? для кожного місця (Match each locative
    form with its accusative pair)
  pairs:
  - left: у школі (Де?)
    right: у школу (Куди?)
  - left: в банку (Де?)
    right: в банк (Куди?)
  - left: у магазині (Де?)
    right: у магазин (Куди?)
  - left: на роботі (Де?)
    right: на роботу (Куди?)
  - left: у бібліотеці (Де?)
    right: у бібліотеку (Куди?)
  - left: в аптеці (Де?)
    right: в аптеку (Куди?)
  - left: у парку (Де?)
    right: у парк (Куди?)
  - left: на пошті (Де?)
    right: на пошту (Куди?)
