- id: quiz-de-vs-kudy
  type: quiz
  instruction: Де чи Куди? Оберіть правильне запитання (Where or Where To? Choose
    the correct question)
  items:
  - question: ____ ти йдеш? — Я йду в банк.
    options:
    - Де
    - Куди
    - Що
    - Хто
    correct: 1
  - question: ____ Оксана? — Вона в аптеці.
    options:
    - Де
    - Куди
    - Що
    - Коли
    correct: 0
  - question: ____ їде Степан? — Він їде у Львів.
    options:
    - Що
    - Коли
    - Де
    - Куди
    correct: 3
  - question: ____ ми? — Ми у парку.
    options:
    - Де
    - Куди
    - Як
    - Хто
    correct: 0
  - question: ____ ви йдете? — Ми йдемо у ресторан.
    options:
    - Де
    - Що
    - Куди
    - Як
    correct: 2
  - question: ____ Іван? — Іван вдома.
    options:
    - Куди
    - Де
    - Коли
    - Чому
    correct: 1
  - question: ____ вона йде? — Вона йде додому.
    options:
    - Де
    - Куди
    - Як
    - Що
    correct: 1
  - question: ____ вони? — Вони на роботі.
    options:
    - Чому
    - Куди
    - Коли
    - Де
    correct: 3
