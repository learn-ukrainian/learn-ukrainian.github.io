workbook:
- id: fill-in-extended
  type: fill-in
  instruction: Вставте правильну форму (Fill in the correct form)
  items:
  - sentence: Я йду в ____ (магазин).
    answer: магазин
  - sentence: Він іде у ____ (школа).
    answer: школу
  - sentence: Вона їде на ____ (робота).
    answer: роботу
  - sentence: Ми йдемо у ____ (ресторан).
    answer: ресторан
  - sentence: Оксана йде в ____ (бібліотека).
    answer: бібліотеку
  - sentence: Степан їде в ____ (Одеса).
    answer: Одесу
  - sentence: Вони йдуть на ____ (пошта).
    answer: пошту
- id: match-up-places
