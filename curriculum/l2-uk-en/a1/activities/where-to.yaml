  - question: Я на роботі.
    options:
    - Де?
    - Куди?
    correct: 0
  - question: Ми їдемо в Одесу.
    options:
    - Де?
    - Куди?
    correct: 1
  - question: Вони у парку.
    options:
    - Де?
    - Куди?
    correct: 0
  - question: Ти йдеш у магазин.
    options:
    - Де?
    - Куди?
    correct: 1
  - question: Він іде в аптеку.
    options:
    - Де?
    - Куди?
    correct: 1
  - question: Вона у бібліотеці.
    options:
    - Де?
