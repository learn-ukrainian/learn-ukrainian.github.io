  instruction: З'єднайте місце (Де?) і напрямок (Куди?)
  pairs:
  - left: у школі
    right: у школу
  - left: в аптеці
    right: в аптеку
  - left: на роботі
    right: на роботу
  - left: на пошті
    right: на пошту
  - left: у бібліотеці
    right: у бібліотеку
  - left: вдома
    right: додому
- id: true-false-concepts
  type: true-false
  instruction: Правда чи ні? (True or False?)
  items:
  - statement: «Я йду в магазин» answers the question «Куди?».
    correct: true
    explanation: Магазин is the destination, so it answers where to (Куди).
  - statement: «Ми у банку» means we are going to the bank.
    correct: false
    explanation: «Ми у банку» means we are located in the bank (Де?). To say we are
      going, use «Ми йдемо у банк».
  - statement: For inanimate masculine nouns like «банк» або «парк», the Accusative
      case form is the same as the Nominative.
    correct: true
    explanation: Inanimate masculine and neuter nouns do not change their endings
      in the Accusative case.
  - statement: «Я йду вдома» is the correct way to say «I am going home».
    correct: false
    explanation: «Вдома» means at home (static). To say going home (dynamic), use
      «додому».
  - statement: If a feminine noun ends in -а, it changes to -у in the Accusative case
      to show direction.
    correct: true
    explanation: 'Feminine nouns ending in -а change to -у, for example: школа → у
      школу.'
  - statement: «Вона їде на роботу» means she is currently at work.
    correct: false
    explanation: «Вона їде на роботу» means she is traveling to work. «Вона на роботі»
      means she is at work.
- id: error-correction-cases
  type: error-correction
  instruction: Виправте помилку (Fix the error)
  items:
  - sentence: Я йду в аптека.
    error: аптека
    correction: аптеку
    error_type: word
    options:
    - аптеку
    - аптеці
    - аптекою
    explanation: Аптека is a feminine destination, so it changes to аптеку (Accusative).
  - sentence: Він іде на роботі.
    error: роботі
    correction: роботу
    error_type: word
    options:
    - робота
    - роботу
    - роботою
    explanation: 'Робота is a destination here, so we use the Accusative: на роботу.'
  - sentence: Куди вони? Вони в ресторані.
    error: Куди
    correction: Де
    error_type: word
    options:
    - Що
    - Коли
    - Де
    explanation: «В ресторані» is a static location, so the question is Де? (Where?).
  - sentence: Я їду вдома.
    error: вдома
    correction: додому
    error_type: word
    options:
    - додому
    - дім
    - у дім
    explanation: With verbs of motion, we use the directional word додому (homeward).
  - sentence: Ми йдемо у парку.
    error: парку
    correction: парк
    error_type: word
    options:
    - парк
    - парком
    - на парк
    explanation: 'Парк is inanimate masculine, so it does not change ending in the
      Accusative: у парк.'
  - sentence: Оксана йде в школі.
    error: школі
    correction: школу
    error_type: word
    options:
    - школу
    - школа
    - школою
    explanation: Школа is a feminine destination, so it changes to школу.
