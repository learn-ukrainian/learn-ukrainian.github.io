version: '1.0'
module: where-to
level: a1
inline:
- id: fill-in
  type: fill-in
  instruction: Вставте іменник у правильній формі (Fill in the noun in the correct
    form — accusative after куди)
  items:
  - sentence: Я йду у ___ (school).
    answer: школу
    options:
    - школа
    - школу
    - школі
  - sentence: Він іде в ___ (bank).
    answer: банк
    options:
    - банку
    - банк
    - банком
  - sentence: Вона йде у ___ (library).
    answer: бібліотеку
    options:
    - бібліотека
    - бібліотеці
    - бібліотеку
  - sentence: Ми йдемо у ___ (store).
    answer: магазин
    options:
    - магазині
    - магазин
    - магазина
  - sentence: Ти йдеш на ___ (work).
    answer: роботу
    options:
    - робота
    - роботі
    - роботу
  - sentence: Він іде в ___ (pharmacy).
    answer: аптеку
    options:
    - аптека
    - аптеці
    - аптеку
  - sentence: Вона йде на ___ (post office).
    answer: пошту
    options:
    - пошта
    - пошті
    - пошту
- id: group-sort
  type: group-sort
  instruction: Розподіліть фрази за питаннями (Sort the phrases by question)
  groups:
  - label: Де? (locative — already there)
    items:
    - у школі
    - в банку
    - у магазині
    - на роботі
    - у бібліотеці
    - у парку
  - label: Куди? (accusative — going there)
    items:
    - у школу
    - в банк
    - у магазин
    - на роботу
    - у бібліотеку
    - у парк
- id: quiz-motion-verbs
  type: quiz
  instruction: 'Оберіть правильне дієслово: йти чи їхати? (Choose the correct verb:
    on foot or by transport?)'
  items:
  - question: Я ___ у магазин. (It's two blocks away — on foot.)
    options:
    - їду
    - йду
    - іде
    correct: 1
  - question: Ми ___ у Львів. (We're taking the train.)
    options:
    - йдемо
    - їдемо
    - ідемо
    correct: 1
  - question: Вона ___ в аптеку. (It's around the corner.)
    options:
    - їде
    - іде
    - їдеш
    correct: 1
  - question: Він ___ в Одесу. (He's taking a bus.)
    options:
    - іде
    - їдеш
    - їде
    correct: 2
  - question: Ти ___ у бібліотеку. (It's in the same building.)
    options:
    - їдеш
    - йдеш
    - їде
    correct: 1
  - question: Вони ___ на вокзал. (They're driving there by car.)
    options:
    - ідуть
    - йдуть
    - їдуть
    correct: 2
- id: quiz-de-kudy
  type: quiz
  instruction: Яке запитання підходить? (Which question fits — Де? or Куди?)
  items:
  - question: Він у банку.
    options:
    - Де?
    - Куди?
    correct: 0
  - question: Вона йде у школу.
    options:
    - Де?
    - Куди?
