version: '1.0'
module: where-to
level: a1
inline:
- id: fill-in-accusative
  type: fill-in
  instruction: Вставте правильну форму (Insert the correct form)
  items:
  - sentence: Я йду в ____.
    answer: школу
    options:
    - школа
    - школу
    - школі
  - sentence: Ми йдемо на ____.
    answer: роботу
    options:
    - робота
    - роботу
    - роботі
  - sentence: Вона йде в ____.
    answer: бібліотеку
    options:
    - бібліотека
    - бібліотеку
    - бібліотеці
  - sentence: Він іде в ____.
    answer: магазин
    options:
    - магазин
    - магазину
    - магазині
  - sentence: Вони йдуть у ____.
    answer: парк
    options:
    - парк
    - парку
    - парком
  - sentence: Ти йдеш у ____?
    answer: банк
    options:
    - банк
    - банку
    - банком
  - sentence: Олена їде в ____.
    answer: Одесу
    options:
    - Одеса
    - Одесу
    - Одесі
- id: quiz-de-or-kudy
  type: quiz
  instruction: 'Оберіть правильне запитання: Де? чи Куди? (Choose the correct question:
    Where? or Where to?)'
  items:
  - question: ____ ти йдеш? — У магазин.
    options:
    - Куди
    - Де
    - Як
    - Хто
    correct: 0
  - question: ____ працює лікар? — У лікарні.
    options:
    - Куди
    - Де
    - Коли
    - Чому
    correct: 1
  - question: ____ вона їде? — В Одесу.
    options:
    - Куди
    - Де
    - Що
    - Хто
    correct: 0
  - question: ____ Оксана? — На роботі.
    options:
    - Куди
    - Де
    - Який
    - Чий
    correct: 1
  - question: ____ ви йдете в суботу? — У парк.
    options:
    - Куди
    - Де
    - Як
    - Хто
    correct: 0
  - question: ____ твоя мама? — Вдома.
    options:
    - Куди
    - Де
    - Звідки
    - Коли
    correct: 1
  - question: ____ Степан? — У банку.
    options:
    - Куди
    - Де
    - Як
    - Чому
    correct: 1
- id: quiz-yty-or-ikhaty
  type: quiz
  instruction: 'Оберіть правильне дієслово: йти чи їхати? (Choose the correct verb:
    to go on foot or by transport?)'
  items:
  - question: Я ____ в магазин (on foot).
    options:
    - йду
    - їду
    - йде
    - їде
    correct: 0
  - question: Вона ____ у Львів (by transport).
    options:
    - йде
    - їде
    - йдуть
    - їдуть
    correct: 1
  - question: Ми ____ на роботу (by transport).
    options:
    - йдемо
    - їдемо
    - йду
    - їду
    correct: 1
  - question: Степан ____ в банк (on foot).
    options:
    - йде
    - їде
    - йдуть
    - їдуть
    correct: 0
  - question: Вони ____ в Одесу (by transport).
    options:
    - йдуть
    - їдуть
    - йдемо
    - їдемо
    correct: 1
  - question: Ти ____ додому (on foot)?
    options:
    - йдеш
    - їдеш
    - йде
    - їде
    correct: 0
workbook:
- id: workbook-fill-in
  type: fill-in
  instruction: Вставте правильне слово (Insert the correct word)
  items:
  - sentence: Я йду на ____.
    answer: роботу
    options:
    - роботу
    - роботі
    - робота
  - sentence: Він зараз на ____.
    answer: роботі
    options:
    - роботу
    - роботі
    - робота
  - sentence: Ми їдемо в ____.
    answer: Одесу
    options:
    - Одеса
    - Одесу
    - Одесі
  - sentence: Олена працює у ____.
    answer: банку
    options:
    - банк
    - банку
    - банком
  - sentence: Степан іде у ____.
    answer: школу
    options:
    - школа
    - школу
    - школі
  - sentence: Вони зараз у ____.
    answer: парку
    options:
    - парк
    - парку
    - парком
  - sentence: Я повертаюся ____.
    answer: додому
    options:
    - додому
    - вдома
    - дім
- id: workbook-match-up
  type: match-up
  instruction: З'єднайте запитання та відповідь (Match the question and answer)
  pairs:
  - left: Куди ти йдеш?
    right: Я йду в магазин.
  - left: Де ти?
    right: Я в магазині.
  - left: Куди вона їде?
    right: Вона їде в Одесу.
  - left: Де вона?
    right: Вона в Одесі.
  - left: Куди ви йдете?
    right: Ми йдемо на роботу.
  - left: Де ви працюєте?
    right: Ми працюємо на роботі.
- id: workbook-true-false
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Ми використовуємо запитання «Куди?», коли говоримо про напрямок руху
      (movement).
    correct: true
    explanation: «Куди?» означає напрямок руху (Where to).
  - statement: Фраза «Я йду в банк» — це відповідь на запитання «Де?».
    correct: false
    explanation: Це рух, тому це відповідь на запитання «Куди?».
  - statement: Слово «вдома» означає рух додому.
    correct: false
    explanation: «Вдома» означає статичну позицію (Де?). Для руху ми використовуємо
      «додому» (Куди?).
  - statement: Ми кажемо «на роботу», коли йдемо туди.
    correct: true
    explanation: Це Знахідний відмінок (Accusative) для напрямку.
  - statement: Слово «місто» змінюється на «місту» після запитання «Куди?».
    correct: false
    explanation: 'Слово «місто» середнього роду і не змінюється: «Я їду у місто».'
  - statement: Дієслово «їхати» означає рухатися транспортом.
    correct: true
    explanation: Так, для руху пішки ми використовуємо «йти».
- id: workbook-group-sort
  type: group-sort
  instruction: 'Знахідний відмінок: змінюється закінчення чи ні? (Accusative case:
    does the ending change?)'
  groups:
  - label: Закінчення змінюється (Ending changes)
    items:
    - у школу
    - на роботу
    - у бібліотеку
    - в Одесу
  - label: Закінчення не змінюється (No change)
    items:
    - у банк
    - у магазин
    - у парк
    - у місто
