- type: quiz
  title: "Могти or Вміти?"
  instruction: "Choose the correct verb based on the context (Possibility vs. Skill)."
  items:
    - question: "Я _____ плавати. (I know how to swim)"
      options:
        - text: "вмію"
          correct: true
        - text: "можу"
          correct: false
        - text: "хочу"
          correct: false
        - text: "мушу"
          correct: false
      explanation: "Use 'вмію' for skills you learned."
    - question: "Ти _____ відкрити вікно? (Can you open the window?)"
      options:
        - text: "можеш"
          correct: true
        - text: "вмієш"
          correct: false
        - text: "хочеш"
          correct: false
        - text: "знаєш"
          correct: false
      explanation: "Use 'можеш' for physical possibility or requests."
    - question: "Він _____ грати на гітарі. (He knows how to play guitar)"
      options:
        - text: "вміє"
          correct: true
        - text: "може"
          correct: false
        - text: "хоче"
          correct: false
        - text: "має"
          correct: false
    - question: "Ми _____ піти в кіно завтра. (We can go to the cinema tomorrow)"
      options:
        - text: "можемо"
          correct: true
        - text: "вміємо"
          correct: false
        - text: "хочемо"
          correct: false
        - text: "любимо"
          correct: false
    - question: "Ви _____ говорити українською? (Do you speak Ukrainian? - Skill)"
      options:
        - text: "вмієте"
          correct: true
        - text: "можете"
          correct: false
        - text: "хочете"
          correct: false
        - text: "знаєте"
          correct: false
    - question: "Вони _____ чекати тут. (They can wait here)"
      options:
        - text: "можуть"
          correct: true
        - text: "вміють"
          correct: false
        - text: "хочуть"
          correct: false
        - text: "люблять"
          correct: false
    - question: "Студент _____ читати. (The student can read - skill)"
      options:
        - text: "вміє"
          correct: true
        - text: "може"
          correct: false
        - text: "хоче"
          correct: false
        - text: "мусить"
          correct: false
    - question: "Я не _____ прийти сьогодні. (I cannot come today)"
      options:
        - text: "можу"
          correct: true
        - text: "вмію"
          correct: false
        - text: "хочу"
          correct: false
        - text: "знаю"
          correct: false

- type: fill-in
  title: "Conjugation Challenge"
  instruction: "Fill in the blank with the correct form of the verb."
  items:
    - sentence: "Я _____ (хотіти) кави."
      answer: "хочу"
      options:
        - "хочу"
        - "хочеш"
        - "хоче"
        - "хочемо"
    - sentence: "Ти _____ (могти) це зробити."
      answer: "можеш"
      options:
        - "можеш"
        - "можу"
        - "може"
        - "можуть"
    - sentence: "Ми _____ (повинен) працювати."
      answer: "повинні"
      options:
        - "повинні"
        - "повинен"
        - "повинна"
        - "повинно"
    - sentence: "Вона _____ (вміти) малювати."
      answer: "вміє"
      options:
        - "вміє"
        - "вмію"
        - "вміють"
        - "вмієш"
    - sentence: "Ви _____ (хотіти) їсти?"
      answer: "хочете"
      options:
        - "хочете"
        - "хочу"
        - "хоче"
        - "хочуть"
    - sentence: "Вони _____ (могти) прийти."
      answer: "можуть"
      options:
        - "можуть"
        - "можемо"
        - "можеш"
        - "можу"
    - sentence: "Він _____ (вміти) плавати."
      answer: "вміє"
      options:
        - "вміє"
        - "вмію"
        - "вмієш"
        - "вміють"
    - sentence: "Я _____ (мусити) йти."
      answer: "мушу"
      options:
        - "мушу"
        - "мусиш"
        - "мусить"
        - "мусимо"

- type: match-up
  title: "Signs and Meanings"
  instruction: "Match the sign/phrase to its meaning."
  pairs:
    - left: "⛔ Вхід заборонено"
      right: "You cannot enter"
    - left: "🅿️ Парковка дозволена"
      right: "You can park here"
    - left: "🚭 Курити заборонено"
      right: "No smoking"
    - left: "📸 Фотографувати заборонено"
      right: "No photos"
    - left: "Можна?"
      right: "May I?"
    - left: "Не можна"
      right: "It is forbidden"
    - left: "Тут можна"
      right: "It is allowed here"
    - left: "Вхід"
      right: "Entrance"

- type: true-false
  title: "Rules and Etiquette"
  instruction: "Decide if the statement is True or False based on the lesson."
  items:
    - statement: "You use 'вміти' to ask 'Can you open the door?'."
      correct: false
      explanation: "No, use 'могти' for requests. 'Вміти' is for learned skills."
    - statement: "'Мені треба' means 'I need'."
      correct: true
      explanation: "Yes, 'треба' expresses necessity."
    - statement: "To ask politely for something, say 'Можна...?'."
      correct: true
      explanation: "Yes, 'Можна...?' is a polite way to ask for permission."
    - statement: "'Варто' expresses a strong obligation like 'Must'."
      correct: false
      explanation: "No, 'варто' means 'it is worth' or 'should' (advice)."
    - statement: "'Я можу плавати' implies you know how to swim as a skill."
      correct: false
      explanation: "No, for skills use 'вміти'. 'Можу' means physical ability/permission."
    - statement: "'Не можна' means 'It is allowed'."
      correct: false
      explanation: "'Не можна' means 'It is forbidden'."
    - statement: "'Повинен' changes by gender and number."
      correct: true
      explanation: "Yes: повинен, повинна, повинно, повинні."
    - statement: "'Хто хоче — той може' means 'He who wants — can'."
      correct: true
      explanation: "It is a proverb about motivation."

- type: group-sort
  title: "Modality Types"
  instruction: "Sort the phrases into the correct category."
  groups:
    - name: "Бажання (Desire)"
      items:
        - "Я хочу кави"
        - "Ми хочемо спати"
        - "Він хоче грати"
        - "Ти хочеш чаю"
    - name: "Можливість (Possibility/Skill)"
      items:
        - "Я можу допомогти"
        - "Вона вміє співати"
        - "Тут можна сидіти"
        - "Ти можеш йти"
    - name: "Обов'язок (Obligation/Need)"
      items:
        - "Мені треба йти"
        - "Я повинен працювати"
        - "Нам потрібно вчитися"
        - "Вона повинна спати"

- type: unjumble
  title: "Sentence Builder"
  instruction: "Put the words in the correct order to form a sentence."
  items:
    - words:
        - "Я"
        - "хочу"
        - "спати"
      answer: "Я хочу спати"
    - words:
        - "Мені"
        - "потрібна"
        - "допомога"
      answer: "Мені потрібна допомога"
    - words:
        - "Ти"
        - "вмієш"
        - "плавати"
        - "?"
      answer: "Ти вмієш плавати?"
    - words:
        - "Тут"
        - "не"
        - "можна"
        - "курити"
      answer: "Тут не можна курити"
    - words:
        - "Ми"
        - "можемо"
        - "йти"
      answer: "Ми можемо йти"
    - words:
        - "Варто"
        - "спробувати"
        - "це"
      answer: "Варто спробувати це"

