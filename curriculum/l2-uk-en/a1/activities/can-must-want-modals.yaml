- type: quiz
  title: Modal Meanings
  items:
  - question: Which English phrase represents «Можна увійти?» accurately today?
    options:
    - text: May I enter?
      correct: true
    - text: Must I enter?
      correct: false
    - text: Can I swim?
      correct: false
    - text: Should I leave?
      correct: false
  - question: What is the English meaning of «Тут не можна палити»?
    options:
    - text: Smoking is forbidden here.
      correct: true
    - text: Smoking is allowed here.
      correct: false
    - text: You must smoke here.
      correct: false
    - text: You should smoke here.
      correct: false
  - question: How do you accurately say «Я мушу працювати» in English?
    options:
    - text: I must work.
      correct: true
    - text: I can work.
      correct: false
    - text: I want to work.
      correct: false
    - text: I know how to work.
      correct: false
  - question: What does the phrase «Варто подивитися цей фільм» mean?
    options:
    - text: This movie is worth watching.
      correct: true
    - text: You must watch this movie.
      correct: false
    - text: You can't watch this movie.
      correct: false
    - text: This movie is forbidden.
      correct: false
  - question: How do you accurately translate «Треба вчитися кожен день»?
