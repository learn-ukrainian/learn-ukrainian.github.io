- type: true-false
  title: Modal Understanding
  items:
  - statement: «Вміти» means "to know how to".
    correct: true
  - statement: «Могти» means "must".
    correct: false
    explanation: Incorrect! it means "can"
  - statement: «Можна» is used to ask permission.
    correct: true
  - statement: «Не можна» means "allowed".
    correct: false
    explanation: Incorrect! it means "forbidden/not allowed"
  - statement: «Треба» is an impersonal word for necessity.
    correct: true
  - statement: «Мусити» changes form for each person (I, you, he...).
    correct: true
  - statement: «Варто» means "worth" or "advisable".
    correct: true
  - statement: «Мусити» means "to want".
    correct: false
    explanation: Incorrect! it means "must"
  - statement: «Хотіти» means "to want".
    correct: true
  - statement: «Варто» means "forbidden".
    correct: false
    explanation: Incorrect! it means "worth/should"
  - statement: «Треба» never changes form.
    correct: true
  - statement: «Не можна» means "you can".
    correct: false
    explanation: Incorrect! it means "not allowed"
  instruction: Determine if the statement is true.
