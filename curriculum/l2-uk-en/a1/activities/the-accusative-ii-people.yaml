- type: quiz
  title: "Culture and Diminutives"
  instruction: "Choose the correct answer based on the cultural context section."
  items:
    - question: "What does the diminutive 'матуся' show?"
      explanation: "Diminutives like 'матуся' show warmth, closeness, and emotion, and are very common among adults."
      options:
        - text: "Warmth and closeness"
          correct: true
        - text: "Anger or frustration"
          correct: false
        - text: "Professional respect"
          correct: false
        - text: "Strict formality"
          correct: false
    - question: "What is the best word for a casual acquaintance?"
      explanation: "A 'знайомий' is an acquaintance. The word 'друг' implies a very deep, soulmate-like connection."
      options:
        - text: "знайомий"
          correct: true
        - text: "друг"
          correct: false
        - text: "брат"
          correct: false
        - text: "татусь"
          correct: false
    - question: "How do you correctly say 'I see a dad' in Ukrainian?"
      explanation: "Because 'тато' is an animate masculine noun, it changes to 'тата' in the accusative case."
      options:
        - text: "Я бачу тата."
          correct: true
        - text: "Я бачу тато."
          correct: false
        - text: "Я бачу тату."
          correct: false
        - text: "Я бачу таті."
          correct: false
    - question: "What happens to the word 'пес' (dog) as an object?"
      explanation: "It undergoes a stem change and takes the animate '-а' ending, becoming 'пса'."
      options:
        - text: "It changes to 'пса'."
          correct: true
        - text: "It stays 'пес'."
          correct: false
        - text: "It changes to 'песо'."
          correct: false
        - text: "It changes to 'псу'."
