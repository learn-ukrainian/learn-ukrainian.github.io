- type: true-false
  title: "True or False - Rules and Culture"
  instruction: "Read the statement and decide if it is true or false."
  items:
    - statement: "The word 'тато' takes the feminine ending '-у' in the accusative case because it ends in a vowel."
      correct: false
      explanation: "False. 'Тато' is a masculine animate noun, so it takes '-а' (тата)."
    - statement: "Animals follow the same accusative rules as inanimate objects ('Stone Words')."
      correct: false
      explanation: "False. Animals are considered living beings ('Heart Words') and take animate endings."
    - statement: "Feminine nouns keep their standard '-у' or '-ю' accusative endings, whether they are people or objects."
      correct: true
      explanation: "True. Feminine nouns ignore the 'accusative equals genitive' rule used for masculine nouns."
    - statement: "The word 'колега' changes its ending like a feminine word, even if it refers to a man."
      correct: true
      explanation: "True. Because its dictionary form ends in '-а', it follows the feminine ending pattern (колегу)."
    - statement: "In Ukrainian culture, a 'знайомий' (acquaintance) is considered closer to you than a 'друг' (friend)."
      correct: false
      explanation: "False. A 'друг' is a very close friend or soulmate, while a 'знайомий' is just someone you casually know."
    - statement: "The word 'вчитель' (teacher) becomes 'вчителя' when it is the direct object."
      correct: true
      explanation: "True. It takes the '-я' ending because it is a masculine animate noun ending in a soft consonant."
    - statement: "In Ukrainian, a dog ('пес') is grammatically an inanimate object."
      correct: false
      explanation: "False. Animals are living beings, so 'пес' becomes 'пса'."
    - statement: "Diminutives like 'матуся' are only used by children."
      correct: false
      explanation: "False. Adults constantly use diminutives with family members to show warmth."

