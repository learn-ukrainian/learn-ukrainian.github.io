- type: quiz
  title: 'The "Heart Word" Rule'
  instruction: 'Test your understanding of animate vs inanimate rules.'
  items:
    - question: "Which question do we ask for 'Heart Words' (people and animals)?"
      explanation: "We use 'Хто?' (Who?) for living beings with a heart."
      options:
        - text: "Хто?"
          correct: true
        - text: "Що?"
          correct: false
        - text: "Як?"
          correct: false
        - text: "Де?"
          correct: false
    - question: "What is the Accusative ending for a masculine animate noun like 'брат'?"
      explanation: "Masculine 'Heart Words' add -а (or -я if soft)."
      options:
        - text: "-а or -я"
          correct: true
        - text: "it stays the same"
          correct: false
        - text: "-у or -ю"
          correct: false
        - text: "-о"
          correct: false
    - question: "Does the word 'стіл' (table) change in 'Я бачу стіл'?"
      explanation: "No, 'Stone Words' (masculine inanimate) do not change."
      options:
        - text: "No, it stays the same"
          correct: true
        - text: "Yes, it becomes 'стола'"
          correct: false
        - text: "Yes, it becomes 'столу'"
          correct: false
        - text: "Only if it is a small table"
          correct: false
    - question: "Which word is a 'Heart Word' grammatically?"
      explanation: "A cat (кіт) is a living creature, so it follows animate rules."
      options:
        - text: "кіт (cat)"
          correct: true
        - text: "дім (house)"
          correct: false
        - text: "книга (book)"
          correct: false
        - text: "стіл (table)"
          correct: false
    - question: "What is the Accusative form of 'мама'?"
      explanation: "Feminine nouns change -а to -у."
      options:
        - text: "маму"
          correct: true
        - text: "мама"
          correct: false
        - text: "мама"
          correct: false
        - text: "мамі"
          correct: false
    - question: "How do you say 'I am waiting for Andriy'?"
      explanation: "We use 'чекаю' + Accusative (Андрія) without 'for'."
      options:
        - text: "Я чекаю Андрія."
          correct: true
        - text: "Я чекаю для Андрія."
          correct: false
        - text: "Я чекаю Андрій."
          correct: false
        - text: "Я чекаю до Андрія."
          correct: false
    - question: "Why do we call them 'Heart Words' in this lesson?"
      explanation: "It is a metaphor for living things (animate nouns)."
      options:
        - text: "Because they have a heart (are alive)"
          correct: true
        - text: "Because we love them"
          correct: false
        - text: "Because the rule is hard"
          correct: false
        - text: "Because they look like hearts"
          correct: false
    - question: "Which role does 'тата' play in 'Я бачу тата'?"
      explanation: "'Тата' is the object (додаток) of the action."
      options:
        - text: "Додаток (Object)"
          correct: true
        - text: "Підмет (Subject)"
          correct: false
        - text: "Присудок (Predicate)"
          correct: false
        - text: "Дієслово (Verb)"
          correct: false

