- type: quiz
  title: "Grammar Check - Heart Words"
  instruction: "Choose the correct answer based on the grammar rules."
  items:
    - question: "What accusative ending do masculine animate nouns take?"
      explanation: "Masculine animate nouns take '-а' or '-я', which copies the genitive case."
      options:
        - text: "'-а' or '-я'"
          correct: true
        - text: "'-у' or '-ю'"
          correct: false
        - text: "It does not change"
          correct: false
        - text: "'-і' or '-и'"
          correct: false
    - question: "What accusative ending do feminine animate nouns take?"
      explanation: "Feminine nouns (animate or inanimate) take '-у' or '-ю'."
      options:
        - text: "'-у' or '-ю'"
          correct: true
        - text: "'-а' or '-я'"
          correct: false
        - text: "It does not change"
          correct: false
        - text: "'-і' or '-и'"
          correct: false
    - question: "How are animals treated in Ukrainian grammar?"
      explanation: "Animals are considered animate ('Heart Words') and follow the exact same rules as people."
      options:
        - text: "As animate beings"
          correct: true
        - text: "As inanimate objects"
          correct: false
        - text: "They never change"
          correct: false
        - text: "They have separate rules"
          correct: false
    - question: "What is the accusative form of 'тато'?"
      explanation: "Even though it ends in 'o', it is a masculine animate noun, so it drops 'o' and adds 'a' to become 'тата'."
      options:
        - text: "тата"
          correct: true
        - text: "тату"
          correct: false
        - text: "тато"
          correct: false
        - text: "тат"
          correct: false
    - question: "Why do masculine animate nouns change form?"
      explanation: "They change to show respect and distinguish living beings from inanimate objects."
      options:
        - text: "To distinguish living beings"
          correct: true
        - text: "Because they are feminine"
          correct: false
        - text: "To show plural form"
          correct: false
        - text: "To make sentences shorter"
          correct: false
    - question: "Which case does the masculine animate accusative copy?"
      explanation: "For masculine animate nouns, the Accusative case equals the Genitive case."
      options:
        - text: "The Genitive case"
          correct: true
        - text: "The Nominative case"
          correct: false
        - text: "The Dative case"
          correct: false
        - text: "The Locative case"
          correct: false
    - question: "What does the 'Heart Words' rule apply to?"
      explanation: "The 'Heart Words' rule applies specifically to living beings (people and animals)."
      options:
        - text: "People and animals"
          correct: true
        - text: "Only people"
          correct: false
        - text: "Inanimate objects"
          correct: false
        - text: "Only animals"
          correct: false
    - question: "Do inanimate masculine nouns change in the accusative?"
      explanation: "Inanimate masculine nouns ('Stone Words') do not change their form when they are the object."
      options:
        - text: "No, they do not change"
          correct: true
        - text: "Yes, they add '-а'"
          correct: false
        - text: "Yes, they add '-у'"
          correct: false
        - text: "Yes, they copy genitive"
          correct: false

