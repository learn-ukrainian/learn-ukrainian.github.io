- type: group-sort
  title: "Container vs. Surface Logic"
  instruction: "Sort the places into the correct preposition category based on static location rules."
  groups:
    - name: "Container / Building (в / у)"
      items:
        - "школа"
        - "магазин"
        - "кімната"
        - "банк"
        - "парк"
    - name: "Surface / Open Area / Activity (на)"
      items:
        - "стіл"
        - "робота"
        - "вокзал"
        - "вулиця"
        - "підлога"

- type: fill-in
  title: "Choose the Preposition"
  instruction: "Select the correct preposition for each location, paying attention to euphony (smooth sounds)."
  items:
    - sentence: "Я зараз ___ школі."
      answer: "у"
      options: ["в", "у", "на", "за"]
    - sentence: "Вона ___ магазині."
      answer: "в"
      options: ["в", "у", "на", "за"]
    - sentence: "Кіт спить ___ столі."
      answer: "на"
      options: ["в", "у", "на", "за"]
    - sentence: "Ми сьогодні ___ роботі."
      answer: "на"
      options: ["в", "у", "на", "за"]
    - sentence: "Він живе ___ Львові."
      answer: "у"
      options: ["в", "у", "на", "за"]
    - sentence: "Люди гуляють ___ вулиці."
      answer: "на"
      options: ["в", "у", "на", "за"]
    - sentence: "Він зараз ___ парку."
      answer: "у"
      options: ["в", "у", "на", "за"]
    - sentence: "Гроші лежать ___ банку."
      answer: "у"
      options: ["в", "у", "на", "за"]

- type: fill-in
  title: "Regular Locative Endings"
  instruction: "Change the noun in parentheses to the correct Locative case ending."
  items:
    - sentence: "Книжка лежить на ___ (стіл)."
      answer: "столі"
      options: ["стіл", "столу", "столі", "стола"]
    - sentence: "Вчитель працює у ___ (школа)."
      answer: "школі"
      options: ["школа", "школу", "школі", "школою"]
    - sentence: "Ми сидимо в ___ (кімната)."
      answer: "кімнаті"
      options: ["кімната", "кімнату", "кімнаті", "кімнатою"]
    - sentence: "Поїзд стоїть на ___ (вокзал)."
      answer: "вокзалі"
      options: ["вокзал", "вокзалу", "вокзалі", "вокзалом"]
    - sentence: "Він зараз у ___ (парк)."
      answer: "парку"
      options: ["парк", "парку", "паркі", "парком"]
    - sentence: "Вона працює в ___ (магазин)."
      answer: "магазині"
      options: ["магазин", "магазину", "магазині", "магазином"]
    - sentence: "Я живу в ___ (місто)."
      answer: "місті"
      options: ["місто", "місту", "місті", "містом"]
    - sentence: "Вони працюють у ___ (банк)."
      answer: "банку"
      options: ["банк", "банку", "банкі", "банком"]

- type: fill-in
  title: "Velar Mutations"
  instruction: "Select the correct mutated Locative form for these specific nouns."
  items:
    - sentence: "Монета лежить у ___ (рука)."
      answer: "руці"
      options: ["рука", "руку", "руці", "рукі"]
    - sentence: "Я стою на одній ___ (нога)."
      answer: "нозі"
      options: ["нога", "ногу", "нозі", "ногі"]
    - sentence: "Ключі лежать на ___ (підлога)."
      answer: "підлозі"
      options: ["підлога", "підлогу", "підлозі", "підлогі"]
    - sentence: "Він має сережку у ___ (вухо)."
      answer: "вусі"
      options: ["вухо", "вуху", "вусі", "вухі"]
    - sentence: "Телефон у моїй ___ (рука)."
      answer: "руці"
      options: ["рука", "руку", "руці", "рукі"]
    - sentence: "Кіт спить на ___ (підлога)."
      answer: "підлозі"
      options: ["підлога", "підлогу", "підлозі", "підлогі"]
    - sentence: "Браслет у ___ (вухо)."
      answer: "вусі"
      options: ["вухо", "вуху", "вусі", "вухі"]
    - sentence: "Птах сидить на ___ (нога)."
      answer: "нозі"
      options: ["нога", "ногу", "нозі", "ногі"]

- type: quiz
  title: "Grammar Rules Check"
  instruction: "Choose the correct answer based on the Locative rules."
  items:
    - question: "Which question word triggers the use of the Locative case for a static position?"
      options:
        - text: "Де?"
          correct: true
        - text: "Хто?"
          correct: false
        - text: "Що?"
          correct: false
        - text: "Коли?"
          correct: false
    - question: "Which preposition is used for enclosed spaces, containers, and buildings?"
      options:
        - text: "в / у"
          correct: true
        - text: "на"
          correct: false
        - text: "з"
          correct: false
        - text: "до"
          correct: false
    - question: "Which preposition is used for open spaces, flat surfaces, and activities like work?"
      options:
        - text: "на"
          correct: true
        - text: "в / у"
          correct: false
        - text: "про"
          correct: false
        - text: "біля"
          correct: false
    - question: "Why do we sometimes use 'у' instead of 'в' (for example, у Львові)?"
      options:
        - text: "To avoid harsh consonant clusters."
          correct: true
        - text: "Because the noun is feminine."
          correct: false
        - text: "Because it is an open surface."
          correct: false
        - text: "It is just a random exception."
          correct: false
    - question: "Which of these pairs shows a correct consonant mutation in the Locative case?"
      options:
        - text: "рука becomes у руці"
          correct: true
        - text: "нога becomes на ногі"
          correct: false
        - text: "вухо becomes у вухі"
          correct: false
        - text: "підлога becomes на підлогі"
          correct: false
    - question: "When talking about your workplace as an activity, which phrase is correct?"
      options:
        - text: "на роботі"
          correct: true
        - text: "у роботі"
          correct: false
        - text: "в роботі"
          correct: false
        - text: "робота"
          correct: false
    - question: "If you are walking TOWARD the park (directional motion), you use..."
      options:
        - text: "Accusative (Я йду в парк)"
          correct: true
        - text: "Locative (Я йду у парку)"
          correct: false
        - text: "Nominative (Я йду парк)"
          correct: false
        - text: "Locative (Я йду на парку)"
          correct: false
    - question: "If you are sitting inside the park (static location), you use..."
      options:
        - text: "Locative (Я у парку)"
          correct: true
        - text: "Accusative (Я у парк)"
          correct: false
        - text: "Nominative (Я парк)"
          correct: false
        - text: "Accusative (Я на парк)"
          correct: false

- type: true-false
  title: "True or False: Spatial Logic"
  instruction: "Decide if the grammar statement is true or false."
  items:
    - statement: "The Locative case is used to show active motion toward a destination."
      correct: false
      explanation: "The Locative case only describes a static, fixed position (where you already are)."
    - statement: "In Ukrainian, 'на роботі' is used because work is considered a social activity or event."
      correct: true
      explanation: "We use 'на' for activities and events, not just physical surfaces."
    - statement: "The word 'нога' becomes 'ногі' in the Locative case."
      correct: false
      explanation: "The letter 'г' mutates to 'з', so it becomes 'нозі'."
    - statement: "The word 'рука' becomes 'руці' in the Locative case."
      correct: true
      explanation: "The letter 'к' mutates to 'ц', so 'рука' becomes 'руці'."
    - statement: "You should use 'в' before the word 'Львові' to say 'in Lviv'."
      correct: false
      explanation: "You use 'у' to avoid a consonant cluster: 'у Львові'."
    - statement: "The word 'банк' takes the ending 'у' in the Locative case ('у банку')."
      correct: true
      explanation: "Bank is a common exception that takes 'у' instead of 'і'."
    - statement: "When Ukrainians say they are waiting at the station, they use 'на вокзалі'."
      correct: true
      explanation: "Transit hubs and open areas use the preposition 'на'."
    - statement: "If you are inside a room, you use the preposition 'на'."
      correct: false
      explanation: "For enclosed spaces and containers, you use 'в' or 'у' (у кімнаті)."

- type: match-up
  title: "Match the Phrases"
  instruction: "Match the English phrase to its Ukrainian translation."
  pairs:
    - left: "Where is the toilet?"
      right: "Де туалет?"
    - left: "in the room"
      right: "у кімнаті"
    - left: "at work"
      right: "на роботі"
    - left: "on the table"
      right: "на столі"
    - left: "in the store"
      right: "в магазині"
    - left: "on the street"
      right: "на вулиці"
    - left: "in the school"
      right: "у школі"
    - left: "in the hand"
      right: "у руці"

- type: unjumble
  title: "Build the Sentences"
  instruction: "Put the words in the correct order to make a spatial sentence."
  items:
    - words: ["Де", "зараз", "мій", "телефон?"]
      answer: "Де зараз мій телефон?"
    - words: ["Телефон", "лежить", "на", "столі."]
      answer: "Телефон лежить на столі."
    - words: ["Мій", "кіт", "спить", "у", "кімнаті."]
      answer: "Мій кіт спить у кімнаті."
    - words: ["Люди", "гуляють", "на", "вулиці."]
      answer: "Люди гуляють на вулиці."
    - words: ["Вчитель", "працює", "у", "школі."]
      answer: "Вчитель працює у школі."
    - words: ["Поїзд", "стоїть", "на", "вокзалі."]
      answer: "Поїзд стоїть на вокзалі."