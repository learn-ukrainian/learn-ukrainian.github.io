- id: fill-in-numbers
  type: fill-in
  instruction: Напишіть цифру словом (Write the number as a word)
  items:
  - sentence: Це коштує 40 (____) гривень.
    answer: сорок
  - sentence: Кілограм яблук коштує 35 (____ п'ять) гривень.
    answer: тридцять
  - sentence: Цей сир коштує 120 (____ двадцять) гривень.
    answer: сто
  - sentence: Дайте, будь ласка, 2 (____) кілограми помідорів.
    answer: два
  - sentence: У мене є 100 (____) гривень.
    answer: сто
  - sentence: Хліб коштує 21 (____ один) гривню.
    answer: двадцять
- id: match-pronouns
  type: match-up
  instruction: З'єднайте займенник із дієсловом (Match pronoun with verb)
  pairs:
  - left: Я
    right: купую
  - left: Ти
    right: купуєш
  - left: Він
    right: купує
  - left: Ми
    right: купуємо
  - left: Ви
    right: купуєте
  - left: Вони
    right: купують
- id: fill-in-pronouns
  type: fill-in
  instruction: Вставте правильний займенник (Insert the correct pronoun)
  items:
  - sentence: ____ йдемо в супермаркет.
    answer: Ми
    options:
    - Я
    - Ми
    - Ви
  - sentence: ____ хоче купити яблука.
    answer: Вона
    options:
    - Вона
    - Вони
    - Ви
  - sentence: ____ купуєте молоко?
    answer: Ви
    options:
    - Ти
    - Ви
    - Ми
  - sentence: ____ хочу купити хліб і масло.
    answer: Я
    options:
    - Я
    - Ми
    - Вони
  - sentence: ____ коштують сорок гривень.
    answer: Вони
    options:
    - Він
    - Воно
    - Вони
  - sentence: ____ купуєш сік на ринку.
    answer: Ти
    options:
    - Ти
    - Він
    - Я
- id: sort-pronouns
