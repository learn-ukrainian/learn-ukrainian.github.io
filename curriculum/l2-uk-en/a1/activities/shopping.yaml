- id: fill-in-dialogue
  type: fill-in
  instruction: Вставте правильні слова в діалог (Insert the correct words into the
    dialogue)
  items:
  - sentence: — Добрий день! ____ коштує цей сир?
    answer: Скільки
    options:
    - Де
    - Скільки
    - Що
  - sentence: — Сто двадцять ____.
    answer: гривень
    options:
    - гривня
    - гривні
    - гривень
  - sentence: — Ого, це дуже ____!
    answer: дорого
    options:
    - дешево
    - дорого
    - добре
  - sentence: — А ось цей сир — вісімдесят гривень. Нормальна ____.
    answer: ціна
    options:
    - ціна
    - знижка
    - каса
  - sentence: — Добре, ____, будь ласка, цей сир.
    answer: дайте
    options:
    - дайте
    - візьміть
    - купіть
  - sentence: — Ось, будь ласка. Чи можна розрахуватися ____?
    answer: карткою
    options:
    - гроші
    - готівка
    - карткою
