workbook:
- id: group-sort-verbs
  type: group-sort
  instruction: Розподіліть слова за правильним дієсловом (Categorize words by the
    correct verb)
  groups:
  - label: Скільки коштує...? (Однина)
    items:
    - хліб
    - молоко
    - вода
    - сир
    - сік
  - label: Скільки коштують...? (Множина)
    items:
    - яблука
    - помідори
    - банани
    - гроші
- id: match-up-vocab
  type: match-up
  instruction: З'єднайте українське слово з перекладом (Match the Ukrainian word with
    the translation)
  pairs:
  - left: супермаркет
    right: supermarket
  - left: готівка
    right: cash
  - left: коштувати
    right: to cost
  - left: купувати
    right: to buy
  - left: дорого
    right: expensive
  - left: копійка
    right: kopeck
  - left: знижка
    right: discount
  - left: ціна
    right: price
- id: true-false-shopping
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: На ринку завжди є цінники на всіх продуктах.
    correct: false
    explanation: На ринку часто немає цінників, треба питати продавця.
  - statement: Для води ми використовуємо слова «літр» або «пляшка».
    correct: true
    explanation: Вода — це рідина, тому ми міряємо її в літрах або пляшках.
  - statement: Правильно казати «двадцять одна гривень».
    correct: false
    explanation: Правильно казати «двадцять одна гривня».
  - statement: М'ясо можна купити в молочному відділі.
    correct: false
    explanation: М'ясо купують у м'ясному відділі.
  - statement: «Крамниця» — це український синонім до слова «магазин».
    correct: true
    explanation: Крамниця — це невеликий магазин.
  - statement: Слово «буханка» — це правильне українське слово для хліба.
    correct: false
    explanation: Правильно говорити «буханець» або «хлібина».
