- id: true-false-reading
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: На традиційному ринку ціни фіксовані і не можна говорити з продавцем.
    correct: false
    explanation: На ринку ви говорите з продавцем, це місце для спілкування.
  - statement: Супермаркет — це великий магазин самообслуговування.
    correct: true
    explanation: Так, супермаркет має багато відділів і там самообслуговування.
  - statement: В Україні є спеціальний молочний відділ для сиру та молока.
    correct: true
    explanation: Так, у супермаркетах є молочний відділ.
  - statement: Щоб купити воду, треба йти в м'ясний відділ.
    correct: false
    explanation: М'ясний відділ — це для м'яса та ковбаси.
  - statement: Слово «копійка» — це історична українська назва монети.
    correct: false
    explanation: Історична українська назва — «шаг», а копійка — це назва імперського
      періоду.
  - statement: Продавці на ринку часто використовують слова з пестливими суфіксами
      (яблучка, картопелька).
    correct: true
    explanation: Так, це виражає гостинність і дружнє ставлення.
- id: quiz-reading
  type: quiz
  instruction: Оберіть правильну відповідь за текстом (Choose the correct answer based
    on the text)
  items:
  - question: Де можна купити ковбасу в супермаркеті?
    options:
    - у молочному відділі
    - у м'ясному відділі
    - в аптеці
    - у крамниці
    correct: 1
  - question: Що ви говорите, коли ціна занадто висока?
    options:
    - Це дуже дорого!
    - Це дешево.
    - Є знижка?
    - Нормальна ціна.
    correct: 0
  - question: Яку форму дієслова треба використовувати для слова «яблука» (множина)?
    options:
    - Скільки коштує?
    - Скільки коштують?
    - Скільки коштуємо?
    - Скільки коштувати?
    correct: 1
  - question: Як правильно і ввічливо попросити щось у продавця?
    options:
    - Я хочу...
    - Дайте, будь ласка...
    - Мені треба...
    - Де тут...
    correct: 1
  - question: Яке слово використовують продавці, щоб бути привітними?
    options:
    - яблуко
    - яблука
    - яблучка
    - яблуку
    correct: 2
  - question: Що ви запитуєте, коли хочете дізнатися, чи можна розрахуватися банківською
      карткою?
    options:
    - Можна готівкою?
    - Скільки з мене?
    - Ось ваш чек.
    - Можна карткою?
    correct: 3
