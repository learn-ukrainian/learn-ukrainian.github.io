- id: fill-in-prices
  type: fill-in
  instruction: Вставте правильну форму слова (Insert the correct form of the word)
  items:
  - sentence: Скільки коштує ____? — Двадцять гривень.
    answer: хліб
    options:
    - хліб
    - хліба
    - хлібом
  - sentence: Скільки коштує ____? — Десять гривень.
    answer: вода
    options:
    - вода
    - воду
    - води
  - sentence: Скільки коштує ____? — Сто гривень.
    answer: сир
    options:
    - сир
    - сиру
    - сиром
  - sentence: Скільки коштують ____? — Сорок гривень.
    answer: яблука
    options:
    - яблука
    - яблук
    - яблукам
  - sentence: Скільки коштують ____? — Тридцять гривень.
    answer: помідори
    options:
    - помідори
    - помідорів
    - помідорам
  - sentence: Скільки коштує ____? — П'ятдесят гривень.
    answer: молоко
    options:
    - молоко
    - молока
    - молоком
  - sentence: Скільки коштує ____? — Шістдесят гривень.
    answer: сік
    options:
    - сік
    - соку
    - соком
  - sentence: Скільки коштують ____? — Сімдесят гривень.
    answer: банани
    options:
    - банани
    - бананів
    - бананам
