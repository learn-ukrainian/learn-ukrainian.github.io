      answer: знайомимося
      options: [знайомимося, вмиваємося, одягаємося, сміємося]
    - question: — Я ___ у цьому університеті.
      answer: вчуся
      options: [вчуся, голюся, вітаюся, повертаюся]
    - question: — Ви часто ___ у парку? — Так, кожного вечора.
