- type: true-false
  title: "True or False Reflexive Rules"
  instruction: "Decide if the statement about reflexive verbs is correct."
  items:
    - statement: "The ending -ся always stands at the very end of the verb."
      correct: true
      explanation: "Yes, the mirror ending always comes after all other conjugated parts of the verb."
    - statement: "It is perfectly natural to say 'Я мию себе' in Ukrainian."
      correct: false
      explanation: "This is a literal English translation. The natural Ukrainian way is to use the mirror verb 'Я миюся'."
    - statement: "If a verb ends in a vowel, you must add -ся."
      correct: false
      explanation: "If a verb ends in a vowel, you use the shortened form -сь (e.g., миюсь)."
    - statement: "The verb 'сміятися' (to laugh) can exist without the -ся ending."
      correct: false
      explanation: "Some verbs are lexicalized and always reflexive. They cannot exist without the mirror ending."
    - statement: "Reciprocal verbs describe mutual actions between two or more people, like 'зустрічатися'."
      correct: true
      explanation: "Reciprocal verbs mean doing something to 'each other'."
    - statement: "To say 'I watch TV', you say 'Я дивлюсь телевізор'."
      correct: true
      explanation: "This is correct present tense conjugation."
    - statement: "The polite way to apologize is 'Вибачаюсь'."
      correct: false
      explanation: "'Вибачаюсь' is impolite because it implies excusing oneself. 'Вибачте' is the polite form."
    - statement: "When we use the third person plural form ending in -ться, we pronounce it as a long soft 'ts' and an 'a'."
      correct: true
      explanation: "This is a critical phonetic rule in Ukrainian."

