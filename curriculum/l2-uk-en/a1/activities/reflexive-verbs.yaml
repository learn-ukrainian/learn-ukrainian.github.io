- type: fill-in
  title: Conjugation Practice
  instruction: Fill in the correct form of the reflexive verb.
  items:
    - sentence: Я ___ зранку. (вмиватися)
      answer: вмиваюся
      options: [вмиваюся, вмиваєшся, вмиваємося, вмиваються]
    - sentence: Ти ___ швидко. (одягатися)
      answer: одягаєшся
      options: [одягаюся, одягаєшся, одягається, одягаєтеся]
    - sentence: Він ___ голосно. (сміятися)
      answer: сміється
      options: [сміюся, смієшся, сміється, сміються]
    - sentence: Ми ___ кожен день. (вчитися)
      answer: вчимося
      options: [вчуся, вчимося, вчитеся, вчаться]
    - sentence: Ви ___ з сусідами. (вітатися)
      answer: вітаєтеся
      options: [вітаєшся, вітається, вітаємося, вітаєтеся]
    - sentence: Вони ___ у парку. (зустрічатися)
      answer: зустрічаються
      options: [зустрічаюся, зустрічається, зустрічаємося, зустрічаються]
    - sentence: Я ___ з новими друзями. (знайомитися)
      answer: знайомлюся
      options: [знайомлюся, знайомишся, знайомимося, знайомляться]
    - sentence: Вона ___ додому. (повертатися)
      answer: повертається
      options: [повертаюся, повертаєшся, повертається, повертаються]
    - sentence: Ти ___ телевізор. (дивитися)
      answer: дивишся
      options: [дивлюся, дивишся, дивиться, дивляться]
    - sentence: Ми ___ тепло. (одягатися)
      answer: одягаємося
      options: [одягаюся, одягаємося, одягаєтеся, одягаються]
    - sentence: Ви ___ разом. (сміятися)
      answer: смієтеся
      options: [сміюся, сміємося, смієтеся, сміються]
    - sentence: Вони ___ холодною водою. (вмиватися)
      answer: вмиваються
      options: [вмиваюся, вмиваємося, вмиваєтеся, вмиваються]

