- type: multiple-choice
  title: Reflexive Meaning
  instruction: Choose the correct meaning for the sentence.
  items:
    - question: Ми вітаємося.
      answer: We greet each other.
      options: ["We greet each other.", "I greet you.", "They greet us.", "We are happy."]
    - question: Вона вмивається.
      answer: She is washing herself.
      options: ["She is washing herself.", "She is washing a car.", "He is washing her.", "We are washing."]
    - question: Я вчуся.
      answer: I am studying.
      options: ["I am studying.", "I am teaching.", "You are studying.", "They are learning."]
    - question: Діти сміються.
      answer: Children are laughing.
      options: ["Children are laughing.", "Children are crying.", "Children are playing.", "Children are eating."]
    - question: Як називається це місто?
      answer: What is this city called?
      options: ["What is this city called?", "Where is this city?", "Who lives here?", "How big is this city?"]
    - question: Він повертається додому.
      answer: He is returning home.
      options: ["He is returning home.", "He is leaving home.", "He is at home.", "He is building a home."]
    - question: Ми знайомимося.
      answer: We are getting acquainted.
      options: ["We are getting acquainted.", "We are friends.", "We are talking.", "We are leaving."]
    - question: Ти дивишся кіно.
      answer: You are watching a movie.
      options: ["You are watching a movie.", "You are making a movie.", "You are in a movie.", "You like movies."]

