      options: [зустрічаєтеся, вмиваєтеся, одягаєтеся, смієтеся]
    - question: — Чому вони ___ ? — Це смішна історія.
      answer: сміються
      options: [сміються, вмиваються, одягаються, вчаться]
    - question: — Ти вже ___ додому? — Так, я в автобусі.
      answer: повертаєшся
      options: [повертаєшся, вмиваєшся, одягаєшся, вчишся]
    - question: — Він ___ з усіма колегами.
      answer: вітається
      options: [вітається, вмивається, одягається, сміється]
    - question: — Я ___ цією книжкою.
      answer: цікавлюся
      options: [цікавлюся, вмиваюся, одягаюся, називаюся]

- type: multiple-choice
  title: Grammar Logic
  instruction: Choose the correct grammatical explanation.
  items:
    - question: Why do we use -сь in 'Я вмиваюся'?
      answer: Because it follows a vowel.
      options: ["Because it follows a vowel.", "Because it follows a consonant.", "Because it is I.", "Because it is today."]
    - question: Why do we use -ся in 'Ти вмиваєшся'?
      answer: Because it follows a consonant.
      options: ["Because it follows a consonant.", "Because it follows a vowel.", "Because it is you.", "Because it is morning."]
    - question: What does the suffix -ся mean?
      answer: self (себе)
      options: ["self (себе)", "you", "yesterday", "small"]
    - question: Pronounce -ться correctly.
      answer: long soft [ts:a]
      options: ["long soft [ts:a]", "hard [t]", "soft [s]", "silent"]
    - question: Pronounce -шся correctly.
      answer: soft [s:a]
      options: ["soft [s:a]", "hard [sh]", "soft [sh]", "[ts:a]"]
    - question: "'Вмивати' vs 'Вмиватися'."
      answer: Transitive vs Reflexive
      options: ["Transitive vs Reflexive", "Past vs Present", "Noun vs Verb", "Big vs Small"]
    - question: "'Сміятися' is..."
      answer: always reflexive
      options: ["always reflexive", "sometimes reflexive", "a noun", "an adjective"]
    - question: "'Вітатися' is..."
      answer: reciprocal (each other)
      options: ["reciprocal (each other)", "true reflexive", "lexicalized", "not a verb"]

