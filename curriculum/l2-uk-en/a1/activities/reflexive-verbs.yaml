- type: quiz
  title: "Grammar and Meaning Check"
  instruction: "Choose the correct answer for each question."
  items:
    - question: "What does the ending -ся basically mean?"
      options:
        - text: "It reflects the action back to the subject."
          correct: true
        - text: "It makes the verb past tense."
          correct: false
        - text: "It means 'to do something quickly'."
          correct: false
        - text: "It shows that multiple people are acting."
          correct: false
      explanation: "The suffix -ся is like a mirror, returning the action to the subject."
    - question: "Which form is used after a vowel?"
      options:
        - text: "-сь"
          correct: true
        - text: "-ся"
          correct: false
        - text: "-ть"
          correct: false
        - text: "-мо"
          correct: false
      explanation: "After a vowel, we use the shorter form -сь (e.g., миюсь)."
    - question: "How do you politely apologize in Ukrainian?"
      options:
        - text: "Вибачте"
          correct: true
        - text: "Вибачаюсь"
          correct: false
        - text: "Я миюся"
          correct: false
        - text: "Я називаюсь"
          correct: false
      explanation: "'Вибачте' is correct. 'Вибачаюсь' literally means 'I excuse myself' and is considered self-centered."
    - question: "What preposition must follow the verb сміятися (to laugh)?"
      options:
        - text: "з"
          correct: true
        - text: "на"
          correct: false
        - text: "в"
          correct: false
        - text: "над"
          correct: false
      explanation: "Standard Ukrainian uses 'сміятися з жарту' (to laugh at a joke)."
    - question: "Which verb describes a reciprocal action (doing something to each other)?"
      options:
        - text: "зустрічатися"
          correct: true
        - text: "вмиватися"
          correct: false
        - text: "одягатися"
          correct: false
        - text: "дивитися"
          correct: false
      explanation: "'Зустрічатися' means to meet each other."
    - question: "How do you properly pronounce the ending -ться (e.g., він вчиться)?"
      options:
        - text: "As a long, soft 'ts' followed by 'a'."
          correct: true
        - text: "Exactly as written as 't-s-ya'."
          correct: false
        - text: "Like an English 'sh'."
          correct: false
        - text: "You drop the ending completely."
          correct: false
      explanation: "The ending -ться always sounds like a soft 'ts' plus 'a' sound."
    - question: "What is the difference between мити and митися?"
      options:
        - text: "'Мити' is to wash something else, 'митися' is to wash oneself."
          correct: true
        - text: "'Мити' is to wash oneself, 'митися' is to wash something else."
          correct: false
        - text: "They mean exactly the same thing."
          correct: false
        - text: "'Мити' is plural, 'митися' is singular."
          correct: false
      explanation: "The -ся ending makes 'мити' reflexive."
    - question: "Which phrase is correct for 'I watch television'?"
      options:
        - text: "Я дивлюсь телевізор."
          correct: true
        - text: "Я дивиться телевізор."
          correct: false
        - text: "Я дивишся телевізор."
          correct: false
        - text: "Я дивляться телевізор."
          correct: false
      explanation: "The pronoun 'Я' requires the 'ю' ending, followed by '-сь' because it is after a vowel (дивлюсь)."

- type: fill-in
  title: "Present Tense Conjugations"
  instruction: "Choose the correct verb form for the sentence."
  items:
    - sentence: "Я ______ холодною водою щоранку."
      answer: "вмиваюсь"
      options:
        - "вмиваюсь"
        - "вмивається"
        - "вмиваємось"
        - "вмиваються"
      explanation: "The pronoun 'Я' takes the -ю ending. Since 'ю' is a vowel, we add -сь (вмиваюсь)."
    - sentence: "Він швидко ______."
      answer: "одягається"
      options:
        - "одягається"
        - "одягаюсь"
        - "одягаємось"
        - "одягаються"
      explanation: "The pronoun 'Він' takes the third person form. The consonant 'ть' requires -ся (одягається)."
    - sentence: "Ми ______ до сліз."
      answer: "сміємось"
      options:
        - "сміємось"
        - "сміюсь"
        - "сміється"
        - "сміються"
      explanation: "The pronoun 'Ми' takes the -мо ending. Since 'о' is a vowel, we add -сь (сміємось)."
    - sentence: "Вони часто ______ у місті."
      answer: "зустрічаються"
      options:
        - "зустрічаються"
        - "зустрічаємось"
        - "зустрічається"
        - "зустрічаюсь"
      explanation: "The pronoun 'Вони' takes the third person plural form. The consonant 'ть' requires -ся (зустрічаються)."
    - sentence: "Ти ______ у вікно."
      answer: "дивишся"
      options:
        - "дивишся"
        - "дивлюсь"
        - "дивиться"
        - "дивимось"
      explanation: "The pronoun 'Ти' takes the -иш ending. Since 'ш' is a consonant, we add -ся (дивишся)."
    - sentence: "Вулиця ______ Хрещатик."
      answer: "називається"
      options:
        - "називається"
        - "називаюсь"
        - "називаються"
        - "називаємось"
      explanation: "The subject 'Вулиця' is singular 'вона', so we use the third person singular form (називається)."
    - sentence: "Я ______ Андрій."
      answer: "називаюсь"
      options:
        - "називаюсь"
        - "називається"
        - "називаємось"
        - "називаються"
      explanation: "The pronoun 'Я' takes the -ю ending. After the vowel 'ю', we add -сь (називаюсь)."
    - sentence: "Ви добре ______."
      answer: "вчитесь"
      options:
        - "вчитесь"
        - "вчиться"
        - "вчусь"
        - "вчимось"
      explanation: "The pronoun 'Ви' takes the -те ending. Since 'е' is a vowel, we add -сь (вчитесь)."

- type: fill-in
  title: "Mirror Endings"
  instruction: "Choose the correct mirror ending to complete the word."
  items:
    - sentence: "Я дивлю______."
      answer: "сь"
      options:
        - "сь"
        - "ся"
        - "мо"
        - "те"
      explanation: "The letter 'ю' is a vowel, so we use -сь."
    - sentence: "Він дивить______."
      answer: "ся"
      options:
        - "ся"
        - "сь"
        - "мо"
        - "те"
      explanation: "The letter 'ь' represents a consonant sound, so we use -ся."
    - sentence: "Ти дивиш______."
      answer: "ся"
      options:
        - "ся"
        - "сь"
        - "мо"
        - "те"
      explanation: "The letter 'ш' is a consonant, so we use -ся."
    - sentence: "Ми дивимо______."
      answer: "сь"
      options:
        - "сь"
        - "ся"
        - "мо"
        - "те"
      explanation: "The letter 'о' is a vowel, so we use -сь."
    - sentence: "Вони дивлять______."
      answer: "ся"
      options:
        - "ся"
        - "сь"
        - "мо"
        - "те"
      explanation: "The letter 'ь' represents a consonant sound, so we use -ся."
    - sentence: "Ви дивите______."
      answer: "сь"
      options:
        - "сь"
        - "ся"
        - "мо"
        - "те"
      explanation: "The letter 'е' is a vowel, so we use -сь."
    - sentence: "Я займаю______ спортом."
      answer: "сь"
      options:
        - "сь"
        - "ся"
        - "мо"
        - "те"
      explanation: "The letter 'ю' is a vowel, so we use -сь."
    - sentence: "Вона одягаєть______ тепло."
      answer: "ся"
      options:
        - "ся"
        - "сь"
        - "мо"
        - "те"
      explanation: "The letter 'ь' represents a consonant sound, so we use -ся."

