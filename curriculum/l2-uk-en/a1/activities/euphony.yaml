- id: group-sort-conjunctions
  type: group-sort
  instruction: Розподіліть фрази (Sort the phrases)
  groups:
  - label: І (між приголосними)
    items:
    - брат і сестра
    - Тарас і Максим
    - стіл і стілець
    - він і вона
  - label: Й (після голосного)
    items:
    - мама й тато
    - вона й він
    - Олена й Андрій
    - ти й Олена
- id: true-false-euphony
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Фраза «Мама й тато» звучить природно українською.
    correct: true
    explanation: Слово «Мама» закінчується на голосний, тому використовуємо «й».
  - statement: Фраза «Тарас в Львові» написана правильно.
    correct: false
    explanation: 'Після приголосного перед іншим приголосним треба писати «у»: «Тарас
      у Львові».'
  - statement: 'На початку речення завжди пишемо «У», наприклад: «У мене є брат».'
    correct: true
    explanation: На початку речення перед приголосним завжди вживається «у».
  - statement: Фраза «Вона з мною» є правильною.
    correct: false
    explanation: 'Перед важким збігом приголосних «мн» краще вживати «зі»: «Вона зі
      мною».'
  - statement: Фраза «Брат і сестра» написана правильно.
    correct: true
    explanation: Між приголосними використовується «і».
  - statement: Фраза «Лист з Києва» звучить краще, ніж «Лист із Києва».
    correct: false
    explanation: 'Для уникнення збігу приголосних («ст» і «к») краще вживати «із»:
      «Лист із Києва».'
