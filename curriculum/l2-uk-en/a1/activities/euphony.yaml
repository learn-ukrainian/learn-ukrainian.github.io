workbook:
- id: group-sort-sounds
  type: group-sort
  instruction: Розподіліть слова за першим звуком (Sort words by their first sound)
  groups:
  - label: Починається на голосний (Starts with a vowel)
    items:
    - офіс
    - Олена
    - Одеса
  - label: Починається на приголосний (Starts with a consonant)
    items:
    - парк
    - театр
    - банк
    - футбол
- id: match-up-euphony
  type: match-up
  instruction: З'єднайте пари для правильного звучання (Connect pairs for correct
    sound)
  pairs:
  - left: Я живу в
    right: Києві
  - left: Він працює у
    right: Львові
  - left: Мама й
    right: Олена
  - left: Максим і
    right: Тарас
  - left: Ідемо зі
    right: школи
  - left: Гуляє з
    right: братом
- id: true-false-rules
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Ми завжди пишемо «у» на початку речення. (We always write «у» at the
      beginning of a sentence.)
    correct: true
    explanation: «У» is used at the beginning of sentences to provide a strong, clear
      start.
  - statement: Після голосного ми використовуємо «в». (After a vowel we use «в».)
    correct: true
    explanation: We use «в» after a vowel (before a consonant) to avoid a vowel clash.
  - statement: Слово «Франція» вимагає прийменника «в». (The word «Франція» requires
      the preposition «в».)
    correct: false
    explanation: Words starting with ф, в, св, льв always require «у» because they
      are difficult consonant clusters.
  - statement: Ми кажемо «зі мною». (We say «зі мною».)
    correct: true
    explanation: This is a fixed phrase that helps pronounce the difficult consonants
      together.
  - statement: Літера «й» може бути першим словом у реченні. (The letter «й» can be
      the first word in a sentence.)
    correct: false
    explanation: «Й» is a weak semivowel and cannot start a sentence. We use «І» instead.
  - statement: Милозвучність допомагає вимовляти слова легше. (Euphony helps pronounce
      words more easily.)
    correct: true
    explanation: Euphony rules exist to prevent difficult consonant and vowel clashes,
      making speech flow naturally.
