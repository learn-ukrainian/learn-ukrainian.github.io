workbook:
- id: match-days-of-week
  type: match-up
  instruction: З'єднайте день і правильну форму (Match the day with the correct form)
  pairs:
  - left: понеділок
    right: у понеділок
  - left: вівторок
    right: у вівторок
  - left: середа
    right: у середу
  - left: четвер
    right: у четвер
  - left: п'ятниця
    right: у п'ятницю
  - left: субота
    right: у суботу
  - left: неділя
    right: в неділю
- id: true-false-plans
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: «У п'ятницю» is the correct form for «on Friday».
    correct: true
    explanation: П'ятниця (feminine) changes -я to -ю after the preposition у.
  - statement: «О шостій» means «at three».
    correct: false
    explanation: О шостій means at six. At three is о третій.
  - statement: «Ти будеш вільна?» is used to ask a woman if she will be free.
    correct: true
    explanation: Вільна is the feminine adjective form.
  - statement: To ask «At what time?», you say «Який час?».
    correct: false
    explanation: To ask «At what time?», you say «О котрій?».
  - statement: «В неділю» often uses the preposition «в» instead of «у».
    correct: true
    explanation: It is more natural to say «в неділю» to avoid a vowel clash.
  - statement: «З задоволенням» means «Unfortunately».
    correct: false
    explanation: З задоволенням means «With pleasure». Unfortunately is «на жаль».
