    - суботу
    - зранку
    - я
    - буду
    - прибирати
    - квартиру
  - words:
    - о
    - шостій
    - підемо
    - може
    - в
    - кафе
    correct_order:
    - може
    - підемо
    - в
    - кафе
    - о
    - шостій
  - words:
    - вільний
