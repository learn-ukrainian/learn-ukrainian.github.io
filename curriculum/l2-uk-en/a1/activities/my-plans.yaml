- type: quiz
  instruction: Оберіть правильний варіант (Choose the correct option)
  items:
  - question: Як запросити друга до кафе?
    options:
    - На жаль, не можу.
    - Може, підемо в кафе?
    - Добре! О котрій?
    - Чудово! До зустрічі!
    correct: 1
  - question: Як сказати 'On Wednesday' по-українськи?
    options:
    - у вівторок
    - у четвер
    - у середу
    - у п'ятницю
    correct: 2
  - question: Яка форма правильна? 'У понеділок я ____'
    options:
    - буду працювати
    - буду працюватиму
    - будую працювати
    - буду працював
    correct: 0
  - question: Що означає 'з задоволенням'?
    options:
    - Unfortunately
    - Of course
    - With pleasure
    - Good!
    correct: 2
  - question: Який прийменник використовується перед 'неділю'?
    options:
    - у
    - на
    - при
    - в
    correct: 3
  - question: Що означає 'допізна'?
    options:
    - in the morning
    - until late
    - in the afternoon
    - at five
    correct: 1
- type: observe
  examples:
  - У понеділок я буду працювати.
  - У вівторок я буду вчитися.
  - У середу ввечері я буду дивитися футбол.
  - У четвер я буду готувати вечерю для родини.
  - У п'ятницю я буду відпочивати.
  - У суботу зранку буду прибирати, а вдень гуляти в парку.
  - В неділю я буду спати довго!
  prompt: Look at all seven sentences. What pattern do you notice about the position
    of буду? What form does the second verb always take? Why does Sunday use 'В' while
    all other days use 'У'?
