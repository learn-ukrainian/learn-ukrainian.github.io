version: '1.0'
module: my-plans
level: a1
inline:
- id: fill-in-days-time
  type: fill-in
  instruction: Оберіть правильне слово (Choose the correct word)
  items:
  - sentence: У _____ я буду працювати.
    answer: середу
    options:
    - середа
    - середу
    - середою
  - sentence: _____ суботу зранку я буду прибирати квартиру.
    answer: У
    options:
    - У
    - О
    - На
  - sentence: _____ шостій ми будемо дивитися кіно.
    answer: О
    options:
    - У
    - В
    - О
  - sentence: У _____ він буде відпочивати.
    answer: неділю
    options:
    - неділя
    - неділю
    - неділі
  - sentence: У п'ятницю _____ буде вечірка.
    answer: ввечері
    options:
    - ввечері
    - вечір
    - вечора
  - sentence: _____ котрій ми зустрінемося?
    answer: О
    options:
    - У
    - На
    - О
- id: matching-invitations
  type: match-up
  instruction: З'єднайте репліки (Match the phrases)
  pairs:
  - left: Ходімо в кіно!
    right: З задоволенням!
  - left: Може, підемо в кафе?
    right: Добре! О котрій?
  - left: Ти будеш вільний у суботу?
    right: На жаль, не можу.
  - left: Давай зустрінемося о п'ятій!
    right: Чудово! До зустрічі!
  - left: У тебе є плани на тиждень?
    right: Так, багато!
  - left: Ти будеш вільна в неділю?
    right: Звичайно буду!
- id: fill-in-weekly-plan
  type: fill-in
  instruction: Оберіть правильну форму дієслова (Choose the correct verb form)
  items:
  - sentence: У вівторок я _____ українську.
    answer: буду вчити
    options:
    - буду вчити
    - вчив
    - вчу
  - sentence: У середу ми _____ вечерю.
    answer: будемо готувати
    options:
    - будемо готувати
    - готували
    - готуємо
  - sentence: У четвер вона _____ допізна.
    answer: буде працювати
    options:
    - буде працювати
    - працювала
    - працює
  - sentence: У п'ятницю вони _____.
    answer: будуть відпочивати
    options:
    - будуть відпочивати
    - відпочивали
    - відпочивають
  - sentence: У суботу ти _____ квартиру.
    answer: будеш прибирати
    options:
    - будеш прибирати
    - прибирав
    - прибираєш
  - sentence: В неділю я _____ довго.
    answer: буду спати
    options:
    - буду спати
    - спав
    - сплю
workbook:
- id: wb-match-pronouns
  type: match-up
  instruction: З'єднайте займенник із формою дієслова (Match the pronoun with the
    verb form)
  pairs:
  - left: Я
    right: буду прибирати
  - left: Ти
    right: будеш відпочивати
  - left: Він
    right: буде працювати
  - left: Ми
    right: будемо дивитися кіно
  - left: Ви
    right: будете вчити
  - left: Вони
    right: будуть готувати
- id: wb-sort-number
  type: group-sort
  instruction: Розподіліть форми на однину та множину (Sort forms into singular and
    plural)
  groups:
  - label: Однина (Singular)
    items:
    - я буду
    - ти будеш
    - він буде
    - вона буде
  - label: Множина (Plural)
    items:
    - ми будемо
    - ви будете
    - вони будуть
- id: wb-possession-fill-in
  type: fill-in
  instruction: Вставте правильний займенник (Fill in the correct pronoun)
  items:
  - sentence: У _____ є плани на тиждень.
    answer: мене
    options:
    - мене
    - я
    - мій
  - sentence: У _____ є зустріч у вівторок.
    answer: нього
    options:
    - він
    - його
    - нього
  - sentence: У _____ є вечірка в п'ятницю.
    answer: неї
    options:
    - вона
    - її
    - неї
  - sentence: У _____ є час у суботу зранку.
    answer: нас
    options:
    - ми
    - нас
    - наш
  - sentence: У _____ є плани на вечір?
    answer: тебе
    options:
    - ти
    - тебе
    - твій
  - sentence: У _____ є зустріч з друзями.
    answer: них
    options:
    - вони
    - їх
    - них
- id: wb-match-possessive
  type: match-up
  instruction: З'єднайте займенник із відповідним іменником (Match the pronoun with
    the noun)
  pairs:
  - left: мій
    right: план
  - left: твоя
    right: квартира
  - left: наша
    right: зустріч
  - left: ваше
    right: кіно
  - left: її
    right: вечірка
  - left: його
    right: тиждень
- id: wb-error-correction-verbs
  type: error-correction
  instruction: Знайдіть і виправте помилку (Find and correct the error)
  items:
  - sentence: Я будеш прибирати квартиру.
    error: будеш
    correction: буду
    error_type: word
    options:
    - буду
    - буде
    - будемо
    explanation: З займенником 'я' використовується форма 'буду'.
  - sentence: Ти буду вчити українську.
    error: буду
    correction: будеш
    error_type: word
    options:
    - будеш
    - буде
    - будете
    explanation: З займенником 'ти' використовується форма 'будеш'.
  - sentence: Він будете працювати допізна.
    error: будете
    correction: буде
    error_type: word
    options:
    - буде
    - будуть
    - буду
    explanation: З займенником 'він' використовується форма 'буде'.
  - sentence: Ми будуть відпочивати у парку.
    error: будуть
    correction: будемо
    error_type: word
    options:
    - будемо
    - будете
    - буде
    explanation: З займенником 'ми' використовується форма 'будемо'.
  - sentence: Ви буде готувати вечерю.
    error: буде
    correction: будете
    error_type: word
    options:
    - будете
    - будемо
    - будуть
    explanation: З займенником 'ви' використовується форма 'будете'.
  - sentence: Вони будемо дивитися кіно.
    error: будемо
    correction: будуть
    error_type: word
    options:
    - будуть
    - будете
    - буде
    explanation: З займенником 'вони' використовується форма 'будуть'.
- id: wb-quiz-possession
  type: quiz
  instruction: Оберіть правильний варіант (Choose the correct option)
  items:
  - question: _____ є плани на суботу?
    options:
    - У тебе
    - Ти
    - Твій
    - Тобі
    correct: 0
  - question: _____ немає часу в понеділок.
    options:
    - У мене
    - Я
    - Мій
    - Мені
    correct: 0
  - question: _____ є зустріч о п'ятій.
    options:
    - У нього
    - Він
    - Його
    - Йому
    correct: 0
  - question: _____ є вечірка ввечері.
    options:
    - У неї
    - Вона
    - Її
    - Їй
    correct: 0
  - question: _____ є велика квартира.
    options:
    - У них
    - Вони
    - Їх
    - Їм
    correct: 0
  - question: _____ є вільний час у неділю.
    options:
    - У нас
    - Ми
    - Наш
    - Нам
    correct: 0
- id: wb-true-false-reading
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Тарас буде працювати у понеділок.
    correct: true
    explanation: Так, у понеділок Тарас буде працювати.
  - statement: У вівторок Тарас буде дивитися футбол.
    correct: false
    explanation: Ні, у вівторок він буде обідати з другом. Футбол — у середу.
  - statement: У четвер Тарас буде готувати вечерю для родини.
    correct: true
    explanation: Так, він готуватиме вечерю.
  - statement: У п'ятницю Тарас буде прибирати квартиру.
    correct: false
    explanation: Ні, він буде відпочивати і піде в кіно. Прибирати він буде у суботу.
  - statement: У суботу вдень він буде гуляти в парку.
    correct: true
    explanation: Так, зранку він буде прибирати, а вдень — гуляти.
  - statement: В неділю Тарас буде спати мало.
    correct: false
    explanation: Ні, в неділю він буде спати довго!
- id: wb-quiz-reading
  type: quiz
  instruction: Оберіть правильну відповідь (Choose the correct answer)
  items:
  - question: Що Тарас буде робити у понеділок після роботи?
    options:
    - вчити українську
    - дивитися футбол
    - готувати вечерю
    - гуляти в парку
    correct: 0
  - question: З ким Тарас буде обідати у вівторок?
    options:
    - з другом
    - з родиною
    - з колегою
    - один
    correct: 0
  - question: Що Тарас буде робити у середу ввечері?
    options:
    - дивитися футбол
    - працювати допізна
    - спати довго
    - читати книгу
    correct: 0
  - question: Куди Тарас піде у п'ятницю?
    options:
    - в кіно
    - в кафе
    - в магазин
    - на вечірку
    correct: 0
  - question: Коли Тарас буде прибирати?
    options:
    - у суботу зранку
    - у неділю вдень
    - у п'ятницю ввечері
    - у понеділок
    correct: 0
  - question: Який план у Тараса на неділю?
    options:
    - спати довго
    - працювати
    - вчитися
    - готувати
    correct: 0
