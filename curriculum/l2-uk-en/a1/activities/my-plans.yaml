version: '1.0'
module: my-plans
level: a1
inline:
- id: quiz-days-of-week
  type: match-up
  instruction: З'єднайте запрошення з відповідями (Match each invitation with the
    correct response)
  pairs:
  - left: Ходімо в кіно!
    right: З задоволенням!
  - left: Може, підемо в кафе?
    right: Добре! О котрій?
  - left: Ти будеш вільний у суботу?
    right: На жаль, не можу.
  - left: Давай зустрінемося о п'ятій!
    right: Чудово! До зустрічі!
  - left: Ходімо в парк ввечері!
    right: Звичайно буду!
  - left: Може, підемо в кіно у п'ятницю?
    right: Добре!
- id: fill-in-invitations
  type: fill-in
  instruction: Вставте правильне слово (Fill in the correct word)
  items:
  - sentence: У ____ зранку я буду прибирати квартиру.
    options:
    - суботу
    - неділю
    - вівторок
    answer: суботу
  - sentence: У середу ____ я буду дивитися футбол.
    options:
    - ввечері
    - зранку
    - вдень
    answer: ввечері
  - sentence: У ____ я буду відпочивати — піду в кіно.
    options:
    - п'ятницю
    - понеділок
    - середу
    answer: п'ятницю
  - sentence: ____ шостій ми будемо дивитися кіно.
    options:
    - О
    - В
    - На
    answer: О
  - sentence: У четвер я буду готувати ____ для родини.
    options:
    - вечерю
    - зустріч
    - тиждень
    answer: вечерю
  - sentence: У вівторок я ____ обідати з другом у кафе.
    options:
    - буду
    - будеш
    - буде
    answer: буду
  - sentence: У ____ він буде спати довго.
    options:
    - неділю
    - суботу
    - понеділок
    answer: неділю
- id: fill-in-schedule-formula
  type: fill-in
  instruction: Виберіть правильну форму майбутнього часу (Choose the correct future
    tense form)
  items:
  - sentence: У вівторок я ____ українську.
    options:
    - буду вчити
    - вчив
    - вчу
    answer: буду вчити
  - sentence: У середу ми ____ вечерю.
    options:
    - будемо готувати
    - готували
    - готуємо
    answer: будемо готувати
  - sentence: У четвер вона ____ допізна.
    options:
    - буде працювати
    - працювала
    - працює
    answer: буде працювати
  - sentence: У понеділок він ____ вдома.
    options:
    - буде відпочивати
    - відпочивав
    - відпочиває
    answer: буде відпочивати
  - sentence: У суботу зранку я ____ квартиру.
    options:
    - буду прибирати
    - прибирав
    - прибираю
    answer: буду прибирати
  - sentence: В неділю ми ____ в парку.
    options:
    - будемо гуляти
    - гуляли
    - гуляємо
    answer: будемо гуляти
workbook:
- type: group-sort
  instruction: Розподіліть дні тижня за прийменником (Sort the days of the week by
    preposition)
  groups:
  - label: У
    items:
    - понеділок
    - вівторок
    - середу
    - четвер
    - п'ятницю
    - суботу
  - label: В
    items:
    - неділю
- type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Тарас буде прибирати квартиру у суботу зранку.
    correct: true
    explanation: У суботу зранку буду прибирати — this is Taras's plan in the model
      week.
  - statement: У четвер Тарас буде відпочивати.
    correct: false
    explanation: У четвер він буде готувати вечерю для родини — cooking, not resting.
  - statement: Щоб запросити друга, можна сказати 'Ходімо в кафе!'.
    correct: true
    explanation: Ходімо is a standard invitation phrase used in the module.
  - statement: Форма 'буду' не змінюється залежно від особи.
    correct: false
    explanation: Буду (I), будеш (you), буде (he/she), будемо (we), будете (you pl.),
      будуть (they) — the auxiliary verb changes.
  - statement: Щоб відмовити від запрошення, можна сказати 'На жаль, не можу'.
    correct: true
    explanation: На жаль, не можу is a polite refusal phrase taught in the module.
  - statement: У реченні 'я буду прибирати' дієслово 'прибирати' змінює форму.
    correct: false
    explanation: The infinitive прибирати never changes — only the auxiliary буду
      changes to match the subject.
- type: error-correction
  instruction: Виправте помилку у реченні (Correct the mistake in the sentence)
  items:
  - sentence: У неділю я буду відпочивати в парку.
    error: У
    correction: В
    error_type: word
    options:
    - У
    - В
    - На
    explanation: Before неділю we use В because of the euphony rule (В неділю, not
      У неділю).
  - sentence: О шостій я буду готуватиму вечерю.
    error: готуватиму
    correction: готувати
    error_type: word
    options:
    - готуватиму
    - готувати
    - готую
    explanation: 'With the auxiliary буду, the main verb must stay in the infinitive
      form: буду готувати.'
  - sentence: У понеділок вона буде прибирала квартиру.
    error: прибирала
    correction: прибирати
    error_type: word
    options:
    - прибирала
    - прибирати
    - прибирає
    explanation: The analytic future uses буду + infinitive. Past tense прибирала
      cannot follow буду.
  - sentence: Може, підемо в кафе зранок?
    error: зранок
    correction: зранку
    error_type: word
    options:
    - зранок
    - зранку
    - зранки
    explanation: The adverb of time is зранку (in the morning), not the noun зранок.
  - sentence: Давай зустрінемося о п'ята!
    error: п'ята
    correction: п'ятій
    error_type: word
    options:
    - п'ята
    - п'ятій
    - п'ять
    explanation: 'After о (at) we use the locative case: о п''ятій (at five).'
  - sentence: У вівторок я буду вільна зустріч.
    error: вільна зустріч
    correction: вільна
    error_type: word
    options:
    - вільна зустріч
    - вільна
    - вільний час
    explanation: Ти будеш вільна? means 'Will you be free?' — вільна is a predicate
      adjective, not a noun phrase.
- type: unjumble
  instruction: Складіть речення з поданих слів (Put the words in the correct order)
  items:
  - words:
    - я
    - у
    - суботу
    - буду
    - зранку
    - прибирати
    - квартиру
    correct_order:
