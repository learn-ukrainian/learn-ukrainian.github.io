- type: true-false
  title: "Grammar Rules"
  instruction: "Read the statement about possessive pronouns and decide if it is True or False."
  items:
    - statement: "'Мій' changes its form depending on the gender of the object."
      correct: true
      explanation: "Yes, it becomes мій, моя, моє, or мої."
    - statement: "'Його' (his) changes form like 'мій'."
      correct: false
      explanation: "No, 'його' (his) and 'її' (her) are invariable. They never change."
    - statement: "We use 'Ви' (You formal) when talking to a group of friends."
      correct: true
      explanation: "Yes, 'Ви' is always used for plurals, even if they are friends."
    - statement: "'Чий' is used for feminine nouns."
      correct: false
      explanation: "'Чий' is masculine. 'Чия' is feminine."
    - statement: "'Свій' means 'one's own'."
      correct: true
      explanation: "It reflects ownership back to the subject."
    - statement: "You should always use 'ти' with your boss."
      correct: false
      explanation: "No, use 'Ви' with superiors or in formal settings to show respect."
    - statement: "'Наш' (our) changes based on gender."
      correct: true
      explanation: "Yes, it becomes наш, наша, наше, наші."
    - statement: "'Її' (her) changes to 'Їїя' for feminine nouns."
      correct: false
      explanation: "No, 'її' never changes."

