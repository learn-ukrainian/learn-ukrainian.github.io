- type: fill-in
  title: "Мій чи Моя? (My or Mine?)"
  instruction: "Choose the correct form of 'my' based on the gender of the noun."
  items:
    - sentence: "Це __ телефон."
      answer: "мій"
      options: ["мій", "моя", "моє", "мої"]
      explanation: "Телефон is masculine, so we use мій."
    - sentence: "Де __ сумка?"
      answer: "твоя"
      options: ["твій", "твоя", "твоє", "твої"]
      explanation: "Сумка is feminine, so we use твоя."
    - sentence: "Це __ яблуко."
      answer: "моє"
      options: ["мій", "моя", "моє", "мої"]
      explanation: "Яблуко is neuter, so we use моє."
    - sentence: "Це __ паспорт?"
      answer: "твій"
      options: ["твій", "твоя", "твоє", "твої"]
      explanation: "Паспорт is masculine, so we use твій."
    - sentence: "Це __ місто."
      answer: "наше"
      options: ["наш", "наша", "наше", "наші"]
      explanation: "Місто is neuter, so we use наше."
    - sentence: "__ це кава?"
      answer: "Чия"
      options: ["Чий", "Чия", "Чиє", "Чиї"]
      explanation: "Кава is feminine, so we use Чия."
    - sentence: "Це __ сестра."
      answer: "моя"
      options: ["мій", "моя", "моє", "мої"]
      explanation: "Сестра is feminine, so we use моя."
    - sentence: "Це __ брат."
      answer: "мій"
      options: ["мій", "моя", "моє", "мої"]
      explanation: "Брат is masculine, so we use мій."

