- type: quiz
  title: "Свій чи Його/Її?"
  instruction: "Choose the correct pronoun. Remember: 'свій' means the owner IS the subject."
  items:
    - question: "Я маю ___ телефон. (I have my own phone)"
      explanation: "Use 'свій' because the owner is the subject 'Я'."
      options:
        - text: "свій"
          correct: true
        - text: "мій"
          correct: false
        - text: "його"
          correct: false
        - text: "твій"
          correct: false
    - question: "Він має ___ рюкзак. (He has his own backpack)"
      explanation: "Use 'свій' because the backpack belongs to the subject 'Він'."
      options:
        - text: "свій"
          correct: true
        - text: "його"
          correct: false
        - text: "мій"
          correct: false
        - text: "наш"
          correct: false
    - question: "Це ___ стіл. Він тут працює. (This is his table. He works here.)"
      explanation: "Use 'його' because the owner is NOT the subject of 'Це ... стіл'."
      options:
        - text: "його"
          correct: true
        - text: "свій"
          correct: false
        - text: "мій"
          correct: false
        - text: "наш"
          correct: false
    - question: "Ми маємо ___ дім. (We have our own house)"
      explanation: "Use 'свій' because it refers back to the subject 'Ми'."
      options:
        - text: "свій"
          correct: true
        - text: "наш"
          correct: false
        - text: "ваш"
          correct: false
        - text: "їхній"
          correct: false
    - question: "Це ___ книга. Вона тут читає. (This is her book. She reads here.)"
      explanation: "Use 'її' because the owner is NOT the subject of 'Це ... книга'."
      options:
        - text: "її"
          correct: true
        - text: "своя"
          correct: false
        - text: "моя"
          correct: false
        - text: "твоя"
          correct: false
    - question: "Вони мають ___ місто. (They have their own city)"
      explanation: "Use 'своє' because it refers back to the subject 'Вони'."
      options:
        - text: "своє"
          correct: true
        - text: "їхнє"
          correct: false
        - text: "наше"
          correct: false
        - text: "ваше"
          correct: false
    - question: "Ти маєш ___ ключі. (You have your own keys)"
      explanation: "Use 'свої' because it refers back to 'Ти'."
      options:
        - text: "свої"
          correct: true
        - text: "твої"
          correct: false
        - text: "мої"
          correct: false
        - text: "наші"
          correct: false
    - question: "Вона має ___ вікно. (She has her own window)"
      explanation: "Use 'своє' because it refers back to the subject 'Вона'."
      options:
        - text: "своє"
          correct: true
        - text: "її"
          correct: false
        - text: "моє"
          correct: false
        - text: "наше"
          correct: false

- type: true-false
  title: "Правила вживання 'свій'"
  instruction: "Identify if the statements about the pronoun 'свій' are true or false."
  items:
    - statement: "Займенник 'свій' вказує на приналежність підмету речення."
      correct: true
      explanation: "This is the primary function of the reflexive possessive."
    - statement: "Займенник 'свій' можна використовувати тільки для третьої особи."
      correct: false
      explanation: "'Свій' works for all persons: first, second, and third."
    - statement: "У реченні 'Він має його рюкзак' рюкзак належить йому."
      correct: false
      explanation: "If it belonged to the subject, we would use 'свій'."
    - statement: "Займенник 'свій' змінюється за родами та числами."
      correct: true
      explanation: "Yes, it matches the noun's gender and number (свій, своя, своє, свої)."
    - statement: "В українській мові 'свій' звучить більш природно, коли власник — підмет."
      correct: true
      explanation: "Native speakers prefer 'свій' for self-possession."
    - statement: "Займенники 'його' та 'її' є незмінними."
      correct: true
      explanation: "True, 'його' and 'її' do not change form."
    - statement: "Займенник 'їхній' не змінюється за родами."
      correct: false
      explanation: "'Їхній' is variable and matches the noun (їхній, їхня, їхнє, їхні)."
    - statement: "Слово 'чий' — це питання про приналежність."
      correct: true
      explanation: "Correct, 'чий' means 'whose'."

