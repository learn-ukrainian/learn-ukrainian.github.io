      options: ["Чий", "Чия", "Чиє", "Чиї"]

- type: quiz
  title: "Свій чи Його/Її?"
  instruction: "Choose the correct pronoun to show possession by the subject of the sentence."
  items:
    - question: "Я люблю ___ країну. (I love my country)"
      explanation: "Use 'свою' because the owner is the subject 'Я'."
      options:
        - text: "свою"
          correct: true
        - text: "мою"
          correct: false
        - text: "твою"
          correct: false
        - text: "його"
          correct: false
    - question: "Він читає ___ книгу. (He reads his own book)"
      explanation: "Use 'свою' to show it's his own book, not someone else's."
      options:
        - text: "свою"
          correct: true
        - text: "його"
          correct: false
        - text: "її"
          correct: false
        - text: "твою"
          correct: false
    - question: "Ми знаємо ___ роботу. (We know our work)"
      explanation: "Use 'свою' as it refers back to the subject 'Ми'."
      options:
        - text: "свою"
          correct: true
        - text: "нашу"
          correct: false
        - text: "вашу"
          correct: false
        - text: "їхню"
          correct: false
    - question: "Ти бачиш ___ дім. (You see your house)"
      explanation: "Use 'свій' because it refers back to 'Ти'."
      options:
        - text: "свій"
          correct: true
        - text: "твій"
          correct: false
        - text: "мій"
          correct: false
        - text: "наш"
          correct: false
    - question: "Вона взяла ___ сумку. (She took her own bag)"
      explanation: "Use 'свою' to clarify it belongs to the subject 'Вона'."
      options:
        - text: "свою"
          correct: true
        - text: "її"
          correct: false
        - text: "мою"
          correct: false
        - text: "його"
          correct: false
    - question: "Вони люблять ___ місто. (They love their city)"
      explanation: "Use 'своє' because the owners are the subject 'Вони'."
      options:
        - text: "своє"
          correct: true
        - text: "їхнє"
          correct: false
        - text: "наше"
          correct: false
        - text: "ваше"
          correct: false
    - question: "Він бачить ___ друга. (He sees his own friend)"
      explanation: "Use 'свого' because the friend belongs to the subject 'Він'."
      options:
        - text: "свого"
          correct: true
        - text: "його"
          correct: false
        - text: "мій"
          correct: false
        - text: "твій"
          correct: false
    - question: "Я маю ___ рюкзак. (I have my own backpack)"
      explanation: "Use 'свій' as it refers back to 'Я'."
      options:
        - text: "свій"
          correct: true
        - text: "мій"
          correct: false
        - text: "наш"
          correct: false
        - text: "ваш"
          correct: false

- type: true-false
  title: "Правила вживання 'свій'"
  instruction: "Identify if the statements about the pronoun 'свій' are true or false."
  items:
    - statement: "Займенник 'свій' вказує на приналежність підмету речення."
      correct: true
      explanation: "This is the primary function of the reflexive possessive."
    - statement: "Займенник 'свій' можна використовувати тільки для третьої особи."
      correct: false
      explanation: "'Свій' works for all persons: first, second, and third."
    - statement: "У реченні 'Він взяв його сумку' сумка належить підмету."
      correct: false
      explanation: "If it belonged to the subject, we would use 'свою'."
    - statement: "Займенник 'свій' змінюється за родами та числами."
      correct: true
      explanation: "Yes, it matches the noun's gender and number (свій, своя, своє, свої)."
    - statement: "В українській мові 'свій' звучить більш природно, коли власник — підмет."
      correct: true
      explanation: "Native speakers prefer 'свій' for self-possession."
    - statement: "Займенники 'його' та 'її' є незмінними."
      correct: true
      explanation: "True, 'його' and 'її' do not change form."
    - statement: "Займенник 'їхній' не змінюється за родами."
      correct: false
      explanation: "'Їхній' is variable and matches the noun (їхній, їхня, їхнє, їхні)."
    - statement: "Слово 'чий' — це питання про приналежність."
      correct: true
      explanation: "Correct, 'чий' means 'whose'."

