- type: fill-in
  title: "Change the Gender"
  instruction: "The noun changed! Choose the new correct pronoun."
  items:
    - sentence: "Мій брат —> __ сестра."
      answer: "моя"
      options: ["моя", "мій", "моє", "мої"]
      explanation: "Сестра is feminine."
    - sentence: "Твій дім —> __ кімната."
      answer: "твоя"
      options: ["твоя", "твій", "твоє", "твої"]
      explanation: "Кімната is feminine."
    - sentence: "Наш друг —> __ місто."
      answer: "наше"
      options: ["наше", "наш", "наша", "наші"]
      explanation: "Місто is neuter."
    - sentence: "Ваш паспорт —> __ сумка."
      answer: "ваша"
      options: ["ваша", "ваш", "ваше", "ваші"]
      explanation: "Сумка is feminine."
    - sentence: "Його кіт —> __ кішка."
      answer: "його"
      options: ["його", "її", "їхня", "своя"]
      explanation: "Його never changes."
    - sentence: "Її син —> __ донька."
      answer: "її"
      options: ["її", "його", "їхня", "своя"]
      explanation: "Її never changes."
    - sentence: "Їхній дім —> __ проблема."
      answer: "їхня"
      options: ["їхня", "їхній", "їхнє", "їхні"]
      explanation: "Проблема is feminine."
    - sentence: "Мій стіл —> __ вікно."
      answer: "моє"
      options: ["моє", "мій", "моя", "мої"]
      explanation: "Вікно is neuter."

