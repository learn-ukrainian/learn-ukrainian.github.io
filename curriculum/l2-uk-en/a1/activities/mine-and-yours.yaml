- type: fill-in
  title: "Чия це річ?"
  instruction: "Complete the dialogue with the correct question word (Чий, Чия, Чиє, Чиї)."
  items:
    - sentence: "— ___ це паспорт? — Це мій паспорт."
      answer: "Чий"
      options: ["Чий", "Чия", "Чиє", "Чиї"]
    - sentence: "— ___ це сумка? — Це твоя сумка."
      answer: "Чия"
      options: ["Чий", "Чия", "Чиє", "Чиї"]
    - sentence: "— ___ це вікно? — Це наше вікно."
      answer: "Чиє"
      options: ["Чий", "Чия", "Чиє", "Чиї"]
    - sentence: "— ___ це речі? — Це ваші речі."
      answer: "Чиї"
      options: ["Чий", "Чия", "Чиє", "Чиї"]
    - sentence: "— ___ це телефон? — Це його телефон."
      answer: "Чий"
      options: ["Чий", "Чия", "Чиє", "Чиї"]
    - sentence: "— ___ це книга? — Це її книга."
      answer: "Чия"
      options: ["Чий", "Чия", "Чиє", "Чиї"]
    - sentence: "— ___ це стіл? — Це наш стіл."
      answer: "Чий"
      options: ["Чий", "Чия", "Чиє", "Чиї"]
    - sentence: "— ___ це аптека? — Це їхня аптека."
