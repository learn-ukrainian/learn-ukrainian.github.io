- type: match-up
  title: "Match the Word to Its Meaning"
  instruction: "Match the Ukrainian possessive word to its English translation."
  pairs:
    - left: "мій"
      right: "my (for a masculine word)"
    - left: "моя"
      right: "my (for a feminine word)"
    - left: "моє"
      right: "my (for a neuter word)"
    - left: "його"
      right: "his / its"
    - left: "її"
      right: "her"
    - left: "наш"
      right: "our (for a masculine word)"
    - left: "ваш"
      right: "your formal (for a masculine word)"
    - left: "їхній"
      right: "their"

- type: fill-in
  title: "Choose the Correct My or Your"
  instruction: "Complete the sentence with the correct possessive word based on the object."
  items:
    - sentence: "Це [blank] паспорт. (my)"
      answer: "мій"
      options:
        - "мій"
        - "моя"
        - "моє"
        - "мої"
      explanation: "Паспорт is masculine, so we use мій."
    - sentence: "Де [blank] сумка? (your informal)"
      answer: "твоя"
      options:
        - "твій"
        - "твоя"
        - "твоє"
        - "твої"
      explanation: "Сумка is feminine, so we use твоя."
    - sentence: "Це [blank] місто. (my)"
      answer: "моє"
      options:
        - "мій"
        - "моя"
        - "моє"
        - "мої"
      explanation: "Місто is neuter, so we use моє."
    - sentence: "Тут лежить [blank] телефон. (your informal)"
      answer: "твій"
      options:
        - "твій"
        - "твоя"
        - "твоє"
        - "твої"
      explanation: "Телефон is masculine, so we use твій."
    - sentence: "[blank] країна дуже гарна. (our)"
      answer: "Наша"
      options:
        - "Наш"
        - "Наша"
        - "Наше"
        - "Наші"
      explanation: "Країна is feminine, so we use Наша."
    - sentence: "Це [blank] квиток? (your formal)"
      answer: "ваш"
      options:
        - "ваш"
        - "ваша"
        - "ваше"
        - "ваші"
      explanation: "Квиток is masculine, so we use ваш."
    - sentence: "[blank] адреса тут. (my)"
      answer: "Моя"
      options:
        - "Мій"
        - "Моя"
        - "Моє"
        - "Мої"
      explanation: "Адреса is feminine, so we use Моя."
    - sentence: "Це [blank] рішення. (our)"
      answer: "наше"
      options:
        - "наш"
        - "наша"
        - "наше"
        - "наші"
      explanation: "Рішення is neuter, so we use наше."

