- type: fill-in
  title: "His Her and Their"
  instruction: "Complete the sentence with the correct third-person possessive word."
  items:
    - sentence: "[blank] машина нова. (His)"
      answer: "Його"
      options:
        - "Його"
        - "Її"
        - "Їхня"
        - "Своя"
      explanation: "Його means his."
    - sentence: "[blank] робота дуже цікава. (Her)"
      answer: "Її"
      options:
        - "Його"
        - "Її"
        - "Їхня"
        - "Своя"
      explanation: "Її means her."
    - sentence: "Це [blank] дім. (Their)"
      answer: "їхній"
      options:
        - "їхній"
        - "їх"
        - "його"
        - "її"
      explanation: "Їхній is the standard word for their."
    - sentence: "Я бачу [blank] телефон. (his)"
      answer: "його"
      options:
        - "його"
        - "її"
        - "їхній"
        - "свій"
      explanation: "Його means his."
    - sentence: "Де лежить [blank] паспорт? (her)"
      answer: "її"
      options:
        - "його"
        - "її"
        - "їхній"
        - "ваш"
      explanation: "Її means her."
    - sentence: "[blank] сім'я живе там. (Their)"
      answer: "Їхня"
      options:
        - "Його"
        - "Її"
        - "Їхня"
        - "Наша"
      explanation: "Сім'я is feminine, so їхній becomes їхня."
    - sentence: "Це [blank] друг. (his)"
      answer: "його"
      options:
        - "його"
        - "її"
        - "їхній"
        - "свій"
      explanation: "Його means his."
    - sentence: "[blank] рішення дуже гарне. (Their)"
      answer: "Їхнє"
      options:
        - "Його"
        - "Її"
        - "Їхнє"
        - "Їхній"
      explanation: "Рішення is neuter, so їхній becomes їхнє."

