- type: true-false
  title: "True or False Rules of Possession"
  instruction: "Decide if the rule about Ukrainian possession is true or false."
  items:
    - statement: "The word for 'my' changes its shape to match the gender of the owner."
      correct: false
      explanation: "Possessive words must agree with the object possessed, not the owner."
    - statement: "The words його (his) and її (her) never change their form."
      correct: true
      explanation: "They are invariable and stay the same regardless of what object is owned."
    - statement: "You should use 'твоя' when speaking formally to a stranger."
      correct: false
      explanation: "You use 'ваш' or 'ваша' for strangers and formal situations. 'Твоя' is informal."
    - statement: "The Ukrainian word for 'whose' changes depending on the object's gender."
      correct: true
      explanation: "Yes, it changes to чий, чия, чиє, or чиї."
    - statement: "If a man owns a bag (сумка), he must say 'мій сумка' because he is a man."
      correct: false
      explanation: "The pronoun must match the object. Сумка is feminine, so it must be 'моя сумка'."
    - statement: "Using 'їх' to mean 'their' is standard and correct in Ukrainian."
      correct: false
      explanation: "'Їхній' is the correct standard word. Using 'їх' as a possessive is incorrect."
    - statement: "You use 'свій' when the person doing the action owns the object they are interacting with."
      correct: true
      explanation: "'Свій' is the reflexive possessive that means 'one's own'."
    - statement: "The transition from 'ваш' to 'твій' is an important step in building a closer relationship."
      correct: true
      explanation: "This shift is called 'перехід на ти' and marks moving to a warmer relationship."

- type: quiz
  title: "Choose the Right Pronoun"
  instruction: "Select the correct Ukrainian translation for the situation."
  items:
    - question: "How do you say 'his car' in Ukrainian?"
      explanation: "Його is invariable and always means his."
      options:
        - text: "його машина"
          correct: true
        - text: "її машина"
          correct: false
        - text: "свій машина"
          correct: false
        - text: "чия машина"
          correct: false
    - question: "You want to ask 'Whose bag is this?'. What is correct?"
      explanation: "Bag (сумка) is feminine, so we need the feminine question word."
      options:
        - text: "Чия це сумка?"
          correct: true
        - text: "Чий це сумка?"
          correct: false
        - text: "Чиє це сумка?"
          correct: false
        - text: "Чиї це сумка?"
          correct: false
    - question: "How do you politely ask a stranger 'Is this your ticket?'"
      explanation: "For strangers, use formal 'ваш'. Ticket (квиток) is masculine."
      options:
        - text: "Це ваш квиток?"
          correct: true
        - text: "Це твій квиток?"
          correct: false
        - text: "Це наша квиток?"
          correct: false
        - text: "Це ваша квиток?"
          correct: false
    - question: "A woman says 'This is my passport'. How does she say it?"
      explanation: "Passport (паспорт) is masculine, so the pronoun must be masculine, even if a woman is speaking."
      options:
        - text: "Це мій паспорт."
          correct: true
        - text: "Це моя паспорт."
          correct: false
        - text: "Це моє паспорт."
          correct: false
        - text: "Це його паспорт."
          correct: false
    - question: "How do you say 'their house' using the standard literary word?"
      explanation: "The correct standard word for their is їхній."
      options:
        - text: "їхній будинок"
          correct: true
        - text: "їх будинок"
          correct: false
        - text: "ваш будинок"
          correct: false
        - text: "свій будинок"
          correct: false
    - question: "He is reading his own book. Which word is best for 'his own'?"
      explanation: "When the subject owns the object, we use a form of свій."
      options:
        - text: "свою"
          correct: true
        - text: "його"
          correct: false
        - text: "її"
          correct: false
        - text: "мою"
          correct: false
    - question: "How do you say 'her work'?"
      explanation: "The word її is invariable and means her."
      options:
        - text: "її робота"
          correct: true
        - text: "його робота"
          correct: false
        - text: "свій робота"
          correct: false
        - text: "їхня робота"
          correct: false
    - question: "You are talking to your best friend about their phone. What do you use?"
      explanation: "With close friends, use the informal твій. Phone (телефон) is masculine."
      options:
        - text: "твій телефон"
          correct: true
        - text: "ваш телефон"
          correct: false
        - text: "мій телефон"
          correct: false
        - text: "твоя телефон"
          correct: false

