workbook:
- id: match-up-questions
  type: match-up
  instruction: З'єднайте запитання з відповіддю (Match the question with the answer)
  pairs:
  - left: Де ти живеш?
    right: У Києві.
  - left: Куди ти йдеш?
    right: У магазин.
  - left: Звідки ви?
    right: З Канади.
  - left: Де музей?
    right: У центрі.
  - left: Куди їде автобус?
    right: На вокзал.
  - left: Звідки ти їдеш?
    right: З роботи.
  - left: Де аптека?
    right: Направо.
  - left: Звідки вони?
    right: Зі США.
  - left: Куди вона йде?
    right: На роботу.
  - left: Де зараз студент?
    right: У школі.
- id: true-false-locations
  type: true-false
  instruction: Правда чи ні? (True or False?)
  items:
  - statement: Фраза «у школі» відповідає на запитання Де? (Where?)
    correct: true
    explanation: Це локація (статичне місце).
  - statement: Фраза «на роботу» відповідає на запитання Звідки? (From where?)
    correct: false
    explanation: «На роботу» — це напрямок, відповідає на запитання Куди? (To where?).
  - statement: Фраза «з Канади» відповідає на запитання Звідки? (From where?)
    correct: true
    explanation: Це походження або початкова точка.
  - statement: Фраза «у Львів» відповідає на запитання Де? (Where?)
    correct: false
    explanation: «У Львів» — це напрямок руху, відповідає на запитання Куди? (To where?).
  - statement: Фраза «в центрі» відповідає на запитання Де? (Where?)
    correct: true
    explanation: Це статичне місце.
  - statement: Фраза «зі школи» відповідає на запитання Куди? (To where?)
    correct: false
    explanation: «Зі школи» — це початкова точка, відповідає на запитання Звідки?
      (From where?).
  - statement: Фраза «на площі» відповідає на запитання Де? (Where?)
    correct: true
    explanation: Це локація (статичне місце).
  - statement: Фраза «в театр» відповідає на запитання Куди? (To where?)
    correct: true
    explanation: Це напрямок руху.
  - statement: Фраза «з роботи» відповідає на запитання Де? (Where?)
    correct: false
    explanation: «З роботи» відповідає на запитання Звідки? (From where?).
  - statement: Фраза «в Україну» відповідає на запитання Куди? (To where?)
    correct: true
    explanation: Це напрямок (Accusative case).
