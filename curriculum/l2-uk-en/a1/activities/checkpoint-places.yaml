version: '1.0'
module: checkpoint-places
level: a1
inline:
- id: quiz-question-choice
  type: quiz
  instruction: Оберіть правильне запитання (Choose the correct question)
  items:
  - question: _____ ти живеш? — У Києві.
    options:
    - Де
    - Куди
    - Звідки
    correct: 0
  - question: _____ ти йдеш? — У магазин.
    options:
    - Де
    - Куди
    - Звідки
    correct: 1
  - question: _____ ви? — Ми з Канади.
    options:
    - Де
    - Куди
    - Звідки
    correct: 2
  - question: _____ музей? — У центрі.
    options:
    - Де
    - Куди
    - Звідки
    correct: 0
  - question: _____ їде автобус? — На вокзал.
    options:
    - Де
    - Куди
    - Звідки
    correct: 1
  - question: _____ ти їдеш? — З роботи.
    options:
    - Де
    - Куди
    - Звідки
    correct: 2
  - question: _____ аптека? — Направо.
    options:
    - Де
    - Куди
    - Звідки
    correct: 0
  - question: _____ вони? — Зі США.
    options:
    - Де
    - Куди
    - Звідки
    correct: 2
- id: group-sort-cases
  type: group-sort
  instruction: Розподіліть фрази за категоріями (Sort the phrases by category)
  groups:
  - label: Локація (Де?)
    items:
    - у школі
    - на площі
    - в центрі
  - label: Напрямок (Куди?)
    items:
    - на роботу
    - у Львів
    - в Канаду
  - label: Походження (Звідки?)
    items:
    - з України
    - зі США
    - з роботи
- id: quiz-euphony-check
  type: quiz
  instruction: Оберіть правильний варіант для милозвучності (Choose the correct option
    for euphony)
  items:
  - question: Брат _____ сестра
    options:
    - і
    - й
    - та
    correct: 0
  - question: Вона живе _____ Львові
    options:
    - у
    - в
    - на
    correct: 0
  - question: Я йду _____ школи
    options:
    - зі
    - з
    - із
    correct: 0
  - question: Він _____ Києві
    options:
    - у
    - в
    - на
    correct: 0
  - question: Мама _____ тато
    options:
    - й
    - і
    - та
    correct: 0
  - question: Ми _____ України
    options:
    - з
    - із
    - зі
    correct: 0
  - question: Я _____ кімнаті
    options:
    - в
    - у
    - на
    correct: 0
  - question: Вона _____ США
    options:
    - зі
    - з
    - із
    correct: 0
- id: fill-in-dialogue-forms
  type: fill-in
  instruction: Вставте правильні фрази в діалог (Complete the dialogue with the correct
    phrases)
  items:
  - sentence: Вибачте, я _____. Де тут музей?
    answer: з Канади
    options:
    - з Канади
    - в Канаді
    - в Канаду
  - sentence: Музей _____. Ідіть на метро.
    answer: у центрі
    options:
    - у центрі
    - в центр
    - з центру
  - sentence: А як дістатися _____?
    answer: від метро
    options:
    - від метро
    - на метро
    - в метро
  - sentence: Вийдіть і йдіть _____. Музей на площі.
    answer: направо
    options:
    - направо
    - направі
    - справа
  - sentence: Я хочу їхати _____. Де вокзал?
    answer: у Львів
    options:
    - у Львів
    - у Львові
    - зі Львова
  - sentence: Вокзал далеко, їдьте _____.
    answer: на метро
    options:
    - на метро
    - в метро
    - з метро
workbook:
- id: true-false-reading
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Марк зараз у Польщі.
    correct: false
    explanation: Він з Польщі, але зараз у Києві.
  - statement: Його готель у центрі.
    correct: true
    explanation: Так, його готель у центрі міста.
  - statement: Марк іде на вокзал пішки.
    correct: false
    explanation: Вокзал далеко, він їде на метро.
  - statement: Золоті ворота близько.
    correct: true
    explanation: Так, Золоті ворота близько, він вже біля музею.
  - statement: Музей на площі.
    correct: true
    explanation: Так, музей знаходиться на площі.
  - statement: Марк іде наліво до музею.
    correct: false
    explanation: Він іде направо.
- id: error-correction-cases
  type: error-correction
  instruction: Знайдіть і виправте помилку (Find and correct the mistake)
  items:
  - sentence: Я живу в Київ.
    error: в Київ
    correction: у Києві
    error_type: word
    options:
    - у Києві
    - з Києва
    - на Києві
    explanation: 'For location (Де?), use the Locative case: у Києві.'
  - sentence: Вона йде на школі.
    error: на школі
    correction: у школу
    error_type: word
    options:
    - у школу
    - у школі
    - зі школи
    explanation: 'For direction (Куди?), use the Accusative case: у школу.'
  - sentence: Ми їдемо з автобусі.
    error: з автобусі
    correction: на автобусі
    error_type: word
    options:
    - на автобусі
    - в автобус
    - автобусом
    explanation: 'For transport, use на + Locative: на автобусі.'
  - sentence: Я з Канаді.
    error: з Канаді
    correction: з Канади
    error_type: word
    options:
    - з Канади
    - в Канаді
    - в Канаду
    explanation: 'For origin (Звідки?), use з + Genitive: з Канади.'
  - sentence: Музей в площі.
    error: в площі
    correction: на площі
    error_type: word
    options:
    - на площі
    - на площу
    - з площі
    explanation: 'For open spaces like a square, use на: на площі.'
  - sentence: Він працює в роботі.
    error: в роботі
    correction: на роботі
    error_type: word
    options:
    - на роботі
    - на роботу
    - з роботи
    explanation: 'For abstract locations or events like work, use на: на роботі.'
- id: match-up-questions
  type: match-up
  instruction: З'єднайте запитання та логічну відповідь (Match the question with the
    logical answer)
  pairs:
  - left: Де ти живеш?
    right: У Києві.
  - left: Куди ти йдеш?
    right: У магазин.
  - left: Звідки ти?
    right: З Канади.
  - left: Де вокзал?
    right: Прямо і направо.
  - left: Як дістатися?
    right: Їдьте на метро.
  - left: Де аптека?
    right: Близько, на площі.
- id: unjumble-sentences
  type: unjumble
  instruction: Складіть правильне речення зі слів (Put the words in the correct order)
  items:
  - words:
    - у
    - Я
    - Києві.
    - зараз
    correct_order:
    - Я
    - зараз
    - у
    - Києві.
  - words:
    - метро.
    - Ідіть
    - на
    correct_order:
    - Ідіть
    - на
    - метро.
  - words:
    - Канади.
    - з
    - я
    - Вибачте,
    correct_order:
    - Вибачте,
    - я
    - з
    - Канади.
  - words:
    - площі.
    - Музей
    - на
    correct_order:
    - Музей
    - на
    - площі.
  - words:
    - у
    - хочу
    - їхати
    - Я
    - Львів.
    correct_order:
    - Я
    - хочу
    - їхати
    - у
    - Львів.
  - words:
    - тут
    - Де
    - музей?
    correct_order:
    - Де
    - тут
    - музей?
- id: order-dialogue
  type: order
  instruction: Розставте репліки діалогу в правильному порядку (Put the dialogue lines
    in the correct order)
  items:
  - — Вибачте, я з Канади. Де тут музей?
  - — Музей у центрі. Ідіть на метро.
  - — А як дістатися від метро?
  - — Вийдіть і йдіть направо.
  - — Дякую!
  correct_order:
  - 0
  - 1
  - 2
  - 3
  - 4
