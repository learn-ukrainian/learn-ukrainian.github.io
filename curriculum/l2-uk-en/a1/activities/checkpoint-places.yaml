workbook:
- type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Томас із Канади.
    correct: true
    explanation: Томас says 'Я з Канади.'
  - statement: Вранці Томас їде на метро.
    correct: true
    explanation: '''Вранці я їду на метро до станції Хрещатик.'''
  - statement: Музей знаходиться за рогом від входу в метро.
    correct: false
    explanation: Музей на площі. Треба їхати до станції Арсенальна, потім іти пішки.
  - statement: Вранці Томас іде пішки до Хрещатика.
    correct: false
    explanation: Він їде на метро, не пішки.
  - statement: Увечері Томас у готелі.
    correct: true
    explanation: '''Увечері я у готелі.'''
  - statement: Томас хоче їхати у Харків.
    correct: false
    explanation: 'Він хоче їхати у Львів: ''Хочу їхати у Львів!'''
  - statement: Зі станції метро треба іти направо.
    correct: true
    explanation: '''Виходжу зі станції. Іду направо.'''
  - statement: Від зупинки до Лаври треба їхати ще одну зупинку.
    correct: false
    explanation: Від зупинки до Лаври пішки — п'ять хвилин.
- type: match-up
  instruction: З'єднайте місце з правильною формою (Match the place with its locative
    form)
  pairs:
  - left: музей
    right: у музеї
  - left: вокзал
    right: на вокзалі
  - left: площа
    right: на площі
  - left: парк
    right: в парку
  - left: готель
    right: у готелі
  - left: бібліотека
    right: у бібліотеці
  - left: станція
    right: на станції
  - left: вулиця
    right: на вулиці
- type: error-correction
  instruction: Знайдіть помилку і виправте (Find the error and correct it)
  items:
  - sentence: Я живу у Канаду.
    error: Канаду
    correction: Канаді
    explanation: 'Де? (location) → locative: у Канаді. Accusative (Канаду) answers
      Куди? — direction, not location.'
  - sentence: Ми їдемо зі України.
    error: зі
    correction: з
    explanation: Зі is used before consonant clusters. Україна starts with a vowel
      (У) → з України.
  - sentence: Автобус їде на вокзалі.
    error: вокзалі
    correction: вокзал
    explanation: 'Куди? (direction) → accusative: на вокзал. Locative (вокзалі) answers
      Де? — static location, not motion.'
  - sentence: Вона і Андрій у школі.
    error: і
    correction: й
    explanation: After a vowel (Вона ends in а), use й. Й is the short form used between
      words when the preceding word ends in a vowel.
  - sentence: Він у Канада.
    error: Канада
    correction: Канаді
    explanation: 'У + locative for location. The noun needs a locative ending: у Канаді
      (not the base form Канада).'
  - sentence: Музей на вулицю Грушевського.
    error: вулицю
    correction: вулиці
    explanation: 'Де? (location) → locative: на вулиці. Accusative (вулицю) would
      mean you are going to the street.'
