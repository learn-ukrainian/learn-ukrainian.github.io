- id: fill-in-day-description
  type: fill-in
  instruction: Доповніть текст (Complete the text)
  items:
  - sentence: ____ я прокидаюся і снідаю.
    answer: Спочатку
    options:
    - Спочатку
    - Потім
    - Нарешті
  - sentence: ____ я йду на роботу.
    answer: Потім
    options:
    - Потім
    - Вранці
    - Вночі
  - sentence: Я працюю з дев'ятої ____ п'ятої.
    answer: до
    options:
    - до
    - і
    - по
  - sentence: Після обіду я гуляю ____ парку.
    answer: в
    options:
    - в
    - у
    - на
  - sentence: Я гуляю, тому що сьогодні ____ і сонячно.
    answer: тепло
    options:
    - тепло
    - холодно
    - дощ
  - sentence: ____ я вечеряю і слухаю музику.
    answer: Ввечері
    options:
    - Ввечері
    - Вдень
    - Вранці
  - sentence: ____ я лягаю спати о дванадцятій.
    answer: Нарешті
    options:
    - Нарешті
    - Спочатку
    - Потім
  - sentence: Я часто читаю книги ____.
    answer: вдома
    options:
    - вдома
