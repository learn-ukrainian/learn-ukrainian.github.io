    - тепло
- id: match-up-logical-answers
  type: match-up
  instruction: З'єднайте запитання та відповідь (Match the question to the answer)
  pairs:
  - left: Котра година?
    right: Десята тридцять.
  - left: О котрій зустріч?
    right: О першій.
  - left: Яка сьогодні погода?
    right: Тепло і сонячно.
  - left: Коли твій день народження?
    right: У жовтні.
  - left: Що ти робиш у суботу?
    right: Я відпочиваю і читаю.
  - left: Що ти робиш вранці?
    right: Я прокидаюся о сьомій.
  - left: Ходімо в парк!
    right: Добре, о котрій?
  - left: Що ти робиш у вівторок?
    right: Я вивчаю українську мову.
  - left: Яка твоя улюблена пора року?
    right: Моя улюблена пора року — осінь.
  - left: Який твій улюблений місяць?
    right: Мій улюблений місяць — жовтень.
workbook:
- id: group-sort-time-expressions
  type: group-sort
  instruction: Розподіліть слова за категоріями (Sort words by categories)
  groups:
  - label: Година (Time)
    items:
    - о першій
    - котра година
    - десята тридцять
    - о п'ятій
  - label: Дні (Days)
    items:
    - у понеділок
    - в суботу
    - у вівторок
    - у неділю
  - label: Місяці та сезони (Months and seasons)
    items:
    - у січні
    - в серпні
    - взимку
    - восени
- id: true-false-reading-comprehension
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Оксані подобається осінь.
    correct: true
    explanation: 'Оксана каже: «Я люблю осінь».'
  - statement: Оксанин тиждень не дуже активний.
    correct: false
    explanation: 'Вона каже: «Мій тиждень дуже активний».'
  - statement: У понеділок вона відпочиває.
    correct: false
    explanation: У понеділок і середу Оксана працює.
  - statement: Вона працює з дев'ятої до п'ятої.
    correct: true
    explanation: Це її робочий час у понеділок і середу.
  - statement: У вівторок Оксана вивчає українську мову.
    correct: true
    explanation: Вона вивчає мову у вівторок.
  - statement: Восени дуже холодно.
    correct: false
    explanation: За текстом, восени тепло.
  - statement: Взимку часто йде сніг.
    correct: true
    explanation: Взимку йде сніг і дуже холодно.
  - statement: На вихідних вона часто сидить вдома і не гуляє.
    correct: false
    explanation: На вихідних вона часто гуляє.
  - statement: Оксана ніколи не ходить в кіно.
    correct: false
    explanation: Вона читає книги вдома або йде в кіно.
  - statement: У середу вона працює.
    correct: true
    explanation: У понеділок і середу вона працює.
