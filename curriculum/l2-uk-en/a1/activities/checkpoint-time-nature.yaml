version: '1.0'
module: checkpoint-time-nature
level: a1
inline:
- id: fill-in-mixed-review
  type: fill-in
  instruction: Оберіть правильний варіант (Choose the correct option)
  items:
  - sentence: Зустріч ____ годині.
    answer: о п'ятій
    options:
    - о п'ятій
    - в п'ятій
    - у п'ята
  - sentence: Ми йдемо в кіно ____.
    answer: у суботу
    options:
    - у суботу
    - в суботі
    - на суботу
  - sentence: Мій день народження ____.
    answer: у січні
    options:
    - у січні
    - в січень
    - січень
  - sentence: Сьогодні ____ і холодно.
    answer: іде дощ
    options:
    - іде дощ
    - іде дощова
    - дощить
  - sentence: Взимку дуже ____.
    answer: холодно
    options:
    - холодно
    - спекотно
    - тепло
  - sentence: Я прокидаюся о сьомій ____.
    answer: ранку
    options:
    - ранку
    - рано
    - вранці
- id: match-up-logical-logic
  type: match-up
  instruction: З'єднайте питання з логічною відповіддю (Match questions to logical
    answers)
  pairs:
  - left: Котра година?
    right: Десята тридцять.
  - left: О котрій зустріч?
    right: О першій.
  - left: Яка сьогодні погода?
    right: Тепло і сонячно.
  - left: Коли твій день народження?
    right: У жовтні.
  - left: Що ти робиш у суботу?
    right: Граю у футбол.
  - left: Як часто ти читаєш?
    right: Кожен день ввечері.
  - left: Ходімо в парк!
    right: Добре, о котрій?
  - left: Що ти будеш робити завтра?
    right: Буду працювати.
- id: fill-in-routine-sequence
  type: fill-in
  instruction: Оберіть правильне слово (Choose the correct word)
  items:
  - sentence: ____ я прокидаюся і снідаю.
    answer: Спочатку
    options:
    - Спочатку
    - Потім
    - Нарешті
  - sentence: ____ я йду на роботу.
    answer: Потім
    options:
    - Потім
    - Вранці
    - Вночі
  - sentence: Я працюю з дев'ятої ____ п'ятої.
    answer: до
    options:
    - до
    - і
    - по
  - sentence: ____ я гуляю в парку.
    answer: Після обіду
    options:
    - Після обіду
    - Вранці
    - Вночі
  - sentence: Я гуляю, тому що сьогодні ____ і сонячно.
    answer: тепло
    options:
    - тепло
    - холодно
    - дощ
  - sentence: ____ я вечеряю і слухаю музику.
    answer: Ввечері
    options:
    - Ввечері
    - Вдень
    - Вранці
  - sentence: ____ я лягаю спати о дванадцятій.
    answer: Нарешті
    options:
    - Нарешті
    - Спочатку
    - Потім
workbook:
- type: quiz
  instruction: Оберіть правильний варіант (Choose the correct option)
  items:
  - question: Яке запитання правильне? (It is now one o'clock.)
    options:
    - Котра година?
    - О котрій зустріч?
    - Яка година?
    - Скільки годин?
    correct: 0
  - question: Яка форма правильна? (The meeting is at five o'clock.)
    options:
    - Зустріч о п'ятій годині.
    - Зустріч в п'яту годину.
    - Зустріч п'ята година.
    - Зустріч на п'яту годину.
    correct: 0
  - question: Який прийменник правильний? (in winter)
    options:
    - взимку
    - у зиму
    - на зимі
    - у зимку
    correct: 0
  - question: Як правильно сказати? (on Friday)
    options:
    - у п'ятницю
    - в п'ятницю
    - на п'ятницю
    - в п'ятниці
    correct: 0
  - question: Що означає «робочий тиждень»?
    options:
    - work week
    - weekend
    - Sunday
    - working day
    correct: 0
  - question: Яке слово зайве? (Which word is the odd one out?)
    options:
    - понеділок
    - вівторок
    - неділя
    - тиждень
    correct: 3
- type: group-sort
  instruction: Розподіліть слова за категоріями (Sort the words into categories)
  groups:
  - label: Час (Time)
    items:
    - година
    - вранці
    - ввечері
    - сьогодні
    - завтра
  - label: Погода (Weather)
    items:
    - сонячно
    - тепло
    - холодно
    - дощ
  - label: Дні (Days)
    items:
    - субота
    - середа
    - понеділок
    - неділя
- type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Слово «неділя» означає «week» англійською.
    correct: false
    explanation: «Неділя» means Sunday. Week is «тиждень».
  - statement: Ми використовуємо «о» або «об», коли говоримо про конкретний час (о
      котрій).
    correct: true
    explanation: Yes, we use «о» before consonants and «об» before vowels to specify
      time.
  - statement: Слово «влітку» (in summer) не потребує додаткового прийменника.
    correct: true
    explanation: Seasons function as standalone adverbs in Ukrainian (влітку, взимку).
  - statement: Правильно говорити «на середу» замість «у середу».
    correct: false
    explanation: For days of the week, use «у» or «в» + Accusative case (у середу).
  - statement: Запитання «Котра година?» використовується для подій у майбутньому.
    correct: false
    explanation: It is used to ask about the current time.
  - statement: Слова «спочатку», «потім», «нарешті» показують послідовність дій.
    correct: true
    explanation: Yes, they mean first, then, finally.
