    - scrambled: "я с щ а т"
      answer: "щастя"
    - scrambled: "ж ї а"
      answer: "їжа"
    - scrambled: "н д е ь"
      answer: "день"
    - scrambled: "б я у к л о"
      answer: "яблуко"
    - scrambled: "к а ф т"
