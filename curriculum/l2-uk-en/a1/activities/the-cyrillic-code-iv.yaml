- type: fill-in
  title: "Доповніть речення"
  instruction: "Choose the correct word to complete the sentence."
  items:
    - sentence: "Це моя дуже велика _____."
      answer: "сім'я"
      options: ["сім'я", "школа", "їжа", "сіль"]
    - sentence: "Я хочу пити чорний _____."
      answer: "чай"
      options: ["чай", "цукор", "день", "центр"]
    - sentence: "Завтра ми йдемо до _____."
      answer: "школи"
      options: ["школи", "центру", "Європи", "Львова"]
    - sentence: "Мені треба морська _____."
      answer: "сіль"
      options: ["сіль", "вода", "їжа", "сім'я"]
    - sentence: "Я купую свіже _____."
      answer: "м'ясо"
      options: ["м'ясо", "яблуко", "щастя", "чай"]
    - sentence: "Він працює в _____ міста."
