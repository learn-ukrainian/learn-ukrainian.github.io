      options: ["центрі", "школі", "Львові", "часі"]

- type: quiz
  title: "Перевірте знання: Звуки та букви"
  instruction: "Choose the correct answer for each phonetic rule."
  items:
    - question: "Яка літера позначає один злитий звук, як у слові cats?"
      explanation: "Літера Ц позначає один злитий звук."
      options:
        - text: "Ц"
          correct: true
        - text: "Ч"
          correct: false
        - text: "Ш"
          correct: false
        - text: "Щ"
          correct: false
    - question: "Яка літера позначає звук, який ми чуємо на початку слова church?"
      explanation: "Літера Ч звучить як у слові church."
      options:
        - text: "Ч"
          correct: true
        - text: "Ц"
          correct: false
        - text: "Ш"
          correct: false
        - text: "Щ"
          correct: false
    - question: "Яка з цих літер є подвійним м'яким шиплячим звуком?"
      explanation: "Літера Щ позначає подвійний м'який шиплячий звук."
      options:
        - text: "Щ"
          correct: true
        - text: "Ш"
          correct: false
        - text: "Ц"
          correct: false
        - text: "Ч"
          correct: false
    - question: "Яка йотована голосна завжди позначає два звуки і ніколи не пом'якшує приголосний?"
      explanation: "Літера Ї завжди позначає два звуки і ніколи не пом'якшує приголосні."
      options:
        - text: "Ї"
          correct: true
        - text: "Ю"
          correct: false
        - text: "Я"
          correct: false
        - text: "Є"
          correct: false
    - question: "Яка літера не має власного звуку, а лише пом'якшує попередній приголосний?"
      explanation: "М'який знак (Ь) лише пом'якшує попередній приголосний."
      options:
        - text: "Ь"
          correct: true
        - text: "Ї"
          correct: false
        - text: "Щ"
          correct: false
        - text: "Ц"
          correct: false
    - question: "Що ми використовуємо, щоб зберегти твердість приголосного перед йотованою голосною?"
      explanation: "Апостроф зберігає твердість приголосного перед йотованою голосною."
      options:
        - text: "апостроф"
          correct: true
        - text: "м'який знак"
          correct: false
        - text: "крапку"
          correct: false
        - text: "кому"
          correct: false
    - question: "Який звук позначає літера Ш у слові школа?"
      explanation: "Літера Ш позначає твердий шиплячий звук."
      options:
        - text: "твердий шиплячий"
          correct: true
        - text: "м'який шиплячий"
          correct: false
        - text: "дзвінкий"
          correct: false
        - text: "голосний"
          correct: false
    - question: "Скільки звуків позначає літера Я на початку слова яблуко?"
      explanation: "На початку слова літера Я позначає два звуки."
      options:
        - text: "два звуки"
          correct: true
        - text: "один звук"
          correct: false
        - text: "три звуки"
          correct: false
        - text: "жодного звуку"
          correct: false

