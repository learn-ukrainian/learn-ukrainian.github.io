activities:
  - type: quiz
    title: "Reflexive Verb Types"
    items:
      - question: "Which type of -ся verb is митися (to wash oneself)?"
        answer: "Reflexive (action to oneself)"
        options:
          - "Reflexive (action to oneself)"
          - "Reciprocal (each other)"
          - "Lexicalized (no reflexive meaning)"
      - question: "Which type is зустрічатися (to meet each other)?"
        answer: "Reciprocal (each other)"
        options:
          - "Reflexive (action to oneself)"
          - "Reciprocal (each other)"
          - "Lexicalized (no reflexive meaning)"
      - question: "Which type is сміятися (to laugh)?"
        answer: "Lexicalized (no reflexive meaning)"
        options:
          - "Reflexive (action to oneself)"
          - "Reciprocal (each other)"
          - "Lexicalized (no reflexive meaning)"
      - question: "Which type is дивитися (to watch)?"
        answer: "Lexicalized (no reflexive meaning)"
        options:
          - "Reflexive (action to oneself)"
          - "Reciprocal (each other)"
          - "Lexicalized (no reflexive meaning)"
      - question: "Which type is одягатися (to get dressed)?"
        answer: "Reflexive (action to oneself)"
        options:
          - "Reflexive (action to oneself)"
          - "Reciprocal (each other)"
          - "Lexicalized (no reflexive meaning)"
      - question: "Which type is прощатися (to say goodbye)?"
        answer: "Reciprocal (each other)"
        options:
          - "Reflexive (action to oneself)"
          - "Reciprocal (each other)"
          - "Lexicalized (no reflexive meaning)"
      - question: "Which type is усміхатися (to smile)?"
        answer: "Lexicalized (no reflexive meaning)"
        options:
          - "Reflexive (action to oneself)"
          - "Reciprocal (each other)"
          - "Lexicalized (no reflexive meaning)"
      - question: "Which type is боятися (to be afraid)?"
        answer: "Lexicalized (no reflexive meaning)"
        options:
          - "Reflexive (action to oneself)"
          - "Reciprocal (each other)"
          - "Lexicalized (no reflexive meaning)"

