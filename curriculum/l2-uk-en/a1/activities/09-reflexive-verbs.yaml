  - type: fill-in
    title: "Conjugate називатися"
    items:
      - sentence: "Як ти [!____]? (What's your name?)"
        answer: "називаєшся"
        options:
          - "називаюся"
          - "називаєшся"
          - "називається"
          - "називаємося"
      - sentence: "Я [!____] Олена. (My name is Olena.)"
        answer: "називаюся"
        options:
          - "називаюся"
          - "називаєшся"
          - "називається"
          - "називаються"
      - sentence: "Він [!____] Тарас. (His name is Taras.)"
        answer: "називається"
        options:
          - "називаюся"
          - "називаєшся"
          - "називається"
          - "називаються"
      - sentence: "Вона [!____] Марія. (Her name is Maria.)"
        answer: "називається"
        options:
          - "називаюся"
          - "називаєтеся"
          - "називається"
          - "називаються"
      - sentence: "Ми [!____] студенти. (We are called students.)"
        answer: "називаємося"
        options:
          - "називаєшся"
          - "називаємося"
          - "називаєтеся"
          - "називаються"
      - sentence: "Як ви [!____]? (What are your names?)"
        answer: "називаєтеся"
        options:
          - "називаємося"
          - "називаєтеся"
          - "називається"
          - "називаються"
      - sentence: "Вони [!____] друзі. (They are called friends.)"
        answer: "називаються"
        options:
          - "називається"
          - "називаємося"
          - "називаєтеся"
          - "називаються"
      - sentence: "Місто [!____] Київ. (The city is called Kyiv.)"
        answer: "називається"
        options:
          - "називаюся"
          - "називаєшся"
          - "називається"
          - "називаються"

  - type: error-correction
    title: "Fix -єся → -ється Errors"
    items:
      - sentence: "Вона усміхаєся."
        error: "усміхаєся"
        answer: "усміхається"
        options:
          - "усміхаєся"
          - "усміхається"
          - "усміхаюся"
          - "усміхаємося"
        explanation: "Third person singular requires -ється, not -єся!"
      - sentence: "Він одягаєся швидко."
        error: "одягаєся"
        answer: "одягається"
        options:
          - "одягаєся"
          - "одягається"
          - "одягаюся"
          - "одягаємося"
        explanation: "Always use -ється for він/вона: одягається"
      - sentence: "Вона дивися фільм."
        error: "дивися"
        answer: "дивиться"
        options:
          - "дивися"
          - "дивиться"
          - "дивлюся"
          - "дивимося"
        explanation: "Second conjugation -ся verbs: він/вона дивиться"
      - sentence: "Дитина сміється голосно."
        error: "сміється"
        answer: "сміється"
        options:
          - "сміється"
          - "сміється"
          - "сміюся"
          - "сміємося"
        explanation: "This is CORRECT! Дитина (it) uses -ється"
      - sentence: "Вони зустрічаєтся щодня."
        error: "зустрічаєтся"
        answer: "зустрічаються"
        options:
          - "зустрічаєтеся"
          - "зустрічаєтся"
          - "зустрічаються"
          - "зустрічаємося"
        explanation: "Plural вони needs -яться, not -єтся"
      - sentence: "Ми прощаєтся з друзями."
        error: "прощаєтся"
        answer: "прощаємося"
        options:
          - "прощаюся"
          - "прощаємося"
          - "прощаєтеся"
          - "прощаються"
        explanation: "First person plural ми requires -ємося"
      - sentence: "Він голитися вранці."
        error: "голитися"
        answer: "голиться"
        options:
          - "голитися"
          - "голиться"
          - "голюся"
          - "голимося"
        explanation: "Conjugate the verb! Він голиться (present tense)"
      - sentence: "Вона цікавиться музика."
        error: "цікавиться"
        answer: "цікавиться"
        options:
          - "цікавиться"
          - "цікавиться"
          - "цікавлюся"
          - "цікавимося"
        explanation: "This is CORRECT! Вона цікавиться (она is interested)"
      - sentence: "Він роздягаєся ввечері."
        error: "роздягаєся"
        answer: "роздягається"
        options:
          - "роздягаєся"
          - "роздягається"
          - "роздягаюся"
          - "роздягаємося"
        explanation: "Third person він requires -ається: роздягається"
      - sentence: "Ми називаєтся студенти."
        error: "називаєтся"
        answer: "називаємося"
        options:
          - "називаюся"
          - "називаємося"
          - "називаєтеся"
          - "називаєтся"
        explanation: "First person plural ми uses -аємося: називаємося"
      - sentence: "Дитя усміхаєтся."
        error: "усміхаєтся"
        answer: "усміхається"
        options:
          - "усміхається"
          - "усміхаєтся"
          - "усміхаємося"
          - "усміхаються"
        explanation: "Neuter дитя uses -ається: усміхається"
      - sentence: "Вони знайомиться з сусідами."
        error: "знайомиться"
        answer: "знайомляться"
        options:
          - "знайомиться"
          - "знайомляться"
          - "знайомимося"
          - "знайомитеся"
        explanation: "Plural вони uses -яться: знайомляться (2nd conj verb)"

  - type: fill-in
