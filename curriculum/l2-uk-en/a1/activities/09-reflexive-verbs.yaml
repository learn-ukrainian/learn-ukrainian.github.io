  - type: unjumble
    title: "Build Reflexive Sentences"
    items:
      - scrambled: "називаюся / я / Олег"
        answer: "Я називаюся Олег."
      - scrambled: "як / називаєшся / ти"
        answer: "Як ти називаєшся?"
      - scrambled: "усміхається / вона / часто"
        answer: "Вона часто усміхається."
      - scrambled: "дивимося / ми / фільм"
        answer: "Ми дивимося фільм."
      - scrambled: "запізнюється / він / на роботу"
        answer: "Він запізнюється на роботу."
      - scrambled: "зустрічаємося / ми / щодня"
        answer: "Ми зустрічаємося щодня."
      - scrambled: "вмиваєшся / ти / вранці"
        answer: "Ти вмиваєшся вранці?"
      - scrambled: "сміються / діти / голосно"
        answer: "Діти сміються голосно."

  - type: quiz
    title: "Reflexive Past Tense (Preview)"
    items:
      - question: "How do you say 'He was laughing'?"
        answer: "Він сміявся"
        options:
          - "Він сміявся"
          - "Він сміялася"
          - "Він сміялося"
          - "Він сміялися"
      - question: "How do you say 'She was laughing'?"
        answer: "Вона сміялася"
        options:
          - "Вона сміявся"
          - "Вона сміялася"
          - "Вона сміялося"
          - "Вона сміялися"
      - question: "How do you say 'They were laughing'?"
        answer: "Вони сміялися"
        options:
          - "Вони сміявся"
          - "Вони сміялася"
          - "Вони сміялося"
          - "Вони сміялися"
      - question: "How do you say 'The child was laughing' (дитина - neuter)?"
        answer: "Дитина сміялося"
        options:
          - "Дитина сміявся"
          - "Дитина сміялася"
          - "Дитина сміялося"
          - "Дитина сміялися"
      - question: "What ending does -ся become in past tense masculine?"
        answer: "-вся"
        options:
          - "-вся"
          - "-лася"
          - "-лося"
          - "-лися"
      - question: "What ending for past tense feminine?"
        answer: "-лася"
        options:
          - "-вся"
          - "-лася"
          - "-лося"
          - "-лися"
      - question: "What ending for past tense neuter?"
        answer: "-лося"
        options:
          - "-вся"
          - "-лася"
          - "-лося"
          - "-лися"
      - question: "What ending for past tense plural?"
        answer: "-лися"
        options:
          - "-вся"
          - "-лася"
          - "-лося"
          - "-лися"
