- type: quiz
  title: 'Перевірте знання: Де, Куди, Звідки'
  items:
  - question: Яке питання ми використовуємо для опису кінцевого напрямку руху?
    explanation: Питання Куди завжди означає кінцевий пункт нашого руху.
    options:
    - text: Куди?
      correct: true
    - text: Де?
      correct: false
    - text: Звідки?
      correct: false
    - text: Коли?
      correct: false
  - question: Яке питання підходить для опису статичного розташування об'єкта?
    explanation: Питання Де означає статичне розташування, без руху.
    options:
    - text: Де?
      correct: true
    - text: Куди?
      correct: false
    - text: Звідки?
      correct: false
    - text: Чому?
      correct: false
  - question: Яке питання ми ставимо, коли хочемо дізнатися точку старту?
    explanation: Питання Звідки означає початок нашого руху або походження.
    options:
    - text: Звідки?
      correct: true
    - text: Де?
      correct: false
    - text: Куди?
      correct: false
    - text: Як?
      correct: false
  - question: Який відмінок потрібен після коротких прийменників в та на для напрямку?
    explanation: Прийменники в та на для напрямку вимагають Знахідного відмінка.
    options:
    - text: Знахідний
      correct: true
    - text: Родовий
      correct: false
    - text: Місцевий
      correct: false
    - text: Називний
      correct: false
  - question: Який граматичний відмінок завжди потрібен після важливого питання Звідки?
    explanation: Для походження завжди і без винятків використовується Родовий відмінок.
    options:
    - text: Родовий
      correct: true
    - text: Знахідний
      correct: false
    - text: Місцевий
      correct: false
    - text: Давальний
      correct: false
  - question: Який прийменник ми використовуємо для фізичного руху в Україну?
    explanation: Для незалежних держав завжди використовується прийменник в.
    options:
    - text: в
      correct: true
    - text: на
      correct: false
    - text: до
      correct: false
    - text: з
      correct: false
  - question: Який прийменник ми використовуємо для руху до живої особи?
    explanation: Для руху до живої особи завжди потрібен прийменник до.
    options:
    - text: до
      correct: true
    - text: в
      correct: false
    - text: на
      correct: false
    - text: у
      correct: false
  - question: Як правильно запитати про напрямок руху вашого доброго друга?
    explanation: Питання Куди стосується напрямку руху.
    options:
    - text: Куди ти йдеш?
      correct: true
    - text: Де ти йдеш?
      correct: false
    - text: Звідки ти йдеш?
      correct: false
    - text: Чому ти йдеш?
      correct: false
  - question: Яке питання ви поставите, якщо друг повернувся з подорожі?
    explanation: Питання Звідки запитує про походження подорожі.
    options:
    - text: Звідки ти їдеш?
      correct: true
    - text: Куди ти їдеш?
      correct: false
    - text: Де ти їдеш?
      correct: false
    - text: Як ти їдеш?
      correct: false
  - question: Яке речення правильно описує напрямок руху всередину великої будівлі?
    explanation: Прийменник в плюс Знахідний відмінок означають рух всередину.
    options:
    - text: Я іду в магазин.
      correct: true
    - text: Я іду на магазин.
      correct: false
    - text: Я іду до магазин.
      correct: false
    - text: Я іду з магазин.
      correct: false
