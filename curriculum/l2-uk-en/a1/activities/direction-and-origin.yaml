- type: fill-in
  title: "Choose the Correct Preposition and Form"
  instruction: "Fill in the blank with the correct preposition and case form to express direction or origin."
  items:
    - sentence: "Я іду ___ магазин."
      answer: "в"
      options: ["в", "на", "до", "з"]
      explanation: "We use в + Accusative when going into a building like a store."
    - sentence: "Вона їде ___ роботу."
      answer: "на"
      options: ["в", "на", "до", "з"]
      explanation: "Work (робота) always takes на for both location and direction."
    - sentence: "Ми їдемо ___ Києва."
      answer: "до"
      options: ["в", "на", "до", "з"]
      explanation: "До + Genitive is used for direction toward a city."
    - sentence: "Він іде ___ лікаря."
      answer: "до"
      options: ["в", "на", "до", "від"]
      explanation: "When going to see a person, we use до + Genitive."
    - sentence: "Я ___ України."
      answer: "з"
      options: ["з", "від", "до", "на"]
      explanation: "We use з + Genitive to express origin from a place."
    - sentence: "Книжка ___ мами."
      answer: "від"
      options: ["з", "від", "до", "із"]
      explanation: "We use від + Genitive when something comes from a person."
    - sentence: "Вона іде ___ пошту."
      answer: "на"
      options: ["в", "на", "до", "від"]
      explanation: "Post office (пошта) is an institution and takes на for direction."
    - sentence: "Він ___ Львова."
      answer: "зі"
      options: ["з", "зі", "від", "до"]
      explanation: "We use зі before words starting with Л + consonant cluster (Львів → зі Львова)."
    - sentence: "Я їду ___ аеропорт."
      answer: "в"
      options: ["в", "на", "до", "з"]
      explanation: "We use в + Accusative when entering a building like an airport."
    - sentence: "Ми йдемо ___ школи."
      answer: "зі"
      options: ["з", "зі", "від", "до"]
      explanation: "We use зі before words starting with ш- (школа → зі школи)."
    - sentence: "Він іде ___ вокзал."
      answer: "на"
      options: ["в", "на", "до", "від"]
      explanation: "Station (вокзал) takes на for direction."
    - sentence: "Я іду ___ брата."
      answer: "до"
      options: ["в", "на", "до", "від"]
      explanation: "When going to see a person (brother), we use до + Genitive."

- type: quiz
  title: "Direction vs. Location"
  instruction: "Choose the correct answer for each question about Ukrainian direction and location."
  items:
    - question: "Which question word do you use to ask about direction (where to)?"
      options:
        - text: "Куди?"
          correct: true
        - text: "Де?"
          correct: false
        - text: "Звідки?"
          correct: false
        - text: "Коли?"
          correct: false
      explanation: "Куди? means Where to? and is used for direction. Де? means Where? for static location."
    - question: "What case does the preposition до require?"
      options:
        - text: "Genitive (Родовий)"
          correct: true
        - text: "Accusative (Знахідний)"
          correct: false
        - text: "Locative (Місцевий)"
          correct: false
        - text: "Dative (Давальний)"
          correct: false
      explanation: "До always requires the Genitive case, whether going to a person, city, or place."
    - question: "Which sentence means 'I am going to work'?"
      options:
        - text: "Я іду на роботу."
          correct: true
        - text: "Я іду на роботі."
          correct: false
        - text: "Я іду в роботу."
          correct: false
        - text: "Я іду з роботи."
          correct: false
      explanation: "Direction to work uses на + Accusative (роботу). Роботі is Locative (location, not direction)."
    - question: "Which preposition do you use when something comes from a person?"
      options:
        - text: "від"
          correct: true
        - text: "з"
          correct: false
        - text: "до"
          correct: false
        - text: "на"
          correct: false
      explanation: "Від + Genitive is used for from a person (від мами, від брата). З is for from a place."
    - question: "'Вона в школі' answers which question?"
      options:
        - text: "Де?"
          correct: true
        - text: "Куди?"
          correct: false
        - text: "Звідки?"
          correct: false
        - text: "Хто?"
          correct: false
      explanation: "В школі uses the Locative case, which answers Де? (Where? — static location)."
    - question: "How do you say 'I am from Ukraine'?"
      options:
        - text: "Я з України."
          correct: true
        - text: "Я від України."
          correct: false
        - text: "Я до України."
          correct: false
        - text: "Я в Україні."
          correct: false
      explanation: "We use з + Genitive for origin from a place. Від is only for people."
    - question: "Which form means 'to the doctor' (going to see the doctor)?"
      options:
        - text: "до лікаря"
          correct: true
        - text: "в лікаря"
          correct: false
        - text: "на лікаря"
          correct: false
        - text: "від лікаря"
          correct: false
      explanation: "When going to see a person, we use до + Genitive (до лікаря)."
    - question: "Why does Ukrainian use зі instead of з before школи?"
      options:
        - text: "Because школи starts with ш-, and зі is used before ш-/щ-/з-/с- sounds"
          correct: true
        - text: "Because школи is a feminine noun"
          correct: false
        - text: "Because it is in the Genitive case"
          correct: false
        - text: "Because школи is plural"
          correct: false
      explanation: "Ukrainian euphony rules require зі before words starting with з-, с-, ш-, щ- to keep the sentence flowing smoothly."
    - question: "What case do в/у and на take when expressing direction?"
      options:
        - text: "Accusative (Знахідний)"
          correct: true
        - text: "Genitive (Родовий)"
          correct: false
        - text: "Locative (Місцевий)"
          correct: false
        - text: "Nominative (Називний)"
          correct: false
      explanation: "For direction (Куди?), в/у and на take the Accusative case. For location (Де?), they take the Locative."
    - question: "'Він іде на вокзал' — what is вокзал in this sentence?"
      options:
        - text: "Accusative (direction — where to)"
          correct: true
        - text: "Nominative (dictionary form)"
          correct: false
        - text: "Locative (location)"
          correct: false
        - text: "Genitive (origin)"
          correct: false
      explanation: "Although вокзал looks like the dictionary form, here it is Accusative because masculine inanimate nouns have identical Nominative and Accusative forms."

- type: match-up
  title: "Match Question Word to Case and Preposition"
  instruction: "Match each question-preposition pair to the correct grammatical case it requires."
  pairs:
    - left: "Де? + в/на"
      right: "Locative (Місцевий)"
    - left: "Куди? + в/на"
      right: "Accusative (Знахідний)"
    - left: "Куди? + до"
      right: "Genitive (Родовий)"
    - left: "Звідки? + з/із/зі"
      right: "Genitive (from a place)"
    - left: "Звідки? + від"
      right: "Genitive (from a person)"
    - left: "в магазині"
      right: "Де? (Location)"
    - left: "в магазин"
      right: "Куди? (Direction)"
    - left: "з магазину"
      right: "Звідки? (Origin)"
    - left: "до лікаря"
      right: "To a person (direction)"
    - left: "від мами"
      right: "From a person (origin)"

- type: unjumble
  title: "Put the Words in Order"
  instruction: "Arrange the words to form a correct Ukrainian sentence about direction or origin."
  items:
    - words: ["іду", "Я", "магазин", "в"]
      answer: "Я іду в магазин"
    - words: ["їде", "Він", "Києва", "до"]
      answer: "Він їде до Києва"
    - words: ["іде", "Вона", "лікаря", "до"]
      answer: "Вона іде до лікаря"
    - words: ["з", "Я", "України"]
      answer: "Я з України"
    - words: ["роботу", "іду", "на", "Я"]
      answer: "Я іду на роботу"
    - words: ["школи", "іде", "зі", "Він"]
      answer: "Він іде зі школи"
    - words: ["їдемо", "Ми", "України", "до"]
      answer: "Ми їдемо до України"
    - words: ["від", "Книжка", "мами"]
      answer: "Книжка від мами"