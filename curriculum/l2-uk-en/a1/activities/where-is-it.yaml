- id: fill-in-de
  type: fill-in
  instruction: Дайте відповідь на запитання «Де?» (Answer the question «Where?»)
  items:
  - sentence: Олена _____.
    answer: в школі
    options:
    - в школі
    - на школі
    - в школу
  - sentence: Тарас _____.
    answer: на роботі
    options:
    - в роботі
    - на роботі
    - на роботу
  - sentence: Ми живемо _____.
    answer: у місті
    options:
    - у місті
    - на місті
    - у місто
  - sentence: Я зараз _____.
    answer: у банку
    options:
    - у банку
    - на банку
    - в банкі
  - sentence: Лікар _____.
    answer: у лікарні
    options:
    - в лікарні
    - на лікарні
    - у лікарню
  - sentence: Концерт _____.
    answer: на площі
    options:
    - у площі
    - на площі
    - на площу
  - sentence: Сусід _____.
    answer: у магазині
    options:
    - у магазині
    - на магазині
    - у магазин
  - sentence: Твій телефон _____.
    answer: на столі
    options:
    - у столі
    - на столі
    - на стіл
  title: Дайте відповідь на запитання «Де?» (Answer the question «Where?»)
workbook:
- id: wb-group-sort
  type: group-sort
  instruction: Розподіліть слова за прийменником (Sort the words by preposition)
  groups:
  - label: Він на... (відкриті простори, події)
    items:
    - вулиці
    - площі
    - роботі
    - концерті
    - вокзалі
    - пошті
  - label: Він у / в... (закриті простори, міста)
    items:
    - школі
    - банку
    - парку
    - лікарні
    - місті
    - Києві
    - офісі
    - магазині
  title: Розподіліть слова за прийменником (Sort the words by preposition)
- id: wb-error-correction
  type: error-correction
  instruction: Знайдіть і виправте помилку (Find and correct the error)
  items:
  - sentence: Я працюю на офісі.
    error: на офісі
    correction: в офісі
    error_type: phrase
    explanation: Офіс — це закрите приміщення (будівля), тому ми використовуємо прийменник
      «в» або «у».
  - sentence: Вона живе в вулиці Хрещатик.
    error: в вулиці
    correction: на вулиці
    error_type: phrase
    explanation: Зі словом «вулиця» (відкритий простір) ми завжди використовуємо прийменник
      «на».
  - sentence: Діти зараз у паркі.
    error: паркі
    correction: парку
    error_type: word
    explanation: Слово «парк» має закінчення -у в місцевому відмінку (у парку).
  - sentence: Тарас зараз у роботі.
    error: у роботі
    correction: на роботі
    error_type: phrase
    explanation: Для статусу (бути на роботі) українська мова завжди використовує
      прийменник «на».
  - sentence: Мій телефон в столі.
    error: в столі
    correction: на столі
    error_type: phrase
    explanation: Стіл — це пласка поверхня. Якщо річ знаходиться зверху, ми кажемо
      «на столі».
  - sentence: Олена зараз на Україні.
    error: на Україні
    correction: в Україні
    error_type: phrase
    explanation: Для країн завжди використовується прийменник «в» або «у».
  title: Знайдіть і виправте помилку (Find and correct the error)
- id: wb-true-false
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Слово «робота» використовує прийменник «на» (на роботі).
    correct: true
    explanation: Так, для слова «робота» ми завжди використовуємо «на».
  - statement: Для країн та міст ми часто використовуємо прийменник «на» (на Києві).
    correct: false
    explanation: Ні, країни та міста завжди використовують «в/у» (в Україні, у Києві).
  - statement: Слово «кафе» не змінює закінчення (в кафе).
    correct: true
    explanation: Слово «кафе» — невідмінюване, тому воно завжди має форму «кафе».
  - statement: Закриті приміщення (наприклад, магазин, аптека) зазвичай використовують
      «на».
    correct: false
    explanation: Закриті приміщення використовують «в/у» (у магазині, в аптеці).
  - statement: Правильно казати «на пошті» і «на вокзалі».
    correct: true
    explanation: Так, це традиційні фрази, які завжди використовуються з «на».
  - statement: Всі слова чоловічого роду мають закінчення -і в місцевому відмінку.
    correct: false
    explanation: Ні, багато слів (парк, банк, сад) мають закінчення -у (у парку, у
      банку).
  title: Правда чи ні? (True or false?)
- id: wb-unjumble
  type: unjumble
  instruction: Складіть правильне речення зі слів (Make a correct sentence from the
