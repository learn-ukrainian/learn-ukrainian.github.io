- type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: «На Україні» — це правильна форма.
    correct: false
    explanation: 'Неправильно. Правильно: «в Україні». Ukraine is a sovereign state
      — always «в Україні», never «на Україні».'
  - statement: Слово «кафе» змінює закінчення у місцевому відмінку (наприклад, «в
      кафі»).
    correct: false
    explanation: Неправильно. «Кафе» is an indeclinable noun — it never changes its
      ending. The correct form is always «в кафе».
  - statement: Місцевий відмінок відповідає на питання «Де?».
    correct: true
    explanation: Правильно. The locative case (М.в.) always answers the question «Де?»
      (Where?).
  - statement: Місцевий відмінок може стояти в реченні без прийменника.
    correct: false
    explanation: Неправильно. The locative case ALWAYS requires a preposition (в/у
      or на). It never stands alone in a sentence.
  - statement: Прийменник «на» вживається тільки з відкритими просторами.
    correct: false
    explanation: 'Не зовсім. «На» is also used by convention: «на роботі», «на вокзалі»,
      «на пошті» — these are set phrases, not always open spaces.'
  - statement: Міста та країни завжди вживаються з прийменником «в/у».
    correct: true
    explanation: 'Правильно. Cities and countries always use «в/у»: «в Україні», «у
      Києві», «у Харкові», «в Одесі».'
  - statement: Іменники жіночого роду у місцевому відмінку зазвичай мають закінчення
      «-і».
    correct: true
    explanation: 'Правильно. Feminine nouns usually take «-і» in the locative: школа
      → в школі, вулиця → на вулиці, лікарня → у лікарні.'
