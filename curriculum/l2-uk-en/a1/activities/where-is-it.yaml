version: '1.0'
module: where-is-it
level: a1
inline:
- id: match-nom-loc
  type: match-up
  instruction: З'єднайте називний і місцевий відмінки (Match nominative and locative
    cases)
  pairs:
  - left: школа
    right: в школі
  - left: лікарня
    right: у лікарні
  - left: місто
    right: у місті
  - left: вулиця
    right: на вулиці
  - left: парк
    right: у парку
  - left: банк
    right: у банку
  - left: вікно
    right: на вікні
  - left: кафе
    right: в кафе
  title: З'єднайте називний і місцевий відмінки (Match nominative and locative cases)
- id: quiz-loc-form
  type: quiz
  instruction: Де це? Оберіть правильну форму (Where is it? Choose the correct form)
  items:
  - question: Де Тарас? Він працює _____.
    options:
    - на офісі
    - в офісі
    - в офісу
    correct: 1
  - question: Де діти? Вони _____.
    options:
    - на парку
    - у паркі
    - у парку
    correct: 2
  - question: Де ви живете? Я живу _____.
    options:
    - у місті
    - на місті
    - у місту
    correct: 0
  - question: Де аптека? Вона _____.
    options:
    - у площі
    - на площі
    - на площа
    correct: 1
  - question: Де Олег? Він _____.
    options:
    - на робота
    - у роботі
    - на роботі
    correct: 2
  - question: Де мій телефон? Він _____.
    options:
    - на дивані
    - у дивані
    - на дивану
    correct: 0
  title: Де це? Оберіть правильну форму (Where is it? Choose the correct form)
