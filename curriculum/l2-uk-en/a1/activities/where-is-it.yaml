  - question: _____ роботі
    options:
    - в / у
    - на
    - з
    correct: 1
  - question: _____ парку
    options:
    - в / у
    - на
    - з
    correct: 0
  - question: _____ школі
    options:
    - в / у
    - на
    - з
    correct: 0
  - question: _____ концерті
    options:
    - в / у
    - на
    - з
    correct: 1
  - question: _____ Києві
    options:
    - в / у
    - на
    - з
    correct: 0
  - question: _____ магазині
    options:
    - в / у
    - на
    - з
    correct: 0
  - question: _____ вокзалі
    options:
    - в / у
