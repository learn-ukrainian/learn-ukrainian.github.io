workbook:
- type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Правильно говорити «на школі» (It is correct to say «на школі»).
    correct: false
    explanation: 'Школа (school) takes the preposition в: в школі.'
  - statement: Правильно говорити «на роботі» (It is correct to say «на роботі»).
    correct: true
    explanation: 'Робота (work) takes the preposition на: на роботі.'
  - statement: Правильно говорити «в вулиці» (It is correct to say «в вулиці»).
    correct: false
    explanation: 'Вулиця (street) takes the preposition на: на вулиці.'
  - statement: Правильно говорити «в Україні» (It is correct to say «в Україні»).
    correct: true
    explanation: 'Countries take the preposition в: в Україні.'
  - statement: Правильно говорити «у банку» (It is correct to say «у банку»).
    correct: true
    explanation: 'Банк (bank) takes the preposition у/в: у банку.'
  - statement: Правильно говорити «в площі» (It is correct to say «в площі»).
    correct: false
    explanation: 'Площа (square) takes the preposition на: на площі.'
  title: Правда чи ні? (True or false?)
