- type: odd-one-out
  instruction: Знайдіть зайве слово (Find the odd one out)
  items:
  - words:
    - в школі
    - в парку
    - на роботі
    - в магазині
    correct: 2
    explanation: «На роботі» використовує прийменник «на», інші — «в». («На роботі»
      uses the preposition «на», the others use «в».)
  - words:
    - на вулиці
    - на площі
    - на вокзалі
    - у місті
    correct: 3
    explanation: «У місті» використовує прийменник «у/в», інші — «на». («У місті»
      uses the preposition «у/в», the others use «на».)
  - words:
