- type: quiz
  title: Правила чергування З, Із, Зі
  items:
  - question: Яку форму прийменника слід використовувати перед словом на голосний
      звук?
    explanation: Перед голосним звуком ми використовуємо базову форму з.
    options:
    - text: з
      correct: true
    - text: із
      correct: false
    - text: зі
      correct: false
    - text: й
      correct: false
  - question: Яку форму ми використовуємо перед словами з важким збігом приголосних?
    explanation: Перед збігом приголосних використовується форма із, щоб створити
      буфер.
    options:
    - text: із
      correct: true
    - text: з
      correct: false
    - text: зі
      correct: false
    - text: у
      correct: false
  - question: Який прийменник використовується перед словами, що починаються на шиплячі
      звуки?
    explanation: Перед звуками з, с, ш, щ використовується форма зі.
    options:
    - text: зі
      correct: true
    - text: з
      correct: false
    - text: із
      correct: false
    - text: в
      correct: false
  - question: Яка форма прийменника завжди використовується разом із займенником мною?
    explanation: Із займенником мною завжди використовується форма зі.
    options:
    - text: зі
      correct: true
    - text: з
      correct: false
    - text: із
      correct: false
    - text: у
      correct: false
  - question: Що з наведеного є прикладом правильного використання прийменника перед
      шиплячим звуком?
    explanation: Слово школа починається на шиплячий ш, тому правильно зі школи.
    options:
    - text: зі школи
      correct: true
    - text: з школи
      correct: false
    - text: із школи
      correct: false
    - text: у школи
      correct: false
  - question: Який варіант правильно використовує прийменник перед збігом приголосних
      звуків?
    explanation: Слово Львів має збіг приголосних льв, тому потрібно казати із Львова.
    options:
    - text: із Львова
      correct: true
    - text: з Львова
      correct: false
    - text: зі Львова
      correct: false
    - text: в Львова
      correct: false
  - question: Який варіант демонструє правильне використання прийменника перед голосним
      звуком?
    explanation: Слово Україна починається з голосного, тому використовуємо форму
      з.
    options:
    - text: з України
      correct: true
    - text: із України
      correct: false
    - text: зі України
      correct: false
    - text: й України
      correct: false
  - question: Чи застосовуються правила милозвучності до невіддільних префіксів всередині
      українських дієслів?
    explanation: Правила милозвучності застосовуються лише до прийменників та сполучників.
    options:
    - text: ні, тільки до прийменників
      correct: true
    - text: так, до всіх префіксів
      correct: false
    - text: так, але тільки вранці
      correct: false
    - text: ні, префікси завжди змінюються
      correct: false
