  title: Правда чи брехня
  instruction: Визначте, чи є твердження правильним.
  items:
  - statement: Ми використовуємо форму "у" після слова, що закінчується на приголосний.
    correct: true
    explanation: Це правило української мови.
  - statement: Ми використовуємо форму "в" після слова, що закінчується на приголосний.
    correct: false
    explanation: Це правило української мови.
  - statement: Форма "і" використовується після приголосних.
    correct: true
    explanation: Це правило української мови.
  - statement: Форма "й" використовується після приголосних.
    correct: false
    explanation: Це правило української мови.
  - statement: Перед голосними використовується форма "з".
    correct: true
    explanation: Це правило української мови.
  - statement: Перед збігом приголосних використовується форма "з".
    correct: false
    explanation: Це правило української мови.
  - statement: Перед шиплячими звуками використовується форма "зі".
    correct: true
    explanation: Це правило української мови.
  - statement: Українська мова уникає важких збігів приголосних.
    correct: true
    explanation: Це правило української мови.
  - statement: Євфонія означає милозвучність.
    correct: true
    explanation: Це правило української мови.
  - statement: Форма "та" може використовуватися як альтернатива для "і" та "й".
    correct: true
    explanation: Це правило української мови.
