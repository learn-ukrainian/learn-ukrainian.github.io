- type: quiz
  title: Правила чергування У та В, І та Й
  items:
  - question: Яку форму прийменника ми використовуємо після приголосного звука?
    explanation: Після приголосного звука використовується форма у, щоб уникнути збігу
      приголосних.
    options:
    - text: у
      correct: true
    - text: в
      correct: false
    - text: і
      correct: false
    - text: й
      correct: false
  - question: Яку форму прийменника ми використовуємо після голосного звука?
    explanation: Після голосного звука використовується форма в, щоб уникнути паузи
      між голосними.
    options:
    - text: в
      correct: true
    - text: у
      correct: false
    - text: і
      correct: false
    - text: й
      correct: false
  - question: Який сполучник слід обрати після слова на приголосний звук?
    explanation: Після приголосного звука використовується сполучник і, який є голосним.
    options:
    - text: і
      correct: true
    - text: й
      correct: false
    - text: у
      correct: false
    - text: в
      correct: false
  - question: Який сполучник ми обираємо після слова на голосний звук?
    explanation: Після голосного звука використовується сполучник й, щоб мовлення
      було плавним.
    options:
    - text: й
      correct: true
    - text: і
      correct: false
    - text: у
      correct: false
    - text: в
      correct: false
  - question: Що є головною метою української милозвучності у мовленні?
    explanation: Головна мета - це уникнення важких збігів приголосних або голосних
      звуків.
    options:
    - text: уникнення збігу приголосних
      correct: true
    - text: створення нових слів
      correct: false
    - text: зміна значення слова
      correct: false
    - text: використання тільки голосних
      correct: false
  - question: Який з цих звуків є голосним в українській мові?
    explanation: Звук а є голосним, його можна співати.
    options:
    - text: а
      correct: true
    - text: м
      correct: false
    - text: к
      correct: false
    - text: с
      correct: false
  - question: Який з цих звуків є приголосним в українській мові?
    explanation: Звук б є приголосним, під час його вимови повітря зустрічає перешкоду.
    options:
    - text: б
      correct: true
    - text: і
      correct: false
    - text: у
      correct: false
    - text: о
      correct: false
  - question: Який варіант початку нового речення є фонетично найбільш комфортним?
    explanation: Після паузи на початку речення найлегше починати з голосного звука
      у.
    options:
    - text: У мене є новий друг.
      correct: true
    - text: В мене є новий друг.
      correct: false
    - text: Мене є новий друг.
      correct: false
    - text: З мене є новий друг.
      correct: false
