version: '1.0'
module: my-city
level: a1
inline:
- id: match-place-activity
  type: match-up
  instruction: З'єднайте місце з дією (Match the place with the activity)
  pairs:
  - left: аптека
    right: купувати ліки
  - left: бібліотека
    right: читати книги
  - left: кінотеатр
    right: дивитися фільм
  - left: магазин
    right: купувати продукти
  - left: ресторан
    right: обідати
  - left: офіс
    right: працювати
  - left: парк
    right: відпочивати
  - left: дім
    right: жити
- id: quiz-preposition-v-na
  type: quiz
  instruction: 'Оберіть правильний прийменник: в/у чи на? (Choose the correct preposition:
    в/у or на?)'
  items:
  - question: Я зараз ___ аптеці.
    options:
    - в
    - у
    - на
    correct: 0
  - question: Він працює ___ пошті.
    options:
    - в
    - у
    - на
    correct: 2
  - question: Ми ___ банку.
    options:
    - в
    - у
    - на
    correct: 1
  - question: Люди чекають ___ зупинці.
    options:
    - в
    - у
    - на
    correct: 2
  - question: Сім'я обідає ___ ресторані.
    options:
    - в
    - у
    - на
    correct: 1
  - question: Поїзд ___ вокзалі.
    options:
    - в
    - у
    - на
    correct: 2
  - question: Студенти ___ бібліотеці.
    options:
    - в
    - у
    - на
    correct: 1
  - question: Брат ___ готелі.
    options:
    - в
    - у
    - на
    correct: 0
- id: fill-in-describe-city
  type: fill-in
  instruction: Що є у місті? Оберіть правильне слово (What is in the city? Choose
    the correct word)
  items:
  - sentence: У моєму місті є великий ____.
    answer: парк
    options:
    - парк
    - парку
    - парком
  - sentence: Тут є нова ____.
    answer: лікарня
    options:
    - лікарня
    - лікарні
    - лікарню
  - sentence: У центрі міста є ____.
    answer: готель
    options:
    - готель
    - готелю
    - готелем
  - sentence: Біля дому є ____.
    answer: магазин
    options:
    - магазин
    - магазину
    - магазином
  - sentence: Там є стара ____.
    answer: церква
    options:
    - церква
    - церкви
    - церкву
  - sentence: У місті є новий ____.
    answer: кінотеатр
    options:
    - кінотеатр
    - кінотеатру
    - кінотеатром
- id: quiz-situational-place
  type: quiz
  instruction: Куди ви йдете? Оберіть правильне місце (Where are you going? Choose
    the correct place)
  items:
  - question: Мені потрібні ліки. Де я?
    options:
    - в аптеці
    - у бібліотеці
    - на вокзалі
    - у парку
    correct: 0
  - question: Я хочу дивитися фільм. Де я?
    options:
    - на пошті
    - в лікарні
    - у кінотеатрі
    - у магазині
    correct: 2
  - question: Мама купує продукти. Де вона?
    options:
    - в готелі
    - у магазині
    - на зупинці
    - у музеї
    correct: 1
  - question: Ми хочемо обідати. Де ми?
    options:
    - у ресторані
    - на площі
    - у банку
    - на пошті
    correct: 0
  - question: Я чекаю автобус. Де я?
    options:
    - в офісі
    - на вокзалі
    - на зупинці
    - в університеті
    correct: 2
  - question: Мені потрібен поїзд. Де я?
    options:
    - на вокзалі
    - у парку
    - на зупинці
    - в аптеці
    correct: 0
workbook:
- id: wb-group-sort-places
  type: group-sort
  instruction: 'Розподіліть слова за прийменниками: В/У чи НА? (Sort the words by
    their preposition: В/У or НА?)'
  groups:
  - label: В / У
    items:
    - аптека
    - бібліотека
    - банк
    - готель
    - музей
    - магазин
    - ресторан
    - лікарня
  - label: НА
    items:
    - пошта
    - вокзал
    - стадіон
    - зупинка
    - площа
    - автовокзал
- id: wb-true-false-logic
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Люди купують ліки в аптеці.
    correct: true
    explanation: Так, аптека — це місце, де продають ліки.
  - statement: Поїзд завжди на зупинці.
    correct: false
    explanation: Ні, автобус на зупинці, а поїзд на вокзалі.
  - statement: Ми дивляться фільм у кінотеатрі.
    correct: true
    explanation: Так, у кінотеатрі дивляться фільми.
  - statement: Вокзал — це місце, де є автобуси.
    correct: false
    explanation: Ні, вокзал для поїздів. Для автобусів — автовокзал або зупинка.
  - statement: Студенти читають книги у бібліотеці.
    correct: true
    explanation: Так, бібліотека — це місце для книг.
  - statement: Магазин тут, а школа близько. Школа далеко?
    correct: false
    explanation: Ні, близько означає 'near', тому школа не далеко.
- id: wb-unjumble-sentences
  type: unjumble
  instruction: Складіть правильне речення зі слів (Make a correct sentence from the
    words)
  items:
  - words:
    - є
    - великий
    - У
    - парк.
    - місті
    correct_order:
    - У
    - місті
    - є
    - великий
    - парк.
  - words:
    - далеко?
    - Це
    - близько
    - чи
    correct_order:
    - Це
    - близько
    - чи
    - далеко?
  - words:
    - аптека
    - вулиці
    - Аптека
    - Шевченка.
    - на
    correct_order:
    - Аптека
    - на
    - вулиці
    - Шевченка.
  - words:
    - є
    - дому
    - Біля
    - магазин.
    correct_order:
    - Біля
    - дому
    - є
    - магазин.
  - words:
    - У
    - стадіон.
    - є
    - моєму
    - один
    - місті
    correct_order:
    - У
    - моєму
    - місті
    - є
    - один
    - стадіон.
  - words:
    - центрі
    - Ресторан
    - міста.
    - у
    correct_order:
    - Ресторан
    - у
    - центрі
    - міста.
- id: wb-error-correction-prepositions
  type: error-correction
  instruction: Знайдіть і виправте помилку (Find and correct the error)
  items:
  - sentence: Я купую ліки на аптеці.
    error: на
    correction: в
    error_type: word
    options:
    - в
    - у
    - біля
    explanation: Аптека — це закрите приміщення, тому 'в аптеці'.
  - sentence: Ми чекаємо автобус в зупинці.
    error: в
    correction: на
    error_type: word
    options:
    - на
    - у
    - біля
    explanation: Зупинка — це відкрите місце, тому 'на зупинці'.
  - sentence: Брат працює у пошті.
    error: у
    correction: на
    error_type: word
    options:
    - на
    - в
    - біля
    explanation: Пошта — це відкрита концепція, тому 'на пошті'.
  - sentence: Мама купує продукти у вокзалі.
    error: у
    correction: на
    error_type: word
    options:
    - на
    - в
    - біля
    explanation: Вокзал — це платформа або відкрите місце, тому 'на вокзалі'.
  - sentence: Сестра відпочиває на парку.
    error: на
    correction: у
    error_type: word
    options:
    - у
    - в
    - на
    explanation: Парк — це обмежена територія, тому 'у парку'.
  - sentence: Вони дивляться фільм на кінотеатрі.
    error: на
    correction: у
    error_type: word
    options:
    - у
    - в
    - на
    explanation: Кінотеатр — це закрите приміщення, тому 'у кінотеатрі'.
- id: wb-fill-in-genitive
  type: fill-in
  instruction: Вставте правильну форму слова після 'біля' (Insert the correct form
    of the word after 'біля')
  items:
  - sentence: Аптека біля ____.
    answer: парку
    options:
    - парк
    - парку
    - парком
  - sentence: Магазин біля ____.
    answer: дому
    options:
    - дім
    - дому
    - домом
  - sentence: Лікарня біля ____.
    answer: банку
    options:
    - банк
    - банку
    - банком
  - sentence: Кафе біля ____.
    answer: готелю
    options:
    - готель
    - готелю
    - готелем
  - sentence: Ресторан біля ____.
    answer: вокзалу
    options:
    - вокзал
    - вокзалу
    - вокзалом
  - sentence: Бібліотека біля ____.
    answer: музею
    options:
    - музей
    - музею
    - музеєм
- id: wb-order-dialogue
  type: order
  instruction: Розставте репліки діалогу в правильному порядку (Put the dialogue lines
    in the correct order)
  items:
  - — Дякую. А де бібліотека?
  - — Аптека на вулиці Шевченка.
  - — Бібліотека у центрі.
  - — Вибачте, будь ласка. Де тут аптека?
  correct_order:
  - 3
  - 1
  - 0
  - 2
