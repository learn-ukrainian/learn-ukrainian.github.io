version: '1.0'
module: my-city
level: a1
inline:
- id: quiz-v-or-na
  type: quiz
  instruction: Оберіть правильний варіант (Choose the correct option)
  items:
  - question: пошта
    options:
    - на пошті
    - в пошті
    - у пошті
    - на пошта
    correct: 0
  - question: вокзал
    options:
    - у вокзалі
    - на вокзалі
    - в вокзалі
    - на вокзал
    correct: 1
  - question: магазин
    options:
    - на магазині
    - в магазині
    - у магазин
    - в магазин
    correct: 1
  - question: стадіон
    options:
    - на стадіоні
    - в стадіоні
    - у стадіоні
    - на стадіон
    correct: 0
  - question: лікарня
    options:
    - у лікарні
    - на лікарні
    - в лікарня
    - на лікарню
    correct: 0
  - question: площа
    options:
    - в площі
    - у площі
    - на площі
    - на площа
    correct: 2
  - question: банк
    options:
    - на банку
    - у банку
    - в банк
    - на банк
    correct: 1
  - question: кафе
    options:
    - на кафе
    - в кафі
    - на кафу
    - у кафе
    correct: 3
- id: match-up-place-activity
  type: match-up
  instruction: З'єднайте дії та місця (Match the activities with the places)
  pairs:
  - left: Я купую ліки...
    right: в аптеці
  - left: Я читаю...
    right: у бібліотеці
  - left: Я працюю...
    right: в офісі
  - left: Я відпочиваю...
    right: у парку
  - left: Я їм...
    right: у ресторані
  - left: Я п'ю каву...
    right: у кафе
  - left: Я купую продукти...
    right: у супермаркеті
  - left: Я чекаю на поїзд...
    right: на вокзалі
- id: fill-in-describe-city
  type: fill-in
  instruction: Вставте правильне слово (Fill in the correct word)
  items:
  - sentence: У моєму місті є великий ____.
    answer: парк
    options:
    - парк
    - парку
    - парком
  - sentence: У центрі є старий ____.
    answer: театр
    options:
    - театр
    - театрі
    - театром
  - sentence: Біля дому є ____ і кафе.
    answer: магазин
    options:
    - магазин
    - магазині
    - магазину
  - sentence: Моя школа ____, у центрі міста.
    answer: далеко
    options:
    - далеко
    - близький
    - далека
  - sentence: ____ є велика лікарня.
    answer: Тут
    options:
    - Тут
    - Туди
    - Цей
  - sentence: Магазин тут, ____ дому.
    answer: біля
    options:
    - біля
    - в
    - на
- id: quiz-where-to-go
  type: quiz
  instruction: Куди ви підете? (Where would you go?)
  items:
  - question: Де я купую ліки?
    options:
    - В аптеці
    - На пошті
    - У банку
    - На стадіоні
    correct: 0
  - question: Де я читаю книги?
    options:
    - У супермаркеті
    - У бібліотеці
    - На площі
    - В офісі
    correct: 1
  - question: Де я п'ю каву?
    options:
    - У лікарні
    - На вокзалі
    - У кафе
    - В аптеці
    correct: 2
  - question: Де я відпочиваю?
    options:
    - В університеті
    - В офісі
    - На пошті
    - У парку
    correct: 3
  - question: Де я купую продукти?
    options:
    - У супермаркеті
    - В кінотеатрі
    - У музеї
    - У театрі
    correct: 0
  - question: Де я їм?
    options:
    - На пошті
    - У ресторані
    - В банку
    - В аптеці
    correct: 1
workbook:
- id: group-sort-v-or-na
  type: group-sort
  instruction: Розподіліть слова залежно від прийменника (Sort the words by preposition)
  groups:
  - label: в / у (in)
    items:
    - аптека
    - бібліотека
    - лікарня
    - магазин
    - ресторан
    - банк
    - готель
    - музей
  - label: на (on / at)
    items:
    - пошта
    - вокзал
    - стадіон
    - площа
    - вулиця
    - ріг
- id: anagram-places
  type: anagram
  instruction: Складіть слово з літер (Make a word from the letters)
  items:
  - letters:
    - а
    - п
    - т
    - е
    - к
    - а
    answer: аптека
    hint: pharmacy
  - letters:
    - м
    - у
    - з
    - е
    - й
    answer: музей
    hint: museum
  - letters:
    - к
    - а
    - ф
    - е
    answer: кафе
    hint: café
  - letters:
    - б
    - а
    - н
    - к
    answer: банк
    hint: bank
  - letters:
    - п
    - о
    - ш
    - т
    - а
    answer: пошта
    hint: post office
  - letters:
    - г
    - о
    - т
    - е
    - л
    - ь
    answer: готель
    hint: hotel
- id: unjumble-sentences
  type: unjumble
  instruction: Складіть правильне речення зі слів (Make a correct sentence from the
    words)
  items:
  - words:
    - Шевченка.
    - на
    - вулиці
    - Аптека
    correct_order:
    - Аптека
    - на
    - вулиці
    - Шевченка.
  - words:
    - центрі,
    - в
    - біля
    - Бібліотека
    - парку.
    correct_order:
    - Бібліотека
    - в
    - центрі,
    - біля
    - парку.
  - words:
    - у
    - міста.
    - Школа
    - далеко,
    - центрі
    correct_order:
    - Школа
    - далеко,
    - у
    - центрі
    - міста.
  - words:
    - в
    - Я
    - ліки
    - купую
    - аптеці.
    correct_order:
    - Я
    - купую
    - ліки
    - в
    - аптеці.
  - words:
    - є
    - кафе.
    - і
    - магазин
    - Біля
    - дому
    correct_order:
    - Біля
    - дому
    - є
    - магазин
    - і
    - кафе.
  - words:
    - Магазин
    - дому.
    - біля
    - тут,
    correct_order:
    - Магазин
    - тут,
    - біля
    - дому.
- id: true-false-locations
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Аптека — це місце, де ми купуємо ліки.
    correct: true
    explanation: Так, в аптеці купують ліки.
  - statement: Правильно говорити «в пошті».
    correct: false
    explanation: Ні, правильно говорити «на пошті».
  - statement: Слово «далеко» означає «не близько».
    correct: true
    explanation: Це слова з протилежним значенням (антоніми).
  - statement: Після слова «біля» ми кажемо «біля парк».
    correct: false
    explanation: 'Ні, ми використовуємо родовий відмінок: «біля парку».'
  - statement: У бібліотеці ми читаємо.
    correct: true
    explanation: Так, бібліотека — це місце для читання.
  - statement: Слово «вокзал» вживається з прийменником «на».
    correct: true
    explanation: Так, ми кажемо «на вокзалі».
- id: fill-in-bilya
  type: fill-in
  instruction: Вставте правильне слово після прийменника (Fill in the correct word
    after the preposition)
  items:
  - sentence: Бібліотека біля ____.
    answer: парку
    options:
    - парку
    - парк
    - парком
  - sentence: Магазин тут, біля ____.
    answer: дому
    options:
    - дому
    - дім
    - домом
  - sentence: Біля ____ є кафе.
    answer: університету
    options:
    - університету
    - університет
    - університеті
  - sentence: Аптека біля ____.
    answer: магазину
    options:
    - магазину
    - магазин
    - магазині
  - sentence: Готель біля ____.
    answer: театру
    options:
    - театру
    - театр
    - театрі
  - sentence: Супермаркет біля ____.
    answer: вокзалу
    options:
    - вокзалу
    - вокзал
    - вокзалі
- id: odd-one-out-vocab
  type: odd-one-out
  instruction: Знайдіть зайве слово (Find the odd one out)
  items:
  - words:
    - аптека
    - лікарня
    - ліки
    - театр
    correct: 3
    explanation: Аптека, лікарня і ліки пов'язані з медициною (medicine).
  - words:
    - тут
    - там
    - кафе
    - далеко
    correct: 2
    explanation: «Кафе» — це місце (іменник). Інші слова — прислівники (adverbs).
  - words:
    - читаю
    - працюю
    - відпочиваю
    - магазин
    correct: 3
    explanation: «Магазин» — це місце. Інші слова — дієслова (verbs).
  - words:
    - в
    - на
    - у
    - музей
    correct: 3
    explanation: «Музей» — це іменник. Інші слова — прийменники (prepositions).
  - words:
    - пошта
    - вокзал
    - стадіон
    - аптека
    correct: 3
    explanation: Ми кажемо «в аптеці», але «на пошті», «на вокзалі», «на стадіоні».
  - words:
    - центр
    - парк
    - готель
    - близько
    correct: 3
    explanation: «Близько» означає near/close. Інші слова — місця в місті.
