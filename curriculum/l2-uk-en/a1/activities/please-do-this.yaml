version: '1.0'
module: please-do-this
level: a1
inline:
- id: quiz-imperative-choice
  type: quiz
  instruction: Оберіть правильний варіант (Choose the correct option)
  items:
  - question: Максиме, ____ сіль, будь ласка!
    options:
    - дай
    - даєш
    - дати
    - дайте
    correct: 0
  - question: Пане Іване, ____ меню, будь ласка!
    options:
    - дай
    - даєш
    - дати
    - дайте
    correct: 3
  - question: Олено, ____ підручник, будь ласка!
    options:
    - читай
    - читайте
    - читати
    - читаєш
    correct: 0
  - question: Студенти, ____ підручник, будь ласка!
    options:
    - читай
    - читайте
    - читати
    - читаєш
    correct: 1
  - question: Анно, ____, яка гарна погода!
    options:
    - дивись
    - дивіться
    - дивитися
    - дивишся
    correct: 0
  - question: Тарасе, ____ мені, що ти хочеш.
    options:
    - скажи
    - скажіть
    - сказати
    - кажеш
    correct: 0
- id: fill-in-imperative-forms
  type: fill-in
  instruction: Вставте правильну форму (Insert the correct form)
  items:
  - sentence: Анно, ____ текст.
    answer: читай
    options:
    - читай
    - читайте
  - sentence: Студенти, ____ текст.
    answer: читайте
    options:
    - читай
    - читайте
  - sentence: Максиме, ____ три речення.
    answer: пиши
    options:
    - пиши
    - пишіть
  - sentence: Діти, ____ речення.
    answer: пишіть
    options:
    - пиши
    - пишіть
  - sentence: Тарасе, ____ підручник.
    answer: відкрий
    options:
    - відкрий
    - відкрийте
  - sentence: Пане Іване, ____ підручник.
    answer: відкрийте
    options:
    - відкрий
    - відкрийте
- id: fill-in-polite-requests
  type: fill-in
  instruction: Доповніть речення правильним словом (Complete the sentences with the
    correct word)
  items:
  - sentence: Максиме, дай, ____ ласка.
    answer: будь
    options:
    - будь
    - буде
  - sentence: Олено, ____, будь ласка, підручник.
    answer: дай
    options:
    - дай
    - дайте
  - sentence: Пане Іване, ____ мені меню, будь ласка.
    answer: дайте
    options:
    - дай
    - дайте
  - sentence: Тарасе, скажи, ____ ласка, що ти хочеш.
    answer: будь
    options:
    - будь
    - буде
  - sentence: Студенти, ____, будь ласка, сторінку.
    answer: відкрийте
    options:
    - відкрий
    - відкрийте
  - sentence: Анно, ____, будь ласка, сюди.
    answer: іди
    options:
    - іди
    - ідіть
workbook:
- id: match-up-infinitives
  type: match-up
  instruction: З'єднайте інфінітив з формою «ти» (Match the infinitive with the "ти"
    form)
  pairs:
  - left: читати
    right: читай
  - left: писати
    right: пиши
  - left: говорити
    right: говори
  - left: сісти
    right: сядь
  - left: відкрити
    right: відкрий
  - left: іти
    right: іди
- id: match-up-ty-vy
  type: match-up
  instruction: З'єднайте форму «ти» з формою «ви» (Match the "ти" form with the "ви"
    form)
  pairs:
  - left: слухай
    right: слухайте
  - left: дивись
    right: дивіться
  - left: дай
    right: дайте
  - left: скажи
    right: скажіть
  - left: сядь
    right: сядьте
  - left: пиши
    right: пишіть
- id: unjumble-sentences
  type: unjumble
  instruction: Складіть речення (Unjumble the sentences)
  items:
  - words:
    - будь
    - ласка.
    - меню,
    - Дай
    correct_order:
    - Дай
    - меню,
    - будь
    - ласка.
  - words:
    - текст.
    - читайте
    - ласка,
    - Будь
    correct_order:
    - Будь
    - ласка,
    - читайте
    - текст.
  - words:
    - сторінці.
    - Пишіть
    - на
    - речення
    correct_order:
    - Пишіть
    - речення
    - на
    - сторінці.
  - words:
    - хочеш?
    - ти
    - Скажи,
    - що
    correct_order:
    - Скажи,
    - що
    - ти
    - хочеш?
  - words:
    - тут,
    - Сідай
    - ласка.
    - будь
    correct_order:
    - Сідай
    - тут,
    - будь
    - ласка.
  - words:
    - Олено.
    - Відкрий
    - підручник,
    correct_order:
    - Відкрий
    - підручник,
    - Олено.
- id: anagram-imperative
  type: anagram
  instruction: Складіть слово з літер (Make a word from the letters)
  items:
  - letters:
    - ч
    - и
    - т
    - а
    - й
    answer: читай
    hint: read (ти)
  - letters:
    - п
    - и
    - ш
    - і
    - т
    - ь
    answer: пишіть
    hint: write (ви)
  - letters:
    - с
    - я
    - д
    - ь
    answer: сядь
    hint: sit (ти)
  - letters:
    - д
    - а
    - й
    - т
    - е
    answer: дайте
    hint: give (ви)
  - letters:
    - с
    - к
    - а
    - ж
    - и
    answer: скажи
    hint: tell (ти)
  - letters:
    - і
    - д
    - і
    - т
    - ь
    answer: ідіть
    hint: go (ви)
- id: true-false-grammar
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Слово «читай» — це форма для «ви».
    correct: false
    explanation: Слово «читай» — це неформальна форма для «ти».
  - statement: Слово «пишіть» — це форма для «ви».
    correct: true
    explanation: Закінчення -іть вказує на форму «ви».
  - statement: Щоб зробити прохання ввічливим, ми додаємо «будь ласка».
    correct: true
    explanation: Так, «будь ласка» робить будь-яке прохання ввічливим.
  - statement: Слово «дивись» використовується для групи людей.
    correct: false
    explanation: Слово «дивись» — це форма для «ти» (однієї людини).
  - statement: Форма «ви» від слова «дати» — «дайте».
    correct: true
    explanation: Так, дай -> дайте.
  - statement: Форма «ти» від слова «сказати» — «сказуй».
    correct: false
    explanation: Правильна форма — «скажи».
- id: fill-in-mixed
  type: fill-in
  instruction: Вставте правильне слово в діалог (Fill in the correct word in the dialogue)
  items:
  - sentence: Максиме, ____ мені меню, будь ласка.
    answer: дай
    options:
    - дай
    - дайте
  - sentence: Пане Іване, ____, будь ласка, меню.
    answer: покажіть
    options:
    - покажи
    - покажіть
  - sentence: Студенти, ____ питання!
    answer: запитуйте
    options:
    - запитуй
    - запитуйте
  - sentence: Олено, ____ текст на сторінці десять.
    answer: читай
    options:
    - читай
    - читайте
  - sentence: Діти, ____ вчителя!
    answer: слухайте
    options:
    - слухай
    - слухайте
  - sentence: Анно, ____ тут, біля мене.
    answer: сідай
    options:
    - сідай
    - сідайте
