version: '1.0'
module: please-do-this
level: a1
inline:
- id: group-sort-imperative-register
  type: group-sort
  instruction: Розподіліть дієслова за формою (Sort the verbs by form)
  groups:
  - label: Ти (Informal)
    items:
    - читай
    - пиши
    - слухай
    - дай
    - скажи
  - label: Ви (Formal / Plural)
    items:
    - читайте
    - пишіть
    - слухайте
    - дайте
    - скажіть
- id: fill-in-imperative-formation
  type: fill-in
  instruction: Утворіть наказовий спосіб (Form the imperative)
  items:
  - sentence: 'Ти (читати): _____, будь ласка.'
    answer: читай
  - sentence: 'Ви (писати): _____, будь ласка.'
    answer: пишіть
  - sentence: 'Ти (слухати): _____, будь ласка.'
    answer: слухай
  - sentence: 'Ви (дивитися): _____, будь ласка.'
    answer: дивіться
  - sentence: 'Ти (говорити): _____, будь ласка.'
    answer: говори
  - sentence: 'Ви (дати): _____, будь ласка.'
    answer: дайте
  - sentence: 'Ти (сказати): _____, будь ласка.'
    answer: скажи
  - sentence: 'Ви (іти): _____, будь ласка.'
    answer: ідіть
  - sentence: 'Ти (відкрити): _____, будь ласка.'
    answer: відкрий
  - sentence: 'Ви (сісти): _____, будь ласка.'
    answer: сядьте
