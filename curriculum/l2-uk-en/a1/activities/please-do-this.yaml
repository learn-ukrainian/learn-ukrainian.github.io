workbook:
- id: match-up-pronouns
  type: match-up
  instruction: З'єднайте займенник із дієсловом (Match the pronoun with the verb)
  pairs:
  - left: Читай текст
    right: ти
  - left: Слухайте вчителя
    right: ви
  - left: Пиши речення
    right: ти
  - left: Дивіться сюди
    right: ви
  - left: Дай меню
    right: ти
  - left: Скажіть, будь ласка
    right: ви
- id: fill-in-implied-pronoun
  type: fill-in
  instruction: Вставте правильний займенник (Insert the correct pronoun)
  items:
  - sentence: _____, читай текст, будь ласка.
    answer: Ти
    options:
    - Ти
    - Ви
  - sentence: _____, пишіть речення!
    answer: Ви
    options:
    - Ти
    - Ви
  - sentence: _____, слухай мене.
    answer: Ти
    options:
    - Ти
    - Ви
  - sentence: _____, дивіться сюди.
    answer: Ви
    options:
    - Ти
    - Ви
  - sentence: _____, відкрий підручник.
    answer: Ти
    options:
    - Ти
    - Ви
  - sentence: _____, скажіть мені.
    answer: Ви
    options:
    - Ти
    - Ви
- id: true-false-rules
  type: true-false
  instruction: Правда чи ні? (True or False?)
  items:
  - statement: We use 'ти' for close friends.
    correct: true
    explanation: Informal 'ти' is used for friends and family.
  - statement: The ending '-те' or '-іть' is for 'ти' (informal).
    correct: false
    explanation: These endings are for 'ви' (formal/plural).
  - statement: Adding 'будь ласка' makes a command polite.
    correct: true
    explanation: It transforms a direct command into a standard, polite request.
  - statement: You use 'Ви' (formal) when talking to a teacher.
    correct: true
    explanation: Formal 'Ви' is used to address teachers, strangers, and groups.
  - statement: The imperative of 'писати' for 'ти' is 'пиши'.
    correct: true
    explanation: 'Drop the -ти and add -и: пиши.'
  - statement: The informal imperative of 'читати' is 'читайте'.
    correct: false
    explanation: The informal form (ти) is 'читай'. 'Читайте' is formal (ви).
- id: quiz-reading-comprehension
  type: quiz
  instruction: Відповідь на запитання за текстом (Answer questions about the text)
  items:
  - question: Яке закінчення має дієслово для 'Ви'?
    options:
    - -те або -іть
    - -й
    - -ти
    - -ю
    correct: 0
  - question: Що робить фраза 'будь ласка'?
    options:
    - Робить прохання ввічливим
    - Змінює час
    - Робить слово множиною
    - Змінює особу
    correct: 0
  - question: Яку форму використовують друзі (Олег і Максим)?
    options:
    - Ти (неформальну)
    - Ви (формальну)
    - Він (третю особу)
    - Ми (множину)
    correct: 0
  - question: Як утворити форму 'ти' для слова 'читати'?
    options:
    - читай
    - читайте
    - читає
    - читаю
    correct: 0
  - question: Що вчитель каже студентам?
    options:
    - Відкрийте підручники!
    - Відкрий підручник!
    - Відкривати підручники!
    - Відкривають підручники!
    correct: 0
  - question: Яка правильна форма для слова 'сказати' (ти)?
    options:
    - скажи
    - сказай
    - скажіть
    - сказати
    correct: 0
- id: error-correction-imperative
  type: error-correction
  instruction: Знайдіть і виправте помилку (Find and fix the error)
  items:
  - sentence: Пане Іване, скажи, будь ласка!
    error: скажи
    correction: скажіть
    error_type: register
    options:
    - скажіть
    - сказав
    - сказати
    explanation: 'For ''Пане Іване'', we use the formal ''Ви'' form: скажіть.'
  - sentence: Олеже, дайте мені книжку.
    error: дайте
    correction: дай
    error_type: register
    options:
    - дай
    - дав
    - даєш
    explanation: 'For a friend ''Олеже'', we use the informal ''ти'' form: дай.'
  - sentence: Студенти, читай текст на сторінці два.
    error: читай
    correction: читайте
    error_type: register
    options:
    - читайте
    - читати
    - читають
    explanation: 'For plural ''Студенти'', we use the ''Ви'' form: читайте.'
  - sentence: Друже, слухайте мене.
    error: слухайте
    correction: слухай
    error_type: register
    options:
    - слухай
    - слухати
    - слухав
    explanation: 'For a friend ''Друже'', we use ''ти'': слухай.'
  - sentence: Маріє, відкрийте підручник, будь ласка.
    error: відкрийте
    correction: відкрий
    error_type: register
    options:
    - відкрий
    - відкрила
    - відкрити
    explanation: 'For singular friend ''Маріє'', we use ''ти'': відкрий.'
  - sentence: Вчителю, дивись на це речення.
    error: дивись
    correction: дивіться
    error_type: register
    options:
    - дивіться
    - дивись
    - дивитися
    explanation: 'For ''Вчителю'', we use the formal ''Ви'' form: дивіться.'
