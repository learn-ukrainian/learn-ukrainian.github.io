- type: quiz
  title: "Правила наголосу та інтонації"
  instruction: "Оберіть правильну відповідь на запитання."
  items:
    - question: "Яке твердження про український наголос є правильним?"
      options:
        - text: "Він може падати на будь-який склад."
          correct: true
        - text: "Він завжди падає на перший склад."
          correct: false
        - text: "Він завжди падає на останній склад."
          correct: false
        - text: "Він залежить від закінчення слова."
          correct: false
      explanation: "Український наголос є вільним і може падати на будь-який склад."
    - question: "Що означає слово замок, якщо наголос на першому складі?"
      options:
        - text: "велика історична будівля"
          correct: true
        - text: "пристрій для закриття дверей"
          correct: false
        - text: "місце для навчання"
          correct: false
        - text: "гарячий напій"
          correct: false
      explanation: "Слово замок із наголосом на першому складі означає історичну будівлю."
    - question: "Як змінюється інтонація у питаннях без питального слова?"
      options:
        - text: "Голос різко підіймається в кінці."
          correct: true
        - text: "Голос опускається в кінці."
          correct: false
        - text: "Голос залишається рівним."
          correct: false
        - text: "Голос різко опускається на початку."
          correct: false
      explanation: "У питаннях типу Це школа? голос різко йде вгору в кінці речення."
    - question: "Яку інтонацію ми використовуємо для звичайного факту?"
      options:
        - text: "Голос опускається в кінці речення."
          correct: true
        - text: "Голос підіймається в кінці речення."
          correct: false
        - text: "Голос залишається дуже високим."
          correct: false
        - text: "Голос різко стрибає на кожному слові."
          correct: false
      explanation: "Розповідна інтонація закінчується падінням голосу в кінці фрази."
    - question: "Що відбувається з наголосом у слові рука у множині?"
      options:
        - text: "Він переходить на перший склад."
          correct: true
        - text: "Він залишається на останньому складі."
          correct: false
        - text: "Він зникає зовсім."
          correct: false
        - text: "Він переходить на другий склад."
          correct: false
      explanation: "Слово рука змінюється на руки з рухомим наголосом на першому складі."
    - question: "Яке з цих слів завжди має наголос на останньому складі?"
      options:
        - text: "молоко"
          correct: true
        - text: "мама"
          correct: false
        - text: "добрий"
          correct: false
        - text: "кава"
          correct: false
      explanation: "Слово молоко завжди має наголос на останньому звуці О."

- type: match-up
  title: "Словник: знайдіть переклад"
  instruction: "З'єднайте українські слова з їхнім перекладом."
  pairs:
    - left: "питання"
      right: "question"
    - left: "відповідь"
      right: "answer"
    - left: "молоко"
      right: "milk"
    - left: "замок (історичний)"
      right: "castle"
    - left: "замок (на дверях)"
      right: "lock"
    - left: "наголос"
      right: "stress"

- type: group-sort
  title: "Де знаходиться наголос?"
  instruction: "Розподіліть слова за місцем наголосу."
  groups:
    - name: "Перший склад"
      items:
        - "мама"
        - "тато"
        - "кава"
        - "добрий"
    - name: "Передостанній склад"
      items:
        - "школа"
        - "дорога"
        - "питання"
        - "книга"
    - name: "Останній склад"
      items:
        - "молоко"
        - "далеко"
        - "вода"
        - "вікно"

- type: anagram
  title: "Розшифруйте слова"
  instruction: "Переставте літери, щоб утворити слово."
  items:
    - scrambled: "в о д а"
      answer: "вода"
    - scrambled: "м о л о к о"
      answer: "молоко"
    - scrambled: "ш к о л а"
      answer: "школа"
    - scrambled: "к а в а"
      answer: "кава"
    - scrambled: "р у к а"
      answer: "рука"
    - scrambled: "м і с т о"
      answer: "місто"

- type: fill-in
  title: "Заповніть пропуски словами"
  instruction: "Оберіть правильне слово для кожного речення."
  items:
    - sentence: "Це старий історичний _____."
      answer: "замок"
      options:
        - "замок"
        - "вода"
        - "кава"
        - "школа"
    - sentence: "Я п'ю холодне _____."
      answer: "молоко"
      options:
        - "молоко"
        - "питання"
        - "замок"
        - "рука"
    - sentence: "Де смачна _____?"
      answer: "кава"
      options:
        - "кава"
        - "місто"
        - "дорога"
        - "наголос"
    - sentence: "Це дуже гарне _____."
      answer: "питання"
      options:
        - "питання"
        - "відповідь"
        - "рука"
        - "вода"
    - sentence: "Це моя права _____."
      answer: "рука"
      options:
        - "рука"
        - "руки"
        - "молоко"
        - "кава"
    - sentence: "У мене чисті _____."
      answer: "руки"
      options:
        - "руки"
        - "рука"
        - "вода"
        - "школа"

- type: unjumble
  title: "Складіть речення"
  instruction: "Поставте слова у правильному порядку."
  items:
    - words:
        - "це"
        - "дуже"
        - "добрий"
        - "день"
      answer: "Це дуже добрий день"
    - words:
        - "я"
        - "п'ю"
        - "холодне"
        - "молоко"
      answer: "Я п'ю холодне молоко"
    - words:
        - "моя"
        - "школа"
        - "дуже"
        - "далеко"
      answer: "Моя школа дуже далеко"
    - words:
        - "це"
        - "моя"
        - "права"
        - "рука"
      answer: "Це моя права рука"
    - words:
        - "я"
        - "зараз"
        - "пишу"
        - "текст"
      answer: "Я зараз пишу текст"
    - words:
        - "що"
        - "ти"
        - "зараз"
        - "пишеш"
      answer: "Що ти зараз пишеш"

- type: quiz
  title: "Як змінюється наголос?"
  instruction: "Оберіть правильну відповідь про рухомий наголос."
  items:
    - question: "Яка форма слова рука використовується у множині?"
      options:
        - text: "руки (наголос на перший склад)"
          correct: true
        - text: "руки (наголос на останній склад)"
          correct: false
        - text: "рука (наголос на перший склад)"
          correct: false
        - text: "рука (наголос на останній склад)"
          correct: false
      explanation: "У множині наголос переходить на перший склад: руки."
    - question: "Як правильно перекласти I write українською мовою?"
      options:
        - text: "я пишу (наголос на останній склад)"
          correct: true
        - text: "я пишу (наголос на перший склад)"
          correct: false
        - text: "я писати"
          correct: false
        - text: "я пишеш"
          correct: false
      explanation: "У цій формі дієслова наголос падає на останній склад: пишу."
    - question: "Як правильно перекласти you write українською мовою?"
      options:
        - text: "ти пишеш (наголос на перший склад)"
          correct: true
        - text: "ти пишеш (наголос на останній склад)"
          correct: false
        - text: "ти пишу"
          correct: false
        - text: "ти писати"
          correct: false
      explanation: "У цій формі наголос повертається на корінь: пишеш."
    - question: "На який склад падає наголос у слові далеко?"
      options:
        - text: "на останній"
          correct: true
        - text: "на перший"
          correct: false
        - text: "на другий"
          correct: false
        - text: "на передостанній"
          correct: false
      explanation: "Слово далеко має наголос на останньому складі."
    - question: "На який склад падає наголос у слові відповідь?"
      options:
        - text: "на перший"
          correct: true
        - text: "на другий"
          correct: false
        - text: "на третій"
          correct: false
        - text: "на останній"
          correct: false
      explanation: "У слові відповідь наголошується найперший склад."
    - question: "Що демонструє пара слів замок і замок?"
      options:
        - text: "зміну значення через наголос"
          correct: true
        - text: "зміну значення через букву"
          correct: false
        - text: "однакове значення"
          correct: false
        - text: "правила пунктуації"
          correct: false
      explanation: "Зміна наголосу повністю змінює значення цих слів (мінімальна пара)."

- type: match-up
  title: "Яка інтонація?"
  instruction: "З'єднайте тип речення з правильною мелодією."
  pairs:
    - left: "Де школа?"
      right: "Голос підіймається на слові де, потім опускається"
    - left: "Це школа."
      right: "Голос опускається в кінці речення"
    - left: "Це школа?"
      right: "Голос різко підіймається в кінці речення"
    - left: "Це школа!"
      right: "Голос різко підіймається з сильною емоцією"
    - left: "Я п'ю молоко."
      right: "Спокійна розповідна мелодія з падінням в кінці"
    - left: "Це дуже добре!"
      right: "Енергійна оклична мелодія"

- type: fill-in
  title: "Лінгвістичні терміни"
  instruction: "Доповніть речення правильним терміном."
  items:
    - sentence: "В українській мові _____ є вільним і рухомим."
      answer: "наголос"
      options:
        - "наголос"
        - "замок"
        - "словник"
        - "питання"
    - sentence: "Мелодія всього речення називається _____."
      answer: "інтонація"
      options:
        - "інтонація"
        - "відповідь"
        - "дорога"
        - "вода"
    - sentence: "У словниках наголос позначається знаком над _____."
      answer: "голосною"
      options:
        - "голосною"
        - "приголосною"
        - "літерою"
        - "крапкою"
    - sentence: "Коли ми формуємо множину слова рука, наголос переходить на _____ склад."
      answer: "перший"
      options:
        - "перший"
        - "останній"
        - "другий"
        - "третій"
    - sentence: "Слова замок і замок — це мінімальні _____."
      answer: "пари"
      options:
        - "пари"
        - "групи"
        - "слова"
        - "літери"
    - sentence: "Для звичайного факту використовується розповідна _____."
      answer: "інтонація"
      options:
        - "інтонація"
        - "рука"
        - "школа"
        - "відповідь"

- type: anagram
  title: "Розшифруйте додаткові слова"
  instruction: "Переставте літери, щоб знайти знайомі слова."
