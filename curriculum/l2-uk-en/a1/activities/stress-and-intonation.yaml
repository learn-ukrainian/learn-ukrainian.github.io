- type: true-false
  title: Vocabulary and Concepts
  instruction: Is the statement true or false?
  items:
  - statement: The word на́голос means 'intonation' in English.
    correct: false
    explanation: на́голос means 'stress' or 'accent'. інтона́ція means 'intonation'.
  - statement: The word пита́ння means 'question'.
    correct: true
    explanation: Yes, пита́ння is the Ukrainian word for question.
  - statement: The word for 'road' is доро́га.
    correct: true
    explanation: 'Yes, and its stress is on the second-to-last syllable: доро́га.'
  - statement: The word писа́ти means 'to read'.
    correct: false
    explanation: писа́ти means 'to write'.
  - statement: The acute accent (´) is used in textbooks to show stress.
    correct: true
    explanation: Yes, it helps you know exactly which syllable to emphasize.
  - statement: Ukrainian intonation cannot change the meaning of a sentence.
    correct: false
    explanation: Intonation is crucial! It can turn a statement into a question or
      an exclamation.
  - statement: The word ві́дповідь means 'answer'.
    correct: true
    explanation: Yes, ві́дповідь is the Ukrainian word for answer.
  - statement: You should always try to guess the stress of a new word based on its
      spelling.
    correct: false
    explanation: Never guess! Ukrainian stress is free, so you must memorize it with
      every new word.
