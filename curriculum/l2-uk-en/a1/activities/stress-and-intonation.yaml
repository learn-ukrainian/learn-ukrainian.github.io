- type: quiz
  title: Check Your Understanding
  instruction: Let's review what we've learned about the rhythm of Ukrainian.
  items:
  - question: Which of these words means 'castle' in English?
    explanation: за́мок with stress on the first syllable means castle.
    options:
    - text: за́мок
      correct: true
    - text: замо́к
      correct: false
    - text: му́ка
      correct: false
    - text: мука́
      correct: false
  - question: Which of these words means 'water' in English?
    explanation: The word is вода́, with stress on the last syllable.
    options:
    - text: вода́
      correct: true
    - text: во́да
      correct: false
    - text: далеко́
      correct: false
    - text: рука́
      correct: false
  - question: Where is the stress in the word for 'milk' (молоко)?
    explanation: 'The stress falls on the final syllable: молоко́.'
    options:
    - text: On the first syllable
      correct: false
    - text: On the second syllable
      correct: false
    - text: On the third syllable
      correct: true
    - text: It has no stress
      correct: false
  - question: In Ukrainian, what are the rules for word stress?
    explanation: Ukrainian stress is free, meaning it can fall on any syllable.
    options:
    - text: Always on the first syllable
      correct: false
    - text: Always on the last syllable
      correct: false
    - text: Always on the second-to-last syllable
      correct: false
    - text: It is free and can fall anywhere
      correct: true
  - question: What does 'mobile stress' mean?
    explanation: Mobile stress means the stressed syllable can move when the word
      changes its grammatical form.
    options:
    - text: Stress moves when you speak faster
      correct: false
    - text: Stress shifts when the word form changes
      correct: true
    - text: Stress moves depending on your mood
      correct: false
    - text: Stress is only used in songs
      correct: false
  - question: Which mark is used in textbooks to show stress?
    explanation: We use the acute accent (´) above the stressed vowel.
    options:
    - text: ´ (acute accent)
      correct: true
    - text: . (period)
      correct: false
    - text: '? (question mark)'
      correct: false
    - text: '! (exclamation mark)'
      correct: false
  - question: How do you show a Yes/No question using intonation?
    explanation: For a Yes/No question, your pitch must rise sharply at the end of
      the sentence.
    options:
    - text: Pitch falls at the end
      correct: false
    - text: Pitch rises sharply at the end
      correct: true
    - text: Voice gets much louder
      correct: false
    - text: Pitch stays completely flat
      correct: false
  - question: Which word has stress on the first syllable?
    explanation: The word ма́ма stresses the first syllable.
    options:
    - text: ма́ма
      correct: true
    - text: молоко́
      correct: false
    - text: вода́
      correct: false
    - text: замо́к
      correct: false
- type: true-false
  title: Fact or Fiction?
  instruction: Decide if these statements about Ukrainian stress and intonation are
    true or false.
  items:
  - statement: Ukrainian stress always falls on the second-to-last syllable.
    correct: false
    explanation: Unlike Polish, Ukrainian stress is free and can fall on any syllable.
  - statement: Stress can completely change the meaning of a Ukrainian word.
    correct: true
    explanation: Yes, for example, за́мок (castle) and замо́к (lock) mean different
      things depending on the stress.
  - statement: The word замо́к with stress on the last syllable means 'castle'.
    correct: false
    explanation: замо́к means lock. The word for castle is за́мок.
  - statement: In the word молоко́, the stress is on the last syllable.
    correct: true
    explanation: Yes, молоко́ puts the emphasis on the final 'o'.
  - statement: '''Mobile stress'' means you can choose to put the stress wherever
      you want.'
    correct: false
    explanation: Mobile stress means the stress shifts automatically when the word
      changes grammatical form (like singular to plural).
  - statement: To make a simple statement like 'Це кафе.', your pitch should fall
      at the end.
    correct: true
    explanation: A falling pitch signals that you are making a declarative statement.
  - statement: You must add extra question words to ask a Yes/No question in Ukrainian.
    correct: false
    explanation: You can ask a Yes/No question simply by making your pitch rise sharply
      at the end of the sentence.
  - statement: The word до́брий has stress on the first syllable.
    correct: true
    explanation: 'Yes, you hit the first syllable hard: до́брий.'
