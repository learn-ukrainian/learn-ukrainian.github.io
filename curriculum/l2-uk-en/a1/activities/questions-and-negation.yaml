- type: group-sort
  title: 'Питання чи твердження?'
  instruction: 'Sort the sentences into Questions or Statements based on structure and punctuation.'
  groups:
    - name: 'Питання (Questions)'
      items:
        - 'Чи ти знаєш?'
        - 'Він вдома?'
        - 'Хто це?'
        - 'Де кіт?'
        - 'Чи це кава?'
        - 'Коли автобус?'
    - name: 'Твердження (Statements)'
      items:
        - 'Я знаю.'
        - 'Він вдома.'
        - 'Це мама.'
        - 'Кіт тут.'
        - 'Це кава.'
        - 'Автобус там.'

- type: quiz
  title: 'Правильний порядок слів'
  instruction: 'Choose the sentence with the correct word order for a question.'
  items:
    - question: 'How do you ask "Do you know?" in Ukrainian?'
      explanation: 'The correct order is "Чи ти знаєш?" (Question particle + Subject + Verb).'
      options:
        - text: 'Чи ти знаєш?'
          correct: true
        - text: 'Ти чи знаєш?'
          correct: false
        - text: 'Знаєш чи ти?'
          correct: false
        - text: 'Чи знаєш?'
          correct: false
    - question: 'How do you ask "Where is your mom?" correctly?'
      explanation: '"Де" (Where) comes first. "Де твоя мама?"'
      options:
        - text: 'Де твоя мама?'
          correct: true
        - text: 'Твоя мама де?'
          correct: false
        - text: 'Де мама твоя?'
          correct: false
        - text: 'Мама твоя де?'
          correct: false
    - question: 'How do you ask "Who is that?" in Ukrainian?'
      explanation: '"Хто" (Who) comes first. "Хто це там?"'
      options:
        - text: 'Хто це там?'
          correct: true
        - text: 'Там хто це?'
          correct: false
        - text: 'Це хто там?'
          correct: false
        - text: 'Хто там це?'
          correct: false
    - question: 'How do you ask "When is your breakfast?" correctly?'
      explanation: '"Коли" (When) comes first. "Коли твій сніданок?"'
      options:
        - text: 'Коли твій сніданок?'
          correct: true
        - text: 'Твій сніданок коли?'
          correct: false
        - text: 'Сніданок коли твій?'
          correct: false
        - text: 'Коли сніданок твій?'
          correct: false
    - question: 'How do you ask "What are you doing?" in Ukrainian?'
      explanation: '"Що" (What) comes first. "Що ти робиш?"'
      options:
        - text: 'Що ти робиш?'
          correct: true
        - text: 'Ти що робиш?'
          correct: false
        - text: 'Робиш що ти?'
          correct: false
        - text: 'Що робиш ти?'
          correct: false
    - question: 'How do you ask "Is he here?" using "чи"?'
      explanation: 'Start with "Чи". "Чи він тут?"'
      options:
        - text: 'Чи він тут?'
          correct: true
        - text: 'Він чи тут?'
          correct: false
        - text: 'Тут чи він?'
          correct: false
        - text: 'Чи тут він?'
          correct: false
    - question: 'How do you ask "Is this true?" using "чи"?'
      explanation: 'Start with "Чи". "Чи це правда?"'
      options:
        - text: 'Чи це правда?'
          correct: true
        - text: 'Правда чи це?'
          correct: false
        - text: 'Це чи правда?'
          correct: false
        - text: 'Чи правда це?'
          correct: false
    - question: 'How do you ask "Where are you?" in Ukrainian?'
      explanation: '"Де" (Where) comes first. "Де ти?"'
      options:
        - text: 'Де ти?'
          correct: true
        - text: 'Ти де?'
          correct: false
        - text: 'Де є ти?'
          correct: false
        - text: 'Ти є де?'
          correct: false

- type: fill-in
  title: 'Заперечення'
  instruction: 'Complete the sentences using "не" (not) or "ні" (no).'
  items:
    - sentence: "— Ти спиш? — ___, я читаю."
      answer: "Ні"
      options: ["Ні", "Не", "На", "Ну"]
      explanation: 'Use "Ні" (No) to answer a question negatively.'
    - sentence: "Я ___ знаю це слово."
      answer: "не"
      options: ["не", "ні", "на", "ну"]
      explanation: 'Use "не" (not) before a verb to negate the action.'
    - sentence: "Він ___ вдома."
      answer: "не"
      options: ["не", "ні", "на", "ну"]
      explanation: 'Use "не" before the location to say "not at home".'
    - sentence: "Ми ___ спимо."
      answer: "не"
      options: ["не", "ні", "на", "ну"]
      explanation: 'Use "не" before the verb "спимо".'
    - sentence: "— Це кіт? — ___, це пес."
      answer: "Ні"
      options: ["Ні", "Не", "На", "Ну"]
      explanation: 'Use "Ні" (No) for a negative answer.'
    - sentence: "Кава ___ смачна."
      answer: "не"
      options: ["не", "ні", "на", "ну"]
      explanation: 'Use "не" to negate the adjective "смачна".'
    - sentence: "— Ти тут? — ___, я там."
      answer: "Ні"
      options: ["Ні", "Не", "На", "Ну"]
      explanation: 'Use "Ні" (No) for a negative answer.'
    - sentence: "Це ___ правда."
      answer: "не"
      options: ["не", "ні", "на", "ну"]
      explanation: 'Use "не" to say "is not true".'

