- type: true-false
  title: 'Grammar True or False'
  instruction: 'Decide if the statement is true or false.'
  items:
    - statement: 'Ukrainian uses the words "do" and "does" to make questions.'
      correct: false
      explanation: 'Ukrainian has no helper verbs like "do" or "does".'
    - statement: 'To make a formal yes/no question, you can start the sentence with the word "чи".'
      correct: true
      explanation: '"Чи" acts as a clear signal that a yes/no question is coming.'
    - statement: 'The word "ні" is used right before a verb to make it negative.'
      correct: false
      explanation: '"Не" goes right before the verb. "Ні" is the standalone answer "No".'
    - statement: 'To ask a casual question, you only need to raise your voice pitch at the end of the sentence.'
      correct: true
      explanation: 'Intonation-only questions are extremely common in casual Ukrainian.'
    - statement: 'In Ukrainian, it is correct to use a double negative, like "I never not know".'
      correct: true
      explanation: 'Double negation (e.g., ніколи не) is required in Ukrainian.'
    - statement: 'The word "що" means "who".'
      correct: false
      explanation: '"Що" means "what". "Хто" means "who".'
    - statement: 'A negative statement usually has a falling tone at the end.'
      correct: true
      explanation: 'Statements, including negative ones, have a falling tone.'
    - statement: 'You should use "чи" when talking casually with close friends and family members.'
      correct: false
      explanation: 'With friends and family, people usually drop "чи" and just use rising intonation.'

- type: unjumble
  title: 'Unjumble the Sentences'
  instruction: 'Put the words in the correct order to form questions or negative statements.'
  items:
    - words: ['Чи', 'ти', 'знаєш?']
      answer: 'Чи ти знаєш?'
    - words: ['Що', 'ти', 'робиш?']
      answer: 'Що ти робиш?'
    - words: ['Я', 'не', 'розумію.']
      answer: 'Я не розумію.'
    - words: ['Де', 'є', 'цукор?']
      answer: 'Де є цукор?'
    - words: ['Він', 'ніколи', 'не', 'знає.']
      answer: 'Він ніколи не знає.'
    - words: ['Чи', 'це', 'чай?']
      answer: 'Чи це чай?'
    - words: ['Хто', 'це', 'там?']
      answer: 'Хто це там?'
    - words: ['Я', 'ніколи', 'не', 'розумію.']
      answer: 'Я ніколи не розумію.'

