- type: anagram
  title: 'Розшифруйте слова'
  instruction: 'Rearrange the letters to find the hidden word.'
  items:
    - scrambled: "а в к а"
      answer: "кава"
    - scrambled: "а м а м"
      answer: "мама"
    - scrambled: "о с л в о"
      answer: "слово"
    - scrambled: "а к с і т"
      answer: "таксі"
    - scrambled: "о н і к в"
      answer: "вікно"
    - scrambled: "б а к а б"
      answer: "бабка"
    - scrambled: "д а в р а п"
      answer: "правда"
    - scrambled: "о б у с а в т"
      answer: "автобус"

- type: fill-in
  title: 'Оберіть правильне слово'
  instruction: 'Choose the correct question word for the context.'
  items:
    - sentence: "___ це? Це мій друг."
      answer: "Хто"
      options: ["Хто", "Що", "Де", "Коли"]
      explanation: 'Use "Хто" (Who) for people.'
    - sentence: "___ це? Це стіл."
      answer: "Що"
      options: ["Що", "Хто", "Де", "Коли"]
      explanation: 'Use "Що" (What) for inanimate objects.'
    - sentence: "___ ти живеш?"
      answer: "Де"
      options: ["Де", "Що", "Хто", "Коли"]
      explanation: 'Use "Де" (Where) to ask about location.'
    - sentence: "___ твій урок?"
      answer: "Коли"
      options: ["Коли", "Що", "Хто", "Де"]
      explanation: 'Use "Коли" (When) to ask about time.'
    - sentence: "___ ти тут?"
      answer: "Чому"
      options: ["Чому", "Хто", "Що", "Де"]
      explanation: 'Use "Чому" (Why) to ask for a reason.'
    - sentence: "___ це коштує?"
      answer: "Скільки"
      options: ["Скільки", "Хто", "Що", "Де"]
      explanation: 'Use "Скільки" (How much) to ask about price.'
    - sentence: "___ цей урок?"
      answer: "Коли"
      options: ["Коли", "Хто", "Де", "Що"]
      explanation: 'Use "Коли" (When) for time.'
    - sentence: "___ вона?"
      answer: "Хто"
      options: ["Хто", "Що", "Коли", "Скільки"]
      explanation: 'Use "Хто" (Who) to ask about a person.'

- type: quiz
  title: 'Заперечні речення'
  instruction: 'Choose the sentence with the correct word order for a negative sentence.'
  items:
    - question: 'How do you say "I do not know" in Ukrainian?'
      explanation: '"не" comes before "знаю". "Я не знаю."'
      options:
        - text: 'Я не знаю'
          correct: true
        - text: 'Я знаю не'
          correct: false
        - text: 'Не я знаю'
          correct: false
        - text: 'Я не знаєш'
          correct: false
    - question: 'How do you say "He is not here" in Ukrainian?'
      explanation: '"не" comes before the location "тут" (or implies verb "is"). "Він не тут."'
      options:
        - text: 'Він не тут'
          correct: true
        - text: 'Він тут не'
          correct: false
        - text: 'Не він тут'
          correct: false
        - text: 'Він не там'
          correct: false
    - question: 'How do you say "We do not sleep" in Ukrainian?'
      explanation: '"не" comes before "спимо". "Ми не спимо."'
      options:
        - text: 'Ми не спимо'
          correct: true
        - text: 'Ми спимо не'
          correct: false
        - text: 'Не ми спимо'
          correct: false
        - text: 'Ми не спати'
          correct: false
    - question: 'How do you say "This is not coffee" in Ukrainian?'
      explanation: '"не" comes before the noun it negates (implied "is not"). "Це не кава."'
      options:
        - text: 'Це не кава'
          correct: true
        - text: 'Це кава не'
          correct: false
        - text: 'Не це кава'
          correct: false
        - text: 'Це не є кава'
          correct: false
    - question: 'How do you say "She is not reading" in Ukrainian?'
      explanation: '"не" comes before "читає". "Вона не читає."'
      options:
        - text: 'Вона не читає'
          correct: true
        - text: 'Вона читає не'
          correct: false
        - text: 'Не вона читає'
          correct: false
        - text: 'Вона не читати'
          correct: false
    - question: 'How do you say "You do not see" in Ukrainian?'
      explanation: '"не" comes before "бачиш". "Ти не бачиш."'
      options:
        - text: 'Ти не бачиш'
          correct: true
        - text: 'Ти бачиш не'
          correct: false
        - text: 'Не ти бачиш'
          correct: false
        - text: 'Ти не бачу'
          correct: false
    - question: 'How do you say "They are not here" in Ukrainian?'
      explanation: '"не" comes before "тут". "Вони не тут."'
      options:
        - text: 'Вони не тут'
          correct: true
        - text: 'Вони тут не'
          correct: false
        - text: 'Не вони тут'
          correct: false
        - text: 'Вони не там'
          correct: false
    - question: 'How do you say "I do not understand" in Ukrainian?'
      explanation: '"не" comes before "розумію". "Я не розумію."'
      options:
        - text: 'Я не розумію'
          correct: true
        - text: 'Я розумію не'
          correct: false
        - text: 'Не я розумію'
          correct: false
        - text: 'Я не розумієш'
          correct: false

- type: quiz
  title: 'Культура запитань'
  instruction: 'Answer questions about cultural nuances of asking questions.'
  items:
    - question: 'When is it best to use the particle "чи"?'
      explanation: 'Use "чи" in formal situations or with strangers to be polite.'
      options:
        - text: 'With strangers (polite)'
          correct: true
        - text: 'With close friends only'
          correct: false
        - text: 'When you are angry'
          correct: false
        - text: 'Never'
          correct: false
    - question: 'How might a friend ask "Are you home?" casually?'
      explanation: 'Friends often drop "чи" and just use intonation: "Ти вдома?"'
      options:
        - text: 'Ти вдома?'
          correct: true
        - text: 'Чи ти є вдома?'
          correct: false
        - text: 'Ти дома чи ні?'
          correct: false
        - text: 'Де ти є?'
          correct: false
    - question: 'What is the "street" pronunciation of "що"?'
      explanation: 'In casual speech, "що" often sounds like "шо" [sh-o].'
      options:
        - text: 'Шо'
          correct: true
        - text: 'Ще'
          correct: false
        - text: 'Це'
          correct: false
        - text: 'Чо'
          correct: false
    - question: 'Which TV show character taught Ukrainians about "не"?'
      explanation: 'The Ukrainian dub of the show ALF is famous for its natural language use.'
      options:
        - text: 'ALF'
          correct: true
        - text: 'Friends'
          correct: false
        - text: 'Simpsons'
          correct: false
        - text: 'Shrek'
          correct: false
    - question: 'What is the correct translation of "Ти не любиш котів?"'
      explanation: 'This means "You do not like cats?".'
      options:
        - text: 'You do not like cats?'
          correct: true
        - text: 'You do not have cats?'
          correct: false
        - text: 'Are you a cat?'
          correct: false
        - text: 'Where are the cats?'
          correct: false
    - question: 'Translate: "Ти просто не вмієш їх готувати!"'
      explanation: 'This is the famous line: "You just do not know how to cook them!"'
      options:
        - text: 'You just do not know how to cook them!'
          correct: true
        - text: 'You just do not like cooking!'
          correct: false
        - text: 'You are a bad cook!'
          correct: false
        - text: 'You never cook for me!'
          correct: false
    - question: 'If you want to be very polite, which question form is safer?'
      explanation: 'Using "чи" is safer and more polite.'
      options:
        - text: 'Using "чи"'
          correct: true
        - text: 'Using only intonation'
          correct: false
        - text: 'Shouting'
          correct: false
        - text: 'Not asking at all'
          correct: false
    - question: 'Does the particle "Чи" change the meaning of the sentence?'
      explanation: 'No, it just marks it as a Yes/No question.'
      options:
        - text: 'No, just marks a question'
          correct: true
        - text: 'Yes, it makes it negative'
          correct: false
        - text: 'Yes, it makes it past tense'
          correct: false
        - text: 'Yes, it makes it plural'
          correct: false
