- type: quiz
  title: "Grammar and Intonation Check"
  instruction: "Choose the correct answer based on the lesson."
  items:
    - question: "Which word means 'no' as a standalone answer?"
      explanation: "'Ні' means 'No'. 'Не' means 'not'."
      options:
        - text: "Ні"
          correct: true
        - text: "Не"
          correct: false
        - text: "Так"
          correct: false
        - text: "Чи"
          correct: false
    - question: "Where do you place the negation particle 'не'?"
      explanation: "'Не' must always stand directly before the verb."
      options:
        - text: "Directly before the verb"
          correct: true
        - text: "At the beginning of the sentence"
          correct: false
        - text: "At the end of the sentence"
          correct: false
        - text: "Directly after the verb"
          correct: false
    - question: "Which particle is used to form formal yes/no questions?"
      explanation: "'Чи' is the standard polite marker for yes/no questions."
      options:
        - text: "Чи"
          correct: true
        - text: "Що"
          correct: false
        - text: "Не"
          correct: false
        - text: "Ні"
          correct: false
    - question: "What is the standard spoken variant of 'що'?"
      explanation: "You will constantly hear 'шо' in everyday spoken Ukrainian."
      options:
        - text: "шо"
          correct: true
        - text: "хто"
          correct: false
        - text: "чи"
          correct: false
        - text: "не"
          correct: false
    - question: "How do you form a question in casual conversation without 'чи'?"
      explanation: "Ukrainians often drop formal markers and rely on a sharp rising intonation."
      options:
        - text: "Using rising intonation on the focus word"
          correct: true
        - text: "Using a helper verb like 'do'"
          correct: false
        - text: "Using falling intonation"
          correct: false
        - text: "Reversing the subject and verb"
          correct: false
    - question: "Which word requires 'double negation' in Ukrainian?"
      explanation: "When you use 'ніколи' (never), you must also use 'не' before the verb."
      options:
        - text: "ніколи"
          correct: true
        - text: "завжди"
          correct: false
        - text: "часто"
          correct: false
        - text: "іноді"
          correct: false
    - question: "What intonation is used for negative statements?"
      explanation: "Negative statements use a falling tone, landing firmly."
      options:
        - text: "Falling tone"
          correct: true
        - text: "Rising tone"
          correct: false
        - text: "Flat tone"
          correct: false
        - text: "Wavy tone"
          correct: false
    - question: "How do you correctly say 'I never know'?"
      explanation: "Ukrainian requires double negation: 'я ніколи не знаю'."
      options:
        - text: "Я ніколи не знаю"
          correct: true
        - text: "Я ніколи знаю"
          correct: false
        - text: "Я не ніколи знаю"
          correct: false
        - text: "Я знаю ніколи"
          correct: false

- type: true-false
  title: "True or False?"
  instruction: "Decide if the statements about Ukrainian grammar are true or false."
  items:
    - statement: "In Ukrainian, you must use a translation of the word 'do' to ask a question."
      correct: false
      explanation: "Ukrainian syntax is direct; there is no 'do' or 'does' auxiliary verb."
    - statement: "The word 'ні' is used right before a verb to negate it."
      correct: false
      explanation: "You must use 'не' right before a verb. 'Ні' is a standalone answer."
    - statement: "You can turn a statement into a question simply by raising your pitch at the end."
      correct: true
      explanation: "Intonation alone is frequently used to form questions in casual speech."
    - statement: "The particle 'чи' is typically placed at the very beginning of a question."
      correct: true
      explanation: "'Чи' acts as a flag at the start of the sentence to signal a formal yes/no question."
    - statement: "It is best to use 'чи' in formal settings or when speaking to strangers."
      correct: true
      explanation: "'Чи' is the polite standard, whereas intonation-only is more relaxed."
    - statement: "Double negation is grammatically incorrect in Ukrainian."
      correct: false
      explanation: "Double negation (like 'ніколи не') is grammatically required."
    - statement: "The question word 'де' means 'when'."
      correct: false
      explanation: "'Де' means 'where'. 'Коли' means 'when'."
    - statement: "The word 'що' is often pronounced as 'шо' in casual, everyday speech."
      correct: true
      explanation: "'Шо' is a ubiquitous spoken variant of 'що'."

