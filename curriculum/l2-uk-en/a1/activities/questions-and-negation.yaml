- type: fill-in
  title: "Negation: Не vs Ні"
  instruction: "Choose the correct negation word."
  items:
    - sentence: "_____, я не знаю."
      answer: "Ні"
      options:
        - "Ні"
        - "Не"
        - "Чи"
        - "Де"
      explanation: "'Ні' is the standalone answer for 'no'."
    - sentence: "Я _____ розумію."
      answer: "не"
      options:
        - "не"
        - "ні"
        - "чи"
        - "так"
      explanation: "Use 'не' directly before the verb to negate it."
    - sentence: "_____, дякую."
      answer: "Ні"
      options:
        - "Ні"
        - "Не"
        - "Що"
        - "Коли"
    - sentence: "Він _____ знає."
      answer: "не"
      options:
        - "не"
        - "ні"
        - "чи"
        - "де"
    - sentence: "Вона _____ читає."
      answer: "не"
      options:
        - "не"
        - "ні"
        - "чи"
        - "хто"
    - sentence: "_____, я не хочу."
      answer: "Ні"
      options:
        - "Ні"
        - "Не"
        - "Чи"
        - "Як"
    - sentence: "Ми _____ працюємо."
      answer: "не"
      options:
        - "не"
        - "ні"
        - "чи"
        - "де"
    - sentence: "Ти _____ розумієш."
      answer: "не"
      options:
        - "не"
        - "ні"
        - "чи"
        - "куди"

