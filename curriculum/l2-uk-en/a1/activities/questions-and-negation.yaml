- type: quiz
  title: 'Understanding Questions and Negation'
  instruction: 'Choose the correct answer.'
  items:
    - question: 'Which word means "no" as a standalone answer?'
      explanation: 'Ні is the standalone answer "No". Не is the word "not".'
      options:
        - text: 'ні'
          correct: true
        - text: 'не'
          correct: false
        - text: 'так'
          correct: false
        - text: 'чи'
          correct: false
    - question: 'Which word means "not" and always goes right before the verb?'
      explanation: 'Не is the word "not".'
      options:
        - text: 'не'
          correct: true
        - text: 'ні'
          correct: false
        - text: 'так'
          correct: false
        - text: 'чи'
          correct: false
    - question: 'Which word politely asks a yes/no question?'
      explanation: 'Чи acts like a clear signal flag at the beginning of the sentence.'
      options:
        - text: 'чи'
          correct: true
        - text: 'не'
          correct: false
        - text: 'ні'
          correct: false
        - text: 'що'
          correct: false
    - question: 'How do you ask a casual question with intonation?'
      explanation: 'A normal statement has a falling tone, but a question has a sharp, rising tone on the main word.'
      options:
        - text: 'Raise your pitch at the end'
          correct: true
        - text: 'Lower your pitch at the end'
          correct: false
        - text: 'Speak very slowly'
          correct: false
        - text: 'Whisper the last word'
          correct: false
    - question: 'What is the most common street pronunciation for the word "що"?'
      explanation: 'On the streets, almost everyone says "шо".'
      options:
        - text: 'шо'
          correct: true
        - text: 'ща'
          correct: false
        - text: 'ще'
          correct: false
        - text: 'щу'
          correct: false
    - question: 'In Ukrainian, how do you correctly say "I never know"?'
      explanation: 'In Ukrainian, when we say "never", we use double negation: ніколи не.'
      options:
        - text: 'Я ніколи не знаю'
          correct: true
        - text: 'Я ніколи знаю'
          correct: false
        - text: 'Я не ніколи знаю'
          correct: false
        - text: 'Ніколи я знаю'
          correct: false
    - question: 'Which sentence is the correct way to say "You do not understand"?'
      explanation: 'The word "не" must go immediately before the verb.'
      options:
        - text: 'Ти не розумієш'
          correct: true
        - text: 'Ти ні розумієш'
          correct: false
        - text: 'Ти розумієш не'
          correct: false
        - text: 'Не ти розумієш'
          correct: false
    - question: 'What does the word "хто" mean?'
      explanation: '"Хто" means "who".'
      options:
        - text: 'who'
          correct: true
        - text: 'what'
          correct: false
        - text: 'where'
          correct: false
        - text: 'when'
          correct: false

