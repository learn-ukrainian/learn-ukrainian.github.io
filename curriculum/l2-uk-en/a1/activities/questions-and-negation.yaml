- type: quiz
  title: 'Основи запитань'
  instruction: 'Choose the correct answer about forming questions in Ukrainian.'
  items:
    - question: 'When is the best time to use the particle "чи"?'
      explanation: 'The particle "чи" is used to form Yes/No questions, especially in polite or formal contexts.'
      options:
        - text: 'It marks a question'
          correct: true
        - text: 'It means "not"'
          correct: false
        - text: 'It means "hello"'
          correct: false
        - text: 'It marks a statement'
          correct: false
    - question: 'Which Ukrainian word corresponds to the English "No"?'
      explanation: 'The word "ні" means "No", while "не" means "not".'
      options:
        - text: 'ні'
          correct: true
        - text: 'не'
          correct: false
        - text: 'на'
          correct: false
        - text: 'ну'
          correct: false
    - question: 'How do you ask a casual question without using "чи"?'
      explanation: 'In casual speech, you can simply raise your intonation at the end of the sentence.'
      options:
        - text: 'Raise your intonation'
          correct: true
        - text: 'Shout the last word'
          correct: false
        - text: 'Whisper the sentence'
          correct: false
        - text: 'Change the word order'
          correct: false
    - question: 'Where exactly do you place "не" to negate an action?'
      explanation: 'The particle "не" is always placed strictly before the verb it negates.'
      options:
        - text: 'Before the verb'
          correct: true
        - text: 'After the verb'
          correct: false
        - text: 'At the end of the sentence'
          correct: false
        - text: 'At the beginning only'
          correct: false
    - question: 'What is the correct translation of "Хто це?" in English?'
      explanation: '"Хто" means "Who", so "Хто це?" means "Who is this?".'
      options:
        - text: 'Who is this?'
          correct: true
        - text: 'What is this?'
          correct: false
        - text: 'Where is this?'
          correct: false
        - text: 'When is this?'
          correct: false
    - question: 'Which question word asks about a thing, not a person?'
      explanation: '"Що" (What) is used for things, while "Хто" (Who) is used for people.'
      options:
        - text: 'що'
          correct: true
        - text: 'хто'
          correct: false
        - text: 'де'
          correct: false
        - text: 'як'
          correct: false
    - question: 'Which question word should you use to ask about time?'
      explanation: '"Коли" (When) is used to ask about time.'
      options:
        - text: 'коли'
          correct: true
        - text: 'де'
          correct: false
        - text: 'хто'
          correct: false
        - text: 'що'
          correct: false
    - question: 'Does the Ukrainian language use helper verbs like "do"?'
      explanation: 'Ukrainian does not use auxiliary verbs for questions. The verb itself is enough.'
      options:
        - text: 'No, never'
          correct: true
        - text: 'Yes, always'
          correct: false
        - text: 'Only in formal speech'
          correct: false
        - text: 'Only with "you"'
          correct: false

