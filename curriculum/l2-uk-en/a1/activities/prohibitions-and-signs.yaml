        - text: "наказовий спосіб"
          correct: false
        - text: "минулий час"
          correct: false
        - text: "майбутній час"
          correct: false
    - question: "Яке коротке слово використовують для привернення уваги перед важливим оголошенням?"
      explanation: "Слово Увага! найчастіше використовується для початку важливих оголошень."
      options:
        - text: "Увага!"
