- type: quiz
  title: "Sign Comprehension"
  instruction: "Choose the correct answer for each question about signs."
  items:
    - question: "What does the sign 'Зачинено' mean?"
      options:
        - text: "Closed"
          correct: true
        - text: "Open"
          correct: false
        - text: "Entrance"
          correct: false
        - text: "Exit"
          correct: false
    - question: "What does the sign 'Відчинено' mean?"
      options:
        - text: "Open"
          correct: true
        - text: "Closed"
          correct: false
        - text: "Push"
          correct: false
        - text: "Pull"
          correct: false
    - question: "Which sign means 'No smoking!'?"
      options:
        - text: "Не курити!"
          correct: true
        - text: "Не входити!"
          correct: false
        - text: "Не торкатися!"
          correct: false
        - text: "Вхід заборонено!"
          correct: false
    - question: "How do you say 'Entrance forbidden!'?"
      options:
        - text: "Вхід заборонено!"
          correct: true
        - text: "Вихід заборонено!"
          correct: false
        - text: "Не входити!"
          correct: false
        - text: "Не курити!"
          correct: false
    - question: "Which Ukrainian word means 'Attention!'?"
      options:
        - text: "Увага!"
          correct: true
        - text: "Обережно!"
          correct: false
        - text: "Небезпечно!"
          correct: false
        - text: "Стоп!"
          correct: false
    - question: "Which phrase translates to 'Wet floor'?"
      options:
        - text: "Мокра підлога"
          correct: true
        - text: "Висока напруга"
          correct: false
        - text: "Пішохідний перехід"
          correct: false
        - text: "Години роботи"
          correct: false
    - question: "What does 'Вихідний' mean on a store's schedule?"
      options:
        - text: "Day off / Closed day"
          correct: true
        - text: "Operating hours"
          correct: false
        - text: "Lunch break"
          correct: false
        - text: "Discount"
          correct: false
    - question: "What does the word 'Перерва' mean?"
      options:
        - text: "Break / Lunch break"
          correct: true
        - text: "Schedule"
          correct: false
        - text: "Departure"
          correct: false
        - text: "Arrival"
          correct: false
    - question: "Which abbreviation is used for 'вулиця' (street)?"
      options:
        - text: "вул."
          correct: true
        - text: "пл."
          correct: false
        - text: "пров."
          correct: false
        - text: "буд."
          correct: false
    - question: "Which sign indicates a pedestrian crossing?"
      options:
        - text: "Пішохідний перехід"
          correct: true
        - text: "Зупинка"
          correct: false
        - text: "Підземний перехід"
          correct: false
        - text: "Стоп"
          correct: false
- type: true-false
  title: "True or False: Schedules and Signs"
  instruction: "Decide if the statements are true or false based on the lesson."
  items:
    - statement: "The sign 'Відчинено' means that a store is closed."
      correct: false
      explanation: "It means open. 'Зачинено' means closed."
    - statement: "The word 'Вхід' means 'Entrance'."
      correct: true
    - statement: "A 'перерва' is a designated break when small shops might close."
      correct: true
    - statement: "'Обережно' is a warning word that means 'Dangerous!'."
      correct: false
      explanation: "It means Careful or Caution. 'Небезпечно' means Dangerous."
    - statement: "The abbreviation 'пл.' stands for 'площа' (square)."
      correct: true
    - statement: "'Мокра підлога' warns you about high voltage."
      correct: false
      explanation: "It warns about a wet floor. High voltage is 'Висока напруга'."
    - statement: "In the schedule format 'з 9:00 до 18:00', the word 'до' means 'to' or 'until'."
      correct: true
    - statement: "The word 'Вихід' means 'Exit'."
      correct: true
- type: fill-in
  title: "Complete the Sign"
  instruction: "Fill in the missing word for each sign or notice."
  items:
    - sentence: "Вхід ___!"
      answer: "заборонено"
      options:
        - "заборонено"
        - "зачинено"
        - "відчинено"
        - "дозволено"
    - sentence: "Мокра ___"
      answer: "підлога"
      options:
        - "підлога"
        - "напруга"
        - "вулиця"
        - "зупинка"
    - sentence: "Висока ___"
      answer: "напруга"
      options:
        - "напруга"
        - "підлога"
        - "перерва"
        - "площа"
    - sentence: "Пішохідний ___"
      answer: "перехід"
      options:
        - "перехід"
        - "вхід"
        - "вихід"
        - "зупинка"
    - sentence: "Не ___!"
      answer: "курити"
      options:
        - "курити"
        - "входити"
        - "торкатися"
        - "робити"
    - sentence: "Години ___"
      answer: "роботи"
      options:
        - "роботи"
        - "перерви"
        - "зупинки"
        - "вулиці"
    - sentence: "Магазин ___."
      answer: "зачинено"
      options:
        - "зачинено"
        - "відчинено"
        - "заборонено"
        - "обережно"
    - sentence: "Кафе ___."
      answer: "відчинено"
      options:
        - "відчинено"
        - "зачинено"
        - "заборонено"
        - "увага"
