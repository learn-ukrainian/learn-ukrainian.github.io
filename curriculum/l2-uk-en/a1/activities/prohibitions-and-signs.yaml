- type: quiz
  title: "Розуміння розкладу"
  instruction: "Прочитайте розклад (Пн-Пт: 8:00–20:00, Сб: 10:00–15:00, Нд: вихідний, Перерва: 13:00–14:00) та оберіть правильну відповідь."
  items:
    - question: "О котрій годині магазин відчиняється у понеділок?"
      explanation: "У будні магазин працює з 8:00 до 20:00."
      options:
        - text: "о восьмій"
          correct: true
        - text: "о дев'ятій"
          correct: false
        - text: "о десятій"
          correct: false
        - text: "о тринадцятій"
          correct: false
    - question: "Чи можете ви зробити покупки в неділю?"
      explanation: "Ні, неділя вказана як вихідний день."
      options:
        - text: "Ні, це вихідний."
          correct: true
        - text: "Так, цілий день."
          correct: false
        - text: "Так, але до п'ятнадцятої."
          correct: false
        - text: "Так, після перерви."
          correct: false
    - question: "Скільки часу триває перерва в цьому магазині?"
      explanation: "Перерва триває з 13:00 до 14:00, тобто рівно одну годину."
      options:
        - text: "одну годину"
          correct: true
        - text: "дві години"
          correct: false
        - text: "півгодини"
          correct: false
        - text: "перерви немає"
          correct: false
    - question: "Що ви побачите на дверях о тринадцятій тридцять (13:30) у вівторок?"
      explanation: "У цей час триває перерва, тому магазин зачинено."
      options:
        - text: "Зачинено"
          correct: true
        - text: "Відчинено"
          correct: false
        - text: "Вхід"
          correct: false
        - text: "Знижка"
          correct: false
    - question: "О котрій годині магазин зачиняється в суботу?"
      explanation: "У суботу він працює до 15:00."
      options:
        - text: "о п'ятнадцятій"
          correct: true
        - text: "о двадцятій"
          correct: false
        - text: "о тринадцятій"
          correct: false
        - text: "о восьмій"
          correct: false
    - question: "Якщо ви прийдете в п'ятницю о дев'ятій ранку, магазин буде працювати?"
      explanation: "Так, у п'ятницю він відчиняється о 8:00."
      options:
        - text: "Так, він відчинено."
          correct: true
        - text: "Ні, він зачинено."
          correct: false
        - text: "Ні, там перерва."
          correct: false
        - text: "Так, але тільки вхід."
          correct: false
    - question: "О котрій годині магазин зачиняється у четвер?"
      explanation: "Четвер — це робочий день, магазин працює до 20:00."
      options:
        - text: "о двадцятій"
          correct: true
        - text: "о вісімнадцятій"
          correct: false
        - text: "о п'ятнадцятій"
          correct: false
        - text: "о десятій"
          correct: false
    - question: "В який день магазин працює найменше годин?"
      explanation: "У суботу магазин працює лише з 10:00 до 15:00."
      options:
        - text: "у суботу"
          correct: true
        - text: "у понеділок"
          correct: false
        - text: "у п'ятницю"
          correct: false
        - text: "у неділю"
          correct: false

- type: fill-in
  title: "Доповніть знаки"
  instruction: "Виберіть правильне слово, щоб завершити текст на знаку або оголошенні."
  items:
    - sentence: "Магазин не працює, на дверях написано: '___'."
      answer: "Зачинено"
      options: ["Відчинено", "Зачинено", "Вхід", "Вихід"]
      explanation: "Слово Зачинено означає, що магазин закритий."
    - sentence: "Це безпечне місце, тут є пішохідний ___."
      answer: "перехід"
      options: ["перехід", "вхід", "вихідний", "розклад"]
      explanation: "Місце для перетину дороги — це пішохідний перехід."
    - sentence: "___! Мокра підлога."
      answer: "Обережно"
      options: ["Обережно", "Перерва", "Відчинено", "Розклад"]
      explanation: "Обережно — це попередження про необхідність бути уважним."
    - sentence: "Сьогодні неділя, тому в офісі ___."
      answer: "вихідний"
      options: ["перерва", "вихідний", "вхід", "зупинка"]
      explanation: "День, коли не працюють, називається вихідний."
    - sentence: "Офіційні правила кажуть: 'Не ___ в музеї!'"
      answer: "торкатися"
      options: ["торкайся", "торкатися", "входити", "курити"]
      explanation: "Офіційні заборони використовують інфінітив Не торкатися."
    - sentence: "Щоб знайти свій поїзд, перевірте розклад ___."
      answer: "руху"
      options: ["роботи", "руху", "зупинки", "перерви"]
      explanation: "Розклад транспорту називається розклад руху."
    - sentence: "Там немає дороги, вхід ___."
      answer: "заборонено"
      options: ["відчинено", "заборонено", "небезпечно", "увага"]
      explanation: "Фраза Вхід заборонено означає, що заходити не можна."
    - sentence: "___! Висока напруга!"
      answer: "Небезпечно"
      options: ["Обережно", "Небезпечно", "Зачинено", "Відчинено"]
      explanation: "Висока напруга — це серйозна загроза, тому використовують слово Небезпечно."
    - sentence: "Ми чекаємо на автобус, це наша ___."
      answer: "зупинка"
      options: ["зупинка", "вулиця", "площа", "перерва"]
      explanation: "Місце, де чекають на транспорт — зупинка."
    - sentence: "У нас є чудова ___, товари дешевші на двадцять відсотків."
      answer: "знижка"
      options: ["зупинка", "перерва", "знижка", "увага"]
      explanation: "Зменшення ціни — це знижка."
    - sentence: "Кафе працює з дев'ятої ___ шостої."
      answer: "до"
      options: ["з", "на", "до", "у"]
      explanation: "Для тривалості часу використовують конструкцію з ... до ..."
    - sentence: "___ поїзда буде о десятій годині ранку."
      answer: "Відправлення"
      options: ["Вхід", "Відправлення", "Перерва", "Вихідний"]
      explanation: "Відправлення — це час, коли поїзд починає їхати."

- type: quiz
  title: "Тест - Розуміння знаків"
  instruction: "Оберіть правильну відповідь на питання про значення та граматику українських знаків."
  items:
    - question: "Яку форму дієслова зазвичай використовують на офіційних заборонних знаках в Україні?"
      explanation: "Офіційні знаки використовують безособовий інфінітив, щоб встановити загальне правило для всіх."
      options:
        - text: "інфінітив"
