    - question: "Що означає напис 'Не притулятися' на дверях у київському метрополітені?"
      explanation: "Цей знак означає, що не можна стояти близько і спиратися на двері поїзда."
      options:
        - text: "Не можна спиратися на двері."
          correct: true
        - text: "Не можна швидко входити."
          correct: false
        - text: "Не можна голосно говорити."
          correct: false
        - text: "Не можна фотографувати."
          correct: false
    - question: "Якщо ви бачите знак 'Обережно, мокра підлога', про що він попереджає?"
      explanation: "Цей знак попереджає, що підлога нещодавно помита і може бути дуже слизькою."
      options:
        - text: "Підлога слизька і можна впасти."
          correct: true
        - text: "На підлозі лежать гроші."
          correct: false
        - text: "Тут не можна ходити взутим."
          correct: false
        - text: "У приміщенні йде дощ."
          correct: false
    - question: "Який відмінок числівників використовується в конструкції часу з прийменниками 'з' і 'до'?"
      explanation: "Конструкція з ... до ... вимагає використання родового відмінка."
      options:
        - text: "родовий відмінок"
          correct: true
        - text: "називний відмінок"
          correct: false
        - text: "давальний відмінок"
          correct: false
        - text: "знахідний відмінок"
          correct: false
    - question: "Що ви повинні шукати на станції, якщо хочете безпечно перейти на іншу лінію поїзда?"
      explanation: "Знак для зміни лінії в метро — це Перехід."
      options:
        - text: "знак Перехід"
          correct: true
        - text: "знак Зупинка"
          correct: false
        - text: "знак Вихід"
          correct: false
        - text: "знак Відправлення"
          correct: false
    - question: "Яке слово на дверях аптеки означає день, коли установа повністю не працює?"
      explanation: "Слово Вихідний означає день тижня, коли заклад зачинений."
      options:
        - text: "вихідний"
          correct: true
        - text: "перерва"
          correct: false
        - text: "зачинено"
          correct: false
        - text: "знижка"
          correct: false
    - question: "Згідно з текстом модуля, у чому головна різниця між 'Не входити' та 'Не входь'?"
      explanation: "Не входити — це формальний безособовий знак, а Не входь — це прямий персональний наказ."
      options:
        - text: "Перше — це офіційний знак, друге — особистий наказ."
          correct: true
        - text: "Перше — це особистий наказ, друге — офіційний знак."
          correct: false
        - text: "Вони мають абсолютно різне значення."
          correct: false
        - text: "Перше використовують тільки в метро."
          correct: false
    - question: "Яку коротку абревіатуру ви найчастіше побачите на адресних табличках для слова «вулиця»?"
