          correct: true
        - text: "влц."
          correct: false
        - text: "пров."
          correct: false
        - text: "пл."
          correct: false

- type: unjumble
  title: "Складіть речення з новими словами"
  instruction: "Поставте слова у правильному порядку, щоб утворити граматично правильне речення."
  items:
    - words: ["це", "наш", "новий", "розклад", "роботи"]
