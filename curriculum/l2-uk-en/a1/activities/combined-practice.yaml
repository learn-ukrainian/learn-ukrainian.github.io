- type: fill-in
  title: "Вставте правильне слово"
  instruction: "Оберіть правильний сполучник або маркер часу для кожного речення."
  items:
    - sentence: "____ ми йдемо на каву, а потім в парк."
      answer: "Спочатку"
      options:
        - "Спочатку"
        - "Потім"
        - "Нарешті"
        - "Якщо"
    - sentence: "Я хочу торт, ____ він дуже дорогий."
      answer: "але"
      options:
        - "і"
        - "але"
        - "бо"
        - "спочатку"
    - sentence: "Вона не йде на базар, ____ вона на роботі."
      answer: "бо"
      options:
        - "і"
        - "потім"
        - "бо"
        - "але"
    - sentence: "Ми також купуємо овочі, ____ фрукти."
      answer: "і"
      options:
        - "і"
        - "бо"
        - "якщо"
        - "тому що"
    - sentence: "____ йде дощ, ми йдемо в кіно."
      answer: "Якщо"
      options:
        - "Якщо"
        - "Потім"
        - "Нарешті"
        - "Тому що"
    - sentence: "Він вивчає мову, ____ це важливо."
      answer: "тому що"
      options:
        - "тому що"
        - "але"
        - "спочатку"
        - "нарешті"
    - sentence: "Спочатку робота, а ____ відпочинок."
      answer: "потім"
      options:
        - "спочатку"
        - "потім"
        - "якщо"
        - "нарешті"
    - sentence: "Потім ми йшли довго, і ____ прийшли додому."
      answer: "нарешті"
      options:
        - "нарешті"
        - "спочатку"
        - "потім"
        - "але"

