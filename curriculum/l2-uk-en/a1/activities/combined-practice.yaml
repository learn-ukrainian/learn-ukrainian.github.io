- type: quiz
  title: "Як вирішити проблему?"
  instruction: "Оберіть найкращу реакцію на ситуацію."
  items:
    - question: "Що ви скажете, якщо ринок сьогодні закритий?"
      explanation: "Слово якщо використовується для умови."
      options:
        - text: "Якщо ринок закритий, ми йдемо в супермаркет."
          correct: true
        - text: "Ринок закритий, бо ми йдемо в супермаркет."
          correct: false
        - text: "Спочатку ринок закритий, потім супермаркет."
          correct: false
        - text: "Нарешті ринок закритий."
          correct: false
    - question: "Що ви скажете, якщо кава занадто дорога?"
      options:
        - text: "Якщо кава дорога, я п'ю чай."
          correct: true
        - text: "Я п'ю чай, але кава дорога."
          correct: false
        - text: "Я п'ю каву, якщо вона дорога."
          correct: false
        - text: "Спочатку кава дорога, потім я п'ю чай."
          correct: false
    - question: "Як сказати, що ви хочете допомогти вирішити ситуацію?"
      options:
        - text: "Я допоможу, якщо це проблема."
          correct: true
        - text: "Я допоможу, але це проблема."
          correct: false
        - text: "Я допоможу, спочатку це проблема."
          correct: false
        - text: "Якщо я допоможу, це не проблема."
          correct: false
    - question: "Що робити, якщо сьогодні йде дощ?"
      options:
        - text: "Якщо йде дощ, ми сидимо вдома."
          correct: true
        - text: "Ми сидимо вдома, але йде дощ."
          correct: false
        - text: "Ми сидимо вдома, спочатку йде дощ."
          correct: false
        - text: "Бо йде дощ, якщо ми вдома."
          correct: false
    - question: "Що ви скажете, якщо друг не знає куди йти?"
      options:
        - text: "Якщо хочеш, ходімо разом."
          correct: true
        - text: "Ми йдемо разом, але ти хочеш."
          correct: false
        - text: "Спочатку ми йдемо разом, якщо ти хочеш."
          correct: false
        - text: "Бо хочеш, ми йдемо."
          correct: false
    - question: "Як ви можете пояснити зміну ваших планів?"
      options:
        - text: "Нам треба змінити плани, бо магазин закритий."
          correct: true
        - text: "Ми змінюємо плани, але магазин закритий."
          correct: false
        - text: "Якщо магазин закритий, ми не змінюємо плани."
          correct: false
        - text: "Нарешті ми змінюємо магазин."
          correct: false
    - question: "Що ви скажете, якщо у кафе немає вашого улюбленого чаю?"
      options:
        - text: "Якщо немає чаю, я п'ю каву."
          correct: true
        - text: "Бо немає чаю, я п'ю каву."
          correct: false
        - text: "Спочатку немає чаю, потім я п'ю каву."
          correct: false
        - text: "Нарешті немає чаю."
          correct: false
    - question: "Що ви скажете, якщо автобус не приїхав?"
      options:
        - text: "Якщо автобус не приїхав, ми йдемо пішки."
          correct: true
        - text: "Ми йдемо пішки, але автобус не приїхав."
          correct: false
        - text: "Спочатку автобус не приїхав, потім ми йдемо."
          correct: false
        - text: "Бо автобус, ми йдемо пішки."
          correct: false

- type: quiz
  title: "Граматика та логіка"
  instruction: "Перевірте знання правил граматики та структури речення."
  items:
    - question: "Де в українському реченні правильно стоїть слово також?"
