        - text: "Вона і Олена"
          correct: false
        - text: "Вона але Олена"
          correct: false
        - text: "Вона бо Олена"
          correct: false
    - question: "Яке речення з поданих варіантів є граматично найбільш правильним?"
      options:
        - text: "Віктор також читає книгу."
          correct: true
        - text: "Віктор читає книгу також."
          correct: false
        - text: "Також Віктор читає книгу."
          correct: false
        - text: "Віктор читає також книгу."
          correct: false
    - question: "Як найкраще поєднати речення: Я люблю чай. Мій брат любить чай."
      options:
        - text: "Я люблю чай, і мій брат любить чай."
          correct: true
        - text: "Я люблю чай, але мій брат любить чай."
          correct: false
        - text: "Я люблю чай, бо мій брат любить чай."
          correct: false
        - text: "Я люблю чай, якщо мій брат любить чай."
          correct: false
    - question: "Як виразити загальну умову англійською if в українській мові?"
      options:
        - text: "якщо"
          correct: true
        - text: "бо"
          correct: false
        - text: "але"
          correct: false
        - text: "і"
          correct: false
    - question: "Оберіть найбільш природне та просте речення для щоденної розмови."
      explanation: "Слово бо - це дуже природний і короткий варіант для розмовної української мови."
      options:
        - text: "Я вдома, бо холодно."
          correct: true
        - text: "Я вдома, тому що холодно."
          correct: false
        - text: "Я вдома, але холодно."
          correct: false
        - text: "Я вдома, якщо холодно."
          correct: false

- type: match-up
  title: "Знайдіть пару: початок і кінець речення"
  instruction: "З'єднайте частини речення, щоб вони мали логічний сенс."
  pairs:
    - left: "Спочатку ми п'ємо каву,"
      right: "а потім йдемо на базар."
    - left: "Я хочу купити торт,"
      right: "але у мене немає грошей."
    - left: "Якщо ринок закритий,"
      right: "ми йдемо в супермаркет."
    - left: "Ми сидимо вдома,"
      right: "тому що йде дощ."
    - left: "Я п'ю воду,"
      right: "бо хочу пити."
    - left: "Олена студентка,"
      right: "і Віктор також студент."
    - left: "Спочатку робота,"
      right: "і нарешті відпочинок."
    - left: "Він не прийшов,"
      right: "бо у нього проблема."

- type: unjumble
  title: "Складіть правильні речення"
  instruction: "Поставте слова у правильному порядку, щоб утворити речення."
  items:
    - words: ["Спочатку", "ми", "йдемо", "на", "каву"]
      answer: "Спочатку ми йдемо на каву"
    - words: ["Потім", "ми", "купуємо", "овочі"]
      answer: "Потім ми купуємо овочі"
    - words: ["І", "нарешті", "йдемо", "додому"]
      answer: "І нарешті йдемо додому"
    - words: ["Я", "також", "хочу", "їсти"]
      answer: "Я також хочу їсти"
    - words: ["Ми", "не", "гуляємо", "бо", "холодно"]
      answer: "Ми не гуляємо бо холодно"
    - words: ["Якщо", "хочеш", "ми", "готуємо", "разом"]
      answer: "Якщо хочеш ми готуємо разом"

