      options:
        - text: "Я також хочу каву."
          correct: true
        - text: "Я хочу каву також."
          correct: false
        - text: "Також я хочу каву."
          correct: false
        - text: "Я хочу також каву."
          correct: false
    - question: "Яке слово означає те саме, що й тому що, але є більш розмовним?"
      options:
        - text: "бо"
          correct: true
        - text: "і"
          correct: false
        - text: "але"
          correct: false
        - text: "якщо"
          correct: false
    - question: "Який український сполучник ми використовуємо для протиставлення ідей?"
      options:
        - text: "але"
          correct: true
