- type: quiz
  title: "Оберіть правильне слово"
  instruction: "Read the situation and choose the correct modal word."
  items:
    - question: "Що ви скажете, якщо ви зараз дуже зайняті?"
      explanation: "Use 'не можу' to describe a temporary lack of time."
      options:
        - text: "Я не можу прийти."
          correct: true
        - text: "Я не вмію прийти."
          correct: false
        - text: "Мені не можна прийти."
          correct: false
        - text: "Я не хочу прийти."
          correct: false
    - question: "Як запитати, чи має людина навичку плавати?"
      explanation: "Use 'вміти' for learned skills."
      options:
        - text: "Ти вмієш плавати?"
          correct: true
        - text: "Ти можеш плавати?"
          correct: false
        - text: "Можна плавати?"
          correct: false
        - text: "Ти плаваєш зараз?"
          correct: false
    - question: "Ви хочете ввічливо запитати дозвіл у незнайомця."
      explanation: "'Можна' is the polite, impersonal way to ask for permission."
      options:
        - text: "Можна взяти цей стілець?"
          correct: true
        - text: "Я можу взяти стілець?"
          correct: false
        - text: "Я вмію брати стілець?"
          correct: false
        - text: "Ти можеш взяти стілець?"
          correct: false
    - question: "Що написано на знаку, якщо тут заборонено курити?"
      explanation: "'Не можна' expresses a strict external rule or prohibition."
      options:
        - text: "Тут не можна курити."
          correct: true
        - text: "Тут не вміють курити."
          correct: false
        - text: "Я не можу курити."
          correct: false
        - text: "Ми не можемо курити."
          correct: false
    - question: "Як сказати, що ви ніколи не вчилися водити машину?"
      explanation: "Use 'не вмію' to describe a lack of practical knowledge."
      options:
        - text: "Я не вмію водити."
          correct: true
        - text: "Я не можу водити."
          correct: false
        - text: "Мені не можна водити."
          correct: false
        - text: "Тут не можна водити."
          correct: false
    - question: "Вибачення, якщо сьогодні ви почуваєтеся дуже хворим."
      explanation: "Health is a temporary circumstance, so use 'не можу'."
      options:
        - text: "Я не можу допомогти сьогодні."
          correct: true
        - text: "Я не вмію допомогти сьогодні."
          correct: false
        - text: "Мені не можна допомогти сьогодні."
          correct: false
        - text: "Я не хочу допомогти зараз."
          correct: false
    - question: "Як запитати колегу про його вільний час завтра?"
      explanation: "Use 'могти' to ask about circumstantial ability and time."
      options:
        - text: "Ти можеш прийти завтра?"
          correct: true
        - text: "Ти вмієш прийти завтра?"
          correct: false
        - text: "Тобі можна прийти завтра?"
          correct: false
        - text: "Ти приходиш часто?"
          correct: false
    - question: "Як описати свій талант до малювання картин?"
      explanation: "Artistic talents and acquired skills use 'вміти'."
      options:
        - text: "Я добре вмію малювати."
          correct: true
        - text: "Я добре можу малювати."
          correct: false
        - text: "Мені можна добре малювати."
          correct: false
        - text: "Я малюю зараз добре."
          correct: false

- type: fill-in
  title: "Вставте правильну форму 'могти'"
  instruction: "Choose the correctly conjugated form of the verb 'могти'."
  items:
    - sentence: "Я _____ допомогти вам сьогодні ввечері."
      answer: "можу"
      options:
        - "можу"
        - "можеш"
        - "може"
        - "можемо"
      explanation: "First person singular (I) takes the form 'можу'."
    - sentence: "Ти _____ прийти до мене завтра?"
      answer: "можеш"
      options:
        - "можу"
        - "можеш"
        - "може"
        - "можемо"
      explanation: "Second person singular (you) takes the form 'можеш'."
    - sentence: "Він зараз не _____ говорити по телефону."
      answer: "може"
      options:
        - "можу"
        - "можеш"
        - "може"
        - "можуть"
      explanation: "Third person singular (he) takes the form 'може'."
    - sentence: "Ми _____ зачекати тут десять хвилин."
      answer: "можемо"
      options:
        - "можемо"
        - "можете"
        - "можуть"
        - "можу"
      explanation: "First person plural (we) takes the form 'можемо'."
    - sentence: "Ви _____ зробити це завдання сьогодні?"
      answer: "можете"
      options:
        - "можемо"
        - "можете"
        - "можуть"
        - "може"
      explanation: "Second person plural/formal (you) takes the form 'можете'."
    - sentence: "Вони _____ допомогти нам зробити цей проєкт."
      answer: "можуть"
      options:
        - "можемо"
        - "можете"
        - "можуть"
        - "можеш"
      explanation: "Third person plural (they) takes the form 'можуть'."
    - sentence: "Моя сестра не _____ прийти на зустріч."
      answer: "може"
      options:
        - "можу"
        - "можеш"
        - "може"
        - "можуть"
      explanation: "Сестра (she) is third person singular, so we use 'може'."
    - sentence: "Мої друзі _____ зачекати мене у кафе."
      answer: "можуть"
      options:
        - "можемо"
        - "можете"
        - "можуть"
        - "може"
      explanation: "Друзі (they) is third person plural, so we use 'можуть'."

- type: quiz
  title: "Оцінка правильності фраз"
  instruction: "Determine if the phrase is correct or incorrect for the situation."
  items:
    - question: "Щоб запитати людину, чи має вона навичку гри на гітарі, ви скажете 'Ти можеш грати на гітарі?' чи 'Ти вмієш грати?'"
      explanation: "You must use 'вмієш' to ask about a learned skill like playing an instrument."
      options:
        - text: "Ти вмієш грати?"
          correct: true
        - text: "Ти можеш грати?"
          correct: false
        - text: "Можна грати?"
          correct: false
        - text: "Ви граєте?"
          correct: false
    - question: "Ви захворіли і не йдете на роботу. Що ви скажете своєму босу?"
      explanation: "Sickness is a temporary circumstance. You must say 'Я не можу працювати сьогодні'."
      options:
        - text: "Я не можу працювати сьогодні."
          correct: true
        - text: "Я не вмію працювати сьогодні."
          correct: false
        - text: "Мені не можна працювати."
          correct: false
        - text: "Я не буду працювати."
          correct: false
    - question: "Як правильно і дуже ввічливо запитати дозволу взяти стілець у кафе?"
      explanation: "Using 'Можна + infinitive' is the perfect, polite way to ask for general permission."
      options:
        - text: "Можна взяти стілець?"
          correct: true
        - text: "Я можу взяти стілець?"
          correct: false
        - text: "Ти можеш дати стілець?"
          correct: false
        - text: "Я вмію брати стілець?"
          correct: false
    - question: "Яку фразу ви швидше за все побачите на знаку, що забороняє паркування?"
      explanation: "'Не можна' is used to express external rules and prohibitions on signs."
      options:
        - text: "Тут не можна паркуватися."
          correct: true
        - text: "Тут не вміють паркуватися."
          correct: false
        - text: "Я не можу паркуватися."
          correct: false
        - text: "Ми не можемо паркуватися."
          correct: false
    - question: "Ви ніколи не вчилися плавати. Що ви скажете друзям у басейні?"
      explanation: "If you lack the knowledge, you must use 'не вмію'."
      options:
        - text: "Я не вмію плавати."
          correct: true
        - text: "Я не можу плавати."
          correct: false
        - text: "Мені не можна плавати."
          correct: false
        - text: "Тут не можна плавати."
          correct: false
    - question: "Слово 'можна' завжди змінює свою форму залежно від особи (я, ти, він)?"
      explanation: "'Можна' is impersonal and stays the same regardless of the person."
      options:
        - text: "Ні, воно завжди однакове."
          correct: true
        - text: "Так, воно завжди змінюється."
          correct: false
        - text: "Воно змінюється тільки для 'я'."
          correct: false
        - text: "Воно змінюється тільки у минулому."
          correct: false
    - question: "Ваш друг каже: 'Я не можу говорити'. Що це означає у цій ситуації?"
      explanation: "It means a temporary lack of time or ability."
      options:
        - text: "Він зараз дуже зайнятий."
          correct: true
        - text: "Він не вміє говорити."
          correct: false
        - text: "Йому заборонили говорити."
          correct: false
        - text: "Він ніколи не говорив."
          correct: false
    - question: "Що означає, якщо людина каже 'Я не вмію готувати'?"
      explanation: "This describes a lack of a learned skill."
      options:
        - text: "Вона ніколи не вчилася готувати."
          correct: true
        - text: "Вона зараз не має часу готувати."
          correct: false
        - text: "Їй заборонено готувати їжу."
          correct: false
        - text: "На кухні немає світла."
          correct: false

