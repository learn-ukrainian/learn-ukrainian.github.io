- type: fill-in
  title: 'Оберіть правильне слово для розпорядку дня'
  instruction: 'Вставте правильну форму дієслова або слово.'
  items:
    - sentence: 'Вчора я _____ книгу ввечері.'
      answer: 'читав'
      options: ['читав', 'читала', 'читало', 'читали']
      explanation: 'Форма читав використовується для чоловічого роду.'
    - sentence: 'Вчора вона _____ в кафе.'
      answer: 'обідала'
      options: ['обідала', 'обідав', 'обідало', 'обідали']
      explanation: 'Форма обідала використовується для жіночого роду.'
    - sentence: 'Ми _____ у парку разом.'
      answer: 'гуляли'
      options: ['гуляли', 'гуляв', 'гуляла', 'гуляло']
      explanation: 'Форма гуляли використовується для множини.'
    - sentence: 'Сонце _____ дуже яскраво вчора.'
      answer: 'світило'
      options: ['світило', 'світив', 'світила', 'світили']
      explanation: 'Слово сонце середнього роду.'
    - sentence: 'Зазвичай я _____ о сьомій годині.'
      answer: 'встаю'
      options: ['встаю', 'встаєш', 'встає', 'встають']
      explanation: 'Форма встаю відповідає займеннику я.'
    - sentence: "Вранці він завжди _____ каву."
      answer: "п'є"
      options: ["п'є", "п'ю", "п'єш", "п'ють"]
      explanation: "Форма п'є відповідає займеннику він."
    - sentence: 'Сьогодні дуже _____ на вулиці.'
      answer: 'холодно'
      options: ['холодно', 'холодний', 'холодна', 'холодні']
      explanation: 'Використовуємо прислівник холодно для опису погоди.'
    - sentence: 'Влітку часто буває _____.'
      answer: 'тепло'
      options: ['тепло', 'теплий', 'тепла', 'теплі']
      explanation: 'Використовуємо прислівник тепло для опису погоди.'
    - sentence: 'Скільки _____ ця вода?'
      answer: 'коштує'
      options: ['коштує', 'коштують', 'коштувати', 'коштував']
      explanation: 'Вода — однина, тому коштує.'
    - sentence: 'Завтра я _____ працювати вдома.'
      answer: 'буду'
      options: ['буду', 'будеш', 'буде', 'будемо']
      explanation: 'Для я використовуємо форму буду.'
    - sentence: 'Ми _____ обідати в новому ресторані.'
      answer: 'будемо'
      options: ['будемо', 'буду', 'буде', 'будуть']
      explanation: 'Для ми використовуємо форму будемо.'
    - sentence: 'Вони _____ дивитися фільм.'
      answer: 'будуть'
      options: ['будуть', 'буду', 'будеш', 'будемо']
      explanation: 'Для вони використовуємо форму будуть.'

