- type: quiz
  title: 'Перевірка знань: минулий і майбутній час'
  instruction: 'Оберіть правильну відповідь на кожне запитання.'
  items:
    - question: 'Яка форма дієслова є правильною для речення: Вчора вона ... книгу?'
      options:
        - text: 'читала'
          correct: true
        - text: 'читав'
          correct: false
        - text: 'читало'
          correct: false
        - text: 'читали'
          correct: false
      explanation: 'Жіночий рід у минулому часі завжди закінчується на -ла.'
    - question: 'Яка форма дієслова є правильною для речення: Вчора ми ... в парку?'
      options:
        - text: 'гуляли'
          correct: true
        - text: 'гуляв'
          correct: false
        - text: 'гуляла'
          correct: false
        - text: 'гуляло'
          correct: false
      explanation: 'Для множини у минулому часі ми використовуємо закінчення -ли.'
    - question: 'Яке речення вказує на майбутній час в українській мові?'
      options:
        - text: 'Завтра я буду працювати.'
          correct: true
        - text: 'Вчора я працював.'
          correct: false
        - text: 'Сьогодні я працюю.'
          correct: false
        - text: 'Я часто працюю.'
          correct: false
      explanation: 'Слово буду вказує на майбутній час (аналітична форма).'
    - question: 'Як правильно запитати про напрямок руху в українській мові?'
      options:
        - text: 'Куди ти йдеш?'
          correct: true
        - text: 'Де ти йдеш?'
          correct: false
        - text: 'Що ти йдеш?'
          correct: false
        - text: 'Коли ти йдеш?'
          correct: false
      explanation: 'Слово куди використовується для напрямку (direction).'
    - question: 'Який відмінок потрібен після питання Де в українській мові?'
      options:
        - text: 'Місцевий'
          correct: true
        - text: 'Знахідний'
          correct: false
        - text: 'Називний'
          correct: false
        - text: 'Родовий'
          correct: false
      explanation: 'Питання де вказує на локацію, тому використовуємо Місцевий відмінок.'
    - question: 'Яке слово відповідає на питання Як і описує дію?'
      options:
        - text: 'добре'
          correct: true
        - text: 'добрий'
          correct: false
        - text: 'добра'
          correct: false
        - text: 'добро'
          correct: false
      explanation: 'Слово добре — це прислівник, який описує дію.'
    - question: 'Яка з цих фраз правильно описує погоду на вулиці?'
      options:
        - text: 'Сьогодні дуже тепло.'
          correct: true
        - text: 'Сьогодні це тепло.'
          correct: false
        - text: 'Сьогодні є тепло.'
          correct: false
        - text: 'Сьогодні ми тепло.'
          correct: false
      explanation: 'Для погоди ми використовуємо безособові короткі форми, наприклад тепло.'
    - question: 'Як правильно сказати про час дії у ранковий час?'
      options:
        - text: "Вранці я п'ю каву."
          correct: true
        - text: "Ранок я п'ю каву."
          correct: false
        - text: "На ранок я п'ю каву."
          correct: false
        - text: "У ранок я п'ю каву."
          correct: false
      explanation: 'Слово вранці є правильним прислівником часу.'
    - question: 'Що ми зазвичай робимо ввечері після довгого робочого дня?'
      options:
        - text: 'Ми вечеряємо.'
          correct: true
        - text: 'Ми снідаємо.'
          correct: false
        - text: 'Ми обідаємо.'
          correct: false
        - text: 'Ми встаємо.'
          correct: false
      explanation: 'Вечеря — це їжа у вечірній час.'
    - question: 'Як правильно запитати про ціну товару в українському магазині?'
      options:
        - text: 'Скільки це коштує?'
          correct: true
        - text: 'Як це коштує?'
          correct: false
        - text: 'Де це коштує?'
          correct: false
        - text: 'Куди це коштує?'
          correct: false
      explanation: 'Фраза скільки коштує є стандартною для питання про ціну.'
    - question: 'Яка форма дієслова є правильною для речення: Завтра він ... відпочивати?'
      options:
        - text: 'буде'
          correct: true
        - text: 'буду'
          correct: false
        - text: 'будемо'
          correct: false
        - text: 'будуть'
          correct: false
      explanation: 'Для займенника він використовуємо форму буде.'
    - question: 'Яке речення вказує на минулий час для середнього роду?'
      options:
        - text: 'Сонце світило яскраво.'
          correct: true
        - text: 'Сонце світив яскраво.'
          correct: false
        - text: 'Сонце світила яскраво.'
          correct: false
        - text: 'Сонце світили яскраво.'
          correct: false
      explanation: 'Слово сонце — середнього роду, тому дієслово закінчується на -ло.'

