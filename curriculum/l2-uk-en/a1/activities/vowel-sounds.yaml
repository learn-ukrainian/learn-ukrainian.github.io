- type: quiz
  title: И vs І — Can You Tell the Difference?
  instruction: Choose the correct answer for each question about the Ukrainian vowels
    И and І.
  items:
  - question: Which vowel sounds like 'ee' in 'see' — bright and high?
    options:
    - text: І
      correct: true
    - text: И
      correct: false
    - text: Е
      correct: false
    - text: Ї
      correct: false
    explanation: І is the bright, high vowel — like 'ee' in 'see'. И is lower and
      more relaxed.
  - question: Which vowel has NO exact match in English — jaw relaxed, tongue low?
    options:
    - text: И
      correct: true
    - text: І
      correct: false
    - text: А
      correct: false
    - text: У
      correct: false
    explanation: И is uniquely Ukrainian. Your jaw drops slightly compared to І.
  - question: The word сир (cheese) contains which vowel?
    options:
    - text: И
      correct: true
    - text: І
      correct: false
    - text: Е
      correct: false
    - text: Ї
      correct: false
    explanation: сир (cheese) has И — jaw relaxed, tongue lower.
  - question: The word кіт (cat) contains which vowel?
    options:
    - text: І
      correct: true
    - text: И
      correct: false
    - text: Е
      correct: false
    - text: А
      correct: false
    explanation: кіт (cat) has І — bright and high, like 'ee' in 'see'.
  - question: The word ліс (forest) contains which vowel?
    options:
    - text: І
      correct: true
    - text: И
      correct: false
    - text: Е
      correct: false
    - text: У
      correct: false
    explanation: ліс (forest) has І — the bright, high vowel.
  - question: The word риба (fish) contains which vowel?
    options:
    - text: И
      correct: true
    - text: І
      correct: false
    - text: А
      correct: false
    - text: О
      correct: false
    explanation: риба (fish) has И — feel your jaw drop slightly when you say it.
  - question: The word син (son) contains which vowel?
    options:
    - text: И
      correct: true
    - text: І
      correct: false
    - text: Е
      correct: false
    - text: Ї
      correct: false
    explanation: син (son) has И — the relaxed, lower vowel.
  - question: The word сік (juice) contains which vowel?
    options:
    - text: І
      correct: true
    - text: И
      correct: false
    - text: Е
      correct: false
    - text: А
      correct: false
    explanation: сік (juice) has І — bright and high.
  - question: Which physical test helps you tell И from І apart?
    options:
    - text: Put your hand under your chin — jaw drops for И, stays higher for І
      correct: true
    - text: Close your eyes — И is louder than І
      correct: false
    - text: Hold your nose — И is nasal, І is not
      correct: false
    - text: Cover your ears — И vibrates more than І
      correct: false
    explanation: 'The jaw test from the lesson: your jaw drops for И (as in кит) but
      stays higher for І (as in кіт).'
  - question: кит means 'whale' and кіт means 'cat'. What changes between them?
    options:
    - text: Only the vowel — И vs І
      correct: true
    - text: The first consonant
      correct: false
    - text: The stress position
      correct: false
    - text: The last consonant
      correct: false
    explanation: кит and кіт are a minimal pair — same consonants, different vowel,
      completely different meaning.
- type: classify
  title: One Sound or Two?
  instruction: In each word below, does the highlighted iotated vowel represent ONE
    sound (softens the consonant before it) or TWO sounds (Й + base vowel)?
  categories:
  - label: Two Sounds (Й + vowel)
    items:
    - Я in яблуко
    - Ю in юнак
    - Є in Європа
    - Ї in їжак
    - Я in моя
  - label: One Sound (softens consonant)
    items:
    - Ю in люди
    - Я in мати
    - Є in синє
- type: fill-in
  title: Count the Syllables
  instruction: 'Remember the rule: every Ukrainian syllable has exactly one vowel.
    Count the vowels to find the number of syllables.'
  items:
  - sentence: How many syllables does молоко have? ___
    answer: '3'
    options:
    - '1'
    - '2'
    - '3'
    - '4'
    explanation: мо-ло-ко has 3 vowels (О, О, О) = 3 syllables.
  - sentence: How many syllables does кіт have? ___
    answer: '1'
    options:
    - '1'
    - '2'
    - '3'
    - '4'
    explanation: кіт has 1 vowel (І) = 1 syllable.
  - sentence: How many syllables does Україна have? ___
    answer: '4'
    options:
    - '2'
    - '3'
    - '4'
    - '5'
    explanation: У-кра-ї-на has 4 vowels (У, А, Ї, А) = 4 syllables.
  - sentence: How many syllables does яблуко have? ___
    answer: '3'
    options:
    - '1'
    - '2'
    - '3'
    - '4'
    explanation: я-блу-ко has 3 vowels (Я, У, О) = 3 syllables.
  - sentence: How many syllables does їжак have? ___
    answer: '2'
    options:
    - '1'
    - '2'
    - '3'
    - '4'
    explanation: ї-жак has 2 vowels (Ї, А) = 2 syllables.
  - sentence: How many syllables does село have? ___
    answer: '2'
    options:
    - '1'
    - '2'
    - '3'
    - '4'
    explanation: се-ло has 2 vowels (Е, О) = 2 syllables.
  - sentence: How many syllables does риба have? ___
    answer: '2'
    options:
    - '1'
    - '2'
    - '3'
    - '4'
    explanation: ри-ба has 2 vowels (И, А) = 2 syllables.
  - sentence: How many syllables does Європа have? ___
    answer: '3'
    options:
    - '2'
    - '3'
    - '4'
    - '5'
    explanation: Єв-ро-па has 3 vowels (Є, О, А) = 3 syllables.
- type: true-false
  title: Vowel Facts — True or False?
  instruction: Decide whether each statement about Ukrainian vowels is true or false.
  items:
  - statement: Ukrainian has 10 vowel letters.
    correct: true
    explanation: Correct! 6 base (А О У Е И І) + 4 iotated (Я Ю Є Ї) = 10 vowel letters.
  - statement: The letter Ї exists in Russian and Ukrainian.
    correct: false
    explanation: Ї is unique to Ukrainian — no other Slavic language has it.
  - statement: Unstressed Ukrainian vowels change their sound to 'uh'.
    correct: false
    explanation: 'The Golden Rule: Ukrainian vowels stay pure in any position. They
      never reduce to ''uh'' like English vowels do.'
  - statement: Every Ukrainian syllable has exactly one vowel.
    correct: true
    explanation: 'This is the syllable counting rule: count the vowels and you know
      the syllables.'
  - statement: Й is a full vowel that creates its own syllable.
    correct: false
    explanation: Й is a semi-vowel — it never forms a syllable on its own.
  - statement: The letter Ї always represents two sounds (Й + І).
    correct: true
    explanation: Unlike Я, Ю, and Є, the letter Ї always keeps its double nature.
  - statement: Ukrainian Е sounds like 'ee' in 'see'.
    correct: false
    explanation: Ukrainian Е sounds like 'e' in 'set' — short and clear, NOT like
      'ee'.
  - statement: The words сир and сір have different meanings because of their vowels.
    correct: true
    explanation: сир (cheese) has И, сір (grey) has І — same consonants, different
      vowel, different meaning.
