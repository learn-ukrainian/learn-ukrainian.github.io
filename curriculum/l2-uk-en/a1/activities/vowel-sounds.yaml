- type: match-up
  title: Match the Vowel Letter to Its Sound
  instruction: Match each Ukrainian vowel letter to its English sound description.
  pairs:
  - left: А
    right: '''a'' in ''father'''
  - left: О
    right: '''o'' in ''more'''
  - left: У
    right: '''oo'' in ''moon'''
  - left: Е
    right: '''e'' in ''set'''
  - left: І
    right: '''ee'' in ''see'''
  - left: Я
    right: Й + А at word start
  - left: Ю
    right: Й + У at word start
  - left: Є
    right: Й + Е at word start
  - left: Ї
    right: always Й + І
