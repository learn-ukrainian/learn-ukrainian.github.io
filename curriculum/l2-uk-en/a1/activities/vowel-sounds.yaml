- type: watch-and-repeat
  title: Vowel Pronunciation Drill
  instruction: Watch each video, then repeat the vowel sound and example word out
    loud. Focus on keeping each vowel pure and clear.
  items:
  - letter: А
    word: мама
    video: https://www.youtube.com/watch?v=hvB3VpcR3ZE
    note: Open and relaxed, like 'a' in 'father'
  - letter: О
    word: око
    video: https://www.youtube.com/watch?v=gJFxRIPRZbI
    note: Rounded, like 'o' in 'more' — stays pure even when unstressed
  - letter: У
    word: тут
    video: https://www.youtube.com/watch?v=VB1O6PmtYRU
    note: Like 'oo' in 'moon' — round your lips firmly
  - letter: Е
    word: небо
    video: https://www.youtube.com/watch?v=KFlsroBW0dk
    note: Like 'e' in 'set' — NOT like English 'ee'
  - letter: И
    word: риба
    video: https://www.youtube.com/watch?v=W-1rCu0indE
    note: Uniquely Ukrainian — jaw relaxed, tongue lower than for І
  - letter: І
    word: кіт
    video: https://www.youtube.com/watch?v=Z9TH0H4ShGo
    note: Like 'ee' in 'see' — bright and high
  - letter: Я
    word: яблуко
    video: https://www.youtube.com/watch?v=yhSAf41LX8I
    note: 'At word start: sounds like Й+А'
  - letter: Ю
    word: юшка
    video: https://www.youtube.com/watch?v=9JdIBYCTWGw
    note: 'At word start: sounds like Й+У'
  - letter: Є
    word: Європа
    video: https://www.youtube.com/watch?v=O0bwRyyBQSc
    note: 'At word start: sounds like Й+Е'
  - letter: Ї
    word: їжак
    video: https://www.youtube.com/watch?v=UcjdjQXhAY8
    note: 'ALWAYS two sounds: Й+І — uniquely Ukrainian letter'
