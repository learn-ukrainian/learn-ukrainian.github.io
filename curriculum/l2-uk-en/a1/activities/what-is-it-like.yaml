- id: wb-odd-one-out
  type: odd-one-out
  instruction: Find the word that does not belong in the group.
  items:
  - words:
    - великий
    - новий
    - кімната
    - чистий
    correct: 2
    explanation: Кімната is a noun (object), while the others are adjectives (descriptions).
  - words:
    - стіл
    - телефон
    - вікно
    - плакат
    correct: 2
    explanation: Вікно is a neuter noun, while the others are masculine.
  - words:
    - нова
    - велике
    - стара
    - чиста
    correct: 1
    explanation: Велике is a neuter adjective, while the others are feminine.
  - words:
    - а
    - і
    - але
    - новий
    correct: 3
    explanation: Новий is an adjective, while the others are small connecting words
      (conjunctions).
  - words:
    - новий
    - чистий
    - гарний
    - поганий
    correct: 3
    explanation: Поганий has a negative meaning, while the others have positive meanings.
  - words:
    - який
    - яка
    - кімната
    - яке
    correct: 2
    explanation: Кімната is a noun, while the others are question words.
