version: '1.0'
module: what-is-it-like
level: a1
inline:
- id: quiz-yakyi-yaka-yake
  type: quiz
  instruction: Which question word fits? Choose **який**, **яка**, or **яке**.
  items:
  - question: ___ стіл?
    options:
    - який
    - яка
    - яке
    correct: 0
  - question: ___ кімната?
    options:
    - який
    - яка
    - яке
    correct: 1
  - question: ___ вікно?
    options:
    - який
    - яка
    - яке
    correct: 2
  - question: ___ телефон?
    options:
    - який
    - яка
    - яке
    correct: 0
  - question: ___ сумка?
    options:
    - який
    - яка
    - яке
    correct: 1
  - question: ___ ліжко?
    options:
    - який
    - яка
    - яке
    correct: 2
- id: match-adjective-opposites
  type: match-up
  instruction: Match each adjective with its opposite.
  pairs:
  - left: великий
    right: маленький
  - left: новий
    right: старий
  - left: гарний
    right: поганий
  - left: чистий
    right: брудний
  - left: дорогий
    right: дешевий
  - left: світлий
    right: темний
- id: fill-in-adjective-endings
  type: fill-in
  instruction: Choose the correct adjective form to match the noun.
  items:
  - sentence: Нов___ стіл.
    answer: новий
    options:
    - новий
    - нова
    - нове
  - sentence: Нов___ книга.
    answer: нова
    options:
    - новий
    - нова
    - нове
  - sentence: Нов___ вікно.
    answer: нове
    options:
    - новий
    - нова
    - нове
  - sentence: Велик___ стіл.
    answer: великий
    options:
    - великий
    - велика
    - велике
  - sentence: Велик___ кімната.
    answer: велика
    options:
    - великий
    - велика
    - велике
  - sentence: Велик___ крісло.
    answer: велике
    options:
    - великий
    - велика
    - велике
  - sentence: Чист___ стілець.
    answer: чистий
    options:
    - чистий
    - чиста
    - чисте
  - sentence: Чист___ підлога.
    answer: чиста
    options:
    - чистий
    - чиста
    - чисте
  - sentence: Чист___ ліжко.
    answer: чисте
    options:
    - чистий
    - чиста
    - чисте
  - sentence: Гарн___ шафа.
    answer: гарна
    options:
    - гарний
    - гарна
    - гарне
- id: fill-in-describe-room
  type: fill-in
  instruction: Complete each sentence with the correct adjective form.
  items:
  - sentence: Моя кімната ___.
    answer: велика
    options:
    - великий
    - велика
    - велике
  - sentence: Стіл ___.
    answer: старий
    options:
    - старий
    - стара
    - старе
  - sentence: Вікно ___.
    answer: чисте
    options:
    - чистий
    - чиста
    - чисте
  - sentence: Шафа ___, але гарна.
    answer: стара
    options:
    - старий
    - стара
    - старе
  - sentence: Підлога ___ і нова.
    answer: чиста
    options:
    - чистий
    - чиста
    - чисте
  - sentence: Телефон ___ і дешевий.
    answer: новий
    options:
    - новий
    - нова
    - нове
workbook:
- type: group-sort
  instruction: Sort each noun into the correct group by its question word.
  groups:
  - label: Який? (він — masculine)
    items:
    - стіл
    - телефон
    - стілець
  - label: Яка? (вона — feminine)
    items:
    - кімната
    - сумка
    - книга
    - шафа
    - підлога
  - label: Яке? (воно — neuter)
    items:
    - вікно
    - ліжко
    - крісло
- type: true-false
  instruction: Read each sentence. Is it true based on the dialogues in the lesson?
  items:
  - statement: Тарасова кімната велика і світла.
    correct: true
    explanation: 'Тарас says: «Моя кімната велика і світла.»'
  - statement: Стіл у Тараса старий.
    correct: false
    explanation: Тарас says the table is новий (new). The bed (ліжко) is старе, not
      the table.
  - statement: Вікно у Тараса велике і чисте.
    correct: true
    explanation: 'Тарас says: «Вікно велике і чисте.»'
  - statement: Сумка у магазині дешева.
    correct: false
    explanation: Андрій says the bag is дорога (expensive), not дешева.
  - statement: Телефон великий і дешевий.
    correct: true
    explanation: 'Андрій says: «Він великий і дешевий.»'
  - statement: Вікно магазину брудне.
    correct: false
    explanation: 'Андрій says: «Воно чисте і світле.» The window is clean and bright.'
- type: error-correction
  instruction: Find the adjective with the wrong ending and correct it.
  items:
  - sentence: Моя кімната великий.
    error: великий
    correction: велика
    error_type: word
    options:
    - велика
    - великий
    - велике
    explanation: 'Кімната is feminine (**яка?**), so the adjective ends in **-а**:
      велика.'
  - sentence: Стіл нова.
    error: нова
    correction: новий
    error_type: word
    options:
    - новий
    - нова
    - нове
    explanation: 'Стіл is masculine (**який?**), so the adjective ends in **-ий**:
      новий.'
  - sentence: Вікно чистий.
    error: чистий
    correction: чисте
    error_type: word
    options:
    - чистий
    - чиста
    - чисте
    explanation: 'Вікно is neuter (**яке?**), so the adjective ends in **-е**: чисте.'
  - sentence: Книга старе.
    error: старе
    correction: стара
    error_type: word
    options:
    - старий
    - стара
    - старе
    explanation: 'Книга is feminine (**яка?**), so the adjective ends in **-а**: стара.'
  - sentence: Телефон дешева.
    error: дешева
    correction: дешевий
    error_type: word
    options:
    - дешевий
    - дешева
    - дешеве
    explanation: 'Телефон is masculine (**який?**), so the adjective ends in **-ий**:
      дешевий.'
  - sentence: Ліжко гарний.
    error: гарний
    correction: гарне
    error_type: word
    options:
    - гарний
    - гарна
    - гарне
    explanation: 'Ліжко is neuter (**яке?**), so the adjective ends in **-е**: гарне.'
- type: observe
  examples:
  - новий стіл → Який стіл? — Новий.
  - нова кімната → Яка кімната? — Нова.
  - нове вікно → Яке вікно? — Нове.
  - чистий стілець → Який стілець? — Чистий.
  - чиста підлога → Яка підлога? — Чиста.
  - чисте ліжко → Яке ліжко? — Чисте.
  prompt: Look at the question word and the adjective ending in each pair. What is
    the connection between them?
- type: fill-in
  instruction: Complete each sentence using the adjective given in brackets. Use the
    correct form.
  items:
  - sentence: Сумка ___. (дорогий)
    answer: дорога
    options:
    - дорогий
    - дорога
    - дороге
  - sentence: Крісло ___. (старий)
    answer: старе
    options:
    - старий
    - стара
    - старе
  - sentence: Підлога ___. (брудний)
    answer: брудна
    options:
    - брудний
    - брудна
    - брудне
  - sentence: Телефон ___. (дешевий)
    answer: дешевий
    options:
    - дешевий
    - дешева
    - дешеве
  - sentence: Кімната ___, але гарна. (темний)
    answer: темна
    options:
    - темний
    - темна
    - темне
  - sentence: Вікно ___ і велике. (чистий)
    answer: чисте
    options:
    - чистий
    - чиста
    - чисте
- type: translate
  instruction: Choose the correct Ukrainian translation.
  items:
