version: '1.0'
module: what-is-it-like
level: a1
inline:
- id: quiz-question-word
  type: quiz
  instruction: 'Choose the correct question word: **який**, **яка**, or **яке**.'
  items:
  - question: _____ плакат!
    options:
    - Який
    - Яка
    - Яке
    correct: 0
  - question: _____ книга!
    options:
    - Який
    - Яка
    - Яке
    correct: 1
  - question: _____ вікно?
    options:
    - Який
    - Яка
    - Яке
    correct: 2
  - question: _____ стіл?
    options:
    - Який
    - Яка
    - Яке
    correct: 0
  - question: _____ ручка?
    options:
    - Який
    - Яка
    - Яке
    correct: 1
  - question: _____ фото?
    options:
    - Який
    - Яка
    - Яке
    correct: 2
- id: fill-in-adjective-endings
  type: fill-in
  instruction: Choose the correct **прикметник** (adjective) ending.
  items:
  - sentence: Це _____ стіл.
    answer: великий
    options:
    - великий
    - велика
    - велике
  - sentence: Це _____ книга.
    answer: нова
    options:
    - новий
    - нова
    - нове
  - sentence: Там _____ вікно.
    answer: чисте
    options:
    - чистий
    - чиста
    - чисте
  - sentence: Це _____ фото.
    answer: старе
    options:
    - старий
    - стара
    - старе
  - sentence: Це _____ кімната.
    answer: світла
    options:
    - світлий
    - світла
    - світле
  - sentence: Це _____ телефон.
    answer: дорогий
    options:
    - дорогий
    - дорога
    - дороге
- id: match-up-opposites
  type: match-up
  instruction: Match the **прикметники** (adjectives) with their opposites.
  pairs:
  - left: великий
    right: маленький
  - left: новий
    right: старий
  - left: гарний
    right: поганий
  - left: чистий
    right: брудний
  - left: світлий
    right: темний
  - left: дорогий
    right: дешевий
- id: fill-in-room-description
  type: fill-in
  instruction: Choose the correct word to complete the description.
  items:
  - sentence: Моя кімната велика _____ світла.
    answer: і
    options:
    - і
    - а
    - але
  - sentence: Стіл новий, _____ ліжко старе.
    answer: а
    options:
    - і
    - а
    - але
  - sentence: Кімната маленька, _____ гарна.
    answer: але
    options:
    - і
    - а
    - але
  - sentence: Вікно _____ і чисте.
    answer: велике
    options:
    - великий
    - велика
    - велике
  - sentence: Там є _____ ліжко.
    answer: нове
    options:
    - новий
    - нова
    - нове
  - sentence: Це мій _____ стіл.
    answer: новий
    options:
    - новий
    - нова
    - нове
workbook:
- id: sort-adjectives-gender
  type: group-sort
  instruction: Sort the **прикметники** (adjectives) by gender.
  groups:
  - label: Він (Masculine)
    items:
    - великий
    - новий
    - старий
    - чистий
  - label: Вона (Feminine)
    items:
    - маленька
    - світла
    - гарна
    - брудна
  - label: Воно (Neuter)
    items:
    - нове
    - старе
    - велике
    - темне
- id: tf-adjective-logic
  type: true-false
  instruction: Are these phrases grammatically correct? Choose True or False.
  items:
  - statement: Великий кімната.
    correct: false
    explanation: Кімната is feminine (вона), so it must be велика кімната.
  - statement: Нове вікно.
    correct: true
    explanation: Вікно is neuter (воно), so it uses the neuter ending -е.
  - statement: Чистий стіл.
    correct: true
    explanation: Стіл is masculine (він), so it uses the masculine ending -ий.
  - statement: Старе фото.
    correct: true
    explanation: Фото is neuter (воно), so it uses the neuter ending -е.
  - statement: Дорогий сумка.
    correct: false
    explanation: Сумка is feminine (вона), so it must be дорога сумка.
  - statement: Гарне день.
    correct: false
    explanation: День is masculine (він), so it must be гарний день.
- id: fix-adjective-errors
  type: error-correction
  instruction: Find and correct the gender agreement error.
  items:
  - sentence: Це велика стіл.
    error: велика
    correction: великий
    error_type: word
    options:
    - великий
    - велика
    - велике
    explanation: Стіл is masculine, so it should be великий.
  - sentence: Моя кімната новий.
    error: новий
    correction: нова
    error_type: word
    options:
    - новий
    - нова
    - нове
    explanation: Кімната is feminine, so it should be нова.
  - sentence: Це чиста вікно.
    error: чиста
    correction: чисте
    error_type: word
    options:
    - чистий
    - чиста
    - чисте
    explanation: Вікно is neuter, so it should be чисте.
  - sentence: Мій телефон стара.
    error: стара
    correction: старий
    error_type: word
    options:
    - старий
    - стара
    - старе
    explanation: Телефон is masculine, so it should be старий.
  - sentence: Ця книга дороге.
    error: дороге
    correction: дорога
    error_type: word
    options:
    - дорогий
    - дорога
    - дороге
    explanation: Книга is feminine, so it should be дорога.
  - sentence: Це погана фото.
    error: погана
    correction: погане
    error_type: word
    options:
    - поганий
    - погана
    - погане
    explanation: Фото is neuter, so it should be погане.
- id: unjumble-descriptions
  type: unjumble
  instruction: Make correct sentences from the words.
  items:
  - words:
    - великий
    - Це
    - плакат.
    correct_order:
    - Це
    - великий
    - плакат.
  - words:
    - кімната
    - Моя
    - світла.
    correct_order:
    - Моя
    - кімната
    - світла.
  - words:
    - новий
    - Там
    - атлас.
    correct_order:
    - Там
    - новий
    - атлас.
  - words:
    - вікно
    - чисте.
    - Це
    correct_order:
    - Це
    - чисте
    - вікно.
  - words:
    - маленький
    - Стілець
    - і
    - старий.
    correct_order:
    - Стілець
    - маленький
    - і
    - старий.
  - words:
    - дорогий.
    - новий
    - і
    - Телефон
    correct_order:
    - Телефон
    - новий
    - і
    - дорогий.
