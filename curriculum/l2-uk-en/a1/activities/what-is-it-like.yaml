- id: match-nouns-adjectives
  type: match-up
  instruction: Match the nouns with the correct **прикметники** (adjectives).
  pairs:
  - left: стіл
    right: великий
  - left: кімната
    right: світла
  - left: фото
    right: старе
  - left: телефон
    right: новий
  - left: сумка
    right: дорога
  - left: вікно
    right: чисте
- id: tf-dialogue-comprehension
  type: true-false
  instruction: Read the dialogues and choose True or False.
  items:
  - statement: Плакат великий.
    correct: true
    explanation: 'Тарас says: ''Який великий плакат!'''
  - statement: Фото нове.
    correct: false
    explanation: 'Софія says: ''А там — старе фото.'''
  - statement: Атлас новий.
    correct: true
    explanation: Тарас asks 'Це новий атлас?' and Софія says 'Так, новий атлас.'
  - statement: Кімната Софії темна.
    correct: false
    explanation: 'She says: ''Моя кімната велика і світла.'''
  - statement: Стіл Софії новий.
    correct: true
    explanation: 'She says: ''Стіл новий.'''
  - statement: Ліжко Софії нове.
    correct: false
    explanation: 'She says: ''А ліжко — старе.'''
