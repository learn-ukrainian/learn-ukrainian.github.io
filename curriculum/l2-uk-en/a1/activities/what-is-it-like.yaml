workbook:
- id: wb-group-sort-gender
  type: group-sort
  instruction: 'Sort the nouns into the correct gender groups: **чоловічий** (m),
    **жіночий** (f), and **середній** (n).'
  groups:
  - label: Чоловічий рід (Який?)
    items:
    - телефон
    - стіл
    - атлас
    - плакат
  - label: Жіночий рід (Яка?)
    items:
    - кімната
    - сумка
    - книга
    - листівка
  - label: Середній рід (Яке?)
    items:
    - вікно
    - ліжко
    - фото
- id: wb-true-false-grammar
  type: true-false
  instruction: Read the statements about Ukrainian grammar. Are they true or false?
  items:
  - statement: The word «кімната» is a masculine noun.
    correct: false
    explanation: Кімната ends in -а, so it is a feminine noun.
  - statement: The adjective «новий» correctly matches the noun «стіл».
    correct: true
    explanation: Стіл is masculine, and новий is the masculine adjective form.
  - statement: To ask about «вікно», you should use the question word «яка».
    correct: false
    explanation: Вікно is a neuter noun, so you must use the neuter question word
      «яке».
  - statement: The adjectives «світла» and «темна» are both in the feminine form.
    correct: true
    explanation: They both end in -а, which is the standard feminine ending.
  - statement: The correct question to ask about a «ліжко» is «який?».
    correct: false
    explanation: Ліжко is neuter, so the question word should be «яке».
  - statement: The phrase «старе фото» is grammatically correct.
    correct: true
    explanation: Фото is a neuter noun, and старе is the neuter adjective form.
