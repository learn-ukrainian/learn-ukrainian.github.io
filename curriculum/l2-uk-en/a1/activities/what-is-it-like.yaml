    - кімната
    - велика
    - і
    - світла.
  - words:
    - великий.
    - новий
    - і
    - Стіл
    correct_order:
    - Стіл
    - новий
    - і
    - великий.
  - words:
    - Яка
    - твоя
    - кімната?
    correct_order:
    - Яка
    - твоя
    - кімната?
  - words:
