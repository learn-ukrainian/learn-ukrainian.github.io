version: '1.0'
module: sounds-letters-and-hello
level: a1
inline:
- id: quiz
  type: quiz
  instruction: Choose the correct answer about sounds and letters.
  items:
  - question: What do we hear and pronounce?
    options:
    - звуки (sounds)
    - літери (letters)
    - слова (words)
    correct: 0
  - question: What do we see and write?
    options:
    - звуки (sounds)
    - літери (letters)
    - пісні (songs)
    correct: 1
  - question: How many letters are in the Ukrainian alphabet?
    options:
    - '26'
    - '33'
    - '38'
    correct: 1
  - question: How many sounds are there in the Ukrainian language?
    options:
    - '33'
    - '38'
    - '10'
    correct: 1
  - question: Can you say 'vowel letter' in Ukrainian grammar?
    options:
    - Yes, it is common
    - No, a vowel is a sound, not a letter
    correct: 1
  - question: Which of these is a pure voice sound with no obstruction?
    options:
    - голосний (vowel)
    - приголосний (consonant)
    correct: 0
- id: match-up
  type: match-up
  instruction: Match the Ukrainian letter to the sound it represents.
  pairs:
  - left: А
    right: '[а]'
  - left: О
    right: '[о]'
  - left: У
    right: '[у]'
  - left: М
    right: '[м]'
  - left: К
    right: '[к]'
  - left: Н
    right: '[н]'
- id: fill-in
  type: fill-in
  instruction: Complete the greeting dialogue.
  items:
  - sentence: — ____! Як справи?
    answer: Привіт
    options:
    - Привіт
    - справи
    - Добре
    - Чудово
  - sentence: — Привіт! Як ____?
    answer: справи
    options:
    - Привіт
    - справи
    - Добре
    - тебе
  - sentence: — ____. А у тебе?
    answer: Добре
    options:
    - Привіт
    - Добре
    - Чудово
    - тебе
  - sentence: — Добре. А у ____?
    answer: тебе
    options:
    - справи
    - Добре
    - Чудово
    - тебе
  - sentence: — ____.
    answer: Чудово
    options:
    - Привіт
    - Добре
    - Нормально
    - Чудово
  - sentence: — ____, дякую.
    answer: Нормально
    options:
    - Нормально
    - Привіт
    - справи
    - тебе
- id: group-sort
  type: group-sort
  instruction: Sort the Ukrainian sounds into Vowels and Consonants.
  groups:
  - label: Голосні (Vowels)
    items:
    - '[а]'
    - '[о]'
    - '[у]'
    - '[е]'
    - '[и]'
    - '[і]'
  - label: Приголосні (Consonants)
    items:
    - '[к]'
    - '[м]'
    - '[т]'
    - '[в]'
    - '[н]'
    - '[р]'
    - '[с]'
    - '[х]'
