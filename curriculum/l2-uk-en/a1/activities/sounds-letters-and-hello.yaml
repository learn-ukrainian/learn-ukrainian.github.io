- id: quiz-sounds-vs-letters
  type: quiz
  instruction: Test yourself on sounds vs letters. Choose the correct answer.
  items:
  - question: What do we HEAR and PRONOUNCE in language?
    options:
    - звуки (sounds)
    - літери (letters)
    - слова (words)
    - склади (syllables)
    correct: 0
  - question: What do we SEE and WRITE?
    options:
    - звуки (sounds)
    - літери (letters)
    - голосні (vowels)
    - приголосні (consonants)
    correct: 1
  - question: How many LETTERS (літери) are in the Ukrainian alphabet (абетка)?
    options:
    - '26'
    - '30'
    - '33'
    - '38'
    correct: 2
  - question: How many SOUNDS (звуки) does Ukrainian have?
    options:
    - '30'
    - '33'
    - '36'
    - '38'
    correct: 3
  - question: Is it correct to say 'голосна літера' (vowel letter)?
    options:
    - Yes — both letters and sounds can be голосні
    - No — голосний describes a SOUND, not a letter
    - Only for the letters А and О
    - Yes, in informal speech
    correct: 1
  - question: Which letter represents NO sound at all?
    options:
    - Й
    - Ь
    - Ї
    - Є
    correct: 1
- id: match-false-friends
  type: match-up
  instruction: Ukrainian letters can look like English letters — but sound completely
    different! Match each Ukrainian letter to its actual sound.
  pairs:
  - left: В
    right: '[в] — like ''v'' in ''voice'' (not like English B)'
  - left: Н
    right: '[н] — like ''n'' in ''no'' (not like English H)'
  - left: Р
    right: '[р] — a rolled ''r'' (not like English P)'
  - left: С
    right: '[с] — like ''s'' in ''sun'' (not like English C)'
  - left: У
    right: '[у] — like ''oo'' in ''moon'' (not like English Y)'
  - left: Х
    right: '[х] — like ''ch'' in Scottish ''loch'' (not like English X)'
  - left: Е
    right: '[е] — like ''e'' in ''bed'''
  - left: І
    right: '[і] — like ''ee'' in ''see'''
