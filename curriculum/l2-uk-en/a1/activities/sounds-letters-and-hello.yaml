- type: match-up
  instruction: Match each Ukrainian word to its English meaning.
  pairs:
  - left: звук
    right: sound
  - left: літера
    right: letter
  - left: голосний
    right: vowel sound
  - left: приголосний
    right: consonant sound
  - left: привіт
    right: hi / hello (informal)
  - left: добре
    right: good / fine
  - left: чудово
    right: great / wonderful
  - left: нормально
    right: okay / so-so
  - left: мама
    right: mother
  - left: молоко
    right: milk
- type: true-false
  instruction: True or false? Think carefully about what you learned in this module.
  items:
  - statement: Ukrainian has 33 letters in its alphabet.
    correct: true
    explanation: Yes — the абетка has exactly 33 letters, from А to Я.
  - statement: Ukrainian has 33 sounds — the same number as letters.
    correct: false
    explanation: Ukrainian has 38 sounds. Letters Я, Ю, Є, Ї can each represent two
      sounds; Ь represents no sound at all.
  - statement: The letter Ь (м'який знак) makes its own special soft sound.
    correct: false
    explanation: Ь represents NO sound. It only softens the consonant before it, then
      disappears from the sound picture entirely.
  - statement: Vowel sounds (голосні) can be sung indefinitely.
    correct: true
    explanation: Yes — air flows freely for голосні, so you can hold and sing А-А-А
      or О-О-О as long as you have breath.
  - statement: The word 'мама' has 4 letters and 4 sounds.
    correct: true
    explanation: М-А-М-А = 4 letters. [м]-[а]-[м]-[а] = 4 sounds. Letters and sounds
      match exactly for мама.
  - statement: Ukrainian has 6 vowel sounds.
    correct: true
    explanation: The six vowel sounds are [а], [о], [у], [е], [и], [і]. There are
      10 vowel LETTERS, but only 6 vowel sounds.
  - statement: It is correct to say 'голосна літера' (vowel letter).
    correct: false
    explanation: No — голосний describes a SOUND, not a letter. Letters only represent
      sounds; they are not sounds themselves.
  - statement: In the word 'Привіт', there are 2 vowel sounds.
    correct: true
    explanation: П[р][и]В[і]Т — the vowel sounds are [и] and [і], giving 2 голосні
      звуки and 4 приголосні.
