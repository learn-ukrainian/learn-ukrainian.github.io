workbook:
- id: anagram-vocab
  type: anagram
  instruction: Unscramble the letters to form a Ukrainian word.
  items:
  - letters:
    - м
    - а
    - м
    - а
    answer: мама
  - letters:
    - т
    - а
    - т
    - о
    answer: тато
  - letters:
    - д
    - і
    - м
    answer: дім
  - letters:
    - о
    - к
    - о
    answer: око
  - letters:
    - н
    - і
    - с
    answer: ніс
  - letters:
    - с
    - о
    - н
    answer: сон
  title: Unscramble the letters to form a Ukrainian word.
- id: true-false-phonetics
  type: true-false
  instruction: Determine if the statement is true or false based on what you have
    learned.
  items:
  - statement: There are exactly 33 sounds in the Ukrainian language.
    correct: false
    explanation: There are 38 sounds, but only 33 letters.
  - statement: The soft sign «ь» makes zero sound on its own.
    correct: true
    explanation: The soft sign only changes the pronunciation of the consonant directly
      before it.
  - statement: Vowels in Ukrainian are called «Голосні».
    correct: true
    explanation: They are produced using only your voice.
  - statement: Every Ukrainian word has at least one vowel sound.
    correct: true
    explanation: Vowels act as the beating heart of every syllable.
  - statement: «Привіт» is a formal greeting used with your teachers.
    correct: false
    explanation: «Привіт» is an informal greeting used with friends and peers.
  - statement: To introduce yourself, you use the phrase «Мене звати...».
    correct: true
    explanation: This literally means 'They call me...' and is the standard way to
      introduce yourself.
  title: Determine if the statement is true or false based on what you have learned.
- id: divide-words-syllables
  type: divide-words
  instruction: Divide the following words into syllables.
  items:
  - word: мама
    answer: ма-ма
  - word: молоко
    answer: мо-ло-ко
  - word: тато
    answer: та-то
  - word: око
    answer: о-ко
  - word: чудово
    answer: чу-до-во
  - word: добре
    answer: до-бре
  title: Divide the following words into syllables.
- id: count-syllables-practice
  type: count-syllables
  instruction: Count the number of syllables in each word by counting its vowel sounds.
  items:
  - word: привіт
    correct: 2
  - word: дім
    correct: 1
  - word: добре
    correct: 2
  - word: нормально
    correct: 3
  - word: звук
    correct: 1
  - word: літера
    correct: 3
  title: Count the number of syllables in each word by counting its vowel sounds.
- id: odd-one-out-vocab
  type: odd-one-out
  instruction: Find the word or letter that does not belong in the group.
  items:
  - words:
    - мама
    - тато
    - дім
    correct: 2
    explanation: «Дім» means house, while the others are family members.
  - words:
    - добре
    - чудово
    - літера
    correct: 2
    explanation: «Літера» means letter, while the others are positive responses to
      'How are you?'.
  - words:
    - А
    - О
    - К
    correct: 2
    explanation: «К» is a consonant letter, while the others are vowels.
  - words:
    - ніс
    - око
    - звук
    correct: 2
    explanation: «Звук» means sound, while the others are body parts.
  - words:
    - П
    - М
    - У
    correct: 2
    explanation: «У» is a vowel letter, while the others are consonants.
  - words:
    - Марко
    - Софія
    - молоко
    correct: 2
    explanation: «Молоко» means milk, while the others are names.
  title: Find the word or letter that does not belong in the group.
- id: phrase-table-greetings
  type: phrase-table
  instruction: Review these essential phrases for greetings and basic introductions.
  groups:
  - label: Greetings and Questions
    phrases:
    - Привіт! (Hi!)
    - Добрий день! (Good afternoon!)
    - Як справи? (How are you?)
    - Як тебе звати? (What is your name?)
  - label: Responses
    phrases:
    - Добре (Fine/Good)
    - Чудово (Great/Wonderful)
    - Нормально (Okay)
    - Мене звати... (My name is...)
  title: Review these essential phrases for greetings and basic introductions.
