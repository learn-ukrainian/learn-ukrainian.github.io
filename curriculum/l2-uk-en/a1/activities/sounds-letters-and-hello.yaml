version: '1.0'
module: sounds-letters-and-hello
level: a1
inline:
- id: quiz-sounds-vs-letters
  type: quiz
  instruction: Choose the correct answer about sounds and letters.
  items:
  - question: Що ми чуємо і вимовляємо? (What do we hear and pronounce?)
    options:
    - літери
    - звуки
    - мама
    - тато
    correct: 1
  - question: Що ми бачимо і пишемо? (What do we see and write?)
    options:
    - приголосні
    - голосні
    - літери
    - звуки
    correct: 2
  - question: Скільки літер в абетці? (How many letters in the alphabet?)
    options:
    - '26'
    - '32'
    - '33'
    - '38'
    correct: 2
  - question: Скільки звуків в українській мові? (How many sounds in Ukrainian?)
    options:
    - '33'
    - '36'
    - '38'
    - '42'
    correct: 2
  - question: Чи можна говорити «голосна літера»? (Can we say 'vowel letter'?)
    options:
    - Yes, it is correct
    - Ні, голосний — це звук, не літера
    - Yes, but only for А and О
    - No, because vowels are consonants
    correct: 1
  - question: What is the role of the soft sign (Ь)?
    options:
    - It makes a vowel sound
    - It makes a hard consonant sound
    - It makes the word plural
    - It makes no sound, only softens
    correct: 3
  title: Choose the correct answer about sounds and letters.
- id: match-up-letters-to-sounds
  type: match-up
  instruction: Match the Ukrainian letters to the sounds they represent.
  pairs:
  - left: А
    right: '[а]'
  - left: О
    right: '[о]'
  - left: У
    right: '[у]'
  - left: М
    right: '[м]'
  - left: К
    right: '[к]'
  - left: Н
    right: '[н]'
  title: Match the Ukrainian letters to the sounds they represent.
- id: fill-in-greeting
  type: fill-in
  instruction: Complete the basic greeting dialogue.
  items:
  - sentence: — ____! Як справи?
    answer: Привіт
    options:
    - Привіт
    - Добре
    - Чудово
  - sentence: — Привіт! Як ____?
    answer: справи
    options:
    - тебе
    - справи
    - Нормально
  - sentence: — ____. А у тебе?
    answer: Добре
    options:
    - Добре
    - Привіт
    - справи
  - sentence: — Добре. А у ____?
    answer: тебе
    options:
    - тебе
    - Чудово
    - Нормально
  - sentence: — ____.
    answer: Чудово
    options:
    - Чудово
    - Привіт
    - справи
  - sentence: — ____.
    answer: Нормально
    options:
    - Нормально
    - тебе
    - справи
  title: Complete the basic greeting dialogue.
