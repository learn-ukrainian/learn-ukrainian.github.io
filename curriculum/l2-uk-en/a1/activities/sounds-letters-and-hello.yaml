version: '1.0'
module: sounds-letters-and-hello
level: a1
inline:
- id: group-sort-vowels-consonants
  type: group-sort
  instruction: 'Sort these Ukrainian letters into two groups: vowels (голосні) and
    consonants (приголосні).'
  groups:
  - label: Голосні (vowels)
    items:
    - А
    - О
    - У
    - Е
    - И
    - І
  - label: Приголосні (consonants)
    items:
    - К
    - М
    - Т
    - В
    - Н
    - Р
    - С
    - Х
- id: match-false-friends
  type: match-up
  instruction: Match each false friend letter to its REAL Ukrainian sound — not the
    English sound it looks like!
  pairs:
  - left: В
    right: '[в] — like "v"'
  - left: Н
    right: '[н] — like "n"'
  - left: Р
    right: '[р] — rolled "r"'
  - left: С
    right: '[с] — like "s"'
  - left: У
    right: '[у] — like "oo"'
  - left: Х
    right: '[х] — like "ch" in "loch"'
- id: fill-in-greeting
  type: fill-in
  instruction: Complete this greeting dialogue by filling in the missing words.
  items:
  - sentence: — ____! Як справи?
    answer: Привіт
    options:
    - Привіт
    - Добре
    - Чудово
  - sentence: — ____. А у тебе?
    answer: Добре
    options:
    - Привіт
    - Добре
    - Нормально
  - sentence: — ____!
    answer: Чудово
    options:
    - Чудово
    - Привіт
    - Добре
  - sentence: — Як ____?
    answer: справи
    options:
    - справи
    - добре
    - тебе
- id: quiz-sounds-vs-letters
  type: quiz
  instruction: Answer the questions about Ukrainian sounds and letters.
  items:
  - question: What do we hear and pronounce?
    options:
    - звуки (sounds)
    - літери (letters)
    - слова (words)
    correct: 0
  - question: What do we see and write?
    options:
    - звуки (sounds)
    - літери (letters)
    - речення (sentences)
    correct: 1
  - question: How many letters are in the Ukrainian абетка (alphabet)?
    options:
    - '26'
    - '33'
    - '38'
    correct: 1
  - question: How many sounds does Ukrainian have?
    options:
    - '33'
    - '36'
    - '38'
    correct: 2
  - question: Which family of sounds is described as 'you hear them in a song'?
    options:
    - приголосні (consonants)
    - голосні (vowels)
    - йотовані (iotated)
    correct: 1
  - question: How many голосні звуки (vowel sounds) does Ukrainian have?
    options:
    - '6'
    - '10'
    - '33'
    correct: 0
workbook:
- type: quiz
  instruction: Choose the correct answer about Ukrainian letters and sounds.
  items:
  - question: The letter В in Ukrainian sounds like...
    options:
    - '"b" as in boy'
    - '"v" as in voice'
    - '"w" as in water'
    correct: 1
  - question: The letter Р in Ukrainian sounds like...
    options:
    - '"p" as in park'
    - a rolled "r"
    - '"r" as in red'
    correct: 1
  - question: The letter Н in Ukrainian sounds like...
    options:
    - '"h" as in hat'
    - '"n" as in no'
    - '"m" as in map'
    correct: 1
  - question: The letter С in Ukrainian sounds like...
    options:
    - '"k" as in cat'
    - '"s" as in sun'
    - '"c" as in city'
    correct: 1
  - question: Which letter is unique to Ukrainian and not found in Russian or Belarusian?
    options:
    - Я
    - Ї
    - Є
    correct: 1
- type: match-up
  instruction: Match each Ukrainian word to its English meaning.
  pairs:
  - left: мама
    right: mother
  - left: тато
    right: father
  - left: вода
    right: water
  - left: рука
    right: hand
  - left: книга
    right: book
  - left: школа
    right: school
- type: match-up
  instruction: Match each sign you might see in a Ukrainian city to its meaning.
  pairs:
  - left: Аптека
    right: pharmacy
  - left: Банк
    right: bank
  - left: Метро
    right: metro
  - left: Пошта
    right: post office
  - left: Зупинка
    right: bus stop
- type: quiz
  instruction: Choose the correct response for each greeting situation.
  items:
  - question: Someone says "Привіт! Як справи?" — how do you reply?
    options:
    - Привіт!
    - Добре!
    - Як справи?
    correct: 1
  - question: You want to ask 'How are you?' in Ukrainian. What do you say?
    options:
    - Добре!
    - А у тебе?
    - Як справи?
    correct: 2
  - question: Your friend says things are fine and asks about you. What did they say?
    options:
    - Чудово! Привіт!
    - Добре. А у тебе?
    - Нормально. Як справи?
    correct: 1
  - question: 'A woman says she''s glad to see you. She says:'
    options:
    - Радий тебе бачити!
    - Рада тебе бачити!
    - Добре тебе бачити!
    correct: 1
- type: group-sort
  instruction: 'Sort these letters: which ones look like Latin letters but make DIFFERENT
    sounds (false friends), and which ones look AND sound similar (friendly letters)?'
  groups:
  - label: Friendly letters (look and sound similar)
    items:
    - А
    - О
    - К
    - М
    - Т
  - label: False friends (look similar, sound different)
    items:
    - В
    - Н
    - Р
    - С
    - У
    - Х
- type: quiz
  instruction: Use Це (this is) to identify things. Choose the correct sentence.
  items:
  - question: You point at a school. What do you say?
    options:
    - Це школа.
    - Це банк.
    - Це аптека.
    correct: 0
  - question: You want to say 'This is mom.' What do you say?
    options:
    - Хто це?
    - Це тато.
    - Це мама.
    correct: 2
  - question: You ask about a thing (not a person). Which question word do you use?
    options:
    - Хто це?
    - Що це?
    - Як справи?
    correct: 1
  - question: You ask about a person. Which question word do you use?
    options:
    - Що це?
    - Хто це?
    - Де це?
    correct: 1
- type: anagram
  instruction: Unscramble the letters to form a Ukrainian word you learned in this
    module.
  items:
  - letters:
    - і
    - в
    - т
    - р
    - и
    - п
    answer: привіт
    hint: a greeting — hi!
  - letters:
    - а
    - м
    - а
    - м
    answer: мама
    hint: mother
  - letters:
    - о
    - а
    - д
    - в
    answer: вода
    hint: water
  - letters:
    - г
    - н
    - и
    - к
    - а
    answer: книга
    hint: book
