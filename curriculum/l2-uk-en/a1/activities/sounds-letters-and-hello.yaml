workbook:
- id: divide-words-into-syllables
  type: divide-words
  instruction: Поділіть слова на склади (за кількістю голосних звуків).
  items:
  - word: молоко
    answer: мо-ло-ко
  - word: мама
    answer: ма-ма
  - word: тато
    answer: та-то
  - word: добре
    answer: до-бре
  - word: чудово
    answer: чу-до-во
  - word: привіт
    answer: при-віт
  title: Поділіть слова на склади (за кількістю голосних звуків).
- id: count-vowels-syllables
  type: count-syllables
  instruction: Порахуйте кількість складів (голосних звуків) у словах.
  items:
  - word: молоко
    correct: 3
  - word: мама
    correct: 2
  - word: нормально
    correct: 3
  - word: дім
    correct: 1
  - word: ніс
    correct: 1
  - word: справи
    correct: 2
  title: Порахуйте кількість складів (голосних звуків) у словах.
- id: true-false-phonetics
  type: true-false
  instruction: Визначте, чи правильне твердження про українські звуки та літери.
  items:
  - statement: В українській абетці 33 літери.
    correct: true
  - statement: В українській мові 33 звуки.
    correct: false
  - statement: Голосні звуки утворюються лише за допомогою голосу.
    correct: true
  - statement: М'який знак (Ь) позначає звук [ь].
    correct: false
  - statement: Літера — це графічний знак.
    correct: true
  - statement: Можна говорити «голосна літера».
    correct: false
  title: Визначте, чи правильне твердження про українські звуки та літери.
- id: match-up-greetings
  type: match-up
  instruction: З'єднайте фразу з правильною відповіддю.
  pairs:
  - left: Як справи?
    right: Добре!
  - left: Як тебе звати?
    right: Мене звати Марко.
  - left: Привіт!
    right: Привіт!
  - left: А у тебе?
    right: Чудово, дякую.
  - left: Радий зустрічі!
    right: Рада зустрічі!
  - left: Мене звати Софія.
    right: А мене Марко.
  title: З'єднайте фразу з правильною відповіддю.
- id: group-words-by-syllables
  type: group-sort
  instruction: Розподіліть слова за кількістю голосних звуків (складів).
  groups:
  - label: Один склад
    items:
    - дім
    - ніс
    - сон
    - звук
  - label: Два склади
    items:
    - мама
    - тато
    - добре
    - привіт
  - label: Три склади
    items:
    - молоко
    - чудово
    - нормально
    - літера
  title: Розподіліть слова за кількістю голосних звуків (складів).
- id: anagram-greetings
  type: anagram
  instruction: Складіть слова з літер.
  items:
  - letters:
    - п
    - р
    - и
    - в
    - і
    - т
    answer: привіт
  - letters:
    - д
    - о
    - б
    - р
    - е
    answer: добре
  - letters:
    - ч
    - у
    - д
    - о
    - в
    - о
    answer: чудово
  - letters:
    - с
    - п
    - р
    - а
    - в
    - и
    answer: справи
  - letters:
    - з
    - в
    - а
    - т
    - и
    answer: звати
  - letters:
    - т
    - е
    - б
    - е
    answer: тебе
  title: Складіть слова з літер.
