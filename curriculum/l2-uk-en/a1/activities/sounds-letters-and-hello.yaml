inline:
- id: quiz-sounds-vs-letters
  type: quiz
  instruction: Choose the correct answer.
  items:
  - question: What do we hear and pronounce?
    options:
    - sounds
    - letters
    - words
    - syllables
    correct: 0
  - question: What do we see and write?
    options:
    - letters
    - sounds
    - vowels
    - consonants
    correct: 0
  - question: How many letters are in the Ukrainian alphabet?
    options:
    - '33'
    - '38'
    - '6'
    - '32'
    correct: 0
  - question: How many sounds are there in the Ukrainian language?
    options:
    - '38'
    - '33'
    - '10'
    - '6'
    correct: 0
  - question: Is it correct to say 'vowel letter'?
    options:
    - No, a letter is just a symbol.
    - Yes, always.
    - Sometimes.
    - Only for A, O, U.
    correct: 0
  - question: Which letter makes no sound of its own?
    options:
    - ь (soft sign)
    - я
    - ю
    - є
    correct: 0
  title: Choose the correct answer.
- id: match-up-letters-sounds
  type: match-up
  instruction: Match the letter to its sound.
