- id: true-false-sounds
  type: true-false
  instruction: Is this statement true or false?
  items:
  - statement: There are 33 sounds in the Ukrainian language.
    correct: false
    explanation: There are 38 sounds and 33 letters.
  - statement: We see and write letters, but we hear and pronounce sounds.
    correct: true
    explanation: This is the fundamental difference between sounds and letters.
  - statement: The letter ь (soft sign) represents a vowel sound.
    correct: false
    explanation: The soft sign makes no sound of its own; it only softens the preceding
      consonant.
  - statement: There are 6 vowel sounds in Ukrainian.
    correct: true
    explanation: The six vowel sounds are [а], [о], [у], [е], [и], [і].
  - statement: Vowel sounds can be sung easily.
    correct: true
    explanation: Vowels are made with open airflow and can be sung.
  - statement: Consonants are pronounced with an obstruction in the mouth.
    correct: true
    explanation: Consonants involve lips, teeth, or tongue blocking the airflow.
  title: Is this statement true or false?
- id: match-up-vocab-eng
  type: match-up
  instruction: Match the Ukrainian words to their English translations.
  pairs:
  - left: привіт
    right: hi
  - left: як справи
    right: how are you
  - left: добре
    right: fine
  - left: чудово
    right: great
  - left: нормально
    right: okay
  - left: мама
    right: mother
  title: Match the Ukrainian words to their English translations.
