    answer: ма-ма
  - word: тато
    answer: та-то
  - word: молоко
    answer: мо-ло-ко
  - word: добре
    answer: до-бре
  - word: чудово
    answer: чу-до-во
  - word: нормально
    answer: нор-маль-но
  title: Divide the words into syllables.
- id: count-syllables-practice
  type: count-syllables
  instruction: Count the number of syllables in each word.
  items:
  - word: дім
    correct: 1
  - word: мама
    correct: 2
  - word: молоко
    correct: 3
  - word: сон
    correct: 1
  - word: чудово
    correct: 3
  - word: нормально
    correct: 3
  title: Count the number of syllables in each word.
