version: '1.0'
module: sounds-letters-and-hello
level: a1
inline:
- id: quiz-sounds-vs-letters
  type: quiz
  instruction: Choose the correct answer about sounds and letters.
  items:
  - question: What do we hear and pronounce?
    options:
    - Letters
    - Sounds
    - Alphabet
    - Words
    correct: 1
  - question: What do we see and write?
    options:
    - Letters
    - Sounds
    - Vibrations
    - Voice
    correct: 0
  - question: How many letters are in the Ukrainian alphabet?
    options:
    - '26'
    - '32'
    - '33'
    - '38'
    correct: 2
  - question: How many sounds are in the Ukrainian language?
    options:
    - '30'
    - '33'
    - '38'
    - '40'
    correct: 2
  - question: Is it correct to say 'a vowel letter' in Ukrainian?
    options:
    - Yes, always
    - No, only sounds can be vowels
    - Yes, but only for A and O
    - No, vowels are only written
    correct: 1
  - question: What represents a sound on paper?
    options:
    - A symbol called a letter
    - A physical vibration
    - An alphabet
    - A consonant
    correct: 0
  title: Choose the correct answer about sounds and letters.
- id: match-up-letters-sounds
  type: match-up
  instruction: Match the Ukrainian letter you see to the sound you hear.
  pairs:
  - left: А
    right: '[а]'
  - left: О
    right: '[о]'
  - left: У
    right: '[у]'
  - left: М
    right: '[м]'
  - left: К
    right: '[к]'
  - left: Н
    right: '[н]'
  title: Match the Ukrainian letter you see to the sound you hear.
- id: fill-in-greetings
  type: fill-in
  instruction: Complete the greetings dialogue with the correct words.
  items:
  - sentence: — ____! Як справи?
    answer: Привіт
    options:
    - Привіт
    - Добре
    - Чудово
    - Нормально
  - sentence: — Привіт! Як ____?
    answer: справи
    options:
    - справи
    - Добре
    - тебе
    - Чудово
  - sentence: — ____. А у тебе?
    answer: Добре
    options:
    - Добре
    - справи
    - тебе
    - Привіт
  - sentence: — ____. Рада тебе бачити!
    answer: Чудово
    options:
    - справи
    - тебе
    - Привіт
    - Чудово
  - sentence: — Привіт! Мене ____ Марко.
    answer: звати
    options:
    - звати
    - справи
    - Добре
    - тебе
  - sentence: — Мене звати Софія. А ____?
    answer: тебе
    options:
    - тебе
    - звати
    - справи
    - Нормально
  title: Complete the greetings dialogue with the correct words.
