version: "1.0"
module: sounds-letters-and-hello
level: a1

inline:
  - id: quiz-reading-practice
    type: quiz
    instruction: "Оберіть правильну відповідь"
    items:
      - question: "Що ми чуємо і вимовляємо?"
        options: ["звуки", "літери", "слова"]
        correct: 0
      - question: "Що ми бачимо і пишемо?"
        options: ["звуки", "літери", "слова"]
        correct: 1
      - question: "Скільки літер в українській абетці?"
        options: ["32", "33", "38"]
        correct: 1
      - question: "Скільки звуків в українській мові?"
        options: ["33", "38", "32"]
        correct: 1
      - question: "Які звуки утворюються тільки голосом?"
        options: ["голосні", "приголосні", "літери"]
        correct: 0
      - question: "Які звуки створюють перешкоду в роті?"
        options: ["голосні", "приголосні", "літери"]
        correct: 1

workbook:
  - type: match-up
    instruction: "З'єднайте літери з їхніми справжніми звуками"
    pairs:
      - left: "В"
        right: "звук [в], а не 'b'"
      - left: "Н"
        right: "звук [н], а не 'h'"
      - left: "Р"
        right: "звук [р], а не 'p'"
      - left: "С"
        right: "звук [с], а не 'c/k'"
      - left: "У"
        right: "звук [у], а не 'y'"
      - left: "Х"
        right: "звук [х], а не 'x'"

  - type: group-sort
    instruction: "Розподіліть літери на голосні та приголосні"
    groups:
      - label: "Голосні"
        items: ["А", "О", "У", "Е", "И", "І"]
      - label: "Приголосні"
        items: ["К", "М", "Т", "В", "Н", "Р", "С", "Х"]

  - type: fill-in
    instruction: "Заповніть пропуски в діалозі"
    items:
      - sentence: "— ___! Як справи?"
        answer: "Привіт"
        options: ["Привіт", "Чудово", "Добре", "Нормально"]
      - sentence: "— Привіт! Як ___?"
        answer: "справи"
        options: ["тебе", "справи", "Чудово", "Привіт"]
      - sentence: "— Добре. А у ___?"
        answer: "тебе"
        options: ["тебе", "справи", "Добре", "Нормально"]
      - sentence: "— ___."
        answer: "Чудово"
        options: ["Привіт", "тебе", "Нормально", "Чудово"]