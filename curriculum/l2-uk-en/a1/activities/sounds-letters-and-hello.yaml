- type: match-up
  instruction: Match the English word to its Ukrainian equivalent.
  pairs:
  - left: sound
    right: звук
  - left: letter
    right: літера
  - left: vowel
    right: голосний
  - left: consonant
    right: приголосний
  - left: hello
    right: привіт
  - left: mother
    right: мама
  - left: milk
    right: молоко
  - left: eye
    right: око
- type: true-false
  instruction: True or False?
  items:
  - statement: There are 33 letters in the Ukrainian alphabet.
    correct: true
    explanation: The Ukrainian alphabet has exactly 33 letters.
  - statement: There are more letters than sounds in Ukrainian.
    correct: false
    explanation: There are 38 sounds and 33 letters.
  - statement: Vowels (голосні) are produced with obstruction in the mouth.
    correct: false
    explanation: Vowels are produced freely with voice. Consonants have obstruction.
  - statement: The letter Ь (soft sign) represents a vowel sound.
    correct: false
    explanation: The Ь makes no sound of its own. It softens the consonant before
      it.
  - statement: '''Привіт'' is a formal way to say hello.'
    correct: false
    explanation: '''Привіт'' is informal, used for friends and family.'
  - statement: Ukrainian spelling is highly phonetic.
    correct: true
    explanation: What you see is almost exactly what you hear.
