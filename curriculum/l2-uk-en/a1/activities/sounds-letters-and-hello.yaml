version: '1.0'
module: sounds-letters-and-hello
level: a1
inline:
- id: quiz-sounds-letters
  type: quiz
  instruction: Choose the correct answer based on the golden rule of Ukrainian.
  items:
  - question: Що ми чуємо і вимовляємо? (What do we hear and pronounce?)
    options:
    - звуки (sounds)
    - літери (letters)
    - слова (words)
    - абетку (alphabet)
    correct: 0
  - question: Що ми бачимо і пишемо? (What do we see and write?)
    options:
    - літери (letters)
    - звуки (sounds)
    - голос (voice)
    - музику (music)
    correct: 0
  - question: Скільки літер в українській абетці? (How many letters are in the Ukrainian
      alphabet?)
    options:
    - '33'
    - '38'
    - '26'
    - '32'
    correct: 0
  - question: Скільки звуків в українській мові? (How many sounds are in the Ukrainian
      language?)
    options:
    - '38'
    - '33'
    - '40'
    - '22'
    correct: 0
  - question: Чи можна говорити «голосна літера»? (Is it correct to say 'vowel letter'?)
    options:
    - Ні (No, sounds are vowels)
    - Так (Yes)
    - Можливо (Maybe)
    - Завжди (Always)
    correct: 0
  - question: Яка літера не позначає жодного звука? (Which letter represents no sound
      at all?)
    options:
    - Ь (soft sign)
    - Я
    - А
    - Ґ
    correct: 0
  title: Choose the correct answer based on the golden rule of Ukrainian.
- id: match-up-letters
  type: match-up
  instruction: Match the Ukrainian letter to the sound it represents. Бачу... Чую...
    (I see... I hear...)
