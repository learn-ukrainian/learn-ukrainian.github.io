workbook:
- id: match-up-vocab-wb
  type: match-up
  instruction: Match the Ukrainian words to their English translations.
  pairs:
  - left: привіт
    right: hi
  - left: добре
    right: fine
  - left: чудово
    right: great
  - left: мама
    right: mother
  - left: тато
    right: father
  - left: молоко
    right: milk
  - left: звук
    right: sound
  - left: літера
    right: letter
  title: Match the Ukrainian words to their English translations.
- id: divide-words-wb
  type: divide-words
  instruction: Divide the words into syllables. Remember, every syllable must have
    a vowel.
  items:
  - word: молоко
    answer: мо-ло-ко
  - word: мама
    answer: ма-ма
  - word: тато
    answer: та-то
  - word: літера
    answer: лі-те-ра
  - word: нормально
    answer: нор-маль-но
  - word: привіт
    answer: при-віт
  title: Divide the words into syllables. Remember, every syllable must have a vowel.
- id: count-syllables-wb
  type: count-syllables
  instruction: Count the number of syllables in each word by counting the vowel sounds.
  items:
  - word: око
    correct: 2
  - word: дім
    correct: 1
  - word: ніс
    correct: 1
  - word: сон
    correct: 1
  - word: нормально
    correct: 3
  - word: літера
    correct: 3
  title: Count the number of syllables in each word by counting the vowel sounds.
- id: anagram-vocab-wb
  type: anagram
  instruction: Rearrange the letters to form the correct Ukrainian word.
  items:
  - letters:
    - м
    - а
    - м
    - а
    answer: мама
  - letters:
    - т
    - а
    - т
    - о
    answer: тато
  - letters:
    - д
    - і
    - м
    answer: дім
  - letters:
    - с
    - о
    - н
    answer: сон
  - letters:
    - о
    - к
    - о
    answer: око
  - letters:
    - н
    - і
    - с
    answer: ніс
  title: Rearrange the letters to form the correct Ukrainian word.
- id: true-false-concepts-wb
  type: true-false
  instruction: Are these statements true or false?
  items:
  - statement: A letter is a symbol we write and see.
    correct: true
    explanation: Звуки ми чуємо й вимовляємо, а букви бачимо й пишемо.
  - statement: There are 38 letters in the Ukrainian alphabet.
    correct: false
    explanation: There are 33 letters, but 38 distinct sounds.
  - statement: A vowel sound is made with an obstruction in the mouth.
    correct: false
    explanation: Vowels are made purely with the voice, with no airflow obstruction.
  - statement: The soft sign (Ь) makes no sound of its own.
    correct: true
    explanation: Its only job is to soften the consonant that comes before it.
  - statement: Every syllable must contain at least one consonant.
    correct: false
    explanation: Every syllable must contain exactly one VOWEL, but consonants are
      not strictly required for a syllable to exist.
  - statement: Ukrainian spelling is highly phonetic, meaning words are pronounced
      mostly as they are written.
    correct: true
    explanation: What you see is almost always what you hear.
  title: Are these statements true or false?
- id: odd-one-out-syllables-wb
  type: odd-one-out
  instruction: Find the word that has a different number of syllables.
  items:
  - words:
    - дім
    - сон
    - мама
    correct: 2
    explanation: мама has 2 syllables, the rest have 1
  - words:
    - тато
    - око
    - ніс
    correct: 2
    explanation: ніс has 1 syllable, the rest have 2
  - words:
    - молоко
    - літера
    - звук
    correct: 2
    explanation: звук has 1 syllable, the rest have 3
  - words:
    - чудово
    - нормально
    - привіт
    correct: 2
    explanation: привіт has 2 syllables, the rest have 3
  - words:
    - добре
    - тато
    - дім
    correct: 2
    explanation: дім has 1 syllable, the rest have 2
  - words:
    - око
    - ніс
    - сон
    correct: 0
    explanation: око has 2 syllables, the rest have 1
  title: Find the word that has a different number of syllables.
