    right: '[а]'
  - left: О
    right: '[о]'
  - left: У
    right: '[у]'
  - left: М
    right: '[м]'
  - left: К
    right: '[к]'
  - left: Н
    right: '[н]'
  title: 'Match the Ukrainian letter to the sound it represents. Бачу... Чую... (I
    see... '
- id: fill-in-greeting
  type: fill-in
  instruction: Complete this basic greeting dialogue.
  items:
  - sentence: — ____! Як справи?
    answer: Привіт
    options:
    - Привіт
    - справи
    - Добре
    - Чудово
  - sentence: — Привіт! Як ____?
    answer: справи
    options:
    - справи
    - тебе
    - Нормально
    - Добре
  - sentence: — ____. А у тебе?
    answer: Добре
    options:
    - Добре
    - Привіт
    - Чудово
    - Нормально
  - sentence: — Добре. А у ____?
    answer: тебе
    options:
    - тебе
    - справи
    - Чудово
    - Нормально
  title: Complete this basic greeting dialogue.
