- type: observe
  instruction: 'Watch and repeat: А, М, Л, У, Н, С'
  examples:
  - 'А — ананас — «У нас ананас.» — Video: https://www.youtube.com/watch?v=hvB3VpcR3ZE'
  - 'М — морква — «Мама сама.» — Video: https://www.youtube.com/watch?v=Ez95H4ibuJo'
  - 'Л — літак — «Мала лама.» — Video: https://www.youtube.com/watch?v=v6-3Xg52Buk'
  - 'У — Україна — «У нас мул.» — Video: https://www.youtube.com/watch?v=VB1O6PmtYRU'
  - 'Н — ножиці — «У нас лан.» — Video: https://www.youtube.com/watch?v=vNUfiKHPYaU'
  - 'С — сумка — «Сумна мама.» — Video: https://www.youtube.com/watch?v=7UsFBgSL91E'
  prompt: Watch each video by Anna Ohoiko. Say the letter out loud, then the key word,
    then the short phrase. Can you hear how each letter sounds on its own and inside
    a word?
