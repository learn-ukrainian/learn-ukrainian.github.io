    correct: 0
  - question: How do you say 'Fine' or 'Good'?
    options:
    - Чудово
    - Нормально
    - Добре
    correct: 2
  - question: How do you say 'Great'?
    options:
    - Чудово
    - Добре
    - Нормально
    correct: 0
  - question: How do you say 'Okay'?
    options:
