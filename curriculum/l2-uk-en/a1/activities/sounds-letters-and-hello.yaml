version: '1.0'
module: sounds-letters-and-hello
level: a1
inline:
- id: quiz-sounds-vs-letters
  type: quiz
  instruction: Оберіть правильну відповідь.
  items:
  - question: Що ми чуємо і вимовляємо?
    options:
    - звуки
    - літери
    - слова
    correct: 0
  - question: Що ми бачимо і пишемо?
    options:
    - літери
    - звуки
    - думки
    correct: 0
  - question: Скільки літер в українській абетці?
    options:
    - '33'
    - '38'
    - '32'
    correct: 0
  - question: Скільки звуків в українській мові?
    options:
    - '33'
    - '38'
    - '32'
    correct: 1
  - question: Чи можна говорити «голосна літера»?
    options:
    - Так
    - Ні, голосний — це звук
    - Тільки про літеру А
    correct: 1
  - question: Яка літера не позначає жодного звуку?
    options:
    - М'який знак (Ь)
    - Літера Я
    - Літера Ї
    correct: 0
  title: Оберіть правильну відповідь.
- id: match-letters-to-sounds
  type: match-up
  instruction: З'єднайте літеру зі звуком, який вона позначає.
  pairs:
  - left: А
    right: '[а]'
  - left: О
    right: '[о]'
  - left: У
    right: '[у]'
  - left: М
    right: '[м]'
  - left: К
    right: '[к]'
  - left: Н
    right: '[н]'
  title: З'єднайте літеру зі звуком, який вона позначає.
- id: fill-in-greetings
  type: fill-in
  instruction: Доповніть базовий діалог-привітання.
  items:
  - sentence: — ____! Як справи?
    answer: Привіт
  - sentence: — Привіт! Як ____?
    answer: справи
  - sentence: — ____. А у тебе?
    answer: Добре
  - sentence: — А у ____?
    answer: тебе
  - sentence: — ____!
    answer: Чудово
  - sentence: — ____.
    answer: Нормально
  title: Доповніть базовий діалог-привітання.
