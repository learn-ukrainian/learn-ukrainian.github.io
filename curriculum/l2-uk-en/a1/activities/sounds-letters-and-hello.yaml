workbook:
- id: wb-count-syllables
  type: count-syllables
  instruction: A Ukrainian word has as many syllables as it has vowel sounds (голосні).
    Count the syllables in these words.
  items:
  - word: око
    correct: 2
  - word: молоко
    correct: 3
  - word: мама
    correct: 2
  - word: дім
    correct: 1
  - word: тато
    correct: 2
  - word: нормально
    correct: 3
  title: A Ukrainian word has as many syllables as it has vowel sounds (голосні).
    Count t
- id: wb-true-false-sounds
  type: true-false
  instruction: Are these statements about Ukrainian sounds and letters true or false?
    (Правда чи ні?)
  items:
  - statement: You can sing a consonant sound (приголосний звук).
    correct: false
    explanation: Consonants are made by creating a physical obstruction in your mouth.
      You cannot sing them clearly like vowels.
  - statement: The Ukrainian alphabet has 33 letters.
    correct: true
    explanation: There are exactly 33 letters in the Ukrainian абетка.
  - statement: A vowel sound (голосний звук) is made entirely with your voice.
    correct: true
    explanation: Air flows freely without hitting any physical obstruction when making
      a vowel sound.
  - statement: The letter Ь (soft sign) represents two sounds.
    correct: false
    explanation: The soft sign (Ь) makes absolutely no sound of its own. It only changes
      the consonant before it.
  - statement: The word 'мама' contains two vowel sounds.
    correct: true
    explanation: The word 'мама' has two [а] sounds, which are vowels.
  - statement: It is correct to say 'vowel letter' (голосна літера).
    correct: false
    explanation: A letter is just a visual symbol on a page. The word 'vowel' (голосний)
      describes the physical sound.
  title: Are these statements about Ukrainian sounds and letters true or false? (Правда
    ч
- id: wb-match-up-vocab
  type: match-up
  instruction: Match the Ukrainian words to their English meanings.
  pairs:
  - left: мама
    right: mother
  - left: тато
    right: father
  - left: молоко
    right: milk
  - left: око
    right: eye
  - left: дім
    right: house
  - left: сон
    right: dream
  - left: ніс
    right: nose
  title: Match the Ukrainian words to their English meanings.
- id: wb-divide-words
  type: divide-words
  instruction: 'Divide these words into syllables (склади). Remember: one vowel =
    one syllable.'
  items:
  - word: мама
    answer: ма-ма
  - word: тато
    answer: та-то
  - word: молоко
    answer: мо-ло-ко
  - word: око
    answer: о-ко
  - word: привіт
    answer: при-віт
  - word: чудово
    answer: чу-до-во
  title: 'Divide these words into syllables (склади). Remember: one vowel = one syllable.'
- id: wb-quiz-greeting
  type: quiz
  instruction: Test your understanding of the basic Ukrainian greeting.
  items:
  - question: How do you say 'Hi!' informally in Ukrainian?
    options:
    - Привіт!
    - Чудово!
    - Нормально!
    - Добре!
    correct: 0
  - question: If someone asks 'Як справи?' (How are you?), which of these means 'Great'?
    options:
    - Чудово
    - Добре
    - Нормально
    - Привіт
    correct: 0
  - question: Which phrase means 'How are you?'
    options:
    - Як справи?
    - А у тебе?
    - Привіт?
    - Нормально?
    correct: 0
  - question: 'If a friend says ''Добре. А у тебе?'' they are asking:'
    options:
    - And you?
    - How are you?
    - Are you okay?
    - What is your name?
    correct: 0
  - question: Which of these means 'Fine' or 'Good'?
    options:
    - Добре
    - Нормально
    - Чудово
    - Привіт
    correct: 0
  - question: Which of these means 'Okay' or 'Average'?
    options:
    - Нормально
    - Добре
    - Чудово
    - Привіт
    correct: 0
  title: Test your understanding of the basic Ukrainian greeting.
- id: wb-odd-one-out
  type: odd-one-out
  instruction: Find the word that does not belong in the group (Четверте зайве).
  items:
  - words:
    - А
    - О
    - У
    - М
    correct: 3
    explanation: М represents a consonant sound (приголосний). The others represent
      vowel sounds (голосні).
  - words:
    - К
    - Н
    - Т
    - Е
    correct: 3
    explanation: Е represents a vowel sound. The others are consonant letters.
  - words:
    - мама
    - тато
    - око
    - дім
    correct: 3
    explanation: Дім has exactly one syllable (one vowel sound). The others have two
      syllables.
  - words:
    - молоко
    - чудово
    - нормально
    - сон
    correct: 3
    explanation: Сон has exactly one syllable. The others have three syllables.
  - words:
    - Привіт
    - Як справи
    - А у тебе
    - Молоко
    correct: 3
    explanation: Молоко is a noun (milk), while the others are parts of a basic greeting
      dialogue.
  - words:
    - звук
    - літера
    - абетка
    - добре
    correct: 3
    explanation: Добре means 'fine'. The others are phonetic and linguistic terms.
  title: Find the word that does not belong in the group (Четверте зайве).
