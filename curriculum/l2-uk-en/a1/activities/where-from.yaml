- type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: На питання 'Звідки?' завжди відповідають з прийменником з/із/зі.
    correct: true
    explanation: 'Так: Я з України, зі школи, із Запоріжжя — всі форми з/із/зі.'
  - statement: На питання 'Де?' відповідають з прийменником з/із/зі.
    correct: false
    explanation: 'Ні. Де? = в/на + locative: в Україні, на роботі. З/із/зі — це Звідки?'
  - statement: '''В Україні'' відповідає на питання ''Де?'''
    correct: true
    explanation: Так. В Україні = locative, де ти є зараз.
  - statement: Форма 'зі Львова' вживається тому, що лв- — важке поєднання приголосних.
    correct: true
    explanation: 'Так. зі вживається перед складними кластерами: зі Львова, зі школи,
      зі США.'
  - statement: На питання 'Куди?' відповідають з прийменником з/із/зі.
    correct: false
    explanation: 'Ні. Куди? = в/на + accusative: в Україну, на роботу, в Київ.'
  - statement: '''Додому'' відповідає на питання ''Куди?'''
    correct: true
    explanation: Так. Додому = homeward — напрям руху, як в Київ, на роботу.
  - statement: '''Я з Канаду'' — правильна форма для відповіді на ''Звідки?'''
    correct: false
    explanation: 'Ні. Звідки? вимагає genitive: з Канади (не Канаду). Канаду — це
      accusative для Куди?'
  - statement: '''З роботи'' означає coming from work і відповідає на питання ''Звідки?'''
    correct: true
    explanation: Так. З роботи — genitive chunk після з, відповідає на Звідки? Де?
      — на роботі.
- type: error-correction
  instruction: Знайдіть і виправте помилку (Find and correct the error)
  items:
  - sentence: Я живу з Києві.
    error: з
    correction: в
    error_type: word
    options:
    - в
    - з
    - на
    explanation: Де? (where you live) = в/на + locative. з/із/зі = Звідки? (where
      you're from).
  - sentence: Зі Харкова він.
    error: Зі
    correction: З
    error_type: word
    options:
    - З
    - Зі
    - Із
    explanation: 'з Харкова: Х is a single consonant — з, not зі. зі is for clusters:
      лв-, шк-, шт-, шт-.'
  - sentence: Звідки ти? — Я в України.
    error: в
    correction: з
    error_type: word
    options:
    - з
    - в
    - на
    explanation: 'Звідки? requires з/із/зі: Я з України. В Україні = Де? form.'
  - sentence: Вона з Одесу.
    error: Одесу
    correction: Одеси
    error_type: word
    options:
    - Одеси
    - Одесу
    - Одесі
    explanation: 'Звідки? requires genitive: Одеса → Одеси. Одесу is accusative (Куди?).'
  - sentence: Я йду на роботи.
    error: на
    correction: з
    error_type: word
    options:
    - з
    - на
    - в
    explanation: з роботи = coming FROM work (Звідки?). на роботу = going TO work
      (Куди?).
  - sentence: Вона живе з Канаді.
    error: з
    correction: в
    error_type: word
    options:
    - в
    - з
    - на
    explanation: живе в Канаді (Де? = в/на + locative). з Канади = Звідки? — where
      she's from.
