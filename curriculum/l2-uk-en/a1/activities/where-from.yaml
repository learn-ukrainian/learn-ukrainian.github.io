version: '1.0'
module: where-from
level: a1
inline:
- id: fill-in-where-from
  type: fill-in
  instruction: Вставте правильне слово (Fill in the correct word)
  items:
  - sentence: Звідки ти? — Я ____.
    answer: з України
    options:
    - в Україну
    - з України
    - в Україні
  - sentence: Вона ____.
    answer: з Канади
    options:
    - в Канаді
    - з Канади
    - до Канади
  - sentence: Ми ____, а ви?
    answer: з Києва
    options:
    - в Києві
    - з Києва
    - до Києва
  - sentence: Джон ____.
    answer: зі США
    options:
    - зі США
    - в США
    - до США
  - sentence: Мій друг ____.
    answer: з Німеччини
    options:
    - з Німеччини
    - в Німеччині
    - до Німеччини
  - sentence: Я ____.
    answer: зі Львова
    options:
    - зі Львова
    - у Львові
    - до Львова
  - sentence: Вони ____.
    answer: з Англії
    options:
    - в Англії
    - з Англії
    - до Англії
  - sentence: Олена ____.
    answer: з Одеси
    options:
    - з Одеси
    - в Одесі
    - до Одеси
- id: fill-in-contrast-location-origin
  type: fill-in
  instruction: Вставте правильне слово (Fill in the correct word)
  items:
  - sentence: Я живу в Києві, але я ____.
    answer: зі Львова
    options:
    - у Львові
    - зі Львова
    - до Львова
  - sentence: Вона живе в Канаді, але вона ____.
    answer: з України
    options:
    - в Україну
    - з України
    - в Україні
  - sentence: Ми зараз в Англії, але ми ____.
    answer: з Польщі
    options:
    - в Польщі
    - з Польщі
    - до Польщі
  - sentence: Він живе в Одесі, але він ____.
    answer: з Харкова
    options:
    - у Харкові
    - з Харкова
    - до Харкова
  - sentence: Я ____, але зараз я в Україні.
    answer: з Німеччини
    options:
    - в Німеччині
    - з Німеччини
    - до Німеччини
  - sentence: Ти ____, але живеш у Києві.
    answer: зі США
    options:
    - в США
    - зі США
    - до США
- id: quiz-preposition-choice
  type: quiz
  instruction: Оберіть правильний прийменник (Choose the correct preposition)
  items:
  - question: Я йду ____ роботи.
    options:
    - з
    - на
    - в
    correct: 0
  - question: Вона йде ____ школу.
    options:
    - в
    - на
    - зі
    correct: 0
  - question: Ми зараз ____ Україні.
    options:
    - в
    - з
    - на
    correct: 0
  - question: Я їду ____ Канаду.
    options:
    - в
    - з
    - на
    correct: 0
  - question: Він ____ Німеччини.
    options:
    - з
    - в
    - на
    correct: 0
  - question: Вони ____ Львові.
    options:
    - у
    - зі
    - на
    correct: 0
  - question: Я йду ____ магазину.
    options:
    - з
    - в
    - на
    correct: 0
  - question: Олена ____ школи.
    options:
    - зі
    - в
    - на
    correct: 0
workbook:
- id: match-up-countries-cities
  type: match-up
  instruction: З'єднайте назву з формою походження (Match the name with its origin
    form)
  pairs:
  - left: Україна
    right: з України
  - left: Київ
    right: з Києва
  - left: Львів
    right: зі Львова
  - left: США
    right: зі США
  - left: Канада
    right: з Канади
  - left: Одеса
    right: з Одеси
  - left: Німеччина
    right: з Німеччини
- id: unjumble-sentences
  type: unjumble
  instruction: Складіть правильне речення зі слів (Put the words in the correct order)
  items:
  - words:
    - з
    - Я
    - України.
    correct_order:
    - Я
    - з
    - України.
  - words:
    - ти?
    - Звідки
    correct_order:
    - Звідки
    - ти?
  - words:
    - Канади.
    - Він
    - з
    correct_order:
    - Він
    - з
    - Канади.
  - words:
    - йде
    - Олена
    - школи.
    - зі
    correct_order:
    - Олена
    - йде
    - зі
    - школи.
  - words:
    - йдеш?
    - ти
    - Звідки
    correct_order:
    - Звідки
    - ти
    - йдеш?
  - words:
    - з
    - Я
    - роботи.
    - йду
    correct_order:
    - Я
    - йду
    - з
    - роботи.
- id: true-false-dialogues
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Марк з України.
    correct: false
    explanation: Марк з Канади.
  - statement: Олег з Києва.
    correct: true
    explanation: 'Олег сказав: «Я з України, з Києва».'
  - statement: Тарас іде з магазину.
    correct: false
    explanation: Тарас іде з роботи, а Ганна — з магазину.
  - statement: Ганна йде з магазину.
    correct: true
    explanation: 'Ганна сказала: «Я йду з магазину».'
  - statement: Олена йде зі школи.
    correct: true
    explanation: Тарас сказав, що Олена йде зі школи.
  - statement: Олена йде на роботу.
    correct: false
    explanation: Олена йде додому.
- id: group-sort-preposition-forms
  type: group-sort
  instruction: Розподіліть слова за прийменником, який з ними використовується (Sort
    the words by the preposition used with them)
  groups:
  - label: з (from)
    items:
    - України
    - Києва
    - Канади
    - Одеси
    - Німеччини
  - label: зі (from)
    items:
    - Львова
    - школи
    - США
- id: fill-in-dialogue
  type: fill-in
  instruction: Вставте правильні слова в діалог (Fill in the correct words into the
    dialogue)
  items:
  - sentence: — Привіт! Як тебе звати? — ____ звати Марк.
    answer: Мене
    options:
    - Я
    - Мене
    - Мій
  - sentence: — Дуже приємно, Марк. ____ ти?
    answer: Звідки
    options:
    - Де
    - Куди
    - Звідки
  - sentence: — Я з Канади, із Торонто. А ____?
    answer: ти
    options:
    - ти
    - тебе
    - ви
  - sentence: — Я з України, ____ Києва.
    answer: з
    options:
    - з
    - зі
    - в
  - sentence: — Звідки ти ____?
    answer: йдеш
    options:
    - йде
    - йду
    - йдеш
  - sentence: — Я йду ____ роботи. А ти?
    answer: з
    options:
    - з
    - на
    - в
  - sentence: — Я йду з магазину. А куди йде Олена? — Вона йде ____.
    answer: додому
    options:
    - додому
    - школи
    - роботи
