workbook:
- id: wb-match-up
  type: match-up
  instruction: З'єднайте країну або місто з формою «Звідки?» (Match the country or
    city with its 'Where from?' form)
  pairs:
  - left: Україна
    right: з України
  - left: Київ
    right: з Києва
  - left: Львів
    right: зі Львова
  - left: Канада
    right: з Канади
  - left: США
    right: зі США
  - left: Німеччина
    right: з Німеччини
- id: wb-true-false
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Я з Канади, але зараз я в Києві.
    correct: true
    explanation: Correct use of 'з' for origin and 'в' for current location.
  - statement: Я живу з України.
    correct: false
    explanation: To say where you live, use 'в' (в Україні). 'З' means 'from'.
  - statement: Він іде в магазину.
    correct: false
    explanation: It should be 'в магазин' (destination) or 'з магазину' (origin).
  - statement: Ми зі Львова.
    correct: true
    explanation: Correct use of 'зі' before the consonant cluster in 'Львів'.
  - statement: Вони зараз на Києві.
    correct: false
    explanation: Cities use 'в' or 'у' for location, so it must be 'у Києві'.
  - statement: Вона йде зі школи.
    correct: true
    explanation: Correct use of 'зі' and the genitive ending '-и' for origin.
- id: wb-error-correction
  type: error-correction
  instruction: Знайдіть і виправте помилку (Find and correct the error)
  items:
  - sentence: Я в України.
    error: України
    correction: Україні
    error_type: word
    options:
    - Україні
    - Україну
    - Україною
    explanation: For location (Де?), use the locative ending '-і'.
  - sentence: Вона з Канада.
    error: Канада
    correction: Канади
    error_type: word
    options:
    - Канади
    - Канаду
    - Канаді
    explanation: After 'з' (from), use the genitive ending '-и'.
  - sentence: Він йде з школа.
    error: з школа
    correction: зі школи
    error_type: phrase
    options:
    - зі школи
    - у школу
    - на школі
    explanation: For origin, use 'зі школи' (from school).
  - sentence: Він зі Київ.
    error: Київ
    correction: Києва
    error_type: word
    options:
    - Києва
    - Києві
    - Києву
    explanation: After 'з', masculine cities ending in a consonant usually take '-а'.
  - sentence: Я йду з магазин.
    error: магазин
    correction: магазину
    error_type: word
    options:
    - магазину
    - магазині
    - магазином
    explanation: After 'з', use the genitive ending (here '-у').
  - sentence: Вони з Англія.
    error: Англія
    correction: Англії
    error_type: word
    options:
    - Англії
    - Англію
    - Англією
    explanation: After 'з', feminine countries ending in '-я' change to '-ї'.
