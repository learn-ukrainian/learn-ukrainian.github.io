- type: fill-in
  title: "Conjugate the Verbs"
  instruction: "Choose the correct verb form for each sentence."
  items:
    - sentence: "Я _____ українську мову."
      answer: "вчу"
      options:
        - "вчу"
        - "вчиш"
        - "вчить"
        - "вчимо"
      explanation: "For the pronoun я, the ending after ч is -у."
    - sentence: "Ти _____ каву?"
      answer: "п'єш"
      options:
        - "п'ю"
        - "п'єш"
        - "п'є"
        - "п'ємо"
      explanation: "For the pronoun ти, the ending is -єш."
    - sentence: "Він _____ дуже багато."
      answer: "говорить"
      options:
        - "говорю"
        - "говориш"
        - "говорить"
        - "говорять"
      explanation: "For the pronoun він, the ending is -ить."
    - sentence: "Ми _____ вдома."
      answer: "сидимо"
      options:
        - "сиджу"
        - "сидиш"
        - "сидить"
        - "сидимо"
      explanation: "For the pronoun ми, the ending is -имо."
    - sentence: "Ви _____ тут?"
      answer: "стоїте"
      options:
        - "стою"
        - "стоїш"
        - "стоїть"
        - "стоїте"
      explanation: "For the pronoun ви, the ending is -їте."
    - sentence: "Вони _____ текст."
      answer: "бачать"
      options:
        - "бачу"
        - "бачиш"
        - "бачить"
        - "бачать"
      explanation: "For the pronoun вони, the ending after ч is -ать."
    - sentence: "Я _____ тебе."
      answer: "люблю"
      options:
        - "люблю"
        - "любиш"
        - "любить"
        - "люблять"
      explanation: "For the pronoun я, we add an л before the -ю."
    - sentence: "Ти _____ домашнє завдання."
      answer: "робиш"
      options:
        - "роблю"
        - "робиш"
        - "робить"
        - "роблять"
      explanation: "For the pronoun ти, the ending is -иш."
    - sentence: "Вона _____ смачно."
      answer: "їсть"
      options:
        - "їм"
        - "їси"
        - "їсть"
        - "їдять"
      explanation: "For the pronoun вона, the irregular form is їсть."

