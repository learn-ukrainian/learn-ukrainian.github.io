  instruction: Розподіліть дієслова за тим, як змінюється їхня основа у формі "Я" (I).
  title: Яка зміна в "Я"?
  type: group-sort
- instruction: Визначте, чи є твердження граматично правильним.
  items:
  - correct: false
    explanation: '"Читати" — це перша дієвідміна (-ати).'
    statement: Дієслово "читати" належить до другої дієвідміни (-ити).
  - correct: true
    explanation: Так, це явище називається "губний л".
    statement: Форма "я роблю" має літеру "л" для милозвучності.
  - correct: false
    explanation: 'Неправильно. У другій дієвідміні пишемо -иш: "ти робиш".'
    statement: Правильно казати "ти робеш".
  - correct: true
    explanation: Це правильна архаїчна форма.
    statement: Дієслово "їсти" має форму "я їм".
  - correct: false
    explanation: Неправильно. Правильна форма — "говорять".
    statement: Форма "вони" для слова "говорити" — "говорють".
  - correct: true
    explanation: Так, бо інфінітив закінчується на -ити.
    statement: Дієслово "бачити" належить до другої дієвідміни.
  - correct: false
    explanation: Ні, "спати" належить до другої дієвідміни, хоч і закінчується на -ати.
    statement: Дієслово "спати" належить до першої дієвідміни, бо закінчується на -ати.
  - correct: true
    explanation: Правильно, "ми їмо".
    statement: '"Ми їмо" — це правильна форма.'
  - correct: false
    explanation: Ні, правильна форма — "ти п'єш", з апострофом.
    statement: Форма "ти" для слова "пити" — "пиєш" (без апострофа).
  - correct: true
    explanation: Так, відбувається зміна т → ч.
    statement: Слово "платити" у формі "я" звучить як "я плачу".
  title: Правда чи ні?
  type: true-false
