- type: unjumble
  title: Build a Sentence
  instruction: Put the words in the correct order to form a Ukrainian sentence.
  items:
    - words: ["Ми", "повільно", "говоримо"]
      answer: Ми говоримо повільно
    - words: ["Ти", "парк", "бачиш"]
      answer: Ти бачиш парк
    - words: ["Я", "каву", "люблю"]
      answer: Я люблю каву
    - words: ["Вони", "фото", "роблять"]
      answer: Вони роблять фото
    - words: ["Вона", "тут", "сидить"]
      answer: Вона сидить тут
    - words: ["Ми", "мову", "вчимо"]
      answer: Ми вчимо мову

- type: group-sort
  title: Sorting Verb Endings
  instruction: Sort these verb endings into the correct category (1st or 2nd Conjugation).
  groups:
    - name: 1st Conjugation
      items: ["-еш", "-е", "-емо", "-ете", "-уть"]
    - name: 2nd Conjugation
      items: ["-иш", "-ить", "-имо", "-ите", "-ять"]

- type: quiz
  title: Irregular Verbs Review
  instruction: Answer the questions about the verbs 'їсти' and 'пити'.
  items:
