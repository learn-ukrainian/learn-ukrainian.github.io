      options:
        - text: "ти робить"
          correct: true
        - text: "ти робиш"
          correct: false
        - text: "він робить"
          correct: false
        - text: "ми робимо"
          correct: false
      explanation: "The correct ти-form is робиш. Робить is for він/вона."
    - question: "Which combination is INCORRECT?"
      options:
        - text: "вони ходить"
          correct: true
        - text: "вони ходять"
          correct: false
        - text: "ти ходиш"
          correct: false
        - text: "він ходить"
          correct: false
      explanation: "Second Conjugation вони-form is -ять: вони ходять."
    - question: "Which combination is INCORRECT?"
      options:
        - text: "я ходить"
          correct: true
        - text: "я ходжу"
          correct: false
        - text: "ти ходиш"
          correct: false
        - text: "ми ходимо"
          correct: false
      explanation: "The correct я-form is ходжу. Ходить is for він/вона."
    - question: "Which combination is INCORRECT?"
      options:
        - text: "я робить"
          correct: true
        - text: "я роблю"
          correct: false
        - text: "він робить"
          correct: false
        - text: "вони роблять"
          correct: false
      explanation: "The correct я-form is роблю. Робить is for він/вона."
    - question: "Which combination is INCORRECT?"
      options:
        - text: "він люблять"
          correct: true
        - text: "він любить"
          correct: false
        - text: "я люблю"
          correct: false
        - text: "ти любиш"
          correct: false
      explanation: "The correct він-form is любить. Люблять is for вони."
    - question: "Which combination is INCORRECT?"
      options:
        - text: "я їсть"
          correct: true
        - text: "я їм"
          correct: false
        - text: "ти їси"
          correct: false
        - text: "він їсть"
          correct: false
      explanation: "The correct я-form is я їм. Їсть is for він/вона."