  instruction: Розподіліть дієслова за групами відповідно до їхнього закінчення в
    інфінітиві (-ати чи -ити).
  title: Тип 1 чи Тип 2?
  type: group-sort
- instruction: З’єднайте інфінітив з правильною формою "Я" (I).
  pairs:
  - left: говорити
    right: я говорю
  - left: робити
    right: я роблю
  - left: любити
    right: я люблю
  - left: сидіти
    right: я сиджу
  - left: ходити
    right: я ходжу
  - left: платити
    right: я плачу
  - left: бачити
    right: я бачу
  - left: вчити
    right: я вчу
  - left: спати
    right: я сплю
  - left: пити
    right: я п'ю
  title: Я і моя дія
  type: match-up
- instruction: Оберіть правильну відповідь на запитання про граматику.
  items:
  - explanation: 'Друга дієвідміна використовує літеру "и" (або "і/ї"), наприклад:
      робиш, робить.'
    options:
    - correct: true
      text: и
    - correct: false
      text: е
    - correct: false
      text: є
    - correct: false
      text: у
    question: Яка літера є маркером другої дієвідміни у закінченнях?
  - explanation: У другій дієвідміні "вони" мають закінчення -ять (або -ать), на відміну
      від -ють у першій.
    options:
    - correct: true
      text: -ять
    - correct: false
      text: -ють
    - correct: false
      text: -емо
    - correct: false
      text: -йте
    question: Яке закінчення мають дієслова другої дієвідміни для займенника "вони"?
  - explanation: Літера "л" додається для милозвучності після губних приголосних (б,
      п, в, м, ф).
    options:
    - correct: true
      text: Для зручної вимови
    - correct: false
      text: Це помилка
    - correct: false
      text: Так історично склалося
    - correct: false
      text: Це випадковість
    question: Чому у слові "роблю" з’являється літера "л"?
  - explanation: 'Дієслово "ходити" має чергування д → дж у формі "я": ходжу.'
    options:
    - correct: true
      text: д змінюється на дж
    - correct: false
      text: д змінюється на ж
    - correct: false
      text: д не змінюється
    - correct: false
      text: д зникає
    question: Як змінюється приголосний у слові "ходити" для форми "я"?
  - explanation: Слово "їсти" є архаїчним і має унікальні закінчення, воно не належить
      до типових груп.
    options:
    - correct: true
      text: Це виняток з унікальними закінченнями
    - correct: false
      text: До першої (-ати)
    - correct: false
      text: До другої (-ити)
    - correct: false
      text: Це не дієслово
    question: До якої дієвідміни належить слово "їсти"?
  - explanation: Бачити закінчується на -ити і належить до другої дієвідміни.
    options:
    - correct: true
      text: бачити
    - correct: false
      text: читати
    - correct: false
      text: співати
    - correct: false
      text: мати
    question: Яке з цих слів належить до другої дієвідміни?
  - explanation: Для форми "ми" у другій дієвідміні характерне закінчення -имо (наприклад, робимо).
    options:
    - correct: true
      text: -имо
    - correct: false
      text: -емо
    - correct: false
      text: -ють
    - correct: false
      text: -уть
    question: Яке закінчення має форма "ми" у другій дієвідміні?
  - explanation: У другій дієвідміні форма "ти" завжди має закінчення -иш.
    options:
    - correct: true
      text: -иш
    - correct: false
      text: -еш
    - correct: false
      text: -єш
    - correct: false
      text: -ить
    question: Яке закінчення має форма "ти" у другій дієвідміні?
  title: Правила другої дієвідміни
  type: quiz
- instruction: Оберіть правильну форму дієслова для кожного речення.
  items:
  - answer: говориш
    explanation: Для "ти" у другій дієвідміні закінчення -иш.
    options:
    - говориш
    - говорить
    - говорю
    - говорять
    sentence: Ти ___ дуже добре і швидко.
  - answer: робимо
    explanation: Для "ми" закінчення -имо.
    options:
    - робимо
    - робить
    - робите
    - роблю
    sentence: Ми ___ домашнє завдання разом.
  - answer: бачать
    explanation: Для "вони" закінчення -ять (або -ать після шиплячих).
    options:
    - бачать
    - бачить
    - бачимо
    - бачиш
    sentence: Вони ___ красиву картину в музеї.
  - answer: ходите
    explanation: Для "ви" закінчення -ите.
    options:
    - ходите
    - ходиш
    - ходимо
    - ходить
    sentence: Ви часто ___ в цей парк?
  - answer: любить
    explanation: Для "він" закінчення -ить.
    options:
    - любить
    - люблю
    - люблять
    - любиш
    sentence: Він ___ читати цікаві книги.
  - answer: говорю
    explanation: Для "я" закінчення -ю.
    options:
    - говорю
    - говорить
    - говориш
    - говорять
    sentence: Я ___ українською мовою.
  - answer: плачу
    explanation: Дієслово "платити" має зміну т → ч у формі "я".
    options:
    - плачу
    - плату
    - платиш
    - платять
    sentence: Я ___ за каву карткою.
  - answer: спить
    explanation: Для "вона" (дитина) закінчення -ить.
    options:
    - спить
    - сплю
    - спиш
    - сплять
    sentence: Дитина вже тихо ___.
  - answer: сидимо
    explanation: Для "ми" закінчення -имо.
    options:
    - сидимо
    - сидите
    - сиджу
    - сидять
    sentence: Ми ___ вдома і дивимось фільм.
  - answer: вчиш
    explanation: Для "ти" закінчення -иш.
    options:
    - вчиш
    - вчу
    - вчить
    - вчать
    sentence: Ти ___ українську мову?
  title: Правильні закінчення
  type: fill-in
