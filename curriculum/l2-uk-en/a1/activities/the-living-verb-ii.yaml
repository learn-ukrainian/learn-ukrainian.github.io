- type: quiz
  title: "The I Form Mutations"
  instruction: "Select the correct я form for each verb."
  items:
    - question: "What is the correct я form for робити (to do)?"
      options:
        - text: "роблю"
          correct: true
        - text: "робю"
          correct: false
        - text: "робу"
          correct: false
        - text: "робиш"
          correct: false
      explanation: "Verbs ending in -бити add an л in the я form."
    - question: "What is the correct я form for ходити (to walk)?"
      options:
        - text: "ходжу"
          correct: true
        - text: "ходю"
          correct: false
        - text: "ходу"
          correct: false
        - text: "ходиш"
          correct: false
      explanation: "The д mutates to дж in the я form."
    - question: "What is the correct я form for просити (to ask for)?"
      options:
        - text: "прошу"
          correct: true
        - text: "просю"
          correct: false
        - text: "просу"
          correct: false
        - text: "просиш"
          correct: false
      explanation: "The с mutates to ш in the я form."
    - question: "What is the correct я form for платити (to pay)?"
      options:
        - text: "плачу"
          correct: true
        - text: "платю"
          correct: false
        - text: "плату"
          correct: false
        - text: "платиш"
          correct: false
      explanation: "The т mutates to ч in the я form."
    - question: "What is the correct я form for їсти (to eat)?"
      options:
        - text: "їм"
          correct: true
        - text: "їджу"
          correct: false
        - text: "їстю"
          correct: false
        - text: "їсту"
          correct: false
      explanation: "The verb їсти is completely irregular."
    - question: "What is the correct я form for пити (to drink)?"
      options:
        - text: "п'ю"
          correct: true
        - text: "пю"
          correct: false
        - text: "пию"
          correct: false
        - text: "пу"
          correct: false
      explanation: "Пити takes an apostrophe before the ю."
    - question: "What is the correct я form for любити (to love)?"
      options:
        - text: "люблю"
          correct: true
        - text: "любю"
          correct: false
        - text: "любу"
          correct: false
        - text: "любити"
          correct: false
      explanation: "Like робити, it adds an л because the stem ends in б."
    - question: "What is the correct я form for сидіти (to sit)?"
      options:
        - text: "сиджу"
          correct: true
        - text: "сидю"
          correct: false
        - text: "сиду"
          correct: false
        - text: "сидіти"
          correct: false
      explanation: "The д mutates to дж in the я form."

- type: true-false
  title: "True or False?"
  instruction: "Decide if these statements about Class II verbs are true or false."
  items:
    - statement: "Class II verbs usually use the vowel и in their endings."
      correct: true
      explanation: "Yes, и and і are the signature vowels of Class II verbs."
    - statement: "The verb говорити uses е in its endings."
      correct: false
      explanation: "No, говорити is a Class II verb, so it uses и."
    - statement: "Consonant mutations in Class II verbs happen in all forms."
      correct: false
      explanation: "No, they only happen in the я (I) form."
    - statement: "The correct form for I do is я робю."
      correct: false
      explanation: "False. You must add л, so it is я роблю."
    - statement: "The verb їсти (to eat) follows the regular Class II pattern."
      correct: false
      explanation: "No, їсти is completely irregular."
    - statement: "We use бачити to talk about the physical ability to see."
      correct: true
      explanation: "Yes, бачити means to see, while дивитися means to actively watch."
    - statement: "The verb ходити changes д to дж in the я form."
      correct: true
      explanation: "Yes, я ходжу is the correct form."
    - statement: "The вони (they) ending for Class II verbs is always -уть."
      correct: false
      explanation: "No, Class II verbs use -ять or -ать."

