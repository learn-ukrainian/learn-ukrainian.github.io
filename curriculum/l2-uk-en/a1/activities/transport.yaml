    - дістатися
    - Як
    - вокзалу?
    - до
    correct_order:
    - Як
    - дістатися
    - до
    - вокзалу?
    hint: How do I get to the train station?
  - words:
    - до
    - Один
    - Львова.
    - квиток
    correct_order:
    - Один
    - квиток
    - до
    - Львова.
    hint: One ticket to Lviv.
  - words:
    - коштує
    - Скільки
    - квиток?
