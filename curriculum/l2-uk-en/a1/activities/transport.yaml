workbook:
- type: group-sort
  instruction: 'Як правильно: Орудний відмінок чи Місцевий з «на»? (How is it correct:
    Instrumental or Locative with «на»?)'
  groups:
  - label: Орудний (автобусом)
    items:
    - потяг
    - маршрутка
    - трамвай
    - тролейбус
  - label: на + Місцевий (на метро)
    items:
    - метро
    - таксі
    - машина
- type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Слова «метро» та «таксі» ніколи не змінюють закінчення.
    correct: true
    explanation: 'Вони не змінюються. Ми завжди кажемо: на метро, на таксі.'
  - statement: 'Правильно говорити: «Я їду на автобусом».'
    correct: false
    explanation: 'Правильно: «автобусом» або «на машині». Міксувати не можна.'
  - statement: 'Для потяга ми кажемо: «Він рушає».'
    correct: true
    explanation: Дієслово «рушати» дуже добре підходить для потяга.
  - statement: Ми купуємо квиток «до Львова», а не «в Львів».
    correct: true
    explanation: Так, після слова «квиток» ми використовуємо прийменник «до».
  - statement: Дієслово «відправлятися» — це найкращий вибір для транспорту.
    correct: false
    explanation: Це калька. Краще казати «рушає» або «виїжджає».
  - statement: Ми чекаємо потяг на зупинці.
    correct: false
    explanation: Потяг ми чекаємо на вокзалі.
- type: match-up
  instruction: З'єднайте транспорт та місце (Match the transport and the place)
  pairs:
  - left: літак
    right: аеропорт
  - left: потяг
    right: вокзал
  - left: автобус
    right: зупинка
  - left: метро
    right: станція
  - left: рушає
    right: потяг починає їхати
  - left: іти пішки
    right: йти ногами, не машиною
- type: unjumble
  instruction: Складіть правильне речення зі слів (Make a correct sentence from the
    words)
  items:
  - words:
    - вокзалу?
    - Як
    - до
    - дістатися
    correct_order:
    - Як
    - дістатися
    - до
    - вокзалу?
  - words:
    - один
    - В
    - чи
    - бік
    - й
    - назад?
    - туди
    correct_order:
    - В
    - один
    - бік
    - чи
    - туди
    - й
    - назад?
  - words:
    - зупинка?
    - Яка
    - це
    correct_order:
    - Яка
    - це
    - зупинка?
  - words:
    - наступний
    - потяг?
    - Коли
    correct_order:
    - Коли
    - наступний
    - потяг?
  - words:
    - ви
    - Вибачте,
    - виходите?
    correct_order:
    - Вибачте,
    - ви
    - виходите?
  - words:
    - їду
    - Я
    - на
    - метро.
    correct_order:
    - Я
    - їду
    - на
    - метро.
- type: error-correction
  instruction: Знайдіть і виправте помилку (Find and correct the mistake)
  items:
  - sentence: Я їду на автобусом.
    error: на автобусом
    correction: автобусом
    error_type: construction
    options:
    - автобусом
    - на автобусу
    - автобусі
    explanation: 'Правильно: «автобусом» або «на автобусі». Міксувати не можна.'
  - sentence: Він їде метром.
    error: метром
    correction: на метро
    error_type: word
    options:
    - на метро
    - у метро
    - в метрі
    explanation: 'Слово «метро» не змінюється. Правильно: «на метро».'
  - sentence: Один квиток в Київ, будь ласка.
    error: в Київ
    correction: до Києва
    error_type: construction
    options:
    - до Києва
    - у Київ
    - на Київ
    explanation: 'Завжди кажемо: квиток «до» (куди?). До Києва.'
  - sentence: Як дістати до вокзалу?
    error: дістати
    correction: дістатися
    error_type: word
    options:
    - дістатися
    - доїхати
    - йти
    explanation: Правильне дієслово — «дістатися» (to get to).
  - sentence: Потяг відправляється о восьмій.
    error: відправляється
    correction: рушає
    error_type: word
    options:
    - рушає
    - йде
    - їде
    explanation: '«Відправляється» — це калька. Українською краще: «рушає».'
  - sentence: Ми їдемо таксієм.
    error: таксієм
    correction: на таксі
    error_type: word
    options:
    - на таксі
    - таксію
    - на таксієм
    explanation: 'Слово «таксі» не змінюється. Правильно: «на таксі».'
- type: translate
  instruction: Оберіть правильний переклад (Choose the correct translation)
  items:
