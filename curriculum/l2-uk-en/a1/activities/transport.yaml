version: '1.0'
module: transport
level: a1
inline:
- id: quiz-which-transport
  type: quiz
  instruction: Оберіть правильний транспорт (Choose the correct transport)
  items:
  - question: Я їду до Львова. Це міжміський транспорт (intercity transport).
    options:
    - потяг
    - метро
    - тролейбус
    - трамвай
    correct: 0
  - question: Це міжнародний рейс (international flight).
    options:
    - автобус
    - маршрутка
    - літак
    - трамвай
    correct: 2
  - question: Ви викликаєте цю машину (you call this car).
    options:
    - маршрутка
    - таксі
    - літак
    - потяг
    correct: 1
  - question: Це великий громадський транспорт (public transport).
    options:
    - автобус
    - літак
    - метро
    - потяг
    correct: 0
  - question: Це транспорт під землею (subway).
    options:
    - метро
    - тролейбус
    - маршрутка
    - літак
    correct: 0
  - question: Це невеликий приватний автобус (private minibus).
    options:
    - потяг
    - метро
    - тролейбус
    - маршрутка
    correct: 3
  - question: Цей транспорт їздить на рейках (on tracks) у місті.
    options:
    - метро
    - автобус
    - трамвай
    - потяг
    correct: 2
  - question: Він використовує електрику (electricity) і їде по дорозі.
    options:
    - маршрутка
    - тролейбус
    - таксі
    - літак
    correct: 1
- id: quiz-instrumental-or-locative
  type: quiz
  instruction: Оберіть правильний варіант (Choose the correct option)
  items:
  - question: Йдіть прямо, або їдьте ____. (Go straight, or ride by bus.)
    options:
    - автобусом
    - на автобусі
    - автобусу
    - автобус
    correct: 0
  - question: Як дістатися до центру міста? Їдьте ____.
    options:
    - метром
    - на метро
    - метро
    - метру
    correct: 1
  - question: Я їду до аеропорту ____.
    options:
    - таксі
    - на таксі
    - таксією
    - таксію
    correct: 1
  - question: Я їду до Львова ____.
    options:
    - на потязі
    - потягу
    - потягом
    - потяг
    correct: 2
  - question: Ми їдемо прямо ____.
    options:
    - на трамваї
    - трамваєм
    - трамваю
    - трамвай
    correct: 1
  - question: Я їду на роботу ____.
    options:
    - машином
    - на машині
    - машину
    - машина
    correct: 1
- id: fill-in-buy-ticket
  type: fill-in
  instruction: Вставте правильне слово (Insert the correct word)
  items:
  - sentence: Один ____ до Львова, будь ласка.
    answer: квиток
    options:
    - квиток
    - автобус
    - вокзал
  - sentence: Один квиток ____ Львова, будь ласка.
    answer: до
    options:
    - до
    - на
    - в
  - sentence: В один бік чи туди й ____?
    answer: назад
    options:
    - прямо
    - назад
    - туди
  - sentence: В один ____, будь ласка.
    answer: бік
    options:
    - зупинка
    - бік
    - квиток
  - sentence: Скільки ____ квиток?
    answer: коштує
    options:
    - коштує
    - рушає
    - їде
  - sentence: О ____ відправлення?
    answer: котрій
    options:
    - скільки
    - котрій
    - коли
- id: fill-in-ask-directions
  type: fill-in
  instruction: Вставте правильне слово (Insert the correct word)
  items:
  - sentence: Вибачте, ____ дістатися до аеропорту?
    answer: як
    options:
    - як
    - де
    - скільки
  - sentence: Як дістатися ____ вокзалу?
    answer: до
    options:
    - до
    - на
    - в
  - sentence: Де ____ автобуса?
    answer: зупинка
    options:
    - квиток
    - зупинка
    - вокзал
  - sentence: Йдіть прямо, потім ____.
    answer: наліво
    options:
    - зупинка
    - наліво
    - прямо
  - sentence: Поверніть ____.
    answer: направо
    options:
    - наліво
    - направо
    - потяг
  - sentence: Мені ____ тут?
    answer: виходити
    options:
    - виходити
    - дістатися
    - їхати
