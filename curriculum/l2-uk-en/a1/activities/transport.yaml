    - прямо,
    correct_order:
    - Йдіть
    - прямо,
    - потім
    - наліво.
    hint: Go straight, then left.
- id: true-false-comprehension
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: «Метро» та «таксі» — це слова, які не змінюють закінчення (indeclinable
      nouns).
    correct: true
    explanation: «Метро» та «таксі» ніколи не змінюють закінчення.
  - statement: Ми кажемо «їхати на автобусі».
    correct: false
    explanation: Правильно казати «їхати автобусом» (орудний відмінок / instrumental
      case).
  - statement: Для транспорту ми використовуємо дієслово «іти».
    correct: false
    explanation: Для транспорту ми використовуємо дієслово «їхати» (to ride / to go
      by vehicle).
  - statement: «Туди й назад» означає квиток в один бік (one way).
    correct: false
    explanation: «Туди й назад» означає round trip. В один бік — це one way.
  - statement: Після слова «до» ми використовуємо родовий відмінок (Як дістатися до
      аеропорту?).
    correct: true
    explanation: Прийменник «до» завжди вимагає родового відмінка (genitive case).
  - statement: Слово «рушати» ми використовуємо для потяга (Потяг рушає).
    correct: true
    explanation: Так, для потяга ми використовуємо дієслово «рушати».
