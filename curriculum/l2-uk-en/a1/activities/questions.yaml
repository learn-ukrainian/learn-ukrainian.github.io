version: '1.0'
module: questions
level: a1
inline:
- id: quiz-question-word-choice
  type: quiz
  instruction: Оберіть правильне питальне слово (Choose the correct question word)
  items:
  - question: _____ ти живеш?
    options:
    - Де
    - Куди
    - Що
    - Хто
    correct: 0
  - question: _____ це? — Це стіл.
    options:
    - Що
    - Хто
    - Де
    - Коли
    correct: 0
  - question: _____ це? — Це мій студент.
    options:
    - Хто
    - Що
    - Де
    - Коли
    correct: 0
  - question: _____ ти йдеш?
    options:
    - Куди
    - Де
    - Як
    - Хто
    correct: 0
  - question: _____ ти працюєш? — Вранці.
    options:
    - Коли
    - Хто
    - Що
    - Де
    correct: 0
  - question: _____ справи? — Добре, дякую.
    options:
    - Як
    - Що
    - Хто
    - Чому
    correct: 0
- id: match-question-answer
  type: match-up
  instruction: З'єднайте питання з відповіддю (Match the question with the answer)
  pairs:
  - left: Хто це?
    right: Це мій студент.
  - left: Що це?
    right: Це книга.
  - left: Де ти живеш?
    right: Я живу в Києві.
  - left: Куди ти йдеш?
    right: Я йду в парк.
  - left: Коли ти працюєш?
    right: Я працюю вранці.
  - left: Чому ти не працюєш?
    right: Тому що я хочу спати.
  - left: Як справи?
    right: Добре, дякую.
- id: fill-in-negation-transform
  type: fill-in
  instruction: Зробіть речення заперечним (Make the sentence negative)
  items:
  - sentence: Я знаю. → Я ____ знаю.
    answer: не
    options:
    - ні
    - не
    - нічого
  - sentence: Хтось (Someone) знає. → ____ не знає.
    answer: Ніхто
    options:
    - Ніхто
    - Нічого
    - Не
  - sentence: Я бачу все (everything). → Я ____ не бачу.
    answer: нічого
    options:
    - ніхто
    - нічого
    - ні
  - sentence: Вона працює. → Вона ____ працює.
    answer: не
    options:
    - не
    - ніколи
    - ні
  - sentence: Він завжди (always) спить. → Він ____ не спить.
    answer: ніколи
    options:
    - ніколи
    - ніхто
    - не
  - sentence: Ми розуміємо. → Ми ____ розуміємо.
    answer: не
    options:
    - не
    - ні
    - нічого
- id: quiz-double-negation
  type: quiz
  instruction: Оберіть правильне українське речення (Choose the correct Ukrainian
    sentence)
  items:
  - question: I know nothing.
    options:
    - Я нічого не знаю.
    - Я нічого знаю.
    - Я знаю нічого.
    - Я не знаю щось.
    correct: 0
  - question: Nobody works.
    options:
    - Ніхто не працює.
    - Ніхто працює.
    - Не працює хтось.
    - Хтось не працює.
    correct: 0
  - question: We never rest.
    options:
    - Ми ніколи не відпочиваємо.
    - Ми ніколи відпочиваємо.
    - Ми не відпочиваємо ніколи.
    - Ми завжди не відпочиваємо.
    correct: 0
  - question: He understands nothing.
    options:
    - Він нічого не розуміє.
    - Він нічого розуміє.
    - Він розуміє нічого.
    - Він не розуміє ніхто.
    correct: 0
  - question: Nobody speaks.
    options:
    - Ніхто не говорить.
    - Ніхто говорить.
    - Не говорить нічого.
    - Ніхто не знає.
    correct: 0
  - question: Nobody came.
    options:
    - Ніхто не прийшов.
    - Ніхто прийшов.
    - Нічого не прийшов.
    - Хтось не прийшов.
    correct: 0
workbook:
- id: workbook-group-sort-who-what
  type: group-sort
  instruction: Розподіліть слова (Sort the words into categories)
  groups:
  - label: Хто? (Who?)
    items:
    - студент
    - мама
    - турист
    - перехожий
  - label: Що? (What?)
    items:
    - книга
    - місто
    - автобус
    - парк
- id: workbook-true-false-question-words
  type: true-false
  instruction: Правда чи ні? (True or False?)
  items:
  - statement: Питання 'Хто це?' ми використовуємо для людей. (We use 'Хто це?' for
      people.)
    correct: true
    explanation: The word 'хто' asks about people or animals.
  - statement: Питання 'Що це?' ми використовуємо для людей. (We use 'Що це?' for
      people.)
    correct: false
    explanation: The word 'що' asks about inanimate objects or abstract concepts.
  - statement: Слово 'Де' означає напрямок руху. ('Де' means direction of movement.)
    correct: false
    explanation: '''Де'' asks about a static location.'
  - statement: Слово 'Куди' означає напрямок руху. ('Куди' means direction of movement.)
    correct: true
    explanation: '''Куди'' specifically asks about movement toward a destination.'
  - statement: На питання 'Чому?' ми відповідаємо 'Тому що'. (We answer 'Чому?' with
      'Тому що'.)
    correct: true
    explanation: '''Тому що'' means ''because''.'
  - statement: В українській мові ми кажемо 'Я нічого знаю'. (In Ukrainian we say
      'Я нічого знаю'.)
    correct: false
    explanation: 'Ukrainian requires double negation: ''Я нічого НЕ знаю''.'
- id: workbook-error-correction-negation
  type: error-correction
  instruction: Знайдіть і виправте помилку (Find and correct the error)
  items:
  - sentence: Я нічого знаю.
    error: знаю
    correction: не знаю
    error_type: construction
    explanation: 'Ukrainian requires double negation: нічого НЕ знаю.'
  - sentence: Ніхто знає.
    error: знає
    correction: не знає
    error_type: construction
    explanation: 'Ukrainian requires double negation: ніхто НЕ знає.'
  - sentence: Де ти йдеш?
    error: Де
    correction: Куди
    error_type: word
    explanation: Use 'Куди' for direction of movement (where to).
  - sentence: Куди ти живеш?
    error: Куди
    correction: Де
    error_type: word
    explanation: Use 'Де' for a static location (where).
  - sentence: Що це? — Це мій студент.
    error: Що
    correction: Хто
    error_type: word
    explanation: Use 'Хто' for people.
  - sentence: Чому ти працюєш? — Тому я хочу працювати.
    error: Тому
    correction: Тому що
    error_type: phrase
    explanation: '''Because'' is translated as ''Тому що''.'
- id: workbook-translate-questions
  type: translate
  instruction: Оберіть правильний переклад (Choose the correct translation)
  items:
  - source: Where do you live?
    options:
    - text: Де ти живеш?
      correct: true
    - text: Куди ти живеш?
      correct: false
    - text: Як ти живеш?
      correct: false
  - source: Who are you?
    options:
    - text: Хто ти?
      correct: true
    - text: Що ти?
      correct: false
    - text: Де ти?
      correct: false
  - source: Why don't you work?
    options:
    - text: Чому ти не працюєш?
      correct: true
    - text: Коли ти не працюєш?
      correct: false
    - text: Як ти не працюєш?
      correct: false
  - source: Because I want to sleep.
    options:
    - text: Тому що я хочу спати.
      correct: true
    - text: Тому я хочу спати.
      correct: false
    - text: Чому що я хочу спати.
      correct: false
  - source: Where are you going?
    options:
    - text: Куди ти йдеш?
      correct: true
    - text: Де ти йдеш?
      correct: false
    - text: Як ти йдеш?
      correct: false
  - source: I know nothing.
    options:
    - text: Я нічого не знаю.
      correct: true
    - text: Я нічого знаю.
      correct: false
    - text: Я знаю нічого.
      correct: false
