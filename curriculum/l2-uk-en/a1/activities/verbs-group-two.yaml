- type: observe
  examples:
  - робити → я роблю (б → бл)
  - ходити → я ходжу (д → дж)
  - просити → я прошу (с → ш)
  - бачити → я бачу (ч stays ч — no change)
  prompt: Look at the **я**-forms above. Three verbs change their stem consonant;
    one does not. Which consonant does NOT change? What do the three changing consonants
    (б, д, с) have in common — and why might ч behave differently?
