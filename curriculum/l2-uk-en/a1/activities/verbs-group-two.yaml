- id: group-sort
  type: group-sort
  instruction: Sort these verbs into **Group I** (infinitive ends in **-ати**) or
    **Group II** (infinitive ends in **-ити**).
  groups:
  - label: Group I (-ати)
    items:
    - читати
    - слухати
    - писати
    - знати
    - чекати
    - питати
  - label: Group II (-ити)
    items:
    - говорити
    - бачити
    - робити
    - вчити
    - ходити
    - просити
