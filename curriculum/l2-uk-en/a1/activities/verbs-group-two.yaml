workbook:
- type: match-up
  instruction: Match each personal pronoun to the correct form of **говорити** (to
    speak).
  pairs:
  - left: я
    right: говорю
  - left: ти
    right: говориш
  - left: він / вона
    right: говорить
  - left: ми
    right: говоримо
  - left: ви
    right: говорите
  - left: вони
    right: говорять
- type: error-correction
  instruction: Each sentence has a wrongly conjugated verb. Find it and correct it.
  items:
  - sentence: Я робить добре.
    error: робить
    correction: роблю
    error_type: word
    options:
    - роблю
    - робиш
    - робимо
    explanation: 'Я = 1st person singular → роблю. Note the consonant change: б →
      бл.'
  - sentence: Ти говорю трохи.
    error: говорю
    correction: говориш
    error_type: word
    options:
    - говоримо
    - говориш
    - говорять
    explanation: Ти = 2nd person singular → говориш.
  - sentence: Він прошу друга допомагати.
    error: прошу
    correction: просить
    error_type: word
    options:
    - просить
    - просиш
    - просять
    explanation: Він = 3rd person singular → просить.
  - sentence: Ми бачить фільм увечері.
    error: бачить
    correction: бачимо
    error_type: word
    options:
    - бачимо
    - бачите
    - бачать
    explanation: Ми = 1st person plural → бачимо.
  - sentence: Ви ходжу онлайн.
    error: ходжу
    correction: ходите
    error_type: word
    options:
    - ходите
    - ходять
    - ходимо
    explanation: Ви = 2nd person plural → ходите.
  - sentence: Вони вчить нові слова.
    error: вчить
    correction: вчать
    error_type: word
    options:
    - вчать
    - вчимо
    - вчите
    explanation: Вони = 3rd person plural → вчать. The stem ends in ч (a sibilant),
      so the ending is -ать.
- type: true-false
  instruction: True or false? Read each statement about Ukrainian verb groups.
  items:
  - statement: The **ти**-form of a Group II verb ends in **-єш** (e.g., говорієш).
    correct: false
    explanation: Group II ти-forms end in -иш (говориш). The -єш ending belongs to
      Group I (читаєш).
  - statement: '**Говорити** is a Group II verb.'
    correct: true
    explanation: Yes — говорити ends in -ити, and its ти-form is говориш (ending in
      -иш).
  - statement: The **вони**-form of **бачити** is бачять.
    correct: false
    explanation: 'It is бачать — the stem ends in ч (a sibilant: ч/ш/ж/щ), so the
      вони-form takes -ать, not -ять.'
  - statement: The **я**-form of **робити** is роблю.
    correct: true
    explanation: 'Yes — б changes to бл in the я-form: роб → робл → роблю.'
  - statement: Group I verbs have infinitives ending in **-ати** (e.g., читати, слухати).
    correct: true
    explanation: Correct — читати, слухати, писати all end in -ати and belong to Group
      I.
  - statement: Consonant changes (б→бл, д→дж, с→ш) happen in ALL forms of Group II
      verbs.
    correct: false
    explanation: These changes happen ONLY in the я-form. Every other form (ти, він,
      ми, ви, вони) follows the regular pattern.
