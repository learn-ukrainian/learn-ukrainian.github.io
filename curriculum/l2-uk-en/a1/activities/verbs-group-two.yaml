version: '1.0'
module: verbs-group-two
level: a1
inline:
- id: fill-in-conjugation-paradigm
  type: fill-in
  instruction: Complete the **дієвідмінювання** (conjugation) pattern for Group II
    verbs
  items:
  - sentence: я _____ (говорити)
    answer: говорю
  - sentence: ти _____ (говорити)
    answer: говориш
  - sentence: він/вона _____ (говорити)
    answer: говорить
  - sentence: ми _____ (говорити)
    answer: говоримо
  - sentence: ви _____ (говорити)
    answer: говорите
  - sentence: вони _____ (говорити)
    answer: говорять
  - sentence: я _____ (бачити)
    answer: бачу
  - sentence: вони _____ (бачити)
    answer: бачать
  - sentence: я _____ (робити)
    answer: роблю
  - sentence: я _____ (ходити)
    answer: ходжу
- id: group-sort-verbs
  type: group-sort
  instruction: Sort the verbs into Group I (**-ати**) and Group II (**-ити**)
  groups:
  - label: Group I
    items:
    - читати
    - слухати
  - label: Group II
    items:
    - говорити
    - бачити
    - робити
    - вчити
    - просити
    - ходити
    - дивитися
    - вчитися
- id: quiz-verb-choice
  type: quiz
  instruction: Choose the correct verb form for the **займенник** (pronoun)
  items:
  - question: Ти _____ це?
    options:
    - бачу
    - бачиш
    - бачить
    correct: 1
  - question: Вона добре _____.
    options:
    - говорю
    - говориш
    - говорить
    correct: 2
  - question: Ми _____ нові слова.
    options:
    - вчу
    - вчить
    - вчимо
    correct: 2
  - question: Вони _____ у парк.
    options:
    - ходять
    - ходить
    - ходимо
    correct: 0
  - question: Що ви _____?
    options:
    - роблять
    - робите
    - робиш
    correct: 1
  - question: Я _____ фільм.
    options:
    - дивлюся
    - дивишся
    - дивляться
    correct: 0
  - question: Ти _____ воду?
    options:
    - просять
    - просить
    - просиш
    correct: 2
  - question: Він _____ українською.
    options:
    - говориш
    - говорить
    - говорять
    correct: 1
- id: fill-in-translation-context
  type: fill-in
  instruction: Complete the sentences with the correct form of the verb in brackets
  items:
  - sentence: Вона _____ українською. (говорити)
    answer: говорить
  - sentence: Я _____ нові слова. (вчити)
    answer: вчу
  - sentence: Ми _____ у парк. (ходити)
    answer: ходимо
  - sentence: Що ти _____ увечері? (робити)
    answer: робиш
  - sentence: Вони _____ фільм. (бачити)
    answer: бачать
  - sentence: Ви _____ воду. (просити)
    answer: просите
workbook:
- id: workbook-stress-quiz
  type: quiz
  instruction: Choose the word with the correct **наголос** (stress)
  items:
  - question: to do/make
    options:
    - ро́бити
    - роби́ти
    - робити́
    correct: 1
  - question: to speak
    options:
    - гово́рити
    - говори́ти
    - говорити́
    correct: 1
  - question: to see
    options:
    - ба́чити
    - бачи́ти
    - бачити́
    correct: 0
  - question: to go/walk
    options:
    - хо́дити
    - ходи́ти
    - ходити́
    correct: 0
  - question: to ask
    options:
    - про́сити
    - проси́ти
    - просити́
    correct: 1
  - question: to watch
    options:
    - ди́витися
    - диви́тися
    - дивити́ся
    correct: 1
- id: workbook-stress-odd-one-out
  type: odd-one-out
  instruction: Choose the word with a different stress pattern
  items:
  - words:
    - роби́ти
    - проси́ти
    - говори́ти
    - ба́чити
    correct: 3
    explanation: ба́чити has stress on the root (first syllable), while the others
      have stress on the -и́ти suffix.
  - words:
    - говорю́
    - роблю́
    - прошу́
    - ба́чу
    correct: 3
    explanation: ба́чу has stress on the root, while the others have stress on the
      ending (-ю́/-у́).
  - words:
    - говори́ш
    - ро́биш
    - ба́чиш
    - про́сиш
    correct: 0
    explanation: говори́ш has stress on the ending, while the others have stress on
      the root.
  - words:
    - ро́бить
    - ба́чить
    - про́сить
    - говори́ть
    correct: 3
    explanation: говори́ть has stress on the ending, while the others have stress
      on the root.
  - words:
    - ро́бимо
    - ба́чимо
    - про́симо
    - говори́мо
    correct: 3
    explanation: говори́мо has stress on the ending, while the others have stress
      on the root.
  - words:
    - ро́блять
    - ба́чать
    - про́сять
    - говоря́ть
    correct: 3
    explanation: говоря́ть has stress on the ending, while the others have stress
      on the root.
- id: workbook-verb-match-up
  type: match-up
  instruction: Match the **займенник** (pronoun) with the correct verb form
  pairs:
  - left: я
    right: бачу
  - left: ти
    right: говориш
  - left: він
    right: вчить
  - left: ми
    right: робимо
  - left: ви
    right: просите
  - left: вони
    right: ходять
- id: workbook-error-correction
  type: error-correction
  instruction: Find and correct the wrong verb form
  items:
  - sentence: Я бачять, що ти добре говориш.
    error: бачять
    correction: бачу
    error_type: word
    options:
    - бачу
    - бачимо
    - бачить
    explanation: The pronoun is Я, so the verb must be бачу.
  - sentence: Ми вчить нові слова.
    error: вчить
    correction: вчимо
    error_type: word
    options:
    - вчу
    - вчить
    - вчимо
    explanation: The pronoun is Ми, so the verb must be вчимо.
  - sentence: Вони робить це добре.
    error: робить
    correction: роблять
    error_type: word
    options:
    - роблять
    - робимо
    - роблю
    explanation: The pronoun is Вони, so the verb must be роблять.
  - sentence: Ти говорю українською.
    error: говорю
    correction: говориш
    error_type: word
    options:
    - говориш
    - говорить
    - говорять
    explanation: The pronoun is Ти, so the verb must be говориш.
  - sentence: Я ходжу, а він ходять.
    error: ходять
    correction: ходить
    error_type: word
    options:
    - ходить
    - ходиш
    - ходимо
    explanation: The pronoun is він, so the verb must be ходить.
  - sentence: Ви просиш воду.
    error: просиш
    correction: просите
    error_type: word
    options:
    - просите
    - просимо
    - просять
    explanation: The pronoun is Ви, so the verb must be просите.
- id: workbook-pronoun-fill-in
  type: fill-in
  instruction: Choose the correct **займенник** (pronoun) based on the verb ending
  items:
  - sentence: _____ ходимо у парк.
    answer: ми
    options:
    - ми
    - ви
    - вони
  - sentence: _____ добре говорите.
    answer: ви
    options:
    - ти
    - ви
    - ми
  - sentence: _____ роблять це увечері.
    answer: вони
    options:
    - він
    - ми
    - вони
  - sentence: _____ вчу нові слова.
    answer: я
    options:
    - я
    - ти
    - він
  - sentence: _____ дивишся фільм?
    answer: ти
    options:
    - ти
    - ви
    - вона
  - sentence: _____ просить воду.
    answer: вона
    options:
    - я
    - ми
    - вона
- id: workbook-pronoun-sort
  type: group-sort
  instruction: Sort the **займенники** (pronouns) into singular and plural
  groups:
  - label: Singular (Однина)
    items:
    - я
    - ти
    - він
    - вона
  - label: Plural (Множина)
    items:
    - ми
    - ви
    - вони
- id: workbook-ty-vs-vy
  type: quiz
  instruction: Choose between the informal **ти** and polite **Ви** based on the verb
    form
  items:
  - question: 'Тарас: ''Миколо, що _____ робиш?'''
    options:
    - ти
    - Ви
    - він
    correct: 0
  - question: _____ добре говорите українською!
    options:
    - ти
    - Ви
    - вони
    correct: 1
  - question: _____ бачиш це?
    options:
    - ти
    - Ви
    - я
    correct: 0
  - question: Що _____ просите?
    options:
    - ти
    - Ви
    - ми
    correct: 1
  - question: _____ ходиш у парк?
    options:
    - ти
    - Ви
    - вона
    correct: 0
  - question: _____ вчите нові слова?
    options:
    - ти
    - Ви
    - він
    correct: 1
- id: workbook-reading-true-false
  type: true-false
  instruction: True or False? Check your understanding of the dialogue between Taras
    and Mykola.
  items:
  - statement: Тарас і Микола говорять українською.
    correct: true
    explanation: 'Тарас asks: ''Ти говориш українською?'' and Микола says ''Так, я
      говорю трохи.'''
  - statement: Микола добре говорить українською.
    correct: true
    explanation: 'Тарас says: ''Я бачу, що ти добре говориш!'''
  - statement: Тарас дивиться фільм увечері.
    correct: false
    explanation: Тарас studies new words ('Я вчу нові слова').
  - statement: Микола вчить нові слова увечері.
    correct: false
    explanation: Микола watches a movie ('Я дивлюся фільм').
  - statement: Дієслово 'вчити' - це Група II.
    correct: true
    explanation: The infinitive ends in -ити and it conjugates with -иш, -ить, etc.
  - statement: Дієслово 'читати' - це Група II.
    correct: false
    explanation: The infinitive ends in -ати, it is Group I.
- id: workbook-translation
  type: translate
  instruction: Choose the correct Ukrainian translation
  items:
  - source: I am watching a movie.
    options:
    - text: Я дивлюся фільм.
      correct: true
    - text: Я бачу фільм.
      correct: false
  - source: She speaks well.
    options:
    - text: Вона добре говорить.
      correct: true
    - text: Вона добре говориш.
      correct: false
  - source: They walk to the park.
    options:
    - text: Вони ходять у парк.
      correct: true
    - text: Вони ходить у парк.
      correct: false
  - source: What are you doing? (informal)
    options:
    - text: Що ти робиш?
      correct: true
    - text: Що ви робите?
      correct: false
  - source: We see it.
    options:
    - text: Ми бачимо це.
      correct: true
    - text: Ми дивимося це.
      correct: false
  - source: You ask for water. (plural/polite)
    options:
    - text: Ви просите воду.
      correct: true
    - text: Ти просиш воду.
      correct: false
