      correct: false
    - text: Лікарем!
      correct: false
  - question: Як правильно покликати поліцію у кличному відмінку?
    explanation: У кличному відмінку слово поліція змінюється.
    options:
    - text: Поліціє!
      correct: true
    - text: Поліція!
      correct: false
    - text: Поліцію!
      correct: false
    - text: Поліції!
      correct: false
