      correct: true
    - text: дзвонити
      correct: false
    - text: визивати
      correct: false
    - text: питати
      correct: false
  - question: Яку форму слова лікар треба використати, щоб покликати його на допомогу?
    explanation: Ми використовуємо кличний відмінок для звертання.
    options:
