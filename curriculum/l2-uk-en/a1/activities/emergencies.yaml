version: '1.0'
module: emergencies
level: a1
inline:
- id: quiz-emergency-phrases
  type: quiz
  instruction: Оберіть правильну фразу для ситуації (Choose the correct emergency
    phrase for the situation)
  items:
  - question: You see a car crash.
    options:
    - Тут аварія! Викличте швидку!
    - Тут пожежа! Допоможіть!
    - Я загубив паспорт.
    - Людині погано!
    correct: 0
  - question: You see a building on fire.
    options:
    - Тут аварія! Викличте швидку!
    - Тут пожежа! Допоможіть!
    - Мені потрібен лікар.
    - Викличте поліцію!
    correct: 1
  - question: Someone is feeling very ill on the street.
    options:
    - Людині погано! Викличте швидку!
    - Викличте поліцію!
    - Я загубив паспорт.
    - Тут пожежа!
    correct: 0
  - question: You cannot find your passport at the airport.
    options:
    - Людині погано!
    - Тут аварія!
    - Я загубив паспорт.
    - Тут пожежа!
    correct: 2
  - question: Someone stole your wallet.
    options:
    - Тут пожежа!
    - Мені потрібен лікар.
    - Людині погано!
    - Викличте поліцію! Допоможіть!
    correct: 3
  - question: You need to see a doctor.
    options:
    - Викличте поліцію!
    - Я загубив паспорт.
    - Тут аварія!
    - Мені потрібен лікар.
    correct: 3
- id: fill-in-emergency-call
  type: fill-in
  instruction: Заповніть пропуски (Fill in the blanks)
  items:
  - sentence: Алло! ____! Тут аварія!
    answer: Допоможіть
    options:
    - Допоможіть
    - Дякую
    - Вибачте
  - sentence: ____ швидку допомогу!
    answer: Викличте
    options:
    - Викличте
    - Загубив
    - Потрібен
  - sentence: Я на ____ Хрещатик, біля метро.
    answer: вулиці
    options:
    - вулиці
    - лікарні
    - поліції
  - sentence: Мене ____ Адам.
    answer: звати
    options:
    - звати
    - прізвище
    - адреса
  - sentence: Мій номер ____ — нуль дев'яносто три...
    answer: телефону
    options:
    - телефону
    - паспорта
    - будинку
  - sentence: Мені потрібна ____!
    answer: допомога
    options:
    - допомога
    - пожежа
    - аварія
- id: fill-in-reporting-issue
  type: fill-in
  instruction: Заповніть пропуски (Fill in the blanks)
  items:
  - sentence: Добрий день. Я ____ паспорт.
    answer: загубив
    options:
    - загубив
    - викличте
    - допоможіть
  - sentence: Моє ____ — Сміт.
    answer: прізвище
    options:
    - прізвище
    - ім'я
    - номер
  - sentence: Мені ____ лікар.
    answer: потрібен
    options:
    - потрібен
    - погана
    - хворий
  - sentence: У мене ____ на ці таблетки.
    answer: алергія
    options:
    - алергія
    - пожежа
    - аварія
  - sentence: Я не розумію. ____, будь ласка.
    answer: Повторіть
    options:
    - Повторіть
    - Допоможіть
    - Викличте
  - sentence: Заповніть цю ____, будь ласка.
    answer: форму
    options:
    - форму
    - лікарню
    - адресу
workbook:
- id: match-up-vocab
  type: match-up
  instruction: З'єднайте українські та англійські слова (Match the Ukrainian and English
    words)
  pairs:
  - left: пожежа
    right: fire
  - left: аварія
    right: accident
  - left: швидка
    right: ambulance
  - left: поліція
    right: police
  - left: лікарня
    right: hospital
  - left: допомога
    right: help
- id: group-sort-emergencies
  type: group-sort
  instruction: Розподіліть слова за категоріями (Sort the words into categories)
  groups:
  - label: Медицина (Medicine)
    items:
    - лікар
    - лікарня
    - швидка
    - алергія
  - label: Документи (Documents)
    items:
    - паспорт
    - форма
    - прізвище
    - адреса
- id: true-false-emergency
  type: true-false
  instruction: Правда чи ні? (True or False?)
  items:
  - statement: Номер 112 — це універсальний номер екстреної допомоги в Україні.
    correct: true
    explanation: 112 is the universal emergency number in Ukraine.
  - statement: Номер 103 — це пожежна служба.
    correct: false
    explanation: 103 is for the ambulance (швидка). 101 is for the fire service (пожежна
      служба).
  - statement: Фраза «Тут аварія» означає, що сталася дорожня пригода.
    correct: true
    explanation: Тут аварія means 'There is an accident here'.
  - statement: 'Правильно говорити: «Мені потрібен лікарня».'
    correct: false
    explanation: 'Лікарня is feminine, so you must use ''потрібна'': Мені потрібна
      лікарня.'
  - statement: В українській мові ми кажемо «у мене болить голова» замість «я маю
      біль».
    correct: true
    explanation: Ukrainian uses the structure 'у мене болить + [body part in nominative]'.
  - statement: Фраза «Я загубив паспорт» використовує чоловічий рід.
    correct: true
    explanation: The past tense ending -в in 'загубив' indicates a masculine speaker.
- id: anagram-emergencies
  type: anagram
  instruction: Складіть слово з літер (Make a word from the letters)
  items:
  - letters:
    - п
    - о
    - ж
    - е
    - ж
    - а
    answer: пожежа
    hint: fire
  - letters:
    - а
    - в
    - а
    - р
    - і
    - я
    answer: аварія
    hint: accident
  - letters:
    - ш
    - в
    - и
    - д
    - к
    - а
    answer: швидка
    hint: ambulance
  - letters:
    - л
    - і
    - к
    - а
    - р
    - н
    - я
    answer: лікарня
    hint: hospital
  - letters:
    - п
    - а
    - с
    - п
    - о
    - р
    - т
    answer: паспорт
    hint: passport
  - letters:
    - п
    - о
    - л
    - і
    - ц
    - і
    - я
    answer: поліція
    hint: police
- id: unjumble-sentences
  type: unjumble
  instruction: Складіть правильне речення зі слів (Put the words in the correct order
    to make a sentence)
  items:
  - words:
    - швидку!
    - Викличте
    correct_order:
    - Викличте
    - швидку!
  - words:
    - потрібен
    - Мені
    - лікар.
    correct_order:
    - Мені
    - потрібен
    - лікар.
  - words:
    - болить
    - мене
    - У
    - голова.
    correct_order:
    - У
    - мене
    - болить
    - голова.
  - words:
    - паспорт.
    - загубив
    - Я
    correct_order:
    - Я
    - загубив
    - паспорт.
  - words:
    - 'адреса:'
    - Моя
    - Шевченка.
    - вулиця
    correct_order:
    - Моя
    - 'адреса:'
    - вулиця
    - Шевченка.
  - words:
    - не
    - розумію.
    - Я
    correct_order:
    - Я
    - не
    - розумію.
