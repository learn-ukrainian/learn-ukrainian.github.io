workbook:
- type: match-up
  instruction: Match each pronoun to the correct form of **могти** (to be able to)
  pairs:
  - left: я
    right: можу
  - left: ти
    right: можеш
  - left: він / вона
    right: може
  - left: ми
    right: можемо
  - left: ви
    right: можете
  - left: вони
    right: можуть
- type: group-sort
  instruction: Sort these verbs by conjugation group. Group I verbs end in **-уть**
    (вони). Group II verbs end in **-ять** (вони).
  groups:
  - label: Group I (вони → -уть)
    items:
    - хотіти
    - могти
    - гуляти
    - читати
    - писати
    - слухати
  - label: Group II (вони → -ять)
    items:
    - мусити
    - робити
    - говорити
    - вчитися
    - ходити
    - любити
- type: error-correction
  instruction: Find the incorrectly conjugated verb and correct it
  items:
  - sentence: Я хотіти каву.
    error: хотіти
    correction: хочу
    error_type: word
    options:
    - хочу
    - хочеш
    - хоче
    explanation: Use the conjugated form **хочу** (я-form), not the infinitive хотіти.
  - sentence: Ти можуть допомогти?
    error: можуть
    correction: можеш
    error_type: word
    options:
    - можу
    - можеш
    - може
    explanation: '**Ти** takes **можеш**. **Можуть** is the вони-form (3rd person
      plural).'
  - sentence: Він мушу вчитися.
    error: мушу
    correction: мусить
    error_type: word
    options:
    - мусить
    - мусиш
    - мусимо
    explanation: '**Він** takes **мусить**. **Мушу** is the я-form only.'
  - sentence: Ми хочеш гуляти.
    error: хочеш
    correction: хочемо
    error_type: word
    options:
    - хочемо
    - хочете
    - хочуть
    explanation: '**Ми** takes **хочемо**. **Хочеш** is the ти-form.'
  - sentence: Вони можемо читати.
    error: можемо
    correction: можуть
    error_type: word
    options:
    - можуть
    - можемо
    - можете
    explanation: '**Вони** takes **можуть**. **Можемо** is the ми-form.'
  - sentence: Ти мусять іти?
    error: мусять
    correction: мусиш
    error_type: word
    options:
    - мусиш
    - мусить
    - мусимо
    explanation: '**Ти** takes **мусиш**. **Мусять** is the вони-form.'
- type: true-false
  instruction: True or false? Read each statement about the three modal verbs
  items:
  - statement: '**Хотіти** belongs to conjugation Group I.'
    correct: true
    explanation: Correct — its вони-form ends in **-уть** (хочуть), which is the Group
      I signature.
  - statement: The stem of **хотіти** stays **хот-** in all conjugated present-tense
      forms.
    correct: false
    explanation: Wrong — the stem changes to **хоч-** in every present form (т→ч alternation).
      There is no present form with хот-.
  - statement: '**Мусити** is a completely irregular verb, just like хотіти and могти.'
    correct: false
    explanation: 'Wrong — мусити is a regular Group II verb. Only the я-form has a
      small change: **мушу** (с→ш in я only).'
  - statement: Both **можу** and **хочу** end in **-у** because хотіти and могти are
      both Group I verbs.
    correct: true
    explanation: Correct — Group I я-forms take **-у**. Both verbs belong to Group
      I despite having unusual stems.
  - statement: '**Мушу** means ''I want''.'
    correct: false
    explanation: Wrong — **мушу** means 'I must / I have to' (obligation). 'I want'
      is **хочу**.
  - statement: In the sentence **Я хочу каву**, the verb хотіти is followed by an
      infinitive.
    correct: false
    explanation: Wrong — **каву** is a noun in the accusative case. Хотіти + noun
      means wanting a *thing*. Хотіти + infinitive means wanting to *do* something.
  - statement: The stem change in **могти** is г → ж (мог- → мож-).
    correct: true
    explanation: 'Correct — this г→ж alternation is a regular Ukrainian pattern: допомогти
      → допоможу, берегти → бережу.'
