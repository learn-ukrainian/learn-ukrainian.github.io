- id: fill-in
  type: fill-in
  instruction: Complete the sentences combining desires, abilities, and obligations.
  items:
  - sentence: Я ____ гуляти, але не можу — мушу працювати.
    answer: хочу
    options:
    - хочу
    - хочеш
    - хоче
  - sentence: Ти хочеш гуляти, але не ____ — мусиш працювати.
    answer: можеш
    options:
    - можеш
    - може
    - можу
  - sentence: Він хоче їсти, але не може — ____ працювати.
    answer: мусить
    options:
    - мусить
    - мушу
    - мусять
  - sentence: Ми хочемо читати, але не ____ — мусимо йти.
    answer: можемо
    options:
    - можемо
    - можуть
    - можете
  - sentence: Ви хочете каву, але не можете — ви ____ працювати.
    answer: мусите
    options:
    - мусите
    - мусимо
    - мусять
  - sentence: Вони ____ спати, але не можуть — мусять працювати.
