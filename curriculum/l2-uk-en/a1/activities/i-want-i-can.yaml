inline:
- id: fill-in-khotity-conjugation
  type: fill-in
  instruction: Fill in the correct form of **хотіти**.
  items:
  - sentence: Я ___ каву.
    answer: хочу
    options:
    - хочу
    - хочеш
    - хоче
    - хочемо
  - sentence: Ти ___ спати?
    answer: хочеш
    options:
    - хочу
    - хочеш
    - хочете
    - хочуть
  - sentence: Вона ___ читати.
    answer: хоче
    options:
    - хоче
    - хочемо
    - хочете
    - хочуть
  - sentence: Ми ___ їсти.
    answer: хочемо
    options:
    - хочу
    - хоче
    - хочемо
    - хочете
  - sentence: Ви ___ чай?
    answer: хочете
    options:
    - хочу
    - хочеш
    - хочемо
    - хочете
  - sentence: Вони ___ воду.
    answer: хочуть
    options:
    - хоче
    - хочемо
    - хочете
    - хочуть
  - sentence: Він ___ сік.
    answer: хоче
    options:
    - хочу
    - хочеш
    - хоче
    - хочемо
  - sentence: Я не ___ спати.
    answer: хочу
    options:
    - хочу
    - хочеш
    - хоче
    - хочуть
  - sentence: Ти не ___ гуляти?
    answer: хочеш
    options:
    - хочу
    - хочеш
    - хочемо
    - хочете
- id: quiz-verb-patterns
  type: quiz
  instruction: Identify the verb pattern. Choose the correct statement.
  items:
  - question: How does the root of **хотіти** change?
    options:
    - '''т'' changes to ''ч'' in all forms'
    - It is completely regular
    - '''г'' changes to ''ж'''
    - '''с'' changes to ''ш'''
    correct: 0
  - question: Which statement is true about **могти**?
    options:
    - It is a regular verb
    - '''г'' changes to ''ж'' in most forms'
    - '''с'' changes to ''ш'''
    - It ends in -іти
    correct: 1
  - question: When does **мусити** have a consonant shift?
    options:
    - Only in 'я мушу'
    - In all forms
    - Only in 'вони мусять'
    - Never
    correct: 0
  - question: What is the 'they' form of **могти**?
    options:
    - вони можуть
    - вони можать
    - вони мусять
    - вони хочуть
    correct: 0
  - question: Which verb belongs to Group II?
    options:
    - мусити
    - хотіти
    - могти
    - гуляти
    correct: 0
  - question: What is the 'I' form of **хотіти**?
    options:
    - я хочу
    - я хотю
    - я хочю
    - я хоту
    correct: 0
- id: quiz-modal-choice
  type: quiz
  instruction: 'Choose the correct modal verb: **хочу**, **можу**, or **мушу**.'
  items:
  - question: 'In a café: ''Я ___ каву.'''
    options:
    - хочу
    - можу
    - мушу
    - можеш
    correct: 0
  - question: 'Asking for help: ''Ти ___ допомогти?'''
    options:
    - можеш
    - мусиш
    - хочу
    - може
    correct: 0
  - question: 'No choice: ''Я ___ працювати.'''
    options:
    - мушу
    - хочу
    - можу
    - хочеш
    correct: 0
  - question: 'A physical ability: ''Я ___ читати українською.'''
    options:
    - можу
    - мушу
    - хоче
    - можемо
    correct: 0
  - question: 'Asking a friend: ''Що ти ___ робити?'''
    options:
    - хочеш
    - можеш
    - мусиш
    - хочете
    correct: 0
  - question: 'Strong desire: ''Вона ___ їсти борщ.'''
    options:
    - хоче
    - може
    - мусить
    - хочу
    correct: 0
  - question: 'Obligation: ''Ми ___ вчити слова.'''
    options:
    - мусимо
    - можемо
    - хочемо
    - мусять
    correct: 0
  - question: 'Physical inability: ''Я не ___ спати.'''
    options:
    - можу
    - хочу
    - мушу
    - можеш
    correct: 0
- id: fill-in-modal-logic
  type: fill-in
  instruction: Complete the logical sentences with the correct verb.
  items:
  - sentence: Я хочу гуляти, але не ___.
    answer: можу
    options:
    - можу
    - мушу
    - хочу
    - можеш
  - sentence: Я не можу гуляти — я ___ працювати.
    answer: мушу
    options:
    - мушу
    - можу
    - хочу
    - мусить
  - sentence: Вона хоче спати, але не ___.
    answer: може
    options:
    - може
    - мусить
    - хоче
    - можуть
  - sentence: Він не може читати — він ___ працювати.
    answer: мусить
    options:
    - мусить
    - може
    - хоче
    - мусять
  - sentence: Ми хочемо каву, але не ___.
    answer: можемо
    options:
    - можемо
    - мусимо
    - хочемо
    - можуть
  - sentence: Ти не можеш гуляти — ти ___ вчити слова.
    answer: мусиш
    options:
    - мусиш
    - можеш
    - хочеш
    - мусите
workbook:
- id: match-pronoun-verb
  type: match-up
  instruction: Match the pronoun to the correct verb form.
  pairs:
  - left: я
    right: хочу
  - left: ти
    right: можеш
  - left: він
    right: мусить
  - left: ми
    right: можемо
  - left: ви
    right: хочете
  - left: вони
    right: мусять
- id: error-correction-verbs
  type: error-correction
  instruction: Find and correct the wrong verb form.
  items:
  - sentence: Я хочеш каву.
    error: хочеш
    correction: хочу
    error_type: word
    options:
    - хочу
    - хоче
    - хочемо
    explanation: For 'я', the correct form is 'хочу'.
  - sentence: Ти може допомогти?
    error: може
    correction: можеш
    error_type: word
    options:
    - можеш
    - можу
    - можете
    explanation: For 'ти', the correct form is 'можеш'.
  - sentence: Ми мусять працювати.
    error: мусять
    correction: мусимо
    error_type: word
    options:
    - мусимо
    - мушу
    - мусите
    explanation: For 'ми', the correct form is 'мусимо'.
  - sentence: Він хочу їсти.
    error: хочу
    correction: хоче
    error_type: word
    options:
    - хоче
    - хочеш
    - хочуть
    explanation: For 'він', the correct form is 'хоче'.
  - sentence: Вони можеш читати.
    error: можеш
    correction: можуть
    error_type: word
    options:
    - можуть
    - може
    - можемо
    explanation: For 'вони', the correct form is 'можуть'.
  - sentence: Ви мусить спати.
    error: мусить
    correction: мусите
    error_type: word
    options:
    - мусите
    - мусиш
    - мусимо
    explanation: For 'ви', the correct form is 'мусите'.
