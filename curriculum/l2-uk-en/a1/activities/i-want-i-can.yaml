- id: true-false-modals
  type: true-false
  instruction: Is the sentence grammatically correct?
  items:
  - statement: Я мушу працювати.
    correct: true
    explanation: 'This is perfectly correct: «я мушу» + infinitive.'
  - statement: Він хочу каву.
    correct: false
    explanation: «Він» takes the form «хоче».
  - statement: Ми можемо допомогти.
    correct: true
    explanation: 'This is correct: «ми можемо» + infinitive.'
  - statement: Ти мушиш спати.
    correct: false
    explanation: 'The consonant shift only happens in the ''я'' form: «ти мусиш».'
  - statement: Я не хочу гуляти.
    correct: true
    explanation: 'This is correct: the negative particle «не» goes before the modal
      verb.'
  - statement: Вони могти читати.
    correct: false
    explanation: 'You must conjugate the modal verb: «Вони можуть читати».'
  title: Is the sentence grammatically correct?
- id: count-syllables-vocab
  type: count-syllables
  instruction: How many syllables are in each word?
  items:
  - word: працювати
    correct: 4
  - word: хотіти
    correct: 3
  - word: могти
    correct: 2
  - word: борщ
    correct: 1
  - word: кава
    correct: 2
  - word: допомогти
    correct: 4
  title: How many syllables are in each word?
- id: odd-one-out-modals
  type: odd-one-out
  instruction: Find the word that does not belong.
  items:
  - words:
    - хочу
    - можу
    - каву
    correct: 2
    explanation: «Каву» is a noun, the others are verbs.
  - words:
    - читати
    - борщ
    - гуляти
    correct: 1
    explanation: «Борщ» is a noun, the others are infinitive verbs.
  - words:
    - мушу
    - мусить
    - може
    correct: 2
    explanation: «Може» is from the verb «могти», the others are from «мусити».
  - words:
    - можемо
    - хочемо
    - мусять
    correct: 2
    explanation: «Мусять» is 'they' (вони), the others are 'we' (ми).
  - words:
    - сьогодні
    - завтра
    - шкода
    correct: 2
    explanation: «Шкода» means 'a pity', the others are time words (today, tomorrow).
  - words:
    - чай
    - кава
    - кіно
    correct: 2
    explanation: «Кіно» is a place/event, the others are drinks.
  title: Find the word that does not belong.
