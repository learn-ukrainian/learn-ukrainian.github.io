    - Вони мушать працювати.
    - Вони мусять працювать.
    correct: 0
  title: Identify the correct conjugation pattern for the verbs.
workbook:
- id: match-up-vocab
  type: match-up
  instruction: Match the Ukrainian verbs with their English meaning.
  pairs:
  - left: хотіти
    right: to want
  - left: могти
    right: can / to be able to
  - left: мусити
    right: must / have to
  - left: їсти
    right: to eat
  - left: працювати
    right: to work
  - left: допомогти
    right: to help
  - left: гуляти
    right: to walk
  title: Match the Ukrainian verbs with their English meaning.
