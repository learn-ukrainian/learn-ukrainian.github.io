    - дуже
    - тепло
    - і
    - сонячно.
- id: count-syllables-vocab
  type: count-syllables
  instruction: Порахуйте склади у слові (Count the syllables in the word)
  items:
  - word: готель
    correct: 2
  - word: фільм
    correct: 1
  - word: круасан
    correct: 3
  - word: вишиванка
    correct: 4
  - word: лінія
    correct: 3
  - word: подорожувати
    correct: 6
- id: divide-words-vocab
  type: divide-words
  instruction: Розділіть слово на склади (Divide the word into syllables)
  items:
  - word: початок
    answer: по-ча-ток
  - word: сувенір
    answer: су-ве-нір
  - word: готовий
    answer: го-то-вий
  - word: вітаю
    answer: ві-та-ю
  - word: квиток
    answer: кви-ток
  - word: метро
    answer: ме-тро
- id: match-up-verbs
  type: match-up
  instruction: З'єднайте англійське дієслово з українським (Match the English verb
    to the Ukrainian)
  pairs:
