- type: translate
  instruction: Оберіть правильний переклад (Choose the correct translation)
  items:
  - source: I am ready.
    options:
    - text: Я готовий.
      correct: true
    - text: Я готов.
      correct: false
    - text: Мені готовий.
      correct: false
  - source: Congratulations!
    options:
    - text: Вітаю!
      correct: true
    - text: Дякую!
      correct: false
    - text: Будь ласка.
      correct: false
  - source: This is a souvenir.
    options:
    - text: Це сувенір.
      correct: true
    - text: Там сувенір.
      correct: false
    - text: Тут сувенір.
      correct: false
  - source: I want to travel.
    options:
    - text: Я хочу подорожувати.
      correct: true
    - text: Я подорожую.
      correct: false
    - text: Я буду подорожувати.
      correct: false
  - source: Let's go to the cinema!
    options:
    - text: Ходімо в кіно!
      correct: true
    - text: Я йду в кіно.
      correct: false
    - text: Ми були в кіно.
      correct: false
  - source: How much does the ticket cost?
    options:
    - text: Скільки коштує квиток?
      correct: true
    - text: Де квиток?
      correct: false
    - text: Дайте квиток.
      correct: false
