version: '1.0'
module: a1-finale
level: a1
inline:
- id: match-up-survival-phrases
  type: match-up
  instruction: З'єднайте ситуацію з правильною фразою (Match the situation to the
    correct phrase)
  pairs:
  - left: Ordering coffee
    right: Будь ласка, каву з молоком.
  - left: Asking for directions
    right: Вибачте, як дістатися до метро?
  - left: Buying a souvenir
    right: Скільки коштує ця вишиванка?
  - left: Meeting someone new
    right: Привіт! Звідки ти?
  - left: Emergency
    right: Допоможіть! Викличте швидку!
  - left: At the pharmacy
    right: Дайте, будь ласка, таблетки від головного болю.
  - left: Saying goodbye
    right: Дякую! До побачення!
- id: fill-in-tenses
  type: fill-in
  instruction: Вставте правильне слово (Fill in the correct word)
  items:
  - sentence: Зранку я ____ у кафе.
    answer: снідав
    options:
    - снідав
    - снідаю
    - буду снідати
  - sentence: Зараз я ____ по Хрещатику, тут дуже гарно!
    answer: гуляю
    options:
    - гуляв
    - гуляю
    - буду гуляти
  - sentence: Учора я ____ квиток на поїзд.
    answer: купив
    options:
    - купую
    - купив
    - буду купувати
  - sentence: Завтра я ____ по Україні.
    answer: буду подорожувати
    options:
    - подорожував
    - подорожую
    - буду подорожувати
  - sentence: Ввечері ми ____ в кіно.
    answer: ходили
    options:
    - ходимо
    - ходили
    - будемо ходити
  - sentence: Зараз Олена ____ борщ і салат.
    answer: замовляє
    options:
    - замовляла
    - замовляє
    - замовить
  - sentence: Учора була гарна погода, і ми ____ в парку.
    answer: гуляли
    options:
    - гуляємо
    - гуляли
    - будемо гуляти
  - sentence: Я вже ____ до рівня А2! Вітаю!
    answer: готовий
    options:
    - готовий
    - готова
    - готові
- id: quiz-a1-review
  type: quiz
  instruction: Оберіть правильний варіант (Choose the correct option)
  items:
  - question: How do you ask about the price of a ticket?
    options:
    - Скільки коштує квиток?
    - Де тут квиток?
    - Дайте один квиток.
    - Який це квиток?
    correct: 0
  - question: You are inviting a friend to a cafe. What do you say?
    options:
    - Я був у кафе.
    - Де кафе?
    - Це нове кафе.
    - Ходімо в кафе!
    correct: 3
  - question: How do you say 'My head hurts'?
    options:
    - У мене температура.
    - У мене болить голова.
    - Я хворий.
    - Мені треба в аптеку.
    correct: 1
  - question: Someone asks 'Де ви?'. How do you answer?
    options:
    - Мене звати Адам.
    - Я з Канади.
    - Я на вулиці Хрещатик.
    - Мені двадцять років.
    correct: 2
  - question: What tense is 'Завтра я буду читати книгу'?
    options:
    - Майбутній час (Future)
    - Минулий час (Past)
    - Теперішній час (Present)
    - Наказовий спосіб (Imperative)
    correct: 0
  - question: How do you congratulate someone in Ukrainian?
    options:
    - До побачення!
    - Дякую!
    - Вітаю!
    - Вибачте!
    correct: 2
workbook:
- id: anagram-vocab
  type: anagram
  instruction: Складіть слово з літер (Make a word from the letters)
  items:
  - letters:
    - к
    - р
    - у
    - а
    - с
    - а
    - н
    answer: круасан
    hint: croissant
  - letters:
    - ф
    - і
    - л
    - ь
    - м
    answer: фільм
    hint: film / movie
  - letters:
    - г
    - о
    - т
    - е
    - л
    - ь
    answer: готель
    hint: hotel
  - letters:
    - к
    - в
    - и
    - т
    - о
    - к
    answer: квиток
    hint: ticket
  - letters:
    - с
    - у
    - в
    - е
    - н
    - і
    - р
    answer: сувенір
    hint: souvenir
  - letters:
    - л
    - і
    - н
    - і
    - я
    answer: лінія
    hint: line
- id: group-sort-tenses
  type: group-sort
  instruction: Розподіліть слова за часом (Sort the words by tense)
  groups:
  - label: Минулий час (Past)
    items:
    - прокинувся
    - снідала
    - гуляли
  - label: Теперішній час (Present)
    items:
    - гуляю
    - замовляє
    - розумієш
  - label: Майбутній час (Future)
    items:
    - буду читати
    - будемо робити
    - буду подорожувати
- id: unjumble-sentences
  type: unjumble
  instruction: Складіть правильне речення зі слів (Make a correct sentence from the
    words)
  items:
