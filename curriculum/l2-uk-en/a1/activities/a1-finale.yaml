version: '1.0'
module: a1-finale
level: a1
inline:
- id: order-day-events
  type: order
  instruction: Розставте події в хронологічному порядку (Put the events of the day
    in chronological order)
  items:
  - Зранку я прокинувся в готелі.
  - Потім я снідав у кафе.
  - Після сніданку я їхав на метро в центр.
  - Я гуляв по місту і купив сувеніри.
  - Вдень я обідав з новою подругою Оленою.
  - Ввечері ми ходили в кіно.
  - Потім ми вечеряли в ресторані.
  - Вночі я повернувся в готель і відпочивав.
  correct_order:
  - 0
  - 1
  - 2
  - 3
  - 4
  - 5
  - 6
  - 7
- id: fill-in-tenses
  type: fill-in
  instruction: Вставте правильне слово (Insert the correct word)
  items:
  - sentence: _____ я снідав у кафе.
    answer: Зранку
    options:
    - Зранку
    - Завтра
    - Ввечері
  - sentence: Зараз я _____ по Хрещатику, тут дуже гарно!
    answer: гуляю
    options:
    - гуляю
    - гуляв
    - буду гуляти
  - sentence: Учора я _____ квиток на поїзд.
    answer: купив
    options:
    - купив
    - купую
    - буду купувати
  - sentence: Завтра я _____ по Україні.
    answer: буду подорожувати
    options:
    - буду подорожувати
    - подорожував
    - подорожую
  - sentence: Ввечері ми _____ в кіно.
    answer: ходили
    options:
    - ходили
    - ходимо
    - будемо ходити
  - sentence: Зараз Олена _____ борщ і салат.
    answer: замовляє
    options:
    - замовляє
    - замовляла
    - замовить
  - sentence: Учора була гарна погода, і ми _____ в парку.
    answer: гуляли
    options:
    - гуляли
    - гуляємо
    - будемо гуляти
  - sentence: Я вже _____ до рівня А2! Вітаю!
    answer: готовий
    options:
    - готовий
    - початок
    - сувенір
- id: match-survival-phrases
  type: match-up
  instruction: З'єднайте ситуацію з фразою (Match the situation to the correct phrase)
  pairs:
  - left: Ordering coffee
    right: Будь ласка, каву з молоком.
  - left: Asking for directions
    right: Вибачте, як дістатися до метро?
  - left: Buying a souvenir
    right: Скільки коштує ця вишиванка?
  - left: Meeting someone new
    right: Привіт! Звідки ти?
  - left: Emergency
    right: Допоможіть! Викличте швидку!
  - left: At the pharmacy
    right: Дайте, будь ласка, таблетки від головного болю.
  - left: Saying goodbye
    right: Дякую! До побачення!
- id: a1-grammar-quiz
  type: quiz
  instruction: Оберіть правильний варіант (Choose the correct option)
  items:
  - question: Як запитати про ціну квитка? (How do you ask about the price of a ticket?)
    options:
    - Скільки коштує квиток?
    - Де тут квиток?
    - Дайте один квиток.
    - Який це квиток?
    correct: 0
  - question: Ви запрошуєте друга в кафе. Що ви скажете? (You are inviting a friend
      to a cafe. What do you say?)
    options:
    - Ходімо в кафе!
    - Я був у кафе.
    - Де кафе?
    - Це кафе.
    correct: 0
  - question: Як сказати 'My head hurts'? (How do you say 'My head hurts'?)
    options:
    - У мене болить голова.
    - У мене температура.
    - Я хворий.
    - У мене є голова.
    correct: 0
  - question: Хтось питає 'Де ви?'. Як ви відповісте? (Someone asks 'Де ви?'. How
      do you answer?)
    options:
    - Я на вулиці Хрещатик.
    - Мене звати Адам.
    - Я з Канади.
    - Я йду туди.
    correct: 0
  - question: Який час у реченні 'Завтра я буду читати книгу'? (What tense is 'Завтра
      я буду читати книгу'?)
    options:
    - Майбутній час (Future)
    - Минулий час (Past)
    - Теперішній час (Present)
    - Немає часу (No tense)
    correct: 0
  - question: Як запитати про погоду? (How do you ask about the weather?)
    options:
    - Яка сьогодні погода?
    - Сьогодні тепло.
    - Де погода?
    - Що ти робиш?
    correct: 0
workbook:
- type: match-up
  instruction: З'єднайте українські слова з перекладом (Match Ukrainian words with
    their translation)
  pairs:
  - left: круасан
    right: croissant
  - left: карта
    right: map
  - left: фільм
    right: film
  - left: готель
    right: hotel
  - left: сувенір
    right: souvenir
  - left: квиток
    right: ticket
  - left: початок
    right: beginning
- type: odd-one-out
  instruction: Знайдіть четверте зайве (Find the odd one out)
  items:
  - words:
    - готель
    - кафе
    - ресторан
    - квиток
    correct: 3
    explanation: Квиток (ticket) is not a place, the others are places.
  - words:
    - снідати
    - обідати
    - вечеряти
    - сувенір
    correct: 3
    explanation: Сувенір (souvenir) is a noun, the others are verbs for eating.
  - words:
    - сьогодні
    - завтра
    - зранку
    - круасан
    correct: 3
    explanation: Круасан (croissant) is food, the others are time words.
  - words:
    - фільм
    - кіно
    - театр
    - вулиця
    correct: 3
    explanation: Вулиця (street) is not entertainment.
  - words:
    - мій
    - твоя
    - наш
    - готовий
    correct: 3
    explanation: Готовий (ready) is an adjective, the others are possessive pronouns.
  - words:
    - метро
    - автобус
    - таксі
    - карта
    correct: 3
    explanation: Карта (map) is not a form of transport.
