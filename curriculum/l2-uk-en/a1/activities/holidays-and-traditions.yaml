- type: quiz
  title: 'Українські традиції'
  instruction: 'Choose the correct answer about Ukrainian culture.'
  items:
    - question: 'Коли в Україні святкують Різдво за новим календарем?'
      explanation: 'Україна перейшла на новоюліанський календар, тому Різдво святкують 25 грудня.'
      options:
        - text: '25 грудня'
          correct: true
        - text: '7 січня'
          correct: false
        - text: '1 січня'
          correct: false
        - text: '14 лютого'
          correct: false
    - question: 'Скільки страв традиційно готують на Святвечір?'
      explanation: 'Традиція вимагає 12 пісних страв, що символізують 12 апостолів.'
      options:
        - text: '12'
          correct: true
        - text: '10'
          correct: false
        - text: '3'
          correct: false
        - text: '7'
          correct: false
    - question: 'Як називається головна різдвяна страва?'
      explanation: 'Кутя — це сакральна страва з пшениці, маку та меду.'
      options:
        - text: 'кутя'
          correct: true
        - text: 'борщ'
          correct: false
        - text: 'вареники'
          correct: false
        - text: 'сало'
          correct: false
    - question: 'Хто створив знамениту обробку «Щедрика»?'
      explanation: 'Микола Леонтович створив хорову обробку народної пісні, яка стала Carol of the Bells.'
      options:
        - text: 'Микола Леонтович'
          correct: true
        - text: 'Тарас Шевченко'
          correct: false
        - text: 'Леся Українка'
          correct: false
        - text: 'Іван Франко'
          correct: false
    - question: 'Скільки квіток треба дарувати живій людині?'
      explanation: 'На свята дарують лише непарну кількість квітів (3, 5, 7...).'
      options:
        - text: 'непарну кількість (3, 5...)'
          correct: true
        - text: 'парну кількість (2, 4...)'
          correct: false
        - text: 'рівно 10'
          correct: false
        - text: 'рівно 2'
          correct: false
    - question: 'Що традиційно роблять дитині на день народження?'
      explanation: 'В Україні є традиція тягнути іменинника за вуха, щоб він ріс великим.'
      options:
        - text: 'тягнуть за вуха'
          correct: true
        - text: 'стрижуть волосся'
          correct: false
        - text: 'обливають водою'
          correct: false
        - text: 'дарують сіль'
          correct: false
    - question: 'Що ми кажемо, коли піднімаємо келихи?'
      explanation: 'Традиційний український тост — «Будьмо!» (Let us be / Cheers).'
      options:
        - text: 'Будьмо!'
          correct: true
        - text: 'Смачного!'
          correct: false
        - text: 'Вітаю!'
          correct: false
        - text: 'Гірко!'
          correct: false
    - question: 'Чи можна дарувати ножі в Україні?'
      explanation: 'Забобон каже, що гострі предмети приносять сварку. Краще взяти за них символічну монету.'
      options:
        - text: 'краще не дарувати (або взяти монету)'
          correct: true
        - text: 'так, це найкращий подарунок'
          correct: false
        - text: 'тільки на весілля'
          correct: false
        - text: 'тільки чоловікам'
          correct: false

- type: fill-in
  title: 'Граматика вітань'
  instruction: 'Complete the greetings with the correct Instrumental case ending.'
  items:
    - sentence: 'Вітаю з Новим {{answer}}!'
      answer: 'роком'
      options: ['роком', 'рік', 'року', 'роки']
      explanation: 'Instrumental case: рік -> роком.'
    - sentence: 'Вітаю з {{answer}}!'
      answer: 'Різдвом'
      options: ['Різдвом', 'Різдво', 'Різдва', 'Різдву']
      explanation: 'Instrumental case: Різдво -> Різдвом.'
    - sentence: 'Вітаю з {{answer}}!'
      answer: 'Великоднем'
      options: ['Великоднем', 'Великдень', 'Великодня', 'великий']
      explanation: 'Instrumental case: Великдень -> Великоднем.'
    - sentence: 'Вітаю зі {{answer}}!'
      answer: 'святом'
      options: ['святом', 'свято', 'свята', 'свят']
      explanation: 'Instrumental case: свято -> святом.'
    - sentence: 'Вітаю з днем {{answer}}!'
      answer: 'народження'
      options: ['народження', 'народжувати', 'народ', 'день']
      explanation: 'Fixed phrase: День народження (Genitive used inside the name).'
    - sentence: 'Вітаю з {{answer}}!'
      answer: 'іменинами'
      options: ['іменинами', 'іменини', 'іменин', 'іменинам']
      explanation: 'Instrumental case: іменини -> іменинами.'
    - sentence: 'Вітаю з Днем {{answer}}!'
      answer: 'ангела'
      options: ['ангела', 'ангел', 'ангелом', 'ангели']
      explanation: 'Genitive case inside the phrase: Day of Angel.'
    - sentence: 'Вітаю з {{answer}}!'
      answer: 'перемогою'
      options: ['перемогою', 'перемога', 'перемоги', 'перемогу']
      explanation: 'Instrumental case: перемога -> перемогою.'

- type: fill-in
  title: 'Найкращі побажання'
  instruction: 'Complete the wishes using the correct Genitive form.'
  items:
