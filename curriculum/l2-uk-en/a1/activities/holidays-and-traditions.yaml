- type: group-sort
  title: 'Граматика: З чи Бажаю?'
  instruction: 'Sort the words based on whether they follow "З" (Instrumental) or "Бажаю" (Genitive).'
  groups:
    - name: 'З ... (Орудний)'
      items: ['Новим роком', 'Різдвом', 'святом', 'Великоднем', 'Днем народження', 'Днем ангела']
    - name: 'Бажаю ... (Родовий)'
      items: ['щастя', 'здоров''я', 'успіху', 'любові', 'миру', 'добра', 'достатку', 'натхнення']

- type: true-false
  title: 'Правда чи ні?'
  instruction: 'Decide if the statement about traditions is true or false.'
  items:
    - statement: 'На Святвечір традиційно готують 10 страв.'
      correct: false
      explanation: 'На Святвечір готують 12 страв.'
    - statement: '«Щедрик» — це українська народна пісня.'
      correct: true
      explanation: 'Так, це українська щедрівка в обробці Леонтовича.'
    - statement: 'На свято можна дарувати парну кількість квітів (2, 4, 6).'
      correct: false
      explanation: 'Парну кількість квітів приносять тільки на похорон.'
    - statement: 'Різдво в Україні святкують 25 грудня.'
      correct: true
      explanation: 'Україна перейшла на новоюліанський календар.'
    - statement: 'Тягнути за вуха — це традиція на Новий рік.'
      correct: false
      explanation: 'Це традиція на день народження.'
    - statement: 'Кутя — це головна страва на Великдень.'
      correct: false
      explanation: 'Кутя — це головна страва на Різдво (Святвечір). Паска — на Великдень.'
    - statement: 'Новий рік в Україні святкують влітку.'
      correct: false
      explanation: 'Новий рік — це зимове свято (1 січня).'
    - statement: 'Святий Миколай приносить подарунки 6 грудня.'
      correct: true
      explanation: 'Так, за новим календарем День Святого Миколая — 6 грудня.'

