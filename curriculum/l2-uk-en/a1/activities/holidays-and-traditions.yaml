- type: fill-in
  title: 'Заповніть діалог'
  instruction: 'Complete the conversation using the correct words.'
  items:
    - sentence: 'Дорога Олено, {{answer}} з днем народження!'
      answer: 'вітаю'
      options: ['вітаю', 'бажаю', 'дарую', 'кажу']
      explanation: 'Formula: Вітаю з...'
    - sentence: '{{answer}} тобі радості і тепла.'
      answer: 'Бажаю'
      options: ['Бажаю', 'Вітаю', 'Дякую', 'Роблю']
      explanation: 'Formula: Бажаю + Genitive.'
    - sentence: 'Це {{answer}} подарунок для тебе.'
      answer: 'маленький'
      options: ['маленький', 'маленька', 'маленьке', 'маленькі']
      explanation: 'Adjective must match masculine gender of "подарунок".'
    - sentence: 'Ой, {{answer}}! Це дуже приємно.'
      answer: 'дякую'
      options: ['дякую', 'прошу', 'вітаю', 'вибач']
      explanation: 'Polite response to a gift.'
    - sentence: 'Сподіваюся, тобі {{answer}}.'
      answer: 'сподобається'
      options: ['сподобається', 'сподобався', 'любить', 'хоче']
      explanation: 'Fixed phrase: I hope you will like it.'
    - sentence: 'Ти найкращий {{answer}}!'
      answer: 'друг'
      options: ['друг', 'свято', 'день', 'рік']
      explanation: 'Context: You are the best friend.'