  instruction: Оберіть правильне слово для заповнення пропуску.
- type: quiz
  title: Формат адреси та анкети
  items:
  - question: Яке слово ми використовуємо в анкеті для чоловічого гендеру?
    options:
    - text: чоловіча
      correct: true
    - text: чоловік
      correct: false
    - text: хлопець
      correct: false
    - text: чоловічий
      correct: false
    explanation: В офіційних анкетах ми завжди використовуємо прикметник чоловіча
      (стать).
  - question: У якому форматі українці пишуть дату народження?
    options:
    - text: день, місяць, рік
      correct: true
    - text: місяць, день, рік
      correct: false
    - text: рік, місяць, день
      correct: false
    - text: рік, день, місяць
      correct: false
    explanation: Українці завжди починають з дня, потім місяць і рік.
  - question: Що означає абревіатура вул. на конверті?
    options:
    - text: вулиця
      correct: true
    - text: великий
      correct: false
    - text: вокзал
      correct: false
    - text: влітку
      correct: false
    explanation: Це стандартне скорочення для слова вулиця.
  - question: Що означає абревіатура буд. на конверті?
    options:
    - text: будинок
      correct: true
    - text: будувати
      correct: false
    - text: будь ласка
      correct: false
    - text: буддень
      correct: false
    explanation: Це стандартне скорочення для слова будинок.
  - question: Який відмінок ми використовуємо для поля Кому на конверті?
    options:
    - text: давальний
      correct: true
    - text: родовий
      correct: false
    - text: називний
      correct: false
    - text: знахідний
      correct: false
    explanation: Для одержувача (Кому) ми завжди використовуємо давальний відмінок.
  - question: Який відмінок ми використовуємо для поля Від кого?
    options:
    - text: родовий
      correct: true
    - text: давальний
      correct: false
    - text: місцевий
      correct: false
    - text: називний
      correct: false
    explanation: Для відправника (Від кого) ми використовуємо родовий відмінок.
  - question: Що обов'язково треба наклеїти на конверт?
    options:
    - text: марку
      correct: true
    - text: фотографію
      correct: false
    - text: анкету
      correct: false
    - text: листівку
      correct: false
    explanation: Без поштової марки ваш лист ніколи не полетить.
  - question: Яка правильна європейська структура української адреси?
    options:
    - text: ім'я, вулиця, місто, індекс
      correct: true
    - text: індекс, місто, вулиця, ім'я
      correct: false
    - text: місто, вулиця, ім'я, індекс
      correct: false
    - text: ім'я, місто, вулиця, індекс
      correct: false
    explanation: 'Ми пишемо інформацію від малого до великого: людина, вулиця, місто,
      індекс.'
  instruction: Оберіть правильну відповідь.
- type: unjumble
  title: Складіть речення для листівки
  items:
