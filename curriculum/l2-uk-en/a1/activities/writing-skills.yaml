- type: quiz
  title: Правила написання текстів
  items:
  - question: Як правильно написати привітання з міста Львів?
    options:
    - text: Привіт зі Львова!
      correct: true
    - text: Привіт з Львова!
      correct: false
    - text: Привіт Львів!
      correct: false
    - text: Привіт у Львові!
      correct: false
    explanation: Для милозвучності ми використовуємо форму зі Львова.
  - question: Яке перше поле у стандартній українській анкеті?
    options:
    - text: прізвище
      correct: true
    - text: ім'я
      correct: false
    - text: дата народження
      correct: false
    - text: по батькові
      correct: false
    explanation: Спочатку ви завжди пишете своє прізвище.
  - question: Від чийого імені утворюється по батькові?
    options:
    - text: від імені батька
      correct: true
    - text: від імені дідуся
      correct: false
    - text: від прізвища
      correct: false
    - text: від назви міста
      correct: false
    explanation: По батькові утворюється від імені батька.
  - question: Як правильно сказати про свій вік?
    options:
    - text: Мені двадцять років
      correct: true
    - text: Я маю двадцять років
      correct: false
    - text: Я двадцять років
      correct: false
    - text: Мене двадцять років
      correct: false
    explanation: Ми ніколи не кажемо я маю роки, ми використовуємо давальний відмінок
      мені.
  - question: Яке слово часто пишуть наприкінці листівки для друзів?
    options:
    - text: бувай
      correct: true
    - text: привіт
      correct: false
    - text: мене звати
      correct: false
    - text: стать
      correct: false
    explanation: Ми використовуємо коротке слово бувай для дружнього прощання.
  - question: Що ми пишемо на конверті найпершим?
    options:
    - text: ім'я людини
      correct: true
    - text: назву міста
      correct: false
    - text: поштовий індекс
      correct: false
    - text: назву вулиці
      correct: false
    explanation: Українська адреса починається з імені людини.
