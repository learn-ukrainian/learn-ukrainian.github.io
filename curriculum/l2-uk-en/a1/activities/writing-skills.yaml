    - сьогодні
    answer: Погода чудова сьогодні
  - words:
    - Я
    - бачу
    - велику
    - річку
    answer: Я бачу велику річку
  - words:
    - Ми
    - багато
    - гуляємо
    - кожен
    - день
    answer: Ми багато гуляємо кожен день
  - words:
