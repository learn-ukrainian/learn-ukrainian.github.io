    - тут
    - дуже
    - подобається
    answer: Мені тут дуже подобається
  instruction: Розташуйте слова у правильному порядку.
- type: fill-in
  title: Розкажіть про себе
  items:
  - sentence: _____ звати Марк.
    answer: Мене
    options:
    - Мене
    - Я
    - Мені
    - Моє
    explanation: Ми використовуємо фразу мене звати.
  - sentence: _____ двадцять років.
    answer: Мені
    options:
    - Мені
    - Я
    - Мене
    - Моя
    explanation: Для віку ми обов'язково використовуємо давальний відмінок мені.
  - sentence: Я приїхав _____ Британії.
    answer: з
    options:
    - з
    - в
    - на
    - до
    explanation: Ми використовуємо прийменник з та родовий відмінок.
  - sentence: Я зараз _____ в університеті.
    answer: навчаюся
    options:
    - навчаюся
    - працюю
    - хобі
    - звати
    explanation: Університет — це місце для навчання.
  - sentence: Я _____ в банку.
    answer: працюю
    options:
    - працюю
    - навчаюся
    - люблю
    - бачу
    explanation: У банку люди працюють.
  - sentence: Моє _____ — фотографія.
    answer: хобі
    options:
    - хобі
    - спорт
    - робота
    - ім'я
    explanation: Фотографія — це популярне хобі.
