workbook:
- id: plural-match-up
  type: match-up
  instruction: З'єднайте форму однини з формою множини (Match the singular form to
    the plural form)
  pairs:
  - left: книга
    right: книги
  - left: вікно
    right: вікна
  - left: стіл
    right: столи
  - left: стілець
    right: стільці
  - left: дзеркало
    right: дзеркала
  - left: ручка
    right: ручки
- id: true-false-plurals
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Множина слова «стіл» — це «столи».
    correct: true
    explanation: Чоловічий рід з твердим приголосним зазвичай має закінчення -и.
  - statement: Множина слова «книга» — це «книгі».
    correct: false
    explanation: Правильна форма — «книги». Після «г», «к», «х» пишемо «и».
  - statement: Слово «вікна» — це однина.
    correct: false
    explanation: «Вікна» — це множина. Однина — «вікно».
  - statement: Слово «стільці» має закінчення -і.
    correct: true
    explanation: Чоловічий рід з м'яким приголосним («ь») змінюється на -і.
  - statement: Множина слова «ліжко» — це «ліжки».
    correct: false
    explanation: Середній рід на -о змінюється на -а. Правильно — «ліжка».
  - statement: Прикметники у множині завжди мають закінчення -і.
    correct: true
    explanation: 'Усі прикметники у множині (наприклад: нові, великі) мають закінчення
      -і.'
- id: plural-odd-one-out
  type: odd-one-out
  instruction: Знайдіть зайве слово (Find the odd one out)
  items:
  - words:
    - столи
    - зошити
    - книга
    correct: 2
    explanation: «Книга» — це однина, а «столи» і «зошити» — множина.
  - words:
    - нові
    - велика
    - старі
    correct: 1
    explanation: «Велика» — це однина (жіночий рід), а «нові» і «старі» — множина.
  - words:
    - вікна
    - ліжка
    - стільці
    correct: 2
    explanation: «Стильці» мають закінчення -і (чоловічий рід), а «вікна» і «ліжка»
      — закінчення -а (середній рід).
  - words:
    - ручка
    - лампи
    - сумки
    correct: 0
    explanation: «Ручка» — однина, інші слова — множина.
  - words:
    - ці
    - той
    - мої
    correct: 1
    explanation: «Той» — однина, інші — множина.
  - words:
    - речі
    - крісло
    - дзеркало
    correct: 0
    explanation: «Речі» — множина, інші — однина.
- id: plural-translate
  type: translate
  instruction: Оберіть правильний переклад (Choose the correct translation)
  items:
  - source: These tables are big.
    options:
    - text: Ці столи великі.
      correct: true
    - text: Цей столи великі.
      correct: false
    - text: Ці стіл великі.
      correct: false
    - text: Ці столи великий.
      correct: false
  - source: Those books are new.
    options:
    - text: Ті книги нові.
      correct: true
    - text: Ці книги нові.
      correct: false
    - text: Та книги нові.
      correct: false
    - text: Ті книга нові.
      correct: false
  - source: My pens are blue.
    options:
    - text: Мої ручки сині.
      correct: true
    - text: Мій ручки сині.
      correct: false
    - text: Мої ручка сині.
      correct: false
    - text: Мої ручки синя.
      correct: false
  - source: What kind of windows are these?
    options:
    - text: Які це вікна?
      correct: true
    - text: Яке це вікна?
      correct: false
    - text: Які це вікно?
      correct: false
    - text: Яка це вікна?
      correct: false
  - source: I have three notebooks.
    options:
    - text: Я маю три зошити.
      correct: true
    - text: Я маю три зошит.
      correct: false
    - text: Я маю три зошита.
      correct: false
    - text: Я маю три зошитів.
      correct: false
  - source: Where are the chairs?
    options:
    - text: Де стільці?
      correct: true
    - text: Де стілець?
      correct: false
    - text: Де стільця?
      correct: false
    - text: Де стільців?
      correct: false
- id: plural-error-correction
  type: error-correction
  instruction: Знайдіть і виправте помилку (Find and correct the error)
  items:
  - sentence: Це мої книгі.
    error: книгі
    correction: книги
    error_type: word
    options:
    - книга
    - книги
    - книг
    explanation: Після «г» у множині пишемо «и».
  - sentence: Там стоять великі стіл.
    error: стіл
    correction: столи
    error_type: word
    options:
    - столи
    - стола
    - столів
    explanation: Прикметник «великі» у множині, тому іменник теж має бути у множині.
  - sentence: Ці вікно дуже чисті.
    error: вікно
    correction: вікна
    error_type: word
    options:
    - вікна
    - вікні
    - вікнам
    explanation: «Ці» та «чисті» вказують на множину, тому слово «вікно» має бути
      «вікна».
  - sentence: Які це зошит?
    error: зошит
    correction: зошити
    error_type: word
    options:
    - зошити
    - зошита
    - зошиті
    explanation: Питальне слово «які» стоїть у множині, тому потрібно «зошити».
  - sentence: Це червоні ручка.
    error: ручка
    correction: ручки
    error_type: word
    options:
    - ручки
    - ручкі
    - ручку
    explanation: Прикметник «червоні» у множині.
  - sentence: Мої ліжко нові.
    error: ліжко
    correction: ліжка
    error_type: word
    options:
    - ліжка
    - ліжкі
    - ліжку
    explanation: «Мої» і «нові» — це множина, тому середній рід змінюється на -а.
