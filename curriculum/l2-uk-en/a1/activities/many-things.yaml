    - мої
    - зошити?
- id: true-false-plurals
  type: true-false
  instruction: Are these statements about plurals **правда** (true) or **ні** (false)?
  items:
  - statement: Слово «столи» — це однина (singular).
    correct: false
    explanation: «Столи» is plural. The singular is «стіл».
  - statement: «Книги» — це множина (plural).
    correct: true
    explanation: Yes, «книга» is singular, «книги» is plural.
  - statement: The plural of «вікно» is «вікни».
    correct: false
    explanation: The correct plural is «вікна».
  - statement: Plural adjectives usually end in -і (for example, великі, нові).
    correct: true
    explanation: Yes, for plural nouns, adjectives take the -і ending.
  - statement: The plural of «стілець» is «стільці».
    correct: true
    explanation: Yes, this word takes the -і ending in the plural.
  - statement: «Ці» means 'those' and «ті» means 'these'.
    correct: false
    explanation: 'The opposite: «ці» = these, «ті» = those.'
- id: group-sort-endings
  type: group-sort
  instruction: 'Sort the plural nouns by their ending: **-и**, **-а**, or **-і**.'
  groups:
  - label: Закінчення -и
    items:
    - столи
    - книги
    - зошити
  - label: Закінчення -а
    items:
    - вікна
    - крісла
    - ліжка
  - label: Закінчення -і
    items:
    - стільці
    - дні
    - речі
- id: fill-in-demonstratives
  type: fill-in
  instruction: 'Insert the correct word: **ці** (these) or **ті** (those).'
  items:
  - sentence: ____ столи тут.
    answer: Ці
    options:
    - Ці
    - Ті
  - sentence: ____ стільці там.
    answer: Ті
    options:
    - Ці
    - Ті
  - sentence: Я хочу ____ ручки тут.
    answer: ці
    options:
    - ці
    - ті
  - sentence: А де ____ книги там?
    answer: ті
    options:
    - ці
    - ті
  - sentence: ____ вікна тут чисті.
    answer: Ці
    options:
    - Ці
    - Ті
  - sentence: ____ зошити там нові.
    answer: Ті
    options:
    - Ці
    - Ті
- id: odd-one-out-plurals
  type: odd-one-out
  instruction: Find the odd word out based on singular/plural forms.
  items:
  - words:
    - стіл
    - книга
    - вікно
    - зошити
    correct: 3
    explanation: «Зошити» is plural, the other words are singular.
  - words:
    - великі
    - нові
    - чистий
    - старі
    correct: 2
    explanation: «Чистий» is singular, the other adjectives are plural.
  - words:
    - столи
    - книги
    - вікна
    - ручка
    correct: 3
    explanation: «Ручка» is singular, the other words are plural.
  - words:
    - вікна
    - крісла
    - дзеркала
    - столи
    correct: 3
    explanation: «Столи» has the -и ending, while the other words (neuter gender)
      have the -а ending in the plural.
  - words:
    - стільці
    - дні
    - речі
    - книги
    correct: 3
    explanation: «Книги» has the -и ending, while the other words have the -і ending.
  - words:
    - ці
    - ті
    - мої
    - велика
    correct: 3
    explanation: «Велика» is singular, while the other words are used for plurals.
