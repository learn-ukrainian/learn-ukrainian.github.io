workbook:
- type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: «Борщ» — це традиційний український суп.
    correct: true
    explanation: Борщ — це національна страва України, буряковий суп зі сметаною.
  - statement: «Сніданок» — це їжа ввечері.
    correct: false
    explanation: Сніданок — це ранкова їжа. Вечірня їжа — це вечеря.
  - statement: «Кава» — це гарячий напій.
    correct: true
    explanation: 'Кава належить до гарячих напоїв. Гарячі напої: кава, чай.'
  - statement: «Вареники» — це страва з тіста.
    correct: true
    explanation: 'Вареники — це страва з тіста з начинкою: картоплею, сиром або вишнею.'
  - statement: «Компот» — це алкогольний напій.
    correct: false
    explanation: Компот — це домашній безалкогольний напій із варених фруктів.
  - statement: «Обід» — це їжа вдень.
    correct: true
    explanation: 'Три прийоми їжі: сніданок (вранці), обід (вдень), вечеря (ввечері).'
  - statement: «Молоко» — це молочний напій.
    correct: true
    explanation: Молоко належить до молочних напоїв разом із кефіром.
