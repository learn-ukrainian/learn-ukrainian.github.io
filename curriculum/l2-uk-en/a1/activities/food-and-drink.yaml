- id: true-false-comprehension
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Борщ — це традиційний український суп.
    correct: true
    explanation: Борщ — національна страва України з буряком та овочами. UNESCO включив
      його до списку нематеріальної культурної спадщини.
  - statement: Вечерю ми їмо вранці.
    correct: false
    explanation: Вечерю ми їмо ввечері. Вранці — сніданок.
  - statement: Сніданок ми їмо вранці.
    correct: true
    explanation: Сніданок — вранці, обід — вдень, вечеря — ввечері.
  - statement: Компот — це традиційний напій з фруктів.
    correct: true
    explanation: Компот варять з вишні, яблук або слив з водою та цукром.
  - statement: Молоко — це напій.
    correct: true
    explanation: Молоко належить до молочних напоїв (молочні напої) разом із кефіром.
  - statement: Вареники — символ щасливого життя в українській культурі.
    correct: true
    explanation: 'У підручнику: «Вареники в українській культурі — символ заможного,
      щасливого життя.»'
  - statement: Хліб — це напій.
    correct: false
    explanation: 'Хліб — це їжа (food). Напій — це drink: вода, кава, сік.'
- id: anagram-food-words
  type: anagram
  instruction: Складіть слово з літер (Rearrange the letters to form a word)
  items:
  - letters:
    - о
    - р
    - щ
    - б
    answer: борщ
    hint: traditional Ukrainian beet soup
  - letters:
    - а
    - к
    - а
    - в
    answer: кава
    hint: coffee
  - letters:
    - о
    - л
    - о
    - м
    - к
    - о
    answer: молоко
    hint: milk
  - letters:
    - н
    - а
    - б
    - а
    - н
    answer: банан
    hint: banana
  - letters:
    - а
    - л
    - с
    - а
    - т
    answer: салат
    hint: salad
  - letters:
    - о
    - п
    - к
    - м
    - о
    - т
    answer: компот
    hint: traditional Ukrainian fruit drink
- id: odd-one-out-categories
  type: odd-one-out
  instruction: Знайдіть зайве слово (Find the word that doesn't belong)
  items:
  - words:
    - кава
    - чай
    - борщ
    - молоко
    correct: 2
    explanation: Борщ — це їжа (суп). Кава, чай і молоко — це напої.
  - words:
    - хліб
    - вода
    - каша
    - картопля
    correct: 1
    explanation: Вода — це напій. Хліб, каша і картопля — це їжа.
  - words:
    - борщ
    - сніданок
    - обід
    - вечеря
    correct: 0
    explanation: Борщ — це страва (dish). Сніданок, обід і вечеря — це прийоми їжі
      (meal times).
  - words:
    - яблуко
    - огірок
    - лимон
    - банан
    correct: 1
    explanation: Огірок — це овоч (vegetable). Яблуко, лимон і банан — це фрукти.
  - words:
    - кава
    - помідор
    - огірок
    - картопля
    correct: 0
    explanation: Кава — це напій (drink). Помідор, огірок і картопля — це овочі.
  - words:
    - сир
    - компот
    - масло
    - сметана
    correct: 1
    explanation: Компот — це напій з фруктів. Сир, масло і сметана — це молочні продукти
      (dairy).
