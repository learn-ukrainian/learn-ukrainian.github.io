version: '1.0'
module: food-and-drink
level: a1
inline:
- id: quiz-meals-dishes
  type: quiz
  instruction: Оберіть правильну відповідь (Choose the correct answer)
  items:
  - question: Що ми їмо вранці?
    options:
    - сніданок
    - обід
    - вечерю
    correct: 0
  - question: Що ми їмо ввечері?
    options:
    - вечерю
    - сніданок
    - обід
    correct: 0
  - question: Традиційний український суп — це...
    options:
    - борщ
    - каша
    - вода
    correct: 0
  - question: 'Українська страва з тіста і картоплі або сиру:'
    options:
    - вареники
    - сало
    - хліб
    correct: 0
  - question: 'Популярний холодний напій з фруктів:'
    options:
    - компот
    - борщ
    - кава
    correct: 0
  - question: Що ми їмо вдень?
    options:
    - обід
    - сніданок
    - вечерю
    correct: 0
- id: match-up-food-vocab
  type: match-up
  instruction: З'єднайте українські слова з англійським перекладом (Match Ukrainian
    words to their English translations)
  pairs:
  - left: хліб
    right: bread
  - left: м'ясо
    right: meat
  - left: риба
    right: fish
  - left: молоко
    right: milk
  - left: вода
    right: water
  - left: сік
    right: juice
  - left: сніданок
    right: breakfast
  - left: обід
    right: lunch
  - left: вечеря
    right: dinner
  - left: суп
    right: soup
- id: group-sort-food-drinks
  type: group-sort
  instruction: Розподіліть слова за категоріями (Categorize the words)
  groups:
  - label: Їжа
    items:
    - хліб
    - м'ясо
    - риба
    - суп
    - каша
  - label: Напої
    items:
    - кава
    - чай
    - вода
    - сік
    - молоко
- id: fill-in-chunks
  type: fill-in
  instruction: Вставте правильну фразу (Fill in the correct phrase)
  items:
  - sentence: Я хочу каву _____.
    answer: з молоком
    options:
    - з молоком
    - з цукром
    - з картоплею
  - sentence: Вона п'є чай _____.
    answer: з цукром
    options:
    - з цукром
    - з газом
    - з картоплею
  - sentence: Він їсть хліб _____.
    answer: з маслом
    options:
    - з маслом
    - з молоком
    - з цукром
  - sentence: Я люблю чай _____.
    answer: з лимоном
    options:
    - з лимоном
    - з газом
    - з маслом
  - sentence: Дайте, будь ласка, воду _____.
    answer: з газом
    options:
    - з газом
    - з лимоном
    - з молоком
  - sentence: Ми їмо м'ясо _____.
    answer: з картоплею
    options:
    - з картоплею
    - з цукром
    - з газом
workbook:
- id: divide-words-syllables
  type: divide-words
  instruction: Поділіть слова на склади (Divide words into syllables)
  items:
  - word: молоко
    answer: мо-ло-ко
  - word: яблуко
    answer: яб-лу-ко
  - word: вечеря
    answer: ве-че-ря
  - word: сніданок
    answer: сні-да-нок
  - word: картопля
    answer: кар-топ-ля
  - word: вареник
    answer: ва-ре-ник
- id: count-syllables-food
  type: count-syllables
  instruction: Скільки складів у слові? (How many syllables?)
  items:
  - word: хліб
    correct: 1
  - word: вода
    correct: 2
  - word: сир
    correct: 1
  - word: м'ясо
    correct: 2
  - word: кава
    correct: 2
  - word: помідор
    correct: 3
- id: odd-one-out-categories
  type: odd-one-out
  instruction: Оберіть зайве слово (Choose the odd one out)
  items:
  - words:
    - хліб
    - вода
    - каша
    - м'ясо
    correct: 1
    explanation: Вода — це напій, а не їжа.
  - words:
    - кава
    - чай
    - сік
    - салат
    correct: 3
    explanation: Салат — це їжа, а не напій.
  - words:
    - яблуко
    - банан
    - апельсин
    - картопля
    correct: 3
    explanation: Картопля — це овоч, а не фрукт.
  - words:
    - помідор
    - огірок
    - морква
    - курка
    correct: 3
    explanation: Курка — це м'ясо, а не овоч.
  - words:
    - молоко
    - сир
    - масло
    - хліб
    correct: 3
    explanation: Хліб — це не молочний продукт.
  - words:
    - сніданок
    - обід
    - вечеря
    - кава
    correct: 3
    explanation: Кава — це напій, а не прийом їжі.
- id: true-false-culture
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: В Україні традиційно їдять суп на сніданок.
    correct: false
    explanation: Суп, такий як борщ, зазвичай їдять на обід.
  - statement: Борщ — це важливий символ української кухні та культури.
    correct: true
    explanation: Борщ — це абсолютний національний символ України.
  - statement: Хліб — це традиційний знак гостинності в Україні.
    correct: true
    explanation: Так, хліб є майже з кожною їжею і є знаком гостинності.
  - statement: Сало — це популярний холодний напій.
    correct: false
    explanation: Сало — це їжа (cured pork fat), а не напій.
  - statement: Компот — це домашній напій з ягід або фруктів.
    correct: true
    explanation: Так, це дуже популярний традиційний солодкий напій.
  - statement: Обід — це їжа ввечері.
    correct: false
    explanation: Обід їдять вдень (у середині дня), а ввечері — вечерю.
- id: error-correction-cases
  type: error-correction
  instruction: Знайдіть і виправте помилку (Find and correct the error)
  items:
  - sentence: Я п'ю кава з молоком.
    error: кава
    correction: каву
    error_type: word
    options:
    - каву
    - каві
    - кавою
    explanation: 'Коли ви щось п''єте, потрібен знахідний відмінок (Accusative case):
      каву.'
  - sentence: Я люблю чай з лимон.
    error: лимон
    correction: лимоном
    error_type: word
    options:
    - лимоном
    - лимону
    - лимони
    explanation: 'Після ''з'' використовуємо орудний відмінок (Instrumental case):
      з лимоном.'
  - sentence: Ми їмо борщ з сметана.
    error: сметана
    correction: сметаною
    error_type: word
    options:
    - сметаною
    - сметану
    - сметані
    explanation: 'Після ''з'' для жіночого роду (сметана) закінчення -ою: зі сметаною.'
  - sentence: Що ти хочеш на сніданку?
    error: сніданку
    correction: сніданок
    error_type: word
    options:
    - сніданок
    - сніданком
    - сніданки
    explanation: Правильна фраза — 'на сніданок'.
  - sentence: Я хочу вода з газом.
    error: вода
    correction: воду
    error_type: word
    options:
    - воду
    - воді
    - водою
    explanation: 'Дієслово ''хочу'' тут вимагає знахідного відмінка: воду.'
  - sentence: Ввечері я їм обід.
    error: обід
    correction: вечерю
    error_type: word
    options:
    - вечерю
    - сніданок
    - сніданки
    explanation: Ввечері їдять вечерю, а обід — вдень.
- id: anagram-food-words
  type: anagram
  instruction: Складіть слово з літер (Rearrange letters to form the word)
  items:
  - letters:
    - х
    - л
    - і
    - б
    answer: хліб
    hint: bread
  - letters:
    - м
    - о
    - л
    - о
    - к
    - о
    answer: молоко
    hint: milk
  - letters:
    - я
    - б
    - л
    - у
    - к
    - о
    answer: яблуко
    hint: apple
  - letters:
    - м
    - ''''
    - я
    - с
    - о
    answer: м'ясо
    hint: meat
  - letters:
    - в
    - о
    - д
    - а
    answer: вода
    hint: water
  - letters:
    - б
    - о
    - р
    - щ
    answer: борщ
    hint: beet soup
