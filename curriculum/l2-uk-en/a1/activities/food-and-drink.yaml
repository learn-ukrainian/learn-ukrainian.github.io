- type: error-correction
  instruction: Знайдіть помилку і виправте (Find the error and correct it)
  items:
  - sentence: Борщ — це холодний напій.
    error: напій
    correction: суп
    error_type: word
    options:
    - суп
    - фрукт
    - хліб
    explanation: Борщ — це гарячий суп, не напій.
  - sentence: Вранці ми їмо вечерю.
    error: вечерю
    correction: сніданок
    error_type: word
    options:
    - сніданок
    - обід
    - компот
    explanation: Вранці ми їмо сніданок. Вечеря — це їжа ввечері.
  - sentence: Ми п'ємо вареники зі сметаною.
    error: п'ємо
    correction: їмо
    error_type: word
    options:
    - їмо
    - хочемо
    - любимо
    explanation: 'Вареники — це їжа, її їдять. П''ють напої: каву, чай, воду.'
  - sentence: Вдень ми їмо сніданок.
    error: сніданок
    correction: обід
    error_type: word
    options:
    - обід
    - вечерю
    - компот
    explanation: Вдень ми їмо обід. Сніданок — вранці, вечеря — ввечері.
  - sentence: Кефір — це алкогольний напій.
    error: алкогольний
    correction: молочний
    error_type: word
    options:
    - молочний
    - гарячий
    - холодний
    explanation: Кефір — це молочний напій. Алкогольні напої — пиво, вино.
  - sentence: Компот — це гарячий напій, як кава.
    error: гарячий
    correction: холодний
    error_type: word
    options:
    - холодний
    - молочний
    - солоний
    explanation: Компот — це холодний напій з фруктів. Гарячі напої — кава і чай.
