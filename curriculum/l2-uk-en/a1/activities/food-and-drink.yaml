version: '1.0'
module: food-and-drink
level: a1
inline:
- id: match-up-food-drink
  type: match-up
  instruction: З'єднайте українські слова з англійськими (Match Ukrainian words with
    English)
  pairs:
  - left: хліб
    right: bread
  - left: м'ясо
    right: meat
  - left: риба
    right: fish
  - left: молоко
    right: milk
  - left: вода
    right: water
  - left: сік
    right: juice
  - left: сніданок
    right: breakfast
  - left: обід
    right: lunch
  - left: вечеря
    right: dinner
  - left: суп
    right: soup
- id: fill-in-chunks
  type: fill-in
  instruction: Вставте правильне слово (Fill in the correct word)
  items:
  - sentence: Я хочу каву ____.
    answer: з молоком
    options:
    - з молоком
    - з цукром
    - з маслом
  - sentence: Вона п'є чай ____.
    answer: з цукром
    options:
    - з молоком
    - з цукром
    - з картоплею
  - sentence: Він їсть хліб ____.
    answer: з маслом
    options:
    - з маслом
    - з лимоном
    - з газом
  - sentence: Я люблю чай ____.
    answer: з лимоном
    options:
    - з лимоном
    - з маслом
    - з молоком
  - sentence: Дайте, будь ласка, воду ____.
    answer: з газом
    options:
    - з газом
    - з картоплею
    - з цукром
  - sentence: Ми їмо м'ясо ____.
    answer: з картоплею
    options:
    - з картоплею
    - з лимоном
    - з газом
- id: quiz-meals-dishes
  type: quiz
  instruction: Оберіть правильну відповідь (Choose the correct answer)
  items:
  - question: Що ми їмо вранці?
    options:
    - сніданок
    - обід
    - вечерю
    - компот
    correct: 0
  - question: Що ми їмо ввечері?
    options:
    - обід
    - сніданок
    - вечерю
    - салат
    correct: 2
  - question: Що ми їмо вдень?
    options:
    - сніданок
    - обід
    - вечерю
    - чай
    correct: 1
  - question: Традиційний український суп — це...
    options:
    - вода
    - каша
    - кава
    - борщ
    correct: 3
  - question: 'Українська страва з тіста і картоплі або сиру:'
    options:
    - сало
    - вареники
    - хліб
    - сік
    correct: 1
  - question: 'Популярний холодний напій з фруктів:'
    options:
    - борщ
    - кава
    - компот
    - суп
    correct: 2
workbook:
- id: unjumble-sentences
  type: unjumble
  instruction: Складіть правильне речення зі слів (Put the words in the correct order)
  items:
  - words:
    - хочеш
    - на
    - Що
    - сніданок?
    - ти
    correct_order:
    - Що
    - ти
    - хочеш
    - на
    - сніданок?
  - words:
    - каву
    - молоком.
    - хочу
    - Я
    - з
    correct_order:
    - Я
    - хочу
    - каву
    - з
    - молоком.
  - words:
    - смачний
    - суп.
    - Це
    - дуже
    correct_order:
    - Це
    - дуже
    - смачний
    - суп.
  - words:
    - будете
    - ви
    - пити?
    - Що
    correct_order:
    - Що
    - ви
    - будете
    - пити?
  - words:
    - чай
    - Вона
    - цукром.
    - п'є
    - з
    correct_order:
    - Вона
    - п'є
    - чай
    - з
    - цукром.
  - words:
    - ми
    - Увечері
    - разом.
    - вечеряємо
    correct_order:
    - Увечері
    - ми
    - вечеряємо
    - разом.
- id: true-false-meals
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Борщ — це український напій.
    correct: false
    explanation: Борщ — це традиційний суп (food), а не напій (drink).
  - statement: Компот — це гарячий напій з кави.
    correct: false
    explanation: Компот — це холодний напій з фруктів.
  - statement: Уранці ми зазвичай снідаємо.
    correct: true
    explanation: Так, сніданок — це ранкова їжа.
  - statement: Сало — це популярний десерт.
    correct: false
    explanation: Сало (cured pork fat) — це м'ясний продукт, а не десерт.
  - statement: Люди часто п'ють каву з молоком.
    correct: true
    explanation: Так, це дуже популярний напій.
  - statement: Обід — це наша вечеря.
    correct: false
    explanation: Обід (lunch) ми їмо вдень, а вечерю (dinner) — увечері.
- id: odd-one-out-food
  type: odd-one-out
  instruction: Знайдіть зайве слово (Find the odd one out)
  items:
  - words:
    - хліб
    - кава
    - чай
    - сік
    correct: 0
    explanation: Хліб — це їжа, а кава, чай і сік — це напої.
  - words:
    - яблуко
    - м'ясо
    - банан
    - апельсин
    correct: 1
    explanation: М'ясо — це не фрукт.
  - words:
    - сніданок
    - обід
    - вода
    - вечеря
    correct: 2
    explanation: Вода — це напій, а інші слова — це назви прийомів їжі (meals).
  - words:
    - картопля
    - помідор
    - огірок
    - молоко
    correct: 3
    explanation: Молоко — це напій/молочний продукт, а картопля, помідор і огірок
      — овочі.
  - words:
    - борщ
    - вода
    - суп
    - сало
    correct: 1
    explanation: Вода — це напій, а інші — це страви або їжа.
  - words:
    - сіль
    - сир
    - масло
    - сметана
    correct: 0
    explanation: Сіль — це спеція, а сир, масло і сметана — це молочні продукти (dairy).
- id: match-up-meals
  type: match-up
  instruction: З'єднайте запитання та відповіді (Match questions and answers)
  pairs:
  - left: Що ти їш на сніданок?
    right: Я їм яйце і сир.
  - left: Що ти хочеш пити?
    right: Воду з лимоном.
  - left: Що вона хоче їсти?
    right: Суп і хліб.
  - left: Що ви хочете на вечерю?
    right: Ми хочемо м'ясо.
  - left: Що вона їсть на обід?
    right: Вона їсть борщ.
  - left: Що ви будете пити?
    right: Дайте, будь ласка, каву.
- id: fill-in-vocab
  type: fill-in
  instruction: Вставте правильне слово (Fill in the correct word)
  items:
  - sentence: Я п'ю гарячий ____.
    answer: чай
    options:
    - чай
    - хліб
    - салат
  - sentence: Ми їмо свіжий ____.
    answer: хліб
    options:
    - хліб
    - суп
    - сік
  - sentence: Традиційний український суп — це ____.
    answer: борщ
    options:
    - борщ
    - компот
    - салат
  - sentence: Вона любить пити холодну ____.
    answer: воду
    options:
    - воду
    - каву
    - картоплю
  - sentence: На обід я їм суп і ____.
    answer: салат
    options:
    - салат
    - чай
    - сік
  - sentence: Цей ____ дуже смачний.
    answer: суп
    options:
    - суп
    - салат
    - хліб
