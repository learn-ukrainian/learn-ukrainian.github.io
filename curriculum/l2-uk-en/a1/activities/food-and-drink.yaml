version: '1.0'
module: food-and-drink
level: a1
inline:
- id: quiz-meals-dishes
  type: quiz
  instruction: Оберіть правильний варіант (Choose the correct option)
  items:
  - question: Що ми їмо вранці?
    options:
    - обід
    - сніданок
    - вечерю
    correct: 1
  - question: Що ми їмо ввечері?
    options:
    - сніданок
    - обід
    - вечерю
    correct: 2
  - question: Традиційний український суп — це...
    options:
    - каша
    - борщ
    - вода
    correct: 1
  - question: 'Українська страва з тіста і картоплі або сиру:'
    options:
    - сало
    - хліб
    - вареники
    correct: 2
  - question: 'Популярний холодний напій з фруктів:'
    options:
    - борщ
    - компот
    - кава
    correct: 1
  - question: Що ми їмо вдень?
    options:
    - сніданок
    - вечерю
    - обід
    correct: 2
- id: fill-in-z-chunks
  type: fill-in
  instruction: Вставте правильний вираз (Fill in the correct phrase)
  items:
  - sentence: Я хочу каву ____.
    answer: з молоком
    options:
    - з молоком
    - з цукром
    - з газом
  - sentence: Вона п'є чай ____.
    answer: з цукром
    options:
    - з маслом
    - з цукром
    - з лимоном
  - sentence: Він їсть хліб ____.
    answer: з маслом
    options:
    - з молоком
    - з картоплею
    - з маслом
  - sentence: Я люблю чай ____.
    answer: з лимоном
    options:
    - з лимоном
    - з газом
    - з цукром
  - sentence: Дайте, будь ласка, воду ____.
    answer: з газом
    options:
    - з молоком
    - з газом
    - з лимоном
  - sentence: Ми їмо м'ясо ____.
    answer: з картоплею
    options:
    - з маслом
    - з картоплею
    - з цукром
- id: match-food-drink
  type: match-up
  instruction: З'єднайте українські слова з англійськими перекладами (Match Ukrainian
    words to English translations)
  pairs:
  - left: хліб
    right: bread
  - left: м'ясо
    right: meat
  - left: риба
    right: fish
  - left: молоко
    right: milk
  - left: вода
    right: water
  - left: сік
    right: juice
  - left: сніданок
    right: breakfast
  - left: обід
    right: lunch
  - left: вечеря
    right: dinner
  - left: суп
    right: soup
- id: group-sort-food-drinks
  type: group-sort
  instruction: Розподіліть слова за категоріями (Sort words into categories)
  groups:
  - label: Їжа (Food)
    items:
    - хліб
    - м'ясо
    - риба
    - суп
    - каша
  - label: Напої (Drinks)
    items:
    - кава
    - чай
    - вода
    - сік
    - молоко
workbook:
- id: match-extended-vocab
  type: match-up
