- id: odd-one-out-verbs
  type: odd-one-out
  instruction: Find the word that doesn't belong
  items:
  - words:
    - читаю
    - знаю
    - працюєш
    correct: 2
    explanation: '''працюєш'' is for ''ти'', the others are for ''я''.'
  - words:
    - слухає
    - готує
    - гуляю
    correct: 2
    explanation: '''гуляю'' is for ''я'', the others are for ''він/вона''.'
  - words:
    - знаєш
    - гуляєш
    - читає
    correct: 2
    explanation: '''читає'' is for ''він/вона'', the others are for ''ти''.'
  - words:
    - книга
    - вечеря
    - читати
    correct: 2
    explanation: '''читати'' is a verb, the others are nouns.'
  - words:
    - я
    - він
    - читаю
    correct: 2
    explanation: '''читаю'' is a verb, the others are pronouns.'
  - words:
    - працювати
    - готувати
    - слухаю
    correct: 2
    explanation: '''слухаю'' is a conjugated verb, the others are infinitives.'
