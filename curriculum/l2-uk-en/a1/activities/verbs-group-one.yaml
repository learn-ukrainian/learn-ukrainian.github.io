- id: true-false-conjugation
  type: true-false
  instruction: True or False? Evaluate the statements about verbs
  items:
  - statement: The verb 'читати' is correct for 'Я читати'.
    correct: false
    explanation: 'You must conjugate it: ''Я читаю''.'
  - statement: The ending '-єш' is used for 'ти' (you).
    correct: true
    explanation: Yes, 'ти' always takes '-єш' in Group I.
  - statement: The ending '-є' is used for 'я' (I).
    correct: false
    explanation: '''Я'' takes ''-ю'', while ''-є'' is for ''він/вона''.'
  - statement: To say 'I am reading', you must add 'є' (to be) and say 'Я є читаю'.
    correct: false
    explanation: No, the present tense verb already means 'am doing'. Just say 'Я
      читаю'.
  - statement: The verb 'працювати' becomes 'я працюю'.
    correct: true
    explanation: Verbs ending in '-ювати' drop '-ва-' when conjugated.
  - statement: In Ukrainian, you can drop the pronoun 'я' and just say 'Працюю'.
    correct: true
    explanation: Yes, the '-ю' ending makes it clear that the subject is 'I'.
