version: '1.0'
module: verbs-group-one
level: a1
inline:
- id: match-up-person-verb
  type: match-up
  instruction: З'єднайте займенник із дієсловом (Match pronoun to verb form)
  pairs:
  - left: я
    right: працюю
  - left: ти
    right: знаєш
  - left: він
    right: читає
  - left: ми
    right: готуємо
  - left: ви
    right: слухаєте
  - left: вони
    right: гуляють
- id: fill-in-conjugation-drill
  type: fill-in
  instruction: Вставте правильну форму дієслова (Type the correct verb form)
  items:
  - sentence: Я (читати) ____ книгу.
    answer: читаю
  - sentence: Ти (знати) ____ правду.
    answer: знаєш
  - sentence: Він (працювати) ____ в офісі.
    answer: працює
  - sentence: Вона (слухати) ____ музику.
    answer: слухає
  - sentence: Ми (гуляти) ____ в парку.
    answer: гуляємо
  - sentence: Ви (готувати) ____ вечерю.
    answer: готуєте
  - sentence: Вони (читати) ____.
    answer: читають
  - sentence: Я (готувати) ____.
    answer: готую
  - sentence: Ти (гуляти) ____.
    answer: гуляєш
  - sentence: Він (знати) ____.
    answer: знає
- id: quiz-subject-verb-agreement
  type: quiz
  instruction: Оберіть правильну форму дієслова (Choose the correct verb form)
  items:
  - question: Вона _____ книгу.
    options:
    - читаю
    - читаєш
    - читає
    - читаємо
    correct: 2
  - question: Ти _____ вечерю.
    options:
    - готую
    - готує
    - готують
    - готуєш
    correct: 3
  - question: Я _____ українську.
    options:
    - вивчаю
    - вивчаєш
    - вивчають
    - вивчає
    correct: 0
  - question: Ми _____ разом.
    options:
    - працюю
    - працюють
    - працюєте
    - працюємо
    correct: 3
  - question: Ви _____ музику.
    options:
    - слухаєте
    - слухаєш
    - слухаю
    - слухає
    correct: 0
  - question: Вони _____ в парку.
    options:
    - гуляєте
    - гуляємо
    - гуляю
    - гуляють
    correct: 3
  - question: Він _____ правду.
    options:
    - знаєш
    - знають
    - знає
    - знаю
    correct: 2
  - question: Сашко _____.
    options:
    - малюю
    - малює
    - малюємо
    - малюють
    correct: 1
- id: fill-in-complete-sentence
  type: fill-in
  instruction: Вставте правильне дієслово (Complete the sentence)
  items:
  - sentence: Що ти робиш? — Я ____ музику.
    answer: слухаю
    options:
    - слухаю
    - слухаєш
    - слухає
    - слухають
  - sentence: Що вона робить? — Вона ____ вечерю.
    answer: готує
    options:
    - готуєш
    - готує
    - готують
    - готуємо
  - sentence: Що ви робите? — Ми ____ книгу.
    answer: читаємо
    options:
    - читаємо
    - читаєте
    - читаю
    - читає
  - sentence: Що вони роблять? — Вони ____ в офісі.
    answer: працюють
    options:
    - працює
    - працюємо
    - працюєте
    - працюють
  - sentence: Що він робить? — Він ____ в парку.
    answer: гуляє
    options:
    - гуляю
    - гуляєш
    - гуляє
    - гуляють
  - sentence: Що ти робиш? — Я ____ українську.
    answer: вивчаю
    options:
    - вивчає
    - вивчаємо
    - вивчають
    - вивчаю
workbook:
- id: workbook-group-sort-pronouns
  type: group-sort
  instruction: Розподіліть займенники на однину та множину (Sort pronouns into singular
    and plural)
  groups:
  - label: Однина (Singular)
    items:
    - я
    - ти
    - він
    - вона
    - воно
  - label: Множина (Plural)
    items:
    - ми
    - ви
    - вони
- id: workbook-quiz-address
  type: quiz
  instruction: 'Оберіть правильне звертання (Choose the correct form: Ти чи Ви?)'
  items:
  - question: Анно, ____ працюєш в офісі?
    options:
    - ти
    - ви
    - ми
    - вони
    correct: 0
  - question: Сашко і Юля, ____ слухаєте музику?
    options:
    - ви
    - ти
    - ми
    - вони
    correct: 0
  - question: Максиме, що ____ робиш?
    options:
    - ти
    - ви
    - він
    - вона
    correct: 0
  - question: Олено, ____ готуєш вечерю?
    options:
    - ти
    - ви
    - вона
    - я
    correct: 0
  - question: Анно і Максиме, ____ гуляєте?
    options:
    - ви
    - ти
    - ми
    - вони
    correct: 0
  - question: Юлю, ____ читаєш книгу?
    options:
    - ти
    - ви
    - ми
    - вони
    correct: 0
- id: workbook-error-correction
  type: error-correction
  instruction: Знайдіть і виправте помилку (Find and fix the mistake)
  items:
  - sentence: Я працюю, а ти працює.
    error: працює
    correction: працюєш
    error_type: word
    options:
    - працюю
    - працюєш
    - працюють
    explanation: For 'ти' (you singular), the ending is -єш.
  - sentence: Вона читаю нову книгу.
    error: читаю
    correction: читає
    error_type: word
    options:
    - читаєш
    - читає
    - читають
    explanation: For 'вона' (she), the ending is -є.
  - sentence: Ми гуляють в парку.
    error: гуляють
    correction: гуляємо
    error_type: word
    options:
    - гуляємо
    - гуляєте
    - гуляє
    explanation: For 'ми' (we), the ending is -ємо.
  - sentence: Ви слухаєш музику.
    error: слухаєш
    correction: слухаєте
    error_type: word
    options:
    - слухаєте
    - слухає
    - слухають
    explanation: For 'ви' (you plural/formal), the ending is -єте.
  - sentence: Вони знає правду.
    error: знає
    correction: знають
    error_type: word
    options:
    - знають
    - знаємо
    - знаєте
    explanation: For 'вони' (they), the ending is -ють.
  - sentence: Він готуєш вечерю.
    error: готуєш
    correction: готує
    error_type: word
    options:
    - готую
    - готує
    - готують
    explanation: For 'він' (he), the ending is -є.
- id: workbook-true-false
  type: true-false
  instruction: Правда чи ні? (True or False based on the dialogues)
  items:
  - statement: Юля готує вечерю.
    correct: true
    explanation: Юля says 'Я готую вечерю'.
  - statement: Сашко готує вечерю.
    correct: false
    explanation: Сашко says 'Я не готую. Я читаю'.
  - statement: Олена слухає музику.
    correct: true
    explanation: Сашко says 'Вона слухає музику'.
  - statement: Анна працює в офісі.
    correct: true
    explanation: Анна says 'Я працюю в офісі'.
  - statement: Максим працює в офісі.
    correct: false
    explanation: Максим says 'Я не працюю, я навчаюся'.
  - statement: Максим вивчає українську.
    correct: true
    explanation: Максим says 'Так, я вивчаю!'
- id: workbook-translate
  type: translate
  instruction: Оберіть правильний переклад (Choose the correct translation)
  items:
  - source: I am reading.
    options:
    - text: Я читаю.
      correct: true
    - text: Я є читаю.
      correct: false
    - text: Я читаєш.
      correct: false
  - source: She is cooking dinner.
    options:
    - text: Вона готує вечерю.
      correct: true
    - text: Вона є готує вечерю.
      correct: false
    - text: Вона готують вечерю.
      correct: false
  - source: We work together.
    options:
    - text: Ми працюємо разом.
      correct: true
    - text: Ми працюють разом.
      correct: false
    - text: Ми є працюємо разом.
      correct: false
  - source: They know the truth.
    options:
    - text: Вони знають правду.
      correct: true
    - text: Вони знає правду.
      correct: false
    - text: Вони є знають правду.
      correct: false
  - source: Do you know this song?
    options:
    - text: Ти знаєш цю пісню?
      correct: true
    - text: Ти знає цю пісню?
      correct: false
    - text: Ти є знаєш цю пісню?
      correct: false
  - source: What are you doing?
    options:
    - text: Що ти робиш?
      correct: true
    - text: Що ти робить?
      correct: false
    - text: Що ти роблять?
      correct: false
- id: workbook-order-dialogue
  type: order
  instruction: Розставте речення в правильному порядку (Put the sentences in order
    to make a dialogue)
  items:
  - Привіт! Що ти робиш?
  - Я готую вечерю. А ти?
  - Я не готую. Я читаю.
  - А що робить Олена?
  - Вона слухає музику.
  correct_order:
  - 0
  - 1
  - 2
  - 3
  - 4
