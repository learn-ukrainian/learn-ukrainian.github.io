- type: quiz
  title: "Швидкий тест: Прийменники"
  instruction: "Choose the correct preposition."
  items:
    - question: "До якої частини мови належить слово «через»?"
      explanation: "Слово через це прийменник."
      options:
        - text: "прийменник"
          correct: true
        - text: "іменник"
          correct: false
        - text: "дієслово"
          correct: false
        - text: "прикметник"
          correct: false
    - question: "Який прийменник використовуємо у фразі «фільм ... кохання»?"
      explanation: "Щоб вказати тему, використовуємо про."
      options:
        - text: "про"
          correct: true
        - text: "через"
          correct: false
        - text: "на"
          correct: false
        - text: "в"
          correct: false
    - question: "Як сказати англійською «я зроблю це за годину»?"
      explanation: "Це означає in an hour, мається на увазі час, потрібний для завершення."
      options:
        - text: "in an hour (duration)"
          correct: true
        - text: "for an hour"
          correct: false
        - text: "about an hour"
          correct: false
        - text: "behind an hour"
          correct: false
    - question: "Яке запитання підходить до відповіді «Я йду на концерт»?"
      explanation: "Ми питаємо куди, щоб дізнатися напрямок."
      options:
        - text: "Куди ти йдеш?"
          correct: true
        - text: "Де ти йдеш?"
          correct: false
        - text: "Звідки ти йдеш?"
          correct: false
        - text: "Хто йде?"
          correct: false
    - question: "Чому ми кажемо «ми йдемо через міст»?"
      explanation: "Прийменник через вказує на рух крізь простір або перетин перешкоди."
      options:
        - text: "Це рух через простір."
          correct: true
        - text: "Це час очікування."
          correct: false
        - text: "Це подяка."
          correct: false
        - text: "Це закрите приміщення."
          correct: false
    - question: "Який прийменник традиційно використовують зі словом «пошта»?"
      explanation: "Традиційно ми кажемо на пошту."
      options:
        - text: "на"
          correct: true
        - text: "в"
          correct: false
        - text: "через"
          correct: false
        - text: "за"
          correct: false

