    - scrambled: "п а р к"
      answer: "парк"
    - scrambled: "м о р е"
      answer: "море"
    - scrambled: "к в и т о к"
      answer: "квиток"
    - scrambled: "м і с т"
      answer: "міст"
    - scrambled: "л і с"
      answer: "ліс"

