- type: fill-in
  title: "Оберіть правильний прийменник"
  instruction: "Select the correct preposition of direction or time."
  items:
    - sentence: "Я іду _____ магазин."
      answer: "в"
      options:
        - "в"
        - "на"
        - "за"
        - "про"
    - sentence: "Ми їдемо _____ пошту."
      answer: "на"
      options:
        - "на"
        - "в"
        - "через"
        - "у"
    - sentence: "Дякую _____ допомогу!"
      answer: "за"
      options:
        - "за"
        - "через"
        - "на"
        - "про"
    - sentence: "Концерт почнеться _____ годину."
      answer: "через"
      options:
        - "через"
        - "за"
        - "в"
        - "на"
    - sentence: "Він прочитав книгу _____ тиждень."
      answer: "за"
      options:
        - "за"
        - "через"
        - "про"
        - "на"
    - sentence: "Це цікава книга _____ історію України."
      answer: "про"
      options:
        - "про"
        - "за"
        - "на"
        - "через"
    - sentence: "Студенти йдуть _____ стадіон."
      answer: "на"
      options:
        - "на"
        - "в"
        - "про"
        - "у"
    - sentence: "Ми гуляємо _____ парк."
      answer: "через"
      options:
        - "через"
        - "за"
        - "про"
        - "на"
    - sentence: "Вона їде _____ Київ."
      answer: "у"
      options:
        - "у"
        - "на"
        - "про"
        - "через"
    - sentence: "Про _____ ти думаєш?"
      answer: "що"
      options:
        - "що"
        - "хто"
        - "кого"
        - "де"

- type: quiz
  title: "Перевірте знання: Прийменники"
  instruction: "Choose the best answer for each question about prepositions."
  items:
    - question: "Який прийменник ми використовуємо для закритих приміщень?"
      explanation: "Для закритих приміщень (наприклад, магазин чи кімната) використовують в або у."
      options:
        - text: "в або у"
          correct: true
        - text: "на або за"
          correct: false
        - text: "про або через"
          correct: false
        - text: "за або через"
          correct: false
    - question: "Як правильно сказати, що ви йдете на відкриту територію?"
      explanation: "Для відкритих поверхонь, таких як площа чи стадіон, використовують на."
      options:
        - text: "Я йду на площу."
          correct: true
        - text: "Я йду в площу."
          correct: false
        - text: "Я йду за площу."
          correct: false
        - text: "Я йду через площу."
          correct: false
    - question: "Як правильно подякувати за щось українською мовою?"
      explanation: "Ми завжди говоримо «дякую за» плюс Знахідний відмінок."
      options:
        - text: "Дякую за каву."
          correct: true
        - text: "Дякую для кави."
          correct: false
        - text: "Дякую про каву."
          correct: false
        - text: "Дякую на каву."
          correct: false
    - question: "Що означає фраза «я зроблю це за годину»?"
      explanation: "За годину означає тривалість часу, необхідного для завершення дії."
      options:
        - text: "Це займе одну годину."
          correct: true
        - text: "Я почну через одну годину."
          correct: false
        - text: "Я робив це годину тому."
          correct: false
        - text: "Я чекав одну годину."
          correct: false
    - question: "Що означає фраза «концерт почнеться через годину»?"
      explanation: "Через годину означає, що подія відбудеться після того, як пройде година."
      options:
        - text: "Треба чекати одну годину."
          correct: true
        - text: "Концерт триває годину."
          correct: false
        - text: "Концерт був годину тому."
          correct: false
        - text: "Я граю на концерті."
          correct: false
    - question: "Який прийменник використовуємо для теми розмови?"
      explanation: "Щоб сказати, про що розмова, книга чи фільм, ми використовуємо про."
      options:
        - text: "Ми говоримо про роботу."
          correct: true
        - text: "Ми говоримо за роботу."
          correct: false
        - text: "Ми говоримо на роботу."
          correct: false
        - text: "Ми говоримо в роботу."
          correct: false
    - question: "Як правильно запитати, куди саме людина йде?"
      explanation: "Куди питає про напрямок руху."
      options:
        - text: "Куди ти йдеш?"
          correct: true
        - text: "Де ти йдеш?"
          correct: false
        - text: "Звідки ти йдеш?"
          correct: false
        - text: "Чому ти йдеш?"
          correct: false
    - question: "Чому ми кажемо «у Київ», а не «в Київ» після слова «їду»?"
      explanation: "Так звучить краще для нашої мови, щоб не було двох приголосних поруч."
      options:
        - text: "Для кращого звучання."
          correct: true
        - text: "Тому що Київ це велике місто."
          correct: false
        - text: "Тому що це правило для міст."
          correct: false
        - text: "Тому що це великий виняток."
          correct: false
    - question: "Яке речення вказує на перешкоду або причину із прийменником «через»?"
      explanation: "Через дощ показує причину, чому щось не відбулося або змінилося."
      options:
        - text: "Ми не йдемо через дощ."
          correct: true
        - text: "Ми не йдемо про дощ."
          correct: false
        - text: "Ми не йдемо в дощ."
          correct: false
        - text: "Ми не йдемо за дощ."
          correct: false
    - question: "Який прийменник традиційно використовується зі словом «пошта»?"
      explanation: "Традиційно ми кажемо на пошту, а не в пошту."
      options:
        - text: "на"
          correct: true
        - text: "в"
          correct: false
        - text: "у"
          correct: false
        - text: "через"
          correct: false

