- type: match-up
  title: "Match the Destination"
  instruction: "Match the Ukrainian phrase to its English meaning."
  pairs:
    - left: "в готель"
      right: "to the hotel"
    - left: "на вокзал"
      right: "to the train station"
    - left: "через міст"
      right: "across the bridge"
    - left: "про країну"
      right: "about the country"
    - left: "за квиток"
      right: "for the ticket"
    - left: "на море"
      right: "to the sea"
    - left: "в місто"
      right: "to the city"
    - left: "через ліс"
      right: "through the forest"

- type: fill-in
  title: "Choose the Right Preposition"
  instruction: "Select the correct preposition for each sentence."
  items:
    - sentence: "Я їду ___ місто."
      answer: "в"
      options: ["в", "на", "про", "через"]
    - sentence: "Ми йдемо ___ вокзал."
      answer: "на"
      options: ["у", "на", "за", "про"]
    - sentence: "Вона читає ___ країну."
      answer: "про"
      options: ["через", "на", "про", "у"]
    - sentence: "Вони йдуть ___ міст."
      answer: "через"
      options: ["через", "за", "про", "в"]
    - sentence: "Я дякую ___ екскурсію."
      answer: "за"
      options: ["за", "на", "через", "в"]
    - sentence: "Вони їдуть ___ море."
      answer: "на"
      options: ["на", "в", "про", "через"]
    - sentence: "Він іде ___ готель."
      answer: "в"
      options: ["на", "в", "за", "про"]
    - sentence: "Ми їдемо ___ ліс."
      answer: "через"
      options: ["через", "на", "про", "за"]

- type: group-sort
  title: "Where are we going? (В vs НА)"
  instruction: "Sort the destinations based on which preposition they take."
  groups:
    - name: "Use В (Inside / Enclosed)"
      items: ["готель", "парк", "місто", "ліс"]
    - name: "Use НА (Open space / Transport)"
      items: ["вокзал", "море", "екскурсію", "вулицю"]

- type: quiz
  title: "Travel Agent Check"
  instruction: "Choose the correct answer for each question."
  items:
    - question: "Which preposition would you use when going TO a closed building like a hotel (готель)?"
      explanation: "We use в for enclosed spaces."
      options:
        - text: "в"
          correct: true
        - text: "на"
          correct: false
        - text: "через"
          correct: false
        - text: "про"
          correct: false
    - question: "If a tourist is going TO the train station (вокзал), which preposition is correct?"
      explanation: "Transportation hubs typically take на."
      options:
        - text: "на"
          correct: true
        - text: "в"
          correct: false
        - text: "за"
          correct: false
        - text: "через"
          correct: false
    - question: "How do you say 'through the park' in Ukrainian?"
      explanation: "Через means through or across."
      options:
        - text: "через парк"
          correct: true
        - text: "в парк"
          correct: false
        - text: "на парк"
          correct: false
        - text: "про парк"
          correct: false
    - question: "Which phrase means 'about the city'?"
      explanation: "Про means about."
      options:
        - text: "про місто"
          correct: true
        - text: "за місто"
          correct: false
        - text: "через місто"
          correct: false
        - text: "в місто"
          correct: false
    - question: "Which preposition is used for exchanging something, like paying 'for a ticket'?"
      explanation: "За is used for exchange or thanking (for something)."
      options:
        - text: "за"
          correct: true
        - text: "про"
          correct: false
        - text: "на"
          correct: false
        - text: "через"
          correct: false
    - question: "What is the correct way to say 'to the sea'?"
      explanation: "We use на with море (sea)."
      options:
        - text: "на море"
          correct: true
        - text: "в море"
          correct: false
        - text: "за море"
          correct: false
        - text: "через море"
          correct: false
    - question: "Choose the correct translation for 'across the street'."
      explanation: "Через means across. Вулиця becomes вулицю in the accusative case."
      options:
        - text: "через вулицю"
          correct: true
        - text: "на вулицю"
          correct: false
        - text: "в вулицю"
          correct: false
        - text: "про вулицю"
          correct: false
    - question: "Which form is the accusative of країна?"
      explanation: "Feminine nouns ending in -а change to -у in the accusative."
      options:
        - text: "країну"
          correct: true
        - text: "країна"
          correct: false
        - text: "країні"
          correct: false
        - text: "країною"
          correct: false

- type: true-false
  title: "Travel Facts Check"
  instruction: "Decide if the statement is true or false."
  items:
    - statement: "We use the preposition НА with the word готель (hotel)."
      correct: false
      explanation: "Готель is a building, so we use В (в готель)."
    - statement: "The preposition ПРО translates to 'about' in English."
      correct: true
      explanation: "Про means about, for example, читати про країну (to read about the country)."
    - statement: "Feminine nouns ending in -а change to -у in the accusative case."
      correct: true
      explanation: "Yes, for example: країна becomes країну, вулиця becomes вулицю."
    - statement: "Inanimate masculine nouns change their endings in the accusative case."
      correct: false
      explanation: "Inanimate masculine nouns (like парк, вокзал) do not change in the accusative case."
    - statement: "To say 'through the forest', you say 'через ліс'."
      correct: true
      explanation: "Через means through, and ліс is an inanimate masculine noun, so it doesn't change."
    - statement: "We use the preposition В with the word вокзал (train station)."
      correct: false
      explanation: "For transportation hubs like вокзал, we use НА (на вокзал)."
    - statement: "The preposition ЗА is used when thanking someone FOR something."
      correct: true
      explanation: "Yes! For example: дякую за квиток (thank you for the ticket)."
    - statement: "Neuter nouns like місто and море change their endings in the accusative case."
      correct: false
      explanation: "Neuter nouns do not change in the accusative case."

- type: unjumble
  title: "Build the Travel Sentence"
  instruction: "Put the words in the correct order to form a sentence."
  items:
