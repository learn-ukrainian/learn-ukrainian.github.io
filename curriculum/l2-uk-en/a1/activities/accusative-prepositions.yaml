- type: unjumble
  title: "Складіть речення: Напрямок і час"
  instruction: "Put the words in the correct order to form a sentence."
  items:
    - words:
        - "я"
        - "магазин"
        - "в"
        - "іду"
      answer: "Я іду в магазин."
    - words:
        - "на"
        - "пошту"
        - "він"
        - "іде"
      answer: "Він іде на пошту."
    - words:
        - "допомогу"
        - "за"
        - "дякую"
        - "вам"
      answer: "Дякую вам за допомогу."
    - words:
        - "про"
        - "фільм"
        - "це"
        - "кохання"
      answer: "Це фільм про кохання."
    - words:
        - "годину"
        - "через"
        - "почнеться"
        - "концерт"
      answer: "Концерт почнеться через годину."
    - words:
        - "парк"
        - "ми"
        - "через"
        - "йдемо"
      answer: "Ми йдемо через парк."

- type: true-false
  title: "Правда чи неправда"
  instruction: "Determine if the statement about prepositions is true or false."
  items:
    - statement: "Для закритих просторів ми використовуємо прийменник на."
      correct: false
      explanation: "Для закритих просторів ми використовуємо в або у."
    - statement: "Ми говоримо дякую за, щоб висловити подяку."
      correct: true
      explanation: "Так, це правильна форма для вираження вдячності."
    - statement: "Фраза через годину означає тривалість роботи."
      correct: false
      explanation: "Через годину означає час очікування. Тривалість це за годину."
    - statement: "Слово пошта традиційно використовується з прийменником на."
      correct: true
      explanation: "Історично склалося так, що ми кажемо на пошту."
    - statement: "Прийменник про використовується для вказування напрямку."
      correct: false
      explanation: "Прийменник про використовується для теми розмови."
    - statement: "Фраза ми їдемо через міст означає рух крізь простір."
      correct: true
      explanation: "Так, через показує перетин або рух крізь перешкоду."

