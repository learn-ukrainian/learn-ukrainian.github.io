- type: match-up
  title: 'Знайдіть відповідність: Привітання та прощання'
  pairs:
  - left: Алло
    right: Hello (informal/neutral)
  - left: Слухаю
    right: I am listening (polite/professional)
  - left: До побачення
    right: Goodbye (formal)
  - left: Бувай
    right: Bye (informal)
  - left: До зв'язку
    right: Talk soon (modern)
  - left: Добрий день, слухаю
