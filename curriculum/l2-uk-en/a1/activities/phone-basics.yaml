  instruction: З'єднайте відповідні елементи.
- type: true-false
  title: Чи правильне твердження? (Етикет)
  items:
  - statement: You should use 'Алло' when answering a business call.
    correct: false
    explanation: For business calls, use the professional 'Слухаю'.
  - statement: Always use the formal 'Ви' with delivery couriers.
    correct: true
    explanation: Couriers are professionals; always use formal address with them.
  - statement: To say 'This is Olena' on the phone, say 'Я є Олена'.
    correct: false
    explanation: Never use 'Я є...'. Say 'Це Олена' or 'Олена слухає'.
  - statement: The letters 'дз' in 'дзвонити' are pronounced as one sound.
    correct: true
    explanation: It is an affricate, pronounced as a single smooth sound.
  - statement: '''До зв''язку!'' is a very old-fashioned way to end a call.'
    correct: false
    explanation: It is actually a very modern and popular way to say 'Talk soon!'.
  - statement: '''Зачекайте, будь ласка'' is a polite way to ask someone to wait.'
    correct: true
    explanation: It uses the formal imperative form '-те'.
  - statement: You can switch from 'Ви' to 'ти' with a stranger on the phone.
    correct: false
    explanation: Always use 'Ви' with strangers; only switch to 'ти' when invited.
  - statement: '''На все добре'' is a polite way to end a phone conversation.'
    correct: true
    explanation: It means 'All the best' and is a warm, polite closing.
  instruction: Визначте, чи твердження правильне.
