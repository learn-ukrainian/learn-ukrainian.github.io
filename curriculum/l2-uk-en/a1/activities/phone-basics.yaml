  instruction: З'єднайте відповідні елементи.
- type: true-false
  title: Чи правильне твердження? (Частина 2)
  items:
  - statement: When a courier calls, you should say 'Привіт, як ти?'.
    correct: false
    explanation: Always use the formal address with couriers, as it is a professional
      interaction.
  - statement: To say 'I will call back later', you can say 'Я передзвоню пізніше'.
    correct: true
    explanation: This is the standard and polite way to tell someone you will call
      them back.
  - statement: You can use 'До зв'язку!' to end a text message conversation.
    correct: true
    explanation: '''До зв''язку!'' is very popular for ending both phone calls and
      text messages.'
  - statement: '''Помилитися номером'' means to forget someone''s phone number.'
    correct: false
    explanation: 'It means ''to get the wrong number'' (literally: to make a mistake
      with the number).'
  - statement: If you want someone to wait, the formal command is 'Зачекайте'.
    correct: true
    explanation: The '-те' ending indicates the formal/plural imperative.
  - statement: To ask 'May I speak with Anna?', you say 'Чи можу я поговорити з Анною?'.
    correct: true
    explanation: This is a polite and direct way to ask for someone on the phone.
  - statement: '''Слухаю вас'' means ''I will call you back''.'
    correct: false
    explanation: '''Слухаю вас'' means ''I am listening to you'' — a professional
      phone greeting.'
  - statement: Telegram and Viber are popular messaging apps in Ukraine.
    correct: true
    explanation: These are the most common messaging platforms used in Ukraine.
  instruction: Визначте, чи твердження правильне.
- type: quiz
  title: 'Перевірте знання: Ситуації'
  items:
  - question: 'You answer the phone at an office. You say:'
    explanation: Use the professional greeting 'Слухаю'.
    options:
    - text: Добрий день, слухаю.
      correct: true
    - text: Алло! Хто це?
      correct: false
    - text: Це мій телефон.
      correct: false
    - text: Я є адміністратор.
      correct: false
  - question: 'A stranger asks for Oleh, but he is not here. You say:'
    explanation: Tell them politely they got the wrong number.
    options:
    - text: Тут немає Олега. Ви помилилися номером.
      correct: true
    - text: Олег зараз зайнятий.
      correct: false
    - text: Я передзвоню Олегу.
      correct: false
    - text: Зачекайте, будь ласка.
      correct: false
  - question: 'You need a moment during a call. You say:'
    explanation: Ask them politely to wait.
    options:
    - text: Зачекайте одну хвилинку.
      correct: true
    - text: Я помилився.
      correct: false
    - text: Повторіть, будь ласка.
      correct: false
    - text: До зв'язку!
      correct: false
  - question: 'The clinic line is busy. You hear:'
    explanation: The standard phrase is 'Лінія зайнята'.
    options:
    - text: Лінія зайнята.
      correct: true
    - text: Вона помилилася.
      correct: false
    - text: Залиште номер.
      correct: false
    - text: Це повідомлення.
      correct: false
  - question: 'The courier spoke too fast. You say:'
    explanation: Use the formal imperative 'Повторіть'.
    options:
    - text: Повторіть, будь ласка.
      correct: true
    - text: Слухаю вас.
      correct: false
    - text: Я зараз вийду.
      correct: false
    - text: Зачекайте.
      correct: false
  - question: How do you say 'This is David' on the phone?
    explanation: Avoid 'Я є...'. Use 'Це...'.
    options:
    - text: Це Девід.
      correct: true
    - text: Я є Девід.
      correct: false
    - text: Девід дзвонить.
      correct: false
    - text: Мій номер Девід.
      correct: false
  - question: Your friend calls. How do you greet them?
    explanation: Use informal 'Алло' or 'Привіт' with friends.
    options:
    - text: Привіт! Як ти?
      correct: true
    - text: Слухаю вас.
      correct: false
    - text: Що Ви хотіли?
      correct: false
    - text: Покличте директора.
      correct: false
  - question: How do you end a call with 'Talk soon'?
    explanation: '''До зв''язку!'' is the modern Ukrainian equivalent.'
    options:
    - text: До зв'язку!
      correct: true
    - text: Я помилився.
      correct: false
    - text: Лінія зайнята.
      correct: false
    - text: Алло!
      correct: false
  instruction: Оберіть правильну відповідь.
