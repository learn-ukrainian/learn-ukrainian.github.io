  instruction: Оберіть правильне слово для заповнення пропуску.
- type: quiz
  title: 'Оберіть правильну відповідь: Реакції'
  items:
  - question: How do you politely ask someone to repeat?
    explanation: Use the formal imperative 'Повторіть, будь ласка'.
    options:
    - text: Повторіть, будь ласка.
      correct: true
    - text: Повтори.
      correct: false
    - text: Я не слухаю.
      correct: false
    - text: Що Ви хотіли?
      correct: false
  - question: 'A courier says ''Я біля будинку''. You reply:'
    explanation: The correct phrase is 'Я зараз вийду'.
    options:
    - text: Я зараз вийду.
      correct: true
    - text: Я тут є.
      correct: false
    - text: Я чекаю.
      correct: false
    - text: Я помилився.
      correct: false
  - question: 'You dialed the wrong number. You say:'
    explanation: The standard phrase is 'Вибачте, я помилився номером'.
    options:
    - text: Вибачте, я помилився номером.
      correct: true
    - text: Це мій телефон.
      correct: false
    - text: Лінія зайнята.
      correct: false
    - text: Я передзвоню.
      correct: false
  - question: What does 'До зв'язку!' mean?
    explanation: It literally means 'Until the connection!' and is used to say 'Talk
      soon!'.
    options:
    - text: Talk soon!
      correct: true
    - text: Call me back!
      correct: false
    - text: Wrong number!
      correct: false
    - text: I am listening.
      correct: false
  - question: 'You want to leave a message for Anna. You ask:'
    explanation: Use 'Ви можете залишити повідомлення?' or 'Що передати?'.
    options:
    - text: Що передати Анні?
      correct: true
    - text: Де моя лінія?
      correct: false
    - text: Хто Ви є?
      correct: false
    - text: Це мій номер.
      correct: false
  - question: How do you answer a professional office call?
    explanation: Use the professional 'Слухаю' instead of 'Алло'.
    options:
    - text: Добрий день, слухаю.
      correct: true
    - text: Алло, хто це?
      correct: false
    - text: Це мій офіс.
      correct: false
    - text: Я є менеджер.
      correct: false
  - question: Which phrase is only for phone conversations?
    explanation: '''Алло'' is used exclusively on the phone, not in person.'
    options:
    - text: Алло!
      correct: true
    - text: Добрий день.
      correct: false
    - text: Привіт!
      correct: false
    - text: Як справи?
      correct: false
  - question: How do you say 'I will call back'?
    explanation: Use 'Я передзвоню' to promise a return call.
    options:
    - text: Я передзвоню.
      correct: true
    - text: Я помилився.
      correct: false
    - text: Я слухаю.
      correct: false
    - text: Я зачекаю.
      correct: false
  instruction: Оберіть правильну відповідь.
