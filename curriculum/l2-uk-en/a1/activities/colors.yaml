    - жовті
    - білі
    - сині
    correct: 0
  - question: Якого кольору лілії на ринку?
    options:
    - білі
    - чорні
    - зелені
    - сірі
    correct: 0
  - question: Якого кольору соняшники, які подобаються Наталці?
    options:
    - жовті
    - червоні
    - блакитні
    - рожеві
    correct: 0
  - question: Якого кольору ваза для квітів?
    options:
    - синя
    - червона
    - біла
    - зелена
    correct: 0
  - question: Якого кольору сукня Лізи?
    options:
    - чорна
    - біла
    - сіра
    - червона
    correct: 0
  - question: Якого кольору светр Лізи?
    options:
