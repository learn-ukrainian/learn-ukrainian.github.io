    - зелене
- type: match-up
  instruction: Match each object to its typical color.
  pairs:
  - left: сонце
    right: жовте
  - left: небо
    right: блакитне
  - left: кіт
    right: чорний
  - left: шоколад
    right: коричневий
  - left: стіна
    right: біла
  - left: море
    right: синє
  - left: яблуко
    right: зелене
  - left: апельсин
    right: помаранчевий
