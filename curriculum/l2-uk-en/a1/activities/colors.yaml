- type: true-false
  instruction: Read each statement. Is it **правда** (true) or **ні** (false)?
  items:
  - statement: Синій і блакитний — це один колір.
    correct: false
    explanation: В українській мові синій (dark blue) і блакитний (light blue) — це
      два різні кольори, як red і pink в англійській.
  - statement: Прапор України — синьо-жовтий.
    correct: true
    explanation: 'Так! Прапор — синьо-жовтий: синє — небо, жовте — жито (wheat).'
  - statement: Синій belongs to тверда група (-ий).
    correct: false
    explanation: 'Синій belongs to м''яка група (-ій/-я/-є). Compare: червоний/-а/-е
      (hard) vs. синій/-я/-є (soft).'
  - statement: Червона книга — correct because книга is feminine.
    correct: true
    explanation: 'Книга is feminine, so the color takes the -а ending: червона.'
  - statement: Голубий is the correct Ukrainian word for light blue.
    correct: false
    explanation: Голубий is a Russian-influenced form. The correct Ukrainian word
      for light blue is блакитний.
- type: error-correction
  instruction: Each sentence has a wrong color ending. Find and fix it!
  items:
  - sentence: Книга синій.
    error: синій
    correction: синя
    error_type: word
    options:
    - синя
    - синє
    - сині
    explanation: 'Книга is feminine — use the soft feminine form: синя (not синій,
      which is masculine).'
  - sentence: Вікно білий.
    error: білий
    correction: біле
    error_type: word
    options:
    - біла
    - біле
    - білі
    explanation: 'Вікно is neuter — use the neuter form: біле (not білий, which is
      masculine).'
  - sentence: Стіл червона.
    error: червона
    correction: червоний
    error_type: word
    options:
    - червоний
    - червоне
    - червоні
    explanation: 'Стіл is masculine — use the masculine form: червоний (not червона,
      which is feminine).'
  - sentence: Крісло сірий.
    error: сірий
    correction: сіре
    error_type: word
    options:
    - сіра
    - сіре
    - сірі
    explanation: 'Крісло is neuter — use the neuter form: сіре (not сірий, which is
      masculine).'
- type: group-sort
  instruction: Sort all twelve colors into **тверда група** (-ий/-а/-е) and **м'яка
    група** (-ій/-я/-є).
  groups:
  - label: Тверда група (-ий)
    items:
    - червоний
    - жовтий
    - зелений
    - білий
    - чорний
    - сірий
    - блакитний
    - коричневий
    - рожевий
    - помаранчевий
    - фіолетовий
  - label: М'яка група (-ій)
    items:
    - синій
