version: '1.0'
module: colors
level: a1
inline:
- id: quiz-color-match
  type: quiz
  instruction: Оберіть правильний колір (Choose the correct color)
  items:
  - question: Якого кольору троянда?
    options:
    - червона
    - чорна
    - зелена
    - сіра
    correct: 0
  - question: Якого кольору соняшник?
    options:
    - жовтий
    - синій
    - білий
    - фіолетовий
    correct: 0
  - question: Якого кольору лілія?
    options:
    - біла
    - зелена
    - чорна
    - коричнева
    correct: 0
  - question: Якого кольору сонце?
    options:
    - жовте
    - чорне
    - синє
    - зелене
    correct: 0
  - question: Якого кольору трава?
    options:
    - зелена
    - рожева
    - біла
    - сіра
    correct: 0
  - question: Якого кольору небо вночі?
    options:
    - синє
    - жовте
    - червоне
    - біле
    correct: 0
  - question: Якого кольору небо вдень?
    options:
    - блакитне
    - чорне
    - зелене
    - коричневе
    correct: 0
  - question: Якого кольору листя?
    options:
    - зелене
    - синє
    - біле
    - фіолетове
    correct: 0
- id: fill-in-gender-agreement
  type: fill-in
  instruction: Вставте правильну форму прикметника (Insert the correct adjective form)
  items:
  - sentence: Це ____ стіл.
    answer: чорний
    options:
    - чорний
    - чорна
    - чорне
    - чорні
  - sentence: Це ____ кімната.
    answer: біла
    options:
    - білий
    - біла
    - біле
    - білі
  - sentence: Тут є ____ вікно.
    answer: сіре
    options:
    - сірий
    - сіра
    - сіре
    - сірі
  - sentence: Там ____ крісло.
    answer: червоне
    options:
    - червоний
    - червона
    - червоне
    - червоні
  - sentence: Де ____ сукня?
    answer: жовта
    options:
    - жовтий
    - жовта
    - жовте
    - жовті
  - sentence: Який ____ светр!
    answer: рожевий
    options:
    - рожевий
    - рожева
    - рожеве
    - рожеві
  - sentence: У мене є ____ сумка.
    answer: зелена
    options:
    - зелений
    - зелена
    - зелене
    - зелені
  - sentence: Це ____ пальто.
    answer: коричневе
    options:
    - коричневий
    - коричнева
    - коричневе
    - коричневі
  - sentence: Тут є ____ лілії.
    answer: білі
    options:
    - білий
    - біла
    - біле
    - білі
  - sentence: Це ____ олівець.
    answer: помаранчевий
    options:
    - помаранчевий
    - помаранчева
    - помаранчеве
    - помаранчеві
- id: group-sort-hard-soft
  type: group-sort
  instruction: Розподіліть форми на тверду і м'яку групи (Sort forms into hard and
    soft groups)
  groups:
  - label: Тверда група (-ий, -а, -е, -і)
    items:
    - білий
    - чорна
    - червоне
    - зелені
    - жовтий
    - сіра
  - label: М'яка група (-ій, -я, -є, -і)
    items:
    - синій
    - синя
    - синє
    - сині
- id: quiz-blue-shade
  type: quiz
  instruction: 'Оберіть правильний відтінок: синій чи блакитний (Choose the right
    shade)'
  items:
  - question: Яке небо вдень?
    options:
    - блакитне
    - синє
    - блакитний
    - синій
    correct: 0
  - question: Яке глибоке море?
    options:
    - синє
    - блакитне
    - синій
    - блакитний
    correct: 0
  - question: Яке небо вночі?
    options:
    - синє
    - блакитне
    - синя
    - блакитна
    correct: 0
  - question: Яка верхня смуга прапора України?
    options:
    - синя
    - блакитна
    - синє
    - блакитне
    correct: 0
  - question: Світлий відтінок синього — це...
    options:
    - блакитний
    - синій
    - чорний
    - сірий
    correct: 0
  - question: Темний відтінок — це...
    options:
    - синій
    - блакитний
    - жовтий
    - білий
    correct: 0
workbook:
- id: match-up-colors
  type: match-up
  instruction: З'єднайте іменник із правильним прикметником (Match the noun with the
    correct adjective)
  pairs:
  - left: сонце
    right: жовте
  - left: троянда
    right: червона
  - left: кімната
    right: біла
  - left: олівець
    right: синій
  - left: трава
    right: зелена
  - left: черевики
    right: коричневі
- id: fill-in-pronouns
  type: fill-in
  instruction: Вставте правильний займенник (Insert the correct pronoun)
  items:
  - sentence: ____ кімната біла.
    answer: моя
    options:
    - мій
    - моя
    - моє
    - мої
  - sentence: ____ светр червоний.
    answer: мій
    options:
    - мій
    - моя
    - моє
    - мої
  - sentence: ____ вікно синє.
    answer: моє
    options:
    - мій
    - моя
    - моє
    - мої
  - sentence: ____ сумка коричнева.
    answer: моя
    options:
    - мій
    - моя
    - моє
    - мої
  - sentence: ____ крісло сіре.
    answer: моє
    options:
    - мій
    - моя
    - моє
    - мої
  - sentence: ____ черевики чорні.
    answer: мої
    options:
    - мій
    - моя
    - моє
    - мої
- id: error-correction-colors
  type: error-correction
  instruction: Знайдіть і виправте помилку в узгодженні (Find and fix the agreement
    error)
  items:
  - sentence: Це червоний сумка.
    error: червоний
    correction: червона
    error_type: word
    options:
    - червона
    - червоне
    - червоні
    explanation: Сумка is feminine, so it takes the ending -а (червона).
  - sentence: Тут стоїть синя стіл.
    error: синя
    correction: синій
    error_type: word
    options:
    - синій
    - синє
    - сині
    explanation: Стіл is masculine, so it takes the ending -ій (синій).
  - sentence: Моє светр дуже теплий.
    error: Моє
    correction: Мій
    error_type: word
    options:
    - Мій
    - Моя
    - Мої
    explanation: Светр is masculine, so it needs the masculine pronoun мій.
  - sentence: Мені подобається жовтий лілії.
    error: жовтий
    correction: жовті
    error_type: word
    options:
    - жовті
    - жовта
    - жовте
    explanation: Лілії is plural, so it takes the plural ending -і (жовті).
  - sentence: Де твоя зелений пальто?
    error: зелений
    correction: зелене
    error_type: word
    options:
    - зелене
    - зелена
    - зелені
    explanation: Пальто is neuter, so it takes the ending -е (зелене).
  - sentence: Яке гарне кімната!
    error: Яке
    correction: Яка
    error_type: word
    options:
    - Яка
    - Який
    - Які
    explanation: Кімната is feminine, so the question word is яка.
- id: unjumble-sentences
  type: unjumble
  instruction: Складіть правильне речення зі слів (Make a correct sentence out of
    the words)
  items:
  - words:
    - кольору
    - твоя
    - Якого
    - кімната?
    correct_order:
    - Якого
    - кольору
    - твоя
    - кімната?
  - words:
    - стіл
    - коричневий.
    - Мій
    correct_order:
    - Мій
    - стіл
    - коричневий.
  - words:
    - Де
    - чорна
    - моя
    - сукня?
    correct_order:
    - Де
    - моя
    - чорна
    - сукня?
  - words:
    - синя
    - подобається
    - Мені
    - ваза.
    correct_order:
    - Мені
    - подобається
    - синя
    - ваза.
  - words:
    - є
    - У
    - мене
    - светр.
    - білий
    correct_order:
    - У
    - мене
    - є
    - білий
    - светр.
  - words:
    - Яка
    - сумка!
    - гарна
    correct_order:
    - Яка
    - гарна
    - сумка!
- id: count-syllables-colors
  type: count-syllables
  instruction: Порахуйте склади в словах (Count the syllables in the words)
  items:
  - word: колір
    correct: 2
  - word: блакитний
    correct: 3
  - word: синій
    correct: 2
  - word: помаранчевий
    correct: 5
  - word: жовтий
    correct: 2
  - word: фіолетовий
    correct: 5
- id: true-false-colors
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Прапор України червоно-чорний.
    correct: false
    explanation: Прапор України синьо-жовтий.
  - statement: Троянди часто бувають червоні.
    correct: true
    explanation: Так, червоні троянди дуже популярні.
  - statement: Слово 'синій' — це світлий відтінок блакитного.
    correct: false
    explanation: Синій — це темний відтінок, а блакитний — світлий.
  - statement: Слово 'стіл' чоловічого роду, тому ми кажемо 'синій стіл'.
    correct: true
    explanation: Стіл — він (чоловічий рід).
  - statement: '''Зелена вікно'' — це правильно.'
    correct: false
    explanation: Вікно — воно, тому 'зелене вікно'.
  - statement: Слово 'небо' середнього роду.
    correct: true
    explanation: Закінчення -о означає середній рід (воно).
