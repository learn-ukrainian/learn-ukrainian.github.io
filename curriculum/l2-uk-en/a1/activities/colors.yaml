workbook:
- id: match-up-vocab
  type: match-up
  instruction: Match the words with their translation
  pairs:
  - left: чорний
    right: black
  - left: білий
    right: white
  - left: коричневий
    right: brown
  - left: рожевий
    right: pink
  - left: помаранчевий
    right: orange
  - left: фіолетовий
    right: purple
  - left: сірий
    right: grey
  - left: жовтий
    right: yellow
- id: true-false-grammar
  type: true-false
  instruction: True or False?
  items:
  - statement: Слово «синій» — це тверда група (hard stem).
    correct: false
    explanation: Слово «синій» belongs to the soft stem group (м'яка група).
  - statement: «Синій» і «блакитний» are two completely different colors in Ukrainian.
    correct: true
    explanation: Синій is dark blue, and блакитний is light blue.
  - statement: We say «біла кімната» because «кімната» is a feminine noun.
    correct: true
    explanation: Adjectives always agree with the gender of the noun.
  - statement: «Темно-зелений» means «light green».
    correct: false
    explanation: «Темно-» means dark. Light green is світло-зелений.
  - statement: «Червоне вікно» is the correct form for neuter gender.
    correct: true
    explanation: Вікно is neuter, so the adjective takes the -е ending.
  - statement: The correct form is «коричневий черевики».
    correct: false
    explanation: Черевики is plural, so it must be «коричневі черевики».
