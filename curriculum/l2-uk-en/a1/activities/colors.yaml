  instruction: 'Choose the correct shade of blue: **синій** (dark) or **блакитний**
    (light).'
  items:
  - question: Український прапор — ____-жовтий.
    options:
    - синьо
    - блакитно
    - темно
    - світло
    correct: 0
  - question: Колір вечірнього неба (evening sky) — це...
    options:
    - синій
    - блакитний
    - білий
    - сірий
    correct: 0
  - question: Колір ясного денного неба (clear afternoon sky) — це...
    options:
    - блакитний
    - синій
    - зелений
    - чорний
    correct: 0
  - question: Колір глибокого моря (deep sea) — це...
    options:
    - синій
    - блакитний
    - червоний
    - жовтий
    correct: 0
  - question: Колір мілкого озера (shallow lake) — це...
    options:
    - блакитний
    - синій
    - чорний
    - коричневий
    correct: 0
  - question: Англійське 'dark blue' перекладається як...
