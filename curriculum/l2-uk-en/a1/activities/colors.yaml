- id: wb-true-false
  type: true-false
  instruction: Read the statements about Ukrainian colors. Are they **правда** (true)
    or **ні** (false)?
  items:
  - statement: «Синій» means light blue.
    correct: false
    explanation: «Синій» is dark blue. Light blue is «блакитний».
  - statement: For brown eyes, you should say «коричневі очі».
    correct: false
    explanation: The correct fixed phrase for brown eyes is «карі очі».
  - statement: «Русяве волосся» means light-brown or blondish hair.
    correct: true
    explanation: This is the natural Ukrainian word for this hair color.
  - statement: «Синій» is the only color in the soft group at A1.
    correct: true
    explanation: It takes the soft endings -ій, -я, -є, -і.
  - statement: To say 'dark green', you say «темно-зелений».
    correct: true
    explanation: Compound shades are built with a hyphen.
  - statement: «Білий» belongs to the soft group.
    correct: false
    explanation: «Білий» belongs to the hard group, ending in -ий.
  title: Read the statements about Ukrainian colors. Are they **правда** (true) or
    **ні**
