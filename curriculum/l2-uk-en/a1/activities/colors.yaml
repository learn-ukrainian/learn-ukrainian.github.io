- id: odd-one-out-color-groups
  type: odd-one-out
  instruction: Find the word that does not belong in the group. (**Знайдіть зайве
    слово**)
  items:
  - words:
    - червоний
    - синій
    - жовтий
    - чорний
    correct: 1
    explanation: «Синій» belongs to the Soft group (**М'яка група**), the others belong
      to the Hard group (**Тверда група**).
  - words:
    - синя
    - червона
    - біла
    - зелене
    correct: 3
    explanation: «Зелене» is neuter gender (**середній рід**), the others are feminine
      (**жіночий рід**).
  - words:
    - стіл
    - светр
    - олівець
    - сукня
    correct: 3
    explanation: «Сукня» is feminine gender, the others are masculine (**чоловічий
      рід**).
  - words:
    - карі
    - коричневі
    - русяве
    - сиве
    correct: 1
    explanation: «Коричневі» is used for objects, the others are specific words for
      human appearance (eyes and hair).
  - words:
    - світло-синій
    - темно-синій
    - блакитний
    - червоний
    correct: 3
    explanation: All the other words are shades of blue.
  - words:
    - море
    - вікно
    - небо
    - ваза
    correct: 3
    explanation: «Ваза» is feminine gender, the others are neuter gender.
  title: Find the word that does not belong in the group. (**Знайдіть зайве слово**)
