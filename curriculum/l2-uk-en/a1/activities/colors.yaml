version: '1.0'
module: colors
level: a1
inline:
- id: fill-in-gender-agreement
  type: fill-in
  instruction: 'Fill in the correct color ending to match the noun''s gender. Remember:
    **-ий** (masculine), **-а** (feminine), **-е** (neuter).'
  items:
  - sentence: Автобус червон____.
    answer: червоний
    options:
    - червоний
    - червона
    - червоне
  - sentence: Квітка жовт____.
    answer: жовта
    options:
    - жовтий
    - жовта
    - жовте
  - sentence: Яблуко зелен____.
    answer: зелене
    options:
    - зелений
    - зелена
    - зелене
  - sentence: Стіна біл____.
    answer: біла
    options:
    - білий
    - біла
    - біле
  - sentence: Кіт чорн____.
    answer: чорний
    options:
    - чорний
    - чорна
    - чорне
  - sentence: Крісло сір____.
    answer: сіре
    options:
    - сірий
    - сіра
    - сіре
- id: group-sort-hard-soft
  type: group-sort
  instruction: Sort these color forms into **тверда група** (-ий/-а/-е) and **м'яка
    група** (-ій/-я/-є).
  groups:
  - label: Тверда група (-ий)
    items:
    - червоний
    - жовтий
    - зелений
    - білий
    - чорний
    - сірий
  - label: М'яка група (-ій)
    items:
    - синій
    - синя
    - синє
    - синього
- id: quiz-blue-shades
  type: quiz
  instruction: 'Choose the correct shade of blue: **синій** (dark blue) or **блакитний**
    (light blue)?'
  items:
  - question: Яке небо в сонячний день? — ____.
    options:
    - синє
    - блакитне
    - біле
    correct: 1
  - question: Яке море вночі? — ____.
    options:
    - блакитне
    - синє
    - чорне
    correct: 1
  - question: Прапор України — синьо-жовтий. Синій — це колір ____.
    options:
    - неба
    - моря
    - квітки
    correct: 0
  - question: Незабудки — це ____ квітки.
    options:
    - сині
    - блакитні
    - фіолетові
    correct: 1
  - question: Олівець темно-синій. Він ____.
    options:
    - блакитний
    - синій
    - сірий
    correct: 1
  - question: Якого кольору чисте небо вдень?
    options:
    - синього
    - блакитного
    - білого
    correct: 1
- id: quiz-object-colors
  type: quiz
  instruction: Choose the correct color for each object. Pay attention to gender agreement!
  items:
  - question: Шоколад ____.
    options:
    - коричневий
    - коричнева
    - коричневе
    correct: 0
  - question: Квітка ____.
    options:
    - рожевий
    - рожева
    - рожеве
    correct: 1
  - question: Апельсин ____.
    options:
    - помаранчева
    - помаранчеве
    - помаранчевий
    correct: 2
  - question: Сукня ____.
    options:
    - фіолетовий
    - фіолетова
    - фіолетове
    correct: 1
workbook:
