    options:
    - червоний
    - червона
    - червоне
  - sentence: ____ вікно (білий)
    answer: біле
    options:
    - білий
    - біла
    - біле
  - sentence: ____ шафа (коричневий)
    answer: коричнева
    options:
    - коричневий
    - коричнева
    - коричневе
  - sentence: ____ олівець (синій)
    answer: синій
    options:
    - синій
    - синя
    - синє
  - sentence: ____ небо (синій)
    answer: синє
    options:
    - синій
    - синя
    - синє
  - sentence: ____ крісло (чорний)
    answer: чорне
    options:
    - чорний
    - чорна
    - чорне
  - sentence: ____ квітка (жовтий)
    answer: жовта
    options:
    - жовтий
