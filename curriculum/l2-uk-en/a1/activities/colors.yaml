    пари**)
  pairs:
  - left: карі очі
    right: brown eyes
  - left: русяве волосся
    right: fair/light-brown hair
  - left: сиве волосся
    right: grey hair
  - left: чорне волосся
    right: black hair
  - left: сині очі
    right: dark blue eyes
  - left: зелені очі
    right: green eyes
  - left: блакитні очі
    right: light blue eyes
  title: Match the Ukrainian expression with its English meaning. (**З'єднайте пари**)
