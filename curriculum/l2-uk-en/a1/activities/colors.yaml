- id: true-false-color-grammar
  type: true-false
  instruction: Is the statement true or false? (**Правда чи ні?**)
  items:
  - statement: The word «синій» belongs to the Hard group (**Тверда група**).
    correct: false
    explanation: «Синій» belongs to the Soft group (**М'яка група**).
  - statement: 'Ukrainian has two different basic words for ''blue'': «синій» and
      «блакитний».'
    correct: true
    explanation: «Синій» is dark blue, and «блакитний» is light blue or sky blue.
  - statement: To say 'brown eyes', Ukrainians use the phrase «коричневі очі».
    correct: false
    explanation: For eyes, you must use the specific word «карі» (карі очі).
  - statement: The phrase «русяве волосся» means 'grey hair'.
    correct: false
    explanation: «Русяве волосся» means fair or light-brown hair. Grey hair is «сиве
      волосся».
  - statement: The colors «червоний», «жовтий», and «зелений» belong to the Hard group.
    correct: true
    explanation: 'They take the standard endings: -ий, -а, -е, -і.'
  - statement: Color adjectives do NOT need to match the gender of the noun.
    correct: false
    explanation: Colors must always agree with the noun (e.g., червоний стіл, червона
      книга).
  title: Is the statement true or false? (**Правда чи ні?**)
