    explanation: Біла is feminine, the others are masculine.
  - words:
    - синя
    - жовта
    - сіра
    - синє
    correct: 3
    explanation: Синє is neuter, the others are feminine.
  - words:
    - коричневе
    - рожевий
    - біле
    - чорне
    correct: 1
    explanation: Рожевий is masculine, the others are neuter.
  - words:
