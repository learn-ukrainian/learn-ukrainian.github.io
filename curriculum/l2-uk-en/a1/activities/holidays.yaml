version: '1.0'
module: holidays
level: a1
inline:
- id: quiz-which-holiday
  type: quiz
  instruction: Яке це свято? (Which holiday is this?)
  items:
  - question: Ми їмо кутю.
    options:
    - Різдво
    - Великдень
    - Новий рік
    - День Незалежності
    correct: 0
  - question: Ми малюємо писанки.
    options:
    - Великдень
    - Різдво
    - Новий рік
    - День Незалежності
    correct: 0
  - question: Ми дивимося парад і салют.
    options:
    - День Незалежності
    - Різдво
    - Великдень
    - Новий рік
    correct: 0
  - question: Діти співають колядки.
    options:
    - Різдво
    - Великдень
    - Новий рік
    - День Незалежності
    correct: 0
  - question: Удома стоїть висока зелена ялинка.
    options:
    - Новий рік
    - Великдень
    - Різдво
    - День Незалежності
    correct: 0
  - question: Ми святимо кошик і паску.
    options:
    - Великдень
    - Різдво
    - Новий рік
    - День Незалежності
    correct: 0
  - question: На столі стоять дванадцять страв.
    options:
    - Різдво
    - Великдень
    - Новий рік
    - День Незалежності
    correct: 0
  - question: 'Люди кажуть: «Христос воскрес!»'
    options:
    - Великдень
    - Різдво
    - Новий рік
    - День Незалежності
    correct: 0
