version: '1.0'
module: holidays
level: a1
inline:
- id: quiz-holiday-match
  type: quiz
  instruction: Оберіть правильну дату (Choose the correct date)
  items:
  - question: Коли Різдво?
    options:
    - 25 грудня
    - 7 січня
    - 1 січня
    - 24 серпня
    correct: 0
  - question: Коли День Незалежності?
    options:
    - 24 серпня
    - 28 червня
    - 1 жовтня
    - 1 січня
    correct: 0
  - question: Коли Новий рік?
    options:
    - 1 січня
    - 25 грудня
    - 7 січня
    - 14 січня
    correct: 0
  - question: Коли День Конституції?
    options:
    - 28 червня
    - 24 серпня
    - 1 жовтня
    - 1 травня
    correct: 0
  - question: Коли День захисників і захисниць?
    options:
    - 1 жовтня
    - 14 жовтня
    - 24 серпня
    - 28 червня
    correct: 0
  - question: Коли Свята вечеря?
    options:
    - 24 грудня
    - 25 грудня
    - 7 січня
    - 1 січня
    correct: 0
  - question: Коли Вишиванковий день?
    options:
    - третій четвер травня
    - 24 серпня
    - 1 жовтня
    - 28 червня
    correct: 0
  - question: Коли Великдень?
    options:
    - навесні
    - взимку
    - влітку
    - восени
    correct: 0
- id: quiz-holiday-clues
  type: quiz
  instruction: Яке це свято? Оберіть правильний варіант (Which holiday is this? Choose
    the correct option)
  items:
  - question: Кутя, колядки, дванадцять страв — це...
    options:
    - Різдво
    - Великдень
    - Новий рік
    - День Незалежності
    correct: 0
  - question: Писанка, паска, кошик — це...
    options:
    - Великдень
    - Різдво
    - Новий рік
    - Вишиванковий день
    correct: 0
  - question: Парад, концерт, прапори, салют — це...
    options:
    - День Незалежності
    - Новий рік
    - Різдво
    - День Конституції
    correct: 0
  - question: Ялинка, подарунки, 1 січня — це...
    options:
    - Новий рік
    - Різдво
    - День Незалежності
    - Великдень
    correct: 0
  - question: Спеціальна вишита сорочка, третій четвер травня — це...
    options:
    - Вишиванковий день
    - День Незалежності
    - День Конституції
    - Великдень
    correct: 0
  - question: Повага до військових, 1 жовтня — це...
    options:
    - День захисників і захисниць
    - День Незалежності
    - День Конституції
    - Вишиванковий день
    correct: 0
  - question: Христос воскрес, святити кошик — це...
    options:
    - Великдень
    - Різдво
    - Новий рік
    - День Незалежності
    correct: 0
  - question: Дідух, Свята вечеря, перша зірка — це...
    options:
    - Різдво
    - Новий рік
    - Великдень
    - День Конституції
    correct: 0
- id: group-sort-traditions
  type: group-sort
  instruction: Розподіліть слова за святами (Sort the words by holidays)
  groups:
  - label: Різдво
    items:
    - кутя
    - колядка
    - дідух
    - Свята вечеря
  - label: Великдень
    items:
    - писанка
    - паска
    - кошик
  - label: День Незалежності
    items:
    - парад
    - концерт
    - салют
- id: fill-in-greetings
  type: fill-in
  instruction: Вставте правильне слово (Insert the correct word)
  items:
  - sentence: Сьогодні 25 грудня. З ___!
    answer: Різдвом
    options:
    - Різдвом
    - Великоднем
    - Днем Незалежності
  - sentence: Христос воскрес! З ___!
    answer: Великоднем
    options:
    - Великоднем
    - Різдвом
    - Новим роком
  - sentence: Сьогодні 1 січня. З ___ роком!
    answer: Новим
    options:
    - Новим
    - Різдвом
    - Днем
  - sentence: Сьогодні 24 серпня. З Днем ___!
    answer: Незалежності
    options:
    - Незалежності
    - Конституції
    - Різдвом
  - sentence: Сьогодні 28 червня. З Днем ___!
    answer: Конституції
    options:
    - Конституції
    - Незалежності
    - Різдвом
  - sentence: Сьогодні твоє свято! З днем ___!
    answer: народження
    options:
    - народження
    - Незалежності
    - Конституції
  - sentence: 'Універсальне привітання: ___ святом!'
    answer: Зі
    options:
    - Зі
    - З
    - На
  - sentence: ___ щастя, здоров'я, миру!
    answer: Бажаю
    options:
    - Бажаю
    - Вітаю
    - Співаю
workbook:
- id: tf-holidays
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Різдво — це 25 грудня.
    correct: true
    explanation: Так, Різдво — 25 грудня.
  - statement: Ми їмо паску на Різдво.
    correct: false
    explanation: Ні, ми їмо паску на Великдень.
  - statement: Кутя — це традиція на Різдво.
    correct: true
    explanation: Так, це традиція на Святу вечерю.
  - statement: Ми співаємо колядки на День Незалежності.
    correct: false
    explanation: Ні, ми співаємо колядки на Різдво.
  - statement: Великдень — це весна.
    correct: true
    explanation: Так, це свято навесні.
  - statement: Вишиванковий день — це третій четвер травня.
    correct: true
    explanation: Так, ми одягаємо вишиванки у травні.
- id: err-holidays
  type: error-correction
  instruction: Виправте помилку у привітанні (Correct the error in the greeting)
  items:
  - sentence: З Новий рік!
    error: Новий рік
    correction: Новим роком
    error_type: word
    options:
    - Новим роком
    - Нового року
    - Новий рік
    explanation: З Новим роком!
  - sentence: З Різдво!
    error: Різдво
    correction: Різдвом
    error_type: word
    options:
    - Різдвом
    - Різдва
    - Різдві
    explanation: З Різдвом!
  - sentence: З Днем Незалежність!
    error: Незалежність
    correction: Незалежності
    error_type: word
    options:
    - Незалежності
    - Незалежністю
    - Незалежностя
    explanation: З Днем Незалежності!
  - sentence: Бажаю щастя, здоров'я, мир.
    error: мир
    correction: миру
    error_type: word
    options:
    - миру
    - миром
    - мирі
    explanation: Бажаю... миру.
  - sentence: На Великдень ми їмо кутю.
    error: кутю
    correction: паску
    error_type: word
    options:
    - паску
    - ялинку
    - колядку
    explanation: На Великдень ми їмо паску.
  - sentence: З святом!
    error: З
    correction: Зі
    error_type: word
    options:
    - Зі
    - Із
    - За
    explanation: Зі святом!
- id: match-holiday-vocab
  type: match-up
  instruction: З'єднайте українські слова з перекладом (Match the Ukrainian words
    with the translation)
  pairs:
  - left: кутя
    right: sweet ritual porridge
  - left: колядка
    right: Christmas carol
  - left: писанка
    right: decorated egg
  - left: паска
    right: Easter bread
  - left: салют
    right: fireworks
  - left: прапор
    right: flag
- id: translate-greetings
  type: translate
  instruction: Оберіть правильний переклад (Choose the correct translation)
  items:
  - source: Merry Christmas!
    options:
    - text: З Різдвом!
      correct: true
    - text: З Новим роком!
      correct: false
    - text: З Великоднем!
      correct: false
  - source: Happy New Year!
    options:
    - text: З Новим роком!
      correct: true
    - text: З Різдвом!
      correct: false
    - text: Зі святом!
      correct: false
  - source: Happy Independence Day!
    options:
    - text: З Днем Незалежності!
      correct: true
    - text: З Днем Конституції!
      correct: false
    - text: Слава Україні!
      correct: false
  - source: Christ is risen!
    options:
    - text: Христос воскрес!
      correct: true
    - text: Воістину воскрес!
      correct: false
    - text: З Великоднем!
      correct: false
  - source: Happy Holiday!
    options:
    - text: Зі святом!
      correct: true
    - text: З Різдвом!
      correct: false
    - text: Вітаю!
      correct: false
  - source: Glory to Ukraine!
    options:
    - text: Слава Україні!
      correct: true
    - text: Героям слава!
      correct: false
    - text: З Днем Незалежності!
      correct: false
- id: unjumble-holidays
  type: unjumble
  instruction: Складіть правильне речення зі слів (Make a correct sentence from the
    words)
  items:
  - words:
    - роком!
    - З
    - Новим
    correct_order:
    - З
    - Новим
    - роком!
  - words:
    - миру.
    - Бажаю
    - щастя,
    - здоров'я,
    correct_order:
    - Бажаю
    - щастя,
    - здоров'я,
    - миру.
  - words:
    - кутю.
    - їмо
    - і
    - колядки
    - співаємо
    - Ми
    correct_order:
    - Ми
    - співаємо
    - колядки
    - і
    - їмо
    - кутю.
  - words:
    - Незалежності.
    - це
    - Двадцять
    - серпня
    - четверте
    - День
    - —
    correct_order:
    - Двадцять
    - четверте
    - серпня
    - —
    - це
    - День
    - Незалежності.
  - words:
    - салют.
    - дивимося
    - Ми
    - парад
    - і
    correct_order:
    - Ми
    - дивимося
    - парад
    - і
    - салют.
  - words:
    - страв.
    - Ми
    - дванадцять
    - їмо
    correct_order:
    - Ми
    - їмо
    - дванадцять
    - страв.
