workbook:
- id: match-up-vocab
  type: match-up
  instruction: З'єднайте українські та англійські слова (Match Ukrainian and English
    words)
  pairs:
  - left: кутя
    right: sweet wheat porridge
  - left: колядка
    right: traditional carol
  - left: писанка
    right: decorated Easter egg
  - left: паска
    right: Easter bread
  - left: парад
    right: parade
  - left: прапор
    right: flag
  - left: салют
    right: fireworks
  - left: свято
    right: holiday
