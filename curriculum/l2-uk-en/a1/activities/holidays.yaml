- id: true-false-comprehension
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Ми святкуємо День Незалежності взимку.
    correct: false
    explanation: День Незалежності — це літнє свято, у серпні. (Independence Day is
      a summer holiday, in August.)
  - statement: Кутя — це традиційна страва на Різдво.
    correct: true
    explanation: Кутя — головна страва на Святу вечерю. (Kutia is the main dish for
      Holy Supper.)
  - statement: Писанка — це солодкий хліб.
    correct: false
    explanation: Писанка — це яйце, а солодкий хліб — це паска. (Pysanka is an egg,
      sweet bread is paska.)
  - statement: Український прапор синій і жовтий.
    correct: true
    explanation: Так, він має синій і жовтий кольори. (Yes, it has blue and yellow
      colors.)
  - statement: Люди кажуть «Христос воскрес!» на Новий рік.
    correct: false
    explanation: Це традиційне вітання на Великдень. (This is a traditional greeting
      for Easter.)
  - statement: Вишиванка — це традиційна сорочка.
    correct: true
    explanation: Так, це традиційний український одяг. (Yes, this is traditional Ukrainian
      clothing.)
- id: odd-one-out-vocab
  type: odd-one-out
  instruction: Знайдіть зайве слово (Find the odd word out)
  items:
  - words:
    - кутя
    - паска
    - салют
    correct: 2
    explanation: Салют — це не їжа. (Fireworks is not food.)
  - words:
    - січень
    - серпень
    - весна
    correct: 2
    explanation: Весна — це пора року, а січень і серпень — місяці. (Spring is a season,
      January and August are months.)
  - words:
    - Різдво
    - Великдень
    - прапор
    correct: 2
    explanation: Прапор — це не свято. (A flag is not a holiday.)
  - words:
    - писанка
    - ялинка
    - подарунок
    correct: 0
    explanation: Писанка — це традиція на Великдень, а ялинка і подарунок — на Новий
      рік. (Pysanka is for Easter, the others are for New Year.)
  - words:
    - колядка
    - кутя
    - парад
    correct: 2
    explanation: Парад — це на День Незалежності, а не на Різдво. (Parade is for Independence
      Day.)
  - words:
    - свято
    - вечір
    - святкувати
    correct: 2
    explanation: Святкувати — це дієслово, а інші — іменники. (To celebrate is a verb,
      the others are nouns.)
