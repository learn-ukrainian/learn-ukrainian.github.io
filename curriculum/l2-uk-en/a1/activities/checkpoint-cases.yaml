- type: quiz
  title: "Виберіть правильну форму"
  instruction: "Choose the correct answer for each question."
  items:
    - question: "Яке слово українською означає напрямок руху?"
      explanation: "Куди asks about direction or destination."
      options:
        - text: "куди"
          correct: true
        - text: "де"
          correct: false
        - text: "звідки"
          correct: false
        - text: "коли"
          correct: false
    - question: "Який відмінок потрібен після слова немає?"
      explanation: "Немає strictly requires the Genitive case."
      options:
        - text: "Родовий"
          correct: true
        - text: "Знахідний"
          correct: false
        - text: "Місцевий"
          correct: false
        - text: "Називний"
          correct: false
    - question: "Яку форму має слово парк у реченні Я бачу парк?"
      explanation: "Inanimate masculine nouns do not change their form in the Accusative case."
      options:
        - text: "Знахідний"
          correct: true
        - text: "Місцевий"
          correct: false
        - text: "Родовий"
          correct: false
        - text: "Давальний"
          correct: false
    - question: "Як перекласти фразу I see a student українською мовою?"
      explanation: "Студент is an animate masculine noun, so it takes the Genitive-style ending -а."
      options:
        - text: "Я бачу студента."
          correct: true
        - text: "Я бачу студент."
          correct: false
        - text: "Я бачу студенту."
          correct: false
        - text: "Я бачу студентом."
          correct: false
    - question: "Який прийменник означає рух крізь щось?"
      explanation: "Через translates to through or across."
      options:
        - text: "через"
          correct: true
        - text: "за"
          correct: false
        - text: "про"
          correct: false
        - text: "у"
          correct: false
    - question: "Як правильно запитати про місцезнаходження об'єкта?"
      explanation: "Де asks about a static location."
      options:
        - text: "Де?"
          correct: true
        - text: "Куди?"
          correct: false
        - text: "Звідки?"
          correct: false
        - text: "Чому?"
          correct: false
    - question: "Яке закінчення має жіночий рід у Знахідному відмінку?"
      explanation: "Feminine nouns ending in -а or -я change to -у or -ю."
      options:
        - text: "-у або -ю"
          correct: true
        - text: "-а або -я"
          correct: false
        - text: "-і або -ї"
          correct: false
        - text: "-о або -е"
          correct: false
    - question: "Яка форма займенника ти після прийменника до?"
      explanation: "До requires the Genitive case, and the Genitive of ти is тебе."
      options:
        - text: "тебе"
          correct: true
        - text: "тобі"
          correct: false
        - text: "ти"
          correct: false
        - text: "тобою"
          correct: false
    - question: "Як перекладається фраза from where українською мовою?"
      explanation: "Звідки means from where."
      options:
        - text: "звідки"
          correct: true
        - text: "куди"
          correct: false
        - text: "де"
          correct: false
        - text: "як"
          correct: false
    - question: "Яке слово зазвичай використовується для висловлення подяки?"
      explanation: "За is used to say thanks for something."
      options:
        - text: "за"
          correct: true
        - text: "про"
          correct: false
        - text: "через"
          correct: false
        - text: "до"
          correct: false
    - question: "Як правильно сказати about the book українською мовою?"
      explanation: "Про takes the Accusative case, changing книга to книгу."
      options:
        - text: "про книгу"
          correct: true
        - text: "за книгу"
          correct: false
        - text: "через книгу"
          correct: false
        - text: "на книгу"
          correct: false
    - question: "Який відмінок завжди відповідає на питання Де?"
      explanation: "The Locative case answers where at."
      options:
        - text: "Місцевий"
          correct: true
        - text: "Знахідний"
          correct: false
        - text: "Родовий"
          correct: false
        - text: "Називний"
          correct: false

- type: fill-in
  title: "Заповніть пропуски відповідними словами"
  instruction: "Choose the correct preposition, noun, or adjective form."
  items:
    - sentence: "Я йду через великий парк."
      answer: "через"
      options: ["в", "на", "через", "про"]
      explanation: "We use через to indicate moving through the park."
    - sentence: "Ми працюємо у новому кафе."
      answer: "у"
      options: ["в", "у", "на", "через"]
      explanation: "У is used with the Locative case for static location."
    - sentence: "Де ти зараз? Я на вулиці."
      answer: "на"
      options: ["на", "в", "у", "за"]
      explanation: "Вулиця (street) requires the preposition на for location."
    - sentence: "Я дуже дякую тобі за допомогу."
      answer: "за"
      options: ["про", "за", "через", "на"]
      explanation: "За is used after verbs of gratitude (thanking for something)."
    - sentence: "Вона часто думає про тебе."
      answer: "про"
      options: ["за", "про", "через", "на"]
      explanation: "Про is used with the Accusative case to mean about."
    - sentence: "Тут, на жаль, немає кави."
      answer: "немає"
      options: ["немає", "є", "бачу", "йду"]
      explanation: "Немає requires the Genitive case (кави)."
    - sentence: "Куди ти йдеш? Я йду в театр."
      answer: "в"
      options: ["в", "у", "на", "до"]
      explanation: "Movement to a specific destination requires в or на."
    - sentence: "Я не розумію тебе, повторіть будь ласка."
      answer: "тебе"
      options: ["ти", "тебе", "тобі", "тобою"]
      explanation: "The direct object of understand must be in the Accusative case."
    - sentence: "Ми йдемо до нього, він чекає."
      answer: "нього"
      options: ["нього", "його", "йому", "ним"]
      explanation: "Pronouns starting with a vowel take н- after prepositions."
    - sentence: "Вона бачить студента на вулиці."
      answer: "студента"
      options: ["студент", "студента", "студенту", "студентом"]
      explanation: "Студент is animate, so it takes the -а ending in the Accusative case."
    - sentence: "Вони живуть у новому місті."
      answer: "новому"
      options: ["новий", "нове", "новому", "новим"]
      explanation: "Locative adjective agreement for a neuter noun."
    - sentence: "Я купую цікаву книгу."
      answer: "книгу"
      options: ["книга", "книгу", "книзі", "книгою"]
      explanation: "Accusative noun agreement for a feminine direct object."

- type: group-sort
  title: "Розподіліть слова та фрази за відмінками"
  instruction: "Sort the phrases into the correct grammatical case categories."
  groups:
    - name: "Знахідний відмінок"
