- type: quiz
  title: "Фінальна перевірка"
  instruction: "Test your mastery of case interactions."
  items:
    - question: "Яке слово є правильним займенником жіночого роду у Знахідному відмінку?"
      explanation: "Її is the direct object form of вона."
      options:
        - text: "її"
          correct: true
        - text: "вона"
          correct: false
        - text: "неї"
          correct: false
        - text: "їй"
          correct: false
    - question: "Яка форма слова місто потрібна після прийменника напрямку через?"
      explanation: "Місто is inanimate neuter, so it does not change its form in the Accusative case."
      options:
        - text: "місто"
          correct: true
        - text: "місті"
          correct: false
        - text: "міста"
          correct: false
        - text: "містом"
          correct: false
    - question: "Яка форма слова кава потрібна після слова заперечення немає?"
      explanation: "The Genitive case of кава is кави."
      options:
        - text: "кави"
          correct: true
        - text: "кава"
          correct: false
        - text: "каву"
          correct: false
        - text: "каві"
          correct: false
    - question: "Що саме означає український прийменник про у більшості випадків?"
