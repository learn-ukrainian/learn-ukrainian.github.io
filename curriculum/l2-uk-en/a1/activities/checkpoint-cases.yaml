- type: fill-in
  title: "Оберіть правильний займенник"
  instruction: "Select the correct pronoun to complete the sentence."
  items:
    - sentence: "Я йду до нього."
      answer: "нього"
      options: ["його", "нього", "йому", "ним"]
      explanation: "After a preposition, we must use the prefix н-."
    - sentence: "Ти слухаєш мене?"
      answer: "мене"
      options: ["я", "мене", "мені", "мною"]
      explanation: "Мене is the Accusative case form of я."
    - sentence: "Вона щиро любить його."
      answer: "його"
      options: ["він", "його", "нього", "йому"]
      explanation: "Його is the direct object form of він without a preposition."
    - sentence: "Я дуже добре розумію тебе."
      answer: "тебе"
      options: ["ти", "тебе", "тобі", "тобою"]
      explanation: "Тебе is the Accusative form for you (singular)."
    - sentence: "Це гарний подарунок для неї."
      answer: "неї"
      options: ["вона", "її", "неї", "їй"]
      explanation: "The preposition для requires the Genitive case, and her needs the prefix н-."
    - sentence: "Де ти? Я чекаю на тебе."
      answer: "тебе"
      options: ["ти", "тебе", "тобі", "тобою"]
      explanation: "The verb чекати на requires the Accusative case."
    - sentence: "У мене немає часу."
      answer: "мене"
      options: ["я", "мене", "мені", "мною"]
      explanation: "The phrase I have is translated using у + Genitive case (мене)."
    - sentence: "Я часто думаю про тебе."
      answer: "тебе"
      options: ["ти", "тебе", "тобі", "тобою"]
      explanation: "Про takes the Accusative pronoun form."
    - sentence: "Ми йдемо через парк до них."
      answer: "них"
      options: ["вони", "їх", "них", "їм"]
      explanation: "After a preposition, the pronoun їх receives the н- prefix."
    - sentence: "Я бачу її на вулиці."
      answer: "її"
      options: ["вона", "її", "неї", "їй"]
      explanation: "Without a preposition, there is no н- added."

- type: group-sort
  title: "Розподіліть за категорією: Статика чи Динаміка"
  instruction: "Categorize the phrases into static locations (where) or dynamic directions (where to)."
  groups:
