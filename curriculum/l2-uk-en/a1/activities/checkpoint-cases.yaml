    - question: "Який прийменник ми використовуємо, щоб сказати англійське thank you for?"
      explanation: "Дякую за means thank you for."
      options:
        - text: "за"
          correct: true
        - text: "про"
          correct: false
        - text: "через"
          correct: false
        - text: "до"
          correct: false
    - question: "Яке закінчення має слово новий у Місцевому відмінку для чоловічого роду?"
      explanation: "Masculine adjectives take the -ому ending in the Locative case."
      options:
        - text: "-ому"
          correct: true
        - text: "-ий"
          correct: false
        - text: "-ого"
          correct: false
        - text: "-ім"
          correct: false
    - question: "Як правильно запитати про походження або звідки людина йде зараз?"
      explanation: "Звідки means from where."
      options:
        - text: "Звідки?"
          correct: true
        - text: "Де?"
          correct: false
        - text: "Куди?"
          correct: false
        - text: "Чому?"
          correct: false
    - question: "Яка частина мови змінює форму в залежності від відмінка іменника?"
      explanation: "Adjectives fully align with the noun they describe."
      options:
        - text: "Прикметник"
          correct: true
        - text: "Дієслово"
          correct: false
        - text: "Прислівник"
          correct: false
        - text: "Прийменник"
          correct: false
    - question: "Яке питання ми ставимо до слова парку у реченні Я в парку?"
      explanation: "В парку denotes static location, so the question is Де?."
      options:
        - text: "Де?"
          correct: true
        - text: "Куди?"
          correct: false
        - text: "Кого?"
          correct: false
        - text: "Що?"
          correct: false
    - question: "Яке закінчення має живий об'єкт чоловічого роду у формі Знахідного відмінка?"
      explanation: "Animate masculine nouns take the endings of the Genitive case."
