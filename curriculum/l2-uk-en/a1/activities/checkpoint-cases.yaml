      items: ["на вулиці", "у кафе", "в місті", "на столі", "у театрі"]
    - name: "Родовий відмінок"
      items: ["немає часу", "звідки ти", "до нього", "немає машини", "до тебе"]

- type: unjumble
  title: "Складіть правильні речення"
  instruction: "Put the words in the correct order."
  items:
    - words: ["Я", "зараз", "у", "великому", "парку"]
      answer: "Я зараз у великому парку"
    - words: ["Ми", "йдемо", "через", "нову", "вулицю"]
      answer: "Ми йдемо через нову вулицю"
    - words: ["Він", "дуже", "дякує", "за", "каву"]
      answer: "Він дуже дякує за каву"
    - words: ["Тут", "на", "жаль", "немає", "кафе"]
      answer: "Тут на жаль немає кафе"
    - words: ["Я", "часто", "думаю", "про", "тебе"]
      answer: "Я часто думаю про тебе"
    - words: ["Вона", "працює", "у", "новому", "театрі"]
      answer: "Вона працює у новому театрі"
    - words: ["Куди", "ти", "йдеш", "зараз"]
      answer: "Куди ти йдеш зараз"
    - words: ["Я", "бачу", "великий", "новий", "театр"]
      answer: "Я бачу великий новий театр"
    - words: ["Вони", "йдуть", "до", "нього", "сьогодні"]
      answer: "Вони йдуть до нього сьогодні"
    - words: ["Де", "твоя", "маленька", "нова", "кава"]
      answer: "Де твоя маленька нова кава"

- type: quiz
  title: "Перевірте знання узгодження"
  instruction: "Check your knowledge of adjectives and pronouns."
  items:
    - question: "Яке закінчення має прикметник жіночого роду у Знахідному відмінку?"
      explanation: "Feminine adjectives end in -у or -ю when they are the direct object."
      options:
        - text: "-у/-ю"
          correct: true
        - text: "-ій/-їй"
          correct: false
        - text: "-а/-я"
          correct: false
        - text: "-ому/-єму"
          correct: false
    - question: "Яка правильна форма займенника він безпосередньо після прийменника?"
      explanation: "The pronoun його must add the letter н- when it follows a preposition."
      options:
        - text: "нього"
          correct: true
        - text: "його"
          correct: false
        - text: "йому"
          correct: false
        - text: "ним"
          correct: false
    - question: "Як правильно сказати фразу in a new city українською?"
      explanation: "У новому місті correctly applies Locative agreement to both the adjective and noun."
      options:
        - text: "у новому місті"
          correct: true
        - text: "у нове місто"
          correct: false
        - text: "у новий місто"
          correct: false
        - text: "у новій місті"
          correct: false
    - question: "Які закінчення мають живі об'єкти чоловічого роду у Знахідному відмінку?"
      explanation: "Animate masculine nouns in the Accusative case use the endings of the Genitive case."
      options:
        - text: "-а або -я"
          correct: true
        - text: "залишаються без змін"
          correct: false
        - text: "-у або -ю"
          correct: false
        - text: "-ому або -єму"
          correct: false
    - question: "Як правильно перекласти речення I see him українською мовою?"
      explanation: "Його is the Accusative form of він. There is no preposition here."
      options:
        - text: "Я бачу його."
          correct: true
        - text: "Я бачу нього."
          correct: false
        - text: "Я бачу йому."
          correct: false
        - text: "Я бачу він."
          correct: false
    - question: "Яке слово є правильним у реченні Я йду в... ?"
      explanation: "Movement towards a destination requires the Accusative case, so inanimate театр stays the same."
      options:
        - text: "театр"
          correct: true
        - text: "театрі"
          correct: false
        - text: "театру"
          correct: false
        - text: "театром"
          correct: false
    - question: "Яке слово є правильним у реченні Я зараз у... ?"
      explanation: "Static location requires the Locative case (театрі)."
      options:
        - text: "театрі"
          correct: true
        - text: "театр"
          correct: false
        - text: "театру"
          correct: false
        - text: "театром"
          correct: false
    - question: "Яке питання завжди і обов'язково вимагає використання Місцевого відмінка?"
      explanation: "Де is the question specifically dedicated to static location."
      options:
        - text: "Де?"
          correct: true
        - text: "Куди?"
          correct: false
        - text: "Звідки?"
          correct: false
        - text: "Коли?"
          correct: false
    - question: "Яке питання вимагає Знахідного відмінка для позначення напрямку руху?"
      explanation: "Куди specifically asks about the destination of movement."
      options:
        - text: "Куди?"
          correct: true
        - text: "Де?"
          correct: false
        - text: "Звідки?"
          correct: false
        - text: "Хто?"
          correct: false
    - question: "Як правильно сказати фразу there is no time українською?"
      explanation: "Немає must always be followed by the Genitive case (часу)."
      options:
        - text: "Немає часу."
          correct: true
        - text: "Немає час."
          correct: false
        - text: "Немає часом."
          correct: false
        - text: "Немає часі."
          correct: false

