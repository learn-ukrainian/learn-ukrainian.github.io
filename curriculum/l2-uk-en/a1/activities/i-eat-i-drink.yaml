version: '1.0'
module: i-eat-i-drink
level: a1
inline:
- id: verb-conjugation-drill
  type: fill-in
  instruction: Вставте правильну форму дієслова (їсти / пити)
  items:
  - sentence: Я ____ суп.
    answer: їм
    options:
    - їм
    - їсть
    - їси
  - sentence: Ми ____ чай.
    answer: п'ємо
    options:
    - п'є
    - п'ємо
    - п'ють
  - sentence: Вона ____ хліб.
    answer: їсть
    options:
    - їсть
    - їм
    - їдять
  - sentence: Вони ____ воду.
    answer: п'ють
    options:
    - п'є
    - п'єте
    - п'ють
  - sentence: Ти ____ рибу?
    answer: їси
    options:
    - їси
    - їсте
    - їмо
  - sentence: Ви ____ каву?
    answer: п'єте
    options:
    - п'ю
    - п'єш
    - п'єте
  - sentence: Він ____ сік.
    answer: п'є
    options:
    - п'є
    - п'ють
    - п'ємо
  - sentence: Вони ____ кашу.
    answer: їдять
    options:
    - їдять
    - їмо
    - їм
- id: accusative-form-builder
  type: fill-in
  instruction: Напишіть правильну форму слова (Знахідний відмінок)
  items:
  - sentence: Я їм ____ (риба).
    answer: рибу
  - sentence: Вона п'є ____ (вода).
    answer: воду
  - sentence: Він їсть ____ (хліб).
    answer: хліб
  - sentence: Ми п'ємо ____ (молоко).
    answer: молоко
  - sentence: Вони їдять ____ (каша).
    answer: кашу
  - sentence: Ти п'єш ____ (кава).
    answer: каву
  - sentence: Я їм ____ (суп).
    answer: суп
  - sentence: Вона їсть ____ (картопля).
    answer: картоплю
- id: noun-change-sorting
  type: group-sort
  instruction: Як слова змінюються у Знахідному відмінку? Розподіліть їх
  groups:
  - label: Змінюється (-у/-ю)
    items:
    - кава
    - вода
    - риба
    - каша
    - сметана
    - картопля
  - label: Не змінюється
    items:
    - хліб
    - сік
    - молоко
    - м'ясо
    - суп
    - яйце
- id: accusative-choice-quiz
  type: quiz
  instruction: Оберіть правильний варіант
  items:
  - question: Я п'ю...
    options:
    - каву
    - кава
    - кави
    correct: 0
  - question: Він їсть...
    options:
    - рибу
    - риба
    - рибі
    correct: 0
  - question: Ми п'ємо...
    options:
    - сік
    - соку
    - соком
    correct: 0
  - question: Вона їсть...
    options:
    - м'ясо
    - м'ясу
    - м'яса
    correct: 0
  - question: Вони п'ють...
    options:
    - воду
    - вода
    - воді
    correct: 0
  - question: Ти їш...
    options:
    - кашу
    - каша
    - каші
    correct: 0
workbook:
- id: workbook-match-pronoun-verb
  type: match-up
  instruction: З'єднайте займенник із правильною формою дієслова 'їсти'
  pairs:
  - left: Я
    right: їм
  - left: Ти
    right: їси
  - left: Він
    right: їсть
  - left: Ми
    right: їмо
  - left: Ви
    right: їсте
  - left: Вони
    right: їдять
- id: workbook-true-false-comprehension
  type: true-false
  instruction: Правда чи ні? Прочитайте діалог і правила
  items:
  - statement: Ірина їсть кашу на сніданок.
    correct: true
    explanation: 'Так, Ірина каже: «Я їм кашу і п''ю каву».'
  - statement: Діти п'ють каву.
    correct: false
    explanation: Ні, діти п'ють молоко.
  - statement: Слово 'суп' змінюється на 'супу' у знахідному відмінку.
    correct: false
    explanation: 'Ні, чоловічий рід (неживий) не змінюється: я їм суп.'
  - statement: Олена їсть хліб з маслом.
    correct: true
    explanation: Так, вона їсть хліб з маслом і п'є чай.
  - statement: Слово 'кава' змінюється на 'каву' у знахідному відмінку.
    correct: true
    explanation: Так, закінчення -а змінюється на -у.
  - statement: В Україні суп п'ють, а не їдять.
    correct: false
    explanation: В Україні суп або борщ 'їдять' ложкою, а не п'ють.
- id: workbook-error-correction-cases
  type: error-correction
  instruction: Знайдіть і виправте помилку
  items:
  - sentence: Я п'ю вода.
    error: вода
    correction: воду
    error_type: word
    options:
    - воду
    - воді
    - водою
    explanation: Вода — жіночий рід. Знахідний відмінок має закінчення -у (воду).
  - sentence: Ти їсть рибу.
    error: їсть
    correction: їси
    error_type: word
    options:
    - їси
    - їш
    - їдять
    explanation: Для займенника 'ти' правильна форма дієслова 'їсти' — 'їси'.
  - sentence: Ми п'ють сік.
    error: п'ють
    correction: п'ємо
    error_type: word
    options:
    - п'ємо
    - п'є
    - п'єте
    explanation: Для 'ми' правильна форма — 'п'ємо'.
  - sentence: Вона їсть картопля.
    error: картопля
    correction: картоплю
    error_type: word
    options:
    - картоплю
    - картоплі
    - картоплею
    explanation: Картопля — жіночий рід на -я. У знахідному відмінку закінчення -ю
      (картоплю).
  - sentence: Вони їмо бутерброд.
    error: їмо
    correction: їдять
    error_type: word
    options:
    - їдять
    - їм
    - їсте
    explanation: Для 'вони' правильна форма — 'їдять'.
  - sentence: Я хочу кава.
    error: кава
    correction: каву
    error_type: word
    options:
    - каву
    - каві
    - кавою
    explanation: Кава — жіночий рід. Знахідний відмінок має закінчення -у (каву).
- id: workbook-translate-sentences
  type: translate
  instruction: Оберіть правильний переклад
  items:
  - source: I eat fish.
    options:
    - text: Я їм рибу.
      correct: true
    - text: Я їм риба.
      correct: false
    - text: Я їсть рибу.
      correct: false
  - source: We drink tea.
    options:
    - text: Ми п'ємо чай.
      correct: true
    - text: Ми п'ють чай.
      correct: false
    - text: Ми п'ємо чаю.
      correct: false
  - source: They want water.
    options:
    - text: Вони хочуть воду.
      correct: true
    - text: Вони хочуть вода.
      correct: false
    - text: Вони хоче воду.
      correct: false
  - source: She eats porridge.
    options:
    - text: Вона їсть кашу.
      correct: true
    - text: Вона їсть каша.
      correct: false
    - text: Вона їси кашу.
      correct: false
  - source: He drinks coffee.
    options:
    - text: Він п'є каву.
      correct: true
    - text: Він п'є кава.
      correct: false
    - text: Він п'ємо каву.
      correct: false
  - source: You (plural) drink milk.
    options:
    - text: Ви п'єте молоко.
      correct: true
    - text: Ви п'єш молоко.
      correct: false
    - text: Ви п'єте молока.
      correct: false
