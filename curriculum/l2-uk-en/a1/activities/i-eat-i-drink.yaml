workbook:
- id: match-up-verbs
  type: match-up
  instruction: З'єднайте займенник із дієсловом (Match the pronoun with the verb)
  pairs:
  - left: я
    right: п'ю
  - left: ти
    right: їси
  - left: він
    right: п'є
  - left: ми
    right: їмо
  - left: ви
    right: п'єте
  - left: вони
    right: їдять
  - left: вона
    right: їсть
- id: true-false-grammar
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Я п'ю каву.
    correct: true
    explanation: Каву п'ють.
  - statement: Він їсть молоко.
    correct: false
    explanation: Молоко п'ють, а не їдять.
  - statement: Ти їси хліб.
    correct: true
    explanation: Хліб їдять.
  - statement: Ми п'ємо картоплю.
    correct: false
    explanation: Картоплю їдять, а не п'ють.
  - statement: Вона їсть рибу.
    correct: true
    explanation: Рибу їдять.
  - statement: Вони п'ють чай.
    correct: true
    explanation: Чай п'ють.
  - statement: Я їм сік.
    correct: false
    explanation: Сік п'ють, а не їдять.
