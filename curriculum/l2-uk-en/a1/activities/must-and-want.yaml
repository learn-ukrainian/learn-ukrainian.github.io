- type: unjumble
  title: "Складіть речення"
  instruction: "Поставте слова у правильному порядку."
  items:
    - words: ["Мені", "дуже", "треба", "працювати"]
      answer: "Мені дуже треба працювати"
    - words: ["Я", "повинен", "допомогти", "другові"]
      answer: "Я повинен допомогти другові"
    - words: ["Вона", "хоче", "пити", "воду"]
      answer: "Вона хоче пити воду"
    - words: ["Нам", "потрібна", "ваша", "допомога"]
      answer: "Нам потрібна ваша допомога"
    - words: ["Ти", "повинен", "поважати", "старших"]
      answer: "Ти повинен поважати старших"
    - words: ["Ми", "мріємо", "купити", "будинок"]
      answer: "Ми мріємо купити будинок"

- type: group-sort
  title: "Розподіліть займенники"
  instruction: "З якими займенниками використовуються ці слова?"
  groups:
    - name: "Давальний відмінок (для ТРЕБА)"
      items: ["мені", "тобі", "йому", "їй", "нам", "їм"]
    - name: "Називний відмінок (для ПОВИНЕН)"
      items: ["я", "ти", "він", "вона", "ми", "вони"]

- type: match-up
  title: "Форми дієслів та прикметників"
  instruction: "З'єднайте початок і кінець речення."
  pairs:
