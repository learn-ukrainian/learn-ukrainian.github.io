- type: fill-in
  title: "Оберіть правильне слово"
  instruction: "Виберіть слово, яке найкраще підходить за змістом."
  items:
    - sentence: "Мені дуже ___ відпочити."
      answer: "треба"
      options: ["треба", "повинен", "хочу", "потрібен"]
    - sentence: "Я ___ працювати кожен день."
      answer: "повинен"
      options: ["повинен", "треба", "хочу", "потрібен"]
    - sentence: "Ми ___ поїхати на море влітку."
      answer: "хочемо"
      options: ["хочемо", "треба", "повинні", "потрібні"]
    - sentence: "Їй ___ нова робота."
      answer: "потрібна"
      options: ["потрібна", "треба", "хоче", "повинна"]
    - sentence: "Він ___ допомагати своїм батькам."
      answer: "повинен"
      options: ["повинен", "треба", "хоче", "потрібен"]
    - sentence: "Нам ___ купити продукти."
      answer: "треба"
      options: ["треба", "повинні", "хочемо", "потрібні"]
    - sentence: "Я б ___ замовити чай, будь ласка."
      answer: "хотів"
      options: ["хотів", "треба", "повинен", "потрібен"]
    - sentence: "Тобі ___ лікар."
      answer: "потрібен"
      options: ["потрібен", "треба", "хочеш", "повинен"]

- type: quiz
  title: "Яке слово обрати?"
  instruction: "Уважно прочитайте ситуацію та оберіть правильний варіант."
  items:
    - question: "У вас висока температура. Що ви скажете?"
      explanation: "Коли ви хворі, це життєва необхідність, тому ми використовуємо слово потрібен."
      options:
        - text: "Мені потрібен лікар."
          correct: true
        - text: "Я хочу лікар."
          correct: false
        - text: "Я повинен лікар."
          correct: false
        - text: "Мені треба лікар."
          correct: false
    - question: "Ви у кав'ярні і дивитесь меню. Що ви скажете офіціанту?"
      explanation: "У кафе ми виражаємо бажання за допомогою слова хочу або я б хотів."
      options:
        - text: "Я хочу десерт."
          correct: true
        - text: "Мені треба десерт."
          correct: false
        - text: "Я повинен десерт."
          correct: false
        - text: "Мені потрібен десерт."
          correct: false
    - question: "Ви обіцяли другу допомогти з переїздом. Що ви відчуваєте?"
      explanation: "Це моральний обов'язок перед другом, тому використовуємо слово повинен."
      options:
        - text: "Я повинен допомогти."
          correct: true
        - text: "Я хочу допомогти."
          correct: false
        - text: "Мені треба допомогти."
          correct: false
        - text: "Мені потрібна допомогти."
          correct: false
    - question: "Ви хочете дати другові добру пораду щодо фільму. Як ви скажете?"
      explanation: "Для поради ми використовуємо слово варто."
      options:
        - text: "Варто подивитися цей фільм."
          correct: true
        - text: "Треба подивитися цей фільм."
          correct: false
        - text: "Я повинен подивитися цей фільм."
          correct: false
        - text: "Я хочу подивитися цей фільм."
          correct: false
    - question: "Як правильно сказати про необхідність працювати для чоловіка?"
      explanation: "Чоловік використовує форму чоловічого роду повинен."
      options:
        - text: "Я повинен працювати."
          correct: true
        - text: "Я повинна працювати."
          correct: false
        - text: "Я треба працювати."
          correct: false
        - text: "Я потрібен працювати."
          correct: false
    - question: "Як правильно сказати, що ви хочете спати?"
      explanation: "Після слова хочу використовується інфінітив."
      options:
        - text: "Я хочу спати."
          correct: true
        - text: "Мені хочу спати."
          correct: false
        - text: "Я хочу сплю."
          correct: false
        - text: "Мені треба спати."
          correct: false
    - question: "Як правильно побудувати речення зі словом треба?"
      explanation: "Зі словом треба використовується давальний відмінок."
      options:
        - text: "Мені треба йти."
          correct: true
        - text: "Я треба йти."
          correct: false
        - text: "Мене треба йти."
          correct: false
        - text: "Моє треба йти."
          correct: false
    - question: "Яке слово використовується для вираження дуже глибокого бажання?"
      explanation: "Слово мріяти означає велику мету або прагнення."
      options:
        - text: "мріяти"
          correct: true
        - text: "хотіти"
          correct: false
        - text: "треба"
          correct: false
        - text: "повинен"
          correct: false

- type: match-up
  title: "Знайдіть відповідність"
