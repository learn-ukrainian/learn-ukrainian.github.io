- type: fill-in
  title: "Відмінювання дієслова хотіти"
  instruction: "Оберіть правильну форму дієслова."
  items:
    - sentence: "Я ___ вивчати українську мову."
      answer: "хочу"
      options: ["хочу", "хочеш", "хоче", "хочемо"]
    - sentence: "Ти ___ піти в кіно сьогодні?"
      answer: "хочеш"
      options: ["хочеш", "хочу", "хочете", "хочуть"]
    - sentence: "Мій друг ___ нове авто."
      answer: "хоче"
      options: ["хоче", "хочу", "хочемо", "хочете"]
    - sentence: "Ми ___ поїхати в Карпати."
      answer: "хочемо"
      options: ["хочемо", "хочу", "хоче", "хочуть"]
    - sentence: "Що ви ___ замовити?"
      answer: "хочете"
      options: ["хочете", "хочеш", "хоче", "хочуть"]
    - sentence: "Вони ___ купити новий будинок."
      answer: "хочуть"
      options: ["хочуть", "хоче", "хочемо", "хочу"]
    - sentence: "Вона дуже ___ спати."
      answer: "хоче"
      options: ["хоче", "хочу", "хочеш", "хочете"]
    - sentence: "Я б ___ випити чай."
      answer: "хотіла"
      options: ["хотіла", "хоче", "хочу", "хочемо"]

- type: quiz
  title: "Граматика та культура"
  instruction: "Перевірте свої знання про правила та культуру."
  items:
    - question: "Яке слово означає більш м'яку пораду, ніж треба?"
      explanation: "Слово варто використовується для рекомендації."
      options:
        - text: "варто"
          correct: true
        - text: "повинен"
          correct: false
        - text: "необхідно"
          correct: false
        - text: "мрію"
          correct: false
    - question: "Як сказати англійське I need a car українською?"
      explanation: "Слово авто середнього роду, тому використовується потрібне."
      options:
        - text: "Мені потрібне авто."
          correct: true
        - text: "Мені потрібна авто."
          correct: false
        - text: "Мені потрібен авто."
          correct: false
        - text: "Я потрібен авто."
          correct: false
    - question: "Яке слово має більш офіційний тон, ніж треба?"
      explanation: "Слово потрібно є більш ввічливим та офіційним синонімом."
      options:
        - text: "потрібно"
          correct: true
        - text: "хочу"
          correct: false
        - text: "повинен"
          correct: false
        - text: "бажаю"
          correct: false
    - question: "Яка літера змінюється у корені дієслова хотіти?"
      explanation: "У теперішньому часі літера т змінюється на ч (хотіти - хочу)."
      options:
        - text: "літера т змінюється на ч"
          correct: true
        - text: "літера х змінюється на ч"
          correct: false
        - text: "літера о змінюється на а"
          correct: false
        - text: "літера і змінюється на е"
          correct: false
    - question: "Який відмінок ми використовуємо для людини зі словом потрібен?"
      explanation: "Людина, яка має потребу, стоїть у давальному відмінку."
      options:
        - text: "давальний відмінок"
          correct: true
        - text: "називний відмінок"
          correct: false
        - text: "знахідний відмінок"
          correct: false
        - text: "родовий відмінок"
          correct: false
    - question: "Як сказати ввічливу фразу I would like для чоловіка?"
      explanation: "Для чоловіка правильна форма — я б хотів."
      options:
        - text: "Я б хотів"
          correct: true
        - text: "Я б хотіла"
          correct: false
        - text: "Я хочу"
          correct: false
        - text: "Я б хочу"
          correct: false
    - question: "Яка конструкція є найбільш інтенсивною і означає суворий обов'язок?"
      explanation: "Слово повинен позначає найвищу міру обов'язку."
      options:
        - text: "Я повинен"
          correct: true
        - text: "Мені треба"
          correct: false
        - text: "Я хочу"
          correct: false
        - text: "Мені потрібно"
          correct: false
    - question: "З чим узгоджується слово потрібен у реченні?"
      explanation: "Воно узгоджується з об'єктом, який потрібен, а не з людиною."
      options:
        - text: "З об'єктом (річчю або людиною)"
          correct: true
        - text: "З суб'єктом (хто має потребу)"
          correct: false
        - text: "Ні з чим не узгоджується"
          correct: false
        - text: "З дієсловом"
          correct: false

