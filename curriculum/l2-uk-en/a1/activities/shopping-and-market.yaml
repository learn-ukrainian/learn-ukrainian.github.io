- type: fill-in
  title: "Ввічливі прохання в магазині"
  instruction: "Виберіть правильне слово, щоб доповнити прохання."
  items:
    - sentence: "Дайте, ___ ласка, свіжий хліб."
      answer: "будь"
      options: ["будь", "мене", "вам", "там"]
    - sentence: "Я ___ купити воду."
      answer: "хочу"
      options: ["хочу", "роблю", "є", "маю"]
    - sentence: "У вас ___ молоко?"
      answer: "є"
      options: ["є", "маєте", "бути", "хочу"]
    - sentence: "Скільки ___ цей журнал?"
      answer: "коштує"
      options: ["коштує", "є", "робить", "дайте"]
    - sentence: "___ оплатити карткою?"
      answer: "Можна"
      options: ["Можна", "Будь", "Дайте", "Є"]
    - sentence: "___, будь ласка, два кілограми яблук."
      answer: "Дайте"
      options: ["Дайте", "Хочу", "Можна", "Є"]
    - sentence: "Ваша ___ п'ятнадцять гривень."
      answer: "решта"
      options: ["решта", "ціна", "гривня", "картка"]
    - sentence: "Я хочу ___ телефон."
      answer: "купити"
      options: ["купити", "коштувати", "дати", "оплатити"]

