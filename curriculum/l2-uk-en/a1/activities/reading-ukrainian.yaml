- id: match-up
  type: match-up
  instruction: Match the iotated vowel or special letter to its correct sound description
    based on its position.
  pairs:
  - left: Я at the beginning of a word (e.g., яблуко)
    right: '[й] + [а]'
  - left: Ю after a consonant (e.g., людина)
    right: softens consonant + [у]
  - left: Є at the beginning of a word
    right: '[й] + [е]'
  - left: Ї always makes this sound
    right: '[й] + [і]'
  - left: Я after a consonant (e.g., пісня)
    right: softens consonant + [а]
  - left: Щ always makes this double sound
    right: '[ш] + [ч]'
