- type: true-false
  instruction: Are these statements about Ukrainian phonetics true or false?
  items:
  - statement: In Ukrainian, the number of syllables in a word equals the number of
      vowels.
    correct: true
    explanation: 'This is the golden rule: У слові стільки складів, скільки голосних
      звуків. Every vowel sound is a syllable core.'
  - statement: The letter Ь (м'який знак) makes its own audible sound.
    correct: false
    explanation: Ь has no sound of its own — it only softens the consonant before
      it. In день the Н is soft, but Ь itself is silent.
  - statement: The letter Ї can appear directly after a consonant.
    correct: false
    explanation: Ї never follows a consonant directly. It appears at word start (їжак),
      after a vowel (країна), or after an apostrophe (з'їсти).
  - statement: The words кит and кіт mean the same thing.
    correct: false
    explanation: кит means 'whale' and кіт means 'cat'. Ukrainian И and І are separate
      phonemes — swapping them changes the word entirely.
  - statement: Банк has one syllable.
    correct: true
    explanation: Банк has only one vowel — А — so it has exactly one syllable.
  - statement: Університет has 5 syllables.
    correct: true
    explanation: У-ні-вер-си-тет has five vowels (У, І, Е, И, Е), giving five syllables.
  - statement: The apostrophe (') softens the consonant that comes before it.
    correct: false
    explanation: The apostrophe does the opposite — it keeps the consonant hard by
      separating it from the following iotated vowel. In сім'я the М stays hard.
  - statement: 'The letter Щ represents two sounds: [шч].'
    correct: true
    explanation: Щ is always read as [шч] — one letter, two sounds. In що and ще,
      never read it as [ш] alone.
- type: observe
  examples:
  - кит — means 'whale' (И is a back vowel [и])
  - кіт — means 'cat' (І is a front vowel [і])
  - дим — means 'smoke' (И sounds further back in the mouth)
  - дім — means 'house' (І sounds higher and further forward)
  - лис — means 'fox' (И after Л)
  - ліс — means 'forest' (І after Л)
  prompt: Look at these pairs — each pair differs by only one vowel, yet the meaning
    is completely different. What does this tell you about И and І in Ukrainian? Are
    they the same sound or different phonemes?
- type: quiz
  instruction: Test your understanding of Ukrainian iotated vowels. Choose the correct
    answer.
  items:
  - question: How many sounds does Я produce when it appears at the start of a word?
    options:
    - 'One sound: [а]'
    - 'Two sounds: [й]+[а]'
    - 'Three sounds: [й]+[а]+[й]'
    correct: 1
  - question: 'In the word яблуко, the letter Я produces:'
    options:
    - two sounds [й]+[а]
    - one sound [а]
    - no sound at all
    correct: 0
  - question: In the word пісня, what does Я do to the consonant before it?
    options:
    - softens the Н and adds the sound [а]
    - produces [й]+[а] after Н
    - has no effect on Н
    correct: 0
  - question: Which statement about the letter Ї is correct?
    options:
    - 'Ї always produces two sounds: [й]+[і]'
    - Ї produces one sound when after a vowel
    - Ї softens the consonant before it
    correct: 0
  - question: In the word людина, what does Ю do?
    options:
    - softens the Л before it and adds the sound [у]
    - produces [й]+[у] after Л
    - produces only the sound [у]
    correct: 0
  - question: Which of these letters is uniquely Ukrainian and has no equivalent in
      Russian?
    options:
    - Я
    - Ї
    - Ю
    correct: 1
