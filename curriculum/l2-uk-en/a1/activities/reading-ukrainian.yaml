- id: match-iotated-vowels
  type: match-up
  instruction: Match each iotated vowel (in its position) to the sounds it produces.
  pairs:
  - left: Я — at the start of a word
    right: '[й] + [а]'
  - left: Я — after a consonant
    right: softens consonant + [а]
  - left: Ю — at the start of a word
    right: '[й] + [у]'
  - left: Ю — after a consonant
    right: softens consonant + [у]
  - left: Є — at the start of a word
    right: '[й] + [е]'
  - left: Ї — in any position
    right: always [й] + [і]
