- id: tf-reading-rules
  type: true-false
  instruction: 'True or False: Ukrainian reading rules.'
  items:
  - statement: The letter 'О' can sometimes be silent in Ukrainian.
    correct: false
    explanation: Ukrainian has no silent vowels. Every vowel is pronounced clearly.
  - statement: You count the syllables in a word by counting the vowel sounds.
    correct: true
    explanation: 'This is the golden rule: скільки голосних, стільки й складів.'
  - statement: The letter 'Ь' (soft sign) makes an 'i' sound.
    correct: false
    explanation: The soft sign has no sound of its own; it only softens the preceding
      consonant.
  - statement: 'The letter ''Ї'' always makes two sounds: [йі].'
    correct: true
    explanation: Yes, 'Ї' is unique and always produces two sounds regardless of its
      position.
  - statement: The word 'Львів' has two syllables.
    correct: false
    explanation: It only has one vowel ('і'), so it is exactly one syllable.
  - statement: The apostrophe separates a hard consonant from a two-sound iotated
      vowel.
    correct: true
    explanation: Like in the word 'сім'я', the apostrophe acts as a wall.
  title: 'True or False: Ukrainian reading rules.'
