workbook:
- type: group-sort
  instruction: Sort the words into one-syllable, two-syllable, and three-syllable
    groups based on the number of vowels.
  groups:
  - label: 1 Syllable (1 Vowel)
    items:
    - банк
    - кіт
    - дім
    - сон
    - ліс
    - хліб
  - label: 2 Syllables (2 Vowels)
    items:
    - мама
    - тато
    - каша
    - рука
    - нога
    - вода
  - label: 3 Syllables (3 Vowels)
    items:
    - аптека
    - молоко
    - яблуко
    - вулиця
    - людина
    - столиця
- type: true-false
  instruction: Read the statements about Ukrainian pronunciation and mark them True
    or False.
  items:
  - statement: A Ukrainian word has exactly as many syllables as it has vowels.
    correct: true
    explanation: This is the Golden Rule of Ukrainian syllables. Count the vowels
      to find the exact number of syllables.
  - statement: The letter И sounds exactly like the English 'ee' in 'see'.
    correct: false
    explanation: The letter І sounds like 'ee', while И is lower and more relaxed,
      like the 'i' in 'bit'.
  - statement: The word 'кіт' means whale, and 'кит' means cat.
    correct: false
    explanation: 'It is the opposite: ''кіт'' is cat, and ''кит'' is whale. Swapping
      И and І completely changes the meaning!'
  - statement: 'The letter Ї always represents two sounds: [й] + [і].'
    correct: true
    explanation: Unlike other iotated vowels, Ї never softens a consonant and always
      makes its double sound.
  - statement: The 'soft sign' (Ь) makes a [й] sound.
    correct: false
    explanation: The soft sign has no sound of its own; it only softens the preceding
      consonant.
  - statement: An apostrophe forces a hard break between sounds, preventing them from
      blending.
    correct: true
    explanation: Yes, it creates a separation, as seen in the words сім’я and м’ясо.
