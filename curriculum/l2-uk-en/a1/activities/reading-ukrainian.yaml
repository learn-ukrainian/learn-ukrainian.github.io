- type: group-sort
  instruction: Sort these words into groups by their syllable count.
  groups:
  - label: 1 syllable
    items:
    - банк
    - кіт
    - дим
    - хліб
    - кінь
    - ліс
  - label: 2 syllables
    items:
    - мама
    - каша
    - книга
    - школа
    - хата
    - рука
