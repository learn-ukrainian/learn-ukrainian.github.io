version: '1.0'
module: reading-ukrainian
level: a1
inline:
- id: count-syllables
  type: count-syllables
  instruction: How many syllables? Count the vowels — each vowel = one syllable.
  items:
  - word: банк
    correct: 1
    translation: bank
  - word: мама
    correct: 2
    translation: mother
  - word: каша
    correct: 2
    translation: porridge
  - word: молоко
    correct: 3
    translation: milk
  - word: аптека
    correct: 3
    translation: pharmacy
  - word: яблуко
    correct: 3
    translation: apple
  - word: університет
    correct: 5
    translation: university
  - word: бібліотека
    correct: 5
    translation: library
- id: match-up
  type: match-up
  instruction: Match each iotated vowel to its correct sound breakdown.
  pairs:
  - left: Я (at the start of a word)
    right: '[й] + [а]'
  - left: Ю (at the start of a word)
    right: '[й] + [у]'
  - left: Є (at the start of a word)
    right: '[й] + [е]'
  - left: Ї (always — no exceptions)
    right: '[й] + [і]'
  - left: Я (after a consonant)
    right: softens the consonant + [а]
  - left: Ю (after a consonant)
    right: softens the consonant + [у]
- id: divide-words
  type: divide-words
  instruction: Divide each word into syllables. Click between letters to insert a
    hyphen.
  items:
  - word: молоко
    answer: мо-ло-ко
    hint: 3 vowels = 3 syllables
  - word: аптека
    answer: ап-те-ка
    hint: 3 vowels = 3 syllables
  - word: яблуко
    answer: яб-лу-ко
    hint: 3 vowels = 3 syllables
  - word: людина
    answer: лю-ди-на
    hint: 3 vowels = 3 syllables
  - word: вулиця
    answer: ву-ли-ця
    hint: 3 vowels = 3 syllables
  - word: шоколад
    answer: шо-ко-лад
    hint: 3 vowels = 3 syllables
  - word: університет
    answer: у-ні-вер-си-тет
    hint: 5 vowels = 5 syllables
  - word: бібліотека
    answer: бі-блі-о-те-ка
    hint: 5 vowels = 5 syllables
