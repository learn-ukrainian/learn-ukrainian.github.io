  title: Sort the words by their number of syllables
- id: wb-true-false-rules
  type: true-false
  instruction: Are these statements about reading Ukrainian true or false?
  items:
  - statement: 'The letter Ї always makes two sounds: [й] + [і].'
    correct: true
    explanation: Unlike Я, Ю, and Є, the letter Ї never loses its double sound.
  - statement: The word 'банк' has two syllables.
    correct: false
    explanation: It has only one vowel (а), so it is exactly one syllable.
  - statement: The letter И is pronounced at the front of your mouth, just like І.
    correct: false
    explanation: І is pronounced at the front, but И is pulled further back into your
      throat.
  - statement: The letter Ь makes no sound of its own.
    correct: true
    explanation: The Soft Sign exists only to soften the consonant right before it.
  - statement: In Ukrainian, the number of vowels in a word equals the number of syllables.
    correct: true
    explanation: This is the unbreakable rule for Ukrainian syllable counting.
  - statement: The apostrophe softens the consonant right before it.
    correct: false
    explanation: The apostrophe acts as a hard barrier, PREVENTING softening.
  title: Are these statements about reading Ukrainian true or false?
