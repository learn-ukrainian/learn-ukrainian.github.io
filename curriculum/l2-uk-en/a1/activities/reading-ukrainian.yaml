    answer: столиця
    options:
    - столиця
    - вулиця
    - людина
  - sentence: 'Олег: Це ____?'
    answer: каша
    options:
    - каша
    - вода
    - ліс
  - sentence: 'Ірина: Ні, це не каша. Це ____.'
    answer: вода
    options:
    - вода
    - молоко
    - сон
  - sentence: 'Марко: Де ____?'
    answer: бібліотека
    options:
    - бібліотека
    - аптека
    - каша
  - sentence: 'Олена: Вона там. А тут — ____.'
    answer: університет
    options:
    - університет
    - молоко
    - хліб
  - sentence: 'Захарійчук каже: У слові стільки ____, скільки голосних.'
    answer: складів
    options:
    - складів
    - яблук
    - вулиць
  title: Complete the sentences by choosing the correct word from the options.
