  - word: Полтава
    answer: Пол-та-ва
  - word: фотографія
    answer: фо-то-гра-фі-я
  - word: столиця
    answer: сто-ли-ця
  - word: Україна
    answer: У-кра-ї-на
  - word: Київ
    answer: Ки-їв
  - word: Харків
    answer: Хар-ків
  - word: Дніпро
    answer: Дні-про
  title: Divide these words and city names into syllables.
- id: quiz-sounds
