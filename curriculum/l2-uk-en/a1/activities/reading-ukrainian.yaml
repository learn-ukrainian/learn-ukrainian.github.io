version: '1.0'
module: reading-ukrainian
level: a1
inline:
- id: quiz-syllable-count
  type: quiz
  instruction: 'How many syllables does the word have? Remember: count the vowels!'
  items:
  - question: молоко
    options:
    - '1'
    - '2'
    - '3'
    - '4'
    correct: 2
  - question: мама
    options:
    - '1'
    - '2'
    - '3'
    correct: 1
  - question: банк
    options:
    - '1'
    - '2'
    - '3'
    correct: 0
  - question: аптека
    options:
    - '2'
    - '3'
    - '4'
    correct: 1
- id: match-iotated-vowels
  type: match-up
  instruction: Match each iotated vowel to the two sounds it represents at the start
    of a word.
  pairs:
  - left: Я
    right: '[й] + [а]'
  - left: Ю
    right: '[й] + [у]'
  - left: Є
    right: '[й] + [е]'
  - left: Ї
    right: '[й] + [і]'
- id: fill-in-syllable-division
  type: fill-in
  instruction: Type the word divided into syllables using hyphens (e.g. мо-ло-ко).
  items:
  - sentence: вулиця → ____
    answer: ву-ли-ця
  - sentence: книга → ____
    answer: кни-га
  - sentence: столиця → ____
    answer: сто-ли-ця
  - sentence: каша → ____
    answer: ка-ша
- id: quiz-read-word-meaning
  type: quiz
  instruction: Read the Ukrainian word and choose its meaning.
  items:
  - question: яблуко
    options:
    - milk
    - apple
    - street
    correct: 1
  - question: людина
    options:
    - song
    - porridge
    - person
    correct: 2
  - question: столиця
    options:
    - capital city
    - pharmacy
    - school
    correct: 0
  - question: бібліотека
    options:
    - university
    - photography
    - library
    correct: 2
- id: quiz-reading-comprehension
  type: quiz
  instruction: 'Read the passage and answer the question. Passage: «Це Київ. Це столиця.
    Тут аптека і банк. Там школа. Що це? Це кафе. А це пошта. Тут університет і бібліотека.»'
  items:
  - question: What is Київ according to the passage?
    options:
    - a school
    - a pharmacy
    - a capital city
    - a library
    correct: 2
  - question: What is «тут» (here) — near the speaker?
    options:
    - школа
    - аптека і банк
    - кафе
    - пошта
    correct: 1
  - question: Where is the школа?
    options:
    - тут (here)
    - там (there)
    correct: 1
workbook:
- type: quiz
  instruction: How many syllables does the word have? Count the vowels!
  items:
  - question: університет
    options:
