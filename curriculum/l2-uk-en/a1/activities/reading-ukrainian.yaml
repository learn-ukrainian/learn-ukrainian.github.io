- type: true-false
  instruction: True or false? Think carefully before you answer.
  items:
  - statement: The word 'банк' has 1 syllable because it contains 1 vowel (А).
    correct: true
    explanation: Correct! банк has one vowel А, so it has exactly one syllable.
  - statement: The word 'мама' has 3 syllables because it has 2 М sounds.
    correct: false
    explanation: 'Wrong! Syllables are counted by vowels, not consonants. мама has
      2 vowels (А, А) = 2 syllables: ма-ма.'
  - statement: 'Ї always produces two sounds: [й] + [і], with zero exceptions.'
    correct: true
    explanation: Correct! Ї is unique — it always produces two sounds, [й] + [і],
      in every position. It is also distinctly Ukrainian — Russian has no equivalent
      letter.
  - statement: Я makes the same sounds whether it appears at the start of a word or
      after a consonant.
    correct: false
    explanation: Wrong! At the start of a word, Я = [й] + [а] (two sounds). After
      a consonant, Я softens that consonant and contributes only [а].
  - statement: університет has 5 syllables.
    correct: true
    explanation: Correct! у-ні-вер-си-тет has 5 vowels (У, І, Е, И, Е) = 5 syllables.
  - statement: The soft sign (Ь) creates its own syllable, so 'день' has 2 syllables.
    correct: false
    explanation: Wrong! Ь is not a vowel and has no sound of its own. It only softens
      the consonant before it. день has 1 vowel (Е) = 1 syllable.
  - statement: яблуко has 3 syllables.
    correct: true
    explanation: Correct! яб-лу-ко has 3 vowels (Я, У, О) = 3 syllables.
  - statement: Russian has a letter that is equivalent to Ukrainian Ї.
    correct: false
    explanation: Wrong! Ї is distinctly Ukrainian — Russian has no equivalent letter.
- type: quiz
  instruction: Choose the correct answer about Ukrainian vowels and syllables.
  items:
  - question: What does Я sound like at the START of a word, as in 'яблуко'?
    options:
    - '[а] only'
    - '[й] + [а]'
    - '[й] + [у]'
    - '[й] + [е]'
    correct: 1
  - question: What does Ї ALWAYS produce?
    options:
    - '[і] only'
    - '[й] + [у]'
    - '[й] + [і]'
    - '[й] + [а]'
    correct: 2
  - question: How many syllables does 'бібліотека' have?
    options:
    - '3'
    - '4'
    - '5'
    - '6'
    correct: 2
  - question: What is the Ukrainian term for 'syllable division'?
    options:
    - звуковий аналіз
    - складоподіл
    - голосний звук
    - м'який знак
    correct: 1
  - question: What does the soft sign (Ь) do in a word like 'день'?
    options:
    - adds a vowel sound
    - creates a new syllable
    - softens the consonant before it
    - hardens the consonant before it
    correct: 2
  - question: In 'людина', Ю comes after the consonant Л. What does Ю do here?
    options:
    - produces [й] + [у] as two separate sounds
    - softens Л and adds the sound [у]
    - has no effect on Л
    - hardens Л
    correct: 1
