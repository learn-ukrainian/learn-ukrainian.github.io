    - father
    - water
    - school
    correct: 0
  - question: тато
    options:
    - book
    - father
    - milk
    - hand
    correct: 1
  - question: молоко
    options:
    - apple
    - bread
    - milk
    - street
    correct: 2
  - question: каша
    options:
    - song
    - school
    - library
    - porridge
    correct: 3
  - question: книга
    options:
    - book
    - country
    - family
    - pharmacy
    correct: 0
  - question: вода
    options:
    - forest
    - water
    - evening
    - bread
