- id: odd-one-out
  type: odd-one-out
  instruction: Which word has a DIFFERENT number of syllables? Find the odd one out.
  items:
  - words:
    - банк
    - дим
    - молоко
    - ліс
    correct: 2
    explanation: молоко has 3 syllables (мо-ло-ко). банк, дим, and ліс each have only
      1 syllable.
  - words:
    - каша
    - мама
    - тато
    - молоко
    correct: 3
    explanation: молоко has 3 syllables (мо-ло-ко). каша, мама, and тато each have
      2 syllables.
  - words:
    - молоко
    - аптека
    - яблуко
    - банк
    correct: 3
    explanation: банк has 1 syllable. молоко, аптека, and яблуко each have 3 syllables.
  - words:
    - каша
    - хата
    - університет
    - книга
    correct: 2
    explanation: університет has 5 syllables (у-ні-вер-си-тет). каша, хата, and книга
      each have 2 syllables.
  - words:
    - університет
    - бібліотека
    - фотографія
    - школа
    correct: 3
    explanation: школа has 2 syllables (шко-ла). університет, бібліотека, and фотографія
      each have 5 syllables.
  - words:
    - банк
    - дуб
    - хліб
    - каша
    correct: 3
    explanation: каша has 2 syllables (ка-ша). банк, дуб, and хліб each have 1 syllable.
