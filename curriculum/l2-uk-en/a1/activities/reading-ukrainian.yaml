    correct: 2
  - question: бібліотека
    options:
    - '3'
    - '4'
    - '5'
    correct: 2
  - question: фотографія
    options:
    - '4'
    - '5'
    - '6'
    correct: 1
  - question: шоколад
    options:
    - '2'
    - '3'
