- type: fill-in
  instruction: Divide the word into syllables using hyphens.
  items:
  - sentence: молоко → ____
    answer: мо-ло-ко
  - sentence: аптека → ____
    answer: ап-те-ка
  - sentence: університет → ____
    answer: у-ні-вер-си-тет
  - sentence: бібліотека → ____
    answer: бі-блі-о-те-ка
  - sentence: людина → ____
    answer: лю-ди-на
  - sentence: шоколад → ____
    answer: шо-ко-лад
  - sentence: ананас → ____
    answer: а-на-нас
  - sentence: пісня → ____
    answer: пі-сня
- type: group-sort
  instruction: 'Sort these vowel letters into two groups: simple vowels (one sound)
    and iotated vowels (can represent two sounds).'
  groups:
  - label: Simple vowels
    items:
    - А
    - О
    - У
    - Е
    - И
    - І
  - label: Iotated vowels
    items:
    - Я
    - Ю
    - Є
    - Ї
- type: quiz
  instruction: Read the Ukrainian word and choose its English meaning.
  items:
  - question: вулиця
    options:
    - water
    - street
    - house
    correct: 1
  - question: каша
    options:
    - porridge
    - book
    - apple
    correct: 0
  - question: пісня
    options:
    - person
    - song
    - pharmacy
    correct: 1
  - question: молоко
    options:
    - milk
    - smoke
    - dream
    correct: 0
  - question: хата
    options:
    - goat
    - foot
    - house
    correct: 2
  - question: книга
    options:
    - school
    - book
    - bread
    correct: 1
- type: quiz
  instruction: What happens to the letter Я when it appears at the START of a word?
  items:
  - question: In the word «яблуко», the letter Я represents...
    options:
    - one sound [а]
    - two sounds [й] + [а]
    - one sound [у]
    correct: 1
  - question: In the word «пісня», the letter Я...
    options:
    - represents two sounds [й] + [а]
    - softens the consonant before it and adds [а]
    - is silent
    correct: 1
  - question: The letter Ї always represents...
    options:
    - one sound [і]
    - two sounds [й] + [і]
    - it depends on position
    correct: 1
- type: match-up
  instruction: Match the Ukrainian word to its English meaning.
  pairs:
  - left: яблуко
    right: apple
  - left: вулиця
    right: street
  - left: молоко
    right: milk
  - left: людина
    right: person
  - left: столиця
    right: capital city
  - left: каша
    right: porridge
- type: anagram
  instruction: Arrange the letters to form a Ukrainian word.
  items:
  - letters:
    - к
    - н
    - и
    - г
    - а
    answer: книга
    hint: You read it — a book
  - letters:
    - к
    - а
    - ш
    - а
    answer: каша
    hint: A warm breakfast — porridge
  - letters:
    - д
    - і
    - м
    answer: дім
    hint: Where you live — house
