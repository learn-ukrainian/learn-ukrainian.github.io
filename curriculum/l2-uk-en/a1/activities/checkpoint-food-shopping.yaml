    - Скільки коштує?
    - Можна меню?
    - Все було дуже смачно!
    correct: 0
  - question: 'You think the price is high:'
    options:
    - Дешево!
    - Дорого!
    - Нормальна ціна.
    - Скільки коштує?
    correct: 1
  - question: 'You ask if a seat is free:'
    options:
    - Рахунок, будь ласка.
    - Можна меню?
    - Тут вільно?
    - Що ви рекомендуєте?
