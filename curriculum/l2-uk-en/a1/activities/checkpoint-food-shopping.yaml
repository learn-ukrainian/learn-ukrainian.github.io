- id: fill-in-dialogue-completion
  type: fill-in
  instruction: Вставте правильне слово (Fill in the correct word)
  items:
  - sentence: — Що ти їш на сніданок? — Я їм ___ і п'ю каву.
    answer: кашу
    options:
    - кашу
    - каша
    - каші
  - sentence: — Потім іду на ринок. Скільки ___ помідори?
    answer: коштують
    options:
    - коштують
    - коштує
    - коштувати
  - sentence: — Тридцять ___.
    answer: гривень
    options:
    - гривень
    - гривні
    - гривня
  - sentence: — Дайте ___ яблук, будь ласка.
    answer: кілограм
    options:
    - кілограм
    - літр
    - пляшку
  - sentence: '— Потім у кафе: ___ борщ і воду, будь ласка.'
    answer: Мені
    options:
    - Мені
    - Я
    - Мене
  - sentence: — Рахунок, будь ласка. Можна ___?
    answer: карткою
    options:
    - карткою
    - картка
    - картки
  - sentence: — О, я бачу ___! Олено, привіт!
    answer: Олену
    options:
    - Олену
    - Олена
    - Олени
  - sentence: — Ти знаєш мого ___?
    answer: брата
    options:
    - брата
    - брат
    - братом
workbook:
- id: match-up-phrases
  type: match-up
  instruction: З'єднайте українські та англійські фрази (Match the Ukrainian and English
    phrases)
  pairs:
  - left: Скільки коштує?
    right: How much does it cost?
  - left: Мені каву, будь ласка.
    right: Coffee for me, please.
  - left: Рахунок, будь ласка.
    right: The bill, please.
  - left: Можна карткою?
    right: Can I pay by card?
  - left: Дайте кілограм.
    right: Give me a kilogram.
  - left: Тут вільно?
    right: Is it free here?
- id: error-correction-cases
  type: error-correction
  instruction: Знайдіть і виправте помилку (Find and fix the error)
  items:
  - sentence: Я їм каша на сніданок.
    error: каша
    correction: кашу
    error_type: word
    options:
    - кашу
    - каші
    - кашею
    explanation: The object of the action requires the accusative case (каша -> кашу).
  - sentence: Я бачу Тарас.
    error: Тарас
    correction: Тараса
    error_type: word
    options:
    - Тараса
    - Тарасу
    - Тарасом
    explanation: Animate masculine nouns take the genitive ending (-а/-я) in the accusative
      case.
  - sentence: Помідори коштують тридцять гривні.
    error: гривні
    correction: гривень
    error_type: word
    options:
    - гривень
    - гривня
    - гривнях
    explanation: Numbers 5 and above take the genitive plural (гривень).
  - sentence: Я п'ю вода з лимоном.
    error: вода
    correction: воду
    error_type: word
    options:
    - воду
    - води
    - водою
    explanation: Feminine inanimate nouns ending in -а change to -у in the accusative
      case.
  - sentence: Я знаю Олена.
    error: Олена
    correction: Олену
    error_type: word
    options:
    - Олену
    - Олени
    - Оленою
    explanation: Animate feminine nouns change -а to -у in the accusative case.
  - sentence: Кава коштує три гривень.
    error: гривень
    correction: гривні
    error_type: word
    options:
    - гривні
    - гривня
    - гривнях
    explanation: Numbers 2, 3, and 4 take the nominative plural (гривні).
- id: true-false-reading
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Анна купує помідори та огірки на ринку.
    correct: true
    explanation: She asks about the price of tomatoes and cucumbers at the market.
  - statement: Помідори коштують сорок гривень.
    correct: false
    explanation: Tomatoes cost 30 hryvnias. Cucumbers cost 40 hryvnias.
  - statement: Анна п'є каву з молоком у кафе.
    correct: false
    explanation: She orders borsch and water with lemon.
  - statement: Анна купує борщ і воду.
    correct: true
    explanation: 'She says: ''Мені борщ і воду з лимоном, будь ласка.'''
  - statement: Олена знає Тараса.
    correct: false
    explanation: 'Olena says: ''Ні, я не знаю Тараса''.'
  - statement: Тарас — це брат Анни.
    correct: true
    explanation: 'Anna asks: ''Ти знаєш мого брата Тараса?'''
- id: order-dialogue
  type: order
  instruction: Розставте речення в правильному порядку (Put the sentences in the correct
