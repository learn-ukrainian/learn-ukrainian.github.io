- id: true-false-accusative
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: У реченні «Я бачу брата» слово «брата» — це знахідний відмінок (accusative
      case).
    correct: true
    explanation: Брат is an animate masculine noun, so it takes -а in the accusative
      case.
  - statement: У реченні «Я п'ю воду» слово «воду» — це називний відмінок (nominative
      case).
    correct: false
    explanation: Вода is nominative, воду is accusative.
  - statement: Слово «борщ» не змінюється у знахідному відмінку, тому що це неістота
      (inanimate).
    correct: true
    explanation: Inanimate masculine nouns do not change in the accusative case.
  - statement: Правильно сказати «Я люблю мама».
    correct: false
    explanation: Мама is feminine and changes to маму in the accusative case.
  - statement: Жіночі імена, як «Олена», змінюють закінчення на -у у знахідному відмінку
      («Олену»).
    correct: true
    explanation: Feminine nouns ending in -а change to -у in the accusative case.
  - statement: Правильно сказати «Скільки коштує помідори?».
    correct: false
    explanation: 'Помідори is plural, so the verb must be plural: коштують.'
  - statement: У реченні «Я їм піцу» слово «піцу» відповідає на питання «що?».
    correct: true
    explanation: Піца is an inanimate object (що?).
  - statement: Слово «друг» у знахідному відмінку буде «друг».
    correct: false
    explanation: Друг is an animate noun, so it changes to друга in the accusative
      case.
  - statement: Щоб запитати про ціну одного яблука, ми кажемо «Скільки коштує яблуко?».
    correct: true
    explanation: Коштує is used for singular subjects.
  - statement: У фразі «кава з молоком» слово «молоком» стоїть у знахідному відмінку.
    correct: false
    explanation: After 'з' (with), we use the instrumental case, not accusative.
