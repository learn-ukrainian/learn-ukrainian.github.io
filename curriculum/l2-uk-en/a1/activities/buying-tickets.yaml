        - 'тиша'
        - 'комфорт'
    - name: 'Плацкарт (Platskart)'
      items:
        - 'відкритий коридор'
        - 'дешевший квиток'
        - 'багато людей'
        - 'спільний простір'
        - 'шум'
        - 'низька ціна'
