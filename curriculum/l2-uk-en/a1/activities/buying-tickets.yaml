- type: fill-in
  title: 'Лексика: У касі та в поїзді'
  instruction: 'Вставте пропущені слова в речення.'
  items:
    - sentence: "Я купую квиток у ___."
      answer: "касі"
      options: ["касі", "магазині", "школі", "парку"]
      explanation: "Квитки продаються в касі."
    - sentence: "Поїзд стоїть на п'ятій ___."
      answer: "платформі"
      options: ["платформі", "вулиці", "кімнаті", "зупинці"]
      explanation: "Поїзди прибувають на платформу."
    - sentence: "Мій ___ номер сім."
      answer: "вагон"
      options: ["вагон", "автобус", "літак", "таксі"]
      explanation: "У поїзді ми шукаємо свій вагон."
    - sentence: "Провідник приносить гарячий ___."
      answer: "чай"
      options: ["чай", "суп", "сік", "хліб"]
      explanation: "Традиційний напій у поїзді — чай."
    - sentence: "Це ___ поїзд до Львова."
      answer: "швидкий"
      options: ["швидкий", "повільний", "старий", "зелений"]
      explanation: "Поїзди бувають швидкі."
    - sentence: "Дивіться на ___."
      answer: "розклад"
      options: ["розклад", "квиток", "двері", "місто"]
      explanation: "На вокзалі ви дивитеся на розклад поїздів."
    - sentence: "У мене є нижнє ___."
      answer: "місце"
      options: ["місце", "ліжко", "крісло", "стілець"]
      explanation: "У поїзді ми займаємо своє місце."
    - sentence: "Це великий ___."
      answer: "вокзал"
      options: ["вокзал", "кіоск", "туалет", "парк"]
      explanation: "Залізнична станція у великому місті — це вокзал."

- type: quiz
  title: 'Культурний контекст'
  instruction: 'Дайте відповідь на запитання про традиції та правила.'
  items:
    - question: 'У чому традиційно подають чай у поїзді?'
      explanation: 'Підстаканник — це металева підставка для склянки, щоб не обпекти руки.'
      options:
        - text: 'у підстаканнику'
          correct: true
        - text: 'у чашці'
          correct: false
        - text: 'у пляшці'
          correct: false
        - text: 'у термосі'
          correct: false
    - question: 'Що означає фраза «В один бік»?'
      explanation: 'Це квиток тільки в напрямку призначення, без повернення.'
      options:
        - text: 'квиток тільки туди'
          correct: true
        - text: 'квиток туди й назад'
          correct: false
        - text: 'квиток на автобус'
          correct: false
        - text: 'квиток зі знижкою'
          correct: false
    - question: 'Яку роботу виконує провідник у вагоні?'
      explanation: 'Провідник перевіряє квитки, видає постіль і чай.'
      options:
        - text: 'перевіряє квитки'
          correct: true
        - text: 'продає квитки'
          correct: false
        - text: 'керує поїздом'
          correct: false
        - text: 'оголошує зупинки'
          correct: false
    - question: 'Що бажають пасажирам перед поїздкою?'
      explanation: 'Традиційне побажання — «Щасливої дороги!».'
      options:
        - text: 'Щасливої дороги!'
          correct: true
        - text: 'Смачного!'
          correct: false
        - text: 'На добраніч!'
          correct: false
        - text: 'Вітаю!'
          correct: false
    - question: 'Де ви чекаєте на маршрутку?'
      explanation: 'Маршрутки можуть зупинятися на маленьких автостанціях або просто на зупинках.'
      options:
        - text: 'на автостанції'
          correct: true
        - text: 'на залізничному вокзалі'
          correct: false
        - text: 'в аеропорту'
          correct: false
        - text: 'у метро'
          correct: false
    - question: 'Який вагон дешевший і менш приватний?'
      explanation: 'Плацкарт — це спільний вагон без дверей, він дешевший за купе.'
      options:
        - text: 'плацкарт'
          correct: true
        - text: 'купе'
          correct: false
        - text: 'люкс'
          correct: false
        - text: 'перший клас'
          correct: false
    - question: 'Чи є їжа в поїзді?'
      explanation: 'Люди часто беруть свою їжу в поїзд.'
      options:
        - text: 'Так, люди часто їдять'
          correct: true
        - text: 'Ні, їсти заборонено'
          correct: false
        - text: 'Тільки в ресторані'
          correct: false
        - text: 'Тільки хліб'
          correct: false
    - question: 'Що це за поїзд, який називається «Інтерсіті»?'
      explanation: 'Інтерсіті — це швидкий поїзд між містами.'
      options:
        - text: 'Швидкий поїзд'
          correct: true
        - text: 'Повільний автобус'
          correct: false
        - text: 'Таксі'
          correct: false
        - text: 'Вантажівка'
          correct: false

- type: unjumble
  title: 'Складіть діалог: У касі'
  instruction: 'Відновіть репліки діалогу.'
  items:
    - words: ["квитків", "немає", "Сьогодні"]
      answer: "Сьогодні квитків немає"
    - words: ["плацкарт", "чи", "хочете", "купе", "Ви"]
      answer: "Ви хочете купе чи плацкарт"
    - words: ["квиток", "коштує", "Скільки", "цей"]
      answer: "Скільки коштує цей квиток"
    - words: ["сьомій", "ранку", "о", "Прибуття"]
      answer: "Прибуття о сьомій ранку"
    - words: ["квитки", "й", "назад", "туди", "Є"]
      answer: "Є квитки туди й назад"
    - words: ["номер", "місце", "Ваше", "дванадцять"]
      answer: "Ваше місце номер дванадцять"

