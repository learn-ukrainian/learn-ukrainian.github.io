- type: quiz
  title: 'Перевірка розуміння: Транспорт'
  instruction: 'Оберіть правильну відповідь на запитання про транспорт в Україні.'
  items:
    - question: 'Що таке «залізничний вокзал» і де він?'
      explanation: 'Вокзал — це велика будівля, головна станція міста. Станція — це менша зупинка.'
      options:
        - text: 'велика головна станція'
          correct: true
        - text: 'маленька зупинка'
          correct: false
        - text: 'автобус'
          correct: false
        - text: 'поїзд'
          correct: false
    - question: 'Який транспорт зазвичай жовтого кольору і менший за автобус?'
      explanation: 'Маршрутка — це популярний в Україні мікроавтобус.'
      options:
        - text: 'маршрутка'
          correct: true
        - text: 'трамвай'
          correct: false
        - text: 'поїзд'
          correct: false
        - text: 'таксі'
          correct: false
    - question: 'Яке слово ми використовуємо, коли їдемо в місто (напрямок)?'
      explanation: 'Для напрямку ми використовуємо прийменник «до» (до Києва).'
      options:
        - text: 'до'
          correct: true
        - text: 'в'
          correct: false
        - text: 'на'
          correct: false
        - text: 'з'
          correct: false
    - question: 'Що означає слово «плацкарт» у поїзді?'
      explanation: 'Плацкарт — це відкритий вагон без дверей між купе.'
      options:
        - text: 'відкритий вагон'
          correct: true
        - text: 'закрите купе'
          correct: false
        - text: 'автобус'
          correct: false
        - text: 'каса'
          correct: false
    - question: 'Хто приносить чай у поїзді?'
      explanation: 'Провідник або провідниця обслуговує пасажирів у вагоні.'
      options:
        - text: 'провідник'
          correct: true
        - text: 'водій'
          correct: false
        - text: 'касир'
          correct: false
        - text: 'пасажир'
          correct: false
    - question: 'Яке місце краще, якщо ви не хочете лізти вгору?'
      explanation: 'Нижнє місце зручніше, бо воно внизу.'
      options:
        - text: 'нижнє'
          correct: true
        - text: 'верхнє'
          correct: false
        - text: 'бічне'
          correct: false
        - text: 'стояче'
          correct: false
    - question: 'Скажіть, де ви зазвичай купуєте квиток?'
      explanation: 'Квитки продаються в касі.'
      options:
        - text: 'у касі'
          correct: true
        - text: 'у парку'
          correct: false
        - text: 'у школі'
          correct: false
        - text: 'у лікарні'
          correct: false
    - question: 'Який поїзд найшвидший в Україні?'
      explanation: 'Інтерсіті — це сучасний швидкісний поїзд.'
      options:
        - text: 'Інтерсіті'
          correct: true
        - text: 'плацкарт'
          correct: false
        - text: 'електричка'
          correct: false
        - text: 'трамвай'
          correct: false

- type: fill-in
  title: 'Граматика: Куди ми їдемо?'
  instruction: 'Доповніть речення правильною формою міста (Родовий відмінок: до...).'
  items:
    - sentence: "Я купую один квиток до ___ (Київ)."
      answer: "Києва"
      options: ["Києва", "Київ", "Київу", "Києві"]
      explanation: "Київ (чоловічий рід, приголосний) -> до Києва."
    - sentence: "Ми їдемо до ___ (Львів)."
      answer: "Львова"
      options: ["Львова", "Львів", "Львову", "Львові"]
      explanation: "Львів -> до Львова."
    - sentence: "Цей поїзд їде до ___ (Одеса)."
      answer: "Одеси"
      options: ["Одеси", "Одеса", "Одесу", "Одесі"]
      explanation: "Одеса (закінчення -а) -> до Одеси."
    - sentence: "Мені потрібен квиток до ___ (Полтава)."
      answer: "Полтави"
      options: ["Полтави", "Полтава", "Полтаву", "Полтаві"]
      explanation: "Полтава -> до Полтави."
    - sentence: "Маршрутка їде до ___ (Умань)."
      answer: "Умані"
      options: ["Умані", "Умань", "Уманю", "Умана"]
      explanation: "Умань (м'який знак) -> до Умані."
    - sentence: "Автобус прямує до ___ (Харків)."
      answer: "Харкова"
      options: ["Харкова", "Харків", "Харкову", "Харкові"]
      explanation: "Харків -> до Харкова."
    - sentence: "Я хочу поїхати до ___ (Житомир)."
      answer: "Житомира"
      options: ["Житомира", "Житомир", "Житомиру", "Житомирі"]
      explanation: "Житомир -> до Житомира."
    - sentence: "Автобус їде до ___ (Вінниця)."
      answer: "Вінниці"
      options: ["Вінниці", "Вінниця", "Вінницю", "Вінницею"]
      explanation: "Вінниця -> до Вінниці."

- type: unjumble
  title: 'Складіть речення: Купівля квитка'
  instruction: 'Розставте слова у правильному порядку, щоб утворити речення.'
  items:
    - words: ["квиток", "Один", "будь ласка"]
      answer: "Один квиток будь ласка"
    - words: ["поїзд", "на", "квиток", "хочу", "Я"]
      answer: "Я хочу квиток на поїзд"
    - words: ["місце", "нижнє", "хочу", "Я", "будь ласка"]
      answer: "Я хочу нижнє місце будь ласка"
    - words: ["відправлення", "котрій", "О", "годині"]
      answer: "О котрій годині відправлення"
    - words: ["каса", "Скажіть", "де", "будь ласка"]
      answer: "Скажіть будь ласка де каса"
    - words: ["на", "Ваш", "платформі", "поїзд", "першій"]
      answer: "Ваш поїзд на першій платформі"

