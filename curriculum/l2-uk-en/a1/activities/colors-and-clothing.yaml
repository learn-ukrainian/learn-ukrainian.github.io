- type: fill-in
  title: "Граматика: Дієслово та Відмінок"
  instruction: "Fill in the blank with the correct verb form or case ending."
  items:
    - sentence: "Я {{answer}} білу сорочку."
      answer: "ношу"
      options: ["ношу", "носиш", "носить", "носимо"]
      explanation: "First person singular of носити is ношу."
    - sentence: "Вона носить {{answer}} сукню."
      answer: "червону"
      options: ["червону", "червона", "червоний", "червоне"]
      explanation: "Accusative case for feminine adjective: червона -> червону."
    - sentence: "Ми {{answer}} джинси."
      answer: "носимо"
      options: ["носимо", "ношу", "носиш", "носять"]
      explanation: "We (ми) -> носимо."
    - sentence: "Ти маєш {{answer}} куртку."
      answer: "нову"
      options: ["нову", "нова", "новий", "нове"]
      explanation: "Accusative case for feminine adjective: нова -> нову."
    - sentence: "Він {{answer}} чорний костюм."
      answer: "носить"
      options: ["носить", "ношу", "носиш", "носять"]
      explanation: "He (він) -> носить."
    - sentence: "Я купую {{answer}} штани."
      answer: "сині"
      options: ["сині", "синій", "синю", "синє"]
      explanation: "Plural adjectives do not change in Accusative Inanimate."
    - sentence: "Ви {{answer}} окуляри."
      answer: "носите"
      options: ["носите", "ношу", "носиш", "носять"]
      explanation: "You (plural/formal) -> носите."
    - sentence: "Вони мають {{answer}} машину."
      answer: "чорну"
      options: ["чорну", "чорна", "чорний", "чорне"]
      explanation: "Accusative case for feminine adjective: чорна -> чорну."

