- type: quiz
  title: "Який це колір? (Узгодження)"
  instruction: "Choose the correct form of the adjective to match the noun."
  items:
    - question: "Скажіть, будь ласка, якого кольору цей автобус?"
      explanation: "Автобус is masculine, so we use the ending -ий."
      options:
        - text: "червоний"
          correct: true
        - text: "червона"
          correct: false
        - text: "червоне"
          correct: false
        - text: "червоні"
          correct: false
    - question: "Скажіть, будь ласка, якого кольору ця машина?"
      explanation: "Машина is feminine, so we use the ending -а."
      options:
        - text: "зелена"
          correct: true
        - text: "зелений"
          correct: false
        - text: "зелене"
          correct: false
        - text: "зелені"
          correct: false
    - question: "Скажіть, будь ласка, якого кольору це яблуко?"
      explanation: "Яблуко is neuter, so we use the ending -е."
      options:
        - text: "жовте"
          correct: true
        - text: "жовтий"
          correct: false
        - text: "жовта"
          correct: false
        - text: "жовті"
          correct: false
    - question: "Скажіть, будь ласка, якого кольору ці штани?"
      explanation: "Штани is plural, so we use the ending -і."
      options:
        - text: "чорні"
          correct: true
        - text: "чорний"
          correct: false
        - text: "чорна"
          correct: false
        - text: "чорне"
          correct: false
    - question: "Скажіть, будь ласка, якого кольору ця сукня?"
      explanation: "Сукня is feminine. Синій is a soft adjective, so feminine is синя."
      options:
        - text: "синя"
          correct: true
        - text: "синій"
          correct: false
        - text: "синє"
          correct: false
        - text: "сині"
          correct: false
    - question: "Скажіть, будь ласка, якого кольору цей папір?"
      explanation: "Папір is masculine, so we use the standard form білий."
      options:
        - text: "білий"
          correct: true
        - text: "біла"
          correct: false
        - text: "біле"
          correct: false
        - text: "білі"
          correct: false
    - question: "Скажіть, будь ласка, якого кольору ця куртка?"
      explanation: "Куртка is feminine."
      options:
        - text: "червона"
          correct: true
        - text: "червоний"
          correct: false
        - text: "червоне"
          correct: false
        - text: "червоні"
          correct: false
    - question: "Скажіть, будь ласка, якого кольору ці окуляри?"
      explanation: "Окуляри is plural."
      options:
        - text: "чорні"
          correct: true
        - text: "чорний"
          correct: false
        - text: "чорна"
          correct: false
        - text: "чорне"
          correct: false

- type: fill-in
  title: "Оберіть правильне закінчення"
  instruction: "Complete the sentence with the correctly agreed adjective."
  items:
    - sentence: "Це {{answer}} сорочка."
      answer: "червона"
      options: ["червона", "червоний", "червоне", "червоні"]
      explanation: "Сорочка is feminine."
    - sentence: "Це {{answer}} светр."
      answer: "синій"
      options: ["синій", "синя", "синє", "сині"]
      explanation: "Светр is masculine."
    - sentence: "Це {{answer}} окуляри."
      answer: "чорні"
      options: ["чорні", "чорний", "чорна", "чорне"]
      explanation: "Окуляри is plural."
    - sentence: "Це {{answer}} вікно."
      answer: "біле"
      options: ["біле", "білий", "біла", "білі"]
      explanation: "Вікно is neuter."
    - sentence: "Це {{answer}} куртка."
      answer: "зелена"
      options: ["зелена", "зелений", "зелене", "зелені"]
      explanation: "Куртка is feminine."
    - sentence: "Це {{answer}} штани."
      answer: "нові"
      options: ["нові", "новий", "нова", "нове"]
      explanation: "Штани is plural."
    - sentence: "Це {{answer}} сукня."
      answer: "нова"
      options: ["нова", "новий", "нове", "нові"]
      explanation: "Сукня is feminine."
    - sentence: "Це {{answer}} взуття."
      answer: "зручне"
      options: ["зручне", "зручний", "зручна", "зручні"]
      explanation: "Взуття is neuter."

