- type: group-sort
  title: "Sort by Gender"
  instruction: "Sort the clothing and related words into the correct gender or plural category."
  groups:
    - name: "Feminine"
      items:
        - "сорочка"
        - "сукня"
        - "куртка"
    - name: "Masculine & Neuter"
      items:
        - "светр"
        - "плаття"
        - "колір"
        - "магазин"
    - name: "Always Plural"
      items:
        - "штани"
        - "окуляри"
        - "джинси"
- type: quiz
  title: "Choose the Correct Ending"
  instruction: "Select the color word that correctly matches the gender of the clothing."
  items:
    - question: "Подивіться, будь ласка! Це _____ сорочка."
      explanation: "'Сорочка' is feminine, so the adjective must end in -а."
      options:
        - text: "біла"
          correct: true
        - text: "білий"
          correct: false
        - text: "біле"
          correct: false
        - text: "білі"
          correct: false
    - question: "Скажіть, якого кольору цей _____ светр."
      explanation: "'Светр' is masculine, so the adjective takes a masculine ending."
      options:
        - text: "чорний"
          correct: true
        - text: "чорна"
          correct: false
        - text: "чорне"
          correct: false
        - text: "чорні"
          correct: false
    - question: "Ось лежить дуже гарне _____ плаття."
      explanation: "'Плаття' is neuter, so the adjective must end in -е."
      options:
        - text: "червоне"
          correct: true
        - text: "червоний"
          correct: false
        - text: "червона"
          correct: false
        - text: "червоні"
          correct: false
    - question: "Мені дуже подобається ця _____ куртка."
      explanation: "'Куртка' is feminine, so it takes the feminine ending -я."
      options:
        - text: "синя"
          correct: true
        - text: "синій"
          correct: false
        - text: "синє"
          correct: false
        - text: "сині"
          correct: false
    - question: "У магазині є ці _____ штани."
      explanation: "'Штани' is plural, so the adjective takes the plural ending -і."
      options:
        - text: "зелені"
          correct: true
        - text: "зелений"
          correct: false
        - text: "зелена"
          correct: false
        - text: "зелене"
          correct: false
    - question: "Подивіться, ось мої нові _____ джинси."
      explanation: "'Джинси' is always plural."
      options:
        - text: "сині"
          correct: true
        - text: "синя"
          correct: false
        - text: "синє"
          correct: false
        - text: "синій"
          correct: false
    - question: "Скільки коштує ця гарна _____ сукня?"
      explanation: "'Сукня' is feminine, so it needs the -а ending."
      options:
        - text: "жовта"
          correct: true
        - text: "жовтий"
          correct: false
        - text: "жовте"
          correct: false
        - text: "жовті"
          correct: false
    - question: "Я бачу велике _____ вікно там."
      explanation: "'Вікно' is neuter, requiring the -е ending."
      options:
        - text: "чорне"
          correct: true
        - text: "чорна"
          correct: false
        - text: "чорний"
          correct: false
        - text: "чорні"
          correct: false
- type: true-false
  title: "Culture & Rules"
  instruction: "Decide if these statements are true or false based on the lesson."
  items:
    - statement: "The color red (червоний) symbolizes life and love in traditional Ukrainian embroidery."
      correct: true
      explanation: "Red threads often symbolize life, energy, and love."
    - statement: "The color black (чорний) in embroidery usually represents the sky."
      correct: false
      explanation: "Black represents the rich, fertile earth of Ukraine."
    - statement: "The word 'сукня' is a masculine noun."
      correct: false
      explanation: "'Сукня' ends in -я, which makes it feminine."
    - statement: "The word 'штани' (pants) is always plural in Ukrainian, just like in English."
      correct: true
      explanation: "It is a 'Pluralia Tantum' word."
    - statement: "The ending '-е' is used for masculine color adjectives."
      correct: false
      explanation: "The ending '-е' is for neuter nouns. Masculine takes '-ий'."
    - statement: "A traditional Ukrainian embroidered shirt is called a 'вишиванка'."
      correct: true
      explanation: "The vyshyvanka is a culturally significant embroidered shirt."
    - statement: "You use 'светр' with feminine adjectives."
      correct: false
      explanation: "'Светр' ends in a consonant and is masculine."
    - statement: "The word 'окуляри' (glasses) is treated as a plural word."
      correct: true
      explanation: "Like pants and jeans, glasses are always plural."
- type: fill-in
  title: "Complete the Sentences"
  instruction: "Select the correct word to fill in the blank."
  items:
    - sentence: "Це _____ сорочка."
      answer: "біла"
      options:
        - "біла"
        - "білий"
        - "біле"
        - "білі"
      explanation: "Сорочка is feminine."
    - sentence: "Ось _____ куртка."
      answer: "червона"
      options:
        - "червона"
        - "червоний"
        - "червоне"
        - "червоні"
      explanation: "Куртка is feminine."
    - sentence: "Це _____ светр."
      answer: "синій"
      options:
        - "синій"
        - "синя"
        - "синє"
        - "сині"
      explanation: "Светр is masculine."
    - sentence: "_____ коштує ця сорочка?"
      answer: "Скільки"
      options:
        - "Скільки"
        - "Як"
        - "Хто"
        - "Що"
      explanation: "'Скільки коштує' means 'How much does it cost'."
    - sentence: "Мені _____ цей колір."
      answer: "подобається"
      options:
        - "подобається"
        - "добре"
        - "дуже"
        - "дякую"
      explanation: "'Мені подобається' means 'I like'."
    - sentence: "Ось чорні _____."
      answer: "штани"
      options:
        - "штани"
        - "сукня"
        - "сорочка"
        - "светр"
      explanation: "'Чорні' is plural, so it must go with the plural noun 'штани'."
    - sentence: "Це дуже _____ магазин."
      answer: "гарний"
      options:
        - "гарний"
        - "гарна"
        - "гарне"
        - "гарні"
      explanation: "Магазин is masculine."
    - sentence: "Це _____ нові окуляри."
      answer: "мої"
      options:
        - "мої"
        - "мій"
        - "моя"
        - "моє"
      explanation: "Окуляри is plural, so it requires the plural word 'мої'."
