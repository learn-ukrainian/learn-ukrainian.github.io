- type: fill-in
  title: "Complete the Dialogue"
  instruction: "Fill in the missing words."
  items:
    - sentence: "- Добрий день! - ___ день!"
      answer: "Добрий"
      options: ["Добрий", "Поганий", "Гарний", "Привіт"]
      explanation: "Standard greeting."
    - sentence: "- Чи є у вас ___ сорочка?"
      answer: "червона"
      options: ["червона", "червоний", "червоне", "червоні"]
      explanation: "Feminine."
    - sentence: "- Так, ___ ця сорочка."
      answer: "ось"
      options: ["ось", "тут", "там", "це"]
      explanation: "Here is."
    - sentence: "- Який це ___?"
      answer: "розмір"
      options: ["розмір", "колір", "ціна", "стиль"]
      explanation: "Asking for size."
    - sentence: "- Це розмір ___."
      answer: "М"
      options: ["М", "Так", "Ні", "Є"]
      explanation: "Size M."
    - sentence: "- Скільки ___?"
      answer: "коштує"
      options: ["коштує", "коштують", "ціна", "гроші"]
      explanation: "Singular verb."
    - sentence: "- Вона коштує 500 ___."
      answer: "гривень"
      options: ["гривень", "доларів", "євро", "фунтів"]
      explanation: "Ukrainian currency."
    - sentence: "- Дякую! - ___ ласка!"
      answer: "Будь"
      options: ["Будь", "Прошу", "Вибачте", "Так"]
      explanation: "You are welcome."
    - sentence: "- Чи є у вас сині ___?"
      answer: "джинси"
      options: ["джинси", "штани", "окуляри", "шорти"]
      explanation: "Jeans."
    - sentence: "- Скільки ___ ці джинси?"
      answer: "коштують"
      options: ["коштують", "коштує", "ціна", "гроші"]
      explanation: "Plural verb."
    - sentence: "- Вони ___ 1000 гривень."
      answer: "коштують"
      options: ["коштують", "коштує", "мають", "є"]
      explanation: "They cost."
    - sentence: "- Я ___ їх."
      answer: "купую"
      options: ["купую", "беру", "хочу", "маю"]
      explanation: "I buy."
