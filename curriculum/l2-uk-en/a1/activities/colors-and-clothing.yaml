- type: fill-in
  title: "Accusative Case"
  instruction: "Choose the correct form."
  items:
    - sentence: "Я ношу ___ (сорочка)."
      answer: "сорочку"
      options: ["сорочку", "сорочка", "сорочки", "сорочці"]
      explanation: "Accusative feminine."
    - sentence: "Я ношу ___ (светр)."
      answer: "светр"
      options: ["светр", "светра", "светру", "светри"]
      explanation: "Accusative masculine inanimate (no change)."
    - sentence: "Я ношу ___ (сукня)."
      answer: "сукню"
      options: ["сукню", "сукня", "сукні", "сукнею"]
      explanation: "Accusative feminine (-я -> -ю)."
    - sentence: "Я ношу ___ (куртка)."
      answer: "куртку"
      options: ["куртку", "куртка", "куртки", "куртці"]
      explanation: "Accusative feminine."
    - sentence: "Він носить ___ (окуляри)."
      answer: "окуляри"
      options: ["окуляри", "окулярів", "окулярами", "окулярах"]
      explanation: "Plural inanimate (no change)."
    - sentence: "Вона носить ___ (джинси)."
      answer: "джинси"
      options: ["джинси", "джинсів", "джинсами", "джинсах"]
      explanation: "Plural inanimate (no change)."
    - sentence: "Ми носимо ___ (одяг)."
      answer: "одяг"
      options: ["одяг", "одягу", "одягом", "одязі"]
      explanation: "Masculine inanimate (no change)."
    - sentence: "Я купую ___ (вишиванка)."
      answer: "вишиванку"
      options: ["вишиванку", "вишиванка", "вишиванки", "вишиванці"]
      explanation: "Accusative feminine."
    - sentence: "Я бачу ___ (магазин)."
      answer: "магазин"
      options: ["магазин", "магазина", "магазину", "магазини"]
      explanation: "Masculine inanimate."
    - sentence: "Я бачу ___ (дівчина)."
      answer: "дівчину"
      options: ["дівчину", "дівчина", "дівчини", "дівчині"]
      explanation: "Feminine animate (-а -> -у)."
    - sentence: "Він має ___ (машина)."
      answer: "машину"
      options: ["машину", "машина", "машини", "машині"]
      explanation: "Accusative feminine."
    - sentence: "Вона має ___ (телефон)."
      answer: "телефон"
      options: ["телефон", "телефона", "телефону", "телефони"]
      explanation: "Masculine inanimate."

- type: true-false
  title: "Shopping Etiquette"
  instruction: "True or False?"
  items:
    - statement: "You can ask 'Скільки коштує?' for price."
      correct: true
      explanation: "Correct phrase."
    - statement: "You say 'Скільки коштують' for plural items like jeans."
      correct: true
      explanation: "Plural verb for plural noun."
    - statement: "To ask for size, say 'Який це колір?'"
      correct: false
      explanation: "That means 'What color is this?'."
    - statement: "'Чи є у вас...?' implies 'Do you have...?'"
      correct: true
      explanation: "Standard polite question."
    - statement: "You use 'Це' for plural items like pants."
      correct: false
      explanation: "Use 'Ці' for plural items."
    - statement: "Masculine adjectives end in -ий."
      correct: true
      explanation: "Standard masculine ending."
    - statement: "Feminine adjectives end in -е."
      correct: false
      explanation: "Feminine ends in -а."
    - statement: "Neuter adjectives end in -е."
      correct: true
      explanation: "Standard neuter ending."
    - statement: "Soft masculine adjectives end in -ій (like синій)."
      correct: true
      explanation: "Soft stem rule."
    - statement: "Soft feminine adjectives end in -я (like синя)."
      correct: true
      explanation: "Soft stem rule."
    - statement: "The verb 'носити' means 'to buy'."
      correct: false
      explanation: "It means 'to wear'."
    - statement: "Vyshyvanka is a traditional shirt."
      correct: true
      explanation: "Cultural fact."

