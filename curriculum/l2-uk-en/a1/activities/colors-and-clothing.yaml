- type: fill-in
  title: "Gender Agreement"
  instruction: "Choose the correct ending."
  items:
    - sentence: "Це біл__ сорочка."
      answer: "біла"
      options: ["біла", "білий", "біле", "білі"]
      explanation: "Feminine."
    - sentence: "Це чорн__ светр."
      answer: "чорний"
      options: ["чорний", "чорна", "чорне", "чорні"]
      explanation: "Masculine."
    - sentence: "Це червон__ яблуко."
      answer: "червоне"
      options: ["червоне", "червона", "червоний", "червоні"]
      explanation: "Neuter."
    - sentence: "Це син__ джинси."
      answer: "сині"
      options: ["сині", "синій", "синя", "синє"]
      explanation: "Plural."
    - sentence: "Це зелен__ куртка."
      answer: "зелена"
      options: ["зелена", "зелений", "зелене", "зелені"]
      explanation: "Feminine."
    - sentence: "Це жовт__ сонце."
      answer: "жовте"
      options: ["жовте", "жовтий", "жовта", "жовті"]
      explanation: "Neuter."
    - sentence: "Це нов__ штани."
      answer: "нові"
      options: ["нові", "новий", "нова", "нове"]
      explanation: "Plural."
    - sentence: "Це гарн__ сукня."
      answer: "гарна"
      options: ["гарна", "гарний", "гарне", "гарні"]
      explanation: "Feminine."
    - sentence: "Це велик__ розмір."
      answer: "великий"
      options: ["великий", "велика", "велике", "великі"]
      explanation: "Masculine."
    - sentence: "Це мал__ вікно."
      answer: "мале"
      options: ["мале", "малий", "мала", "малі"]
      explanation: "Neuter."
    - sentence: "Це тепл__ светр."
      answer: "теплий"
      options: ["теплий", "тепла", "тепле", "теплі"]
      explanation: "Masculine."
    - sentence: "Це добр__ людина."
      answer: "добра"
      options: ["добра", "добрий", "добре", "добрі"]
      explanation: "Feminine."

