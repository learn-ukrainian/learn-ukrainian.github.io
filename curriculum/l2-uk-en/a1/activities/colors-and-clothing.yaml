- type: true-false
  title: True or False
  instruction: Test your knowledge of Ukrainian culture and grammar rules.
  items:
    - statement: The red color in traditional Ukrainian embroidery symbolizes life and love.
      correct: true
      explanation: Red is constantly seen in folklore and brings vibrant energy.
    - statement: The black color in Ukrainian culture represents sadness and death.
      correct: false
      explanation: Black beautifully represents fertile earth, wisdom, and wealth.
    - statement: The white color in Ukrainian tradition represents purity and the divine world.
      correct: true
      explanation: White is a sign of purity, like in the phrase білий світ.
    - statement: Words like штани and окуляри are always plural in Ukrainian.
      correct: true
      explanation: These are Pluralia Tantum words and only exist in plural form.
    - statement: The color синій (blue) uses the hard endings like -ий and -а.
      correct: false
      explanation: Синій belongs to the soft group and takes softer endings like -ій, -я, -є.
    - statement: Borrowed colors like бордо and беж never change their endings.
      correct: true
      explanation: These foreign words stay exactly the same regardless of the noun's gender.
    - statement: To say one pair of pants, you use the singular form один штани.
      correct: false
      explanation: Because штани is always plural, you must use the plural form одні штани.
    - statement: When you use the verb носити (to wear), feminine nouns ending in -а change to -у.
      correct: true
      explanation: This is the Accusative case pattern you use when describing what someone is wearing.

- type: quiz
  title: 'Using the Verb To Wear'
  instruction: Choose the correct translation or form.
  items:
    - question: "How do you say 'I wear a white shirt'?"
      explanation: Сорочка is feminine, so біла сорочка becomes білу сорочку.
      options:
        - text: Я ношу білу сорочку.
          correct: true
        - text: Я ношу біла сорочка.
          correct: false
        - text: Я ношу білий сорочка.
          correct: false
        - text: Я ношу біле сорочка.
          correct: false
    - question: "How do you say 'I wear a red dress'?"
      explanation: Сукня is feminine and ends in -я, so it changes to -ю.
      options:
        - text: Я ношу червону сукню.
          correct: true
        - text: Я ношу червона сукня.
          correct: false
        - text: Я ношу червоний сукня.
          correct: false
        - text: Я ношу червоне сукня.
          correct: false
    - question: "How do you say 'I wear blue jeans'?"
      explanation: Plural words like джинси do not change their familiar endings here.
      options:
        - text: Я ношу сині джинси.
          correct: true
        - text: Я ношу сині джинсу.
          correct: false
        - text: Я ношу синю джинси.
          correct: false
        - text: Я ношу синя джинси.
          correct: false
    - question: "How do you say 'I wear a black jacket'?"
      explanation: Куртка is feminine, so it becomes куртку.
      options:
        - text: Я ношу чорну куртку.
          correct: true
        - text: Я ношу чорна куртка.
          correct: false
        - text: Я ношу чорний куртка.
          correct: false
        - text: Я ношу чорне куртка.
          correct: false
    - question: 'Please translate this phrase into English: Це мій розмір.'
      explanation: This is a useful phrase when shopping for clothes.
      options:
        - text: It is my size.
          correct: true
        - text: That is my color.
          correct: false
        - text: I wear these pants.
          correct: false
        - text: These are my pants.
          correct: false
    - question: 'Please translate this phrase into English: Це гарний колір.'
      explanation: This phrase expresses that you like something.
      options:
        - text: It is a beautiful color.
          correct: true
        - text: I wear this color.
          correct: false
        - text: This color is new.
          correct: false
        - text: The color is mine.
          correct: false
    - question: Яке з цих українських речень є граматично правильним?
      explanation: Плаття is neuter, so both the adjective and noun keep their basic neuter forms.
      options:
        - text: Я ношу зелене плаття.
          correct: true
        - text: Я ношу зелена плаття.
          correct: false
        - text: Я ношу зелений плаття.
          correct: false
        - text: Я ношу зелену плаття.
          correct: false
    - question: Яке з цих речень про одяг є граматично правильним?
      explanation: Светр is masculine, so both the adjective and noun keep their basic masculine forms.
      options:
        - text: Я ношу чорний светр.
          correct: true
        - text: Я ношу чорну светр.
          correct: false
        - text: Я ношу чорна светр.
          correct: false
        - text: Я ношу чорне светр.
          correct: false

