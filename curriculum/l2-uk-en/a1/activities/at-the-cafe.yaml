- type: group-sort
  instruction: Як змінюються ці слова у знахідному відмінку? (How do these words change
    in the Accusative case?)
  groups:
  - label: Змінюють закінчення на -у (Change ending to -у)
    items:
    - кава
    - вода
    - піца
    - картка
  - label: Не змінюються (Do not change)
    items:
    - чай
    - борщ
    - кафе
    - меню
    - тістечко
    - рахунок
- type: error-correction
  instruction: Знайдіть і виправте помилку (Find and correct the error)
  items:
  - sentence: Мені вода, будь ласка.
    error: вода
    correction: воду
    error_type: word
    options:
    - воду
    - воді
    - водою
    explanation: Use the Accusative case for the object you are ordering (вода ->
      воду).
  - sentence: Я буду піца і чай.
    error: піца
    correction: піцу
    error_type: word
    options:
    - піцу
    - піці
    - піцою
    explanation: Піца is a feminine noun and changes to піцу in the Accusative case.
  - sentence: Я хочу кава з молоком.
    error: кава
    correction: каву
    error_type: word
    options:
    - каву
    - каві
    - кавою
    explanation: Use the Accusative case for the direct object you want (кава -> каву).
  - sentence: Я заказую піцу.
    error: заказую
    correction: замовляю
    error_type: word
    options:
    - замовляю
    - рекомендую
    - читаю
    explanation: Use the correct Ukrainian verb 'замовляти' instead of the Russian
      calque 'заказати'.
  - sentence: Ми в ресторан.
    error: ресторан
    correction: ресторані
    error_type: word
    options:
    - ресторані
    - ресторану
    - рестораном
    explanation: Location requires the Locative case (в ресторані).
  - sentence: Можна мені рахунку, будь ласка?
    error: рахунку
    correction: рахунок
    error_type: word
    options:
    - рахунок
    - рахунка
    - рахунком
    explanation: Рахунок is an inanimate masculine noun, so its Accusative form is
      the same as the Nominative (рахунок).
