- type: quiz
  title: "Ordering Etiquette & Grammar"
  instruction: "Choose the correct option for each situation."
  items:
    - question: "How do you politely say 'I want coffee'?"
      explanation: "«Я буду» (I will have) is polite. «Я хочу» sounds demanding."
      options:
        - text: "Я буду каву."
          correct: true
        - text: "Я хочу каву."
          correct: false
        - text: "Кава мені."
          correct: false
        - text: "Я люблю каву."
          correct: false
    - question: "Which form of address should you use with a waiter?"
      explanation: "Always use «Ви» (formal you) with service staff to show respect."
      options:
        - text: "Ви"
          correct: true
        - text: "Ти"
          correct: false
        - text: "Ми"
          correct: false
        - text: "Вони"
          correct: false
    - question: "What is the correct Accusative form of «кава» in «Я буду...»?"
      explanation: "Feminine nouns ending in -а change to -у in the Accusative case."
      options:
        - text: "каву"
          correct: true
        - text: "кава"
          correct: false
        - text: "кави"
          correct: false
        - text: "каві"
          correct: false
    - question: "What is the correct Accusative form of «чай» in «Я буду...»?"
      explanation: "Inanimate masculine nouns do not change in the Accusative case."
      options:
        - text: "чай"
          correct: true
        - text: "чаю"
          correct: false
        - text: "чая"
          correct: false
        - text: "чаї"
          correct: false
    - question: "What does «без цукру» mean?"
      explanation: "«Без» means without."
      options:
        - text: "without sugar"
          correct: true
        - text: "with sugar"
          correct: false
        - text: "extra sugar"
          correct: false
        - text: "sweet"
          correct: false
    - question: "What is the meaning of the word «рахунок»?"
      explanation: "«Рахунок» is the bill you ask for to pay. «Чек» is the receipt."
      options:
        - text: "the bill"
          correct: true
        - text: "the receipt"
          correct: false
        - text: "the menu"
          correct: false
        - text: "the order"
          correct: false
    - question: "How do you pay «готівкою»?"
      explanation: "«Готівка» means cash."
      options:
        - text: "with cash"
          correct: true
        - text: "with a card"
          correct: false
        - text: "online"
          correct: false
        - text: "later"
          correct: false
    - question: "What is the standard polite greeting in a café?"
      explanation: "«Добрий день» is the standard polite greeting."
      options:
        - text: "Добрий день"
          correct: true
        - text: "Па-па"
          correct: false
        - text: "Бувай"
          correct: false
        - text: "Дякую"
          correct: false
    - question: "Which verb means 'Give' (polite)?"
      explanation: "«Дайте» is the polite imperative for 'Give'."
      options:
        - text: "Дайте"
          correct: true
        - text: "Дай"
          correct: false
        - text: "Давати"
          correct: false
        - text: "Даємо"
          correct: false
    - question: "Which verb means 'Bring' (polite)?"
      explanation: "«Принесіть» is the polite imperative for 'Bring'."
      options:
        - text: "Принесіть"
          correct: true
        - text: "Принести"
          correct: false
        - text: "Принеси"
          correct: false
        - text: "Несіть"
          correct: false
    - question: "How do you say 'Black coffee' (Accusative)?"
      explanation: "Since «кава» becomes «каву» (feminine Accusative), the adjective «чорна» must become «чорну»."
      options:
        - text: "чорну каву"
          correct: true
        - text: "чорна кава"
          correct: false
        - text: "чорний каву"
          correct: false
        - text: "чорне каву"
          correct: false
    - question: "How do you say 'Green tea' (Accusative)?"
      explanation: "«Чай» is masculine and does not change, so the adjective «зелений» also stays the same."
      options:
        - text: "зелений чай"
          correct: true
        - text: "зелену чай"
          correct: false
        - text: "зеленого чай"
          correct: false
        - text: "зеленим чай"
          correct: false

- type: fill-in
  title: "Accusative Case Drill"
  instruction: "Complete the sentences by putting the word in brackets into the correct form. Remember: Feminine -а/-я → -у/-ю, Masculine/Neuter → No Change."
  items:
    - sentence: "Я буду {{answer}}."
      answer: "воду"
      explanation: "Вода (feminine) changes to Воду."
      options: ["воду", "вода", "води", "воді"]
    - sentence: "Дайте, будь ласка, {{answer}}."
      answer: "каву"
      explanation: "Кава (feminine) changes to Каву."
      options: ["каву", "кава", "кави", "каві"]
    - sentence: "Я замовлю {{answer}}."
      answer: "піцу"
      explanation: "Піца (feminine) changes to Піцу."
      options: ["піцу", "піца", "піци", "піці"]
    - sentence: "Мені {{answer}}, будь ласка."
      answer: "чай"
      explanation: "Чай (masculine) does not change."
      options: ["чай", "чаю", "чая", "чаї"]
    - sentence: "Я буду {{answer}}."
      answer: "сік"
      explanation: "Сік (masculine) does not change."
      options: ["сік", "соку", "сока", "соки"]
    - sentence: "Принесіть {{answer}}."
      answer: "меню"
      explanation: "Меню (neuter/indeclinable) does not change."
      options: ["меню", "менюю", "меня", "мені"]
    - sentence: "Я візьму {{answer}}."
      answer: "круасан"
      explanation: "Круасан (masculine) does not change."
      options: ["круасан", "круасана", "круасану", "круасани"]
    - sentence: "Я буду {{answer}} каву."
      answer: "велику"
      explanation: "Велика (feminine adj) changes to Велику to match Каву."
      options: ["велику", "велика", "великий", "велике"]
    - sentence: "Дайте {{answer}} воду."
      answer: "смачну"
      explanation: "Смачна (feminine adj) changes to Смачну to match Воду."
      options: ["смачну", "смачна", "смачний", "смачне"]
    - sentence: "Я буду {{answer}} каву."
      answer: "чорну"
      explanation: "Чорна (feminine adj) changes to Чорну."
      options: ["чорну", "чорна", "чорний", "чорне"]
    - sentence: "Мені {{answer}} чай."
      answer: "зелений"
      explanation: "Зелений (masculine adj) does not change because Чай does not change."
      options: ["зелений", "зелену", "зелена", "зелене"]
    - sentence: "Я замовлю {{answer}} тістечко."
      answer: "шоколадне"
      explanation: "Шоколадне (neuter adj) does not change."
      options: ["шоколадне", "шоколадна", "шоколадний", "шоколадну"]

- type: unjumble
  title: "Building Polite Sentences"
  instruction: "Rearrange the words to form correct polite sentences."
  items:
