- type: true-false
  title: "True or False: Etiquette & Culture"
  instruction: "Decide if the statements about Ukrainian café culture and grammar are true or false."
  items:
    - statement: "«Я хочу» is the most polite way to order in a café."
      correct: false
      explanation: "«Я хочу» implies a demand. Use «Я буду» or «Мені, будь ласка»."
    - statement: "You should use «Ти» with waiters who look young."
      correct: false
      explanation: "Always use «Ви» with staff to show professional respect."
    - statement: "«Рахунок» is the bill you ask for when you want to pay."
      correct: true
      explanation: "Correct. «Чек» is the receipt you get afterwards."
    - statement: "«Чек» is the paper you get after you have paid."
      correct: true
      explanation: "Correct."
    - statement: "It is polite to leave a 10% tip («чайові») if you liked the service."
      correct: true
      explanation: "10% is standard for good service."
    - statement: "The word «кава» changes to «каву» when you order it."
      correct: true
      explanation: "Feminine nouns change in the Accusative case."
    - statement: "The word «чай» changes to «чаю» when you order it."
      correct: false
      explanation: "Masculine inanimate nouns like «чай» do not change."
    - statement: "In Ukraine, drinking coffee is often a slow, social ritual."
      correct: true
      explanation: "Café culture emphasizes relaxing and socializing."
    - statement: "It is rude to sit in a café for more than 20 minutes."
      correct: false
      explanation: "Cafés are 'third spaces' where people often linger, work, or talk for hours."
    - statement: "«Тістечко» is a feminine noun."
      correct: false
      explanation: "«Тістечко» ends in -о, so it is Neuter."
    - statement: "«Добрий день» is a standard polite greeting."
      correct: true
      explanation: "It works in almost any situation."
    - statement: "«На все добре» is a rude way to say goodbye."
      correct: false
      explanation: "It is a very polite way to say 'All the best'."

