workbook:
- type: true-false
  instruction: Правда чи ні? (True or False?)
  items:
  - statement: У кафе завжди автоматично приносять рахунок.
    correct: false
    explanation: In a formal cafe, the waiter rarely brings the bill automatically
      so you do not feel rushed.
  - statement: «Заказати» — це правильне українське слово.
    correct: false
    explanation: Always use the verb 'замовляти' to order. 'Заказати' is a Russian
      calque and is incorrect in modern standard Ukrainian.
  - statement: Слово «кафе» не змінює своє закінчення.
    correct: true
    explanation: It is an indeclinable foreign word, so the ending never changes.
  - statement: В Україні рідко можна платити карткою.
    correct: false
    explanation: Ukraine has one of the highest rates of contactless payment in Europe.
  - statement: Щоб попросити меню, можна сказати «Можна меню?».
    correct: true
    explanation: This is the polite and standard way to ask for the menu.
  - statement: Чайові часто складають 10%.
    correct: true
    explanation: Leaving a 10% tip is standard for good service.
