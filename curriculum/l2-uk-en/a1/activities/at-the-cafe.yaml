    - рекомендуєте
    - коштуєте
    - платите
  - sentence: — Борщ дуже ____.
    answer: смачний
    options:
    - смачний
    - гострий
    - вільний
  - sentence: — Добре, ____ борщ і хліб, будь ласка.
    answer: мені
    options:
    - мені
    - я
    - мене
  - sentence: — А що будете ____?
    answer: пити
    options:
    - пити
    - їсти
    - читати
  - sentence: — Каву з молоком. — Добре, одну ____.
    answer: хвилинку
    options:
