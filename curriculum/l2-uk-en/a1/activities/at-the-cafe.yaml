- id: true-false-cafe-culture
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Ми кажемо «заказати», коли хочемо їсти в кафе.
    correct: false
    explanation: Треба казати «замовляти» (to order). «Заказати» — це русизм.
  - statement: Слово «кафе» не змінюється (is indeclinable).
    correct: true
    explanation: Слова «кафе» і «меню» не змінюють свої закінчення.
  - statement: «Рахунок, будь ласка» означає «The bill, please».
    correct: true
  - statement: Коли ви хочете запитати ціну, ви кажете «Тут вільно?».
    correct: false
    explanation: Ви маєте сказати «Скільки коштує?». «Тут вільно?» = Is this seat
      free?
  - statement: Ми залишаємо чайові (tips) в кафе і ресторанах.
    correct: true
  - statement: Слово «меню» змінюється в різних відмінках.
    correct: false
    explanation: Слово «меню» не змінюється.
