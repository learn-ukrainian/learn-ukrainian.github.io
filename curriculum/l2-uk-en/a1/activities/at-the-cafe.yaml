- id: true-false-cafe-culture
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: In Ukraine, the bill comes to your table automatically.
    correct: false
    explanation: You always ask for the bill by saying 'Рахунок, будь ласка.' It does
      not come automatically.
  - statement: '''Мені каву, будь ласка'' uses the accusative form of кава.'
    correct: true
    explanation: Кава is a feminine noun ending in -а. In the accusative it changes
      to каву.
  - statement: A кав'ярня is the same kind of place as a ресторан.
    correct: false
    explanation: A кав'ярня is a coffee shop focused on drinks and pastries. A ресторан
      is a formal restaurant.
  - statement: '''Можна карткою?'' means ''Can I pay by card?'''
    correct: true
    explanation: This is the standard phrase for asking whether card payment is accepted.
  - statement: Чайові (tips) are mandatory in Ukrainian cafes.
    correct: false
    explanation: About 10% is common, but tips are never obligatory in Ukraine.
  - statement: Борщ keeps the same form in 'Мені борщ, будь ласка' because it is a
      masculine inanimate noun.
    correct: true
    explanation: Masculine inanimate nouns do not change form in the accusative —
      they stay the same as the nominative.
  - statement: '''Що ви рекомендуєте?'' means ''How much does it cost?'''
    correct: false
    explanation: '''Що ви рекомендуєте?'' means ''What do you recommend?'' ''Скільки
      коштує?'' means ''How much does it cost?'''
- id: error-correction-cafe-order
  type: error-correction
  instruction: Знайдіть і виправте помилку (Find and correct the error)
  items:
  - sentence: Мені кава, будь ласка.
    error: кава
    correction: каву
    error_type: word
    options:
    - каву
    - кави
    - кавою
    explanation: 'Feminine nouns ending in -а take -у in the accusative: кава → каву.'
  - sentence: Мені вода, будь ласка.
    error: вода
    correction: воду
    error_type: word
    options:
    - воду
    - води
    - водою
    explanation: 'Feminine nouns ending in -а take -у in the accusative: вода → воду.'
  - sentence: Я буду піца.
    error: піца
    correction: піцу
    error_type: word
    options:
    - піцу
    - піці
    - піцою
    explanation: 'Feminine nouns ending in -а take -у in the accusative: піца → піцу.'
  - sentence: Можна карточкою?
    error: карточкою
    correction: карткою
    error_type: word
    options:
    - карткою
    - картою
    - карточкою
    explanation: The correct Ukrainian word is картка. 'Карточка' is a Russianism.
  - sentence: Це гострий?
    error: гострий
    correction: гостре
    error_type: word
    options:
    - гостре
    - гострий
    - гостра
    explanation: '''Це гостре?'' asks about a dish in a neutral/neuter context. Use
      the neuter adjective form гостре.'
  - sentence: Рахунок, будьте ласка.
    error: будьте
    correction: будь
    error_type: word
    options:
    - будь
    - будьте
    - будемо
    explanation: The fixed polite phrase is 'будь ласка', not 'будьте ласка'.
