- type: true-false
  title: 'Grammar Facts: True or False?'
  instruction: Decide if the statements about Ukrainian preferences are true or false.
  items:
  - statement: You should use the word 'Я' (I) when saying 'Мені подобається кава'.
    correct: false
    explanation: We use the phrase 'Мені' (to me) with 'подобається', not 'Я'.
  - statement: The word 'подобається' changes to 'подобаються' when you like multiple
      things.
    correct: true
    explanation: The verb must agree with the things you like, which are the plural
      subject.
  - statement: Saying 'Я хочу' (I want) in a Ukrainian cafe sounds rude and impolite.
    correct: false
    explanation: It is completely polite and natural in Ukrainian daily life.
  - statement: When you love something (Я люблю), the word 'кава' changes to 'каву'.
    correct: true
    explanation: It becomes the direct object, so the ending changes to -у.
  - statement: '''Люблю'' is used for a deep emotional connection or permanent passion.'
    correct: true
    explanation: It is a strong word showing active enjoyment.
  - statement: After 'Мені подобається', the word 'музика' changes to 'музику'.
    correct: false
    explanation: It stays 'музика' because it is the grammatical subject of the sentence.
  - statement: You can use an infinitive action verb like 'читати' after 'Я хочу'.
    correct: true
    explanation: Yes, you can say 'Я хочу читати'.
  - statement: The small word 'а' is used to create a soft contrast, like in 'А ти?'.
    correct: true
    explanation: It helps bounce the conversation back and forth.
