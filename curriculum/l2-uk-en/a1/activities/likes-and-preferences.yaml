- type: quiz
  title: "Вибір конструкції: подобається чи люблю?"
  instruction: "Як ваш кулінарний гід, я допоможу вам правильно висловлювати свої смаки."
  items:
    - question: "Як правильно сказати, що ви відчуваєте глибоку любов до борщу?"
      explanation: "Дієслово 'любити' використовуємо для сильних почуттів і глибокої пристрасті."
      options:
        - text: "Я люблю борщ"
          correct: true
        - text: "Мені подобається борщ"
          correct: false
        - text: "Я хочу борщ"
          correct: false
        - text: "Я подобаюся борщу"
          correct: false
    - question: "Яка форма правильна, якщо вам просто приємно пити каву?"
      explanation: "Конструкція 'мені подобається' передає загальну естетичну приємність або симпатію."
      options:
        - text: "Мені подобається кава"
          correct: true
        - text: "Я люблю каву"
          correct: false
        - text: "Я хочу каву"
          correct: false
        - text: "Я подобаюся каву"
          correct: false
    - question: "Як сказати про бажання поїсти прямо зараз?"
      explanation: "Для вираження актуального бажання використовуємо дієслово 'хотіти'."
      options:
        - text: "Я хочу їсти"
          correct: true
        - text: "Мені подобається їсти"
          correct: false
        - text: "Я люблю їсти"
          correct: false
        - text: "Я хочу їжу"
          correct: false
    - question: "Як запитати друга про його ставлення до музики?"
      explanation: "Використовуємо займенник у давальному відмінку 'тобі' для запитання про симпатії співрозмовника."
      options:
        - text: "Тобі подобається музика?"
          correct: true
        - text: "Мені подобається музика?"
          correct: false
        - text: "Ти подобається музика?"
          correct: false
        - text: "Він любить музику?"
          correct: false
    - question: "Яку форму використовуємо для множини, наприклад, для квітів?"
      explanation: "Дієслово має узгоджуватися з підметом-множиною, тому додаємо закінчення 'ють' — подобаються."
      options:
        - text: "Мені подобаються квіти"
          correct: true
        - text: "Мені подобається квіти"
          correct: false
        - text: "Я подобаються квіти"
          correct: false
        - text: "Мені подобається квітка"
          correct: false
    - question: "Як правильно сказати, що ви хочете купити цікаву книгу?"
      explanation: "Дієслово 'хотіти' з іменником вимагає знахідного відмінка, тому 'цікаву книгу'."
      options:
        - text: "Я хочу цікаву книгу"
          correct: true
        - text: "Я хочу цікава книга"
          correct: false
        - text: "Я хочу цікавої книги"
          correct: false
        - text: "Мені хочу цікаву книгу"
          correct: false
    - question: "Як сказати, що ви дуже любите читати?"
      explanation: "З дієсловом 'любити' використовується інфінітив іншого дієслова без змін."
      options:
        - text: "Я дуже люблю читати"
          correct: true
        - text: "Мені дуже люблю читати"
          correct: false
        - text: "Я дуже любить читати"
          correct: false
        - text: "Мені дуже подобається читаю"
          correct: false
    - question: "Як запитати, чи друг хоче пити чай?"
      explanation: "Дієслово 'хотіти' змінюється за особами. Для 'ти' правильна форма 'хочеш'."
      options:
        - text: "Ти хочеш пити чай?"
          correct: true
        - text: "Тобі хочеш пити чай?"
          correct: false
        - text: "Ти хоче пити чай?"
          correct: false
        - text: "Ви хочеш пити чай?"
          correct: false
    - question: "Яке слово означає, що ви погоджуєтеся зі смаком іншої людини?"
      explanation: "Слово 'також' використовується для згоди з думкою чи вподобанням."
      options:
        - text: "Також"
          correct: true
        - text: "Але"
          correct: false
        - text: "Тільки"
          correct: false
        - text: "Дуже"
          correct: false
    - question: "Як сказати, що вам не хочеться їсти суп?"
      explanation: "Заперечна частка 'не' завжди ставиться безпосередньо перед дієсловом."
      options:
        - text: "Я не хочу їсти суп"
          correct: true
        - text: "Я хочу не їсти суп"
          correct: false
        - text: "Мені не хочу їсти суп"
          correct: false
        - text: "Я не люблю їсти суп"
          correct: false
    - question: "Як правильно побудувати речення про любов до мами?"
      explanation: "Для сильної любові до людей завжди використовуємо дієслово 'любити'."
      options:
        - text: "Я люблю маму"
          correct: true
        - text: "Мені подобається мама"
          correct: false
        - text: "Я люблю мама"
          correct: false
        - text: "Я хочу маму"
          correct: false
    - question: "Як запитати друга про його улюблену музику з дієсловом 'любити'?"
      explanation: "Правильна форма для займенника 'ти' — це 'любиш'."
      options:
        - text: "Ти любиш музику?"
          correct: true
        - text: "Тобі любиш музику?"
          correct: false
        - text: "Ти любити музику?"
          correct: false
        - text: "Тобі подобається музику?"
          correct: false

- type: fill-in
  title: "Заповніть пропуски у фразах"
  instruction: "Вставте правильні слова, щоб наше меню смаків було ідеальним."
  items:
    - sentence: "Я дуже люблю український _____."
      answer: "борщ"
      options:
        - "борщ"
        - "борщу"
        - "борщем"
        - "борщі"
    - sentence: "Мені _____ ця нова книга."
      answer: "подобається"
      options:
        - "подобається"
        - "подобаються"
        - "подобаюся"
        - "люблю"
    - sentence: "Вона _____ смачно їсти в ресторані."
      answer: "любить"
      options:
        - "любить"
        - "любиш"
        - "люблю"
        - "люблять"
    - sentence: "Ми _____ пити зелений чай зранку."
      answer: "хочемо"
      options:
        - "хочемо"
        - "хочуть"
        - "хочете"
        - "хоче"
    - sentence: "Тобі подобаються ці гарні _____?"
      answer: "квіти"
      options:
        - "квіти"
        - "квітка"
        - "квітку"
        - "квітами"
    - sentence: "Я хочу велику _____ з сиром."
      answer: "піцу"
      options:
        - "піцу"
        - "піца"
        - "піці"
        - "піцею"
    - sentence: "Він щиро _____ сучасну музику."
      answer: "любить"
      options:
        - "любить"
        - "любиш"
        - "люблю"
        - "люблять"
    - sentence: "Мені дуже подобається _____ книги."
      answer: "читати"
      options:
        - "читати"
        - "читаю"
        - "читає"
        - "читаємо"
    - sentence: "Вони не _____ пити гарячу каву."
      answer: "хочуть"
      options:
        - "хочуть"
        - "хочемо"
        - "хочете"
        - "хоче"
    - sentence: "Я люблю спорт, а _____?"
      answer: "ти"
      options:
        - "ти"
        - "тобі"
        - "я"
        - "він"
    - sentence: "Ти хочеш піти додому _____?"
      answer: "зараз"
      options:
        - "зараз"
        - "дуже"
        - "також"
        - "не"
    - sentence: "Мені подобається кава, і йому _____ подобається кава."
      answer: "також"
      options:
        - "також"
        - "а"
        - "але"
        - "не"

- type: match-up
  title: "З'єднайте українські та англійські фрази"
  instruction: "Знайдіть точні відповідники для висловлення ваших кулінарних та особистих уподобань."
  pairs:
    - left: "Мені подобається кава"
      right: "I like coffee"
    - left: "Я люблю борщ"
      right: "I love borsch"
    - left: "Я хочу їсти"
      right: "I want to eat"
    - left: "Тобі подобається чай?"
      right: "Do you like tea?"
    - left: "Ти хочеш піти?"
      right: "Do you want to go?"
    - left: "Мені подобається читати"
      right: "I like to read"
    - left: "Вона любить музику"
      right: "She loves music"
    - left: "Він хоче піцу"
      right: "He wants pizza"
    - left: "Я люблю смачно їсти"
      right: "I love to eat tastily"
    - left: "Ми хочемо каву"
      right: "We want coffee"
    - left: "Мені також подобається"
      right: "I also like"
    - left: "А ти?"
      right: "And you?"

- type: unjumble
  title: "Побудуйте речення правильно"
  instruction: "Розташуйте слова так, щоб вийшли правильні висловлювання про ваші смаки."
  items:
    - words: ["Мені", "дуже", "подобається", "ця", "музика"]
      answer: "Мені дуже подобається ця музика"
    - words: ["Я", "щиро", "люблю", "міцну", "каву"]
      answer: "Я щиро люблю міцну каву"
    - words: ["Ми", "зараз", "хочемо", "смачно", "їсти"]
      answer: "Ми зараз хочемо смачно їсти"
    - words: ["Тобі", "подобається", "цей", "новий", "фільм"]
      answer: "Тобі подобається цей новий фільм"
    - words: ["Вона", "хоче", "нову", "цікаву", "книгу"]
      answer: "Вона хоче нову цікаву книгу"
    - words: ["Я", "люблю", "чай", "а", "ти"]
      answer: "Я люблю чай а ти"
    - words: ["Вони", "не", "хочуть", "пити", "чай"]
      answer: "Вони не хочуть пити чай"
    - words: ["Мені", "подобається", "читати", "а", "йому", "також"]
      answer: "Мені подобається читати а йому також"
    - words: ["Ти", "любиш", "читати", "цю", "книгу"]
      answer: "Ти любиш читати цю книгу"
    - words: ["Він", "дуже", "хоче", "піти", "додому"]
      answer: "Він дуже хоче піти додому"
    - words: ["Мені", "подобаються", "ці", "гарні", "квіти"]
      answer: "Мені подобаються ці гарні квіти"
    - words: ["Я", "також", "люблю", "український", "борщ"]
      answer: "Я також люблю український борщ"

- type: group-sort
  title: "Що нам подобається, а що ми любимо?"
  instruction: "Як досвідчений критик, я знаю, що граматика залежить від дієслова. Розподіліть іменники для фраз 'Мені подобається...' (називний відмінок) та 'Я люблю...' (знахідний відмінок)."
  groups:
    - name: "Мені подобається (Називний відмінок)"
      items:
        - "смачна кава"
        - "цікава книга"
        - "українська музика"
        - "гаряча піца"
        - "велика країна"
        - "гарна квітка"
    - name: "Я люблю (Знахідний відмінок)"
      items:
        - "смачну каву"
        - "цікаву книгу"
        - "українську музику"
        - "гарячу піцу"
        - "велику країну"
        - "гарну квітку"

- type: quiz
  title: "Правила кулінарного критика: граматика в ресторані"
  instruction: "Перевірте, чи правильно ви розумієте, як робити замовлення та говорити про їжу."
  items:
    - question: "Як правильно замовити каву в кафе?"
      explanation: "'Я хочу' — це ввічливий і природний спосіб зробити замовлення в Україні."
      options:
        - text: "Я хочу каву"
          correct: true
        - text: "Мені подобається кава"
          correct: false
        - text: "Я люблю каву"
          correct: false
        - text: "Ти хочеш каву"
          correct: false
    - question: "Яке дієслово використовуємо для сильної пристрасті до борщу?"
      explanation: "Для вираження сильної любові або пристрасті використовуємо 'любити'."
      options:
        - text: "Любити"
          correct: true
        - text: "Подобатися"
          correct: false
        - text: "Хотіти"
          correct: false
        - text: "Читати"
          correct: false
    - question: "Що ви скажете, якщо вам просто приємний смак чаю?"
      explanation: "Для легкого задоволення або симпатії використовується 'мені подобається'."
      options:
        - text: "Мені подобається чай"
          correct: true
        - text: "Я люблю чай"
          correct: false
        - text: "Я хочу чай"
          correct: false
        - text: "Мені хочу чай"
          correct: false
    - question: "Як запитати друга, чи хоче він їсти?"
      explanation: "Питання про бажання у цей момент формулюємо через 'хочеш'."
      options:
        - text: "Ти хочеш їсти?"
          correct: true
        - text: "Тобі подобається їсти?"
          correct: false
        - text: "Ти любиш їсти?"
          correct: false
        - text: "Він хоче їсти?"
          correct: false
    - question: "Яка форма дієслова 'хотіти' правильна для займенника 'ми'?"
      explanation: "Для 'ми' форма має закінчення '-емо'."
      options:
        - text: "Хочемо"
          correct: true
        - text: "Хочуть"
          correct: false
        - text: "Хочете"
          correct: false
        - text: "Хочеш"
          correct: false
    - question: "Як сказати 'I do not want'?"
      explanation: "'Не' ставиться прямо перед дієсловом."
      options:
        - text: "Я не хочу"
          correct: true
        - text: "Я хочу не"
          correct: false
        - text: "Не я хочу"
          correct: false
        - text: "Мені не хочу"
          correct: false
    - question: "Як сказати 'She loves to eat'?"
      explanation: "Третя особа однини від дієслова 'любити' — це 'любить'."
      options:
        - text: "Вона любить їсти"
          correct: true
        - text: "Їй подобається їсти"
          correct: false
        - text: "Вона хоче їсти"
          correct: false
        - text: "Вона люблю їсти"
          correct: false
    - question: "Як перекласти 'I like this pizza'?"
      explanation: "Використовуємо конструкцію давального відмінка для загального вподобання."
      options:
        - text: "Мені подобається ця піца"
          correct: true
        - text: "Я люблю цю піцу"
          correct: false
        - text: "Я хочу цю піцу"
          correct: false
        - text: "Мені подобаються ця піца"
          correct: false
    - question: "Яке закінчення має слово 'книга' після дієслова 'люблю'?"
      explanation: "Жіночий рід на -а у знахідному відмінку змінюється на -у."
      options:
        - text: "-у"
          correct: true
        - text: "-а"
          correct: false
        - text: "-і"
          correct: false
        - text: "-ою"
          correct: false
    - question: "Як правильно побудувати фразу про каву?"
      explanation: "'Кава' є підметом і має стояти в називному відмінку у цій конструкції."
      options:
        - text: "Мені подобається кава"
          correct: true
        - text: "Я подобаюся каву"
          correct: false
        - text: "Мені подобається каву"
          correct: false
        - text: "Я подобається кава"
          correct: false
    - question: "Як запитати офіціанта на Ви про його бажання?"
      explanation: "Ввічлива форма 'Ви' вимагає дієслова із закінченням '-ете'."
      options:
        - text: "Ви хочете?"
          correct: true
        - text: "Ти хочеш?"
          correct: false
        - text: "Ви хочуть?"
          correct: false
        - text: "Ви хочемо?"
          correct: false
    - question: "Як перекласти слово 'also' у реченні зі згодою?"
      explanation: "'Також' означає 'also' або 'too'."
      options:
        - text: "Також"
          correct: true
        - text: "Але"
          correct: false
        - text: "Дуже"
          correct: false
        - text: "Щиро"
          correct: false

