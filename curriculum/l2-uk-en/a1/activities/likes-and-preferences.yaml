- type: quiz
  title: Choose the correct phrase
  instruction: Select the right phrase to answer the question.
  items:
  - question: How do you say 'I like coffee' in Ukrainian?
    options:
    - text: Мені подобається кава
      correct: true
    - text: Я подобається кава
      correct: false
    - text: Мені люблю кава
      correct: false
    - text: Я хочу каву
      correct: false
    explanation: We use 'Мені подобається' to say 'I like'.
  - question: How do you say 'I want to eat'?
    options:
    - text: Я хочу їсти
      correct: true
    - text: Мені хочеться їсти
      correct: false
    - text: Мені подобається їсти
      correct: false
    - text: Я люблю їсти
      correct: false
  - question: Which phrase means 'I love mom'?
    options:
    - text: Я люблю маму
      correct: true
    - text: Мені подобається мама
      correct: false
    - text: Я хочу маму
      correct: false
    - text: Я люблю мама
      correct: false
  - question: What is the correct question for 'Do you want coffee?'
    options:
    - text: Ви хочете каву?
      correct: true
    - text: Тобі хочеться каву?
      correct: false
    - text: Ти любиш каву?
      correct: false
    - text: Мені подобається кава?
      correct: false
  - question: How do you ask 'And you?'
    options:
    - text: А ти?
      correct: true
    - text: А я?
      correct: false
    - text: І ти?
      correct: false
    - text: А вам?
      correct: false
  - question: Which phrase indicates a strong emotional connection, like 'I love music'?
    options:
    - text: Я люблю музику
      correct: true
    - text: Мені подобається музика
      correct: false
    - text: Я хочу музику
      correct: false
    - text: Мені музика
      correct: false
  - question: How do you translate 'Мені подобається читати'?
    options:
    - text: I like to read
      correct: true
    - text: I want to read
      correct: false
    - text: I love to read
      correct: false
    - text: You like to read
      correct: false
  - question: If you want to say 'You like books' (plural), which is correct?
    options:
    - text: Тобі подобаються книги
      correct: true
    - text: Мені подобається книги
      correct: false
    - text: Тобі подобається книги
      correct: false
    - text: Я люблю книги
      correct: false
