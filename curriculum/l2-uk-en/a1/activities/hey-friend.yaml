version: '1.0'
module: hey-friend
level: a1
inline:
- id: quiz-vocative
  type: quiz
  instruction: Оберіть правильний варіант (Choose the correct option)
  items:
  - question: Як правильно звернутися до Олени? (How do you address Olena directly?)
    options:
    - Олено
    - Олена
    - Оленці
    correct: 0
  - question: Як Тарас кличе Андрія у діалозі? (How does Taras call Andrii?)
    options:
    - Андрію
    - Андрій
    - Андріє
    correct: 0
  - question: 'Мама каже: ''На столі, ___.'''
    options:
    - синку
    - синок
    - синові
    correct: 0
  - question: Яке речення НЕ використовує кличний відмінок? (Which sentence does NOT
      use the vocative?)
    options:
    - Олена прийшла.
    - Андрію, привіт!
    - Мамо, де ключі?
    correct: 0
  - question: Як змінюється 'мама' у кличному відмінку?
    options:
    - мамо
    - мами
    - мамі
    correct: 0
  - question: Як звернутися до Тараса? (How do you address Taras?)
    options:
    - Тарасе
    - Тарас
    - Тарасу
    correct: 0
  - question: 'Оля каже бабусі: ''_____, ми йдемо!'''
    options:
    - Бабусю
    - Бабуся
    - Бабусі
    correct: 0
  - question: Коли ми використовуємо кличний відмінок? (When do we use the vocative?)
    options:
    - Коли говоримо ДО людини
    - Коли говоримо ПРО людину
    - Коли питаємо про людину
    correct: 0
- id: fill-in-vocative
  type: fill-in
  instruction: Вставте кличний відмінок (Write the vocative form)
  items:
  - sentence: _____ (Олена), привіт!
    answer: Олено
    options:
    - Олено
    - Олена
    - Оленці
  - sentence: Як справи, _____ (Тарас)?
    answer: Тарасе
    options:
    - Тарасе
    - Тарас
    - Тарасу
  - sentence: Дякую, _____ (мама)!
    answer: мамо
    options:
    - мамо
    - мама
    - мамі
  - sentence: Ходи сюди, _____ (Іван)!
    answer: Іване
    options:
    - Іване
    - Іван
    - Івану
  - sentence: До побачення, _____ (сестра)!
    answer: сестро
    options:
    - сестро
    - сестра
    - сестрі
  - sentence: Привіт, _____ (Андрій)!
    answer: Андрію
    options:
    - Андрію
    - Андрій
    - Андріє
  - sentence: Ходи сюди, _____ (подруга)!
    answer: подруго
    options:
    - подруго
    - подруга
    - подрузі
  - sentence: Слухай, _____ (брат)!
    answer: брате
    options:
    - брате
    - брат
    - братові
  - sentence: _____ (Марія), як справи?
    answer: Маріє
    options:
    - Маріє
    - Марія
    - Марії
  - sentence: До побачення, _____ (бабуся)!
    answer: бабусю
    options:
    - бабусю
    - бабуся
    - бабусі
- id: quiz-choose-vocative
  type: quiz
  instruction: Оберіть правильну форму кличного відмінка (Choose the correct vocative
