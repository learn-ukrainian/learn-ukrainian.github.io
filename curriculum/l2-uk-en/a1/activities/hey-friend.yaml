  - question: Яке чергування відбувається у слові 'друг → друже'? (What alternation
      occurs?)
    options:
    - г → ж
    - г → к
    - г → х
    correct: 0
  - question: Яке чергування відбувається у слові 'козак → козаче'? (What alternation
      occurs?)
    options:
    - к → ч
    - к → г
    - к → х
    correct: 0
  - question: вчитель → ___
    options:
    - вчителю
    - вчителе
    - вчителі
    correct: 0
  - question: дідусь → ___
    options:
    - дідусю
    - дідусе
    - дідусі
    correct: 0
  - question: пан → ___
    options:
    - пане
    - пану
    - панові
    correct: 0
  - question: Марія → ___
    options:
    - Маріє
    - Марію
    - Маріє
    correct: 0
