workbook:
- id: reading-comprehension
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: На дні народження Олена знайомиться з Тарасом. (At the birthday party,
      Olena meets Taras.)
    correct: false
    explanation: Олена вже знає Тараса. Вона знайомиться з братом іменинника — Андрієм.
  - statement: Телефон сина лежить на столі. (The son's phone is on the table.)
    correct: true
    explanation: 'Мама каже: ''На столі, синку.'''
  - statement: Ключі дочки в кишені у тата. (The daughter's keys are in dad's pocket.)
    correct: true
    explanation: 'Тато каже: ''У кишені, дочко.'''
  - statement: Бабуся йде додому. (Grandma is going home.)
    correct: false
    explanation: 'Син каже: ''Бабусю, ми йдемо!'' (The son is leaving, not grandma).'
  - statement: В українській мові для звертання ми використовуємо називний відмінок.
      (In Ukrainian we use the nominative case for addressing.)
    correct: false
    explanation: Для звертання завжди використовується кличний відмінок (Vocative
      case).
  - statement: Тарас — це брат іменинника. (Taras is the birthday person's brother.)
    correct: false
    explanation: Брат іменинника — Андрій.
- id: match-up-vocative
  type: match-up
  instruction: З'єднайте називний і кличний відмінки (Match nominative and vocative
    cases)
  pairs:
  - left: друг
    right: друже
  - left: козак
    right: козаче
  - left: тато
    right: тату
  - left: дочка
    right: дочко
  - left: пані
    right: пані
  - left: дідусь
    right: дідусю
  - left: вчитель
    right: вчителю
- id: error-correction-vocative
  type: error-correction
  instruction: Виправте помилку у звертанні (Correct the mistake in the address)
  items:
  - sentence: Привіт, мій друг!
    error: друг
    correction: друже
    error_type: word
    options:
    - друже
    - друга
    - другу
    explanation: 'В українській мові використовується кличний відмінок: друже.'
  - sentence: Мама, де мій телефон?
    error: Мама
    correction: Мамо
    error_type: word
    options:
    - Мамо
    - Мамі
    - Маму
    explanation: 'Жіночі імена на -а змінюються на -о: Мамо.'
  - sentence: Дякую, сестра!
    error: сестра
    correction: сестро
    error_type: word
    options:
    - сестро
    - сестрі
    - сестру
    explanation: 'Жіночі імена на -а змінюються на -о: сестро.'
  - sentence: Як справи, Андрій?
    error: Андрій
    correction: Андрію
    error_type: word
    options:
    - Андрію
    - Андрія
    - Андрієві
    explanation: 'Чоловічі імена на -й змінюються на -ю: Андрію.'
  - sentence: До побачення, вчитель!
    error: вчитель
    correction: вчителю
    error_type: word
    options:
    - вчителю
    - вчителя
    - вчителем
    explanation: 'Слово ''вчитель'' у кличному відмінку: вчителю.'
  - sentence: Добрий день, пан Тарас!
    error: пан
    correction: пане
    error_type: word
    options:
    - пане
    - пана
    - пану
    explanation: 'Слово ''пан'' у кличному відмінку: пане.'
- id: true-false-rules
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: The vocative case is used to answer the question 'who?'.
    correct: false
    explanation: The vocative case does not answer questions; its only job is to get
      someone's attention.
  - statement: When addressing someone directly, their name or title must change.
    correct: true
    explanation: Yes, you must use the vocative form instead of the regular dictionary
      form.
  - statement: Feminine names ending in -а change to -о (e.g., Олена → Олено).
    correct: true
    explanation: This is the rule for feminine names ending in -a.
  - statement: The word 'тато' changes to 'тате' in the vocative case.
    correct: false
    explanation: The word 'тато' is an exception and changes to 'тату'.
  - statement: The title 'пані' does not change its form when addressing someone.
    correct: true
    explanation: The formal title 'пані' stays the same in the vocative case.
  - statement: Masculine words ending in a soft consonant or -й add -ю in the vocative.
    correct: true
    explanation: For example, Андрій → Андрію, вчитель → вчителю.
- id: translate-vocative
  type: translate
  instruction: Оберіть правильний переклад (Choose the correct translation)
  items:
  - source: Hi, mom!
    options:
    - text: Привіт, мамо!
      correct: true
    - text: Привіт, мама!
      correct: false
    - text: Привіт, мамі!
      correct: false
  - source: Good morning, sir!
    options:
    - text: Добрий ранок, пане!
      correct: true
    - text: Добрий ранок, пан!
      correct: false
    - text: Добрий ранок, пана!
      correct: false
  - source: Goodbye, friend!
    options:
    - text: До побачення, друже!
      correct: true
    - text: До побачення, друг!
      correct: false
    - text: До побачення, другу!
      correct: false
  - source: Thank you, sister!
    options:
    - text: Дякую, сестро!
      correct: true
    - text: Дякую, сестра!
      correct: false
    - text: Дякую, сестрі!
      correct: false
  - source: How are you, brother?
    options:
    - text: Як справи, брате?
      correct: true
    - text: Як справи, брат?
      correct: false
    - text: Як справи, брату?
      correct: false
  - source: Come here, son!
    options:
    - text: Ходи сюди, синку!
      correct: true
    - text: Ходи сюди, синок!
      correct: false
    - text: Ходи сюди, сине!
      correct: false
