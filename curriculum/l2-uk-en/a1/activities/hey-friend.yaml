workbook:
- id: match-up-nominative-vocative
  type: match-up
  instruction: 'З''єднайте слова: називний та кличний відмінки (Match the words: nominative
    and vocative)'
  pairs:
  - left: друг
    right: друже
  - left: козак
    right: козаче
  - left: тато
    right: тату
  - left: дочка
    right: дочко
  - left: син
    right: синку
  - left: пан
    right: пане
  - left: вчитель
    right: вчителю
  - left: дідусь
    right: дідусю
- id: true-false-vocative
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Кличний відмінок слова «тато» — це «тате».
    correct: false
    explanation: 'Слово «тато» має особливе закінчення: тату.'
  - statement: Слово «пані» не змінюється у кличному відмінку.
    correct: true
    explanation: Слово «пані» залишається без змін.
  - statement: «Друг» у кличному відмінку буде «другу».
    correct: false
    explanation: 'Правильно: друже. Літера «г» змінюється на «ж».'
  - statement: Жіночі імена на -а (Олена, Оксана) змінюються на -о (Олено, Оксано).
    correct: true
    explanation: Це головне правило для жіночого роду на -а.
  - statement: «Бабуся» у кличному відмінку — це «бабусю».
    correct: true
    explanation: Слова на -ся змінюються на -сю.
  - statement: «Брат» змінюється на «брату».
    correct: false
    explanation: 'Правильно: брате.'
- id: unjumble-sentences
  type: unjumble
  instruction: Складіть правильне речення зі слів (Put the words in the correct order)
