    - потяг
    - каса
    - зупинка
    - квиток
  - sentence: Скажіть, будь ласка, де знаходиться ... вокзал?
    answer: залізничний
    options:
    - залізничний
    - головна
    - підземний
    - перший
  - sentence: Ідіть прямо, а на перехресті поверніть ... .
    answer: праворуч
    options:
    - праворуч
    - правильно
    - далеко
    - тут
  - sentence: Ми дуже далеко від центру, нам треба взяти ... .
    answer: таксі
    options:
    - таксі
    - зупинка
    - каса
    - літак
  - sentence: Коли ви летите літаком, ви маєте здати свій ... .
    answer: багаж
    options:
    - багаж
    - розклад
    - термінал
    - паспорт
  instruction: Оберіть правильне слово для заповнення пропуску.
