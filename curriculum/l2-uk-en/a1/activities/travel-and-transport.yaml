- type: quiz
  title: 'Перевірте себе: факти про подорожі'
  items:
  - question: Чи змінює слово метро своє закінчення в різних відмінках?
    explanation: Слово метро є незмінним (indeclinable).
    options:
    - text: Ні, воно не змінюється
      correct: true
    - text: Так, завжди змінюється
      correct: false
    - text: Змінюється тільки в множині
      correct: false
    - text: Змінюється як іменник
      correct: false
  - question: Як правильно сказати фразу by car українською мовою?
    explanation: Ми використовуємо прийменник на з місцевим відмінком.
    options:
    - text: на автомобілі
      correct: true
    - text: в автомобілі
      correct: false
    - text: з автомобілем
      correct: false
    - text: автомобіль
      correct: false
  - question: Яке дієслово ви використаєте для подорожі літаком до іншого міста?
    explanation: Для літака та іншого транспорту ми використовуємо їхати або летіти.
    options:
    - text: їхати або летіти
      correct: true
    - text: іти
      correct: false
    - text: бігти
      correct: false
    - text: гуляти
      correct: false
  - question: Як правильно сказати, що ви подорожуєте до України?
    explanation: В Україну — це правильна форма для незалежної країни.
    options:
    - text: в Україну
      correct: true
    - text: на Україну
      correct: false
    - text: до Україна
      correct: false
    - text: через Україна
      correct: false
  - question: Що означає слово праворуч в українській мові?
    explanation: Праворуч означає to the right.
    options:
    - text: to the right
      correct: true
    - text: correct
      correct: false
    - text: to the left
      correct: false
    - text: straight
      correct: false
  - question: Який транспорт часто використовують для поїздки до іншого міста?
    explanation: Потяг — популярний вид міжміського транспорту в Україні.
    options:
    - text: потяг
      correct: true
    - text: метро
      correct: false
    - text: тролейбус
      correct: false
    - text: трамвай
      correct: false
