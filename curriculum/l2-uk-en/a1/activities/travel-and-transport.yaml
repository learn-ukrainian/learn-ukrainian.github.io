- type: quiz
  title: 'Перевірте знання: Транспорт і граматика'
  items:
  - question: Який транспорт зазвичай їде під землею?
    explanation: Метро — це підземний вид транспорту.
    options:
    - text: метро
      correct: true
    - text: автобус
      correct: false
    - text: літак
      correct: false
    - text: потяг
      correct: false
  - question: 'Як правильно сказати англійську фразу: I am traveling to Kyiv?'
    explanation: Ми використовуємо дієслово їхати для подорожей транспортом, і прийменник
      в для міст.
    options:
    - text: Я їду в Київ
      correct: true
    - text: Я іду в Київ
      correct: false
    - text: Я їду на Київ
      correct: false
    - text: Я іду на Київ
      correct: false
  - question: Де на вокзалі можна купити квиток на потяг?
    explanation: Квитки завжди продають у касі.
    options:
    - text: у касі
      correct: true
    - text: на пероні
      correct: false
    - text: у розкладі
      correct: false
    - text: у терміналі
      correct: false
  - question: Як сказати фразу by bus українською мовою?
    explanation: Ми використовуємо прийменник на та Місцевий відмінок.
    options:
    - text: на автобусі
      correct: true
    - text: в автобусі
      correct: false
    - text: автобус
      correct: false
    - text: на автобус
      correct: false
  - question: Яке українське слово має значення straight?
    explanation: Прямо означає straight.
    options:
    - text: прямо
      correct: true
    - text: ліворуч
      correct: false
    - text: праворуч
      correct: false
    - text: назад
      correct: false
  - question: Де ви чекаєте на свій рейс в аеропорту?
    explanation: В аеропорту люди чекають на рейс у терміналі.
    options:
    - text: у терміналі
      correct: true
    - text: на пероні
      correct: false
    - text: на колії
      correct: false
    - text: у вагоні
      correct: false
  instruction: Оберіть правильну відповідь.
- type: fill-in
  title: 'Заповніть пропуски: На вокзалі та в дорозі'
