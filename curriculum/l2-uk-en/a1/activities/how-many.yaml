workbook:
- type: match-up
  instruction: З'єднайте числа (Match the numbers)
  pairs:
  - left: '11'
    right: одинадцять
  - left: '12'
    right: дванадцять
  - left: '14'
    right: чотирнадцять
  - left: '17'
    right: сімнадцять
  - left: '19'
    right: дев'ятнадцять
  - left: '20'
    right: двадцять
- type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: 20 + 30 = п'ятдесят
    correct: true
    explanation: 20 (двадцять) + 30 (тридцять) = 50 (п'ятдесят).
  - statement: 100 - 10 = вісімдесят
    correct: false
    explanation: 100 (сто) - 10 (десять) = 90 (дев'яносто).
  - statement: 50 + 50 = сто
    correct: true
    explanation: 50 (п'ятдесят) + 50 (п'ятдесят) = 100 (сто).
  - statement: 300 + 200 = чотириста
    correct: false
    explanation: 300 (триста) + 200 (двісті) = 500 (п'ятсот).
  - statement: 40 + 20 = шістдесят
    correct: true
    explanation: 40 (сорок) + 20 (двадцять) = 60 (шістдесят).
  - statement: 1000 - 500 = триста
    correct: false
    explanation: 1000 (тисяча) - 500 (п'ятсот) = 500 (п'ятсот).
- type: group-sort
  instruction: Розподіліть числа (Sort the numbers)
  groups:
  - label: 1 - 10
    items:
    - один
    - чотири
    - сім
    - десять
  - label: 11 - 19
    items:
    - одинадцять
    - п'ятнадцять
    - вісімнадцять
    - дев'ятнадцять
  - label: 20 - 100
    items:
    - двадцять
    - сорок
    - дев'яносто
    - сто
- type: error-correction
  instruction: Знайдіть і виправте помилку (Find and fix the error)
  items:
  - sentence: Мені потрібен один книга.
    error: один
    correction: одна
    error_type: word
    options:
    - одна
    - одне
    - одні
    explanation: Книга is feminine, so use одна.
  - sentence: Скільки коштує два вікно?
    error: вікно
    correction: вікна
    error_type: word
    options:
    - вікна
    - вікон
    - вікні
    explanation: After два, neuter nouns usually take the nominative plural form like
      вікна.
  - sentence: Це коштує сто гривня.
    error: гривня
    correction: гривень
    error_type: word
    options:
    - гривні
    - гривень
    - гривню
    explanation: Numbers ending in 0 (like 100) require гривень.
  - sentence: Йому сорок роки.
    error: роки
    correction: років
    error_type: word
    options:
    - рік
    - років
    - року
    explanation: Numbers ending in 0 take років.
  - sentence: У мене є двадцять один гривні.
    error: гривні
    correction: гривня
    error_type: word
    options:
    - гривня
    - гривню
    - гривень
    explanation: Numbers ending in 1 require the singular form гривня.
  - sentence: Це коштує двісто гривень.
    error: двісто
    correction: двісті
    error_type: word
    options:
    - двісті
    - двасто
    - двасот
    explanation: Two hundred is двісті, not двісто.
- type: match-up
  instruction: З'єднайте запитання та відповідь (Match the question and answer)
  pairs:
  - left: Скільки тобі років?
    right: Мені двадцять років.
  - left: Скільки коштує сумка?
    right: Двісті гривень.
  - left: Який твій номер?
    right: Нуль шістдесят сім...
  - left: Скільки коштує хліб?
    right: Тридцять гривень.
  - left: Скільки років сестрі?
    right: Їй вісімнадцять.
  - left: Скільки коштує торт?
    right: Триста п'ятдесят.
- type: unjumble
  instruction: Складіть правильне речення (Form the correct sentence)
  items:
  - words:
    - коштує
    - Скільки
    - сумка?
    correct_order:
    - Скільки
    - коштує
    - сумка?
  - words:
    - роки.
    - Мені
    - тридцять
    - два
    correct_order:
    - Мені
    - тридцять
    - два
    - роки.
  - words:
    - коштує
    - п'ятдесят
    - Це
    - гривень.
    correct_order:
    - Це
    - коштує
    - п'ятдесят
    - гривень.
  - words:
    - тобі
    - років?
    - Скільки
    correct_order:
    - Скільки
    - тобі
    - років?
  - words:
    - вісімнадцять.
    - сестрі
    - Моїй
    correct_order:
    - Моїй
    - сестрі
    - вісімнадцять.
  - words:
    - маленька?
    - коштує
    - А
    - скільки
    correct_order:
    - А
    - скільки
    - коштує
    - маленька?
