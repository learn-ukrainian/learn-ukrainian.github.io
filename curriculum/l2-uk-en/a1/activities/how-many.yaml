version: '1.0'
module: how-many
level: a1
inline:
- id: fill-in-numbers
  type: fill-in
  instruction: Write the number in words (**словами**).
  items:
  - sentence: 15 → ____
    answer: п'ятнадцять
    options:
    - п'ятдесят
    - п'ять
    - п'ятнадцять
  - sentence: 47 → ____
    answer: сорок сім
    options:
    - чотири сім
    - сорок сім
    - сорок вісім
  - sentence: 12 → ____
    answer: дванадцять
    options:
    - двадцять
    - дванадцять
    - два
  - sentence: 60 → ____
    answer: шістдесят
    options:
    - шістнадцять
    - шістдесят
    - шість
  - sentence: 99 → ____
    answer: дев'яносто дев'ять
    options:
    - дев'яносто дев'ять
    - дев'ять дев'ять
    - дев'яносто десять
  - sentence: 100 → ____
    answer: сто
    options:
    - нуль
    - сто
    - десять
  - sentence: 21 → ____
    answer: двадцять один
    options:
    - двадцять два
    - два один
    - двадцять один
  - sentence: 16 → ____
    answer: шістнадцять
    options:
    - шістнадцять
    - шістдесят
    - шість
  - sentence: 35 → ____
    answer: тридцять п'ять
    options:
    - три п'ять
    - тридцять п'ять
    - тридцять п'ятдесят
  - sentence: 83 → ____
    answer: вісімдесят три
    options:
    - вісімнадцять три
    - вісім три
    - вісімдесят три
  title: Write the number in words (**словами**).
- id: quiz-prices
