- type: true-false
  instruction: True or false? Check if the number is written correctly in Ukrainian
  items:
  - statement: 47 = сорок сім
    correct: true
    explanation: Correct — сорок (40) + сім (7), two separate words.
  - statement: 90 = дев'ятдесят
    correct: false
    explanation: Wrong — 90 is дев'яносто, not *дев'ятдесят. This is an irregular
      form that must be memorized.
  - statement: 40 = чотиридесят
    correct: false
    explanation: Wrong — 40 is сорок, not *чотиридесят. This is an irregular form
      that must be memorized.
  - statement: 15 = п'ятнадцять
    correct: true
    explanation: Correct — п'ять + надцять = п'ятнадцять. The apostrophe carries over
      from п'ять.
  - statement: Мені тринадцять років.
    correct: true
    explanation: Correct — numbers 11–19 all use років (the 5+ form).
  - statement: Сумка коштує двісті гривні.
    correct: false
    explanation: 'Wrong — двісті requires гривень (genitive plural), not гривні. Correct:
      двісті гривень.'
- type: translate
  instruction: Choose the correct Ukrainian translation
  items:
  - source: How much does this cost?
    options:
    - text: Скільки коштує це?
      correct: true
    - text: Скільки це рік?
      correct: false
    - text: Як коштує це?
      correct: false
  - source: I'm twenty-five years old.
    options:
    - text: Мені двадцять п'ять років.
      correct: true
    - text: Мені двадцять п'ять роки.
      correct: false
    - text: Мені двадцять п'ять рік.
      correct: false
  - source: My number is 097...
    options:
    - text: Мій номер — нуль дев'яносто сім...
      correct: true
    - text: Мій номер — нуль дев'ять сім...
      correct: false
    - text: Мій номер — дев'яносто сім...
      correct: false
- type: error-correction
  instruction: Find and fix the mistake in each sentence
  items:
  - sentence: Мені тридцять два років.
    error: років
    correction: роки
    error_type: word
    options:
    - роки
    - рік
    - років
    explanation: After 2, 3, 4 (and compounds ending in them like 32), use роки —
      not років.
  - sentence: Кава коштує тридцять п'ять гривня.
    error: гривня
    correction: гривень
    error_type: word
    options:
    - гривень
    - гривні
    - гривня
    explanation: After 5+ (including 35), use гривень — the genitive plural form.
  - sentence: Мені сорок одна років.
    error: років
    correction: рік
    error_type: word
    options:
    - рік
    - роки
    - років
    explanation: Numbers ending in 1 (like 41) use рік — the singular form.
