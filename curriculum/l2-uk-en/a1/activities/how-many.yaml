  - question: 200 ₴
    options:
    - двісті гривень
    - двадцять гривень
    - дві гривні
    - сто гривень
    correct: 0
  - question: 30 ₴
    options:
    - три гривні
    - тринадцять гривень
    - тридцять гривень
    - триста гривень
    correct: 2
  - question: 5 ₴
    options:
    - п'ятдесят гривень
    - п'ятнадцять гривень
    - п'ятсот гривень
