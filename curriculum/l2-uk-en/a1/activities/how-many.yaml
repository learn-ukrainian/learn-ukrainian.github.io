- id: quiz-ages
  type: quiz
  instruction: How old are they? (**Скільки років?**) Choose the correct age phrase.
  items:
  - question: 25 (I am...)
    options:
    - Мені двадцять років.
    - Мені двадцять п'ять років.
    - Тобі двадцять п'ять років.
    - Їй двадцять п'ять років.
    correct: 1
  - question: 18 (She is...)
    options:
    - Мені вісімнадцять років.
    - Тобі вісімнадцять років.
    - Їй вісімнадцять років.
    - Їй вісім років.
    correct: 2
  - question: 32 (You are...)
    options:
    - Тобі тридцять два роки.
    - Мені тридцять два роки.
    - Їй тридцять два роки.
    - Тобі тридцять років.
    correct: 0
  - question: 40 (I am...)
    options:
    - Тобі сорок років.
    - Їй сорок років.
    - Мені чотирнадцять років.
    - Мені сорок років.
    correct: 3
  - question: 10 (You are...)
    options:
    - Мені десять років.
    - Тобі десять років.
    - Їй десять років.
    - Тобі один рік.
    correct: 1
  - question: 21 (She is...)
    options:
    - Мені двадцять один рік.
    - Тобі двадцять один рік.
    - Їй дванадцять років.
    - Їй двадцять один рік.
    correct: 3
  title: How old are they? (**Скільки років?**) Choose the correct age phrase.
- id: dictation-phone
  type: fill-in
  instruction: Read the phone number groupings and choose the missing number (**номер**).
  items:
  - sentence: 'Мій номер 0 97: нуль ____ сім.'
    answer: дев'яносто
    options:
    - дев'яносто
    - дев'ять
    - дев'ятнадцять
  - sentence: 'Три два один: три два ____.'
    answer: один
    options:
    - один
    - одинадцять
    - нуль
  - sentence: 'Сорок п''ять: ____ п''ять.'
    answer: сорок
    options:
    - сорок
    - чотири
    - чотирнадцять
  - sentence: 'Шістдесят сім: ____ сім.'
    answer: шістдесят
    options:
    - шістдесят
    - шістнадцять
    - шість
  - sentence: 'Нуль п''ятдесят: нуль ____.'
    answer: п'ятдесят
    options:
    - п'ятдесят
    - п'ятнадцять
    - п'ять
  - sentence: 'Вісімдесят дев''ять: ____ дев''ять.'
    answer: вісімдесят
    options:
    - вісімдесят
    - вісімнадцять
    - вісім
  title: Read the phone number groupings and choose the missing number (**номер**).
workbook:
- id: match-up-tens
  type: match-up
  instruction: Match the numbers to their names (**назви**).
  pairs:
  - left: '30'
    right: тридцять
  - left: '40'
    right: сорок
  - left: '50'
    right: п'ятдесят
  - left: '60'
    right: шістдесят
  - left: '90'
    right: дев'яносто
  - left: '100'
    right: сто
  title: Match the numbers to their names (**назви**).
- id: group-sort-currency
  type: group-sort
  instruction: Sort the numbers based on which form of **гривня** follows them.
  groups:
  - label: '... гривня'
    items:
    - один
    - двадцять один
    - тридцять один
  - label: '... гривні'
    items:
    - два
    - тридцять три
    - сорок чотири
  - label: '... гривень'
    items:
    - п'ять
    - десять
    - сто
  title: Sort the numbers based on which form of **гривня** follows them.
- id: anagram-numbers
  type: anagram
  instruction: Unscramble the letters to form numbers (**числа**).
  items:
  - letters:
    - с
    - о
    - р
    - о
    - к
    answer: сорок
    hint: '40'
  - letters:
    - т
    - и
    - с
    - я
    - ч
    - а
    answer: тисяча
    hint: '1000'
  - letters:
    - д
    - в
    - і
    - с
    - т
    - і
    answer: двісті
    hint: '200'
  - letters:
    - н
    - у
    - л
    - ь
    answer: нуль
    hint: '0'
  - letters:
    - т
    - р
    - и
    - с
    - т
    - а
    answer: триста
    hint: '300'
  - letters:
    - д
    - е
    - с
    - я
    - т
    - ь
    answer: десять
    hint: '10'
  title: Unscramble the letters to form numbers (**числа**).
- id: true-false-math
  type: true-false
  instruction: Are these statements true or false? (**Правда чи ні?**)
  items:
  - statement: Сорок — це 14.
    correct: false
    explanation: Сорок (sorok) is 40. 14 is чотирнадцять.
  - statement: Дев'яносто — це 90.
    correct: true
    explanation: Дев'яносто (dev'yanosto) is exactly 90.
  - statement: 'Правильно: Мені двадцять один років.'
    correct: false
    explanation: You must say 'двадцять один рік' because it ends in 1 (один).
  - statement: 'Ми кажемо: один стіл, два столи.'
    correct: true
    explanation: Numbers 2, 3, and 4 pair with a plural noun (столи).
  - statement: 'Правильно: тридцять п''ять гривень.'
    correct: true
    explanation: Numbers 5 and above take the 'гривень' form.
  - statement: П'ятнадцять — це 50.
    correct: false
    explanation: П'ятнадцять is 15. The number 50 is п'ятдесят.
  title: Are these statements true or false? (**Правда чи ні?**)
- id: odd-one-out-numbers
  type: odd-one-out
  instruction: Find the odd one out (**четверте зайве**).
  items:
  - words:
    - сорок
    - один
    - два
    - три
    correct: 0
    explanation: сорок (40) is a ten, the others are units 1-3.
  - words:
    - одинадцять
    - тридцять
    - дванадцять
    - тринадцять
    correct: 1
    explanation: тридцять is 30, the others end in -надцять (teens).
  - words:
    - сто
    - двісті
    - нуль
    - триста
    correct: 2
    explanation: нуль is 0, the others are hundreds.
  - words:
    - п'ятдесят
    - шістдесят
    - сімдесят
    - п'ятнадцять
    correct: 3
    explanation: п'ятнадцять is 15, the others are tens (50, 60, 70).
  - words:
    - він
    - мені
    - тобі
    - їй
    correct: 0
    explanation: він is 'he' (nominative), the others are dative pronouns used for
      age.
  - words:
    - гривня
    - коштує
    - гривні
    - гривень
    correct: 1
    explanation: коштує is a verb (costs), the others are forms of the currency.
  title: Find the odd one out (**четверте зайве**).
- id: unjumble-sentences
  type: unjumble
  instruction: Put the words in the correct order to make a sentence (**речення**).
  items:
  - words:
    - маленька
    - Скільки
    - сумка?
    - коштує
    correct_order:
    - Скільки
    - коштує
    - маленька
    - сумка?
    hint: How much does the small bag cost?
  - words:
    - п'ятдесят
    - гривень.
    - Двісті
    correct_order:
    - Двісті
    - п'ятдесят
    - гривень.
    hint: 250 hryvnias.
  - words:
    - років?
    - Скільки
    - тобі
    correct_order:
    - Скільки
    - тобі
    - років?
    hint: How old are you?
  - words:
    - двадцять
    - років.
    - Мені
    - п'ять
    correct_order:
    - Мені
    - двадцять
    - п'ять
    - років.
    hint: I am 25 years old.
  - words:
    - років.
    - Їй
    - вісімнадцять
    correct_order:
    - Їй
    - вісімнадцять
    - років.
    hint: She is 18 years old.
  - words:
    - нуль
    - номер
    - сім.
    - Мій
    - дев'яносто
    correct_order:
    - Мій
    - номер
    - нуль
    - дев'яносто
    - сім.
    hint: My number is 0 97.
  title: Put the words in the correct order to make a sentence (**речення**).
