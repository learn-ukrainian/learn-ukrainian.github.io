- type: "true-false"
  title: "Правила та лексика"
  items:
    - statement: "Слово \"гривня\" має таку саму форму після чисел 1 та 5."
      correct: false
      explanation: "Після 1 — гривня, після 5 — гривень."
    - statement: "Число 40 в українській мові — це \"сорок\"."
      correct: true
    - statement: "Після чисел 2, 3, 4 ми використовуємо форму \"гривні\"."
      correct: true
    - statement: "Слово \"здача\" означає ціну предмета."
      correct: false
      explanation: "Здача — це гроші, які продавець повертає покупцеві."
    - statement: "Число 100 в українській мові — це \"сто\"."
      correct: true
    - statement: "Фраза \"Скільки це коштує?\" використовується для запитання про ціну."
      correct: true
    - statement: "В українській мові ціни часто використовують кому для десяткових знаків."
      correct: true
    - statement: "Число 11 (одинадцять) вимагає форми \"гривні\"."
      correct: false
      explanation: "11 вимагає форми \"гривень\" (виняток 11-14)."
    - statement: "Слово \"дешево\" означає високу ціну."
      correct: false
      explanation: "Дешево означає низьку ціну."
    - statement: "Слово \"один\" змінює форму за родами (один, одна, одне)."
      correct: true
    - statement: "Слово \"решта\" — це синонім до слова \"здача\"."
      correct: true
    - statement: "Число 90 в українській мові — це \"дев'ятьдесят\"."
      correct: false
      explanation: "Правильна форма — дев'яносто."

- type: "group-sort"
  title: "Класифікація чисел та грошей"
  instruction: "Розподіліть слова за категоріями: Числа або Гроші/Ціни."
  groups:
    - name: "Числа (Numbers)"
      items:
        - "нуль"
        - "десять"
        - "двадцять"
        - "сорок"
        - "п'ятдесят"
        - "дев'яносто"
        - "сто"
    - name: "Гроші та Ціни (Money & Prices)"
      items:
        - "гривня"
        - "копійка"
        - "здача"
        - "решта"
        - "ціна"
        - "дорого"
        - "дешево"

- type: "unjumble"
  title: "Складіть речення"
  instruction: "Розставте слова в правильному порядку, щоб утворити запитання або твердження."
  items:
    - words: ["Скільки", "коштує?", "це"]
      answer: "Скільки це коштує?"
    - words: ["коштує", "Кава", "гривень.", "десять"]
      answer: "Кава коштує десять гривень."
    - words: ["коштує", "тридцять", "Хліб", "гривень."]
      answer: "Хліб коштує тридцять гривень."
    - words: ["гривень.", "Це", "сорок"]
      answer: "Це сорок гривень."
    - words: ["Ваша", "п'ять", "здача —", "гривень."]
      answer: "Ваша здача — п'ять гривень."
    - words: ["одна", "Вода", "гривня.", "коштує"]
      answer: "Вода коштує одна гривня."

- type: "unjumble"
  title: "Слова-конструктор"
  instruction: "Складіть слова з літер, пов'язаних з числами та грошима."
  items:
    - words: ["н", "у", "л", "ь"]
      answer: "нуль"
    - words: ["с", "т", "о"]
      answer: "сто"
    - words: ["с", "і", "м", "д", "е", "с", "я", "т"]
      answer: "сімдесят"
    - words: ["г", "р", "и", "в", "н", "я"]
      answer: "гривня"
    - words: ["г", "р", "о", "ш", "і"]
      answer: "гроші"
    - words: ["ц", "і", "н", "а"]
      answer: "ціна"
    - words: ["с", "о", "р", "о", "к"]
      answer: "сорок"
    - words: ["п", "я", "т", "ь"]
      answer: "п'ять"

- type: "match-up"
  title: "Ціни та їх написання"
  instruction: "Поєднайте цифрове позначення ціни з її правильним словесним описом."
  pairs:
    - left: "1 ₴"
      right: "одна гривня"
    - left: "3 ₴"
      right: "три гривні"
    - left: "5 ₴"
      right: "п'ять гривень"
    - left: "21 ₴"
      right: "двадцять одна гривня"
    - left: "44 ₴"
      right: "сорок чотири гривні"
    - left: "100 ₴"
      right: "сто гривень"
    - left: "11 ₴"
      right: "одинадцять гривень"
    - left: "2 ₴"
