- type: quiz
  title: "General Comprehension"
  instruction: "Test your overall understanding of numbers and money."
  items:
    - question: "What does the apostrophe in 'п'ять' tell you to do?"
      explanation: "The apostrophe indicates a tiny, sharp pause between the consonant and vowel."
      options:
        - text: "Make a short pause"
          correct: true
        - text: "Say the word loudly"
          correct: false
        - text: "Ignore the next letter"
          correct: false
        - text: "Connect the letters smoothly"
          correct: false
    - question: "Which of these numbers means 'forty'?"
      explanation: "'Сорок' is forty, a unique word with ancient origins."
      options:
        - text: "сорок"
          correct: true
        - text: "дев'яносто"
          correct: false
        - text: "чотирнадцять"
          correct: false
        - text: "чотири"
          correct: false
    - question: "What happens to the word 'гривня' after the number 5?"
      explanation: "Based on the 1-2-5 rule, it becomes the genitive plural 'гривень'."
      options:
        - text: "It becomes гривень"
          correct: true
        - text: "It becomes гривні"
          correct: false
        - text: "It stays гривня"
          correct: false
        - text: "It becomes гривню"
          correct: false
    - question: "If you want to say 'one dollar', which form of 'one' do you use?"
      explanation: "Dollar is masculine, so we use 'один'."
      options:
        - text: "один"
          correct: true
        - text: "одна"
          correct: false
        - text: "одне"
          correct: false
        - text: "одні"
          correct: false
    - question: "What does the word 'здача' mean?"
      explanation: "'Здача' means the change you receive back when you pay with cash."
      options:
        - text: "change (remaining money)"
          correct: true
        - text: "receipt"
          correct: false
        - text: "price"
          correct: false
        - text: "discount"
          correct: false
    - question: "Which suffix is used to form teen numbers like 13 or 14?"
      explanation: "The suffix '-надцять' is added to the base number."
      options:
        - text: "-надцять"
          correct: true
        - text: "десять"
          correct: false
        - text: "сто"
          correct: false
        - text: "двадцять"
          correct: false
    - question: "What is the correct way to say 'twenty-five hryvnias'?"
      explanation: "The last digit is 5, so 'гривня' becomes 'гривень'."
      options:
        - text: "двадцять п'ять гривень"
          correct: true
        - text: "двадцять п'ять гривні"
          correct: false
        - text: "двадцять п'ять гривня"
          correct: false
        - text: "двадцять п'ята гривня"
          correct: false
    - question: "The symbol for the hryvnia (₴) has two horizontal lines. What do they represent?"
      explanation: "The two lines represent stability, similar to the Euro or Yen symbols."
      options:
        - text: "Stability"
          correct: true
        - text: "Wealth"
          correct: false
        - text: "History"
          correct: false
        - text: "Europe"
          correct: false