- type: quiz
  title: "Check Your Knowledge: Numbers"
  instruction: "Choose the correct answer."
  items:
    - question: "How do you say 'ten' in Ukrainian?"
      explanation: "The word 'десять' is the base for teen numbers and tens."
      options:
        - text: "десять"
          correct: true
        - text: "двадцять"
          correct: false
        - text: "сто"
          correct: false
        - text: "п'ять"
          correct: false
    - question: "Which of these numbers has an apostrophe?"
      explanation: "The apostrophe in 'п'ять' tells you to make a short pause."
      options:
        - text: "п'ять"
          correct: true
        - text: "шість"
          correct: false
        - text: "сім"
          correct: false
        - text: "десять"
          correct: false
    - question: "How do you write 'fifty' correctly in Ukrainian?"
      explanation: "You drop the soft sign from the base number in 50 and 60."
      options:
        - text: "п'ятдесят"
          correct: true
        - text: "п'ятнадцять"
          correct: false
        - text: "п'ять"
          correct: false
        - text: "шістдесят"
          correct: false
    - question: "What does the word 'сто' mean?"
      explanation: "'Сто' means one hundred."
      options:
        - text: "one hundred"
          correct: true
        - text: "table"
          correct: false
        - text: "ten"
          correct: false
        - text: "zero"
          correct: false
    - question: "If something costs 20 hryvnias and you give 50, what is your change?"
      explanation: "Fifty minus twenty equals thirty (тридцять)."
      options:
        - text: "тридцять"
          correct: true
        - text: "сорок"
          correct: false
        - text: "десять"
          correct: false
        - text: "двадцять"
          correct: false
    - question: "Which of these words means 'expensive' in Ukrainian?"
      explanation: "'Дорого' means expensive, while 'дешево' means cheap."
      options:
        - text: "дорого"
          correct: true
        - text: "дешево"
          correct: false
        - text: "ціна"
          correct: false
        - text: "здача"
          correct: false
    - question: "What is the correct feminine form for 'two'?"
      explanation: "'Дві' is the feminine form, used with feminine nouns like 'гривня'."
      options:
        - text: "дві"
          correct: true
        - text: "два"
          correct: false
        - text: "двоє"
          correct: false
        - text: "двійка"
          correct: false
    - question: "How do you ask 'How much does it cost?' in Ukrainian?"
      explanation: "'Скільки коштує?' is the standard way to ask for a price."
      options:
        - text: "Скільки коштує?"
          correct: true
        - text: "Яка здача?"
          correct: false
        - text: "Скільки з мене?"
          correct: false
        - text: "Де гроші?"
          correct: false

