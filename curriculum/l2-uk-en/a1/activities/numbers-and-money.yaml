        - "гривню"

- type: true-false
  title: "True or False: Currency and Math"
  instruction: "Read the statement and decide if it is true or false."
  items:
    - statement: "The word 'п'ятдесят' is written with a soft sign in the middle."
      correct: false
      explanation: "There is no soft sign in the middle of 'п'ятдесят' and 'шістдесят'."
    - statement: "The stress in 'одинадцять' (eleven) falls on the letter 'а'."
      correct: true
      explanation: "The stress shifts to the 'а' in the suffix '-надцять'."
    - statement: "The word 'гривня' is masculine."
      correct: false
      explanation: "'Гривня' is feminine, which is why we say 'дві гривні', not 'два гривні'."
    - statement: "After the number five (п'ять), we use the genitive plural form 'гривень'."
      correct: true
      explanation: "The 1-2-5 rule states that numbers 5 and above (including 0) use the genitive plural."
    - statement: "Ten plus twenty equals forty (Десять плюс двадцять дорівнює сорок)."
      correct: false
      explanation: "Ten plus twenty equals thirty (тридцять)."
    - statement: "The word 'гривня' originally meant a neck ornament in Kyivan Rus."
      correct: true
      explanation: "The word comes from 'грива' and referred to a heavy neck ornament."
    - statement: "'Копійка гривню береже' means that a small coin protects the large currency."
      correct: true
      explanation: "This proverb highlights the traditional cultural value of saving money."
    - statement: "To say 'two dollars', you use the feminine form 'дві'."
      correct: false
      explanation: "'Долар' is masculine, so you use 'два долари'. 'Дві' is for feminine nouns."

- type: unjumble
  title: "Unjumble the Shopping Phrases"
  instruction: "Put the words in the correct order to form a useful shopping phrase."
  items:
    - words:
        - "Скільки"
        - "коштує"
        - "ця"
        - "кава?"
      answer: "Скільки коштує ця кава?"
    - words:
        - "Це"
        - "дуже"
        - "дорого!"
      answer: "Це дуже дорого!"
    - words:
        - "У"
        - "вас"
        - "є"
        - "здача?"
      answer: "У вас є здача?"
    - words:
        - "Дякую"
        - "за"
        - "покупку!"
      answer: "Дякую за покупку!"
    - words:
        - "З"
