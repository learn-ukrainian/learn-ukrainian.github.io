- type: true-false
  title: "Логіка чисел"
  instruction: "Визначте, чи правильне твердження."
  items:
    - statement: "Два плюс два дорівнює п'ять."
      correct: false
      explanation: "2 + 2 = 4 (чотири)."
    - statement: "Десять мінус один дорівнює дев'ять."
      correct: true
      explanation: "10 - 1 = 9."
    - statement: "В одній гривні сто копійок."
      correct: true
      explanation: "1 гривня = 100 копійок."
    - statement: "Сорок плюс сорок дорівнює сто."
      correct: false
      explanation: "40 + 40 = 80 (вісімдесят)."
    - statement: "Число 11 — це «одинадцять»."
      correct: true
      explanation: "Правильно."
    - statement: "Число 15 — це «п'ятдесят»."
      correct: false
      explanation: "15 — це «п'ятнадцять», а 50 — це «п'ятдесят»."
    - statement: "П'ять більше, ніж десять."
      correct: false
      explanation: "5 < 10."
    - statement: "Сто — це найбільше число від 1 до 100."
      correct: true
      explanation: "Так, 100 — це максимум у цьому діапазоні."
    - statement: "Один плюс один дорівнює три."
      correct: false
      explanation: "1 + 1 = 2."
    - statement: "Двадцять менше за десять."
      correct: false
      explanation: "20 > 10."
    - statement: "Тридцять плюс тридцять — це шістдесят."
      correct: true
      explanation: "30 + 30 = 60."
    - statement: "Нуль — це нічого."
      correct: true
      explanation: "Нуль позначає відсутність кількості."

