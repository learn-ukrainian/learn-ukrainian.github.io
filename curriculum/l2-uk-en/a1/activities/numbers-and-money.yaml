- type: "quiz"
  title: "Числа та ціни"
  items:
    - question: "Яке це число в українській мові? [nulʲ]"
      options:
        - text: "нуль"
          correct: true
        - text: "один"
          correct: false
        - text: "п'ять"
          correct: false
        - text: "десять"
          correct: false
    - question: "Яке це число в українській мові? [odɪˈnadtsʲatʲ]"
      options:
        - text: "одинадцять"
          correct: true
        - text: "дванадцять"
          correct: false
        - text: "тринадцять"
          correct: false
        - text: "десять"
          correct: false
    - question: "Як правильно сказати число \"15\" українською мовою?"
      options:
        - text: "п'ятнадцять"
          correct: true
        - text: "одинадцять"
          correct: false
        - text: "дев'ятнадцять"
          correct: false
        - text: "п'ять"
          correct: false
    - question: "Як правильно сказати число \"40\" українською мовою?"
      options:
        - text: "сорок"
          correct: true
        - text: "сорокнадцять"
          correct: false
        - text: "чотиридесят"
          correct: false
        - text: "сто"
          correct: false
    - question: "Як правильно запитати ціну предмета в магазині?"
      options:
        - text: "Скільки це коштує?"
          correct: true
        - text: "Хто це такий?"
          correct: false
        - text: "Де це знаходиться?"
          correct: false
        - text: "Як це називається?"
          correct: false
    - question: "Що означає українське слово \"здача\" в магазині?"
      options:
        - text: "money back / change"
          correct: true
        - text: "the total price"
          correct: false
        - text: "the list of items"
          correct: false
        - text: "hot fresh water"
          correct: false
    - question: "Яке це число в українській мові? [ˈdwadtsʲatʲ]"
      options:
        - text: "двадцять"
          correct: true
        - text: "дванадцять"
          correct: false
        - text: "тридцять"
          correct: false
        - text: "десять"
          correct: false
    - question: "Що означає українське слово \"дорого\" для покупця?"
      options:
        - text: "it is expensive"
          correct: true
        - text: "it is very cheap"
          correct: false
        - text: "it is the price"
          correct: false
        - text: "it is free water"
          correct: false
    - question: "Яке це число в українській мові? [stɔ]"
      options:
        - text: "сто"
          correct: true
        - text: "сорок"
          correct: false
        - text: "сім"
          correct: false
        - text: "сіль"
          correct: false
    - question: "Яке це число в українській мові? [sim]"
      options:
        - text: "сім"
          correct: true
        - text: "сімдесят"
          correct: false
        - text: "шість"
          correct: false
        - text: "вісім"
          correct: false
    - question: "Яке це число в українській мові? [pjatdeˈsʲat]"
      options:
        - text: "п'ятдесят"
          correct: true
        - text: "п'ятнадцять"
          correct: false
        - text: "п'ятдесятнадцять"
          correct: false
        - text: "п'ятсот"
          correct: false
    - question: "Яке це число в українській мові? [tʃoˈtɪrɪ]"
      options:
        - text: "чотири"
          correct: true
        - text: "чотирнадцять"
          correct: false
        - text: "чотиридесят"
          correct: false
        - text: "черешня"
          correct: false

- type: "fill-in"
  title: "Гроші та узгодження"
  items:
    - sentence: "Цей свіжий хліб коштує одна ___."
      answer: "гривня"
      options: ["гривня", "гривні", "гривень", "гроші"]
    - sentence: "Мала пляшка води коштує три ___."
      answer: "гривні"
      options: ["гривні", "гривня", "гривень", "гроші"]
    - sentence: "Смачна гаряча кава коштує п'ятнадцять ___."
      answer: "гривень"
      options: ["гривень", "гривня", "гривні", "гроші"]
    - sentence: "Ця газета коштує двадцять одна ___."
      answer: "гривня"
      options: ["гривня", "гривні", "гривень", "гроші"]
    - sentence: "Один квиток коштує дві ___."
      answer: "гривні"
      options: ["гривні", "гривня", "гривень", "гроші"]
    - sentence: "У моєму гаманці є сто ___."
      answer: "гривень"
      options: ["гривень", "гривня", "гривні", "гроші"]
    - sentence: "Ця сода коштує чотири ___."
      answer: "гривні"
      options: ["гривні", "гривня", "гривень", "гроші"]
    - sentence: "Це яблуко коштує шість ___."
      answer: "гривень"
      options: ["гривень", "гривня", "гривні", "гроші"]
    - sentence: "Одне велике яблуко коштує вісім ___."
      answer: "гривень"
      options: ["гривень", "гривня", "гривні", "гроші"]
    - sentence: "Ці два квитки коштують сорок дві ___."
      answer: "гривні"
      options: ["гривні", "гривня", "гривень", "гроші"]
    - sentence: "Ваша кава коштує тридцять одна ___."
      answer: "гривня"
      options: ["гривня", "гривні", "гривень", "гроші"]
    - sentence: "Це морозиво коштує дев'ять ___."
      answer: "гривень"
      options: ["гривень", "гривня", "гривні", "гроші"]

