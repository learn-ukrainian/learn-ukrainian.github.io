- type: group-sort
  title: "Правило 1–2–5"
  instruction: "Розподіліть числа за групами залежно від того, яку форму іменника вони вимагають (як 'гривня', 'гривні', 'гривень')."
  groups:
    - name: "1 (Один)"
      items: ["один", "двадцять один", "сто один"]
    - name: "2–4 (Два, три, чотири)"
      items: ["два", "три", "чотири", "двадцять два", "тридцять три"]
    - name: "5–0 (П'ять і більше)"
      items: ["п'ять", "шість", "десять", "одинадцять", "двадцять", "сорок", "дванадцять"]

- type: fill-in
  title: "Рахуємо гривні"
  instruction: "Оберіть правильну форму слова «гривня» відповідно до числа."
  items:
    - sentence: "Це одна ___."
      answer: "гривня"
      options: ["гривня", "гривні", "гривень", "гривнях"]
      explanation: "1 вимагає називного відмінка однини (Zone 1)."
    - sentence: "Це дві ___."
      answer: "гривні"
      options: ["гривні", "гривня", "гривень", "гривнях"]
      explanation: "2, 3, 4 вимагають називного відмінка множини (Zone 2)."
    - sentence: "Це три ___."
      answer: "гривні"
      options: ["гривні", "гривня", "гривень", "гривнях"]
      explanation: "2, 3, 4 вимагають називного відмінка множини (Zone 2)."
    - sentence: "Це чотири ___."
      answer: "гривні"
      options: ["гривні", "гривня", "гривень", "гривнях"]
      explanation: "4 вимагає називного відмінка множини (Zone 2)."
    - sentence: "Це п'ять ___."
      answer: "гривень"
      options: ["гривень", "гривня", "гривні", "гривнях"]
      explanation: "5 і більше вимагають родового відмінка множини (Zone 3)."
    - sentence: "Це шість ___."
      answer: "гривень"
      options: ["гривень", "гривня", "гривні", "гривнях"]
      explanation: "6 вимагає родового відмінка множини (Zone 3)."
    - sentence: "Це десять ___."
      answer: "гривень"
      options: ["гривень", "гривня", "гривні", "гривнях"]
      explanation: "10 закінчується на 0, тому це Zone 3 (Родовий множини)."
    - sentence: "Це одинадцять ___."
      answer: "гривень"
      options: ["гривень", "гривня", "гривні", "гривнях"]
      explanation: "11 закінчується на 'надцять' (11-19 завжди Zone 3)."
    - sentence: "Це дванадцять ___."
      answer: "гривень"
      options: ["гривень", "гривня", "гривні", "гривнях"]
      explanation: "12 закінчується на 'надцять' (11-19 завжди Zone 3)."
    - sentence: "Це двадцять одна ___."
      answer: "гривня"
      options: ["гривня", "гривні", "гривень", "гривнях"]
      explanation: "Складені числа, що закінчуються на 1 (крім 11), належать до Zone 1."
    - sentence: "Це двадцять дві ___."
      answer: "гривні"
      options: ["гривні", "гривня", "гривень", "гривнях"]
      explanation: "Складені числа, що закінчуються на 2 (крім 12), належать до Zone 2."
    - sentence: "Це сто ___."
      answer: "гривень"
      options: ["гривень", "гривня", "гривні", "гривнях"]
      explanation: "100 закінчується на 0, тому це Zone 3."

