- type: quiz
  title: "Математика на базарі"
  instruction: "Розв'яжіть прості приклади та оберіть правильну відповідь українською."
  items:
    - question: "Скільки буде, якщо додати один до одного?"
      explanation: "1 + 1 = 2 (два)."
      options:
        - text: "два"
          correct: true
        - text: "три"
          correct: false
        - text: "один"
          correct: false
        - text: "нуль"
          correct: false
    - question: "Скільки буде: п'ять плюс п'ять?"
      explanation: "5 + 5 = 10 (десять)."
      options:
        - text: "десять"
          correct: true
        - text: "двадцять"
          correct: false
        - text: "п'ять"
          correct: false
        - text: "нуль"
          correct: false
    - question: "Скільки буде, якщо від десяти відняти три?"
      explanation: "10 - 3 = 7 (сім)."
      options:
        - text: "сім"
          correct: true
        - text: "шість"
          correct: false
        - text: "вісім"
          correct: false
        - text: "два"
          correct: false
    - question: "Скільки буде, якщо до двадцяти додати десять?"
      explanation: "20 + 10 = 30 (тридцять)."
      options:
        - text: "тридцять"
          correct: true
        - text: "сорок"
          correct: false
        - text: "двадцять"
          correct: false
        - text: "п'ятдесят"
          correct: false
    - question: "Скільки буде: сто мінус п'ятдесят?"
      explanation: "100 - 50 = 50 (п'ятдесят)."
      options:
        - text: "п'ятдесят"
          correct: true
        - text: "шістдесят"
          correct: false
        - text: "сорок"
          correct: false
        - text: "сто"
          correct: false
    - question: "Скільки буде, якщо до сорока додати сорок?"
      explanation: "40 + 40 = 80 (вісімдесят)."
      options:
        - text: "вісімдесят"
          correct: true
        - text: "дев'яносто"
          correct: false
        - text: "сімдесят"
          correct: false
        - text: "сорок"
          correct: false
    - question: "Скільки буде: п'ятнадцять плюс п'ять?"
      explanation: "15 + 5 = 20 (двадцять)."
      options:
        - text: "двадцять"
          correct: true
        - text: "десять"
          correct: false
        - text: "тридцять"
          correct: false
        - text: "п'ятнадцять"
          correct: false
    - question: "Скільки буде: шістдесят мінус десять?"
      explanation: "60 - 10 = 50 (п'ятдесят)."
      options:
        - text: "п'ятдесят"
          correct: true
        - text: "шістдесят"
          correct: false
        - text: "сорок"
          correct: false
        - text: "сімдесят"
          correct: false
    - question: "Скільки буде: тридцять плюс тридцять?"
      explanation: "30 + 30 = 60 (шістдесят)."
      options:
        - text: "шістдесят"
          correct: true
        - text: "п'ятдесят"
          correct: false
        - text: "сімдесят"
          correct: false
        - text: "вісімдесят"
          correct: false
    - question: "Скільки буде: дев'яносто мінус сорок?"
      explanation: "90 - 40 = 50 (п'ятдесят)."
      options:
        - text: "п'ятдесят"
          correct: true
        - text: "сорок"
          correct: false
        - text: "шістдесят"
          correct: false
        - text: "сто"
          correct: false
    - question: "Скільки буде: сімдесят плюс десять?"
      explanation: "70 + 10 = 80 (вісімдесят)."
      options:
        - text: "вісімдесят"
          correct: true
        - text: "дев'яносто"
          correct: false
