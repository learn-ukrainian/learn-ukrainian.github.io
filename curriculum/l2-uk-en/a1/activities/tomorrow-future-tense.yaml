- type: fill-in
  title: 'Future Tense Helper'
  instruction: 'Complete the sentence with the correct form of "бути" (буду, будеш, буде, будемо, будете, будуть).'
  items:
    - sentence: 'Я _____ працювати завтра.'
      answer: 'буду'
      options: ['буду', 'будеш', 'буде', 'будемо']
    - sentence: 'Ти _____ читати книгу?'
      answer: 'будеш'
      options: ['будеш', 'буду', 'буде', 'будете']
    - sentence: 'Він _____ відпочивати.'
      answer: 'буде'
      options: ['буде', 'будуть', 'будемо', 'будеш']
    - sentence: 'Ми _____ грати у футбол.'
      answer: 'будемо'
      options: ['будемо', 'будете', 'будуть', 'буде']
    - sentence: 'Ви _____ пити каву?'
      answer: 'будете'
      options: ['будете', 'будемо', 'буде', 'будуть']
    - sentence: 'Вони _____ жити у Києві.'
      answer: 'будуть'
      options: ['будуть', 'будемо', 'будете', 'буде']
    - sentence: 'Вона _____ дивитися фільм.'
      answer: 'буде'
      options: ['буде', 'будуть', 'буду', 'будемо']
    - sentence: 'Я _____ снідати о восьмій.'
      answer: 'буду'
      options: ['буду', 'будеш', 'буде', 'будуть']
    - sentence: 'Друзі _____ обідати разом.'
      answer: 'будуть'
      options: ['будуть', 'буде', 'будемо', 'будете']
    - sentence: 'Тато _____ ремонтувати авто.'
      answer: 'буде'
      options: ['буде', 'будуть', 'буду', 'будемо']
    - sentence: 'Ми _____ мати відпустку скоро.'
      answer: 'будемо'
      options: ['будемо', 'будете', 'будуть', 'буде']
    - sentence: 'Ви _____ чекати тут?'
      answer: 'будете'
      options: ['будете', 'будемо', 'буде', 'будуть']

