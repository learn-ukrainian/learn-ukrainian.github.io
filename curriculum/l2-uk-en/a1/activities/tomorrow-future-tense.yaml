- type: unjumble
  title: 'Build a Future Sentence'
  instruction: 'Rearrange the words to form a correct sentence in the future tense.'
  items:
    - words: ['Я', 'буду', 'працювати', 'завтра']
      answer: 'Я буду працювати завтра'
    - words: ['Ми', 'будемо', 'відпочивати', 'скоро']
      answer: 'Ми будемо відпочивати скоро'
    - words: ['Він', 'буде', 'пити', 'чай']
      answer: 'Він буде пити чай'
    - words: ['Вони', 'будуть', 'грати', 'разом']
      answer: 'Вони будуть грати разом'
    - words: ['Ти', 'будеш', 'читати', 'це?']
      answer: 'Ти будеш читати це?'
    - words: ['Вона', 'буде', 'жити', 'тут']
      answer: 'Вона буде жити тут'
    - words: ['Ви', 'будете', 'їсти', 'борщ?']
      answer: 'Ви будете їсти борщ?'
    - words: ['Завтра', 'я', 'буду', 'вдома']
      answer: 'Завтра я буду вдома'
    - words: ['Потім', 'ми', 'будемо', 'гуляти']
      answer: 'Потім ми будемо гуляти'
    - words: ['Скоро', 'буде', 'літо']
      answer: 'Скоро буде літо'
    - words: ['Він', 'буде', 'мати', 'час']
      answer: 'Він буде мати час'
    - words: ['Вона', 'буде', 'робити', 'зарядку']
      answer: 'Вона буде робити зарядку'

