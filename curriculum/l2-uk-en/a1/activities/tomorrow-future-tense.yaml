  groups:
    - name: 'Минуле (Past)'
      items: ['вчора', 'минулого тижня', 'минулого року', 'раніше']
    - name: 'Теперішнє (Present)'
      items: ['сьогодні', 'зараз', 'тепер', 'у цей момент']
    - name: 'Майбутнє (Future)'
      items: ['завтра', 'післязавтра', 'наступного тижня', 'скоро']

- type: true-false
  title: 'Future Tense Rules'
  instruction: 'Decide if the statement about the future tense is True or False.'
  items:
    - statement: 'To form the compound future, we use "бути" + infinitive.'
      correct: true
    - statement: 'The helper verb "бути" does not change for different people.'
      correct: false
    - statement: '"Я буду працювати" means "I will work".'
      correct: true
    - statement: '"Наступного року" means "Last year".'
      correct: false
    - statement: 'We use "у/в" with days of the week for future plans.'
      correct: true
    - statement: '"Скоро" means "Soon".'
      correct: true
    - statement: '"Я хочу" is used for dream and desires.'
      correct: true
    - statement: '"Збиратися" is used for concrete plans.'
      correct: true
    - statement: '"Будуть" is the form for "We".'
      correct: false
    - statement: 'It is correct to say "Я буду прочитати" (I will finish reading).'
      correct: false
    - statement: '"Післязавтра" is the day before yesterday.'
      correct: false
    - statement: '"Потім" means "Then" or "Later".'
      correct: true
