- type: true-false
  title: "True or False?"
  instruction: "Read the statements about Ukrainian café culture and mark them true or false."
  items:
    - statement: "In Lviv, the word 'філіжанка' is often used for a coffee cup."
      correct: true
      explanation: "This is a characteristic word of the Galician dialect."
    - statement: "You should say 'Я хочу кава' to order."
      correct: false
      explanation: "Incorrect grammar. You must say 'Я хочу каву' (Accusative)."
    - statement: "Paying by card (PayPass) is very common in Ukraine."
      correct: true
      explanation: "Even small kiosks usually accept cards."
    - statement: "A 'кав'ярня' is exactly the same as a restaurant."
      correct: false
      explanation: "A кав'ярня focuses on coffee and pastries, not full meals."
    - statement: "If you want milk, you say 'без молока'."
      correct: false
      explanation: "'Без' means without. For 'with', use 'з'."
    - statement: "You usually ask for the bill at the table."
      correct: true
      explanation: "It is polite to ask 'Можна рахунок?' rather than walking to the counter immediately."
    - statement: "You can stay in a café for a long time."
      correct: true
      explanation: "Cafés are designed for lingering and socializing."
    - statement: "You must order a full meal in a café."
      correct: false
      explanation: "You can just have a coffee or dessert."

- type: fill-in
  title: "Grammar Check: Correct Forms"
  instruction: "Select the correct form of the word for the sentence."
  items:
    - sentence: "Я буду ___."
      answer: "каву"
      options: ["каву", "кава", "кави", "каві"]
      explanation: "Accusative case for the object you are ordering."
    - sentence: "Можна ___, будь ласка?"
      answer: "меню"
      options: ["меню", "мене", "менше", "мен"]
      explanation: "Menu is indeclinable (does not change)."
    - sentence: "Я візьму ___."
      answer: "круасан"
      options: ["круасан", "круасана", "круасану", "круасани"]
      explanation: "Masculine inanimate nouns do not change in the Accusative."
    - sentence: "Це ваша ___."
      answer: "кава"
      options: ["кава", "каву", "кави", "каві"]
      explanation: "Nominative case because it is the subject here ('This is coffee')."
    - sentence: "Дайте, будь ласка, ___."
      answer: "воду"
      options: ["воду", "вода", "води", "воді"]
      explanation: "Feminine nouns ending in -a change to -u in Accusative."
    - sentence: "Я плачу ___."
      answer: "карткою"
      options: ["карткою", "картка", "картку", "картки"]
      explanation: "Instrumental case answers 'how?' or 'with what?'."
    - sentence: "Я буду ___."
      answer: "чай"
      options: ["чай", "чаю", "чаєм", "чаї"]
      explanation: "Masculine inanimate noun (Accusative = Nominative)."
    - sentence: "Можна ___?"
      answer: "сік"
      options: ["сік", "соку", "соком", "соки"]
      explanation: "Masculine inanimate noun (Accusative = Nominative)."

