- type: match-up
  title: "Essential Phrases"
  instruction: "Match the Ukrainian phrase to its English meaning."
  pairs:
    - left: "Дайте, будь ласка..."
      right: "Give me, please..."
    - left: "Я буду..."
      right: "I will have..."
    - left: "Можна рахунок?"
      right: "Can I have the bill?"
    - left: "Що ви порадите?"
      right: "What do you recommend?"
    - left: "Я візьму..."
      right: "I will take..."
    - left: "Окремий рахунок"
      right: "Separate bill"
    - left: "Готівкою чи карткою?"
      right: "Cash or card?"
    - left: "Чек, будь ласка"
      right: "Receipt, please"

- type: group-sort
  title: "Ordering Grammar: Accusative Case"
  instruction: "Sort the items based on how they change in the Accusative case (when you order them)."
  groups:
    - name: "Change to -у (Feminine)"
      items: ["кава", "вода", "арабіка", "філіжанка", "робуста", "м'ята"]
    - name: "No Change (Masculine)"
      items: ["чай", "сік", "круасан", "рахунок", "цукор", "десерт"]

- type: unjumble
  title: "Make an Order"
  instruction: "Arrange the words to form correct sentences."
  items:
    - words: ["Дайте", "ласка", "каву", "будь"]
      answer: "Дайте каву будь ласка"
    - words: ["Я", "буду", "зелений", "чай"]
      answer: "Я буду зелений чай"
    - words: ["Можна", "будь", "рахунок", "ласка"]
      answer: "Можна рахунок будь ласка"
    - words: ["Ви", "карткою", "платите", "чи", "готівкою"]
      answer: "Ви платите карткою чи готівкою"
    - words: ["кава", "дуже", "Ваша", "смачна"]
      answer: "Ваша кава дуже смачна"
    - words: ["меню", "Можна", "ласка", "будь"]
      answer: "Можна меню будь ласка"

- type: quiz
  title: "Café Culture & Etiquette"
  instruction: "Choose the correct answer based on Ukrainian traditions."
  items:
    - question: "What is the polite way to start your order?"
      explanation: "Always greet the staff before ordering."
      options:
        - text: "Добрий день"
          correct: true
        - text: "Я хочу каву"
          correct: false
        - text: "Дайте меню"
          correct: false
        - text: "Швидше"
          correct: false
    - question: "Which city is considered the coffee capital of Ukraine?"
      explanation: "Lviv is famous for its coffee culture and history."
      options:
        - text: "Львів"
          correct: true
        - text: "Київ"
          correct: false
        - text: "Одеса"
          correct: false
        - text: "Харків"
          correct: false
    - question: "What is the Lviv dialect word for 'coffee cup'?"
      explanation: "Філіжанка is a specific Galician word for a cup."
      options:
        - text: "філіжанка"
          correct: true
        - text: "склянка"
          correct: false
        - text: "банка"
          correct: false
        - text: "відро"
          correct: false
    - question: "Who opened one of the first coffee houses in Vienna?"
      explanation: "Yuriy Kulchytsky is a Ukrainian hero of coffee history."
      options:
        - text: "Юрій Кульчицький"
          correct: true
        - text: "Тарас Шевченко"
          correct: false
        - text: "Богдан Хмельницький"
          correct: false
        - text: "Іван Франко"
          correct: false
    - question: "What does 'кав'ярня' specialize in?"
      explanation: "A кав'ярня focuses on coffee, tea, and desserts, not full meals."
      options:
        - text: "coffee and desserts"
          correct: true
        - text: "borshch and varenyky"
          correct: false
        - text: "pizza and sushi"
          correct: false
        - text: "beer and chips"
          correct: false
    - question: "How do you say 'I want coffee' correctly?"
      explanation: "You must use the Accusative case: каву."
      options:
        - text: "Я хочу каву"
          correct: true
        - text: "Я хочу кава"
          correct: false
        - text: "Я хочу кави"
          correct: false
        - text: "Я хочу каві"
          correct: false
    - question: "What is the meaning of the word 'пляцок'?"
      explanation: "It is a Galician cake."
      options:
        - text: "a cake"
          correct: true
        - text: "a coffee"
          correct: false
        - text: "a spoon"
          correct: false
        - text: "a table"
          correct: false
    - question: "What do you say when leaving a café?"
      explanation: "Politeness dictates saying goodbye."
      options:
        - text: "До побачення"
          correct: true
        - text: "Добрий день"
          correct: false
        - text: "Смачного"
          correct: false
        - text: "Будь ласка"
          correct: false

- type: fill-in
  title: "Dialogue with the Barista"
  instruction: "Complete the dialogue with the missing words."
  items:
    - sentence: "— Добрий ___! Що будете замовляти?"
      answer: "день"
      options: ["день", "ранок", "вечір", "час"]
      explanation: "A standard polite greeting."
    - sentence: "— Дайте, будь ___, велику каву."
      answer: "ласка"
      options: ["ласка", "добре", "прошу", "дякую"]
      explanation: "Part of the fixed phrase 'будь ласка' (please)."
    - sentence: "— Вам з ___ чи без?"
      answer: "молоком"
      options: ["молоком", "молоко", "молока", "молоку"]
      explanation: "Using 'z' (with) requires the Instrumental case (ending -ом)."
    - sentence: "— З молоком, але без ___."
      answer: "цукру"
      options: ["цукру", "цукор", "цукром", "цукрі"]
      explanation: "Using 'bez' (without) requires the Genitive case (ending -у)."
    - sentence: "— Ви платите ___ чи карткою?"
      answer: "готівкою"
      options: ["готівкою", "готівка", "готівку", "готівки"]
      explanation: "Instrumental case for 'by cash'."
    - sentence: "— ___, будь ласка. Ось моя картка."
      answer: "Карткою"
      options: ["Карткою", "Картка", "Картку", "Картки"]
      explanation: "Instrumental case for 'by card'."
    - sentence: "— Я буду ___ кави."
      answer: "філіжанку"
      options: ["філіжанку", "філіжанка", "філіжанки", "філіжанкою"]
      explanation: "Accusative case: філіжанка → філіжанку (a cup of coffee)."
    - sentence: "— Я люблю ___."
      answer: "еспресо"
      options: ["еспресо", "еспреса", "еспресу", "еспресі"]
      explanation: "Espresso is indeclinable."

