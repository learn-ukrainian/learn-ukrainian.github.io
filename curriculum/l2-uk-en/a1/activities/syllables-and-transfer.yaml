- type: fill-in
  title: "Заповніть пропуски у реченнях"
  instruction: "Choose the correct word to complete the sentence."
  items:
    - sentence: "Він п'є свіже _____."
      answer: "молоко"
      options:
        - "молоко"
        - "дерево"
        - "місто"
        - "око"
      explanation: "Молоко is a drink."
    - sentence: "Ми йдемо в _____, щоб взяти книгу."
      answer: "бібліотеку"
      options:
        - "бібліотеку"
        - "дерево"
        - "молоко"
        - "автобус"
      explanation: "Книги беруть у бібліотеці."
    - sentence: "По цій дорозі їде _____."
      answer: "автобус"
      options:
        - "автобус"
        - "склад"
        - "голосний"
        - "університет"
      explanation: "Автобус is a vehicle that drives."
    - sentence: "Моя старша _____ живе в Києві."
      answer: "сестра"
      options:
        - "сестра"
        - "вулиця"
        - "бібліотека"
        - "мова"
      explanation: "Сестра is a family member."
    - sentence: "Хрещатик — це головна _____ Києва."
      answer: "вулиця"
      options:
        - "вулиця"
        - "сестра"
        - "мова"
        - "сім'я"
      explanation: "Хрещатик is a famous street."
    - sentence: "Мій брат навчається в _____."
      answer: "університеті"
      options:
        - "університеті"
        - "молоці"
        - "оці"
        - "складі"
      explanation: "Університет is a place of study."
    - sentence: "В парку росте велике зелене _____."
      answer: "дерево"
      options:
        - "дерево"
        - "місто"
        - "переніс"
        - "наголос"
      explanation: "Дерево grows in a park."
    - sentence: "Київ — це велике _____."
      answer: "місто"
      options:
        - "місто"
        - "дерево"
        - "око"
        - "молоко"
      explanation: "Київ is a city."

