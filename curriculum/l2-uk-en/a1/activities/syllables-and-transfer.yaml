- type: quiz
  title: "Перевірка знань: Склади"
  instruction: "Choose the correct answer based on the lesson rules."
  items:
    - question: "Що є основою кожного складу в українській мові?"
      explanation: "Кожен склад обов'язково має один голосний звук."
      options:
        - text: "голосний звук"
          correct: true
        - text: "приголосний звук"
          correct: false
        - text: "наголос"
          correct: false
        - text: "м'який знак"
          correct: false
    - question: "Як визначити кількість складів у слові?"
      explanation: "Один голосний звук дорівнює одному складу."
      options:
        - text: "порахувати голосні звуки"
          correct: true
        - text: "порахувати всі літери"
          correct: false
        - text: "порахувати приголосні звуки"
          correct: false
        - text: "подивитися у словнику"
          correct: false
    - question: "Який склад називається відкритим в українській мові?"
      explanation: "Відкритий склад завжди закінчується на голосний звук."
      options:
        - text: "склад, який закінчується на голосний"
          correct: true
        - text: "склад, який закінчується на приголосний"
          correct: false
        - text: "перший склад у слові"
          correct: false
        - text: "наголошений склад"
          correct: false
    - question: "Як правильно розділити слово 'сестра' для вимови?"
      explanation: "Українська мова переносить приголосні в наступний склад."
      options:
        - text: "се-стра"
          correct: true
        - text: "сес-тра"
          correct: false
        - text: "с-естра"
          correct: false
        - text: "сест-ра"
          correct: false
    - question: "Як правильно перенести слово 'око' на інший рядок?"
      explanation: "Одну літеру не можна залишати на рядку."
      options:
        - text: "його не можна переносити"
          correct: true
        - text: "о-ко"
          correct: false
        - text: "ок-о"
          correct: false
        - text: "можна як завгодно"
          correct: false
    - question: "Що не можна відривати від попередньої літери при переносі?"
      explanation: "М'який знак та апостроф завжди залишаються з попередньою літерою."
      options:
        - text: "м'який знак та апостроф"
          correct: true
        - text: "голосний звук"
          correct: false
        - text: "останню літеру"
          correct: false
        - text: "наголошений склад"
          correct: false
    - question: "Як вимовляється наголошений склад в українській мові?"
      explanation: "Наголошений склад має більшу інтенсивність і довжину."
      options:
        - text: "довше і гучніше"
          correct: true
        - text: "дуже швидко"
          correct: false
        - text: "тихо і коротко"
          correct: false
        - text: "без голосного звуку"
          correct: false
    - question: "Що не можна розділяти при переносі слова 'ґудзик'?"
      explanation: "Диграф дз позначає один звук і не розділяється."
      options:
        - text: "літери д та з"
          correct: true
        - text: "літери у та д"
          correct: false
        - text: "літери з та и"
          correct: false
        - text: "літери и та к"
          correct: false

