- type: quiz
  title: "Перевірка правил: Наголос і переніс"
  instruction: "Choose the correct answer regarding syllables, stress, and transfer."
  items:
    - question: "Скільки складів має слово 'університет'?"
      explanation: "Слово має п'ять голосних: у, і, е, и, е."
      options:
        - text: "п'ять"
          correct: true
        - text: "чотири"
          correct: false
        - text: "шість"
          correct: false
        - text: "три"
          correct: false
    - question: "Який варіант переносу слова 'пальці' є правильним?"
      explanation: "М'який знак не можна відривати від попередньої приголосної."
      options:
        - text: "паль-ці"
          correct: true
        - text: "пал-ьці"
          correct: false
        - text: "па-льці"
          correct: false
        - text: "пальц-і"
          correct: false
    - question: "Який варіант переносу слова 'сім'я' є правильним?"
      explanation: "Апостроф залишається з тією літерою, після якої він стоїть."
      options:
        - text: "сі-м'я"
          correct: true
        - text: "сім-'я"
          correct: false
        - text: "сі-м'-я"
          correct: false
        - text: "с-ім'я"
          correct: false
    - question: "Яке з цих слів містить лише відкриті склади?"
      explanation: "У слові дерево (де-ре-во) всі склади закінчуються на голосні."
      options:
        - text: "дерево"
          correct: true
        - text: "кіт"
          correct: false
        - text: "автобус"
          correct: false
        - text: "склад"
          correct: false
    - question: "Скільки голосних звуків у слові 'бібліотека'?"
      explanation: "Голосні у слові: і, і, о, е, а."
      options:
        - text: "п'ять"
          correct: true
        - text: "чотири"
          correct: false
        - text: "шість"
          correct: false
        - text: "три"
          correct: false
    - question: "Чи можна розірвати слово 'око' при переносі на новий рядок?"
      explanation: "За правилами переносу одну літеру залишати на рядку заборонено."
      options:
        - text: "ні, одну літеру не можна залишати"
          correct: true
        - text: "так, це правильно"
          correct: false
        - text: "можна, якщо мало місця"
          correct: false
        - text: "тільки у віршах"
          correct: false
    - question: "Який тип звуку завжди утворює новий склад?"
      explanation: "Скільки в слові голосних звуків, стільки й складів."
      options:
        - text: "голосний"
          correct: true
        - text: "приголосний"
          correct: false
        - text: "твердий"
          correct: false
        - text: "м'який"
          correct: false
    - question: "На який склад падає наголос у слові 'молоко'?"
      explanation: "Наголошений останній склад: молоКО."
      options:
        - text: "на останній склад"
          correct: true
        - text: "на перший склад"
          correct: false
        - text: "на середній склад"
          correct: false
        - text: "на кожен склад"
          correct: false

