- type: quiz
  title: "Розуміння часу"
  instruction: "Оберіть правильну відповідь на запитання."
  items:
    - question: "Як правильно запитати про поточний час українською мовою?"
      explanation: "Питання «Котра година?» використовується, щоб дізнатися поточний час."
      options:
        - text: "Котра година?"
          correct: true
        - text: "Яка година?"
          correct: false
        - text: "Скільки годин?"
          correct: false
        - text: "Де година?"
          correct: false
    - question: "Як правильно запитати про час події або зустрічі?"
      explanation: "Питання «О котрій?» (або «О котрій годині?») стосується часу, коли щось відбувається."
      options:
        - text: "О котрій?"
          correct: true
        - text: "Котра зараз?"
          correct: false
        - text: "Який час?"
          correct: false
        - text: "Скільки часу?"
          correct: false
    - question: "Якого роду слово «година» в українській мові?"
      explanation: "Слово «година» є іменником жіночого роду (вона)."
      options:
        - text: "Жіночого"
          correct: true
        - text: "Чоловічого"
          correct: false
        - text: "Середнього"
          correct: false
        - text: "Воно не має роду"
          correct: false
    - question: "Як сказати 01:00, використовуючи правильний рід?"
      explanation: "Ми використовуємо порядковий числівник жіночого роду «перша», оскільки «година» — жіночого роду."
      options:
        - text: "Перша година"
          correct: true
        - text: "Один година"
          correct: false
        - text: "Перший година"
          correct: false
        - text: "Одна година"
          correct: false
    - question: "Що означає слово «зараз» у контексті часу?"
      explanation: "Слово «зараз» означає «в цей момент» або «now»."
      options:
        - text: "В цей момент"
          correct: true
        - text: "Вчора"
          correct: false
        - text: "Завтра"
          correct: false
        - text: "Пізніше"
          correct: false
    - question: "Як звернутися до чоловіка, щоб ввічливо запитати час?"
      explanation: "Ввічлива форма звертання до чоловіка — «Пане»."
      options:
        - text: "Перепрошую, пане"
          correct: true
        - text: "Гей, ти"
          correct: false
        - text: "Привіт, друже"
          correct: false
        - text: "Слухай сюди"
          correct: false
    - question: "Коли українці зазвичай використовують 24-годинний формат?"
      explanation: "24-годинний формат є офіційним для розкладів транспорту та офіційних подій."
      options:
        - text: "У розкладах поїздів"
          correct: true
        - text: "У розмові з друзями"
          correct: false
        - text: "Вдома з родиною"
          correct: false
        - text: "Тільки в армії"
          correct: false
    - question: "Який прийменник ми використовуємо, щоб сказати «At what time»?"
      explanation: "Прийменник «о» (або «об») використовується для позначення точного часу події."
      options:
        - text: "О / Об"
          correct: true
        - text: "На / Над"
          correct: false
        - text: "Під / За"
          correct: false
        - text: "До / Від"
          correct: false
    - question: "З якого дня починається тиждень в Україні?"
      explanation: "В Україні тиждень починається з понеділка."
      options:
        - text: "З понеділка"
          correct: true
        - text: "З неділі"
          correct: false
        - text: "З суботи"
          correct: false
        - text: "З вівторка"
          correct: false
    - question: "Що означає слово «неділя» в перекладі?"
      explanation: "Слово «неділя» походить від слів «не діло», тобто день, коли не працюють."
      options:
        - text: "Немає діла (роботи)"
          correct: true
        - text: "День сонця"
          correct: false
        - text: "Новий день"
          correct: false
        - text: "Кінець тижня"
          correct: false
    - question: "Як називається місяць, що розпочинає календарний рік?"
      explanation: "Січень — це перший місяць року."
      options:
        - text: "Січень"
          correct: true
        - text: "Грудень"
          correct: false
        - text: "Вересень"
          correct: false
        - text: "Березень"
          correct: false
    - question: "Який відмінок ми використовуємо після прийменника «до» (until)?"
      explanation: "Після прийменника «до» завжди використовується родовий відмінок."
      options:
        - text: "Родовий відмінок"
          correct: true
        - text: "Називний відмінок"
          correct: false
        - text: "Орудний відмінок"
          correct: false
        - text: "Кличний відмінок"
          correct: false

