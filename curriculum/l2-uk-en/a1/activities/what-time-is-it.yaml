- type: quiz
  title: "Місяці та пори року"
  instruction: "Дайте відповідь на запитання про місяці."
  items:
    - question: "Який місяць походить від слова «квіти»?"
      explanation: "Квітень — це місяць, коли цвітуть квіти (квітнуть)."
      options:
        - text: "Квітень"
          correct: true
        - text: "Травень"
          correct: false
        - text: "Березень"
          correct: false
        - text: "Липень"
          correct: false
    - question: "У якому місяці зазвичай жовтіє листя?"
      explanation: "Жовтень названий на честь жовтого листя."
      options:
        - text: "У жовтні"
          correct: true
        - text: "У серпні"
          correct: false
        - text: "У червні"
          correct: false
        - text: "У грудні"
          correct: false
    - question: "Який із цих місяців є літнім місяцем?"
      explanation: "Червень — це перший місяць літа."
      options:
        - text: "Червень"
          correct: true
        - text: "Вересень"
          correct: false
        - text: "Березень"
          correct: false
        - text: "Грудень"
          correct: false
    - question: "Коли ми святкуємо початок року?"
      explanation: "Рік починається у січні."
      options:
        - text: "У січні"
          correct: true
        - text: "У травні"
          correct: false
        - text: "У вересні"
          correct: false
        - text: "У липні"
          correct: false
    - question: "Який місяць має назву, пов'язану з травою?"
      explanation: "Травень походить від слова «трава»."
      options:
        - text: "Травень"
          correct: true
        - text: "Квітень"
          correct: false
        - text: "Серпень"
          correct: false
        - text: "Лютий"
          correct: false
    - question: "Який із цих місяців є осіннім місяцем?"
      explanation: "Листопад — це останній місяць осені."
      options:
        - text: "Листопад"
          correct: true
        - text: "Січень"
          correct: false
        - text: "Квітень"
          correct: false
        - text: "Липень"
          correct: false
    - question: "Що означає назва місяця «Лютий»?"
      explanation: "Лютий означає «fierce» або «ferocious» через сильні морози."
      options:
        - text: "Лютий, жорстокий"
          correct: true
        - text: "Любий, милий"
          correct: false
        - text: "Теплий, сонячний"
          correct: false
        - text: "Дощовий, мокрий"
          correct: false
    - question: "Скажіть, будь ласка, який місяць передує квітню?"
      explanation: "Перед квітнем йде березень."
      options:
        - text: "Березень"
          correct: true
        - text: "Травень"
          correct: false
        - text: "Лютий"
          correct: false
        - text: "Січень"
          correct: false
    - question: "Який місяць йде після серпня?"
      explanation: "Після серпня настає вересень."
      options:
        - text: "Вересень"
          correct: true
        - text: "Липень"
          correct: false
        - text: "Жовтень"
          correct: false
        - text: "Червень"
          correct: false
    - question: "У якому місяці цвітуть липи?"
      explanation: "Липень названий на честь цвітіння липи."
      options:
        - text: "У липні"
          correct: true
        - text: "У червні"
          correct: false
        - text: "У серпні"
          correct: false
        - text: "У травні"
          correct: false
    - question: "Який місяць названий на честь серпа та жнив?"
      explanation: "Серпень походить від слова «серп» (sickle)."
      options:
        - text: "Серпень"
          correct: true
        - text: "Вересень"
          correct: false
        - text: "Жовтень"
          correct: false
        - text: "Листопад"
          correct: false
    - question: "Як називається місяць, який завершує календарний рік?"
      explanation: "Грудень — це останній місяць року."
      options:
        - text: "Грудень"
          correct: true
        - text: "Січень"
          correct: false
        - text: "Листопад"
          correct: false
        - text: "Лютий"
          correct: false

- type: fill-in
  title: "Мій розклад дня"
  instruction: "Доповніть речення про щоденну рутину."
  items:
    - sentence: "Я ___ о сьомій ранку."
      answer: "прокидаюся"
      options: ["прокидаюся", "сплю", "обідаю", "вечеряю"]
      explanation: "Вранці ми прокидаємося."
    - sentence: "Я ___ о восьмій годині."
      answer: "снідаю"
      options: ["снідаю", "вечеряю", "сплю", "гуляю"]
      explanation: "О восьмій ранку зазвичай снідають."
    - sentence: "Він починає ___ о дев'ятій."
      answer: "працювати"
      options: ["працювати", "спати", "снідати", "вечеряти"]
      explanation: "Робочий день часто починається о дев'ятій."
    - sentence: "Ми ___ о першій годині дня."
      answer: "обідаємо"
      options: ["обідаємо", "снідаємо", "спимо", "прокидаємося"]
      explanation: "О першій дня (13:00) зазвичай обідають."
    - sentence: "Я закінчую роботу о ___."
      answer: "шостій"
      options: ["шостій", "першій", "третій", "дванадцятій"]
      explanation: "Кінець робочого дня часто о шостій вечора (18:00)."
    - sentence: "Вдома я ___ о сьомій вечора."
      answer: "вечеряю"
      options: ["вечеряю", "снідаю", "обідаю", "працюю"]
      explanation: "Увечері люди вечеряють."
    - sentence: "Вона лягає ___ о десятій вечора."
      answer: "спати"
      options: ["спати", "гуляти", "їсти", "працювати"]
      explanation: "Ввечері лягають спати."
    - sentence: "Сьогодні я маю багато ___."
      answer: "часу"
      options: ["часу", "годин", "хвилин", "років"]
      explanation: "В цьому контексті використовуємо слово «час»."
    - sentence: "Ми зустрічаємося ___ вранці."
      answer: "завтра"
      options: ["завтра", "вчора", "зараз", "рік"]
      explanation: "Завтра вранці — логічний час для майбутньої зустрічі."
    - sentence: "Зараз ___ година вечора."
      answer: "восьма"
      options: ["восьма", "ранок", "день", "ніч"]
      explanation: "Восьма година вечора (20:00)."
    - sentence: "Поїзд ___ вчасно."
      answer: "прибуває"
      options: ["прибуває", "спить", "їсть", "працює"]
      explanation: "Поїзди прибувають або відправляються."
    - sentence: "Я не можу, я ___."
      answer: "працюю"
      options: ["працюю", "година", "хвилина", "день"]
      explanation: "Це причина відмови — я працюю."

- type: unjumble
  title: "Діалоги про час"
  instruction: "Складіть речення, щоб відтворити діалог."
  items:
    - words: ["скажіть", "ласка", "будь", "котра", "година"]
      answer: "Скажіть будь ласка котра година"
    - words: ["зараз", "десята", "рівно", "година"]
      answer: "Зараз рівно десята година"
    - words: ["зустрінемося", "о", "котрій", "ми"]
      answer: "О котрій ми зустрінемося"
    - words: ["о", "сьомій", "давай", "вечора"]
      answer: "Давай о сьомій вечора"
    - words: ["працюєш", "сьогодні", "ти", "до", "котрої"]
      answer: "До котрої ти сьогодні працюєш"
    - words: ["я", "шостої", "працюю", "до"]
      answer: "Я працюю до шостої"
    - words: ["вільний", "ти", "суботу", "у"]
      answer: "Ти вільний у суботу"
