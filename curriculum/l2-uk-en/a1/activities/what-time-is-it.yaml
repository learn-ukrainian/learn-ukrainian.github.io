- type: quiz
  title: "Time Expressions"
  instruction: "Choose the correct Ukrainian phrase."
  items:
    - question: "Which phrase means 'at 11:00'?"
      options:
        - text: "об одинадцятій годині"
          correct: true
        - text: "о одинадцятій годині"
          correct: false
        - text: "в одинадцятій годині"
          correct: false
        - text: "у одинадцятій годині"
          correct: false
      explanation: "We use 'об' because 'одинадцять' begins with a vowel."
    - question: "Which phrase means 'until evening'?"
      options:
        - text: "до вечора"
          correct: true
        - text: "після вечора"
          correct: false
        - text: "у вечір"
          correct: false
        - text: "на вечір"
          correct: false
      explanation: "'До' means 'until'."
    - question: "What is the correct 24-hour official format for 2:00 PM?"
      options:
        - text: "чотирнадцята година"
          correct: true
        - text: "друга година дня"
          correct: false
        - text: "дванадцята година"
          correct: false
        - text: "четверта година"
          correct: false
      explanation: "Official format uses the 24-hour clock, so 14:00 is 'чотирнадцята година'."
    - question: "What is the regular conversational phrase for 9:00 PM?"
      options:
        - text: "дев'ята година вечора"
          correct: true
        - text: "двадцять перша година"
          correct: false
        - text: "дев'ята година ранку"
          correct: false
        - text: "дев'ята година"
          correct: false
      explanation: "In conversation, use the 12-hour clock and specify 'вечора' (of the evening)."
    - question: "How do you politely ask a man for the time?"
      options:
        - text: "Пане, котра година?"
          correct: true
        - text: "Пані, котра година?"
          correct: false
        - text: "Котра година, пане?"
          correct: false
        - text: "Хто година?"
          correct: false
      explanation: "Use 'Пане' for a man."
    - question: "Which season includes 'грудень, січень, лютий'?"
      options:
        - text: "Winter"
          correct: true
        - text: "Spring"
          correct: false
        - text: "Summer"
          correct: false
        - text: "Autumn"
          correct: false
      explanation: "These are the winter months."
    - question: "Which phrase means 'after morning'?"
      options:
        - text: "після ранку"
          correct: true
        - text: "до ранку"
          correct: false
        - text: "у ранок"
          correct: false
        - text: "на ранок"
          correct: false
      explanation: "'Після' means after."
    - question: "Which phrase means 'at 5 o'clock'?"
      options:
        - text: "о п'ятій годині"
          correct: true
        - text: "об п'ятій годині"
          correct: false
        - text: "у п'ятій годині"
          correct: false
        - text: "в п'ятій годині"
          correct: false
      explanation: "We use 'о' before a consonant."