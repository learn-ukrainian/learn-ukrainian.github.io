- type: fill-in
  title: "Використання прийменників часу"
  instruction: "Вставте пропущений прийменник (о, об, до, після, у, в)."
  items:
    - sentence: "Я прокидаюся ___ сьомій годині ранку."
      answer: "о"
      options: ["о", "на", "під", "за"]
      explanation: "Для позначення часу події використовуємо «о»."
    - sentence: "Ми обідаємо ___ першій годині дня."
      answer: "о"
      options: ["о", "у", "на", "до"]
      explanation: "Для часу використовуємо «о»."
    - sentence: "Він працює ___ шостої вечора."
      answer: "до"
      options: ["до", "на", "при", "в"]
      explanation: "Для позначення кінця дії використовуємо «до» (until)."
    - sentence: "Магазин відчинений ___ дев'ятої ранку."
      answer: "з"
      options: ["з", "у", "на", "о"]
      explanation: "Для позначення початку періоду використовуємо «з» (from)."
    - sentence: "Ми гуляємо в парку ___ обіду."
      answer: "після"
      options: ["після", "на", "під", "в"]
      explanation: "«Після» означає «after»."
    - sentence: "Поїзд прибуває ___ одинадцятій годині."
      answer: "об"
      options: ["об", "о", "на", "у"]
      explanation: "Перед голосною «о» (одинадцять) використовуємо «об» для милозвучності."
    - sentence: "Я маю урок ___ понеділок."
      answer: "у"
      options: ["у", "на", "до", "з"]
      explanation: "З днями тижня використовуємо «у» або «в»."
    - sentence: "Ми зустрінемося ___ вівторок."
      answer: "у"
      options: ["у", "на", "з", "до"]
      explanation: "Перед приголосним звуком «в» використовуємо «у»."
    - sentence: "___ середу я відпочиваю."
      answer: "У"
      options: ["У", "На", "З", "До"]
      explanation: "З днями тижня використовуємо «у»."
    - sentence: "День народження Тараса ___ березні."
      answer: "у"
      options: ["у", "на", "з", "о"]
      explanation: "З назвами місяців використовуємо «у» або «в»."
    - sentence: "Сніг падає ___ січні."
      answer: "у"
      options: ["у", "на", "до", "з"]
      explanation: "З назвами місяців використовуємо «у»."
    - sentence: "Ми їдемо на море ___ липні."
      answer: "у"
      options: ["у", "на", "за", "під"]
      explanation: "З назвами місяців використовуємо «у»."

- type: unjumble
  title: "Побудуйте речення"
  instruction: "Розставте слова у правильному порядку, щоб утворити речення."
  items:
    - words: ["котра", "зараз", "година"]
      answer: "Котра зараз година"
    - words: ["сьома", "зараз", "година"]
      answer: "Зараз сьома година"
    - words: ["шостій", "прибуває", "поїзд", "о"]
      answer: "Поїзд прибуває о шостій"
    - words: ["працюю", "я", "п'ятої", "до"]
      answer: "Я працюю до п'ятої"
    - words: ["зустрінемося", "вівторок", "у", "давай"]
      answer: "Давай зустрінемося у вівторок"
    - words: ["обідаємо", "першій", "ми", "о"]
      answer: "Ми обідаємо о першій"
    - words: ["лягаю", "я", "спати", "десятій", "о"]
      answer: "Я лягаю спати о десятій"
    - words: ["магазин", "дев'ятої", "до", "відкритий"]
      answer: "Магазин відкритий до дев'ятої"
    - words: ["після", "я", "шостої", "вдома"]
      answer: "Після шостої я вдома"
    - words: ["котра", "пане", "година", "перепрошую"]
      answer: "Перепрошую пане котра година"
    - words: ["маю", "я", "середу", "у", "урок"]
      answer: "Я маю урок у середу"
    - words: ["починаю", "о", "я", "восьмій", "працювати"]
      answer: "Я починаю працювати о восьмій"

