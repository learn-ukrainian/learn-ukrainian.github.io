- type: quiz
  title: "Asking the Time"
  instruction: "Choose the correct answer for each situation."
  items:
    - question: "How do you ask 'What time is it right now?'"
      options:
        - text: "Котра година?"
          correct: true
        - text: "О котрій годині?"
          correct: false
        - text: "Як година?"
          correct: false
        - text: "Який час?"
          correct: false
      explanation: "To ask for the current time, you always say 'Котра година?'."
    - question: "How do you ask 'At what time does the train leave?'"
      options:
        - text: "О котрій годині?"
          correct: true
        - text: "Котра година?"
          correct: false
        - text: "Коли година?"
          correct: false
        - text: "Де поїзд?"
          correct: false
      explanation: "To ask for a scheduled time, you use 'О котрій годині?'."
    - question: "Which word means 'on time'?"
      options:
        - text: "вчасно"
          correct: true
        - text: "зараз"
          correct: false
        - text: "пізно"
          correct: false
        - text: "рано"
          correct: false
      explanation: "'Вчасно' is a very important word meaning 'on time'."
    - question: "If you want to say 'It is two o'clock', what is the correct phrase?"
      options:
        - text: "Друга година"
          correct: true
        - text: "Два годин"
          correct: false
        - text: "Дві години"
          correct: false
        - text: "Другий година"
          correct: false
      explanation: "You must use the feminine ordinal number, 'друга'."
    - question: "How do you correctly say 'on Monday'?"
      options:
        - text: "у понеділок"
          correct: true
        - text: "в понеділок"
          correct: false
        - text: "у понеділку"
          correct: false
        - text: "на понеділок"
          correct: false
      explanation: "We use 'у' before a consonant, and the Accusative case for days: 'у понеділок'."
    - question: "How do you say 'at one o'clock'?"
      options:
        - text: "о першій годині"
          correct: true
        - text: "у першій годині"
          correct: false
        - text: "об першій годині"
          correct: false
        - text: "в першій годині"
          correct: false
      explanation: "For time, use 'о', and because 'перша' starts with a consonant, it remains 'о'."
    - question: "What is the correct Ukrainian word that means 'now'?"
      options:
        - text: "зараз"
          correct: true
        - text: "рано"
          correct: false
        - text: "пізно"
          correct: false
        - text: "завтра"
          correct: false
      explanation: "'Зараз' is a very important word meaning 'now'."
    - question: "What is the correct Ukrainian word that means 'late'?"
      options:
        - text: "пізно"
          correct: true
        - text: "зараз"
          correct: false
        - text: "рано"
          correct: false
        - text: "вчасно"
          correct: false
      explanation: "'Пізно' means late."

- type: fill-in
  title: "Using Prepositions"
  instruction: "Choose the correct preposition to complete the phrase."
  items:
    - sentence: "Поїзд прибуває [blank] одинадцятій годині."
      answer: "об"
      options:
        - "об"
        - "о"
        - "у"
        - "в"
      explanation: "Use 'об' before a vowel sound."
    - sentence: "Я працюю [blank] понеділок."
      answer: "у"
      options:
        - "у"
        - "в"
        - "о"
        - "об"
      explanation: "Use 'у' before a consonant sound to mean 'on a day'."
    - sentence: "Ми вдома [blank] вівторок."
      answer: "у"
      options:
        - "у"
        - "в"
        - "о"
        - "на"
      explanation: "Use 'у' for days of the week starting with a consonant."
    - sentence: "Зустріч [blank] п'ятницю."
      answer: "у"
      options:
        - "у"
        - "в"
        - "о"
        - "до"
      explanation: "We use 'у' + Accusative for days."
    - sentence: "Вони працюють [blank] дев'ятої години вечора."
      answer: "до"
      options:
        - "до"
        - "після"
        - "о"
        - "у"
      explanation: "The preposition 'до' means 'until'."
    - sentence: "Ми відпочиваємо [blank] обіду."
      answer: "після"
      options:
        - "після"
        - "до"
        - "у"
        - "о"
      explanation: "The preposition 'після' means 'after'."
    - sentence: "Поїзд [blank] станції."
      answer: "на"
      options:
        - "на"
        - "в"
        - "у"
        - "до"
      explanation: "We say 'на станції' (at the station)."
    - sentence: "Ми [blank] дорозі."
      answer: "в"
      options:
        - "в"
        - "на"
        - "у"
        - "до"
      explanation: "We say 'в дорозі' (on the way)."

- type: true-false
  title: "Calendar and Time Facts"
  instruction: "Determine if the statement is true or false based on Ukrainian rules."
  items:
    - statement: "In Ukrainian, you must use regular numbers like 'один', 'два', 'три' when telling the time."
      correct: false
      explanation: "False. You must use feminine ordinal numbers like 'перша', 'друга'."
    - statement: "The word 'година' is a feminine noun."
      correct: true
      explanation: "True. This is why we say 'перша година' instead of 'перший година'."
    - statement: "You use the preposition 'у' or 'в' with the Accusative case to say 'on Monday'."
      correct: true
      explanation: "True. For example, 'у понеділок'."
    - statement: "The Ukrainian months are usually capitalized, just like in English."
      correct: false
      explanation: "False. Months and days of the week are written with a lowercase letter."
    - statement: "If you want to say 'in January', you write 'у січень'."
      correct: false
      explanation: "False. You use the Locative case: 'у січні'."
    - statement: "To say 'at 5 o'clock', you use the preposition 'о'."
      correct: true
      explanation: "True. 'О п'ятій годині'."
    - statement: "The word 'хвилина' is a masculine noun."
      correct: false
      explanation: "False. It is a feminine noun."
    - statement: "In conversation, Ukrainians use the 12-hour format."
      correct: true
      explanation: "True. The 24-hour format is for official schedules."

