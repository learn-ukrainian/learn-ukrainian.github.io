- type: fill-in
  title: Complete the Time Expression
  instruction: Fill in the missing word to complete each time expression.
  items:
    - sentence: "Зараз ___ година."
      answer: "перша"
      options: ["перша", "друга", "один", "першій"]
      explanation: "1:00 is перша година — use the feminine ordinal, not the cardinal number."
    - sentence: "Зараз ___ година."
      answer: "восьма"
      options: ["восьма", "вісім", "восьмій", "восьмого"]
      explanation: "8:00 is восьма година — feminine ordinal for the hour."
    - sentence: "___ котра година?"
      answer: "Зараз"
      options: ["Зараз", "Завтра", "Добре", "Тут"]
      explanation: "Зараз means now — used when stating the current time."
    - sentence: "О ___ поїзд на Львів?"
      answer: "котрій"
      options: ["котрій", "котра", "скільки", "який"]
      explanation: "О котрій? means At what time? — used for scheduled events."
    - sentence: "Поїзд о ___ тридцять."
      answer: "десятій"
      options: ["десятій", "десята", "десять", "десятого"]
      explanation: "With the preposition о (at), the hour takes a special ending — о десятій."
    - sentence: "Я працюю ___ п'ятої."
      answer: "до"
      options: ["до", "о", "після", "у"]
      explanation: "До means until — я працюю до п'ятої (I work until five)."
    - sentence: "___ шостої я вдома."
      answer: "Після"
      options: ["Після", "До", "О", "У"]
      explanation: "Після means after — після шостої (after six)."
    - sentence: "Дев'ята ___."
      answer: "ранку"
      options: ["ранку", "ранок", "вранці", "рано"]
      explanation: "Дев'ята ранку means 9 in the morning — ранку is the genitive form used with time."
    - sentence: "Зараз ___ година."
      answer: "третя"
      options: ["третя", "три", "третій", "третьої"]
      explanation: "3:00 is третя година."
    - sentence: "Поїзд о ___."
      answer: "першій"
      options: ["першій", "перша", "один", "першої"]
      explanation: "With о (at), use the prepositional form: о першій."
    - sentence: "Я працюю ___ вівторок."
      answer: "у"
      options: ["у", "о", "на", "до"]
      explanation: "On Tuesday is у вівторок."
    - sentence: "___ котрій поїзд?"
      answer: "О"
      options: ["О", "У", "На", "До"]
      explanation: "О котрій? means At what time?"
    - sentence: "Поїзд ___ понеділок."
      answer: "у"
      options: ["у", "о", "на", "до"]
      explanation: "Days of the week use у/в: у понеділок."
    - sentence: "Школа ___ вересні."
      answer: "у"
      options: ["у", "в", "на", "до"]
      explanation: "In September is у вересні."
    - sentence: "У ___ тепло."
      answer: "липні"
      options: ["липні", "липень", "липня", "липню"]
      explanation: "In July uses the locative: у липні."
    - sentence: "Зараз дев'ята ___."
      answer: "п'ятнадцять"
      options: ["п'ятнадцять", "п'ятнадцята", "п'ятнадцятій", "п'ятнадцятого"]
      explanation: "9:15 is дев'ята п'ятнадцять."
    - sentence: "Я працюю до ___."
      answer: "п'ятої"
      options: ["п'ятої", "п'ята", "п'ять", "п'ятій"]
      explanation: "After до, use the genitive: до п'ятої."
    - sentence: "Зараз ___."
      answer: "друга"
      options: ["друга", "два", "другій", "другої"]
      explanation: "It's two o'clock is Зараз друга."
    - sentence: "___ годині поїзд?"
      answer: "О котрій"
      options: ["О котрій", "У котрій", "На котра", "До котрої"]
      explanation: "At what time? is О котрій?"
    - sentence: "Сьогодні ___."
      answer: "понеділок"
      options: ["понеділок", "понеділку", "понеділка", "понеділком"]
      explanation: "Today is Monday is Сьогодні понеділок."

- type: quiz
  title: Days, Months, and Time
  instruction: Choose the correct answer.
  items:
    - question: "Which day of the week does the Ukrainian week start with?"
      options:
        - text: "понеділок"
          correct: true
        - text: "неділя"
          correct: false
        - text: "субота"
          correct: false
        - text: "середа"
          correct: false
      explanation: "The Ukrainian week starts with понеділок (Monday), not Sunday."
    - question: "What does неділя mean?"
      options:
        - text: "Sunday"
          correct: true
        - text: "week"
          correct: false
        - text: "Saturday"
          correct: false
        - text: "holiday"
          correct: false
      explanation: "Неділя is a false friend — it means Sunday, not week. The word for week is тиждень."
    - question: "Which month name comes from береза (birch tree)?"
      options:
        - text: "березень"
          correct: true
        - text: "липень"
          correct: false
        - text: "листопад"
          correct: false
        - text: "вересень"
          correct: false
      explanation: "Березень (March) comes from береза (birch) — birch sap starts flowing in spring."
    - question: "What does листопад literally mean?"
      options:
        - text: "leaf-fall"
          correct: true
        - text: "snow-fall"
          correct: false
        - text: "rain-fall"
          correct: false
        - text: "wind-blow"
          correct: false
      explanation: "Листопад (November) literally means leaf-fall — лист (leaf) + пад (fall)."
    - question: "How do you say 'on Monday' in Ukrainian?"
      options:
        - text: "у понеділок"
          correct: true
        - text: "на понеділок"
          correct: false
        - text: "в понеділку"
          correct: false
        - text: "о понеділок"
          correct: false
      explanation: "Days of the week use у/в + the day name: у понеділок."
    - question: "How do you say 'in January' in Ukrainian?"
      options:
        - text: "у січні"
          correct: true
        - text: "у січень"
          correct: false
        - text: "в січня"
          correct: false
        - text: "на січень"
          correct: false
      explanation: "Months use у/в + the Locative form: у січні."
    - question: "Which word means 'on time' in Ukrainian?"
      options:
        - text: "вчасно"
          correct: true
        - text: "зараз"
          correct: false
        - text: "рано"
          correct: false
        - text: "пізно"
          correct: false
      explanation: "Вчасно means on time — бути вчасно (to be on time)."
    - question: "In Ukrainian, are months and days written with a capital or lowercase letter?"
      options:
        - text: "lowercase"
          correct: true
        - text: "capital letter"
          correct: false
        - text: "both are acceptable"
          correct: false
        - text: "capital only for months"
          correct: false
      explanation: "Unlike English, Ukrainian writes months and days in lowercase: січень, понеділок."
    - question: "What is the Ukrainian word for 'hour'?"
      options:
        - text: "година"
          correct: true
        - text: "хвилина"
          correct: false
        - text: "день"
          correct: false
        - text: "час"
          correct: false
      explanation: "The word for 'hour' is година."
    - question: "How do you ask 'What time is it?'"
      options:
        - text: "Котра година?"
          correct: true
        - text: "О котрій?"
          correct: false
        - text: "Скільки час?"
          correct: false
        - text: "Яка година?"
          correct: false
      explanation: "Котра година? is the correct way to ask 'What time is it?'"
    - question: "Which preposition means 'until'?"
      options:
        - text: "до"
          correct: true
        - text: "після"
          correct: false
        - text: "о"
          correct: false
        - text: "у"
          correct: false
      explanation: "До means 'until' or 'before'."
    - question: "What is 'evening' in Ukrainian?"
      options:
        - text: "вечір"
          correct: true
        - text: "ранок"
          correct: false
        - text: "ніч"
          correct: false
        - text: "день"
          correct: false
      explanation: "Вечір is 'evening'."
    - question: "What does 'після' mean?"
      options:
        - text: "after"
          correct: true
        - text: "before"
          correct: false
        - text: "until"
          correct: false
        - text: "now"
          correct: false
      explanation: "Після means 'after'."
    - question: "Which season is 'Зима'?"
      options:
        - text: "Winter"
          correct: true
        - text: "Spring"
          correct: false
        - text: "Summer"
          correct: false
        - text: "Autumn"
          correct: false
      explanation: "Зима is 'Winter'."
    - question: "Which month is 'серпень'?"
      options:
        - text: "August"
          correct: true
        - text: "September"
          correct: false
        - text: "July"
          correct: false
        - text: "June"
          correct: false
      explanation: "Серпень is 'August'."

- type: fill-in
  title: Plan Your Schedule
  instruction: Complete each sentence with the correct word to build a weekly schedule.
  items:
    - sentence: "Поїзд ___ понеділок о десятій."
      answer: "у"
      options: ["у", "о", "на", "до"]
      explanation: "Days of the week use у/в: у понеділок (on Monday)."
    - sentence: "О котрій ти працюєш ___ середу?"
      answer: "у"
      options: ["у", "о", "на", "до"]
      explanation: "У середу means on Wednesday — same pattern as all days of the week."
    - sentence: "У суботу я не працюю. ___ день!"
      answer: "Вихідний"
      options: ["Вихідний", "Робочий", "Перший", "Останній"]
      explanation: "Вихідний день means a day off — у суботу вихідний день (Saturday is a day off)."
    - sentence: "У ___ холодно."
      answer: "січні"
      options: ["січні", "січень", "січня", "січню"]
      explanation: "In January uses the Locative form: у січні."
    - sentence: "Я працюю о восьмій ___ до п'ятої вечора."
      answer: "ранку"
      options: ["ранку", "ранок", "рано", "вранці"]
      explanation: "О восьмій ранку means at eight in the morning."
    - sentence: "У ___ тепло."
      answer: "липні"
      options: ["липні", "липень", "липня", "липню"]
      explanation: "In July uses the Locative form: у липні."
    - sentence: "У неділю я ___."
      answer: "відпочиваю"
      options: ["відпочиваю", "відпочивати", "робочий", "зараз"]
      explanation: "У неділю я відпочиваю (On Sunday I rest)."
    - sentence: "У вівторок я ___ до сьомої."
      answer: "працюю"
      options: ["працюю", "працює", "працювати", "роботаю"]
      explanation: "У вівторок я працюю (On Tuesday I work)."
    - sentence: "Ми їдемо ___ Київ."
      answer: "в"
      options: ["в", "на", "у", "до"]
      explanation: "В Київ means 'to Kyiv'."
    - sentence: "У ___ падає сніг."
      answer: "лютому"
      options: ["лютому", "лютий", "лютого", "лютим"]
      explanation: "In February uses locative: у лютому."
    - sentence: "Школа починається у ___."
      answer: "вересні"
      options: ["вересні", "вересень", "вересня", "вереснем"]
      explanation: "In September uses locative: у вересні."
    - sentence: "Моє свято у ___."
      answer: "травні"
      options: ["травні", "травень", "травня", "травню"]
      explanation: "In May uses locative: у травні."
    - sentence: "Я буду там ___ п'ятницю."
      answer: "у"
      options: ["у", "о", "на", "в"]
      explanation: "On Friday uses у: у п'ятницю."
    - sentence: "Зустріч у ___."
      answer: "четвер"
      options: ["четвер", "четверг", "четверга", "четвергу"]
      explanation: "On Thursday uses у: у четвер."
    - sentence: "Мій день народження у ___."
      answer: "серпні"
      options: ["серпні", "серпень", "серпня", "серпню"]
      explanation: "In August uses locative: у серпні."
    - sentence: "Ми зустрічаємось у ___."
      answer: "березні"
      options: ["березні", "березень", "березня", "березню"]
      explanation: "In March uses locative: у березні."
    - sentence: "У ___ дуже спекотно."
      answer: "серпні"
      options: ["серпні", "серпень", "серпня", "серпню"]
      explanation: "In August uses locative: у серпні."
    - sentence: "Новий рік у ___."
      answer: "січні"
      options: ["січні", "січень", "січня", "січню"]
      explanation: "In January uses locative: у січні."
    - sentence: "Я їду додому о ___."
      answer: "шостій"
      options: ["шостій", "шоста", "шість", "шостої"]
      explanation: "О шостій (at six)."
    - sentence: "У ___ іде дощ."
      answer: "жовтні"
      options: ["жовтні", "жовтень", "жовтня", "жовтню"]
      explanation: "In October uses locative: у жовтні."

- type: true-false
  title: True or False?
  instruction: Decide if each statement about Ukrainian time is true or false.
  items:
    - statement: "In Ukrainian, you say the hour using ordinal numbers like перша, друга, третя."
      correct: true
      explanation: "Ukrainian uses feminine ordinal numbers for hours because година is feminine."
    - statement: "To say 2:00 in Ukrainian, you say два година."
      correct: false
      explanation: "Never use cardinal numbers for time. Say друга година (second hour), not два година."
    - statement: "Восьма тридцять means 8:30."
      correct: true
      explanation: "This is the telegraphic style — just the hour ordinal followed by minutes."
    - statement: "The word тиждень means Sunday."
      correct: false
      explanation: "Тиждень means week. Sunday is неділя."
    - statement: "The preposition о means 'at' when talking about time."
      correct: true
      explanation: "О котрій? (At what time?) and о восьмій (at eight) use о for scheduled times."
    - statement: "In Ukrainian, months are written with a capital letter like in English."
      correct: false
      explanation: "Ukrainian writes months and days in lowercase: січень, лютий, понеділок."
    - statement: "Середа means Wednesday, because it is the middle of the week."
      correct: true
      explanation: "Середа comes from середина (middle) — it is the middle day of the work week."
    - statement: "Ранок, день, вечір, ніч are the four parts of a Ukrainian day."
      correct: true
      explanation: "Morning, daytime, evening, night — used to clarify 12-hour time (дев'ята ранку)."

