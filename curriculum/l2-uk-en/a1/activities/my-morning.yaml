version: '1.0'
module: my-morning
level: a1
inline:
- id: fill-in-reflexive-endings
  type: fill-in
  instruction: Оберіть правильну форму дієслова (Choose the correct verb form)
  items:
  - sentence: Я ____.
    answer: вмиваюся
    options:
    - вмиваюся
    - вмиваєшся
    - вмивається
  - sentence: Ти ____ швидко.
    answer: одягаєшся
    options:
    - одягаюся
    - одягаєшся
    - одягається
  - sentence: Він ____ пізно.
    answer: прокидається
    options:
    - прокидаюся
    - прокидаєшся
    - прокидається
  - sentence: Вона ____ вранці.
    answer: вмивається
    options:
    - вмиваюся
    - вмиваєшся
    - вмивається
  - sentence: Я ____ на роботу.
    answer: збираюся
    options:
    - збираюся
    - збираєшся
    - збирається
  - sentence: Ти ____ рано?
    answer: прокидаєшся
    options:
    - прокидаюся
    - прокидаєшся
    - прокидається
  - sentence: Брат ____ додому.
    answer: повертається
    options:
    - повертаюся
    - повертаєшся
    - повертається
  - sentence: Я ____ на вихідних.
    answer: навчаюся
    options:
    - навчаюся
    - навчаєшся
    - навчається
  - sentence: Ти ____?
    answer: збираєшся
    options:
    - збираюся
    - збираєшся
    - збирається
  - sentence: Сестра ____.
    answer: одягається
    options:
    - одягаюся
    - одягаєшся
    - одягається
- id: quiz-reflexive-choice
  type: quiz
  instruction: Рефлексивне чи ні? Оберіть правильний варіант (Reflexive or not? Choose
    the correct option)
  items:
  - question: Я _____.
    options:
    - вмиваю
    - вмиваюся
    - вмиває
    - вмивається
    correct: 1
  - question: Я _____ руки.
    options:
    - вмиваю
    - вмиваюся
    - вмиває
    - вмивається
    correct: 0
  - question: Вона _____ дитину.
    options:
    - одягає
    - одягається
    - одягаю
    - одягаюся
    correct: 0
  - question: Вона _____ швидко.
    options:
    - одягає
    - одягається
    - одягаю
    - одягаюся
    correct: 1
  - question: Ти _____ рано?
    options:
    - прокидаєш
    - прокидаєшся
    - прокидаю
    - прокидаюся
    correct: 1
  - question: Ти _____ сумку.
    options:
    - збираєш
    - збираєшся
    - збираю
    - збираюся
    correct: 0
  - question: Він _____.
    options:
    - одягає
    - одягається
    - одягаєш
    - одягаєшся
    correct: 1
  - question: Він _____ сина.
    options:
    - одягає
    - одягається
    - одягаєш
    - одягаєшся
    correct: 0
- id: write-morning-routine
  type: fill-in
  instruction: Опишіть свій ранок (Describe your morning in 3 sentences)
  items:
  - sentence: Спочатку я ____ о сьомій.
    answer: прокидаюся
    options:
    - прокидаюся
    - вмиваюся
    - йду
  - sentence: Потім я ____ і снідаю.
    answer: одягаюся
    options:
    - вмиваюся
    - одягаюся
    - збираюся
  - sentence: Нарешті я ____ на роботу.
    answer: йду
    options:
    - йду
    - п'ю
    - збираюся
workbook:
- id: match-up-vocab
  type: match-up
  instruction: З'єднайте українські слова з англійськими (Match the Ukrainian words
    with English)
  pairs:
  - left: прокидатися
    right: to wake up
  - left: вмиватися
    right: to wash face/hands
  - left: одягатися
    right: to get dressed
  - left: збиратися
    right: to get ready
  - left: повертатися
    right: to return
  - left: навчатися
    right: to study
  - left: поспішати
    right: to hurry
- id: group-sort-verbs
  type: group-sort
  instruction: Розподіліть дієслова за типом (Sort the verbs by type)
  groups:
  - label: Дія на себе (Reflexive)
    items:
    - прокидатися
    - вмиватися
    - одягатися
    - збиратися
    - навчатися
  - label: Звичайні (Regular)
    items:
    - снідати
    - йти
    - поспішати
    - пити
    - читати
- id: true-false-reading
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Настя прокидається о сьомій.
    correct: true
    explanation: Так, Настя прокидається о сьомій.
  - statement: Ліна п'є чай вранці.
    correct: false
    explanation: Ліна п'є каву (coffee) вранці.
  - statement: Настя снідає о восьмій.
    correct: false
    explanation: О восьмій вона йде на роботу.
  - statement: У суботу Ліна поспішає.
    correct: false
    explanation: У суботу вона не поспішає.
  - statement: Настя навчається вранці у суботу.
    correct: true
    explanation: Так, вона навчається вранці.
  - statement: Спочатку ми снідаємо, а потім прокидаємося.
    correct: false
    explanation: Спочатку ми прокидаємося, а потім снідаємо.
- id: anagram-vocabulary
  type: anagram
  instruction: Складіть слова (Make the words)
  items:
  - letters:
    - с
    - н
    - і
    - д
    - а
    - т
    - и
    answer: снідати
    hint: to have breakfast
  - letters:
    - н
    - а
    - р
    - е
    - ш
    - т
    - і
    answer: нарешті
    hint: finally
  - letters:
    - п
    - о
    - т
    - і
    - м
    answer: потім
    hint: then
  - letters:
    - п
    - і
    - з
    - н
    - о
    answer: пізно
    hint: late
  - letters:
    - в
    - р
    - а
    - н
    - ц
    - і
    answer: вранці
    hint: in the morning
  - letters:
    - з
    - б
    - и
    - р
    - а
    - т
    - и
    - с
    - я
    answer: збиратися
    hint: to get ready
- id: odd-one-out-vocab
  type: odd-one-out
  instruction: Знайдіть зайве слово (Find the odd one out)
  items:
  - words:
    - прокидатися
    - вмиватися
    - одягатися
    - снідати
    correct: 3
    explanation: «Снідати» — це звичайне дієслово (regular verb).
  - words:
    - спочатку
    - потім
    - нарешті
    - кава
    correct: 3
    explanation: «Кава» — це іменник (noun).
  - words:
    - вранці
    - пізно
    - зуби
    - швидко
    correct: 2
    explanation: «Зуби» — це іменник (noun).
  - words:
    - йти
    - повертатися
    - руки
    - поспішати
    correct: 2
    explanation: «Руки» — це іменник (noun).
  - words:
    - снідати
    - пити
    - читати
    - збиратися
    correct: 3
    explanation: «Збиратися» — це рефлексивне дієслово (reflexive verb).
  - words:
    - я
    - ти
    - вмиваюся
    - він
    correct: 2
    explanation: «Вмиваюся» — це дієслово (verb), інші — займенники (pronouns).
- id: unjumble-routine
  type: unjumble
  instruction: Складіть правильне речення зі слів (Put the words in the correct order)
  items:
  - words:
    - одягаюся.
    - вмиваюся
    - і
    - Потім
    - я
    correct_order:
    - Потім
    - я
    - вмиваюся
    - і
    - одягаюся.
  - words:
    - нарешті
    - на
    - йду
    - А
    - роботу.
    correct_order:
    - А
    - нарешті
    - йду
    - на
    - роботу.
  - words:
    - сьомій.
    - о
    - прокидаюся
    - Я
    correct_order:
    - Я
    - прокидаюся
    - о
    - сьомій.
  - words:
    - не
    - суботу
    - У
    - поспішаю.
    - я
    correct_order:
    - У
    - суботу
    - я
    - не
    - поспішаю.
  - words:
    - новини.
    - читаю
    - лежу,
    - Я
    correct_order:
    - Я
    - лежу,
    - читаю
    - новини.
  - words:
    - ти
    - на
    - йдеш
    - Коли
    - навчання?
    correct_order:
    - Коли
    - ти
    - йдеш
    - на
    - навчання?
