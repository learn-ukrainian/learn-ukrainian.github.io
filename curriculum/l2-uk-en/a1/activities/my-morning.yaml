    - шся
    - ться
  - sentence: Він прокидає____.
    answer: ться
    options:
    - ся
    - шся
    - ться
  - sentence: Я одягаю____.
    answer: ся
    options:
    - ся
    - шся
    - ться
  - sentence: Вона вмиває____.
    answer: ться
