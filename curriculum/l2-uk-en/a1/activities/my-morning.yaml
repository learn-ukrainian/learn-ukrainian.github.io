    - чекає
    - чекаєш
  title: Доповніть речення, щоб описати ранок
workbook:
- type: match-up
  instruction: З'єднайте займенник із формою дієслова
  pairs:
  - left: Я
    right: вмиваюся
  - left: Ти
    right: прокидаєшся
  - left: Він
    right: одягається
  - left: Вона
    right: збирається
  - left: Ми
    right: снідаємо
  - left: Вони
    right: йдуть
  title: З'єднайте займенник із формою дієслова
- type: group-sort
  instruction: 'Розподіліть дієслова: зворотні чи ні?'
  groups:
  - label: Зворотні (Reflexive)
    items:
    - вмиваюся
    - одягаєшся
    - прокидається
    - збираються
    - навчаєшся
    - повертаюся
  - label: Незворотні (Non-reflexive)
    items:
    - снідаю
    - читаєш
    - лежу
    - гуляємо
    - одягаю
    - вмиває
  title: 'Розподіліть дієслова: зворотні чи ні?'
- type: odd-one-out
  instruction: Оберіть зайве слово
  items:
  - words:
    - прокидаюся
    - одягаюся
    - вмиваюся
    - снідаю
    correct: 3
    explanation: Снідати is not a reflexive verb.
  - words:
    - спочатку
    - потім
    - після цього
    - вранці
    correct: 3
    explanation: Вранці tells 'when', the others are sequence words.
  - words:
    - йду
    - йдеш
    - йде
    - поспішаю
    correct: 3
    explanation: Поспішаю is a regular verb, the others are forms of the irregular
      verb йти.
  - words:
    - вмиваюся
    - одягає
    - збирає
    - прокидає
    correct: 0
    explanation: Вмиваюся is reflexive, the others are non-reflexive.
  - words:
    - вмиваєшся
    - одягаєшся
    - прокидаєшся
    - збирається
    correct: 3
    explanation: Збирається is the 'він/вона' form, the others are 'ти'.
  - words:
    - читаю
    - лежу
    - навчаюся
    - гуляю
    correct: 2
    explanation: Навчаюся is reflexive, the others are not.
  title: Оберіть зайве слово
- type: true-false
  instruction: Правда чи ні?
  items:
  - statement: Дієслова із суфіксом -ся означають дію, спрямовану на себе.
    correct: true
    explanation: Yes, they are reflexive verbs.
  - statement: Слово 'вмивається' означає 'to wash someone else'.
    correct: false
    explanation: '''Вмивається'' means ''to wash oneself''. ''Вмиває'' means ''to
      wash someone else''.'
  - statement: Слово 'одягаюся' означає 'I get dressed'.
    correct: true
    explanation: Yes, it is the reflexive form for 'Я'.
  - statement: Слово 'снідаюся' є правильним.
    correct: false
    explanation: Снідати is not a reflexive verb. The correct form is 'снідаю'.
  - statement: Закінчення -ться вимовляється як [ц':а].
    correct: true
    explanation: The ending -ється is pronounced as a long soft [ц':а].
  - statement: Закінчення -шся вимовляється як [с':а].
    correct: true
    explanation: The ending -єшся is pronounced as a long soft [с':а].
  title: Правда чи ні?
