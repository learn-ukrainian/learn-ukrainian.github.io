    - Спочатку
    - Потім
    - Нарешті
  - sentence: ____ я вмиваюся.
    answer: Потім
    options:
    - Спочатку
    - Потім
    - Після цього
  - sentence: ____ я снідаю.
    answer: Після цього
    options:
    - Після цього
    - Нарешті
    - Спочатку
  - sentence: ____ я йду на роботу.
    answer: Нарешті
    options:
    - Нарешті
    - Потім
    - Спочатку
  - sentence: ____ ми навчаємося.
    answer: Спочатку
    options:
    - Спочатку
    - Нарешті
    - Після цього
  - sentence: ____ ми гуляємо.
