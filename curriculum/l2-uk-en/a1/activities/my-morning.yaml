- id: write-morning-routine
  type: fill-in
  instruction: Доповніть речення, щоб описати ранок
  items:
  - sentence: Спочатку я ____.
    answer: прокидаюся
    options:
    - прокидаюся
    - прокидається
    - прокидаєшся
  - sentence: Потім я ____ і снідаю.
    answer: вмиваюся
    options:
    - вмивається
    - вмиваюся
    - вмиваєшся
  - sentence: Нарешті я ____ на роботу.
    answer: йду
    options:
    - йде
    - йдеш
    - йду
  - sentence: Я ____ зуби щоранку.
    answer: чищу
    options:
    - чищу
    - чистиш
    - чистить
  - sentence: Потім я ____ каву.
    answer: п'ю
    options:
    - п'ю
    - п'єш
    - п'є
  - sentence: Я ____ на автобус о восьмій.
    answer: чекаю
    options:
