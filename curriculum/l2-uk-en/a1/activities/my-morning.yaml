- id: quiz-reflexive-choice
  type: quiz
  instruction: 'Choose the correct verb: reflexive (acting on yourself) or not?'
  items:
  - question: Я _____ руки.
    options:
    - вмиваю
    - вмиваюся
    - вмиває
    - вмивається
    correct: 0
  - question: Я _____ вранці.
    options:
    - вмиваю
    - вмиваюся
    - вмиває
    - вмивається
    correct: 1
  - question: Вона _____ дитину.
    options:
    - одягає
    - одягається
    - одягаю
    - одягаюся
    correct: 0
  - question: Вона _____ швидко.
    options:
    - одягає
    - одягається
    - одягаю
    - одягаюся
    correct: 1
  - question: Я _____ зуби.
    options:
    - чищу
    - чищуся
    - чистиш
    - чистишся
    correct: 0
  - question: Ти _____ пізно.
    options:
    - прокидаєш
    - прокидаєшся
    - прокидаю
    - прокидаюся
    correct: 1
  - question: Він _____ каву.
    options:
    - п'є
    - п'ється
    - п'ю
    - п'юся
    correct: 0
  - question: Я _____ на роботу.
    options:
    - збираю
    - збираюся
    - збираєш
    - збираєшся
    correct: 1
- id: order-morning-sequence
  type: fill-in
  instruction: Fill in the correct sequence word (**спочатку**, **потім**, **після
    цього**, **нарешті**).
  items:
  - sentence: ____ (First), я прокидаюся.
    answer: Спочатку
    options:
    - Спочатку
    - Потім
    - Після цього
    - Нарешті
  - sentence: ____ (Then), я вмиваюся.
    answer: Потім
    options:
    - Спочатку
    - Потім
    - Після цього
    - Нарешті
  - sentence: ____ (After this), я одягаюся.
    answer: Після цього
    options:
    - Спочатку
    - Потім
    - Після цього
    - Нарешті
  - sentence: ____ (Then), я снідаю.
    answer: Потім
    options:
    - Спочатку
    - Потім
    - Після цього
    - Нарешті
  - sentence: ____ (After this), я п'ю каву.
    answer: Після цього
    options:
    - Спочатку
    - Потім
    - Після цього
    - Нарешті
  - sentence: ____ (Finally), я йду на роботу.
    answer: Нарешті
    options:
    - Спочатку
    - Потім
    - Після цього
    - Нарешті
- id: write-morning-routine
  type: fill-in
  instruction: Complete the sentences to describe a typical morning routine.
  items:
  - sentence: Я ____ о сьомій.
    answer: прокидаюся
    options:
    - прокидаюся
    - снідаю
    - йду
  - sentence: Потім я ____ і одягаюся.
    answer: вмиваюся
    options:
    - вмиваюся
    - йдеш
    - повертаюся
  - sentence: Нарешті я ____ на роботу.
    answer: йду
    options:
    - йду
    - прокидаюся
    - чищу зуби
workbook:
- id: workbook-match-up-pronouns
  type: match-up
  instruction: Match the pronouns with the correct reflexive verb forms.
  pairs:
  - left: Я (wash up)
    right: вмиваюся
  - left: Ти (get dressed)
    right: одягаєшся
  - left: Він (wakes up)
    right: прокидається
  - left: Вона (gets ready)
    right: збирається
  - left: Я (study)
    right: навчаюся
  - left: Ти (return)
    right: повертаєшся
- id: workbook-group-sort-reflexive
  type: group-sort
  instruction: Sort the verbs into reflexive (acting on yourself) and non-reflexive
    (acting on something else).
  groups:
  - label: Reflexive (**-ся**)
    items:
    - вмиваюся
    - одягаюся
    - прокидаєшся
    - збирається
  - label: Non-reflexive
    items:
    - снідаю
    - чищу зуби
    - п'ю каву
    - вмиваю дитину
- id: workbook-true-false-dialogue
  type: true-false
  instruction: Read the statements about Lina and Nastia from the dialogue. Are they
    **true** (правда) or **false** (неправда)?
  items:
  - statement: Настя прокидається о сьомій.
    correct: true
    explanation: Nastia says she wakes up at seven.
  - statement: Ліна йде на роботу о восьмій.
    correct: false
    explanation: Nastia goes to work at eight, not Lina.
  - statement: Настя снідає вранці.
    correct: true
    explanation: Nastia mentions she washes up, gets dressed, and has breakfast.
  - statement: У суботу Ліна поспішає.
    correct: false
    explanation: Lina says she does not hurry on Saturday.
  - statement: Настя навчається вранці у суботу.
    correct: true
    explanation: Nastia says she studies in the morning on Saturday.
  - statement: Ліна прокидається пізно у суботу.
    correct: true
    explanation: Lina wakes up late, lies down, and looks at her phone.
- id: workbook-translate-phrases
  type: translate
  instruction: Choose the correct translation for the morning phrases.
  items:
  - source: I wake up late.
    options:
    - text: Я прокидаюся пізно.
      correct: true
    - text: Я прокидаюся вранці.
      correct: false
  - source: You get dressed quickly.
    options:
    - text: Ти одягаєшся швидко.
      correct: true
    - text: Ти вмиваєшся швидко.
      correct: false
  - source: He goes to work.
    options:
    - text: Він іде на роботу.
      correct: true
    - text: Він повертається на роботу.
      correct: false
  - source: First, I wash up.
    options:
    - text: Спочатку я вмиваюся.
      correct: true
    - text: Потім я вмиваюся.
      correct: false
  - source: I have breakfast at eight.
    options:
    - text: Я снідаю о восьмій.
      correct: true
    - text: Я прокидаюся о восьмій.
      correct: false
  - source: Finally, I go to study.
    options:
    - text: Нарешті я йду навчатися.
      correct: true
    - text: Спочатку я йду навчатися.
      correct: false
- id: workbook-error-correction-endings
  type: error-correction
  instruction: Find and correct the mistake in the verb ending.
  items:
  - sentence: Ти прокидаюся пізно.
    error: прокидаюся
    correction: прокидаєшся
    error_type: word
    options:
    - прокидаєшся
    - прокидається
    - прокидаю
    explanation: With 'ти', the verb ending is -єшся.
  - sentence: Він вмиваюся вранці.
    error: вмиваюся
    correction: вмивається
    error_type: word
    options:
    - вмивається
    - вмиваєшся
    - вмиваєть
    explanation: With 'він', the verb ending is -ється.
  - sentence: Я одягається швидко.
    error: одягається
    correction: одягаюся
    error_type: word
    options:
    - одягаюся
    - одягаєшся
    - одягаю
    explanation: With 'я', the verb ending is -юся.
  - sentence: Ти збирається на роботу.
    error: збирається
    correction: збираєшся
    error_type: word
    options:
    - збираєшся
    - збираюся
    - збираємося
    explanation: With 'ти', the ending is -єшся.
  - sentence: Вона навчаюся вранці.
    error: навчаюся
    correction: навчається
    error_type: word
    options:
    - навчається
    - навчаєшся
    - навчаєть
    explanation: With 'вона', the ending is -ється.
  - sentence: Я повертаєшся додому.
    error: повертаєшся
    correction: повертаюся
    error_type: word
    options:
    - повертаюся
    - повертається
    - повертає
    explanation: With 'я', the ending is -юся.
- id: workbook-order-routine
  type: order
  instruction: Put the sentences in the logical order of a morning routine.
  items:
  - Спочатку я прокидаюся.
  - Потім вмиваюся і чищу зуби.
  - Після цього я одягаюся.
  - Потім я снідаю і п'ю каву.
  - Нарешті я йду на роботу.
  correct_order:
  - 0
  - 1
  - 2
  - 3
  - 4
