- type: quiz
  title: "Phonetics Knowledge Check"
  instruction: "Choose the correct answer based on the reading."
  items:
    - question: "Which of the following describes how a vowel is produced?"
      explanation: "Vowels are voice-only sounds with no airflow obstruction."
      options:
        - text: "Without any significant obstruction of airflow"
          correct: true
        - text: "By pressing lips together"
          correct: false
        - text: "By creating friction with the tongue"
          correct: false
        - text: "By blocking the nasal cavity"
          correct: false
    - question: "What is the 'Golden Rule' regarding Ukrainian vowels?"
      explanation: "Ukrainian vowels are perfectly stable and never reduce to a schwa."
      options:
        - text: "They remain perfectly stable and clear"
          correct: true
        - text: "They are reduced when unstressed"
          correct: false
        - text: "They change sound based on consonants"
          correct: false
        - text: "They are often silent at the end"
          correct: false
    - question: "Which Cyrillic letter is a dangerous 'visual trap' that looks like H?"
      explanation: "The Cyrillic Н makes the /n/ sound, not an /h/ sound."
      options:
        - text: "Н"
          correct: true
        - text: "М"
          correct: false
        - text: "Л"
          correct: false
        - text: "С"
          correct: false
    - question: "What sound does the Cyrillic letter С always make?"
      explanation: "С is always a sharp, unvoiced /s/ sound, never a /k/."
      options:
        - text: "The sharp /s/ sound"
          correct: true
        - text: "The hard /k/ sound"
          correct: false
        - text: "The soft /c/ sound"
          correct: false
        - text: "The deep /sh/ sound"
          correct: false
    - question: "Which structural pattern defines an open syllable?"
      explanation: "An open syllable ends with a vowel, keeping the airflow open."
      options:
        - text: "It ends with a vowel"
          correct: true
        - text: "It ends with a consonant"
          correct: false
        - text: "It contains no vowels"
          correct: false
        - text: "It has two consonants"
          correct: false
    - question: "Which word means 'pineapple' and features three clear А sounds?"
      explanation: "Ананас means pineapple and requires three stable A vowels."
      options:
        - text: "ананас"
          correct: true
        - text: "автобус"
          correct: false
        - text: "акула"
          correct: false
        - text: "сауна"
          correct: false
    - question: "Why is the word 'нам' considered a visual trap for English speakers?"
      explanation: "The Cyrillic letter Н sounds like N, not H."
      options:
        - text: "The first letter looks like H but sounds like N"
          correct: true
        - text: "The vowels are silent at the end"
          correct: false
        - text: "The word has no vowels at all"
          correct: false
        - text: "The last letter sounds like a P"
          correct: false
    - question: "Which letter looks like a small pitched tent or Greek Lambda?"
      explanation: "Л looks like a tent and makes the /l/ sound."
      options:
        - text: "Л"
          correct: true
        - text: "А"
          correct: false
        - text: "У"
          correct: false
        - text: "М"
          correct: false

- type: true-false
  title: "Fact Check: The Cyrillic Code"
  instruction: "Determine if the statements are true or false."
  items:
    - statement: "The Cyrillic script is simply another name for the Russian alphabet."
      correct: false
      explanation: "It is an independent script developed in the First Bulgarian Empire."
    - statement: "In Ukrainian, the letter А sounds like the 'a' in the English word 'father'."
      correct: true
      explanation: "А represents a pure, open, unrounded back vowel."
    - statement: "When a Ukrainian vowel is unstressed, it should be reduced to an 'uh' sound."
      correct: false
      explanation: "Vowels are perfectly stable and must never be reduced to a lazy 'uh'."
    - statement: "The Cyrillic letter У looks like English Y but sounds like the 'oo' in 'moon'."
      correct: true
      explanation: "У is a close, tightly rounded back vowel."
    - statement: "The word 'мама' consists of two identical open syllables."
      correct: true
      explanation: "MA-MA are both open syllables ending in the vowel A."
    - statement: "The Cyrillic letter С can sometimes be pronounced as a sharp /k/ sound."
      correct: false
      explanation: "С is always a sharp, unvoiced /s/ sound, without exception."
    - statement: "The letter М is a consonant because it involves obstructing the airflow."
      correct: true
      explanation: "Consonants are created by interrupting or restricting the continuous flow of air."
    - statement: "The Cyrillic letter Н produces an identical sound to the English letter H."
      correct: false
      explanation: "Н produces the /n/ sound, which is why it is considered a visual trap."

