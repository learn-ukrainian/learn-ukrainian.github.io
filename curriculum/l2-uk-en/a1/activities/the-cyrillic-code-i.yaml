- type: fill-in
  title: "Complete the Phrase"
  instruction: "Choose the correct missing word to complete the short Ukrainian phrase or statement."
  items:
    - sentence: "Мама ___."
      answer: "сама"
      options:
        - "сама"
        - "сам"
        - "сума"
        - "нас"
      explanation: "The phrase is 'Мама сама' (Mom is alone)."
    - sentence: "Мул ___."
      answer: "сам"
      options:
        - "сам"
        - "сама"
        - "мус"
        - "сум"
      explanation: "The phrase is 'Мул сам' (The mule is alone)."
    - sentence: "Сума ___."
      answer: "мала"
      options:
        - "мала"
        - "мул"
        - "мама"
        - "луна"
      explanation: "The phrase is 'Сума мала' (The sum is small)."
    - sentence: "The Cyrillic letter Н makes the sound ___."
      answer: "/n/"
      options:
        - "/n/"
        - "/h/"
        - "/m/"
        - "/s/"
      explanation: "Н is a visual trap that sounds like the English N."
    - sentence: "The word ___ means 'echo' in Ukrainian."
      answer: "луна"
      options:
        - "луна"
        - "сума"
        - "мама"
        - "мул"
      explanation: "Луна means echo."
    - sentence: "An open syllable always ends with a ___."
      answer: "vowel"
      options:
        - "vowel"
        - "consonant"
        - "letter"
        - "sound"
      explanation: "Open syllables end with a vowel, like МА or НУ."
    - sentence: "A closed syllable always ends with a ___."
      answer: "consonant"
      options:
        - "consonant"
        - "vowel"
        - "syllable"
        - "trap"
      explanation: "Closed syllables end with a consonant, like УМ or АС."
    - sentence: "The Cyrillic letter ___ looks like an English Y but sounds like the 'oo' in moon."
      answer: "У"
      options:
        - "У"
        - "А"
        - "М"
        - "Л"
      explanation: "У is a tightly rounded vowel."