- type: watch-and-repeat
  title: 'Pronunciation Guide: Vowels and Consonants'
  instruction: Watch the video for each letter and repeat the sound aloud.
  items:
  - letter: А
    word: ананас
    video: https://www.youtube.com/watch?v=hvB3VpcR3ZE
    note: Stays open and relaxed.
  - letter: О
    word: око
    video: https://www.youtube.com/watch?v=QT3c1TiZZgk
    note: Never reduce unstressed О to an A sound.
  - letter: У
    word: Україна
    video: https://www.youtube.com/watch?v=VB1O6PmtYRU
    note: Push your lips forward.
  - letter: М
    word: мама
    video: https://www.youtube.com/watch?v=Ez95H4ibuJo
    note: Just like English M.
  - letter: Л
    word: лама
    video: https://www.youtube.com/watch?v=v6-3Xg52Buk
    note: Looks like a tent, sounds like L.
  - letter: Н
    word: нам
    video: https://www.youtube.com/watch?v=vNUfiKHPYaU
    note: False Friend! Looks like H, sounds like N.
  - letter: С
    word: сом
    video: https://www.youtube.com/watch?v=7UsFBgSL91E
    note: False Friend! Looks like C, sounds like S.
