- type: true-false
  title: Alphabet Rules
  instruction: Decide if these statements about the Ukrainian alphabet are true or
    false.
  items:
  - statement: Ukrainian vowels like А and У often change to a weak 'uh' sound when
      unstressed.
    correct: false
    explanation: Ukrainian vowels are stable and must remain pure and clear.
  - statement: The letter А is a vowel (голосна).
    correct: true
    explanation: А is produced using only your voice without airflow obstruction.
  - statement: The letter С makes a 'K' sound in some words.
    correct: false
    explanation: The letter С is permanently an S sound.
  - statement: The letter Н looks exactly like an English H but represents the N sound.
    correct: true
    explanation: This is a common visual trap for beginners.
  - statement: The letter М is a consonant (приголосна).
    correct: true
    explanation: М requires some obstruction of airflow to produce.
  - statement: An open syllable ends with a consonant sound.
    correct: false
    explanation: An open syllable ends with a vowel sound.
  - statement: A closed syllable ends with a consonant sound.
    correct: true
    explanation: The consonant gently closes off the vowel sound.
  - statement: The letter Л can be written with a flat top or a pointy top.
    correct: true
    explanation: Both Л and Λ represent the exact same sound.
- type: anagram
  title: Unscramble the Words
  instruction: Rearrange the letters to form the correct Ukrainian word.
  items:
  - scrambled: м а а м
    answer: мама
  - scrambled: у с м а
    answer: сума
  - scrambled: с а н
    answer: нас
  - scrambled: м а с
    answer: сам
  - scrambled: у л м
    answer: мул
  - scrambled: у л а н
    answer: луна
  - scrambled: у м с
    answer: мус
  - scrambled: м а л а
    answer: мала
- type: quiz
  title: Check Your Knowledge
  instruction: Choose the correct answer for each question.
  items:
  - question: Which of these letters is a vowel (голосна)?
    explanation: У is a vowel, pronounced like the 'oo' in moon.
    options:
    - text: У
      correct: true
    - text: М
      correct: false
    - text: Н
      correct: false
    - text: С
      correct: false
  - question: What does the Ukrainian word 'мама' mean?
    explanation: Мама means mom.
    options:
    - text: mom
      correct: true
    - text: dad
      correct: false
    - text: moon
      correct: false
    - text: sum
      correct: false
  - question: Which letter looks like an English H but represents the N sound?
    explanation: Н is a visual trap — it looks like H but sounds like N.
    options:
    - text: Н
      correct: true
    - text: С
      correct: false
    - text: Л
      correct: false
    - text: М
      correct: false
  - question: Which of these is an open syllable?
    explanation: МА ends with a vowel, making it an open syllable.
    options:
    - text: МА
      correct: true
    - text: АМ
      correct: false
    - text: УС
      correct: false
    - text: АН
      correct: false
  - question: What does the Ukrainian word 'луна' mean?
    explanation: Луна means echo in Ukrainian.
    options:
    - text: echo
      correct: true
    - text: bag
      correct: false
    - text: us
      correct: false
    - text: alone
      correct: false
  - question: Which letter looks like an English C but represents the S sound?
    explanation: The letter С is permanently an S sound.
    options:
    - text: С
      correct: true
    - text: Н
      correct: false
    - text: А
      correct: false
    - text: У
      correct: false
  - question: Which of these is a closed syllable?
    explanation: АС ends with a consonant, making it a closed syllable.
    options:
    - text: АС
      correct: true
    - text: СА
      correct: false
    - text: НУ
      correct: false
    - text: МУ
      correct: false
  - question: What does the Ukrainian word 'сума' mean?
    explanation: Сума means sum or amount.
    options:
    - text: sum / amount
      correct: true
    - text: mule
      correct: false
    - text: alone
      correct: false
    - text: nose
      correct: false
