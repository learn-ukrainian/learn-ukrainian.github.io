- type: quiz
  title: "Перевірка літер: оберіть правильний варіант"
  instruction: "Choose the correct letter or word based on the description."
  items:
    - question: "Яка літера виглядає як англійська P, але звучить як R?"
      explanation: "Літера Р є 'фальшивим другом' і читається як R."
      options:
        - text: "Р"
          correct: true
        - text: "П"
          correct: false
        - text: "С"
          correct: false
        - text: "Т"
          correct: false
    - question: "Яка українська літера завжди звучить як S у слові snake?"
      explanation: "Літера С завжди позначає звук S і ніколи не читається як K."
      options:
        - text: "С"
          correct: true
        - text: "К"
          correct: false
        - text: "О"
          correct: false
        - text: "П"
          correct: false
    - question: "Яка літера позначає глибокий звук, як у шотландському слові loch?"
      explanation: "Літера Х позначає цей характерний горловий звук."
      options:
        - text: "Х"
          correct: true
        - text: "Г"
          correct: false
        - text: "К"
          correct: false
        - text: "Ф"
          correct: false
    - question: "Який український диграф звучить подібно до J у слові jungle?"
      explanation: "Диграф Дж позначає один злитий звук, як англійська J."
      options:
        - text: "Дж"
          correct: true
        - text: "Дз"
          correct: false
        - text: "Жд"
          correct: false
        - text: "Зд"
          correct: false
    - question: "Яка літера найчастіше зустрічається в іноземних словах, таких як фото?"
      explanation: "Літера Ф зазвичай використовується у запозиченнях з інших мов."
      options:
        - text: "Ф"
          correct: true
        - text: "Х"
          correct: false
        - text: "П"
          correct: false
        - text: "Т"
          correct: false
    - question: "Який диграф позначає звук, подібний до dz у слові adze?"
      explanation: "Диграф Дз читається як один злитий звук."
      options:
        - text: "Дз"
          correct: true
        - text: "Дж"
          correct: false
        - text: "Сз"
          correct: false
        - text: "Зс"
          correct: false
    - question: "Яка українська літера виглядає як стіл і позначає звук P?"
      explanation: "Літера П має прямий верх, як у стола або платформи."
      options:
        - text: "П"
          correct: true
        - text: "Р"
          correct: false
        - text: "Т"
          correct: false
        - text: "М"
          correct: false
    - question: "Яка літера виглядає і звучить так само, як англійська T?"
      explanation: "Літера Т є дуже надійним другом і читається як T."
      options:
        - text: "Т"
          correct: true
        - text: "П"
          correct: false
        - text: "Г"
          correct: false
        - text: "Р"
          correct: false
    - question: "Яка голосна літера не змінює свого звучання навіть без наголосу?"
      explanation: "Літера О завжди залишається чистим звуком О."
      options:
        - text: "О"
          correct: true
        - text: "А"
          correct: false
        - text: "Е"
          correct: false
        - text: "И"
          correct: false
    - question: "Яке з цих слів починається з літери, що позначає звук R?"
      explanation: "Слово ресторан починається з літери Р."
      options:
        - text: "ресторан"
          correct: true
        - text: "порт"
          correct: false
        - text: "пошта"
          correct: false
        - text: "парк"
          correct: false
    - question: "Яке з цих слів містить диграф, що позначає звук J?"
      explanation: "Слово джерело містить диграф Дж."
      options:
        - text: "джерело"
          correct: true
        - text: "дзвінок"
          correct: false
        - text: "суп"
          correct: false
        - text: "тест"
          correct: false
    - question: "Яке з цих слів є інтернаціональним і має літеру Ф?"
      explanation: "Слово факт містить літеру Ф."
      options:
        - text: "факт"
          correct: true
        - text: "порт"
          correct: false
        - text: "стоп"
          correct: false
        - text: "суп"
          correct: false

