- type: classify
  title: "Vowels vs Consonants"
  instruction: "Sort the letters into vowels and consonants."
  categories:
    - label: "Голосні"
      items: ["А", "Е", "І", "И", "О", "У"]
    - label: "Приголосні"
      items: ["Б", "Д", "П", "З", "Г", "Х", "Ж", "Ш", "Ч"]

- type: classify
  title: "Voiced vs Voiceless"
  instruction: "Sort the consonants based on whether they vibrate in your throat."
  categories:
    - label: "Дзвінкі (Voiced)"
      items: ["Б", "Д", "З", "Г", "Ж"]
    - label: "Глухі (Voiceless)"
      items: ["П", "Т", "С", "Х", "Ш", "Ч"]

- type: image-to-letter
  title: "Choose the Starting Letter"
  instruction: "Tap the letter that starts the Ukrainian word for this emoji."
  items:
    - emoji: "🍌"
      answer: "Б"
      distractors: ["П", "Д"]
    - emoji: "🏠"
      answer: "Д"
      distractors: ["Б", "Т"]
    - emoji: "🕷️"
      answer: "П"
      distractors: ["Б", "Р"]
    - emoji: "🦓"
