      answer: "банан"
    - scrambled: "к а р п"
      answer: "парк"
    - scrambled: "м і д"
      answer: "дім"
    - scrambled: "б з у"
      answer: "зуб"
    - scrambled: "к у ж"
      answer: "жук"
    - scrambled: "к о ш а л"
      answer: "школа"
    - scrambled: "п у с"
      answer: "суп"
    - scrambled: "б л і х"
      answer: "хліб"
