- type: quiz
  title: "Letter and Sound Check"
  instruction: "Choose the correct answer for each question."
  items:
    - question: "Which letter looks like a platform or doorway and makes the /p/ sound?"
      explanation: "П is the letter for the /p/ sound. Do not confuse it with Р (/r/)."
      options:
        - text: "П"
          correct: true
        - text: "Р"
          correct: false
        - text: "Л"
          correct: false
        - text: "Д"
          correct: false
    - question: "Which letter makes the voiced /z/ sound and looks like the number 3?"
      explanation: "З looks like 3 and sounds like English Z."
      options:
        - text: "З"
          correct: true
        - text: "Е"
          correct: false
        - text: "В"
          correct: false
        - text: "С"
          correct: false
    - question: "What is the voiceless partner to the letter Б?"
      explanation: "Б and П form a voiced/voiceless pair."
      options:
        - text: "П"
          correct: true
        - text: "В"
          correct: false
        - text: "Д"
          correct: false
        - text: "М"
          correct: false
    - question: "Which letter is pronounced deep in the throat, similar to the end of Scottish 'loch'?"
      explanation: "Х is pronounced with friction in the back of the throat."
      options:
        - text: "Х"
          correct: true
        - text: "Г"
          correct: false
        - text: "К"
          correct: false
        - text: "Ж"
          correct: false
    - question: "Which letter sounds like the English 'sh' in 'ship'?"
      explanation: "Ш makes the /sh/ sound."
      options:
        - text: "Ш"
          correct: true
        - text: "Ж"
          correct: false
        - text: "Щ"
          correct: false
        - text: "Ч"
          correct: false
    - question: "Which letter makes the English 'ch' sound as in 'church'?"
      explanation: "Ч looks like the number 4 and makes the /ch/ sound."
      options:
        - text: "Ч"
          correct: true
        - text: "У"
          correct: false
        - text: "Ц"
          correct: false
        - text: "Ш"
          correct: false
    - question: "How does the Ukrainian letter Г sound?"
      explanation: "Г is a soft, throaty sound, not a hard 'g'."
      options:
        - text: "Soft and throaty, like a heavy 'h'"
          correct: true
        - text: "Hard, like in 'go'"
          correct: false
        - text: "Like English 'j'"
          correct: false
        - text: "Silent"
          correct: false
    - question: "Which of these pairs represents voiced and voiceless partners?"
      explanation: "Ж is voiced, and its partner Ш is voiceless."
      options:
        - text: "Ж and Ш"
          correct: true
        - text: "Б and Д"
          correct: false
        - text: "З and Х"
          correct: false
        - text: "П and Т"
          correct: false

- type: true-false
  title: "True or False: Voiced & Voiceless"
  instruction: "Determine if each statement is true or false."
  items:
    - statement: "The Ukrainian letter Д makes the /d/ sound."
      correct: true
      explanation: "Yes, Д sounds like English D, but with the tongue on the teeth."
    - statement: "The letter П makes an /r/ sound."
      correct: false
      explanation: "П makes the /p/ sound. Р makes the rolled /r/ sound."
    - statement: "You use your vocal cords (throat vibrates) when saying voiced consonants."
      correct: true
      explanation: "Voiced consonants like Б, З, and Ж cause vibration in the throat."
    - statement: "The letter Г is pronounced like the hard English G in 'good'."
      correct: false
      explanation: "Г is a soft, continuous glottal sound. The hard G in Ukrainian is a different letter."
    - statement: "The letter Ж sounds like the middle of the English word 'measure'."
      correct: true
      explanation: "Ж is a voiced sibilant without a single English letter equivalent."
    - statement: "Ш and Ж are a voiced/voiceless pair."
      correct: true
      explanation: "Ж is voiced, and its partner Ш is voiceless."
    - statement: "The letter Ч looks like the number 4 and sounds like 'sh'."
      correct: false
      explanation: "Ч sounds like English 'ch', not 'sh'. Ш makes the 'sh' sound."
    - statement: "The word 'зуб' starts with a voiced consonant, while 'суп' starts with a voiceless one."
      correct: true
      explanation: "З is voiced, and С is voiceless."

