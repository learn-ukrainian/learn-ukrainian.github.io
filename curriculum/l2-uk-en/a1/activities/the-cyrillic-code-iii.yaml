      distractors: ["С", "Ж"]
    - emoji: "⛰️"
      answer: "Г"
      distractors: ["Х", "К"]
    - emoji: "🍞"
      answer: "Х"
      distractors: ["Г", "К"]
    - emoji: "🪲"
