      answer: "Ш"
      distractors: ["Ж", "С"]
    - emoji: "🐢"
      answer: "Ч"
      distractors: ["Ш", "Ц"]

- type: match-up
  title: "Match the Voiced to Voiceless Partner"
  instruction: "Match each voiced consonant to its unvoiced counterpart."
  pairs:
    - left: "Б (банан)"
      right: "П (парк)"
    - left: "Д (дім)"
      right: "Т (там)"
    - left: "З (зуб)"
      right: "С (слово)"
    - left: "Ж (вже)"
      right: "Ш (шапка)"
    - left: "Г (газета)"
      right: "Х (хліб)"
    - left: "Voiced (Vibrates)"
      right: "Voiceless (Only air)"

- type: quiz
  title: "Check Your Knowledge"
  instruction: "Choose the correct answer."
  items:
    - question: "Which letter makes the 'ch' sound like in 'church'?"
      options:
        - text: "Ч"
          correct: true
        - text: "Ш"
          correct: false
        - text: "Ж"
          correct: false
        - text: "Х"
          correct: false
      explanation: "Ч looks like an upside-down chair and makes the 'ch' sound."
    - question: "Which letter is voiced?"
      options:
        - text: "Б"
          correct: true
        - text: "П"
          correct: false
        - text: "Ш"
          correct: false
        - text: "Х"
          correct: false
      explanation: "Б is voiced (b), while П, Ш, and Х are voiceless."
    - question: "How do you say 'bread' in Ukrainian?"
      options:
        - text: "хліб"
          correct: true
        - text: "парк"
          correct: false
        - text: "дім"
          correct: false
        - text: "зуб"
          correct: false
      explanation: "Bread is хліб."
    - question: "Which word means 'school'?"
      options:
        - text: "школа"
          correct: true
        - text: "шапка"
          correct: false
        - text: "газета"
          correct: false
        - text: "пошта"
          correct: false
      explanation: "School is школа."
    - question: "What does the letter 'Д' sound like?"
      options:
        - text: "Like English 'd'"
          correct: true
        - text: "Like English 't'"
          correct: false
        - text: "Like English 'b'"
          correct: false
        - text: "Like English 'g'"
          correct: false
      explanation: "Д makes the 'd' sound."
    - question: "Which letter is the voiceless partner of З?"
      options:
        - text: "С"
          correct: true
        - text: "Ш"
          correct: false
        - text: "Х"
          correct: false
        - text: "П"
          correct: false
      explanation: "З (voiced) pairs with С (voiceless)."

- type: fill-in
  title: "Complete the Phrase"
  instruction: "Select the correct word to complete the translation."
  items:
    - sentence: "цей ___ тут (this banana is here)"
      answer: "банан"
      options: ["банан", "школа", "людина", "шапка"]
    - sentence: "той ___ там (that park is there)"
      answer: "парк"
      options: ["парк", "дім", "людина", "шапка"]
    - sentence: "ця ___ тут (this person is here)"
      answer: "людина"
      options: ["людина", "дім", "зуб", "хліб"]
    - sentence: "та ___ там (that school is there)"
      answer: "школа"
      options: ["школа", "парк", "дім", "хліб"]
    - sentence: "цей ___ тут (this home is here)"
      answer: "дім"
      options: ["дім", "школа", "людина", "шапка"]
    - sentence: "той ___ там (that bread is there)"
      answer: "хліб"
      options: ["хліб", "школа", "людина", "шапка"]

- type: true-false
  title: "True or False?"
  instruction: "Decide if the statement is true or false."
  items:
    - statement: "The letter Б makes the 'b' sound."
      correct: true
      explanation: "Б is voiced and sounds like 'b'."
    - statement: "The letter Х makes a 'ks' sound."
      correct: false
      explanation: "Х looks like an X, but makes a 'ch' sound like in 'loch'."
    - statement: "The letter П is the voiceless partner of Б."
      correct: true
      explanation: "Б is voiced, П is voiceless."
    - statement: "The word хліб means 'water'."
      correct: false
      explanation: "хліб means bread."
    - statement: "The letter Ж makes a buzzing sound."
      correct: true
      explanation: "Ж sounds like a buzzing insect."
    - statement: "The letter Г makes a hard 'g' sound like in 'go'."
      correct: false
      explanation: "Г is a soft, throaty sound."
    - statement: "The word школа means 'school'."
      correct: true
      explanation: "школа is school."
    - statement: "The letter Ш is voiced."
      correct: false
      explanation: "Ш is the voiceless partner of Ж."

- type: group-sort
  title: "Sort the Words by Gender"
  instruction: "Look closely at the demonstrative adjectives (цей/ця) in the lesson to sort these words."
  groups:
    - name: "Masculine (цей / той)"
      items: ["банан", "парк", "дім", "хліб", "зуб"]
    - name: "Feminine (ця / та)"
      items: ["школа", "людина", "шапка", "газета", "пошта"]