- type: true-false
  title: "True or False: Syllables and Division"
  instruction: "Decide if the statement is true or false based on Ukrainian rules."
  items:
    - statement: "The number of syllables in a Ukrainian word is exactly equal to the number of vowels."
      correct: true
      explanation: "This is the golden rule of Ukrainian syllables."
    - statement: "In Ukrainian, every vowel must be pronounced."
      correct: true
      explanation: "There are no silent vowels in Ukrainian."
    - statement: "An open syllable ends in a consonant."
      correct: false
      explanation: "An open syllable ends in a vowel."
    - statement: "Ukrainian prefers closed syllables."
      correct: false
      explanation: "Ukrainian strongly prefers open syllables, which makes the language sound melodic."
    - statement: "When dividing words, you can leave a single letter at the end of a line."
      correct: false
      explanation: "You must never leave a single letter alone on a line, even if it is a full syllable."
    - statement: "The soft sign (ь) can be separated from the consonant before it when hyphenating."
      correct: false
      explanation: "The soft sign has no sound on its own and must stay attached to the preceding consonant."
    - statement: "The apostrophe (') must stay with the consonant before it."
      correct: true
      explanation: "The apostrophe is grouped with the preceding consonant."
    - statement: "The consonant cluster 'ст' in 'сестра' is split into two different syllables."
      correct: false
      explanation: "Ukrainian pushes both consonants to the next syllable: се-стра."

