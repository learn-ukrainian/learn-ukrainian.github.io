- type: quiz
  title: Syllable Counting 1
  items:
  - question: Syllables in 'молоко' (milk)?
    options:
    - text: '1'
      correct: false
    - text: '2'
      correct: false
    - text: '3'
      correct: true
    - text: '4'
      correct: false
    explanation: There are three vowels (о, о, о).
  - question: Syllables in 'кіт' (cat)?
    options:
    - text: '1'
      correct: true
    - text: '2'
      correct: false
    - text: '3'
      correct: false
    - text: '4'
      correct: false
    explanation: There is only one vowel (і).
  - question: Correct split for 'Україна'?
    options:
    - text: У-країна
      correct: false
    - text: Укра-їна
      correct: true
    - text: Ук-раїна
      correct: false
    - text: Україн-а
      correct: false
    explanation: You cannot leave a single letter alone.
  - question: Divide 'ґудзик' (button)?
    options:
    - text: ґуд-зик
      correct: false
    - text: ґу-дзик
      correct: true
    - text: ґ-удзик
      correct: false
    - text: ґудзи-к
      correct: false
    explanation: Digraph 'дз' stays together.
  - question: Divide 'пальці' (fingers)?
    options:
    - text: пал-ьці
      correct: false
    - text: паль-ці
      correct: true
    - text: пальц-і
      correct: false
    - text: п-альці
      correct: false
    explanation: Soft sign (ь) stays with consonant.
  - question: Syllables in 'автобус'?
    options:
    - text: '1'
      correct: false
    - text: '2'
      correct: false
    - text: '3'
      correct: true
    - text: '4'
      correct: false
    explanation: 'Three vowels: а, о, у.'
  instruction: Оберіть правильну відповідь.
- type: quiz
  title: Syllable Counting 2
  items:
  - question: Is 'й' a vowel?
    options:
    - text: 'Yes'
      correct: false
    - text: 'No'
      correct: true
    - text: Sometimes
      correct: false
    - text: Always
      correct: false
    explanation: '''й'' is a consonant in Ukrainian syllable rules.'
  - question: Syllables in 'сім'я'?
    options:
    - text: '1'
      correct: false
    - text: '2'
      correct: true
    - text: '3'
      correct: false
    - text: '4'
      correct: false
    explanation: 'Two vowels: і, я.'
  - question: Every vowel creates how many syllables?
    options:
    - text: '0'
      correct: false
    - text: '1'
      correct: true
    - text: '2'
      correct: false
    - text: '3'
      correct: false
    explanation: One vowel = one syllable.
  - question: Syllables in 'вулиця'?
    options:
    - text: '1'
      correct: false
    - text: '2'
      correct: false
    - text: '3'
      correct: true
    - text: '4'
      correct: false
    explanation: 'Three vowels: у, и, я.'
  - question: Split 'сестра' correctly?
    options:
    - text: сес-тра
      correct: false
    - text: се-стра
      correct: true
    - text: сест-ра
      correct: false
    - text: с-естра
      correct: false
    explanation: Consonants go to the next syllable.
  - question: Split 'вікно' correctly?
    options:
    - text: вік-но
      correct: false
    - text: ві-кно
      correct: true
    - text: в-ікно
      correct: false
    - text: вікно-
      correct: false
    explanation: Push consonants forward.
  instruction: Оберіть правильну відповідь.
