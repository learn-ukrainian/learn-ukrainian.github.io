- type: true-false
  title: True or False? Test Your Syllable Knowledge
  instruction: Decide whether each statement about Ukrainian syllables and word division
    is true or false.
  items:
  - statement: Every vowel in Ukrainian creates exactly one syllable.
    correct: true
    explanation: This is the core rule. Ukrainian has no silent vowels, so every vowel
      = one syllable.
  - statement: The letter й is a vowel and creates its own syllable.
    correct: false
    explanation: й is a consonant, not a vowel. It does not create a syllable.
  - statement: The letter ї is a vowel and always forms its own syllable.
    correct: true
    explanation: ї is a true vowel and always creates a syllable.
  - statement: An open syllable ends in a consonant.
    correct: false
    explanation: An open syllable ends in a vowel. A closed syllable ends in a consonant.
  - statement: The word молоко has 3 syllables because it has 3 vowels.
    correct: true
    explanation: молоко has the vowels о, о, о — three vowels mean three syllables.
  - statement: When writing, you can leave a single letter alone on a line.
    correct: false
    explanation: You can never leave a single letter alone. For example, У-країна
      is forbidden.
  - statement: The digraph дз can be split between two lines when writing.
    correct: false
    explanation: When дз represents one sound, it cannot be split. ґу-дзик is correct,
      not ґуд-зик.
  - statement: The soft sign ь must stay with the consonant before it when dividing
      a word.
    correct: true
    explanation: ь belongs to its consonant. паль-ці is correct, not пал-ьці.
  - statement: Ukrainian strongly prefers open syllables (ending in a vowel).
    correct: true
    explanation: Open syllables are the default and most common type in Ukrainian.
  - statement: The word край has two syllables.
    correct: false
    explanation: край has only one vowel (а). The letter й is a consonant, so край
      has just 1 syllable.
- type: anagram
  title: Unscramble the Word
  instruction: Rearrange the letters to form a Ukrainian word from this lesson.
  items:
  - scrambled: к о л о м о
    answer: молоко
  - scrambled: р е д е в о
    answer: дерево
  - scrambled: л у в и ц я
    answer: вулиця
  - scrambled: т і к
    answer: кіт
  - scrambled: м а м а
    answer: мама
  - scrambled: а р т с е с
    answer: сестра
  - scrambled: о т с і м
    answer: місто
  - scrambled: о к у л б я
    answer: яблуко
