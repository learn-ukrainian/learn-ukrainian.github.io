- type: quiz
  title: "Choose the Correct Word Division"
  instruction: "Select the correct way to divide the word into syllables."
  items:
    - question: "The correct way to divide сестра is ___."
      explanation: "Ukrainian pushes consonants to the next syllable to keep the first one open."
      options:
        - text: "сес-тра"
          correct: false
        - text: "се-стра"
          correct: true
        - text: "с-естра"
          correct: false
        - text: "сест-ра"
          correct: false
    - question: "The correct way to divide острів is ___."
      explanation: "The cluster 'стр' moves to the next syllable."
      options:
        - text: "ос-трів"
          correct: false
        - text: "ост-рів"
          correct: false
        - text: "о-стрів"
          correct: true
        - text: "острі-в"
          correct: false
    - question: "The correct way to divide Україна is ___."
      explanation: "Every vowel is a syllable, and consonants move forward."
      options:
        - text: "Ук-ра-їна"
          correct: false
        - text: "У-кра-ї-на"
          correct: true
        - text: "Укр-аї-на"
          correct: false
        - text: "У-краї-на"
          correct: false
    - question: "The correct way to hyphenate сім'я is ___."
      explanation: "The apostrophe must stay with the preceding consonant."
      options:
        - text: "сім-'я"
          correct: false
        - text: "сі-м'я"
          correct: true
        - text: "сі-'мя"
          correct: false
        - text: "сім-я'"
          correct: false
    - question: "The correct way to hyphenate пальці is ___."
      explanation: "The soft sign (ь) must stay with the preceding consonant."
      options:
        - text: "пал-ьці"
          correct: false
        - text: "па-льці"
          correct: false
        - text: "паль-ці"
          correct: true
        - text: "пальц-і"
          correct: false
    - question: "The correct way to divide дерево is ___."
      explanation: "All syllables are open."
      options:
        - text: "дер-ево"
          correct: false
        - text: "де-рев-о"
          correct: false
        - text: "де-ре-во"
          correct: true
        - text: "д-ерево"
          correct: false
    - question: "The correct way to hyphenate ґудзик is ___."
      explanation: "The combination 'дз' represents one sound and cannot be separated."
      options:
        - text: "ґуд-зик"
          correct: false
        - text: "ґу-дзик"
          correct: true
        - text: "ґудз-ик"
          correct: false
        - text: "ґ-удзик"
          correct: false
    - question: "The correct way to divide автобус is ___."
      explanation: "Closed syllable 'ав', open 'то', closed 'бус'."
      options:
        - text: "а-вто-бус"
          correct: false
        - text: "авт-о-бус"
          correct: false
        - text: "ав-то-бус"
          correct: true
        - text: "ав-тоб-ус"
          correct: false

