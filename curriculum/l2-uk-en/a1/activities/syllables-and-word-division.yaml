- type: quiz
  title: Count the Syllables
  instruction: 'Remember: every vowel in Ukrainian creates exactly one syllable. Count
    the vowels to find the syllable count.'
  items:
  - question: How many syllables does the word молоко (milk) have?
    options:
    - text: '2'
      correct: false
    - text: '3'
      correct: true
    - text: '4'
      correct: false
    - text: '1'
      correct: false
    explanation: 'молоко has 3 vowels (о, о, о), so it has 3 syllables: мо-ло-ко.'
  - question: How many syllables does the word Україна (Ukraine) have?
    options:
    - text: '3'
      correct: false
    - text: '5'
      correct: false
    - text: '4'
      correct: true
    - text: '2'
      correct: false
    explanation: 'Україна has 4 vowels (у, а, ї, а), so it has 4 syllables: У-кра-ї-на.'
  - question: How many syllables does the word кіт (cat) have?
    options:
    - text: '1'
      correct: true
    - text: '2'
      correct: false
    - text: '3'
      correct: false
    - text: '0'
      correct: false
    explanation: кіт has 1 vowel (і), so it has exactly 1 syllable.
  - question: How many syllables does the word бібліотека (library) have?
    options:
    - text: '3'
      correct: false
    - text: '4'
      correct: false
    - text: '5'
      correct: true
    - text: '6'
      correct: false
    explanation: 'бібліотека has 5 vowels (і, і, о, е, а), so it has 5 syllables:
      бі-блі-о-те-ка.'
  - question: How many syllables does the word сестра (sister) have?
    options:
    - text: '3'
      correct: false
    - text: '1'
      correct: false
    - text: '2'
      correct: true
    - text: '4'
      correct: false
    explanation: 'сестра has 2 vowels (е, а), so it has 2 syllables: се-стра.'
  - question: How many syllables does the word університет (university) have?
    options:
    - text: '4'
      correct: false
    - text: '5'
      correct: true
    - text: '3'
      correct: false
    - text: '6'
      correct: false
    explanation: 'університет has 5 vowels (у, і, е, и, е), so it has 5 syllables:
      у-ні-вер-си-тет.'
  - question: How many syllables does the word яблуко (apple) have?
    options:
    - text: '2'
      correct: false
    - text: '4'
      correct: false
    - text: '3'
      correct: true
    - text: '1'
      correct: false
    explanation: 'яблуко has 3 vowels (я, у, о), so it has 3 syllables: яб-лу-ко.'
  - question: How many syllables does the word автобус (bus) have?
    options:
    - text: '3'
      correct: true
    - text: '2'
      correct: false
    - text: '4'
      correct: false
    - text: '1'
      correct: false
    explanation: 'автобус has 3 vowels (а, о, у), so it has 3 syllables: ав-то-бус.'
  - question: How many syllables does the word дерево (tree) have?
    options:
    - text: '2'
      correct: false
    - text: '3'
      correct: true
    - text: '4'
      correct: false
    - text: '1'
      correct: false
    explanation: 'дерево has 3 vowels (е, е, о), so it has 3 syllables: де-ре-во.'
  - question: The letter й is a consonant. How many syllables does the word край (edge)
      have?
    options:
    - text: '1'
      correct: true
    - text: '2'
      correct: false
    - text: '3'
      correct: false
    - text: '0'
      correct: false
    explanation: край has only 1 vowel (а). The letter й is a consonant, not a vowel,
      so it does not create a syllable.
- type: fill-in
  title: Mark the Correct Word Division
  instruction: 'Choose the correct way to split the word for writing (word division).
    Remember the rules: never leave a single letter alone, never split дж/дз, never
    separate ь from its consonant.'
  items:
  - sentence: Which word division for Україна is INCORRECT?
    answer: У-країна
    options:
    - У-країна
    - Укра-їна
    - Украї-на
    - Ук-раїна
    explanation: У-країна is wrong because you cannot leave a single letter alone.
      Укра-їна and Украї-на are both correct divisions.
  - sentence: The correct word division for ґудзик is ___.
    answer: ґу-дзик
    options:
    - ґуд-зик
    - ґу-дзик
    - ґудз-ик
    - ґудзи-к
    explanation: The digraph дз represents one sound and cannot be split. ґу-дзик
      keeps дз together.
  - sentence: The correct word division for пальці is ___.
    answer: паль-ці
    options:
    - пал-ьці
    - паль-ці
    - па-льці
    - пальц-і
    explanation: The soft sign ь must stay with its consonant л. паль-ці is correct.
  - sentence: The correct word division for сім'я is ___.
    answer: сі-м'я
    options:
    - сім-'я
    - сі-м'я
    - с-ім'я
    - сім'-я
    explanation: The apostrophe cannot be separated from the consonant before it.
      сі-м'я keeps м' together.
  - sentence: The correct word division for молоко is ___.
    answer: мо-ло-ко
    options:
    - мо-ло-ко
    - мол-око
    - м-олоко
    - моло-ко
    explanation: мо-ло-ко splits naturally between vowels and consonants, keeping
      all syllables open.
  - sentence: The correct word division for автобус is ___.
    answer: ав-то-бус
    options:
    - а-втобус
    - ав-то-бус
    - авто-бу-с
    - авт-обус
    explanation: а-втобус is wrong because a single letter cannot stand alone. ав-то-бус
      is correct.
  - sentence: Which word division for бібліотека is INCORRECT?
    answer: бібліотек-а
    options:
    - б-ібліотека
    - бібліотек-а
    - бібліо-тека
    - бібліоте-ка
    explanation: б-ібліотека and бібліотек-а leave single letters alone, so they are
      incorrect. Both бібліо-тека and бібліоте-ка are valid divisions.
  - sentence: The correct word division for вулиця is ___.
    answer: ву-ли-ця
    options:
    - ву-ли-ця
    - в-улиця
    - вулиц-я
    - вул-иця
    explanation: ву-ли-ця splits naturally with all open syllables. в-улиця and вулиц-я
      leave single letters alone.
- type: group-sort
  title: Open or Closed Syllable?
  instruction: Sort these syllables into two groups. Open syllables end in a vowel.
    Closed syllables end in a consonant.
  groups:
  - name: Open syllable (ends in a vowel)
    items:
    - ма (from мама)
    - мо (from молоко)
    - ло (from молоко)
    - ко (from молоко)
    - де (from дерево)
    - ре (from дерево)
    - во (from дерево)
  - name: Closed syllable (ends in a consonant)
    items:
    - кіт
    - там
    - бус (from автобус)
    - тет (from університет)
    - край
- type: match-up
  title: Match the Word to Its Syllable Count
  instruction: Match each Ukrainian word to the correct number of syllables. Count
