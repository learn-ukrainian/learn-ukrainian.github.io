- type: unjumble
  title: "Складіть речення: Знахідний відмінок"
  instruction: "Побудуйте правильне речення."
  items:
    - words: ["Я", "читаю", "цікаву", "нову", "книгу"]
      answer: "Я читаю цікаву нову книгу"
    - words: ["Він", "бачить", "великий", "новий", "парк"]
      answer: "Він бачить великий новий парк"
    - words: ["Ми", "зустрічаємо", "старого", "друга"]
      answer: "Ми зустрічаємо старого друга"
    - words: ["Вона", "любить", "смачну", "каву"]
      answer: "Вона любить смачну каву"
    - words: ["Вони", "знають", "молодого", "чоловіка"]
      answer: "Вони знають молодого чоловіка"

- type: unjumble
  title: "Складіть речення: Місцевий відмінок"
  instruction: "Побудуйте правильне речення про локацію."
  items:
    - words: ["Ми", "гуляємо", "у", "великому", "парку"]
      answer: "Ми гуляємо у великому парку"
    - words: ["Я", "живу", "в", "старому", "місті"]
      answer: "Я живу в старому місті"
    - words: ["Вона", "працює", "в", "українському", "ресторані"]
      answer: "Вона працює в українському ресторані"
    - words: ["Студенти", "сидять", "у", "новому", "кафе"]
      answer: "Студенти сидять у новому кафе"
    - words: ["Ти", "читаєш", "у", "новій", "книзі"]
      answer: "Ти читаєш у новій книзі"

- type: group-sort
  title: "Розподіліть за відмінком"
  instruction: "Визначте, в якому відмінку стоїть виділена фраза."
  groups:
    - name: "Знахідний відмінок (Об'єкт)"
      items: ["нову книгу", "новий фільм", "старого друга", "смачну каву", "велике місто", "молодого чоловіка"]
    - name: "Місцевий відмінок (Локація)"
      items: ["у новому парку", "на старій площі", "в українському місті", "у великому ресторані", "на новій книзі"]

- type: group-sort
  title: "Логіка знахідного відмінка"
  instruction: "Розподіліть прикметники залежно від того, з яким іменником вони вживаються у знахідному відмінку."
  groups:
    - name: "Закінчення -у (Жіночий рід)"
      items: ["нову", "цікаву", "смачну", "велику"]
    - name: "Закінчення -ого (Живий чоловічий)"
      items: ["нового", "молодого", "старого", "популярного"]
    - name: "Без змін (Неживий чоловічий і середній)"
      items: ["новий", "великий", "нове", "популярне"]