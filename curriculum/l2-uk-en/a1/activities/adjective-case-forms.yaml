- type: fill-in
  title: "Знахідний відмінок: об'єкти дії"
  instruction: "Оберіть правильну форму прикметника у знахідному відмінку."
  items:
    - sentence: "Я дивлюся _____ фільм у кінотеатрі."
      answer: "новий"
      options: ["новий", "нового", "новому", "новим"]
      explanation: "Фільм — це неживий іменник чоловічого роду, тому форма не змінюється."
    - sentence: "Вона читає _____ книгу ввечері."
      answer: "цікаву"
      options: ["цікава", "цікаву", "цікавій", "цікавою"]
      explanation: "Для жіночого роду у знахідному відмінку закінчення змінюється на -у."
    - sentence: "Ми бачимо _____ студента."
      answer: "молодого"
      options: ["молодий", "молодого", "молодому", "молодим"]
      explanation: "Студент — це живий іменник чоловічого роду. Використовуємо закінчення -ого."
    - sentence: "Він купує _____ каву."
      answer: "смачну"
      options: ["смачна", "смачну", "смачній", "смачною"]
      explanation: "Кава — жіночий рід, тому прикметник має закінчення -у."
    - sentence: "Вони відвідують _____ кафе."
      answer: "нове"
      options: ["новий", "нове", "нового", "новому"]
      explanation: "Кафе — середній рід, форма не змінюється."
    - sentence: "Ти знаєш цього _____ актора?"
      answer: "популярного"
      options: ["популярний", "популярного", "популярному", "популярним"]
      explanation: "Актор — живий іменник чоловічого роду, закінчення -ого."
    - sentence: "Я хочу купити _____ будинок."
      answer: "великий"
      options: ["великий", "великого", "великому", "великим"]
      explanation: "Будинок — неживий іменник чоловічого роду, форма залишається базовою."
    - sentence: "Ми любимо цю _____ країну."
      answer: "красиву"
      options: ["красива", "красиву", "красивій", "красивою"]
      explanation: "Країна — жіночий рід, закінчення -у."

- type: fill-in
  title: "Місцевий відмінок: локації"
  instruction: "Вставте правильну форму прикметника для місцевого відмінка."
  items:
    - sentence: "Ми гуляємо у _____ парку."
      answer: "великому"
      options: ["великий", "великого", "великому", "великим"]
      explanation: "Парк — чоловічий рід, місцевий відмінок має закінчення -ому."
    - sentence: "Вона працює в _____ ресторані."
      answer: "дорогому"
      options: ["дорогий", "дорогого", "дорогому", "дорогим"]
      explanation: "Ресторан — чоловічий рід, місцевий відмінок -ому."
    - sentence: "Я живу в _____ місті."
      answer: "старому"
      options: ["старий", "старого", "старому", "старим"]
      explanation: "Місто — середній рід, місцевий відмінок -ому."
    - sentence: "Квиток лежить у _____ книзі."
      answer: "новій"
      options: ["нова", "нову", "новій", "новою"]
      explanation: "Книга — жіночий рід, у місцевому відмінку прикметник має стабільне закінчення -ій."
    - sentence: "Студенти сидять у _____ кафе."
      answer: "популярному"
      options: ["популярне", "популярного", "популярному", "популярним"]
      explanation: "Кафе — середній рід, місцевий відмінок -ому."
    - sentence: "Ми зустрічаємося на _____ площі."
      answer: "головній"
      options: ["головна", "головну", "головній", "головною"]
      explanation: "Площа — жіночий рід, місцевий відмінок -ій."
    - sentence: "Ця інформація є в _____ словнику."
      answer: "українському"
      options: ["український", "українського", "українському", "українським"]
      explanation: "Словник — чоловічий рід, закінчення -ому."
    - sentence: "Вони живуть у цій _____ країні."
      answer: "красивій"
      options: ["красива", "красиву", "красивій", "красивою"]
      explanation: "Країна — жіночий рід, місцевий відмінок -ій."

- type: quiz
  title: "Перевірте знання: живий чи неживий?"
  instruction: "Оберіть правильний варіант закінчення."
  items:
    - question: "Яку форму прикметника треба використати у реченні: Я бачу (новий) студента?"
      explanation: "Студент — це жива людина, чоловічий рід. У знахідному відмінку використовуємо -ого."
      options:
        - text: "новий"
          correct: false
        - text: "нового"
          correct: true
        - text: "новому"
          correct: false
        - text: "новій"
          correct: false
    - question: "Яку форму ми використаємо у реченні: Ми купуємо (новий) стіл?"
      explanation: "Стіл — неживий предмет чоловічого роду, тому форма не змінюється."
      options:
        - text: "новий"
          correct: true
        - text: "нового"
          correct: false
        - text: "новому"
          correct: false
        - text: "нову"
          correct: false
    - question: "Як правильно сказати: Він знає (старий) друга?"
      explanation: "Друг — це жива людина. Знахідний відмінок дорівнює родовому (-ого)."
      options:
        - text: "старий друга"
          correct: false
        - text: "старого друга"
          correct: true
        - text: "старому друга"
          correct: false
        - text: "старим друга"
          correct: false
    - question: "Як правильно сказати: Вона читає (цікавий) статтю?"
      explanation: "Стаття — це жіночий рід. Знахідний відмінок вимагає закінчення -у."
      options:
        - text: "цікавий статтю"
          correct: false
        - text: "цікава статтю"
          correct: false
        - text: "цікаву статтю"
          correct: true
        - text: "цікавій статтю"
          correct: false
    - question: "Яке закінчення має прикметник чоловічого роду у місцевому відмінку?"
      explanation: "У місцевому відмінку чоловічий і середній рід мають закінчення -ому."
      options:
        - text: "-у"
          correct: false
        - text: "-ого"
          correct: false
        - text: "-ому"
          correct: true
        - text: "-ій"
          correct: false
    - question: "Яке стабільне закінчення має жіночий прикметник у місцевому відмінку?"
      explanation: "Жіночий прикметник у місцевому відмінку завжди має закінчення -ій."
      options:
        - text: "-ій"
          correct: true
        - text: "-у"
          correct: false
        - text: "-ому"
          correct: false
        - text: "-ого"
          correct: false

- type: quiz
  title: "Розпізнавання маркерів відмінків"
  instruction: "Визначте відмінок та рід за закінченням прикметника."
  items:
    - question: "Якщо ви бачите фразу у великому, який це відмінок?"
      explanation: "Закінчення -ому разом з прийменником «у» вказує на місцевий відмінок."
      options:
        - text: "Називний"
          correct: false
        - text: "Знахідний"
          correct: false
        - text: "Місцевий"
          correct: true
        - text: "Орудний"
          correct: false
    - question: "Про що говорить закінчення прикметника у слові смачну?"
      explanation: "Закінчення -у є маркером знахідного відмінка для жіночого роду (об'єкт дії)."
      options:
        - text: "Це локація, чоловічий рід."
          correct: false
        - text: "Це об'єкт дії, жіночий рід."
          correct: true
        - text: "Це суб'єкт, жіночий рід."
          correct: false
        - text: "Це об'єкт дії, чоловічий рід."
          correct: false
    - question: "Якщо ви кажете нового чоловіка, це який відмінок?"
      explanation: "Закінчення -ого для живої людини показує об'єкт дії у знахідному відмінку."
      options:
        - text: "Називний"
          correct: false
        - text: "Місцевий"
          correct: false
        - text: "Знахідний (живий)"
          correct: true
        - text: "Знахідний (неживий)"
          correct: false
    - question: "Що означає прикметник у формі старій у фразі в старій церкві?"
      explanation: "Закінчення -ій — це місцевий відмінок жіночого роду."
      options:
        - text: "Локація, жіночий рід."
          correct: true
        - text: "Об'єкт, жіночий рід."
          correct: false
        - text: "Локація, чоловічий рід."
          correct: false
        - text: "Суб'єкт, жіночий рід."
          correct: false
    - question: "Яке з цих слів є правильним об'єктом для слова парк?"
      explanation: "Парк — неживий іменник чоловічого роду, тому його форма не змінюється."
      options:
        - text: "нового парку"
          correct: false
        - text: "новий парк"
          correct: true
        - text: "новому парку"
          correct: false
        - text: "новій парк"
          correct: false
    - question: "Який прикметник має правильну форму місцевого відмінка для слова місто?"
      explanation: "Місто — середній рід, тому прикметник має закінчення -ому."
      options:
        - text: "великому"
          correct: true
        - text: "великий"
          correct: false
        - text: "великого"
          correct: false
        - text: "великій"
          correct: false

