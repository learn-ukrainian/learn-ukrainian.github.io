version: '1.0'
module: free-time
level: a1
inline:
- id: fill-in-invitations
  type: fill-in
  instruction: Оберіть правильний варіант (Choose the correct option)
  items:
  - sentence: — _____ в кіно у суботу! — Добре!
    answer: Ходімо
    options:
    - Ходімо
    - Давай
    - Ідемо
  - sentence: Що ти робиш _____?
    answer: у вихідні
    options:
    - у вихідні
    - вихідні
    - на вихідні
  - sentence: — _____ на концерт завтра! — Чудова ідея!
    answer: Ходімо
    options:
    - Ходімо
    - Йдемо
    - Давай
  - sentence: — Що ви робите _____? — Ми граємо у теніс.
    answer: у вихідні
    options:
    - у вихідні
    - вихідні
    - на вихідні
  - sentence: — _____ в музей! — Я не люблю музеї.
    answer: Ходімо
    options:
    - Ходімо
    - Пішли
    - Давай
  - sentence: Я маю вільний _____, ходімо гуляти!
    answer: час
    options:
    - час
    - день
    - тиждень
- id: match-up-hobbies
  type: match-up
  instruction: З'єднайте дієслово з іменником (Match the verb to the logical noun)
  pairs:
  - left: грати
    right: у футбол
  - left: грати
    right: на гітарі
  - left: слухати
    right: музику
  - left: дивитися
    right: фільми
  - left: ходити
    right: в театр
  - left: читати
    right: книгу
  - left: малювати
    right: вдома
- id: preposition-check
  type: fill-in
  instruction: Оберіть правильний прийменник (Choose the correct preposition)
  items:
  - sentence: Він грає _____ піаніно.
    answer: на
    options:
    - на
    - у
    - в
  - sentence: Ми граємо _____ футбол.
    answer: у
    options:
    - у
    - на
    - в
  - sentence: Я хочу ходити _____ концерт.
    answer: на
    options:
    - на
    - в
    - у
  - sentence: Вони ходять _____ театр раз на місяць.
    answer: в
    options:
    - в
    - на
    - у
  - sentence: Вона грає _____ гітарі.
    answer: на
    options:
    - на
    - у
    - в
  - sentence: Діти грають _____ теніс.
    answer: у
    options:
    - у
    - на
    - в
- id: fill-in-frequency
  type: fill-in
  instruction: Оберіть правильне слово (Choose the correct word)
  items:
  - sentence: Я _____ працюю у неділю, бо це мій вихідний.
    answer: ніколи не
    options:
    - ніколи не
    - завжди
    - часто
  - sentence: Вона грає у теніс двічі _____.
    answer: на тиждень
    options:
    - на тиждень
    - у тиждень
    - в тиждень
  - sentence: Я люблю спорт, тому _____ граю у баскетбол.
    answer: часто
    options:
    - часто
    - ніколи
    - рідко
  - sentence: Я не маю часу, тому _____ читаю книги.
    answer: рідко
    options:
    - рідко
    - часто
    - завжди
  - sentence: Він _____ слухає таку музику.
    answer: ніколи не
    options:
    - ніколи не
    - ніколи
    - не ніколи
  - sentence: Ми _____ гуляємо ввечері, якщо гарна погода.
    answer: зазвичай
    options:
    - зазвичай
    - ніколи
    - рідко
workbook:
- id: group-sort-hobbies
  type: group-sort
  instruction: Розподіліть слова за категоріями (Sort words by categories)
  groups:
  - label: Спорт і ігри (грати у)
    items:
    - футбол
    - баскетбол
    - теніс
    - комп'ютерні ігри
  - label: Музичні інструменти (грати на)
    items:
    - гітарі
    - піаніно
    - скрипці
- id: true-false-rules
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Ми кажемо «грати на футбол».
    correct: false
    explanation: 'Для спорту ми використовуємо прийменник «у/в»: грати у футбол.'
  - statement: Після слова «ніколи» завжди має бути частка «не».
    correct: true
    explanation: 'В українській мові використовується подвійне заперечення: «ніколи
      не».'
  - statement: Ми кажемо «ходити в концерт».
    correct: false
    explanation: 'Для подій (подія) ми використовуємо прийменник «на»: ходити на концерт.'
  - statement: «Ходімо!» — це запрошення щось зробити разом.
    correct: true
    explanation: Це стандартна форма для запрошення (Let's go!).
  - statement: Ми кажемо «грати на гітарі».
    correct: true
    explanation: Для музичних інструментів використовується прийменник «на».
  - statement: Ми кажемо «ходити на кіно».
    correct: false
    explanation: 'Для будівель (building) використовується прийменник «в/у»: ходити
      в кіно.'
- id: translate-hobbies
  type: translate
  instruction: Оберіть правильний переклад (Choose the correct translation)
  items:
  - source: I play football.
    options:
    - text: Я граю у футбол.
      correct: true
    - text: Я граю на футбол.
      correct: false
    - text: Я граю в футболі.
      correct: false
    - text: Я граю футбол.
      correct: false
  - source: She plays the piano.
    options:
    - text: Вона грає на піаніно.
      correct: true
    - text: Вона грає у піаніно.
      correct: false
    - text: Вона грає в піаніно.
      correct: false
    - text: Вона грає піаніно.
      correct: false
  - source: We often go to the cinema.
    options:
    - text: Ми часто ходимо в кіно.
      correct: true
    - text: Ми часто ходимо на кіно.
      correct: false
    - text: Ми рідко ходимо в кіно.
      correct: false
    - text: Ми зазвичай ходимо в кіно.
      correct: false
  - source: Let's go to the theater!
    options:
    - text: Ходімо в театр!
      correct: true
    - text: Ходімо на театр!
      correct: false
    - text: Йдемо у театрі!
      correct: false
    - text: Давай в театрі!
      correct: false
  - source: I never listen to music.
    options:
    - text: Я ніколи не слухаю музику.
      correct: true
    - text: Я ніколи слухаю музику.
      correct: false
    - text: Я не ніколи слухаю музику.
      correct: false
    - text: Я завжди не слухаю музику.
      correct: false
  - source: What do you do on the weekend?
    options:
    - text: Що ти робиш у вихідні?
      correct: true
    - text: Що ти робиш на вихідні?
      correct: false
    - text: Що ти робиш вихідні?
      correct: false
    - text: Що ти робиш у вихідний?
      correct: false
- id: error-correction-prepositions
  type: error-correction
  instruction: Знайдіть і виправте помилку (Find and correct the error)
  items:
  - sentence: Ми ходимо на музей у суботу.
    error: на
    correction: в
    error_type: word
    options:
    - в
    - у
    - до
    explanation: Для будівель (музей) використовується прийменник в/у.
  - sentence: Я граю в гітарі щодня.
    error: в
    correction: на
    error_type: word
    options:
    - на
    - у
    - до
    explanation: Для інструментів використовується прийменник на.
  - sentence: Вона ніколи грає у теніс.
    error: грає
    correction: не грає
    error_type: construction
    options:
    - не грає
    - грати
    - грають
    explanation: В українській мові використовується подвійне заперечення з ніколи.
  - sentence: Вони грають на комп'ютерні ігри.
    error: на
    correction: у
    error_type: word
    options:
    - у
    - в
    - до
    explanation: Для ігор та спорту використовується прийменник у/в.
  - sentence: Він грає у скрипці дуже гарно.
    error: у
    correction: на
    error_type: word
    options:
    - на
    - в
    - до
    explanation: Для інструментів використовується прийменник на.
  - sentence: Ходімо на кіно сьогодні!
    error: на
    correction: в
    error_type: word
    options:
    - в
    - у
    - до
    explanation: Для будівель використовується прийменник в/у.
