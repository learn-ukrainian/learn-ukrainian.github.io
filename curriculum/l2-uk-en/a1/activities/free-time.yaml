- id: true-false-hobbies
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Слово «кіно» змінює своє закінчення.
    correct: false
    explanation: Слово «кіно» ніколи не змінює закінчення (indeclinable).
  - statement: Ми кажемо «грати на футбол».
    correct: false
    explanation: Для спорту ми використовуємо «у» або «в» (грати у футбол).
  - statement: Слово «вихідні» завжди має форму множини.
    correct: true
    explanation: Так, слово «вихідні» (weekend) завжди використовується у множині.
  - statement: Ми кажемо «грати на гітарі».
    correct: true
    explanation: Для музичних інструментів ми використовуємо прийменник «на».
  - statement: Після слова «ніколи» ми часто не використовуємо «не».
    correct: false
    explanation: В українській мові обов'язкове подвійне заперечення (ніколи не).
  - statement: Слова «іноді» та «інколи» мають однакове значення.
    correct: true
    explanation: Це синоніми, які означають «sometimes».
