- type: group-sort
  title: 'Меню: Перше, Друге чи Напій?'
  instruction: 'Розподіліть страви та напої за правильними категоріями в меню.'
  groups:
    - name: 'Перші страви'
      items:
        - 'борщ'
        - 'суп'
    - name: 'Другі страви'
      items:
        - 'вареники'
        - 'деруни'
        - 'котлета по-київськи'
        - 'стейк'
        - 'риба'
    - name: 'Напої'
      items:
        - 'кава'
        - 'чай'
        - 'вода'
        - 'компот'
        - 'сік'

- type: quiz
  title: 'Етикет та культура'
  instruction: 'Оберіть правильну відповідь на питання про українські традиції.'
  items:
    - question: 'Що традиційно їдять на "перше" в Україні?'
      explanation: 'Перша страва — це завжди рідка гаряча страва, наприклад, суп або борщ.'
      options:
        - text: 'Суп або борщ'
          correct: true
        - text: 'Салат'
          correct: false
        - text: 'Десерт'
          correct: false
        - text: 'Каву'
          correct: false
    - question: 'Що означає традиційний український тост "Будьмо!"?'
      explanation: 'Будьмо — це форма дієслова "бути", що означає "нехай ми будемо" (Let us be).'
      options:
        - text: 'Нехай ми будемо! (За наше життя)'
          correct: true
        - text: 'Смачного!'
          correct: false
        - text: 'Дякую!'
          correct: false
        - text: 'До побачення!'
          correct: false
    - question: 'Який стандартний розмір чайових в Україні?'
      explanation: 'Зазвичай прийнято залишати 10-15% від суми рахунку.'
      options:
        - text: '10-15%'
          correct: true
        - text: '50%'
          correct: false
        - text: 'Чайові не прийняті'
          correct: false
        - text: 'Тільки 1-2 гривні'
          correct: false
    - question: 'Що каже офіціант, коли приносить їжу?'
      explanation: 'В Україні бажають приємного апетиту словом "Смачного!".'
      options:
        - text: 'Смачного!'
          correct: true
        - text: 'Вітаю!'
          correct: false
        - text: 'Будьмо!'
          correct: false
        - text: 'Гірко!'
          correct: false
    - question: 'Яка різниця між "рахунок" і "чек"?'
      explanation: 'Рахунок — це список страв до оплати. Чек — це фіскальний документ після оплати.'
      options:
        - text: 'Рахунок — до оплати, чек — після оплати'
          correct: true
        - text: 'Це одне і те саме'
          correct: false
        - text: 'Чек — це меню'
          correct: false
        - text: 'Рахунок — це тільки для води'
          correct: false
    - question: 'Якщо ви платите готівкою і не хочете решту, що ви кажете?'
      explanation: 'Фраза "без решти" означає "keep the change".'
      options:
        - text: 'Без решти.'
          correct: true
        - text: 'Дайте гроші.'
          correct: false
        - text: 'Це все моє.'
          correct: false
        - text: 'Не треба меню.'
          correct: false
    - question: 'Як правильно і ввічливо замовити столик телефоном?'
      explanation: 'Ввічлива форма: "Я хотів би (хотіла б) замовити столик".'
      options:
        - text: 'Я хотів би замовити столик.'
          correct: true
        - text: 'Я хочу стіл зараз.'
          correct: false
        - text: 'Дайте мені місце.'
          correct: false
        - text: 'Де мій столик?'
          correct: false
    - question: 'Чим головним чином відрізняється ресторан від кафе?'
      explanation: 'Ресторан зазвичай більш формальний і урочистий, ніж кафе.'
      options:
        - text: 'Ресторан більш формальний'
          correct: true
        - text: 'У кафе немає кави'
          correct: false
        - text: 'У ресторані не дають меню'
          correct: false
        - text: 'Немає різниці'
          correct: false

- type: fill-in
  title: 'Я буду... (Замовлення)'
  instruction: 'Доповніть речення правильною формою слова у Знахідному відмінку (Я буду...).'
  items:
    - sentence: 'Я буду {{answer}}.'
      answer: 'каву'
      explanation: 'Кава (вона) -> Каву (Знахідний відмінок).'
      options:
        - 'каву'
        - 'кава'
        - 'кави'
        - 'кавою'
    - sentence: 'На друге я буду {{answer}}.'
      answer: 'салат'
      explanation: 'Салат (він, неістота) -> Салат (Знахідний відмінок не змінюється).'
      options:
        - 'салат'
        - 'салату'
        - 'салатом'
        - 'салати'
    - sentence: 'На перше я буду {{answer}}.'
      answer: 'борщ'
      explanation: 'Борщ (він, неістота) -> Борщ (Знахідний відмінок не змінюється).'
      options:
        - 'борщ'
        - 'борщу'
        - 'борщем'
        - 'борща'
    - sentence: 'Будь ласка, дайте {{answer}}.'
      answer: 'воду'
      explanation: 'Вода (вона) -> Воду (Знахідний відмінок).'
      options:
        - 'воду'
        - 'вода'
        - 'води'
        - 'водою'
    - sentence: 'Я буду курячий {{answer}}.'
      answer: 'суп'
      explanation: 'Суп (він, неістота) -> Суп (Знахідний відмінок не змінюється).'
      options:
        - 'суп'
        - 'супа'
        - 'супу'
        - 'супом'
    - sentence: 'Мені, будь ласка, зелений {{answer}}.'
      answer: 'чай'
      explanation: 'Чай (він, неістота) -> Чай (Знахідний відмінок не змінюється).'
      options:
        - 'чай'
        - 'чаю'
        - 'чаєм'
        - 'чаї'
    - sentence: 'Я буду цей {{answer}}.'
      answer: 'десерт'
      explanation: 'Десерт (він, неістота) -> Десерт (Знахідний відмінок не змінюється).'
      options:
        - 'десерт'
        - 'десерту'
        - 'десертом'
        - 'десерти'
    - sentence: 'Я буду велику {{answer}}.'
      answer: 'піцу'
      explanation: 'Піца (вона) -> Піцу (Знахідний відмінок).'
      options:
        - 'піцу'
        - 'піца'
        - 'піци'
        - 'піцою'

- type: unjumble
  title: 'Складіть речення'
