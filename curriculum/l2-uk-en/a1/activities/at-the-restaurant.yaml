- type: quiz
  title: 'Практичні ситуації'
  instruction: 'Що ви скажете у цій ситуації?'
  items:
    - question: 'Офіціант приніс вашу їжу. Що він скаже?'
      explanation: 'Офіціант бажає приємного апетиту.'
      options:
        - text: 'Смачного!'
          correct: true
        - text: 'До побачення!'
          correct: false
        - text: 'Привіт!'
          correct: false
        - text: 'Дякую!'
          correct: false
    - question: 'Ви хочете замовити столик на 19:00. Ви кажете:'
      explanation: 'Ввічлива форма замовлення столика.'
      options:
        - text: 'Я хотів би замовити столик на сьому.'
          correct: true
        - text: 'Я хочу стіл зараз.'
          correct: false
        - text: 'Дайте мені стілець.'
          correct: false
        - text: 'Де мій суп?'
          correct: false
    - question: 'Ви не їсте м’ясо. Ви питаєте:'
      explanation: 'Питання про наявність м’яса у страві.'
      options:
        - text: 'Це без м’яса?'
          correct: true
        - text: 'Де м’ясо?'
          correct: false
        - text: 'Я люблю м’ясо.'
          correct: false
        - text: 'Дайте м’ясо.'
          correct: false
    - question: 'Ваш суп холодний. Ви ввічливо кажете:'
      explanation: 'Ввічлива скарга на температуру страви.'
      options:
        - text: 'Вибачте, суп холодний.'
          correct: true
        - text: 'Суп поганий!'
          correct: false
        - text: 'Я не буду це!'
          correct: false
        - text: 'Холодно!'
          correct: false
    - question: 'Ви з другом платите кожен за себе. Ви кажете:'
      explanation: 'Оплата окремими рахунками.'
      options:
        - text: 'Окремо, будь ласка.'
          correct: true
        - text: 'Разом, будь ласка.'
          correct: false
        - text: 'Я плачу за все.'
          correct: false
        - text: 'Без решти.'
          correct: false
    - question: 'Ви хочете побачити меню. Ви кажете:'
      explanation: 'Прохання принести меню.'
      options:
        - text: 'Можна меню?'
          correct: true
        - text: 'Що це?'
          correct: false
        - text: 'Я хочу їсти.'
          correct: false
        - text: 'Де ресторан?'
          correct: false
    - question: 'Ви хочете сказати тост за столом. Ви кажете:'
      explanation: 'Будьмо — традиційний український тост.'
      options:
        - text: 'Будьмо!'
          correct: true
        - text: 'Смачного!'
          correct: false
        - text: 'До побачення.'
          correct: false
        - text: 'Я тут.'
          correct: false
    - question: 'Офіціант питає: "Бажаєте залишити чайові?". Ви згодні:'
      explanation: 'Ввічлива згода залишити чайові.'
      options:
        - text: 'Так, звичайно.'
          correct: true
        - text: 'Ні, ніколи.'
          correct: false
        - text: 'Що таке чайові?'
          correct: false
        - text: 'Я не знаю.'
          correct: false

