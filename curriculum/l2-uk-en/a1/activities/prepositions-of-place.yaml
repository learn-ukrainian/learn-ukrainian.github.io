- type: fill-in
  title: "Оберіть правильний прийменник простору"
  instruction: "Прочитайте речення та оберіть правильний варіант."
  items:
    - sentence: "Мій брат зараз працює _____."
      answer: "в офісі"
      options: ["в офісі", "на офісі", "в офісу", "на офісу"]
    - sentence: "Він довго був _____."
      answer: "у Києві"
      options: ["в Києві", "у Києві", "на Києві", "у Києву"]
    - sentence: "Нова книга лежить _____."
      answer: "на столі"
      options: ["в столі", "на столі", "на столу", "у столі"]
    - sentence: "Я часто купую продукти _____."
      answer: "в магазині"
      options: ["в магазині", "на магазині", "в магазину", "на магазину"]
    - sentence: "Студенти зараз активно працюють _____."
      answer: "на уроці"
      options: ["в уроці", "на уроці", "на уроку", "у уроці"]
    - sentence: "Ми зустрілися вчора ввечері _____."
      answer: "на виставі"
      options: ["в виставі", "на виставі", "на виставу", "у виставі"]
    - sentence: "Моя мама смачно готує _____."
      answer: "на кухні"
      options: ["в кухні", "на кухні", "на кухню", "у кухні"]
    - sentence: "Я відправляю важливий лист _____."
      answer: "на пошті"
      options: ["в пошті", "на пошті", "у пошті", "на пошту"]
    - sentence: "Мої батьки щасливо живуть _____."
      answer: "в Україні"
      options: ["на Україні", "в Україні", "в Україну", "на Україну"]
    - sentence: "Тепла зимова куртка лежить _____."
      answer: "у шафі"
      options: ["в шафі", "у шафі", "на шафі", "у шафу"]

- type: quiz
  title: "Перевірте знання граматичних правил"
  instruction: "Оберіть одну правильну відповідь на кожне запитання."
  items:
    - question: "Який прийменник ми використовуємо для закритого простору, наприклад кімнати?"
      explanation: "Для закритого внутрішнього простору ми використовуємо прийменники в або у."
      options:
        - text: "в або у"
          correct: true
        - text: "на"
          correct: false
        - text: "біля"
          correct: false
        - text: "між"
          correct: false
    - question: "Як правильно сказати про розташування на поверхні дерев'яного стола?"
      explanation: "Для поверхні ми використовуємо прийменник на і Місцевий відмінок."
      options:
        - text: "на столі"
          correct: true
        - text: "в столі"
          correct: false
        - text: "у столі"
          correct: false
        - text: "біля столу"
          correct: false
    - question: "Як традиційно правильно сказати про місце приготування смачної їжі?"
      explanation: "Історично склалося, що ми говоримо на кухні."
      options:
        - text: "на кухні"
          correct: true
        - text: "в кухні"
          correct: false
        - text: "у кухні"
          correct: false
        - text: "на кухню"
          correct: false
    - question: "Який прийменник потрібно обов'язково використовувати з назвою нашої держави?"
      explanation: "Ми завжди говоримо в Україні."
      options:
        - text: "в Україні"
          correct: true
        - text: "на Україні"
          correct: false
        - text: "у Україну"
          correct: false
        - text: "на Україну"
          correct: false
    - question: "Який граматичний відмінок ми обов'язково використовуємо після прийменника біля?"
      explanation: "Прийменник біля вимагає Родового відмінка."
      options:
        - text: "Родовий відмінок"
          correct: true
        - text: "Місцевий відмінок"
          correct: false
        - text: "Називний відмінок"
          correct: false
        - text: "Знахідний відмінок"
          correct: false
    - question: "Як дуже ввічливо і формально запитати про фізичне розташування на вулиці?"
      explanation: "Ввічлива форма використовує дієслово знаходитися."
      options:
        - text: "Де знаходиться...?"
          correct: true
        - text: "Де є...?"
          correct: false
        - text: "Де стоїть...?"
          correct: false
        - text: "Куди йти...?"
          correct: false
    - question: "Як ми говоримо про публічні події, наприклад, музичний концерт або шкільний урок?"
      explanation: "Для подій та активностей ми використовуємо прийменник на."
      options:
        - text: "на концерті"
          correct: true
        - text: "в концерті"
          correct: false
        - text: "у концерті"
          correct: false
        - text: "біля концерту"
          correct: false
    - question: "Як зміниться приголосний звук у слові рука в місцевому відмінку?"
      explanation: "Приголосний К змінюється на Ц: рука - у руці."
      options:
        - text: "у руці"
          correct: true
        - text: "у рукі"
          correct: false
        - text: "у рузі"
          correct: false
        - text: "у русі"
          correct: false

