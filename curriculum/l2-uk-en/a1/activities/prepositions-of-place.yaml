      answer: "близько"
      options: ["близько", "далеко", "навпроти", "між"]
    - sentence: "Національний банк знаходиться _____ з аптекою."
      answer: "поруч"
      options: ["поруч", "біля", "близько", "далеко"]
    - sentence: "Великий стіл стоїть рівно _____ школою і парком."
      answer: "між"
      options: ["між", "біля", "навпроти", "поруч"]
    - sentence: "Ми дуже часто гуляємо _____ великого парку."
      answer: "біля"
      options: ["біля", "близько", "далеко", "між"]
    - sentence: "Затишне кафе розташоване _____ автобусної зупинки."
      answer: "навпроти"
      options: ["навпроти", "далеко", "близько", "в"]

