      items: ["біля парку", "навпроти банку", "біля школи", "навпроти аптеки"]

- type: quiz
  title: "Милозвучність та зміна звуків"
  instruction: "Оберіть правильний варіант, що дотримується правил української мови."
  items:
    - question: "Який прийменник потрібно використати перед словом школа для милозвучності?"
      explanation: "Перед двома приголосними (шк) краще використовувати у."
      options:
        - text: "у"
          correct: true
        - text: "в"
          correct: false
        - text: "на"
          correct: false
        - text: "до"
          correct: false
    - question: "Який прийменник потрібно вибрати після дієслова працює перед словом магазині?"
      explanation: "Слово працює закінчується на голосну, тому використовуємо в."
      options:
        - text: "в"
          correct: true
        - text: "у"
          correct: false
        - text: "на"
          correct: false
        - text: "із"
          correct: false
    - question: "Як зміниться приголосний звук Г у слові нога в Місцевому відмінку?"
      explanation: "Звук Г змінюється на З: нога - на нозі."
      options:
        - text: "на нозі"
          correct: true
        - text: "на ногі"
          correct: false
        - text: "на ноці"
          correct: false
        - text: "на носі"
          correct: false
    - question: "Як правильно сказати про біль всередині вуха, використовуючи зміну приголосного Х?"
      explanation: "Звук Х змінюється на С: вухо - у вусі."
      options:
        - text: "у вусі"
          correct: true
        - text: "у вухі"
          correct: false
        - text: "у вуці"
          correct: false
        - text: "у вузі"
          correct: false
    - question: "Який варіант міста є правильним та милозвучним для української мови?"
      explanation: "Слово Львів починається з двох приголосних (Льв), тому використовуємо у."
      options:
        - text: "у Львові"
          correct: true
        - text: "в Львові"
          correct: false
        - text: "на Львові"
          correct: false
        - text: "у Львов"
          correct: false
    - question: "Який варіант гарантує гарну милозвучність після слова був?"
      explanation: "Слово був закінчується на приголосну, тому перед іншою приголосною беремо у."
      options:
        - text: "був у Києві"
          correct: true
        - text: "був в Києві"
          correct: false
        - text: "був на Києві"
          correct: false
        - text: "був у Київ"
          correct: false
    - question: "Як зміниться приголосний звук К у слові рука в Місцевому відмінку?"
      explanation: "Звук К змінюється на Ц: рука - у руці."
      options:
        - text: "у руці"
          correct: true
        - text: "у рукі"
          correct: false
        - text: "у рузі"
          correct: false
        - text: "у русі"
          correct: false
    - question: "Який прийменник краще використати перед словом, що починається на голосну, наприклад університеті?"
      explanation: "Перед голосними звуками ми зазвичай використовуємо в."
      options:
        - text: "в"
          correct: true
        - text: "у"
          correct: false
        - text: "на"
          correct: false
        - text: "від"
          correct: false

- type: fill-in
  title: "Відстань та простір"
  instruction: "Оберіть правильне слово для опису просторової орієнтації."
  items:
    - sentence: "Мій дім знаходиться _____ школи."
      answer: "біля"
      options: ["біля", "в", "на", "у"]
