- type: unjumble
  title: "Складіть правильні речення"
  instruction: "Поставте слова у правильному порядку, щоб утворити речення."
  items:
    - words: ["Моя", "сестра", "живе", "в", "Києві"]
      answer: "Моя сестра живе в Києві"
    - words: ["Велика", "книга", "лежить", "на", "столі"]
      answer: "Велика книга лежить на столі"
    - words: ["Ми", "дуже", "щасливо", "живемо", "в", "Україні"]
      answer: "Ми дуже щасливо живемо в Україні"
    - words: ["Студенти", "зараз", "активно", "працюють", "на", "уроці"]
      answer: "Студенти зараз активно працюють на уроці"
    - words: ["Я", "швидко", "купую", "марки", "на", "пошті"]
      answer: "Я швидко купую марки на пошті"
    - words: ["Мій", "дім", "знаходиться", "біля", "школи"]
      answer: "Мій дім знаходиться біля школи"
    - words: ["Сучасна", "аптека", "знаходиться", "навпроти", "банку"]
      answer: "Сучасна аптека знаходиться навпроти банку"
    - words: ["Де", "знаходиться", "найближча", "головна", "пошта"]
      answer: "Де знаходиться найближча головна пошта"

- type: group-sort
  title: "Розподіліть фрази за правилом"
  instruction: "Виберіть правильну групу для кожної фрази залежно від прийменника."
  groups:
