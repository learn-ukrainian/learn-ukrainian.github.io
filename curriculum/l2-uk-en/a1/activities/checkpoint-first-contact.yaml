    - брат
    - чоловік
    - син
    - друг
    - студент
  - label: моя (feminine)
    items:
    - мама
    - сестра
    - дружина
    - сім'я
    - лікарка
    - вчителька
  - label: моє (neuter)
    items:
    - ім'я
    - прізвище
  title: Sort the nouns into groups based on which possessive pronoun they use.
