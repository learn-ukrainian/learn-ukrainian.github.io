- type: quiz
  title: 'Ukrainian Foundations Quiz'
  instruction: 'Choose the correct answer for each question about Ukrainian grammar and vocabulary.'
  items:
    - question: 'What is the grammatical gender of the word "кава" (coffee)?'
      options:
        - text: masculine
          correct: false
        - text: feminine
          correct: true
        - text: neuter
          correct: false
        - text: plural
          correct: false
    - question: 'Which Ukrainian letter sounds like the "ee" in the English word "see"?'
      options:
        - text: и
          correct: false
        - text: і
          correct: true
        - text: е
          correct: false
        - text: а
          correct: false
    - question: 'How do you say "Please" in Ukrainian in a polite cafe setting?'
      options:
        - text: Дякую
          correct: false
        - text: Будь ласка
          correct: true
        - text: Перепрошую
          correct: false
        - text: Смачного
          correct: false
    - question: 'What is the "they" (вони) form ending for the verb "говорити"?'
      options:
        - text: -ють
          correct: false
        - text: -ять
          correct: true
        - text: -ать
          correct: false
        - text: -имо
          correct: false
    - question: 'Which word acts as the "subject" (підмет) in the sentence "Студент читає"?'
      options:
        - text: Студент
          correct: true
        - text: читає
          correct: false
        - text: текст
          correct: false
        - text: мову
          correct: false
    - question: 'How do you form a simple yes or no question in Ukrainian?'
      options:
        - text: Use a helper verb
          correct: false
        - text: Change word order
          correct: false
        - text: Use rising intonation
          correct: true
        - text: Add a suffix
          correct: false
    - question: 'What is the grammatical gender of the family word "тато" (dad)?'
      options:
        - text: masculine
          correct: true
        - text: feminine
          correct: false
        - text: neuter
          correct: false
        - text: common
          correct: false
    - question: 'Where is the negation particle "не" placed in a simple sentence?'
      options:
        - text: At the end
          correct: false
        - text: Directly before the verb
          correct: true
        - text: Directly after the verb
          correct: false
        - text: At the start
          correct: false
    - question: 'Which specific Ukrainian question word means "Where" in English?'
      options:
        - text: Що
          correct: false
        - text: Де
          correct: true
        - text: Коли
          correct: false
        - text: Хто
          correct: false
    - question: 'What is the English meaning of the Ukrainian phrase "Смачного!"?'
      options:
        - text: Thank you
          correct: false
        - text: Bon appetit
          correct: true
        - text: Excuse me
          correct: false
        - text: Good luck
          correct: false
    - question: 'Which letter sounds like the "h" in the word "help"?'
      options:
        - text: г
          correct: true
        - text: ґ
          correct: false
        - text: х
          correct: false
        - text: к
          correct: false
    - question: 'What is the "I" (я) form ending for the verb "читати"?'
      options:
        - text: -ю
          correct: true
        - text: -єш
          correct: false
        - text: -ємо
          correct: false
        - text: -ють
          correct: false

- type: match-up
  title: 'Connect Words to Genders'
  instruction: 'Match the Ukrainian word with its correct grammatical gender.'
  pairs:
    - left: 'кава'
      right: 'Feminine'
    - left: 'молоко'
      right: 'Neuter'
    - left: 'Київ'
      right: 'Masculine'
    - left: 'місто'
      right: 'Neuter'
    - left: 'Україна'
      right: 'Feminine'
    - left: 'тато'
      right: 'Masculine'
    - left: 'стіл'
      right: 'Masculine'
    - left: 'вода'
      right: 'Feminine'

- type: fill-in
  title: 'Complete the Sentences'
  instruction: 'Choose the correct form of the verb to complete the sentence.'
  items:
    - sentence: 'Я ... текст.'
      answer: 'читаю'
      options: ['читаю', 'читаєш', 'читає', 'читаємо']
    - sentence: 'Вони ... все.'
      answer: 'знають'
      options: ['знають', 'знаємо', 'знаєте', 'знає']
    - sentence: 'Ми ... повільно.'
      answer: 'говоримо'
      options: ['говоримо', 'говорить', 'говорю', 'говорять']
    - sentence: 'Ти ... відповідь?'
      answer: 'знаєш'
      options: ['знаєш', 'знаю', 'знає', 'знають']
    - sentence: 'Він ... лист.'
      answer: 'пише'
      options: ['пише', 'пишу', 'пишемо', 'пишуть']
    - sentence: 'Вона ... добре.'
      answer: 'говорить'
      options: ['говорить', 'говорю', 'говоримо', 'говорять']
    - sentence: 'Вони ... англійською.'
      answer: 'говорять'
      options: ['говорять', 'говорю', 'говоримо', 'говорить']
    - sentence: 'Я ... нове слово.'
      answer: 'знаю'
      options: ['знаю', 'знаєш', 'знає', 'знаємо']

