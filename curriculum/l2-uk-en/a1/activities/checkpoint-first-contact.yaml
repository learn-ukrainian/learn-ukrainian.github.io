workbook:
- id: group-sort-gender
  type: group-sort
  instruction: Sort the words by gender
  groups:
  - label: Masculine (мій, він)
    items:
    - тато
    - брат
    - інженер
    - студент
    - Богдан
    - Іван
  - label: Feminine (моя, вона)
    items:
    - мама
    - сестра
    - вчителька
    - студентка
    - Соломія
    - Анна
    - дружина
  title: Sort the words by gender
- id: true-false-review
  type: true-false
  instruction: Are these statements True or False?
  items:
  - statement: The phrase 'Мене звати' uses the accusative pronoun 'мене', meaning
      you are literally saying 'They call me'.
    correct: true
    explanation: In Ukrainian, you say 'They call me' instead of 'My name is'.
  - statement: The word 'Це' means 'This is' and is used to point things out.
    correct: true
    explanation: You use 'Це' plus a noun to introduce people or objects.
  - statement: The phrase 'У мене є' means 'I want'.
    correct: false
    explanation: It means 'I have'.
  - statement: The question 'Як тебе звати?' is the polite, formal way to ask someone's
      name.
    correct: false
    explanation: It is the informal way. The formal way is 'Як вас звати?'.
  - statement: The question 'Як вас звати?' is the formal way to ask someone's name.
    correct: true
    explanation: It uses the polite 'вас'.
  - statement: The name form 'Богдане' is in the Vocative case, which is used for
      direct address.
    correct: true
    explanation: The Vocative case is mandatory when addressing someone directly.
  - statement: Proper nouns like names and cities are not capitalized in Ukrainian.
    correct: false
    explanation: Names and places always start with a capital letter, just like in
      English.
  - statement: The pronoun 'мій' is used for feminine nouns.
    correct: false
    explanation: It is used for masculine nouns.
  - statement: The pronoun 'моя' is used for feminine nouns.
    correct: true
    explanation: It matches feminine nouns like 'мама' or 'дружина'.
  - statement: The apostrophe in Ukrainian softens the preceding consonant.
    correct: false
    explanation: The apostrophe acts as a hard stop and prevents softening.
  - statement: The soft sign (Ь) acts as a hard stop.
    correct: false
    explanation: The soft sign softens the preceding consonant.
  - statement: The question 'Звідки ти?' means 'Where are you from?'.
    correct: true
    explanation: It is a fixed chunk used to ask about someone's origin.
  title: Are these statements True or False?
