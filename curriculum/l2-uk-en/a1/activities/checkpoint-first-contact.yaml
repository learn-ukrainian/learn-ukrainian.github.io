- type: quiz
  title: Cafe Survival
  items:
    - question: How would you ask "Can I have...?" in a cafe?
      options:
        - text: 'Можна...?'
          correct: true
        - text: 'Я маю...?'
          correct: false
        - text: 'Хто це...?'
          correct: false
        - text: 'Де це...?'
          correct: false
