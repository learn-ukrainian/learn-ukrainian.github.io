version: '1.0'
module: checkpoint-first-contact
level: a1
inline:
- id: match-up
  type: match-up
  instruction: Match each question on the left with the correct answer on the right.
  pairs:
  - left: Як тебе звати?
    right: Мене звати Софія.
  - left: Звідки ти?
    right: Я з Львова.
  - left: У тебе є сім'я?
    right: Так, у мене є мама і тато.
  - left: Хто твій тато?
    right: Мій тато — інженер.
  - left: Як його звати?
    right: Його звати Тарас.
  - left: Хто вона?
    right: Вона — вчителька.
  - left: Це мама?
    right: Так, це мама.
  - left: Моя сім'я — велика?
    right: Ні, моя сім'я — невелика.
- id: fill-in
  type: fill-in
  instruction: Complete the self-introduction monologue by filling in each blank with
    the correct word.
  items:
  - sentence: ___ звати Олена.
    answer: Мене
    options:
    - Мене
    - Моя
    - Його
  - sentence: Я ___ Києва.
    answer: з
    options:
    - з
    - це
    - у
  - sentence: Я — ___.
    answer: студентка
    options:
    - студентка
    - студент
    - сім'я
  - sentence: ___ мама — лікарка.
    answer: Моя
    options:
    - Мій
    - Моя
    - Моє
  - sentence: ___ тато — інженер.
    answer: Мій
    options:
    - Мій
    - Моя
    - Моє
  - sentence: У мене ___ брат.
    answer: є
    options:
    - є
    - це
    - з
  - sentence: ___ звати Іван.
    answer: Його
    options:
    - Його
    - Її
    - Мене
  - sentence: Моя сім'я — ___.
    answer: велика
    options:
    - велика
    - великий
    - великe
- id: quiz
  type: quiz
  instruction: Choose the correct answer for each question. This quiz reviews sounds,
    letters, greetings, and family vocabulary from Modules 1–6.
  items:
  - question: How many letters are in the Ukrainian alphabet?
    options:
    - '26'
    - '32'
    - '33'
    - '36'
    correct: 2
  - question: How many sounds does Ukrainian have?
    options:
    - '33'
    - '36'
    - '38'
    - '42'
    correct: 2
  - question: What does the soft sign (ь) do in the word «день»?
    options:
    - It makes the vowel longer
    - It softens the preceding consonant
    - It adds an extra syllable
    - It changes the stress
    correct: 1
  - question: What does the apostrophe do in the word «сім'я»?
    options:
    - It separates the consonant from the following vowel
    - It softens the consonant
    - It marks the stressed syllable
    - It replaces a missing letter
    correct: 0
  - question: Which greeting is FORMAL?
    options:
    - Привіт!
    - Бувай!
    - Добрий день!
    - Як тебе звати?
    correct: 2
  - question: What does «Мене звати Оксана» mean?
    options:
    - I am from Oksana
    - My family is Oksana
    - My name is Oksana
    - This is Oksana
    correct: 2
  - question: Which possessive word goes with «тато» (father)?
    options:
    - моя
    - моє
    - мій
    correct: 2
  - question: Which possessive word goes with «ім'я» (name)?
    options:
    - мій
    - моя
    - моє
    correct: 2
  - question: How do you say 'I have a brother' in Ukrainian?
    options:
    - Це мій брат
    - Мій брат — студент
    - У мене є брат
    - Брат звати Тарас
    correct: 2
  - question: What replaces the verb 'is' in «Я — студент»?
    options:
    - The word «є»
    - A grammatical dash (—)
    - The word «це»
    - Nothing — the verb is simply omitted
    correct: 1
  - question: How do you ask 'Where are you from?' informally?
    options:
    - Як тебе звати?
    - Звідки ти?
    - У тебе є сім'я?
    - Хто ти?
    correct: 1
  - question: Which word means 'sister'?
    options:
    - брат
    - мама
    - сестра
    - тато
    correct: 2
workbook:
- type: match-up
  instruction: Match each Ukrainian word to its English meaning.
  pairs:
  - left: мама
    right: mother
  - left: тато
    right: father
  - left: брат
    right: brother
  - left: сестра
    right: sister
  - left: сім'я
    right: family
  - left: ім'я
    right: first name
  - left: прізвище
    right: surname
  - left: студент
    right: student
- type: group-sort
  instruction: 'Sort these words into the correct possessive category: мій (masculine),
    моя (feminine), or моє (neuter).'
  groups:
  - label: мій
    items:
    - тато
    - брат
    - день
  - label: моя
    items:
    - мама
    - сестра
    - сім'я
  - label: моє
    items:
    - ім'я
    - прізвище
- type: match-up
  instruction: Match each greeting or phrase with its appropriate response.
  pairs:
  - left: Привіт!
    right: Привіт!
  - left: Як тебе звати?
    right: Мене звати Андрій.
  - left: Звідки ти?
    right: Я з Києва.
  - left: До побачення!
    right: Бувай!
  - left: Дуже приємно!
    right: Дуже приємно!
- type: quiz
  instruction: Choose the correct Ukrainian sentence for each English meaning.
  items:
  - question: Which sentence means 'My mother is a doctor'?
    options:
    - Мій мама — лікарка.
    - Моя мама — лікарка.
    - Моє мама — лікарка.
    correct: 1
  - question: Which sentence means 'I am from Kyiv'?
    options:
    - Я — Київ.
    - Я є Київ.
    - Я з Києва.
    correct: 2
  - question: Which sentence means 'This is my brother'?
    options:
    - Це мій брат.
    - Це моя брат.
    - Це моє брат.
    correct: 0
  - question: Which sentence correctly uses «У мене є»?
    options:
    - У мене є студентка.
    - У мене є сестра.
    - У мене є звати.
    correct: 1
- type: true-false
  instruction: Read each statement about Ukrainian and decide if it is true or false.
  items:
  - statement: The Ukrainian alphabet has 33 letters.
    correct: true
    explanation: Correct — the Ukrainian alphabet (абетка) contains exactly 33 letters.
  - statement: In Ukrainian, you say «Я є студент» to mean 'I am a student.'
    correct: false
    explanation: 'Ukrainian uses a dash instead: «Я — студент». The verb «є» is not
      used in this pattern.'
  - statement: The soft sign (ь) in «сіль» makes the «л» sound soft.
    correct: true
    explanation: The soft sign softens the preceding consonant. In «сіль», the «л»
      becomes soft.
  - statement: «Моя» is used with masculine nouns like «тато».
    correct: false
    explanation: «Тато» is masculine, so it takes «мій». «Моя» is for feminine nouns
      like «мама».
  - statement: The apostrophe in «сім'я» separates the consonant from the vowel «я».
    correct: true
    explanation: The apostrophe prevents the consonant and vowel from blending, creating
      a hard stop before «я».
- type: quiz
  instruction: Identify the correct Ukrainian sound or letter fact.
  items:
  - question: Which letter does NOT exist in the Ukrainian alphabet?
    options:
    - Ґ
    - Ї
    - Ы
    - Є
    correct: 2
  - question: The word «Україна» — which syllable is stressed?
    options:
    - У-кра-ї-на (first)
    - У-кра-ї-на (second)
    - У-кра-ї-на (third)
    - У-кра-ї-на (fourth)
    correct: 2
  - question: In «Добрий день», which word contains a soft consonant?
    options:
    - Добрий
    - день
    correct: 1
