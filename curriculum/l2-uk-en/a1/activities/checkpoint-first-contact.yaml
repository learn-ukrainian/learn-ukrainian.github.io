- type: true-false
  title: 'Grammar Truths'
  instruction: 'Decide if the statement is true or false.'
  items:
    - statement: 'The Ukrainian alphabet has exactly 33 letters.'
      correct: true
    - statement: 'Feminine nouns usually end in the letter -о.'
      correct: false
    - statement: 'The word "тато" is feminine because of its ending.'
      correct: false
    - statement: 'The negation particle "не" goes after the verb.'
      correct: false
    - statement: 'Yes/no questions use rising intonation in Ukrainian.'
      correct: true
    - statement: 'First conjugation verbs often end in the suffix -ати.'
      correct: true
    - statement: 'The "they" form of the verb "говорити" is "говорять".'
      correct: true
    - statement: 'The subject (підмет) is the person doing the action.'
      correct: true
    - statement: 'The word "кава" is a masculine noun in Ukrainian.'
      correct: false
    - statement: 'Neuter nouns usually end in the letter -о or -е.'
      correct: true
    - statement: 'The question word "хто" is used to ask about people.'
      correct: true
    - statement: 'The particle "не" is placed directly before the verb.'
      correct: true

