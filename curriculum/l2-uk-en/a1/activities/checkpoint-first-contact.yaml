version: '1.0'
module: checkpoint-first-contact
level: a1
inline:
- id: quiz-comprehensive-review
  type: quiz
  instruction: Choose the correct option for each question
  items:
  - question: Which letter represents the soft 'H' sound in Ukrainian?
    options:
    - Ґ
    - И
    - Г
    - І
    correct: 2
  - question: Which letter represents the hard 'G' sound?
    options:
    - Г
    - И
    - І
    - Ґ
    correct: 3
  - question: Which letter represents the deep 'Y' sound?
    options:
    - И
    - І
    - Ь
    - Г
    correct: 0
  - question: Which letter represents the sharp 'I' sound?
    options:
    - И
    - Ґ
    - І
    - Ь
    correct: 2
  - question: What is the function of the apostrophe in Ukrainian?
    options:
    - It softens the preceding consonant.
    - It makes the vowel sound longer.
    - It acts as a hard stop and prevents the consonant from softening.
    - It makes the consonant silent.
    correct: 2
  - question: What is the function of the soft sign (Ь)?
    options:
    - It softens the preceding consonant.
    - It hardens the preceding consonant.
    - It makes a separate vowel sound.
    - It acts as a hard stop.
    correct: 0
  - question: How do you say 'Hi' informally in Ukrainian?
    options:
    - Мене звати
    - Привіт
    - Добрий день
    - Дуже приємно
    correct: 1
  - question: How do you say 'Good afternoon' formally?
    options:
    - Привіт
    - Я з України
    - Дуже приємно
    - Добрий день
    correct: 3
  - question: Which possessive pronoun goes with the masculine noun 'тато'?
    options:
    - моя
    - мій
    - мене
    - я
    correct: 1
  - question: Which possessive pronoun goes with the feminine noun 'мама'?
    options:
    - моя
    - мій
    - мене
    - я
    correct: 0
  - question: Which possessive pronoun goes with the feminine noun 'дружина'?
    options:
    - мій
    - мене
    - моя
    - я
    correct: 2
  - question: Which possessive pronoun goes with the masculine noun 'брат'?
    options:
    - я
    - моя
    - мене
    - мій
    correct: 3
  title: Choose the correct option for each question
- id: match-up-questions-answers
  type: match-up
  instruction: Match the questions and statements with their correct responses
  pairs:
  - left: Як тебе звати?
    right: Мене звати Анна.
  - left: Як вас звати?
    right: Мене звати Богдан.
  - left: А вас?
    right: Моє ім'я — Соломія.
  - left: Звідки ти?
    right: Я з України.
  - left: Звідки ви, Богдане?
    right: Я з Дніпра.
  - left: Звідки ви, Соломіє?
    right: Я з Тернополя.
  - left: Хто він?
    right: Він інженер.
  - left: Хто вона?
    right: Вона вчителька.
  - left: Що на фото?
    right: Це моя дружина.
  - left: Як звати маму?
    right: Її звати Олена.
  - left: Як звати тата?
    right: Його звати Іван.
  title: Match the questions and statements with their correct responses
