- type: true-false
  title: "Grammar Rules"
  instruction: "Are these statements true or false?"
  items:
    - statement: "The word тато is a masculine noun."
      correct: true
      explanation: "Even though it ends in -о, dad is a male person, making it masculine."
    - statement: "The letter И sounds exactly the same as the letter І."
      correct: false
      explanation: "They sound completely different. І is sharp, И is lower."
    - statement: "If a noun ends in -а or -я, it is usually feminine."
      correct: true
      explanation: "Words like мама and вулиця follow this rule."
    - statement: "The word місто is a feminine noun."
      correct: false
      explanation: "It ends in -о and refers to a thing, so it is neuter."
    - statement: "To ask What is this? we say Хто це?."
      correct: false
      explanation: "We say Що це? to ask about objects. Хто це? is for people."
    - statement: "To make a sentence negative, we put не before the word we are negating."
      correct: true
      explanation: 'For example: Ні, це не чорна кава.'
    - statement: "The phrase Смачного! means Bon appetit!."
      correct: true
      explanation: "It is an essential cultural phrase to show respect when eating."
    - statement: "Plural nouns often end in -и or -і."
      correct: true
      explanation: 'For example: столи, вулиці.'

- type: fill-in
  title: "Complete the Sentence"
  instruction: "Choose the correct word to complete the sentence."
  items:
    - sentence: "Це _____ кава."
      answer: "чорна"
      options:
        - "чорна"
        - "чорний"
        - "чорне"
        - "чорні"
    - sentence: "Це _____ стіл."
      answer: "новий"
      options:
        - "новий"
        - "нова"
        - "нове"
        - "нові"
    - sentence: "Це _____ місто."
      answer: "велике"
      options:
        - "велике"
        - "великий"
        - "велика"
        - "великі"
    - sentence: "Це _____ столи."
      answer: "нові"
      options:
        - "нові"
        - "новий"
        - "нова"
        - "нове"
    - sentence: "_____ це?"
      answer: "Хто"
      options:
        - "Хто"
        - "Що"
        - "Де"
        - "Так"
      explanation: "Use Хто for people."
    - sentence: "_____ кафе?"
      answer: "Де"
      options:
        - "Де"
        - "Хто"
        - "Що"
        - "Ні"
      explanation: "Use Де to ask about location."
    - sentence: "_____, це не чорна кава."
      answer: "Ні"
      options:
        - "Ні"
        - "Так"
        - "Що"
        - "Хто"
    - sentence: "Так, _____ велике місто."
      answer: "це"
      options:
        - "це"
        - "не"
        - "хто"
        - "що"

- type: unjumble
  title: "Sentence Building"
  instruction: "Put the words in the correct order."
  items:
    - words:
        - "Це"
        - "чорна"
        - "кава."
      answer: "Це чорна кава."
    - words:
        - "Де"
        - "мій"
        - "рахунок?"
      answer: "Де мій рахунок?"
    - words:
        - "Ні,"
        - "це"
        - "не"
        - "велике"
        - "місто."
      answer: "Ні, це не велике місто."
    - words:
        - "Так,"
        - "це"
        - "нова"
        - "вулиця."
      answer: "Так, це нова вулиця."
    - words:
        - "Хто"
        - "знає"
        - "відповідь?"
      answer: "Хто знає відповідь?"
    - words:
        - "Можна"
        - "мій"
        - "рахунок?"
      answer: "Можна мій рахунок?"

