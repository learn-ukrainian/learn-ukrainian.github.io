    - question: Which of these Ukrainian words starts with the sound [p]?
      options:
        - text: 'Парк'
          correct: true
        - text: 'Рік'
          correct: false
        - text: 'Ні'
          correct: false
        - text: 'Ви'
          correct: false
    - question: Which of these Ukrainian words starts with the sound [r]?
      options:
        - text: 'Ресторан'
