module: checkpoint-first-contact
level: a1
inline:
- id: quiz-comprehensive-review
  type: quiz
  instruction: Choose the correct answer based on what you have learned.
  items:
  - question: What is the fundamental difference in Ukrainian phonetics?
    options:
    - A звук (sound) you hear vs a літера (letter) you write.
    - A літера (letter) you hear vs a звук (sound) you write.
    - A звук is always a vowel, and a літера is a consonant.
    - They mean exactly the same thing.
    correct: 0
  - question: What is the function of the апостроф (apostrophe) in Ukrainian?
    options:
    - It acts as a hard boundary separating sounds.
    - It softens the preceding consonant.
    - It shows where the stress of the word falls.
    - It indicates a missing letter like in English.
    correct: 0
  - question: What does the м'який знак (soft sign) do?
    options:
    - It softens the preceding consonant and has no sound of its own.
    - It makes the preceding vowel longer.
    - It acts as a hard boundary.
    - It adds an extra 'y' sound to the word.
    correct: 0
  - question: What shapes the entire rhythm of a spoken Ukrainian word?
    options:
    - Наголос (stress)
    - Апостроф (apostrophe)
    - Склад (syllable)
    - Звук (sound)
    correct: 0
  - question: How do you say a basic formal greeting 'Good afternoon'?
    options:
    - Добрий день
    - Привіт
    - Навзаєм
    - Дуже приємно
    correct: 0
  - question: Which word means 'mother'?
    options:
    - мама
    - тато
    - сестра
    - дружина
    correct: 0
  - question: Which word means 'father'?
    options:
    - тато
    - брат
    - син
    - чоловік
    correct: 0
  - question: Which word means 'brother'?
    options:
    - брат
    - син
    - тато
    - чоловік
    correct: 0
  - question: Which word means 'sister'?
    options:
    - сестра
    - мама
    - дружина
    - вчителька
    correct: 0
  - question: Why is there a dash in 'Я — студент'?
    options:
    - It replaces the missing verb 'to be' in the present tense.
    - It means the speaker is pausing.
    - It shows possession.
    - It indicates a question.
    correct: 0
  - question: How do you correctly state your name in Ukrainian?
    options:
    - Мене звати Анна.
    - Моє ім'я є Анна.
    - Я є Анна.
    - Це моя Анна.
    correct: 0
  - question: Which case must be used when calling a friend directly?
    options:
    - Vocative case (changing the ending of their name).
    - Accusative case.
    - The base dictionary form.
    - Possessive form.
    correct: 0
  title: Choose the correct answer based on what you have learned.
- id: match-up-q-and-a
  type: match-up
  instruction: Match the questions with their logical answers.
  pairs:
  - left: Як тебе звати?
    right: Мене звати Тарас.
  - left: Звідки ти?
    right: Я з Києва.
  - left: А як Вас звати?
    right: Моє прізвище — Коваль.
  - left: А Ви звідки?
    right: Я з Тернополя.
  - left: Це Ваша дружина?
    right: Так, це моя дружина.
  - left: Хто це?
    right: Це моя сім'я.
  - left: Я — вчителька. А Ви?
    right: Я — інженер.
  - left: Рада знайомству!
    right: Навзаєм!
  title: Match the questions with their logical answers.
- id: fill-in-self-intro
  type: fill-in
  instruction: Complete the self-introduction monologue using the correct words.
  items:
  - sentence: ____! (Hi!)
    answer: Привіт
    options:
    - Привіт
    - Добрий день
    - Навзаєм
  - sentence: ____ звати Богдан.
    answer: Мене
    options:
    - Моє
    - Мене
    - Я
  - sentence: ____ прізвище — Коваль.
    answer: Моє
    options:
    - Мій
    - Моя
    - Моє
  - sentence: ____ з Дніпра.
    answer: Я
    options:
    - Ти
    - Я
    - Він
  - sentence: Я — ____. (teacher)
    answer: вчителька
    options:
    - вчителька
    - інженер
    - студент
  - sentence: Це ____ сім'я.
    answer: моя
    options:
    - мій
    - моя
    - моє
  - sentence: У ____ є син.
    answer: мене
    options:
    - тебе
    - мене
    - я
  - sentence: Дуже ____. (Very nice to meet you.)
    answer: приємно
    options:
    - приємно
    - навзаєм
    - звати
  title: Complete the self-introduction monologue using the correct words.
workbook:
- id: true-false-grammar
  type: true-false
  instruction: Is the statement about Ukrainian rules true or false?
  items:
  - statement: You must always capitalize proper nouns, including a person's first
      name and surname.
    correct: true
    explanation: Proper names are central to Ukrainian identity and require a capital
      letter.
  - statement: Ukrainian spelling is highly phonetic, meaning what you see is exactly
      what you hear.
    correct: true
    explanation: Trust the Cyrillic letters instead of English pronunciation rules.
  - statement: It is natural to use the verb 'to be' when saying 'I am a student'
      in the present tense.
    correct: false
    explanation: In Ukrainian, the present tense verb 'to be' is omitted. We say 'Я
      — студент'.
  - statement: When stating possession, we use 'У мене є' instead of a direct translation
      of 'I have'.
    correct: true
    explanation: '''У мене є'' means ''At me there is''.'
  - statement: Possessive pronouns like мій/моя do not need to agree with the grammatical
      gender of the noun.
    correct: false
    explanation: 'They must always agree: мій тато (masc.), моя мама (fem.), моє ім''я
      (neuter).'
  - statement: Ukrainian has a Vocative case used when directly addressing or calling
      someone.
    correct: true
    explanation: For example, Анна becomes Анно! and Тарас becomes Тарасе!
  title: Is the statement about Ukrainian rules true or false?
- id: group-sort-pronouns
  type: group-sort
  instruction: Sort the nouns into groups based on which possessive pronoun they use.
  groups:
  - label: мій (masculine)
