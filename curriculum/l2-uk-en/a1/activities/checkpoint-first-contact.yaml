      options:
        - text: '[ɛ]'
          correct: true
        - text: '[jɛ]'
          correct: false
        - text: '[i]'
          correct: false
        - text: '[a]'
          correct: false
    - question: Can you identify the correct sound for the letter 'Є'?
      options:
        - text: '[jɛ]'
          correct: true
        - text: '[ɛ]'
          correct: false
        - text: '[e]'
          correct: false
        - text: '[ji]'
