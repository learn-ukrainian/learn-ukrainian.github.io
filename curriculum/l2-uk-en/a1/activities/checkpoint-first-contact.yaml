  instruction: 'Choose the correct adjective form to complete each sentence. Think about the gender of the noun first!'
  items:
    - sentence: "Це ___ стіл."
      answer: "великий"
      options: ["великий", "велика", "велике", "великі"]
      explanation: '"Стіл" is masculine, so the adjective takes the masculine ending -ий.'
    - sentence: "Це ___ книга."
      answer: "нова"
      options: ["нова", "новий", "нове", "нові"]
      explanation: '"Книга" is feminine, so the adjective takes the feminine ending -а.'
    - sentence: "Це ___ місто."
      answer: "гарне"
      options: ["гарне", "гарний", "гарна", "гарні"]
      explanation: '"Місто" is neuter, so the adjective takes the neuter ending -е.'
    - sentence: "Це ___ кава."
      answer: "чорна"
      options: ["чорна", "чорний", "чорне", "чорні"]
      explanation: '"Кава" is feminine (ends in -а), so the adjective takes the feminine ending -а.'
    - sentence: "Це ___ торт."
      answer: "великий"
      options: ["великий", "велика", "велике", "великі"]
      explanation: '"Торт" is masculine (ends in a consonant), so the adjective takes the masculine ending -ий.'
    - sentence: "Це ___ кафе."
      answer: "нове"
      options: ["нове", "новий", "нова", "нові"]
      explanation: '"Кафе" is neuter (ends in -е), so the adjective takes the neuter ending -е.'

- type: group-sort
  title: 'Sort Nouns by Gender'
  instruction: 'Sort these nouns into the correct gender group. Remember the ending rules — and the exception for people!'
  groups:
    - name: "Masculine"
      items: ["стіл", "кіт", "дім", "торт", "светр", "тато"]
    - name: "Feminine"
      items: ["книга", "кава", "сукня", "мама"]
