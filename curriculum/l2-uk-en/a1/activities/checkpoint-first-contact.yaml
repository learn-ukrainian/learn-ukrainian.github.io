      items: ["місто", "кафе"]

- type: unjumble
  title: 'Put the Words in Order'
  instruction: 'Arrange the words to form a correct Ukrainian sentence using the Це + adjective + noun pattern.'
  items:
    - words: ["кава", "Це", "чорна"]
      answer: "Це чорна кава."
    - words: ["стіл", "великий", "Це"]
      answer: "Це великий стіл."
    - words: ["місто", "нове", "Це"]
      answer: "Це нове місто."
    - words: ["кіт", "маленький", "Це"]
      answer: "Це маленький кіт."
    - words: ["сукня", "Це", "червона"]
      answer: "Це червона сукня."
    - words: ["кафе?", "Де"]
      answer: "Де кафе?"

- type: true-false
  title: 'True or False? Gender and Agreement Rules'
  instruction: 'Decide whether each statement about Ukrainian grammar is true or false.'
  items:
    - statement: 'The word "стіл" is masculine because it ends in a consonant.'
      correct: true
      explanation: 'Correct! Nouns ending in a consonant are typically masculine.'
    - statement: 'The word "тато" is neuter because it ends in -о.'
      correct: false
      explanation: 'False! "Тато" refers to a male person (dad), so it is masculine. Biological gender overrides the ending rule.'
    - statement: 'The correct phrase for "new book" is "нова книга".'
      correct: true
      explanation: 'Correct! "Книга" is feminine, so the adjective takes the feminine ending: "нова".'
    - statement: 'The plural of "стіл" is "стіли".'
      correct: false
      explanation: 'False! The plural of "стіл" is "столи" — the internal vowel і shifts to о when the word becomes longer.'
    - statement: 'The phrase "великий кава" uses correct adjective agreement.'
      correct: false
      explanation: 'False! "Кава" is feminine, so the adjective should be "велика кава", not "великий кава".'
    - statement: 'The phrase "Смачного!" is said before a meal in Ukraine.'
      correct: true
      explanation: 'Correct! "Смачного!" means "Bon appetit!" and is an essential dining phrase in Ukrainian culture.'
    - statement: 'The word "штани" (pants) is always plural, just like in English.'
      correct: true
      explanation: 'Correct! "Штани" has no singular form, so adjectives modifying it use the plural ending -і: "сині штани".'
    - statement: 'The question word "де" is used to ask about a person.'
      correct: false
      explanation: 'False! "Де" means "where" and asks about a place. To ask about a person, use "хто" (who).'