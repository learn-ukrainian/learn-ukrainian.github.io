      correct: true
  - source: my phone
    options:
    - text: мій телефон
      correct: true
    - text: моя телефон
      correct: false
    - text: моє телефон
      correct: false
  - source: my room
    options:
    - text: мій кімната
      correct: false
    - text: моя кімната
      correct: true
    - text: моє кімната
      correct: false
  - source: my bed
    options:
    - text: мій ліжко
      correct: false
    - text: моя ліжко
      correct: false
    - text: моє ліжко
      correct: true
  - source: my key
    options:
    - text: мій ключ
      correct: true
    - text: моя ключ
      correct: false
    - text: моє ключ
      correct: false
  - source: my lamp
    options:
    - text: мій лампа
      correct: false
    - text: моя лампа
      correct: true
    - text: моє лампа
      correct: false
- type: observe
  examples:
  - стіл → він → мій стіл (ends in consonant л)
  - книга → вона → моя книга (ends in -а)
  - вікно → воно → моє вікно (ends in -о)
  - телефон → він → мій телефон (ends in consonant н)
  - лампа → вона → моя лампа (ends in -а)
  - ліжко → воно → моє ліжко (ends in -о)
  prompt: What pattern connects the noun ending to the possessive form? Can you predict
    the possessive for a new noun just by looking at its ending?
