  instruction: Match each noun to its possessive pronoun — **мій**, **моя**, or **моє**.
  pairs:
  - left: стілець
    right: мій
  - left: кімната
    right: моя
  - left: дзеркало
    right: моє
  - left: ключ
    right: мій
  - left: стіна
    right: моя
  - left: фото
    right: моє
- type: fill-in
  instruction: Complete each sentence with **мій**, **моя**, or **моє**.
  items:
  - sentence: Ось ___ кімната.
    answer: моя
    options:
    - мій
    - моя
    - моє
  - sentence: ___ стілець зручний.
    answer: Мій
    options:
    - Мій
    - Моя
    - Моє
  - sentence: ___ дзеркало кругле.
    answer: Моє
    options:
    - Мій
    - Моя
    - Моє
  - sentence: ___ ключ маленький.
    answer: Мій
    options:
    - Мій
    - Моя
