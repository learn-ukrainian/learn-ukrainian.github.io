- id: quiz-gender-by-ending
  type: quiz
  instruction: Look at the ending of each noun. What gender is it?
  items:
  - question: Парта (desk) ends in -а. What gender?
    options:
    - чоловічий рід
    - жіночий рід
    - середній рід
    correct: 1
  - question: Олівець (pencil) ends in a consonant. What gender?
    options:
    - чоловічий рід
    - жіночий рід
    - середній рід
    correct: 0
  - question: Місто (city) ends in -о. What gender?
    options:
    - чоловічий рід
    - жіночий рід
    - середній рід
    correct: 2
  - question: Школа (school) ends in -а. What gender?
    options:
    - чоловічий рід
    - жіночий рід
    - середній рід
    correct: 1
  - question: Рюкзак (backpack) ends in a consonant. What gender?
    options:
    - чоловічий рід
    - жіночий рід
    - середній рід
    correct: 0
  - question: Море (sea) ends in -е. What gender?
    options:
    - чоловічий рід
    - жіночий рід
    - середній рід
    correct: 2
workbook:
