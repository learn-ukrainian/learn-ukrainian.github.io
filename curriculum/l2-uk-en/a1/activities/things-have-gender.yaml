- id: group-sort-gender
  type: group-sort
  instruction: 'Sort these nouns into three gender groups: **чоловічий рід**, **жіночий
    рід**, **середній рід**.'
  groups:
  - label: Чоловічий рід (він)
    items:
    - стіл
    - телефон
    - зошит
    - ключ
  - label: Жіночий рід (вона)
    items:
    - книга
    - сумка
    - ручка
    - кімната
  - label: Середній рід (воно)
    items:
    - вікно
    - ліжко
    - крісло
    - фото
- id: fill-in-possessives
  type: fill-in
  instruction: Fill in the correct possessive — **мій**, **моя**, or **моє**.
  items:
  - sentence: ___ книга цікава.
    answer: Моя
    options:
    - Мій
    - Моя
    - Моє
  - sentence: ___ стіл великий.
    answer: Мій
    options:
    - Мій
    - Моя
    - Моє
  - sentence: ___ вікно велике.
    answer: Моє
    options:
    - Мій
    - Моя
    - Моє
  - sentence: ___ телефон новий.
    answer: Мій
    options:
    - Мій
    - Моя
    - Моє
  - sentence: ___ лампа яскрава.
    answer: Моя
    options:
    - Мій
    - Моя
    - Моє
  - sentence: ___ ліжко зручне.
    answer: Моє
