- id: odd-one-out-gender
  type: odd-one-out
  instruction: Find the odd word out by gender
  items:
  - words:
    - стіл
    - телефон
    - книга
    correct: 2
    explanation: Книга — вона (жіночий рід). Стіл і телефон — він (чоловічий рід).
  - words:
    - лампа
    - вікно
    - сумка
    correct: 1
    explanation: Вікно — воно (середній рід). Лампа і сумка — вона (жіночий рід).
  - words:
    - ліжко
    - дзеркало
    - ручка
    correct: 2
    explanation: Ручка — вона (жіночий рід). Ліжко і дзеркало — воно (середній рід).
  - words:
    - комп'ютер
    - кімната
    - стілець
    correct: 1
    explanation: Кімната — вона (жіночий рід). Комп'ютер і стілець — він (чоловічий
      рід).
  - words:
    - фото
    - зошит
    - ключ
    correct: 0
    explanation: Фото — воно (середній рід). Зошит і ключ — він (чоловічий рід).
  - words:
    - стіна
    - ручка
    - стіл
    correct: 2
    explanation: Стіл — він (чоловічий рід). Стіна і ручка — вона (жіночий рід).
