workbook:
- id: match-up-pronouns
  type: match-up
  instruction: Match each noun to its correct pronoun.
  pairs:
  - left: зошит
    right: він
  - left: черепаха
    right: вона
  - left: фото
    right: воно
  - left: ключ
    right: він
  - left: лампа
    right: вона
  - left: місто
    right: воно
- id: true-false-gender
  type: true-false
  instruction: '**Правда чи ні?** (True or False?)'
  items:
  - statement: The word **стіл** is masculine (**він**).
    correct: true
    explanation: '**Стіл** ends in a consonant.'
  - statement: The word **книга** is neuter (**воно**).
    correct: false
    explanation: '**Книга** ends in **-а**, making it feminine (**вона**).'
  - statement: The word **вікно** is neuter (**воно**).
    correct: true
    explanation: '**Вікно** ends in **-о**.'
  - statement: If a word ends in **-а**, it is masculine.
    correct: false
    explanation: Words ending in **-а** or **-я** are typically feminine.
  - statement: If a word ends in **-о**, it is neuter.
    correct: true
    explanation: For example, **вікно** and **ліжко**.
  - statement: The word **телефон** is feminine (**вона**).
    correct: false
    explanation: '**Телефон** ends in a consonant, making it masculine.'
- id: error-correction-possessives
  type: error-correction
  instruction: Find and fix the wrong word.
  items:
  - sentence: Це мій кімната.
    error: мій
    correction: моя
    error_type: word
    options:
    - моя
    - моє
    - мою
    explanation: '**Кімната** is feminine, so use **моя**.'
  - sentence: У мене є моє телефон.
    error: моє
    correction: мій
    error_type: word
    options:
    - мій
    - моя
    - мої
    explanation: '**Телефон** is masculine, so use **мій**.'
  - sentence: Там моя ліжко.
    error: моя
    correction: моє
    error_type: word
    options:
    - мій
    - моє
    - мої
    explanation: '**Ліжко** is neuter, so use **моє**.'
  - sentence: Це моє книга.
    error: моє
    correction: моя
    error_type: word
    options:
    - мій
    - моя
    - мої
    explanation: '**Книга** is feminine, so use **моя**.'
  - sentence: Тут моя стіл.
    error: моя
    correction: мій
    error_type: word
    options:
    - мій
    - моє
    - мої
    explanation: '**Стіл** is masculine, so use **мій**.'
  - sentence: У мене є мій дзеркало.
    error: мій
    correction: моє
    error_type: word
    options:
    - моя
    - моє
    - мої
    explanation: '**Дзеркало** is neuter, so use **моє**.'
- id: odd-one-out-gender
  type: odd-one-out
  instruction: Find the odd one out based on its **рід** (gender).
  items:
  - words:
    - стіл
    - телефон
    - лампа
    correct: 2
    explanation: Лампа is feminine (вона), the others are masculine (він).
  - words:
    - книга
    - кімната
    - зошит
    correct: 2
    explanation: Зошит is masculine (він), the others are feminine (вона).
  - words:
    - вікно
    - стілець
    - ліжко
    correct: 1
    explanation: Стілець is masculine (він), the others are neuter (воно).
  - words:
    - ручка
    - комп'ютер
    - сумка
    correct: 1
    explanation: Комп'ютер is masculine (він), the others are feminine (вона).
  - words:
    - кошеня
    - дзеркало
    - ключ
    correct: 2
    explanation: Ключ is masculine (він), the others are neuter (воно).
  - words:
    - кіт
    - черепаха
    - кошик
    correct: 1
    explanation: Черепаха is feminine (вона), the others are masculine (він).
