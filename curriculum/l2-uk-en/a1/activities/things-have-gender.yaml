- id: quiz-gender-endings
  type: quiz
  instruction: What gender is it? Look at the ending
  items:
  - question: стіл (ends in a consonant)
    options:
    - Чоловічий (він)
    - Жіночий (вона)
    - Середній (воно)
    - Множина (вони)
    correct: 0
  - question: лампа (ends in -а)
    options:
    - Чоловічий (він)
    - Жіночий (вона)
    - Середній (воно)
    - Множина (вони)
    correct: 1
  - question: дзеркало (ends in -о)
    options:
    - Чоловічий (він)
    - Жіночий (вона)
    - Середній (воно)
    - Множина (вони)
    correct: 2
  - question: зошит (ends in a consonant)
    options:
    - Чоловічий (він)
    - Жіночий (вона)
    - Середній (воно)
    - Множина (вони)
    correct: 0
  - question: кімната (ends in -а)
    options:
    - Чоловічий (він)
    - Жіночий (вона)
    - Середній (воно)
    - Множина (вони)
    correct: 1
  - question: ліжко (ends in -о)
    options:
    - Чоловічий (він)
    - Жіночий (вона)
    - Середній (воно)
    - Множина (вони)
    correct: 2
workbook:
- id: match-up-gender
  type: match-up
  instruction: Match the word with the correct pronoun (**він, вона, воно**)
  pairs:
  - left: зошит
    right: він
  - left: кімната
    right: вона
  - left: ліжко
    right: воно
  - left: ключ
    right: він
  - left: лампа
    right: вона
  - left: дзеркало
    right: воно
- id: true-false-gender
  type: true-false
  instruction: True or false? (**Правда чи ні?**)
  items:
  - statement: Слово «стіл» — це жіночий рід.
    correct: false
    explanation: Стіл закінчується на приголосний, це чоловічий рід.
  - statement: Слово «книга» — це жіночий рід, тому що закінчується на -а.
    correct: true
    explanation: Слова на -а зазвичай жіночого роду.
  - statement: Слово «вікно» — це середній рід, тому що закінчується на -о.
    correct: true
    explanation: Слова на -о зазвичай середнього роду.
  - statement: Правильно говорити «моя телефон».
    correct: false
    explanation: Телефон — це чоловічий рід (він), тому правильно «мій телефон».
  - statement: Слово «ліжко» — це середній рід.
    correct: true
    explanation: Ліжко закінчується на -о, це середній рід.
  - statement: Правильно говорити «моя сумка».
    correct: true
    explanation: Сумка — це жіночий рід, тому «моя» — це правильно.
