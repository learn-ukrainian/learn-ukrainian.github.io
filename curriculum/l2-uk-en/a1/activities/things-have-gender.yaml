version: '1.0'
module: things-have-gender
level: a1
inline:
- id: quiz-vin-vona-vono
  type: quiz
  instruction: Is this noun **він** (masculine), **вона** (feminine), or **воно**
    (neuter)?
  items:
  - question: стіл (table)
    options:
    - він
    - вона
    - воно
    correct: 0
  - question: книжка (book)
    options:
    - він
    - вона
    - воно
    correct: 1
  - question: вікно (window)
    options:
    - він
    - вона
    - воно
    correct: 2
  - question: телефон (phone)
    options:
    - він
    - вона
    - воно
    correct: 0
  - question: лампа (lamp)
    options:
    - він
    - вона
    - воно
    correct: 1
  - question: ліжко (bed)
    options:
    - він
    - вона
    - воно
    correct: 2
  - question: ключ (key)
    options:
    - він
    - вона
    - воно
    correct: 0
  - question: сумка (bag)
    options:
    - він
    - вона
    - воно
    correct: 1
- id: group-sort-gender
  type: group-sort
  instruction: Sort all the nouns into the three gender groups — **він**, **вона**,
    or **воно**.
  groups:
  - label: він (чоловічий рід)
    items:
    - стіл
    - стілець
    - телефон
    - комп'ютер
    - зошит
    - ключ
  - label: вона (жіночий рід)
    items:
    - книжка
    - лампа
    - сумка
    - ручка
    - кімната
    - стіна
  - label: воно (середній рід)
    items:
    - вікно
    - ліжко
    - крісло
    - дзеркало
    - фото
- id: fill-in-possessive
  type: fill-in
  instruction: Fill in **мій**, **моя**, or **моє** to match the noun's gender.
  items:
  - sentence: Це ___ стіл.
    answer: мій
    options:
    - мій
    - моя
    - моє
  - sentence: Це ___ книжка.
    answer: моя
    options:
    - мій
    - моя
    - моє
  - sentence: Це ___ вікно.
    answer: моє
    options:
    - мій
    - моя
    - моє
  - sentence: Де ___ телефон?
    answer: мій
    options:
    - мій
    - моя
    - моє
  - sentence: Це ___ кімната.
    answer: моя
    options:
    - мій
    - моя
    - моє
  - sentence: Де ___ ліжко?
    answer: моє
    options:
    - мій
    - моя
    - моє
  - sentence: Це ___ ручка.
    answer: моя
    options:
    - мій
    - моя
    - моє
  - sentence: Де ___ ключ?
    answer: мій
    options:
    - мій
    - моя
    - моє
- id: quiz-gender-by-ending
  type: quiz
  instruction: Look at the ending of each noun. What gender is it — **чоловічий**,
    **жіночий**, or **середній**?
  items:
  - question: телефон (ends in -н)
    options:
    - чоловічий
    - жіночий
    - середній
    correct: 0
  - question: сумка (ends in -а)
    options:
    - чоловічий
    - жіночий
    - середній
    correct: 1
  - question: крісло (ends in -о)
    options:
    - чоловічий
    - жіночий
    - середній
    correct: 2
  - question: зошит (ends in -т)
    options:
    - чоловічий
    - жіночий
    - середній
    correct: 0
  - question: стіна (ends in -а)
    options:
    - чоловічий
    - жіночий
    - середній
    correct: 1
  - question: дзеркало (ends in -о)
    options:
    - чоловічий
    - жіночий
    - середній
    correct: 2
workbook:
- type: match-up
  instruction: Match each noun to the correct pronoun — **він**, **вона**, or **воно**.
  pairs:
  - left: стіл
    right: він
  - left: кімната
    right: вона
  - left: вікно
    right: воно
  - left: ключ
    right: він
  - left: ручка
    right: вона
  - left: фото
    right: воно
  - left: стілець
    right: він
  - left: стіна
    right: вона
  - left: крісло
    right: воно
- type: true-false
  instruction: True or false? Is the gender pronoun correct for the noun?
  items:
  - statement: Стіл — це він.
    correct: true
    explanation: Стіл ends in a consonant (-л) → чоловічий рід → він. ✓
  - statement: Книжка — це він.
    correct: false
    explanation: Книжка ends in -а → жіночий рід → вона, not він.
  - statement: Вікно — це воно.
    correct: true
    explanation: Вікно ends in -о → середній рід → воно. ✓
  - statement: Лампа — це вона.
    correct: true
    explanation: Лампа ends in -а → жіночий рід → вона. ✓
  - statement: Крісло — це він.
    correct: false
    explanation: Крісло ends in -о → середній рід → воно, not він.
  - statement: Телефон — це вона.
    correct: false
    explanation: Телефон ends in a consonant (-н) → чоловічий рід → він, not вона.
  - statement: Ключ — це він.
    correct: true
    explanation: Ключ ends in a consonant (-ч) → чоловічий рід → він. ✓
  - statement: Дзеркало — це воно.
    correct: true
    explanation: Дзеркало ends in -о → середній рід → воно. ✓
- type: error-correction
  instruction: Each sentence uses the wrong possessive. Find the error and choose
    the correct word.
  items:
  - sentence: Це мій книжка.
    error: мій
    correction: моя
    error_type: word
    options:
    - мій
    - моя
    - моє
    explanation: Книжка is feminine (ends in -а) → моя книжка.
  - sentence: Це моя стіл.
    error: моя
    correction: мій
    error_type: word
    options:
    - мій
    - моя
    - моє
    explanation: Стіл is masculine (ends in consonant) → мій стіл.
  - sentence: Де мій вікно?
    error: мій
    correction: моє
    error_type: word
    options:
    - мій
    - моя
    - моє
    explanation: Вікно is neuter (ends in -о) → моє вікно.
  - sentence: Це моє лампа.
    error: моє
    correction: моя
    error_type: word
    options:
    - мій
    - моя
    - моє
    explanation: Лампа is feminine (ends in -а) → моя лампа.
  - sentence: Це моя телефон.
    error: моя
    correction: мій
    error_type: word
    options:
    - мій
    - моя
    - моє
    explanation: Телефон is masculine (ends in consonant) → мій телефон.
  - sentence: Де мій крісло?
    error: мій
    correction: моє
    error_type: word
    options:
    - мій
    - моя
    - моє
    explanation: Крісло is neuter (ends in -о) → моє крісло.
  - sentence: Це моя зошит.
    error: моя
    correction: мій
    error_type: word
    options:
    - мій
    - моя
    - моє
    explanation: Зошит is masculine (ends in consonant) → мій зошит.
- type: translate
  instruction: Choose the correct Ukrainian translation.
  items:
  - source: This is my table.
    options:
    - text: Це мій стіл.
      correct: true
    - text: Це моя стіл.
      correct: false
    - text: Це моє стіл.
      correct: false
  - source: This is my book.
    options:
    - text: Це мій книжка.
      correct: false
    - text: Це моя книжка.
      correct: true
    - text: Це моє книжка.
      correct: false
  - source: This is my window.
    options:
    - text: Це мій вікно.
      correct: false
    - text: Це моя вікно.
      correct: false
    - text: Це моє вікно.
      correct: true
  - source: Where is my phone?
    options:
    - text: Де мій телефон?
      correct: true
    - text: Де моя телефон?
      correct: false
    - text: Де моє телефон?
      correct: false
  - source: This is my bag.
    options:
    - text: Це мій сумка.
      correct: false
    - text: Це моя сумка.
      correct: true
    - text: Це моє сумка.
      correct: false
  - source: Where is my mirror?
    options:
    - text: Де мій дзеркало?
      correct: false
    - text: Де моя дзеркало?
      correct: false
    - text: Де моє дзеркало?
      correct: true
- type: observe
  examples:
  - стіл → він → мій стіл
  - стілець → він → мій стілець
  - зошит → він → мій зошит
  - ключ → він → мій ключ
  - книжка → вона → моя книжка
  - лампа → вона → моя лампа
  - ручка → вона → моя ручка
  - сумка → вона → моя сумка
  - вікно → воно → моє вікно
  - ліжко → воно → моє ліжко
  - крісло → воно → моє крісло
  - дзеркало → воно → моє дзеркало
  prompt: Every masculine noun ends in a consonant (стіл ends in -л, ключ in -ч, зошит
    in -т). Every feminine noun ends in -а (книжка, лампа, ручка). Every neuter noun
    ends in -о (вікно, ліжко, крісло). The ending tells you the gender — and the gender
    tells you whether to use мій, моя, or моє.
