- type: true-false
  instruction: True or false? Decide whether the possessive matches the noun.
  items:
  - statement: Мій книга
    correct: false
    explanation: Книга ends in -а, so it is жіночий рід (feminine). The correct form
      is «моя книга».
  - statement: Моє вікно
    correct: true
    explanation: Вікно ends in -о, so it is середній рід (neuter). «Моє» is correct.
  - statement: Моя телефон
    correct: false
    explanation: Телефон ends in a consonant, so it is чоловічий рід (masculine).
      The correct form is «мій телефон».
  - statement: Мій стілець
    correct: true
    explanation: Стілець ends in a consonant, so it is чоловічий рід (masculine).
      «Мій» is correct.
  - statement: Моє лампа
    correct: false
    explanation: Лампа ends in -а, so it is жіночий рід (feminine). The correct form
      is «моя лампа».
  - statement: Моя ручка
    correct: true
    explanation: Ручка ends in -а, so it is жіночий рід (feminine). «Моя» is correct.
- type: error-correction
  instruction: Find and fix the wrong possessive in each sentence.
  items:
  - sentence: Моє стіл великий.
    error: Моє
    correction: Мій
    error_type: word
    options:
    - Мій
    - Моя
    - Моє
    explanation: Стіл ends in a consonant — чоловічий рід. Use «мій».
  - sentence: Мій кімната тепла.
    error: Мій
    correction: Моя
    error_type: word
    options:
    - Мій
    - Моя
    - Моє
    explanation: Кімната ends in -а — жіночий рід. Use «моя».
  - sentence: Моя ліжко зручне.
    error: Моя
    correction: Моє
    error_type: word
    options:
    - Мій
    - Моя
    - Моє
    explanation: Ліжко ends in -о — середній рід. Use «моє».
  - sentence: Моє ключ маленький.
    error: Моє
    correction: Мій
    error_type: word
    options:
    - Мій
    - Моя
    - Моє
    explanation: Ключ ends in a consonant — чоловічий рід. Use «мій».
