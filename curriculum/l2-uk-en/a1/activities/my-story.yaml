version: '1.0'
module: my-story
level: a1
inline:
- id: matching-tense
  type: match-up
  instruction: З'єднайте дієслово з часом (Match the verb with the tense)
  pairs:
  - left: народився
    right: Минулий час (Past)
  - left: переїхала
    right: Минулий час (Past)
  - left: живу
    right: Теперішній час (Present)
  - left: працюю
    right: Теперішній час (Present)
  - left: буду подорожувати
    right: Майбутній час (Future)
  - left: будемо вчитися
    right: Майбутній час (Future)
- id: fill-in-signal-words
  type: fill-in
  instruction: Вставте правильне дієслово (Fill in the correct verb)
  items:
  - sentence: Раніше я ____ в Канаді.
    answer: жив
    options:
    - жив
    - живу
    - буду жити
  - sentence: Зараз я ____ в університеті.
    answer: працюю
    options:
    - працюю
    - працював
    - буду працювати
  - sentence: Далі я ____ українську мову.
    answer: буду вивчати
    options:
    - буду вивчати
    - вивчав
    - вивчаю
  - sentence: У дитинстві вона ____ читати.
    answer: любила
    options:
    - любила
    - любить
    - буде любити
  - sentence: Сьогодні ми ____ в Україні.
    answer: живемо
    options:
    - живемо
    - жили
    - будемо жити
  - sentence: Далі ми ____ говорити про це.
    answer: будемо
    options:
    - будемо
    - були
    - є
- id: fill-in-biography
  type: fill-in
  instruction: Доповніть історію (Complete the story)
  items:
  - sentence: Я ____ у Львові.
    answer: народилася
    options:
    - народилася
    - народився
    - народилися
  - sentence: Там я ____ в школі.
    answer: вчилася
    options:
    - вчилася
    - вчився
    - вчилися
  - sentence: Потім я ____ в Київ.
    answer: переїхала
    options:
    - переїхала
    - переїхав
    - переїде
  - sentence: Тут я ____ університет.
    answer: закінчила
    options:
    - закінчила
    - закінчив
    - буду закінчувати
  - sentence: Зараз я ____ вчителькою.
    answer: працюю
    options:
    - працюю
    - працювала
    - буду працювати
  - sentence: Наступного року я ____.
    answer: буду подорожувати
    options:
    - буду подорожувати
    - подорожувала
    - подорожую
workbook:
- id: wb-group-sort-tenses
  type: group-sort
  instruction: Розподіліть дієслова за часом (Sort the verbs by tense)
  groups:
  - label: Минулий час (Past)
    items:
    - жив
    - народилася
    - вчився
    - переїхала
  - label: Теперішній час (Present)
    items:
    - живу
    - працюю
    - люблю
    - читає
  - label: Майбутній час (Future)
    items:
    - буду жити
    - буду працювати
    - будемо вчити
    - буде подорожувати
- id: wb-unjumble-sentences
  type: unjumble
  instruction: Складіть правильне речення (Make a correct sentence)
  items:
  - words:
    - в
    - Я
    - народився
    - місті.
    correct_order:
    - Я
    - народився
    - в
    - місті.
  - words:
    - живу
    - я
    - Зараз
    - Києві.
    - в
    correct_order:
    - Зараз
    - я
    - живу
    - в
    - Києві.
  - words:
    - буду
    - Далі
    - я
    - подорожувати.
    correct_order:
    - Далі
    - я
    - буду
    - подорожувати.
  - words:
    - в
    - Він
    - працює
    - лікарні.
    correct_order:
    - Він
    - працює
    - в
    - лікарні.
  - words:
    - вчилася
    - в
    - Вона
    - школі.
    correct_order:
    - Вона
    - вчилася
    - в
    - школі.
  - words:
    - будемо
    - українську
    - Ми
    - вчити
    - мову.
    correct_order:
    - Ми
    - будемо
    - вчити
    - українську
    - мову.
- id: wb-anagram-vocab
  type: anagram
  instruction: Складіть слово з літер (Make a word from the letters)
  items:
  - letters:
    - у
    - с
    - п
    - і
    - х
    answer: успіх
    hint: success
  - letters:
    - м
    - р
    - і
    - я
    answer: мрія
    hint: dream
  - letters:
    - з
    - а
    - р
    - а
    - з
    answer: зараз
    hint: now
  - letters:
    - д
    - а
    - л
    - і
    answer: далі
    hint: next/further
  - letters:
    - ж
    - и
    - т
    - и
    answer: жити
    hint: to live
  - letters:
    - в
    - ч
    - и
    - т
    - и
    answer: вчити
    hint: to study/learn
- id: wb-match-up-vocab
  type: match-up
  instruction: З'єднайте українські та англійські слова (Match Ukrainian and English
    words)
  pairs:
  - left: дитинство
    right: childhood
  - left: батьки
    right: parents
  - left: університет
    right: university
  - left: програміст
    right: programmer
  - left: закінчити
    right: to graduate/finish
  - left: раніше
    right: earlier/before
  - left: потім
    right: then
- id: wb-fill-in-endings
  type: fill-in
  instruction: Вставте правильне закінчення для минулого часу (Fill in the correct
    ending for the past tense)
  items:
  - sentence: Він народив____ в селі.
    answer: ся
    options:
    - ся
    - лася
    - лися
  - sentence: Вона народи____ в місті.
    answer: лася
    options:
    - ся
    - лася
    - лися
  - sentence: Дідусь жи____ в Канаді.
    answer: в
    options:
    - в
    - ла
    - ли
  - sentence: Бабуся жи____ в Україні.
    answer: ла
    options:
    - в
    - ла
    - ли
  - sentence: Марко вчи____ в університеті.
    answer: вся
    options:
    - вся
    - лася
    - лися
  - sentence: Анна вчи____ в школі.
    answer: лася
    options:
    - вся
    - лася
    - лися
- id: wb-true-false-tenses
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: «Я буду працювати» — це минулий час (past tense).
    correct: false
    explanation: Це майбутній час (future tense).
  - statement: «Я живу в Києві» — це теперішній час (present tense).
    correct: true
    explanation: Дієслово «живу» означає дію зараз.
  - statement: «Вона народилася» — це минулий час (past tense).
    correct: true
    explanation: Дієслово має суфікс -ла-, що вказує на минулий час.
  - statement: «Ми будемо подорожувати» — це теперішній час (present tense).
    correct: false
    explanation: Слово «будемо» вказує на майбутній час.
  - statement: Слово «раніше» (earlier) часто використовують з минулим часом.
    correct: true
    explanation: Так, це слово вказує на минуле.
  - statement: Слово «зараз» (now) часто використовують з майбутнім часом.
    correct: false
    explanation: «Зараз» використовують з теперішнім часом (present tense).
