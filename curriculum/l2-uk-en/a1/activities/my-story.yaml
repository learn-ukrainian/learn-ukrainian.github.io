version: '1.0'
module: my-story
level: a1
inline:
- id: matching-tense-category
  type: match-up
  instruction: З'єднайте дієслово з правильним часом (Match the verb with the correct
    tense)
  pairs:
  - left: народився
    right: Минулий час (Past)
  - left: переїхала
    right: Минулий час (Past)
  - left: живу
    right: Теперішній час (Present)
  - left: працюю
    right: Теперішній час (Present)
  - left: буду подорожувати
    right: Майбутній час (Future)
  - left: будемо вчитися
    right: Майбутній час (Future)
- id: fill-in-signal-words
  type: fill-in
  instruction: Оберіть правильне дієслово за контекстом (Choose the correct verb based
    on the context)
  items:
  - sentence: Раніше я ____ в Канаді.
    answer: жив
    options:
    - жив
    - живу
    - буду жити
  - sentence: Зараз я ____ в університеті.
    answer: працюю
    options:
    - працюю
    - працював
    - буду працювати
  - sentence: Далі я ____ українську мову.
    answer: буду вивчати
    options:
    - буду вивчати
    - вивчав
    - вивчаю
  - sentence: У дитинстві вона ____ читати.
    answer: любила
    options:
    - любила
    - любить
    - буде любити
  - sentence: Сьогодні ми ____ в Україні.
    answer: живемо
    options:
    - живемо
    - жили
    - будемо жити
  - sentence: Потім він ____ програмістом.
    answer: буде працювати
    options:
    - буде працювати
    - працює
    - працював
- id: ordering-life-events
  type: order
  instruction: Розставте події в правильному порядку (Put the events in the correct
    order)
  items:
  - Я народився в Торонто.
  - У дитинстві я жив з батьками.
  - Потім я вчився в університеті.
  - Зараз я живу в Києві і працюю програмістом.
  - Далі я буду подорожувати.
  correct_order:
  - 0
  - 1
  - 2
  - 3
  - 4
- id: fill-in-biography-combined
  type: fill-in
  instruction: Вставте правильні дієслова, щоб завершити біографію (Insert the correct
    verbs to complete the biography)
  items:
  - sentence: Я ____ у Львові.
    answer: народилася
    options:
    - народилася
    - народився
    - народилися
  - sentence: Там я ____ в школі.
    answer: вчилася
    options:
    - вчилася
    - вчився
    - вчилися
  - sentence: Зараз я ____ вчителькою.
    answer: працюю
    options:
    - працюю
    - працювала
    - буду працювати
  - sentence: Наступного року я ____.
    answer: буду подорожувати
    options:
    - буду подорожувати
    - подорожувала
    - подорожую
  - sentence: Я ____ побачити Японію.
    answer: хочу
    options:
    - хочу
    - хотіла
    - буду хотіти
  - sentence: Моя ____ — це Японія.
    answer: мрія
    options:
    - мрія
    - успіх
    - дитинство
workbook:
- type: group-sort
  instruction: Розподіліть слова за часом (Sort the words by tense)
  groups:
  - label: Минулий час (Past)
    items:
    - народився
    - жила
    - вчилися
    - переїхав
    - працювала
  - label: Теперішній час (Present)
    items:
    - живу
    - працює
    - вчимося
    - розповідаю
    - хочу
  - label: Майбутній час (Future)
    items:
    - буду жити
    - будеш працювати
    - буде подорожувати
    - будемо вчитися
- type: true-false
  instruction: Правда чи ні? (Прочитайте історію Тараса) (True or false? Read Taras's
    story)
  items:
  - statement: Тарас народився в Києві.
    correct: false
    explanation: Тарас народився в Одесі.
  - statement: У дитинстві Тарас любив математику.
    correct: true
    explanation: Він ходив у школу і любив математику.
  - statement: Зараз Тарас працює програмістом.
    correct: true
    explanation: Він живе в Києві і працює програмістом.
  - statement: Тарас не любить свою роботу.
    correct: false
    explanation: 'Він каже: ''Я люблю свою роботу''.'
  - statement: У вільний час він грає у баскетбол.
    correct: false
    explanation: У вільний час він грає у футбол.
  - statement: Далі Тарас хоче жити в Одесі.
    correct: false
    explanation: 'Він каже: ''Я буду жити в Києві — це моє місто!''.'
- type: error-correction
  instruction: Знайдіть і виправте помилку (Find and fix the error)
  items:
  - sentence: Раніше я живу в Канаді.
    error: живу
    correction: жив
    error_type: word
    options:
    - жив
    - буду жити
    - живемо
    explanation: Раніше (before) requires the past tense (жив).
  - sentence: Зараз я працював в школі.
    error: працював
    correction: працюю
    error_type: word
    options:
    - працюю
    - працювати
    - буду працювати
    explanation: Зараз (now) requires the present tense (працюю).
  - sentence: Далі я подорожував.
    error: подорожував
    correction: буду подорожувати
    error_type: word
    options:
    - подорожую
    - буду подорожувати
    - подорожувала
    explanation: Далі (next) requires the future tense (буду подорожувати).
  - sentence: Анна народився у Львові.
    error: народився
    correction: народилася
    error_type: word
    options:
    - народилася
    - народилися
    - народжуюся
    explanation: Anna is a woman, so she needs the feminine past tense ending (-ла).
  - sentence: У дитинстві ми живемо в селі.
    error: живемо
    correction: жили
    error_type: word
    options:
    - жили
    - будемо жити
    - живуть
    explanation: У дитинстві (in childhood) requires the past tense (жили).
  - sentence: Потім я переїхала в Київ і закінчив університет.
    error: закінчив
    correction: закінчила
    error_type: word
    options:
    - закінчила
    - закінчую
    - закінчили
    explanation: The speaker is female (переїхала), so the second verb must also be
      feminine (закінчила).
- type: translate
  instruction: Оберіть правильний переклад (Choose the correct translation)
  items:
  - source: I was born in Toronto.
    options:
    - text: Я народився в Торонто.
      correct: true
    - text: Я живу в Торонто.
      correct: false
    - text: Я буду жити в Торонто.
      correct: false
    - text: Я працюю в Торонто.
      correct: false
  - source: Now I live in Kyiv.
    options:
    - text: Зараз я живу в Києві.
      correct: true
    - text: Раніше я жив у Києві.
      correct: false
    - text: Далі я буду жити в Києві.
      correct: false
    - text: Я переїхав у Київ.
      correct: false
  - source: Next I will travel.
    options:
    - text: Далі я буду подорожувати.
      correct: true
    - text: Я подорожував.
      correct: false
    - text: Я люблю подорожувати.
      correct: false
    - text: Зараз я подорожую.
      correct: false
  - source: I studied at the university.
    options:
    - text: Я вчився в університеті.
      correct: true
    - text: Я вчуся в університеті.
      correct: false
    - text: Я буду вчитися в університеті.
      correct: false
    - text: Я закінчив університет.
      correct: false
  - source: She wants to move to Ukraine.
    options:
    - text: Вона хоче переїхати в Україну.
      correct: true
    - text: Вона переїхала в Україну.
      correct: false
    - text: Вона буде жити в Україні.
      correct: false
    - text: Вона живе в Україні.
      correct: false
  - source: I love to tell stories.
    options:
    - text: Я люблю розповідати історії.
      correct: true
    - text: Я розповідав історії.
      correct: false
    - text: Я буду розповідати історії.
      correct: false
    - text: Вона розповідає історії.
      correct: false
- type: unjumble
  instruction: Складіть правильне речення зі слів (Put the words in the correct order
    to make a sentence)
  items:
  - words:
    - Я
    - в
    - Одесі.
    - народився
    correct_order:
    - Я
    - народився
    - в
    - Одесі.
  - words:
    - школі.
    - вчилася
    - Там
    - я
    - в
    correct_order:
    - Там
    - я
    - вчилася
    - в
    - школі.
  - words:
    - живу
    - Києві.
    - я
    - Зараз
    - в
    correct_order:
    - Зараз
    - я
    - живу
    - в
    - Києві.
  - words:
    - програмістом.
    - Зараз
    - я
    - працюю
    correct_order:
    - Зараз
    - я
    - працюю
    - програмістом.
  - words:
    - буду
    - Далі
    - я
    - подорожувати.
    correct_order:
    - Далі
    - я
    - буду
    - подорожувати.
  - words:
    - вивчати
    - мову.
    - українську
    - Я
    - буду
    correct_order:
    - Я
    - буду
    - вивчати
    - українську
    - мову.
