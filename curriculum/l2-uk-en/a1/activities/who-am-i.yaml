    correct: 2
  - word: студентка
    correct: 3
  - word: Канада
    correct: 3
  - word: Німеччина
    correct: 4
  - word: українець
    correct: 4
  - word: лікар
    correct: 2
  title: 'Count the syllables in each word. Hint: Count the vowels!'
