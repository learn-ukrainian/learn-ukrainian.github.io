- id: match-up-qa
  type: match-up
  instruction: Match the questions with the logical answers
  pairs:
  - left: Як тебе звати?
    right: Мене звати Марко.
  - left: Як вас звати?
    right: Мене звати Ганна.
  - left: Звідки ти?
    right: Я з України.
  - left: Хто це?
    right: Це мій друг.
  - left: Що це?
    right: Це кава.
  - left: Як його звати?
    right: Його звати Андрій.
  - left: Як її звати?
    right: Її звати Оксана.
  title: Match the questions with the logical answers
- id: true-false-grammar
  type: true-false
  instruction: Are these statements True or False based on Ukrainian grammar?
  items:
  - statement: You need to use a verb like 'am' or 'is' to say 'I am a student' in
      Ukrainian.
    correct: false
    explanation: There is no verb 'to be' used in present tense declarative sentences.
      You say 'Я — студент'.
  - statement: A female doctor refers to herself as 'лікарка'.
    correct: true
    explanation: Professions have distinct gendered forms in Ukrainian.
  - statement: The word 'це' changes form when referring to multiple items.
    correct: false
    explanation: The word 'це' works for both singular and plural items. You do not
      need to change it.
  - statement: When addressing an adult stranger, you should use 'ти'.
    correct: false
    explanation: You must use the formal 'ви' when speaking to adult strangers.
  - statement: To ask 'What is this?', you say 'Що це?'.
    correct: true
    explanation: '''Що'' is used for inanimate objects and abstract concepts.'
  - statement: The word 'звідки' means 'where from'.
    correct: true
    explanation: It is the correct question word to ask about geographic origin.
  title: Are these statements True or False based on Ukrainian grammar?
