version: '1.0'
module: who-am-i
level: a1
inline:
- id: fill-in-self-intro
  type: fill-in
  instruction: Complete the self-introduction.
  items:
  - sentence: ____ звати Марко.
    answer: Мене
    options:
    - Мене
    - Я
    - Ти
  - sentence: Я ____ України.
    answer: з
    options:
    - з
    - зі
    - це
  - sentence: Я — ____. (I am a student, male)
    answer: студент
    options:
    - студент
    - студентка
    - вчитель
  - sentence: ____ звати Олена.
    answer: Мене
    options:
    - Мене
    - Вона
    - Я
  - sentence: Він ____ Канади.
    answer: з
    options:
    - з
    - зі
    - це
  - sentence: Я — ____. (I am a doctor, female)
    answer: лікарка
    options:
    - лікарка
    - лікар
    - вчителька
  title: Complete the self-introduction.
- id: quiz-register-choice
  type: quiz
  instruction: Formal or informal? Choose the correct phrase to complete the introduction.
  items:
  - question: You meet a student at a hostel. What do you say?
    options:
    - Привіт! Як тебе звати?
    - Добрий день! Як вас звати?
    - Хто це?
    - Що це?
    correct: 0
  - question: You are speaking to your new university professor. What do you say?
    options:
    - Добрий день! Як вас звати?
    - Привіт! Як тебе звати?
    - Мене звати Петро.
    - Я з Києва.
    correct: 0
  - question: 'A child asks you your name. You reply, and ask:'
    options:
    - А тебе?
    - А вас?
    - Хто це?
    - Звідки ви?
    correct: 0
  - question: 'You are introduced to an older colleague. They say ''Мене звати Петро.''
      You reply:'
    options:
    - Дуже приємно!
    - Я з Канади.
    - Хто це?
    - Що це?
    correct: 0
  - question: How do you ask a new friend their name?
    options:
    - Як тебе звати?
    - Як вас звати?
    - Як його звати?
    - Як її звати?
    correct: 0
  - question: How do you ask a business partner where they are from?
    options:
    - Звідки ви?
    - Звідки ти?
    - Що це?
    - Хто це?
    correct: 0
  title: Formal or informal? Choose the correct phrase to complete the introduction.
- id: match-up-gendered-professions
  type: match-up
  instruction: Match the masculine professions with their feminine forms.
  pairs:
  - left: програміст
    right: програмістка
  - left: вчитель
    right: вчителька
  - left: інженер
    right: інженерка
  - left: студент
    right: студентка
  - left: лікар
    right: лікарка
  - left: українець
    right: українка
  - left: американець
    right: американка
  - left: канадієць
    right: канадка
  title: Match the masculine professions with their feminine forms.
- id: fill-in-dialogue-final
  type: fill-in
  instruction: Complete the dialogue with the correct words.
  items:
  - sentence: Привіт! Як ____ звати?
    answer: тебе
    options:
    - тебе
    - ви
    - я
  - sentence: ____ звати Олена. А тебе?
    answer: Мене
    options:
    - Мене
    - Я
    - Ти
  - sentence: Мене звати Марко. Звідки ____?
    answer: ти
    options:
    - ти
    - мене
    - вас
  - sentence: Я ____ України. А ти?
    answer: з
    options:
    - з
    - зі
    - це
  - sentence: Я з Канади. Дуже ____!
    answer: приємно
    options:
    - приємно
    - звати
    - також
  - sentence: Мені ____!
    answer: також
    options:
    - також
    - дуже
    - я
  title: Complete the dialogue with the correct words.
workbook:
- id: wb-group-sort-gender
  type: group-sort
  instruction: Sort the professions into masculine (Він) and feminine (Вона).
  groups:
  - label: Він (He)
    items:
    - програміст
    - інженер
    - студент
    - лікар
    - вчитель
    - українець
  - label: Вона (She)
    items:
    - програмістка
    - інженерка
    - студентка
    - лікарка
    - вчителька
    - українка
  title: Sort the professions into masculine (Він) and feminine (Вона).
- id: wb-true-false-pronouns
  type: true-false
  instruction: True or false? Check your understanding.
  items:
  - statement: '''Мене звати'' literally means ''My name is'' in Ukrainian.'
    correct: false
    explanation: It literally translates to 'me they call'. Ukrainian doesn't use
      the verb 'to be' here.
  - statement: You should use 'ти' (you) when talking to your professor or boss.
    correct: false
    explanation: '''ти'' is informal. Use ''ви'' for formal situations.'
  - statement: In Ukrainian, you say 'Я — студент' without the word for 'am'.
    correct: true
    explanation: Ukrainian uses a 'zero copula', meaning the verb 'to be' is dropped
      in the present tense.
  - statement: '''Це'' means ''this is'' or ''these are''.'
    correct: true
    explanation: '''Це'' is a universal identifier used for both people and objects.'
  - statement: When asking 'What is this?', you say 'Це що?'.
    correct: false
    explanation: 'The question word must come first: ''Що це?''.'
  - statement: Profession names often change depending on if a man or woman is doing
      the job.
    correct: true
    explanation: Ukrainian uses masculine and feminine forms for professions, like
      'студент' and 'студентка'.
  title: True or false? Check your understanding.
- id: wb-count-syllables-vocab
  type: count-syllables
  instruction: 'Count the syllables in each word. Hint: Count the vowels!'
  items:
