- id: fill-in-dialogue
  type: fill-in
  instruction: Complete the dialogue with the correct words
  items:
  - sentence: Привіт! Як тебе ____?
    answer: звати
    options:
    - звати
    - звідки
    - це
  - sentence: Мене звати Марко. А ____?
    answer: тебе
    options:
    - ти
    - тебе
    - ви
  - sentence: ____ з України.
    answer: Я
    options:
    - Ти
    - Я
    - Він
  - sentence: ____ приємно!
    answer: Дуже
    options:
    - Як
    - Це
    - Дуже
  - sentence: Добрий день! Як ____ звати?
    answer: вас
    options:
    - тебе
    - вас
    - його
  - sentence: Це Андрій. ____ з Києва.
    answer: Він
    options:
    - Вона
    - Він
    - Ти
  title: Complete the dialogue with the correct words
