- type: group-sort
  title: "Він чи Вона?"
  instruction: "Розподіліть слова за родом (чоловічий чи жіночий)."
  groups:
    - name: "Він (Мій)"
      items: ["тато", "брат", "дідусь", "дядько", "син", "чоловік", "онук"]
    - name: "Вона (Моя)"
      items: ["мама", "сестра", "бабуся", "тітка", "донька", "дружина", "онука"]

- type: fill-in
  title: "Мій чи Моя?"
  instruction: "Оберіть правильний займенник (мій, моя, мої)."
  items:
    - sentence: "Це {{answer}} тато."
      answer: "мій"
      options: ["мій", "моя", "мої", "моє"]
      explanation: "Тато — чоловічий рід (masculine), тому «мій»."
    - sentence: "Це {{answer}} мама."
      answer: "моя"
      options: ["мій", "моя", "мої", "моє"]
      explanation: "Мама — жіночий рід (feminine), тому «моя»."
    - sentence: "Це {{answer}} батьки."
      answer: "мої"
      options: ["мій", "моя", "мої", "моє"]
      explanation: "Батьки — множина (plural), тому «мої»."
    - sentence: "Це {{answer}} дідусь."
      answer: "мій"
      options: ["мій", "моя", "мої", "моє"]
      explanation: "Дідусь — чоловічий рід, тому «мій»."
    - sentence: "Це {{answer}} бабуся."
      answer: "моя"
      options: ["мій", "моя", "мої", "моє"]
      explanation: "Бабуся — жіночий рід, тому «моя»."
    - sentence: "Це {{answer}} сестра."
      answer: "моя"
      options: ["мій", "моя", "мої", "моє"]
      explanation: "Сестра — жіночий рід, тому «моя»."
    - sentence: "Це {{answer}} тітка."
      answer: "моя"
      options: ["мій", "моя", "мої", "моє"]
      explanation: "Тітка — жіночий рід, тому «моя»."
    - sentence: "Це {{answer}} дядько."
      answer: "мій"
      options: ["мій", "моя", "мої", "моє"]
      explanation: "Дядько — чоловічий рід, тому «мій»."

- type: fill-in
  title: "Опис родини"
  instruction: "Оберіть правильне слово, щоб доповнити речення."
  items:
    - sentence: "Мій брат ще маленький, він {{answer}}."
      answer: "молодший"
      options: ["молодший", "старший", "старий", "високий"]
      explanation: "Small/young implies younger (молодший)."
    - sentence: "Моя сестра вже студентка, вона {{answer}}."
      answer: "старша"
      options: ["старша", "молодша", "маленька", "нова"]
      explanation: "Student usually implies older sister compared to a child."
    - sentence: "Мій тато лікар. Він дуже {{answer}}."
      answer: "розумний"
      options: ["розумний", "розумна", "розумні", "зелений"]
      explanation: "Тато is masculine, so we need the masculine adjective «розумний»."
    - sentence: "Моя бабуся завжди готує їсти. Вона дуже {{answer}}."
      answer: "добра"
      options: ["добра", "добрий", "добрі", "злий"]
      explanation: "Бабуся is feminine, so we need the feminine adjective «добра»."
    - sentence: "Мій брат любить жартувати. Він {{answer}}."
      answer: "веселий"
      options: ["веселий", "весела", "сумний", "поганий"]
      explanation: "Брат is masculine, so «веселий»."
    - sentence: "У мене є велика {{answer}}."
      answer: "родина"
      options: ["родина", "роботу", "кіт", "стіл"]
      explanation: "«Велика» is feminine, matching «родина»."
    - sentence: "Моя мама любить співати. Вона {{answer}}."
      answer: "весела"
      options: ["весела", "веселий", "сумний", "поганий"]
      explanation: "Мама is feminine, so «весела»."
    - sentence: "Мій дідусь багато читає. Він {{answer}}."
      answer: "мудрий"
      options: ["мудрий", "мудра", "стара", "мала"]
      explanation: "Дідусь is masculine, so «мудрий»."

- type: unjumble
  title: "Складіть речення"
  instruction: "Розставте слова у правильному порядку."
  items:
    - words: ["мене", "У", "є", "сестра"]
      answer: "У мене є сестра"
    - words: ["мій", "Це", "старший", "брат"]
      answer: "Це мій старший брат"
    - words: ["Моя", "мама", "вчителька"]
      answer: "Моя мама вчителька"
    - words: ["Мій", "тато", "дуже", "добрий"]
      answer: "Мій тато дуже добрий"
    - words: ["У", "мене", "є", "велика", "родина"]
      answer: "У мене є велика родина"
    - words: ["Моя", "мама", "дуже", "добра"]
      answer: "Моя мама дуже добра"

- type: unjumble
  title: "Запитання та відповіді"
  instruction: "Складіть запитання або відповідь."
  items:
    - words: ["Хто", "це", "на", "фото"]
      answer: "Хто це на фото"
    - words: ["Це", "моя", "добра", "бабуся"]
      answer: "Це моя добра бабуся"
    - words: ["У", "тебе", "є", "брат"]
      answer: "У тебе є брат"
    - words: ["Так", "у", "мене", "є", "брат"]
      answer: "Так у мене є брат"
    - words: ["Це", "твоя", "рідна", "сестра"]
      answer: "Це твоя рідна сестра"
    - words: ["Ні", "це", "моя", "мама"]
      answer: "Ні це моя мама"

- type: match-up
  title: "Кличний відмінок"
  instruction: "З'єднайте слово з його формою звертання (Кличний відмінок)."
  pairs:
    - left: "Мама"
      right: "Мамо!"
    - left: "Тато"
