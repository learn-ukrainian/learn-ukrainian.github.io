workbook:
- type: group-sort
  instruction: Sort the family members by the possessive pronoun they use.
  groups:
  - label: мій (masculine)
    items:
    - тато
    - брат
    - дідусь
    - син
    - чоловік
    - дядько
  - label: моя (feminine)
    items:
    - мама
    - сестра
    - бабуся
    - дочка
    - дружина
    - тітка
  title: Sort the family members by the possessive pronoun they use.
- type: true-false
  instruction: Is this correct based on the typical use of pronouns?
  items:
  - statement: You can say 'мій мама'.
    correct: false
    explanation: Мама is feminine, so you must use 'моя мама'.
  - statement: The plural of 'мій' is 'мої'.
    correct: true
    explanation: Use 'мої' for plural nouns, like 'мої батьки'.
  - statement: To say 'I have a brother', say 'Я маю брат'.
    correct: false
    explanation: You must use the phrase 'У мене є брат'.
  - statement: '''Її'' means ''her'' and never changes shape.'
    correct: true
    explanation: '''Його'' (his) and ''її'' (her) do not change for the gender of
      the noun.'
  - statement: If asking a friend, you use 'У тебе є'.
    correct: true
    explanation: '''У тебе є'' is the informal way to ask ''do you have''.'
  - statement: '''Батьки'' means only ''fathers''.'
    correct: false
    explanation: '''Батьки'' means ''parents'' (mother and father).'
  title: Is this correct based on the typical use of pronouns?
- type: quiz
  instruction: Choose the correct answer based on the dialogue in the lesson.
  items:
  - question: How do you ask 'Do you have brothers or sisters?'
    options:
    - У тебе є брати чи сестри?
    - Де твої брати чи сестри?
    - Ось брати і сестри?
    - Це твої брати?
    correct: 0
  - question: How does Mark answer?
    options:
    - Так, у мене є два брати і одна сестра.
    - Ні, у мене один брат.
    - Ось мій брат.
    - Так, у мене одна сестра.
    correct: 0
  - question: What does 'Як його звати?' mean?
    options:
    - What is his name?
    - Where is his brother?
    - Who is he?
    - Is he your brother?
    correct: 0
  - question: Which phrase means 'I have only one brother'?
    options:
    - У мене тільки один брат.
    - Це мій один брат.
    - Ось один брат.
    - У тебе один брат.
    correct: 0
  - question: How do you say 'This is my mom'?
    options:
    - Це моя мама.
    - Це мій мама.
    - Ось мама.
    - У мене є мама.
    correct: 0
  - question: 'If someone asks ''А це твоя бабуся?'', you can answer:'
    options:
    - Так, її звати Тетяна.
    - Так, його звати Тетяна.
    - Ні, мій тато.
    - Ось моя мама.
    correct: 0
  title: Choose the correct answer based on the dialogue in the lesson.
