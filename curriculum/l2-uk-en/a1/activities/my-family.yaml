version: '1.0'
module: my-family
level: a1
inline:
- id: match-family
  type: match-up
  instruction: Match the English family words to the Ukrainian words.
  pairs:
  - left: parents
    right: батьки
  - left: uncle
    right: дядько
  - left: aunt
    right: тітка
  - left: grandfather
    right: дідусь
  - left: grandmother
    right: бабуся
  - left: brother
    right: брат
  - left: sister
    right: сестра
  - left: mother and father
    right: мама і тато
  title: Match the English family words to the Ukrainian words.
- id: quiz-possession
  type: quiz
  instruction: Answer the questions about possession.
  items:
  - question: У тебе є брат?
    options:
    - Так, у мене є брат.
    - Так, у мене є сестра.
    - Так, мій брат.
    - Ні, у тебе є брат.
    correct: 0
  - question: У тебе є сестра?
    options:
    - Так, у мене є сестра.
    - Так, у мене є два брати.
    - Це моя сестра.
    - У тебе є сестра.
    correct: 0
  - question: У тебе є дідусь?
    options:
    - Так, у мене є дідусь.
    - Так, у мене є бабуся.
    - Ні, це мій дідусь.
    - Так, його звати Марк.
    correct: 0
  - question: У тебе є бабуся?
    options:
    - Ні.
    - Так, у тебе є бабуся.
    - Це моя бабуся.
    - Ні, мій бабуся.
    correct: 0
  - question: У тебе є син?
    options:
    - Так, у мене є один син.
    - Так, у мене є одна син.
    - Ні, це син.
    - Так, у тебе є син.
    correct: 0
  - question: У тебе є дочка?
    options:
    - Так, у мене є одна дочка.
    - Так, у мене є один дочка.
    - Так, у мене є два дочка.
    - Ні, мій дочка.
    correct: 0
  title: Answer the questions about possession.
- id: fill-in-possessives
  type: fill-in
  instruction: Choose the correct possessive pronoun.
  items:
  - sentence: Це ____ мама.
    answer: моя
    options:
    - мій
    - моя
    - моє
    - мої
  - sentence: Де ____ тато?
    answer: твій
    options:
    - твій
    - твоя
    - твоє
    - твої
  - sentence: Ось ____ батьки.
    answer: мої
    options:
    - мій
    - моя
    - моє
    - мої
  - sentence: Це ____ брат Денис.
    answer: мій
    options:
    - мій
    - моя
    - моє
    - мої
  - sentence: А це ____ сестра?
    answer: твоя
    options:
    - твій
    - твоя
    - твоє
    - твої
  - sentence: Ось ____ дідусь.
    answer: мій
    options:
    - мій
    - моя
    - моє
    - мої
  - sentence: Де ____ дочка?
    answer: твоя
    options:
    - твій
    - твоя
    - твоє
    - твої
  - sentence: Це ____ місто.
    answer: моє
    options:
    - мій
    - моя
    - моє
    - мої
  title: Choose the correct possessive pronoun.
- id: fill-in-dialogue
  type: fill-in
  instruction: Complete the dialogue with the correct words.
  items:
  - sentence: — Привіт! Це ____ брат?
    answer: твій
    options:
    - твій
    - твоя
    - твої
    - твоє
  - sentence: — Так, це ____ брат.
    answer: мій
    options:
    - мій
    - моя
    - мої
    - моє
  - sentence: — А це хто? Це твоя ____?
    answer: сестра
    options:
    - сестра
    - брат
    - тато
    - дідусь
  - sentence: — Ні, це моя мама. Ось мій ____.
    answer: тато
    options:
    - тато
    - мама
    - бабуся
    - сестра
  title: Complete the dialogue with the correct words.
workbook:
- type: group-sort
  instruction: Sort the family members by their grammatical gender.
  groups:
  - label: Masculine (мій)
    items:
    - брат
    - тато
    - дідусь
    - син
    - чоловік
    - дядько
  - label: Feminine (моя)
    items:
    - сестра
    - мама
    - бабуся
    - дочка
    - дружина
    - тітка
  title: Sort the family members by their grammatical gender.
- type: true-false
  instruction: Read the statements and decide if they are true or false.
  items:
  - statement: The phrase 'бабуся і дідусь' means 'mother and father'.
    correct: false
    explanation: '''Бабуся і дідусь'' means ''grandmother and grandfather''. ''Mother
      and father'' is ''мама і тато''.'
  - statement: You use 'моя' with 'сестра' because 'сестра' is a feminine noun.
    correct: true
    explanation: '''Моя'' is the feminine form of ''my'', matching feminine nouns
      like ''сестра''.'
  - statement: To ask someone 'Do you have a brother?' you say 'У мене є брат?'
    correct: false
    explanation: '''У мене є'' means ''I have''. To ask ''Do you have'', you must
      use ''У тебе є''.'
  - statement: The word 'батьки' (parents) is grammatically plural in Ukrainian.
    correct: true
    explanation: '''Батьки'' is plural, so it must be used with plural pronouns like
      ''мої''.'
  - statement: The pronoun 'його' means 'her' and 'її' means 'his'.
    correct: false
    explanation: 'It is the opposite: ''його'' means ''his'' and ''її'' means ''her''.'
  - statement: If you have one brother, you say 'один брат'.
    correct: true
    explanation: '''Один'' matches the masculine noun ''брат''.'
  title: Read the statements and decide if they are true or false.
- type: match-up
  instruction: Match the Ukrainian sentences to their English translations.
  pairs:
  - left: У мене є два брати.
    right: I have two brothers.
  - left: У тебе є сестра?
    right: Do you have a sister?
  - left: Це моя сім'я.
    right: This is my family.
  - left: Як його звати?
    right: What is his name?
  - left: Її звати Тетяна.
    right: Her name is Tetiana.
  - left: У мене тільки один брат.
    right: I have only one brother.
  title: Match the Ukrainian sentences to their English translations.
- type: anagram
  instruction: Unscramble the letters to form family words.
  items:
  - letters:
    - д
    - я
    - д
    - ь
    - к
    - о
    answer: дядько
  - letters:
    - т
    - і
    - т
    - к
    - а
    answer: тітка
  - letters:
    - б
    - р
    - а
    - т
    answer: брат
  - letters:
    - с
    - е
    - с
    - т
    - р
    - а
    answer: сестра
  - letters:
    - б
    - а
    - б
    - у
    - с
    - я
    answer: бабуся
  - letters:
    - д
    - і
    - д
    - у
    - с
    - ь
    answer: дідусь
  title: Unscramble the letters to form family words.
