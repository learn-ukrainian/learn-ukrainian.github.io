version: '1.0'
module: my-family
level: a1
inline:
- id: match-family
  type: match-up
  instruction: Match the English family words to their Ukrainian translations.
  pairs:
  - left: parents
    right: батьки
  - left: uncle
    right: дядько
  - left: aunt
    right: тітка
  - left: grandfather
    right: дідусь
  - left: grandmother
    right: бабуся
  - left: brother
    right: брат
  - left: sister
    right: сестра
  - left: mother and father
    right: мама і тато
  title: Match the English family words to their Ukrainian translations.
- id: quiz-possession
  type: quiz
  instruction: Choose the correct answer to the question.
  items:
  - question: У тебе є брат?
    options:
    - Так, у мене є брат.
    - Ні, у тебе є брат.
    - Так, це мій брат.
    - У мене є сестра.
    correct: 0
  - question: У тебе є сестра?
    options:
    - Так, у мене є одна сестра.
    - Ні, це моя сестра.
    - Так, у тебе є сестра.
    - Так, її звати Оля.
    correct: 0
  - question: У тебе є бабуся?
    options:
    - Так, у мене є бабуся.
    - Ні, це бабуся.
    - Так, у тебе є бабуся.
    - Так, це дідусь.
    correct: 0
  - question: У тебе є дядько?
    options:
    - Ні.
    - Так, у тебе є дядько.
    - Так, це мій дядько.
    - Ні, її звати Оля.
    correct: 0
  - question: У тебе є два брати?
    options:
    - Так, у мене є два брати.
    - Ні, у тебе є два брати.
    - Так, у мене є одна сестра.
    - Так, це мої брати.
    correct: 0
  - question: У тебе є дідусь і бабуся?
    options:
    - Так, у мене є дідусь і бабуся.
    - Так, це мій дідусь.
    - Ні, у тебе є бабуся.
    - Так, її звати Оля.
    correct: 0
  title: Choose the correct answer to the question.
- id: fill-in-possessives
  type: fill-in
  instruction: Choose the correct possessive pronoun.
  items:
  - sentence: Це {моя} мама.
    answer: моя
    options:
    - мій
    - моя
    - моє
    - мої
  - sentence: Де {твій} тато?
    answer: твій
    options:
    - твій
    - твоя
    - твоє
    - твої
  - sentence: Ось {мої} батьки.
    answer: мої
    options:
    - мій
    - моя
    - моє
    - мої
  - sentence: Це {мій} брат.
    answer: мій
    options:
    - мій
    - моя
    - моє
    - мої
  - sentence: Де {твоя} сестра?
    answer: твоя
    options:
    - твій
    - твоя
    - твоє
    - твої
  - sentence: Ось {твої} дідусь і бабуся.
    answer: твої
    options:
    - твій
    - твоя
    - твоє
    - твої
  - sentence: Це {моя} сім'я.
    answer: моя
    options:
    - мій
    - моя
    - моє
    - мої
  - sentence: Де {мій} дядько?
    answer: мій
    options:
    - мій
    - моя
    - моє
    - мої
  title: Choose the correct possessive pronoun.
- id: fill-in-dialogue
  type: fill-in
  instruction: Complete the dialogue with the correct words.
  items:
  - sentence: — Привіт! Це {твій} брат?
    answer: твій
    options:
    - твій
    - твоя
    - мій
    - моя
  - sentence: — Так, це мій брат. Ось моя {мама}.
    answer: мама
    options:
    - мама
    - тато
    - батьки
    - брат
  - sentence: — А це твій {тато}?
    answer: тато
    options:
    - мама
    - сестра
    - тато
    - бабуся
  - sentence: — Ні, це мій {дядько}.
    answer: дядько
    options:
    - дядько
    - тітка
    - сестра
    - мама
  - sentence: — А це твоя {сестра}?
    answer: сестра
    options:
    - сестра
    - брат
    - бабуся
    - дідусь
  - sentence: — Так, це моя сестра. А це наша {бабуся}.
    answer: бабуся
    options:
    - бабуся
    - дідусь
    - тато
    - мама
  title: Complete the dialogue with the correct words.
workbook:
- id: group-gender
  type: group-sort
  instruction: Sort the words by gender (masculine or feminine).
  groups:
  - label: Masculine (мій)
    items:
    - брат
    - тато
    - дідусь
    - дядько
    - син
    - чоловік
  - label: Feminine (моя)
    items:
    - сестра
    - мама
    - бабуся
    - тітка
    - дочка
    - дружина
  title: Sort the words by gender (masculine or feminine).
