workbook:
- type: observe
  examples:
  - мій брат — мій тато — мій дідусь — мій дядько
  - моя сестра — моя мама — моя бабуся — моя тітка
  - мої батьки — мої брати — мої сестри
  prompt: Look at the possessive pronouns мій, моя, and мої. What determines which
    one you use — the speaker's gender, or the noun's gender? What pattern do you
    notice with plural nouns?
- type: group-sort
  instruction: 'Sort these Ukrainian family words into two groups based on grammatical
    gender. Hint: мій goes with masculine nouns, моя goes with feminine nouns.'
  groups:
  - label: Masculine — мій (він)
    items:
    - брат
    - тато
    - дідусь
    - дядько
    - чоловік
    - син
  - label: Feminine — моя (вона)
    items:
    - сестра
    - мама
    - бабуся
    - тітка
    - дружина
    - дочка
- type: true-false
  instruction: True or false? Read each statement about Ukrainian family vocabulary
    and grammar.
  items:
  - statement: «Батьки» means 'parents' and is always used in the plural.
    correct: true
    explanation: Батьки is the Ukrainian word for parents and is always plural — you
      say «мої батьки», never «мій батько» to mean 'my parents'.
  - statement: A man says «мій мама» because he is masculine.
    correct: false
    explanation: Possessive pronouns agree with the noun's gender, not the speaker's.
      «Мама» is feminine, so everyone says «моя мама».
  - statement: «Його» and «її» never change form, regardless of the noun's gender.
    correct: true
    explanation: Unlike мій/моя/моє, «його» (his) and «її» (her) are invariable —
      «це його брат», «це його сестра», «це його місто» all use the same form.
  - statement: To say 'I have a brother', Ukrainians say «У мене є брат».
    correct: true
    explanation: Ukrainian has no verb 'to have'. Instead it uses «у мене є» — literally
      'at me there-is'. This is the standard way to express possession.
  - statement: «Сім'я» and «родина» are two different words for 'family' — one is
      formal, one is wrong.
    correct: false
    explanation: Both «сім'я» and «родина» mean 'family' and both are completely natural.
      Ukrainian speakers use them interchangeably every day.
  - statement: «Два брати» and «дві сестри» — the number word changes to match the
      gender of the noun.
    correct: true
    explanation: 'The number ''two'' has masculine «два» and feminine «дві». This
      matches the noun: «два брати» (masculine), «дві сестри» (feminine).'
