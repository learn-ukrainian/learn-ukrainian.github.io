- id: quiz-u-tebe-ye
  type: quiz
  instruction: Someone asks you «У тебе є...?» (Do you have...?). Choose the correct
    Ukrainian response.
  items:
  - question: «У тебе є брат?»
    options:
    - Так, у мене є брат.
    - Так, у тебе є брат.
    - Так, у мені є брат.
    - Так, мене є брат.
    correct: 0
  - question: «У тебе є сестра?»
    options:
    - Так, у тебе є сестра.
    - Так, у мене є сестра.
    - Так, у мені сестра є.
    - Так, є у сестра мене.
    correct: 1
  - question: «У тебе є бабуся?»
    options:
    - Так, у мені є бабуся.
    - Так, у тебе є бабуся.
    - Так, бабуся є у мене.
    - Так, у мене є бабуся.
    correct: 3
  - question: «У тебе є брати чи сестри?»
    options:
    - Так, у мене є два брати.
    - Так, у тебе є два брати.
    - Так, у мені два брати є.
    - Так, два брати у тебе є.
    correct: 0
  - question: «У тебе є дідусь?»
    options:
    - Так, у тебе є дідусь.
    - Так, у мені є дідусь.
    - Так, у мене є дідусь.
    - Так, є дідусь у тебе.
    correct: 2
  - question: «У тебе є одна сестра чи дві?»
    options:
    - У тебе тільки одна сестра.
    - Мені є тільки одна сестра.
    - Тільки одна у тебе сестра.
    - У мене тільки одна сестра.
    correct: 3
