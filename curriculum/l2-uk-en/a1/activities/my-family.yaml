      right: "Бабусю!"
    - left: "Дідусь"
      right: "Дідусю!"
    - left: "Син"
      right: "Сину!"
    - left: "Брат"
      right: "Брате!"
    - left: "Сестра"
      right: "Сестро!"
    - left: "Донька"
      right: "Доню!"

- type: fill-in
  title: "Звертання до рідних"
  instruction: "Оберіть правильну форму звертання."
  items:
    - sentence: "{{answer}}, дай мені яблуко, будь ласка."
      answer: "Мамо"
      options: ["Мамо", "Мама", "Мами", "Маму"]
      explanation: "Calling mom -> Vocative case «Мамо»."
    - sentence: "{{answer}}, ти вдома?"
      answer: "Тату"
      options: ["Тату", "Тато", "Тата", "Татові"]
      explanation: "Calling dad -> Vocative case «Тату»."
    - sentence: "Привіт, {{answer}}!"
      answer: "бабусю"
      options: ["бабусю", "бабуся", "бабусі", "бабусею"]
      explanation: "Greeting grandma directly -> Vocative case «бабусю»."
    - sentence: "{{answer}}, ходімо гуляти!"
      answer: "Дідусю"
      options: ["Дідусю", "Дідусь", "Дідуся", "Дідусем"]
      explanation: "Calling grandpa -> Vocative case «Дідусю»."
    - sentence: "Привіт, {{answer}}! Як ти?"
      answer: "сину"
      options: ["сину", "син", "сина", "сином"]
      explanation: "Greeting your son -> Vocative «сину» (modeled in the phone dialogue)."
    - sentence: "{{answer}}, я тебе люблю!"
      answer: "Мамо"
      options: ["Мамо", "Мама", "Мами", "Маму"]
      explanation: "Expressing love to mom -> Vocative «Мамо»."
    - sentence: "{{answer}}, допоможи мені!"
      answer: "Брате"
      options: ["Брате", "Брат", "Брата", "Братом"]
      explanation: "Calling brother -> Vocative «Брате»."
    - sentence: "{{answer}}, ти найкраща!"
      answer: "Сестро"
      options: ["Сестро", "Сестра", "Сестри", "Сестру"]
      explanation: "Calling sister -> Vocative «Сестро»."

- type: quiz
  title: "Перевірка знань"
  instruction: "Оберіть правильну відповідь."
  items:
    - question: "Як правильно перекласти українською фразу «My family»?"
      explanation: "Family is «моя сім'я» or «моя родина»."
      options:
        - text: "Моя сім'я"
          correct: true
        - text: "Мій сім'я"
          correct: false
        - text: "Мої сім'я"
          correct: false
        - text: "Моє сім'я"
          correct: false
    - question: "Оберіть слово, яке належить до чоловічого роду."
      explanation: "«Тато» ends in -o but refers to a male, so it is masculine."
      options:
        - text: "Тато"
          correct: true
        - text: "Мама"
          correct: false
        - text: "Сестра"
          correct: false
        - text: "Бабуся"
          correct: false
    - question: "Яка фраза є правильним перекладом «I have a brother»?"
      explanation: "We use the construction «У мене є...»."
      options:
        - text: "У мене є брат"
          correct: true
        - text: "Я маю брат"
          correct: false
        - text: "Мій є брат"
          correct: false
        - text: "У мене брат"
          correct: false
    - question: "Що означає українське слово «донька» англійською мовою?"
      explanation: "«Донька» means daughter."
      options:
        - text: "Daughter"
          correct: true
        - text: "Son"
          correct: false
        - text: "Sister"
          correct: false
        - text: "Aunt"
          correct: false
    - question: "Яка форма є правильною для звертання до тата?"
      explanation: "Vocative form for «тато» is «тату»."
      options:
        - text: "Тату!"
          correct: true
        - text: "Тато!"
          correct: false
        - text: "Тата!"
          correct: false
        - text: "Татові!"
          correct: false
    - question: "Яке українське слово має значення «Parents» англійською?"
      explanation: "Parents translates to «Батьки»."
      options:
        - text: "Батьки"
          correct: true
        - text: "Родичі"
          correct: false
        - text: "Діти"
          correct: false
        - text: "Друзі"
          correct: false
    - question: "Як сказати «older brother» українською мовою?"
      explanation: "Older is «старший»."
      options:
        - text: "Старший брат"
          correct: true
        - text: "Молодший брат"
          correct: false
        - text: "Великий брат"
          correct: false
        - text: "Старий брат"
          correct: false
    - question: "Яке закінчення має прикметник у фразі «Моя мама добр...»?"
      explanation: "Feminine gender requires -a."
      options:
        - text: "-а (добра)"
          correct: true
        - text: "-ий (добрий)"
          correct: false
        - text: "-е (добре)"
          correct: false
        - text: "-і (добрі)"
          correct: false
