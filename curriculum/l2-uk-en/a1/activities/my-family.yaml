version: '1.0'
module: my-family
level: a1
inline:
- id: fill-in-dialogue
  type: fill-in
  instruction: Complete the dialogue with the correct words.
  items:
  - sentence: — Привіт! Це ____ брат?
    answer: твій
    options:
    - твій
    - твоя
    - твоє
    - твої
  - sentence: — Так, це мій брат. Ось мій ____.
    answer: тато
    options:
    - мама
    - тато
    - сестра
    - бабуся
  - sentence: — А це ____ сестра.
    answer: моя
    options:
    - мій
    - моя
    - моє
    - мої
  - sentence: — Так, ____ звати Катя.
    answer: її
    options:
    - її
    - його
    - мій
    - твоя
  title: Complete the dialogue with the correct words.
- id: match-family
  type: match-up
  instruction: Match English family words to Ukrainian.
  pairs:
  - left: parents
    right: батьки
  - left: uncle
    right: дядько
  - left: aunt
    right: тітка
  - left: grandfather
    right: дідусь
  - left: grandmother
    right: бабуся
  - left: brother
    right: брат
  - left: sister
    right: сестра
  - left: mother and father
    right: мама і тато
  title: Match English family words to Ukrainian.
- id: quiz-possession
  type: quiz
  instruction: Choose the correct answer based on 'У тебе є...?'.
  items:
  - question: У тебе є брат?
    options:
    - Так, у мене є брат.
    - Це мій брат.
    - Ось мій брат.
    - Так, це мій брат.
    correct: 0
  - question: У тебе є сестра?
    options:
    - Так, це моя сестра.
    - Ні, у мене тільки один брат.
    - Її звати Оля.
    - Ось її мама.
    correct: 1
  - question: У тебе є бабуся?
    options:
    - Це моя бабуся.
    - Його бабуся тут.
    - Так, у мене є бабуся і дідусь.
    - Її звати Тетяна.
    correct: 2
  - question: У тебе є два брати?
    options:
    - Ні, у мене один брат.
    - Так, це мої брати.
    - Це мій тато.
    - Як його звати?
    correct: 0
  - question: У тебе є дідусь?
    options:
    - Це дідусь Євген.
    - Ні.
    - Ось мій дідусь.
    - Як її звати?
    correct: 1
  - question: У тебе є мама і тато?
    options:
    - Це моя сім'я.
    - Ось мій тато.
    - Так, у мене є батьки.
    - Це мій брат і сестра.
    correct: 2
  title: Choose the correct answer based on 'У тебе є...?'.
