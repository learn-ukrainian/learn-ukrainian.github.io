      right: "Мама"
    - left: "Брат"
      right: "Сестра"
    - left: "Дідусь"
      right: "Бабуся"
    - left: "Дядько"
      right: "Тітка"
    - left: "Син"
      right: "Донька"
    - left: "Онук"
      right: "Онука"
    - left: "Чоловік"
      right: "Дружина"
    - left: "Батько"
      right: "Мати"

