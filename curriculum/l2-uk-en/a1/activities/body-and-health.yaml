- type: fill-in
  title: "Expressing Pain"
  instruction: "Choose the correct form of the word to complete the sentence."
  items:
    - sentence: "У мене ___ голова."
      answer: "болить"
      options: ["болить", "болять", "хворий", "погано"]
    - sentence: "У мене ___ очі."
      answer: "болять"
      options: ["болить", "болять", "кашель", "добре"]
    - sentence: "У брата ___ спина."
      answer: "болить"
      options: ["болить", "болять", "лікар", "рецепт"]
    - sentence: "У мами ___ вуха."
      answer: "болять"
      options: ["болить", "болять", "аптека", "нежить"]
    - sentence: "У мене болить ___."
      answer: "живіт"
      options: ["живіт", "ноги", "очі", "руки"]
    - sentence: "У мене болять ___."
      answer: "руки"
      options: ["руки", "горло", "голова", "живіт"]
    - sentence: "У мене ___ горло."
      answer: "болить"
      options: ["болить", "болять", "погано", "лікар"]
    - sentence: "У мене болить ___."
      answer: "голова"
      options: ["голова", "очі", "руки", "ноги"]

- type: fill-in
  title: "Describing Symptoms"
  instruction: "Choose the correct word to describe how you feel."
  items:
    - sentence: "У мене висока ___."
      answer: "температура"
      options: ["температура", "голова", "лікарня", "аптека"]
    - sentence: "Я п'ю гарячий чай, бо в мене сильний ___."
      answer: "кашель"
      options: ["кашель", "живіт", "лікар", "рука"]
    - sentence: "Мені дуже ___."
      answer: "погано"
      options: ["погано", "кашель", "нежить", "голова"]
    - sentence: "Вона сьогодні вдома, бо в неї ___."
      answer: "нежить"
      options: ["нежить", "добре", "краще", "лікар"]
    - sentence: "Я йду в аптеку купити ___."
      answer: "ліки"
      options: ["ліки", "голова", "хворий", "лікарня"]
    - sentence: "Для цього потрібен ___."
      answer: "рецепт"
      options: ["рецепт", "кашель", "живіт", "горло"]
    - sentence: "У мами сильний головний ___."
      answer: "біль"
      options: ["біль", "нежить", "кашель", "рецепт"]
    - sentence: "Я п'ю свої ___."
      answer: "ліки"
      options: ["ліки", "голова", "живіт", "аптека"]

- type: true-false
  title: "True or False?"
  instruction: "Decide if the statements about Ukrainian grammar and culture are correct."
  items:
    - statement: "To say 'I feel bad', you should say 'Я погано'."
      correct: false
      explanation: "You must use the pronoun 'мені': Мені погано."
    - statement: "The word 'ліки' (medicine) is always plural in Ukrainian."
      correct: true
      explanation: "Yes, 'ліки' is a unique plural-only word."
    - statement: "When you say 'У мене болять ноги', you use 'болять' because 'ноги' is plural."
      correct: true
      explanation: "The body part is the subject, so the verb must match its plural form."
    - statement: "A 'лікар' is a building where you go for medical help."
      correct: false
      explanation: "'Лікар' is a doctor (a person). 'Лікарня' is a hospital (a building)."
    - statement: "Ukrainians often drink hot tea with raspberry or viburnum for a cold."
      correct: true
      explanation: "Phytotherapy (траволікування) is a popular traditional method."
    - statement: "If your throat hurts, you say 'Я болю горло'."
      correct: false
      explanation: "You must say 'У мене болить горло'. 'Я болю' means 'I cause pain'."
    - statement: "An 'аптека' is a place where you buy medicine."
      correct: true
      explanation: "Yes, 'аптека' is a pharmacy."
    - statement: "You say 'Я йду в лікаря'."
      correct: false
      explanation: "You say 'Я йду до лікаря' because doctor is a person, not a building."

- type: unjumble
  title: "Build the Sentences"
  instruction: "Put the words in the correct order."
  items:
    - words: ["У", "мене", "дуже", "болить", "голова."]
      answer: "У мене дуже болить голова."
    - words: ["Мені", "сьогодні", "дуже", "погано."]
      answer: "Мені сьогодні дуже погано."
    - words: ["Я", "йду", "до", "сімейного", "лікаря."]
      answer: "Я йду до сімейного лікаря."
    - words: ["У", "вас", "є", "ліки", "від", "кашлю?"]
      answer: "У вас є ліки від кашлю?"
    - words: ["У", "здоровому", "тілі", "—", "здоровий", "дух."]
      answer: "У здоровому тілі — здоровий дух."
    - words: ["Я", "п'ю", "свої", "ліки."]
      answer: "Я п'ю свої ліки."

- type: group-sort
  title: "Singular or Plural?"
  instruction: "Sort the body parts into the correct categories."
  groups:
    - name: "Однина (Singular)"
      items: ["голова", "рука", "нога", "око", "вухо", "живіт"]
    - name: "Множина (Plural)"
      items: ["руки", "ноги", "очі", "вуха"]

- type: quiz
  title: "Health & Pharmacy Quiz"
  instruction: "Choose the best answer for each question."
  items:
    - question: "How do you ask for cough medicine at a pharmacy?"
      explanation: "You say 'У вас є ліки від кашлю?' (Do you have medicine for a cough?)."
      options:
        - text: "У вас є ліки від кашлю?"
          correct: true
        - text: "У мене болить живіт."
          correct: false
        - text: "Я йду в лікарня."
          correct: false
        - text: "Мені дуже добре."
          correct: false
    - question: "Which phrase means 'I feel bad'?"
      explanation: "You must use the dative pronoun 'Мені'."
      options:
        - text: "Мені погано."
          correct: true
        - text: "Я погано."
          correct: false
        - text: "У мене погано."
          correct: false
        - text: "Я хворий."
          correct: false
    - question: "What is a 'сімейний лікар'?"
      explanation: "Сімейний лікар is a family doctor."
      options:
        - text: "A family doctor"
          correct: true
        - text: "A central hospital"
          correct: false
        - text: "A sick relative"
          correct: false
        - text: "A pharmacy"
          correct: false
    - question: "Which word do you use for 'prescription'?"
      explanation: "The word for prescription is рецепт."
      options:
        - text: "рецепт"
          correct: true
        - text: "аптека"
          correct: false
        - text: "ліки"
          correct: false
        - text: "нежить"
          correct: false
    - question: "Complete the proverb: У здоровому тілі — здоровий ___."
      explanation: "The proverb is 'У здоровому тілі — здоровий дух'."
      options:
        - text: "дух"
          correct: true
        - text: "живіт"
          correct: false
        - text: "лікар"
          correct: false
        - text: "кашель"
          correct: false
    - question: "If you have a high fever, you have висока ___."
      explanation: "Fever is температура."
      options:
        - text: "температура"
          correct: true
        - text: "голова"
          correct: false
        - text: "аптека"
          correct: false
        - text: "малина"
          correct: false
    - question: "Which word means 'runny nose'?"
      explanation: "The word for runny nose is нежить."
      options:
        - text: "нежить"
          correct: true
        - text: "кашель"
          correct: false
        - text: "живіт"
          correct: false
        - text: "біль"
          correct: false
    - question: "What do you need to buy strong medicine?"
      explanation: "You need a prescription (рецепт)."
      options:
        - text: "рецепт"
          correct: true
        - text: "аптека"
          correct: false
        - text: "кашель"
          correct: false
        - text: "голова"
          correct: false

- type: fill-in
  title: "Why? (Causes)"
  instruction: "Complete the sentences explaining results."
  items:
    - sentence: "Я хворий. ___ я сиджу вдома."
      answer: "Тому"
      options: ["Тому", "Що", "Як", "Де"]
    - sentence: "У неї температура. Тому вона не ___."
      answer: "працює"
      options: ["працює", "добре", "хворий", "ліки"]
    - sentence: "У нього кашель. Тому він п'є ___."
      answer: "ліки"
      options: ["ліки", "лікар", "аптека", "рецепт"]
    - sentence: "У дитини болить живіт. Тому вона ___."
      answer: "плаче"
      options: ["плаче", "спить", "працює", "п'є"]
    - sentence: "Я хворий. Тому ___ сиджу вдома."
      answer: "я"
      options: ["я", "він", "вона", "вони"]
    - sentence: "У неї температура. Тому ___ не працює."
      answer: "вона"
      options: ["вона", "він", "я", "ми"]
    - sentence: "У нього кашель. Тому ___ п'є ліки."
      answer: "він"
      options: ["він", "вона", "я", "ми"]
    - sentence: "У дитини болить живіт. Тому ___ плаче."
      answer: "вона"
      options: ["вона", "він", "я", "ми"]