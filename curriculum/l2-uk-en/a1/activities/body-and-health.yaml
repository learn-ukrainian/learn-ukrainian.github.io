- type: unjumble
  title: 'Складіть речення'
  instruction: 'Розставте слова у правильному порядку.'
  items:
    - words: ['мене', 'У', 'голова', 'болить']
      answer: 'У мене болить голова'
    - words: ['потрібно', 'Мені', 'лікаря', 'до']
      answer: 'Мені потрібно до лікаря'
