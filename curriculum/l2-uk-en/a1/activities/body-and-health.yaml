    - sentence: 'У мене {{1}} очі.'
      answer: 'болять'
      options: ['болять', 'болить', 'хворіють', 'біль']
      explanation: 'Plural subject (очі) takes plural verb.'
    - sentence: 'У мене {{1}} живіт.'
      answer: 'болить'
      options: ['болить', 'болять', 'хворіє', 'має']
    - sentence: 'У мене {{1}} ноги.'
      answer: 'болять'
      options: ['болять', 'болить', 'хворіють', 'мають']
    - sentence: 'У мене {{1}} горло.'
      answer: 'болить'
