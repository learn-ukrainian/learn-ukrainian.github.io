- type: match-up
  title: 'Частини тіла: переклад'
  instruction: 'З’єднайте українське слово з англійським перекладом.'
  pairs:
    - left: 'голова'
      right: 'head'
    - left: 'рука'
      right: 'arm/hand'
    - left: 'нога'
      right: 'leg/foot'
    - left: 'живіт'
      right: 'stomach'
    - left: 'спина'
      right: 'back'
    - left: 'горло'
      right: 'throat'
    - left: 'очі'
      right: 'eyes'
    - left: 'вуха'
      right: 'ears'

- type: group-sort
  title: 'Рід іменників: частини тіла'
  instruction: 'Розподіліть слова за родом (Він, Вона, Воно).'
  groups:
    - name: 'Він (Masculine)'
      items:
        - 'ніс'
        - 'рот'
        - 'живіт'
        - 'кашель'
    - name: 'Вона (Feminine)'
      items:
        - 'голова'
        - 'спина'
        - 'рука'
        - 'нога'
        - 'температура'
        - 'аптека'
    - name: 'Воно (Neuter)'
      items:
        - 'вухо'
        - 'око'
        - 'горло'
        - 'серце'
        - 'обличчя'
        - 'тіло'

- type: fill-in
  title: 'Однина та множина'
  instruction: 'Оберіть правильну форму слова (однина або множина).'
  items:
    - sentence: 'Це моє {{1}}.'
      answer: 'око'
      options: ['око', 'очі', 'оком', 'ока']
      explanation: '«Це» indicates singular neuter here, pointing to one eye.'
    - sentence: 'У мене гарні {{1}}.'
      answer: 'очі'
      options: ['очі', 'око', 'очей', 'очами']
      explanation: '«Гарні» is plural, so we need the plural form "очі".'
    - sentence: 'У мене болить ліва {{1}}.'
      answer: 'рука'
      options: ['рука', 'руки', 'руку', 'рукою']
      explanation: '«Ліва» is singular feminine, so we need "рука".'
    - sentence: 'Мийте {{1}} перед їжею.'
      answer: 'руки'
      options: ['руки', 'рука', 'рукою', 'рукам']
      explanation: 'Wash your hands (plural).'
    - sentence: 'Це мої {{1}}.'
      answer: 'вуха'
      options: ['вуха', 'вухо', 'вух', 'вухам']
      explanation: '«Мої» is plural.'
    - sentence: 'У мене червоне {{1}}.'
      answer: 'горло'
      options: ['горло', 'горла', 'горлом', 'горлі']
      explanation: '«Червоне» is singular neuter.'
    - sentence: 'У мене болять {{1}}.'
      answer: 'ноги'
      options: ['ноги', 'нога', 'ногою', 'ніг']
      explanation: '«Болять» is plural.'
    - sentence: 'У мене болить праве {{1}}.'
      answer: 'вухо'
      options: ['вухо', 'вуха', 'вухом', 'вух']
      explanation: '«Праве» is singular neuter.'

- type: quiz
  title: 'Правила про здоров’я'
  instruction: 'Оберіть правильну відповідь на запитання.'
  items:
    - question: 'Як правильно сказати, що ви почуваєтеся недобре?'
      explanation: 'Use the dative pronoun: Мені + adverb (погано, добре, краще).'
      options:
        - text: 'Мені погано.'
          correct: true
        - text: 'Я погано.'
          correct: false
        - text: 'Мене погано.'
          correct: false
        - text: 'Моє погано.'
          correct: false
    - question: 'Яка форма дієслова правильна: "У мене ... голова"?'
      explanation: 'Голова (head) is singular, so the verb must be singular.'
      options:
        - text: 'болить'
          correct: true
        - text: 'болять'
          correct: false
        - text: 'хворіє'
          correct: false
        - text: 'має'
          correct: false
    - question: 'Яка форма дієслова правильна: "У мене ... ноги"?'
      explanation: 'Ноги (legs) is plural, so the verb must be plural.'
      options:
        - text: 'болять'
          correct: true
        - text: 'болить'
          correct: false
        - text: 'хворіють'
          correct: false
        - text: 'мають'
          correct: false
    - question: 'Що ми зазвичай купуємо в аптеці, коли хворіємо?'
      explanation: 'We buy medicine (ліки) in a pharmacy.'
      options:
        - text: 'ліки'
          correct: true
        - text: 'продукти'
          correct: false
        - text: 'одяг'
          correct: false
        - text: 'книги'
          correct: false
    - question: 'Як називається людина, яка лікує людей у лікарні?'
      explanation: 'Лікар (doctor) treats people.'
      options:
        - text: 'лікар'
          correct: true
        - text: 'учитель'
          correct: false
        - text: 'водій'
          correct: false
        - text: 'кухар'
          correct: false
    - question: 'Що означає слово "температура" в українській мові?'
      explanation: 'Температура means fever or temperature.'
      options:
        - text: 'fever'
          correct: true
        - text: 'pain'
          correct: false
        - text: 'cough'
          correct: false
        - text: 'health'
          correct: false
    - question: 'Як правильно попросити ліки в аптеці?'
      explanation: 'We use "Дайте, будь ласка..." to politely ask for medicine.'
      options:
        - text: 'Дайте, будь ласка, ліки від кашлю.'
          correct: true
        - text: 'Я хочу грати.'
          correct: false
        - text: 'Де автобус?'
          correct: false
        - text: 'Скільки людей?'
          correct: false
    - question: 'Якого граматичного роду слово "серце" в українській мові?'
      explanation: 'Серце (heart) is neuter (воно).'
      options:
        - text: 'Середнього (Neuter)'
          correct: true
        - text: 'Чоловічого (Masculine)'
          correct: false
        - text: 'Жіночого (Feminine)'
          correct: false
        - text: 'Множина (Plural)'
          correct: false

