- type: quiz
  title: General Knowledge
  instruction: Choose the correct translation or answer.
  items:
    - question: "How do you say 'I feel bad'?"
      options:
        - text: "Мені погано"
          correct: true
        - text: "Я погано"
          correct: false
        - text: "Я є поганий"
          correct: false
        - text: "Моє погано"
          correct: false
    - question: "How do you say 'I have a fever'?"
      options:
        - text: "У мене температура"
          correct: true
        - text: "Я маю температуру"
          correct: false
        - text: "Я є температура"
          correct: false
        - text: "Моя температура"
          correct: false
    - question: "What does the sign 'Зелений хрест' mean?"
      options:
        - text: "Green cross (Pharmacy sign)"
          correct: true
        - text: "Red cross (Hospital sign)"
          correct: false
        - text: "Blue cross (Police sign)"
          correct: false
        - text: "Yellow cross (Taxi sign)"
          correct: false
    - question: "Please translate the sentence 'Я шукаю аптеку'."
      options:
        - text: "I am looking for a pharmacy."
          correct: true
        - text: "I see a pharmacy."
          correct: false
        - text: "I am going to a pharmacy."
          correct: false
        - text: "I like this pharmacy."
          correct: false
    - question: "What does the Ukrainian word 'Малина' mean?"
      options:
        - text: "Raspberry"
          correct: true
        - text: "Strawberry"
          correct: false
        - text: "Apple"
          correct: false
        - text: "Lemon"
          correct: false
    - question: "How do you say 'I drink tea' in Ukrainian?"
      options:
        - text: "Я п'ю чай"
          correct: true
        - text: "Я їм чай"
          correct: false
        - text: "Я роблю чай"
          correct: false
        - text: "Я бачу чай"
          correct: false
    - question: "What is the meaning of the phrase 'Мені добре'?"
      options:
        - text: "I feel good"
          correct: true
        - text: "I am good"
          correct: false
        - text: "I have good"
          correct: false
        - text: "I do good"
          correct: false
    - question: "Translate the request 'Дайте, будь ласка, сироп'."
      options:
        - text: "Give me syrup, please."
          correct: true
        - text: "Do you have syrup?"
          correct: false
        - text: "Where is syrup?"
          correct: false
        - text: "I want syrup."
          correct: false
    - question: "Identify which of these words is plural."
      options:
        - text: "Ліки"
          correct: true
        - text: "Аптека"
          correct: false
        - text: "Сироп"
          correct: false
        - text: "Таблетка"
          correct: false
    - question: "What do you do when you 'відпочивати'?"
      options:
        - text: "Rest"
          correct: true
        - text: "Run"
          correct: false
        - text: "Work"
          correct: false
        - text: "Study"
          correct: false
    - question: "Translate the sentence 'У нього болить голова'."
      options:
        - text: "He has a headache."
          correct: true
        - text: "I have a headache."
          correct: false
        - text: "She has a headache."
          correct: false
        - text: "They have a headache."
          correct: false
