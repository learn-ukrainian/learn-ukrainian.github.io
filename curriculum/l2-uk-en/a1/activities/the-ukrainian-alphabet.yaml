- type: fill-in
  title: "Complete the Phrase"
  instruction: "Choose the correct word to complete the sentence."
  items:
    - sentence: "Це ___."
      answer: "кіт"
      options: ["кіт", "сон", "там", "ні"]
    - sentence: "Ма́ма ___."
      answer: "тут"
      options: ["тут", "ліс", "так", "це"]
    - sentence: "___ молоко́."
      answer: "Це"
      options: ["Це", "Ніс", "Сом", "Там"]
    - sentence: "Та́то ___."
      answer: "там"
      options: ["там", "кіт", "о́ко", "ні"]
    - sentence: "— Це мі́сто? — ___, це ліс."
      answer: "Ні"
      options: ["Ні", "Так", "Це", "Тут"]
    - sentence: "— Це кіт? — ___, це кіт."
      answer: "Так"
      options: ["Так", "Ні", "Стіл", "Ліс"]
    - sentence: "Це ___ ."
      answer: "масло"
      options: ["масло", "ніс", "тут", "ні"]
    - sentence: "Тут ___, там місто."
      answer: "ліс"
      options: ["ліс", "так", "це", "кіт"]

- type: anagram
  title: "Unscramble the Word"
  instruction: "Rearrange the letters to form a word from the lesson."
  items:
    - scrambled: "А М А М"
      answer: "МАМА"
    - scrambled: "І К Т"
      answer: "КІТ"
    - scrambled: "О Л М К О О"
      answer: "МОЛОКО"
    - scrambled: "О С І М Т"
      answer: "МІСТО"
    - scrambled: "А О Т Т"
      answer: "ТАТО"
    - scrambled: "С А М О Л"
      answer: "МАСЛО"
    - scrambled: "О К О"
      answer: "ОКО"
    - scrambled: "С І Л"
      answer: "ЛІС"

- type: true-false
  title: "Alphabet Facts"
  instruction: "Decide if the statement is true or false."
  items:
    - statement: "The Ukrainian alphabet has 33 letters."
      correct: true
      explanation: "There are 33 letters representing 38 sounds."
    - statement: "Every syllable in a Ukrainian word must have exactly one vowel."
      correct: true
      explanation: "Vowels form the core of the syllable. You can count syllables by counting vowels."
    - statement: "The letter Н sounds exactly like the English H."
      correct: false
      explanation: "The letter Н is a 'false friend' and sounds like the English N."
    - statement: "The letter С sounds like the English S."
      correct: true
      explanation: "С looks like C but makes the S sound."
    - statement: "Ukrainian spelling is highly phonetic, with no silent letters."
      correct: true
      explanation: "You pronounce every letter you see."
    - statement: "The Cyrillic alphabet was derived from the Latin alphabet."
      correct: false
      explanation: "It was derived from the Greek uncial script."