- type: quiz
  title: "Read the Word"
  instruction: "Choose the correct English translation for the Ukrainian word."
  items:
    - question: "What does ма́ма mean?"
      explanation: "Ма́ма means mom."
      options:
        - text: "mom"
          correct: true
        - text: "dad"
          correct: false
        - text: "cat"
          correct: false
        - text: "table"
          correct: false
    - question: "What does молоко́ mean?"
      explanation: "Молоко́ means milk."
      options:
        - text: "milk"
          correct: true
        - text: "juice"
          correct: false
        - text: "butter"
          correct: false
        - text: "poppy"
          correct: false
    - question: "What does мі́сто mean?"
      explanation: "Мі́сто means city."
      options:
        - text: "city"
          correct: true
        - text: "forest"
          correct: false
        - text: "cinema"
          correct: false
        - text: "table"
          correct: false
    - question: "What does так mean?"
      explanation: "Так means yes."
      options:
        - text: "yes"
          correct: true
        - text: "no"
          correct: false
        - text: "hello"
          correct: false
        - text: "thank you"
          correct: false
    - question: "What does ніс mean?"
      explanation: "Ніс means nose. Remember that Н makes the 'N' sound."
      options:
        - text: "nose"
          correct: true
        - text: "eye"
          correct: false
        - text: "cat"
          correct: false
        - text: "catfish"
          correct: false
    - question: "What does стіл mean?"
      explanation: "Стіл means table."
      options:
        - text: "table"
          correct: true
        - text: "forest"
          correct: false
        - text: "dream"
          correct: false
        - text: "cinema"
          correct: false
    - question: "What does кіт mean?"
      explanation: "Кіт means cat."
      options:
        - text: "cat"
          correct: true
        - text: "nose"
          correct: false
        - text: "poppy"
          correct: false
        - text: "dad"
          correct: false
    - question: "What does ліс mean?"
      explanation: "Ліс means forest."
      options:
        - text: "forest"
          correct: true
        - text: "table"
          correct: false
