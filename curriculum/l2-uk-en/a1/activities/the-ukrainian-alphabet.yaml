- type: classify
  title: "Vowels vs Consonants"
  instruction: "Sort the 10 practice letters into their correct categories."
  categories:
    - label: "Голосні"
      symbol_hint: "vowel"
      items: ["А", "О", "У", "І"]
    - label: "Приголосні"
      symbol_hint: "consonant"
      items: ["М", "Н", "Т", "К", "С", "Л"]

- type: match-up
  title: "Letter to English Sound Match"
  instruction: "Match the Ukrainian letter to the sound it makes."
  pairs:
    - left: "Н"
      right: "sounds like N"
    - left: "С"
      right: "sounds like S"
    - left: "А"
      right: "sounds like open a"
    - left: "У"
      right: "sounds like oo"
    - left: "І"
      right: "sounds like ee"
    - left: "М"
      right: "sounds like M"
    - left: "Т"
      right: "sounds like T"
    - left: "К"
      right: "sounds like K"
    - left: "Л"
      right: "sounds like L"
    - left: "О"
      right: "sounds like rounded o"

