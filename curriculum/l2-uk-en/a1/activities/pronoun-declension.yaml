- type: match-up
  title: "Знайомство з формами: Знайдіть переклад"
  instruction: "Welcome, detective! Let's start by matching the Ukrainian pronoun forms with their English meanings."
  pairs:
    - left: "мене"
      right: "me (direct object)"
    - left: "тебе"
      right: "you (direct object, singular)"
    - left: "його"
      right: "him / it (direct object)"
    - left: "її"
      right: "her (direct object)"
    - left: "нас"
      right: "us"
    - left: "вас"
      right: "you (plural/formal)"
    - left: "їх"
      right: "them"
    - left: "мені"
      right: "to me / on me"

- type: fill-in
  title: "Знахідний відмінок: Прямий додаток"
  instruction: "Let's find the missing direct objects. Choose the correct Accusative pronoun to complete the sentence."
  items:
    - sentence: "Я дуже добре знаю _____."
      answer: "її"
      options:
        - "вона"
        - "її"
        - "їй"
        - "неї"
      explanation: "The verb 'знати' requires the Accusative case. The direct object form of вона is її."
    - sentence: "Вчитель зараз слухає _____."
      answer: "нас"
      options:
        - "ми"
        - "наш"
        - "нас"
        - "нам"
      explanation: "The verb 'слухати' requires the Accusative case."
    - sentence: "Де Іван? Я не бачу _____."
      answer: "його"
      options:
        - "він"
        - "його"
        - "йому"
        - "ньому"
      explanation: "The verb 'бачити' requires the Accusative case. The form for він is його."
    - sentence: "Директор сьогодні чекає _____."
      answer: "вас"
      options:
        - "ви"
        - "вас"
        - "вам"
        - "ваші"
      explanation: "The verb 'чекати' takes the Accusative case."
    - sentence: "Мій брат бачить _____."
      answer: "мене"
      options:
        - "я"
        - "мій"
        - "мені"
        - "мене"
      explanation: "The direct object form of я is мене."
    - sentence: "Студенти там. Викликай _____."
      answer: "їх"
      options:
        - "вони"
        - "їм"
        - "їх"
        - "них"
      explanation: "The direct object form of вони is їх."
    - sentence: "Я купив квиток і загубив _____."
      answer: "його"
      options:
        - "він"
        - "його"
        - "йому"
        - "нього"
      explanation: "The pronoun refers to квиток (masculine), so it takes його in Accusative."
    - sentence: "Ти знаєш _____ дуже добре."
      answer: "мене"
      options:
        - "я"
        - "мене"
        - "мені"
        - "моя"
      explanation: "The direct object form of я is мене."

- type: true-false
  title: "Правило префікса н-"
  instruction: "Time to verify the facts! Determine if these statements about the н- prefix rule are true or false."
  items:
    - statement: "Після прийменників займенники третьої особи завжди мають префікс н-."
      correct: true
      explanation: "Third person pronouns (його, її, їх) consistently take the н- prefix after prepositions."
    - statement: "Правильно говорити: Цей подарунок для його."
      correct: false
      explanation: "The correct form is 'для нього', because 'для' is a preposition."
    - statement: "Займенники першої та другої особи ніколи не отримують префікс н-."
      correct: true
      explanation: "The н- prefix only applies to third person pronouns (він, вона, воно, вони)."
    - statement: "У фразі 'його брат' слово 'його' потребує префікса н-."
      correct: false
      explanation: "There is no preposition here. 'його' simply shows possession, so no prefix is needed."
    - statement: "Правильна форма місцевого відмінка - 'на ньому', а не 'на йому'."
      correct: true
      explanation: "The Locative case always uses a preposition, so third person pronouns always have н- (на ньому)."
    - statement: "Правильно говорити: Я дивлюся на них."
      correct: true
      explanation: "The preposition 'на' requires the н- prefix for їх, making it 'них'."
    - statement: "Слово вас може бути звертанням до однієї людини з повагою."
      correct: true
      explanation: "Yes, 'вас' is used for both plural 'you' and formal singular 'You'."
    - statement: "Форми знахідного і родового відмінків для слова я відрізняються."
      correct: false
      explanation: "They are exactly the same: 'мене' is used in both Accusative and Genitive."

- type: quiz
  title: "Давальний чи Місцевий?"
  instruction: "Are we dealing with Dative or Locative? Examine the context closely and choose the correct pronoun."
  items:
    - question: "Як правильно сказати 'I am cold' українською?"
      options:
        - text: "Мені холодно"
          correct: true
        - text: "Я холодно"
          correct: false
        - text: "Мене холодно"
          correct: false
        - text: "На мені холодно"
          correct: false
      explanation: "The Dative construction is used for physical and emotional states: 'Мені холодно'."
    - question: "Який займенник потрібен у реченні: 'Дай ____ ручку, будь ласка'?"
      options:
        - text: "мені"
          correct: true
        - text: "мене"
          correct: false
        - text: "я"
          correct: false
        - text: "на мені"
          correct: false
      explanation: "The verb 'давати' (to give) logically requires the Dative case (мені)."
    - question: "Яка форма правильна для речення: '_____ дуже подобається ця пісня'?"
      options:
        - text: "Вона"
          correct: false
        - text: "Її"
          correct: false
        - text: "Їй"
          correct: true
        - text: "Неї"
          correct: false
      explanation: "The 'подобається' construction requires the Dative case to show who likes it."
    - question: "Оберіть правильний варіант: 'На ____ новий діловий костюм'."
      options:
        - text: "його"
          correct: false
        - text: "йому"
          correct: false
        - text: "нього"
          correct: false
        - text: "ньому"
          correct: true
      explanation: "The preposition 'на' for location requires the Locative case with the н- prefix."
    - question: "Доповніть речення: 'Лікар швидко допомагає ____'."
      options:
        - text: "нас"
          correct: false
        - text: "нам"
          correct: true
        - text: "ми"
          correct: false
        - text: "на нас"
          correct: false
      explanation: "The verb 'допомагати' (to help) strongly requires the Dative case."
    - question: "Як українською сказати фразу 'We are talking about them'?"
      options:
        - text: "Ми говоримо про їх"
          correct: false
        - text: "Ми говоримо про них"
          correct: true
        - text: "Ми говоримо про їм"
          correct: false
        - text: "Ми говоримо на них"
          correct: false
      explanation: "The preposition 'про' requires the Accusative. For вони, the form with a preposition is 'них'."
    - question: "Яка форма займенника правильна: 'Напиши ____ коротке повідомлення'?"
      options:
        - text: "їй"
          correct: true
        - text: "її"
          correct: false
        - text: "неї"
          correct: false
        - text: "вона"
          correct: false
      explanation: "The verb 'писати' (to write to someone) requires the Dative case."
    - question: "Як сказати англійську фразу 'It is sad for him today'?"
      options:
        - text: "Йому сьогодні сумно"
          correct: true
        - text: "Він сьогодні сумно"
          correct: false
        - text: "Його сьогодні сумно"
          correct: false
        - text: "На ньому сьогодні сумно"
          correct: false
      explanation: "Emotions are naturally expressed with the Dative case: 'Йому сумно'."

- type: fill-in
  title: "Родовий відмінок: Наявність та відсутність"
  instruction: "Investigate possession and absence. Complete the sentences using the correct Genitive pronoun."
  items:
    - sentence: "У _____ є великий собака."
      answer: "мене"
      options:
        - "я"
        - "мене"
        - "мені"
        - "мій"
      explanation: "The 'у мене є' possession construction relies on the Genitive case."
    - sentence: "Сьогодні _____ немає вдома."
      answer: "мене"
      options:
        - "я"
        - "мене"
        - "мені"
        - "моя"
      explanation: "The word 'немає' (absence) strictly requires the Genitive case."
    - sentence: "У _____ є вільний час?"
      answer: "тебе"
      options:
        - "ти"
        - "тобі"
        - "тебе"
        - "твій"
      explanation: "To ask 'Do you have', use 'У тебе є'."
    - sentence: "Її чомусь немає на роботі, ми чекаємо без _____."
      answer: "неї"
      options:
        - "її"
        - "неї"
        - "їй"
        - "ній"
      explanation: "After the preposition 'без', the third person pronoun needs the н- prefix."
    - sentence: "У _____ є нові цікаві ідеї."
      answer: "нас"
      options:
        - "ми"
        - "нам"
        - "нас"
        - "наші"
      explanation: "The 'у нас є' construction uses the Genitive case to show possession."
    - sentence: "Чому _____ немає на уроці?"
      answer: "вас"
      options:
        - "ви"
        - "вам"
        - "вас"
        - "ваші"
      explanation: "The word 'немає' requires the Genitive case (вас)."
    - sentence: "У _____ є питання до директора?"
      answer: "вас"
      options:
        - "ви"
        - "вам"
        - "вас"
        - "ваші"
      explanation: "Possession requires the Genitive case (у вас)."
    - sentence: "Цей смачний торт тільки для _____."
      answer: "неї"
      options:
        - "вона"
        - "її"
        - "неї"
        - "ній"
      explanation: "After the preposition 'для', 'її' gets the н- prefix and becomes 'неї'."

