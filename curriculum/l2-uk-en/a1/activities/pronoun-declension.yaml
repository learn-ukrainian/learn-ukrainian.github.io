- type: unjumble
  title: "Складіть речення: Знахідний та Родовий"
  instruction: "Can you reconstruct the scene? Unjumble the words to form correct sentences using Accusative and Genitive cases."
  items:
    - words:
        - "я"
        - "дуже"
        - "добре"
        - "знаю"
        - "її"
      answer: "Я дуже добре знаю її."
    - words:
        - "у"
        - "тебе"
        - "є"
        - "вільний"
        - "час"
      answer: "У тебе є вільний час?"
    - words:
        - "сьогодні"
        - "мене"
        - "немає"
        - "вдома"
      answer: "Сьогодні мене немає вдома."
    - words:
        - "ми"
        - "давно"
        - "чекаємо"
        - "на"
        - "неї"
      answer: "Ми давно чекаємо на неї."
    - words:
        - "я"
        - "не"
        - "можу"
        - "жити"
        - "без"
        - "тебе"
      answer: "Я не можу жити без тебе."
    - words:
        - "цей"
        - "гарний"
        - "подарунок"
        - "для"
        - "мене"
      answer: "Цей гарний подарунок для мене."

- type: quiz
  title: "Прийменники та Займенники"
  instruction: "Examine the prepositions! Choose the correct pronoun form that follows the preposition in each case."
  items:
    - question: "Як правильно сказати 'for him' українською?"
      options:
        - text: "для нього"
          correct: true
        - text: "для його"
          correct: false
        - text: "для йому"
          correct: false
        - text: "для ньому"
          correct: false
      explanation: "The preposition 'для' takes the Genitive. The third person pronoun 'його' becomes 'нього'."
    - question: "Оберіть правильний варіант перекладу 'without them':"
      options:
        - text: "без їх"
          correct: false
        - text: "без них"
          correct: true
        - text: "без їм"
          correct: false
        - text: "без нас"
          correct: false
      explanation: "The preposition 'без' takes the Genitive. The third person pronoun 'їх' becomes 'них'."
    - question: "Яка форма правильна після прийменника 'про' (about her)?"
      options:
        - text: "про її"
          correct: false
        - text: "про неї"
          correct: true
        - text: "про ній"
          correct: false
        - text: "про їй"
          correct: false
      explanation: "The preposition 'про' takes the Accusative. The third person pronoun 'її' becomes 'неї'."
    - question: "Як українською сказати фразу 'near him'?"
      options:
        - text: "біля нього"
          correct: true
        - text: "біля його"
          correct: false
        - text: "біля йому"
          correct: false
        - text: "біля ньому"
          correct: false
      explanation: "The preposition 'біля' takes the Genitive. The pronoun 'його' becomes 'нього'."
    - question: "Чи потрібен префікс н- у фразі 'для тебе' (for you)?"
      options:
        - text: "Ні, префікс потрібен тільки для третьої особи"
          correct: true
        - text: "Так, правильно 'для нетебе'"
          correct: false
        - text: "Так, після всіх прийменників"
          correct: false
        - text: "Ні, бо 'для' не вимагає префікса"
          correct: false
      explanation: "No, the н- prefix is only ever added to third person pronouns, not 'тебе'."
    - question: "Оберіть правильний переклад для фрази 'on it' (про стіл):"
      options:
        - text: "на ньому"
          correct: true
        - text: "на йому"
          correct: false
        - text: "на нього"
          correct: false
        - text: "на його"
          correct: false
      explanation: "The preposition 'на' for location takes the Locative case. The form for воно/він is 'ньому'."
    - question: "Як правильно сказати англійську фразу 'Look at them'?"
      options:
        - text: "Подивись на них"
          correct: true
        - text: "Подивись на їх"
          correct: false
        - text: "Подивись на їм"
          correct: false
        - text: "Подивись на вас"
          correct: false
      explanation: "The preposition 'на' takes Accusative here, and actively requires the н- prefix."
    - question: "Чи правильне речення: 'Ця цікава книга про нього'?"
      options:
        - text: "Так, абсолютно правильно"
          correct: true
        - text: "Ні, треба 'про його'"
          correct: false
        - text: "Ні, треба 'про йому'"
          correct: false
        - text: "Ні, треба 'про ньому'"
          correct: false
      explanation: "Yes, 'про' is a preposition, so the pronoun 'його' rightfully becomes 'нього'."

