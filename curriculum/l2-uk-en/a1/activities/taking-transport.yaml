- type: fill-in
  title: 'Діалог у маршрутці'
  instruction: 'Fill in the missing words to complete the dialogue.'
  items:
    - sentence: '— Передайте, будь ласка, за {{answer}}.'
      answer: 'проїзд'
      options: ['проїзд', 'квиток', 'вихід', 'вхід']
      explanation: 'Стандартна фраза: Передайте за проїзд.'
    - sentence: '— Скільки з мене? — {{answer}} гривень.'
      answer: 'П''ятнадцять'
      options: ['П''ятнадцять', 'Багато', 'Гроші', 'Квиток']
      explanation: 'Потрібно назвати число (ціну).'
    - sentence: '— Ви {{answer}} на наступній?'
      answer: 'виходите'
      options: ['виходите', 'йдете', 'сидите', 'стоїте']
      explanation: 'Питання до пасажира попереду: Ви виходите?'
    - sentence: '— Так, я виходжу. Дозвольте {{answer}}.'
      answer: 'пройти'
      options: ['пройти', 'стати', 'сісти', 'лежати']
      explanation: 'Ввічливе прохання пропустити до виходу.'
    - sentence: '— Водію! На {{answer}}, будь ласка!'
      answer: 'зупинці'
      options: ['зупинці', 'дорозі', 'світлофорі', 'повороті']
      explanation: 'Прохання зупинити автобус.'
    - sentence: '— Дякую! Гарного {{answer}}!'
      answer: 'дня'
      options: ['дня', 'раку', 'часу', 'автобуса']
      explanation: 'Ввічливе прощання.'
    - sentence: '— Передайте {{answer}} водію.'
      answer: 'гроші'
      options: ['гроші', 'квиток', 'проїзд', 'картку']
      explanation: 'Ми передаємо гроші або оплату.'
    - sentence: '— Я {{answer}} на наступній.'
      answer: 'виходжу'
      options: ['виходжу', 'їду', 'сиджу', 'йду']
      explanation: 'Попередження про вихід.'