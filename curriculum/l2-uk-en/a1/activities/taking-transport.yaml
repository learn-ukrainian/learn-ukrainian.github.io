- type: quiz
  title: 'Перевірка розуміння тексту'
  instruction: 'Choose the correct answer based on the lesson text.'
  items:
    - question: 'Яка станція метро в Києві є найглибшою у світі?'
      options:
        - text: 'Арсенальна'
          correct: true
        - text: 'Хрещатик'
          correct: false
        - text: 'Вокзальна'
          correct: false
        - text: 'Політехнічний інститут'
          correct: false
      explanation: 'Станція Арсенальна розташована на глибині 105,5 метрів.'
    - question: 'Як називається маленьке жовте маршрутне таксі?'
      options:
        - text: 'маршрутка'
          correct: true
        - text: 'таксі'
          correct: false
        - text: 'автобус'
          correct: false
        - text: 'метро'
          correct: false
      explanation: 'Маршрутне таксі скорочено називають маршрутка.'
    - question: 'Чим ми зазвичай платимо в метро Києва?'
      options:
        - text: 'смартфоном або карткою'
          correct: true
        - text: 'готівкою водію'
          correct: false
        - text: 'паперовим квитком'
          correct: false
        - text: 'жетоном'
          correct: false
      explanation: 'У метро Києва діє безготівкова оплата через валідатори.'
    - question: 'Як називається місце, де ми переходимо з однієї лінії на іншу?'
      options:
        - text: 'пересадка'
          correct: true
        - text: 'вихід'
          correct: false
        - text: 'вхід'
          correct: false
        - text: 'зупинка'
          correct: false
      explanation: 'Зміна лінії метро називається пересадка.'
    - question: 'Що треба зробити, якщо ви хочете вийти з маршрутки?'
      options:
        - text: 'сказати водію про зупинку'
          correct: true
        - text: 'просто чекати біля дверей'
          correct: false
        - text: 'натиснути червону кнопку'
          correct: false
        - text: 'подзвонити в дзвіночок'
          correct: false
      explanation: 'У маршрутці треба голосно сказати водію: На зупинці, будь ласка!'
    - question: 'Який відмінок ми використовуємо для транспорту (Чим?)?'
      options:
        - text: 'Орудний відмінок'
          correct: true
        - text: 'Називний відмінок'
          correct: false
        - text: 'Родовий відмінок'
          correct: false
        - text: 'Місцевий відмінок'
          correct: false
      explanation: 'Ми використовуємо Орудний відмінок (Instrumental Case) для засобів транспорту.'
    - question: 'Який транспорт їде під землею?'
      options:
        - text: 'метро'
          correct: true
        - text: 'автобус'
          correct: false
        - text: 'трамвай'
          correct: false
        - text: 'таксі'
          correct: false
      explanation: 'Метро — це підземний вид транспорту.'
    - question: 'Що треба зробити з квитком?'
      options:
        - text: 'завалідувати'
          correct: true
        - text: 'з’їсти'
          correct: false
        - text: 'викинути'
          correct: false
        - text: 'сховати'
          correct: false
      explanation: 'Квиток потрібно завалідувати.'

- type: fill-in
  title: 'Чим ви їдете? (Instrumental Case)'
  instruction: 'Complete the sentences using the correct form of the transport in Instrumental case.'
  items:
    - sentence: 'Я щоранку їду на роботу на {{answer}}.'
      answer: 'метро'
      options: ['метро', 'метром', 'метрі', 'метру']
      explanation: 'Слово метро не змінюється; з ним вживається прийменник «на».'
    - sentence: 'Мій брат любить їздити {{answer}}.'
      answer: 'автобусом'
      options: ['автобусом', 'автобус', 'автобусу', 'автобусі']
      explanation: 'Автобус (чоловічий рід) в орудному відмінку має закінчення -ом.'
    - sentence: 'Ми їдемо в центр {{answer}}.'
      answer: 'трамваєм'
      options: ['трамваєм', 'трамвай', 'трамваї', 'трамваю']
      explanation: 'Трамвай (м''яка група) в орудному відмінку має закінчення -єм.'
    - sentence: 'Студенти часто їздять {{answer}}.'
      answer: 'тролейбусом'
      options: ['тролейбусом', 'тролейбус', 'тролейбусі', 'тролейбуса']
      explanation: 'Тролейбус в орудному відмінку має закінчення -ом.'
    - sentence: 'Увечері найзручніше їхати на {{answer}}.'
      answer: 'таксі'
      options: ['таксі', 'таксем', 'таксом', 'таксу']
      explanation: 'Слово таксі не змінюється; з ним вживається прийменник «на».'
    - sentence: 'Туристи люблять подорожувати {{answer}}.'
      answer: 'поїздом'
      options: ['поїздом', 'поїзд', 'поїзді', 'поїзда']
      explanation: 'Поїзд в орудному відмінку має закінчення -ом.'
    - sentence: 'Вона їде до школи {{answer}}.'
      answer: 'тролейбусом'
      options: ['тролейбусом', 'тролейбус', 'тролейбусу', 'тролейбусі']
      explanation: 'Тролейбус (чоловічий рід) в орудному відмінку має закінчення -ом.'
    - sentence: 'Вони їдуть на вокзал на {{answer}}.'
      answer: 'метро'
      options: ['метро', 'метром', 'метрі', 'метру']
      explanation: 'Слово метро не змінюється; з ним вживається прийменник «на».'

- type: unjumble
  title: 'Складіть речення'
  instruction: 'Put the words in the correct order to form a sentence.'
  items:
    - words: ['на', 'роботу', 'їду', 'автобусом', 'Я', '.']
      answer: 'Я їду на роботу автобусом.'
    - words: ['Наступна', 'станція', '—', 'Університет', '.']
      answer: 'Наступна станція — Університет.'
    - words: ['треба', 'пересадку', 'зробити', 'Мені', '.']
      answer: 'Мені треба зробити пересадку.'
    - words: ['Обережно,', 'двері', 'зараз', 'зачиняються', '.']
      answer: 'Обережно, двері зараз зачиняються.'
    - words: ['доїхати', 'Як', 'до', 'вокзалу', '?']
      answer: 'Як доїхати до вокзалу?'
    - words: ['квиток', 'завалідувати', 'Не', 'забудьте', '.']
      answer: 'Не забудьте завалідувати квиток.'

- type: true-false
  title: 'Правила етикету та факти'
  instruction: 'Decide if the statement is True or False regarding transport in Ukraine.'
  items:
    - statement: 'У маршрутці можна платити карткою через валідатор.'
      correct: false
      explanation: 'У маршрутках зазвичай платять готівкою водію.'
    - statement: 'Слово "метро" змінюється за відмінками (метром, метрі).'
      correct: false
      explanation: 'Слово "метро" є незмінним іншомовним словом.'
    - statement: 'Щоб вийти з маршрутки, треба попросити водія зупинитися.'
      correct: true
      explanation: 'Маршрутки зупиняються на вимогу пасажирів.'
    - statement: 'У Києві жетони все ще популярні для оплати метро.'
      correct: false
      explanation: 'Жетони більше не використовуються; діє електронна система оплати.'
    - statement: 'Коли двері метро зачиняються, треба бігти швидше.'
      correct: false
      explanation: 'Це небезпечно! Треба зачекати наступний поїзд.'
    - statement: 'Станція "Арсенальна" дуже глибока, тому ескалатор їде довго.'
      correct: true
      explanation: 'Це найглибша станція у світі.'
    - statement: 'Тролейбус їздить швидше за метро.'
      correct: false
      explanation: 'Метро значно швидше, бо немає заторів.'
    - statement: 'Маршрутки зупиняються на кожній зупинці автоматично.'
      correct: false
      explanation: 'У маршрутці треба попередити водія про зупинку.'

- type: fill-in
  title: 'Іти чи Їхати?'
  instruction: 'Choose the correct verb: "іти" (walk) or "їхати" (ride).'
  items:
    - sentence: 'Я {{answer}} додому пішки, бо погода гарна.'
      answer: 'йду'
      options: ['йду', 'їду', 'ходити', 'їздити']
      explanation: 'Пішки (on foot) означає, що ми використовуємо дієслово йти.'
    - sentence: 'Ми {{answer}} на роботу на машині.'
      answer: 'їдемо'
      options: ['їдемо', 'йдемо', 'ходимо', 'їздимо']
      explanation: 'На машині (by car) означає транспорт, тому їхати.'
    - sentence: 'Студенти {{answer}} в університет на метро.'
      answer: 'їдуть'
      options: ['їдуть', 'йдуть', 'ходять', 'їздять']
      explanation: 'На метро — це транспорт, тому їхати.'
    - sentence: 'Він {{answer}} в магазин, це дуже близько.'
      answer: 'іде'
      options: ['іде', 'їде', 'ходить', 'їздить']
      explanation: 'Близько зазвичай ходять пішки (іти).'
    - sentence: 'Ви {{answer}} до Львова поїздом?'
      answer: 'їдете'
      options: ['їдете', 'йдете', 'ходите', 'їздите']
      explanation: 'Поїзд — це транспорт, тому їхати.'
    - sentence: 'Чому ти {{answer}} так повільно?'
      answer: 'ідеш'
      options: ['ідеш', 'їдеш', 'ходиш', 'їздиш']
      explanation: 'Контекст руху людини ногами (walking).'
    - sentence: 'Діти {{answer}} до школи пішки.'
      answer: 'йдуть'
      options: ['йдуть', 'їдуть', 'ходять', 'їздять']
      explanation: 'Пішки — це завжди іти.'
    - sentence: 'Ми завтра {{answer}} у відпустку.'
      answer: 'їдемо'
      options: ['їдемо', 'йдемо', 'їздимо', 'ходимо']
      explanation: 'У відпустку (на далеку відстань) — їхати.'

