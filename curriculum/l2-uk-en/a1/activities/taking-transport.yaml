- type: group-sort
  title: 'Де чи Куди? (Location vs. Direction)'
  instruction: 'Sort the phrases based on whether they answer "Where?" (Location/Static) or "Where to?" (Direction/Motion).'
  groups:
    - name: 'Де? (Location - Locative)'
      items:
        - 'я стою на зупинці'
        - 'ми сидимо в автобусі'
        - 'вона чекає на станції'
        - 'ти зараз у метро'
        - 'пасажири у вагоні'
        - 'вони сидять у трамваї'
    - name: 'Куди? (Direction - Accusative)'
      items:
        - 'я йду на зупинку'
        - 'ми заходимо в автобус'
        - 'вона йде на станцію'
        - 'ти спускаєшся в метро'
        - 'пасажири заходять у вагон'
        - 'ми заходимо в трамвай'

- type: match-up
