- type: match-up
  title: "Практична комунікація"
  instruction: "З'єднайте питання з правильною відповіддю."
  pairs:
    - left: "Де знаходиться головний вокзал?"
      right: "Він там, прямо і направо."
    - left: "Скільки коштує цей квиток?"
      right: "Рівно сто гривень."
    - left: "Вибачте, котра зараз година?"
      right: "Зараз рівно друга година дня."
    - left: "Що ви будете пити?"
      right: "Я буду чорну каву без цукру."
    - left: "Куди ви йдете сьогодні?"
      right: "Ми йдемо в новий магазин."
    - left: "Ви добре розумієте українську?"
      right: "Так, я розумію і трохи говорю."
    - left: "Хто це такий?"
      right: "Це наш новий вчитель."
    - left: "Що це таке?"
      right: "Це смачна львівська кава."
    - left: "Де ти працюєш?"
      right: "Я працюю в новому офісі."
    - left: "Звідки ви приїхали?"
      right: "Я приїхав з Києва."
    - left: "Дайте, будь ласка, один квиток."
      right: "Прошу, ваш квиток. Щасливої дороги!"
    - left: "Дякую за каву!"
      right: "Прошу, смачного!"

- type: fill-in
  title: "Діалоги: вокзал та кафе"
  instruction: "Виберіть правильне слово для кожного пропуску в діалогах."
  items:
    - sentence: "Добрий день! Дайте, будь ласка, один _____ до Києва."
      answer: "квиток"
      options: ["квиток", "вокзал", "поїзд", "автобус"]
    - sentence: "Скажіть, де знаходиться головний _____?"
      answer: "вокзал"
      options: ["вокзал", "каштан", "офіс", "магазин"]
    - sentence: "Я буду пити чорну _____ без цукру."
