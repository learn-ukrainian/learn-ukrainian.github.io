- type: true-false
  title: "Правда чи неправда?"
  instruction: "Прочитайте твердження і визначте, чи є вони правдивими."
  items:
    - statement: "Київ — це дуже молоде місто, яке не має довгої історії."
      correct: false
      explanation: "Київ був заснований у п'ятому столітті, це дуже старе місто."
    - statement: "Дерево каштан є популярним офіційним символом міста Києва."
      correct: true
      explanation: "Каштани цвітуть навесні і є відомим символом столиці."
    - statement: "Місто Львів відоме своєю глибокою традицією пити каву."
      correct: true
      explanation: "У Львові дуже багата і стара кавова культура."
    - statement: "Ми використовуємо місцевий відмінок (Locative), коли говоримо про напрямок руху (куди?)."
      correct: false
      explanation: "Для напрямку руху ми використовуємо знахідний відмінок (Accusative)."
    - statement: "Кличний відмінок (Vocative) використовується для звертання до людей."
      correct: true
      explanation: "Ми змінюємо закінчення імені чи титулу, коли звертаємося до особи."
    - statement: "Дієслово 'читати' належить до другої дієвідміни і має закінчення -ить."
      correct: false
      explanation: "Це дієслово першої дієвідміни: він читає."
    - statement: "У загальних питаннях можна використовувати частку 'чи' на початку речення."
      correct: true
      explanation: "Наприклад: Чи це наш автобус?"
    - statement: "Українською мовою 'good afternoon, sir' буде 'добрий день, пан'."
      correct: false
      explanation: "Правильно: Добрий день, пане! (кличний відмінок)."
    - statement: "Словникова форма іменника — це називний відмінок."
      correct: true
      explanation: "У словниках всі слова стоять у називному відмінку."
    - statement: "Прикметники не змінюють свої закінчення залежно від роду іменника."
      correct: false
      explanation: "Прикметники обов'язково узгоджуються з іменником у роді та числі."
    - statement: "Річка Дніпро знаходиться у місті Львів."
      correct: false
      explanation: "Річка Дніпро розділяє місто Київ на два береги."
    - statement: "Слово 'вокзал' перекладається як 'train station'."
      correct: true
      explanation: "Це важливе слово для подорожей."

- type: unjumble
  title: "Побудова речень"
  instruction: "Складіть правильні українські речення з цих слів."
  items:
    - words: ["я", "добре", "розумію", "цей", "текст"]
      answer: "Я добре розумію цей текст"
    - words: ["вчитель", "часто", "питає", "нового", "студента"]
      answer: "Вчитель часто питає нового студента"
    - words: ["де", "ти", "працюєш", "кожного", "дня"]
      answer: "Де ти працюєш кожного дня"
    - words: ["куди", "ви", "йдите", "сьогодні", "ввечері"]
      answer: "Куди ви йдите сьогодні ввечері"
    - words: ["моя", "подруга", "багато", "читає", "ввечері"]
      answer: "Моя подруга багато читає ввечері"
    - words: ["мій", "брат", "зараз", "іде", "в", "магазин"]
      answer: "Мій брат зараз іде в магазин"
    - words: ["ми", "живемо", "і", "працюємо", "в", "Україні"]
      answer: "Ми живемо і працюємо в Україні"
    - words: ["ми", "сьогодні", "їдемо", "швидким", "поїздом"]
      answer: "Ми сьогодні їдемо швидким поїздом"
    - words: ["квиток", "коштує", "рівно", "сто", "гривень"]
      answer: "Квиток коштує рівно сто гривень"
    - words: ["я", "дуже", "люблю", "пити", "чорну", "каву"]
      answer: "Я дуже люблю пити чорну каву"
    - words: ["чи", "це", "наш", "великий", "жовтий", "автобус"]
      answer: "Чи це наш великий жовтий автобус"
    - words: ["Київ", "дуже", "старе", "і", "красиве", "місто"]
      answer: "Київ дуже старе і красиве місто"

