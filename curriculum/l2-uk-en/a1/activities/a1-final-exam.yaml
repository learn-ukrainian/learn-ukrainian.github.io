- type: quiz
  title: "Морфологія: відмінки та рід"
  instruction: "Оберіть правильний варіант відповіді."
  items:
    - question: "Який відмінок ми використовуємо для словникової форми слова?"
      explanation: "Називний відмінок — це базова форма, яка відповідає на питання хто або що."
      options:
        - text: "називний"
          correct: true
        - text: "знахідний"
          correct: false
        - text: "місцевий"
          correct: false
        - text: "кличний"
          correct: false
    - question: "Як правильно запитати про напрямок руху?"
      explanation: "Для напрямку руху (знахідний відмінок) ми використовуємо питання куди."
      options:
        - text: "куди"
          correct: true
        - text: "де"
          correct: false
        - text: "хто"
          correct: false
        - text: "що"
          correct: false
    - question: "Як сказати українською: my big car?"
      explanation: "Машина — це слово жіночого роду, тому: моя велика машина."
      options:
        - text: "моя велика машина"
          correct: true
        - text: "мій велика машина"
          correct: false
        - text: "моє велика машина"
          correct: false
        - text: "мої велика машина"
          correct: false
    - question: "Яке закінчення має дієслово 'читати' у формі 'я'?"
      explanation: "Дієслова першої дієвідміни мають закінчення -ю або -у для форми 'я'."
      options:
        - text: "читаю"
          correct: true
        - text: "читаєш"
          correct: false
        - text: "читає"
          correct: false
        - text: "читають"
          correct: false
    - question: "Яке закінчення має дієслово 'робити' у формі 'ти'?"
      explanation: "Дієслова другої дієвідміни мають закінчення -иш або -їш для форми 'ти'."
      options:
        - text: "робиш"
          correct: true
        - text: "робить"
          correct: false
        - text: "роблю"
          correct: false
        - text: "робимо"
          correct: false
    - question: "Оберіть правильну форму кличного відмінка для імені Олена."
      explanation: "Жіночі імена на -а змінюються на -о у кличному відмінку."
      options:
        - text: "Олено"
          correct: true
        - text: "Олена"
          correct: false
        - text: "Олені"
          correct: false
        - text: "Олену"
          correct: false
    - question: "Як правильно запитати про місцезнаходження?"
      explanation: "Для місця (місцевий відмінок) ми використовуємо питання де."
      options:
        - text: "де"
          correct: true
        - text: "куди"
          correct: false
        - text: "звідки"
          correct: false
        - text: "коли"
          correct: false
    - question: "Оберіть правильне речення про напрямок руху."
      explanation: "Рух у місце вимагає знахідного відмінка: в магазин."
      options:
        - text: "Я йду в магазин."
          correct: true
        - text: "Я йду в магазині."
          correct: false
        - text: "Я йду на магазині."
          correct: false
        - text: "Я йду магазин."
          correct: false
    - question: "Оберіть правильне речення про місцезнаходження."
      explanation: "Знаходження в місці вимагає місцевого відмінка: в офісі."
      options:
        - text: "Я працюю в офісі."
          correct: true
        - text: "Я працюю в офіс."
          correct: false
        - text: "Я працюю на офіс."
          correct: false
        - text: "Я працюю офіс."
          correct: false
    - question: "Яка частина мови відповідає на питання хто або що?"
      explanation: "Іменник відповідає на питання хто або що."
      options:
        - text: "іменник"
          correct: true
        - text: "дієслово"
          correct: false
        - text: "прикметник"
          correct: false
        - text: "прислівник"
          correct: false
    - question: "Яке слово допомагає зробити загальне питання?"
      explanation: "Частка 'чи' використовується на початку загальних питань."
      options:
        - text: "чи"
          correct: true
        - text: "хто"
          correct: false
        - text: "як"
          correct: false
        - text: "куди"
          correct: false
    - question: "Як правильно сказати 'Good afternoon, sir' українською?"
      explanation: "У звертанні використовується кличний відмінок: пане."
      options:
        - text: "Добрий день, пане!"
          correct: true
        - text: "Добрий день, пан!"
          correct: false
        - text: "Добрий день, пану!"
          correct: false
        - text: "Добрий день, пана!"
          correct: false

- type: fill-in
  title: "Дієвідміни дієслів"
  instruction: "Заповніть пропуски правильними формами дієслів у теперішньому часі."
  items:
    - sentence: "Я щодня _____ цікаву книгу."
      answer: "читаю"
      options: ["читаю", "читаєш", "читає", "читаємо"]
    - sentence: "Ти добре _____ це нове правило?"
      answer: "розумієш"
      options: ["розумієш", "розумію", "розуміє", "розумієте"]
    - sentence: "Він дуже добре _____ українську мову."
      answer: "знає"
      options: ["знає", "знаю", "знаєш", "знають"]
    - sentence: "Ми уважно _____ вчителя на уроці."
      answer: "слухаємо"
      options: ["слухаємо", "слухаю", "слухаєш", "слухають"]
    - sentence: "Ви часто _____ нові слова?"
      answer: "питаєте"
      options: ["питаєте", "питаю", "питає", "питаємо"]
    - sentence: "Вони швидко _____ на всі запитання."
      answer: "відповідають"
      options: ["відповідають", "відповідаю", "відповідає", "відповідаємо"]
    - sentence: "Я зараз _____ по телефону."
      answer: "говорю"
      options: ["говорю", "говориш", "говорить", "говоримо"]
    - sentence: "Ти щодня _____ домашнє завдання?"
      answer: "робиш"
      options: ["робиш", "роблю", "робить", "робимо"]
    - sentence: "Вона дуже швидко _____ текст."
      answer: "пише"
      options: ["пише", "пишу", "пишеш", "пишуть"]
    - sentence: "Студент правильно _____ на питання."
      answer: "відповідає"
      options: ["відповідає", "відповідаю", "відповідаєш", "відповідають"]
    - sentence: "Ми часто _____ каву у Львові."
      answer: "п'ємо"
      options: ["п'ємо", "п'ю", "п'єш", "п'ють"]
    - sentence: "Вони _____ працювати в Києві."
      answer: "хочуть"
      options: ["хочуть", "хочу", "хоче", "хочемо"]

