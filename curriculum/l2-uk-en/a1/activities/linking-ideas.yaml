version: '1.0'
module: linking-ideas
level: a1
inline:
- id: fill-in-choose-conjunction
  type: fill-in
  instruction: Вставте правильний сполучник (Insert the correct conjunction)
  items:
  - sentence: Я хочу чай, ____ ти хочеш каву.
    answer: а
    options:
    - а
    - і
    - бо
  - sentence: Ми йдемо в парк, ____ вони йдуть додому.
    answer: а
    options:
    - а
    - але
    - чи
  - sentence: Він багато працює ____ мало відпочиває.
    answer: та
    options:
    - та
    - бо
    - тому що
  - sentence: Я люблю каву ____ чай.
    answer: і
    options:
    - і
    - а
    - але
  - sentence: Це мій брат ____ моя сестра.
    answer: і
    options:
    - і
    - але
    - бо
  - sentence: Я студент, ____ мій брат — лікар.
    answer: а
    options:
    - а
    - і
    - тому що
- id: quiz-conjunction-choice
