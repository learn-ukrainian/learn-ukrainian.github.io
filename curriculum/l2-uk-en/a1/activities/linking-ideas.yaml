workbook:
- type: match-up
  instruction: З'єднайте частини речень (Match the sentence halves)
  pairs:
  - left: Я хочу каву,
    right: бо я дуже втомлений.
  - left: Я хочу в гори,
    right: а ти хочеш на море.
  - left: Він молодий,
    right: але дуже розумний.
  - left: Я читаю,
    right: і пишу.
  - left: Це не стіл,
    right: а стілець.
  - left: Ми не гуляємо,
    right: тому що йде дощ.
- type: true-false
  instruction: Правда чи ні за текстом діалогів? (True or false based on the dialogues?)
  items:
  - statement: Марко хоче каву, бо він втомлений.
    correct: true
    explanation: 'Так, він каже: «Каву, бо я дуже втомлений».'
  - statement: Олена хоче чай з цукром.
    correct: false
    explanation: Олена хоче чай без цукру.
  - statement: Іван не відповів на телефон, бо він був у магазині.
    correct: false
    explanation: Іван не відповів, бо телефон був без звуку.
  - statement: Віктор і Марія поїдуть у Карпати.
    correct: true
    explanation: Вони вирішили поїхати в Карпати, бо там дешевше.
  - statement: Марія хоче на море, бо зараз літо.
    correct: true
    explanation: 'Так, вона каже: «Море тепле, бо зараз літо».'
  - statement: У Карпатах дорого.
    correct: false
    explanation: У Карпатах дешевше.
- type: error-correction
  instruction: Знайдіть і виправте помилку (Find and fix the mistake)
  items:
  - sentence: Я люблю каву, і ти?
    error: і
    correction: а
    error_type: word
    options:
    - а
    - але
    - бо
    explanation: Use 'а' to shift focus and ask a corresponding question.
  - sentence: Я хочу піти, і не можу.
    error: і
    correction: але
    error_type: word
    options:
    - а
    - але
    - бо
    explanation: Use 'але' for strong contrast or limitation (but).
  - sentence: Це не стіл, і стілець.
    error: і
    correction: а
    error_type: word
    options:
    - а
    - але
    - бо
    explanation: Use 'а' when contrasting 'not X, but Y'.
  - sentence: Ми не гуляємо, і йде дощ.
    error: і
    correction: бо
    error_type: word
    options:
    - а
    - але
    - бо
    explanation: Use 'бо' to give a reason (because).
  - sentence: Я не йду, а я хворий.
    error: а
    correction: бо
    error_type: word
    options:
    - і
    - але
    - бо
    explanation: Use 'бо' to explain why.
  - sentence: Він працює, бо вона відпочиває.
    error: бо
    correction: а
    error_type: word
    options:
    - а
    - і
    - але
    explanation: Use 'а' to contrast two different subjects performing different actions.
- type: translate
  instruction: Оберіть правильний переклад (Choose the correct translation)
  items:
  - source: I am reading, and he is writing.
    options:
    - text: Я читаю, а він пише.
      correct: true
    - text: Я читаю, і він пише.
      correct: false
    - text: Я читаю, бо він пише.
      correct: false
  - source: The soup is hot, but tasty.
    options:
    - text: Суп гарячий, але смачний.
      correct: true
    - text: Суп гарячий, і смачний.
      correct: false
    - text: Суп гарячий, а смачний.
      correct: false
  - source: I want to go, because I am tired.
    options:
    - text: Я хочу піти, бо я втомлений.
      correct: true
    - text: Я хочу піти, але я втомлений.
      correct: false
    - text: Я хочу піти, а я втомлений.
      correct: false
  - source: He is young, but smart.
    options:
    - text: Він молодий, але розумний.
      correct: true
    - text: Він молодий, бо розумний.
      correct: false
    - text: Він молодий, а розумний.
      correct: false
  - source: This is not a table, but a chair.
    options:
    - text: Це не стіл, а стілець.
      correct: true
    - text: Це не стіл, але стілець.
      correct: false
    - text: Це не стіл, і стілець.
      correct: false
  - source: Why are you learning Ukrainian?
    options:
    - text: Чому ти вчиш українську?
      correct: true
    - text: Тому що ти вчиш українську?
      correct: false
    - text: Бо ти вчиш українську?
      correct: false
