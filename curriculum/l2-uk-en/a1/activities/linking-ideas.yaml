    answer: тому що
    options:
    - тому що
    - але
    - і
  - sentence: Я хочу каву, ____ я дуже втомлена.
    answer: бо
    options:
    - бо
    - а
    - чи
  - sentence: Поїдемо в Карпати, ____ там дешевше.
    answer: бо
    options:
    - бо
    - але
    - та
  - sentence: Я вчу українську, ____ я люблю Україну.
    answer: тому що
