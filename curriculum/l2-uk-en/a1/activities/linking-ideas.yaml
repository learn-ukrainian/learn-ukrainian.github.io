- id: workbook-match-up-sentences
  type: match-up
  instruction: З'єднайте частини речень (Match the parts of the sentences)
  pairs:
  - left: Я люблю каву,
    right: а ти?
  - left: Гори гарні,
    right: але далеко.
  - left: Ми не гуляємо,
    right: тому що йде дощ.
  - left: Я читаю,
    right: а він пише.
  - left: Я хочу в Карпати,
    right: бо там дешевше.
  - left: Це червоне яблуко,
    right: а це зелена груша.
- id: workbook-true-false-comma
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Перед сполучником «але» завжди ставимо кому.
    correct: true
    explanation: Так, перед «а», «але», «бо», «тому що» ставимо кому.
  - statement: Перед сполучником «бо» кома не потрібна.
    correct: false
    explanation: Перед «бо» завжди ставимо кому.
  - statement: У реченні «мама і тато» потрібна кома перед «і».
    correct: false
    explanation: Тут «і» просто з'єднує два слова, кома не потрібна.
  - statement: Перед «тому що» завжди ставимо кому.
    correct: true
    explanation: Так, як і перед «бо».
  - statement: Сполучник «але» означає додавання інформації (addition).
    correct: false
    explanation: «Але» означає протиставлення (contrast).
  - statement: «Бо» і «тому що» вказують на причину.
    correct: true
    explanation: Так, обидва сполучники означають «because».
