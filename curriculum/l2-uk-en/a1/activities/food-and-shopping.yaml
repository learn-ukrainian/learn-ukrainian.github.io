- instruction: Оберіть правильну відповідь на запитання про покупки.
  items:
  - explanation: Фраза «Дайте, будь ласка» є стандартною ввічливою формою прохання.
    options:
    - correct: true
      text: Дайте, будь ласка...
    - correct: false
      text: Я хочу...
    - correct: false
      text: Дай мені...
    - correct: false
      text: Хочу це...
    question: Як ввічливо попросити щось у магазині?
  - explanation: «Скільки коштує?» — це найпоширеніший спосіб запитати ціну.
    options:
    - correct: true
      text: Скільки коштує?
    - correct: false
      text: Скільки грошей?
    - correct: false
      text: Яка цифра?
    - correct: false
      text: Де ціна?
    question: Як запитати про вартість товару?
  - explanation: Хліб і сіль — це традиційний символ української гостинності.
    options:
    - correct: true
      text: Символ гостинності
    - correct: false
      text: Назва супу
    - correct: false
      text: Вид десерту
    - correct: false
      text: Ранковий сніданок
    question: Що означає традиція «хліб-сіль» в Україні?
  - explanation: Молоко та сік часто продаються в пакетах (cartons).
    options:
    - correct: true
      text: Молоко
    - correct: false
      text: Хліб
    - correct: false
      text: Картоплю
    - correct: false
      text: М'ясо
    question: Що ми зазвичай купуємо в «пакетах»?
  - explanation: Слово «кава» закінчується на -а і є жіночого роду.
    options:
    - correct: true
      text: Жіночого
    - correct: false
      text: Чоловічого
    - correct: false
      text: Середнього
    - correct: false
      text: Множина
    question: Якого граматичного роду слово «кава»?
  - explanation: Слово «хліб» є іменником чоловічого роду.
    options:
    - correct: true
      text: Чоловічого
    - correct: false
      text: Жіночого
    - correct: false
      text: Середнього
    - correct: false
      text: Множина
    question: Якого граматичного роду слово «хліб»?
  - explanation: 'Правильна форма: Я п''ю (дієслово) каву (Знахідний відмінок).'
