- instruction: Оберіть правильну форму дієслова для кожного речення.
  items:
  - explanation: Для «Я» (I) дієслово «їсти» має форму «їм».
    options:
    - correct: true
      text: їм
    - correct: false
      text: їси
    - correct: false
      text: їсть
    - correct: false
      text: їмо
    question: Сьогодні на обід я _____ смачний український борщ.
  - explanation: Для «Ти» (You) дієслово «пити» має форму «п'єш».
    options:
    - correct: true
      text: п'єш
    - correct: false
      text: п'ю
    - correct: false
      text: п'є
    - correct: false
      text: пити
    question: Вранці ти зазвичай _____ міцну гарячу каву.
  - explanation: Для «Ми» (We) дієслово «купувати» має форму «купуємо».
    options:
    - correct: true
      text: купуємо
    - correct: false
      text: купую
    - correct: false
      text: купуєш
    - correct: false
      text: купують
    question: У супермаркеті ми _____ свіжі продукти.
  - explanation: Для «Вона» (She) дієслово «пити» має форму «п'є».
    options:
    - correct: true
      text: п'є
    - correct: false
      text: п'ю
    - correct: false
      text: п'ють
    - correct: false
      text: пила
    question: Моя сестра зараз _____ зелений чай з лимоном.
  - explanation: Для «Вони» (They) дієслово «їсти» має форму «їдять».
    options:
    - correct: true
      text: їдять
    - correct: false
      text: їмо
    - correct: false
      text: їсте
    - correct: false
      text: їси
    question: На вечерю вони часто _____ смачну італійську піцу.
  - explanation: Для «Ви» (You plural/formal) дієслово «їсти» має форму «їсте».
    options:
    - correct: true
      text: їсте
    - correct: false
      text: їмо
    - correct: false
      text: їм
    - correct: false
      text: їсть
    question: Скажіть, будь ласка, ви _____ свіжий хліб?
  - explanation: Для «Я» (I) дієслово «пити» має форму «п'ю».
    options:
    - correct: true
      text: п'ю
    - correct: false
      text: п'єш
    - correct: false
      text: пити
    - correct: false
      text: пив
    question: Кожен день я _____ чисту воду.
  - explanation: Для «Він» (He) дієслово «купувати» має форму «купує».
    options:
    - correct: true
      text: купує
    - correct: false
      text: купую
    - correct: false
      text: купуємо
    - correct: false
      text: купують
    question: На ринку він _____ молоду картоплю.
  title: 'Дієслова: їсти, пити, купувати'
  type: quiz
