- type: fill-in
  title: "Verb Conjugation: To Love"
  instruction: "Fill in the correct form of the verb любити (to love)."
  items:
    - sentence: "Я ______ каву."
      answer: "люблю"
      options: ["люблю", "любиш", "любить", "любимо"]
    - sentence: "Ти ______ чай."
      answer: "любиш"
      options: ["люблю", "любиш", "любить", "любите"]
    - sentence: "Він ______ молоко."
      answer: "любить"
      options: ["любиш", "любить", "любимо", "люблять"]
    - sentence: "Ми ______ сік."
      answer: "любимо"
      options: ["любить", "любимо", "любите", "люблять"]
    - sentence: "Ви ______ воду."
      answer: "любите"
      options: ["любимо", "любите", "люблять", "любиш"]
    - sentence: "Вони ______ фрукти."
      answer: "люблять"
      options: ["любить", "любите", "люблять", "любимо"]
    - sentence: "Я ______ сир."
      answer: "люблю"
      options: ["люблю", "любиш", "любить", "любимо"]
    - sentence: "Вона ______ м'ясо."
      answer: "любить"
      options: ["любиш", "любить", "любимо", "люблять"]
    - sentence: "Ти ______ овочі."
      answer: "любиш"
      options: ["люблю", "любиш", "любить", "любите"]
    - sentence: "Ми ______ батони."
      answer: "любимо"
      options: ["любить", "любимо", "любите", "люблять"]
    - sentence: "Ви ______ рибу."
      answer: "любите"
      options: ["любимо", "любите", "люблять", "любиш"]
    - sentence: "Вони ______ яйця."
      answer: "люблять"
      options: ["любить", "любите", "люблять", "люблю"]

