version: '1.0'
module: what-happened
level: a1
inline:
- id: matching-pronoun-ending
  type: match-up
  instruction: З'єднайте займенник із дієсловом (Match the pronoun with the verb)
  pairs:
  - left: Він
    right: працював
  - left: Вона
    right: працювала
  - left: Воно
    right: працювало
  - left: Вони
    right: працювали
  - left: Тарас
    right: говорив
  - left: Олена
    right: говорила
- id: fill-in-past-tense-forms
  type: fill-in
  instruction: Вставте правильну форму дієслова (Fill in the correct verb form)
  items:
  - sentence: Учора він ____ книжку.
    answer: читав
    options:
    - читав
    - читала
    - читати
  - sentence: Олена ____ вечерю.
    answer: готувала
    options:
    - готувала
    - готував
    - готували
  - sentence: Ми ____ в парку.
    answer: гуляли
    options:
    - гуляли
    - гуляв
    - гуляла
  - sentence: Вони ____ разом.
    answer: працювали
    options:
    - працювали
    - працював
    - працювало
  - sentence: Тарас ____ фільм.
    answer: дивився
    options:
    - дивився
    - дивилася
    - дивилися
  - sentence: Що ти ____ учора, Іване?
    answer: робив
    options:
    - робив
    - робила
    - робили
- id: fill-in-gender-subject-agreement
  type: fill-in
  instruction: Оберіть правильне дієслово за родом (Choose the correct verb by gender)
  items:
  - sentence: Марія ____ фільм.
    answer: дивилася
    options:
    - дивилася
    - дивився
    - дивилися
  - sentence: Мій брат ____ у парку.
    answer: гуляв
    options:
    - гуляв
    - гуляла
    - гуляли
  - sentence: Вони ____ вихідні разом.
    answer: провели
    options:
    - провели
    - провів
    - провела
  - sentence: Моя подруга ____ каву.
    answer: пила
    options:
    - пила
    - пив
    - пили
  - sentence: Іван ____ борщ.
    answer: готував
    options:
    - готував
    - готувала
    - готували
  - sentence: Ми ____ цікаву книжку.
    answer: читали
    options:
    - читали
    - читав
    - читала
workbook:
- type: group-sort
  instruction: Розподіліть дієслова за родами та числом (Sort verbs by gender and
    number)
  groups:
  - label: Він (masculine)
    items:
    - працював
    - читав
    - дивився
  - label: Вона (feminine)
    items:
    - працювала
    - читала
    - дивилася
  - label: Вони (plural)
    items:
    - працювали
    - читали
    - дивилися
- type: quiz
  instruction: Оберіть правильний варіант (Choose the correct option)
  items:
  - question: Учора Тарас ____ в офісі.
    options:
    - працював
    - працювала
    - працювали
    correct: 0
  - question: Минулого тижня ми ____ фільм.
    options:
    - дивилася
    - дивився
    - дивилися
    correct: 2
  - question: У суботу Марія ____ у парку.
    options:
    - гуляв
    - гуляла
    - гуляли
    correct: 1
  - question: Що ви ____ у неділю?
    options:
    - робив
    - робила
    - робили
    correct: 2
  - question: Іван та Олена ____ разом.
    options:
    - готував
    - готувала
    - готували
    correct: 2
  - question: Учора я (female) ____ книжку.
    options:
    - читала
    - читав
    - читали
    correct: 0
- type: error-correction
  instruction: Знайдіть і виправте помилку (Find and correct the error)
  items:
  - sentence: Учора вона працював.
    error: працював
    correction: працювала
    error_type: word
    options:
    - працювала
    - працювали
    - працювати
    explanation: The pronoun is 'вона' (she), so the verb needs the feminine ending
      -ла.
  - sentence: Минулого тижня ми був у кафе.
    error: був
    correction: були
    error_type: word
    options:
    - були
    - була
    - було
    explanation: The pronoun is 'ми' (we), so the verb needs the plural ending -ли.
  - sentence: Тарас дивилася фільм у неділю.
    error: дивилася
    correction: дивився
    error_type: word
    options:
    - дивився
    - дивилися
    - дивитись
    explanation: Тарас is a man, so the verb needs the masculine ending.
  - sentence: Що ти робила учора, Іване?
    error: робила
    correction: робив
    error_type: word
    options:
    - робив
    - робили
    - робити
    explanation: Іван is a male name, so the question must use the masculine form.
  - sentence: У суботу вони гуляв разом.
    error: гуляв
    correction: гуляли
    error_type: word
    options:
    - гуляли
    - гуляла
    - гуляти
    explanation: The pronoun is 'вони' (they), so the verb needs the plural ending
      -ли.
  - sentence: Олена читав цікаву книжку.
    error: читав
    correction: читала
    error_type: word
    options:
    - читала
    - читали
    - читати
    explanation: Олена is a woman, so the verb needs the feminine ending -ла.
- type: translate
  instruction: Оберіть правильний переклад (Choose the correct translation)
  items:
  - source: Yesterday I (male) worked.
    options:
    - text: Учора я працював.
      correct: true
    - text: Учора я працювала.
      correct: false
    - text: Учора я працювали.
      correct: false
  - source: How did she spend the weekend?
    options:
    - text: Як вона провела вихідні?
      correct: true
    - text: Як вона провів вихідні?
      correct: false
    - text: Як вона провели вихідні?
      correct: false
  - source: We watched a film together.
    options:
    - text: Ми дивилися фільм разом.
      correct: true
    - text: Ми дивилася фільм разом.
      correct: false
    - text: Ми дивився фільм разом.
      correct: false
  - source: On Sunday they walked in the park.
    options:
    - text: У неділю вони гуляли в парку.
      correct: true
    - text: У неділю вони гуляв у парку.
      correct: false
    - text: У неділю вони гуляла в парку.
      correct: false
  - source: What did you do yesterday? (to a female)
    options:
    - text: Що ти робила учора?
      correct: true
    - text: Що ти робив учора?
      correct: false
    - text: Що ти робили учора?
      correct: false
  - source: On Saturday he read a book.
    options:
    - text: У суботу він читав книжку.
      correct: true
    - text: У суботу він читала книжку.
      correct: false
    - text: У суботу він читали книжку.
      correct: false
- type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Учора Тарас читав книжку.
    correct: true
    explanation: 'He says: ''Я читав книжку''.'
  - statement: Олена гуляла у парку.
    correct: false
    explanation: 'Olena says: ''Я готувала вечерю''. Ivan walked in the park.'
  - statement: Іван готував вечерю.
    correct: false
    explanation: Olena cooked dinner. Ivan walked in the park.
  - statement: Марія працювала.
    correct: true
    explanation: 'Olena says: ''Вона працювала'' when talking about Mariia.'
  - statement: У неділю Тарас дивився фільм.
    correct: true
    explanation: 'In the second dialogue, Taras says: ''У неділю я дивився фільм''.'
  - statement: Олена і Тарас провели вихідні разом.
    correct: false
    explanation: They are talking about their separate weekend activities.
- type: unjumble
  instruction: Складіть правильне речення зі слів (Put the words in the correct order)
  items:
