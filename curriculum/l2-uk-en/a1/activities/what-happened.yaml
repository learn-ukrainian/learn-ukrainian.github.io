- id: quiz-past-rules
  type: quiz
  instruction: Оберіть правильний варіант (Choose the correct option)
  items:
  - question: Яке закінчення має дієслово в чоловічому роді (він)?
    options:
    - -в
    - -ла
    - -ло
    - -ли
    correct: 0
  - question: Яке закінчення має дієслово в жіночому роді (вона)?
    options:
    - -в
    - -ла
    - -ло
    - -ли
    correct: 1
  - question: Яке закінчення має дієслово в множині (ми, ви, вони)?
    options:
    - -в
    - -ла
    - -ло
    - -ли
    correct: 3
  - question: 'Як правильно сказати: «I was reading» (якщо говорить жінка)?'
    options:
    - Я читала
    - Я читав
    - Я читали
    - Я читати
    correct: 0
  - question: 'Як правильно запитати чоловіка: «What did you do?»'
    options:
    - Що ти робив?
    - Що ти робила?
    - Що ти робили?
    - Що ти робити?
    correct: 0
  - question: Яке речення правильне?
    options:
    - Тарас гуляв у парку.
    - Тарас гуляла у парку.
    - Тарас гуляли у парку.
    - Тарас гуляло у парку.
    correct: 0
