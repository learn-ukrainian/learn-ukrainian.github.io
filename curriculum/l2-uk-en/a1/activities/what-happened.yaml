version: '1.0'
module: what-happened
level: a1
inline:
- id: matching-pronoun-ending
  type: match-up
  instruction: З'єднайте займенник із правильним закінченням (Match the pronoun with
    the correct ending)
  pairs:
  - left: він
    right: працював
  - left: вона
    right: працювала
  - left: воно
    right: працювало
  - left: вони
    right: працювали
  - left: Тарас
    right: говорив
  - left: Олена
    right: говорила
  - left: Іван
    right: читав
- id: fill-in-core-verbs
  type: fill-in
  instruction: Вставте правильну форму дієслова (Fill in the correct verb form)
  items:
  - sentence: Учора він ____ книжку.
    answer: читав
    options:
    - читав
    - читала
    - читати
  - sentence: Олена ____ вечерю.
    answer: готувала
    options:
    - готувала
    - готував
    - готували
  - sentence: Ми ____ в парку.
    answer: гуляли
    options:
    - гуляли
    - гуляв
    - гуляла
  - sentence: Вони ____ разом.
    answer: працювали
    options:
    - працювали
    - працював
    - працювало
  - sentence: Тарас ____ фільм.
    answer: дивився
    options:
    - дивився
    - дивилася
    - дивилися
  - sentence: Що ти ____ учора, Іване?
    answer: робив
    options:
    - робив
    - робила
    - робили
- id: fill-in-choose-gender
  type: fill-in
  instruction: Оберіть правильну форму дієслова за родом (Choose the correct verb
    form by gender)
  items:
  - sentence: Марія ____ фільм.
    answer: дивилася
    options:
    - дивилася
    - дивився
    - дивилися
  - sentence: Мій брат ____ у парку.
    answer: гуляв
    options:
    - гуляв
    - гуляла
    - гуляли
  - sentence: Вони ____ вихідні разом.
    answer: провели
    options:
    - провели
    - провів
    - провела
  - sentence: Іван ____ нову книжку.
    answer: читав
    options:
    - читав
    - читала
    - читали
  - sentence: Моя сестра ____ вечерю.
    answer: готувала
    options:
    - готувала
    - готував
    - готували
  - sentence: Олена багато ____ в офісі.
    answer: працювала
    options:
    - працювала
    - працював
    - працювали
- id: true-false-past
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: «Він читала книжку» — це правильне речення.
    correct: false
    explanation: 'Для «він» потрібне закінчення чоловічого роду: читав.'
  - statement: «Вона готувала вечерю» — це правильне речення.
    correct: true
    explanation: 'Для «вона» використовується закінчення жіночого роду: -ла.'
  - statement: «Ми гуляв у парку» — це правильне речення.
    correct: false
    explanation: 'Для «ми» потрібне закінчення множини: гуляли.'
  - statement: «Вони працювали разом» — це правильне речення.
    correct: true
    explanation: 'Для «вони» використовується закінчення множини: -ли.'
  - statement: Дієслова в минулому часі змінюються за родами (чоловічий, жіночий,
      середній).
    correct: true
    explanation: Так, у минулому часі дієслова мають рід, а не особу.
  - statement: «Тарас дивилася фільм» — це правильне речення.
    correct: false
    explanation: Тарас — це чоловічий рід, тому правильно «дивився».
workbook:
- id: match-up-vocab-weekend
  type: match-up
  instruction: З'єднайте українські слова з англійським перекладом (Match Ukrainian
    words with English translation)
  pairs:
  - left: минулий
    right: past
  - left: вихідні
    right: weekend
  - left: субота
    right: Saturday
  - left: неділя
    right: Sunday
  - left: разом
    right: together
  - left: учора
    right: yesterday
  - left: провести
    right: to spend time
- id: group-sort-verb-gender
  type: group-sort
  instruction: Розподіліть дієслова за родами та числом (Sort verbs by gender and
    number)
  groups:
  - label: Він (Чоловічий рід)
    items:
    - працював
    - читав
    - гуляв
    - дивився
    - робив
  - label: Вона (Жіночий рід)
    items:
    - працювала
    - читала
    - готувала
    - дивилася
    - робила
  - label: Вони (Множина)
    items:
    - працювали
    - читали
    - гуляли
    - дивилися
    - робили
- id: anagram-verbs
  type: anagram
  instruction: Складіть слова з літер (Make words from letters)
  items:
  - letters:
    - ч
    - и
    - т
    - а
    - в
    answer: читав
    hint: he read
  - letters:
    - г
    - у
    - л
    - я
    - л
    - и
    answer: гуляли
    hint: they walked
  - letters:
    - р
    - а
    - з
    - о
    - м
    answer: разом
    hint: together
  - letters:
    - у
    - ч
    - о
    - р
    - а
    answer: учора
    hint: yesterday
  - letters:
    - ф
    - і
    - л
    - ь
    - м
    answer: фільм
    hint: film
  - letters:
    - с
    - у
    - б
    - о
    - т
    - а
    answer: субота
    hint: Saturday
