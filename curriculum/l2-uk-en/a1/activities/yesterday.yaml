version: '1.0'
module: yesterday
level: a1
inline:
- id: fill-in-time-markers
  type: fill-in
  instruction: Вставте правильне слово (Fill in the correct word)
  items:
  - sentence: Учора ____ я прокинулася о сьомій.
    answer: зранку
    options:
    - зранку
    - вдень
    - потім
  - sentence: ____ я поснідала.
    answer: Спочатку
    options:
    - Спочатку
    - Нарешті
    - Вночі
  - sentence: ____ я пішла на роботу.
    answer: Потім
    options:
    - Потім
    - Зранку
    - Ввечері
  - sentence: Вдень я ____ в кафе.
    answer: обідала
    options:
    - обідала
    - обідав
    - обідали
  - sentence: ____ я готувала вечерю.
    answer: Ввечері
    options:
    - Ввечері
    - Вдень
    - Зранку
  - sentence: О десятій я ____ спати.
    answer: лягла
    options:
    - лягла
    - ліг
    - лягли
- id: fill-in-gender-consistency
  type: fill-in
  instruction: Оберіть правильну форму для Анни (Choose the correct form for Anna)
  items:
  - sentence: Я мала звичайний день. Я ____ рано.
    answer: прокинулася
    options:
    - прокинулася
    - прокинувся
    - прокинулися
  - sentence: Потім я ____.
    answer: поснідала
    options:
    - поснідала
    - поснідав
    - поснідали
  - sentence: Після цього я ____ у магазин.
    answer: пішла
    options:
    - пішла
    - пішов
    - пішли
  - sentence: Там я ____ продукти.
    answer: купила
    options:
    - купила
    - купив
    - купили
  - sentence: Ввечері я ____ вечерю.
    answer: готувала
    options:
    - готувала
    - готував
    - готували
  - sentence: Нарешті я ____ спати.
    answer: лягла
    options:
    - лягла
    - ліг
    - лягли
workbook:
- id: match-up-verbs-male-female
  type: match-up
  instruction: З'єднайте форми дієслів (Match the verb forms)
  pairs:
  - left: він прокинувся
    right: вона прокинулася
  - left: він поснідав
    right: вона поснідала
  - left: він пішов
    right: вона пішла
  - left: він працював
    right: вона працювала
  - left: він повернувся
    right: вона повернулася
  - left: він ліг
    right: вона лягла
  - left: він обідав
    right: вона обідала
