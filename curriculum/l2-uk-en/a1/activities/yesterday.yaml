- id: true-false-routine
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Слово «зранку» ми використовуємо для вечора.
    correct: false
    explanation: Зранку означає «in the morning».
  - statement: Слово «потім» допомагає з'єднати події в історії.
    correct: true
    explanation: Потім (then) — це дуже корисне слово.
  - statement: Чоловік каже «я пішла на роботу».
    correct: false
    explanation: Для чоловічого роду ми використовуємо форму «пішов».
  - statement: Жінка каже «я лягла спати».
    correct: true
    explanation: Для жіночого роду ми використовуємо форму «лягла».
  - statement: Слово «нарешті» зазвичай використовують наприкінці розповіді.
    correct: true
    explanation: Нарешті означає «finally».
  - statement: Дієслова минулого часу змінюються за родами (чоловічий, жіночий).
    correct: true
    explanation: 'Наприклад: він пішов, вона пішла.'
- id: odd-one-out-verbs
  type: odd-one-out
  instruction: Знайдіть зайве слово (Find the odd one out)
  items:
  - words:
    - зранку
    - вдень
    - ввечері
    - продукти
    correct: 3
    explanation: Продукти — це іменник (noun), а інші слова позначають час (time markers).
  - words:
    - поснідав
    - прокинувся
    - лягла
    - пішов
    correct: 2
    explanation: Лягла — це форма для жінки (she), а інші — для чоловіка (he).
  - words:
    - повернулася
    - працювала
    - обідала
    - ліг
    correct: 3
    explanation: Ліг — це форма для чоловіка (he), а інші — для жінки (she).
  - words:
    - спочатку
    - колега
    - потім
    - нарешті
    correct: 1
    explanation: Колега — це людина (person), а інші слова — це маркери часу (sequence
      markers).
  - words:
    - поснідати
    - обідати
    - вечеряти
    - звичайний
    correct: 3
    explanation: Звичайний — це прикметник (adjective), а інші — дієслова (verbs).
  - words:
    - салат
    - сік
    - каша
    - серіал
    correct: 3
    explanation: Серіал — це те, що ми дивимося. Інші слова — це їжа та напої (food
      and drinks).
