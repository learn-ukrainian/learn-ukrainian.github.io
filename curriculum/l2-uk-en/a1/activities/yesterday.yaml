version: '1.0'
module: yesterday
level: a1
inline:
- id: ordering-daily-routine
  type: order
  instruction: Розставте речення в правильному порядку (Put the sentences in the correct
    order)
  items:
  - Зранку я прокинувся.
  - Спочатку я поснідав.
  - Потім я пішов на роботу.
  - Вдень я обідав з колегою.
  - Ввечері я повернувся і дивився серіал.
  - Нарешті я ліг спати.
  correct_order:
  - 0
  - 1
  - 2
  - 3
  - 4
  - 5
- id: fill-in-narrative-flow
  type: fill-in
  instruction: Вставте правильне слово (Insert the correct word)
  items:
  - sentence: Учора ____ я прокинулася о сьомій.
    answer: зранку
    options:
    - зранку
    - вдень
    - потім
  - sentence: ____ я поснідала.
    answer: Спочатку
    options:
    - Спочатку
    - Нарешті
    - Вночі
  - sentence: ____ я пішла на роботу.
    answer: Потім
    options:
    - Потім
    - Зранку
    - Ввечері
  - sentence: Вдень я ____ в кафе.
    answer: обідала
    options:
    - обідала
    - обідав
    - обідали
  - sentence: ____ я готувала вечерю.
    answer: Ввечері
    options:
    - Ввечері
    - Вдень
    - Зранку
  - sentence: О десятій я ____ спати.
    answer: лягла
    options:
    - лягла
    - ліг
    - лягли
- id: gender-consistency-drill
  type: fill-in
  instruction: Оберіть форму для Анни (Choose the form for Anna)
  items:
  - sentence: Я мала звичайний день. Я ____ рано.
    answer: прокинулася
    options:
    - прокинулася
    - прокинувся
  - sentence: Потім я ____.
    answer: поснідала
    options:
    - поснідала
    - поснідав
  - sentence: Після цього я ____ у магазин.
    answer: пішла
    options:
    - пішла
    - пішов
  - sentence: Там я ____ продукти.
    answer: купила
    options:
    - купила
    - купив
  - sentence: Ввечері я ____ вечерю.
    answer: готувала
    options:
    - готувала
    - готував
  - sentence: О десятій я ____ спати.
    answer: лягла
    options:
    - лягла
    - ліг
workbook:
- id: group-sort-gender
  type: group-sort
  instruction: Розподіліть дієслова за родом (Sort the verbs by gender)
  groups:
  - label: Чоловічий рід (Він)
    items:
    - прокинувся
    - поснідав
    - пішов
    - обідав
    - повернувся
    - ліг
  - label: Жіночий рід (Вона)
    items:
    - прокинулася
    - поснідала
    - пішла
    - обідала
    - повернулася
    - лягла
- id: quiz-reading-comprehension
  type: quiz
  instruction: Оберіть правильний варіант за текстом (Choose the correct option according
    to the text)
  items:
  - question: Що вкрав чоловік у свідка?
    options:
    - велосипед
    - кепку
    - куртку
    - каву
    correct: 0
  - question: Де свідок припаркував велосипед?
    options:
    - біля магазину
    - в парку
    - біля кав'ярні
    - в офісі
    correct: 0
  - question: Куди Тарас пішов зранку?
    options:
    - на роботу
    - в магазин
    - в кав'ярню
    - в парк
    correct: 0
  - question: З ким обідав Тарас?
    options:
    - з колегою
    - з другом
    - з подругою
    - сам
    correct: 0
  - question: Що робила Ірина зранку в суботу?
    options:
    - ходила на ринок
    - готувала обід
    - гуляла в парку
    - дивилася серіал
    correct: 0
  - question: О котрій годині Анна лягла спати?
    options:
    - о одинадцятій
    - о десятій
    - о дванадцятій
    - о дев'ятій
    correct: 0
- id: match-up-pronouns
  type: match-up
  instruction: З'єднайте іменники з відповідними займенниками (Match the nouns with
    the corresponding pronouns)
  pairs:
  - left: велосипед
    right: він
  - left: магазин
    right: він
  - left: кав'ярня
    right: вона
  - left: куртка
    right: вона
  - left: кепка
    right: вона
  - left: офіс
    right: він
- id: error-correction-verbs
  type: error-correction
  instruction: Знайдіть і виправте помилку в дієслові (Find and correct the error
    in the verb)
  items:
  - sentence: Тарас прокинулася о сьомій.
    error: прокинулася
    correction: прокинувся
    error_type: word
    options:
    - прокинувся
    - прокидатися
    - прокинулося
    explanation: Тарас — це він (чоловічий рід).
  - sentence: Анна ліг спати пізно.
    error: ліг
    correction: лягла
    error_type: word
    options:
    - лягла
    - лягло
    - лягти
    explanation: Анна — це вона (жіночий рід).
  - sentence: 'Свідок сказав: Я бачила чоловіка.'
    error: бачила
    correction: бачив
    error_type: word
    options:
    - бачив
    - бачило
    - бачити
    explanation: Свідок (у цьому тексті) чоловік, тому вживаємо чоловічий рід.
  - sentence: Мій друг пішла на роботу.
    error: пішла
    correction: пішов
    error_type: word
    options:
    - пішов
    - пішли
    - піде
    explanation: Друг — чоловічий рід.
  - sentence: Моя подруга купив продукти.
    error: купив
    correction: купила
    error_type: word
    options:
    - купила
    - купили
    - купило
    explanation: Подруга — жіночий рід.
  - sentence: Олег обідала в кафе.
    error: обідала
    correction: обідав
    error_type: word
    options:
    - обідав
    - обідали
    - обідати
    explanation: Олег — чоловічий рід.
- id: true-false-narrative
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Свідок бачив чоловіка в куртці та кепці.
    correct: true
    explanation: 'Так, свідок сказав: «Бачив чоловіка в куртці та кепці».'
  - statement: Тарас зранку дивився фільм.
    correct: false
    explanation: Тарас дивився фільм ввечері.
  - statement: Ірина ходила в ресторан з подругою.
    correct: true
    explanation: 'Так, вона сказала: «Ввечері ми з подругою ходили в ресторан».'
  - statement: Анна снідала салатом і соком.
    correct: false
    explanation: Вона їла салат і сік на обід.
  - statement: Вдень Анна готувала вечерю.
    correct: false
    explanation: Анна готувала вечерю ввечері.
  - statement: Після роботи Анна купила продукти.
    correct: true
    explanation: Так, вона ходила в магазин і купила продукти.
- id: unjumble-sentences
  type: unjumble
  instruction: Складіть правильне речення зі слів (Make a correct sentence from the
    words)
  items:
  - words:
    - я
    - Зранку
    - о
    - сьомій.
    - прокинувся
    correct_order:
    - Зранку
    - я
    - прокинувся
    - о
    - сьомій.
  - words:
    - кафе.
    - обідала
    - я
    - в
    - Вдень
    correct_order:
    - Вдень
    - я
    - обідала
    - в
    - кафе.
  - words:
    - я
    - Ввечері
    - серіал.
    - дивився
    correct_order:
    - Ввечері
    - я
    - дивився
    - серіал.
  - words:
    - пішов
    - на
    - я
    - Потім
    - роботу.
    correct_order:
    - Потім
    - я
    - пішов
    - на
    - роботу.
  - words:
    - продукти.
    - магазин
    - я
    - і
    - купила
    - Після
    - роботи
    - пішла
    - в
    correct_order:
    - Після
    - роботи
    - я
    - пішла
    - в
    - магазин
    - і
    - купила
    - продукти.
  - words:
    - спати.
    - лягла
    - я
    - Нарешті
    correct_order:
    - Нарешті
    - я
    - лягла
    - спати.
- id: match-up-sequence
  type: match-up
  instruction: З'єднайте українські слова з їхнім англійським значенням (Match the
    Ukrainian words with their English meaning)
  pairs:
  - left: учора
    right: yesterday
  - left: зранку
    right: in the morning
  - left: вдень
    right: in the afternoon
  - left: ввечері
    right: in the evening
  - left: спочатку
    right: first
  - left: потім
    right: then
  - left: нарешті
    right: finally
