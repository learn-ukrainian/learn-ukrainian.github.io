    answer: у вівторок
    options:
    - у вівторок
    - вівторок
    - в вівторок
    - у вівторку
  - sentence: Вони відпочивають _____.
    answer: у серпні
    options:
    - у серпні
    - серпень
    - в серпень
    - на серпні
workbook:
- id: reading-quiz
  type: quiz
  instruction: Відповідь на запитання за текстом (Answer the questions based on the
    text)
  items:
  - question: Який перший день тижня в Україні?
    options:
    - понеділок
    - неділя
    - субота
    - вівторок
    correct: 0
  - question: Що означає слово «неділя»?
    options:
    - вільний день
    - робочий день
    - тиждень
    - пора року
    correct: 0
  - question: Коли у Софії день народження?
    options:
    - у березні
    - у травні
    - у вересні
    - взимку
    correct: 0
  - question: Який місяць походить від слова «листя» (leaves)?
    options:
    - листопад
    - квітень
    - березень
    - липень
    correct: 0
  - question: Який місяць має інше закінчення (не -і)?
    options:
    - лютий
    - січень
    - жовтень
    - травень
    correct: 0
  - question: Які дні ми називаємо «вихідні»?
    options:
    - субота і неділя
    - понеділок і вівторок
    - четвер і п'ятниця
    - середа і субота
    correct: 0
- id: tf-calendar
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Понеділок — це перший день тижня.
    correct: true
    explanation: В Україні тиждень починається в понеділок. (In Ukraine, the week
      starts on Monday.)
  - statement: Неділя — це робочий день.
    correct: false
    explanation: Неділя — це вільний день, вихідний. (Sunday is a free day, the weekend.)
  - statement: Грудень, січень і лютий — це зима.
    correct: true
    explanation: Так, це зимові місяці. (Yes, these are winter months.)
  - statement: Після вівторка йде четвер.
    correct: false
    explanation: Після вівторка йде середа. (After Tuesday is Wednesday.)
  - statement: Взимку в Україні жарко.
    correct: false
    explanation: Взимку в Україні холодно. (It is cold in winter in Ukraine.)
  - statement: Серпень — це літо.
    correct: true
    explanation: Так, серпень — це останній місяць літа. (Yes, August is the last
      month of summer.)
