- type: fill-in
  title: "Complete the Sentence: In the Store"
  instruction: "Choose the correct form of the noun to complete the sentence."
  items:
    - sentence: "Я купую ___."
      answer: "каву"
      options: ["каву", "кава", "каві", "каво"]
    - sentence: "Він шукає ___."
      answer: "роботу"
      options: ["роботу", "робота", "роботи", "роботі"]
    - sentence: "Ми бачимо ___."
      answer: "стіл"
      options: ["стіл", "стола", "столі", "столу"]
    - sentence: "Вона відкриває ___."
      answer: "вікно"
      options: ["вікно", "вікна", "вікну", "вікні"]
    - sentence: "Я хочу купити ___."
      answer: "хліб"
      options: ["хліб", "хліба", "хлібу", "хлібі"]
    - sentence: "Ти читаєш ___."
      answer: "книжку"
      options: ["книжку", "книжка", "книжки", "книжці"]
    - sentence: "Вони п'ють ___."
      answer: "молоко"
      options: ["молоко", "молока", "молоку", "молоком"]
    - sentence: "Я знаходжу ___."
      answer: "ідею"
      options: ["ідею", "ідея", "ідеї", "ідеєю"]

- type: fill-in
  title: "Choose the Correct Verb"
  instruction: "Select the verb that makes sense in the sentence."
  items:
    - sentence: "Я ___ проблему."
