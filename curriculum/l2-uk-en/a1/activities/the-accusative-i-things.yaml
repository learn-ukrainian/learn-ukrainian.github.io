- type: group-sort
  title: "Змінюється чи ні?"
  instruction: "Drag the words into the correct category: 'Changes in Accusative' (Feminine -а/-я) or 'Does Not Change' (Masculine/Neuter)."
  groups:
    - name: "Змінюється (Changes)"
      items: ["книга", "вода", "кава", "піца", "газета", "карта", "музика", "машина"]
    - name: "Не змінюється (No Change)"
      items: ["стіл", "вікно", "парк", "телефон", "місто", "паспорт", "квиток", "чай"]

- type: match-up
  title: "Знайдіть пару"
  instruction: "Match the dictionary form (Nominative) with its Accusative form."
  pairs:
    - left: "книга"
      right: "книгу"
    - left: "вода"
      right: "воду"
    - left: "стіл"
      right: "стіл"
    - left: "вікно"
      right: "вікно"
    - left: "вулиця"
      right: "вулицю"
    - left: "місто"
      right: "місто"
    - left: "газета"
      right: "газету"
    - left: "чай"
      right: "чай"

- type: quiz
  title: "Оберіть правильне закінчення"
  instruction: "Choose the correct Accusative form for the sentence."
  items:
    - question: "Я дивлюся у вікно і бачу ____________ (machine/car)."
      explanation: "Машина is feminine (-а), so it changes to машину."
      options:
        - text: "машину"
          correct: true
        - text: "машина"
          correct: false
        - text: "машини"
          correct: false
        - text: "машині"
          correct: false
    - question: "Я завжди маю при собі ____________ (phone)."
      explanation: "Телефон is masculine inanimate, so it does not change."
      options:
        - text: "телефон"
          correct: true
        - text: "телефона"
          correct: false
        - text: "телефону"
          correct: false
        - text: "телефоні"
          correct: false
    - question: "Я зараз дуже хочу пити ____________ (water)."
      explanation: "Вода is feminine (-а), so it changes to воду."
      options:
        - text: "воду"
          correct: true
        - text: "вода"
          correct: false
        - text: "води"
          correct: false
        - text: "воді"
          correct: false
    - question: "У магазині я купую свіжий ____________ (bread)."
      explanation: "Хліб is masculine inanimate, so it does not change."
      options:
        - text: "хліб"
          correct: true
        - text: "хліба"
          correct: false
        - text: "хлібу"
          correct: false
        - text: "хліби"
          correct: false
    - question: "Я сиджу вдома і чую ____________ (music)."
      explanation: "Музика is feminine (-а), so it changes to музику."
      options:
        - text: "музику"
          correct: true
        - text: "музика"
          correct: false
        - text: "музики"
          correct: false
        - text: "музиці"
          correct: false
    - question: "У моїй кімнаті я бачу ____________ (window)."
      explanation: "Вікно is neuter, so it does not change."
      options:
        - text: "вікно"
          correct: true
        - text: "вікна"
          correct: false
        - text: "вікну"
          correct: false
        - text: "вікні"
          correct: false
    - question: "Я йду в магазин і беру ____________ (bag)."
      explanation: "Сумка is feminine (-а), so it changes to сумку."
      options:
        - text: "сумку"
          correct: true
        - text: "сумка"
          correct: false
        - text: "сумки"
          correct: false
        - text: "сумці"
          correct: false
    - question: "Мій друг Андрій має ____________ (problem)."
      explanation: "Проблема is feminine (-а), so it changes to проблему."
      options:
        - text: "проблему"
          correct: true
        - text: "проблема"
          correct: false
        - text: "проблеми"
          correct: false
        - text: "проблемі"
          correct: false
    - question: "Ми з мамою купуємо ____________ (apartment)."
      explanation: "Квартира is feminine (-а), so it changes to квартиру."
      options:
        - text: "квартиру"
          correct: true
        - text: "квартира"
          correct: false
        - text: "квартири"
          correct: false
        - text: "квартирі"
          correct: false
    - question: "Ти бачиш там великий ____________ (bus)?"
      explanation: "Автобус is masculine inanimate, so it does not change."
      options:
        - text: "автобус"
          correct: true
        - text: "автобуса"
          correct: false
        - text: "автобусу"
          correct: false
        - text: "автобуси"
          correct: false

- type: fill-in
  title: "Заповніть пропуски"
  instruction: "Type the correct Accusative form of the word in brackets."
  items:
    - sentence: "Я читаю (книга) ____________."
      answer: "книгу"
      options: ["книгу", "книга", "книги", "книзі"]
      explanation: "Книга -> Книгу (Feminine)"
    - sentence: "Я п'ю (кава) ____________."
      answer: "каву"
      options: ["каву", "кава", "кави", "каві"]
      explanation: "Кава -> Каву (Feminine)"
    - sentence: "Я бачу (вікно) ____________."
      answer: "вікно"
      options: ["вікно", "вікна", "вікну", "вікні"]
      explanation: "Вікно -> Вікно (Neuter - No change)"
    - sentence: "Я маю (план) ____________."
      answer: "план"
      options: ["план", "плана", "плану", "плани"]
      explanation: "План -> План (Masculine - No change)"
    - sentence: "Я хочу (піца) ____________."
      answer: "піцу"
      options: ["піцу", "піца", "піци", "піці"]
      explanation: "Піца -> Піцу (Feminine)"
    - sentence: "Я купую (машина) ____________."
      answer: "машину"
      options: ["машину", "машина", "машини", "машині"]
      explanation: "Машина -> Машину (Feminine)"
    - sentence: "Я чую (звук) ____________."
      answer: "звук"
      options: ["звук", "звука", "звуку", "звуки"]
      explanation: "Звук -> Звук (Masculine - No change)"
    - sentence: "Я беру (ручка) ____________."
      answer: "ручку"
      options: ["ручку", "ручка", "ручки", "ручці"]
      explanation: "Ручка -> Ручку (Feminine)"

