- type: quiz
  title: 'Grammar Check: Direct Objects'
  instruction: "Choose the correct answer for each question."
  items:
    - question: "When an object receives an action, which case do we use in Ukrainian?"
      options:
        - text: "Nominative"
          correct: false
        - text: "Accusative"
          correct: true
        - text: "Locative"
          correct: false
        - text: "Genitive"
          correct: false
    - question: "What happens to inanimate masculine and neuter nouns in the Accusative case?"
      options:
        - text: "They take the -у ending"
          correct: false
        - text: "They change completely"
          correct: false
        - text: "They do not change"
          correct: true
        - text: "They add the letter a"
          correct: false
    - question: "Which ending replaces -а for feminine nouns in the Accusative case?"
      options:
        - text: "-у"
          correct: true
        - text: "-ю"
          correct: false
        - text: "-і"
          correct: false
        - text: "-о"
          correct: false
    - question: "What does -я change to in the Accusative case?"
      options:
        - text: "-у"
          correct: false
        - text: "-ю"
          correct: true
        - text: "-і"
          correct: false
        - text: "-о"
          correct: false
    - question: "Which of these words is a feminine noun that changes in the Accusative case?"
      options:
        - text: "книга"
          correct: true
        - text: "хліб"
          correct: false
        - text: "вікно"
          correct: false
        - text: "стіл"
          correct: false
    - question: "Which of these words does NOT change in the Accusative case?"
      options:
        - text: "кава"
          correct: false
        - text: "гречка"
          correct: false
        - text: "проблема"
          correct: false
        - text: "пакет"
          correct: true
    - question: "What is the Conceptual Nominative error?"
      options:
        - text: "Changing masculine words"
          correct: false
        - text: "Not changing feminine words receiving an action"
          correct: true
        - text: "Changing word order"
          correct: false
        - text: "Using the wrong verb"
          correct: false
    - question: "In the sentence 'Я бачу стіл', why is 'стіл' unchanged?"
      options:
        - text: "It is masculine inanimate"
          correct: true
        - text: "It is feminine"
          correct: false
        - text: "It is the subject"
          correct: false
        - text: "It is plural"
          correct: false

