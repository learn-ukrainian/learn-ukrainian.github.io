- type: true-false
  title: "Is the Grammar Correct?"
  instruction: "Determine if the sentence uses the correct case ending for the object."
  items:
    - statement: "Я читаю книга."
      correct: false
      explanation: "This is the Conceptual Nominative error. The word книга must change to книгу because it receives the action."
    - statement: "Вона купує хліб."
      correct: true
      explanation: "Correct! 'Хліб' is an inanimate masculine noun, so it does not change in the Accusative case."
    - statement: "Я хочу кава."
      correct: false
      explanation: "The feminine word 'кава' must change to 'каву' in the Accusative case."
    - statement: "Він бачить вікно."
      correct: true
      explanation: "Correct! 'Вікно' is a neuter noun, so it does not change."
    - statement: "Ми купуємо гречку."
      correct: true
      explanation: "Correct! The feminine word 'гречка' correctly changes to 'гречку'."
    - statement: "Я шукаю стола."
      correct: false
      explanation: "This is Masculine Inanimate Confusion. 'Стіл' is masculine and inanimate, so it should not change."
    - statement: "Я маю можливість."
      correct: true
      explanation: "Correct! This is a common and natural phrase."
    - statement: "Ти бачиш проблему."
      correct: true
      explanation: "Correct! The feminine noun 'проблема' correctly changes to 'проблему'."

