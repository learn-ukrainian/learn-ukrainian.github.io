- type: unjumble
  title: "Складіть речення"
  instruction: "Put the words in the correct order to form a sentence."
  items:
    - words: ["Я", "бачу", "стіл"]
      answer: "Я бачу стіл"
    - words: ["Я", "читаю", "книгу"]
      answer: "Я читаю книгу"
    - words: ["Я", "чую", "музику"]
      answer: "Я чую музику"
    - words: ["Я", "маю", "ідею"]
      answer: "Я маю ідею"
    - words: ["Ми", "бачимо", "парк"]
