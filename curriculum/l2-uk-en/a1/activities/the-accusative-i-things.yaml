      answer: "читає"
      options: ["читає", "п'є", "їсть", "купує"]
    - sentence: "Ти ___ мій голос?"
      answer: "чуєш"
      options: ["чуєш", "читаєш", "бачиш", "береш"]
    - sentence: "Я ___ час."
      answer: "маю"
      options: ["маю", "бачу", "чую", "п'ю"]
    - sentence: "Він ___ каву."
      answer: "п'є"
      options: ["п'є", "читає", "слухає", "говорить"]
    - sentence: "Ми ___ вихід."
      answer: "шукаємо"
      options: ["шукаємо", "п'ємо", "читаємо", "їмо"]
    - sentence: "Я ___ вікно."
      answer: "відкриваю"
      options: ["відкриваю", "п'ю", "читаю", "чую"]

- type: quiz
  title: "Understanding the Accusative Case"
  instruction: "Choose the best answer for each question."
  items:
    - question: "When do we use the Accusative case?"
      explanation: "The Accusative case is used for the direct object, which receives the action of the verb."
      options:
        - text: "For the direct object of an action."
          correct: true
        - text: "For the subject of the sentence."
          correct: false
        - text: "To describe where something is."
          correct: false
        - text: "To show who owns something."
          correct: false
    - question: "What happens to feminine nouns ending in -а in the Accusative case?"
      explanation: "Feminine words ending in -а change to -у, like 'книга' to 'книгу'."
      options:
        - text: "The ending changes to -у."
          correct: true
        - text: "The ending changes to -ю."
          correct: false
        - text: "The ending does not change."
          correct: false
        - text: "The ending changes to -і."
          correct: false
    - question: "Which of these words does NOT change in the Accusative case?"
      explanation: "Inanimate masculine nouns like 'стіл' do not change their ending."
      options:
        - text: "стіл"
          correct: true
        - text: "кава"
          correct: false
        - text: "книга"
          correct: false
        - text: "проблема"
          correct: false
    - question: "Which of the following sentences is grammatically correct?"
      explanation: "The direct object 'книга' must change to 'книгу'."
      options:
        - text: "Я читаю книгу."
          correct: true
        - text: "Я читаю книга."
          correct: false
        - text: "Я читаю книги."
          correct: false
        - text: "Я читаю книгою."
          correct: false
    - question: "What happens to the word 'вікно' when you say 'I see a window'?"
      explanation: "Neuter words like 'вікно' do not change in the Accusative case."
      options:
        - text: "It stays 'вікно'."
          correct: true
        - text: "It becomes 'вікну'."
          correct: false
        - text: "It becomes 'вікна'."
          correct: false
        - text: "It becomes 'вікні'."
          correct: false
    - question: "How do you translate 'I want to buy bread'?"
      explanation: "'Хліб' is an inanimate masculine noun, so it does not change."
      options:
        - text: "Я хочу купити хліб."
          correct: true
        - text: "Я хочу купити хліба."
          correct: false
        - text: "Я хочу купити хлібу."
          correct: false
        - text: "Я хочу купити хлібом."
          correct: false
    - question: "Which verb is a common trigger for the Accusative case?"
      explanation: "'Бачити' (to see) is an action verb that requires a direct object."
      options:
        - text: "бачити"
          correct: true
        - text: "спати"
          correct: false
        - text: "стояти"
          correct: false
        - text: "сидіти"
          correct: false
    - question: "What does 'Пакет потрібен?' mean at a supermarket?"
      explanation: "It is the standard question cashiers ask, meaning 'Is a bag needed?'"
      options:
        - text: "Do you need a bag?"
          correct: true
        - text: "Do you need bread?"
          correct: false
        - text: "Do you want coffee?"
          correct: false
        - text: "Are you paying cash?"
          correct: false

- type: true-false
  title: "True or False: Grammar and Culture"
  instruction: "Decide if the statement is true or false."
  items:
    - statement: "In Ukrainian, word order is flexible, so we use case endings to show who does what."
      correct: true
      explanation: "Endings tell us the role of a word, like whether it is the subject or the direct object."
    - statement: "You must add an -a ending to the word 'стіл' when you see it."
      correct: false
      explanation: "Inanimate masculine nouns like 'стіл' do not change in the Accusative case."
    - statement: "The word 'молоко' changes to 'молоку' when you drink it."
      correct: false
      explanation: "Neuter words like 'молоко' stay exactly the same in the dictionary form."
    - statement: "Feminine nouns ending in -я change to -ю in the Accusative case."
      correct: true
      explanation: "For example, 'ідея' becomes 'ідею'."
    - statement: "A 'супермаркет' in Ukraine is exactly the same as a traditional 'базар'."
      correct: false
      explanation: "A supermarket is modern and fast, while a bazaar is a traditional, lively market."
    - statement: "Buckwheat (гречка) is a very rare and unusual food in Ukraine."
      correct: false
      explanation: "Buckwheat is a huge cultural staple and a very common side dish."
    - statement: "The phrase 'Я маю рація' is correct."
      correct: false
      explanation: "It should be 'Я маю рацію', because 'рація' is the direct object."
    - statement: "The verbs 'хотіти', 'мати', and 'брати' are common triggers for the Accusative case."
      correct: true
      explanation: "These verbs represent actions that are done to objects."

