      answer: "метро"
      options: ["метро", "метра", "метру", "метри"]
      explanation: "Метро -> Метро (Neuter/Indeclinable)"
    - sentence: "Я бачу (вулиця) ____________."
      answer: "вулицю"
      options: ["вулицю", "вулиця", "вулиці", "вулицею"]
