- type: group-sort
  title: "Змінюється чи ні?"
  instruction: "Sort the words based on whether they change in the Accusative case (when you 'see' or 'buy' them)."
  groups:
    - name: "Змінюється (-а/-я → -у/-ю)"
      items:
        - "кава"
        - "книга"
        - "вода"
        - "газета"
        - "вишня"
        - "мелодія"
        - "піца"
        - "мама"
    - name: "Не змінюється"
      items:
        - "стіл"
        - "телефон"
        - "вікно"
        - "паспорт"
        - "місто"
        - "автобус"
        - "чай"
        - "хліб"

- type: match-up
  title: "Пари: Називний та Знахідний"
  instruction: "Match the dictionary form (Nominative) with its 'target' form (Accusative)."
  pairs:
    - left: "кава"
      right: "каву"
    - left: "книга"
      right: "книгу"
    - left: "вода"
      right: "воду"
    - left: "стіл"
      right: "стіл"
    - left: "вікно"
      right: "вікно"
    - left: "вишня"
      right: "вишню"
    - left: "паспорт"
      right: "паспорт"
    - left: "газета"
      right: "газету"

- type: quiz
  title: "Перевірка правил"
  instruction: "Choose the correct answer based on the grammar rules."
  items:
    - question: "Яке закінчення має слово «вода» у реченні «Я хочу...»?"
      options:
        - text: "воду"
          correct: true
        - text: "вода"
          correct: false
        - text: "води"
          correct: false
        - text: "воді"
          correct: false
      explanation: "Feminine nouns ending in -а change to -у in the Accusative case."
    - question: "Як сказати «Я бачу стіл»?"
      options:
        - text: "Я бачу стіл"
          correct: true
        - text: "Я бачу стола"
          correct: false
        - text: "Я бачу столу"
          correct: false
        - text: "Я бачу стілом"
          correct: false
      explanation: "Masculine inanimate nouns (like table) do not change in the Accusative case."
    - question: "Коли ми вживаємо знахідний відмінок?"
      options:
        - text: "Коли об'єкт є ціллю дії"
          correct: true
        - text: "Коли ми просто називаємо об'єкт"
          correct: false
        - text: "Коли об'єкт виконує дію"
          correct: false
        - text: "Тільки для людей"
          correct: false
      explanation: "The Accusative case marks the direct object (the target of the action)."
    - question: "Яке слово змінюється: «вікно» чи «піца»?"
      options:
        - text: "піца"
          correct: true
        - text: "вікно"
          correct: false
        - text: "обидва"
          correct: false
        - text: "жодне"
          correct: false
      explanation: "Feminine nouns (піца) change. Neuter nouns (вікно) do not."
    - question: "Оберіть правильну форму: «Ми чуємо...»"
      options:
        - text: "музику"
          correct: true
        - text: "музика"
          correct: false
        - text: "музики"
          correct: false
        - text: "музиці"
          correct: false
      explanation: "«Музика» ends in -а, so it changes to -у."
    - question: "Оберіть правильну форму: «Він купує...»"
      options:
        - text: "сир"
          correct: true
        - text: "сира"
          correct: false
        - text: "сиру"
          correct: false
        - text: "сиром"
          correct: false
      explanation: "«Сир» is masculine inanimate, so it does not change."
    - question: "Яке слово НЕ змінюється у знахідному відмінку?"
      options:
        - text: "автобус"
          correct: true
        - text: "мама"
          correct: false
        - text: "карта"
          correct: false
        - text: "кухня"
          correct: false
      explanation: "Masculine inanimate nouns (like автобус) do not change."
    - question: "Як сказати «I see a cherry» українською?"
      options:
        - text: "Я бачу вишню"
          correct: true
        - text: "Я бачу вишня"
          correct: false
        - text: "Я бачу вишні"
          correct: false
        - text: "Я бачу вишнею"
          correct: false
      explanation: "Soft feminine -я changes to -ю."

- type: fill-in
  title: "Заповніть пропуски"
  instruction: "Complete the sentences with the correct form of the word in parentheses."
  items:
    - sentence: "Я бачу _____ (книга)."
      answer: "книгу"
      options: ["книгу", "книга", "книги", "книзі"]
      explanation: "Книга -> книгу (-а -> -у)."
    - sentence: "Вона має _____ (телефон)."
      answer: "телефон"
      options: ["телефон", "телефона", "телефону", "телефоні"]
      explanation: "Телефон is masculine, no change."
    - sentence: "Ми купуємо _____ (кава)."
      answer: "каву"
      options: ["каву", "кава", "кави", "каві"]
      explanation: "Кава -> каву (-а -> -у)."
    - sentence: "Я чую _____ (мелодія)."
      answer: "мелодію"
      options: ["мелодію", "мелодія", "мелодії", "мелодією"]
      explanation: "Мелодія -> мелодію (-я -> -ю)."
    - sentence: "Він хоче _____ (вода)."
      answer: "воду"
      options: ["воду", "вода", "води", "воді"]
      explanation: "Вода -> воду (-а -> -у)."
    - sentence: "Ти бачиш _____ (вікно)?"
      answer: "вікно"
      options: ["вікно", "вікна", "вікну", "вікном"]
      explanation: "Вікно is neuter, no change."
    - sentence: "Я маю _____ (паспорт)."
      answer: "паспорт"
      options: ["паспорт", "паспорта", "паспорту", "паспорті"]
      explanation: "Паспорт is masculine, no change."
    - sentence: "Вона любить _____ (піца)."
      answer: "піцу"
      options: ["піцу", "піца", "піци", "піці"]
      explanation: "Піца -> піцу (-а -> -у)."

- type: unjumble
  title: "Складіть речення"
  instruction: "Arrange the words to form a correct sentence."
  items:
    - words: ["Я", "каву", "купую"]
      answer: "Я купую каву"
    - words: ["вікно", "Він", "бачить"]
      answer: "Він бачить вікно"
    - words: ["музику", "Ми", "чуємо"]
      answer: "Ми чуємо музику"
    - words: ["хоче", "Вона", "воду"]
      answer: "Вона хоче воду"
    - words: ["паспорт", "маю", "Я"]
      answer: "Я маю паспорт"
    - words: ["Ти", "проблему", "маєш"]
      answer: "Ти маєш проблему"

- type: true-false
  title: "Правда чи ні?"
  instruction: "Read the statements about grammar and decide if they are true or false."
  items:
    - statement: "Слово «стіл» змінюється у знахідному відмінку."
      correct: false
      explanation: "Masculine inanimate nouns do not change."
    - statement: "Слово «кава» змінюється на «каву» у знахідному відмінку."
      correct: true
      explanation: "-а changes to -у."
    - statement: "Ми використовуємо називний відмінок після слова «Це»."
      correct: true
      explanation: "«Це» identifies something (Nominative), it doesn't act on it."
    - statement: "Слово «вікно» змінюється на «вікну»."
      correct: false
      explanation: "Neuter nouns ending in -о do not change."
    - statement: "Дієслово «бачити» вимагає знахідного відмінка."
      correct: true
      explanation: "When you see something, it is the direct object."
    - statement: "Слово «вишня» змінюється на «вишню»."
      correct: true
      explanation: "Soft feminine -я changes to soft -ю."
    - statement: "Слово «місто» (city) змінюється на «місту»."
      correct: false
      explanation: "Neuter nouns do not change in the Accusative case."
    - statement: "Слово «газета» змінюється на «газету»."
      correct: true
      explanation: "Feminine nouns ending in -а change to -у."

- type: unjumble
  title: "Запитання та відповіді"
  instruction: "Arrange the words to form correct sentences."
  items:
    - words: ["купуєш", "ти", "Що"]
      answer: "Що ти купуєш"
    - words: ["паспорт", "твій", "Де"]
      answer: "Де твій паспорт"
    - words: ["бачите", "Ви", "проблему"]
      answer: "Ви бачите проблему"
    - words: ["воду", "шукаю", "Я"]
      answer: "Я шукаю воду"
    - words: ["має", "Він", "час"]
      answer: "Він має час"
    - words: ["чуємо", "Ми", "мелодію"]
      answer: "Ми чуємо мелодію"

- type: fill-in
  title: "В магазині"
  instruction: "Complete the dialogue with the correct word forms."
  items:
    - sentence: "— Добрий день! Я хочу _____ (вода)."
      answer: "воду"
      options: ["воду", "вода", "води", "воді"]
      explanation: "Water (вода) is the object -> воду."
    - sentence: "— Ось ваша вода. Що ще? — Я шукаю _____ (хліб)."
      answer: "хліб"
      options: ["хліб", "хліба", "хлібу", "хлібом"]
      explanation: "Bread (хліб) is masculine inanimate -> no change."
    - sentence: "— Я також купую _____ (газета)."
      answer: "газету"
      options: ["газету", "газета", "газети", "газеті"]
      explanation: "Newspaper (газета) is feminine -> газету."
    - sentence: "— Ви бачите _____ (ціна)?"
      answer: "ціну"
      options: ["ціну", "ціна", "ціни", "ціні"]
      explanation: "Price (ціна) is feminine -> ціну."
    - sentence: "— Так, я бачу _____ (ціна)."
      answer: "ціну"
      options: ["ціну", "ціна", "ціни", "ціні"]
      explanation: "Same rule: ціна -> ціну."
    - sentence: "— Дякую! Я беру _____ (все)."
      answer: "все"
      options: ["все", "всьо", "всім", "всього"]
      explanation: "Everything (все) is neuter/invariant here."
    - sentence: "— Це смачна _____ (кава)."
      answer: "кава"
      options: ["кава", "каву", "кави", "каві"]
      explanation: "Here 'This is...' requires Nominative -> кава."
    - sentence: "— Я купую цю _____ (кава)."
      answer: "каву"
      options: ["каву", "кава", "кави", "каві"]
      explanation: "Here 'I buy...' requires Accusative -> каву."
