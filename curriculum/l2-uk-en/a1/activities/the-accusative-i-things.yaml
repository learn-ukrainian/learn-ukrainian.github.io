- type: group-sort
  title: "Which words change their ending?"
  instruction: "Sort the nouns based on whether they change their ending when receiving an action."
  groups:
    - name: "Changes ending (Feminine)"
      items:
        - "книга"
        - "кава"
        - "гречка"
        - "проблема"
        - "кімната"
        - "музика"
    - name: "Stays the same (Masculine/Neuter)"
      items:
        - "стіл"
        - "хліб"
        - "час"
        - "вікно"
        - "пакет"
        - "одяг"

- type: true-false
  title: "True or False: Accusative Rules"
  instruction: "Read the rules about the Accusative case and decide if they are true or false."
  items:
    - statement: "Inanimate masculine nouns like хліб and стіл do not change their endings when they are direct objects."
      correct: true
    - statement: "Feminine nouns keep the same ending when they receive an action."
      correct: false
      explanation: "Feminine nouns change their endings (for example, -а changes to -у) when they are direct objects."
    - statement: "The Ukrainian word for time is час, and it changes to часу when you say I have time."
      correct: false
      explanation: "Час is a masculine inanimate noun, so its ending does not change in the Accusative case."
    - statement: "The letter а at the end of a feminine noun changes to у in the Accusative case."
      correct: true
    - statement: "The word вікно is a neuter noun, so it does not change its ending for direct objects."
      correct: true
    - statement: "The letter я at the end of a feminine noun changes to ю in the Accusative case."
      correct: true
    - statement: "English relies on strict word order, while Ukrainian relies on word endings to show the direct object."
      correct: true
    - statement: "If you buy clothes (одяг), the word changes to одягу because it is receiving the action."
      correct: false
      explanation: "Одяг is a masculine inanimate noun, so it does not change its ending."

