- type: fill-in
  title: 'Change verbs to past tense'
  instruction: 'Change the verb in parentheses to the Past Tense. Pay attention to the gender!'
  items:
    - sentence: '(Він) _____ книгу.'
      answer: 'читав'
      options: ['читав', 'читала', 'читали', 'читало']
      explanation: 'Masculine gender (Він) takes the ending -в.'
    - sentence: '(Вона) _____ музику.'
      answer: 'слухала'
      options: ['слухала', 'слухав', 'слухали', 'слухало']
      explanation: 'Feminine gender (Вона) takes the ending -ла.'
    - sentence: '(Ми) _____ вдома.'
      answer: 'були'
      options: ['були', 'був', 'була', 'було']
      explanation: 'Plural (Ми) takes the ending -ли.'
    - sentence: '(Я - чоловік) _____ каву.'
      answer: 'робив'
      options: ['робив', 'робила', 'робили', 'робило']
      explanation: 'Masculine speaker (Я) takes the ending -в.'
    - sentence: '(Я - жінка) _____ фільм.'
      answer: 'дивилася'
      options: ['дивилася', 'дивився', 'дивилися', 'дивилося']
      explanation: 'Feminine speaker (Я) takes the ending -ла (reflexive -лася).'
    - sentence: '(Вони) _____ піцу.'
      answer: 'їли'
      options: ['їли', 'їв', 'їла', 'їло']
      explanation: 'Plural (Вони) takes the ending -ли.'
    - sentence: '(Він) _____ у парк.'
      answer: 'ішов'
      options: ['ішов', 'ішла', 'ішли', 'ішло']
      explanation: 'Masculine gender (Він) for motion verb "йти" is "ішов".'
    - sentence: '(Вона) _____ лист.'
      answer: 'писала'
      options: ['писала', 'писав', 'писали', 'писало']
      explanation: 'Feminine gender (Вона) takes the ending -ла.'
    - sentence: '(Ви) _____ у футбол?'
      answer: 'грали'
      options: ['грали', 'грав', 'грала', 'грало']
      explanation: 'Plural/Formal (Ви) takes the ending -ли.'
    - sentence: '(Ти - чоловік) _____ довго?'
      answer: 'спав'
      options: ['спав', 'спала', 'спали', 'спало']
      explanation: 'Masculine (Ти) takes the ending -в.'

