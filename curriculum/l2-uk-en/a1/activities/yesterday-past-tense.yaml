          correct: false

- type: unjumble
  title: 'Build the Sentence'
  instruction: 'Put the words in the correct order to form sentences about the past.'
  items:
    - words:
        - "Вчора"
        - "я"
        - "був"
        - "удома."
      answer: "Вчора я був удома."
    - words:
