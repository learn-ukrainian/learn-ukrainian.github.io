    - question: 'What is the past tense of "йти" (to go) for "He"?'
      explanation: 'Irregular form: ішов.'
      options:
        - text: 'ішов'
          correct: true
        - text: 'йтив'
          correct: false
        - text: 'йшов'
          correct: false
        - text: 'ішла'
          correct: false
    - question: 'What is the past tense of "бути" for "They"?'
      explanation: 'Plural form: були.'
      options:
        - text: 'були'
          correct: true
        - text: 'був'
          correct: false
        - text: 'була'
          correct: false
        - text: 'було'
          correct: false
    - question: 'How do you say "Last year"?'
      explanation: 'Fixed phrase: Минулого року.'
