- type: quiz
  title: 'Check Your Knowledge'
  instruction: 'Choose the correct answer.'
  items:
    - question: 'Which sentence is correct for a man?'
      explanation: 'Masculine verbs end in -в.'
      options:
        - text: 'Я ходив у парк.'
          correct: true
        - text: 'Я ходила у парк.'
          correct: false
        - text: 'Я ходили у парк.'
          correct: false
        - text: 'Я ходило у парк.'
          correct: false
    - question: 'Which sentence is correct for "We"?'
      explanation: 'Plural verbs end in -ли.'
      options:
        - text: 'Ми були раді.'
          correct: true
        - text: 'Ми був раді.'
          correct: false
        - text: 'Ми була раді.'
          correct: false
        - text: 'Ми було раді.'
          correct: false
    - question: 'Translate the following sentence: "She ate soup."'
      explanation: 'She (Вона) + eat (їсти) -> їла.'
      options:
        - text: 'Вона їла суп.'
          correct: true
        - text: 'Вона їв суп.'
          correct: false
        - text: 'Вона їли суп.'
          correct: false
        - text: 'Вона їсти суп.'
          correct: false
