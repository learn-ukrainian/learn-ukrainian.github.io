- type: fill-in
  title: "Неправильні дієслова (Irregular Verbs)"
  instruction: "Select the correct form of 'їсти' (to eat) or 'йти' (to go)."
  items:
    - sentence: "Вчора він __________ піцу на обід."
      answer: "їв"
      options: ["їв", "їла", "їло", "їли"]
      explanation: "Masculine form of 'їсти' is 'їв'."
    - sentence: "Вона __________ яблуко."
      answer: "їла"
      options: ["їв", "їла", "їло", "їли"]
      explanation: "Feminine form of 'їсти' is 'їла'."
    - sentence: "Ми __________ у парк вчора."
      answer: "ходили"
      options: ["ходили", "ходив", "ходила", "ходило"]
      explanation: "Plural past tense of 'ходити' is 'ходили'."
    - sentence: "Вчора я (man) __________ додому пішки."
      answer: "ішов"
      options: ["ішов", "ішла", "ішло", "ішли"]
      explanation: "Masculine past tense of 'йти' is 'ішов'."
    - sentence: "Вони __________ смачний суп."
      answer: "їли"
      options: ["їв", "їла", "їло", "їли"]
      explanation: "Plural form of 'їсти' is 'їли'."
    - sentence: "Марія __________ в магазин."
      answer: "ішла"
      options: ["ішов", "ішла", "ішло", "ішли"]
      explanation: "Feminine past tense of 'йти' is 'ішла'."
    - sentence: "Ти (man) __________ салат?"
      answer: "їв"
      options: ["їв", "їла", "їло", "їли"]
      explanation: "Masculine 'You' takes 'їв'."
    - sentence: "Ми __________ в кіно."
      answer: "ходили"
      options: ["ходили", "ходив", "ходила", "ходило"]
      explanation: "Plural 'We' takes 'ходили'."

- type: true-false
  title: "Правда чи ні? (True or False)"
  instruction: "Decide if the statement about grammar or usage is correct."
  items:
    - statement: "The phrase 'В минулому році' is correct Ukrainian."
      correct: false
      explanation: "No, we say 'минулого року' without the preposition 'в'."
    - statement: "A woman should say 'Я читала'."
      correct: true
      explanation: "Yes, women use the -ла suffix for the past tense."
    - statement: "To say 'We were at home', you say 'Ми були вдома'."
      correct: true
      explanation: "Yes, 'були' is the correct plural past form of 'to be'."
    - statement: "'Вчора' means 'Tomorrow'."
      correct: false
      explanation: "'Вчора' means 'Yesterday'. 'Tomorrow' is 'Завтра'."
    - statement: "The masculine past form of 'їсти' is 'їстив'."
      correct: false
      explanation: "No, it is irregular: 'їв'."
    - statement: "The word 'не' is placed before the verb to make it negative."
      correct: true
      explanation: "Yes, 'не' + verb (не читав) is the correct structure."
    - statement: "The verb 'йти' becomes 'ішов/ішла' in the past."
      correct: true
      explanation: "Yes, 'йти' is an irregular verb in the past tense."
    - statement: "'Минулого тижня' means 'Next week'."
      correct: false
      explanation: "No, it means 'Last week'."

- type: fill-in
  title: "Моє вчора (My Yesterday)"
  instruction: "Complete the story about a woman's day using the correct verbs."
  items:
    - sentence: "Вчора я (woman) __________ рано, о сьомій годині."
      answer: "прокидалася"
      options: ["прокидалася", "прокидався", "прокидалося", "прокидалися"]
      explanation: "Feminine form for 'woke up'."
    - sentence: "Я __________ смачний сніданок."
      answer: "готувала"
      options: ["готувала", "готував", "готувало", "готували"]
      explanation: "Feminine form for 'cooked/prepared'."
    - sentence: "Потім я __________ цікаву книгу."
      answer: "читала"
      options: ["читала", "читав", "читало", "читали"]
      explanation: "Feminine form for 'read'."
    - sentence: "Вдень я __________ в офісі."
      answer: "працювала"
      options: ["працювала", "працював", "працювало", "працювали"]
      explanation: "Feminine form for 'worked'."
    - sentence: "Ввечері ми з подругою __________ чай."
      answer: "пили"
      options: ["пили", "пив", "пила", "пило"]
      explanation: "Plural form for 'drank' (we)."
    - sentence: "Мій день __________ дуже цікавий."
      answer: "був"
      options: ["був", "була", "було", "були"]
      explanation: "'День' (day) is masculine, so we use 'був'."
    - sentence: "Я __________ музику."
      answer: "слухала"
      options: ["слухала", "слухав", "слухало", "слухали"]
      explanation: "Feminine form for 'listened'."
    - sentence: "Ввечері я __________ фільм."
      answer: "дивилася"
      options: ["дивилася", "дивився", "дивилося", "дивилися"]
      explanation: "Feminine form for 'watched'."
