    - sentence: 'Ми ходи____ в кіно.'
      answer: 'ли'
      options: ['ли', 'в', 'ла', 'ло']
      explanation: 'My (Plural) -> ходили.'
    - sentence: 'Сонце (воно) світи____.'
      answer: 'ло'
      options: ['ло', 'в', 'ла', 'ли']
      explanation: 'Sontse (Neuter) -> світило.'
    - sentence: 'Студенти писа____ тест.'
      answer: 'ли'
      options: ['ли', 'в', 'ла', 'ло']
      explanation: 'Students (Plural) -> писали.'
    - sentence: 'Бабуся відпочива____.'
      answer: 'ла'
      options: ['ла', 'в', 'ли', 'ло']
      explanation: 'Babusya (Feminine) -> відпочивала.'
    - sentence: 'Дідусь спа____.'
      answer: 'в'
      options: ['в', 'ла', 'ли', 'ло']
      explanation: 'Didus (Masculine) -> спав.'
    - sentence: 'Ви бачи____ це?'
      answer: 'ли'
      options: ['ли', 'в', 'ла', 'ло']
      explanation: 'Vy (Plural) -> бачили.'
    - sentence: 'Я говори____ з подругою.'
      answer: 'ла'
      options: ['ла', 'в', 'ли', 'ло']
      explanation: 'Assuming female context or options dictate -> говорила.'
    - sentence: 'Я купува____ хліб.'
      answer: 'в'
      options: ['в', 'ла', 'ли', 'ло']
      explanation: 'Assuming male context or options dictate -> купував.'

- type: fill-in
  title: 'What did you do yesterday?'
  instruction: 'Complete the answer based on the cue.'
  items:
    - sentence: 'Що ти робив вчора? (читати книгу) → Я _____ книгу.'
      answer: 'читав'
      options: ['читав', 'читала', 'читали', 'читало']
      explanation: 'Masculine question imply masculine answer: читав.'
    - sentence: 'Що ти робила вчора? (слухати радіо) → Я _____ радіо.'
      answer: 'слухала'
      options: ['слухала', 'слухав', 'слухали', 'слухало']
      explanation: 'Feminine question implies feminine answer: слухала.'
    - sentence: 'Що ви робили минулого тижня? (працювати) → Ми _____.'
      answer: 'працювали'
      options: ['працювали', 'працював', 'працювала', 'працювало']
      explanation: 'Plural question (ви -> ми): працювали.'
    - sentence: 'Де ви були вчора? (бути вдома) → Ми _____ вдома.'
      answer: 'були'
      options: ['були', 'був', 'була', 'було']
      explanation: 'Plural subject (Ми): були.'
    - sentence: 'Що вона робила зранку? (пити чай) → Вона _____ чай.'
      answer: 'пила'
      options: ['пила', 'пив', 'пили', 'пило']
      explanation: 'Feminine subject (Вона): пила.'
    - sentence: 'Що він робив увечері? (дивитися фільм) → Він _____ фільм.'
      answer: 'дивився'
      options: ['дивився', 'дивилася', 'дивилися', 'дивилося']
      explanation: 'Masculine subject (Він): дивився.'
    - sentence: 'Що вони робили? (грати у футбол) → Вони _____ у футбол.'
      answer: 'грали'
      options: ['грали', 'грав', 'грала', 'грало']
      explanation: 'Plural subject (Вони): грали.'
    - sentence: 'Що ти робив? (спати) → Я _____.'
      answer: 'спав'
      options: ['спав', 'спала', 'спали', 'спало']
      explanation: 'Masculine question: спав.'

- type: true-false
  title: 'Grammar Rules'
  instruction: 'Decide if the statement is True or False.'
  items:
    - statement: 'To form the past tense, we usually remove -ти and add an ending.'
      correct: true
      explanation: 'Yes, remove infinitive suffix -ти and add -в/-ла/-ло/-ли.'
    - statement: 'For a man, the ending is always -ла.'
      correct: false
      explanation: 'No, for a man (masculine), the ending is -в.'
    - statement: 'For a woman, the ending is -ла.'
      correct: true
      explanation: 'Yes, feminine gender uses -ла.'
    - statement: 'For "We", "You", "They", the ending is -ли.'
      correct: true
      explanation: 'Yes, plural always uses -ли.'
    - statement: 'The past tense of "йти" (to go) is "йтив".'
      correct: false
      explanation: 'No, it is irregular: ішов / ішла / ішли.'
    - statement: 'The past tense of "їсти" (to eat) is "їв / їла".'
      correct: true
      explanation: 'Yes, the stem contracts to ї-.'
    - statement: 'You must always use "був" (was) with other verbs, like "Я був читав".'
      correct: false
      explanation: 'No! Never use "був" as an auxiliary. Just "Я читав".'
    - statement: '"Вчора" means "Tomorrow".'
      correct: false
      explanation: '"Вчора" means "Yesterday".'
    - statement: '"Минулого тижня" means "Last week".'
      correct: true
      explanation: 'Correct.'
    - statement: 'The verb "бути" (to be) is mandatory in the past tense.'
      correct: true
      explanation: 'Yes, you cannot skip "was/were" in the past.'

