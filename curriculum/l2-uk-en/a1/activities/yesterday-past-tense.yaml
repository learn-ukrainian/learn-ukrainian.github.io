      explanation: 'Ivan (He) + work (працювати) -> працював.'
      options:
        - text: 'Іван працював вчора.'
          correct: true
        - text: 'Іван працювала вчора.'
          correct: false
        - text: 'Іван працювали вчора.'
          correct: false
        - text: 'Іван працює вчора.'
