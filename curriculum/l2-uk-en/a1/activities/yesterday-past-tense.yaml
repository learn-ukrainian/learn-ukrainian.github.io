- type: true-false
  title: 'True or False: Past Tense Rules'
  instruction: 'Decide if the statement about Ukrainian grammar is true or false.'
  items:
    - statement: "To say 'last week' in Ukrainian, you must use the preposition 'в'."
      correct: false
      explanation: "False. The phrase 'минулого тижня' is used without the preposition 'в'."
    - statement: "The past tense of the verb 'бути' for 'він' (he) is 'був'."
      correct: true
      explanation: "True. 'Він був' means 'he was'."
    - statement: "In Ukrainian, past tense verbs change their ending depending on the gender of the speaker or subject."
      correct: true
      explanation: "True. For example, a man says 'я читав' while a woman says 'я читала'."
    - statement: "The correct translation for 'I was working' (said by a man) is 'Я був працював'."
      correct: false
      explanation: "False. This is a direct calque from English. You just use the single past tense verb: 'Я працював'."
    - statement: "The past tense of 'їсти' for 'вона' (she) is 'їла'."
      correct: true
      explanation: "True. 'Вона їла' means 'she ate'."
    - statement: "For plural subjects like 'ми', 'ви', or 'вони', the past tense ending is '-ло'."
      correct: false
      explanation: "False. The plural ending is '-ли', as in 'ми робили'."

- type: quiz
  title: 'Check Your Knowledge'
  instruction: 'Choose the best answer for each question.'
  items:
    - question: "How do you say 'last year' in Ukrainian?"
      options:
        - text: "минулого року"
          correct: true
        - text: "в минулому році"
          correct: false
        - text: "минулий рік"
          correct: false
        - text: "в минулий рік"
          correct: false
      explanation: "Always use 'минулого року' without the preposition 'в'."
    - question: "Which ending do you add to the verb base for 'воно' (it) in the past tense?"
      options:
        - text: "-ло"
          correct: true
        - text: "-в"
          correct: false
        - text: "-ла"
          correct: false
        - text: "-ли"
          correct: false
    - question: "What is the correct masculine past tense form of 'йти' (to go)?"
      options:
