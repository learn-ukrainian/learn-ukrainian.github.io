- type: group-sort
  title: 'Past vs Present'
  instruction: 'Sort the sentences into Past Tense (Yesterday) or Present Tense (Today).'
  groups:
    - name: 'Past (Вчора)'
      items:
        - 'Я читав книгу.'
        - 'Вона була вдома.'
        - 'Ми їли піцу.'
        - 'Він працював.'
        - 'Вони спали.'
        - 'Вчора йшов дощ.'
    - name: 'Present (Сьогодні)'
      items:
