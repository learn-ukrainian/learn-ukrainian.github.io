- type: fill-in
  title: 'Доповніть речення'
  instruction: 'Complete the sentences with the correct form of "This" (Цей, Ця, Це, Ці).'
  items:
    - sentence: '___ стіл мій.'
      answer: 'Цей'
      options:
        - 'Цей'
        - 'Ця'
        - 'Це'
        - 'Ці'
      explanation: 'Стіл is masculine.'
    - sentence: '___ книга цікава.'
      answer: 'Ця'
      options:
        - 'Ця'
        - 'Цей'
        - 'Це'
        - 'Ці'
      explanation: 'Книга is feminine.'
    - sentence: '___ вікно велике.'
      answer: 'Це'
      options:
        - 'Це'
        - 'Цей'
        - 'Ця'
        - 'Ці'
      explanation: 'Вікно is neuter.'
    - sentence: '___ люди добрі.'
      answer: 'Ці'
      options:
        - 'Ці'
        - 'Цей'
        - 'Ця'
        - 'Це'
      explanation: 'Люди is plural.'
    - sentence: '___ телефон новий.'
      answer: 'Цей'
      options:
        - 'Цей'
        - 'Ця'
        - 'Це'
        - 'Ці'
      explanation: 'Телефон is masculine.'
    - sentence: '___ кімната світла.'
      answer: 'Ця'
      options:
        - 'Ця'
        - 'Цей'
        - 'Це'
        - 'Ці'
      explanation: 'Кімната is feminine.'
    - sentence: '___ шафа стара.'
      answer: 'Ця'
      options:
        - 'Ця'
        - 'Цей'
        - 'Це'
        - 'Ці'
      explanation: 'Шафа is feminine.'
    - sentence: '___ крісло м''яке.'
      answer: 'Це'
      options:
        - 'Це'
        - 'Цей'
        - 'Ця'
        - 'Ці'
      explanation: 'Крісло is neuter.'

- type: true-false
  title: 'Правда чи ні?'
  instruction: 'Decide if the pointing word matches the noun correctly.'
  items:
    - statement: 'Цей стіл'
      correct: true
      explanation: 'Correct. Стіл is masculine, Цей is masculine.'
    - statement: 'Ця вікно'
      correct: false
      explanation: 'Incorrect. Вікно is neuter (Це), not feminine (Ця).'
    - statement: 'Те море'
      correct: true
      explanation: 'Correct. Море is neuter, Те is neuter.'
    - statement: 'Ті люди'
      correct: true
      explanation: 'Correct. Люди is plural, Ті is plural.'
    - statement: 'Той лампа'
      correct: false
      explanation: 'Incorrect. Лампа is feminine (Та), not masculine (Той).'
    - statement: 'Це кімната'
      correct: false
      explanation: 'Incorrect usage for "This room" (should be Ця кімната). "Це кімната" means "This is a room" but does not show gender agreement.'
    - statement: 'Це вікно'
      correct: true
      explanation: 'Correct. "Це вікно" means "This is a window" (Naming) or "This window" (Neuter agreement). Both are valid.'
    - statement: 'Цей кімната'
      correct: false
      explanation: 'Incorrect. Кімната is feminine, Цей is masculine.'

- type: anagram
  title: 'Розшифруйте слова'
  instruction: 'Rearrange the letters to find the household objects.'
  items:
    - scrambled: 'л і с т'
      answer: 'стіл'
    - scrambled: 'г а н и к'
      answer: 'книга'
    - scrambled: 'о н к і в'
      answer: 'вікно'
    - scrambled: 'а ф а ш'
      answer: 'шафа'
    - scrambled: 'о ж к і л'
      answer: 'ліжко'
    - scrambled: 'р і в е д'
      answer: 'двері'
    - scrambled: 'м і д'
      answer: 'дім'
    - scrambled: 'п а м а л'
      answer: 'лампа'

