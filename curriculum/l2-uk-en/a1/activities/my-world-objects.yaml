- type: match-up
  title: 'Знайдіть пару'
  instruction: 'Match the Ukrainian words with their English translations.'
  pairs:
    - left: 'стіл'
      right: 'table'
    - left: 'книга'
      right: 'book'
    - left: 'вікно'
      right: 'window'
    - left: 'кімната'
      right: 'room'
    - left: 'ліжко'
      right: 'bed'
    - left: 'шафа'
      right: 'wardrobe'
    - left: 'телефон'
      right: 'phone'
    - left: 'двері'
      right: 'door'

- type: group-sort
  title: 'Він, вона чи воно?'
  instruction: 'Sort the objects by their gender.'
  groups:
    - name: 'Він (Masculine)'
      items:
        - 'стіл'
        - 'телефон'
        - 'стілець'
        - 'дім'
        - 'ніж'
    - name: 'Вона (Feminine)'
      items:
        - 'книга'
        - 'кімната'
        - 'шафа'
        - 'лампа'
        - 'ложка'
    - name: 'Воно (Neuter)'
      items:
        - 'вікно'
        - 'ліжко'
        - 'крісло'
        - 'блюдо'

- type: quiz
  title: 'Цей, ця, це чи ці?'
  instruction: 'Choose the correct pointing word for objects that are NEAR (Close).'
  items:
    - question: 'Яке слово підходить до слова «стіл»?'
      explanation: 'Стіл ends in a consonant, so it is masculine. Use Цей.'
      options:
        - text: 'цей'
          correct: true
        - text: 'ця'
          correct: false
        - text: 'це'
          correct: false
        - text: 'ці'
          correct: false
    - question: 'Яке слово підходить до слова «книга»?'
      explanation: 'Книга ends in -а, so it is feminine. Use Ця.'
      options:
        - text: 'ця'
          correct: true
        - text: 'цей'
          correct: false
        - text: 'це'
          correct: false
        - text: 'ці'
          correct: false
    - question: 'Яке слово підходить до слова «вікно»?'
      explanation: 'Вікно ends in -о, so it is neuter. Use Це.'
      options:
        - text: 'це'
          correct: true
        - text: 'цей'
          correct: false
        - text: 'ця'
          correct: false
        - text: 'ці'
          correct: false
    - question: 'Яке слово підходить до слова «люди»?'
      explanation: 'Люди is plural. Use Ці.'
      options:
        - text: 'ці'
          correct: true
        - text: 'цей'
          correct: false
        - text: 'ця'
          correct: false
        - text: 'це'
          correct: false
    - question: 'Яке слово підходить до слова «телефон»?'
      explanation: 'Телефон is masculine. Use Цей.'
      options:
        - text: 'цей'
          correct: true
        - text: 'ця'
          correct: false
        - text: 'це'
          correct: false
        - text: 'ці'
          correct: false
    - question: 'Яке слово підходить до слова «кімната»?'
      explanation: 'Кімната is feminine. Use Ця.'
      options:
        - text: 'ця'
          correct: true
        - text: 'цей'
          correct: false
        - text: 'це'
          correct: false
        - text: 'ці'
          correct: false
    - question: 'Яке слово підходить до слова «крісло»?'
      explanation: 'Крісло ends in -о (neuter). Use Це.'
      options:
        - text: 'це'
          correct: true
        - text: 'цей'
          correct: false
        - text: 'ця'
          correct: false
        - text: 'ці'
          correct: false
    - question: 'Яке слово підходить до слова «мами»?'
      explanation: 'Мами is plural. Use Ці.'
      options:
        - text: 'ці'
          correct: true
        - text: 'цей'
          correct: false
        - text: 'ця'
          correct: false
        - text: 'це'
          correct: false

