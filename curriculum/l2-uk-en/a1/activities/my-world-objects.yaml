- type: quiz
  title: "Check Your Understanding"
  instruction: "Choose the correct answer for each question."
  items:
    - question: "What is the difference between 'Це стіл' and 'Цей стіл'?"
      options:
        - text: "'Це стіл' means 'This is a table' (identifying), while 'Цей стіл' means 'This table' (specifying)."
          correct: true
        - text: "'Це стіл' means 'This table' (specifying), while 'Цей стіл' means 'This is a table' (identifying)."
          correct: false
        - text: "They mean exactly the same thing and can be used interchangeably."
          correct: false
        - text: "'Це' is for far objects, and 'Цей' is for near objects."
          correct: false
    - question: "Which pointing word must you use with 'двері' (door)?"
      options:
        - text: "Plural words (ці/ті) because the word only exists in the plural form."
          correct: true
        - text: "Feminine words (ця/та) because it ends with a vowel."
          correct: false
        - text: "Neuter words (це/те) because it is an inanimate object."
          correct: false
        - text: "Masculine words (цей/той) because it is a solid object."
          correct: false
    - question: "What is the 'T' trick for far demonstratives?"
      options:
        - text: "All pointing words for objects far away start with the letter 'т' (той, та, те, ті)."
          correct: true
        - text: "All pointing words for objects near you start with the letter 'т'."
          correct: false
        - text: "All words for furniture start with the letter 'т'."
          correct: false
        - text: "The letter 'т' means the object is plural."
          correct: false
    - question: "Which pointing word beautifully rhymes with the feminine ending '-а' in the word 'книга'?"
      options:
        - text: "ця"
          correct: true
        - text: "цей"
          correct: false
        - text: "це"
          correct: false
        - text: "ці"
          correct: false
    - question: "What does the word 'хата' refer to in Ukrainian culture?"
      options:
        - text: "A traditional, rural Ukrainian house."
          correct: true
        - text: "A modern, urban apartment."
          correct: false
        - text: "A large wooden wardrobe."
          correct: false
        - text: "The Red Corner in any room."
          correct: false
    - question: "Which word points to a far masculine object?"
      options:
        - text: "той"
          correct: true
        - text: "та"
          correct: false
        - text: "те"
          correct: false
        - text: "цей"
          correct: false
    - question: "Which pointing word is neuter and near?"
      options:
        - text: "це"
          correct: true
        - text: "те"
          correct: false
        - text: "ця"
          correct: false
        - text: "цей"
          correct: false
    - question: "How do you say 'these things'?"
      options:
        - text: "ці речі"
          correct: true
        - text: "ті речі"
          correct: false
        - text: "ця річ"
          correct: false
        - text: "це річ"
          correct: false

- type: true-false
  title: "True or False: Household Rules"
  instruction: "Decide if the statement is true or false."
  items:
    - statement: "The word 'двері' (door) is singular in Ukrainian, just like in English."
      correct: false
      explanation: "In Ukrainian, 'двері' is inherently plural, like 'scissors' or 'pants' in English."
    - statement: "It is correct to say 'цей книга' because the English word 'this' does not have a gender."
      correct: false
      explanation: "You must always match the gender in Ukrainian! Because 'книга' is feminine, you must say 'ця книга'."
    - statement: "The neuter demonstrative 'це' perfectly matches neuter nouns like 'вікно' and 'ліжко'."
      correct: true
      explanation: "Yes, 'це' is the neuter form for near objects."
    - statement: "The word 'квартира' describes a modern, urban apartment."
      correct: true
      explanation: "Yes, while 'хата' is a traditional house, 'квартира' is an apartment."
    - statement: "The demonstrative 'ті' is used for plural objects that are far away."
      correct: true
      explanation: "Correct! The 'T' trick means it is far, and 'ті' is the plural form."
    - statement: "In Ukrainian, 'This is a lamp' translates to 'Ця лампа'."
      correct: false
      explanation: "To say 'This is a...', you always use the fixed word 'Це'. So 'This is a lamp' is 'Це лампа'."
    - statement: "The word 'вікно' requires a masculine pointing word."
      correct: false
      explanation: "No, 'вікно' ends in '-о', so it is neuter and takes 'це' or 'те'."
    - statement: "You use 'той' for a masculine object that is far away."
      correct: true
      explanation: "Correct! The 'T' trick tells us it's far, and 'той' is masculine."

