- type: anagram
  title: "Розшифруйте слова: меблі та об'єкти"
  instruction: "Rearrange the letters to form the correct Ukrainian word."
  items:
    - scrambled: "і л с т"
      answer: "стіл"
    - scrambled: "а к и г н"
      answer: "книга"
    - scrambled: "о ф е л т н е"
      answer: "телефон"
    - scrambled: "а т к н і м а"
      answer: "кімната"
    - scrambled: "а м л а п"
      answer: "лампа"
    - scrambled: "о в і н к"
      answer: "вікно"
    - scrambled: "а ф а ш"
      answer: "шафа"
    - scrambled: "і в д е р"
      answer: "двері"

