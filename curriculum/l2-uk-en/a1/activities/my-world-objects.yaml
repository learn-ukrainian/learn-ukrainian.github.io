- type: quiz
  title: "Оберіть правильний вказівний займенник"
  instruction: "Choose the correct demonstrative pronoun to match the noun."
  items:
    - question: "Який займенник потрібно використати зі словом стіл?"
      explanation: "Слово стіл чоловічого роду, тому використовуємо цей."
      options:
        - text: "цей"
          correct: true
        - text: "ця"
          correct: false
        - text: "це"
          correct: false
        - text: "ці"
          correct: false
    - question: "Який займенник потрібно використати зі словом книга?"
      explanation: "Слово книга жіночого роду, тому використовуємо ця."
      options:
        - text: "ця"
          correct: true
        - text: "цей"
          correct: false
        - text: "це"
          correct: false
        - text: "ці"
          correct: false
    - question: "Який займенник потрібно використати зі словом вікно?"
      explanation: "Слово вікно середнього роду, тому використовуємо це."
      options:
        - text: "це"
          correct: true
        - text: "цей"
          correct: false
        - text: "ця"
          correct: false
        - text: "ці"
          correct: false
    - question: "Який займенник потрібно використати зі словом двері?"
      explanation: "Слово двері завжди у множині, тому використовуємо ці."
      options:
        - text: "ці"
          correct: true
        - text: "цей"
          correct: false
        - text: "ця"
          correct: false
        - text: "це"
          correct: false
    - question: "Як правильно сказати про телефон, що лежить далеко?"
      explanation: "Телефон чоловічого роду, а далеко означає той."
      options:
        - text: "той"
          correct: true
        - text: "цей"
          correct: false
        - text: "та"
          correct: false
        - text: "те"
          correct: false
    - question: "Як правильно сказати про шафу, що стоїть далеко?"
      explanation: "Шафа жіночого роду, а далеко означає та."
      options:
        - text: "та"
          correct: true
        - text: "ця"
          correct: false
        - text: "той"
          correct: false
        - text: "те"
          correct: false
    - question: "Як правильно сказати про ліжко, що стоїть далеко?"
      explanation: "Ліжко середнього роду, а далеко означає те."
      options:
        - text: "те"
          correct: true
        - text: "це"
          correct: false
        - text: "той"
          correct: false
        - text: "та"
          correct: false
    - question: "Як правильно сказати про двері, що знаходяться далеко?"
      explanation: "Двері завжди у множині, а далеко означає ті."
      options:
        - text: "ті"
          correct: true
        - text: "ці"
          correct: false
        - text: "та"
          correct: false
        - text: "те"
          correct: false

- type: fill-in
  title: "Доповніть речення правильним словом"
  instruction: "Fill in the blank with the correct near demonstrative."
  items:
    - sentence: "Мені подобається _____ стіл у кімнаті."
      answer: "цей"
      options:
        - "цей"
        - "ця"
        - "це"
        - "ці"
      explanation: "Стіл - чоловічий рід."
    - sentence: "Чия _____ книга лежить на столі?"
      answer: "ця"
      options:
        - "ця"
        - "цей"
        - "це"
        - "ці"
      explanation: "Книга - жіночий рід."
    - sentence: "Подивись, _____ вікно дуже велике і гарне."
      answer: "це"
      options:
        - "це"
        - "цей"
        - "ця"
        - "ці"
      explanation: "Вікно - середній рід."
    - sentence: "Відчиніть, будь ласка, _____ двері для мене."
      answer: "ці"
      options:
        - "ці"
        - "цей"
        - "ця"
        - "це"
      explanation: "Двері - завжди у множині."
    - sentence: "Де мій телефон? А, ось _____ телефон!"
      answer: "цей"
      options:
        - "цей"
        - "ця"
        - "це"
        - "ці"
      explanation: "Телефон - чоловічий рід."
    - sentence: "Я думаю, що _____ лампа краща для роботи."
      answer: "ця"
      options:
        - "ця"
        - "цей"
        - "це"
        - "ці"
      explanation: "Лампа - жіночий рід."
    - sentence: "Ми купили _____ ліжко вчора у магазині."
      answer: "це"
      options:
        - "це"
        - "цей"
        - "ця"
        - "ці"
      explanation: "Ліжко - середній рід."
    - sentence: "Хто залишив _____ речі на підлозі?"
      answer: "ці"
      options:
        - "ці"
        - "цей"
        - "ця"
        - "це"
      explanation: "Речі - множина."

- type: fill-in
  title: "Вказування чи називання?"
  instruction: "Choose between the invariant це (this is) and the specific demonstrative."
  items:
    - sentence: "Скажіть, будь ласка, що _____ таке?"
      answer: "це"
      options:
        - "це"
        - "цей"
        - "ця"
        - "ці"
      explanation: "Для запитання Що це таке? використовуємо незмінне це."
    - sentence: "Так, _____ мій новий зручний стілець."
      answer: "це"
      options:
        - "це"
        - "цей"
        - "ця"
        - "ці"
      explanation: "Ми називаємо предмет, тому використовуємо незмінне це."
    - sentence: "Але _____ стілець дуже старий."
      answer: "цей"
      options:
        - "цей"
        - "це"
        - "ця"
        - "ці"
      explanation: "Ми вказуємо на конкретний стілець, він чоловічого роду."
    - sentence: "Я бачу, що _____ кімната дуже велика."
      answer: "ця"
      options:
        - "ця"
        - "це"
        - "цей"
        - "ці"
      explanation: "Ми вказуємо на конкретну кімнату, вона жіночого роду."
    - sentence: "Звичайно, _____ шафа для вашого одягу."
      answer: "це"
      options:
        - "це"
        - "цей"
        - "ця"
        - "ці"
      explanation: "Ми ідентифікуємо предмет (This is a wardrobe), використовуємо це."
    - sentence: "Мені потрібна саме _____ шафа."
      answer: "ця"
      options:
        - "ця"
        - "це"
        - "цей"
        - "ці"
      explanation: "Ми вказуємо на конкретну шафу, вона жіночого роду."
    - sentence: "Я знаю, що _____ вікно нове."
      answer: "це"
      options:
        - "це"
        - "цей"
        - "ця"
        - "ці"
      explanation: "Ми вказуємо на конкретне вікно, воно середнього роду."
    - sentence: "Подивись, _____ гарне ліжко."
      answer: "це"
      options:
        - "це"
        - "цей"
        - "ця"
        - "ці"
      explanation: "Ми ідентифікуємо предмет, використовуємо це."

