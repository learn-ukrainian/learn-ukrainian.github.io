- type: true-false
  title: "True or False?"
  instruction: "Determine if these statements about plurals are true or false."
  items:
    - statement: "The plural of the word дитина (child) is дитини."
      correct: false
      explanation: "False. The plural of дитина is the irregular word діти."
    - statement: "All plural adjectives in Ukrainian end in -і or -ї."
      correct: true
      explanation: "True. Adjectives drop gender rules in the plural and use a single ending."
    - statement: "The word молоко (milk) does not have a plural form."
      correct: true
      explanation: "True. It is an uncountable noun, just like in English."
    - statement: "The plural of кіт (cat) is кіти."
      correct: false
      explanation: "False. The vowel і changes to о, making the plural form коти."
    - statement: "The word гроші (money) is always plural in Ukrainian."
      correct: true
      explanation: "True. Just like scissors in English, гроші is a plural-only word."
    - statement: "Masculine nouns usually take the letters -а or -я in the plural."
      correct: false
      explanation: "False. Masculine nouns usually take -и or -і. Neuter nouns take -а or -я."
    - statement: "The plural of око (eye) is очі."
      correct: true
      explanation: "True. It is an irregular plural that you should memorize."
    - statement: "The word цукор (sugar) has a plural form цукри."
      correct: false
      explanation: "False. It is an uncountable noun and only exists in the singular form."

