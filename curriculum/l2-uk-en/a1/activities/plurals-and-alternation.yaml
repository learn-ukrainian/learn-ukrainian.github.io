- type: quiz
  title: "Vowel Alternation Check"
  instruction: "Answer these questions about how vowels change in the plural."
  items:
    - question: "What is the plural of рік (year)?"
      options:
        - text: "роки"
          correct: true
        - text: "ріки"
          correct: false
        - text: "рік"
          correct: false
        - text: "руки"
          correct: false
      explanation: "The vowel і changes to о."
    - question: "What is the plural of піч (oven)?"
      options:
        - text: "печі"
          correct: true
        - text: "пічок"
          correct: false
        - text: "пічку"
          correct: false
        - text: "печу"
          correct: false
      explanation: "The vowel і changes to е."
    - question: "What happens to the vowel і in кіт when it becomes plural?"
      options:
        - text: "It changes to о."
          correct: true
        - text: "It changes to е."
          correct: false
        - text: "It stays the same."
          correct: false
        - text: "It is dropped."
          correct: false
      explanation: "The word becomes коти."
    - question: "What is the plural of річ (thing)?"
      options:
        - text: "речі"
          correct: true
        - text: "річок"
          correct: false
        - text: "річки"
          correct: false
        - text: "речей"
          correct: false
      explanation: "The vowel і changes to е."
    - question: "Why do these vowels change in Ukrainian?"
      options:
        - text: "To keep the pronunciation flowing smoothly."
          correct: true
        - text: "Because they are feminine nouns."
          correct: false
        - text: "To match the plural adjective."
          correct: false
        - text: "Because the stress always shifts."
          correct: false
      explanation: "The vowel shifts help the language flow smoothly when syllables open up."
    - question: "Which vowel does the і in ніж change to in the plural?"
      options:
        - text: "о (ножі)"
          correct: true
        - text: "е"
          correct: false
        - text: "а"
          correct: false
        - text: "у"
          correct: false
      explanation: "The plural of ніж is ножі."
    - question: "What is the plural of ніс (nose)?"
      options:
        - text: "носи"
          correct: true
        - text: "носа"
          correct: false
        - text: "неси"
          correct: false
        - text: "носу"
          correct: false
      explanation: "The vowel і changes to о."
    - question: "When does the vowel і typically change to о or е?"
      options:
        - text: "When adding a plural ending opens up the syllable."
          correct: true
        - text: "When the word is feminine."
          correct: false
        - text: "When the word starts with a vowel."
          correct: false
        - text: "It changes randomly."
          correct: false
      explanation: "Adding a plural ending opens up the closed syllable."