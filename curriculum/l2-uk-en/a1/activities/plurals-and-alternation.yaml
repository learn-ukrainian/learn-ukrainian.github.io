- type: quiz
  title: "Choose the Correct Plural"
  instruction: "Select the correct plural form for each word."
  items:
    - question: "What is the plural of хлопець (boy)?"
      options:
        - text: "хлопці"
          correct: true
        - text: "хлопця"
          correct: false
        - text: "хлопцю"
          correct: false
        - text: "хлопців"
          correct: false
      explanation: "Masculine nouns ending in a soft sound take -і in the plural."
    - question: "What is the plural of море (sea)?"
      options:
        - text: "моря"
          correct: true
        - text: "морів"
          correct: false
        - text: "мори"
          correct: false
        - text: "морі"
          correct: false
      explanation: "Neuter nouns ending in -е take -я in the plural."
    - question: "Which of these words means children?"
      options:
        - text: "діти"
          correct: true
        - text: "дитини"
          correct: false
        - text: "люди"
          correct: false
        - text: "малі"
          correct: false
      explanation: "Діти is the completely irregular plural form of дитина."
    - question: "Which of these words means people?"
      options:
        - text: "люди"
          correct: true
        - text: "людини"
          correct: false
        - text: "очі"
          correct: false
        - text: "діти"
          correct: false
      explanation: "Люди is the plural of людина."
    - question: "What happens to the vowel in the word ніж (knife) in the plural?"
      options:
        - text: "It changes to о (ножі)."
          correct: true
        - text: "It stays the same."
          correct: false
        - text: "It changes to а."
          correct: false
        - text: "It disappears."
          correct: false
      explanation: "The vowel і often changes to о when the syllable opens."
    - question: "What is the plural of новий (new) for a feminine noun?"
      options:
        - text: "нові"
          correct: true
        - text: "нова"
          correct: false
        - text: "нового"
          correct: false
        - text: "ново"
          correct: false
      explanation: "All adjectives use the ending -і in the plural, regardless of gender."
    - question: "What is the plural of вікно (window)?"
      options:
        - text: "вікна"
          correct: true
        - text: "вікон"
          correct: false
        - text: "вікні"
          correct: false
        - text: "вікну"
          correct: false
      explanation: "Neuter nouns ending in -о take -а in the plural."
    - question: "What is the plural of брат (brother)?"
      options:
        - text: "брати"
          correct: true
        - text: "браті"
          correct: false
        - text: "брата"
          correct: false
        - text: "брать"
          correct: false
      explanation: "Masculine nouns ending in a hard consonant usually take -и."

