- type: quiz
  title: "Перевірка правил"
  instruction: "Choose the correct answer based on grammar rules."
  items:
    - question: "Яке закінчення ми додаємо для більшості чоловічих іменників?"
      explanation: "Більшість чоловічих іменників закінчується на твердий приголосний і отримує закінчення -и у множині."
      options:
        - text: "-и"
          correct: true
        - text: "-а"
          correct: false
        - text: "-о"
          correct: false
        - text: "-е"
          correct: false
    - question: "Як правильно утворити множину від слова книга?"
      explanation: "Жіночий рід на -а змінюється на -и, тому книга стає книги."
      options:
        - text: "книги"
          correct: true
        - text: "книга"
          correct: false
        - text: "книжі"
          correct: false
        - text: "книгу"
          correct: false
    - question: "Яку форму множини має слово середнього роду місто?"
      explanation: "Середній рід на -о змінюється на -а, тому місто стає міста."
      options:
        - text: "міста"
          correct: true
        - text: "місти"
          correct: false
        - text: "місте"
          correct: false
        - text: "місту"
          correct: false
    - question: "Що відбувається з літерою і у слові кіт у множині?"
      explanation: "Літера і часто чергується з о у відкритому складі, наприклад кіт стає коти."
      options:
        - text: "вона стає о"
          correct: true
        - text: "вона стає а"
          correct: false
        - text: "вона стає е"
          correct: false
        - text: "вона не змінюється"
          correct: false
    - question: "Яке з цих слів є правильною множиною для слова дитина?"
      explanation: "Слово дитина має неправильну форму множини, яка повністю змінюється на діти."
      options:
        - text: "діти"
          correct: true
        - text: "дитини"
          correct: false
        - text: "дитинки"
          correct: false
        - text: "дітки"
          correct: false
    - question: "Яке з цих слів існує тільки у формі множини?"
      explanation: "Слово гроші є незліченним іменником, який існує тільки у формі множини."
      options:
        - text: "гроші"
          correct: true
        - text: "місто"
          correct: false
        - text: "книга"
          correct: false
        - text: "людина"
          correct: false
    - question: "Яке з цих слів не має форми множини і завжди в однині?"
      explanation: "Слово молоко є незліченним іменником, тому воно має тільки форму однини."
      options:
        - text: "молоко"
          correct: true
        - text: "книга"
          correct: false
        - text: "студент"
          correct: false
        - text: "око"
          correct: false
    - question: "Що відбувається з літерою і у слові піч у множині?"
      explanation: "Літера і може чергуватися з е у відкритому складі, тому піч стає печі."
      options:
        - text: "вона стає е"
          correct: true
        - text: "вона стає о"
          correct: false
        - text: "вона стає а"
          correct: false
        - text: "вона не змінюється"
          correct: false

