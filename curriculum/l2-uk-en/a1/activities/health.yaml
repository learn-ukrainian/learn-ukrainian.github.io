version: '1.0'
module: health
level: a1
inline:
- id: quiz-medical-responses
  type: quiz
  instruction: Оберіть логічну відповідь на проблему зі здоров'ям (Choose the logical
    response to the health problem)
  items:
  - question: У мене болить голова.
    options:
    - Ось таблетки від головного болю.
    - Ось краплі від нежиті.
    - Випийте сироп від кашлю.
    - У мене болить горло.
    correct: 0
  - question: У мене сильний кашель.
    options:
    - Вам потрібні таблетки від кашлю.
    - Ось краплі для носа.
    - У мене болить зуб.
    - Мені потрібен стоматолог.
    correct: 0
  - question: Що у вас болить?
    options:
    - У мене болить горло.
    - Я лікар.
    - Де аптека?
    - Скільки це коштує?
    correct: 0
  - question: Добрий день. Дайте, будь ласка, щось від нежиті.
    options:
    - Ось краплі, будь ласка.
    - У мене болить спина.
    - Це таблетки від головного болю.
    - Викличте лікаря!
    correct: 0
  - question: У мене температура і болить горло.
    options:
    - Зрозуміло. Це застуда. Відпочивайте!
    - Ось таблетки від болю в спині.
    - Де тут найближча аптека?
    - Я стоматолог.
    correct: 0
  - question: Скільки це коштує?
    options:
    - Ось таблетки від кашлю.
    - Дякую, лікарю!
    - Двісті гривень.
    - Що у вас болить?
    correct: 2
- id: match-body-vocabulary
  type: match-up
  instruction: З'єднайте частини тіла з перекладом (Match the body parts to their
    translations)
  pairs:
  - left: голова
    right: head
  - left: живіт
    right: stomach
  - left: горло
    right: throat
  - left: спина
    right: back
  - left: рука
    right: hand/arm
  - left: нога
    right: leg/foot
  - left: зуб
    right: tooth
  - left: око
    right: eye
- id: fill-in-symptoms-logic
  type: fill-in
  instruction: Доповніть речення правильним симптомом або частиною тіла (Complete
    the sentence with the correct symptom or body part)
  items:
  - sentence: У мене болить _____. Я хочу спати.
    answer: голова
    options:
    - голова
    - рука
    - нога
  - sentence: У мене болить _____. Я не хочу їсти.
    answer: живіт
    options:
    - живіт
    - вухо
    - око
  - sentence: У мене болить _____ і є температура. Я не можу говорити.
    answer: горло
    options:
    - горло
    - спина
    - ніс
  - sentence: У мене _____, я постійно кашляю.
    answer: кашель
    options:
    - кашель
    - нежить
    - зуб
  - sentence: У мене болить _____, мені потрібен стоматолог.
    answer: зуб
    options:
    - зуб
    - голова
    - нога
  - sentence: Я _____. У мене болить голова і спина.
    answer: хворий
    options:
    - хворий
    - лікар
    - аптека
- id: fill-in-medical-chunks
  type: fill-in
  instruction: Вставте правильні слова (Insert the correct words)
  items:
  - sentence: Дайте, _____, таблетки від головного болю.
    answer: будь ласка
    options:
    - будь ласка
    - добрий день
    - дякую
  - sentence: Що у вас _____?
    answer: болить
    options:
    - болить
    - хворий
    - лікар
  - sentence: У мене _____ і болить горло.
    answer: температура
    options:
    - температура
    - аптека
    - лікар
  - sentence: Мені _____. Викличте лікаря!
    answer: погано
    options:
    - погано
    - хворий
    - добре
  - sentence: Де тут найближча _____? Мені потрібні ліки.
    answer: аптека
    options:
    - аптека
    - голова
    - спина
  - sentence: Мені холодно, і у мене _____ нежить.
    answer: сильний
    options:
    - сильний
    - великий
    - хворий
workbook:
- type: true-false
  instruction: Правда чи ні? Прочитайте твердження про здоров'я (True or false? Read
    the health statements)
  items:
  - statement: У мене болять голова. (My heads hurt.)
    correct: false
    explanation: Голова is singular, so it must be 'У мене болить голова'.
  - statement: Мені погано — це коли я хворий. (I feel bad is when I am sick.)
    correct: true
    explanation: Мені погано means 'I feel bad', which is used when sick.
  - statement: Коли у мене нежить, мені потрібні таблетки від кашлю. (When I have
      a runny nose, I need cough pills.)
    correct: false
    explanation: Для нежитю потрібні краплі для носа (nose drops), не від кашлю.
  - statement: Спина і рука — це слова жіночого роду. (Back and hand/arm are feminine
      words.)
    correct: true
    explanation: Спина and рука end in -а and are feminine nouns.
  - statement: Око і вухо мають чоловічий рід. (Eye and ear have masculine gender.)
    correct: false
    explanation: Око and вухо end in -о and are neuter nouns.
  - statement: 'В аптеці ми кажемо: ''Дайте, будь ласка...'' (In the pharmacy we say:
      ''Give me, please...'')'
    correct: true
    explanation: This is a polite and standard way to ask for medicine in an apteka.
- type: group-sort
  instruction: Розподіліть слова за категоріями (Sort words into categories)
  groups:
  - label: Частини тіла (Body parts)
    items:
    - голова
    - горло
    - живіт
    - спина
    - рука
    - нога
    - зуб
    - око
    - вухо
    - ніс
  - label: Симптоми (Symptoms)
    items:
    - температура
    - кашель
    - нежить
- type: error-correction
  instruction: Знайдіть і виправте помилку в реченнях (Find and correct the error
    in the sentences)
  items:
  - sentence: У мене болять живіт.
    error: болять
    correction: болить
    error_type: word
    options:
    - болить
    - болю
    - болі
    explanation: Живіт is singular, so use 'болить'.
  - sentence: Моя голова болить.
    error: Моя голова
    correction: У мене
    error_type: construction
    options:
    - У мене
    - Мені
    - Я
    explanation: Always use the construction 'У мене болить + body part'.
  - sentence: Я хворий рука.
    error: Я хворий
    correction: У мене хвора
    error_type: phrase
    options:
    - У мене хвора
    - Мені погано
    - Моя рука
    explanation: Рука is feminine, so use the feminine adjective 'хвора', or say 'У
      мене болить рука'.
  - sentence: Дайте таблетки від кашель.
    error: кашель
    correction: кашлю
    error_type: word
    options:
    - кашлю
    - кашля
    - кашлі
    explanation: After 'від', we need the Genitive case 'кашлю'.
  - sentence: У мене болить очі.
    error: болить
    correction: болять
    error_type: word
    options:
    - болять
    - боліть
    - хворі
    explanation: Очі is plural, so the verb must be plural 'болять'.
  - sentence: Дайте краплі від нежить.
    error: нежить
    correction: нежитю
    error_type: word
    options:
    - нежитю
    - нежиті
    - нежитя
    explanation: Нежить is masculine, so the Genitive case is 'нежитю'.
- type: order
  instruction: Розставте репліки діалогу в правильному порядку (Put the dialogue lines
    in the correct order)
  items:
  - — Добрий день! Що у вас болить?
  - — У мене болить голова і горло. І є температура.
  - — Ви кашляєте?
  - — Ні, але в мене сильний нежить.
  - — Це застуда. Я випишу ліки. Відпочивайте!
  - — Дякую, лікарю!
  correct_order:
  - 0
  - 1
  - 2
  - 3
  - 4
  - 5
- type: unjumble
  instruction: Складіть правильне речення зі слів (Make a correct sentence from the
    words)
  items:
  - words:
    - болить
    - голова.
    - мене
    - У
    correct_order:
    - У
    - мене
    - болить
    - голова.
  - words:
    - будь ласка,
    - від кашлю.
    - Дайте,
    - таблетки
    correct_order:
    - Дайте,
    - будь ласка,
    - таблетки
    - від кашлю.
  - words:
    - у
    - болить?
    - Що
    - вас
    correct_order:
    - Що
    - у
    - вас
    - болить?
  - words:
    - І
    - нежить.
    - в мене
    - сильний
    correct_order:
    - І
    - в мене
    - сильний
    - нежить.
  - words:
    - найближча
    - аптека?
    - Де
    - тут
    correct_order:
    - Де
    - тут
    - найближча
    - аптека?
  - words:
    - потрібні
    - Мені
    - ліки.
    correct_order:
    - Мені
    - потрібні
    - ліки.
