- type: error-correction
  instruction: Знайдіть і виправте помилку (Find and correct the error)
  items:
  - sentence: У мене болить аптека.
    error: аптека
    correction: голова
    error_type: word
    options:
    - голова
    - температура
    - кашель
    explanation: 'Аптека — це pharmacy (місце), а не частина тіла. Правильно: У мене
      болить голова.'
  - sentence: Дайте, лікар, таблетки від кашлю.
    error: лікар
    correction: будь ласка
    error_type: word
    options:
    - будь ласка
    - дякую
    - добре
    explanation: У проханні треба «будь ласка» (please). Лікар — це doctor, а не ввічлива
      частка.
  - sentence: У мене нога і болить горло.
    error: нога
    correction: температура
    error_type: word
    options:
    - температура
    - кашель
    - нежить
    explanation: 'Нога — це leg (частина тіла), а не симптом. Правильно: У мене температура
      і болить горло.'
  - sentence: Я хворий. У мене спина.
    error: спина
    correction: кашель
    error_type: word
    options:
    - кашель
    - нежить
    - температура
    explanation: 'Спина — це back (частина тіла), а не симптом. Симптоми: кашель,
      нежить, температура.'
  - sentence: Де тут найближчий лікар? Мені потрібні таблетки.
    error: лікар
    correction: аптека
    error_type: word
    options:
    - аптека
    - сироп
    - краплі
    explanation: Таблетки купують в аптеці (pharmacy), а до лікаря (doctor) йдуть
      за рецептом.
  - sentence: У мене болять голова.
    error: болять
    correction: болить
    error_type: word
    options:
    - болить
    - болять
    - болів
    explanation: 'Голова — це одна річ, тому: У мене болить голова. Болять — для множини:
      болять зуби, болять ноги.'
