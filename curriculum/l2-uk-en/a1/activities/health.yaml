version: '1.0'
module: health
level: a1
inline:
- id: fill-in-dialogues
  type: fill-in
  instruction: Вставте правильне слово (Fill in the correct word)
  items:
  - sentence: Дайте, ____, таблетки від головного болю.
    answer: будь ласка
    options:
    - будь ласка
    - добрий день
    - дякую
  - sentence: Що у вас ____?
    answer: болить
    options:
    - болить
    - хворий
    - лікар
  - sentence: У мене ____ і болить горло.
    answer: температура
    options:
    - температура
    - аптека
    - лікар
  - sentence: Мені ____. Викличте лікаря!
    answer: погано
    options:
    - погано
    - хворий
    - добре
  - sentence: Де тут найближча ____? Мені потрібні ліки.
    answer: аптека
    options:
    - аптека
    - голова
    - спина
  - sentence: Я ____, мені потрібен лікар.
    answer: хворий
    options:
    - хворий
    - лікар
    - аптека
- id: match-up-body-parts
  type: match-up
  instruction: З'єднайте частини тіла з перекладом (Match body parts with their translation)
  pairs:
  - left: голова
    right: head
  - left: живіт
    right: stomach
  - left: горло
    right: throat
  - left: спина
    right: back
  - left: рука
    right: hand/arm
  - left: нога
    right: leg/foot
  - left: зуб
    right: tooth
  - left: око
    right: eye
- id: fill-in-symptoms
  type: fill-in
  instruction: Доповніть речення (Complete the sentences)
  items:
  - sentence: У мене болить ____. Я хочу спати.
    answer: голова
    options:
    - голова
    - рука
    - нога
  - sentence: У мене болить ____. Я не хочу їсти.
    answer: живіт
    options:
    - живіт
    - вухо
    - око
  - sentence: У мене болить ____ і є температура. Я не можу говорити.
    answer: горло
    options:
    - горло
    - спина
    - ніс
  - sentence: У мене ____, я постійно кашляю.
    answer: кашель
    options:
    - кашель
    - нежить
    - зуб
  - sentence: У мене болить ____, мені потрібен стоматолог.
    answer: зуб
    options:
    - зуб
    - голова
    - нога
  - sentence: Я ____. У мене болить голова і спина.
    answer: хворий
    options:
    - хворий
    - лікар
    - аптека
- id: quiz-logical-response
  type: quiz
  instruction: Оберіть логічну відповідь (Choose the logical response)
  items:
  - question: У мене болить голова.
    options:
    - Ось таблетки від головного болю.
    - Ось краплі від нежиті.
    - Випийте сироп від кашлю.
    - У мене болить спина.
    correct: 0
  - question: У мене сильний кашель.
    options:
    - Ось краплі для носа.
    - Вам потрібні таблетки від кашлю.
    - У мене болить зуб.
    - Я лікар.
    correct: 1
  - question: Що у вас болить?
    options:
    - Я лікар.
    - Де аптека?
    - У мене болить горло.
    - Дякую, лікарю!
    correct: 2
  - question: Добрий день. Дайте, будь ласка, щось від нежиті.
    options:
    - У мене болить спина.
    - Це таблетки від головного болю.
    - Я хвора.
    - Ось краплі, будь ласка.
    correct: 3
  - question: Мені дуже погано.
    options:
    - Викличте лікаря!
    - Ось аптека.
    - Де спина?
    - Це велика голова.
    correct: 0
  - question: Давно болить горло?
    options:
    - Я лікар.
    - З учора. І є температура.
    - Це моя нога.
    - Ось таблетки від головного болю.
    correct: 1
workbook:
- id: group-sort-gender
  type: group-sort
  instruction: Розподіліть слова за родами (Sort the words by gender)
  groups:
  - label: Чоловічий рід (Masculine)
    items:
    - живіт
    - ніс
    - зуб
    - лікар
    - кашель
  - label: Жіночий рід (Feminine)
    items:
    - голова
    - спина
    - рука
    - нога
    - аптека
    - температура
  - label: Середній рід (Neuter)
    items:
    - око
    - вухо
    - горло
- id: true-false-body
  type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: «У мене болить спина» означає, що вам потрібні таблетки від кашлю.
    correct: false
    explanation: Слово «спина» означає «back», а не кашель.
  - statement: Слово «рука» означає і hand, і arm українською.
    correct: true
    explanation: В українській мові використовується одне слово для всієї руки.
  - statement: 'Якщо ви кашляєте, ви кажете: «У мене нежить».'
    correct: false
    explanation: Ви повинні сказати «У мене кашель».
  - statement: Ви йдете в аптеку, щоб купити ліки.
    correct: true
    explanation: Аптека — це місце, де продають таблетки та краплі.
  - statement: Лікар часто питає «Що у вас болить?», коли ви приходите.
    correct: true
    explanation: Це стандартне запитання про здоров'я.
  - statement: Якщо у вас висока температура, ви здорові.
    correct: false
    explanation: Температура означає, що ви хворі.
