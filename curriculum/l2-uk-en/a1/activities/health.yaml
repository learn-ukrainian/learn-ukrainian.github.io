version: '1.0'
module: health
level: a1
inline:
- id: match-body-parts
  type: match-up
  instruction: З'єднайте слова з перекладом (Match the body parts to their English
    translations)
  pairs:
  - left: голова
    right: head
  - left: живіт
    right: stomach
  - left: горло
    right: throat
  - left: спина
    right: back
  - left: рука
    right: hand/arm
  - left: нога
    right: leg/foot
  - left: зуб
    right: tooth
  - left: око
    right: eye
  - left: вухо
    right: ear
  - left: ніс
    right: nose
- id: fill-in-symptoms
  type: fill-in
  instruction: Вставте правильне слово (Fill in the correct word)
  items:
  - sentence: У мене болить ____. Я хочу спати.
    answer: голова
    options:
    - голова
    - рука
    - нога
  - sentence: У мене болить ____. Я не хочу їсти.
    answer: живіт
    options:
    - живіт
    - вухо
    - око
  - sentence: У мене болить ____ і є температура. Я не можу говорити.
    answer: горло
    options:
    - горло
    - спина
    - ніс
  - sentence: У мене ____, я постійно кашляю.
    answer: кашель
    options:
    - кашель
    - нежить
    - зуб
  - sentence: У мене болить ____, мені потрібен стоматолог.
    answer: зуб
    options:
    - зуб
    - голова
    - нога
  - sentence: Я ____. У мене болить голова і спина.
    answer: хворий
    options:
    - хворий
    - лікар
    - аптека
- id: fill-in-pharmacy
  type: fill-in
  instruction: Вставте правильне слово (Fill in the correct word)
  items:
  - sentence: Добрий день! У мене болить ____. Дайте таблетки.
    answer: голова
    options:
    - голова
    - аптека
    - лікар
  - sentence: Дайте, будь ласка, щось проти ____.
    answer: кашлю
    options:
    - кашлю
    - нежитю
    - болю
  - sentence: А є щось проти ____?
    answer: нежитю
    options:
    - нежитю
    - кашлю
    - болю
  - sentence: Дайте ____ від кашлю, будь ласка.
    answer: сироп
    options:
    - сироп
    - лікар
    - нога
  - sentence: Дайте таблетки від головного ____.
    answer: болю
    options:
    - болю
    - кашлю
    - нежитю
  - sentence: Так, ось ____. Ще щось?
    answer: краплі
    options:
    - краплі
    - лікар
    - горло
- id: quiz-health-response
  type: quiz
  instruction: Оберіть правильну відповідь (Choose the correct response)
  items:
  - question: У мене болить голова.
    options:
    - Ось таблетки від головного болю.
    - Ось краплі від нежиті.
    - Випийте сироп від кашлю.
    correct: 0
  - question: У мене сильний кашель.
    options:
    - Вам потрібні таблетки від кашлю.
    - Ось краплі для носа.
    - У мене болить зуб.
    correct: 0
  - question: Що у вас болить?
    options:
    - У мене болить горло.
    - Я лікар.
    - Де аптека?
    correct: 0
  - question: Добрий день. Дайте, будь ласка, щось від нежиті.
    options:
    - Ось краплі, будь ласка.
    - У мене болить спина.
    - Це таблетки від головного болю.
    correct: 0
  - question: Мені погано. Що мені робити?
    options:
    - Зверніться до лікаря!
    - Ось таблетки від кашлю.
    - Де аптека?
    correct: 0
  - question: У мене є нежить і температура.
    options:
    - Вам потрібні краплі і ліки від температури.
    - Дайте, будь ласка, сироп.
    - У мене болить зуб.
    correct: 0
- id: fill-in-pharmacy-doctor
  type: fill-in
  instruction: Вставте правильне слово (Fill in the correct word)
  items:
  - sentence: Дайте, ____, таблетки від головного болю.
    answer: будь ласка
    options:
    - будь ласка
    - добрий день
    - дякую
  - sentence: Що у вас ____?
    answer: болить
    options:
    - болить
    - хворий
    - лікар
  - sentence: У мене ____ і болить горло.
    answer: температура
    options:
    - температура
    - аптека
    - лікар
  - sentence: Мені ____. Викличте лікаря!
    answer: погано
    options:
    - погано
    - хворий
    - добре
  - sentence: Де тут найближча ____? Мені потрібні ліки.
    answer: аптека
    options:
    - аптека
    - голова
    - спина
  - sentence: У мене ____. Дайте, будь ласка, сироп.
    answer: кашель
    options:
    - кашель
    - нога
    - лікар
workbook:
- type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: Рука — це частина тіла.
    correct: true
    explanation: Так, рука — це частина тіла (hand/arm).
  - statement: Аптека — це те саме, що лікар.
    correct: false
    explanation: Ні. Аптека — це pharmacy (де купують ліки). Лікар — це doctor (хто
      лікує).
  - statement: «У мене болить голова» означає «My head hurts».
    correct: true
    explanation: Так. У мене болить + частина тіла = that part hurts.
  - statement: Кашель і нежить — це симптоми застуди.
    correct: true
    explanation: Так, кашель (cough) і нежить (runny nose) — типові симптоми застуди.
  - statement: «Мені погано» означає «I am a doctor».
    correct: false
    explanation: Ні. Мені погано = I feel unwell. Я лікар = I am a doctor.
  - statement: Зуб — це те саме, що вухо.
    correct: false
    explanation: Ні. Зуб — це tooth. Вухо — це ear.
  - statement: «Дайте, будь ласка» — це ввічливе прохання.
    correct: true
    explanation: Так. «Дайте, будь ласка» = «Give me, please» — ввічлива форма прохання.
  - statement: «У мене температура» і «У мене болить голова» означають те саме.
    correct: false
    explanation: Ні. Температура = fever. У мене болить голова = my head hurts. Це
      різні симптоми.
- type: match-up
  instruction: З'єднайте симптом з відповідними ліками (Match the symptom to the right
    medicine)
  pairs:
  - left: У мене болить голова.
    right: таблетки від головного болю
  - left: У мене кашель.
    right: сироп від кашлю
  - left: У мене нежить.
    right: краплі від нежиті
  - left: У мене болить горло.
    right: таблетки від болю
  - left: Мені потрібні ліки.
    right: Ось, будь ласка.
  - left: Що у вас болить?
    right: У мене болить спина.
- type: group-sort
