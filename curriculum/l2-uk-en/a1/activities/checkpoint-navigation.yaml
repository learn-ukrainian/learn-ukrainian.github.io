- type: group-sort
  title: 'Куди чи Де?'
  instruction: 'Визначте, чи фраза відповідає на питання "Куди?" (Напрямок) чи "Де?" (Місце).'
  groups:
    - name: 'Куди? (Напрямок)'
      items:
        - 'у парк'
        - 'в банк'
        - 'на концерт'
        - 'у школу'
        - 'на роботу'
    - name: 'Де? (Місце)'
      items:
        - 'у парку'
        - 'у банку'
        - 'на концерті'
        - 'у школі'
        - 'на роботі'

- type: match-up
  title: 'Словник навігації'
  instruction: 'Знайдіть переклад для кожного слова.'
  pairs:
    - left: 'наліво'
      right: 'to the left'
    - left: 'направо'
      right: 'to the right'
    - left: 'прямо'
      right: 'straight'
