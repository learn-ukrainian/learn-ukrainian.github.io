- type: quiz
  title: 'Accusative Case: Direct Objects'
  items:
    - question: 'How do you say "I see a bus"?'
      options:
        - text: 'Я бачу автобус'
          correct: true
        - text: 'Я бачу автобуса'
          correct: false
        - text: 'Я бачу автобусу'
          correct: false
        - text: 'Я бачу автобусі'
          correct: false
      explanation: 'For non-living masculine nouns, the Accusative case is the same as the Nominative.'
    - question: 'What is the correct ending for a feminine noun in the Accusative? (Я бачу карт...)'
      options:
        - text: '-у'
          correct: true
        - text: '-а'
          correct: false
        - text: '-і'
          correct: false
        - text: '-о'
          correct: false
      explanation: 'Feminine nouns ending in -а change to -у in the Accusative case.'
    - question: 'How do you say "He sees the metro"?'
      options:
        - text: 'Він бачить метро'
          correct: true
        - text: 'Він бачить метра'
          correct: false
        - text: 'Він бачить метрі'
          correct: false
        - text: 'Він бачить метру'
          correct: false
    - question: 'Convert "друг" (living) to Accusative: Я бачу...'
      options:
        - text: 'друга'
          correct: true
        - text: 'друг'
          correct: false
        - text: 'друзі'
          correct: false
        - text: 'другу'
          correct: false
    - question: 'Where is the direct object in: "Ми бачимо парк"?'
      options:
        - text: 'парк'
          correct: true
        - text: 'Ми'
          correct: false
        - text: 'бачимо'
          correct: false
        - text: 'None'
          correct: false
    - question: 'Choose the correct form: Я йду на...'
      options:
        - text: 'роботу'
          correct: true
        - text: 'робота'
          correct: false
        - text: 'роботі'
          correct: false
        - text: 'роботи'
          correct: false
    - question: 'Translate: "They see the city."'
      options:
        - text: 'Вони бачать місто'
          correct: true
        - text: 'Вони бачать міста'
          correct: false
        - text: 'Вони бачать місті'
          correct: false
        - text: 'Вони бачать місту'
          correct: false
    - question: 'Convert "сестра" (sister) to Accusative: Він знає...'
      options:
        - text: 'сестру'
          correct: true
        - text: 'сестра'
          correct: false
        - text: 'сестри'
          correct: false
        - text: 'сестрі'
          correct: false

- type: quiz
  title: 'Locative Case: Locations'
  items:
    - question: 'What question does the Locative case answer?'
      options:
        - text: 'Де?'
          correct: true
        - text: 'Куди?'
          correct: false
        - text: 'Хто?'
          correct: false
        - text: 'Що?'
          correct: false
    - question: 'How do you say "in the store"?'
      options:
        - text: 'у магазині'
          correct: true
        - text: 'у магазин'
          correct: false
        - text: 'на магазин'
          correct: false
        - text: 'у магазину'
          correct: false
    - question: 'What is the Locative form of "аптека"?'
      options:
        - text: 'в аптеці'
          correct: true
        - text: 'в аптеку'
          correct: false
        - text: 'в аптеки'
          correct: false
        - text: 'в аптеке'
          correct: false
      explanation: 'Consonant shift: к changes to ц before -і.'
    - question: 'How do you say "on the table"?'
      options:
        - text: 'на столі'
          correct: true
        - text: 'у столі'
          correct: false
        - text: 'на стіл'
          correct: false
        - text: 'на столу'
          correct: false
    - question: 'What happens to "г" in the Locative case before -і?'
      options:
        - text: 'It changes to з'
          correct: true
        - text: 'It changes to ц'
          correct: false
        - text: 'It changes to с'
          correct: false
        - text: 'It remains г'
          correct: false
    - question: 'Complete the sentence: Я зараз на...'
      options:
        - text: 'станції'
          correct: true
        - text: 'станція'
          correct: false
        - text: 'станцію'
          correct: false
        - text: 'станціях'
          correct: false
    - question: 'How do you say "in the city" (місто)?'
      options:
        - text: 'у місті'
          correct: true
        - text: 'у місто'
          correct: false
        - text: 'на місті'
          correct: false
        - text: 'у місту'
          correct: false
    - question: 'Translate: "The coffee is in the cafe."'
      options:
        - text: 'Кава у кафе'
          correct: true
        - text: 'Кава на кафе'
          correct: false
        - text: 'Кава у кафу'
          correct: false
        - text: 'Кава у кафі'
          correct: false
      explanation: 'Foreign words like кафе are often indeclinable (no change).'

