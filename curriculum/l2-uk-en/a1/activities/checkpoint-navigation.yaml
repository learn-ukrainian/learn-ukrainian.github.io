- type: fill-in
  title: 'Доповніть діалог'
  instruction: 'Вставте пропущені слова в діалог.'
  items:
    - sentence: '- Вибачте, ____ метро?'
      answer: 'де'
      options: ['де', 'куди', 'хто', 'що']
      explanation: 'Ми питаємо про місцезнаходження: Де?'
    - sentence: '- Ідіть ____.'
      answer: 'прямо'
      options: ['прямо', 'центр', 'парк', 'метро']
      explanation: 'Напрямок руху: прямо.'
    - sentence: '- ____ коштує вода?'
      answer: 'Скільки'
      options: ['Скільки', 'Як', 'Де', 'Хто']
      explanation: 'Питання про ціну: Скільки?'
    - sentence: '- Дві ____.'
      answer: 'гривні'
      options: ['гривні', 'гривня', 'гривень', 'долар']
      explanation: 'Після числа 2: гривні.'
    - sentence: '- Ви ____ Києва?'
      answer: 'з'
      options: ['з', 'в', 'на', 'у']
      explanation: 'Походження: з Києва.'
    - sentence: '- Ні, я з ____.'
      answer: 'Лондона'
      options: ['Лондона', 'Лондон', 'Лондоні', 'Лондону']
      explanation: 'Походження (Родовий відмінок): з Лондона.'
    - sentence: 'Вставте слово у правильній формі: - Я йду в ____.'
      answer: 'парк'
      options: ['парк', 'парку', 'парком', 'парки']
      explanation: 'Куди? (Знахідний відмінок) - неістота не змінюється.'
    - sentence: 'Це ____ квиток. (my)'
      answer: 'мій'
      options: ['мій', 'моя', 'моє', 'мої']
      explanation: 'Квиток - чоловічий рід.'
