- type: fill-in
  title: 'Case Endings Practice'
  items:
    - sentence: 'Я йду в [blank] (бібліотека)...'
      answer: 'бібліотеку'
      options: ['бібліотеку', 'бібліотеці', 'бібліотека', 'бібліотеки']
    - sentence: 'Він живе у [blank] (Київ)...'
      answer: 'Києві'
      options: ['Києві', 'Київ', 'Києва', 'Києву']
    - sentence: 'У мене немає [blank] (карта)...'
      answer: 'карти'
      options: ['карти', 'карту', 'карта', 'карті']
    - sentence: 'Тут є три [blank] (зупинка)...'
      answer: 'зупинки'
      options: ['зупинки', 'зупинку', 'зупинка', 'зупинок']
    - sentence: 'Я бачу твій [blank] (квиток)...'
      answer: 'квиток'
      options: ['квиток', 'квитка', 'квитку', 'квитку']
    - sentence: 'Ми на [blank] (станція)...'
      answer: 'станції'
      options: ['станції', 'станція', 'станцію', 'станціях']
    - sentence: 'Він йде до [blank] (центр)...'
      answer: 'центру'
      options: ['центру', 'центр', 'центрі', 'центром']
    - sentence: 'Вона зараз в [blank] (аптека)...'
      answer: 'аптеці'
      options: ['аптеці', 'аптека', 'аптеку', 'аптеки']

- type: group-sort
  title: 'Gender Classification'
  groups:
    - name: Masculine
      items: ['магазин', 'автобус', 'квиток', 'центр', 'трамвай']
    - name: Feminine
      items: ['кава', 'зупинка', 'карта', 'аптека', 'бібліотека']
    - name: Neuter
      items: ['метро', 'місто', 'вікно', 'молоко', 'фото']
