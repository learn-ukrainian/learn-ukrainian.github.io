version: '1.0'
module: checkpoint-communication
level: a1
inline:
- id: fill-in-vocative-imperative
  type: fill-in
  instruction: Вставте правильну форму імені в кличному відмінку (Insert the correct
    form of the name in the Vocative case)
  items:
  - sentence: ____, читай цей текст, будь ласка!
    answer: Олено
    options:
    - Олена
    - Олено
    - Олену
  - sentence: ____, дай мені книгу!
    answer: Тарасе
    options:
    - Тарас
    - Тарасе
    - Тарасу
  - sentence: ____, слухай мене!
    answer: Андрію
    options:
    - Андрій
    - Андріє
    - Андрію
  - sentence: ____, іди сюди!
    answer: Мамо
    options:
    - Мама
    - Мамо
    - Маму
  - sentence: ____, дайте телефон!
    answer: Брате
    options:
    - Брат
    - Брате
    - Брату
  - sentence: ____, принеси кутю, будь ласка!
    answer: Сестро
    options:
    - Сестра
    - Сестро
    - Сестру
  - sentence: ____, скажи, коли ти вільна.
    answer: Подруго
    options:
    - Подруга
    - Подруго
    - Подругу
  - sentence: ____, ходімо до мене!
    answer: Друже
    options:
    - Друг
    - Друже
    - Другу
  - sentence: ____, прийди в суботу!
    answer: Анно
    options:
    - Анна
    - Анно
    - Анну
  - sentence: ____, я думаю, що ми маємо святкувати разом.
    answer: Олександре
    options:
    - Олександр
    - Олександре
    - Олександру
