version: '1.0'
module: checkpoint-communication
level: a1
inline:
- id: vocative-imperative-practice
  type: fill-in
  instruction: Вставте правильні форми слів (Insert the correct forms)
  items:
  - sentence: ____ (Оксана), читай цей текст, будь ласка!
    answer: Оксано
    options:
    - Оксано
    - Оксана
    - Оксані
    - Оксану
  - sentence: Тарасе, ____ (принести) стільці!
    answer: принеси
    options:
    - принеси
    - принесіть
    - принести
    - принесу
  - sentence: ____ (друг), скажи, коли ти будеш у школі.
    answer: друже
    options:
    - друже
    - друг
    - другу
    - другом
  - sentence: Андрію, ____ (писати) лист!
    answer: пиши
    options:
    - пиши
    - пишіть
    - писати
    - пише
  - sentence: ____ (Олена), дай мені квиток, будь ласка.
    answer: Олено
    options:
    - Олено
    - Олена
    - Олені
    - Олену
  - sentence: Петре, ____ (робити) це швидко!
    answer: роби
    options:
    - роби
    - робіть
    - робити
    - робить
  - sentence: ____ (матуся), прийди сюди!
    answer: матусю
    options:
    - матусю
    - матуся
    - матусі
    - матусею
  - sentence: Діти, ____ (читати) текст!
    answer: читайте
    options:
    - читайте
    - читай
    - читати
    - читають
- id: conjunctions-quiz
  type: quiz
  instruction: Оберіть правильний сполучник (Choose the correct conjunction)
  items:
  - question: Я не йду, ____ хворий.
    options:
    - і
    - бо
    - а
    - що
    correct: 1
  - question: Мій чай гарячий, ____ твій холодний.
    options:
    - що
    - бо
    - а
    - де
    correct: 2
  - question: Принеси плакати ____ квитки.
    options:
    - і
    - але
    - що
    - бо
    correct: 0
  - question: Я хочу, ____ ми святкували разом.
    options:
    - а
    - і
    - бо
    - щоб
    correct: 3
  - question: Я вільна, ____ я не знаю, де ми будемо.
    options:
    - що
    - але
    - і
    - коли
    correct: 1
  - question: Скажи, ____ ти будеш у школі.
    options:
    - а
    - і
    - коли
    - та
    correct: 2
  - question: Вона знає, ____ купити свічки.
    options:
    - бо
    - але
    - що
    - де
    correct: 3
  - question: Нам потрібні стільці, ____ людей буде багато.
    options:
    - бо
    - де
    - і
    - а
    correct: 0
