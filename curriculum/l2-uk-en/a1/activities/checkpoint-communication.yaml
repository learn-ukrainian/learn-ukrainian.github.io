- id: holiday-greeting-match
  type: quiz
  instruction: Оберіть правильне привітання (Choose the correct greeting)
  items:
  - question: Merry Christmas!
    options:
    - З Різдвом!
    - З Великоднем!
    - З Новим роком!
    - З днем народження!
    correct: 0
  - question: Happy Easter!
    options:
    - З Новим роком!
    - З Великоднем!
    - З Різдвом!
    - Зі святом!
    correct: 1
  - question: Happy New Year!
    options:
    - З Різдвом!
    - З Великоднем!
    - З Новим роком!
    - Навзаєм!
    correct: 2
  - question: Happy Birthday!
    options:
    - Зі святом!
    - З днем народження!
    - З Різдвом!
    - Вас також!
    correct: 1
  - question: Happy Holiday! (Universal)
    options:
    - З Новим роком!
    - З Великоднем!
    - Зі святом!
    - Навзаєм!
    correct: 2
  - question: How do you say 'Likewise / You too'?
    options:
    - Навзаєм!
    - Зі святом!
    - З Різдвом!
    - З днем народження!
    correct: 0
  - question: You are invited to a Christmas dinner. What do you say?
    options:
    - З Великоднем!
    - З Новим роком!
    - З днем народження!
    - З Різдвом!
    correct: 3
  - question: 'Someone says ''З Новим роком!''. Your reply:'
    options:
    - З Великоднем!
    - Навзаєм!
    - Зі святом!
    - З днем народження!
    correct: 1
workbook:
- id: wb-match-up-sentences
  type: match-up
  instruction: З'єднайте частини речення (Match the sentence halves)
  pairs:
  - left: Я не йду,
    right: бо я хворий.
  - left: Мій чай гарячий,
    right: а твій холодний.
  - left: Скажи,
    right: коли ти будеш.
  - left: Я знаю,
    right: де купити квитки.
  - left: Я вільна,
    right: але не знаю де ми будемо.
  - left: Принеси плакати
    right: і стільці.
- id: wb-unjumble-sentences
  type: unjumble
  instruction: Складіть правильне речення зі слів (Put the words in the correct order)
  items:
  - words:
    - будь ласка.
    - кутю,
    - Принеси
    correct_order:
    - Принеси
    - кутю,
    - будь ласка.
  - words:
    - що
    - ти тут.
    - Я знаю,
    correct_order:
    - Я знаю,
    - що
    - ти тут.
  - words:
    - купити свічки.
    - де
    - Я знаю,
    correct_order:
    - Я знаю,
    - де
    - купити свічки.
  - words:
    - Тарасе,
    - раніше!
    - прийди
    correct_order:
    - Тарасе,
    - прийди
    - раніше!
  - words:
    - Нам
    - стільці.
    - потрібні
    correct_order:
    - Нам
    - потрібні
    - стільці.
  - words:
    - святкували разом.
    - щоб ми
    - Я хочу,
    correct_order:
    - Я хочу,
    - щоб ми
    - святкували разом.
- id: wb-error-correction
  type: error-correction
  instruction: Знайдіть і виправте помилку (Find and correct the mistake)
  items:
  - sentence: Оксана, читай цей текст!
    error: Оксана
    correction: Оксано
    error_type: word
    options:
    - Оксано
    - Оксані
    - Оксану
    explanation: Use the vocative case for names when addressing someone.
  - sentence: Тарас, принеси стільці!
    error: Тарас
    correction: Тарасе
    error_type: word
    options:
    - Тарасе
    - Тарасу
    - Тараса
    explanation: Use the vocative case for names when addressing someone.
  - sentence: Андрій, пиши лист!
    error: Андрій
    correction: Андрію
    error_type: word
    options:
    - Андрію
    - Андріє
    - Андрієм
    explanation: Names ending in -й take -ю in the vocative case.
  - sentence: Друг, дай мені квиток!
    error: Друг
    correction: Друже
    error_type: word
    options:
    - Друже
    - Другу
    - Друга
    explanation: The vocative of 'друг' is 'друже'.
  - sentence: Діти, читай текст!
    error: читай
    correction: читайте
    error_type: word
    options:
    - читайте
    - читати
    - читають
    explanation: Use the plural imperative (читайте) for 'Діти' (Children).
  - sentence: Матуся, прийди сюди!
    error: Матуся
    correction: Матусю
    error_type: word
    options:
    - Матусю
    - Матусе
    - Матусі
    explanation: Feminine names ending in -я take -ю in the vocative case.
- id: wb-order-dialogue
  type: order
  instruction: Розставте речення в правильному порядку (Put the dialogue in the correct
    order)
  items:
  - — Олено, привіт! Ти знаєш, що скоро Різдво?
  - — Так, Тарасе! Я думаю, що ми можемо святкувати разом.
  - — Добре! Скажи, коли ти вільна.
  - — Я вільна двадцять четвертого.
  - — Ходімо до мене! Принеси кутю, будь ласка.
  - — Добре, принесу! З Різдвом!
  correct_order:
  - 0
  - 1
  - 2
  - 3
  - 4
  - 5
- id: wb-group-sort-grammar
  type: group-sort
  instruction: Розподіліть слова за категоріями (Sort the words into categories)
  groups:
  - label: Сполучники (Conjunctions)
    items:
    - і
    - а
    - але
    - бо
    - що
    - коли
    - де
  - label: Дієслова (Verbs)
    items:
    - прийди
    - принеси
    - скажи
    - читай
    - роби
    - пиши
    - дай
