- type: quiz
  title: 'Фінальний тест: Комунікація'
  items:
  - question: Яка форма є найбільш ввічливою для прохання до літньої людини?
    explanation: Конструкція Прошу вас є дуже формальною та ввічливою.
    options:
    - text: Прошу вас дати мені квиток.
      correct: true
    - text: Дай мені свій квиток.
      correct: false
    - text: Дай, будь ласка, свій квиток.
      correct: false
    - text: Дайте мені квиток.
      correct: false
  - question: Як правильно описати вік вашого друга Антона українською мовою?
    explanation: 'Для віку ми завжди використовуємо давальний відмінок: Йому.'
    options:
    - text: Йому двадцять п'ять років.
      correct: true
    - text: Він має двадцять п'ять років.
      correct: false
    - text: Він є двадцять п'ять років.
      correct: false
    - text: Його двадцять п'ять років.
      correct: false
  - question: Що ви скажете, якщо вам потрібно знайти станцію метро?
    explanation: Для запитання про дорогу найкраще підходить дієслово скажіть.
    options:
    - text: Скажіть, будь ласка, де станція?
      correct: true
    - text: Дивіться, будь ласка, де станція?
      correct: false
    - text: Ідіть, будь ласка, де станція?
      correct: false
    - text: Пишіть, будь ласка, де станція?
      correct: false
  - question: Який відмінок завжди використовується після модального слова треба?
    explanation: 'Ми кажемо: мені треба, йому треба, нам треба.'
    options:
    - text: давальний відмінок
      correct: true
    - text: називний відмінок
      correct: false
    - text: знахідний відмінок
      correct: false
    - text: орудний відмінок
      correct: false
  - question: Яке дієслово змінюється за родами (він, вона) у теперішньому часі?
    explanation: 'Слово повинен змінюється: він повинен, вона повинна.'
    options:
    - text: повинен
      correct: true
    - text: треба
      correct: false
    - text: можна
      correct: false
    - text: потрібно
      correct: false
  - question: Як правильно запросити близького друга на вечірній концерт?
    explanation: Для друзів ми використовуємо неформальні фрази, як-от давай зустрінемось.
    options:
