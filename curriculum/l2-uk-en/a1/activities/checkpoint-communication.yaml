- id: quiz-holiday-match
  type: quiz
  instruction: Оберіть правильне свято для привітання (Choose the correct holiday
    for the greeting)
  items:
  - question: «З Різдвом!» — це привітання на...
    options:
    - Різдво
    - Великдень
    - Новий рік
    - день народження
    correct: 0
  - question: «З Великоднем!» — це привітання на...
    options:
    - Різдво
    - Великдень
    - Новий рік
    - день народження
    correct: 1
  - question: «З Новим роком!» — це привітання на...
    options:
    - Різдво
    - Великдень
    - Новий рік
    - день народження
    correct: 2
  - question: «З днем народження!» — це привітання на...
    options:
    - Різдво
    - Великдень
    - Новий рік
    - день народження
    correct: 3
  - question: «Зі святом!» — це привітання на...
    options:
    - будь-яке свято (any holiday)
    - лише Різдво
    - лише Новий рік
    - лише Великдень
    correct: 0
  - question: Якщо сьогодні 25 грудня (winter), ми кажемо...
    options:
    - З Різдвом!
    - З Великоднем!
    - З Новим роком!
    - З днем народження!
    correct: 0
  - question: Якщо сьогодні 1 січня, ми кажемо...
    options:
    - З Різдвом!
    - З Великоднем!
    - З Новим роком!
    - З днем народження!
    correct: 2
  - question: Якщо у друга сьогодні свято, ми кажемо...
    options:
    - З Різдвом!
    - З Великоднем!
    - З Новим роком!
    - З днем народження!
    correct: 3
  - question: Традиційна страва «кутя» готується на...
    options:
    - Різдво
    - Великдень
    - Новий рік
    - день народження
    correct: 0
  - question: Слова «Зі святом тебе!» можна сказати...
    options:
    - на будь-яке свято
    - тільки на Різдво
    - тільки на Великдень
    - тільки на Новий рік
    correct: 0
workbook:
- id: match-up-vocative
  type: match-up
  instruction: З'єднайте ім'я з правильною формою (Match the name with the correct
    form)
  pairs:
  - left: Олена
    right: Олено
  - left: Тарас
    right: Тарасе
  - left: Андрій
    right: Андрію
  - left: мама
    right: мамо
  - left: брат
    right: брате
  - left: сестра
    right: сестро
  - left: друг
    right: друже
  - left: подруга
    right: подруго
  - left: Олександр
    right: Олександре
  - left: Анна
    right: Анно
- id: group-sort-grammar
  type: group-sort
  instruction: Розподіліть слова за категоріями (Sort the words by categories)
  groups:
  - label: Імена в кличному відмінку (Names in Vocative case)
    items:
    - Олено
    - Тарасе
    - Андрію
    - мамо
    - брате
  - label: Дієслова (Verbs)
    items:
    - читай
    - дай
    - слухай
    - працюй
    - принеси
  - label: Свята (Holidays)
    items:
    - Різдво
    - Великдень
    - Новий рік
    - день народження
    - свято
- id: true-false-comma
  type: true-false
  instruction: Чи правильно стоїть кома в реченні? Правда чи ні? (Is the comma placed
    correctly? True or false?)
  items:
  - statement: Я знаю, що ти тут.
    correct: true
    explanation: Перед 'що' завжди ставиться кома.
  - statement: Я знаю що ти тут.
    correct: false
    explanation: Перед 'що' завжди ставиться кома.
  - statement: Я хочу гуляти але йде дощ.
    correct: false
    explanation: Перед 'але' потрібна кома.
  - statement: Я хочу гуляти, але йде дощ.
    correct: true
    explanation: Перед 'але' завжди ставиться кома.
  - statement: Скажи де мій телефон.
    correct: false
    explanation: Перед 'де' потрібна кома.
  - statement: Скажи, де мій телефон.
    correct: true
    explanation: Перед 'де' завжди ставиться кома.
  - statement: Ми вдома, бо йде сніг.
    correct: true
    explanation: Перед 'бо' завжди ставиться кома.
  - statement: Ми вдома бо йде сніг.
    correct: false
    explanation: Перед 'бо' потрібна кома.
  - statement: Я працюю, а ти відпочиваєш.
    correct: true
    explanation: Перед 'а' завжди ставиться кома.
  - statement: Брат і сестра читають.
    correct: true
    explanation: Перед 'і' (додавання) кома не ставиться.
