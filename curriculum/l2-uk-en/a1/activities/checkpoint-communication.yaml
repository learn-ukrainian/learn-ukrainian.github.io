- type: quiz
  title: 'Перевірте знання: Транспорт та напрямки'
  items:
  - question: В якому граматичному відмінку стоїть слово у фразі їхати автобусом?
    explanation: Для транспорту ми використовуємо орудний відмінок без прийменника.
    options:
    - text: в орудному відмінку
      correct: true
    - text: в давальному відмінку
      correct: false
    - text: у місцевому відмінку
      correct: false
    - text: у знахідному відмінку
      correct: false
  - question: Як правильно сказати, що ви подорожуєте на великому поїзді?
    explanation: 'Транспорт завжди потребує орудного відмінка: поїздом.'
    options:
    - text: Я їду поїздом.
      correct: true
    - text: Я їду поїзд.
      correct: false
    - text: Мені треба поїзд.
      correct: false
    - text: Я їду на поїзд.
      correct: false
  - question: Що вам скажуть люди, якщо вам треба йти прямо?
    explanation: Прямо означає рух вперед по прямій лінії.
    options:
    - text: Ідіть прямо по вулиці.
      correct: true
    - text: Ідіть направо по вулиці.
      correct: false
    - text: Ідіть наліво по вулиці.
      correct: false
    - text: Стійте прямо по вулиці.
      correct: false
  - question: Як ввічливо попросити незнайому людину показати вам правильну дорогу?
    explanation: Ми використовуємо ввічливу форму Ви та слово будь ласка.
    options:
    - text: Скажіть, будь ласка, де станція?
      correct: true
    - text: Пишіть, будь ласка, де станція?
      correct: false
    - text: Читай, де станція?
      correct: false
    - text: Іди, де станція?
      correct: false
  - question: Яке слово ми використовуємо, коли пропонуємо другу піти кудись разом?
    explanation: Ходімо — це популярна фраза для дружнього запрошення.
    options:
    - text: Ходімо!
      correct: true
    - text: Стійте!
      correct: false
    - text: Дайте!
      correct: false
    - text: Дивись!
      correct: false
  - question: Як правильно описати напрямок руху, якщо ви повертаєте ліворуч?
    explanation: Слово наліво означає рух у лівий бік.
    options:
    - text: Автобус повертає наліво.
      correct: true
    - text: Автобус повертає направо.
      correct: false
    - text: Автобус повертає прямо.
      correct: false
    - text: Автобус їде автобусом.
      correct: false
