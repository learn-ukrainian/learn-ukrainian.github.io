- type: quiz
  title: 'Модальні дієслова: Могти чи Вміти?'
  items:
  - question: Яке дієслово ми використовуємо для опису фізичної можливості?
    explanation: Слово могти означає фізичну можливість або наявність часу.
    options:
    - text: могти
      correct: true
    - text: вміти
      correct: false
    - text: хотіти
      correct: false
    - text: треба
      correct: false
  - question: Яке дієслово ми використовуємо для опису набутої навички?
    explanation: Слово вміти означає навичку, якої ви навчилися.
    options:
    - text: вміти
      correct: true
    - text: могти
      correct: false
    - text: повинен
      correct: false
    - text: можна
      correct: false
  - question: Як правильно сказати, що ви знаєте, як грати на гітарі?
    explanation: Грати на гітарі — це навичка, тому ми використовуємо вміти.
    options:
    - text: Я вмію грати на гітарі.
      correct: true
    - text: Я можу грати на гітарі.
      correct: false
    - text: Мені треба грати на гітарі.
      correct: false
    - text: Я повинен грати на гітарі.
      correct: false
  - question: Як сказати, що ви не маєте часу допомогти сьогодні?
    explanation: Брак часу — це зовнішня обставина, тому використовуємо не можу.
    options:
    - text: Я не можу допомогти сьогодні.
      correct: true
    - text: Я не вмію допомогти сьогодні.
      correct: false
    - text: Мені не можна допомогти сьогодні.
      correct: false
    - text: Я не повинен допомогти сьогодні.
      correct: false
  - question: Яке слово означає загальну або сувору заборону для всіх людей?
    explanation: Слово не можна використовується для заборон і правил.
    options:
    - text: не можна
      correct: true
    - text: не можу
      correct: false
    - text: не вмію
      correct: false
    - text: не хочу
      correct: false
  - question: Що ви скажете, якщо вам зараз занадто темно читати книгу?
    explanation: Темрява — це зовнішня обставина, тому ми кажемо не можу.
    options:
    - text: Я не можу читати.
      correct: true
    - text: Я не вмію читати.
      correct: false
    - text: Мені не можна читати.
      correct: false
    - text: Я не хочу читати.
      correct: false
  instruction: Оберіть правильну відповідь.
