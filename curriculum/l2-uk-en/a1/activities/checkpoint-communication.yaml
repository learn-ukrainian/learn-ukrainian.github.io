      right: "дай"
    - left: "іти"
      right: "іди"
    - left: "слухати"
      right: "слухай"
    - left: "дивитися"
      right: "дивись"
    - left: "стояти"
      right: "стій"

- type: group-sort
  title: "Sort the Commands"
  instruction: "Sort the verbs into informal and formal commands."
  groups:
