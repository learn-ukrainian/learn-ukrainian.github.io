inline:
  - id: act-1
    type: quiz
    title: Який транспорт?
    instruction: Choose the natural transport word for each situation.
    items:
      - prompt: 'From the airport to the hotel, faster but expensive.'
        options:
          - text: 'таксі'
            correct: true
          - text: 'трамвай'
            correct: false
          - text: 'колія'
            correct: false
        explanation: 'Таксі is the faster, more expensive option in the dialogue.'
      - prompt: 'City route number seven.'
        options:
          - text: 'автобус'
            correct: true
          - text: 'літак'
            correct: false
          - text: 'вокзал'
            correct: false
        explanation: 'Автобус номер сім is a city bus route.'
      - prompt: 'Underground city travel.'
        options:
          - text: 'метро'
            correct: true
          - text: 'маршрутка'
            correct: false
          - text: 'потяг'
            correct: false
        explanation: 'Метро is the underground city system.'
      - prompt: 'Rail trip to Lviv.'
        options:
          - text: 'потяг'
            correct: true
          - text: 'таксі'
            correct: false
          - text: 'зупинка'
            correct: false
        explanation: 'A trip to Lviv by rail uses потяг.'
      - prompt: 'City rails on the street.'
        options:
          - text: 'трамвай'
            correct: true
          - text: 'літак'
            correct: false
          - text: 'квиток'
            correct: false
        explanation: 'Трамвай runs on rails in the city.'
      - prompt: 'Electric city bus with overhead wires.'
        options:
          - text: 'тролейбус'
            correct: true
          - text: 'метро'
            correct: false
          - text: 'потяг'
            correct: false
        explanation: 'Тролейбус is the electric city bus with wires.'
      - prompt: 'Flight to another country.'
        options:
          - text: 'літак'
            correct: true
          - text: 'автобус'
            correct: false
          - text: 'станція'
            correct: false
        explanation: 'Літак is the transport for a flight.'
      - prompt: 'Small route minibus.'
        options:
          - text: 'маршрутка'
            correct: true
          - text: 'колія'
            correct: false
          - text: 'таксі'
            correct: false
        explanation: 'Маршрутка is a small route minibus.'
  - id: act-2
    type: fill-in
    title: Ticket window
    instruction: Complete the ticket-buying lines.
    items:
      - sentence: 'Один ___ до Львова, будь ласка.'
        answer: 'квиток'
        options:
          - 'квиток'
          - 'зупинка'
          - 'водій'
        explanation: 'Use квиток for a ticket.'
      - sentence: '___ коштує квиток?'
        answer: 'Скільки'
        options:
          - 'Скільки'
          - 'Куди'
          - 'Де'
        explanation: 'Скільки коштує? asks the price.'
      - sentence: 'В один бік чи ___ й назад?'
        answer: 'туди'
        options:
          - 'туди'
          - 'там'
          - 'тут'
        explanation: 'Туди й назад means there and back.'
      - sentence: "Відправлення ___ дев'ятій."
        answer: 'о'
        options:
          - 'о'
          - 'в'
          - 'на'
        explanation: "Use о with time: о дев'ятій."
      - sentence: 'Колія ___.'
        answer: 'третя'
        options:
          - 'третя'
          - 'три'
          - 'третє'
        explanation: 'Колія is feminine: третя.'
      - sentence: 'О котрій ___?'
        answer: 'відправлення'
        options:
          - 'відправлення'
          - 'зупинка'
          - 'станція'
        explanation: 'О котрій відправлення? asks the departure time.'
  - id: act-3
    type: quiz
    title: Автобусом чи на метро?
    instruction: Choose the natural travel model.
    items:
      - prompt: 'How do you say by bus?'
        options:
          - text: 'автобусом'
            correct: true
          - text: 'за автобусом'
            correct: false
          - text: 'на автобусі'
            correct: false
        explanation: 'Use the instrumental: автобусом.'
      - prompt: 'How do you say by metro?'
        options:
          - text: 'на метро'
            correct: true
          - text: 'метром'
            correct: false
          - text: 'на метрі'
            correct: false
        explanation: 'Метро does not change: на метро.'
      - prompt: 'How do you say by taxi?'
        options:
          - text: 'на таксі'
            correct: true
          - text: 'таксієм'
            correct: false
          - text: 'в таксію'
            correct: false
        explanation: 'Таксі does not change: на таксі.'
      - prompt: 'How do you say by train?'
        options:
          - text: 'потягом'
            correct: true
          - text: 'за потягом'
            correct: false
          - text: 'до потяга'
            correct: false
        explanation: 'Use potiahom: потягом.'
      - prompt: 'How do you say by tram?'
        options:
          - text: 'трамваєм'
            correct: true
          - text: 'на трамваю'
            correct: false
          - text: 'за трамваєм'
            correct: false
        explanation: 'Use the means form трамваєм.'
      - prompt: 'How do you say by trolleybus?'
        options:
          - text: 'тролейбусом'
            correct: true
          - text: 'у тролейбусу'
            correct: false
          - text: 'до тролейбуса'
            correct: false
        explanation: 'Use the means form тролейбусом.'
  - id: act-4
    type: fill-in
    title: Ask the route
    instruction: Complete each short route question or answer.
    items:
      - sentence: 'Як дістатися до ___?'
        answer: 'вокзалу'
        options:
          - 'вокзалу'
          - 'вокзал'
          - 'вокзалі'
        explanation: 'The route phrase is до вокзалу.'
      - sentence: 'Як дістатися до ___?'
        answer: 'центру'
        options:
          - 'центру'
          - 'центр'
          - 'центрі'
        explanation: 'The route phrase is до центру.'
      - sentence: 'Ідіть ___.'
        answer: 'прямо'
        options:
          - 'прямо'
          - 'зупинка'
          - 'квиток'
        explanation: 'Ідіть прямо means go straight.'
      - sentence: 'Поверніть ___.'
        answer: 'направо'
        options:
          - 'направо'
          - 'квиток'
          - 'метро'
        explanation: 'Поверніть направо means turn right.'
      - sentence: 'Поверніть ___.'
        answer: 'наліво'
        options:
          - 'наліво'
          - 'пасажир'
          - 'колія'
        explanation: 'Поверніть наліво means turn left.'
      - sentence: 'Мені ___ тут?'
        answer: 'виходити'
        options:
          - 'виходити'
          - 'квиток'
          - 'коштує'
        explanation: 'Мені виходити тут? asks if this is your stop.'
workbook:
  - type: order
    title: Airport to hotel route
    instruction: Put the route instructions in a helpful order.
    is_ukrainian: true
    items:
      - 'Вийдіть з аеропорту.'
      - 'Знайдіть зупинку автобуса.'
      - 'Їдьте автобусом до метро.'
      - 'Потім їдьте на метро до центру.'
      - 'На станції йдіть прямо.'
      - 'Готель праворуч.'
    correct_order: [0, 1, 2, 3, 4, 5]
  - type: true-false
    title: Transport culture
    instruction: Decide whether the statement fits the lesson.
    items:
      - statement: 'Добрий день is a natural polite opening.'
        answer: true
        explanation: 'Use Добрий день in transport dialogues.'
      - statement: 'Квиток is the lesson word for ticket.'
        answer: true
        explanation: 'Use квиток.'
      - statement: 'Зупинка is the lesson word for stop.'
        answer: true
        explanation: 'Use зупинка.'
      - statement: 'Один квиток до Львова, будь ласка is a natural ticket line.'
        answer: true
        explanation: 'This is the ticket-window phrase from the dialogue.'
      - statement: 'Я в автобусі answers де?'
        answer: true
        explanation: 'It means I am inside the bus.'
  - type: odd-one-out
    title: Find the odd transport phrase
    instruction: Choose the phrase that does not fit the pattern.
    items:
      - words:
          - 'автобусом'
          - 'потягом'
          - 'трамваєм'
          - 'на метрі'
        answer: 'на метрі'
        explanation: 'Use на метро.'
      - words:
          - 'квиток'
          - 'зупинка'
          - 'вокзал'
          - 'білет'
        answer: 'білет'
        explanation: 'Use квиток in this lesson.'
      - words:
          - 'у таксі'
          - 'на метро'
          - 'у метро'
          - 'в таксію'
        answer: 'в таксію'
        explanation: 'Таксі does not change.'
      - words:
          - 'Як дістатися до вокзалу?'
          - 'Де зупинка?'
          - 'Ідіть прямо.'
          - 'брати автобус'
        answer: 'брати автобус'
        explanation: 'Use їхати автобусом or сідати в автобус.'
  - type: error-correction
    title: Repair transport interference
    instruction: Choose the natural Ukrainian transport sentence.
    items:
      - sentence: 'Брати автобус (Take a bus)'
        error: 'брати автобус'
        correction: 'Їхати автобусом / Сідати в автобус'
        options:
          - 'Їхати автобусом / Сідати в автобус'
          - 'Брати автобус'
          - 'Їхати за автобусом'
        explanation: 'Ukrainian uses the transport as means or says to get into it.'
      - sentence: 'Їхати за автобусом (Travel by bus)'
        error: 'за автобусом'
        correction: 'Їхати автобусом'
        options:
          - 'Їхати автобусом'
          - 'Їхати за автобусом'
          - 'Їхати біля автобуса'
        explanation: 'Means of transport uses the instrumental without a preposition.'
      - sentence: 'В таксію / на метрі (In the taxi / on the metro)'
        error: 'таксію / метрі'
        correction: 'У таксі / на метро'
        options:
          - 'У таксі / на метро'
          - 'В таксію / на метрі'
          - 'У таксієм / на метрою'
        explanation: 'Таксі and метро do not change.'
      - sentence: 'Де остановка?'
        error: 'остановка'
        correction: 'Де зупинка?'
        options:
          - 'Де зупинка?'
          - 'Де остановка?'
          - 'Куди зупинка?'
        explanation: 'Use зупинка for a stop.'
      - sentence: 'Один білет, будь ласка.'
        error: 'білет'
        correction: 'Один квиток, будь ласка.'
        options:
          - 'Один квиток, будь ласка.'
          - 'Один білет, будь ласка.'
          - 'Одна зупинка, будь ласка.'
        explanation: 'Use квиток for this lesson.'
