---
inline:
  - id: act-1
    type: fill-in
    title: Я люблю + -ти
    instruction: Complete each sentence with the safe action word.
    items:
      - sentence: Я люблю ___.
        answer: читати
        options:
          - читати
          - читаю
          - книга
        explanation: After люблю, use the -ти action word.
      - sentence: Я люблю ___.
        answer: гуляти
        options:
          - гуляти
          - гуляю
          - місто
        explanation: Гуляти is the infinitive.
      - sentence: Я люблю ___.
        answer: готувати
        options:
          - готувати
          - готую
          - суп
        explanation: Use готувати after люблю.
      - sentence: Я люблю ___ музику.
        answer: слухати
        options:
          - слухати
          - слухаю
          - музика
        explanation: Слухати stays in the -ти form.
      - sentence: Я люблю ___ фільм.
        answer: дивитися
        options:
          - дивитися
          - дивлюся
          - фільм
        explanation: Use дивитися after люблю.
      - sentence: Я люблю ___.
        answer: грати
        options:
          - грати
          - граю
          - гра
        explanation: Грати is the action word.
      - sentence: Я люблю ___.
        answer: малювати
        options:
          - малювати
          - малюю
          - малюнок
        explanation: The action after люблю ends in -ти.
      - sentence: Я люблю ___.
        answer: співати
        options:
          - співати
          - співаю
          - пісня
        explanation: Співати is the safe infinitive.
  - id: act-2
    type: quiz
    title: Люблю чи подобається
    instruction: Choose the Ukrainian sentence that matches the meaning.
    items:
      - prompt: I like to read.
        options:
          - text: Я люблю читати.
            correct: true
          - text: Я люблю читаю.
            correct: false
          - text: Я подобається читати.
            correct: false
        explanation: Use Я люблю plus an action in -ти.
      - prompt: I like music.
        options:
          - text: Мені подобається музика.
            correct: true
          - text: Я люблю музика.
            correct: false
          - text: Мені люблю музика.
            correct: false
        explanation: Use Мені подобається for a thing.
      - prompt: I like to cook.
        options:
          - text: Я люблю готувати.
            correct: true
          - text: Я люблю готую.
            correct: false
          - text: Мені люблю готувати.
            correct: false
        explanation: Cooking is an action, so use люблю + -ти.
      - prompt: I like this book.
        options:
          - text: Мені подобається ця книга.
            correct: true
          - text: Я подобається ця книга.
            correct: false
          - text: Мені люблю ця книга.
            correct: false
        explanation: Книга is a thing, so use Мені подобається.
      - prompt: I like to watch a film.
        options:
          - text: Я люблю дивитися фільм.
            correct: true
          - text: Я люблю дивлюся фільм.
            correct: false
          - text: Я подобається фільм.
            correct: false
        explanation: Watching is an action.
      - prompt: I like this film.
        options:
          - text: Мені подобається цей фільм.
            correct: true
          - text: Я подобається цей фільм.
            correct: false
          - text: Мені люблю цей фільм.
            correct: false
        explanation: Use Мені подобається for the film itself.
      - prompt: I like to play.
        options:
          - text: Я люблю грати.
            correct: true
          - text: Я люблю граю.
            correct: false
          - text: Я грати подобається.
            correct: false
        explanation: Use люблю + грати for the action.
      - prompt: I like Kyiv.
        options:
          - text: Мені подобається Київ.
            correct: true
          - text: Я подобається Київ.
            correct: false
          - text: Мені люблю Київ.
            correct: false
        explanation: Today, keep things and places with Мені подобається.
  - id: act-3
    type: match-up
    title: Дії в інфінітиві
    instruction: Match each Ukrainian action word with its meaning.
    pairs:
      - left: читати
        right: to read
      - left: гуляти
        right: to walk
      - left: готувати
        right: to cook
      - left: слухати
        right: to listen
      - left: дивитися
        right: to watch
      - left: грати
        right: to play
      - left: малювати
        right: to draw
      - left: співати
        right: to sing
  - id: act-4
    type: fill-in
    title: Зроби заперечення
    instruction: Add the missing negative word.
    items:
      - sentence: Я ___ люблю готувати.
        answer: не
        options:
          - не
          - ні
          - немає
        explanation: Put не before люблю.
      - sentence: Мені ___ подобається цей фільм.
        answer: не
        options:
          - не
          - ні
          - немає
        explanation: Put не before подобається.
      - sentence: Ти ___ любиш читати?
        answer: не
        options:
          - не
          - ні
          - немає
        explanation: This asks whether you do not like reading.
      - sentence: Мені ___ подобається ця книга.
        answer: не
        options:
          - не
          - ні
          - немає
        explanation: The negative word comes before подобається.
      - sentence: Я ___ люблю дивитися фільм.
        answer: не
        options:
          - не
          - ні
          - немає
        explanation: Keep не before люблю.
      - sentence: Тобі ___ подобається музика?
        answer: не
        options:
          - не
          - ні
          - немає
        explanation: Use не before подобається in the question too.
