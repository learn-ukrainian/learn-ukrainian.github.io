---
inline:
  - id: act-1
    type: fill-in
    title: Додай -ся
    instruction: Add the reflexive ending to complete each morning form.
    items:
      - sentence: я вмиваю__
        answer: ся
        options:
          - ся
          - сь
          - не
        explanation: The active full form is я вмиваюся.
      - sentence: ти одягаєш__
        answer: ся
        options:
          - ся
          - сь
          - не
        explanation: The ти form is ти одягаєшся.
      - sentence: він прокидаєть__
        answer: ся
        options:
          - ся
          - сь
          - не
        explanation: The він form is він прокидається.
      - sentence: ми збираємо__
        answer: ся
        options:
          - ся
          - сь
          - не
        explanation: The ми form is ми збираємося.
      - sentence: ви вмиваєте__
        answer: ся
        options:
          - ся
          - сь
          - не
        explanation: The ви form is ви вмиваєтеся.
      - sentence: вони прокидають__
        answer: ся
        options:
          - ся
          - сь
          - не
        explanation: The вони form is вони прокидаються.
      - sentence: я прокидаю__
        answer: ся
        options:
          - ся
          - сь
          - не
        explanation: Use the full classroom form прокидаюся.
      - sentence: вона одягаєть__
        answer: ся
        options:
          - ся
          - сь
          - не
        explanation: The вона form is одягається.
      - sentence: ти збираєш__
        answer: ся
        options:
          - ся
          - сь
          - не
        explanation: The ти form is збираєшся.
      - sentence: ми повертаємо__
        answer: ся
        options:
          - ся
          - сь
          - не
        explanation: The ми form is повертаємося.
  - id: act-2
    type: quiz
    title: Зворотне чи ні?
    instruction: Choose the natural Ukrainian morning line.
    items:
      - prompt: I wash up in the morning.
        options:
          - text: Я вмиваюся вранці.
            correct: true
          - text: Я вмиваю вранці.
            correct: false
          - text: Я вмиваюся руки.
            correct: false
        explanation: The routine action is Я вмиваюся.
      - prompt: I wash my hands.
        options:
          - text: Я вмиваю руки.
            correct: true
          - text: Я вмиваюся руки.
            correct: false
          - text: Я вмивається руки.
            correct: false
        explanation: With a direct object, do not use -ся here.
      - prompt: I have breakfast at home.
        options:
          - text: Я снідаю вдома.
            correct: true
          - text: Я снідаюся вдома.
            correct: false
          - text: Я сніданок вдома.
            correct: false
        explanation: Снідати is regular here; do not add -ся.
      - prompt: I get dressed quickly.
        options:
          - text: Я швидко одягаюся.
            correct: true
          - text: Я швидко одягаю.
            correct: false
          - text: Я швидко одягатися.
            correct: false
        explanation: Use the present form одягаюся.
      - prompt: I put on a shirt.
        options:
          - text: Я одягаю сорочку.
            correct: true
          - text: Я одягаюся сорочку.
            correct: false
          - text: Я одягається сорочку.
            correct: false
        explanation: With the object сорочку, use одягаю.
      - prompt: I wake up late on Saturday.
        options:
          - text: У суботу я прокидаюся пізно.
            correct: true
          - text: У суботу я прокидаю пізно.
            correct: false
          - text: У суботу я прокидаєшся пізно.
            correct: false
        explanation: Я needs прокидаюся.
      - prompt: I study in the morning.
        options:
          - text: Я навчаюся вранці.
            correct: true
          - text: Я навчаю вранці.
            correct: false
          - text: Я навчаєшся вранці.
            correct: false
        explanation: Навчатися is a -ся verb.
      - prompt: I go to work.
        options:
          - text: Я йду на роботу.
            correct: true
          - text: Я йдуся на роботу.
            correct: false
          - text: Я йдеш на роботу.
            correct: false
        explanation: Йти is irregular and does not take -ся in this line.
  - id: act-3
    type: fill-in
    title: Порядок ранку
    instruction: Choose the sequence word that fits the routine.
    items:
      - sentence: ___ я прокидаюся о сьомій.
        answer: Спочатку
        options:
          - Спочатку
          - Після цього
          - Нарешті
        explanation: Спочатку starts the story.
      - sentence: ___ я вмиваюся.
        answer: Потім
        options:
          - Потім
          - Нарешті
          - Спочатку
        explanation: Потім gives the next action.
      - sentence: ___ я одягаюся.
        answer: Після цього
        options:
          - Після цього
          - Спочатку
          - Нарешті
        explanation: Після цього means after that.
      - sentence: ___ я снідаю.
        answer: Потім
        options:
          - Потім
          - Нарешті
          - Спочатку
        explanation: Потім can introduce another middle step.
      - sentence: ___ я йду на роботу.
        answer: Нарешті
        options:
          - Нарешті
          - Спочатку
          - Після цього
        explanation: Нарешті marks the final step.
      - sentence: Спочатку я прокидаюся. ___ я вмиваюся.
        answer: Потім
        options:
          - Потім
          - Нарешті
          - Після цього
        explanation: Потім links the second action.
  - id: act-4
    type: fill-in
    title: Три речення про ранок
    instruction: Complete the three-sentence morning story.
    items:
      - sentence: ___ я прокидаюся о восьмій.
        answer: Спочатку
        options:
          - Спочатку
          - Нарешті
          - Після цього
        explanation: Start the story with Спочатку.
      - sentence: ___ я вмиваюся і снідаю.
        answer: Потім
        options:
          - Потім
          - Нарешті
          - Спочатку
        explanation: Потім gives the next action.
      - sentence: ___ я йду в університет.
        answer: Нарешті
        options:
          - Нарешті
          - Потім
          - Спочатку
        explanation: Нарешті marks the last sentence.
