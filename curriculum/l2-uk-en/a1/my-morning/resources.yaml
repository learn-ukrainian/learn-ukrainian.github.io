- title: Захарійчук Grade 1, p.24
  role: textbook
  notes: 'Buktvar story «Мій день» (за Арнольдом Лобелом). Frog Кнак plans the day
    entirely in reflexive infinitives: одягнутися, прогулятися, погратися. A1-friendly
    model of -ти + ся as the dictionary form of a reflexive verb.'
- title: Захарійчук Grade 1, p.52
  role: textbook
  notes: 'Bukvar story about Євген''s first self-directed morning: устав із ліжка
    САМ → прибрав ліжко САМ → зробив зарядку САМ → поставив чашку → помив посуд. A1-friendly
    chained-action model for describing one''s own morning routine.'
