  \ event”, “bright spring colors”, “вірша про сонце”, а також абсолюти типу “strictly\
  \ divided”, “we do not use”, “must always”.\n  English: The grounded core is there,\
  \ but the writer extends it with unsupported framing and absolute claims.\n\n##\
