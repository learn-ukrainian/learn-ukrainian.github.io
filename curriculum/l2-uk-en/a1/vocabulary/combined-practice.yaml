items:
  - lemma: "спочатку"
    translation: "first, at first, initially"
    pos: "adverb"
    usage: "«спочатку я» (firstly I), «спочатку треба» (firstly one needs)"
  - lemma: "потім"
    translation: "then, afterwards"
    pos: "adverb"
    usage: "«а потім» (and then), «потім ми» (then we)"
  - lemma: "нарешті"
    translation: "finally, at last"
    pos: "adverb"
    usage: "use to close a sequence started with «спочатку»"
  - lemma: "тому що"
    translation: "because"
    pos: "conjunction"
    notes: "Standard A1 form, used in writing or formal speech"
  - lemma: "бо"
    translation: "because"
    pos: "conjunction"
    notes: "colloquial, shorter version of «тому що», high frequency in speech"
  - lemma: "якщо"
    translation: "if"
    pos: "conjunction"
    usage: "«якщо ви» (if you), «якщо є» (if there is)"
  - lemma: "але"
    translation: "but"
    pos: "conjunction"
    usage: "«але потім» (but then), «але не» (but not)"
  - lemma: "і"
    translation: "and"
    pos: "conjunction"
    notes: "becomes «й» after vowels for euphony"
  - lemma: "також"
    translation: "also, too"
    pos: "adverb"
    notes: "word order: never at the end of a sentence"
  - lemma: "разом"
    translation: "together"
    pos: "adverb"
    usage: "«разом з» (together with), «ходімо разом» (let's go together)"
  - lemma: "план"
    translation: "plan"
    pos: "noun"
    gender: "m"
    example: "Це мій план."
  - lemma: "проблема"
    translation: "problem"
    pos: "noun"
    gender: "f"
    usage: "«немає проблеми» (no problem)"
  - lemma: "вирішити"
    translation: "to solve, to decide"
    pos: "verb"
    aspect: "perfective"
    usage: "«вирішити проблему» (solve a problem)"
  - lemma: "змінити"
    translation: "to change"
    pos: "verb"
    aspect: "perfective"
    usage: "«змінити плани» (change plans)"
  - lemma: "кава"
    translation: "coffee"
    pos: "noun"
    gender: "f"
  - lemma: "базар"
    translation: "market, bazaar"
    pos: "noun"
    gender: "m"
  - lemma: "купувати"
    translation: "to buy"
    pos: "verb"
    aspect: "imperfective"
  - lemma: "овочі"
    translation: "vegetables"
    pos: "noun"
    gender: "m"
  - lemma: "фрукти"
    translation: "fruits"
    pos: "noun"
    gender: "m"
  - lemma: "дорого"
    translation: "expensive"
    pos: "adverb"