items:
  - lemma: "褋锌芯褔邪褌泻褍"
    ipa: '[sp蓴藞t汀蕛蓱tku]'
    translation: "first, at first, initially"
    pos: "adverb"
    usage: "芦褋锌芯褔邪褌泻褍 褟禄 (firstly I), 芦褋锌芯褔邪褌泻褍 褌褉械斜邪禄 (firstly one needs)"
  - lemma: "锌芯褌褨屑"
    ipa: '[藞p蓴t什im]'
    translation: "then, afterwards"
    pos: "adverb"
    usage: "芦邪 锌芯褌褨屑禄 (and then), 芦锌芯褌褨屑 屑懈禄 (then we)"
  - lemma: "薪邪褉械褕褌褨"
    ipa: '[n蓱藞r蓻蕛t什i]'
    translation: "finally, at last"
    pos: "adverb"
    usage: "use to close a sequence started with 芦褋锌芯褔邪褌泻褍禄"
  - lemma: "褌芯屑褍 褖芯"
    ipa: '[t蓴藞mu 蕛t汀蕛蓴]'
    translation: "because"
    pos: "conjunction"
    notes: "Standard A1 form, used in writing or formal speech"
  - lemma: "斜芯"
    ipa: '[b蓴]'
    translation: "because"
    pos: "conjunction"
    notes: "colloquial, shorter version of 芦褌芯屑褍 褖芯禄, high frequency in speech"
  - lemma: "褟泻褖芯"
    ipa: '[j蓱藞k蕛t汀蕛蓴]'
    translation: "if"
    pos: "conjunction"
    usage: "芦褟泻褖芯 胁懈禄 (if you), 芦褟泻褖芯 褦禄 (if there is)"
  - lemma: "邪谢械"
    ipa: '[蓱藞l蓻]'
    translation: "but"
    pos: "conjunction"
    usage: "芦邪谢械 锌芯褌褨屑禄 (but then), 芦邪谢械 薪械禄 (but not)"
  - lemma: "褨"
    ipa: '[i]'
    translation: "and"
    pos: "conjunction"
    notes: "becomes 芦泄禄 after vowels for euphony"
  - lemma: "褌邪泻芯卸"
    ipa: '[藞t蓱藞k蓴蕭]'
    translation: "also, too"
    pos: "adverb"
    notes: "word order: never at the end of a sentence"
  - lemma: "褉邪蟹芯屑"
    ipa: '[藞r蓱z蓴m]'
    translation: "together"
    pos: "adverb"
    usage: "芦褉邪蟹芯屑 蟹禄 (together with), 芦褏芯写褨屑芯 褉邪蟹芯屑禄 (let's go together)"
  - lemma: "锌谢邪薪"
    ipa: '[pl蓱n]'
    translation: "plan"
    pos: "noun"
    gender: "m"
    example: "笑械 屑褨泄 锌谢邪薪."
  - lemma: "锌褉芯斜谢械屑邪"
    ipa: '[pr蓴藞bl蓻m蓱]'
    translation: "problem"
    pos: "noun"
    gender: "f"
    usage: "芦薪械屑邪褦 锌褉芯斜谢械屑懈禄 (no problem)"
  - lemma: "胁懈褉褨褕懈褌懈"
    ipa: '[藞蕥瑟r什i蕛瑟t瑟]'
    translation: "to solve, to decide"
    pos: "verb"
    aspect: "perfective"
    usage: "芦胁懈褉褨褕懈褌懈 锌褉芯斜谢械屑褍禄 (solve a problem)"
  - lemma: "蟹屑褨薪懈褌懈"
    ipa: '[z什m什i藞n瑟t瑟]'
    translation: "to change"
    pos: "verb"
    aspect: "perfective"
    usage: "芦蟹屑褨薪懈褌懈 锌谢邪薪懈禄 (change plans)"
  - lemma: "泻邪胁邪"
    ipa: '[藞k蓱蕥蓱]'
    translation: "coffee"
    pos: "noun"
    gender: "f"
  - lemma: "斜邪蟹邪褉"
    ipa: '[b蓱藞z蓱r]'
    translation: "market, bazaar"
    pos: "noun"
    gender: "m"
  - lemma: "泻褍锌褍胁邪褌懈"
    ipa: '[kupu藞蕥蓱t瑟]'
    translation: "to buy"
    pos: "verb"
    aspect: "imperfective"
  - lemma: "芯胁芯褔褨"
    ipa: '[藞蓴蕥蓴t汀蕛什i]'
    translation: "vegetables"
    pos: "noun"
    gender: "m"
  - lemma: "褎褉褍泻褌懈"
    ipa: '[藞frukt瑟]'
    translation: "fruits"
    pos: "noun"
    gender: "m"
  - lemma: "写芯褉芯谐芯"
    ipa: '[藞d蓴r蓴搔蓴]'
    translation: "expensive"
    pos: "adverb"