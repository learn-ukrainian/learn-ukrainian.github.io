module: 09-reflexive-verbs
level: A1
version: '2.0'
items:
  - lemma: 薪邪蟹懈胁邪褌懈褋褟
    ipa: /n蓱z瑟藞w蓱t瑟s什蓱/
    translation: to be called
    pos: verb
    note: reflexive
