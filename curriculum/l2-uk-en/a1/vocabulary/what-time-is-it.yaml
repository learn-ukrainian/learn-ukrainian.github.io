items:
  - lemma: "година"
    translation: "hour"
    pos: "noun"
    gender: "f"
    usage: "котра година?, о першій годині"
    notes: "Key time word — hours use feminine ordinal numbers to agree with година"
  - lemma: "хвилина"
    translation: "minute"
    pos: "noun"
    gender: "f"
    usage: "за п'ять хвилин, тридцять хвилин"
  - lemma: "день"
    translation: "day"
    pos: "noun"
    gender: "m"
    usage: "робочий день, вихідний день"
  - lemma: "тиждень"
    translation: "week"
    pos: "noun"
    gender: "m"
    usage: "дні тижня, на цьому тижні"
    notes: "Do not confuse with неділя (Sunday)"
  - lemma: "місяць"
    translation: "month"
    pos: "noun"
    gender: "m"
    usage: "у цьому місяці, зимові місяці"
  - lemma: "рік"
    translation: "year"
    pos: "noun"
    gender: "m"
    usage: "новий рік, цього року"
  - lemma: "ранок"
    translation: "morning"
    pos: "noun"
    gender: "m"
    usage: "доброго ранку, о восьмій ранку"
  - lemma: "вечір"
    translation: "evening"
    pos: "noun"
    gender: "m"
    usage: "добрий вечір, о сьомій вечора"
  - lemma: "вчасно"
    translation: "on time"
    pos: "adverb"
    usage: "бути вчасно, прийти вчасно"
  - lemma: "понеділок"
    translation: "Monday"
    pos: "noun"
    gender: "m"
    usage: "у понеділок"
    notes: "Literally 'after неділя (Sunday)'"
  - lemma: "січень"
    translation: "January"
    pos: "noun"
    gender: "m"
    usage: "у січні, перше січня"
    notes: "Always lowercase in Ukrainian"
  - lemma: "зараз"
    translation: "now"
    pos: "adverb"
    usage: "зараз восьма година"
  - lemma: "пізно"
    translation: "late"
    pos: "adverb"
  - lemma: "рано"
    translation: "early"
    pos: "adverb"
  - lemma: "неділя"
    translation: "Sunday"
    pos: "noun"
    gender: "f"
    usage: "у неділю"
    notes: "False friend — means Sunday, NOT week"
  - lemma: "субота"
    translation: "Saturday"
    pos: "noun"
    gender: "f"
    usage: "у суботу"
  - lemma: "розклад"
    translation: "schedule; timetable"
    pos: "noun"
    gender: "m"
    usage: "розклад поїздів"
  - lemma: "поїзд"
    translation: "train"
    pos: "noun"
    gender: "m"
    usage: "поїзд на Львів, поїзд о десятій"
  - lemma: "ніч"
    translation: "night"
    pos: "noun"
    gender: "f"
    usage: "на ніч, о другій ночі"
  - lemma: "після"
    translation: "after"
    pos: "preposition"
    usage: "після шостої, після роботи"
    notes: "Time preposition — після + genitive"
  - lemma: "вівторок"
    translation: "Tuesday"
    pos: "noun"
    gender: "m"
  - lemma: "середа"
    translation: "Wednesday"
    pos: "noun"
    gender: "f"
  - lemma: "четвер"
    translation: "Thursday"
    pos: "noun"
    gender: "m"
  - lemma: "п'ятниця"
    translation: "Friday"
    pos: "noun"
    gender: "f"
  - lemma: "лютий"
    translation: "February"
    pos: "noun"
    gender: "m"
  - lemma: "березень"
    translation: "March"
    pos: "noun"
    gender: "m"
  - lemma: "квітень"
    translation: "April"
    pos: "noun"
    gender: "m"
  - lemma: "травень"
    translation: "May"
    pos: "noun"
    gender: "m"
  - lemma: "червень"
    translation: "June"
    pos: "noun"
    gender: "m"
  - lemma: "липень"
    translation: "July"
    pos: "noun"
    gender: "m"
  - lemma: "серпень"
    translation: "August"
    pos: "noun"
    gender: "m"
  - lemma: "вересень"
    translation: "September"
    pos: "noun"
    gender: "m"
  - lemma: "жовтень"
    translation: "October"
    pos: "noun"
    gender: "m"
  - lemma: "листопад"
