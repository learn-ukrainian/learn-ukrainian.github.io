items:
  - lemma: "один"
    translation: "one"
    pos: "numeral"
    notes: "Gender agreement: один (m), одна (f), одне (n)"
    usage: "один раз, одна гривня"
  - lemma: "два"
    translation: "two"
    pos: "numeral"
    notes: "Gender agreement: два (m/n), дві (f)"
    usage: "два долари, дві гривні"
  - lemma: "три"
    translation: "three"
    pos: "numeral"
    usage: "три гривні"
  - lemma: "чотири"
    translation: "four"
    pos: "numeral"
    usage: "чотири гривні"
  - lemma: "п'ять"
    translation: "five"
    pos: "numeral"
    notes: "Apostrophe causes a slight pause after п"
    usage: "п'ять гривень, п'ять хвилин"
  - lemma: "десять"
    translation: "ten"
    pos: "numeral"
    usage: "десять гривень"
  - lemma: "двадцять"
    translation: "twenty"
    pos: "numeral"
  - lemma: "тридцять"
    translation: "thirty"
    pos: "numeral"
  - lemma: "сорок"
    translation: "forty"
    pos: "numeral"
    notes: "Irregular form — does not follow the -десят pattern"
  - lemma: "п'ятдесят"
    translation: "fifty"
    pos: "numeral"
    notes: "Soft sign from п'ять is dropped"
  - lemma: "сто"
    translation: "one hundred"
    pos: "numeral"
    usage: "сто гривень"
  - lemma: "гривня"
    translation: "hryvnia (Ukrainian currency)"
    pos: "noun"
    gender: "f"
    notes: "1-2-5 rule: гривня (1), гривні (2-4), гривень (5+)"
    usage: "одна гривня, дві гривні, п'ять гривень"
  - lemma: "скільки"
    translation: "how much, how many"
    pos: "adverb"
    usage: "Скільки коштує? Скільки це коштує?"
  - lemma: "коштувати"
    translation: "to cost"
    pos: "verb"
    aspect: "imperfective"
    usage: "Скільки коштує хліб?"
  - lemma: "копійка"
    translation: "kopeck (1/100 of a hryvnia)"
    pos: "noun"
    gender: "f"
    notes: "100 копійок = 1 гривня"
  - lemma: "ціна"
    translation: "price"
    pos: "noun"
    gender: "f"
    usage: "Яка ціна?"
  - lemma: "дорого"
    translation: "expensive"
    pos: "adverb"
    usage: "Це дуже дорого!"
  - lemma: "дешево"
    translation: "cheap"
    pos: "adverb"
    usage: "Це дешево."
  - lemma: "здача"
    translation: "change (money returned)"
    pos: "noun"
    gender: "f"
    usage: "Ваша здача — двадцять гривень."
  - lemma: "гроші"
    translation: "money"
    pos: "noun"
    notes: "Plurale tantum — used only in plural"
    usage: "Час — це гроші."