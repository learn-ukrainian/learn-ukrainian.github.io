items:
  - lemma: "іти"
    translation: "to go (on foot)"
    pos: "verb"
    aspect: "imperfective"
    usage: "Я іду в магазин."
    notes: "Unidirectional motion verb — used for going in one direction"
  - lemma: "їхати"
    translation: "to go (by vehicle)"
    pos: "verb"
    aspect: "imperfective"
    usage: "Я їду у Львів."
    notes: "Vehicular motion verb — used for travel by car, train, bus"
  - lemma: "куди"
    translation: "where to"
    pos: "adverb"
    usage: "Куди ти йдеш?"
    notes: "Direction question word — pairs with Accusative or до + Genitive"
  - lemma: "звідки"
    translation: "where from"
    pos: "adverb"
    usage: "Звідки ти?"
    notes: "Origin question word — pairs with з/від + Genitive"
  - lemma: "до"
    translation: "to, towards"
    pos: "preposition"
    usage: "Я іду до лікаря."
    notes: "Always requires Genitive case; used for direction toward a person or place"
  - lemma: "від"
    translation: "from (a person)"
    pos: "preposition"
    usage: "Книжка від мами."
    notes: "Used with Genitive for origin from a person; contrast with з (from a place)"
  - lemma: "з"
    translation: "from (a place)"
    pos: "preposition"
    usage: "Я з України."
    notes: "Variants із/зі used for euphony; requires Genitive case"
  - lemma: "лікар"
    translation: "doctor"
    pos: "noun"
    gender: "m"
    usage: "Я іду до лікаря."
    notes: "Animate masculine — Genitive form лікаря"
  - lemma: "робота"
    translation: "work, job"
    pos: "noun"
    gender: "f"
    usage: "Я іду на роботу."
    notes: "Uses на for both location (на роботі) and direction (на роботу)"
  - lemma: "пошта"
    translation: "post office"
    pos: "noun"
    gender: "f"
    usage: "Я іду на пошту."
    notes: "Institution — uses на for location and direction"
  - lemma: "Київ"
    translation: "Kyiv"
    pos: "noun"
    gender: "m"
    usage: "Я їду до Києва."
    notes: "Capital of Ukraine; Genitive form Києва"
  - lemma: "Україна"
    translation: "Ukraine"
    pos: "noun"
    gender: "f"
    usage: "Я з України."
    notes: "Accusative Україну (direction), Genitive України (origin)"
  - lemma: "повертатися"
    translation: "to return"
    pos: "verb"
    aspect: "imperfective"
    usage: "Я повертатися додому."
    notes: "Reflexive verb; commonly paired with додому (homeward)"
  - lemma: "виходити"
    translation: "to go out, to exit"
    pos: "verb"
    aspect: "imperfective"
    usage: "Він виходити з дому."
    notes: "Pairs with з + Genitive to express leaving a place"
  - lemma: "аеропорт"
    translation: "airport"
    pos: "noun"
    gender: "m"
    usage: "Я їду в аеропорт."
    notes: "в аеропорт (direction), в аеропорту (location), з аеропорту (origin)"
  - lemma: "вокзал"
    translation: "station (train/bus)"
    pos: "noun"
    gender: "m"
    usage: "Він іде на вокзал."
    notes: "Uses на for both location (на вокзалі) and direction (на вокзал)"
  - lemma: "школа"
    translation: "school"
    pos: "noun"
    gender: "f"
    usage: "Вона іде в школу."
    notes: "Origin uses зі (зі школи) due to euphony before ш-"
  - lemma: "аптека"
    translation: "pharmacy"
    pos: "noun"
    gender: "f"
    usage: "Я іду в аптеку."
    notes: "в аптеці (location), в аптеку (direction), з аптеки (origin)"
  - lemma: "дім"
    translation: "house, home"
    pos: "noun"
    gender: "m"
    usage: "Я іду до дому."
    notes: "Common collocation до дому / додому (homeward)"
  - lemma: "Львів"
    translation: "Lviv"
    pos: "noun"
    gender: "m"
    usage: "Вона зі Львова."
    notes: "Uses зі for euphony (зі Львова); Genitive form Львова"