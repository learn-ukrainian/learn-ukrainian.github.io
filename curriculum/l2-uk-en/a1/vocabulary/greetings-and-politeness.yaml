items:
  - lemma: "привіт"
    translation: "hello (informal)"
    pos: "noun"
    notes: "Used only with friends, peers, and children. Never with strangers or elders."
    usage: "Привіт! Як справи?"
  - lemma: "добрий"
    translation: "good"
    pos: "adjective"
    gender: "m"
    notes: "Used in time-based greetings: добрий ранок, добрий день, добрий вечір."
  - lemma: "ранок"
    translation: "morning"
    pos: "noun"
    gender: "m"
    usage: "Добрий ранок!"
  - lemma: "день"
    translation: "day; afternoon"
    pos: "noun"
    gender: "m"
    usage: "Добрий день, пане Петре!"
  - lemma: "вечір"
    translation: "evening"
    pos: "noun"
    gender: "m"
    usage: "Добрий вечір!"
  - lemma: "побачення"
    translation: "meeting; seeing"
    pos: "noun"
    gender: "n"
    notes: "Used in the farewell phrase до побачення (until seeing)."
  - lemma: "дякувати"
    translation: "to thank"
    pos: "verb"
    aspect: "imperfective"
    usage: "Дякую! / Дуже дякую!"
  - lemma: "ласка"
    translation: "kindness; grace"
    pos: "noun"
    gender: "f"
    notes: "Used in будь ласка (please / you're welcome)."
  - lemma: "вибачити"
    translation: "to excuse; to forgive"
    pos: "verb"
    aspect: "perfective"
    notes: "Formal imperative: вибачте. Informal imperative: вибач."
  - lemma: "перепрошувати"
    translation: "to apologize"
    pos: "verb"
    aspect: "imperfective"
    notes: "More formal and sincere than вибачте. Used when you have genuinely inconvenienced someone."
    usage: "Перепрошую, я запізнився."
  - lemma: "приємно"
    translation: "pleasant; pleased"
    pos: "adverb"
    notes: "Used in introductions: дуже приємно (pleased to meet you)."
  - lemma: "пан"
    translation: "Mr.; sir"
    pos: "noun"
    gender: "m"
    notes: "Vocative form: пане. Used for formal address before male names."
    usage: "Добрий день, пане Петре!"
  - lemma: "пані"
    translation: "Ms.; madam"
    pos: "noun"
    gender: "f"
    notes: "Vocative form is the same: пані. Used for formal address before female names."
    usage: "Добрий день, пані Оксано!"
  - lemma: "ти"
    translation: "you (singular informal)"
    pos: "pronoun"
    notes: "Used with friends, family, children, and close peers."
  - lemma: "ви"
    translation: "you (plural or singular formal)"
    pos: "pronoun"
    notes: "Always start with ви until invited to switch to ти."
  - lemma: "дуже"
    translation: "very; very much"
    pos: "adverb"
    usage: "Дуже дякую!"
  - lemma: "щиро"
    translation: "sincerely"
    pos: "adverb"
    usage: "Щиро дякую!"
  - lemma: "бувати"
    translation: "to be (frequentative); bye"
    pos: "verb"
    aspect: "imperfective"
    notes: "Imperative forms used as informal farewells: бувай (singular), бувайте (plural)."
  - lemma: "здрастуйте"
    translation: "hello (formal)"
    pos: "interjection"
    notes: "Alternative formal greeting. Slightly old-fashioned but still used."
  - lemma: "справа"
    translation: "matter; affair; thing"
    pos: "noun"
    gender: "f"
    notes: "Used in the phrase як справи? (how are things?)."
    usage: "Привіт! Як справи? — Добре, дякую."