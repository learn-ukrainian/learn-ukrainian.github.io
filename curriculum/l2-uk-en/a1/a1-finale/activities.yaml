inline:
  - id: act-1
    type: fill-in
    title: Complete the A1 line
    instruction: Choose the word or phrase that fits the time and situation.
    items:
      - sentence: 'Зранку я ___ у кафе.'
        answer: 'снідав'
        options:
          - 'снідав'
          - 'буду снідати'
          - 'снідаю'
        explanation: 'Зранку can describe an earlier part of the day in the final story.'
      - sentence: 'Зараз я ___ по Хрещатику.'
        answer: 'гуляю'
        options:
          - 'гуляю'
          - 'гуляв'
          - 'буду гуляти'
        explanation: 'Зараз points to the present.'
      - sentence: 'Учора я ___ квиток.'
        answer: 'купив'
        options:
          - 'купив'
          - 'купую'
          - 'буду купувати'
        explanation: 'Учора points to the past.'
      - sentence: 'Завтра я ___ по Україні.'
        answer: 'буду подорожувати'
        options:
          - 'буду подорожувати'
          - 'подорожував'
          - 'подорожую'
        explanation: 'Завтра pairs with буду + infinitive.'
      - sentence: 'Ввечері ми ___ в кіно.'
        answer: 'ходили'
        options:
          - 'ходили'
          - 'ходимо'
          - 'будемо ходити'
        explanation: 'This line reports what happened in the evening.'
      - sentence: 'Зараз Олена ___ борщ і салат.'
        answer: 'замовляє'
        options:
          - 'замовляє'
          - 'замовляла'
          - 'буде замовляти'
        explanation: 'Зараз points to the present.'
      - sentence: 'Учора була гарна погода, і ми ___ в парку.'
        answer: 'гуляли'
        options:
          - 'гуляли'
          - 'гуляємо'
          - 'будемо гуляти'
        explanation: 'Учора була sets the past frame.'
      - sentence: 'Я вже ___ до рівня А2!'
        answer: 'готовий'
        options:
          - 'готовий'
          - 'коштує'
          - 'болить'
        explanation: 'Готовий до рівня А2 is the finale can-do line.'
  - id: act-2
    type: order
    title: Put the final day in order
    instruction: Arrange the events from morning to night.
    items:
      - 'Я прокинувся в готелі.'
      - 'Я снідав у кафе.'
      - 'Я їхав на метро в центр.'
      - 'Я купив сувенір.'
      - 'Я обідав з Оленою.'
      - 'Ми ходили в кіно.'
      - 'Ми вечеряли в ресторані.'
      - 'Я повернувся в готель.'
    correct_order: [0, 1, 2, 3, 4, 5, 6, 7]
  - id: act-3
    type: match-up
    title: Situation and phrase
    instruction: Match each everyday situation with the A1 phrase.
    pairs:
      - left: 'introducing yourself'
        right: 'Мене звати...'
      - left: 'asking for directions'
        right: 'Як дістатися до метро?'
      - left: 'ordering coffee'
        right: 'Каву з молоком, будь ласка.'
      - left: 'asking the price'
        right: 'Скільки коштує?'
      - left: 'repairing understanding'
        right: 'Повторіть, будь ласка.'
      - left: 'asking for help'
        right: 'Мені потрібна допомога.'
      - left: 'emergency situation'
        right: 'Допоможіть! Викличте швидку!'
      - left: 'at the pharmacy'
        right: 'Дайте, будь ласка, таблетки від головного болю.'
      - left: 'saying goodbye'
        right: 'Дякую! До побачення!'
  - id: act-4
    type: group-sort
    title: Sort your A1 toolkit
    instruction: Put each phrase into the right communication group.
    groups:
      - name: 'people'
        items:
          - 'Мене звати'
          - 'Я з Канади'
          - 'Це моя подруга'
      - name: 'city'
        items:
          - 'Де метро?'
          - 'Я на вулиці'
          - 'Як дістатися до центру?'
      - name: 'food and shopping'
        items:
          - 'Каву, будь ласка'
          - 'Скільки коштує?'
          - 'Я беру це'
      - name: 'time'
        items:
          - 'Учора я був'
          - 'Зараз я йду'
          - 'Завтра я буду читати'
workbook:
  - type: quiz
    title: Choose the A1 response
    instruction: Pick the response that fits the situation.
    items:
      - prompt: 'How do you ask about the price of a ticket?'
        options:
          - text: 'Скільки коштує квиток?'
            correct: true
          - text: 'Де тут квиток?'
            correct: false
          - text: 'Дайте один квиток.'
            correct: false
        explanation: 'Скільки коштує...? asks the price.'
      - prompt: 'You invite a friend to a cafe.'
        options:
          - text: 'Ходімо в кафе!'
            correct: true
          - text: 'Я був у кафе.'
            correct: false
          - text: 'Де кафе?'
            correct: false
        explanation: 'Ходімо... is the A1 invitation phrase.'
      - prompt: 'How do you say: My head hurts?'
        options:
          - text: 'У мене болить голова.'
            correct: true
          - text: 'У мене температура.'
            correct: false
          - text: 'Я хворий.'
            correct: false
        explanation: 'У мене болить голова is the practiced health phrase.'
      - prompt: "Someone asks: 'Де ви?'"
        options:
          - text: 'Я на вулиці Хрещатик.'
            correct: true
          - text: 'Мене звати Адам.'
            correct: false
          - text: 'Я з Канади.'
            correct: false
        explanation: 'Answer the location question with a place.'
      - prompt: "What time frame is in: 'Завтра я буду читати книгу'?"
        options:
          - text: 'Майбутній'
            correct: true
          - text: 'Минулий'
            correct: false
          - text: 'Теперішній'
            correct: false
        explanation: 'Завтра and буду читати mark the future.'
  - type: true-false
    title: A1 finale check
    instruction: Decide whether the line is clear A1 Ukrainian.
    items:
      - statement: 'Мене звати Сара. Я з Канади.'
        answer: true
        explanation: 'This is clear A1 identity language.'
      - statement: 'Вчора я снідаю у кафе.'
        answer: false
        explanation: 'Use past after Вчора: я снідав / снідала.'
      - statement: 'Зараз я їду на метро.'
        answer: true
        explanation: 'Зараз plus present їду is clear.'
      - statement: 'Завтра я буду читати українську.'
        answer: true
        explanation: 'Буду + infinitive is the A1 future.'
      - statement: "Моє ім'я є Адам."
        answer: false
        explanation: 'Use Мене звати Адам.'
  - type: unjumble
    title: Build final A1 lines
    instruction: Put the words in a natural order.
    items:
      - words: 'Учора/я/снідав/у/кафе.'
        answer: 'Учора я снідав у кафе.'
      - words: 'Зараз/я/їду/на/метро.'
        answer: 'Зараз я їду на метро.'
      - words: 'Завтра/я/буду/гуляти/в/парку.'
        answer: 'Завтра я буду гуляти в парку.'
      - words: 'Повторіть,/будь/ласка.'
        answer: 'Повторіть, будь ласка.'
  - type: fill-in
    title: Final story frame
    instruction: Choose the phrase that completes the ten-sentence story frame.
    items:
      - sentence: 'Мене ___.'
        answer: 'звати'
        options:
          - 'звати'
          - 'коштує'
          - 'болить'
        explanation: 'Мене звати introduces your name.'
      - sentence: 'Зранку я ___ у кафе.'
        answer: 'снідав'
        options:
          - 'снідав'
          - 'кафе'
          - 'буду'
        explanation: 'This is a past line in the story.'
      - sentence: 'Ввечері ми ___ в кіно.'
        answer: 'ходили'
        options:
          - 'ходили'
          - 'кіно'
          - 'сім'
        explanation: 'Ходили is the past plural form already practiced.'
      - sentence: 'Завтра я ___ повторювати українську.'
        answer: 'буду'
        options:
          - 'буду'
          - 'був'
          - 'є'
        explanation: 'Use буду + infinitive for a future plan.'
  - type: translate
    title: Finish A1
    instruction: Choose the Ukrainian phrase that matches the English prompt.
    items:
      - source: 'My name is Adam. I am from Canada.'
        options:
          - text: 'Мене звати Адам. Я з Канади.'
            correct: true
          - text: "Моє ім'я є Адам. Я маю Канада."
            correct: false
          - text: 'Адам коштує Канада.'
            correct: false
        explanation: 'Use Мене звати... and Я з...'
      - source: 'Yesterday I bought a souvenir.'
        options:
          - text: 'Учора я купив сувенір.'
            correct: true
          - text: 'Завтра я купив сувенір.'
            correct: false
          - text: 'Сувенір мене звати.'
            correct: false
        explanation: 'Учора points to the past.'
      - source: 'Tomorrow I will read Ukrainian.'
        options:
          - text: 'Завтра я буду читати українську.'
            correct: true
          - text: 'Учора я буду читати українську.'
            correct: false
          - text: 'Завтра я читав українську.'
            correct: false
        explanation: 'Use завтра + буду читати.'
  - type: error-correction
    title: Repair final A1 lines
    instruction: Fix the common finale mistake.
    items:
      - sentence: "Моє ім'я є Адам."
        error: "Моє ім'я є"
        correction: 'Мене звати'
        explanation: 'Use the A1 name phrase: Мене звати Адам.'
      - sentence: 'Вчора я снідаю у кафе.'
        error: 'снідаю'
        correction: 'снідав / снідала'
        explanation: 'Use a past form after учора / вчора.'
      - sentence: 'Завтра я гуляв у парку.'
        error: 'гуляв'
        correction: 'буду гуляти'
        explanation: 'Use буду + infinitive for tomorrow.'
      - sentence: 'Я буду читаю українську.'
        error: 'читаю'
        correction: 'читати'
        explanation: 'After буду, use the infinitive.'
      - sentence: 'Я маю Канада.'
        error: 'маю Канада'
        correction: 'з Канади'
        explanation: 'Use Я з Канади for country of origin.'
