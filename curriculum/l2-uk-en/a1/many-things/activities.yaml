---
inline:
  - id: act-1
    type: fill-in
    title: Один → багато
    instruction: Write the plural form.
    items:
      - sentence: стіл → ___
        answer: столи
        options:
          - столи
          - стіла
          - столі
        explanation: Learn the pair стіл - столи.
      - sentence: книга → ___
        answer: книги
        options:
          - книги
          - книгі
          - книга
        explanation: Книга becomes книги.
      - sentence: вікно → ___
        answer: вікна
        options:
          - вікна
          - вікни
          - вікні
        explanation: Many neuter nouns ending in -о use -а.
      - sentence: стілець → ___
        answer: стільці
        options:
          - стільці
          - стілеці
          - стільця
        explanation: Learn стілець - стільці as its own pair.
      - sentence: зошит → ___
        answer: зошити
        options:
          - зошити
          - зошита
          - зошиті
        explanation: Зошит becomes зошити.
      - sentence: ручка → ___
        answer: ручки
        options:
          - ручки
          - ручкі
          - ручка
        explanation: After к, write ручки.
      - sentence: сумка → ___
        answer: сумки
        options:
          - сумки
          - сумкі
          - сумка
        explanation: After к, write сумки.
      - sentence: лампа → ___
        answer: лампи
        options:
          - лампи
          - лампа
          - лампі
        explanation: Лампа becomes лампи.
      - sentence: крісло → ___
        answer: крісла
        options:
          - крісла
          - крісли
          - кріслі
        explanation: Крісло becomes крісла.
      - sentence: дзеркало → ___
        answer: дзеркала
        options:
          - дзеркала
          - дзеркали
          - дзеркалі
        explanation: Дзеркало becomes дзеркала.
  - id: act-2
    type: quiz
    title: Обери множину
    instruction: Choose the correct plural form.
    items:
      - prompt: стіл
        options:
          - text: столи
            correct: true
          - text: стола
            correct: false
          - text: столів
            correct: false
        explanation: The A1 pair is стіл - столи.
      - prompt: книга
        options:
          - text: книги
            correct: true
          - text: книгі
            correct: false
          - text: книга
            correct: false
        explanation: Книга becomes книги.
      - prompt: вікно
        options:
          - text: вікна
            correct: true
          - text: вікни
            correct: false
          - text: вікні
            correct: false
        explanation: Вікно becomes вікна.
      - prompt: стілець
        options:
          - text: стільці
            correct: true
          - text: стілеці
            correct: false
          - text: стільця
            correct: false
        explanation: Learn стілець - стільці as a pair.
      - prompt: телефон
        options:
          - text: телефони
            correct: true
          - text: телефона
            correct: false
          - text: телефонів
            correct: false
        explanation: Телефон becomes телефони in this nominative plural pattern.
      - prompt: зошит
        options:
          - text: зошити
            correct: true
          - text: зошита
            correct: false
          - text: зошитів
            correct: false
        explanation: Зошит becomes зошити.
      - prompt: ручка
        options:
          - text: ручки
            correct: true
          - text: ручкі
            correct: false
          - text: ручка
            correct: false
        explanation: The plural is ручки.
      - prompt: крісло
        options:
          - text: крісла
            correct: true
          - text: крісли
            correct: false
          - text: кріслі
            correct: false
        explanation: Крісло becomes крісла.
  - id: act-3
    type: fill-in
    title: Прикметник у множині
    instruction: Choose the ending that makes the adjective plural.
    items:
      - sentence: нов__ книги
        answer: і
        options:
          - і
          - а
          - ий
        explanation: Plural adjectives use -і.
      - sentence: велик__ столи
        answer: і
        options:
          - і
          - ий
          - е
        explanation: Великий becomes великі.
      - sentence: чист__ вікна
        answer: і
        options:
          - і
          - е
          - а
        explanation: Чисте becomes чисті.
      - sentence: син__ зошити
        answer: і
        options:
          - і
          - я
          - є
        explanation: Синій becomes сині.
      - sentence: червон__ ручки
        answer: і
        options:
          - і
          - а
          - ий
        explanation: Червона becomes червоні.
      - sentence: жовт__ лампи
        answer: і
        options:
          - і
          - а
          - е
        explanation: Жовта becomes жовті.
      - sentence: стар__ стільці
        answer: і
        options:
          - і
          - ий
          - а
        explanation: Старий becomes старі.
      - sentence: чорн__ сумки
        answer: і
        options:
          - і
          - а
          - е
        explanation: Чорна becomes чорні.
  - id: act-4
    type: group-sort
    title: Однина чи множина
    instruction: Sort each noun as one thing or many things.
    groups:
      - label: Однина
        items:
          - стіл
          - книга
          - вікно
          - стілець
          - лампа
          - крісло
      - label: Множина
        items:
          - столи
          - книги
          - вікна
          - стільці
          - лампи
          - крісла
workbook:
  - type: match-up
    title: Пари для пам'яті
    instruction: Match one thing with many things.
    pairs:
      - left: стіл
        right: столи
      - left: книга
        right: книги
      - left: вікно
        right: вікна
      - left: стілець
        right: стільці
      - left: телефон
        right: телефони
      - left: зошит
        right: зошити
      - left: сумка
        right: сумки
      - left: дзеркало
        right: дзеркала
  - type: quiz
    title: Ці, ті, мої, які
    instruction: Choose the plural helper.
    items:
      - prompt: These tables are big.
        options:
          - text: Ці столи великі.
            correct: true
          - text: Цей столи великі.
            correct: false
          - text: Ця столи великі.
            correct: false
        explanation: Use ці with plural nouns near you.
      - prompt: Those chairs are old.
        options:
          - text: Ті стільці старі.
            correct: true
          - text: Той стільці старі.
            correct: false
          - text: Та стільці старі.
            correct: false
        explanation: Use ті for plural nouns farther away.
      - prompt: My notebooks are blue.
        options:
          - text: Мої зошити сині.
            correct: true
          - text: Мій зошити сині.
            correct: false
          - text: Моя зошити сині.
            correct: false
        explanation: The plural form of my is мої.
      - prompt: Which pens?
        options:
          - text: Які ручки?
            correct: true
          - text: Яка ручки?
            correct: false
          - text: Який ручки?
            correct: false
        explanation: The plural question word is які.
      - prompt: These books are new.
        options:
          - text: Ці книги нові.
            correct: true
          - text: Це книги нове.
            correct: false
          - text: Ця книги нова.
            correct: false
        explanation: Use plural ці and plural нові.
      - prompt: Which bags are small?
        options:
          - text: Які сумки маленькі?
            correct: true
          - text: Яка сумки маленька?
            correct: false
          - text: Який сумки маленький?
            correct: false
        explanation: Use plural які with plural сумки.
  - type: fill-in
    title: Маленькі групи
    instruction: Choose the plural adjective ending.
    items:
      - sentence: ці велик__ столи
        answer: і
        options:
          - і
          - ий
          - а
        explanation: Великі describes plural столи.
      - sentence: ті стар__ стільці
        answer: і
        options:
          - і
          - ий
          - е
        explanation: Старі describes plural стільці.
      - sentence: мої син__ зошити
        answer: і
        options:
          - і
          - я
          - є
        explanation: Сині describes plural зошити.
      - sentence: ці чист__ вікна
        answer: і
        options:
          - і
          - е
          - а
        explanation: Чисті describes plural вікна.
      - sentence: ті жовт__ лампи
        answer: і
        options:
          - і
          - а
          - е
        explanation: Жовті describes plural лампи.
      - sentence: мої чорн__ сумки
        answer: і
        options:
          - і
          - а
          - е
        explanation: Чорні describes plural сумки.
