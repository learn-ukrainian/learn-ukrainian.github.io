- id: act-1
  type: quiz
  title: Хто чи що?
  instruction: Choose whether the word answers хто? or що?
  items:
    - prompt: "учитель"
      options:
        - text: "хто?"
          correct: true
        - text: "що?"
          correct: false
      explanation: "A teacher is a person."
    - prompt: "директор"
      options:
        - text: "хто?"
          correct: true
        - text: "що?"
          correct: false
      explanation: "A director is a person."
    - prompt: "тато"
      options:
        - text: "хто?"
          correct: true
        - text: "що?"
          correct: false
      explanation: "Тато is a person."
    - prompt: "кіт"
      options:
        - text: "хто?"
          correct: true
        - text: "що?"
          correct: false
      explanation: "Animals answer хто? in this grammar contrast."
    - prompt: "дерево"
      options:
        - text: "що?"
          correct: true
        - text: "хто?"
          correct: false
      explanation: "Plants are граматичні неістоти in Ukrainian."
    - prompt: "хліб"
      options:
        - text: "що?"
          correct: true
        - text: "хто?"
          correct: false
      explanation: "Хліб is a thing."
    - prompt: "книга"
      options:
        - text: "що?"
          correct: true
        - text: "хто?"
          correct: false
      explanation: "Книга is a thing."
    - prompt: "подруга"
      options:
        - text: "хто?"
          correct: true
        - text: "що?"
          correct: false
      explanation: "Подруга is a person."
- id: act-2
  type: fill-in
  title: Я бачу...
  instruction: Choose the object form that completes the sentence.
  items:
    - sentence: "Я бачу ___."
      answer: "маму"
      options:
        - "маму"
        - "мама"
        - "мами"
      explanation: "Мама becomes маму."
    - sentence: "Я бачу ___."
      answer: "брата"
      options:
        - "брата"
        - "брат"
        - "брату"
      explanation: "A male person changes: брат -> брата."
    - sentence: "Я знаю ___."
      answer: "Олену"
      options:
        - "Олену"
        - "Олена"
        - "Олени"
      explanation: "Олена becomes Олену."
    - sentence: "Я знаю ___."
      answer: "друга"
      options:
        - "друга"
        - "друг"
        - "другу"
      explanation: "Друг becomes друга."
    - sentence: "Я люблю ___."
      answer: "тата"
      options:
        - "тата"
        - "тато"
        - "таті"
      explanation: "Тато becomes тата."
    - sentence: "Я чекаю ___."
      answer: "вчителя"
      options:
        - "вчителя"
        - "вчитель"
        - "вчителю"
      explanation: "Вчитель becomes вчителя."
    - sentence: "Я шукаю ___."
      answer: "подругу"
      options:
        - "подругу"
        - "подруга"
        - "подруги"
      explanation: "Подруга becomes подругу."
    - sentence: "Я бачу ___."
      answer: "сусіда"
      options:
        - "сусіда"
        - "сусід"
        - "сусіду"
      explanation: "Сусід becomes сусіда."
    - sentence: "Я чекаю ___."
      answer: "лікаря"
      options:
        - "лікаря"
        - "лікар"
        - "лікарю"
      explanation: "Лікар becomes лікаря."
    - sentence: "Я знаю ___."
      answer: "сестру"
      options:
        - "сестру"
        - "сестра"
        - "сестри"
      explanation: "Сестра becomes сестру."
- id: act-3
  type: group-sort
  title: Кого or що shelves
  instruction: Sort the object forms by the question they answer.
  groups:
    - name: "Істоти: кого?"
      items:
        - "брата"
        - "маму"
        - "друга"
        - "лікаря"
        - "Олену"
        - "сусіда"
    - name: "Неістоти: що?"
      items:
        - "хліб"
        - "каву"
        - "воду"
        - "чай"
        - "борщ"
        - "дерево"
- id: act-4
  type: match-up
  title: Dictionary form to object form
  instruction: Match the dictionary form with the direct-object form.
  pairs:
    - left: "мама"
      right: "маму"
    - left: "Олена"
