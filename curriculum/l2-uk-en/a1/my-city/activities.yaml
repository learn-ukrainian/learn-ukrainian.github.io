inline:
  - id: act-1
    type: match-up
    title: Place to action
    instruction: Match each city place with a natural A1 action.
    pairs:
      - left: 'аптека'
        right: 'купувати ліки'
      - left: 'бібліотека'
        right: 'читати книжку'
      - left: 'магазин'
        right: 'купувати хліб'
      - left: 'ресторан'
        right: 'вечеряти'
      - left: 'готель'
        right: 'спати'
      - left: 'вокзал'
        right: 'чекати поїзд'
      - left: 'музей'
        right: 'дивитися картини'
      - left: 'стадіон'
        right: 'дивитися матч'
  - id: act-2
    type: quiz
    title: В or на in the city
    instruction: Choose the correct city chunk.
    items:
      - prompt: 'Where do you buy medicine?'
        options:
          - text: 'в аптеці'
            correct: true
          - text: 'на аптеці'
            correct: false
          - text: 'в аптека'
            correct: false
        explanation: 'Аптека is a contained place: в аптеці.'
      - prompt: 'Where are you at the post office?'
        options:
          - text: 'на пошті'
            correct: true
          - text: 'у пошті'
            correct: false
          - text: 'на пошта'
            correct: false
        explanation: The common chunk is на пошті.
      - prompt: 'Where is the train station sentence?'
        options:
          - text: 'Вона на вокзалі.'
            correct: true
          - text: 'Вона у вокзалі.'
            correct: false
          - text: 'Вона вокзал.'
            correct: false
        explanation: Learn вокзал with на вокзалі.
      - prompt: 'Where do students read?'
        options:
          - text: 'у бібліотеці'
            correct: true
          - text: 'на бібліотеці'
            correct: false
          - text: 'у бібліотека'
            correct: false
        explanation: Бібліотека changes to бібліотеці.
      - prompt: 'Where is someone in the hospital?'
        options:
          - text: 'у лікарні'
            correct: true
          - text: 'на лікарні'
            correct: false
          - text: 'у лікарня'
            correct: false
        explanation: Лікарня changes to лікарні.
      - prompt: 'Where do you buy bread?'
        options:
          - text: 'у магазині'
            correct: true
          - text: 'на магазині'
            correct: false
          - text: 'у магазин'
            correct: false
        explanation: Магазин uses the location chunk у магазині.
      - prompt: 'Where does a tourist sleep?'
        options:
          - text: 'у готелі'
            correct: true
          - text: 'на готелі'
            correct: false
          - text: 'у готель'
            correct: false
        explanation: Готель changes to готелі.
      - prompt: 'Where is the match?'
        options:
          - text: 'на стадіоні'
            correct: true
          - text: 'у стадіоні'
            correct: false
          - text: 'на стадіон'
            correct: false
        explanation: Learn стадіон with на стадіоні.
  - id: act-3
    type: fill-in
    title: У моєму місті є
    instruction: Complete each city sentence.
    items:
      - sentence: 'У моєму місті є великий ___.'
        answer: 'парк'
        explanation: 'After є, name the object: парк.'
      - sentence: 'Бібліотека ___ університету.'
        answer: 'біля'
        explanation: Біля connects two places.
      - sentence: 'Аптека ___ розі.'
        answer: 'на'
        explanation: The chunk is на розі.
      - sentence: 'Магазин тут, ___ дому.'
        answer: 'біля'
        explanation: Біля дому is a fixed A1 chunk.
      - sentence: 'Школа далеко, ___ центрі міста.'
        answer: 'у'
        explanation: Use у центрі міста.
      - sentence: 'У місті ___ багато парків.'
        answer: 'є'
        explanation: Use є for existence.
  - id: act-4
    type: quiz
    title: Куди б ви пішли?
    instruction: Choose the city place. Direction endings come in the next module.
    items:
      - prompt: 'You need medicine. Which place?'
        options:
          - text: 'аптека'
            correct: true
          - text: 'музей'
            correct: false
          - text: 'стадіон'
            correct: false
        explanation: Medicine is connected with аптека.
      - prompt: 'You want to read a book quietly. Which place?'
        options:
          - text: 'бібліотека'
            correct: true
          - text: 'вокзал'
            correct: false
          - text: 'банк'
            correct: false
        explanation: Reading books fits бібліотека.
      - prompt: 'You need bread for dinner. Which place?'
        options:
          - text: 'магазин'
            correct: true
          - text: 'театр'
            correct: false
          - text: 'церква'
            correct: false
        explanation: Food shopping fits магазин.
      - prompt: 'You want dinner with friends. Which place?'
        options:
          - text: 'ресторан'
            correct: true
          - text: 'пошта'
            correct: false
          - text: 'лікарня'
            correct: false
        explanation: Dinner with friends fits ресторан.
      - prompt: 'You are waiting for a train. Which place?'
        options:
          - text: 'вокзал'
            correct: true
          - text: 'готель'
            correct: false
          - text: 'університет'
            correct: false
        explanation: A train connects with вокзал.
      - prompt: 'You are a tourist and need a room. Which place?'
        options:
          - text: 'готель'
            correct: true
          - text: 'кафе'
            correct: false
          - text: 'стадіон'
            correct: false
        explanation: A tourist room connects with готель.
workbook:
  - type: group-sort
    title: City shelves
    instruction: Sort the city words by use.
    groups:
      - name: 'Places'
        items:
          - 'аптека'
          - 'бібліотека'
          - 'музей'
          - 'готель'
      - name: 'Location words'
        items:
          - 'тут'
          - 'там'
          - 'далеко'
          - 'близько'
      - name: 'Near-place chunks'
        items:
          - 'біля дому'
          - 'біля парку'
          - 'поруч із площею'
          - 'далеко від дому'
  - type: order
    title: Mini-map note
    instruction: Put the city note in a natural order.
    is_ukrainian: true
    items:
      - 'У моєму місті є парк.'
      - 'Біля парку є бібліотека.'
      - 'Аптека на розі.'
      - 'Магазин тут, біля дому.'
      - 'Вокзал далеко.'
      - 'Музей у центрі міста.'
    correct_order: [0, 1, 2, 3, 4, 5]
  - type: true-false
    title: City language guardrails
    instruction: Decide whether the statement fits the lesson.
    items:
      - statement: "Use Київ and Kyiv for Ukraine's capital."
        answer: true
        explanation: Kyiv is the Ukrainian English form.
      - statement: 'Площа is the Ukrainian word for square.'
        answer: true
        explanation: Use площа for a city square.
      - statement: 'У місті має багато парків is the best A1 model.'
        answer: false
        explanation: Say У місті є багато парків.
      - statement: 'Біля парку is a useful near-place chunk.'
        answer: true
        explanation: Біля takes a changed place form.
      - statement: 'На вулиці Шевченка is a correct street-location chunk.'
        answer: true
        explanation: Streets use на вулиці.
  - type: error-correction
    title: Repair city interference
    instruction: Choose the natural Ukrainian city sentence.
    items:
      - sentence: 'Я живу в вулиці Шевченка.'
        error: 'в вулиці'
        correction: 'Я живу на вулиці Шевченка.'
        options:
          - 'Я живу на вулиці Шевченка.'
          - 'Я живу в вулиці Шевченка.'
          - 'Я живу до вулиці Шевченка.'
        explanation: Use на вулиці for street location.
      - sentence: 'Моє місто є Київ.'
        error: 'є Київ'
        correction: 'Моє місто — Київ.'
        options:
          - 'Моє місто — Київ.'
          - 'Моє місто є Київ.'
          - 'Моє місто на Київ.'
        explanation: Ukrainian can identify the city without є.
      - sentence: 'Я в аптека.'
        error: 'аптека'
        correction: 'Я в аптеці.'
        options:
          - 'Я в аптеці.'
          - 'Я в аптека.'
          - 'Я на аптеці.'
        explanation: For location, аптека changes to аптеці.
      - sentence: 'Магазин біля парк.'
        error: 'біля парк'
        correction: 'Магазин біля парку.'
        options:
          - 'Магазин біля парку.'
          - 'Магазин біля парк.'
          - 'Магазин на парк.'
        explanation: Біля takes the changed form парку.
      - sentence: 'У місті має багато парків.'
        error: 'має'
        correction: 'У місті є багато парків.'
        options:
          - 'У місті є багато парків.'
          - 'У місті має багато парків.'
          - 'Місто є багато парків.'
        explanation: Use є for existence in a place.
