inline:
  - id: act-1
    type: fill-in
    title: Address plus request
    instruction: Choose the form that completes the checkpoint sentence.
    items:
      - sentence: '___, принеси листівки, будь ласка.'
        answer: 'Маріє'
        options:
          - 'Маріє'
          - 'Марія'
          - 'Марію'
        explanation: 'Use the calling form Маріє.'
      - sentence: '___, постав стіл біля вікна.'
        answer: 'Тарасе'
        options:
          - 'Тарасе'
          - 'Тарас'
          - 'Тарасу'
        explanation: 'Use the calling form Тарасе.'
      - sentence: 'Олено, ___ привітання.'
        answer: 'напиши'
        options:
          - 'напиши'
          - 'писати'
          - 'пише'
        explanation: 'Use the ти command напиши.'
      - sentence: 'Друже, ___ мені, будь ласка.'
        answer: 'допоможи'
        options:
          - 'допоможи'
          - 'допомагати'
          - 'допомагає'
        explanation: 'Use the request form допоможи.'
      - sentence: 'Пані Оксано, ___ маркер, будь ласка.'
        answer: 'дайте'
        options:
          - 'дайте'
          - 'дай'
          - 'дати'
        explanation: 'Use the polite ви form дайте.'
      - sentence: 'Друзі, ___ сюди.'
        answer: 'заходьте'
        options:
          - 'заходьте'
          - 'заходити'
          - 'заходить'
        explanation: 'Use the plural/polite command заходьте.'
  - id: act-2
    type: quiz
    title: Which connector?
    instruction: Choose the connector that fits the checkpoint sentence.
    items:
      - prompt: 'Ми пишемо листівки ___ вітаємо друзів.'
        options:
          - text: 'і'
            correct: true
          - text: 'але'
            correct: false
          - text: 'коли'
            correct: false
        explanation: 'Use і to add another action.'
      - prompt: 'Я хочу допомогти, ___ я зайнятий.'
        options:
          - text: 'але'
            correct: true
          - text: 'і'
            correct: false
          - text: 'де'
            correct: false
        explanation: 'Use але for contrast.'
      - prompt: 'Тарас ставить стіл, ___ людей багато.'
        options:
          - text: 'бо'
            correct: true
          - text: 'а'
            correct: false
          - text: 'що'
            correct: false
        explanation: 'Use бо for a reason.'
      - prompt: 'Марія пише, ___ Тарас ставить стіл.'
        options:
          - text: 'а'
            correct: true
          - text: 'коли'
            correct: false
          - text: 'або'
            correct: false
        explanation: 'Use а to compare two people or actions.'
      - prompt: 'Я беру маркер, ___ пишу листівку.'
        options:
          - text: 'тому що'
            correct: true
          - text: 'чи'
            correct: false
          - text: 'де'
            correct: false
        explanation: 'Use тому що for a reason.'
  - id: act-3
    type: fill-in
    title: Що, де, коли review
    instruction: Complete each short detail frame.
    items:
      - sentence: 'Я знаю, ___ маркери.'
        answer: 'де'
        options:
          - 'де'
          - 'що'
          - 'коли'
        explanation: 'Use де for a place.'
      - sentence: 'Я думаю, ___ все готово.'
        answer: 'що'
        options:
          - 'що'
          - 'де'
          - 'коли'
        explanation: 'Use що for a fact.'
      - sentence: 'Скажи, ___ зустріч.'
        answer: 'коли'
        options:
          - 'коли'
          - 'де'
          - 'що'
        explanation: 'Use коли for a time.'
      - sentence: 'Вона знає, ___ стіл.'
        answer: 'де'
        options:
          - 'де'
          - 'куди'
          - 'що'
        explanation: 'A static place uses де.'
      - sentence: 'Я не знаю, ___ писати.'
        answer: 'що'
        options:
          - 'що'
          - 'де'
          - 'коли'
        explanation: 'Use що for what to write.'
      - sentence: 'Скажіть, ___ ви вільні.'
        answer: 'коли'
        options:
          - 'коли'
          - 'де'
          - 'що'
        explanation: 'Use коли for time.'
  - id: act-4
    type: match-up
    title: Holiday greetings review
    instruction: Match the holiday phrase to its English meaning.
    pairs:
      - left: 'З Новим роком!'
        right: 'Happy New Year!'
      - left: 'З Різдвом Христовим!'
        right: 'Merry Christmas!'
      - left: 'З Великоднем!'
        right: 'Happy Easter!'
      - left: 'З Днем Незалежності України!'
        right: 'Happy Independence Day of Ukraine!'
      - left: "Бажаю здоров'я."
        right: 'I wish you health.'
      - left: 'Веселих свят!'
        right: 'Happy holidays!'
workbook:
  - type: unjumble
    title: Build checkpoint sentences
    instruction: Put the words in a natural order.
    items:
      - words: ['Олено', 'принеси', 'листівки', 'будь', 'ласка']
        answer: 'Олено, принеси листівки, будь ласка.'
      - words: ['Я', 'знаю', 'де', 'маркери']
        answer: 'Я знаю, де маркери.'
      - words: ['Я', 'хочу', 'допомогти', 'але', 'я', 'зайнятий']
        answer: 'Я хочу допомогти, але я зайнятий.'
      - words: ['Тарасе', 'постав', 'стіл']
        answer: 'Тарасе, постав стіл.'
      - words: ['Ми', 'пишемо', 'листівки', 'і', 'вітаємо', 'друзів']
        answer: 'Ми пишемо листівки і вітаємо друзів.'
      - words: ['Вітаю', 'з', 'Новим', 'роком']
        answer: 'Вітаю з Новим роком!'
  - type: group-sort
    title: Which module does it review?
    instruction: Sort each item by the A1.7 module it reviews.
    groups:
      - name: 'M42 calling'
        items:
          - 'Олено!'
          - 'Тарасе!'
          - 'Друже!'
      - name: 'M43 requests'
        items:
          - 'принеси'
          - 'постав'
          - 'дайте'
      - name: 'M44 connectors'
        items:
          - 'і'
          - 'але'
          - 'бо'
      - name: 'M45 details'
        items:
          - 'що'
          - 'де'
          - 'коли'
      - name: 'M46 holidays'
        items:
          - 'З Новим роком!'
          - 'З Великоднем!'
          - 'День Незалежності України'
  - type: true-false
    title: Checkpoint readiness
    instruction: Decide whether each statement is ready for this checkpoint.
    items:
      - statement: 'Олено, допоможи, будь ласка is a good address plus request.'
        answer: true
        explanation: 'It uses the calling form and a polite request.'
      - statement: 'Тарас, постав стіл is the best way to address Taras.'
        answer: false
        explanation: 'Use Тарасе when calling him.'
      - statement: 'Я знаю, де маркери has the comma before де.'
        answer: true
        explanation: 'That is the M45 comma habit.'
      - statement: 'Я хочу допомогти але я зайнятий needs no comma.'
        answer: false
        explanation: 'Add the comma before але.'
      - statement: 'З Новим роком is a fixed greeting phrase.'
        answer: true
        explanation: 'This reviews M46.'
      - statement: 'This checkpoint introduces new grammar.'
        answer: false
        explanation: 'It only integrates M42-M46.'
      - statement: 'Будь ласка can soften a request.'
        answer: true
        explanation: 'It keeps the tone polite.'
      - statement: 'Що, де, коли should stay in short A1 frames here.'
        answer: true
        explanation: 'Short details are the target.'
  - type: match-up
    title: Tool to checkpoint skill
    instruction: Match each ready phrase to the A1.7 skill it proves.
    pairs:
      - left: 'Маріє, принеси листівки.'
        right: 'calling form plus request'
      - left: 'Я хочу допомогти, але я зайнятий.'
        right: 'contrast connector'
      - left: 'Я знаю, де маркери.'
        right: 'short place detail'
      - left: 'Пишемо коротко, бо часу мало.'
        right: 'reason connector'
      - left: 'З Різдвом Христовим!'
        right: 'holiday greeting'
      - left: 'Друзі, заходьте.'
        right: 'group address plus command'
  - type: fill-in
    title: Holiday table mini-dialogue
    instruction: Choose the checkpoint word that completes each line.
    items:
      - sentence: 'Олено, ___ листівки, будь ласка.'
        answer: 'принеси'
        options:
          - 'принеси'
          - 'приносити'
          - 'приносить'
        explanation: 'Use the command form принеси.'
      - sentence: 'Тарасе, постав столи, ___ людей багато.'
        answer: 'бо'
        options:
          - 'бо'
          - 'де'
          - 'а'
        explanation: 'Use бо for a reason.'
      - sentence: 'Я думаю, ___ все готово.'
        answer: 'що'
        options:
          - 'що'
          - 'коли'
          - 'але'
        explanation: 'Use що for a fact.'
      - sentence: 'Марія пише привітання, ___ Тарас ставить стіл.'
        answer: 'а'
        options:
          - 'а'
          - 'що'
          - 'де'
        explanation: 'Use а to compare two actions.'
      - sentence: 'Скажіть, ___ ви вільні.'
        answer: 'коли'
        options:
          - 'коли'
          - 'бо'
          - 'але'
        explanation: 'Use коли for time.'
      - sentence: '___ Новим роком!'
        answer: 'З'
        options:
          - 'З'
          - 'На'
          - 'У'
        explanation: 'Use the fixed greeting З Новим роком.'
  - type: error-correction
    title: Repair the checkpoint
    instruction: Correct the A1.7 communication mistake.
    items:
      - sentence: 'Олена, принеси листівки.'
        error: 'Олена'
        correction: 'Олено'
        explanation: 'Use the calling form when speaking to Olena.'
      - sentence: 'Тарас, постав стіл.'
        error: 'Тарас'
        correction: 'Тарасе'
        explanation: 'Use the calling form Тарасе.'
      - sentence: 'Я знаю де маркери.'
        error: 'знаю де'
        correction: 'знаю, де'
        explanation: 'Add the comma before де.'
      - sentence: 'Я хочу допомогти але я зайнятий.'
        error: 'допомогти але'
        correction: 'допомогти, але'
        explanation: 'Add the comma before але.'
      - sentence: 'Вітаю з Новий рік!'
        error: 'Новий рік'
        correction: 'Новим роком'
        explanation: 'Use the fixed greeting form.'
      - sentence: 'Маріє, принести маркери.'
        error: 'принести'
        correction: 'принеси'
        explanation: 'Use the command form принеси.'
      - sentence: 'Я думаю що все готово.'
        error: 'думаю що'
        correction: 'думаю, що'
        explanation: 'Add the comma before що.'
      - sentence: 'Ми святкуємо на Різдво.'
        error: 'святкуємо на Різдво'
        correction: 'святкуємо Різдво'
        explanation: 'Use святкувати + holiday name.'
