content_outline:
- section: "Огляд (Overview)"
  words: 100
  points:
  - "TTT structure: Test, Teach, Test"
  - "Scope: Accusative, Locative, Genitive + prepositions + agreement"
- section: "Навичка 1: Відмінки (Skill 1: Cases)"
  words: 250
  points:
  - "Accusative: Кого? Що? — direct object, feminine -а→-у, animate masc = Gen"
  - "Locative: Де? — location after в/у, на"
  - "Genitive: немає + Gen for absence"
  - "Combined café scenario using all three cases"
- section: "Навичка 2: Прийменники (Skill 2: Prepositions)"
  words: 200
  points:
  - "Direction (Куди?) → Accusative vs Location (Де?) → Locative"
  - "Additional Accusative prepositions: за, через, про"
- section: "Навичка 3: Узгодження (Skill 3: Agreement)"
  words: 250
  points:
  - "Adjective agreement in Accusative and Locative"
  - "Pronoun declension: я/ти/він across cases"
  - "The н-prefix on pronouns after prepositions"
- section: "Інтеграційне завдання (Integration Task)"
  words: 150
  points:
  - "Navigation dialogue combining all three cases"
  - "Self-assessment guidance"
- section: "Підсумок"
  words: 50
  points:
  - "Self-check questions"
  - "Readiness assessment for A1.4"
