slug: checkpoint-cases
title: 'Checkpoint: Cases'
word_target: 2000
content_outline:
- section: Огляд (Overview)
  words: 300
  points:
  - 'Вступна частина: англійською пояснити концепцію перевірки знань (шпаргалка).
    Зазначити, що рівень занурення (immersion) становить 35-40%, тому складні інструкції
    та пояснення подаються англійською мовою.'
  - 'Описати мету: інтеграція Знахідного, Місцевого та Родового (тільки з конструкцією
    ''немає'') відмінків у практичних комунікативних ситуаціях.'
- section: 'Навичка 1: Відмінки (Skill 1: Cases)'
  words: 500
  points:
  - Створити контрастну таблицю Знахідного (дія/напрямок) та Місцевого (місцезнаходження)
    відмінків із чіткими питаннями (Кого? Що? Куди? vs Де?).
  - Пояснити правило 'немає + Родовий відмінок' (Чого? Кого немає?) із 4-5 типовими
    прикладами з щоденного життя.
  - Надати 5+ прикладів контрасту живих та неживих іменників у Знахідному відмінку
    для чоловічого роду.
- section: 'Навичка 2: Прийменники (Skill 2: Prepositions)'
  words: 400
  points:
  - Чітко розмежувати прийменники 'в/у/на' для напрямку руху (Знахідний відмінок)
    та для перебування (Місцевий відмінок).
  - 'Надати приклади використання інших прийменників зі Знахідним відмінком: ''за'',
    ''через'', ''про'' (наприклад, ''думати про місто'', ''йти через парк'').'
  - Додати міні-діалог (4-6 реплік), що ілюструє переміщення (куди?) і подальше перебування
    (де?).
- section: 'Навичка 3: Узгодження (Skill 3: Agreement)'
  words: 400
  points:
  - Показати парадигму прикметників 'новий' та 'великий' у Знахідному та Місцевому
    відмінках (усі роди).
  - Пояснити правило додавання префікса 'н-' для займенників після прийменників (у
    нього, біля неї, на ньому) із 3-4 прикладами.
  - Надати ланцюжки узгодження (прийменник + прикметник + іменник) для відпрацювання
    правильної форми у контексті.
- section: Інтеграційне завдання (Integration Task)
  words: 400
  points:
  - 'Створити навігаційний текст-сценарій (близько 150 слів): прогулянка містом, пошук
    кафе, зустріч із другом, що містить усі вивчені відмінки.'
  - Надати 3-4 приклади опису маршруту українською мовою з детальним розбором використаних
    відмінків.
  - 'Додати чек-лист для самооцінки відмінкової компетенції: виявлення найслабших
    місць (чи відрізняє студент ''де'' від ''куди'') перед переходом до наступного
    модуля.'
