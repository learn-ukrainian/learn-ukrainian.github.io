slug: checkpoint-cases
title: 'Checkpoint: Cases'
word_target: 2000
content_outline:
- section: Огляд (Overview)
  words: 300
  points:
  - 'Вступна частина англійською мовою (scaffolding): пояснення мети контрольної точки
    (checkpoint) та очікувань від студента.'
  - 'Огляд трьох відмінків: Знахідний (Accusative), Місцевий (Locative) та Родовий
    (Genitive - тільки конструкція ''немає'').'
  - 'Встановлення контексту модуля: практична навігація містом, опис місцезнаходження
    та переміщення.'
- section: 'Навичка 1: Відмінки (Skill 1: Cases)'
  words: 500
  points:
  - 'Знахідний відмінок (Accusative): H3 для неживих об''єктів (іменники чоловічого/середнього
    роду не змінюються, жіночого закінчуються на -у/-ю) та H3 для живих об''єктів
    (чоловічий рід отримує закінчення Родового відмінка).'
  - 'Місцевий відмінок (Locative): H3 для пояснення місця дії з питанням ''Де?'' (у/в/на
    + Місцевий).'
  - 'Родовий відмінок (Genitive): H3 для конструкції відсутності ''немає'' + Родовий
    відмінок (Кого? Чого немає?) із типовими прикладами (немає кави, немає часу).'
- section: 'Навичка 2: Прийменники (Skill 2: Prepositions)'
  words: 400
  points:
  - 'Контраст просторових прийменників (H3): чітке розмежування ''в/у/на'' + Знахідний
    (напрямок руху, Куди?) проти ''в/у/на'' + Місцевий (місцезнаходження, Де?).'
  - 'Інші прийменники зі Знахідним відмінком (H3): ''через'' (через парк), ''за''
    (дякую за), ''про'' (думати про) із 4-5 чіткими прикладами.'
  - Зведена таблиця використання прийменників та відповідних відмінків.
- section: 'Навичка 3: Узгодження (Skill 3: Agreement)'
  words: 400
  points:
  - 'Узгодження прикметників (H3): парадигма для слів ''новий'', ''великий'', ''маленький'',
    ''красивий'' у Знахідному та Місцевому відмінках для всіх родів.'
  - 'Відмінювання займенників (H3): мене/тобі/його та правило обов''язкової появи
    префікса ''н-'' після прийменників (у нього, для неї, біля них).'
  - 'Приклади ланцюжків узгодження (H3): практика об''єднання прийменника, прикметника
    та іменника (''у великому місті'', ''через новий парк'').'
- section: Інтеграційне завдання (Integration Task)
  words: 400
  points:
  - 'Навігаційний сценарій (H3): короткий текст-діалог (прогулянка, пошук кафе, зустріч),
    що природно поєднує усі вивчені відмінки.'
  - 'Аналіз тексту (H3): розбір використаних у тексті відмінкових форм із поясненням,
    чому обрано саме цей відмінок.'
  - 'Чек-лист для самооцінки (H3): питання англійською мовою для перевірки впевненості
    у використанні відмінків перед переходом до наступного етапу курсу (A1.4).'
