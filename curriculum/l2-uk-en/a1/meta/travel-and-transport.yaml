slug: travel-and-transport
title: Travel and Transport
word_target: 1200
content_outline:
- section: Транспорт (Transport types)
  slug: transport-types
  words: 250
  points:
  - Introduce city public transport vocabulary (автобус, тролейбус, маршрутка, трамвай,
    метро). Emphasize that 'метро' and 'таксі' are indeclinable.
  - Introduce long-distance transport (потяг, літак) and discuss choosing transport
    for different distances.
- section: Вокзал та аеропорт (Station and airport)
  slug: station-and-airport
  words: 275
  points:
  - 'Define and distinguish transport hubs: залізничний вокзал, автовокзал, аеропорт.'
  - 'Introduce key locations inside the station: каса, зал очікування, платформа.'
  - Teach essential navigation phrases (Де вокзал?, Звідки відправляється потяг?,
    О котрій годині?) and ticket basics (купити квиток).
- section: Напрямки (Directions)
  slug: directions
  words: 250
  points:
  - 'Introduce basic direction vocabulary: наліво, направо, прямо, назад, and ordinal
    turns (перший поворот, другий поворот).'
  - 'Practice A1 2nd-person imperative forms for giving directions: Поверніть наліво,
    Ідіть прямо.'
  - Teach how to ask for directions using 'Як дістатися до...?' (+ Genitive) and 'Скажіть,
    будь ласка, де...?'
- section: Подорожі (Journeys)
  slug: journeys
  words: 250
  points:
  - Explain how to state a destination using 'до' + Genitive (Я їду до Львова).
  - Introduce the Instrumental case as a lexical chunk for means of transport (потягом,
    автобусом, літаком).
  - 'Teach phrases for journey duration: Скільки часу їхати? Я їду 3 години.'
- section: Практика (Practice)
  slug: practice
  words: 175
  points:
  - Provide a direction-giving dialogue combining imperative forms and direction words.
  - Provide a journey description narrative or dialogue covering destination, duration,
    and means of transport.
  - Include 3-4 simple self-check comprehension questions in Ukrainian to verify understanding.
