slug: travel-and-transport
title: Travel and Transport
word_target: 2000
content_outline:
- section: Транспорт
  words: 400
  points:
  - 'H3: Міський транспорт (City Transport). Introduce public transport: автобус,
    тролейбус, маршрутка, трамвай, метро. Note that ''метро'' and ''таксі'' are indeclinable
    (they do not change their endings).'
  - 'H3: Міжміський транспорт (Long-distance Transport). Introduce потяг, літак, таксі.
    Briefly contrast public and private transport choices.'
  - Include a simple vocabulary table for all transport types with IPA and translation.
    Ensure English scaffolding sets the context for these terms.
- section: Вокзал та аеропорт
  words: 500
  points:
  - 'H3: Транспортні вузли (Transport Hubs). Define and differentiate залізничний
    вокзал, автовокзал, аеропорт.'
  - 'H3: Усередині (Inside). Introduce key locations within stations: каса, зал очікування,
    платформа.'
  - 'H3: Корисні фрази (Essential Phrases). Teach functional questions: Де вокзал?,
    Звідки відправляється потяг?, О котрій годині?'
  - 'H3: Квитки (Tickets). Introduce vocabulary: квиток, купити квиток, у один бік,
    туди й назад. Provide short sentence examples.'
- section: Напрямки
  words: 400
  points:
  - 'H3: Вказівники (Directions). Introduce direction adverbs: наліво, направо, прямо,
    назад. Add ordinal turns: перший поворот, другий поворот.'
  - 'H3: Наказовий спосіб (Imperative Commands). Explain in English how to form simple
    A1 commands for giving directions: Поверніть наліво, Ідіть прямо.'
  - 'H3: Як запитати (How to Ask). Teach the structures: Як дістатися до...? (+ Genitive)
    and Скажіть, будь ласка, де...? with clear examples.'
- section: Подорожі
  words: 400
  points:
  - 'H3: Куди ми їдемо? (Where are we going?). Review ''Я їду до...'' with the Genitive
    case for destinations (e.g., до Львова, до Києва).'
  - 'H3: Чим ми їдемо? (How are we traveling?). Crucial grammar point: explain the
    use of the Instrumental case for means of transport without prepositions (потягом,
    автобусом, літаком). Contrast with incorrect literal translations.'
  - 'H3: Тривалість (Duration). Teach how to express time spent traveling: Скільки
    часу їхати?, Я їду 3 години.'
- section: Практика
  words: 300
  points:
  - 'H3: Діалог 1: На вулиці (Dialogue 1: On the street). A short, natural conversation
    asking for and giving directions to the train station.'
  - 'H3: Діалог 2: Наша подорож (Dialogue 2: Our journey). A short description of
    a planned trip using destination (Genitive), transport type (Instrumental), and
    duration.'
  - Include a mini-quiz or reflection questions at the end of the dialogues to check
    comprehension.
