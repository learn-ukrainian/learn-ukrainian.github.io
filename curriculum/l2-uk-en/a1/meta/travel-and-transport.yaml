slug: travel-and-transport
title: Travel and Transport
word_target: 2000
content_outline:
- section: Транспорт
  words: 400
  points:
  - 'H3: Міський транспорт. Introduce city transport with clear English scaffolding:
    автобус, тролейбус, маршрутка, трамвай, метро. Explain that ''метро'' and ''таксі''
    are indeclinable neuter nouns.'
  - 'H3: Міжміський транспорт. Introduce long-distance options: потяг, літак. Include
    a note on the cultural dominance of trains for intercity travel in Ukraine.'
  - Provide a structured vocabulary table with English translations and IPA for the
    first occurrence of each transport term.
- section: Вокзал та аеропорт
  words: 400
  points:
  - 'H3: Транспортні вузли. Define and distinguish залізничний вокзал, автовокзал,
    аеропорт. Highlight that ''вокзал'' usually implies the train station.'
  - 'H3: Усередині. Detail locations: каса, зал очікування, платформа. Provide 2-3
    short example sentences for each with English translations.'
  - 'H3: Корисні фрази. Present functional questions: Де вокзал? Звідки відправляється
    потяг? О котрій годині?'
  - 'H3: Квитки. Introduce core ticket vocabulary: квиток, купити квиток, в один бік,
    туди й назад.'
- section: Напрямки
  words: 400
  points:
  - 'H3: Вказівники. Present direction words: наліво, направо, прямо, назад. Add ordinals
    for turns: перший поворот, другий поворот.'
  - 'H3: Наказовий спосіб. Explain the A1 imperative for directions in English: Поверніть
    наліво, Ідіть прямо. Emphasize that these are polite plural forms.'
  - 'H3: Як запитати. Teach navigation questions: Як дістатися до...? (+ Genitive)
    and Скажіть, будь ласка, де...?'
- section: Подорожі
  words: 400
  points:
  - 'H3: Куди ми їдемо? Explain the use of ''до'' + Genitive for destinations (до
    Львова, до Києва). Reinforce the verb ''їхати'' vs ''іти''.'
  - 'H3: Чим ми їдемо? Explain Instrumental case for means of transport (потягом,
    автобусом, літаком). Present this as a beautiful, efficient feature of Ukrainian
    grammar.'
  - 'H3: Тривалість. Present time phrases: Скільки часу їхати?, Я їду 3 години.'
- section: Практика
  words: 400
  points:
  - 'H3: Діалог 1: На вулиці. Create a 6-8 line natural dialogue asking for and receiving
    directions to the metro station. Include English translations.'
  - 'H3: Діалог 2: Наша подорож. Create a short narrative dialogue describing a trip
    to Lviv by train, integrating duration and destination.'
  - Include 3 simple comprehension questions in Ukrainian at the end of the dialogues
    to verify understanding.
