slug: the-cyrillic-code-iv
title: The Cyrillic Code IV
word_target: 2000
content_outline:
- section: Вступ (Review & Final Push)
  words: 300
  points:
  - Welcome the learner to the final step of mastering the Cyrillic alphabet. Frame
    this as a major milestone and a safe, achievable goal.
  - 'Provide a quick diagnostic exercise: reading 5 familiar words using the 22 letters
    learned in previous modules to build confidence.'
  - 'Explicitly note the English scaffolding: grammar and sound mechanics will be
    explained in English, while all examples and drills will be in Ukrainian.'
- section: Шиплячі та свистячі (Sibilants)
  words: 500
  points:
  - Introduce Ц as a single affricate sound /ts/, not two separate consonants. Use
    examples like 'цікавий' and 'центр'.
  - Explain Ч (/tʃ/) and Ш (/ʃ/). Emphasize that Ukrainian Ш is strictly hard, with
    the tongue pulled back.
  - Detail the unique Ukrainian Щ. Explain it as a prolonged, soft, palatalized sound,
    not a harsh combination. Use 'ще' and 'щастя'.
  - Provide a mirror self-check technique for articulatory contrast between hard Ш
    and soft Щ.
- section: Йотовані голосні (Iotated Vowels)
  words: 500
  points:
  - 'Explain the dual nature of iotated vowels (Ю, Я, Є, Ї): they represent two sounds
    (/j/ + vowel) at the start of a word, but only one vowel sound while softening
    the preceding consonant when placed after one.'
  - Detail Ю (/ju/) and Я (/ja/) with high-frequency examples like 'юнак', 'яблуко',
    and the pronoun 'я'.
  - Detail Є (/je/), anchoring it to the cultural concept of 'Європа' and 'Євромайдан'.
  - Highlight Ї (/ji/) as a unique symbol of Ukrainian identity and resistance. Emphasize
    that it ALWAYS represents two sounds and never softens a consonant ('їжа', 'Київ').
- section: М'який знак та апостроф (Soft Sign & Apostrophe)
  words: 400
  points:
  - Define the soft sign (Ь) not as a letter with its own sound, but as a modifier
    that palatalizes the preceding consonant. Give articulatory instructions.
  - Provide minimal pairs to demonstrate how the soft sign changes meaning and sound,
    ensuring clear auditory contrast.
  - 'Explain the apostrophe ('') as a blocker: it prevents the preceding consonant
    from softening and preserves the /j/ sound of the following iotated vowel. Use
    ''сім''я'' and ''м''ясо''.'
  - 'Summarize the rule clearly: Ь softens what comes before it; the apostrophe blocks
    softening.'
- section: 'Підсумок: Весь алфавіт (Summary: The Full Alphabet)'
  words: 300
  points:
  - 'Present the complete 33-letter Ukrainian alphabet in correct order: А Б В Г Ґ
    Д Е Є Ж З И І Ї Й К Л М Н О П Р С Т У Ф Х Ц Ч Ш Щ Ь Ю Я.'
  - Celebrate the learner's achievement of cracking the entire Cyrillic code across
    four modules.
  - 'Provide a comprehensive reading drill: a short paragraph containing all 33 letters,
    equipped with stress marks and IPA for first-occurrence words.'
  - Bridge to module a1-05, transitioning from letter recognition to syllable structure
    and fluent reading.
