slug: food-and-shopping
title: Food, Drinks & Shopping
word_target: 2000
content_outline:
- section: 'Вступ: Улюблена їжа та напої'
  words: 300
  points:
  - 'Vocabulary: Introduce basic verbs ''їсти'' (to eat), ''пити'' (to drink), ''купувати''
    (to buy) with English scaffolding.'
  - 'Grammar Focus: Accusative case for direct objects (State Standard §4.2.3.2.1).
    Visual rule: -а/-я changes to -у/-ю.'
  - 'Activity: Simple ''I love/I want'' sentences identifying food vs. drinks.'
  - 'Cultural note: ''Їсти суп'' (eat soup) distinction.'
- section: Основні продукти та напої
  words: 900
  points:
  - 'Category 1: Vegetables & Fruits (овочі та фрукти) — картопля, морква, яблуко.
    Highlight Accusative forms.'
  - 'Category 2: Meat & Dairy (м''ясо, молоко, сир, яйця). Contrast mass nouns vs
    countable.'
  - 'Category 3: Drinks (вода, сік, кава, чай). Collocations with ''пити''.'
  - 'Category 4: Bakery (хліб, батон, булка). Cultural sidebar on ''Palianytsia''.'
  - 'Grammar: Units of measure (кілограм, літр, пляшка) + Genitive case (formulaic
    approach). ''Пляшка води'', ''кілограм яблук''.'
  - 'Drill: Number agreement review (2-4 vs 5+) in context of prices/weights.'
- section: 'У магазині: діалоги та покупки'
  words: 500
  points:
  - 'Scenario: Creating a shopping list (Список покупок). Handwritten style visual
    description.'
  - 'Interaction: Asking for price (''Скільки коштує?'', ''Яка ціна?'').'
  - 'Dialogue: Customer-Seller interaction pattern (''Добрий день, дайте, будь ласка...'').'
  - 'Practice: Ordering specific quantities using Accusative (item) and Genitive (quantity).'
- section: 'Українські традиції: хліб і гостинність'
  words: 300
  points:
  - 'Cultural Insight: The deep symbolism of bread in Ukraine (''Хліб-сіль'').'
  - 'Etiquette: How to treat bread (never throw away).'
  - 'Tradition: Brief mention of seasonal breads (korovai, paska) to show variety.'
