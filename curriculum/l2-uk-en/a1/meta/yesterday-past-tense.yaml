slug: yesterday-past-tense
title: Yesterday - Past Tense
word_target: 1200
content_outline:
- section: 'Вступ: Що було вчора? (Introduction: What Happened Yesterday?)'
  slug: introduction-what-happened
  words: 250
  points:
  - Introduce the past tense conceptually with English scaffolding, visually contrasting
    the present ('Сьогодні я тут') with the past ('Вчора я був там').
  - Present high-frequency past time markers ('вчора', 'вчора ввечері', 'минулого
    тижня/року') with short Ukrainian examples.
  - 'Grammatical warning: Explicitly teach that ''минулого'' must be used without
    the preposition ''в''.'
  - 'Cultural hook: Mention historical events (like Ivan Fedorov printing the ''Apostol''
    in Lviv in 1574) to anchor the past tense in reality.'
- section: 'Основи минулого часу (Grammar: Past Tense Formation)'
  slug: grammar-past-tense-formation
  words: 400
  points:
  - 'Explain the core State Standard §4.2.4.1 rule: infinitive base minus ''-ти''
    + suffixes ''-в'', ''-ла'', ''-ло'', ''-ли''.'
  - Provide a visual reference table showing gender and number agreement using high-frequency
    verbs like 'робити' and 'читати'.
  - 'Dedicate a subsection to gender agreement for the 1st person (''я''): explain
    why men say ''я читав'' and women say ''я читала'', addressing the common error.'
  - Dedicate a subsection to the verb 'бути' (був, була, було, були) as the foundational
    linking verb for past states.
  - 'Address the English calque error: explain why ''I was working'' translates natively
    to ''Я працював'', and explicitly warn against ''Я був працював''.'
- section: Складні випадки та практика (Irregular Verbs and Practice)
  slug: irregular-verbs-practice
  words: 350
  points:
  - 'Introduce essential irregular verbs: ''їсти'' (їв/їла) and ''йти'' (ішов/ішла/ішли).'
  - Briefly explain the vowel alternation (о/і) in 'йти', keeping the explanation
    accessible for A1 beginners.
  - Provide a mini-dialogue set in a museum context to show irregular verbs in action,
    using a cultural hook like the ZUNR language law.
  - 'Include quick-fire drills distinguishing gender forms (він пив / вона пила, він
    ішов / вона йшла) to build automaticity. (Note: use English instructions, no imperatives).'
- section: 'Підсумок: Мій день (Summary and Production)'
  slug: summary-production
  words: 200
  points:
  - Synthesize the lesson with a model narrative describing yesterday's routine using
    collocations ('робити каву', 'ходити в магазин', 'читати новини').
  - Present a standard Q&A dialogue ('Що ти робив вчора?' / 'Я дивився фільм') for
    immediate conversational application.
  - Conclude with a final summary checklist of the -в/-ла/-ло/-ли endings and a reminder
    to always match the subject's gender.
  - Include 3-4 self-check questions to verify understanding of basic past tense endings
    and time markers.
