slug: yesterday-past-tense
title: Yesterday - Past Tense
word_target: 2000
content_outline:
- section: 'Вступ: Що було вчора?'
  words: 400
  points:
  - Establish English scaffolding (A1 immersion rules) to introduce the concept of
    the past tense, visually contrasting present ('Сьогодні я тут') with past ('Вчора
    я був там').
  - 'Introduce the cultural hook: the printing of the Apostol book in Lviv on Feb
    15, 1574, anchoring a concrete, historical past event.'
  - 'Present high-frequency time markers: ''вчора'', ''вчора ввечері'', ''вчора зранку''
    with short, comprehensible Ukrainian examples.'
  - 'Explain the grammatical rule for ''минулий'': ''минулого тижня/року/місяця''
    MUST be used without the preposition ''в'', explicitly warning against common
    L1 English interference.'
- section: Основи минулого часу
  words: 650
  points:
  - 'Provide the core State Standard §4.2.4.1 rule: base infinitive minus -ти + suffixes
    -в (він), -ла (вона), -ло (воно), -ли (вони).'
  - Create a visual reference table showing gender and number agreement using high-frequency
    verbs like 'робити' and 'читати'.
  - 'Dedicate a specific H3 subsection to gender agreement for the first person (''я''):
    explicitly explain why men say ''я читав'' and women say ''я читала'', addressing
    the most common learner error.'
  - Dedicate a specific H3 subsection to the verb 'бути' (був, була, було, були) as
    the foundational linking verb for past states.
  - 'Address the English calque error: explain why ''I was working'' translates natively
    to ''Я працював'', and explicitly warn against using ''Я був працював''.'
- section: Складні випадки та практика
  words: 600
  points:
  - Introduce essential irregular verbs and suppletion, specifically focusing on 'їсти'
    (їв/їла) and 'йти' (ішов/ішла/ішли).
  - Briefly explain the vowel alternation (о/і) in verbs of motion like 'йти', keeping
    the explanation accessible for A1 beginners.
  - Provide a mini-dialogue or narrative set in a museum context (referencing the
    ZUNR language law of 1919) to show irregular verbs in action.
  - Include quick-fire drills distinguishing gender forms (він пив / вона пила, він
    ішов / вона йшла) to build automaticity with verb endings.
- section: 'Підсумок: Мій день'
  words: 350
  points:
  - Synthesize the lesson with a model narrative describing yesterday's routine using
    collocations ('робити каву', 'ходити в магазин', 'читати новини').
  - Present a standard Q&A dialogue ('Що ти робив вчора?' / 'Я дивився фільм') for
    immediate conversational application.
  - Conclude with a final summary checklist of the -в/-ла/-ло/-ли endings and a reminder
    to always match the subject's gender.
