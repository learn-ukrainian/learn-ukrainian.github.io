slug: yesterday-past-tense
title: Yesterday - Past Tense
word_target: 2000
content_outline:
- section: 'Розминка: Вчора і сьогодні'
  words: 400
  points:
  - 'Контраст між теперішнім і минулим часом: прості візуальні приклади (''Сьогодні
    я тут'' — ''Вчора я був там'')'
  - 'Культурний якір: 15 лютого 1574 року — Іван Федоров ''надрукував'' першу книгу
    (дія, що відбулася в минулому)'
  - 'Часові маркери: введення слів ''вчора'', ''вчора ввечері'', ''вчора зранку''
    з прикладами'
  - 'Конструкції з ''минулий'': ''минулого тижня/місяця/року'' — пояснення відсутності
    прийменника ''в'' (типова помилка)'
- section: 'Граматика: Минулий час дієслів'
  words: 1000
  points:
  - 'Алгоритм утворення: основа інфінітива + суфікси -в (він), -ла (вона), -ло (воно),
    -ли (вони)'
  - 'Таблиця закінчень: чітка візуалізація узгодження за родом і числом'
  - 'Фокус на роді: чому жінки кажуть ''я писала'', а чоловіки ''я писав'' (уникнення
    помилки узгодження)'
  - 'Дієслово ''бути'': форми був, була, було, були — єдине дієслово, що змінюється
    як зв''язка'
  - 'Анти-калька: ''Я працював'' vs ''Я був працював'' — пояснення, чому друге неправильно
    (I was working)'
  - 'Особливі форми: ''їсти'' (їв/їла) та ''йти'' (ішов/ішла/ішли) — пояснення чергування
    та суплетивізму'
  - 'Контекстний приклад: розповідь куратора про те, що ''було'' в музеї вчора (експонати,
    відвідувачі)'
- section: 'Практика: Спогади про вчора'
  words: 600
  points:
  - 'Модель розповіді: ''Вчора я встав, зробив каву, читав новини'' (ланцюжок дій)'
  - 'Сталі вирази (collocations): тренування фраз ''робити домашнє завдання'', ''ходити
    в магазин'', ''дивитися фільм'' у минулому часі'
  - 'Діалог: запитання і відповіді ''Що ти робив?'' з використанням вивченої лексики'
  - 'Різниця рухів: просте розрізнення ''ішов'' (процес) та ''ходив'' (факт відвідування)
    на прикладах'
