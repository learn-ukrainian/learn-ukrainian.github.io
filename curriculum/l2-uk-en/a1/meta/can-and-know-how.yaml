slug: can-and-know-how
title: Can and Know How
word_target: 1200
content_outline:
- section: Могти
  words: 500
  points:
  - Use English scaffolding to introduce the concept of circumstantial ability ('can
    right now').
  - Provide the full conjugation table for 'могти' (можу, можеш, може, можемо, можете,
    можуть) with its own H3 header, highlighting the irregular stem change (г → ж).
  - Include 3+ short example sentences (max 8-10 words) showing temporary capacity
    (e.g., 'Я можу прийти завтра'). Add IPA on first occurrence.
  - Introduce the polite request pattern 'Можу я...?' (May I...?) with 2 short mini-dialogues.
- section: Вміти
  words: 400
  points:
  - Present the conjugation of 'вміти' (вмію, вмієш, вміє, вміємо, вмієте, вміють)
    as a regular -іти verb.
  - Define 'вміти' using English scaffolding as representing learned/acquired skills.
  - Explicitly contrast 'можу' (circumstantial) vs 'вмію' (acquired skill) to prevent
    the most common English speaker error.
  - Provide 4+ short examples using skill verbs from the vocabulary list (плавати,
    готувати, водити машину).
- section: Можна та не можна
  words: 400
  points:
  - Introduce 'можна' as an impersonal word for permission ('It is allowed'). Clarify
    it does not conjugate.
  - Provide 3+ examples of 'Можна + infinitive' for polite requests, noting its cultural
    frequency (e.g., asking to enter or sit).
  - Explain 'не можна' for rules and prohibitions, referencing common Ukrainian signs
    ('Не можна курити', 'Не можна фотографувати').
- section: Контрастні заперечення
  words: 350
  points:
  - Create a three-way contrast summary using a clear table or bullet points with
    English scaffolding.
  - 'Define the negative nuance: Не можу = circumstance prevents me; Не вмію = I lack
    the skill; Не можна = external rule forbids it.'
  - Provide 3 contextual mini-dialogues demonstrating each negation in action (e.g.,
    a library setting, a sports setting).
- section: Практика
  words: 350
  points:
  - Provide 2 text-based situational drills where the learner must choose between
    'могти', 'вміти', or 'можна' based on context.
  - Write 2 short communicative dialogues (e.g., asking for permission at a restaurant
    or museum) summarizing the module's grammar.
  - Ensure all practice sentences remain under the 10-word limit and use simple A1
    vocabulary.
