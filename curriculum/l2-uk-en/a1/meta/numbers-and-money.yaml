slug: numbers-and-money
title: Numbers & Money
word_target: 1091
content_outline:
- section: 'Розминка: Числа в повсякденному житті'
  words: 200
  points:
  - 'English scaffolding: the critical role of numbers for survival navigation (shopping,
    transport, time)'
  - 'Identification task: recognizing numbers in daily contexts like bus routes, floor
    levels, and menu prices'
  - 'Foundational cardinals 0-10: pronunciation guide with mandatory IPA and stress
    marking (оди́н, чоти́ри, де́в''ять)'
  - 'Gendered agreement: early introduction to gender forms for ''один/одна'' and
    ''два/дві'' to ensure grammatical safety'
- section: 'Презентація: Рахуємо до ста та правила узгодження'
  words: 491
  points:
  - 'Formation of 11-19: suffix -надцять and the spelling rule (soft sign only at
    the end of the word)'
  - Formation of tens 20-90 (suffixes -дцять, -десят) and the hundred (сто)
  - The '1-2-5 Agreement Rule' (The Bazaar Accountant's secret) for mastering case
    transitions
  - 'Grammar table for agreement: 1 (Nom.Sg) vs 2-4 (Nom.Pl) vs 5-20 (Gen.Pl) with
    clear examples'
  - 'Agreement focus with feminine nouns: applying rules to ''гривня'' and ''копійка'''
  - 'Asking for the price: ''Скільки це коштує?'' and ''Яка ціна?'' with stress emphasis'
- section: 'Практика: Покупки та діалоги'
  words: 200
  points:
  - 'Mental math drills: simple counting and arithmetic using ''плюс'', ''мінус'',
    ''дорівнює'''
  - 'Commercial vocabulary: ''ціна'' (price), ''дорого'' (expensive), ''дешево'' (cheap),
    ''решта/здача'' (change)'
  - 'Bazaar dialogues: roleplaying transactions including ''Скільки з мене?'' and
    handling basic change'
  - 'Pricing context: practicing with realistic 2024 prices (coffee ~50 UAH, water
    ~15 UAH)'
- section: 'Культурний огляд: Світ української гривні'
  words: 200
  points:
  - 'Etymology: origin of ''hryvnia'' from Kyivan Rus'' neck torcs and units of weight'
  - 'Symbolism: decoding the ₴ sign (cursive ''г'' with stability lines introduced
    in 2004)'
  - 'Linguistic anchor: explaining the proverb ''Копійка береже гривню'' as a cultural
    mnemonic'
  - 'Practical note: the status of kopecks (rare in physical circulation, used in
    card payments)'
naturalness:
