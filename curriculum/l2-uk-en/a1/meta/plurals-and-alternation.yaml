slug: plurals-and-alternation
title: Plurals and Alternation
word_target: 2000
content_outline:
- section: Множина іменників
  words: 450
  points:
  - 'Introductory English scaffolding: explain how Ukrainian categorizes plurals by
    the noun''s gender.'
  - 'H3: Masculine nouns (-и/-і endings) with examples (студент → студенти, хлопець
    → хлопці).'
  - 'H3: Feminine nouns (-и/-і replacing -а/-я) with examples (книга → книги, земля
    → землі).'
  - 'H3: Neuter nouns (-а/-я replacing -о/-е) with examples (місто → міста, море →
    моря).'
  - 'H3: Common irregulars (діти, люди, очі) presented as high-frequency exceptions
    that must be memorized.'
- section: Чергування
  words: 450
  points:
  - 'English scaffolding: introduce vowel alternation (і → о/е) as a rhythmic, flowing
    feature of Ukrainian pronunciation rather than a strict exception.'
  - 'H3: The ''і → о'' pattern with clear examples (кіт → коти, рік → роки).'
  - 'H3: The ''і → е'' pattern with clear examples (піч → печі, палець → пальці).'
  - 'Rule of thumb for learners: if a masculine noun has ''і'' in its final closed
    syllable, check if it alternates to ''о'' or ''е'' in the plural.'
- section: Множина прикметників
  words: 400
  points:
  - 'H3: The great simplification — explain how all three genders elegantly collapse
    into a single plural form ending in -і/-ї.'
  - 'H3: Hard stem vs. soft stem adjectives in the plural (новий → нові, синій → сині).'
  - 'H3: Building phrases — practice combining plural adjectives with plural nouns
    (нові книги, великі міста), recycling vocabulary from module a1-12.'
- section: Винятки та особливості
  words: 400
  points:
  - 'H3: Uncountable nouns (молоко, цукор, вода, повітря) that exist only in the singular.'
  - 'H3: Plural-only nouns (гроші, двері, ножиці, окуляри), highlighting interesting
    cultural overlaps and differences with English.'
  - 'H3: Stress shifts in plural forms (рукА → рУки, сестрА → сЕстри, нОга → нОги),
    reviewing the stress mobility concept.'
- section: Практика
  words: 300
  points:
  - 'Self-check 1: Matching singular nouns to their correct plural forms across all
    genders.'
  - 'Self-check 2: Identifying the correct vowel alternation (і → о/е) in short sentences.'
  - 'Self-check 3: Reading comprehension using simple plural noun phrases in context
    (e.g., Це нові книги).'
  - Provide brief model answers and reassuring English encouragement before the upcoming
    checkpoint.
