slug: plurals-and-alternation
title: Plurals and Alternation
word_target: 1200
content_outline:
- title: Множина іменників (Noun Plurals)
  slug: noun-plurals
  words: 350
  points:
  - Introduce the concept of plural nouns categorized by gender.
  - 'Masculine nouns: Add -и/-і to consonants (студент → студенти, хлопець → хлопці).'
  - 'Feminine nouns: Replace -а/-я with -и/-і (книга → книги, земля → землі).'
  - 'Neuter nouns: Replace -о/-е with -а/-я (місто → міста, море → моря).'
  - 'Introduce high-frequency irregular plurals: діти (children), люди (people), очі
    (eyes).'
- title: Чергування (Vowel Alternation)
  slug: vowel-alternation
  words: 300
  points:
  - 'Explain the ''fleeting і'' concept: why the vowel ''і'' changes when the syllable
    opens.'
  - Show the і → о shift with examples (кіт → коти, рік → роки).
  - Show the і → е shift with examples (піч → печі, палець → пальці).
  - 'Provide a simple strategy: checking monosyllabic masculine nouns for stem changes.'
- title: Множина прикметників (Adjective Plurals)
  slug: plural-adjectives
  words: 250
  points:
  - 'Highlight the simplification: all genders share the same plural adjective ending
    (-і/-ї).'
  - Demonstrate hard vs. soft stems (новий/нова/нове → нові; синій/синя/синє → сині).
  - Practice matching plural adjectives with plural nouns (Це нові книги, Ті великі
    міста).
- title: Винятки та особливості (Special Cases)
  slug: special-cases
  words: 150
  points:
  - Introduce uncountable nouns that exist only in singular (молоко, цукор, вода).
  - Introduce plural-only nouns (pluralia tantum) such as гроші (money) and двері
    (door).
  - Briefly note that stress can shift in plural forms (рукА → рУки).
- title: Підсумок і практика (Summary and Practice)
  slug: summary-practice
  words: 150
  points:
  - Provide a quick summary table of plural endings by gender.
  - 'Self-check 1: Pluralize a mix of masculine, feminine, and neuter nouns.'
  - 'Self-check 2: Apply the і → о/е alternation rule correctly.'
  - 'Self-check 3: Form a complete phrase combining an adjective and noun in the plural.'
