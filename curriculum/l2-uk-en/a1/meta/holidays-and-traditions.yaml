slug: holidays-and-traditions
title: Holidays & Traditions
word_target: 1200
content_outline:
- section: Вступ та культура (Introduction & Culture)
  slug: introduction-and-culture
  words: 300
  points:
  - Introduce major Ukrainian holidays (Новий рік, Різдво, Великдень) using clear
    bilingual vocabulary tables.
  - Explain the cultural significance of Святвечір, the 12 meatless dishes, and the
    central role of Кутя.
  - Share the history of «Щедрик» (Mykola Leontovych) as an authentic Ukrainian carol,
    emphasizing cultural agency.
- section: 'Презентація: Вітання (Presentation: Greetings)'
  slug: presentation-greetings
  words: 300
  points:
  - Introduce the fixed greeting formula «З + [Instrumental]» (e.g., З Новим роком,
    З Різдвом) as lexicalized phrases.
  - Address the common error of using the Nominative case (e.g., З Новий рік) and
    explain the rule simply.
  - Define the verb «вітати» (to congratulate) with 3+ short, A1-appropriate sentence
    examples.
- section: 'Презентація: Побажання (Presentation: Wishes)'
  slug: presentation-wishes
  words: 300
  points:
  - Introduce the wishing formula «Бажаю + [Genitive]» for abstract concepts (щастя,
    здоров'я, успіху).
  - Provide pronunciation guides for complex sounds in words like «щастя» /ˈʃtʃɑstʲɐ/
    and «здоров'я» /zdɔˈrɔu̯jɐ/.
  - Address the common error of using the Accusative case (Бажаю успіх) instead of
    the required Genitive.
  - Provide a practical mini-dialogue demonstrating how to express wishes and respond
    (e.g., Дякую, Взаємно).
- section: Практика та дні народження (Practice & Birthdays)
  slug: practice-and-birthdays
  words: 300
  points:
  - 'Focus on birthdays: review asking «Коли твій день народження?» and answering
    with Genitive dates.'
  - Introduce the playful tradition of pulling ears («тягнути за вуха») for birthdays.
  - 'Teach vital collocations for gifts: «дарувати подарунок» and «отримати подарунок».'
  - Include a step-by-step writing guide for crafting a short greeting card, followed
    by a summary with 3-4 self-check questions.
