slug: demonstratives-this-that
title: Demonstratives
word_target: 2000
content_outline:
- section: Цей/ця/це (This)
  words: 500
  points:
  - 'Use English scaffolding to explain gender agreement for demonstratives. Introduce
    forms: цей (чоловічий), ця (жіночий), це (середній).'
  - Provide simple examples matching demonstratives with familiar vocabulary (цей
    хлопець, ця дівчина, це місто).
  - Dedicate a specific H3 to the critical difference between the copula 'Це' (This
    is a cafe) and the demonstrative 'це' (This cafe is nice).
- section: Ці (These)
  words: 300
  points:
  - Introduce 'ці' as the universal plural form for all genders (ці книги, ці студенти,
    ці міста).
  - Show the singular-to-plural transformation (цей → ці, ця → ці, це → ці) in a clear
    table format.
  - Highlight and explain the common learner error of using singular demonstratives
    with plural nouns (*цей книги).
- section: Той/та/те/ті (That/Those)
  words: 500
  points:
  - 'Introduce the concept of spatial distance and the forms: той (чол.), та (жін.),
    те (серед.), ті (множ.).'
  - Provide examples linking forms to basic nouns (той будинок, та вулиця, те озеро,
    ті люди).
  - Create an H3 to explain the contextual difference between the feminine demonstrative
    'та' (that girl) and the conjunction 'та' (and), using clear contrasting sentences.
- section: Цей vs Той у контексті (This vs That in context)
  words: 400
  points:
  - Compare spatial proximity (близько vs далеко) using paired examples (цей стілець
    vs той стілець).
  - Include a mini-dialogue set in a shop context (e.g., 'Дайте мені цей торт' vs
    'Дайте мені той торт').
  - 'Briefly mention textual distance: using ''цей'' for something just mentioned
    and ''той'' for something mentioned previously.'
- section: Практика (Practice)
  words: 300
  points:
  - Provide a summary reference table grouping all forms by distance (this/these vs
    that/those) and gender.
  - Present guided examples prompting the learner to choose the correct demonstrative
    based on noun gender and number.
  - Set up a brief self-check section to contrast 'this' and 'that' based on spatial
    distance.
