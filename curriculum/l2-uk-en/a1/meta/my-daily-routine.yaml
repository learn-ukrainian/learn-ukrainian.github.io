slug: my-daily-routine
title: My Daily Routine
word_target: 2000
content_outline:
- section: 'Вступ: Ваш розпорядок дня'
  words: 300
  points:
  - Define 'розпорядок дня' (daily routine) and 'типовий день' (typical day) within
    the context of State Standard §3.4.
  - Recap essential time-telling phrases from M23 (о котрій годині? о сьомій...) as
    the foundation for this lesson.
  - 'Scaffolding: Briefly explain that describing a routine relies heavily on reflexive
    verbs (-ся/-сь) and sequence adverbs.'
  - 'Hook: Ask ''Are you a morning person or a night owl?'' (using simple A1 cognates/phrases
    like ''жайворонки і сови'' with translation).'
- section: Ранок, день та вечір
  words: 900
  points:
  - 'Morning Sequence (Ранкові дії): Introduce ''прокидатися'', ''вставати'', ''вмиватися'',
    ''одягатися'', ''снідати''. Highlight the reflexive forms.'
  - 'Error Alert: Explicitly distinguish ''вмиватися'' (wash face/self) vs ''мити
    руки'' (wash hands - transitive). Provide examples.'
  - 'Day Sequence (Денні дії): ''йти/їхати на роботу'', ''працювати'', ''обідати''.
    Discuss the cultural concept of ''Обід'' as the main meal (Standard §3.5).'
  - 'Evening Sequence (Вечірні дії): ''повертатися додому'', ''вечеряти'', ''відпочивати'',
    ''лягати спати''. Introduce collocation ''лягати спати''.'
  - 'Grammar Spotlight: Full conjugation of ''дивитися'' (to watch) per Standard §4.2.4.1,
    highlighting the stem change (дивлюся, дивишся).'
  - 'Sequence Adverbs: Introduce ''спочатку'' (first), ''потім'' (then), ''після цього''
    (after that), ''нарешті'' (finally) to structure the narrative.'
  - 'Frequency Adverbs: ''завжди'', ''зазвичай'', ''іноді'', ''рідко'', ''ніколи''.
    Show their typical position in a sentence.'
- section: 'Практика: Робочий день і вихідні'
  words: 500
  points:
  - Contrast 'Робочий день' vs 'Вихідний день' (Standard §3.5). List key differences
    (waking up early vs late, working vs resting).
  - 'Dialogue 1: Two friends discussing their morning routine. Focus on ''О котрій
    ти встаєш?'' and ''Що ти робиш потім?''.'
  - 'Dialogue 2: Planning a Saturday. Use ''зазвичай'' to describe habits vs specific
    plans.'
  - 'Pattern Drill: ''Спочатку я..., а потім я...'' sentences to practice flow.'
- section: 'Підсумок: Мій ідеальний день'
  words: 300
  points:
  - 'Synthesis: Guide the learner to construct a full paragraph describing their typical
    day from morning to night.'
  - 'Model Text: Provide a clear, natural example of a ''Typical Day'' narrative (~6-8
    sentences).'
  - 'Checklist: Did you use 3 reflexive verbs? Did you use ''потім''? Did you mention
    specific times?'
  - 'Transition: Preview next module (Adjectives) - ''Now you can say what you do.
    Next, we will learn to describe *how* things are.'''
