slug: phone-basics
title: Phone Basics
word_target: 2000
content_outline:
- section: Вступ та етикет
  words: 450
  points:
  - 'Use English scaffolding (A1 level) to explain the cultural nuance of phone greetings:
    the universal «Алло!» versus the distinctly Ukrainian polite/professional «Слухаю!».'
  - Define formal vs. informal address rules on the phone. Clearly explain the necessity
    of defaulting to «Ви» for strangers (couriers, receptionists) and «ти» for friends.
  - Include a phonetics tip (H3) on pronouncing the single affricate sound «дз» in
    «дзвонити» and «дзвінок», explicitly correcting the learner error of splitting
    it into /d/ + /z/.
- section: 'Презентація: Основні структури'
  words: 650
  points:
  - Explain self-identification on the phone («Це Олена» or «Олена слухає»), explicitly
    correcting the English-influenced literal translation error «Я є Олена».
  - Introduce polite contact phrases from State Standard §2 («Чи можу я поговорити
    з...?», «Скажіть, будь ласка») with a short 4-line bilingual mini-dialogue.
  - 'Present 2nd person polite imperatives (State Standard §4.2.4.2) used for handling
    call delays: «Зачекайте, будь ласка», «Повторіть, будь ласка».'
  - Introduce modern conversation closings, presenting «До зв'язку!» (Talk soon) as
    the modern, authentic Ukrainian standard sign-off.
- section: 'Практика: Життєві ситуації'
  words: 550
  points:
  - 'Present Scenario 1: The wrong number. Teach «Вибачте, я помилився номером» as
    a fixed formulaic chunk with a short practice dialogue.'
  - 'Present Scenario 2: The courier delivery (State Standard Catalog B). Practice
    practical phrases like «Я буду через 5 хвилин» and «Залиште біля дверей».'
  - 'Present Scenario 3: Digital messaging. Focus on high-frequency collocations «написати
    повідомлення» and «залишити повідомлення».'
- section: Продукція та підсумок
  words: 350
  points:
  - Provide a summary table comparing Formal vs. Informal phone phrases side-by-side.
  - 'Create a dialogue simulation containing two parts: a formal call to an office
    using «Слухаю вас» and «Ви», and an informal call to a friend using «Алло».'
  - Include a recap list of high-frequency collocations (e.g., «дзвонити мамі», «лінія
    зайнята», «номер телефону»).
