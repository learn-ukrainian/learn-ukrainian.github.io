slug: phone-basics
title: Phone Basics
word_target: 2000
content_outline:
- section: Вступ та етикет
  words: 450
  points:
  - 'Provide English scaffolding to explain the cultural difference between phone
    greetings: the informal «Алло!» versus the professional «Слухаю!».'
  - Define formal vs. informal address rules on the phone. Clearly explain the necessity
    of defaulting to «Ви» for strangers (couriers, receptionists) and using «ти» for
    friends.
  - Include a phonetics tip on how to pronounce the single affricate sound «дз» in
    «дзвонити» and «дзвінок» (e.g., comparing it to the 'ds' in 'woods').
- section: 'Презентація: Основні структури'
  words: 650
  points:
  - Explain how to properly identify oneself on the phone («Це Олена» or «Олена слухає»),
    explicitly correcting the common literal translation error «Я є...».
  - Introduce polite contact phrases like «Чи можу я поговорити з...?» and «Скажіть,
    будь ласка» with a short 4-line bilingual mini-dialogue.
  - 'Present 2nd person polite imperatives (§4.2.4.2) used for handling call flow
    and delays: «Зачекайте, будь ласка», «Повторіть, будь ласка».'
  - Introduce modern conversation closings, heavily emphasizing «До зв'язку!» as the
    standard sign-off.
- section: 'Практика: Життєві ситуації'
  words: 550
  points:
  - 'Present Scenario 1: The wrong number. Teach «Вибачте, я помилився номером» as
    a fixed, formulaic chunk and include a short practice dialogue.'
  - 'Present Scenario 2: The courier delivery. Practice practical phrases like «Я
    буду через 5 хвилин» and «Залиште біля дверей».'
  - 'Present Scenario 3: Digital messaging alternatives. Focus on the collocations
    «написати повідомлення» and «залишити повідомлення».'
- section: Продукція та підсумок
  words: 350
  points:
  - Provide a summary table comparing Formal vs. Informal phone phrases side-by-side.
  - 'Create a dialogue simulation containing two parts: a formal call to a clinic/office
    using «Слухаю вас» and «Ви», and an informal call to a friend using «Алло».'
  - Include a short recap of high-frequency collocations (e.g., «дзвонити мамі», «лінія
    зайнята», «номер телефону»).
