slug: accusative-prepositions
title: Accusative Prepositions
word_target: 2000
content_outline:
- section: Куди? з Acc (Direction with Acc)
  words: 500
  points:
  - Use English scaffolding to introduce the cognitive difference between static location
    ('where') and dynamic destination ('where to' / Куди?).
  - Define the rules for 'в/у + Accusative' for enclosed spaces (e.g., іду в магазин,
    їду у Київ) with 3+ clear examples.
  - Explain Ukrainian euphony (the 'в/у' alternation) as a natural, rhythmic feature
    of the language that prevents consonant clustering.
  - Define the rules for 'на + Accusative' for open surfaces and events (e.g., їду
    на концерт, іду на пошту) with 3+ examples.
  - 'Include a clear, visually structured comparison table: в/у (enclosed space) vs
    на (open surface/event).'
- section: За + Acc (Behind/For)
  words: 400
  points:
  - Explain the 'exchange/gratitude' function of За + Accusative with clear examples
    (дякую за допомогу, платити за квиток).
  - 'Address the common learner error explicitly: explain why learners must use ''за''
    and never ''для'' when expressing gratitude.'
  - Explain the spatial function of movement 'behind' (зайти за будинок) and the temporal
    function (зробити завдання за годину).
  - Create a mini-dialogue in a café or service setting demonstrating 'Дякую за...'
    in a real-life, practical scenario.
- section: Через + Acc (Through/Because of)
  words: 400
  points:
  - Define the spatial meaning 'through/across' (через парк, через дорогу, через міст)
    and provide 3+ example sentences.
  - 'Define the temporal meaning (''in an amount of time'' from now) and causal meaning
    (''because of'' an external factor): через годину, через дощ, через роботу.'
  - Include an engagement callout highlighting the critical contrast between the temporal
    use of 'за' (duration to complete) vs 'через' (time elapsed until something happens)
    to prevent confusion.
- section: Про + Acc (About)
  words: 300
  points:
  - Define Про + Accusative for discussing topics, thoughts, and subjects (книга про
    історію, фільм про кохання).
  - List typical verbs that trigger 'про' (говорити про, думати про, читати про, знати
    про, мріяти про) and provide an example sentence for each.
  - 'Explain how to correctly form interrogative phrases for this preposition: ''Про
    що?'' (About what?) and ''Про кого?'' (About whom?).'
- section: Практика (Practice)
  words: 400
  points:
  - Include a short summary text consolidating the prepositions в/у, на, за, через,
    and про in context.
  - Provide a comprehensive, natural dialogue about weekend plans that utilizes all
    the newly learned prepositions.
  - Add 3-5 reading comprehension questions in Ukrainian to verify understanding of
    the usage contexts.
