slug: accusative-prepositions
title: Accusative Prepositions
word_target: 2000
content_outline:
- section: Куди? з Acc (Direction with Acc)
  words: 600
  points:
  - Use English scaffolding to introduce the cognitive difference between static location
    ('where') and dynamic destination ('where to' / Куди?).
  - Provide rules for в/у + Accusative for enclosed spaces (іду в магазин, їду у Київ).
  - Explain euphony guidelines for в/у as a natural rhythmic feature of the Ukrainian
    language.
  - Provide rules for на + Accusative for open surfaces and events (їду на концерт,
    іду на пошту).
  - 'Include a clear comparison table: в/у (enclosed space) vs на (open surface/event).'
- section: За + Acc (Behind/For)
  words: 500
  points:
  - Explain the 'exchange/gratitude' function of За + Accusative with clear examples
    (дякую за допомогу, платити за квиток).
  - 'Address common learner error: explain why they should not use ''для'' for gratitude.'
  - Explain the spatial function 'behind' (зайти за будинок) and the temporal function
    (зробити завдання за годину).
  - Create a mini-dialogue demonstrating 'Дякую за...' in a real-life, practical scenario.
- section: Через + Acc (Through/Because of)
  words: 400
  points:
  - Define the spatial meaning 'through/across' (через парк, через дорогу, через міст)
    with 3+ example sentences.
  - 'Define the temporal and causal meanings: ''in an amount of time'' and ''because
    of'' (через годину, через дощ, через роботу).'
  - Add an engagement callout contrasting the temporal use of 'за' vs 'через' (e.g.,
    за тиждень vs через тиждень) to prevent confusion.
- section: Про + Acc (About)
  words: 300
  points:
  - Define Про + Accusative for discussing topics and subjects (книга про історію,
    фільм про кохання).
  - List and provide example sentences for typical verbs triggering 'про' (говорити
    про, думати про, читати про, знати про).
  - 'Explain how to form interrogative phrases: ''Про що?'' and ''Про кого?''.'
- section: Практика (Practice)
  words: 200
  points:
  - Include a short summary text consolidating the prepositions в/у, на, за, через,
    and про.
  - Provide a comprehensive dialogue about weekend plans that utilizes all the newly
    learned prepositions in context.
  - Add 3-5 reading comprehension questions in Ukrainian to verify understanding.
