slug: accusative-prepositions
title: Accusative Prepositions
word_target: 1200
content_outline:
- title: 'Direction and Movement: Куди? (Where to?)'
  slug: direction-movement
  words: 350
  points:
  - Introduce the concept of dynamic destination ('Куди?') using English scaffolding
    to distinguish it from static location.
  - Explain 'в/у + Accusative' for enclosed spaces (в магазин, у Київ). Briefly note
    the euphony rule (в/у alternation).
  - Explain 'на + Accusative' for open spaces, surfaces, and events (на пошту, на
    концерт).
  - Provide a clear comparison table of в/у vs на with examples, English translations,
    and IPA on the first occurrence of new words.
- title: 'Exchange and Gratitude: За (For)'
  slug: exchange-gratitude
  words: 250
  points:
  - Introduce 'за + Accusative' for exchange or gratitude (Дякую за допомогу, платити
    за квиток).
  - 'Explicitly address the common error: warn learners never to use ''для'' for gratitude.'
  - Briefly introduce the spatial 'behind' (зайти за будинок) and time duration 'within'
    (зробити за годину).
- title: 'Cause and Crossing: Через (Through/Because of)'
  slug: cause-crossing
  words: 200
  points:
  - Explain the spatial meaning 'through/across' (через парк, через дорогу) with simple
    example sentences.
  - Explain the causal meaning 'because of' (через дощ, через роботу).
  - Explain the temporal meaning 'in/after' (через годину) and contrast it with the
    duration meaning of 'за'.
- title: 'Topics and Thoughts: Про (About)'
  slug: topics-thoughts
  words: 150
  points:
  - Introduce 'про + Accusative' for discussing topics (книга про історію, фільм про
    кохання).
  - 'List typical verbs that take this preposition: говорити про, думати про, читати
    про.'
  - 'Demonstrate how to ask questions: ''Про що?'' (About what?) and ''Про кого?''
    (About whom?).'
- title: Summary & Practice
  slug: summary-practice
  words: 250
  points:
  - Provide a short mini-dialogue incorporating multiple prepositions in a realistic
    scenario, using indirect requests rather than imperatives.
  - Summarize the core meaning of each preposition (в/у, на, за, через, про) in a
    quick-reference list.
  - Include 4 self-check questions verifying understanding of directional prepositions
    and gratitude.
