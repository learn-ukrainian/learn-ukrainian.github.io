slug: tomorrow-future-tense
title: Tomorrow - Future Tense
word_target: 2000
content_outline:
- section: 'Розминка: Час летить'
  words: 150
  points:
  - Brief recap of Past Tense (Yesterday) to contrast with Future.
  - Introduction of the concept of 'Tomorrow' and looking forward.
  - 'English scaffolding: How Ukrainian future tense is simpler than English (no ''will/shall/going
    to'' distinction in the same way).'
- section: 'Граматика: Майбутній час (Я буду...)'
  words: 350
  points:
  - 'Core Grammar: The Compound Future Formula (буду + infinitive).'
  - 'Conjugation table of ''бути'' (future): буду, будеш, буде, будемо, будете, будуть.'
  - 'Step-by-step examples: Я читаю -> Я буду читати.'
  - 'Addressing the Common Error: Only use imperfective verbs (skip complex aspect
    theory, just rule of thumb).'
- section: 'Плани та наміри: Що ми будемо робити?'
  words: 300
  points:
  - 'Expressing intent vs. simple future: ''Я хочу...'' vs ''Я буду...''.'
  - Verb 'збиратися' (to be going to/intend) as a useful alternative.
  - 'Cultural Hook: «Не кажи ''гоп''...» — discussion on sharing plans cautiously.'
  - 'Collocations: збиратися додому, хотіти знати.'
- section: 'Коли це буде? (Частина 1: Конкретний час)'
  words: 300
  points:
  - 'Key vocabulary: завтра, післязавтра.'
  - 'Grammar Focus: The ''Genitive of Time'' rule for ''наступний'' (наступного тижня,
    наступного року).'
  - 'Drill patterns: наступного понеділка vs у понеділок (future context).'
- section: 'Коли це буде? (Частина 2: Абстрактний час)'
  words: 250
  points:
  - 'Adverbs of time: скоро, незабаром, потім, пізніше.'
  - 'Cultural Hook: «Завтра буде новий день» — optimism.'
  - Usage examples showing word order (Скоро я буду... vs Я буду скоро...).
- section: 'Наші плани: Вихідні та відпустка'
  words: 300
  points:
  - 'Contextual application: Discussing weekend plans.'
  - 'Vocabulary: відпустка, канікули, вихідні.'
  - 'Collocations: мати плани, складати план.'
  - 'Model sentences: ''Наступного літа я буду відпочивати...'''
- section: 'Практика: Діалоги про плани'
  words: 200
  points:
  - 'Dialogue 1: Short interaction about evening plans (informal).'
  - 'Dialogue 2: Discussing vacation plans (using ''збиратися'' and ''буду'').'
  - Highlighting natural responses.
- section: 'Практика: Мій ідеальний день завтра'
  words: 150
  points:
  - 'Narrative text: A simple story describing a planned day.'
  - Check for understanding (What will they do first? Then?).
  - Transition to Activity Section.
