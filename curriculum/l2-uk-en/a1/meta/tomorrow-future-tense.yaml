content_outline:
- section: 'Майбутній час: Концепція та форми'
  words: 275
  points:
  - 'Contrast: Present, Past, and Future timelines (Warm-up integration)'
  - 'Core rule: Compound Future = буду + infinitive (Imperfective verbs only)'
  - 'Conjugation table of ''бути'': я буду, ти будеш, ми будемо...'
  - 'Common Error Warning: Avoid ''Aspect Clash'' (no ''буду'' with perfective verbs)'
  - Brief mention of Synthetic Future (-му) for passive recognition only
  - 'Cultural Hook: Resilience idiom ''Завтра буде новий день'''
- section: 'Наміри та час: Що я хочу робити?'
  words: 253
  points:
  - 'Expressing definite plans: ''Я буду працювати'''
  - 'Expressing intentions vs. actions: ''Я хочу...'', ''Я збираюся...'''
  - 'Core time markers: ''завтра'', ''післязавтра'''
  - 'Using ''наступного'' (next): ''наступного тижня'', ''наступного року'''
  - 'Specific times: ''у понеділок'', ''у січні'' linked to future events'
- section: 'Деталі планів: Скоро та потім'
  words: 266
  points:
  - 'Relative time adverbs: ''скоро'', ''незабаром'' (soon)'
  - 'Sequencing events: ''потім'' (then), ''пізніше'' (later)'
  - 'Contextual application: Planning for the weekend (''Плани на вихідні'')'
  - 'Contextual application: Dreaming of vacation (''Плани на відпустку'')'
  - 'Cultural Hook: Caution in planning ''Не кажи гоп, поки не перескочиш'''
- section: Діалоги про майбутнє
  words: 288
  points:
  - 'Dialogue 1: Casual conversation about evening plans (friends)'
  - 'Dialogue 2: Discussing dream vacation plans (aspirational)'
  - 'Role-play scenario: Explaining your schedule for tomorrow'
  - 'Final synthesis: Monologue ''My plans for tomorrow'''
  - 'Recap of key vocabulary: план, мріяти, сподіватися'
