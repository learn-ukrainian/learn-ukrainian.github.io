slug: tomorrow-future-tense
title: Tomorrow - Future Tense
word_target: 1200
content_outline:
- section: Вступ (Introduction)
  slug: introduction
  words: 250
  points:
  - 'English scaffolding: Contrast the timeline: where we were ''yesterday'' (A1-36)
    vs. where we will be ''tomorrow''.'
  - 'Cultural context: «Завтра буде новий день» as an expression of hope.'
- section: 'Презентація граматики: Буду + Інфінітив (Grammar: Буду + Infinitive)'
  slug: grammar-presentation
  words: 350
  points:
  - Introduce the compound future formula (буду + infinitive). Present the full conjugation
    table for 'бути'.
  - 'Learner Error (Aspects): Emphasize that ''буду'' takes ONLY imperfective verbs
    («буду читати», NOT «буду прочитати»).'
  - 'FYI Box: Briefly mention the synthetic future («працюватиму») strictly for recognition
    in authentic texts.'
- section: 'Лексика та культурний контекст: Плани на майбутнє (Vocabulary and Plans)'
  slug: vocabulary-and-culture
  words: 350
  points:
  - 'Future markers: завтра, післязавтра, скоро. Introduce collocations (завтра вранці,
    завтра ввечері).'
  - 'Genitive of Time: Explain how to use «наступного тижня» and «наступного року».
    Warn against Nominative translation.'
  - 'Intentions vs. definite plans: Contrast «буду» (certainty) with «хочу / збираюся»
    (intention).'
  - 'Cultural Hook: «Не кажи ''гоп'', поки не перескочиш» to explain Ukrainian cautiousness
    regarding definite plans.'
- section: Практика та підсумок (Practice and Summary)
  slug: practice-and-summary
  words: 250
  points:
  - 'Mini-dialogues: Practice planning the weekend and evening using ''мати плани''
    and ''складати план''.'
  - 'Role-play scenario: Planning a work week using ''бути'' forms and Genitive time
    markers (use indirect instructions, no imperatives).'
  - 'Summary: 3-4 self-check questions verifying the ''бути'' conjugation, imperfective
    rule, and Genitive time markers.'
