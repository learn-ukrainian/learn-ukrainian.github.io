slug: imperative-and-requests
title: Imperative and Requests
word_target: 2000
content_outline:
- section: Наказовий спосіб
  words: 500
  points:
  - 'Introductory English scaffolding: Define the imperative mood (commands, requests,
    instructions) using simple analogies.'
  - 'H3: ''Ти'' vs ''Ви'' - Explain the critical social difference. Define the formation
    rule: remove the -ти infinitive ending and add the appropriate imperative suffix.'
  - 'H3: Suffix Patterns - Explain the basic suffix additions depending on whether
    the stem ends in a vowel (-й) or a consonant (-и).'
  - Provide a clear warning and examples contrasting direct personal commands (Читай!)
    with impersonal infinitive rules (Читати!).
- section: Вісім обов'язкових дієслів
  words: 500
  points:
  - Introduce the 8 essential State Standard verbs required for A1. Provide a master
    reference table with Infinitive, 'Ти' form, and 'Ви' form.
  - 'H3: Regular Classroom Verbs - Focus on читати, слухати, дивитися, іти with simple
    classroom context sentences.'
  - 'H3: Consonant Mutations - Explain the к→ж mutation in сказати → скажи(те) and
    the sibilant shift in писати → пиши(те).'
  - 'H3: Irregular Short Forms - Explicitly drill дати → дай(те) and стояти → стій(те)
    as exceptions that must be memorized.'
- section: Ввічливе прохання
  words: 400
  points:
  - 'H3: The Magic Words ''Будь ласка'' - Teach it as the universal polite softener.
    Show its flexibility at the beginning, middle, or end of a sentence.'
  - 'H3: Formal Requests - Introduce ''Прошу вас'' + infinitive for highly formal
    or service-oriented contexts.'
  - Provide a brief, simplified preview of the advanced pattern 'Чи не могли б ви...?'
    (Could you...?) as an aspirational polite phrase for A1 learners.
- section: Заборони
  words: 300
  points:
  - 'Explain negative imperatives: simply add the particle ''не'' before the established
    imperative form.'
  - Provide 5-6 clear examples of common negative commands (Не кури! Не біжи! Не чіпай!).
  - 'Preview concept for module a1-55: Briefly distinguish between a direct personal
    prohibition (Не чіпай!) and a public sign (Не торкатися!).'
- section: Практика
  words: 300
  points:
  - Include a mini-dialogue demonstrating polite requests in a cafe or classroom setting.
  - 'Provide an escalation drill: show the progression from a direct ''ти'' command
    (Дай), to a polite ''ви'' command (Дайте, будь ласка), to an indirect request.'
  - Add a brief 'Self-Check' English-to-Ukrainian situational prompt exercise for
    the 8 required verbs.
