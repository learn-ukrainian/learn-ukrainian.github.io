slug: imperative-and-requests
title: Imperative and Requests
word_target: 1200
content_outline:
- title: Наказовий спосіб (Imperative mood)
  slug: nakazovyi-sposib
  words: 300
  points:
  - 'Formation rule: 2nd person singular and plural. Remove -ти ending, add imperative
    suffix.'
  - 'Ти-form vs Ви-form: читай (ти) → читайте (ви), пиши (ти) → пишіть (ви). Explain
    adding -те/-іть for politeness and plurality.'
  - 'Learner error: Explain that ''Читати!'' is a sign/rule, while ''Читай!'' is a
    personal command. Context determines which form to use.'
- title: Вісім обов'язкових дієслів (Eight required verbs)
  slug: visim-oboviazkovykh-diesliv
  words: 300
  points:
  - 'Present the 8 verbs from State Standard §4.2.4.2: читай(те), пиши(те), скажи(те),
    дай(те), іди(те), слухай(те), дивись(те), стій(те).'
  - 'Provide classroom command contexts: Читайте текст. Пишіть у зошиті. Слухайте
    уважно.'
  - 'Highlight irregular stems that must be memorized: дати → дай, сказати → скажи,
    стояти → стій.'
- title: Ввічливе прохання (Polite requests)
  slug: vvichlyve-prokhannia
  words: 250
  points:
  - Explain 'Будь ласка' as a universal softener and its flexible sentence position
    (beginning, middle, or end).
  - Introduce 'Прошу вас + infinitive' for slightly more formal or official service
    contexts.
  - Briefly preview the indirect request pattern 'Чи не могли б ви...?' as the most
    polite A1 option.
- title: Заборони (Prohibitions)
  slug: zaborony
  words: 175
  points:
  - Explain negative imperatives using 'Не' + imperative form (Не кури! Не біжи! Не
    чіпай!).
  - Preview the distinction between a personal prohibition (Не чіпай!) and a public
    sign prohibition (Не торкатися!).
- title: Практика (Practice)
  slug: summary
  words: 175
  points:
  - Command drills focusing on the 8 required verbs and upgrading direct commands
    to polite requests.
  - 'Self-check: 3-4 summary questions verifying understanding of the ''ти/ви'' distinction,
    irregular stems, and placement of ''будь ласка''.'
