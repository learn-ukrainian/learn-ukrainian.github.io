slug: checkpoint-core-grammar
title: 'Checkpoint: Core Grammar'
word_target: 2000
content_outline:
- section: 'Огляд: Граматичний чекпоінт'
  words: 200
  points:
  - 'Welcome back: Acknowledge the journey from Module 1 to 34 (Alphabet to Conversation).'
  - 'The Goal: Confirming readiness for real-world scenarios (Cafe, Travel).'
  - 'Structure: Diagnostic Task (Test) -> Remediation (Teach) -> Final Challenge (Test).'
  - 'English Scaffolding Note: Grammar is explained in English; examples are in Ukrainian.'
- section: 'Навичка 1: Читання та вимова'
  words: 300
  points:
  - 'The ''No-Transliteration'' Rule: Final commitment to reading pure Cyrillic.'
  - 'Tricky Letters Review: Ї (yi), Щ (shch), Ь (soft sign) — drill words like «борщ»,
    «їжа».'
  - 'Stress & Intonation: The ''Melodious Language'' concept (Cultural Hook).'
  - 'Self-Check: Read a short paragraph aloud without stumbling.'
- section: 'Навичка 2: Рід та узгодження'
  words: 300
  points:
  - 'Gender Identification Recap: Consonant (M) vs -а/-я (F) vs -о/-е (N).'
  - 'The ''Golden Rule'' of Agreement: Adjectives and Pronouns must match the Noun.'
  - 'Common Trap: ''Гарний книга'' vs ''Гарна книга'' (Visual correction table).'
  - 'Possessives: Мій/Моя/Моє — quick drill with classroom objects.'
- section: 'Навичка 3: Система дієслів'
  words: 400
  points:
  - 'Three Tenses Overview: Minuliy (Past), Teperishniy (Present), Maybutniy (Future).'
  - 'Present Tense: Class I (-ати) vs Class II (-ити) conjugation patterns.'
  - 'Past Tense: Gender agreement (був/була/було/були) — simplicity focus.'
  - 'Future Tense: The easy formula (буду + infinitive) aligned with §4.2.4.1.'
  - 'Trap: Overusing ''є'' (to be) in present tense.'
- section: 'Навичка 4: Система відмінків'
  words: 400
  points:
  - 'The ''Big Four'' Cases of A1: Nominative, Accusative, Locative, Genitive (Preview).'
  - 'Nominative: The Subject (Хто? Що?).'
  - 'Direction vs Location: The critical distinction (Куди? vs Де?).'
  - 'Accusative (Direction): ''Я йду в банк''.'
  - 'Locative (Location): ''Я в банку''.'
  - 'Genitive (Absence): ''У мене немає...'' (Review from M16).'
- section: 'Навичка 5: Практичні ситуації'
  words: 250
  points:
  - 'Scenario 1: Ordering (Accusative) — ''Я буду каву''.'
  - 'Scenario 2: Navigation (Motion verbs) — ''Ви йдете в парк''.'
  - 'Scenario 3: Description (Adjectives) — ''Це дуже гарне місто''.'
- section: Інтеграційне завдання
  words: 150
  points:
  - 'The Final Boss: A complex dialogue combining all skills.'
  - 'Checklist: Did you use a case? A verb? A gendered adjective?'
  - 'Motivation: ''You are ready for the Real World''.'
- section: Підсумок
  words: 150
  points:
  - 'Review of key pillars.'
  - 'Encouragement to review previous modules if needed.'
  - 'Self-check questions.'
