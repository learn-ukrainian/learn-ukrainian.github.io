slug: checkpoint-core-grammar
title: 'Checkpoint: Core Grammar'
word_target: 1500
content_outline:
- section: Overview
  words: 145
  points:
  - 'Мета: фінальна перевірка морфології та синтаксису A1 перед практичним блоком'
  - 'Структура модуля: підхід TTT (Test-Teach-Test) для діагностики та закріплення'
  - 'Як оцінити результат: критерії готовності до живих ситуацій (A1.4)'
- section: 'Skill 1: Читання кирилиці'
  words: 167
  points:
  - 'Техніка читання: фокус на складних літерах (щ, ї, ь, ю, я) без транслітерації'
  - 'Мелодійність: правильний наголос як основа українського звучання (культурний
    аспект)'
  - 'Інтонаційні моделі: розповідні та питальні речення'
- section: 'Skill 2: Рід та узгодження'
  words: 146
  points:
  - 'Іменники: визначення роду за закінченням (тверда та м''яка групи)'
  - 'Прикметники: виправлення типової помилки неузгодження (гарний книга -> гарна
    книга)'
  - 'Присвійні займенники: автоматизація зв''язок (мій/моя/моє/мої)'
- section: 'Skill 3: Система дієслів'
  words: 125
  points:
  - 'Теперішній час: дві групи дієвідмінювання (закінчення -уть/-ють та -ать/-ять)'
  - 'Минулий час: зміна дієслова за родами (був/була/було/були)'
  - 'Майбутній час: фокус на складеній формі (буду + інфінітив) та уникнення зайвого
    ''є'' (to be)'
- section: 'Skill 4: Система відмінків'
  words: 135
  points:
  - 'Називний та Знахідний: розрізнення підмета (хто?) і додатка (кого? що?)'
  - 'Місцевий відмінок: локація (де?) та прийменники в/на (уникнення плутанини з напрямком)'
  - 'Кличний відмінок: емоційне звертання як унікальна риса мови (Мамо! Друже!)'
- section: 'Skill 5: Практичні ситуації'
  words: 119
  points:
  - 'У кафе: використання дієслова ''хотіти'' з іменниками у знахідному відмінку'
  - 'Покупки: конструкції з дієсловом ''мати'' та ввічливі прохання'
  - 'Рух і локація: контраст дієслів ''йти'' (куди?) та ''бути'' (де?)'
- section: Integration Task
  words: 125
  points:
  - 'Комплексний діалог: поєднання роду, відмінків та часів у єдиному контексті'
  - 'Самодіагностика: перевірка 4 ключових навичок перед наступним рівнем'
  - 'Підсумок: готовність до сценаріїв реального життя'
