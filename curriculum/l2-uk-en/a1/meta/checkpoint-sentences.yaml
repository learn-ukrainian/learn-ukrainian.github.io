slug: checkpoint-sentences
title: 'Checkpoint: Sentences'
word_target: 1200
content_outline:
- slug: overview
  words: 150
  points:
  - 'Welcome to the Checkpoint: set a supportive, ''Safe Harbor'' tone emphasizing
    review over testing.'
  - 'State the goals: reviewing present tense verbs, question words, preferences,
    and pronouns before moving to the Accusative case.'
  section: Огляд (Overview)
- slug: skill-1-verbs
  words: 350
  points:
  - Review Class I (-ати) and Class II (-ити) verb paradigms using core vocabulary
    like читати, писати, говорити.
  - Focus on the 3rd person plural distinction (-уть/-ють vs -ать/-ять) to address
    the most common beginner conjugation error.
  - Briefly recap reflexive verbs (-ся/-сь) with simple, practical examples.
  section: 'Навичка 1: Дієслова (Verbs)'
- slug: skill-2-questions-negation
  words: 300
  points:
  - 'Recap essential question words: Хто, Що, Де, Куди, Звідки via short context sentences.'
  - Explain how to form Yes/No questions using 'Чи' and basic intonation without changing
    word order.
  - Review simple negation placement ('не') and connecting ideas using 'тому що' and
    'бо'.
  section: 'Навичка 2: Питання та заперечення (Questions & Negation)'
- slug: skill-3-preferences-pronouns
  words: 300
  points:
  - 'Contrast the three preference structures: ''Мені подобається'' (Dative), ''Я
    люблю'' (Accusative), and ''Я хочу'' (Infinitive), including the cultural nuance
    of ''люблю''.'
  - Review possessive pronouns (мій, твій) and demonstrative pronouns (цей, той),
    emphasizing gender and number agreement.
  section: 'Навичка 3: Уподобання та займенники (Preferences & Pronouns)'
- slug: summary
  words: 100
  points:
  - A brief, realistic mini-dialogue integrating verbs, questions, and preferences.
  - 3-4 simple self-check questions for learners to verify their confidence before
    advancing to A1.3.
  section: Підсумок (Summary)
