slug: checkpoint-sentences
title: 'Checkpoint: Sentences'
word_target: 1200
content_outline:
- section: Огляд
  words: 300
  points:
  - 'English scaffolding note: Maintain 30-40% immersion. Use English to clearly explain
    the goals of this checkpoint and review expectations.'
  - 'Introduce the checkpoint structure: assessing verbs, questions, preferences,
    and pronouns before moving to the Accusative case.'
  - Set a supportive, encouraging tone ('Safe Harbor' approach) to reduce testing
    anxiety.
- section: 'Навичка 1: Дієслова'
  words: 500
  points:
  - 'H3: Class I Verbs (-ати). Provide a clear paradigm table and 3-4 example sentences
    with English translations.'
  - 'H3: Class II Verbs (-ити). Provide a clear paradigm table and contrast with Class
    I, specifically highlighting the 3rd person plural (-ать/-ять vs -уть/-ють).'
  - 'H3: Reflexive Verbs (-ся/-сь). Explain the rule for attaching to vowels vs consonants,
    with 3 examples.'
- section: 'Навичка 2: Питання та заперечення'
  words: 400
  points:
  - 'H3: Question Words. Create a quick reference list of Хто/Що/Де/Куди/Звідки with
    mini-dialogue examples.'
  - 'H3: Yes/No Questions with ''Чи''. Explain how to form these questions using intonation
    and ''Чи'' without changing word order.'
  - 'H3: Negation and Reasons. Explain ''не'' placement and how to connect sentences
    using ''тому що'' / ''бо''.'
- section: 'Навичка 3: Уподобання та присвійні'
  words: 400
  points:
  - 'H3: Expressing Preferences. Contrast ''Мені подобається'' (Dative) vs ''Я люблю''
    (Accusative) vs ''Я хочу'' (Infinitive). Include cultural context on usage.'
  - 'H3: Possessive Pronouns. Provide a summary table for мій/твій (masculine, feminine,
    neuter, plural) with examples.'
  - 'H3: Demonstrative Pronouns. Provide a summary table for цей/той with examples
    showing gender/number agreement.'
- section: Інтеграційне завдання
  words: 400
  points:
  - Present a realistic, combined communicative dialogue (e.g., ordering in a cafe
    or meeting a friend) that uses verbs, questions, preferences, and pronouns.
  - Include a 'Self-Check' checklist for learners to evaluate their confidence on
    the 3 core skills.
  - Provide a clear transition statement preparing the learner for A1.3 (Cases & Navigation).
