slug: buying-tickets
title: Buying Tickets
word_target: 2000
content_outline:
- section: Вступ та підготовка
  words: 450
  points:
  - 'Introduce main transport types using simple definitions: `поїзд`, `автобус`,
    `маршрутка`. Provide English scaffolding for clear understanding.'
  - Explain the critical difference between `вокзал` (major train hub), `автовокзал`
    (major bus hub), and `автостанція` (local stop).
  - Introduce the construction `до` + City (Genitive) as a fixed lexical chunk for
    destinations (`до Києва`, `до Львова`, `до Одеси`).
  - Include a mini-dialogue asking about transport options to a specific city.
- section: Каса та замовлення
  words: 650
  points:
  - 'Present the core transaction phrase for the ticket office: `Один квиток до...,
    будь ласка`.'
  - Explicitly warn against the common gender agreement error (`одна квиток` vs correct
    `один квиток`).
  - 'Explain ticket options: `туди й назад` (round trip) versus `в один бік` (one
    way).'
  - Contrast traditional `квиткова каса` with modern `електронний квиток`, noting
    the high digitalization of Укрзалізниця.
  - 'Introduce carriage classes: `Купе` (compartment) vs `Плацкарт` (open plan), framing
    ''плацкарт'' as an authentic social experience.'
- section: Поїздка та комфорт
  words: 550
  points:
  - 'Teach platform navigation questions: `На якій платформі?` and `В якому вагоні?`.'
  - Review numbers (from prerequisite module) to specify carriage and seat numbers.
  - 'Explain seat types: `нижнє місце` (lower) vs `верхнє місце` (upper).'
  - 'Introduce schedule inquiries: `О котрій відправлення?` and `Коли прибуття?`.'
  - Share the cultural hook of drinking tea from a `підстаканник` served by the `провідник`.
- section: Практика та підсумок
  words: 350
  points:
  - 'Provide a comprehensive simulation dialogue: buying a ticket to the Carpathians,
    finding the train, and speaking with the conductor.'
  - Include a controlled practice check to reinforce `до` instead of `в` for cities.
  - Recap key vocabulary (ticket, station, train, conductor) in a quick reference
    format.
  - 'Conclude the module with the traditional travel wish: `Щасливої дороги!`.'
