slug: buying-tickets
title: Buying Tickets
word_target: 1200
content_outline:
- section: Вступ та підготовка
  words: 450
  points:
  - 'Введення англійського скафолдингу для пояснення теми. Визначення основних видів
    транспорту для подорожей: `поїзд`, `автобус`, `маршрутка` (кожному присвятити
    окремий H3).'
  - 'Чітке розрізнення локацій з англійськими дефініціями: `вокзал` (головний залізничний
    вузол), `автовокзал` (головний автобусний вузол) та `автостанція` (місцева зупинка).'
  - 'Представлення конструкції `до` + місто як готової лексичної формули (lexical
    chunk): `до Києва`, `до Львова`, `до Одеси`. Пояснення без заглиблення у загальні
    правила відмінків.'
  - 'Міні-діалог: просте запитання про вибір транспорту до певного міста.'
- section: Каса та замовлення
  words: 650
  points:
  - 'Вивчення ключової транзакційної фрази: `Один квиток до [місто], будь ласка`.
    Покроковий розбір.'
  - 'Фокус на уникненні типової помилки: пояснення англійською, що слово `квиток`
    чоловічого роду, тому узгоджується лише як `один квиток` (ніколи не `одна`).'
  - 'Словник для вибору поїздки: `туди й назад` (round trip) проти `в один бік` (one
    way).'
  - 'Сучасний контекст: порівняння традиційної `квиткової каси` та сучасного стандарту
    — `електронного квитка` (QR-код у додатку).'
  - 'Типи вагонів: `Купе` (приватність) та `Плацкарт` (відкритість). Культурна врізка
    про «плацкарт» як унікальний соціальний простір для спілкування.'
- section: Поїздка та комфорт
  words: 550
  points:
  - 'Навігація на вокзалі: базові питання `На якій платформі?` та `В якому вагоні?`.'
  - Повторення числівників (із попередніх модулів) для номерів колій, вагонів та місць.
  - 'Опис типів місць у вагоні: `нижнє місце` (lower berth) та `верхнє місце` (upper
    berth).'
  - 'Запитання щодо розкладу: `О котрій відправлення?` та `Коли прибуття?`.'
  - 'Культурний фокус (Cultural Hook): знайомство з роллю `провідника` та культовою
    традицією пити чай із `підстаканника` у поїзді.'
- section: Практика та підсумок
  words: 350
  points:
  - 'Комплексний діалог-симуляція: купівля квитка до Карпат, пошук своєї платформи,
    вагону та коротка взаємодія з провідником.'
  - 'Коротка вправа для самоперевірки (self-check): закріплення використання прийменника
    `до` замість помилкового `в` для міст.'
  - 'Візуальний підсумок ключової лексики: квиток, вокзал, поїзд, провідник, місце.'
  - 'Завершення модуля традиційним українським побажанням для подорожуючих: `Щасливої
    дороги!`.'
