slug: buying-tickets
title: Buying Tickets
word_target: 1400
content_outline:
- section: 'Транспорт і вокзал: готуємося до подорожі'
  words: 250
  points:
  - 'Види транспорту в Україні: поїзд, автобус, маршрутка'
  - 'Важливе розрізнення: ''вокзал'' (центральний вузол) vs ''станція'''
  - 'Граматичний фокус: напрямок руху з прийменником ''до'' (їхати до Києва)'
  - 'Типова помилка: чому ми кажем ''до Львова'', а не ''в Львів'''
  - 'Навігація на вокзалі: де знайти касу, розклад та платформу'
- section: 'У касі: як купити квиток і обрати місце'
  words: 250
  points:
  - 'Формула ввічливості: ''Мені, будь ласка, один квиток до...'''
  - 'Уточнення маршруту: ''в один бік'' чи ''туди й назад'''
  - 'Типи вагонів: плацкарт (відкритий простір) vs купе (закрите)'
  - 'Культурний контекст: феномен плацкарту та чай у підстаканниках'
  - 'Запитання про час: ''О котрій відправлення?'', ''Коли прибуття?'''
  - 'Деталі квитка: номер вагона, місце (нижнє/верхнє)'
- section: 'Практика: діалоги на вокзалі та історія подорожі'
  words: 250
  points:
  - 'Діалог 1: Купівля квитка на поїзд до Львова (з вибором класу)'
  - 'Діалог 2: Біля каси автовокзалу (розклад автобусів)'
  - 'Діалог 3: Ситуація біля поїзда (пошук вагона і місця)'
  - 'Текст для читання: ''Подорож у Карпати'' (атмосфера дороги)'
  - 'Підсумок: корисні фрази для впевненої подорожі'
