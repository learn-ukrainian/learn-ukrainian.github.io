slug: likes-and-preferences
title: Likes and Preferences
word_target: 2000
content_outline:
- section: Мені подобається
  words: 500
  points:
  - Introduce the English scaffolding required for this grammar concept.
  - Explain the Dative chunk 'Мені' (to me) and 'Тобі' (to you). Do not teach the
    full Dative paradigm yet.
  - 'Explain the grammatical structure: the thing being liked is the actual subject
    (Nominative).'
  - Differentiate between singular 'подобається' (Мені подобається музика) and plural
    'подобаються' (Мені подобаються квіти).
  - 'Show how to use it with infinitives: Мені подобається читати.'
- section: Я люблю
  words: 400
  points:
  - Introduce the verb 'любити' (Class II conjugation) with its full present tense
    paradigm (люблю, любиш, любить...).
  - Explain the Accusative case requirement for the direct object (e.g., кава -> каву).
  - Contrast the meaning and usage of 'подобається' (appeals to me) versus 'люблю'
    (strong active affection/enjoyment).
  - 'Provide examples mixing nouns and infinitives: Я люблю каву, Я люблю спорт, Я
    люблю читати.'
- section: Я хочу
  words: 400
  points:
  - Introduce the verb 'хотіти' and its irregular conjugation pattern (хочу, хочеш,
    хоче, хочемо, хочете, хочуть).
  - 'Demonstrate usage with infinitives for actions: Я хочу їсти, Я хочу піти.'
  - 'Demonstrate usage with Accusative objects for things: Я хочу каву, Я хочу квиток.'
  - 'Explain cultural context: using ''Я хочу'' is natural and acceptable in conversational
    Ukrainian without sounding rude.'
- section: Порівняння вподобань
  words: 400
  points:
  - 'Introduce question forms to ask about preferences: А ти? Тобі подобається...?
    Ти любиш...? Ви хочете...?'
  - Provide mini-dialogues comparing what different people like, utilizing common
    vocabulary (їжа, музика, спорт).
  - Integrate cultural hooks about Ukrainian preferences (e.g., coffee culture in
    Lviv, traditional foods).
- section: Практика
  words: 300
  points:
  - Include a summary table contrasting the three structures (подобається, люблю,
    хочу) with their required grammar (Nominative vs Accusative vs Infinitive).
  - Provide simple sentence matching examples to reinforce the rules.
  - Set up the context for the upcoming interactive activities.
