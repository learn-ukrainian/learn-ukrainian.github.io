slug: likes-and-preferences
title: Likes and Preferences
word_target: 2000
content_outline:
- section: Мені подобається
  words: 500
  points:
  - 'Use English scaffolding (approx. 40-50% for this section) to explain the Dative-experiencer
    concept: the person is the ''receiver'' of the feeling, and the thing liked is
    the grammatical subject.'
  - Introduce the lexical chunks 'Мені' (to me) and 'Тобі' (to you). Explicitly state
    that learners do not need to memorize the full Dative case yet.
  - Provide 3-4 examples of 'Мені подобається + [Nominative singular noun]' (e.g.,
    Мені подобається музика).
  - Provide 3-4 examples of 'Мені подобаються + [Nominative plural noun]' (e.g., Мені
    подобаються квіти) to show subject-verb agreement.
  - Demonstrate the construction with infinitives (e.g., Мені подобається читати)
    with 2-3 clear examples.
- section: Я люблю
  words: 400
  points:
  - Introduce the verb 'любити' and provide a clear table of its full present tense
    conjugation (Class II).
  - Explain the Accusative case requirement for direct objects. Give 4-5 examples
    showing Nominative to Accusative transformation for feminine nouns (-а -> -у,
    e.g., кава -> каву).
  - 'Clearly contrast the semantics: ''подобається'' (aesthetic appeal, state) vs
    ''люблю'' (strong active enjoyment, love). Include a ''Cultural Guide'' callout
    explaining this nuance.'
  - Provide 3-4 examples mixing nouns and infinitives (Я люблю спорт, Я люблю читати).
- section: Я хочу
  words: 400
  points:
  - Introduce the irregular verb 'хотіти' and provide a table of its full present
    tense conjugation.
  - Demonstrate 'Я хочу + infinitive' for actions (Я хочу їсти, Я хочу піти) with
    3-4 examples.
  - Demonstrate 'Я хочу + Accusative noun' for objects (Я хочу каву, Я хочу квиток)
    with 3-4 examples.
  - 'Include a cultural note on directness: explain that ''Я хочу'' is perfectly polite
    in Ukrainian daily life and does not sound rude like ''I want'' might in English.'
- section: Порівняння
  words: 400
  points:
  - 'Introduce question formats: ''А ти?'', ''Тобі подобається...?'', ''Ти любиш...?'',
    ''Ви хочете?''.'
  - Write 2-3 short, natural mini-dialogues (4-6 lines each) where people compare
    their preferences regarding food, music, or free time.
  - Integrate cultural vocabulary naturally into the dialogues (e.g., борщ, львівська
    кава).
  - Highlight how to use 'А' (And/But) to contrast preferences (e.g., Мені подобається
    чай, а тобі?).
- section: Практика
  words: 300
  points:
  - 'Create a summary visual table contrasting all three constructions side-by-side:
    verb, meaning, and required following grammar (Nominative vs Accusative vs Infinitive).'
  - Provide 4-5 guided practice sentences with English translations to solidify the
    rules before the interactive activities.
  - Write a brief, encouraging conclusion setting up the interactive exercises.
