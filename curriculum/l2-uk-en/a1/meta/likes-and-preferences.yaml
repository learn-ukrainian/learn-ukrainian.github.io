slug: likes-and-preferences
title: Likes and Preferences
word_target: 1200
content_outline:
- title: Мені подобається (I like)
  slug: meni-podobaitsia
  words: 300
  points:
  - Introduce 'Мені' and 'Тобі' as lexical chunks ('to me', 'to you'). Explicitly
    avoid teaching the full Dative case.
  - 'Explain grammatical inversion: the thing liked is the grammatical subject (Мені
    подобається кава).'
  - Show agreement with singular (подобається) and plural (подобаються) nouns.
  - Provide examples using infinitives (Мені подобається читати).
- title: Я люблю (I love)
  slug: ya-liubliu
  words: 300
  points:
  - Introduce Class II verb 'любити' and its present tense conjugation.
  - Preview the Accusative case ending for direct objects (-а to -у for feminine nouns
    like музика -> музику).
  - 'Contrast semantics: ''подобається'' (aesthetic appeal, passive state) vs. ''люблю''
    (strong active enjoyment, action).'
- title: Я хочу (I want)
  slug: ya-khochu
  words: 250
  points:
  - Introduce the irregular verb 'хотіти' and its present tense conjugation.
  - Demonstrate 'Я хочу + infinitive' for actions (хочу їсти, хочу піти).
  - Demonstrate 'Я хочу + Accusative noun' for objects (хочу каву).
  - 'Include a cultural note on directness: ''Я хочу'' is standard and polite in Ukrainian
    daily life.'
- title: Порівняння (Comparing Likes)
  slug: porivniannia
  words: 200
  points:
  - 'Introduce question formats to ask others: ''А ти?'', ''Тобі подобається...?'',
    ''Ти любиш...?''.'
  - Provide mini-dialogues comparing food and free time preferences.
  - Show how to use 'а' to contrast preferences (Мені подобається музика, а тобі?).
- title: Підсумок (Summary)
  slug: summary
  words: 150
  points:
  - Provide a summary visual table contrasting 'подобається', 'люблю', and 'хочу'
    with their required grammar structures.
  - 'Self-check 1: Identify the correct construction based on context.'
  - 'Self-check 2: Identify the correct noun ending (Nominative vs Accusative chunk).'
  - 'Self-check 3: Choose the correct verb conjugation.'
