slug: this-is-i-am
title: This Is / I Am
word_target: 2000
content_outline:
- section: 'Вступ: Де дієслово «бути»?'
  words: 300
  points:
  - Explain the concept of 'Zero Copula' (absence of am/is/are in present tense)
  - Contrast English 'I am a student' with Ukrainian 'Я — студент' using visual gaps
  - 'Address the common learner error: The Phantom ''Is'' (using ''є'' unnecessarily)'
  - Briefly mention that Ukrainian is a pro-drop language (pronouns can sometimes
    be omitted, though we learn them first)
- section: 'Граматика: Займенники та «нульова зв''язка»'
  words: 700
  points:
  - Present full table of personal pronouns (я, ти, він, вона, воно, ми, ви, вони)
  - 'Explain the ''Safety Net'' rule: Always use ''Ви'' (formal/plural) with strangers
    and elders'
  - 'Detail the ''It'' Trap: Explain that inanimate objects use gendered pronouns
    (він/вона), not just ''воно'''
  - 'Demonstrate the Zero Copula pattern: Subject + Predicate (No verb needed)'
  - Clarify that the linking verb 'є' exists but is rarely used in simple speech
- section: 'Практикум: Хто це і що це?'
  words: 500
  points:
  - 'Drill the ''Transformation'' pattern: Convert ''Ivan is a student'' → ''He is
    a student'' (noun → pronoun)'
  - Practice identifying people and objects using 'Це...' (Це книга. Вона тут.)
  - 'Scenario-based register practice: Choosing ''Ти'' vs ''Ви'' for different social
    partners (boss, friend, child)'
  - Reinforce the 'Finger Pointing' concept for the word 'Це'
- section: 'Ваш вихід: Розкажіть про себе'
  words: 250
  points:
  - Construct a simple self-introduction without using 'to be' (Name, Status, Location)
  - Describe a third person (friend or family member) using correct gendered pronouns
  - 'Ask and answer simple identification questions: ''Хто це? — Це Андрій.'''
- section: 'Культура: Тонкощі «Ти» і «Ви»'
  words: 250
  points:
  - 'Explain the ''Bruderschaft'' moment: The social ritual of switching from ''Ви''
    to ''Ти'''
  - 'Discuss modern usage: Young people may switch to ''Ти'' faster, but ''Ви'' remains
    the safe default'
  - Reiterate the 'Distance vs. Closeness' social register concept
