slug: this-is-i-am
title: This Is / I Am
word_target: 1200
content_outline:
- section: 'Вступ: Хто це? Що це? (Introduction: Who/What is this?)'
  slug: intro-who-what
  words: 250
  points:
  - Introduce the demonstrative pronoun 'це' for pointing out people and objects.
  - Contrast 'Хто це?' (living beings) and 'Що це?' (inanimate objects) with clear,
    simple examples.
  - Provide English translations and IPA pronunciation for 'хто' and 'що' on their
    first occurrence.
- section: 'Презентація: Займенники (Personal Pronouns)'
  slug: presentation-pronouns
  words: 350
  points:
  - Present all 8 personal pronouns (я, ти, він, вона, воно, ми, ви, вони) in a structured,
    easy-to-read table.
  - 'Explain the ''Ви Safety Net'': why ''Ви'' is the mandatory default for strangers
    and elders to show respect.'
  - 'Cultural Hook: Explain the social transition from formal ''Ви'' to informal ''ти''.'
- section: 'Граматика: Секрет нульової зв''язки (The Zero Copula Secret)'
  slug: grammar-zero-copula
  words: 300
  points:
  - 'Explain the ''Zero Copula'' rule: Ukrainian connects subjects and predicates
    directly in the present tense without ''am/is/are''.'
  - 'Visual mapping: Contrast English ''I [am] a student'' with Ukrainian ''Я [Ø]
    студент''.'
  - 'Address the ''Phantom Is'' error: explicitly warn learners not to insert ''є''
    into these simple identity sentences.'
- section: 'Робота над помилками: Пастка «Воно» (The ''It'' Trap)'
  slug: error-it-trap
  words: 150
  points:
  - 'Address the ''It Trap'': remind learners that ''він'' and ''вона'' are used for
    inanimate objects based on their grammatical gender from A1-07.'
  - Include a mini-drill demonstrating how to replace nouns with the correct gendered
    pronouns (e.g., Стіл -> він, Книга -> вона).
- section: Підсумок та самоперевірка (Summary & Self-Check)
  slug: summary-self-check
  words: 150
  points:
  - Model a simple self-introduction using zero copula patterns (Name, role, nationality).
  - Briefly summarize the zero copula concept and the T-V register distinction.
  - Include 3-4 self-check questions to verify learner understanding before moving
    to activities.
