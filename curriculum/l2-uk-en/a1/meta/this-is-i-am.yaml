slug: this-is-i-am
title: This Is / I Am
word_target: 2000
content_outline:
- section: 'Вступ: Де дієслово «бути»?'
  words: 300
  points:
  - 'Explain the ''Zero Copula'' concept clearly: Ukrainian drops ''am/is/are'' in
    the present tense.'
  - 'Visual comparison: English ''I am a student'' vs. Ukrainian ''Я — студент'' (using
    gaps/strike-through).'
  - 'Address the ''Phantom Is'' error: explicitly warn against using ''є'' in simple
    identification.'
  - 'Briefly mention pro-drop nature: ''Я тут'' vs ''Тут'' (context dependent), but
    focus on full forms first.'
  - 'Immersion Note: Use English for these conceptual explanations.'
- section: 'Граматика: Займенники та «нульова зв''язка»'
  words: 700
  points:
  - Present the full table of Personal Pronouns (я, ти, він, вона, воно, ми, ви, вони)
    with audio icons.
  - 'Deep dive: The ''It'' Trap. Explain that ''він/вона'' apply to objects (stiles,
    lamps), not just people.'
  - 'Social Register: The ''Vi'' Safety Net. Contrast ''ти'' (friend/child) vs ''Ви''
    (stranger/elder/group).'
  - 'Pattern: Subject + Predicate (No Verb). Examples: ''Він — українець'', ''Ми —
    студенти''.'
  - 'Note on ''є'': Acknowledge it exists (definitions, philosophy) but is banned
    in simple speech.'
- section: 'Практикум: Хто це і що це?'
  words: 500
  points:
  - 'Transformation Drills: Convert nouns to pronouns (Іван → Він, Олена → Вона, Книга
    → Вона).'
  - 'Drill ''Це...'': Identifying people and objects (''Хто це? Це мама.'', ''Що це?
    Це телефон.'').'
  - 'Scenario Analysis: ''Ти'' or ''Ви''? Present situations (meeting a boss, talking
    to a cat, asking a policeman).'
  - 'Gender reinforcement: Matching objects to ''він/вона/воно'' pronouns.'
- section: 'Ваш вихід: Розкажіть про себе'
  words: 250
  points:
  - 'Model a simple self-introduction: Name + Status + Location (Я Том. Я студент.
    Я тут.).'
  - 'Task: Introduce a friend (Це Анна. Вона тут.).'
  - 'Q&A mechanics: ''Ти студент?'' — ''Так, я студент''.'
- section: 'Культура: Тонкощі «Ти» і «Ви»'
  words: 250
  points:
  - 'The ''Bruderschaft'' Moment: The ritual of switching to ''ти'' (drinking, kissing,
    agreement).'
  - 'Modern Ukraine: Young people and IT culture might use ''ти'' faster, but ''Ви''
    is always safer.'
  - 'Distance vs. Closeness: How language encodes social distance.'
  - 'Proverb/Saying: A simple phrase about respect or identity.'
