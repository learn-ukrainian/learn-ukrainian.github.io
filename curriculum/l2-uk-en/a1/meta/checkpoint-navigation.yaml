slug: checkpoint-navigation
title: 'Checkpoint: Navigation'
word_target: 3200
content_outline:
- section: 'Огляд та навичка 1: Знахідний відмінок'
  words: 220
  points:
  - 'Intro: English scaffolding for A1.2 self-assessment and checkpoint objectives.'
  - 'Accusative Case (Знахідний відмінок): Review of direct objects (inanimate unchanged,
    animate -а/-я).'
  - Direction of movement (Куди?) vs. static location (Де?).
  - 'Practical examples: ''Я бачу метро'', ''Я йду в парк''.'
  - 'Visual pattern: Table showing masculine/feminine/neuter endings in Accusative.'
- section: 'Навичка 2: Місцевий відмінок'
  words: 215
  points:
  - 'Locative Case (Місцевий відмінок): Expressing position with prepositions у/в
    and на.'
  - Noun endings -і (feminine/masculine) and -ї.
  - Consonant alternation rules (k → ts, h → z, kh → s) with mnemonic aid.
  - 'Cultural Hook: Arsenalna station (найглибша у світі) — practice ''на станції'',
    ''у метро''.'
  - 'Error check: Mandatory use of prepositions (avoiding ''Я школі'').'
- section: 'Навичка 3: Родовий відмінок'
  words: 213
  points:
  - 'Genitive Case (Родовий відмінок): Expressing absence with ''немає''.'
  - Quantities with numerals (два, три, чотири) and noun forms.
  - Preposition 'з/із' for origin (Я з Києва).
  - 'Common Error: Using Nominative after ''немає'' (e.g., *Немає час).'
  - 'Self-check question: ''Де ви зараз? Чого у вас немає?''.'
- section: 'Навичка 4: Присвійні займенники'
  words: 210
  points:
  - 'Possessive Pronouns: Agreement of ''мій'', ''твій'' with gender (мій/моя/моє).'
  - 'Invariant pronouns: ''його'', ''її'', ''їхній'' (non-changing forms).'
  - 'Agreement in cases: Using possessives in Accusative/Locative (у моїй каві, бачу
    твою зупинку).'
  - 'Comparison table: Personal vs. Possessive pronouns.'
- section: Орієнтування та практичне завдання
  words: 215
  points:
  - 'Practical Navigation: Asking ''Де знаходиться...?'' and ''Скільки коштує?''.'
  - 'Directional vocabulary: adverbs ''наліво'', ''направо'', ''прямо''.'
  - 'Integration Task (Integration Task): A dialogue scenario at ''Золоті Ворота''
    station.'
  - Using all three cases (Acc/Loc/Gen) to find a café and order coffee.
  - 'Final reflection: Readiness check for the Past Tense (a1-21).'
