slug: checkpoint-navigation
title: 'Checkpoint: Navigation'
word_target: 2000
content_outline:
- section: 'Огляд: Навігація та відмінки'
  words: 250
  points:
  - 'Мета модуля: Консолідація знань про відмінки (Знахідний, Місцевий, Родовий) перед
    переходом до A1.3.'
  - 'Самооцінка: Чи можу я запитати дорогу та вказати напрямок?'
  - 'Англійський ''scaffolding'': Важливість розрізнення ''Куди?'' (Where to?) та
    ''Де?'' (Where at?).'
  - 'Структура: Від граматичних блоків до інтегрованого діалогу.'
- section: 'Навичка 1: Знахідний відмінок (Напрямок)'
  words: 300
  points:
  - 'Функція: Куди? (Destination/Direction). Прийменники ''в'' та ''на''.'
  - 'Правило: Неістоти не змінюються (Я йду в парк). Істоти мають закінчення -а/-я
    (Я бачу брата).'
  - 'Контраст: ''Я бачу автобус'' (Знахідний) vs ''Автобус тут'' (Називний).'
  - 'Типова помилка: Використання місцевого відмінка для руху (''Я йду в парку'' —
    неправильно).'
- section: 'Навичка 2: Місцевий відмінок (Локація)'
  words: 300
  points:
  - 'Функція: Де? (Location). Обов''язкові прийменники ''у/в'', ''на''.'
  - 'Морфологія: Закінчення -і/-ї для більшості іменників (у школі, на вулиці).'
  - 'Чергування: г, к, х -> з, ц, с (книга -> у книзі, дорога -> на дорозі).'
  - 'Культурний хук: Станція ''Арсенальна'' — найглибша у світі (105.5м). ''Ми на
    станції''.'
- section: 'Навичка 3: Родовий відмінок (Відсутність та Кількість)'
  words: 300
  points:
  - 'Функція 1: Відсутність (Absence). Слово ''немає'' + зміна закінчення (немає часу,
    немає квитка).'
  - 'Функція 2: Кількість (Quantity). Числівники 2, 3, 4 + іменник (два квитки, три
    гривні).'
  - 'Функція 3: Походження (Origin). Прийменник ''з'' + зміна закінчення (Я з України,
    Я з Лондона).'
  - 'Типова помилка: ''Немає час'' замість ''Немає часу''.'
- section: 'Навичка 4: Присвійні займенники'
  words: 250
  points:
  - 'Система: Мій/моя/моє (my) та Твій/твоя/твоє (your). Узгодження з іменником.'
  - 'Незмінні форми: Його (his), Її (her), Їхній (their - standard) / Їх (colloquial).'
  - 'Практика: ''Де мій паспорт?'', ''Це твоя валіза?''.'
  - 'Таблиця узгодження: Рід та число.'
- section: 'Навичка 5: Орієнтування в місті'
  words: 300
  points:
  - 'Лексика: Наліво, направо, прямо, назад. Дієслова: йти, повертати.'
  - 'Фрази: ''Де знаходиться...?'', ''Як пройти до...?''.'
  - 'Культурний хук: Золоті Ворота. Орієнтування біля історичної пам''ятки.'
  - 'Ситуація: Покупка квитків або сувенірів (''Скільки коштує?'').'
- section: 'Інтеграція: Практика в Києві'
  words: 300
  points:
  - 'Сценарій: Турист біля метро ''Арсенальна'' шукає парк Вічної Слави.'
  - 'Діалог: Використання ''Вибачте'', ''Підкажіть будь ласка'', напрямків та відмінків.'
  - 'Чек-ліст готовності: Список вмінь (Can-do statements) для переходу на рівень
    A1.3.'
  - 'Мотивація: Підготовка до вивчення минулого часу в наступному модулі.'
