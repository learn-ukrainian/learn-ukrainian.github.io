slug: body-and-health
title: Body & Health
word_target: 1200
content_outline:
- section: 'Вступ: Частини тіла та народна мудрість'
  words: 400
  points:
  - 'Note for bridge module: English scaffolding is required for all new vocabulary
    introduction and grammar concepts to maintain A1 immersion levels.'
  - 'Introduce high-frequency body parts in a clear table format: голова, рука, нога,
    спина, живіт.'
  - 'Highlight visual pairs for singular/plural with English translations: око/очі,
    вухо/вуха, emphasizing the distinct morphological endings.'
  - 'Cultural Hook: Present the proverb «У здоровому тілі — здоровий дух» with brief
    English context on its usage in daily life and sports.'
  - 'Interactive grammar check: Briefly review location with ''де?'' (на голові, на
    руках) connecting back to module a1-30.'
- section: 'Презентація: Як ми говоримо про біль'
  words: 600
  points:
  - 'Grammar explanation (in English): Present the core structure «У мене болить +
    [singular subject]» and «У мене болять + [plural subject]».'
  - 'Learner error warning: Explicitly drill that the body part is the active subject,
    contrasting the incorrect «У мене болять голова» with the correct «У мене болить
    голова».'
  - 'Introduce State Standard §4.2.1.4: Impersonal phrases for health states «Мені
    погано / Мені добре». Explicitly warn against the direct translation error ''Я
    погано''.'
  - 'Provide vocabulary for common symptoms: температура, кашель, нежить, головний
    біль, with key collocations like ''міряти температуру''.'
  - 'Cultural Insight: Describe the Ukrainian tradition of ''траволікування'' (phytotherapy)
    and the custom of drinking tea with ''малина'' or ''калина''.'
- section: 'Діалог: У лікаря та в аптеці'
  words: 500
  points:
  - Provide a structured dialogue with a 'сімейний лікар', contrasting the person
    'лікар' with the place 'лікарня' to correct the 'Я йду в лікар' error.
  - 'Pharmacy context: Explain navigating an ''аптека'' versus an ''аптечний пункт'',
    including recognizing the ubiquitous green cross.'
  - 'Introduce functional Genitive phrases for medicine: «Дайте, будь ласка, ліки
    від...» (від кашлю, від болю).'
  - 'Present typical doctor/patient dialogue phrases: «Що вас турбує?» versus the
    patient reply «У мене висока температура».'
- section: 'Практика: Пояснення причин'
  words: 500
  points:
  - 'Grammar explanation (State Standard §4.3.2): Teach how to build complex causal
    sentences using ''бо'' and ''тому що'' (e.g., «Я не прийшов, бо я хворий»).'
  - 'Lexical distinction: Contrast ''хворий'' (adjective describing a state) with
    ''хворіти'' (verb describing an ongoing process).'
  - 'Provide two contrasting roleplays: A casual dialogue with a friend about feeling
    unwell versus a formal dialogue at the polyclinic.'
  - 'Summary: Recap the ''У мене болить'' construction and the usage of Dative pronouns
    for expressing health conditions.'
