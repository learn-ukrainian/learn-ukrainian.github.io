slug: body-and-health
title: Body & Health
word_target: 2150
content_outline:
- section: 'Частини тіла та симптоми: Що болить?'
  words: 251
  points:
  - 'Vocabulary: Basic body parts (голова, рука, нога, живіт, горло) with IPA and
    stress'
  - 'Grammar: The construction ''У мене болить + [nominative noun]'' (Head hurts)'
  - 'Visual Table: Singular ''болить'' vs Plural ''болять'' (очі, вуха, руки, ноги)'
  - 'Grammar: Expressing state with Dative ''Мені погано'' vs ''Мені добре'' (contrast
    with English ''I am bad'')'
  - 'Symptoms: ''У мене температура'', ''кашель'', ''нежить'' (runny nose)'
  - 'Cultural Proverb: ''У здоровому тілі — здоровий дух'''
- section: 'В аптеці та у лікаря: Лікування'
  words: 227
  points:
  - 'Vocabulary pairs: Хворий (sick person) / Здоровий (healthy)'
  - 'The verb ''хворіти'' vs ''боліти'': distinct usage explanation'
  - 'At the Pharmacy: Asking for medicine (''ліки від кашлю'', ''від головного болю'')'
  - 'Cultural Hook: Phytotherapy basics (tea with raspberry/малина for colds)'
  - 'At the Doctor''s: Persona ''Polyclinic Nurse'' phrases (''Що вас турбує?'', ''Відкрийте
    рот'', ''Покажіть горло'')'
  - 'Grammar connection: Using ''треба'' (need) + infinitive for advice (''Треба пити
    чай'')'
- section: 'Практика: Діалоги про здоров''я'
  words: 342
  points:
  - 'Dialogue 1 (Casual): Calling a friend/work to say ''Я не прийду, бо я хворий''
    (using ''бо/тому що'')'
  - 'Dialogue 2 (Pharmacy): Buying medicine and herbal tea; specific requests'
  - 'Dialogue 3 (Doctor): Full interaction — describing symptoms, getting advice'
  - 'Common Error Trap: Fixing ''Я болю'' -> ''У мене болить'' and ''Я погано'' ->
    ''Мені погано'''
  - 'Narrative practice: Briefly describing a family member''s health (prepares for
    next module)'
  - 'Final check: Reviewing body parts and ''болить/болять'' agreement'
