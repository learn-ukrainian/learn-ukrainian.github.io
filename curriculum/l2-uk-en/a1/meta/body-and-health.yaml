slug: body-and-health
title: Body & Health
word_target: 2000
content_outline:
- section: 'Розминка: Частини тіла'
  words: 250
  points:
  - Introduction to body parts (голова, рука, нога, спина, живіт)
  - 'Visual focus: Singular vs Plural (око/очі, вухо/вуха) with distinct endings'
  - 'Cultural hook: Proverb «У здоровому тілі — здоровий дух»'
  - 'Interactive check: Pointing to body parts'
- section: 'Граматика: Конструкція «У мене болить...»'
  words: 450
  points:
  - 'Core structure: «У мене болить + [singular noun]» vs «У мене болять + [plural
    noun]»'
  - 'Grammar alert: Agreement with the body part (subject), not the person'
  - 'State expressions: «Мені погано» vs «Мені добре» (Dative pronouns introduced
    as chunks)'
  - 'Symptom vocabulary: температура, кашель, нежить, головний біль'
  - 'Collocations: «міряти температуру», «висока температура»'
- section: 'Лексика: Вирази про здоров''я'
  words: 300
  points:
  - 'Distinction: «хворий» (adjective/state) vs «хворіти» (verb/process)'
  - 'Reflexive verb usage: «почувати себе» (How do you feel?)'
  - 'Necessity: «Мені потрібно до лікаря» (using ''до'' + Genitive for person)'
  - 'Register check: Casual «Я захворів» vs Formal «У мене симптоми...»'
- section: 'Лексика: В аптеці'
  words: 350
  points:
  - 'Cultural insight: Herbal teas (малина, калина) and phytotherapy popular in Ukraine'
  - 'Buying medicine: «Дайте, будь ласка, ліки від...» (Genitive: від кашлю, від болю)'
  - 'Key nouns: таблетки, сироп, вітаміни, рецепт'
  - 'Dialogue phrases: «Скільки коштує?», «Як приймати?»'
- section: 'Ситуація: У лікаря'
  words: 350
  points:
  - 'Typical dialogue flow: Greeting → Complaint → Examination → Advice'
  - 'Doctor''s questions: «Що вас турбує?», «Де болить?»'
  - 'Patient''s answers: «Я погано сплю», «У мене немає апетиту»'
  - 'Simple advice (Imperative familiarization): «Пийте чай», «Відпочивайте»'
- section: 'Практикум: Діалоги про здоров''я'
  words: 300
  points:
  - 'Scenario 1: Describing symptoms to a friend (Casual)'
  - 'Scenario 2: At the doctor''s office (Formal, using «тому що/бо»)'
  - 'Scenario 3: Buying medicine at the pharmacy'
  - 'Final check: Matching symptoms to remedies'
