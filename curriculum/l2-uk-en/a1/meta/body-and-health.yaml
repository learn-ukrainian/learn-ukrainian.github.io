slug: body-and-health
title: Body & Health
word_target: 1200
content_outline:
- section: 'Вступ: Частини тіла (Introduction: Body Parts)'
  slug: introduction-body-parts
  words: 300
  points:
  - 'Introduce high-frequency body parts: голова, рука, нога, спина, живіт using simple
    tables.'
  - 'Highlight visual pairs for singular/plural with English translations: око/очі,
    вухо/вуха, emphasizing the ending changes.'
  - 'Cultural Hook: Present the proverb «У здоровому тілі — здоровий дух» and its
    usage.'
  - Briefly review location prepositions with 'де?' (на голові, на руках) connecting
    back to earlier modules.
- section: 'Презентація: Як ми говоримо про біль (Presentation: Expressing Pain)'
  slug: presentation-expressing-pain
  words: 350
  points:
  - 'Explain the grammar of pain: «У мене болить + [singular subject]» and «У мене
    болять + [plural subject]».'
  - Explicitly address the common error of treating 'I' as the subject; clarify that
    the body part does the hurting.
  - 'Introduce symptoms vocabulary: температура, кашель, нежить, головний біль.'
  - 'Explain impersonal health states with Dative pronouns: «Мені погано», «Мені добре»,
    warning against «Я погано».'
- section: 'Практика: У лікаря та в аптеці (Practice: At the Doctor''s and Pharmacy)'
  slug: practice-doctor-pharmacy
  words: 300
  points:
  - Provide a simple dialogue with a 'сімейний лікар', practicing «Що вас турбує?»
    and describing symptoms.
  - Contrast 'лікар' (person) with 'лікарня' (place) to prevent common movement errors.
  - 'Introduce pharmacy context (аптека) and functional phrases: «Дайте, будь ласка,
    ліки від...».'
  - 'Cultural context: Mention phytotherapy and drinking tea with raspberry (чай з
    малиною) as a common remedy.'
- section: 'Підсумок: Причини та самоперевірка (Summary: Causes and Self-Check)'
  slug: summary-causes-self-check
  words: 250
  points:
  - Teach how to construct basic causal sentences using 'бо' and 'тому що' (e.g.,
    «Я вдома, бо я хворий»).
  - Contrast 'хворий' (adjective/state) with 'хворіти' (verb/process) briefly.
  - Recap the core «У мене болить» structure and essential vocabulary.
  - Include 3-4 self-check questions to verify understanding of symptoms and body
    parts.
