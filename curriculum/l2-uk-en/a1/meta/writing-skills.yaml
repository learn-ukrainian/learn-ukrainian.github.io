slug: writing-skills
title: Writing Skills
word_target: 2000
content_outline:
- section: Поштова листівка
  words: 450
  points:
  - 'English scaffolding: Briefly introduce the goal of writing a short postcard in
    Ukrainian.'
  - 'Postcard template (H3): Break down the structure into Greeting (Привіт з + Genitive),
    Body (3-4 simple sentences about the weather or sights), and Sign-off (Бувай +
    Signature).'
  - 'Grammar focus (H3): Explicitly teach the ''Привіт з + Genitive'' construction
    with 3 clear examples (з Києва, зі Львова, з Одеси).'
  - 'Model postcard (H3): Provide a fully translated model postcard from a Ukrainian
    city to demonstrate the flow.'
- section: Анкета
  words: 450
  points:
  - 'English scaffolding: Explain the importance of forms (анкета) and standard date
    formats (DD.MM.YYYY).'
  - 'Vocabulary breakdown (H3): Define essential fields: Прізвище, Ім''я, По батькові,
    Дата народження, Стать, Телефон, Електронна пошта.'
  - 'Gender and identity (H3): Explain the ''Стать'' options explicitly: forms use
    adjectives (чоловіча/жіноча), not nouns (чоловік/жінка). Briefly mention ''По
    батькові'' as a standard part of Ukrainian identity.'
  - 'Visual guide (H3): Provide a visual table representing a blank Ukrainian registration
    form mapped to English translations.'
- section: Про себе
  words: 400
  points:
  - 'English scaffolding: Guide learners to combine previously learned A1 phrases
    into a cohesive 30-50 word self-introduction.'
  - 'Sentence templates (H3): Provide a structured template for writing: Мене звати...
    Мені ... років. Я з... Я працюю/вчуся... Моє хобі...'
  - 'Grammar reminder (H3): Highlight the use of Dative in ''Мені ... років'' to preempt
    literal translation errors from English.'
  - 'Character profiles (H3): Show 3 short, distinct character profiles (e.g., a student,
    a professional) in Ukrainian with English translations.'
- section: Конверт та адреса
  words: 400
  points:
  - 'English scaffolding: Introduce vocabulary for addressing an envelope (конверт,
    марка, пошта).'
  - 'Address format (H3): Explain that the modern Ukrainian address format is Name
    → Street → City → Postcode, aligning with European standards.'
  - 'Envelope formulas (H3): Introduce Dative for ''Кому'' (To whom) and Genitive
    for ''Від кого'' (From whom).'
  - 'Abbreviations (H3): Define essential address abbreviations: вул. (вулиця), буд.
    (будинок), кв. (квартира).'
- section: Практика
  words: 300
  points:
  - 'English scaffolding: Explain the goal of the practice exercises.'
  - 'Guided form filling (H3): Map sample personal data to correct form fields.'
  - 'Postcard prompt (H3): Provide a writing prompt (''You are in Odesa. Write 4 sentences.'')
    accompanied by a model answer.'
  - 'Self-introduction (H3): Encourage the learner to write their own 40-word ''Про
    себе'' paragraph based on the section template.'
