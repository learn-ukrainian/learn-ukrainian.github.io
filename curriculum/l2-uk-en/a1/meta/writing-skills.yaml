slug: writing-skills
title: Writing Skills
word_target: 2000
content_outline:
- section: Поштова листівка
  words: 450
  points:
  - 'Provide English scaffolding: Explain the goal of writing a short postcard from
    a Ukrainian city.'
  - 'Introduce the standard postcard template using H3s: Greeting, Body (3-4 sentences),
    Sign-off.'
  - 'Grammar focus: Explain the ''Привіт з + Genitive'' construction (e.g., Привіт
    з Києва, Привіт зі Львова).'
  - Provide a fully translated example of a complete postcard.
- section: Анкета
  words: 450
  points:
  - Introduce the concept of 'анкета' (form) and its importance in Ukrainian daily
    life.
  - 'Breakdown form fields: Прізвище, Ім''я, По батькові, Дата народження, Стать,
    Телефон, Електронна пошта.'
  - 'Explain cultural nuances: The use of DD.MM.YYYY for dates and the standard options
    for gender (чоловіча/жіноча).'
  - Include a visual table representing a blank Ukrainian form with English translations.
- section: Про себе
  words: 400
  points:
  - Guide the learner on how to synthesize previous knowledge into a short 'About
    Me' paragraph (30-50 words).
  - 'Provide the template: Мене звати... Мені ... років. Я з... Я працюю/вчуся...
    Моє хобі...'
  - Show 2-3 short, distinct examples of character profiles (e.g., a student, a professional)
    with English translations.
- section: Конверт та адреса
  words: 400
  points:
  - 'Explain the modern Ukrainian address format: specific to general (Name → Street
    → City → Postcode).'
  - Introduce Dative (Кому) and Genitive (Від кого) briefly as formulaic phrases used
    on envelopes.
  - 'Define essential abbreviations: вул. (вулиця), буд. (будинок), кв. (квартира).'
  - Provide a visual layout of a correctly addressed envelope.
- section: Практика
  words: 300
  points:
  - 'Provide a guided writing prompt: Ask the learner to mentally fill out a provided
    blank form.'
  - 'Provide a postcard prompt: ''You are in Odesa. Write 4 sentences using the template.''
    Include the model answer.'
  - Encourage the learner to write their own 40-word 'Про себе' text based on the
    section template.
