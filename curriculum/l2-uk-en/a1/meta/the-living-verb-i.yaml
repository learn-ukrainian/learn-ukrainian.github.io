slug: the-living-verb-i
title: The Living Verb I
word_target: 2000
content_outline:
- section: 'Вступ: Від статичних описів до живих дій'
  words: 300
  points:
  - Contrast static 'This is a book' (Це книга) with dynamic 'I read a book' (Я читаю
    книгу) to show the power of verbs.
  - Introduce the concept of 'Living Verbs' — words that change their shape (conjugate)
    to match the person.
  - 'Define the scope: First Conjugation verbs ending in -ати (читати, працювати)
    as the most common daily actions.'
  - 'Scaffolding (English): Explain that unlike English (read -> read), Ukrainian
    verbs carry ''who'' and ''when'' inside their endings.'
- section: 'Теорія: Магія закінчень -ати'
  words: 800
  points:
  - 'Visual Master Key: Present the Stem + Ending formula (чит + аю) clearly.'
  - Step-by-step conjugation of 'читати' for all persons (я, ти, він/вона, ми, ви,
    вони) with English equivalents.
  - 'Highlight the specific endings: -ю (I), -ш (You), -мо (We), -ть (They).'
  - 'Pro-drop rule: Explain that ''Читаю'' is a complete sentence because the ending
    ''-ю'' already says ''I''.'
  - 'Common Error Alert: Warn against ''Я читати'' — the verb must ''live'' and change!'
  - 'Imperfective Aspect note: Briefly mention these describe ongoing processes (process
    vs. result).'
- section: 'Практика: Використовуємо дієслова в житті'
  words: 600
  points:
  - 'Drill 1: Matching pronouns to endings (Ти... -єш, Ми... -ємо).'
  - 'Drill 2: Forming SVO sentences with inanimate masculine/neuter objects (Я читаю
    журнал, Ми слухаємо радіо) to avoid case complexity.'
  - 'Contrast examples: ''I work, but you rest'' (Я працюю, а ти відпочиваєш).'
  - 'Narrative building: Construct a simple ''Day in the Life'' sequence using only
    -ати verbs.'
- section: 'Культурний контекст: Сила українського слова'
  words: 300
  points:
  - 'Cultural Hook: Discuss the proverb ''Птицю пізнати по пір''ю...'' and the value
    of eloquence.'
  - 'Historical Note: Mention the ''Apostol'' (1574) to connect the verb ''читати''
    to Ukrainian history.'
  - 'The ''Master Key'' metaphor: Reiterate that knowing this one pattern unlocks
    hundreds of verbs.'
  - 'Motivation: Encourage learners that accurate endings are the first step to sounding
    native.'
