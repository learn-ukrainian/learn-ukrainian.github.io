slug: the-living-verb-i
title: The Living Verb I
word_target: 2000
content_outline:
- section: Вступ
  words: 400
  points:
  - Introduce the shift from 'this is' to 'I do' (building on A1-05 'My World - Objects').
    Explain that English scaffolding will be used for all grammar concepts.
  - 'Historical hook: Mention the ''Apostol'' (1574) by Ivan Fedorov, connecting the
    verb ''читати'' to Ukraine''s deep literacy tradition.'
  - 'State Standard alignment (§4.2.4.1): Frame the focus on indicative mood present
    tense using high-frequency verbs (читати, працювати).'
- section: Презентація
  words: 700
  points:
  - Provide a clear 'Stem + Ending' table (e.g., чит + аю) to visualize the First
    Conjugation pattern (-ати → -аю, -аєш, -ає, -аємо, -аєте, -ають).
  - 'Explain the Imperfective Aspect using English scaffolding: these verbs describe
    ongoing/habitual actions (process vs. result).'
  - 'Explain the Pro-drop feature: the ending itself contains the pronoun, making
    ''Я/Ти'' optional and allowing for a natural Ukrainian rhythm.'
  - Show the universal application of this pattern by comparing the conjugations of
    'читати' and 'працювати' side-by-side.
- section: Практика
  words: 600
  points:
  - 'Error Correction drill: Target ''Infinitive Abuse'' by having learners replace
    ''Я читати'' with ''Я читаю''.'
  - 'Error Correction drill: Target ''Pronoun Overuse'' with exercises that build
    sentences without pronouns (''Читаю. Працюю. Знаю.'').'
  - 'SVO Sentence Practice: Combine verbs with inanimate masculine/neuter objects
    (журнал, радіо) where Nominative = Accusative to avoid early case confusion.'
  - 'Contextual application: Create a short routine description using multiple target
    verbs (e.g., ''працювати вдома, слухати радіо'').'
- section: Культурний аспект та підсумок
  words: 300
  points:
  - Analyze the proverb 'Птицю пізнати по пір'ю, а людину по мові' to emphasize the
    cultural value of grammatical accuracy.
  - Use the 'Master Key' metaphor to summarize how mastering this single conjugation
    unlocks a vast portion of the Ukrainian language.
  - Recap the transition from English instructional scaffolding into initial Ukrainian
    action statements.
