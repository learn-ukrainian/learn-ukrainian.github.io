slug: the-living-verb-i
title: The Living Verb I
word_target: 1200
content_outline:
- section: Вступ
  slug: introduction
  words: 250
  points:
  - 'The shift from static descriptions to dynamic actions: moving from ''this is''
    to ''I do''.'
  - Introduce the target high-frequency verbs, such as читати and працювати, in simple
    context.
  - 'Cultural hook: Connect the verb читати to the 1574 ''Apostol'', highlighting
    Ukraine''s deep-rooted literacy tradition.'
- section: 'Презентація: The -ати Pattern'
  slug: presentation-the-pattern
  words: 350
  points:
  - 'Visualize the First Conjugation pattern (Class I): drop ''-ти'' and add the personal
    endings (-ю, -єш, -є, -ємо, -єте, -ють) using clear tables.'
  - 'Introduce the ''Pro-drop'' feature: explain that because the verb ending clearly
    shows who is doing the action, pronouns like ''Я'' or ''Ми'' are often dropped
    for a natural rhythm.'
  - 'Explain the Imperfective Aspect simply using English scaffolding: these verbs
    describe ongoing actions or habits (process vs. result).'
- section: Практика та типові помилки
  slug: practice-and-errors
  words: 350
  points:
  - 'Error Correction 1 (''Infinitive Abuse''): Drill the transition from the incorrect
    ''Я читати'' to the correct ''Я читаю''.'
  - 'Error Correction 2 (''Pronoun Overuse''): Practice forming and reading simple
    sentences without the constant repetition of ''Я''.'
  - 'Contextual SVO Sentences: Practice combining target verbs with inanimate masculine
    or neuter objects (e.g., читаю журнал, слухаю радіо), where Nominative equals
    Accusative, to avoid early case confusion.'
- section: Підсумок
  slug: summary
  words: 250
  points:
  - 'The ''Master Key'' concept: summarize how mastering this single conjugation pattern
    unlocks hundreds of everyday Ukrainian verbs.'
  - Recap the essential conjugation table and the pro-drop rule.
  - 'Self-check questions: 1. What ending corresponds to ''ми''? 2. Do you always
    need to use the pronoun ''я''? 3. How do you form the stem of ''читати''? 4. How
    would you say ''I am reading''?'
