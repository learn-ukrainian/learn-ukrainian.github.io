slug: the-cyrillic-code-ii
title: The Cyrillic Code II
word_target: 2000
content_outline:
- section: 'Розминка: Повернення до Абетки'
  words: 250
  points:
  - Quick visual recall of Part I letters to build confidence (5-minute review).
  - 'Diagnostic reading challenge: simple words using only Module 1 letters.'
  - 'The ''Identity Gap'': Introduce why the remaining 14 letters are the key to sounding
    truly Ukrainian (not just like ''Russian with an accent'').'
  - 'Immersion Level Note: English instructions, clearly marked Ukrainian examples.'
- section: 'Презентація: Унікальні літери та звуки'
  words: 800
  points:
  - 'The Unique Seven (Г, Ґ, Ж, Ш, Щ, Ч, Ц): Explicit instruction on Г (voiced glottal
    fricative) vs Ґ (voiced velar plosive). The ''Identity Letters''.'
  - 'The Iotated Four (Є, Ї, Ю, Я): Explain the mechanics (Y + Vowel) and their dual
    function (sound vs softening).'
  - 'Cultural Hook: The Letter Ї as a symbol of resistance and distinctness.'
  - 'The Soft Sign (Ь): Physical pronunciation guide (tongue position). Examples per
    Standard: Львів, шість.'
  - 'Hard И vs Soft І: The ''Smile (І) vs Grin (И)'' technique. Visual/physical cues
    for differentiation.'
  - 'Short Й: Brief comparison to English ''y'' (boy/toy) vs ''j'' (jump).'
- section: 'Практика: Читаємо та розрізняємо'
  words: 500
  points:
  - 'Guided Reading: High-frequency words integrating new letters (центр, чай, школа,
    гарний).'
  - 'Differentiation Drills: Minimal pair work for Г/Ґ and И/І to fix common errors.'
  - 'Softness Drill: Reading words with Ь to practice palatalization (день, тінь).'
  - 'Euphony Check: Practice smooth transitions with iotated vowels (Європа, яблуко).'
- section: 'Продукція: Активне читання'
  words: 250
  points:
  - 'Phrase Reading: Combining known words into meaningful chunks (''Добрий день'',
    ''Гарна школа'').'
  - 'Self-Assessment Checklist: Can you hear the difference between И and І? Can you
    say Г correctly?'
  - 'The Kyiv Challenge: Reading ''Київ'' correctly (Ky-yiv) vs the Russian ''Kiev''.
    State Standard §4.1.1 alignment.'
- section: 'Культурний контекст: Українська ідентичність'
  words: 200
  points:
  - 'Kyiv Spelling: The linguistic reason behind ''Kyiv'' vs ''Kiev'' (transliteration
    of И vs Russian E).'
  - 'The Repressed Letter Ґ: Historical context of the 1933 ban and 1990 restoration.'
  - 'Handwriting Note: Warning about italic forms of т, д, г to prevent reading confusion.'
