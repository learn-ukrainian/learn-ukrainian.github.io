slug: the-cyrillic-code-ii
title: The Cyrillic Code II
word_target: 2000
content_outline:
- section: 'Розминка: Повернення до Абетки'
  words: 250
  points:
  - Quick review of the first 19 letters from Module 1 (visual recall).
  - 'Diagnostic reading: simple words using only Module 1 letters to build confidence.'
  - 'Introduction of the ''Identity Letters'' concept: why the remaining 14 letters
    matter for sounding Ukrainian.'
  - 'Immersion Note: English instructions, Ukrainian examples.'
- section: 'Презентація: Унікальні літери та звуки'
  words: 800
  points:
  - 'The Unique Seven (Г, Ґ, Ж, Ш, Щ, Ч, Ц): Focus on the Г (voiced ''h'') vs Ґ (hard
    ''g'') distinction.'
  - 'The Iotated Four (Є, Ї, Ю, Я): Explain ''y-sound + vowel'' mechanic and how they
    soften previous consonants.'
  - 'Cultural Spotlight: The letter Ї as a symbol of independence (Mariupol resistance
    context).'
  - 'The Soft Sign (Ь): Physical guide to pronunciation (tongue flat against palate).
    Examples: Львів, шість, день.'
  - 'Hard И vs Soft І: The ''Grin vs Smile'' technique. Visual/physical cue for differentiation.'
  - 'Short Й: Brief comparison to English ''y'' in ''boy''.'
- section: 'Практика: Читаємо та розрізняємо'
  words: 500
  points:
  - 'Guided reading: High-frequency words with new letters (центр, чай, школа, гарний).'
  - 'Sound discrimination drill: Minimal pairs or near-pairs for Г/Ґ and И/І.'
  - 'Softness drill: Reading words with and without Ь to hear the difference (стан
    vs стань - if applicable words exist at A1, or just correct pronunciation of Ь
    words).'
  - 'Euphony Check: Reading words with iotated vowels (Європа, яблуко).'
- section: 'Продукція: Активне читання'
  words: 250
  points:
  - 'Reading full phrases: ''Добрий день'', ''Гарна школа'' (combining vocab).'
  - 'Self-Assessment: Can you distinguish the unique sounds?'
  - 'Challenge: Reading ''Київ'' correctly (Key-yeev) vs ''Kiev''.'
- section: 'Культурний контекст: Українська ідентичність'
  words: 200
  points:
  - 'Kyiv Spelling: Why ''Kyivskyi'' and ''Ukraina'' are spelled that way (State Standard
    §4.1.1 alignment).'
  - 'The Story of Ґ: The 1933 ban and 1990 restoration (The ''Repressed Letter'').'
  - 'Italic Visuals: Warning about how lowercase ''т'', ''д'', ''г'' look different
    in italics/handwriting.'
