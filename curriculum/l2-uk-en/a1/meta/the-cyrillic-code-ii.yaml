slug: the-cyrillic-code-ii
title: The Cyrillic Code II
word_target: 2000
content_outline:
- section: 'Розминка: Повернення до Абетки'
  words: 200
  points:
  - Швидке повторення перших 19 літер з модуля A1-01 (базові приголосні та голосні).
  - Діагностичне читання простих слів для перевірки засвоєння попереднього матеріалу.
  - 'Анонс теми: сьогодні ми вивчимо «Літери Ідентичності», які роблять українську
    мову унікальною.'
- section: 'Презентація: Унікальні літери та звуки'
  words: 900
  points:
  - 'Унікальна Сімка (Г, Ґ, Ж, Ш, Щ, Ч, Ц): чітке розрізнення Г (voiced ''h'') та
    Ґ (hard ''g''). Виправлення типової помилки вимови Г як англійського ''g''.'
  - 'Чотири Йотовані (Є, Ї, Ю, Я): пояснення пом''якшення та милозвучності. Як вони
    згладжують збіг приголосних.'
  - 'Літера Ї як символ опору: історія з Маріуполя, відсутність у російській абетці.'
  - 'М''який знак (Ь): пояснення артикуляції (язик пласко до піднебіння). Приклади
    за Держстандартом: Львів, шість, день.'
  - 'Тверда И проти М''якої І: аналогія «Усмішка (І) проти Оскалу (И)». І пом''якшує,
    И залишає твердим.'
  - 'Коротке Й: порівняння з англійським ''y'' (boy, toy).'
- section: 'Практика: Читаємо та розрізняємо'
  words: 450
  points:
  - 'Читання високочастотних слів з новими літерами: центр, чай, школа, гарний.'
  - Вправа на розрізнення звуків Г та Ґ (слухання та повторення).
  - Тренування вимови И та І у словах *жити*, *пити* vs *діти*, *літо*.
  - Читання слів з апострофом та м'яким знаком (сім'я, день, тінь).
- section: 'Продукція: Активне читання'
  words: 250
  points:
  - 'Читання повних слів та простих фраз: *Добрий день*, *Гарна школа*.'
  - 'Самоперевірка: чи можу я правильно прочитати слово *Київ*?'
  - Читання слів *Європа*, *яблуко* в контексті (початок речення vs середина).
- section: 'Культурний контекст: Українська ідентичність'
  words: 300
  points:
  - 'Kyiv vs Kiev: чому транслітерація має значення (Kyivskyi, Ukraina). Приклади:
    Олена, олівець.'
  - 'Репресована літера Ґ: заборона 1933-1990 років як спроба наблизити мову до російської.'
  - 'Повернення історичної правди через мову: чому важливо вживати Ґ у слові *ґанок*.'
  - 'Італійські/курсивні варіанти літер: попередження про візуальні відмінності (Т
    vs *т*, Д vs *д*).'
