slug: the-cyrillic-code-ii
title: The Cyrillic Code II
word_target: 2000
content_outline:
- section: Вступ
  words: 300
  points:
  - 'Note on Immersion: explicitly state the need for English scaffolding to explain
    phonetics.'
  - Briefly review the first 19 letters (from a1-01) with a quick reading diagnostic
    to build confidence.
  - 'Introduce the ''Identity Letters'' concept: frame the remaining 14 letters not
    just as sounds, but as keys to Ukrainian distinctness and history.'
- section: Унікальні приголосні
  words: 450
  points:
  - Present the 'Unique Seven' consonants (Г, Ґ, Ж, Ш, Щ, Ч, Ц) with clear English
    phonetic scaffolding.
  - 'Directly address the Г vs Ґ distinction: define Г as a voiced ''h'' (head) and
    Ґ as the hard ''g'' (go), providing minimal pairs.'
  - 'Cultural Hook: tell the story of the repressed letter Ґ (banned 1933-1990) as
    a symbol of Soviet erasure and modern restoration.'
- section: Йотовані голосні та М’який знак
  words: 450
  points:
  - Introduce the Iotated Four (Є, Ї, Ю, Я), explaining their function in smoothing
    consonant clusters (euphony).
  - 'Cultural Hook: highlight the letter Ї as a modern symbol of resistance, referencing
    its use in 2022 Mariupol graffiti.'
  - 'Explain the Soft Sign (Ь) mechanically: correct the ''silent letter'' myth by
    describing palatalization (tongue pressed flat against the roof of the mouth).'
  - 'Drill State Standard §4.1.3 examples: ''Львів'', ''шість'', and ''день'', breaking
    down the phonetic shift.'
- section: Голосні та напівголосні
  words: 400
  points:
  - Contrast Hard I (И) and Soft I (І) using the 'Smile (І) vs Grin (И)' physiological
    technique.
  - 'Demonstrate the И/І distinction using State Standard §4.1.4 minimal pairs: ''Рим
    – Рівне''.'
  - Introduce the Short Y (Й) and explain its usage in high-frequency collocations,
    separating it from the English 'y' sound.
- section: Практика та вимова
  words: 400
  points:
  - 'Provide contrast drills for common hearing errors: И vs І, Г vs Ґ, and hard vs
    soft consonants (С vs СЬ).'
  - 'Apply State Standard §4.1.1 by practicing the correct spelling and pronunciation
    of identity markers: ''Київ'', ''київський'', ''Україна'', ''українець''.'
  - 'Guided reading practice: feature high-frequency vocabulary (центр, чай, школа,
    гарний, жити, день) with specific focus on proper word stress and phonetic accuracy.'
