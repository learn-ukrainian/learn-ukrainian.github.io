slug: the-cyrillic-code-ii
title: The Cyrillic Code II
word_target: 2000
content_outline:
- section: Вступ
  words: 300
  points:
  - 'Note on Immersion: Explicitly establish the 10-50% A1 immersion band; state that
    clear English scaffolding will be used to explain phonetics safely and thoroughly.'
  - Quickly review the first 19 letters (from a1-01) with a brief diagnostic reading
    exercise to build confidence before introducing new material.
  - 'Introduce the ''Identity Letters'' concept: frame the final 14 letters as keys
    to Ukrainian distinctness and linguistic sovereignty, independent of any other
    language.'
- section: Унікальні приголосні
  words: 450
  points:
  - Present the 'Unique Seven' consonants (Г, Ґ, Ж, Ш, Щ, Ч, Ц) using clear English
    phonetic equivalents, dedicating an H3 to each or grouped logically by sound type.
  - 'Provide a dedicated H3 for the Г vs Ґ distinction: define Г as a voiced ''h''
    (head) and Ґ as the hard ''g'' (go), using minimal pairs to avoid the common learner
    error of blending them.'
  - 'Cultural Hook: Integrate a callout about the repressed letter Ґ (banned 1933-1990)
    as an act of colonial erasure and its modern role as a symbol of restored Ukrainian
    identity.'
- section: Йотовані голосні та М’який знак
  words: 450
  points:
  - Introduce the Iotated Four (Є, Ї, Ю, Я) in their own H3, explaining their function
    in euphony and smoothing consonant clusters.
  - 'Cultural Hook: Highlight the letter Ї as a unique symbol of modern Ukrainian
    resistance, detailing its use in 2022 Mariupol graffiti.'
  - 'Explain the Soft Sign (Ь) mechanically in an H3: debunk the ''silent letter''
    myth by describing palatalization (pressing the tongue flat against the roof of
    the mouth).'
  - 'Drill State Standard §4.1.3 examples: ''Львів'', ''шість'', and ''день'', providing
    IPA for their first occurrence and breaking down the phonetic shift.'
- section: Голосні та напівголосні
  words: 400
  points:
  - Contrast Hard I (И) and Soft I (І) using the 'Smile (І) vs Grin (И)' physiological
    technique in a dedicated H3.
  - 'Demonstrate the И/І distinction using State Standard §4.1.4 minimal pairs: ''Рим
    – Рівне'', explaining the precise tongue and jaw position for each.'
  - Introduce the Short Y (Й) in an H3, explaining its usage in high-frequency collocations
    and contrasting it with the English 'y' sound.
- section: Практика та вимова
  words: 400
  points:
  - 'Provide focused contrast drills for common hearing errors: И vs І, Г vs Ґ, and
    hard vs soft consonants (С vs СЬ), using simple visual tables and English guidance.'
  - 'Apply State Standard §4.1.1 by having learners practice the correct spelling
    and pronunciation of core identity markers: ''Київ'', ''київський'', ''Україна'',
    ''українець''.'
  - 'Guided reading practice: Feature sentences using high-frequency vocabulary (центр,
    чай, школа, гарний, жити, день) with specific focus on proper word stress and
    phonetic accuracy.'
