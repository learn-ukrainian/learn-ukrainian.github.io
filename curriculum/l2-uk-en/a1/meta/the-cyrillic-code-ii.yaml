slug: the-cyrillic-code-ii
title: The Cyrillic Code II
word_target: 1200
content_outline:
- section: Вступ — Introduction
  words: 200
  points:
  - Establish the A1 immersion band (10-15%), explicitly using English scaffolding
    to safely introduce these new phonetic concepts.
  - Provide a brief H3 reading exercise with 3 words from Code I (мама, сума, луна)
    to build immediate confidence.
  - 'State the module goal in a dedicated H3: Mastering 7 new letters (5 приголосні:
    К, Р, Б, В, Д; 2 голосні: И, І) plus О to read real Ukrainian words.'
- section: 'Голосні — Vowels: И, І, О'
  words: 450
  points:
  - Create a dedicated H3 for each vowel (И, І, О) detailing its phonetic definition
    and physical articulation cues (e.g., relaxed jaw for И, smile for І).
  - Contrast 'И' and 'І' in an H3 using the State Standard minimal pair 'Рим – Рівне'
    to emphasize the phonemic distinction.
  - Include a Cultural Hook callout box about the dotted 'І' as a unique symbol of
    Ukrainian typography and identity.
  - Note explicitly that Ukrainian unstressed 'О' maintains absolute phonetic purity
    (/o/) and never reduces to an 'a' sound.
- section: 'Приголосні — Consonants: К, Р, Б, В, Д'
  words: 500
  points:
  - Dedicate an H3 to each consonant, providing clear phonetic guides and high-frequency
    examples (кіт, банан, дім).
  - Create a specific H3 for 'visual trap letters' ('Р' as trilled /r/ and 'В' as
    /v/ or /w/), contrasting them carefully with Latin P and B.
  - Frame the pronunciation of the trilled 'Р' independently, emphasizing the active
    tongue-tip articulation.
- section: Перші слова — First Words
  words: 400
  points:
  - Demonstrate reading core vocabulary in an H3 by combining the 13 known letters
    to form real words (вода, молоко, кіно, рука).
  - 'Introduce simple collocations and noun phrases in dedicated H3s with English
    translations: «Банан і слива», «Дім і вулиця».'
  - Conclude with a short, fully decodable reading exercise paragraph using only the
    13 known letters, proving learners can read real words.
- section: Практика — Practice
  words: 250
  points:
  - Design visual contrast drills in an H3 to help learners distinguish trap letters
    ('Р' vs Latin P, 'В' vs Latin B).
  - Include contextual practice drills in an H3 for 'И' vs 'І' to reinforce the hard/soft
    phonetic distinction.
  - Provide a self-check reading list where learners decode high-frequency words without
    transliteration or IPA.
- section: Підсумок — Summary
  words: 200
  points:
  - 'Recap the milestone in an H3: knowing 13 out of 33 letters (4 голосні, 9 приголосні)
    allows reading first words.'
  - Explicitly list the 7 new letters and 'О' mastered in a summary table.
  - Preview the next module (The Cyrillic Code III) which introduces voiced/voiceless
    pairs, maintaining motivation.
