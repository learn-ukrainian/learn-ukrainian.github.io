slug: the-cyrillic-code-ii
title: The Cyrillic Code II
word_target: 1200
content_outline:
- section: Вступ — Introduction
  slug: vtsup-introduction
  words: 150
  points:
  - 'Quick review: Read 3 simple words from Code I (мама, сом, масло) to build immediate
    confidence.'
  - 'Module goal: Learn 7 new letters (К, И, І, Р, В, Т, Е). Combined with Code I,
    you will know 14 letters and be able to read real Ukrainian words.'
- section: Голосні — The Vowels И, І, Е
  slug: holosni-vowels
  words: 350
  points:
  - 'Introduce Е: sounds crisp and short, like the ''e'' in ''set'', not a diphthong.'
  - Introduce И (relaxed jaw, lower sound) and І (high 'smile' sound, like English
    'ee').
  - 'The И vs І distinction: Explain the physical articulation explicitly so learners
    do not merge the sounds.'
  - 'Cultural Hook: The dotted ''І'' as a unique symbol of Ukrainian typography and
    linguistic identity.'
- section: Приголосні — The Consonants К, Р, В, Т
  slug: pryholosni-consonants
  words: 350
  points:
  - 'Introduce friendly consonants К and Т: these sound exactly the same as their
    English visual equivalents.'
  - 'The Trap Letters: Explicitly warn that Cyrillic Р is a rolled /r/ (not P) and
    В is /v/ (not B).'
  - 'Visual vs Audio drills: Strategies and mindset tips to break the English visual
    habit for Р and В.'
- section: Перші слова — First Real Words
  slug: pershi-slova
  words: 250
  points:
  - 'Demonstrate reading core vocabulary using only the 14 known letters: кіт, тато,
    рис, сир, місто, море, вікно, метро.'
  - Show that with these 14 letters, learners can read real, high-frequency words,
    not just phonetic syllables.
  - 'Reading exercise: Provide short noun phrases (e.g., ''сир і молоко'', ''кіт і
    тато'') using ONLY the 14 known letters. No verbs.'
- section: Підсумок — Summary
  slug: pidsumok-summary
  words: 100
  points:
  - 'Milestone recap: You now know 14 out of 33 letters.'
  - 'Self-check 1: How do you pronounce the letters Р and В?'
  - 'Self-check 2: What is the mouth position for И vs І?'
  - 'Self-check 3: Can you read the words ''метро'' and ''тато''?'
  - 'Self-check 4: Can you read the word ''кіт''?'
