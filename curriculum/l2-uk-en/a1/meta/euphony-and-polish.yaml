slug: euphony-and-polish
title: Euphony and Polish
word_target: 1200
content_outline:
- section: У/В чергування
  words: 500
  points:
  - 'Introductory Scaffolding: Define ''милозвучність'' (euphony) and the core Ukrainian
    principle of avoiding consonant crashes. Use English to explicitly define ''vowel''
    (голосний) and ''consonant'' (приголосний).'
  - 'H3 for ''У'': Explain usage after consonants and at the absolute beginning of
    a sentence. Give 3+ simple examples with English translation and IPA for the first
    occurrence (e.g., У мене є книга).'
  - 'H3 for ''В'': Explain usage after vowels to maintain flow. Give 3+ examples (e.g.,
    Я в школі).'
  - 'Visual Aid: Markdown table showing the simple U/V decision logic for easy reference.'
- section: І/Й чергування
  words: 400
  points:
  - 'H3 for ''І'': Explain usage after consonants or pauses. Use everyday A1 family
    vocabulary (e.g., батько і мати, брат і сестра).'
  - 'H3 for ''Й'': Explain usage after vowels to prevent vowel hiatus (clash). Provide
    contrasting pairs (e.g., мама й тато, Андрій й Олена).'
  - 'Teacher''s Warning: Callout box addressing the common learner mistake of universally
    defaulting to ''і'' and why ''й'' is essential for natural breath flow.'
- section: З/Із/Зі чергування
  words: 450
  points:
  - 'H3 for ''З'': Present as the default form before vowels and single consonants.
    Provide 3 examples (z Києва, з другом).'
  - 'H3 for ''Із'': Detail specific usage before heavy consonant clusters to provide
    a buffer. Examples: із Львова.'
  - 'H3 for ''Зі'': Detail usage before sibilants (з, с, ш, щ) and the pronoun ''мною''.
    Provide a simple mnemonic to remember the sibilants.'
  - 'Rule Clarification: Callout distinguishing the preposition ''з'' (changes) from
    fixed verb prefixes like ''з-'' in ''зробити'' (does not change).'
- section: Інші правила евфонії
  words: 300
  points:
  - 'H3 for ''Euphonic Pairs'': Introduce high-frequency adverbs ''удень/вдень'' and
    ''увечері/ввечері'', showing they follow the exact same U/V logic based on surrounding
    words.'
  - 'Brief Awareness: Mention demonstratives ''ці/цей'' so learners recognize the
    sound pattern, noting they are fixed grammatical forms, not alternating euphony
    pairs.'
- section: Практика
  words: 350
  points:
  - 'Guided Analysis: Short A1-level dialogue with an English breakdown of why each
    euphonic choice (у/в, і/й) was made.'
  - 'Error Correction: 3 sentences with unnatural euphony (e.g., В Україні живе мама
    і тато) with step-by-step correction to standard forms.'
  - 'Actionable Advice: Strongly encourage reading the corrected sentences aloud to
    physically feel the difference in airflow.'
