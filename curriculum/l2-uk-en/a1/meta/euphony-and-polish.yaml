slug: euphony-and-polish
title: Euphony and Polish
word_target: 2000
content_outline:
- section: У/В чергування (U/V alternation)
  words: 500
  points:
  - 'Introductory English scaffolding: Define ''милозвучність'' (euphony) and explain
    that Ukrainian words adapt to their environment to avoid consonant crashes. Provide
    quick definitions of ''vowel'' and ''consonant''.'
  - 'H3 for ''У'': Explain its usage after consonants and after pauses (at the start
    of a sentence). Provide 3+ clear examples with English translations and IPA for
    new words (e.g., У мене є книга).'
  - 'H3 for ''В'': Explain its usage after vowels. Provide 3+ clear examples (e.g.,
    Я в школі).'
  - Include a visual table summarizing the U/V decision logic for easy reference.
- section: І/Й чергування (I/Y alternation)
  words: 400
  points:
  - 'H3 for ''І'': Explain its usage after consonants or pauses to prevent consonant
    clusters. Use everyday vocabulary for examples (e.g., батько і мати, брат і сестра).'
  - 'H3 for ''Й'': Explain its usage after vowels to prevent vowel hiatus (two vowels
    clashing). Provide contrasting examples (e.g., мама й тато, Андрій й Олена).'
  - Include a 'Teacher Note' callout addressing the common learner error of overusing
    'і' and explaining how 'й' makes speech flow effortlessly.
- section: З/Із/Зі чергування (Z/Iz/Zi alternation)
  words: 450
  points:
  - 'H3 for ''З'': Explain it as the standard form before vowels and single consonants
    (e.g., з Києва, з другом). Include 3 clear examples.'
  - 'H3 for ''Із'': Explain its usage before heavy consonant clusters (e.g., із Львова)
    to provide a vocalic buffer.'
  - 'H3 for ''Зі'': Detail its specific usage before sibilants (з, с, ш, щ) and the
    pronoun ''мною'' (e.g., зі школи, зі мною). Provide a mnemonic or clear visual
    rule.'
  - Add a warning box clarifying that this alternation rule applies only to the preposition,
    not to verb prefixes (e.g., зробити remains зробити).
- section: Інші правила евфонії (Other euphony rules)
  words: 300
  points:
  - Introduce the concept of euphonic pairs in adverbs and other parts of speech,
    such as удень/вдень and увечері/ввечері.
  - Explain that the exact same consonant/vowel surrounding rule applies to these
    words.
  - Briefly mention demonstratives ці/цей to raise awareness of sound patterns, noting
    they do not alternate but are part of the broader melodic system.
- section: Практика (Practice)
  words: 350
  points:
  - Provide a guided walkthrough of a short text or dialogue, breaking down analytically
    why each euphonic choice was made in context.
  - Include 3 'Fix the Error' examples where learners analyze an unnatural sentence
    (e.g., 'В Україні живе мама і тато') and read the step-by-step correction process.
  - Conclude with an encouragement to read aloud, emphasizing that learners should
    physically feel the difference in airflow and rhythm.
