slug: euphony-and-polish
title: Euphony and Polish
word_target: 2000
content_outline:
- section: У/В чергування
  words: 500
  points:
  - 'English Scaffolding: Define «милозвучність» (euphony) and the goal of avoiding
    consonant crashes. Explicitly define what a ''vowel'' (голосний) and ''consonant''
    (приголосний) are to ensure foundational understanding.'
  - 'H3 for ''У'': Explain its mandatory usage after consonants and at the absolute
    beginning of a sentence (after a pause). Provide 3+ simple examples with English
    translations and IPA for new words (e.g., «У мене є книга»).'
  - 'H3 for ''В'': Explain its usage after vowels to maintain flow. Provide 3+ clear
    examples (e.g., «Я в школі»).'
  - 'Visual Aid: Include a simple Markdown table summarizing the U/V decision logic
    for easy visual reference.'
- section: І/Й чергування
  words: 400
  points:
  - 'H3 for ''І'': Explain its usage after consonants or pauses to prevent consonant
    clusters. Use everyday family vocabulary (e.g., «батько і мати», «брат і сестра»).'
  - 'H3 for ''Й'': Explain its usage after vowels to prevent vowel hiatus (vowel clash).
    Provide contrasting examples (e.g., «мама й тато», «Андрій й Олена»).'
  - 'Teacher Note: Add a callout addressing the common learner error of overusing
    «і» and explain how «й» helps the sentence breathe naturally.'
- section: З/Із/Зі чергування
  words: 450
  points:
  - 'H3 for ''З'': Present this as the default form before vowels and single consonants
    (e.g., «з Києва», «з другом»). Provide 3 simple examples.'
  - 'H3 for ''Із'': Detail its specific usage before heavy consonant clusters to provide
    a buffer (e.g., «із Львова»).'
  - 'H3 for ''Зі'': Detail its usage before sibilants (з, с, ш, щ) and the pronoun
    «мною» (e.g., «зі школи», «зі мною»). Provide a simple mnemonic to remember the
    sibilants.'
  - 'Warning Box: Clarify that euphony rules apply to the preposition «з», but NOT
    to fixed verb prefixes (e.g., «зробити» remains unchanged).'
- section: Інші правила евфонії
  words: 300
  points:
  - 'H3 for ''Euphonic Pairs'': Introduce adverbs that follow the same U/V logic,
    specifically «удень»/«вдень» and «увечері»/«ввечері».'
  - Explain that the exact same consonant/vowel surrounding rule dictates which form
    to use.
  - 'Brief Mention: Briefly mention demonstratives like «ці»/«цей» to build awareness
    of sound patterns, noting they are fixed but part of the broader melodic ecosystem.'
- section: Практика
  words: 350
  points:
  - 'Guided Walkthrough: Provide a short, simple dialogue and analytically break down
    in English why each euphonic choice (у/в, і/й) was made.'
  - 'Fix the Error: Include 3 examples where learners analyze an unnatural sentence
    (e.g., «В Україні живе мама і тато») and follow a step-by-step correction process.'
  - 'Actionable advice: Conclude with a strong encouragement to read the corrected
    sentences aloud to physically feel the difference in airflow.'
