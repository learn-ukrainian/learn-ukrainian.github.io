module: a1-005
level: A1
sequence: 5
slug: syllables-and-word-division
version: '2.0'
title: Syllables and Word Division
subtitle: "Склади та перенесення — Rhythm, Structure, and Writing Rules"
focus: grammar
pedagogy: PPP
phase: A1.1 [First Contact]
word_target: 1200
objectives:
- Learner understands the concept of a syllable (склад) in Ukrainian
- Learner can count syllables by counting vowel letters
- Learner can distinguish between open (відкритий) and closed (закритий) syllables
- "Learner knows the rules for splitting words at the end of a line (перенесення)"
- Learner can correctly divide words into syllables according to Ukrainian phonetic rules
content_outline:
- section: Що таке склад? — What Is a Syllable?
  words: 250
  points:
  - "Every vowel (голосний) creates exactly one syllable. Count the vowels = count the syllables."
  - "Ukrainian vowel letters: а, о, у, е, и, і. Iotated vowels also create syllables: я, ю, є, ї."
  - "Contrast Й (consonant) vs Ї (vowel): край (1) vs країна (3). This is a common beginner pitfall."
  - "The 'Golden Rule': у слові стільки складів, скільки в ньому голосних."
- section: Типи складів — Syllable Types
  words: 250
  points:
  - "Open syllables (відкриті) end in a vowel: ма-ма, мо-ло-ко. Ukrainian has a strong preference for open syllables."
  - "Closed syllables (закриті) end in a consonant: кіт, сон, ав-то-бус (ав, бус)."
  - "Maximal Onset Principle: when consonants are between vowels, push them to the next syllable. се-стра (not сес-тра), ві-кно (not вік-но)."
  - "Phonetic beauty: the preference for open syllables gives Ukrainian its melodic, flowing quality."
- section: "Правила перенесення — Word Division Rules"
  words: 400
  points:
  - "Word division (перенесення) is the split at the end of a line. It usually follows syllable boundaries, but has extra restrictions."
  - "Restriction 1: No single letters. You cannot leave one letter on a line or carry one letter to the next. ❌ У-країна, ❌ академі-я."
  - "Restriction 2: Keep digraphs (ДЖ, ДЗ) together when they are one sound. ❌ ґуд-зик."
  - "Restriction 3: Soft sign (Ь) and apostrophe (') stay with the preceding consonant. ✅ паль-ці, ✅ сім- 'я."
  - "Restriction 4: Й stays with the preceding vowel. ✅ лай-ка."
- section: "Практика та читання — Practice and Reading"
  words: 300
  points:
  - "Clapping drill: say words and clap the syllables. кіт (1), ма-ма (2), мо-ло-ко (3), у-ні-вер-си-тет (5)."
  - "Visualizing the split: marking where a word can be divided for writing."
  - "Reading longer words by syllable: бі-блі-о-те-ка. This is the ultimate reading strategy for long words."
- section: "Підсумок — Summary"
  words: 100
  points:
  - "Review of counting syllables, types of syllables, and word division rules."
