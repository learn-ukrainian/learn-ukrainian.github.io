slug: syllables-and-word-division
title: Syllables and Word Division
word_target: 1200
content_outline:
- section: Що таке склад? — What Is a Syllable?
  slug: what-is-a-syllable
  words: 300
  points:
  - 'Define a syllable (склад) and introduce the golden rule: the number of syllables
    equals the exact number of vowels (голосні).'
  - 'Demonstrate syllable counting using familiar vocabulary: кіт (1 vowel = 1 syllable),
    мо-ло-ко (3 vowels = 3 syllables), у-кра-ї-на (4 vowels = 4 syllables).'
  - 'Address English learner friction: contrast Ukrainian vowel-based syllable boundaries
    with English intuition.'
- section: Типи складів — Open and Closed Syllables
  slug: open-and-closed-syllables
  words: 300
  points:
  - Introduce open syllables (ending in vowels) and closed syllables (ending in consonants),
    highlighting Ukrainian's strong preference for open syllables.
  - 'Explain the principle of maximal onset for consonant clusters: consonants are
    pushed to the beginning of the next syllable (се-стра, not сес-тра).'
  - 'Practice identifying open and closed syllables with high-frequency words: ву-ли-ця
    (all open), ав-то-бус (closed final syllable).'
- section: Правила переносу — Word Division Rules
  slug: word-division-rules
  words: 350
  points:
  - Introduce «переніс» (hyphenation/word division) and its practical importance for
    writing and typing in Ukrainian.
  - 'Rule 1: Never leave or carry over a single letter, even if it constitutes a full
    syllable (e.g., cannot split у-країна).'
  - 'Rule 2: The soft sign (ь) and apostrophe ('') must always stay attached to the
    preceding consonant (паль-ці, сі-м''я).'
  - Practice correct division with longer words like бі-блі-о-те-ка and у-ні-вер-си-тет
    to build confidence.
- section: Підсумок — Summary & Self-Check
  slug: summary-and-self-check
  words: 250
  points:
  - Recap the golden rule of counting vowels to find syllables and the three critical
    rules for word division.
  - 'Self-check question 1: How do you determine the number of syllables in a Ukrainian
    word?'
  - 'Self-check question 2: Where should you split a consonant cluster like ''ст''
    in the word ''сестра''?'
  - 'Self-check question 3: Can you leave a single letter at the end of a line when
    hyphenating?'
  - 'Self-check question 4: What happens to the soft sign (ь) when dividing a word?'
