slug: stress-and-intonation
title: Stress and Intonation
word_target: 1200
content_outline:
- section: Що таке наголос? (What is Stress?)
  words: 250
  points:
  - Define free and mobile stress in English. Contrast positively with fixed-stress
    languages to highlight Ukrainian's flexibility.
  - 'Demonstrate functional load using cultural minimal pairs: зАмок (castle) vs замОк
    (lock) and мУка (torment) vs мукА (flour).'
  - 'Introduce the acute accent (´) as the dictionary standard. Establish the core
    strategy: always memorize stress with the word, as guessing from spelling is unreliable.'
- words: 300
  points:
  - 'Analyze first-syllable stress using basic household/family words: мАма, тАто,
    кАва, дОбрий.'
  - 'Demonstrate last-syllable stress with longer words and some nouns: молокО, далекО,
    водА.'
  - 'Show penultimate (second-to-last) stress using frequent two- and three-syllable
    words: шкОла, кнИжка, дорОга.'
  - Include a callout emphasizing that despite these patterns, the exact same endings
    can have different stress (кнИга vs водА), reinforcing the need to learn per word.
  section: Типові наголоси (Common Stress Patterns)
- words: 250
  points:
  - Explain in English that mobile stress means the stressed syllable can shift when
    words change form (declension or conjugation).
  - 'Provide a noun declension example: hands shifting from singular to plural (рукА
    → рУки).'
  - 'Provide a verb conjugation example: to write shifting from infinitive to present
    tense forms (писАти → пишУ → пИшеш).'
  - 'Include a tip: assure learners they don''t need to memorize all shifts now; building
    awareness is the goal for A1.'
  section: Рухомий наголос (Mobile Stress)
- words: 250
  points:
  - 'Introduce declarative intonation (розповідна інтонація) with falling pitch at
    the end: ''Це кафе.'''
  - 'Explain interrogative intonation with a question word (pitch rises on the question
    word, then falls): ''Де кафе?'''
  - 'Highlight yes/no questions without question words (sharp rise at the end of the
    sentence): ''Це кафе?'''
  - 'Show exclamatory intonation (sharp rise and emphasis for surprise): ''Це кафе!'''
  section: 'Музика мови: Інтонація (The Music of Language: Intonation)'
- words: 150
  points:
  - 'Summarize the lesson''s main takeaways: Ukrainian stress is free and mobile,
    and intonation distinguishes questions from statements.'
  - 'Self-check question 1: Does Ukrainian have a fixed stress rule like Polish or
    French?'
  - 'Self-check question 2: How does the meaning change between зАмок and замОк?'
  - 'Self-check question 3: What happens to your pitch at the very end of a Yes/No
    question in Ukrainian?'
  - Provide a short read-aloud drill practicing the same phrase with three different
    intonations.
  section: Підсумок і Практика (Summary and Practice)
