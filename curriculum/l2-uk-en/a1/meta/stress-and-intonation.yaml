  - 'вода (water) — last-syllable stress'
  - 'рука (hand/arm) — mobile stress'
  - 'писати (to write) — mobile stress in conjugation'
  - 'школа (school) — penultimate stress'
  - 'молоко (milk) — last-syllable stress'
  - 'добрий (good) — first-syllable stress'
  recommended:
