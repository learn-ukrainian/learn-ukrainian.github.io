module: a1-006
level: A1
sequence: 6
slug: stress-and-intonation
version: '3.0'
title: Stress and Intonation
subtitle: "Наголос та інтонація — The Music of Ukrainian"
focus: grammar
pedagogy: PPP
phase: A1.1 [First Contact]
word_target: 1200
objectives:
- Identify the stressed syllable in common Ukrainian words
- Understand that Ukrainian stress is free and mobile
- Produce correct intonation for statements, questions, and exclamations
- Use stress marks when reading dictionary entries
content_outline:
- section: Наголос — Stress
  words: 350
  points:
  - 'Free and mobile stress concept: unlike Polish (penultimate) or French (final), Ukrainian stress can fall on any syllable.'
  - 'Stress changes meaning: замок (castle) vs замок (lock), мука (torment) vs мука (flour) — minimal pairs.'
  - 'How stress is marked in dictionaries and textbooks: the acute accent (´) over the stressed vowel.'
  - 'Learner strategy: when encountering a new word, always check stress placement.'
- section: Типові наголоси — Common Stress Patterns
  words: 250
  points:
  - 'First-syllable stress: мама, тато, хата, кава — common in basic family and household words.'
  - 'Last-syllable stress: молоко, далеко — common in longer words and some verb forms.'
  - 'Penultimate stress: школа, книжка, дорога — frequent in two- and three-syllable words.'
  - 'No fixed rule: the same ending can have different stress — stress must be learned per word.'
- section: Рухомий наголос — Mobile Stress
  words: 250
  points:
  - 'Stress shifts in declension: рука (nominative) → руки (genitive/plural).'
  - 'Stress shifts in conjugation: писати (infinitive) → пишу (I write) → пишеш (you write).'
  - 'Preview note: mobile stress will matter more when learning cases and verb conjugation.'
  - 'Practical tip: listening to native speakers is the best way to internalize stress patterns.'
- section: Інтонація — Intonation
  words: 250
  points:
  - 'Declarative intonation: pitch falls at the end of the sentence.'
  - 'Interrogative with question word: pitch rises on the question word, then falls.'
  - 'Yes/no questions: pitch rises sharply at the end.'
  - 'Exclamatory intonation: sharp rise with emphasis.'
  - 'Contrast drill: practicing the same sentence with all four intonation patterns.'
- section: Практика — Practice
  words: 100
  points:
  - 'Stress placement drills: identify which syllable carries the stress.'
  - 'Minimal pairs practice: distinguish words that differ only in stress.'
  - 'Intonation reading exercises: read the same sentence as statement, question, exclamation.'
- section: "Підсумок — Summary"
  words: 100
  points:
  - "Recap: stress is free and mobile, vowel purity under stress, intonation patterns."
  - "Self-check questions."
  - "Next: M7 — greetings and basic phrases."
vocabulary_hints:
  required:
