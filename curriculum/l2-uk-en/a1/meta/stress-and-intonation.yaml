slug: stress-and-intonation
title: Stress and Intonation
word_target: 2000
content_outline:
- section: Наголос
  words: 500
  points:
  - 'Explicit English scaffolding (Immersion < 25%): Define ''free and mobile stress''
    in English. Contrast positively with fixed-stress languages (like Polish or French)
    to highlight Ukrainian''s flexibility.'
  - 'H3: ''Що таке наголос?''. Explain the concept of stress and how it gives Ukrainian
    its melodic rhythm.'
  - 'H3: ''Зміна значення''. Demonstrate functional load using cultural minimal pairs:
    зАмок (castle) vs замОк (lock) and мУка (torment) vs мукА (flour) with English
    translations.'
  - 'H3: ''Словникові позначки''. Introduce the acute accent (´) and demonstrate how
    to read 3-4 dictionary entries. Provide the learner strategy: always memorize
    stress with the word.'
- section: Типові наголоси
  words: 500
  points:
  - 'H3: ''Наголос на першому складі''. Introduce and analyze basic vocabulary with
    initial stress using examples like мАма, тАто, кАва, дОбрий.'
  - 'H3: ''Наголос на останньому складі''. Demonstrate words with final stress using
    examples like молокО, далекО, водА.'
  - 'H3: ''Наголос на передостанньому складі''. Show examples with stress on the second-to-last
    syllable, such as шкОла, дорОга.'
  - '[!note] Callout box: Explicitly state that despite common patterns, spelling
    cannot reliably predict stress. Emphasize learning stress individually.'
- section: Рухомий наголос
  words: 400
  points:
  - Explain in English the concept of mobile stress during declension and conjugation
    as a natural feature of Ukrainian.
  - 'H3: ''Іменники: з однини в множину''. Demonstrate the stress shift from singular
    to plural: рукА (Nom sg) → рУки (Nom/Acc pl) with visual emphasis.'
  - 'H3: ''Дієслова: від інфінітива до особи''. Show the stress shift in verb conjugations:
    писАти → пишУ → пИшеш.'
  - '[!tip] Callout box: Reassure learners that absolute mastery of mobile stress
    is not expected at A1; it will be practiced gradually in future modules.'
- section: Інтонація
  words: 400
  points:
  - Introduce the three basic intonation contours required by the State Standard (§4.1.8).
  - 'H3: ''Розповідна інтонація''. Explain falling pitch using the example sentence
    ''Це кафе.'' and use a downward arrow or visual.'
  - 'H3: ''Питальна інтонація''. Contrast wh-questions (pitch rises on question word,
    then falls) with yes/no questions (sharp rise at the end, e.g., ''Це кафе?'').'
  - 'H3: ''Оклична інтонація''. Explain the sharp rise and emphasis used for surprise
    or excitement, e.g., ''Це кафе!''.'
- section: Практика
  words: 200
  points:
  - 'Inline Practice: ''Знайди наголос''. Create a prompt for learners to identify
    the stressed syllable in 5 new, common words using dictionary marks.'
  - 'Inline Practice: ''Мінімальні пари''. Provide a reading drill distinguishing
    зАмок and замОк in short contextual sentences.'
  - 'Inline Practice: ''Три інтонації''. Create a ''Read Aloud'' challenge prompting
    the learner to read ''Це школа'' as a statement, question, and exclamation.'
