slug: taking-transport
title: Taking Transport
word_target: 2000
content_outline:
- section: Вступ
  words: 400
  points:
  - Introduce the 'Marshrutka Veteran' persona with an English scaffolding paragraph
    welcoming the learner to the topic of urban transport (громадський транспорт).
  - 'Contrast the basic verbs of motion: іти (on foot) vs їхати (by vehicle), providing
    3 parallel example sentences.'
  - 'Explicitly address and correct the common English-transfer error: ''Я йду на
    метро'' -> ''Я їду на метро''.'
  - 'Introduce the modern Ukrainian context: the blend of traditional transport networks
    with the Kyiv Digital (Київ Цифровий) ecosystem.'
- section: Презентація
  words: 600
  points:
  - 'Categorize transport vocabulary into ground (зупинка: автобус, тролейбус, трамвай,
    маршрутка) and underground (станція: метро), with examples for each.'
  - Present the cultural hook about Arsenalna station (the world's deepest) and the
    culture of reading/listening to music on long escalators.
  - 'Grammar H3: Explain Accusative (Destination/Куди) vs. Locative (Location/Де)
    with a 4-row comparative table (e.g., їду в метро vs я в метро).'
  - 'Grammar H3: Explain case selection for transit, establishing Locative (їхати
    на автобусі) as the primary pattern while introducing Instrumental (їхати автобусом)
    to correct the ''їду автобус'' omission error.'
- section: Практика
  words: 600
  points:
  - 'Dialogue H3: Paying for fare. Provide a mini-dialogue contrasting traditional
    cash payment (Передайте за проїзд) with modern digital validation (валідатор,
    прикласти картку).'
  - 'Phrasebook H3: Navigating crowds. Teach essential phrases like ''Ви виходите?''
    (Are you getting off?) and ''Обережно, двері зачиняються''.'
  - 'Scenario: Provide a structured Q&A frame for asking directions (Як доїхати до...?)
    and navigating transfers (станція пересадки).'
  - Include a short 5-6 sentence reading paragraph about a commute to work, requiring
    the learner to observe the 'Де' vs 'Куди' distinctions in context.
- section: Підсумок
  words: 400
  points:
  - Provide a summary table consolidating the іти vs їхати rules and the key prepositions
    for transport.
  - Review the top 5 survival phrases from the lesson (e.g., Зупиніть на зупинці,
    Ви виходите?).
  - Include a short concluding message from the persona encouraging the learner to
    feel confident traveling in a Ukrainian city.
  - Provide a bridging sentence preparing the learner for the upcoming Phone Basics
    and Emergencies modules by emphasizing location awareness.
