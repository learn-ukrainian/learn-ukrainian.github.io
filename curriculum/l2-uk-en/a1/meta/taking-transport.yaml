slug: taking-transport
title: Taking Transport
word_target: 1750
content_outline:
- section: 'Теорія: Види транспорту та оплата'
  words: 343
  points:
  - 'Note: Use English to explain the difference between ''зупинка'' (bus/tram) and
    ''станція'' (metro/train).'
  - 'Introduction to transport types: метро, автобус, тролейбус, трамвай, маршрутка.'
  - 'Verbs of motion basics: ''сідати в...'' (to get in), ''виходити на...'' (to get
    out at).'
  - 'Payment vocabulary: ''квиток'', ''проїзний'', ''валідатор'', ''компостувати''.'
  - 'Cultural insight: The unique etiquette of the ''marshrutka'' (passing money to
    the driver).'
  - 'Question to learner: ''Чим ви їздите на роботу?'' (How do you get to work?).'
- section: 'Практика: Спілкування в транспорті'
  words: 200
  points:
  - 'The essential question: ''Ви виходите на наступній?'' (Are you getting off at
    the next stop?).'
  - 'Imperatives for navigation: ''Проходьте'' (Move along), ''Тримайтеся'' (Hold
    on), ''Сідайте'' (Sit down).'
  - 'Asking for help: ''Яка це зупинка?'', ''Скажіть, будь ласка, де виходити?''.'
  - 'Grammar focus (with English scaffolding): Usage of Locative case for location
    (на зупинці, у метро).'
- section: 'Історія: Поїздка на метро'
  words: 207
  points:
  - 'Narrative: A step-by-step journey through the Kyiv Metro.'
  - 'Cultural hook: Mention ''Arsenalna'' as the deepest station in the world.'
  - 'Listening comprehension: ''Обережно, двері зачиняються'', ''Наступна станція...''.'
  - 'Cultural hook: The iconic ''Voice of the Metro'' (Mykola Petrenko).'
  - 'Conclusion: Feeling confident navigating the city.'
