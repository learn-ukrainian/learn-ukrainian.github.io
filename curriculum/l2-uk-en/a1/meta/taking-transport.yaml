slug: taking-transport
title: Taking Transport
word_target: 2000
content_outline:
- section: 'Вступ: Транспорт у місті'
  words: 350
  points:
  - Introduce main transport types (метро, автобус, тролейбус, трамвай, маршрутка)
    with images/icons context.
  - Briefly engage with the 'Arsenalna' cultural hook (deepest station).
  - 'Grammar hook: Briefly contrast ''іти'' (foot) vs ''їхати'' (transport) to set
    the stage.'
  - 'Ask the learner: ''Як ви їздите на роботу?'' introducing the Instrumental case
    pattern (-ом/-ем) for means of transport.'
- section: 'Презентація: Види транспорту та оплата'
  words: 650
  points:
  - 'Vocabulary deep dive: ''зупинка'' (ground transport) vs ''станція'' (metro/train).
    Visual comparison.'
  - 'Key Phrases: ''Наступна зупинка...'', ''Обережно, двері зачиняються''. Mention
    the ''Voice of the Metro'' culture.'
  - 'Payment methods: ''квиток'', ''проїзний'', ''валідатор'', ''QR-код''. Pronunciation
    focus on ''прокомпостувати'' (legacy term but useful) vs ''завалідувати''.'
  - 'Transfer logic: ''робити пересадку'', ''пересісти на...''. Simple diagram of
    a transfer.'
  - 'Grammar focus: Accusative for Direction (''Куди?'' -> в метро) vs Locative for
    Location (''Де?'' -> у метро).'
- section: 'Практика: Орієнтування в місті'
  words: 600
  points:
  - 'Scenario: Asking for directions (''Як доїхати до...?''). Structured dialogue
    frame.'
  - 'Scenario: Buying a ticket/interacting with a driver (''Один квиток, будь ласка'',
    ''Передайте за проїзд'').'
  - 'Marshrutka etiquette: ''На зупинці!'' (Stop here!), ''Ви виходите?'' (Are you
    getting off? - crucial for crowded buses).'
  - 'Exercise: Distinguishing ''Де'' vs ''Куди'' in context (fill-in-the-blank logic).'
- section: 'Закріплення: Подорож метром'
  words: 400
  points:
  - 'Narrative text: A story about a trip through Kyiv metro (entering, validating,
    escalator, waiting, transfer).'
  - 'Highlight sensory details: noise of the train, voice announcements, crowd flow.'
  - 'Contextual vocabulary: ''ескалатор'', ''платформа'', ''перехід''.'
  - 'Final check: Comprehension questions based on the narrative.'
