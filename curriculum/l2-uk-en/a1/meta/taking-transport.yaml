slug: taking-transport
title: Taking Transport
word_target: 1200
content_outline:
- section: Вступ
  words: 400
  points:
  - Use English scaffolding (40-50% immersion) to introduce the 'Marshrutka Veteran'
    persona and the topic of urban transport (громадський транспорт).
  - 'Create an H3 section comparing basic motion verbs: ''іти'' (on foot) vs ''їхати''
    (by vehicle), featuring a 3-row comparative table with English explanations.'
  - 'Provide a dedicated callout block addressing the common English-transfer error:
    explicitly correct ''Я йду на метро'' to ''Я їду на метро'' with a rule explanation.'
  - 'Write an introductory paragraph highlighting Ukraine''s modern transit blend:
    traditional routes vs. the ''Київ Цифровий'' (Kyiv Digital) system.'
- section: Презентація
  words: 600
  points:
  - Create an H3 'Наземний і підземний транспорт' to categorize vehicles, explicitly
    distinguishing 'зупинка' (bus/tram) vs 'станція' (metro).
  - Include a 'Cultural Hook' callout about Arsenalna station (105.5m deep), explaining
    the local culture of reading on the long escalator ride.
  - Create an H3 'Куди чи Де?' explaining Accusative (Destination) vs. Locative (Location)
    using a 4-row comparative table (e.g., 'їду в метро' vs 'я в метро'). English
    scaffolding required.
  - 'Create an H3 ''Як ми їдемо?'' explaining case selection for transit: establish
    Locative (''їхати на автобусі'') and introduce Instrumental (''їхати автобусом'')
    to correct the ''їду автобус'' omission mistake.'
- section: Практика
  words: 600
  points:
  - 'Write an H3 ''Діалог: Оплата проїзду'' featuring a 6-line exchange that contrasts
    traditional cash (''Передайте за проїзд'') with digital payment (''прикласти картку
    до валідатора'').'
  - Create an H3 'Корисні фрази' detailing essential crowd navigation phrases ('Ви
    виходите?', 'Обережно, двері зачиняються'), adding IPA for their first occurrences.
  - Provide a structured Q&A frame under an H3 'Як доїхати?' with 4 examples of asking
    for directions and navigating transfers ('станція пересадки').
  - Include a 5-6 sentence reading practice paragraph about a daily commute in Kyiv,
    forcing the learner to observe 'Де', 'Куди', and motion verbs in a natural context.
- section: Підсумок
  words: 400
  points:
  - Provide a final H3 'Головне' containing a summary table that consolidates 'іти'
    vs 'їхати' rules and the key prepositions for location/destination.
  - List the top 5 survival phrases from the lesson in a bulleted review format for
    easy memorization.
  - Include a short bilingual concluding message from the persona encouraging the
    learner.
  - Write a bridging sentence preparing the learner for a1-58 (Phone Basics) and a1-62
    (Emergencies) by emphasizing the importance of knowing one's location.
