slug: greetings-and-politeness
title: Greetings and Politeness
word_target: 2000
content_outline:
- section: Вітання
  words: 400
  points:
  - 'Note: Bridge module (15-25% immersion) — provide clear English scaffolding for
    all concepts before introducing Ukrainian examples.'
  - Introduce the informal greeting 'Привіт' and define its social context (friends,
    family, peers).
  - 'Present the formal time-based greetings: ''Добрий ранок'' (until 12:00), ''Добрий
    день'' (12:00-18:00), and ''Добрий вечір'' (after 18:00).'
  - 'Explain key farewells: formal ''До побачення'', informal ''Бувай'', and the warm
    neutral ''На все добре''.'
  - Create a situational guide for matching greetings to social contexts, positioning
    'Добрий день' as the safe default.
- section: Ти і Ви
  words: 400
  points:
  - Define 'Ти' (singular informal) and 'Ви' (singular formal OR plural).
  - Explain the cultural weight of the T-V distinction in Ukrainian society, emphasizing
    respect for elders and appropriate distance with strangers.
  - 'Establish the golden rule: Always start with ''Ви'' until explicitly invited
    to switch using ''Давай на ти?''.'
  - Provide brief contrasting examples of 'Ви' vs 'Ти' in identical situations (e.g.,
    addressing a barista vs. a close friend).
- section: Ввічливість
  words: 400
  points:
  - Teach 'Дякую' as the standard 'thank you', introducing intensifiers 'Дуже дякую'
    and 'Щиро дякую'.
  - Explain the dual function of 'Будь ласка' (both 'please' when requesting and 'you're
    welcome' when responding).
  - Contrast 'Вибачте' (formal, used for getting attention or minor apologies) with
    'Вибач' (informal).
  - Introduce 'Перепрошую' as an alternative formal interjection or a slightly more
    sincere apology.
- section: Знайомство
  words: 400
  points:
  - 'Teach the specific formulas for asking names: ''Як вас звати?'' (formal) and
    ''Як тебе звати?'' (informal).'
  - Provide the standard response 'Мене звати...' and explicitly warn against the
    literal English translation 'Я є...'.
  - 'Introduce polite responses to new introductions: ''Дуже приємно'' and ''Приємно
    познайомитись''.'
  - Provide structural examples combining greetings with introductions in both formal
    and informal registers.
- section: Діалоги
  words: 400
  points:
  - 'Write Dialogue 1 (Formal): Meeting a professor or colleague for the first time,
    using ''Ви'', ''Добрий день'', ''Як вас звати'', and ''До побачення''.'
  - 'Write Dialogue 2 (Informal): Greeting a friend and catching up, using ''Привіт'',
    ''Як тебе звати'' (for a third party), and ''Бувай''.'
  - 'Write Dialogue 3 (Service): Ordering at a cafe, using ''Вибачте'' to get attention,
    ''Будь ласка'', and ''Дякую''.'
  - Provide a breakdown of each dialogue, ensuring 15-25% immersion targets are met
    via clear English annotations of the Ukrainian text.
