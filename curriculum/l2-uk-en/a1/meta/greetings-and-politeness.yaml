slug: greetings-and-politeness
title: Greetings and Politeness
word_target: 1200
content_outline:
- section: Basic Greetings (Вітання)
  slug: basic-greetings
  words: 250
  points:
  - 'Introduce the informal greeting: ''Привіт'' for friends, family, and peers.'
  - 'Introduce time-based formal greetings: ''Добрий ранок'', ''Добрий день'' (daytime
    default), ''Добрий вечір''.'
  - 'Explain standard farewells: ''До побачення'' (formal) and ''Бувай'' (informal).'
  - Provide simple situational contexts for when to use time-based formal greetings
    versus informal ones.
- section: 'Formal vs. Informal: ''Ти'' and ''Ви'''
  slug: formal-vs-informal
  words: 250
  points:
  - 'Define the two ways to say ''you'': ''Ти'' (singular informal) and ''Ви'' (plural
    or singular formal).'
  - 'Explain the cultural rule: always default to ''Ви'' for strangers, teachers,
    and elders to show respect. Use ''Ти'' for close friends and children.'
  - 'Emphasize pairing rules: ''Добрий день'' always goes with ''Ви'', and ''Привіт''
    always goes with ''Ти''.'
- section: Politeness Magic Words (Ввічливість)
  slug: politeness-magic-words
  words: 250
  points:
  - Introduce 'Дякую' (thank you) and the intensified 'Дуже дякую'.
  - Introduce 'Будь ласка' and explain its dual usage as both 'please' (when requesting)
    and 'you're welcome' (responding to thanks).
  - Explain 'Вибачте' (excuse me / I'm sorry) for getting attention politely or apologizing.
  - Give short, practical examples of using these words in everyday situations.
- section: Introductions (Знайомство)
  slug: introductions
  words: 250
  points:
  - 'Teach the fixed formulas for asking names: ''Як вас звати?'' (formal) and ''Як
    тебе звати?'' (informal).'
  - 'Teach the response: ''Мене звати...'' and explicitly warn against translating
    ''My name is'' word-for-word from English.'
  - 'Teach the polite follow-up: ''Дуже приємно'' (Pleased to meet you).'
  - Show a mini-dialogue demonstrating a full formal introduction and an informal
    one.
- section: Summary and Self-Check
  slug: summary-and-check
  words: 200
  points:
  - Briefly recap the main greetings, the T-V distinction, and introduction phrases.
  - 'Self-check question 1: Which greeting do you use with a shop assistant at 3:00
    PM?'
  - 'Self-check question 2: How do you say ''thank you very much'' in Ukrainian?'
  - 'Self-check question 3: What is the formal way to ask ''What is your name?'''
activity_hints:
- type: match-up
  focus: Match formal and informal greeting equivalents
  items: 10
- type: quiz
  focus: Choose the appropriate greeting for a given social situation
  items: 10
- type: fill-in
  focus: Complete greeting and introduction dialogues
  items: 8
- type: anagram
  focus: Put greeting dialogue lines in correct order
  items: 8
