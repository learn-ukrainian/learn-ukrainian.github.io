module: a1-008
level: A1
sequence: 8
slug: greetings-and-politeness
version: '2.0'
title: Greetings and Politeness
subtitle: Hello and Thank You
focus: vocabulary
pedagogy: PPP
phase: A1.1 [First Contact]
word_target: 1200
objectives:
- Greet people appropriately by time of day
- Choose correctly between Ти and Ви based on social context
- Use basic politeness expressions (thank you, please, excuse me)
- Introduce yourself and respond to introductions
content_outline:
- section: Вітання (Greetings)
  words: 200
- section: Ти і Ви (T-V distinction)
  words: 250
- section: Ввічливість (Politeness)
  words: 250
- section: "Звертання (Addressing People)"
  words: 150
- section: Знайомство (Introductions)
  words: 200
- section: Діалоги (Dialogues)
  words: 250
- section: Підсумок — Summary
  words: 150
vocabulary_hints:
  required:
  - привіт (hello, informal)
  - добрий ранок (good morning)
  - добрий день (good afternoon)
  - добрий вечір (good evening)
  - до побачення (goodbye)
  - дякую (thank you)
  - будь ласка (please/you're welcome)
  - вибачте (excuse me, formal)
  - перепрошую (I apologize)
  - дуже приємно (pleased to meet you)
  - пане (Mr., formal address)
  - пані (Ms., formal address)
  recommended:
  - бувай/бувайте (bye, informal/formal plural)
  - здрастуйте (hello, formal)
  - ласкаво просимо (welcome)
  - на все добре (all the best)
activity_hints:
- type: match-up
  focus: Match formal and informal greeting equivalents
  items: 10
- type: quiz
  focus: Choose the appropriate greeting for a given social situation
  items: 10
- type: fill-in
  focus: Complete greeting and introduction dialogues
  items: 8
- type: anagram
  focus: Unscramble the letters of greeting words
  items: 6
connects_to:
- a1-09 (This Is, I Am)
prerequisites:
- a1-07 (The Gender Code)
persona:
  voice: Patient Supportive Tutor
  role: Friendly Barista
grammar:
- T-V distinction
- Imperative forms in politeness expressions
register: розмовний