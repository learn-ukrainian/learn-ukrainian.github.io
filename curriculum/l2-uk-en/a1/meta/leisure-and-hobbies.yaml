slug: leisure-and-hobbies
title: Leisure and Hobbies
word_target: 1200
content_outline:
- section: Хобі (Hobbies)
  slug: hobbies
  words: 300
  points:
  - Introduce the concept of 'хобі' as an indeclinable neuter noun. Provide English
    scaffolding to explain its unchanging nature and use IPA for its first occurrence.
  - 'Present a table of 7 core hobby verbs: читати, малювати, грати, фотографувати,
    танцювати, співати, готувати. Include IPA and English translations.'
  - 'Teach three expressive patterns in distinct subsections: ''Моє хобі — це...'',
    ''Мені подобається...'' (+ infinitive), and the fixed lexical phrase ''Я захоплююся...''
    (+ Instrumental). Explain them clearly with English scaffolding.'
  - Write a mini-dialogue demonstrating 'Яке у тебе хобі?' and 'Чим ти захоплюєшся?'
    using short A1-appropriate sentences and full English translations.
- section: Спорт (Sports)
  slug: sports
  words: 300
  points:
  - Explain the 'грати в + Accusative' construction for ball and team sports (футбол,
    баскетбол, теніс, шахи) using English scaffolding. Explicitly contrast this with
    the English lack of prepositions.
  - Introduce individual sports that use bare verbs or phrases (плавати, бігати, кататися
    на велосипеді) with clear examples.
  - 'Present vocabulary for sports venues: стадіон, басейн, спортзал.'
  - 'Provide a visual comparison of location vs. destination: Locative (бути в басейні,
    на стадіоні) vs. Accusative (ходити в басейн, на стадіон). Use English context
    to prevent common errors.'
- section: Дозвілля (Leisure activities)
  slug: leisure
  words: 250
  points:
  - 'Introduce entertainment vocabulary: ходити в кіно, дивитися серіали, гуляти в
    парку. Remind learners that ''кіно'' is indeclinable.'
  - 'Present social activities as fixed phrases: зустрічатися з друзями (Instrumental)
    and ходити в гості. Briefly mention the cultural significance of visiting homes.'
  - Draft a simple guided reading paragraph describing a typical weekend ('Що ти робиш
    у вихідні?'), keeping sentences to a maximum of 8-10 words.
- section: Запрошення (Invitations)
  slug: invitations
  words: 200
  points:
  - 'Introduce 3 functional patterns for making invitations: ''Хочеш піти в...?'',
    ''Ходімо разом!'', ''Давай зустрінемось!''. Explain the social context of each
    in English.'
  - 'Provide a clear table for responding to invitations: Accepting (З задоволенням,
    Чудова ідея) vs. Declining (На жаль, не можу, Може, іншим разом).'
  - Include a multi-turn, practical dialogue of two friends making plans for the weekend,
    accompanied by English translations.
- section: Практика (Practice)
  slug: summary
  words: 150
  points:
  - 'Summarize the key grammatical takeaways in a bulleted list: ''грати в + Accusative'',
    the difference between ''ходити в + Accusative'' and ''бути в + Locative'', and
    invitation structures.'
  - Provide 4 self-check questions for the learner to verify understanding (e.g.,
    'How do you ask someone what their hobby is?', 'What case is used for the destination
    when you go to the pool?').
