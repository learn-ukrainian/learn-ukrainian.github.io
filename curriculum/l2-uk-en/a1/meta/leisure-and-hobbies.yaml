slug: leisure-and-hobbies
title: Leisure and Hobbies
word_target: 2000
content_outline:
- section: Хобі
  words: 500
  points:
  - Introduce the module with explicit English scaffolding for A1 learners. Define
    'хобі' (neuter, indeclinable) with IPA.
  - 'Provide a clear table of 7 common verbs for hobbies: читати, малювати, грати,
    фотографувати, танцювати, співати, готувати. Include IPA and English translations.'
  - 'Create 3 specific H3 subsections for expressing hobbies: ''Моє хобі — це...'',
    ''Я захоплююся... (+ Instrumental)'', ''Мені подобається... (+ infinitive)''.
    Explain each structure clearly in English.'
  - Add a mini-dialogue demonstrating 'Яке у тебе хобі?' and 'Чим ти захоплюєшся?'
    with English translations.
- section: Спорт
  words: 400
  points:
  - Explain the 'грати в + Accusative' construction for team/ball sports using English
    scaffolding. Provide a list of sports (футбол, баскетбол, теніс, шахи).
  - 'Contrast ''грати в'' with individual sports that use bare verbs: плавати, бігати,
    кататися на велосипеді. Give 3-4 example sentences.'
  - 'Introduce sports venues (стадіон, басейн, спортзал). Create a table comparing
    ''location'' (Locative: в басейні) with ''destination'' (Accusative: в басейн)
    using the verb ''ходити''.'
- section: Дозвілля
  words: 400
  points:
  - 'Introduce vocabulary for entertainment outings: ходити в кіно, дивитися серіали,
    гуляти в парку. Include IPA.'
  - Explain the concept of habitual outings with 'ходити в + Accusative' using English.
  - 'Present social activities: зустрічатися з друзями (note the Instrumental case
    context), ходити в гості.'
  - Draft a short, simple paragraph describing a typical weekend (Що ти робиш у вихідні?)
    using short sentences (max 8-10 words per sentence).
- section: Запрошення
  words: 350
  points:
  - 'Introduce 3 patterns for making invitations, giving each its own H3 subsection:
    ''Хочеш піти в...?'', ''Ходімо разом!'', ''Давай зустрінемось!''. Explain the
    nuance of each.'
  - 'Provide a visual aid (e.g., a two-column table) for responding: Accepting (З
    задоволенням, Чудова ідея) vs. Declining (На жаль, не можу, Може, іншим разом).'
  - Include a short, practical dialogue demonstrating an invitation to the cinema
    and a positive response.
- section: Практика
  words: 350
  points:
  - Provide a guided reading text (100-150 words) where two characters discuss their
    hobbies and sports preferences, integrating target grammar and vocabulary.
  - Include an engagement callout (e.g., [!cultural]) about the popularity of chess
    in Ukrainian parks or mushroom foraging.
  - Summarize the key takeaways (грати в/на, ходити в, invitations) in a bulleted
    list for easy review.
