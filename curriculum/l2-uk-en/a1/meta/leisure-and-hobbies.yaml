slug: leisure-and-hobbies
title: Leisure and Hobbies
word_target: 2000
content_outline:
- section: Хобі
  words: 500
  points:
  - Introduce the concept of 'хобі' (neuter, indeclinable noun) with explicit English
    scaffolding for A1 learners. Provide IPA.
  - 'Present a table of 7 common verbs for hobbies: читати, малювати, грати, фотографувати,
    танцювати, співати, готувати. Include IPA and English translations.'
  - 'Create three distinct H3 subsections for expressing hobbies: ''Моє хобі — це...'',
    ''Я захоплююся... (+ Instrumental)'', and ''Мені подобається... (+ infinitive)''.
    Explain the structure of each in English.'
  - Write a mini-dialogue demonstrating 'Яке у тебе хобі?' and 'Чим ти захоплюєшся?'
    with English translations.
- section: Спорт
  words: 400
  points:
  - Explain the 'грати в + Accusative' construction for team and ball sports (футбол,
    баскетбол, теніс, шахи) using English scaffolding.
  - Contrast 'грати в' with individual sports that use bare verbs (плавати, бігати,
    кататися на велосипеді) in a separate H3 subsection.
  - Introduce sports venues (стадіон, басейн, спортзал).
  - 'Create a visual table comparing ''location'' (Locative: в басейні, на стадіоні)
    vs. ''destination'' (Accusative: в басейн, на стадіон) using the verb ''ходити''.'
- section: Дозвілля
  words: 400
  points:
  - 'Introduce vocabulary for entertainment outings: ходити в кіно, дивитися серіали,
    гуляти в парку. Explicitly note that ''кіно'' is indeclinable.'
  - Explain the concept of habitual outings using 'ходити в + Accusative' with English
    instructions.
  - 'Present social activities: зустрічатися з друзями (note the Instrumental case
    usage) and ходити в гості.'
  - Draft a short, simple paragraph describing a typical weekend (Що ти робиш у вихідні?)
    using short sentences of maximum 8-10 words.
- section: Запрошення
  words: 350
  points:
  - 'Introduce 3 patterns for making invitations, giving each its own H3: ''Хочеш
    піти в...?'', ''Ходімо разом!'', ''Давай зустрінемось!''. Explain the formality
    nuance of each in English.'
  - 'Provide a two-column table for responding: Accepting (З задоволенням, Чудова
    ідея) vs. Declining (На жаль, не можу, Може, іншим разом).'
  - Include a short, practical dialogue demonstrating an invitation to the cinema
    and a positive response.
- section: Практика
  words: 350
  points:
  - Provide a guided reading text (100-150 words) where two characters discuss their
    hobbies and sports preferences, integrating the target grammar.
  - Include an engagement callout [!cultural] about the popularity of playing chess
    in Ukrainian public parks.
  - Summarize the key takeaways (грати в, ходити в, invitation patterns) in a clear,
    bulleted list for easy review.
