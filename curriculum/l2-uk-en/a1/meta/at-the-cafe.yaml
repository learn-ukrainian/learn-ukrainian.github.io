slug: at-the-cafe
title: At the Café
word_target: 2000
content_outline:
- section: Вступ
  words: 450
  points:
  - 'Introduce the ''Chatty Barista'' persona using English scaffolding to set the
    context and clearly state the module''s goal: polite ordering in a café setting.'
  - 'Cultural Hook: Present the rich Lviv coffee tradition and the legend of Yuriy
    Kulchytsky (Battle of Vienna, 1683), grounding Ukrainian culture firmly in a European
    historical context.'
  - 'Vocabulary Presentation: Introduce essential vocabulary (кава, чай, вода, меню,
    офіціант) in a clear markdown table, providing IPA transcriptions on their first
    occurrence.'
- section: Презентація
  words: 650
  points:
  - 'Grammar Theory (in English): Explain the Accusative case for direct objects (§4.2.3.2),
    emphasizing the phonetic shift for feminine nouns ending in -а/-я (-а → -у, -я
    → -ю).'
  - 'Provide three dedicated H3 sections with highly visible examples of case transformation:
    «вода» → «воду», «кава» → «каву», and the unchanged masculine inanimate «сік»
    → «сік».'
  - 'Polite Phrases: Explicitly contrast the rude direct translation «Я хочу» with
    culturally appropriate and polite alternatives like «Мені, будь ласка...» and
    «Я буду...».'
  - 'Lexical Chunks: Present the common modifiers «з молоком» and «без цукру» purely
    as fixed vocabulary phrases, intentionally avoiding any complex explanation of
    Instrumental or Genitive case theory.'
- section: Практика
  words: 550
  points:
  - 'Polite Imperatives: Dedicate an H3 to 2nd person plural imperative forms (§4.2.4.2),
    specifically teaching «дайте, будь ласка» and «принесіть, будь ласка» with concrete
    examples.'
  - 'Mini-Dialogue: Provide a realistic back-and-forth exchange between an «офіціант»
    and a customer, demonstrating the ordering flow and typical clarification questions
    (e.g., «Яку каву?»).'
  - 'Usage Note: Differentiate «рахунок» (the bill to pay) and «чек» (the printed
    receipt), framing this explicitly as a common pitfall for English-speaking learners.'
  - 'Payment Vocabulary: Introduce and drill practical vocabulary for payment methods:
    «карткою» (by card) and «готівкою» (by cash).'
- section: Продукція та Підсумок
  words: 350
  points:
  - 'Roleplay Scenario: Provide a comprehensive reading text that simulates a full
    café visit, beginning with the greeting («Добрий день») and concluding with payment
    and leaving a tip («чайові»).'
  - 'Grammar Recap: Include a concise, visual summary table reviewing the core Accusative
    noun endings used for ordering food and drinks.'
  - 'Self-Check: End the lesson with 3-4 simple comprehension questions to verify
    the learner grasps the «рахунок» vs «чек» distinction and basic Accusative transformation
    before moving to activities.'
