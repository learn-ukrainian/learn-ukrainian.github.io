slug: at-the-cafe
title: At the Café
word_target: 2000
content_outline:
- section: 'Розминка: Кава — це культура'
  words: 250
  points:
  - Welcome from the 'Chatty Barista' persona — setting the cozy atmosphere
  - 'Cultural hook: Why coffee is special in Ukraine (Lviv tradition)'
  - 'Vocabulary preview: The absolute essentials (кава, чай, вода)'
  - 'English scaffolding: Briefly explaining that ordering involves changing word
    endings (Accusative preview)'
- section: 'Презентація: Привітання та ввічливість'
  words: 300
  points:
  - 'Standard greetings in a café: ''Добрий день'', ''Вітаю'''
  - 'The ''Waiter-Client'' relationship: Using ''Ви'' form (polite imperative preview:
    скажіть, дайте)'
  - 'Common Learner Error alert: Avoiding ''ти'' with staff'
  - 'Key phrase: ''Що бажаєте?'' (What would you like?)'
- section: 'Замовлення: Знахідний відмінок'
  words: 500
  points:
  - 'Core Grammar: The Accusative Case for feminine nouns (-а -> -у, -я -> -ю)'
  - 'Drill: кава -> каву, вода -> воду'
  - 'Polite structures: ''Мені, будь ласка...'', ''Я буду...'', ''Я візьму...'''
  - 'Avoid: ''Я хочу'' (too direct/childish)'
  - 'Masculine nouns (unchanged): сік, чай, круасан'
- section: 'Уточнення: Яку каву ви бажаєте?'
  words: 400
  points:
  - Adjective agreement in Accusative (смачну каву, чорний чай)
  - 'Lexical chunks for modifications: ''з молоком'', ''з лимоном'', ''без цукру''
    (taught as phrases)'
  - 'Questions: ''Велику чи маленьку?'', ''З чим?'''
  - Short dialogue examples illustrating the back-and-forth
- section: Рахунок та оплата
  words: 300
  points:
  - 'Getting the bill: ''Можна рахунок?'' vs ''Чек'' (explanation of difference)'
  - 'Payment methods: ''Готівкою чи карткою?'''
  - 'Tipping culture: ''Чайові'' (optional but polite)'
  - 'Closing the interaction: ''Дякую'', ''На все добре'''
- section: 'Практика: У кав''ярні'
  words: 250
  points:
  - Reading a Ukrainian Menu (simulated visual text)
  - 'Structured dialogue analysis: Identifying the stages (Greeting -> Order -> Clarification
    -> Pay)'
  - 'Roleplay scenarios: Ordering for a friend'
- section: 'Культурний контекст: Українські кав''ярні'
  words: 200
  points:
  - Yuriy Kulchytsky and the Vienna coffee legend
  - Modern café etiquette in Ukraine (sitting for hours is okay)
  - Summary of key phrases learned
