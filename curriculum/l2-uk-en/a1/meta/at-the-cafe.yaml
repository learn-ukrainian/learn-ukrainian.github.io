slug: at-the-cafe
title: At the Café
word_target: 2000
content_outline:
- section: Вступ (Introduction)
  words: 450
  points:
  - 'English Scaffolding: Welcome from the ''Chatty Barista'' persona and a brief
    explanation of what we will learn today (ordering politely and understanding waitstaff).'
  - 'Cultural Hook: Introduce Lviv''s coffee culture, the legend of Yuriy Kulchytsky,
    and the social meaning of «Піти на каву».'
  - 'Vocabulary Preview: Introduce essential vocabulary (кава, чай, вода, меню) with
    IPA on the first occurrence.'
- section: Презентація (Presentation)
  words: 650
  points:
  - 'Grammar Theory (in English): Define the Accusative case for direct objects. Explain
    the phonetic transformation for feminine nouns (-а → -у, -я → -ю) and note that
    masculine inanimate nouns stay the same.'
  - 'Drill Examples: Provide dedicated H3 sections showing «вода» → «воду», «кава»
    → «каву», «сік» → «сік».'
  - 'Polite Ordering Phrases: Teach «Мені, будь ласка...» and «Я буду...» followed
    by Accusative nouns. Explicitly correct the common error of using «Я хочу».'
  - 'Modifiers as Lexical Chunks: Introduce «з молоком» and «без цукру» as fixed phrases,
    without explaining Instrumental/Genitive case theory.'
- section: Практика (Practice)
  words: 550
  points:
  - 'Polite Imperatives: Introduce «дайте, будь ласка» and «принесіть, будь ласка»
    with examples of asking for a menu or items.'
  - 'Dialogue: A short, natural back-and-forth between an «офіціант» and a customer,
    demonstrating the ordering process and clarification questions (e.g., «Яку каву?»).'
  - 'Vocabulary distinction: Explicitly clarify the difference between «рахунок» (the
    bill to pay) and «чек» (the receipt).'
  - 'Payment Methods: Introduce vocabulary for paying: «карткою» (by card) and «готівкою»
    (by cash).'
- section: Продукція та Підсумок (Production and Summary)
  words: 350
  points:
  - 'Roleplay Scenario: A complete simulated café visit reading piece, from greeting
    («Добрий день») to leaving a tip («чайові»).'
  - 'Grammar Recap: A quick reference table summarizing the Accusative case noun endings
    for ordering food and drinks.'
  - 'Self-Check: A few simple summary questions to ensure the learner grasps the core
    concepts before moving to activities.'
