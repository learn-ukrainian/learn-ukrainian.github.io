slug: description-adverbs
title: 'Description: Adverbs'
word_target: 2000
content_outline:
- section: Вступ
  words: 400
  points:
  - Include English scaffolding to define an 'adverb' and the core question Як? (How?).
  - Create a visual contrast table comparing Який? (Adjective describing a noun) with
    Як? (Adverb describing an action).
  - Address the common error of using adjectives instead of adverbs directly, using
    simple English explanation.
- section: Основи та формування
  words: 450
  points:
  - 'Explain the derivation rule: Adjective stem + -ий → -о (швидкий → швидко) with
    a step-by-step visual mapping.'
  - Highlight the exception добрий → добре, dedicating a paragraph to its frequency
    and use as a universal 'OK/Agreed'.
  - 'Establish standard word order: Adverb follows the verb (Він працює добре) with
    3-4 simple example sentences.'
- section: Час та частота
  words: 450
  points:
  - 'Present the frequency scale visually: завжди → зазвичай → часто → іноді → рідко
    → ніколи.'
  - Provide a dedicated H3 for 'ніколи', explicitly teaching the double negation rule
    (Я ніколи не...).
  - Integrate Catalog A spatial and temporal markers (тут, там, сьогодні, завтра)
    into simple sentence patterns.
- section: Синтаксис та інтенсивність
  words: 400
  points:
  - 'Introduce intensity modifiers: дуже, трохи, зовсім, майже.'
  - 'Emphasize the strict placement rule: ''дуже'' MUST precede the modified word,
    never at the end.'
  - Provide correct vs. incorrect examples (дуже добре vs добре дуже) to preempt learner
    errors.
- section: Підсумок та культура
  words: 300
  points:
  - 'Integrate the cultural hook: explain the proverb «Повільно їдеш — далі будеш».'
  - Frame a short 'Food Critic' roleplay scenario describing how someone cooks or
    eats.
  - Provide a short paragraph modeling a daily routine using frequency adverbs (Я
    зазвичай снідаю швидко).
