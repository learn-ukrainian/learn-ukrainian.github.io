slug: what-time-is-it
title: What Time Is It?
word_target: 1200
content_outline:
- section: Вступ (Introduction)
  slug: vtsup-introduction
  words: 200
  points:
  - Introduce the lesson goals using English scaffolding.
  - 'Cultural hook: Ukrzaliznytsia''s legendary punctuality and the value of being
    «вчасно» (on time).'
  - Introduce the distinction between «Котра година?» (current time) and «О котрій?»
    (scheduled time).
  - 'Provide polite inquiry formulas using the Vocative case: «Пане / пані, скажіть,
    будь ласка...».'
- section: Презентація часу (Time Presentation)
  slug: prezentatsiya-chasu
  words: 350
  points:
  - Explain that hours use feminine ordinal numbers (перша, друга) to agree with «година».
    Include a 1-12 table.
  - 'Address the common learner error: warn against using cardinal numbers like «два
    годин».'
  - Introduce the 'telegraphic style' for minutes (година + хвилина, e.g., «п'ята
    тридцять») for A1 simplicity.
  - Include short mini-dialogues asking and telling the time, with IPA for new words.
- section: Дні та місяці (Days and Months)
  slug: dni-ta-misyatsi
  words: 350
  points:
  - 'Present the 7 days of the week. Explain the rule: use «у/в» + Accusative case
    for ''on [Day]''.'
  - Warn against using Locative for days and explain euphony rules for у/в.
  - Present the 12 months, grouped by season, noting their lowercase spelling and
    cultural connection to nature.
  - 'Explain the rule: use «у/в» + Locative case for ''in [Month]'' («у січні»).'
- section: Практика та розклад (Practice and Schedule)
  slug: praktyka-ta-rozklad
  words: 200
  points:
  - 'Introduce prepositions for scheduling: «о» (at), «до» (until), «після» (after).'
  - 'Explain the register distinction: 24-hour format for official schedules vs. 12-hour
    format for conversational speech.'
  - 'Provide a reading scenario: a simple train conductor''s shift schedule.'
- section: Підсумок (Summary)
  slug: pidsumok-summary
  words: 100
  points:
  - Recap the main grammatical rules for time, days, and months.
  - Provide 3-4 self-check questions to verify learner understanding.