slug: what-time-is-it
title: What Time Is It?
word_target: 1200
content_outline:
- section: Вступ
  words: 400
  points:
  - Explicit English scaffolding paragraph introducing the goals of the lesson.
  - 'Cultural hook: Ukrzaliznytsia''s 92%+ punctuality and the value of being «вчасно»
    (on time) as a symbol of Ukrainian resilience.'
  - 'Introduce the difference between the two core questions: «Котра година?» (current
    time) vs. «О котрій?» (scheduled time).'
  - 'Provide examples of polite address using the Vocative case (§4.2.3.4): «Пане
    / пані, скажіть, будь ласка, котра година?».'
- section: Презентація часу
  words: 600
  points:
  - Explain in English that hours use feminine ordinal numbers (перша, друга) to agree
    with «година». Include a table for 1-12.
  - 'Address common learner error: warn against using cardinal numbers like «два годин»,
    explaining why «друга година» is correct.'
  - Introduce 'telegraphic style' for minutes (година + хвилина, e.g., «п'ята тридцять»)
    for A1 simplicity.
  - Include short mini-dialogues asking and telling the current time, with IPA for
    first occurrence of new words.
- section: Дні та місяці
  words: 600
  points:
  - 'Present the 7 days of the week. Explain the grammar rule (§4.2.3.2.2): use «у/в»
    + Accusative case for ''on [Day]'' («у понеділок»).'
  - Warn against using Locative for days. Mention euphony rules for choosing between
    у and в.
  - Present the 12 months, highlighting their authentic connection to nature (e.g.,
    січень, лютий) as a cultural note.
  - 'Explain the grammar rule (§4.2.3.3): use «у/в» + Locative case for ''in [Month]''
    («у січні», «у травні»). Group months by season in a table.'
- section: Практика та розклад
  words: 400
  points:
  - 'Introduce prepositions for scheduling: «о» (at), «до» (until), «після» (after),
    and «з... до» (from... to).'
  - 'Explain the register distinction: 24-hour format for official schedules (transport)
    vs. 12-hour format for conversational speech.'
  - 'Provide a reading scenario: a simple daily routine or a train conductor''s shift
    schedule.'
  - Conclude with an informal dialogue planning a meeting for the coming week, integrating
    days and time expressions.
