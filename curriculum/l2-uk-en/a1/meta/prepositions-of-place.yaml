slug: prepositions-of-place
title: Prepositions of Place
word_target: 2000
content_outline:
- section: В/У + Місцевий відмінок
  words: 500
  points:
  - 'Note for Author: Provide explicit English scaffolding for the Locative case''s
    role as an ''обставина'' (adverbial of place). Define enclosed spaces logic.'
  - Explain location inside enclosed spaces using «в/у» + Locative. Provide 5+ high-frequency
    collocations for buildings, cities, and countries (в магазині, у школі) with English
    translations.
  - 'Decolonization note: Explicitly teach «в Україні» (in Ukraine) as the standard
    for sovereign states. Do not mention Russian equivalents.'
  - 'Introduce the euphonic rule (милозвучність) for «в» vs «у». Show clear contrast
    pairs: «в університеті» vs «у школі», «в Києві» vs «у Львові». Drill the correction
    of «В Львові» to «У Львові».'
  - Review Locative consonant alternations (г→з, к→ц, х→с) from a1-13 with a reference
    table and 3+ contextual examples (у руці, на нозі, у вусі).
- section: На + Місцевий відмінок
  words: 500
  points:
  - Explain physical surface locations using «на» + Locative (на столі, на стіні,
    на підлозі) using English scaffolding to define the physical contact meaning.
  - Detail the institutional/event exception for «на» (на роботі, на пошті, на концерті,
    на уроці) emphasizing social or public activities.
  - 'Provide explicit contrast pairs to solidify understanding: «в кімнаті» (enclosed
    space) vs «на кухні» (traditional surface/hearth exception), «в театрі» (inside
    the building) vs «на виставі» (at the performance).'
- section: Біля, поруч, між
  words: 400
  points:
  - Introduce «біля» + Genitive for basic proximity. Give 4+ examples (біля школи,
    біля парку, біля зупинки) useful for navigation.
  - Introduce «навпроти» + Genitive for orientation and opposite positioning (навпроти
    банку, навпроти аптеки).
  - Introduce «поруч з» and «між» as formulaic vocabulary chunks for proximity without
    deep-diving into the Instrumental case grammar yet. Provide 2-3 simple contextual
    sentences.
- section: Де знаходиться...?
  words: 350
  points:
  - Teach the formal question structure «Де знаходиться...?» (Where is located...?)
    alongside the simpler «Де...?».
  - Provide a mini-dialogue demonstrating a tourist asking for directions using Kyiv
    landmarks (Хрещатик, Золоті Ворота).
  - Show full sentence answers combining the formal location verb «знаходиться» with
    the newly learned prepositions and case forms (e.g., Пошта знаходиться на вулиці
    Хрещатик).
- section: Практика
  words: 250
  points:
  - Provide a short, structured reading passage describing a room layout or a city
    neighbourhood, utilizing all taught prepositions in connected speech.
  - Include a mini-dialogue focusing on real-life navigation (e.g., finding an ATM
    or cafe).
  - Ensure all practice vocabulary strictly aligns with the A1 core vocabulary limits.
