slug: prepositions-of-place
title: Prepositions of Place
word_target: 2000
content_outline:
- section: В/У + Місцевий відмінок
  words: 500
  points:
  - 'Note for Author: A1 level requires clear English scaffolding for grammar concepts
    before showing Ukrainian examples. Briefly define the Locative case function for
    location.'
  - Explain enclosed spaces logic using 'в/у' + Locative. Provide 5+ high-frequency
    examples (в магазині, в Україні, у кімнаті) with English translations.
  - 'Introduce the euphonic rule (милозвучність) for ''в'' vs ''у''. Show clear contrast
    pairs: ''в університеті'' vs ''у школі'', ''в Києві'' vs ''у Львові''.'
  - Review consonant alternations (г→з, к→ц, х→с) from earlier modules with a clear
    reference table and 3+ contextual examples (у руці, на нозі).
- section: На + Місцевий відмінок
  words: 500
  points:
  - Explain physical surface locations using 'на' + Locative (на столі, на стіні,
    на підлозі).
  - Detail the institutional/event exception for 'на' (на роботі, на пошті, на концерті)
    emphasizing the concept of social or public activities.
  - 'Provide explicit contrast pairs to solidify understanding: ''в кімнаті'' (enclosed
    physical space) vs ''на кухні'' (traditional exception), ''в театрі'' (inside
    the building) vs ''на виставі'' (at the performance).'
- section: Біля, поруч, між
  words: 400
  points:
  - Introduce 'біля' + Genitive for basic proximity. Give 3+ examples (біля школи,
    біля метро) useful for navigation.
  - Introduce 'навпроти' + Genitive for orientation and opposite positioning (навпроти
    банку, навпроти аптеки).
  - Introduce 'поруч з' and 'між' as formulaic vocabulary chunks (without deep-diving
    into the Instrumental case grammar). Provide 2-3 simple contextual sentences.
- section: Де знаходиться...?
  words: 350
  points:
  - Teach the formal question structure 'Де знаходиться...?' (Where is located...?)
    alongside the simpler 'Де...?'.
  - Provide a mini-dialogue demonstrating a tourist asking for directions using Kyiv
    landmarks (Хрещатик, Золоті Ворота).
  - Show full sentence answers combining the location verb 'знаходиться' with the
    newly learned prepositions and case forms.
- section: Практика
  words: 250
  points:
  - Provide a short, structured reading passage describing a room layout or a city
    neighbourhood, utilizing all taught prepositions in connected speech.
  - Include a mini-dialogue focusing on real-life navigation (e.g., finding an ATM
    or cafe).
  - Ensure all practice vocabulary strictly aligns with the A1 core vocabulary limits.
