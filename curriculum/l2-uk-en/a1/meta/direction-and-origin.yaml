slug: direction-and-origin
title: Direction and Origin
word_target: 2000
content_outline:
- section: Куди? + Знахідний
  words: 500
  points:
  - 'Note for author: Use English scaffolding for all grammar rules and explanations
    (A1 requirement: 10-50% immersion).'
  - Introduce the question 'Куди?' (Where to?) and contrast it conceptually with 'Де?'
    (Where at?).
  - 'Explain the rule for direction: verbs of motion (іти, їхати) + в/у or на + Accusative
    case.'
  - Detail the Accusative forms for inanimate nouns (masculine remains same, feminine
    -а/-я changes to -у/-ю).
  - 'Provide clear examples: Я іду в магазин, Я їду на роботу. Include a strict decolonization
    note: always use ''в Україну'' (entering the state), never ''на Україну''.'
- section: До + Родовий
  words: 400
  points:
  - Introduce 'до' + Genitive case for direction using English scaffolding.
  - 'Explain its specific semantic use: approaching a boundary, a city, or going to
    see a person (до лікаря, до Києва).'
  - 'Contrast with в/у: ''в лікарню'' (entering the building) vs ''до лікаря'' (visiting
    the person).'
  - Provide a brief Genitive ending overview (-а/-я for masculine, -и/-і for feminine)
    for the core examples used.
- section: Звідки? + Родовий
  words: 400
  points:
  - Introduce the question 'Звідки?' (Where from?) with clear English explanations.
  - Explain 'з / із / зі' + Genitive for spatial origin (з України, зі Львова). Reiterate
    the decolonized 'з України'.
  - Explain 'від' + Genitive for origin/returning from a person (від мами, від лікаря).
  - Include phonetic/euphony rules for choosing between з, із, and зі.
- section: Три питання
  words: 400
  points:
  - 'Present the unified spatial paradigm: Де? (Location) → Куди? (Destination) →
    Звідки? (Origin).'
  - 'Create a comprehensive summary table showing parallel phrases: в школі / в школу
    / зі школи.'
  - Demonstrate with multiple noun types (a building, an event, a person, a country).
- section: Практика
  words: 300
  points:
  - Provide simple dialogue examples reflecting real-life travel and daily movement
    (Куди ти йдеш? — Я на роботу).
  - 'Include guided transformation examples: taking a location and producing its direction
    and origin equivalents.'
  - Ensure all examples have English translations, maintaining the A1 safe-harbor
    approach.
