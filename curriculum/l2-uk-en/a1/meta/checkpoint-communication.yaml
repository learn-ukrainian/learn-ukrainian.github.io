slug: checkpoint-communication
title: 'Checkpoint: Communication'
word_target: 2000
content_outline:
- section: Огляд
  words: 300
  points:
  - Introduce the A1.5 checkpoint consolidating modals, imperatives, and everyday
    scenarios.
  - 'Explicitly state English scaffolding guidelines: English used ONLY for complex
    task instructions and grammar concept reviews; scenario dialogues must be 100%
    Ukrainian.'
  - Provide a warm-up self-assessment checklist (3-4 questions) verifying the learner's
    confidence with ability, necessity, and polite commands.
- section: 'Навичка 1: Модальні дієслова'
  words: 500
  points:
  - Define and contrast 'могти' (circumstantial ability) and 'вміти' (learned skill)
    with 4 paired examples without referencing Russian.
  - Explain the three-way negative contrast (не можу, не вмію, не можна) using clear
    everyday scenarios.
  - 'Detail obligation modals: ''треба/потрібно'' (impersonal, Dative required) vs
    ''повинен'' (personal duty) vs ''хотіти'', using a table to show the intensity
    scale.'
  - Include an H3 mini-dialogue (6-8 lines) between friends discussing weekend plans,
    demonstrating at least 4 modals natively.
- section: 'Навичка 2: Накази та прохання'
  words: 400
  points:
  - 'Present a 3-column table of imperative forms (Ти and Ви) for the 8 core verbs:
    читай, пиши, скажи, дай, іди, слухай, дивись, стій.'
  - Explain how to form polite requests natively using 'будь ласка' and 'прошу вас'
    + infinitive. Provide 3 examples of escalating politeness.
  - Contrast positive and negative commands (e.g., 'читай' vs 'не читай') focusing
    on everyday situations like public transport etiquette ('Сідайте, будь ласка!').
- section: 'Навичка 3: Повсякдення'
  words: 400
  points:
  - Review family, appearance, and age vocabulary through a cohesive descriptive paragraph
    about a friend.
  - Revisit hobbies ('грати в/на') and invitation patterns ('Ходімо!', 'Давай зустрінемось!')
    with 3 contextual examples.
  - Integrate travel and transport expressions (Instrumental case for transport means,
    basic directions) into a short travel narrative.
- section: Інтеграційне завдання
  words: 400
  points:
  - 'Present a realistic H3 scenario: Planning a weekend trip with a friend.'
  - Provide a model response (dialogue of ~80 words) that natively integrates modals,
    imperatives, travel vocabulary, and invitations.
  - Include a step-by-step prompt for the learner to write their own plan, enforcing
    the use of 'хочеш', 'треба', at least two imperatives, and transport vocabulary.
