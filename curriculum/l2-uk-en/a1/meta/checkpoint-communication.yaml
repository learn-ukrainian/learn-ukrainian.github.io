slug: checkpoint-communication
title: 'Checkpoint: Communication'
word_target: 2000
content_outline:
- section: Огляд
  words: 300
  points:
  - 'Introduce the A1.5 checkpoint: a comprehensive consolidation of modals, imperatives,
    and daily life scenarios.'
  - 'Explicitly state English scaffolding requirements: use English to clarify complex
    task instructions, but keep scenario dialogues in 100% Ukrainian.'
  - Include a warm-up self-assessment checklist (3-4 questions) asking the learner
    if they can confidently express ability, necessity, and polite commands.
- section: 'Навичка 1: Модальні дієслова'
  words: 500
  points:
  - Contrast 'могти' (circumstantial ability) and 'вміти' (learned skill) with 4 paired
    examples demonstrating the conceptual difference.
  - Explain the three-way negative contrast (не можу / не вмію / не можна) with clear
    scenario descriptions.
  - 'Detail the obligation modals: ''треба/потрібно'' (impersonal, requiring Dative)
    vs ''повинен'' (personal duty) vs ''хотіти''. Include a table showing the intensity
    scale.'
  - Provide a mini-dialogue (6-8 lines) where two characters discuss weekend plans,
    utilizing at least 4 different modal verbs naturally.
- section: 'Навичка 2: Накази та прохання'
  words: 400
  points:
  - 'List the imperative forms (Ти and Ви) for the 8 required verbs: читай, пиши,
    скажи, дай, іди, слухай, дивись, стій. Use a clear 3-column table.'
  - Explain how to form polite requests natively by adding 'будь ласка' or using 'прошу
    вас' + infinitive. Give 3 examples of escalating politeness.
  - Contrast positive and negative commands with 4 pairs of examples (e.g., 'читай'
    vs 'не читай'), emphasizing everyday context.
- section: 'Навичка 3: Повсякдення'
  words: 400
  points:
  - Review family, appearance, and age vocabulary using a descriptive paragraph about
    a friend or family member.
  - Revisit hobbies and leisure vocabulary ('грати в/на') and invitation patterns
    ('Ходімо!', 'Давай зустрінемось!') with 3 contextual examples.
  - Integrate travel and transport expressions (Instrumental case for means of transport,
    basic directions) into a short, cohesive travel narrative.
- section: Інтеграційне завдання
  words: 400
  points:
  - 'Present a realistic scenario: Planning a weekend trip with a friend.'
  - Provide a model response (dialogue of ~80 words) that successfully integrates
    modals, imperatives, travel vocabulary, and invitations.
  - Give a step-by-step prompt for the learner to create their own plan, ensuring
    they use 'хочеш', 'треба', at least two imperatives, and transport vocabulary.
