slug: the-accusative-i-things
title: 'The Accusative I: Things'
word_target: 1200
content_outline:
- section: 'Вступ: Що я бачу?'
  words: 250
  points:
  - 'English Scaffolding: Clearly define the grammatical concepts of Subject (підмет),
    Verb/Action (присудок), and Direct Object (додаток) using English explanations.'
  - Explain that while English uses strict word order to show 'who does what to whom',
    Ukrainian uses word endings, allowing for beautiful sentence flexibility.
  - 'Warm-up: ''Що я бачу в кімнаті?'' (Nominative review) to anchor concrete objects
    before introducing the case change. Prime the structure with ''бачити''.'
- section: 'Презентація: Знахідний відмінок'
  words: 400
  points:
  - Each case form gets its own H3 with definition, 2+ examples, and usage notes.
  - 'H3 for Feminine Singular: Teach the mandatory transformation (-а → -у, -я → -ю)
    using high-frequency words (книга → книгу, кава → каву). Warn against the ''Conceptual
    Nominative'' error.'
  - 'H3 for Masculine and Neuter ''Safe Harbor'': Explain that inanimate masculine
    and neuter nouns do NOT change (стіл → стіл, вікно → вікно). Explicitly warn against
    ''Masculine Inanimate Confusion''.'
  - 'H3 for Trigger Verbs: Introduce core action verbs that demand the Accusative:
    мати, хотіти, брати, чути, бачити, купувати. Provide simple SVO sentences for
    each.'
- section: 'Практика: Запобігання помилкам'
  words: 300
  points:
  - 'H3: Transformation drills contrasting the changing Feminine forms with the stable
    Masculine/Neuter inanimate nouns.'
  - 'H3: Targeted Error Prevention. Explicitly correct ''Я читаю книга'' to ''Я читаю
    книгу'' and explain why.'
  - 'Introduce high-frequency collocations using research-backed items: ''бачити проблему'',
    ''чути голос'', ''брати трубку'', ''мати можливість''.'
  - Provide a simple matching or fill-in-the-blank text structure for learners to
    mentally practice the endings.
- section: 'Виробництво та Культура: У супермаркеті'
  words: 250
  points:
  - 'H3: Cultural Hook — The ''Пакет потрібен?'' checkout meme. Discuss shopping dynamics:
    the impersonal ''супермаркет'' vs. the lively ''базар''.'
  - 'H3: Creating a shopping list. Practice using ''Я хочу купити...'' with cultural
    staples like ''хліб'' (masculine, no change) and ''гречка'' (feminine, changes
    to гречку).'
  - Describe items in a Ukrainian store context using 'Я бачу...' and 'Я купую...',
    integrating all learned vocabulary into a mini-dialogue or descriptive paragraph.
