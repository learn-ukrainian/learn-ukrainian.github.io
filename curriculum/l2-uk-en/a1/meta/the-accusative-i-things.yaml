slug: the-accusative-i-things
title: 'The Accusative I: Things'
word_target: 855
content_outline:
- section: 'Розминка: Що ми бачимо?'
  words: 60
  points:
  - 'Активізація уваги: називаємо предмети в кімнаті (називний відмінок)'
  - Введення дієслова 'бачити' (to see) як містка до нового відмінка
  - 'Контраст: ''Це стіл'' (Називний) vs ''Я бачу стіл'' (Знахідний)'
  - 'Анонс теми: вчимося говорити про об''єкти дії'
- section: 'Граматика: Знахідний відмінок для предметів'
  words: 593
  points:
  - 'Функція знахідного відмінка: прямий додаток (Direct Object) без прийменника'
  - 'Правило ''Безпечної гавані'' (Safe Harbor): Чоловічий (неістоти) та Середній
    рід не змінюються (стіл → стіл, вікно → вікно)'
  - 'Попередження помилки (Alert): Не плутати з живими істотами (не ''бачу стола'',
    а ''бачу стіл'')'
  - 'Основна зміна: Жіночий рід (-а → -у, -я → -ю). Приклади: книга → книгу, кухня
    → кухню'
  - 'Попередження помилки (Alert): Жіночий рід мусить змінитися (не ''читаю книга'',
    а ''читаю книгу'')'
  - 'Ключові дієслова-тригери: бачити, чути, брати, мати, хотіти, купувати'
  - Таблиця відмінювання для наочності (Називний → Знахідний)
- section: 'Практика: Змінюємо закінчення'
  words: 88
  points:
  - 'Трансформаційна вправа: Називний (що це?) → Знахідний (я бачу...)'
  - 'Робота з родами: сортування слів на ''змінюється'' (жіночий) і ''не змінюється''
    (чоловічий/середній)'
  - Заповнення пропусків у реченнях з дієсловами 'мати' та 'хотіти'
  - Фокус на автоматизацію закінчення -у/-ю для жіночого роду
- section: 'Говоримо: Список покупок'
  words: 63
  points:
  - 'Ситуація: Складаємо список покупок (Shopping List)'
  - Конструкція 'Я хочу купити...' + продукти (гречка, хліб, кава)
  - 'Опис вітрини: ''У магазині я бачу...'''
  - Використання вивчених дієслів у контексті покупок
- section: 'Культура: На українському ринку'
  words: 51
  points:
  - Традиція базарів та ринків в Україні (свіжі продукти, спілкування)
  - 'Базові продукти: гречка та хліб як основа кошика'
  - 'Культурний код каси: ''Пакет потрібен?'' (The Packet Question)'
  - Важливість ввічливості при покупці
engagement_min: 4
example_min: 8
