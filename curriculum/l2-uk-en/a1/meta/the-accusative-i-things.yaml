slug: the-accusative-i-things
title: 'The Accusative I: Things'
word_target: 2000
content_outline:
- section: 'Вступ: Предмети навколо нас'
  words: 300
  points:
  - Start with concrete, visible objects using 'Що я бачу?' to anchor the concept.
  - Introduce the grammatical concept of 'Direct Object' (Object of action) vs Subject
    using clear English scaffolding.
  - Contrast English (word order) vs Ukrainian (word endings) to show how objects
    are marked.
  - Prime the structure using the verb 'бачити' (to see) with masculine/neuter objects
    first (no change).
- section: 'Теорія: Знахідний відмінок для неістот'
  words: 600
  points:
  - 'Define the Core Rule for Feminine Nouns: -а → -у, -я → -ю (книга → книгу, кухня
    → кухню).'
  - 'Explain the ''Safe Harbor'' rule: Masculine Inanimate and Neuter nouns do NOT
    change form (стіл → стіл, вікно → вікно).'
  - 'Visual Table: Contrast the changing Feminine forms vs the stable Masculine/Neuter
    forms.'
  - 'Address Common Error: The urge to add endings to masculine objects (confusing
    with animate rule).'
  - 'Introduce trigger verbs that require Accusative: бачити, чути, брати, мати, хотіти,
    купувати.'
- section: 'Практика: Вчимося змінювати закінчення'
  words: 400
  points:
  - 'Guided walkthrough: Step-by-step transformation of Nominative → Accusative for
    a mixed list of nouns.'
  - 'Discrimination Drill: Focus on distinguishing WHEN to change (Feminine) vs WHEN
    to relax (Masc/Neut).'
  - 'Usage examples with ''мати'' (to have): ''Я маю час'', ''Я маю ідею'' (abstract
    objects).'
  - 'Usage examples with ''хотіти'' (to want): ''Я хочу каву'', ''Я хочу чай''.'
- section: 'Ситуація: У магазині та вдома'
  words: 400
  points:
  - 'Scenario: Creating a shopping list using ''Я хочу купити...'' (I want to buy...).'
  - 'Include staple cultural items: ''хліб'' (bread), ''гречка'' (buckwheat), ''олія''
    (oil).'
  - 'Scenario: Describing what you see in a shop context (''Я бачу...'').'
  - 'Practice using ''брати'' (to take) in context: ''Я беру кошик'' (I take a basket).'
- section: 'Культурний погляд: Базар чи супермаркет?'
  words: 300
  points:
  - Contrast the 'базар' (market) culture with the modern supermarket experience.
  - 'Introduce the iconic checkout phrase: ''Пакет потрібен?'' (Do you need a bag?).'
  - Mention daily shopping rituals and the importance of fresh bread.
