slug: questions-and-negation
title: Questions & Negation
word_target: 2000
content_outline:
- section: 'Вступ: Мистецтво ставити питання'
  words: 300
  points:
  - 'Introduce the concept: Communication is a two-way street requiring questions
    and answers'
  - 'The ''Simple Truth'': Explicitly state that Ukrainian has NO auxiliary verbs
    like ''do/does'' — liberate the learner from this English constraint'
  - 'Basic Negation: Introduce the particle «не» (not) placed immediately before the
    verb'
  - 'Learner Trap: Clear distinction between «ні» (No - the answer) and «не» (Not
    - the particle) with examples'
- section: 'Граматика: Як будувати питання'
  words: 800
  points:
  - 'Method 1: The Particle «Чи» — formal/standard Yes/No questions (e.g., «Чи ти
    знаєш?»)'
  - 'Method 2: Intonation (↗) — the casual/conversational alternative without «чи»'
  - 'The ''Do'' Trap Deep Dive: detailed breakdown of why ''Do you...'' does not exist
    and how to think instead'
  - 'The Answers: Standard replies «Так» (Yes) and «Ні» (No)'
  - 'Question Words (Special Questions): Introduce «Хто», «Що», «Де», «Коли»'
  - 'Spoken Reality: Brief note on «що» vs «шо» — teach standard but validate the
    street sound'
- section: 'Практика: Інтонація та конструктор'
  words: 500
  points:
  - 'Transformation Drill: Step-by-step guide to turning statements into questions
    (Statement -> Question with Чи -> Question with Intonation)'
  - 'Intonation Workshop: Visualizing the pitch rise (↗) for questions vs the drop
    (↘) for statements'
  - 'Word Choice: Scenarios for choosing between ''Who'' (person) and ''What'' (thing/action)'
  - 'Negation Practice: Making positive statements negative (I know -> I don''t know)'
- section: 'Застосування: Розмова в реальному житті'
  words: 300
  points:
  - 'Context: A simple cafe dialogue using the new question forms'
  - 'Pattern: ''Do you have...?'' (unidiomatic A1 version is fine: ''u vas ye...?'')
    or simply pointing and asking ''Is this...?'''
  - 'Meeting People: ''Who is this?'' / ''Is this [Name]?'' questions'
- section: 'Культурний контекст: Ввічливість і гумор'
  words: 200
  points:
  - 'Register Nuance: Explain when to use «чи» (polite/clear) vs when to drop it (friends/family)'
  - 'Cultural Hook: The ALF connection — «Ти не любиш котів?» — explaining why this
    specific dub is culturally significant in Ukraine'
  - 'Softening the ''No'': Brief mention that a bare ''Ні'' can be blunt, and ''Ні,
    не...'' is softer'
