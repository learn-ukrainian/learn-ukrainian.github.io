- points:
  - 'Questions drive conversation: moving beyond simple statements to interaction'
  - 'The ''Good News'': Ukrainian questions are structurally simpler than English
    (no ''do/does'' gymnastics)'
  - 'Core tools: The particle ''чи'', rising intonation, and the negation particle
    ''не'''
  section: 'Вступ: Мистецтво запитань'
  words: 100
- points:
  - 'H3: Yes/No Questions with ''Чи'': Structure (Чи + statement?), polite/formal
    nuance'
  - 'H3: The Casual Alternative: Dropping ''чи'' and relying entirely on rising intonation
    (visualize with ↗ arrows)'
  - 'H3: Answering: ''Так'' (Yes) vs. ''Ні'' (No); distinguishing ''ні'' (no) from
    ''не'' (not)'
  - 'H3: Simple Negation: Placing ''не'' strictly before the verb (e.g., ''Я не знаю'',
    not ''Я ні знаю'')'
  - 'H3: Question Words (Special Questions): Хто, Що (mentioning ''шо'' as common
    spoken variant), Де, Коли'
  - 'H3: The ''Do'' Trap: Explicit warning against translating English auxiliary ''do''
    (e.g., ''Робиш ти знати?'' is wrong)'
