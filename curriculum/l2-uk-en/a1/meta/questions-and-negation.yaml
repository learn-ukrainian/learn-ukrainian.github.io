slug: questions-and-negation
title: Questions & Negation
word_target: 2000
content_outline:
- section: 'Вступ: Мистецтво ставити питання'
  words: 300
  points:
  - 'Intro: Communication requires both asking and answering, not just stating facts'
  - 'The ''Simple Truth'': Ukrainian questions do not need auxiliary verbs (no ''do/does'')
    — strict separation from English logic'
  - 'Basic Negation: Introducing the particle «не» (not) before the verb'
  - 'Learner Trap: Distinguishing «ні» (No - the answer) vs «не» (Not - the particle)'
- section: 'Граматика: Питальні речення'
  words: 800
  points:
  - 'Yes/No Questions: The standard structure with the particle «чи» (e.g., «Чи ти
    читаєш?»)'
  - 'Intonation: Using rising pitch (↗) to ask questions without «чи» (casual/spoken
    style)'
  - 'The Answers: Using «Так» (Yes) and «Ні» (No) correctly'
  - 'Wh-Questions: Introducing «Хто», «Що», «Де», «Коли», «Чому», «Як»'
  - 'Spoken Reality: The standard «що» vs the very common spoken «шо» (validate but
    teach standard)'
  - 'The ''Do'' Trap: Detailed explanation of why transforming ''Do you know?'' to
    ''Robysh ty znaty?'' is wrong'
- section: 'Практика: Інтонація та конструктор'
  words: 400
  points:
  - 'Mechanics: Transforming statements into questions using both «чи» and intonation'
  - 'Context Drills: Choosing the correct question word (Who vs What, Where vs When)'
  - 'Intonation Workshop: Visualizing the difference between a statement and a question
    (↘ vs ↗)'
- section: 'Застосування: Діалоги в кафе'
  words: 300
  points:
  - 'Scenario 1: Asking for a menu or item (''Do you have...?'')'
  - 'Scenario 2: Simple social questions (''Who is this?'', ''What is that?'')'
  - 'Q&A Patterns: Practice chaining questions and answers in a natural flow'
- section: 'Культурний контекст: Від «Альфа» до етикету'
  words: 200
  points:
  - 'Register Check: «Чи» is polite/literary; dropping it is casual/conversational'
  - 'Cultural Hook: The legendary ALF dubbing quote — «Ти не любиш котів? Ти просто
    не вмієш їх готувати!»'
  - 'Politeness: How intonation changes the ''temperature'' of a conversation'
