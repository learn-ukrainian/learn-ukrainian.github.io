slug: questions-and-negation
title: Questions & Negation
word_target: 1200
content_outline:
- section: 'Вступ: Основи заперечення та інтонації'
  slug: vtsup-osnovy-zaperetchennia
  words: 250
  points:
  - 'Explicitly address the ''Do Trap'' using English scaffolding: explain that Ukrainian
    has no ''do/does'' helper verbs for questions or negation.'
  - Introduce the critical difference between «ні» (the standalone answer 'No') and
    «не» (the particle 'not', placed directly before the verb).
  - Use visual pitch arrows (↗ vs ↘) to illustrate rising intonation for questions
    versus the falling tone of negative statements.
- section: 'Презентація: Питальні конструкції'
  slug: prezentatsiia-pytalni-konstruktsii
  words: 450
  points:
  - 'Create an H3 ''Intonation-Only Questions'': Show how to form casual questions
    purely by applying a sharp pitch rise (↗) on the focus word.'
  - 'Create an H3 ''Yes/No Questions with Чи'': Teach the particle «чи» as the polite/formal
    standard question marker (e.g., Чи ви розумієте?).'
  - 'Create an H3 ''Question Words'': Introduce the core State Standard set (що, хто,
    де, коли) with basic present tense examples.'
  - Include a 'Street Sound' callout explaining the standard «що» versus the ubiquitous
    spoken variant «шо».
- section: 'Практика: Тренування заперечень та запитань'
  slug: praktyka-trenuvannia
  words: 300
  points:
  - 'Present a clear transformation paradigm: Positive Statement -> Negative Statement
    -> Question with Чи -> Intonation Question (e.g., Ти знаєш -> Ти не знаєш -> Чи
    ти знаєш? -> Ти знаєш?).'
  - Draft a 'Cafe Scenario' mini-dialogue focusing on «де», «чи є», and «що» to bridge
    towards M41.
  - Incorporate basic frequency adverbs (завжди, ніколи) into negative statements,
    emphasizing the double negation pattern (e.g., Я ніколи не...).
- section: 'Підсумок: Культурний контекст та перевірка'
  slug: pidsumok-kulturnyi-kontekst
  words: 200
  points:
  - 'Explain register nuances: when to use formal «чи» (strangers, business) vs casual
    intonation (friends, family).'
  - Highlight the iconic ALF quote («Ти не любиш котів? Ти просто не вмієш їх готувати!»)
    as a memorable example of negation.
  - Include 3-4 self-check questions to verify understanding of 'ні' vs 'не', the
    absence of 'do', and basic question formation.
