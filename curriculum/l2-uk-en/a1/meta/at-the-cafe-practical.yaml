slug: at-the-cafe-practical
title: At the Café
word_target: 2050
content_outline:
- section: 'Культура кави: більше ніж напій'
  words: 146
  points:
  - 'Україна та кава: чому Львів — кавова столиця (легенда про Юрія Кульчицького)'
  - 'Словничок гурмана: різниця між «чашкою» та «філіжанкою»'
  - Де ми? Різниця між «кав'ярнею» (coffee shop) та «рестораном»
  - 'English Scaffolding: Brief cultural context in English, introducing key Ukrainian
    terms'
- section: Як замовити каву та десерт
  words: 417
  points:
  - 'Крок 1: Привітання (Добрий день, Привіт) та запитання про меню (Що ви порадите?)'
  - 'Крок 2: Формула замовлення «Я буду...» / «Можна мені...» + Знахідний відмінок
    (кава -> каву)'
  - 'Граматичний фокус (English explanations): Accusative case for direct objects
    (ordering things)'
  - 'Ввічливість: магічне слово «будь ласка» (ставимо в кінці або всередині, не на
    початку)'
  - 'Уточнення деталей: з молоком, без цукру, велика/маленька'
  - 'Крок 3: Оплата (Рахунок, будь ласка; Карткою чи готівкою?)'
- section: 'Практика: Діалоги біля каси'
  words: 125
  points:
  - 'Діалог 1: Класичне замовлення (кава + круасан) з використанням «будь ласка»'
  - 'Діалог 2: Сучасні потреби (пароль від Wi-Fi, де розетка?)'
  - 'Діалог 3: Завершення візиту та оплата рахунку (окремо чи разом?)'
- section: 'Читання: Затишок львівської кав''ярні'
  words: 137
  points:
  - Текст-розповідь про візит до культової львівської кав'ярні (наприклад, «Під синьою
    пляшкою»)
  - 'Опис атмосфери: аромат кави, затишок, смачні тістечка'
  - Закріплення лексики в контексті (філіжанка, меню, рахунок)
  - Запитання до тексту для перевірки розуміння
