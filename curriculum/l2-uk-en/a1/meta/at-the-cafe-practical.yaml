slug: at-the-cafe-practical
title: At the Café
word_target: 2000
content_outline:
- section: 'Розминка: Кавова культура'
  words: 300
  points:
  - 'Культура кав''ярень в Україні: Львів як кавова столиця та поняття «піти на каву»
    як соціальний ритуал'
  - 'Історична довідка: Юрій Кульчицький та перша кав''ярня у Відні (зв''язок з Україною)'
  - 'Відмінність кав''ярні від ресторану: фокус на атмосфері, десертах та спілкуванні'
- section: 'Презентація: Як зробити замовлення'
  words: 800
  points:
  - 'Привітання та етикет: «Добрий день», «Привіт» та важливість ввічливості'
  - 'Робота з меню: фрази «Що ви порадите?», «Можна меню, будь ласка?»'
  - 'Формула замовлення: конструкція «Мені, будь ласка...» або «Я буду...» + знахідний
    відмінок (кав**у**, ча**й**)'
  - 'Уточнення деталей: «з молоком», «без цукру», «велику/маленьку» (узгодження прикметників)'
  - 'Оплата: фраза «Можна рахунок?» та фіксовані форми «готівкою» / «карткою» (без
    детальної граматики орудного відмінка)'
  - 'Прощання та подяка: обов''язкове використання «Дякую»'
- section: 'Практика: Діалоги в кав''ярні'
  words: 500
  points:
  - 'Діалог 1: Класичне замовлення (кава та десерт) з використанням слова «філіжанка»'
  - 'Діалог 2: Питання про комфорт (Wi-Fi, пароль, розетка, вбиральня)'
  - 'Діалог 3: Оплата рахунку (роздільний рахунок, чайові, вибір способу оплати)'
- section: 'Культурний контекст: Львівська легенда'
  words: 400
  points:
  - Наратив про атмосферу старої львівської кав'ярні (запах кави, музика, інтер'єр)
  - 'Мовна особливість: використання галицизмів (філіжанка, пляцок) для створення
    колориту'
  - 'Підсумок: кав''ярня як місце для натхнення та відпочинку'
