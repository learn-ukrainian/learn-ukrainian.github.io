slug: can-must-want-modals
title: Can, Must, Want - Modals
word_target: 2000
content_outline:
- section: 'Вступ: Модальність у житті'
  words: 150
  points:
  - 'Introduce the three types of modality: Ability, Obligation, Desire'
  - 'Real-life examples: ''Мені треба лікаря'' (Medical need), ''Я хочу кави'' (Desire)'
  - 'English scaffolding: Briefly explain that Ukrainian modals work similarly to
    English but have specific conjugation rules'
- section: 'Могти та Вміти: Фізична можливість і Навичка'
  words: 350
  points:
  - 'Define `Могти`: Physical possibility or external permission (Я можу бігати -
    I am able to run now)'
  - 'Conjugation of `могти`: Highlight the g/zh alternation (можу, можеш, можуть)'
  - 'Define `Вміти`: Learned skill (Я вмію плавати - I know how to swim)'
  - 'Contrast table: Могти vs Вміти with examples'
  - 'Common error warning: Don''t use `могти` for skills'
- section: 'Обов''язок: Треба, Потрібно, Повинен'
  words: 350
  points:
  - 'Introduce `Треба/Потрібно` + Infinitive (Impersonal constructions): ''Треба працювати'''
  - 'Distinguish `Потрібен/Потрібна/Потрібне` (Adjective form) for objects: ''Мені
    потрібна ручка'''
  - 'Introduce `Повинен` (Personal obligation): Agreement with gender/number (Він
    повинен, Вона повинна)'
  - Brief mention of `Мусити` as strong obligation (Must/Have to)
- section: 'Дозвіл і Заборона: Можна та Не можна'
  words: 250
  points:
  - Usage of `Можна` + Infinitive for permission
  - 'Cultural Hook: Using «Можна?» as a standalone polite request'
  - Usage of `Не можна` for prohibition (It is forbidden)
  - 'Examples in public spaces: ''Тут не можна курити'', ''Тут можна паркуватися'''
- section: 'Порада: Варто'
  words: 150
  points:
  - Introduce `Варто` + Infinitive (It is worth doing / You should)
  - Gentle advice vs Strong obligation (Варто vs Треба)
  - 'Examples: ''Варто спробувати'', ''Не варто хвилюватися'''
- section: 'Спроба: Пробувати, Намагатися'
  words: 150
  points:
  - Introduce `Пробувати` (To try/taste) and `Намагатися` (To attempt/strive)
  - Usage with infinitives
  - Brief mention of `Вдаватися` (To succeed/manage to do)
- section: 'Характеристика: Необхідний, Обов''язковий, Можливий'
  words: 150
  points:
  - 'Adjectives for modality: `Необхідний` (Necessary), `Обов''язковий` (Mandatory),
    `Можливий` (Possible)'
  - Agreement with nouns
  - 'Contexts: Documents, official rules, formal requirements'
- section: 'Контекст: Правила та Плани'
  words: 150
  points:
  - Applying modals to school/office rules
  - 'Discussing future plans using modals: ''Я повинен закінчити звіт'''
  - 'Connection to next module: Daily Routine preparations'
- section: 'Практика: Дозвіл та Етикет'
  words: 150
  points:
  - 'Dialogue: Asking for permission to borrow items (''Можна взяти?'')'
  - 'Dialogue: Asking to enter/leave (''Можна вийти?'')'
  - Focus on politeness and correct intonation
- section: 'Практика: Мої можливості та Обов''язки'
  words: 150
  points:
  - 'Narrative practice: Describing what I can, must, and want to do'
  - 'Proverb: «Хто хоче — той може» (Motivation)'
  - Final consolidation of all modal types
