slug: must-and-want
title: Must and Want
word_target: 2000
content_outline:
- section: Треба та Потрібно
  words: 500
  points:
  - 'Introduce the impersonal necessity construction: Треба + infinitive (e.g., Треба
    працювати). Include English scaffolding for ''It is necessary to...'' since immersion
    is < 90%.'
  - 'Explain the Dative + треба pattern: Мені треба йти. Frame it clearly without
    referencing Russian structures. Provide examples for 1st, 2nd, and 3rd person
    pronouns.'
  - Introduce 'потрібно' as a slightly more formal synonym. Show how it can be used
    interchangeably with 'треба' in most A1 contexts.
  - 'Explain the short adjective forms: потрібен (m), потрібна (f), потрібне (n),
    потрібні (pl) for ''need a noun''. Emphasize that it agrees with the noun needed,
    not the speaker.'
- section: Повинен
  words: 400
  points:
  - 'Introduce personal obligation: Я повинен / повинна працювати. Show that unlike
    ''треба'', the subject is explicit (Nominative).'
  - 'Detail the gender agreement paradigm: повинен (m), повинна (f), повинне (n),
    повинні (pl). Provide drills: Він повинен, Вона повинна, Вони повинні.'
  - 'Explain the semantic nuance: implies personal duty or moral obligation, stronger
    than ''треба''. Address the common error of using ''повинен'' for impersonal necessity.'
- section: Хотіти
  words: 400
  points:
  - 'Present the full present tense conjugation: хочу, хочеш, хоче, хочемо, хочете,
    хочуть. Highlight the irregular stem change (хот- → хоч-).'
  - 'Illustrate the two core patterns: хочу + infinitive (Я хочу спати) and хочу +
    Accusative (Я хочу каву).'
  - Introduce the polite variant 'Я б хотів/хотіла...' (I would like...). Explain
    how the conditional particle 'б' softens the request in real-life situations (e.g.,
    ordering in a café).
- section: Порівняння
  words: 400
  points:
  - 'Contrast the three modals: треба (impersonal necessity), повинен (personal duty),
    and хочу (personal desire). Explain how each fills a different communicative niche.'
  - 'Map out the intensity scale: хочу (weakest) → треба (medium) → повинен (strongest).
    Use clear context scenarios to show the difference.'
  - Provide contrasting contextual examples using the same speaker but different modals
    (e.g., Я хочу відпочити vs Мені треба відпочити vs Я повинен працювати) to highlight
    meaning shifts.
- section: Практика
  words: 300
  points:
  - 'Situation drills: Present simple A1 scenarios (e.g., being sick, at work, at
    a café) and require the learner to choose the correct modal construction.'
  - 'Dialogue practice: Provide 2-3 short role-play dialogues using modals in everyday
    conversations (requesting help, expressing wishes, discussing duties) to build
    automaticity.'
