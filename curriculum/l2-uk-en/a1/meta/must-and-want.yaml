slug: must-and-want
title: Must and Want
word_target: 1200
content_outline:
- section: Треба / Потрібно
  words: 500
  points:
  - 'Start with English scaffolding: Explicitly explain the ''It is necessary to...''
    concept in English, strictly following A1 scaffolding rules.'
  - 'Create an H3 to introduce the impersonal construction: Треба + infinitive (Треба
    працювати). Emphasize that ''треба'' is invariable.'
  - Create an H3 for the Dative experiencer pattern. Provide a simple table mapping
    English 'I/You' to Ukrainian Dative pronouns (мені, тобі, йому, їй, нам, вам,
    їм) used with 'треба'.
  - Introduce 'потрібно' as a slightly more formal, written synonym of 'треба'.
  - 'Create an H3 for short adjectives: потрібен (m), потрібна (f), потрібне (n),
    потрібні (pl). Explain they agree with the *needed noun*, not the speaker (Мені
    потрібна допомога).'
- section: Повинен
  words: 400
  points:
  - 'Introduce personal obligation: Subject + повинен + infinitive. Contrast structurally
    with ''треба'' (requires Nominative subject, not Dative).'
  - 'Provide a clear H3 paradigm table for gender/number agreement: повинен (m), повинна
    (f), повинне (n), повинні (pl).'
  - 'Address the common error: explicitly remind female learners to use ''я повинна'',
    not ''я повинен''.'
  - 'Explain semantic nuance: ''повинен'' implies strong personal duty or moral obligation.
    Contrast with the general necessity of ''треба''.'
- section: Хотіти
  words: 400
  points:
  - Provide an H3 table for the full present tense conjugation of 'хотіти'. Highlight
    the irregular stem change (хот- → хоч-).
  - 'Explain the two common syntactic patterns with examples: хочу + infinitive (Я
    хочу спати) vs хочу + Accusative object (Я хочу воду).'
  - 'Introduce the polite conditional variant: ''Я б хотів / Я б хотіла'' (I would
    like). Provide a dialogue snippet in a café context.'
- section: Порівняння
  words: 400
  points:
  - 'Provide a 3-way contrast summary table: треба (impersonal necessity) vs повинен
    (personal duty) vs хочу (personal desire).'
  - 'Integrate the ''Guest Etiquette'' cultural hook: taking off shoes (''треба''
    - impersonal rule) vs bringing a gift (''повинен'' - social duty).'
  - 'Show contextual contrast using the same subject: Я хочу працювати (desire) vs
    Мені треба працювати (financial need) vs Я повинен працювати (duty).'
- section: Практика
  words: 300
  points:
  - 'Include situation drills: Present 3 short scenarios (being sick, at a café, visiting
    a friend) and ask which modal fits best.'
  - Provide 2 short role-play mini-dialogues demonstrating these modals in everyday
    conversations.
