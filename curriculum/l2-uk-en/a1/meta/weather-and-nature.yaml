slug: weather-and-nature
title: Weather & Nature
word_target: 2000
content_outline:
- section: 'Вступ: Погода як тема для розмови'
  words: 250
  points:
  - Introduce weather as the universal small talk starter in Ukraine (4 distinct seasons).
  - 'Cultural Hook: Mention «Бабине літо» (Indian summer) as a beloved time of year.'
  - Briefly review adverbs from previous module to set the stage.
  - 'English Scaffolding: Explain that we will learn to describe the world around
    us.'
- section: 'Презентація 1: Опис погоди (Прислівники)'
  words: 350
  points:
  - 'Vocabulary: Тепло, холодно, спекотно, прохолодно.'
  - 'Grammar: Impersonal constructions (No ''it is''). Contrast English ''It is cold''
    with Ukrainian ''Холодно''.'
  - 'Visual Scale: Arranging words from hottest (спекотно) to coldest (холодно).'
  - 'Common Error Alert: Avoid ''Це холодно''.'
- section: 'Презентація 2: Природні явища (Дієслова)'
  words: 350
  points:
  - 'Vocabulary: Дощ, сніг, сонце, хмари, вітер.'
  - 'Grammar: Collocations ''Йде дощ/сніг'' vs ''Світить сонце''.'
  - 'Common Error Alert: ''Rain goes'' (motion) not ''makes'' or ''is''.'
  - 'Structure: ''Сьогодні...'' / ''Вчора було...'' / ''Завтра буде...'' (Time markers).'
- section: 'Презентація 3: Запитання про погоду'
  words: 300
  points:
  - 'Key Question: «Яка сьогодні погода?».'
  - 'Key Question: «Яка температура?» (Basic introduction).'
  - 'Collocations: Гарна погода, погана погода, чудова погода.'
  - 'Dialogue framework: Asking and answering about current conditions.'
- section: 'Презентація 4: Пори року та час'
  words: 350
  points:
  - 'Vocabulary: Весна, літо, осінь, зима.'
  - 'Grammar: Answering ''When?'' (Коли?). Introduce adverbial forms: взимку, навесні,
    влітку, восени.'
  - 'Phonetics Focus: Stress shifts in ''восени'' and ''навесні''.'
  - Matching seasons to months (basic recognition).
- section: 'Презентація 5: Прогноз та планування'
  words: 250
  points:
  - 'Vocabulary: Прогноз погоди, градус.'
  - 'Structure: ''Якщо дощ, то...'' (Simple conditional intro via context).'
  - 'Syntax: ''Ми не гуляємо, бо холодно'' (Causal link §4.3.2).'
  - 'Cultural context: Describing typical weather for each season in Ukraine.'
- section: 'Практика: Розмови про природу'
  words: 200
  points:
  - 'Dialogue 1: Two friends deciding what to wear based on the forecast.'
  - 'Dialogue 2: Describing the weather in your city right now.'
  - 'Task: ''My favorite season'' — short monologue structure.'
  - Recap of all new vocabulary and structures.
