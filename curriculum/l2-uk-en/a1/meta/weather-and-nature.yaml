slug: weather-and-nature
title: Weather & Nature
word_target: 1200
grammar:
  constraints:
    subordinate_clauses: true
content_outline:
- section: Вступ
  words: 400
  points:
  - 'Вступ від імені Карпатського рейнджера: погода як універсальний ключ до small
    talk в Україні та основа для планування походів; акцент на чіткій зміні чотирьох
    пір року (State Standard §3.4).'
  - 'Культурний гачок: концепція «Бабиного літа» (Indian Summer) — теплий період на
    межі вересня та жовтня, його значення для фольклору та сільськогосподарського
    циклу.'
  - 'English scaffolding: Explicitly explain that we will use English to outline the
    grammar of impersonal weather expressions before jumping into Ukrainian examples.'
- section: Погода та безособові форми
  words: 500
  points:
  - 'Безособові конструкції для стану природи: вживання прислівників (тепло, холодно,
    спекотно, прохолодно) без фіктивного підмета.'
  - 'Виправлення типової помилки: контраст українського ''Холодно'' та англійського
    калькування ''Це холодно''.'
  - 'Опади через ідіоматичні дієслова руху: вивчення конструкцій «йде дощ» та «йде
    сніг» — drill для запобігання калькуванню ''дощ робить''.'
- section: Пори року та природа
  words: 550
  points:
  - 'Часові прислівники від назв пір року (State Standard §3.4): навесні, влітку,
    восени, взимку.'
  - Фокус на фонетиці та наголосах (восени́, навесні́) та уникненні помилки 'в весні'.
  - 'Природні об’єкти за Стандартом (§3.11): ліс, озеро, річка, гори, море — опис
    типової погоди в цих локаціях (наприклад, «влітку на морі спекотно», «взимку в
    горах багато снігу»).'
- section: Складні речення та прогноз
  words: 550
  points:
  - 'Синтаксис складного речення за Стандартом (§4.3.2): побудова конструкцій зі сполучником
    «бо» для пояснення планів залежно від погоди (наприклад: «Ми не гуляємо, бо холодно»).'
  - 'Діалог «Прогноз погоди»: запитання про умови (Яка сьогодні погода? Чи буде вітер?).'
  - Використання колокацій «гарна/погана погода», «сильний дощ», щоб закріпити лексику
    в практичному розмовному контексті.