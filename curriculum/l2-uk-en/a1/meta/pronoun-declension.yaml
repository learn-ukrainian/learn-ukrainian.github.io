slug: pronoun-declension
title: Pronoun Declension
word_target: 2000
content_outline:
- section: Знахідний відмінок (Accusative pronouns)
  words: 450
  points:
  - 'Вступ: English scaffolding explicitly explaining how pronouns change form depending
    on their role in the sentence (immersion target 35-40%).'
  - 'H3: Forms for 1st and 2nd person (мене, тебе, нас, вас). Definition, 2+ examples
    per pronoun with English translations.'
  - 'H3: Forms for 3rd person (його, її, їх) and the critical rule of the `н-` prefix
    after prepositions (про нього, на неї).'
  - Mini-dialogue demonstrating direct objects in everyday conversational contexts.
- section: Місцевий відмінок (Locative pronouns)
  words: 450
  points:
  - 'H3: Usage of Locative case for pronouns (always used with prepositions: в/у,
    на).'
  - 'H3: Paradigm and forms: (на) мені, (на) тобі, (на) ньому, (на) ній, (на) нас,
    (на) вас, (на) них.'
  - 'Crucial rule reminder: 3rd person pronouns always take the `н-` prefix in Locative
    because this case exclusively uses prepositions.'
  - Contextual examples describing locations and thoughts (e.g., думати про неї, одяг
    на ньому).
- section: Давальний відмінок (Dative pronouns)
  words: 400
  points:
  - 'H3: Recap of a1-19 «мені подобається» and expansion to the full Dative paradigm.'
  - 'Forms: мені, тобі, йому, їй, нам, вам, їм. Provide a clear comparison table.'
  - 'H3: Common Dative verbs (давати, говорити, писати, допомагати) with sentence
    examples for each pronoun.'
  - Engagement box (cultural note) explaining the polite written usage of capitalized
    «Вам/Вас».
- section: Родовий відмінок (Genitive pronouns)
  words: 400
  points:
  - 'H3: Introduction to Genitive pronouns indicating possession (у мене є) and absence
    (немає).'
  - 'Forms overlap explanation: Highlight that мене/тебе/нас/вас look identical to
    their Accusative counterparts, differentiating their usage context.'
  - 'H3: 3rd person forms and the `н-` prefix (біля нього, для неї, без них). Contrast
    clearly with possession without prepositions (його брат, її сестра).'
  - Provide a summary table compiling all four oblique cases for clear visual reference.
- section: Практика (Practice)
  words: 300
  points:
  - 'H3: Controlled practice bridging theory and conversational application.'
  - Provide 5+ sentence transformation examples illustrating pronoun replacement (e.g.,
    Я бачу Анну -> Я бачу її).
  - Provide 5+ inline fill-in-the-blank text examples focusing specifically on choosing
    the presence or absence of the `н-` prefix.
