slug: pronoun-declension
title: Pronoun Declension
word_target: 1200
content_outline:
- section: Знахідний відмінок (Accusative pronouns)
  words: 500
  points:
  - 'Intro: English scaffolding (A1 immersion level) explaining pronoun case changes
    and their role as direct objects.'
  - 'H3: 1st and 2nd person forms (мене, тебе, нас, вас) with definition, 2+ sentence
    examples per pronoun, and English translations.'
  - 'H3: 3rd person forms (його, її, їх) and the mandatory `н-` prefix rule after
    prepositions (про нього, на неї).'
  - Mini-dialogue demonstrating direct objects in everyday conversational contexts
    (e.g., meeting friends).
- section: Місцевий відмінок (Locative pronouns)
  words: 400
  points:
  - 'H3: Usage of Locative case for pronouns (always used with prepositions: в/у,
    на).'
  - 'H3: Complete paradigm: (на) мені, (на) тобі, (на) ньому, (на) ній, (на) нас,
    (на) вас, (на) них.'
  - 'Rule reinforcement: 3rd person pronouns always take the `н-` prefix in Locative
    because this case exclusively uses prepositions.'
  - Contextual examples describing physical location and abstract thoughts (e.g.,
    думати про неї, одяг на ньому).
- section: Давальний відмінок (Dative pronouns)
  words: 400
  points:
  - 'H3: Recap of the a1-19 construction «мені подобається» and introduction of the
    full Dative paradigm.'
  - 'Paradigm list/table: мені, тобі, йому, їй, нам, вам, їм.'
  - 'H3: Core Dative verbs (давати, говорити, писати, допомагати) with diverse sentence
    examples.'
  - 'Engagement box (Cultural note): The polite written usage of capitalized «Вам/Вас».'
- section: Родовий відмінок (Genitive pronouns)
  words: 400
  points:
  - 'H3: Core Genitive functions: possession (у мене є) and absence (немає).'
  - 'Form overlaps explanation: Highlight that мене/тебе/нас/вас are identical to
    their Accusative counterparts, differentiating usage contexts.'
  - 'H3: 3rd person forms and the `н-` prefix (біля нього, для неї, без них). Contrast
    clearly with bare possession (його брат, її сестра).'
  - Summary table compiling all four oblique cases for clear visual reference.
- section: Практика (Practice)
  words: 300
  points:
  - 'H3: Controlled practice bridging theory and conversational application.'
  - Provide 5+ sentence transformation examples illustrating pronoun replacement (e.g.,
    Я бачу Анну -> Я бачу її).
  - Provide 5+ inline fill-in-the-blank text examples focusing specifically on choosing
    the presence or absence of the `н-` prefix.
