slug: prohibitions-and-signs
title: Prohibitions and Signs
word_target: 2000
content_outline:
- section: Заборони (Prohibitions)
  words: 500
  points:
  - 'Module intro: navigating Ukrainian cities requires reading signs. English scaffolding
    will be used to explain grammar concepts.'
  - 'Explain the grammar of public signs: they use the infinitive (Не курити, Не входити),
    not the imperative, for impersonal rules.'
  - Contrast with the personal imperative command (Не кури!). Each concept gets its
    own H3 with clear English definitions.
  - 'Present core survival signs: Вхід, Вихід, Вхід заборонено. Provide IPA for first
    occurrences.'
- section: Попередження (Warnings)
  words: 400
  points:
  - 'Introduce exclamatory warnings: Увага!, Обережно!, Небезпечно! Explain they function
    as standalone safety signals.'
  - 'Break down compound danger signs: Мокра підлога, Висока напруга.'
  - 'Include a cultural hook: The iconic Ukrainian metro sign ''Не притулятися'' (Do
    not lean) as a real-world example of infinitive prohibition.'
- section: Розклади та оголошення (Schedules and Notices)
  words: 400
  points:
  - 'Key vocabulary for reading operating hours: години роботи, вихідний, перерва.'
  - Introduce the time format 'з 9:00 до 18:00' as a fixed practical chunk, noting
    it uses the genitive case.
  - 'Basic transport notices: відправлення, прибуття, номер маршруту.'
  - 'Shopping/Street notices: Оголошення, Акція, Знижка.'
- section: На вулиці (On the Street)
  words: 400
  points:
  - 'Street navigation terms and their standard abbreviations: вулиця (вул.), площа
    (пл.), провулок (пров.).'
  - 'Traffic and crossing vocabulary: Пішохідний перехід, Перехід, Зупинка.'
  - 'Highlight precise Ukrainian vocabulary: doors and shops are ''відчинено / зачинено'',
    explicitly contrasting with the incorrect ''відкрито / закрито'' to avoid colonial
    linguistic interference.'
- section: Практика (Practice)
  words: 300
  points:
  - Interactive sign-reading drills using realistic Ukrainian contexts.
  - 'Schedule comprehension practice: read a store''s ''години роботи'' and identify
    the ''перерва'' and ''вихідний''.'
  - Summary of key differences between infinitives on signs vs. spoken commands.
