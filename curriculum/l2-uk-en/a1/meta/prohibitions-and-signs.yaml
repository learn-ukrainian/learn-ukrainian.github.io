slug: prohibitions-and-signs
title: Prohibitions and Signs
word_target: 2000
content_outline:
- section: Заборони
  words: 500
  points:
  - 'Module intro: navigating Ukrainian cities requires reading signs. Explicitly
    list that English scaffolding will be used to explain grammar concepts.'
  - 'Explain the grammar of public signs: they use the infinitive (Не курити, Не входити),
    not the imperative, for impersonal rules. Each concept gets its own H3.'
  - Contrast with the personal imperative command (Не кури!). Clearly define the register
    difference using practical examples.
  - 'Present core survival signs: Вхід, Вихід, Вхід заборонено. Provide IPA for the
    first occurrence of each new word.'
- section: Попередження
  words: 400
  points:
  - 'Introduce exclamatory warnings: Увага!, Обережно!, Небезпечно! Explain they function
    as standalone safety signals.'
  - 'Break down compound danger signs: Мокра підлога, Висока напруга. Explain the
    noun-adjective agreement in these phrases.'
  - 'Include a cultural hook: Feature the iconic Ukrainian metro sign ''Не притулятися''
    (Do not lean) as a real-world application of the infinitive prohibition.'
- section: Розклади та оголошення
  words: 400
  points:
  - 'Teach key vocabulary for reading operating hours: години роботи, вихідний, перерва.'
  - Introduce the time format 'з 9:00 до 18:00' as a fixed practical chunk, noting
    it uses the genitive case for 'from... to...'.
  - 'Present basic transport notices: відправлення, прибуття, номер маршруту.'
  - 'Present shopping and street notices: Оголошення, Акція, Знижка.'
- section: На вулиці
  words: 400
  points:
  - 'Introduce street navigation terms and their standard abbreviations: вулиця (вул.),
    площа (пл.), провулок (пров.).'
  - 'Present traffic and crossing vocabulary: Пішохідний перехід, Перехід, Зупинка.'
  - 'Highlight precise Ukrainian vocabulary: explain that doors and shops use ''відчинено
    / зачинено'', explicitly contrasting this with the incorrect ''відкрито / закрито''
    to avoid colonial linguistic interference and Surzhyk.'
- section: Практика
  words: 300
  points:
  - Create interactive sign-reading drills using realistic Ukrainian contexts and
    vocabulary learned in the module.
  - 'Design a schedule comprehension practice: present a store''s ''години роботи''
    and have the learner identify the ''перерва'' and ''вихідний''.'
  - Provide a brief summary of key differences between infinitives on signs versus
    spoken commands.
