slug: syllables-and-transfer
title: Syllables and Transfer
word_target: 2000
content_outline:
- section: Що таке склад?
  words: 400
  points:
  - 'English scaffolding: Clearly define ''голосний'' (vowel) and explain the golden
    rule: one vowel equals one syllable.'
  - 'Provide examples breaking down words by vowel count: кіт (1), мо-ло-ко (3), у-кра-ї-на
    (4).'
  - 'Cultural connection: Introduce the idea of Ukrainian as a melodic, flowing language
    (''солов''їна мова'') due to its syllable structure.'
- section: Відкриті та закриті типи
  words: 400
  points:
  - Define open (ending in vowel) and closed (ending in consonant) forms in English.
  - Explain Ukrainian's preference for open endings and the principle of maximal onset
    for consonant clusters (e.g., се-стра, not сес-тра).
  - Practice identifying types using vocabulary words like ву-ли-ця (open) and ав-то-бус
    (closed final).
- section: Правила переносу
  words: 500
  points:
  - Introduce 'переніс' (word hyphenation) and its importance in Ukrainian cursive
    handwriting and typing.
  - 'Rule 1: Never leave or transfer a single letter (о-ко has two syllables, but
    cannot be split across lines).'
  - 'Rule 2: The soft sign (ь) and apostrophe ('') must stay with the preceding consonant
    (паль-ці, сі-м''я).'
  - 'Rule 3: Digraphs дж/дз cannot be split when representing a single sound.'
  - Address common learner errors of applying English hyphenation rules to Ukrainian
    words.
- section: Позиція наголосу
  words: 400
  points:
  - 'Preview ''наголос'' (stress): explain that the stressed vowel is pronounced longer
    and louder.'
  - Note that Ukrainian stress is dynamic and not predictable from spelling, requiring
    per-word memorization.
  - Introduce the dictionary accent mark (´) and demonstrate it on multi-syllable
    vocabulary words.
- section: Практика
  words: 300
  points:
  - 'Syllable counting drill: Students identify the number of vowels to find the syllables.'
  - 'Hyphenation drill: Students identify correct and incorrect ''переніс'' for longer
    words (бібліотека, університет).'
  - 'Reading practice: Encourage reading syllable-by-syllable to build confidence
    and fluency before full-speed reading.'
