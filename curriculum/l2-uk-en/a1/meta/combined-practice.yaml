slug: combined-practice
title: Combined Practice
word_target: 2000
content_outline:
- section: 'Вступ: Культура планування'
  words: 450
  points:
  - 'Note: English scaffolding required for grammar explanations (35-40% immersion).'
  - Introduce the cultural hook of «піти на каву» (going for coffee) as the foundation
    for daily planning in Ukraine. Include a short sample dialogue of friends making
    plans over coffee.
  - 'Introduce Standard §4.3.2: Connecting simple intentions using coordinating conjunctions
    «і» (and) and «але» (but). Provide 3-4 clear examples with English translations.'
- section: 'Презентація: Структура та Причини'
  words: 650
  points:
  - 'Address the «потім» loop learner error: Create a dedicated H3 to teach the narrative
    sequence markers: «спочатку» (first), «потім» (then), and «нарешті» (finally).'
  - 'Explain the logic of reasons (Standard §4.3.2): Contrast the formal/standard
    «тому що» with the shorter, highly colloquial «бо». Provide examples showing when
    to use each.'
  - 'Address the «також» word order error: Explicitly state that «також» should not
    be placed at the end of the sentence. Show correct vs. incorrect placement with
    visual emphasis.'
- section: 'Практика: Сценарії реального життя'
  words: 500
  points:
  - 'Present a complex «Базар» (Market) scenario: A multi-turn interaction combining
    produce vocabulary, asking for items, and using «разом».'
  - 'Introduce conditional problem-solving: Teach «якщо» (if) to handle unexpected
    changes (e.g., «Якщо ринок закритий...»). Integrate skills from a1-42 (Emergencies).'
- section: 'Висновок: Мій наратив'
  words: 400
  points:
  - 'Guide the learner to combine all elements into a cohesive 3-step story: Planning
    (coffee), Execution (market), and Problem Solving (if/then).'
  - 'Final consolidation of Standard §4.3.2: Present a complete paragraph describing
    a busy day, effectively using «і», «але», «тому що», and «бо».'
