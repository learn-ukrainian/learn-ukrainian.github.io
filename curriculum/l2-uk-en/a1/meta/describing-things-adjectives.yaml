slug: describing-things-adjectives
title: Describing Things - Adjectives
word_target: 1200
content_outline:
- section: 'Вступ: Світ прикметників (Introduction: The World of Adjectives)'
  slug: introduction-world-of-adjectives
  words: 200
  points:
  - 'Scaffolding: Use English to explain the concept of ''adjective agreement''—adjectives
    must match the noun''s gender and number.'
  - 'Bridge: Review the ''Gender Code'' (masculine, feminine, neuter) from A1-07 and
    introduce the question words ''Який? Яка? Яке? Які?''.'
  - 'Cultural Hook: Introduce St. Sophia''s Cathedral as a context for ''старий''
    and ''великий''.'
- section: Тверда група прикметників (Hard Stem Adjectives)
  slug: hard-stem-adjectives
  words: 350
  points:
  - Present the Hard Stem paradigm (-ий, -а, -е, -і) with a visual table and color-coded
    gender markers.
  - 'Provide high-frequency examples: новий дім, нова книга, нове вікно, нові друзі.'
  - 'Error Correction: Explicitly address the common mistake of using the dictionary
    form for all nouns (correcting *новий машина* to *нова машина*).'
  - 'Explain adjective placement: Contrast attributive (''гарна погода'') with predicative
    (''Погода гарна'') usage.'
- section: М'яка група та множина (Soft Stem and Plurals)
  slug: soft-stem-and-plurals
  words: 300
  points:
  - 'Introduce the Soft Stem paradigm (-ій, -я, -є, -і), using ''синій'' as the primary
    anchor (mnemonic: ''синя лінія'' in Kyiv Metro).'
  - 'Orthography Note: Address the common spelling error of writing ''-ий'' instead
    of ''-ій'' after soft consonants.'
  - 'Plural Consistency: Emphasize that all plural adjectives take ''-і'' regardless
    of gender to prevent number disagreement.'
- section: 'Практика: Люди і місця (Practice: People and Places)'
  slug: practice-people-and-places
  words: 200
  points:
  - 'Cultural Practice: Describe the folklore figure Mavka using feminine adjectives
    (''молода'', ''гарна'', ''цікава'').'
  - 'Roleplay Context: Real Estate Agent describing a ''нова квартира'' or ''великий
    будинок'' using vocabulary from A1-38.'
- section: Підсумок (Summary & Self-Check)
  slug: summary-self-check
  words: 150
  points:
  - 'Summary: Recap the ''Який?'' question-answer pattern and the main endings for
    all three genders and plural.'
  - 'Self-Check: Provide 4 self-check questions focusing on matching the correct ending
    to a given noun.'
