slug: describing-things-adjectives
title: Describing Things - Adjectives
word_target: 1200
content_outline:
- title: 'Вступ: Світ прикметників (Introduction: The World of Adjectives)'
  slug: introduction-world-of-adjectives
  words: 250
  points:
  - 'Scaffolding: Use English to explain adjective agreement and recall the ''Gender
    Code'' from A1-07.'
  - 'Vocabulary Intro: Present the essential verb-free question words ''Який? Яка?
    Яке? Які?'' using examples like ''Який це дім?''.'
  - 'Cultural Hook: Introduce St. Sophia''s Cathedral to demonstrate ''старий'' and
    ''великий'' naturally in verb-free phrases.'
- title: 'Презентація 1: Тверда група (Presentation 1: Hard Stem Adjectives)'
  slug: presentation-hard-stem
  words: 350
  points:
  - 'Paradigm: Present the Hard Stem endings (-ий, -а, -е, -і) using a clear visual
    table with color-coded gender markers.'
  - 'Vocabulary: Showcase high-frequency hard adjectives (''новий'', ''великий'',
    ''добрий'') in short, verb-free collocations (''нова книга'', ''добрий день'').'
  - 'Error Correction: Address gender mismatch errors by contrasting incorrect forms
    (*новий машина*) with correct ones (''нова машина'').'
  - 'Usage: Explain attributive (''гарна погода'') vs. predicative (''Погода — гарна'')
    positions using English explanations and strictly verb-free Ukrainian examples.'
- title: 'Презентація 2: М''яка група та множина (Presentation 2: Soft Stem and Plurals)'
  slug: presentation-soft-stem-plurals
  words: 300
  points:
  - 'Paradigm: Introduce Soft Stem endings (-ій, -я, -є, -і) using ''синій'' and the
    ''синя лінія'' (Kyiv Metro) as a practical mnemonic anchor.'
  - 'Orthography Note: Warn against writing *синий*, explaining the need for the soft
    ''і'' marker in Ukrainian spelling.'
  - 'Plural Consistency: Emphasize that all plural adjectives end in ''-і'', regardless
    of their original gender (e.g., ''нові дні'', ''великі міста'').'
- title: 'Практика: Люди і місця (Practice: People and Places)'
  slug: practice-people-and-places
  words: 200
  points:
  - 'Cultural Practice: Describe the folklore figure Mavka using feminine verb-free
    adjective phrases (''молода'', ''гарна'', ''цікава'').'
  - 'Real Estate Roleplay: Present a short, verb-free descriptive dialogue or text
    about a ''нова квартира'' emphasizing high-frequency vocabulary.'
- title: Підсумок (Summary & Self-Check)
  slug: summary-self-check
  words: 100
  points:
  - 'Summary: Recap the primary endings for both hard and soft stems.'
  - 'Self-Check 1: What is the correct form of ''новий'' for ''телефон''?'
  - 'Self-Check 2: What is the correct form of ''великий'' for ''книга''?'
  - 'Self-Check 3: What is the correct form of ''синій'' for ''море''?'
  - 'Self-Check 4: What is the correct plural form of ''гарний'' for ''квіти''?'
