slug: describing-things-adjectives
title: Describing Things - Adjectives
word_target: 1200
content_outline:
- title: 'Вступ: Світ прикметників (Introduction: The World of Adjectives)'
  slug: introduction-world-of-adjectives
  words: 250
  points:
  - 'Scaffolding: Use English to explain the concept of adjective agreement, emphasizing
    that adjectives must match the noun''s gender and number.'
  - 'Bridge: Briefly review the ''Gender Code'' (masculine, feminine, neuter) introduced
    in module a1-07.'
  - 'Introduction: Introduce the question words ''Який? Яка? Яке? Які?'' using verb-free
    phrases like ''Який це дім?''.'
  - 'Cultural Hook: Mention St. Sophia''s Cathedral as an example to demonstrate ''старий''
    and ''великий'' without using verbs.'
- title: 'Презентація: Тверда група прикметників (Presentation: Hard Stem Adjectives)'
  slug: hard-stem-adjectives
  words: 350
  points:
  - 'Paradigm: Present the Hard Stem endings (-ий, -а, -е, -і) using a clear visual
    table and color-coded gender markers.'
  - 'Examples: Provide high-frequency, verb-free examples such as ''новий дім'', ''нова
    книга'', ''нове вікно''.'
  - 'Error Correction: Explicitly warn against using the dictionary form for all nouns,
    contrasting the incorrect *новий машина* with the correct ''нова машина''.'
  - 'Usage: Explain adjective placement by contrasting attributive (''гарна погода'')
    with predicative (''Погода — гарна'') positions, keeping examples strictly verb-free.'
- title: 'Презентація 2: М''яка група та множина (Presentation: Soft Stem and Plurals)'
  slug: soft-stem-and-plurals
  words: 300
  points:
  - 'Paradigm: Introduce the Soft Stem endings (-ій, -я, -є, -і) using ''синій'' as
    the primary anchor, referencing the ''синя лінія'' of the Kyiv Metro.'
  - 'Orthography Note: Address the common spelling error of writing ''-ий'' instead
    of ''-ій'' after soft consonants (e.g., incorrect *синий*).'
  - 'Plural Consistency: Emphasize that all plural adjectives take ''-і'' regardless
    of gender, supported by verb-free examples like ''нові дні'' and ''великі міста''.'
- title: 'Практика: Люди і місця (Practice: People and Places)'
  slug: practice-people-and-places
  words: 200
  points:
  - 'Cultural Practice: Describe the folklore figure Mavka using feminine adjectives
    like ''молода'', ''гарна'', and ''цікава''.'
  - 'Roleplay Context: Adopt a Real Estate Agent persona to describe a ''нова квартира''
    or ''великий будинок'', reinforcing descriptive vocabulary in a functional setting
    using phrases like ''Це велика квартира''.'
- title: Підсумок (Summary & Self-Check)
  slug: summary-self-check
  words: 100
  points:
  - 'Summary: Recap the ''Який?'' question-answer pattern and the primary adjective
    endings.'
  - 'Self-Check 1: What is the correct form of ''новий'' for the masculine noun ''телефон''?'
  - 'Self-Check 2: What is the correct form of ''великий'' for the feminine noun ''книга''?'
  - 'Self-Check 3: What is the correct form of ''синій'' for the neuter noun ''море''?'
  - 'Self-Check 4: What is the correct plural form of ''гарний'' for ''квіти''?'
