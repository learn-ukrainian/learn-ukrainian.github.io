slug: describing-things-adjectives
title: Describing Things - Adjectives
word_target: 853
content_outline:
- section: 'Основи: Рід і число прикметників'
  words: 302
  points:
  - 'Warm-up: Introduction of the question ''Який? Яка? Яке?'' (Which/What kind?)
    with immediate English explanation of gender logic'
  - 'Grammar: Explicit English scaffolding explaining that adjectives MUST change
    endings to match the noun (Gender Agreement)'
  - 'Hard Group (-ий/-а/-е/-і): Examples with ''новий'', ''гарний'', ''старий'' paired
    with nouns (дім, книга, вікно)'
  - 'Soft Group (-ій/-я/-є/-і): Introduce ''синій'' (blue) as the primary example
    to show the difference (blue car vs new car)'
  - 'Syntax: Briefly explain adjective position (before noun vs after ''to be'') with
    examples like ''Це гарний день'' vs ''Цей день гарний'''
  - 'Note: Use color coding or visual emphasis for the changing endings in examples'
- section: 'Характеристики: Опис предметів і простору'
  words: 272
  points:
  - 'Antonyms pairs: великий ↔ малий, новий ↔ старий, добрий ↔ поганий, дорогий ↔
    дешевий'
  - 'Contextual Practice: Describing a room (Real Estate Persona) - ''велика кімната'',
    ''нове вікно'', ''старі меблі'''
  - 'Cultural Hook: Describe St. Sophia''s Cathedral (Софійський собор) as ''старий''
    and ''великий'' symbol of Kyiv'
  - 'Describing People: ''молода жінка'', ''добрий чоловік'', ''цікавий студент'''
  - 'Mnemonic: ''Hard'' endings are like hard bricks (-ий), ''Soft'' endings are like
    soft pillows (-ій)'
- section: 'Практика: Діалоги про речі'
  words: 279
  points:
  - 'Dialogue 1: Real Estate Agent and Client discussing an apartment (Is it big?
    Is it new? Is it expensive?)'
  - 'Dialogue 2: Friends discussing a new purchase (e.g., a phone) - ''Він дорогий,
    але гарний'''
  - 'Production Task: Template for describing one''s own room using the adjectives
    learned'
  - 'Error Correction: Explicitly warn about ''синий'' (wrong) vs ''синій'' (correct)
    and gender mismatches'
  - 'Self-check questions: Match the adjective to the noun (Grammar Check)'
