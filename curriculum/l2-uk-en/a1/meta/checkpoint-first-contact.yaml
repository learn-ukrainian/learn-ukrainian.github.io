slug: checkpoint-first-contact
title: 'Checkpoint: First Contact'
word_target: 1200
content_outline:
- section: Огляд (Overview)
  slug: overview
  words: 200
  points:
  - 'Introduce: Welcome message from the ''Friendly Hostel Host'' explaining the checkpoint''s
    purpose.'
  - 'Show examples: Briefly demonstrate what will be tested (reading, gender, adjectives).'
  - 'Summarize: Explicit English scaffolding stating that instructions remain in English
    for clarity.'
- section: 'Навичка 1: Читання та Рід (Skill 1: Reading and Gender)'
  slug: skill-1-reading-and-gender
  words: 300
  points:
  - 'Introduce: Cyrillic reading check without transliteration, focusing on ''И''
    vs ''І''.'
  - 'Show examples: Review regular noun gender endings (-а/-я, consonant, -о/-е) and
    the exception ''тато''.'
  - 'Practice: Identifying gender and reading minimal pairs.'
  - 'Summarize: Quick recap of the three noun genders.'
- section: 'Навичка 2: Прикметники, Множина та Питання (Skill 2: Adjectives, Plurals
    and Questions)'
  slug: skill-2-adjectives-plurals-and-questions
  words: 350
  points:
  - 'Introduce: Plural noun formation and matching adjectives to nouns.'
  - 'Show examples: Basic nominal questions (Хто це? Що це? Де?) and negative answers
    using ''не''.'
  - 'Practice: Matching adjectives to singular and plural nouns in ''Це...'' sentences.'
  - 'Summarize: Review the importance of adjective-noun agreement.'
- section: 'Культурний контекст: Кафе (Cultural Context: Cafe)'
  slug: cultural-context-cafe
  words: 200
  points:
  - 'Introduce: Lviv coffee culture and the historical impact of Yuriy Kulchytsky.'
  - 'Show examples: Essential cafe vocabulary (кава, рахунок, Смачного!).'
  - 'Practice: Using cafe words in simple ''Де...?'' or ''Це...'' contexts.'
  - 'Summarize: Recap of cultural dining etiquette.'
- section: Підсумок (Summary)
  slug: summary
  words: 150
  points:
  - 'Self-check: Can I read Cyrillic words without transliteration fluently?'
  - 'Self-check: Can I correctly identify noun genders and form basic plurals?'
  - 'Self-check: Can I match adjectives to nouns correctly?'
  - 'Self-check: Can I ask simple questions with хто, що, and де?'
  - 'Transition: Congratulate the learner and prepare them for verbs in the next module.'
