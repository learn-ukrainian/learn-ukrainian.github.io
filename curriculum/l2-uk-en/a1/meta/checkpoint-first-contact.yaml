slug: checkpoint-first-contact
title: 'Checkpoint: First Contact'
word_target: 1200
content_outline:
- section: Огляд (Overview)
  slug: overview
  words: 200
  points:
  - Welcome message from the 'Friendly Hostel Host' explaining the checkpoint purpose.
  - Test-Teach-Test (TTT) approach to review alphabet, gender, adjectives, plurals,
    and basic questions.
  - Explicit English scaffolding explaining that instructions are in English to ensure
    clear understanding.
- section: 'Навичка 1: Читання та Рід (Skill 1: Reading and Gender)'
  slug: skill-1-reading-and-gender
  words: 300
  points:
  - Cyrillic reading check without transliteration, explicitly distinguishing И vs
    І (bit vs bee).
  - 'Noun gender review: standard endings (-а/-я, consonant, -о/-е).'
  - 'Exceptions rule: highlighting ''тато'' as masculine despite the -о ending.'
- section: 'Навичка 2: Прикметники, Множина та Питання (Skill 2: Adjectives, Plurals
    and Questions)'
  slug: skill-2-adjectives-plurals-and-questions
  words: 350
  points:
  - Reviewing plural noun formation and adjective-noun agreement from M11-M13 using
    simple 'Це...' structures.
  - 'Basic question formation: Хто це?, Що це?, Де кафе?.'
  - Using 'так/ні' and simple negation with 'не' (e.g., Ні, це не велике місто).
- section: 'Культурний контекст: Кафе (Cultural Context: Cafe)'
  slug: cultural-context-cafe
  words: 200
  points:
  - 'Lviv coffee culture hook: Yuriy Kulchytsky and the Vienna connection.'
  - Basic cafe vocabulary (кава, чорна кава, рахунок) applied in nominal sentences.
  - 'Dining etiquette phrase: ''Смачного!'' (Bon appetit).'
- section: Підсумок (Summary)
  slug: summary
  words: 150
  points:
  - 3-4 self-check questions assessing readiness (Can I read Cyrillic fluently? Can
    I match adjectives to nouns?).
  - Transition guidance acknowledging readiness for M15, where verb conjugation will
    begin.
