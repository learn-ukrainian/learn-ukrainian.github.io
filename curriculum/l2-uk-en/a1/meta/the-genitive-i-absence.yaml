slug: the-genitive-i-absence
title: 'The Genitive I: Absence'
word_target: 2000
content_outline:
- section: Вступ
  words: 400
  points:
  - 'Explicitly define the immersion level strategy (35-40%): Use English scaffolding
    to clearly explain the conceptual difference between presence (є) and absence
    (немає).'
  - 'Address Learner Error 2 directly in English: contrast the grammatical negation
    of state ''не'' (Я не студент) with existential absence ''немає'' (У мене немає
    квитка).'
  - Provide a visual comparison table contrasting 'У мене є...' (possession, Nominative)
    with 'У мене немає...' (absence, Genitive) using simple vocabulary.
- section: Презентація
  words: 600
  points:
  - Create an H3 section defining the 'немає + Родовий відмінок' construction. Introduce
    'немає часу' and 'немає грошей' as fixed lexical chunks to build immediate fluency.
  - 'Create an H3 section for masculine noun endings. Explain the semantic split specifically
    to address Learner Error 3: -а/-я for concrete objects (хліба, квитка) and -у/-ю
    for abstract/substances (часу, цукру, газу).'
  - 'Create an H3 section for feminine noun endings. Explain the hard/soft shift:
    -и/-і (вода → води, проблема → проблеми).'
  - 'Create an H3 section introducing the preposition ''без'' (without) + Genitive.
    Provide essential daily collocations: ''кава без цукру'', ''вода без газу''.'
- section: Практика
  words: 600
  points:
  - Address Learner Error 1 (Case Neglect) with an H3 focused on 'minimal pairs' practice,
    highlighting the mandatory shift from Nominative to Genitive (є квиток -> немає
    квитка).
  - Design a 'Nominative to Genitive' transformation table showing clear visual mapping
    of ending changes for target vocabulary (хліб, вода, час, цукор).
  - Create an H3 with 3 mini-dialogues set in a restaurant or shop (aligning with
    State Standard §3.8/3.9). Focus on ordering items 'без цукру' and polite inquiries
    about availability.
  - Include 5 self-check questions requiring the learner to supply the correct Genitive
    ending for nouns following 'немає' and 'без'.
- section: Культурний контекст
  words: 400
  points:
  - Create an H3 exploring the ubiquitous phrase 'Немає проблем!'. Explain its social
    utility as a flexible, polite response to requests, apologies, or minor issues.
  - Create an H3 discussing polite refusals in Ukraine. Explain how using the factual
    'немає' (it doesn't exist/is unavailable) softens a refusal compared to a direct
    'ні'.
  - Provide a breakdown of the proverb 'Немає диму без вогню' (No smoke without fire),
    demonstrating how it perfectly encapsulates the grammar of the module ('немає'
    + Gen, 'без' + Gen).
