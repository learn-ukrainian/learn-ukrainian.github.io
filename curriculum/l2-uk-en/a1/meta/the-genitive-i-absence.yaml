content_outline:
- section: 'Розминка: ситуація відсутності'
  words: 200
  points:
  - English-led introduction to the concept of negation, contrasting «є» (existence)
    and «немає» (absence).
  - 'Interactive scenario: identifying objects you have versus things that are missing
    in your immediate environment.'
  - Introduction to the «У мене немає...» frame as a fundamental tool for basic survival
    communication.
- section: 'Презентація: конструкція «немає» та закінчення'
  words: 350
  points:
  - Explaining the «немає + Родовий відмінок» pattern as a fixed communicative model
    for A1 learners.
  - 'Presentation of singular Genitive endings: -а/-я (masculine) and -и/-і (feminine)
    using transformation tables.'
  - 'Addressing masculine noun ending choices: -а for concrete objects (хліб) vs -у
    for abstract concepts (час, цукор).'
  - 'Linguistic safety: distinguishing between the particle «не» (not) and the word
    «немає» (there is no) to prevent syntax errors.'
  - Introduction to the preposition «без» (without) with practical beverage and food
    examples (кава без молока).
- section: 'Практика: тренування та вправи'
  words: 200
  points:
  - Step-by-step drilling of noun transformations from Nominative to Genitive focusing
    on core A1 vocabulary.
  - Guided sentence construction for shopping and city navigation situations (keys,
    tickets, phones).
  - 'Short communicative dialogues: checking availability of items using «У вас є...?
    — Ні, немає...».'
  - Specific focus on the high-frequency fixed plural phrase «немає грошей» as a survival
    expression.
- section: 'Культурна довідка: ввічливі вирази та приказки'
  words: 288
  points:
  - Analysis of the ubiquitous phrase «Немає проблем!» as a reflection of modern Ukrainian
    hospitality and flexibility.
  - 'Social nuance: using «немає» as a factual statement to soften refusals in shops
    and social interactions.'
  - 'Cultural anchor: introducing the proverb «Немає диму без вогню» (No smoke without
    fire) to illustrate grammar in folk wisdom.'
  - 'Contextual application: talking about what a city lacks (reference to a1-15 vocabulary)
    to describe travel experiences.'
  - Final summary of absence-related idiomatic expressions and mnemonic tips for mastering
    Genitive endings.
