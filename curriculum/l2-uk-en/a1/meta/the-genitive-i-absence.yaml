slug: the-genitive-i-absence
title: 'The Genitive I: Absence'
word_target: 2000
content_outline:
- section: 'Вступ: Ситуація відсутності'
  words: 300
  points:
  - Introduce the concept of absence using the phrase 'У мене немає...'. Explicitly
    address the common learner error of keeping the noun in Nominative (e.g., *У мене
    немає квиток*).
  - Contrast 'є' (presence) vs 'немає' (absence) using simple binary examples (Yes/No).
    Focus on ready-made communicative models per State Standard §4.0.
  - 'Immersion Note: Use English to explain the logic of ''Absence = Genitive''.'
- section: 'Граматика: Конструкція «Немає» та «Без»'
  words: 800
  points:
  - 'Explain the construction ''немає + Genitive'' (e.g., *Немає часу*). Introduce
    high-frequency fixed formulaic phrases as chunks: *немає часу* (abstract), *немає
    грошей* (plural exception).'
  - 'Break down Genitive endings: -а/-я for masculine (hard/soft), -и/-і for feminine
    (hard/soft). Specifically highlight the masculine ending -а (concrete) vs -у (abstract
    like *часу*) to prevent errors.'
  - 'Introduce the preposition ''без + Genitive'' (without). Provide key collocations
    for daily life: *кава без цукру, чай без молока, автобус без квитка*.'
  - 'Clarify Negation: ''не маю + Genitive'' (I do not have) vs ''немає'' (There is
    no). Explain the distinction between ''немає'' (absence) and the particle ''не''
    (simple negation, e.g., *Я не лікар*).'
- section: 'Практика: Родовий відмінок у дії'
  words: 500
  points:
  - 'Transformation drill: Nominative → Genitive. Use a simple Visual Mapping table
    (Nom → Gen) with clear arrows (e.g., *хліб → хліба*, *вода → води*).'
  - 'Sentence building: Construct sentences with ''немає'' and ''без'' using high-frequency
    vocabulary (*цукор, квиток, час, ключ, телефон*).'
  - 'Dialogue practice: ''У тебе є...? — Ні, немає''. Create mini-dialogues focused
    on softened refusals in a shopping or home context (e.g., *Вибачте, кави немає*).'
- section: 'Культурний контекст: «Немає проблем»'
  words: 400
  points:
  - Explore typical expressions with 'немає', focusing on *Немає проблем!*. Explain
    its social function as a polite, flexible response.
  - Discuss polite refusals in Ukrainian culture. Explain how using the factual 'немає'
    (it doesn't exist) is often preferred over a direct personal refusal to soften
    the blow (e.g., *На жаль, хліба немає*).
  - Introduce the proverb *Немає диму без вогню* (No smoke without fire) to reinforce
    the grammar structure in a memorable way.
