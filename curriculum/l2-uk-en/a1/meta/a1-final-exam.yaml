slug: a1-final-exam
title: A1 Final Exam
word_target: 2000
content_outline:
- section: Вступ та орієнтація
  words: 300
  points:
  - 'Структура фінального тесту: supportive tone to reduce stress, emphasis on celebration
    of progress («Ви готові!», «Чудова робота!»)'
  - 'Очікування щодо мови (English Scaffolding): clarify that instructions and grammar
    refreshers will use English, but the test texts will be in Ukrainian'
  - 'Як оцінюється кожна частина: alignment with communicative goals and encouragement
    from the Patient Supportive Tutor'
  - 'Поради для успішного складання: focus on calm confidence and practical strategies
    for A1 reading and listening tasks'
- section: Морфологічний та синтаксичний огляд
  words: 650
  points:
  - Review of core noun cases (Nominative, Accusative, Locative, Vocative) with clear
    summary tables and English explanations
  - 'Correction of Case Confusion: drill Accusative vs. Locative with prepositions
    в/на (motion vs. location: «Я йду в магазин» vs. «Я в магазині»)'
  - 'Grammar drill on Gender Agreement: resolving the learner error of mismatching
    adjectives/pronouns («Моя велика машина»)'
  - 'Conjugation mastery: clarifying the distinction between Class I (-ати) and Class
    II (-ити) verbs in the present tense'
  - 'Syntactic structures: review of SVO word order, general questions, and special
    questions using «де», «звідки», «куди», «що», «хто»'
- section: 'Культурна подорож: Київ та Львів'
  words: 650
  points:
  - Thematic narrative «Подорож Україною» integrating transport, food, and home contexts
    into the assessment
  - 'Kyiv section: short comprehensive text featuring chestnut trees (каштани), the
    Dnipro river, and its historical status'
  - 'Lviv section: short comprehensive text exploring coffee traditions (кава), book
    culture, and historic architecture'
  - 'Functional application: using numbers, time, and basic communication phrases
    within the context of these travel texts'
- section: Фінальне оцінювання та перехід до A2
  words: 400
  points:
  - 'Listening and Reading Comprehension: verifying understanding of basic complex
    sentences (using «і», «а», «але»)'
  - 'Practical scenarios and role-play: oral assessment tasks focused on real-world
    situations (buying tickets, ordering coffee, introductions)'
  - 'Readiness for Level A2: setting the foundation for the upcoming Genitive and
    Dative cases while celebrating A1 mastery'
  - 'Final encouraging summary: reinforcing the progress made through the 44 modules
    and looking forward to A2-01'
