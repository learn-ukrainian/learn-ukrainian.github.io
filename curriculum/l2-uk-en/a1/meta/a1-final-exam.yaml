slug: a1-final-exam
title: A1 Final Exam
word_target: 2000
content_outline:
- section: Вступ та орієнтація
  words: 300
  points:
  - Provide English scaffolding outlining the final exam structure to reduce stress
  - Explain how the morphology, syntax, and communicative parts are assessed
  - Share tips for success from the perspective of a supportive tutor («Ви готові!»)
- section: Морфологічний та синтаксичний огляд
  words: 650
  points:
  - Review core noun cases (Nominative, Accusative, Locative, Vocative) with summary
    tables and English explanations
  - Drill Accusative vs. Locative with prepositions в/на (motion vs. location)
  - Review gender agreement with adjectives and possessive pronouns
  - Contrast Class I (-ати) and Class II (-ити) verb conjugations in present tense
  - 'Review basic syntax: SVO word order, general questions, and special questions
    (хто, що, де, куди)'
- section: 'Культурна подорож: Київ та Львів'
  words: 650
  points:
  - Integrate travel, food, and transport vocabulary into a thematic narrative
  - Present a short text about Kyiv featuring chestnut trees (каштани) and the Dnipro
    river
  - Present a short text about Lviv focusing on its coffee culture (кава) and historic
    printing houses
  - Use basic communication phrases, numbers, and time within the context of visiting
    these cities
- section: Фінальне оцінювання та перехід до A2
  words: 400
  points:
  - Set up listening and reading comprehension scenarios using basic complex sentences
    (з і, а, але)
  - 'Provide role-play prompts for real-world scenarios: buying tickets, ordering
    coffee'
  - Conclude with an encouraging summary celebrating A1 mastery and previewing the
    A2 journey
