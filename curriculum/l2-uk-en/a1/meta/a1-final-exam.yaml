slug: a1-final-exam
title: A1 Final Exam
word_target: 1200
content_outline:
- section: Вступ та орієнтація
  words: 300
  points:
  - 'Організація іспиту (English scaffolding): explain that instructions use English
    to reduce stress, but the test texts will be in Ukrainian.'
  - 'Supportive framing: use phrases like ''Ви готові!'' and ''Чудова робота!'' to
    celebrate A1 completion.'
  - 'Structure breakdown: what to expect in the morphological review, reading, and
    oral parts.'
- section: Морфологічний та синтаксичний огляд
  words: 650
  points:
  - Summary tables and clear English explanations of core noun cases (Nominative,
    Accusative, Locative, Vocative) per State Standard §4.2.3.
  - 'Contrast drill: Motion (Accusative ''Я йду в магазин'') vs Location (Locative
    ''Я в магазині'') using prepositions в/на.'
  - 'Gender agreement check: fixing common errors like ''Моя велика машина''.'
  - 'Verb conjugation refresher: Class I (-ати) vs. Class II (-ити) in the present
    tense.'
  - 'Syntactic structures (§4.3.1): SVO word order, general questions, and special
    questions using де, звідки, куди, що, хто.'
- section: 'Культурна подорож: Київ та Львів'
  words: 650
  points:
  - Thematic narrative 'Подорож Україною' focusing on transport, food, and home contexts.
  - 'Kyiv section: reading text featuring chestnut trees (каштани), the Dnipro river,
    and the city''s historical background.'
  - 'Lviv section: reading text highlighting coffee culture (кава), book history,
    and architecture.'
  - 'Functional practice: integrating numbers, telling time, and basic communication
    phrases within the travel texts.'
- section: Фінальне оцінювання та перехід до A2
  words: 400
  points:
  - Reading and listening comprehension checks verifying understanding of basic complex
    sentences (і, а, але, бо).
  - Oral assessment role-play scenarios focused on real-world situations (buying tickets,
    ordering coffee, introductions).
  - 'Preview of A2: briefly setting the foundation for the upcoming Genitive and Dative
    cases.'
  - Final encouraging summary celebrating the completion of all 44 A1 modules.
