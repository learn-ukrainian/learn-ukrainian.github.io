slug: food-vocabulary
title: Food and Drink
word_target: 2000
content_outline:
- section: Їжа
  words: 500
  points:
  - Introductory English scaffolding explaining the concept of noun gender for food
    items and how it affects adjectives.
  - 'Vocabulary introduction with IPA for first occurrences: хліб, м''ясо, риба, овочі,
    фрукти, каша, суп, борщ.'
  - H3 subsection for each gender group (Чоловічий рід, Жіночий рід, Середній рід,
    Множина) with basic matching adjectives.
  - 'Grammar/Usage note: Explain that in Ukrainian, we ''eat'' soup (їсти суп), not
    drink it. Provide collocations (свіжий хліб, смачний борщ).'
- section: Напої
  words: 400
  points:
  - 'H3 for common drinks vocabulary: вода, чай, кава, сік, молоко, компот. IPA on
    first use.'
  - 'English scaffolding explaining the Accusative case for ordering: Я хочу... Emphasize
    the feminine -а to -у change (кава -> каву, вода -> воду).'
  - 'Cultural note: Contrast Ukrainian tea culture (чай з лимоном) with the deep historical
    roots of Lviv''s coffee culture (кава по-львівськи).'
  - 'Mini-dialogue: Ordering a drink at a cafe using the new structures.'
- section: Паляниця
  words: 300
  points:
  - 'H3 on ''Паляниця'': Explain its physical form (round wheat bread) and its critical
    role as a linguistic shibboleth during the 2022 invasion.'
  - 'H3 on bread traditions: Explain ''хліб-сіль'' (bread and salt) hospitality and
    the proverb «Хліб — усьому голова».'
  - 'Decolonization note: Focus on the distinct phonetic properties of Ukrainian (soft
    ''ц'') that make ''паляниця'' difficult for non-native speakers, highlighting
    Ukrainian linguistic independence.'
- section: Мені подобається / Я не їм
  words: 400
  points:
  - English scaffolding to explain the Dative structure 'Мені подобається' vs the
    Nominative/Accusative 'Я люблю'.
  - 'H3 for expressing preferences with examples: Мені подобається борщ. Я люблю каву
    з молоком.'
  - 'H3 for dietary restrictions and dislikes: Я не їм м''ясо. Я не п''ю молоко. У
    мене алергія на...'
  - Provide short 2-3 line situational dialogues expressing food preferences and restrictions
    at a dinner table.
- section: Практика
  words: 400
  points:
  - 'H3: ''Читаємо меню'' - A simulated simple restaurant menu showing authentic food
    and drink names with prices in hryvnias.'
  - 'H3: ''Розмова'' - Conversational practice dialogues asking ''Що ти любиш їсти?''
    and ''Яка твоя улюблена їжа?'''
  - Ensure all practice texts remain strictly within A1 grammar bounds (Present tense,
    Nominative/Accusative).
