module: a1-039
level: A1
sequence: 39
slug: food-vocabulary
version: '2.0'
title: Food and Drink
subtitle: What Shall We Eat?
focus: vocabulary
pedagogy: PPP
phase: A1.4 [Tenses & Daily Life]
word_target: 1200
objectives:
- Name common foods and drinks in Ukrainian
- Express food preferences and dislikes
- Understand the cultural significance of паляниця
- Read a simple menu
content_outline:
- section: Їжа (Food)
  words: 275
- section: Напої (Drinks)
  words: 250
- section: Паляниця (The Shibboleth Bread)
  words: 175
- section: Мені подобається / Я не їм (Preferences)
  words: 250
- section: Практика (Practice)
  words: 250
vocabulary_hints:
  required:
  - хліб (bread) — свіжий хліб; sacred symbol, хліб-сіль tradition
  - борщ (borscht) — смачний борщ; national dish, masculine gender
  - м'ясо (meat) — neuter gender; Я не їм м'ясо (vegetarian phrase)
  - овочі (vegetables) — plural noun; food category
  - фрукти (fruits) — plural noun; food category
  - вода (water) — холодна вода, пляшка води; high frequency
  - кава (coffee) — кава з молоком; feminine gender
  - чай (tea) — чай з лимоном; masculine gender
  - молоко (milk) — neuter gender; кава з молоком
  - сік (juice) — апельсиновий сік; masculine gender
  - суп (soup) — їсти суп (eat, not drink); masculine gender
  recommended:
  - паляниця (palianytsia) — cultural shibboleth; round wheat bread
  - каша (porridge) — гаряча каша; feminine gender, traditional breakfast
  - компот (compote) — traditional Ukrainian drink; masculine gender
  - риба (fish) — feminine gender; food category
  - сир (cheese) — masculine gender; not to confuse with Russian сыр
activity_hints:
- type: match-up
  focus: Match food word to its category (їжа vs напої)
  items: 12
- type: quiz
  focus: Food preference expressions and correct forms
  items: 10
- type: fill-in
  focus: Complete food dialogue with correct vocabulary
  items: 8
- type: group-sort
  focus: Sort items into їжа vs напої categories
  items: 12
connects_to:
- a1-40 (Shopping and Market)
prerequisites:
- a1-38 (My Daily Routine)
persona:
  voice: Patient Supportive Tutor
  role: Ukrainian Chef
grammar:
- Food noun gender
- Я не їм construction
- Food collocations with adjectives
register: розмовний
