slug: food-vocabulary
title: Food and Drink
word_target: 1200
content_outline:
- title: Їжа (Food Categories & Gender)
  slug: food-categories
  words: 275
  points:
  - 'Introduce basic food vocabulary: хліб, м''ясо, риба, овочі, фрукти, каша, суп,
    борщ.'
  - Explain gender grouping (masculine, feminine, neuter) to prepare for adjective
    agreement.
  - 'Demonstrate basic collocations: свіжий хліб, смачний борщ, гаряча каша.'
- title: Напої (Drinks & Ordering)
  slug: drinks-ordering
  words: 250
  points:
  - 'Introduce drinks vocabulary: вода, чай, кава, сік, молоко, компот.'
  - Show ordering patterns with Accusative case (Я хочу каву, чай з молоком).
  - Briefly touch on Ukrainian tea and coffee culture.
- title: Мені подобається / Я не їм (Preferences)
  slug: preferences
  words: 250
  points:
  - 'Teach expressions of preference: Мені подобається борщ, Я люблю каву.'
  - 'Teach restrictions and negation: Я не їм м''ясо (vegetarian), Я не п''ю молоко.'
  - 'Provide simple phrases for allergies: У мене алергія на горіхи.'
- title: Паляниця та хліб (Cultural Context)
  slug: palianytsia-bread
  words: 175
  points:
  - Explain the cultural significance of хліб (bread) and the хліб-сіль tradition.
  - Introduce паляниця as a traditional bread and a famous linguistic shibboleth.
- title: Підсумок (Summary)
  slug: summary
  words: 250
  points:
  - Recap the difference between їжа and напої.
  - Review key phrases for ordering and expressing preferences.
  - Include 3-4 simple self-check questions (e.g., matching food to categories).
