slug: food-vocabulary
title: Food and Drink
word_target: 2000
content_outline:
- section: Їжа
  words: 500
  points:
  - Introduce the section with English scaffolding explaining the concept of noun
    gender for food items and how it affects adjective agreement.
  - 'Present core food vocabulary with IPA for first occurrences: хліб, м''ясо, риба,
    овочі, фрукти, каша, суп, борщ.'
  - 'Group the vocabulary by gender in clear visual tables (Чоловічий рід: хліб, суп,
    борщ; Жіночий рід: каша, риба; Середній рід: м''ясо; Множина: овочі, фрукти).'
  - Provide basic matching adjectives for each group (свіжий, гаряча, смачне) to demonstrate
    agreement.
  - 'Usage note: Explicitly teach the verb «їсти» (to eat) and explain the standard
    phrasing «їсти суп» rather than drinking it.'
- section: Напої
  words: 400
  points:
  - 'Introduce common drinks vocabulary with IPA on first occurrence: вода, чай, кава,
    сік, молоко, компот.'
  - 'Provide English scaffolding for ordering using the Accusative case: «Я хочу...».
    Create a clear rule box highlighting the feminine -а to -у shift (каву, воду).'
  - 'Cultural note: Contrast traditional Ukrainian tea culture (чай з медом, чай з
    лимоном) with the historic coffee culture of Lviv (кава по-львівськи), alongside
    traditional drinks like компот.'
  - Include a short, authentic mini-dialogue demonstrating how to order a drink at
    a cafe using the Accusative case.
- section: Паляниця
  words: 300
  points:
  - Define «паляниця» (a traditional round wheat bread) and explain its physical characteristics
    and historical roots.
  - 'Decolonized phonetic focus: Explain why «паляниця» acts as a linguistic shibboleth
    by detailing the independent phonetic properties of Ukrainian, specifically the
    uniquely soft «ц» [t͡sʲ].'
  - Discuss broader Ukrainian bread traditions, including the «хліб-сіль» hospitality
    greeting, and introduce the proverb «Хліб — усьому голова».
- section: Мені подобається / Я не їм
  words: 400
  points:
  - Use English scaffolding to introduce the Dative structure «Мені подобається» for
    expressing preferences, offering a simple contrast with the Nominative/Accusative
    «Я люблю».
  - 'Provide clear, short example sentences expressing food preferences: «Мені подобається
    борщ», «Я люблю каву з молоком».'
  - 'Introduce practical vocabulary for dietary restrictions, dislikes, and negation:
    «Я не їм м''ясо» (vegetarian context), «Я не п''ю молоко», «У мене алергія на...».'
  - Present 2 short situational dialogues showing how to express food preferences
    and dietary restrictions at a dinner table.
- section: Практика
  words: 400
  points:
  - Create a simulated simple restaurant menu («Читаємо меню») featuring authentic
    Ukrainian food and drink names grouped logically, with prices listed in hryvnias
    (грн).
  - Provide conversational practice («Розмова») with short dialogues focused on questions
    like «Що ти любиш їсти?» and «Яка твоя улюблена їжа?».
  - Include actionable instructions for the learner to mentally practice categorizing
    vocabulary (їжа vs напої), sorting by gender, and forming basic noun-adjective
    pairs.
