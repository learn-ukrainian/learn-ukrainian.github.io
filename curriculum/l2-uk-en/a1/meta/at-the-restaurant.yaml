slug: at-the-restaurant
title: At the Restaurant
word_target: 1400
content_outline:
- section: Структура меню та етикет
  words: 150
  points:
  - 'Scaffolding: English explanations for menu structure and cultural nuances'
  - 'Cultural distinction: ''Ресторан'' (formal) vs ''Кафе'' (casual)'
  - 'The three courses: Перші страви (soups), Другі страви (mains), Десерти'
  - 'Basic etiquette: Greeting staff and waiting to be seated'
  - 'Key vocabulary introduction: меню, страва, офіціант'
- section: 'Спілкування в ресторані: від замовлення до рахунку'
  words: 300
  points:
  - 'Making a reservation: ''Я хотів би замовити столик на...'''
  - 'Ordering using the polite Future tense: ''Я буду...'''
  - 'Asking questions about food: ''Що таке...?'', ''З чого це?'''
  - 'Dietary requirements: ''Без м''яса'', ''Без глютену'' (crucial for modern travelers)'
  - 'Requesting the bill: ''Рахунок, будь ласка'' and ''Скільки з мене?'''
  - 'Financial etiquette: Tipping culture (5-15%) and payment methods'
- section: 'Практика: Типові ситуації'
  words: 150
  points:
  - 'Dialogue 1: Ordering a full meal (First course, Main, Drink)'
  - 'Dialogue 2: Politely asking about ingredients and expressing dietary needs'
  - 'Dialogue 3: Finishing the meal, asking for the bill, and splitting costs'
  - 'Focus on natural polite markers: ''Будь ласка'', ''Дякую'''
- section: 'Культурний погляд: Українське застілля'
  words: 150
  points:
  - 'Narrative: The atmosphere of a traditional Ukrainian dinner'
  - 'The art of toasting: ''Будьмо!'' as the universal cheer'
  - 'Hospitality concepts: Sharing food and time together'
  - Wishing 'Смачного!' before the meal
