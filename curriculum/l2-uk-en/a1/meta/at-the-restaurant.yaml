slug: at-the-restaurant
title: At the Restaurant
word_target: 2000
content_outline:
- section: 'Розминка: Структура меню та етикет'
  words: 400
  points:
  - Explain the 'First' (soup), 'Second' (main), 'Dessert' structure typical in Ukraine
    with cultural emphasis
  - 'Cultural note: The difference between ''ресторан'' (formal, evening) and ''кафе''
    (casual, all-day)'
  - 'The universal toast: «Будьмо!» — meaning, pronunciation, and usage in social
    settings'
  - 'Vocabulary introduction: categories of dishes (перші страви, гарніри, напої)'
- section: 'Презентація: Як зробити замовлення'
  words: 800
  points:
  - 'Step 1: Reservation phrases («Я хотів би замовити столик на...», «У вас є вільний
    столик?»)'
  - 'Step 2: Asking for a table on arrival («Столик на двох, будь ласка», «Ми хотіли
    б сісти біля вікна»)'
  - 'Step 3: Reading the menu and asking questions («З чого це?», «Це гостре?», «Що
    ви порадите?»)'
  - 'Grammar focus: Future tense for ordering («Я буду...» + Accusative Case) — clear
    examples of case changes'
  - 'Dietary needs: «Без м''яса» (вегетаріанське), «Без глютену», «У мене алергія
    на...»'
  - 'The Bill: «Рахунок, будь ласка», payment methods («Карткою чи готівкою?»), and
    tipping etiquette'
- section: 'Практика: Діалоги у ресторані'
  words: 500
  points:
  - 'Dialogue 1: Ordering a full three-course dinner (Waitperson vs Guest) — emphasizing
    the ''Я буду...'' structure'
  - 'Dialogue 2: Dealing with a problem politely («Вибачте, це холодне», «Я це не
    замовляв») — polite conflict resolution'
  - 'Dialogue 3: Splitting the bill («Окремо» vs «Разом») — typical scenario for friends'
  - 'Drill: Polite request markers («Можна...?», «Будь ласка», «Дякую»)'
- section: 'Культурний контекст: Українська гостинність'
  words: 300
  points:
  - 'Narrative: A typical evening out in a Ukrainian restaurant (atmosphere, live
    music, ''жива музика'')'
  - Phrase «Смачного!» (Bon appetit) — when and how to use it (waiter to guest, guest
    to guest)
  - Brief mention of traditional dishes often found on 'Second' course (varenyky,
    kotleta po-kyivsky) to reinforce vocabulary
