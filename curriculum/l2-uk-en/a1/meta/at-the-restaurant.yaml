slug: at-the-restaurant
title: At the Restaurant
word_target: 1200
content_outline:
- section: Вступ та культурний контекст (Introduction & Cultural Context)
  slug: introduction-and-culture
  words: 300
  points:
  - 'Establish the restaurant setting using core vocabulary: ресторан, кафе, офіціант,
    меню.'
  - 'Explain the traditional three-course structure: «Перше», «Друге», and «Третє».'
  - Discuss tipping etiquette («чайові») and basic politeness markers.
- section: 'Презентація: Мова замовлення (Presentation: Ordering Language)'
  slug: presentation-ordering
  words: 350
  points:
  - 'Introduce Future Tense of «бути» (§4.2.4.1) for ordering: «Я буду, ти будеш...».'
  - Present the «Я буду...» structure as the most natural and polite way to order.
  - 'Differentiate verbs with examples: «замовити столик» (book a table) vs. «замовити
    страву» (order a dish).'
- section: 'Практика: Типові ситуації (Practice: Typical Situations)'
  slug: practice-accusative
  words: 300
  points:
  - Integrate Accusative Case (§4.2.3.2) for direct objects being ordered.
  - Show the -а → -у shift with clear examples (кава → каву, піца → піцу).
  - 'Drill correction of the common error: «Я буду каву» (✅), explicitly warning against
    the Nominative mismatch.'
- section: Підсумок та етикет (Summary & Etiquette)
  slug: situations-and-summary
  words: 250
  points:
  - Provide mini-dialogues for interacting with the «офіціант» and asking for the
    «рахунок» (explicitly avoiding 'счёт').
  - 'Introduce modern dietary phrases: «без м''яса», «без глютену».'
  - Summarize with the toast «Будьмо!» and include 3-4 self-check questions to verify
    understanding.
