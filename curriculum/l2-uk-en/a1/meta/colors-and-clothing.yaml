module: a1-012
id: a1-012
level: A1
sequence: 12
slug: colors-and-clothing
version: '2.1'
title: Colors & Clothing
subtitle: Describing What You Wear
focus: vocabulary
pedagogy: PPP
phase: A1.1 [First Contact]
word_target: 1200
objectives:
- Learner can name basic colors in Ukrainian
- Learner can use color adjectives with correct gender agreement
- Learner can describe clothing items
- Learner can describe what someone is wearing
content_outline:
- section: Вступ та культурний контекст (Introduction & Cultural Context)
  words: 250
  points:
  - 'Символізм кольорів в українській традиції: червоний як колір життя та любові,
    чорний як символ родючої землі та мудрості, білий як знак чистоти.'
  - 'Вишиванка як оберіг (talisman): функція вишивки на комірі та манжетах як захисного
    кола.'
- section: Презентація кольорів та граматика узгодження (Colors & Grammar of Agreement)
  words: 300
  points:
  - 'Презентація основних кольорів: білий, чорний, червоний, синій, зелений, жовтий.'
  - 'Узгодження прикметників з іменниками в роді: закінчення (-ий/-а/-е).'
  - Незмінювані кольори-запозичення (бордо, беж, хакі).
- section: Одяг — Clothing Vocabulary
  words: 350
  points:
  - 'Лексика теми Одяг: сорочка, штани, сукня, куртка, светр.'
  - 'Опис одягу через прикметник + іменник (verb-free).'
  - 'Pluralia Tantum: штани, джинси, окуляри.'
- section: Практичне застосування — Describing Outfits
  words: 300
  points:
  - 'Опис одягу через verb-free patterns.'
  - 'Культурний контекст одягу: кольори вишиванки за регіонами.'
vocabulary_hints:
  required:
  - білий (white)
  - чорний (black)
  - червоний (red)
  - синій (blue)
  - зелений (green)
  - сорочка (shirt)
  - штани (pants)
  - сукня (dress)
  - куртка (jacket)
  recommended:
  - плаття (dress)
  - жовтий (yellow)
  - светр (sweater)
  - окуляри (glasses)
  - джинси (jeans)
activity_hints:
- type: match-up
  focus: Color and clothing names
  items: 30
- type: fill-in
  focus: Describe outfits
  items: 10
