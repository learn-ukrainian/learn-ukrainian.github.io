slug: colors-and-clothing
title: Colors & Clothing
word_target: 1200
content_outline:
- section: Вступ та культурний контекст (Introduction & Cultural Context)
  words: 400
  points:
  - 'Explicit English scaffolding: Use English to introduce the symbolic meaning of
    colors in Ukrainian tradition, integrating the vocabulary (червоний - life/love,
    чорний - fertile earth, білий - purity).'
  - 'Cultural Hook: Explain the vyshyvanka as an ''оберіг'' (talisman), highlighting
    how the embroidered patterns on collars and cuffs are traditionally meant to protect
    the wearer''s energy zones.'
- section: Презентація кольорів та граматика узгодження (Colors & Grammar of Agreement)
  words: 500
  points:
  - Present the core colors mandated by the standard (білий, чорний, червоний, синій,
    зелений, жовтий).
  - Provide a clear paradigm for Adjective-Noun agreement across masculine (-ий/ій),
    feminine (-а/я), and neuter (-е/є) genders.
  - Contrast correct and incorrect forms to preempt the 'червоний сорочка' error,
    emphasizing that the adjective mirrors the noun.
  - Briefly note invariant loan colors (бордо, беж, хакі) that do not change endings.
- section: Одяг та дієслово «носити» (Clothing & the Verb 'To Wear')
  words: 600
  points:
  - Introduce basic clothing vocabulary (сорочка, штани, сукня, куртка, светр), noting
    the stylistic preference for 'сукня' as elegant/literary.
  - Explain the verb 'носити' and introduce the Accusative case for direct objects
    (§4.2.3.2.1).
  - 'Provide focused practice on the feminine Accusative shift (-а/-я to -у/-ю), contrasting
    Nominative vs. Accusative: ''Це червона сукня'' vs ''Я ношу червону сукню''.'
  - Introduce Pluralia Tantum (штани, джинси, окуляри), explaining they take plural
    adjectives and pronouns ('ці сині штани').
- section: Практичне застосування та покупки (Practice & Shopping)
  words: 500
  points:
  - Provide a situational mini-dialogue ('У магазині одягу') focused on asking for
    size and price, revising numerals in context.
  - 'Demonstrate key phrases: ''Мені подобається цей колір'', ''Ці штани мені підходять'',
    ''Скільки коштує?''.'
  - Scaffold a guided text demonstrating how to describe a favorite outfit, integrating
    colors, clothing items, and the correct accusative forms.
