slug: colors-and-clothing
title: Colors & Clothing
word_target: 1200
content_outline:
- section: Вступ та культурний контекст (Introduction & Cultural Context)
  slug: introduction-cultural-context
  words: 200
  points:
  - 'Introduce the cultural significance of colors in traditional Ukrainian embroidery
    (vyshyvanka): червоний for life and love, чорний for the fertile earth, and білий
    for purity.'
  - Use simple English scaffolding to explain the concept, integrating the new Ukrainian
    color vocabulary.
- section: Кольори та узгодження (Colors & Agreement)
  slug: colors-and-agreement
  words: 350
  points:
  - 'Present the core color vocabulary: білий, чорний, червоний, синій, зелений, жовтий.'
  - 'Reinforce M11 adjective agreement rules in the Nominative case: matching masculine
    (-ий/ій), feminine (-а/я), and neuter (-е/є) endings to nouns.'
  - Address the common English-speaker error of ignoring agreement, contrasting incorrect
    ('червоний сорочка') with correct ('червона сорочка') forms.
- section: Лексика одягу (Clothing Vocabulary)
  slug: clothing-vocabulary
  words: 350
  points:
  - 'Introduce basic clothing nouns: сорочка, штани, сукня, куртка, светр.'
  - Combine colors and clothing using only the Nominative case ('Це мій новий синій
    светр', 'Ось червона сукня'), respecting the 'no cases beyond nominative' constraint.
  - Introduce Pluralia Tantum words (штани, джинси, окуляри) as fixed vocabulary items
    to preview M13 plural concepts.
- section: Практичне застосування (Practice & Shopping)
  slug: practice-shopping
  words: 200
  points:
  - Provide a situational dialogue in a clothing store using simple Nominative phrases
    ('Скільки коштує ця червона сукня?').
  - 'Teach preference phrases without complex grammar: ''Мені подобається цей колір''.'
  - Guided practice describing outfits in pictures using 'Це...' constructions.
- section: Підсумок (Summary)
  slug: summary
  words: 100
  points:
  - Recap the color adjective endings for masculine, feminine, and neuter nouns.
  - 'Self-check question 1: How do you say ''red dress'' in Ukrainian?'
  - 'Self-check question 2: What gender is the word ''светр''?'
  - 'Self-check question 3: Which colors symbolize life and earth in Ukrainian culture?'
