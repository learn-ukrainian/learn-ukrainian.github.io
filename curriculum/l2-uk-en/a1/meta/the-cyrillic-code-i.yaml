slug: the-cyrillic-code-i
title: The Cyrillic Code I
word_target: 2000
content_outline:
- section: Вступ
  words: 400
  points:
  - 'Immersion Note: A1 target immersion is 10-50%. Explicitly list English scaffolding
    requirements for introducing the concept of the Cyrillic alphabet.'
  - 'Provide the cultural hook: Cyrillic was named after St. Cyril but developed by
    his students in the First Bulgarian Empire.'
  - Introduce the learning strategy of 'True Friends' vs 'False Friends' to reduce
    learner anxiety immediately.
  - Demonstrate familiar sounds via international cognates like 'таксі', 'піца', 'метро'
    to show the alphabet is partially cracked already.
- section: Презентація
  words: 600
  points:
  - 'True Friends (А, Е, І, О, К, М, Т): Give this category its own H3. Define each
    letter with 2+ Ukrainian examples and English translations.'
  - 'False Friends (В, Н, Р, С): Give this its own H3. Explicitly explain the ''P''
    Trap, ''H'' Trap, ''B'' Trap, and ''C'' Trap using clear visual mnemonics.'
  - 'New Letters (Б, Д, З, Л, П, Ф): Give this its own H3. Provide visual aids (e.g.,
    ''Д'' looks like a little house, ''Л'' has two walking legs).'
  - 'The Exclusion Rule: Explicitly state that Russian-only characters like ''ё'',
    ''ы'', ''э'' do not exist in Ukrainian to establish linguistic boundaries.'
- section: Практика
  words: 400
  points:
  - Create a decoding drill section for reading high-frequency urban words ('банк',
    'метро', 'кафе').
  - Include a collocation practice block introducing essential phrases like 'національний
    банк' and 'станція метро' for context.
  - Provide functional mini-dialogues using 'так, будь ласка' and 'так, звісно' to
    demonstrate immediate communicative utility.
- section: Культурний контекст
  words: 400
  points:
  - Give an H3 to 'The I Identity', explaining how the dotted 'І' serves as a visual
    symbol of Ukrainian identity and European connection.
  - 'Briefly tell the Story of Ґ: the repressed letter (removed in 1933 by Soviet
    authorities, restored in 1990) as a compelling hook for linguistic resilience.'
  - 'Incorporate State Standard §4.1.1 words: practice recognizing letters in national
    terms like ''Київ'', ''Україна'', and ''українець''.'
- section: Підсумок та продукція
  words: 200
  points:
  - Include a pronunciation production drill contrasting the 'Purring Cat' rolled
    /r/ (Р) with the English /p/.
  - Provide a final decoding self-check using the phrase 'це факт' (it's a fact) to
    test both 'Ф' and 'Т' letter recognition.
