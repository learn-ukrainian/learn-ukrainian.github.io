content_outline:
- section: Вступ — Introduction
  slug: vtsup-introduction
  words: 200
  points:
  - 'Welcome the learner to the Ukrainian alphabet: 33 letters, highly phonetic.'
  - 'State the goal: Learn the first 7 letters (3 vowels: А, О, У; 4 consonants: М,
    Л, Н, С).'
  - 'Cultural connection: The Cyrillic script is named after Saint Cyril, whose students
    formalized the alphabet.'
  - Introduce the pronunciation video guide (Anna Ohoiko) as the visual reference
    for these letters.
- section: Голосні — Vowels
  slug: holosni-vowels
  words: 300
  points:
  - 'Define vowels (голосні) in English: sounds produced with voice only, no airflow
    obstruction.'
  - 'State the Golden Rule: Ukrainian vowels are never reduced. They stay pure whether
    stressed or unstressed.'
  - 'Letter А: sounds like ''a'' in ''father''. Key word: ананас (pineapple).'
  - 'Letter О: sounds like ''o'' in ''more''. Address the common error: do not reduce
    unstressed О to an ''a'' sound.'
  - 'Letter У: sounds like ''oo'' in ''moon''. Key word: Україна (Ukraine) — provided
    with English translation as it contains unknown letters.'
- section: Приголосні — Consonants
  slug: pryholosni-consonants
  words: 300
  points:
  - 'Define consonants (приголосні) in English: sounds produced with airflow obstruction.'
  - 'Letter М: identical to English M. Key decodable word: мама (mom).'
  - 'Letter Л: visual mnemonic—looks like a tent or a lambda (Λ). Key decodable word:
    лама (llama).'
  - 'Letter Н: highlight as a FALSE FRIEND. Looks like English H but sounds like N.
    Key decodable word: нам (to us).'
  - 'Letter С: highlight as a FALSE FRIEND. Looks like English C but always sounds
    like S, never K. Key decodable word: сом (catfish).'
- section: Склади і слова — Syllables and Words
  slug: sklady-i-slova-syllables-and-words
  words: 300
  points:
  - 'Explain syllables (склади) in English: a vowel alone or joined with consonants.'
  - Show open syllables (МА, НО, СУ) and closed syllables (АМ, ОН, УС).
  - 'Demonstrate visual blending: ма + ма = мама; со + сна = сосна.'
  - 'Provide a strict decodable reading drill using ONLY the 7 known letters: мама,
    сом, сон, оса, масло, сосна, ананас, насос, лама, смола, нам, нас, сам, мало,
    слон.'
- section: Підсумок — Summary
  slug: pidsumok-summary
  words: 100
  points:
  - 'Congratulate the learner: 7 of 33 letters mastered, and first real words decoded.'
  - 'Self-check 1: Read ''масло'' and ''сом'' aloud.'
  - 'Self-check 2: What are the two False Friends in this lesson (Н and С) and what
    sounds do they make?'
  - 'Self-check 3: Do Ukrainian vowels change their sound when unstressed? (No, they
    are never reduced).'
activity_hints:
- type: watch-and-repeat
  focus: Watch Anna Ohoiko pronunciation video for each letter, repeat aloud
  items: 6
- type: classify
  focus: Sort the 6 letters into vowels (А, У) vs consonants (М, Л, Н, С)
  items: 6
- type: image-to-letter
  focus: See emoji (🍍→А, 🌙→Л, 🧳→С), tap which Cyrillic letter the word starts with
  items: 6
- type: match-up
  focus: Match letter to key word (А↔ананас, М↔морква, etc.)
  items: 6
- type: group-sort
  focus: Sort syllables into open (МА, НУ) vs closed (АМ, УН)
  items: 12
