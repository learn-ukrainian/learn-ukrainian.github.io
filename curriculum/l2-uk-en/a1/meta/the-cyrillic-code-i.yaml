slug: the-cyrillic-code-i
title: The Cyrillic Code I
word_target: 2000
pronunciation_videos:
  overview: https://www.youtube.com/watch?v=ksXIXj7CXwc
  playlist: https://www.youtube.com/playlist?list=PLpkSIXDyaJi3mlJlKXWKhdiJZj67fPXQV
  credit: Anna Ohoiko — Ukrainian Lessons
  letters:
    А: https://www.youtube.com/watch?v=hvB3VpcR3ZE
    М: https://www.youtube.com/watch?v=Ez95H4ibuJo
    Л: https://www.youtube.com/watch?v=v6-3Xg52Buk
    У: https://www.youtube.com/watch?v=VB1O6PmtYRU
    Н: https://www.youtube.com/watch?v=vNUfiKHPYaU
    С: https://www.youtube.com/watch?v=7UsFBgSL91E
content_outline:
- section: Вступ — Introduction
  words: 300
  points:
  - 'Note the A1 immersion protocol explicitly: Immersion is 10-50%. English scaffolding
    MUST be used to explain the phonetic system and linguistic concepts, while Ukrainian
    is used for the target material.'
  - 'Introduce the Ukrainian alphabet: State clearly that it contains 33 letters and
    operates as a highly phonetic system where each letter maps reliably to one specific
    sound (§4.1.1).'
  - 'Include the cultural hook: Explain the decolonized origin of the Cyrillic script
    (First Bulgarian Empire, students of Sts Cyril and Methodius), emphasizing its
    independent, ancient roots.'
  - Introduce Anna Ohoiko as the pronunciation guide. Explain the learning method
    (watch video → repeat aloud → practice reading) and provide the overview video
    link.
- section: 'Голосні — Vowels: А, У'
  words: 400
  points:
  - 'Define vowels (голосні) using English scaffolding: ''voice only'' sounds produced
    with no airflow obstruction. State that Ukrainian has 10 vowels and this module
    introduces 2 (§4.1.4).'
  - 'Create an H3 for ''Літера А''. Embed the video link. Explain it sounds like ''a''
    in ''father''. Provide examples: Африка, ананас, автобус. Add IPA only on the
    first occurrence of each new word.'
  - 'Create an H3 for ''Літера У''. Embed the video link. Explain it sounds like ''oo''
    in ''moon''. Provide examples: Україна, університет, урок. Add IPA only on the
    first occurrence.'
  - 'Teaching point: Explicitly teach the State Standard core rule that Ukrainian
    vowels are perfectly stable and never reduce to a schwa, maintaining strict clarity
    whether stressed or unstressed.'
- section: 'Приголосні — Consonants: М, Л, Н, С'
  words: 500
  points:
  - 'Define consonants (приголосні) using English scaffolding: sounds made with airflow
    obstruction. State that Ukrainian has 22 consonants and this module introduces
    4 (§4.1.4).'
  - 'Create an H3 for ''Літера М''. Teach that it looks and sounds like English M
    (/m/). Embed video link. Provide examples: морква, мама, місто.'
  - 'Create an H3 for ''Літера Л''. Teach that uppercase Л looks like a tent (Λ).
    Embed video link. Provide examples: літак, луна, лимон.'
  - 'Create an H3 for ''Літера Н — Візуальна пастка''. Warn learners explicitly: it
    looks like English H but sounds like /n/. Embed video link. Provide examples:
    ножиці, нам, ніс.'
  - 'Create an H3 for ''Літера С — Візуальна пастка''. Warn learners explicitly: it
    looks like English C but sounds like /s/. Embed video link. Provide examples:
    сумка, сон, сам.'
- section: Перші склади — First Syllables
  words: 350
  points:
  - 'Define a syllable (склад) using English scaffolding: a vowel or a combination
    of a consonant and a vowel.'
  - 'Create an H3 for ''Відкриті склади'' (Open Syllables). Provide a clear reading
    drill layout for: МА, МУ, НА, НУ, ЛА, ЛУ, СА, СУ.'
  - 'Create an H3 for ''Закриті склади'' (Closed Syllables). Provide a clear reading
    drill layout for: АМ, УМ, АН, УН, АС, УС, АЛ, УЛ.'
  - 'Create a step-by-step guide showing how to combine these syllables into the first
    full, readable words: мама, сума, мул, луна, нам.'
- section: Практика читання — Reading Practice
  words: 250
  points:
  - 'Explain the progressive decoding strategy in English: syllables → single words
    → short phrases.'
  - 'Provide a dedicated word practice list using ONLY the 6 known letters: мама,
    сума, нас, сам, мул, луна, мус, нам. Add English translations to build confidence.'
  - 'Introduce the first reading phrases: «Мама сама», «Мул сам», «Сума мала». Ensure
    no letters outside the core 6 are used in practice.'
  - Include a self-check prompt asking the learner to read 'мама', 'сума', and 'луна'
    aloud without looking at the English hints.
- section: Підсумок — Summary
  words: 200
  points:
  - 'Recap the milestone: the learner can now recognize and pronounce 6 out of 33
    letters (2 голосні + 4 приголосні) and read basic syllables and words.'
  - Reiterate the core phonetic rule that Ukrainian vowels stay pure and do not reduce.
  - Provide the link to Anna Ohoiko's full YouTube playlist for independent phonetic
    practice.
  - Set up the transition to the next module (The Cyrillic Code II), noting it will
    introduce 7 new letters (К, И, Р, Б, В, Д, І).
activity_hints:
- type: watch-and-repeat
  focus: Watch Anna Ohoiko pronunciation video for each letter, repeat aloud
  items: 6
- type: classify
  focus: Sort the 6 letters into vowels (А, У) vs consonants (М, Л, Н, С)
  items: 6
- type: image-to-letter
  focus: See emoji (🍍→А, 🌙→Л, 🧳→С), tap which Cyrillic letter the word starts with
  items: 6
- type: match-up
  focus: Match letter to key word (А↔ананас, М↔морква, etc.)
  items: 6
- type: group-sort
  focus: Sort syllables into open (МА, НУ) vs closed (АМ, УН)
  items: 12
