content_outline:
- section: Вступ — Introduction
  words: 200
  points:
  - 'Set English scaffolding requirement explicitly: use English to explain the alphabet
    system (33 letters, highly phonetic). Ukrainian will carry the actual examples.'
  - Introduce the cultural origin of Cyrillic from the First Bulgarian Empire, establishing
    a decolonized perspective independent of later Russian empires.
  - 'Explain the learning method: watch the linked Anna Ohoiko video for each letter,
    repeat aloud, then practice reading.'
  - Provide the overarching video link for the alphabet overview.
- section: 'Голосні — Vowels: А, У'
  words: 200
  points:
  - 'Define ''голосні'' (vowels) using English: sounds produced without airflow obstruction.
    Mention Ukrainian has 10 vowels, and we learn 2.'
  - 'State the Golden Rule of Ukrainian vowels (State Standard §4.1.4): they never
    reduce to a schwa, staying pure whether stressed or unstressed.'
  - 'Create an H3 for ''Літера А''. Explain it sounds like ''a'' in ''father''. Embed
    the Anna Ohoiko video link. Give examples: ананас (ananas), автобус (avtobus).
    Use IPA only on the first occurrence.'
  - 'Create an H3 for ''Літера У''. Explain it sounds like ''oo'' in ''moon''. Embed
    the video link. Give examples: Україна (Ukraina), урок (urok). Use IPA on the
    first occurrence.'
- section: 'Приголосні — Consonants: М, Л, Н, С'
  words: 200
  points:
  - 'Define ''приголосні'' (consonants) using English: sounds with airflow obstruction.
    Mention Ukrainian has 22 consonants, and we learn 4.'
  - 'Create an H3 for ''Літера М''. Sounds like English M. Embed video link. Examples:
    мама (mama), морква (morkva).'
  - 'Create an H3 for ''Літера Л''. Note the uppercase Λ shape. Embed video link.
    Examples: літак (litak), лимон (lymon).'
  - 'Create an H3 for ''Літера Н''. Highlight the visual ''false friend'': warn it
    looks like English H but is /n/. Embed video. Examples: ніс (nis), нам (nam).'
  - 'Create an H3 for ''Літера С''. Highlight the visual ''false friend'': it looks
    like English C but is always /s/. Embed video. Examples: сумка (sumka), сам (sam).'
- section: Перші склади — First Syllables
  words: 200
  points:
  - 'Define a syllable (склад) using English scaffolding: a vowel alone, or a consonant
    joined with a vowel.'
  - 'Create an H3 for ''Відкриті склади'' (Open Syllables). Build a clear reading
    drill table for open syllables: МА, МУ, НА, НУ, ЛА, ЛУ, СА, СУ.'
  - 'Create an H3 for ''Закриті склади'' (Closed Syllables). Build a clear reading
    drill table for closed syllables: АМ, УМ, АН, УН, АС, УС, АЛ, УЛ.'
  - 'Demonstrate blending syllables into the first words visually: ма + ма = мама,
    су + ма = сума.'
- section: Практика читання — Reading Practice
  words: 200
  points:
  - 'Explain the progressive decoding method: syllables → words → short phrases.'
  - 'Create an H3 for ''Слова''. Provide a practice block with words strictly using
    the 6 known letters: мама, сума, нас, сам, мул, луна, мус, нам. Include full transliteration
    and English translations.'
  - 'Create an H3 for ''Короткі фрази''. Provide reading phrases: «Мама сама», «Мул
    сам», «Сума мала». State clearly that no unknown letters appear here.'
  - Include a self-check reflection box asking the learner to read 'мама', 'сума',
    and 'луна' aloud confidently.
- section: Підсумок — Summary
  words: 200
  points:
  - 'Summarize the milestone: the learner now knows 6 of 33 letters (2 vowels, 4 consonants)
    and can read actual words.'
  - 'Remind the learner of the core rule: Ukrainian vowels stay pure and unreduced.'
  - 'Preview the next module: The Cyrillic Code II adds 7 more letters.'
  - Provide a link to the complete Anna Ohoiko YouTube playlist for independent letter
    practice.
activity_hints:
- type: watch-and-repeat
  focus: Watch Anna Ohoiko pronunciation video for each letter, repeat aloud
  items: 6
- type: classify
  focus: Sort the 6 letters into vowels (А, У) vs consonants (М, Л, Н, С)
  items: 6
- type: image-to-letter
  focus: See emoji (🍍→А, 🌙→Л, 🧳→С), tap which Cyrillic letter the word starts with
  items: 6
- type: match-up
  focus: Match letter to key word (А↔ананас, М↔морква, etc.)
  items: 6
- type: group-sort
  focus: Sort syllables into open (МА, НУ) vs closed (АМ, УН)
  items: 12
