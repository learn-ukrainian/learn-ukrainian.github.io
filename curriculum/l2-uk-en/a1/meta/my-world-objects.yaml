slug: my-world-objects
naturalness:
  score: 10
  status: PASS
title: 'My World: Objects'
word_target: 1200
content_outline:
- section: 'Вступ: Welcome to Your Space'
  slug: vtsup-welcome-to-your-space
  words: 150
  points:
  - 'Welcome learners and introduce the goal: pointing to and identifying objects
    in our immediate environment.'
  - Briefly recap grammatical gender as the essential foundation for matching pointing
    words to objects.
  - Introduce the cultural proverb «В гостях добре, а вдома краще» (East or West,
    home is best).
- section: 'Презентація: Pointing Near and Far'
  slug: prezentatsiya-pointing-near-and-far
  words: 450
  points:
  - Introduce Near Objects (Цей, Ця, Це, Ці) using room vocabulary. Highlight the
    rhyming endings (цЯ книгА).
  - Introduce Far Objects (Той, Та, Те, Ті) across the room. Use the 'T' for 'That/There'
    mnemonic.
  - Explain the critical difference between Identification ('Це стіл' = This is a
    table) and Specification ('Цей стіл' = This table).
  - Introduce 'двері' as an inherently plural noun requiring 'ці' or 'ті'.
- section: 'Практика: Arranging the Room'
  slug: praktyka-arranging-the-room
  words: 300
  points:
  - 'Gender Matching Drill: Actively pair demonstratives with new room vocabulary
    (стіл, ліжко, лампа, шафа) to build muscle memory.'
  - 'Scenario practice: Comparing holding ''цей телефон'' vs pointing at ''той стіл''
    to reinforce proximity rules.'
- section: 'Культурний контекст: Дім and Хата'
  slug: kulturnyy-kontekst-dim-and-khata
  words: 150
  points:
  - Explain the 'Покуття' (Red Corner) and its historical role in room orientation.
  - Contrast 'хата' (traditional home) with 'квартира' (modern apartment) and 'дім'.
- section: 'Підсумок: Summary and Self-Check'
  slug: pidsumok-summary-and-self-check
  words: 150
  points:
  - Recap the absolute rule of gender agreement for near and far demonstratives.
  - 'Self-check 1: How do you translate ''This is a table'' vs ''This table''?'
  - 'Self-check 2: Which near demonstrative goes with the word ''книга''?'
  - 'Self-check 3: What demonstrative form must be used with ''двері''?'
  - 'Self-check 4: What is the difference between a ''хата'' and a ''квартира''?'
