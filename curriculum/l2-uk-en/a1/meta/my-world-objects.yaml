id: 5
slug: 'my-world-objects'
title: 'My World: Objects'
subtitle: 'Pointing to Things with Demonstratives'
version: '2.0'
phase: 'A1.1'
pedagogy: 'PPP'
duration: 45
transliteration: 'full'
tags: ['grammar', 'vocabulary', 'demonstratives']
grammar: ['demonstratives', 'gender-agreement']
objectives:
  - 'Learner can use цей/ця/це/ці to point to objects near them'
  - 'Learner can use той/та/те/ті to point to objects far from them'
  - 'Learner can match demonstrative gender with noun gender'
  - 'Learner can name 40 common household and everyday objects'
content_outline:
  - section: "Warm-up"
    words: 173
    points:
      - "Concept of Deixis: Using words to point ('fingers of language')"
      - "Review: Gender basics from Module 03 (masculine, feminine, neuter endings)"
      - "Scenario: Standing in the center of a room, looking at objects near and far"
      - "Introduce the core binary: 'This' (close) vs 'That' (far)"
  - section: "Presentation"
    words: 415
    points:
      - "The 'Near' Demonstratives: Цей (m), Ця (f), Це (n), Ці (pl) - with IPA"
      - "The 'Far' Demonstratives: Той (m), Та (f), Те (n), Ті (pl) - with IPA"
      - "Visual Scaffolding: Finger touching (Near) vs Finger pointing (Far)"
      - "CRITICAL DISTINCTION: Invariant 'Це' (This is...) vs Demonstrative 'Цей' (This [noun]...)"
      - "Step-by-step Agreement Algorithm: 1. Identify noun gender -> 2. Select matching demonstrative"
      - "Common Error Alert: Avoiding 'Це книга' when meaning 'Ця книга'"
  - section: "Practice"
    words: 360
    points:
      - "Context: The Kitchen. Mixing genders: ніж (m), ложка (f), вікно (n)"
      - "Context: Furniture. диван (m), шафа (f), крісло (n)"
      - "Drill: Distance switching. 'Цей стілець' (here) <-> 'Той стілець' (there)"
      - "Mnemonics: Visual/Audio rhymes for endings (e.g., -а matches -а)"
      - "Validation: Checking comprehension of proximity"
  - section: "Cultural Insight"
    words: 389
    points:
      - "Proverb breakdown: 'В гостях добре, а вдома краще' (East or West, home is best)"
      - "Concept: 'Pokuttia' (The Red Corner) vs modern living space - the 'soul' of the room"
      - "Hospitality: 'Заходьте, будь ласка' (Come in, please) - creating a welcoming space"
      - "Language-Culture connection: Why objects have gender (personification of the world)"
      - "Vocab Expansion: Хата (traditional) vs Квартира (modern) vs Дім (emotional)"
  - section: "Production"
    words: 75
    points:
      - "Real-world task: Learner points to 3 real objects near them"
      - "Real-world task: Learner points to 3 real objects far from them"
      - "Production: Form full sentences using 'Це мій...' and 'Цей...'"
      - "Self-Correction check: Did I match the gender?"
