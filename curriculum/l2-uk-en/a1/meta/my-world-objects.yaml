slug: my-world-objects
title: 'My World: Objects'
word_target: 2000
content_outline:
- section: 'Вступ: Вказуємо на світ'
  words: 250
  points:
  - 'Introduce the core concept: pointing at things near (touchable) vs. far (pointable)'
  - 'Visual Scaffolding: Establish the hand gestures/icons for ''here'' vs ''there'''
  - Recall Module 03 genders (Masculine/Feminine/Neuter) as the prerequisite logic
  - 'Context setting: We are exploring a personal space (room) and identifying specific
    items'
- section: 'Теорія: Вказівні займенники (Цей і Той)'
  words: 600
  points:
  - 'Near Demonstratives Table: цей (m), ця (f), це (n), ці (pl) — emphasize endings
    matching nouns'
  - 'Far Demonstratives Table: той (m), та (f), те (n), ті (pl) — highlight the ''T''
    sound for ''That/There'''
  - 'CRITICAL DISTINCTION: ''Це'' (This is... / Subject) vs ''Цей/Ця/Це'' (This [noun]...
    / Adjective)'
  - 'Common Error Alert: Contrast ''Це стіл'' (Identification) with ''Цей стіл'' (Specification)'
  - 'Gender Agreement Examples: Цей стіл (m), Ця шафа (f), Те вікно (n), Ці речі (pl)'
- section: 'Практика: Побут і речі'
  words: 500
  points:
  - 'Core Vocabulary Introduction: Furniture (диван, шафа, ліжко, стілець) and items
    (телефон, книга, лампа)'
  - 'Drill: Gender Matching — align new objects with their correct demonstrative (e.g.,
    Лампа -> Вона -> Ця)'
  - 'Mini-dialogues: ''Що це?'' (Identification) -> ''Це шафа.'' -> ''Ця шафа велика.''
    (Description)'
  - 'Proximity Drill: Contrast ''Цей телефон'' (in hand) vs ''Той телевізор'' (on
    wall)'
- section: 'Культурний контекст: Український дім'
  words: 350
  points:
  - 'Proverb: ''В гостях добре, а вдома краще'' — discussion of ''дім'' vs ''хата''
    vs ''квартира'''
  - 'Traditional vs Modern: The concept of ''Pokuttia'' (Red Corner) and its modern
    equivalents (focal points)'
  - 'Linguistic Note: Why ''телефон'' is masculine and ''лампа'' is feminine (grammatical
    gender vs. reality)'
  - 'Special Case: ''Двері'' (door) is always plural — usage with ''ці/ті'''
- section: 'Використання: Описуємо кімнату'
  words: 300
  points:
  - 'Scenario: Giving a tour of your room (virtual or real)'
  - 'Production Task: Point to and name 3 near objects and 3 far objects with correct
    gender'
  - 'Synthesis: Combine Identification (''Це...'') with Specification (''Цей...'')'
  - 'Final Confidence Check: Distinguishing ''Цей'' vs ''Той'' in rapid succession'
