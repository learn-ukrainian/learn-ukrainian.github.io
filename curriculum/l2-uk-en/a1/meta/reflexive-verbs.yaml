slug: reflexive-verbs
title: Reflexive Verbs (-ся)
word_target: 1200
content_outline:
- section: 'Вступ: Що таке дієслова на -ся? (Introduction: What are Reflexive Verbs?)'
  slug: intro-what-are-reflexive-verbs
  words: 250
  points:
  - 'Introduce the ''mirror'' analogy: explain how the suffix -ся reflects the action
    back onto the subject, comparing transitive and reflexive forms (мити vs митися).'
  - 'Provide etymological context: explain that -ся is a historical contraction of
    the word ''себе'' (self).'
  - 'Address the ''Myself'' redundancy error: warn learners against unnatural literal
    translations like ''Я мию себе''.'
  - 'Cultural Hook: The ''Apology'' Logic — contrast the self-centered ''Вибачаюсь''
    (I excuse myself) with the polite and correct ''Вибачте''.'
- section: 'Відмінювання: Теперішній час (Conjugation: Present Tense)'
  slug: conjugation-present-tense
  words: 350
  points:
  - 'Explain the core phonetic rule: use -ся after consonants (він миється) and -сь
    after vowels (я миюсь).'
  - Present the full present-tense conjugation paradigm using the high-frequency verb
    'дивитися'.
  - 'Highlight pronunciation: emphasize that the ''-ться'' ending is pronounced as
    a long soft [ц'':а], a distinct phonetic marker of Ukrainian.'
  - Provide secondary conjugation drills using 'вчитися' to build automaticity without
    introducing past or future tenses.
- section: Семантичні групи та щоденна рутина (Semantic Groups and Daily Routine)
  slug: semantic-groups-daily-routine
  words: 350
  points:
  - 'Type 1 (True Reflexive): Introduce daily routine verbs like ''вмиватися'' and
    ''одягатися'' to prepare for module a1-38.'
  - 'Type 2 (Reciprocal): Explain verbs involving mutual action, such as ''зустрічатися''
    and ''вітатися'', where -ся means ''each other''.'
  - 'Type 3 (Lexicalized): Cover verbs that are always reflexive like ''сміятися''
    and ''подобатися'', noting the correct preposition usage (''сміятися з'').'
  - Clarify agent confusion by contrasting the transitive 'називати' (to name something)
    with the reflexive 'називатися' (to be called).
- section: Підсумок і перевірка (Summary and Self-Check)
  slug: summary-and-self-check
  words: 250
  points:
  - Recap the grammatical rules for choosing between -ся and -сь based on the preceding
    letter.
  - 'Summarize the three main semantic functions: self-directed action, reciprocal
    action, and lexicalized verbs.'
  - Reinforce the critical [ц':а] pronunciation rule for the -ться ending.
  - 'Provide 4 self-check questions: 1) How do you say ''I wash myself''? 2) Why is
    ''Вибачаюсь'' impolite? 3) How do you pronounce ''він вчиться''? 4) When do we
    use -сь instead of -ся?'
