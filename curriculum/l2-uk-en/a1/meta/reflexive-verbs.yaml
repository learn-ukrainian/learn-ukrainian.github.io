slug: reflexive-verbs
title: Reflexive Verbs (-ся)
word_target: 2000
content_outline:
- section: 'Розминка: Що таке зворотні дієслова?'
  words: 300
  points:
  - 'Analogy: Use the ''mirror'' concept to explain how -ся reflects action back to
    the subject (мити vs митися)'
  - 'Etymology: Briefly explain -ся as a contraction of себе (self) to ground the
    logic'
  - 'Redundancy Alert: Explicitly warn against saying ''Я мию себе'' (The Myself Redundancy)'
  - 'Scaffolding: Use clear English to introduce the concept of reflexivity before
    diving into forms'
- section: 'Теорія: Відмінювання та групи'
  words: 700
  points:
  - 'Euphony Rule: -ся after consonants, -сь after vowels (The Golden Rule)'
  - 'Conjugation Table: Full present tense paradigm for ''дивитися'' and ''вмиватися''
    (Standard alignment)'
  - 'Type 1 (True Reflexive): Routine verbs (вмиватися, одягатися) with collocations
    (холодною водою, тепло)'
  - 'Type 2 (Reciprocal): Social verbs (зустрічатися, цілуватися) — action shared
    between two people'
  - 'Type 3 (Lexicalized): Verbs where -ся changes meaning (сміятися, дивитися, подобатися)'
  - 'Preposition Check: Teach ''сміятися з'' (laugh from) explicitly to prevent ''laugh
    at'' error'
- section: 'Практика: Дія на себе чи на іншого?'
  words: 600
  points:
  - 'Contrast Pairs: Direct comparison of transitive vs reflexive (мити посуд vs митися;
    одягати ляльку vs одягатися)'
  - 'Selection Drill: Scenarios requiring choice between -ся and -сь forms based on
    ending'
  - 'Contextual Usage: High-frequency sentences with ''вчитися'' vs ''вчити'' (studying
    vs teaching/learning object)'
  - 'Identification: Spotting reflexive verbs in short simple sentences'
- section: 'Культура: Секрети вимови'
  words: 400
  points:
  - 'Phonetic Drill: The [ц'':а] sound for -ться endings — the ''softness'' marker
    of Ukrainian'
  - 'Logic in Etiquette: The ''Вибачаюсь'' vs ''Вибачте'' distinction — why ''excusing
    oneself'' is illogical'
  - 'Daily Life: How reflexive verbs encode the Ukrainian focus on self-reliance in
    routine (hardening with cold water)'
  - 'Summary: Recap of conjugation rules and the reflexive concept'
