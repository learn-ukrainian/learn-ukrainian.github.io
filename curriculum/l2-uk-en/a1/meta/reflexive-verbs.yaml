slug: reflexive-verbs
title: Reflexive Verbs (-ся)
word_target: 3000
content_outline:
- section: 'Розминка: Повернення дії на себе'
  words: 200
  points:
  - 'Concept: Introduce ''-ся'' as a mirror reflecting the action back to the subject
    (мити vs митися)'
  - 'Etymology: Explain ''-ся'' as a contraction of ''себе'' (self)'
  - 'Scaffolding: Use clear English analogies for reflexive actions (English scaffolding
    required)'
  - 'Visual: The ''Mirror'' analogy to explain the concept'
  - 'Context: Brief intro to daily routine scenarios where these verbs are essential'
- section: 'Презентація: Правила вживання та відмінювання'
  words: 230
  points:
  - 'Phonetics: Rule for ''-ся'' (after consonants) vs ''-сь'' (after vowels) with
    mnemonic'
  - 'Conjugation: Full table for ''вмиватися'' (Type 1) with English translation for
    each form'
  - 'Classification: Define True Reflexive (одягатися), Reciprocal (вітатися), and
    Lexicalized (сміятися)'
  - 'Scaffolding: Explicitly contrast transitive and reflexive pairs (мити plate vs
    митися self)'
  - 'Grammar: Structural rule for suffix placement at the very end of the word'
- section: 'Практика: Відмінювання та вправи'
  words: 200
  points:
  - 'Drill: Conjugation exercises for high-frequency verbs (одягатися, вчитися)'
  - 'Error Correction: Address the ''Myself'' redundancy error (Я мию себе -> Я миюся)'
  - 'Choice: Exercises on selecting ''-ся'' vs ''-сь'' based on the stem ending'
  - 'Pairs: Matching transitive verbs with their reflexive counterparts'
  - 'Application: Simple sentence construction with ''називатися'''
- section: 'Культурний аспект: Вимова та контекст'
  words: 200
  points:
  - 'Pronunciation: The ''-ться'' = [ц'':а] rule (Soft buzzing sound) - Critical accent
