slug: at-the-market
title: At the Market
word_target: 1900
content_outline:
- section: 'Український ринок: більше ніж магазин'
  words: 144
  points:
  - 'Відмінність базару від супермаркету: живе спілкування та можливість скуштувати'
  - 'Культові ринки України: Бессарабський ринок у Києві (архітектура, сало)'
  - 'Легендарний Привоз в Одесі: гумор, історія та ''одеська мова'''
  - 'Чому українці люблять ринки: пошук ''домашнього'' та ''свіжого'''
- section: 'Основні фрази: ціна та вага'
  words: 330
  points:
  - 'Одиниці виміру: кілограм, пів кілограма, 200 грам, пучок (для зелені), штука'
  - 'Граматичний фокус (Scaffolded): Конструкція ''кілограм + чого?'' (Genitive endings
    overview)'
  - 'Запитання про ціну: ''Скільки коштує?'', ''По скільки?'', ''Яка ціна?'''
  - 'Ввічливі прохання: ''Дайте, будь ласка...'', ''Зважте мені...'', ''Можна спробувати?'''
  - 'Опис якості товару: свіжий, солодкий, стиглий, домашній'
  - 'Елементи торгу: ''А дешевше буде?'', ''Зробіть знижку'''
- section: 'Практика: купуємо свіжі продукти'
  words: 175
  points:
  - 'Діалог 1: Купівля овочів (акцент на ''зважте кілограм картоплі'')'
  - 'Діалог 2: Вибір фруктів (акцент на ''спробуйте, дуже солодкі'')'
  - 'Діалог 3: Розрахунок та здача (акцент на ''скільки з мене?'', ''ваша здача'')'
  - 'Типова помилка: правильне вживання закінчень після цифр (два кілограми vs п''ять
    кілограмів)'
- section: 'Атмосфера базару: історія та сьогодення'
  words: 144
  points:
  - 'Сенсорний досвід: запахи солінь, яскраві кольори овочів, гумін натовпу'
  - 'Типові фрази продавців: ''Беріть, не пошкодуєте!'', ''Для себе чи на продаж?'''
  - Концепція 'свого продавця' та довіри на ринку
  - Короткий нарис про похід на ринок як традицію вихідного дня
