slug: at-the-market
title: At the Market
word_target: 2000
content_outline:
- section: 'Вступ: Культура українського ринку'
  words: 400
  points:
  - Intro to the Ukrainian 'bazar' vs. 'supermarket' — atmosphere, freshness, interaction.
  - 'Cultural Spotlight 1: Bessarabskyi Rynok (Kyiv) — history (1912), architecture,
    status.'
  - 'Cultural Spotlight 2: Pryvoz (Odesa) — humor, bargaining, ''tasting'' tradition.'
  - 'Why Ukrainians love markets: ''svizhe'' (fresh), ''domashnie'' (homemade), engaging
    with vendors.'
- section: 'Лексика та Граматика: Як купувати?'
  words: 600
  points:
  - 'Core Vocab: Units of measurement (кілограм, грам, пучок, штука). Visual aid for
    ''пучок'' (bunch).'
  - 'Grammar Lite: The ''Kilogram'' Pattern. Formula: Number + Unit + Noun (Genitive).
    Examples: ''кілограм картоплі'', ''два кілограми яблук''.'
  - 'Asking Price: ''Скільки коштує?'' vs ''По скільки?'' (colloquial for price per
    unit). ''Скільки з мене?'' (Total).'
  - 'Quality Adjectives: ''свіжий'', ''солодкий'', ''смачний'', ''стиглий'' (ripe).
    Collocations table.'
- section: 'Практика: Діалоги на ринку'
  words: 600
  points:
  - 'Polite Requests: ''Дайте, будь ласка...'', ''Зважте, будь ласка...'' (Weigh,
    please), ''Можна...?''.'
  - 'Dialogue 1: Vegetables. Buying potatoes and ''greenery'' (зелень/пучок). Focus
    on quantities.'
  - 'Dialogue 2: Fruits. Buying apples and tasting them (''Можна спробувати?''). focus
    on adjectives.'
  - 'Dialogue 3: Payment & Haggling. Simple polite bargaining (''А дешевше?''). Terminology:
    ''здача'' (change), ''готівка'' (cash), ''картка'' (card).'
- section: 'Історія: Мій похід на Привоз'
  words: 400
  points:
  - Narrative from the Persona's perspective (Teacher sharing a story).
  - 'Setting the scene: Noise, smells, colors of Odesa''s Pryvoz.'
  - Interaction with a charismatic vendor (Auntie Sonia type character).
  - 'The purchase: Getting the best ''domashniy syr'' (homemade cheese) or fruit through
    conversation.'
  - 'Conclusion: The market is about people, not just food.'
