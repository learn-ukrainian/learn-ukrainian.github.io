slug: at-the-market
title: At the Market
word_target: 1200
content_outline:
- section: Вступ та культура
  words: 500
  points:
  - 'Створення атмосфери: пояснення концепції українського ринку (базару) з використанням
    англійської мови для культурного контексту (English scaffolding required for A1).'
  - 'Культурний фокус: опис легендарного одеського Привозу (заснований у 1827 р.,
    відомий гумором) та історичного Бессарабського ринку в Києві (1912 р., стиль модерн).'
  - 'Традиція «Спробуйте!»: пояснення важливості дегустації товару перед покупкою
    як основи довіри між продавцем і покупцем.'
- section: Презентація лексики та граматики
  words: 600
  points:
  - 'Введення базової лексики: кілограм, грам, штука, пучок, овочі, фрукти. Обов''язкове
    використання таблиць з англійським перекладом та IPA для першої появи слова.'
  - 'Граматика як лексичні блоки: презентація конструкції «кілограм + родовий відмінок»
    (напр., «кілограм картоплі», «кілограм яблук») як сталих фраз без заглиблення
    в теорію відмінків.'
  - 'Ввічливі форми та ціна: введення фраз «Дайте, будь ласка», «Можна...», «Скільки
    коштує?», «Скільки з мене?» з англійськими відповідниками.'
- section: Мовні помилки та практика
  words: 450
  points:
  - 'Корекція типової помилки з вагою: чітке порівняння неправильного «Кілограм картопля»
    та правильного «Кілограм картоплі».'
  - 'Відмінювання після числівників: пояснення різниці між «Два кілограми» (називний
    відмінок множини для 2-4) та «П''ять кілограмів».'
  - 'Лексичний нюанс: розрізнення слів «здача» (change) та «решта» (the rest), з фокусом
    на фразах «без здачі» та «візьміть здачу».'
- section: Діалоги та рольові ігри
  words: 450
  points:
  - 'Мінідіалог 1: купівля овочів на вагу. Демонстрація ввічливих запитів («кілограм
    помідорів») та дізнавання загальної вартості.'
  - 'Мінідіалог 2: жвава сцена на Привозі. Купівля фруктів, дегустація («Можна спробувати?»)
    та легкий торг («А дешевше можна?»).'
  - 'Інтерактивна рольова гра: керований сценарій для студента в ролі покупця, інтеграція
    всіх одиниць виміру та фраз у цілісний контекст.'
