slug: the-living-verb-ii
title: The Living Verb II
word_target: 1200
content_outline:
- section: 'Вступ: Тріада гостинності (Introduction: The Triad of Hospitality)'
  slug: introduction-triad-of-hospitality
  words: 200
  points:
  - Introduce Second Conjugation (Class II) verbs ending in -ити.
  - 'Connect to the cultural ''Triad of Hospitality'': їсти (to eat), пити (to drink),
    говорити (to speak).'
  - Briefly contrast with Class I (-ати) verbs learned previously.
- section: 'Презентація: Моделі та закінчення (Presentation: Paradigms and Endings)'
  slug: presentation-paradigms-and-endings
  words: 250
  points:
  - 'Introduce regular endings: -ю/-у, -иш, -ить, -имо, -ите, -ять/-ать.'
  - 'Compare visually: Class I (читати - є/е) vs. Class II (говорити - и/і).'
  - Provide full conjugation tables for 'говорити' and 'вчити'.
- section: 'Презентація: Мутації приголосних (Presentation: Consonant Mutations)'
  slug: presentation-consonant-mutations
  words: 350
  points:
  - Explain that mutations only happen in the 'я' (I) form for these verbs.
  - 'Labial + L: ''робити'' (я роблю), ''любити'' (я люблю). Connect ''любити'' to
    ''люди''.'
  - 'Dental changes: ''ходити'' (я ходжу), ''сидіти'' (я сиджу).'
  - 'Sibilant changes: ''просити'' (я прошу), ''платити'' (я плачу).'
- section: 'Презентація: Неправильні дієслова (Presentation: Irregular Verbs)'
  slug: presentation-irregular-verbs
  words: 150
  points:
  - Explicitly teach the conjugation of 'їсти' (я їм, ти їси...) and 'пити' (я п'ю,
    ти п'єш...).
  - Clarify the difference between 'бачити' (to see - faculty) and 'дивитися' (to
    watch - process).
- section: 'Практика: Типові помилки (Practice: Common Errors)'
  slug: practice-common-errors
  words: 150
  points:
  - Contrastive examples to prevent Conjugation Mixing (e.g., 'робиш', NOT 'робеш').
  - Focus on 'Я'-form drills to eliminate omission errors (e.g., 'ходжу', NOT 'ходю';
    'їм', NOT 'їджу').
- section: Підсумок (Summary)
  slug: summary
  words: 100
  points:
  - Recap the key vowel difference between Class I and Class II verbs.
  - 'Self-check question 1: How do you say ''I love'' and ''I do'' in Ukrainian?'
  - 'Self-check question 2: What is the ''я'' form of ''ходити''?'
  - 'Self-check question 3: How do you conjugate the verb ''їсти''?'
