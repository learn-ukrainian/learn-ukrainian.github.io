slug: the-living-verb-ii
title: The Living Verb II
word_target: 2000
content_outline:
- section: 'Вступ: Тріада гостинності'
  words: 400
  points:
  - Define the Second Conjugation (-ити) as the second pillar of Ukrainian verbal
    action, focusing on ongoing and habitual meanings.
  - 'Establish the Cultural Motivator: The ''Triad of Hospitality'' (їсти, пити, говорити)
    forming the core of Ukrainian social interaction.'
  - 'ENGLISH POLICY: Provide explicit English scaffolding to anchor the module, reviewing
    the difference between Class I and Class II verbs.'
- section: 'Презентація: Моделі та мутації'
  words: 650
  points:
  - 'Compare paradigms visually: Class I (-ати, vowel е/є) versus Class II (-ити,
    vowel и/і), using ''читати'' vs ''говорити''.'
  - Explain consonant mutation for the 'Я' form using 'сидіти' (я сиджу), directly
    addressing State Standard §4.2.4.1.
  - Frame the 'Labial L' ('робити' → 'я роблю', 'любити' → 'я люблю') as a natural
    physical bridge for lip consonants before 'ю'.
  - Introduce the irregulars 'їсти' (я їм) and 'пити' (я п'ю), contrasting 'бачити'
    (faculty) with 'дивитися' (process) to prevent early semantic confusion.
- section: 'Практика: Помилки та автоматизація'
  words: 500
  points:
  - Detail contrastive drills to prevent Conjugation Mixing, explicitly warning against
    the common error 'ти робеш' instead of 'ти робиш'.
  - Focus on Mutation Mastery with intensive 'Я'-form drills for verbs like 'ходити'
    (ходжу) to eliminate omission errors like 'я ходю'.
  - Include structural sorting exercises to build learner intuition for vowel patterns
    in endings.
- section: Продукування та культурний контекст
  words: 450
  points:
  - Guide contextual sentence production using high-frequency collocations ('робити
    домашнє завдання', 'любити природу', 'говорити українською').
  - 'Deep Culture: Explain the etymology of ''любити'' and its connection to ''люди''
    (people) and human belonging.'
  - 'Discuss the social ethics of hospitality: the cultural weight of ''їсти'' and
    ''пити'' in hosting, and how refusing a meal is perceived.'
