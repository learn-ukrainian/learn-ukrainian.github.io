slug: the-living-verb-ii
title: The Living Verb II
word_target: 2000
content_outline:
- section: 'Вступ: Родина -ити'
  words: 250
  points:
  - Introduce the concept of 'Second Conjugation' (-ити verbs) as the second major
    family of Ukrainian verbs.
  - 'Contrast with First Conjugation (-ати) using a simple visual hook: A vs I (Hard
    vs Soft).'
  - 'List the ''Star Verbs'' of this lesson: говорити, робити, любити, бачити.'
  - 'ENGLISH POLICY: Use English to clearly explain that these verbs work exactly
    like the previous ones, just with a different vowel vowel in the ending.'
- section: 'Презентація: Друга дієвідміна'
  words: 800
  points:
  - 'Visual Paradigm: Side-by-side comparison of ''читати'' (Type 1) vs ''говорити''
    (Type 2).'
  - 'The Golden Rule of Type 2: The dominating vowel is ''И'' (or ''І'' after vowels),
    replacing ''Е/Є''.'
  - 'Step-by-step conjugation of ''говорити'': я говорю, ти говориш, він говорить...'
  - 'The ''Labial L'' phenomenon: Explain ''роблю'', ''люблю'' as a natural bridge
    for lip sounds (б, п, в, м, ф) before -ю.'
  - 'Consonant Mutations (The ''Hisss'' Rule): Explain ''сидіти'' → ''сиджу'' (д →
    дж) and ''ходити'' → ''ходжу'' as a softening for the ''Я'' form.'
  - 'Bonus Irregulars: Introduce ''їсти'' (я їм, ти їси...) and ''пити'' (regular:
    п''ю, п''єш) with caution signs.'
- section: 'Практика: Тренування форм'
  words: 450
  points:
  - 'Drill 1: ''Identification'' — Is it Type 1 (-ати/-яти) or Type 2 (-ити/-іти)?
    Sorting exercise.'
  - 'Drill 2: ''The I-Form Challenge'' — Focus specifically on mutations (сиджу, ходжу,
    їжджу, плачу).'
  - 'Drill 3: ''Conjugation Grid'' — Full table practice for high-frequency verbs
    (робити, бачити).'
  - 'Common Error Alert: Explicitly warn against ''ти робеш'' (It''s ''робиш''!).'
- section: 'Використання: Розповіді про дії'
  words: 300
  points:
  - 'Sentence Building: Combine subject + verb + object (e.g., ''Я люблю каву'', ''Ми
    робимо піцу'').'
  - 'Collocations: Introduce fixed phrases like ''робити помилки'' (to make mistakes),
    ''говорити правду'' (to tell the truth).'
  - 'Dialogue scaffolding: A short Q&A structure asking ''Що ти робиш?'' and answering
    with various verbs.'
- section: 'Культурний контекст: Глибина слова'
  words: 200
  points:
  - 'Etymology: The deep connection between ''любити'' (to love) and ''люди'' (people).'
  - 'Historical Note: The -ити class is ancient (Proto-Slavic), showing how stable
    this pattern has been for over a millennium.'
  - 'Hospitality Triad: Mention how ''їсти, пити, говорити'' are the core of Ukrainian
    guest culture.'
