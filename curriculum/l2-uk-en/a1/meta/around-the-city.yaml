slug: around-the-city
title: Around the City
word_target: 1200
content_outline:
- section: 'Вступ: Міський простір'
  words: 400
  points:
  - 'Scaffolding notice: Use English scaffolding to establish the core concepts of
    urban navigation before transitioning to Ukrainian dialogues.'
  - 'Cultural Hook: Contrast the architectural «Площа» with the community-centric
    «Майдан», highlighting the civic significance of the latter.'
  - 'Core Concept: Define the difference between seeking a location («Де знаходиться...?»)
    and seeking a route («Як дістатися до...?»).'
- section: 'Презентація: Граматика та напрямки'
  words: 600
  points:
  - 'Locative Prepositions: Contrast «на» (open spaces/infrastructure: зупинці, пошті,
    площі) with «в» (enclosed buildings: аптеці), explicitly addressing common learner
    errors.'
  - 'Directional Vocabulary: Provide clear definitions and examples for «прямо», «наліво/ліворуч»,
    and «направо/праворуч».'
  - 'Grammar of Motion: Contrast static location «Де» (Locative) with movement towards
    a goal «Куди» (Accusative) as per State Standard §4.2.3.2/3.'
  - 'Genitive Chunks: Introduce «біля» and «навпроти» as fixed lexical blocks requiring
    the Genitive case (біля аптеки), without teaching the full case paradigm.'
- section: 'Практика: Орієнтування за мапою'
  words: 600
  points:
  - 'Landmark Navigation: Present a mini-dialogue demonstrating how Ukrainians navigate
    using landmarks instead of cardinal directions.'
  - 'Де vs Куди Drill: Include a guided narrative requiring the learner to distinguish
    between static presence and directional motion.'
  - 'Preposition Selection: Create a scenario (e.g., meeting a friend) focusing on
    selecting the correct preposition (в/на) for various city locations.'
- section: 'Культура та Продакшн: Життя в місті'
  words: 400
  points:
  - 'Transport Culture: Explain the necessity and etiquette of shouting «На зупинці,
    будь ласка!» in a marshrutka, reinforcing the Locative case.'
  - 'Roleplay Setup: Design the ''Lost Tourist'' scenario where the learner must combine
    landmarks, directions, and prepositions to guide someone to their home or a café.'
