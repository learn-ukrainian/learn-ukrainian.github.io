slug: emergencies
title: Emergencies
word_target: 2000
content_outline:
- section: Вступ
  words: 400
  points:
  - Provide English scaffolding to introduce the basic call «Допоможіть!» based on
    State Standard §1.3.2.
  - 'Present emergency services in Ukraine: mention the unified number 112 (euro-integration
    symbol) and connect it to 101 (пожежники), 102 (поліція), 103 (швидка допомога).'
- section: Презентація
  words: 650
  points:
  - 'Introduce the Vocative Case (кличний відмінок) specifically for emergency address
    forms: drill «Лікарю!», «Поліціє!», «Рятувальники!».'
  - Explain with English scaffolding the semantic difference between «дзвонити» (dialing)
    and «викликати» (summoning).
  - Include a learner error check fixing the Russism «визивати» to the normative «викликати
    швидку».
  - 'Provide simple phrases for location and problem descriptions: «Я біля метро»,
    «Сталася аварія».'
- section: Практика
  words: 600
  points:
  - 'Dialogue Scenario 1: A phone call to a 112 dispatcher reporting a car accident
    (ДТП) and witnesses.'
  - 'Dialogue Scenario 2: Speaking with a police officer about lost or stolen documents
    («пред’явити документи», «подати заяву»).'
  - 'Drill imperative polite requests (State Standard §4.2.4.2): «Скажіть, будь ласка»,
    «Дайте, будь ласка».'
- section: Виробництво та підсумок
  words: 350
  points:
  - 'Role-play task: simulate an embassy dialogue for recovering lost documents and
    writing a simple statement.'
  - Add a cultural context box reviewing the digital tools «Дія» and «єДопомога».
  - 'Final rapid-fire drilling: quick responses to dispatcher questions on location
    and danger type.'
