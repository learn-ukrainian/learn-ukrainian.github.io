slug: emergencies
title: Emergencies
word_target: 2000
content_outline:
- section: Вступ
  words: 400
  points:
  - 'Provide English scaffolding to introduce the fundamental concept of asking for
    help: «Допоможіть!».'
  - 'Cultural anchor: Explain the unified emergency number 112 as a symbol of Ukraine''s
    European integration, connecting it to traditional numbers 101 (пожежники), 102
    (поліція), and 103 (швидка допомога).'
  - Provide a clear breakdown of when to call which specific service versus the unified
    dispatcher.
- section: Презентація
  words: 650
  points:
  - 'Introduce the Vocative Case (кличний відмінок) exclusively for emergency address
    forms with English scaffolding: provide a table and drill examples like «Лікарю!»,
    «Поліціє!», «Рятувальники!».'
  - Differentiate verbs «дзвонити» (dialing a number) and «викликати» (summoning a
    service), explicitly correcting the common Russism «визивати» to normative «викликати
    швидку».
  - 'Provide and breakdown simple sentence structures for identifying location and
    the problem: «Я біля метро», «на розі вулиць», «Сталася аварія».'
- section: Практика
  words: 600
  points:
  - 'Present Scenario 1: A structured mini-dialogue calling a 112 dispatcher to report
    a car accident (ДТП) and mention witnesses (свідки).'
  - 'Present Scenario 2: A dialogue communicating with a police officer about lost
    or stolen documents using phrases like «пред’явити документи» and «подати заяву».'
  - 'Grammar drill: Practice polite imperative requests based on State Standard §4.2.4.2,
    using «Скажіть, будь ласка» and «Дайте, будь ласка».'
- section: Виробництво та підсумок
  words: 350
  points:
  - 'Interactive role-play outline: A simulated dialogue at an embassy for reporting
    lost documents and writing a statement.'
  - 'Cultural Context box: Highlight Ukrainian digital tools like «Дія» and the «112
    Ukraine» app, showcasing technological resilience and accessibility.'
  - 'Final rapid-response drill: Quick translation and matching of dispatcher questions
    and caller responses regarding location and danger.'
