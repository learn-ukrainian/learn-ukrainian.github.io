slug: emergencies
title: Emergencies
word_target: 2000
content_outline:
- section: Вступ
  words: 400
  points:
  - 'Establish English scaffolding (immersion ~40%): Introduce the core goal of asking
    for help («Допоможіть!») fulfilling State Standard §1.3.2.'
  - 'Explain Ukraine''s modern emergency system: the transition to the European 112
    number as a sign of digital progress, alongside 101 (пожежники), 102 (поліція),
    and 103 (швидка допомога).'
  - Provide a simple breakdown in Ukrainian of when to call which specific service
    using basic A1 vocabulary.
- section: Презентація
  words: 650
  points:
  - 'Grammar H3: Introduce the Vocative Case (кличний відмінок) using English theory
    scaffolding. Emphasize it as an elegant feature for direct address. Provide a
    table for emergency roles: Лікарю!, Поліціє!, Рятувальники!.'
  - 'Vocabulary H3: Build a structured table for core emergency terms (швидка допомога,
    небезпека, аварія, лікарня, документи) with IPA on the first occurrence.'
  - 'Lexical Note H3: Explicitly contrast standard «викликати» (to summon) with «дзвонити»
    (to ring). Flag the Russism «визивати» as an incorrect translation.'
  - 'Phrase H3: Provide simple Ukrainian sentence templates (max 8-10 words) for describing
    problems and locations («Я біля метро», «Сталася аварія»).'
- section: Практика
  words: 600
  points:
  - 'Scenario 1 H3: Present a short, structured mini-dialogue demonstrating a call
    to a 112 dispatcher about a car accident (ДТП) and asking for witnesses.'
  - 'Scenario 2 H3: Present a second dialogue with a police officer regarding lost
    documents, focusing on target phrases: «пред''явити документи», «подати заяву».'
  - 'Grammar Drill H3: Provide an English-scaffolded explanation and examples of polite
    imperative requests (State Standard §4.2.4.2) using «Скажіть, будь ласка» and
    «Дайте, будь ласка».'
- section: Виробництво та підсумок
  words: 350
  points:
  - 'Role-play H3: Provide an interactive prompt for a simulated embassy or police
    station dialogue about restoring lost documents.'
  - 'Cultural Insight H3: Feature a [!cultural] box highlighting Ukraine''s «Дія»
    app and its role in digital resilience and emergency support.'
  - 'Summary H3: Conclude with a rapid-response drill mapping common dispatcher questions
    to simple, functional Ukrainian caller responses.'
