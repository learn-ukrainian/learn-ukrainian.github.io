slug: shopping-and-market
title: Shopping and Market
word_target: 1200
content_outline:
- section: Скільки коштує? (How Much?)
  slug: skilky-koshtuie
  words: 275
  points:
  - 'H3: The Core Question. Introduce the verb ''коштувати'' and the essential question
    ''Скільки це коштує?'' with English scaffolding.'
  - 'H3: Money and Numbers. Review number-noun agreement for ''гривня'' (1 гривня,
    2-4 гривні, 5+ гривень) based on rules from A1-17.'
  - 'H3: Examples. Provide basic Q&A examples with food items: ''Скільки коштує борщ?
    — Борщ коштує сімдесят гривень.'''
- section: У магазині (In the Store)
  slug: u-mahazyni
  words: 250
  points:
  - 'H3: Polite Requests. Teach fixed phrases ''Я хочу купити...'' and ''Дайте, будь
    ласка...''. Explicitly note that ''дайте'' is a fixed polite chunk (imperatives
    aren''t taught yet).'
  - 'H3: Checking Availability. Introduce ''У вас є...?'' / ''Є...?''. Contrast with
    the English ''Do you have'' to avoid the common error of using the verb ''мати''.'
  - 'H3: Mini-Dialogue. A simple bilingual shopping flow: greeting, asking for an
    item, asking the price, paying, thanking.'
- section: Кількість та одиниці (Quantities and Units)
  slug: kilkist-ta-odynytsi
  words: 250
  points:
  - 'H3: Measurement Units. Introduce ''кілограм'', ''літр'', ''пачка'', ''пляшка''
    with visual formatting and English translations.'
  - 'H3: Formulaic Genitive. Reinforce chunks like ''літр молока'' or ''пачка цукру''
    (from A1-18), without deep grammar explanations.'
  - 'H3: Numbers with Units. Briefly explain and show case agreement with units (e.g.,
    ''два літри'', ''п''ять кілограмів'').'
- section: Засоби гігієни (Hygiene Products)
  slug: zasoby-hihiieny
  words: 175
  points:
  - 'H3: Essential Vocabulary. Teach ''мило'', ''зубна паста'', ''шампунь'', ''рушник'',
    ''туалетний папір'' as required by the State Standard.'
  - 'H3: Finding Things. Combine hygiene vocabulary with location questions: ''Де
    тут аптека?'', ''Де можна купити мило?''.'
- section: Практика (Practice & Summary)
  slug: praktyka
  words: 250
  points:
  - 'H3: Shopping Role-play. Provide two short bilingual dialogues: one at a store
    (магазин) and one at an outdoor market (ринок).'
  - 'H3: Shopping List Decoding. Present a typical Ukrainian shopping list with quantities
    for reading practice.'
  - 'H3: Self-Check. 3-4 questions verifying the learner''s ability to ask prices,
    use ''У вас є...?'', and understand ''гривня'' agreements.'
