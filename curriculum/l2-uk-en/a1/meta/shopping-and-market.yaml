slug: shopping-and-market
title: Shopping and Market
word_target: 2000
content_outline:
- section: Скільки коштує?
  words: 500
  points:
  - 'H3: English explanation of the verb «коштувати» and the universal question «Скільки
    це коштує?». Explain why we rely on the 3rd person singular «коштує».'
  - 'H3: Review of numbers and the currency «гривня». English scaffolding explaining
    the agreement rules: 1 гривня, 2-4 гривні, 5+ гривень.'
  - 'H3: 5+ bilingual examples showing price questions and answers (e.g., «Скільки
    коштує борщ? — Борщ коштує сімдесят гривень.»).'
  - 'H3: A short, realistic mini-dialogue demonstrating a simple price inquiry.'
- section: У магазині
  words: 400
  points:
  - 'H3: Polite requests. Introduce «Дайте, будь ласка...» and «Я хочу купити...»
    with English context on cultural politeness (directness is polite and natural
    in Ukrainian).'
  - 'H3: Checking availability. Explicitly contrast using «У вас є...?» with the verb
    «мати» to prevent the common learner error of direct translation.'
  - 'H3: Complete transaction dialogue. Provide a full bilingual role-play (greeting
    → asking for item → asking price → paying → thanking) with line-by-line translations.'
- section: Кількість та одиниці
  words: 400
  points:
  - 'H3: Essential units. Introduce «кілограм», «літр», «пачка», «пляшка», «штука»
    with English definitions and examples of typical products for each.'
  - 'H3: Formulaic Genitive chunks. Teach phrases like «кілограм яблук» or «літр молока»
    as fixed chunks to memorize, explicitly referencing the pattern from A1-18.'
  - 'H3: Numbers with units. English explanation of case agreement with units (e.g.,
    «два кілограми» vs «п''ять літрів»), providing a clear reference table.'
- section: Засоби гігієни
  words: 300
  points:
  - 'H3: Essential hygiene vocabulary mandated by the State Standard: «мило», «зубна
    паста», «шампунь», «рушник», «туалетний папір».'
  - 'H3: Asking for locations. Combine shopping skills with location questions: «Де
    можна купити...?», «Де тут аптека?», «Де тут магазин?».'
  - 'H3: Provide 5+ bilingual example sentences demonstrating how to ask for these
    hygiene products in a pharmacy or store setting.'
- section: Практика
  words: 400
  points:
  - 'H3: Dialogue at the market («На ринку»). A realistic role-play incorporating
    greetings, asking for fresh produce quantities, and negotiating price.'
  - 'H3: Dialogue at the store («У магазині»). A role-play focused on finding and
    purchasing hygiene products.'
  - 'H3: Shopping List reading exercise. Present a written shopping list with specific
    quantities (e.g., «2 літри молока, 1 пачка цукру») for learners to decode in context.'
