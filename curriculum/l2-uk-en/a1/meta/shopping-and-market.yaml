slug: shopping-and-market
title: Shopping and Market
word_target: 2000
content_outline:
- section: Скільки коштує?
  words: 500
  points:
  - 'H3: Introduction & Verb. English scaffolding explaining the goal of the module
    and the verb «коштувати». Define the universal question «Скільки це коштує?» and
    explain why we use the 3rd person singular/plural.'
  - 'H3: Currency Agreement. English explanation recalling rules from A1-17: 1 гривня,
    2-4 гривні, 5+ гривень.'
  - 'H3: Examples. 6+ bilingual example sentences showing price questions and answers
    with various food items (e.g., «Скільки коштує хліб? — Хліб коштує двадцять гривень.»).'
- section: У магазині
  words: 400
  points:
  - 'H3: Polite Requests. Introduce «Дайте, будь ласка...» and «Я хочу купити...».
    Explain in English that direct imperatives with «будь ласка» are culturally polite
    in Ukrainian.'
  - 'H3: Availability. Explicitly contrast the natural «У вас є...?» with the English
    ''Do you have?'', warning against using the verb «мати» in this context.'
  - 'H3: Dialogue. A complete bilingual role-play dialogue (greeting → asking for
    item → price → paying → thanking) in a local store.'
- section: Кількість та одиниці
  words: 400
  points:
  - 'H3: Units Vocabulary. Introduce «кілограм», «літр», «пачка», «пляшка», «штука»
    with English definitions and visual formatting.'
  - 'H3: Formulaic Genitive. Connect to A1-18. Teach phrases as fixed chunks (e.g.,
    «кілограм яблук», «літр молока») rather than full grammar rules.'
  - 'H3: Numbers with Units. English explanation of case agreement with units (e.g.,
    «два літри» vs «п''ять літрів»), providing a clear reference table.'
- section: Засоби гігієни
  words: 300
  points:
  - 'H3: Hygiene Vocabulary. Introduce State Standard mandated items: «мило», «зубна
    паста», «шампунь» (explicitly note masculine gender), «рушник», «туалетний папір».'
  - 'H3: Location Questions. Combine shopping with location queries: «Де можна купити...?»,
    «Де тут аптека?».'
  - 'H3: Examples. 5+ bilingual sentences asking for hygiene products or their locations
    in a store.'
- section: Практика
  words: 400
  points:
  - 'H3: На ринку. A realistic bilingual role-play dialogue at the outdoor market,
    asking for fresh produce quantities and paying.'
  - 'H3: В аптеці. A short dialogue focused on finding and purchasing hygiene products.'
  - 'H3: Список покупок (Shopping List). A reading exercise presenting a typical Ukrainian
    shopping list with quantities (e.g., «2 літри молока», «1 пачка масла») for learners
    to decode in context.'
