slug: shopping-and-market
title: Shopping and Market
word_target: 2000
content_outline:
- section: Скільки коштує?
  words: 400
  points:
  - 'Introduce the key question pattern: «Скільки коштує...?» and «Скільки це коштує?».
    Provide a brief English explanation of how the verb «коштувати» works.'
  - Review number-noun agreement with the currency «гривня» (одна гривня, дві/три/чотири
    гривні, п'ять гривень). Remind learners that «гривня» is feminine.
  - Provide 5+ bilingual examples of asking and answering price questions (e.g., «Скільки
    коштує борщ? — Борщ коштує сімдесят гривень.»).
  - Include a short mini-dialogue of a simple price inquiry.
- section: У магазині
  words: 400
  points:
  - 'Introduce polite request patterns: «Дайте, будь ласка...», «Я хочу купити...»,
    and «Можна...?» with English scaffolding.'
  - Explain how to check availability using «У вас є...?» or just «Є...?». Explicitly
    contrast this with using the verb «мати» to prevent common learner errors.
  - Present a complete shopping transaction dialogue (greeting → asking for item →
    asking price → paying → thanking) with line-by-line translations.
- section: Кількість та одиниці
  words: 500
  points:
  - 'Introduce essential units of measurement: «кілограм», «літр», «пачка», «пляшка»,
    «штука». Explain in English how they are used for different products.'
  - 'Teach formulaic Genitive chunks: «кілограм яблук», «літр молока», «пачка цукру»,
    «пляшка води». Explicitly instruct learners to memorize these as fixed phrases
    without diving into grammatical case rules.'
  - 'Explain combining numbers with units: «два кілограми», «п''ять літрів». Provide
    a clear reference table.'
  - Include a mini-dialogue at the «ринок» demonstrating the use of these quantities.
- section: Засоби гігієни
  words: 300
  points:
  - 'Introduce essential hygiene vocabulary required by the State Standard: «мило»,
    «зубна паста», «шампунь», «рушник», «туалетний папір».'
  - 'Teach how to ask where to buy items: «Де можна купити...?», «Де тут аптека?»,
    «Де тут магазин?».'
  - Provide 5+ example sentences combining location questions and hygiene vocabulary.
- section: Практика
  words: 400
  points:
  - Provide 2 realistic shopping role-play dialogues (one at a «магазин», one at a
    «ринок»), incorporating greetings, quantities, and prices.
  - Include a «Shopping List» reading exercise where learners see items written out
    with specific quantities and must understand the context.
  - Wrap up with a summary table of the most important shopping phrases (Дайте, будь
    ласка / Скільки коштує / У вас є).
