slug: at-the-store
title: At the Store
word_target: 2000
content_outline:
- section: 'Український супермаркет: більше ніж просто покупки'
  words: 300
  points:
  - 'Introduction to the concept of themed supermarkets in Ukraine (Silpo example:
    GTA, Steampunk).'
  - 'Cultural note: Grocery shopping as an experience, not just a chore.'
  - 'Vocabulary: магазин vs супермаркет vs гіпермаркет.'
  - 'Immersion Note: English bridging required for cultural context.'
- section: Відділи та товари
  words: 400
  points:
  - 'Major departments: молочний, м''ясний, хлібний, кондитерський.'
  - 'Collocation drill: ''У якому відділі...?'' (In which department...?).'
  - 'Visual aid: Map of a supermarket with labels.'
  - 'Grammar hint: Locative case in simple ''in the...'' phrases (у відділі).'
- section: 'Пошук і допомога: де знаходиться...?'
  words: 400
  points:
  - 'Key question structures: ''Де знаходиться...?'' and ''Скажіть, будь ласка, де...?''.'
  - 'Politeness markers: ''Вибачте'', ''Підкажіть'', ''Будь ласка''.'
  - 'Common learner error: Confusion between ''знаходиться'' (is located) and ''знаходить''
    (finds).'
  - 'Dialogue snippet: Asking a store employee for directions.'
- section: 'На касі: пакет, картка і чек'
  words: 500
  points:
  - 'The ''Bag Ritual'': ''Пакет потрібен?'' - variations and responses.'
  - 'Payment methods: ''Готівкою чи карткою?'' (taught as set phrases).'
  - 'The Receipt (Чек): Cultural hook about predictions on receipts.'
  - 'Dialogue: A full checkout interaction from greeting to goodbye.'
  - 'Grammar focus: Accusative case for direct objects (Я купую воду, каву).'
- section: Акції та знижки
  words: 250
  points:
  - 'Understanding price tags: ''Акція'', ''Знижка'', ''Ціна тижня''.'
  - 'Asking about price: ''Скільки коштує?'' vs ''Яка ціна?''.'
  - 'Dealing with problems: ''Ціна неправильна'' or ''Товар пробився двічі''.'
  - 'Collocations: ''акційна ціна'', ''картка лояльності''.'
- section: 'Практика: У супермаркеті'
  words: 100
  points:
  - 'Dialogue 1: Finding item.'
  - 'Dialogue 2: Payment.'
  - 'Dialogue 3: Returning item.'
- section: 'Читання: Андрій у магазині'
  words: 200
  points:
  - 'Narrative text about a shopping trip.'
  - 'Comprehension check.'
- section: 'Підсумок: ваш похід у магазин'
  words: 150
  points:
  - 'Narrative summary: A story about a successful shopping trip using all learned
    phrases.'
  - 'Final checklist: Can you find departments? Ask for help? Pay at the checkout?'
  - 'Review of key vocabulary: відділ, каса, чек, пакет.'
