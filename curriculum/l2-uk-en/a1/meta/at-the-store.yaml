slug: at-the-store
title: At the Store
word_target: 1200
content_outline:
- section: Вступ
  words: 300
  points:
  - 'Provide English scaffolding to introduce the cultural hook: ''Сільпо'' themed
    supermarkets as a uniquely Ukrainian, immersive retail experience.'
  - Introduce the 'Bag Ritual' (Пакет потрібен?) as a high-frequency, essential communicative
    script for every checkout interaction.
  - 'Explicitly outline the practical learning goals: navigating store departments,
    finding essential items, and successfully completing a purchase.'
- section: Презентація
  words: 600
  points:
  - Create an H3 for store departments (молочний, м'ясний, хлібний) using English
    scaffolding; introduce the collocation 'у якому відділі?' (Locative context).
  - 'Create an H3 for navigation phrases: teach ''Де знаходиться...?'' and polite
    requests ''Вибачте, де тут...'' with clear examples.'
  - Create an H3 explaining the Accusative case for direct objects (об'єкт дії). Include
    a clear paradigm table highlighting the -у/-ю endings for feminine nouns (кава,
    вода) and emphasizing Acc=Nom for inanimate masculines.
  - Create an H3 for checkout vocabulary, explicitly teaching 'карткою' and 'готівкою'
    as fixed lexical chunks to memorize without introducing full Instrumental case
    theory.
- section: Практика
  words: 500
  points:
  - 'Include a focused contrast drill (with English scaffolding) to distinguish between
    destination (Accusative: ''іти в магазин'') and location (Locative: ''бути в магазині'').'
  - Provide an engagement callout establishing 'закупи' as the authentic term for
    a shopping trip, implicitly preventing the Surzhyk 'покупка'.
  - Add a targeted practice exercise on gender agreement for direct objects, reinforcing
    phrases like 'ця ціна' (fem), 'ця каса', 'ця знижка'.
  - Include a specific drill correcting the inanimate masculine Accusative over-correction,
    ensuring learners confidently produce 'купую сир/хліб' rather than using incorrect
    animate endings.
- section: Продукція
  words: 400
  points:
  - 'Draft a realistic shopping dialogue: finding grocery items (хліб, овочі) and
    asking a store clerk for location and price.'
  - 'Draft a complete checkout scenario dialogue: responding to the ''Пакет потрібен?''
    ritual, presenting a ''картка на знижку'', and selecting a payment method.'
  - 'Include a troubleshooting mini-scenario for consumer self-advocacy: politely
    stating ''Ця ціна неправильна'' and requesting ''Чек, будь ласка''.'
- section: Підсумок
  words: 200
  points:
  - Highlight the delightful cultural tradition of 'Передбачення на чеках' (Predictions
    on receipts) as an engaging, real-world reading application.
  - Provide a concise summary checklist of high-frequency collocations learned (акційна
    знижка, черга до каси, ціна за кілограм).
  - Recap the main communicative achievements, reinforcing the learner's readiness
    to independently navigate a Ukrainian supermarket.
