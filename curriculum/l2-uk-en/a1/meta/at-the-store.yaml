slug: at-the-store
title: At the Store
word_target: 1750
content_outline:
- section: 'Вступ: Світ українського супермаркету'
  words: 130
  points:
  - 'Intro: Welcome from the Supermarket Manager persona; emphasize the visual experience
    (Silpo themes)'
  - 'Vocabulary: Basics of equipment (візок vs кошик) and entry (вхід)'
  - 'Departments: List key sections (молочний, м''ясний, хлібний, овочевий) with visuals'
  - 'Grammar Preview: Briefly mention we are going ''into'' (в/у) these sections'
- section: 'Основна частина: Навігація, товари та каса'
  words: 310
  points:
  - 'Navigation: Phrases for ''Where is...?'' (Де знаходиться...?, У якому відділі...?)'
  - 'Grammar Focus: Accusative case for direction (Іду в магазин) vs Object (Купую
    каву)'
  - 'Common Error: ''Магазин'' (inanimate masc = nom) vs ''Каву'' (fem -у ending)'
  - 'At the Checkout: The ritual phrase ''Пакет потрібен?'' and payment options (готівка/картка)'
  - 'Promotions: Vocabulary for ''знижка'', ''акція'', ''ціна'' on the shelf'
  - 'The Receipt: Vocabulary ''чек'' and the cultural tradition of predictions on
    receipts'
- section: 'Практика: Типові ситуації'
  words: 185
  points:
  - 'Dialogue 1: Asking a staff member for location of specific items (using Accusative)'
  - 'Dialogue 2: Full checkout interaction (Bag question, loyalty card, payment)'
  - 'Dialogue 3: Resolving a small issue (Price check or weighing vegetables)'
  - 'Interactive Element: Short checklist of phrases to memorize'
- section: 'Закріплення: Культура споживання'
  words: 125
  points:
  - 'Narrative: A short story of a successful shopping trip integrating all new terms'
  - 'Lexical Note: Distinction between ''Купівля'' (process) vs ''Покупка'' (avoiding
    surzhyk)'
  - 'Cultural Closing: Why Ukrainians value the market vs supermarket experience'
  - 'Final Encouragement: Next time you shop, try naming items in Ukrainian'
