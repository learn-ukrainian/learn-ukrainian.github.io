slug: at-the-store
title: At the Store
word_target: 2000
content_outline:
- section: Вступ
  words: 300
  points:
  - 'Provide English scaffolding to introduce the cultural hook: ''Silpo'' themed
    supermarkets as a unique, immersive Ukrainian retail experience.'
  - Introduce the 'Bag Ritual' — the ubiquitous 'Пакет потрібен?' interaction as an
    essential, high-frequency communicative script.
  - 'Explicitly outline the goals: navigating a store, finding items, and successfully
    completing a checkout.'
- section: Презентація
  words: 600
  points:
  - Create an H3 for store departments (молочний, м'ясний, хлібний) and introduce
    the collocation 'у якому відділі?' (Locative context).
  - Create an H3 for location questions ('Де знаходиться...?') and polite requests
    for help ('Вибачте, де тут...?').
  - Create an H3 explaining Accusative case for shopping items. Use a clear table
    focusing on -у/-ю endings for feminine nouns (кава, вода, олія).
  - Create an H3 for checkout interactions, teaching 'Готівкою чи карткою?' as fixed
    Instrumental phrases to memorize.
- section: Практика
  words: 500
  points:
  - Include a drill contrasting Accusative destination ('іти в магазин') and Locative
    location ('бути в магазині').
  - Provide an engagement callout to establish 'закупи' (shopping trip) as the authentic
    term, avoiding the Surzhyk 'покупка'.
  - Add a practice section for gender agreement with 'ця ціна', 'ця каса', 'ця знижка'.
  - Include a specific drill correcting inanimate masculine Accusative errors (reinforcing
    'купую сир/хліб' instead of the incorrect '-а' ending).
- section: Продукція
  words: 400
  points:
  - 'Draft a dialogue: finding items from a grocery list and asking store clerks for
    the price or location.'
  - 'Draft a full checkout scenario: responding to the bag ritual, using a discount
    card (''картка на знижку''), and selecting a payment method.'
  - 'Include a mini-scenario for resolving a common problem: ''Ця ціна неправильна''
    (This price is wrong) and asking for a receipt (''Чек, будь ласка'').'
- section: Підсумок
  words: 200
  points:
  - Explain the cultural tradition of 'Передбачення на чеках' (Predictions on receipts)
    as a fun closing reading activity.
  - 'Provide a summary checklist of high-frequency collocations: ''акційна знижка'',
    ''черга до каси'', ''ціна за кілограм''.'
  - Recap the main communicative goals to ensure learners feel confident navigating
    a Ukrainian supermarket.
