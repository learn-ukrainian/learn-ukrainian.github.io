slug: my-family
naturalness:
  score: 10
  status: PASS
title: My Family
word_target: 2000
content_outline:
- section: 'Вступ: Моя сім''я'
  words: 400
  points:
  - Use English scaffolding to explain the cultural and semantic difference between
    «сім'я» (nuclear family) and «родина» (extended lineage).
  - 'Create a dedicated H3 to introduce core nuclear family vocabulary: мама, тато,
    брат, сестра, син, донька. Provide IPA only on the first occurrence of each new
    word.'
  - Demonstrate the question «Хто це?» and simple answers (e.g., «Це моя мама») with
    short, clear Ukrainian examples (max 8-10 words) and English translations.
- section: 'Презентація: Близька та розширена родина'
  words: 600
  points:
  - 'Introduce extended family vocabulary in an H3: дідусь, бабуся, дядько, тітка,
    онук, онука.'
  - Provide English scaffolding to explain the possessive construction «У мене є...»
    (I have). Explicitly address and correct the common English calque «Я маю...»,
    establishing «У мене є» as the natural, idiomatic choice.
  - Dedicate an H3 to drill possessive pronoun agreement (мій/моя) with family members.
    Explicitly prevent the «мій сестра» error by emphasizing the matching feminine
    endings.
- section: 'Презентація: Характеристики та стосунки'
  words: 500
  points:
  - 'Introduce terms for spouses: чоловік (husband) and дружина (wife). Use English
    to explain the dual meaning of «чоловік» (man/husband) and clarify why «дружина»
    is the standard neutral term for wife.'
  - Create an H3 showing how to combine family terms with basic adjectives learned
    previously (e.g., добра бабуся, мудрий дідусь).
  - 'Introduce basic age and sibling descriptors: старший брат, молодша сестра, providing
    examples of their use in simple sentences.'
- section: 'Практика: Звертання та спілкування'
  words: 500
  points:
  - Use English scaffolding to introduce the Vocative case (Кличний відмінок) as a
    unique, beautiful feature of Ukrainian for addressing people directly.
  - 'Dedicate an H3 to teach the specific, high-frequency Vocative forms for family
    members: мамо, тату, бабусю, дідусю.'
  - 'Write 2 mini-dialogues demonstrating the difference between talking ABOUT family
    (Nominative: «Це моя мама») vs. talking TO family (Vocative: «Мамо, хто це?»).'
  - Conclude with a short, synthesized reading text describing a family tree, integrating
    possessives, adjectives, and relationship vocabulary.
