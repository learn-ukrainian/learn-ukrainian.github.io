slug: my-family
naturalness:
  score: 10
  status: PASS
title: My Family
word_target: 2000
content_outline:
- section: 'Вступ: Моя сім''я'
  words: 400
  points:
  - 'Introduce English scaffolding: Briefly explain the importance of family in Ukrainian
    culture.'
  - 'Introduce core nuclear family vocabulary: мама, тато, брат, сестра, син, донька.'
  - Explain the cultural and semantic difference between «сім'я» (nuclear) and «родина»
    (extended lineage).
  - 'Practice the question «Хто це?» with simple answers: «Це моя мама».'
- section: 'Презентація: Близька та розширена родина'
  words: 600
  points:
  - 'Introduce extended family vocabulary: дідусь, бабуся, дядько, тітка, онук, онука.'
  - Provide English scaffolding to explain the possessive construction «У мене є...»
    (I have).
  - Explicitly address and correct the common English calque «Я маю...».
  - Drill possessive pronoun agreement (мій/моя) with family members. Explicitly prevent
    the «мій сестра» error by focusing on feminine endings.
- section: 'Презентація: Характеристики та стосунки'
  words: 500
  points:
  - 'Introduce terms for spouses: чоловік (husband) and дружина (wife).'
  - Explain the dual meaning of «чоловік» (man/husband) and establish «дружина» as
    the standard term for wife.
  - Combine family terms with adjectives learned previously (добра бабуся, мудрий
    дідусь).
  - 'Introduce basic age/sibling descriptors: старший брат, молодша сестра.'
- section: 'Практика: Звертання та спілкування'
  words: 500
  points:
  - Provide English scaffolding to introduce the Vocative case (Кличний відмінок)
    as a unique and beautiful feature of Ukrainian for addressing people.
  - 'Teach the specific, high-frequency Vocative forms for family: мамо, тату, бабусю,
    дідусю.'
  - Create mini-dialogues showing how to address family vs. talking about them.
  - 'Synthesis: A short reading text describing a family tree (using all concepts:
    relationships, possessives, adjectives).'
