slug: my-family
naturalness:
  score: 10
  status: PASS
title: My Family
word_target: 1200
content_outline:
- section: 'Вступ: Моя сім''я (Introduction: My Family)'
  slug: introduction-my-family
  words: 250
  points:
  - 'Cultural distinction: explain the semantic difference between «сім''я» (nuclear
    family) and «родина» (extended lineage).'
  - 'Introduce core nuclear family vocabulary: мама, тато, брат, сестра, син, донька.
    (IPA on first occurrence only).'
  - Demonstrate the basic question «Хто це?» and simple answers (e.g., «Це моя мама»).
- section: 'Презентація: Близька та розширена родина (Presentation: Immediate and Extended
    Family)'
  slug: presentation-immediate-and-extended-family
  words: 350
  points:
  - 'Introduce extended family vocabulary: дідусь, бабуся, дядько, тітка, онук, онука.'
  - Introduce the possessive construction «У мене є...». Explicitly address and correct
    the common English calque «Я маю...».
  - Drill possessive pronoun agreement (мій/моя) with family members. Emphasize matching
    feminine endings to prevent the «мій сестра» error.
- section: 'Презентація: Характеристики та стосунки (Presentation: Characteristics and
    Relationships)'
  slug: presentation-characteristics-and-relationships
  words: 300
  points:
  - 'Introduce terms for spouses: чоловік (husband) and дружина (wife). Explain the
    dual meaning of «чоловік».'
  - Practice combining family terms with basic adjectives learned previously (e.g.,
    добра бабуся, мудрий дідусь).
  - 'Introduce basic age and sibling descriptors: старший брат, молодша сестра with
    simple sentence examples.'
- section: 'Практика: Звертання та спілкування (Practice: Address and Communication)'
  slug: practice-address-and-communication
  words: 300
  points:
  - Use English scaffolding to introduce the Vocative case (Кличний відмінок) for
    addressing people directly.
  - 'Teach the high-frequency Vocative forms for family: мамо, тату, бабусю, дідусю.'
  - Provide mini-dialogues demonstrating Nominative (talking ABOUT family) vs. Vocative
    (talking TO family).
  - 'Summary: Include 3-4 self-check questions consolidating possessives and vocative
    forms.'
