slug: adjective-case-forms
title: Adjective Case Forms
word_target: 2000
content_outline:
- section: Прикметник у Знахідному (Adj in Accusative)
  words: 500
  points:
  - Include English scaffolding (A1 immersion target 35-40%) to define the Accusative
    case for adjectives and its role in identifying direct objects.
  - Create an H3 for 'Неживий чоловічий та середній рід' (Inanimate Masculine and
    Neuter). Explain that Accusative equals Nominative. Provide 3+ clear examples
    (e.g., новий фільм, нове кафе).
  - Create an H3 for 'Жіночий рід' (Feminine). Explain the -а → -у shift. Highlight
    the 'rhyming' harmony between the adjective and noun (нова книга → нову книгу).
    Provide 3+ examples.
  - Create an H3 for 'Живий чоловічий рід' (Animate Masculine). Explain that Accusative
    equals Genitive. Emphasize this critical distinction (новий студент → нового студента)
    with 3+ examples.
- section: Прикметник у Місцевому (Adj in Locative)
  words: 500
  points:
  - Provide English scaffolding to define the Locative case for adjectives, specifically
    for indicating location (where?).
  - Create an H3 for 'Чоловічий та середній рід' (Masculine and Neuter). Explain the
    -ому ending (у новому місті, у великому парку). Provide 4+ examples using the
    prepositions у/в and на.
  - Create an H3 for 'Жіночий рід' (Feminine). Explain the -ій ending (у новій книзі,
    на великій площі). Note that consonant mutations in the noun (площа → площі) do
    not alter the adjective's -ій ending. Provide 4+ examples.
- section: Порівняння форм (Comparing forms)
  words: 400
  points:
  - Create an H3 with a comprehensive summary table comparing Nominative, Accusative,
    and Locative endings side-by-side for all three genders.
  - Provide an English strategy guide on how to memorize these patterns effectively,
    focusing on the visual 'rhymes' and markers.
  - Explain how learners can use adjective endings as reliable 'flags' or markers
    to identify the case and gender of a phrase even if they don't know the noun.
- section: Типові помилки (Common errors)
  words: 300
  points:
  - Create an H3 for 'Заморожений прикметник' (The Frozen Adjective). Explain in English
    why *красивий книгу is incorrect and how the adjective must always mirror the
    noun's transformation.
  - Create an H3 for 'Помилка з живим чоловічим родом' (Animate Masculine Error).
    Remind learners of the *новий студент* vs *нового студента* rule, using clear
    contrastive examples to reinforce the concept.
- section: Практика (Practice)
  words: 300
  points:
  - Include guided practice questions requiring the learner to transform Nominative
    phrases into Accusative and Locative contexts based on prompts.
  - Provide fill-in-the-blank sentences focusing on choosing the correct adjective
    ending (-у, -ому, -ій) to match the given noun.
  - Add a short exercise focused on recognizing the case of a phrase purely based
    on the adjective's ending.
