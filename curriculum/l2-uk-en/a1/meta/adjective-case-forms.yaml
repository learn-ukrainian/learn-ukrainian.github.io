slug: adjective-case-forms
title: Adjective Case Forms
word_target: 2000
content_outline:
- section: Прикметник у Знахідному (Adj in Accusative)
  words: 500
  points:
  - Provide English scaffolding defining the Accusative case for adjectives.
  - 'Create an H3 for Inanimate Masculine and Neuter: Explain that Accusative equals
    Nominative. Give 3+ examples (новий фільм, нове кафе).'
  - 'Create an H3 for Feminine: Explain the -а → -у shift. Emphasize the ''rhyming''
    harmony (нова книга → нову книгу). Give 3+ examples.'
  - 'Create an H3 for Animate Masculine: Explain that Accusative equals Genitive.
    Highlight the critical distinction (новий студент → нового студента). Give 3+
    examples.'
- section: Прикметник у Місцевому (Adj in Locative)
  words: 500
  points:
  - Provide English scaffolding defining the Locative case for adjectives indicating
    location.
  - 'Create an H3 for Masculine and Neuter: Explain the -ому ending (у новому місті,
    у великому парку). Provide 4+ examples with prepositions у/в and на.'
  - 'Create an H3 for Feminine: Explain the -ій ending (у новій книзі, на великій
    площі). Note that consonant mutations in the noun (площа → площі) do not alter
    the adjective''s -ій ending. Provide 4+ examples.'
- section: Порівняння форм (Comparing forms)
  words: 400
  points:
  - Create an H3 with a comprehensive summary table comparing Nominative, Accusative,
    and Locative for all three genders side-by-side.
  - Explain how to use adjective endings as reliable markers to identify the case
    and gender of the phrase.
  - Provide a brief English strategy guide on how to memorize these patterns effectively.
- section: Типові помилки (Common errors)
  words: 300
  points:
  - Create an H3 addressing the 'frozen adjective' error. Explain in English why *красивий
    книгу is incorrect and how the adjective must mirror the noun's transformation.
  - Create an H3 addressing the animate masculine error. Remind learners of the *новий
    студент* vs *нового студента* rule with clear contrastive examples.
- section: Практика (Practice)
  words: 300
  points:
  - Provide a set of guided practice questions requiring the learner to transform
    Nominative phrases into Accusative and Locative contexts.
  - Include fill-in-the-blank sentences focusing on choosing the correct adjective
    ending to match the given noun.
  - Include an exercise on recognizing the case based purely on the adjective's ending.
