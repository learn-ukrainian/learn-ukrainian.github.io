slug: checkpoint-daily-life
title: 'Checkpoint: Daily Life'
word_target: 1200
content_outline:
- section: 'Огляд (Overview)'
  slug: overview
  words: 150
  points:
  - 'H3: Welcome to the Checkpoint. Establish a Patient & Supportive Tutor persona.
    Reduce test anxiety by explaining this module simply consolidates past/future
    tenses, daily routines, and weather.'
  - 'H3: How to Use This Review. Explicitly note the English scaffolding policy: English
    will be used to clarify grammar rules, while practical examples will prioritize
    Ukrainian.'
- section: 'Навичка 1: Часові форми (Skill 1: Tenses)'
  slug: skill-1-tenses
  words: 300
  points:
  - 'H3: Минулий час. Clear review of the -в/-ла/-ло/-ли endings. Include examples
    emphasizing gender agreement (e.g., Він читав, Вона читала).'
  - 'H3: Майбутній час. Review the analytic future (буду + infinitive) with the conjugation
    of ''бути''. Provide examples of planned actions.'
  - 'H3: Куди чи Де. Comparative overview showing motion towards a destination (Куди?
    + Accusative) versus static location (Де? + Locative).'
- section: 'Навичка 2: Повсякденне життя (Skill 2: Daily Life)'
  slug: skill-2-daily-life
  words: 250
  points:
  - 'H3: Щоденна рутина. Timeline narrative covering a standard day (вставати, снідати,
    працювати, лягати спати) combining the reviewed tenses.'
  - 'H3: Замовлення їжі та покупки. Mini-dialogue demonstrating how to state preferences,
    order in a café, and ask prices (Скільки коштує?).'
- section: 'Навичка 3: Опис та погода (Skill 3: Description & Weather)'
  slug: skill-3-description-and-weather
  words: 250
  points:
  - 'H3: Прислівники способу дії. Review modifying adverbs (добре, погано, швидко,
    повільно) showing how they describe actions.'
  - 'H3: Прогноз погоди. Review impersonal weather constructions (Сьогодні тепло/холодно)
    and seasonal vocabulary (взимку, влітку).'
- section: 'Інтеграційне завдання (Integration Task)'
  slug: integration-task
  words: 250
  points:
  - 'H3: Вчорашні події та завтрашні плани. Cohesive reading passages narrating a
    completed daily routine (past) and outlining future plans (future).'
  - 'H3: Перевірте себе. 4 self-check questions: 1. Can you describe what you did
    yesterday? 2. Can you state your plans for tomorrow? 3. Can you order lunch and
    ask for the price? 4. Can you describe today''s weather?'
