slug: checkpoint-daily-life
title: 'Checkpoint: Daily Life'
word_target: 2000
content_outline:
- section: Огляд
  words: 200
  points:
  - 'H3: Welcome to the Checkpoint. Establish a Patient & Supportive Tutor persona.
    Reduce test anxiety by explaining this module consolidates past/future tenses,
    daily routines, and weather.'
  - 'H3: How to Use This Review. Explicitly note the English scaffolding policy: English
    will be used to clarify grammar rules and instructions, while practical examples
    and reading passages will prioritize Ukrainian.'
- section: 'Навичка 1: Часові форми'
  words: 600
  points:
  - 'H3: Минулий час. Present a clear, visually distinct table for the -в/-ла/-ло/-ли
    endings. Include 4+ examples emphasizing gender agreement (e.g., Він читав, Вона
    читала).'
  - 'H3: Майбутній час. Provide a structural breakdown of the analytic future (буду
    + infinitive) with conjugation of ''бути''. Provide 4+ examples of planned actions.'
  - 'H3: Куди чи Де. Create a comparative table showing motion towards a destination
    (Куди? + Accusative) versus static location (Де? + Locative) using familiar verbs.'
- section: 'Навичка 2: Повсякденне життя'
  words: 400
  points:
  - 'H3: Щоденна рутина. Provide a timeline narrative covering a standard day (вставати,
    снідати, працювати, лягати спати) combining new tenses.'
  - 'H3: Замовлення їжі. Include a short, practical mini-dialogue demonstrating how
    to state preferences and order in a café.'
  - 'H3: У крамниці. Review transactional vocabulary, focusing on asking prices (Скільки
    коштує?) and basic polite requests (Дайте, будь ласка).'
- section: 'Навичка 3: Опис та погода'
  words: 400
  points:
  - 'H3: Прислівники способу дії. Reintroduce modifying adverbs (добре, погано, швидко,
    повільно) showing how they describe actions.'
  - 'H3: Прогноз на сьогодні. Review impersonal weather constructions (Сьогодні тепло/холодно)
    with 3+ distinct examples.'
  - 'H3: Сезони. Combine seasonal vocabulary (взимку, влітку) with future and past
    tenses to describe activities (Взимку було холодно).'
- section: Інтеграційне завдання
  words: 400
  points:
  - 'H3: Вчорашні події. A cohesive 4-5 sentence reading passage narrating a completed
    daily routine, combining past tense, food, and weather.'
  - 'H3: Завтрашні плани. A cohesive 4-5 sentence reading passage outlining future
    plans, integrating the analytic future tense and shopping vocabulary.'
  - 'H3: Ваш прогрес. A supportive self-assessment checklist allowing the learner
    to verify their readiness to progress to the next phase.'
