slug: checkpoint-daily-life
title: 'Checkpoint: Daily Life'
word_target: 2000
content_outline:
- section: Огляд
  words: 200
  points:
  - 'H3 for Welcome: Set a supportive tone explaining the checkpoint''s purpose (consolidating
    tenses, routine, and weather).'
  - 'H3 for Instructions: Explicitly list English scaffolding usage to guide the learner
    through the upcoming self-assessment sections.'
- section: 'Навичка 1: Часові форми'
  words: 500
  points:
  - 'H3 for Past Tense Review: Provide a clear paradigm table for -в/-ла/-ло/-ли endings,
    emphasizing gender agreement with 3+ examples.'
  - 'H3 for Future Tense Review: Provide a clear structure table for ''буду + infinitive''
    with 3+ examples.'
  - 'H3 for Direction vs. Location: Contrast Куди? (Accusative) with Де? (Locative)
    using past and future motion verbs.'
- section: 'Навичка 2: Повсякденне життя'
  words: 500
  points:
  - 'H3 for Daily Routine: Present a timeline of a typical day (вставати, снідати,
    працювати, лягати спати) with sentences.'
  - 'H3 for Food and Drink: Provide a mini-dialogue on ordering food and stating preferences.'
  - 'H3 for Shopping: Provide a mini-dialogue reviewing ''Скільки коштує?'' and basic
    polite request patterns.'
- section: 'Навичка 3: Опис та погода'
  words: 400
  points:
  - 'H3 for Adverbs of Manner: Explain how to modify verbs (добре, швидко, повільно)
    with 4 contrasting examples.'
  - 'H3 for Weather Expressions: Review impersonal constructions (Сьогодні тепло/холодно)
    and seasons.'
  - 'H3 for Seasonal Activities: Combine weather and future tense (Влітку буде тепло,
    я буду гуляти).'
- section: Інтеграційне завдання
  words: 400
  points:
  - 'H3 for ''My Yesterday'': A cohesive 4-sentence reading passage describing a past
    routine, with a self-check translation task.'
  - 'H3 for ''My Tomorrow'': A cohesive 4-sentence reading passage describing future
    plans (shopping, weather), with a self-check translation task.'
  - 'H3 for Next Steps: A supportive wrap-up checklist for the learner to verify their
    readiness for the next phase.'
