slug: mine-and-yours
title: Mine and Yours
word_target: 1200
content_outline:
- slug: introduction-whose-is-this
  words: 200
  points:
  - Introduce the concept of possession using everyday objects (phone, bag, passport).
  - 'Present the core question words: Чий? Чия? Чиє? Чиї? (Whose?).'
  - 'Explain the fundamental difference from English: Ukrainian possessive pronouns
    agree with the object possessed, not the owner.'
  section: 'Introduction: Whose is this?'
- slug: variable-possessives
  words: 350
  points:
  - 'Introduce the variable possessive pronouns: мій (my), твій (your informal), наш
    (our), ваш (your formal/plural).'
  - Demonstrate gender and number agreement (masculine, feminine, neuter, plural)
    using clear tables.
  - Provide simple examples matching pronouns to A1 vocabulary (e.g., мій телефон,
    моя адреса, моє місто).
  section: 'Variable Possessives: Мій, Твій, Наш, Ваш'
- slug: invariable-possessives-and-sviy
  words: 250
  points:
  - 'Introduce the third-person invariable pronouns: його (his/its) and її (her),
    explaining they do not change based on the object''s gender.'
  - Introduce їхній (their) as the standard form, distinguishing it from the incorrect
    use of 'їх'.
  - Briefly introduce the reflexive possessive 'свій' (one's own) to contrast with
    'його/її' and prevent common errors.
  section: Invariable Possessives and Свій
- slug: cultural-context-tviy-vs-vash
  words: 150
  points:
  - Explain the social distance and etiquette behind choosing between 'твій' and 'ваш'.
  - Describe the cultural milestone of 'перехід на ти' (switching to informal 'you')
    in Ukrainian relationships.
  section: 'Cultural Context: Твій vs. Ваш'
- slug: summary-and-self-check
  words: 250
  points:
  - Recap the main rules of gender agreement for possessive pronouns.
  - Provide a brief practice scenario (e.g., a short Lost and Found dialogue).
  - Include 3-4 self-check questions (e.g., How do you say 'my bag'? When do you use
    'ваш' instead of 'твій'?).
  section: Summary and Self-Check
