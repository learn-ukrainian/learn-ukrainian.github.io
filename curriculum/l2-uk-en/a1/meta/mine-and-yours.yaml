slug: mine-and-yours
title: Mine and Yours
word_target: 1200
content_outline:
- section: 'Вступ: Чия це річ?'
  words: 400
  points:
  - 'Note: 25-35% immersion. Provide English scaffolding for complex grammar explanations,
    specifically the concept of gender agreement.'
  - Створити контекст «Бюро знахідок» (Lost and Found) з використанням побутових предметів
    (телефон, ключі, паспорт) для введення питань «Чий? Чия? Чиє? Чиї?».
  - 'Пояснити ключову відмінність від англійської: в українській мові присвійний займенник
    узгоджується з граматичним родом предмета (possessed object), а не з тим, кому
    він належить (owner).'
- section: 'Презентація: Система форм та узгодження'
  words: 650
  points:
  - Представити змінювані форми (мій, твій, наш, ваш) за допомогою чітких таблиць.
    Показати узгодження для чоловічого, жіночого, середнього роду та множини з 2-3
    прикладами на кожну форму.
  - Пояснити незмінювані форми (його, її) — підкреслити, що вони залишаються стабільними
    незалежно від роду предмета, що є полегшенням для початківців.
  - 'Деколонізаційний акцент: ввести займенник «їхній» як літературний стандарт. Чітко
    розмежувати його з помилковим незмінним «їх», наводячи приклади правильного узгодження
    (їхній дім, їхня машина).'
  - 'Ввести базову концепцію рефлексивного займенника «свій»: пояснити контраст між
    «його/її» (чужа річ) та «свій» (власна річ) для уникнення типових помилок.'
- section: 'Культурний контекст: Етикет та еволюція стосунків'
  words: 400
  points:
  - 'Описати соціальну дистанцію: суворе розрізнення ситуацій для використання «твій»
    (родина, друзі) та «ваш» (незнайомці, старші, офіційні особи).'
  - Розповісти про ритуал «переходу на ти» як важливу віху в українській комунікації.
  - Згадати правило етикету щодо написання «Ваш» з великої літери в листах як вияв
    поваги.
  - Розібрати стратегії подолання 'Gender Mismatch' (напр., *мій мама*) з фокусом
    на аналізі закінчень іменників.
- section: Практика та продукція
  words: 550
  points:
  - 'Надати керовану практику: 3-4 міні-діалоги на заміну іменників займенниками в
    контексті повсякдення.'
  - Додати вправи на відпрацювання узгодження (наприклад, підбір правильної форми
    займенника до слів 'рюкзак', 'адреса', 'місто').
  - 'Створити продуктивний етап: сценарій/рольова гра ''Чия це сумка?'', спрямована
    на автоматизацію використання питальних (чий/чия/чиє) та присвійних займенників.'
