slug: mine-and-yours
title: Mine and Yours
word_target: 2000
content_outline:
- section: 'Вступ: Бюро знахідок'
  words: 250
  points:
  - 'Set the scene: A ''Lost and Found'' (Бюро знахідок) scenario where identifying
    owners is critical.'
  - 'Introduce the core questions: Чий? (Whose m.), Чия? (Whose f.), Чиє? (Whose n.),
    Чиї? (Whose pl.).'
  - 'Anchor the concept: In Ukrainian, the question word changes based on the object,
    not the owner.'
  - 'English Scaffolding: Briefly explain that unlike English ''whose'', Ukrainian
    has gender forms.'
- section: 'Граматика: Мій, твій, наш'
  words: 750
  points:
  - Present the full paradigm for 'my' (мій, моя, моє, мої) with clear gender-coded
    examples.
  - Present the full paradigm for 'your' (informal) (твій, твоя, твоє, твої) - note
    parallel to 'мій'.
  - Present 'our' (наш, наша, наше, наші) and 'your' (formal/plural) (ваш, ваша, ваше,
    ваші).
  - 'Highlight the vowel loss pattern in ''ваш/наш'' (наш -> нашого, but here specifically
    nominative gender forms: наш -> наша).'
  - 'Visual Aid: A comprehensive master table of changing possessives.'
- section: 'Граматика: Його, її, їхній'
  words: 400
  points:
  - 'Introduce the ''Easy Ones'': ''його'' (his) and ''її'' (her) do NOT change for
    the object''s gender.'
  - 'Contrast: ''мій стіл / моя лампа'' BUT ''його стіл / його лампа''.'
  - 'Introduce ''їхній'' (their): Explain it DOES change (їхній, їхня, їхнє, їхні)
    like an adjective.'
  - 'Cultural/Correctness Note: Why we use ''їхній'' instead of ''їх'' (avoiding Surzhyk).'
- section: 'Практика: Чия це річ?'
  words: 300
  points:
  - 'Guided Practice: Matching nouns to correct possessive forms based on endings.'
  - 'Common Error Alert: Watch out for ''мій'' with feminine nouns ending in consonant
    (if any) or abstract nouns.'
  - 'Scenario: Identifying items in a classroom or bag (Це твоя ручка? Ні, це моя).'
- section: 'Культура: Твій чи Ваш?'
  words: 300
  points:
  - 'Social Etiquette: When to use ''Твій'' (friends, family, children) vs ''Ваш''
    (strangers, elders, officials).'
  - 'The ''Capital V'' rule: Writing ''Ваш'' in letters/emails as a sign of respect.'
  - Mini-dialogues illustrating the shift or strict usage.
