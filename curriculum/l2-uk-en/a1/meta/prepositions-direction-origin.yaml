slug: prepositions-direction-origin
title: 'Prepositions: Direction & Origin'
word_target: 2000
content_outline:
- section: 'Розминка: Де, Куди, Звідки'
  words: 250
  points:
  - 'Introduce the three core questions: Де? (Location), Куди? (Direction), Звідки?
    (Origin)'
  - 'Cultural hook: The train conversation — ''Звідки ви?'' as the start of every
    story'
  - 'Visual aid: The Triangle of Movement (Point A -> Point B)'
- section: 'Презентація: Три питання — три відмінки'
  words: 300
  points:
  - 'Concept: The question determines the case (Де = Locative, Куди = Accusative,
    Звідки = Genitive)'
  - 'Visual aid: Decision Table mapping Question -> Preposition -> Case'
  - 'Learner Error Alert: Stop and check — are you moving (Куди) or standing (Де)?'
- section: 'Місце: Де? (Локатив)'
  words: 300
  points:
  - 'Review: Prepositions у/в + Locative (static location)'
  - 'Euphony rule: Reinforce у/в alternation (у кімнаті vs в офісі)'
  - 'Cultural note: ''Вдома'' (At home) implies safety and comfort (slippers on)'
  - 'Contrast: ''На'' for surfaces and events (на столі, на концерті)'
- section: 'Напрямок: Куди? (Знахідний)'
  words: 350
  points:
  - 'New Grammar: Prepositions у/в + Accusative (movement into)'
  - 'Standard Ref §4.2.3.2.2: Distinguishing location (в сумці) from direction (в
    сумку)'
  - Preposition 'на' + Accusative (movement onto/to an event)
  - Preposition 'до' + Genitive (movement towards/to a person/building)
  - 'Learner Error: ''До'' ALWAYS needs Genitive (додому, до школи)'
- section: 'Походження: Звідки? (Родовий)'
  words: 300
  points:
  - 'New Grammar: Preposition з/із/зі + Genitive (movement out of/from)'
  - 'Standard Ref §4.1.7: Euphony rules for з/із/зі (з України, зі школи)'
  - Preposition 'від' + Genitive (from a person/point)
  - 'Logic pair: ''До'' (to) <-> ''Від'' (from); ''В'' (in) <-> ''З'' (out of)'
- section: 'Систематизація: Школа і Робота'
  words: 250
  points:
  - 'Contrast drill: School (у школі - в школу - зі школи)'
  - 'Contrast drill: Work (на роботі - на роботу - з роботи)'
  - The 'Container' vs 'Surface' logic applied to institutions
- section: 'Практика: Маршрут по місту'
  words: 250
  points:
  - 'Narrative practice: Describing a daily route (From home -> to metro -> to work)'
  - 'Dialogue: Asking for directions (Як дістатися до...?)'
  - 'Self-check: Identify the error (Де ти йдеш? -> Куди ти йдеш?)'
