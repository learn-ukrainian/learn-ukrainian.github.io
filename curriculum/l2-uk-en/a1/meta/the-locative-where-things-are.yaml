slug: the-locative-where-things-are
title: 'The Locative: Where Things Are'
word_target: 1200
content_outline:
- section: Вступ
  words: 400
  points:
  - 'Explicitly state A1 immersion rule in intro: English is used to explain grammar
    theory, while Ukrainian is used for examples and dialogues.'
  - 'Introduce the core question «Де?» (Where?) as the functional trigger for Locative.
    Provide high-frequency survival phrases: «Де ти?», «Де ви?», «Де це?», «Де туалет?».'
  - 'Cultural Hook: Explain the ''Shoes Off'' rule and «тапочки» (slippers) in English
    to establish the domestic spatial context («вдома», «у кімнаті»).'
- section: Презентація
  words: 800
  points:
  - Each concept gets its own H3. Define Container («у/в» - box) vs Surface/Activity
    («на» - table/work) logic in English. Explicitly explain «на роботі» to prevent
    the common `*в роботі` calque.
  - 'Explain Euphony rules (милозвучність) in English: how to choose between «у» and
    «в» to avoid consonant clusters, highlighting «У Львові».'
  - Present standard Locative endings (-і/-ї) with simple tables for masculine, feminine,
    and neuter regular nouns.
  - Detail velar mutations (к→ц, г→з, х→с) with their own H3 using the 'Hand and Leg'
    mnemonic in English («рука» → «у руці», «нога» → «на нозі», «вухо» → «у вусі»).
- section: Практика
  words: 400
  points:
  - 'Include an H3 for preposition logic drill: Provide English instructions to sort
    vocabulary into ''Container'' (у/в) and ''Surface/Event'' (на) categories.'
  - 'Include an H3 for mutation drills: Provide transformation examples targeting
    common errors like `*на ногі`.'
  - 'Provide a short dialogue distinguishing Static Location (Locative: «Я у парку»)
    from Directional Motion (Accusative: `*Я в парк`).'
- section: Виробництво та підсумок
  words: 400
  points:
  - Present vocabulary for room descriptions («в кімнаті», «на столі») alongside a
    mini-dialogue.
  - Discuss Ukrainian housing types (Хрущовка, Сталінка, Новобудова) as authentic
    context for describing where one lives.
  - Provide a 'Kyiv City Guide' mini-production task where learners read about locations
    («на вокзалі», «у школі», «на вулиці»).
  - Conclude with a summary table of the Locative rules and prepositions.
