slug: the-locative-where-things-are
title: 'The Locative: Where Things Are'
word_target: 2000
content_outline:
- section: 'Вступ: Питання «Де?»'
  words: 300
  points:
  - 'Explicitly state A1 immersion rule: English for grammar/concepts, Ukrainian for
    examples.'
  - Introduce the core question «Де?» (Where?) vs «Куди?» (Where to? - brief mention
    of difference).
  - 'Present high-frequency set phrases immediately as lexical items: «вдома» (at
    home), «у школі», «на роботі».'
  - 'Contrast English ''in/at'' with Ukrainian logic: conceptual space vs physical
    containment.'
- section: 'Граматика: Місцевий відмінок'
  words: 800
  points:
  - 'Define the Core Binary: Container («у/в» - box) vs Surface/Event («на» - table/party).'
  - 'Euphony Rules: Explain «у» vs «в» simply (avoid consonant pile-ups: «У Львові»,
    «В Америці»).'
  - 'The Standard Ending -і: Show regular nouns (стіл → на столі, кімната → у кімнаті).'
  - 'The Hard Part (Mutations): Explain k/h/kh changes with the ''Body Parts'' rule
    (рука/нога/вухо -> ці/зі/сі).'
  - 'Exceptions: Brief mention of -у endings for ''park/dad'' type if relevant, but
    focus on standard -і.'
- section: 'Практика: Де це знаходиться?'
  words: 500
  points:
  - 'Drill 1: Preposition Logic. Sort words into ''Bag'' (у) or ''Table'' (на) categories.'
  - 'Drill 2: Mutation Mechanic. Step-by-step transformation of K/G/Kh stems.'
  - 'Dialogue: ''Lost and Found''. A: «Де мій телефон?» B: «Він на столі».'
  - 'Visualizing Space: Describing the location of 3 objects in a picture.'
- section: 'Застосування: Моя кімната і місто'
  words: 400
  points:
  - 'Cultural Hook: The Hallway & Slippers. Describe the ''shoe zone'' using locative.'
  - 'Mini-Production: Describe your room (Furniture location: «Стіл у кімнаті», «Книги
    на полиці»).'
  - 'City Context: «Я в Києві». Briefly mention housing types (Stalinka/Khrushchevka)
    as identifiers.'
  - 'Final Self-Check: Can you answer «Де ти зараз?» correctly?'
