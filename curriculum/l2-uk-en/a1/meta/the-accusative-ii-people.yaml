slug: the-accusative-ii-people
title: 'The Accusative II: People'
word_target: 2000
content_outline:
- section: 'Розминка: Живе чи неживе?'
  words: 300
  points:
  - Введення метафори 'Слова серця' (Істоти) та 'Слова каменю' (Неістоти)
  - Пояснення граматичної категорії 'істота' (люди і тварини) англійською мовою
  - 'Контрастні приклади: ''Я бачу телефон'' (неістота) vs ''Я бачу сина'' (істота)'
  - Інтерактивне завдання на сортування слів за категорією
- section: 'Теорія: Як змінюються слова'
  words: 600
  points:
  - 'Правило ''Жадібного чоловічого роду'': іменники-істоти крадуть закінчення Родового
    відмінка (-а/-я)'
  - 'Візуальна таблиця змін: брат → брата, вчитель → вчителя'
  - 'Попередження про пастку: Жіночий рід змінюється стандартно (-у/-ю), як і неістоти
    (сестра → сестру)'
  - 'Тварини як граматичні люди: кіт → кота, пес → пса (важливий нюанс)'
- section: 'Практика: Тренуємо форми'
  words: 400
  points:
  - 'Вправа ''Хто це?'': трансформація називного відмінка у знахідний'
  - Робота з дієсловами 'бачити', 'знати', 'любити', 'чекати' + істоти
  - Вправа на вибір правильної форми (чоловічий vs жіночий рід)
  - Переклад коротких речень з англійської на українську (акцент на закінченнях)
- section: 'Використання: Моя сім''я та друзі'
  words: 400
  points:
  - 'Побудова речень про родину: ''Я люблю маму і тата'''
  - Введення пестливих форм (матусю, татуся) у контексті любові до рідних
  - 'Моделювання діалогу: ''Ти знаєш...?'' (питання про спільних знайомих)'
  - 'Опис фотографії: кого ми бачимо на знімку (використання знахідного відмінка)'
- section: 'Культурний контекст: Друзі та імена'
  words: 300
  points:
  - Пояснення культурної різниці між 'друг' та 'знайомий'
  - Як ввічливо запитувати про людей (Кого ви шукаєте?)
  - Короткий огляд відмінювання українських імен (Оксана → Оксану, Андрій → Андрія)
  - 'Підсумок уроку: чек-лист ''Кого я можу назвати українською?'''
