slug: the-accusative-ii-people
title: 'The Accusative II: People'
word_target: 1200
content_outline:
- section: Розминка (Warm-up)
  slug: warm-up
  words: 200
  points:
  - Introduce the grammatical concept using the 'Heart Words' (Animate) vs 'Stone
    Words' (Inanimate) metaphor.
  - Contrast Accusative I (things) and Accusative II (people) to explain why grammar
    changes for living beings.
  - Link to the State Standard competency of distinguishing case forms for names of
    people.
- section: Презентація (Presentation)
  slug: presentation
  words: 450
  points:
  - 'Explain the logic of masculine animate nouns: Accusative = Genitive. They are
    ''greedy'' for endings to stand out from objects (бачу сина, тата, учителя).'
  - Provide a visual table showing the transition of masculine nouns to their Acc=Gen
    forms.
  - 'Explain the logic of feminine animate nouns: they maintain the standard -у/-ю
    ending, ignoring the Acc=Gen rule (бачу маму, сестру).'
  - Clarify that animals (кіт, пес) are grammatically animate and require Acc=Gen
    endings (бачу кота, пса).
- section: Культурний контекст (Cultural Context)
  slug: cultural-context
  words: 200
  points:
  - Discuss the deep cultural meaning of 'друг' in Ukrainian society compared to a
    casual acquaintance.
  - Explain the expressive role of diminutives (матуся, татусь, братик, сестричка)
    and how they are used by adults as a sign of warmth.
- section: Практика та типові помилки (Practice and Common Errors)
  slug: practice
  words: 250
  points:
  - Address 'The Masculine Animate Trap' where learners leave masculine animate nouns
    in the nominative case.
  - Address 'Feminine Overthinking' where learners mistakenly apply Acc=Gen to feminine
    nouns.
  - Address 'Animal Animacy Confusion' where learners treat animals as inanimate.
  - 'Include transformational exercises: changing sentences with inanimate objects
    (бачу стіл) to sentences with people (бачу студента), using English instructions
    only.'
- section: Підсумок (Summary)
  slug: summary
  words: 100
  points:
  - 'Create a summary checklist: when Accusative equals Genitive, and when it does
    not.'
  - 'Self-check question 1: How do we say ''I see a brother''? (Я бачу брата)'
  - 'Self-check question 2: How do we say ''I see a sister''? (Я бачу сестру)'
  - 'Self-check question 3: Are animals considered animate or inanimate in Ukrainian
    grammar?'