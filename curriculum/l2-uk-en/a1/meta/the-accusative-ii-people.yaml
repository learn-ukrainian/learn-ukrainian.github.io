slug: the-accusative-ii-people
title: 'The Accusative II: People'
word_target: 3700
content_outline:
- section: 'Вступ та теорія: Хто чи що?'
  words: 414
  points:
  - 'H3 Warm-up: English scaffolding contrasting ''The book'' (inanimate) with ''The
    brother'' (animate)'
  - 'H3 Concept: Defining ''Істота'' (Animate) - introduction of ''Heart Words'' vs
    ''Stone Words'' metaphor'
  - 'H3 Masculine Animate: Step-by-step logic for the Accusative = Genitive (-а/-я)
    rule (брат → брата, тато → тата)'
  - 'H3 The Animate Trap: Warning against applying the Nominative = Accusative rule
    to people (e.g., ''Я бачу брат'' vs ''брата'')'
  - 'H3 Feminine Animate: Comparison showing feminine nouns follow the standard -у/-ю
    pattern regardless of animacy (сестра → сестру)'
  - 'H3 Animals: Grammatical animacy explained for pets and common animals (кіт →
    кота, пес → пса)'
- section: 'Практика: Робота з формою'
  words: 260
  points:
  - 'H3 Discrimination: Activity sorting 15+ items into ''Who?'' (Animate) vs ''What?''
    (Inanimate) categories'
  - 'H3 Transformation: Drills changing subjects into objects for family members and
    professions (лікар → лікаря)'
  - 'H3 Verb Pairing: Practice pairing animate objects with high-frequency verbs:
    бачити, знати, любити, чекати'
- section: 'Використання: Моя сім''я та друзі'
  words: 438
  points:
  - 'H3 My Family: Constructing 6+ sentences describing family using ''любити'' and
    ''чекати'''
  - 'H3 Affectionate Forms: Usage of family diminutives in accusative (матуся → матусю,
    татусь → татуся)'
  - 'H3 Social Dialogue: Simulation of asking ''Do you know...?'' about friends and
    colleagues'
  - 'H3 Syntactic Roles: Identification and labeling of the ''Додаток'' (Object) in
    sentence structures'
- section: 'Культурний контекст: Відносини та імена'
  words: 262
  points:
  - 'H3 Friendship Nuance: Contextual distinction between the intimate ''друг'' and
    casual ''знайомий'''
  - 'H3 Names in Accusative: Rules for declining personal names (Сашко → Сашка, Катя
    → Катю)'
  - 'H3 Polite Inquiries: Cultural norms for asking about people respectfully in Ukrainian'
engagement_min: 4
example_min: 8
