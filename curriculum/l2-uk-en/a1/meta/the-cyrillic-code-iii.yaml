content_outline:
- points:
  - 'Quick review: read 3 words from Code I-II (молоко, кіт, місто) as warm-up.'
  - This module adds 9 consonants. After this module you know 23 letters — nearly
    all common Ukrainian text becomes readable.
  - 'Key concept: voiced/voiceless consonant pairs — Ukrainian consonants come in
    matched pairs where one vibrates the throat (voiced) and the other doesn''t (voiceless).'
  slug: s
  title: Вступ — Introduction
  words: 150
- points:
  - 'Б — key word: банан. Video link. Voiced partner of П. Additional: брат, будинок.'
  - 'Д — key word: дім. Video link. Д looks unfamiliar but sounds simple — like English
    ''d''. Additional: добре, друг, день.'
  - 'П — key word: павук. Video link. Voiceless partner of Б. Critical: П (sounds
    like p) vs Р (sounds like r, learned in Code II). This distinction is essential.'
  - 'Drill: П vs Р minimal pairs — палка (stick) vs ракета (rocket).'
  slug: s
  title: Приголосні — Consonants Б, Д, П
  words: 200
- points:
  - 'З — key word: зебра. Video link. Voiced partner of С (from Code I). Sounds like
    English ''z''.'
  - 'Г — key word: гора. Video link. Г is a soft throaty sound (voiced glottal fricative).
    NOT a hard ''g'' like English ''go''. Preview: the hard ''g'' sound in Ukrainian
    is Ґ, coming in Code IV.'
  - 'Х — key word: хліб. Video link. Voiceless partner of Г. Like German ''ch'' in
    ''ach'' or Scottish ''loch''. No English equivalent — explicit articulatory instruction
    needed.'
  slug: s
  title: Приголосні — Consonants З, Г, Х
  words: 250
- points:
  - 'Explain the concept: place your hand on your throat. Voiced (дзвінкий) = throat
    vibrates. Voiceless (глухий) = only air.'
  - 'Ж — key word: жук. Video link. Voiced sibilant. No English equivalent — like
    ''zh'' in ''measure''. Lips rounded, tongue raised.'
  - 'Ш — key word: шапка. Video link. Voiceless partner of Ж. Like English ''sh''
    in ''ship''. Hard articulation — tongue pulled back.'
  - 'Ч — key word: черепаха. Video link. An affricate — like English ''ch'' in ''church''.
    Very frequent.'
  - 'Pair summary: Б↔П, Д↔Т, Г↔Х (throat), Ж↔Ш (sibilant), З↔С (hissing), В↔Ф (Code
    IV).'
  slug: s
  title: Дзвінкі та глухі — Voiced and Voiceless Pairs
  words: 300
- points:
  - 'Words using all 23 letters: хліб, парк, школа, будинок, газета, пошта, шапка,
    чай (preview — Ч just learned).'
  - 'Voiced/voiceless pair drills: зуб (з-voiced) vs суп (с-voiceless), жар (ж-voiced)
    vs шар (ш-voiceless).'
  - 'Urban vocabulary: банк, парк, транспорт — internationalism-heavy for confidence.'
  slug: s
  title: Практика читання — Reading Practice
  words: 250
- points:
  - 'Progress: 23 of 33 letters learned (6 голосні + 17 приголосні). Nearly all common
    text is readable.'
  - 'Key concept mastered: voiced/voiceless pairs.'
  - 'Next module: The Cyrillic Code IV completes the alphabet with 10 remaining characters
    (Й, Щ, Я, Ю, Є, Ь, Ї, Ц, Ф, Ґ) plus digraphs (ДЖ, ДЗ) and the apostrophe.'
  slug: s
  title: Підсумок — Summary
  words: 100
slug: the-cyrillic-code-iii
title: The Cyrillic Code III
word_target: 1200
