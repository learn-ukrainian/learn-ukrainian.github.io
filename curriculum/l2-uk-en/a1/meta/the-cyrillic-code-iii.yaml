slug: the-cyrillic-code-iii
title: The Cyrillic Code III
word_target: 2000
content_outline:
- section: Вступ (Review & New Set)
  words: 300
  points:
  - Greet the learner and state the lesson goals; explicitly use English scaffolding
    for clear instructions (A1 immersion level).
  - Provide a diagnostic mini-drill to review the 15 letters from a1-01 and a1-02.
  - Highlight the 'False Friends' (Р, Н, В, С) from previous modules to reactivate
    prior knowledge.
  - Introduce the 'middle block' of the alphabet (О-Х) and the two uniquely Ukrainian
    digraphs (Дж, Дз).
- section: Нові літери (New Letters О–Х)
  words: 700
  points:
  - Create an H3 subsection for each new letter (О, П, Р, С, Т, Ф, Х).
  - 'О: Emphasize the decolonized phonetic rule that unstressed О never reduces to
    /a/ in Ukrainian.'
  - 'П vs Р: Detail the critical contrast between Cyrillic П (/p/) and Cyrillic Р
    (rolled /r/) to avoid English interference.'
  - 'Ф: Add a cultural note explaining that Ф is rare in native words and appears
    mostly in borrowings.'
  - 'Х: Provide articulation guidance (like Scottish ''loch'') using the cultural
    anchor word ''хліб''.'
- section: Диграфи (Digraphs)
  words: 400
  points:
  - Define what a digraph is and explain that Дж and Дз represent single affricate
    sounds, not two separate consonants.
  - Create an H3 for Дж with pronunciation guide (/dʒ/) and examples (джерело, джаз).
  - Create an H3 for Дз with pronunciation guide (/dz/) and examples (дзвінок, дзеркало).
  - Frame these affricates as a beautiful and distinct feature of Ukrainian phonology.
- section: Практика читання (Reading Practice)
  words: 400
  points:
  - Provide decoding drills combining all 22 letters learned so far.
  - 'Group vocabulary by theme: internationalisms (ресторан, транспорт, порт) and
    daily words (пошта, хліб).'
  - Include minimal pairs and consonant cluster practice for T, C, P, П.
  - Recommend the Anna Ohoiko pronunciation video playlist for individual letter drilling.
- section: Підсумок (Summary)
  words: 200
  points:
  - Provide a final read-aloud paragraph incorporating all 22 letters and both digraphs.
  - Include a self-assessment checklist (e.g., 'Can I distinguish П and Р?').
  - Display a progress tracker showing 22 out of 33 letters mastered.
