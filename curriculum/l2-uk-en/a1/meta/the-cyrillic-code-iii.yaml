slug: the-cyrillic-code-iii
title: The Cyrillic Code III
word_target: 1200
content_outline:
- section: Вступ (Review & New Set)
  words: 300
  points:
  - Explicitly use English scaffolding (A1 immersion level) to welcome the learner
    and outline the module's objectives.
  - Include a diagnostic mini-drill with a 5-item matching task to review the 15 letters
    previously covered in a1-01 and a1-02.
  - "Briefly review visual traps from earlier lessons (Н looks like H, С looks like C,
    В looks like B) and introduce Р as the newest visual trap (looks like P but is /r/)."
  - Introduce the target set (О, П, Р, С, Т, Ф, Х) and the uniquely Ukrainian digraphs
    (Дж, Дз) as the bridge to reading full everyday words.
- section: Нові літери (New Letters О–Х)
  words: 700
  points:
  - Allocate an individual H3 subsection for each of the 7 new letters (О, П, Р, С,
    Т, Ф, Х), providing the letter shape, sound equivalent, and 2-3 examples with
    English translations.
  - 'For ''О'': Explain the phonological rule that unstressed О must remain a clear
    /o/ in Ukrainian, emphasizing correct articulation without reference to Russian
    ''akanye''.'
  - 'For ''П'' vs ''Р'': Dedicate a specific warning box explaining the visual trap.
    П is /p/ (Platform shape), while Р is a rolled /r/ (Roaring Engine). Provide minimal
    pairs if possible, or distinct high-contrast examples.'
  - 'For ''Ф'': Add a Cultural Guide note explaining that Ф is rare in native vocabulary
    and appears primarily in international loanwords (фото, факт).'
  - 'For ''Х'': Provide articulatory guidance (liken to Scottish ''loch'') and anchor
    it to the culturally vital word ''хліб'', briefly explaining the ''хліб-сіль''
    tradition.'
- section: Диграфи (Digraphs)
  words: 400
  points:
  - 'Define ''digraph'' in simple English: two letters working together to create
    one single, inseparable sound.'
  - Create an H3 subsection for 'Дж' (/dʒ/). Provide pronunciation instructions linking
    it to the English 'j' in 'jungle', with examples like 'джерело' and 'джаз'.
  - Create an H3 subsection for 'Дз' (/dz/). Note the lack of a direct English equivalent
    but liken it to the 'dz' in 'adze'. Use examples like 'дзвінок'.
  - Include a 'Patient Tutor' tip reminding learners not to split these sounds when
    reading syllables.
- section: Практика читання (Reading Practice)
  words: 400
  points:
  - Construct a progressive reading drill starting with syllables (то, по, ро, со)
    and building up to full words.
  - Create an H3 for 'International Words' containing words like 'ресторан', 'транспорт',
    'порт', allowing learners to easily guess the meaning after decoding.
  - Create an H3 for 'Everyday Vocabulary' featuring 'пошта' and 'хліб'.
  - Embed a recommendation box for the Anna Ohoiko pronunciation video playlist (PLpkSIXDyaJi3mlJlKXWKhdiJZj67fPXQV)
    for independent auditory drilling.
- section: Підсумок (Summary)
  words: 200
  points:
  - Provide a concluding read-aloud paragraph consisting of 3-4 short, simple sentences
    that incorporate all 22 letters learned so far, plus the digraphs.
  - 'Present a self-assessment checklist: ''Can I distinguish П and Р?'', ''Can I
    pronounce О clearly when it is not stressed?''.'
  - Include a visual progress marker showing that the learner has now mastered 22
    out of 33 letters.
activity_hints:
- type: group-sort
  focus: Sort letters into vowels vs consonants
  items: 12
- type: quiz
  focus: Letter identification and sound matching
  items: 20
- type: match-up
  focus: Letter-sound pairs including digraphs
  items: 15
