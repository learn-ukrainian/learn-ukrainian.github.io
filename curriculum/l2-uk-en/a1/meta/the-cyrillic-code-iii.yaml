slug: the-cyrillic-code-iii
title: The Cyrillic Code III
word_target: 1200
content_outline:
- title: –í—Ā—ā—É–Ņ ‚ÄĒ Introduction
  slug: vstup-introduction
  words: 150
  points:
  - 'Welcome and warm-up: read 3 familiar words from Code I & II (–ľ–ĺ–Ľ–ĺ–ļ–ĺ, –ļ—Ė—ā, –ľ—Ė—Ā—ā–ĺ)
    to build confidence.'
  - 'Module objective: Introduce 9 new consonants (–Ď, –Ē, –ü, –ó, –ď, –•, –Ė, –®, –ß) unlocking
    23 letters total.'
  - Briefly introduce the key concept of '–ī–∑–≤—Ė–Ĺ–ļ—Ė —ā–į –≥–Ľ—É—Ö—Ė' (voiced and voiceless)
    pairs with English scaffolding.
- title: –ü—Ä–ł–≥–ĺ–Ľ–ĺ—Ā–Ĺ—Ė ‚ÄĒ Consonants –Ď, –Ē, –ü
  slug: consonants-b-d-p
  words: 250
  points:
  - Introduce –Ď (/b/, –Ī–į–Ĺ–į–Ĺ, –Ī—É–ī–ł–Ĺ–ĺ–ļ) and –Ē (/d/, –ī—Ė–ľ). Note that Ukrainian –Ē is dental.
  - Introduce –ü (/p/, –Ņ–į–≤—É–ļ). Emphasize that Ukrainian –ü is unaspirated (no puff of
    air).
  - 'Visual Trap Alert: Explicitly contrast the new letter –ü (/p/, looks like a platform)
    with the previously learned –† (/r/) using minimal pairs (–Ņ–į–Ľ–ļ–į vs —Ä–į–ļ–Ķ—ā–į).'
- title: –ü—Ä–ł–≥–ĺ–Ľ–ĺ—Ā–Ĺ—Ė ‚ÄĒ Consonants –ó, –ď, –•
  slug: consonants-z-g-kh
  words: 250
  points:
  - Introduce –ó (/z/, –∑–Ķ–Ī—Ä–į, –∑—É–Ī) as the voiced partner to the already known –°.
  - Introduce –ď (/…¶/, –≥–ĺ—Ä–į, –≥–į–∑–Ķ—ā–į) as a soft, throaty glottal fricative, explicitly
    NOT a hard English 'g'. Preview that the hard 'g' is coming in Code IV (“ź).
  - Introduce –• (/x/, —Ö–Ľ—Ė–Ī) with articulatory guidance (like Scottish 'loch' or German
    'ach'). Mention the '—Ö–Ľ—Ė–Ī-—Ā—Ė–Ľ—Ć' cultural tradition.
- title: –Ē–∑–≤—Ė–Ĺ–ļ—Ė —ā–į –≥–Ľ—É—Ö—Ė ‚ÄĒ Voiced and Voiceless Pairs
  slug: voiced-voiceless-pairs
  words: 250
  points:
  - 'Interactive physical test: Instruct learners to place a hand on their throat
    to feel the vibration for voiced sounds.'
  - 'Introduce the remaining sibilants and affricate: –Ė (–∂—É–ļ), –® (—ą–į–Ņ–ļ–į), –ß (—á–Ķ—Ä–Ķ–Ņ–į—Ö–į).'
  - 'Summarize and map the voiced/voiceless pairs: –Ď‚ÜĒ–ü, –Ē‚ÜĒ–Ę, –ď‚ÜĒ–•, –Ė‚ÜĒ–®, –ó‚ÜĒ–°.'
- title: –ü—Ä–į–ļ—ā–ł–ļ–į —á–ł—ā–į–Ĺ–Ĺ—Ź ‚ÄĒ Reading Practice
  slug: reading-practice
  words: 200
  points:
  - 'Reading drills using internationalisms to build immediate confidence: –Ī–į–Ĺ–ļ, –Ņ–į—Ä–ļ,
    —ā—Ä–į–Ĺ—Ā–Ņ–ĺ—Ä—ā.'
  - 'Voiced/voiceless minimal pair discrimination drills: –∑—É–Ī vs —Ā—É–Ņ, –∂–į—Ä vs —ą–į—Ä.'
  - 'Read practical everyday vocabulary using the 23 known letters: —ą–ļ–ĺ–Ľ–į, –Ņ–ĺ—ą—ā–į,
    —á–į–Ļ.'
- title: –ü—Ė–ī—Ā—É–ľ–ĺ–ļ ‚ÄĒ Summary
  slug: pidsumok-summary
  words: 100
  points:
  - 'Congratulate the learner: 23 out of 33 letters are now unlocked, making most
    common text readable.'
  - 'Self-check question 1: Can you feel the difference in your throat between –Ď and
    –ü?'
  - 'Self-check question 2: What is the visual difference between the letters –ü and
    –†?'
  - 'Self-check question 3: How do you pronounce –ď vs –•?'
  - 'Preview: Code IV will cover the final 10 letters and special symbols to complete
    the alphabet.'
activity_hints:
- type: group-sort
  focus: Sort letters into vowels vs consonants
  items: 12
- type: quiz
  focus: Letter identification and sound matching
  items: 20
- type: match-up
  focus: Letter-sound pairs including digraphs
  items: 15
