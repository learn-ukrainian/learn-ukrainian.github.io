inline:
  - id: act-1
    type: quiz
    title: Де or куди?
    instruction: Choose the question that matches the sentence.
    items:
      - prompt: 'Я йду в банк.'
        options:
          - text: 'Куди?'
            correct: true
          - text: 'Де?'
            correct: false
          - text: 'Хто?'
            correct: false
        explanation: 'Йду shows movement, so ask куди?'
      - prompt: 'Оксана на пошті.'
        options:
          - text: 'Де?'
            correct: true
          - text: 'Куди?'
            correct: false
          - text: 'Коли?'
            correct: false
        explanation: 'На пошті is a static location.'
      - prompt: 'Ми їдемо у Львів.'
        options:
          - text: 'Куди?'
            correct: true
          - text: 'Де?'
            correct: false
          - text: 'Що?'
            correct: false
        explanation: 'Їдемо is movement by transport.'
      - prompt: 'Книжка на столі.'
        options:
          - text: 'Де?'
            correct: true
          - text: 'Куди?'
            correct: false
          - text: 'Звідки?'
            correct: false
        explanation: 'На столі answers where the book is.'
      - prompt: 'Марко їде на вокзал.'
        options:
          - text: 'Куди?'
            correct: true
          - text: 'Де?'
            correct: false
          - text: 'Який?'
            correct: false
        explanation: 'Їде на вокзал is movement toward a place.'
      - prompt: 'Я працюю в офісі.'
        options:
          - text: 'Де?'
            correct: true
          - text: 'Куди?'
            correct: false
          - text: 'Коли?'
            correct: false
        explanation: 'Працюю shows a static place.'
      - prompt: 'Олена йде в аптеку.'
        options:
          - text: 'Куди?'
            correct: true
          - text: 'Де?'
            correct: false
          - text: 'Хто?'
            correct: false
        explanation: 'Йде в аптеку is movement toward a place.'
      - prompt: 'Степан на роботі.'
        options:
          - text: 'Де?'
            correct: true
          - text: 'Куди?'
            correct: false
          - text: 'Що?'
            correct: false
        explanation: 'На роботі answers де?'
  - id: act-2
    type: fill-in
    title: Static and direction phrases
    instruction: Complete each sentence with the correct place phrase.
    items:
      - sentence: 'Я йду ___ банк.'
        answer: 'у'
        options:
          - 'у'
          - 'на'
          - 'до'
        explanation: 'The direction phrase is у банк.'
      - sentence: 'Олена йде ___ роботу.'
        answer: 'на'
        options:
          - 'на'
          - 'в'
          - 'біля'
        explanation: 'Use на роботу for going to work.'
      - sentence: 'Ми йдемо в ___.'
        answer: 'аптеку'
        options:
          - 'аптеку'
          - 'аптеці'
          - 'аптека'
        explanation: 'Куди? changes аптека to аптеку.'
      - sentence: 'Степан йде у ___.'
        answer: 'бібліотеку'
        options:
          - 'бібліотеку'
          - 'бібліотеці'
          - 'бібліотека'
        explanation: 'Куди? uses у бібліотеку.'
      - sentence: 'Я їду ___ вокзал.'
        answer: 'на'
        options:
          - 'на'
          - 'в'
          - 'у'
        explanation: 'The route phrase is на вокзал.'
      - sentence: 'Марко йде ___ зупинку.'
        answer: 'на'
        options:
          - 'на'
          - 'в'
          - 'біля'
        explanation: 'Use на зупинку for going to a stop.'
      - sentence: 'Він у ___.'
        answer: 'банку'
        options:
          - 'банку'
          - 'банк'
          - 'банком'
        explanation: 'Де? uses the static phrase у банку.'
      - sentence: 'Оксана на ___.'
        answer: 'пошті'
        options:
          - 'пошті'
          - 'пошту'
          - 'пошта'
        explanation: 'Де? uses на пошті.'
      - sentence: 'Вона їде в ___.'
        answer: 'Одесу'
        options:
          - 'Одесу'
          - 'Одесі'
          - 'Одеса'
        explanation: 'Куди? changes Одеса to Одесу.'
      - sentence: 'Я працюю на ___.'
        answer: 'роботі'
        options:
          - 'роботі'
          - 'роботу'
          - 'робота'
        explanation: 'Працюю answers де?, so use на роботі.'
  - id: act-3
    type: group-sort
    title: Де? or куди? shelves
    instruction: Sort each phrase into static location or direction.
    groups:
      - name: 'Static де?'
        items:
          - 'у школі'
          - 'на роботі'
          - 'у банку'
          - 'в аптеці'
          - 'в Одесі'
      - name: 'Direction куди?'
        items:
          - 'у школу'
          - 'на роботу'
          - 'у банк'
          - 'в аптеку'
          - 'в Одесу'
  - id: act-4
    type: quiz
    title: Іти or їхати?
    instruction: Choose the movement verb that fits the sentence.
    items:
      - prompt: 'I am going to the shop on foot.'
        options:
          - text: 'Я йду в магазин.'
            correct: true
          - text: 'Я їду в магазин.'
            correct: false
          - text: 'Я в магазині.'
            correct: false
        explanation: 'On foot uses йду.'
      - prompt: 'We are going to the station by bus.'
        options:
          - text: 'Ми їдемо на вокзал.'
            correct: true
          - text: 'Ми йдемо на вокзал.'
            correct: false
          - text: 'Ми на вокзалі.'
            correct: false
        explanation: 'By bus uses їдемо.'
      - prompt: 'Oksana is going to Lviv by train.'
        options:
          - text: 'Оксана їде у Львів.'
            correct: true
          - text: 'Оксана йде у Львів.'
            correct: false
          - text: 'Оксана у Львові.'
            correct: false
        explanation: 'By train uses їде.'
      - prompt: 'Stepan is walking to the post office.'
        options:
          - text: 'Степан йде на пошту.'
            correct: true
          - text: 'Степан їде на пошту.'
            correct: false
          - text: 'Степан на пошті.'
            correct: false
        explanation: 'Walking uses йде.'
      - prompt: 'They are going to the park on foot.'
        options:
          - text: 'Вони йдуть у парк.'
            correct: true
          - text: 'Вони їдуть у парк.'
            correct: false
          - text: 'Вони в парку.'
            correct: false
        explanation: 'On foot uses йдуть.'
      - prompt: 'I am going to Odesa by train.'
        options:
          - text: 'Я їду в Одесу.'
            correct: true
          - text: 'Я йду в Одесу.'
            correct: false
          - text: 'Я в Одесі.'
            correct: false
        explanation: 'By train uses їду.'
workbook:
  - type: true-false
    title: Movement guardrails
    instruction: Decide whether the statement fits the lesson.
    items:
      - statement: 'Іти usually means going on foot.'
        answer: true
        explanation: 'Use іти for walking or general movement.'
      - statement: 'Їхати usually means going by transport.'
        answer: true
        explanation: 'Use їхати when a vehicle is part of the idea.'
      - statement: 'Я йду у школу answers куди?'
        answer: true
        explanation: 'It is movement toward school.'
      - statement: 'Я в школі answers куди?'
        answer: false
        explanation: 'Я в школі answers де?'
      - statement: 'Додому can answer куди?'
        answer: true
        explanation: 'Я повертаюся додому answers where to.'
      - statement: 'Kyiv is the Ukrainian English form for Київ.'
        answer: true
        explanation: 'Use Київ / Kyiv.'
  - type: order
    title: Saturday errands
    instruction: Put the route in a natural order.
    is_ukrainian: true
    items:
      - 'Спочатку я йду в банк.'
      - 'Потім я йду на пошту.'
      - 'Після цього йду в аптеку.'
      - 'Потім їду на вокзал.'
      - 'Увечері йду в кафе.'
      - 'Нарешті повертаюся додому.'
    correct_order: [0, 1, 2, 3, 4, 5]
  - type: odd-one-out
    title: Find the wrong route
    instruction: Choose the phrase that does not fit the pattern.
    items:
      - words:
          - 'у школу'
          - 'на роботу'
          - 'в аптеку'
          - 'у школі'
        answer: 'у школі'
        explanation: 'The first three answer куди?; у школі answers де?'
      - words:
          - 'у банку'
          - 'на роботі'
          - 'в аптеці'
          - 'в аптеку'
        answer: 'в аптеку'
        explanation: 'В аптеку is direction; the others are static locations.'
      - words:
          - 'на пошту'
          - 'на роботу'
          - 'на вокзал'
          - 'на бібліотеку'
        answer: 'на бібліотеку'
        explanation: 'Бібліотека uses у/в бібліотеку for direction.'
      - words:
          - 'в Київ'
          - 'у Львів'
          - 'в Одесу'
          - 'у Києві'
        answer: 'у Києві'
        explanation: 'У Києві is static; the others are directions.'
  - type: error-correction
    title: Repair where-to interference
    instruction: Choose the natural Ukrainian sentence.
    items:
      - sentence: 'Я йду в школі.'
        error: 'в школі'
        correction: 'Я йду у школу.'
        options:
          - 'Я йду у школу.'
          - 'Я йду в школі.'
          - 'Я йду школа.'
        explanation: 'Йду asks куди?, so use у школу.'
      - sentence: 'Я живу Київ.'
        error: 'живу Київ'
        correction: 'Я живу в Києві. (або у Києві)'
        options:
          - 'Я живу в Києві. (або у Києві)'
          - 'Я живу Київ.'
          - 'Я живу до Києва.'
        explanation: 'Жити answers де? and needs в/у plus locative.'
      - sentence: 'Я йду в бібліотеці.'
        error: 'в бібліотеці'
        correction: 'Я йду в бібліотеку.'
        options:
          - 'Я йду в бібліотеку.'
          - 'Я йду в бібліотеці.'
          - 'Я йду бібліотека.'
        explanation: 'Йду asks куди?, so use в бібліотеку.'
      - sentence: 'Ми були в концерті.'
        error: 'в концерті'
        correction: 'Ми були на концерті.'
        options:
          - 'Ми були на концерті.'
          - 'Ми були в концерті.'
          - 'Ми були до концерту.'
        explanation: 'The familiar event phrase is на концерті.'
      - sentence: 'Книжка на столу.'
        error: 'на столу'
        correction: 'Книжка на столі.'
        options:
          - 'Книжка на столі.'
          - 'Книжка на столу.'
          - 'Книжка в стіл.'
        explanation: 'Static surface location uses на столі.'
      - sentence: 'Аптека — в аптекі.'
        error: 'в аптекі'
        correction: 'Аптека — в аптеці.'
        options:
          - 'Аптека — в аптеці.'
          - 'Аптека — в аптекі.'
          - 'Аптека — в аптеку.'
        explanation: 'Аптека changes to в аптеці for де?'
