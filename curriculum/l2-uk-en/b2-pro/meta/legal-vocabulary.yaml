slug: legal-vocabulary
title: Юридична лексика
word_target: 4000
content_outline:
  - section: 'Розминка: Юридична мова як окремий світ'
    words: 500
    points:
      - 'Чому юридична мова така складна: прагнення до однозначності та відсутності
        двозначностей'
      - Україна як країна романо-германської правової сім'ї (Civil Law) vs Common
        Law
      - Поняття юридичної сили документа та роль ДСТУ 4163:2020 у формалізації
  - section: 'Договірне право: Сторони та структура документа'
    words: 900
    points:
      - 'Термінологія сторін: замовник, виконавець, підрядник, клієнт'
      - 'Види документів: договір vs контракт vs додаткова угода (supplementary agreement)'
      - 'Дії з договором: правильне вживання ''укласти'', ''розірвати'', ''пролонгувати'''
      - 'Істотні умови договору: предмет, ціна та строк дії згідно з ЦКУ'
  - section: 'Зобов''язання та відповідальність: Штрафи та форс-мажор'
    words: 900
    points:
      - 'Модальні дієслова зобов''язання: ''зобов''язується'', ''має право'', ''повинен'''
      - 'Система покарань: неустойка як спільна категорія для штрафу та пені'
      - 'Відшкодування збитків: прямі збитки та упущена вигода'
      - 'Обставини непереборної сили (форс-мажор): що визнає ТПП України'
  - section: Власність та інтелектуальні права в бізнесі
    words: 700
    points:
      - 'Тріада права власності: володіння, користування, розпорядження'
      - 'Об''єкти ІВ: торговельна марка (ТМ), авторське право, ліцензійні умови'
      - Формулювання передачі прав у договорах на розробку чи консалтинг
  - section: 'Аналіз типового договору: від преамбули до реквізитів'
    words: 500
    points:
      - Розбір структури договору про надання послуг (Service Level Agreement - SLA)
      - 'Юридичні кліше: ''надалі — Сторони'', ''що діє на підставі'', ''в особі'''
      - 'На що звертати увагу: автоматичне продовження, умови розірвання та юрисдикція
        суду'
  - section: 'Практичний практикум: Пошук ризиків та точностей'
    words: 500
    points:
      - 'Аналіз тексту на наявність ''капканів'': нечіткі строки, приховані штрафи'
      - 'Визначення прав та обов''язків: як уникнути дисбалансу на користь однієї
        сторони'
      - 'Вимоги до реквізитів: банківські дані та юридична адреса'
