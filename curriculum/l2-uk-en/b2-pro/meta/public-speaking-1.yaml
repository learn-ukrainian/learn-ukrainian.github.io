slug: public-speaking-1
title: 'Ораторство I: Структура'
word_target: 2000
content_outline:
- section: 'Розминка: Ораторське мистецтво у професійному житті'
  words: 300
  points:
  - Чому навички публічного виступу — це hard skill для сучасного лідера
  - 'Трансформація української риторичної традиції: від академізму до бізнес-динаміки'
  - Відмінності між презентацією (візуальною) та ораторським виступом (вербальним)
- section: 'Архітектура виступу: Вступ та прийоми захоплення уваги'
  words: 350
  points:
  - 'Формула ідеального вступу: привітання, представлення та встановлення контакту'
  - 'Методи «захоплення» (Hooks): риторичне запитання, шокуюча статистика, актуальна
    історія'
  - 'Постановка мети: чому аудиторія повинна вас слухати саме зараз'
- section: 'Логіка виступу: Основна частина та сигнальні фрази'
  words: 350
  points:
  - 'Правило трьох: структурування основної частини навколо ключових аргументів'
  - Сигнальні фрази як інструмент навігації («Дозвольте підкреслити...», «Звернімося
    до фактів...»)
  - 'Висновок: техніка резюмування та потужний заклик до дії (Call to Action)'
- section: 'Стратегія підготовки: Аналіз аудиторії та ключовий меседж'
  words: 350
  points:
  - 'Портрет слухача: цінності, бар''єри та рівень експертизи'
  - 'Формулювання ключового повідомлення: одна думка, яку заберуть із собою слухачі'
  - Перехід від інформаційного хаосу до чіткого логічного плану
- section: 'Мова оратора: Від тексту до живої комунікації'
  words: 350
  points:
  - 'Специфіка усної мови: лаконічність, динамічність та уникнення канцеляризмів'
  - Риторичні фігури (метафори, антитези) як засіб професійної переконливості
  - 'Робота з ритмом та паузами: як мовчання може бути красномовнішим за слова'
- section: Практичний кейс та чек-лист для самопідготовки
  words: 300
  points:
  - 'Аналіз зразкового професійного виступу: розбір структури та мовних засобів'
  - Типові мовні помилки (русизми) та їх нейтралізація в прямому ефірі
  - 'Чек-лист оратора: 10 пунктів перед виходом на сцену або в Zoom'
