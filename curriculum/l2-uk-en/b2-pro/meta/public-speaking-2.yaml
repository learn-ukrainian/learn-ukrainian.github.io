slug: public-speaking-2
title: 'Ораторство II: Переконання'
word_target: 2000
content_outline:
- section: 'Мистецтво переконання: Етика та межі'
  words: 300
  points:
  - Відмінність між переконанням (свідома згода) та маніпуляцією (прихований тиск)
  - 'Етичний кодекс оратора: чесність, повага до опонента, прозорість цілей'
  - Роль переконання в професійному зростанні та управлінні проектами
- section: 'Три стовпи риторики: Етос, Пафос, Логос'
  words: 400
  points:
  - 'Етос: формування авторитету через експертність та професійний бекграунд'
  - 'Пафос: емоційне залучення через спільні цінності та соціальну відповідальність'
  - 'Логос: використання верифікованих даних, статистики та логічних ланцюжків'
  - Баланс компонентів залежно від типу зустрічі (рада директорів vs виступ перед
    волонтерами)
- section: 'Емоційний вплив: Сторітелінг та візуалізація'
  words: 400
  points:
  - 'Структура професійної історії: від проблеми до успішного кейсу'
  - 'Техніка ''Уявіть собі'': використання модальних часток та умовного способу для
    візуалізації'
  - 'Риторичні фігури: повтор, градація та контраст (проблема vs рішення)'
  - Етичні рамки використання емоцій у бізнес-середовищі
- section: 'Логіка переконання: Аргументи та контраргументи'
  words: 400
  points:
  - 'Анатомія аргументу: теза, підтверджувальні факти, логічний висновок'
  - 'Класифікація доказів: від жорсткої статистики до експертних висновків'
  - 'Випередження заперечень: як інтегрувати відповіді на сумніви в основний текст'
  - 'Аналіз логічних хиб: підміна тези та поспішні узагальнення'
- section: Взаємодія зі скептичною аудиторією
  words: 350
  points:
  - 'Типологія важких слухачів: ''скептик'', ''всезнайко'', ''критик'''
  - Вербальні та невербальні сигнали опору аудиторії та реакція на них
  - Техніки амортизації конфлікту та переведення критики в конструктивне русло
  - Адаптація промови в реальному часі на основі фідбеку
- section: 'Практичний практикум: Підготовка виступу'
  words: 150
  points:
  - Алгоритм підготовки 5-хвилинної промови про зміни в компанії
  - 'Критерії самооцінки переконливості: від структури до мови тіла'
  - Формулювання фінального заклику до дії (Call to Action)
