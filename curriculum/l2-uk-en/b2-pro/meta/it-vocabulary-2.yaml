slug: it-vocabulary-2
title: 'ІТ-лексика II: Розробка та хмарні технології'
word_target: 2000
content_outline:
- section: 'Розминка: Стан мови в українському ІТ'
  words: 250
  points:
  - 'Аналіз англіцизмів: деплой, мердж, фікс — сленг проти норми'
  - Правила відмінювання запозичених дієслів в ІТ-контексті
  - Різниця між робочим чатом та офіційною документацією за ДСТУ 4163
- section: 'Розробка ПЗ: Життєвий цикл та робота з кодом'
  words: 350
  points:
  - 'Етапи розробки: від аналізу вимог до розгортання (deployment)'
  - 'Термінологія кодування: вихідний код, налагодження (debugging), рефакторинг'
  - 'ДСТУ ISO/IEC 12207: офіційні назви процесів життєвого циклу'
- section: Інструменти розробки та гнучкі методології
  words: 300
  points:
  - 'Системи контролю версій: репозиторій, гілки та запити на злиття (PR)'
  - 'Agile-філософія українською: спринти, беклог та щоденні наради'
  - Порівняння Scrum та Kanban у термінах управління проєктами
- section: 'Хмарні обчислення: Сервісні моделі та терміни'
  words: 350
  points:
  - 'IaaS, PaaS, SaaS: українські еквіваленти та визначення за Законом про хмарні
    послуги'
  - 'Типи хмар: приватна, публічна та гібридна інфраструктура'
  - Як обговорювати сервіси AWS та Azure без надмірного вживання англіцизмів
- section: Хмарна інфраструктура та масштабованість
  words: 250
  points:
  - Масштабованість (scalability) та відмовостійкість (fault tolerance) як ключові
    вимоги
  - 'Хмарне сховище та віртуалізація ресурсів: термінологічний аналіз'
  - Поняття високої доступності (High Availability) в архітектурі систем
- section: 'Кібербезпека: Захист даних та протидія загрозам'
  words: 300
  points:
  - 'Класифікація загроз: фішинг, витік даних та шкідливе ПЗ (malware)'
  - 'Механізми захисту: автентифікація, авторизація та шифрування'
  - Роль міжмережевого екрана (брандмауера) в архітектурі безпеки
- section: 'Технічна документація: Аналіз структури ТЗ'
  words: 200
  points:
  - Аналіз зразка технічного завдання на розробку ПЗ
  - Специфіка офіційно-ділового стилю в ІТ-документах
  - Практичні поради щодо підготовки звіту про тестування
