slug: job-applications
title: Працевлаштування
word_target: 4000
content_outline:
  - section: Розминка — Пошук роботи в Україні
    words: 400
    points:
      - 'Огляд ринку праці в Україні: динаміка та ключові платформи (Work.ua, Robota.ua,
        LinkedIn)'
      - 'Очікування роботодавців: гнучкість, володіння мовою та професійні стандарти'
      - Поняття нетворкингу та рекомендацій у професійному середовищі
  - section: 'Резюме (CV) українською: Структура та мова досягнень'
    words: 900
    points:
      - Стандарти оформлення особистих даних згідно з ДСТУ 4163:2020 (Власне ім'я
        ПРІЗВИЩЕ)
      - 'Опис досвіду: використання дієслів досягнення (розробив, впровадив, налагодив)
        замість процесів'
      - 'Hard skills vs Soft skills: термінологія та приклади формулювань для B2 рівня'
      - Аналіз типових русизмів у розділі 'Освіта' (ВНЗ vs ВУЗ, здобуття освіти)
  - section: 'Супровідний лист: Від вступу до персоналізації'
    words: 800
    points:
      - 'Структура листа: логіка переконання рекрутера'
      - Вступні конструкції для різних джерел вакансії (рекомендація, оголошення,
        LinkedIn)
      - 'Персоналізація: як пов''язати свої навички з потребами конкретної компанії'
      - 'Етикет завершення: фрази для заклику до співбесіди'
  - section: 'Співбесіда українською: Техніка STAR та самопрезентація'
    words: 900
    points:
      - 'Відповідь на питання ''Розкажіть про себе'': акценти на професійній ідентичності'
      - Застосування техніки STAR (Ситуація, Завдання, Дія, Результат) для опису кейсів
      - Підготовка запитань до роботодавця про структуру команди та умови
      - Діловий етикет під час онлайн та офлайн інтерв'ю
  - section: Зразки документів та Salary Talk
    words: 500
    points:
      - 'Обговорення фінансових очікувань: термінологія (брутто/нетто, премії, соцпакет)'
      - Зразок ідеального резюме з лінгвістичним коментарем
      - Зразок супровідного листа для середньої та великої компанії
  - section: Практика — підготовка до працевлаштування
    words: 500
    points:
      - 'Чек-лист перед відправкою резюме: мовна чистота та актуальність'
      - 'Алгоритм самостійної підготовки до співбесіди: дослідження компанії'
      - 'Рефлексія: аналіз слабких сторін та перетворення їх на точки росту'
