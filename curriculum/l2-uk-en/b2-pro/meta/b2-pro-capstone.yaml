slug: b2-pro-capstone
title: 'Підсумок: B2-PRO'
word_target: 4000
content_outline:
  - section: 'Огляд рівня B2-PRO: Компетенції та критерії'
    words: 500
    points:
      - 'Аналіз трьох фаз навчання: ділова комунікація, фахова мова та медіа-комунікація'
      - 'Відповідність CEFR B2+: здатність до аргументації та використання складних
        мовних структур'
      - 'Критерії оцінювання: точність термінології, відповідність регістру та швидкість
        реакції'
  - section: 'Ділова комунікація: Переговори та документація'
    words: 800
    points:
      - 'Підготовка до переговорів: складання листа-запиту та позиційного документа'
      - 'Вимоги ДСТУ 4163:2020: оформлення реквізитів, підписів та дат у офіційному
        листуванні'
      - 'Фіксація домовленостей: правила ведення та оформлення протоколу зустрічі'
      - 'Мовний етикет у переговорах: стратегії ввічливого переконання та компромісу'
  - section: 'Фахова мова: Презентація проєкту та обґрунтування'
    words: 800
    points:
      - 'Термінологія управління проєктами: КПЕ, стейкхолдери, етапи впровадження'
      - 'Фінансове та правове обґрунтування: використання галузевої лексики без русизмів'
      - 'Адаптація контенту для різних аудиторій: від інвесторів до технічних виконавців'
      - Типові помилки у фахових описах та способи їх уникнення (кальки та калькування)
  - section: 'Медіакомунікація: Публічний виступ на конференції'
    words: 700
    points:
      - 'Структура виступу: від ефектного вступу до переконливого висновку'
      - Кліше та мовні формули для логічних переходів та наголошення на головному
      - 'Мистецтво відповідей на запитання: робота з аудиторією та обробка складних
        реплік'
      - Уникнення слів-паразитів та надмірної термінології у публічному мовленні
  - section: 'Інтегроване підсумкове завдання: Міжнародний форум'
    words: 800
    points:
      - 'Комплексний сценарій: рольова гра ''Представник українського бізнесу на форумі'''
      - 'Техніки професійного нетворкінгу: Small talk та обмін контактами (follow-up)'
      - 'Побудова медіакоментаря: лаконічність та передача ключових повідомлень (key
        messages)'
      - Інтеграція граматичних конструкцій B2-PRO у живому спонтанному мовленні
  - section: Підсумок, сертифікація та план подальшого розвитку
    words: 400
    points:
      - 'Підсумковий чек-лист компетенцій: самооцінка прогресу за рівнем B2-PRO'
      - Ресурси для підтримки професійної української мови та галузевого саморозвитку
      - Перспективи переходу до рівня C1-PRO та спеціалізованих треків
