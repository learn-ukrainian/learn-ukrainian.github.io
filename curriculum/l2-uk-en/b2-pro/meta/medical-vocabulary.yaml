slug: medical-vocabulary
title: Медична лексика
word_target: 4000
content_outline:
  - section: Розминка — Медична українська для бізнесу
    words: 500
    points:
      - Чому медична грамотність є частиною професійної етики та бізнес-культури
      - 'Огляд системи охорони здоров''я в Україні: НСЗУ, Helsi та роль декларації'
      - 'Державна та приватна медицина: термінологія страхування та послуг'
  - section: Частини тіла та системи організму
    words: 800
    points:
      - 'Зовнішня анатомія: голова, тулуб, кінцівки та ділянки тіла (поперек, потилиця)'
      - 'Внутрішні органи: серце, легені, печінка, нирки — правильна вимова та вживання'
      - 'Огляд головних систем: серцево-судинна, травна, дихальна та нервова'
  - section: Симптоми та скарги
    words: 900
    points:
      - 'Градація та характер болю: гострий, тупий, ріжучий, ниючий, пульсуючий'
      - 'Загальні стани: підвищена температура, запаморочення, нудота, задишка'
      - 'Мовні конструкції для опису стану: ''мене турбує...'', ''у мене болить...'',
        ''мені зле'''
      - Опис тривалості (нападоподібний, постійний) та інтенсивності симптомів
  - section: У лікаря
    words: 800
    points:
      - 'Процес візиту: запис на прийом, черга, талон та реєстратура'
      - 'Дії на прийомі: огляд, збір анамнезу, призначення аналізів та діагностика'
      - 'Фармацевтична лексика: виписати рецепт, дозування ліків (таблетки, мазь,
        ін’єкції)'
      - 'Медична документація: направлення до спеціаліста та листок непрацездатності'
  - section: Зразок діалогу з лікарем
    words: 500
    points:
      - Аналіз реалістичної розмови пацієнта та лікаря в сучасній українській клініці
      - Етикетні формули та професійна комунікація під час огляду
      - Розбір ключової термінології з контексту діалогу
  - section: Практика — опишіть симптоми
    words: 500
    points:
      - Завдання на відпрацювання навичок опису стану здоров’я за кейсами
      - 'Рольова гра: симуляція прийому у терапевта або вузького спеціаліста'
      - Аналіз зразка рецепта та перевірка розуміння лікарських призначень
