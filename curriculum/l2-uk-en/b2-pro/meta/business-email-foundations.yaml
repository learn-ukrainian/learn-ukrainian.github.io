slug: business-email-foundations
title: 'Ділові листи: Основи'
word_target: 2000
content_outline:
- section: 'Розминка: Український діловий лист vs англійський'
  words: 800
  points:
  - 'Культурна специфіка українського бізнес-етикету: чому формальність досі має значення.'
  - 'Велика ''Ви'' як інструмент поваги та професійної дистанції: правила та винятки.'
  - 'Прямолінійність проти ввічливості: як адаптувати англомовний стиль під українські
    очікування.'
- section: 'Анатомія ділового листа: Звертання та вступні формули'
  words: 800
  points:
  - Правила вибору звертання (Шановний пане/пані) та обов'язкове вживання кличного
    відмінка.
  - 'Вступна частина: як правильно сформулювати мету листа (reference) та посилання
    на попередні контакти.'
  - Роль преамбули у створенні правильного тону для подальшої комунікації.
- section: 'Анатомія ділового листа: Структура тексту та фінальні реквізити'
  words: 800
  points:
  - 'Логіка викладу: правило ''один абзац — одна думка'' та використання маркованих
    списків для чіткості.'
  - 'Формули завершення листа: від нейтрального ''З повагою'' до персоналізованих
    побажань.'
  - 'Оформлення підпису згідно з ДСТУ 4163:2020: посада, ім''я та контактна інформація.'
- section: 'Ключова лексика ділового листування: Статуси та дії'
  words: 800
  points:
  - 'Професійний словник: відмінності між ''на розгляд'', ''до відома'' та ''на виконання''.'
  - 'Дієслова офіційного стилю: надіслати, скерувати, порушити питання, вжити заходів.'
  - 'Електронні додатки: правильна термінологія для ''attachments'' (вкладення, додаток).'
- section: Три зразки листів з аналізом та практичне застосування
  words: 800
  points:
  - 'Розбір трьох типів листів: запит інформації, відповідь клієнту та внутрішня комунікація.'
  - Ідентифікація та виправлення типових помилок (згідно з, протягом, вважаю).
  - 'Сценарій фінальної практики: написання першого листа колезі з дотриманням усіх
    норм регістра.'
