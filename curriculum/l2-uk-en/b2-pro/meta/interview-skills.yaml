slug: interview-skills
title: 'Інтерв''ю: Мистецтво розмови'
word_target: 4000
content_outline:
  - section: Інтерв'ю як стратегічний жанр професійної комунікації
    words: 500
    points:
      - 'Інтерв''ю за межами журналістики: HR-зустрічі, експертні коментарі, корпоративні
        подкасти'
      - 'Розподіл ролей: відповідальність інтерв''юера за динаміку та респондента
        за зміст'
      - Чому вміння давати інтерв'ю є частиною персонального бренду професіонала
  - section: 'Підготовка респондента: Від ключових повідомлень до стратегії'
    words: 700
    points:
      - 'Формулювання ключових повідомлень (key messages): лаконічність та відповідність
        цілям'
      - Підготовка 'пула прикладів' та актуальної статистики для аргументації
      - 'Психологічна підготовка: техніка ''завжди увімкненого мікрофона'''
  - section: 'Техніки відповідей: Bridging та контроль розмови'
    words: 800
    points:
      - 'Метод ABC (Acknowledge, Bridge, Communicate): як не ухилятися, а перенаправляти'
      - Фрази-містки для переходу до головної теми (Це цікаво, проте ключове тут...)
      - 'Робота зі складними та провокативними запитаннями: техніка ''прапора'' (flagging)'
  - section: 'Майстерність інтерв''юера: Мистецтво ставити запитання'
    words: 800
    points:
      - 'Типологія запитань: чому відкриті запитання кращі за закриті для професійного
        інтерв''ю'
      - Активне слухання та техніка уточнювальних запитань (follow-up questions)
      - Контроль таймінгу та ввічливе повернення респондента до теми розмови
  - section: Формати, стандарти та етика комунікації
    words: 600
    points:
      - Специфіка відео-інтерв'ю (візуальність) та подкастів (сила голосу та темпу)
      - Етика 'Off the record' та право на авторизацію (перевірку) цитат
      - 'Мовні норми: вживання фемінітивів (інтерв''юерка) та уникнення канцеляризмів'
  - section: Аналіз реальних кейсів та практичні сценарії
    words: 600
    points:
      - Розбір типових мовних помилок (задавати питання vs ставити запитання)
      - Аналіз фрагментів успішних та невдалих інтерв'ю відомих українських діячів
      - 'Критерії оцінювання ефективності інтерв''ю: досягнення цілей комунікації'
