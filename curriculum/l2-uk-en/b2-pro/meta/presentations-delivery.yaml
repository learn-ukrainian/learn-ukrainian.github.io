slug: presentations-delivery
title: 'Презентації: Виступ'
word_target: 2000
content_outline:
- section: Розминка — Виступ як комунікація з аудиторією
  words: 300
  points:
  - 'Чому читання зі слайдів руйнує довіру: психологічні та професійні аспекти'
  - 'Невербальна комунікація: погляд, голос та мова тіла в українському контексті'
  - 'Українська специфіка: поєднання професійної формальності та поваги до статусу
    аудиторії'
- section: Робота з аудиторією під час виступу
  words: 400
  points:
  - 'Методи залучення: риторичні запитання («Чи знаєте ви...?») та інтерактивні вправи'
  - 'Перевірка розуміння: етичні фрази («Чи потрібно пояснити детальніше?») замість
    пасивного очікування'
  - 'Реакція на невербальні сигнали: як професійно відреагувати на втому або зацікавленість
    залу'
  - 'Інструментарій оратора: керування увагою через паузи, інтонаційні акценти та
    темп мовлення'
- section: Робота зі слайдами
  words: 400
  points:
  - 'Навігація по слайдах: професійні переходи («Як ви бачите на слайді...», «Це підводить
    нас до...»)'
  - 'Пояснення візуалізації: термінологія для графіків та діаграм згідно з бізнес-стандартами'
  - 'Баланс між текстом та мовою: коли слайд є допоміжним, а коли — основним інструментом'
  - 'Технічний етикет: реакція на збої обладнання без втрати професійного обличчя
    (фрази-заготовки)'
- section: 'Відповіді на запитання: Основні стратегії'
  words: 300
  points:
  - 'Запрошення до дискусії: як професійно відкрити сесію запитань (фраза «Буду радий
    відповісти...»)'
  - 'Техніка уточнення: перефразування запитання для перевірки розуміння («Чи правильно
    я зрозумів...?»)'
  - 'Дякування за запитання: як використовувати вдячність для налагодження контакту'
- section: 'Відповіді на запитання: Складні ситуації'
  words: 350
  points:
  - 'Робота з незручними запитаннями: техніка ''відкладеної відповіді'' («Я уточню
    і повернуся до вас...»)'
  - Мовні конструкції для пом'якшення відмови або незгоди («Це цікавий аспект, проте
    з нашого досвіду...»)
  - 'Типові мовні помилки в Q&A сесіях: уникнення кальок («задавати питання», «приймати
    участь»)'
- section: Зразок діалогу Q&A та практичне відпрацювання
  words: 250
  points:
  - 'Реалістичний сценарій Q&A: аналіз успішних та неуспішних мовних стратегій спікера'
  - 'Симуляційні завдання: проведення 5-хвилинного виступу з фокусом на залучення
    та слайди'
  - 'Чек-лист самооцінки: аналіз професійного реєстру та використання термінології'
