slug: meeting-minutes
title: 'Наради: Протоколювання'
word_target: 4000
content_outline:
  - section: 'Розминка: Юридична сила та значення протоколу'
    words: 600
    points:
      - Чому протокол є підставою для управлінських рішень та наказів
      - 'Розподіл відповідальності: головуючий проти секретаря'
      - Юридичні наслідки неправильного оформлення (ДСТУ 4163:2020)
  - section: 'Структура протоколу: Від «шапки» до порядку денного'
    words: 700
    points:
      - 'Обов''язкові реквізити: дата, номер, місце складення'
      - 'Оформлення списку присутніх: алфавітний порядок та ієрархія'
      - Правила формулювання порядку денного (Називний відмінок питань)
  - section: 'Мовна формула: СЛУХАЛИ — ВИСТУПИЛИ — УХВАЛИЛИ'
    words: 800
    points:
      - 'СЛУХАЛИ: Формулювання доповідей та інформаційних повідомлень'
      - 'ВИСТУПИЛИ: Лаконічна фіксація думок та пропозицій учасників'
      - 'УХВАЛИЛИ: Використання інфінітива для формулювання рішень'
  - section: 'Трансформація: Від стенограми до ділового стилю'
    words: 700
    points:
      - Як перетворювати емоційні усні виступи на сухі протокольні тези
      - Що фіксувати дослівно, а що підлягає узагальненню
      - Уникнення канцеляризмів та зайвих слів («виступив з промовою» vs «доповів»)
  - section: 'Доручення: Алгоритм «Дія — Виконавець — Термін»'
    words: 600
    points:
      - Структура доручення за стандартом ДСТУ
      - 'Граматика доручень: Давальний відмінок виконавця та інфінітивні конструкції'
      - 'Контроль виконання: Хто і як фіксує результати'
  - section: Аналіз зразка та подолання професійних русизмів
    words: 600
    points:
      - Розбір типового протоколу виробничої наради
      - 'Робота над помилками: «повестка дня», «підняти питання», «прийняти до відома»'
      - Чек-лист для самоперевірки протоколу перед підписанням
