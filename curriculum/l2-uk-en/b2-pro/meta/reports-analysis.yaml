slug: reports-analysis
title: 'Звітність: Аналіз та висновки'
word_target: 4000
content_outline:
  - section: Розминка — Від даних до рішень
    words: 500
    points:
      - 'Чому аналіз важливіший за просте перерахування фактів: концепція доданої
        вартості звіту'
      - 'Різниця між описом та інтерпретацією: як перетворити цифри на інсайти'
      - 'Роль висновків у прийнятті управлінських рішень: від даних до стратегії'
  - section: 'Аналіз даних: Причинно-наслідкові зв''язки'
    words: 700
    points:
      - 'Мовні засоби для вираження причинності: це призвело до..., причиною є...,
        внаслідок чого...'
      - 'Смислові нюанси сполучників: ''завдяки'' (позитив) vs ''через'' (негатив)
        vs ''внаслідок'' (нейтрально)'
      - Логічні переходи між аналітичними блоками тексту
  - section: 'Аналіз даних: Виявлення закономірностей та оцінка'
    words: 700
    points:
      - 'Термінологія трендів: простежується тенденція..., спостерігається залежність...'
      - 'Оцінка результатів: позитивна/негативна динаміка, досягнення цілей'
      - Як уникати суб'єктивних оцінок та емоційного забарвлення через безособові
        конструкції
  - section: 'Написання висновків: Структура та логіка'
    words: 600
    points:
      - 'Золота структура висновку: узагальнення → ключові знахідки → загальна оцінка'
      - 'Канцелярські формули для вступу: ''Таким чином...'', ''Отже...'', ''На підставі
        вищезазначеного...'''
      - 'Принцип лаконічності: оптимальна кількість висновків (3-5 ключових пунктів)'
  - section: 'Формулювання рекомендацій: Від теорії до дії'
    words: 700
    points:
      - 'Трикомпонентна структура рекомендації: дія + обґрунтування + очікуваний результат'
      - 'Ступінь категоричності: рекомендується / доцільно / необхідно / обов''язково'
      - Типові мовні помилки при формулюванні порад (кальки з російської)
  - section: Аналіз зразків та практичне застосування
    words: 800
    points:
      - 'Розбір Зразка 1: Висновки до звіту про рекламну кампанію (аналіз логіки)'
      - 'Розбір Зразка 2: Рекомендації щодо оптимізації процесів (аналіз структури)'
      - 'Критерії якості: вимірюваність (SMART) та реалістичність у рекомендаціях'
