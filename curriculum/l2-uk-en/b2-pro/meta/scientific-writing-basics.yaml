slug: scientific-writing-basics
title: Основи наукового письма
word_target: 2000
content_outline:
- section: Розминка — Наукова мова vs розмовна
  words: 250
  points:
  - 'Функціональні відмінності: точність, об''єктивність та доказовість як основа
    наукового стилю'
  - 'Українська наукова традиція: від термінології НТШ до сучасних стандартів'
  - 'Порівняльний аналіз: розмовні кліше vs наукові еквіваленти (напр., ''багато''
    → ''значна кількість'')'
- section: Структура наукового тексту
  words: 400
  points:
  - 'Класична архітектура статті: вступ (актуальність, об''єкт, мета), методологія,
    результати, висновки'
  - 'Анатомія вступу: як правильно сформулювати завдання дослідження та актуальність'
  - Вимоги до анотації (Abstract) та вибір ключових слів для пошукових систем
  - 'Мистецтво висновків: підсумки, практичні рекомендації та перспективи подальших
    розвідок'
- section: 'Мова наукового стилю: Безособовість та об''єктивність'
  words: 300
  points:
  - 'Граматика об''єктивності: використання безособових дієслівних форм на -но, -то
    (досліджено, виявлено)'
  - 'Усунення суб''єкта: чому слід уникати ''я'' та як використовувати авторське ''ми'''
  - Пасивні конструкції та їх роль у зміщенні акценту на результат дії
- section: 'Мова наукового стилю: Логічні зв''язки та модальність'
  words: 300
  points:
  - 'Логічні конектори для структурування думки: ''отже'', ''таким чином'', ''водночас'',
    ''натомість'''
  - 'Наукова обережність (hedging): використання вставних слів ''ймовірно'', ''очевидно'',
    ''можна припустити'''
  - 'Синтаксис наукового тексту: складнопідрядні речення з причинно-наслідковими зв''язками'
- section: Цитування та посилання
  words: 350
  points:
  - 'Етика науковця: розрізнення прямого цитування та перефразування'
  - 'Вимоги ДСТУ 8302:2015: оформлення втекстових, підрядкових та позатекстових посилань'
  - 'Культура академічної доброчесності: як уникнути плагіату при огляді літератури'
  - 'Мовні формули для введення цитат: ''за словами автора'', ''як стверджує'', ''згідно
    з джерелом'''
- section: Зразок наукового тексту
  words: 200
  points:
  - Критичний аналіз анотації до наукової статті за схемою IMRaD
  - 'Деконструкція фрагмента вступу: виділення мети та методологічних підходів'
  - Пошук та аналіз мовних засобів (термінів, вставних слів) у реальному тексті
- section: Практика — наукове письмо
  words: 200
  points:
  - 'Тренінг з трансформації регістра: перетворення суб''єктивних тверджень на академічні
    форми'
  - 'Робота з типовими помилками: виправлення русизмів та кальок у наукових контекстах'
  - 'Вправа на резюмування: написання короткої анотації до запропонованого тексту'
