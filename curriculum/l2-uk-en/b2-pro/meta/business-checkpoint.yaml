  - 'Мовне оформлення доручень: використання інфінітивів та конкретних термінів виконання'
- section: 'Завдання 3: Структура та мовні формули презентації'
  words: 400
  points:
  - Сигнальні фрази для управління увагою аудиторії (вступ, логічні переходи, резюме)
  - 'Техніка ''Call to Action'': як завершити виступ переконливим закликом до дії'
  - Аналіз типових помилок (кальки з англійської та російської) у публічних виступах
- section: 'Завдання 4: Інтегрований сценарій підготовки до переговорів'
  words: 250
  points:
  - 'Комплексне застосування навичок: від першого контакту (Intro Letter) до розробки
    Agenda'
  - Формулювання професійної позиції компанії з використанням термінології ДСТУ
  - 'Критерії успішної інтеграції: цілісність комунікативної стратегії'
- section: 'Підсумок: Самооцінка та професійний прогрес'
  words: 200
  points:
  - 'Чек-лист навичок B2-PRO.1: критичний аналіз власних сильних сторін та зон росту'
