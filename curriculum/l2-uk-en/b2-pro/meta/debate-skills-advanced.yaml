slug: debate-skills-advanced
title: 'Дебати: Формальна структура'
word_target: 2000
content_outline:
- section: 'Розминка: Культура дебатів в Україні'
  words: 250
  points:
  - Дебати як інструмент демократичної дискусії та прийняття рішень
  - Відмінності між формальними (змагальними) та діловими дебатами
  - 'Популярні формати в Україні: Британський парламентський та формат Карла Поппера'
- section: 'Структура формальних дебатів: Ролі та сторони'
  words: 250
  points:
  - 'Резолюція (теза): правила формулювання чіткої та збалансованої теми'
  - 'Поділ на сторони: завдання Пропозиції та місія Опозиції'
  - Роль Головуючого (модератора) та Таймкіпера у підтримці регламенту
- section: 'Структура формальних дебатів: Раунди та регламент'
  words: 250
  points:
  - 'Послідовність виступів: конструктивні промови та перехресне опитування'
  - 'Пункти інформації (POI): як правильно ставити та відповідати на запитання'
  - Часові ліміти та правила 'захищених хвилин' у виступі
- section: 'Побудова кейсу: Від термінів до аргументації'
  words: 350
  points:
  - 'Дефініції: важливість узгодження термінів на початку дискусії'
  - 'Критерій оцінки (Standard): за якими показниками визначається перемога'
  - 'Аргументаційна лінія (CREI): Твердження, Обґрунтування, Докази, Вплив'
  - 'Стратегічне передбачення: підготовка до контраргументів опонента'
- section: 'Техніки спростування: Типи та структура'
  words: 250
  points:
  - 'Класифікація спростувань: атака на факти, логіку або значущість'
  - 'Формула чотирьох кроків: ''Вони сказали – Ми не згодні – Тому що – Отже'''
  - Виявлення логічних помилок в аргументації суперника
- section: 'Техніки спростування: Тактика та пріоритети'
  words: 250
  points:
  - 'Пріоритизація спростування: фокус на ключових аргументах (''killer points'')'
  - 'Техніка перевизначення: відповідь на зміну умов дискусії опонентом'
  - Баланс між критикою та розвитком власного кейсу
- section: 'Етика та правила: Професійна дискусія'
  words: 200
  points:
  - 'Принцип поваги: відділення ідей від особистостей (уникнення ad hominem)'
  - 'Інтелектуальна чесність: заборона на перекручування слів опонента'
  - Визнання сильних сторін опозиції як ознака високої культури дебатування
- section: 'Практика: Підготовка дебатної промови'
  words: 200
  points:
  - Складання плану 3-хвилинної промови за заданою резолюцією
  - 'Критерії самооцінки: логічність, доказовість та дотримання етикету'
  - Аналіз резолюції про дистанційну роботу через призму дебатних правил
