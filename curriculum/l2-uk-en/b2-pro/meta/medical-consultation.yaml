  - 'Типові помилки: використання ''жалоб'' замість нормативних ''скарг'''
- section: 'Професійне обстеження: Команди лікаря та огляд'
  words: 200
  points:
  - 'Мовні конструкції під час фізикального огляду: наказовий спосіб та ввічливі прохання'
  - 'Вимірювання життєвих показників: артеріальний тиск, пульс, сатурація'
  - 'Нормативна лексика: ''обстеження'' проти суржикового ''обслідування'''
- section: Діагностика та встановлення попереднього діагнозу
  words: 250
  points:
  - 'Формулювання діагнозу: основне захворювання, супутні стани та ускладнення'
