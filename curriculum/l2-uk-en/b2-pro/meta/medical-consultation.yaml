slug: medical-consultation
title: Медичні консультації
word_target: 2000
content_outline:
- section: 'Комунікація з лікарем: Етика та стандарти в Україні'
  words: 250
  points:
  - 'Особливості етикету: формальність звернення та побудова довіри'
  - Різниця між державним (система Helsi/E-Health) та приватним секторами
  - Право на інформовану згоду згідно з Основами законодавства про охорону здоров'я
- section: 'Реєстрація та запис на прийом: Від дзвінка до онлайн-черги'
  words: 250
  points:
