  - 'Фрази для уточнення призначень: ''Чи правильно я зрозумів, що...?'''
- section: 'Практичний діалог: Моделювання консультації терапевта'
  words: 250
  points:
  - 'Повний професійний сценарій: від привітання до отримання рецепта'
