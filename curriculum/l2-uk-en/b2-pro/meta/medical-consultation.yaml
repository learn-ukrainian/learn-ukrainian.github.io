  - 'Термінологія: ''напад'' замість ''приступ'' у професійному контексті'
- section: 'Розуміння призначень: Рецепти та направлення'
  words: 250
  points:
  - 'Структура рецепта: діюча речовина, дозування та кратність прийому'
  - 'Направлення на діагностику: УЗД, рентген, аналізи (офіційна термінологія)'
  - 'Термінологічний нюанс: листок непрацездатності як юридичний термін'
- section: 'Медичні рекомендації: Режим та дієта'
  words: 250
  points:
  - 'Опис медичного режиму: натщесерце, до їди, під час або після їди'
