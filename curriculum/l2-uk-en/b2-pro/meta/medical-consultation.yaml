slug: medical-consultation
title: Медичні консультації
word_target: 4000
content_outline:
  - section: 'Комунікація з лікарем: Етика та стандарти в Україні'
    words: 500
    points:
      - 'Особливості етикету: формальність звернення та побудова довіри'
      - Різниця між державним (система Helsi/E-Health) та приватним секторами
      - Право на інформовану згоду згідно з Основами законодавства про охорону здоров'я
  - section: 'Реєстрація та запис на прийом: Від дзвінка до онлайн-черги'
    words: 500
    points:
      - 'Професійні формулювання для запису по телефону: ''вільне вікно'', ''підтвердження'''
      - 'Цифрова медицина: онлайн-запис, вибір спеціаліста та заповнення анкети'
      - 'Необхідні документи: декларація, поліс та медична картка (форма №025/о)'
  - section: 'На прийомі: Мистецтво опису скарг та анамнез'
    words: 600
    points:
      - 'Лексика для опису характеру болю: ниючий, гострий, переймоподібний'
      - 'Збір анамнезу життя та хвороби: питання про спадковість та алергію'
      - 'Типові помилки: використання ''жалоб'' замість нормативних ''скарг'''
  - section: 'Професійне обстеження: Команди лікаря та огляд'
    words: 400
    points:
      - 'Мовні конструкції під час фізикального огляду: наказовий спосіб та ввічливі
        прохання'
      - 'Вимірювання життєвих показників: артеріальний тиск, пульс, сатурація'
      - 'Нормативна лексика: ''обстеження'' проти суржикового ''обслідування'''
  - section: Діагностика та встановлення попереднього діагнозу
    words: 500
    points:
      - 'Формулювання діагнозу: основне захворювання, супутні стани та ускладнення'
      - Обговорення клінічної картини та необхідності додаткових тестів
      - 'Термінологія: ''напад'' замість ''приступ'' у професійному контексті'
  - section: 'Розуміння призначень: Рецепти та направлення'
    words: 500
    points:
      - 'Структура рецепта: діюча речовина, дозування та кратність прийому'
      - 'Направлення на діагностику: УЗД, рентген, аналізи (офіційна термінологія)'
      - 'Термінологічний нюанс: листок непрацездатності як юридичний термін'
  - section: 'Медичні рекомендації: Режим та дієта'
    words: 500
    points:
      - 'Опис медичного режиму: натщесерце, до їди, під час або після їди'
      - Поради щодо дієти та фізичних обмежень у післяопераційний період
      - 'Фрази для уточнення призначень: ''Чи правильно я зрозумів, що...?'''
  - section: 'Практичний діалог: Моделювання консультації терапевта'
    words: 500
    points:
      - 'Повний професійний сценарій: від привітання до отримання рецепта'
      - Аналіз вживання термінів та етикетних формул у реальному часі
      - Альтернативні варіанти опису симптомів для різних спеціалізацій
