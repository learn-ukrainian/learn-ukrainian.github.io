slug: financial-reports
title: Фінансова звітність
word_target: 4000
content_outline:
  - section: Розминка — Навіщо читати фінансову звітність
    words: 500
    points:
      - Фінансова звітність як універсальна мова бізнесу та її роль у комунікації
        зі стейкголдерами
      - 'Основні користувачі звітності: від інвесторів до податкових органів'
      - Порівняння українських стандартів П(С)БО та міжнародних МСФЗ
  - section: 'Баланс (Звіт про фінансовий стан): Активи'
    words: 600
    points:
      - 'Фундаментальне бухгалтерське рівняння: баланс між активами та джерелами їх
        формування'
      - 'Класифікація активів: оборотні (запаси, дебіторська заборгованість) та необоротні
        (основні засоби)'
      - 'Оцінка ліквідності активів: від найбільш ліквідних (кошти) до найменш ліквідних'
  - section: 'Баланс (Звіт про фінансовий стан): Пасиви та капітал'
    words: 600
    points:
      - 'Власний капітал як засіб фінансування бізнесу: статутний капітал та нерозподілений
        прибуток'
      - 'Зобов''язання компанії: розмежування поточних та довгострокових боргів'
      - Кредиторська заборгованість перед постачальниками та бюджетом
  - section: 'Звіт про фінансові результати: Доходи та витрати'
    words: 600
    points:
      - 'Структура звіту про прибутки та збитки: від валового доходу до чистого прибутку'
      - Розуміння собівартості реалізації та її вплив на маржинальність бізнесу
      - Адміністративні витрати та витрати на збут як складові операційної діяльності
  - section: 'Звіт про фінансові результати: Аналіз рентабельності'
    words: 400
    points:
      - 'Розрахунок основних показників рентабельності: продажів, активів та власного
        капіталу'
      - 'Динаміка прибутку: як інтерпретувати зростання або зниження показників за
        звітний період'
  - section: Звіт про рух грошових коштів
    words: 500
    points:
      - 'Три види грошових потоків: операційний, інвестиційний та фінансовий'
      - 'Аналіз ''Cash Flow'': чому наявність прибутку не завжди означає наявність
        грошових коштів'
      - Вплив інвестиційної діяльності на майбутній розвиток компанії
  - section: Зразок фінансової звітності та інтерпретація
    words: 400
    points:
      - Розгляд спрощеного кейсу фінансової звітності реального підприємства
      - 'Ключові маркери ''здоров''я'' бізнесу: співвідношення активів та зобов''язань'
  - section: Практика — Аналіз фінансового стану
    words: 400
    points:
      - Виконання завдань на порівняння показників за два звітні періоди
      - Формулювання професійних висновків на підставі отриманих даних
