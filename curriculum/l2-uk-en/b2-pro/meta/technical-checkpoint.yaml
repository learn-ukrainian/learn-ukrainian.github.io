slug: technical-checkpoint
title: 'Контрольна точка: Фахова мова'
word_target: 2000
content_outline:
- section: Огляд компетенцій фази B2-PRO.2
  words: 250
  points:
  - Аналіз переходу від загальнобізнес-рівня до галузевої спеціалізації (IT, Finance,
    Law)
  - 'Критерії оцінювання фахової мови: термінологічна валідність та стилістична витриманість'
  - Огляд ключових стандартів (ДСТУ 4163:2020 та ДСТУ ISO/IEC 2382:2017)
- section: 'Завдання 1: Створення технічної інструкції'
  words: 450
  points:
  - 'Сценарій: Написання покрокового посібника для користувача програмного забезпечення'
  - 'Нормативні вимоги до технічних текстів: лаконічність, однозначність та послідовність'
  - Практика вживання інфінітивів (Натиснути, Ввести) та ІТ-термінології (інтерфейс,
    конфігурація)
- section: 'Завдання 2: Аналіз фінансової звітності'
  words: 450
  points:
  - 'Сценарій: Оцінка показників рентабельності та прибутку в квартальному звіті'
  - 'Використання фінансової лексики: активи, пасиви, дебіторська заборгованість,
    ліквідність'
  - 'Специфіка опису динаміки: конструкції ''збільшення на...'', ''порівняно з аналогічним
    періодом'''
- section: 'Завдання 3: Юридичний розбір договору'
  words: 450
  points:
  - 'Сценарій: Виявлення ризиків та прав сторін у типовому договорі оренди (найму)'
  - 'Юридичні формулювання: ''істотні умови'', ''санкції за порушення'', ''форс-мажорні
    обставини'''
  - 'Граматика права: вживання дієприслівникових зворотів та офіційно-ділових штампів'
- section: 'Завдання 4: Комплексна аналітична довідка'
  words: 250
  points:
  - 'Сценарій: Впровадження системи — інтеграція технічних, фінансових та юридичних
    аспектів'
  - 'Формування цілісного бізнес-документа: логічні переходи та міжгалузева лексика'
  - Обґрунтування комплексного рішення для керівництва (Executive Summary)
- section: 'Підсумок: Карта професійного зростання'
  words: 150
  points:
  - Аналіз результатів контрольної точки та заповнення чек-листа компетенцій
  - Рекомендації щодо усунення типових мовних помилок (суржик, кальки)
  - 'Анонс наступної фази: публічна комунікація та медіа-дискурс'
