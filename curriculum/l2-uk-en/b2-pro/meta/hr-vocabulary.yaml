slug: hr-vocabulary
title: HR-лексика
word_target: 2000
content_outline:
- section: 'Розминка: Кадрова справа по-українськи'
  words: 250
  points:
  - Трансформація від радянського 'відділу кадрів' до сучасного HR-менеджменту
  - КЗпП як фундамент трудових відносин в Україні
  - Чому українська термінологія важлива для юридичного захисту працівника
- section: 'Процес найму: Пошук та відбір кандидатів'
  words: 350
  points:
  - 'Етапи рекрутингу: від публікації вакансії до фінальної співбесіди'
  - 'Словник пошуку: вакансія, подати заявку, надіслати резюме, портфоліо'
  - 'Мистецтво співбесіди: типові запитання та професійні формулювання відповідей'
- section: 'Процес найму: Оформлення та документація'
  words: 350
  points:
  - 'Юридичне працевлаштування: укладання трудового договору та наказу'
  - 'ДСТУ 4163:2020: як правильно оформлювати кадрові документи та підписи'
  - 'Випробувальний термін та посадова інструкція: на що звернути увагу'
- section: Оцінка, мотивація та розвиток персоналу
  words: 350
  points:
  - 'Ефективність роботи: KPI, атестація та зворотний зв''язок (фідбек)'
  - 'Інструменти розвитку: підвищення кваліфікації, тренінги та наставництво'
  - 'Матеріальна та нематеріальна мотивація: премії, бонуси та соцпакет'
- section: Звільнення та зміни в трудових відносинах
  words: 350
  points:
  - 'Припинення трудових відносин: власне бажання, угода сторін, скорочення'
  - 'Документальний супровід: заява на звільнення, наказ, трудова книжка'
  - 'Процедура розрахунку та передачі справ: професійна етика звільнення'
- section: Зразок опису вакансії та практичні поради
  words: 350
  points:
  - 'Аналіз типової вакансії: як розрізнити вимоги, обов''язки та умови праці'
  - Типові мовні помилки в HR-документах та як їх уникати (кальки, русизми)
  - 'Практичне завдання: підготовка до самопрезентації українською мовою'
