slug: email-followups-threads
title: 'Листування: Продовження переписки'
word_target: 4000
content_outline:
  - section: Розминка — Мистецтво нагадування
    words: 500
    points:
      - 'Культурний контекст: чому в Україні нагадування часто сприймається як тиск'
      - Відмінність між нагадуванням колезі та зовнішньому клієнту
      - 'Правило 24/48: оптимальні часові рамки для фоллоу-апів'
      - '[!pro-tip] про психологію делікатного нагадування через турботу про спільний
        результат'
  - section: Посилання на попередню переписку
    words: 700
    points:
      - 'Використання минулого часу: формули ''як ми домовилися'', ''як Ви зауважили'''
      - Різниця між 'згідно з' та 'відповідно до' у посиланнях на документи
      - 'Техніка цитування попередніх листів: робота з датами та реєстраційними індексами
        (ДСТУ 4163:2020)'
      - 'Прикріплення контексту: як правильно вказати на вкладені файли (''додаю до
        листа'', ''надсилаю в додатку'')'
  - section: 'Листи-нагадування: від м''якого до термінового'
    words: 900
    points:
      - 'Три ступені інтенсивності: ''Soft'', ''Neutral'', ''Urgent'' — лінгвістичні
        маркери кожного рівня'
      - 'М''які формули: ''хотів би уточнити статус'', ''дозвольте поцікавитися'''
      - 'Термінові запити: використання слів ''негайно'', ''невідкладно'' та опис
        наслідків затримки'
      - '[!common-error] про використання слова ''напоминати'' та ''вибачаюсь'' у
        діловому стилі'
  - section: Листи підтвердження та подяки
    words: 700
    points:
      - 'Етикет підтвердження отримання (acknowledgment letters): чому це обов''язково
        для B2-PRO'
      - 'Підтвердження зустрічей та домовленостей: фіксація часу, місця та порядку
        денного'
      - 'Мистецтво вдячності: як написати ''Thank you'' лист, що зміцнює партнерство'
      - 'Використання сталих виразів: ''висловлюємо вдячність за плідну співпрацю'''
  - section: Три зразки листів з аналізом
    words: 800
    points:
      - 'Зразок 1: Нагадування партнеру про дедлайн з пропозицією допомоги'
      - 'Зразок 2: Підтвердження отримання документів з інструкцією щодо наступних
        кроків'
      - 'Зразок 3: Лист-подяка після завершення етапу проєкту з акцентом на майбутнє'
      - Детальний аналіз структури кожного зразка за нормами ДСТУ
  - section: Практика — побудова ланцюжка переписки
    words: 400
    points:
      - 'Сценарій: від початкового запиту до фінальної подяки через два нагадування'
      - Як змінювати тон протягом одного треду (thread) залежно від реакції адресата
      - Робота з темою листа (Subject line) для збереження цілісності історії переписки
