slug: media-checkpoint
title: 'Контрольна точка: Медіа'
word_target: 4000
content_outline:
  - section: 'Огляд фази B2-PRO.3: Медіакомпетентність'
    words: 600
    points:
      - 'Аналіз ключових навичок: від критичного аналізу новин до антикризового менеджменту'
      - Роль медіагігієни у сучасному професійному середовищі України
      - 'Критерії оцінювання: точність, етичність та мовна довершеність'
  - section: 'Завдання 1: Критичний аналіз та верифікація'
    words: 800
    points:
      - 'Сценарій: деконструкція новинної статті на предмет маніпуляцій та ''джинси'''
      - Методологія перевірки джерел (SMELL) та виявлення прихованої упередженості
      - 'Практичне застосування термінів: достовірність, упередженість, маніпулятивний
        заголовок'
  - section: 'Завдання 2: Техніка журналістського письма'
    words: 800
    points:
      - 'Написання новини за принципом ''перевернутої піраміди'': від найважливішого
        до деталей'
      - Формулювання ефективного лід-абзацу (правило 5W+H)
      - Використання пасивних конструкцій та безособових форм на -но, -то для нейтральності
  - section: 'Завдання 3: Ораторська майстерність у бізнесі'
    words: 800
    points:
      - 'Підготовка професійного виступу: композиція від ''гачка'' до заклику до дії'
      - Риторичні засоби переконання та використання звертань у кличному відмінку
      - Мовні засоби bridging для управління увагою під час промови
  - section: 'Завдання 4: Антикризові комунікації та прес-реліз'
    words: 600
    points:
      - 'Сценарій: розробка комунікаційної стратегії у відповідь на репутаційний ризик'
      - Структура стандартного прес-релізу згідно з ДСТУ 4163:2020 та міжнародними
        нормами
      - Підготовка ключових повідомлень (key messages) для речника компанії
  - section: 'Підсумок: Рекомендації щодо розвитку медіанавичок'
    words: 400
    points:
      - Фінальний чек-лист медіакомпетентності рівня B2-PRO
      - Аналіз прогресу та визначення зон для подальшого лінгвістичного вдосконалення
      - Підготовка до фінальної інтеграції професійного треку
