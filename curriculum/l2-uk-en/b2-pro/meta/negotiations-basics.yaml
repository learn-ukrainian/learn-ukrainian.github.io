slug: negotiations-basics
title: 'Переговори: Основи'
word_target: 4000
content_outline:
  - section: Розминка — Культура переговорів в Україні
    words: 600
    points:
      - Українська специфіка — важливість міжособистісних відносин та довіри як бази
        для бізнесу
      - Роль неформального спілкування (small talk) для встановлення психологічного
        контакту
      - 'Гнучкість у переговорах: чому початкова відмова є стартовою точкою для компромісу'
  - section: Підготовка до переговорів
    words: 800
    points:
      - 'Формулювання позиції: чітке визначення бажаних параметрів майбутньої угоди'
      - 'Аналіз інтересів: виявлення реальних потреб сторін, що ховаються за офіційними
        вимогами'
      - 'Розробка НАОУ (BATNA): створення альтернативного плану дій на випадок недосягнення
        згоди'
      - 'Збір інформації про партнера: аналіз ринкової репутації та стилю ведення
        справ'
  - section: Відкриття переговорів
    words: 800
    points:
      - 'Привітання та етикет контакту: фрази «Раді вас бачити», «Дякуємо, що знайшли
        час»'
      - 'Представлення мети зустрічі: використання структур «Мета нашої зустрічі —...»,
        «Сьогодні ми зібралися для...»'
      - 'Узгодження порядку денного (agenda): фіксація ключових пунктів обговорення'
      - 'Встановлення регламенту: погодження часових лімітів та черговості виступів'
  - section: Виклад позицій
    words: 800
    points:
      - 'Чітка презентація власної позиції: «Наша позиція полягає в тому, що...»,
        «Ми пропонуємо...»'
      - 'Аргументація через мову фактів: «Це обумовлено тим, що...», «Причина в тому,
        що...»'
      - 'Техніки уточнення та перефразування: «Чи правильно я розумію, що...?», «Поясніть,
        будь ласка...»'
      - 'Активне слухання: використання зворотного зв''язку для демонстрації поваги
        до партнера'
  - section: Зразок діалогу — відкриття переговорів
    words: 500
    points:
      - Автентичний діалог відкриття зустрічі між двома представниками компаній
      - Аналіз лексичних конструкцій офіційно-ділового стилю в розмовній практиці
      - Альтернативні формулювання для підвищення дипломатичності висловлювань
  - section: Практика — підготовка та відкриття
    words: 500
    points:
      - Розробка плану підготовки за індивідуальним професійним сценарієм
      - Відпрацювання алгоритму відкриття зустрічі та викладу позиції в парах
      - 'Зворотній зв''язок: аналіз дотримання мовних норм та ефективності комунікації'
