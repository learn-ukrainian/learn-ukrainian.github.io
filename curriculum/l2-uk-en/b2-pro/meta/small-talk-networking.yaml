slug: small-talk-networking
title: 'Нетворкінг: Налагодження контактів'
word_target: 2000
content_outline:
- section: 'Розминка: Специфіка українського Small Talk'
  words: 350
  points:
  - 'Чому українці надають перевагу особистим темам над темою погоди: культурний контекст'
  - Безпечні та ризиковані теми для початку розмови в українському бізнес-середовищі
  - Аналіз запитань 'Звідки ви?' та 'Як давно працюєте?' як засобів пошуку точок дотику
- section: Знайомство та ритуали обміну контактами
  words: 400
  points:
  - 'Нормативні формули представлення: використання ДСТУ 4163:2020 у мовленні'
  - 'Різниця між ''візиткою'' та ''візитівкою'': мовна порада щодо вибору слів'
  - 'Етикет обміну візитівками: жестикуляція, зоровий контакт та пауза для ознайомлення'
  - Фрази-криголами для самостійного долучення до групової розмови
- section: 'Мистецтво підтримки діалогу: Запитання та реакції'
  words: 350
  points:
  - Відкриті запитання для з'ясування професійної ролі без бюрократичних кліше
  - 'Вираження щирого інтересу: лексика активного слухання (Цікаво!, Справді?, От
    як!)'
  - Техніки уникнення незручного мовчання через перехід до актуальних трендів ринку
- section: 'Управління темою: Переходи та динаміка'
  words: 300
  points:
  - Використання вставних конструкцій (До речі..., Між іншим...) для зміни вектору
    бесіди
  - 'Асоціативні переходи: як пов''язати особисту розповідь із професійними цілями'
  - 'Мовна норма: уникнення кальок під час емоційних реакцій'
- section: Завершення розмови та стратегія Follow-up
  words: 300
  points:
  - 'Формули ввічливого виходу з розмови: техніка ''позитивного мосту'''
  - 'Пропозиції щодо подальшої співпраці: LinkedIn vs зустріч на каву'
  - 'Професійне прощання та побажання успіхів: нормативні варіанти'
- section: Аналіз стратегій нетворкінгу та типові помилки
  words: 300
  points:
  - 'Розбір реалістичного діалогу на конференції: від привітання до домовленості про
    зустріч'
  - 'Виправлення типових помилок: відмова від ''Вибачаюсь'' на користь ''Перепрошую'''
  - 'Реєстрова трансформація: як залишатися професійним, але не ставати занадто формальним'
