slug: it-vocabulary-1
title: 'ІТ-лексика I: Апаратне забезпечення'
word_target: 2000
content_outline:
- section: 'Розминка: офіційна термінологія vs професійний жаргон'
  words: 300
  points:
  - 'Тенденції українізації ІТ-лексики: відхід від запозичень з російської до прямих
    англіцизмів або власне українських відповідників'
  - 'Порівняння регістрів: вживання термінів у технічній документації (маршрутизатор)
    проти повсякденної комунікації (роутер)'
  - Аналіз типових жаргонізмів (сервак, комп, планка пам'яті) та їхніх офіційних еквівалентів
- section: Комп'ютерні компоненти та їхні технічні характеристики
  words: 500
  points:
  - 'Опис архітектури ПК: роль материнської плати, центрального процесора (CPU) та
    оперативної пам''яті (RAM)'
  - 'Сучасні типи накопичувачів: порівняння жорстких дисків (HDD) та твердотільних
    накопичувачів (SSD) у контексті швидкодії'
  - 'Периферійне обладнання: монітори (роздільна здатність, тип матриці), пристрої
    введення та друку'
  - 'Мовні конструкції для опису характеристик: використання числівників з одиницями
    виміру (ГГц, МБ, ТБ)'
- section: Мережеве обладнання та технології з'єднання
  words: 400
  points:
  - 'Класифікація мережевих пристроїв: маршрутизатори, комутатори, точки доступу та
    їхні функції в інфраструктурі'
  - 'Фізичне середовище передачі: переваги оптоволокна перед витою парою (Ethernet-кабелем)'
  - 'Ключові показники мережі: пропускна здатність, затримка (латентність) та стабільність
    сигналу'
- section: Серверна інфраструктура та концепції віртуалізації
  words: 400
  points:
  - Типологія серверів за призначенням (веб-сервери, БД, поштові) та вимоги до їхнього
    розміщення у дата-центрах
  - 'Забезпечення відмовостійкості: роль серверних шаф та джерел безперебійного живлення
    (ДБЖ)'
  - 'Вступ до віртуалізації: запуск віртуальних машин за допомогою гіпервізорів та
    контейнеризація як спосіб оптимізації ресурсів'
- section: Аналіз та структура технічної специфікації
  words: 200
  points:
  - 'Структурні елементи офіційного ТЗ: назва предмета закупівлі, кількісні вимоги,
    умови гарантії'
  - Розбір автентичного зразка специфікації офісної робочої станції та серверної платформи
- section: 'Практика: складання професійного технічного опису'
  words: 200
  points:
  - Різниця між технічним описом (об'єктивні дані) та комерційною пропозицією (переваги)
  - Алгоритм складання запиту на закупівлю ІТ-обладнання без вживання ненормативного
    жаргону
  - 'Робота над помилками: виправлення лексичних кальок у готових специфікаціях'
