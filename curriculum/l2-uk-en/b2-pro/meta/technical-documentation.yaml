slug: technical-documentation
title: Технічна документація
word_target: 2000
content_outline:
- section: Розминка — Світ технічної документації
  words: 250
  points:
  - 'Класифікація технічних документів: від специфікацій (SRS) до настанов користувача
    (User Guides)'
  - Роль документації в життєвому циклі продукту (SDLC) та бізнес-процесах
  - 'Українізація техдоків: перехід від радянських ГОСТів до сучасних ДСТУ та міжнародних
    ISO стандартів'
- section: 'Структура технічного документа: Основні елементи'
  words: 300
  points:
  - 'Обов''язкові реквізити за ДСТУ 4163:2020: титул, зміст, анотація'
  - 'Логіка побудови основної частини: від вступу до додатків (ДСТУ 3008:2015)'
  - Важливість глосарію та розділу 'Терміни та визначення' для синхронізації контексту
- section: 'Структура технічного документа: Нумерація та візуалізація'
  words: 300
  points:
  - Ієрархічна нумерація розділів, пунктів та підпунктів (система 1.1, 1.1.1)
  - 'Вимоги до оформлення нетекстових елементів: таблиці, графіки, схеми та скріншоти'
  - Правила оформлення перехресних посилань для зручної навігації
- section: 'Мова технічної документації: Стандарти та стиль'
  words: 450
  points:
  - 'Ключові принципи технічного стилю: лаконічність, точність, відсутність емоційного
    забарвлення'
  - Використання наказового способу (imperative) для створення чітких алгоритмів та
    інструкцій
  - 'Стандартні формулювання (clichés): ''Система призначена для...'', ''Документ
    розроблено з метою...'''
  - Уникнення двозначності та суб'єктивних оцінок ('швидко', 'зручно' -> 'протягом
    2с', 'у 2 кліки')
- section: 'Читання специфікацій та інструкцій: ТЗ та Паспорт'
  words: 350
  points:
  - 'Аналіз розділу ''Вимоги'' у Технічному завданні (ТЗ): функціональні, нефункціональні,
    технічні'
  - Робота з критеріями приймання (Acceptance Criteria) як основою для верифікації
    робіт
  - 'Читання технічного паспорта: аналіз умов експлуатації та обмежень системи'
- section: Зразок технічного документа та аналіз
  words: 350
  points:
  - 'Розбір фрагмента ТЗ на розробку модуля реєстрації: структура та термінологія'
  - 'Аналіз інструкції з налаштування сервера або ПЗ: послідовність кроків та застереження'
  - Ідентифікація та виправлення типових помилок (русизми, кальки, register mismatch)
