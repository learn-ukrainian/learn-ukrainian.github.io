slug: danylo-apostol
title: Данило Апостол та Кирило Розумовський
word_target: 5000
content_outline:
- section: 'Вступ: Між молотом і ковадлом'
  words: 500
  points:
  - 'Геополітичний контекст XVIII ст.: Гетьманщина затиснута між імперіями після Полтави
    1709 р.'
  - Перша Малоросійська колегія (1722-1727) як інструмент прямого імперського управління
    та демонтажу автономії.
  - Відновлення гетьманства 1727 р. як вимушений тактичний крок Росії перед загрозу
    війни з Туреччиною.
  - 'Представлення двох гетьманів: Апостол (юридичний опір старой еліти) та Розумовський
    (спроба модернізації в імперському стилі).'
- section: 'Читання: Епоха Данила Апостола — Відновлення гетьманства'
  words: 550
  points:
  - 'Глухівська рада 1727 р.: обрання 73-річного Апостола, ветерана козацьких воєн,
    символу «старої гарт».'
  - 'Петиція до Петра II: спроба відновити договірні відносини на основі статей Богдана
    Хмельницького.'
  - '«Рішительні пункти» (1728) — не договір, а односторонній імперський указ: обмеження
    дипломатії, контроль царя над старшиною.'
  - 'Міф про «пасивного старця»: як Апостол використовував кожну шпарину в законодавстві
    для захисту прав.'
- section: 'Читання: Епоха Данила Апостола — Генеральне слідство'
  words: 550
  points:
  - «Генеральне слідство про маєтності» (1729-1731) — наймасштабніша ревізія земельного
    фонду Гетьманщини.
  - 'Мета реформи: повернення незаконно захоплених «рангових» земель у державну скарбницю.'
  - Боротьба з корупцією старшини та відновлення платоспроможності держави.
  - Формування чіткого державного бюджету вперше в історії Гетьманщини.
- section: 'Економіка та суспільство: Стабільність і криза'
  words: 600
  points:
  - 'Торговельна політика: захист українських купців, відновлення експорту через західний
    кордон (Вроцлав, Гданськ).'
  - 'Соціальна трансформація: перетворення козацької старшини на землевласницьку аристократію
    (шляхетство).'
  - Поглиблення прірви між елітою та рядовим козацтвом/селянством.
  - Початок юридичного закріпачення селян — передумови для указу 1783 року.
- section: 'Епоха Розумовського: Європейська мрія — Глухівський двір'
  words: 550
  points:
  - 'Обрання Кирила Розумовського (1750): театралізоване дійство, повернення булави
    «фавориту».'
  - 'Глухів як «маленький Петербург»: італійська опера, французькі парки, палацова
    архітектура.'
  - 'Культурний розквіт («Золота осінь»): проникнення європейського Просвітництва
    та моди.'
  - 'Особистість гетьмана: європейська освіта, життя між Україною та імперським двором.'
- section: 'Епоха Розумовського: Європейська мрія — Державотворення'
  words: 550
  points:
  - 'Судова реформа (1760-1763): повернення до Литовського статуту, створення шляхетських
    судів (земських, ґродських).'
  - 'Військова реформа: уніфікація одностроїв (сині мундири), регулярний вишкіл полків.'
  - Проект Батуринського університету — нереалізована мрія про вищу освіту європейського
    зразка.
  - Глухівська рада 1763 р. і петиція про спадковість гетьманства — фатальна помилка,
    що налякала Катерину II.
- section: 'Первинні джерела: Голоси епохи'
  words: 550
  points:
  - 'Аналіз тексту «Рішительних пунктів»: конкретні формулювання обмежень (військо,
    податки).'
  - Універсал Розумовського 1760 року про обмеження переходів селян — документ епохи.
  - 'Секретна інструкція Катерини II князю Вяземському: «потрібно, щоб саме ім''я
    гетьманів зникло».'
  - Цитати істориків (Крип'якевич) про «українське серце» Розумовського попри його
    імперську кар'єру.
- section: 'Деколонізаційний погляд: Дві стратегії виживання'
  words: 600
  points:
  - 'Порівняння стратегій: Апостол (консервація прав) vs Розумовський (модернізація/інтеграція).'
  - 'Чому обидві стратегії програли: неможливість автономії в умовах абсолютизму.'
  - Деконструкція імперського міфу про «добровільне злиття» — докази насильницького
    зламу інституцій.
  - 'Термінологічна війна: як поняття «Малоросія» витісняло назву «Україна»/«Військо
    Запорозьке».'
- section: 'Підсумок: Захід сонця'
  words: 550
  points:
  - Примусова відставка Розумовського (1764) та створення Другої Малоросійської колегії.
  - 'Хронологія ліквідації: скасування полкового устрою (1781), кріпацтво (1783),
    секуляризація земель (1786).'
  - 'Доля еліти: інтеграція в російське дворянство ціною втрати національної політичної
    суб''єктності.'
  - 'Історичний урок: культурний розквіт без власної армії та суверенної держави є
    крихким і тимчасовим.'
