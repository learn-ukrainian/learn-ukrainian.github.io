slug: scythians-sarmatians
id: scythians-sarmatians
version: 1.0.0
title: Скіфи та сармати — Володарі степу
word_target: 5000
content_outline:
- section: Розминка
  words: 400
  points:
  - 'Географія Великого Степу: Україна як західний ''термінал'' євразійського ''автобану
    давнини'''
  - 'Екологічний імператив: чому кочівництво було найефективнішою стратегією виживання
    в степу'
  - 'Визначення номадів: мобільність як перевага, багатство у худобі, життя в кибитках'
  - 'Стереотипи проти реальності: кочівники як комунікатори цивілізацій, а не просто
    руйнівники'
- section: 'Читання: Скіфи: Імперія золота'
  words: 1000
  points:
  - 'Хронологія: прихід скіфів у VII ст. до н.е., витіснення кіммерійців, панування
    у Причорномор''ї'
  - 'Війна з Дарієм I (513 р. до н.е.): стратегія ''випаленої землі'' та відмова від
    генеральної битви'
  - 'Дипломатія символів: дари царя Іданфірса персам (птах, миша, жаба, п''ять стріл)
    та їхнє значення'
  - 'Побут і звичаї: одяг (анаксириди, башлики), скіфська ''лазня'' (за Геродотом),
    побратимство'
- section: 'Сармати: Жінки-воїни та Катафракти'
  words: 900
  points:
  - 'Військова революція: винахід важкої кінноти (катафрактаріїв) та довгого списа
    для таранного удару'
  - 'Феномен амазонок: високий статус жінок у сарматському суспільстві, археологічні
    докази (жіночі поховання зі зброєю)'
  - 'Сарматизація Боспору: вплив кочівників на грецькі міста-колонії та політику регіону'
  - 'Ідеологічний спадок: ''сарматизм'' як міф походження української та польської
    шляхти (XVII ст.)'
- section: Культура та Мистецтво
  words: 1000
  points:
  - 'Звіриний стиль: філософія боротьби та руху, магічне значення зображень хижаків
    (олень, пантера, грифон)'
  - 'Симбіоз майстрів: співпраця скіфських замовників та грецьких ювелірів (Ольвія,
    Пантікапей)'
  - 'Золота Пектораль: історія знахідки Бориса Мозолевського (21 червня 1971 р., курган
    Товста Могила)'
  - 'Космогонія Пекторалі: аналіз трьох ярусів (світ підземний/хаос, світ древа життя/рослинний,
    світ людей/побут)'
- section: Первинні джерела
  words: 700
  points:
  - 'Геродот (''Мельпомена''): критичний аналіз описів скіфів, відокремлення фактів
    від грецьких стереотипів'
  - 'Страбон (''Географія''): опис розселення сарматських племен (роксолани, язиги,
    аорси)'
  - 'Лінгвістичний слід: іранське походження українських гідронімів (Дніпро, Дністер,
    Дон — корінь *dānu ''вода'')'
- section: Деколонізаційний погляд
  words: 600
  points:
  - 'Спростування міфу про ''диких варварів'': Скіфія як частина глобальної економіки
    та дипломатії античності'
  - 'Імперський vs Український погляд: Пектораль як національний скарб України, а
    не ''надбання імперії'''
  - 'Тяглість традиції: скіфські паралелі в українській культурі (шаровари, оселедець,
    сорочка-вишиванка)'
  - 'Концепція ''Степової Еллади'': взаємовплив, а не лише конфлікт, між осілим та
    кочовим світами'
- section: Підсумок
  words: 400
  points:
  - 'Синтез цивілізацій: українці як нащадки культури Лісу (слов''яни) та культури
    Степу (скіфи/сармати)'
  - 'Образ Козака Мамая: іконографічний зв''язок зі скіфськими кам''яними бабами та
    степовою естетикою'
  - 'Значення періоду: формування ментальності ''воїнів-землеробів'' та одвічна боротьба
    за Степ'
