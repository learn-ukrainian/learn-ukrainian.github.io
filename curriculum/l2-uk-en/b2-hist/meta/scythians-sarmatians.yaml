title: Скіфи та сармати — Володарі степу
word_target: 5000
content_outline:
- section: Розминка
  words: 400
  points:
  - 'Географія Великого Степу: Україна як західний ''термінал'' євразійського ''автобану
    давнини'' та зона контакту цивілізацій'
  - 'Екологічний імператив: номадизм як високоефективна адаптація до клімату, а не
    ознака культурної відсталості'
  - 'Визначення кочівників: мобільність, життя в кибитках, багатство у худобі (коні,
    вівці)'
  - 'Стереотипи vs Реальність: кочівники як комунікатори, торгівці та носії технологій,
    а не лише руйнівники'
- section: 'Читання: Скіфи: Імперія золота — I: Війна з Дарієм'
  words: 700
  points:
  - 'Хронологія панування: прихід скіфів у VII ст. до н.е., витіснення кіммерійців,
    контроль над Причорномор''ям'
  - 'Скіфо-перська війна (513 р. до н.е.): похід Дарія I та стратегія царя Іданфірса'
  - 'Тактика ''випаленої землі'': відмова від генеральної битви, виснаження ворога
    в степу'
  - 'Дипломатія символів: послання Дарію (птах, миша, жаба, п''ять стріл) та його
    розшифровка'
- section: 'Читання: Скіфи: Імперія золота — II: Побут і звичаї'
  words: 700
  points:
  - 'Повсякденне життя: одяг (анаксириди, башлики, каптани), раціон (кумис, нерозбавлене
    вино)'
  - 'Скіфська ''лазня'' за Геродотом: використання пари від конопель на розпеченому
    камінні як гігієнічний та ритуальний акт'
  - 'Поховальна культура: кургани (Солоха, Чортомлик) як маркери території та зв''язок
    з предками'
  - 'Сакралізація золота: золото як символ сонця і царської влади, а не просто валюта'
- section: 'Сармати: Жінки-воїни та Катафракти — I: Вершники в броні'
  words: 700
  points:
  - 'Експансія сарматів: прихід з-за Дону у III ст. до н.е., витіснення скіфів у Крим
    (Мала Скіфія)'
  - 'Військова революція: винахід важкої кінноти (катафрактаріїв) та лускатого обладунку
    для вершника і коня'
  - 'Тактика таранного удару: довгий спис (контос), що змінив характер античних битв'
  - Сармати як прообраз європейського середньовічного лицарства
- section: 'Сармати: Жінки-воїни та Катафракти — II: Амазонки та спадок'
  words: 600
  points:
  - 'Соціальний феномен: високий статус жінок, участь у війнах та управлінні племенем'
  - 'Міф про амазонок: грецькі легенди vs археологічні реалії (20% жіночих поховань
    зі зброєю)'
  - 'Сарматизація Боспору: вплив кочівників на політику та культуру грецьких міст-колоній'
  - 'Ідеологія ''сарматизму'': міф про шляхетське походження української та польської
    еліти (XVII ст.)'
- section: 'Культура та Мистецтво — I: Звіриний стиль'
  words: 600
  points:
  - 'Філософія ''звіриного стилю'': динаміка, боротьба хижаків (олень, пантера, грифон)
    як модель всесвіту'
  - 'Магічна функція: зображення тварин як амулети, що передають силу та швидкість
    власнику'
  - 'Симбіоз культур: замовлення скіфської знаті та майстерність грецьких ювелірів
    Ольвії та Пантікапея'
  - 'Технології лиття та карбування: високий рівень металургії степових майстрів'
- section: 'Культура та Мистецтво — II: Таємниця Пекторалі'
  words: 700
  points:
  - 'Знахідка століття: експедиція Бориса Мозолевського та відкриття Золотої Пекторалі
    (21 червня 1971 р., Товста Могила)'
  - 'Структура шедевру: три яруси як модель космосу (Нижній: хаос/звірі, Середній:
    древо життя/квіти, Верхній: люди/побут)'
  - 'Символізм сцен: від сцени розтерзання коня до сцени шиття одягу — цикл життя
    і смерті'
  - Пектораль як ключ до розуміння скіфської міфології та соціальної ієрархії
- section: Первинні джерела
  words: 500
  points:
  - 'Геродот (''Мельпомена''): цінність та упередження ''батька історії'', опис ритуалів
    побратимства'
  - 'Страбон (''Географія''): деталізація сарматських племінних союзів (роксолани,
    язиги, аорси)'
  - 'Лінгвістична археологія: іранське коріння українських гідронімів (Дніпро, Дністер,
    Дон — від *dānu ''вода'')'
  - 'Критичний аналіз джерел: як відрізнити очевидця від переказу міфів'
- section: Деколонізаційний погляд
  words: 600
  points:
  - 'Деконструкція міфу про ''дике поле'': Степ як цивілізаційний простір, а не вакуум'
  - 'Імперська апропріація: як Росія намагалася привласнити скіфську спадщину (від
    ''скіфів'' Блока до музейних крадіжок)'
  - 'Українська суб''єктність: Пектораль як національний символ України, знайдений
    українцем на українській землі'
  - 'Концепція ''Степової Еллади'': взаємопроникнення античного та кочового світів
    на території України'
- section: Підсумок
  words: 400
  points:
  - 'Синтез ідентичності: сучасні українці як спадкоємці культури Лісу (слов''яни)
    та культури Степу (скіфи/сармати)'
  - 'Візуальний код: шаровари, оселедець, ''Козак Мамай'' як пряма спадковість від
    скіфської естетики'
  - 'Ментальність кордону: формування типу ''воїна-землероба'', готового захищати
    свою землю'
  - Скіфи та сармати — не чужинці, а предки, що розчинилися в етногенезі українців
