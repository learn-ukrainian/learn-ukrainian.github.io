slug: povoienne-vidbudova
title: Повоєнна відбудова
word_target: 5000
content_outline:
- section: 'Вступ: Ціна перемоги'
  words: 600
  points:
  - 'Україна як «випалена земля»: тактика обох сторін (нацистів і радянських військ)
    призвела до тотального руйнування інфраструктури'
  - 'Демографічна прірва: скорочення населення з 41 млн (1941) до 27.4 млн (1945),
    загальні втрати близько 14 млн осіб'
  - 'Гіркий присмак перемоги: повернення сталінського терору, фільтраційні табори
    для тих, хто був в окупації, та депортації'
  - 'Формальний суверенітет: вступ до ООН (1945) як інструмент Сталіна для збільшення
    голосів, а не реальна незалежність'
- section: Масштаб руйнувань
  words: 800
  points:
  - 'Знищена інфраструктура: 714 міст, 28 тисяч сіл, понад 16 тисяч промислових підприємств
    перетворилися на руїни'
  - 'Київ та Донбас: підрив Хрещатика радянськими диверсантами (1941) та затоплення
    шахт (з 306 вціліло лише кілька)'
  - 'Сільське господарство на межі: втрата техніки та худоби, жінки змушені впрягатися
    в плуги як тяглова сила'
  - 'Соціальна катастрофа: величезна кількість сиріт, інвалідів війни та диспропорція
    статей, що вплинула на десятиліття'
- section: 'Відбудова (1945-1950): I — Промисловість та плани'
  words: 700
  points:
  - 'Четверта п''ятирічка (1946–1950): жорсткий акцент на важку індустрію (металургія,
    енергетика, ВПК) — 85% капіталовкладень'
  - 'Джерела відновлення: репарації з Німеччини (обладнання) та внутрішнє «перекачування»
    ресурсів із села'
  - 'Ігнорування потреб людей: легка промисловість, житлове будівництво та соціальна
    сфера фінансувалися за залишковим принципом'
  - 'Мілітаризація економіки: відбудова була спрямована на підготовку до Холодної
    війни, а не на добробут громадян'
- section: 'Відбудова (1945-1950): II — Ціна робочої сили'
  words: 600
  points:
  - 'Міф про «героїчну відбудову»: пропаганда ентузіазму приховувала реальність примусової
    та рабської праці'
  - 'Роль жінок та підлітків: основна робоча сила на будівництвах і в полях через
    критичну нестачу чоловіків'
  - 'Використання в''язнів ГУЛАГу та військовополонених: безоплатна праця на найтяжчих
    об''єктах промисловості'
  - 'Закріпачення селян: відсутність паспортів та неможливість вільно залишити колгосп'
- section: 'Відбудова (1945-1950): III — Голод 1946-1947 років'
  words: 800
  points:
  - 'Третій масовий голод: причини — поєднання посухи, повоєнної розрухи та драконівських
    планів хлібозаготівель'
  - 'Злочинний експорт: вивезення 1.7 млн тонн зерна до Східної Європи та Франції
    у розпал голоду в Україні'
  - 'Реакція влади: замовчування трагедії, відмова від міжнародної допомоги та посилення
    репресій (указ «Про п''ять колосків» 1947 року)'
  - 'Географія лиха: найбільше постраждали Південь та Схід; порятунок шукали на Західній
    Україні'
- section: Первинні джерела
  words: 500
  points:
  - 'Фотодокументи епохи: жінки, що розбирають завали Хрещатика, та життя в землянках
    на фоні руїн'
  - 'Свідчення очевидців: спогади Марії Гринь про «пухлих людей» та байдужість партійної
    номенклатури'
  - 'Листи відчаю: звернення ветеранів, які повернулися з фронту в голодні села, не
    знаходячи підтримки держави'
  - 'Контраст пропаганди: плакати «Відбудуємо рідний Донбас!» проти реальності карткової
    системи та черг'
- section: Деколонізаційний погляд
  words: 500
  points:
  - 'Імперський міф: наратив про «братню допомогу» центру, хоча Україна була головним
    донором ресурсів'
  - 'Економічна колонізація: Україна не мала права розпоряджатися власним продуктом
    (зерном, металом, вугіллям)'
  - 'Ціна індустріалізації: відновлення промислового потенціалу СРСР відбулося коштом
    життя українських селян (голод 1946-1947)'
  - 'Політичний вимір: Сталін використовував українські ресурси для зміцнення тоталітарного
    режиму та імперських амбіцій'
- section: 'Підсумок: Повоєнне суспільство'
  words: 500
  points:
  - 'Духовний терор: ліквідація УГКЦ (Львівський псевдособор 1946) як інструмент радянізації
    Західної України'
  - '«Ждановщина»: ідеологічний наступ на культуру, цькування інтелігенції (Сосюра,
    Рильський) та боротьба з «буржуазним націоналізмом»'
  - 'Грошова реформа 1947 року: скасування карток та конфіскаційний обмін грошей,
    що вдарив по заощадженнях селян'
  - 'Спадщина епохи: формування психології виживання, страху перед голодом та глибокої
    недовіри до держави'
