slug: slavic-tribes
id: slavic-tribes
version: '1.0'
title: Слов'янські племена на українських землях
word_target: 5000
content_outline:
- section: Вступ
  words: 650
  points:
  - 'Праслов''янська єдність: мова як генетичний код нації та маркер автохтонності'
  - 'Лінгвістична археологія: гідроніми (Дніпро, Десна, Прут) як свідки давньої присутності'
- section: 'Читання: I — Племінна мозаїка та історична доля'
  words: 1200
  points:
  - 'Сім племінних союзів: географія розселення Полян, Древлян, Сіверян, Волинян,
    Уличів, Тиверців та Білих Хорватів'
  - 'Трагедія Дулібів: аварське іго, знущання над жінками та літописна формула безслідного
    зникнення «погибоша аки обри»'
  - 'Загадка Білих Хорватів: Стільське городище (250 га) як забутий мегаполіс Європи
    VIII–X ст.'
  - 'Втрачений Південь: боротьба Уличів та Тиверців з печенігами, місто Пересічень
    та відхід на північ'
- section: 'Читання: II — Суспільний устрій та духовний світ'
  words: 950
  points:
  - 'Від роду до держави: еволюція суспільної ієрархії, роль племінних князів та збереження
    вічевих традицій'
  - '[!myth-buster] Жінка в слов''янському соціумі: спростування міфу про безправ''я,
    статус Матері та богині Лада і Дана'
  - 'Сакральний світ: функції Перуна (війна), Велеса (достаток) та Дажбога (сонце)'
  - 'Збруцький ідол як кам''яна енциклопедія: триярусна модель Всесвіту (Небо, Земля,
    Підземелля)'
  - 'Обрядовий календар: аграрна магія Коляди та Купала, культ священних гаїв та води'
- section: 'Читання: III — Економіка та побут'
  words: 450
  points:
  - '[!history-bite] Економіка виживання: підсічно-вогневе землеробство, бортництво
    та раціон без картоплі (ріпа, каші)'
  - 'Торгові артерії: контроль над шляхом «із варягів у греки» та Залозним шляхом;
    експорт хутра, меду, воску'
  - 'Залізо з боліт: технологія видобутку руди та сакралізація ковальського ремесла'
  - 'Матеріальна культура: енергоефективні напівземлянки з піччю-кам''янкою (Лука-Райковецька
    культура)'
  - 'Естетика та захист: одяг як оберіг (вишивка), скроневі кільця як етнічний паспорт
    племені'
- section: 'Читання: IV — Військова справа та державність'
  words: 400
  points:
  - 'Кейс-стаді: Повстання древлян 945 року — конфлікт племінної автономії та київського
    централізму'
  - 'Змієві вали: грандіозна система фортифікацій (1000 км) як доказ існування ранньої
    держави'
  - 'Військове мистецтво: озброєння (списи, сулиці, щити) та тактика засідок («дихання
    через очеретину»)'
  - 'Військова еліта: формування дружини та імпорт мечів як статусних символів'
- section: Деколонізаційний погляд
  words: 550
  points:
  - '[!decolonization] Розвінчання міфу про «спільну колиску»: автохтонність українського
    етногенезу від антів і склавінів'
  - 'Демократія vs Авторитаризм: південна вічова традиція як антипод північній моделі
    влади'
- section: Первинні джерела
  words: 600
  points:
  - '«Повість минулих літ»: політична упередженість Нестора (поляноцентризм) та опис
    «звіриного» життя древлян'
  - 'Візантійські хроніки: Прокопій Кесарійський про демократичний устрій та витривалість
    склавінів'
  - 'Арабський погляд: Ібн Фадлан про поховальні обряди (кремація) та побут русів'
- section: Потрібно більше практики?
  words: 200
  points:
  - 'Ментальна мапа: візуалізація розселення племен на сучасній карті України'
  - 'Дослідницький проєкт: пошук слов''янських топонімів у своєму регіоні'
