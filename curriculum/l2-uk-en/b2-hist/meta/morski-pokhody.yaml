slug: morski-pokhody
title: Морські походи козаків
word_target: 5000
content_outline:
- section: 'Вступ: Чорне море як арена боротьби'
  words: 400
  points:
  - 'Османське домінування у XVI-XVII ст.: Чорне море як «Турецьке озеро» (Karadeniz)'
  - Контроль шляхів постачання продовольства до Стамбула як вразливість імперії
  - Козацький виклик імперській монополії на мореплавство
- section: 'Козацька Чайка: Шедевр суднобудування'
