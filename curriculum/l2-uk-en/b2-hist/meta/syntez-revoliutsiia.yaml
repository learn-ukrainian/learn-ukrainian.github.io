slug: syntez-revoliutsiia
title: 'Синтез: Українська революція'
word_target: 5000
content_outline:
- section: 'Вступ: Втрачена незалежність'
  words: 400
  points:
  - '1917-1921: чотири роки відчайдушної боротьби за суб''єктність, а не ''хаос'''
  - 'Ключові дати: від створення УЦР (березень 1917) до Другого Зимового походу (листопад
    1921)'
  - 'Урок єдності: конфлікт еліт як фатальний фактор'
  - '[!history-bite] Цитата Володимира Винниченка про ''читання історії з бромом'''
- section: 'Етапи революції: I — Центральна Рада та Гетьманат'
  words: 800
  points:
  - 'Центральна Рада: доба романтиків (Грушевський, Винниченко); акцент на автономії
    та культурі'
  - 'Фатальна помилка УЦР: запізніле формування власної армії'
  - 'Гетьманат Павла Скоропадського: доба прагматиків; порядок, власність, культурний
    ренесанс (Академія наук)'
  - 'Проблема Гетьманату: залежність від німецької зброї та відчуження селянства'
  - '[!context] Зіткнення ''соціалістичного'' та ''консервативного'' кольорів революції'
- section: 'Етапи революції: II — Директорія та ЗУНР'
  words: 800
  points:
  - 'Директорія УНР: доба воїнів (Петлюра); повстання проти Гетьмана та війна на кілька
    фронтів'
  - 'ЗУНР: феномен високої організації та дисципліни Української Галицької Армії (УГА)'
  - 'Акт Злуки 22 січня 1919: символічна вершина соборності (Наддніпрянщина + Галичина)'
  - 'Трагічна іронія Директорії: ''У вагоні Директорія, під вагоном територія'''
- section: 'Причини поразки: I — Внутрішні чвари та соціальний хаос'
  words: 700
  points:
  - 'Внутрішній розкол: ненависть соціалістів до консерваторів та нерозуміння між
