  - '[!analysis] Отаманщина (Зелений, Ангел) як прокляття, що підривало єдиний фронт'
  - Цитата В'ячеслава Липинського про брак власної держави
- section: 'Причини поразки: II — Зовнішня агресія та військовий фактори'
  words: 700
  points:
  - 'Геополітична пастка: ''Чотирикутник смерті'' (Червона Росія, Біла Росія, Польща,
