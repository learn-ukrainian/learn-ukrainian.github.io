  - 'Військові фактори: катастрофічний брак зброї та амуніції'
  - '''Тіфозна зима'' та епідемії, що знищили боєздатність УГА'
- section: Первинні джерела в синтезі
  words: 600
  points:
  - 'Стилістичний контраст: поетичні Універсали УЦР vs сухі Грамоти Скоропадського'
  - 'Текст IV Універсалу (22 січня 1918): проголошення повної незалежності'
  - 'Мемуарна спадщина: самовиправдання Винниченка (''Відродження нації'') vs аристократичний
