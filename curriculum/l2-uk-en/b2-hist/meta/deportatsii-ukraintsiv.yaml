slug: deportatsii-ukraintsiv
title: Депортації українців 1944-1951
word_target: 5000
content_outline:
- section: 'Вступ: Післявоєнні переселення'
  words: 400
  points:
  - 'Контекст: Встановлення нових кордонів по «Лінії Керзона» та Люблінська угода
    9 вересня 1944 року між УРСР та ПКНВ.'
  - 'Політична мета: Прагнення Сталіна та польських комуністів до створення моноетнічних
    держав («вирішення українського питання»).'
  - 'Масштаб і етапи: Сумарно понад 700 тисяч депортованих; три хвилі: 1944–1946 (до
    УРСР), 1947 («Вісла»), 1951 (обмін територіями).'
- section: 'Депортації до СРСР (1944-1946): I — Етапи та методи'
  words: 600
  points:
  - 'Від «добровільності» до терору: Швидкий перехід від агітації до примусового виселення
    військами НКВС та польською міліцією.'
  - 'Механіка вигнання: Оточення сіл, 2 години на збори, тижні очікування на станціях
    просто неба.'
  - 'Транспортування: Товарні вагони («телятники»), антисанітарія та нелюдські умови
    перевезення.'
- section: 'Депортації до СРСР (1944-1946): II — Нове життя та втрати'
  words: 600
  points:
  - 'Географія розселення: Західні області України (покинуті польські хати) та Південь/Схід
    (заповнення робочої сили після Голодомору).'
  - 'Культурна катастрофа: Втрата матеріальної спадщини (церкви, дзвони, архіви) та
    розрив тяглості поколінь.'
  - 'Психологічна травма: Адаптація горян до умов степу, втрата локальної ідентичності
    та діалектів.'
- section: 'Операція «Вісла» (1947): I — Привід та початок'
  words: 650
  points:
  - 'Створення приводу: Загибель генерала Кароля Свєрчевського (28 березня 1947) як
    формальний casus belli для каральної акції.'
  - 'Військовий масштаб: Залучення 6 дивізій Війська Польського, тактика «випаленої
    землі».'
  - 'Тотальна депопуляція: Повне виселення українців з Лемківщини, Надсяння, Холмщини
    та Підляшшя (квітень-липень 1947).'
- section: 'Операція «Вісла» (1947): II — Асиміляція та репресії'
  words: 650
  points:
  - 'Стратегія розпорошення: Заборона селити більше 3-4 родин в одному селі на «Повернених
    землях» (захід Польщі) для швидкої полонізації.'
  - 'Концтабір Явожно: Створення філії Аушвіцу для ув''язнення української інтелігенції
    та підозрілих (майже 4000 в''язнів, 161 загиблий).'
  - 'Етноцид: Ліквідація греко-католицької церкви, заборона на повернення, адміністративні
    перепони для гуртування.'
- section: Первинні джерела
  words: 600
  points:
  - 'Голоси депортованих: Спогади про момент прощання з рідним домом («Нас везли як
    худобу...»).'
  - 'Офіційні документи: Звіти МДБ та польської безпеки про «успішне очищення прикордонної
    смуги».'
  - 'Листи бойків (1951): Свідчення про трагедію переселення з гір у посушливі степи
    Одещини («Тут хліб росте, а ми вмираємо»).'
- section: 'Деколонізаційний погляд: I — Міфи та реальність'
  words: 500
  points:
  - 'Термінологічна війна: Спростування радянських/польських евфемізмів «евакуація»,
    «репатріація», «гуманітарна акція».'
  - 'Кваліфікація злочину: Операція «Вісла» як етнічна чистка з ознаками етноциду
    (колективне покарання цивільних).'
  - 'Паралелі з сучасністю: Порівняння аргументації сталінського режиму з російською
    практикою депортацій на окупованих територіях України.'
- section: 'Деколонізаційний погляд: II — Історичні паралелі'
  words: 500
  points:
  - 'Спільний почерк імперії: Аналогії з депортацією кримських татар 1944 року (товарні
    вагони, спецпоселення, стирання пам''яті).'
  - 'Боротьба за визнання: Засудження операції Сенатом Польщі (1990) та складні дискусії
    навколо офіційного визнання злочином проти людяності.'
  - 'Українська позиція: Офіційне визнання депортацій злочинними на державному рівні.'
- section: 'Підсумок: Спадщина травми'
  words: 500
  points:
  - 'Життя після: Феномен «Лемківської ватри» як символ опору асиміляції та збереження
    ідентичності.'
  - 'Роль церкви: Підпільна діяльність УГКЦ та православних громад у збереженні українства
    в Польщі.'
  - 'Головний урок: Розуміння власної держави як єдиного гаранта безпеки нації від
    повторення подібних трагедій.'
