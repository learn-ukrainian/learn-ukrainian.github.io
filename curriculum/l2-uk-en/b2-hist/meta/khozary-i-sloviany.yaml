id: khozary-i-sloviany
slug: khozary-i-sloviany
version: "1.0"
title: Хозарський каганат і слов'яни
word_target: 5000
content_outline:
- section: 'Вступ: Велетень на Сході'
  words: 600
  points:
  - Хозарський каганат як могутня торговельна імперія, що контролювала ключові шляхи
    (Волга, Дон)
  - 'Роль ''щита Європи'': зупинка арабської армії Мервана у 737 році та порятунок
    Східної Європи від ісламізації'
  - 'Геополітичне значення: контроль над транзитною торгівлею та баланс сил між Візантією
    і Халіфатом'
- section: 'Читання: I — Політична система двовладдя'
  words: 700
  points:
  - 'Унікальна система поділу влади: сакральний Каган (символ благополуччя, ''фарн'')
    та реальний Бек/Шад (військове і адміністративне управління)'
  - 'Механізми стабільності: сакралізація влади як запобіжник від узурпації та політичних
    криз'
  - 'Історичні паралелі: порівняння з конституційними монархіями або сучасним поділом
    влади, але з містичним підтекстом'
- section: 'Читання: II — Релігійний вибір'
  words: 700
  points:
  - Прийняття іудаїзму верхівкою каганату як стратегічний крок для збереження незалежності
    від християнської Візантії та ісламського Халіфату
  - 'Релігійна толерантність у державі: співіснування іудаїзму, християнства, ісламу
    та язичництва'
  - Вплив релігійного вибору на культурну ідентичність та дипломатичні зв'язки
- section: 'Читання: III — Салтівська культура та економіка'
  words: 700
  points:
  - 'Салтівська археологічна культура як матеріальне відображення Хозарії: білокам''яне
    будівництво (Саркел), високий рівень ремесел'
  - 'Економічна основа: транзитна торгівля дирхемами, контроль над Шовковим шляхом
    та Волзьким шляхом'
  - 'Київ (Самбатас) як хозарський форпост: гіпотези про заснування або функціонування
    міста як митниці'
- section: 'Первинні джерела: I — Хозарська кореспонденція'
  words: 600
  points:
  - 'Аналіз ''Листа царя Йосипа'': опис географії каганату, підвладних народів та
    стратегічної ролі ''охоронця гирла ріки'''
  - 'Кембриджський документ: свідчення про русько-візантійсько-хозарські війни та
    роль Х-л-гу (Хельгу/Олега)'
  - Русь як активний суб'єкт міжнародної політики у хозарських документах
- section: 'Первинні джерела: II — Слов''янський погляд'
  words: 600
  points:
  - 'Літописна легенда про ''данину мечами'': символізм двосічної зброї (мечі русів)
    проти однобічної (шаблі хозар)'
  - 'Пророцтво хозарських старців про майбутню зміну ролей: ''Вони візьмуть данину
    з нас'''
  - Еволюція відносин від васальної залежності (сплата данини) до відкритого протистояння
- section: 'Деколонізаційний погляд: I — Міф про «хозарське ярмо»'
  words: 500
  points:
  - Спростування радянського та імперського наративу про 'паразитарну державу' (Л.
    Гумільов)
  - 'Концепція Pax Khazarica: безпека торгових шляхів як стимул для економічного розвитку
    слов''янських племен'
  - 'Хозарія як вікно у глобальний світ: доступ до міжнародних ринків та культурний
    обмін'
- section: 'Деколонізаційний погляд: II — Імперська спадщина'
  words: 500
  points:
  - Запозичення титулу 'каган' київськими князями (Аскольд, Володимир Великий) як
    претензія на рівний статус
  - 'Державотворчий вплив: наслідування хозарської адміністративної та військової
    моделі'
  - Русь не як 'жертва', а як спадкоємець степової гегемонії
- section: Підсумкове есе
  words: 300
  points:
  - 'Постановка аналітичного завдання: оцінка ролі Хозарії як каталізатора розвитку
    Русі'
  - 'Ключові вектори аналізу: зовнішня загроза, торгові інтереси, інституційні запозичення'
  - 'Підготовка до написання есе: структурування аргументів за і проти'
- section: Підсумок
  words: 400
  points:
  - 'Розгром каганату Святославом у 965 році (''І град їхній Білу Вежу взяв''): кінець
    епохи'
  - 'Геополітичні наслідки: ''відкриття воріт'' для печенізької навали та зміна балансу
    сил у степу'
  - Культурний та історичний спадок Хозарії в історії України
- section: Потрібно більше практики?
  words: 100
  points:
  - Ресурси для самостійного поглиблення знань (Літопис Руський, праці О. Пріцака)
  - Рекомендації щодо додаткового читання про Салтівську культуру
