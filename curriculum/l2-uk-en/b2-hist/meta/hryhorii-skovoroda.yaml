slug: hryhorii-skovoroda
title: 'Григорій Сковорода: Мандрівний філософ'
word_target: 5000
content_outline:
- section: 'Вступ: Український Сократ'
  words: 400
  points:
  - Сковорода як символ духовної свободи та інтелектуальної незалежності
  - 'Порівняння із Сократом: мандрівний спосіб життя, діалогічний метод навчання,
    відмова від записів (хоча Сковорода писав, але не друкував)'
  - 'Легендарна відповідь Катерині II (або посланцям): «Мені моя сопілка і вівця дорожчі
    царського вінця»'
  - Епітафія «Світ ловив мене, та не впіймав» — маніфест втечі від спокус, посад та
    матеріального світу
- section: 'Життєвий шлях: Від академії до дороги'
  words: 900
  points:
  - 'Навчання в Києво-Могилянській академії (1734–1753): формування світогляду, вивчення
    мов (латина, грецька, іврит) та піїтики'
  - 'Перебування у придворній співацькій капелі в Санкт-Петербурзі (1741–1744): знайомство
    з імперським світом та відраза до нього'
  - 'Європейські мандри (1745–1750) у складі «Токайської комісії»: Відень, Братислава,
    Токай; доступ до бібліотек та наукових кіл'
  - 'Викладацька діяльність у Переяславському та Харківському колегіумах: конфлікт
    новаторства з традиційною системою («не вчив так, як заведено»)'
  - Остаточний розрив з офіційною кар'єрою (1769) та перехід до статусу мандрівного
    філософа
- section: 'Філософія серця: Сродна праця'
  words: 900
  points:
  - 'Концепція «сродної праці»: щастя через діяльність, що відповідає природним нахилам
    людини'
  - 'Теорія двох натур: видима (матеріальна, тлінна) та невидима (духовна, вічна,
    Бог)'
  - 'Вчення про три світи: Макрокосм (Всесвіт), Мікрокосм (Людина), Символічний світ
    (Біблія)'
  - 'Імператив «Пізнай себе» (Nosce te ipsum): шлях до Бога через відкриття «істинної
    людини» у власному серці'
  - 'Божественний промисел: «Потрібне зробив неважким, а важке — непотрібним»'
- section: 'Літературна спадщина: Сад божественних пісень'
  words: 700
  points:
  - '«Сад божественних пісень» як збірка духовної лірики: поєднання особистих переживань
    та біблійних мотивів'
  - 'Пісня 10 «Всякому місту — звичай і права»: сатира на соціальні вади (хабарництво,
    бюрократія, пияцтво)'
  - 'Вплив барокової естетики: використання символів, емблем, антитез та метафор'
  - 'Мовне питання: використання книжної української мови (словенороської) з вкрапленнями
    живої народної лексики'
- section: 'Читання: Байки та афоризми'
  words: 800
  points:
  - '«Байки Харківські»: структура байки (фабула + «сила») та їхня морально-етична
    спрямованість'
  - 'Аналіз байки «Бджола та Шершень»: протиставлення паразитичного споживання (Шершень)
    та творчої праці (Бджола)'
  - 'Інтерпретація афоризмів: «Бери вершину і матимеш середину», «З усіх утрат втрата
    часу найтяжча»'
  - 'Любов як основа взаємодії: «Любов виникає з любові; коли хочу, щоб мене любили,
    я сам перший люблю»'
- section: 'Первинні джерела: Листи до Михайла Ковалинського'
  words: 600
  points:
  - Михайло Ковалинський — улюблений учень, друг і перший біограф Сковороди
  - Дружба як вища форма духовної єдності та філософська категорія у листах
  - 'Педагогічні поради: гігієна читання («не їж без смаку»), помірність у їжі та
    сні'
  - Поняття «веселість серця» (душевний спокій) як головна мета життя філософа
- section: 'Деколонізаційний погляд: Не «русский философ»'
  words: 700
  points:
  - Спростування імперського міфу про «першого російського філософа» (В. Ерн) та радянського
    образу «селянського демократа»
  - Сковорода як продукт української барокової культури та Києво-Могилянської академії,
    а не російського православ'я
  - 'Географія життя: Гетьманщина та Слобожанщина як основний простір, відсутність
    зв''язків з Москвою'
  - Вплив на українське відродження XIX-XX ст. та сучасне сприйняття (знищення музею
    у Сковородинівці 2022 року)
  - Актуальність філософії свободи та гідності в контексті сучасної війни за незалежність
