slug: krymski-tatary-pislia-2014
title: Кримські татари після 2014
word_target: 5000
content_outline:
- section: 'Вступ: Подвійні жертви'
  words: 700
  points:
  - 'Кримські татари як корінний народ: екзистенційна загроза ідентичності на рідній
    землі під час нової окупації.'
  - 'Історична травма, що повторюється: паралелі між сталінською депортацією 1944
    року та гібридним тиском 2014-го.'
  - '[!history-bite] Решат Аметов: викрадення та вбивство першої жертви окупації (березень
    2014) як акт терору проти мирного спротиву.'
- section: 'Російська окупація та репресії: I — Інституційний терор'
  words: 800
  points:
  - '[!context] Заборона Меджлісу (2016): визнання представницького органу «екстремістським»
    та криміналізація самоврядування.'
  - '[!myth-buster] Справи «Хізб ут-Тахрір»: використання звинувачень у тероризмі
    як інструменту для ув''язнення громадських активістів та журналістів.'
  - 'Статистика репресій: понад 100 політичних в''язнів, системне переслідування за
    нелояльність та релігійні переконання.'
- section: 'Російська окупація та репресії: II — Фізичне знищення'
  words: 800
  points:
  - 'Тактика залякування: регулярні обшуки о 4-й ранку в будинках кримських татар
    як метод психологічного терору цілих родин.'
  - 'Насильницькі зникнення: справа Ервіна Ібрагімова та атмосфера страху, де окупаційна
    влада не розслідує злочини проти активістів.'
  - 'Примусова мобілізація (з 2022 року): цинічне використання призову до армії РФ
    як форми прихованого етноциду та «утилізації» чоловіків.'
- section: 'Спротив та еміграція: I — Боротьба з материка'
  words: 700
  points:
  - 'Меджліс у вигнанні: координація міжнародного спротиву з Києва лідерами нації
    (Мустафа Джемілєв, Рефат Чубаров).'
  - Цитата Рефата Чубарова про «вердикт на знищення» як характеристику будь-яких поступок
    щодо статусу Криму.
  - 'Військовий вимір: створення добровольчого батальйону імені Номана Челебіджіхана
    (2016) для захисту адміністративного кордону.'
- section: 'Спротив та еміграція: II — Внутрішній фронт'
  words: 700
  points:
  - '[!culture] Феномен «Кримської солідарності»: унікальна самоорганізація народу
    для допомоги політв''язням та висвітлення судів.'
  - 'Акція «Кримський марафон»: збір монет по 10 рублів на сплату штрафів як символ
    абсурдності окупаційного правосуддя.'
  - 'Вимушене переміщення: спростування міфу про «добровільний виїзд» — збереження
    зв''язків з батьківщиною та адвокація на материку.'
- section: Первинні джерела
  words: 600
  points:
  - '[!quote] Листи Нарімана Джеляла з в''язниці («Ми не зломлені...»): маніфест гідності
    та віри в справедливість попри вирок.'
  - 'Документування злочинів: звіти правозахисних організацій (ZMINA, Кримськотатарський
    Ресурсний Центр, ООН) як доказова база.'
  - 'Правовий нігілізм РФ: ігнорування вимог Міжнародного суду ООН про скасування
    заборони Меджлісу.'
- section: Деколонізаційний погляд
  words: 600
  points:
  - '[!decolonization] Концепція «гібридного геноциду»: політика заміщення населення
    через витіснення корінних жителів та завезення колонізаторів.'
  - 'Тяглість імперського методу: від товарних вагонів 1944 року до сфабрикованих
    кримінальних справ 2014-го — мета одна (Крим без татар).'
  - 'Формування політичної нації: спільна трагедія та спільний ворог як фактори безпрецедентного
    єднання українців і кримських татар.'
- section: 'Підсумок: Боротьба триває'
  words: 600
  points:
  - 'Дипломатичні перемоги: міжнародне визнання депортації 1944 року геноцидом та
    підтримка Кримської платформи.'
  - 'Стратегія деокупації: відкидання будь-яких територіальних компромісів — Крим
    є невід''ємною частиною України.'
  - 'Майбутнє: закріплення статусу національно-територіальної автономії у вільному
    Криму як єдина гарантія збереження нації.'
