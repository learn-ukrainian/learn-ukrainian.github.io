slug: upa
title: 'УПА: Збройний опір'
word_target: 5000
content_outline:
- section: 'Вступ: Війна на два фронти'
  words: 600
  points:
  - '14 жовтня 1942: символічна дата створення УПА (наказ ч. 1/47) та концепція «Між
    двома вогнями» (проти нацистів і більшовиків).'
  - 'Стратегічна мета: здобути власну державу, щоб не стати розмінною монетою після
    війни; унікальність армії без зовнішньої допомоги.'
  - Поліська Січ Тараса Бульби-Боровця як предтеча збройного опору на Поліссі.
- section: 'Створення та організація: Об''єднання сил'
  words: 600
  points:
  - Роль ОУН(б) у формуванні єдиної військової структури восени 1942 року; інтеграція
    розрізнених загонів.
  - Дмитро Клячківський (Клим Савур) — організатор УПА на Волині та перші масштабні
    акції.
  - 'Ідеологічна основа: Присяга воїна УПА (червень 1943) — клятва вірності «Великому
    Народу Українському».'
- section: 'Створення та організація: Структура і тил'
  words: 800
  points:
  - Роман Шухевич (Тарас Чупринка) — Головнокомандувач, який створив регулярну армію
    (УПА-Північ, УПА-Захід, УПА-Південь).
  - '«Підпільна держава»: власна валюта (бофони), Червоний Хрест УПА, шпиталі та друкарні
    в лісах.'
  - 'Інформаційна війна: листівки до народів СРСР («Чому ти стріляєш в брата?») та
    заклики до поневолених націй.'
- section: 'Бойовий шлях: Антинімецький фронт'
  words: 700
  points:
  - 'Весна 1943: розгортання масової боротьби проти нацистів, порятунок молоді від
    вивезення в Німеччину.'
  - Колківська республіка (квітень-листопад 1943) — «держава в державі» без німецької
    адміністрації.
  - 'Статистика опору: понад 2500 боїв, 12 тисяч вбитих окупантів; нацистські нагороди
    за голови командирів УПА.'
- section: 'Бойовий шлях: Волинська трагедія'
  words: 700
  points:
  - 'Липень 1943: апогей українсько-польського конфлікту на Волині; історичні передумови
    (пацифікація).'
  - 'Характер конфлікту: взаємні етнічні чистки, війна сіл, жертви серед мирного населення
    з обох боків.'
  - 'Спростування однобічних звинувачень: документи свідчать про обопільний характер
    жорстокості в умовах безвладдя.'
- section: 'Бойовий шлях: Протистояння з СРСР та Польщею'
  words: 800
  points:
  - Бій під Гурбами (квітень 1944) — найбільша відкрита битва (5 тис. повстанців проти
    30 тис. військ НКВС).
  - 'Зміна тактики: перехід до дій малими групами, будівництво мережі криївок (бункерів)
    для тривалого підпілля.'
  - 'Операція «Вісла» (1947): депортація українців Польщею; спроби УПА захистити цивільне
    населення в нерівних умовах.'
- section: Первинні джерела
  words: 600
  points:
  - 'Документальна база: Накази Головного Військового Штабу, звіти «хроніки сотень»,
    щоденники командирів.'
  - 'Мистецтво опору: дереворити Ніла Хасевича як потужна візуальна зброя та доказ
    існування підпілля для світу.'
  - «Літопис УПА» — багатотомне джерело спогадів, що фіксує імена, дати та обставини
    боїв.
- section: Деколонізаційний погляд
  words: 600
  points:
  - 'Спростування міфу про «колабораціонізм»: Нюрнберзький трибунал не визнав УПА
    злочинною організацією.'
  - 'Пакт Молотова-Ріббентропа: нагадування, що СРСР був союзником Гітлера, коли українці
    вже вели боротьбу.'
  - 'Радянські фальсифікації: діяльність спецгруп НКВС під виглядом загонів УПА для
    дискредитації руху.'
- section: 'Підсумок: Спадщина'
  words: 400
  points:
  - Загибель Романа Шухевича (1950) у Білогорщі та арешт Василя Кука (1954) — кінець
    централізованого опору.
  - 'Феномен тривалості: останній бій групи «Петра» на Тернопільщині у 1960 році.'
  - 'Жива традиція: «Слава Україні! Героям Слава!», червоно-чорний прапор та етос
    боротьби у сучасних ЗСУ.'
