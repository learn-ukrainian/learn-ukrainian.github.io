  - 'Симбіоз замість ворожнечі: греки та скіфи як партнери, а не «цивілізація проти
    варварів»'
  - 'Історична тяглість: від античних полісів до Русі (хрещення Володимира в Херсонесі)'
- section: Підсумок
  words: 300
  points:
  - 'Значення античної спадщини: урбаністичні та демократичні традиції на українських
