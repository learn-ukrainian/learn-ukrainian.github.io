- section: 'Вступ: Греки на Понті'
  words: 400
  points:
  - 'Велика грецька колонізація (VIII–VI ст. до н. е.): причини («стенохорія», демографія)
    та міграція з Мілета'
  - 'Ойкіст та сакральний зв''язок з метрополією: перенесення священного вогню'
  - 'Трансформація простору: від Понту Аксейн (Негостинного) до Понту Евксейн (Гостинного)'
  - 'Концепція ойкумени на українських землях: початок культурного діалогу цивілізацій'
- section: 'Читання: Ольвія — демократія в степу'
  words: 700
  points:
  - 'Заснування Ольвії (647/646 рр. до н. е.) на березі Бузького лиману: «Щаслива»
    колонія'
  - 'Політичний устрій: пряма демократія, народні збори (еклесія) та рада (буле)'
  - 'Економічний симбіоз: експорт зерна та рабів, імпорт вина; роль скіфів у торгівлі'
  - 'Героїчна оборона: облога Зопіріона (331 р. до н. е.), звільнення рабів та союз
    зі скіфами'
- section: 'Херсонес Таврійський: Держава присяги'
  words: 700
  points:
  - 'Заснування вихідцями з Гераклеї (422–421 рр. до н. е.): дорійський характер та
    сувора дисципліна'
  - 'Унікальна хора (ЮНЕСКО): клери, агротехніка та спеціалізація на виноробстві'
  - 'Присяга громадян: документ III ст. до н. е. як свідчення високої політичної культури'
  - 'Стратегічне значення: контроль над морськими шляхами та безпека держави'
- section: Боспорське царство та Тіра
  words: 500
  points:
  - 'Пантікапей (Керч) — столиця монархії: династії Археанактидів та Спартокідів'
  - '«Житниця Еллади»: експорт зерна до Афін (свідчення Демосфена) як основа могутності'
  - 'Тіра (Білгород-Дністровський): торговий форпост у гирлі Дністра, зв''язки з гетами'
  - 'Понтійські війни: роль Мітрідата VI Євпатора як захисника еллінізму від Риму'
- section: 'Економіка та Культура: I — Господарство та побут'
  words: 400
  points:
  - 'Сільське господарство: домінування виноградарства (Херсонес) та зернових (Боспор)'
  - 'Урбаністика: Гіпподамова система планування вулиць, водогін та каналізація'
  - 'Архітектура та комфорт: кам''яне будівництво, терми, театри як центри життя'
  - 'Ремісництво: кераміка, металообробка та виготовлення рибного соусу гарум'
- section: 'Економіка та Культура: II — Духовний світ'
  words: 400
  points:
  - 'Релігія: культ Ахілла Понтарха (Владики Понту) на острові Левке (Зміїний)'
  - 'Освіта та виховання: роль гімнасіїв у формуванні громадянина (фізичний та розумовий
    розвиток)'
  - 'Медицина: знахідки хірургічних інструментів, високий рівень лікарської справи'
  - 'Інтеграція еліт: боспорські царі з іранськими іменами, скіфський вплив на одяг'
- section: Занепад античного світу
  words: 500
  points:
  - 'Готська навала (III ст. н. е.): «Скіфські війни» та руйнування сільської округи
    (хори)'
  - 'Гунська катастрофа (370-ті рр. н. е.): кінець класичної античної доби, падіння
    Боспору'
  - 'Доля міст: занепад Ольвії та Тіри до рівня селищ'
  - 'Виживання Херсонеса: стіни та візантійський гарнізон перетворюють місто на форпост
    імперії'
- section: 'Первинні джерела: Голоси епохи'
  words: 600
  points:
  - 'Аналіз «Присяги громадян Херсонеса»: клятва вірності демократії, заборона розголошення
    таємниць'
  - 'Економічний протекціонізм у Присязі: заборона вивозити хліб повз місто'
  - 'Декрет на честь Протогена (Ольвія): свідчення кризи, страху перед галатами та
    фінансового виснаження'
  - 'Евергетизм: як багаті громадяни (Протоген) рятували місто власним коштом (стіни,
    дари варварам)'
- section: Деколонізаційний погляд
  words: 500
  points:
  - 'Спростування міфу про «російський Крим»: 2500 років грецької історії проти імперських
    наративів'
  - 'Україна — спадкоємиця Середземномор''я: антична культура як частина нашого цивілізаційного
