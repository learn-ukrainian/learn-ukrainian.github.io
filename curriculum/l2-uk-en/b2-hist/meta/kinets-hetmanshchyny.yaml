slug: kinets-hetmanshchyny
title: Кінець Гетьманщини
word_target: 5000
content_outline:
- section: Вступ
  words: 600
  points:
  - 'Контекст «Золотої осені» (1750–1764): спроба Кирила Розумовського модернізувати
    Гетьманщину (судова реформа, Батуринський університет) як європейську державу.'
  - 'Парадокс «освіченого абсолютизму»: листування Катерини II з Вольтером про свободу
    vs реальна політика централізації та уніфікації імперії.'
  - 'Інсценізована «Глухівська рада» 1764 року: примусова відставка гетьмана під загрозою
    репресій; фраза Катерини II «Належить, щоб вік і ім''я гетьманів зникли».'
- section: 'Читання: I — Ліквідація інститутів Гетьманщини'
  words: 900
  points:
  - 'Створення Другої Малоросійської колегії (1764) на чолі з Петром Румянцевим: інструкція
    про асиміляцію («зробити з них росіян»).'
  - Румянцевський опис (1765–1769) як інструмент фіскального контролю та підготовка
    до повного оподаткування населення.
  - 'Адміністративна уніфікація: ліквідація полкового устрою на Слобожанщині (1765)
    та перетворення полків на гусарські частини.'
  - Скасування полково-сотенного устрою на Лівобережжі (1781) та запровадження російських
    намісництв; заміна козацького судочинства імперським.
- section: 'Читання: II — Трагедія Запорозької Січі'
  words: 900
  points:
  - 'Військова операція 1775 року: повернення військ генерала Текелія з турецької
    війни та підступне оточення Січі.'
  - 'Доля останньої козацької еліти: арешт кошового Петра Калнишевського та його 25-річне
    ув''язнення в кам''яному мішку Соловецького монастиря.'
  - 'Колонізація Півдня: роздача земель російським дворянам та іноземним колоністам
    (німцям, сербам); перейменування топонімів (грецький проєкт).'
  - 'Імперський брендинг: запровадження назви «Новоросія» для стирання пам''яті про
    козацькі Вольності та адміністративна «зачистка» території.'
- section: 'Читання: III — Соціальна трансформація: від козаків до кріпаків'
  words: 900
  points:
  - 'Указ 1783 року про закріпачення селян Лівобережжя та Слобожанщини: юридичне перетворення
    вільних людей на власність поміщиків.'
  - 'Доля козацької старшини: «угода з дияволом» — отримання прав російського дворянства
    в обмін на лояльність та відмову від політичних прав.'
  - 'Трагізм ситуації очима сучасників: як колишні вільні козаки ставали кріпаками
    своїх же вчорашніх командирів.'
  - 'Соціальні наслідки: формування прірви між русифікованою елітою та закріпаченим
    українським селянством.'
- section: Деколонізаційний погляд
  words: 700
  points:
  - 'Термінологічна війна: використання понять «анексія» та «інкорпорація» замість
    радянських міфів про «добровільне об''єднання».'
  - 'Спростування міфу про «Дике Поле»: Південь України був простором активної козацької
    колонізації (зимівники), а не «пустелею», яку «освоїла» імперія.'
  - '«Новоросія» як колоніальний конструкт: штучна назва, покликана легітимізувати
    російську присутність на давніх українських землях.'
  - 'Лінгвоцид пам''яті: заборона вживати саму назву «запорозькі козаки» як доказ
    свідомого етноциду, а не просто адміністративної реформи.'
- section: Первинні джерела
  words: 600
  points:
  - 'Маніфест Катерини II 1775 року: аналіз тексту, де проголошується мета «на вѣчныя
    времена истребить» навіть ім''я козаків.'
  - 'Усна історія та фольклор: спогади Микити Коржа про прощання з Січчю (цілування
    землі, сльози суворих воїнів) — емоційний вимір трагедії.'
  - '«Історія Русів» як політичний заповіт епохи: спроба захистити історичні права
    України та автономістські настрої козацької еліти.'
  - 'Документи про кріпацтво: юридична мова указів 1783 року, що закріплювала рабство
    на українських землях.'
- section: Підсумок
  words: 400
  points:
  - 'Цивілізаційна катастрофа кінця XVIII століття: завершення 300-річної ери української
    державності (від Хмельницького до Калнишевського).'
  - 'Трансформація нації: перетворення з політичної спільноти на етнографічну масу
    («селянська нація»); втрата власної еліти.'
  - 'Місток у майбутнє: початок «довгого XIX століття» — боротьби за культурне виживання
    в умовах повної бездержавності (до 1917 року).'
- section: Потрібно більше практики?
  words: 0
  points:
