slug: holodomor-pamiat
title: 'Голодомор: Пам''ять та визнання'
word_target: 5000
content_outline:
- section: 'Вступ: Злочин без кари'
  words: 600
  points:
  - 'Радянська стіна мовчання: фальсифікація метричних книг (смерть від ''старості''
    замість голоду) та табу на згадку трагедії'
  - 'Цинізм Заходу: політика realpolitik, визнання СРСР Сполученими Штатами у 1933
    році попри звіти дипломатів про голод'
  - 'Рафаель Лемкін: український досвід як основа концепції ''геноцид'' (чотири складові:
    інтелігенція, церква, селянство, розсіювання)'
- section: 'Свідки та журналісти: І — Гарет Джонс'
  words: 600
  points:
  - 'Гарет Джонс: валлійський журналіст, який наважився побачити правду на власні
    очі'
  - 'Подорож у березні 1933 року: пішки селами Харківщини, живі свідчення вмирання
    (''Всі опухлі'', ''Чекаємо на смерть'')'
  - 'Берлінська прес-конференція: шокуюча правда для світу, який не хотів чути'
- section: 'Свідки та журналісти: ІІ — Інформаційна війна'
  words: 600
  points:
  - 'Волтер Дюранті та New York Times: свідома брехня (''Russians are hungry but not
    starving'') заради доступу до Кремля'
  - 'Пулітцерівська премія на крові: цинізм фрази ''не можна приготувати яєчню, не
    розбивши яєць'''
  - 'Малкольм Маггерідж: правдиві репортажі дипломатичною поштою про ''війну режиму
    проти селянства'''
  - Радянські 'потьомкінські села' для іноземних делегацій (візит Едуарда Ерріо)
- section: 'Боротьба за визнання: І — Роль діаспори та Комісія Мейса'
  words: 700
  points:
  - Українська діаспора (UCCA) як хранитель пам'яті в часи радянського забуття
  - 'Комісія Конгресу США (1985–1988) під керівництвом Джеймса Мейса: збір тисяч свідчень
    (Oral History Project)'
  - 'Висновки комісії: події 1932–1933 років є геноцидом українського народу'
  - 'Мейс: ''Ваші мертві вибрали мене'' — місія американського історика'
- section: 'Боротьба за визнання: ІІ — Відкриття правди в Незалежній Україні'
  words: 600
  points:
  - '1991 рік: відкриття архівів КДБ та оприлюднення директив про ''чорні дошки'''
  - 'Закон України 2006 року: офіційна юридична кваліфікація Голодомору як геноциду'
  - 'Міжнародне визнання: від Естонії (1993) до хвилі рішень парламентів ЄС (2022–2024)
    на тлі нової агресії РФ'
- section: 'Первинні джерела: Доказова база'
  words: 600
  points:
  - Статті Гарета Джонса ('Famine Rules Russia') як документ епохи
  - 'Листи іноземних інженерів (Джеррі Берман): погляд зсередини індустріалізації
    на тлі смертей'
  - 'Щоденники селян (Олексій Наливайко): хроніка виживання та нищення села, що дивом
    дійшла до нас'
- section: 'Деколонізаційний погляд: І — Юридична природа геноциду'
  words: 600
  points:
  - 'Відповідність Конвенції ООН 1948 року: умисне створення умов для фізичного знищення
    групи'
  - 'Спростування міфу про ''загальносоюзний голод'': специфіка репресій в УРСР та
    на Кубані (закриття кордонів)'
  - 'Російське заперечення як доказ злочинного наміру: знищення пам''ятників у Маріуполі
    сьогодні'
- section: 'Деколонізаційний погляд: ІІ — Травма постгеноцидного суспільства'
  words: 500
  points:
  - 'Концепція Джеймса Мейса: ''постгеноцидне суспільство'' з травмованою душею'
  - 'Наслідки: страх, політична пасивність, русифікація вимерлих регіонів переселенцями'
  - 'Подолання травми: відновлення національної ідентичності та історичної пам''яті'
- section: 'Підсумок: Чому це важливо'
  words: 300
  points:
  - 'Акція ''Запали свічку'' (четверта субота листопада): національний ритуал єднання
    живих і мертвих'
  - 'Національний музей Голодомору-геноциду: місце застереження для світу'
  - 'Урок історії: непокаране зло повертається — зв''язок між Голодомором і сучасною
    війною РФ проти України'
