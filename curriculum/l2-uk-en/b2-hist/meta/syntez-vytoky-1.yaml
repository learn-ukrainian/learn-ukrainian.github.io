id: syntez-vytoky-1
version: "1"
slug: syntez-vytoky-1
title: 'Синтез: Від Трипілля до Києва'
word_target: 5000
content_outline:
- section: Огляд періоду
  words: 900
  points:
  - 'Україна як глобальне перехрестя: міст між Сходом (Степ) і Заходом (Європа), лісом
    і морем'
  - 'Економічний фундамент: чорнозем як спадок Трипільської культури та торгові шляхи
    (''із варяг у греки'')'
  - 'Хронологія синтезу: від розквіту Трипілля (5400–2650 до н.е.) до скіфського панування
    (700–300 до н.е.)'
  - Велике розселення слов'ян та Антський союз (IV–VII ст. н.е.) як протодержава
  - Легендарне заснування Києва (482 рік) та утвердження Русі (882 рік)
  - '[!context] Глобальна синхронізація: заснування Києва (482) майже збігається з
    падінням Риму (476) — зміна цивілізаційних епох'
- section: Ключові теми
  words: 900
  points:
  - 'Концепція ''плавильного котла'': український етнос як синтез слов''янської основи
    з іранським та іншими елементами'
  - 'Мовна археологія: іранізми в українській мові (''Бог'', ''рай'', ''собака'')
    та відсутність звуку ''ф'' у питомих словах'
  - '[!myth-buster] Спростування імперського міфу про ''Спільну колиску'' та ''єдиний
    народ'''
  - 'Автохтонність: українці не ''відбрунькувалися'' від росіян, а мають окремий,
    глибокий етногенез на власній землі'
  - 'Спростування міфу про ''Дике Поле'': Степ як зона контактів і синтезу, а не порожнеча'
- section: Первинні джерела
  words: 800
  points:
  - 'Геродот (IV ст. до н.е.) про скіфів: ''не мають ні міст, ні укріплень'', тактика
    мобільності та свободи'
  - 'Прокопій Кесарійський (VI ст. н.е.) про антів: життя в ''народоправстві'', відсутність
    єдиного царя-тирана'
  - 'Порівняльний аналіз: спільні риси волелюбності та демократизму у різних народів
    на українських землях'
  - '[!quote] Цитата Прокопія про те, що ''щастя і нещастя в житті вважається справою
    загальним'''
- section: 'Текст: Тяглість у сьогодення'
  words: 900
  points:
  - '[!decolonization] Ми не ''молода нація'': сучасна ідентичність базується на тисячолітньому
    фундаменті'
  - 'Українська ментальність: поєднання індивідуалізму (''хуторянство'') зі здатністю
    до миттєвої самоорганізації (Майдан)'
  - Історична пам'ять як імунітет проти пропаганди 'штучної держави'
  - 'Спадковість політичної культури: від антського віча до сучасного громадянського
    суспільства'
- section: Підсумкове есе
  words: 600
  points:
  - 'Аналіз демократичних традицій: пряма лінія від віча до козацької ради та сучасного
    волонтерства'
  - '[!history-bite] Скіфська тактика ''випаленої землі'' та мобільності: паралелі
    з козацькою війною та сучасним спротивом'
  - Значення горизонтальних суспільних структур для виживання нації без власної держави
- section: 'Словник епохи: Витоки'
  words: 500
  points:
  - '[!culture] ''Віче'': етимологія та історичний шлях терміну від антських зборів'
  - '''Автохтонність'': чому це ключове поняття для розуміння українського етногенезу'
  - '''Тяглість'': безперервність історичного процесу попри зміну назв держав'
  - '''Синтез'': як взаємодія осілих хліборобів і кочовиків сформувала унікальний
    характер'
- section: Підсумок
  words: 200
  points:
  - Україна як самодостатній центр цивілізаційного синтезу, а не периферія імперій
  - 'Висновки етапу: історія України сягає глибини тисячоліть, задовго до появи сусідніх
    держав'
- section: Потрібно більше практики?
  words: 200
  points:
  - 'Рекомендації: лекції Тімоті Снайдера про скіфів та сарматів у контексті України'
  - Віртуальні тури музеями трипільської культури для візуалізації побуту
