slug: boiare-i-shliakhta
title: 'Бояри та шляхта: Соціальна еліта'
word_target: 5000
content_outline:
- section: Вступ
  words: 400
  points:
  - 'Походження терміну «аристократія»: від грец. aristos (найкращий) і kratos (влада)'
  - 'Еволюція української еліти: від варязьких дружинників до землевласників-бояр'
  - 'Ключова відмінність: бояри як родова еліта з вотчиною (прив''язка до землі) проти
    служилої знаті'
  - Етимологія слова «шляхта» (від нім. slahta — рід) та його значення для станової
    ідентичності
- section: 'Читання: I — Генеза еліти: Галицька олігархія та правове оформлення станів'
  words: 1000
  points:
  - 'Феномен боярської олігархії в Галичині (1340–1349): правління Дмитра Дедька'
  - Титулатура Дедька як «старости та управителя» — доказ політичної суб'єктності
    боярства
  - 'Трансформація боярства у шляхетський стан: роль Єдлінського привілею (1430)'
  - Юридичне оформлення прав через Литовські Статути (1529, 1566)
  - 'Статут як гарантія: перехід від звичаєвого права до писаного закону'
- section: 'Читання: II — Золота доба: «Золота вольність» і влада магнатів'
  words: 1000
  points:
  - Концепція «Золотої вольності» (Aurea Libertas) та обмеження королівської влади
  - Право на rokosz (опір королю) як фундамент демократичної політичної культури
  - Магнати («королев'ята») як вершина соціальної піраміди (роди Острозьких, Вишневецьких)
  - Приватні армії та замки магнатів як «держави в державі»
  - Політичний вплив магнатів на вибори короля та зовнішню політику Речі Посполитої
- section: 'Читання: III — Ціна могутності: Фільваркове господарство та виклик полонізації'
  words: 1000
  points:
  - 'Економічна база шляхти: фільваркова система та експорт зерна в Європу через Гданськ'
  - 'Формування типу «воїна-підприємця»: поєднання військової служби та господарювання'
  - 'Феномен полонізації: прагматичні мотиви (доступ до сенату, судові привілеї)'
  - Концепція «Gente Ruthenus, natione Polonus» (роду руського, нації польської)
  - Роль єзуїтських колегіумів та поступовість культурної асиміляції
- section: Первинні джерела
  words: 600
  points:
  - 'Грамота короля Сигізмунда ІІ Августа (1569): гарантії мовних прав та судочинства'
  - Принцип «рівні до рівних, вільні до вільних» як основа Люблінської унії
  - Галицько-Волинський літопис про політичні амбіції та свавілля бояр
  - Літописна метафора «не почавивши бджіл, меду не їсти» як характеристика боярської
    влади
- section: Деколонізаційний погляд
  words: 600
  points:
  - Спростування імперського міфу про українців як «націю попів та хлопів» без власної
    еліти
  - Докази інтегрованості української шляхти в загальноєвропейський аристократичний
    контекст
  - Українська політична культура договору (контракту) на противагу московській культурі
    підданства
  - Шляхта як носій державної традиції та правової свідомості в бездержавний період
- section: Підсумок — Еліта вільної України
  words: 400
  points:
  - 'Термінологічна еволюція: бояри — зем''яни — шляхта'
  - Верховенство права (Статуту) над волею монарха як ключовий політичний спадок
  - Геральдична спадщина (герби Леліва, Абданк) та тяглість елітарної культури до
    козацької старшини
