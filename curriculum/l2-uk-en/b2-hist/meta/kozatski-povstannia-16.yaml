slug: kozatski-povstannia-16
title: Козацькі повстання XVI століття
word_target: 5000
content_outline:
- section: Вступ
  words: 500
  points:
  - 'Нагромадження соціальної напруги наприкінці XVI ст. — контекст «Великого Кордону»,
    де козацтво стає єдиним щитом від татар; cultural hook: [!context]'
  - Конфлікт між реєстровими та нереєстровими («випищиками») — вплив сеймової конституції
    1590 року «Порядок щодо низовців» та спроби контролю
- section: Повстання Криштофа Косинського (1591–1593)
  words: 900
  points:
  - 'Причини: від приватного конфлікту за маєток Рокитне з Янушем Острозьким до соціального
    вибуху; engagement hook: [!history-bite]'
  - 'Перебіг подій: захоплення Білої Церкви (символічне знищення боргових документів)
    та вирішальна битва під П''яткою (роль артилерії князів)'
  - Наслідки та роль князів Острозьких — придушення першої спроби козацтва як самостійної
    політичної сили; загибель Косинського в Черкасах
- section: 'Повстання Северина Наливайка: Розмах і союзники'
  words: 700
  points:
  - 'Географія та масштаб: від Поділля до Білорусі — захоплення Брацлава та проголошення
    його «вільним козацьким містом»'
  - Об'єднання реєстрових і низових козаків — тактичний союз із Григорієм Лободою
    та запорожцями Матвія Шаули
- section: 'Повстання Северина Наливайка: Солоницька трагедія та програма'
  words: 800
  points:
  - 'Політична програма Наливайка — ідея створення окремого «Удільного князівства»
    (козацької території) між Дністром і Дніпром; engagement hook: [!myth-buster]'
  - Трагічний фінал в урочищі Солониця — розкол табору, зрада реєстрової старшини
    та порушення Жолкевським обіцянки амністії
- section: 'Читання: Закони проти козацтва та свідчення Жолкевського'
  words: 600
  points:
  - 'Аналіз Сеймових конституцій: 1593 (кара без суду) та 1596 (оголошення козаків
    hostes patriae — ворогами вітчизни)'
  - Свідчення Станіслава Жолкевського — виправдання жорстокості «державною необхідністю»
    проти «свавільників» (swawolnicy)
- section: Соціальний та Релігійний Вимір боротьби
  words: 700
  points:
  - Боротьба за «старовинні вольності» — вимога шляхетських прав (власний суд, землеволодіння,
    звільнення від податків) для козацького стану
  - 'Релігійний чинник: захист православ''я в контексті Берестейської унії 1596 року
    — козаки як «меч віри»; engagement hook: [!culture]'
- section: Первинні джерела та свідчення очевидців
  words: 500
  points:
  - Уривки з хронік сучасників (Бєльський, Гейденштейн) — опис битви під П'яткою та
    візиту Еріха Лясоти на Січ
  - 'Листи Наливайка до короля Сигізмунда III — дипломатична риторика та пропозиція
    служби в обмін на автономію; engagement hook: [!quote]'
- section: Деколонізаційний погляд на історію повстань
  words: 600
  points:
  - 'Реконцептуалізація термінів: від «bunt chłopstwa» (селянський бунт) до «національно-визвольної
    війни» нової еліти; engagement hook: [!decolonization]'
  - Спростування міфу про хаос — докази високої організації повстанців (артилерія,
    розвідка, дипломатія) проти імперського наративу про анархію
