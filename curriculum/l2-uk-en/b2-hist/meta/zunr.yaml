slug: zunr
title: ЗУНР та Акт Злуки
word_target: 5000
content_outline:
- section: 'Вступ: Листопадовий зрив'
  words: 700
  points:
  - 'Крах Австро-Угорщини (жовтень 1918): розпад «клаптикової імперії» як історичний
    шанс'
  - 'Дмитро Вітовський і план повстання: випередження польського виступу на одну ніч
    (1 листопада vs 2 листопада)'
  - 'Листопадовий чин: безкровне захоплення влади у Львові, синьо-жовтий прапор на
    Ратуші'
  - 'Легітимність переходу влади: передача повноважень від австрійського намісника
    українцю Децикевичу'
- section: 'ЗУНР: Держава — I. Політичний устрій та територія'
  words: 600
  points:
  - 'Українська Національна Рада як законодавчий орган (парламент): президент Євген
    Петрушевич'
  - 'Територіальні межі: претензія на 70 тис. км² (етнічні українські землі) проти
    фактичного контролю ~40 тис. км²'
  - 'Демографія: 4 млн населення, більшість — українці, але значні національні меншини
    (поляки, євреї)'
  - 'Столиці в русі: Львів -> Тернопіль -> Станіславів (через умови війни)'
- section: 'ЗУНР: Держава — II. Уряд, армія та реформи'
  words: 600
  points:
  - 'Державний Секретаріат (уряд) на чолі з Костем Левицьким: ефективність бюрократії
    австрійського зразка'
  - 'Українська Галицька Армія (УГА): феномен дисципліни та організації (до 100 тис.
    бійців)'
  - 'Соціальне законодавство: 8-годинний робочий день, земельна реформа, закон про
    державну мову'
  - 'Політика щодо меншин: гарантування прав та місць у парламенті для євреїв і поляків'
- section: 'Акт Злуки: I — Урочиста церемонія та ідеал Соборності'
  words: 700
  points:
  - 'Шлях до єдності: Фастівський договір (1 грудня 1918) як предтеча об''єднання'
  - '22 січня 1919 року: велелюдна церемонія на Софійській площі в Києві'
  - 'Трансформація статусу: ЗУНР стає Західною Областю УНР (ЗОУНР), зберігаючи автономію'
  - 'Символізм події: об''єднання Наддніпрянщини та Наддністрянщини після століть
    розлуки'
- section: 'Акт Злуки: II — Реальність війни та геополітика'
  words: 700
  points:
  - 'Війна на два фронти: УНР проти більшовиків, ЗУНР проти поляків'
  - 'Ідеологічні розбіжності лідерів: консерватизм Петрушевича vs соціалізм Директорії
    (Петлюра, Винниченко)'
  - 'Фактор Антанти: армія Галлера, озброєна Францією проти німців, використана проти
    українців'
  - 'Чому реальне адміністративне злиття не відбулося: об''єктивні перешкоди воєнного
    часу'
- section: Первинні джерела
  words: 600
  points:
  - 'Текст Універсалу Директорії: «Однині воєдино зливаються...» — аналіз ключових
    формулювань'
  - 'Законодавчі акти ЗУНР: документи про устрій та права як доказ високої правової
    культури'
  - 'Спогади учасників та очевидців: атмосфера піднесення у Львові та Києві'
  - 'Фотодокументи епохи: візуальний ряд подій на Софійському майдані'
- section: Деколонізаційний погляд
  words: 700
  points:
  - Спростування польського міфу про «Східні Креси» (Kresy Wschodnie) та цивілізаційну
    місію
  - 'Критика концепції «Gente Ruthenus, natione Polonus»: утвердження української
    політичної нації'
  - 'Принцип Вільсона: ЗУНР як легітимна реалізація права на самовизначення, проігнорована
    Антантою'
  - 'ЗУНР як модерна європейська держава: контраст із більшовицьким хаосом та терором'
- section: 'Підсумок: Поразка та спадщина'
  words: 600
  points:
  - 'Чортківська офензива (червень 1919): героїчна спроба перелому у війні'
  - Перехід УГА за Збруч (липень 1919) та окупація Галичини Польщею (пацифікація,
    осадництво)
  - Еміграційний уряд та дипломатична боротьба (Рада послів Антанти 1923)
  - 'День Соборності: від забороненого свята до «Живого ланцюга» 1990 року та сучасної
    традиції'
