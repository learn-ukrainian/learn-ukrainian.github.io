slug: shistdesiatnyky
title: 'Шістдесятники: Бунт проти сірості'
word_target: 5000
content_outline:
- section: 'Вступ — Хрущовська відлига: I — Ілюзія свободи'
  words: 450
  points:
  - Смерть Сталіна (1953) та XX з'їзд КПРС (1956) як історичний злам, що породив 'відлигу'
    — коротку паузу між терором і застоєм
  - Поява нової генерації інтелігенції, яка не знала страху 30-х років і вимагала
    правди про минуле
  - Віра молодих шістдесятників у можливість 'соціалізму з людським обличчям' та їхнє
    неминуче розчарування
  - 'Engagement hook: [!context] Пояснення терміну ''відлига'' — не як справжня весна,
    а як тимчасове танення льоду, що оголило бруд системи'
- section: 'Вступ — Хрущовська відлига: II — Клуб творчої молоді'
  words: 450
  points:
  - Заснування Клубу творчої молоді 'Сучасник' у Києві (1959-1960) під керівництвом
    Леся Танюка
  - 'Діяльність клубу: літературні вечори, етнографічні експедиції, пошук місць поховань
    жертв НКВС у Биківні'
  - Роль Алли Горської та Віктора Зарецького в організації мистецького життя та консолідації
    національно свідомої молоді
- section: 'Культурний вибух: I — Слово правди'
  words: 500
  points:
  - 'Феномен поезії шістдесятників: Василь Симоненко (''Тиша і грім''), Ліна Костенко
    (''Проміння землі''), Іван Драч (''Ніж у сонці'')'
  - Відмова від соцреалістичних канонів на користь метафоричності, інтелектуалізму
    та щирості
  - Література як простір свободи, де слово важило більше, ніж офіційна ідеологія
- section: 'Культурний вибух: II — Тіні забутих предків'
  words: 600
  points:
  - Кіношедевр Сергія Параджанова (1964) як естетичний виклик системі та тріумф українського
    поетичного кіно
  - Прем'єра фільму 4 вересня 1965 року в кінотеатрі 'Україна' — перший публічний
    політичний протест у післявоєнному Києві
  - Заклик Івана Дзюби, Василя Стуса та В'ячеслава Чорновола встати на знак протесту
    проти арештів інтелігенції
  - 'Engagement hook: [!history-bite] Історія про те, як Параджанов відмовився дублювати
    фільм російською мовою'
- section: 'Культурний вибух: III — Розбите відродження'
  words: 500
  points:
  - Історія створення вітража 'Шевченко. Мати' (1964) у вестибюлі Київського університету
    (А. Горська, О. Заливаха та ін.)
  - Новаторська інтерпретація образу Шевченка як гнівного пророка, що захищає Україну,
    на противагу офіційному 'Кобзарю-дідусеві'
  - Варварське знищення вітража за вказівкою партійного керівництва ще до офіційного
    відкриття
  - 'Engagement hook: [!culture] Знищення мистецтва як страх влади перед символами
    національного відродження'
- section: 'Первинні джерела: I — Окрайці думок'
  words: 450
  points:
  - Щоденник Василя Симоненка 'Окрайці думок' (1962-1963) як документ епохи та свідчення
    внутрішньої драми поета
  - Цитата про 'Еверест підлості' та розуміння колоніального статусу України в складі
    СРСР
  - 'Engagement hook: [!quote] ''Немає нічого страшнішого за необмежену владу в руках
    обмеженої людини'''
- section: 'Первинні джерела: II — Інтернаціоналізм чи русифікація?'
  words: 550
  points:
  - Політичний трактат Івана Дзюби 'Інтернаціоналізм чи русифікація?' (1965) як інтелектуальний
    вирок радянській національній політиці
  - Використання марксистсько-ленінської риторики для доведення злочинності русифікації
    та колоніалізму
  - 'Реакція КДБ: доповідні записки про ''буржуазний націоналізм'' та переслідування
    за читання самвидаву'
  - 'Engagement hook: [!decolonization] Дзюба довів, що радянська практика суперечила
    навіть власній комуністичній теорії'
- section: 'Деколонізаційний погляд: I — Мова як зброя'
  words: 500
  points:
  - Боротьба за українську мову в русифікованому Києві як свідомий політичний акт
    та форма опору
  - Спростування радянського міфу про 'єдиний радянський народ' (Homo Sovieticus)
    як інструменту асиміляції та етноциду
  - Шістдесятники довели, що українська ідентичність є модерною, урбаністичною та
    європейською, а не 'сільським пережитком'
  - 'Engagement hook: [!myth-buster] Міф про добровільне злиття націй у ''радянський
    народ'''
- section: 'Деколонізаційний погляд: II — Від культури до політики'
  words: 550
  points:
  - Трансформація культурницького руху в політичний дисидентський опір під тиском
    репресій
  - Перша хвиля арештів (серпень-вересень 1965 року) як спроба залякування інтелігенції
  - '''Великий погром'' 1972 року (операція ''Блок'') — масові арешти Стуса, Чорновола,
    Світличного та кінець епохи ''відлиги'''
  - 'Судові процеси як театр абсурду: засудження за вірші та збереження самвидаву'
- section: 'Деколонізаційний погляд: III — Спадщина та тяглість'
  words: 450
  points:
  - 'Тяглість національно-визвольної боротьби: зв''язок шістдесятників з УПА та майбутньою
    Гельсінською групою'
  - 'Engagement hook: [!decolonization] Трактування шістдесятництва не як радянського
    явища, а як етапу боротьби за незалежність'
  - 'Вплив шістдесятників на сучасну Україну: повернення до європейського контексту
    та створення високої національної культури'
  - 'Значення морального вибору: ''Хто проти тиранії — встаньте!'''
