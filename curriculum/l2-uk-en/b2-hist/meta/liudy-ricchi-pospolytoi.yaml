slug: liudy-ricchi-pospolytoi
title: 'Люди Речі Посполитої: Суспільство'
word_target: 5000
content_outline:
- section: Вступ
  words: 400
  points:
  - Річ Посполита як «Res Publica» (спільна справа) — парадокс держави, де громадянські
    права мала лише шляхта (10% населення)
  - Формула Станіслава Оріховського «Gente Ruthenus, natione Polonus» — подвійна ідентичність
    української еліти до полонізації
  - Ідеологія Сарматизму [!culture] — міф про спільне походження шляхти, який об'єднував
    еліту, але виключав селян і міщан
- section: 'Шляхта і магнати: I — Привілеї та «золота вольність»'
  words: 550
  points:
  - 'Унікальна політична система: сеймова демократія, право «liberum veto» та принцип
    «Nihil novi» (нічого нового без нас)'
  - Недоторканність особи «Neminem captivabimus» — гарантії, яких не мала більшість
    європейської знаті того часу
  - '[!myth-buster] Спростування міфу про виключно польську шляхту — існування потужної
    верстви руської (української) еліти, що зберігала віру і мову до кінця XVI ст.'
- section: 'Шляхта і магнати: II — Руські роди та полонізація'
  words: 550
  points:
  - «Некороновані королі Русі» — роди Острозьких, Вишневецьких, Заславських, Четвертинських
    як захисники православ'я
  - Процес полонізації після Люблінської унії (1569) — перехід у католицтво як єдиний
    шлях до сенату і державних посад
  - '[!quote] «Тренос» Мелетія Смотрицького (1610) — плач за втраченими родами («Де
    тепер дім Острозьких? Де Слуцькі?..»), що зрадили батьківську віру'
- section: 'Міщани і ремісники: I — Магдебурзьке право та самоврядування'
  words: 500
  points:
  - 'Поширення міського самоврядування: Львів (1356), Київ (1494/99), Луцьк — вихід
    міста з-під юрисдикції феодала'
  - 'Адміністративна структура: війт (судова влада), бурмістр і райці (адміністративна
    влада), лавники'
  - 'Економічна організація: цехова система, гільдії та соціальна піраміда (патриціат,
    поспольство, плебс)'
- section: 'Міщани і ремісники: II — Національно-релігійне життя міста'
  words: 500
  points:
  - '[!context] Дискримінаційні норми «Sartagines» — обмеження для православних (схизматиків)
    на вступ до цехів та торгівлю'
  - «Руські вулиці» та гетто — просторова сегрегація українців та євреїв у великих
    містах
  - Церковні братства (напр. Львівське Успенське) як унікальний український механізм
    самозахисту, освіти та контролю за духовенством
- section: 'Селяни і кріпацтво: I — Фільваркова система та панщина'
  words: 550
  points:
  - '«Друге видання кріпацтва» — економічні причини: попит на зерно в Західній Європі
    та перехід до фольваркового (експортного) господарства'
  - '[!history-bite] Еволюція панщини: зростання від 1-2 днів (XV ст.) до 4-6 днів
    на тиждень (XVII ст.)'
  - Дегуманізація селянства — термін «бидло» (худоба) як відображення погляду шляхти
    на «хлопів» як на тяглову силу
- section: 'Селяни і кріпацтво: II — Юридичне закріпачення та спротив'
  words: 550
  points:
  - Третій Литовський статут (1588) — юридичне оформлення остаточного прикріплення
    селян до землі
  - Право «ius vitae ac necis» (життя і смерті) — фактична безкарність пана за вбивство
    підданого
  - Селянські повстання та втечі на Дике Поле як єдиний спосіб порятунку від кріпацтва
- section: Первинні джерела
  words: 450
  points:
  - Аналіз тексту Третього Литовського статуту (1588) — статті про розшук «збіглих
    селян» (Articuli de servis fugitivis)
  - Документ надання Магдебурзького права Києву — аналіз прав та обов'язків міщан
  - 'Лінгвістичний контраст: суха латина/староукраїнська ділова мова статутів vs емоційна
    барокова риторика «Треносу»'
- section: 'Деколонізаційний погляд: I — Міф про «золотий вік»'
  words: 500
  points:
  - '[!decolonization] Деконструкція міфу про «шляхетську демократію» — це був рай
    для 10%, але пекло безправ''я для 90%'
  - 'Українська реальність: нашарування трьох видів гніту — соціального (кріпацтво),
    національного (полонізація) та релігійного (унія)'
  - Козацтво як системний збій — поява нової військової еліти з людей, яким не знайшлося
    місця в становій системі Речі Посполитої
- section: 'Деколонізаційний погляд: II — Спадщина та сучасна дискусія'
  words: 450
  points:
  - 'Термінологічна війна: польське «Kresy Wschodnie» (Східні околиці) vs українські
    етнічні землі'
  - Соціальна заблокованість православних як головний каталізатор Хмельниччини — вибух
    був неминучим
  - Травма бездержавності — глибока недовіра українців до будь-якої влади, сформована
    століттями життя в чужих державних проектах
