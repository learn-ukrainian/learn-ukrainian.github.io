  - 'Фігура ката: капітан Матвєєв та його «норми» (особистий розстріл 200–250 людей
    за ніч)'
  - 'Engagement Hook: [!map] — Маршрут «Київ — Соловки — Сандармох»'
- section: 'Географія смерті: II — Биківнянська трагедія'
  words: 700
  points:
  - 'Биківня як «Київський Сандармох»: таємна ділянка НКВС для поховання розстріляних
