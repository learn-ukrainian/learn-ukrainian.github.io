  - Спогади тих, хто вижив (Борис Антоненко-Давидович) та дітей репресованих митців
  - 'Engagement Hook: [!quote] — Уривок з останнього листа Миколи Куліша'
- section: 'Деколонізаційний погляд: Культурний геноцид'
  words: 600
  points:
  - Спростування імперського наративу про «ворогів народу» та «шпигунів»
  - 'Концепція Рафала Лемкіна: нищення інтелігенції як «розуму нації» — одна з чотирьох
