  - 'Engagement Hook: [!myth-buster] — Спростування радянського міфу про нацистські
    поховання в Биківні'
- section: 'Первинні джерела: Голоси з безодні'
  words: 500
  points:
  - 'Архіви НКВС як свідок злочину: анкети арештованих, сліди крові на протоколах,
