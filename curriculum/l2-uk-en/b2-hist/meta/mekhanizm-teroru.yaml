slug: mekhanizm-teroru
title: 'Розстріляне відродження II: Механізм терору'
word_target: 5000
content_outline:
- section: 'Вступ: Система знищення'
  words: 600
  points:
  - '1930-ті роки як кульмінація радянського терору: «Великий терор» 1937–1938 років
    (Єжовщина)'
  - 'Наказ НКВС № 00447 (30 липня 1937): запровадження «лімітів» на вбивство та поділ
    на категорії (I — розстріл, II — табори)'
  - 'Специфіка в УРСР: цілеспрямоване знекровлення нації через ліквідацію інтелектуальної
    еліти'
  - 'Статистика жаху: арешт 200 тисяч осіб, розстріл 120 тисяч — масштаб, що перевищував
    населення обласних центрів'
  - 'Engagement Hook: [!context] — Порівняння кількості жертв з населенням тогочасних
    міст'
- section: 'Механізм репресій: I — Інструменти зламу'
  words: 700
  points:
  - 'Легалізація катувань: офіційний дозвіл Сталіна (1937) на фізичний тиск як метод
    «добування істини»'
  - 'Метод «Конвеєр»: безперервні багатодобові допити зі зміною слідчих для виснаження
    психіки'
  - 'Метод «Стійка»: примус стояти без руху годинами або днями до повної фізичної
    руйнації'
  - 'Психологічний тиск: погрози родині, імітація розстрілів, доведення в''язнів до
    галюцинацій'
  - 'Engagement Hook: [!history-bite] — Детальний опис методу «Конвеєр» та його впливу
    на свідомість'
- section: 'Механізм репресій: II — Фабрикація та вирок'
  words: 600
  points:
  - Створення міфічних антирадянських організацій (напр., «Український троцькістський
    центр») як універсальна схема звинувачення
  - 'Роль позасудових «трійок» (начальник НКВС, секретар обкому, прокурор): вирок
    без суду і захисту'
  - 'Швидкість конвеєра смерті: розгляд до ста справ за день, відсутність права на
    оскарження'
  - 'Самообмова як єдиний доказ: чому в''язні підписували абсурдні зізнання у шпигунстві'
  - 'Engagement Hook: [!quote] — Цитата зі спогадів про абсурдність звинувачень'
- section: 'Географія смерті: I — Соловки та Сандармох'
  words: 800
  points:
  - 'СЛОН (Соловецький табір особливого призначення): місце ізоляції цвіту української
