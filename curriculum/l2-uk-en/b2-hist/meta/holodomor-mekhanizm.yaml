slug: holodomor-mekhanizm
title: 'Голодомор I: Механізм'
word_target: 5000
content_outline:
- section: 'Вступ: Сталінська модернізація та загроза втрати України'
  words: 400
  points:
  - 'Контекст 1930-х: Україна як ресурс для індустріалізації та водночас «найслабша
    ланка» імперії.'
  - 'Лист Сталіна до Кагановича (11.08.1932): «Якщо не візьмемося нині за виправлення
    становища в Україні, Україну можемо втратити».'
  - 'Страх перед національним рухом: селянство як носій української ідентичності («петлюрівці»,
    «агенти Пілсудського»).'
  - 'Соціальна інженерія: перетворення незалежних господарів на підконтрольних колгоспників.'
- section: 'Читання: Мова насильства та дегуманізація'
  words: 400
  points:
  - 'CBI підхід: Як мова готувала ґрунт для вбивства.'
  - 'Офіційна термінологія: «елементи», «саботажники», «куркулі», «підкуркульники».'
  - '[!context] Термін «куркуль» як політичний ярлик для будь-кого, хто чинив опір,
    а не ознака багатства.'
  - 'Дегуманізація: перетворення людей на «класових ворогів», чиє знищення стає морально
    виправданим в очах виконавців.'
- section: 'Колективізація та опір селянства: I — Традиційне село і «бабські бунти»'
  words: 500
  points:
  - Українське село як центр традицій та автономії, несумісний з уніфікацією СРСР.
  - '[!myth-buster] Міф про покірність: статистика 1930 року — понад 4000 масових
    виступів, 1,2 млн учасників.'
  - '«Бабські бунти»: роль жінок у спротиві, психологічний тиск на владу.'
  - 'Стаття «Запаморочення від успіхів» (березень 1930): тактичний відступ режиму
    перед масовим опором.'
- section: 'Колективізація та опір селянства: II — Розкуркулення як знищення еліти'
  words: 500
  points:
  - 'Мета розкуркулення: ліквідація найкращих господарів та організаторів громадської
    думки.'
  - 'Економічний та фізичний вимір: конфіскація майна, депортація в Сибір, ув''язнення.'
  - 'Знищення структури села: без еліти громада стає дезорієнтованою та вразливою.'
  - 'Підготовка до основного удару: село, позбавлене лідерів, легше заморити голодом.'
- section: 'Закон про п''ять колосків та Чорні дошки: I — Юридичне вбивство'
  words: 500
  points:
  - Постанова ЦВК і РНК СРСР від 7 серпня 1932 р. («Закон про п'ять колосків»).
  - '[!history-bite] «Соціалістична власність священна»: розстріл навіть за жменю
    зерна чи зрізані колоски.'
  - Заборона амністії та застосування закону до дітей.
  - 'Юридичне закріплення геноциду: держава створює умови, несумісні з життям.'
- section: 'Закон про п''ять колосків та Чорні дошки: II — Режим блокади сіл'
  words: 500
  points:
  - 'Механізм «Чорних дощок»: специфічно українська репресія (листопад-грудень 1932).'
  - 'Приклади сіл: Лютенька, Кам''яні Потоки (Полтавщина), Піски (Чернігівщина).'
  - 'Суть режиму: повна продовольча блокада, вилучення всіх товарів, заборона торгівлі.'
  - Смертний вирок цілим громадам за невиконання нереальних планів хлібозаготівлі.
- section: 'Терор голодом як інструмент упокорення: I — Натуральні штрафи та буксирні
    бригади'
  words: 500
  points:
  - 'Впровадження натуральних штрафів (листопад 1932): вилучення м''яса, картоплі,
    квасолі за борги по зерну.'
  - '«Червона мітла»: діяльність буксирних бригад.'
  - 'Технологія обшуків: використання щупів, руйнування печей, перекопування долівок.'
  - 'Мета: вилучити всю їжу, а не тільки зерно, щоб зламати опір голодом.'
- section: 'Терор голодом як інструмент упокорення: II — Ізоляція та паспортна система'
  words: 500
  points:
  - 'Директива 22 січня 1933 р.: заборона виїзду селян з УСРР та Кубані.'
  - Військові кордони НКВС навколо українських територій.
  - Введення внутрішніх паспортів (грудень 1932), які не видавали селянам (фактичне
    кріпацтво).
  - '[!decolonization] Створення гетто: українців замикали в зоні смерті, тоді як
    з інших регіонів СРСР виїзд не блокували.'
- section: 'Первинні джерела: Щоденники очевидців'
  words: 400
  points:
  - Важливість его-документів для спростування радянської брехні про «неврожай».
  - 'Нестор Білоус (колгоспний сторож): хроніка вимирання села («Люди мруть з голоду…»).'
  - 'Олександра Радченко (вчителька): фіксація психологічного жаху та канібалізму.'
  - '[!quote] Цитати з щоденників як доказ свідомого характеру злочину.'
- section: 'Деколонізаційний погляд: Імперський злочин та русифікація'
  words: 400
  points:
  - '[!analysis] Порівняння з колоніальними практиками: контроль ресурсів (зерно на
    експорт) ціною життя тубільців.'
  - 'Специфіка в Україні та на Кубані: удар саме по українцях.'
  - Заселення спорожнілих сіл вихідцями з Росії (ешелони 1933 року) на Донбас та Південь.
  - Зміна етнічного складу регіонів як довгостроковий наслідок геноциду.
- section: 'Спадщина: Трансгенераційна травма та відновлення пам''яті'
  words: 400
  points:
  - 'Психологічні наслідки: страх голоду, недовіра до влади, атомізація суспільства
    («моя хата скраю»).'
  - 'Синдром вцілілого: звичка «не висовуватися» заради виживання.'
  - 'Відновлення пам''яті: визнання Голодомору геноцидом як акт повернення суб''єктності.'
  - Традиція «Свічка у вікні» — символ незламності та пам'яті про жертв.
