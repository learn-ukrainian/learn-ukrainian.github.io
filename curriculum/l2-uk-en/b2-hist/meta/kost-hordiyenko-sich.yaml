slug: kost-hordiyenko-sich
title: Кость Гордієнко та Січ
word_target: 5000
content_outline:
- section: 'Вступ: Непримиренний кошовий'
  words: 600
  points:
  - 'Кость Гордієнко (Головко) — унікальна постать: випускник Києво-Могилянської академії,
    що руйнує стереотип про «неосвічених степовиків».'
  - 'Обрання кошовим отаманом у 1702 році: Гордієнко як виразник волі Січі, а не ставленик
    гетьмана чи царя.'
  - 'Геополітичний контекст початку XVIII ст.: наступ Москви на козацькі вольності
    та будівництво фортеці Кам''яний Затон.'
  - Цитата з листа 1702 року до Петра I про готовність запорожців «збройно битися»
    проти московських залог.
- section: 'Запорозька Січ: Острів свободи в морі імперій'
  words: 800
  points:
  - Чортомлицька Січ (1652–1709) як «Християнська республіка» з прямим народовладдям
    та виборністю старшини.
  - Козацьке право і традиції рівності на противагу московському самодержавству та
    кріпацтву.
  - 'Загроза колонізації: будівництво московських фортець як «зашморг» на шиї Вольностей
    Війська Запорозького.'
  - Листи Гордієнка як документи політичного спротиву імперській експансії та захисту
    суверенітету Січі.
- section: 'Великий союз: Гордієнко, Мазепа та Карл XII'
  words: 800
  points:
  - 'Мотиви союзу: «Москва хоче нас поневолити» — прагматичне об''єднання ворогів
    (Мазепи і Гордієнка) заради порятунку Вітчизни.'
  - 'Зустріч у Диканьці (березень 1709): історичний компроміс та подолання особистої
    ворожнечі заради спільної мети.'
  - Приєднання 8000 загартованих запорожців до шведсько-українського союзу як потужний
    військовий і моральний фактор.
  - 'Цитата Гордієнка з листа 1708 року: «Злість московська здавна на Вітчизну, нашу
    матір, аби захопити її у владу...».'
- section: 'Трагедія 1709: Зруйнування Чортомлицької Січі'
  words: 900
  points:
  - Каральна експедиція полковника Яковлєва та зрада Гната Галагана (травень 1709).
  - Героїчна оборона Січі під проводом наказного отамана Якима Богуша (поки Гордієнко
    був під Полтавою).
  - Підступне захоплення Січі через обіцянку помилування та подальша жорстока різанина.
  - 'Символізм імперської жорстокості: 156 страчених, плоти з шибеницями пущені по
    Дніпру, руйнування церкви і цвинтаря.'
- section: 'Читання: Козацький дух у документах'
  words: 600
  points:
  - 'Риторика листів Гордієнка до Мазепи (1708): використання понять «Вітчизна-мати»
    і «вольності» як політичних категорій.'
  - Участь запорожців у створенні Конституції Пилипа Орлика (5 квітня 1710).
  - Статті Конституції, що гарантували права Січі, відновлення відторгнутих земель
    та заборону московських залог.
  - Політична суб'єктність Війська Запорозького Низового у вигнанні як гаранта української
    державницької ідеї.
- section: 'Первинні джерела: Свідчення очевидців'
  words: 600
  points:
  - Мемуари шведських офіцерів (Густав Адлерфельт, Георг Нордберг) про окремішність
    запорожців від «московитів».
  - Опис побуту, військової організації та фанатичної відданості ідеї свободи очима
    європейців.
  - Народна дума «Про руйнування Січі» («Ой встань, Петре, ой встань, батьку...»)
    як емоційний літопис трагедії.
  - Контраст між сухими військовими звітами шведів і глибоким трагізмом українського
    фольклору.
- section: 'Деколонізаційний погляд: Січ як анти-імперський проект'
  words: 700
  points:
  - 'Спростування імперського міфу про «бандитів і п''яниць»: Січ як альтернативна
    модель демократичної державності.'
  - 'Концепція «зради» vs «права на повстання»: порушення васальної угоди сюзереном
    (царем) легітимізує збройний опір.'
  - 'Спадщина Гордієнка: від Олешківської до Кам''янської Січі — боротьба за незалежність
    до останнього подиху (1733).'
  - Гордієнко як символ незламності українського духу та тяглості визвольних змагань.
