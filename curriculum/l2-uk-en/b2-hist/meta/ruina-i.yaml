slug: ruina-i
title: 'Руїна I: Виговщина і розкол'
word_target: 5000
content_outline:
- section: 'Вступ: Епоха великих надій і розчарувань'
  words: 400
  points:
  - Визначення «Руїни» (1657–1687) — термін Самійла Величка; епоха, коли «сльози залили
    б очі»
  - 'Вакуум влади після смерті Богдана Хмельницького: відсутність беззаперечного лідера'
  - 'Соціальне напруження: конфлікт між «статечними» козаками та «голотою» як передумова
    хаосу'
- section: 'Гетьман Іван Виговський: Курс на Європу'
  words: 700
  points:
  - 'Портрет гетьмана: генеральний писар, інтелектуал, шляхтич, державник європейського
    зразка'
  - 'Повстання Пушкаря і Барабаша: не «народний бунт», а інспірований Москвою заколот
    проти законної влади'
  - 'Зовнішня політика: пошук рівноправного місця України в системі європейських держав
    (баланс між Варшавою і Москвою)'
- section: Гадяцька унія і війна з Москвою
  words: 700
  points:
  - 'Крах союзу з Москвою: порушення царем Переяславських статей та підтримка внутрішньої
    опозиції'
  - 'Гадяцький договір 1658: концепція Великого Князівства Руського як третього рівноправного
    члена Речі Посполитої'
  - 'Початок відкритої агресії: оголошення Виговського «зрадником» і вторгнення армії
    Трубецького'
- section: 'Конотопська битва 1659: Втрачена перемога'
  words: 900
  points:
  - Героїчна оборона Конотопа полковником Гуляницьким (70 днів) — час для мобілізації
  - 'Тактика перемоги: імітація відступу і пастка для московської кінноти в болотах
    річки Соснівка'
  - 'Наслідки розгрому: жалоба в Москві, втрата елітної армії, цитата Соловйова про
    «цвіт московської кінноти»'
- section: Падіння Виговського і початок хаосу
  words: 600
  points:
  - 'Удар у спину: рейд Івана Сірка на Крим, що позбавив Виговського татарської підтримки'
  - 'Інформаційна війна: як популізм і звинувачення у «продажі полякам» перемогли
    державницьку логіку'
  - Зречення Виговського та обрання Юрія Хмельницького — початок остаточного розколу
    на Лівобережжя і Правобережжя
- section: 'Чорна рада 1663: Тріумф охлократії'
  words: 900
  points:
  - 'Боротьба за булаву на Лівобережжі: державник Яким Сомко проти демагога Івана
    Брюховецького'
  - '«Чорна рада» в Ніжині: участь черні, фізичне насильство і перемога популізму
    під патронатом Москви'
  - 'Трагічний фінал: страта Сомка і Золотаренка, початок «Великої Руїни» і втрата
    прав (Московські статті 1665)'
- section: 'Первинні джерела: Літопис Самовидця'
  words: 400
  points:
  - 'Свідчення очевидця (Роман Ракушка-Романовський): жах перед руйнівною силою натовпу'
  - 'Аналіз тексту: як літописець описує зламані списи об голови старшини та занепад
    правопорядку'
- section: Деколонізаційний погляд
  words: 400
  points:
  - 'Спростування міфу про «громадянську війну»: Руїна як результат гібридної агресії
    Москви («розділяй і володарюй»)'
  - 'Ціна «дружби» з Москвою: як обіцянки Брюховецького «пограбувати багатих» призвели
    до закріпачення всіх'
