slug: ludy-rusi
title: 'Люди Русі: Суспільство та побут'
word_target: 5000
content_outline:
  - section: 'Розминка: Демографія та соціальна структура'
    words: 300
    points:
      - Київ як мегаполіс (50–100 тис.) проти Лондона і Парижа (15–20 тис.)
      - 'Поняття станового суспільства: права та обов''язки за народженням'
      - 'Ключові терміни: Віра (штраф), Ізгой (соціальний маргінал), Вотчина (спадкова
        земля)'
  - section: 'Читання: I — Владна верхівка: Князь і бояри'
    words: 450
    points:
      - Князь як «перший серед рівних», а не абсолютний монарх
      - 'Структура дружини: Старша (бояри, мужі нарочиті) та Молодша (отроки, гриді)'
      - Боярська вотчина як основа політичної незалежності та впливу на раду
  - section: 'Читання: II — Духовний стан і міщани'
    words: 450
    points:
      - 'Духовенство: Чорне (монахи-інтелектуали) та Біле (парафіяльні священники
        з сім''ями)'
      - 'Міське населення: «Гості» (купці) та цехові організації (вулиці, сотні)'
      - Роль церкви у судочинстві та освіті
  - section: 'Читання: III — Селянство та невільні люди'
    words: 600
    points:
      - 'Смерди: особисто вільні общинники, платники данини'
      - 'Напіввільні категорії: Закупи (боржники під захистом Статуту Мономаха) та
        Рядовичі (за договором)'
      - 'Холопи: джерела рабства (полон, борг) та можливості соціальної мобільності
        (тіуни)'
  - section: 'Читання: IV — Економічний пульс: Торгівля та гроші'
    words: 400
    points:
      - 'Торгові шляхи: Грецький, Соляний, Залозний'
      - 'Грошова система: гривня, куна, векша'
      - Берестяна грамота зі Звенигорода про «60 кун» як свідчення комерційної грамотності
  - section: 'Читання: V — Жіноцтво та освіта: Міфи про «темні віки»'
    words: 450
    points:
      - 'Високий статус жінки: майнові права, спадок, посаг (порівняння з Анною Ярославною)'
      - 'Масова грамотність: графіті Софії Київської та берестяні грамоти'
      - 'Освіта не лише для монахів: жінки та діти (малюнки Онфіма)'
  - section: 'Читання: VI — Побут: Від житла до розваг'
    words: 500
    points:
      - 'Житло: Зруби у містах/поліссі та мазанки (глинобитні) у лісостепу'
      - 'Харчування: житній хліб, каші, ріпа; напої (квас, мед)'
      - 'Одяг та взуття: соціальна диференціація (чоботи vs личаки, шовк vs льон)'
      - 'Розваги: скоморохи, шахи (знахідки у житлах ремісників)'
  - section: 'Первинні джерела: I — Руська Правда як дзеркало суспільства'
    words: 500
    points:
      - 'Соціальна стратифікація штрафів («віри»): 80 гривень за боярина vs 5 за смерда'
      - 'Гуманізм права: відсутність смертної кари, заміна її грошовими стягненнями'
      - Інститут «верви» (громади) та колективна відповідальність (кругова порука)
  - section: 'Первинні джерела: II — Голоси на бересті'
    words: 450
    points:
      - 'Звенигородські знахідки (1110–1137 рр.): західний ареал грамотності'
      - 'Побутова тематика: борги, любовні послання, господарські розпорядження'
      - 'Жива мова: діалектні особливості, що відображають розмовну мову Русі'
  - section: 'Деколонізаційний погляд: I — Матеріальна культура та автохтонність'
    words: 450
    points:
      - 'Архітектурна тяглість: українська хата-мазанка як автохтонна традиція лісостепу'
      - Відмінність від північного (російського) типу «ізби»
      - Спростування міфу про єдину матеріальну культуру «давньоруського народу»
  - section: 'Деколонізаційний погляд: II — Політична культура: Віче проти деспотії'
    words: 450
    points:
      - 'Вічеві традиції: реальна влада громади та можливість вигнання князя'
      - Договірна природа відносин (ряд) між князем та елітами
      - Контраст із московською моделлю ординського типу (автократія)
