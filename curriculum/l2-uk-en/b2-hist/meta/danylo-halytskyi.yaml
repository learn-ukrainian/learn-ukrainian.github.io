slug: danylo-halytskyi
title: Королювання Данила Романовича
word_target: 5000
content_outline:
- section: Вступ — Єдиний коронований король Русі
  words: 400
  points:
  - 'Унікальність події 1253 року: коронація в прикордонному Дорогочині, а не в столиці,
    як символ орієнтації на Захід'
  - Титул 'Rex Russiae' (Король Русі) від Папи Інокентія IV — входження до європейської
    політичної сім'ї (Res Publica Christiana)
  - 'Значення легітимності: Данило як єдиний визнаний Європою суверен на теренах постімперської
    Русі'
- section: Боротьба за Галичину (1205-1238)
  words: 800
  points:
  - 'Початок ''сорокарічної війни'' після загибелі Романа Мстиславича (1205): дитинство
    вигнанця та повернення спадщини'
  - 'Феномен боярської олігархії: випадок Владислава Кормильчича, який проголосив
    себе князем, порушивши династичні традиції'
  - 'Битва під Дорогочином (1238) проти Тевтонського ордену: розгром хрестоносців
    і гасло ''Не личить держати нашу батьківщину крижевникам'''
  - Остаточне утвердження в Галичі (1238) та встановлення контролю над Києвом (1239)
- section: Монгольська навала та дипломатія виживання
  words: 900
  points:
  - 'Катастрофа 1240 року: оборона Києва воєводою Дмитром та спустошення Галицько-Волинської
    землі'
  - 'Тріумф під Ярославом (1245): розгром коаліції угорців, поляків та бунтівних бояр
    як передумова стабільності'
  - 'Візит до Батия (1245-1246): вимога ''Дай Галич!'' та дипломатичне приниження
    заради порятунку держави'
  - 'Ритуал у ханському шатрі: відмова від поклоніння кущу, але прийняття чаші з чорним
    кумисом (''Зле є почесті татарської'')'
- section: Коронація 1253 року — Європейський вибір
  words: 900
  points:
  - 'Переговори з Римом: пропозиція корони в обмін на церковну унію та Хрестовий похід
    проти татар'
  - 'Коронація легатом Опізо в Дорогочині: урочистий акт визнання суверенності без
    зміни православного обряду'
  - 'Крах надій на західну допомогу: заклики Папи до Богемії та Польщі залишилися
    без відповіді'
  - Розрив стосунків з Римом (близько 1257 року) та перехід до самостійної політики
    опору Орді
- section: Первинні джерела — Галицько-Волинський літопис
  words: 700
  points:
  - 'Унікальна стилістика пам''ятки: світський, емоційний та ''лицарський'' характер
    оповіді, на відміну від київської церковної традиції'
  - 'Образ ідеального правителя: характеристика Данила як ''книжника і філософа'',
    акцент на його мужності та мудрості'
  - 'Військова деталізація: описи озброєння, тактики та облоги фортець як свідчення
    професіоналізму літописця'
- section: Деколонізаційний погляд — Русь ≠ Росія
  words: 800
  points:
  - 'Цивілізаційний розлом XIII століття: європейський вибір Данила (опір Орді) проти
    євразійського вибору Олександра Невського (союз з Ордою)'
  - Титул 'Король Русі' як доказ того, що політична спадщина Русі збереглася в Україні,
    а не в Московії
  - 'Спростування імперського міфу про ''спільноруську історію'': Данило будував державу
    західного типу, тоді як Залісся ставало улусом Орди'
  - 'Історична справедливість: повернення Данилові королівського титулу замість приниженого
    ''князь'''
- section: Підсумок — Спадщина короля
  words: 500
  points:
  - 'Смерть у Холмі (1264) та поховання у церкві Холмської Богородиці: завершення
    епохи великого будівничого'
  - 'Урбаністична спадщина: заснування Львова (1256) та Холма як нових форпостів цивілізації,
    захищених від степу'
  - 'Тяглість державності: Королівство Руське проіснувало ще століття, передавши естафету
    політичної культури до литовської доби'
