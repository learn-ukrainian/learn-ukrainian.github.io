slug: hromady
title: Громадівський рух
word_target: 5000
content_outline:
- section: 'Вступ: Нелегальна культура'
  words: 500
  points:
  - 'Історичний контекст: «відлига» кінця 1850-х років після смерті Миколи I та повернення
    членів Кирило-Мефодіївського братства (Куліш, Костомаров, Білозерський)'
  - 'Визначення феномену: громади як напівлегальні об''єднання інтелігенції (студенти,
    викладачі) для культурної просвіти народу'
  - 'Мотивація руху: усвідомлення загрози асиміляції та гасло «Освіта для народу рідною
    мовою» як інструмент національного самозбереження'
- section: 'Перші громади (1860-ті): I — Центри руху'
  words: 600
  points:
  - 'Київська «Стара громада» (1861): лідерство Володимира Антоновича та статус найавторитетнішої
    організації'
  - 'Мережева структура: діяльність громад у Петербурзі (перша громада, 1859), Одесі
    (Чорноморська), Чернігові, Полтаві та Харкові'
  - Відсутність єдиного статуту та центру керування, але наявність спільної ідеологічної
    платформи та моральної дисципліни
- section: 'Перші громади (1860-ті): II — Ідеологія та символи'
  words: 600
  points:
  - 'Феномен хлопоманства: перехід польської шляхти (Антонович, Рильський) до українства;
    маніфест «Моя сповідь»'
  - Зв'язки з польським визвольним рухом та розмежування цілей (відмова від претензій
    на Правобережжя)
  - 'Народження національного гімну: написання Павлом Чубинським вірша «Ще не вмерла
    Україна» (осінь 1862) в колі громадівців'
- section: 'Діяльність громад: I — Просвіта та видавництво'
  words: 800
  points:
  - 'Недільні школи: організація безкоштовного навчання для дорослих робітників і
    селян; створення букварів (Т. Шевченко)'
  - 'Журнал «Основа» (1861–1862): перший всеукраїнський часопис, що став трибуною
    для Шевченка, Вовчка, Костомарова'
  - Фінансова підтримка меценатів (Тарновські, Ґалаґани) та вплив Валуєвського циркуляра
    (1863) на згортання освітньої роботи
- section: 'Діяльність громад: II — Науковий тріумф'
  words: 800
  points:
  - Південно-Західний відділ Російського географічного товариства (1873–1876) як легальна
    форма діяльності («міні-академія наук»)
  - 'Етнографічний прорив: експедиція Павла Чубинського (7 томів праць) та золота
    медаль від імперії за доказ окремішності українців'
  - 'Наукові звершення: проведення одноденного перепису населення Києва (1874) та
    організація III Археологічного з''їзду'
- section: Первинні джерела
  words: 500
  points:
  - 'Публіцистика журналу «Основа»: програмні статті про право на освіту рідною мовою
    та культурну самобутність'
  - 'Епістолярна спадщина: листування між громадівцями Києва, Львова (концепція Галичини
    як «П''ємонту») та Петербурга'
  - 'Поліцейські звіти та доноси: записки Михайла Юзефовича про загрозу перетворення
    «наріччя» на інструмент розвалу імперії'
- section: Деколонізаційний погляд
  words: 600
  points:
  - Громадівство як форма «культурної самооборони» в умовах політичного абсолютизму
    та заборон
  - 'Спростування імперського міфу про меншовартість: доказ того, що українська культура
    є високою наукою, а не лише селянським побутом'
  - 'Nation-building: трансформація лояльного «малоросійства» у свідоме українство
    та формування суб''єктної національної еліти'
- section: 'Підсумок: Від громад до партій'
  words: 600
  points:
  - 'Наслідки Емського указу (1876): повна заборона українського друку, закриття Відділу
    та перехід у глибоке підпілля'
  - 'Політична еміграція: діяльність Михайла Драгоманова у Женеві та створення вільної
    преси («Громада»)'
  - 'Радикалізація руху: поява Братства тарасівців та перехід від культурництва до
    політичних вимог (самостійність) у 1890-х'
