slug: tomos
title: 'Томос: Духовна незалежність'
word_target: 5000
content_outline:
- section: 'Вступ: Церква та держава — Концепція незалежності'
  words: 350
  points:
  - 'Концепція «Незалежна держава — незалежна церква»: чому політичний суверенітет
    неповний без духовного.'
  - Релігія як фундамент національної ідентичності у Східній Європі.
  - 'Визначення автокефалії: повна адміністративна незалежність та рівність у Диптиху
    (аналог державного суверенітету).'
- section: 'Вступ: Церква та держава — Історичне коріння (1686-1991)'
  words: 400
  points:
  - '1686 рік як корінь проблеми: незаконна анексія Київської митрополії Москвою.'
  - 'Наслідки підпорядкування: русифікація літургії, освіти (Києво-Могилянська академія)
    та свідомості.'
  - 'Історична тяглість боротьби: спроби автокефалії 1917-1921 (Василь Липківський,
    УАПЦ), 1942, 1990-ті роки.'
  - Жорстоке придушення українського церковного руху радянською та російською владою.
- section: 'Історія українського православ''я: I — Київська митрополія та анексія'
  words: 500
  points:
  - Київська митрополія (988 р.) як Матір-Церква для московського православ'я; спростування
    міфу про першість Москви.
  - 'Історичний факт: Москва самопроголосила автокефалію у 1448 році (розкол) і чекала
    визнання 141 рік (до 1589).'
  - 'Деталі анексії 1686 року: хабар патріарху Діонісію IV (соболі та 200 золотих)
    та порушення канонічних умов.'
  - Умова поминання Вселенського патріарха першим, яку Москва негайно порушила.
- section: 'Історія українського православ''я: II — Розкол та політична боротьба (1991-2018)'
  words: 500
  points:
  - 'Події 1991 року: звернення Філарета (Денисенка) про автокефалію та політична
    відмова Москви.'
  - Використання анафеми як політичної зброї проти українських ієрархів.
  - Протистояння УПЦ КП (патріотична, але невизнана) та УПЦ МП (канонічна, але інструмент
    «русского міра»).
  - Просування ідеї «триєдиного народу» через структури УПЦ МП.
- section: 'Здобуття Томосу: I — Шлях до Собору'
  words: 450
  points:
  - 'Квітень 2018: безпрецедентна єдність гілок влади (Президент, Верховна Рада) та
    церковних ієрархів.'
  - 'Геополітичний контекст: Вселенський Патріарх Варфоломій бачить історичне вікно
    можливостей.'
  - 'Масштабна протидія Росії: дипломатичний тиск, кібератаки (група Fancy Bear) на
    Фанар, шантаж.'
  - Скасуванні Синодом Вселенського Патріархату акту 1686 року (жовтень 2018).
- section: 'Здобуття Томосу: II — Об''єднавчий собор та обрання Предстоятеля'
  words: 500
  points:
  - '15 грудня 2018, Софія Київська: Об''єднавчий собор та утворення ПЦУ.'
  - Саморозпуск УПЦ КП та УАПЦ заради єдності; участь двох єпископів УПЦ МП (Симеон,
    Олександр).
  - 'Напруга за зачиненими дверима: складні переговори та очікування рішення.'
  - 'Обрання митрополита Епіфанія: молодий лідер, знавець грецької мови, відсутність
    зв''язків з радянським КДБ.'
- section: 'Здобуття Томосу: III — Вручення та міжнародна реакція'
  words: 450
  points:
  - '5-6 січня 2019, Стамбул (Фанар): підписання та урочисте вручення Томосу в церкві
    Св. Георгія.'
  - 'Символізм моменту: перше офіційне співслужіння Варфоломія та Епіфанія українською
    мовою.'
  - 'Статус ПЦУ: 15-та автокефальна церква у Диптиху, «рівна серед рівних».'
  - 'Реакція Москви: розрив євхаристійного спілкування з Константинополем, самоізоляція
    РПЦ, ярлик «Стамбульська парафія».'
- section: Первинні джерела
  words: 600
  points:
  - 'Аналіз тексту Томосу: визнання ПЦУ «духовною донькою» Константинополя, а не Москви.'
  - 'Ключова цитата: «визнаємо та проголошуємо встановлену в межах території України
    Автокефальну Церкву».'
  - 'Обмеження юрисдикції: діаспора підпорядковується Вселенському Патріархату (компромісний
    пункт).'
  - 'Риторика Варфоломія: метафора про «зиму схизми», що закінчилася, та «квіт надії».'
  - 'Статут ПЦУ: демократична грецька традиція управління на противагу авторитарній
    російській моделі.'
- section: Деколонізаційний погляд
  words: 500
  points:
  - Термін «розкол» (raskol) як імперський інструмент контролю та таврування прагнень
    до свободи.
  - 'Історична правда: Москва сама перебувала у невизнаному розколі 141 рік (1448-1589).'
  - Концепція «канонічної території» РПЦ як політичне виправдання агресії та заперечення
    української суб'єктності.
  - Томос як акт відновлення історичної справедливості та повернення до європейської
    православної традиції.
- section: 'Підсумок: Після Томосу — Перехід парафій та війна'
  words: 400
  points:
  - 'Перша хвиля переходів (2019): близько 500 громад змінюють юрисдикцію.'
  - 'Друга хвиля (після 2022): масовий вихід громад з УПЦ МП через війну (>1000 парафій).'
  - 'Втрата легітимності УПЦ МП: благословення війни Кирилом, колабораціонізм окремих
    кліриків.'
  - Собор у Феофанії (травень 2022) як спроба УПЦ МП імітувати розрив з Москвою без
    реальних канонічних кроків.
- section: 'Підсумок: Після Томосу — Нова ідентичність та календар'
  words: 350
  points:
  - 'ПЦУ як церква українського народу: розвиток інституту капеланства, волонтерська
    діяльність.'
  - 'Календарна реформа (2023): перехід на новоюліанський календар (Різдво 25 грудня).'
  - Синхронізація літургійного часу з Європою та остаточний розрив з ритмом «русского
    міра».
  - Цивілізаційний вибір «Геть від Москви» на рівні духовного життя.
