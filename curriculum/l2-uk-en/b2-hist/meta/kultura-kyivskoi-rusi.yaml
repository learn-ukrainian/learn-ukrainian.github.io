slug: kultura-kyivskoi-rusi
title: Культура Київської Русі
word_target: 5000
content_outline:
- section: Читання
  words: 300
  points:
  - Огляд основних тем культурного розвитку Київської Русі — входження до «Візантійської
    співдружності націй» зі збереженням самобутності
  - 'Культурний вибух після 988 року: від дерев''яної традиції до монументального
    кам''яного зодчества'
- section: Вступ — Культурний світ Русі
  words: 500
  points:
  - Культурне багатство Київської Русі як синтез візантійських та місцевих традицій
    — візантійська форма (камінь, християнство) та місцевий зміст (дерево, фольклор)
  - Роль християнства у формуванні культурної ідентичності — церква як носій високої
    культури та грамотності
  - Культура як вираз державності та національного духу — відсутність повного цезаропапізму,
    вплив князя на культурне замовлення
- section: Писемність та освіта
  words: 800
  points:
  - Запровадження кирилиці та розвиток писемної культури — витіснення глаголиці, поширення
    абетки
  - Створення скрипторіїв при монастирях — Остромирове Євангеліє (1056–1057) як найдавніша
    датована книга Русі
  - Берестяні грамоти як свідчення поширення грамотності — знахідки у Звенигороді
    (Львівщина) спростовують міф про «новгородський феномен»
  - Освітня діяльність монастирів та соборів — графіті Софії Київської фіксують живу
    розмовну мову (м'яке «ц», закінчення -ові/-єві)
- section: Література
  words: 700
  points:
  - Літописання як головний жанр історичної прози — «Повість минулих літ» (1113) Нестора
    Літописця як політична публіцистика та історіософія
  - «Слово о полку Ігоревім» як шедевр давньоруської літератури — 1187 рік, перша
    згадка назви «Україна», заклик до єднання, язичницькі метафори (Стрибожі внуки)
  - Житійна література та її роль у духовному житті — житія Феодосія Печерського,
    патерики
  - Перекладна література та культурний обмін з Візантією — «Ізборники» Святослава
    (1073, 1076) як енциклопедії знань того часу
- section: Архітектура
  words: 700
  points:
  - Хрестово-купольний стиль храмового будівництва — Десятинна церква (988) як перша
    кам'яна споруда, фундамент українського зодчества
  - Софійський собор (1037) як архітектурний символ держави — синтез візантійської
    системи та місцевої 13-купольної традиції (Христос і 12 апостолів)
  - Синтез візантійської техніки та місцевих художніх традицій — використання «голосників»
    (керамічних глечиків) у стінах для акустики та полегшення конструкції
  - Розвиток оборонного зодчества та палацового будівництва — Золоті ворота (сакральна
    і оборонна функція), Спасо-Преображенський собор у Чернігові
- section: Образотворче мистецтво
  words: 700
  points:
  - Мозаїка та фрески у храмах Києва — Оранта («Непорушна Стіна») та Христос Пантократор,
    світські сюжети (полювання, музиканти)
  - Іконопис та формування місцевих художніх шкіл — діяльність Аліпія Печерського,
    київський стиль
  - Ювелірне мистецтво — скань, зернь, емаль — київська школа перегородчастої емалі,
    вироби якої були відомі та цінувалися в Європі
  - Книжкова мініатюра та оздоблення рукописів — розкішні ілюстрації Остромирового
    Євангелія, «Трірський псалтир»
- section: Музика та усна творчість
  words: 500
  points:
  - Церковний спів та його роль у богослужінні — знаменний розспів, розвиток музичної
    нотації
  - Билини та епічна традиція про князів і богатирів — Ілля Муромець походить з Морівська
    (Чернігівщина), а не з російського Мурома
  - Боян як образ давньоруського співця — згадка у «Слові о полку Ігоревім», роль
    співця у дружинній культурі
  - Народна музика та її відображення в літературі — скоморохи на фресках Софії (гуслі,
    сопілки) як свідчення світської розважальної культури
- section: Деколонізаційний погляд
  words: 600
  points:
  - Спростування міфів про культурну залежність Русі від Москви — спростування концепції
    «спільної колиски» і «єдиної давньоруської мови»
  - Київська Русь як незалежний центр культурного розвитку — українська культура не
    була провінційною щодо Візантії, а мала власне обличчя
  - Українська культурна спадщина як фундамент національної ідентичності — діалектні
    риси (повноголосся, кличний відмінок, закінчення -ові) у мові Русі як предки сучасної
    української мови
- section: Первинні джерела
  words: 300
  points:
  - 'Тексти літописів як історичні свідчення — цитата з «Повісті минулих літ» про
    книги: «Книги — мов ріки, які наповнюють собою увесь світ...»'
  - Рукописи «Слова о полку Ігоревім» — уривок (плач Ярославни або вступ) як зразок
    високої поезії XII ст.
  - Археологічні знахідки — текст берестяної грамоти зі Звенигорода як приклад побутового
    листування простих людей
