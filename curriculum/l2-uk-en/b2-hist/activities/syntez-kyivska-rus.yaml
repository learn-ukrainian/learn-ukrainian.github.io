- type: reading
  id: reading-hrushevsky
  title: 'Первинне джерело: Звичайна схема історії'
  source: 'Михайло Грушевський'
  text: 'Історія українського народу на своїй етнічній території є абсолютно безперервною. Від Київської Русі центр політичного та культурного життя нації просто органічно перемістився далі на безпечний захід — до міцного Галицько-Волинського князівства. Згодом ці українські землі добровільно та мирно інтегрувалися у Велике князівство Литовське. Могутня Київська Русь — це лише перший, найдавніший, але далеко не останній етап складного українського політичного життя.'
  tasks:
    - 'Які етапи розвитку української державності виділяє Михайло Грушевський у своїй концепції?'
    - 'Чому видатний історик заперечує концепцію спільної колиски трьох братніх народів?'

- type: comparative-study
  title: 'Порівняльний аналіз: Погляди на спадщину Русі'
  source_reading: 'reading-hrushevsky'
  instruction: 'Проаналізуйте різні історичні погляди та порівняйте їх за вказаними критеріями.'
  items_to_compare:
    - 'Схема Михайла Грушевського'
    - 'Російська імперська схема'
  criteria:
    - 'Концепція перенесення столиці'
    - 'Історична тяглість державності'
    - 'Етнічний та мовний субстрат'
  prompt: 'Порівняйте український та російський підходи до інтерпретації спадщини Київської Русі за наведеними критеріями.'

- type: essay-response
  title: 'Есе: Київська Русь та українська ідентичність'
  instruction: 'Напишіть аргументований текст, спираючись на матеріали модуля.'
  prompt: 'Напишіть розгорнуте есе (мінімум 150 слів) на тему: Чому епоха Київської Русі є фундаментальним каменем сучасної української ідентичності? У своїй відповіді обов''язково спирайтеся на поняття вічової демократії, гуманної правової системи (Руська Правда) та високої культурної спадщини.'
  min_words: 150
  rubric:
    - criteria: 'Змістове наповнення'
      description: 'Есе детально розкриває вплив традицій Київської Русі на сучасну українську ідентичність.'
      points: 10
    - criteria: 'Аргументація'
      description: 'Наведено конкретні історичні приклади з політичної, правової та культурної сфер.'
      points: 10

- type: essay-response
  title: 'Есе: Справжній спадкоємець Русі'
  source_reading: 'reading-hrushevsky'
  instruction: 'Сформулюйте власну позицію, критично аналізуючи історичні міфи.'
  prompt: 'Хто є справжнім спадкоємцем Київської Русі? Спростуйте імперський міф про єдину давньоруську народність, пояснивши, чому політична традиція Суздаля та Московії кардинально відрізнялася від київської.'
  min_words: 150
  rubric:
    - criteria: 'Історична точність'
      description: 'Успішно спростовано колоніальні міфи та науково доведено пряму українську спадкоємність.'
      points: 10
    - criteria: 'Аналіз політичних культур'
      description: 'Чітко протиставлено вічову демократію та баланс влади у Києві суздальській деспотії.'
      points: 10

- type: true-false
  title: 'Правда чи вигадка: Розвінчання міфів'
  instruction: 'Визначте, чи є наведені твердження правдивими, спираючись на історичні факти.'
  items:
    - statement: 'Згідно з концепцією Михайла Грушевського, спадщина Київської Русі органічно перейшла до Галицько-Волинського князівства.'
      correct: true
      explanation: 'Грушевський переконливо довів пряму спадкоємність української державності від Києва до Галичини і Волині.'
    - statement: 'За часів Київської Русі існувала міцна єдина давньоруська народність без мовних відмінностей.'
      correct: false
      explanation: 'Це російський імперський міф; Русь була поліетнічною державою, а предки українців від початку мали власні мовні особливості.'
    - statement: 'Андрій Боголюбський захопив Київ у 1169 році виключно з метою перенесення туди своєї нової столиці.'
      correct: false
      explanation: 'Він узяв давнє місто як жорстокий іноземний завойовник, пограбував його і зовсім не мав наміру там княжити.'
    - statement: 'Система влади в Київській Русі надійно спиралася на баланс між монархом, боярською радою та народним вічем.'
      correct: true
      explanation: 'Цей неписаний тріумвірат влади забезпечував демократичну політичну традицію та обмежував автократію князів.'
    - statement: 'Любецький з''їзд 1097 року офіційно закріпив розпад держави та одразу призвів до її глибокого економічного занепаду.'
      correct: false
      explanation: 'З''їзд мудро запровадив федеративний устрій, що було нормальною європейською тенденцією прогресивного розвитку.'
    - statement: 'Згідно з давнім кодексом Руська Правда, за найтяжчі злочини злочинців завжди карали жорстокою смертною карою.'
      correct: false
      explanation: 'Руська Правда повністю скасовувала смертну кару, гуманно замінивши її великими штрафами.'
    - statement: 'Київська Русь була повністю ізольованою від потужних держав Західної Європи.'
      correct: false
      explanation: 'Вона була невід''ємною частиною великого християнського світу, а київські князі активно використовували династичну дипломатію.'
    - statement: 'На древніх стінах Софії Київської знайдено тисячі графіті, що переконливо свідчить про масову грамотність звичайних жителів.'
      correct: true
      explanation: 'Прості кияни, ремісники та купці масово і вільно володіли грамотою, залишаючи особисті написи на стінах храмів.'
    - statement: 'Суздальське князівство природно формувалося в умовах потужних демократичних вічових традицій.'
      correct: false
      explanation: 'Там на колонізованих землях дуже швидко сформувалася жорстка автократична модель деспотичного управління без впливу віча.'
    - statement: 'Глобальний шлях із варяг у греки надійно з''єднував холодне Балтійське море з Чорним морем та багатою Візантією.'
      correct: true
      explanation: 'Це була найважливіша ключова трансконтинентальна торговельна магістраль, яка стабільно збагачувала Київську Русь.'