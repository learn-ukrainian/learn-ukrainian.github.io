- type: reading
  id: "reading-mazepa-poltava"
  title: "Універсал Івана Мазепи (1708)"
  source: "Звернення до українського народу"
  text: "Ми стоїмо перед лицем знищення нашої автономії. Московський цар порушив свої зобов'язання захищати нас, кинувши наші полки на поталу ворогу. Наш обов'язок — врятувати Матір нашу, Україну, і для цього ми уклали альянс зі шведським королем."
  instruction: "Прочитайте уривок і підготуйтеся до аналізу аргументації гетьмана."
  tasks:
    - "Якими аргументами гетьман пояснює свій перехід на бік Швеції?"

- type: true-false
  title: "Перевірте факти: Міфи та реальність"
  instruction: "Визначте, чи є ці твердження про події 1708-1709 років правдивими."
  items:
    - statement: "Рішення Івана Мазепи перейти на бік Швеції було спонтанним емоційним бунтом."
      correct: false
      explanation: "Це був продуманий державницький крок, спрямований на збереження Гетьманщини від поглинання Російською імперією."
    - statement: "Петро І планував реформувати козацьке військо і перетворити козаків на драгунів."
      correct: true
      explanation: "Цар мав намір ліквідувати військову та політичну автономію Гетьманщини."
    - statement: "Княгиня Ганна Дольська була таємною посередницею між Мазепою та Петром І."
      correct: false
      explanation: "Вона була посередницею між Мазепою, польським королем та шведським монархом Карлом XII."
    - statement: "Петро І до останнього моменту не вірив доносам Кочубея та Іскри на Мазепу."
      correct: true
      explanation: "Цар настільки довіряв гетьману, що спочатку наказав заарештувати та стратити донощиків."
    - statement: "Церковна анафема, накладена на Мазепу, була канонічним рішенням Вселенського патріархату."
      correct: false
      explanation: "Анафема була суто політичним актом, проголошеним за наказом світського правителя Петра І."
    - statement: "Батуринський гарнізон добровільно здався російським військам Меншикова."
      correct: false
      explanation: "Гарнізон мужньо відбивав штурми, а місто було захоплене та знищене лише через зраду Івана Носа."
    - statement: "Запорозька Січ на чолі з Костем Гордієнком відмовилася підтримати Івана Мазепу."
      correct: false
      explanation: "Запорожці приєдналися до Мазепи у березні 1709 року, незважаючи на загрозу російського терору."
    - statement: "Шведський король Карл XII не зміг керувати військом під Полтавою через важке поранення."
      correct: true
      explanation: "Це була фатальна помилка, яка призвела до втрати оперативного контролю над битвою."
    - statement: "Конституція Пилипа Орлика 1710 року передбачала поділ влади та створення парламенту."
      correct: true
      explanation: "Документ обмежував абсолютну владу гетьмана і запроваджував Генеральну Раду."
    - statement: "Згідно з деколонізаційним поглядом, вчинок Мазепи є легітимним розривом договору про протекторат."
      correct: true
      explanation: "Васал мав право розірвати угоду, якщо сюзерен порушував зобов'язання щодо його захисту."

- type: critical-analysis
  title: "Аналіз політичної аргументації"
  source_reading: "reading-mazepa-poltava"
  instruction: "Проаналізуйте аргументацію гетьмана в наведеному Універсалі."
  questions:
    - "Яке ключове порушення з боку царя згадує гетьман для виправдання своїх дій?"
    - "Як Мазепа концептуалізує обов'язок перед батьківщиною в цьому тексті?"
  model_answers:
    - "Мазепа наголошує на порушенні зобов'язання сюзерена захищати васала. Цар відмовився надавати військову допомогу і використовував козаків не за призначенням."
    - "Він концептуалізує порятунок 'Матері України' як вищий державний обов'язок, який стоїть над особистою присягою царю, якщо ця присяга веде до знищення автономії."
  focus_points:
    - "Концепція протекторату і васалітету"
    - "Деколонізаційний погляд на зраду"

- type: comparative-study
  title: "Порівняння історичних міфів"
  source_reading: "reading-mazepa-poltava"
  instruction: "Порівняйте російський імперський та європейський романтичний погляди на Івана Мазепу."
  items_to_compare:
    - "Російський міф (Образ Юди та зрадника)"
    - "Європейський міф (Романтичний герой свободи)"
  criteria:
    - "Мотивація дій гетьмана"
    - "Моральна оцінка постаті"
  prompt: "На основі тексту уроку, опишіть, як кардинально відрізнялися підходи до оцінки дій Мазепи в Російській імперії та в Європі 19 століття."
  model_answer: "У російському імперському міфі (наприклад, у поемі Пушкіна 'Полтава') Мазепа постає як мстивий зрадник і лиходій, керований виключно особистими амбіціями, а його дії оцінюються як підступний злочин проти сюзерена. Натомість у європейському міфі (Байрон, Гюго) він є романтичним героєм, що повстає проти тиранії заради свободи свого народу, і його постать викликає захоплення як символ нескореного людського духу."

- type: essay-response
  title: "Чому Мазепа програв?"
  source_reading: "reading-mazepa-poltava"
  instruction: "Напишіть аналітичне есе на задану тему."
  prompt: "Проаналізуйте комплекс військових, політичних та кліматичних факторів, що призвели до поразки шведсько-українського альянсу під Полтавою. Чи була ця поразка неминучою?"
  min_words: 200
  model_answer: "Поразка шведсько-українського альянсу під Полтавою була зумовлена низкою фатальних факторів. По-перше, кліматичні умови: люта зима 1708-1709 років критично виснажила ресурси шведської армії, яка не мала достатнього зимового одягу та провіанту. По-друге, тактика 'випаленої землі', застосована росіянами, позбавила союзників можливості поповнити запаси. По-третє, військово-тактичні прорахунки та збіги обставин, головним з яких стало поранення Карла XII. Відсутність геніального полководця на полі бою призвела до неузгодженості дій шведських генералів і втрати оперативного контролю. З політичної точки зору, терор Меншикова (особливо Батуринська трагедія) паралізував українське суспільство, і Мазепа не зміг підняти масове антиросійське повстання. Відповідаючи на питання про неминучість поразки, варто зазначити, що хоча російська армія мала колосальну чисельну перевагу і перевагу в артилерії, поразка не була абсолютно наперед визначеною: якби Карл XII міг особисто керувати боєм, а Батурин не впав через зраду, хід битви міг би бути іншим. Проте в тих конкретних історичних умовах шанси союзників на перемогу були мінімальними."
  rubric:
    - criteria: "Аналіз військових факторів"
      description: "Есе розглядає поранення Карла XII, перевагу російської артилерії та втрату Батурина."
      points: 5
    - criteria: "Оцінка впливу терору"
      description: "Учень розуміє психологічний ефект Батуринської трагедії на українське суспільство."
      points: 3
    - criteria: "Аргументований висновок"
      description: "Надана власна оцінка щодо неминучості поразки з урахуванням обставин."
      points: 2