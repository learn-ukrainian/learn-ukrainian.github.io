- type: reading
  id: reading-ipatiy-chronicle
  title: 'Первинне джерело: Літопис про відмову Михайла'
  source: 'Галицько-Волинський літопис'
  text: 'Тобі, царю, поклонюся, бо Бог доручив тобі царство світу цього, а тому, чому ці кланяються, не поклонюся.'
  tasks:
    - 'Прочитайте уривок з Галицько-Волинського літопису.'
    - 'Зверніть увагу на аргументацію князя Михайла Чернігівського.'

- type: critical-analysis
  source_reading: reading-ipatiy-chronicle
  title: 'Аналіз літописної цитати'
  instruction: 'Проаналізуйте аргументацію Михайла Чернігівського, використовуючи наведений текст.'
  questions:
    - 'Як Михайло пояснює своє рішення вклонитися хану?'
    - 'Чому князь відмовляється поклонятися ідолам?'
    - 'Як ця цитата відображає концепцію духовної суверенності?'
  model_answers:
    - 'Михайло визнає земну владу хана Батия, вважаючи, що вона доручена йому Богом, і тому він готовий виявити йому політичну покірність.'
    - 'Він відмовляється поклонятися ідолам, оскільки це суперечить його християнській вірі. Земний правитель не має влади над його душею.'
    - 'Цитата демонструє чітке розмежування політичної та духовної сфер. Навіть в умовах військової поразки та політичної залежності, князь зберігає свободу віросповідання та моральну автономію.'

- type: true-false
  title: 'Перевірка розуміння тексту'
  instruction: 'Визначте, чи є наведені твердження правдивими чи хибними.'
  items:
    - statement: 'Михайло Чернігівський народився в період найбільшої могутності Київської Русі.'
      correct: false
      explanation: 'Він народився близько 1179 року, коли держава вже вступала у період глибокої політичної фрагментації.'
    - statement: 'Чернігівське князівство у тринадцятому столітті було бідною та маргінальною провінцією.'
      correct: false
      explanation: 'Це було одне з найбільших, найвпливовіших та найбагатших державних утворень Східної Європи.'
    - statement: 'Поразка на річці Калка у 1223 році консолідувала руських князів для спільної боротьби з монголами.'
      correct: false
      explanation: 'Замість консолідації зусиль, правителі знову поринули у міжусобні війни за владу.'
    - statement: 'Система ярликів вимагала від князів особистої присутності в ставці хана для легітимізації їхньої влади.'
      correct: true
      explanation: 'Князь мусив особисто здійснити подорож до ставки хана, щоб отримати дозвільну грамоту.'
    - statement: 'Монгольський ритуал проходження між двома вогнищами мав на меті виключно релігійне очищення.'
      correct: false
      explanation: 'Це також був витончений політичний механізм тотального психологічного контролю та перевірки на покору.'
    - statement: 'Михайло Чернігівський відмовився визнавати будь-яку земну владу хана Батия.'
      correct: false
      explanation: 'Він погоджувався визнати тимчасову земну владу хана і сплачувати йому данину, але відмовлявся від духовного підкорення.'
    - statement: 'Боярин Федор до останнього благав князя виконати вимоги монгольських жерців заради збереження життя.'
      correct: false
      explanation: 'Боярин Федор залишався непохитним і постійно нагадував князю про вічність та необхідність збереження віри.'
    - statement: 'Тіла страчених мучеників були з почестями поховані монгольською імперською адміністрацією.'
      correct: false
      explanation: 'Монголи заборонили ховати тіла, але вірні люди таємно зібрали останки та перевезли їх до Чернігова.'
    - statement: 'Канонізація Михайла та Федора відбулася відразу наступного року після їхньої трагічної загибелі.'
      correct: false
      explanation: 'Офіційне церковне визнання та урочиста канонізація відбулися набагато пізніше, лише у 1547 році.'
    - statement: 'Історія Михайла Чернігівського повністю підтверджує імперський міф про тотальну покору руських еліт Золотій Орді.'
      correct: false
      explanation: 'Навпаки, його свідомий вчинок руйнує цей міф і демонструє яскравий приклад активного опору.'

- type: comparative-study
  title: 'Порівняльний аналіз стратегій виживання'
  instruction: 'Порівняйте дві різні політичні стратегії реагування на монгольську загрозу.'
  items_to_compare:
    - 'Стратегія Михайла Чернігівського'
    - 'Стратегія Олександра Невського'
  criteria:
    - 'Ставлення до колаборації з монгольською адміністрацією'
    - 'Пріоритет духовних чи політичних інтересів'
    - 'Вплив на формування майбутньої політичної культури'
  prompt: 'Використовуючи наведені критерії, порівняйте стратегії двох лідерів та їхні довгострокові історичні наслідки.'
  model_answer: 'Михайло Чернігівський обрав стратегію духовного опору та збереження внутрішньої незалежності навіть ціною власного життя. Він представляє європейську традицію Русі, де честь та мораль важливіші за рабське існування. Натомість Олександр Невський обрав шлях повної колаборації та підкорення, щоб зберегти владу, що згодом стало основою для формування деспотичної моделі управління в Московії.'

- type: essay-response
  title: 'Есе: Духовна суверенність як політичний інструмент'
  instruction: 'Напишіть аналітичне есе на запропоновану тему.'
  prompt: 'Проаналізуйте, яким чином релігійні переконання Михайла Чернігівського та його відмова від участі в язичницьких обрядах перетворилися на потужний акт політичного протесту. Чому збереження духовної суверенності було критично важливим в умовах військової поразки?'
  min_words: 150
  model_answer: 'Відмова Михайла Чернігівського поклонятися монгольським ідолам була не лише проявом релігійної стійкості, але й фундаментальним політичним актом. У середньовічному суспільстві релігія була основою легітимності влади. Згода на участь у чужих сакральних діях означала б не просто прийняття інших звичаїв, а публічне визнання повної духовної та політичної капітуляції перед загарбником. Встановлюючи межу між політичною покорою та духовною незалежністю, Михайло Чернігівський зберіг свою субєктність. Його мученицька смерть стала символом незламності та довела, що справжня свобода починається у свідомості. Цей вчинок сформував потужну традицію спротиву, продемонструвавши, що навіть тотальна військова окупація не може знищити національну ідентичність, якщо еліта зберігає свої моральні принципи.'
  rubric:
    - criteria: 'Аналіз політичного значення релігійного акту'
      description: 'Есе чітко пояснює, як релігійна відмова стала політичним протестом.'
      points: 40
    - criteria: 'Розуміння концепту духовної суверенності'
      description: 'Студент розкриває значення збереження внутрішньої свободи в умовах окупації.'
      points: 40
    - criteria: 'Історичний контекст та аргументація'
      description: 'Використання фактів з тексту для підтвердження своїх думок.'
      points: 20