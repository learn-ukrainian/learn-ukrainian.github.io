- type: reading
  id: reading-peasants
  title: Умови життя селян в Речі Посполитій
  source: Свідчення сучасників (Гійом де Боплан)
  text: 'Селяни в цьому краї перебувають у гіршому стані, ніж галерні невільники.
    Вони змушені працювати на свого пана три, чотири, а іноді й п''ять днів на тиждень,
    використовуючи власних коней і знаряддя. Крім того, вони віддають частину свого
    врожаю, птиці та яєць. Пан має над ними абсолютну владу, включно з правом на життя
    і смерть.

    '
  tasks:
  - Як Боплан описує статус українських селян?
  - Які саме повинності виконували селяни на користь пана?
- type: essay-response
  title: 'Есе: Соціальна нерівність'
  source_reading: reading-peasants
  instruction: Напишіть аналітичне есе на основі прочитаного тексту та матеріалу модуля.
  prompt: Порівняйте становище української шляхти та селянства в Речі Посполитій.
    Як Золота вольність однієї верстви впливала на безправність іншої?
  min_words: 150
  model_answer: Шляхта в Речі Посполитій мала безпрецедентні політичні та економічні
    привілеї, відомі як Золота вольність. Вона володіла землею, не платила податків
    і контролювала короля через сейм. Натомість селянство було перетворене на кріпаків,
    позбавлене будь-яких прав і повністю залежало від волі пана. Економічною основою
    шляхетської свободи була фільваркова система, яка вимагала постійного збільшення
    панщини. Таким чином, демократія для меншості будувалася на жорстокій експлуатації
    та безправності більшості населення.
  rubric:
  - criteria: Аналіз статусу шляхти
    description: Розкрито поняття Золотої вольності та привілеїв.
    points: 10
  - criteria: Аналіз статусу селянства
    description: Пояснено суть кріпацтва та фільваркової системи.
    points: 10
  - criteria: Порівняння та висновки
    description: Показано взаємозв'язок між правами шляхти та безправ'ям селян.
    points: 10
- type: reading
  id: reading-trenos
  title: 'Джерело: Тренос (Плач)'
  source: Мелетій Смотрицький (1610)
  text: 'Де тепер дім Острозьких, який перевершував яскравістю світла своєї стародавньої
    віри всі інші роди? Де славні роди Слуцькі, Заславські, Збаразькі, Вишневецькі,
    Сангушки, Чарторийські та інші, їм подібні? Де вони тепер? Всі разом зі мною,
    Православною церквою, похвали та славу Богові віддавали, а тепер змінилися і стали
    моїми ворогами.

    '
  tasks:
  - До кого звертається автор у цьому творі?
  - У чому Смотрицький звинувачує згадані князівські роди?
- type: critical-analysis
  title: 'Аналіз: Втрата еліти'
  source_reading: reading-trenos
  target_text: Всі разом зі мною, Православною церквою, похвали та славу Богові віддавали,
    а тепер змінилися і стали моїми ворогами.
  questions:
  - Яке історичне явище описує Мелетій Смотрицький у цьому фрагменті?
  - Які причини змушували українську аристократію переходити в католицизм?
  - Якими були наслідки цієї втрати еліти для українського суспільства?
  model_answers:
  - Смотрицький описує процес полонізації та ополячення української православної еліти.
  - Головними причинами були бажання отримати доступ до державних посад, зберегти
    землі та отримати привілеї.
  - Суспільство втратило політичних провідників, що призвело до маргіналізації культури
    та формування нової еліти з козацтва.
  focus_points:
  - Полонізація
  - Соціальні ліфти
  - Втрата суб'єктності
- type: true-false
  title: 'Перевірка фактів: Річ Посполита'
  items:
  - statement: Люблінська унія об'єднала Польщу та Литву, надавши українцям рівні
      політичні права.
    correct: false
    explanation: Українці не отримали рівних прав, держава була створена лише для
      двох народів.
  - statement: Після 1569 року Волинь і Київщина перейшли під безпосереднє управління
      польського короля.
    correct: true
    explanation: Ці землі були вилучені зі складу Литви і приєднані до Польської Корони.
  - statement: Третій Литовський статут 1588 року скасував кріпацтво на українських
      землях.
    correct: false
    explanation: Навпаки, він юридично закріпив кріпацтво і заборонив селянам вільно
      переходити від пана до пана.
  - statement: Брестська унія 1596 року призвела до утворення греко-католицької церкви.
    correct: true
    explanation: Унія зберегла східний обряд, але визнала верховенство Папи Римського.
  - statement: Фільварок — це козацьке військове поселення на Дикому Полі.
    correct: false
    explanation: Фільварок — це шляхетське господарство, орієнтоване на вирощування
      зерна для продажу.
  - statement: Православні братства займалися відкриттям шкіл і друкарень для захисту
      своєї культури.
    correct: true
    explanation: Братства були центрами освітнього та культурного спротиву ополяченню.
  - statement: Польські магнати часто призначали місцевих українців на найвищі посади
      у воєводствах.
    correct: false
    explanation: Король і Сенат призначали на ці посади переважно етнічних поляків
      або лояльних католиків.
  - statement: Принцип Liberum Veto дозволяв будь-якому шляхтичу зупинити прийняття
      закону на сеймі.
    correct: true
    explanation: Це право одного голосу призвело до паралічу державної системи Речі
      Посполитої.
  - statement: Більшість українських магнатських родів до кінця XVII століття зберегли
      православну віру.
    correct: false
    explanation: Більшість старих князівських родів перейшли в католицизм і полонізувалися.
  - statement: Масові втечі селян від панщини сприяли формуванню Запорозької Січі.
    correct: true
    explanation: Дике Поле стало притулком для тисяч людей, які не бажали жити в умовах
      кріпацтва.
  instruction: Визначте, чи твердження правильне.
