- type: reading
  id: reading-olbia-democracy
  title: 'Ольвія: Демократія та Виживання'
  instruction: Прочитайте текст про політичний устрій Ольвії та дайте відповіді на запитання.
  text: >
    Ольвія була класичним прикладом античної демократії. Влада належала народним зборам (еклесії), де кожен повноправний громадянин мав право голосу. Виконавчу владу здійснювала Рада (буле) та колегії магістратів. Однак ця демократія була випробувана на міцність під час облоги Зопіріона у 331 році до н.е. Щоб вижити, ольвіополіти пішли на безпрецедентні кроки: звільнили рабів, надали громадянство іноземцям та скасували борги. Це об'єднало суспільство перед лицем смертельної загрози.
  tasks:
    - 'Прочитайте текст.'
    - 'Дайте відповіді на запитання.'

- type: true-false
  title: 'Перевірка знань: Античні держави'
  instruction: Визначте, чи є твердження правдивим (True) або хибним (False).
  items:
    - statement: Ольвія була заснована вихідцями з Афін.
      correct: false
      explanation: Ольвію заснували вихідці з Мілета.
    - statement: Херсонес Таврійський мав демократичний устрій.
      correct: true
      explanation: Херсонес був демократичним полісом, хоча й з суворими дорійськими традиціями.
    - statement: Боспорське царство було республікою.
      correct: false
      explanation: Боспорське царство було монархією, де правили династії Археанактидів та Спартокідів.
    - statement: Головним експортним товаром грецьких міст було вино.
      correct: false
      explanation: Головним експортом було зерно; вино навпаки імпортували або виробляли для місцевих потреб (як у Херсонесі), але стратегічним ресурсом для Греції був хліб.
    - statement: Зопіріон захопив і зруйнував Ольвію.
      correct: false
      explanation: Зопіріон зазнав поразки і не зміг захопити місто.
    - statement: Присяга громадян Херсонеса містить зобов'язання не вивозити хліб повз місто.
      correct: true
      explanation: Це був захід продовольчої безпеки та економічного протекціонізму.
    - statement: Скіфський цар Скіл був шанований своїми підданими за любов до грецької культури.
      correct: false
      explanation: Його стратили за зраду скіфських традицій.
    - statement: Гуни знищили Боспорське царство у IV столітті нашої ери.
      correct: true
      explanation: Гунська навала поклала край існуванню Боспорського царства.
    - statement: Острів Зміїний в античності називався островом Ахілла (Левке).
      correct: true
      explanation: Там було головне святилище Ахілла Понтарха.
    - statement: Херсонес припинив існування після готської навали.
      correct: false
      explanation: Херсонес вистояв і проіснував до XV століття як візантійський форпост.
    - statement: Ольвія розташована на березі Дністровського лиману.
      correct: false
      explanation: Ольвія розташована на березі Бузького лиману; на Дністровському була Тіра.
    - statement: Грецька колонізація мала виключно загарбницький характер.
      correct: false
      explanation: Це був міграційний рух, викликаний демографією та нестачею землі.

- type: comparative-study
  title: 'Порівняння полісів: Ольвія та Херсонес'
  instruction: Порівняйте політичний та економічний устрій Ольвії та Херсонеса.
  items_to_compare:
    - Ольвія (Іонійці)
    - Херсонес (Дорійці)
  criteria:
    - Метрополія та ментальність
    - Політичний устрій (тип демократії)
    - Економічна спеціалізація (зерно vs вино)
    - Ставлення до варварів
  prompt: Напишіть коротке порівняння (100-150 слів), аналізуючи, як походження колоністів вплинуло на розвиток цих двох полісів.

- type: essay-response
  title: 'Есе: Спадщина античності'
  instruction: Напишіть есе на тему «Чому антична спадщина Північного Причорномор''я є ключовою для української європейської ідентичності?».
  prompt: >
    Використовуючи матеріал модулю, напишіть есе (200-250 слів).
    Аргументуйте свою думку, спираючись на факти про демократію, урбанізм та культурний синтез.
    Спростуйте міф про те, що до приходу Російської імперії тут було лише «дике поле».
    Як антична спадщина впливає на сучасне самоусвідомлення українців як європейської нації?
  source_reading: reading-olbia-democracy

- type: critical-analysis
  title: 'Аналіз джерела: Присяга громадян Херсонеса'
  instruction: Проаналізуйте уривок з Присяги та дайте відповіді на запитання.
  target_text: >
    «Клянусь Зевсом, Геєю, Геліосом, Дівою, богами й богинями Олімпійськими... я буду однодумцем у справі порятунку і свободи міста і громадян... Я не зраджу Херсонеса, ні Керкінітіди, ні Калос Лімена... я не буду нічого продавати і вивозити з рівнини в інше місце, тільки в Херсонес».
  questions:
    - Чому текст починається зі звернення до богів? Яку роль це відігравало?
    - Що означає поняття «однодумець» у контексті античного полісу?
    - Чому заборона на вивезення хліба була такою важливою для безпеки міста?
  focus_points:
    - Релігійний аспект клятви
    - Громадянська солідарність
    - Економічний протекціонізм
  model_answers:
    - Звернення до богів надавало клятві сакрального статусу; порушення клятви вважалося не просто злочином, а гріхом, що накличе гнів богів.
    - «Однодумець» означає громадянина, який ставить інтереси спільноти (полісу) вище за власні та діє згідно з колективною волею.
    - Хліб був стратегічним ресурсом; його безконтрольний вивіз міг призвести до голоду, тому місто прагнуло контролювати продовольчу безпеку.
