- type: reading
  id: reading-orlyk-const
  title: 'Джерело: Пакти й Конституції прав і вольностей'
  source: 'Пилип Орлик (1710)'
  instruction: 'Уважно прочитайте уривок із тексту Конституції та дайте відповіді на запитання.'
  text: |
    Тому ми, Генеральна Старшина, кошовий отаман і все Військо Запорозьке, домовилися і постановили з Ясновельможним гетьманом...
    Володарі, що дорожать своїм добрим ім'ям... виставлені на суд загалу. Природним правом є визволятися від гноблення і трудитися, аби повернути те, що несправедливістю та переважною силою було забрано.
  tasks:
    - 'Хто є сторонами суспільного договору в цьому тексті?'
    - 'Як документ пояснює причини обмеження влади гетьмана?'
    - 'Що вважається природним правом згідно з цим уривком?'

- type: critical-analysis
  title: 'Аналіз: Причини повстання'
  source_reading: reading-orlyk-const
  instruction: 'Проаналізуйте наведені тези та дайте розгорнуті відповіді.'
  target_text: 'Природним правом є визволятися від гноблення і трудитися, аби повернути те, що несправедливістю та переважною силою було забрано.'
  questions:
    - 'Як Пилип Орлик обґрунтовує право на збройний виступ проти московського царя?'
    - 'Яку роль у цій аргументації відіграє концепція суспільного договору?'
    - 'Чому російська історіографія називала ці дії виключно зрадою?'
  model_answers:
    - 'Орлик апелює до природного права народу на свободу та захист від тиранії.'
    - 'Цар порушив свої зобов''язання за договором 1654 року, тому українці вважали себе вільними від присяги.'
    - 'Російська імперія заперечувала правоздатність України як держави та вважала будь-яку непокору владі монарха зрадою.'
  focus_points:
    - 'Природне право'
    - 'Легітимність повстання'
    - 'Імперські міфи'

- type: essay-response
  title: 'Есе: Україна як європейська держава'
  source_reading: reading-orlyk-const
  instruction: 'Напишіть коротке есе на основі прочитаного тексту.'
  prompt: |
    Доведіть, що Бендерська Конституція 1710 року є пам'яткою європейської політичної думки, а не просто угодою старшини. Спирайтеся на ідеї розподілу влади та соціального захисту.
  min_words: 150
  model_answer: |
    Бендерська Конституція 1710 року переконливо доводить приналежність України до європейського правового поля. На відміну від московського самодержавства, де воля царя була абсолютним законом, український документ запроваджував чіткий поділ влади на законодавчу, виконавчу та судову гілки. Генеральна Рада виконувала роль парламенту, а Генеральний Суд був незалежним від гетьмана. Крім того, наявність соціальних гарантій для вдів і сиріт, а також антикорупційних механізмів, свідчить про глибоке розуміння концепції суспільного договору та відповідальності влади перед народом.
  rubric:
    - criteria: 'Аргументація'
      description: 'Студент наводить чіткі докази з тексту Конституції.'
      points: 40
    - criteria: 'Розуміння контексту'
      description: 'Студент протиставляє українську правову систему московському самодержавству.'
      points: 30
    - criteria: 'Грамотність'
      description: 'Текст написаний академічним стилем без граматичних помилок.'
      points: 30

- type: comparative-study
  title: 'Порівняння: Моделі влади'
  source_reading: reading-orlyk-const
  instruction: 'Порівняйте дві принципово різні політичні системи вісімнадцятого століття.'
  items_to_compare:
    - 'Українська гетьманська республіка (Конституція 1710 року)'
    - 'Московське царство часів Петра І (абсолютна монархія)'
  criteria:
    - 'Джерело влади (хто наділяє правителя повноваженнями)'
    - 'Обмеження влади (чи підпорядковується правитель закону)'
    - 'Статус підданих (громадяни з правами чи безправні слуги)'
  prompt: 'Як ці відмінності пояснюють причини українсько-російської війни початку вісімнадцятого століття?'
  model_answer: |
    В Україні джерелом влади вважався народ (Військо Запорозьке), який укладав договір з гетьманом. Гетьман був обмежений законом та підзвітний Генеральній Раді і незалежному Суду. У Московському царстві влада царя вважалася даною від Бога і не мала жодних юридичних обмежень, а всі жителі були його безправними слугами. Цей фундаментальний цивілізаційний конфлікт між правовою республікою та деспотією зробив збройне зіткнення неминучим.

- type: true-false
  title: 'Перевірка фактів: Конституція Пилипа Орлика'
  instruction: 'Визначте, чи є ці твердження правдивими.'
  items:
    - statement: 'Пилип Орлик походив із давнього українського козацького роду.'
      correct: false
      explanation: 'Він походив із чеського баронського роду, а народився на території сучасної Білорусі.'
    - statement: 'Пилип Орлик був обраний гетьманом на території України під час антимосковського повстання.'
      correct: false
      explanation: 'Його обрали гетьманом у вигнанні, в місті Бендери на території Османської імперії.'
    - statement: 'Конституція 1710 року передбачала поділ влади на три гілки: законодавчу, виконавчу та судову.'
      correct: true
      explanation: 'Це був один із перших у Європі документів, який на практиці запроваджував незалежний суд та парламент.'
    - statement: 'Згідно з Конституцією, гетьман мав абсолютне право особисто виносити смертні вироки злочинцям.'
      correct: false
      explanation: 'Гетьман категорично позбавлявся права карати на смерть без відповідного рішення незалежного Генерального Суду.'
    - statement: 'Конституція офіційно проголошувала повну незалежність України від Московського царства.'
      correct: true
      explanation: 'Документ юридично закріплював відмову від концепції Малоросії та відновлював державний суверенітет.'
    - statement: 'Документ закріплював формальний протекторат Османської імперії над Українською державою.'
      correct: false
      explanation: 'Конституція підтверджувала військовий протекторат шведського короля Карла дванадцятого.'
    - statement: 'Конституція містила спеціальні соціальні гарантії, зокрема звільнення від податків козацьких вдів і сиріт.'
      correct: true
      explanation: 'Це був унікальний для того часу приклад державної соціальної опіки.'
    - statement: 'Українська православна церква, згідно з текстом, мала залишатися під управлінням Московського патріархату.'
      correct: false
      explanation: 'Пилип Орлик чітко вимагав повернення церкви під пряму юрисдикцію Константинопольського патріарха.'
    - statement: 'Під час походу 1711 року на Правобережжя місцеве українське населення масово підтримувало армію Пилипа Орлика.'
      correct: true
      explanation: 'Спочатку населення активно його підтримувало, але все змінилося, коли татари почали грабувати міста.'
    - statement: 'Пилип Орлик помер в Україні, куди зміг легально повернутися наприкінці свого довгого життя.'
      correct: false
      explanation: 'Він помер у політичному вигнанні в місті Ясси, так і не побачивши вільної Батьківщини.'