- type: reading
  id: reading-pvl-igor
  title: 'Первинне джерело: Смерть князя Ігоря'
  source: Повість минулих літ (ХІІ ст.)
  text: 'Коли ж почули деревляни, що він знову йде, порадилися з князем своїм Малом
    і сказали: "Якщо внадиться вовк до овець, то виносить по одній все стадо, якщо
    не уб''ють його. Так і цей: якщо не вб''ємо його, то він усіх нас погубить". І
    послали вони до нього, кажучи: "Чого йдеш знову? Ти ж узяв усю данину". І не послухав
    їх Ігор, і деревляни, вийшовши назустріч з міста Іскоростеня, вбили Ігоря і дружину
    його, бо їх було мало.

    '
  tasks:
  - Як деревляни аргументували своє рішення вбити київського князя?
  - Яку метафору використали деревлянські старійшини для опису поведінки Ігоря?
- type: critical-analysis
  title: 'Аналіз: Звичаєве право та легітимність'
  source_reading: reading-pvl-igor
  target_text: Якщо внадиться вовк до овець, то виносить по одній все стадо, якщо
    не уб'ють його.
  questions:
  - Яке політичне значення має порівняння князя з вовком у контексті раннього середньовіччя?
  - Як цей уривок ілюструє межі влади правителя в умовах дії звичаєвого права?
  model_answers:
  - Порівняння з вовком вказує на те, що князь перестав бути захисником і перетворився
    на хижака, втративши легітимність участі в суспільному договорі.
  - Звичаєве право дозволяло збирати данину лише раз на рік. Порушення цієї норми
    дало громаді моральне і юридичне право на збройний опір.
- type: essay-response
  title: 'Есе: Криза системи полюддя'
  source_reading: reading-pvl-igor
  prompt: Спираючись на прочитаний уривок та матеріал модуля, проаналізуйте причини
    кризи системи полюддя за часів князя Ігоря. Чому економічна модель, яка працювала
    за Олега, дала збій?
  min_words: 150
  rubric:
  - criteria: Аналіз економічної моделі
    description: Студент пояснює суть полюддя та причини фінансових втрат Ігоря у
      Візантії.
    points: 4
  - criteria: Розуміння звичаєвого права
    description: Студент розкриває значення повторного збору данини як порушення суспільного
      договору.
    points: 4
  - criteria: Історичний контекст
    description: Робота враховує роль дружини князя та тиск еліти на правителя.
    points: 2
- type: comparative-study
  title: 'Порівняння: Дипломатія Олега та Ігоря'
  source_reading: reading-pvl-igor
  items_to_compare:
  - Договір Олега (911 рік)
  - Договір Ігоря (944 рік)
  criteria:
  - Торговельні привілеї купців
  - Рівень контролю з боку візантійської влади
  - Позиція Київської держави на міжнародній арені
- type: true-false
  title: 'Перевірте знання: Міфи та факти'
  items:
  - statement: Варяги принесли слов'янам державність як вже готову політичну інституцію.
    correct: false
    explanation: Варяги були лише політичним каталізатором об'єднання, фундамент держави
      був місцевим.
  - statement: Князь Олег об'єднав Північну та Південну Русь, зробивши Київ політичним
      центром.
    correct: true
    explanation: У 882 році Олег захопив Київ і проголосив його матір'ю міст руських.
  - statement: Полюддя було системою добровільних пожертв племен на користь київського
      князя.
    correct: false
    explanation: Це був механізм жорсткого державного примусу та експлуатації підкорених
      племен.
  - statement: Договір 911 року надав руським купцям безпрецедентне право на безмитну
      торгівлю у Візантії.
    correct: true
    explanation: Це зробило руські товари надзвичайно конкурентоспроможними на візантійському
      ринку.
  - statement: Абсолютна більшість послів, які підписали договір 911 року, мали слов'янські
      імена.
    correct: false
    explanation: Імена послів (Карл, Фарлоф, Вельмуд) свідчать про скандинавське походження
      еліти.
  - statement: У 941 році візантійці застосували грецький вогонь, повністю знищивши
      флот князя Ігоря.
    correct: true
    explanation: Це була технологічна катастрофа для війська Русі.
  - statement: Договір 944 року був більш вигідним для Києва, ніж договір Олега 911
      року.
    correct: false
    explanation: Договір 944 року скасував право на безмитну торгівлю і ввів паспортний
      контроль.
  - statement: Повстання деревлян було викликане виключно їхнім небажанням платити
      будь-яку данину.
    correct: false
    explanation: Причиною стало грубе порушення звичаєвого права — спроба зібрати
      данину вдруге за рік.
  - statement: Головними експортними товарами ранньої Русі були хутро, віск, мед та
      раби.
    correct: true
    explanation: Русь функціонувала як експортоорієнтована корпорація з продажу сировини
      та невільників.
  - statement: Сучасна історіографія підтверджує, що столиця Русі була перенесена
      з Києва до Москви.
    correct: false
    explanation: Це імперський міф. Традиції київського державотворення мали продовження
      на українських землях.
  instruction: Визначте, чи твердження правильне.
