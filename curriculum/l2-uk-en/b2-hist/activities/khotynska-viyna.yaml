- type: reading
  id: reading-sobieski
  title: 'Джерело: Щоденник Хотинського походу'
  source: Яків Собеський (1621)
  text: Справжніми переможцями були козаки. Вони витримували такий дощ зі свинцю і
    заліза, під яким не встояла б жодна інша піхота у світі. Яничари йшли на них хвиля
    за хвилею, але козаки стояли, як вросли в землю, зустрічаючи ворога вогнем і сміхом.
  tasks:
  - Як автор описує інтенсивність ворожого обстрілу?
  - Якою була реакція запорожців на атаки яничарів?
- type: essay-response
  title: 'Есе: Роль козацтва у збереженні Європи'
  source_reading: reading-sobieski
  prompt: На основі свідчень Якова Собеського та матеріалів лекції, проаналізуйте
    стратегічне значення козацької піхоти під час Хотинської війни. Чому Осман Другий
    вважав українців своїм головним супротивником, незважаючи на присутність польської
    важкої кінноти?
  min_words: 150
  model_answer: Козацька піхота відіграла ключову роль у зупинці османської навали.
    Завдяки інженерній майстерності (швидке зведення валів) та інноваційній тактиці
    безперервного залпового вогню шеренгами, запорожці змогли нейтралізувати чисельну
    перевагу ворога. Осман Другий спрямував основні удари на їхні позиції, оскільки
    розумів, що без піхоти кавалерія швидко впаде. Визнання цього факту Яковом Собеським,
    який писав про незламність українців під дощем зі свинцю, доводить, що козацтво
    виступило справжнім щитом цивілізації.
  rubric:
  - criteria: Аргументація
    description: Наявність чіткої тези та підтвердження її фактами з тексту.
    points: 5
  - criteria: Історичний контекст
    description: Розуміння тактичних переваг козацького війська.
    points: 5
- type: critical-analysis
  title: 'Аналіз: Злам імперського духу'
  source_reading: reading-sobieski
  target_text: Яничари йшли на них хвиля за хвилею, але козаки стояли, як вросли в
    землю, зустрічаючи ворога вогнем і сміхом.
  questions:
  - Який психологічний вплив мала така поведінка козаків на елітні османські війська?
  - Чому бунт яничарів став переломним моментом усієї кампанії?
  model_answers:
  - Непохитність та сміх козаків під шаленим обстрілом руйнували ауру непереможності
    османської армії, викликаючи ірраціональний жах.
  - Відмова яничарів йти в атаку засвідчила моральний крах ворога, унеможлививши подальший
    наступ велетенської армії султана.
- type: comparative-study
  title: 'Порівняння: Військові стратегії під Хотином'
  items_to_compare:
  - Тактика османської армії
  - Тактика українського козацтва
  criteria:
  - Організація оборонних позицій
  - Психологічний вплив на ворога
  prompt: Порівняйте підходи двох армій до ведення бойових дій. Як інновації Сагайдачного
    дозволили нівелювати кількісну перевагу султана?
  model_answer: Османська армія покладалася на чисельну перевагу, важку артилерію
    та масовані штурми. Натомість козацтво використовувало маневрений табір з возів,
    швидке зведення земляних фортифікацій та безперервний залповий вогонь. Психологічно
    османи намагалися залякати масштабом, тоді як козаки застосовували нічні рейди
    для тотального терору, позбавляючи ворога сну. Це нівелювало перевагу султана.
- type: true-false
  title: 'Перевірка фактів: Хотинська війна'
  items:
  - statement: Перед Хотинською битвою козаки висунули польському королю жорсткі політичні
      та релігійні вимоги.
    correct: true
    explanation: На раді в Сухій Діброві козацтво вимагало визнання православної ієрархії.
  - statement: Яків Собеський у своєму щоденнику стверджував, що головну роль у перемозі
      відіграла польська крилата гусарія.
    correct: false
    explanation: Собеський прямо писав, що справжніми переможцями були козаки.
  - statement: Петро Сагайдачний керував військом, перебуваючи у відмінному фізичному
      стані протягом кампанії.
    correct: false
    explanation: Сагайдачний був важко поранений стрілою і керував військом, переборюючи
      біль.
  - statement: Османська армія під Хотином значно переважала союзні сили за чисельністю.
    correct: true
    explanation: Султан привів до 300 тисяч воїнів проти 76 тисяч союзників.
  - statement: Після перемоги польський уряд повністю виконав усі обіцянки, дані українському
      козацтву.
    correct: false
    explanation: Польська влада зрадила союзників, продовживши утиски православної
      церкви.
  - statement: Козаки використовували тактику безперервного залпового вогню шеренгами.
    correct: true
    explanation: Ця ротаційна тактика дозволяла підтримувати постійний щільний вогонь.
  - statement: Європейські монархи визнавали козаків головними рятівниками християнської
      цивілізації.
    correct: false
    explanation: Європейська пропаганда приписала перемогу польському королю.
  - statement: Смерть Яна Кароля Ходкевича призвела до паніки і відступу союзного
      табору.
    correct: false
    explanation: Завдяки авторитету Сагайдачного паніки вдалося уникнути.
  - statement: Зведення земляних валів козаками відбувалося надзвичайно швидко.
    correct: true
    explanation: Швидкість робіт була безпрецедентною, османи називали козаків кротами.
  - statement: Наслідком поразки для Османської імперії став бунт яничарів і вбивство
      султана.
    correct: true
    explanation: Поразка запустила політичну кризу, яка завершилася вбивством монарха.
  instruction: Визначте, чи твердження правильне.
