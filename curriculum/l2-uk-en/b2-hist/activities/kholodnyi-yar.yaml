- type: reading
  id: reading-gorlis-gorsky
  title: "Первинне джерело: Юрій Горліс-Горський"
  source: "Юрій Горліс-Горський, Холодний Яр"
  text: |
    Нам потрібний не мрійний пав'ячий хвіст, а вовчі зуби. Бо коли ми їх не будемо мати і не примусимо наших приятелів шанувати їх — Україна ніколи не буде щасливою. Коли я впаду, моє тіло, може, з'їдять лисиці... мою кров вип'є рідна земля, щоб виростити з неї траву для коня того, хто стане на моє місце, і нічого під сонцем не зміниться.
  tasks:
    - "Проаналізуйте метафори 'пав'ячий хвіст' та 'вовчі зуби'."
    - "Що автор має на увазі під готовністю стати добривом для рідної землі?"

- type: critical-analysis
  source_reading: reading-gorlis-gorsky
  title: "Аналіз філософії повстанців"
  instruction: "Дайте розгорнуті відповіді на запитання на основі прочитаного фрагмента."
  questions:
    - "Що символізує метафора 'пав'ячий хвіст' у контексті політики УНР?"
    - "Чому Юрій Горліс-Горський наголошує на необхідності мати 'вовчі зуби'?"
    - "Як ви розумієте фаталістичне, але життєствердне ставлення повстанців до власної смерті?"
  model_answers:
    - "Метафора 'пав'ячий хвіст' символізує наївний романтизм, пасивний сентименталізм та віру політиків УНР у можливість домовитися з агресором дипломатичним шляхом."
    - "Метафора 'вовчі зуби' означає мілітаризм, агресивність та здатність до жорсткого збройного захисту своїх інтересів, без яких виживання нації неможливе."
    - "Повстанці сприймали свою загибель як екзистенційну пожертву, усвідомлюючи, що їхня кров живитиме землю для наступних поколінь борців за незалежність."

- type: essay-response
  title: "Спростування колоніальних міфів"
  instruction: "Напишіть есе-відповідь на основі матеріалу уроку."
  prompt: "Чому радянська влада та каральні органи цілеспрямовано називали холодноярських повстанців 'бандитами' та 'куркулями'? Яку роль відігравала ця термінологія у придушенні національно-визвольного руху?"
  min_words: 150
  model_answer: "Використання термінів 'бандити' та 'куркулі' було продуманим колоніальним прийомом більшовиків. По-перше, таврування повстанців як злочинців позбавляло їх статусу військовополонених і дозволяло каральним органам знищувати їх без суду. По-друге, це допомагало маргіналізувати рух, представивши його як локальний кримінальний заколот або суто класову боротьбу багатіїв проти бідняків. Насправді ж Холодний Яр був повномасштабним національно-визвольним рухом із політичною метою відновлення УНР, який мав тотальну підтримку серед різних верств населення, від заможних селян до інтелігенції. Дегуманізація через мову дозволяла радянській пропаганді виправдовувати масовий терор і приховувати факт російської окупації."
  rubric:
    - criteria: "Аргументація"
      description: "Наведено переконливі докази того, що термінологія використовувалася для маргіналізації руху та виправдання репресій."
      points: 40
    - criteria: "Фактологічна точність"
      description: "Правильно вказано реальну соціальну базу повстання та його політичні цілі."
      points: 30
    - criteria: "Мовне оформлення"
      description: "Есе написано публіцистичним стилем, без русизмів, з використанням відповідної лексики."
      points: 30

- type: comparative-study
  title: "Порівняльний аналіз: Холодний Яр та УПА"
  instruction: "Порівняйте два видатні українські національно-визвольні рухи ХХ століття."
  items_to_compare:
    - "Холодноярська Республіка (1919-1922)"
    - "Українська Повстанська Армія (1940-ві роки)"
  criteria:
    - "Головна мета боротьби"
    - "Тактика ведення бойових дій"
    - "Ставлення місцевого населення"
  prompt: "Використовуючи критерії, проаналізуйте тяглість традиції збройного опору в Україні. Які спільні риси об'єднують ці два рухи?"
  model_answer: "Обидва рухи мали спільну головну мету — здобуття та захист незалежної Української держави проти переважаючих сил зовнішніх окупантів. Тактика також була ідентичною: асиметрична партизанська війна, використання лісових масивів, засідки, блискавичні рейди та розгалужене підпілля. Обидва рухи спиралися на тотальну підтримку цивільного населення, яке забезпечувало розвідку, логістику та продовольство. Ця спадкоємність підтверджується тим, що діти холодноярців часто ставали вояками УПА, переймаючи дух та методи боротьби своїх батьків."

