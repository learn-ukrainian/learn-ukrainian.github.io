- type: reading
  id: reading-boplan
  title: 'Свідчення Боплана про козацьку рівність'
  source: 'Гійом Левассер де Боплан, Опис України'
  text: |
    Вони надзвичайно міцні статурою, легко переносять спеку і холод, голод і спрагу, невтомні на війні, мужні, сміливі. Сотня цих козаків під прикриттям табору не побоїться ні тисячі поляків, ні кількох тисяч татар. Вони суворо карають своїх отаманів за помилки, і кожен воїн може відкрито критикувати рішення старшини на раді.
  instruction: 'Уважно прочитайте фрагмент історичного джерела перед виконанням наступних завдань.'

- type: true-false
  title: 'Факти про Запорозьку Січ: правда чи міф?'
  instruction: 'Визначте, чи є кожне твердження правдивим чи хибним на основі матеріалу модуля.'
  items:
    - statement: 'Запорозька Січ розташовувалася на Дикому Полі вище дніпровських порогів.'
      correct: false
      explanation: 'Січ розташовувалася нижче порогів, що захищало її від нападів османських галер.'
    - statement: 'Великий Луг слугував козакам природною фортецею завдяки лабіринтам водних шляхів.'
      correct: true
      explanation: 'Густі плавні були неприступними для великої ворожої кінноти.'
    - statement: 'Офіційна влада Речі Посполитої успішно захищала південні кордони від татарських набігів.'
      correct: false
      explanation: 'Саме неспроможність влади захистити кордони призвела до самоорганізації населення для захисту.'
    - statement: 'До козацтва приєднувалися виключно втікачі-селяни.'
      correct: false
      explanation: 'Серед козаків були також міщани, збідніла шляхта і православні священики.'
    - statement: 'Замок князя Дмитра Вишневецького на Хортиці використовувався тільки для пасивної оборони.'
      correct: false
      explanation: 'Вишневецький перетворив його на стратегічний форпост для наступу на турецькі фортеці.'
    - statement: 'Кошового отамана обирала Козацька рада, і ця посада ніколи не передавалася у спадок.'
      correct: true
      explanation: 'Абсолютно всі керівні посади на Січі були виборними.'
    - statement: 'Під час морських походів на чайках вживання алкоголю каралося викиданням за борт без суду.'
      correct: true
      explanation: 'Дисципліна під час воєнних кампаній була надзвичайно суворою.'
    - statement: 'Козацькі літописи писали виключно польські та іноземні автори.'
      correct: false
      explanation: 'Авторами літописів були освічені українці (Самійло Величко, Григорій Грабянка), які працювали у військовій канцелярії.'
    - statement: 'У козацькому суді колишні князі та шляхта мали привілеї перед простими козаками.'
      correct: false
      explanation: 'Однією з головних рис козацького суду була абсолютна рівність усіх перед законом.'
    - statement: 'Запорозькі козаки були елітними найманцями, які активно брали участь у Тридцятилітній війні в Європі.'
      correct: true
      explanation: 'Козаків часто наймали європейські монархи через їхню високу бойову майстерність та мобільність.'

- type: essay-response
  source_reading: reading-boplan
  title: 'Козацька республіка як прототип української державності'
  instruction: 'Напишіть есе, спираючись на текст Боплана та історичний матеріал модуля.'
  prompt: 'Проаналізуйте демократичний устрій Запорозької Січі. Які саме риси робили її республікою в епоху абсолютних монархій? Наведіть конкретні приклади політичного та судового устрою.'
  min_words: 150
  model_answer: |
    Запорозька Січ мала всі фундаментальні ознаки республіки: пряму демократію, загальну виборність влади та суворе верховенство закону. Вищим органом державного управління була загальна Козацька рада, де кожен воїн, незалежно від соціального походження чи багатства, мав рівне право голосу. Усі керівні посади, від кошового отамана до дрібних чинів, обиралися громадою і категорично не передавалися у спадок. Важливим аспектом була абсолютна підзвітність влади: кошовий отаман щорічно звітував перед радою, і його могли легко усунути від керівництва або навіть засудити до страти за серйозні зловживання. Крім того, козацьке судочинство гарантувало рівність усіх перед законом, не роблячи винятків для шляхти чи визначних полководців. Цей політичний устрій разюче контрастував з абсолютними монархіями тогочасної Європи, роблячи Січ унікальним демократичним утворенням, де влада належала народу. Така система забезпечувала високий рівень мотивації, оскільки кожен козак відчував особисту відповідальність за долю своєї спільноти, що і стало прототипом сучасної української державності.
  rubric:
    - criteria: 'Аргументація та аналіз'
      description: 'Глибина розкриття демократичних рис Січі з використанням конкретних фактів.'
      points: 40
    - criteria: 'Використання джерел'
      description: 'Опора на текст Боплана та загальний історичний наратив модуля.'
      points: 30
    - criteria: 'Логіка та структура'
      description: 'Чіткість викладу, послідовність думок та правильне використання історичної термінології.'
      points: 30

- type: comparative-study
  title: 'Січ vs Сусідні імперії'
  instruction: 'Порівняйте політичний устрій Запорозької Січі з сусідніми монархіями.'
  items_to_compare:
    - 'Запорозька Січ'
    - 'Московське царство та Османська імперія'
  criteria:
    - 'Джерело легітимності влади'
    - 'Статус звичайної людини (громадянин чи підданий)'
    - 'Передача та контроль владних повноважень'
  prompt: 'Опишіть фундаментальні відмінності між козацькою демократією та абсолютними монархіями Східної Європи, використовуючи запропоновані критерії.'
  model_answer: |
    Джерелом влади на Запорозькій Січі був безпосередньо народ (через Козацьку раду), тоді як в імперіях влада вважалася даною від Бога монарху. Козак був вільним громадянином з правом голосу та можливістю критикувати старшину, тоді як жителі імперій були безправними підданими царя чи султана. Влада на Січі була виборною і повністю підзвітною громаді, а в монархіях передавалася у спадок без жодної можливості контролю з боку народу.

- type: critical-analysis
  title: 'Аналіз козацьких клейнодів'
  instruction: 'Дайте розгорнуті відповіді на питання щодо значення козацьких символів влади.'
  target_text: 'Козацькі клейноди: булава, печатка, корогва, литаври та бунчук.'
  questions:
    - 'Чому влада на Січі потребувала видимих символів (клейнодів)?'
    - 'Що означало повернення клейнодів на раді при втраті посади?'
    - 'Як сакралізація символів допомагала згуртувати козацьке військо?'
  model_answers:
    - 'Оскільки влада не давалася від Бога і не була спадковою, клейноди були потрібні як чітке візуальне підтвердження легітимності, довіри та делегованих повноважень від громади.'
    - 'Повернення символів означало, що влада належить не конкретній особі, а всьому народу, і колишній отаман негайно ставав звичайним рівним козаком без привілеїв.'
    - 'Сакралізація символів (зберігання у церкві, захист у бою ціною життя) створювала непорушну спільну святиню, яка об''єднувала козаків та нагадувала про їхню суверенну республіку незалежно від їхніх внутрішніх суперечок.'
  focus_points:
    - 'Легітимність республіканської влади'
    - 'Підзвітність посадовців громаді'
    - 'Сакралізація державного суверенітету'