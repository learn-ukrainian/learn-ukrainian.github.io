- type: reading
  id: reading-statute-1588
  title: "Первинне джерело: Третій Литовський статут"
  source: "Третій Литовський статут (1588 рік)"
  text: |
    Кожен селянин, який постійно прожив на приватній землі пана більше десяти років, автоматично стає його повною, невід'ємною власністю. Якщо селянин втече, пан має право розшукувати його і повертати разом із дітьми та майном. Той, хто переховує збіглого селянина, зобов'язаний сплатити великий штраф.
  tasks:
    - "Прочитайте уривок зі статуту."
    - "Зверніть увагу на юридичне закріплення статусу селянина."

- type: critical-analysis
  title: "Аналіз причинно-наслідкових зв'язків"
  source_reading: reading-statute-1588
  instruction: "Дайте розгорнуті відповіді на запитання щодо економічних та соціальних процесів Речі Посполитої."
  questions:
    - "Яким чином економічний розвиток Західної Європи вплинув на погіршення становища українських селян?"
    - "Чому українські міщани створювали церковні братства, і яку роль відігравали ці організації?"
    - "Як соціальна ізоляція православного населення стала каталізатором Національно-визвольної війни?"
  model_answers:
    - "Зростання попиту на зерно в Європі спонукало шляхту створювати фільварки, що вимагало безкоштовної робочої сили і призвело до збільшення панщини."
    - "Братства створювалися для захисту прав православних від дискримінації, фінансування шкіл та друкарень, а також для збереження національної ідентичності."
    - "Блокування соціальних ліфтів для некатоликів та жорстока експлуатація перетворили соціальний і релігійний гніт на вибухонебезпечну суміш, що призвела до повстання."

- type: critical-analysis
  title: "Критична оцінка історичних тверджень"
  instruction: "Проаналізуйте наведені твердження та розвінчайте популярні історичні міфи."
  questions:
    - "Чому концепція шляхетської демократії є суперечливою при оцінці всього суспільства Речі Посполитої?"
    - "Як ідеологія Сарматизму виправдовувала соціальну нерівність?"
    - "Чому термін Kresy Wschodnie вважається проявом імперської оптики?"
    - "У чому полягала трагедія подвійної ідентичності української еліти (роду руського, нації польської)?"
    - "Якими були наслідки полонізації української аристократії для простого народу?"
  model_answers:
    - "Ця демократія існувала лише для десяти відсотків населення, тоді як інші дев'яносто відсотків були повністю позбавлені політичних прав і піддавалися експлуатації."
    - "Сарматизм стверджував, що шляхта походить від стародавніх лицарів, а селяни — від підкорених племен, що нібито робило їх від природи приреченими на рабство."
    - "Цей термін розглядає українські етнічні землі як далеку провінцію Польщі, ігноруючи їхню власну давню історію та державницькі традиції."
    - "З часом збереження руської (української) ідентичності стало несумісним із політичною кар'єрою, що змусило еліту обирати між вірою предків та владою."
    - "Втративши свою природну еліту, яка перейшла в католицтво, українське суспільство залишилося соціально беззахисним і маргіналізованим."

- type: essay-response
  title: "Есе: Ціна золотого віку"
  source_reading: reading-statute-1588
  instruction: "Напишіть есе-роздум на основі вивченого матеріалу."
  prompt: "У польській історіографії Річ Посполиту часто називають державою золотого віку та прихистком свободи. Спираючись на текст статуту та знання про становище селян і міщан, аргументовано спростуйте або підтвердьте цю тезу з позиції українського деколонізаційного погляду."
  min_words: 150
  model_answer: "Хоча Річ Посполита справді надавала безпрецедентні свободи шляхті, для більшості українського населення цей період був часом глибокого соціального, національного та релігійного гніту. Золотий вік палаців і європейської освіти оплачувався рабською працею кріпаків на фільварках, де панщина сягала шести днів на тиждень. Юридичні документи, як-от Третій Литовський статут, закріплювали статус селянина як безправної власності пана, який мав над ним право життя і смерті. Водночас православні міщани зазнавали дискримінації через норми магдебурзького права, що контролювалося католицьким патриціатом. Отже, свобода Речі Посполитої була ексклюзивним привілеєм меншості, збудованим на тотальному безправ'ї українського народу, що робить міф про золотий вік абсолютно фальшивим з нашої історичної перспективи."
  rubric:
    - criteria: "Аргументація"
      description: "Здатність логічно та переконливо обґрунтувати свою позицію."
      points: 40
    - criteria: "Використання фактів"
      description: "Наявність конкретних історичних прикладів (панщина, статути, магдебурзьке право)."
      points: 40
    - criteria: "Мовне оформлення"
      description: "Грамотність, багатство словникового запасу та дотримання стилю."
      points: 20

- type: true-false
  title: "Правда чи вигадка: Соціальна структура"
  instruction: "Визначте, які з наведених тверджень відповідають історичним фактам."
  items:
    - statement: "Річ Посполита була демократичною державою, де всі верстви населення мали право обирати короля."
      correct: false
      explanation: "Виборче право та політична влада належали виключно шляхті."
    - statement: "Третій Литовський статут 1588 року юридично скасував залишки свободи селян і закріпив кріпацтво."
      correct: true
      explanation: "Цей статут заборонив вільний перехід селян і зробив їх власністю пана."
    - statement: "Православні міщани у Львові та Києві мали абсолютно рівні права з католиками завдяки магдебурзькому праву."
      correct: false
      explanation: "Православні зазнавали дискримінації, не могли вступати до цехів і жили в спеціальних кварталах."
    - statement: "Створення фільварків було зумовлене високим попитом на зерно в країнах Західної Європи."
      correct: true
      explanation: "Щоб максимізувати прибуток від експорту хліба, шляхта збільшувала площі посівів та панщину."
    - statement: "Українська шляхта ніколи не переходила в католицтво і завжди захищала інтереси православних селян."
      correct: false
      explanation: "Більшість могутніх руських родів поступово полонізувалася та прийняла католицизм заради кар'єри."
    - statement: "Ідеологія Сарматизму стверджувала, що селяни є нащадками слабких підкорених племен."
      correct: true
      explanation: "Сарматизм використовувався для виправдання соціальної прірви між шляхтою та посполитими."
    - statement: "Українські жінки-кріпачки були звільнені від важкої праці на панському полі."
      correct: false
      explanation: "Жінки працювали на панщині нарівні з чоловіками, а потім ще й вели власне господарство."
    - statement: "Козацтво виникло як альтернативне суспільство для тих, кому не знайшлося місця в Речі Посполитій."
      correct: true
      explanation: "На Січ тікали селяни, дрібні бояри та міщани, створюючи егалітарну військову організацію."
    - statement: "Церковні братства займалися виключно ремонтом храмів і не впливали на освіту."
      correct: false
      explanation: "Братства відкривали школи європейського рівня та друкарні для захисту української культури."
    - statement: "Збільшення панщини призвело до стрімкого технологічного розвитку українського сільського господарства."
      correct: false
      explanation: "Наявність безкоштовної рабської сили позбавила панів стимулу інвестувати в нові технології."