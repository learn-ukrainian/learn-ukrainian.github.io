- type: reading
  id: reading-liubech
  title: "Первинне джерело: Літопис про Любецький з'їзд"
  source: "Повість минулих літ (1097 рік)"
  text: |
    Пощо ми губимо Руськую землю, самі проти себе зваду маючи? А половці землю нашу розносять і раді є, що межи нами війна донині. Відтепер з’єднаймося в одне серце і обережімо Руськую землю.
  instruction: "Прочитайте уривок з літопису для подальшого аналізу."

- type: critical-analysis
  source_reading: reading-liubech
  title: "Аналіз політичної декларації Любецького з'їзду"
  target_text: "Літописна розповідь про Любецький з'їзд 1097 року"
  instruction: "Проаналізуйте наведений уривок з літопису, звертаючи увагу на політичну риторику та мотивацію князів."
  questions:
    - "Чому князі використовують термін 'звада' для опису своїх дій?"
    - "Як метафора 'з'єднаймося в одне серце' контрастує з подальшими історичними подіями?"
    - "Чи свідчить використання терміна 'Руськая земля' про формування концепції загальнодержавних інтересів?"
  model_answers:
    - "Термін 'звада' вказує на внутрішні чвари та дріб'язкові конфлікти, підкреслюючи безглуздість братовбивчої війни, яка руйнує державу зсередини."
    - "Ця метафора апелює до християнської моралі та братерства, але вона жорстко контрастує з реаліями політики — одразу після з'їзду клятва була порушена осліпленням князя Василька Теребовлянського."
    - "Так, використання цього терміна свідчить про глибоке розуміння спільного інтересу та відповідальності, які стоять вище за особисті амбіції чи локальні потреби окремих правителів."
  focus_points:
    - "Середньовічна політична риторика"
    - "Співвідношення урочистих декларацій та реальної політики"
    - "Еволюція концепту загальнодержавних інтересів"

- type: comparative-study
  source_reading: reading-liubech
  title: "Порівняльний аналіз: Від моноліту до конфедерації"
  instruction: "Порівняйте дві епохи в історії Русі-України за вказаними критеріями."
  items_to_compare:
    - "Київська держава до 1054 року (за Ярослава Мудрого)"
    - "Київська держава після Любецького з'їзду (початок XII століття)"
  criteria:
    - "Характер центральної влади (суверен чи сюзерен)"
    - "Принцип престолонаслідування"
    - "Роль місцевої еліти та боярства"
    - "Економічна самодостатність регіонів"
  prompt: "На основі матеріалів модуля порівняйте політичний та економічний устрій Київської держави у ці два періоди. Доведіть, що роздроблення було об'єктивним етапом розвитку, а не катастрофою."
  model_answer: "До 1054 року влада київського князя була суверенною та абсолютною; він жорстко контролював податки і політику. Після Любецького з'їзду київський князь стає лише сюзереном ('першим серед рівних'), а Русь перетворюється на федерацію. Замість нестабільного лествичного права встановлюється спадкове володіння (отчина). Місцева еліта та боярство набувають вирішального впливу в регіонах, які стають економічно самодостатніми. Ці фундаментальні зміни свідчать про те, що політична децентралізація була закономірним наслідком економічного зростання та урбанізації, а не просто хаотичним занепадом держави."

- type: essay-response
  title: "Есе: Історична закономірність чи політична катастрофа?"
  instruction: "Напишіть розгорнуту відповідь, аргументуючи свою позицію історичними фактами."
  prompt: "Напишіть аналітичне есе на тему: Чи була політична децентралізація Київської держави неминучим наслідком її економічного та соціального розвитку? У своїй відповіді проаналізуйте економічні передумови (зростання міст, роль боярства) та інституційні недоліки (лествичне право). Обов'язково згадайте європейський контекст та спростуйте міф про занепад."
  min_words: 200
  model_answer: "Політична децентралізація Русі-України була не випадковим крахом унітарної держави, а цілком закономірним наслідком її довготривалого економічного успіху. З розвитком сільського господарства, торгівлі та ремесел регіональні центри, такі як Чернігів чи Галич, накопичили достатньо ресурсів, щоб стати самостійними могутніми мегаполісами. Їм більше не була потрібна жорстка політична та фінансова опіка Києва. Місцеве боярство, прагнучи захистити власні спадкові вотчини, природно підтримувало своїх регіональних князів у їхньому прагненні до незалежності. Додатковим і дуже потужним каталізатором політичного розпаду стала криза лествичного права — архаїчна система постійної ротації князів між містами генерувала безперервні конфлікти, що зрештою і було офіційно визнано на Любецькому з'їзді. Перетворення Русі на своєрідну конфедерацію цілком відповідало загальноєвропейським трендам того часу, таким як феодальна роздробленість у Франції чи Священній Римській імперії. Отже, це був абсолютно нормальний етап розвитку великої, багатої та складної суспільної системи, який стимулював культурний розквіт регіонів, а не призвів до тотального занепаду."
  rubric:
    - criteria: "Аргументація та історичний аналіз"
      description: "Глибина розкриття економічних та політичних причин децентралізації."
      points: 10
    - criteria: "Європейський та деколонізаційний контекст"
      description: "Успішне порівняння процесів на Русі з європейським феодалізмом та спростування імперських міфів."
      points: 5
    - criteria: "Використання термінології"
      description: "Доречне та точне використання таких термінів, як лествичне право, отчина, сюзеренітет."
      points: 5

- type: true-false
  title: "Аналіз історичних тверджень"
  instruction: "Визначте, чи є наведені твердження правдивими чи хибними, опираючись на деколонізаційний погляд та історичні факти."
  items:
    - statement: "Київський князь у дванадцятому столітті залишався абсолютним суверенним монархом для всіх руських земель."
      correct: false
      explanation: "Київський князь перетворився на сюзерена — 'першого серед рівних', а реальна влада на місцях належала місцевим удільним князям."
    - statement: "Любецький з'їзд офіційно скасував лествичне право на користь спадкового володіння землею."
      correct: true
      explanation: "Князі проголосили принцип 'Кожен хай держить отчину свою', що означало легалізацію спадкового володіння (отчини)."
    - statement: "Політична децентралізація Русі супроводжувалася тотальним занепадом економіки та культури у провінціях."
      correct: false
      explanation: "Насправді цей період став епохою бурхливого економічного зростання регіональних центрів та розквіту мистецтв і ремесел."
    - statement: "Поразка князів на Альті (1068 рік) стала першим випадком, коли кияни вигнали правителя за нездатність захистити місто від ворогів."
      correct: true
      explanation: "Після поразки від половців кияни повстали та вигнали князя Ізяслава, довівши, що легітимність князя залежить від його здатності гарантувати безпеку."
    - statement: "Володимир Мономах своїм законодавством захистив закупів від перетворення на вічних рабів через непосильні борги."
      correct: true
      explanation: "У своєму 'Уставі' він різко обмежив відсотки за позиками (різи) і заборонив кредиторам безкарно продавати закупів у рабство."
    - statement: "Усі учасники Любецького з'їзду свято та неухильно дотримувалися клятви єдності протягом наступних десятиліть."
      correct: false
      explanation: "Одразу після урочистого завершення з'їзду відбулося підступне порушення клятви — осліплення князя Василька Теребовлянського."
    - statement: "За часів децентралізації такі міста, як Чернігів та Галич, перетворилися на могутні самодостатні регіональні столиці."
      correct: true
      explanation: "Економічне зростання дозволило цим центрам успішно конкурувати навіть із Києвом за політичний і культурний вплив."
    - statement: "Нестор Літописець у 'Повісті минулих літ' обґрунтовував та вітав ідею остаточного політичного розділення руських земель."
      correct: false
      explanation: "Навпаки, Нестор став головним ідеологом духовної та історичної єдності Русі, виступаючи категорично проти братовбивчих воєн."
    - statement: "Православна Церква була практично єдиною дієвою інституцією, що зберігала єдність усього простору Русі-України."
      correct: true
      explanation: "Київська митрополія духовно охоплювала всі розрізнені князівства і забезпечувала спільний культурно-релігійний простір."
    - statement: "Московське князівство у своєму розвитку повністю зберегло політичну культуру конфедеративної моделі Русі-України."
      correct: false
      explanation: "Справжнім спадкоємцем традицій стало Королівство Русь (Галицько-Волинська держава), тоді як Москва сформувала цілком іншу, авторитарну культуру."