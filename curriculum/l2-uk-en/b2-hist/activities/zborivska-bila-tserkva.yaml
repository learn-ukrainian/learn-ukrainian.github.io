- type: reading
  id: reading-preambles
  title: 'Джерело: Преамбули угод'
  source: Історичний аналіз документів
  text: Зборівський договір починається словами про "Декларацію ласки Його Королівської
    Милості на пункти прохання Війська Запорозького". У цьому формулюванні відчувається
    позиція сили - король змушений виявити ласку у відповідь на вимоги переможців.
    Натомість Білоцерківський договір має кардинально іншу тональність. Його преамбула
    підкреслює "покірне підданство" Війська Запорозького та його провину перед республікою,
    благаючи про помилування.
  tasks:
  - Яким чином зміна риторики у преамбулах відображає зміну військово-політичної ситуації?
  - Про що свідчить використання терміна "покірне підданство" у тексті Білоцерківської
    угоди?
- type: essay-response
  title: 'Есе: Еволюція козацької автономії'
  source_reading: reading-preambles
  prompt: Проаналізуйте, як змінилася мета Богдана Хмельницького від початку повстання
    до підписання Зборівської угоди. Як ці зміни відобразилися у формулюваннях дипломатичних
    документів?
  min_words: 150
  model_answer: Богдан Хмельницький починав повстання з метою захисту станових прав
    козацтва, але військові успіхи призвели до еволюції мети. Замість покірного прохача,
    він став лідером, який прагнув вибити народ з неволі. Це призвело до вимог територіальної
    автономії, власної адміністрації та великого реєстру, що було закріплено у Зборівській
    угоді.
  rubric:
  - criteria: Аналіз еволюції мети
    description: Чітко простежено перехід від станових вимог до державницьких ідей.
    points: 5
  - criteria: Використання термінології
    description: Доречне використання понять автономія, суверенітет, легітимність.
    points: 5
- type: critical-analysis
  title: 'Аналіз: Спростування міфів про угоди'
  source_reading: reading-preambles
  target_text: Відступ хана під Берестечком — це глибоко прагматичний крок. Поява
    сильної, незалежної України не входила в плани Криму.
  questions:
  - Чому традиційний наратив називає дії кримського хана зрадою?
  - Які справжні геополітичні інтереси переслідувало Кримське ханство?
  - Як цей гіркий компроміс вплинув на подальшу стратегію Хмельницького?
  - Чому Білоцерківську угоду не можна вважати повною капітуляцією?
  model_answers:
  - Традиційний наратив розглядає події емоційно, оцінюючи відступ як зраду союзника.
  - Кримське ханство прагнуло зберегти баланс сил, не допускаючи надмірного посилення
    ані Речі Посполитої, ані Гетьманщини.
  - Гіркий компроміс дав Хмельницькому час на відновлення армії для майбутнього реваншу.
  - Угода зберегла інституційне ядро козацької держави, що дозволило продовжити боротьбу.
- type: comparative-study
  title: 'Порівняння: Зборівська та Білоцерківська угоди'
  source_reading: reading-preambles
  items_to_compare:
  - Зборівський договір (1649)
  - Білоцерківський договір (1651)
  criteria:
  - Розмір козацького реєстру
  - Територія під контролем козацької адміністрації
  - Право на ведення зовнішньої політики
  model_answer: За Зборівським договором реєстр становив 40 тисяч козаків, а територія
    охоплювала Київське, Брацлавське та Чернігівське воєводства. Гетьман мав певну
    свободу дій. Білоцерківський договір скоротив реєстр до 20 тисяч, обмежив територію
    лише Київським воєводством і категорично заборонив дипломатичні зносини.
- type: true-false
  title: Факти та міфи про козацьку дипломатію
  items:
  - statement: Зборівський договір передбачав створення козацького реєстру у 40 тисяч
      осіб.
    correct: true
    explanation: Так, Зборівська угода 1649 року зафіксувала реєстр на рівні 40 000
      козаків.
  - statement: За Білоцерківською угодою під контролем гетьмана залишилися Брацлавське
      та Чернігівське воєводства.
    correct: false
    explanation: Ні, ці території були повернуті під управління польської адміністрації,
      козакам залишилося лише Київське воєводство.
  - statement: Зборівський договір гарантував місце в Сенаті Речі Посполитої для Київського
      митрополита.
    correct: true
    explanation: Угода юридично урівнювала православного ієрарха з католицькими єпископами.
  - statement: Кримський хан Іслам-Гірей підтримував створення повністю незалежної
      Української держави.
    correct: false
    explanation: Ні, політика Бахчисарая полягала у підтриманні балансу сил між Польщею
      та Україною.
  - statement: Білоцерківський договір офіційно дозволяв Хмельницькому продовжувати
      союз із татарами.
    correct: false
    explanation: Договір категорично забороняв дипломатичні контакти з іноземними
      правителями, особливо з Кримом.
  - statement: Після Зборівської угоди єзуїтським колегіумам було дозволено вільно
      діяти в Києві.
    correct: false
    explanation: Договір прямо забороняв діяльність єзуїтських колегіумів на підконтрольних
      козакам територіях.
  - statement: Коронному війську було заборонено перебувати на територіях, визначених
      Зборівським договором.
    correct: true
    explanation: Це унеможливлювало силовий тиск з боку Варшави.
  - statement: Гадяцька унія 1658 року значною мірою спиралася на концептуальну базу
      Зборівського договору.
    correct: true
    explanation: Ідеї автономної адміністрації та гарантій для церкви отримали логічне
      розширення в Гадячі.
  - statement: Білоцерківський договір сприймався українським суспільством як справедливий
      мир.
    correct: false
    explanation: Умови миру спричинили хвилю обурення та відкритого спротиву серед
      виключених з реєстру козаків.
  - statement: Перемога під Берестечком змусила польського короля підписати Зборівський
      договір.
    correct: false
    explanation: Зборівський договір був підписаний після Зборівської битви 1649 року,
      а Берестечко 1651 року призвело до Білоцерківського договору.
  instruction: Визначте, чи твердження правильне.
