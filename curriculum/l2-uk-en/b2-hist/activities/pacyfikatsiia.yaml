- type: reading
  id: reading-pacyfikatsiia-svidchennia
  title: 'Первинне джерело: Свідчення Зофії Микитів'
  source: 'З протоколу свідчень, 1930 рік'
  text: |
    Поліція ввірвалася до нашої хати на світанку. Вони одразу почали кричати і перевертати все догори дном. Коли мій чоловік запитав, що вони шукають, один з поліціянтів вдарив його прикладом. Потім вони звернулися до мене. Один кричав: Чому, курво, не говориш польською? Вже 10 років Польща, був час навчитися!!! Після цього вони витягли чоловіка надвір і били його на очах у всього села. Вони також розбили нашу піч і розрізали мішки з борошном, змішавши його з піском.

- type: critical-analysis
  title: 'Критичний аналіз: Мета та методи пацифікації'
  instruction: 'Проаналізуйте наведене джерело та дайте відповіді на запитання, спираючись на текст.'
  source_reading: reading-pacyfikatsiia-svidchennia
  target_text: |
    Чому, курво, не говориш польською? Вже 10 років Польща, був час навчитися!!!
  questions:
    - 'Які методи психологічного та фізичного тиску описані у свідченні?'
    - 'Чому поліціянт акцентував увагу на мові, якою розмовляла жінка?'
    - 'Якою була справжня мета нищення майна (печі, продуктів) під час так званих ревізій?'
  model_answers:
    - 'Карателі використовували побиття на очах у села та знищення майна, щоб залякати населення.'
    - 'Мова розглядалася як маркер ворожості; поліціянт демонстрував відвертий мовний шовінізм та колоніальне ставлення.'
    - 'Нищення печі та продуктів не мало нічого спільного з пошуком зброї, це був спосіб підірвати економічну базу виживання родини.'

- type: true-false
  title: 'Правда чи вигадка: Факти про пацифікацію'
  instruction: 'Визначте, чи є наведені твердження правдивими, чи хибними.'
  items:
    - statement: 'Термін пацифікація буквально перекладається як умиротворення.'
      correct: true
      explanation: 'Так, це слово походить від латинського pacificatio, що означає наведення миру.'
    - statement: 'Каральна акція охопила лише територію Львівського воєводства.'
      correct: false
      explanation: 'Пацифікація відбувалася у трьох воєводствах: Львівському, Станіславівському та Тернопільському.'
    - statement: 'Ініціатором проведення масових репресій став особисто Юзеф Пілсудський.'
      correct: true
      explanation: 'Пілсудський віддав наказ про початок акції у серпні 1930 року.'
    - statement: 'Саботажні акції ОУН були спрямовані переважно проти польських військових баз.'
      correct: false
      explanation: 'Основними цілями саботажу були маєтки польських колоністів та інфраструктура зв''язку.'
    - statement: 'Під час ревізій поліція масово руйнувала читальні товариства Просвіта.'
      correct: true
      explanation: 'Поліція свідомо нищила українські культурні інституції та їхнє майно.'
    - statement: 'Британська газета Manchester Guardian повністю підтримала дії польського уряду.'
      correct: false
      explanation: 'Журналісти цієї газети опублікували викривальні репортажі про жорстокість польської влади.'
    - statement: 'Принцип колективної відповідальності означав покарання всього села за дії кількох осіб.'
      correct: true
      explanation: 'Влада карала всю українську громаду за дії підпільників ОУН.'
    - statement: 'Пацифікація призвела до цілковитого примирення польського та українського народів.'
      correct: false
      explanation: 'Навпаки, акція спричинила глибоку радикалізацію українського суспільства.'
    - statement: 'Українські кооперативи не постраждали під час каральних експедицій.'
      correct: false
      explanation: 'Кооперативи зазнали жахливих погромів, оскільки були основою економічної самостійності українців.'
    - statement: 'Символічне насильство включало нищення портретів Тараса Шевченка та українських прапорів.'
      correct: true
      explanation: 'Карателі цілеспрямовано знищували національні символи, щоб принизити гідність українців.'

- type: comparative-study
  title: 'Порівняльне дослідження: Два наративи'
  instruction: 'Порівняйте офіційний польський наратив щодо подій 1930 року з українським поглядом.'
  source_reading: reading-pacyfikatsiia-svidchennia
  items_to_compare:
    - 'Офіційний польський наратив'
    - 'Український деколонізаційний погляд'
  criteria:
    - 'Трактування мети акції'
    - 'Опис дій поліції'
    - 'Оцінка наслідків'
  model_answer: |
    Польський наратив виправдовував дії як боротьбу з бандитизмом та законне вилучення зброї, тоді як український розглядає їх як акт державного терору та етнічної чистки. Поліція описувалася або як правоохоронці, або як карателі.

- type: essay-response
  title: 'Есе: Наслідки державного терору'
  instruction: 'Напишіть коротке есе про те, як пацифікація 1930 року вплинула на розвиток українського визвольного руху. Поясніть механізм радикалізації суспільства.'
  source_reading: reading-pacyfikatsiia-svidchennia
  rubric:
    - criteria: 'Аналіз причин'
      description: 'Чітко пояснено механізм радикалізації суспільства.'
      points: 40
    - criteria: 'Аргументація та приклади'
      description: 'Наведено конкретні приклади впливу пацифікації на ОУН та УНДО.'
      points: 40
    - criteria: 'Історична тяглість'
      description: 'Згадано довгострокові наслідки для українсько-польських відносин.'
      points: 20
  min_words: 150
  model_answer: |
    Пацифікація 1930 року замість очікуваного умиротворення призвела до безпрецедентної радикалізації українського суспільства. Жорстокість польської поліції, принцип колективної відповідальності та знущання над національними символами наочно продемонстрували молоді, що легальні методи боротьби не працюють. Це спричинило крах довіри до поміркованих партій на кшталт УНДО. Водночас популярність ОУН стрімко зросла, адже молодь повірила, що лише збройний опір здатний захистити націю від окупаційного терору. Таким чином, насильство держави породило ескалацію у відповідь, проклавши шлях до ще кривавіших конфліктів у майбутньому.