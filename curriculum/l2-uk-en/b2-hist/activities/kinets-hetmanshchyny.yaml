- type: reading
  id: reading-destruction-sich
  title: 'Первинне джерело: Знищення Запорозької Січі'
  source: Текст уроку
  instruction: Прочитайте уривок і підготуйтеся до аналізу імперської політики.
  text: 'Після блискучого, переможного завершення російсько-турецької війни (1768–1774
    років), у якій українські запорозькі козаки брали найактивнішу участь і масово
    проливали свою гарячу кров за геополітичні інтереси чужої імперії, Росія раптом
    зрозуміла, що більше не потребує військової допомоги запорожців. У серпні 1775
    року Катерина Друга видала Маніфест, у якому прямо наказала "на вічні часи знищити"
    саму згадку і назву запорозьких козаків. Цей страшний, відвертий абзац є найкращим
    доказом того, що реальною метою Петербурга була не мирна інтеграція, а виключно
    стирання української нації з обличчя землі та крадіжка її багатої історії.

    '
  tasks:
  - Які події передували виданню Маніфесту про знищення Січі?
  - Яка була головна ідеологічна мета російського уряду згідно з текстом Маніфесту?
- type: true-false
  title: 'Перевірка розуміння фактів: Кінець Гетьманщини'
  instruction: Визначте, чи є наступні твердження правильними.
  items:
  - statement: Кирило Розумовський намагався перетворити Гетьманщину на повноцінну
      європейську державу.
    correct: true
    explanation: Гетьман ініціював комплексну судову реформу та розробив амбітний
      план створення Батуринського університету.
  - statement: Катерина Друга завжди підтримувала ідею української автономії та волі
      селян.
    correct: false
    explanation: Незважаючи на заяви про ідеали Просвітництва, імператриця проводила
      жорстку політику централізації та запровадила кріпацтво.
  - statement: Глухівська рада 1764 року була успішною спробою остаточно легалізувати
      гетьманську владу.
    correct: false
    explanation: Після ради Катерина Друга змусила Розумовського зректися посади під
      загрозою жорстокого суду за державну зраду.
  - statement: Друга Малоросійська колегія мала на стратегічну мету повну асиміляцію
      українського народу.
    correct: true
    explanation: Генерал-губернатор Петро Румянцев отримав таємну інструкцію від імператриці
      з прямою вимогою 'зробити з них росіян'.
  - statement: Румянцевський опис був проведений для того, щоб економічно покращити
      умови життя місцевого населення.
    correct: false
    explanation: Масштабний опис був ретельною підготовкою до впровадження тотального
      загальноімперського оподаткування.
  - statement: Автономні слобідські козацькі полки були ліквідовані та перетворені
      на російські гусарські частини.
    correct: true
    explanation: У 1765 році російський уряд скасував автономні полки і миттєво створив
      Слобідсько-Українську губернію.
  - statement: Запорозькі козаки вчинили тривалий збройний опір російським військам
      у червні 1775 року.
    correct: false
    explanation: Щоб уникнути масового знищення цивільного населення, що жило навколо
      фортеці, козаки здалися без бою.
  - statement: Термін 'Новоросія' був штучно створений для того, щоб стерти пам'ять
      про українське козацьке минуле.
    correct: true
    explanation: Це був класичний пропагандистський конструкт для легітимізації окупації
      та колонізації українського Півдня.
  - statement: Указ 1783 року надав українським селянам нові правові гарантії та економічну
      підтримку.
    correct: false
    explanation: Сумнозвісний указ остаточно закріпачив мільйони вільних селян, зробивши
      їх приватною власністю поміщиків.
  - statement: Значна частина козацької еліти добровільно відмовилася від політичних
      амбіцій в обмін на російське дворянство.
    correct: true
    explanation: Російська імперія просто купила лояльність старшини, щедро роздавши
      їм дворянські права та землі з кріпаками.
- type: essay-response
  source_reading: reading-destruction-sich
  title: Деколонізація імперського наративу
  instruction: Напишіть коротке аналітичне есе на основі прочитаного тексту та матеріалу
    історичного уроку.
  prompt: Поясніть, чому політика Катерини Другої щодо України є яскравим прикладом
    класичного європейського колоніалізму, а не 'мирним возз'єднанням'. Наведіть щонайменше
    три історичні аргументи.
  min_words: 150
  model_answer: 'Політика Російської імперії щодо українських земель мала всі ключові
    ознаки жорстокого колоніалізму. По-перше, ліквідація Гетьманщини та військове
    знищення Запорозької Січі у 1775 році супроводжувалися відвертим збройним грабунком
    ресурсів. Росія просто привласнила собі родючі землі Півдня, роздавши їх лояльним
    генералам та іноземцям. По-друге, створення штучного конструкту ''Новоросія''
    та масове перейменування давніх козацьких міст було актом свідомого лінгвоциду
    та топонімічної війни, мета якої — повністю стерти історичну пам''ять нації. По-третє,
    імперія цілеспрямовано розколола українське суспільство: вона хитро підкупила
    козацьку еліту дворянськими привілеями, одночасно перетворивши мільйони вільних
    людей на рабів через ганебний указ про закріпачення 1783 року. Всі ці факти беззаперечно
    свідчать про масштабну анексію, етноцид і колоніальну експлуатацію.'
  rubric:
  - criteria: Аргументація та аналіз
    description: Чітко наведено три переконливі аргументи на користь колоніального
      характеру політики Росії.
    points: 5
  - criteria: Історична точність
    description: Наведено конкретні задокументовані факти (ліквідація Січі, топонімічна
      війна, указ 1783 року).
    points: 3
  - criteria: Стилістика та деколонізаційна термінологія
    description: Використано науково-публіцистичний стиль та правильні терміни (анексія,
      лінгвоцид).
    points: 2
- type: critical-analysis
  source_reading: reading-destruction-sich
  title: Аналіз причин падіння Гетьманщини
  instruction: Проаналізуйте історичну хронологію та ключові політичні події, що невпинно
    вели до повної ліквідації автономії.
  target_text: 'Ліквідація української автономії Російською імперією не відбулася
    за один день. Це був дуже тривалий, ретельно спланований процес: від примусової,
    інсценізованої відставки Кирила Розумовського у 1764 році та скасування автономії
    слобідських полків у 1765 році, до фізичного військового знищення Запорозької
    Січі у 1775 році та повної адміністративної уніфікації Лівобережжя у 1781 році.'
  questions:
  - Які основні етапи ліквідації козацької автономії можна чітко виділити у другій
    половині вісімнадцятого століття?
  - Чому російський імперський уряд панічно уникав одномоментної ліквідації всіх українських
    інституцій?
  model_answers:
  - 'Можна виділити такі послідовні етапи: примусова відставка останнього гетьмана
    (1764), брутальне скасування козацьких полків на Слобожанщині (1765), збройне
    знищення Запорозької Січі (1775) та остаточна уніфікація і впровадження російських
    намісництв на Лівобережжі (1781).'
  - Імперія дуже боялася масових збройних повстань з боку досвідченого козацтва, тому
    вона діяла обережно і поступово. Катерина Друга свідомо наказувала діяти непомітно,
    крок за кроком скасовуючи місцеві закони та підкуповуючи козацьку верхівку, щоб
    не спровокувати єдиного національного опору.
  focus_points:
  - Хронологія послідовного демонтажу автономії.
  - Тактика поступової асиміляції замість відкритої одночасної війни.
- type: critical-analysis
  title: Оцінка наслідків російської централізації
  instruction: Критично проаналізуйте руйнівні соціальні наслідки імперської політики
    для розвитку українського суспільства.
  target_text: Безпосереднім наслідком підступних указів імператриці Катерини Другої
    стала фатальна поляризація українського суспільства. Козацька старшина з радістю
    отримала дворянські права і стрімко русифікувалася, зраджуючи ідеали народу. Натомість
    сотні тисяч вільних людей були жорстоко закріпачені указом 1783 року. Українська
    мова, яка колись лунала в судах, перетворилася виключно на маргіналізовану мову
    бідного сільського населення.
  questions:
  - Як агресивна російська централізація вплинула на традиційну соціальну структуру
    українського суспільства?
  - Якою була реальна історична ціна отримання дворянства для козацької еліти?
  model_answers:
  - Централізація держави призвела до глибокого, майже нездоланного розколу суспільства.
    Утворилася прірва між русифікованою багатою елітою та абсолютно безправним, закріпаченим
    українським селянством, що відкинуло розвиток нації на століття назад.
  - В обмін на спадкові права російського дворянства та великі земельні володіння
    з тисячами кріпаків, козацька старшина масово відмовилася від будь-яких політичних
    державних амбіцій та добровільно інтегрувалася в чужий російський культурний простір.
  focus_points:
  - Глибока поляризація та соціальний розкол нації.
  - Зрада еліти як наслідок отримання привілеїв та запровадження кріпацтва.
