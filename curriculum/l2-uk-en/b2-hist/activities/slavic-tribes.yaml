- type: reading
  id: reading-sources
  title: 'Первинні джерела: Голос епохи'
  text: |
    Прокопій Кесарійський (VI ст.) про слов'ян:
    «Ці племена, склавини й анти, не підлягають одній людині, а здавна живуть у демократії; тому про все, що для них корисне чи шкідливе, вони міркують спільно. Вони вважають, що тільки один бог — творець блискавки — є володарем усього, і йому приносять у жертву биків і всяких жертовних тварин».
    
    «Повість минулих літ» (XII ст.) про розселення:
    «Самі ж слов'яни... сіли по Дніпру і назвалися полянами, а інші — деревлянами, бо осіли в лісах; а другі сіли межи Прип'яттю і Двіною і назвалися дреговичами... А другі ж сіли на Десні, і по Сейму, і по Сулі і назвалися сіверянами. І так розійшовся слов'янський народ».
  tasks:
    - Як візантійський історик характеризує політичний устрій слов'ян?
    - Який критерій використовує літописець для назв племен (поляни, древляни)?
    - Які елементи вірувань згадує Прокопій?

- type: true-false
  title: 'Перевірка знань: Слов''янський світ'
  instruction: Визначте правдивість тверджень про життя та побут слов'янських племен.
  items:
    - statement: Поляни жили в лісах на північному заході й займалися мисливством.
      correct: false
      explanation: Поляни жили в лісостепу (Середнє Подніпров'я) і займалися орним землеробством.
    - statement: Віче було формою прямої демократії, де вирішувалися питання війни та миру.
      correct: true
      explanation: Так, віче було народними зборами, де всі вільні чоловіки мали право голосу.
    - statement: Змієві вали були збудовані для захисту від вікінгів з півночі.
      correct: false
      explanation: Змієві вали захищали землеробів від кочовиків зі степу (півдня та сходу).
    - statement: Тиверці та уличі жили на півдні, поблизу Чорного моря та Дунаю.
      correct: true
      explanation: Це були південні племена, що межували зі степом і морем.
    - statement: Головним експортним товаром Русі були картопля та кукурудза.
      correct: false
      explanation: Картоплі та кукурудзи тоді не було; експортували мед, віск, хутро та челядь.
    - statement: Слов'яни використовували болотяну руду для виготовлення заліза.
      correct: true
      explanation: Болотяна руда була доступним джерелом заліза, яке обробляли в сиродутних горнах.
    - statement: Білі хорвати заснували місто Київ.
      correct: false
      explanation: Білі хорвати жили в Карпатах (столиця Стільсько); Київ заснували поляни.
    - statement: Жінка у слов'янському суспільстві мала право володіти майном.
      correct: true
      explanation: Жінки мали відносно високий статус, могли володіти майном і бути "берегинями".
    - statement: Авари (обри) мирно співіснували з дулібами та допомагали їм.
      correct: false
      explanation: Авари жорстоко пригноблювали дулібів, що відображено у вислові «погибоша аки обри».
    - statement: Підсічно-вогневе землеробство було типовим для степової зони.
      correct: false
      explanation: Цей метод використовували в лісовій зоні (Полісся) для розчищення ділянок.

- type: reading
  id: reading-iskorosten
  title: 'Кейс-стаді: Древлянське повстання'
  text: |
    У 945 році київський князь Ігор спробував зібрати данину з древлян вдруге за сезон, порушивши звичай. Древлянський князь Мал звернувся до віча: «Якщо внадиться вовк до овець, то виносить по одній все стадо, якщо не уб'ють його. Так і сей: якщо не вб'ємо його, то він усіх нас погубить».
    
    Древляни вбили Ігоря, що викликало помсту його вдови Ольги. Вона спалила столицю древлян Іскоростень, але згодом провела реформи. Ольга встановила чіткі розміри данини («уроки») та місця її збору («погости»), замінивши хаотичне полюддя впорядкованою податковою системою. Це перетворило племінний союз на частину централізованої держави.
  tasks:
    - Яка була економічна причина повстання древлян?
    - Як аргументував необхідність опору князь Мал?
    - Яким був довгостроковий політичний наслідок цього конфлікту?

- type: comparative-study
  title: 'Порівняння: Поляни та Древляни'
  source_reading: reading-iskorosten
  instruction: Порівняйте два ключові племінні союзи, спираючись на текст і ваші знання.
  items_to_compare:
    - Поляни (Київщина)
    - Древляни (Полісся)
  criteria:
    - Географічне середовище та тип господарства
    - Політична орієнтація (централізація vs автономія)
    - Роль у формуванні держави Русь
  model_answer: |
    Поляни жили у відкритому лісостепу, що сприяло розвитку орного землеробства та торгівлі (Дніпро). Вони стали ядром централізації та державотворення. Древляни мешкали в лісах, займалися промислами та зберігали архаїчний устрій. Вони чинили запеклий опір київській експансії, прагнучи зберегти племінну автономію, але після реформ Ольги були інтегровані в державну структуру.

- type: reading
  id: reading-white-croats
  title: 'Білі Хорвати: Карпатські велетні'
  text: |
    У VIII–X століттях на території Прикарпаття існувала могутня протодержава, відома як Велика Хорватія. Її центром було Стільське городище (Львівщина) площею 250 гектарів — справжній мегаполіс того часу, що значно перевершував Київ. Місто мало потужні оборонні вали та культові центри.
    
    Назва «білі» означала «західні». Частина цього племені у VII столітті мігрувала на Балкани, давши початок сучасним хорватам. Ті, хто залишився, стали предками етнографічних груп українців Карпат. Існування такого потужного центру доводить, що державність на наших землях мала кілька вогнищ, а не лише київське.
  tasks:
    - Чим вражає Стільське городище порівняно з іншими містами тієї епохи?
    - Що означає назва «Білі Хорвати»?
    - Як історія білих хорватів впливає на розуміння походження українців?

- type: critical-analysis
  title: 'Аналіз: Феномен Стільська'
  source_reading: reading-white-croats
  instruction: Проаналізуйте значення Стільського городища для української історії.
  target_text: |
    Існування такого потужного центру доводить, що державність на наших землях мала кілька вогнищ, а не лише київське.
  questions:
    - Як факт існування Стільська змінює традиційну «києвоцентричну» модель історії?
    - Які ресурси були необхідні для будівництва міста площею 250 гектарів?
    - Чому, на вашу думку, цей мегаполіс занепав і поступився Києву?
  model_answers:
    - "Це доводить поліцентричність розвитку: державні утворення виникали паралельно в різних регіонах (Карпати, Волинь, Подніпров'я)."
    - "Необхідна була висока концентрація населення, централізована влада для організації робіт та розвинене сільське господарство для забезпечення їжею."
    - "Можливою причиною стала зміна торгових шляхів, військові конфлікти з сусідами або добровільна/примусова інтеграція в орбіту Русі."
  focus_points:
    - Урбанізація
    - Поліцентричність
    - Економічний потенціал

- type: essay-response
  title: 'Есе: Демократія та авторитаризм'
  source_reading: reading-sources
  prompt: |
    Спираючись на цитату Прокопія Кесарійського про «демократію» слов'ян та історію віча, напишіть есе про політичну культуру наших предків. Як традиція спільного вирішення справ вплинула на подальшу українську історію? Чи можна вважати віче прообразом сучасного парламентаризму?
  min_words: 200
  model_answer: |
    Політична культура ранніх слов'ян базувалася на принципах прямої демократії та вічового устрою. Як зазначав Прокопій, вони «не підлягали одній людині», а вирішували справи спільно. Це сформувало ментальність, нетерпиму до авторитаризму. Ця традиція простежується крізь віки: від віча Київської Русі до козацьких рад і сучасних Майданів. Віче було інструментом контролю влади громадою, де князь виступав як найманий менеджер і воєначальник, а не абсолютний монарх.
  rubric:
    - criteria: Використання джерел
      description: Учень коректно посилається на Прокопія або літопис.
      points: 2
    - criteria: Історичний зв'язок
      description: Учень проводить паралелі між вічем та пізнішими формами самоврядування.
      points: 4
    - criteria: Аргументація
      description: Чітко сформульована теза про природу слов'янської демократії.
      points: 4