- type: reading
  id: 'reading-shistdesiatnyky'
  title: 'Первинні джерела: Дзюба та Симоненко'
  source: 'Іван Дзюба, Василь Симоненко (самвидав)'
  text: |
    Василь Симоненко писав: Читання чужих щоденників без дозволу — це Еверест підлості.
    Іван Дзюба у трактаті Інтернаціоналізм чи русифікація? доводив, що політика примусової русифікації і злиття націй є не чим іншим, як великодержавним російським шовінізмом і колоніалізмом. Ці тексти стали інтелектуальною зброєю проти брехні.
  tasks:
    - 'Проаналізуйте метафору Василя Симоненка про Еверест підлості.'
    - 'Як Іван Дзюба використовував марксистську теорію у своїй праці?'
    - 'Чому влада так панічно відреагувала на трактат Дзюби?'
    - 'Яким чином ці тексти доводять ілюзорність свободи під час відлиги?'

- type: true-false
  title: 'Правда чи вигадка: Рух шістдесятників'
  instruction: 'Визначте, чи є наведені твердження правдивими чи хибними.'
  items:
    - statement: 'Хрущовська відлига означала повний демонтаж тоталітарної системи в державі.'
      correct: false
      explanation: 'Відлига була лише частковим послабленням контролю; система залишалася тоталітарною.'
    - statement: 'Клуб творчої молоді Сучасник став центром формування незалежної національної свідомості в Києві.'
      correct: true
      explanation: 'Цей клуб об''єднав нову генерацію і вийшов з-під партійного контролю.'
    - statement: 'Шістдесятники були переважно людьми старшого покоління, які пережили Голодомор.'
      correct: false
      explanation: 'Це була молода інтелігенція, формування якої припало на роки Другої світової війни.'
    - statement: 'Фільм Тіні забутих предків був дубльований російською мовою на вимогу Сергія Параджанова.'
      correct: false
      explanation: 'Параджанов категорично відмовився дублювати фільм російською мовою.'
    - statement: 'Прем''єра фільму Тіні забутих предків стала першим відкритим політичним протестом.'
      correct: true
      explanation: 'Під час прем''єри Іван Дзюба та В''ячеслав Чорновіл закликали протестувати проти арештів.'
    - statement: 'Щоденник Василя Симоненка був офіційно та масово надрукований у Києві в 1963 році.'
      correct: false
      explanation: 'Щоденник поширювався у самвидаві та був переданий за кордон, що викликало лють влади.'
    - statement: 'Іван Дзюба доводив, що русифікація суперечить принципам марксизму-ленінізму.'
      correct: true
      explanation: 'Він використовував цитати класиків марксизму, щоб викрити російський шовінізм.'
    - statement: 'Влада схвально сприйняла створення вітража Шевченко. Мати в Київському університеті.'
      correct: false
      explanation: 'Вітраж був жорстоко знищений за вказівкою партії як ідейно порочний твір.'
    - statement: 'Шістдесятники довели, що українська ідентичність є модерною та урбаністичною реальністю.'
      correct: true
      explanation: 'Вони зруйнували міф про селюцьку українську націю, перенісши її в місто.'
    - statement: 'Операція Блок 1972 року стимулювала легальне культурне відродження в Україні.'
      correct: false
      explanation: 'Це був Великий погром, який поклав край легальній культурній діяльності шістдесятників.'

- type: essay-response
  title: 'Критичний аналіз: Від культури до політики'
  instruction: 'Напишіть есе на основі прочитаного тексту та історичних джерел.'
  source_reading: 'reading-shistdesiatnyky'
  prompt: 'Шістдесятники починали свій шлях як культурні діячі, але згодом стали політичними дисидентами. Проаналізуйте, чому в умовах тоталітаризму культурне відродження неминуче перетворюється на політичний опір.'
  min_words: 150
  model_answer: 'В тоталітарній державі будь-яка несанкціонована діяльність розцінюється як загроза режиму. Шістдесятники прагнули вільного розвитку мови та мистецтва, що суперечило політиці русифікації та цензури. Опір влади змусив їх усвідомити неможливість культурної свободи без політичної свободи та гарантій базових прав людини.'
  rubric:
    - criteria: 'Аналіз еволюції руху'
      description: 'Глибоке розкриття переходу від культурництва до дисидентства.'
      points: 10

- type: critical-analysis
  title: 'Аналіз причинно-наслідкових зв''язків між подіями'
  instruction: 'Проаналізуйте історичні події та їх наслідки.'
  source_reading: 'reading-shistdesiatnyky'
  questions:
    - 'Як смерть Сталіна та ХХ з''їзд КПРС вплинули на формування покоління шістдесятників?'
    - 'Чому знищення вітража Шевченко. Мати стало каталізатором подальших протестів?'
    - 'Яким був причинно-наслідковий зв''язок між арештами 1965 року та акцією в кінотеатрі Україна?'
  model_answers:
    - 'Викриття культу особи дозволило молодій генерації вимагати правди та відкинути тотальний страх.'
    - 'Воно продемонструвало ілюзорність свободи творчості та страх влади перед національним відродженням.'
    - 'Арешти спровокували відкритий політичний протест під час прем''єри фільму, консолідувавши дисидентський рух.'
  focus_points:
    - 'Вплив політичної ситуації на культуру'
    - 'Реакція суспільства на репресії'

- type: critical-analysis
  title: 'Критична оцінка історичних тверджень та міфів'
  instruction: 'Оцініть радянські міфи та історичні твердження щодо шістдесятників.'
  source_reading: 'reading-shistdesiatnyky'
  questions:
    - 'Як шістдесятники зруйнували міф про єдиний радянський народ?'
    - 'Чому влада намагалася закріпити за українською культурою статус провінційної?'
    - 'У чому полягала деколонізаційна стратегія Івана Дзюби у його трактаті?'
    - 'Як спілкування українською мовою в Києві стало актом антиколоніального опору?'
    - 'Чому твердження про те, що шістдесятництво було суто літературним явищем, є неточним?'
  model_answers:
    - 'Вони довели, що українська ідентичність жива і не бажає асимілюватися.'
    - 'Зведення культури до примітиву полегшувало асиміляцію та знищувало її конкурентоздатність.'
    - 'Він використовував праці класиків марксизму, щоб довести, що русифікація є формою колоніалізму.'
    - 'Розмовляти українською означало свідомо протистояти імперській політиці злиття націй.'
    - 'Рух швидко вийшов за межі естетики, перетворившись на правозахисну діяльність і дисидентство.'
  focus_points:
    - 'Деконструкція міфів'
    - 'Роль мови в опорі'