- type: reading
  id: "reading-boplan"
  title: 'Первинне джерело: Опис України'
  source: "Гійом Левассер де Боплан (1651)"
  text: "Сотня цих козаків у таборі не боїться тисячі поляків чи навіть тисячі татар. Вони надзвичайно міцні статурою, легко переносять спеку і холод, голод і спрагу. Мало хто з них помирає від хвороби, хіба що в глибокій старості, бо більшість гине почесною смертю на війні."

- type: critical-analysis
  title: "Аналіз погляду іноземця"
  source_reading: "reading-boplan"
  instruction: "Проаналізуйте уривок Гійома де Боплана."
  questions:
    - "Які саме якості козаків Боплан виділяє як їхню найбільшу перевагу?"
    - "Чому, на вашу думку, європейського інженера так вразила здатність козаків до виживання?"

- type: essay-response
  title: "Деколонізаційний аналіз витоків козацтва"
  prompt: "Спростуйте імперський міф про те, що ранні козаки були виключно неосвіченими селянами-розбійниками. Використайте концепції Великого Кордону, уходництва та державотворчої діяльності ранніх отаманів (наприклад, Дмитра Вишневецького), щоб довести полісоціальний характер та суб'єктність козацтва."
  min_words: 250
  rubric:
    - criteria: "Аргументація"
      description: "Використання історичних концепцій (Великий Кордон, уходництво)."
      points: 10
    - criteria: "Фактаж"
      description: "Згадка історичних постатей та подій (Вишневецький, Січ)."
      points: 10

- type: comparative-study
  title: 'Порівняння: Уходництво та кріпацтво'
  instruction: "Порівняйте дві різні соціально-економічні моделі існування в Україні шістнадцятого століття."
  items_to_compare:
    - "Уходництво (Дике поле)"
    - "Кріпацтво (Панські землі)"
  criteria:
    - "Рівень особистої свободи"
    - "Економічна мотивація та ризики"
    - "Соціальний статус та перспективи"

- type: true-false
  title: 'Перевірка фактів: Витоки козацтва'
  instruction: "Визначте, чи є ці твердження правдивими."
  items:
    - statement: "Слово козак має слов'янське походження і означає людину з рушницею."
      correct: false
      explanation: "Етимологія слова тюркська і означає вільну людину або вартового."
    - statement: "Перша писемна згадка про українських козаків датується 1489 роком у хроніці Марціна Бєльського."
      correct: true
      explanation: "Козаки згадуються як провідники польського війська на Поділлі."
    - statement: "Дике поле було абсолютно безлюдною пустелею без жодних природних ресурсів."
      correct: false
      explanation: "Це була територія з багатими ресурсами, але небезпечна через кочовиків."
    - statement: "Уходники залишали свої домівки навесні для заняття сезонними промислами у степу."
      correct: true
      explanation: "Вони займалися рибальством, мисливством та збором дикого меду."
    - statement: "Здобичники нападали виключно на польські міста і ніколи не чіпали турецькі фортеці."
      correct: false
      explanation: "Вони атакували турецькі галери і кримські міста заради здобичі і визволення ясиру."
    - statement: "Жінкам на ранніх етапах існування Січі було категорично заборонено перебувати на її території."
      correct: true
      explanation: "Це робилося для збереження постійної бойової готовності війська."
    - statement: "Всі козаки вважалися реєстровими і отримували офіційну платню від короля."
      correct: false
      explanation: "Реєстровими була лише невелика частина козаків (триста осіб за першим універсалом)."
    - statement: "Табір з возів використовувався для захисту від легкої кінноти у степу."
      correct: true
      explanation: "Вози утворювали непробивний периметр, з-за якого козаки вели вогонь."
    - statement: "Князь Дмитро Вишневецький заснував фортецю на острові Мала Хортиця у шістнадцятому столітті."
      correct: true
      explanation: "Ця фортеця стала прототипом Запорозької Січі."
    - statement: "Між козаками та кримськими татарами ніколи не було мирної торгівлі чи військових союзів."
      correct: false
      explanation: "Відносини були прагматичними, вони часто торгували і укладали тимчасові військові союзи."