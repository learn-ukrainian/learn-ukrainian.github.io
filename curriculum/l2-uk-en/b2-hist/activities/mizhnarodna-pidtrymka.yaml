- type: reading
  id: reading-pidtrymka-1
  title: 'Джерело 1: Формування міжнародної коаліції'
  source: 'Історичний аналіз'
  text: |
    Консолідація міжнародних зусиль є вирішальним фактором у протистоянні агресії. Формування широкої коаліції вимагало інтенсивних дипломатичних переговорів та компромісів. Головною метою стало створення єдиного фронту для захисту державного суверенітету та норм міжнародного права.

- type: critical-analysis
  title: 'Аналіз джерела: Дипломатичний фронт'
  source_reading: reading-pidtrymka-1
  instruction: 'Проаналізуйте текст і дайте розгорнуті відповіді.'
  questions:
    - 'Які головні труднощі могли виникати під час формування міжнародної коаліції?'
    - 'Чому захист державного суверенітету вимагає консолідації зусиль багатьох країн?'

- type: essay-response
  title: 'Есе: Роль дипломатії'
  instruction: 'Напишіть есе про роль дипломатичних переговорів у забезпеченні національної безпеки.'
  source_reading: reading-pidtrymka-1
  criteria:
    - description: 'Аргументація та наведення прикладів'
      points: 5
    - description: 'Структура есе (вступ, основна частина, висновок)'
      points: 3
    - description: 'Граматична правильність та використання лексики'
      points: 2

- type: reading
  id: reading-pidtrymka-2
  title: 'Джерело 2: Економічний тиск'
  source: 'Економічний вісник'
  text: |
    Запровадження економічних санкцій є одним із найдієвіших інструментів невійськового тиску на агресора. Ембарго, замороження фінансових активів та ізоляція на міжнародних ринках суттєво обмежують ресурси для продовження конфлікту. Ефективність таких заходів залежить від солідарності союзників.

- type: critical-analysis
  title: 'Аналіз джерела: Економічний тиск'
  source_reading: reading-pidtrymka-2
  instruction: 'Дайте відповіді на запитання на основі прочитаного тексту.'
  questions:
    - 'Які конкретні види економічних санкцій згадуються у тексті?'
    - 'Чому солідарність союзників є критично важливою для ефективності санкцій?'