- type: reading
  id: reading-samovydets
  title: 'Первинне джерело: Літопис Самовидця про Чорну раду'
  source: 'Роман Ракушка-Романовський'
  text: 'Назбіралось люду незчисленна сила, і все то була сільська чернь... у чорних сорочках... У иншого сокира за поясом, у того коса на плечі, а другий притяг із колякою. І такий стався галас і заколот, що не можна було слова сказати... Почали ламати списи об голови старшини...'
  tasks:
    - 'Прочитайте текст та проаналізуйте, як автор описує поведінку натовпу та атмосферу ради.'

- type: critical-analysis
  source_reading: reading-samovydets
  title: 'Аналіз Літопису Самовидця'
  instruction: 'Уважно прочитайте уривок з літопису та дайте відповіді на запитання.'
  questions:
    - 'Як автор літопису ставиться до участі сільської черні в політичній раді?'
    - 'Які художні деталі підкреслюють неконтрольованість і агресивність натовпу?'
    - 'Як цей уривок ілюструє концепцію охлократії на практиці?'
    - 'Чому, на вашу думку, літописець критикує не лише чернь, але й козацьку старшину?'

- type: comparative-study
  title: 'Порівняльний аналіз політичних курсів'
  instruction: 'Порівняйте політичні підходи двох діячів епохи Руїни за вказаними критеріями.'
  items_to_compare:
    - 'Іван Виговський'
    - 'Іван Брюховецький'
  criteria:
    - 'Соціальна опора (які верстви населення їх підтримували)'
    - 'Зовнішньополітичний вектор (союзи з іноземними державами)'
    - 'Ставлення до освіти та європейських цінностей'
    - 'Реальні наслідки їхнього правління для державного суверенітету'

- type: true-false
  title: 'Верифікація історичних фактів'
  instruction: 'Визначте, чи є наведені твердження правдивими, чи хибними.'
  items:
    - statement: 'Термін Руїна був придуманий сучасними істориками і не використовувався в сімнадцятому столітті.'
      correct: false
      explanation: 'Цей термін вперше запровадив козацький літописець Самійло Величко на початку вісімнадцятого століття.'
    - statement: 'Смерть Богдана Хмельницького спричинила вакуум влади, оскільки його син Юрій не мав достатнього авторитету.'
      correct: true
      explanation: 'Молодий Юрій Хмельницький не мав військового досвіду та політичної ваги свого видатного батька.'
    - statement: 'Повстання Пушкаря і Барабаша було суто внутрішнім соціальним конфліктом без зовнішнього втручання.'
      correct: false
      explanation: 'Це був заколот, який активно фінансувався та підтримувався московськими агентами.'
    - statement: 'Іван Виговський прагнув створити міцну централізовану державу європейського зразка.'
      correct: true
      explanation: 'Він орієнтувався на європейські політичні стандарти та підтримував розвиток освіти.'
    - statement: 'Гадяцька унія передбачала створення Великого Князівства Руського як рівноправної частини Речі Посполитої.'
      correct: true
      explanation: 'Документ гарантував власну армію, скарбницю та незалежну судову систему.'
    - statement: 'У Конотопській битві московська армія зазнала нищівної поразки завдяки залученню татарської кінноти.'
      correct: true
      explanation: 'Кримський хан Мехмед Герай прибув на допомогу Виговському зі своїм могутнім військом.'
    - statement: 'Після перемоги під Конотопом українська армія негайно захопила Москву.'
      correct: false
      explanation: 'Цього не сталося через рейд Івана Сірка на Крим, що змусило татар повернутися, та через внутрішні чвари.'
    - statement: 'Іван Сірко своїм нападом на Крим допоміг Івану Виговському остаточно розгромити московські війська.'
      correct: false
      explanation: 'Навпаки, його напад позбавив Виговського головного союзника — татарської кінноти — в критичний момент.'
    - statement: 'Чорна рада в Ніжині 1663 року завершилася перемогою Якима Сомка та стратою Івана Брюховецького.'
      correct: false
      explanation: 'Переміг Іван Брюховецький завдяки підтримці черні та Москви, а Яким Сомко був безжально страчений.'
    - statement: 'Московські статті 1665 року суттєво обмежили права Гетьманщини та посилили податковий тиск.'
      correct: true
      explanation: 'Українські міста перейшли під прямий контроль воєвод, а податки почали збиратися в царську казну.'

- type: essay-response
  title: 'Причини Руїни: внутрішній розкол чи зовнішня агресія?'
  instruction: 'Напишіть розгорнуте есе, аргументуючи свою позицію історичними фактами.'
  prompt: 'Спираючись на текст модуля, проаналізуйте головні причини Руїни. Що відіграло вирішальну роль у розпаді Гетьманщини: соціальні конфлікти всередині козацького суспільства чи гібридна війна та втручання Московського царства? Наведіть конкретні історичні приклади.'
  min_words: 150
  rubric:
    - criteria: 'Історична аргументація'
      description: 'Використання конкретних фактів та прикладів з тексту (наприклад, заколот Пушкаря, Чорна рада).'
      points: 40
    - criteria: 'Аналіз причинно-наслідкових зв’язків'
      description: 'Глибоке розуміння впливу зовнішніх та внутрішніх факторів на політичну ситуацію.'
      points: 40
    - criteria: 'Структура та логіка'
      description: 'Послідовний і чіткий виклад думок, наявність аргументованого висновку.'
      points: 20