- type: "reading"
  id: "reading-drahomanov-letters"
  title: "Первинне джерело: Листи на Наддніпрянську Україну"
  source: "Михайло Драгоманов"
  text: |
    Чисто діло мови ніколи не вигорить, поки не буде злучене з інтересами політичними, соціальними, культурними.
  instruction: "Прочитайте оригінальну цитату Михайла Драгоманова."

- type: "true-false"
  title: "Правда чи хиба: Політичні ідеї Драгоманова"
  instruction: "Визначте, чи є твердження правильними."
  items:
    - statement: "Драгоманов вважав, що інтереси абстрактної держави є вищими за права людини."
      correct: false
      explanation: "Він був переконаний, що права людини є абсолютним пріоритетом."
    - statement: "За політичними поглядами Драгоманов був переконаним лібералом."
      correct: true
      explanation: "Він відстоював базові громадянські свободи та права індивіда."
    - statement: "Концепція громадівства передбачає побудову держави згори донизу, з сильним центром."
      correct: false
      explanation: "Громадівство передбачає розбудову суспільства знизу вгору, де основою є автономна місцева громада."
    - statement: "Політичним ідеалом для Драгоманова була швейцарська модель федералізму."
      correct: true
      explanation: "Він пропонував реорганізувати Східну Європу у конфедерацію автономних територій."
    - statement: "Радикальні марксисти підтримували етичний соціалізм Драгоманова."
      correct: false
      explanation: "Драгоманов відкидав марксистську ідею класової боротьби і диктатури."
    - statement: "Драгоманов критикував як російський, так і польський імперіалізм."
      correct: true
      explanation: "Він шукав третій шлях для України та боровся за її політичну суб'єктність."
    - statement: "Гасло про націоналізм у формі означає повну відмову від світової культури."
      correct: false
      explanation: "Воно означає досягнення універсальних європейських цілей через національну мову та культуру."
    - statement: "Драгоманов вимагав від галицьких діячів зосередитись виключно на місцевих проблемах Галичини."
      correct: false
      explanation: "Він боровся з провінціалізмом і змушував мислити масштабами всієї нації."
    - statement: "Малоросійство, за Драгомановим, — це ганебний, рабський стан душі."
      correct: true
      explanation: "Це комплекс меншовартості людей, які добровільно стали лакеями імперії."
    - statement: "В еміграції у Женеві Драгоманов створив першу вільну українську друкарню."
      correct: true
      explanation: "Він заснував друкарню і видавав політичний часопис Громада без цензури."

- type: "essay-response"
  source_reading: "reading-drahomanov-letters"
  title: "Есе: Актуальність ідей Драгоманова"
  instruction: "Напишіть коротке есе, спираючись на текст модуля."
  prompt: "Чому ідеї Михайла Драгоманова про децентралізацію та європейську інтеграцію залишаються актуальними для сучасної України? Аргументуйте свою відповідь."
  min_words: 150
  model_answer: "Ідеї Драгоманова про децентралізацію (громадівство) ідеально відповідають сучасній реформі самоврядування в Україні. Його теза про європейський вектор розвитку залишається головною метою держави."
  rubric:
    - criteria: "Аргументація"
      description: "Наявність чітких аргументів щодо децентралізації."
      points: 5
    - criteria: "Зв'язок із сучасністю"
      description: "Проведені паралелі між ХІХ століттям та сучасною ситуацією."
      points: 5

- type: "critical-analysis"
  source_reading: "reading-drahomanov-letters"
  title: "Критичний аналіз: Мова і політика"
  instruction: "Дайте розгорнуті відповіді на питання."
  target_text: "Чисто діло мови ніколи не вигорить, поки не буде злучене з інтересами політичними, соціальними, культурними."
  questions:
    - "Що саме Драгоманов мав на увазі під чистим ділом мови?"
    - "Чому неможливо захистити мову без політичних вимог?"
    - "Як соціальна справедливість пов'язана з національним рухом?"
  model_answers:
    - "Він мав на увазі суто етнографічну роботу без боротьби за права."
    - "Тому що мова розвивається лише тоді, коли стає мовою освіти і політики."
    - "Прості люди підтримають національну ідею, лише якщо вона захистить їхні соціальні права."

- type: "comparative-study"
  title: "Порівняльне дослідження: Федералізм та Централізм"
  instruction: "Порівняйте дві політичні моделі."
  items_to_compare:
    - "Федералізм за Драгомановим"
    - "Імперський централізм"
  criteria:
    - "Розподіл влади"
    - "Управління податками"
    - "Ставлення до місцевих мов"
  prompt: "На основі порівняння зробіть висновок, чому централізм був згубним для України."
  model_answer: "Федералізм залишає владу і фінанси в місцевих громадах. Натомість імперський централізм забирає ресурси в столицю та забороняє місцеві мови, що руйнує вільний розвиток."