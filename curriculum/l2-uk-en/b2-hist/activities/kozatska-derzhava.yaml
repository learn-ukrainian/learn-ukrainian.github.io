- type: reading
  id: reading-vimina
  title: "Джерело: Реляція Альберто Віміни"
  source: "Альберто Віміна (1650)"
  text: |
    Козаки страшенно люблять свободу; смерть вважають кращою за рабство і для оборони незалежності часто повстають проти своїх гнобителів. Місто Чигирин не може похвалитися ніякими визначними, мурованими будівлями, будинки тут переважно дерев'яні. Однак старшина має високу освіту та вільно спілкується латиною.
  tasks:
    - "Що посол називає головною цінністю козаків?"
    - "Яка деталь вказує на європейський рівень дипломатії Гетьманщини?"

- type: critical-analysis
  title: "Аналіз: Погляд дипломата"
  source_reading: reading-vimina
  instruction: "Проаналізуйте текст Альберто Віміни."
  target_text: "Козаки страшенно люблять свободу; смерть вважають кращою за рабство..."
  questions:
    - "Як цей опис спростовує міф про козаків як 'некерований натовп'?"
    - "Чому для європейського посла було важливо відзначити знання латини?"
  model_answers:
    - "Він показує козаків як політичну націю з чіткими цінностями, яка свідомо бореться за незалежність."
    - "Знання латини свідчило про належність козацької еліти до європейського дипломатичного простору."
  focus_points:
    - "Деконструкція колоніальних міфів"
    - "Дипломатичний протокол"

- type: true-false
  title: "Перевірка фактів: Устрій Гетьманщини"
  instruction: "Визначте, чи є твердження істинними чи хибними."
  items:
    - statement: "У період Хмельниччини Україна була поділена на воєводства та повіти."
      correct: false
      explanation: "Козацька влада ліквідувала воєводства і запровадила полково-сотенний устрій."
    - statement: "Генеральний суддя очолював найвищу судову інстанцію після гетьмана."
      correct: true
      explanation: "Він розглядав найскладніші справи і був вищою апеляційною інстанцією."
    - statement: "Богдан Хмельницький планував передати свою булаву у спадок."
      correct: true
      explanation: "Він прагнув запровадити спадкову монархію для стабільності держави."
    - statement: "Дипломатичні переговори у Чигирині велися переважно російською мовою."
      correct: false
      explanation: "Офіційною мовою дипломатії була латина, а також канцелярська руська мова."
    - statement: "Березневі статті 1654 року означали остаточне входження до складу Московського царства."
      correct: false
      explanation: "Це був рівноправний тимчасовий військовий союз незалежних держав."
    - statement: "Військовий скарб поповнювався виключно за рахунок контрибуцій."
      correct: false
      explanation: "Скарбниця наповнювалася митами, податками з оренди та пропінації."
    - statement: "Посада Генерального писаря відповідала сучасному міністру закордонних справ."
      correct: true
      explanation: "Він очолював зовнішню політику та керував Генеральною військовою канцелярією."
    - statement: "Сотник мав одночасно військову та цивільну владу на своїй території."
      correct: true
      explanation: "Сотня була одночасно бойовим підрозділом і адміністративним округом."
    - statement: "Судова система Гетьманщини базувалася лише на неписаних звичаях."
      correct: false
      explanation: "Вона поєднувала звичаєве козацьке право та норми Литовського статуту."
    - statement: "Універсали гетьмана не мали обов'язкової юридичної сили для міщан."
      correct: false
      explanation: "Універсали були найвищими законами, обов'язковими для всіх верств."

- type: reading
  id: reading-universal
  title: "Джерело: Універсал гетьмана"
  source: "Богдан Хмельницький (1650)"
  text: |
    Наказуємо всім полковникам і сотникам: міщан і купців податками незаконними не обтяжувати, у їхні міські суди не втручатися і торгівлі вільній перешкод не чинити, під страхом суворого покарання військового.
  tasks:
    - "До кого звертається гетьман у цьому документі?"
    - "Які дії військової старшини забороняються універсалом?"

- type: comparative-study
  title: "Порівняння: Адміністративні моделі"
  source_reading: reading-universal
  instruction: "Порівняйте дві системи адміністративного устрою."
  items_to_compare:
    - "Польська система (воєводства)"
    - "Козацька система (полки та сотні)"
  criteria:
    - "Розподіл цивільної та військової влади"
    - "Мобілізаційна гнучкість"
  prompt: "Проаналізуйте, чому козацька старшина відмовилася від польської моделі та запровадила полково-сотенний устрій."
  model_answer: "Польська система розділяла цивільне управління та армію. Козацька модель об'єднала їх: полковник був адміністратором і командиром водночас. Це забезпечувало унікальну мобілізаційну гнучкість та ефективність в умовах постійної війни."

- type: essay-response
  title: "Есе: Козацька держава та європейський контекст"
  source_reading: reading-vimina
  instruction: "Напишіть аналітичне есе."
  prompt: "Опираючись на текст модуля та реляцію Альберто Віміни, доведіть, що Гетьманщина була повноцінною державою, а не 'анархією'."
  min_words: 150
  model_answer: "Гетьманщина мала всі ключові ознаки зрілої європейської держави. По-перше, ефективний апарат: полково-сотенний устрій та Генеральна старшина виконували функції повноцінного уряду. По-друге, незалежна фінансова система та власна скарбниця забезпечували суверенітет. По-третє, міжнародна суб'єктність: іноземні посли вели переговори в Чигирині за суворим дипломатичним протоколом. Усе це переконливо спростовує імперські міфи про 'анархію'."
  rubric:
    - criteria: "Аргументація"
      description: "Наявність чітких доказів державної зрілості Гетьманщини."
      points: 5
    - criteria: "Історичний контекст"
      description: "Розуміння європейського політичного контексту XVII століття."
      points: 3
    - criteria: "Структура тексту"
      description: "Логічна послідовність викладу та дотримання академічного стилю."
      points: 2