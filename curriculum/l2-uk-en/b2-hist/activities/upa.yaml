- type: reading
  id: reading-upa-oath
  title: 'Первинне джерело: Присяга воїна УПА'
  source: 'Українська Головна Визвольна Рада (1944)'
  instruction: 'Прочитайте уривок з присяги воїна УПА для подальшого аналізу.'
  text: |
    Я, воїн Української Повстанської Армії, взявши в руки зброю, урочисто клянусь своєю честю і сумлінням перед Великим Народом Українським... боротись за повне визволення всіх українських земель і українського народу від загарбників та здобути Українську Самостійну Соборну Державу.

- type: essay-response
  title: 'Аналітичне есе: Війна на два фронти'
  source_reading: reading-upa-oath
  instruction: 'Напишіть розгорнуту відповідь, спираючись на текст лекції та джерело.'
  prompt: 'Чому УПА обрала стратегію війни "між двома вогнями"? Якими були політичні та історичні причини відмови від союзів з тоталітарними державами (нацистською Німеччиною та СРСР)? Обґрунтуйте свою відповідь.'
  min_words: 150
  model_answer: 'УПА обрала стратегію війни на два фронти через те, що і нацистська Німеччина, і Радянський Союз мали на меті знищення українського національного руху та експлуатацію українських земель. Досвід 1917-1921 років показав, що відсутність власної сильної армії веде до поразки та втрати державності. Керівництво ОУН розуміло, що союз із будь-яким тоталітарним режимом означає зраду ідеї незалежності. УПА сподівалася на взаємне виснаження Німеччини та СРСР, що дозволило б підняти всенародне повстання і проголосити незалежну Українську Самостійну Соборну Державу до моменту повоєнного розподілу світу.'
  rubric:
    - criteria: 'Історична аргументація'
      description: 'Відповідь містить чіткі посилання на концепцію подвійної окупації та досвід минулого.'
      points: 5
    - criteria: 'Аналіз мотивів'
      description: 'Пояснено причини відмови від союзів із тоталітарними режимами.'
      points: 5

- type: true-false
  title: 'Перевірка фактів: Історія УПА'
  instruction: 'Визначте, чи є наведені твердження правдивими (true) чи хибними (false).'
  items:
    - statement: 'Офіційною датою створення УПА вважається 14 жовтня 1942 року.'
      correct: true
      explanation: 'Ця дата символічно збігається зі святом Покрови Пресвятої Богородиці.'
    - statement: 'УПА отримувала стабільне постачання зброї від урядів Великої Британії та США.'
      correct: false
      explanation: 'УПА не мала зовнішньої підтримки і здобувала ресурси в бою або від населення.'
    - statement: 'Роман Шухевич став Головнокомандувачем УПА у 1944 році.'
      correct: true
      explanation: 'Він реорганізував УПА у регулярну армію підпільного типу.'
    - statement: 'Бофони — це спеціальні бойові підрозділи УПА на Поділлі.'
      correct: false
      explanation: 'Бофони (бойовий фонд) — це підпільні грошові квитанції.'
    - statement: 'Колківська республіка була створена повстанцями на Волині у 1943 році.'
      correct: true
      explanation: 'Це була звільнена від нацистів територія, де відновили українську владу.'
    - statement: 'Нюрнберзький трибунал визнав УПА злочинною колабораціоністською організацією.'
      correct: false
      explanation: 'Трибунал відхилив радянські звинувачення проти УПА.'
    - statement: 'Операція "Вісла" у 1947 році полягала у примусовій депортації українців комуністичним урядом Польщі.'
      correct: true
      explanation: 'Метою депортації було знищення соціальної бази підтримки підпілля.'
    - statement: 'Останній задокументований бій українських повстанців відбувся у 1945 році.'
      correct: false
      explanation: 'Останній бій групи Петра Пасічного відбувся у 1960 році.'
    - statement: 'УПА мала власну медичну службу, яка називалася Український Червоний Хрест.'
      correct: true
      explanation: 'Медики розгортали підпільні шпиталі у лісових криївках.'
    - statement: 'Радянська пропаганда завжди об''єктивно висвітлювала діяльність повстанців.'
      correct: false
      explanation: 'Радянська система створювала міфи та використовувала спецгрупи НКВС під виглядом УПА.'

- type: critical-analysis
  title: 'Критичний аналіз: Пропаганда та ідеологія'
  source_reading: reading-upa-oath
  instruction: 'Проаналізуйте наведені питання, спираючись на знання про інформаційну війну підпілля.'
  questions:
    - 'Яку мету переслідували листівки УПА із закликом "Чому ти стріляєш в брата?", звернені до солдатів Червоної Армії?'
    - 'Чому клятва УПА проголошувалася "перед Великим Народом Українським", а не перед конкретним політичним лідером?'
  model_answers:
    - 'Метою листівок було деконструювати радянську пропаганду, пояснити, що українці воюють проти сталінського режиму, а не проти росіян чи інших народів, і спробувати створити спільний антиімперський фронт з поневоленими націями.'
    - 'Присяга народу підкреслювала, що армія служить винятково національним інтересам і державній незалежності, ставлячи ідею вільної України вище за партійні розбіжності чи інтереси окремих вождів.'
  focus_points:
    - 'Інформаційна війна та контрпропаганда.'
    - 'Державницький характер повстанського руху.'

- type: comparative-study
  title: 'Порівняльний аналіз: Радянські міфи та реальність'
  instruction: 'Порівняйте радянський пропагандистський наратив про УПА з історичними фактами.'
  items_to_compare:
    - 'Радянський міф: УПА — "німецькі посіпаки" та колабораціоністи.'
    - 'Історична реальність: УПА як антинацистський рух опору.'
  criteria:
    - 'Ставлення нацистської адміністрації до українського підпілля.'
    - 'Джерела постачання зброї та фінансування.'
    - 'Рішення міжнародних судових інстанцій (Нюрнберзький трибунал).'
  prompt: 'Напишіть коротке порівняння двох поглядів на діяльність УПА, використовуючи запропоновані критерії.'
  model_answer: 'Радянська пропаганда стверджувала, що УПА співпрацювала з нацистами. Однак історична реальність доводить інше. По-перше, німецька адміністрація вважала підпілля серйозною загрозою: проводила масові каральні операції та призначала нагороди за голів командирів. По-друге, УПА не отримувала зброї від Німеччини; усі ресурси здобувалися як трофеї в боях або через підтримку місцевого населення (бофони). По-третє, Нюрнберзький трибунал, попри тиск СРСР, не визнав УПА злочинною організацією, підтвердивши її статус як незалежного визвольного руху.'